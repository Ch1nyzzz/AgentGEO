_12" data-dcnode-id="2773"><strong data-dcnode-id="2774"><em data-dcnode-id="2775"><span data-dcnode-id="2776" instrument_node="">famous volcanoes</span></em></strong></span><span data-dcnode-id="2772" instrument_node="">, and the most exciting outdoor activities. Finish your vacation in </span><span class="P_Ora_Arial_12" data-dcnode-id="2768"><strong data-dcnode-id="2769"><em data-dcnode-id="2770"><span data-dcnode-id="2771" instrument_node="">Hilo</span></em></strong></span><span data-dcnode-id="2767" instrument_node="">, a place that is blessed with </span><span class="P_Gry_Arial_12" data-dcnode-id="2763"><strong data-dcnode-id="2764"><em data-dcnode-id="2765"><span data-dcnode-id="2766" instrument_node="">dramatic waterfalls, fertile rainforests and blooming gardens</span></em></strong></span><span data-dcnode-id="2762" instrument_node="">.</span></span></p><span data-dcnode-id="2759" instrument_node="">

                                    Enjoy not only a relaxing and soothing experience at a gorgeous beach, but also have a taste of adventure while visiting an impressive active volcano in </span><strong data-dcnode-id="2618"><span data-dcnode-id="2619" instrument_node="">Hawaii</span></strong><span data-dcnode-id="2617" instrument_node="">. Driving your way around and visit: </span><strong data-dcnode-id="2615"><span data-dcnode-id="2616" instrument_node="">Kona</span></strong><span data-dcnode-id="2614" instrument_node=""> district and be amazed by its </span><strong data-dcnode-id="2612"><span data-dcnode-id="2613" instrument_node="">out-of-this-world beaches and sunsets</span></strong><span data-dcnode-id="2611" instrument_node="">, that will make you drop you jaw. The weather on this side of the island is almost always dry and sunny and there are </span><strong data-dcnode-id="2609"><span data-dcnode-id="2610" instrument_node="">many white sand beaches that are perfect for sunbathing, snorkeling and swimming</span></strong><span data-dcnode-id="2608" instrument_node="">). After that, </span><strong data-dcnode-id="2606"><span data-dcnode-id="2607" instrument_node="">Hilo</span></strong><span data-dcnode-id="2605" instrument_node=""> district, a place that is blessed with </span><strong data-dcnode-id="2603"><span data-dcnode-id="2604" instrument_node="">dramatic waterfalls, fertile rainforests and blooming gardens</span></strong><span data-dcnode-id="2602" instrument_node="">. </span><b data-dcnode-id="2600"><span data-dcnode-id="2601" instrument_node="">This is a flexible vacation package. Select your number of nights in each city, desired hotel and activities.</span></b><br data-dcnode-id="2599"><span data-dcnode-id="2598" instrument_node="">

</span><p class="descriptionBest" data-dcnode-id="2209"><span data-dcnode-id="2210" instrument_node="">The expansive and varied terrain of Australia is filled The expansive and varied terrain of Australia is filled with a variety of locations including the sprawling Outback, gorgeous beaches like Bondi, the arid Red Center desert, mega-metropolis cities such as Sydney, Melbourne, and Perth and the mesmerizing Great Barrier Reef. Summer begins in Australia when it`s wintertime in Europe making it a popular holiday destination to absorb the sand, sun, and sea. There are many famous locations, sights, and attractions spread throughout Australia including natural wonders, famous landmarks, unusual animals, and wineries. Aboriginal culture is a huge part of Australia`s past and present with guided walks through the massive Mossman Gorge with indigenous guides and Aboriginal rock art found in the fascinating Ulur.</span></p><span data-dcnode-id="2208" instrument_node="">

</span><p class="descriptionBest" data-dcnode-id="2189"><span data-dcnode-id="2190" instrument_node="">Japan is a fascinating country known for its traditional arts and crafts including tea ceremonies held at charming tea houses. Beautiful traditional Japanese Gardens can be found all over Japan including Kenroku-en in Kanazawa boasting well-manicured lawns, zen gardens, rock gardens, and koi ponds. The country is the host of a variety of vibrant festivals including Kyoto`s famous, traditional summer festival Gion Matsuri. The country is known for producing and consuming the highest quality of Sushi in the world, drinking sake, and spending evenings in traditional izakayas.</span></p><span data-dcnode-id="2188" instrument_node="">

</span><p class="descriptionBest" data-dcnode-id="2169"><span data-dcnode-id="2170" instrument_node="">New Zealand is famous the world over for its stunning scenery, ranging from jagged mountains to vast underground cave systems, enormous glaciers to boiling hot springs, scenic beaches to rocky coastline. It`s also packed with amazing cities, hidden nooks and crannies, magnificent wildlife, and much more. Split into two islands, North and South, these islands form a unique bioregion inhabited by flightless birds seen nowhere else, such as kakapo and kiwi. New Zealanders have adopted the kiwi as a national symbol, and have even taken the word kiwi as a name for themselves.</span></p><span data-dcnode-id="2168" instrument_node="">

</span><p class="descriptionBest" data-dcnode-id="2149"><span data-dcnode-id="2150" instrument_node="">Guam is a beautiful little 30-mile-long island in the North Pacific, around one third of the way between the Philippines and Hawaii, that is part of the U.S.A. as an unincorporated territory. It sits almost 1,500 miles south of Japan and around 2,100 miles from North Korea. It is the lower-most island of the Mariana Islands archipelago, the northern portion of which is the Commonwealth of the Northern Mariana Islands, another U.S. Protectorate.</span></p><span data-dcnode-id="2148" instrument_node="">

                                    Spend your vacation in the most magnificent cities of the beautiful island of </span><strong data-dcnode-id="2097"><span data-dcnode-id="2098" instrument_node="">Hawaii</span></strong><span data-dcnode-id="2096" instrument_node="">. Start your trip in the marvelous </span><strong data-dcnode-id="2094"><span data-dcnode-id="2095" instrument_node="">Kona</span></strong><span data-dcnode-id="2093" instrument_node=""> district and be amazed by its </span><strong data-dcnode-id="2091"><span data-dcnode-id="2092" instrument_node="">out-of-this-world beaches and sunsets</span></strong><span data-dcnode-id="2090" instrument_node="">, that will make you drop you jaw. The weather on this side of the island is almost always dry and sunny and there are </span><strong data-dcnode-id="2088"><span data-dcnode-id="2089" instrument_node="">many white sand beaches that are perfect for sunbathing, snorkeling and swimming</span></strong><span data-dcnode-id="2087" instrument_node="">). After that, drive to </span><strong data-dcnode-id="2085"><span data-dcnode-id="2086" instrument_node="">Hilo</span></strong><span data-dcnode-id="2084" instrument_node=""> district, a place that is blessed with </span><strong data-dcnode-id="2082"><span data-dcnode-id="2083" instrument_node="">dramatic waterfalls, fertile rainforests and blooming gardens</span></strong><span data-dcnode-id="2081" instrument_node="">. </span><b data-dcnode-id="2079"><span data-dcnode-id="2080" instrument_node="">This is a flexible vacation package. Select your number of nights in each city, desired hotel and activities.</span></b><span data-dcnode-id="2078" instrument_node="">

                            </span></li><span data-dcnode-id="1102" instrument_node="">
</span><li data-dcnode-id="1090" id="dv3888" style="display:none; border:1px solid black; padding:5px; background-color:#FFF; width:300px; position:absolute; z-index:100;"><span data-dcnode-id="1101" instrument_node="">
</span><div class="Text_12_Gray" data-dcnode-id="1098" style="padding:3px 10px"><span data-dcnode-id="1099" onclick="dvCloseMain('dv@Model.leftCountryCityList[cy].STR_PlaceID')" style="cursor:pointer"><span data-dcnode-id="1100" instrument_node="">close X</span></span></div><span data-dcnode-id="1097" instrument_node="">
</span><div class="Text_Arial11_BlueBold" data-dcnode-id="1095" style="padding: 3px 10px 3px 10px"><span data-dcnode-id="1096" instrument_node="">Oahu - Honolulu</span></div><span data-dcnode-id="1094" instrument_node="">
</span><div data-dcnode-id="1092" style="padding:10px"><span data-dcnode-id="1093" instrument_node="">&lt;strong&gt;Oahu`s&lt;/strong&gt; Waikiki put Hawaii on the map, with over 5 million visitors annually. Oahu features over 130 pristine, secluded tropical beaches including the famous Waikiki Beach. Waimea Bay has a dramatic beach with powerful waves in the winter and glassy water in the summer; Kailua is a local favorite for family fun on the weekends; Kahana Bay Beach Park is known for water sports and swimming; Malaekahana is a romantic, secluded beach; Sunset Beach is great for surfers; Lanikai is hidden and off the beaten tourist path beach; Pokai Bay harbors a powdered-sugar beach, off the beaten path. The surrounding landscapes are filled with lush greenery, mountains and waterfalls with Historic landmarks such as Iolani Palace to the memorials of Pearl Harbor to world class shopping and sightseeing! The magnificent island has an endless supply of activities and scenic beauty. &lt;br /&gt;
&lt;br /&gt;
&lt;br /&gt;
&lt;span class="P_Ora_Arial_12"&gt;&lt;strong&gt;Recommended Stay:&lt;/strong&gt;&lt;span class="P_Ora_Arial_12"&gt; &lt;/span&gt;&lt;/span&gt;At least 3 nights&lt;br /&gt;
&lt;span class="P_Blu_Arial_12"&gt;&lt;strong&gt;Must See`s:&lt;/strong&gt;&lt;/span&gt; &lt;br /&gt;
Pearl Harbor, Iolani Palace, King Kamehameha statue, Bishop Museum, Diamond Head Summit, Aloha Tower, Hanauma Bay Nature Preserve, Waikiki Beach, Lanikai Beach and so much more!&lt;br /&gt;</span></div><span data-dcnode-id="1091" instrument_node="">
</span></li><span data-dcnode-id="1089" instrument_node="">
</span><li class="listCities" data-dcnode-id="1084"><span data-dcnode-id="1088" instrument_node="">
</span><a data-dcnode-id="1086" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nytrng.com/asia/kauai/vacations"><span data-dcnode-id="1087" instrument_node="">Kauai</span></a><span data-dcnode-id="1085" instrument_node="">&nbsp;&nbsp;

                            </span></li><span data-dcnode-id="1083" instrument_node="">
</span><li data-dcnode-id="1071" id="dv3892" style="display:none; border:1px solid black; padding:5px; background-color:#FFF; width:300px; position:absolute; z-index:100;"><span data-dcnode-id="1082" instrument_node="">
</span><div class="Text_12_Gray" data-dcnode-id="1079" style="padding:3px 10px"><span data-dcnode-id="1080" onclick="dvCloseMain('dv@Model.leftCountryCityList[cy].STR_PlaceID')" style="cursor:pointer"><span data-dcnode-id="1081" instrument_node="">close X</span></span></div><span data-dcnode-id="1078" instrument_node="">
</span><div class="Text_Arial11_BlueBold" data-dcnode-id="1076" style="padding: 3px 10px 3px 10px"><span data-dcnode-id="1077" instrument_node="">Kauai</span></div><span data-dcnode-id="1075" instrument_node="">
</span><div data-dcnode-id="1073" style="padding:10px"><span data-dcnode-id="1074" instrument_node="">&lt;strong&gt;Kauai&lt;/strong&gt; the Garden Island is a lush paradise full of natural beauty and adventure set on a dramatic coastline. A remote destination and the westernmost of the Hawaiian Islands with the soaring cliffs of the Napali Coast to the vast charms of Waimea Canyon, plunging ravines, cascading waterfalls, beaches, and bays. The island offers so much to be discovered with hiking and kayaking amongst the most popular activities. A pristine paradise with a small town charm this island enchants the senses like no other.&lt;br /&gt;
&lt;br /&gt;
&lt;br /&gt;
&lt;span class="P_Ora_Arial_12"&gt;&lt;strong&gt;Recommended Stay:&lt;/strong&gt;&lt;span class="P_Ora_Arial_12"&gt; &lt;/span&gt;&lt;/span&gt;At least 3 nights&lt;br /&gt;
&lt;span class="P_Blu_Arial_12"&gt;&lt;strong&gt;Must See`s:&lt;/strong&gt;&lt;/span&gt; &lt;br /&gt;
Napali Coast, Waimea Canyon, Waileau River, Waileau Falls, Kee Beach, Hanalei Bay, Kalalau Trail, Spouting Horn, Coconut Coast and so much more!&lt;br /&gt;</span></div><span data-dcnode-id="1072" instrument_node="">
