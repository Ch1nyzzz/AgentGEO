dcnode-id="1027"><ol data-dcnode-id="1028" itemscope="" itemtype="http://schema.org/BreadcrumbList"><li class="font-semibold inline" data-dcnode-id="1041" data-testid="breadcrumb" itemprop="itemListElement" itemscope="" itemtype="http://schema.org/ListItem"><a aria-hidden="true" class="link-underline transition-colors ease-out cursor-pointer text-black hover:text-blue" data-dcnode-id="1045" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lonelyplanet.com/north-america" id="north-america" itemprop="item"><span data-dcnode-id="1046" itemprop="name"><span data-dcnode-id="1047" instrument_node="">North America</span></span></a><meta content="1" data-dcnode-id="1044" itemprop="position"><span aria-hidden="true" class="px-2" data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">/</span></span></li><li class="font-semibold inline" data-dcnode-id="1034" data-testid="breadcrumb" itemprop="itemListElement" itemscope="" itemtype="http://schema.org/ListItem"><a aria-hidden="true" class="link-underline transition-colors ease-out cursor-pointer text-black hover:text-blue" data-dcnode-id="1038" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lonelyplanet.com/usa" id="usa" itemprop="item"><span data-dcnode-id="1039" itemprop="name"><span data-dcnode-id="1040" instrument_node="">USA</span></span></a><meta content="2" data-dcnode-id="1037" itemprop="position"><span aria-hidden="true" class="px-2" data-dcnode-id="1035"><span data-dcnode-id="1036" instrument_node="">/</span></span></li><li class="font-semibold inline" data-dcnode-id="1029" data-testid="breadcrumb" itemprop="itemListElement" itemscope="" itemtype="http://schema.org/ListItem"><a aria-hidden="true" class="link-underline transition-colors ease-out cursor-pointer text-black hover:text-blue" data-dcnode-id="1031" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lonelyplanet.com/usa/hawaii" id="usa/hawaii" itemprop="item"><span data-dcnode-id="1032" itemprop="name"><span data-dcnode-id="1033" instrument_node="">Hawaii</span></span></a><meta content="3" data-dcnode-id="1030" itemprop="position"></li></ol></nav><h1 class="text-3xl font-display md:text-6xl leading-tighter font-semibold font-bold text-blue mb-6 lg:mb-8" data-dcnode-id="1025"><span data-dcnode-id="1026" instrument_node="">Hawaiʻi the Big Island</span></h1><div class="ad_Ad__6Fiho hidden inline-flex" data-dcnode-id="1022"><div data-dcnode-id="1023"><div class="gpt_min-h-1__rx3X1" data-dcnode-id="1024" id="GPT-0"></div></div></div><section class="text-black-400" data-dcnode-id="991" id="introduction"><div class="readMore_content___5EuR relative overflow-hidden max-h-96 is-max wysiwyg" data-dcnode-id="997"><p data-dcnode-id="1020"><span data-dcnode-id="1021" instrument_node="">Indulge your spirit of adventure on the biggest Hawaiian island. It's still a vast frontier, full of unexpected wonders.</span></p><h2 data-dcnode-id="1018"><span data-dcnode-id="1019" instrument_node="">Island Diversity</span></h2><p data-dcnode-id="1016"><span data-dcnode-id="1017" instrument_node="">We doubt that it's possible to get 'island fever' on Hawaiʻi. The aptly named Big Island is fantastically diverse, with miles of highways – and, better yet, byways – to explore. Eight of the world’s 13 climate zones exist here, adding sensory variety as you circumnavigate the island. Gaze at vivid emerald cliffs, swaths of black-, white- and even green-sand beaches, majestic volcanic mountains (possibly snowcapped!), stark lava desert, rolling pastureland and misty valleys, weathered by rain, waves and time. Hawaiʻi is twice as big as the other Hawaiian Islands combined, and its dramatic terrain is ever fascinating.</span></p><h2 data-dcnode-id="1014"><span data-dcnode-id="1015" instrument_node="">Volcanic Wonders</span></h2><p data-dcnode-id="1012"><span data-dcnode-id="1013" instrument_node="">Less than a million years old, Hawaiʻi is a baby in geological terms. Here you'll find the Hawaiian Islands' tallest, largest and only active volcanic mountains. Kilauea, on the eastern side, is the world's most active volcano, spewing molten lava continuously since 1983. If you see glowing, red-hot lava, you are witnessing Earth in the making, a thrilling and humbling experience. At 33,000ft tall when measured from the ocean floor, Mauna Kea is the world's tallest mountain, and its significance cannot be overstated – as a sacred place to Hawaiians and a top astronomical site to scientists.</span></p><h2 data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">Ancient History &amp; Modern Multiculturalism</span></h2><p data-dcnode-id="1005"><span data-dcnode-id="1009" instrument_node="">Ancient history looms large on Hawaiʻi, a place of powerful mana (spiritual essence). The first Polynesians landed at Ka Lae, the windswept southern tip, still raw and undeveloped today. Kamehameha the Great, who unified the Hawaiian Islands, was born in Kohala and died in Kailua-Kona. Hula and </span><em data-dcnode-id="1007"><span data-dcnode-id="1008" instrument_node="">oli</span></em><span data-dcnode-id="1006" instrument_node=""> (chant) are deep-rooted here, and Miloli‘i on the Kona Coast is perhaps the last Hawaiian fishing village. During the sugarcane era, traditional ways became intertwined with those of immigrant cultures: Chinese, Japanese, Filipino, Portuguese and more. This legacy is palpable in the mix of languages, foods and festivals. The most striking element of this multiculturalism is the pidgin vernacular.</span></p><h2 data-dcnode-id="1003"><span data-dcnode-id="1004" instrument_node="">Roads Less Traveled</span></h2><p data-dcnode-id="998"><span data-dcnode-id="1002" instrument_node="">Thanks to its sheer size, Hawaiʻi has lots of legroom. Enjoy the delicious freedom of the open road, where the journey becomes the main attraction. From east to west, the island has multiple personalities, and it's worthwhile experiencing them all. While the 'Gold Coast' – South Kohala to Kailua-Kona – caters to travelers en masse, most island towns are rural and exist primarily for residents. Even the capital seat, Hilo, is a former plantation town that's still slow-paced and populated by </span><em data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node="">kamaʻaina</span></em><span data-dcnode-id="999" instrument_node=""> (people born and raised here). Ultimately this down-home localness marks the real Hawai‘i. Don't miss it.</span></p></div><button class="text-blue font-semibold mt-2" data-dcnode-id="992" type="button"><span data-dcnode-id="996" instrument_node="">Read </span><span data-dcnode-id="995" instrument_node="">more</span><svg aria-hidden="true" class="inline-block ml-2 text-xs" data-dcnode-id="993" fill="currentColor" height="1em" viewBox="0 0 10 7" width="1em" xmlns="http://www.w3.org/2000/svg"><path d="M1 0.436401L5 4.37175L9 0.436401L10 1.42024L5 6.4624L8.68036e-07 1.42024L1 0.436401Z" data-dcnode-id="994"></path></svg></button></section></div><div class="h-16 mt-16 lg:h-20 hidden" data-dcnode-id="989"></div><nav class="tableOfContents_nav__ta01h lg:pt-6 lg:py-6 mt-16 sticky-nav" data-dcnode-id="965" id="table-of-contents"><p class="relative text-sm lg:text-lg px-4 lg:px-0 py-4 lg:pt-0 flex items-center justify-between border-t border-b border-black-200 lg:border-0 lg:pt-0" data-dcnode-id="980"><span class="hidden lg:block text-xs xl:text-base" data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">Jump to:</span></span><span class="lg:hidden" data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">Table of contents</span></span><button class="tableOfContents_btn-toc__EQp9t flex lg:hidden text-2xl text-black-300" data-dcnode-id="981" type="button"><svg aria-hidden="true" class="" data-dcnode-id="982" fill="currentColor" height="1em" viewBox="0 0 32 32" width="1em" xmlns="http://www.w3.org/2000/svg"><path d="M16 31C18.9667 31 21.866 -5 md:py-4 text-left font-semibold focus:outline-none border border-transparent bg-white border-black-200 rounded-pill" data-dcnode-id="946" type="button"><p class="leading-none" data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">Top Attractions</span></p><svg aria-hidden="true" class="text-xs ml-4 text-blue text-blue" data-dcnode-id="947" fill="currentColor" height="1em" viewBox="0 0 11 6" width="1em" xmlns="http://www.w3.org/2000/svg"><path d="M5.60504 5.5L0 0H11.2101L5.60504 5.5Z" data-dcnode-id="948"></path></svg></button><ul class="absolute w-full bg-white shadow-lg border border-t-0 border-black-100 rounded-br-lg rounded-bl-lg py-2 hidden" data-dcnode-id="936"><li class="mx-1 md:mx-3" data-dcnode-id="943"><button class="w-full rounded hover:bg-black-100 p-3 my-2 hover:font-semibold text-left" data-dcnode-id="944" type="button"><span data-dcnode-id="945" instrument_node="">Top Restaurants</span></button></li><li class="mx-1 md:mx-3" data-dcnode-id="940"><button class="w-full rounded hover:bg-black-100 p-3 my-2 hover:font-semibold text-left" data-dcnode-id="941" type="button"><span data-dcnode-id="942" instrument_node="">Top Entertainment</span></button></li><li class="mx-1 md:mx-3" data-dcnode-id="937"><button class="w-full rounded hover:bg-black-100 p-3 my-2 hover:font-semibold text-left" data-dcnode-id="938" type="button"><span data-dcnode-id="939" instrument_node="">Top Shopping</span></button></li></ul></div></div><a aria-hidden="true" class="btn md:hidden px-4 py-2 ml-2 flex-none rounded-lg shadow border border-black-100 bg-white font-semibold" data-dcnode-id="932" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lonelyplanet.com/usa/hawaii/hawaii-the-big-island/attractions"><span data-dcnode-id="933" instrument_node="">Show all</span></a></div><hr class="hidden md:block mr-5 my-6 text-black-100" data-dcnode-id="930"><div class="relative" data-dcnode-id="818"><ul class="relative hidden md:block overflow-y-scroll overflow-x-hidden pr-5 pl-2 -ml-2" data-dcnode-id="820" style="max-height: 660px; min-height: 660px;"><li class="pb-4" data-dcnode-id="919"><article class="flex rounded h-full bg-white md:p-4 cursor-pointer hover:shadow-lg md:p-2 shadow-lg" data-dcnode-id="920"><div class="flex-none w-1/4 mr-4 md:mr-6 rounded-r-none md:rounded-r rounded-l overflow-hidden" data-dcnode-id="927"><div class="h-full" data-dcnode-id="928"><div class="h-full h-full" data-dcnode-id="929" style="background-image: url(&quot;https://lp-cms-production.imgix.net/2021-04/shutterstockRF_126504242.jpg?fit=crop&amp;q=40&amp;auto=format&amp;w=100&amp;h=100&amp;dpr=1&quot;); background-size: cover;"></div></div></div><div class="p-4 md:p-0" data-dcnode-id="921"><p class="text-sm uppercase font-semibold tracking-wide mt-4 z-10 text-black-400 text-black-400" data-dcnode-id="926"></p><a class="text-sm md:text-xl font-semibold text-link line-clamp-1" data-dcnode-id="924" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lonelyplanet.com/pois/1558941"><span data-dcnode-id="925" instrument_node="">Kilauea</span></a><p class="line-clamp-2 md:line-clamp-3 text-black-400" data-dcnode-id="922"><span data-dcnode-id="923" instrument_node="">Kilauea volcano lies at the center of activity in Hawaiʻi Volcanoes National Park. The unassuming bump on Mauna Loa's southeast flank would be easily overlooked if not for its massive steaming crater and crater-within-a-crater, Halemaʻumaʻu, which has spewed lava nearly continuously over the last 25 years.

Researchers initially thought Kilauea was just a vent of Mauna Loa, but later discovered a separate lava system – a particularly active system that first broke the earth's surface as early as 600,000 years ago. How active Kilauea Volcano will be when you visit is subject to the whims of Pele, the Hawaiian goddess of fire and volcanoes who makes her home here, so set expectations low, and hope to be pleasantly surprised.

Is Kilauea currently erupting?

The most active of the five volcanoes that make up the Big Island of Hawaiʻi, Kilauea's calendar is usually hot stuff. Chances are good that visitors to Halemaʻumaʻu will get a sight (and smell) of some of the action. In 2018, a months-long eruption went out with a bang when the volcano's caldera collapsed/exploded, shooting a plume of ash 30,000ft high. Recent activity restarted in December 20, 2020, but it's decidedly less pyrotechnic. The USGS posts daily reports on Kilauea's activity.

Is Kilauea safe to visit?

Even though Kilauea is one of the world's most active volcanoes, it's very safe to visit. The eruption in 2018 caused property damage and just over two dozen injuries, but no fatalities were reported.

If Halemaʻumaʻu and Puʻu ʻOʻo are erupting, they belch thousands of tons of the gas daily. When lava meets the sea it creates a "steam plume," as sulfuric and hydrochloric acid mixes with airborne silica (or glass particles). All this combines to create vog, which, depending on the winds, can settle over the park. People with respiratory and heart conditions, pregnant women, infants and young children should take care when visiting if an eruption is taking place. Follow hawaiiso2network.com for air quality reports.

History

On March 19, 2008, Halemaʻumaʻu Crater shattered a quarter-century of silence with a huge steam-driven explosion that scattered rocks and Pele's hair (strands of volcanic glass) over 75 acres. A series of explosions followed, widening a 300ft vent in the crater floor which has continued to spew a column of gas and ash across the Kaʻu desert. At time of research, the vent had filled with a lake of bubbling molten lava that occasionally overflows into Kilauea Caldera before receding again – like a slow heart-beat of Kilauea. If you are lucky, Pele may be in a rare mood, sending spatter and rocks shooting up to the now-closed section of Crater Rim Drive.

In 1823, missionary William Ellis first described the boiling goblet of Halemaʻumaʻu to a wide audience, and his fantastic account attracted travelers from all over the world. Looking in, some saw the fires of hell, others primeval creation, but none left the crater unmoved. Mark Twain wrote in 1866 that he witnessed: "[C]ircles and serpents and streaks of lightning all twined and wreathed and tied together…I have seen Vesuvius since, but it was a mere toy, a child's volcano, a soup kettle, compared to this."

Then, in 1924, the crater floor subsided rapidly, touching off a series of explosive eruptions. Boulders and mud rained for days. When it was over, the crater had doubled in size – to about 300ft deep and 3000ft wide. Lava activity ceased and the crust cooled. But not for long. Since then, Halemaʻumaʻu has erupted 18 times, making it the most active area on Kilauea's summit.

All of Hawaiʻi is the territory of Pele, goddess of fire and volcanoes, but Halemaʻumaʻu is her home, making it a sacred site for Hawaiians.

How to see Kilauea

The best spots to see the latest eruption are from, Kilauea Overlook, Steam Vents &amp; Steaming Bluff and overlooks along Crater Rim Trail. Viewpoints can get crowded, so arrive early. All fall within the boundaries of Hawaiʻi Volcanoes National Park, which charges a $30 fee per car for a 7-day pass.</span></p></div></article></li><li class="pb-4" data-dcnode-id="908"><article class="flex rounded h-full bg-white md:p-4 cursor-pointer hover:shadow-lg md:p-2" data-dcnode-id="909"><div class="flex-none w-1/4 mr-4 md:mr-6 rounded-r-none md:rounded-r rounded-l overflow-hidden" data-dcnode-id="916"><div class="h-full" data-dcnode-id="917"><div class="h-full h-full" data-dcnode-id="918" style="background-image: url(&quot;https://lp-cms-production.imgix.net/2021-02/GettyImages-941591028.jpg?fit=crop&amp;q=40&amp;auto=format&amp;w=100&amp;h=100&amp;dpr=1&quot;); background-size: cover;"></div></div></div><div class="p-4 md:p-0" data-dcnode-id="910"><p class="text-sm uppercase font-semibold tracking-wide mt-4 z-10 text-black-400 text-black-400" data-dcnode-id="915"></p><a class="text-sm md:text-xl font-semibold text-link line-clamp-1" data-dcnode-id="913" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lonelyplanet.com/pois/1302075"><span data-dcnode-id="914" instrument_node="">Green Sand Beach</span></a><p class="line-clamp-2 md:line-clamp-3 text-black-400" data-dcnode-id="911"><span data-dcnode-id="912" instrument_node="">This legendary beach on Mahana Bay isn't really that green, but it is a rare and beautiful sight. Its color comes from crystals of olivine, the mineral found in the semiprecious gemstone known as peridot. Olivine is created in high-heat environments – like during the formation of stars or volcanic eruptions. This batch comes from the latter, and is what's left behind as waves erode the littoral cone looming above the cove. Swimming is only advisable on the very few exceptionally calm days.

How to get to Green Sand Beach

To get here take the left (east) fork of South Point Rd some 10 miles from Hwy 11 to the old barracks. Park here (don't leave any valuables in your car) and hike the dusty, windy, hot 2.5 miles to Mahana Bay. Start by heading south to the Kaulana boat ramp then veer left (east) following the coastline. The unceasing winds will sandblast your face the entire way making the trip feel twice as far as it is. Bring lots of water.

Walking is free and has less impact on the local environment, but you can also get there by bouncing along in the back of one of the dilapidated 4WD pickups that usually cluster at the barracks offering rides for cash.

Whether you arrive on foot or off-road vehicle, you'll have to scramble down the cliff to the beach, which is becoming a major tourist attraction despite the difficult access. Go early, late or when it's overcast to beat the crowds.</span></p></div></article></li><li class="pb-4" data-dcnode-id="897"><article class="flex rounded h-full bg-white md:p-4 cursor-pointer hover:shadow-lg md:p-2" data-dcnode-id="898"><div class="flex-none w-1/4 mr-4 md:mr-6 rounded-r-none md:rounded-r rounded-l overflow-hidden" data-dcnode-id="905"><div class="h-full" data-dcnode-id="906"><div class="h-full h-full" data-dcnode-id="907" style="background-image: url(&quot;https://lp-cms-production.imgix.net/2019-06/527525399_super.jpg?fit=crop&amp;q=40&amp;auto=format&amp;w=100&amp;h=100&amp;dpr=1&quot;); background-size: cover;"></div></div></div><div class="p-4 md:p-0" data-dcnode-id="899"><p class="text-sm uppercase font-semibold tracking-wide mt-4 z-10 text-black-400 text-black-400" data-dcnode-id="904"></p><a class="text-sm md:text-xl font-semibold text-link line-clamp-1" data-dcnode-id="902" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lonelyplanet.com/pois/1302273"><span data-dcnode-id="903" instrument_node="">Makalawena Beach</span></a><p class="line-clamp-2 md:line-clamp-3 text-black-400" data-dcnode-id="900"><span data-dcnode-id="901" instrument_node="">If what you're after is an almost deserted, postcard-perfect scoop of soft, white-sand beach cupping brilliant blue-green waters, head to 'Maks.' Although popular, this string of idyllic coves absorbs crowds so well you'll still feel like you've found paradise. The northernmost cove is sandier and gentler, while the southernmost cove is (illegally) a naked sunbathing spot. Swimming is splendid, but beware of rough surf and rocks in the water. Bodyboarding and snorkeling are other possibilities.</span></p></div></article></li><li class="pb-4" data-dcnode-id="886"><article class="flex rounded h-full bg-white md:p-4 cursor-pointer hover:shadow-lg md:p-2" data-dcnode-id="887"><div class="flex-none w-1/4 mr-4 md:mr-6 rounded-r-none md:rounded-r rounded-l overflow-hidden" data-dcnode-id="894"><div class="h-full" data-dcnode-id="895"><div class="h-full h-full" data-dcnode-id="896" style="background-image: url(&quot;https://lp-cms-production.imgix.net/2019-06/5f62d732afaa8918d4cda98453bf644f-hawai-i-volcanoes-national-park.jpg?fit=crop&amp;q=40&amp;auto=format&amp;w=100&amp;h=100&amp;dpr=1&quot;); background-size: cover;"></div></div></div><div class="p-4 md:p-0" data-dcnode-id="888"><p class="text-sm uppercase font-semibold tracking-wide mt-4 z-10 text-black-400 text-black-400" data-dcnode-id="893"></p><a class="text-sm md:text-xl font-semibold text-link line-clamp-1" data-dcnode-id="891" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lonelyplanet.com/pois/1253347"><span data-dcnode-id="892" instrument_node="">Hawaiʻi Volcanoes National Park</span></a><p class="line-clamp-2 md:line-clamp-3 text-black-400" data-dcnode-id="889"><span data-dcnode-id="890" instrument_node="">Even among Hawaii's many wonders, this national park stands out. Its two active volcanoes testify to the ongoing birth of the islands: quiet Mauna Loa (13,678ft) sprawling above, its unassuming mass downplaying its height, and young Kilauea (4091ft), one of the world's most active volcanoes, providing near-continual sources of awe. The park was closed for several months during the 2018 lower Puna eruption, after which all active lava flows ceased.</span></p></div></article></li><li class="pb-4" data-dcnode-id="873"><article class="flex rounded h-full bg-white md:p-4 cursor-pointer hover:shadow-lg md:p-2" data-dcnode-id="874"><div class="flex-none w-1/4 mr-4 md:mr-6 rounded-r-none md:rounded-r rounded-l overflow-hidden" data-dcnode-id="881"><div class="flex justify-center items-center h-full bg-black-100" data-dcnode-id="882"><svg aria-hidden="true" class="text-2xl te greatest collection of telescopes on earth. You can practically feel the knowledge being sucked out of the sky.</span></p></div></article></li><li class="pb-4" data-dcnode-id="860"><article class="flex rounded h-full bg-white md:p-4 cursor-pointer hover:shadow-lg md:p-2" data-dcnode-id="861"><div class="flex-none w-1/4 mr-4 md:mr-6 rounded-r-none md:rounded-r rounded-l overflow-hidden" data-dcnode-id="868"><div class="flex justify-center items-center h-full bg-black-100" data-dcnode-id="869"><svg aria-hidden="true" class="text-2xl text-black-200" data-dcnode-id="870" fill="currentColor" height="1em" viewBox="0 0 32 32" width="1em" xmlns="http://www.w3.org/2000/svg"><path d="M32 1.616L30.384 0L0 30.384L1.616 32L3.90171 29.7143H27.4286C28.0345 29.7134 28.6154 29.4723 29.0438 29.0438C29.4723 28.6154 29.7134 28.0345 29.7143 27.4286V3.90171L32 1.616ZM27.4286 27.4286H6.18743L15.0937 18.5223L17.8126 21.2411C18.2412 21.6696 18.8225 21.9104 19.4286 21.9104C20.0347 21.9104 20.6159 21.6696 21.0446 21.2411L22.8571 19.4286L27.4286 23.9966V27.4286ZM27.4286 20.7634L24.4731 17.808C24.0445 17.3795 23.4632 17.1388 22.8571 17.1388C22.2511 17.1388 21.6698 17.3795 21.2411 17.808L19.4286 19.6206L16.712 16.904L27.4286 6.18743V20.7634Z" data-dcnode-id="872"></path><path d="M4.78621 23.3846V19.8974L10.5982 14.089L12.1941 15.6861L13.8401 14.0401L12.2418 12.4419C11.8058 12.006 11.2146 11.7612 10.5982 11.7612C9.98173 11.7612 9.39052 12.006 8.95455 12.4419L4.78621 16.6102V4.78633H23.3845V2.46155H4.78621C4.16983 2.46216 3.57887 2.70729 3.14302 3.14314C2.70717 3.57899 2.46204 4.16995 2.46143 4.78633V23.3846H4.78621Z" data-dcnode-id="871"></path></svg></div></div><div class="p-4 md:p-0" data-dcnode-id="862"><p class="text-sm uppercase font-semibold tracking-wide mt-4 z-10 text-black-400 text-black-400" data-dcnode-id="867"></p><a class="text-sm md:text-xl font-semibold text-link line-clamp-1" data-dcnode-id="865" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lonelyplanet.com/pois/454321"><span data-dcnode-id="866" instrument_node="">Kua Bay</span></a><p class="line-clamp-2 md:line-clamp-3 text-black-400" data-dcnode-id="863"><span data-dcnode-id="864" instrument_node="">This sublime crescent-shaped white-sand beach is fronted by sparkling waters in alternating bands of pale cyan, deeper turquoise, and rich blue. Kua Bay offers first-rate swimming and excellent bodyboarding. There's good snorkeling by the large rock outcroppings on the north side of the bay when waters are calm. A paved road leads right up to it, and thus the beach draws major crowds, especially on weekends. Arrive late and cars will be parked half a mile up the road.</span></p></div></article></li><li class="pb-4" data-dcnode-id="847"><article class="flex rounded h-full bg-white md:p-4 cursor-pointer hover:shadow-lg md:p-2" data-dcnode-id="848"><div class="flex-none w-1/4 mr-4 md:mr-6 rounded-r-none md:rounded-r rounded-l overflow-hidden" data-dcnode-id="855"><div class="flex justify-center items-center h-full bg-black-100" data-dcnode-id="856"><svg aria-hidden="true" class="text-2xl text-black-200" data-dcnode-id="857" fill="currentColor" height="1em" viewBox="0 0 32 32" width="1em" xmlns="http://www.w3.org/2000/svg"><path d="M32 1.616L30.384 0L0 30.384L1.616 32L3.90171 29.7143H27.4286C28.0345 29.7134 28.6154 29.4723 29.0438 29.0438C29.4723 28.6154 29.7134 28.0345 29.7143 27.4286V3.90171L32 1.616ZM27.4286 27.4286H6.18743L15.0937 18.5223L17.8126 21.2411C18.2412 21.6696 18.8225 21.9104 19.4286 21.9104C20.0347 21.9104 20.6159 21.6696 21.0446 21.2411L22.8571 19.4286L27.4286 23.9966V27.4286ZM27.4286 20.7634L24.4731 17.808C24.0445 17.3795 23.4632 17.1388 22.8571 17.1388C22.2511 17.1388 21.6698 17.3795 21.2411 17.808L19.4286 19.6206L16.712 16.904L27.4286 6.18743V20.7634Z" data-dcnode-id="859"></path><path d="M4.78621 23.3846V19.8974L10.5982 14.089L12.1941 15.6861L13.8401 14.0401L12.2418 12.4419C11.8058 12.006 11.2146 11.7612 10.5982 11.7612C9.98173 11.7612 9.39052 12.006 8.95455 12.4419L4.78621 16.6102V4.78633H23.3845V2.46155H4.78621C4.16983 2.46216 3.57887 2.70729 3.14302 3.14314C2.70717 3.57899 2.46204 4.16995 2.46143 4.78633V23.3846H4.78621Z" data-dcnode-id="858"></path></svg></div></div><div class="p-4 md:p-0" data-dcnode-id="849"><p class="text-sm uppercase font-semibold tracking-wide mt-4 z-10 text-black-400 text-black-400" data-dcnode-id="854"></p><a class="text-sm md:text-xl font-semibold text-link line-clamp-1" data-dcnode-id="852" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lonelyplanet.com/pois/1302634"><span data-dcnode-id="853" instrument_node="">Hapuna Beach State Recreation Area</span></a><p class="line-clamp-2 md:line-clamp-3 text-black-400" data-dcnode-id="850"><span data-dcnode-id="851" instrument_node="">Hapuna Beach is world famous for its magnificent half-mile sweep of white powder sand and fabulously clear waters. In summer, waves are calm and allow good swimming, snorkeling and diving. When the surf's up in winter, bodyboarding is awesome, thanks to reliable swells from the northwest. Lifeguards are on duty, but waves over 3ft should be left for the experts, as drownings do happen. Bring sunscreen because there's virtually no shade.</span></p></div></article></li><li class="pb-4" data-dcnode-id="834"><article class="flex rounded h-full bg-white md:p-4 cursor-pointer hover:shadow-lg md:p-2" data-dcnode-id="835"><div class="flex-none w-1/4 mr-4 md:mr-6 rounded-r-none md:rounded-r rounded-l overflow-hidden" data-dcnode-id="842"><div class="flex justify-center items-center h-full bg-black-100" data-dcnode-id="843"><svg aria-hidden="true" class="text-2xl text-black-200" data-dcnode-id="844" fill="currentColor" height="1em" viewBox="0 0 32 32" width="1em" xmlns="http://www.w3.org/2000/svg"><path d="M32 1.616L30.384 0L0 30.384L1.616 32L3.90171 29.7143H27.4286C28.0345 29.7134 28.6154 29.4723 29.0438 29.0438C29.4723 28.6154 29.7134 28.0345 29.7143 27.4286V3.90171L32 1.616ZM27.4286 27.4286H6.18743L15.0937 18.5223L17.8126 21.2411C18.2412 21.6696 18.8225 21.9104 19.4286 21.9104C20.0347 21.9104 20.6159 21.6696 21.0446 21.2411L22.8571 19.4286L27.4286 23.9966V27.4286ZM27.4286 20.7634L24.4731 17.808C24.0445 17.3795 23.4632 17.1388 22.8571 17.1388C22.2511 17.1388 21.6698 17.3795 21.2411 17.808L19.4286 19.6206L16.712 16.904L27.4286 6.18743V20.7634Z" data-dcnode-id="846"></path><path d="M4.78621 23.3846V19.8974L10.5982 14.089L12.1941 15.6861L13.8401 14.0401L12.2418 12.4419C11.8058 12.006 11.2146 11.7612 10.5982 11.7612C9.98173 11.7612 9.39052 12.006 8.95455 12.4419L4.78621 16.6102V4.78633H23.3845V2.46155H4.78621C4.16983 2.46216 3.57887 2.70729 3.14302 3.14314C2.70717 3.57899 2.46204 4.16995 2.46143 4.78633V23.3846H4.78621Z" data-dcnode-id="845"></path></svg></div></div><div class="p-4 md:p-0" data-dcnode-id="836"><p class="text-sm uppercase font-semibold tracking-wide mt-4 z-10 text-black-400 text-black-400" data-dcnode-id="841"></p><a class="text-sm md:text-xl font-semibold text-link line-clamp-1" data-dcnode-id="839" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lonelyplanet.com/pois/1128866"><span data-dcnode-id="840" instrument_node="">Puʻuhonua o Honaunau National Historical Park</span></a><p class="line-clamp-2 md:line-clamp-3 text-black-400" data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">This awesome park is an ancient place of refuge – or puʻuhonua, a sanctuary where kapu (taboo)-breakers could have their lives spared. A half-mile walking tour encompasses major sites – the visitor center provides a brochure map with cultural information. You enter the park in the village-like royal grounds, where Kona aliʻi (chiefs) and their warriors lived; the spiritual atmosphere is greatly enhanced by gently breaking waves and wind-rustled palms. Throughout the grounds are wooden kiʻi (deity images) standing up to 15ft high.</span></p></div></article></li><li class="pb-4" data-dcnode-id="821"><article class="flex rounded h-full bg-white md:p-4 cursor-pointer hover:shadow-lg md:p-2" data-dcnode-id="822"><div class="flex-none w-1/4 mr-4 md:mr-6 rounded-r-none md:rounded-r rounded-l overflow-hidden" data-dcnode-id="829"><div class="flex justify-center items-center h-full bg-black-100" data-dcnode-id="830"><svg aria-hidden="true" class="text-2xl text-black-200" data-dcnode-id="831" fill="currentColor" height="1em" viewBox="0 0 32 32" width="1em" xmlns="http://www.w3.org/2000/svg"><path d="M32 1.616L30.384 0L0 30.384L1.616 32L3.90171 29.7143H27.4286C28.0345 29.7134 28.6154 29.4723 29.0438 29.0438C29.4723 28.6154 29.7134 28.0345 29.7143 27.4286V3.90171L32 1.616ZM27.4286 27.4286H6.18743L15.0937 18.5223L17.8126 21.2411C18.2412 21.6696 18.8225 21.9104 19.4286 21.9104C20.0347 21.9104 20.6159 21.6696 21.0446 21.2411L22.8571 19.4286L27.4286 23.9966V27.4286ZM27.4286 20.7634L24.4731 17.808C24.0445 17.3795 23.4632 17.1388 22.8571 17.1388C22.2511 17.1388 21.6698 17.3795 21.2411 17.808L19.4286 19.6206L16.712 16.904L27.4286 6.18743V20.7634Z" data-dcnode-id="833"></path><path d="M4.78621 23.3846V19.8974L10.5982 14.089L12.1941 15.6861L13.8401 14.0401L12.2418 12.4419C11.8058 12.006 11.2146 11.7612 10.5982 11.7612C9.98173 11.7612 9.39052 12.006 8.95455 12.4419L4.78621 16.6102V4.78633H23.3845V2.46155H4.78621C4.16983 2.46216 3.57887 2.70729 3.14302 3.14314C2.70717 3.57899 2.46204 4.16995 2.46143 4.78633V23.3846H4.78621Z" data-dcnode-id="832"></path></svg></div></div><div class="p-4 md:p-0" data-dcnode-id="823"><p class="text-sm uppercase font-semibold tracking-wide mt-4 z-10 text-black-400 text-black-400" data-dcnode-id="828"></p><a class="text-sm md:text-xl font-semibold text-link line-clamp-1" data-dcnode-id="826" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lonelyplanet.com/pois/1299533"><span data-dcnode-id="827" instrument_node="">Kiholo State Park Reserve</span></a><p class="line-clamp-2 md:line-clamp-3 text-black-400" data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">With its pristine turquoise waters and shoreline fringed with coconut trees, Kiholo Bay is an off-the-beaten-track Big Island beauty. It’s more of a series of beaches than one continuous stretch of sand, and it's relatively unvisited. The main beach (near the parking lot) is pebbly and swimming is fine when seas are calm. Parts of the bay are a popular sunning spot for sea turtles.</span></p></div></article></li></ul><div class="styles_overlay___a5ww" data-dcnode-id="819"></div></div><div class="absolute bottom-0 left-0 z-10 md:hidden w-full pb-4" data-dcnode-id="700"><div class="jsx-302739738 container" data-dcnode-id="701"><ul class="jsx-302739738 carousel flex overflow-x-scroll md:overflow-x-auto overflow-y-hidden -mx-4" data-dcnode-id="712" id="carousel-PXxzHGXWHeOizVcyQ3i2n"><li class="jsx-302739738 carousel-item flex-shrink-0 px-4 pb-2 w-90 md:w-1/3" data-dcnode-id="808"><article class="flex rounded h-full bg-white md:p-4 cursor-pointer hover:shadow-lg md:p-2 shadow-lg" data-dcnode-id="809"><div class="flex-none w-1/4 mr-4 md:mr-6 rounded-r-none md:rounded-r rounded-l overflow-hidden" data-dcnode-id="816"><div class="h-full" data-dcnode-id="817"></div></div><div class="p-4 md:p-0" data-dcnode-id="810"><p class="text-sm uppercase font-semibold tracking-wide mt-4 z-10 text-black-400 text-black-400" data-dcnode-id="815"></p><a class="text-sm md:text-xl font-semibold text-link line-clamp-1" data-dcnode-id="813" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lonelyplanet.com/pois/1558941"><span data-dcnode-id="814" instrument_node="">Kilauea</span></a><p class="line-clamp-2 md:line-clamp-3 text-black-400" data-dcnode-id="811"><span data-dcnode-id="812" instrument_node="">Kilauea volcano lies at the center of activity in Hawaiʻi Volcanoes National Park. The unassuming bump on Mauna Loa's southeast flank would be easily overlooked if not for its massive steaming crater and crater-within-a-crater, Halemaʻumaʻu, which has spewed lava nearly continuously over the last 25 years.

Researchers initially thought Kilauea was just a vent of Mauna Loa, but later discovered a separate lava system – a particularly active system that first broke the earth's surface as early as 600,000 years ago. How active Kilauea Volcano will be when you visit is subject to the whims of Pele, the Hawaiian goddess of fire and volcanoes who makes her home here, so set expectations low, and hope to be pleasantly surprised.

Is Kilauea currently erupting?

The most active of the five volcanoes that make up the Big Island of Hawaiʻi, Kilauea's calendar is usually hot stuff. Chances are good that visitors to Halemaʻumaʻu will get a sight (and smell) of some of the action. In 2018, a months-long eruption went out with a bang when the volcano's caldera collapsed/exploded, shooting a plume of ash 30,000ft high. Recent activity restarted in December 20, 2020, but it's decidedly less pyrotechnic. The USGS posts daily reports on Kilauea's activity.

Is Kilauea safe to visit?

Even though Kilauea is one of the world's most active volcanoes, it's very safe to visit. The eruption in 2018 caused property damage and just over two dozen injuries, but no fatalities were reported.

If Halemaʻumaʻu and Puʻu ʻOʻo are erupting, they belch thousands of tons of the gas daily. When lava meets the sea it creates a "steam plume," as sulfuric and hydrochloric acid mixes with airborne silica (or glass particles). All this combines to create vog, which, depending on the winds, can settle over the park. People with respiratory and heart conditions, pregnant women, infants and young children should take care when visiting if an eruption is taking place. Follow hawaiiso2network.com for air quality reports.

History

On March 19, 2008, Halemaʻumaʻu Crater shattered a quarter-century of silence with a huge steam-driven explosion that scattered rocks and Pele's hair (strands of volcanic glass) over 75 acres. A series of explosions followed, widening a 300ft vent in the crater floor which has continued to spew a column of gas and ash across the Kaʻu desert. At time of research, the vent had filled with a lake of bubbling molten lava that occasionally overflows into Kilauea Caldera before receding again – like a slow heart-beat of Kilauea. If you are lucky, Pele may be in a rare mood, sending spatter and rocks shooting up to the now-closed section of Crater Rim Drive.

In 1823, missionary William Ellis first described the boiling goblet of Halemaʻumaʻu to a wide audience, and his fantastic account attracted travelers from all over the world. Looking in, some saw the fires of hell, others primeval creation, but none left the crater unmoved. Mark Twain wrote in 1866 that he witnessed: "[C]ircles and serpents and streaks of lightning all twined and wreathed and tied together…I have seen Vesuvius since, but it was a mere toy, a child's volcano, a soup kettle, compared to this."

Then, in 1924, the crater floor subsided rapidly, touching off a series of explosive eruptions. Boulders and mud rained for days. When it was over, the crater had doubled in size – to about 300ft deep and 3000ft wide. Lava activity ceased and the crust cooled. But not for long. Since then, Halemaʻumaʻu has erupted 18 times, making it the most active area on Kilauea's summit.

All of Hawaiʻi is the territory of Pele, goddess of fire and volcanoes, but Halemaʻumaʻu is her home, making it a sacred site for Hawaiians.

How to see Kilauea

The best spots to see the latest eruption are from, Kilauea Overlook, Steam Vents &amp; Steaming Bluff and overlooks along Crater Rim Trail. Viewpoints can get crowded, so arrive early. All fall within the boundaries of Hawaiʻi Volcanoes National Park, which charges a $30 fee per car for a 7-day pass.</span></p></div></article></li><li class="jsx-302739738 carousel-item flex-shrink-0 px-4 pb-2 w-90 md:w-1/3" data-dcnode-id="798"><article class="flex rounded h-full bg-white md:p-4 cursor-pointer hover:shadow-lg md:p-2" data-dcnode-id="799"><div class="flex-none w-1/4 mr-4 md:mr-6 rounded-r-none md:rounded-r rounded-l overflow-hidden" data-dcnode-id="806"><div class="h-full" data-dcnode-id="807"></div></div><div class="p-4 md:p-0" data-dcnode-id="800"><p class="text-sm uppercase font-semibold tracking-wide mt-4 z-10 text-black-400 text-black-400" data-dcnode-id="805"></p><a class="text-sm md:text-xl font-semibold text-link line-clamp-1" data-dcnode-id="803" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lonelyplanet.com/pois/1302075"><span data-dcnode-id="804" instrument_node="">Green Sand Beach</span></a><p class="line-clamp-2 md:line-clamp-3 text-black-400" data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">This legendary beach on Mahana Bay isn't really that green, but it is a rare and beautiful sight. Its color comes from crystals of olivine, the mineral found in the semiprecious gemstone known as peridot. Olivine is created in high-heat environments – like during the formation of stars or volcanic eruptions. This batch comes from the latter, and is what's left behind as waves erode the littoral cone looming above the cove. Swimming is only advisable on the very few exceptionally calm days.

How to get to Green Sand Beach

To get here take the left (east) fork of South Point Rd some 10 miles from Hwy 11 to the old barracks. Park here (don't leave any valuables in your car) and hike the dusty, windy, hot 2.5 miles to Mahana Bay. Start by heading south to the Kaulana boat ramp then veer left (east) following the coastline. The unceasing winds will sandblast your face the entire way making the trip feel twice as far as it is. Bring lots of water.

Walking is free and has less impact on the local environment, but you can also get there by bouncing along in the back of one of the dilapidated 4WD pickups that usually cluster at the barracks offering rides for cash.

Whether you arrive on foot or off-road vehicle, you'll have to scramble down the cliff to the beach, which is becoming a major tourist attraction despite the difficult access. Go early, late or when it's overcast to beat the crowds.</span></p></div></article></li><li class="jsx-302739738 carousel-item flex-shrink-0 px-4 pb-2 w-90 md:w-1/3" data-dcnode-id="788"><article class="flex rounded h-full bg-white md:p-4 cursor-pointer hover:shadow-lg md:p-2" data-dcnode-id="789"><div class="flex-none w-1/4 mr-4 md:mr-6 rounded-r-none md:rounded-r rounded-l overflow-hidden" data-dcnode-id="796"><div class="h-full" data-dcnode-id="797"></div></div><div class="p-4 md:p-0" data-dcnode-id="790"><p class="text-sm uppercase font-semibold tracking-wide mt-4 z-10 text-black-400 text-black-400" data-dcnode-id="795"></p><a class="text-sm md:text-xl font-semibold text-link line-clamp-1" data-dcnode-id="793" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lonelyplanet.com/pois/1302273"><span data-dcnode-id="794" instrument_node="">Makalawena Beach</span></a><p class="line-clamp-2 md:line-clamp-3 text-black-400" data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">If what you're after is an almost deserted, postcard-perfect scoop of soft, white-sand beach cupping brilliant blue-green waters, head to 'Maks.' Although popular, this string of idyllic coves absorbs crowds so well you'll still feel like you've found paradise. The northernmost cove is sandier and gentler, while the southernmost cove is (illegally) a naked sunbathing spot. Swimming is splendid, but beware of rough surf and rocks in the water. Bodyboarding and snorkeling are other possibilities.</span></p></div></article></li><li class="jsx-302739738 carousel-item flex-shrink-0 px-4 pb-2 w-90 md:w-1/3" data-dcnode-id="778"><article class="flex rounded h-full bg-white md:p-4 cursor-pointer hover:shadow-lg md:p-2" data-dcnode-id="779"><div class="flex-none w-1/4 mr-4 md:mr-6 rounded-r-none md:rounded-r rounded-l overflow-hidden" data-dcnode-id="786"><div class="h-full" data-dcnode-id="787"></div></div><div class="p-4 md:p-0" data-dcnode-id="780"><p class="text-sm uppercase font-semibold tracking-wide mt-4 z-10 text-black-400 text-black-400" data-dcnode-id="785"></p><a class="text-sm md:text-xl font-semibold text-link line-clamp-1" data-dcnode-id="783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lonelyplanet.com/pois/1253347"><span data-dcnode-id="784" instrument_node="">Hawaiʻi Volcanoes National Park</span></a><p class="line-clamp-2 md:line-clamp-3 text-black-400" data-dcnode-id="781"><span data-dcnode-id="782" instrument_node="">Even among Hawaii's many wonders, this national park stands out. Its two active volcanoes testify to the ongoing birth of the islands: quiet Mauna Loa (13,678ft) sprawling above, its unassuming mass downplaying its height, and young Kilauea (4091ft), one of the world's most active volcanoes, providing near-continual sources of awe. The park was closed for several months during the 2018 lower Puna eruption, after which all active lava flows ceased.</span></p></div></article></li><li class="jsx-302739738 carousel-item flex-shrink-0 px-4 pb-2 w-90 md:w-1/3" data-dcnode-id="765"><article class="flex rounded h-full bg-white md:p-4 cursor-pointer hover:shadow-lg md:p-2" data-dcnode-id="766"><div class="flex-none w-1/4 mr-4 md:mr-6 rounded-r-none md:rounded-r rounded-l overflow-hidden" data-dcnode-id="773"><div class="flex justify-center items-center h-full bg-black-100" data-dcnode-id="774"><svg aria-hidden="true" class="text-2xl text-black-200" data-dcnode-id="775" fill="currentColor" height="1em" viewBox="0 0 32 32" width="1em" xmlns="http://www.w3.org/2000/svg"><path d="M32 1.616L30.384 0L0 30.384L1.616 32L3.90171 29.7143H27.4286C28.0345 29.7134 28.6154 29.4723 29.0438 29.0438C29.4723 28.6154 29.7134 28.0345 29.7143 27.4286V3.90171L32 1.616ZM27.4286 27.4286H6.18743L15.0937 18.5223L17.8126 21.2411C18.2412 21.6696 18.8225 21.9104 19.4286 21.9104C20.0347 21.9104 20.6159 21.6696 21.0446 21.2411L22.8571 19.4286L27.4286 23.9966V27.4286ZM27.4286 20.7634L24.4731 17.808C24.0445 17.3795 23.4632 17.1388 22.8571 17.1388C22.2511 17.1388 21.6698 17.3795 21.2411 17.808L19.4286 19.6206L16.712 16.904L27.4286 6.18743V20.7634Z" data-dcnode-id="777"></path><path d="M4.78621 23.3846V19.8974L10.5982 14.089L12.1941 15.6861L13.8401 14.0401L12.2418 12.4419C11.8058 12.006 11.2146 11.7612 10.5982 11.7612C9.98173 11.7612 9.39052 12.006 8.95455 12.4419L4.78621 16.6102V4.78633H23.3845V2.46155H4.78621C4.16983 2.46216 3.57887 2.70729 3.14302 3.14314C2.70717 3.57899 2.46204 4.16995 2.46143 4.78633V23.3846H4.78621Z" data-dcnode-id="776"></path></svg></div></div><div class="p-4 md:p-0" data-dcnode-id="767"><p class="text-sm uppercase font-semibold tracking-wide mt-4 z-10 text-black-400 text-black-400" data-dcnode-id="772"></p><a class="text-sm md:text-xl font-semibold text-link line-clamp-1" data-dcnode-id="770" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lonelyplanet.com/pois/1322187"><span data-dcnode-id="771" instrument_node="">Mauna Kea's Summit Area</span></a><p class="line-clamp-2 md:line-clamp-3 text-black-400" data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">At 13,796ft in the air, you are above 40% of the atmosphere and 90% of its water vapor – apparently perfect conditions for growing the giant mushroom-like observatories that have popped up around the summit. Glistening in the sun against the desolate terrain like a human colony on an alien planet, this is the greatest collection of telescopes on earth. You can practically feel the knowledge being sucked out of the sky.</span></p></div></article></li><li class="jsx-302739738 carousel-item flex-shrink-0 px-4 pb-2 w-90 md:w-1/3" data-dcnode-id="752"><article class="flex rounded h-full bg-white md:p-4 cursor-pointer hover:shadow-lg md:p-2" data-dcnode-id="753"><div class="flex-none w-1/4 mr-4 md:mr-6 rounded-r-none md:rounded-r rounded-l overflow-hidden" data-dcnode-id="760"><div class="flex justify-center items-center h-full bg-black-100" data-dcnode-id="761"><svg aria-hidden="true" class="text-2xl text-black-200" data-dcnode-id="762" fill="currentColor" height="1em" viewBox="0 0 32 32" width="1em" xmlns="http://www.w3.org/2000/svg"><path d="M32 1.616L30.384 0L0 30.384L1.616 32L3.90171 29.7143H27.4286C28.0345 29.7134 28.6154 29.4723 29.0438 29.0438C29.4723 28.6154 29.7134 28.0345 29.7143 27.4286V3.90171L32 1.616ZM27.4286 27.4286H6.18743L15.0937 18.5223L17.8126 21.2411C18.2412 21.6696 18.8225 21.9104 19.4286 21.9104C20.0347 21.9104 20.6159 21.6696 21.0446 21.2411L22.8571 19.4286L27.4286 23.9966V27.4286ZM27.4286 20.7634L24.4731 17.808C24.0445 17.3795 23.4632 17.1388 22.8571 17.1388C22.2511 17.1388 21.6698 17.3795 21.2411 17.808L19.4286 19.6206L16.712 16.904L27.4286 6.18743V20.7634Z" data-dcnode-id="764"></path><path d="M4.78621 23.3846V19.8974L10.5982 14.089L12.1941 15.6861L13.8401 14.0401L12.2418 12.4419C11.8058 12.006 11.2146 11.7612 10.5982 11.7612C9.98173 11.7612 9.39052 12.006 8.95455 12.4419L4.78621 16.6102V4.78633H23.3845V2.46155H4.78621C4.16983 2.46216 3.57887 2.70729 3.14302 3.14314C2.70717 3.57899 2.46204 4.16995 2.46143 4.78633V23.3846H4.78621Z" data-dcnode-id="763"></path></svg></div></div><div class="p-4 md:p-0" data-dcnode-id="754"><p class="text-sm uppercase font-semibold tracking-wide mt-4 z-10 text-black-400 text-black-400" data-dcnode-id="759"></p><a class="text-sm md:text-xl font-semibold text-link line-clamp-1" data-dcnode-id="757" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lonelyplanet.com/pois/454321"><span data-dcnode-id="758" instrument_node="">Kua Bay</span></a><p class="line-clamp-2 md:line-clamp-3 text-black-400" data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">This sublime crescent-shaped white-sand beach is fronted by sparkling waters in alternating bands of pale cyan, deeper turquoise, and rich blue. Kua Bay offers first-rate swimming and excellent bodyboarding. There's good snorkeling by the large rock outcroppings on the north side of the bay when waters are calm. A paved road leads right up to it, and thus the beach draws major crowds, especially on weekends. Arrive late and cars will be parked half a mile up the road.</span></p></div></article></li><li class="jsx-302739738 carousel-item flex-shrink-0 px-4 pb-2 w-90 md:w-1/3" data-dcnode-id="739"><article class="flex rounded h-full bg-white md:p-4 cursor-pointer hover:shadow-lg md:p-2" data-dcnode-id="740"><div class="flex-none w-1/4 mr-4 md:mr-6 rounded-r-none md:rounded-r rounded-l overflow-hidden" data-dcnode-id="747"><div class="flex justify-center items-center h-full bg-black-100" data-dcnode-id="748"><svg aria-hidden="true" class="text-2xl text-black-200" data-dcnode-id="749" fill="currentColor" height="1em" viewBox="0 0 32 32" width="1em" xmlns="http://www.w3.org/2000/svg"><path d="M32 1.616L30.384 0L0 30.384L1.616 32L3.90171 29.7143H27.4286C28.0345 29.7134 28.6154 29.4723 29.0438 29.0438C29.4723 28.6154 29.7134 28.0345 29.7143 27.4286V3.90171L32 1.616ZM27.4286 27.4286H6.18743L15.0937 18.5223L17.8126 21.2411C18.2412 21.6696 18.8225 21.9104 19.4286 21.9104C20.0347 21.9104 20.6159 21.6696 21.0446 21.2411L22.8571 19.4286L27.4286 23.9966V27.4286ZM27.4286 20.7634L24.4731 17.808C24.0445 17.3795 23.4632 17.1388 22.8571 17.1388C22.2511 17.1388 21.6698 17.3795 21.2411 17.808L19.4286 19.6206L16.712 16.904L27.4286 6.18743V20.7634Z" data-dcnode-id="751"></path><path d="M4.78621 23.3846V19.8974L10.5982 14.089L12.1941 15.6861L13.8401 14.0401L12.2418 12.4419C11.8058 12.006 11.2146 11.7612 10.5982 11.7612C9.98173 11.7612 9.39052 12.006 8.95455 12.4419L4.78621 16.6102V4.78633H23.3845V2.46155H4.78621C4.16983 2.46216 3.57887 2.70729 3.14302 3.14314C2.70717 3.57899 2.46204 4.16995 2.46143 4.78633V23.3846H4.78621Z" data-dcnode-id="750"></path></svg></div></div><div class="p-4 md:p-0" data-dcnode-id="741"><p class="text-sm uppercase font-semibold tracking-wide mt-4 z-10 text-black-400 text-black-400" data-dcnode-id="746"></p><a class="text-sm md:text-xl font-semibold text-link line-clamp-1" data-dcnode-id="744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lonelyplanet.com/pois/1302634"><span data-dcnode-id="745" instrument_node="">Hapuna Beach State Recreation Area</span></a><p class="line-clamp-2 md:line-clamp-3 text-black-400" data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">Hapuna Beach is world famous for its magnificent half-mile sweep of white powder sand and fabulously clear waters. In summer, waves are calm and allow good swimming, snorkeling and diving. When the surf's up in winter, bodyboarding is awesome, thanks to reliable swells from the northwest. Lifeguards are on duty, but waves over 3ft should be left for the experts, as drownings do happen. Bring sunscreen because there's virtually no shade.</span></p></div></article></li><li class="jsx-302739738 carousel-item flex-shrink-0 px-4 pb-2 w-90 md:w-1/3" data-dcnode-id="726"><article class="flex rounded h-full bg-white md:p-4 cursor-pointer hover:shadow-lg md:p-2" data-dcnode-id="727"><div class="flex-none w-1/4 mr-4 md:mr-6 rounded-r-none md:rounded-r rounded-l overflow-hidden" data-dcnode-id="734"><div class="flex justify-center items-center h-full bg-black-100" data-dcnode-id="735"><svg aria-hidden="true" class="text-2xl text-black-200" data-dcnode-id="736" fill="currentColor" height="1em" viewBox="0 0 32 32" width="1em" xmlns="http://www.w3.org/2000/svg"><path d="M32 1.616L30.384 0L0 30.384L1.616 32L3.90171 29.7143H27.4286C28.0345 29.7134 28.6154 29.4723 29.0438 29.0438C29.4723 28.6154 29.7134 28.0345 29.7143 27.4286V3.90171L32 1.616ZM27.4286 27.4286H6.18743L15.0937 18.5223L17.8126 21.2411C18.2412 21.6696 18.8225 21.9104 19.4286 21.9104C20.0347 21.9104 20.6159 21.6696 21.0446 21.2411L22.8571 19.4286L27.4286 23.9966V2 iholo Bay is an off-the-beaten-track Big Island beauty. It’s more of a series of beaches than one continuous stretch of sand, and it's relatively unvisited. The main beach (near the parking lot) is pebbly and swimming is fine when seas are calm. Parts of the bay are a popular sunning spot for sea turtles.</span></p></div></article></li></ul><div class="hidden md:flex items-center justify-end mt-4" data-dcnode-id="702"><div class="flex text-black-300" data-dcnode-id="703"><button aria-label="previous slide" class="cursor-default opacity-50 mr-2" data-dcnode-id="708" disabled="" type="button"><svg aria-hidden="true" class="text-3xl" data-dcnode-id="709" fill="currentColor" height="1em" viewBox="0 0 40 40" width="1em" xmlns="http://www.w3.org/2000/svg"><path d="M20 1.25C16.2916 1.25 12.6665 2.34967 9.58307 4.40994C6.49964 6.47022 4.09641 9.39857 2.67727 12.8247C1.25812 16.2508 0.886812 20.0208 1.61028 23.6579C2.33376 27.2951 4.11952 30.636 6.74176 33.2583C9.36399 35.8805 12.7049 37.6663 16.3421 38.3897C19.9792 39.1132 23.7492 38.7419 27.1753 37.3227C30.6014 35.9036 33.5298 33.5004 35.5901 30.4169C37.6503 27.3335 38.75 23.7084 38.75 20C38.75 15.0272 36.7746 10.2581 33.2583 6.74175C29.742 3.22544 24.9728 1.25 20 1.25ZM20 36.25C16.7861 36.25 13.6443 35.297 10.972 33.5114C8.29969 31.7258 6.21689 29.1879 4.98697 26.2186C3.75704 23.2493 3.43524 19.982 4.06225 16.8298C4.68926 13.6776 6.23692 10.7821 8.50952 8.50951C10.7821 6.23691 13.6776 4.68925 16.8298 4.06224C19.982 3.43523 23.2493 3.75703 26.2186 4.98696C29.1879 6.21688 31.7258 8.29969 33.5114 10.972C35.297 13.6443 36.25 16.7861 36.25 20C36.2434 24.3077 34.5292 28.4371 31.4832 31.4832C28.4372 34.5292 24.3077 36.2434 20 36.25Z" data-dcnode-id="711"></path><path d="M23.3994 12.7501C23.2832 12.6329 23.145 12.5399 22.9926 12.4764C22.8403 12.413 22.6769 12.3803 22.5119 12.3803C22.3469 12.3803 22.1835 12.413 22.0312 12.4764C21.8789 12.5399 21.7406 12.6329 21.6244 12.7501L14.8494 19.1001C14.6113 19.339 14.4775 19.6627 14.4775 20 e></div><div class="lg:hidden text-center mt-4" data-dcnode-id="445"><a aria-hidden="true" class="btn inline-block bg-white text-black" data-dcnode-id="446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lonelyplanet.com/usa/hawaii/hawaii-the-big-island/articles"><span data-dcnode-id="447" instrument_node="">View all stories</span></a></div></div></section></div><div data-dcnode-id="305" data-toc-label="Planning a trip" id="planning"><div class="container border-t-2 border-black-100" data-dcnode-id="441"></div><section class="relative my-12 md:my-20" data-dcnode-id="306"><div class="container" data-dcnode-id="432"><h2 class="text-2xl md:text-4xl font-display leading-tight font-semibold mb-5" data-dcnode-id="439"><span data-dcnode-id="440" instrument_node="">Top attractions</span></h2><p class="max-w-xl w-full mb-8" data-dcnode-id="433"><span data-dcnode-id="438" instrument_node="">These are our favorite local haunts, touristy spots, and hidden gems throughout </span><span data-dcnode-id="436" instrument_node="">Hawaiʻi the Big Island</span><span data-dcnode-id="434" instrument_node="">.</span></p></div><section data-dcnode-id="307"><div class="container flex justify-between items-center" data-dcnode-id="414"><ul class="flex space-x-8 overflow-x-auto" data-dcnode-id="419"><li data-dcnode-id="429"><button class="border-b border-black-200 text-black border-blue font-semibold whitespace-nowrap" data-dcnode-id="430" type="button"><span data-dcnode-id="431" instrument_node="">Sights</span></button></li><li data-dcnode-id="426"><button class="border-b border-black-200 hover:border-black-300 text-black-300 hover:text-black-400 font-semibold whitespace-nowrap" data-dcnode-id="427" type="button"><span data-dcnode-id="428" instrument_node="">Restaurants</span></button></li><li data-dcnode-id="423"><button class="border-b border-black-200 hover:border-black-300 text-black-300 hover:text-black-400 font-semibold whitespace-nowrap" data-dcnode-id="424" type="button"><span data-dcnode-id="425" instrument_node="">Shopping</span></button></li><li data-dcnode-id="420"><button class="border-b border-black-200 hover:border-black-300 text-black-300 hover:text-black-400 font-semibold whitespace-nowrap" data-dcnode-id="421" type="button"><span data-dcnode-id="422" instrument_node="">Entertainment</span></button></li></ul><a aria-hidden="true" class="btn hidden md:inline" data-dcnode-id="415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lonelyplanet.com/usa/hawaii/hawaii-the-big-island/attractions"><span data-dcnode-id="418" instrument_node="">Discover more </span><span data-dcnode-id="416" instrument_node="">sights</span></a></div><div class="jsx-302739738 container mt-8" data-dcnode-id="312"><ul class="jsx-302739738 carousel flex overflow-x-scroll md:overflow-x-auto overflow-y-hidden -mx-4" data-dcnode-id="323" id="carousel-10W0SaU8xO68Ft-SIjbhQ"><li class="jsx-302739738 carousel-item flex-shrink-0 px-4 pb-2 w-90 md:w-1/3" data-dcnode-id="404"><article class="rounded shadow-md" data-dcnode-id="405"><div class="p-6" data-dcnode-id="406"><p class="text-sm uppercase font-semibold tracking-wide text-black-400" data-dcnode-id="412"><span data-dcnode-id="413" instrument_node="">Volcano</span></p><h3 class="my-4" data-dcnode-id="409"><a class="text-xl font-semibold" data-dcnode-id="410" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lonelyplanet.com/usa/hawaii/hawai-i-volcanoes-national-park/attractions/kilauea/a/poi-sig/1558941/1333405"><span data-dcnode-id="411" instrument_node="">Kilauea</span></a></h3><p class="line-clamp-4 text-sm lg:text-base text-black-400" data-dcnode-id="407"><span data-dcnode-id="408" instrument_node="">Kilauea volcano lies at the center of activity in Hawaiʻi Volcanoes National Park. The unassuming bump on Mauna Loa's southeast flank would be easily overlooked if not for its massive steaming crater and crater-within-a-crater, Halemaʻumaʻu, which has spewed lava nearly continuously over the last 25 years.

Researchers initially thought Kilauea was just a vent of Mauna Loa, but later discovered a separate lava system – a particularly active system that first broke the earth's surface as early as 600,000 years ago. How active Kilauea Volcano will be when you visit is subject to the whims of Pele, the Hawaiian goddess of fire and volcanoes who makes her home here, so set expectations low, and hope to be pleasantly surprised.

Is Kilauea currently erupting?

The most active of the five volcanoes that make up the Big Island of Hawaiʻi, Kilauea's calendar is usually hot stuff. Chances are good that visitors to Halemaʻumaʻu will get a sight (and smell) of some of the action. In 2018, a months-long eruption went out with a bang when the volcano's caldera collapsed/exploded, shooting a plume of ash 30,000ft high. Recent activity restarted in December 20, 2020, but it's decidedly less pyrotechnic. The USGS posts daily reports on Kilauea's activity.

Is Kilauea safe to visit?

Even though Kilauea is one of the world's most active volcanoes, it's very safe to visit. The eruption in 2018 caused property damage and just over two dozen injuries, but no fatalities were reported.

If Halemaʻumaʻu and Puʻu ʻOʻo are erupting, they belch thousands of tons of the gas daily. When lava meets the sea it creates a "steam plume," as sulfuric and hydrochloric acid mixes with airborne silica (or glass particles). All this combines to create vog, which, depending on the winds, can settle over the park. People with respiratory and heart conditions, pregnant women, infants and young children should take care when visiting if an eruption is taking place. Follow hawaiiso2network.com for air quality reports.

History

On March 19, 2008, Halemaʻumaʻu Crater shattered a quarter-century of silence with a huge steam-driven explosion that scattered rocks and Pele's hair (strands of volcanic glass) over 75 acres. A series of explosions followed, widening a 300ft vent in the crater floor which has continued to spew a column of gas and ash across the Kaʻu desert. At time of research, the vent had filled with a lake of bubbling molten lava that occasionally overflows into Kilauea Caldera before receding again – like a slow heart-beat of Kilauea. If you are lucky, Pele may be in a rare mood, sending spatter and rocks shooting up to the now-closed section of Crater Rim Drive.

In 1823, missionary William Ellis first described the boiling goblet of Halemaʻumaʻu to a wide audience, and his fantastic account attracted travelers from all over the world. Looking in, some saw the fires of hell, others primeval creation, but none left the crater unmoved. Mark Twain wrote in 1866 that he witnessed: "[C]ircles and serpents and streaks of lightning all twined and wreathed and tied together…I have seen Vesuvius since, but it was a mere toy, a child's volcano, a soup kettle, compared to this."

Then, in 1924, the crater floor subsided rapidly, touching off a series of explosive eruptions. Boulders and mud rained for days. When it was over, the crater had doubled in size – to about 300ft deep and 3000ft wide. Lava activity ceased and the crust cooled. But not for long. Since then, Halemaʻumaʻu has erupted 18 times, making it the most active area on Kilauea's summit.

All of Hawaiʻi is the territory of Pele, goddess of fire and volcanoes, but Halemaʻumaʻu is her home, making it a sacred site for Hawaiians.

How to see Kilauea

The best spots to see the latest eruption are from, Kilauea Overlook, Steam Vents &amp; Steaming Bluff and overlooks along Crater Rim Trail. Viewpoints can get crowded, so arrive early. All fall within the boundaries of Hawaiʻi Volcanoes National Park, which charges a $30 fee per car for a 7-day pass.</span></p></div></article></li><li class="jsx-302739738 carousel-item flex-shrink-0 px-4 pb-2 w-90 md:w-1/3" data-dcnode-id="394"><article class="rounded shadow-md" data-dcnode-id="395"><div class="p-6" data-dcnode-id="396"><p class="text-sm uppercase font-semibold tracking-wide text-black-400" data-dcnode-id="402"><span data-dcnode-id="403" instrument_node="">Beach</span></p><h3 class="my-4" data-dcnode-id="399"><a class="text-xl font-semibold" data-dcnode-id="400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lonelyplanet.com/usa/hawaii/south-point-ka-lae/attractions/green-sand-beach/a/poi-sig/1302075/1333401"><span data-dcnode-id="401" instrument_node="">Green Sand Beach</span></a></h3><p class="line-clamp-4 text-sm lg:text-base text-black-400" data-dcnode-id="397"><span data-dcnode-id="398" instrument_node="">This legendary beach on Mahana Bay isn't really that green, but it is a rare and beautiful sight. Its color comes from crystals of olivine, the mineral found in the semiprecious gemstone known as peridot. Olivine is created in high-heat environments – like during the formation of stars or volcanic eruptions. This batch comes from the latter, and is what's left behind as waves erode the littoral cone looming above the cove. Swimming is only advisable on the very few exceptionally calm days.

How to get to Green Sand Beach

To get here take the left (east) fork of South Point Rd some 10 miles from Hwy 11 to the old barracks. Park here (don't leave any valuables in your car) and hike the dusty, windy, hot 2.5 miles to Mahana Bay. Start by heading south to the Kaulana boat ramp then veer left (east) following the coastline. The unceasing winds will sandblast your face the entire way making the trip feel twice as far as it is. Bring lots of water.

Walking is free and has less impact on the local environment, but you can also get there by bouncing along in the back of one of the dilapidated 4WD pickups that usually cluster at the barracks offering rides for cash.

Whether you arrive on foot or off-road vehicle, you'll have to scramble down the cliff to the beach, which is becoming a major tourist attraction despite the difficult access. Go early, late or when it's overcast to beat the crowds.</span></p></div></article></li><li class="jsx-302739738 carousel-item flex-shrink-0 px-4 pb-2 w-90 md:w-1/3" data-dcnode-id="384"><article class="rounded shadow-md" data-dcnode-id="385"><div class="p-6" data-dcnode-id="386"><p class="text-sm uppercase font-semibold tracking-wide text-black-400" data-dcnode-id="392"><span data-dcnode-id="393" instrument_node="">Beach</span></p><h3 class="my-4" data-dcnode-id="389"><a class="text-xl font-semibold" data-dcnode-id="390" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lonelyplanet.com/usa/hawaii/north-kona-coast/attractions/makalawena-beach/a/poi-sig/1302273/1324658"><span data-dcnode-id="391" instrument_node="">Makalawena Beach</span></a></h3><p class="line-clamp-4 text-sm lg:text-base text-black-400" data-dcnode-id="387"><span data-dcnode-id="388" instrument_node="">If what you're after is an almost deserted, postcard-perfect scoop of soft, white-sand beach cupping brilliant blue-green waters, head to 'Maks.' Although popular, this string of idyllic coves absorbs crowds so well you'll still feel like you've found paradise. The northernmost cove is sandier and gentler, while the southernmost cove is (illegally) a naked sunbathing spot. Swimming is splendid, but beware of rough surf and rocks in the water. Bodyboarding and snorkeling are other possibilities.</span></p></div></article></li><li class="jsx-302739738 carousel-item flex-shrink-0 px-4 pb-2 w-90 md:w-1/3" data-dcnode-id="374"><article class="rounded shadow-md" data-dcnode-id="375"><div class="p-6" data-dcnode-id="376"><p class="text-sm uppercase font-semibold tracking-wide text-black-400" data-dcnode-id="382"><span data-dcnode-id="383" instrument_node="">Landmark</span></p><h3 class="my-4" data-dcnode-id="379"><a class="text-xl font-semibold" data-dcnode-id="380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lonelyplanet.com/usa/hawaii/mauna-kea/attractions/mauna-keas-summit-area/a/poi-sig/1322187/1333377"><span data-dcnode-id="381" instrument_node="">Mauna Kea's Summit Area</span></a></h3><p class="line-clamp-4 text-sm lg:text-base text-black-400" data-dcnode-id="377"><span data-dcnode-id="378" instrument_node="">At 13,796ft in the air, you are above 40% of the atmosphere and 90% of its water vapor – apparently perfect conditions for growing the giant mushroom-like observatories that have popped up around the summit. Glistening in the sun against the desolate terrain like a human colony on an alien planet, this is the greatest collection of telescopes on earth. You can practically feel the knowledge being sucked out of the sky.</span></p></div></article></li><li class="jsx-302739738 carousel-item flex-shrink-0 px-4 pb-2 w-90 md:w-1/3" data-dcnode-id="364"><article class="rounded shadow-md" data-dcnode-id="365"><div class="p-6" data-dcnode-id="366"><p class="text-sm uppercase font-semibold tracking-wide text-black-400" data-dcnode-id="372"><span data-dcnode-id="373" instrument_node="">Park</span></p><h3 class="my-4" data-dcnode-id="369"><a class="text-xl font-semibold" data-dcnode-id="370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lonelyplanet.com/usa/hawaii/hawaii-the-big-island/attractions/hawai-i-volcanoes-national-park/a/poi-sig/1253347/1315525"><span data-dcnode-id="371" instrument_node="">Hawaiʻi Volcanoes National Park</span></a></h3><p class="line-clamp-4 text-sm lg:text-base text-black-400" data-dcnode-id="367"><span data-dcnode-id="368" instrument_node="">Even among Hawaii's many wonders, this national park stands out. Its two active volcanoes testify to the ongoing birth of the islands: quiet Mauna Loa (13,678ft) sprawling above, its unassuming mass downplaying its height, and young Kilauea (4091ft), one of the world's most active volcanoes, providing near-continual sources of awe. The park was closed for several months during the 2018 lower Puna eruption, after which all active lava flows ceased.</span></p></div></article></li><li class="jsx-302739738 carousel-item flex-shrink-0 px-4 pb-2 w-90 md:w-1/3" data-dcnode-id="354"><article class="rounded shadow-md" data-dcnode-id="355"><div class="p-6" data-dcnode-id="356"><p class="text-sm uppercase font-semibold tracking-wide text-black-400" data-dcnode-id="362"><span data-dcnode-id="363" instrument_node="">Beach</span></p><h3 class="my-4" data-dcnode-id="359"><a class="text-xl font-semibold" data-dcnode-id="360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lonelyplanet.com/usa/hawaii/north-kona-coast/attractions/kua-bay/a/poi-sig/454321/1324658"><span data-dcnode-id="361" instrument_node="">Kua Bay</span></a></h3><p class="line-clamp-4 text-sm lg:text-base text-black-400" data-dcnode-id="357"><span data-dcnode-id="358" instrument_node="">This sublime crescent-shaped white-sand beach is fronted by sparkling waters in alternating bands of pale cyan, deeper turquoise, and rich blue. Kua Bay offers first-rate swimming and excellent bodyboarding. There's good snorkeling by the large rock outcroppings on the north side of the bay when waters are calm. A paved road leads right up to it, and thus the beach draws major crowds, especially on weekends. Arrive late and cars will be parked half a mile up the road.</span></p></div></article></li><li class="jsx-302739738 carousel-item flex-shrink-0 px-4 pb-2 w-90 md:w-1/3" data-dcnode-id="344"><article class="rounded shadow-md" data-dcnode-id="345"><div class="p-6" data-dcnode-id="346"><p class="text-sm uppercase font-semibold tracking-wide text-black-400" data-dcnode-id="352"><span data-dcnode-id="353" instrument_node="">Beach</span></p><h3 class="my-4" data-dcnode-id="349"><a class="text-xl font-semibold" data-dcnode-id="350" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lonelyplanet.com/usa/hawaii/puako/attractions/hapuna-beach-state-recreation-area/a/poi-sig/1302634/1333368"><span data-dcnode-id="351" instrument_node="">Hapuna Beach State Recreation Area</span></a></h3><p class="line-clamp-4 text-sm lg:text-base text-black-400" data-dcnode-id="347"><span data-dcnode-id="348" instrument_node="">Hapuna Beach is world famous for its magnificent half-mile sweep of white powder sand and fabulously clear waters. In summer, waves are calm and allow good swimming, snorkeling and diving. When the surf's up in winter, bodyboarding is awesome, thanks to reliable swells from the northwest. Lifeguards are on duty, but waves over 3ft should be left for the experts, as drownings do happen. Bring sunscreen because there's virtually no shade.</span></p></div></article></li><li class="jsx-302739738 carousel-item flex-shrink-0 px-4 pb-2 w-90 md:w-1/3" data-dcnode-id="334"><article class="rounded shadow-md" data-dcnode-id="335"><div class="p-6" data-dcnode-id="336"><p class="text-sm uppercase font-semibold tracking-wide text-black-400" data-dcnode-id="342"><span data-dcnode-id="343" instrument_node="">Park</span></p><h3 class="my-4" data-dcnode-id="339"><a class="text-xl font-semibold" data-dcnode-id="340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lonelyplanet.com/usa/hawaii/pu-uhonua-o-honaunau-national-historical-park/attractions/pu-uhonua-o-honaunau-national-historical-park/a/poi-sig/1128866/1333357"><span data-dcnode-id="341" instrument_node="">Puʻuhonua o Honaunau National Historical Park</span></a></h3><p class="line-clamp-4 text-sm lg:text-base text-black-400" data-dcnode-id="337"><span data-dcnode-id="338" instrument_node="">This awesome park is an ancient place of refuge – or puʻuhonua, a sanctuary where kapu (taboo)-breakers could have their lives spared. A half-mile walking tour encompasses major sites – the visitor center provides a brochure map with cultural information. You enter the park in the village-like royal grounds, where Kona aliʻi (chiefs) and their warriors lived; the spiritual atmosphere is greatly enhanced by gently breaking waves and wind-rustled palms. Throughout the grounds are wooden kiʻi (deity images) standing up to 15ft high.</span></p></div></article></li><li class="jsx-302739738 carousel-item flex-shrink-0 px-4 pb-2 w-90 md:w-1/3" data-dcnode-id="324"><article class="rounded shadow-md" data-dcnode-id="325"><div class="p-6" data-dcnode-id="326"><p class="text-sm uppercase font-semibold tracking-wide text-black-400" data-dcnode-id="332"><span data-dcnode-id="333" instrument_node="">Park</span></p><h3 class="my-4" data-dcnode-id="329"><a class="text-xl font-semibold" data-dcnode-id="330" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lonelyplanet.com/usa/hawaii/north-kona-coast/attractions/kiholo-state-park-reserve/a/poi-sig/1299533/1324658"><span data-dcnode-id="331" instrument_node="">Kiholo State Park Reserve</span></a></h3><p class="line-clamp-4 text-sm lg:text-base text-black-400" data-dcnode-id="327"><span data-dcnode-id="328" instrument_node="">With its pristine turquoise waters and shoreline fringed with coconut trees, Kiholo Bay is an off-the-beaten-track Big Island beauty. It’s more of a series of beaches than one continuous stretch of sand, and it's relatively unvisited. The main beach (near the parking lot) is pebbly and swimming is fine when seas are calm. Parts of the bay are a popular sunning spot for sea turtles.</span></p></div></article></li></ul><div class="hidden md:flex items-center justify-end mt-4" data-dcnode-id="313"><div class="flex text-black-300" data-dcnode-id="314"><button aria-label="previous slide" class="cursor-default opacity-50 mr-2" data-dcnode-id="319" disabled="" type="button"><svg aria-hidden="true" class="text-3xl" data-dcnode-id="320" fill="currentColor" height="1em" viewBox="0 0 40 40"
