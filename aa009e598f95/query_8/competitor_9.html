</span><span class="hub" data-dcnode-id="1242"><a data-dcnode-id="1243" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.onlyinyourstate.com/hub/texas/attractions/"><span data-dcnode-id="1244" instrument_node="">Attractions</span></a></span><span data-dcnode-id="1241" instrument_node=""> </span><span class="date" data-dcnode-id="1239"><span data-dcnode-id="1240" instrument_node=""> April 21, 2016</span></span><span data-dcnode-id="1238" instrument_node="">
</span><span class="author" data-dcnode-id="1234"><span data-dcnode-id="1237" instrument_node="">by </span><a data-dcnode-id="1235" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.onlyinyourstate.com/author/knlawrence/" rel="author" title="Posts by Katie Lawrence"><span data-dcnode-id="1236" instrument_node="">Katie Lawrence</span></a></span><span data-dcnode-id="1233" instrument_node=""> </span></div><span data-dcnode-id="1231" instrument_node="">
</span><h1 data-dcnode-id="1229"><span data-dcnode-id="1230" instrument_node="">10 Historical Landmarks You Absolutely Must Visit In Texas</span></h1><span data-dcnode-id="1228" instrument_node="">
</span><p data-dcnode-id="1226"><span data-dcnode-id="1227" instrument_node="">Though we’re not the oldest state by any means, Texas has some of the richest history in the entire country. Many battles for freedom have been fought on our soil, we produced the biggest oil boom ever to occur…I could go on and on. Luckily, a lot of the landmarks that commemorate these historical events still stand today. Here are 10 that you should definitely pay a visit to.</span></p><span data-dcnode-id="1225" instrument_node="">
</span><div class="gallery gallery-instance-1 gallery-post-327379" data-dcnode-id="1001" id="gallery-1"><span data-dcnode-id="1224" instrument_node="">
</span><figure class="gallery-item attachment-327386 orientation-landscape size-large" data-dcnode-id="1207"><span data-dcnode-id="1223" instrument_node="">
</span><figcaption class="gallery-caption" data-dcnode-id="1221"><span data-dcnode-id="1222" instrument_node="">1. The Alamo (San Antonio)</span></figcaption><span data-dcnode-id="1220" instrument_node="">
</span><div class="gallery-image-container" data-dcnode-id="1216"><span data-dcnode-id="1219" instrument_node="">
</span><img alt="" class="gallery-image" data-dcnode-id="1218" data-pin-description="1. The Alamo (San Antonio)" data-pin-url="https://www.onlyinyourstate.com/texas/historical-landmarks-tx/" height="463" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//img-aws.ehowcdn.com/700x/cdn.onlyinyourstate.com/wp-content/uploads/2016/04/5110842265_0453a7842c_b-700x463.jpg&amp;raw" width="700"><span data-dcnode-id="1217" instrument_node="">
</span></div><span data-dcnode-id="1215" instrument_node="">
</span><div class="gallery-credit" data-dcnode-id="1212"><a data-dcnode-id="1213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/gold41/5110842265/in/photolist-8MCpm6-FwL4Z-FwHLb-9B47xK-daLvG9-FwHNm-qbaFpR-8CHHRP-cCbLeh-51Cu6Z-56fvHW-rRcAWM-7rLZsX-fzv5ek-gw8wn-6Z8PYY-9pMryn-85i5Rg-FwJuQ-765SbH-6hnVvF-2uAah1-2uzMhE-e9UuUw-edY6Sh-djQp2-qDfe5-o61wpb-oSUkHz-fKLVos-5Dj3v3-e1F6WF-8Fp5rZ-2r92TG-4sTCb6-7w36GJ-oQPiLt-7rgdhU-5GRvnZ-fXtZ1-5GSWpK-yb5mZ-4eaGFx-oFuGXC-9pDNMy-NgDdr-58FPom-7UdKKF-4Rew8M-mVkFGJ" target="_blank"><span data-dcnode-id="1214" instrument_node="">Flickr/gold41</span></a></div><span data-dcnode-id="1211" instrument_node="">
</span><div class="gallery-description" data-dcnode-id="1209"><span data-dcnode-id="1210" instrument_node="">A trip to the hill country just wouldn't be complete without paying a visit to the site of one of the bloodiest battles in Texas. The American soldiers, though clearly outnumbered, fought relentlessly for our freedom, and paying homage to them is our honor and duty.</span></div><span data-dcnode-id="1208" instrument_node="">
</span></figure><span data-dcnode-id="1206" instrument_node="">
</span><figure class="gallery-item attachment-327400 orientation-landscape size-large" data-dcnode-id="1187"><span data-dcnode-id="1205" instrument_node="">
</span><figcaption class="gallery-caption" data-dcnode-id="1203"><span data-dcnode-id="1204" instrument_node="">2. USS TEXAS (Channelview)</span></figcaption><span data-dcnode-id="1202" instrument_node="">
</span><div class="gallery-image-container" data-dcnode-id="1196"><span data-dcnode-id="1201" instrument_node="">
</span><img alt="" class="gallery-image lazy-load javascript-required" data-dcnode-id="1200" data-pin-description="2. USS TEXAS (Channelview)" data-pin-url="https://www.onlyinyourstate.com/texas/historical-landmarks-tx/" data-src="https://img-aws.ehowcdn.com/700x/cdn.onlyinyourstate.com/wp-content/uploads/2016/04/7675046238_1cca3698da_k-700x422.jpg" height="422" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//img-aws.ehowcdn.com/700x/cdn.onlyinyourstate.com/wp-content/themes/oiys-2017-08/images/img-lazy-load.jpg&amp;raw" width="700"><noscript data-dcnode-id="1198"><span data-dcnode-id="1199" instrument_node="">&lt;img width="700" height="422" src="https://img-aws.ehowcdn.com/700x/cdn.onlyinyourstate.com/wp-content/uploads/2016/04/7675046238_1cca3698da_k-700x422.jpg" class=" gallery-image  lazy-load " alt="" loading="lazy"  data-pin-description="2. USS TEXAS (Channelview)"  data-pin-url="https://www.onlyinyourstate.com/texas/historical-landmarks-tx/" /&gt;</span></noscript><span data-dcnode-id="1197" instrument_node="">
</span></div><span data-dcnode-id="1195" instrument_node="">
</span><div class="gallery-credit" data-dcnode-id="1192"><a data-dcnode-id="1193" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/tomsaint/7675046238/in/photolist-cGdBRq-8JRAYf-nW6CPr-g4B4CM-ny6Hw5-e2B8FG-4pAW5x-bqaCvK-pXATEK-4oiGqt-qxn86B-p3yVXW-9A1YTk-9NDrQR-9AgH9c-9A4XqY-zLuaA-9NGKrb-9NJybd-8Muu5y-uhc67k-dQaAvf-j8iWFX-dD6GLY-eCVRYu-utfMQL-9zLjgm-9zFuvt-5CdTp5-9GRdzn-4onJjs-4oiEAT-pVErfo-rczUMm-9NJTxs-9M2DUT-9A4XkS-9NFVNX-hhcLum-9NEwpU-4onJMo-9NK8vS-9NJAiA-5kc5tc-9NF1UU-9NoRPc-eCPPGR-iqwVST-8heY9b-5C9qfX" target="_blank"><span data-dcnode-id="1194" instrument_node="">Flickr/tomsaint</span></a></div><span data-dcnode-id="1191" instrument_node="">
</span><div class="gallery-description" data-dcnode-id="1189"><span data-dcnode-id="1190" instrument_node="">This Navy battleship was used in both World Wars many decades ago. It was also the first Navy ship to be transformed into a museum and listed as a National Historic Landmark. Touring a warship and picturing the brutal fights and conditions the soldiers endured is a humbling experience, to say the least.</span></div><span data-dcnode-id="1188" instrument_node="">

</span><figcaption class="gallery-caption" data-dcnode-id="1171"><span data-dcnode-id="1172" instrument_node="">3. Texas State Capitol (Austin)</span></figcaption><span data-dcnode-id="1170" instrument_node="">

</span></div><span data-dcnode-id="1163" instrument_node="">
</span><div class="gallery-credit" data-dcnode-id="1160"><a data-dcnode-id="1161" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/44534236%40N00/16081493946/in/photolist-qv4RT1-jvHga-8tiVzd-2h9iMu-6pFU3e-bVuRqu-6pFUzX-jvHg8-5ddkb-CQGfb-3y9kFQ-6pL8dE-2vrwfz-iBhmb-4DLMkz-o54i7M-4DR2GL-diCY5s-djEvDP-diCXHo-4DR3ed-9cp9H-beaMh-qy59E-5c7W9B-6EUnfV-7QvTiu-2aNt7-93byt-eNkN4e-6iTq3M-atWrGk-dWz5BG-2BpyBL-7MSo3H-bwnvQR-6pFZCX-cmk22-9cp2h-7MWmnC-5v1kf6-3y4Y44-6CuEd9-4GzRbw-4uc6ki-bnUThe-4GvDC2-cJvzYY-cEbeg9-t5Pdo" target="_blank"><span data-dcnode-id="1162" instrument_node="">Flickr/faungg</span></a></div><span data-dcnode-id="1159" instrument_node="">
</span><div class="gallery-description" data-dcnode-id="1157"><span data-dcnode-id="1158" instrument_node="">Instead of flying all the way out to D.C. to tour the nation's capitol, you can just stay right here in Texas - ours is bigger, anyway.</span></div><span data-dcnode-id="1156" instrument_node="">
</span></figure><span data-dcnode-id="1154" instrument_node="">

</span><img alt="" class="gallery-image lazy-load javascript-required" data-dcnode-id="1148" data-pin-description="4. Strand Historic District (Galveston)" data-pin-url="https://www.onlyinyourstate.com/texas/historical-landmarks-tx/" data-src="https://img-aws.ehowcdn.com/700x/cdn.onlyinyourstate.com/wp-content/uploads/2016/04/5718169308_c910ed7814_b-700x466.jpg" height="466" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//img-aws.ehowcdn.com/700x/cdn.onlyinyourstate.com/wp-content/themes/oiys-2017-08/images/img-lazy-load.jpg&amp;raw" width="700"><noscript data-dcnode-id="1146"><span data-dcnode-id="1147" instrument_node="">&lt;img width="700" height="466" src="https://img-aws.ehowcdn.com/700x/cdn.onlyinyourstate.com/wp-content/uploads/2016/04/5718169308_c910ed7814_b-700x466.jpg" class=" gallery-image  lazy-load " alt="" loading="lazy"  data-pin-description="4. Strand Historic District (Galveston)"  data-pin-url="https://www.onlyinyourstate.com/texas/historical-landmarks-tx/" /&gt;</span></noscript><span data-dcnode-id="1145" instrument_node="">

</span><div class="gallery-description" data-dcnode-id="1137"><span data-dcnode-id="1138" instrument_node="">The Strand is the only place I've been aside from New Orleans that has an unmistakable, old-fashioned downtown vibe. From getting ice cream at La King's and watching them hand-spin taffy to popping in all the eclectic shops, this is easily one of my favorite day trips in the state.</span></div><span data-dcnode-id="1136" instrument_node="">

</span><figcaption class="gallery-caption" data-dcnode-id="1131"><span data-dcnode-id="1132" instrument_node="">5. San Jacinto Battlefield (La Porte)</span></figcaption><span data-dcnode-id="1130" instrument_node="">

</span><div class="gallery-credit" data-dcnode-id="1120"><a data-dcnode-id="1121" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/79952617%40N08/9223000367/in/photolist-a37VXL-a37VS9-a355tV-a37VKN-iba18L-a37VVy-a37VMh-ib9ZJ9-bokDff-ib9DR4-quqoZY-f41hFH-quqb23-quqmfu-qLQafT-pPZoXC-qJGz5E-qJGHhb-pQdmic-pPZpej-qLZqT2-qur5Lo-5iy6wg-quyUKH-quqdP7-qLV8Vj-qux5VD-quyLAB-quxvFF-pPZgXL-cHL52J-qLV673-qur29o-pPZjd7-qJGCGu-6QjnH8-quyVXx-quxt3K-quxdyV-quq3md-quqgjs-pPZmN7-pPZkSQ-qur3qw-pPZd4U" target="_blank"><span data-dcnode-id="1122" instrument_node="">Flickr/Sarah Reveley</span></a></div><span data-dcnode-id="1119" instrument_node="">
</span><div class="gallery-description" data-dcnode-id="1117"><span data-dcnode-id="1118" instrument_node="">This famous monument is such an important part of Texas history, and therefore a must-see landmark. It designates the site of the Battle of San Jacinto in 1836 that officially won us our independence from Mexico. If you think you couldn't possibly be any prouder to be a Texan, you'll rethink that as soon as you take a trip here.</span></div><span data-dcnode-id="1116" instrument_node="">

</span><figcaption class="gallery-caption" data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node="">6. Spindletop Gusher (Beaumont)</span></figcaption><span data-dcnode-id="1110" instrument_node="">
</span><div class="gallery-image-container" data-dcnode-id="1104"><span data-dcnode-id="1109" instrument_node="">
</span><img alt="" class="gallery-image lazy-load javascript-required" data-dcnode-id="1108" data-pin-description="6. Spindletop Gusher (Beaumont)" data-pin-url="https://www.onlyinyourstate.com/texas/historical-landmarks-tx/" data-src="https://img-aws.ehowcdn.com/700x/cdn.onlyinyourstate.com/wp-content/uploads/2016/04/8095417444_b2cd62ea67_k-1-700x465.jpg" height="465" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//img-aws.ehowcdn.com/700x/cdn.onlyinyourstate.com/wp-content/themes/oiys-2017-08/images/img-lazy-load.jpg&amp;raw" width="700"><noscript data-dcnode-id="1106"><span data-dcnode-id="1107" instrument_node="">&lt;img width="700" height="465" src="https://img-aws.ehowcdn.com/700x/cdn.onlyinyourstate.com/wp-content/uploads/2016/04/8095417444_b2cd62ea67_k-1-700x465.jpg" class=" gallery-image  lazy-load " alt="" loading="lazy"  data-pin-description="6. Spindletop Gusher (Beaumont)"  data-pin-url="https://www.onlyinyourstate.com/texas/historical-landmarks-tx/" /&gt;</span></noscript><span data-dcnode-id="1105" instrument_node="">
</span></div><span data-dcnode-id="1103" instrument_node="">
</span><div class="gallery-credit" data-dcnode-id="1100"><a data-dcnode-id="1101" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/michael_reed/8095417444/in/photolist-dDU7vo-dDNJTz-dkn8eL-VXnGB-dkn8oP-dn8n3p-dkn8yQ" target="_blank"><span data-dcnode-id="1102" instrument_node="">Flickr/michael_reed</span></a></div><span data-dcnode-id="1099" instrument_node="">
</span><div class="gallery-description" data-dcnode-id="1097"><span data-dcnode-id="1098" instrument_node="">Spindletop is another landmark that played a huge role in the development of not only our state but our entire nation. Without it, many of the oil companies we know today wouldn't exist (and gas prices would be through the roof!).</span></div><span data-dcnode-id="1096" instrument_node="">

</span><div class="gallery-description" data-dcnode-id="1077"><span data-dcnode-id="1078" instrument_node="">The USS Lexington is another war ship, but it fought in WWII and the Cold War. It's nicknamed "The Blue Ghost," and it was the fifth US Navy ship named in honor of the Revolutionary War's Battle of Lexington. It is now a museum open to the public.</span></div><span data-dcnode-id="1076" instrument_node="">

</span><div class="gallery-description" data-dcnode-id="1025"><span data-dcnode-id="1026" instrument_node="">Though the house that stands today isn't the original due to a fire in 2008, the Governor's Mansion is definitely still worth a visit. It was the very first designated landmark in Texas, and every governor since 1856 has lived here.</span></div><span data-dcnode-id="1024" instrument_node="">

</span><img alt="" class="gallery-image lazy-load javascript-required" data-dcnode-id="1016" data-pin-description="10. Fort Davis (Fort Davis)" data-pin-url="https://www.onlyinyourstate.com/texas/historical-landmarks-tx/" data-src="https://img-aws.ehowcdn.com/700x/cdn.onlyinyourstate.com/wp-content/uploads/2016/04/748845522_ceca428351_o-700x525.jpg" height="525" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//img-aws.ehowcdn.com/700x/cdn.onlyinyourstate.com/wp-content/themes/oiys-2017-08/images/img-lazy-load.jpg&amp;raw" width="700"><noscript data-dcnode-id="1014"><span data-dcnode-id="1015" instrument_node="">&lt;img width="700" height="525" src="https://img-aws.ehowcdn.com/700x/cdn.onlyinyourstate.com/wp-content/uploads/2016/04/748845522_ceca428351_o-700x525.jpg" class=" gallery-image  lazy-load " alt="" loading="lazy"  data-pin-description="10. Fort Davis (Fort Davis)"  data-pin-url="https://www.onlyinyourstate.com/texas/historical-landmarks-tx/" /&gt;</span></noscript><span data-dcnode-id="1013" instrument_node="">

</span><div class="gallery-description" data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">This fort has been around since the mid-19th century, so it's seen a lot of war and definitely been weathered by the elements over the years. It protected migrants and was the control center of the Great Comanche and Mescalero Apache war trails in the late 1800s. Needless to say, you'll definitely learn something and feel like you've been sent back in time if you take a trip here.</span></div><span data-dcnode-id="1004" instrument_node="">

</span><h1 data-dcnode-id="307"><span data-dcnode-id="308" instrument_node="">On THIS DAY In History, The Unthinkable Happened In Texas</span></h1><span data-dcnode-id="306" instrument_node="">
</span><p data-dcnode-id="301"><span data-dcnode-id="305" instrument_node="">Okay, so maybe not </span><em data-dcnode-id="303"><span data-dcnode-id="304" instrument_node="">unthinkable, </span></em><span data-dcnode-id="302" instrument_node="">but it’s still pretty neat. Texas has played a big role in the oil industry for a long time, the most notable example being Spindletop. But I bet you didn’t know that every time you pump your gas at an Exxon station, you’re buying from a company that has its roots in our state. Without the Magnolia Petroleum Company, who knows where our entire nation would be today? Most likely nowhere good.</span></p><span data-dcnode-id="300" instrument_node="">
</span><div class="gallery gallery-instance-1 gallery-post-329709" data-dcnode-id="199" id="gallery-1"><span data-dcnode-id="299" instrument_node="">

</span><div class="gallery-description" data-dcnode-id="218"><span data-dcnode-id="219" instrument_node="">This company's importance can't be stressed enough because it combined with Exxon in 1999 to form ExxonMobil, one of the largest oil and gas corporations in America and the entire world. Without the original Magnolia Company, gas prices would most likely be much higher today, petroleum might not be as easily accessible, and the United States may not have evolved into the greatest oil superpower in the world.</span></div><span data-dcnode-id="217" instrument_node="">
