</span><p data-dcnode-id="1078"><span data-dcnode-id="1081" instrument_node="">Larger than all the other Hawaiian islands combined, Hawaii's Big Island offers an amazing variety of things to see and do. Home to 11 of the world's 13 climate zones, there are tons of Big Island activities, no matter what your interests. Unique to the Big Island are sightseeing trips to the Hawaii Volcanoes National Park. Explore lava tubes and sulphur banks, hike the "Devastation Trail" and take amazing photos of volcanic craters and lava fields. </span><br data-dcnode-id="1080"><span data-dcnode-id="1079" instrument_node="">
</span></p><span data-dcnode-id="1077" instrument_node="">
</span><p align="left" data-dcnode-id="1073"><span data-dcnode-id="1076" instrument_node="">Hawaii Discount offers the best selection of activities on Hawaii's Big Island as well as a wide variety of Big Island tours, so you are sure to find what you are looking for. Our discounts help you save on your favorite things to do on the island. Check out the popular Big Island activities below, or find the activity of your choice in our detailed list on the right.</span><br data-dcnode-id="1075"><span data-dcnode-id="1074" instrument_node="">
</span></p><span data-dcnode-id="1072" instrument_node="">

</span><h1 align="center" class="GreenLrg" data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">Big Island Activities and Things to Do</span></h1><span data-dcnode-id="610" instrument_node="">
</span><p data-dcnode-id="608"><span data-dcnode-id="609" instrument_node="">The Big Island is also one of the best places in the world for stargazing. Drive up to the Mauna Kea Visitor Information Station, located at 9,200 feet above sea level, where you'll have the unique opportunity to look through a telescope and learn more about the stars in the night sky. Up on Mauna Kea's summit (at an elevation of 13,803 feet) are the Mauna Kea Observatories, a collection of astronomical research facilities, including 12 world-class telescopes. </span></p><span data-dcnode-id="607" instrument_node="">
</span><p data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">For water lovers the Big Island won't disappoint either. There are many great swimming beaches, as well as prime snorkeling and scuba diving locations. One such place, for example, is Kealakekua Bay, home to an amazing coral reef and a large variety of tropical fish and turtles. There are boat tours that take you to the best snorkel sites inside this large bay. Or if you enjoy paddling, you can join a kayaking adventure.</span></p><span data-dcnode-id="604" instrument_node="">
</span><p data-dcnode-id="602"><span data-dcnode-id="603" instrument_node="">Other unique Big Island activities are manta ray night diving excursions. Snorkel or dive among manta rays off the Big Island's Kona Coast – a truly memorable and once-in-a-lifetime experience. Other water-based Big Island activities are snuba (a fun alternative to snorkeling or scuba diving) and surfing. For those who would like to explore the Big Island's underwater world without having to get wet, there are glass bottom boat and submarine tours. Another popular activity is swimming with dolphins in the ocean. Dolphin excursions depart from the Kona area and offer a great opportunity to see these amazing mammals up close. If you're on the Big Island in the winter months, between November and March, a fun thing to do is whale watching. </span></p><span data-dcnode-id="601" instrument_node="">
</span><p data-dcnode-id="599"><span data-dcnode-id="600" instrument_node="">The Big Island also offers access to some prime deep sea fishing grounds. Ever wanted to fish for a huge Pacific Blue Marlin, Mahi Mahi (Dorado), Ono (Wahoo) or Ahi (Yellowfin Tuna)? Here's your chance! Come aboard a Big Island fishing charter for an unforgettable big game fishing excursion. </span></p><span data-dcnode-id="598" instrument_node="">
</span><p data-dcnode-id="596"><span data-dcnode-id="597" instrument_node="">Perfect for newlyweds or for couples looking for something special or romantic to do are shoreline cruises. Nothing beats a romantic dinner while sailing into the sunset. The Big Island also offers eco adventures. Experience the thrill of floating in a mountain kayak and take part in an unforgettable kayak journey through the Big Island's jungle and earth tunnels! </span></p><span data-dcnode-id="595" instrument_node="">
</span><p data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">For nature lovers the Big Island offers a large number of hiking trails, everything from guided volcano hikes to excursions into the deep rainforests. The Big Island is also the best Hawaiian island for horseback riding. Home to the Hawaiian paniolo (cowboys), there are several ranches that offer guided horseback riding tours that are ideal for beginners as well as advanced riders. Even horseback rides for children are available.</span></p><span data-dcnode-id="592" instrument_node="">
</span><p data-dcnode-id="590"><span data-dcnode-id="591" instrument_node="">So one thing is sure, the Big Island of Hawaii will keep you happily occupied. Hawaii Discount offers the largest selection of Big Island activities and best of all, at discounted prices. </span></p><span data-dcnode-id="589" instrument_node="">
  If you would like to read more about the many Big Island attractions and sights of interest, please visit our </span><a data-dcnode-id="587" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//player.vimeo.com/bigisland/sightseeing/landmarks.htm"><span data-dcnode-id="588" instrument_node="">Big Island landmarks</span></a><span data-dcnode-id="586" instrument_node=""> and </span><a data-dcnode-id="584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//player.vimeo.com/beaches/big-island.htm"><span data-dcnode-id="585" instrument_node="">Big Island beaches</span></a><span data-dcnode-id="583" instrument_node=""> page.To get an overview of everything there is to do and see in Hawaii, please visit our </span><a data-dcnode-id="581" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//player.vimeo.com/tours.htm"><span data-dcnode-id="582" instrument_node="">Hawaii tours</span></a><span data-dcnode-id="580" instrument_node=""> page.</span></div><span data-dcnode-id="578" instrument_node="">
