</span><h2 class="" data-dcnode-id="1301"><span data-dcnode-id="1302" instrument_node="">Atlanta, Georgia</span></h2><span data-dcnode-id="1300" instrument_node="">
</span><p data-dcnode-id="1274"><span data-dcnode-id="1299" instrument_node="">Kids who love movies and TV shows will likely recognize many of the sites in Atlanta because the city has grown to become the de facto Hollywood. </span><em data-dcnode-id="1297"><span data-dcnode-id="1298" instrument_node="">The Walking Dead</span></em><span data-dcnode-id="1296" instrument_node="">, </span><em data-dcnode-id="1294"><span data-dcnode-id="1295" instrument_node="">The Hunger Games</span></em><span data-dcnode-id="1293" instrument_node="">, many of Marvel’s recent superhero films, </span><em data-dcnode-id="1291"><span data-dcnode-id="1292" instrument_node="">The Vampire Diaries</span></em><span data-dcnode-id="1290" instrument_node="">, and </span><em data-dcnode-id="1288"><span data-dcnode-id="1289" instrument_node="">Stranger Things</span></em><span data-dcnode-id="1287" instrument_node=""> have all been </span><a data-dcnode-id="1285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rd.com/list/iconic-movie-sets-you-can-visit-in-real-life/"><span data-dcnode-id="1286" instrument_node="">filmed here</span></a><span data-dcnode-id="1284" instrument_node="">. History buffs can go deep into the civil rights movement through world-class museums like the National Center for Civil and Human Rights, as well as several must-see Dr. King landmarks. Meanwhile, sports fans have shiny new stadiums to enjoy football, soccer, and baseball, as well as Olympic Park, which is now a 22-acre green space with events, fountains, and those famous Olympic rings.&nbsp;There’s also the Center for Puppetry Arts, which boasts artifacts from </span><em data-dcnode-id="1282"><span data-dcnode-id="1283" instrument_node="">Sesame Street</span></em><span data-dcnode-id="1281" instrument_node="">, </span><em data-dcnode-id="1279"><span data-dcnode-id="1280" instrument_node="">The Dark Crystal</span></em><span data-dcnode-id="1278" instrument_node="">, and&nbsp;</span><em data-dcnode-id="1276"><span data-dcnode-id="1277" instrument_node="">The Muppets</span></em><span data-dcnode-id="1275" instrument_node="">.</span></p><span data-dcnode-id="1273" instrument_node="">
</span><p data-dcnode-id="1271"><span data-dcnode-id="1272" instrument_node="">Access all of that and more from the Hilton Garden Inn Downtown. This budget-friendly hotel puts you within walking distance from everything Atlanta has to offer—and offers up both indoor and outdoor heated pools.</span></p><span data-dcnode-id="1270" instrument_node="">
</span><p class="listicle-page__cta-button-shop" data-dcnode-id="1267"><a class="shop-btn" data-dcnode-id="1268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tripadvisor.com/Hotel_Review-g60898-d673799-Reviews-Hilton_Garden_Inn_Atlanta_Downtown-Atlanta_Georgia.html" rel="nofollow" target="_blank"><span data-dcnode-id="1269" instrument_node="">Book Now</span></a></p><span data-dcnode-id="1266" instrument_node="">

</span><h2 class="" data-dcnode-id="1236"><span data-dcnode-id="1237" instrument_node="">Cañon City, Colorado</span></h2><span data-dcnode-id="1235" instrument_node="">
</span><p data-dcnode-id="1233"><span data-dcnode-id="1234" instrument_node="">Nothing against Denver, it’s a lovely city, but Cañon City is the place to be for an affordable family destination in Colorado. About two hours from Mile High City, it is home to a plethora of outdoor adventures and stunning sights. Check out the gorgeous Royal Gorge railway, go skydiving, and take a horseback ride through the orange rocks of Garden of the Gods. What will make this Colorado destination even more special is booking an impeccable Royal Gorge Cabin as your palatial retreat instead of roughing it while in the Wild West. Not only will you enjoy all the creature comforts of home, but the location is also central to everything in this rugged outdoor paradise, including whitewater-rafting trips that depart from right across the street.</span></p><span data-dcnode-id="1232" instrument_node="">

</span><h2 data-dcnode-id="1173"><span data-dcnode-id="1174" instrument_node="">Ottawa, Ontario</span></h2><span data-dcnode-id="1172" instrument_node="">
</span><p data-dcnode-id="1167"><span data-dcnode-id="1171" instrument_node="">Assuming the border reopens sometime soon, a visit to the capital of our friendly northern neighbor ranks as one of the better family vacation ideas for those looking to experience something new and different. After taking free tours of the impressive capitol building, walking through the colorful Byward Market, visiting the Royal Canadian Mint, and checking out the cool hockey exhibits inside the Canadian Museum of History, you and your kids will probably start adding a “u” to words like </span><em data-dcnode-id="1169"><span data-dcnode-id="1170" instrument_node="">favourite</span></em><span data-dcnode-id="1168" instrument_node=""> just like a real Canadian!</span></p><span data-dcnode-id="1166" instrument_node="">
</span><p data-dcnode-id="1164"><span data-dcnode-id="1165" instrument_node="">When in Ottawa, splurge on a stay at the glamorous Fairmount Chateau Laurier. It’s one of the prettiest hotels in North America, and it will make your kids feel like princes and princesses. They may even be inspired to learn a little French while they’re playing royalty!</span></p><span data-dcnode-id="1163" instrument_node="">
</span><p class="listicle-page__cta-button-shop" data-dcnode-id="1160"><a class="shop-btn" data-dcnode-id="1161" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tripadvisor.com/Hotel_Review-g155004-d182974-Reviews-Fairmont_Chateau_Laurier-Ottawa_Ontario.html" rel="nofollow" target="_blank"><span data-dcnode-id="1162" instrument_node="">Book Now</span></a></p><span data-dcnode-id="1159" instrument_node="">

</span><h2 class="" data-dcnode-id="1129"><span data-dcnode-id="1130" instrument_node="">Burlington, Vermont, and Montreal, Quebec</span></h2><span data-dcnode-id="1128" instrument_node="">
</span><p data-dcnode-id="1123"><span data-dcnode-id="1127" instrument_node="">These two charming cities are so close and yet so far from each other. Paddleboat on Lake Champlain in the former, and practice your French as you order pain au chocolats in the latter. Separated by one (currently closed) border and only 95 short miles, these destinations will let you enjoy the best of both worlds as you explore the natural mecca of Vermont and the cosmopolitan charm of Montreal. While in Burlington, take a tour of the Vermont Teddy Bear Company and Ben &amp; Jerry’s Ice Cream, and visit with the animals at Shelburne Farms. Green Mountain Suites is a luxurious yet affordable home base for exploring this region, and the ski lodge aesthetic inside and fire pits outside will make you feel warm and welcome. If skiing’s your thing, you’ll want to bookmark this list of the </span><a data-dcnode-id="1125" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rd.com/list/best-places-to-skii/"><span data-dcnode-id="1126" instrument_node="">best places to ski</span></a><span data-dcnode-id="1124" instrument_node=""> this winter.</span></p><span data-dcnode-id="1122" instrument_node="">
</span><p class="listicle-page__cta-button-shop" data-dcnode-id="1119"><a class="shop-btn" data-dcnode-id="1120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tripadvisor.com/Hotel_Review-g57402-d110316-Reviews-Green_Mountain_Suites_Hotel-South_Burlington_Vermont.html" rel="nofollow" target="_blank"><span data-dcnode-id="1121" instrument_node="">Book Now</span></a></p><span data-dcnode-id="1118" instrument_node="">

</span><h2 class="" data-dcnode-id="1086"><span data-dcnode-id="1087" instrument_node="">Boston, Massachusetts</span></h2><span data-dcnode-id="1085" instrument_node="">
</span><p data-dcnode-id="1083"><span data-dcnode-id="1084" instrument_node="">Boston is full of history on land and in the harbor where a lot of tea was once spilled as America began to fight for its independence from Britain. During a long weekend in this old city, take a historic ghost tour to learn about the supernatural side of things in Beantown, visit the fantastic New England Aquarium, catch a Red Sox game at legendary Fenway Park, and then finish off your day with a drink on the rooftop bar of the Cambria Hotel. This affordable, beautifully designed, and literary-inspired hotel is an easy walk to the famous ducklings in Boston Common and the even more famous Cheers bar, but for a quicker path into downtown, the “T” at the Broadway MBTA Station is right outside. If you’re a bookworm, spend a few hours inside the stunning Boston Athenæum, one of the oldest independent libraries in the United States that has a darling children’s and YA section!</span></p><span data-dcnode-id="1082" instrument_node="">
</span><p class="listicle-page__cta-button-shop" data-dcnode-id="1079"><a class="shop-btn" data-dcnode-id="1080" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tripadvisor.com/Hotel_Review-g60745-d15618152-Reviews-Cambria_Hotel_Boston_Downtown-Boston_Massachusetts.html" rel="nofollow" target="_blank"><span data-dcnode-id="1081" instrument_node="">Book Now</span></a></p><span data-dcnode-id="1078" instrument_node="">

</span><h2 class="" data-dcnode-id="1023"><span data-dcnode-id="1024" instrument_node="">Lubbock, Texas</span></h2><span data-dcnode-id="1022" instrument_node="">
</span><p data-dcnode-id="1017"><span data-dcnode-id="1021" instrument_node="">Is a trip to Lubbock a left-field selection as far as family vacation ideas go? It sure is, but this west Texas town is thriving thanks to one of the most spectacular public art collections found anywhere on Earth—massive sculptures scattered all over Texas Tech University’s campus. Tours are free and involve riding around in a cute trolley, so even your little ones will be in heaven. Downtown is on the rise and full of mid-century architecture, so you’ll love wandering around and looking up, as well as popping into stellar restaurants like The Nicolette to sample the local wine scene, as there are some </span><a data-dcnode-id="1019" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rd.com/list/best-wineries/"><span data-dcnode-id="1020" instrument_node="">great wineries</span></a><span data-dcnode-id="1018" instrument_node=""> to visit. And if you can, enjoy a show at the glittering new Buddy Holly Performing Arts Center. (Lubbock was his home, FYI.)</span></p><span data-dcnode-id="1016" instrument_node="">
</span><p data-dcnode-id="1011"><span data-dcnode-id="1015" instrument_node="">To get the kids on board with this grown-up plan, promise them an hour at Prairie Dog Town. This public park is every bit as fun (and as literal) as the name suggests. Bring some bread or carrots and feed the little cuties for free! Families will also love the brand-new Cotton Court Hotel on Broadway. The grassy courtyard is abuzz with activity every night—multiple fire pits, rocking chairs, live music, a bar, and a pool. Now that you have your family vacation planned, check out these </span><a data-dcnode-id="1013" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rd.com/list/romantic-weekend-getaways/"><span data-dcnode-id="1014" instrument_node="">romantic couples getaways</span></a><span data-dcnode-id="1012" instrument_node=""> for a little grown-up time, too.</span></p><span data-dcnode-id="1010" instrument_node="">
</span><p class="listicle-page__cta-button-shop" data-dcnode-id="1007"><a class="shop-btn" data-dcnode-id="1008" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tripadvisor.com/Hotel_Review-g56208-d21283724-Reviews-Cotton_Court_Hotel-Lubbock_Texas.html" rel="nofollow" target="_blank"><span data-dcnode-id="1009" instrument_node="">Book Now</span></a></p><span data-dcnode-id="1006" instrument_node="">
