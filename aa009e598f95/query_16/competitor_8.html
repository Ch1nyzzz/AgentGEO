</span><span class="hs_cos_wrapper hs_cos_wrapper_widget hs_cos_wrapper_type_custom_widget" data-dcnode-id="1056" data-hs-cos-general-type="widget" data-hs-cos-type="custom_widget" id="hs_cos_wrapper_wizard_module_175003907271214265933383738997793252488" style=""><span data-dcnode-id="1079" instrument_node="">
</span><div class="accordion" data-dcnode-id="1057"><span data-dcnode-id="1078" instrument_node="">
</span><div class="accordion_group" data-dcnode-id="1059"><span data-dcnode-id="1077" instrument_node="">
</span><div class="accordion_header" data-dcnode-id="1073"><span class="accordion_icon" data-dcnode-id="1075"><i class="fa fa-plus-square" data-dcnode-id="1076" style="font-size: undefined; color: undefined;"></i></span><span data-dcnode-id="1074" instrument_node=""> What kind of Family Vacations do you offer?</span></div><span data-dcnode-id="1072" instrument_node="">
</span><div class="accordion_content" data-dcnode-id="1061"><span data-dcnode-id="1071" instrument_node="">
</span><p data-dcnode-id="1069"><span data-dcnode-id="1070" instrument_node="">Vacationkids gives you the world.&nbsp; If you can dream it, we can create it.If there is a destination your family wants to visit, we can make it happen for you.</span></p><span data-dcnode-id="1068" instrument_node="">
</span><p data-dcnode-id="1066"><span data-dcnode-id="1067" instrument_node="">For the past 20 years, we've partner with all the major, respected travel brands. If you're looking for a family friendly hotel, a cruise for your crew, a tour guide for your clan, a visit to a theme park or even all of the above...yes, we can do that for you.</span></p><span data-dcnode-id="1065" instrument_node="">
</span><p data-dcnode-id="1063"><span data-dcnode-id="1064" instrument_node="">The majority of the destinations we recommend have been personally visited by one of our team members. We invest in personal travel ourselves so that we can vet our travel partners and offer our clients first hand knowledge, experiences and peace of mind.&nbsp; It allows gives us the opportunity to make connections with local, family friendly travel partners all around the world. These personal contacts is how we can create family vacation experiences that you won't find online.</span></p><span data-dcnode-id="1062" instrument_node="">
</span></div><span data-dcnode-id="1060" instrument_node="">
</span></div><span data-dcnode-id="1058" instrument_node="">
</span></div></span></div><span data-dcnode-id="1053" instrument_node="">
</span></div><span data-dcnode-id="1050" instrument_node="">
</span></div><span data-dcnode-id="1047" instrument_node="">
</span></div><span data-dcnode-id="1044" instrument_node="">
</span><div class="row-fluid-wrapper row-depth-1 row-number-20" data-dcnode-id="999"><span data-dcnode-id="1043" instrument_node="">
</span><div class="row-fluid" data-dcnode-id="1002"><span data-dcnode-id="1042" instrument_node="">
</span><div class="span12 widget-span widget-type-custom_widget" data-dcnode-id="1005" data-w="12" data-widget-type="custom_widget" data-x="0" style=""><span data-dcnode-id="1041" instrument_node="">
</span><div class="cell-wrapper layout-widget-wrapper" data-dcnode-id="1008"><span data-dcnode-id="1040" instrument_node="">
</span><span class="hs_cos_wrapper hs_cos_wrapper_widget hs_cos_wrapper_type_custom_widget" data-dcnode-id="1009" data-hs-cos-general-type="widget" data-hs-cos-type="custom_widget" id="hs_cos_wrapper_wizard_module_176706883148128587319350775818991977042" style=""><span data-dcnode-id="1039" instrument_node="">
</span><div class="accordion" data-dcnode-id="1010"><span data-dcnode-id="1038" instrument_node="">
</span><div class="accordion_group" data-dcnode-id="1012"><span data-dcnode-id="1037" instrument_node="">
</span><div class="accordion_header" data-dcnode-id="1033"><span class="accordion_icon" data-dcnode-id="1035"><i class="fa fa-plus-square" data-dcnode-id="1036" style="font-size: undefined; color: undefined;"></i></span><span data-dcnode-id="1034" instrument_node=""> How Much Do Your Services Cost?</span></div><span data-dcnode-id="1032" instrument_node="">
</span><div class="accordion_content" data-dcnode-id="1014"><span data-dcnode-id="1031" instrument_node="">
</span><p data-dcnode-id="1028"><span data-dcnode-id="1029"><span data-dcnode-id="1030" instrument_node="">Most Hotels, vacation package, tour companies and cruise lines all INCLUDE travel agent commissions in their published prices. If you do all the work yourself online, they “pocket” the difference.&nbsp;&nbsp;</span></span></p><span data-dcnode-id="1027" instrument_node="">
</span><p data-dcnode-id="1024"><span data-dcnode-id="1025"><span data-dcnode-id="1026" instrument_node="">By working with Vacationkids, you get professional, customized travel planning and the customer service you deserve. You won’t be frustrated spending hours on the internet, hanging on phone hold for eternity or wasting any precious time wondering and worrying. We'll be with you every step of your journey, at the ready to help and answer questions.</span></span></p><span data-dcnode-id="1023" instrument_node="">
</span><p data-dcnode-id="1020"><span data-dcnode-id="1021"><span data-dcnode-id="1022" instrument_node="">Please know the airlines, some apartment rental companies and a few other travel suppliers do not offer any travel agent commissions. There are also situations when we work with families or groups that require or request very complicated itineraries that involve a great deal of research time.</span></span></p><span data-dcnode-id="1019" instrument_node="">
</span><p data-dcnode-id="1016"><span data-dcnode-id="1017"><span data-dcnode-id="1018" instrument_node=""> In these situations, our agents will charge a service fee for the time they spend working on your behalf. Please know you will be notified and must approve any and all service fees.</span></span></p><span data-dcnode-id="1015" instrument_node="">
</span></div><span data-dcnode-id="1013" instrument_node="">
</span></div><span data-dcnode-id="1011" instrument_node="">
</span></div></span></div><span data-dcnode-id="1006" instrument_node="">
</span></div><span data-dcnode-id="1003" instrument_node="">
</span></div><span data-dcnode-id="1000" instrument_node="">
</span></div><span data-dcnode-id="997" instrument_node="">
</span><div class="row-fluid-wrapper row-depth-1 row-number-21" data-dcnode-id="934"><span data-dcnode-id="996" instrument_node="">
</span><div class="row-fluid" data-dcnode-id="937"><span data-dcnode-id="995" instrument_node="">
</span><div class="span12 widget-span widget-type-custom_widget" data-dcnode-id="940" data-w="12" data-widget-type="custom_widget" data-x="0" style=""><span data-dcnode-id="994" instrument_node="">
</span><div class="cell-wrapper layout-widget-wrapper" data-dcnode-id="943"><span data-dcnode-id="993" instrument_node="">
</span><span class="hs_cos_wrapper hs_cos_wrapper_widget hs_cos_wrapper_type_custom_widget" data-dcnode-id="944" data-hs-cos-general-type="widget" data-hs-cos-type="custom_widget" id="hs_cos_wrapper_wizard_module_282508151681044806455563877401425588723" style=""><span data-dcnode-id="992" instrument_node="">

</span><div class="accordion_group" data-dcnode-id="947"><span data-dcnode-id="990" instrument_node="">
</span><div class="accordion_header" data-dcnode-id="986"><span class="accordion_icon" data-dcnode-id="988"><i class="fa fa-plus-square" data-dcnode-id="989" style="font-size: undefined; color: undefined;"></i></span><span data-dcnode-id="987" instrument_node=""> How Does Vacationkids Work? - What Should I Expect?</span></div><span data-dcnode-id="985" instrument_node="">
</span><div class="accordion_content" data-dcnode-id="949"><span data-dcnode-id="984" instrument_node="">
</span><p data-dcnode-id="980"><span data-dcnode-id="981"><a data-dcnode-id="983" id="plan-to-go"></a><span data-dcnode-id="982" instrument_node="">Vacationkids is delighted when we receive your email or call requesting vacation planning help. In return we want to insure that your family's vacation delights and exceeds everyone's expectations.&nbsp;&nbsp;</span></span></p><span data-dcnode-id="979" instrument_node="">
</span><p data-dcnode-id="976"><span data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">One of the travel agents on our team will reach out to you to schedule a complimentary 20 min. phone or video consultation. Having a full understanding of your family's specific needs, wishes, interests and dreams is necessary to create memorable family vacation experiences.&nbsp;&nbsp;</span></span></p><span data-dcnode-id="975" instrument_node="">
</span><p data-dcnode-id="973"><span data-dcnode-id="974" instrument_node="">If you decide you're ready to move ahead with your vacation plans, your agent will ask you to officially register your full contact and payment details with Vacationkids. This is necessary because we often have to act decisely when it comes to making airfare and other reservations and we need this information at the ready.</span></p><span data-dcnode-id="972" instrument_node="">
</span><p data-dcnode-id="969"><span data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">At this point, you will receive 60 days of our unlimited vacation planning help, quotes, research and&nbsp; professional support.&nbsp;</span></span></p><span data-dcnode-id="968" instrument_node="">
</span><p data-dcnode-id="965"><span data-dcnode-id="966"><span data-dcnode-id="967" instrument_node="">If for any reason you decide NOT to make reservations with Vacationkids within those 60 days, your credit card on file will be charged a $150 service fee for the time your agent has invested in your care.&nbsp;</span></span></p><span data-dcnode-id="964" instrument_node="">
</span><p data-dcnode-id="961"><span data-dcnode-id="962"><span data-dcnode-id="963" instrument_node="">Proper vacation planning takes quality time and serious reasearch. Our loyal and dedicated clients deserve our full focus, time and expertise. There are just so many hours in each work day. We need to eliminate browsers, window wishers and others not ready to book their vacations for whatever reason.&nbsp;</span></span></p><span data-dcnode-id="960" instrument_node="">
</span><p data-dcnode-id="957"><span data-dcnode-id="958"><span data-dcnode-id="959" instrument_node="">We must devote our time to clients who are serious about travel. Those who understand and appreciate the level of committment, professionalism and expertise that we offer.</span></span></p><span data-dcnode-id="956" instrument_node="">
</span><p data-dcnode-id="954"><span data-dcnode-id="955" instrument_node="">This is how we insure that&nbsp;when you book with Vacationkids, you will receive the excellent service, care and respect you expect and deserve.</span></p><span data-dcnode-id="953" instrument_node="">
</span><p data-dcnode-id="951"><span data-dcnode-id="952" instrument_node="">&nbsp;</span></p><span data-dcnode-id="950" instrument_node="">
</span></div><span data-dcnode-id="948" instrument_node="">

</span><div class="accordion_header" data-dcnode-id="921"><span class="accordion_icon" data-dcnode-id="923"><i class="fa fa-plus-square" data-dcnode-id="924" style="font-size: undefined; color: undefined;"></i></span><span data-dcnode-id="922" instrument_node=""> Will I Save Money with Vacationkids?</span></div><span data-dcnode-id="920" instrument_node="">
</span><div class="accordion_content" data-dcnode-id="859"><span data-dcnode-id="919" instrument_node="">
</span><p data-dcnode-id="917"><span data-dcnode-id="918" instrument_node="">We work hard to help make your travel dreams affordable. Here's some of what we can do to help:</span></p><span data-dcnode-id="916" instrument_node="">
</span><ul data-dcnode-id="864"><span data-dcnode-id="915" instrument_node="">
</span><li data-dcnode-id="911"><strong data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">Our travel agents have rates that you don't.</span></strong><span data-dcnode-id="912" instrument_node=""> We have&nbsp;access to special rates not available directly to consumers via "book it yourself" travel websites.</span></li><span data-dcnode-id="910" instrument_node="">
</span><li data-dcnode-id="906"><strong data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">Offer suggestions and alternatives</span></strong><span data-dcnode-id="907" instrument_node=""> for the vacation you want to help stretch your travel budget as far as we possibly can.</span></li><span data-dcnode-id="905" instrument_node="">
</span><li data-dcnode-id="901"><strong data-dcnode-id="903"><span data-dcnode-id="904" instrument_node="">We don't waste your money</span></strong><span data-dcnode-id="902" instrument_node="">. We customize your itinerary so that you pay for exactly what your family needs and wants. We want happy clients who are so thrilled with their vacations that they come back to us year after year and tell everyone they know about us.</span></li><span data-dcnode-id="900" instrument_node="">
</span><li data-dcnode-id="896"><strong data-dcnode-id="898"><span data-dcnode-id="899" instrument_node="">We babysit your reservations</span></strong><span data-dcnode-id="897" instrument_node=""> - In some cases, if there is a sale or if the price of your trip drops prior to your departure we will get you a refund or credit.</span></li><span data-dcnode-id="895" instrument_node="">
</span><li data-dcnode-id="889"><strong data-dcnode-id="893"><span data-dcnode-id="894" instrument_node="">How precious is your time?</span></strong><span data-dcnode-id="892" instrument_node=""> Hours can be spent properly planning a family vacation. Often the questions perplexing travelers are ones our agents can immediately answer for you. It's thanks to their years of training and experience.&nbsp;</span><span data-dcnode-id="890"><span data-dcnode-id="891" instrument_node=""> If you have detailed questions or need to plan a complicated itinerary, we do all the work for you. We can make the international phone calls to get your questions answered. We know who and how to reach out to in order to get the job done, saving you hours of frustration.</span></span></li><span data-dcnode-id="888" instrument_node="">
</span><li data-dcnode-id="883"><span data-dcnode-id="884"><strong data-dcnode-id="886"><span data-dcnode-id="887" instrument_node="">Even if you do LOVE planning&nbsp;your own vacations</span></strong><span data-dcnode-id="885" instrument_node=""> - Talking to a professional can give you the ultimate peace of mind. We can take a look at your plans, make sure you haven't missed any important details and even offer advice, tips and suggestions you might not have even thought to enhance your experience.</span></span></li><span data-dcnode-id="882" instrument_node="">
</span><li data-dcnode-id="878"><strong data-dcnode-id="880"><span data-dcnode-id="881" instrument_node="">Our agents can usually price match any "great travel deal"</span></strong><span data-dcnode-id="879" instrument_node=""> that you find yourself online (or explain to you why it could be a scam that you need to avoid).</span></li><span data-dcnode-id="877" instrument_node="">
</span><li data-dcnode-id="873"><strong data-dcnode-id="875"><span data-dcnode-id="876" instrument_node="">We prevent costly mistakes</span></strong><span data-dcnode-id="874" instrument_node=""> that inexperienced travelers often make like missed flight connections, room category problems, proper expectations and more.</span></li><span data-dcnode-id="872" instrument_node="">
</span><li data-dcnode-id="866"><strong data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">Save money on high interest credit cards with our</span></strong><span data-dcnode-id="869" instrument_node=""> </span><a data-dcnode-id="867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vacationkids.com/Vacations-with-kids/bid/334878/Secrets-of-Family-Vacation-Payment-Plans%3FhsLang%3Den-us"><span data-dcnode-id="868" instrument_node="">Vacationkids Layaway program</span></a></li><span data-dcnode-id="865" instrument_node="">
</span></ul><span data-dcnode-id="863" instrument_node="">
</span><p data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">Your vacation is an investment in your dreams. A vacation is full of future memories with your children. Your kids will only be this age once and remember... there are no "do-overs" for a lousy vacation.</span></p><span data-dcnode-id="860" instrument_node="">

</span><div class="accordion_content" data-dcnode-id="816"><span data-dcnode-id="829" instrument_node="">
</span><p data-dcnode-id="825"><span data-dcnode-id="828" instrument_node="">Absolutely! Just like no two families are exactly alike, family vacations are not a "one size fits all" type of product.&nbsp; A family's vacation needs and wishes change as children grow and mature. This is why our</span><span data-dcnode-id="826"><span data-dcnode-id="827" instrument_node="">&nbsp;Family Vacation Advisors consult with each family to create amazing travel experiences based on their preferred travel dates, interests, destination and budget. Our goal is to create vacations that exceed your expectations and are remembers for years to come.</span></span></p><span data-dcnode-id="824" instrument_node="">
</span><p data-dcnode-id="821"><span data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">Our travel advisors don't want to sell you a vacation. They want to become your trusted resource to create amazing travel experiences for your family for years to come. Tell us your travel dreams and we look forward to helping you turn them into reality for your children</span></span></p><span data-dcnode-id="820" instrument_node="">
</span><p data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">&nbsp;&nbsp;</span></p><span data-dcnode-id="817" instrument_node="">

</span><div class="accordion_content" data-dcnode-id="773"><span data-dcnode-id="786" instrument_node="">
</span><p data-dcnode-id="784"><span data-dcnode-id="785" instrument_node="">Certainly!</span></p><span data-dcnode-id="783" instrument_node="">
</span><p data-dcnode-id="781"><span data-dcnode-id="782" instrument_node="">When you have 3 or more children it can be tricky to find vacation options that are fun, comfortable and affordable.&nbsp; This is why we offer all types of accommodations for any size family.</span></p><span data-dcnode-id="780" instrument_node="">
</span><p data-dcnode-id="778"><span data-dcnode-id="779" instrument_node="">Of course, many families know vacations are more fun together.&nbsp; We are very experienced when it comes to extended family vacations, reunions, celebration vacations and even destination weddings.&nbsp; Our team knows how to make sure everyone, including that hard to please relative, is happy and has a fun vacation.</span></p><span data-dcnode-id="777" instrument_node="">
</span><p data-dcnode-id="775"><span data-dcnode-id="776" instrument_node="">In addition, we've coached many families on how to leverage group travel perks, deals and discounts. We can completely automate this process for our clients so all they have to do is invite friends &amp; family to join the fun. We handle all the work so it doesn't become a hassle.</span></p><span data-dcnode-id="774" instrument_node="">

</span><div class="accordion_content" data-dcnode-id="724"><span data-dcnode-id="743" instrument_node="">
</span><p data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">We understand, "vacation anticipation" can be a lot of fun for many people.&nbsp; It's exciting to think about all the places you'll visit and the things you'll do.</span></p><span data-dcnode-id="740" instrument_node="">
</span><p data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">However, if an itinerary is not properly planned, your dream vacation can turn into a costly nightmare. Adults can normally deal with disappointments but it's an entirely different experience when travel problems occur with kids.</span></p><span data-dcnode-id="737" instrument_node="">
</span><p data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">Travel professionals know so many of the mistakes travel novices make can be easily avoided.&nbsp; For example, that cheap flight was priced accordingly because you'll never make your connecting flight!</span></p><span data-dcnode-id="734" instrument_node="">
</span><p data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">Did you know you can enjoy all the fun of planning your own family vacation and travel with confidence?</span></p><span data-dcnode-id="731" instrument_node="">
</span><p data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">Simply Schedule a consultation call with one a travel advisor who is experienced with your vacation destination.&nbsp; Our advisor will review your plans, make professional suggestions and insure you understand all the fine print that can make or break your family's vacation fun.&nbsp; The cost is $50 for an hour to ask a travel professional anything you want to know.</span></p><span data-dcnode-id="728" instrument_node="">
