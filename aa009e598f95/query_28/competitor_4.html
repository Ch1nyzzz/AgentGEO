cnode-id="111"><div class="content-sidebar-wrap" data-dcnode-id="112"><main class="content" data-dcnode-id="186"><article aria-label="The Ultimate Big Island Itinerary For 5 Days" class="post-759 post type-post status-publish format-standard has-post-thumbnail category-hawaii-2 category-hawaiian-islands grow-content-body entry" data-dcnode-id="389"><header class="entry-header" data-dcnode-id="914"><p class="entry-meta" data-dcnode-id="918"><span class="entry-categories" data-dcnode-id="919"><span data-dcnode-id="925" instrument_node=""> </span><a data-dcnode-id="923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.smallworldthisis.com/category/hawaii-2/" rel="category tag"><span data-dcnode-id="924" instrument_node="">Hawaii</span></a><span data-dcnode-id="922" instrument_node="">, </span><a data-dcnode-id="920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.smallworldthisis.com/category/hawaiian-islands/" rel="category tag"><span data-dcnode-id="921" instrument_node="">Hawaiian Islands</span></a></span></p><h1 class="entry-title" data-dcnode-id="916"><span data-dcnode-id="917" instrument_node="">The Ultimate Big Island Itinerary For 5 Days</span></h1><span data-dcnode-id="915" instrument_node="">
</span></header><div class="entry-content" data-dcnode-id="391"><div class="mailmunch-forms-before-post" data-dcnode-id="913" style="display: none !important;"></div><p data-dcnode-id="906"><span data-dcnode-id="912" instrument_node="">Compared to neighboring Hawaiian islands like </span><a data-dcnode-id="908" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.smallworldthisis.com/kauai-itinerary/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="909" style="color: #3366ff;"><span data-dcnode-id="910" style="text-decoration: underline;"><span data-dcnode-id="911" instrument_node="">Kauai</span></span></span></a><span data-dcnode-id="907" instrument_node=""> and Maui, the Big Island of Hawaii feels like a different world with its striking landscape of jet-black lava rocks and its contrasting climates spread across its massive landscape. Here’s a complete Big Island itinerary for 5 days that will help you best maximize your time on this beautiful island.</span></p><span data-dcnode-id="905" instrument_node="">
</span><p data-dcnode-id="902" style="text-align: center;"><em data-dcnode-id="903"><span data-dcnode-id="904" instrument_node="">This post contains affiliate links (with no extra cost to you). Thank you for supporting Small World This Is. </span></em></p><span data-dcnode-id="901" instrument_node="">

</span><h2 data-dcnode-id="893"><strong data-dcnode-id="894"><span data-dcnode-id="895" instrument_node="">Big Island Orientation</span></strong></h2><span data-dcnode-id="892" instrument_node="">
</span><p data-dcnode-id="890"><span data-dcnode-id="891" instrument_node="">The Big Island is the largest island in the Hawaiian Islands. There are six major regions on the island:</span></p><span data-dcnode-id="889" instrument_node="">
</span><ul data-dcnode-id="857"><span data-dcnode-id="888" instrument_node="">
</span><li data-dcnode-id="884"><strong data-dcnode-id="886"><span data-dcnode-id="887" instrument_node="">Kona</span></strong><span data-dcnode-id="885" instrument_node=""> – Kailua-Kona is the most popular town on the west side of the island with sprawling resorts and historical sights aplenty</span></li><span data-dcnode-id="883" instrument_node="">
</span><li data-dcnode-id="879"><strong data-dcnode-id="881"><span data-dcnode-id="882" instrument_node="">Kohala</span></strong><span data-dcnode-id="880" instrument_node=""> – known for its abundance of golf courses (the Big Island has a reputation for being a golfing haven)</span></li><span data-dcnode-id="878" instrument_node="">
</span><li data-dcnode-id="874"><strong data-dcnode-id="876"><span data-dcnode-id="877" instrument_node="">Hamakua Coast</span></strong><span data-dcnode-id="875" instrument_node=""> – stunning drive where you can stop at roadside towns and taro farms</span></li><span data-dcnode-id="873" instrument_node="">
</span><li data-dcnode-id="869"><strong data-dcnode-id="871"><span data-dcnode-id="872" instrument_node="">Hilo</span></strong><span data-dcnode-id="870" instrument_node=""> – located on the east side of the island, this city boasts dramatic waterfalls and its famous farmers’ market</span></li><span data-dcnode-id="868" instrument_node="">
</span><li data-dcnode-id="864"><strong data-dcnode-id="866"><span data-dcnode-id="867" instrument_node="">Puna</span></strong><span data-dcnode-id="865" instrument_node=""> – spend an afternoon in Lava Trees State Park and take a dip in tide pools that are heated by volcanic activity</span></li><span data-dcnode-id="863" instrument_node="">
</span><li data-dcnode-id="859"><strong data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">Kau</span></strong><span data-dcnode-id="860" instrument_node=""> – visit active volcanos and learn more about the history of the island at Hawaii Volcano National Park</span></li><span data-dcnode-id="858" instrument_node="">
</span></ul><span data-dcnode-id="856" instrument_node="">
</span><h2 data-dcnode-id="853"><strong data-dcnode-id="854"><span data-dcnode-id="855" instrument_node="">Highlights of the Big Island</span></strong></h2><span data-dcnode-id="852" instrument_node="">
</span><ul data-dcnode-id="826"><span data-dcnode-id="851" instrument_node="">
</span><li data-dcnode-id="849"><span data-dcnode-id="850" instrument_node="">Hawaii Volcano National Park</span></li><span data-dcnode-id="848" instrument_node="">
</span><li data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">Kona</span></li><span data-dcnode-id="845" instrument_node="">
</span><li data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">Hilo</span></li><span data-dcnode-id="842" instrument_node="">
</span><li data-dcnode-id="840"><span data-dcnode-id="841" instrument_node="">Rainbow Falls</span></li><span data-dcnode-id="839" instrument_node="">
</span><li data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">City of Refuge/Two Step</span></li><span data-dcnode-id="836" instrument_node="">
</span><li data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">Punaluʻu Black Sand Beach</span></li><span data-dcnode-id="833" instrument_node="">
</span><li data-dcnode-id="831"><span data-dcnode-id="832" instrument_node="">Waipio Valley</span></li><span data-dcnode-id="830" instrument_node="">
</span><li data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">Hapuna Beach</span></li><span data-dcnode-id="827" instrument_node="">
</span></ul><span data-dcnode-id="825" instrument_node="">
</span><h2 data-dcnode-id="822"><strong data-dcnode-id="823"><span data-dcnode-id="824" instrument_node="">Should I take a guided tour of the Big Island?</span></strong></h2><span data-dcnode-id="821" instrument_node="">
</span><p data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">One of the best ways to sample the best of what the Big Island has to offer is to take an all-inclusive day tour. Add this tour to the first day of your itinerary and then go back to the sights that you prefer to spend more time at later in your stay.</span></p><span data-dcnode-id="818" instrument_node="">
</span><p data-dcnode-id="812"><a data-dcnode-id="814" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tp.media/r%3Fmarker%3D358980.big%2520island%2520itinerary%26trs%3D166629%26p%3D1922%26u%3Dhttps%253A%252F%252Fwww.viator.com%252Ftours%252FBig-Island-of-Hawaii%252FSmall-Group-Tour-Deluxe-Circle-Island-Experience-with-Restaurant-Lunch%252Fd669-7443P9" rel="nofollow noopener" target="_blank"><span data-dcnode-id="815" style="color: #3366ff;"><span data-dcnode-id="816" style="text-decoration: underline;"><span data-dcnode-id="817" instrument_node="">Big Island Circle Tour</span></span></span></a><span data-dcnode-id="813" instrument_node=""> is an excellent all-day tour that takes visitors to a coffee farm, Waipio Valley, Punaluʻu Black Sand Beach, and Rainbow Falls and includes lunch and hotel pick-up.</span></p><span data-dcnode-id="811" instrument_node="">
</span><h2 data-dcnode-id="808"><strong data-dcnode-id="809"><span data-dcnode-id="810" instrument_node="">When is the best time to visit the Big Island?</span></strong></h2><span data-dcnode-id="807" instrument_node="">
</span><div class="mmtcustom-flight" data-dcnode-id="806" id="mmt-biacdsid-f2ic-jitb-kmil-ictoamttthtc" style=" min-height:250px !important; min-width:320px !important;"></div><p data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">Shoulder seasons between April-June, and September-early November, are ideal when the weather is mild and there aren’t peak crowds. The busiest time of year is during the summertime when schools are out, and during holidays like Christmas and New Year’s.</span></p><span data-dcnode-id="803" instrument_node="">
</span><p data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">The weather is pleasant year-round (it’s Hawaii after all), but the winter can bring some rainstorms, especially on the east side. One of the upsides of the winter season besides fewer crowds is that you might be able to see humpback whales migrating from Alaska-a special treat in itself.</span></p><span data-dcnode-id="800" instrument_node="">
</span><h2 data-dcnode-id="797"><strong data-dcnode-id="798"><span data-dcnode-id="799" instrument_node="">Getting To and Around the Big Island</span></strong></h2><span data-dcnode-id="796" instrument_node="">
</span><p data-dcnode-id="794"><span data-dcnode-id="795" instrument_node="">There are two airports that are located in Kona and Hilo. Kona International Airport (KOA) is the main airport and will most likely be where you will be coming in if you are coming from the mainland or from abroad, as well as interisland connections. Hilo International Airport (ITO) does mostly interisland flights.</span></p><span data-dcnode-id="793" instrument_node="">
</span><p data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">Booking a rental car beforehand is your best bet since the Big Island can take an hour or more to get from one spot to another. A 4-wheel drive is a good choice if you are planning to drive to Green Sand Beach, to the bottom of Waipio Valley, and/or the summit of Mauna Kea. Driving on the Big Island is not without traffic, especially in cities like Kailua-Kona and spots where there are one-lane roads</span></p><span data-dcnode-id="790" instrument_node="">
</span><p data-dcnode-id="784"><span data-dcnode-id="789" instrument_node="">For rental cars, I usually do a search on </span><a data-dcnode-id="786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tp.media/r%3Fmarker%3D358980%26trs%3D166629%26p%3D3814%26u%3Dhttps%253A%252F%252Frentalcars.com" rel="nofollow noopener" target="_blank"><span data-dcnode-id="787" style="text-decoration: underline; color: #3366ff;"><span data-dcnode-id="788" instrument_node="">this site</span></span></a><span data-dcnode-id="785" instrument_node=""> that sorts through the top companies like Hertz, Enterprise, and Avis to get the best deal.</span></p><span data-dcnode-id="783" instrument_node="">
</span><h2 data-dcnode-id="780"><strong data-dcnode-id="781"><span data-dcnode-id="782" instrument_node="">Where To Stay On the Big Island</span></strong></h2><span data-dcnode-id="779" instrument_node="">
</span><p data-dcnode-id="777"><span data-dcnode-id="778" instrument_node="">The Big Island is double the size of all the other islands combined, and choosing where to stay is an important decision that depends on what sights you want to be near.</span></p><span data-dcnode-id="776" instrument_node="">
</span><p data-dcnode-id="774"><span data-dcnode-id="775" instrument_node="">Popular towns are Kailua-Kona on the west coast where you’ll be in the center of cultural attractions, beaches, and Pololu and Waipio Valleys.</span></p><span data-dcnode-id="773" instrument_node="">
</span><div class="mmtcustom-flight" data-dcnode-id="772" id="mmt-biacdsid-f2ic-jitb-kmil-ictoamttthtc" style=" min-height:250px !important; min-width:320px !important;"></div><p data-dcnode-id="770"><span data-dcnode-id="771" instrument_node="">Quieter (and wetter) Hilo on the east side is where you’ll be in closer proximity to places like Hawaii Volcanoes National Park, Akaka Falls, and the lava fields.</span></p><span data-dcnode-id="769" instrument_node="">
</span><h3 data-dcnode-id="764"><span data-dcnode-id="765" style="color: #3366ff;"><a data-dcnode-id="766" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tp.media/r%3Fmarker%3D358980.big%2520island%2520itinerary%26trs%3D166629%26p%3D1922%26u%3Dhttps%253A%252F%252Fwww.booking.com%252Fhotel%252Fus%252Fholiday-inn-express-suites-kailua-kona.html%253Faid%253D397594%2526label%253Dgog235jc-1DCAEoggI46AdIM1gDaIkCiAEBmAExuAEHyAEP2AED6AEB-AECiAIBqAIDuAL-j_ySBsACAdICJDE5ODZhNzAwLWQ3ZmQtNDUxMS1hY2JkLWU0YWYyMGUwNmRiZNgCBOACAQ%2526sid%253Dd411642c453d6b1f625365c1a731cf88%2526all_sr_blocks%253D91110303_310010436_2_1_0%253Bcheckin%253D2022-10-15%253Bcheckout%253D2022-10-16%253Bdest_id%253D20030951%253Bdest_type%253Dcity%253Bdist%253D0%253Bgroup_adults%253D2%253Bgroup_children%253D0%253Bhapos%253D1%253Bhighlighted_blocks%253D91110303_310010436_2_1_0%253Bhpos%253D1%253Bmatching_block_id%253D91110303_310010436_2_1_0%253Bno_rooms%253D1%253Breq_adults%253D2%253Breq_children%253D0%253Broom1%253DA%25252CA%253Bsb_price_type%253Dtotal%253Bsr_order%253Dpopularity%253Bsr_pri_blocks%253D91110303_310010436_2_1_0__27900%253Bsrepoch%253D1650395161%253Bsrpvid%253D8aa1864be9590304%253Btype%253Dtotal%253Bucfs%253D1%2526%2523hotelTmpl" rel="nofollow noopener" style="color: #3366ff;" target="_blank"><strong data-dcnode-id="767"><span data-dcnode-id="768" instrument_node="">Holiday Inn Express Hotel &amp; Suites Kailua-Kona</span></strong></a></span></h3><span data-dcnode-id="763" instrument_node="">
</span><p data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">A reasonably-priced hotel in a central location that allows for an easy drive to either the north or south of the island. Downtown is within walking distance from the hotel, as well as sights like Hulihee Palace. Amenities include an outdoor pool and a free breakfast.</span></p><span data-dcnode-id="760" instrument_node="">

tyle="text-decoration: underline;"><span data-dcnode-id="754" instrument_node="">Check Prices</span></span></a></span></p><span data-dcnode-id="749" instrument_node="">
</span><h3 data-dcnode-id="743"><a data-dcnode-id="744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tp.media/r%3Fmarker%3D358980.big%2520island%2520itinerary%26trs%3D166629%26p%3D4456%26u%3Dhttps%253A%252F%252Fwww.booking.com%252Fhotel%252Fus%252Fkona-seaside.html%253Faid%253D397594%2526label%253Dgog235jc-1DCAEoggI46AdIM1gDaIkCiAEBmAExuAEHyAEP2AED6AEB-AECiAIBqAIDuAKrl_ySBsACAdICJDMwOWRmOTYxLTVkZDgtNGFlZC04M2E3LTFkZTg3OTZlZWU0YtgCBOACAQ%2526sid%253Dd411642c453d6b1f625365c1a731cf88%2526checkin%253D2023-01-11%253Bcheckout%253D2023-01-12%253Bdest_id%253D59903%253Bdest_type%253Dhotel%253Bdist%253D0%253Bgroup_adults%253D2%253Bgroup_children%253D0%253Bhapos%253D1%253Bhpos%253D1%253Bno_rooms%253D1%253Breq_adults%253D2%253Breq_children%253D0%253Broom1%253DA%25252CA%253Bsb_price_type%253Dtotal%253Bsoh%253D1%253Bsr_order%253Dpopularity%253Bsrepoch%253D1650396228%253Bsrpvid%253D36288861fbac0004%253Btype%253Dtotal%253Bucfs%253D1%2526%2523no_availability_msg" rel="nofollow noopener" target="_blank"><strong data-dcnode-id="745"><span data-dcnode-id="746" style="color: #3366ff;"><span data-dcnode-id="747" style="text-decoration: underline;"><span data-dcnode-id="748" instrument_node="">Kona Seaside Hotel</span></span></span></strong></a></h3><span data-dcnode-id="742" instrument_node="">
</span><p data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">This mid-range hotel is a great spot for those who want to be centrally located, but are looking for reasonably priced lodging with no resort fees. The hotel is close to tons of great shopping and dining options, including a restaurant on the property. Best of all it’s a block from the ocean.</span></p><span data-dcnode-id="739" instrument_node="">

</span><p data-dcnode-id="724"><img alt="beach big island hawaii" class="aligncenter wp-image-24478 size-full lazyautosizes lazyloaded" data-dcnode-id="727" data-sizes="auto" data-src="https://ecbtsavvv9c.exactdn.com/wp-content/uploads/2022/03/big-island-itinerary-5-days-1-of-1-min-2.jpg?strip=all&amp;lossy=1&amp;resize=749%2C458&amp;ssl=1" data-srcset="https://ecbtsavvv9c.exactdn.com/wp-content/uploads/2022/03/big-island-itinerary-5-days-1-of-1-min-2.jpg?strip=all&amp;lossy=1&amp;ssl=1 749w, https://ecbtsavvv9c.exactdn.com/wp-content/uploads/2022/03/big-island-itinerary-5-days-1-of-1-min-2-548x335.jpg?strip=all&amp;lossy=1&amp;ssl=1 548w, https://ecbtsavvv9c.exactdn.com/wp-content/uploads/2022/03/big-island-itinerary-5-days-1-of-1-min-2.jpg?strip=all&amp;lossy=1&amp;w=384&amp;ssl=1 384w" decoding="async" height="458" sizes="620px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ecbtsavvv9c.exactdn.com/wp-content/uploads/2022/03/big-island-itinerary-5-days-1-of-1-min-2.jpg%3Fstrip%3Dall%26lossy%3D1%26resize%3D749%252C458%26ssl%3D1&amp;raw" srcset="https://ecbtsavvv9c.exactdn.com/wp-content/uploads/2022/03/big-island-itinerary-5-days-1-of-1-min-2.jpg?strip=all&amp;lossy=1&amp;ssl=1 749w, https://ecbtsavvv9c.exactdn.com/wp-content/uploads/2022/03/big-island-itinerary-5-days-1-of-1-min-2-548x335.jpg?strip=all&amp;lossy=1&amp;ssl=1 548w, https://ecbtsavvv9c.exactdn.com/wp-content/uploads/2022/03/big-island-itinerary-5-days-1-of-1-min-2.jpg?strip=all&amp;lossy=1&amp;w=384&amp;ssl=1 384w" width="749"><noscript data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">&lt;img class="aligncenter wp-image-24478 size-full" src="https://ecbtsavvv9c.exactdn.com/wp-content/uploads/2022/03/big-island-itinerary-5-days-1-of-1-min-2.jpg?strip=all&amp;lossy=1&amp;resize=749%2C458&amp;ssl=1" alt="beach big island hawaii" width="749" height="458" srcset="https://ecbtsavvv9c.exactdn.com/wp-content/uploads/2022/03/big-island-itinerary-5-days-1-of-1-min-2.jpg?strip=all&amp;amp;lossy=1&amp;amp;ssl=1 749w, https://ecbtsavvv9c.exactdn.com/wp-content/uploads/2022/03/big-island-itinerary-5-days-1-of-1-min-2-548x335.jpg?strip=all&amp;amp;lossy=1&amp;amp;ssl=1 548w, https://ecbtsavvv9c.exactdn.com/wp-content/uploads/2022/03/big-island-itinerary-5-days-1-of-1-min-2.jpg?strip=all&amp;amp;lossy=1&amp;amp;w=384&amp;amp;ssl=1 384w" sizes="(max-width: 749px) 100vw, 749px" data-eio="l" /&gt;</span></noscript></p><span data-dcnode-id="723" instrument_node="">
</span><h2 data-dcnode-id="720"><strong data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">5 Days on the Big Island</span></strong></h2><span data-dcnode-id="719" instrument_node="">
</span><h3 data-dcnode-id="714"><strong data-dcnode-id="715"><span data-dcnode-id="718" instrument_node="">Day 1 – City of Refuge, Two Step and Night Swimming with Manta Rays</span><br data-dcnode-id="717"><span data-dcnode-id="716" instrument_node="">
</span></strong></h3><span data-dcnode-id="713" instrument_node="">
</span><p data-dcnode-id="709"><strong data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">Pu’uhoua o Honaunau National Historical Park (City of Refuge)</span></strong><span data-dcnode-id="710" instrument_node=""> is home to an ancient sacred site and a great spot to learn more about Hawaii’s rich history at the informative Visitor’s Center. When I drove down to the park, we went through several climates, passing overcast roadside towns, and closer to the beach it was completely sunny.</span></p><span data-dcnode-id="708" instrument_node="">
</span><div class="mmtcustom-flight" data-dcnode-id="707" id="mmt-biacdsid-f2ic-jitb-kmil-ictoamttthtc" style=" min-height:250px !important; min-width:320px !important;"></div><p data-dcnode-id="703"><strong data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">Pro tip:</span></strong><span data-dcnode-id="704" instrument_node=""> go as early as possible to beat both the crowds and the heat. The park is open from 7 am to 15 minutes after sunset. There are also some picnic tables in the area to eat a picnic lunch at before heading on over to your next stop.</span></p><span data-dcnode-id="702" instrument_node="">
</span><p data-dcnode-id="697"><span data-dcnode-id="701" instrument_node="">A short walk from the City of Refuge is </span><strong data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">Two Step</span></strong><span data-dcnode-id="698" instrument_node="">, one of the best snorkeling spots on the island. Get up close and personal with the dolphins, reef sharks, and numerous species of tropical fish. The coast is made up of lava rock and offers a jumping-off point into the waters below.</span></p><span data-dcnode-id="696" instrument_node="">
</span><p data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">This place is called Two Step because of the natural rock staircase where snorkelers can ease themselves slowly into the water. Make sure to wear protective footgear like aquatic socks that protect your feet against sharp rocks. The water can often be rough, so take the proper precautions and opt for calmer days if possible.</span></p><span data-dcnode-id="693" instrument_node="">
</span><p data-dcnode-id="680"><span data-dcnode-id="692" instrument_node="">At night, </span><strong data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">snorkel with the manta rays</span></strong><span data-dcnode-id="689" instrument_node=""> after watching a stunning Hawaiian sunset aboard the boat. Check out </span><a data-dcnode-id="682" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tp.media/r%3Fmarker%3D358980.big%2520island%2520itinerary%26trs%3D166629%26p%3D1922%26u%3Dhttps%253A%252F%252Fwww.viator.com%252Ftours%252FBig-Island-of-Hawaii%252FSunset-Manta-Ray-Snorkel%252Fd669-8571P1" rel="nofollow noopener" target="_blank"><span data-dcnode-id="686" style="text-decoration: underline;"><span data-dcnode-id="687" style="color: #3366ff; text-decoration: underline;"><span data-dcnode-id="688" instrument_node="">thi</span></span></span><span data-dcnode-id="683" style="text-decoration: underline;"><span data-dcnode-id="684" style="color: #3366ff; text-decoration: underline;"><span data-dcnode-id="685" instrument_node="">s highly-rated tour</span></span></span></a><span data-dcnode-id="681" instrument_node=""> in Kona that is 2.5 hours long and includes light refreshments, gear rental, and a guarantee to see the manta rays or you get another chance free of charge.</span></p><span data-dcnode-id="679" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="673" id="attachment_20719" style="width: 760px"><img alt="city of refuge big island " aria-describedby="caption-attachment-20719" class="wp-image-20719 size-full lazyautosizes lazyloaded" data-dcnode-id="678" data-sizes="auto" data-src="https://ecbtsavvv9c.exactdn.com/wp-content/uploads/2019/04/big-island-itinerary-1-of-1-6-1.jpg?strip=all&amp;lossy=1&amp;resize=750%2C563&amp;ssl=1" data-srcset="https://ecbtsavvv9c.exactdn.com/wp-content/uploads/2019/04/big-island-itinerary-1-of-1-6-1.jpg?strip=all&amp;lossy=1&amp;ssl=1 750w, https://ecbtsavvv9c.exactdn.com/wp-content/uploads/2019/04/big-island-itinerary-1-of-1-6-1-446x335.jpg?strip=all&amp;lossy=1&amp;ssl=1 446w, https://ecbtsavvv9c.exactdn.com/wp-content/uploads/2019/04/big-island-itinerary-1-of-1-6-1.jpg?strip=all&amp;lossy=1&amp;w=384&amp;ssl=1 384w" decoding="async" height="563" sizes="620px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ecbtsavvv9c.exactdn.com/wp-content/uploads/2019/04/big-island-itinerary-1-of-1-6-1.jpg%3Fstrip%3Dall%26lossy%3D1%26resize%3D750%252C563%26ssl%3D1&amp;raw" srcset="https://ecbtsavvv9c.exactdn.com/wp-content/uploads/2019/04/big-island-itinerary-1-of-1-6-1.jpg?strip=all&amp;lossy=1&amp;ssl=1 750w, https://ecbtsavvv9c.exactdn.com/wp-content/uploads/2019/04/big-island-itinerary-1-of-1-6-1-446x335.jpg?strip=all&amp;lossy=1&amp;ssl=1 446w, https://ecbtsavvv9c.exactdn.com/wp-content/uploads/2019/04/big-island-itinerary-1-of-1-6-1.jpg?strip=all&amp;lossy=1&amp;w=384&amp;ssl=1 384w" width="750"><noscript data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">&lt;img aria-describedby="caption-attachment-20719" class="wp-image-20719 size-full" src="https://ecbtsavvv9c.exactdn.com/wp-content/uploads/2019/04/big-island-itinerary-1-of-1-6-1.jpg?strip=all&amp;lossy=1&amp;resize=750%2C563&amp;ssl=1" alt="city of refuge big island " width="750" height="563" srcset="https://ecbtsavvv9c.exactdn.com/wp-content/uploads/2019/04/big-island-itinerary-1-of-1-6-1.jpg?strip=all&amp;amp;lossy=1&amp;amp;ssl=1 750w, https://ecbtsavvv9c.exactdn.com/wp-content/uploads/2019/04/big-island-itinerary-1-of-1-6-1-446x335.jpg?strip=all&amp;amp;lossy=1&amp;amp;ssl=1 446w, https://ecbtsavvv9c.exactdn.com/wp-content/uploads/2019/04/big-island-itinerary-1-of-1-6-1.jpg?strip=all&amp;amp;lossy=1&amp;amp;w=384&amp;amp;ssl=1 384w" sizes="(max-width: 750px) 100vw, 750px" data-eio="l" /&gt;</span></noscript><p class="wp-caption-text" data-dcnode-id="674" id="caption-attachment-20719"><span data-dcnode-id="675" instrument_node="">The stunning City of Refuge should definitely be on your Big Island itinerary for 5 days.</span></p></div><span data-dcnode-id="672" instrument_node="">
</span><h3 data-dcnode-id="667"><strong data-dcnode-id="668"><span data-dcnode-id="671" instrument_node="">Day 2 – Akaka Falls State Park, Hawaii Volcano National Park and Punaluʻu Black Sand Beach</span><br data-dcnode-id="670"><span data-dcnode-id="669" instrument_node="">
</span></strong></h3><span data-dcnode-id="666" instrument_node="">
</span><p data-dcnode-id="662"><strong data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">Akaka Falls State Park&nbsp;</span></strong><span data-dcnode-id="663" instrument_node="">has a short loop hike surrounded by lush greenery that makes you feel as if you’ve been transported to a tropical wonderland. Admire the lush foliage and mini-waterfalls along the paved pathway before reaching the highlight of the hike: the 442-foot Akaka Falls.</span></p><span data-dcnode-id="661" instrument_node="">
</span><p data-dcnode-id="659"><span data-dcnode-id="660" instrument_node="">There are two trail options: the easier one with 50 steps and the more challenging one with 400 steps if you want to feel the burn. The entire hike takes 30-35 minutes to complete. The park is located about 11-miles from Hilo, right off Hwy 220. Parking is $5.</span></p><span data-dcnode-id="658" instrument_node="">
</span><div class="mmtcustom-flight" data-dcnode-id="657" id="mmt-biacdsid-f2ic-jitb-kmil-ictoamttthtc" style=" min-height:250px !important; min-width:320px !important;"></div><p data-dcnode-id="646"><span data-dcnode-id="656" instrument_node="">About an hour south,&nbsp; </span><a data-dcnode-id="651" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nps.gov/havo/index.htm" rel="noopener noreferrer" target="_blank"><strong data-dcnode-id="652"><span data-dcnode-id="653" style="color: #3366ff;"><span data-dcnode-id="654" style="text-decoration: underline;"><span data-dcnode-id="655" instrument_node="">Hawaii Volcano National Park </span></span></span></strong></a><span data-dcnode-id="650" instrument_node="">is worth braving the crowds for to learn more about the two active volcanoes, Kīlauea and Mauna Loa at the </span><strong data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">Kilauea Visitor Center</span></strong><span data-dcnode-id="647" instrument_node="">, where you can also learn what is worth seeing that day.</span></p><span data-dcnode-id="645" instrument_node="">
</span><p data-dcnode-id="634"><span data-dcnode-id="644" instrument_node="">Make your way along the </span><strong data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">Crater Rim Drive</span></strong><span data-dcnode-id="641" instrument_node=""> and stop at the different lookouts and witness things like steam rising from the </span><strong data-dcnode-id="639"><span data-dcnode-id="640" instrument_node="">Kilauea Caldera.</span></strong><span data-dcnode-id="638" instrument_node=""> The </span><strong data-dcnode-id="636"><span data-dcnode-id="637" instrument_node="">Thurston Lava Tube </span></strong><span data-dcnode-id="635" instrument_node="">is a personal favorite, where you can hike through a subterranean cave that was carved out by lava flows and see firsthand how the volcanic activity helped shaped the island.</span></p><div class="mailmunch-forms-in-post-middle" data-dcnode-id="633" style="display: none !important;"></div><span data-dcnode-id="632" instrument_node="">
</span><p data-dcnode-id="628"><strong data-dcnode-id="630"><span data-dcnode-id="631" instrument_node="">The Chain of Craters Road</span></strong><span data-dcnode-id="629" instrument_node=""> is a winding 19-mile road that can be a great addition to your trip to the national park, with spectacular views of lava fields high above the ocean. Make sure to give a least 2.5 hours roundtrip to account for stops.</span></p><span data-dcnode-id="627" instrument_node="">
</span><p data-dcnode-id="622"><span data-dcnode-id="626" instrument_node="">On your way home, stop at </span><strong data-dcnode-id="624"><span data-dcnode-id="625" instrument_node="">Punaluʻu Black Sand Beach, </span></strong><span data-dcnode-id="623" instrument_node="">one of Hawaii’s most famous black sand beaches formed with the lava from nearby volcanos. This beach is a bit rocky and is not the best spot to snorkel or swim, but people still do so when the water is calm. Make sure to wear water shoes if you go in the water to protect your feet.</span></p><span data-dcnode-id="621" instrument_node="">
</span><p data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">Keep your eyes open for the giant green sea turtles sunning themselves on the shore, amid the black sand.</span></p><span data-dcnode-id="618" instrument_node="">
</span><p data-dcnode-id="614"><img alt="hawaii volcano national park" class="aligncenter wp-image-20720 size-full lazyautosizes lazyloaded" data-dcnode-id="617" data-sizes="auto" data-src="https://ecbtsavvv9c.exactdn.com/wp-content/uploads/2019/04/big-island-itinerary-1-of-1-6-min-1.jpg?strip=all&amp;lossy=1&amp;resize=750%2C563&amp;ssl=1" data-srcset="https://ecbtsavvv9c.exactdn.com/wp-content/uploads/2019/04/big-island-itinerary-1-of-1-6-min-1.jpg?strip=all&amp;lossy=1&amp;ssl=1 750w, https://ecbtsavvv9c.exactdn.com/wp-content/uploads/2019/04/big-island-itinerary-1-of-1-6-min-1-446x335.jpg?strip=all&amp;lossy=1&amp;ssl=1 446w, https://ecbtsavvv9c.exactdn.com/wp-content/uploads/2019/04/big-island-itinerary-1-of-1-6-min-1.jpg?strip=all&amp;lossy=1&amp;w=384&amp;ssl=1 384w" decoding="async" height="563" sizes="620px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ecbtsavvv9c.exactdn.com/wp-content/uploads/2019/04/big-island-itinerary-1-of-1-6-min-1.jpg%3Fstrip%3Dall%26lossy%3D1%26resize%3D750%252C563%26ssl%3D1&amp;raw" srcset="https://ecbtsavvv9c.exactdn.com/wp-content/uploads/2019/04/big-island-itinerary-1-of-1-6-min-1.jpg?strip=all&amp;lossy=1&amp;ssl=1 750w, https://ecbtsavvv9c.exactdn.com/wp-content/uploads/2019/04/big-island-itinerary-1-of-1-6-min-1-446x335.jpg?strip=all&amp;lossy=1&amp;ssl=1 446w, https://ecbtsavvv9c.exactdn.com/wp-content/uploads/2019/04/big-island-itinerary-1-of-1-6-min-1.jpg?strip=all&amp;lossy=1&amp;w=384&amp;ssl=1 384w" width="750"><noscript data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">&lt;img class="aligncenter wp-image-20720 size-full" src="https://ecbtsavvv9c.exactdn.com/wp-content/uploads/2019/04/big-island-itinerary-1-of-1-6-min-1.jpg?strip=all&amp;lossy=1&amp;resize=750%2C563&amp;ssl=1" alt="hawaii volcano national park" width="750" height="563" srcset="https://ecbtsavvv9c.exactdn.com/wp-content/uploads/2019/04/big-island-itinerary-1-of-1-6-min-1.jpg?strip=all&amp;amp;lossy=1&amp;amp;ssl=1 750w, https://ecbtsavvv9c.exactdn.com/wp-content/uploads/2019/04/big-island-itinerary-1-of-1-6-min-1-446x335.jpg?strip=all&amp;amp;lossy=1&amp;amp;ssl=1 446w, https://ecbtsavvv9c.exactdn.com/wp-content/uploads/2019/04/big-island-itinerary-1-of-1-6-min-1.jpg?strip=all&amp;amp;lossy=1&amp;amp;w=384&amp;amp;ssl=1 384w" sizes="(max-width: 750px) 100vw, 750px" data-eio="l" /&gt;</span></noscript></p><span data-dcnode-id="613" instrument_node="">
</span><h3 data-dcnode-id="610"><strong data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">Day 3 – Kailua-Kona and Hapuna Beach</span></strong></h3><span data-dcnode-id="609" instrument_node="">
</span><p data-dcnode-id="595"><span data-dcnode-id="608" instrument_node="">Start your day out in </span><strong data-dcnode-id="606"><span data-dcnode-id="607" instrument_node="">Kailua-Kona</span></strong><span data-dcnode-id="605" instrument_node="">, the biggest city on the Gold Coast, walking around </span><b data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">Ali’i Drive</span></b><span data-dcnode-id="602" instrument_node="">, the main seaside thoroughfare in Kailua. Afterward head over to </span><strong data-dcnode-id="600"><span data-dcnode-id="601" instrument_node="">Manini’owali Beach</span></strong><span data-dcnode-id="599" instrument_node=""> (better known as </span><strong data-dcnode-id="597"><span data-dcnode-id="598" instrument_node="">Kua Bay)</span></strong><span data-dcnode-id="596" instrument_node="">, with its dreamy turquoise waters and white sand beach.</span></p><span data-dcnode-id="594" instrument_node="">
</span><div class="mmtcustom-flight" data-dcnode-id="593" id="mmt-biacdsid-f2ic-jitb-kmil-ictoamttthtc" style=" min-height:250px !important; min-width:320px !important;"></div><p data-dcnode-id="585"><span data-dcnode-id="592" instrument_node="">Stop at the</span><strong data-dcnode-id="590"><span data-dcnode-id="591" instrument_node=""> Kona Farmers Market</span></strong><span data-dcnode-id="589" instrument_node="">, for some fresh fruit, produce, and souvenirs. If you love coffee, the trek up to </span><strong data-dcnode-id="587"><span data-dcnode-id="588" instrument_node="">Mountain Thunder Coffee Plantation</span></strong><span data-dcnode-id="586" instrument_node=""> is worth the winding roads to the top of Hualalai Volcano in the middle of the “Cloud Forest,” where you can go on a free tour to learn about what makes Kona coffee so world-famous.</span></p><span data-dcnode-id="584" instrument_node="">
</span><p data-dcnode-id="576"><span data-dcnode-id="583" instrument_node="">Drive down Highway 11, where city life gives way to fertile coffee farmland. In and around </span><strong data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">Captain Cook</span></strong><span data-dcnode-id="580" instrument_node="">, there are plenty of more coffee farms to tour and sample delicious Kona coffee. </span><strong data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">Hala Tree Coffee</span></strong><span data-dcnode-id="577" instrument_node=""> is highly recommended, with free one-hour tours, samples of their organic coffee, and hard-to-beat views of the Kona Coast.</span></p><span data-dcnode-id="575" instrument_node="">
</span><p data-dcnode-id="567"><span data-dcnode-id="574" instrument_node="">Less than half an hour away is </span><strong data-dcnode-id="572"><span data-dcnode-id="573" instrument_node="">Hapuna Beach</span></strong><span data-dcnode-id="571" instrument_node="">, one of the island’s top white sand beaches that is ideal for bringing a good book and soaking up some tropical sun. The waves are a perfect size for boogie boarding, and the waters are home to some excellent snorkeling. An alternative is </span><strong data-dcnode-id="569"><span data-dcnode-id="570" instrument_node="">stunning Kealakekua Bay</span></strong><span data-dcnode-id="568" instrument_node="">, for excellent snorkeling.</span></p><span data-dcnode-id="566" instrument_node="">
</span><p data-dcnode-id="564"><span data-dcnode-id="565" instrument_node="">Rental gear is available next to the snack shack right on the beach, as well as nearby resorts shops. There are lifeguards on duty, as well as clean restrooms that round out a memorable beach day. Parking is $5.</span></p><span data-dcnode-id="563" instrument_node="">
</span><p data-dcnode-id="559"><img alt="hapuna beach hawaii" class="aligncenter wp-image-20721 size-full lazyload" data-dcnode-id="562" data-sizes="auto" data-src="https://ecbtsavvv9c.exactdn.com/wp-content/uploads/2019/04/big-island-itinerary-1-of-1-6-min-2.jpg?strip=all&amp;lossy=1&amp;resize=750%2C563&amp;ssl=1" data-srcset="https://ecbtsavvv9c.exactdn.com/wp-content/uploads/2019/04/big-island-itinerary-1-of-1-6-min-2.jpg?strip=all&amp;lossy=1&amp;ssl=1 750w, https://ecbtsavvv9c.exactdn.com/wp-content/uploads/2019/04/big-island-itinerary-1-of-1-6-min-2-446x335.jpg?strip=all&amp;lossy=1&amp;ssl=1 446w, https://ecbtsavvv9c.exactdn.com/wp-content/uploads/2019/04/big-island-itinerary-1-of-1-6-min-2.jpg?strip=all&amp;lossy=1&amp;w=384&amp;ssl=1 384w" decoding="async" height="563" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAu4AAAIzAQAAAAB3xqGWAAAAAnRSTlMAAHaTzTgAAABKSURBVHgB7cExAQAAAMIg+6deCU9gAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAwFfQ7QAB5BNToAAAAABJRU5ErkJggg==" width="750"><noscript data-dcnode-id="560"><span data-dcnode-id="561" instrument_node="">&lt;img class="aligncenter wp-image-20721 size-full" src="https://ecbtsavvv9c.exactdn.com/wp-content/uploads/2019/04/big-island-itinerary-1-of-1-6-min-2.jpg?strip=all&amp;lossy=1&amp;resize=750%2C563&amp;ssl=1" alt="hapuna beach hawaii" width="750" height="563" srcset="https://ecbtsavvv9c.exactdn.com/wp-content/uploads/2019/04/big-island-itinerary-1-of-1-6-min-2.jpg?strip=all&amp;amp;lossy=1&amp;amp;ssl=1 750w, https://ecbtsavvv9c.exactdn.com/wp-content/uploads/2019/04/big-island-itinerary-1-of-1-6-min-2-446x335.jpg?strip=all&amp;amp;lossy=1&amp;amp;ssl=1 446w, https://ecbtsavvv9c.exactdn.com/wp-content/uploads/2019/04/big-island-itinerary-1-of-1-6-min-2.jpg?strip=all&amp;amp;lossy=1&amp;amp;w=384&amp;amp;ssl=1 384w" sizes="(max-width: 750px) 100vw, 750px" data-eio="l" /&gt;</span></noscript></p><span data-dcnode-id="558" instrument_node="">
</span><h3 data-dcnode-id="552"><strong data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">Day 4 – Pepe‘ekeo Scenic Drive, Honoka‘a and </span></strong><strong data-dcnode-id="553"><span class="js-intro-narrative" data-dcnode-id="554"><span data-dcnode-id="555" instrument_node="">Waipi‘o Valley</span></span></strong></h3><span data-dcnode-id="551" instrument_node="">
</span><p data-dcnode-id="546"><span data-dcnode-id="550" instrument_node="">Take a day trip to the northeastern area of the island, starting with</span><strong data-dcnode-id="548"><span data-dcnode-id="549" instrument_node=""> Pepe‘ekeo Scenic Drive</span></strong><span data-dcnode-id="547" instrument_node="">, a scenic stretch of narrow road along the Old Mamalahoa Hwy that passes through lush jungle landscape (and sometimes occasional downpours). On the way, you’ll pass one-lane bridges spanning over waterfalls and bubbling streams.</span></p><span data-dcnode-id="545" instrument_node="">
</span><p data-dcnode-id="540"><span data-dcnode-id="544" instrument_node="">The cherry on the top is the spectacular view of </span><strong data-dcnode-id="542"><span data-dcnode-id="543" instrument_node="">Onomea Bay</span></strong><span data-dcnode-id="541" instrument_node="">. Although this road meets Highway 19 at both ends, starting your trip from Hilo will make things much easier, since there are signposts between mile markers 7 and 8 directing you where to go.</span></p><span data-dcnode-id="539" instrument_node="">
</span><div class="mmtcustom-flight" data-dcnode-id="538" id="mmt-biacdsid-f2ic-jitb-kmil-ictoamttthtc" style=" min-height:250px !important; min-width:320px !important;"></div><p data-dcnode-id="531"><strong data-dcnode-id="536"><span data-dcnode-id="537" instrument_node="">Honoka‘a </span></strong><span data-dcnode-id="535" instrument_node="">is a tiny charming town (and the only one on the </span><span class="js-intro-narrative" data-dcnode-id="533"><span data-dcnode-id="534" instrument_node="">Hamakua Coast)</span></span><span data-dcnode-id="532" instrument_node=""> that’s a great stopping spot before going onto the Waipi’o Valley. Historically, this town was the third largest of the entire Hawaiian Islands when it was at the peak of its cattle and sugar industries.</span></p><span data-dcnode-id="530" instrument_node="">
</span><p data-dcnode-id="523"><span data-dcnode-id="529" instrument_node="">After the last sugar harvest was processed in 1933, the town slowly reinvented itself and became known for its crops like mushrooms, vanilla, tea, and coffee grown by local farmers. Join a guided tour on one of the farms, including the</span><span class="js-intro-narrative" data-dcnode-id="524"><span data-dcnode-id="528" instrument_node=""> </span><strong data-dcnode-id="526"><span data-dcnode-id="527" instrument_node="">Kahi Ola Mau Farm</span></strong><span data-dcnode-id="525" instrument_node=""> for all things chocolate. </span></span></p><span data-dcnode-id="522" instrument_node="">
</span><p data-dcnode-id="514"><span class="js-intro-narrative" data-dcnode-id="520"><span data-dcnode-id="521" instrument_node="">It</span></span><span data-dcnode-id="519" instrument_node="">s rugged character is especially apparent in events like </span><span class="js-intro-narrative" data-dcnode-id="515"><strong data-dcnode-id="517"><span data-dcnode-id="518" instrument_node="">Honoka‘a Western Week</span></strong><span data-dcnode-id="516" instrument_node="">, which celebrates all things paniolo (Hawaiian cowboys). </span></span></p><span data-dcnode-id="513" instrument_node="">
</span><p data-dcnode-id="505"><span data-dcnode-id="512" instrument_node="">Translating to “curved water” in Hawaiian, </span><strong data-dcnode-id="509"><span class="js-intro-narrative" data-dcnode-id="510"><span data-dcnode-id="511" instrument_node="">Waipi‘o Valley&nbsp;</span></span></strong><span class="js-intro-narrative" data-dcnode-id="507"><span data-dcnode-id="508" instrument_node="">is a</span></span><span data-dcnode-id="506" instrument_node=""> stunning coastal valley that has historical significance being home to Hawaiian royalty until the fifteenth century.</span></p><span data-dcnode-id="504" instrument_node="">
</span><p data-dcnode-id="502"><span data-dcnode-id="503" instrument_node="">There are two ways to get to the valley floor from the lookout, either you can hike the 4.2-mile round trip route to the bottom via the Waimanu or Muliwai Trail, (which is not for the faint of heart since there’s a steep incline), or drive down a winding paved road that only allows 4 wheel drive vehicles.</span></p><span data-dcnode-id="501" instrument_node="">
</span><p data-dcnode-id="499"><span data-dcnode-id="500" instrument_node="">There is a black sand beach at the shoreline that is a popular surf spot.</span></p><span data-dcnode-id="498" instrument_node="">
</span><p data-dcnode-id="494"><img alt="waterfall big island" class="aligncenter wp-image-24474 size-full lazyload" data-dcnode-id="497" data-sizes="auto" data-src="https://ecbtsavvv9c.exactdn.com/wp-content/uploads/2022/03/big-island-itinerary-5-days-1-of-1-min.jpg?strip=all&amp;lossy=1&amp;resize=750%2C561&amp;ssl=1" data-srcset="https://ecbtsavvv9c.exactdn.com/wp-content/uploads/2022/03/big-island-itinerary-5-days-1-of-1-min.jpg?strip=all&amp;lossy=1&amp;ssl=1 750w, https://ecbtsavvv9c.exactdn.com/wp-content/uploads/2022/03/big-island-itinerary-5-days-1-of-1-min-448x335.jpg?strip=all&amp;lossy=1&amp;ssl=1 448w, https://ecbtsavvv9c.exactdn.com/wp-content/uploads/2022/03/big-island-itinerary-5-days-1-of-1-min.jpg?strip=all&amp;lossy=1&amp;w=384&amp;ssl=1 384w" decoding="async" height="561" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAu4AAAIxAQAAAAA6DgCdAAAAAnRSTlMAAHaTzTgAAABKSURBVHgB7cExAQAAAMIg+6deDQ9gAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA8CfQLwABn+nBBgAAAABJRU5ErkJggg==" width="750"><noscript data-dcnode-id="495"><span data-dcnode-id="496" instrument_node="">&lt;img class="aligncenter wp-image-24474 size-full" src="https://ecbtsavvv9c.exactdn.com/wp-content/uploads/2022/03/big-island-itinerary-5-days-1-of-1-min.jpg?strip=all&amp;lossy=1&amp;resize=750%2C561&amp;ssl=1" alt="waterfall big island" width="750" height="561" srcset="https://ecbtsavvv9c.exactdn.com/wp-content/uploads/2022/03/big-island-itinerary-5-days-1-of-1-min.jpg?strip=all&amp;amp;lossy=1&amp;amp;ssl=1 750w, https://ecbtsavvv9c.exactdn.com/wp-content/uploads/2022/03/big-island-itinerary-5-days-1-of-1-min-448x335.jpg?strip=all&amp;amp;lossy=1&amp;amp;ssl=1 448w, https://ecbtsavvv9c.exactdn.com/wp-content/uploads/2022/03/big-island-itinerary-5-days-1-of-1-min.jpg?strip=all&amp;amp;lossy=1&amp;amp;w=384&amp;amp;ssl=1 384w" sizes="(max-width: 750px) 100vw, 750px" data-eio="l" /&gt;</span></noscript></p><span data-dcnode-id="493" instrument_node="">
</span><h3 data-dcnode-id="487"><strong data-dcnode-id="488"><span class="js-intro-narrative" data-dcnode-id="489"><span data-dcnode-id="492" instrument_node="">Day 5 – Hilo</span><br data-dcnode-id="491"><span data-dcnode-id="490" instrument_node="">
</span></span></strong></h3><span data-dcnode-id="486" instrument_node="">
</span><div class="mmtcustom-flight" data-dcnode-id="485" id="mmt-biacdsid-f2ic-jitb-kmil-ictoamttthtc" style=" min-height:250px !important; min-width:320px !important;"></div><p data-dcnode-id="483"><span data-dcnode-id="484" instrument_node="">On your last day, drive over to Hilo and explore one of the island’s largest cities on the east side. Make sure to bring a raincoat, since rainfall is frequent on the Hilo side and accounts for the more tropical rainforest vibe.</span></p><span data-dcnode-id="482" instrument_node="">
</span><p data-dcnode-id="471"><span data-dcnode-id="481" instrument_node="">One of the top things to do is explore the waterfalls, including the easily accessible </span><strong data-dcnode-id="479"><span data-dcnode-id="480" instrument_node="">Rainbow Falls</span></strong><span data-dcnode-id="478" instrument_node=""> – located in </span><strong data-dcnode-id="476"><span data-dcnode-id="477" instrument_node="">Wailuku River State Park</span></strong><span data-dcnode-id="475" instrument_node="">. This scenic natural wonder is worth stopping by, as well as nearby</span><strong data-dcnode-id="473"><span data-dcnode-id="474" instrument_node=""> Boiling Pots</span></strong><span data-dcnode-id="472" instrument_node="">, which are beautiful but deadly if visitors are not careful around the rushing waters.</span></p><span data-dcnode-id="470" instrument_node="">
</span><p data-dcnode-id="466"><strong data-dcnode-id="468"><span data-dcnode-id="469" instrument_node="">The Kaumana Caves</span></strong><span data-dcnode-id="467" instrument_node=""> is a 25-mile long lava tube that you can explore for free. The cave on the right is easily more accessible. To get to the caves you need to descend steep stairs 20 feet into the mouth and then you can continue about 2 miles before it becomes private property. Make sure to bring a flashlight and shoes with tread if you plan to go into the caves.</span></p><span data-dcnode-id="465" instrument_node="">
</span><p data-dcnode-id="461"><strong data-dcnode-id="463"><span data-dcnode-id="464" instrument_node="">Hilo Farmers’ Market</span></strong><span data-dcnode-id="462" instrument_node=""> is a great spot to experience local Hawaiian culture and pick up seasonal produce as well as handmade craft gifts and delicious food like loco moco. The market is open 7 days a week, but the best time to go is on big market days on Wednesdays and Saturdays from 7 a.m. to 3 p.m.</span></p><span data-dcnode-id="460" instrument_node="">
</span><p data-dcnode-id="456"><img alt="rainbow falls" class="aligncenter wp-image-24610 size-full lazyload" data-dcnode-id="459" data-sizes="auto" data-src="https://ecbtsavvv9c.exactdn.com/wp-content/uploads/2022/03/big-island-itinerary-5-days-1-of-1-min-3.jpg?strip=all&amp;lossy=1&amp;resize=750%2C500&amp;ssl=1" data-srcset="https://ecbtsavvv9c.exactdn.com/wp-content/uploads/2022/03/big-island-itinerary-5-days-1-of-1-min-3.jpg?strip=all&amp;lossy=1&amp;ssl=1 750w, https://ecbtsavvv9c.exactdn.com/wp-content/uploads/2022/03/big-island-itinerary-5-days-1-of-1-min-3-503x335.jpg?strip=all&amp;lossy=1&amp;ssl=1 503w, https://ecbtsavvv9c.exactdn.com/wp-content/uploads/2022/03/big-island-itinerary-5-days-1-of-1-min-3.jpg?strip=all&amp;lossy=1&amp;w=384&amp;ssl=1 384w" decoding="async" height="500" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAu4AAAH0AQAAAABKw5UHAAAAAnRSTlMAAHaTzTgAAABFSURBVHja7cGBAAAAAMOg+VOf4AZVAQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAHwDuYwAAZLXC3IAAAAASUVORK5CYII=" width="750"><noscript data-dcnode-id="457"><span data-dcnode-id="458" instrument_node="">&lt;img class="aligncenter wp-image-24610 size-full" src="https://ecbtsavvv9c.exactdn.com/wp-content/uploads/2022/03/big-island-itinerary-5-days-1-of-1-min-3.jpg?strip=all&amp;lossy=1&amp;resize=750%2C500&amp;ssl=1" alt="rainbow falls" width="750" height="500" srcset="https://ecbtsavvv9c.exactdn.com/wp-content/uploads/2022/03/big-island-itinerary-5-days-1-of-1-min-3.jpg?strip=all&amp;amp;lossy=1&amp;amp;ssl=1 750w, https://ecbtsavvv9c.exactdn.com/wp-content/uploads/2022/03/big-island-itinerary-5-days-1-of-1-min-3-503x335.jpg?strip=all&amp;amp;lossy=1&amp;amp;ssl=1 503w, https://ecbtsavvv9c.exactdn.com/wp-content/uploads/2022/03/big-island-itinerary-5-days-1-of-1-min-3.jpg?strip=all&amp;amp;lossy=1&amp;amp;w=384&amp;amp;ssl=1 384w" sizes="(max-width: 750px) 100vw, 750px" data-eio="l" /&gt;</span></noscript></p><span data-dcnode-id="455" instrument_node="">
</span><h2 data-dcnode-id="452"><strong data-dcnode-id="453"><span data-dcnode-id="454" instrument_node="">Additional Things To Do On The Big Island</span></strong></h2><span data-dcnode-id="451" instrument_node="">
</span><ul data-dcnode-id="414"><span data-dcnode-id="450" instrument_node="">
</span><li data-dcnode-id="442"><strong data-dcnode-id="448"><span data-dcnode-id="449" instrument_node="">whale watching</span></strong><span data-dcnode-id="447" instrument_node=""> – the season runs between November and April, here’s a </span><a data-dcnode-id="444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/big-island-whale-watching/" rel="noopener" target="_blank"><span data-dcnode-id="445" style="text-decoration: underline; color: #3366ff;"><span data-dcnode-id="446" instrument_node="">detailed post</span></span></a><span data-dcnode-id="443" instrument_node=""> that includes the best tours to book and where you can witness these majestic mammals from the land</span></li><span data-dcnode-id="441" instrument_node="">
</span><li data-dcnode-id="434"><strong data-dcnode-id="439"><span data-dcnode-id="440" instrument_node="">botanical gardens</span></strong><span data-dcnode-id="438" instrument_node=""> – a favorite is </span><strong data-dcnode-id="436"><span data-dcnode-id="437" instrument_node="">Hawaii Tropical Botanical Gardens</span></strong><span data-dcnode-id="435" instrument_node=""> in Hilo which features over 2,000 tropical plants on 40-acres</span></li><span data-dcnode-id="433" instrument_node="">
</span><li data-dcnode-id="424"><strong data-dcnode-id="431"><span data-dcnode-id="432" instrument_node="">helicopter tours</span></strong><span data-dcnode-id="430" instrument_node=""> – one of the best ways to see the Big Island is from above. A popular aerial tour is Mauna Loa Helicopter Tours, which gives </span><span data-dcnode-id="426" style="color: #3366ff;"><a data-dcnode-id="427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tp.media/r%3Fmarker%3D358980.big%2520island%2520itinerary%26trs%3D166629%26p%3D1922%26u%3Dhttps%253A%252F%252Fwww.viator.com%252Ftours%252FBig-Island-of-Hawaii%252FKona-Coast-Tour-Only-190%252Fd669-110657P4" rel="nofollow noopener" style="color: #3366ff;" target="_blank"><span data-dcnode-id="428" style="text-decoration: underline;"><span data-dcnode-id="429" instrument_node="">30-minutes tours of the stunning Kona Coast</span></span></a></span><span data-dcnode-id="425" instrument_node="">.</span></li><span data-dcnode-id="423" instrument_node="">
</span><li data-dcnode-id="416"><strong data-dcnode-id="421"><span data-dcnode-id="422" instrument_node="">horseback riding</span></strong><span data-dcnode-id="420" instrument_node=""> – there are tours, especially around Waimea, like </span><strong data-dcnode-id="418"><span data-dcnode-id="419" instrument_node="">Paniolo Adventures,</span></strong><span data-dcnode-id="417" instrument_node=""> where you can tour scenic ranches with ocean views</span></li><span data-dcnode-id="415" instrument_node="">
</span></ul><span data-dcnode-id="413" instrument_node="">
</span><p data-dcnode-id="409"><img alt="sunset big island" class="aligncenter wp-image-20723 size-full lazyload" data-dcnode-id="412" data-sizes="auto" data-src="https://ecbtsavvv9c.exactdn.com/wp-content/uploads/2019/04/big-island-itinerary-1-of-1-6-min-4.jpg?strip=all&amp;lossy=1&amp;resize=750%2C563&amp;ssl=1" data-srcset="https://ecbtsavvv9c.exactdn.com/wp-content/uploads/2019/04/big-island-itinerary-1-of-1-6-min-4.jpg?strip=all&amp;lossy=1&amp;ssl=1 750w, https://ecbtsavvv9c.exactdn.com/wp-content/uploads/2019/04/big-island-itinerary-1-of-1-6-min-4-446x335.jpg?strip=all&amp;lossy=1&amp;ssl=1 446w, https://ecbtsavvv9c.exactdn.com/wp-content/uploads/2019/04/big-island-itinerary-1-of-1-6-min-4.jpg?strip=all&amp;lossy=1&amp;w=384&amp;ssl=1 384w" decoding="async" height="563" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAu4AAAIzAQAAAAB3xqGWAAAAAnRSTlMAAHaTzTgAAABKSURBVHgB7cExAQAAAMIg+6deCU9gAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAwFfQ7QAB5BNToAAAAABJRU5ErkJggg==" width="750"><noscript data-dcnode-id="410"><span data-dcnode-id="411" instrument_node="">&lt;img class="aligncenter wp-image-20723 size-full" src="https://ecbtsavvv9c.exactdn.com/wp-content/uploads/2019/04/big-island-itinerary-1-of-1-6-min-4.jpg?strip=all&amp;lossy=1&amp;resize=750%2C563&amp;ssl=1" alt="sunset big island" width="750" height="563" srcset="https://ecbtsavvv9c.exactdn.com/wp-content/uploads/2019/04/big-island-itinerary-1-of-1-6-min-4.jpg?strip=all&amp;amp;lossy=1&amp;amp;ssl=1 750w, https://ecbtsavvv9c.exactdn.com/wp-content/uploads/2019/04/big-island-itinerary-1-of-1-6-min-4-446x335.jpg?strip=all&amp;amp;lossy=1&amp;amp;ssl=1 446w, https://ecbtsavvv9c.exactdn.com/wp-content/uploads/2019/04/big-island-itinerary-1-of-1-6-min-4.jpg?strip=all&amp;amp;lossy=1&amp;amp;w=384&amp;amp;ssl=1 384w" sizes="(max-width: 750px) 100vw, 750px" data-eio="l" /&gt;</span></noscript></p><span data-dcnode-id="408" instrument_node="">
</span><p data-dcnode-id="402"><span data-dcnode-id="406" style="color: #000000;"><span data-dcnode-id="407" instrument_node="">Photo sources: </span></span><a data-dcnode-id="403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/al_bowler/15251158464/in/photolist-peGb51-ApYiMg-8yKWSL-RsL5jD-4tJMFh-65vjFa-65vnJv-pUrji7-9fJTij-peVkEg-65zDch-peKaEY-8bYTgS-65zDDj-pU785w-65vmst-7qMpGg-8mnhTk-pUrntL-pUzpEF-fFEV9k-pUqpzE-9jEmSi-peYhUR-2cyfL8j-pUxvz2-pUqRG1-2cyfFnN-7xfBDD-65vjhX-65vo6p-2cyfGsd-pU7dsW-4eodbh-pUsUwq-pU8HAL-pUevdX-pUxu4z-pUgdDi-RXtQjm-8nkk9Z-mq5tX-65voqX-pUvKLR-pU8UZf-65zFgw-pU8CDu-4DQftk-pUqWy5-pUhm2V" rel="nofollow noopener" target="_blank"><span data-dcnode-id="404" style="color: #000000;"><span data-dcnode-id="405" instrument_node="">Waipi’o Valley</span></span></a></p><span data-dcnode-id="401" instrument_node="">
