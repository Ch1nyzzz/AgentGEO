</span><p data-dcnode-id="2802"><span data-dcnode-id="2809" instrument_node="">Enjoy the majestic views of the volcanoes on the island of </span><a data-dcnode-id="2807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.volcanotours.com/maui/"><span data-dcnode-id="2808" instrument_node="">Maui</span></a><span data-dcnode-id="2806" instrument_node=""> and </span><a data-dcnode-id="2804" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.volcanotours.com/big-island/"><span data-dcnode-id="2805" instrument_node="">Big Island of Hawaiʻi</span></a><span data-dcnode-id="2803" instrument_node=""> by helicopter, in a custom tour vehicle or by foot. Fly over and around our towering volcanic mountains, drive across the craters and hike into the remains of their volcanic explosions. Inter-island tours are available starting from Oahu too!</span></p><span data-dcnode-id="2801" instrument_node="">

</span><h4 class="av_iconlist_title iconlist_title" data-dcnode-id="1231" itemprop="headline"><span data-dcnode-id="1232" instrument_node="">Is there Any Lava Flowing At Kileaua?</span></h4></header><span data-dcnode-id="1229" instrument_node="">
</span><div class="" data-dcnode-id="1224" itemprop="text"><span data-dcnode-id="1228" instrument_node="">
</span><span data-dcnode-id="1226" style="font-weight: 400;"><span data-dcnode-id="1227" instrument_node="">Though continuously active, Kilauea Volcano’s flowing lava is not always at the surface-level. Kilauea last erupted in 2018. Occasionally the glow from the lava lake is viewable or a surface flow of lava, but you will need to check the status with your tour advisor or the local weather forecast.</span></span><span data-dcnode-id="1225" instrument_node=""> </span></div><span data-dcnode-id="1223" instrument_node="">

</span><h4 class="av_iconlist_title iconlist_title" data-dcnode-id="1204" itemprop="headline"><span data-dcnode-id="1205" instrument_node="">When and Where Was The Last Major Eruption?</span></h4></header><span data-dcnode-id="1202" instrument_node="">
</span><div class="" data-dcnode-id="1193" itemprop="text"><span data-dcnode-id="1201" instrument_node="">
</span><span data-dcnode-id="1199" style="font-weight: 400;"><span data-dcnode-id="1200" instrument_node="">In 2018 there was a volcanic eruption on the Big Island on Kilauea, which began on May 3, 2018, until September 4, 2018. </span></span><span data-dcnode-id="1197" style="font-weight: 400;"><span data-dcnode-id="1198" instrument_node="">Haleakala has erupted at least ten times in the past 1,000 years. </span></span><span data-dcnode-id="1195" style="font-weight: 400;"><span data-dcnode-id="1196" instrument_node="">The last eruption occurred sometime between 1480 and 1600, according to scientific records.&nbsp;</span></span><span data-dcnode-id="1194" instrument_node=""> </span></div><span data-dcnode-id="1192" instrument_node="">
</span></div><span data-dcnode-id="1190" instrument_node="">

</span><header class="entry-content-header" data-dcnode-id="1172"><span data-dcnode-id="1175" instrument_node="">
</span><h4 class="av_iconlist_title iconlist_title" data-dcnode-id="1173" itemprop="headline"><span data-dcnode-id="1174" instrument_node="">Why Should I Book A Volcano Tour?</span></h4></header><span data-dcnode-id="1171" instrument_node="">
</span><div class="" data-dcnode-id="1160" itemprop="text"><span data-dcnode-id="1170" instrument_node="">
</span><span data-dcnode-id="1168" style="font-weight: 400;"><span data-dcnode-id="1169" instrument_node="">Volcano tours in Hawaii are the perfect way to experience a deep insight into Hawaiian volcanic history. Tours depart from Oahu, Maui and the Big Island. Kilauea on the Big Island is the world’s most active volcano, and Haleakala </span></span><span data-dcnode-id="1166" style="font-weight: 400;"><span data-dcnode-id="1167" instrument_node="">has one of the world's largest dormant volcanic craters on Maui.</span></span><span data-dcnode-id="1164" style="font-weight: 400;"><span data-dcnode-id="1165" instrument_node=""> Learn more about volcanoes by booking a volcano tour, where you can feel the energy of these majestic volcanic landscapes accompanied by our guides who love sharing their passion and knowledge with others. </span></span><span data-dcnode-id="1162" style="font-weight: 400;"><span data-dcnode-id="1163" instrument_node="">One of the most thrilling ways to explore the volcanoes of Hawaii is by helicopter.</span></span><span data-dcnode-id="1161" instrument_node=""> </span></div><span data-dcnode-id="1159" instrument_node="">
</span></div><span data-dcnode-id="1157" instrument_node="">
</span><footer class="entry-footer" data-dcnode-id="1156"></footer><span data-dcnode-id="1155" instrument_node="">
</span></article><span data-dcnode-id="1153" instrument_node="">
</span><div class="iconlist-timeline" data-dcnode-id="1152"></div><span data-dcnode-id="1151" instrument_node="">
</span></li><span data-dcnode-id="1149" instrument_node="">
</span><li class="avia_start_animation post-3053 mmfaq type-mmfaq status-publish hentry avia-icon-faq-list-3053 hide-faq-item" data-dcnode-id="1123"><span data-dcnode-id="1148" instrument_node="">
</span><div class="iconlist_icon avia-font-entypo-fontello" data-dcnode-id="1146"><span aria-hidden="true" class="iconlist-char" data-av_icon="" data-av_iconfont="entypo-fontello" data-dcnode-id="1147"></span></div><span data-dcnode-id="1145" instrument_node="">

</span><header class="entry-content-header" data-dcnode-id="1139"><span data-dcnode-id="1142" instrument_node="">
</span><h4 class="av_iconlist_title iconlist_title" data-dcnode-id="1140" itemprop="headline"><span data-dcnode-id="1141" instrument_node="">Is Visiting A Volcanic Area Safe?</span></h4></header><span data-dcnode-id="1138" instrument_node="">
</span><div class="" data-dcnode-id="1133" itemprop="text"><span data-dcnode-id="1137" instrument_node="">
</span><span data-dcnode-id="1135" style="font-weight: 400;"><span data-dcnode-id="1136" instrument_node="">Hawaii’s volcanoes are shield volcanoes which are characterized by slow-moving lava activity. Shield volcanoes do not create spectacular explosions or deadly quick-moving pyroclastic flows. You would not be in any immediate danger in Hawaii from a volcanic eruption unless you’re in the path of a lava flow or proximity to the eruptive activity. If you are in the path of a lava flow on the Big Island, because it moves slowly, you should be able to walk away from it safely. </span></span><span data-dcnode-id="1134" instrument_node=""> </span></div><span data-dcnode-id="1132" instrument_node="">
</span></div><span data-dcnode-id="1130" instrument_node="">
</span><footer class="entry-footer" data-dcnode-id="1129"></footer><span data-dcnode-id="1128" instrument_node="">
</span></article><span data-dcnode-id="1126" instrument_node="">
</span><div class="iconlist-timeline" data-dcnode-id="1125"></div><span data-dcnode-id="1124" instrument_node="">
</span></li><span data-dcnode-id="1122" instrument_node="">
</span><li class="avia_start_animation post-3055 mmfaq type-mmfaq status-publish hentry avia-icon-faq-list-3055 hide-faq-item" data-dcnode-id="1090"><span data-dcnode-id="1121" instrument_node="">
</span><div class="iconlist_icon avia-font-entypo-fontello" data-dcnode-id="1119"><span aria-hidden="true" class="iconlist-char" data-av_icon="" data-av_iconfont="entypo-fontello" data-dcnode-id="1120"></span></div><span data-dcnode-id="1118" instrument_node="">
</span><article class="article-icon-entry" data-dcnode-id="1094" itemscope="itemscope" itemtype="https://schema.org/CreativeWork"><span data-dcnode-id="1117" instrument_node="">
</span><div class="iconlist_content_wrap" data-dcnode-id="1098"><span data-dcnode-id="1116" instrument_node="">
</span><header class="entry-content-header" data-dcnode-id="1112"><span data-dcnode-id="1115" instrument_node="">
</span><h4 class="av_iconlist_title iconlist_title" data-dcnode-id="1113" itemprop="headline"><span data-dcnode-id="1114" instrument_node="">Are The Volcanoes In Hawaii Now Extinct?</span></h4></header><span data-dcnode-id="1111" instrument_node="">
</span><div class="" data-dcnode-id="1100" itemprop="text"><span data-dcnode-id="1110" instrument_node="">
</span><span data-dcnode-id="1108" style="font-weight: 400;"><span data-dcnode-id="1109" instrument_node="">Five volcanoes make up the island of Hawaii: Kohala, Mauna Kea, Hualalai, Mauna Loa, and Kilauea. </span></span><span data-dcnode-id="1106" style="font-weight: 400;"><span data-dcnode-id="1107" instrument_node="">Kohala is the oldest volcano on the island of Hawaii and is now considered extinct.</span></span><span data-dcnode-id="1104" style="font-weight: 400;"><span data-dcnode-id="1105" instrument_node=""> Volcanoes that will never erupt again are considered extinct. </span></span><span data-dcnode-id="1102" style="font-weight: 400;"><span data-dcnode-id="1103" instrument_node="">Dormant volcanoes are not extinct because they erupted within the last 10,000 years and will probably erupt again. Kilauea is the most well-known volcano in Hawaii, as it’s one of the world's most frequently active volcanoes. It has been continuously erupting since 1983. Other active volcanoes are Hualalai and Mauna Loa.</span></span><span data-dcnode-id="1101" instrument_node=""> </span></div><span data-dcnode-id="1099" instrument_node="">
</span></div><span data-dcnode-id="1097" instrument_node="">
</span><footer class="entry-footer" data-dcnode-id="1096"></footer><span data-dcnode-id="1095" instrument_node="">
</span></article><span data-dcnode-id="1093" instrument_node="">
</span><div class="iconlist-timeline" data-dcnode-id="1092"></div><span data-dcnode-id="1091" instrument_node="">
</span></li><span data-dcnode-id="1089" instrument_node="">
</span><li class="avia_start_animation post-3057 mmfaq type-mmfaq status-publish hentry avia-icon-faq-list-3057 hide-faq-item" data-dcnode-id="1063"><span data-dcnode-id="1088" instrument_node="">
</span><div class="iconlist_icon avia-font-entypo-fontello" data-dcnode-id="1086"><span aria-hidden="true" class="iconlist-char" data-av_icon="" data-av_iconfont="entypo-fontello" data-dcnode-id="1087"></span></div><span data-dcnode-id="1085" instrument_node="">
</span><article class="article-icon-entry" data-dcnode-id="1067" itemscope="itemscope" itemtype="https://schema.org/CreativeWork"><span data-dcnode-id="1084" instrument_node="">
</span><div class="iconlist_content_wrap" data-dcnode-id="1071"><span data-dcnode-id="1083" instrument_node="">
</span><header class="entry-content-header" data-dcnode-id="1079"><span data-dcnode-id="1082" instrument_node="">
</span><h4 class="av_iconlist_title iconlist_title" data-dcnode-id="1080" itemprop="headline"><span data-dcnode-id="1081" instrument_node="">Why Are There Only Volcano Tours On Maui &amp; Big Island?</span></h4></header><span data-dcnode-id="1078" instrument_node="">
</span><div class="" data-dcnode-id="1073" itemprop="text"><span data-dcnode-id="1077" instrument_node="">
</span><span data-dcnode-id="1075" style="font-weight: 400;"><span data-dcnode-id="1076" instrument_node="">The volcanoes on the Big Island and Maui are both powerful forces of nature. Hawaii Volcanoes National Park on the Big Island protects some of the most unique geological, biological, and cultural landscapes in the world. Extending from sea level to the summit of Mauna Loa at 13,677 feet, the park encompasses the summits of two of the world's most active volcanoes - Kīlauea and Mauna Loa.
</span></span><span data-dcnode-id="1074" instrument_node="">
The main feature of Haleakala National Park on Maui is the Haleakala Volcano, which rises 10,000 ft above sea level and has a spectacular crater at the summit. Sunrises here are world-class and one of the most popular of all Maui activities.&nbsp; Explore one or both of these volcanoes with certified eco-tourism guides and learn about the unique geology and cultural significants of these sacred volcanoes. </span></div><span data-dcnode-id="1072" instrument_node="">
</span></div><span data-dcnode-id="1070" instrument_node="">
</span><footer class="entry-footer" data-dcnode-id="1069"></footer><span data-dcnode-id="1068" instrument_node="">

</span><div class="iconlist-timeline" data-dcnode-id="1065"></div><span data-dcnode-id="1064" instrument_node="">
</span></li><span data-dcnode-id="1062" instrument_node="">
