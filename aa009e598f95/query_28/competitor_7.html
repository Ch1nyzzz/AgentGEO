sland of Hawaii</span></p></div></div></header><div class="big-leader big-leader--scriptless" data-dcnode-id="1575"><img alt="BIG LIST of Farm Tours on the Big Island" aria-hidden="true" class="big-leader__image post-image" data-dcnode-id="1577" height="810" sizes="(max-width: 960px) 90vw, (max-width: 1200px) 620px, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/wp-content/uploads/lili-house-farm.jpg&amp;raw" srcset="https://www.lovebigisland.com/wp-content/uploads/lili-house-farm.jpg 1080w, https://www.lovebigisland.com/wp-content/uploads/lili-house-farm-620x465.jpg 620w, https://www.lovebigisland.com/wp-content/uploads/lili-house-farm-768x576.jpg 768w, https://www.lovebigisland.com/wp-content/uploads/lili-house-farm-800x600.jpg 800w, https://www.lovebigisland.com/wp-content/uploads/lili-house-farm-320x240.jpg 320w, https://www.lovebigisland.com/wp-content/uploads/lili-house-farm-400x300.jpg 400w" width="1080"><div class="wrap" data-dcnode-id="1576"></div></div><div class="site-inner" data-dcnode-id="385"><div class="wrap" data-dcnode-id="386"><div class="content-sidebar-wrap" data-dcnode-id="387"><main class="content" data-dcnode-id="566" id="genesis-content"><div class="breadcrumb" data-dcnode-id="1563"><span data-dcnode-id="1564"><span data-dcnode-id="1565"><a data-dcnode-id="1573" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/"><span data-dcnode-id="1574" instrument_node="">Home</span></a><span data-dcnode-id="1572" instrument_node=""> » </span><span data-dcnode-id="1566"><a data-dcnode-id="1570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/activities-to-do/"><span data-dcnode-id="1571" instrument_node="">Activities</span></a><span data-dcnode-id="1569" instrument_node=""> » </span><span aria-current="page" class="breadcrumb_last" data-dcnode-id="1567"><span data-dcnode-id="1568" instrument_node="">Farm Tours</span></span></span></span></span></div><article aria-label="BIG LIST of Farm Tours on the Big Island" class="post-11170 page type-page status-publish has-post-thumbnail entry" data-dcnode-id="567"><header class="entry-header" data-dcnode-id="1541"><h1 class="entry-title" data-dcnode-id="1561"><span data-dcnode-id="1562" instrument_node="">BIG LIST of Farm Tours on the Big Island</span></h1><div class="mobile-only entry-meta" data-dcnode-id="1542"><span data-dcnode-id="1560" instrument_node="">By </span><span class="entry-author" data-dcnode-id="1557"><span class="entry-author-name" data-dcnode-id="1558"><span data-dcnode-id="1559" instrument_node="">Love Big Island</span></span></span><span data-dcnode-id="1556" instrument_node=""> | updated </span><time class="entry-modified-time" data-dcnode-id="1554"><span data-dcnode-id="1555" instrument_node="">April 17, 2022</span></time><p class="sidetoc-icons social" data-dcnode-id="1543"><a class="link" data-dcnode-id="1552" data-pin-color="red" data-pin-config="beside" data-pin-custom="true" data-pin-do="buttonPin" data-pin-height="28" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pinterest.com/pin/create/button/%3Furl%3Dhttps%253A%252F%252Fwww.lovebigisland.com%252Factivities-to-do%252Ffarm-tours%252F%26media%3Dhttps%3A//www.lovebigisland.com/wp-content/uploads/lili-house-farm.jpg%26description%3DBIG%2520LIST%2520of%2520Farm%2520Tours%2520on%2520the%2520Big%2520Island" onmousedown="gtag('event', 'click', {  'event_category' : 'social', 'event_label' : 'pinterest'});" rel="noopener" target="_blank"><span class="icon-pinterest" data-dcnode-id="1553"></span></a><a class="link" data-dcnode-id="1550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/sharer/sharer.php%3Fu%3Dhttps%253A%252F%252Fwww.lovebigisland.com%252Factivities-to-do%252Ffarm-tours%252F" onmousedown="gtag('event', 'click', {  'event_category' : 'social', 'event_label' : 'facebook'});" rel="noopener" target="_blank"><span class="icon-facebook" data-dcnode-id="1551"></span></a><a class="link" data-dcnode-id="1548" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/intent/tweet%3Ftext%3DBIG%2520LIST%2520of%2520Farm%2520Tours%2520on%2520the%2520Big%2520Island%26url%3Dhttps%253A%252F%252Fwww.lovebigisland.com%252Factivities-to-do%252Ffarm-tours%252F%26via%3Dlovebigisland" onmousedown="gtag('event', 'click', {  'event_category' : 'social', 'event_label' : 'twitter'});" rel="noopener" target="_blank"><span class="icon-twitter" data-dcnode-id="1549"></span></a><a class="link" data-dcnode-id="1546" href="mailto:?subject=BIG%20LIST%20of%20Farm%20Tours%20on%20the%20Big%20Island&amp;body=https%3A%2F%2Fwww.lovebigisland.com%2Factivities-to-do%2Ffarm-tours%2F" onmousedown="gtag('event', 'click', {  'event_category' : 'social', 'event_label' : 'email'});"><span class="icon-mail4" data-dcnode-id="1547"></span></a><a class="link" data-dcnode-id="1544" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/activities-to-do/farm-tours" onmousedown="gtag('event', 'click', {  'event_category' : 'social', 'event_label' : 'other'});"><span class="icon-share2" data-dcnode-id="1545"></span></a></p></div></header><div class="entry-content" data-dcnode-id="568"><p data-dcnode-id="1539"><span data-dcnode-id="1540" instrument_node="">The Hawaiian islands, with their volcanic soil and mild year-round climate, offer a fertile environment for our many different kinds of exotic farms. You can visit some of these farms for a tour to learn about what they grow and often enjoy a taste of what they have to offer.</span></p><p data-dcnode-id="1536"><span data-dcnode-id="1538" instrument_node="">We list the most popular farm tours and tastings + other agricultural tours (animal related tours, farmers markets) on the Big Island below:</span><br data-dcnode-id="1537"></p><div class="fixed-toc" data-dcnode-id="1493"><p data-dcnode-id="1533"><span class="icon-file-text" data-dcnode-id="1535"></span><span data-dcnode-id="1534" instrument_node=""> Table of contents</span></p><p data-dcnode-id="1532"></p><ul data-dcnode-id="1495"><li data-dcnode-id="1527"><strong data-dcnode-id="1529"><a data-dcnode-id="1530" href="#map"><span data-dcnode-id="1531" instrument_node="">Map of all tours</span></a></strong><span data-dcnode-id="1528" instrument_node=""> listed on this page</span></li><li data-dcnode-id="1523"><span data-dcnode-id="1526" instrument_node="">Farm tours including </span><a data-dcnode-id="1524" href="#produce"><span data-dcnode-id="1525" instrument_node="">locally produced goods</span></a></li><li data-dcnode-id="1518"><span data-dcnode-id="1522" instrument_node="">Tours including </span><strong data-dcnode-id="1519"><a data-dcnode-id="1520" href="#animals"><span data-dcnode-id="1521" instrument_node="">exotic animals / animal shelters</span></a></strong></li><li data-dcnode-id="1514"><strong data-dcnode-id="1515"><a data-dcnode-id="1516" href="#plant-a-tree"><span data-dcnode-id="1517" instrument_node="">Native trees / tree planting</span></a></strong></li><li data-dcnode-id="1509"><strong data-dcnode-id="1511"><a data-dcnode-id="1512" href="#farmers-markets"><span data-dcnode-id="1513" instrument_node="">Farmers markets</span></a></strong><span data-dcnode-id="1510" instrument_node=""> (the best place to buy local produce)</span></li><li data-dcnode-id="1501"><strong data-dcnode-id="1506"><a data-dcnode-id="1507" href="#farm-to-table"><span data-dcnode-id="1508" instrument_node="">Farm to Table restaurants</span></a></strong><span data-dcnode-id="1505" instrument_node=""> and </span><a data-dcnode-id="1502" href="#farm-to-table-cooking-class"><strong data-dcnode-id="1503"><span data-dcnode-id="1504" instrument_node="">Cooking Classes</span></strong></a></li><li data-dcnode-id="1496"><strong data-dcnode-id="1498"><a data-dcnode-id="1499" href="#introduction"><span data-dcnode-id="1500" instrument_node="">Introduction</span></a></strong><span data-dcnode-id="1497" instrument_node=""> to local agriculture</span></li></ul><p data-dcnode-id="1494"></p></div><details class="mobtoc" data-dcnode-id="1450"><summary data-dcnode-id="1491"><span data-dcnode-id="1492" instrument_node="">Table of Contents</span></summary><p data-dcnode-id="1490"></p><ul data-dcnode-id="1453"><li data-dcnode-id="1485"><strong data-dcnode-id="1487"><a data-dcnode-id="1488" href="#map"><span data-dcnode-id="1489" instrument_node="">Map of all tours</span></a></strong><span data-dcnode-id="1486" instrument_node=""> listed on this page</span></li><li data-dcnode-id="1481"><span data-dcnode-id="1484" instrument_node="">Farm tours including </span><a data-dcnode-id="1482" href="#produce"><span data-dcnode-id="1483" instrument_node="">locally produced goods</span></a></li><li data-dcnode-id="1476"><span data-dcnode-id="1480" instrument_node="">Tours including </span><strong data-dcnode-id="1477"><a data-dcnode-id="1478" href="#animals"><span data-dcnode-id="1479" instrument_node="">exotic animals / animal shelters</span></a></strong></li><li data-dcnode-id="1472"><strong data-dcnode-id="1473"><a data-dcnode-id="1474" href="#plant-a-tree"><span data-dcnode-id="1475" instrument_node="">Native trees / tree planting</span></a></strong></li><li data-dcnode-id="1467"><strong data-dcnode-id="1469"><a data-dcnode-id="1470" href="#farmers-markets"><span data-dcnode-id="1471" instrument_node="">Farmers markets</span></a></strong><span data-dcnode-id="1468" instrument_node=""> (the best place to buy local produce)</span></li><li data-dcnode-id="1459"><strong data-dcnode-id="1464"><a data-dcnode-id="1465" href="#farm-to-table"><span data-dcnode-id="1466" instrument_node="">Farm to Table restaurants</span></a></strong><span data-dcnode-id="1463" instrument_node=""> and </span><a data-dcnode-id="1460" href="#farm-to-table-cooking-class"><strong data-dcnode-id="1461"><span data-dcnode-id="1462" instrument_node="">Cooking Classes</span></strong></a></li><li data-dcnode-id="1454"><strong data-dcnode-id="1456"><a data-dcnode-id="1457" href="#introduction"><span data-dcnode-id="1458" instrument_node="">Introduction</span></a></strong><span data-dcnode-id="1455" instrument_node=""> to local agriculture</span></li></ul><p data-dcnode-id="1451"><span data-dcnode-id="1452" instrument_node=""> </span></p></details><p data-dcnode-id="1449"></p><p data-dcnode-id="1441"><strong data-dcnode-id="1447"><span data-dcnode-id="1448" instrument_node="">Do you want to bring produce home?</span></strong><span data-dcnode-id="1446" instrument_node=""> While local products are fantastic souvenirs you should make sure you are allowed to bring them with you. Untreated fresh fruits and vegetables are in general not allowed, coffee and flower leis should be no problem. You can find a complete list of common items from Hawaii that are allowed into the U.S. mainland </span><strong data-dcnode-id="1443"><a data-dcnode-id="1444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aphis.usda.gov/aphis/resources/travelers-int/%21ut/p/z1/04_Sj9CPykssy0xPLMnMz0vMAfIjo8ziffxNnA2dgg2AtKuTgaNrkLmvq6unkbuviX44moIwDzOggpDQED8LQydPSyP9KGL0G-AAjgbE6cejIAq_8eH6UfisMPAwwFCA6UVClhTkhoZGGGR6AgBfHSZc/%3F1dmy%26urile%3Dwcm%253apath%253a%252Faphis_content_library%252Fsa_resources%252Ftraveler%252Fhawaii%252Fhawaiian_products"><span data-dcnode-id="1445" instrument_node="">here</span></a></strong><span data-dcnode-id="1442" instrument_node="">.</span></p><p data-dcnode-id="1438"><strong data-dcnode-id="1439"><span data-dcnode-id="1440" instrument_node="">Related: Culinary activities on Kauaʻi, Oʻahu and Maui</span></strong></p><p data-dcnode-id="1436"><span data-dcnode-id="1437" instrument_node="">Are you planning to also visit other islands in the state and do you like our style? Then the following guides might be a good place to start your culinary trip planning:</span></p><ul data-dcnode-id="1420"><li data-dcnode-id="1431"><a data-dcnode-id="1432" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/kauai/culinary-activities/" rel="noopener"><span data-dcnode-id="1435" instrument_node="">Culinary tours and activities on </span><strong data-dcnode-id="1433"><span data-dcnode-id="1434" instrument_node="">Kauaʻi</span></strong></a></li><li data-dcnode-id="1426"><a data-dcnode-id="1427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//loveoahu.org/activities-things-to-do/culinary-activities/" rel="noopener" target="_blank"><span data-dcnode-id="1430" instrument_node="">Culinary tours and activities on </span><strong data-dcnode-id="1428"><span data-dcnode-id="1429" instrument_node="">Oʻahu</span></strong></a></li><li data-dcnode-id="1421"><a data-dcnode-id="1422" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/maui/culinary-activities/" rel="noopener"><span data-dcnode-id="1425" instrument_node="">List of farm tours on the</span><strong data-dcnode-id="1423"><span data-dcnode-id="1424" instrument_node=""> Maui</span></strong></a></li></ul><h2 data-dcnode-id="1418" id="map"><span data-dcnode-id="1419" instrument_node="">Map of Farm Tours:</span></h2><p data-dcnode-id="1416"><span data-dcnode-id="1417" instrument_node="">We were happily surprised by the sheer amount of ways you can see our farms and sanctuaries up-close while putting together this resource. However, this abundance can make planning a visit confusing because the farms are spread out all over the island and, well, how are you going to find a tour that fits in with your itinerary?</span></p><p data-dcnode-id="1414"><span data-dcnode-id="1415" instrument_node="">To make planning your farm tour easier we summarized all tours listed on this page into one BIG map. Note that some addresses are approximate because not all farmers prefer to give out their exact address only after you have made a reservation.</span></p><p data-dcnode-id="1412"><iframe data-dcnode-id="1413" height="480" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.google.com/maps/d/u/0/embed%3Fmid%3D13QXm-7tQuVBJVziUz6jgcXYezNDNQIGE&amp;raw" width="100%"></iframe></p><p data-dcnode-id="1407"><small data-dcnode-id="1408"><strong data-dcnode-id="1410"><span data-dcnode-id="1411" instrument_node="">How to use this map</span></strong><span data-dcnode-id="1409" instrument_node="">: Above you’ll find a map of all farm and related tours on the Big Island. Click on the top left of the map to find separate layers marking the route and points of interest. You can hide and show different layers, or click icons on the map to see more details for the places I mention in this guide. “Star” the map to save it to your own Google Maps, or open the map in a new window for a larger version. Enjoy!</span></small></p><h2 data-dcnode-id="1405" id="produce"><span data-dcnode-id="1406" instrument_node="">Farm tours including locally produced goods:</span></h2><p data-dcnode-id="1400"><span data-dcnode-id="1404" instrument_node="">We split our list of farm tours in places that grow things (this section) and in </span><a data-dcnode-id="1402" href="#animals"><span data-dcnode-id="1403" instrument_node="">animal-related tours</span></a><span data-dcnode-id="1401" instrument_node=""> (next section):</span></p><ul data-dcnode-id="1368"><li data-dcnode-id="1396"><a data-dcnode-id="1398" href="#tea"><span data-dcnode-id="1399" instrument_node="">Tea</span></a><span data-dcnode-id="1397" instrument_node=""> plantation tours / tasting</span></li><li data-dcnode-id="1392"><a data-dcnode-id="1394" href="#coffee"><span data-dcnode-id="1395" instrument_node="">Coffee</span></a><span data-dcnode-id="1393" instrument_node=""> plantation tours /tastings</span></li><li data-dcnode-id="1388"><a data-dcnode-id="1390" href="#chocolate"><span data-dcnode-id="1391" instrument_node="">Chocolate</span></a><span data-dcnode-id="1389" instrument_node=""> orchard tours / tastings</span></li><li data-dcnode-id="1384"><a data-dcnode-id="1386" href="#vanilla"><span data-dcnode-id="1387" instrument_node="">Vanilla</span></a><span data-dcnode-id="1385" instrument_node=""> farm tours / tastings</span></li><li data-dcnode-id="1380"><a data-dcnode-id="1382" href="#macadamia"><span data-dcnode-id="1383" instrument_node="">Macadamia nut</span></a><span data-dcnode-id="1381" instrument_node=""> orchard tours</span></li><li data-dcnode-id="1377"><a data-dcnode-id="1378" href="#taro"><span data-dcnode-id="1379" instrument_node="">Taro farm tours in Waipiʻo Valley</span></a></li><li data-dcnode-id="1373"><span data-dcnode-id="1376" instrument_node="">Misc. </span><a data-dcnode-id="1374" href="#farm-tours"><span data-dcnode-id="1375" instrument_node="">farm tours</span></a></li><li data-dcnode-id="1369"><a data-dcnode-id="1371" href="#winery"><span data-dcnode-id="1372" instrument_node="">Volcano Winery</span></a><span data-dcnode-id="1370" instrument_node=""> (wine tasting)</span></li></ul><p data-dcnode-id="1349"><span data-dcnode-id="1367" instrument_node="">You’ll notice that there are no ‘pineapple farm tours’ in the list. </span><strong data-dcnode-id="1364"><a data-dcnode-id="1365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/quick-and-remarkable-facts-about-hawaii/pineapple/"><span data-dcnode-id="1366" instrument_node="">Pineapples</span></a></strong><span data-dcnode-id="1363" instrument_node=""> are a disappearing crop and now are mostly grown on the islands of </span><a data-dcnode-id="1361" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/maui/culinary-activities/%23pineapple"><span data-dcnode-id="1362" instrument_node="">Maui</span></a><span data-dcnode-id="1360" instrument_node=""> and </span><a data-dcnode-id="1358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/oahu/"><span data-dcnode-id="1359" instrument_node="">Oahu</span></a><span data-dcnode-id="1357" instrument_node="">. The Big Island agricultural scene was up to a few decades ago dominated by the </span><a data-dcnode-id="1355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cms.ctahr.hawaii.edu/cane/General-Info" rel="noopener" target="_blank"><span data-dcnode-id="1356" instrument_node="">sugar cane industry</span></a><span data-dcnode-id="1354" instrument_node="">, but that has also disappeared by now. Visit the </span><strong data-dcnode-id="1351"><a data-dcnode-id="1352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hawaiiplantationmuseum.org/" rel="noopener" target="_blank"><span data-dcnode-id="1353" instrument_node="">Hawaii Plantation Museum</span></a></strong><span data-dcnode-id="1350" instrument_node=""> in Papaikou to learn more about the rich history of the sugar plantation era.</span></p><h3 data-dcnode-id="1347" id="tea"><span data-dcnode-id="1348" instrument_node="">Tea Farm tours + tastings</span></h3><p data-dcnode-id="1345"><span data-dcnode-id="1346" instrument_node="">The Big Island is known for its coffee and coffee tasting but did you know that there are also tea plantations on Hawaii Island? Tea plants LOVE lots of rain, grow best at higher elevations, and need acidic soil with good drainage, lots of sunlight and moderate to high humidity. These factors all come together on the north-eastern side of the Big Island.</span></p><p data-dcnode-id="1343"><span data-dcnode-id="1344" instrument_node="">Tea is a labor-intensive crop and the local farmers aim for quality rather than quantity. They are mostly artisans using traditional and natural techniques that produce small batches and who cater to specialty markets. In short, if you really like tea you’ll REALLY like visiting one of our local tea plantations:</span></p><ul data-dcnode-id="1327"><li data-dcnode-id="1338"><strong data-dcnode-id="1340"><a data-dcnode-id="1341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/mauna-kea-tea/%23mauna-kea-tea"><span data-dcnode-id="1342" instrument_node="">Mauna Kea Tea</span></a></strong><span data-dcnode-id="1339" instrument_node=""> (near Honokaʻa)</span></li><li data-dcnode-id="1333"><strong data-dcnode-id="1335"><a data-dcnode-id="1336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/mauna-kea-tea/%23big-island-tea"><span data-dcnode-id="1337" instrument_node="">Big Island Tea</span></a></strong><span data-dcnode-id="1334" instrument_node=""> (between Hilo and Volcano Village)</span></li><li data-dcnode-id="1328"><strong data-dcnode-id="1330"><a data-dcnode-id="1331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/mauna-kea-tea/%23tea-hawaii"><span data-dcnode-id="1332" instrument_node="">Tea Hawaii</span></a></strong><span data-dcnode-id="1329" instrument_node=""> (in Volcano Village)</span></li></ul><p data-dcnode-id="1321"><span data-dcnode-id="1326" instrument_node="">You can find more in-depth information about </span><strong data-dcnode-id="1323"><a data-dcnode-id="1324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/mauna-kea-tea/"><span data-dcnode-id="1325" instrument_node="">tea growing and tea tours</span></a></strong><span data-dcnode-id="1322" instrument_node=""> on the Big Island on our website.</span></p><div class="wp-caption aligncenter" data-dcnode-id="1314" id="attachment_4658" style="width: 810px"><a data-dcnode-id="1317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/wp-content/uploads/mauna-kea-tea-field.jpg"><noscript data-dcnode-id="1319"><span data-dcnode-id="1320" instrument_node="">&lt;img aria-describedby="caption-attachment-4658" class="size-large wp-image-4658" src="https://www.lovebigisland.com/wp-content/uploads/mauna-kea-tea-field-800x513.jpg" alt="Mauna Kea tea field" width="800" height="513" srcset="https://www.lovebigisland.com/wp-content/uploads/mauna-kea-tea-field-800x513.jpg 800w, https://www.lovebigisland.com/wp-content/uploads/mauna-kea-tea-field-620x397.jpg 620w, https://www.lovebigisland.com/wp-content/uploads/mauna-kea-tea-field-320x205.jpg 320w, https://www.lovebigisland.com/wp-content/uploads/mauna-kea-tea-field-400x256.jpg 400w, https://www.lovebigisland.com/wp-content/uploads/mauna-kea-tea-field-768x492.jpg 768w, https://www.lovebigisland.com/wp-content/uploads/mauna-kea-tea-field-600x384.jpg 600w, https://www.lovebigisland.com/wp-content/uploads/mauna-kea-tea-field-599x384.jpg 599w, https://www.lovebigisland.com/wp-content/uploads/mauna-kea-tea-field-899x576.jpg 899w, https://www.lovebigisland.com/wp-content/uploads/mauna-kea-tea-field.jpg 1038w" sizes="(max-width: 960px) 90vw, (max-width: 1200px) 620px, 800px" /&gt;</span></noscript><img alt="Mauna Kea tea field" aria-describedby="caption-attachment-4658" class="size-large wp-image-4658 lazyloaded" data-dcnode-id="1318" data-sizes="(max-width: 960px) 90vw, (max-width: 1200px) 620px, 800px" data-src="https://www.lovebigisland.com/wp-content/uploads/mauna-kea-tea-field-800x513.jpg" data-srcset="https://www.lovebigisland.com/wp-content/uploads/mauna-kea-tea-field-800x513.jpg 800w, https://www.lovebigisland.com/wp-content/uploads/mauna-kea-tea-field-620x397.jpg 620w, https://www.lovebigisland.com/wp-content/uploads/mauna-kea-tea-field-320x205.jpg 320w, https://www.lovebigisland.com/wp-content/uploads/mauna-kea-tea-field-400x256.jpg 400w, https://www.lovebigisland.com/wp-content/uploads/mauna-kea-tea-field-768x492.jpg 768w, https://www.lovebigisland.com/wp-content/uploads/mauna-kea-tea-field-600x384.jpg 600w, https://www.lovebigisland.com/wp-content/uploads/mauna-kea-tea-field-599x384.jpg 599w, https://www.lovebigisland.com/wp-content/uploads/mauna-kea-tea-field-899x576.jpg 899w, https://www.lovebigisland.com/wp-content/uploads/mauna-kea-tea-field.jpg 1038w" height="513" sizes="(max-width: 960px) 90vw, (max-width: 1200px) 620px, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/wp-content/uploads/mauna-kea-tea-field-800x513.jpg&amp;raw" srcset="https://www.lovebigisland.com/wp-content/uploads/mauna-kea-tea-field-800x513.jpg 800w, https://www.lovebigisland.com/wp-content/uploads/mauna-kea-tea-field-620x397.jpg 620w, https://www.lovebigisland.com/wp-content/uploads/mauna-kea-tea-field-320x205.jpg 320w, https://www.lovebigisland.com/wp-content/uploads/mauna-kea-tea-field-400x256.jpg 400w, https://www.lovebigisland.com/wp-content/uploads/mauna-kea-tea-field-768x492.jpg 768w, https://www.lovebigisland.com/wp-content/uploads/mauna-kea-tea-field-600x384.jpg 600w, https://www.lovebigisland.com/wp-content/uploads/mauna-kea-tea-field-599x384.jpg 599w, https://www.lovebigisland.com/wp-content/uploads/mauna-kea-tea-field-899x576.jpg 899w, https://www.lovebigisland.com/wp-content/uploads/mauna-kea-tea-field.jpg 1038w" width="800"></a><p class="wp-caption-text" data-dcnode-id="1315" id="caption-attachment-4658"><span data-dcnode-id="1316" instrument_node="">Tea plantations of the Mauna Kea tea farm</span></p></div><h3 data-dcnode-id="1312" id="coffee"><span data-dcnode-id="1313" instrument_node="">Coffee tour + tastings</span></h3><p data-dcnode-id="1310"><span data-dcnode-id="1311" instrument_node="">Kona coffee is one of our most valuable and well-know export products. Coffee here in Hawaii grows best on a tropical, narrow, and extremely scenic strip on the slopes of the Hualalai and Mauna Loa volcanoes in the north and south Kona district. You can find more than 650 coffee farms of all sizes clustered along the ±20 miles of scenic roads covering these slopes, and many of these offer tours to the public.</span></p><p data-dcnode-id="1300"><span data-dcnode-id="1309" instrument_node="">Tours generally consist of a walk through the fields where you are given an explanation about growing coffee, a visit to the area where they process the beans, and a tasting. These tours give local farmers the opportunity to sell their coffee directly to their visitors, which is why the tours themselves often are free of charge. Two coffee farms that organize informative tours and serve delicious coffees are </span><strong data-dcnode-id="1306"><a data-dcnode-id="1307" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//roosterfarms.com/index.html%23tours" rel="noopener" target="_blank"><span data-dcnode-id="1308" instrument_node="">Rooster Farms</span></a></strong><span data-dcnode-id="1305" instrument_node=""> and the </span><strong data-dcnode-id="1302"><a data-dcnode-id="1303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenwellfarms.com/big-island-kona-coffee-tours/" rel="noopener" target="_blank"><span data-dcnode-id="1304" instrument_node="">Greenwell farms</span></a></strong><span data-dcnode-id="1301" instrument_node="">, both in South Kona.</span></p><p data-dcnode-id="1294"><span data-dcnode-id="1299" instrument_node="">You can find a WAY larger list (+ map) of farm tours at our list of </span><strong data-dcnode-id="1296"><a data-dcnode-id="1297" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/kona-coffee-tasting/%23coffee-farms"><span data-dcnode-id="1298" instrument_node="">farms that organize coffee tours and tastings</span></a></strong><span data-dcnode-id="1295" instrument_node="">.</span></p><div class="wp-caption aligncenter" data-dcnode-id="1278" id="attachment_6779" style="width: 810px"><a data-dcnode-id="1290" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/wp-content/uploads/kona-coffee-tour-greenwell.jpg"><noscript data-dcnode-id="1292"><span data-dcnode-id="1293" instrument_node="">&lt;img aria-describedby="caption-attachment-6779" class="size-large wp-image-6779" src="https://www.lovebigisland.com/wp-content/uploads/kona-coffee-tour-greenwell-800x529.jpg" alt="A Kona Coffee Farm Tour at the Greenwell farm" width="800" height="529" srcset="https://www.lovebigisland.com/wp-content/uploads/kona-coffee-tour-greenwell-800x529.jpg 800w, https://www.lovebigisland.com/wp-content/uploads/kona-coffee-tour-greenwell-620x410.jpg 620w, https://www.lovebigisland.com/wp-content/uploads/kona-coffee-tour-greenwell-768x508.jpg 768w, https://www.lovebigisland.com/wp-content/uploads/kona-coffee-tour-greenwell-320x212.jpg 320w, https://www.lovebigisland.com/wp-content/uploads/kona-coffee-tour-greenwell-400x265.jpg 400w, https://www.lovebigisland.com/wp-content/uploads/kona-coffee-tour-greenwell-180x120.jpg 180w, https://www.lovebigisland.com/wp-content/uploads/kona-coffee-tour-greenwell.jpg 1280w" sizes="(max-width: 960px) 90vw, (max-width: 1200px) 620px, 800px" /&gt;</span></noscript><img alt="A Kona Coffee Farm Tour at the Greenwell farm" aria-describedby="caption-attachment-6779" class="size-large wp-image-6779 lazyloaded" data-dcnode-id="1291" data-sizes="(max-width: 960px) 90vw, (max-width: 1200px) 620px, 800px" data-src="https://www.lovebigisland.com/wp-content/uploads/kona-coffee-tour-greenwell-800x529.jpg" data-srcset="https://www.lovebigisland.com/wp-content/uploads/kona-coffee-tour-greenwell-800x529.jpg 800w, https://www.lovebigisland.com/wp-content/uploads/kona-coffee-tour-greenwell-620x410.jpg 620w, https://www.lovebigisland.com/wp-content/uploads/kona-coffee-tour-greenwell-768x508.jpg 768w, https://www.lovebigisland.com/wp-content/uploads/kona-coffee-tour-greenwell-320x212.jpg 320w, https://www.lovebigisland.com/wp-content/uploads/kona-coffee-tour-greenwell-400x265.jpg 400w, https://www.lovebigisland.com/wp-content/uploads/kona-coffee-tour-greenwell-180x120.jpg 180w, https://www.lovebigisland.com/wp-content/uploads/kona-coffee-tour-greenwell.jpg 1280w" height="529" sizes="(max-width: 960px) 90vw, (max-width: 1200px) 620px, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/wp-content/uploads/kona-coffee-tour-greenwell-800x529.jpg&amp;raw" srcset="https://www.lovebigisland.com/wp-content/uploads/kona-coffee-tour-greenwell-800x529.jpg 800w, https://www.lovebigisland.com/wp-content/uploads/kona-coffee-tour-greenwell-620x410.jpg 620w, https://www.lovebigisland.com/wp-content/uploads/kona-coffee-tour-greenwell-768x508.jpg 768w, https://www.lovebigisland.com/wp-content/uploads/kona-coffee-tour-greenwell-320x212.jpg 320w, https://www.lovebigisland.com/wp-content/uploads/kona-coffee-tour-greenwell-400x265.jpg 400w, https://www.lovebigisland.com/wp-content/uploads/kona-coffee-tour-greenwell-180x120.jpg 180w, https://www.lovebigisland.com/wp-content/uploads/kona-coffee-tour-greenwell.jpg 1280w" width="800"></a><p class="wp-caption-text" data-dcnode-id="1279" id="caption-attachment-6779"><span data-dcnode-id="1289" instrument_node="">Visitors take a Kona Coffee Farm Tour at the Greenwell farm. Source: </span><a data-dcnode-id="1287" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/horspowr1001/16754987169/in/photostream/" rel="nofollow&quot; noopener" target="_blank"><span data-dcnode-id="1288" instrument_node="">here</span></a><span data-dcnode-id="1286" instrument_node=""> by user </span><a data-dcnode-id="1284" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/horspowr1001/" rel="nofollow&quot; noopener" target="_blank"><span data-dcnode-id="1285" instrument_node="">horspowr1001</span></a><span data-dcnode-id="1283" instrument_node=""> under a </span><a data-dcnode-id="1281" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creativecommons.org/licenses/by-nc/2.0/" rel="nofollow&quot; noopener" target="_blank"><span data-dcnode-id="1282" instrument_node="">CC BY-NC 2.0</span></a><span data-dcnode-id="1280" instrument_node=""> license</span></p></div><h3 data-dcnode-id="1276" id="chocolate"><span data-dcnode-id="1277" instrument_node="">Chocolate Farm Tours + Tastings</span></h3><p data-dcnode-id="1274"><span data-dcnode-id="1275" instrument_node="">Chocolate is one of Hawaiʻi’s most delicious but unknown export products. It also is a good souvenir to take home (chocolate covered macadamia nuts anyone?!)</span></p><p data-dcnode-id="1272"><span data-dcnode-id="1273" instrument_node="">Hawaii is the only state where chocolate can be made with 100% locally produced ingredients thanks to its tropical climate. Some of the farms that grow cacao pods organize tours of the orchards and tastings of their home-made chocolate. Examples of such tours are:</span></p><ul data-dcnode-id="1247"><li data-dcnode-id="1266"><span data-dcnode-id="1271" instrument_node="">Kuaiwi Farm in South Kona (</span><strong data-dcnode-id="1268"><a data-dcnode-id="1269" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kuaiwifarm.com/farm-tour" rel="noopener" target="_blank"><span data-dcnode-id="1270" instrument_node="">website</span></a></strong><span data-dcnode-id="1267" instrument_node="">)</span></li><li data-dcnode-id="1260"><span data-dcnode-id="1265" instrument_node="">Honokaa Chocolate Co. in Honokaʻa (</span><strong data-dcnode-id="1262"><a data-dcnode-id="1263" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//honokaachocolateco.com/pages/tastings-tours" rel="noopener" target="_blank"><span data-dcnode-id="1264" instrument_node="">website</span></a></strong><span data-dcnode-id="1261" instrument_node="">)</span></li><li data-dcnode-id="1254"><span data-dcnode-id="1259" instrument_node="">Hamakua Chocolate in Papaikou (6 miles north of Hilo, </span><strong data-dcnode-id="1256"><a data-dcnode-id="1257" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hamakuachocolate.com/exploreandtaste" rel="noopener" target="_blank"><span data-dcnode-id="1258" instrument_node="">website</span></a></strong><span data-dcnode-id="1255" instrument_node="">)</span></li><li data-dcnode-id="1248"><span data-dcnode-id="1253" instrument_node="">Puna Gold Estate in Lelani Estates near the town of Pāhoa (</span><strong data-dcnode-id="1250"><a data-dcnode-id="1251" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//punagoldestate.com/booking-farm-tours/" rel="noopener" target="_blank"><span data-dcnode-id="1252" instrument_node="">website</span></a></strong><span data-dcnode-id="1249" instrument_node="">)</span></li></ul><p data-dcnode-id="1241"><span data-dcnode-id="1246" instrument_node="">You can find more tours in the </span><strong data-dcnode-id="1243"><a data-dcnode-id="1244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/organic-chocolate-big-island-hawaii/"><span data-dcnode-id="1245" instrument_node="">guide to locally produced chocolate</span></a></strong><span data-dcnode-id="1242" instrument_node=""> on our website.</span></p><h3 data-dcnode-id="1239" id="vanilla"><span data-dcnode-id="1240" instrument_node="">Vanilla Farms</span></h3><p data-dcnode-id="1237"><span data-dcnode-id="1238" instrument_node="">Vanilla beans are the fruits of an orchid that blooms for one day only, during which the flower must very carefully be hand pollinated. There are many more fascinating things to learn about growing vanilla, which you can do during a tour of these two vanilla farms:</span></p><ul data-dcnode-id="1215"><li data-dcnode-id="1225"><span data-dcnode-id="1236" instrument_node="">The Hawaiian Vanilla Co. (close to </span><strong data-dcnode-id="1234"><span data-dcnode-id="1235" instrument_node="">Honokaʻa</span></strong><span data-dcnode-id="1233" instrument_node=""> on the </span><a data-dcnode-id="1231" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/hamakua-coast/"><span data-dcnode-id="1232" instrument_node="">Hamakua coast</span></a><span data-dcnode-id="1230" instrument_node="">) organizes farm tours that can also include a lunch during which you can taste foods and drinks that include their vanilla. You can find more information about the tours on their </span><strong data-dcnode-id="1227"><a data-dcnode-id="1228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hawaiianvanilla.com/pages/visit-our-farm" rel="noopener" target="_blank"><span data-dcnode-id="1229" instrument_node="">website</span></a></strong><span data-dcnode-id="1226" instrument_node="">.</span></li><li data-dcnode-id="1216"><span data-dcnode-id="1224" instrument_node="">The Vanillerie is a small vanilla farm just north of </span><strong data-dcnode-id="1222"><span data-dcnode-id="1223" instrument_node="">Kona</span></strong><span data-dcnode-id="1221" instrument_node="">. They organize tours through their greenhouses and let you taste their products. Find more information about the tours on their </span><strong data-dcnode-id="1218"><a data-dcnode-id="1219" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thevanillerie.com/about" rel="noopener" target="_blank"><span data-dcnode-id="1220" instrument_node="">website</span></a></strong><span data-dcnode-id="1217" instrument_node="">.</span></li></ul><p data-dcnode-id="1213"><span data-dcnode-id="1214" instrument_node="">The following video about the tour + luncheon organized by the Hawaiian Vanilla Co. gives you an idea of what to expect during&nbsp;a visit:</span></p><div class="lyte-wrapper" data-dcnode-id="1201" style="width:853px;max-width:100%;margin:5px auto;" title="Hawaiian Vanilla Luncheon Expierience"><div class="lyte lP" data-dcnode-id="1202" id="WYL_CyBgR-YMq4k"><div class="pL wyl-lazy" data-dcnode-id="1205" data-src="https://www.lovebigisland.com/wp-content/plugins/wp-youtube-lyte/lyteCache.php?origThumbUrl=https%3A%2F%2Fi.ytimg.com%2Fvi%2FCyBgR-YMq4k%2Fhqdefault.jpg" id="lyte_CyBgR-YMq4k"><div class="tC" data-dcnode-id="1210"><div class="tT" data-dcnode-id="1211"><span data-dcnode-id="1212" instrument_node="">Hawaiian Vanilla Luncheon Expierience</span></div></div><div class="play" data-dcnode-id="1209"></div><div class="ctrl" data-dcnode-id="1206"><div class="Lctrl" data-dcnode-id="1208"></div><div class="Rctrl" data-dcnode-id="1207"></div></div></div><noscript data-dcnode-id="1203"><span data-dcnode-id="1204" instrument_node="">&lt;a href="https://youtu.be/CyBgR-YMq4k"&gt;&lt;img src="https://www.lovebigisland.com/wp-content/plugins/wp-youtube-lyte/lyteCache.php?origThumbUrl=https%3A%2F%2Fi.ytimg.com%2Fvi%2FCyBgR-YMq4k%2F0.jpg" alt="Hawaiian Vanilla Luncheon Expierience" width="853" height="460" /&gt;&lt;br /&gt;Watch this video on YouTube&lt;/a&gt;</span></noscript></div></div><div class="lL" data-dcnode-id="1200" style="max-width:100%;width:853px;margin:5px auto;"></div><p data-dcnode-id="1199"></p><h3 data-dcnode-id="1197" id="macadamia"><span data-dcnode-id="1198" instrument_node="">Macadamia Nuts Orchard Tours</span></h3><p data-dcnode-id="1192"><span data-dcnode-id="1196" instrument_node="">Macadamia nuts are one of Hawaiʻi’s export crops and they are delicious! You can find some small farm tours whose properties also contain macadamia nut orchards but there are no dedicated macadamia orchard tours on the Big Island. If you are looking to see a macadamia orchard you should have a look at more general-purpose farm tours listed </span><a data-dcnode-id="1194" href="#farm-tours"><span data-dcnode-id="1195" instrument_node="">here</span></a><span data-dcnode-id="1193" instrument_node="">.</span></p><p data-dcnode-id="1190"><span data-dcnode-id="1191" instrument_node="">The farming and processing of macadamia nuts mostly is a large-scale operation and there are two companies that sell macadamia nuts with a visitor center you can visit:</span></p><ul data-dcnode-id="1177"><li data-dcnode-id="1184"><span data-dcnode-id="1189" instrument_node="">The Hamakua Macadamia Nut Company (in Kawaihae, north of Kona </span><strong data-dcnode-id="1186"><a data-dcnode-id="1187" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hawnnut.com/visitor-center/" rel="noopener" target="_blank"><span data-dcnode-id="1188" instrument_node="">website</span></a></strong><span data-dcnode-id="1185" instrument_node="">)</span></li><li data-dcnode-id="1178"><span data-dcnode-id="1183" instrument_node="">The Mauna Loa Macadamia Nut Corporation (close to Hilo, </span><strong data-dcnode-id="1180"><a data-dcnode-id="1181" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.maunaloa.com/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1182" instrument_node="">website</span></a></strong><span data-dcnode-id="1179" instrument_node="">)</span></li></ul><p data-dcnode-id="1175"><span data-dcnode-id="1176" instrument_node="">Both above have visitor center where you can see how the nuts are processed and the Hamakua Macademia Nut Company also offers free samples and coffee at their visitor center. The Hamakua Mac nut company has a more local feel and is a good place to buy nuts.</span></p><p data-dcnode-id="1169"><span data-dcnode-id="1174" instrument_node="">You can read more about </span><strong data-dcnode-id="1171"><a data-dcnode-id="1172" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/macadamia-nuts/"><span data-dcnode-id="1173" instrument_node="">macadamia nuts</span></a></strong><span data-dcnode-id="1170" instrument_node=""> on our website.</span></p><h3 data-dcnode-id="1167" id="taro"><span data-dcnode-id="1168" instrument_node="">Wetland Taro (Kalo) farm tour in Waipiʻo Valley</span></h3><p data-dcnode-id="1159"><span data-dcnode-id="1166" instrument_node="">Wetland taro (called ‘kalo’ in Hawaiian) is one of Hawaiʻi’s most iconic crops with a deep cultural connection to the Hawaiian way of life. The primary product made from taro and a staple in the Hawaiian diet is poi, which is made from the underground plant stem of that taro plant, while the taro leaves are used to prepare lau lau (explore more </span><a data-dcnode-id="1164" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.kaukaukitchen.com/pages/recipes-kalo.htm" rel="noopener" target="_blank"><span data-dcnode-id="1165" instrument_node="">taro recipes</span></a><span data-dcnode-id="1163" instrument_node=""> or read more about </span><a data-dcnode-id="1161" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//keolamagazine.com/agriculture/kalo-farming-on-hawaii-island/" rel="noopener" target="_blank"><span data-dcnode-id="1162" instrument_node="">taro farming</span></a><span data-dcnode-id="1160" instrument_node=""> on the Big Island).</span></p><p data-dcnode-id="1155"><span data-dcnode-id="1158" instrument_node="">Most taro on the Big Island is grown in Waipiʻo valley and the Hamakua districts, and you can visit a taro farm in Waipiʻo valley yourself as part of a guided tour. </span><strong data-dcnode-id="1156"><span data-dcnode-id="1157" instrument_node="">This tour was organized by Hawea Waipiʻo Valley Adventure, but unfortunately was discontinued in 2020.</span></strong></p><p data-dcnode-id="1153"><span data-dcnode-id="1154" instrument_node="">For those curious about eating poi: you can find it in local supermarkets such as the KTA and sometimes find it at the menu in restaurants and luaus. Poi has a paste-like texture with a pale purple color that naturally comes from the plant. Its taste greatly depends on freshness and preparation method but in general is not very outspoken.</span></p><div class="wp-caption aligncenter" data-dcnode-id="1140" id="attachment_11692" style="width: 810px"><a data-dcnode-id="1149" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/wp-content/uploads/taro-kalo-farm-waipio-valley.jpg"><noscript data-dcnode-id="1151"><span data-dcnode-id="1152" instrument_node="">&lt;img aria-describedby="caption-attachment-11692" class="size-large wp-image-11692" src="https://www.lovebigisland.com/wp-content/uploads/taro-kalo-farm-waipio-valley-800x433.jpg" alt="Wetland Taro field in Waipi'o valley" width="800" height="433" srcset="https://www.lovebigisland.com/wp-content/uploads/taro-kalo-farm-waipio-valley-800x433.jpg 800w, https://www.lovebigisland.com/wp-content/uploads/taro-kalo-farm-waipio-valley-620x336.jpg 620w, https://www.lovebigisland.com/wp-content/uploads/taro-kalo-farm-waipio-valley-768x416.jpg 768w, https://www.lovebigisland.com/wp-content/uploads/taro-kalo-farm-waipio-valley-320x173.jpg 320w, https://www.lovebigisland.com/wp-content/uploads/taro-kalo-farm-waipio-valley-400x217.jpg 400w, https://www.lovebigisland.com/wp-content/uploads/taro-kalo-farm-waipio-valley.jpg 1944w" sizes="(max-width: 960px) 90vw, (max-width: 1200px) 620px, 800px" /&gt;</span></noscript><img alt="Wetland Taro field in Waipi'o valley" aria-describedby="caption-attachment-11692" class="lazyload size-large wp-image-11692" data-dcnode-id="1150" data-sizes="(max-width: 960px) 90vw, (max-width: 1200px) 620px, 800px" data-src="https://www.lovebigisland.com/wp-content/uploads/taro-kalo-farm-waipio-valley-800x433.jpg" data-srcset="https://www.lovebigisland.com/wp-content/uploads/taro-kalo-farm-waipio-valley-800x433.jpg 800w, https://www.lovebigisland.com/wp-content/uploads/taro-kalo-farm-waipio-valley-620x336.jpg 620w, https://www.lovebigisland.com/wp-content/uploads/taro-kalo-farm-waipio-valley-768x416.jpg 768w, https://www.lovebigisland.com/wp-content/uploads/taro-kalo-farm-waipio-valley-320x173.jpg 320w, https://www.lovebigisland.com/wp-content/uploads/taro-kalo-farm-waipio-valley-400x217.jpg 400w, https://www.lovebigisland.com/wp-content/uploads/taro-kalo-farm-waipio-valley.jpg 1944w" height="433" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20800%20433%22%3E%3C/svg%3E" width="800"></a><p class="wp-caption-text" data-dcnode-id="1141" id="caption-attachment-11692"><span data-dcnode-id="1148" instrument_node="">A wetland Taro field in Waipiʻo valley. Image credit: </span><a data-dcnode-id="1146" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/shootingchris/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1147" instrument_node="">Shooting Chris</span></a><span data-dcnode-id="1145" instrument_node=""> on Flickr. Adapted from </span><a data-dcnode-id="1143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/shootingchris/3124699731/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1144" instrument_node="">original</span></a><span data-dcnode-id="1142" instrument_node="">.</span></p></div><h3 data-dcnode-id="1138" id="farm-tours"><span data-dcnode-id="1139" instrument_node="">‘General’ Farm Tours:</span></h3><p data-dcnode-id="1136"><span data-dcnode-id="1137" instrument_node="">There are many small farms on the Big Island that grow a multitude of crops rather than specializing in just one. These are mostly organic farms using sustainable practices. Tours take you around their property while explaining why they do what they do, and afterwards there is a chance to sample their locally grown products. Some farms even organize full-blown farm-to-table dinners!</span></p><h4 data-dcnode-id="1134"><span data-dcnode-id="1135" instrument_node="">Kuaiwi Farm</span></h4><p data-dcnode-id="1129"><a data-dcnode-id="1131" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kuaiwifarm.com/farm-tour" rel="noopener" target="_blank"><strong data-dcnode-id="1132"><span data-dcnode-id="1133" instrument_node="">Kuaiwi farm</span></strong></a><span data-dcnode-id="1130" instrument_node=""> is a five-acre certified organic farm in the south Kona district growing a diverse range of crops including Kona coffee, chocolate, macadamia nuts, avocados, bananas, pineapple, tea, citrus, vegetable gardens and more. Their ~2 hour farm tour includes a tasting of their products on the breezy lanai. Drink coffee, taste chocolate, apple bananas, mac nuts and chat with the geckos.</span></p><h4 data-dcnode-id="1127"><span data-dcnode-id="1128" instrument_node="">Starseed Ranch</span></h4><p data-dcnode-id="1121"><span data-dcnode-id="1126" instrument_node="">The </span><a data-dcnode-id="1123" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//starseedranch.com/north-kohala-farm-tours/" rel="noopener" target="_blank"><strong data-dcnode-id="1124"><span data-dcnode-id="1125" instrument_node="">Starseed Ranch</span></strong></a><span data-dcnode-id="1122" instrument_node=""> is a sustainable homestead and farm on the northern coast of the Big Island of Hawaiʻi, about 15 minutes from the historic town of Hawi. They organize a 1-hour tour through their 6-acre orchard with a variety of tropical fruit trees (mango, papaya, avocado, breadfruit, lemon, lime, coconut) and a tropical food forests planted with traditional Polynesian crops (kalo, turmeric, bananas, plantains). After the tour you can either have locally grown snacks or opt for a full-scale farm-to-table dinner.</span></p><h4 data-dcnode-id="1119"><span data-dcnode-id="1120" instrument_node="">Big Island Farms</span></h4><p data-dcnode-id="1113"><span data-dcnode-id="1118" instrument_node="">The </span><a data-dcnode-id="1115" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bigislandfarms.com/farm-tours/"><strong data-dcnode-id="1116"><span data-dcnode-id="1117" instrument_node="">Big Island Farms</span></strong></a><span data-dcnode-id="1114" instrument_node=""> property is spread over 60 acres along the breathtaking Hamakua coast. Most (40 acres) of their property is covered with macadamia nut orchards, while the remaining lands are used for a permaculture food forests, orchards, and a variety of themed gardens containing over 200 unique species of plants. Their tour includes a “farm fresh tasting experience” and information about their plants and history.</span></p><h4 data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node="">OK Farms</span></h4><p data-dcnode-id="1106"><span data-dcnode-id="1110" instrument_node="">Located above the Rainbow Falls, </span><a data-dcnode-id="1108" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okfarmshawaii.com/tours-a" rel="noopener" target="_blank"><span data-dcnode-id="1109" instrument_node="">OK farms</span></a><span data-dcnode-id="1107" instrument_node=""> organizes a 1-hour tour of their farm where they grow tropical crops ranging from Lychee, Longan, Rambutan, Cinnamon, Nutmeg, Heart of Palm, Cacao (chocolate), Coffee, and more.</span></p><h4 data-dcnode-id="1104"><span data-dcnode-id="1105" instrument_node="">Baumkuchen Farm</span></h4><p data-dcnode-id="1099"><span data-dcnode-id="1103" instrument_node="">This farm on the Hamakua coast organizes tours of their property where you can learn about the vanilla they grow and hear about their Hawaiian-German History. A “Baum Kuchen” is a German style tree cake, and they also offer a special baking event where you get to cook (and keep!) such a cake with a stick on a campfire. More information on their </span><a data-dcnode-id="1101" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//baumkuchenfarm.com/farm-tours/" rel="noopener" target="_blank"><span data-dcnode-id="1102" instrument_node="">website</span></a><span data-dcnode-id="1100" instrument_node="">.</span></p><div class="wp-caption aligncenter" data-dcnode-id="1089" id="attachment_16682" style="width: 810px"><a data-dcnode-id="1095" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/wp-content/uploads/baumkuchenfarmtour-bigisland.jpg"><noscript data-dcnode-id="1097"><span data-dcnode-id="1098" instrument_node="">&lt;img aria-describedby="caption-attachment-16682" class="size-large wp-image-16682" src="https://www.lovebigisland.com/wp-content/uploads/baumkuchenfarmtour-bigisland-800x600.jpg" alt="People roasting Baumstriezels" width="800" height="600" srcset="https://www.lovebigisland.com/wp-content/uploads/baumkuchenfarmtour-bigisland-800x600.jpg 800w, https://www.lovebigisland.com/wp-content/uploads/baumkuchenfarmtour-bigisland-620x465.jpg 620w, https://www.lovebigisland.com/wp-content/uploads/baumkuchenfarmtour-bigisland-300x225.jpg 300w, https://www.lovebigisland.com/wp-content/uploads/baumkuchenfarmtour-bigisland-320x240.jpg 320w, https://www.lovebigisland.com/wp-content/uploads/baumkuchenfarmtour-bigisland-400x300.jpg 400w, https://www.lovebigisland.com/wp-content/uploads/baumkuchenfarmtour-bigisland.jpg 1600w" sizes="(max-width: 960px) 90vw, (max-width: 1200px) 620px, 800px" /&gt;</span></noscript><img alt="People roasting Baumstriezels" aria-describedby="caption-attachment-16682" class="lazyload size-large wp-image-16682" data-dcnode-id="1096" data-sizes="(max-width: 960px) 90vw, (max-width: 1200px) 620px, 800px" data-src="https://www.lovebigisland.com/wp-content/uploads/baumkuchenfarmtour-bigisland-800x600.jpg" data-srcset="https://www.lovebigisland.com/wp-content/uploads/baumkuchenfarmtour-bigisland-800x600.jpg 800w, https://www.lovebigisland.com/wp-content/uploads/baumkuchenfarmtour-bigisland-620x465.jpg 620w, https://www.lovebigisland.com/wp-content/uploads/baumkuchenfarmtour-bigisland-300x225.jpg 300w, https://www.lovebigisland.com/wp-content/uploads/baumkuchenfarmtour-bigisland-320x240.jpg 320w, https://www.lovebigisland.com/wp-content/uploads/baumkuchenfarmtour-bigisland-400x300.jpg 400w, https://www.lovebigisland.com/wp-content/uploads/baumkuchenfarmtour-bigisland.jpg 1600w" height="600" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20800%20600%22%3E%3C/svg%3E" width="800"></a><p class="wp-caption-text" data-dcnode-id="1090" id="caption-attachment-16682"><span data-dcnode-id="1094" instrument_node="">One of the tour options is roasting Baumstriezels (a delicious </span><a data-dcnode-id="1092" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/K%25C3%25BCrt%25C5%2591skal%25C3%25A1cs" rel="noopener" target="_blank"><span data-dcnode-id="1093" instrument_node="">eastern European version</span></a><span data-dcnode-id="1091" instrument_node=""> of bread on a stick) over an open campfire.</span></p></div><h3 data-dcnode-id="1087"><span data-dcnode-id="1088" instrument_node="">Ranch Tour on a UTV</span></h3><div class="gmail_default" data-dcnode-id="1027"><p data-dcnode-id="1085"><span data-dcnode-id="1086" instrument_node="">The Waipiʻo on Horseback Ranch spans a traditional land division (Ahupuaʻa) that stretches from the mountain to the ocean and is home to native flora and fauna.</span></p><p data-dcnode-id="1083"><span data-dcnode-id="1084" instrument_node="">You can explore their grounds with a 2.5 hour tour with a UTV during which you get to make 4 to 8 stops depending on the weather and condition of the trail. At every stop the local guides engage and talk about the ranch history, present planting projects, and the importance of the rich cultural landscape. There is a lot of history in this property and the guides giving the tours are very knowledgeable!</span></p><p data-dcnode-id="1081"><span data-dcnode-id="1082" instrument_node="">This is a great adventure if you are looking for an educational experience filled with beautiful views.</span></p><div class="wrapper" data-dcnode-id="1028"><div class="ribbon ribbon-top-left" data-dcnode-id="1078"><span class="iheart" data-dcnode-id="1079"><span data-dcnode-id="1080" instrument_node="">Suggested tour</span></span></div><div class="tour_archive_summary_image" data-dcnode-id="1076"><div class="tour-archive-image lazyload" data-bg="https://www.lovebigisland.com/wp-content/uploads/2-atv-in-taro-field-620x413.jpg" data-dcnode-id="1077"></div></div><div class="tour_archive_description" data-dcnode-id="1070"><h3 data-dcnode-id="1074"><span data-dcnode-id="1075" instrument_node="">Explore Hawaii’s Rich Cultural Landscape on a UTV Farm Tour</span></h3><span class="tour-description" data-dcnode-id="1071"><p data-dcnode-id="1072"><span data-dcnode-id="1073" instrument_node="">A scenic UTV + Farm tour that takes you from fertile gardens and a working livestock ranch to sweeping grasslands, oceanfront, and tree canopies</span></p></span></div><div class="tour_archive_summary" data-dcnode-id="1051"><p data-dcnode-id="1065"><span class="icon-history" data-dcnode-id="1069"></span><strong data-dcnode-id="1067"><span data-dcnode-id="1068" instrument_node="">Duration:</span></strong><span data-dcnode-id="1066" instrument_node=""> 2.5 hours</span></p><p data-dcnode-id="1058"><span class="icon-info" data-dcnode-id="1064"></span><strong data-dcnode-id="1062"><span data-dcnode-id="1063" instrument_node="">By:</span></strong><span data-dcnode-id="1061" instrument_node=""> </span><a data-dcnode-id="1059" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/tours/%3Ffwp_tour_provider%3Dall-about-the-view"><span data-dcnode-id="1060" instrument_node=""> All About the View</span></a></p><p data-dcnode-id="1052"><span data-dcnode-id="1054" style="color:#01cb68"><span class="icon-checkmark" data-dcnode-id="1057"></span><strong data-dcnode-id="1055"><span data-dcnode-id="1056" instrument_node=""> Free cancellation:</span></strong></span><span data-dcnode-id="1053" instrument_node=""> up to 48 hours before tour</span></p></div><div class="tour_archive_book" data-dcnode-id="1029"><span class="tour-price-description-right" data-dcnode-id="1040"><span class="tour-price-lowlight" data-dcnode-id="1048"><p data-dcnode-id="1049"><span data-dcnode-id="1050" instrument_node="">from:</span></p></span><p data-dcnode-id="1044"><strong data-dcnode-id="1046"><span data-dcnode-id="1047" instrument_node="">$</span></strong><span data-dcnode-id="1045" instrument_node="">150</span></p><p data-dcnode-id="1041"><a class="button" data-dcnode-id="1042" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/tours/utv-farm-tour/" onmousedown="gtag('event', 'click_to_tour', {  'event_category' : 'fareharbor', 'event_label' : 'All About the View'});"><span data-dcnode-id="1043" instrument_node="">Details</span></a></p></span><span class="infoo tooltip" data-dcnode-id="1030"><a data-dcnode-id="1038" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/tours/%23page"><span data-dcnode-id="1039" instrument_node="">What is a suggested tour</span></a><span data-dcnode-id="1037" instrument_node="">?</span><span class="tooltip-text" data-dcnode-id="1031"><span class="icon-info" data-dcnode-id="1036"></span><span data-dcnode-id="1035" instrument_node="">Our suggested tours are hand-picked tours that receive consistent good reviews, give back to the community, and work hard to minimize their impact on the environment. Read more about these </span><a data-dcnode-id="1033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/tours/"><span data-dcnode-id="1034" instrument_node="">tours on our website</span></a><span data-dcnode-id="1032" instrument_node="">.</span></span></span></div></div></div><h3 data-dcnode-id="1025" id="winery"><span data-dcnode-id="1026" instrument_node="">Volcano Winery</span></h3><p data-dcnode-id="1023"><span data-dcnode-id="1024" instrument_node="">This probably comes as a bit of a surprise but did you know that Hawaii has a winery?</span></p><p data-dcnode-id="1021"><span data-dcnode-id="1022" instrument_node="">The vineyards of the Volcano Winery are spread over the fertile volcanic slopes of Mauna Loa, close to the entrance of the Hawaii Volcanoes National Park. While they do not offer a tour of their vineyards they do offer tastings of their locally produced wines 🍷and teas.</span></p><p data-dcnode-id="1015"><span data-dcnode-id="1020" instrument_node="">Read more about the </span><strong data-dcnode-id="1017"><a data-dcnode-id="1018" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/volcano-village/volcano-winery/%23tasting"><span data-dcnode-id="1019" instrument_node="">Volcano Winery</span></a></strong><span data-dcnode-id="1016" instrument_node=""> (and the wine tasting) on our website.</span></p><div class="wp-caption aligncenter" data-dcnode-id="1008" id="attachment_7254" style="width: 810px"><a data-dcnode-id="1011" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/wp-content/uploads/volcano_winery_mauna_loa.jpg"><noscript data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">&lt;img aria-describedby="caption-attachment-7254" class="size-large wp-image-7254" src="https://www.lovebigisland.com/wp-content/uploads/volcano_winery_mauna_loa-800x481.jpg" alt="volcano winery, volcano village, big island, hawaii, vineyard, volcano" width="800" height="481" srcset="https://www.lovebigisland.com/wp-content/uploads/volcano_winery_mauna_loa-800x481.jpg 800w, https://www.lovebigisland.com/wp-content/uploads/volcano_winery_mauna_loa-620x373.jpg 620w, https://www.lovebigisland.com/wp-content/uploads/volcano_winery_mauna_loa-320x193.jpg 320w, https://www.lovebigisland.com/wp-content/uploads/volcano_winery_mauna_loa-400x241.jpg 400w, https://www.lovebigisland.com/wp-content/uploads/volcano_winery_mauna_loa-768x462.jpg 768w, https://www.lovebigisland.com/wp-content/uploads/volcano_winery_mauna_loa-600x361.jpg 600w, https://www.lovebigisland.com/wp-content/uploads/volcano_winery_mauna_loa-638x384.jpg 638w, https://www.lovebigisland.com/wp-content/uploads/volcano_winery_mauna_loa-958x576.jpg 958w, https://www.lovebigisland.com/wp-content/uploads/volcano_winery_mauna_loa.jpg 1280w" sizes="(max-width: 960px) 90vw, (max-width: 1200px) 620px, 800px" /&gt;</span></noscript><img alt="volcano winery, volcano village, big island, hawaii, vineyard, volcano" aria-describedby="caption-attachment-7254" class="lazyload size-large wp-image-7254" data-dcnode-id="1012" data-sizes="(max-width: 960px) 90vw, (max-width: 1200px) 620px, 800px" data-src="https://www.lovebigisland.com/wp-content/uploads/volcano_winery_mauna_loa-800x481.jpg" data-srcset="https://www.lovebigisland.com/wp-content/uploads/volcano_winery_mauna_loa-800x481.jpg 800w, https://www.lovebigisland.com/wp-content/uploads/volcano_winery_mauna_loa-620x373.jpg 620w, https://www.lovebigisland.com/wp-content/uploads/volcano_winery_mauna_loa-320x193.jpg 320w, https://www.lovebigisland.com/wp-content/uploads/volcano_winery_mauna_loa-400x241.jpg 400w, https://www.lovebigisland.com/wp-content/uploads/volcano_winery_mauna_loa-768x462.jpg 768w, https://www.lovebigisland.com/wp-content/uploads/volcano_winery_mauna_loa-600x361.jpg 600w, https://www.lovebigisland.com/wp-content/uploads/volcano_winery_mauna_loa-638x384.jpg 638w, https://www.lovebigisland.com/wp-content/uploads/volcano_winery_mauna_loa-958x576.jpg 958w, https://www.lovebigisland.com/wp-content/uploads/volcano_winery_mauna_loa.jpg 1280w" height="481" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20800%20481%22%3E%3C/svg%3E" width="800"></a><p class="wp-caption-text" data-dcnode-id="1009" id="caption-attachment-7254"><span data-dcnode-id="1010" instrument_node="">The Volcano Winery vineyard is located on the Mauna Loa volcano, which you can see in the background. Photo credits: Mike Neenan</span></p></div><h2 data-dcnode-id="1006" id="animals"><span data-dcnode-id="1007" instrument_node="">Petting zoo / Bee Tours / Animal Shelters:</span></h2><p data-dcnode-id="1004"><span data-dcnode-id="1005" instrument_node="">We have a LOT of animal-related tours for you to pick from, ranging from small insects (beehives and honey production) to large (rescued) farm animals. You can also pay a visit to a petting zoo in Volcano or get some goat therapy in Honomu, tour an octopus and seahorse farm in Kona, take out a shelter dog for a day trip, and even get to see zebras and flamingos in an exotic animal shelter!</span></p><p data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">You can find the following tours in this section:</span></p><ul data-dcnode-id="966"><li data-dcnode-id="997"><strong data-dcnode-id="999"><a data-dcnode-id="1000" href="#bee"><span data-dcnode-id="1001" instrument_node="">Bee keeping</span></a></strong><span data-dcnode-id="998" instrument_node=""> tours</span></li><li data-dcnode-id="992"><span data-dcnode-id="996" instrument_node="">Animal </span><strong data-dcnode-id="993"><a data-dcnode-id="994" href="#sanctuaries"><span data-dcnode-id="995" instrument_node="">sanctuaries </span></a></strong></li><li data-dcnode-id="988"><strong data-dcnode-id="989"><a data-dcnode-id="990" href="#petting-zoo"><span data-dcnode-id="991" instrument_node="">Petting zoo/farm</span></a></strong></li><li data-dcnode-id="982"><span data-dcnode-id="987" instrument_node="">Take a </span><strong data-dcnode-id="984"><a data-dcnode-id="985" href="#shelter-dogs"><span data-dcnode-id="986" instrument_node="">shelter dog</span></a></strong><span data-dcnode-id="983" instrument_node=""> out for the day</span></li><li data-dcnode-id="977"><strong data-dcnode-id="979"><a data-dcnode-id="980" href="#seahorse"><span data-dcnode-id="981" instrument_node="">Seahorse</span></a></strong><span data-dcnode-id="978" instrument_node=""> farm tour</span></li><li data-dcnode-id="972"><strong data-dcnode-id="974"><a data-dcnode-id="975" href="#octopus"><span data-dcnode-id="976" instrument_node="">Octopus</span></a></strong><span data-dcnode-id="973" instrument_node=""> farm tour</span></li><li data-dcnode-id="967"><strong data-dcnode-id="969"><a data-dcnode-id="970" href="#coral"><span data-dcnode-id="971" instrument_node="">Coral</span></a></strong><span data-dcnode-id="968" instrument_node=""> lab tour</span></li></ul><h3 data-dcnode-id="964" id="bee"><span data-dcnode-id="965" instrument_node="">Bee Keeping tours</span></h3><p data-dcnode-id="962"><span data-dcnode-id="963" instrument_node="">Bees play a large role in Hawaiian agriculture by pollinating local crops such as coffee, macadamia nuts, and many tropical fruits. Many of our bee colonies (1/3 of all colonies in the state) are located in the south Kona district, and Kealakekua bay is especially well-endowed when it comes to bees- it has one of the largest concentrations of honey bees in the pacific basin.</span></p><h4 data-dcnode-id="960"><span data-dcnode-id="961" instrument_node="">Bird and Bee Hawaiʻi (Honokaʻa)</span></h4><p data-dcnode-id="954"><span data-dcnode-id="959" instrument_node="">Located on a small 5 acre farm in Honokaʻa, Bird and Bee Hawaiʻi organizes a 2-hour “Bee keeping introduction for visitors” tour of their farm and hives. You can read more about the tour </span><strong data-dcnode-id="956"><a data-dcnode-id="957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.birdandbeehawaii.com/store/p8/Intro_to_Beekeeping_for_Visitors.html" rel="noopener" target="_blank"><span data-dcnode-id="958" instrument_node="">on their website</span></a></strong><span data-dcnode-id="955" instrument_node="">.</span></p><div class="wp-caption aligncenter" data-dcnode-id="947" id="attachment_17125" style="width: 810px"><a data-dcnode-id="950" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/wp-content/uploads/birds-bees-tour-big-island.jpg"><noscript data-dcnode-id="952"><span data-dcnode-id="953" instrument_node="">&lt;img aria-describedby="caption-attachment-17125" class="size-large wp-image-17125" src="https://www.lovebigisland.com/wp-content/uploads/birds-bees-tour-big-island-800x600.jpg" alt="beekeeping tour in progress" width="800" height="600" srcset="https://www.lovebigisland.com/wp-content/uploads/birds-bees-tour-big-island-800x600.jpg 800w, https://www.lovebigisland.com/wp-content/uploads/birds-bees-tour-big-island-620x465.jpg 620w, https://www.lovebigisland.com/wp-content/uploads/birds-bees-tour-big-island-300x225.jpg 300w, https://www.lovebigisland.com/wp-content/uploads/birds-bees-tour-big-island-320x240.jpg 320w, https://www.lovebigisland.com/wp-content/uploads/birds-bees-tour-big-island-400x300.jpg 400w, https://www.lovebigisland.com/wp-content/uploads/birds-bees-tour-big-island.jpg 2000w" sizes="(max-width: 960px) 90vw, (max-width: 1200px) 620px, 800px" /&gt;</span></noscript><img alt="beekeeping tour in progress" aria-describedby="caption-attachment-17125" class="lazyload size-large wp-image-17125" data-dcnode-id="951" data-sizes="(max-width: 960px) 90vw, (max-width: 1200px) 620px, 800px" data-src="https://www.lovebigisland.com/wp-content/uploads/birds-bees-tour-big-island-800x600.jpg" data-srcset="https://www.lovebigisland.com/wp-content/uploads/birds-bees-tour-big-island-800x600.jpg 800w, https://www.lovebigisland.com/wp-content/uploads/birds-bees-tour-big-island-620x465.jpg 620w, https://www.lovebigisland.com/wp-content/uploads/birds-bees-tour-big-island-300x225.jpg 300w, https://www.lovebigisland.com/wp-content/uploads/birds-bees-tour-big-island-320x240.jpg 320w, https://www.lovebigisland.com/wp-content/uploads/birds-bees-tour-big-island-400x300.jpg 400w, https://www.lovebigisland.com/wp-content/uploads/birds-bees-tour-big-island.jpg 2000w" height="600" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20800%20600%22%3E%3C/svg%3E" width="800"></a><p class="wp-caption-text" data-dcnode-id="948" id="caption-attachment-17125"><span data-dcnode-id="949" instrument_node="">Introduction to beekeeping on Hawaiʻi for visitors tour in progress. Credit: Bird and Bee Hawaiʻi.</span></p></div><h4 data-dcnode-id="945"><span data-dcnode-id="946" instrument_node="">Big Island Bees</span></h4><p data-dcnode-id="939"><span data-dcnode-id="944" instrument_node="">You can learn a lot of local bee-facts and of course about beekeeping by visiting the tour organized by Big Island Bees (</span><strong data-dcnode-id="941"><a data-dcnode-id="942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bigislandbees.com/pages/visit-us-in-hawaii" rel="noopener" target="_blank"><span data-dcnode-id="943" instrument_node="">website</span></a></strong><span data-dcnode-id="940" instrument_node="">), organized at their honey packing &amp; processing plant. The super interesting tours include an inspection of a live hive with a beekeeper, which you can watch from behind a screened area, and a free sampling of all their different honey varietals. After the tour you can also have a look at their small museum and possible buy some of their products.</span></p><p data-dcnode-id="937"><span data-dcnode-id="938" instrument_node="">See the following video to get an idea of what the bee tour is like:</span></p><div class="lyte-wrapper" data-dcnode-id="925" style="width:853px;max-width:100%;margin:5px auto;" title="Take Our Beekeeping &amp;amp; Honey Tour"><div class="lyte lP" data-dcnode-id="926" id="WYL_anY2c69VJ0g"><div class="pL wyl-lazy" data-dcnode-id="929" data-src="https://www.lovebigisland.com/wp-content/plugins/wp-youtube-lyte/lyteCache.php?origThumbUrl=https%3A%2F%2Fi.ytimg.com%2Fvi%2FanY2c69VJ0g%2Fhqdefault.jpg" id="lyte_anY2c69VJ0g"><div class="tC" data-dcnode-id="934"><div class="tT" data-dcnode-id="935"><span data-dcnode-id="936" instrument_node="">Take Our Beekeeping &amp; Honey Tour</span></div></div><div class="play" data-dcnode-id="933"></div><div class="ctrl" data-dcnode-id="930"><div class="Lctrl" data-dcnode-id="932"></div><div class="Rctrl" data-dcnode-id="931"></div></div></div><noscript data-dcnode-id="927"><span data-dcnode-id="928" instrument_node="">&lt;a href="https://youtu.be/anY2c69VJ0g"&gt;&lt;img src="https://www.lovebigisland.com/wp-content/plugins/wp-youtube-lyte/lyteCache.php?origThumbUrl=https%3A%2F%2Fi.ytimg.com%2Fvi%2FanY2c69VJ0g%2F0.jpg" alt="Take Our Beekeeping &amp;amp;amp; Honey Tour" width="853" height="460" /&gt;&lt;br /&gt;Watch this video on YouTube&lt;/a&gt;</span></noscript></div></div><div class="lL" data-dcnode-id="924" style="max-width:100%;width:853px;margin:5px auto;"></div><p data-dcnode-id="923"></p><p data-dcnode-id="921"><span data-dcnode-id="922" instrument_node="">We’ll leave you with some interesting bee-facts to get started:</span></p><ul data-dcnode-id="902"><li data-dcnode-id="919"><span data-dcnode-id="920" instrument_node="">Did you know that Hawaii has 62 (!) native bee species¹? All of these species derive from one common ancestor that crossed over from east Asia, but they have since spread over all island and diverged to pollinate our wildly different ecosystems.</span></li><li data-dcnode-id="917"><span data-dcnode-id="918" instrument_node="">Native bee species are by the way not used for honey production. This honor goes to the honey bees, the first of which were introduced to the Hawaiian islands in 1857.</span></li><li data-dcnode-id="903"><span data-dcnode-id="916" instrument_node="">The Hawaiian word for the native bees is </span><em data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">nalo meli maole</span></em><span data-dcnode-id="913" instrument_node="">, which is derived from the words ‘</span><em data-dcnode-id="911"><span data-dcnode-id="912" instrument_node="">nalo</span></em><span data-dcnode-id="910" instrument_node="">‘ (flying bug), ‘</span><em data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">meli</span></em><span data-dcnode-id="907" instrument_node="">‘ (honey), and ‘</span><em data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">maoli</span></em><span data-dcnode-id="904" instrument_node="">‘ (native).</span></li></ul><p data-dcnode-id="894"><span data-dcnode-id="901" instrument_node="">See also </span><a data-dcnode-id="899" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scholarspace.manoa.hawaii.edu/bitstream/10125/34064/v185.pdf" rel="noopener" target="_blank"><span data-dcnode-id="900" instrument_node="">this study</span></a><span data-dcnode-id="898" instrument_node=""> or </span><a data-dcnode-id="896" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ctahr.hawaii.edu/uhmg/news/V9-Magnacca-NativeBee.pdf" rel="noopener" target="_blank"><span data-dcnode-id="897" instrument_node="">this article</span></a><span data-dcnode-id="895" instrument_node=""> for a more thorough discussion on local bees.</span></p><p data-dcnode-id="892"><span data-dcnode-id="893" instrument_node="">¹: Daly and Magnacca 2003, Magnacca 2011.</span></p><h3 data-dcnode-id="890" id="sanctuaries"><span data-dcnode-id="891" instrument_node="">Animal Sanctuaries</span></h3><p data-dcnode-id="888"><span data-dcnode-id="889" instrument_node="">There are a few animal sanctuaries on the Big Island that take over the care of (exotic) animals when their owners can’t do so anymore. These sanctuaries organize tours during which you get to learn about, and interact with, the animals.</span></p><p data-dcnode-id="886"><span data-dcnode-id="887" instrument_node="">The following sanctuaries may be fun to visit if you are an (exotic) animal fan:</span></p><h4 data-dcnode-id="884"><span data-dcnode-id="885" instrument_node="">Three Ring Farm</span></h4><p data-dcnode-id="878"><span data-dcnode-id="883" instrument_node="">The </span><a data-dcnode-id="880" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.threeringranch.org/visit.html" rel="noopener" target="_blank"><strong data-dcnode-id="881"><span data-dcnode-id="882" instrument_node="">Three Ring Farm</span></strong></a><span data-dcnode-id="879" instrument_node=""> (close to Kona) is Hawaiʻi’s only fully accredited, USDA licensed, exotic animal sanctuary. They are home to zebras, Hawaiian nene, iʻo (hawk), and pueo (owl), flamingos and reptiles, as well as many other rare, endangered and exotic creatures. The Sanctuary has no regular, open hours for the public but they do offer educational tours for small groups which last about two hours. These tours are an incredible close-up experience for children and adults to learn about the behavior and communication of the exotic animal residents and learn how they came to be here.</span></p><h4 data-dcnode-id="876"><span data-dcnode-id="877" instrument_node="">Big Island Farm Sanctuary</span></h4><p data-dcnode-id="871"><strong data-dcnode-id="873"><a data-dcnode-id="874" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bigislandfarmsanctuary.com/visit" rel="noopener" target="_blank"><span data-dcnode-id="875" instrument_node="">Big Island Farm Sanctuary</span></a></strong><span data-dcnode-id="872" instrument_node=""> in Naalehu, offers a home to farm animals who have been orphaned, abandoned, injured, abused, or exploited. They offer private tours that last around two hours. Each tour is personally guided by the sanctuary founder, Paula Buck. You’ll hear her story, how the sanctuary came to be, their goals for the future, and meet and learn about each of their residents. They are currently home to 44 (and counting) different cows, pigs, goats, sheep, and chickens- all with unique stories of rescue, forgiveness, and hope.</span></p><div class="wp-caption aligncenter" data-dcnode-id="864" id="attachment_11763" style="width: 810px"><a data-dcnode-id="867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/wp-content/uploads/bigislandfarmsanctuary-tour.jpg"><noscript data-dcnode-id="869"><span data-dcnode-id="870" instrument_node="">&lt;img aria-describedby="caption-attachment-11763" class="size-large wp-image-11763" src="https://www.lovebigisland.com/wp-content/uploads/bigislandfarmsanctuary-tour-800x318.jpg" alt="Farm tour foto for the Big Island Farm Sanctuary" width="800" height="318" srcset="https://www.lovebigisland.com/wp-content/uploads/bigislandfarmsanctuary-tour-800x318.jpg 800w, https://www.lovebigisland.com/wp-content/uploads/bigislandfarmsanctuary-tour-620x246.jpg 620w, https://www.lovebigisland.com/wp-content/uploads/bigislandfarmsanctuary-tour-768x305.jpg 768w, https://www.lovebigisland.com/wp-content/uploads/bigislandfarmsanctuary-tour-320x127.jpg 320w, https://www.lovebigisland.com/wp-content/uploads/bigislandfarmsanctuary-tour-400x159.jpg 400w, https://www.lovebigisland.com/wp-content/uploads/bigislandfarmsanctuary-tour.jpg 1000w" sizes="(max-width: 960px) 90vw, (max-width: 1200px) 620px, 800px" /&gt;</span></noscript><img alt="Farm tour foto for the Big Island Farm Sanctuary" aria-describedby="caption-attachment-11763" class="lazyload size-large wp-image-11763" data-dcnode-id="868" data-sizes="(max-width: 960px) 90vw, (max-width: 1200px) 620px, 800px" data-src="https://www.lovebigisland.com/wp-content/uploads/bigislandfarmsanctuary-tour-800x318.jpg" data-srcset="https://www.lovebigisland.com/wp-content/uploads/bigislandfarmsanctuary-tour-800x318.jpg 800w, https://www.lovebigisland.com/wp-content/uploads/bigislandfarmsanctuary-tour-620x246.jpg 620w, https://www.lovebigisland.com/wp-content/uploads/bigislandfarmsanctuary-tour-768x305.jpg 768w, https://www.lovebigisland.com/wp-content/uploads/bigislandfarmsanctuary-tour-320x127.jpg 320w, https://www.lovebigisland.com/wp-content/uploads/bigislandfarm
