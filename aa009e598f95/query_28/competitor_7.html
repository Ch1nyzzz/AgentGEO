sanctuary-tour-400x159.jpg 400w, https://www.lovebigisland.com/wp-content/uploads/bigislandfarmsanctuary-tour.jpg 1000w" height="318" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20800%20318%22%3E%3C/svg%3E" width="800"></a><p class="wp-caption-text" data-dcnode-id="865" id="caption-attachment-11763"><span data-dcnode-id="866" instrument_node="">The inhabitants of the Big Island Farm Sanctuary are always happy to greet visitors!</span></p></div><h4 data-dcnode-id="862"><span data-dcnode-id="863" instrument_node="">Magical Creatures of Hamakua</span></h4><p data-dcnode-id="857"><strong data-dcnode-id="859"><a data-dcnode-id="860" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.magicalcreaturesofhamakua.org/visit/" rel="noopener" target="_blank"><span data-dcnode-id="861" instrument_node="">Magical Creatures of Hamakua</span></a></strong><span data-dcnode-id="858" instrument_node=""> is a nonprofit Farm Animal Rescue and Sanctuary located on the beautiful Hamakua Coast of the Big Island of Hawaii. Many of their resident animals love attention and enjoy cuddles, but please remember this is not a petting zoo — all interactions are on the animal’s initiative.</span></p><p data-dcnode-id="855"><span data-dcnode-id="856" instrument_node="">You can visit the sanctuary for a free tour (reservations are required).&nbsp; Most tours are led by the owner that likes to share her firsthand stories of the animals’ journey to sanctuary, from the lava rescues, dairy closure, hunting orphans, and (her specialization) special needs animals. Please consider leaving a highly appreciated donation after the tour.</span></p><div class="wp-caption aligncenter" data-dcnode-id="848" id="attachment_12400" style="width: 810px"><a data-dcnode-id="851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/wp-content/uploads/magical-creatures-of-hamakua.jpg"><noscript data-dcnode-id="853"><span data-dcnode-id="854" instrument_node="">&lt;img aria-describedby="caption-attachment-12400" class="size-large wp-image-12400" src="https://www.lovebigisland.com/wp-content/uploads/magical-creatures-of-hamakua-800x471.jpg" alt="black pig getting petted" width="800" height="471" srcset="https://www.lovebigisland.com/wp-content/uploads/magical-creatures-of-hamakua-800x471.jpg 800w, https://www.lovebigisland.com/wp-content/uploads/magical-creatures-of-hamakua-620x365.jpg 620w, https://www.lovebigisland.com/wp-content/uploads/magical-creatures-of-hamakua-768x452.jpg 768w, https://www.lovebigisland.com/wp-content/uploads/magical-creatures-of-hamakua-320x188.jpg 320w, https://www.lovebigisland.com/wp-content/uploads/magical-creatures-of-hamakua-400x235.jpg 400w, https://www.lovebigisland.com/wp-content/uploads/magical-creatures-of-hamakua.jpg 960w" sizes="(max-width: 960px) 90vw, (max-width: 1200px) 620px, 800px" /&gt;</span></noscript><img alt="black pig getting petted" aria-describedby="caption-attachment-12400" class="lazyload size-large wp-image-12400" data-dcnode-id="852" data-sizes="(max-width: 960px) 90vw, (max-width: 1200px) 620px, 800px" data-src="https://www.lovebigisland.com/wp-content/uploads/magical-creatures-of-hamakua-800x471.jpg" data-srcset="https://www.lovebigisland.com/wp-content/uploads/magical-creatures-of-hamakua-800x471.jpg 800w, https://www.lovebigisland.com/wp-content/uploads/magical-creatures-of-hamakua-620x365.jpg 620w, https://www.lovebigisland.com/wp-content/uploads/magical-creatures-of-hamakua-768x452.jpg 768w, https://www.lovebigisland.com/wp-content/uploads/magical-creatures-of-hamakua-320x188.jpg 320w, https://www.lovebigisland.com/wp-content/uploads/magical-creatures-of-hamakua-400x235.jpg 400w, https://www.lovebigisland.com/wp-content/uploads/magical-creatures-of-hamakua.jpg 960w" height="471" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20800%20471%22%3E%3C/svg%3E" width="800"></a><p class="wp-caption-text" data-dcnode-id="849" id="caption-attachment-12400"><span data-dcnode-id="850" instrument_node="">One of the animal sanctuary’s residents that LOVES cuddles. Image credit: Magical Creatures of Hamakua</span></p></div><h4 data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">Parrots in Paradise</span></h4><p data-dcnode-id="841"><strong data-dcnode-id="843"><a data-dcnode-id="844" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//parrotsinparadise.org/" rel="noopener" target="_blank"><span data-dcnode-id="845" instrument_node="">Parrots in Paradise</span></a></strong><span data-dcnode-id="842" instrument_node=""> in Kealakekua is a parrot rescue, rehabilitation, education and adoption center. These beautiful birds are not native to Hawaii but still the sanctuary managed to rescue over 80 friendly parrots. They organize ~2 hour tours during which you enjoy a guided walk around the sanctuary and get to know the range of personalities of cockatoos, lovebirds, macaws, and more species. Throughout the tour, you will have many photo opportunities with some of their best-trained parrots.</span></p><h4 data-dcnode-id="839"><span data-dcnode-id="840" instrument_node="">Krishna Cow Sanctuary</span></h4><p data-dcnode-id="834"><span data-dcnode-id="838" instrument_node="">The Krishna Cow Sanctuary is currently home to over 60 bovines, including bull, steers, calves, and retired mother cows – mostly originating from the closure of Big Island Dairy in 2019. To cover part of their cost the sanctuary organizes “Cow Cuddle Experiences” where you can get up, close, and personal with the most lovable members of the herd. More details on on cow cuddling </span><a data-dcnode-id="836" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.airbnb.com/experiences/679446" rel="noopener" target="_blank"><span data-dcnode-id="837" instrument_node="">here</span></a><span data-dcnode-id="835" instrument_node="">.</span></p><h3 data-dcnode-id="832" id="petting-zoo"><span data-dcnode-id="833" instrument_node="">Petting Zoos</span></h3><h4 data-dcnode-id="830"><span data-dcnode-id="831" instrument_node="">The Lili House Farm</span></h4><p data-dcnode-id="824"><span data-dcnode-id="829" instrument_node="">The </span><strong data-dcnode-id="826"><a data-dcnode-id="827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thelilihousefarm.com/tour-packages/%23top" rel="noopener" target="_blank"><span data-dcnode-id="828" instrument_node="">Lili house farm</span></a></strong><span data-dcnode-id="825" instrument_node=""> is a small family farm with LOTS of animals in Volcano Village. The guided tour lasts between 1 and 1.5 hours and includes a walk through their farm as well as access to the petting zoo where you can hold, cuddle and feed the animals.</span></p><div class="wp-caption aligncenter" data-dcnode-id="817" id="attachment_11731" style="width: 810px"><a data-dcnode-id="820" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/wp-content/uploads/lili-house-farm.jpg"><noscript data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">&lt;img aria-describedby="caption-attachment-11731" class="size-large wp-image-11731" src="https://www.lovebigisland.com/wp-content/uploads/lili-house-farm-800x600.jpg" alt="farm animals" width="800" height="600" srcset="https://www.lovebigisland.com/wp-content/uploads/lili-house-farm-800x600.jpg 800w, https://www.lovebigisland.com/wp-content/uploads/lili-house-farm-620x465.jpg 620w, https://www.lovebigisland.com/wp-content/uploads/lili-house-farm-768x576.jpg 768w, https://www.lovebigisland.com/wp-content/uploads/lili-house-farm-320x240.jpg 320w, https://www.lovebigisland.com/wp-content/uploads/lili-house-farm-400x300.jpg 400w, https://www.lovebigisland.com/wp-content/uploads/lili-house-farm.jpg 1080w" sizes="(max-width: 960px) 90vw, (max-width: 1200px) 620px, 800px" /&gt;</span></noscript><img alt="farm animals" aria-describedby="caption-attachment-11731" class="lazyload size-large wp-image-11731" data-dcnode-id="821" data-sizes="(max-width: 960px) 90vw, (max-width: 1200px) 620px, 800px" data-src="https://www.lovebigisland.com/wp-content/uploads/lili-house-farm-800x600.jpg" data-srcset="https://www.lovebigisland.com/wp-content/uploads/lili-house-farm-800x600.jpg 800w, https://www.lovebigisland.com/wp-content/uploads/lili-house-farm-620x465.jpg 620w, https://www.lovebigisland.com/wp-content/uploads/lili-house-farm-768x576.jpg 768w, https://www.lovebigisland.com/wp-content/uploads/lili-house-farm-320x240.jpg 320w, https://www.lovebigisland.com/wp-content/uploads/lili-house-farm-400x300.jpg 400w, https://www.lovebigisland.com/wp-content/uploads/lili-house-farm.jpg 1080w" height="600" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20800%20600%22%3E%3C/svg%3E" width="800"></a><p class="wp-caption-text" data-dcnode-id="818" id="caption-attachment-11731"><span data-dcnode-id="819" instrument_node="">Some of the members of the lili House Farm family. Photo credit: the lili house farm.</span></p></div><h4 data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">Honomu Goat Dairy farm</span></h4><p data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">Overlooking the ocean on the beautiful Hamakua coast, The Honomu Goat Dairy offers visitors Goat therapy and Goat yoga with their never-ending supply of baby goats. The charge a small fee for the 30-minute therapy session but you receive the amount you pay back in store credit to spend in their visitor shop where you can buy goat milk products, goods from local artists, or (more) goat treats.</span></p><p data-dcnode-id="808"><span data-dcnode-id="812" instrument_node="">Read more about goat therapy on the </span><a data-dcnode-id="810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.honomugoatdairy.com/" rel="noopener" target="_blank"><span data-dcnode-id="811" instrument_node="">Honomu Goat Dairy</span></a><span data-dcnode-id="809" instrument_node=""> website.</span></p><div class="wp-caption aligncenter" data-dcnode-id="801" id="attachment_14357" style="width: 630px"><a data-dcnode-id="804" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/wp-content/uploads/honomu-goat-therapy-farm-tour.jpg"><noscript data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">&lt;img aria-describedby="caption-attachment-14357" class="size-medium wp-image-14357" src="https://www.lovebigisland.com/wp-content/uploads/honomu-goat-therapy-farm-tour-620x620.jpg" alt="Goat therapy is currently by appointment only" width="620" height="620" srcset="https://www.lovebigisland.com/wp-content/uploads/honomu-goat-therapy-farm-tour-620x620.jpg 620w, https://www.lovebigisland.com/wp-content/uploads/honomu-goat-therapy-farm-tour-800x800.jpg 800w, https://www.lovebigisland.com/wp-content/uploads/honomu-goat-therapy-farm-tour-300x300.jpg 300w, https://www.lovebigisland.com/wp-content/uploads/honomu-goat-therapy-farm-tour-320x320.jpg 320w, https://www.lovebigisland.com/wp-content/uploads/honomu-goat-therapy-farm-tour-400x400.jpg 400w, https://www.lovebigisland.com/wp-content/uploads/honomu-goat-therapy-farm-tour.jpg 1080w" sizes="(max-width: 960px) 90vw, (max-width: 1200px) 620px, 800px" /&gt;</span></noscript><img alt="Goat therapy is currently by appointment only" aria-describedby="caption-attachment-14357" class="lazyload size-medium wp-image-14357" data-dcnode-id="805" data-sizes="(max-width: 960px) 90vw, (max-width: 1200px) 620px, 800px" data-src="https://www.lovebigisland.com/wp-content/uploads/honomu-goat-therapy-farm-tour-620x620.jpg" data-srcset="https://www.lovebigisland.com/wp-content/uploads/honomu-goat-therapy-farm-tour-620x620.jpg 620w, https://www.lovebigisland.com/wp-content/uploads/honomu-goat-therapy-farm-tour-800x800.jpg 800w, https://www.lovebigisland.com/wp-content/uploads/honomu-goat-therapy-farm-tour-300x300.jpg 300w, https://www.lovebigisland.com/wp-content/uploads/honomu-goat-therapy-farm-tour-320x320.jpg 320w, https://www.lovebigisland.com/wp-content/uploads/honomu-goat-therapy-farm-tour-400x400.jpg 400w, https://www.lovebigisland.com/wp-content/uploads/honomu-goat-therapy-farm-tour.jpg 1080w" height="620" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20620%20620%22%3E%3C/svg%3E" width="620"></a><p class="wp-caption-text" data-dcnode-id="802" id="caption-attachment-14357"><span data-dcnode-id="803" instrument_node="">Goat therapy is currently by appointment only so make sure to check out the details on their website. Image credit: Honomu Goat Dairy.</span></p></div><h3 data-dcnode-id="799" id="shelter-dogs"><span data-dcnode-id="800" instrument_node="">Take a shelter dog out for the day</span></h3><p data-dcnode-id="797"><span data-dcnode-id="798" instrument_node="">Did you know that the Hawaii Island Humane Society allows visitors to “check out” a dog for the day from our shelters?</span></p><p data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">The main goal of this program is for you to enjoy the Big Island and to get your “dog fix” by taking along one of their shelter dogs on your adventure. The shelter will ask you to fill out an evaluation on your return so that potential adopters will know more about the dog. Pictures are encouraged!</span></p><p data-dcnode-id="790"><span data-dcnode-id="794" instrument_node="">You can find out more about how you get to take a dog for a Hawaiian adventure on the </span><a data-dcnode-id="792" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.hihs.org/programs/fieldtrips" rel="noopener" target="_blank"><span data-dcnode-id="793" instrument_node="">Hawaii Island Humane Society website</span></a><span data-dcnode-id="791" instrument_node="">.</span></p><h3 data-dcnode-id="788" id="octopus"><span data-dcnode-id="789" instrument_node="">Visit an Octopus Farm</span></h3><p data-dcnode-id="786"><span data-dcnode-id="787" instrument_node="">The Kanaloa Octopus Farm in Kona is technically a “cephalopod aquaculture research facility” which means you’ll get to learn cool science-y stuff! During the tour you will learn about octopuses (or is it octopi?), see them up close, and interact with them in their tank. All octopi on the farm are brought in by local fishermen, so they are basically rescues.</span></p><p data-dcnode-id="776"><span data-dcnode-id="785" instrument_node="">Read more about visiting the octopus farm on </span><a data-dcnode-id="783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/kailua-kona/activities/seahorse-farm-tour/%23octopus-farm-tour"><span data-dcnode-id="784" instrument_node="">our w</span></a><a data-dcnode-id="781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/kailua-kona/activities/seahorse-farm-tour/%23octopus-farm-tour"><span data-dcnode-id="782" instrument_node="">ebsite</span></a><span data-dcnode-id="780" instrument_node="">, or go directly to the </span><strong data-dcnode-id="777"><a data-dcnode-id="778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kanaloaoctopus.com/" rel="noopener" target="_blank"><span data-dcnode-id="779" instrument_node="">Kanaloa Octopus Farm website</span></a></strong></p><h3 data-dcnode-id="774" id="seahorse"><span data-dcnode-id="775" instrument_node="">Visit a Seahorse Farm</span></h3><p data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">The Ocean Rider Seahorse Farm in Kona raises seahorses in captivity to sell them to collectors. This greatly helps the ‘wild’ population of seahorses since it reduces the pressure on their population from hunting/capturing.</span></p><p data-dcnode-id="770"><span data-dcnode-id="771" instrument_node="">During the tour of the seahorse farm you get to see the now over 25 species of seahorses up close and personal, and there also is an interactive tide pool and a fish feeding station for the children available. All tours are led by a professional and certified Biologist that has been trained in public speaking.</span></p><p data-dcnode-id="761"><span data-dcnode-id="769" instrument_node="">You can read more about the tour on </span><a data-dcnode-id="767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/kailua-kona/activities/seahorse-farm-tour/"><span data-dcnode-id="768" instrument_node="">our website</span></a><span data-dcnode-id="766" instrument_node="">, or go directly to the </span><strong data-dcnode-id="763"><a data-dcnode-id="764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seahorse.com/ocean-rider-seahorse-farm-tours/" rel="noopener" target="_blank"><span data-dcnode-id="765" instrument_node="">ocean rider website</span></a></strong><span data-dcnode-id="762" instrument_node="">.</span></p><div class="lyte-wrapper" data-dcnode-id="749" style="width:853px;max-width:100%;margin:5px auto;" title="Ocean Rider Seahorse Farm and Daily Tours - Kona Hawaii"><div class="lyte lP" data-dcnode-id="750" id="WYL_lfhJGcWBrRI"><div class="pL wyl-lazy" data-dcnode-id="753" data-src="https://www.lovebigisland.com/wp-content/plugins/wp-youtube-lyte/lyteCache.php?origThumbUrl=https%3A%2F%2Fi.ytimg.com%2Fvi%2FlfhJGcWBrRI%2Fhqdefault.jpg" id="lyte_lfhJGcWBrRI"><div class="tC" data-dcnode-id="758"><div class="tT" data-dcnode-id="759"><span data-dcnode-id="760" instrument_node="">Ocean Rider Seahorse Farm and Daily Tours - Kona Hawaii</span></div></div><div class="play" data-dcnode-id="757"></div><div class="ctrl" data-dcnode-id="754"><div class="Lctrl" data-dcnode-id="756"></div><div class="Rctrl" data-dcnode-id="755"></div></div></div><noscript data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">&lt;a href="https://youtu.be/lfhJGcWBrRI"&gt;&lt;img src="https://www.lovebigisland.com/wp-content/plugins/wp-youtube-lyte/lyteCache.php?origThumbUrl=https%3A%2F%2Fi.ytimg.com%2Fvi%2FlfhJGcWBrRI%2F0.jpg" alt="Ocean Rider Seahorse Farm and Daily Tours - Kona Hawaii" width="853" height="460" /&gt;&lt;br /&gt;Watch this video on YouTube&lt;/a&gt;</span></noscript></div></div><div class="lL" data-dcnode-id="748" style="max-width:100%;width:853px;margin:5px auto;"></div><p data-dcnode-id="747"></p><h3 data-dcnode-id="745" id="coral"><span data-dcnode-id="746" instrument_node="">Coral lab tours (by the Legacy Reef Foundation)</span></h3><p data-dcnode-id="743"><span data-dcnode-id="744" instrument_node="">The Legacy Reef Foundation organizes tours at their facility two days per week that include a lecture by a marine scientist and a tour of their coral lab. The tour lasts approximately 90 minutes and you’ll get to learn all about coral – what it is, where it lives, how it feeds, the problems it’s currently dealing with in our oceans and what you can do to help.</span></p><p data-dcnode-id="737"><span data-dcnode-id="742" instrument_node="">More information at the </span><strong data-dcnode-id="739"><a data-dcnode-id="740" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.legacyreeffoundation.org/elementor-781/" rel="noopener" target="_blank"><span data-dcnode-id="741" instrument_node="">Legacy Reef Foundation website</span></a></strong><span data-dcnode-id="738" instrument_node="">.</span></p><h2 data-dcnode-id="735" id="plant-a-tree"><span data-dcnode-id="736" instrument_node="">Native trees / tree planting</span></h2><h3 data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">Hawaiʻi Legacy Forest</span></h3><p data-dcnode-id="731"><span data-dcnode-id="732" instrument_node="">Hawaiʻi’s Legacy Forests is restoring a historic forest on the slopes of Mauna Kea that once was the personal koa forest of King Kamehameha the Great to its original glory. Nearly a century ago this land was cleared to make room for farming and ranching and now over 400.000 new trees have been planted.</span></p><p data-dcnode-id="726"><span data-dcnode-id="730" instrument_node="">The tour consists of a ride into their growing forests to find a place to plant an endemic tree, during which your guide will tell you about the island flora and fauna, </span><a data-dcnode-id="728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/history-and-culture/"><span data-dcnode-id="729" instrument_node="">island history, and Hawaiian culture</span></a><span data-dcnode-id="727" instrument_node="">.&nbsp; The tree you plan is tagged with an Radio-frequency identification (RFID) chip which allows you to track its growth and look it up at later times.</span></p><p data-dcnode-id="720"><span data-dcnode-id="725" instrument_node="">Read more information on the </span><strong data-dcnode-id="722"><a data-dcnode-id="723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hawaiianlegacytours.com/hawai%25E2%2580%2598i-island-tour-info.html" rel="noopener" target="_blank"><span data-dcnode-id="724" instrument_node="">Hawaiian Legacy Tours website</span></a></strong><span data-dcnode-id="721" instrument_node="">.</span></p><h3 data-dcnode-id="718"><span data-dcnode-id="719" instrument_node="">Mamaki Forest Tour</span></h3><p data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">Māmaki is a culturally significant plant native to the Hawaiian Islands whose leaves are made into tea or used as a medicine.</span></p><p data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">You can learn more about Māmaki with a tour to the the enchanted Māmaki forest in Volcano Village.During the tour you are taken through a forest farm as well as 29 acres of native Hawaiian rainforest by a guide that offers a deep knowledge of the forest, history of the site, native and invasive species, and farming and processing methods used to produce mamaki tea.</span></p><p data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">Visitors can pick mature māmaki leaves and see māmaki seedlings and plants at various stages of development, and tours customarily end with a tasting &amp; blending experience on the Hawaii Forest Farm lanai.</span></p><p data-dcnode-id="706"><span data-dcnode-id="711" instrument_node="">Read more about this tour on the </span><strong data-dcnode-id="708"><a data-dcnode-id="709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hawaiiforestfarms.com/general-3" rel="noopener" target="_blank"><span data-dcnode-id="710" instrument_node="">Hawaii Forest Farms website</span></a></strong><span data-dcnode-id="707" instrument_node="">.</span></p><h2 data-dcnode-id="704" id="farmers-markets"><span data-dcnode-id="705" instrument_node="">Farmers Markets</span></h2><p data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">Farmers markets are one of the best places to find locally produced goodies, freshly prepared food (breakfast and lunch), and buy handmade souvenirs to take home. Also important: by buying directly from our farmers you cut out the middle man and help to strengthen the local community!</span></p><p data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">Most farmers markets are only open on one or two days of the week, but there are enough markets on the Big Island to make visiting one easy without compromising your itinerary.</span></p><p data-dcnode-id="694"><span data-dcnode-id="699" instrument_node="">You can find more information on our </span><strong data-dcnode-id="696"><a data-dcnode-id="697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/farmers-markets/"><span data-dcnode-id="698" instrument_node="">BIG list of Farmers Markets</span></a></strong><span data-dcnode-id="695" instrument_node=""> on the Big Island.</span></p><h2 data-dcnode-id="692" id="farm-to-table"><span data-dcnode-id="693" instrument_node="">Farm to Table Restaurants</span></h2><p data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">Farm-to-table is a way to say that the food on the table comes directly from a specific farm without going through a store, market, or distributor along the way.</span></p><p data-dcnode-id="688"><span data-dcnode-id="689" instrument_node="">In its purest form, farm-to-table means the table is actually at the farm and that the food you are being served is grown on the lands you are dining on. It is very rare, however, to find farms diverse enough to grow all the produce needed for a full meal, and a more common way to enjoy a farm-to-table dinner is at one of our local restaurants, where the chefs make sure to source as many of their ingredients as possible (ballpark 70 to 80%) directly from local farms.</span></p><h3 data-dcnode-id="686"><span data-dcnode-id="687" instrument_node="">Farm to Table Lunch / Dinner</span></h3><p data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">Below is an incomplete list of places where you can enjoy delicious meals made with local ingredients:</span></p><ul data-dcnode-id="658"><li data-dcnode-id="675"><span data-dcnode-id="683" instrument_node="">The </span><strong data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">Starseed Ranch</span></strong><span data-dcnode-id="680" instrument_node=""> offers farm-fresh dinners prepared in their open-air kitchen. You can find them in our list of general </span><strong data-dcnode-id="677"><a data-dcnode-id="678" href="#farm-tours"><span data-dcnode-id="679" instrument_node="">farm tours</span></a></strong><span data-dcnode-id="676" instrument_node="">.</span></li><li data-dcnode-id="669"><span data-dcnode-id="674" instrument_node="">The </span><strong data-dcnode-id="671"><a data-dcnode-id="672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.laulimafoodpatch.com/" rel="noopener" target="_blank"><span data-dcnode-id="673" instrument_node="">Laulima Food Patch</span></a></strong><span data-dcnode-id="670" instrument_node=""> in Kona serves authentic food made predominantly from local ingredients. This is not a sit-down restaurant, but they serve a small menu of pre-made dishes during daytime. Perfect for a quick stop (outdoor seating) or take-out.</span></li><li data-dcnode-id="664"><a data-dcnode-id="666" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/Pineapples-Island-Fresh-Cuisine-427042824013347/" rel="noopener" target="_blank"><strong data-dcnode-id="667"><span data-dcnode-id="668" instrument_node="">Pineapples</span></strong></a><span data-dcnode-id="665" instrument_node=""> is a family run open-air restaurant in downtown Hilo with occasional live music, good food, and great drinks/cocktails. Their dishes are locally inspired, and they source most of their ingredients from the island.</span></li><li data-dcnode-id="659"><a data-dcnode-id="661" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merrimanshawaii.com/waimea/" rel="noopener" target="_blank"><strong data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">Merriman’s</span></strong></a><span data-dcnode-id="660" instrument_node=""> in Waimea is one of the pioneers of the modern farm-to-table experience and has offered authentic Hawaiian cuisine for over 30 years. You can expect high quality and delicious food and wine, but the high and consistent quality come at a price. Pro tip for those of you traveling on a budget: the lunch menu is more affordable than the dinner menu.</span></li></ul><h3 data-dcnode-id="656" id="farm-to-table-cooking-class"><span data-dcnode-id="657" instrument_node="">Farm to Table Cooking Class + Lunch</span></h3><p data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">If you want to take the farm to table concept a bit further you can also harvest and prepare your own food. See for example the following 4-hour tour near Hilo that includes the harvesting, preparing *and* eating of a truly local lunch:</span></p><div class="wrapper" data-dcnode-id="601"><div class="ribbon ribbon-top-left" data-dcnode-id="651"><span class="iheart" data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">Suggested tour</span></span></div><div class="tour_archive_summary_image" data-dcnode-id="649"><div class="tour-archive-image lazyload" data-bg="https://www.lovebigisland.com/wp-content/uploads/gathering-produce-for-cooking-class-2-620x412.jpg" data-dcnode-id="650"></div></div><div class="tour_archive_description" data-dcnode-id="643"><h3 data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">Farm-to-Table Cooking Class + Lunch at Kulaniapia Farms</span></h3><span class="tour-description" data-dcnode-id="644"><p data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">Harvest fresh produce from the farm and prepare a plant-based meal together with this personal and authentic Farm-to-Table Cooking Class</span></p></span></div><div class="tour_archive_summary" data-dcnode-id="624"><p data-dcnode-id="638"><span class="icon-history" data-dcnode-id="642"></span><strong data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">Duration:</span></strong><span data-dcnode-id="639" instrument_node=""> 4 hours</span></p><p data-dcnode-id="631"><span class="icon-info" data-dcnode-id="637"></span><strong data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">By:</span></strong><span data-dcnode-id="634" instrument_node=""> </span><a data-dcnode-id="632" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/tours/%3Ffwp_tour_provider%3Dkulaniapia-falls"><span data-dcnode-id="633" instrument_node=""> Kulaniapia Falls</span></a></p><p data-dcnode-id="625"><span data-dcnode-id="627" style="color:#01cb68"><span class="icon-checkmark" data-dcnode-id="630"></span><strong data-dcnode-id="628"><span data-dcnode-id="629" instrument_node=""> Free cancellation:</span></strong></span><span data-dcnode-id="626" instrument_node=""> up to 48 hours before tour</span></p></div><div class="tour_archive_book" data-dcnode-id="602"><span class="tour-price-description-right" data-dcnode-id="613"><span class="tour-price-lowlight" data-dcnode-id="621"><p data-dcnode-id="622"><span data-dcnode-id="623" instrument_node="">from:</span></p></span><p data-dcnode-id="617"><strong data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">$</span></strong><span data-dcnode-id="618" instrument_node="">199</span></p><p data-dcnode-id="614"><a class="button" data-dcnode-id="615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/tours/cooking-class-kulaniapia-farms/" onmousedown="gtag('event', 'click_to_tour', {  'event_category' : 'fareharbor', 'event_label' : 'Kulaniapia Falls'});"><span data-dcnode-id="616" instrument_node="">Details</span></a></p></span><span class="infoo tooltip" data-dcnode-id="603"><a data-dcnode-id="611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/tours/%23page"><span data-dcnode-id="612" instrument_node="">What is a suggested tour</span></a><span data-dcnode-id="610" instrument_node="">?</span><span class="tooltip-text" data-dcnode-id="604"><span class="icon-info" data-dcnode-id="609"></span><span data-dcnode-id="608" instrument_node="">Our suggested tours are hand-picked tours that receive consistent good reviews, give back to the community, and work hard to minimize their impact on the environment. Read more about these </span><a data-dcnode-id="606" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/tours/"><span data-dcnode-id="607" instrument_node="">tours on our website</span></a><span data-dcnode-id="605" instrument_node="">.</span></span></span></div></div><p data-dcnode-id="594"><small data-dcnode-id="595"><span data-dcnode-id="600" instrument_node="">Note that there are far more local restaurants with a sustainable approach to sourcing their ingredients on the Big Island. Just because they didn’t make it on our list doesn’t mean they are not worth a visit, and we’d LOVE to </span><strong data-dcnode-id="597"><a data-dcnode-id="598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/contact/"><span data-dcnode-id="599" instrument_node="">hear from you</span></a></strong><span data-dcnode-id="596" instrument_node=""> if you think we should add another restaurant or café to the list.</span></small></p><h2 data-dcnode-id="592" id="introduction"><span data-dcnode-id="593" instrument_node="">Agri-Tourism on the Big Island: all kinds of farm tours</span></h2><p data-dcnode-id="590"><span data-dcnode-id="591" instrument_node="">Eco-tourism is getting more and more popular with the current focus of the state of Hawaiʻi on sustainable development. Many of our farms have started to organize farm tours and tastings, and visiting these farms to see and learn how things are grown (and taste) is a great way to make a connection with our island!</span></p><p data-dcnode-id="588"><span data-dcnode-id="589" instrument_node="">You can read all about the different kinds of farm tours in the sections above, but if you made it all the way here we’d like to reward you with a quick summary of why farming is such a big thing on the island of Hawaiʻi:</span></p><h3 data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">Summary of agriculture on the Big Island</span></h3><p data-dcnode-id="581"><span data-dcnode-id="585" instrument_node="">The Big Island is home to </span><a data-dcnode-id="583" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/hawaii-blog/climate-zones-big-island/"><span data-dcnode-id="584" instrument_node="">8 out of the world’s 13 main climatic regions</span></a><span data-dcnode-id="582" instrument_node=""> making it an agricultural paradise. We are worldwide leader in harvesting macadamia nuts and orchids for example, and are the only US state where vanilla, cacao, and coffee, are grown commercially. An incomplete lists of more of the delicious locally grown things you can find on the Big Island are: ginger, honey, coconuts, and exotic fruits like pineapple, papaya, mango, jackfruit, durian, rambutan, star fruit, cherimoya, figs, lychee, and dragon fruit.</span></p><p data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">To make more clear how important agriculture is here on the Big Island: Agriculture sales in the state of Hawaiʻi contribute $1.9 billion yearly to the economy, making it one of the state’s top industries (source: the University of Hawai‘i’s College of Tropical Agriculture and Human Resources (CTAHR). The Big Island plays a large part in this as we provide most of the agricultural lands (we are the biggest island, after all), see the map below for a quick summary of which crops are grown here:</span></p><div class="wp-caption aligncenter" data-dcnode-id="569" id="attachment_11413" style="width: 810px"><a data-dcnode-id="575" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/wp-content/uploads/agriculture-hawaii-island-2015.jpg"><noscript data-dcnode-id="577"><span data-dcnode-id="578" instrument_node="">&lt;img aria-describedby="caption-attachment-11413" class="size-large wp-image-11413" src="https://www.lovebigisland.com/wp-content/uploads/agriculture-hawaii-island-2015-800x619.jpg" alt="crops grown on Hawaii island" width="800" height="619" srcset="https://www.lovebigisland.com/wp-content/uploads/agriculture-hawaii-island-2015-800x619.jpg 800w, https://www.lovebigisland.com/wp-content/uploads/agriculture-hawaii-island-2015-620x480.jpg 620w, https://www.lovebigisland.com/wp-content/uploads/agriculture-hawaii-island-2015-768x594.jpg 768w, https://www.lovebigisland.com/wp-content/uploads/agriculture-hawaii-island-2015-320x248.jpg 320w, https://www.lovebigisland.com/wp-content/uploads/agriculture-hawaii-island-2015-400x310.jpg 400w, https://www.lovebigisland.com/wp-content/uploads/agriculture-hawaii-island-2015.jpg 1600w" sizes="(max-width: 960px) 90vw, (max-width: 1200px) 620px, 800px" /&gt;</span></noscript><img alt="crops grown on Hawaii island" aria-describedby="caption-attachment-11413" class="lazyload size-large wp-image-11413" data-dcnode-id="576" data-sizes="(max-width: 960px) 90vw, (max-width: 1200px) 620px, 800px" data-src="https://www.lovebigisland.com/wp-content/uploads/agriculture-hawaii-island-2015-800x619.jpg" data-srcset="https://www.lovebigisland.com/wp-content/uploads/agriculture-hawaii-island-2015-800x619.jpg 800w, https://www.lovebigisland.com/wp-content/uploads/agriculture-hawaii-island-2015-620x480.jpg 620w, https://www.lovebigisland.com/wp-content/uploads/agriculture-hawaii-island-2015-768x594.jpg 768w, https://www.lovebigisland.com/wp-content/uploads/agriculture-hawaii-island-2015-320x248.jpg 320w, https://www.lovebigisland.com/wp-content/uploads/agriculture-hawaii-island-2015-400x310.jpg 400w, https://www.lovebigisland.com/wp-content/uploads/agriculture-hawaii-island-2015.jpg 1600w" height="619" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20800%20619%22%3E%3C/svg%3E" width="800"></a><p class="wp-caption-text" data-dcnode-id="570" id="caption-attachment-11413"><span data-dcnode-id="574" instrument_node="">Summary of agricultural land use on Hawaii Island [</span><a data-dcnode-id="572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//hdoa.hawaii.gov/wp-content/uploads/2016/02/StateAgLandUseBaseline2015.pdf" rel="noopener" ta
