</span><ul data-dcnode-id="1283"><li data-dcnode-id="1292"><a data-dcnode-id="1295" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.hotelscombined.com/Hotel/Hotel_Wailea_Relais_Chateaux.htm%3Fa_aid%3D159405" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1296" style="font-weight: 400;"><span data-dcnode-id="1297" instrument_node="">Hotel Wailea</span></span></a><span data-dcnode-id="1293" style="font-weight: 400;"><span data-dcnode-id="1294" instrument_node=""> (Adults Only)</span></span></li><li data-dcnode-id="1288"><a data-dcnode-id="1289" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.hotelscombined.com/Hotel/Four_Seasons_Resort_Maui_at_Wailea.htm%3Fa_aid%3D159405" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1290" style="font-weight: 400;"><span data-dcnode-id="1291" instrument_node="">Four Seasons Resort</span></span></a></li><li data-dcnode-id="1284"><a data-dcnode-id="1285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.hotelscombined.com/Hotel/Grand_Wailea_A_Waldorf_Astoria_Resort.htm%3Fa_aid%3D159405" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1286" style="font-weight: 400;"><span data-dcnode-id="1287" instrument_node="">Grand Wailea</span></span></a></li></ul><span data-dcnode-id="1282" instrument_node="">
</span><p data-dcnode-id="1277"><b data-dcnode-id="1280"><span data-dcnode-id="1281" instrument_node="">Where to Eat in Maui:</span></b><span data-dcnode-id="1278" style="font-weight: 400;"><span data-dcnode-id="1279" instrument_node=""> Be sure to grab some garlic shrimp from the Geste Shrimp Truck, a Hawaiian mixed plate from yup – Aloha Mixed Plate, and shave ice from Ululani’s. </span></span></p><span data-dcnode-id="1276" instrument_node="">
</span><p data-dcnode-id="1273"><span data-dcnode-id="1274" style="font-weight: 400;"><span data-dcnode-id="1275" instrument_node="">Other notable dining spots we enjoy include Leilani’s at the Beach, Lahaina Grill, Kula Lodge (after watching the sunrise at Haleakala), Aunty Sandy’s (great for snacks along the Road to Hana), and the Gazebo restaurant for some white chocolate mac nut pancakes and fried rice.</span></span></p><span data-dcnode-id="1272" instrument_node="">
</span><div class="wp-block-image is-style-default" data-dcnode-id="1269"><figure class="aligncenter" data-dcnode-id="1270"><img alt="" class="wp-image-15249" data-dcnode-id="1271" data-jpibfi-post-excerpt="" data-jpibfi-post-title="Island Hopping in Hawaii: Planning an Epic 10-Day Hawaii Itinerary" data-jpibfi-post-url="https://apassionandapassport.com/hawaii-island-hopping-itinerary-10-days/" data-jpibfi-src="https://apassionandapassport.com/wp-content/uploads/2018/10/maui-itinerary-4-750x500.jpg" height="500" loading="lazy" sizes="(max-width: 750px) 100vw, 750px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//apassionandapassport.com/wp-content/uploads/2018/10/maui-itinerary-4-750x500.jpg&amp;raw" srcset="https://apassionandapassport.com/wp-content/uploads/2018/10/maui-itinerary-4-750x500.jpg 750w, https://apassionandapassport.com/wp-content/uploads/2018/10/maui-itinerary-4-600x400.jpg 600w, https://apassionandapassport.com/wp-content/uploads/2018/10/maui-itinerary-4-850x567.jpg 850w, https://apassionandapassport.com/wp-content/uploads/2018/10/maui-itinerary-4-272x182.jpg 272w, https://apassionandapassport.com/wp-content/uploads/2018/10/maui-itinerary-4.jpg 1600w" width="750"></figure></div><span data-dcnode-id="1268" instrument_node="">
</span><p data-dcnode-id="1265"><span data-dcnode-id="1266" style="font-weight: 400;"><span data-dcnode-id="1267" instrument_node="">As mentioned above, The Old Lahaina Luau and Feast at Lele are the most famous luau’s in all of the Hawaiian islands, so be sure to attend one!</span></span></p><span data-dcnode-id="1264" instrument_node="">
</span><p data-dcnode-id="1258"><span data-dcnode-id="1259" style="font-weight: 400;"><span data-dcnode-id="1263" instrument_node="">And whatever you do, </span><em data-dcnode-id="1261"><span data-dcnode-id="1262" instrument_node="">DO NOT LEAVE MAUI</span></em><span data-dcnode-id="1260" instrument_node=""> without having a meal at Mama’s Fish House (reservations most definitely needed). The menu changes depending on what fish have been caught that day (one of my favorite meals in not only all of Hawaii, but the world. Yup, world).</span></span></p><span data-dcnode-id="1257" instrument_node="">
</span><h3 data-dcnode-id="1254"><b data-dcnode-id="1255"><span data-dcnode-id="1256" instrument_node="">Highlights on Oahu: “The Gathering Place”</span></b></h3><span data-dcnode-id="1253" instrument_node="">
</span><p data-dcnode-id="1250"><span data-dcnode-id="1251" style="font-weight: 400;"><span data-dcnode-id="1252" instrument_node="">Oahu boasts the infamous Pearl Harbor, Waikiki Beach, and the state capital of Honolulu, making it a great escape for those wanting a good mix of city and beach break. Since most of the state’s visitors live in Honolulu, Oahu will feel a bit more crowded than other islands. It’s got entertainment and amenities of the 21st century, while still holding that Hawaiian charm.</span></span></p><span data-dcnode-id="1249" instrument_node="">
</span><p data-dcnode-id="1242"><strong data-dcnode-id="1247"><span data-dcnode-id="1248" instrument_node="">1. </span></strong><b data-dcnode-id="1245"><span data-dcnode-id="1246" instrument_node="">Waikiki Beach</span></b><span data-dcnode-id="1243" style="font-weight: 400;"><span data-dcnode-id="1244" instrument_node="">: One of the most famous beaches in all of Hawaii, and for good reason! 2 miles of soft, white sand, alongside the highrises and backed by palms, make up one of the busiest and most cosmopolitan areas on Oahu. There’s parasailing, boogie boarding, surfing, canoeing, and lots of people watching over here!</span></span></p><span data-dcnode-id="1241" instrument_node="">
</span><div class="wp-block-image is-style-default" data-dcnode-id="1238"><figure class="aligncenter" data-dcnode-id="1239"><img alt="" class="wp-image-15576" data-dcnode-id="1240" data-jpibfi-post-excerpt="" data-jpibfi-post-title="Island Hopping in Hawaii: Planning an Epic 10-Day Hawaii Itinerary" data-jpibfi-post-url="https://apassionandapassport.com/hawaii-island-hopping-itinerary-10-days/" data-jpibfi-src="https://apassionandapassport.com/wp-content/uploads/2018/12/royal-Hawaiian-mai-tais-Oahu-750x500.jpg" height="500" loading="lazy" sizes="(max-width: 750px) 100vw, 750px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//apassionandapassport.com/wp-content/uploads/2018/12/royal-Hawaiian-mai-tais-Oahu-750x500.jpg&amp;raw" srcset="https://apassionandapassport.com/wp-content/uploads/2018/12/royal-Hawaiian-mai-tais-Oahu-750x500.jpg 750w, https://apassionandapassport.com/wp-content/uploads/2018/12/royal-Hawaiian-mai-tais-Oahu-600x400.jpg 600w, https://apassionandapassport.com/wp-content/uploads/2018/12/royal-Hawaiian-mai-tais-Oahu-850x567.jpg 850w, https://apassionandapassport.com/wp-content/uploads/2018/12/royal-Hawaiian-mai-tais-Oahu-272x182.jpg 272w, https://apassionandapassport.com/wp-content/uploads/2018/12/royal-Hawaiian-mai-tais-Oahu.jpg 1200w" width="750"></figure></div><span data-dcnode-id="1237" instrument_node="">
</span><p data-dcnode-id="1230"><strong data-dcnode-id="1235"><span data-dcnode-id="1236" instrument_node="">2. </span></strong><b data-dcnode-id="1233"><span data-dcnode-id="1234" instrument_node="">Hanging out in Honolulu</span></b><span data-dcnode-id="1231" style="font-weight: 400;"><span data-dcnode-id="1232" instrument_node="">: Can’t come all the way to the islands and miss out on the capital of Hawaii! Honolulu is the biggest city in all of Hawaii, and is known for the the ever-so-popular Waikiki neighborhood, historic landmarks, Diamond Head, mai tai drink, world-class surfing, Hawaiian luaus, and its location as a military fortress.</span></span></p><span data-dcnode-id="1229" instrument_node="">
</span><p data-dcnode-id="1222"><strong data-dcnode-id="1227"><span data-dcnode-id="1228" instrument_node="">3. </span></strong><b data-dcnode-id="1225"><span data-dcnode-id="1226" instrument_node="">Turtle Beach “Laniakea Beach”</span></b><span data-dcnode-id="1223" style="font-weight: 400;"><span data-dcnode-id="1224" instrument_node="">: If snorkeling isn’t your thang, you can thankfully still see some of these gentle giants on shore just basking in the sun here at Laniakea Beach on Oahu’s North Shore. The Hawaiian Green Sea Turtles have been frequenting these sands for decades, so do your part and respect them and their land. It’s illegal to chase, injure, hunt, touch, hold, or harass them in any way.</span></span></p><span data-dcnode-id="1221" instrument_node="">
</span><p data-dcnode-id="1214"><strong data-dcnode-id="1219"><span data-dcnode-id="1220" instrument_node="">4. </span></strong><b data-dcnode-id="1217"><span data-dcnode-id="1218" instrument_node="">Snorkeling at Hanauma Bay Nature Preserve:</span></b><span data-dcnode-id="1215" style="font-weight: 400;"><span data-dcnode-id="1216" instrument_node=""> Imagine snorkeling in an aquarium – that’s what it feels like over at Hanauma Bay! This pristine and protected marine ecosystem (former volcanic crater) is full of beautiful coral reef, loads of tropical fish, and other sea life. You may even spot a harmless reef shark if you’re lucky!</span></span></p><span data-dcnode-id="1213" instrument_node="">
</span><div class="wp-block-image is-style-default" data-dcnode-id="1210"><figure class="aligncenter" data-dcnode-id="1211"><img alt="" class="wp-image-7662" data-dcnode-id="1212" data-jpibfi-post-excerpt="" data-jpibfi-post-title="Island Hopping in Hawaii: Planning an Epic 10-Day Hawaii Itinerary" data-jpibfi-post-url="https://apassionandapassport.com/hawaii-island-hopping-itinerary-10-days/" data-jpibfi-src="https://apassionandapassport.com/wp-content/uploads/2016/05/2013-07-13-12.01.14-e1568425106444-750x469.jpg" height="469" loading="lazy" sizes="(max-width: 750px) 100vw, 750px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//apassionandapassport.com/wp-content/uploads/2016/05/2013-07-13-12.01.14-e1568425106444-750x469.jpg&amp;raw" srcset="https://apassionandapassport.com/wp-content/uploads/2016/05/2013-07-13-12.01.14-e1568425106444-750x469.jpg 750w, https://apassionandapassport.com/wp-content/uploads/2016/05/2013-07-13-12.01.14-e1568425106444-600x375.jpg 600w, https://apassionandapassport.com/wp-content/uploads/2016/05/2013-07-13-12.01.14-e1568425106444-850x531.jpg 850w" width="750"></figure></div><span data-dcnode-id="1209" instrument_node="">
</span><p data-dcnode-id="1202"><strong data-dcnode-id="1207"><span data-dcnode-id="1208" instrument_node="">5. </span></strong><b data-dcnode-id="1205"><span data-dcnode-id="1206" instrument_node="">Hiking Diamond Head: </span></b><span data-dcnode-id="1203" style="font-weight: 400;"><span data-dcnode-id="1204" instrument_node="">This unusually shaped area is one of the most unique natural structures you’ll come across while Hawaii island hopping, as the land appears to look like a giant crater. </span></span></p><span data-dcnode-id="1201" instrument_node="">
</span><p data-dcnode-id="1198"><span data-dcnode-id="1199" style="font-weight: 400;"><span data-dcnode-id="1200" instrument_node="">This formation occurs due to Diamond Head being a volcanic tuff cone and dormant volcano, which has resulted in the one-of-a-kind, 150,000 year old structure. Hike across the rocky pathways to the peak, and you’ll be rewarded by a plethora of mesmerizing views.&nbsp;</span></span></p><span data-dcnode-id="1197" instrument_node="">
</span><p data-dcnode-id="1189"><strong data-dcnode-id="1195"><span data-dcnode-id="1196" instrument_node="">6. </span></strong><b data-dcnode-id="1193"><span data-dcnode-id="1194" instrument_node="">Pillbox Hike:</span></b><span data-dcnode-id="1192" instrument_node=""> </span><span data-dcnode-id="1190" style="font-weight: 400;"><span data-dcnode-id="1191" instrument_node="">While not one of the longest trails, the Pillbox hike may be one of the prettiest and historic on this Hawaii itinerary. During your trek you’ll stumble upon 2 aging military bunkers, and witness a stunning panoramic view of Lanikai Beach. </span></span></p><span data-dcnode-id="1188" instrument_node="">
</span><p data-dcnode-id="1185"><span data-dcnode-id="1186" style="font-weight: 400;"><span data-dcnode-id="1187" instrument_node="">Be prepared for some climbing, and I hope your sense of direction is good – we attempted this hike and for some reason couldn’t even figure out which trail we should be on!</span></span></p><span data-dcnode-id="1184" instrument_node="">
</span><p data-dcnode-id="1180"><strong data-dcnode-id="1182"><span data-dcnode-id="1183" instrument_node="">7. Stuff your face silly with Malasadas:</span></strong><span data-dcnode-id="1181" instrument_node=""> there’s no better place on the island for these Portuguese donuts. Just take my word for it and go. You’ll thank me later.</span></p><span data-dcnode-id="1179" instrument_node="">
</span><div class="wp-block-image is-style-default" data-dcnode-id="1176"><figure class="aligncenter" data-dcnode-id="1177"><img alt="" class="wp-image-15577" data-dcnode-id="1178" data-jpibfi-post-excerpt="" data-jpibfi-post-title="Island Hopping in Hawaii: Planning an Epic 10-Day Hawaii Itinerary" data-jpibfi-post-url="https://apassionandapassport.com/hawaii-island-hopping-itinerary-10-days/" data-jpibfi-src="https://apassionandapassport.com/wp-content/uploads/2018/12/Leonards-malasadas-Oahu-750x500.jpg" height="500" loading="lazy" sizes="(max-width: 750px) 100vw, 750px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//apassionandapassport.com/wp-content/uploads/2018/12/Leonards-malasadas-Oahu-750x500.jpg&amp;raw" srcset="https://apassionandapassport.com/wp-content/uploads/2018/12/Leonards-malasadas-Oahu-750x500.jpg 750w, https://apassionandapassport.com/wp-content/uploads/2018/12/Leonards-malasadas-Oahu-600x400.jpg 600w, https://apassionandapassport.com/wp-content/uploads/2018/12/Leonards-malasadas-Oahu-850x567.jpg 850w, https://apassionandapassport.com/wp-content/uploads/2018/12/Leonards-malasadas-Oahu-272x182.jpg 272w, https://apassionandapassport.com/wp-content/uploads/2018/12/Leonards-malasadas-Oahu.jpg 1200w" width="750"></figure></div><span data-dcnode-id="1175" instrument_node="">
</span><p data-dcnode-id="1168"><strong data-dcnode-id="1173"><span data-dcnode-id="1174" instrument_node="">8. </span></strong><b data-dcnode-id="1171"><span data-dcnode-id="1172" instrument_node="">Lanikai Beach: </span></b><span data-dcnode-id="1169" style="font-weight: 400;"><span data-dcnode-id="1170" instrument_node="">If you looked up the definition of a white-sand beach, the first thing that would pop up is a photo of Lanikai! Bleached sand, translucent waters, picturesque palm trees – it’s one of those places perfectly crafted for postcards. </span></span></p><span data-dcnode-id="1167" instrument_node="">
</span><p data-dcnode-id="1164"><span data-dcnode-id="1165" style="font-weight: 400;"><span data-dcnode-id="1166" instrument_node="">Change into your swimsuit and spend the afternoon dozing on the coast, or taming your adventurous side with kayaking and scuba diving, just don’t forget your sunscreen!</span></span></p><span data-dcnode-id="1163" instrument_node="">
</span><p data-dcnode-id="1155"><strong data-dcnode-id="1161"><span data-dcnode-id="1162" instrument_node="">9. </span></strong><b data-dcnode-id="1159"><span data-dcnode-id="1160" instrument_node="">Waimea Bay Beach Park:</span></b><span data-dcnode-id="1158" instrument_node=""> </span><span data-dcnode-id="1156" style="font-weight: 400;"><span data-dcnode-id="1157" instrument_node="">While Hawaii island hopping, you’ll find it difficult to locate a better place to surf than Waimea Bay. Found on the north side of Oahu, this scenic coastline has calm, clear waves perfectly suited for beginner surfers. If surfing isn’t your strong suit, you’ll easily find the ideal spot to kick back and relax on this vast beach.&nbsp;</span></span></p><span data-dcnode-id="1154" instrument_node="">
</span><p data-dcnode-id="1147"><strong data-dcnode-id="1152"><span data-dcnode-id="1153" instrument_node="">10. </span></strong><b data-dcnode-id="1150"><span data-dcnode-id="1151" instrument_node="">Makapu’u Point Lighthouse Trail: </span></b><span data-dcnode-id="1148" style="font-weight: 400;"><span data-dcnode-id="1149" instrument_node="">Hidden behind a series of twisting, rugged cliffs, you’ll find a tiny, quaint lighthouse facing the ocean. You’ll have to hike the twisting trail upwards first, but I can guarantee the sights are worth the time.&nbsp;&nbsp;</span></span></p><span data-dcnode-id="1146" instrument_node="">
</span><p data-dcnode-id="1139"><strong data-dcnode-id="1144"><span data-dcnode-id="1145" instrument_node="">11. </span></strong><b data-dcnode-id="1142"><span data-dcnode-id="1143" instrument_node="">Dole Plantation: </span></b><span data-dcnode-id="1140" style="font-weight: 400;"><span data-dcnode-id="1141" instrument_node="">This pineapple plantation is easily one of my favorite places on this entire Hawaii itinerary, and that’s not just because I’m a big lover of some juicy fruit. </span></span></p><span data-dcnode-id="1138" instrument_node="">
</span><p data-dcnode-id="1135"><span data-dcnode-id="1136" style="font-weight: 400;"><span data-dcnode-id="1137" instrument_node="">There is no chance of being bored here, with train rides, garden tours, and endless food available (don’t miss out on the fresh dole whip!). There’s even a pineapple maze. Yes, you heard that right, a giant pineapple maze with pineapple shaped hedges!</span></span></p><span data-dcnode-id="1134" instrument_node="">
</span><div class="wp-block-image is-style-default" data-dcnode-id="1131"><figure class="aligncenter" data-dcnode-id="1132"><img alt="" class="wp-image-15600" data-dcnode-id="1133" data-jpibfi-post-excerpt="" data-jpibfi-post-title="Island Hopping in Hawaii: Planning an Epic 10-Day Hawaii Itinerary" data-jpibfi-post-url="https://apassionandapassport.com/hawaii-island-hopping-itinerary-10-days/" data-jpibfi-src="https://apassionandapassport.com/wp-content/uploads/2018/12/where-to-eat-in-oahu-35-750x500.jpg" height="500" loading="lazy" sizes="(max-width: 750px) 100vw, 750px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//apassionandapassport.com/wp-content/uploads/2018/12/where-to-eat-in-oahu-35-750x500.jpg&amp;raw" srcset="https://apassionandapassport.com/wp-content/uploads/2018/12/where-to-eat-in-oahu-35-750x500.jpg 750w, https://apassionandapassport.com/wp-content/uploads/2018/12/where-to-eat-in-oahu-35-600x400.jpg 600w, https://apassionandapassport.com/wp-content/uploads/2018/12/where-to-eat-in-oahu-35-850x567.jpg 850w, https://apassionandapassport.com/wp-content/uploads/2018/12/where-to-eat-in-oahu-35-272x182.jpg 272w, https://apassionandapassport.com/wp-content/uploads/2018/12/where-to-eat-in-oahu-35.jpg 1600w" width="750"></figure></div><span data-dcnode-id="1130" instrument_node="">
</span><p data-dcnode-id="1123"><strong data-dcnode-id="1128"><span data-dcnode-id="1129" instrument_node="">12. </span></strong><b data-dcnode-id="1126"><span data-dcnode-id="1127" instrument_node="">Pearl Harbor and the USS Arizona Memorial: </span></b><span data-dcnode-id="1124" style="font-weight: 400;"><span data-dcnode-id="1125" instrument_node="">Pearl Harbour is a key aspect in American history, and there is no way you can spend 10 days in Hawaii without visiting this memorable monument. </span></span></p><span data-dcnode-id="1122" instrument_node="">
</span><p data-dcnode-id="1119"><span data-dcnode-id="1120" style="font-weight: 400;"><span data-dcnode-id="1121" instrument_node="">Acting as the resting place for over 1000 sailors, this somber monument commemorates the lives lost during the heart-breaking Pearl Harbor attack, and is sure to bring a tear to your eye.&nbsp;</span></span></p><span data-dcnode-id="1118" instrument_node="">
</span><p class="has-medium-font-size" data-dcnode-id="1115"><b data-dcnode-id="1116"><span data-dcnode-id="1117" instrument_node="">Where to Stay on Oahu</span></b></p><span data-dcnode-id="1114" instrument_node="">
</span><p data-dcnode-id="1111"><span data-dcnode-id="1112" style="font-weight: 400;"><span data-dcnode-id="1113" instrument_node="">Oahu is made up of 5 distinct districts, all with their own unique features and varying weather. I recommend staying in either Leeward Coast, Windward Coast, or Waikiki.&nbsp;</span></span></p><span data-dcnode-id="1110" instrument_node="">
</span><p data-dcnode-id="1102"><span data-dcnode-id="1107" style="text-decoration: underline;"><strong data-dcnode-id="1108"><span data-dcnode-id="1109" instrument_node="">Waikiki</span></strong></span><b data-dcnode-id="1105"><span data-dcnode-id="1106" instrument_node="">:&nbsp;</span></b><span data-dcnode-id="1103" style="font-weight: 400;"><span data-dcnode-id="1104" instrument_node="">If you want to be in a busy area and with endless excitement, the popular Waikiki is definitely where you should be staying. </span></span></p><span data-dcnode-id="1101" instrument_node="">
</span><p data-dcnode-id="1083"><span data-dcnode-id="1099" style="font-weight: 400;"><span data-dcnode-id="1100" instrument_node="">Recommended hotels: </span></span><a data-dcnode-id="1096" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.hotelscombined.com/Hotel/Aqua_Skyline_at_Island_Colony.htm%3Fa_aid%3D159405" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1097" style="font-weight: 400;"><span data-dcnode-id="1098" instrument_node="">Aqua Skyline</span></span></a><span data-dcnode-id="1094" style="font-weight: 400;"><span data-dcnode-id="1095" instrument_node=""> (tallest hotel in Waikiki), the </span></span><a data-dcnode-id="1091" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.hotelscombined.com/Hotel/The_Royal_Hawaiian_A_Luxury_Collection_Resort_Waikiki.htm%3Fa_aid%3D159405" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1092" style="font-weight: 400;"><span data-dcnode-id="1093" instrument_node="">Royal Hawaiian Resort</span></span></a><span data-dcnode-id="1089" style="font-weight: 400;"><span data-dcnode-id="1090" instrument_node=""> (luxury, 5-star hotel), and </span></span><a data-dcnode-id="1086" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.hotelscombined.com/Hotel/Aston_Waikiki_Circle_Hotel.htm%3Fa_aid%3D159405" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1087" style="font-weight: 400;"><span data-dcnode-id="1088" instrument_node="">Aston Waikiki Circle Hotel</span></span></a><span data-dcnode-id="1084" style="font-weight: 400;"><span data-dcnode-id="1085" instrument_node=""> (stunning views of the ocean).&nbsp;&nbsp;</span></span></p><span data-dcnode-id="1082" instrument_node="">
</span><p data-dcnode-id="1076"><span data-dcnode-id="1079" style="text-decoration: underline;"><strong data-dcnode-id="1080"><span data-dcnode-id="1081" instrument_node="">Leeward Coast:</span></strong></span><span data-dcnode-id="1077" style="font-weight: 400;"><span data-dcnode-id="1078" instrument_node=""> Found on the western coast of Oahu, you are going to find sunnier and drier weather than other parts of the island. If you’re looking to sunbathe and improve your tan, this is the place for you.</span></span></p><span data-dcnode-id="1075" instrument_node="">
</span><p data-dcnode-id="1072"><span data-dcnode-id="1073" style="font-weight: 400;"><span data-dcnode-id="1074" instrument_node="">Recommended hotels: Royal West Indies Resort (close proximity to the wind-sand beach), and Sumerset (found right next to grace bay).&nbsp;&nbsp;</span></span></p><span data-dcnode-id="1071" instrument_node="">
</span><p data-dcnode-id="1065"><span data-dcnode-id="1068" style="text-decoration: underline;"><strong data-dcnode-id="1069"><span data-dcnode-id="1070" instrument_node="">Windward Coast:</span></strong></span><span data-dcnode-id="1066" style="font-weight: 400;"><span data-dcnode-id="1067" instrument_node=""> Located on the eastern side of Oahu, this scenic area is a much greener and wetter option. If you’re looking for vast waters and fruitful plantlife, this is the ideal place to stay.</span></span></p><span data-dcnode-id="1064" instrument_node="">
</span><p data-dcnode-id="1046"><span data-dcnode-id="1062" style="font-weight: 400;"><span data-dcnode-id="1063" instrument_node="">Recommended hotels: </span></span><a data-dcnode-id="1059" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.hotelscombined.com/Hotel/Paradise_Bay_Resort.htm%3Fa_aid%3D159405" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1060" style="font-weight: 400;"><span data-dcnode-id="1061" instrument_node="">Paradise Bay Resort</span></span></a><span data-dcnode-id="1057" style="font-weight: 400;"><span data-dcnode-id="1058" instrument_node=""> (beautiful views of the Koolau mountains and Kaneohe bay), </span></span><a data-dcnode-id="1054" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.hotelscombined.com/Hotel/Pagoda_Hotel.htm%3Fa_aid%3D159405" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1055" style="font-weight: 400;"><span data-dcnode-id="1056" instrument_node="">Pagoda Hotel </span></span></a><span data-dcnode-id="1052" style="font-weight: 400;"><span data-dcnode-id="1053" instrument_node="">(affordable hotel in the heart of Honolulu), and the </span></span><a data-dcnode-id="1049" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.hotelscombined.com/Hotel/Pacific_Marina_Inn.htm%3Fa_aid%3D159405" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1050" style="font-weight: 400;"><span data-dcnode-id="1051" instrument_node="">Pacific Marina Inn</span></span></a><span data-dcnode-id="1047" style="font-weight: 400;"><span data-dcnode-id="1048" instrument_node=""> (close proximity to the airport).&nbsp;</span></span></p><span data-dcnode-id="1045" instrument_node="">
</span><h3 data-dcnode-id="1042"><b data-dcnode-id="1043"><span data-dcnode-id="1044" instrument_node="">Highlights on Kauai: “The Garden Isle”</span></b></h3><span data-dcnode-id="1041" instrument_node="">
</span><p data-dcnode-id="1038"><span data-dcnode-id="1039" style="font-weight: 400;"><span data-dcnode-id="1040" instrument_node="">Kauai is known as the most rugged and robust of all the Hawaiin islands, a perfect escapade for those wanting a little extra adventure. With a multitude of heavenly beaches, from the stunning Na Pali coast to the never-ending Hanalei Bay, many feel like this is the most beautiful of the Hawaiin islands. </span></span></p><span data-dcnode-id="1037" instrument_node="">
</span><p data-dcnode-id="1034"><span data-dcnode-id="1035" style="font-weight: 400;"><span data-dcnode-id="1036" instrument_node="">Kauai just has it all: vast, crystal-clear waters, majestic waterfalls within magical lagoons, towering trees in tropical forests. With such a dramatic level of natural beauty, it’s not hard to understand why this quaint island is so special.</span></span></p><span data-dcnode-id="1033" instrument_node="">
</span><div class="wp-block-image is-style-default" data-dcnode-id="1030"><figure class="aligncenter" data-dcnode-id="1031"><img alt="" class="wp-image-16867" data-dcnode-id="1032" data-jpibfi-post-excerpt="" data-jpibfi-post-title="Island Hopping in Hawaii: Planning an Epic 10-Day Hawaii Itinerary" data-jpibfi-post-url="https://apassionandapassport.com/hawaii-island-hopping-itinerary-10-days/" data-jpibfi-src="https://apassionandapassport.com/wp-content/uploads/2019/09/kauai-hawaii-225-750x500.jpg" height="500" loading="lazy" sizes="(max-width: 750px) 100vw, 750px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//apassionandapassport.com/wp-content/uploads/2019/09/kauai-hawaii-225-750x500.jpg&amp;raw" srcset="https://apassionandapassport.com/wp-content/uploads/2019/09/kauai-hawaii-225-750x500.jpg 750w, https://apassionandapassport.com/wp-content/uploads/2019/09/kauai-hawaii-225-600x400.jpg 600w, https://apassionandapassport.com/wp-content/uploads/2019/09/kauai-hawaii-225-850x567.jpg 850w, https://apassionandapassport.com/wp-content/uploads/2019/09/kauai-hawaii-225-272x182.jpg 272w, https://apassionandapassport.com/wp-content/uploads/2019/09/kauai-hawaii-225.jpg 1600w" width="750"></figure></div><span data-dcnode-id="1029" instrument_node="">
</span><p data-dcnode-id="1022"><strong data-dcnode-id="1027"><span data-dcnode-id="1028" instrument_node="">1. </span></strong><b data-dcnode-id="1025"><span data-dcnode-id="1026" instrument_node="">Poipu: </span></b><span data-dcnode-id="1023" style="font-weight: 400;"><span data-dcnode-id="1024" instrument_node="">With remarkable views straight out of a postcard, and warm sand between your toes, the breath-taking Poipu Beach is not one to be missed. </span></span></p><span data-dcnode-id="1021" instrument_node="">
</span><p data-dcnode-id="1018"><span data-dcnode-id="1019" style="font-weight: 400;"><span data-dcnode-id="1020" instrument_node="">Unwind beneath the feathery leaves of the bushy palm trees, or subdue your thrill-seeking side with surfing, snorkeling, and scuba diving. Not only a beach, but a town along the south shore of Kauai filled with high-end hotels, resorts, and a main shopping center.</span></span></p><span data-dcnode-id="1017" instrument_node="">
</span><p data-dcnode-id="1010"><strong data-dcnode-id="1015"><span data-dcnode-id="1016" instrument_node="">2. </span></strong><b data-dcnode-id="1011"><span data-dcnode-id="1014" instrument_node="">Na Pali Coast: </span><span data-dcnode-id="1012" style="font-weight: 400;"><span data-dcnode-id="1013" instrument_node="">Absolutely nothing compares to the jaw-dropping beauty of the Na Pali coast, found on the western side of Kauai. You’ll never be short of things to do at this serene beach: unmissable opportunities to snorkel and kayak in the crystalline ocean, hiking the famous Kalalau Trail with the most spectacular views, and sky-high helicopter rides across the entirety of Kauai. </span></span></b></p><span data-dcnode-id="1009" instrument_node="">
</span><p data-dcnode-id="1005"><b data-dcnode-id="1006"><span data-dcnode-id="1007" style="font-weight: 400;"><span data-dcnode-id="1008" instrument_node="">If you can only stomach a single helicopter ride while in Hawaii, Kauai and it’s gorgeous overhead shots should be a top contender for sure.</span></span></b></p><span data-dcnode-id="1004" instrument_node="">
</span><div class="wp-block-image is-style-default" data-dcnode-id="1001"><figure class="aligncenter" data-dcnode-id="1002"><img alt="" class="wp-image-16842" data-dcnode-id="1003" data-jpibfi-post-excerpt="" data-jpibfi-post-title="Island Hopping in Hawaii: Planning an Epic 10-Day Hawaii Itinerary" data-jpibfi-post-url="https://apassionandapassport.com/hawaii-island-hopping-itinerary-10-days/" data-jpibfi-src="https://apassionandapassport.com/wp-content/uploads/2019/09/kauai-hawaii-112-750x500.jpg" height="500" loading="lazy" sizes="(max-width: 750px) 100vw, 750px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//apassionandapassport.com/wp-content/uploads/2019/09/kauai-hawaii-112-750x500.jpg&amp;raw" srcset="https://apassionandapassport.com/wp-content/uploads/2019/09/kauai-hawaii-112-750x500.jpg 750w, https://apassionandapassport.com/wp-content/uploads/2019/09/kauai-hawaii-112-600x400.jpg 600w, https://apassionandapassport.com/wp-content/uploads/2019/09/kauai-hawaii-112-850x567.jpg 850w, https://apassionandapassport.com/wp-content/uploads/2019/09/kauai-hawaii-112-272x182.jpg 272w, https://apassionandapassport.com/wp-content/uploads/2019/09/kauai-hawaii-112.jpg 1600w" width="750"></figure></div><span data-dcnode-id="1000" instrument_node="">
</span><p data-dcnode-id="993"><strong data-dcnode-id="998"><span data-dcnode-id="999" instrument_node="">3. </span></strong><b data-dcnode-id="994"><span data-dcnode-id="997" instrument_node="">Take a dip in Queens bath: </span><span data-dcnode-id="995" style="font-weight: 400;"><span data-dcnode-id="996" instrument_node="">Dip your toes into this unique tidepool and bathe like a queen (see what I did there?). This picturesque natural sinkhole is surrounded by indiginous rock, and is a wonderful scenic location to relax and enjoy the ocean view. Watch your step as you hop in, as the waves are known to become quite strong, so be sure to be careful.&nbsp;</span></span></b></p><span data-dcnode-id="992" instrument_node="">
</span><p data-dcnode-id="985"><strong data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">4. </span></strong><b data-dcnode-id="986"><span data-dcnode-id="989" instrument_node="">Waimea Canyon: </span><span data-dcnode-id="987" style="font-weight: 400;"><span data-dcnode-id="988" instrument_node="">At 14 miles long and 1 mile wide, this jaw-dropping natural wonder will leave you breathless. Found in the south western area of Kauai, Waimea Canyon is nicknamed the ‘Grand Canyon of the Pacific’, and it’s not hard to see why. </span></span></b></p><span data-dcnode-id="984" instrument_node="">
</span><p data-dcnode-id="980"><b data-dcnode-id="981"><span data-dcnode-id="982" style="font-weight: 400;"><span data-dcnode-id="983" instrument_node="">You have the option to either hike or drive towards the impressive canyon, but mind your step as you wander around this awe-inspiring, 3600m deep valley. Take my advice, don’t look down!</span></span></b></p><span data-dcnode-id="979" instrument_node="">
</span><div class="wp-block-image is-style-default" data-dcnode-id="976"><figure class="aligncenter" data-dcnode-id="977"><img alt="" class="wp-image-16863" data-dcnode-id="978" data-jpibfi-post-excerpt="" data-jpibfi-post-title="Island Hopping in Hawaii: Planning an Epic 10-Day Hawaii Itinerary" data-jpibfi-post-url="https://apassionandapassport.com/hawaii-island-hopping-itinerary-10-days/" data-jpibfi-src="https://apassionandapassport.com/wp-content/uploads/2019/09/kauai-hawaii-220-750x500.jpg" height="500" loading="lazy" sizes="(max-width: 750px) 100vw, 750px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//apassionandapassport.com/wp-content/uploads/2019/09/kauai-hawaii-220-750x500.jpg&amp;raw" srcset="https://apassionandapassport.com/wp-content/uploads/2019/09/kauai-hawaii-220-750x500.jpg 750w, https://apassionandapassport.com/wp-content/uploads/2019/09/kauai-hawaii-220-600x400.jpg 600w, https://apassionandapassport.com/wp-content/uploads/2019/09/kauai-hawaii-220-850x567.jpg 850w, https://apassionandapassport.com/wp-content/uploads/2019/09/kauai-hawaii-220-272x182.jpg 272w, https://apassionandapassport.com/wp-content/uploads/2019/09/kauai-hawaii-220.jpg 1600w" width="750"></figure></div><span data-dcnode-id="975" instrument_node="">
</span><p data-dcnode-id="968"><strong data-dcnode-id="973"><span data-dcnode-id="974" instrument_node="">5. </span></strong><b data-dcnode-id="969"><span data-dcnode-id="972" instrument_node="">Tunnels Beach: </span><span data-dcnode-id="970" style="font-weight: 400;"><span data-dcnode-id="971" instrument_node="">Kauai is not short on golden beaches, but the magnificent Tunnels beach is not one you can pass out if you’re spending 10 days in Hawaii. Change into your swimsuit and spend an afternoon breathing in the sweet sea-salt breeze and lounging around at this spectacular sandy coastline.&nbsp;</span></span></b></p><span data-dcnode-id="967" instrument_node="">
</span><p data-dcnode-id="960"><strong data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">6. </span></strong><b data-dcnode-id="961"><span data-dcnode-id="964" instrument_node="">Kilauea Lighthouse: </span><span data-dcnode-id="962" style="font-weight: 400;"><span data-dcnode-id="963" instrument_node="">Wander up to Kilauea Point you’ll spot Kilauea lighthouse perched upon a charmingly scenic cliff, where it stands tall and overlooks the vast pacific ocean. </span></span></b></p><span data-dcnode-id="959" instrument_node="">
</span><p data-dcnode-id="955"><b data-dcnode-id="956"><span data-dcnode-id="957" style="font-weight: 400;"><span data-dcnode-id="958" instrument_node="">Lose track of time admiring the most stunning panoramic views of Kauai, and keep an eye out for the tropical birds that reside in the area. Make sure to have a firm grip on any food, as some shearwaters and petrels may fly down to try and steal a cheeky snack!</span></span></b></p><span data-dcnode-id="954" instrument_node="">
</span><div class="wp-block-image is-style-default" data-dcnode-id="951"><figure class="aligncenter" data-dcnode-id="952"><img alt="" class="wp-image-16850" data-dcnode-id="953" data-jpibfi-post-excerpt="" data-jpibfi-post-title="Island Hopping in Hawaii: Planning an Epic 10-Day Hawaii Itinerary" data-jpibfi-post-url="https://apassionandapassport.com/hawaii-island-hopping-itinerary-10-days/" data-jpibfi-src="https://apassionandapassport.com/wp-content/uploads/2019/09/kauai-itinerary-20-1-750x563.jpg" height="563" loading="lazy" sizes="(max-width: 750px) 100vw, 750px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//apassionandapassport.com/wp-content/uploads/2019/09/kauai-itinerary-20-1-750x563.jpg&amp;raw" srcset="https://apassionandapassport.com/wp-content/uploads/2019/09/kauai-itinerary-20-1-750x563.jpg 750w, https://apassionandapassport.com/wp-content/uploads/2019/09/kauai-itinerary-20-1-533x400.jpg 533w, https://apassionandapassport.com/wp-content/uploads/2019/09/kauai-itinerary-20-1-300x225.jpg 300w, https://apassionandapassport.com/wp-content/uploads/2019/09/kauai-itinerary-20-1-166x126.jpg 166w, https://apassionandapassport.com/wp-content/uploads/2019/09/kauai-itinerary-20-1-850x638.jpg 850w, https://apassionandapassport.com/wp-content/uploads/2019/09/kauai-itinerary-20-1.jpg 1600w" width="750"></figure></div><span data-dcnode-id="950" instrument_node="">
</span><p data-dcnode-id="943"><strong data-dcnode-id="948"><span data-dcnode-id="949" instrument_node="">7. </span></strong><b data-dcnode-id="944"><span data-dcnode-id="947" instrument_node="">Hanalei Bay: </span><span data-dcnode-id="945" style="font-weight: 400;"><span data-dcnode-id="946" instrument_node="">Calm and warm waters. Scenic swaying palm trees. Unforgettable views of the picturesque Na Pali mountains. Body surfing, boogie boarding, and kayaking. Beach bums and beach buns. Hanalei Bay will captivate you with its undeniable beauty and abundance of things to do, and is a must-visit location on your Hawaii itinerary.</span></span></b></p><span data-dcnode-id="942" instrument_node="">
</span><p data-dcnode-id="935"><strong data-dcnode-id="940"><span data-dcnode-id="941" instrument_node="">8. </span></strong><b data-dcnode-id="936"><span data-dcnode-id="939" instrument_node="">Princeville: </span><span data-dcnode-id="937" style="font-weight: 400;"><span data-dcnode-id="938" instrument_node="">On the north shore of Kauai, Princeville is a thriving 9000 acre community full of luxury resorts and beautiful white-sand beaches. From botanical gardens and chocolate tasting, to hiking and waterfall exploration, Princeville really lives up to its name and treats you like royalty (it’s the kind of treatment you, our dear readers, deserve!).</span></span></b></p><span data-dcnode-id="934" instrument_node="">
</span><div class="wp-block-image is-style-default" data-dcnode-id="931"><figure class="aligncenter" data-dcnode-id="932"><img alt="" class="wp-image-16879" data-dcnode-id="933" data-jpibfi-post-excerpt="" data-jpibfi-post-title="Island Hopping in Hawaii: Planning an Epic 10-Day Hawaii Itinerary" data-jpibfi-post-url="https://apassionandapassport.com/hawaii-island-hopping-itinerary-10-days/" data-jpibfi-src="https://apassionandapassport.com/wp-content/uploads/2019/09/kauai-itinerary-22-750x563.jpg" height="563" loading="lazy" sizes="(max-width: 750px) 100vw, 750px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//apassionandapassport.com/wp-content/uploads/2019/09/kauai-itinerary-22-750x563.jpg&amp;raw" srcset="https://apassionandapassport.com/wp-content/uploads/2019/09/kauai-itinerary-22-750x563.jpg 750w, https://apassionandapassport.com/wp-content/uploads/2019/09/kauai-itinerary-22-533x400.jpg 533w, https://apassionandapassport.com/wp-content/uploads/2019/09/kauai-itinerary-22-300x225.jpg 300w, https://apassionandapassport.com/wp-content/uploads/2019/09/kauai-itinerary-22-166x126.jpg 166w, https://apassionandapassport.com/wp-content/uploads/2019/09/kauai-itinerary-22-850x638.jpg 850w, https://apassionandapassport.com/wp-content/uploads/2019/09/kauai-itinerary-22.jpg 1600w" width="750"></figure></div><span data-dcnode-id="930" instrument_node="">
</span><p data-dcnode-id="923"><strong data-dcnode-id="928"><span data-dcnode-id="929" instrument_node="">9. </span></strong><b data-dcnode-id="924"><span data-dcnode-id="927" instrument_node="">Wailua River Kayak and Secret Falls: </span><span data-dcnode-id="925" style="font-weight: 400;"><span data-dcnode-id="926" instrument_node="">For those who crave a bit of adventure and epic exploration, the unforgettable trek towards secrets falls will keep you captivated. While on your voyage, you’ll paddle through the sacred Wailua River Valley by kayak, and hike along dirt paths while surrounded by tropical wildlife. </span></span></b></p><span data-dcnode-id="922" instrument_node="">
</span><p data-dcnode-id="918"><b data-dcnode-id="919"><span data-dcnode-id="920" style="font-weight: 400;"><span data-dcnode-id="921" instrument_node="">Secret Falls itself is a magical lagoon stolen straight out of a fairy tale, where you can soak in the crystal water and be blown away by one of the monumental waterfalls on the island.&nbsp;</span></span></b></p><span data-dcnode-id="917" instrument_node="">
</span><p data-dcnode-id="910"><strong data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">10. </span></strong><b data-dcnode-id="911"><span data-dcnode-id="914" instrument_node="">Ziplining: </span><span data-dcnode-id="912" style="font-weight: 400;"><span data-dcnode-id="913" instrument_node="">There is no way better to experience the divine Kauai than soaring along the horizon on a zipline. Fly overhead the jungle and experience the gorgeous garden isle from above. Hands down, this the most adrenaline-pumping and thrilling activity on this Hawaii itinerary.&nbsp;</span></span></b></p><span data-dcnode-id="909" instrument_node="">
</span><p class="has-medium-font-size" data-dcnode-id="906"><b data-dcnode-id="907"><span data-dcnode-id="908" instrument_node="">Where to Stay in Kauai</span></b></p><span data-dcnode-id="905" instrument_node="">
</span><p data-dcnode-id="902"><span data-dcnode-id="903" style="font-weight: 400;"><span data-dcnode-id="904" instrument_node="">Most visitors to the island choose to either stay on the north shore (Princeville) or the south shore (Poipu).&nbsp;</span></span></p><span data-dcnode-id="901" instrument_node="">
</span><p data-dcnode-id="893"><span data-dcnode-id="897" style="text-decoration: underline;"><strong data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">Poipu</span></strong><span data-dcnode-id="898" instrument_node="">:</span></span><span data-dcnode-id="896" instrument_node=""> </span><span data-dcnode-id="894" style="font-weight: 400;"><span data-dcnode-id="895" instrument_node="">This is where we typically stay when we’re visiting Kauai. Besides Poipu Beach being ranked among the top 10 in the states, staying in this area will put you in the middle of so many options for food and drink.</span></span></p><span data-dcnode-id="892" instrument_node="">
</span><p data-dcnode-id="872"><span data-dcnode-id="890" style="font-weight: 400;"><span data-dcnode-id="891" instrument_node="">Recommended hotels: </span></span><a data-dcnode-id="887" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.hotelscombined.com/Hotel/Grand_Hyatt_Kauai_Resort_Spa.htm%3Fa_aid%3D159405"><span data-dcnode-id="888" style="font-weight: 400;"><span data-dcnode-id="889" instrument_node="">Grand Hyatt Kauai Resort and Spa</span></span></a><span data-dcnode-id="886" instrument_node=""> </span><span data-dcnode-id="884" style="font-weight: 400;"><span data-dcnode-id="885" instrument_node="">&nbsp;(featuring a lazy river, movies under the stars, saltwater lagoon, spectacular dining views, and more), </span></span><a data-dcnode-id="881" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.hotelscombined.com/Hotel/Sheraton_Kauai_Resort.htm%3Fa_aid%3D159405"><span data-dcnode-id="882" style="font-weight: 400;"><span data-dcnode-id="883" instrument_node="">Sheraton Kauai Resort</span></span></a><span data-dcnode-id="879" style="font-weight: 400;"><span data-dcnode-id="880" instrument_node=""> (oceanfront with Hawaiian dining), and</span></span><span data-dcnode-id="878" instrument_node=""> </span><a data-dcnode-id="875" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.hotelscombined.com/Hotel/Koloa_Landing_Resort_at_Poipu_Autograph_Collection.htm%3Fa_aid%3D159405"><span data-dcnode-id="876" style="font-weight: 400;"><span data-dcnode-id="877" instrument_node="">Koloa Landing Resort at Poipu</span></span></a><span data-dcnode-id="873" style="font-weight: 400;"><span data-dcnode-id="874" instrument_node=""> (part of the Autograph Collection!).&nbsp;&nbsp;</span></span></p><span data-dcnode-id="871" instrument_node="">
</span><div class="wp-block-image is-style-default" data-dcnode-id="868"><figure class="aligncenter" data-dcnode-id="869"><img alt="" class="wp-image-16856" data-dcnode-id="870" data-jpibfi-post-excerpt="" data-jpibfi-post-title="Island Hopping in Hawaii: Planning an Epic 10-Day Hawaii Itinerary" data-jpibfi-post-url="https://apassionandapassport.com/hawaii-island-hopping-itinerary-10-days/" data-jpibfi-src="https://apassionandapassport.com/wp-content/uploads/2019/09/kauai-hawaii-3-750x500.jpg" height="500" loading="lazy" sizes="(max-width: 750px) 100vw, 750px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//apassionandapassport.com/wp-content/uploads/2019/09/kauai-hawaii-3-750x500.jpg&amp;raw" srcset="https://apassionandapassport.com/wp-content/uploads/2019/09/kauai-hawaii-3-750x500.jpg 750w, https://apassionandapassport.com/wp-content/uploads/2019/09/kauai-hawaii-3-600x400.jpg 600w, https://apassionandapassport.com/wp-content/uploads/2019/09/kauai-hawaii-3-850x567.jpg 850w, https://apassionandapassport.com/wp-content/uploads/2019/09/kauai-hawaii-3-272x182.jpg 272w, https://apassionandapassport.com/wp-content/uploads/2019/09/kauai-hawaii-3.jpg 1600w" width="750"></figure></div><span data-dcnode-id="867" instrument_node="">
</span><p data-dcnode-id="860"><span data-dcnode-id="863" style="text-decoration: underline;"><strong data-dcnode-id="865"><span data-dcnode-id="866" instrument_node="">Princeville</span></strong><span data-dcnode-id="864" instrument_node="">:</span></span><span data-dcnode-id="861" style="font-weight: 400;"><span data-dcnode-id="862" instrument_node=""> A bit more secluded and much more lush than the south shore. Stay here for outta this world snorkeling and beaches with fine golden sand without all the crowds. </span></span></p><span data-dcnode-id="859" instrument_node="">
</span><p data-dcnode-id="846"><span data-dcnode-id="857" style="font-weight: 400;"><span data-dcnode-id="858" instrument_node="">Recommended hotels: Princeville Resort (high-end property with a beachfront pool and my first choice), the </span></span><a data-dcnode-id="854" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.hotelscombined.com/Hotel/The_Westin_Princeville_Ocean_Resort_Villas.htm%3Fa_aid%3D159405"><span data-dcnode-id="855" style="font-weight: 400;"><span data-dcnode-id="856" instrument_node="">The Westin Princeville</span></span></a><span data-dcnode-id="852" style="font-weight: 400;"><span data-dcnode-id="853" instrument_node=""> (upscale cliff-top resort), and </span></span><a data-dcnode-id="849" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.hotelscombined.com/Hotel/Hanalei_Bay_Resort.htm%3Fa_aid%3D159405"><span data-dcnode-id="850" style="font-weight: 400;"><span data-dcnode-id="851" instrument_node="">Hanalei Bay Resort</span></span></a><span data-dcnode-id="847" style="font-weight: 400;"><span data-dcnode-id="848" instrument_node=""> (casual rooms and suites).&nbsp;&nbsp;</span></span></p><span data-dcnode-id="845" instrument_node="">
</span><p data-dcnode-id="840"><b data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">Where to Eat in Kauai:</span></b><span data-dcnode-id="841" style="font-weight: 400;"><span data-dcnode-id="842" instrument_node=""> Don’t miss sunset drinks at The Beach House, fresh fish at The Lanai, breakfast bowls at both Little Fish Coffee (my favorite) and Java Kai, and shave ice at Jojo’s.</span></span></p><span data-dcnode-id="839" instrument_node="">
</span><div class="wp-block-image is-style-default" data-dcnode-id="836"><figure class="aligncenter" data-dcnode-id="837"><img alt="" class="wp-image-16869" data-dcnode-id="838" data-jpibfi-post-excerpt="" data-jpibfi-post-title="Island Hopping in Hawaii: Planning an Epic 10-Day Hawaii Itinerary" data-jpibfi-post-url="https://apassionandapassport.com/hawaii-island-hopping-itinerary-10-days/" data-jpibfi-src="https://apassionandapassport.com/wp-content/uploads/2019/09/kauai-itinerary-13-1-750x563.jpg" height="563" loading="lazy" sizes="(max-width: 750px) 100vw, 750px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//apassionandapassport.com/wp-content/uploads/2019/09/kauai-itinerary-13-1-750x563.jpg&amp;raw" srcset="https://apassionandapassport.com/wp-content/uploads/2019/09/kauai-itinerary-13-1-750x563.jpg 750w, https://apassionandapassport.com/wp-content/uploads/2019/09/kauai-itinerary-13-1-533x400.jpg 533w, https://apassionandapassport.com/wp-content/uploads/2019/09/kauai-itinerary-13-1-300x225.jpg 300w, https://apassionandapassport.com/wp-content/uploads/2019/09/kauai-itinerary-13-1-166x126.jpg 166w, https://apassionandapassport.com/wp-content/uploads/2019/09/kauai-itinerary-13-1-850x638.jpg 850w, https://apassionandapassport.com/wp-content/uploads/2019/09/kauai-itinerary-13-1.jpg 1600w" width="750"></figure></div><span data-dcnode-id="835" instrument_node="">
</span><h3 data-dcnode-id="832"><b data-dcnode-id="833"><span data-dcnode-id="834" instrument_node="">Highlights on Hawaii: “The Big Island”</span></b></h3><span data-dcnode-id="831" instrument_node="">
</span><p data-dcnode-id="828"><span data-dcnode-id="829" style="font-weight: 400;"><span data-dcnode-id="830" instrument_node="">If you haven’t guessed already, the Big Island is called “The Big Island” for a reason – it’s huger than huge, and twice the size of all the other islands put together (see, it’s quite large)! </span></span></p><span data-dcnode-id="827" instrument_node="">
</span><p data-dcnode-id="819"><span data-dcnode-id="825" style="font-weight: 400;"><span data-dcnode-id="826" instrument_node="">AND it’s actually </span></span><i data-dcnode-id="822"><span data-dcnode-id="823" style="font-weight: 400;"><span data-dcnode-id="824" instrument_node="">still</span></span></i><span data-dcnode-id="820" style="font-weight: 400;"><span data-dcnode-id="821" instrument_node=""> growing in size by way of hardened molten lava, thanks to the world’s most active volcano, Kilauea, which is situated right on the island. Pretty neat, eh? </span></span></p><span data-dcnode-id="818" instrument_node="">
</span><p data-dcnode-id="815"><span data-dcnode-id="816" style="font-weight: 400;"><span data-dcnode-id="817" instrument_node="">The Big Island has 11 out of 13 of the world’s climatic zones – meaning you’ll find both white sandy beaches, rainforests, snow-capped mountains, and active volcanoes all on the same island.</span></span></p><span data-dcnode-id="814" instrument_node="">
</span><figure class="wp-block-image size-large is-style-default" data-dcnode-id="812"><img alt="" class="wp-image-18647" data-dcnode-id="813" data-jpibfi-post-excerpt="" data-jpibfi-post-title="Island Hopping in Hawaii: Planning an Epic 10-Day Hawaii Itinerary" data-jpibfi-post-url="https://apassionandapassport.com/hawaii-island-hopping-itinerary-10-days/" data-jpibfi-src="https://apassionandapassport.com/wp-content/uploads/2020/07/mountain-2262292_1280-750x1128.jpg" height="1128" loading="lazy" sizes="(max-width: 750px) 100vw, 750px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//apassionandapassport.com/wp-content/uploads/2020/07/mountain-2262292_1280-750x1128.jpg&amp;raw" srcset="https://apassionandapassport.com/wp-content/uploads/2020/07/mountain-2262292_1280-750x1128.jpg 750w, https://apassionandapassport.com/wp-content/uploads/2020/07/mountain-2262292_1280-266x400.jpg 266w, https://apassionandapassport.com/wp-content/uploads/2020/07/mountain-2262292_1280.jpg 851w" width="750"></figure><span data-dcnode-id="811" instrument_node="">
</span><p data-dcnode-id="799"><strong data-dcnode-id="809"><span data-dcnode-id="810" instrument_node="">1. </span></strong><b data-dcnode-id="807"><span data-dcnode-id="808" instrument_node="">Hawaii Volcanoes National Park: </span></b><span data-dcnode-id="805" style="font-weight: 400;"><span data-dcnode-id="806" instrument_node="">Is it just me, or is it getting hot, hot, HOT out here? Hawaii is famous for its multitude of active volcanoes, and there’s no better way to </span></span><i data-dcnode-id="802"><span data-dcnode-id="803" style="font-weight: 400;"><span data-dcnode-id="804" instrument_node="">safely</span></span></i><span data-dcnode-id="800" style="font-weight: 400;"><span data-dcnode-id="801" instrument_node=""> experience volcanic land than visiting the rugged National Park. </span></span></p><span data-dcnode-id="798" instrument_node="">
</span><p data-dcnode-id="795"><span data-dcnode-id="796" style="font-weight: 400;"><span data-dcnode-id="797" instrument_node="">Here you’ll find Kilauea Volcano, which is a whopping 280,000 years old and the most active volcano you’ll experience while Hawaii island hopping. Thrilling crater hikes INTO the active volcano. Intense treks and bike rides alongside scalding steam vents. Wandering through the Thurston Lava Tube, a large cave sculptured by ancient fast-flowing lava. There’s certainly not a shortage of adventures to partake in!</span></span></p><span data-dcnode-id="794" instrument_node="">
</span><p data-dcnode-id="787"><strong data-dcnode-id="792"><span data-dcnode-id="793" instrument_node="">2. </span></strong><b data-dcnode-id="788"><span data-dcnode-id="791" instrument_node="">‘Akaka Falls State Park: </span><span data-dcnode-id="789" style="font-weight: 400;"><span data-dcnode-id="790" instrument_node="">What’s here you ask? Well, the clues in the name! Home to a multitude of whimsical waterfalls, you can hike along paved paths and be blown away as you explore this lush jungle full of exotic plant-life and wild birds.</span></span></b></p><span data-dcnode-id="786" instrument_node="">
</span><figure class="wp-block-image size-large is-style-default" data-dcnode-id="784"><img alt="" class="wp-image-18646" data-dcnode-id="785" data-jpibfi-post-excerpt="" data-jpibfi-post-title="Island Hopping in Hawaii: Planning an Epic 10-Day Hawaii Itinerary" data-jpibfi-post-url="https://apassionandapassport.com/hawaii-island-hopping-itinerary-10-days/" data-jpibfi-src="https://apassionandapassport.com/wp-content/uploads/2020/07/akaka-falls-2109288_1280-750x1000.jpg" height="1000" loading="lazy" sizes="(max-width: 750px) 100vw, 750px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//apassionandapassport.com/wp-content/uploads/2020/07/akaka-falls-2109288_1280-750x1000.jpg&amp;raw" srcset="https://apassionandapassport.com/wp-content/uploads/2020/07/akaka-falls-2109288_1280-750x1000.jpg 750w, https://apassionandapassport.com/wp-content/uploads/2020/07/akaka-falls-2109288_1280-300x400.jpg 300w, https://apassionandapassport.com/wp-content/uploads/2020/07/akaka-falls-2109288_1280.jpg 960w" width="750"></figure><span data-dcnode-id="783" instrument_node="">
</span><p data-dcnode-id="776"><strong data-dcnode-id="781"><span data-dcnode-id="782" instrument_node="">3. </span></strong><b data-dcnode-id="779"><span data-dcnode-id="780" instrument_node="">Mauna Kea Observatory: </span></b><span data-dcnode-id="777" style="font-weight: 400;"><span data-dcnode-id="778" instrument_node="">Being Hawaii’s highest peak at 13,500 feet, this observatory is the best place to get a flawless panoramic view of the Big Island. Perch yourself atop this dormant volcano and be blown away by the remarkable sights.&nbsp;</span></span></p><span data-dcnode-id="775" instrument_node="">
</span><p data-dcnode-id="768"><strong data-dcnode-id="773"><span data-dcnode-id="774" instrument_node="">4. </span></strong><b data-dcnode-id="769"><span data-dcnode-id="772" instrument_node="">Kona: </span><span data-dcnode-id="770" style="font-weight: 400;"><span data-dcnode-id="771" instrument_node="">Expanding across the west side of Hawaii, Kona is rich with culture. From historical monuments, such as Hulihee Palace and Mokuaikaua Church, to fruitful nightlife and quaint shopping boutiques – this city has it all. </span></span></b></p><span data-dcnode-id="767" instrument_node="">
</span><p data-dcnode-id="763"><b data-dcnode-id="764"><span data-dcnode-id="765" style="font-weight: 400;"><span data-dcnode-id="766" instrument_node="">So no matter if you’re in the mood to explore, shop, or throw back a few cocktails (I certainly am at least!), you’ll be sure to find something to do in these busy streets.&nbsp;</span></span></b></p><span data-dcnode-id="762" instrument_node="">
</span><figure class="wp-block-image size-large is-style-default" data-dcnode-id="760"><img alt="" class="wp-image-18648" data-dcnode-id="761" data-jpibfi-post-excerpt="" data-jpibfi-post-title="Island Hopping in Hawaii: Planning an Epic 10-Day Hawaii Itinerary" data-jpibfi-post-url="https://apassionandapassport.com/hawaii-island-hopping-itinerary-10-days/" data-jpibfi-src="https://apassionandapassport.com/wp-content/uploads/2020/07/mauna-kea-2262288_1280-750x499.jpg" height="499" loading="lazy" sizes="(max-width: 750px) 100vw, 750px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//apassionandapassport.com/wp-content/uploads/2020/07/mauna-kea-2262288_1280-750x499.jpg&amp;raw" srcset="https://apassionandapassport.com/wp-content/uploads/2020/07/mauna-kea-2262288_1280-750x499.jpg 750w, https://apassionandapassport.com/wp-content/uploads/2020/07/mauna-kea-2262288_1280-600x400.jpg 600w, https://apassionandapassport.com/wp-content/uploads/2020/07/mauna-kea-2262288_1280.jpg 1280w" width="750"></figure><span data-dcnode-id="759" instrument_node="">
</span><p data-dcnode-id="752"><strong data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">5. </span></strong><b data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">Hilo: </span></b><span data-dcnode-id="753" style="font-weight: 400;"><span data-dcnode-id="754" instrument_node="">There is no way you can travel all the way to Hawaii and not explore the Big Island’s capital city! It’s filled with white-sand beaches and dramatic waterfalls. Vast mountains and tropical forests. Classic farmers markets and soaring banyan trees. Hilo is the city of endless opportunities, you’re truly spoilt for choice…</span></span></p><span data-dcnode-id="751" instrument_node="">
</span><p data-dcnode-id="744"><strong data-dcnode-id="749"><span data-dcnode-id="750" instrument_node="">6. </span></strong><b data-dcnode-id="745"><span data-dcnode-id="748" instrument_node="">Snorkel With Manta Rays: </span><span data-dcnode-id="746" style="font-weight: 400;"><span data-dcnode-id="747" instrument_node="">Swimming alongside majestic manta rays is a once in a lifetime experience that cannot be missed, so dip your toes in the water and be prepared for a wild ride. </span></span></b></p><span data-dcnode-id="743" instrument_node="">
</span><p data-dcnode-id="739"><b data-dcnode-id="740"><span data-dcnode-id="741" style="font-weight: 400;"><span data-dcnode-id="742" instrument_node="">Considered the birds of the ocean, manta rays have a large span that allows to fly through the water, and watching them move is an absolutely captivating sight. With tours offered at both daytime AND nighttime, you can jump in at anytime and make a splash alongside the rays.&nbsp;</span></span></b></p><span data-dcnode-id="738" instrument_node="">
</span><p data-dcnode-id="731"><strong data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">7. </span></strong><b data-dcnode-id="732"><span data-dcnode-id="735" instrument_node="">Stargaze: </span><span data-dcnode-id="733" style="font-weight: 400;"><span data-dcnode-id="734" instrument_node="">With gorgeous clear skies and lack of light pollution, the Big Island is the place to be for stargazing. While just about everywhere on the island has an unforgettable starry night sky, Mauna Kea and Mauna Lau are particularly famous for their stunning skyline and bright stars.</span></span></b></p><span data-dcnode-id="730" instrument_node="">
</span><p data-dcnode-id="723"><strong data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">8. </span></strong><b data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">Ka Lae:</span></b><span data-dcnode-id="724" style="font-weight: 400;"><span data-dcnode-id="725" instrument_node=""> Being able to say you’ve stood at the southernmost point of the United States is reason enough to visit Ka Lae. If that doesn’t sell you, the unforgettable view from the rugged cliffs sure will. Trust me, nothing compares to having the wind whip through your hair as you stare out across the ocean, it’s like you’re in your own dramatic music video…</span></span></p><span data-dcnode-id="722" instrument_node="">
</span><p data-dcnode-id="715"><strong data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">9. </span></strong><b data-dcnode-id="716"><span data-dcnode-id="719" instrument_node="">Snorkel in Kealakekua Bay State Historical Park: </span><span data-dcnode-id="717" style="font-weight: 400;"><span data-dcnode-id="718" instrument_node="">Hawaii and it’s magnificent beaches are the perfect place to dip your head under water and snorkel, and Kealakekua Bay is definitely one of the top places to do so. </span></span></b></p><span data-dcnode-id="714" instrument_node="">
</span><p data-dcnode-id="710"><b data-dcnode-id="711"><span data-dcnode-id="712" style="font-weight: 400;"><span data-dcnode-id="713" instrument_node="">With clear blue waters and gentle waves, you’ll have a serene experience while submerged underwater. Keep an eye out for yellow tangs, as these tiny yellow fish are known to frequent the waters!</span></span></b></p><span data-dcnode-id="709" instrument_node="">
</span><p data-dcnode-id="702"><strong data-dcnode-id="707"><span data-dcnode-id="708" instrument_node="">10. </span></strong><b data-dcnode-id="703"><span data-dcnode-id="706" instrument_node="">Spelunking Kula Kai Caverns: </span><span data-dcnode-id="704" style="font-weight: 400;"><span data-dcnode-id="705" instrument_node="">You’ve spent enough time wandering above ground, so slap on a hard hat as it’s time to go venturing below! The Kula Kai caverns are a series of echoey caves and twisting lava tube tunnels, and it’s easy to get lost within the mystifying passageways so be sure to bring along an experienced guide.</span></span></b></p><span data-dcnode-id="701" instrument_node="">
</span><p data-dcnode-id="694"><strong data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">11. </span></strong><b data-dcnode-id="695"><span data-dcnode-id="698" instrument_node="">Waipio Valley and Waterfalls: </span><span data-dcnode-id="696" style="font-weight: 400;"><span data-dcnode-id="697" instrument_node="">Within this extraordinary valley you will find the Big Island’s most famous waterfalls: Hiilawe Falls, Akaka Falls, and Rainbow Falls. While hiking through the mind-boggling Waipio, it’ll seem like a tap has been turned on within the hills. </span></span></b></p><span data-dcnode-id="693" instrument_node="">
</span><figure class="wp-block-image size-large is-style-default" data-dcnode-id="691"><img alt="" class="wp-image-18650" data-dcnode-id="692" data-jpibfi-post-excerpt="" data-jpibfi-post-title="Island Hopping in Hawaii: Planning an Epic 10-Day Hawaii Itinerary" data-jpibfi-post-url="https://apassionandapassport.com/hawaii-island-hopping-itinerary-10-days/" data-jpibfi-src="https://apassionandapassport.com/wp-content/uploads/2020/07/waipio-valley-3417171_1280-750x437.jpg" height="437" loading="lazy" sizes="(max-width: 750px) 100vw, 750px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//apassionandapassport.com/wp-content/uploads/2020/07/waipio-valley-3417171_1280-750x437.jpg&amp;raw" srcset="https://apassionandapassport.com/wp-content/uploads/2020/07/waipio-valley-3417171_1280-750x437.jpg 750w, https://apassionandapassport.com/wp-content/uploads/2020/07/waipio-valley-3417171_1280-600x349.jpg 600w, https://apassionandapassport.com/wp-content/uploads/2020/07/waipio-valley-3417171_1280.jpg 1280w" width="750"></figure><span data-dcnode-id="690" instrument_node="">
</span><p data-dcnode-id="686"><b data-dcnode-id="687"><span data-dcnode-id="688" style="font-weight: 400;"><span data-dcnode-id="689" instrument_node="">With mile-high waterfalls that spit fast-flowing water into the valleys below, it’s the kind of scene that’ll have you crossing your legs and needing to pee!</span></span></b></p><span data-dcnode-id="685" instrument_node="">
</span><p data-dcnode-id="678"><strong data-dcnode-id="683"><span data-dcnode-id="684" instrument_node="">12. </span></strong><b data-dcnode-id="679"><span data-dcnode-id="682" instrument_node="">Punalu’u Black Sand Beach: </span><span data-dcnode-id="680" style="font-weight: 400;"><span data-dcnode-id="681" instrument_node="">There’s something so spooky and captivating about a bold black-sanded beach. Golden sand is replaced by darkened basalt, and it will glitter and sparkle beneath your feet. Turtles are often found lounging around under swaying coconut trees, as even the wildlife enjoy relaxing upon this inky-colored coast.</span></span></b></p><span data-dcnode-id="677" instrument_node="">
</span><figure class="wp-block-image size-large is-style-default" data-dcnode-id="675"><img alt="" class="wp-image-18651" data-dcnode-id="676" data-jpibfi-post-excerpt="" data-jpibfi-post-title="Island Hopping in Hawaii: Planning an Epic 10-Day Hawaii Itinerary" data-jpibfi-post-url="https://apassionandapassport.com/hawaii-island-hopping-itinerary-10-days/" data-jpibfi-src="https://apassionandapassport.com/wp-content/uploads/2020/07/turtle-4107228_1280-750x421.jpg" height="421" loading="lazy" sizes="(max-width: 750px) 100vw, 750px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//apassionandapassport.com/wp-content/uploads/2020/07/turtle-4107228_1280-750x421.jpg&amp;raw" srcset="https://apassionandapassport.com/wp-content/uploads/2020/07/turtle-4107228_1280-750x421.jpg 750w, https://apassionandapassport.com/wp-content/uploads/2020/07/turtle-4107228_1280-600x337.jpg 600w, https://apassionandapassport.com/wp-content/uploads/2020/07/turtle-4107228_1280.jpg 1280w" width="750"></figure><span data-dcnode-id="674" instrument_node="">
</span><p data-dcnode-id="667"><strong data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">13. </span></strong><b data-dcnode-id="668"><span data-dcnode-id="671" instrument_node="">Kona Coffee Farm: </span><span data-dcnode-id="669" style="font-weight: 400;"><span data-dcnode-id="670" instrument_node="">If you’re tired after an intense Hawaii island hopping adventure, Kona Coffee Farm is going to wake you up and put an extra spring in your step. Tour the endless stretches of farmland, and sample what is considered one of the most gourmet cups of coffee in the world.&nbsp;</span></span></b></p><span data-dcnode-id="666" instrument_node="">
</span><p class="has-medium-font-size" data-dcnode-id="663"><b data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">Where to Stay on The Big Island</span></b></p><span data-dcnode-id="662" instrument_node="">
</span><p data-dcnode-id="659"><span data-dcnode-id="660" style="font-weight: 400;"><span data-dcnode-id="661" instrument_node="">The big island is split into 9 distinct areas, all with their own unique features and selling points. I recommend staying in Hilo, Kailua-Kona, or a locally-managed apartment/condo.&nbsp;</span></span></p><span data-dcnode-id="658" instrument_node="">
</span><p data-dcnode-id="650"><span data-dcnode-id="655" style="text-decoration: underline;"><strong data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">Hilo</span></strong></span><b data-dcnode-id="653"><span data-dcnode-id="654" instrument_node="">:&nbsp;</span></b><span data-dcnode-id="651" style="font-weight: 400;"><span data-dcnode-id="652" instrument_node="">In Hilo, you’ll be close to the Volcano National Park, and in general be in closer proximity to volcanic areas and tourist spots.</span></span></p><span data-dcnode-id="649" instrument_node="">
</span><p data-dcnode-id="631"><span data-dcnode-id="647" style="font-weight: 400;"><span data-dcnode-id="648" instrument_node="">Recommended Hotels: </span></span><a data-dcnode-id="644" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.hotelscombined.com/Hotel/Hilo_Bay_Oceanfront_Bed_and_Breakfast.htm%3Fa_aid%3D159405" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="645" style="font-weight: 400;"><span data-dcnode-id="646" instrument_node="">Hilo Bay Oceanfront Bed and Breakfast</span></span></a><span data-dcnode-id="642" style="font-weight: 400;"><span data-dcnode-id="643" instrument_node=""> (quaint building with the ocean on its doorstep), </span></span><a data-dcnode-id="639" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.hotelscombined.com/Hotel/Hilo_Seaside_Hotel.htm%3Fa_aid%3D159405" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="640" style="font-weight: 400;"><span data-dcnode-id="641" instrument_node="">Hilo Seaside Hotel</span></span></a><span data-dcnode-id="637" style="font-weight: 400;"><span data-dcnode-id="638" instrument_node=""> (luxury resort with pool), and&nbsp;</span></span><a data-dcnode-id="634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.hotelscombined.com/Hotel/The_Inn_at_Kulaniapia_Falls.htm%3Fa_aid%3D159405" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="635" style="font-weight: 400;"><span data-dcnode-id="636" instrument_node="">The Inn at Kulaniapia Falls</span></span></a><span data-dcnode-id="632" style="font-weight: 400;"><span data-dcnode-id="633" instrument_node=""> (short walk away from gorgeous lagoon and waterfall).&nbsp;</span></span></p><span data-dcnode-id="630" instrument_node="">
</span><p data-dcnode-id="622"><span data-dcnode-id="627" style="text-decoration: underline;"><strong data-dcnode-id="628"><span data-dcnode-id="629" instrument_node="">Kailua-Kona</span></strong></span><b data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">:&nbsp;</span></b><span data-dcnode-id="623" style="font-weight: 400;"><span data-dcnode-id="624" instrument_node="">In Kailua-Kona, you’ll be in closer proximity to the rich historical sights and stunning beaches of the big island, and is perfect for travelers wanting to spend their 10 days in Hawaii exploring.</span></span></p><span data-dcnode-id="621" instrument_node="">
</span><p data-dcnode-id="603"><span data-dcnode-id="619" style="font-weight: 400;"><span data-dcnode-id="620" instrument_node="">Recommended Hotels: </span></span><a data-dcnode-id="616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.hotelscombined.com/Hotel/Hale_Maluhia_Country_Inn.htm%3Fa_aid%3D159405" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="617" style="font-weight: 400;"><span data-dcnode-id="618" instrument_node="">Hale Maluhia Country Inn</span></span></a><span data-dcnode-id="614" style="font-weight: 400;"><span data-dcnode-id="615" instrument_node=""> (a magical little cottage surrounded by nature), </span></span><a data-dcnode-id="611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.hotelscombined.com/Hotel/Uncle_Billys_Kona_Bay_Hotel.htm%3Fa_aid%3D159405" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="612" style="font-weight: 400;"><span data-dcnode-id="613" instrument_node="">Uncle Billy’s Kona Bay Hotel </span></span></a><span data-dcnode-id="609" style="font-weight: 400;"><span data-dcnode-id="610" instrument_node="">(in the heart of the historic village), and the&nbsp;</span></span><a data-dcnode-id="606" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.hotelscombined.com/Hotel/Sheraton_Kona_Resort_and_Spa.htm%3Fa_aid%3D159405" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="607" style="font-weight: 400;"><span data-dcnode-id="608" instrument_node="">Sheraton Kona Resort </span></span></a><span data-dcnode-id="604" style="font-weight: 400;"><span data-dcnode-id="605" instrument_node="">(high-class, luxury resort).</span></span></p><span data-dcnode-id="602" instrument_node="">
</span><p data-dcnode-id="599"><strong data-dcnode-id="600"><span data-dcnode-id="601" instrument_node="">Are you currently planning a trip around the Hawaiian islands?! What’s on your&nbsp;10 day Hawaii island hopping itinerary so far?!</span></strong></p><span data-dcnode-id="598" instrument_node="">
