</span><h5 class="yikes-custom-woo-tab-title yikes-custom-woo-tab-title-tour-description" data-dcnode-id="2933"><span data-dcnode-id="2934" instrument_node="">Tour Description</span></h5><p data-dcnode-id="2931"><span data-dcnode-id="2932" instrument_node="">This tour starts with pickup from your Waikiki hotel and transport to HNL airport. If you are on Maui you will be picked up your hotel in South or West Maui and transported to the airport in Kahului.&nbsp; There you’ll catch a flight to fly over to Hilo where your tour guide will meet you at the airport around 8:00 am. From here we journey through Hilo, seeing and stopping at various places till we reach the famed Rainbow Falls State Park on the edge of town.</span></p><span data-dcnode-id="2930" instrument_node="">
</span><p data-dcnode-id="2928"><span data-dcnode-id="2929" instrument_node="">The highlight of this tour is the many stops within Hawaii Volcanoes National Park to see an active volcano and craters of the past along Chain of Craters Road. See the steam vents, check out the destruction of the crater due to the last eruption a year ago. See how the landscape changes and get other great information in the learning center of the Visitor Center.</span></p><span data-dcnode-id="2927" instrument_node="">
</span><p data-dcnode-id="2925"><span data-dcnode-id="2926" instrument_node="">Our tour also includes stops at a black sand beach, a lunch stop, scenic viewpoints, gardens, and more. Your guide will return you back to the airport in Hilo for your flight back to Oahu, where your driver will meet you at the airport to transport you back to your hotel.&nbsp; In all an 8 hour day on the Big Island of Hawaii.</span></p><span data-dcnode-id="2924" instrument_node="">
</span><p data-dcnode-id="2921"><em data-dcnode-id="2922"><span data-dcnode-id="2923" instrument_node="">Your guide may change some stops depending on weather and availability*</span></em></p><span data-dcnode-id="2920" instrument_node="">

 on your device. We use cookies to let us know when you visit our websites, how you interact with us, to enrich your user experience, and to customize your relationship with our website. </span></p><span data-dcnode-id="976" instrument_node="">
