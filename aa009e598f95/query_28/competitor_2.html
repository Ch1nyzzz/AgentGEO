><div class="big-leader big-leader--scriptless" data-dcnode-id="939"><img alt="Seven Day Itinerary for the Big Island" aria-hidden="true" class="big-leader__image post-image" data-dcnode-id="941" height="477" sizes="(max-width: 960px) 90vw, (max-width: 1200px) 620px, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/wp-content/uploads/kua-bay.jpg&amp;raw" srcset="https://www.lovebigisland.com/wp-content/uploads/kua-bay.jpg 1000w, https://www.lovebigisland.com/wp-content/uploads/kua-bay-620x296.jpg 620w, https://www.lovebigisland.com/wp-content/uploads/kua-bay-768x366.jpg 768w, https://www.lovebigisland.com/wp-content/uploads/kua-bay-800x382.jpg 800w, https://www.lovebigisland.com/wp-content/uploads/kua-bay-320x153.jpg 320w, https://www.lovebigisland.com/wp-content/uploads/kua-bay-400x191.jpg 400w, https://www.lovebigisland.com/wp-content/uploads/kua-bay-600x286.jpg 600w" width="1000"><div class="wrap" data-dcnode-id="940"></div></div><div class="site-inner" data-dcnode-id="381"><div class="wrap" data-dcnode-id="382"><div class="content-sidebar-wrap" data-dcnode-id="383"><main class="content" data-dcnode-id="566" id="genesis-content"><div class="breadcrumb" data-dcnode-id="931"><span data-dcnode-id="932"><span data-dcnode-id="933"><a data-dcnode-id="937" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/"><span data-dcnode-id="938" instrument_node="">Home</span></a><span data-dcnode-id="936" instrument_node=""> » </span><span aria-current="page" class="breadcrumb_last" data-dcnode-id="934"><span data-dcnode-id="935" instrument_node="">Seven day itinerary</span></span></span></span></div><article aria-label="Seven Day Itinerary for the Big Island" class="post-71 page type-page status-publish has-post-thumbnail entry" data-dcnode-id="567"><header class="entry-header" data-dcnode-id="909"><h1 class="entry-title" data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">Seven Day Itinerary for the Big Island</span></h1><div class="mobile-only entry-meta" data-dcnode-id="910"><span data-dcnode-id="928" instrument_node="">By </span><span class="entry-author" data-dcnode-id="925"><span class="entry-author-name" data-dcnode-id="926"><span data-dcnode-id="927" instrument_node="">Love Big Island</span></span></span><span data-dcnode-id="924" instrument_node=""> | updated </span><time class="entry-modified-time" data-dcnode-id="922"><span data-dcnode-id="923" instrument_node="">February 13, 2022</span></time><p class="sidetoc-icons social" data-dcnode-id="911"><a class="link" data-dcnode-id="920" data-pin-color="red" data-pin-config="beside" data-pin-custom="true" data-pin-do="buttonPin" data-pin-height="28" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pinterest.com/pin/create/button/%3Furl%3Dhttps%253A%252F%252Fwww.lovebigisland.com%252Fseven-day-itinerary-for-big-island-hawaii%252F%26media%3Dhttps%3A//www.lovebigisland.com/wp-content/uploads/kua-bay.jpg%26description%3DSeven%2520Day%2520Itinerary%2520for%2520the%2520Big%2520Island" onmousedown="gtag('event', 'click', {  'event_category' : 'social', 'event_label' : 'pinterest'});" rel="noopener" target="_blank"><span class="icon-pinterest" data-dcnode-id="921"></span></a><a class="link" data-dcnode-id="918" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/sharer/sharer.php%3Fu%3Dhttps%253A%252F%252Fwww.lovebigisland.com%252Fseven-day-itinerary-for-big-island-hawaii%252F" onmousedown="gtag('event', 'click', {  'event_category' : 'social', 'event_label' : 'facebook'});" rel="noopener" target="_blank"><span class="icon-facebook" data-dcnode-id="919"></span></a><a class="link" data-dcnode-id="916" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/intent/tweet%3Ftext%3DSeven%2520Day%2520Itinerary%2520for%2520the%2520Big%2520Island%26url%3Dhttps%253A%252F%252Fwww.lovebigisland.com%252Fseven-day-itinerary-for-big-island-hawaii%252F%26via%3Dlovebigisland" onmousedown="gtag('event', 'click', {  'event_category' : 'social', 'event_label' : 'twitter'});" rel="noopener" target="_blank"><span class="icon-twitter" data-dcnode-id="917"></span></a><a class="link" data-dcnode-id="914" href="mailto:?subject=Seven%20Day%20Itinerary%20for%20the%20Big%20Island&amp;body=https%3A%2F%2Fwww.lovebigisland.com%2Fseven-day-itinerary-for-big-island-hawaii%2F" onmousedown="gtag('event', 'click', {  'event_category' : 'social', 'event_label' : 'email'});"><span class="icon-mail4" data-dcnode-id="915"></span></a><a class="link" data-dcnode-id="912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/seven-day-itinerary-for-big-island-hawaii" onmousedown="gtag('event', 'click', {  'event_category' : 'social', 'event_label' : 'other'});"><span class="icon-share2" data-dcnode-id="913"></span></a></p></div></header><div class="entry-content" data-dcnode-id="568"><p data-dcnode-id="907"><span data-dcnode-id="908" instrument_node="">The Big Island is one of the most beautiful and diverse islands you will ever visit. It hosts 8 out of 13 of the&nbsp;world’s climate zones, stunning beaches, waterfalls and rainforests inhabited by species found nowhere else on the planet. It is also home to a series of majestic volcanoes that are constantly changing the island’s landscape.</span></p><p data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">We recommend that you devote a few days of your itinerary to seeking out both the active and non-active volcanic sites which make the Big Island such a wonder of nature. This itinerary is meant primarily as a template.&nbsp; As tastes differ we encourage you to change it as much as you want to tailor your own perfect Hawaiian getaway.</span></p><div class="fixed-toc" data-dcnode-id="877"><p data-dcnode-id="902"><span class="icon-file-text" data-dcnode-id="904"></span><span data-dcnode-id="903" instrument_node=""> Table of contents</span></p><p data-dcnode-id="901"></p><ul data-dcnode-id="879"><li data-dcnode-id="898"><a data-dcnode-id="899" href="#day-1"><span data-dcnode-id="900" instrument_node="">Day 1: Hitting the beaches</span></a></li><li data-dcnode-id="895"><a data-dcnode-id="896" href="#day-2"><span data-dcnode-id="897" instrument_node="">Day 2: Ocean views and adventures</span></a></li><li data-dcnode-id="892"><a data-dcnode-id="893" href="#day-3"><span data-dcnode-id="894" instrument_node="">Day 3: Volcano Village and the Hawaii Volcanoes National Park</span></a></li><li data-dcnode-id="889"><a data-dcnode-id="890" href="#day-4"><span data-dcnode-id="891" instrument_node="">Day 4: Jungle and lava fields</span></a></li><li data-dcnode-id="886"><a data-dcnode-id="887" href="#day-5"><span data-dcnode-id="888" instrument_node="">Day 5: Hilo and waterfalls</span></a></li><li data-dcnode-id="883"><a data-dcnode-id="884" href="#day-6"><span data-dcnode-id="885" instrument_node="">Day 6: The Hamakua coast</span></a></li><li data-dcnode-id="880"><a data-dcnode-id="881" href="#day-7"><span data-dcnode-id="882" instrument_node="">Day 7: Waimea and Pololu Black Sand Beach</span></a></li></ul><p data-dcnode-id="878"></p></div><details class="mobtoc" data-dcnode-id="849"><summary data-dcnode-id="875"><span data-dcnode-id="876" instrument_node="">Table of Contents</span></summary><p data-dcnode-id="874"></p><ul data-dcnode-id="852"><li data-dcnode-id="871"><a data-dcnode-id="872" href="#day-1"><span data-dcnode-id="873" instrument_node="">Day 1: Hitting the beaches</span></a></li><li data-dcnode-id="868"><a data-dcnode-id="869" href="#day-2"><span data-dcnode-id="870" instrument_node="">Day 2: Ocean views and adventures</span></a></li><li data-dcnode-id="865"><a data-dcnode-id="866" href="#day-3"><span data-dcnode-id="867" instrument_node="">Day 3: Volcano Village and the Hawaii Volcanoes National Park</span></a></li><li data-dcnode-id="862"><a data-dcnode-id="863" href="#day-4"><span data-dcnode-id="864" instrument_node="">Day 4: Jungle and lava fields</span></a></li><li data-dcnode-id="859"><a data-dcnode-id="860" href="#day-5"><span data-dcnode-id="861" instrument_node="">Day 5: Hilo and waterfalls</span></a></li><li data-dcnode-id="856"><a data-dcnode-id="857" href="#day-6"><span data-dcnode-id="858" instrument_node="">Day 6: The Hamakua coast</span></a></li><li data-dcnode-id="853"><a data-dcnode-id="854" href="#day-7"><span data-dcnode-id="855" instrument_node="">Day 7: Waimea and Pololu Black Sand Beach</span></a></li></ul><p data-dcnode-id="850"><span data-dcnode-id="851" instrument_node=""> </span></p></details><p data-dcnode-id="847"><span data-dcnode-id="848" instrument_node="">We hope that you enjoy your time on the Big Island and ask that you help preserve this unique ecological and cultural gem by respecting local customs and paying heed to the golden proverb: “take nothing but memories, leave nothing but footprints.”</span></p><h2 data-dcnode-id="845" id="day-1"><span data-dcnode-id="846" instrument_node="">Day 1: Kona and the Beach</span></h2><p data-dcnode-id="834"><span data-dcnode-id="844" instrument_node="">Start your trip by picking up your rental car from one of the </span><a data-dcnode-id="842" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/rent-a-car/"><span data-dcnode-id="843" instrument_node="">car rental</span></a><span data-dcnode-id="841" instrument_node=""> offices at the </span><a data-dcnode-id="839" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/kona-international-airport/"><span data-dcnode-id="840" instrument_node="">Kona Airport</span></a><span data-dcnode-id="838" instrument_node="">. </span><a data-dcnode-id="836" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/kailua-kona/"><span data-dcnode-id="837" instrument_node="">Kona</span></a><span data-dcnode-id="835" instrument_node=""> is the sunny outdoor capital of the Big Island and you will spend your first two days and nights here enjoying the beach.</span></p><p data-dcnode-id="811"><span data-dcnode-id="833" instrument_node="">Drive into town and drop off your bags at your place of accommodation (if you have not yet booked, have a look here for </span><a data-dcnode-id="831" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/kailua-kona/accommodation/"><span data-dcnode-id="832" instrument_node="">accommodations in Kona</span></a><span data-dcnode-id="830" instrument_node="">). If arriving between December and April, sign up directly for a </span><a data-dcnode-id="828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/big-island-whale-watching/"><span data-dcnode-id="829" instrument_node="">whale-watching cruise</span></a><span data-dcnode-id="827" instrument_node=""> or if you feel even more adventurous, we recommend to find out more about the </span><a data-dcnode-id="825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/big-island-manta-ray-night-dive/"><span data-dcnode-id="826" instrument_node="">Manta Ray night dive/snorkel</span></a><span data-dcnode-id="824" instrument_node="">. </span><b data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">These tours are very popular and we suggest that you book at least 48 hours in advance.</span></b><span data-dcnode-id="821" instrument_node=""> Afterward, drive north up Highway 11 to explore some of the beautiful west coast beaches such as </span><a data-dcnode-id="819" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/big-island-beaches/kua-bay/"><span data-dcnode-id="820" instrument_node="">Kua Bay</span></a><span data-dcnode-id="818" instrument_node="">, </span><a data-dcnode-id="816" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/big-island-beaches/waialea-beach/"><span data-dcnode-id="817" instrument_node="">Beach 69</span></a><span data-dcnode-id="815" instrument_node="">, or </span><a data-dcnode-id="813" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/big-island-beaches/hapuna-beach/"><span data-dcnode-id="814" instrument_node="">Hapuna</span></a><span data-dcnode-id="812" instrument_node="">. Or if you are short on time, stop by the pier fronting the King Kamehameha Hotel in the center of Kona for a quick dip or a bit of snorkeling.</span></p><div class="wp-caption aligncenter" data-dcnode-id="802" id="attachment_4456" style="width: 810px"><a data-dcnode-id="807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/wp-content/uploads/king-kam-beach.jpg" rel="attachment wp-att-4456"><noscript data-dcnode-id="809"><span data-dcnode-id="810" instrument_node="">&lt;img aria-describedby="caption-attachment-4456" class="wp-image-4456 size-large" src="https://www.lovebigisland.com/wp-content/uploads/king-kam-beach-800x390.jpg" alt="Kamakahonu (King Kam) Beach in Kona on the Big Island of Hawaii" width="800" height="390" srcset="https://www.lovebigisland.com/wp-content/uploads/king-kam-beach-800x390.jpg 800w, https://www.lovebigisland.com/wp-content/uploads/king-kam-beach-620x303.jpg 620w, https://www.lovebigisland.com/wp-content/uploads/king-kam-beach-768x375.jpg 768w, https://www.lovebigisland.com/wp-content/uploads/king-kam-beach-320x156.jpg 320w, https://www.lovebigisland.com/wp-content/uploads/king-kam-beach-400x195.jpg 400w, https://www.lovebigisland.com/wp-content/uploads/king-kam-beach-600x293.jpg 600w, https://www.lovebigisland.com/wp-content/uploads/king-kam-beach-694x339.jpg 694w, https://www.lovebigisland.com/wp-content/uploads/king-kam-beach.jpg 1000w" sizes="(max-width: 960px) 90vw, (max-width: 1200px) 620px, 800px" /&gt;</span></noscript><img alt="Kamakahonu (King Kam) Beach in Kona on the Big Island of Hawaii" aria-describedby="caption-attachment-4456" class="wp-image-4456 size-large lazyloaded" data-dcnode-id="808" data-sizes="(max-width: 960px) 90vw, (max-width: 1200px) 620px, 800px" data-src="https://www.lovebigisland.com/wp-content/uploads/king-kam-beach-800x390.jpg" data-srcset="https://www.lovebigisland.com/wp-content/uploads/king-kam-beach-800x390.jpg 800w, https://www.lovebigisland.com/wp-content/uploads/king-kam-beach-620x303.jpg 620w, https://www.lovebigisland.com/wp-content/uploads/king-kam-beach-768x375.jpg 768w, https://www.lovebigisland.com/wp-content/uploads/king-kam-beach-320x156.jpg 320w, https://www.lovebigisland.com/wp-content/uploads/king-kam-beach-400x195.jpg 400w, https://www.lovebigisland.com/wp-content/uploads/king-kam-beach-600x293.jpg 600w, https://www.lovebigisland.com/wp-content/uploads/king-kam-beach-694x339.jpg 694w, https://www.lovebigisland.com/wp-content/uploads/king-kam-beach.jpg 1000w" height="390" sizes="(max-width: 960px) 90vw, (max-width: 1200px) 620px, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/wp-content/uploads/king-kam-beach-800x390.jpg&amp;raw" srcset="https://www.lovebigisland.com/wp-content/uploads/king-kam-beach-800x390.jpg 800w, https://www.lovebigisland.com/wp-content/uploads/king-kam-beach-620x303.jpg 620w, https://www.lovebigisland.com/wp-content/uploads/king-kam-beach-768x375.jpg 768w, https://www.lovebigisland.com/wp-content/uploads/king-kam-beach-320x156.jpg 320w, https://www.lovebigisland.com/wp-content/uploads/king-kam-beach-400x195.jpg 400w, https://www.lovebigisland.com/wp-content/uploads/king-kam-beach-600x293.jpg 600w, https://www.lovebigisland.com/wp-content/uploads/king-kam-beach-694x339.jpg 694w, https://www.lovebigisland.com/wp-content/uploads/king-kam-beach.jpg 1000w" width="800"></a><p class="wp-caption-text" data-dcnode-id="803" id="caption-attachment-4456"><a data-dcnode-id="805" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/big-island-beaches/kamakahonu-king-kam-beach/"><span data-dcnode-id="806" instrument_node="">King Kam beach</span></a><span data-dcnode-id="804" instrument_node=""> in downtown Kona is a good place to take a quick dip in between activities. You can find decent snorkeling on the other side of the pier</span></p></div><p data-dcnode-id="797"><span data-dcnode-id="801" instrument_node="">Finish your day by watching the sunset and enjoying a mai tai at the </span><a data-dcnode-id="799" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//konainnrestaurant.com/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="800" instrument_node="">Kona Inn</span></a><span data-dcnode-id="798" instrument_node=""> or any of the beachfront restaurants on Aliʻi Drive. Tomorrow will be a busy day, so don’t go to bed too late and be prepared for and early start.</span></p><div class="suggestion-container" data-dcnode-id="779"><div class="suggestion-cta" data-dcnode-id="783"><div class="suggestion-cta-content" data-dcnode-id="784"><div class="suggestion-cta-content-description" data-dcnode-id="788"><p data-dcnode-id="796"></p><h4 data-dcnode-id="794"><span data-dcnode-id="795" instrument_node="">Make the most out of your Big Island itinerary with personal advice</span></h4><span data-dcnode-id="793" instrument_node="">Get our take on your plans and figure out if you should visit one island or several, what you should do, and many more important questions.</span><p data-dcnode-id="792"></p><p data-dcnode-id="790"><span data-dcnode-id="791" instrument_node="">In a 30-minute call we help you set up the trip of your dreams. The cost? Only $49!</span></p><p data-dcnode-id="789"></p></div><div class="suggestion-cta-content-button" data-dcnode-id="785"><a data-dcnode-id="786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/trip-planning/trip-consulting/" rel="noopener" target="_self"><span data-dcnode-id="787" instrument_node="">Find Out More</span></a></div></div></div><div class="suggestion-ribbon" data-dcnode-id="780"><div class="suggestion-ribbon-inner" data-dcnode-id="781"><span data-dcnode-id="782" instrument_node="">tip</span></div></div></div><h2 data-dcnode-id="777" id="day-2"><span data-dcnode-id="778" instrument_node="">Day 2: Ocean Views and Adventures</span></h2><p data-dcnode-id="764"><span data-dcnode-id="776" instrument_node="">Get up early the following day. This should be easy since you still will be on mainland time. Have a relaxed </span><a data-dcnode-id="774" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/kailua-kona/restaurants-and-cafes/"><span data-dcnode-id="775" instrument_node="">breakfast</span></a><span data-dcnode-id="773" instrument_node=""> in town with a view of the ocean or drive south toward Captain Cook and stop in at the Coffee Shack, a hot spot for locals and visitors alike. Don’t forget to order yourself some fresh Kona coffee. After breakfast continue south to the </span><a data-dcnode-id="771" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/state-national-parks/"><span data-dcnode-id="772" instrument_node="">Puʻuhonua o Honaunau</span></a><span data-dcnode-id="770" instrument_node=""> National Historical Park (also known as the City of Refuge or Honaunau Bay) to learn about the ancient practices and rituals of the native Hawaiians and finish up with some snorkeling at one of the </span><a data-dcnode-id="768" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/great-snorkeling-spots-hawaii/"><span data-dcnode-id="769" instrument_node="">best snorkeling spots on the island</span></a><span data-dcnode-id="767" instrument_node="">, Two Step (300 ft. from the park entrance). This is a favorite snorkeling spot for many locals and </span><b data-dcnode-id="765"><span data-dcnode-id="766" instrument_node="">a culturally significant place for the Hawaiian people so remember to be respectful of both the animals and the surroundings. </span></b></p><p data-dcnode-id="759"><span data-dcnode-id="763" instrument_node="">Make sure to combine your activities of the day with the tours you possibly booked. Or if you don’t feel like snorkeling, you can choose one of the many </span><a data-dcnode-id="761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/kailua-kona/activities/"><span data-dcnode-id="762" instrument_node="">outdoor activities near Kona</span></a><span data-dcnode-id="760" instrument_node="">.</span></p><div class="wp-caption aligncenter" data-dcnode-id="750" id="attachment_3531" style="width: 810px"><a data-dcnode-id="755" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/wp-content/uploads/puuhonua-o-honaunau.jpg" rel="attachment wp-att-3531"><noscript data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">&lt;img aria-describedby="caption-attachment-3531" class="wp-image-3531 size-large" src="https://www.lovebigisland.com/wp-content/uploads/puuhonua-o-honaunau-800x440.jpg" alt="Pu'uhonua o Honaunau National Park on the Big Island of Hawaii" width="800" height="440" srcset="https://www.lovebigisland.com/wp-content/uploads/puuhonua-o-honaunau-800x440.jpg 800w, https://www.lovebigisland.com/wp-content/uploads/puuhonua-o-honaunau-620x341.jpg 620w, https://www.lovebigisland.com/wp-content/uploads/puuhonua-o-honaunau-768x422.jpg 768w, https://www.lovebigisland.com/wp-content/uploads/puuhonua-o-honaunau-320x176.jpg 320w, https://www.lovebigisland.com/wp-content/uploads/puuhonua-o-honaunau-400x220.jpg 400w, https://www.lovebigisland.com/wp-content/uploads/puuhonua-o-honaunau.jpg 1200w" sizes="(max-width: 960px) 90vw, (max-width: 1200px) 620px, 800px" /&gt;</span></noscript><img alt="Pu'uhonua o Honaunau National Park on the Big Island of Hawaii" aria-describedby="caption-attachment-3531" class="wp-image-3531 size-large lazyloaded" data-dcnode-id="756" data-sizes="(max-width: 960px) 90vw, (max-width: 1200px) 620px, 800px" data-src="https://www.lovebigisland.com/wp-content/uploads/puuhonua-o-honaunau-800x440.jpg" data-srcset="https://www.lovebigisland.com/wp-content/uploads/puuhonua-o-honaunau-800x440.jpg 800w, https://www.lovebigisland.com/wp-content/uploads/puuhonua-o-honaunau-620x341.jpg 620w, https://www.lovebigisland.com/wp-content/uploads/puuhonua-o-honaunau-768x422.jpg 768w, https://www.lovebigisland.com/wp-content/uploads/puuhonua-o-honaunau-320x176.jpg 320w, https://www.lovebigisland.com/wp-content/uploads/puuhonua-o-honaunau-400x220.jpg 400w, https://www.lovebigisland.com/wp-content/uploads/puuhonua-o-honaunau.jpg 1200w" height="440" sizes="(max-width: 960px) 90vw, (max-width: 1200px) 620px, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/wp-content/uploads/puuhonua-o-honaunau-800x440.jpg&amp;raw" srcset="https://www.lovebigisland.com/wp-content/uploads/puuhonua-o-honaunau-800x440.jpg 800w, https://www.lovebigisland.com/wp-content/uploads/puuhonua-o-honaunau-620x341.jpg 620w, https://www.lovebigisland.com/wp-content/uploads/puuhonua-o-honaunau-768x422.jpg 768w, https://www.lovebigisland.com/wp-content/uploads/puuhonua-o-honaunau-320x176.jpg 320w, https://www.lovebigisland.com/wp-content/uploads/puuhonua-o-honaunau-400x220.jpg 400w, https://www.lovebigisland.com/wp-content/uploads/puuhonua-o-honaunau.jpg 1200w" width="800"></a><p class="wp-caption-text" data-dcnode-id="751" id="caption-attachment-3531"><a data-dcnode-id="753" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/state-national-parks/"><span data-dcnode-id="754" instrument_node="">Pu’uhonua o Honaunau National Park</span></a><span data-dcnode-id="752" instrument_node=""> on the Big Island of Hawaii is a good place to take in Hawaiian History. Next door (300 feet from the park entrance) is one of the best places of the island to go snorkeling</span></p></div><h2 data-dcnode-id="748" id="day-3"><span data-dcnode-id="749" instrument_node="">Day 3: Volcano Village and the Hawaii Volcanoes National Park</span></h2><p data-dcnode-id="728"><span data-dcnode-id="747" instrument_node="">Day 3 is another early day so try packing your bags before you go out for breakfast and start your 2+ hour drive to </span><a data-dcnode-id="745" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/volcano-village/"><span data-dcnode-id="746" instrument_node="">Volcano Village</span></a><span data-dcnode-id="744" instrument_node=""> directly after. Make sure to stop along the way to make the drive more enjoyable, for example at </span><a data-dcnode-id="742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/kau/%23ka-lae"><span data-dcnode-id="743" instrument_node="">South Point</span></a><span data-dcnode-id="741" instrument_node=""> (the southernmost point of Hawaiʻi and the 50 United States) or </span><a data-dcnode-id="739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/big-island-beaches/punaluu/"><span data-dcnode-id="740" instrument_node="">Punaluʻu black sand beach</span></a><span data-dcnode-id="738" instrument_node="">, which is famous for its status as a turtle nesting area. Once you reach Volcano Village drop your bags in a cozy vacation rental close to the </span><a data-dcnode-id="736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/hawaii-volcanoes-national-park/"><span data-dcnode-id="737" instrument_node="">Hawaii Volcanoes National Park</span></a><span data-dcnode-id="735" instrument_node=""> (we recommend </span><a data-dcnode-id="733" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hawaiivolcanovacations.com/vacation-rentals" rel="noopener" target="_blank"><span data-dcnode-id="734" instrument_node="">Hawaii Volcano Vacations</span></a><span data-dcnode-id="732" instrument_node="">, or have a look at the </span><a data-dcnode-id="730" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/volcano-village/vacation-rentals/"><span data-dcnode-id="731" instrument_node="">vacation rentals in Volcano Village</span></a><span data-dcnode-id="729" instrument_node="">), then head into the park for a few hours of hiking and sightseeing.</span></p><p data-dcnode-id="720"><span data-dcnode-id="727" instrument_node="">Start your visit at the visitors’ center and plan your day in the park from there. Watch the 30-minute educational video in the auditorium and talk to the park rangers about the current situation in the park, ranger-led (free) hikes, and tailor-made advice. Also, ask the rangers about the current viewing conditions for any possible active lava flows that are entering the ocean. </span><b data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">Some “must see stops” in the park are the Thurston Lava Tube, Kilauea Iki Overlook, and the Chain of Craters Road.</span></b><span data-dcnode-id="724" instrument_node=""> If you feel up for it, we recommend you hike the </span><a data-dcnode-id="722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/best-short-hikes-on-hawaii/%23Kilauea-iki"><span data-dcnode-id="723" instrument_node="">Kilauea Iki trail</span></a><span data-dcnode-id="721" instrument_node="">, which descends from the beautiful Volcano rainforest into the caldera where you can see firsthand the effects of millions of years of volcanic activity.</span></p><p data-dcnode-id="716"><span data-dcnode-id="719" instrument_node="">Afterward, head back to Volcano Village to have dinner in one of the local restaurants and then relax in front of the fireplace or in the hot-tub at your vacation rental of choice. </span><b data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">End your first day by returning to one of the many overlook spots around the caldera after dark to see the incredible glow of the Kilauea Volcano under the stars.</span></b></p><div class="wp-caption aligncenter" data-dcnode-id="706" id="attachment_4460" style="width: 810px"><a data-dcnode-id="712" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/wp-content/uploads/glow-halemaumau-hvnp.jpg" rel="attachment wp-att-4460"><noscript data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">&lt;img aria-describedby="caption-attachment-4460" class="wp-image-4460 size-large" src="https://www.lovebigisland.com/wp-content/uploads/glow-halemaumau-hvnp-800x378.jpg" alt="Glow above the halema'uma'u crater in the Hawaii Volcanoes National Park" width="800" height="378" srcset="https://www.lovebigisland.com/wp-content/uploads/glow-halemaumau-hvnp-800x378.jpg 800w, https://www.lovebigisland.com/wp-content/uploads/glow-halemaumau-hvnp-620x293.jpg 620w, https://www.lovebigisland.com/wp-content/uploads/glow-halemaumau-hvnp-768x362.jpg 768w, https://www.lovebigisland.com/wp-content/uploads/glow-halemaumau-hvnp-320x151.jpg 320w, https://www.lovebigisland.com/wp-content/uploads/glow-halemaumau-hvnp-400x189.jpg 400w, https://www.lovebigisland.com/wp-content/uploads/glow-halemaumau-hvnp-600x283.jpg 600w, https://www.lovebigisland.com/wp-content/uploads/glow-halemaumau-hvnp-694x328.jpg 694w, https://www.lovebigisland.com/wp-content/uploads/glow-halemaumau-hvnp.jpg 1000w" sizes="(max-width: 960px) 90vw, (max-width: 1200px) 620px, 800px" /&gt;</span></noscript><img alt="Glow above the halema'uma'u crater in the Hawaii Volcanoes National Park" aria-describedby="caption-attachment-4460" class="wp-image-4460 size-large lazyloaded" data-dcnode-id="713" data-sizes="(max-width: 960px) 90vw, (max-width: 1200px) 620px, 800px" data-src="https://www.lovebigisland.com/wp-content/uploads/glow-halemaumau-hvnp-800x378.jpg" data-srcset="https://www.lovebigisland.com/wp-content/uploads/glow-halemaumau-hvnp-800x378.jpg 800w, https://www.lovebigisland.com/wp-content/uploads/glow-halemaumau-hvnp-620x293.jpg 620w, https://www.lovebigisland.com/wp-content/uploads/glow-halemaumau-hvnp-768x362.jpg 768w, https://www.lovebigisland.com/wp-content/uploads/glow-halemaumau-hvnp-320x151.jpg 320w, https://www.lovebigisland.com/wp-content/uploads/glow-halemaumau-hvnp-400x189.jpg 400w, https://www.lovebigisland.com/wp-content/uploads/glow-halemaumau-hvnp-600x283.jpg 600w, https://www.lovebigisland.com/wp-content/uploads/glow-halemaumau-hvnp-694x328.jpg 694w, https://www.lovebigisland.com/wp-content/uploads/glow-halemaumau-hvnp.jpg 1000w" height="378" sizes="(max-width: 960px) 90vw, (max-width: 1200px) 620px, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/wp-content/uploads/glow-halemaumau-hvnp-800x378.jpg&amp;raw" srcset="https://www.lovebigisland.com/wp-content/uploads/glow-halemaumau-hvnp-800x378.jpg 800w, https://www.lovebigisland.com/wp-content/uploads/glow-halemaumau-hvnp-620x293.jpg 620w, https://www.lovebigisland.com/wp-content/uploads/glow-halemaumau-hvnp-768x362.jpg 768w, https://www.lovebigisland.com/wp-content/uploads/glow-halemaumau-hvnp-320x151.jpg 320w, https://www.lovebigisland.com/wp-content/uploads/glow-halemaumau-hvnp-400x189.jpg 400w, https://www.lovebigisland.com/wp-content/uploads/glow-halemaumau-hvnp-600x283.jpg 600w, https://www.lovebigisland.com/wp-content/uploads/glow-halemaumau-hvnp-694x328.jpg 694w, https://www.lovebigisland.com/wp-content/uploads/glow-halemaumau-hvnp.jpg 1000w" width="800"></a><p class="wp-caption-text" data-dcnode-id="707" id="caption-attachment-4460"><span data-dcnode-id="711" instrument_node="">Visit one of the many overlook areas in the </span><a data-dcnode-id="709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/hawaii-volcanoes-national-park/"><span data-dcnode-id="710" instrument_node="">Hawaii Volcanoes National Park</span></a><span data-dcnode-id="708" instrument_node=""> at night to see the glow above the Halemaʻumaʻu caldera</span></p></div><h2 data-dcnode-id="704" id="day-4"><span data-dcnode-id="705" instrument_node="">Day 4: Jungle and lava fields</span></h2><p data-dcnode-id="693"><span data-dcnode-id="703" instrument_node="">Today you can choose to </span><strong data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">either</span></strong><span data-dcnode-id="700" instrument_node=""> return to the Hawaii Volcanoes National park and get in a solid day of hiking on the 100+ miles of trails inside the park </span><strong data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">or</span></strong><span data-dcnode-id="697" instrument_node=""> to drive down to lower </span><a data-dcnode-id="695" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/puna/"><span data-dcnode-id="696" instrument_node="">Puna</span></a><span data-dcnode-id="694" instrument_node="">, a serene and simply breathtaking area that is home to Kalapana, once one of the most beautiful beaches in the world before it was overtaken by lava in the 1990s. Currently, a new black sand beach is forming at Kaimu, allowing a glance into the constant processes of creation and destruction which reign supreme on the island. If you choose to head to Puna, we recommend you make an entire day of it to enjoy the many gems the district has to offer.</span></p><p data-dcnode-id="688"><span data-dcnode-id="692" instrument_node="">From Kaimu, head east down the famous Red Road, stopping for photo ops at MacKenzie State Park and Isaac Hale (</span><a data-dcnode-id="690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/big-island-beaches/pohoiki-black-sand-beach/"><span data-dcnode-id="691" instrument_node="">Pohoiki</span></a><span data-dcnode-id="689" instrument_node=""> to the locals). Afterwards, enjoy a well-deserved dinner in the quaint, colorful old town of Pahoa. We recommend any of the many restaurants along the main road, where you can enjoy pizza, Thai, Hawaiian-fusion cuisine and much more.</span></p><p data-dcnode-id="686"><span data-dcnode-id="687" instrument_node="">Finish your day by driving back up to Volcano Village to enjoy your last night in the peace and quiet of the rainforest. If you’re not ready for bed just yet, head to the Volcano House just inside the national park for a stunning view of the glow at Halemaumau and a night cap.</span></p><div class="wp-caption aligncenter" data-dcnode-id="676" id="attachment_4461" style="width: 810px"><a data-dcnode-id="682" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/wp-content/uploads/holei-sea-arch.jpg"><noscript data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">&lt;img aria-describedby="caption-attachment-4461" class="size-large wp-image-4461" src="https://www.lovebigisland.com/wp-content/uploads/holei-sea-arch-800x407.jpg" alt="Holei sea arch in the Hawaii Volcanoes National Park" width="800" height="407" srcset="https://www.lovebigisland.com/wp-content/uploads/holei-sea-arch-800x407.jpg 800w, https://www.lovebigisland.com/wp-content/uploads/holei-sea-arch-620x316.jpg 620w, https://www.lovebigisland.com/wp-content/uploads/holei-sea-arch-768x391.jpg 768w, https://www.lovebigisland.com/wp-content/uploads/holei-sea-arch-320x163.jpg 320w, https://www.lovebigisland.com/wp-content/uploads/holei-sea-arch-400x204.jpg 400w, https://www.lovebigisland.com/wp-content/uploads/holei-sea-arch-600x305.jpg 600w, https://www.lovebigisland.com/wp-content/uploads/holei-sea-arch.jpg 1000w" sizes="(max-width: 960px) 90vw, (max-width: 1200px) 620px, 800px" /&gt;</span></noscript><img alt="Holei sea arch in the Hawaii Volcanoes National Park" aria-describedby="caption-attachment-4461" class="size-large wp-image-4461 lazyloaded" data-dcnode-id="683" data-sizes="(max-width: 960px) 90vw, (max-width: 1200px) 620px, 800px" data-src="https://www.lovebigisland.com/wp-content/uploads/holei-sea-arch-800x407.jpg" data-srcset="https://www.lovebigisland.com/wp-content/uploads/holei-sea-arch-800x407.jpg 800w, https://www.lovebigisland.com/wp-content/uploads/holei-sea-arch-620x316.jpg 620w, https://www.lovebigisland.com/wp-content/uploads/holei-sea-arch-768x391.jpg 768w, https://www.lovebigisland.com/wp-content/uploads/holei-sea-arch-320x163.jpg 320w, https://www.lovebigisland.com/wp-content/uploads/holei-sea-arch-400x204.jpg 400w, https://www.lovebigisland.com/wp-content/uploads/holei-sea-arch-600x305.jpg 600w, https://www.lovebigisland.com/wp-content/uploads/holei-sea-arch.jpg 1000w" height="407" sizes="(max-width: 960px) 90vw, (max-width: 1200px) 620px, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/wp-content/uploads/holei-sea-arch-800x407.jpg&amp;raw" srcset="https://www.lovebigisland.com/wp-content/uploads/holei-sea-arch-800x407.jpg 800w, https://www.lovebigisland.com/wp-content/uploads/holei-sea-arch-620x316.jpg 620w, https://www.lovebigisland.com/wp-content/uploads/holei-sea-arch-768x391.jpg 768w, https://www.lovebigisland.com/wp-content/uploads/holei-sea-arch-320x163.jpg 320w, https://www.lovebigisland.com/wp-content/uploads/holei-sea-arch-400x204.jpg 400w, https://www.lovebigisland.com/wp-content/uploads/holei-sea-arch-600x305.jpg 600w, https://www.lovebigisland.com/wp-content/uploads/holei-sea-arch.jpg 1000w" width="800"></a><p class="wp-caption-text" data-dcnode-id="677" id="caption-attachment-4461"><span data-dcnode-id="681" instrument_node="">Drive down the chain of craters road in the </span><a data-dcnode-id="679" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/hawaii-volcanoes-national-park/"><span data-dcnode-id="680" instrument_node="">Hawaii Volcanoes National Park</span></a><span data-dcnode-id="678" instrument_node=""> to see the Holei sea arch raise out of the 80 to 90 feet high cliffs.</span></p></div><h2 data-dcnode-id="674" id="day-5"><span data-dcnode-id="675" instrument_node="">Day 5: Hilo and the Wailuku River</span></h2><p data-dcnode-id="648"><span data-dcnode-id="673" instrument_node="">The following morning drive south one hour to the beautiful coastal town of </span><a data-dcnode-id="671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/hilo/"><span data-dcnode-id="672" instrument_node="">Hilo</span></a><span data-dcnode-id="670" instrument_node=""> and start your day with breakfast at </span><a data-dcnode-id="668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.kenshouseofpancakes.com/" rel="noopener" target="_blank"><span data-dcnode-id="669" instrument_node="">Ken’s Pancake House</span></a><span data-dcnode-id="667" instrument_node="">, an old American-style diner complete with window booths and smiling local waitresses that respond best when being called “auntie,” as per local customs of respect. Afterward, head downtown to take a stroll through the many shops, galleries and boutiques and/or visit the </span><a data-dcnode-id="665" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/museums-on-the-big-island/"><span data-dcnode-id="666" instrument_node="">Tsunami Museum</span></a><span data-dcnode-id="664" instrument_node="">. If it’s market day (Wednesday or Saturday) stop at the </span><a data-dcnode-id="662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/hilo/farmers-market/"><span data-dcnode-id="663" instrument_node="">Farmers Market</span></a><span data-dcnode-id="661" instrument_node=""> to see how shopping is done local style. Pick up some souvenirs or some fresh fruit and bentos for lunch later in the day. Got a sweet tooth? You can also head over to </span><a data-dcnode-id="659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/pages/Two-Ladies-Kitchen/121212331222453" rel="nofollow noopener" target="_blank"><span data-dcnode-id="660" instrument_node="">Two Ladies kitchen</span></a><span data-dcnode-id="658" instrument_node=""> (274 Kilauea Ave) for some fresh mochi, a Japanese delicacy in the islands which will leave you craving more (make sure to take cash!) After you’ve had your fill of exploring downtown, head out for a stroll through Lilioukalani Park and over the bridge to Coconut Island. Or, stop for a brisk swim at one the beaches in the majestic Keaukaha area. We recommend Carlsmith Beach Park (</span><a data-dcnode-id="656" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/big-island-beaches/carlsmith-four-miles/"><span data-dcnode-id="657" instrument_node="">Four Mile</span></a><span data-dcnode-id="655" instrument_node=""> to the locals) or </span><a data-dcnode-id="653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/big-island-beaches/richardsons/"><span data-dcnode-id="654" instrument_node="">Richardson’s</span></a><span data-dcnode-id="652" instrument_node="">, both for the views of Hilo Bay and easy access (all </span><a data-dcnode-id="650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/hilo/beaches/"><span data-dcnode-id="651" instrument_node="">beaches in Hilo</span></a><span data-dcnode-id="649" instrument_node="">).</span></p><p data-dcnode-id="643"><span data-dcnode-id="647" instrument_node="">Afterward, head up to </span><a data-dcnode-id="645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/hilo/rainbow-falls/"><span data-dcnode-id="646" instrument_node="">Rainbow Falls</span></a><span data-dcnode-id="644" instrument_node=""> for a couple of photos and then continue up Kaumana Drive past Hilo Hospital to the Boiling Pots.</span></p><p data-dcnode-id="638"><span data-dcnode-id="642" instrument_node="">Now it is time to drive up Saddle Road to go stargazing at one of the best locations of the world: Mauna Kea. You can reach the visitor center where there are free stargazing programs offered just after sunset with any rental car but you’ll need a 4WD if you want to visit the summit. There are also professional tours organized from Hilo that will take you up the mountain. More information and safety tips on </span><a data-dcnode-id="640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/stargazing/"><span data-dcnode-id="641" instrument_node="">stargazing on Mauna Kea</span></a><span data-dcnode-id="639" instrument_node="">. Afterward head back to your accommodations in Hilo and get some much-needed rest.</span></p><div class="wp-caption aligncenter" data-dcnode-id="631" id="attachment_4462" style="width: 810px"><a data-dcnode-id="634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/wp-content/uploads/kapoho-kalapana-road1.jpg" rel="attachment wp-att-4462"><noscript data-dcnode-id="636"><span data-dcnode-id="637" instrument_node="">&lt;img aria-describedby="caption-attachment-4462" class="wp-image-4462 size-large" src="https://www.lovebigisland.com/wp-content/uploads/kapoho-kalapana-road1-800x399.jpg" alt="Kapoho Kalapana road in the Puna district" width="800" height="399" srcset="https://www.lovebigisland.com/wp-content/uploads/kapoho-kalapana-road1-800x399.jpg 800w, https://www.lovebigisland.com/wp-content/uploads/kapoho-kalapana-road1-620x309.jpg 620w, https://www.lovebigisland.com/wp-content/uploads/kapoho-kalapana-road1-768x383.jpg 768w, https://www.lovebigisland.com/wp-content/uploads/kapoho-kalapana-road1-320x160.jpg 320w, https://www.lovebigisland.com/wp-content/uploads/kapoho-kalapana-road1-400x200.jpg 400w, https://www.lovebigisland.com/wp-content/uploads/kapoho-kalapana-road1.jpg 1200w" sizes="(max-width: 960px) 90vw, (max-width: 1200px) 620px, 800px" /&gt;</span></noscript><img alt="Kapoho Kalapana road in the Puna district" aria-describedby="caption-attachment-4462" class="lazyload wp-image-4462 size-large" data-dcnode-id="635" data-sizes="(max-width: 960px) 90vw, (max-width: 1200px) 620px, 800px" data-src="https://www.lovebigisland.com/wp-content/uploads/kapoho-kalapana-road1-800x399.jpg" data-srcset="https://www.lovebigisland.com/wp-content/uploads/kapoho-kalapana-road1-800x399.jpg 800w, https://www.lovebigisland.com/wp-content/uploads/kapoho-kalapana-road1-620x309.jpg 620w, https://www.lovebigisland.com/wp-content/uploads/kapoho-kalapana-road1-768x383.jpg 768w, https://www.lovebigisland.com/wp-content/uploads/kapoho-kalapana-road1-320x160.jpg 320w, https://www.lovebigisland.com/wp-content/uploads/kapoho-kalapana-road1-400x200.jpg 400w, https://www.lovebigisland.com/wp-content/uploads/kapoho-kalapana-road1.jpg 1200w" height="399" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20800%20399%22%3E%3C/svg%3E" width="800"></a><p class="wp-caption-text" data-dcnode-id="632" id="caption-attachment-4462"><span data-dcnode-id="633" instrument_node="">The Kapoho-Kalapana (Red) Road in Puna is one of the most scenic roads of the Big Island.</span></p></div><h2 data-dcnode-id="629" id="day-6"><span data-dcnode-id="630" instrument_node="">Day 6: The Hamakua Coast</span></h2><p data-dcnode-id="624"><span data-dcnode-id="628" instrument_node="">Start your day with packing your bags and then enjoying a lazy breakfast in downtown Hilo while watching the sun rise over the bay. Afterward, head out to Highway 19 onto the </span><a data-dcnode-id="626" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/hamakua-coast/"><span data-dcnode-id="627" instrument_node="">Hamakua Coast</span></a><span data-dcnode-id="625" instrument_node=""> and get ready for some breathtaking scenery!</span></p><p data-dcnode-id="618"><b data-dcnode-id="619"><span data-dcnode-id="623" instrument_node="">Start by turning on to the four-mile Scenic Route just a few minutes outside of Hilo and enjoy the winding, magical drive along the coast. You can also stop at the Hawaii Tropical Botanical Gardens for a short hike through lush fern forests. Once back on Highway 19, make sure you stop at the multi-tiered UmaUma Falls or the </span><a data-dcnode-id="621" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/hilo/akaka-falls/"><span data-dcnode-id="622" instrument_node="">ʻAkaka Falls State Park</span></a><span data-dcnode-id="620" instrument_node=""> to see two of the most famous waterfalls in Hawaii.</span></b></p><p data-dcnode-id="610"><span data-dcnode-id="617" instrument_node="">Continue north to the historic town of Honokaʻa. This former cane sugar stronghold has an interesting collection of shops and galleries. It also is a great place to grab some lunch or a fresh, hot </span><a data-dcnode-id="615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/local-specialities/"><span data-dcnode-id="616" instrument_node="">malasada</span></a><span data-dcnode-id="614" instrument_node=""> at Tex Drive In. From here, it’s just a short drive to the </span><a data-dcnode-id="612" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/waipio-valley/"><span data-dcnode-id="613" instrument_node="">Waipiʻo Valley</span></a><span data-dcnode-id="611" instrument_node=""> overlook at the end of Highway 240, which will allow you a stunning view of the “Valley of Kings”, one of the most culturally significant spots for the native Hawaiians and a hot spot for the traditional cultivation of the locally prized “kalo” or taro crop.</span></p><p data-dcnode-id="605"><span data-dcnode-id="609" instrument_node="">If you have enough time, you can tour the valley on foot, but be prepared for a long, challenging and hot hike. Take plenty of drinking water, good hiking shoes and a hat or a cap against the sun. Afterward, continue to </span><a data-dcnode-id="607" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/waimea-kamuela-hawaii/"><span data-dcnode-id="608" instrument_node="">Waimea</span></a><span data-dcnode-id="606" instrument_node=""> for a luxurious dinner at one of the locally renowned culinary gems (we recommend Merriman’s or Edelweiss) or continue a half hour to the Kawaihae harbor for sunset and dinner there before returning to Waimea for the night.</span></p><div class="wp-caption aligncenter" data-dcnode-id="595" id="attachment_4452" style="width: 810px"><a data-dcnode-id="601" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/wp-content/uploads/rainbow-falls.jpg" rel="attachment wp-att-4452"><noscript data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">&lt;img aria-describedby="caption-attachment-4452" class="wp-image-4452 size-large" src="https://www.lovebigisland.com/wp-content/uploads/rainbow-falls-800x472.jpg" alt="Rainbow falls in Hilo" width="800" height="472" srcset="https://www.lovebigisland.com/wp-content/uploads/rainbow-falls-800x472.jpg 800w, https://www.lovebigisland.com/wp-content/uploads/rainbow-falls-620x366.jpg 620w, https://www.lovebigisland.com/wp-content/uploads/rainbow-falls-768x453.jpg 768w, https://www.lovebigisland.com/wp-content/uploads/rainbow-falls-320x189.jpg 320w, https://www.lovebigisland.com/wp-content/uploads/rainbow-falls-400x236.jpg 400w, https://www.lovebigisland.com/wp-content/uploads/rainbow-falls-600x354.jpg 600w, https://www.lovebigisland.com/wp-content/uploads/rainbow-falls-651x384.jpg 651w, https://www.lovebigisland.com/wp-content/uploads/rainbow-falls-976x576.jpg 976w, https://www.lovebigisland.com/wp-content/uploads/rainbow-falls.jpg 1000w" sizes="(max-width: 960px) 90vw, (max-width: 1200px) 620px, 800px" /&gt;</span></noscript><img alt="Rainbow falls in Hilo" aria-describedby="caption-attachment-4452" class="lazyload wp-image-4452 size-large" data-dcnode-id="602" data-sizes="(max-width: 960px) 90vw, (max-width: 1200px) 620px, 800px" data-src="https://www.lovebigisland.com/wp-content/uploads/rainbow-falls-800x472.jpg" data-srcset="https://www.lovebigisland.com/wp-content/uploads/rainbow-falls-800x472.jpg 800w, https://www.lovebigisland.com/wp-content/uploads/rainbow-falls-620x366.jpg 620w, https://www.lovebigisland.com/wp-content/uploads/rainbow-falls-768x453.jpg 768w, https://www.lovebigisland.com/wp-content/uploads/rainbow-falls-320x189.jpg 320w, https://www.lovebigisland.com/wp-content/uploads/rainbow-falls-400x236.jpg 400w, https://www.lovebigisland.com/wp-content/uploads/rainbow-falls-600x354.jpg 600w, https://www.lovebigisland.com/wp-content/uploads/rainbow-falls-651x384.jpg 651w, https://www.lovebigisland.com/wp-content/uploads/rainbow-falls-976x576.jpg 976w, https://www.lovebigisland.com/wp-content/uploads/rainbow-falls.jpg 1000w" height="472" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20800%20472%22%3E%3C/svg%3E" width="800"></a><p class="wp-caption-text" data-dcnode-id="596" id="caption-attachment-4452"><span data-dcnode-id="600" instrument_node="">The </span><a data-dcnode-id="598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/hilo/rainbow-falls/"><span data-dcnode-id="599" instrument_node="">Rainbow falls</span></a><span data-dcnode-id="597" instrument_node=""> in Hilo are hidden on the edge of town. If you come early, you can see how they got their name, as the rising sun creates rainbows in the falling water.</span></p></div><h2 data-dcnode-id="593" id="day-7"><span data-dcnode-id="594" instrument_node="">Day 7: Waimea and Pololu Black Sand Beach</span></h2><div class="wp-caption aligncenter" data-dcnode-id="581" id="attachment_4454" style="width: 810px"><a data-dcnode-id="589" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/wp-content/uploads/kua-bay.jpg" rel="attachment wp-att-4454"><noscript data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">&lt;img aria-describedby="caption-attachment-4454" class="wp-image-4454 size-large" src="https://www.lovebigisland.com/wp-content/uploads/kua-bay-800x382.jpg" alt="Kua bay on the Big Island" width="800" height="382" srcset="https://www.lovebigisland.com/wp-content/uploads/kua-bay-800x382.jpg 800w, https://www.lovebigisland.com/wp-content/uploads/kua-bay-620x296.jpg 620w, https://www.lovebigisland.com/wp-content/uploads/kua-bay-768x366.jpg 768w, https://www.lovebigisland.com/wp-content/uploads/kua-bay-320x153.jpg 320w, https://www.lovebigisland.com/wp-content/uploads/kua-bay-400x191.jpg 400w, https://www.lovebigisland.com/wp-content/uploads/kua-bay-600x286.jpg 600w, https://www.lovebigisland.com/wp-content/uploads/kua-bay.jpg 1000w" sizes="(max-width: 960px) 90vw, (max-width: 1200px) 620px, 800px" /&gt;</span></noscript><img alt="Kua bay on the Big Island" aria-describedby="caption-attachment-4454" class="lazyload wp-image-4454 size-large" data-dcnode-id="590" data-sizes="(max-width: 960px) 90vw, (max-width: 1200px) 620px, 800px" data-src="https://www.lovebigisland.com/wp-content/uploads/kua-bay-800x382.jpg" data-srcset="https://www.lovebigisland.com/wp-content/uploads/kua-bay-800x382.jpg 800w, https://www.lovebigisland.com/wp-content/uploads/kua-bay-620x296.jpg 620w, https://www.lovebigisland.com/wp-content/uploads/kua-bay-768x366.jpg 768w, https://www.lovebigisland.com/wp-content/uploads/kua-bay-320x153.jpg 320w, https://www.lovebigisland.com/wp-content/uploads/kua-bay-400x191.jpg 400w, https://www.lovebigisland.com/wp-content/uploads/kua-bay-600x286.jpg 600w, https://www.lovebigisland.com/wp-content/uploads/kua-bay.jpg 1000w" height="382" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20800%20382%22%3E%3C/svg%3E" width="800"></a><p class="wp-caption-text" data-dcnode-id="582" id="caption-attachment-4454"><a data-dcnode-id="587" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/big-island-beaches/kua-bay/"><span data-dcnode-id="588" instrument_node="">Kua bay</span></a><span data-dcnode-id="586" instrument_node=""> is close to the airport and a great place to watch your last </span><a data-dcnode-id="584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/hawaii-blog/best-places-for-sunset/"><span data-dcnode-id="585" instrument_node="">Hawaiian sunset</span></a><span data-dcnode-id="583" instrument_node=""> if you have a late flight</span></p></div><p data-dcnode-id="577"><a data-dcnode-id="579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/waimea-kamuela-hawaii/"><span data-dcnode-id="580" instrument_node="">Waimea</span></a><span data-dcnode-id="578" instrument_node=""> is an old ranchers town and offers easy access to great hikes and beautiful beaches. This is a good place to spend a leisurely last day on the island before slowly making your way back down the coast toward the Kona airport.</span></p><p data-dcnode-id="569"><span data-dcnode-id="576" instrument_node="">Take Highway 250 up to the historical colonial town of Hawi. From here it is a short trip to the beautiful valley and </span><a data-dcnode-id="574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/pololu-valley/%23beach"><span data-dcnode-id="575" instrument_node="">black sand beach of Pololu</span></a><span data-dcnode-id="573" instrument_node="">. Pololu is a GREAT place to see the sunrise if you are an early rises, and we remind you once again to take lots of drinking water and sunscreen for the short but steep hike in and out of the valley. Return to Waimea and get yourself ready for the airport before driving south along the coastal Highway 270 to the Waikoloa resort or the King’s Shops. Here you can stop for some </span><a data-dcnode-id="571" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/local-specialities/"><span data-dcnode-id="572" instrument_node="">local grinds</span></a><span data-dcnode-id="570" instrument_node=""> to recharge or pick up any last-minute souvenirs on your way back toward Kona.</span></p></div></article></main><aside aria-label="Primary Sidebar" class="sidebar sidebar-primary widget-area" data-dcnode-id="384" id="genesis-sidebar-primary" role="complementary"><h2 class="genesis-sidebar-title screen-reader-text" data-dcnode-id="564"><span data-dcnode-id="565" instrument_node="">Primary Sidebar</span></h2><section class="widget widget-meta" data-dcnode-id="549"><div class="widget-wrap" data-dcnode-id="550"><div class="entry-author entry-meta" data-dcnode-id="557"><p class="entry-meta__label" data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">Copy by:</span></p><p class="entry-meta__value" data-dcnode-id="558"><span class="entry-author" data-dcnode-id="559"><span class="entry-author-name" data-dcnode-id="560"><span data-dcnode-id="561" instrument_node="">Love Big Island</span></span></span></p></div><div class="entry-modified entry-meta" data-dcnode-id="551"><p class="entry-meta__label" data-dcnode-id="555"><span data-dcnode-id="556" instrument_node="">Last updated:</
