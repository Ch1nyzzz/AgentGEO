</span><p data-dcnode-id="2009"><em data-dcnode-id="2010"><span data-dcnode-id="2011" instrument_node="">“Hawaii is not a state of mind, but a state of grace.” – Paul Theroux</span></em></p><span data-dcnode-id="2008" instrument_node="">
</span><p data-dcnode-id="2006"><span data-dcnode-id="2007" instrument_node="">Experience Hawaii’s warmth, color and history on two wheels. Bicycle banyan-lined roadways past lush coffee plantations and immense lava fields pummeled by the surf. Witness the volcanic majesty of Kilauea. Snorkel with manta rays. Enjoy the best stargazing in the world from high up on Mauna Kea. Be awed by the island’s astonishing biological diversity. Visit many of its historic and sacred places. Dine at its most famous restaurant. Hawaii is Paradise, perfected on a bicycle!</span></p><span data-dcnode-id="2005" instrument_node="">
</span><p data-dcnode-id="2003"><span data-dcnode-id="2004" instrument_node="">OCTOBER 2021 UPDATE: Lava is again visible in the Kilauea crater! And the Park is open for viewing.</span></p><span data-dcnode-id="2002" instrument_node="">
</span><p data-dcnode-id="2000"><span data-dcnode-id="2001" instrument_node="">This tour is operated under special use permit/s with the Hawaii Volcanoes National Park and Pu’uhonua O Hōnaunau National Historical Park (“City of Refuge”). Bicycle Adventures is an equal opportunity provider.</span></p><span data-dcnode-id="1999" instrument_node="">
