</span><div class="wp-block-image" data-dcnode-id="1077"><figure class="aligncenter" data-dcnode-id="1078"><a data-dcnode-id="1079" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stingynomads.com/wp-content/uploads/2016/10/Paraguay-waterfall.jpg"><noscript data-dcnode-id="1081"><span data-dcnode-id="1082" instrument_node="">&lt;img loading="lazy" width="1050" height="700" src="https://stingynomads.com/wp-content/uploads/2016/10/Paraguay-waterfall.jpg" alt="" class="wp-image-17213" srcset="https://stingynomads.com/wp-content/uploads/2016/10/Paraguay-waterfall.jpg 1050w, https://stingynomads.com/wp-content/uploads/2016/10/Paraguay-waterfall-300x200.jpg 300w, https://stingynomads.com/wp-content/uploads/2016/10/Paraguay-waterfall-510x340.jpg 510w, https://stingynomads.com/wp-content/uploads/2016/10/Paraguay-waterfall-225x150.jpg 225w, https://stingynomads.com/wp-content/uploads/2016/10/Paraguay-waterfall-370x247.jpg 370w, https://stingynomads.com/wp-content/uploads/2016/10/Paraguay-waterfall-270x180.jpg 270w, https://stingynomads.com/wp-content/uploads/2016/10/Paraguay-waterfall-570x380.jpg 570w, https://stingynomads.com/wp-content/uploads/2016/10/Paraguay-waterfall-770x513.jpg 770w, https://stingynomads.com/wp-content/uploads/2016/10/Paraguay-waterfall-870x580.jpg 870w" sizes="(max-width: 760px) calc(100vw - 40px), 720px"&gt;</span></noscript><img alt="" class="wp-image-17213 lazyload" data-dcnode-id="1080" data-pin-media="https://stingynomads.com/wp-content/uploads/2016/10/Paraguay-waterfall.jpg" data-src="https://stingynomads.com/wp-content/uploads/2016/10/Paraguay-waterfall.jpg.webp" data-srcset="https://stingynomads.com/wp-content/uploads/2016/10/Paraguay-waterfall.jpg.webp 1050w, https://stingynomads.com/wp-content/uploads/2016/10/Paraguay-waterfall-300x200.jpg.webp 300w, https://stingynomads.com/wp-content/uploads/2016/10/Paraguay-waterfall-510x340.jpg.webp 510w, https://stingynomads.com/wp-content/uploads/2016/10/Paraguay-waterfall-225x150.jpg.webp 225w, https://stingynomads.com/wp-content/uploads/2016/10/Paraguay-waterfall-370x247.jpg.webp 370w, https://stingynomads.com/wp-content/uploads/2016/10/Paraguay-waterfall-270x180.jpg.webp 270w, https://stingynomads.com/wp-content/uploads/2016/10/Paraguay-waterfall-570x380.jpg.webp 570w, https://stingynomads.com/wp-content/uploads/2016/10/Paraguay-waterfall-770x513.jpg.webp 770w, https://stingynomads.com/wp-content/uploads/2016/10/Paraguay-waterfall-870x580.jpg.webp 870w" data-trellis-processed="1" data-webp="true" height="700" id="mv-trellis-img-22" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stingynomads.com/wp-content/uploads/2016/10/Paraguay-waterfall.jpg.webp&amp;raw" srcset="https://stingynomads.com/wp-content/uploads/2016/10/Paraguay-waterfall.jpg.webp 1050w, https://stingynomads.com/wp-content/uploads/2016/10/Paraguay-waterfall-300x200.jpg.webp 300w, https://stingynomads.com/wp-content/uploads/2016/10/Paraguay-waterfall-510x340.jpg.webp 510w, https://stingynomads.com/wp-content/uploads/2016/10/Paraguay-waterfall-225x150.jpg.webp 225w, https://stingynomads.com/wp-content/uploads/2016/10/Paraguay-waterfall-370x247.jpg.webp 370w, https://stingynomads.com/wp-content/uploads/2016/10/Paraguay-waterfall-270x180.jpg.webp 270w, https://stingynomads.com/wp-content/uploads/2016/10/Paraguay-waterfall-570x380.jpg.webp 570w, https://stingynomads.com/wp-content/uploads/2016/10/Paraguay-waterfall-770x513.jpg.webp 770w, https://stingynomads.com/wp-content/uploads/2016/10/Paraguay-waterfall-870x580.jpg.webp 870w" width="1050"></a></figure></div><span data-dcnode-id="1076" instrument_node="">
</span><p data-dcnode-id="1074"><span data-dcnode-id="1075" instrument_node="">We spent PYG 191 000 ($ 34) in 3 days, thus 63 666 PYG ($12) each per day including&nbsp;all food, transport and other expenses.</span></p><span data-dcnode-id="1073" instrument_node="">
</span><p data-dcnode-id="1071"><span data-dcnode-id="1072" instrument_node="">We did not spend much time in Paraguay. I bought some electronics in Ciudad del Este for cheap. The Itaipu dam is located close to the city, the second biggest dam in the world is a nice site to go to from the city, the tour is free. The dam is one of the seven Engineering Wonders of the World. The massive network of waterfalls that they flooded to build the dam would have been even nicer. Apparently it was bigger and more impressive than Iguazu</span></p><span data-dcnode-id="1070" instrument_node="">
</span><p data-dcnode-id="1067"><strong data-dcnode-id="1068"><span data-dcnode-id="1069" instrument_node="">ACCOMMODATION</span></strong></p><span data-dcnode-id="1066" instrument_node="">
</span><ul data-dcnode-id="1053"><li data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node="">Dormitory bed in a nice hostel start at $13</span></li><li data-dcnode-id="1062"><span data-dcnode-id="1063" instrument_node="">There are very few hostels, they are quite expensive</span></li><li data-dcnode-id="1060"><span data-dcnode-id="1061" instrument_node="">Double room in budget hotel $30</span></li><li data-dcnode-id="1058"><span data-dcnode-id="1059" instrument_node="">Good value for double rooms if you are two people sharing</span></li><li data-dcnode-id="1056"><span data-dcnode-id="1057" instrument_node="">Stay in luxury 5 star hotel from $65</span></li><li data-dcnode-id="1054"><span data-dcnode-id="1055" instrument_node="">For $65 you can get a double room in a top 5 star hotel</span></li></ul><span data-dcnode-id="1052" instrument_node="">
</span><p data-dcnode-id="1049"><strong data-dcnode-id="1050"><span data-dcnode-id="1051" instrument_node="">TRANSPORT</span></strong></p><span data-dcnode-id="1048" instrument_node="">
</span><p data-dcnode-id="1046"><span data-dcnode-id="1047" instrument_node="">Extensive bus network connecting towns and cities, don’t expect luxury buses. Taxis are well priced, motorbike taxis are cheap.</span></p><span data-dcnode-id="1045" instrument_node="">
</span><h2 data-dcnode-id="1039"><span class="ez-toc-section" data-dcnode-id="1044" id="_PERU_travel_cost"></span><span data-dcnode-id="1043" instrument_node="">&nbsp;PERU </span><em data-dcnode-id="1041"><span data-dcnode-id="1042" instrument_node="">travel cost</span></em><span class="ez-toc-section-end" data-dcnode-id="1040"></span></h2><span data-dcnode-id="1038" instrument_node="">
</span><p data-dcnode-id="1036"><span data-dcnode-id="1037" instrument_node="">Peru is still one of the cheaper countries to visit in South America hosting some of the continent’s most famous attractions. The two most popular highlights are without a doubt the Inca ruins of Machu Picchu and the multi day hiking trail ‘The Inca trail’ leading up to this archaeological wonder. Peru has so much more to offer, visit the fascinating man made islands of Lake Titicaca, explore the Amazon from Iquitos, check out Lima or go surfing at Mancora. Peru is a dream destination for trekking with a staggering array of trails winding through the Andes. These spectacular mountains offer a lot more than just the Inca trail; we spent a month in Cusco alone, doing some fantastic trekking like Salkantay, Choquequirao and Ausangate. If you do these treks independent it is dirt cheap, what an awe-inspiring experience!</span></p><span data-dcnode-id="1035" instrument_node="">
</span><p data-dcnode-id="1031"><span data-dcnode-id="1034" instrument_node="">Great help in doing some planning&nbsp;</span><a data-dcnode-id="1032" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/product/1743215576/ref%3Das_li_tl%3Fie%3DUTF8%26camp%3D1789%26creative%3D9325%26creativeASIN%3D1743215576%26linkCode%3Das2%26tag%3Dstingynomads-20%26linkId%3Db36934675ea5fbfcf81766c9a5338e99" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="1033" instrument_node="">Lonely Planet Peru (Travel Guide)</span></a></p><span data-dcnode-id="1030" instrument_node="">
</span><p data-dcnode-id="1027"><strong data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">Travel Budget for Peru</span></strong></p><span data-dcnode-id="1026" instrument_node="">
</span><ul data-dcnode-id="994"><li data-dcnode-id="1016"><strong data-dcnode-id="1024"><span data-dcnode-id="1025" instrument_node="">Backpacker’s budget</span></strong><span data-dcnode-id="1023" instrument_node="">
</span><ul data-dcnode-id="1018"><span data-dcnode-id="1022" instrument_node="">
</span><li data-dcnode-id="1020"><span data-dcnode-id="1021" instrument_node="">$30 -40 per day</span></li><span data-dcnode-id="1019" instrument_node="">
</span></ul><span data-dcnode-id="1017" instrument_node="">
</span></li><li data-dcnode-id="1005"><strong data-dcnode-id="1014"><span data-dcnode-id="1015" instrument_node="">Midrange Holiday budget</span></strong><span data-dcnode-id="1013" instrument_node="">
</span><ul data-dcnode-id="1007"><span data-dcnode-id="1012" instrument_node="">
</span><li data-dcnode-id="1009"><strong data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">$60 to 100 per day</span></strong></li><span data-dcnode-id="1008" instrument_node="">
</span></ul><span data-dcnode-id="1006" instrument_node="">
</span></li><li data-dcnode-id="995"><strong data-dcnode-id="1003"><span data-dcnode-id="1004" instrument_node="">Shoestring budget </span></strong><span data-dcnode-id="1002" instrument_node="">
</span><ul data-dcnode-id="997"><span data-dcnode-id="1001" instrument_node="">
</span><li data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">$20 per day</span></li><span data-dcnode-id="998" instrument_node="">
</span></ul><span data-dcnode-id="996" instrument_node="">
</span></li></ul><span data-dcnode-id="993" instrument_node="">
</span><p data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">We spent PEN 2008&nbsp; ($592) in&nbsp; 37 days, thus Sol 54.20&nbsp; ($ 15.95) each per day including&nbsp;all food, transport and other expenses.</span></p><span data-dcnode-id="990" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="982"><figure class="aligncenter" data-dcnode-id="983"><a data-dcnode-id="986" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stingynomads.com/wp-content/uploads/2016/10/peru-4.jpg"><noscript data-dcnode-id="988"><span data-dcnode-id="989" instrument_node="">&lt;img loading="lazy" width="996" height="672" src="https://stingynomads.com/wp-content/uploads/2016/10/peru-4.jpg" alt="trekking peru" class="wp-image-9706" srcset="https://stingynomads.com/wp-content/uploads/2016/10/peru-4.jpg 996w, https://stingynomads.com/wp-content/uploads/2016/10/peru-4-300x202.jpg 300w, https://stingynomads.com/wp-content/uploads/2016/10/peru-4-510x344.jpg 510w, https://stingynomads.com/wp-content/uploads/2016/10/peru-4-400x270.jpg 400w" sizes="(max-width: 760px) calc(100vw - 40px), 720px"&gt;</span></noscript><img alt="trekking peru" class="wp-image-9706 lazyload" data-dcnode-id="987" data-pin-media="https://stingynomads.com/wp-content/uploads/2016/10/peru-4.jpg" data-src="https://stingynomads.com/wp-content/uploads/2016/10/peru-4.jpg.webp" data-srcset="https://stingynomads.com/wp-content/uploads/2016/10/peru-4.jpg.webp 996w, https://stingynomads.com/wp-content/uploads/2016/10/peru-4-300x202.jpg.webp 300w, https://stingynomads.com/wp-content/uploads/2016/10/peru-4-510x344.jpg.webp 510w, https://stingynomads.com/wp-content/uploads/2016/10/peru-4-400x270.jpg.webp 400w" data-trellis-processed="1" data-webp="true" height="672" id="mv-trellis-img-23" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stingynomads.com/wp-content/uploads/2016/10/peru-4.jpg.webp&amp;raw" srcset="https://stingynomads.com/wp-content/uploads/2016/10/peru-4.jpg.webp 996w, https://stingynomads.com/wp-content/uploads/2016/10/peru-4-300x202.jpg.webp 300w, https://stingynomads.com/wp-content/uploads/2016/10/peru-4-510x344.jpg.webp 510w, https://stingynomads.com/wp-content/uploads/2016/10/peru-4-400x270.jpg.webp 400w" width="996"></a><figcaption data-dcnode-id="984"><span data-dcnode-id="985" instrument_node="">Trekking in Peru was very cheap, we had an amazing time and saw some unreal places!</span></figcaption></figure></div><span data-dcnode-id="981" instrument_node="">
</span><p data-dcnode-id="979"><span data-dcnode-id="980" instrument_node="">For us doing a lot of hikes made Peru cheaper not more expensive. Doing independent hikes costs were minimum.&nbsp; During hikes accommodation was free and food was very cheap.</span></p><span data-dcnode-id="978" instrument_node="">
</span><p data-dcnode-id="975"><strong data-dcnode-id="976"><span data-dcnode-id="977" instrument_node="">ACCOMMODATION</span></strong></p><span data-dcnode-id="974" instrument_node="">
</span><ul data-dcnode-id="967"><li data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">Dormitory bed in a nice hostel in $6</span></li><li data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">Double room in budget hotel $40</span></li><li data-dcnode-id="968"><span data-dcnode-id="969" instrument_node="">Stay in luxury 5star hotel from $120</span></li></ul><span data-dcnode-id="966" instrument_node="">
</span><p data-dcnode-id="963"><strong data-dcnode-id="964"><span data-dcnode-id="965" instrument_node="">FOOD</span></strong></p><span data-dcnode-id="962" instrument_node="">
</span><ul data-dcnode-id="945"><li data-dcnode-id="954"><span data-dcnode-id="961" instrument_node="">The best place for lunch is a </span><em data-dcnode-id="959"><span data-dcnode-id="960" instrument_node="">menú</span></em><span data-dcnode-id="958" instrument_node=""> at one of the local restaurants. A Peruvian</span><em data-dcnode-id="956"><span data-dcnode-id="957" instrument_node=""> menú </span></em><span data-dcnode-id="955" instrument_node="">is&nbsp;a set meal including a starter (normally soup or a small salad), a main course, a drink and sometimes a small dessert. The price is about PEN 10 ($3)</span></li><li data-dcnode-id="952"><span data-dcnode-id="953" instrument_node="">Are you a foodie? Go to ‘Central’ restaurant in Lima, the nr 1 restaurant in South America and nr 4 in the world, a bit above our budget at round $200 for a 17 course meal, but we heard about the magic chef Martinez serves here, culinary art taking you from 20m below sea level to 4000m above.</span></li><li data-dcnode-id="950"><span data-dcnode-id="951" instrument_node="">Some hostels include breakfast, usually simple (yes read not enough). We drank a lot of tea in the mountains of Peru. Most hostels give unlimited free coco tea since it helps with altitude sickness.</span></li><li data-dcnode-id="948"><span data-dcnode-id="949" instrument_node="">McDonald’s meal about PEN16 ($4.50)</span></li><li data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">Local beer PEN 6/ $1.8</span></li></ul><span data-dcnode-id="944" instrument_node="">
</span><p data-dcnode-id="941"><strong data-dcnode-id="942"><span data-dcnode-id="943" instrument_node="">TRANSPORT</span></strong></p><span data-dcnode-id="940" instrument_node="">
</span><ul data-dcnode-id="935"><li data-dcnode-id="938"><span data-dcnode-id="939" instrument_node="">Bus travel in Peru is well priced with different options and prices. A bus ride from Lima to Cusco in a nice bus with wifi starts at about PEN80 ($25) for the 22 hour ride.</span></li><li data-dcnode-id="936"><span data-dcnode-id="937" instrument_node="">Shorter trips of around 2 and a half hours were about PEN 10 ($3).</span></li></ul><span data-dcnode-id="934" instrument_node="">
</span><p data-dcnode-id="931"><strong data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">VISA FEES</span></strong></p><span data-dcnode-id="930" instrument_node="">
</span><p data-dcnode-id="927"><strong data-dcnode-id="928"><span data-dcnode-id="929" instrument_node="">TIPS</span></strong></p><span data-dcnode-id="926" instrument_node="">
</span><ul data-dcnode-id="917"><li data-dcnode-id="924"><span data-dcnode-id="925" instrument_node="">Machu Picchu entrance is $47 including Machu Picchu Mountain. Machu Picchu is amazing despite the 4000 tourists a day, a must see.</span></li><li data-dcnode-id="918"><span data-dcnode-id="923" instrument_node="">I recommend skipping the Inca Trail, hike a different route. There are many amazing hikes around Cuzco and several options to hike to Machu Picchu. The Inca Trail is the most famous and most touristy, this does not make it the best. See our </span><a data-dcnode-id="920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stingynomads.com/salkantay-trek-machu-picchu/"><strong data-dcnode-id="921"><span data-dcnode-id="922" instrument_node="">Salkantay to Machu Picchu, an alternative route </span></strong></a><span data-dcnode-id="919" instrument_node="">article for more on the topic.</span></li></ul><span data-dcnode-id="916" instrument_node="">
</span><p data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">Peru is an amazing culture and adventure experience; activities will be your biggest expense, go for it! It will be an experience you will treasure forever.</span></p><span data-dcnode-id="913" instrument_node="">
</span><p data-dcnode-id="910"><strong data-dcnode-id="911"><span data-dcnode-id="912" instrument_node="">BUDGET ACTIVITIES</span></strong></p><span data-dcnode-id="909" instrument_node="">
</span><ul data-dcnode-id="895"><li data-dcnode-id="907"><span data-dcnode-id="908" instrument_node="">Hike independent</span></li><li data-dcnode-id="903"><span data-dcnode-id="906" instrument_node="">carry your own bag and use a map instead of a guide, there are some of the world’s best </span><a data-dcnode-id="904" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stingynomads.com/hiking-peru-more-than-inca-trail/"><span data-dcnode-id="905" instrument_node="">hikes in the Peruvian Andes!&nbsp;</span></a></li><li data-dcnode-id="896"><span data-dcnode-id="902" instrument_node="">Take a </span><a data-dcnode-id="900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stingynomads.com/amazon-boat-trip/"><span data-dcnode-id="901" instrument_node="">slowboat trip in the amazon</span></a><span data-dcnode-id="899" instrument_node=""> from Iquitos to Leticia.&nbsp;</span><strong data-dcnode-id="897"><span data-dcnode-id="898" instrument_node="">Awesome activity when traveling South America on the cheap.</span></strong></li></ul><span data-dcnode-id="894" instrument_node="">
</span><h3 data-dcnode-id="892"><span data-dcnode-id="893" instrument_node="">South America Tours – G-Adventures Iconic Peru travels</span></h3><span data-dcnode-id="891" instrument_node="">
</span><p data-dcnode-id="887"><a data-dcnode-id="889" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.anrdoezrs.net/links/8989289/type/dlg/https%3A//www.gadventures.com/trips/amazon-to-the-andes/PAA/" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="890" instrument_node="">G-Adventures Peru</span></a><span data-dcnode-id="888" instrument_node=""> – This adventure offers up an intriguing combination of beauty and contrasts in scenery, wildlife, and cultures, whether you’re scanning the canopy for wildlife from the comfort of our intimate and exclusive G Lodge Amazon or climbing the ancient trail of the Incas to Machu Picchu, situated in the heavens of the Americas. Because we run our own treks, we can ensure the fair treatment of our porters and the quality of food and equipment which leaves you free to enjoy the beauty of the region.</span></p><span data-dcnode-id="886" instrument_node="">
</span><h2 data-dcnode-id="878"><span class="ez-toc-section" data-dcnode-id="885" id="URUGUAY_travel_cost"></span><span data-dcnode-id="884" instrument_node="">URUGUAY</span><strong data-dcnode-id="882"><span data-dcnode-id="883" instrument_node="">.</span></strong><em data-dcnode-id="880"><span data-dcnode-id="881" instrument_node=""> travel cost</span></em><span class="ez-toc-section-end" data-dcnode-id="879"></span></h2><span data-dcnode-id="877" instrument_node="">
</span><p data-dcnode-id="875"><span data-dcnode-id="876" instrument_node="">Uruguay is known as an expensive country with top quality beef and people living on Mate, sort of a super Argentina, this is not too far off. The most popular places to visit in the country are Montevideo, Punta del Este, Colonia, Punta del diablo, and Cabo Polonio Rocha.&nbsp;The country is predominantly a summer beach destination, which is great since going to the beach is free. Kitesurfing is a popular activity and don’t miss eating a local steak and drink some matet (the mate straw is a cool gift to take home). Most travelers arrive in Uruguay by ferry straight from Buenos Aires ($56). The ferry is expensive and we decided to hitchhike the long way around, it took a long time. The country’s small size and efficient bus system allows for easy exploring of the whole country.</span></p><span data-dcnode-id="874" instrument_node="">
</span><p data-dcnode-id="871"><strong data-dcnode-id="872"><span data-dcnode-id="873" instrument_node="">Travel Budget for Uruguay</span></strong></p><span data-dcnode-id="870" instrument_node="">
</span><ul data-dcnode-id="838"><li data-dcnode-id="860"><strong data-dcnode-id="868"><span data-dcnode-id="869" instrument_node="">Backpacker’s budget</span></strong><span data-dcnode-id="867" instrument_node="">
</span><ul data-dcnode-id="862"><span data-dcnode-id="866" instrument_node="">
</span><li data-dcnode-id="864"><span data-dcnode-id="865" instrument_node="">$50 per day</span></li><span data-dcnode-id="863" instrument_node="">
</span></ul><span data-dcnode-id="861" instrument_node="">
</span></li><li data-dcnode-id="849"><strong data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">Midrange Holiday budget</span></strong><span data-dcnode-id="857" instrument_node="">
</span><ul data-dcnode-id="851"><span data-dcnode-id="856" instrument_node="">
</span><li data-dcnode-id="853"><strong data-dcnode-id="854"><span data-dcnode-id="855" instrument_node="">$70 – 100 per day</span></strong></li><span data-dcnode-id="852" instrument_node="">
</span></ul><span data-dcnode-id="850" instrument_node="">
</span></li><li data-dcnode-id="839"><strong data-dcnode-id="847"><span data-dcnode-id="848" instrument_node="">Shoestring budget </span></strong><span data-dcnode-id="846" instrument_node="">
</span><ul data-dcnode-id="841"><span data-dcnode-id="845" instrument_node="">
</span><li data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">$25 per day</span></li><span data-dcnode-id="842" instrument_node="">
</span></ul><span data-dcnode-id="840" instrument_node="">
</span></li></ul><span data-dcnode-id="837" instrument_node="">
</span><p data-dcnode-id="835"><span data-dcnode-id="836" instrument_node="">We spent UYU 3954 &nbsp;($ 140) in 7 days, thus 564 UYU ($20.50) each per day total, we did some hitchhiking and camping.</span></p><span data-dcnode-id="834" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="826"><figure class="aligncenter" data-dcnode-id="827"><a data-dcnode-id="830" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stingynomads.com/wp-content/uploads/2018/07/punta-del-este-uruguay.jpg"><noscript data-dcnode-id="832"><span data-dcnode-id="833" instrument_node="">&lt;img loading="lazy" width="900" height="600" src="https://stingynomads.com/wp-content/uploads/2018/07/punta-del-este-uruguay.jpg" alt="The sculpture on the beach- Los Dedos (&amp;ldquo;the fingers&amp;rdquo;), a famous work by Chilean artist Mario Irarr&amp;aacute;zabal." class="wp-image-16220" srcset="https://stingynomads.com/wp-content/uploads/2018/07/punta-del-este-uruguay.jpg 900w, https://stingynomads.com/wp-content/uploads/2018/07/punta-del-este-uruguay-300x200.jpg 300w, https://stingynomads.com/wp-content/uploads/2018/07/punta-del-este-uruguay-510x340.jpg 510w, https://stingynomads.com/wp-content/uploads/2018/07/punta-del-este-uruguay-225x150.jpg 225w, https://stingynomads.com/wp-content/uploads/2018/07/punta-del-este-uruguay-370x247.jpg 370w, https://stingynomads.com/wp-content/uploads/2018/07/punta-del-este-uruguay-270x180.jpg 270w, https://stingynomads.com/wp-content/uploads/2018/07/punta-del-este-uruguay-570x380.jpg 570w, https://stingynomads.com/wp-content/uploads/2018/07/punta-del-este-uruguay-770x513.jpg 770w, https://stingynomads.com/wp-content/uploads/2018/07/punta-del-este-uruguay-870x580.jpg 870w" sizes="(max-width: 760px) calc(100vw - 40px), 720px"&gt;</span></noscript><img alt="The sculpture on the beach- Los Dedos (“the fingers”), a famous work by Chilean artist Mario Irarrázabal." class="wp-image-16220 lazyload" data-dcnode-id="831" data-pin-media="https://stingynomads.com/wp-content/uploads/2018/07/punta-del-este-uruguay.jpg" data-src="https://stingynomads.com/wp-content/uploads/2018/07/punta-del-este-uruguay.jpg.webp" data-srcset="https://stingynomads.com/wp-content/uploads/2018/07/punta-del-este-uruguay.jpg.webp 900w, https://stingynomads.com/wp-content/uploads/2018/07/punta-del-este-uruguay-300x200.jpg.webp 300w, https://stingynomads.com/wp-content/uploads/2018/07/punta-del-este-uruguay-510x340.jpg.webp 510w, https://stingynomads.com/wp-content/uploads/2018/07/punta-del-este-uruguay-225x150.jpg.webp 225w, https://stingynomads.com/wp-content/uploads/2018/07/punta-del-este-uruguay-370x247.jpg.webp 370w, https://stingynomads.com/wp-content/uploads/2018/07/punta-del-este-uruguay-270x180.jpg.webp 270w, https://stingynomads.com/wp-content/uploads/2018/07/punta-del-este-uruguay-570x380.jpg.webp 570w, https://stingynomads.com/wp-content/uploads/2018/07/punta-del-este-uruguay-770x513.jpg.webp 770w, https://stingynomads.com/wp-content/uploads/2018/07/punta-del-este-uruguay-870x580.jpg.webp 870w" data-trellis-processed="1" data-webp="true" height="600" id="mv-trellis-img-24" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stingynomads.com/wp-content/uploads/2018/07/punta-del-este-uruguay.jpg.webp&amp;raw" srcset="https://stingynomads.com/wp-content/uploads/2018/07/punta-del-este-uruguay.jpg.webp 900w, https://stingynomads.com/wp-content/uploads/2018/07/punta-del-este-uruguay-300x200.jpg.webp 300w, https://stingynomads.com/wp-content/uploads/2018/07/punta-del-este-uruguay-510x340.jpg.webp 510w, https://stingynomads.com/wp-content/uploads/2018/07/punta-del-este-uruguay-225x150.jpg.webp 225w, https://stingynomads.com/wp-content/uploads/2018/07/punta-del-este-uruguay-370x247.jpg.webp 370w, https://stingynomads.com/wp-content/uploads/2018/07/punta-del-este-uruguay-270x180.jpg.webp 270w, https://stingynomads.com/wp-content/uploads/2018/07/punta-del-este-uruguay-570x380.jpg.webp 570w, https://stingynomads.com/wp-content/uploads/2018/07/punta-del-este-uruguay-770x513.jpg.webp 770w, https://stingynomads.com/wp-content/uploads/2018/07/punta-del-este-uruguay-870x580.jpg.webp 870w" width="900"></a><figcaption data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">The sculpture on the beach- Los Dedos (“the fingers”), a famous work by Chilean artist Mario Irarrázabal.</span></figcaption></figure></div><span data-dcnode-id="825" instrument_node="">
</span><p data-dcnode-id="822"><strong data-dcnode-id="823"><span data-dcnode-id="824" instrument_node="">FOOD</span></strong></p><span data-dcnode-id="821" instrument_node="">
</span><ul data-dcnode-id="816"><li data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">Eating in restaurants is very expensive, but like Argentina eating a steak is one of the must do things in Uruguay. Chivito (Uruguay’s classic steak sandwich) goes for about US$10, eating in a midrange restaurant $25 with a drink and double that for eating in a top end restaurant with wine.</span></li><li data-dcnode-id="817"><span data-dcnode-id="818" instrument_node="">Lunch in a local restaurant cost about UYU 350 ($12). A Mcdonald’s meal is about UYU 280 ($10). Shopping and cooking the prices are not that crazy and staying in a hostel with cooking facilities is the cheapest way to travel here.</span></li></ul><span data-dcnode-id="815" instrument_node="">
</span><p data-dcnode-id="812"><strong data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">ACCOMMODATION</span></strong></p><span data-dcnode-id="811" instrument_node="">
</span><ul data-dcnode-id="804"><li data-dcnode-id="809"><span data-dcnode-id="810" instrument_node="">Dormitory bed in a nice hostel start at $10</span></li><li data-dcnode-id="807"><span data-dcnode-id="808" instrument_node="">Double room in budget hotel $35</span></li><li data-dcnode-id="805"><span data-dcnode-id="806" instrument_node="">Stay in luxury 5star hotel from $160</span></li></ul><span data-dcnode-id="803" instrument_node="">
</span><p data-dcnode-id="800"><strong data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">TRANSPORT</span></strong></p><span data-dcnode-id="799" instrument_node="">
</span><p data-dcnode-id="797"><span data-dcnode-id="798" instrument_node="">All the cities and towns in Uruguay are connected by an extensive network of bus routes. The distances are short and we were surprised that transport is relatively cheap. The inter-city buses are modern, clean and comfortable and it was awesome that these buses have quite good Wi-Fi.</span></p><span data-dcnode-id="796" instrument_node="">
</span><ul data-dcnode-id="791"><li data-dcnode-id="794"><span data-dcnode-id="795" instrument_node="">Local bus ride in Montevideo US$1</span></li><li data-dcnode-id="792"><span data-dcnode-id="793" instrument_node="">Long-distance bus rides are about US$7 per 100km travelled.</span></li></ul><span data-dcnode-id="790" instrument_node="">
</span><h2 data-dcnode-id="784"><span class="ez-toc-section" data-dcnode-id="789" id="VENEZUELA_travel_cost"></span><span data-dcnode-id="788" instrument_node="">VENEZUELA </span><em data-dcnode-id="786"><span data-dcnode-id="787" instrument_node="">travel cost</span></em><span class="ez-toc-section-end" data-dcnode-id="785"></span></h2><span data-dcnode-id="783" instrument_node="">
</span><p data-dcnode-id="781"><span data-dcnode-id="782" instrument_node="">Traveling to the beautiful, dangerous and destroyed country of Venezuela is strongly discouraged by every foreign office around the world. Once one of the richest nations in South America, with&nbsp; massive oil reserves, due to political corruption and civil unrest it became a country with massive social and economic problems.</span></p><span data-dcnode-id="780" instrument_node="">
</span><p data-dcnode-id="778"><span data-dcnode-id="779" instrument_node="">We had a great time traveling here late 2015, the country was already in distress and empty shops, corrupt police and non-existent service made it hard to travel here. It was however very cheap, we were traveling on cents, if it is ethical to travel to Venezuela is another hot potato.</span></p><span data-dcnode-id="777" instrument_node="">
</span><p data-dcnode-id="775"><span data-dcnode-id="776" instrument_node="">We spent VEF 107 999 &nbsp; ($155) in&nbsp;29 days, thus VEF 30723 ($5.31) each per day including&nbsp;all food, transport and other expenses.</span></p><span data-dcnode-id="774" instrument_node="">
</span><p data-dcnode-id="771"><strong data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">THE CURRENCY ISSUE</span></strong></p><span data-dcnode-id="770" instrument_node="">
</span><p data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">When we were here, September 2015, the official exchange rate was $1=B6, on the black market you could however buy B700 with $1! This means that a Coke will only cost 27c at the black market rate, but you will pay $33 for the same Coke at the official exchange rate! If you bring cash it is an unbelievably cheap country to travel. If however you draw money at an ATM or pay by credit card at the official rate it is maybe the most expensive country in the world. Unfortunately this downward spiral has just continued for Venezuela with inflation at over 800 000% in October 2018</span></p><span data-dcnode-id="767" instrument_node="">
</span><p data-dcnode-id="763"><span data-dcnode-id="766" instrument_node="">Want to know and understand what is going on in Venezuela? read this insight full and well received book –&nbsp;</span><a data-dcnode-id="764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/product/1612347703/ref%3Das_li_tl%3Fie%3DUTF8%26camp%3D1789%26creative%3D9325%26creativeASIN%3D1612347703%26linkCode%3Das2%26tag%3Dstingynomads-20%26linkId%3D9de686a7b74e92872914d10593a9ab65" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="765" instrument_node="">Crude Nation: How Oil Riches Ruined Venezuela</span></a></p><span data-dcnode-id="762" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="754"><figure class="aligncenter" data-dcnode-id="755"><a data-dcnode-id="758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stingynomads.com/wp-content/uploads/2016/06/money-in-venezuela.jpg"><noscript data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">&lt;img loading="lazy" width="1000" height="656" src="https://stingynomads.com/wp-content/uploads/2016/06/money-in-venezuela.jpg" alt="currency venezuela" class="wp-image-14909" srcset="https://stingynomads.com/wp-content/uploads/2016/06/money-in-venezuela.jpg 1000w, https://stingynomads.com/wp-content/uploads/2016/06/money-in-venezuela-300x197.jpg 300w, https://stingynomads.com/wp-content/uploads/2016/06/money-in-venezuela-510x335.jpg 510w, https://stingynomads.com/wp-content/uploads/2016/06/money-in-venezuela-370x243.jpg 370w, https://stingynomads.com/wp-content/uploads/2016/06/money-in-venezuela-570x374.jpg 570w, https://stingynomads.com/wp-content/uploads/2016/06/money-in-venezuela-770x505.jpg 770w, https://stingynomads.com/wp-content/uploads/2016/06/money-in-venezuela-884x580.jpg 884w" sizes="(max-width: 760px) calc(100vw - 40px), 720px"&gt;</span></noscript><img alt="currency venezuela" class="wp-image-14909 lazyload" data-dcnode-id="759" data-pin-media="https://stingynomads.com/wp-content/uploads/2016/06/money-in-venezuela.jpg" data-src="https://stingynomads.com/wp-content/uploads/2016/06/money-in-venezuela.jpg.webp" data-srcset="https://stingynomads.com/wp-content/uploads/2016/06/money-in-venezuela.jpg.webp 1000w, https://stingynomads.com/wp-content/uploads/2016/06/money-in-venezuela-300x197.jpg.webp 300w, https://stingynomads.com/wp-content/uploads/2016/06/money-in-venezuela-510x335.jpg.webp 510w, https://stingynomads.com/wp-content/uploads/2016/06/money-in-venezuela-370x243.jpg.webp 370w, https://stingynomads.com/wp-content/uploads/2016/06/money-in-venezuela-570x374.jpg.webp 570w, https://stingynomads.com/wp-content/uploads/2016/06/money-in-venezuela-770x505.jpg.webp 770w, https://stingynomads.com/wp-content/uploads/2016/06/money-in-venezuela-884x580.jpg.webp 884w" data-trellis-processed="1" data-webp="true" height="656" id="mv-trellis-img-25" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stingynomads.com/wp-content/uploads/2016/06/money-in-venezuela.jpg.webp&amp;raw" srcset="https://stingynomads.com/wp-content/uploads/2016/06/money-in-venezuela.jpg.webp 1000w, https://stingynomads.com/wp-content/uploads/2016/06/money-in-venezuela-300x197.jpg.webp 300w, https://stingynomads.com/wp-content/uploads/2016/06/money-in-venezuela-510x335.jpg.webp 510w, https://stingynomads.com/wp-content/uploads/2016/06/money-in-venezuela-370x243.jpg.webp 370w, https://stingynomads.com/wp-content/uploads/2016/06/money-in-venezuela-570x374.jpg.webp 570w, https://stingynomads.com/wp-content/uploads/2016/06/money-in-venezuela-770x505.jpg.webp 770w, https://stingynomads.com/wp-content/uploads/2016/06/money-in-venezuela-884x580.jpg.webp 884w" width="1000"></a><figcaption data-dcnode-id="756"><span data-dcnode-id="757" instrument_node="">Because of the exchange rate in Venezuela, tourists with US dollars have a lot of money. These are 50B notes (almost $10 notes).</span></figcaption></figure></div><span data-dcnode-id="753" instrument_node="">
</span><p data-dcnode-id="750"><strong data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">BUDGET AND PRICES</span></strong></p><span data-dcnode-id="749" instrument_node="">
</span><p data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">Our average budget was $5.31 a day each all inclusive.</span></p><span data-dcnode-id="746" instrument_node="">
</span><p data-dcnode-id="743"><strong data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">VISA FEES FOR VENEZUELA</span></strong></p><span data-dcnode-id="742" instrument_node="">
</span><p data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">US citizens need visa, $30 for 90 day multiple entry visa</span></p><span data-dcnode-id="739" instrument_node="">
</span><p data-dcnode-id="736"><strong data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">BUDGET ACTIVITIES</span></strong></p><span data-dcnode-id="735" instrument_node="">
</span><p data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">Most things, don’t get robbed.</span></p><span data-dcnode-id="732" instrument_node="">
</span><p data-dcnode-id="729"><strong data-dcnode-id="730"><span data-dcnode-id="731" instrument_node="">More about our travels in&nbsp; Venezuela</span></strong></p><span data-dcnode-id="728" instrument_node="">
</span><ul data-dcnode-id="721"><li data-dcnode-id="725"><a data-dcnode-id="726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stingynomads.com/travel-venezuela/"><span data-dcnode-id="727" instrument_node="">Travel Venezuela, a backpacking guide.</span></a></li><li data-dcnode-id="722"><a data-dcnode-id="723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stingynomads.com/roraima-trek/"><span data-dcnode-id="724" instrument_node="">Roraima on a budget, lost world in Venezuela</span></a></li></ul><span data-dcnode-id="720" instrument_node="">
</span><h2 data-dcnode-id="712"><span class="ez-toc-section" data-dcnode-id="719" id="_THE_GUIANAS_travel_cost"></span><span data-dcnode-id="718" instrument_node="">&nbsp;</span><strong data-dcnode-id="714"><span data-dcnode-id="717" instrument_node="">THE GUIANAS </span><em data-dcnode-id="715"><span data-dcnode-id="716" instrument_node="">travel cost</span></em></strong><span class="ez-toc-section-end" data-dcnode-id="713"></span></h2><span data-dcnode-id="711" instrument_node="">
</span><p data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">Guyana, Suriname and French Guiana collectively called the Guianas are three territories located on the North Eastern coast of South America . Getting to the Guianas is not easy and the countries are expenses, they are skipped by most travellers in South America for these reasons. We briefly set foot in Guyana hiking in Venezuela, but since it is European territories we did not want to go through visa processes to travel here. Since we did not travel through the Guyanas I am including this based on what I heard and found online.</span></p><span data-dcnode-id="708" instrument_node="">
</span><p data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">&nbsp;– French Guiana is a part of France, and thus of the EU, here you enter the EU while still standing in South America. There are not many touristy sites in the country.</span></p><span data-dcnode-id="705" instrument_node="">
</span><p data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">-Travel Budget French Guiana</span></p><span data-dcnode-id="702" instrument_node="">
</span><p data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">French Guiana is a very expensive country, even as a budget traveller you will find it hard to get away by spending less than $80 per day. Since there is no backpacker facilities expect to pay over $50 per night for accommodation.</span></p><span data-dcnode-id="699" instrument_node="">
</span><p data-dcnode-id="697"><span data-dcnode-id="698" instrument_node="">– Suriname was formerly known as Dutch Guiana, the smallest country in South America only has a population of 550 000, Dutch is the official language and people drive on the left hand side. Over 90% of Suriname is covered in primeval rainforest&nbsp;and there are some awesome fauna and flora to experience here, river dolphins, 1000 pound leather back turtles laying their eggs on the beach and the gold footed tamarind monkeys.</span></p><span data-dcnode-id="696" instrument_node="">
</span><p data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">-Travel Budget Suriname</span></p><span data-dcnode-id="693" instrument_node="">
</span><p data-dcnode-id="691"><span data-dcnode-id="692" instrument_node="">Suriname sounds like the cheapest of the three, you should be able to find accommodation for under $25 and get away with a budget of round $60 per day.</span></p><span data-dcnode-id="690" instrument_node="">
</span><p data-dcnode-id="688"><span data-dcnode-id="689" instrument_node="">– Guyana located between Venezuela and Brazil, bordered by the Atlantic Ocean in the north is South America’s only English speaking country. This year (2018) Guyana was a popular destination under travel bloggers. Traveling independent I heard Guyana is a very difficult country to get around in. Visitors go to see the incredible nature, with sites like the tallest free falling&nbsp;waterfall&nbsp;in the world (Kaieteur Falls). There is an incredible diversity of animals in the Amazon jungle and savannahs in Guyana, you can see the massive freshwater fish, Arapima, giant anteaters, piranhas, tarantulas and even jaguars if you are a birder the more than 900 species of exotic birds makes this a bucket list spot.</span></p><span data-dcnode-id="687" instrument_node="">
</span><p data-dcnode-id="685"><span data-dcnode-id="686" instrument_node="">-Travel Budget Guyana</span></p><span data-dcnode-id="684" instrument_node="">
</span><p data-dcnode-id="682"><span data-dcnode-id="683" instrument_node="">You should be able to find accommodation in a guesthouse for about $40 per night. and get away with a budget of round $70 per day.</span></p><span data-dcnode-id="681" instrument_node="">
</span><p class="has-text-align-center has-medium-font-size" data-dcnode-id="679"><span data-dcnode-id="680" instrument_node="">Good stuff to Pack</span></p><span data-dcnode-id="678" instrument_node="">
</span><p data-dcnode-id="674"><strong data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">Good travel and hiking Backpack</span></strong><span data-dcnode-id="675" instrument_node=""> – you want something that is easy and comfortable to carry, that is a good hiking pack if you are going to Patagonia, but that is easy to open like a good travel pack.</span></p><span data-dcnode-id="673" instrument_node="">
</span><p data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">This is hard to find, a great hiking backpack that is not just top loading.</span></p><span data-dcnode-id="670" instrument_node="">

</span><p data-dcnode-id="479"><span data-dcnode-id="480" instrument_node="">Which country would you recommend for safe and multiple independent hikes? I was thinking about Bolivia but you said it's not very safe...</span></p><span data-dcnode-id="478" instrument_node="">

</span><p data-dcnode-id="457"><span data-dcnode-id="458" instrument_node="">Hello, Jan. We didn't do much hiking in Bolivia we read and heard from people that sometimes hikers were bothered and not welcome at some places. We did quite a lot of independent hiking in Peru and Chile and absolutely loved both countries. In Peru, the best areas for hiking (in our opinion) are the Sacred Valley near Cusco and the Huaraz region. In Chile, we absolutely loved Patagonia and the Carretera Austral. It's very safe, great for hitchhiking, hiking, wild camping. Peru is quite a bit cheaper than Chile.
Cheers</span></p><span data-dcnode-id="456" instrument_node="">

</span><p class="trellis-comment-date" data-dcnode-id="442"><span data-dcnode-id="443" instrument_node="">Saturday 8th of May 2021</span></p><span data-dcnode-id="441" instrument_node="">

</span><p data-dcnode-id="434"><span data-dcnode-id="435" instrument_node="">Hello Stingies!
I'm currently planning a 6-month turning to a 9-month trip to South America when it's okay to travel again. This is a fantastic post and probably the only one that I found useful - every other post is saying the same things that I've proven wrong in other posts like yours. Well, my question is basically, what kind of activities did you do and which "luxuries" do you guys leave out while traveling?
Currently, I'm looking at 6000€ with a motorcycle for 270 days. I like to do activities and they've stacked up to a quarter of the costs. Any tips for cutting costs?</span></p><span data-dcnode-id="433" instrument_node="">
</span><p data-dcnode-id="431"><span data-dcnode-id="432" instrument_node="">All the best,
Jesper</span></p><span data-dcnode-id="430" instrument_node="">

</span><p data-dcnode-id="412"><span data-dcnode-id="413" instrument_node="">Hello Jesper, thanks for reading glad you found the post helpful! During our South America travels we saved the most on food and accommodation, so I will definitely recommend camping and cooking for yourself where possible. Take a tent, a stove (gas available everywhere) and a lifestraw bottle not to have to buy drinking water the whole time. We also spent money on activities, to do stuff in awesome locations is why we travel to certain countries. We always try to do activities independent if possible. In South America there are so many incredible hikes you can do independent while camping take a look on our blog around Peru and Chile are many treks we did. Sure you are going to have a great time. Safe Travels!</span></p><span data-dcnode-id="411" instrument_node="">

</span><p data-dcnode-id="323"><span data-dcnode-id="324" instrument_node="">Hi there! This is an awesome post - thank you SO MUCH for sharing. I'm planning on doing a month long trip to South America next summer. I haven't decided exactly which countries I'm going to yet other than Peru to hike Machu Pichu. If you could give a guesstimate, how much would you say I should plan on saving for a month long trip to SA? I understand it would depend on where I go and the quality of living I want while I'm there. I won't be staying in 5 star hotels... more hostels and such. Maybe a little bit of camping here and there, but not much. Just looking for low-ball and high-ball estimate so I can start saving. Again, thank you so much  for this post and taking the time to answer my question!!!</span></p><span data-dcnode-id="322" instrument_node="">
