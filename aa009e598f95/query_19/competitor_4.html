</span><p data-dcnode-id="2512"><span data-dcnode-id="2518" instrument_node="">Over the last couple of years we have visited South America several times with the cost varying greatly depending on length of trip and countries visited. Our longest trip was a 13 month shoestring budget backpacking trip through Latin America. We also explored South America as mid-range backpackers and more comfortable budget travelers. In this article we discuss cost of traveling each country in South America with different traveling styles </span><strong data-dcnode-id="2516"><span data-dcnode-id="2517" instrument_node="">Backpacking, Backpacking on a Shoestring Budget </span></strong><span data-dcnode-id="2515" instrument_node="">and</span><strong data-dcnode-id="2513"><span data-dcnode-id="2514" instrument_node=""> Holiday style travel</span></strong></p><span data-dcnode-id="2511" instrument_node="">
</span><p class="has-text-align-center has-normal-font-size" data-dcnode-id="2508"><a data-dcnode-id="2509" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stingynomads.com/best-places-to-visit-south-america/"><span data-dcnode-id="2510" instrument_node="">See what we think is the 29 Best Places to Visit in South America</span></a></p><span data-dcnode-id="2507" instrument_node="">

</span><p data-dcnode-id="2498"><span data-dcnode-id="2499" instrument_node="">It is important to remember that there is a dramatic variation in price between countries when planning a trip.&nbsp;&nbsp;Bolivia, Equador and Peru are traditionally seen as the cheaper countries to travel, each extensively traveled by a large numbers of budget travelers. Chile, Brazil and Argentina are relatively more expensive, almost reaching European prices. Colombia is sort of mid-range between the two groups and the cost of travel in Venezuela is so low it is in a budget travel category of its own. Be aware that crime is a very realistic consideration when traveling here and purchasing and organizing anything is difficult in this torn apart country.</span></p><span data-dcnode-id="2497" instrument_node="">

;travel cost"><span data-dcnode-id="2390" instrument_node="">CHILE&nbsp;travel cost</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="2381"><a class="ez-toc-link ez-toc-heading-20" data-dcnode-id="2386" href="#Travel_Budget_for_Chile" title="Travel Budget for Chile"><span data-dcnode-id="2387" instrument_node="">Travel Budget for Chile</span></a><ul class="ez-toc-list-level-3" data-dcnode-id="2382"><li class="ez-toc-heading-level-3" data-dcnode-id="2383"><a class="ez-toc-link ez-toc-heading-21" data-dcnode-id="2384" href="#South_America_Tours_-_Patagonia_Adventure_with_G-Adventures" title="South America Tours – Patagonia Adventure with G-Adventures"><span data-dcnode-id="2385" instrument_node="">South America Tours – Patagonia Adventure with G-Adventures</span></a></li></ul></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="2374"><a class="ez-toc-link ez-toc-heading-22" data-dcnode-id="2379" href="#COLOMBIA_travel_cost" title="COLOMBIA travel cost"><span data-dcnode-id="2380" instrument_node="">COLOMBIA travel cost</span></a><ul class="ez-toc-list-level-3" data-dcnode-id="2375"><li class="ez-toc-heading-level-3" data-dcnode-id="2376"><a class="ez-toc-link ez-toc-heading-23" data-dcnode-id="2377" href="#South_America_Tours_-_Colombia_with_G-Adventures" title="South America Tours – Colombia with G-Adventures"><span data-dcnode-id="2378" instrument_node="">South America Tours – Colombia with G-Adventures</span></a></li></ul></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="2367"><a class="ez-toc-link ez-toc-heading-24" data-dcnode-id="2372" href="#ECUADOR_travel_cost" title="ECUADOR&nbsp;travel cost"><span data-dcnode-id="2373" instrument_node="">ECUADOR&nbsp;travel cost</span></a><ul class="ez-toc-list-level-3" data-dcnode-id="2368"><li class="ez-toc-heading-level-3" data-dcnode-id="2369"><a class="ez-toc-link ez-toc-heading-25" data-dcnode-id="2370" href="#South_America_Tours_-_G-Adventures_Galagapos_wild_life" title="South America Tours – G-Adventures Galagapos wild life"><span data-dcnode-id="2371" instrument_node="">South America Tours – G-Adventures Galagapos wild life</span></a></li></ul></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="2364"><a class="ez-toc-link ez-toc-heading-26" data-dcnode-id="2365" href="#PARAGUAY_travel_cost" title="PARAGUAY travel cost"><span data-dcnode-id="2366" instrument_node="">PARAGUAY travel cost</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="2357"><a class="ez-toc-link ez-toc-heading-27" data-dcnode-id="2362" href="#_PERU_travel_cost" title="&nbsp;PERU travel cost"><span data-dcnode-id="2363" instrument_node="">&nbsp;PERU travel cost</span></a><ul class="ez-toc-list-level-3" data-dcnode-id="2358"><li class="ez-toc-heading-level-3" data-dcnode-id="2359"><a class="ez-toc-link ez-toc-heading-28" data-dcnode-id="2360" href="#South_America_Tours_-_G-Adventures_Iconic_Peru_travels" title="South America Tours – G-Adventures Iconic Peru travels"><span data-dcnode-id="2361" instrument_node="">South America Tours – G-Adventures Iconic Peru travels</span></a></li></ul></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="2354"><a class="ez-toc-link ez-toc-heading-29" data-dcnode-id="2355" href="#URUGUAY_travel_cost" title="URUGUAY. travel cost"><span data-dcnode-id="2356" instrument_node="">URUGUAY. travel cost</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="2351"><a class="ez-toc-link ez-toc-heading-30" data-dcnode-id="2352" href="#VENEZUELA_travel_cost" title="VENEZUELA travel cost"><span data-dcnode-id="2353" instrument_node="">VENEZUELA travel cost</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="2348"><a class="ez-toc-link ez-toc-heading-31" data-dcnode-id="2349" href="#_THE_GUIANAS_travel_cost" title="&nbsp;THE GUIANAS travel cost"><span data-dcnode-id="2350" instrument_node="">&nbsp;THE GUIANAS travel cost</span></a></li></ul></nav></div><span data-dcnode-id="2344" instrument_node="">
</span><h2 data-dcnode-id="2339"><span class="ez-toc-section" data-dcnode-id="2343" id="South_America_on_a_SHOESTRING_BUDGET"></span><strong data-dcnode-id="2341"><span data-dcnode-id="2342" instrument_node="">South America on a SHOESTRING BUDGET</span></strong><span class="ez-toc-section-end" data-dcnode-id="2340"></span></h2><span data-dcnode-id="2338" instrument_node="">
</span><p data-dcnode-id="2336"><span data-dcnode-id="2337" instrument_node="">-Traveling on a very tight budget we spent $3881 in 275 days (over 8 months) so an average budget of $14.11 each per day. We camped a lot, hiked many of the most popular trails on the continent independent and did a lot of hitchhiking. This was in 2016, so even when adjusting at a very steep inflation rate it is still possible to do this for less than $20 per day.</span></p><span data-dcnode-id="2335" instrument_node="">
</span><p data-dcnode-id="2332"><strong data-dcnode-id="2333"><span data-dcnode-id="2334" instrument_node="">Backpacking budget is not only dependent on price!</span></strong></p><span data-dcnode-id="2331" instrument_node="">
</span><p data-dcnode-id="2329"><span data-dcnode-id="2330" instrument_node="">-The cost&nbsp;of travel on a shoestring budget in each country is not only dependent on price. Some examples; Chile is an expensive, but safe country that is very camping and hitchhike friendly and it is possible to hike independent. In contrast Bolivia is a cheap country, but crime can be a problem and activities are expensive. Consequently we spent more per day in Bolivia than Chile.</span></p><span data-dcnode-id="2328" instrument_node="">
</span><h2 data-dcnode-id="2323"><span class="ez-toc-section" data-dcnode-id="2327" id="South_America_on_a_TOUR"></span><strong data-dcnode-id="2325"><span data-dcnode-id="2326" instrument_node="">South America on a TOUR</span></strong><span class="ez-toc-section-end" data-dcnode-id="2324"></span></h2><span data-dcnode-id="2322" instrument_node="">
</span><p data-dcnode-id="2320"><span data-dcnode-id="2321" instrument_node="">Traveling solo or figuring everything out for yourself is not everybody’s idea of fun, there are organised overland tours exploring South America, where all you have to do is enjoy the ride. Check out some of world renowned company, G-adventures’ programs.</span></p><span data-dcnode-id="2319" instrument_node="">
</span><p data-dcnode-id="2315"><a data-dcnode-id="2317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.anrdoezrs.net/links/8989289/type/dlg/https%3A//www.gadventures.com/trips/lima-to-buenos-aires-adventure/SPMB/" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="2318" instrument_node="">Lima to Buenos Aires</span></a><span data-dcnode-id="2316" instrument_node=""> – an epic adventure: beginning in Lima and ending in Buenos Aires,&nbsp; 35-full days. You’ll hike the Inca Trail, cross the Salt Flats of Bolivia by 4×4, and feel like a sophisticate sipping wine in Argentina. Along the way, you’ll engage with local cultures with a small group of other young travellers to back you up.</span></p><span data-dcnode-id="2314" instrument_node="">
</span><h2 data-dcnode-id="2309"><span class="ez-toc-section" data-dcnode-id="2313" id="South_America_on_a_BACKPACKING_BUDGET"></span><strong data-dcnode-id="2311"><span data-dcnode-id="2312" instrument_node="">South America on a BACKPACKING BUDGET</span></strong><span class="ez-toc-section-end" data-dcnode-id="2310"></span></h2><span data-dcnode-id="2308" instrument_node="">
</span><p data-dcnode-id="2300"><span data-dcnode-id="2307" instrument_node="">-A Comfortable </span><strong data-dcnode-id="2305"><span data-dcnode-id="2306" instrument_node="">backpacker’s budget</span></strong><span data-dcnode-id="2304" instrument_node=""> when sleeping in a hostel dormitory bed, cooking for yourself or eating in cheap local restaurants, being selective on activities and traveling with public transport should be around </span><strong data-dcnode-id="2302"><span data-dcnode-id="2303" instrument_node="">$35 per day</span></strong><span data-dcnode-id="2301" instrument_node="">, so $1000 per month.</span></p><span data-dcnode-id="2299" instrument_node="">
</span><h2 data-dcnode-id="2294"><span class="ez-toc-section" data-dcnode-id="2298" id="HOLIDAY_BUDGET_South_America"></span><strong data-dcnode-id="2296"><span data-dcnode-id="2297" instrument_node="">HOLIDAY BUDGET South America</span></strong><span class="ez-toc-section-end" data-dcnode-id="2295"></span></h2><span data-dcnode-id="2293" instrument_node="">
</span><p data-dcnode-id="2291"><span data-dcnode-id="2292" instrument_node="">-Giving an estimate for holiday travel is not really possible; double the backpacking figure for a comfortable, budget holiday trip, double again for traveling in more luxury. I try to give some prices for individual countries.</span></p><span data-dcnode-id="2290" instrument_node="">

</span><h2 data-dcnode-id="2091"><span class="ez-toc-section" data-dcnode-id="2096" id="ARGENTINA_travel_cost"></span><span data-dcnode-id="2095" instrument_node="">ARGENTINA </span><em data-dcnode-id="2093"><span data-dcnode-id="2094" instrument_node="">travel cost</span></em><span class="ez-toc-section-end" data-dcnode-id="2092"></span></h2><span data-dcnode-id="2090" instrument_node="">
</span><p data-dcnode-id="2086"><strong data-dcnode-id="2088"><span data-dcnode-id="2089" instrument_node="">At the time of updating this post (November 2018) Argentina is a cheap to travel again! With the </span></strong><span data-dcnode-id="2087" instrument_node="">exchange rate going from ARS 17 to 37 for one USD in less than a year goods and services priced for locals dropped in price by about 50%. I am not going to go into the yo-yo state of Argentina’s economy, but in our visits here went from cheap too expensive to cheap again. Until December 2015 the Argentinian Peso had a fixed exchange rate. Similar to Venezuela this created a huge US dollar black market where you could buy 50-100% more pesos per dollar. This stopped when Argentina got rid of the official exchange rate as far as we are aware. Argentina, like Chile, is safe, with top quality products and services, the closest you will find to European in South America. You can find bargains&nbsp; now&nbsp; on all local produce, meals in local restaurants, drinks in local bars, Argentinian wine and beer, even Argentinian beef is cheap and expect to pay less for museum admissions,&nbsp;taxi and bus rides and local guides and excursions.</span></p><span data-dcnode-id="2085" instrument_node="">
</span><p data-dcnode-id="2083"><span data-dcnode-id="2084" instrument_node="">Mendoza and Bariloche are regarded as the most expensive places to travel in Argentina and hostel prices here was definitely higher than in Buenos Aires. Mendoza is renowned for its wines, but tasting Malbecs at different estates is definitely not a budget activity, expect to pay $150-200 for an organised tasting tour of the 3 major wine areas; Maipú, Luján de Cuyo, and Uco Valley.&nbsp;Doing it independent you can do it for about half, but will definitely see and taste less.</span></p><span data-dcnode-id="2082" instrument_node="">
</span><p data-dcnode-id="2080"><span data-dcnode-id="2081" instrument_node="">Flights and hotels are priced in dollars, so here you are not going to find massive bargains.</span></p><span data-dcnode-id="2079" instrument_node="">

</span><p data-dcnode-id="2029"><span data-dcnode-id="2030" instrument_node="">We spent ARS 4238 ($ 212) in 17 days, thus ARS 297 &nbsp;($ 13.97) each per day including&nbsp;all food, transport and other expenses. During our last visit to Argentina the peso was much stronger, we still managed to backpack it on a very frugal budget by hitchhiking, camping and couchsurfing, like Chile it is a safe country allowing to travel in such a manner.</span></p><span data-dcnode-id="2028" instrument_node="">
</span><p data-dcnode-id="2025"><strong data-dcnode-id="2026"><span data-dcnode-id="2027" instrument_node="">FOOD</span></strong></p><span data-dcnode-id="2024" instrument_node="">
</span><ul data-dcnode-id="2017"><li data-dcnode-id="2022"><span data-dcnode-id="2023" instrument_node="">Food is definitely one of the highlights in Argentina. They have a reputation for good steak, wine and mate and this is well deserved. Steak&nbsp;in a restaurant and on the barbecue was first class.</span></li><li data-dcnode-id="2020"><span data-dcnode-id="2021" instrument_node="">A nice Bife de Chorizo (sirloin steak) is about ARS 500 ($13) in a restaurant in Buenos Aires.</span></li><li data-dcnode-id="2018"><span data-dcnode-id="2019" instrument_node="">Argentinians are addicted to Dulce de leche (caramel/boiled condensed milk), big containers are cheap. We ate lots of dulce de leche on Maria biscuits during hikes. &nbsp;Ice cream and alfajores sweets is something not to be missed! The top of the range sweets Cachafas Afajores and Freddo ice cream is worth buying once to taste. Falling back on Grido ice cream and Guymallen alfajores for a fraction of the price is a good budget strategy.</span></li></ul><span data-dcnode-id="2016" instrument_node="">
</span><p data-dcnode-id="2013"><a data-dcnode-id="2014" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/product/1786570661/ref%3Das_li_tl%3Fie%3DUTF8%26camp%3D1789%26creative%3D9325%26creativeASIN%3D1786570661%26linkCode%3Das2%26tag%3Dstingynomads-20%26linkId%3D1cfecafa79a42c4d748c5ee3e2fdb5de" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="2015" instrument_node="">Lonely Planet Argentina Travel Guide</span></a></p><span data-dcnode-id="2012" instrument_node="">
</span><p data-dcnode-id="2009"><strong data-dcnode-id="2010"><span data-dcnode-id="2011" instrument_node="">TRANSPORT</span></strong></p><span data-dcnode-id="2008" instrument_node="">
</span><p data-dcnode-id="2006"><span data-dcnode-id="2007" instrument_node="">Despite the favourable currency for traveling the bus prices that I find online is still high. A bus from Santiago to Bariloche is about $70 for a 24 hour bus ride, not that much cheaper than what we experienced a couple of years agol The buses are very comfortable and by taking a night bus you can save on accommodation.</span></p><span data-dcnode-id="2005" instrument_node="">
</span><p data-dcnode-id="2003"><span data-dcnode-id="2004" instrument_node="">We broke our hitchhiking records in Argentina by traveling almost 4000 km in 2 rides from Punta Arenas in Chile all the way to Buenos Aires. This trip would have cost us $180 by bus.&nbsp;I will not recommend&nbsp; hitchhiking around the cities it took us 2 days to get out of Buenos Aires!</span></p><span data-dcnode-id="2002" instrument_node="">
</span><p data-dcnode-id="1999"><strong data-dcnode-id="2000"><span data-dcnode-id="2001" instrument_node="">ACCOMMODATION</span></strong></p><span data-dcnode-id="1998" instrument_node="">
</span><p data-dcnode-id="1992"><span data-dcnode-id="1997" instrument_node="">In Buenos Aires a dormitory bed in a hostel costs $6-10. A budget double room starts at $25. Camping&nbsp;at El Chalten costs about $5&nbsp; per day, a dormitory bed in a hostel here starts at $10.</span><ins class="bookingaff" data-aid="1658153" data-cc1="ar" data-dcnode-id="1996" data-height="230" data-lang="en" data-prod="sbp" data-target_aid="1658153" data-width="500"></ins><br data-dcnode-id="1995"></p><span data-dcnode-id="1991" instrument_node="">
</span><p data-dcnode-id="1988"><strong data-dcnode-id="1989"><span data-dcnode-id="1990" instrument_node="">VISA FEES FOR ARGENTINA</span></strong></p><span data-dcnode-id="1987" instrument_node="">
</span><p data-dcnode-id="1985"><span data-dcnode-id="1986" instrument_node="">There were not visa fee for Russians or South Africans. Australian, US and Canadian passport holders do not require a visa, there used to be a reciprocal fee to enter Argentina, I understand that was recently cancelled.</span></p><span data-dcnode-id="1984" instrument_node="">
</span><p data-dcnode-id="1981"><strong data-dcnode-id="1982"><span data-dcnode-id="1983" instrument_node="">BUDGET ACTIVITIES</span></strong></p><span data-dcnode-id="1980" instrument_node="">
</span><ul data-dcnode-id="1977"><li data-dcnode-id="1978"><span data-dcnode-id="1979" instrument_node="">Hike and Camp at El Chalten, the route and camping on route is free.</span></li></ul><span data-dcnode-id="1976" instrument_node="">
</span><h3 data-dcnode-id="1974"><span data-dcnode-id="1975" instrument_node="">South America Tours – Explore Argentina with G-Adventures</span></h3><span data-dcnode-id="1973" instrument_node="">
</span><p data-dcnode-id="1968"><span data-dcnode-id="1972" instrument_node="">Looking to experience amazing </span><a data-dcnode-id="1970" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.anrdoezrs.net/links/8989289/type/dlg/https%3A//www.gadventures.com/trips/highlights-of-chile-and-argentina/SCCA/%3Fref%3Dasearch" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="1971" instrument_node="">highlights of Chile and Argentina</span></a><span data-dcnode-id="1969" instrument_node="">? Visit coastal Valparaíso, get active in the adventure-sport mecca of Pucón, and journey to a genuine gaucho ranch outside of quaint, lakeside Bariloche, before finishing up in the iconic “don’t cry for me” cosmopolis of Buenos Aires. Get yourself to this southern part of the world and go home recharged.</span></p><span data-dcnode-id="1967" instrument_node="">
</span><h2 data-dcnode-id="1961"><span class="ez-toc-section" data-dcnode-id="1966" id="BOLIVIA_travel_cost"></span><span data-dcnode-id="1965" instrument_node="">BOLIVIA </span><em data-dcnode-id="1963"><span data-dcnode-id="1964" instrument_node="">travel cost</span></em><span class="ez-toc-section-end" data-dcnode-id="1962"></span></h2><span data-dcnode-id="1960" instrument_node="">
</span><p data-dcnode-id="1958"><span data-dcnode-id="1959" instrument_node="">Bolivia is another South American country with a lot to offer adventurous tourists. It is known as the cheapest country in South America and is thus great to travel if you are on a budget. If you love to get your adrenaline pumping there are some unique opportunities in Bolivia, one of the easiest 6000m peaks to climb, cycle the most dangerous road in the world and do some spectacular hikes.</span></p><span data-dcnode-id="1957" instrument_node="">
</span><p data-dcnode-id="1955"><span data-dcnode-id="1956" instrument_node="">Food and accommodation were cheap in Bolivia, but activities and tours were expensive like in all other countries. We were discouraged from hiking and camping on our own, due to muggings and robberies. So traveling on a shoestring budget Bolivia ended up costing us more than many other countries on the continent. If you however travel by bus and stay in hostels during your travels Bolivia will probably be your cheapest country.</span></p><span data-dcnode-id="1954" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1946"><figure class="aligncenter" data-dcnode-id="1947"><a data-dcnode-id="1950" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stingynomads.com/wp-content/uploads/2016/10/bolivia-3.jpg"><noscript data-dcnode-id="1952"><span data-dcnode-id="1953" instrument_node="">&lt;img loading="lazy" width="700" height="700" src="https://stingynomads.com/wp-content/uploads/2016/10/bolivia-3.jpg" alt="Bolivia -The Uyuni Salt desert was one of the highlights of South America! South America travel budget" class="wp-image-13695" srcset="https://stingynomads.com/wp-content/uploads/2016/10/bolivia-3.jpg 700w, https://stingynomads.com/wp-content/uploads/2016/10/bolivia-3-150x150.jpg 150w, https://stingynomads.com/wp-content/uploads/2016/10/bolivia-3-300x300.jpg 300w, https://stingynomads.com/wp-content/uploads/2016/10/bolivia-3-510x510.jpg 510w, https://stingynomads.com/wp-content/uploads/2016/10/bolivia-3-370x370.jpg 370w, https://stingynomads.com/wp-content/uploads/2016/10/bolivia-3-570x570.jpg 570w, https://stingynomads.com/wp-content/uploads/2016/10/bolivia-3-580x580.jpg 580w" sizes="(max-width: 760px) calc(100vw - 40px), 720px"&gt;</span></noscript><img alt="Bolivia -The Uyuni Salt desert was one of the highlights of South America! South America travel budget" class="wp-image-13695 lazyload" data-dcnode-id="1951" data-pin-media="https://stingynomads.com/wp-content/uploads/2016/10/bolivia-3.jpg" data-src="https://stingynomads.com/wp-content/uploads/2016/10/bolivia-3.jpg.webp" data-srcset="https://stingynomads.com/wp-content/uploads/2016/10/bolivia-3.jpg.webp 700w, https://stingynomads.com/wp-content/uploads/2016/10/bolivia-3-150x150.jpg.webp 150w, https://stingynomads.com/wp-content/uploads/2016/10/bolivia-3-300x300.jpg.webp 300w, https://stingynomads.com/wp-content/uploads/2016/10/bolivia-3-510x510.jpg.webp 510w, https://stingynomads.com/wp-content/uploads/2016/10/bolivia-3-370x370.jpg.webp 370w, https </span><ul data-dcnode-id="1857"><li data-dcnode-id="1876"><span data-dcnode-id="1877" instrument_node="">Similar to Peru a set menu&nbsp;“menu del dia” at local restaurants is good value for money at around 20 BOB ($3). It is normally a main course, a drink and sometimes a small desert.</span></li><li data-dcnode-id="1874"><span data-dcnode-id="1875" instrument_node="">Want to eat a Bolivian style set meal gone upmarket? Try ‘Popular Cocina Boliviana’ in La Paz. Bolivian food gone Gourmet style, great price for what you get at about 50 BOB ($7) for a set meal</span></li><li data-dcnode-id="1872"><span data-dcnode-id="1873" instrument_node="">We often bought food at the market and cooked for ourselves, vegetables some interesting and delicious fruit was very cheap here. You can usually find a meal at the market anytime of the day, we enjoyed the breakfasts.</span></li><li data-dcnode-id="1860"><em data-dcnode-id="1870"><span data-dcnode-id="1871" instrument_node="">You have to eat a couple of</span></em><em data-dcnode-id="1868"><span data-dcnode-id="1869" instrument_node=""> salteñas</span></em><span data-dcnode-id="1867" instrument_node="">(the Bolivia version of </span><em data-dcnode-id="1865"><span data-dcnode-id="1866" instrument_node="">empanada</span></em><span data-dcnode-id="1864" instrument_node="">) or &nbsp;</span><em data-dcnode-id="1862"><span data-dcnode-id="1863" instrument_node="">tucumanas&nbsp;</span></em><span data-dcnode-id="1861" instrument_node="">(a deep friend salteña) 3BOB ($0.50)</span></li><li data-dcnode-id="1858"><span data-dcnode-id="1859" instrument_node="">Don’t drink the tap water in Bolivia.</span></li></ul><span data-dcnode-id="1856" instrument_node="">
</span><p data-dcnode-id="1853"><strong data-dcnode-id="1854"><span data-dcnode-id="1855" instrument_node="">TRANSPORT</span></strong></p><span data-dcnode-id="1852" instrument_node="">
</span><ul data-dcnode-id="1838"><li data-dcnode-id="1850"><span data-dcnode-id="1851" instrument_node="">Roads are quite dangerous in Bolivia use a reputable company such as MEM or El Dorado</span></li><li data-dcnode-id="1848"><span data-dcnode-id="1849" instrument_node="">Cost for a one way bus ticket between La Paz and Sucre an 11 hour, 700km ride are as follows:</span></li><li data-dcnode-id="1846"><span data-dcnode-id="1847" instrument_node="">45 ($6.50) for a seat on a local bus.</span></li><li data-dcnode-id="1844"><span data-dcnode-id="1845" instrument_node="">semi-cama seat (140-degree reclining seats) Bs 117 ($17)</span></li><li data-dcnode-id="1839"><span data-dcnode-id="1843" instrument_node="">full cama seat (180-degree reclining seats) Bs. 180 (</span><strong data-dcnode-id="1841"><span data-dcnode-id="1842" instrument_node="">US$26</span></strong><span data-dcnode-id="1840" instrument_node="">)</span></li></ul><span data-dcnode-id="1837" instrument_node="">
</span><p data-dcnode-id="1834"><strong data-dcnode-id="1835"><span data-dcnode-id="1836" instrument_node="">Popular Activities in Bolivia</span></strong></p><span data-dcnode-id="1833" instrument_node="">
</span><p data-dcnode-id="1831"><span data-dcnode-id="1832" instrument_node="">These activities are pricey, but why come if you are not going to experience these things?</span></p><span data-dcnode-id="1830" instrument_node="">
</span><ul data-dcnode-id="1823"><li data-dcnode-id="1828"><span data-dcnode-id="1829" instrument_node="">Cycle the ‘death road’ cost is about $80</span></li><li data-dcnode-id="1826"><span data-dcnode-id="1827" instrument_node="">Salar de Uyuni tour of the salt flats</span></li><li data-dcnode-id="1824"><span data-dcnode-id="1825" instrument_node="">Climb the 6000m peak of Huayana Putosi prices vary between $150 – $300</span></li></ul><span data-dcnode-id="1822" instrument_node="">
</span><p data-dcnode-id="1819"><strong data-dcnode-id="1820"><span data-dcnode-id="1821" instrument_node="">SALT FLATS TOUR SALAR DE UYUNI</span></strong></p><span data-dcnode-id="1818" instrument_node="">
</span><p data-dcnode-id="1816"><span data-dcnode-id="1817" instrument_node="">You can do this independent if you have a motorbike, bicycle or Jeep. Otherwise like us you will have to take a tour. It was expensive, but amazing. The standard tour takes 3 days and most tours take you to the same sites. The cheapest tour we could find was $93 (BOB 645) with and additional $29 (BOB 206) for park fees. This significantly inflated our budget. Most premium tours cost between $150 – 200</span></p><span data-dcnode-id="1815" instrument_node="">
</span><p data-dcnode-id="1809"><span data-dcnode-id="1814" instrument_node="">Our </span><a data-dcnode-id="1811" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stingynomads.com/uyuni/"><em data-dcnode-id="1812"><span data-dcnode-id="1813" instrument_node="">Uyuni saltflats on a backpacker budget </span></em></a><span data-dcnode-id="1810" instrument_node="">guide.</span></p><span data-dcnode-id="1808" instrument_node="">

</span><h3 data-dcnode-id="1794"><span data-dcnode-id="1795" instrument_node="">South America Tours – See Bolivia with G-Adventures</span></h3><span data-dcnode-id="1793" instrument_node="">
</span><p data-dcnode-id="1783"><a data-dcnode-id="1791" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.anrdoezrs.net/links/8989289/type/dlg/https%3A//www.gadventures.com/trips/bolivia-discovery/BBDR/%3Fref%3Dasearch" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="1792" instrument_node="">Bolivia Discovery </span></a><span data-dcnode-id="1790" instrument_node="">– 11 Days La Paz to La Paz. From </span><strong data-dcnode-id="1788"><span data-dcnode-id="1789" instrument_node="">La Paz</span></strong><span data-dcnode-id="1787" instrument_node="">, the highest capital city in the world, travel to the crest of the Andes and the middle of nowhere for three days of incredible off-road exploration of the </span><strong data-dcnode-id="1785"><span data-dcnode-id="1786" instrument_node="">Uyuni Salt Flats</span></strong><span data-dcnode-id="1784" instrument_node=""> and surrounding desert altiplano. Take the road less travelled and meet locals for an immersive cultural experience that few travellers get to know.</span></p><span data-dcnode-id="1782" instrument_node="">

</span><p data-dcnode-id="1775"><span data-dcnode-id="1776" instrument_node="">US and South African passport holders do require a visa. You can apply at a neighbouring country (e.g. Peru) SA passport holders it is free, US citizens $160.</span></p><span data-dcnode-id="1774" instrument_node="">
</span><h2 data-dcnode-id="1768"><span class="ez-toc-section" data-dcnode-id="1773" id="BRAZIL_travel_cost"></span><span data-dcnode-id="1772" instrument_node="">BRAZIL </span><em data-dcnode-id="1770"><span data-dcnode-id="1771" instrument_node="">travel cost</span></em><span class="ez-toc-section-end" data-dcnode-id="1769"></span></h2><span data-dcnode-id="1767" instrument_node="">
</span><p data-dcnode-id="1765"><span data-dcnode-id="1766" instrument_node="">Brazil is a fantastic country to travel with some of the most extraordinary places to visit in South America, don’t miss the wild Amazon, the amazing wild life of the Pantanal or the unreal vibe and beaches of Rio de Janeiro. Brazil is not cheap, despite many poor people staying in favelas; food, accommodation and tourist activities are some of the most expensive in South America. Inequality here is massive, similar to my home country South Africa, I could not help to constantly compare Rio to Cape Town.</span></p><span data-dcnode-id="1764" instrument_node="">

ds.com/wp-content/uploads/2016/10/brazil-400x225.jpg.webp 400w" width="1366"></a><figcaption data-dcnode-id="1758"><span data-dcnode-id="1759" instrument_node="">Amazing Brazil, Iguazu Falls, hiking around Ilha Grande, Rio De Janeiro and two weeks on cargo ships on the Amazon.</span></figcaption></figure></div><span data-dcnode-id="1755" instrument_node="">

</span></ul><span data-dcnode-id="1723" instrument_node="">
</span></li><li data-dcnode-id="1719"><strong data-dcnode-id="1720"><span data-dcnode-id="1721" instrument_node="">Shoestring budget </span></strong></li><li data-dcnode-id="1717"><span data-dcnode-id="1718" instrument_node="">$25 per day</span></li><li data-dcnode-id="1714"><strong data-dcnode-id="1715"><span data-dcnode-id="1716" instrument_node="">We spent BRL 2429 &nbsp;($754) in &nbsp;44 days, thus BRL 55 ($ 17) each per day including&nbsp;all food, transport and other expenses.</span></strong></li><li data-dcnode-id="1712"><span data-dcnode-id="1713" instrument_node="">Don’t look at our budget and think it is an cheap country, Brazil is very expensive. Our avg budget for Brazil was good because we spent 12 days on a slow boat/cargo ship on the Amazon during which we could not spend money. We hiked around Ilha Grande island for five days, that was amazing and very cheap. We camped when possible.</span></li></ul><span data-dcnode-id="1710" instrument_node="">
</span><p data-dcnode-id="1706"><span data-dcnode-id="1709" instrument_node="">&nbsp;</span><strong data-dcnode-id="1707"><span data-dcnode-id="1708" instrument_node="">TRANSPORT</span></strong></p><span data-dcnode-id="1705" instrument_node="">
</span><p data-dcnode-id="1703"><span data-dcnode-id="1704" instrument_node="">Long-distance buses are a convenient, but they are pricey a bus ride from Rio de Janeiro to Foz &nbsp;do Iguazu (19 hours) starting at BRL 270 ($70). Buy your ticket at least one day in advance.</span></p><span data-dcnode-id="1702" instrument_node="">
</span><p data-dcnode-id="1700"><span data-dcnode-id="1701" instrument_node="">Local public transportation costs 2-5 BRL per ride. Uber works well in 11 Brazilian cities.</span></p><span data-dcnode-id="1699" instrument_node="">
</span><p data-dcnode-id="1697"><span data-dcnode-id="1698" instrument_node="">We did hitchhike sometimes, but getting rides in Brazil were not always easy and we sometimes ended up taking the bus.</span></p><span data-dcnode-id="1696" instrument_node="">
</span><p data-dcnode-id="1693"><strong data-dcnode-id="1694"><span data-dcnode-id="1695" instrument_node="">ACCOMMODATION</span></strong></p><span data-dcnode-id="1692" instrument_node="">
</span><ul data-dcnode-id="1685"><li data-dcnode-id="1690"><span data-dcnode-id="1691" instrument_node="">Dormitory bed in a nice hostel in Rio starts at about BRL30 ($8)</span></li><li data-dcnode-id="1688"><span data-dcnode-id="1689" instrument_node="">Double room in budget hotel BRL 135 ($35)</span></li><li data-dcnode-id="1686"><span data-dcnode-id="1687" instrument_node="">Stay in luxury 5star hotel from BRL460 ($120)</span></li></ul><span data-dcnode-id="1684" instrument_node="">
</span><p data-dcnode-id="1673"><ins class="bookingaff" data-aid="1654359" data-cc1="br" data-dcnode-id="1677" data-df_num_properties="3" data-height="130" data-lang="en" data-prod="sbp" data-target_aid="1654359" data-width="500"><br data-dcnode-id="1683"><br data-dcnode-id="1681"><a data-dcnode-id="1679" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.booking.com/%3Faid%3D1654359"><span data-dcnode-id="1680" instrument_node="">Booking.com</span></a><br data-dcnode-id="1678"></ins><br data-dcnode-id="1676"></p><span data-dcnode-id="1672" instrument_node="">
</span><p data-dcnode-id="1669"><strong data-dcnode-id="1670"><span data-dcnode-id="1671" instrument_node="">The South of Brazil vs the North</span></strong></p><span data-dcnode-id="1668" instrument_node="">
</span><p data-dcnode-id="1666"><span data-dcnode-id="1667" instrument_node="">The South is much more expensive than the north, our budget was $15 avg until we reached Rio! There are some “must see” tourist attractions in and around Rio de Janeiro that are expensive, e.g.&nbsp;&nbsp;cable car up to Sugarloaf Mountain&nbsp; BRL120 ($30), entrance Christ the Redeemer statue&nbsp;BRL 43 ($11) if you hike up it is a bit cheaper, entrance Foz do Iguacu&nbsp;BRL 65 ($ 17)</span></p><span data-dcnode-id="1665" instrument_node="">

</span><ul data-dcnode-id="1640"><li data-dcnode-id="1659"><span data-dcnode-id="1660" instrument_node="">Cruise down the Amazon on a slowboat.</span></li><li data-dcnode-id="1657"><span data-dcnode-id="1658" instrument_node="">Do a free walking tour in Rio de Janeiro.</span></li><li data-dcnode-id="1643"><span data-dcnode-id="1656" instrument_node="">Free in Rio.

</span><li data-dcnode-id="1653"><span data-dcnode-id="1654" instrument_node="">go to Copacabana beach</span></li><span data-dcnode-id="1652" instrument_node="">
</span><li data-dcnode-id="1650"><span data-dcnode-id="1651" instrument_node="">Walk around the favelas</span></li><span data-dcnode-id="1649" instrument_node="">
</span><li data-dcnode-id="1647"><span data-dcnode-id="1648" instrument_node="">Go to&nbsp;Parque Lage.</span></li><span data-dcnode-id="1646" instrument_node="">

</span></li><li data-dcnode-id="1641"><span data-dcnode-id="1642" instrument_node="">Hike around Ilha Grande with a tent, we only had a week, but you can easily spend 3 weeks walking around this paradise.</span></li></ul><span data-dcnode-id="1639" instrument_node="">

</span><p data-dcnode-id="1627"><span data-dcnode-id="1634" instrument_node="">UK, South African and New Zealand passport holders do not require a visa for entry into Brazil. </span><strong data-dcnode-id="1632"><span data-dcnode-id="1633" instrument_node="">$160 USD</span></strong><span data-dcnode-id="1631" instrument_node="">, Canadians&nbsp;</span><strong data-dcnode-id="1629"><span data-dcnode-id="1630" instrument_node="">$65</span></strong><span data-dcnode-id="1628" instrument_node="">&nbsp;USD, and Australians $35 USD. need visas.</span></p><span data-dcnode-id="1626" instrument_node="">
</span><p data-dcnode-id="1623"><strong data-dcnode-id="1624"><span data-dcnode-id="1625" instrument_node="">&nbsp;about our travels in Brazil</span></strong></p><span data-dcnode-id="1622" instrument_node="">

</span><h3 data-dcnode-id="1606"><span data-dcnode-id="1607" instrument_node="">South America Tours – explore Brazil with G-Adventures</span></h3><span data-dcnode-id="1605" instrument_node="">
</span><p data-dcnode-id="1601"><a data-dcnode-id="1603" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.anrdoezrs.net/links/8989289/type/dlg/https%3A//www.gadventures.com/trips/wonders-of-brazil/SZWB/" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="1604" instrument_node="">Wonders of Brazil</span></a><span data-dcnode-id="1602" instrument_node=""> – From the cobble stoned streets of colonial Paraty to remote interior wilderness, uncover the wonders of Brazil in two exciting weeks. Experience Iguassu Falls — a series of falls so massive it straddles two countries and so intriguing you’ll need two days to fully appreciate the view. Not to be outdone, the Pantanal wetlands are teeming with wildlife like caiman, jaguar, and exotic birds. Finally, trade early morning songbirds for some samba in Rio and the rhythm of the beach. This adventure provides natural and cultural highlights and the best Brazil has to offer.</span></p><span data-dcnode-id="1600" instrument_node="">
</span><h3 data-dcnode-id="1596"><span class="ez-toc-section" data-dcnode-id="1599" id="Travel_Insurance"></span><span data-dcnode-id="1598" instrument_node="">Travel Insurance</span><span class="ez-toc-section-end" data-dcnode-id="1597"></span></h3><span data-dcnode-id="1595" instrument_node="">
</span><p data-dcnode-id="1591"><span data-dcnode-id="1594" instrument_node="">Insurance is essential on a long trip exploring South America. Some problems with standard travel insurance companies; does not cover long term trips since they don’t see it as traveling, you can not take out insurance while traveling, no&nbsp;extending insurance on the road and it often does not cover ‘dangerous activities’ like diving and climbing. Check out what we recommend for your trip </span><a data-dcnode-id="1592" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stingynomads.com/backpackers-travel-insurance/" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="1593" instrument_node="">Insurance for your travels</span></a></p><span data-dcnode-id="1590" instrument_node="">
</span><h2 data-dcnode-id="1584"><span class="ez-toc-section" data-dcnode-id="1589" id="CHILE_travel_cost"></span><span data-dcnode-id="1588" instrument_node="">CHILE&nbsp;</span><em data-dcnode-id="1586"><span data-dcnode-id="1587" instrument_node="">travel cost</span></em><span class="ez-toc-section-end" data-dcnode-id="1585"></span></h2><span data-dcnode-id="1583" instrument_node="">
</span><p data-dcnode-id="1581"><span data-dcnode-id="1582" instrument_node="">Chile was our favorite country traveling in South America, we spent 3 months exploring from the Atacama desert in the north to the south of Patagonia. The landscapes are jaw dropping, from the driest desert in the world to the amazing mountains and glaciers of Patagonia. We did quite a few amazing hikes in Patagonia and if trekking is your thing, add this place to your bucket list. Torres Del Paine is the most famous hike around here for a good reason, many people walk it but it is truly spectacular. Food, accommodation and transport all make Chile more expensive than some of its neighbours.</span></p><span data-dcnode-id="1580" instrument_node="">
</span><p data-dcnode-id="1573"><b data-dcnode-id="1575"><a data-dcnode-id="1578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/product/B07F9NNBJC/ref%3Das_li_tl%3Fie%3DUTF8%26camp%3D1789%26creative%3D9325%26creativeASIN%3DB07F9NNBJC%26linkCode%3Das2%26tag%3Dstingynomads-20%26linkId%3Dc97029ad3c6ef5ef0c068840f679d442" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="1579" instrument_node="">Lonely Planet’s&nbsp;</span></a><i data-dcnode-id="1576"><span data-dcnode-id="1577" instrument_node="">Chile &amp; Easter Island </span></i></b><span data-dcnode-id="1574" instrument_node="">guidebook published October 2018, up-to-date advice on what to see and skip, and what hidden discoveries await you.</span></p><span data-dcnode-id="1572" instrument_node="">

ebp 510w, https://stingynomads.com/wp-content/uploads/2016/10/chile-3-370x370.jpg.webp 370w, https://stingynomads.com/wp-content/uploads/2016/10/chile-3-570x570.jpg.webp 570w, https://stingynomads.com/wp-content/uploads/2016/10/chile-3-580x580.jpg.webp 580w" data-trellis-processed="1" data-webp="true" height="700" id="mv-trellis-img-19" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stingynomads.com/wp-content/uploads/2016/10/chile-3.jpg.webp&amp;raw" srcset="https://stingynomads.com/wp-content/uploads/2016/10/chile-3.jpg.webp 700w, https://stingynomads.com/wp-content/uploads/2016/10/chile-3-150x150.jpg.webp 150w, https://stingynomads.com/wp-content/uploads/2016/10/chile-3-300x300.jpg.webp 300w, https://stingynomads.com/wp-content/uploads/2016/10/chile-3-510x510.jpg.webp 510w, https://stingynomads.com/wp-content/uploads/2016/10/chile-3-370x370.jpg.webp 370w, https://stingynomads.com/wp-content/uploads/2016/10/chile-3-570x570.jpg.webp 570w, https://stingynomads.com/wp-content/uploads/2016/10/chile-3-580x580.jpg.webp 580w" width="700"></a><figcaption data-dcnode-id="1566"><span data-dcnode-id="1567" instrument_node="">Chile – picking so few photos of over 2 months that we spent in this amazing country is harder than traveling here on a $13 per day budget!</span></figcaption></figure></div><span data-dcnode-id="1563" instrument_node="">

</span></li></ul><span data-dcnode-id="1524" instrument_node="">
</span><p data-dcnode-id="1522"><span data-dcnode-id="1523" instrument_node="">We spent CLP 653 600 ($ 979,50) in &nbsp;82 days, thus CLP 11 970 &nbsp;($ 11.95) each per day including&nbsp;all food, transport and other expenses</span></p><span data-dcnode-id="1521" instrument_node="">
</span><p data-dcnode-id="1519"><span data-dcnode-id="1520" instrument_node="">It is an expensive country, but an amazing place to backpack on a budget. How could we travel here with so little money? Camping, hitchhiking and couchsurfing. Chilean people are unreal, we have many stories about their fantastic hospitality. We never used public transport in Chile hitchhiking thousands of kilometers, it was safe and easy and we met some amazing people. &nbsp;We did many multi-day hikes here and because we did it on our own it was very cheap.</span></p><span data-dcnode-id="1518" instrument_node="">
</span><p data-dcnode-id="1515"><strong data-dcnode-id="1516"><span data-dcnode-id="1517" instrument_node="">TRANSPORT</span></strong></p><span data-dcnode-id="1514" instrument_node="">
</span><p data-dcnode-id="1512"><span data-dcnode-id="1513" instrument_node="">Transport is a major expense when traveling here, the buses are quite expensive, especially when you get to Patagonia. The Carraterra Austral is mostly gravel road so the trip from Puerto Montt to Puerto Natales takes 34 hours by bus, costing $80.</span></p><span data-dcnode-id="1511" instrument_node="">
</span><p data-dcnode-id="1509"><span data-dcnode-id="1510" instrument_node="">Flying is sometimes a better option than the bus, if you go to Puerto Natales to hike Torres del Paine it is a lot faster.</span></p><span data-dcnode-id="1508" instrument_node="">
</span><p data-dcnode-id="1506"><span data-dcnode-id="1507" instrument_node="">Hitchhiking worked fantastic for us in Chile all the way from the most Northern to Southern towns, San Pedro de Atacama to Villa O’Higgins.</span></p><span data-dcnode-id="1505" instrument_node="">
</span><p data-dcnode-id="1502"><strong data-dcnode-id="1503"><span data-dcnode-id="1504" instrument_node="">VISA FEES</span></strong></p><span data-dcnode-id="1501" instrument_node="">
</span><p data-dcnode-id="1499"><span data-dcnode-id="1500" instrument_node="">Citizens of US, UK, Canada and Australia and&nbsp; South Africa do not need visa,&nbsp; 108 other countries do so check before going. Australians have to pay a $117.</span></p><span data-dcnode-id="1498" instrument_node="">
</span><p data-dcnode-id="1495"><strong data-dcnode-id="1496"><span data-dcnode-id="1497" instrument_node="">ACCOMMODATION</span></strong></p><span data-dcnode-id="1494" instrument_node="">
</span><p data-dcnode-id="1492"><span data-dcnode-id="1493" instrument_node="">This is the country to travel with a tent, there are campsites everywhere. &nbsp;When there were none we did some ‘bush camping’ and even pitched our tent at a fuel station. We made great friends couchsurfing and off course saved a lot on accommodation in the cities this way. If you look at hostel prices you can see that if you do not camp accommodation in Patagonia will cost you a pretty penny.</span></p><span data-dcnode-id="1491" instrument_node="">
</span><ul data-dcnode-id="1480"><li data-dcnode-id="1489"><span data-dcnode-id="1490" instrument_node="">Camping CLP 2000-7000 ($3 – 10)</span></li><li data-dcnode-id="1487"><span data-dcnode-id="1488" instrument_node="">Hostel in Santiago. Bed in dormitory – $9, Standard double room – $36</span></li><li data-dcnode-id="1485"><span data-dcnode-id="1486" instrument_node="">Double room nice budget hotel Santiago- $80</span></li><li data-dcnode-id="1483"><span data-dcnode-id="1484" instrument_node="">5 star hotel Santiago – $200</span></li><li data-dcnode-id="1481"><span data-dcnode-id="1482" instrument_node="">Hostel in Coiyhaique (Patagonia).&nbsp;Bed in dormitory – $22, Standard double room – $60</span></li></ul><span data-dcnode-id="1479" instrument_node="">
</span><p data-dcnode-id="1468"><ins class="bookingaff" data-aid="1654359" data-cc1="br" data-dcnode-id="1472" data-df_num_properties="3" data-height="130" data-lang="en" data-prod="sbp" data-target_aid="1654359" data-width="500"><br data-dcnode-id="1478"><br data-dcnode-id="1476"><a data-dcnode-id="1474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.booking.com/%3Faid%3D1654359"><span data-dcnode-id="1475" instrument_node="">Booking.com</span></a><br data-dcnode-id="1473"></ins><br data-dcnode-id="1471"></p><span data-dcnode-id="1467" instrument_node="">
</span><h3 data-dcnode-id="1465"><span data-dcnode-id="1466" instrument_node="">South America Tours – Patagonia Adventure with G-Adventures</span></h3><span data-dcnode-id="1464" instrument_node="">
</span><p data-dcnode-id="1460"><a data-dcnode-id="1462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.anrdoezrs.net/links/8989289/type/dlg/https%3A//www.gadventures.com/trips/argentina-and-chile-multisport/SAHB/" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="1463" instrument_node="">G-Adventures adventure tour</span></a><span data-dcnode-id="1461" instrument_node=""> – Imagine almost three weeks packed with every activity you can think of and then some! Trek through perfectly picturesque Patagonia, wake up early for whitewater rafting, hike through crisp mountain landscapes on Torres del Paine’s renowned W Trek, and bike, raft, and smile to your heart’s content. Your adrenaline reserves will be tapped by the end of it all.</span></p><span data-dcnode-id="1459" instrument_node="">
</span><h2 data-dcnode-id="1451"><span class="ez-toc-section" data-dcnode-id="1458" id="COLOMBIA_travel_cost"></span><strong data-dcnode-id="1456"><span data-dcnode-id="1457" instrument_node="">COLOMBIA </span></strong><em data-dcnode-id="1453"><strong data-dcnode-id="1454"><span data-dcnode-id="1455" instrument_node="">travel cost</span></strong></em><span class="ez-toc-section-end" data-dcnode-id="1452"></span></h2><span data-dcnode-id="1450" instrument_node="">
</span><p data-dcnode-id="1448"><span data-dcnode-id="1449" instrument_node="">We loved Colombia, nice people, the people are very friendly, the food is amazing, there are some awesome activities to get your adrenaline pumping and the best is that it is very affordable.</span></p><span data-dcnode-id="1447" instrument_node="">
</span><p data-dcnode-id="1445"><span data-dcnode-id="1446" instrument_node="">What an adventure we had traveling in Colombia; I am a coffee junkie and following a coffee the world’s best coffee from bean to cup in the mountains was amazing. Beautiful country to explore a variety of interesting places from colonial cities, great beaches and the Amazon to a beautiful desert.</span></p><span data-dcnode-id="1444" instrument_node="">
</span><p data-dcnode-id="1440"><a data-dcnode-id="1442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/product/1786570610/ref%3Das_li_tl%3Fie%3DUTF8%26camp%3D1789%26creative%3D9325%26creativeASIN%3D1786570610%26linkCode%3Das2%26tag%3Dstingynomads-20%26linkId%3Db4b2fd811d293a4a3c6b8a35238d551a" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="1443" instrument_node="">Lonely Planet Colombia (Travel Guide)</span></a><span data-dcnode-id="1441" instrument_node=""> – up to date travel guide released August 2018</span></p><span data-dcnode-id="1439" instrument_node="">
</span><ul data-dcnode-id="1404"><li data-dcnode-id="1429"><strong data-dcnode-id="1437"><span data-dcnode-id="1438" instrument_node="">Backpacker’s budget</span></strong><span data-dcnode-id="1436" instrument_node="">

</span><ul data-dcnode-id="1420"><span data-dcnode-id="1425" instrument_node="">
</span><li data-dcnode-id="1422"><strong data-dcnode-id="1423"><span data-dcnode-id="1424" instrument_node="">$40 to 80 per day</span></strong></li><span data-dcnode-id="1421" instrument_node="">
</span></ul><span data-dcnode-id="1419" instrument_node="">
</span></li><li data-dcnode-id="1405"><strong data-dcnode-id="1416"><span data-dcnode-id="1417" instrument_node="">Shoestring budget </span></strong><span data-dcnode-id="1415" instrument_node="">
</span><ul data-dcnode-id="1407"><span data-dcnode-id="1414" instrument_node="">
</span><li data-dcnode-id="1412"><span data-dcnode-id="1413" instrument_node="">$20 per day</span></li><span data-dcnode-id="1411" instrument_node="">
</span><li data-dcnode-id="1409"><span data-dcnode-id="1410" instrument_node="">We spent 1 851 135 COP ($636) in 31 days, thus 59 714 COP ($20.50) each per day including white water rafting, paragliding and a plane ticket from Bogota to Leticia.</span></li><span data-dcnode-id="1408" instrument_node="">
</span></ul><span data-dcnode-id="1406" instrument_node="">
</span></li></ul><span data-dcnode-id="1403" instrument_node="">

87.jpg.webp 510w, https://stingynomads.com/wp-content/uploads/2016/10/colombia-400x225.jpg.webp 400w" width="1366"></a><figcaption data-dcnode-id="1397"><span data-dcnode-id="1398" instrument_node="">At $20 per day each our budget was on the high side for Colombia, but we did awesome things. Camping at the airport helped with our budget! South America travel budget</span></figcaption></figure></div><span data-dcnode-id="1394" instrument_node="">
</span><p data-dcnode-id="1391"><strong data-dcnode-id="1392"><span data-dcnode-id="1393" instrument_node="">FOOD</span></strong></p><span data-dcnode-id="1390" instrument_node="">
</span><ul data-dcnode-id="1383"><li data-dcnode-id="1388"><span data-dcnode-id="1389" instrument_node="">Meal at a local restaurant COP 11300 ($3.50)</span></li><li data-dcnode-id="1386"><span data-dcnode-id="1387" instrument_node="">Meal at a midrange restaurant COP 32 380 ($10)</span></li><li data-dcnode-id="1384"><span data-dcnode-id="1385" instrument_node="">McDonald’s meal COP 16 000 ($5)</span></li></ul><span data-dcnode-id="1382" instrument_node="">
</span><p data-dcnode-id="1376"><span data-dcnode-id="1381" instrument_node="">We spent very little on food by buying groceries in the supermarket and cooking in the hostel. You can see exactly how we regulated our budget in our&nbsp;</span><a data-dcnode-id="1377" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stingynomads.com/backpacking-colombia-guide/"><em data-dcnode-id="1379"><span data-dcnode-id="1380" instrument_node="">Colombia Budget Backpacker’s Guide</span></em><span data-dcnode-id="1378" instrument_node="">.</span></a></p><span data-dcnode-id="1375" instrument_node="">
</span><p data-dcnode-id="1372"><strong data-dcnode-id="1373"><span data-dcnode-id="1374" instrument_node="">ACCOMMODATION</span></strong></p><span data-dcnode-id="1371" instrument_node="">
</span><ul data-dcnode-id="1349"><li data-dcnode-id="1350"><span data-dcnode-id="1370" instrument_node="">Backpacker Hostels
</span><ul data-dcnode-id="1352"><span data-dcnode-id="1369" instrument_node="">
</span><li data-dcnode-id="1367"><span data-dcnode-id="1368" instrument_node="">Dormitory bed varied between 15 000 and 30 000 COP ($5-$10)</span></li><span data-dcnode-id="1366" instrument_node="">
</span><li data-dcnode-id="1364"><span data-dcnode-id="1365" instrument_node="">Awesome Hostels</span></li><span data-dcnode-id="1363" instrument_node="">
</span><li data-dcnode-id="1359"><span data-dcnode-id="1362" instrument_node="">Bogota – awesome hostel for $5 – </span><a data-dcnode-id="1360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.booking.com/hotel/co/casa-capital-hostel-bogota.en.html%3Faid%3D1434725%26no_rooms%3D1%26group_adults%3D1"><span data-dcnode-id="1361" instrument_node="">Casa Capita Hostel</span></a></li><span data-dcnode-id="1358" instrument_node="">
</span><li data-dcnode-id="1354"><span data-dcnode-id="1357" instrument_node="">Cartagena – well rated, well priced – </span><a data-dcnode-id="1355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.booking.com/hotel/co/casa-hostal-el-prado.en.html%3Faid%3D1434725%26no_rooms%3D1%26group_adults%3D1"><span data-dcnode-id="1356" instrument_node="">Casa Hostal el Prado</span></a></li><span data-dcnode-id="1353" instrument_node="">
</span></ul><span data-dcnode-id="1351" instrument_node="">
</span></li></ul><span data-dcnode-id="1348" instrument_node="">
</span><p data-dcnode-id="1345"><strong data-dcnode-id="1346"><span data-dcnode-id="1347" instrument_node="">Great Budget Hotels</span></strong></p><span data-dcnode-id="1344" instrument_node="">
</span><ul data-dcnode-id="1320"><li data-dcnode-id="1340"><span data-dcnode-id="1343" instrument_node="">Bogota – beautiful, comfortable, modern – </span><a data-dcnode-id="1341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.booking.com/hotel/co/hotel-el-dorado.en.html%3Faid%3D1434725%26no_rooms%3D1%26group_adults%3D1"><span data-dcnode-id="1342" instrument_node="">Hotel El Dorado Bogota</span></a></li><li data-dcnode-id="1336"><span data-dcnode-id="1339" instrument_node="">Cartagena fantastic atmosphere, spacious – </span><a data-dcnode-id="1337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.booking.com/hotel/co/manglar-421.en.html%3Faid%3D1434725%26no_rooms%3D1%26group_adults%3D1"><span data-dcnode-id="1338" instrument_node="">Hotel Manglar 421</span></a></li><li data-dcnode-id="1321"><span data-dcnode-id="1335" instrument_node="">Stay in Luxury
</span><ul data-dcnode-id="1323"><span data-dcnode-id="1334" instrument_node="">
</span><li data-dcnode-id="1330"><span data-dcnode-id="1333" instrument_node="">Bogota – treat yourself – </span><a data-dcnode-id="1331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.booking.com/hotel/co/sofitel-bogota-victoria-regia.en.html%3Faid%3D1434725%26no_rooms%3D1%26group_adults%3D1"><span data-dcnode-id="1332" instrument_node="">Sofitel Bogota Victoria Regia</span></a></li><span data-dcnode-id="1329" instrument_node="">
</span><li data-dcnode-id="1325"><span data-dcnode-id="1328" instrument_node="">Cartagena – amazing refurbished colonial mansion – </span><a data-dcnode-id="1326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.booking.com/hotel/co/tcherassi-spa.en.html%3Faid%3D1434725%26no_rooms%3D1%26group_adults%3D1"><span data-dcnode-id="1327" instrument_node="">Tcherassi Hotel</span></a></li><span data-dcnode-id="1324" instrument_node="">
</span></ul><span data-dcnode-id="1322" instrument_node="">
</span></li></ul><span data-dcnode-id="1319" instrument_node="">
</span><p data-dcnode-id="1316"><strong data-dcnode-id="1317"><span data-dcnode-id="1318" instrument_node="">TRANSPORT</span></strong></p><span data-dcnode-id="1315" instrument_node="">
</span><p data-dcnode-id="1307"><span data-dcnode-id="1314" instrument_node="">Local transport is really cheap. Three major cities in Colombia (Bogota, Cali, Medellin) have&nbsp;</span><strong data-dcnode-id="1312"><span data-dcnode-id="1313" instrument_node="">mass transit systems</span></strong><span data-dcnode-id="1311" instrument_node="">&nbsp;similar to those in Europe and the United States. Bogota’s system is called the TranMileno and – bright red&nbsp;</span><strong data-dcnode-id="1309"><span data-dcnode-id="1310" instrument_node="">buses</span></strong><span data-dcnode-id="1308" instrument_node="">&nbsp;almost like a subway. Medellin has a subway, rides less than a dollar. Public transport in the city $1-2 per day</span></p><span data-dcnode-id="1306" instrument_node="">
</span><p data-dcnode-id="1304"><span data-dcnode-id="1305" instrument_node="">Buses between cities in Colombia are actually quite expensive. A bus from Bogota to Medellin will cost around COP 65 000 ($20)</span></p><span data-dcnode-id="1303" instrument_node="">
</span><p data-dcnode-id="1301"><span data-dcnode-id="1302" instrument_node="">The budget airline Vivacolombia is a cheap way to move long distances.</span></p><span data-dcnode-id="1300" instrument_node="">
</span><p data-dcnode-id="1298"><span data-dcnode-id="1299" instrument_node="">Uber is available in cities and is cheaper than taxis.</span></p><span data-dcnode-id="1297" instrument_node="">
</span><p data-dcnode-id="1294"><strong data-dcnode-id="1295"><span data-dcnode-id="1296" instrument_node="">ACTIVITIES</span></strong></p><span data-dcnode-id="1293" instrument_node="">
</span><ul data-dcnode-id="1282"><li data-dcnode-id="1291"><span data-dcnode-id="1292" instrument_node="">Adventure activities was well priced in Colombia, it was the only country we decided to splurge.</span></li><li data-dcnode-id="1289"><span data-dcnode-id="1290" instrument_node="">white water rafting ($40)</span></li><li data-dcnode-id="1287"><span data-dcnode-id="1288" instrument_node="">paragliding ($20)</span></li><li data-dcnode-id="1285"><span data-dcnode-id="1286" instrument_node="">Scuba diving – there are some cool spots from Cartagena with nice wrecks and marine life.</span></li><li data-dcnode-id="1283"><span data-dcnode-id="1284" instrument_node="">Don’t miss a tour of a coffee plantation starting at about 15,000 COP ($5) – Don Elias in Salento is fantastic.</span></li></ul><span data-dcnode-id="1281" instrument_node="">
</span><p data-dcnode-id="1278"><strong data-dcnode-id="1279"><span data-dcnode-id="1280" instrument_node="">VISA FEES FOR COLOMBIA</span></strong></p><span data-dcnode-id="1277" instrument_node="">
</span><p data-dcnode-id="1275"><span data-dcnode-id="1276" instrument_node="">UK, US, Canadian, South African, Australian and New Zealand passport holders do not require a visa for entry into Colombia for stays of up to 90 days. Visas can be easily extended for an additional 90 days</span></p><span data-dcnode-id="1274" instrument_node="">
</span><p data-dcnode-id="1271"><strong data-dcnode-id="1272"><span data-dcnode-id="1273" instrument_node="">TIPS</span></strong></p><span data-dcnode-id="1270" instrument_node="">
</span><ul data-dcnode-id="1261"><li data-dcnode-id="1268"><span data-dcnode-id="1269" instrument_node="">Transport was expensive. We saved a lot on accommodation by taking night buses for longer distances, thus saving on a night’s accommodation. We did not hitchhike in Colombia (no reason).</span></li><li data-dcnode-id="1266"><span data-dcnode-id="1267" instrument_node="">Cook for yourself, food in supermarkets was good and very cheap.</span></li><li data-dcnode-id="1264"><span data-dcnode-id="1265" instrument_node="">Visit museums on Sundays, many are free.</span></li><li data-dcnode-id="1262"><span data-dcnode-id="1263" instrument_node="">Get a ‘Hola Hostel’ card, they are free, good discounts.</span></li></ul><span data-dcnode-id="1260" instrument_node="">
</span><p data-dcnode-id="1257"><strong data-dcnode-id="1258"><span data-dcnode-id="1259" instrument_node="">BUDGET ACTIVITIES</span></strong></p><span data-dcnode-id="1256" instrument_node="">
</span><ul data-dcnode-id="1247"><li data-dcnode-id="1254"><span data-dcnode-id="1255" instrument_node="">Free walking tour in Medellin – excellent!</span></li><li data-dcnode-id="1252"><span data-dcnode-id="1253" instrument_node="">Hiking around San Gill – well marked 3 day trail to do on your own.</span></li><li data-dcnode-id="1250"><span data-dcnode-id="1251" instrument_node="">Walk around in The Tatacoa Desert.</span></li><li data-dcnode-id="1248"><span data-dcnode-id="1249" instrument_node="">Coffee tasting in Salento, cheap not free, but a must for a coffee lover.</span></li></ul><span data-dcnode-id="1246" instrument_node="">

</span><h3 data-dcnode-id="1231"><span data-dcnode-id="1234" instrument_node="">South America Tours – </span><strong data-dcnode-id="1232"><span data-dcnode-id="1233" instrument_node="">Colombia with G-Adventures</span></strong></h3><span data-dcnode-id="1230" instrument_node="">
</span><p data-dcnode-id="1226"><a data-dcnode-id="1228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.anrdoezrs.net/links/8989289/type/dlg/https%3A//www.gadventures.com/trips/colombia-express/SMCQ/" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="1229" instrument_node="">G-Adventures Colombia 9 Day Bogota to Cartagena</span></a><span data-dcnode-id="1227" instrument_node=""> – Where to go if you only have a week to experience a truly unique part of the world? The answer: Colombia. If you think a week isn’t enough to tour the beaches, coffee regions, and metropolitan cities of this reemerging country, think again — this trip makes it possible. Check out the resurgence of culture, art, and food in Bogotá and Medellín, dive deep into the Caribbean vibe in Cartagena, and enjoy the Latin-Caribbean fusion of flavours in local cuisine. All this in only nine days. Start packing now.</span></p><span data-dcnode-id="1225" instrument_node="">
</span><h2 data-dcnode-id="1218"><span class="ez-toc-section" data-dcnode-id="1224" id="ECUADOR_travel_cost"></span><span data-dcnode-id="1223" instrument_node="">ECUADOR</span><em data-dcnode-id="1220"><strong data-dcnode-id="1221"><span data-dcnode-id="1222" instrument_node="">&nbsp;travel cost</span></strong></em><span class="ez-toc-section-end" data-dcnode-id="1219"></span></h2><span data-dcnode-id="1217" instrument_node="">
</span><p data-dcnode-id="1213"><em data-dcnode-id="1215"><span data-dcnode-id="1216" instrument_node="">L</span></em><span data-dcnode-id="1214" instrument_node="">ocated between Colombia and Peru, Ecuador straddles the equator on the Pacific side of South America, Ecuador is a small, but diverse country most famous for the Galapagos Islands, which sparked the genius idea of evolution in Charles Darwin. It is perhaps the cheapest place from which the Amazon jungle can be explored. In Quito you can straddle the equator or go shopping for authentic souvenirs in the Otavalo market 3 hours away. Up for adventure? Climb the 5897m&nbsp; Cotopaxi volcano or ride down from 4500m on a mountain bike! The great thing about Ecuador for backpackers is that it is fairly cheap to travel here with lots of well-priced accommodation and adventure activities.</span></p><span data-dcnode-id="1212" instrument_node="">
</span><p data-dcnode-id="1208"><a data-dcnode-id="1210" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/product/1786570629/ref%3Das_li_tl%3Fie%3DUTF8%26camp%3D1789%26creative%3D9325%26creativeASIN%3D1786570629%26linkCode%3Das2%26tag%3Dstingynomads-20%26linkId%3Ddd3930861c3324729946cb0f81d23abd" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="1211" instrument_node="">Lonely Planet Ecuador &amp; the Galapagos Islands (Travel Guide)</span></a><span data-dcnode-id="1209" instrument_node=""> – up to date travel guide released August 2018</span></p><span data-dcnode-id="1207" instrument_node="">

</span><ul data-dcnode-id="1181"><li data-dcnode-id="1186"><span data-dcnode-id="1187" instrument_node="">You can eat at a local restaurant for $3-5 and in the markets for less than $2.</span></li><li data-dcnode-id="1184"><span data-dcnode-id="1185" instrument_node="">European meal (hamburger/pizza) around 10-12 USD.</span></li><li data-dcnode-id="1182"><span data-dcnode-id="1183" instrument_node="">For a meal at a mid-range restaurant about $25</span></li></ul><span data-dcnode-id="1180" instrument_node="">
</span><p data-dcnode-id="1177"><strong data-dcnode-id="1178"><span data-dcnode-id="1179" instrument_node="">TRANSPORT</span></strong></p><span data-dcnode-id="1176" instrument_node="">
</span><p data-dcnode-id="1174"><span data-dcnode-id="1175" instrument_node="">Long distance buses are a good deal for less than $2 per hour travelled.</span></p><span data-dcnode-id="1173" instrument_node="">
</span><p data-dcnode-id="1170"><strong data-dcnode-id="1171"><span data-dcnode-id="1172" instrument_node="">ACCOMMODATION</span></strong></p><span data-dcnode-id="1169" instrument_node="">
</span><p data-dcnode-id="1167"><span data-dcnode-id="1168" instrument_node="">In Quito a dormitory bed in a hostel starts at $4. A budget double room from $12 and you can stay in a 5 star hotel for $130</span></p><span data-dcnode-id="1166" instrument_node="">
</span><p data-dcnode-id="1161"><strong data-dcnode-id="1164"><span data-dcnode-id="1165" instrument_node="">VISA FEES FOR&nbsp;</span></strong><b data-dcnode-id="1162"><span data-dcnode-id="1163" instrument_node="">ECUADOR</span></b></p><span data-dcnode-id="1160" instrument_node="">
</span><p data-dcnode-id="1158"><span data-dcnode-id="1159" instrument_node="">United States, Canada and most European countries can travel to Ecuador visa free for up to 90 days.</span></p><span data-dcnode-id="1157" instrument_node="">
</span><p data-dcnode-id="1154"><strong data-dcnode-id="1155"><span data-dcnode-id="1156" instrument_node="">BUDGET ACTIVITIES</span></strong></p><span data-dcnode-id="1153" instrument_node="">
</span><ul data-dcnode-id="1139"><li data-dcnode-id="1151"><span data-dcnode-id="1152" instrument_node="">Unfortunately going to the Galapagos islands is a very pricey exercise even which will cost at least $1000 even for the most stingy nomads. Flights, conservation fees and ferries alone is round $500.</span></li><li data-dcnode-id="1146"><span data-dcnode-id="1150" instrument_node="">If you shop around you can do a 3 day local Amazon tour for about $120. With a higher budget you can do a 5-day tour and&nbsp;</span><a data-dcnode-id="1148" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bordersofadventure.com/ecuador-amazon-rainforest-guide" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1149" instrument_node="">explore the Ecuador Amazon and live locally, </span></a><span data-dcnode-id="1147" instrument_node="">admire rainforest wildlife, learn about shamanic practice and do several outdoor activities – isn’t it an amazing way of getting to know another country?!</span></li><li data-dcnode-id="1144"><span data-dcnode-id="1145" instrument_node="">Stand over the equator at Quito</span></li><li data-dcnode-id="1142"><span data-dcnode-id="1143" instrument_node="">Go to the Otavalo market.</span></li><li data-dcnode-id="1140"><span data-dcnode-id="1141" instrument_node="">Hiking independent</span></li></ul><span data-dcnode-id="1138" instrument_node="">
</span><h3 data-dcnode-id="1136"><span data-dcnode-id="1137" instrument_node="">South America Tours – G-Adventures Galagapos wild life</span></h3><span data-dcnode-id="1135" instrument_node="">
</span><p data-dcnode-id="1131"><span data-dcnode-id="1134" instrument_node="">The Galápagos Islands aren’t just all about cruising! Over a week’s time and beginning and ending right in the heart of the action (the islands, of course), you’ll stay active by snorkelling, hiking, and exploring the diverse terrain before slowing things down with wildlife exploration in the company of an expert Naturalist Guide. With plenty of options to stick around after the trip’s done (or show up early for some independent adventuring beforehand), this is the perfect express trip for a most excellent Galápagos experience. </span><a data-dcnode-id="1132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.anrdoezrs.net/links/8989289/type/dlg/https%3A//www.gadventures.com/trips/galapagos-express/SEGB/" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="1133" instrument_node="">G-Adventures Galapagos</span></a></p><span data-dcnode-id="1130" instrument_node="">
</span><h2 data-dcnode-id="1124"><span class="ez-toc-section" data-dcnode-id="1129" id="PARAGUAY_travel_cost"></span><span data-dcnode-id="1128" instrument_node="">PARAGUAY </span><em data-dcnode-id="1126"><span data-dcnode-id="1127" instrument_node="">travel cost</span></em><span class="ez-toc-section-end" data-dcnode-id="1125"></span></h2><span data-dcnode-id="1123" instrument_node="">
</span><p data-dcnode-id="1121"><span data-dcnode-id="1122" instrument_node="">I will definitely not call Paraguay ‘a tourist paradise’, one of the least visited countries in South America, with little travel infrastructure only has a handful of known tourist destinations. Getting ‘off the beaten track’ and experiencing local culture are the most popular tourist draw cards in this small land-locked country. The most well-known cities are Asuncio, the capital and popular point of entry by plane and Ciudad del Este, the second biggest city on the border with Brazil and Argentina and well known for shopping, mostly cheap and knock-off or fake goods. We entered the city from Iguazu. English is not widely spoken, so a basic knowledge of Spanish is very handy around here</span></p><span data-dcnode-id="1120" instrument_node="">
</span><p data-dcnode-id="1117"><strong data-dcnode-id="1118"><span data-dcnode-id="1119" instrument_node="">Travel Budget for Paraguay</span></strong></p><span data-dcnode-id="1116" instrument_node="">
