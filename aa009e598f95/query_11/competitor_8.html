</span><figure class="wp-block-image size-large" data-dcnode-id="3686"><img alt="" class="wp-image-222550" data-dcnode-id="3691" data-lazy-sizes="(max-width: 1024px) 100vw, 1024px" data-lazy-src="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC09131-1024x683.jpg" data-lazy-srcset="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC09131-1024x683.jpg 1024w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC09131-300x200.jpg 300w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC09131-768x512.jpg 768w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC09131-1536x1024.jpg 1536w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC09131-scaled.jpg 2000w" height="683" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201024%20683'%3E%3C/svg%3E" width="1024"><noscript data-dcnode-id="3689"><span data-dcnode-id="3690" instrument_node="">&lt;img width="1024" height="683" src="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC09131-1024x683.jpg" alt="" class="wp-image-222550" srcset="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC09131-1024x683.jpg 1024w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC09131-300x200.jpg 300w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC09131-768x512.jpg 768w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC09131-1536x1024.jpg 1536w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC09131-scaled.jpg 2000w" sizes="(max-width: 1024px) 100vw, 1024px"&gt;</span></noscript><figcaption data-dcnode-id="3687"><span data-dcnode-id="3688" instrument_node="">Hendy Redwoods – specifically Big Hendy Grove – is a spectacular display of redwoods</span></figcaption></figure><span data-dcnode-id="3685" instrument_node="">
</span><p data-dcnode-id="3669"><strong data-dcnode-id="3683"><span data-dcnode-id="3684" instrument_node="">Boonville</span></strong><span data-dcnode-id="3682" instrument_node="">: At the eastern edge of the valley in and around Boonville, don’t miss three spots. Beer lovers should hit </span><a data-dcnode-id="3680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//avbc.com/" rel="noopener" target="_blank"><span data-dcnode-id="3681" instrument_node="">Anderson Valley Brewing</span></a><span data-dcnode-id="3679" instrument_node="">, who have a nice taproom in town that is currently being transformed into a “beer park” complete with outdoor seating, an 18 hole disc golf course, and a small music venue. Pretty cool! Second is </span><a data-dcnode-id="3677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pennyroyalfarm.com/" rel="noopener" target="_blank"><span data-dcnode-id="3678" instrument_node="">Pennyroyal Farm</span></a><span data-dcnode-id="3676" instrument_node="">, which serves wine but is really a stop for the goat cheeses and </span><a data-dcnode-id="3674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pennyroyalfarm.com/book-a-tour" rel="noopener" target="_blank"><span data-dcnode-id="3675" instrument_node="">farm tour</span></a><span data-dcnode-id="3673" instrument_node="">. It’s a real life farm, which means there’s tons of outdoor space and farm animals. Last, but not least, is </span><a data-dcnode-id="3671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.discoranch.com/" rel="noopener" target="_blank"><span data-dcnode-id="3672" instrument_node="">Disco Ranch</span></a><span data-dcnode-id="3670" instrument_node="">, a hip wine bar in the heart of Boonville known for bringing in a wide array of local and international wines for you to enjoy. They’re served alongside snacks like canned fish and cheese plates, which is fun! We heard about this place from a friendly tasting room associate, and she highly, highly recommended stopping by if you love wine.&nbsp;</span></p><span data-dcnode-id="3668" instrument_node="">
</span><p data-dcnode-id="3652"><strong data-dcnode-id="3666"><span data-dcnode-id="3667" instrument_node="">Apples and Cider</span></strong><span data-dcnode-id="3665" instrument_node="">:</span><strong data-dcnode-id="3663"><span data-dcnode-id="3664" instrument_node=""> </span></strong><span data-dcnode-id="3662" instrument_node="">We’re big cider fans – much more so than wine – and the Anderson Valley is home to one of the oldest apple operations in California, </span><a data-dcnode-id="3660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gowansheirloomcider.com/" rel="noopener" target="_blank"><span data-dcnode-id="3661" instrument_node="">Gowan’s</span></a><span data-dcnode-id="3659" instrument_node="">. They have a roadside stand that is chock full of all kinds of apples in the fall, and they also make their own apple-forward ciders that we really enjoy (“one of each!” is what my mother-in-law requested on our last visit). It’s $15 to try six different ciders, or you can get them by the glass. Their “tasting room” is nothing more than some adirondack chairs set in a field populated by apple trees that are more than a century old. Which is…perfect. The </span><a data-dcnode-id="3657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.philoapplefarm.com/" rel="noopener" target="_blank"><span data-dcnode-id="3658" instrument_node="">Apple Farm</span></a><span data-dcnode-id="3656" instrument_node=""> also has a little </span><a data-dcnode-id="3654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.philoapplefarm.com/farm-stand-1" rel="noopener" target="_blank"><span data-dcnode-id="3655" instrument_node="">farm stand</span></a><span data-dcnode-id="3653" instrument_node=""> out on the way to Hendy Woods where you can find homemade jams and farm-fresh apple juice.&nbsp;</span></p><span data-dcnode-id="3651" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="3647"><img alt="" class="wp-image-222551" data-dcnode-id="3650" data-lazy-sizes="(max-width: 1024px) 100vw, 1024px" data-lazy-src="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC09168-1024x683.jpg" data-lazy-srcset="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC09168-1024x683.jpg 1024w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC09168-300x200.jpg 300w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC09168-768x512.jpg 768w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC09168-1536x1024.jpg 1536w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC09168-scaled.jpg 2000w" height="683" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201024%20683'%3E%3C/svg%3E" width="1024"><noscript data-dcnode-id="3648"><span data-dcnode-id="3649" instrument_node="">&lt;img width="1024" height="683" src="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC09168-1024x683.jpg" alt="" class="wp-image-222551" srcset="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC09168-1024x683.jpg 1024w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC09168-300x200.jpg 300w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC09168-768x512.jpg 768w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC09168-1536x1024.jpg 1536w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC09168-scaled.jpg 2000w" sizes="(max-width: 1024px) 100vw, 1024px"&gt;</span></noscript></figure><span data-dcnode-id="3646" instrument_node="">
</span><p data-dcnode-id="3638"><a data-dcnode-id="3643" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bewilderedpig.com/" rel="noopener" target="_blank"><strong data-dcnode-id="3644"><span data-dcnode-id="3645" instrument_node="">The Bewildered Pig</span></strong></a><span data-dcnode-id="3642" instrument_node="">: There’s not much in terms of bars and restaurants around here, but the Bewildered Pig is our favorite – we went there for my birthday several years ago, and it was fantastic. It’s fancy with a tasting menu and all that jazz, but it’s really not </span><em data-dcnode-id="3640"><span data-dcnode-id="3641" instrument_node="">that </span></em><span data-dcnode-id="3639" instrument_node="">fancy (and the food doesn’t feel overly fancy, if you know what I mean). It’s 10-15 minutes west of Philo, towards the coast.&nbsp;</span></p><span data-dcnode-id="3637" instrument_node="">
</span><h4 data-dcnode-id="3634"><span data-dcnode-id="3635" id="Where_to_Stay_in_the_Anderson_Valley"><span data-dcnode-id="3636" instrument_node="">Where to Stay in the Anderson Valley</span></span></h4><span data-dcnode-id="3633" instrument_node="">
</span><p data-dcnode-id="3631"><span data-dcnode-id="3632" instrument_node="">Unfortunately, there aren’t a whole lot of places to stay in the Anderson Valley. It’s pastoral, which means no big chain hotels (which to be honest, is not a bad thing at all). There are three places that stand out in our minds.&nbsp;</span></p><span data-dcnode-id="3630" instrument_node="">
</span><p data-dcnode-id="3622"><a data-dcnode-id="3627" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.philoapplefarm.com/just-stay" rel="noopener" target="_blank"><strong data-dcnode-id="3628"><span data-dcnode-id="3629" instrument_node="">The Apple Farm</span></strong></a><span data-dcnode-id="3626" instrument_node="">: Want to stay in the middle of an apple orchard? This is the place to do it! It’s a little expensive, but it’s going to be an unforgettable experience. They have a collection of cottages – some cozy, some a bit bigger – right in the middle of their apple orchard. Reserve well in advance, if you can. They also do a fun </span><a data-dcnode-id="3624" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.philoapplefarm.com/stay-cook-main" rel="noopener" target="_blank"><span data-dcnode-id="3625" instrument_node="">“stay &amp; cook”</span></a><span data-dcnode-id="3623" instrument_node=""> experience, but it’s currently on hold.&nbsp;</span></p><span data-dcnode-id="3621" instrument_node="">
</span><p data-dcnode-id="3616"><a data-dcnode-id="3618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.booking.com/hotel/us/indian-creek-inn.en.html%3Faid%3D1738278%26no_rooms%3D1%26group_adults%3D2" rel="noreferrer noopener nofollow" target="_blank"><strong data-dcnode-id="3619"><span data-dcnode-id="3620" instrument_node="">The Indian Creek Inn</span></strong></a><span data-dcnode-id="3617" instrument_node="">: Relatively new and in a fantastic location in the valley, this is a nice place to spend a night. They have 15 rooms, each with access to a shared kitchen (which we appreciate, because we often cook for ourselves on the road). It’s set back from the road, so you’ll be able to immerse yourself in the peace and quiet that comes with the valley. No TVs in the rooms, which we think is a good thing, but some might disagree.&nbsp;</span></p><span data-dcnode-id="3615" instrument_node="">
</span><p data-dcnode-id="3607"><a data-dcnode-id="3612" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dpbolvw.net/click-9069370-11552045%3Furl%3Dhttps%253A%252F%252Fwww.expedia.com%252FUkiah-Hotels-THE-MADRONES.h19260757.Hotel-Information%253F" rel="noreferrer noopener nofollow" target="_blank"><strong data-dcnode-id="3613"><span data-dcnode-id="3614" instrument_node="">The Madrones</span></strong></a><span data-dcnode-id="3611" instrument_node="">: This place is like an estate straight out of </span><a data-dcnode-id="3609" data-id="220181" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wheatlesswanderlust.com/10-days-italy-itinerary/"><span data-dcnode-id="3610" instrument_node="">Italy</span></a><span data-dcnode-id="3608" instrument_node=""> in terms of architecture and general vibe. The location is fantastic – walking distance to a couple of places (including Scharffenberger, if you’re up for a little bit of a walk along the road). It’s half hotel-style rooms, part standalone cabins (they call those “the Brambles”), and it would be a lovely home base (though they do require a two night stay, in some cases).&nbsp;</span></p><span data-dcnode-id="3606" instrument_node="">
</span><h3 class="has-text-align-center" data-dcnode-id="3603"><span data-dcnode-id="3604" id="Healdsburg_Sonoma_Wine_Country"><span data-dcnode-id="3605" instrument_node="">Healdsburg &amp; Sonoma Wine Country</span></span></h3><span data-dcnode-id="3602" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="3598"><img alt="" class="wp-image-217723" data-dcnode-id="3601" data-lazy-sizes="(max-width: 1024px) 100vw, 1024px" data-lazy-src="https://wheatlesswanderlust.com/wp-content/uploads/2021/03/Healdsburg-California-1024x680.jpg" data-lazy-srcset="https://wheatlesswanderlust.com/wp-content/uploads/2021/03/Healdsburg-California-1024x680.jpg 1024w, https://wheatlesswanderlust.com/wp-content/uploads/2021/03/Healdsburg-California-300x199.jpg 300w, https://wheatlesswanderlust.com/wp-content/uploads/2021/03/Healdsburg-California-768x510.jpg 768w, https://wheatlesswanderlust.com/wp-content/uploads/2021/03/Healdsburg-California-1536x1020.jpg 1536w, https://wheatlesswanderlust.com/wp-content/uploads/2021/03/Healdsburg-California-2048x1361.jpg 2048w, https://wheatlesswanderlust.com/wp-content/uploads/2021/03/Healdsburg-California-800x531.jpg 800w, https://wheatlesswanderlust.com/wp-content/uploads/2021/03/Healdsburg-California-scaled.jpg 2000w" height="680" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201024%20680'%3E%3C/svg%3E" width="1024"><noscript data-dcnode-id="3599"><span data-dcnode-id="3600" instrument_node="">&lt;img width="1024" height="680" src="https://wheatlesswanderlust.com/wp-content/uploads/2021/03/Healdsburg-California-1024x680.jpg" alt="" class="wp-image-217723" srcset="https://wheatlesswanderlust.com/wp-content/uploads/2021/03/Healdsburg-California-1024x680.jpg 1024w, https://wheatlesswanderlust.com/wp-content/uploads/2021/03/Healdsburg-California-300x199.jpg 300w, https://wheatlesswanderlust.com/wp-content/uploads/2021/03/Healdsburg-California-768x510.jpg 768w, https://wheatlesswanderlust.com/wp-content/uploads/2021/03/Healdsburg-California-1536x1020.jpg 1536w, https://wheatlesswanderlust.com/wp-content/uploads/2021/03/Healdsburg-California-2048x1361.jpg 2048w, https://wheatlesswanderlust.com/wp-content/uploads/2021/03/Healdsburg-California-800x531.jpg 800w, https://wheatlesswanderlust.com/wp-content/uploads/2021/03/Healdsburg-California-scaled.jpg 2000w" sizes="(max-width: 1024px) 100vw, 1024px"&gt;</span></noscript></figure><span data-dcnode-id="3597" instrument_node="">
</span><p data-dcnode-id="3594"><em data-dcnode-id="3595"><span data-dcnode-id="3596" instrument_node="">Drive time from the Anderson Valley: 1 hour / 50 miles</span></em></p><span data-dcnode-id="3593" instrument_node="">
</span><p data-dcnode-id="3591"><span data-dcnode-id="3592" instrument_node="">Look, everyone who comes to San Francisco wants to go to Napa because “it’s the best wine around!”&nbsp;</span></p><span data-dcnode-id="3590" instrument_node="">
</span><p data-dcnode-id="3588"><span data-dcnode-id="3589" instrument_node="">While technically that might be true – Napa is known for its big, bold reds and oak-tastic Chardonnay – it’s also the most expensive and complicated, with reservations required almost everywhere and tastings that cost $40 for three small tastes. And that’s before you even get to the $400 a night hotel room you’ll need to book!</span></p><span data-dcnode-id="3587" instrument_node="">
</span><p data-dcnode-id="3582"><span data-dcnode-id="3586" instrument_node="">We’ve done Napa several times, but </span><strong data-dcnode-id="3584"><span data-dcnode-id="3585" instrument_node="">we’d recommend Sonoma – specifically the Dry Creek Valley around Healdsburg – instead</span></strong><span data-dcnode-id="3583" instrument_node="">.&nbsp;</span></p><span data-dcnode-id="3581" instrument_node="">
</span><p data-dcnode-id="3579"><span data-dcnode-id="3580" instrument_node="">Healdsburg itself is a charming little town with good food and tasting rooms around the main square. Just outside of Healdsburg, you’ll find a plethora of smaller wineries who are serving some of the less famous varietals – pinot noir and sauvignon blanc, for example – at a much more affordable price.&nbsp;</span></p><span data-dcnode-id="3578" instrument_node="">
</span><p data-dcnode-id="3576"><span data-dcnode-id="3577" instrument_node="">The point is, Healdsburg is, by far, our favorite wine country stop in California.</span></p><span data-dcnode-id="3575" instrument_node="">
</span><h4 data-dcnode-id="3572"><span data-dcnode-id="3573" id="Things_to_Do_in_Healdsburg"><span data-dcnode-id="3574" instrument_node="">Things to Do in Healdsburg</span></span></h4><span data-dcnode-id="3571" instrument_node="">
</span><p data-dcnode-id="3564"><strong data-dcnode-id="3569"><span data-dcnode-id="3570" instrument_node="">Wine Tasting</span></strong><span data-dcnode-id="3568" instrument_node="">:</span><strong data-dcnode-id="3566"><span data-dcnode-id="3567" instrument_node=""> </span></strong><span data-dcnode-id="3565" instrument_node="">Let’s put it this way – while you’re in Healdsburg, you probably won’t run out of tasting rooms in town, or in the Dry Creek Valley nearby. There’s a nearly unlimited number of spots to choose from. Here are some of our favorites. Wine tastings are less than half the price of the ones just a few miles east in the most famous wine region in the United States, Napa Valley. Plan on paying $15-$20 to taste 5-6 wines, and don’t be afraid to split tastings between two people (that’s what we usually do).&nbsp;</span></p><span data-dcnode-id="3563" instrument_node="">
</span><ul data-dcnode-id="3539"><li data-dcnode-id="3554"><a data-dcnode-id="3560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bansheewines.com/Visit" rel="noopener" target="_blank"><strong data-dcnode-id="3561"><span data-dcnode-id="3562" instrument_node="">Banshee</span></strong></a><strong data-dcnode-id="3558"><span data-dcnode-id="3559" instrument_node=""> </span></strong><span data-dcnode-id="3557" instrument_node="">is our favorite tasting room in town. We served their rose at our wedding!</span><br data-dcnode-id="3556"><br data-dcnode-id="3555"></li><li data-dcnode-id="3547"><a data-dcnode-id="3551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bellawinery.com/" rel="noopener" target="_blank"><strong data-dcnode-id="3552"><span data-dcnode-id="3553" instrument_node="">Bella Wine Cave</span></strong></a><span data-dcnode-id="3550" instrument_node=""> is a unique, underground wine tasting experience. Their vineyard specializes in small-batch Zinfandel and Rhone. We met two women here who had just been to Tanzania, and they inspired us to take our moms on a once-in-a-lifetime trip to Tanzania to do a safari, which we still reminisce about to this day.</span><br data-dcnode-id="3549"><br data-dcnode-id="3548"></li><li data-dcnode-id="3540"><a data-dcnode-id="3544" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.truetthurstwinery.com/" rel="noopener" target="_blank"><strong data-dcnode-id="3545"><span data-dcnode-id="3546" instrument_node="">Truett Hurst</span></strong></a><strong data-dcnode-id="3542"><span data-dcnode-id="3543" instrument_node=""> </span></strong><span data-dcnode-id="3541" instrument_node="">has an excellent Gewurztraminer and a lovely patio. We’ve been there multiple times, including once with my mom, and she still talks about it.</span></li></ul><span data-dcnode-id="3538" instrument_node="">
</span><p data-dcnode-id="3536"><span data-dcnode-id="3537" instrument_node="">Here are some other stops to make in Healdsburg that are not tasting rooms for various wineries.</span></p><span data-dcnode-id="3535" instrument_node="">
</span><p data-dcnode-id="3522"><strong data-dcnode-id="3533"><span data-dcnode-id="3534" instrument_node="">Grab Some Picnic Supplies</span></strong><span data-dcnode-id="3532" instrument_node="">:</span><strong data-dcnode-id="3530"><span data-dcnode-id="3531" instrument_node=""> </span></strong><span data-dcnode-id="3529" instrument_node="">Can you tell we love a good picnic? Stop by </span><a data-dcnode-id="3527" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//oakvillegrocery.com/" rel="noopener" target="_blank"><span data-dcnode-id="3528" instrument_node="">Oakville Grocery</span></a><span data-dcnode-id="3526" instrument_node=""> or </span><a data-dcnode-id="3524" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.drycreekgeneralstore1881.com/" rel="noopener" target="_blank"><span data-dcnode-id="3525" instrument_node="">Dry Creek General Store</span></a><span data-dcnode-id="3523" instrument_node=""> to pick up some supplies and find a nice place to stop for a picnic in between wineries (or at one of the wineries you stop at – most allow it).&nbsp;</span></p><span data-dcnode-id="3521" instrument_node="">
</span><p data-dcnode-id="3511"><strong data-dcnode-id="3519"><span data-dcnode-id="3520" instrument_node="">Noble Folk for Ice Cream</span></strong><span data-dcnode-id="3518" instrument_node="">:</span><strong data-dcnode-id="3516"><span data-dcnode-id="3517" instrument_node=""> </span></strong><span data-dcnode-id="3515" instrument_node="">Craving ice cream? You can’t go wrong at </span><a data-dcnode-id="3513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thenoblefolk.com/" rel="noopener" target="_blank"><span data-dcnode-id="3514" instrument_node="">Noble Folk Ice Cream and Pie Bar</span></a><span data-dcnode-id="3512" instrument_node="">. It’s not just ice cream and pie (although that’s more than enough), but also cookie sandwiches, cupcakes, and French macarons. (Not GF).</span></p><span data-dcnode-id="3510" instrument_node="">
</span><p data-dcnode-id="3503"><strong data-dcnode-id="3508"><span data-dcnode-id="3509" instrument_node="">Flying Goat for Coffee</span></strong><span data-dcnode-id="3507" instrument_node="">: Our favorite coffee shop in Healdsburg is </span><a data-dcnode-id="3505" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//flyinggoatcoffee.com/" rel="noopener" target="_blank"><span data-dcnode-id="3506" instrument_node="">Flying Goat</span></a><span data-dcnode-id="3504" instrument_node=""> for a great cup of coffee.&nbsp;</span></p><span data-dcnode-id="3502" instrument_node="">
</span><p data-dcnode-id="3495"><strong data-dcnode-id="3500"><span data-dcnode-id="3501" instrument_node="">Tilted Shed Ciderworks</span></strong><span data-dcnode-id="3499" instrument_node="">: Need a break from wine tasting? We absolutely love </span><a data-dcnode-id="3497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tiltedshed.com/" rel="noopener" target="_blank"><span data-dcnode-id="3498" instrument_node="">Tilted Shed Ciderworks</span></a><span data-dcnode-id="3496" instrument_node="">. Their focus is on vintage ciders and use fresh-picked apples for their small-batch ciders. When we stop in we always grab a couple extra bottles to take with us.</span></p><span data-dcnode-id="3494" instrument_node="">
</span><h4 data-dcnode-id="3491"><span data-dcnode-id="3492" id="Where_to_Stay_in_Healdsburg"><span data-dcnode-id="3493" instrument_node="">Where to Stay in Healdsburg</span></span></h4><span data-dcnode-id="3490" instrument_node="">
</span><p data-dcnode-id="3488"><span data-dcnode-id="3489" instrument_node="">In general, staying in wine country is expensive. Healdsburg is notably less expensive than Napa, which is partially why we have you stopping here instead.&nbsp;</span></p><span data-dcnode-id="3487" instrument_node="">
</span><p data-dcnode-id="3485"><span data-dcnode-id="3486" instrument_node="">Here are three options for you that are right downtown and in the perfect spot for exploring town for an afternoon.</span></p><span data-dcnode-id="3484" instrument_node="">
</span><ul data-dcnode-id="3460"><li data-dcnode-id="3475"><a data-dcnode-id="3481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.booking.com/hotel/us/healdsburg-25-matheson-street.en.html%3Faid%3D1738278%26no_rooms%3D1%26group_adults%3D2" rel="noreferrer noopener nofollow" target="_blank"><strong data-dcnode-id="3482"><span data-dcnode-id="3483" instrument_node="">Hotel Healdsburg</span></strong></a><span data-dcnode-id="3480" instrument_node="">:</span><strong data-dcnode-id="3478"><span data-dcnode-id="3479" instrument_node=""> </span></strong><span data-dcnode-id="3477" instrument_node="">A charming hotel right in the heart of all the action in Healdsburg. Right outside your front door, you’ll find tasting rooms, restaurants, and more. It’s a great place to stay, especially on a short trip.</span><br data-dcnode-id="3476"></li><li data-dcnode-id="3466"><a data-dcnode-id="3472" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.anrdoezrs.net/links/9069370/type/dlg/https%3A//www.hotels.com/ho962868960/cottages-at-healdsburg-healdsburg-united-states-of-america/" rel="noreferrer noopener nofollow" target="_blank"><strong data-dcnode-id="3473"><span data-dcnode-id="3474" instrument_node="">Cottages at Healdsburg</span></strong></a><span data-dcnode-id="3471" instrument_node="">:</span><strong data-dcnode-id="3469"><span data-dcnode-id="3470" instrument_node=""> </span></strong><span data-dcnode-id="3468" instrument_node="">Enjoy your own private cottage in Healdsburg, complete with a small terrace to enjoy your morning cup of coffee or afternoon glass of wine (why not both?).</span><br data-dcnode-id="3467"></li><li data-dcnode-id="3461"><a data-dcnode-id="3463" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.booking.com/hotel/us/healdsburg-219-healdsburg-avenue.en.html%3Faid%3D1738278%26no_rooms%3D1%26group_adults%3D2" rel="noreferrer noopener nofollow" target="_blank"><strong data-dcnode-id="3464"><span data-dcnode-id="3465" instrument_node="">H2 Hotel</span></strong></a><span data-dcnode-id="3462" instrument_node="">: Modern hotel with all the amenities you could dream of. It’s just a block or two south of the main square. We’ve gotten drinks at the bar in the lobby, and dreamed about staying here next time we’re in Healdsburg.&nbsp;</span></li></ul><span data-dcnode-id="3459" instrument_node="">
</span><h3 class="has-text-align-center" data-dcnode-id="3456"><span data-dcnode-id="3457" id="San_Francisco_CA"><span data-dcnode-id="3458" instrument_node="">San Francisco, CA</span></span></h3><span data-dcnode-id="3455" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="3451"><img alt="" class="wp-image-222552" data-dcnode-id="3454" data-lazy-sizes="(max-width: 1024px) 100vw, 1024px" data-lazy-src="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC_0364-1024x682.jpg" data-lazy-srcset="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC_0364-1024x682.jpg 1024w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC_0364-300x200.jpg 300w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC_0364-768x512.jpg 768w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC_0364-1536x1024.jpg 1536w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC_0364.jpg 2000w" height="682" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201024%20682'%3E%3C/svg%3E" width="1024"><noscript data-dcnode-id="3452"><span data-dcnode-id="3453" instrument_node="">&lt;img width="1024" height="682" src="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC_0364-1024x682.jpg" alt="" class="wp-image-222552" srcset="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC_0364-1024x682.jpg 1024w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC_0364-300x200.jpg 300w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC_0364-768x512.jpg 768w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC_0364-1536x1024.jpg 1536w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC_0364.jpg 2000w" sizes="(max-width: 1024px) 100vw, 1024px"&gt;</span></noscript></figure><span data-dcnode-id="3450" instrument_node="">
</span><p data-dcnode-id="3447"><em data-dcnode-id="3448"><span data-dcnode-id="3449" instrument_node="">Drive time from Healdsburg to Downtown San Francisco: 1 hour 30 minutes / 70 miles</span></em></p><span data-dcnode-id="3446" instrument_node="">
</span><p data-dcnode-id="3444"><span data-dcnode-id="3445" instrument_node="">The first stop to pencil in on any Northern California itinerary has got to be San Francisco, which is where you’re going to be flying in (and likely out of). With its dining, architecture, and general “San Francisco vibe,” everyone needs to visit this city at least once.</span></p><span data-dcnode-id="3443" instrument_node="">
</span><p data-dcnode-id="3441"><span data-dcnode-id="3442" instrument_node="">We have it at the end of the itinerary, because we’ve found that we like to have a day or two at the end of a road trip to relax in the city before heading home, but it’s easy enough to flip it around and have this as your first stop after landing.&nbsp;</span></p><span data-dcnode-id="3440" instrument_node="">
</span><p data-dcnode-id="3438"><span data-dcnode-id="3439" instrument_node="">We lived in San Francisco for a decade, and have strong opinions on what to do and see in the city. And more importantly, what not to do and see.&nbsp;</span></p><span data-dcnode-id="3437" instrument_node="">
</span><p data-dcnode-id="3435"><span data-dcnode-id="3436" instrument_node="">Here are some other San Francisco travel guides for you to use to go deeper on one of our favorite cities in the world, and plan an incredible trip to the city by the bay.</span></p><span data-dcnode-id="3434" instrument_node="">
</span><ul data-dcnode-id="3421"><li data-dcnode-id="3431"><a data-dcnode-id="3432" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wheatlesswanderlust.com/where-to-stay-in-san-francisco/"><span data-dcnode-id="3433" instrument_node="">Where to Stay in San Francisco: A Local’s Guide to the Best Areas</span></a></li><li data-dcnode-id="3428"><a data-dcnode-id="3429" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wheatlesswanderlust.com/4-days-in-san-francisco-itinerary/"><span data-dcnode-id="3430" instrument_node="">A Complete San Francisco Itinerary: Everything You Need to Know</span></a></li><li data-dcnode-id="3425"><a data-dcnode-id="3426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wheatlesswanderlust.com/one-day-in-san-francisco/"><span data-dcnode-id="3427" instrument_node="">How to Spend One Day In San Francisco: A Complete Guide</span></a></li><li data-dcnode-id="3422"><a data-dcnode-id="3423" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wheatlesswanderlust.com/gluten-free-san-francisco-guide/"><span data-dcnode-id="3424" instrument_node="">Gluten Free San Francisco: A Travel Guide for Celiacs</span></a></li></ul><span data-dcnode-id="3420" instrument_node="">
</span><h4 data-dcnode-id="3417"><span data-dcnode-id="3418" id="What_to_Do_in_San_Francisco"><span data-dcnode-id="3419" instrument_node="">What to Do in San Francisco</span></span></h4><span data-dcnode-id="3416" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="3412"><img alt="" class="wp-image-222553" data-dcnode-id="3415" data-lazy-sizes="(max-width: 1024px) 100vw, 1024px" data-lazy-src="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC_0145-2-1024x682.jpg" data-lazy-srcset="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC_0145-2-1024x682.jpg 1024w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC_0145-2-300x200.jpg 300w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC_0145-2-768x512.jpg 768w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC_0145-2-1536x1024.jpg 1536w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC_0145-2.jpg 2000w" height="682" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201024%20682'%3E%3C/svg%3E" width="1024"><noscript data-dcnode-id="3413"><span data-dcnode-id="3414" instrument_node="">&lt;img width="1024" height="682" src="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC_0145-2-1024x682.jpg" alt="" class="wp-image-222553" srcset="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC_0145-2-1024x682.jpg 1024w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC_0145-2-300x200.jpg 300w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC_0145-2-768x512.jpg 768w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC_0145-2-1536x1024.jpg 1536w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC_0145-2.jpg 2000w" sizes="(max-width: 1024px) 100vw, 1024px"&gt;</span></noscript></figure><span data-dcnode-id="3411" instrument_node="">
</span><p data-dcnode-id="3395"><strong data-dcnode-id="3409"><span data-dcnode-id="3410" instrument_node="">Explore the Ferry Building</span></strong><span data-dcnode-id="3408" instrument_node="">: The Ferry Building is a terminal for ferries and is an iconic San Francisco landmark. Inside the Ferry Building Marketplace, you’ll find a farmers market (Tuesdays, Thursdays, and Saturdays), food, and small local shops to browse. </span><a data-dcnode-id="3406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.heathceramics.com/" rel="noopener" target="_blank"><span data-dcnode-id="3407" instrument_node="">Heath Ceramics</span></a><span data-dcnode-id="3405" instrument_node=""> is one of our favorite shops featuring simple, timeless ceramic pieces. If you’re craving something sweet, we love </span><a data-dcnode-id="3403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.dandelionchocolate.com/" rel="noopener" target="_blank"><span data-dcnode-id="3404" instrument_node="">Dandelion Chocolate</span></a><span data-dcnode-id="3402" instrument_node=""> or </span><a data-dcnode-id="3400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.humphryslocombe.com/" rel="noopener" target="_blank"><span data-dcnode-id="3401" instrument_node="">Humphry Slocombe Ice Cream</span></a><span data-dcnode-id="3399" instrument_node="">. Of course, we can’t forget the coffee! Stop by </span><a data-dcnode-id="3397" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bluebottlecoffee.com/" rel="noopener" target="_blank"><span data-dcnode-id="3398" instrument_node="">Blue Bottle Coffee</span></a><span data-dcnode-id="3396" instrument_node=""> to grab a cup of the OG specialty coffee to sip on as you wander.</span></p><span data-dcnode-id="3394" instrument_node="">
</span><p data-dcnode-id="3387"><strong data-dcnode-id="3392"><span data-dcnode-id="3393" instrument_node="">Walk across the Golden Gate Bridge</span></strong><span data-dcnode-id="3391" instrument_node="">:</span><strong data-dcnode-id="3389"><span data-dcnode-id="3390" instrument_node=""> </span></strong><span data-dcnode-id="3388" instrument_node="">You can’t visit San Francisco without checking out the iconic Golden Gate Bridge! As great as it is to see it from a distance, it’s even better to walk it. It’s about 1.7 miles across each way, which should take you about an hour to make the round trip. Check the weather and bring plenty of layers, because it’s going to be foggy, cold, and windy roughly 50% of the time.&nbsp;</span></p><span data-dcnode-id="3386" instrument_node="">
</span><p data-dcnode-id="3370"><strong data-dcnode-id="3384"><span data-dcnode-id="3385" instrument_node="">Eat and Drink your way through the Mission District</span></strong><span data-dcnode-id="3383" instrument_node="">:</span><strong data-dcnode-id="3381"><span data-dcnode-id="3382" instrument_node=""> </span></strong><span data-dcnode-id="3380" instrument_node="">The Mission District should be a destination when you’re ready to grab something to eat or drink. Want to grab a beer? Check out </span><a data-dcnode-id="3378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.zeitgeistsf.com/" rel="noopener" target="_blank"><span data-dcnode-id="3379" instrument_node="">Zeitgeist</span></a><span data-dcnode-id="3377" instrument_node="">, a well-known beer garden with a backyard patio to hang out at as you enjoy your beer, cider, or wine. Looking for something to eat? Head over to </span><a data-dcnode-id="3375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.burmalove.co/" rel="noopener" target="_blank"><span data-dcnode-id="3376" instrument_node="">Burma Love</span></a><span data-dcnode-id="3374" instrument_node=""> to dip your toes in the world of Burmese cuisine (lots of gluten free options), or head to </span><a data-dcnode-id="3372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.littlestarpizza.com/" rel="noopener" target="_blank"><span data-dcnode-id="3373" instrument_node="">Little Star Pizza</span></a><span data-dcnode-id="3371" instrument_node=""> for some of the best pizza in San Francisco instead (not gluten free. Not even a little bit).&nbsp;&nbsp;</span></p><span data-dcnode-id="3369" instrument_node="">
</span><p data-dcnode-id="3362"><strong data-dcnode-id="3367"><span data-dcnode-id="3368" instrument_node="">Hike the Lands End Trail</span></strong><span data-dcnode-id="3366" instrument_node="">: This 3.4 mile hike features coastal terrain, beautiful views of the bay and the Golden Gate Bridge, and gets you out of the city for a bit of fresh air. It can get a bit busy on weekends, though, just as a heads up. More info </span><a data-dcnode-id="3364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nps.gov/goga/planyourvisit/landsend.htm" rel="noopener" target="_blank"><span data-dcnode-id="3365" instrument_node="">here</span></a><span data-dcnode-id="3363" instrument_node="">.&nbsp;</span></p><span data-dcnode-id="3361" instrument_node="">
</span><p data-dcnode-id="3345"><strong data-dcnode-id="3359"><span data-dcnode-id="3360" instrument_node="">Explore Golden Gate Park</span></strong><span data-dcnode-id="3358" instrument_node="">: On the western end of San Francisco, you’ll find </span><a data-dcnode-id="3356" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sfrecpark.org/770/Golden-Gate-Park" rel="noopener" target="_blank"><span data-dcnode-id="3357" instrument_node="">Golden Gate Park</span></a><span data-dcnode-id="3355" instrument_node=""> which spans over 1,000 acres and essentially runs all the way out to the coast. We recommend the </span><a data-dcnode-id="3353" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.calacademy.org/" rel="noopener" target="_blank"><span data-dcnode-id="3354" instrument_node="">California Academy of Sciences Museum</span></a><span data-dcnode-id="3352" instrument_node="">, which is one of the largest museums of natural history in the world. The </span><a data-dcnode-id="3350" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//deyoung.famsf.org/" rel="noopener" target="_blank"><span data-dcnode-id="3351" instrument_node="">De Young Museum</span></a><span data-dcnode-id="3349" instrument_node=""> is perfect for art lovers and you can’t forget to visit the </span><a data-dcnode-id="3347" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//goldengatepark.com/buffalo-paddock.html" rel="noopener" target="_blank"><span data-dcnode-id="3348" instrument_node="">Buffalo Paddock</span></a><span data-dcnode-id="3346" instrument_node=""> which has been home to small herds of bison since 1899.&nbsp;</span></p><span data-dcnode-id="3344" instrument_node="">
</span><p data-dcnode-id="3337"><strong data-dcnode-id="3342"><span data-dcnode-id="3343" instrument_node="">Picnic at Dolores Park</span></strong><span data-dcnode-id="3341" instrument_node="">: Pack up a blanket, some food, and head to Dolores Park for a picnic. You’ll enjoy the San Francisco skyline while relaxing and enjoying some fresh air. Don’t miss </span><a data-dcnode-id="3339" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biritemarket.com/creamery/" rel="noopener" target="_blank"><span data-dcnode-id="3340" instrument_node="">Bi-Rite Ice Cream</span></a><span data-dcnode-id="3338" instrument_node="">, which is right across the street!</span></p><span data-dcnode-id="3336" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="3332"><img alt="" class="wp-image-222407" data-dcnode-id="3335" data-lazy-sizes="(max-width: 1024px) 100vw, 1024px" data-lazy-src="https://wheatlesswanderlust.com/wp-content/uploads/2022/02/IMG_6573-1024x768.jpg" data-lazy-srcset="https://wheatlesswanderlust.com/wp-content/uploads/2022/02/IMG_6573-1024x768.jpg 1024w, https://wheatlesswanderlust.com/wp-content/uploads/2022/02/IMG_6573-300x225.jpg 300w, https://wheatlesswanderlust.com/wp-content/uploads/2022/02/IMG_6573-768x576.jpg 768w, https://wheatlesswanderlust.com/wp-content/uploads/2022/02/IMG_6573-1536x1152.jpg 1536w, https://wheatlesswanderlust.com/wp-content/uploads/2022/02/IMG_6573-scaled.jpg 2000w" height="768" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201024%20768'%3E%3C/svg%3E" width="1024"><noscript data-dcnode-id="3333"><span data-dcnode-id="3334" instrument_node="">&lt;img width="1024" height="768" src="https://wheatlesswanderlust.com/wp-content/uploads/2022/02/IMG_6573-1024x768.jpg" alt="" class="wp-image-222407" srcset="https://wheatlesswanderlust.com/wp-content/uploads/2022/02/IMG_6573-1024x768.jpg 1024w, https://wheatlesswanderlust.com/wp-content/uploads/2022/02/IMG_6573-300x225.jpg 300w, https://wheatlesswanderlust.com/wp-content/uploads/2022/02/IMG_6573-768x576.jpg 768w, https://wheatlesswanderlust.com/wp-content/uploads/2022/02/IMG_6573-1536x1152.jpg 1536w, https://wheatlesswanderlust.com/wp-content/uploads/2022/02/IMG_6573-scaled.jpg 2000w" sizes="(max-width: 1024px) 100vw, 1024px"&gt;</span></noscript></figure><span data-dcnode-id="3331" instrument_node="">
</span><h4 data-dcnode-id="3328"><span data-dcnode-id="3329" id="Where_to_Stay_in_San_Francisco"><span data-dcnode-id="3330" instrument_node="">Where to Stay in San Francisco</span></span></h4><span data-dcnode-id="3327" instrument_node="">
</span><p data-dcnode-id="3317"><span data-dcnode-id="3326" instrument_node="">Since you’re only going to be in San Francisco for a night (maybe two), we’d recommend staying as centrally as you can. For most people, that means </span><a data-dcnode-id="3323" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.booking.com/searchresults.en.html%3Fdistrict%3D1436%26aid%3D1738278%26no_rooms%3D1%26group_adults%3D2" rel="noreferrer noopener nofollow" target="_blank"><strong data-dcnode-id="3324"><span data-dcnode-id="3325" instrument_node="">Nob Hill</span></strong></a><span data-dcnode-id="3322" instrument_node=""> (more charming) or </span><a data-dcnode-id="3319" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.booking.com/searchresults.en.html%3Fdistrict%3D1735%26aid%3D1738278%26no_rooms%3D1%26group_adults%3D2" rel="noreferrer noopener nofollow" target="_blank"><strong data-dcnode-id="3320"><span data-dcnode-id="3321" instrument_node="">Union Square</span></strong></a><span data-dcnode-id="3318" instrument_node=""> (more central and well connected, but much less charming).&nbsp;</span></p><span data-dcnode-id="3316" instrument_node="">
</span><p data-dcnode-id="3306"><span data-dcnode-id="3315" instrument_node="">We’ve stayed at </span><a data-dcnode-id="3312" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.booking.com/hotel/us/petite-auberge.en.html%3Faid%3D1738278%26no_rooms%3D1%26group_adults%3D2" rel="noreferrer noopener nofollow" target="_blank"><strong data-dcnode-id="3313"><span data-dcnode-id="3314" instrument_node="">Petite Auberge</span></strong></a><span data-dcnode-id="3311" instrument_node=""> in Nob Hill, which is a little French-themed B&amp;B in a great location with a nice complimentary breakfast and happy hour (also look at their sister hotel the </span><a data-dcnode-id="3308" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.booking.com/hotel/us/white-swan-inn.en.html%3Faid%3D1738278%26no_rooms%3D1%26group_adults%3D2" rel="noreferrer noopener nofollow" target="_blank"><strong data-dcnode-id="3309"><span data-dcnode-id="3310" instrument_node="">White Swan Inn</span></strong></a><span data-dcnode-id="3307" instrument_node=""> a few doors down, which we’re itching to stay at soon!).&nbsp;</span></p><span data-dcnode-id="3305" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="3299"><img alt="" class="wp-image-222242" data-dcnode-id="3304" data-lazy-sizes="(max-width: 1024px) 100vw, 1024px" data-lazy-src="https://wheatlesswanderlust.com/wp-content/uploads/2022/02/DSC04885-1024x683.jpg" data-lazy-srcset="https://wheatlesswanderlust.com/wp-content/uploads/2022/02/DSC04885-1024x683.jpg 1024w, https://wheatlesswanderlust.com/wp-content/uploads/2022/02/DSC04885-300x200.jpg 300w, https://wheatlesswanderlust.com/wp-content/uploads/2022/02/DSC04885-768x512.jpg 768w, https://wheatlesswanderlust.com/wp-content/uploads/2022/02/DSC04885-1536x1024.jpg 1536w, https://wheatlesswanderlust.com/wp-content/uploads/2022/02/DSC04885-scaled.jpg 2000w" height="683" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201024%20683'%3E%3C/svg%3E" width="1024"><noscript data-dcnode-id="3302"><span data-dcnode-id="3303" instrument_node="">&lt;img width="1024" height="683" src="https://wheatlesswanderlust.com/wp-content/uploads/2022/02/DSC04885-1024x683.jpg" alt="" class="wp-image-222242" srcset="https://wheatlesswanderlust.com/wp-content/uploads/2022/02/DSC04885-1024x683.jpg 1024w, https://wheatlesswanderlust.com/wp-content/uploads/2022/02/DSC04885-300x200.jpg 300w, https://wheatlesswanderlust.com/wp-content/uploads/2022/02/DSC04885-768x512.jpg 768w, https://wheatlesswanderlust.com/wp-content/uploads/2022/02/DSC04885-1536x1024.jpg 1536w, https://wheatlesswanderlust.com/wp-content/uploads/2022/02/DSC04885-scaled.jpg 2000w" sizes="(max-width: 1024px) 100vw, 1024px"&gt;</span></noscript><figcaption data-dcnode-id="3300"><span data-dcnode-id="3301" instrument_node="">Our room at Petite Auberge in San Francisco</span></figcaption></figure><span data-dcnode-id="3298" instrument_node="">
</span><p data-dcnode-id="3289"><span data-dcnode-id="3297" instrument_node="">We also have a love affair with the </span><a data-dcnode-id="3294" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dpbolvw.net/click-9069370-14107497%3Furl%3Dhttps%253A%252F%252Fwww.citizenm.com%252Fhotels%252Funited-states%252Fsan-francisco%252Fsan-francisco-union-square" rel="noreferrer noopener nofollow" target="_blank"><strong data-dcnode-id="3295"><span data-dcnode-id="3296" instrument_node="">CitizenM Hotel in Union Square</span></strong></a><span data-dcnode-id="3293" instrument_node="">, which is a brand new hotel from our favorite hotel chain in the world (you can read about our </span><a data-dcnode-id="3291" data-id="222369" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wheatlesswanderlust.com/citizenm-hotel-seattle/"><span data-dcnode-id="3292" instrument_node="">stay in their Seattle hotel</span></a><span data-dcnode-id="3290" instrument_node=""> to understand why we say that). The rooms are about as comfortable as any hotel room we’ve stayed in, and are perfectly designed for a good night’s sleep.&nbsp;</span></p><span data-dcnode-id="3288" instrument_node="">
</span><p data-dcnode-id="3286"><span data-dcnode-id="3287" instrument_node="">The rooms are small, but they’ve made a choice to have common areas in the hotel like the ground floor living room that are better places to hang out than alone in your room.&nbsp;</span></p><span data-dcnode-id="3285" instrument_node="">
</span><p data-dcnode-id="3281"><strong data-dcnode-id="3283"><span data-dcnode-id="3284" instrument_node="">One caveat</span></strong><span data-dcnode-id="3282" instrument_node="">: All rooms come with one king bed (no two-bed options), so this might not be the best option for families with small children who want to be in the same room.&nbsp;&nbsp;</span></p><span data-dcnode-id="3280" instrument_node="">
</span><p data-dcnode-id="3276"><strong data-dcnode-id="3278"><span data-dcnode-id="3279" instrument_node="">Whatever you do, don’t stay in Fisherman’s Wharf!</span></strong><span data-dcnode-id="3277" instrument_node=""> It’s the least interesting part of the city, and it’s constantly packed with tourists. It has none of the charm that the rest of the city has, and we’d barely even recommend visiting, let alone staying there.&nbsp;</span></p><span data-dcnode-id="3275" instrument_node="">
</span><h2 class="has-text-align-center" data-dcnode-id="3272"><span data-dcnode-id="3273" id="Putting_it_Together_Sample_Northern_California_Coast_Itineraries"><span data-dcnode-id="3274" instrument_node="">Putting it Together: Sample Northern California Coast Itineraries</span></span></h2><span data-dcnode-id="3271" instrument_node="">
</span><p data-dcnode-id="3269"><span data-dcnode-id="3270" instrument_node="">Now that we’ve covered our top stops, let’s talk about how to put it all together. We’re going to give you a 7 and 10 day version of an itinerary that you can use as a base for planning your own trip.&nbsp;</span></p><span data-dcnode-id="3268" instrument_node="">
</span><p data-dcnode-id="3264"><strong data-dcnode-id="3266"><span data-dcnode-id="3267" instrument_node="">A note on San Francisco</span></strong><span data-dcnode-id="3265" instrument_node="">: Our preference is having San Francisco as a place to end your trip just because we like having a relaxing city break at the end after a lot of driving. You might prefer to start your trip with a day or two in San Francisco, but it comes down to personal preference.&nbsp;</span></p><span data-dcnode-id="3263" instrument_node="">
</span><h3 class="has-text-align-center" data-dcnode-id="3260"><span data-dcnode-id="3261" id="7_Days_in_Northern_California"><span data-dcnode-id="3262" instrument_node="">7 Days in Northern California</span></span></h3><span data-dcnode-id="3259" instrument_node="">
</span><p data-dcnode-id="3257"><span data-dcnode-id="3258" instrument_node="">With seven days in Northern California, we’d do the stretch of coast from San Francisco to Mendocino, and spend a couple of nights in wine country on the back end before ending with a day in San Francisco before you fly home.&nbsp;</span></p><span data-dcnode-id="3256" instrument_node="">
</span><p data-dcnode-id="3254"><span data-dcnode-id="3255" instrument_node="">In this version, we’re essentially choosing wine tasting over Redwood National and State Parks.</span></p><span data-dcnode-id="3253" instrument_node="">
</span><ul data-dcnode-id="3224"><li data-dcnode-id="3249"><strong data-dcnode-id="3251"><span data-dcnode-id="3252" instrument_node="">Day 1</span></strong><span data-dcnode-id="3250" instrument_node="">: Leave San Francisco, Marin Headlands, and drive to Point Reyes</span></li><li data-dcnode-id="3245"><strong data-dcnode-id="3247"><span data-dcnode-id="3248" instrument_node="">Day 2</span></strong><span data-dcnode-id="3246" instrument_node="">: Point Reyes and drive to Mendocino</span></li><li data-dcnode-id="3241"><strong data-dcnode-id="3243"><span data-dcnode-id="3244" instrument_node="">Day 3</span></strong><span data-dcnode-id="3242" instrument_node="">: Mendocino&nbsp;</span></li><li data-dcnode-id="3237"><strong data-dcnode-id="3239"><span data-dcnode-id="3240" instrument_node="">Day 4</span></strong><span data-dcnode-id="3238" instrument_node="">: Drive through Anderson Valley to Healdsburg</span></li><li data-dcnode-id="3233"><strong data-dcnode-id="3235"><span data-dcnode-id="3236" instrument_node="">Day 5</span></strong><span data-dcnode-id="3234" instrument_node="">: Wine Tasting in Healdsburg</span></li><li data-dcnode-id="3229"><strong data-dcnode-id="3231"><span data-dcnode-id="3232" instrument_node="">Day 6</span></strong><span data-dcnode-id="3230" instrument_node="">: Healdsburg to San Francisco</span></li><li data-dcnode-id="3225"><strong data-dcnode-id="3227"><span data-dcnode-id="3228" instrument_node="">Day 7</span></strong><span data-dcnode-id="3226" instrument_node="">: San Francisco and Fly Home</span></li></ul><span data-dcnode-id="3223" instrument_node="">
</span><h3 class="has-text-align-center" data-dcnode-id="3220"><span data-dcnode-id="3221" id="10_Days_in_Northern_California"><span data-dcnode-id="3222" instrument_node="">10 Days in Northern California</span></span></h3><span data-dcnode-id="3219" instrument_node="">
</span><p data-dcnode-id="3217"><span data-dcnode-id="3218" instrument_node="">With 10 days, you can comfortably do both the redwoods AND wine country. In this version, you’ll have a long drive from Trinidad back down to Healdsburg, but we think the drive is worth it.&nbsp;</span></p><span data-dcnode-id="3216" instrument_node="">
</span><ul data-dcnode-id="3175"><li data-dcnode-id="3212"><strong data-dcnode-id="3214"><span data-dcnode-id="3215" instrument_node="">Day 1</span></strong><span data-dcnode-id="3213" instrument_node="">: Leave San Francisco, Marin Headlands, and drive to Point Reyes</span></li><li data-dcnode-id="3208"><strong data-dcnode-id="3210"><span data-dcnode-id="3211" instrument_node="">Day 2</span></strong><span data-dcnode-id="3209" instrument_node="">: Point Reyes and drive to Mendocino</span></li><li data-dcnode-id="3204"><strong data-dcnode-id="3206"><span data-dcnode-id="3207" instrument_node="">Day 3</span></strong><span data-dcnode-id="3205" instrument_node="">: Mendocino &amp; Fort Bragg</span></li><li data-dcnode-id="3200"><strong data-dcnode-id="3202"><span data-dcnode-id="3203" instrument_node="">Day 4</span></strong><span data-dcnode-id="3201" instrument_node="">: Day Trip to the Anderson Valley from Mendocino</span></li><li data-dcnode-id="3196"><strong data-dcnode-id="3198"><span data-dcnode-id="3199" instrument_node="">Day 5</span></strong><span data-dcnode-id="3197" instrument_node="">: Drive Mendocino to Trinidad (stop in Eureka)</span></li><li data-dcnode-id="3192"><strong data-dcnode-id="3194"><span data-dcnode-id="3195" instrument_node="">Day 6</span></strong><span data-dcnode-id="3193" instrument_node="">: Trinidad &amp; Redwood National and State Parks</span></li><li data-dcnode-id="3188"><strong data-dcnode-id="3190"><span data-dcnode-id="3191" instrument_node="">Day 7</span></strong><span data-dcnode-id="3189" instrument_node="">: Drive to Healdsburg</span></li><li data-dcnode-id="3184"><strong data-dcnode-id="3186"><span data-dcnode-id="3187" instrument_node="">Day 8</span></strong><span data-dcnode-id="3185" instrument_node="">: Wine Tasting in Healdsburg</span></li><li data-dcnode-id="3180"><strong data-dcnode-id="3182"><span data-dcnode-id="3183" instrument_node="">Day 9</span></strong><span data-dcnode-id="3181" instrument_node="">: Healdsburg to San Francisco</span></li><li data-dcnode-id="3176"><strong data-dcnode-id="3178"><span data-dcnode-id="3179" instrument_node="">Day 10</span></strong><span data-dcnode-id="3177" instrument_node="">: Explore San Francisco and Fly Home</span></li></ul><span data-dcnode-id="3174" instrument_node="">
</span><div class="wp-block-columns" data-dcnode-id="3154"><span data-dcnode-id="3173" instrument_node="">
</span><div class="wp-block-column" data-dcnode-id="3165"><span data-dcnode-id="3172" instrument_node="">
