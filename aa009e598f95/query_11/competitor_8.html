</span><p data-dcnode-id="4354"><span data-dcnode-id="4362" instrument_node="">First is </span><a data-dcnode-id="4359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.booking.com/hotel/us/mendoino-grove.en.html%3Faid%3D1738278%26no_rooms%3D1%26group_adults%3D2" rel="noreferrer noopener nofollow" target="_blank"><strong data-dcnode-id="4360"><span data-dcnode-id="4361" instrument_node="">Mendocino Grove</span></strong></a><span data-dcnode-id="4358" instrument_node="">, which is glamping at its finest (and has been on our list for years, but we’re always passing through in the winter on our annual </span><a data-dcnode-id="4356" data-id="216700" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wheatlesswanderlust.com/seattle-to-san-francisco-road-trip/"><span data-dcnode-id="4357" instrument_node="">Seattle to San Francisco road trip</span></a><span data-dcnode-id="4355" instrument_node="">, which means they’re closed for the season). They have a bunch of platform tents (most sleep 2, some sleep 4-6) clustered in “neighborhoods” with outdoor common spaces to share between them. </span></p><span data-dcnode-id="4353" instrument_node="">
</span><p data-dcnode-id="4351"><span data-dcnode-id="4352" instrument_node="">Some tents are dog-friendly, and all come with their own fire pit for roasting marshmallows. In common areas, you’ll find things like bocce ball and hammocks for the down time when you’re not out exploring.&nbsp;</span></p><span data-dcnode-id="4350" instrument_node="">
</span><p data-dcnode-id="4348"><span data-dcnode-id="4349" instrument_node="">There’s a bathhouse too for hot showers, in case you like the idea of camping, but not the part where you’re greasy.&nbsp;</span></p><span data-dcnode-id="4347" instrument_node="">
</span><p data-dcnode-id="4345"><span data-dcnode-id="4346" instrument_node="">As two people who spent most of 2020 and 2021 on a never ending road trip around the Western US, we came to appreciate shower availability as a key amenity after several two week periods with no showers.&nbsp;</span></p><span data-dcnode-id="4344" instrument_node="">
</span><p data-dcnode-id="4338"><span data-dcnode-id="4343" instrument_node="">Second is the </span><a data-dcnode-id="4340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.booking.com/hotel/us/brewery-gulch-inn.en.html%3Faid%3D1738278%26no_rooms%3D1%26group_adults%3D2" rel="noreferrer noopener nofollow" target="_blank"><strong data-dcnode-id="4341"><span data-dcnode-id="4342" instrument_node="">Brewery Gulch Inn</span></strong></a><span data-dcnode-id="4339" instrument_node="">, which is just south of town perched atop a bluff with great coastal views. It’s a little different than most places, with more communal spaces like a dining room and living room (with a sweet four-sided fireplace!) with ten rooms built around those areas. Rooms are spacious and comfy, with seating areas and fireplaces. It’s expensive (like, really expensive), but it’s a cool take on a coastal inn.&nbsp;</span></p><span data-dcnode-id="4337" instrument_node="">
</span><p data-dcnode-id="4330"><strong data-dcnode-id="4335"><span data-dcnode-id="4336" instrument_node="">If you’re on a budget, consider staying further south around the town of </span></strong><a data-dcnode-id="4332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.booking.com/searchresults.en.html%3Fcity%3D20014107%26aid%3D1738278%26no_rooms%3D1%26group_adults%3D2" rel="noreferrer noopener nofollow" target="_blank"><strong data-dcnode-id="4333"><span data-dcnode-id="4334" instrument_node="">Little River</span></strong></a><span data-dcnode-id="4331" instrument_node="">.&nbsp;</span></p><span data-dcnode-id="4329" instrument_node="">
</span><p data-dcnode-id="4327"><span data-dcnode-id="4328" instrument_node="">We’ve stayed in the area, and it’s a perfect blend of close to Mendocino, but dead silent at night (unless you count the roosters in the morning). </span></p><span data-dcnode-id="4326" instrument_node="">
</span><p data-dcnode-id="4316"><span data-dcnode-id="4325" instrument_node="">Our two picks here are the </span><a data-dcnode-id="4322" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.booking.com/hotel/us/seafoam-lodge-little-river.en.html%3Faid%3D1738278%26no_rooms%3D1%26group_adults%3D2" rel="noreferrer noopener nofollow" target="_blank"><strong data-dcnode-id="4323"><span data-dcnode-id="4324" instrument_node="">Seafoam Lodge</span></strong></a><span data-dcnode-id="4321" instrument_node="">, which was recently renovated and has both hotel-style rooms and standalone bungalows waiting for you, and the </span><a data-dcnode-id="4318" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.booking.com/hotel/us/the-andiron-seaside-inn-amp-cabins.en.html%3Faid%3D1738278%26no_rooms%3D1%26group_adults%3D2" rel="noreferrer noopener nofollow" target="_blank"><strong data-dcnode-id="4319"><span data-dcnode-id="4320" instrument_node="">Andiron Seaside Inn and Cabins</span></strong></a><span data-dcnode-id="4317" instrument_node="">, which is a similar idea, but make it on a farm.&nbsp;</span></p><span data-dcnode-id="4315" instrument_node="">
</span><p data-dcnode-id="4309"><span data-dcnode-id="4314" instrument_node="">Another good option in Little River would be a </span><a data-dcnode-id="4311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.stay22.com/allez/vrbo/%3Fcampaign%3Dwheatless%2520northernCAroadtrip%26address%3Dlittle-river-california-united-states-of-america%26aid%3Dwheatlesswanderlust%26checkin%3D%26checkout%3D%26adults%3D%26children%3D%26link%3Dhttps%3A//www.vrbo.com/search/keywords%3Alittle-river-california-united-states-of-america%3FadultsCount%3D1%26petIncluded%3Dfalse" rel="noreferrer noopener nofollow" target="_blank"><strong data-dcnode-id="4312"><span data-dcnode-id="4313" instrument_node="">vacation rental</span></strong></a><span data-dcnode-id="4310" instrument_node="">, though some will have a two night minimum which could be problematic for shorter road trips.&nbsp;</span></p><span data-dcnode-id="4308" instrument_node="">
</span><ul data-dcnode-id="4287"><li data-dcnode-id="4295"><strong data-dcnode-id="4306"><span data-dcnode-id="4307" instrument_node="">For couples</span></strong><span data-dcnode-id="4305" instrument_node="">, we like </span><a data-dcnode-id="4303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.stay22.com/allez/vrbo/272501%3Fcampaign%3Dwheatless%2520northernCAroadtrip%26address%3D%26aid%3Dwheatlesswanderlust%26checkin%3D%26checkout%3D%26adults%3D%26children%3D%26link%3Dhttps%3A//www.vrbo.com/272501%3FadultsCount%3D1%26noDates%3Dtrue%26unitId%3D272501" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="4304" instrument_node="">this rustic forest suite</span></a><span data-dcnode-id="4302" instrument_node=""> with its lovely deck overlooking the forest, and </span><a data-dcnode-id="4300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.stay22.com/allez/vrbo/414268%3Fcampaign%3Dwheatless%2520northernCAroadtrip%26address%3D%26aid%3Dwheatlesswanderlust%26checkin%3D%26checkout%3D%26adults%3D%26children%3D%26link%3Dhttps%3A//www.vrbo.com/414268%3FadultsCount%3D1%26noDates%3Dtrue%26unitId%3D414268" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="4301" instrument_node="">this cool tower</span></a><span data-dcnode-id="4299" instrument_node=""> that has everything two people will need for a quick stay</span><br data-dcnode-id="4298"><br data-dcnode-id="4297"><span data-dcnode-id="4296" instrument_node="">.&nbsp;</span></li><li data-dcnode-id="4288"><strong data-dcnode-id="4293"><span data-dcnode-id="4294" instrument_node="">For families and groups</span></strong><span data-dcnode-id="4292" instrument_node="">, look at </span><a data-dcnode-id="4290" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.stay22.com/allez/vrbo/237492%3Fcampaign%3Dwheatless%2520northernCAroadtrip%26address%3D%26aid%3Dwheatlesswanderlust%26checkin%3D%26checkout%3D%26adults%3D%26children%3D%26link%3Dhttps%3A//www.vrbo.com/237492%3FadultsCount%3D1%26noDates%3Dtrue%26unitId%3D237492" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="4291" instrument_node="">this two bedroom house</span></a><span data-dcnode-id="4289" instrument_node=""> with a fantastic view from the Adirondack chairs on the deck.&nbsp;</span></li></ul><span data-dcnode-id="4286" instrument_node="">
</span><div class="wp-container-1 wp-block-buttons" data-dcnode-id="4280"><span data-dcnode-id="4285" instrument_node="">
</span><div class="wp-block-button" data-dcnode-id="4282"><a class="wp-block-button__link has-background" data-dcnode-id="4283" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.stay22.com/allez/vrbo/%3Fcampaign%3Dwheatless%2520northernCAroadtrip%26address%3Dlittle-river-california-united-states-of-america%26aid%3Dwheatlesswanderlust%26checkin%3D%26checkout%3D%26adults%3D%26children%3D%26link%3Dhttps%3A//www.vrbo.com/search/keywords%3Alittle-river-california-united-states-of-america%3FadultsCount%3D1%26petIncluded%3Dfalse" rel="noreferrer noopener nofollow" style="background-color:#3e7a8d" target="_blank"><span data-dcnode-id="4284" instrument_node="">click here to find the perfect place to stay in mendocino </span></a></div><span data-dcnode-id="4281" instrument_node="">
</span></div><span data-dcnode-id="4279" instrument_node="">
</span><h3 class="has-text-align-center" data-dcnode-id="4276"><span data-dcnode-id="4277" id="Eureka"><span data-dcnode-id="4278" instrument_node="">Eureka</span></span></h3><span data-dcnode-id="4275" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="4271"><img alt="" class="wp-image-222524" data-dcnode-id="4274" data-lazy-sizes="(max-width: 1024px) 100vw, 1024px" data-lazy-src="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/IMG_4374-1024x576.jpg" data-lazy-srcset="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/IMG_4374-1024x576.jpg 1024w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/IMG_4374-300x169.jpg 300w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/IMG_4374-768x432.jpg 768w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/IMG_4374-1536x864.jpg 1536w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/IMG_4374-scaled.jpg 2000w" height="576" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201024%20576'%3E%3C/svg%3E" width="1024"><noscript data-dcnode-id="4272"><span data-dcnode-id="4273" instrument_node="">&lt;img width="1024" height="576" src="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/IMG_4374-1024x576.jpg" alt="" class="wp-image-222524" srcset="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/IMG_4374-1024x576.jpg 1024w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/IMG_4374-300x169.jpg 300w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/IMG_4374-768x432.jpg 768w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/IMG_4374-1536x864.jpg 1536w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/IMG_4374-scaled.jpg 2000w" sizes="(max-width: 1024px) 100vw, 1024px"&gt;</span></noscript></figure><span data-dcnode-id="4270" instrument_node="">
</span><p data-dcnode-id="4267"><em data-dcnode-id="4268"><span data-dcnode-id="4269" instrument_node="">Drive time from Mendocino: 3 hours / 145 miles</span></em></p><span data-dcnode-id="4266" instrument_node="">
</span><p data-dcnode-id="4264"><span data-dcnode-id="4265" instrument_node="">On your way up to Trinidad, which we think should be your next overnight stop, you will pass through the town of Eureka, which is peak Humboldt County in our minds.&nbsp;</span></p><span data-dcnode-id="4263" instrument_node="">
</span><p data-dcnode-id="4261"><span data-dcnode-id="4262" instrument_node="">This is your last chance for most amenities – there’s a Costco (and a Costco Gas, which is the cheapest gas in town), a Safeway, and other things of that nature.&nbsp;</span></p><span data-dcnode-id="4260" instrument_node="">
</span><p data-dcnode-id="4258"><span data-dcnode-id="4259" instrument_node="">Plus, when you’re in Eureka, there are a few places that you definitely shouldn’t miss.&nbsp;</span></p><span data-dcnode-id="4257" instrument_node="">
</span><p data-dcnode-id="4252"><a data-dcnode-id="4254" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.humboldtciderco.com/" rel="noopener" target="_blank"><strong data-dcnode-id="4255"><span data-dcnode-id="4256" instrument_node="">Humboldt Cider Company</span></strong></a><span data-dcnode-id="4253" instrument_node="">: Excellent – and we really, really mean that – hard cider. We’d argue it’s some of the best in California. We make sure to stop here every time we drive through the area. They have a taproom in downtown Eureka, which we stopped at on our last trip and has an incredible selection of their ciders on tap (along with some local beers that are hard to find elsewhere), and a cider garden up the hill outside of town, which is weekends only at the time of writing and has a great outdoor space.&nbsp;</span></p><span data-dcnode-id="4251" instrument_node="">
</span><div class="wp-block-kadence-rowlayout alignnone" data-dcnode-id="4229"><div class="kt-row-layout-inner kt-layout-id_cdb8f5-c5" data-dcnode-id="4230" id="kt-layout-id_cdb8f5-c5"><div class="kt-row-column-wrap kt-has-2-columns kt-gutter-default kt-v-gutter-default kt-row-valign-top kt-row-layout-equal kt-tab-layout-inherit kt-m-colapse-left-to-right kt-mobile-layout-row" data-dcnode-id="4231"><span data-dcnode-id="4250" instrument_node="">

</span></div></div><span data-dcnode-id="4232" instrument_node="">
</span></div></div></div><span data-dcnode-id="4228" instrument_node="">
</span><p data-dcnode-id="4223"><a data-dcnode-id="4225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lostcoast.com/" rel="noopener" target="_blank"><strong data-dcnode-id="4226"><span data-dcnode-id="4227" instrument_node="">Lost Coast Brewing</span></strong></a><span data-dcnode-id="4224" instrument_node="">: For the beer lovers, this is a famous California brewery up on the northern coast. They do brewery tours (see their website for details, which are ever changing at this point in time).&nbsp;</span></p><span data-dcnode-id="4222" instrument_node="">
</span><p data-dcnode-id="4217"><a data-dcnode-id="4219" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dicktaylorchocolate.com/" rel="noopener" target="_blank"><strong data-dcnode-id="4220"><span data-dcnode-id="4221" instrument_node="">Dick Taylor Craft Chocolate</span></strong></a><span data-dcnode-id="4218" instrument_node="">: A discovery on our latest foray into Eureka, this place is magical. It’s an oasis for chocolate lovers, with a great selection of different chocolates from around the world alongside their own chocolate, which you can watch being made through the window to the production facility right there in the tasting room. They also have hot chocolate and sipping chocolate at the bar, though the chocolate chai was the clear winner for us (the sipping chocolate was great too, but that chocolate chai…YUM). Plus, free samples!&nbsp;</span></p><span data-dcnode-id="4216" instrument_node="">
</span><div class="wp-block-kadence-rowlayout alignnone" data-dcnode-id="4194"><div class="kt-row-layout-inner kt-layout-id_7f3f69-1f" data-dcnode-id="4195" id="kt-layout-id_7f3f69-1f"><div class="kt-row-column-wrap kt-has-2-columns kt-gutter-default kt-v-gutter-default kt-row-valign-top kt-row-layout-equal kt-tab-layout-inherit kt-m-colapse-left-to-right kt-mobile-layout-row" data-dcnode-id="4196"><span data-dcnode-id="4215" instrument_node="">

</span></div></div><span data-dcnode-id="4197" instrument_node="">
</span></div></div></div><span data-dcnode-id="4193" instrument_node="">
</span><p data-dcnode-id="4186"><strong data-dcnode-id="4191"><span data-dcnode-id="4192" instrument_node="">Incredible Murals</span></strong><span data-dcnode-id="4190" instrument_node="">: Eureka is known as a haven for artists, and when you walk around town that fact becomes pretty apparent. There’s a great collection of street art in Eureka, mostly on the sides of buildings, and if you’re up for a little walk to stretch your legs, we’d recommend </span><a data-dcnode-id="4188" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theredwoodriverwalk.com/blog/2021/12/your-guide-to-street-art-eureka-ca.htm" rel="noopener" target="_blank"><span data-dcnode-id="4189" instrument_node="">this self-guided tour of Eureka’s murals</span></a><span data-dcnode-id="4187" instrument_node="">.&nbsp;</span></p><span data-dcnode-id="4185" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="4181"><img alt="" class="wp-image-222527" data-dcnode-id="4184" data-lazy-sizes="(max-width: 1024px) 100vw, 1024px" data-lazy-src="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/IMG_4386-1024x576.jpg" data-lazy-srcset="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/IMG_4386-1024x576.jpg 1024w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/IMG_4386-300x169.jpg 300w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/IMG_4386-768x432.jpg 768w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/IMG_4386-1536x864.jpg 1536w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/IMG_4386-scaled.jpg 2000w" height="576" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201024%20576'%3E%3C/svg%3E" width="1024"><noscript data-dcnode-id="4182"><span data-dcnode-id="4183" instrument_node="">&lt;img width="1024" height="576" src="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/IMG_4386-1024x576.jpg" alt="" class="wp-image-222527" srcset="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/IMG_4386-1024x576.jpg 1024w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/IMG_4386-300x169.jpg 300w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/IMG_4386-768x432.jpg 768w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/IMG_4386-1536x864.jpg 1536w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/IMG_4386-scaled.jpg 2000w" sizes="(max-width: 1024px) 100vw, 1024px"&gt;</span></noscript></figure><span data-dcnode-id="4180" instrument_node="">
</span><h3 class="has-text-align-center" data-dcnode-id="4177"><span data-dcnode-id="4178" id="Trinidad"><span data-dcnode-id="4179" instrument_node="">Trinidad</span></span></h3><span data-dcnode-id="4176" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="4172"><img alt="" class="wp-image-222530" data-dcnode-id="4175" data-lazy-sizes="(max-width: 1024px) 100vw, 1024px" data-lazy-src="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC00218-1024x683.jpg" data-lazy-srcset="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC00218-1024x683.jpg 1024w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC00218-300x200.jpg 300w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC00218-768x512.jpg 768w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC00218-1536x1024.jpg 1536w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC00218-scaled.jpg 2000w" height="683" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201024%20683'%3E%3C/svg%3E" width="1024"><noscript data-dcnode-id="4173"><span data-dcnode-id="4174" instrument_node="">&lt;img width="1024" height="683" src="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC00218-1024x683.jpg" alt="" class="wp-image-222530" srcset="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC00218-1024x683.jpg 1024w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC00218-300x200.jpg 300w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC00218-768x512.jpg 768w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC00218-1536x1024.jpg 1536w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC00218-scaled.jpg 2000w" sizes="(max-width: 1024px) 100vw, 1024px"&gt;</span></noscript></figure><span data-dcnode-id="4171" instrument_node="">
</span><p data-dcnode-id="4168"><em data-dcnode-id="4169"><span data-dcnode-id="4170" instrument_node="">Drive time from Eureka: 25 minutes / 20 miles</span></em></p><span data-dcnode-id="4167" instrument_node="">
</span><p data-dcnode-id="4165"><span data-dcnode-id="4166" instrument_node="">Although Trinidad is a tiny little seaside town about 25 minutes from Eureka, there is plenty to do, including some of the best beaches on the Northern California coast. </span></p><span data-dcnode-id="4164" instrument_node="">
</span><p data-dcnode-id="4162"><span data-dcnode-id="4163" instrument_node="">We think it’s a better home base for the Northern California coast than Eureka, too, because it’s about 30 minutes closer to the parks that make up the complex that is Redwood National and State Parks.</span></p><span data-dcnode-id="4161" instrument_node="">
</span><p data-dcnode-id="4159"><span data-dcnode-id="4160" instrument_node="">Here are some of our recommendations:</span></p><span data-dcnode-id="4158" instrument_node="">
</span><p data-dcnode-id="4150"><strong data-dcnode-id="4156"><span data-dcnode-id="4157" instrument_node="">Trinidad State Beach</span></strong><span data-dcnode-id="4155" instrument_node="">: A good stop to combine with the above trail, this is walkable from that same trailhead and is a nice sandy beach with </span><strong data-dcnode-id="4152"><a data-dcnode-id="4153" data-id="222568" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wheatlesswanderlust.com/oregon-coast-road-trip-itinerary/"><span data-dcnode-id="4154" instrument_node="">Oregon Coast</span></a></strong><span data-dcnode-id="4151" instrument_node=""> vibes thanks to the many towering sea stacks jutting out of the ocean just off the coast. Pewetole Island is the biggest and most impressive.</span></p><span data-dcnode-id="4149" instrument_node="">
</span><p data-dcnode-id="4145"><strong data-dcnode-id="4147"><span data-dcnode-id="4148" instrument_node="">College Cove</span></strong><span data-dcnode-id="4146" instrument_node="">: This is a secluded stretch of beach just north of Trinidad State Beach with views of tree-covered Pewetole Island. You have to do a quick and easy little hike to get there, which dramatically cuts the crowds when compared with other nearby beaches. Dog friendly.</span></p><span data-dcnode-id="4144" instrument_node="">
</span><p data-dcnode-id="4129"><a data-dcnode-id="4141" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.parks.ca.gov/%3Fpage_id%3D417" rel="noopener" target="_blank"><strong data-dcnode-id="4142"><span data-dcnode-id="4143" instrument_node="">Sue-Meg State Park</span></strong></a><span data-dcnode-id="4140" instrument_node=""> (Formerly </span><strong data-dcnode-id="4138"><span data-dcnode-id="4139" instrument_node="">Patrick’s Point State Park)</span></strong><span data-dcnode-id="4137" instrument_node="">: This is a very small park (1 square mile) with tidepools and plenty of beautiful plant life with a chance to see seals, sea lions, and whales. It’s definitely worth hiking the </span><a data-dcnode-id="4134" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.alltrails.com/trail/us/california/patricks-point-rim-trail" rel="noopener" target="_blank"><strong data-dcnode-id="4135"><span data-dcnode-id="4136" instrument_node="">rim trail</span></strong></a><span data-dcnode-id="4133" instrument_node="">, which takes you around the exterior of the head where you’ll find several stunning views. Don’t miss the climb to the top of </span><strong data-dcnode-id="4131"><span data-dcnode-id="4132" instrument_node="">Wedding Rock</span></strong><span data-dcnode-id="4130" instrument_node="">, which was probably our favorite view in the park.</span></p><span data-dcnode-id="4128" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="4122"><img alt="" class="wp-image-222531" data-dcnode-id="4127" data-lazy-sizes="(max-width: 1024px) 100vw, 1024px" data-lazy-src="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC00204-1024x683.jpg" data-lazy-srcset="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC00204-1024x683.jpg 1024w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC00204-300x200.jpg 300w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC00204-768x512.jpg 768w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC00204-1536x1024.jpg 1536w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC00204-scaled.jpg 2000w" height="683" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201024%20683'%3E%3C/svg%3E" width="1024"><noscript data-dcnode-id="4125"><span data-dcnode-id="4126" instrument_node="">&lt;img width="1024" height="683" src="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC00204-1024x683.jpg" alt="" class="wp-image-222531" srcset="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC00204-1024x683.jpg 1024w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC00204-300x200.jpg 300w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC00204-768x512.jpg 768w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC00204-1536x1024.jpg 1536w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC00204-scaled.jpg 2000w" sizes="(max-width: 1024px) 100vw, 1024px"&gt;</span></noscript><figcaption data-dcnode-id="4123"><span data-dcnode-id="4124" instrument_node="">Approaching Wedding Rock on the Rim Trail</span></figcaption></figure><span data-dcnode-id="4121" instrument_node="">
</span><div class="wp-block-kadence-rowlayout alignnone" data-dcnode-id="4099"><div class="kt-row-layout-inner kt-layout-id_d3ce82-98" data-dcnode-id="4100" id="kt-layout-id_d3ce82-98"><div class="kt-row-column-wrap kt-has-2-columns kt-gutter-default kt-v-gutter-default kt-row-valign-top kt-row-layout-equal kt-tab-layout-inherit kt-m-colapse-left-to-right kt-mobile-layout-row" data-dcnode-id="4101"><span data-dcnode-id="4120" instrument_node="">
</span><div class="wp-block-kadence-column inner-column-1 kadence-column_4d218b-f2" data-dcnode-id="4112"><div class="kt-inside-inner-col" data-dcnode-id="4113"><span data-dcnode-id="4119" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="4115"><img alt="" class="wp-image-222532" data-dcnode-id="4118" data-lazy-sizes="(max-width: 683px) 100vw, 683px" data-lazy-src="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC00214-683x1024.jpg" data-lazy-srcset="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC00214-683x1024.jpg 683w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC00214-200x300.jpg 200w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC00214-768x1152.jpg 768w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC00214-1024x1536.jpg 1024w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC00214-scaled.jpg 1333w" height="1024" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20683%201024'%3E%3C/svg%3E" width="683"><noscript data-dcnode-id="4116"><span data-dcnode-id="4117" instrument_node="">&lt;img width="683" height="1024" src="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC00214-683x1024.jpg" alt="" class="wp-image-222532" srcset="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC00214-683x1024.jpg 683w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC00214-200x300.jpg 200w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC00214-768x1152.jpg 768w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC00214-1024x1536.jpg 1024w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC00214-scaled.jpg 1333w" sizes="(max-width: 683px) 100vw, 683px"&gt;</span></noscript></figure><span data-dcnode-id="4114" instrument_node="">

</span></div></div><span data-dcnode-id="4102" instrument_node="">
</span></div></div></div><span data-dcnode-id="4098" instrument_node="">
</span><p data-dcnode-id="4093"><a data-dcnode-id="4095" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.visitredwoods.com/listing/moonstone-little-river-and-clam-beaches/531/" rel="noopener" target="_blank"><strong data-dcnode-id="4096"><span data-dcnode-id="4097" instrument_node="">Moonstone Beach County Park</span></strong></a><span data-dcnode-id="4094" instrument_node="">: This is a popular spot for surfers and families because kids can safely play in the slow river current.&nbsp;</span></p><span data-dcnode-id="4092" instrument_node="">
</span><p data-dcnode-id="4087"><a data-dcnode-id="4089" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.alltrails.com/trail/us/california/trinidad-head" rel="noopener" target="_blank"><strong data-dcnode-id="4090"><span data-dcnode-id="4091" instrument_node="">Trinidad Head Trail</span></strong></a><span data-dcnode-id="4088" instrument_node="">: This is an easy 1.7 mile loop trail with breathtaking views of the coast from its many spurs that take you out to points where you’re overlooking the ocean and Trinidad State Beach.&nbsp;</span></p><span data-dcnode-id="4086" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="4080"><img alt="" class="wp-image-222534" data-dcnode-id="4085" data-lazy-sizes="(max-width: 1024px) 100vw, 1024px" data-lazy-src="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC08984-1024x683.jpg" data-lazy-srcset="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC08984-1024x683.jpg 1024w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC08984-300x200.jpg 300w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC08984-768x512.jpg 768w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC08984-1536x1024.jpg 1536w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC08984-scaled.jpg 2000w" height="683" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201024%20683'%3E%3C/svg%3E" width="1024"><noscript data-dcnode-id="4083"><span data-dcnode-id="4084" instrument_node="">&lt;img width="1024" height="683" src="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC08984-1024x683.jpg" alt="" class="wp-image-222534" srcset="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC08984-1024x683.jpg 1024w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC08984-300x200.jpg 300w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC08984-768x512.jpg 768w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC08984-1536x1024.jpg 1536w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC08984-scaled.jpg 2000w" sizes="(max-width: 1024px) 100vw, 1024px"&gt;</span></noscript><figcaption data-dcnode-id="4081"><span data-dcnode-id="4082" instrument_node="">Views from the Trinidad Head Trail</span></figcaption></figure><span data-dcnode-id="4079" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="4073"><img alt="" class="wp-image-222535" data-dcnode-id="4078" data-lazy-sizes="(max-width: 1024px) 100vw, 1024px" data-lazy-src="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC08997-1024x683.jpg" data-lazy-srcset="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC08997-1024x683.jpg 1024w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC08997-300x200.jpg 300w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC08997-768x512.jpg 768w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC08997-1536x1024.jpg 1536w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC08997-scaled.jpg 2000w" height="683" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201024%20683'%3E%3C/svg%3E" width="1024"><noscript data-dcnode-id="4076"><span data-dcnode-id="4077" instrument_node="">&lt;img width="1024" height="683" src="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC08997-1024x683.jpg" alt="" class="wp-image-222535" srcset="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC08997-1024x683.jpg 1024w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC08997-300x200.jpg 300w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC08997-768x512.jpg 768w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC08997-1536x1024.jpg 1536w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC08997-scaled.jpg 2000w" sizes="(max-width: 1024px) 100vw, 1024px"&gt;</span></noscript><figcaption data-dcnode-id="4074"><span data-dcnode-id="4075" instrument_node="">Views from the Trinidad Head Trail</span></figcaption></figure><span data-dcnode-id="4072" instrument_node="">
</span><h4 data-dcnode-id="4069"><span data-dcnode-id="4070" id="Where_to_Stay_in_Trinidad"><span data-dcnode-id="4071" instrument_node="">Where to Stay in Trinidad</span></span></h4><span data-dcnode-id="4068" instrument_node="">
</span><p data-dcnode-id="4062"><span data-dcnode-id="4067" instrument_node="">We stayed at the </span><a data-dcnode-id="4064" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.booking.com/hotel/us/view-crest.en.html%3Faid%3D1738278%26no_rooms%3D1%26group_adults%3D2" rel="noreferrer noopener nofollow" target="_blank"><strong data-dcnode-id="4065"><span data-dcnode-id="4066" instrument_node="">View Crest Lodge</span></strong></a><span data-dcnode-id="4063" instrument_node=""> in Trinidad, which is close to the redwoods and the beach and has cute cozy cabins for rent (we loved it, by the way). Rooms are spacious, some have full kitchens, which we appreciate because we’re usually cooking for ourselves, and our room had a deck with an ocean view. Plus, we could hear the barking sea lions from our bed!</span></p><span data-dcnode-id="4061" instrument_node="">

</span><p data-dcnode-id="4041"><span data-dcnode-id="4046" instrument_node="">We also looked at the </span><a data-dcnode-id="4043" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.booking.com/hotel/us/emerald-forest-cabins.en.html%3Faid%3D1738278%26no_rooms%3D1%26group_adults%3D2" rel="noreferrer noopener nofollow" target="_blank"><strong data-dcnode-id="4044"><span data-dcnode-id="4045" instrument_node="">Emerald Forest Cabins</span></strong></a><span data-dcnode-id="4042" instrument_node="">, which are just north of the city of Trinidad and were our second choice.&nbsp;</span></p><span data-dcnode-id="4040" instrument_node="">
</span><p data-dcnode-id="4035"><span data-dcnode-id="4039" instrument_node="">Prefer a </span><strong data-dcnode-id="4037"><span data-dcnode-id="4038" instrument_node="">vacation rental</span></strong><span data-dcnode-id="4036" instrument_node="">, so you have more space?</span></p><span data-dcnode-id="4034" instrument_node="">
</span><ul data-dcnode-id="4014"><li data-dcnode-id="4025"><strong data-dcnode-id="4032"><span data-dcnode-id="4033" instrument_node="">Couples </span></strong><span data-dcnode-id="4031" instrument_node="">should look at </span><a data-dcnode-id="4029" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//go.skimresources.com/%3Fid%3D136989X1600562%26xs%3D1%26url%3Dhttps%253A%252F%252Fwww.vrbo.com%252F15068%253FadultsCount%253D2%2526noDates%253Dtrue%2526unitId%253D15068" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="4030" instrument_node="">this gorgeous house on a bluff</span></a><span data-dcnode-id="4028" instrument_node=""> with spectacular ocean views from the living room.</span><br data-dcnode-id="4027"><br data-dcnode-id="4026"></li><li data-dcnode-id="4015"><strong data-dcnode-id="4023"><span data-dcnode-id="4024" instrument_node="">Families and Groups </span></strong><span data-dcnode-id="4022" instrument_node="">have a few great options – </span><a data-dcnode-id="4020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//go.skimresources.com/%3Fid%3D136989X1600562%26xs%3D1%26url%3Dhttps%253A%252F%252Fwww.vrbo.com%252F5978%253FadultsCount%253D2%2526noDates%253Dtrue%2526unitId%253D5978" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="4021" instrument_node="">this beautiful cottage with ocean views</span></a><span data-dcnode-id="4019" instrument_node=""> looks amazing, as does </span><a data-dcnode-id="4017" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//go.skimresources.com/%3Fid%3D136989X1600562%26xs%3D1%26url%3Dhttps%253A%252F%252Fwww.vrbo.com%252F1864431%253FadultsCount%253D2%2526noDates%253Dtrue%2526unitId%253D2426940" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="4018" instrument_node="">this dog-friendly top floor flat</span></a><span data-dcnode-id="4016" instrument_node="">.&nbsp;</span></li></ul><span data-dcnode-id="4013" instrument_node="">
</span><p class="has-theme-palette-7-background-color has-background" data-dcnode-id="4009"><a data-dcnode-id="4010" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.stay22.com/allez/vrbo/%3Fcampaign%3Dwheatless%2520northernCAroadtrip%26address%3Dtrinidad-california-united-states-of-america%26aid%3Dwheatlesswanderlust%26checkin%3D%26checkout%3D%26adults%3D%26children%3D%26link%3Dhttps%3A//www.vrbo.com/search/keywords%3Atrinidad-california-united-states-of-america%3FpetIncluded%3Dfalse" rel="noreferrer noopener nofollow" target="_blank"><strong data-dcnode-id="4011"><span data-dcnode-id="4012" instrument_node="">Click here to see all of your vacation rental options in Trinidad.</span></strong></a></p><span data-dcnode-id="4008" instrument_node="">
</span><h3 class="has-text-align-center" data-dcnode-id="4005"><span data-dcnode-id="4006" id="Redwood_National_State_Parks"><span data-dcnode-id="4007" instrument_node="">Redwood National &amp; State Parks</span></span></h3><span data-dcnode-id="4004" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="4000"><img alt="" class="wp-image-222542" data-dcnode-id="4003" data-lazy-sizes="(max-width: 1024px) 100vw, 1024px" data-lazy-src="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/IMG_6153-1024x768.jpg" data-lazy-srcset="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/IMG_6153-1024x768.jpg 1024w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/IMG_6153-300x225.jpg 300w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/IMG_6153-768x576.jpg 768w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/IMG_6153-1536x1152.jpg 1536w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/IMG_6153.jpg 2000w" height="768" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201024%20768'%3E%3C/svg%3E" width="1024"><noscript data-dcnode-id="4001"><span data-dcnode-id="4002" instrument_node="">&lt;img width="1024" height="768" src="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/IMG_6153-1024x768.jpg" alt="" class="wp-image-222542" srcset="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/IMG_6153-1024x768.jpg 1024w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/IMG_6153-300x225.jpg 300w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/IMG_6153-768x576.jpg 768w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/IMG_6153-1536x1152.jpg 1536w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/IMG_6153.jpg 2000w" sizes="(max-width: 1024px) 100vw, 1024px"&gt;</span></noscript></figure><span data-dcnode-id="3999" instrument_node="">
</span><p data-dcnode-id="3996"><em data-dcnode-id="3997"><span data-dcnode-id="3998" instrument_node="">Drive time from Trinidad to Crescent City (northernmost point): 1 hour 20 minutes / 60 miles</span></em></p><span data-dcnode-id="3995" instrument_node="">
</span><p data-dcnode-id="3990"><span data-dcnode-id="3994" instrument_node="">This part of the California coast is pretty special. On our last trip, where we were coming from a </span><a data-dcnode-id="3992" data-id="222568" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wheatlesswanderlust.com/oregon-coast-road-trip-itinerary/"><span data-dcnode-id="3993" instrument_node="">road trip on the Oregon Coast </span></a><span data-dcnode-id="3991" instrument_node="">back to San Francisco, we were driving along a stretch of 101 just south of the Oregon border, winding our way through the towering trees. We came around a bend at the bottom of a long hill and BOOM. There was the ocean.&nbsp;</span></p><span data-dcnode-id="3989" instrument_node="">
</span><p data-dcnode-id="3987"><span data-dcnode-id="3988" instrument_node="">In this less-visited (mostly because it’s kind of hard to get to) part of Northern California, you’ll find towering redwoods that are several thousand years old that are tucked away just off the beautiful California coastline. It’s incredibly unique, and is well worth an overnight stay.</span></p><span data-dcnode-id="3986" instrument_node="">
</span><p data-dcnode-id="3982"><strong data-dcnode-id="3984"><span data-dcnode-id="3985" instrument_node="">So what exactly is covered under “Redwood National and State Parks?</span></strong><span data-dcnode-id="3983" instrument_node="">” It’s a complex that falls under the National Park Service, but includes a couple of different California State Parks, including Jedediah Smith Redwoods State Park, Del Norte Coast Redwoods State Park, and Prairie Creek Redwoods State Park, among others.&nbsp;</span></p><span data-dcnode-id="3981" instrument_node="">
</span><p data-dcnode-id="3979"><span data-dcnode-id="3980" instrument_node="">These parks were brought under the NPS after activism by the Save the Redwoods League, who fought to preserve the best example of coastal redwoods in the state against the desire of logging companies.&nbsp;</span></p><span data-dcnode-id="3978" instrument_node="">
</span><p data-dcnode-id="3976"><span data-dcnode-id="3977" instrument_node="">It’s worth remembering that these lands belonged to Native Americans in the past. For thousands of years before the arrival of European settlers, several tribes in Northwest California called this area home, and the Yurok and Tolowa both have ancestral lands within the boundaries of the parks.&nbsp;</span></p><span data-dcnode-id="3975" instrument_node="">
</span><p data-dcnode-id="3973"><span data-dcnode-id="3974" instrument_node="">The British explorer Jedidiah Smith, for whom one of the state parks is named, was the first European to explore the northern coast. A subsequent gold rush in the 1850’s brought conflict to the Native American tribes in the area, and led to the removal (and murder) of thousands of people so that the newcomers could peacefully search for gold.&nbsp;</span></p><span data-dcnode-id="3972" instrument_node="">
</span><p data-dcnode-id="3970"><span data-dcnode-id="3971" instrument_node="">Not a great look, America.&nbsp;</span></p><span data-dcnode-id="3969" instrument_node="">
</span><p data-dcnode-id="3967"><span data-dcnode-id="3968" instrument_node="">Remember that as you are exploring the incredible natural beauty here.&nbsp;</span></p><span data-dcnode-id="3966" instrument_node="">
</span><p data-dcnode-id="3964"><span data-dcnode-id="3965" instrument_node="">With all that said, here are some worthwhile stops in Redwood National and State Parks.</span></p><span data-dcnode-id="3963" instrument_node="">
</span><h4 data-dcnode-id="3960"><span data-dcnode-id="3961" id="Things_to_Do_at_Redwood_National_and_State_Parks"><span data-dcnode-id="3962" instrument_node="">Things to Do at Redwood National and State Parks</span></span></h4><span data-dcnode-id="3959" instrument_node="">
</span><p data-dcnode-id="3957"><span data-dcnode-id="3958" instrument_node="">The truth is, you could probably spend a full two weeks exploring the Redwoods. But since we’re working through a full itinerary, we’ve compiled the best destinations below, at least according to our experience.&nbsp;</span></p><span data-dcnode-id="3956" instrument_node="">
</span><p data-dcnode-id="3954"><span data-dcnode-id="3955" instrument_node="">We just spent a couple of days exploring the redwoods in this neck of the woods (see what we did there?) for basically the first time, and it was breathtaking despite the fact that it was pouring the entire time. </span></p><span data-dcnode-id="3953" instrument_node="">
</span><p data-dcnode-id="3949"><strong data-dcnode-id="3951"><span data-dcnode-id="3952" instrument_node="">UPDATE 2022</span></strong><span data-dcnode-id="3950" instrument_node="">: We just spent another few days up here, and we can confirm that it’s still spectacular!</span></p><span data-dcnode-id="3948" instrument_node="">
</span><p data-dcnode-id="3940"><a data-dcnode-id="3945" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.alltrails.com/trail/us/california/fern-canyon-loop-trail" rel="noopener" target="_blank"><strong data-dcnode-id="3946"><span data-dcnode-id="3947" instrument_node="">Fern Canyon</span></strong></a><span data-dcnode-id="3944" instrument_node="">: One of the most unique, picturesque locations in the redwoods, Fern Canyon is exactly what it sounds like: a mini-canyon covered with ferns. Note: 4WD / high clearance vehicles are best here – there’s a few spots in the road that are going to be a bit of a stretch for a sedan. You can park at Gold Bluffs Beach Campground and hike around, connecting to the </span><a data-dcnode-id="3942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.alltrails.com/trail/us/california/miner-s-ridge-trail-clintonia-trail-and-gold-bluffs-beach-loop%3Fref%3Dresult-card" rel="noopener" target="_blank"><span data-dcnode-id="3943" instrument_node="">Fern Canyon Trail via the Miner’s Ridge trail</span></a><span data-dcnode-id="3941" instrument_node="">, which is roughly a 7 mile hike.</span></p><span data-dcnode-id="3939" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="3935"><img alt="" class="wp-image-222540" data-dcnode-id="3938" data-lazy-sizes="(max-width: 1024px) 100vw, 1024px" data-lazy-src="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/Fern-Canyon-Redwoods-1024x683.jpg" data-lazy-srcset="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/Fern-Canyon-Redwoods-1024x683.jpg 1024w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/Fern-Canyon-Redwoods-300x200.jpg 300w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/Fern-Canyon-Redwoods-768x512.jpg 768w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/Fern-Canyon-Redwoods-1536x1024.jpg 1536w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/Fern-Canyon-Redwoods-2048x1365.jpg 2048w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/Fern-Canyon-Redwoods-scaled.jpg 2000w" height="683" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201024%20683'%3E%3C/svg%3E" width="1024"><noscript data-dcnode-id="3936"><span data-dcnode-id="3937" instrument_node="">&lt;img width="1024" height="683" src="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/Fern-Canyon-Redwoods-1024x683.jpg" alt="" class="wp-image-222540" srcset="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/Fern-Canyon-Redwoods-1024x683.jpg 1024w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/Fern-Canyon-Redwoods-300x200.jpg 300w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/Fern-Canyon-Redwoods-768x512.jpg 768w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/Fern-Canyon-Redwoods-1536x1024.jpg 1536w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/Fern-Canyon-Redwoods-2048x1365.jpg 2048w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/Fern-Canyon-Redwoods-scaled.jpg 2000w" sizes="(max-width: 1024px) 100vw, 1024px"&gt;</span></noscript></figure><span data-dcnode-id="3934" instrument_node="">
</span><p data-dcnode-id="3929"><a data-dcnode-id="3931" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//humboldtgov.org/Facilities/Facility/Details/Big-Lagoon-2" rel="noopener" target="_blank"><strong data-dcnode-id="3932"><span data-dcnode-id="3933" instrument_node="">Big Lagoon</span></strong></a><span data-dcnode-id="3930" instrument_node="">: Great for sailing, windsurfing, kayaking, swimming, and camping.&nbsp;</span></p><span data-dcnode-id="3928" instrument_node="">
</span><p data-dcnode-id="3923"><a data-dcnode-id="3925" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.alltrails.com/trail/us/california/trillium-falls-trail" rel="noopener" target="_blank"><strong data-dcnode-id="3926"><span data-dcnode-id="3927" instrument_node="">Trillium Falls</span></strong></a><span data-dcnode-id="3924" instrument_node="">: 2.6 mile long trail that circles through old-growth redwoods with a waterfall.</span></p><span data-dcnode-id="3922" instrument_node="">
</span><p data-dcnode-id="3917"><a data-dcnode-id="3919" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nps.gov/thingstodo/drivehowlandhillrd.htm" rel="noopener" target="_blank"><strong data-dcnode-id="3920"><span data-dcnode-id="3921" instrument_node="">Howland Hill Road</span></strong></a><span data-dcnode-id="3918" instrument_node="">: 10 mile long dirt road where you can drive through the redwoods. Allow about one hour to take this scenic drive.</span></p><span data-dcnode-id="3916" instrument_node="">
</span><p data-dcnode-id="3905"><a data-dcnode-id="3913" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nps.gov/thingstodo/stout-grove-trail.htm" rel="noopener" target="_blank"><strong data-dcnode-id="3914"><span data-dcnode-id="3915" instrument_node="">Stout Memorial Grove</span></strong></a><span data-dcnode-id="3912" instrument_node="">: A short but spectacular 0.9 mile loop along Howland Hill Road. </span><em data-dcnode-id="3910"><span data-dcnode-id="3911" instrument_node="">Return of the Jedi</span></em><span data-dcnode-id="3909" instrument_node=""> and </span><em data-dcnode-id="3907"><span data-dcnode-id="3908" instrument_node="">Jurassic Park: A Lost World</span></em><span data-dcnode-id="3906" instrument_node=""> had parts filmed nearby – look out for ewoks!</span></p><span data-dcnode-id="3904" instrument_node="">
</span><div class="wp-block-kadence-rowlayout alignnone" data-dcnode-id="3882"><div class="kt-row-layout-inner kt-layout-id_136567-b2" data-dcnode-id="3883" id="kt-layout-id_136567-b2"><div class="kt-row-column-wrap kt-has-2-columns kt-gutter-default kt-v-gutter-default kt-row-valign-top kt-row-layout-equal kt-tab-layout-inherit kt-m-colapse-left-to-right kt-mobile-layout-row" data-dcnode-id="3884"><span data-dcnode-id="3903" instrument_node="">
</span><div class="wp-block-kadence-column inner-column-1 kadence-column_464719-9b" data-dcnode-id="3895"><div class="kt-inside-inner-col" data-dcnode-id="3896"><span data-dcnode-id="3902" instrument_node="">

</span><figure class="wp-block-image size-large" data-dcnode-id="3889"><img alt="" class="wp-image-222541" data-dcnode-id="3892" data-lazy-sizes="(max-width: 768px) 100vw, 768px" data-lazy-src="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/IMG_6148-768x1024.jpg" data-lazy-srcset="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/IMG_6148-768x1024.jpg 768w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/IMG_6148-225x300.jpg 225w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/IMG_6148-1152x1536.jpg 1152w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/IMG_6148.jpg 1500w" height="1024" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20768%201024'%3E%3C/svg%3E" width="768"><noscript data-dcnode-id="3890"><span data-dcnode-id="3891" instrument_node="">&lt;img width="768" height="1024" src="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/IMG_6148-768x1024.jpg" alt="" class="wp-image-222541" srcset="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/IMG_6148-768x1024.jpg 768w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/IMG_6148-225x300.jpg 225w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/IMG_6148-1152x1536.jpg 1152w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/IMG_6148.jpg 1500w" sizes="(max-width: 768px) 100vw, 768px"&gt;</span></noscript></figure><span data-dcnode-id="3888" instrument_node="">

</span><h4 data-dcnode-id="3878"><span data-dcnode-id="3879" id="Where_to_Stay_at_Redwood_National_and_State_Parks"><span data-dcnode-id="3880" instrument_node="">Where to Stay at Redwood National and State Parks</span></span></h4><span data-dcnode-id="3877" instrument_node="">
</span><p data-dcnode-id="3867"><span data-dcnode-id="3876" instrument_node="">There are also some incredible campgrounds here – like </span><a data-dcnode-id="3873" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.parks.ca.gov/%3Fpage_id%3D415" rel="noopener" target="_blank"><strong data-dcnode-id="3874"><span data-dcnode-id="3875" instrument_node="">Gold Bluffs Beach Campground</span></strong></a><span data-dcnode-id="3872" instrument_node="">, a small campground on the beach, and </span><a data-dcnode-id="3869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.parks.ca.gov/%3Fpage_id%3D415" rel="noopener" target="_blank"><strong data-dcnode-id="3870"><span data-dcnode-id="3871" instrument_node="">Elk Prairie Campground</span></strong></a><span data-dcnode-id="3868" instrument_node="">, which is adjacent to an open field that elk tend to congregate in. These spots take reservations, but you’ll need to book in advance because they fill up QUICK.&nbsp;</span></p><span data-dcnode-id="3866" instrument_node="">
</span><p data-dcnode-id="3858"><span data-dcnode-id="3865" instrument_node="">If you’re not camping, you’ll want to stay in </span><a data-dcnode-id="3862" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.booking.com/searchresults.en.html%3Fcity%3D20016485%26aid%3D1738278%26no_rooms%3D1%26group_adults%3D2" rel="noreferrer noopener nofollow" target="_blank"><strong data-dcnode-id="3863"><span data-dcnode-id="3864" instrument_node="">Trinidad</span></strong></a><strong data-dcnode-id="3860"><span data-dcnode-id="3861" instrument_node=""> </span></strong><span data-dcnode-id="3859" instrument_node="">as a home base for exploring this area, because it has the best selection of hotels and other amenities. </span></p><span data-dcnode-id="3857" instrument_node="">
</span><p data-dcnode-id="3847"><span data-dcnode-id="3856" instrument_node="">We loved the </span><a data-dcnode-id="3853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.booking.com/hotel/us/view-crest.en.html%3Faid%3D1738278%26no_rooms%3D1%26group_adults%3D2" rel="noreferrer noopener nofollow" target="_blank"><strong data-dcnode-id="3854"><span data-dcnode-id="3855" instrument_node="">View Crest Lodge</span></strong></a><span data-dcnode-id="3852" instrument_node="">, where we stayed on our latest trip. A nice </span><a data-dcnode-id="3849" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.stay22.com/allez/vrbo/%3Fcampaign%3Dwheatless%2520northernCAroadtrip%26address%3Dtrinidad-california-united-states-of-america%26aid%3Dwheatlesswanderlust%26checkin%3D%26checkout%3D%26adults%3D%26children%3D%26link%3Dhttps%3A//www.vrbo.com/search/keywords%3Atrinidad-california-united-states-of-america%3FpetIncluded%3Dfalse" rel="noreferrer noopener nofollow" target="_blank"><strong data-dcnode-id="3850"><span data-dcnode-id="3851" instrument_node="">vacation rental in Trinidad</span></strong></a><span data-dcnode-id="3848" instrument_node=""> is another good option.&nbsp;</span></p><span data-dcnode-id="3846" instrument_node="">
</span><h3 class="has-text-align-center" data-dcnode-id="3843"><span data-dcnode-id="3844" id="Avenue_of_the_Giants"><span data-dcnode-id="3845" instrument_node="">Avenue of the Giants</span></span></h3><span data-dcnode-id="3842" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="3838"><img alt="" class="wp-image-222543" data-dcnode-id="3841" data-lazy-sizes="(max-width: 1024px) 100vw, 1024px" data-lazy-src="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC00708-1024x682.jpg" data-lazy-srcset="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC00708-1024x682.jpg 1024w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC00708-300x200.jpg 300w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC00708-768x512.jpg 768w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC00708-1536x1024.jpg 1536w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC00708.jpg 2000w" height="682" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201024%20682'%3E%3C/svg%3E" width="1024"><noscript data-dcnode-id="3839"><span data-dcnode-id="3840" instrument_node="">&lt;img width="1024" height="682" src="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC00708-1024x682.jpg" alt="" class="wp-image-222543" srcset="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC00708-1024x682.jpg 1024w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC00708-300x200.jpg 300w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC00708-768x512.jpg 768w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC00708-1536x1024.jpg 1536w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC00708.jpg 2000w" sizes="(max-width: 1024px) 100vw, 1024px"&gt;</span></noscript></figure><span data-dcnode-id="3837" instrument_node="">
</span><p data-dcnode-id="3834"><em data-dcnode-id="3835"><span data-dcnode-id="3836" instrument_node="">Drive time from Trinidad to the northern end of Avenue of the Giants: 1 hour / 55 miles</span></em></p><span data-dcnode-id="3833" instrument_node="">
</span><p data-dcnode-id="3827"><span data-dcnode-id="3832" instrument_node="">The </span><a data-dcnode-id="3829" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//avenueofthegiants.net/" rel="noopener" target="_blank"><strong data-dcnode-id="3830"><span data-dcnode-id="3831" instrument_node="">Avenue of the Giants</span></strong></a><span data-dcnode-id="3828" instrument_node=""> is a 31 mile scenic stretch of highway that will take you through Humboldt Redwoods State Park along old Highway 101. It is the most magnificent display of the massive redwood groves in Northern California.</span></p><span data-dcnode-id="3826" instrument_node="">
</span><p data-dcnode-id="3824"><span data-dcnode-id="3825" instrument_node="">After you’ve tackled Avenue of the Giants, it’s worth taking a little time to explore the rest of Humboldt Redwoods State Park.&nbsp;</span></p><span data-dcnode-id="3823" instrument_node="">
</span><p data-dcnode-id="3818"><span data-dcnode-id="3822" instrument_node="">In particular, we enjoyed the </span><a data-dcnode-id="3820" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.alltrails.com/trail/us/california/bull-creek-trail-west-loop" rel="noopener" target="_blank"><span data-dcnode-id="3821" instrument_node="">Bull Creek Westside Loop</span></a><span data-dcnode-id="3819" instrument_node="">, which is a relatively easy three mile hike through fern-covered forest floor, passing under towering redwoods. </span></p><span data-dcnode-id="3817" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="3812"><figure class="aligncenter size-large is-resized" data-dcnode-id="3813"><img alt="" class="wp-image-222544" data-dcnode-id="3816" data-lazy-sizes="(max-width: 512px) 100vw, 512px" data-lazy-src="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC00740-683x1024.jpg" data-lazy-srcset="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC00740-683x1024.jpg 683w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC00740-200x300.jpg 200w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC00740-768x1152.jpg 768w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC00740-1024x1536.jpg 1024w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC00740-scaled.jpg 1333w" height="768" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20512%20768'%3E%3C/svg%3E" width="512"><noscript data-dcnode-id="3814"><span data-dcnode-id="3815" instrument_node="">&lt;img src="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC00740-683x1024.jpg" alt="" class="wp-image-222544" width="512" height="768" srcset="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC00740-683x1024.jpg 683w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC00740-200x300.jpg 200w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC00740-768x1152.jpg 768w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC00740-1024x1536.jpg 1024w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC00740-scaled.jpg 1333w" sizes="(max-width: 512px) 100vw, 512px"&gt;</span></noscript></figure></div><span data-dcnode-id="3811" instrument_node="">
</span><p data-dcnode-id="3809"><span data-dcnode-id="3810" instrument_node="">It’s a nice break from the drive, and gives you a chance to stretch your legs, see some gorgeous trees, and have a snack break (or lunch, which is what we did here).&nbsp;</span></p><span data-dcnode-id="3808" instrument_node="">
</span><h3 class="has-text-align-center" data-dcnode-id="3805"><span data-dcnode-id="3806" id="The_Anderson_Valley_Philo_Boonville"><span data-dcnode-id="3807" instrument_node="">The Anderson Valley (Philo &amp; Boonville)</span></span></h3><span data-dcnode-id="3804" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="3800"><img alt="" class="wp-image-222545" data-dcnode-id="3803" data-lazy-sizes="(max-width: 1024px) 100vw, 1024px" data-lazy-src="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC09153-1024x683.jpg" data-lazy-srcset="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC09153-1024x683.jpg 1024w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC09153-300x200.jpg 300w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC09153-768x512.jpg 768w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC09153-1536x1024.jpg 1536w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC09153-scaled.jpg 2000w" height="683" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201024%20683'%3E%3C/svg%3E" width="1024"><noscript data-dcnode-id="3801"><span data-dcnode-id="3802" instrument_node="">&lt;img width="1024" height="683" src="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC09153-1024x683.jpg" alt="" class="wp-image-222545" srcset="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC09153-1024x683.jpg 1024w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC09153-300x200.jpg 300w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC09153-768x512.jpg 768w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC09153-1536x1024.jpg 1536w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC09153-scaled.jpg 2000w" sizes="(max-width: 1024px) 100vw, 1024px"&gt;</span></noscript></figure><span data-dcnode-id="3799" instrument_node="">
</span><p data-dcnode-id="3796"><em data-dcnode-id="3797"><span data-dcnode-id="3798" instrument_node="">Drive time from the southern end of the Avenue of the Giants: 2 hours 20 minutes / 124 miles</span></em></p><span data-dcnode-id="3795" instrument_node="">
</span><p data-dcnode-id="3793"><span data-dcnode-id="3794" instrument_node="">We’ve been to the Anderson Valley a few times now, and every single time we come away discussing between the two of us whether this is the best wine region in California. It’s a valley between Highway 101 and the coast, and as soon as you leave 101 and hop on the winding road into the valley, you’ll start to see why.&nbsp;</span></p><span data-dcnode-id="3792" instrument_node="">
</span><p data-dcnode-id="3787"><span data-dcnode-id="3791" instrument_node="">Giant oak trees smack dab in the middle of vineyards. Rolling green (for</span><em data-dcnode-id="3789"><span data-dcnode-id="3790" instrument_node=""> at least </span></em><span data-dcnode-id="3788" instrument_node="">three weeks a year these days) hills in the background with wineries scattered across the valley floor.&nbsp;</span></p><span data-dcnode-id="3786" instrument_node="">
</span><p data-dcnode-id="3773"><span data-dcnode-id="3785" instrument_node="">There are two “towns” – and I use that term loosely because they’re more just a collection of buildings along the road – </span><strong data-dcnode-id="3783"><span data-dcnode-id="3784" instrument_node="">Philo </span></strong><span data-dcnode-id="3782" instrument_node="">and </span><strong data-dcnode-id="3780"><span data-dcnode-id="3781" instrument_node="">Boonville</span></strong><span data-dcnode-id="3779" instrument_node="">. Boonville has more going on, and would be a nice place to stay, but </span><strong data-dcnode-id="3777"><span data-dcnode-id="3778" instrument_node="">the area around Philo is without a doubt in our minds the best part of the Anderson Valley</span></strong><span data-dcnode-id="3776" instrument_node="">.</span><strong data-dcnode-id="3774"><span data-dcnode-id="3775" instrument_node="">&nbsp;</span></strong></p><span data-dcnode-id="3772" instrument_node="">
</span><p data-dcnode-id="3770"><span data-dcnode-id="3771" instrument_node="">If you can swing it, we’d highly recommend a night in the valley.&nbsp;</span></p><span data-dcnode-id="3769" instrument_node="">
</span><h4 data-dcnode-id="3766"><span data-dcnode-id="3767" id="What_to_Do_in_the_Anderson_Valley"><span data-dcnode-id="3768" instrument_node="">What to Do in the Anderson Valley</span></span></h4><span data-dcnode-id="3765" instrument_node="">
</span><p data-dcnode-id="3763"><span data-dcnode-id="3764" instrument_node="">Here are some of our favorite things to do and see in this relatively hidden gem in Northern California.&nbsp;</span></p><span data-dcnode-id="3762" instrument_node="">
</span><p data-dcnode-id="3755"><strong data-dcnode-id="3760"><span data-dcnode-id="3761" instrument_node="">Wine Tasting in the Anderson Valley</span></strong><span data-dcnode-id="3759" instrument_node="">:</span><strong data-dcnode-id="3757"><span data-dcnode-id="3758" instrument_node=""> </span></strong><span data-dcnode-id="3756" instrument_node="">If you’re up for some wine tasting, you know there’s plenty of vineyards around to do just that! </span></p><span data-dcnode-id="3754" instrument_node="">
</span><ul data-dcnode-id="3735"><li data-dcnode-id="3746"><span data-dcnode-id="3753" instrument_node="">One of our favorites is </span><a data-dcnode-id="3750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.navarrowine.com/" rel="noopener" target="_blank"><strong data-dcnode-id="3751"><span data-dcnode-id="3752" instrument_node="">Navarro Vineyards</span></strong></a><span data-dcnode-id="3749" instrument_node=""> near Philo, a family-run vineyard that has been making wines and grape juices since 1974. Their gewurztraminer and dry riesling are staples in our household, and we always bring back a bottle or six for Penny, a family friend who loves both of those wines. </span><br data-dcnode-id="3748"><br data-dcnode-id="3747"></li><li data-dcnode-id="3736"><span data-dcnode-id="3745" instrument_node="">We also love </span><a data-dcnode-id="3742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//roedererestate.com/" rel="noopener" target="_blank"><strong data-dcnode-id="3743"><span data-dcnode-id="3744" instrument_node="">Roederer Estate</span></strong></a><span data-dcnode-id="3741" instrument_node=""> and </span><a data-dcnode-id="3738" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scharffenbergercellars.com/" rel="noopener" target="_blank"><strong data-dcnode-id="3739"><span data-dcnode-id="3740" instrument_node="">Scharfenberger</span></strong></a><span data-dcnode-id="3737" instrument_node=""> because bubbles are the best. Both are known for sparkling wines, and Scharffenberger is better for people on a budget (which is where we gravitate towards). Get a flight to try five different bubbly wines, and don’t miss the rose!</span></li></ul><span data-dcnode-id="3734" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="3730"><img alt="" class="wp-image-222546" data-dcnode-id="3733" data-lazy-sizes="(max-width: 1024px) 100vw, 1024px" data-lazy-src="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC09165-1024x683.jpg" data-lazy-srcset="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC09165-1024x683.jpg 1024w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC09165-300x200.jpg 300w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC09165-768x512.jpg 768w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC09165-1536x1024.jpg 1536w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC09165-scaled.jpg 2000w" height="683" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201024%20683'%3E%3C/svg%3E" width="1024"><noscript data-dcnode-id="3731"><span data-dcnode-id="3732" instrument_node="">&lt;img width="1024" height="683" src="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC09165-1024x683.jpg" alt="" class="wp-image-222546" srcset="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC09165-1024x683.jpg 1024w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC09165-300x200.jpg 300w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC09165-768x512.jpg 768w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC09165-1536x1024.jpg 1536w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC09165-scaled.jpg 2000w" sizes="(max-width: 1024px) 100vw, 1024px"&gt;</span></noscript></figure><span data-dcnode-id="3729" instrument_node="">
</span><p data-dcnode-id="3721"><a data-dcnode-id="3726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.parks.ca.gov/%3Fpage_id%3D438" rel="noopener" target="_blank"><strong data-dcnode-id="3727"><span data-dcnode-id="3728" instrument_node="">Hendy Woods State Park</span></strong></a><span data-dcnode-id="3725" instrument_node="">: There’s a lovely redwood grove right in the middle of the Anderson Valley, near the town of Philo. Big Hendy Grove is the real highlight here, and you can do a </span><a data-dcnode-id="3723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.redwoodhikes.com/Hendy/BigHendy.html" rel="noopener" target="_blank"><span data-dcnode-id="3724" instrument_node="">nice little hike</span></a><span data-dcnode-id="3722" instrument_node=""> (P.S. – I really love that website and have it bookmarked for all of my future redwood hikes) through the grove. There’s also Little Hendy Grove, which is accessible via a longer trail but is much less interesting than the bigger version. There’s a nice day use area right at the trailhead for Big Hendy, where we spent some time soaking up the warm sun. The campground here is particularly nice, shaded by redwoods, and would be a perfect place to stay if you’re up for camping. It’s a California State Park, so entry is $8 for the day.&nbsp;</span></p><span data-dcnode-id="3720" instrument_node="">
