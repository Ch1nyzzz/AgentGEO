</span><header class="entry-header post-title title-align-center title-tablet-align-inherit title-mobile-align-inherit" data-dcnode-id="5111"><span data-dcnode-id="5139" instrument_node="">

</span><a data-dcnode-id="5135" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wheatlesswanderlust.com/detailed-itinerary/road-trip-itineraries/" rel="tag"><span data-dcnode-id="5136" instrument_node="">Road Trip Itineraries</span></a><span data-dcnode-id="5134" instrument_node=""> | </span><a data-dcnode-id="5132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wheatlesswanderlust.com/travel-destinations/united-states/" rel="tag"><span data-dcnode-id="5133" instrument_node="">United States</span></a><span data-dcnode-id="5131" instrument_node=""> </span></span><span data-dcnode-id="5129" instrument_node="">
</span></div><span data-dcnode-id="5126" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="5124"><span data-dcnode-id="5125" instrument_node="">How To Plan an Unforgettable Northern California Road Trip</span></h1><div class="entry-meta entry-meta-divider-dot" data-dcnode-id="5114"><span data-dcnode-id="5123" instrument_node="">
</span><span class="updated-on" data-dcnode-id="5116"><span data-dcnode-id="5122" instrument_node="">
</span><span class="meta-label" data-dcnode-id="5120"><span data-dcnode-id="5121" instrument_node="">Last Updated on</span></span><time class="entry-date published updated" data-dcnode-id="5118" datetime="2022-04-24T08:02:24-07:00"><span data-dcnode-id="5119" instrument_node="">April 24, 2022</span></time><span data-dcnode-id="5117" instrument_node=""> </span></span><span data-dcnode-id="5115" instrument_node="">
</span></div><span data-dcnode-id="5112" instrument_node="">
</span></header><span data-dcnode-id="5109" instrument_node="">
</span><div class="entry-content single-content" data-dcnode-id="2636"><span data-dcnode-id="5108" instrument_node="">
</span><p data-dcnode-id="5106"><span data-dcnode-id="5107" instrument_node="">We have been lucky to call Northern California home for over a decade at this point. Alysha has spent her whole life here, minus four years in college, and Matt’s a relative newcomer with just under 10 years at the time of writing. There is such an incredible amount of things to do, see, and explore in Northern California that we’re STILL discovering new places despite having been all over the northern half of the state over the time we’ve lived here together.</span></p><span data-dcnode-id="5105" instrument_node="">
</span><p data-dcnode-id="5100"><span data-dcnode-id="5104" instrument_node="">Northern California is a very special place for us. We met in </span><a data-dcnode-id="5102" data-id="222238" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wheatlesswanderlust.com/one-day-in-san-francisco/"><span data-dcnode-id="5103" instrument_node="">San Francisco</span></a><span data-dcnode-id="5101" instrument_node=""> in 2014, and lived there for almost a decade together, including three years living together and getting married. Over the course of that time, we took as many weekend trips as we could to explore the wealth of natural beauty that Northern California has to offer.&nbsp;</span></p><span data-dcnode-id="5099" instrument_node="">
</span><p data-dcnode-id="5094"><span data-dcnode-id="5098" instrument_node="">Since we moved out of San Francisco, we’ve actually found ourselves doing more exploring on the Northern California coast, since we do an annual </span><a data-dcnode-id="5096" data-id="216700" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wheatlesswanderlust.com/seattle-to-san-francisco-road-trip/"><span data-dcnode-id="5097" instrument_node="">San Francisco to Seattle road trip </span></a><span data-dcnode-id="5095" instrument_node="">to visit Matt’s family and often take the coastal route up through California.&nbsp;</span></p><span data-dcnode-id="5093" instrument_node="">
</span><p data-dcnode-id="5091"><span data-dcnode-id="5092" instrument_node="">That stretch of coast between Point Reyes and the Oregon border is now at the top of the list of our favorite places in California because it has it all. Spectacular coastal beauty, wide sandy beaches, and towering coastal redwoods steps away from said beaches. It’s WILD. And we love it, which is why it’s featured so prominently in this Northern California itinerary.&nbsp;</span></p><span data-dcnode-id="5090" instrument_node="">
</span><p data-dcnode-id="5088"><span data-dcnode-id="5089" instrument_node="">In this guide, we’re going to give you all of our local knowledge – and we do mean all of it, this is a long one! – in an effort to help you plan an amazing Northern California road trip. We have opinions. Lots of them! And you’ll find them all below. From the best hikes, to which redwood groves to explore, and some cool places to stay, you’ll find it all in the guide below.&nbsp;</span></p><span data-dcnode-id="5087" instrument_node="">
</span><p data-dcnode-id="5085"><span data-dcnode-id="5086" instrument_node="">Grab a coffee (and maybe some Bailey’s?) and let’s get planning!</span></p><span data-dcnode-id="5084" instrument_node="">
</span><p data-dcnode-id="5080"><strong data-dcnode-id="5082"><span data-dcnode-id="5083" instrument_node="">P.S.</span></strong><span data-dcnode-id="5081" instrument_node=""> We even have a longer road trip recommendation that takes you over to Lassen National Park and Lake Tahoe if you have some extra time on your hands – but we’d recommend having at least three weeks to do all of that. </span></p><span data-dcnode-id="5079" instrument_node="">

</span></div></div><h2 class="has-text-align-center" data-dcnode-id="4937"><span data-dcnode-id="4938" id="How_Many_Days_Do_You_Need_For_This_Road_Trip"><span data-dcnode-id="4939" instrument_node="">How Many Days Do You Need For This Road Trip?</span></span></h2><span data-dcnode-id="4936" instrument_node="">
</span><p data-dcnode-id="4931"><span data-dcnode-id="4935" instrument_node="">We think </span><strong data-dcnode-id="4933"><span data-dcnode-id="4934" instrument_node="">you need a minimum of 7 days</span></strong><span data-dcnode-id="4932" instrument_node=""> to do the entire stretch of coast from San Francisco to the redwoods near the Oregon border. 10 days would be even better.&nbsp;</span></p><span data-dcnode-id="4930" instrument_node="">
</span><p data-dcnode-id="4928"><span data-dcnode-id="4929" instrument_node="">With 3-5 days, we’d recommend staying in and around San Francisco and exploring the city doing a couple of day trips from San Francisco to places like Point Reyes, the Marin Headlands, and Muir Woods.&nbsp;</span></p><span data-dcnode-id="4927" instrument_node="">
</span><p data-dcnode-id="4925"><span data-dcnode-id="4926" instrument_node="">At the bottom of this guide, we have itinerary examples for 7 and 10 days to give you a starting point for planning your own trip.&nbsp;</span></p><span data-dcnode-id="4924" instrument_node="">
</span><h2 class="has-text-align-center" data-dcnode-id="4921"><span data-dcnode-id="4922" id="The_Road_Trip_Route"><span data-dcnode-id="4923" instrument_node="">The Road Trip Route</span></span></h2><span data-dcnode-id="4920" instrument_node="">
</span><p data-dcnode-id="4918"><span data-dcnode-id="4919" instrument_node="">Let’s talk about the route we’re recommending. </span></p><span data-dcnode-id="4917" instrument_node="">
</span><p data-dcnode-id="4913"><strong data-dcnode-id="4915"><span data-dcnode-id="4916" instrument_node="">We’d strongly recommend that you stay relatively close to the coast</span></strong><span data-dcnode-id="4914" instrument_node="">, and we think the most unique part of Northern California is the stretch from San Francisco north to the Oregon border.&nbsp;</span></p><span data-dcnode-id="4912" instrument_node="">
</span><p data-dcnode-id="4910"><span data-dcnode-id="4911" instrument_node="">You’ll experience towering coastal redwoods, never-ending sandy beaches, wine country, and more. It’s our favorite part of Northern California, and the best part is that it’s basically accessible year round.&nbsp;</span></p><span data-dcnode-id="4909" instrument_node="">
</span><p data-dcnode-id="4907"><span data-dcnode-id="4908" instrument_node="">There are more than a few places in Northern California that are inland that are worth a visit, sure, but it’s a LONG way from the coast to areas like Lassen, Yosemite, or Lake Tahoe.&nbsp;</span></p><span data-dcnode-id="4906" instrument_node="">
</span><p data-dcnode-id="4899"><strong data-dcnode-id="4904"><span data-dcnode-id="4905" instrument_node="">With anything less than 14 days, we’d focus on the stretch between San Francisco and Redwood National and State Parks (basically the Oregon border)</span></strong><span data-dcnode-id="4903" instrument_node="">.</span><strong data-dcnode-id="4901"><span data-dcnode-id="4902" instrument_node=""> </span></strong><span data-dcnode-id="4900" instrument_node="">It’s going to take you 4-6 hours to drive from the coast to Yosemite or Tahoe, and it’s not worth the time and effort unless you have three weeks or more.&nbsp;</span></p><span data-dcnode-id="4898" instrument_node="">
</span><p data-dcnode-id="4896"><span data-dcnode-id="4897" instrument_node="">If you’re lucky enough to have three weeks, we’d add on a weeklong trip to Tahoe and Yosemite, but that’s almost a completely different Northern California trip than the one we’re talking about here.&nbsp;We have details on how to add those two spots at the very end of this guide. </span></p><span data-dcnode-id="4895" instrument_node="">
</span><p data-dcnode-id="4893"><span data-dcnode-id="4894" instrument_node="">We’d start by heading north up the coast along Highway 1, stopping along the way at places near San Francisco like the Marin Headlands, Mount Tamalpais, and Muir Woods.&nbsp;</span></p><span data-dcnode-id="4892" instrument_node="">
</span><p data-dcnode-id="4890"><span data-dcnode-id="4891" instrument_node="">Continue north along Highway 1 allllll the way to the Oregon border, where you’ll find some of the best redwoods in the state, and then make your way back south to Mendocino.&nbsp;</span></p><span data-dcnode-id="4889" instrument_node="">
</span><p data-dcnode-id="4887"><span data-dcnode-id="4888" instrument_node="">From there, end your trip with some well-earned wine country relaxation. Cut inland from Mendocino through the Anderson Valley – our favorite wine country in California, sorry Napa – and hop on 101 to Healdsburg, which is a super charming little town in Sonoma for even more wine.&nbsp;</span></p><span data-dcnode-id="4886" instrument_node="">
</span><p data-dcnode-id="4884"><span data-dcnode-id="4885" instrument_node="">Drop off the car (if you’re renting one) and end with a day or two in San Francisco before heading home.&nbsp;</span></p><span data-dcnode-id="4883" instrument_node="">
</span><p data-dcnode-id="4879"><a data-dcnode-id="4881" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.google.com/maps/dir/SFO%2BRental%2BCar%2BCenter%2C%2BNorth%2BMcDonnell%2BRoad%2C%2BSan%2BFrancisco%2C%2BCA/Rodeo%2BBeach%2C%2BCalifornia/Point%2BReyes%2BStation%2C%2BCA/Mendocino%2C%2BCA/Trinidad%2C%2BCA/Crescent%2BCity%2C%2BCA/Philo%2C%2BCA/Healdsburg%2C%2BCA/San%2BFrancisco%2C%2BCalifornia/%4038.6227453%2C-124.0525267%2C7z/data%3D%213m1%215s0x80858066b5ce8885%3A0x6466737455f48376%214m56%214m55%211m5%211m1%211s0x808f782b355eebc1%3A0x6810f790e62db81c%212m2%211d-122.4013463%212d37.6285777%211m5%211m1%211s0x808585f557fbb627%3A0x6f26d28717c8d2ef%212m2%211d-122.5370429%212d37.830669%211m5%211m1%211s0x8085cf88aab4912b%3A0x8c1501422b6ca0a8%212m2%211d-122.8069356%212d38.0690894%211m5%211m1%211s0x8081b26b3c56eb33%3A0xd60f97f241c0b33b%212m2%211d-123.7994591%212d39.3076744%211m5%211m1%211s0x54d1410375051f91%3A0x5883f55bfe13ae9b%212m2%211d-124.1431246%212d41.059291%211m5%211m1%211s0x54d066375c6288db%3A0x76e89ab07375e62e%212m2%211d-124.2025913%212d41.7557501%211m5%211m1%211s0x80811329c44b66b5%3A0x7755c234f12ae564%212m2%211d-123.4450093%212d39.0657324%211m5%211m1%211s0x808410d2744ee1b3%3A0x7fedd4e9b6375cb9%212m2%211d-122.8691609%212d38.6104658%211m5%211m1%211s0x80859a6d00690021%3A0x4a501367f076adff%212m2%211d-122.4194155%212d37.7749295%213e0" rel="noopener" target="_blank"><span data-dcnode-id="4882" instrument_node="">Here’s what that route looks like in map form</span></a><span data-dcnode-id="4880" instrument_node="">.</span></p><span data-dcnode-id="4878" instrument_node="">
</span><p data-dcnode-id="4876"><span data-dcnode-id="4877" instrument_node="">As you can see, that’s 16 hours of driving (and with stops, it’s going to be longer).&nbsp;</span></p><span data-dcnode-id="4875" instrument_node="">
</span><p data-dcnode-id="4871"><strong data-dcnode-id="4873"><span data-dcnode-id="4874" instrument_node="">For that reason, if you only have 5-10 days, we’d focus on the stretch from SF to Mendocino</span></strong><span data-dcnode-id="4872" instrument_node="">, and save the northern redwoods for later, which cuts out about 8-9 of those hours. There are plenty of redwoods to be explored in and around Mendocino, don’t worry!</span></p><span data-dcnode-id="4870" instrument_node="">
</span><h2 class="has-text-align-center" data-dcnode-id="4867"><span data-dcnode-id="4868" id="Do_You_Need_a_Car_for_This_Road_Trip"><span data-dcnode-id="4869" instrument_node="">Do You Need a Car for This Road Trip?</span></span></h2><span data-dcnode-id="4866" instrument_node="">
</span><p data-dcnode-id="4864"><span data-dcnode-id="4865" instrument_node="">Yes. 100% yes. There is really no way to do this road trip without a car. Public transportation is basically nonexistent.&nbsp;</span></p><span data-dcnode-id="4863" instrument_node="">
</span><p data-dcnode-id="4861"><span data-dcnode-id="4862" instrument_node="">However, we do have an important consideration for you to think about.&nbsp;</span></p><span data-dcnode-id="4860" instrument_node="">
</span><p data-dcnode-id="4856"><strong data-dcnode-id="4858"><span data-dcnode-id="4859" instrument_node="">Parking a car in San Francisco is a nightmare</span></strong><span data-dcnode-id="4857" instrument_node="">. We like to say that you’re going to be paying for parking one way or another, whether it’s through a garage or parking tickets for the various restrictions and street sweeping around the city.&nbsp;</span></p><span data-dcnode-id="4855" instrument_node="">
</span><p data-dcnode-id="4853"><span data-dcnode-id="4854" instrument_node="">If you’re renting a car, we’d strongly, strongly recommend that you either pick it up after staying in San Francisco, or drop it off before your time in the city. If you can’t do that, our next recommendation is to park it in a garage and leave it there. You won’t need it when you’re in the city, and it will often end up being more of a hindrance than a help. Use public transportation or rideshares like Lyft to get around within the city.&nbsp;</span></p><span data-dcnode-id="4852" instrument_node="">
</span><p data-dcnode-id="4850"><span data-dcnode-id="4851" instrument_node="">Trust us – we lived there for nearly ten years and both of us decided to get rid of our cars because parking was such a nightmare.&nbsp;</span></p><span data-dcnode-id="4849" instrument_node="">
</span><h2 class="has-text-align-center" data-dcnode-id="4846"><span data-dcnode-id="4847" id="11_Amazing_Stops_for_Your_Northern_California_Road_Trip_Itinerary"><span data-dcnode-id="4848" instrument_node="">11 Amazing Stops for Your Northern California Road Trip Itinerary</span></span></h2><span data-dcnode-id="4845" instrument_node="">
</span><p data-dcnode-id="4843"><span data-dcnode-id="4844" instrument_node="">Now, let’s get into our top recommendations for stops to make on your trip.&nbsp;</span></p><span data-dcnode-id="4842" instrument_node="">
</span><p data-dcnode-id="4840"><span data-dcnode-id="4841" instrument_node="">One thing we do want to make super duper clear is that there are absolutely stops in between the ones in this guide that you’re going to love. Think of this as our top picks, and be sure to leave time to discover a favorite or two that we don’t have listed here!</span></p><span data-dcnode-id="4839" instrument_node="">
</span><p data-dcnode-id="4837"><span data-dcnode-id="4838" instrument_node="">A great example is the stretch along Highway 1 between Bodega Bay and Mendocino. Along the way, you’ll pass Jenner, Timber Cove, Gulala, and more. And they’re all amazing! But if we included literally ever stop, this guide would be five times as long.&nbsp;</span></p><span data-dcnode-id="4836" instrument_node="">
</span><p data-dcnode-id="4834"><span data-dcnode-id="4835" instrument_node="">Some places – like the Marin Headlands – are best as stops on your way to your next overnight stay. For those, you’ll find a section with background on the place and our favorite things to do and see nearby.&nbsp;</span></p><span data-dcnode-id="4833" instrument_node="">
</span><p data-dcnode-id="4831"><span data-dcnode-id="4832" instrument_node="">Some places – like Mendocino – are worth an overnight (or two), and for those you’ll find a deeper dive into things to do and see and a section on places to stay.&nbsp;</span></p><span data-dcnode-id="4830" instrument_node="">
</span><p data-dcnode-id="4828"><span data-dcnode-id="4829" instrument_node="">You’ll find some information on San Francisco – like what to do and where to stay – as the last stop on this itinerary, mostly because we prefer the relaxing city time to be at the end of a road trip, rather than the beginning.&nbsp;</span></p><span data-dcnode-id="4827" instrument_node="">
</span><p class="has-theme-palette-7-background-color has-background" data-dcnode-id="4823"><strong data-dcnode-id="4825"><span data-dcnode-id="4826" instrument_node="">Important Note:</span></strong><span data-dcnode-id="4824" instrument_node=""> These stops are roughly in the order you’d encounter them on a 7-10 day road trip that loops from San Francisco to Trinidad and back again. You might need to rearrange them depending on what your particular trip will look like. </span></p><span data-dcnode-id="4822" instrument_node="">
</span><h3 class="has-text-align-center" data-dcnode-id="4819"><span data-dcnode-id="4820" id="The_Marin_Headlands"><span data-dcnode-id="4821" instrument_node="">The Marin Headlands</span></span></h3><span data-dcnode-id="4818" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="4814"><img alt="" class="wp-image-222511 entered error" data-dcnode-id="4817" data-lazy-sizes="(max-width: 1024px) 100vw, 1024px" data-lazy-src="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC_0621-1024x683.jpg" data-lazy-srcset="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC_0621-1024x683.jpg 1024w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC_0621-300x200.jpg 300w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC_0621-768x512.jpg 768w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC_0621-1536x1024.jpg 1536w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC_0621-scaled.jpg 2000w" data-ll-status="error" height="683" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC_0621-1024x683.jpg&amp;raw" srcset="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC_0621-1024x683.jpg 1024w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC_0621-300x200.jpg 300w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC_0621-768x512.jpg 768w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC_0621-1536x1024.jpg 1536w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC_0621-scaled.jpg 2000w" width="1024"><noscript data-dcnode-id="4815"><span data-dcnode-id="4816" instrument_node="">&lt;img width="1024" height="683" src="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC_0621-1024x683.jpg" alt="" class="wp-image-222511" srcset="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC_0621-1024x683.jpg 1024w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC_0621-300x200.jpg 300w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC_0621-768x512.jpg 768w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC_0621-1536x1024.jpg 1536w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC_0621-scaled.jpg 2000w" sizes="(max-width: 1024px) 100vw, 1024px"&gt;</span></noscript></figure><span data-dcnode-id="4813" instrument_node="">
</span><p data-dcnode-id="4810"><em data-dcnode-id="4811"><span data-dcnode-id="4812" instrument_node="">Drive time from San Francisco International Airport: 40 minutes / 22 miles</span></em></p><span data-dcnode-id="4809" instrument_node="">
</span><p data-dcnode-id="4807"><span data-dcnode-id="4808" instrument_node="">The Marin Headlands are the area just across the Golden Gate Bridge, known for rolling hills and coastal bluffs which result in fantastic views of the bridge and the ocean.</span></p><span data-dcnode-id="4806" instrument_node="">
</span><p data-dcnode-id="4800"><span data-dcnode-id="4805" instrument_node="">It’s worth a half day or so spent exploring (though there’s plenty to do and see to occupy an entire </span><strong data-dcnode-id="4802"><a data-dcnode-id="4803" data-id="213955" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wheatlesswanderlust.com/best-day-trips-from-san-francisco/"><span data-dcnode-id="4804" instrument_node="">day trip from San Francisco</span></a></strong><span data-dcnode-id="4801" instrument_node="">) before heading north along the coast to kick off your road trip in earnest.&nbsp;</span></p><span data-dcnode-id="4799" instrument_node="">
</span><p data-dcnode-id="4797"><span data-dcnode-id="4798" instrument_node="">Here are a few of our favorite stops.&nbsp;</span></p><span data-dcnode-id="4796" instrument_node="">
</span><p data-dcnode-id="4792"><strong data-dcnode-id="4794"><span data-dcnode-id="4795" instrument_node="">Battery Spencer and Battery Wagner</span></strong><span data-dcnode-id="4793" instrument_node="">: Possibly the two best views of the Golden Gate Bridge in the headlands (though the top of Hawk Hill is a close second), they’re close enough for you to walk between them. Be prepared for a parking nightmare though.&nbsp;</span></p><span data-dcnode-id="4791" instrument_node="">
</span><p data-dcnode-id="4781"><strong data-dcnode-id="4789"><span data-dcnode-id="4790" instrument_node="">Kirby Cove</span></strong><span data-dcnode-id="4788" instrument_node="">: From Battery Wagner, walk down the </span><a data-dcnode-id="4786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.alltrails.com/trail/us/california/kirby-cove" rel="noopener" target="_blank"><span data-dcnode-id="4787" instrument_node="">trail to Kirby Cove</span></a><span data-dcnode-id="4785" instrument_node="">, which is another excellent view of the bridge, this time from the water-level. There’s also a great </span><a data-dcnode-id="4783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.recreation.gov/camping/campgrounds/232491" rel="noopener" target="_blank"><span data-dcnode-id="4784" instrument_node="">campground</span></a><span data-dcnode-id="4782" instrument_node=""> down here that is EXTREMELY competitive (like, books up six months in advance competitive – the kind you find at nearly every California campground these days), but is worth looking into.&nbsp;</span></p><span data-dcnode-id="4780" instrument_node="">
</span><p data-dcnode-id="4775"><a data-dcnode-id="4777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nps.gov/goga/pobo.htm" rel="noopener" target="_blank"><strong data-dcnode-id="4778"><span data-dcnode-id="4779" instrument_node="">Point Bonita Lighthouse</span></strong></a><span data-dcnode-id="4776" instrument_node="">: The southwestern-most point in the headlands is Point Bonita, where you’ll find a cool lighthouse that you have to cross a narrow hanging suspension bridge to access. The hike from the parking lot to the lighthouse is about a mile round trip, and is mostly flat.&nbsp;&nbsp;</span></p><span data-dcnode-id="4774" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="4770"><img alt="" class="wp-image-222513" data-dcnode-id="4773" data-lazy-sizes="(max-width: 1024px) 100vw, 1024px" data-lazy-src="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/Point-Bonita-Lighthouse-2-1024x684.jpg" data-lazy-srcset="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/Point-Bonita-Lighthouse-2-1024x684.jpg 1024w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/Point-Bonita-Lighthouse-2-300x200.jpg 300w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/Point-Bonita-Lighthouse-2-768x513.jpg 768w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/Point-Bonita-Lighthouse-2-1536x1025.jpg 1536w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/Point-Bonita-Lighthouse-2-2048x1367.jpg 2048w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/Point-Bonita-Lighthouse-2-scaled.jpg 2000w" height="684" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201024%20684'%3E%3C/svg%3E" width="1024"><noscript data-dcnode-id="4771"><span data-dcnode-id="4772" instrument_node="">&lt;img width="1024" height="684" src="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/Point-Bonita-Lighthouse-2-1024x684.jpg" alt="" class="wp-image-222513" srcset="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/Point-Bonita-Lighthouse-2-1024x684.jpg 1024w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/Point-Bonita-Lighthouse-2-300x200.jpg 300w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/Point-Bonita-Lighthouse-2-768x513.jpg 768w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/Point-Bonita-Lighthouse-2-1536x1025.jpg 1536w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/Point-Bonita-Lighthouse-2-2048x1367.jpg 2048w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/Point-Bonita-Lighthouse-2-scaled.jpg 2000w" sizes="(max-width: 1024px) 100vw, 1024px"&gt;</span></noscript></figure><span data-dcnode-id="4769" instrument_node="">
</span><p data-dcnode-id="4758"><a data-dcnode-id="4766" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.alltrails.com/trail/us/california/rodeo-beach-coastal-trail-and-miwok-trail" rel="noopener" target="_blank"><strong data-dcnode-id="4767"><span data-dcnode-id="4768" instrument_node="">The Coastal Trail / Miwok Loop</span></strong></a><span data-dcnode-id="4765" instrument_node="">: If you’re in the mood for a great, longer hike, head to</span><strong data-dcnode-id="4763"><span data-dcnode-id="4764" instrument_node=""> Rodeo Beach</span></strong><span data-dcnode-id="4762" instrument_node=""> (which is worth a stop in its own right) and do this hike up to the top of the bluffs overlooking the ocean, then down around the backside with a stop at an old radio (?) tower with great views. For a shorter version that just focuses on the coastal views, </span><a data-dcnode-id="4760" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.alltrails.com/explore/trail/us/california/coastal-trail-loop%3Fref%3Dresult-card" rel="noopener" target="_blank"><span data-dcnode-id="4761" instrument_node="">this shorter trail</span></a><span data-dcnode-id="4759" instrument_node=""> would be a good alternative.&nbsp;</span></p><span data-dcnode-id="4757" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="4753"><img alt="" class="wp-image-222512" data-dcnode-id="4756" data-lazy-sizes="(max-width: 1024px) 100vw, 1024px" data-lazy-src="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC01676-2-1024x682.jpg" data-lazy-srcset="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC01676-2-1024x682.jpg 1024w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC01676-2-300x200.jpg 300w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC01676-2-768x512.jpg 768w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC01676-2-1536x1024.jpg 1536w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC01676-2.jpg 2000w" height="682" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201024%20682'%3E%3C/svg%3E" width="1024"><noscript data-dcnode-id="4754"><span data-dcnode-id="4755" instrument_node="">&lt;img width="1024" height="682" src="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC01676-2-1024x682.jpg" alt="" class="wp-image-222512" srcset="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC01676-2-1024x682.jpg 1024w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC01676-2-300x200.jpg 300w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC01676-2-768x512.jpg 768w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC01676-2-1536x1024.jpg 1536w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC01676-2.jpg 2000w" sizes="(max-width: 1024px) 100vw, 1024px"&gt;</span></noscript></figure><span data-dcnode-id="4752" instrument_node="">
</span><p class="has-theme-palette-7-background-color has-background" data-dcnode-id="4748"><strong data-dcnode-id="4750"><span data-dcnode-id="4751" instrument_node="">What about Muir Woods? </span></strong><span data-dcnode-id="4749" instrument_node="">As we were putting this guide together, we decided that we don’t think Muir Woods is worth a stop for a couple of reasons. One, the permitting system (you need an advance reservation these days) makes things more complicated and time consuming. Two, it’s the busiest redwood grove in California, so you’re not going to get the serenity and tranquility we associate with the redwoods. Last, you’re going to multiple MUCH COOLER redwood groves further north on the coast. So, with all that in mind, we’d skip it here. It’s a great, easily accessible option for people not going up further north on the coast, but if you’re following this road trip, that’s not you!</span></p><span data-dcnode-id="4747" instrument_node="">
</span><h3 class="has-text-align-center" data-dcnode-id="4744"><span data-dcnode-id="4745" id="Mount_Tamalpais"><span data-dcnode-id="4746" instrument_node="">Mount Tamalpais</span></span></h3><span data-dcnode-id="4743" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="4739"><img alt="" class="wp-image-222514" data-dcnode-id="4742" data-lazy-sizes="(max-width: 1024px) 100vw, 1024px" data-lazy-src="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC-0800-1024x683.jpg" data-lazy-srcset="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC-0800-1024x683.jpg 1024w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC-0800-300x200.jpg 300w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC-0800-768x512.jpg 768w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC-0800-1536x1024.jpg 1536w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC-0800-scaled.jpg 2000w" height="683" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201024%20683'%3E%3C/svg%3E" width="1024"><noscript data-dcnode-id="4740"><span data-dcnode-id="4741" instrument_node="">&lt;img width="1024" height="683" src="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC-0800-1024x683.jpg" alt="" class="wp-image-222514" srcset="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC-0800-1024x683.jpg 1024w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC-0800-300x200.jpg 300w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC-0800-768x512.jpg 768w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC-0800-1536x1024.jpg 1536w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC-0800-scaled.jpg 2000w" sizes="(max-width: 1024px) 100vw, 1024px"&gt;</span></noscript></figure><span data-dcnode-id="4738" instrument_node="">
</span><p data-dcnode-id="4735"><em data-dcnode-id="4736"><span data-dcnode-id="4737" instrument_node="">Drive time from the Marin Headlands: 30 minutes / 18 miles</span></em></p><span data-dcnode-id="4734" instrument_node="">
</span><p data-dcnode-id="4732"><span data-dcnode-id="4733" instrument_node="">Looking for a stop on the way to Point Reyes from San Francisco? We recommend a stop in Mt. Tamalpais State Park! Grab some coffee and take a quick hike to stretch your legs before continuing on your drive.</span></p><span data-dcnode-id="4731" instrument_node="">
</span><p data-dcnode-id="4726"><span data-dcnode-id="4730" instrument_node="">We love to stop at </span><a data-dcnode-id="4728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.equatorcoffees.com/" rel="noopener" target="_blank"><span data-dcnode-id="4729" instrument_node="">Equator Coffee</span></a><span data-dcnode-id="4727" instrument_node=""> for a quick coffee before a morning hike. There are actually a couple of locations near Mt. Tamalpais – one along Highway 1, and one in the heart of Mill Valley – we love the surf shack along Highway 1, and it’s a beautiful drive from there up to Mt. Tam.&nbsp;</span></p><span data-dcnode-id="4725" instrument_node="">
</span><p data-dcnode-id="4723"><span data-dcnode-id="4724" instrument_node="">We wouldn’t stay overnight here, but it’s a good stop on your way out of the city up the coast, and there are two hikes here worth doing.&nbsp;</span></p><span data-dcnode-id="4722" instrument_node="">
</span><ul data-dcnode-id="4702"><li data-dcnode-id="4710"><strong data-dcnode-id="4720"><span data-dcnode-id="4721" instrument_node="">Hike to the East Peak</span></strong><span data-dcnode-id="4719" instrument_node="">:</span><strong data-dcnode-id="4717"><span data-dcnode-id="4718" instrument_node=""> </span></strong><span data-dcnode-id="4716" instrument_node="">There are two ways to do this hike. The short version is a quick 0.6 mile hike from the parking lot that’s perfect for getting out of the car, getting some fresh air, and stretching your legs for a few minutes. You’ll be rewarded with gorgeous city and bay views! The second way to do it is to park at the </span><a data-dcnode-id="4714" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.google.com/search%3Frlz%3D1C1CHBF_enUS816US816%26tbm%3Dlcl%26sxsrf%3DALeKk00i2dVnQ0LZlDV8lOs8yML4aVKgng%253A1611761844089%26ei%3DtIgRYMX0BOS-0PEPqqO8gAs%26hotel_occupancy%3D%26q%3Dmountain%2Bhome%2Binn%2Bcalifornia%26oq%3Dmountain%2Bhome%2Binn%2Bcalif%26gs_l%3Dpsy-ab.3.0.0.8672.9310.0.10108.6.4.0.2.2.0.132.409.2j2.4.0....0...1c.1.64.psy-ab..0.6.412...46i199i175k1j0i20i263k1j0i22i30k1.0.Ef6Claw571U%23rlfi%3Dhd%3A%3Bsi%3A6570099508722235956%3Bmv%3A%255B%255B37.91028687731903%2C-122.57664798484264%255D%2C%255B37.90992692268097%2C-122.57710421515736%255D%255D" rel="noopener" target="_blank"><span data-dcnode-id="4715" instrument_node="">Mountain Home Inn</span></a><span data-dcnode-id="4713" instrument_node=""> along the Panoramic Highway and hike up to the East Peak from there, which is more like a four mile hike.</span><br data-dcnode-id="4712"><br data-dcnode-id="4711"></li><li data-dcnode-id="4703"><strong data-dcnode-id="4708"><span data-dcnode-id="4709" instrument_node="">Cataract Falls</span></strong><span data-dcnode-id="4707" instrument_node="">: The </span><a data-dcnode-id="4705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.alltrails.com/trail/us/california/cataract-falls-trail" rel="noopener" target="_blank"><span data-dcnode-id="4706" instrument_node="">Cataract Falls Trail</span></a><span data-dcnode-id="4704" instrument_node=""> is a more moderate hike that is about 3.3 miles long. Because of the beautiful waterfall at the end, it can get a bit busy, so be ready for crowds during peak times or on weekends.</span></li></ul><span data-dcnode-id="4701" instrument_node="">
</span><h3 class="has-text-align-center" data-dcnode-id="4698"><span data-dcnode-id="4699" id="Point_Reyes_National_Seashore"><span data-dcnode-id="4700" instrument_node="">Point Reyes National Seashore</span></span></h3><span data-dcnode-id="4697" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="4693"><img alt="" class="wp-image-222515" data-dcnode-id="4696" data-lazy-sizes="(max-width: 1024px) 100vw, 1024px" data-lazy-src="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC01958-1024x683.jpg" data-lazy-srcset="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC01958-1024x683.jpg 1024w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC01958-300x200.jpg 300w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC01958-768x512.jpg 768w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC01958-1536x1024.jpg 1536w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC01958-scaled.jpg 2000w" height="683" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201024%20683'%3E%3C/svg%3E" width="1024"><noscript data-dcnode-id="4694"><span data-dcnode-id="4695" instrument_node="">&lt;img width="1024" height="683" src="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC01958-1024x683.jpg" alt="" class="wp-image-222515" srcset="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC01958-1024x683.jpg 1024w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC01958-300x200.jpg 300w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC01958-768x512.jpg 768w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC01958-1536x1024.jpg 1536w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC01958-scaled.jpg 2000w" sizes="(max-width: 1024px) 100vw, 1024px"&gt;</span></noscript></figure><span data-dcnode-id="4692" instrument_node="">
</span><p data-dcnode-id="4689"><em data-dcnode-id="4690"><span data-dcnode-id="4691" instrument_node="">Drive time from Mt. Tamalpais to the Lighthouse: 1 hour 15 minutes / 39 miles</span></em></p><span data-dcnode-id="4688" instrument_node="">
</span><p data-dcnode-id="4686"><span data-dcnode-id="4687" instrument_node="">About 30 miles north of San Francisco, Point Reyes is a gorgeous cape that brings together forested ridges and rolling hills. It’s a natural sanctuary with miles of gorgeous drives and hikes to be explored.</span></p><span data-dcnode-id="4685" instrument_node="">
</span><h4 data-dcnode-id="4682"><span data-dcnode-id="4683" id="Things_to_Do_at_Point_Reyes"><span data-dcnode-id="4684" instrument_node="">Things to Do at Point Reyes</span></span></h4><span data-dcnode-id="4681" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="4677"><img alt="" class="wp-image-222517" data-dcnode-id="4680" data-lazy-sizes="(max-width: 1024px) 100vw, 1024px" data-lazy-src="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC09228-1024x682.jpg" data-lazy-srcset="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC09228-1024x682.jpg 1024w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC09228-300x200.jpg 300w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC09228-768x512.jpg 768w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC09228-1536x1024.jpg 1536w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC09228.jpg 2000w" height="682" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201024%20682'%3E%3C/svg%3E" width="1024"><noscript data-dcnode-id="4678"><span data-dcnode-id="4679" instrument_node="">&lt;img width="1024" height="682" src="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC09228-1024x682.jpg" alt="" class="wp-image-222517" srcset="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC09228-1024x682.jpg 1024w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC09228-300x200.jpg 300w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC09228-768x512.jpg 768w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC09228-1536x1024.jpg 1536w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC09228.jpg 2000w" sizes="(max-width: 1024px) 100vw, 1024px"&gt;</span></noscript></figure><span data-dcnode-id="4676" instrument_node="">
</span><p data-dcnode-id="4669"><strong data-dcnode-id="4674"><span data-dcnode-id="4675" instrument_node="">Hikes in Point Reyes</span></strong><span data-dcnode-id="4673" instrument_node="">:</span><strong data-dcnode-id="4671"><span data-dcnode-id="4672" instrument_node=""> </span></strong><span data-dcnode-id="4670" instrument_node="">Here are three hikes in Point Reyes to tackle while you’re in the area. If you’re looking for incredible coastal views, do the hike out to Tomales Point (it’s out and back, so you can just stop and turn around when you’re ready to head back).&nbsp;</span></p><span data-dcnode-id="4668" instrument_node="">
</span><ul data-dcnode-id="4647"><li data-dcnode-id="4661"><a data-dcnode-id="4665" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nps.gov/pore/planyourvisit/alamere_falls.htm" rel="noopener" target="_blank"><strong data-dcnode-id="4666"><span data-dcnode-id="4667" instrument_node="">Alamere Falls</span></strong></a><span data-dcnode-id="4664" instrument_node=""> (13 miles): Deep in the Phillip Burton Wilderness, you’ll find a stunning 40-ft tall waterfall that spills right on the beach before flowing into the Pacific Ocean.</span><br data-dcnode-id="4663"><br data-dcnode-id="4662"></li><li data-dcnode-id="4654"><a data-dcnode-id="4658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nps.gov/pore/planyourvisit/tomales_point.htm" rel="noopener" target="_blank"><strong data-dcnode-id="4659"><span data-dcnode-id="4660" instrument_node="">Tomales Point</span></strong></a><span data-dcnode-id="4657" instrument_node=""> (9.7 miles): For a chance to see Tule Elk and sweeping coastal views.</span><br data-dcnode-id="4656"><br data-dcnode-id="4655"></li><li data-dcnode-id="4648"><strong data-dcnode-id="4650"><a data-dcnode-id="4652" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.alltrails.com/trail/us/california/mount-wittenberg" rel="noopener" target="_blank"><span data-dcnode-id="4653" instrument_node="">Summit of Mt. Wittenberg</span></a><span data-dcnode-id="4651" instrument_node=""> </span></strong><span data-dcnode-id="4649" instrument_node="">(4.1 miles): Moderate hike with a decent elevation gain (1,299 ft.) and plenty of shade.</span></li></ul><span data-dcnode-id="4646" instrument_node="">
</span><p data-dcnode-id="4636"><strong data-dcnode-id="4644"><span data-dcnode-id="4645" instrument_node="">Cheese at Cowgirl Creamery</span></strong><span data-dcnode-id="4643" instrument_node="">:</span><strong data-dcnode-id="4641"><span data-dcnode-id="4642" instrument_node=""> </span></strong><span data-dcnode-id="4640" instrument_node="">We’ve managed to go this far without mentioning cheese, but it’s time! If you’re a fan of artisan organic cheese do not miss </span><a data-dcnode-id="4638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cowgirlcreamery.com/" rel="noopener" target="_blank"><span data-dcnode-id="4639" instrument_node="">Cowgirl Creamery</span></a><span data-dcnode-id="4637" instrument_node="">. When you stop in, you’ll find more types of cheese than you knew existed, and each one is more delicious than the next. Try their Mt. Tam – it’s a fan favorite for a reason. Locals and tourists alike love it.</span></p><span data-dcnode-id="4635" instrument_node="">
</span><p data-dcnode-id="4625"><strong data-dcnode-id="4633"><span data-dcnode-id="4634" instrument_node="">Try Some Mead at Heidrun Meadery</span></strong><span data-dcnode-id="4632" instrument_node="">:</span><strong data-dcnode-id="4630"><span data-dcnode-id="4631" instrument_node=""> </span></strong><span data-dcnode-id="4629" instrument_node="">Don’t know much about mead? It’s wine made from honey instead of grapes. Delicious, right? </span><a data-dcnode-id="4627" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.heidrunmeadery.com/" rel="noopener" target="_blank"><span data-dcnode-id="4628" instrument_node="">Heidrun Meadery</span></a><span data-dcnode-id="4626" instrument_node=""> is a former dairy farm that has been turned into a bee forage oasis with beautiful pastures, gardens, and a greenhouse. Heidrun Meadery produces unique Champagne-style mead that is light, dry, delicate, and refreshing.</span></p><span data-dcnode-id="4624" instrument_node="">
</span><p data-dcnode-id="4617"><strong data-dcnode-id="4622"><span data-dcnode-id="4623" instrument_node="">Bovine Bakery</span></strong><span data-dcnode-id="4621" instrument_node="">: </span><a data-dcnode-id="4619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bovinebakeryptreyes.com/" rel="noopener" target="_blank"><span data-dcnode-id="4620" instrument_node="">Bovine Bakery</span></a><span data-dcnode-id="4618" instrument_node=""> is a perfect post-hike stop to, you know, refuel. Or something. Make a stop in here to try the pastries – like their bear claws. They are Alysha’s favorite and we think they’ll be yours too (NOT GLUTEN FREE!).</span></p><span data-dcnode-id="4616" instrument_node="">
</span><p data-dcnode-id="4606"><strong data-dcnode-id="4614"><span data-dcnode-id="4615" instrument_node="">Shuck Your Own Oysters at Hog Island Oyster Co</span></strong><span data-dcnode-id="4613" instrument_node="">:</span><strong data-dcnode-id="4611"><span data-dcnode-id="4612" instrument_node=""> </span></strong><span data-dcnode-id="4610" instrument_node="">Looking for a unique experience? At </span><a data-dcnode-id="4608" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hogislandoysters.com/" rel="noopener" target="_blank"><span data-dcnode-id="4609" instrument_node="">Hog Island Oyster Co.</span></a><span data-dcnode-id="4607" instrument_node="">, you can purchase oysters to shuck yourself! Even better, bring some wine (or mead!) and make a picnic of it.</span></p><span data-dcnode-id="4605" instrument_node="">
</span><p data-dcnode-id="4595"><strong data-dcnode-id="4603"><span data-dcnode-id="4604" instrument_node="">Explore Limantour and Drakes Beaches</span></strong><span data-dcnode-id="4602" instrument_node="">:</span><strong data-dcnode-id="4600"><span data-dcnode-id="4601" instrument_node=""> </span></strong><span data-dcnode-id="4599" instrument_node="">Point Reyes has multiple </span><a data-dcnode-id="4597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nps.gov/pore/planyourvisit/beaches.htm" rel="noopener" target="_blank"><span data-dcnode-id="4598" instrument_node="">nice sandy beaches</span></a><span data-dcnode-id="4596" instrument_node=""> for you to explore – plan for fog by wearing some warm layers and you’ll be able to enjoy the beauty of this coastline. Limantour Beach is a narrow beach where you can view wildlife while walking along the sand. Harbor seals often hang out just offshore and shorebirds feed along the beaches in the fall. Drakes Beach is located up against white sandstone cliffs and has a Visitors Center and a bookstore on site.</span></p><span data-dcnode-id="4594" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="4590"><img alt="" class="wp-image-222518" data-dcnode-id="4593" data-lazy-sizes="(max-width: 1024px) 100vw, 1024px" data-lazy-src="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC01746-1024x682.jpg" data-lazy-srcset="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC01746-1024x682.jpg 1024w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC01746-300x200.jpg 300w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC01746-768x512.jpg 768w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC01746-1536x1024.jpg 1536w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC01746.jpg 2000w" height="682" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201024%20682'%3E%3C/svg%3E" width="1024"><noscript data-dcnode-id="4591"><span data-dcnode-id="4592" instrument_node="">&lt;img width="1024" height="682" src="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC01746-1024x682.jpg" alt="" class="wp-image-222518" srcset="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC01746-1024x682.jpg 1024w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC01746-300x200.jpg 300w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC01746-768x512.jpg 768w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC01746-1536x1024.jpg 1536w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC01746.jpg 2000w" sizes="(max-width: 1024px) 100vw, 1024px"&gt;</span></noscript></figure><span data-dcnode-id="4589" instrument_node="">
</span><p data-dcnode-id="4579"><strong data-dcnode-id="4587"><span data-dcnode-id="4588" instrument_node="">Cypress Tree Tunnel</span></strong><span data-dcnode-id="4586" instrument_node="">:</span><strong data-dcnode-id="4584"><span data-dcnode-id="4585" instrument_node=""> </span></strong><span data-dcnode-id="4583" instrument_node="">The </span><a data-dcnode-id="4581" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nps.gov/pore/planyourvisit/kph_treetunnel.htm" rel="noopener" target="_blank"><span data-dcnode-id="4582" instrument_node="">Cypress Tree Tunnel</span></a><span data-dcnode-id="4580" instrument_node=""> features Monterey cypress trees that were planted in 1930 and now create a tunnel that you can drive through. It’s a quick stop to take a few pictures on the way to or from another activity.</span></p><span data-dcnode-id="4578" instrument_node="">
</span><p data-dcnode-id="4568"><strong data-dcnode-id="4576"><span data-dcnode-id="4577" instrument_node="">Visit the Lighthouse</span></strong><span data-dcnode-id="4575" instrument_node="">:</span><strong data-dcnode-id="4573"><span data-dcnode-id="4574" instrument_node=""> </span></strong><span data-dcnode-id="4572" instrument_node="">Built in 1870, the </span><a data-dcnode-id="4570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nps.gov/pore/planyourvisit/lighthouse.htm" rel="noopener" target="_blank"><span data-dcnode-id="4571" instrument_node="">Point Reyes Lighthouse</span></a><span data-dcnode-id="4569" instrument_node=""> was used to warn mariners of the Point Reyes cape as they navigated the waters at night. It’s been retired since 1975 but is a scenic destination for visitors. It can get windy and chilly out by the lighthouse, so make sure you bring extra layers.</span></p><span data-dcnode-id="4567" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="4563"><img alt="" class="wp-image-222516" data-dcnode-id="4566" data-lazy-sizes="(max-width: 1024px) 100vw, 1024px" data-lazy-src="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC01939-1024x683.jpg" data-lazy-srcset="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC01939-1024x683.jpg 1024w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC01939-300x200.jpg 300w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC01939-768x512.jpg 768w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC01939-1536x1024.jpg 1536w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC01939-scaled.jpg 2000w" height="683" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201024%20683'%3E%3C/svg%3E" width="1024"><noscript data-dcnode-id="4564"><span data-dcnode-id="4565" instrument_node="">&lt;img width="1024" height="683" src="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC01939-1024x683.jpg" alt="" class="wp-image-222516" srcset="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC01939-1024x683.jpg 1024w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC01939-300x200.jpg 300w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC01939-768x512.jpg 768w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC01939-1536x1024.jpg 1536w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC01939-scaled.jpg 2000w" sizes="(max-width: 1024px) 100vw, 1024px"&gt;</span></noscript></figure><span data-dcnode-id="4562" instrument_node="">
</span><p data-dcnode-id="4556"><strong data-dcnode-id="4560"><span data-dcnode-id="4561" instrument_node="">Learn More:</span></strong><span data-dcnode-id="4559" instrument_node=""> </span><a data-dcnode-id="4557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//westcoastwayfarer.com/best-things-to-do-in-point-reyes/" rel="noopener" target="_blank"><span data-dcnode-id="4558" instrument_node="">What to Do in Point Reyes</span></a></p><span data-dcnode-id="4555" instrument_node="">
</span><h4 data-dcnode-id="4552"><span data-dcnode-id="4553" id="Where_to_Stay_in_Point_Reyes"><span data-dcnode-id="4554" instrument_node="">Where to Stay in Point Reyes</span></span></h4><span data-dcnode-id="4551" instrument_node="">
</span><p data-dcnode-id="4539"><span data-dcnode-id="4550" instrument_node="">Our top choice here is going to be the </span><a data-dcnode-id="4547" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.booking.com/hotel/us/point-reyes-seashore-lodge.en.html%3Faid%3D1738278%26no_rooms%3D1%26group_adults%3D2" rel="noreferrer noopener nofollow" target="_blank"><strong data-dcnode-id="4548"><span data-dcnode-id="4549" instrument_node="">Olema Inn</span></strong></a><span data-dcnode-id="4546" instrument_node=""> (though a </span><a data-dcnode-id="4544" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dpbolvw.net/click-9069370-11553823%3Furl%3Dhttps%253A%252F%252Fwww.vrbo.com%252Fsearch%252Fkeywords%253Apoint-reyes-station-california-united-states%252FminNightlyPrice%252F0%253FfilterByTotalPrice%253Dtrue%2526petIncluded%253Dfalse%2526ssr%253Dtrue%2526adultsCount%253D1" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="4545" instrument_node="">nice vacation rental</span></a><span data-dcnode-id="4543" instrument_node=""> in the woods would be amazing too, like </span><a data-dcnode-id="4541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dpbolvw.net/click-9069370-11553823%3Furl%3Dhttps%253A%252F%252Fwww.vrbo.com%252F3831658ha%253FadultsCount%253D1%2526noDates%253Dtrue%2526unitId%253D4204932" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="4542" instrument_node="">this rustic gem in the woods</span></a><span data-dcnode-id="4540" instrument_node="">).&nbsp;</span></p><span data-dcnode-id="4538" instrument_node="">
</span><p class="has-theme-palette-7-background-color has-background" data-dcnode-id="4532"><span data-dcnode-id="4537" instrument_node="">We have a whole guide to help you find a perfect </span><a data-dcnode-id="4534" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//westcoastwayfarers.com/where-to-stay-point-reyes/" rel="noopener" target="_blank"><strong data-dcnode-id="4535"><span data-dcnode-id="4536" instrument_node="">place to stay in Point Reyes</span></strong></a><span data-dcnode-id="4533" instrument_node=""> – which is just a half hour away from where Alysha grew up.&nbsp;</span></p><span data-dcnode-id="4531" instrument_node="">
</span><h3 class="has-text-align-center" data-dcnode-id="4528"><span data-dcnode-id="4529" id="Mendocino_Fort_Bragg"><span data-dcnode-id="4530" instrument_node="">Mendocino &amp; Fort Bragg</span></span></h3><span data-dcnode-id="4527" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="4523"><img alt="" class="wp-image-222519" data-dcnode-id="4526" data-lazy-sizes="(max-width: 1024px) 100vw, 1024px" data-lazy-src="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/IMG_1827-1024x682.jpg" data-lazy-srcset="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/IMG_1827-1024x682.jpg 1024w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/IMG_1827-300x200.jpg 300w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/IMG_1827-768x512.jpg 768w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/IMG_1827-1536x1024.jpg 1536w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/IMG_1827.jpg 2000w" height="682" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201024%20682'%3E%3C/svg%3E" width="1024"><noscript data-dcnode-id="4524"><span data-dcnode-id="4525" instrument_node="">&lt;img width="1024" height="682" src="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/IMG_1827-1024x682.jpg" alt="" class="wp-image-222519" srcset="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/IMG_1827-1024x682.jpg 1024w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/IMG_1827-300x200.jpg 300w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/IMG_1827-768x512.jpg 768w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/IMG_1827-1536x1024.jpg 1536w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/IMG_1827.jpg 2000w" sizes="(max-width: 1024px) 100vw, 1024px"&gt;</span></noscript></figure><span data-dcnode-id="4522" instrument_node="">
</span><p data-dcnode-id="4519"><em data-dcnode-id="4520"><span data-dcnode-id="4521" instrument_node="">Drive time from Point Reyes Station: 2 hours 50 minutes / 136 miles</span></em></p><span data-dcnode-id="4518" instrument_node="">
</span><p data-dcnode-id="4516"><span data-dcnode-id="4517" instrument_node="">Mendocino, on the Northern California coast, is peak California coastal beauty. Highway 1 passes right through the center of town, and on one side of the highway you’ll find the towering redwood groves of Russian Gulch State Park, and on the other, a series of coastal bluffs with impressive coastal vistas.&nbsp;</span></p><span data-dcnode-id="4515" instrument_node="">
</span><p data-dcnode-id="4513"><span data-dcnode-id="4514" instrument_node="">In other words, it’s magical.&nbsp;</span></p><span data-dcnode-id="4512" instrument_node="">
</span><p data-dcnode-id="4504"><span data-dcnode-id="4511" instrument_node="">The towns of </span><strong data-dcnode-id="4509"><span data-dcnode-id="4510" instrument_node="">Mendocino </span></strong><span data-dcnode-id="4508" instrument_node="">and </span><strong data-dcnode-id="4506"><span data-dcnode-id="4507" instrument_node="">Fort Bragg</span></strong><span data-dcnode-id="4505" instrument_node=""> themselves are also fun.&nbsp;</span></p><span data-dcnode-id="4503" instrument_node="">
</span><p data-dcnode-id="4496"><strong data-dcnode-id="4501"><span data-dcnode-id="4502" instrument_node="">Mendocino</span></strong><span data-dcnode-id="4500" instrument_node=""> is at least 72% bed and breakfasts, but there are some nice places to eat and drink in town, a bunch of fun shops from plants to local art and home goods, and there’s a </span><a data-dcnode-id="4498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.alltrails.com/trail/us/california/mendocino-headlands-trail%3Fref%3Dresult-card" rel="noopener" target="_blank"><span data-dcnode-id="4499" instrument_node="">beautiful headlands trail</span></a><span data-dcnode-id="4497" instrument_node=""> that leaves right from the edge of town.&nbsp;</span></p><span data-dcnode-id="4495" instrument_node="">
</span><p data-dcnode-id="4491"><strong data-dcnode-id="4493"><span data-dcnode-id="4494" instrument_node="">Fort Bragg </span></strong><span data-dcnode-id="4492" instrument_node="">is significantly less charming, but don’t let that fact dampen your resolve to visit. It has plenty to offer in its own right, and is arguably more fun than Mendocino thanks to breweries and coffee shops and a much more down-to-earth vibe.&nbsp;</span></p><span data-dcnode-id="4490" instrument_node="">
</span><h4 data-dcnode-id="4487"><span data-dcnode-id="4488" id="What_to_Do_In_and_Around_Mendocino_and_Fort_Bragg"><span data-dcnode-id="4489" instrument_node="">What to Do In and Around Mendocino and Fort Bragg</span></span></h4><span data-dcnode-id="4486" instrument_node="">
</span><p data-dcnode-id="4484"><span data-dcnode-id="4485" instrument_node="">There’s a diverse range of things to do and see in Mendocino, from wine tasting to coastal hiking, so you’ll need to carefully pick and choose from the list below depending on your interests.&nbsp;</span></p><span data-dcnode-id="4483" instrument_node="">
</span><p data-dcnode-id="4469"><a data-dcnode-id="4480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.parks.ca.gov/%3Fpage_id%3D432" rel="noopener" target="_blank"><strong data-dcnode-id="4481"><span data-dcnode-id="4482" instrument_node="">Russian Gulch State Park</span></strong></a><span data-dcnode-id="4479" instrument_node="">: There are essentially two halves of this state park – the coastal half, where you’ll find an </span><a data-dcnode-id="4477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.alltrails.com/trail/us/california/headlands-trail-devils-punchbowl%3Fref%3Dresult-card" rel="noopener" target="_blank"><span data-dcnode-id="4478" instrument_node="">excellent trail</span></a><span data-dcnode-id="4476" instrument_node=""> that takes you around the point out on the headlands, and the redwood section, which is on the other side of the highway. We like the short </span><a data-dcnode-id="4474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.alltrails.com/trail/us/california/russian-gulch-waterfall-loop-trail" rel="noopener" target="_blank"><span data-dcnode-id="4475" instrument_node="">four mile hike</span></a><span data-dcnode-id="4473" instrument_node=""> to the waterfall, where you’ll find an impressive 36-foot waterfall. This hike descends steeply down into a canyon with many varieties of ferns surrounding the trail and towering redwoods overhead. There’s also a nice beach – Russian Gulch Beach – right under the bridge that is worth a stop. If you’re looking for a longer hike, the </span><a data-dcnode-id="4471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.alltrails.com/trail/us/california/russian-gulch-fern-canyon-and-waterfall-trailloop%3Fref%3Dresult-card" rel="noopener" target="_blank"><span data-dcnode-id="4472" instrument_node="">Fern Canyon Trail</span></a><span data-dcnode-id="4470" instrument_node=""> takes you on a loop through the redwoods, to the aforementioned waterfall, and back along a different fern-laden trail.&nbsp;</span></p><span data-dcnode-id="4468" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="4464"><img alt="" class="wp-image-222520" data-dcnode-id="4467" data-lazy-sizes="(max-width: 1024px) 100vw, 1024px" data-lazy-src="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC09066-1024x683.jpg" data-lazy-srcset="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC09066-1024x683.jpg 1024w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC09066-300x200.jpg 300w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC09066-768x512.jpg 768w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC09066-1536x1024.jpg 1536w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC09066-scaled.jpg 2000w" height="683" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201024%20683'%3E%3C/svg%3E" width="1024"><noscript data-dcnode-id="4465"><span data-dcnode-id="4466" instrument_node="">&lt;img width="1024" height="683" src="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC09066-1024x683.jpg" alt="" class="wp-image-222520" srcset="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC09066-1024x683.jpg 1024w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC09066-300x200.jpg 300w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC09066-768x512.jpg 768w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC09066-1536x1024.jpg 1536w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC09066-scaled.jpg 2000w" sizes="(max-width: 1024px) 100vw, 1024px"&gt;</span></noscript></figure><span data-dcnode-id="4463" instrument_node="">
</span><p data-dcnode-id="4456"><strong data-dcnode-id="4461"><span data-dcnode-id="4462" instrument_node="">Point Cabrillo</span></strong><span data-dcnode-id="4460" instrument_node="">: You’ll have to walk about a half mile or so to get to the lighthouse with a red roof that watches over this stretch of coast, but it’s worth it. There’s a funny series of informational signs along the way that were pretty clearly made to keep kids busy and interested along the walk. The lighthouse itself was built in 1909, and today it’s automatic, which means that you can actually </span><a data-dcnode-id="4458" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pointcabrillo.org/rentals/" rel="noopener" target="_blank"><span data-dcnode-id="4459" instrument_node="">stay in the keepers quarters</span></a><span data-dcnode-id="4457" instrument_node="">, which is a fun twist. There’s a gift shop on the ground floor of the lighthouse where you can find things like postcards and souvenirs. In the spring and fall, this is a great place to spot gray whales from the shore (in the summer, the coastal fog makes it a little bit tricky on most days).&nbsp;</span></p><span data-dcnode-id="4455" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="4451"><img alt="" class="wp-image-222521" data-dcnode-id="4454" data-lazy-sizes="(max-width: 1024px) 100vw, 1024px" data-lazy-src="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC09031-1024x683.jpg" data-lazy-srcset="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC09031-1024x683.jpg 1024w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC09031-300x200.jpg 300w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC09031-768x512.jpg 768w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC09031-1536x1024.jpg 1536w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC09031-scaled.jpg 2000w" height="683" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201024%20683'%3E%3C/svg%3E" width="1024"><noscript data-dcnode-id="4452"><span data-dcnode-id="4453" instrument_node="">&lt;img width="1024" height="683" src="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC09031-1024x683.jpg" alt="" class="wp-image-222521" srcset="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC09031-1024x683.jpg 1024w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC09031-300x200.jpg 300w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC09031-768x512.jpg 768w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC09031-1536x1024.jpg 1536w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/DSC09031-scaled.jpg 2000w" sizes="(max-width: 1024px) 100vw, 1024px"&gt;</span></noscript></figure><span data-dcnode-id="4450" instrument_node="">
</span><p data-dcnode-id="4443"><strong data-dcnode-id="4448"><span data-dcnode-id="4449" instrument_node="">Ten Mile Beach</span></strong><span data-dcnode-id="4447" instrument_node="">: It’s not just another Northern California beach! </span><a data-dcnode-id="4445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.visitcalifornia.com/experience/ten-mile-beach/" rel="noopener" target="_blank"><span data-dcnode-id="4446" instrument_node="">Ten Mile Beach</span></a><span data-dcnode-id="4444" instrument_node=""> is a rugged wildlife preserve that is home to over 90 species of birds, seals, and river otters. It’s 10-15 minutes north of Fort Bragg, but it’s worth the journey.&nbsp;</span></p><span data-dcnode-id="4442" instrument_node="">
</span><p data-dcnode-id="4432"><strong data-dcnode-id="4440"><span data-dcnode-id="4441" instrument_node="">Walk the Mendocino Headlands</span></strong><span data-dcnode-id="4439" instrument_node="">: </span><a data-dcnode-id="4437" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.parks.ca.gov/%3Fpage_id%3D442" rel="noopener" target="_blank"><span data-dcnode-id="4438" instrument_node="">Mendocino Headlands State Park</span></a><span data-dcnode-id="4436" instrument_node=""> is a 7,400-acre wildlife corridor of unreal seaside bluffs, ocean views, and beaches. Big River Beach is a popular spot for picnicking and surfing, but there are also many trails to walk and explore. Here’s the </span><a data-dcnode-id="4434" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.alltrails.com/trail/us/california/mendocino-headlands-trail%3Fref%3Dresult-card" rel="noopener" target="_blank"><span data-dcnode-id="4435" instrument_node="">main one</span></a><span data-dcnode-id="4433" instrument_node="">, which we’ve done and enjoyed.&nbsp;</span></p><span data-dcnode-id="4431" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="4427"><img alt="" class="wp-image-222522" data-dcnode-id="4430" data-lazy-sizes="(max-width: 1024px) 100vw, 1024px" data-lazy-src="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/IMG_1824-1024x682.jpg" data-lazy-srcset="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/IMG_1824-1024x682.jpg 1024w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/IMG_1824-300x200.jpg 300w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/IMG_1824-768x512.jpg 768w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/IMG_1824-1536x1024.jpg 1536w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/IMG_1824.jpg 2000w" height="682" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201024%20682'%3E%3C/svg%3E" width="1024"><noscript data-dcnode-id="4428"><span data-dcnode-id="4429" instrument_node="">&lt;img width="1024" height="682" src="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/IMG_1824-1024x682.jpg" alt="" class="wp-image-222522" srcset="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/IMG_1824-1024x682.jpg 1024w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/IMG_1824-300x200.jpg 300w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/IMG_1824-768x512.jpg 768w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/IMG_1824-1536x1024.jpg 1536w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/IMG_1824.jpg 2000w" sizes="(max-width: 1024px) 100vw, 1024px"&gt;</span></noscript></figure><span data-dcnode-id="4426" instrument_node="">
</span><p data-dcnode-id="4416"><strong data-dcnode-id="4424"><span data-dcnode-id="4425" instrument_node="">North Coast Brewing Co</span></strong><span data-dcnode-id="4423" instrument_node="">:</span><strong data-dcnode-id="4421"><span data-dcnode-id="4422" instrument_node=""> </span></strong><span data-dcnode-id="4420" instrument_node="">Beer lovers, we haven’t forgotten about you! </span><a data-dcnode-id="4418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//northcoastbrewing.com/mendocino-coast/" rel="noopener" target="_blank"><span data-dcnode-id="4419" instrument_node="">North Coast Brewing Co</span></a><span data-dcnode-id="4417" instrument_node=""> serves barrel-aged beer, a menu of delicious food with huge portions, and even has live Jazz during peak times.&nbsp;</span></p><span data-dcnode-id="4415" instrument_node="">
</span><p data-dcnode-id="4408"><strong data-dcnode-id="4413"><span data-dcnode-id="4414" instrument_node="">Breakfast at the Good Life Cafe</span></strong><span data-dcnode-id="4412" instrument_node="">: Looking for a place to stop in for breakfast? </span><a data-dcnode-id="4410" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodlifecafemendo.com/" rel="noopener" target="_blank"><span data-dcnode-id="4411" instrument_node="">Good Life Cafe</span></a><span data-dcnode-id="4409" instrument_node=""> serves fair-trade coffee, juice, and organic bites to eat with plenty of gluten free and vegetarian options. You can enjoy your breakfast on the outdoor patio or take it to go for a morning picnic on the beach.</span></p><span data-dcnode-id="4407" instrument_node="">
</span><p data-dcnode-id="4400"><strong data-dcnode-id="4405"><span data-dcnode-id="4406" instrument_node="">Glass Beach</span></strong><span data-dcnode-id="4404" instrument_node="">: While you’re in Fort Bragg, make sure you check out </span><a data-dcnode-id="4402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.meetmendocino.com/glass-beach/" rel="noopener" target="_blank"><span data-dcnode-id="4403" instrument_node="">Glass Beach</span></a><span data-dcnode-id="4401" instrument_node="">, a beach covered in beautiful sea glass. Keep in mind it’s illegal to take any sea glass home with you, but it’s still worth a visit to this unique beach that was actually created due to years of dumping garbage near the coastline.</span></p><span data-dcnode-id="4399" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="4395"><img alt="" class="wp-image-222523" data-dcnode-id="4398" data-lazy-sizes="(max-width: 1024px) 100vw, 1024px" data-lazy-src="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/IMG_1900-1024x682.jpg" data-lazy-srcset="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/IMG_1900-1024x682.jpg 1024w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/IMG_1900-300x200.jpg 300w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/IMG_1900-768x512.jpg 768w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/IMG_1900-1536x1024.jpg 1536w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/IMG_1900.jpg 2000w" height="682" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201024%20682'%3E%3C/svg%3E" width="1024"><noscript data-dcnode-id="4396"><span data-dcnode-id="4397" instrument_node="">&lt;img width="1024" height="682" src="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/IMG_1900-1024x682.jpg" alt="" class="wp-image-222523" srcset="https://wheatlesswanderlust.com/wp-content/uploads/2022/03/IMG_1900-1024x682.jpg 1024w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/IMG_1900-300x200.jpg 300w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/IMG_1900-768x512.jpg 768w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/IMG_1900-1536x1024.jpg 1536w, https://wheatlesswanderlust.com/wp-content/uploads/2022/03/IMG_1900.jpg 2000w" sizes="(max-width: 1024px) 100vw, 1024px"&gt;</span></noscript></figure><span data-dcnode-id="4394" instrument_node="">
</span><h4 data-dcnode-id="4391"><span data-dcnode-id="4392" id="Where_to_Stay_in_Mendocino"><span data-dcnode-id="4393" instrument_node="">Where to Stay in Mendocino</span></span></h4><span data-dcnode-id="4390" instrument_node="">
</span><p data-dcnode-id="4388"><span data-dcnode-id="4389" instrument_node="">The first thing to know here is that staying in Mendocino is expensive. Like, really expensive.&nbsp;</span></p><span data-dcnode-id="4387" instrument_node="">
</span><p data-dcnode-id="4381"><span data-dcnode-id="4386" instrument_node="">Which leads me to the second thing you should know. Staying south of Mendocino along the coast near the town of </span><a data-dcnode-id="4383" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.booking.com/searchresults.en.html%3Fcity%3D20014107%26aid%3D1738278%26no_rooms%3D1%26group_adults%3D2" rel="noreferrer noopener nofollow" target="_blank"><strong data-dcnode-id="4384"><span data-dcnode-id="4385" instrument_node="">Little River</span></strong></a><span data-dcnode-id="4382" instrument_node=""> is both equally beautiful and usually cheaper.&nbsp;</span></p><span data-dcnode-id="4380" instrument_node="">
</span><p data-dcnode-id="4378"><span data-dcnode-id="4379" instrument_node="">Here are some good options both in and around Mendocino and down near Little River.&nbsp;</span></p><span data-dcnode-id="4377" instrument_node="">
</span><p data-dcnode-id="4369"><strong data-dcnode-id="4375"><span data-dcnode-id="4376" instrument_node="">If you’re looking to stay right in the middle of Mendocino</span></strong><span data-dcnode-id="4374" instrument_node="">, we’d opt for the </span><a data-dcnode-id="4371" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.booking.com/hotel/us/blue-door-group.en.html%3Faid%3D1738278%26no_rooms%3D1%26group_adults%3D2" rel="noreferrer noopener nofollow" target="_blank"><strong data-dcnode-id="4372"><span data-dcnode-id="4373" instrument_node="">Blue Door Inns</span></strong></a><span data-dcnode-id="4370" instrument_node="">, a modern hotel (most of the B&amp;Bs in Mendocino are going for the “lived-in, old timey” charm, and this place is decidedly more modern) with 19 rooms spread across three properties in Mendocino. Included in your stay are breakfast delivered to your room and an afternoon wine and cheese picnic. Of the three properties, we’re most drawn to the JD House and the Packard House, which feel a little more casual and laid back.&nbsp;</span></p><span data-dcnode-id="4368" instrument_node="">
</span><p data-dcnode-id="4364"><strong data-dcnode-id="4366"><span data-dcnode-id="4367" instrument_node="">If you’re okay with staying just outside of town</span></strong><span data-dcnode-id="4365" instrument_node="">, we’ve got two great options for you.&nbsp;</span></p><span data-dcnode-id="4363" instrument_node="">
