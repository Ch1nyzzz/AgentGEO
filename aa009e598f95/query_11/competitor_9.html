</span><p data-dcnode-id="2818"><span data-dcnode-id="2819" instrument_node="">Hi,</span></p><span data-dcnode-id="2817" instrument_node="">
</span><p data-dcnode-id="2815"><span data-dcnode-id="2816" instrument_node="">Thanks very much for taking the time to make this blog!</span></p><span data-dcnode-id="2814" instrument_node="">
</span><p data-dcnode-id="2812"><span data-dcnode-id="2813" instrument_node="">Meanwhile I’m coming to Norway from Sydney for a short visit from May 28-June 2. I know it’s not long, but I’m in Europe for my friend’s wedding and I don’t have much leave from Work :]. I’d really love to pack in as much outdoors stuff as possible, and I’m thinking it would be best to just pick an area and focus on that.</span></p><span data-dcnode-id="2811" instrument_node="">
</span><p data-dcnode-id="2809"><span data-dcnode-id="2810" instrument_node="">My plan is ::</span></p><span data-dcnode-id="2808" instrument_node="">
</span><p data-dcnode-id="2806"><span data-dcnode-id="2807" instrument_node="">Fly into Bergen in the arvo. Two nights here, one day exploring the fjords – maybe a boat tour is the best way in a day?</span></p><span data-dcnode-id="2805" instrument_node="">
</span><p data-dcnode-id="2803"><span data-dcnode-id="2804" instrument_node="">Next day, rent a car and drive to Trolltunga, via a scenic route if possible. Two nights in Trolltunga, then one day doing the walk.</span></p><span data-dcnode-id="2802" instrument_node="">
</span><p data-dcnode-id="2800"><span data-dcnode-id="2801" instrument_node="">Then I need to decide whether I drive back to Bergen and see something else on the way back via a different route (i.e. flying back to Oslo), or drive all the way to Oslo. I prob don’t have the time to go to Oslo so it’s probably better to stay closer to Bergen and see more of that region.</span></p><span data-dcnode-id="2799" instrument_node="">
</span><p data-dcnode-id="2797"><span data-dcnode-id="2798" instrument_node="">It would be great to also visit a national park with forest, I understand Trolltunga is more of a geological wonder than an forested area? Any advice would be greatly appreciated! </span></p><span data-dcnode-id="2796" instrument_node="">
</span><p data-dcnode-id="2794"><span data-dcnode-id="2795" instrument_node="">Also if you’d like any travel tips for Australia just let me know – I’ve been all over the place down here :]</span></p><span data-dcnode-id="2793" instrument_node="">
</span><p data-dcnode-id="2791"><span data-dcnode-id="2792" instrument_node="">Hugh</span></p><span data-dcnode-id="2790" instrument_node="">

</span><p class="comment-meta" data-dcnode-id="628"><time class="comment-time" data-dcnode-id="629" datetime="2022-02-13T08:34:56+01:00" itemprop="datePublished"><a class="comment-time-link" data-dcnode-id="630" href="#comment-575643" itemprop="url"><span data-dcnode-id="631" instrument_node="">February 13, 2022 at 8:34 am</span></a></time></p><span data-dcnode-id="627" instrument_node=""> </span></header><span data-dcnode-id="625" instrument_node="">

</span><p data-dcnode-id="616"><span data-dcnode-id="623" instrument_node="">Hi Silvia!</span><br data-dcnode-id="622"><span data-dcnode-id="621" instrument_node="">
Your website and information is awesome!  I’m from the USA and I’m leaving for various Countries in the EU March 1st ( VERY soon!) for my latest female Solo travel adventure. I’m starting in Denmark (visiting friends)then headed to Norway 3/22 or 3/23 for 10 days before I head to Switzerland and then Italy. I wish I could stay longer but the rules are strict that I must only stay in the Schengen area for 90 days. I have been reading a lot of blogs on the Internet but they were all from Travelers so when I saw yours I was thrilled because you’re a local! I’ll be leaving Copenhagen and was thinking about heading north first in the hopes of still catching the northern lights. I would really love your opinion of the best trip I could hope for in my short 10 day stay. I will be renting a car and I am completely unaware of where I’ll be staying since I don’t even have my itinerary mapped out. I’m feeling a little stressed because it will be time to leave so soon now!</span><br data-dcnode-id="620"><span data-dcnode-id="619" instrument_node="">
Any help or suggestions that you can give me would be so very very much appreciated. If it turns out that you’re available while I’m in your beautiful country I would be happy to meet you for coffee and a pastry perhaps 😎</span><br data-dcnode-id="618"><span data-dcnode-id="617" instrument_node="">
I love to hike and road tripping like you!</span></p><span data-dcnode-id="615" instrument_node="">

</span><p data-dcnode-id="576"><span data-dcnode-id="585" instrument_node="">If you want to see the northern lights I would fly up to Tromsø and rent a car from there. You’ll be right at the end of the northern lights season, but should still have a chance at the end of March. The distances here are really great so I don’t recommend trying to see too many places at once. I think my top pick would be Tromsø and Senja. You could also drive around Kvaløya, the island next to Tromsø, and Sommarøy during the day, and then Kvaløya is also a great place to watch northern lights at night. These posts should help: </span><a data-dcnode-id="583" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.heartmybackpack.com/norway/tromso-northern-lights-tour/" rel="nofollow"><span data-dcnode-id="584" instrument_node="">https://www.heartmybackpack.com/norway/tromso-northern-lights-tour/</span></a><span data-dcnode-id="582" instrument_node=""> </span><a data-dcnode-id="580" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.heartmybackpack.com/norway/things-to-do-in-tromso/" rel="nofollow"><span data-dcnode-id="581" instrument_node="">https://www.heartmybackpack.com/norway/things-to-do-in-tromso/</span></a><span data-dcnode-id="579" instrument_node=""> and </span><a data-dcnode-id="577" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.heartmybackpack.com/norway/things-to-do-in-senja-norway/" rel="nofollow"><span data-dcnode-id="578" instrument_node="">https://www.heartmybackpack.com/norway/things-to-do-in-senja-norway/</span></a></p><span data-dcnode-id="575" instrument_node="">
