</span><div class="entry-content jpibfi_container" data-dcnode-id="5116" itemprop="text"><input class="jpibfi" data-dcnode-id="6271" type="hidden"><p data-dcnode-id="6269"><span data-dcnode-id="6270" instrument_node="">I love&nbsp;places where you can easily get around using solely public transportation, but unfortunately Norway isn’t really one of those places. I mean, if you stick to the cities then public transport will be fine, but if you want to venture into the countryside? You’ll need to rent a car for that in Norway.</span></p><span data-dcnode-id="6268" instrument_node="">
</span><p data-dcnode-id="6266"><span data-dcnode-id="6267" instrument_node="">Luckily driving in Norway is an amazing experience – in fact I tell everyone who visits that they have to consider a road trip when planning a trip to Norway!</span></p><span data-dcnode-id="6265" instrument_node="">
</span><p data-dcnode-id="6263"><span data-dcnode-id="6264" instrument_node="">Plus, public transport can also be&nbsp;really expensive in Norway, so if you’re traveling with other people and want to see as much of Norway as possible, you’re&nbsp;definitely best off renting a car here.</span></p><span data-dcnode-id="6262" instrument_node="">
</span><p data-dcnode-id="6260"><span data-dcnode-id="6261" instrument_node="">Renting&nbsp;a car in Norway is actually a really good option for budget travelers not only because public transport is expensive here, but also because the cheapest accommodation options are usually outside of the main tourist areas where buses might only pass through once or twice a day. So by renting a car in Norway you can potentially save on transportation AND accommodation.</span></p><span data-dcnode-id="6259" instrument_node="">
</span><p data-dcnode-id="6257"><span data-dcnode-id="6258" instrument_node="">Plus road trips are so much fun!</span></p><span data-dcnode-id="6256" instrument_node="">
</span><p data-dcnode-id="6250"><em data-dcnode-id="6251"><span data-dcnode-id="6255" instrument_node="">If you’re looking for the perfect Norway road trip itinerary, I have put together </span><a data-dcnode-id="6253" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.heartmybackpack.com/norway/norway-itinerary-days-weeks/"><span data-dcnode-id="6254" instrument_node="">over twenty-five Norway itineraries here</span></a><span data-dcnode-id="6252" instrument_node="">, most of which are best done by car.&nbsp;</span></em></p><span data-dcnode-id="6249" instrument_node="">
</span><p data-dcnode-id="6245"><picture data-dcnode-id="6246"><source data-dcnode-id="6248" sizes="(max-width: 1000px) 100vw, 1000px" srcset="https://www.heartmybackpack.com/wp-content/uploads/2018/05/IMG_0752.jpg.webp 1000w, https://www.heartmybackpack.com/wp-content/uploads/2018/05/IMG_0752-150x100.jpg.webp 150w, https://www.heartmybackpack.com/wp-content/uploads/2018/05/IMG_0752-300x200.jpg.webp 300w" type="image/webp"><img alt="trollstigen norway itinerary" class="aligncenter size-full wp-image-12240 webpexpress-processed" data-dcnode-id="6247" data-jpibfi-post-excerpt="" data-jpibfi-post-title="How to Plan an Epic Road Trip in Norway" data-jpibfi-post-url="https://www.heartmybackpack.com/norway/plan-road-trip-norway/" data-jpibfi-src="https://www.heartmybackpack.com/wp-content/uploads/2018/05/IMG_0752.jpg" height="667" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.heartmybackpack.com/wp-content/uploads/2018/05/IMG_0752.jpg&amp;raw" srcset="https://www.heartmybackpack.com/wp-content/uploads/2018/05/IMG_0752.jpg 1000w, https://www.heartmybackpack.com/wp-content/uploads/2018/05/IMG_0752-150x100.jpg 150w, https://www.heartmybackpack.com/wp-content/uploads/2018/05/IMG_0752-300x200.jpg 300w" width="1000"></picture></p><span data-dcnode-id="6244" instrument_node="">
</span><p data-dcnode-id="6242"><span data-dcnode-id="6243" instrument_node="">While I’ve now been living in Norway for six years, I’ve also spent most all of my summers in Norway since I was a kid (visiting family here), so I’ve definitely learned a thing or two about the whole process of renting a car and planning a road trip in Norway.</span></p><span data-dcnode-id="6241" instrument_node="">
</span><p data-dcnode-id="6239"><span data-dcnode-id="6240" instrument_node="">I mean, with Norway’s nonstop breathtaking nature it’s kind of impossible to have a bad road trip here, but here my best tips for making yours truly epic.</span></p><span data-dcnode-id="6238" instrument_node="">
</span><div class="content-box-red" data-dcnode-id="6225"><span data-dcnode-id="6237" instrument_node="">
</span><p data-dcnode-id="6233"><strong data-dcnode-id="6235"><span data-dcnode-id="6236" instrument_node="">Norway Travel Guides!&nbsp;</span></strong><span data-dcnode-id="6234" instrument_node="">I’ve gathered all my best advice for planning an incredible trip through Southern and Northern Norway in two 95-page ebooks covering my top recommendations for places to visit (both on and off the beaten path), the best times of year to visit, how long to visit for, the best accommodation choices, transportation, what to eat, what to pack, and how to plan the perfect itinerary.</span></p><span data-dcnode-id="6232" instrument_node="">
</span><p data-dcnode-id="6227"><span data-dcnode-id="6231" instrument_node="">You can&nbsp;</span><a data-dcnode-id="6229" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//app.gumroad.com/heartmybackpack"><span data-dcnode-id="6230" instrument_node="">purchase the Norway Travel Guides here</span></a><span data-dcnode-id="6228" instrument_node="">.</span></p><span data-dcnode-id="6226" instrument_node="">
</span></div><span data-dcnode-id="6224" instrument_node="">
</span><p data-dcnode-id="6220"><picture data-dcnode-id="6221"><source data-dcnode-id="6223" sizes="(max-width: 659px) 100vw, 659px" srcset="https://www.heartmybackpack.com/wp-content/uploads/2016/10/IMG_0751.jpg.webp 659w, https://www.heartmybackpack.com/wp-content/uploads/2016/10/IMG_0751-99x150.jpg.webp 99w, https://www.heartmybackpack.com/wp-content/uploads/2016/10/IMG_0751-198x300.jpg.webp 198w" type="image/webp"><img alt="After living in Norway for over a year, here are my top tips for planning an epic Norwegian road trip, including where to start and how to find Norway's most scenic roads!" class="size-full wp-image-8253 aligncenter webpexpress-processed" data-dcnode-id="6222" data-jpibfi-post-excerpt="" data-jpibfi-post-title="How to Plan an Epic Road Trip in Norway" data-jpibfi-post-url="https://www.heartmybackpack.com/norway/plan-road-trip-norway/" data-jpibfi-src="http://www.heartmybackpack.com/wp-content/uploads/2016/10/IMG_0751.jpg" height="1000" loading="lazy" sizes="(max-width: 659px) 100vw, 659px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.heartmybackpack.com/wp-content/uploads/2016/10/IMG_0751.jpg&amp;raw" srcset="https://www.heartmybackpack.com/wp-content/uploads/2016/10/IMG_0751.jpg 659w, https://www.heartmybackpack.com/wp-content/uploads/2016/10/IMG_0751-99x150.jpg 99w, https://www.heartmybackpack.com/wp-content/uploads/2016/10/IMG_0751-198x300.jpg 198w" width="659"></picture></p><span data-dcnode-id="6219" instrument_node="">
</span><h2 data-dcnode-id="6217"><span data-dcnode-id="6218" instrument_node="">Car rental in Norway –&nbsp;things to know about renting a car in Norway</span></h2><span data-dcnode-id="6216" instrument_node="">
</span><p data-dcnode-id="6214"><span data-dcnode-id="6215" instrument_node="">The good news is, if you’re traveling with multiple people, renting a car in Norway is going to be a lot cheaper than relying on public transport here. Plus driving in Norway is really easy, as the roads are all well-maintained and there’s very little traffic. Of course the bad news is, it’s still going to be expensive.</span></p><span data-dcnode-id="6213" instrument_node="">
</span><p data-dcnode-id="6211"><span data-dcnode-id="6212" instrument_node="">At least, a car rental in Norway is going to cost more than rentals in southern Europe where you can get a car for like $50 per week. But! If you book well in advance you can actually get some really good deals on car rentals in Norway too.</span></p><span data-dcnode-id="6210" instrument_node="">
</span><p data-dcnode-id="6196"><span data-dcnode-id="6209" instrument_node="">So, I used to always use price comparison search engines&nbsp;</span><a data-dcnode-id="6207" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//bit.ly/29kzxZR"><span data-dcnode-id="6208" instrument_node="">Auto Europe</span></a><span data-dcnode-id="6206" instrument_node=""> to&nbsp;compare prices, but these days my go-to rental company is always </span><a data-dcnode-id="6204" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sixt.com/"><span data-dcnode-id="6205" instrument_node="">Sixt</span></a><span data-dcnode-id="6203" instrument_node="">. They always have the cheapest rates in Norway, I think partly because of their discount codes. </span><a data-dcnode-id="6201" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.anrdoezrs.net/click-7907598-12490578" rel="nofollow"><span data-dcnode-id="6202" instrument_node="">Click here to check current prices and save&nbsp;10%</span></a><span data-dcnode-id="6200" instrument_node="">&nbsp;(and if you’re renting for a week or more </span><a data-dcnode-id="6198" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.dpbolvw.net/click-7907598-12490579" rel="nofollow"><span data-dcnode-id="6199" instrument_node="">click here to save up to 35%</span></a><span data-dcnode-id="6197" instrument_node="">)</span></p><span data-dcnode-id="6195" instrument_node="">
</span><p data-dcnode-id="6193"><span data-dcnode-id="6194" instrument_node="">And as fuel in Norway is expensive, definitely go for the smallest, most fuel efficient car you can find.</span></p><span data-dcnode-id="6192" instrument_node="">
</span><p data-dcnode-id="6190"><span data-dcnode-id="6191" instrument_node="">You’ll also likely be covering huge distances, as Norway is a really big country, so I always opt of unlimited mileage. Or at least make sure you get a minimum of 200 – 300 km a day, depending on what you have planned.</span></p><span data-dcnode-id="6189" instrument_node="">
</span><p data-dcnode-id="6187"><span data-dcnode-id="6188" instrument_node="">And don’t worry, all cars in Norway have to have winter tires in the winter by law. This isn’t the case in other places in Europe, though. My family has rented cars during the winter in Germany before and then driven up to Norway with them. And it’s always incredibly difficult to drive in Norway on year-round tires!</span></p><span data-dcnode-id="6186" instrument_node="">
</span><h2 data-dcnode-id="6184"><span data-dcnode-id="6185" instrument_node="">Driving in Norway – all your questions answered!</span></h2><span data-dcnode-id="6183" instrument_node="">
</span><h3 data-dcnode-id="6181"><span data-dcnode-id="6182" instrument_node="">Toll Roads in Norway</span></h3><span data-dcnode-id="6180" instrument_node="">
</span><p data-dcnode-id="6175"><span data-dcnode-id="6179" instrument_node="">In Norway toll roads are managed by </span><a data-dcnode-id="6177" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.autopass.no/en/autopass"><span data-dcnode-id="6178" instrument_node="">AutoPASS</span></a><span data-dcnode-id="6176" instrument_node=""> with toll booths that take photos of your license plate automatically and send a bill at the end of the month. This happens automatically, so you don’t even need to slow down as you pass under the toll cameras. You will receive a bill from your Norwegian car rental company after your trip. You can contact the car rental company if you have more questions about when you will receive the bill for the toll roads.</span></p><span data-dcnode-id="6174" instrument_node="">
</span><p data-dcnode-id="6169"><span data-dcnode-id="6173" instrument_node="">However if you’re driving a foreign vehicle not registered in Norway, paying Norwegian tolls is a bit more complicated. AutoPASS will send an invoice to the registered address of the vehicle. But you can actually speed up the process by registereing with&nbsp;</span><a data-dcnode-id="6171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.epcplc.com/" rel="noopener" target="_blank"><span data-dcnode-id="6172" instrument_node="">Euro Parking Collection</span></a><span data-dcnode-id="6170" instrument_node="">&nbsp;(EPC), which will give you access to all your invoices online. I definitely recommend doing this if you’ll be driving a foreign car in Norway! But also don’t freak out if you forget – you’ll just get your invoice in the mail instead.</span></p><span data-dcnode-id="6168" instrument_node="">
</span><h3 data-dcnode-id="6166"><span data-dcnode-id="6167" instrument_node="">Car ferries in Norway</span></h3><span data-dcnode-id="6165" instrument_node="">
</span><p data-dcnode-id="6163"><span data-dcnode-id="6164" instrument_node="">Probably one of the most common questions I get about driving in Norway is how to use the car ferries.</span></p><span data-dcnode-id="6162" instrument_node="">
</span><p data-dcnode-id="6160"><span data-dcnode-id="6161" instrument_node="">No, you don’t need to book short ferries in advance (in fact you usually can’t). You will want to try to arrive fifteen minutes before the ferry leaves to ensure you get a place on the ferry, but to be honest I sometimes arrive right before it’s leaving and I’m almost always able to get on (I think the only exception would be in July when Norway is more crowded).</span></p><span data-dcnode-id="6159" instrument_node="">
</span><p data-dcnode-id="6157"><span data-dcnode-id="6158" instrument_node="">You will usually pay for the ferry as you’re driving on. There will be someone with a credit card reader at the entrance to the ferry, so as you’re driving onto the ferry you’ll stop, roll down your window, and pay for your ticket by card. If there’s no one taking payments as you’re driving on, someone will come around taking payments when you’re on the ferry (either while you’re in your car on a super short ferry, or in the passenger room on slightly longer ferries). I think you can only pay by card – at least I’ve never seen someone paying for ferries in Norway by cash.</span></p><span data-dcnode-id="6156" instrument_node="">
</span><p data-dcnode-id="6154"><span data-dcnode-id="6155" instrument_node="">Someone will wave you onto the ferry and tell you exactly where to park. On most car ferries everyone gets out of their car and goes to a communal area. If you’re unsure of whether or not to wait in your car, just watch what everyone else does and do the same. On longer (30 minutes +) ferries there will be a cafeteria selling sandwiches, hotdogs, waffles, and coffee.</span></p><span data-dcnode-id="6153" instrument_node="">
</span><h3 data-dcnode-id="6151"><span data-dcnode-id="6152" instrument_node="">Plan for winding roads</span></h3><span data-dcnode-id="6150" instrument_node="">
</span><p data-dcnode-id="6145"><span data-dcnode-id="6149" instrument_node="">If you’ll be driving with anyone prone to getting carsick, you might want to come prepared as Norwegian roads are very curvy. In fact I pretty much always get a bit carsick when riding in a car or bus as a passenger. Though one thing that has really helped me has been sea-bands. It doesn’t seem like they should work, but I promise they do! You can buy them in most pharmacies in Norway, or you can be on the safe side and order them in advance </span><a data-dcnode-id="6147" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/3bd2TXe"><span data-dcnode-id="6148" instrument_node="">on Amazon here</span></a><span data-dcnode-id="6146" instrument_node="">.</span></p><span data-dcnode-id="6144" instrument_node="">
</span><h3 data-dcnode-id="6142"><span data-dcnode-id="6143" instrument_node="">Driving in the dark during polar night in winter</span></h3><span data-dcnode-id="6141" instrument_node="">
</span><p data-dcnode-id="6139"><span data-dcnode-id="6140" instrument_node="">Another big concern people have about driving in Norway is driving during polar night.</span></p><span data-dcnode-id="6138" instrument_node="">
</span><p data-dcnode-id="6136"><span data-dcnode-id="6137" instrument_node="">In the winter northern Norway experiences polar night, which means that it will be dark for most of the day. However even when the sun doesn’t rise, mainland Norway still gets a few hours of daylight each day, so you will still be able to see the beautiful landscape here. In fact I find the colors during polar night incredibly beautiful and well worth the trip.</span></p><span data-dcnode-id="6135" instrument_node="">
</span><p data-dcnode-id="6133"><span data-dcnode-id="6134" instrument_node="">Roads here are dark with very few streetlights, but the edges are always marked by reflective sticks, so you can easily see where the road is. We actually have to have our headlights on at all times in Norway – even on sunny days – but then of course you can use your high beams when it’s really dark (just remember to turn them off if you pass another car!).</span></p><span data-dcnode-id="6132" instrument_node="">
</span><h3 data-dcnode-id="6130"><span data-dcnode-id="6131" instrument_node="">Driving in snow in Norway</span></h3><span data-dcnode-id="6129" instrument_node="">
</span><p data-dcnode-id="6127"><span data-dcnode-id="6128" instrument_node="">Okay this is a big one. Should you plan a winter road trip in Norway if you’ve never driven in snow before?</span></p><span data-dcnode-id="6126" instrument_node="">
</span><p data-dcnode-id="6124"><span data-dcnode-id="6125" instrument_node="">This is of course something you need to decide for yourself, but I can give you a bit of an overview of what driving in snow in Norway is like.</span></p><span data-dcnode-id="6123" instrument_node="">
</span><p data-dcnode-id="6121"><span data-dcnode-id="6122" instrument_node="">As I mentioned before, you’ll definitely want to rent a car from Norway (or the Nordics) as we all have winter tires here, which is very important! In fact in northern Norway most cars will have studded tires, which is the best for driving on icy roads (you can ask your rental company for a car with studded tires).</span></p><span data-dcnode-id="6120" instrument_node="">
</span><p data-dcnode-id="6118"><span data-dcnode-id="6119" instrument_node="">Speaking of icy roads, yes, expect a lot of snow and ice! We don’t really salt the roads here, so in the winter there is almost always a thick layer of snow and ice on the roads. Trucks will of course still plow and grit the roads, but if you’re driving in a snow storm there’s a good chance you could be driving on thick snow.</span></p><span data-dcnode-id="6117" instrument_node="">
</span><p data-dcnode-id="6115"><span data-dcnode-id="6116" instrument_node="">This isn’t actually as scary as it sounds though. I know a lot of people who have driven in snow for the first time during their Norway road trip. Most important is not to drive too quickly and use the brakes as minimally as possible, as braking is when you risk skidding. Either pump the brakes or slow down by gearing down instead. You should be fine as long as you take it really slowly (don’t worry about the cars behind you – it’s better to be slow than to get in an accident).</span></p><span data-dcnode-id="6114" instrument_node="">
</span><p data-dcnode-id="6112"><span data-dcnode-id="6113" instrument_node="">The same applies for starting a car in the snow. You’ll want to be very gentle when pressing the gas so that the wheels don’t dig into the snow. Ease out of your parking spot as slowly as possible and then you should be ok. And if you do get stuck in the snow somewhere, just wait for someone to drive by to help you. Most Norwegians with larger cars will have equipment to pull other cars out of the snow here, as it happens so often. So be patient as help will arrive!</span></p><span data-dcnode-id="6111" instrument_node="">
</span><p data-dcnode-id="6107"><picture data-dcnode-id="6108"><source data-dcnode-id="6110" sizes="(max-width: 1440px) 100vw, 1440px" srcset="https://www.heartmybackpack.com/wp-content/uploads/2016/02/IMG_4018.jpg.webp 1440w, https://www.heartmybackpack.com/wp-content/uploads/2016/02/IMG_4018-150x104.jpg.webp 150w, https://www.heartmybackpack.com/wp-content/uploads/2016/02/IMG_4018-300x208.jpg.webp 300w" type="image/webp"><img alt="used car Norway" class="size-full wp-image-6470 aligncenter webpexpress-processed" data-dcnode-id="6109" data-jpibfi-post-excerpt="" data-jpibfi-post-title="How to Plan an Epic Road Trip in Norway" data-jpibfi-post-url="https://www.heartmybackpack.com/norway/plan-road-trip-norway/" data-jpibfi-src="http://www.heartmybackpack.com/wp-content/uploads/2016/02/IMG_4018.jpg" height="999" loading="lazy" sizes="(max-width: 1440px) 100vw, 1440px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.heartmybackpack.com/wp-content/uploads/2016/02/IMG_4018.jpg&amp;raw" srcset="https://www.heartmybackpack.com/wp-content/uploads/2016/02/IMG_4018.jpg 1440w, https://www.heartmybackpack.com/wp-content/uploads/2016/02/IMG_4018-150x104.jpg 150w, https://www.heartmybackpack.com/wp-content/uploads/2016/02/IMG_4018-300x208.jpg 300w" width="1440"></picture></p><span data-dcnode-id="6106" instrument_node="">
</span><h3 data-dcnode-id="6104"><span data-dcnode-id="6105" instrument_node="">Parking in Norway</span></h3><span data-dcnode-id="6103" instrument_node="">
</span><p data-dcnode-id="6098"><span data-dcnode-id="6102" instrument_node="">A lot of towns have free parking, but if you do have to pay there will be a meter, or you can pay on the </span><a data-dcnode-id="6100" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//easypark.no/howItWorks/en/"><span data-dcnode-id="6101" instrument_node="">EasyPark app</span></a><span data-dcnode-id="6099" instrument_node="">. This app works in all towns in Norway, from the far north to far south.</span></p><span data-dcnode-id="6097" instrument_node="">
</span><p data-dcnode-id="6095"><span data-dcnode-id="6096" instrument_node="">I’d definitely recommend downloading the app and setting it up (adding your payment method and car license number) beforehand, as it’s always much easier to simply use the app to pay for parking. Plus with the app you can adjust your parking time as necessary, instead of running back to the meter or overpaying in advance.</span></p><span data-dcnode-id="6094" instrument_node="">
</span><h2 data-dcnode-id="6092"><span data-dcnode-id="6093" instrument_node="">Choose your starting point wisely</span></h2><span data-dcnode-id="6091" instrument_node="">
</span><p data-dcnode-id="6089"><span data-dcnode-id="6090" instrument_node="">Norway is enormous,&nbsp;and with all those mountains and fjords even what look like short distances on a map can take a really long time to cover. Luckily Norway is full&nbsp;of airports, many of which have international flights, so I’d highly recommend deciding what you want to see in Norway before choosing your flights. And if you can’t find a direct flight into the region you’d like to explore then check out the domestic flight options.</span></p><span data-dcnode-id="6088" instrument_node="">
</span><p data-dcnode-id="6086"><span data-dcnode-id="6087" instrument_node="">The main international airports in Norway are in Oslo, Bergen, Stavanger, Tromsø, Trondheim, Ålesund, and Haugesund.</span></p><span data-dcnode-id="6085" instrument_node="">
</span><p data-dcnode-id="6083"><span data-dcnode-id="6084" instrument_node="">As a (very) general guide:</span></p><span data-dcnode-id="6082" instrument_node="">
</span><div class="content-box-red" data-dcnode-id="6062"><span data-dcnode-id="6081" instrument_node="">
</span><ul data-dcnode-id="6064"><span data-dcnode-id="6080" instrument_node="">
</span><li data-dcnode-id="6078"><span data-dcnode-id="6079" instrument_node="">If you’re interested in Norway’s cities and mountains fly into Oslo.</span></li><span data-dcnode-id="6077" instrument_node="">
</span><li data-dcnode-id="6075"><span data-dcnode-id="6076" instrument_node="">If you’re interested in the fjords but still want to see a city fly into Bergen.</span></li><span data-dcnode-id="6074" instrument_node="">
</span><li data-dcnode-id="6072"><span data-dcnode-id="6073" instrument_node="">If you want to do Preikestolen, Kjeragbolten, and Trolltunga – probably the three most famous hikes in Norway – fly into Stavanger. (Though if you only want to do Trolltunga then Bergen is closer.)</span></li><span data-dcnode-id="6071" instrument_node="">
</span><li data-dcnode-id="6069"><span data-dcnode-id="6070" instrument_node="">If you’re interested in fjords and mountains, including Geirangerfjord, Trollstigen, and&nbsp;the Atlantic Road, fly into Ålesund.</span></li><span data-dcnode-id="6068" instrument_node="">
</span><li data-dcnode-id="6066"><span data-dcnode-id="6067" instrument_node="">If you want to see the Northern Lights, the Arctic, and Lofoten fly into Tromsø or Bodø.</span></li><span data-dcnode-id="6065" instrument_node="">
</span></ul><span data-dcnode-id="6063" instrument_node="">
</span></div><span data-dcnode-id="6061" instrument_node="">
</span><p data-dcnode-id="6059"><span data-dcnode-id="6060" instrument_node="">If you’re still unsure of where to go, click on the different regions of the map below for a summary of the region’s main attractions and links to my blog posts about each area.</span></p><span data-dcnode-id="6058" instrument_node="">
</span><div class="iwm_map_canvas" data-dcnode-id="5481"><div class="i_world_map" data-dcnode-id="5482" id="map_canvas_3"><div data-dcnode-id="5483" style="position: relative;"><div data-dcnode-id="5487" dir="ltr" style="position: relative; width: 518px; height: 320px;"><div data-dcnode-id="5488" style="position: absolute; left: 0px; top: 0px; width: 100%; height: 100%;"><svg aria-label="A chart." data-dcnode-id="5489" height="320" style="overflow: hidden;" width="518"><defs data-dcnode-id="6055" id="_ABSTRACT_RENDERER_ID_0"><clipPath data-dcnode-id="6056" id="_ABSTRACT_RENDERER_ID_1"><rect data-dcnode-id="6057" height="320" width="518" x="0" y="0"></rect></clipPath></defs><g data-dcnode-id="5490"><rect data-dcnode-id="6054" fill="#ffffff" height="320" stroke="none" stroke-width="0" width="518" x="0" y="0"></rect><g clip-path="url(https://www.heartmybackpack.com/norway/plan-road-trip-norway/#_ABSTRACT_RENDERER_ID_1)" data-dcnode-id="5494"><g data-dcnode-id="5498"><g data-dcnode-id="5499"><path d="M282.20296286957074,268.6305169075018L283.00066822164786,267.77719096227173L282.14045262560677,268.55755938621036Z" data-dcnode-id="6053" fill="#f5f5f5" stroke="#dddddd" stroke-width="1"></path><path d="M287.297081258274,263.2344308707287L287.1282103006998,262.4808443216942L287.2084473302654,263.1614733494372Z" data-dcnode-id="6052" fill="#f5f5f5" stroke="#dddddd" stroke-width="1"></path><path d="M285.57851604362355,263.1910257631247L285.94331463153253,262.19640233995085L285.5188047658072,263.18640819848594Z" data-dcnode-id="6051" fill="#f5f5f5" stroke="#dddddd" stroke-width="1"></path><path d="M282.0938031898128,263.324011624719L282.3736998045767,264.00464065246194L282.1087310092668,263.2787594912599Z" data-dcnode-id="6050" fill="#f5f5f5" stroke="#dddddd" stroke-width="1"></path><path d="M281.06098468133393,265.7657798056582L281.58439135094244,264.81271446423284L280.9826136292,265.6180177372201Z" data-dcnode-id="6049" fill="#f5f5f5" stroke="#dddddd" stroke-width="1"></path L303.88841959276306,33.704527810725295L304.1720481623905,32.42453889288008L304.28400680829606,33.50320199247829L306.0081699552417,32.904765615304434L305.52114984555254,31.794703076163096L306.6379373384606,32.1373263723536L306.4466746517052,31.01341113929667L307.18933366954553,31.925841911901784L308.0635440963248,28.419263325280717L309.1523419277564,28.826532526412656L309.5721868499023,26.981353696793207L309.94444934753835,27.611189513509906L310.8811700182815,26.505744539007594L310.23647481560863,25.95348380822017L311.39058185715186,25.63671887400588L309.5395322448465,23.5578912736678L309.37905818571517,26.357982470569468L308.3275799029188,24.8092512907526L308.3816932484398,26.020900251945314L307.27796759755404,25.005036031433505L306.7937464540125,25.904537623049748L308.32478093677105,27.31197132492298L307.0269936329824,27.60657194887134L306.3216541637774,29.31599437811432L305.47076845489505,28.591960242767698L306.00910294395766,27.61211302643769L303.95559478030634,26.72184656409822L305.03039778099986,29.582889614230652L303.9695896110445,30.77329777808483L303.63091470718024,29.41942782602137L302.5654415936456,30.16193221992218L303.49003341108244,28.718481513867538L302.2930088886087,27.767263198297165L301.7108239298998,29.13221530549439L300.70972703776084,27.8402207195888L300.99522158482,30.27829484881721L299.22347601336446,28.92996597431935L299.42313559856274,30.016940690267084L296.8033032843724,29.744504376584793Z" data-dcnode-id="5500" fill="#e0ffd6" stroke="#cae6c1" stroke-width="1"></path></g></g><g data-dcnode-id="5496"><g data-dcnode-id="5497"></g></g><g data-dcnode-id="5495"></g></g><g data-dcnode-id="5493"></g><g data-dcnode-id="5492"></g><g data-dcnode-id="5491"></g></g></svg></div></div><div aria-hidden="true" data-dcnode-id="5485" style="display: none; position: absolute; top: 330px; left: 528px; white-space: nowrap; font-family: Arial; font-size: 8px;"><span data-dcnode-id="5486" instrument_node="">-._.-*^*-._.-*^*-._.-</span></div><div data-dcnode-id="5484"></div></div></div></div><span data-dcnode-id="5480" instrument_node="">
</span><h2 data-dcnode-id="5478"><span data-dcnode-id="5479" instrument_node="">Use the National Scenic Routes in Norway as a guide</span></h2><span data-dcnode-id="5477" instrument_node="">
</span><p data-dcnode-id="5472"><span data-dcnode-id="5476" instrument_node="">Norway has a lot of absurdly scenic roads, but it also has its fair share of boring highways.&nbsp;And you definitely don’t want to&nbsp;spend the bulk&nbsp;of your epic Norwegian road trip driving through tunnels, which Norway has a&nbsp;</span><em data-dcnode-id="5474"><span data-dcnode-id="5475" instrument_node="">lot</span></em><span data-dcnode-id="5473" instrument_node=""> of.</span></p><span data-dcnode-id="5471" instrument_node="">
</span><p data-dcnode-id="5466"><span data-dcnode-id="5470" instrument_node="">An easy way to find Norway’s most scenic roads is by using&nbsp;the </span><a data-dcnode-id="5468" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nasjonaleturistveger.no/en/routes"><span data-dcnode-id="5469" instrument_node="">National Tourist Routes map</span></a><span data-dcnode-id="5467" instrument_node="">. Just to warn you, their website is super glitchy and I still haven’t managed to get the map to load on my phone, but it’s 100% worth pulling out your laptop to check out this site, because every single road listed on it is guaranteed to be amazing.</span></p><span data-dcnode-id="5465" instrument_node="">
</span><p data-dcnode-id="5463"><span data-dcnode-id="5464" instrument_node="">I always check the map before setting out on a road trip and I try to take detours through as many of the tourist routes as I can. I’ve now driven 15 of the 18 routes and have never been disappointed. In fact driving in Norway is kind of my favorite thing ever, thanks to all the amazing views!</span></p><span data-dcnode-id="5462" instrument_node="">
</span><p data-dcnode-id="5458"><strong data-dcnode-id="5460"><span data-dcnode-id="5461" instrument_node="">VARANGER</span></strong><span data-dcnode-id="5459" instrument_node="">: The far north of Norway truly does feel like the edge of the world. This is actually one of my favorite areas to drive in, especially in the summer when it’s one of the few places in Norway that isn’t crowded with tourists. Plus in the summer you’ll find lots of reindeer roaming the roads! Just be careful not to hit any.</span></p><span data-dcnode-id="5457" instrument_node="">
</span><p data-dcnode-id="5450"><strong data-dcnode-id="5455"><span data-dcnode-id="5456" instrument_node="">HAVØYSUND</span></strong><span data-dcnode-id="5454" instrument_node="">: This is another stunning northern route, and can be combined with the Varanger scenic route above. You can find my full </span><a data-dcnode-id="5452" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.heartmybackpack.com/norway/one-week-norway-finland-sweden-itinerary/"><span data-dcnode-id="5453" instrument_node="">road trip itinerary including both Varanger and Havøysund here</span></a><span data-dcnode-id="5451" instrument_node="">.</span></p><span data-dcnode-id="5449" instrument_node="">
</span><p data-dcnode-id="5442"><strong data-dcnode-id="5447"><span data-dcnode-id="5448" instrument_node="">SENJA</span></strong><span data-dcnode-id="5446" instrument_node="">: Senja has been growing in popularity but is still way less crowded than places like Lofoten and the fjords in southern Norway. The mountain peaks here are stunning, and personally it’s one of my top picks for northern lights viewing in the winter. You can read about my </span><a data-dcnode-id="5444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.heartmybackpack.com/norway/senja-norway-in-winter/"><span data-dcnode-id="5445" instrument_node="">winter trip to Senja (including the best accommodation) here</span></a><span data-dcnode-id="5443" instrument_node="">.</span></p><span data-dcnode-id="5441" instrument_node="">
</span><p data-dcnode-id="5434"><strong data-dcnode-id="5439"><span data-dcnode-id="5440" instrument_node="">ANDØYA</span></strong><span data-dcnode-id="5438" instrument_node="">: The Vesterålen islands are a great quieter alternative or addition to a trip to Lofoten. Again I can particularly recommend this route in the winter, where you can see whales, the northern lights, and the most beautiful pink skies during the polar night. You can find my </span><a data-dcnode-id="5436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.heartmybackpack.com/norway/vesteralen-whales-reindeer/"><span data-dcnode-id="5437" instrument_node="">guide to the Andøya route in Vesterålen here</span></a><span data-dcnode-id="5435" instrument_node="">.</span></p><span data-dcnode-id="5433" instrument_node="">
</span><p data-dcnode-id="5426"><strong data-dcnode-id="5431"><span data-dcnode-id="5432" instrument_node="">LOFOTEN</span></strong><span data-dcnode-id="5430" instrument_node="">: This is widely considered amongst Norwegians to be the most beautiful drive in Norway. Here you’ll find jagged mountains rising out of the water with lots of cute red fishing cabins, as Lofoten is a center for cod fishing in Norway. Lofoten is incredibly touristy these days, but still worth the crowds for those beautiful mountain views and picturesque red cabins. I have a bunch of Lofoten guides on my site, but you can start with </span><a data-dcnode-id="5428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.heartmybackpack.com/norway/lofoten-trip/"><span data-dcnode-id="5429" instrument_node="">this guide to planning a Lofoten trip</span></a><span data-dcnode-id="5427" instrument_node="">.</span></p><span data-dcnode-id="5425" instrument_node="">
</span><p data-dcnode-id="5415"><strong data-dcnode-id="5423"><span data-dcnode-id="5424" instrument_node="">HELGELANDSKYSTEN</span></strong><span data-dcnode-id="5422" instrument_node="">: The Helgeland coast is my favorite are in all of Norway! In fact I love Helgeland so much that I </span><a data-dcnode-id="5420" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.heartmybackpack.com/norway/moving-to-northern-norway/"><span data-dcnode-id="5421" instrument_node="">ended up moving here</span></a><span data-dcnode-id="5419" instrument_node="">. The Helgeland coast is spotted with countless islands, with similar jagged mountains to Lofoten but far fewer tourists. If you want to get off the beaten path a bit, I definitely recommend Lofoten. You can read my </span><a data-dcnode-id="5417" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.heartmybackpack.com/norway/helgeland-coast-road-trip/"><span data-dcnode-id="5418" instrument_node="">Helgelandskysten guide here</span></a><span data-dcnode-id="5416" instrument_node="">. It’s best in the summer, but Helgeland is also beautiful in the winter.</span></p><span data-dcnode-id="5414" instrument_node="">
</span><p data-dcnode-id="5407"><strong data-dcnode-id="5412"><span data-dcnode-id="5413" instrument_node="">ATLANTIC OCEAN ROAD</span></strong><span data-dcnode-id="5411" instrument_node="">: The Atlantic Road is probably one of Norway’s most famous roads. This road includes lots of bridges connecting islands, and it was incredibly expensive to build, so Norway put a lot of marketing behind it to draw in visitors. I’d say it’s certainly one of Norway’s most impressive roads, but I wouldn’t put it at the very top of the list – maybe around #10. It’s similar to the Helgeland coast and Lofoten, but the landscape isn’t anywhere near as dramatic. You can read my experience </span><a data-dcnode-id="5409" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.heartmybackpack.com/norway/atlantic-ocean-road-norway/"><span data-dcnode-id="5410" instrument_node="">driving the Atlantic Ocean Road here</span></a><span data-dcnode-id="5408" instrument_node="">.</span></p><span data-dcnode-id="5406" instrument_node="">
</span><p data-dcnode-id="5396"><strong data-dcnode-id="5404"><span data-dcnode-id="5405" instrument_node="">GEIRANGER – TROLLSTIGEN</span></strong><span data-dcnode-id="5403" instrument_node="">: I always say if you only have time to visit one place in Norway, one of my recommendations would be the Geiranger – Trollstigen area (you can find </span><a data-dcnode-id="5401" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.heartmybackpack.com/norway/where-to-go-in-norway/"><span data-dcnode-id="5402" instrument_node="">my other recommendation here</span></a><span data-dcnode-id="5400" instrument_node="">). Trollstigen is famous for its many hairpin turns, but actually I find the mountain views at the top the most impressive. And Geirangerfjord is widely considered one of Norway’s most beautiful fjords. You can read my </span><a data-dcnode-id="5398" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.heartmybackpack.com/norway/trollstigen-geiranger-road-trip/"><span data-dcnode-id="5399" instrument_node="">guide to the Geiranger – Trollstigen scenic route here</span></a><span data-dcnode-id="5397" instrument_node="">.</span></p><span data-dcnode-id="5395" instrument_node="">
</span><p data-dcnode-id="5388"><strong data-dcnode-id="5393"><span data-dcnode-id="5394" instrument_node="">GAMLE STRYNEFJELLSVEGEN</span></strong><span data-dcnode-id="5392" instrument_node="">: This is probably my favorite drive in southern Norway. It’s only open in the summer as the road winds high up into the mountains, but definitely try to make it here if you get the chance. You can read about my experience </span><a data-dcnode-id="5390" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.heartmybackpack.com/norway/gamle-strynefjellsvegen-road-trip/"><span data-dcnode-id="5391" instrument_node="">driving Gamle Strynefjellsvegen here</span></a><span data-dcnode-id="5389" instrument_node="">.</span></p><span data-dcnode-id="5387" instrument_node="">
</span><p data-dcnode-id="5377"><strong data-dcnode-id="5385"><span data-dcnode-id="5386" instrument_node="">RONDANE</span></strong><span data-dcnode-id="5384" instrument_node="">: This is apparently the most dry area of Norway, and the landscape here really is unique for the country. I’ve written about my </span><a data-dcnode-id="5382" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.heartmybackpack.com/norway/autumn-colors-fall-folldal/"><span data-dcnode-id="5383" instrument_node="">trip to Rondane National Park here</span></a><span data-dcnode-id="5381" instrument_node=""> as well as </span><a data-dcnode-id="5379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.heartmybackpack.com/blog/best-thing-hiking-folldal/"><span data-dcnode-id="5380" instrument_node="">here</span></a><span data-dcnode-id="5378" instrument_node="">.</span></p><span data-dcnode-id="5376" instrument_node="">
</span><p data-dcnode-id="5372"><strong data-dcnode-id="5374"><span data-dcnode-id="5375" instrument_node="">SOGNEFJELLET</span></strong><span data-dcnode-id="5373" instrument_node="">: This route isn’t too far from Bergen, and takes you from beautiful fjord views up into a barren mountain landscape.</span></p><span data-dcnode-id="5371" instrument_node="">
</span><p data-dcnode-id="5364"><strong data-dcnode-id="5369"><span data-dcnode-id="5370" instrument_node="">AURLANDSFJELLET</span></strong><span data-dcnode-id="5368" instrument_node="">: The Sognefjellet scenic route leads into Aurlandsfjellet as you head south, which will take you down into the beautiful fjord area outside of Bergen. You can read about my experience </span><a data-dcnode-id="5366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.heartmybackpack.com/norway/aurlandsfjellet-sognefjellet-bergen-road-trip/"><span data-dcnode-id="5367" instrument_node="">driving on both Sognefjellet and Aurlandsfjellet as well as wild camping here</span></a><span data-dcnode-id="5365" instrument_node="">.</span></p><span data-dcnode-id="5363" instrument_node="">
</span><p data-dcnode-id="5356"><strong data-dcnode-id="5361"><span data-dcnode-id="5362" instrument_node="">VALDRESFLYE</span></strong><span data-dcnode-id="5360" instrument_node="">: Farther inland than the Sognefjellet and Aurlandsfjellet routes, the Valdresflye scenic route is a great option if you are heading north (or south) and don’t have the time to take lots of ferries along the coast. I used to drive this route when driving from southern Norway up to Trondheim and back, and it never disappointed. You can read more about my experience </span><a data-dcnode-id="5358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.heartmybackpack.com/blog/best-drive-trondheim/"><span data-dcnode-id="5359" instrument_node="">driving the Valdresflye scenic route here</span></a><span data-dcnode-id="5357" instrument_node="">.</span></p><span data-dcnode-id="5355" instrument_node="">
</span><p data-dcnode-id="5348"><strong data-dcnode-id="5353"><span data-dcnode-id="5354" instrument_node="">GAULARFJELLET</span></strong><span data-dcnode-id="5352" instrument_node="">: If you want to spend more time along the fjords, take this route along the fjord and up into Gaular Mountain. This is also a great place to spend the night (or several nights!). You can find my guide to the </span><a data-dcnode-id="5350" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.heartmybackpack.com/norway/best-sognefjord-accommodation/"><span data-dcnode-id="5351" instrument_node="">best accommodation along Sognefjord here</span></a><span data-dcnode-id="5349" instrument_node="">.</span></p><span data-dcnode-id="5347" instrument_node="">
</span><p data-dcnode-id="5340"><strong data-dcnode-id="5345"><span data-dcnode-id="5346" instrument_node="">HARDANGER</span></strong><span data-dcnode-id="5344" instrument_node="">: This coastal drive is especially beautiful in the spring, when the fruit trees along Hardangerfjord are in bloom, but you can take this route any time of year. You can read about my experience </span><a data-dcnode-id="5342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.heartmybackpack.com/blog/hardanger-fruit-blossoms-spring/"><span data-dcnode-id="5343" instrument_node="">driving the Hardanger scenic route here</span></a><span data-dcnode-id="5341" instrument_node="">.</span></p><span data-dcnode-id="5339" instrument_node="">
</span><p data-dcnode-id="5329"><strong data-dcnode-id="5337"><span data-dcnode-id="5338" instrument_node="">HARDANGERVIDDA</span></strong><span data-dcnode-id="5336" instrument_node="">: I used to live at the foot of Hardangervidda National Park, but while I’m a&nbsp;</span><em data-dcnode-id="5334"><span data-dcnode-id="5335" instrument_node="">huge</span></em><span data-dcnode-id="5333" instrument_node=""> fan of the park, this is one of my least favorite of the 18 Norwegian scenic routes. Yes, you’ll get to go up on Hardangervidda, the largest plateau of its kind in Europe, however the road itself is just a busy highway. If you do choose to take this route I would try to stop along the way to hike into the park a bit. Or you could take the </span><a data-dcnode-id="5331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.heartmybackpack.com/norway/mogen-mosvatn-hardangervidda/"><span data-dcnode-id="5332" instrument_node="">ferry into Hardangervidda</span></a><span data-dcnode-id="5330" instrument_node=""> instead.</span></p><span data-dcnode-id="5328" instrument_node="">
</span><p data-dcnode-id="5318"><strong data-dcnode-id="5326"><span data-dcnode-id="5327" instrument_node="">RYFYLKE</span></strong><span data-dcnode-id="5325" instrument_node="">: This is one of the most famous drives in all of Norway, and for good reason. You’ll be passing by two of Norway’s most popular hikes,&nbsp;</span><a data-dcnode-id="5323" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.heartmybackpack.com/preikestolen-hike" rel="nofollow noopener" target="_blank"><span data-dcnode-id="5324" instrument_node="">Pulpit Rock (Preikestolen)</span></a><span data-dcnode-id="5322" instrument_node="">&nbsp;and Kjeragbolten, and then ending up near Norway’s third most famous hike, Trolltunga. You can find my itinerary including this drive in my </span><a data-dcnode-id="5320" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.heartmybackpack.com/norway/one-week-in-norway-itineraries/"><span data-dcnode-id="5321" instrument_node="">Norway itinerary guide</span></a><span data-dcnode-id="5319" instrument_node="">.</span></p><span data-dcnode-id="5317" instrument_node="">
</span><p data-dcnode-id="5313"><strong data-dcnode-id="5315"><span data-dcnode-id="5316" instrument_node="">JÆREN</span></strong><span data-dcnode-id="5314" instrument_node="">: Last and, unfortunately least. This drive is surprisingly boring and I can’t quite understand why it’s one of Norway’s scenic routes. This is just a busy road along the coast, and not a particularly scenic piece of coastline at that. I would skip this, unless you’ll already be heading this way, for example if you’re driving from Kristiansand to Stavanger.</span></p><span data-dcnode-id="5312" instrument_node="">
</span><p data-dcnode-id="5308"><picture data-dcnode-id="5309"><source data-dcnode-id="5311" sizes="(max-width: 1000px) 100vw, 1000px" srcset="https://www.heartmybackpack.com/wp-content/uploads/2017/04/IMG_3836.jpg.webp 1000w, https://www.heartmybackpack.com/wp-content/uploads/2017/04/IMG_3836-150x100.jpg.webp 150w, https://www.heartmybackpack.com/wp-content/uploads/2017/04/IMG_3836-300x200.jpg.webp 300w" type="image/webp"><img alt="lofoten islands norway in june summer" class="aligncenter size-full wp-image-12731 webpexpress-processed" data-dcnode-id="5310" data-jpibfi-post-excerpt="" data-jpibfi-post-title="How to Plan an Epic Road Trip in Norway" data-jpibfi-post-url="https://www.heartmybackpack.com/norway/plan-road-trip-norway/" data-jpibfi-src="https://www.heartmybackpack.com/wp-content/uploads/2017/04/IMG_3836.jpg" height="667" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.heartmybackpack.com/wp-content/uploads/2017/04/IMG_3836.jpg&amp;raw" srcset="https://www.heartmybackpack.com/wp-content/uploads/2017/04/IMG_3836.jpg 1000w, https://www.heartmybackpack.com/wp-content/uploads/2017/04/IMG_3836-150x100.jpg 150w, https://www.heartmybackpack.com/wp-content/uploads/2017/04/IMG_3836-300x200.jpg 300w" width="1000"></picture></p><span data-dcnode-id="5307" instrument_node="">
</span><h2 data-dcnode-id="5305"><span data-dcnode-id="5306" instrument_node="">Connect with people on Couchsurfing and Facebook</span></h2><span data-dcnode-id="5304" instrument_node="">
</span><p data-dcnode-id="5302"><span data-dcnode-id="5303" instrument_node="">Of course not every scenic road in Norway has made it onto the list of National Tourist Routes, so to find more beautiful drives you’re best off asking locals! Norwegians love to gush about the beautiful nature here, and I feel like at least once a week someone is telling me about a drive that I just have to do here.</span></p><span data-dcnode-id="5301" instrument_node="">
</span><p data-dcnode-id="5296"><span data-dcnode-id="5300" instrument_node="">I personally love to use </span><a data-dcnode-id="5298" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.couchsurfing.com/%3Futm_source%3Daff%26utm_campaign%3Dheartmybackpack"><span data-dcnode-id="5299" instrument_node="">Couchsurfing</span></a><span data-dcnode-id="5297" instrument_node=""> to connect with locals from an area (even if I’m not planning to use it for accommodation) but of course you can also find people on Facebook or other social media channels.</span></p><span data-dcnode-id="5295" instrument_node="">
</span><p data-dcnode-id="5291"><picture data-dcnode-id="5292"><source data-dcnode-id="5294" sizes="(max-width: 1000px) 100vw, 1000px" srcset="https://www.heartmybackpack.com/wp-content/uploads/2016/08/IMG_0562.jpg.webp 1000w, https://www.heartmybackpack.com/wp-content/uploads/2016/08/IMG_0562-150x100.jpg.webp 150w, https://www.heartmybackpack.com/wp-content/uploads/2016/08/IMG_0562-300x200.jpg.webp 300w" type="image/webp"><img alt="roligheten ana-sira norway in fall autumn" class="aligncenter size-full wp-image-10474 webpexpress-processed" data-dcnode-id="5293" data-jpibfi-post-excerpt="" data-jpibfi-post-title="How to Plan an Epic Road Trip in Norway" data-jpibfi-post-url="https://www.heartmybackpack.com/norway/plan-road-trip-norway/" data-jpibfi-src="https://www.heartmybackpack.com/wp-content/uploads/2016/08/IMG_0562.jpg" height="667" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.heartmybackpack.com/wp-content/uploads/2016/08/IMG_0562.jpg&amp;raw" srcset="https://www.heartmybackpack.com/wp-content/uploads/2016/08/IMG_0562.jpg 1000w, https://www.heartmybackpack.com/wp-content/uploads/2016/08/IMG_0562-150x100.jpg 150w, https://www.heartmybackpack.com/wp-content/uploads/2016/08/IMG_0562-300x200.jpg 300w" width="1000"></picture></p><span data-dcnode-id="5290" instrument_node="">
</span><p data-dcnode-id="5287" style="text-align: center;"><em data-dcnode-id="5288"><span data-dcnode-id="5289" instrument_node="">I never would have visited Åna-Sira if a local hadn’t told me about it!</span></em></p><span data-dcnode-id="5286" instrument_node="">
</span><h2 data-dcnode-id="5284"><span data-dcnode-id="5285" instrument_node="">Keep an eye out for the northern lights</span></h2><span data-dcnode-id="5283" instrument_node="">
</span><p data-dcnode-id="5281"><span data-dcnode-id="5282" instrument_node="">If you’ll be traveling to Northern Norway in the winter, one of the best things about traveling by car is getting to chase the northern lights!</span></p><span data-dcnode-id="5280" instrument_node="">
</span><p data-dcnode-id="5278"><span data-dcnode-id="5279" instrument_node="">You’ll want to keep track of both the weather and aurora forecasts and try to get to clear skies, especially with views north. It’s definitely worth marking out the spots on your route with good views north (you can often tell simply by looking at a map), and then stopping in those areas to check the skies.</span></p><span data-dcnode-id="5277" instrument_node="">
</span><div class="content-box-red" data-dcnode-id="5260"><span data-dcnode-id="5276" instrument_node="">
</span><p data-dcnode-id="5273"><strong data-dcnode-id="5274"><span data-dcnode-id="5275" instrument_node="">Northern Lights Guide!</span></strong></p><span data-dcnode-id="5272" instrument_node="">
</span><p data-dcnode-id="5270"><span data-dcnode-id="5271" instrument_node="">I’ve also written an in depth ebook covering all aspects of planning your northern lights trip, including the best places in the Nordics to see the northern lights, the best time to see the Northern Lights, my top accommodation choices, tour options, how to chase the northern lights (including which apps I use), how to photograph and film the northern lights, what to pack for your trip, and other exciting Arctic activities to try on your trip up North.</span></p><span data-dcnode-id="5269" instrument_node="">
</span><p data-dcnode-id="5262"><span data-dcnode-id="5268" instrument_node="">If you want to ensure you have the best northern lights trip possible, you can </span><a data-dcnode-id="5266" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.heartmybackpack.com/northern-lights-ebook" rel="nofollow"><span data-dcnode-id="5267" instrument_node="">purchase the ebook here</span></a><span data-dcnode-id="5265" instrument_node="">.&nbsp;</span><strong data-dcnode-id="5263"><span data-dcnode-id="5264" instrument_node="">&nbsp;</span></strong></p><span data-dcnode-id="5261" instrument_node="">
</span></div><span data-dcnode-id="5259" instrument_node="">
</span><h2 data-dcnode-id="5255"><picture data-dcnode-id="5256"><source data-dcnode-id="5258" sizes="(max-width: 1000px) 100vw, 1000px" srcset="https://www.heartmybackpack.com/wp-content/uploads/2019/01/IMG_7935.jpg.webp 1000w, https://www.heartmybackpack.com/wp-content/uploads/2019/01/IMG_7935-150x100.jpg.webp 150w, https://www.heartmybackpack.com/wp-content/uploads/2019/01/IMG_7935-300x200.jpg.webp 300w" type="image/webp"><img alt="northern lights in senja, norway" class="aligncenter size-full wp-image-13569 webpexpress-processed" data-dcnode-id="5257" data-jpibfi-post-excerpt="" data-jpibfi-post-title="How to Plan an Epic Road Trip in Norway" data-jpibfi-post-url="https://www.heartmybackpack.com/norway/plan-road-trip-norway/" data-jpibfi-src="https://www.heartmybackpack.com/wp-content/uploads/2019/01/IMG_7935.jpg" height="667" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.heartmybackpack.com/wp-content/uploads/2019/01/IMG_7935.jpg&amp;raw" srcset="https://www.heartmybackpack.com/wp-content/uploads/2019/01/IMG_7935.jpg 1000w, https://www.heartmybackpack.com/wp-content/uploads/2019/01/IMG_7935-150x100.jpg 150w, https://www.heartmybackpack.com/wp-content/uploads/2019/01/IMG_7935-300x200.jpg 300w" width="1000"></picture></h2><span data-dcnode-id="5254" instrument_node="">
</span><h2 data-dcnode-id="5252"><span data-dcnode-id="5253" instrument_node="">Check if the roads are open when planning a trip to Norway</span></h2><span data-dcnode-id="5251" instrument_node="">
</span><p data-dcnode-id="5249"><span data-dcnode-id="5250" instrument_node="">A lot of the high mountain roads close during the winter, and it’s easy to forget that winter in Norway can mean September&nbsp;to June.</span></p><span data-dcnode-id="5248" instrument_node="">
</span><p data-dcnode-id="5243"><span data-dcnode-id="5247" instrument_node="">You can check the current status of roads at on </span><a data-dcnode-id="5245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vegvesen.no/trafikkbeta%3FlistView%3Dfalse"><span data-dcnode-id="5246" instrument_node="">this map</span></a><span data-dcnode-id="5244" instrument_node="">, though unfortunately it’s only in Norwegian. If a road is closed for the season Google will tell you – something which is important to keep in mind if you are mapping out your route in the winter, as Google will avoid any roads that are closed unless you change the dates to the summer.</span></p><span data-dcnode-id="5242" instrument_node="">
</span><p data-dcnode-id="5238"><picture data-dcnode-id="5239"><source data-dcnode-id="5241" sizes="(max-width: 1440px) 100vw, 1440px" srcset="https://www.heartmybackpack.com/wp-content/uploads/2016/02/IMG_4134-2-2.jpg.webp 1440w, https://www.heartmybackpack.com/wp-content/uploads/2016/02/IMG_4134-2-2-150x100.jpg.webp 150w, https://www.heartmybackpack.com/wp-content/uploads/2016/02/IMG_4134-2-2-300x200.jpg.webp 300w" type="image/webp"><img alt="heart my backpack" class="alignleft size-full wp-image-6475 webpexpress-processed" data-dcnode-id="5240" data-jpibfi-post-excerpt="" data-jpibfi-post-title="How to Plan an Epic Road Trip in Norway" data-jpibfi-post-url="https://www.heartmybackpack.com/norway/plan-road-trip-norway/" data-jpibfi-src="http://www.heartmybackpack.com/wp-content/uploads/2016/02/IMG_4134-2-2.jpg" height="960" loading="lazy" sizes="(max-width: 1440px) 100vw, 1440px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.heartmybackpack.com/wp-content/uploads/2016/02/IMG_4134-2-2.jpg&amp;raw" srcset="https://www.heartmybackpack.com/wp-content/uploads/2016/02/IMG_4134-2-2.jpg 1440w, https://www.heartmybackpack.com/wp-content/uploads/2016/02/IMG_4134-2-2-150x100.jpg 150w, https://www.heartmybackpack.com/wp-content/uploads/2016/02/IMG_4134-2-2-300x200.jpg 300w" width="1440"></picture></p><span data-dcnode-id="5237" instrument_node="">
</span><p data-dcnode-id="5235"><span data-dcnode-id="5236" instrument_node="">&nbsp;</span></p><span data-dcnode-id="5234" instrument_node="">
</span><h2 data-dcnode-id="5232"><span data-dcnode-id="5233" instrument_node="">&nbsp;</span></h2><span data-dcnode-id="5231" instrument_node="">
</span><h2 data-dcnode-id="5229"><span data-dcnode-id="5230" instrument_node="">&nbsp;</span></h2><span data-dcnode-id="5228" instrument_node="">
</span><h2 data-dcnode-id="5226"><span data-dcnode-id="5227" instrument_node="">Schedule at least one free day to make up for bad weather</span></h2><span data-dcnode-id="5225" instrument_node="">
</span><p data-dcnode-id="5223"><span data-dcnode-id="5224" instrument_node="">Even if you’re traveling on a tight schedule, it can still be worth leaving one day free. I’d especially recommend doing this if you’ll be visiting a particular place that you’ve always dreamed of seeing, because the weather here can be really unpredictable so you might end up needing an extra day to (hopefully!) let the skies clear.</span></p><span data-dcnode-id="5222" instrument_node="">
</span><p data-dcnode-id="5218"><picture data-dcnode-id="5219"><source data-dcnode-id="5221" sizes="(max-width: 1000px) 100vw, 1000px" srcset="https://www.heartmybackpack.com/wp-content/uploads/2016/09/IMG_0760.jpg.webp 1000w, https://www.heartmybackpack.com/wp-content/uploads/2016/09/IMG_0760-150x100.jpg.webp 150w, https://www.heartmybackpack.com/wp-content/uploads/2016/09/IMG_0760-300x200.jpg.webp 300w" type="image/webp"><img alt="Norwegian road trip Trollstigen mountains foggy day" class="aligncenter size-full wp-image-7909 webpexpress-processed" data-dcnode-id="5220" data-jpibfi-post-excerpt="" data-jpibfi-post-title="How to Plan an Epic Road Trip in Norway" data-jpibfi-post-url="https://www.heartmybackpack.com/norway/plan-road-trip-norway/" data-jpibfi-src="https://www.heartmybackpack.com/wp-content/uploads/2016/09/IMG_0760.jpg" height="667" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.heartmybackpack.com/wp-content/uploads/2016/09/IMG_0760.jpg&amp;raw" srcset="https://www.heartmybackpack.com/wp-content/uploads/2016/09/IMG_0760.jpg 1000w, https://www.heartmybackpack.com/wp-content/uploads/2016/09/IMG_0760-150x100.jpg 150w, https://www.heartmybackpack.com/wp-content/uploads/2016/09/IMG_0760-300x200.jpg 300w" width="1000"></picture></p><span data-dcnode-id="5217" instrument_node="">
</span><p data-dcnode-id="5214" style="text-align: center;"><em data-dcnode-id="5215"><span data-dcnode-id="5216" instrument_node="">I wish I could have stayed an extra day to see Trollstigen without the fog!</span></em></p><span data-dcnode-id="5213" instrument_node="">
</span><h2 data-dcnode-id="5211"><span data-dcnode-id="5212" instrument_node="">Pack rain gear and warm clothing</span></h2><span data-dcnode-id="5210" instrument_node="">
</span><p data-dcnode-id="5205"><span data-dcnode-id="5209" instrument_node="">Even if you’re visiting Norway in the summer, you’ll need some warm clothing – especially if you’ be driving up into the mountains. And if you have a good waterproof jacket and waterproof trousers (I love </span><a data-dcnode-id="5207" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//api.shopstyle.com/action/apiVisitRetailer%3Fid%3D444826126%26pid%3Duid6969-37899437-38"><span data-dcnode-id="5208" instrument_node="">these ones</span></a><span data-dcnode-id="5206" instrument_node="">!) then you won’t need to let bad weather stop you from enjoying Norway’s nature.</span></p><span data-dcnode-id="5204" instrument_node="">
</span><p data-dcnode-id="5196"><span data-dcnode-id="5203" instrument_node="">Even in the summer I would recommend bringing </span><a data-dcnode-id="5201" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//api.shopstyle.com/action/apiVisitRetailer%3Fid%3D533165296%26pid%3Duid6969-37899437-38"><span data-dcnode-id="5202" instrument_node="">warm thermals</span></a><span data-dcnode-id="5200" instrument_node=""> to wear under your clothes while in the mountains, a </span><a data-dcnode-id="5198" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//api.shopstyle.com/action/apiVisitRetailer%3Fid%3D614678628%26pid%3Duid6969-37899437-38"><span data-dcnode-id="5199" instrument_node="">good quality wool sweater</span></a><span data-dcnode-id="5197" instrument_node="">, and of course a raincoat and rain pants.</span></p><span data-dcnode-id="5195" instrument_node="">
</span><p data-dcnode-id="5193"><span data-dcnode-id="5194" instrument_node="">Here’s what I always bring with me on a Norwegian road trip:</span></p><span data-dcnode-id="5192" instrument_node="">
</span><p data-dcnode-id="5191"></p><span data-dcnode-id="5190" instrument_node="">
</span><div class="shopsense-widget" data-dcnode-id="5185" data-options="%7B%22widgetId%22%3A%2258da48502391f37d65f05299%22%2C%22version%22%3A1%2C%22pid%22%3A%22uid6969-37899437-38%22%2C%22size%22%3A150%2C%22columns%22%3A4%2C%22rows%22%3A1%2C%22url%22%3A%22https%3A%2F%2Fapi.shopstyle.com%2Fapi%2Fv2%22%2C%22iframeHeight%22%3A225%2C%22iframeWidth%22%3A720%7D"><span data-dcnode-id="5187" instrument_node=""> </span><iframe data-dcnode-id="5186" height="225px" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//shopsensewidget.shopstyle.com/%23/%3Foptions%3D%257B%2522widgetId%2522%253A%252258da48502391f37d65f05299%2522%252C%2522version%2522%253A1%252C%2522pid%2522%253A%2522uid6969-37899437-38%2522%252C%2522size%2522%253A150%252C%2522columns%2522%253A4%252C%2522rows%2522%253A1%252C%2522url%2522%253A%2522https%253A%252F%252Fapi.shopstyle.com%252Fapi%252Fv2%2522%252C%2522iframeHeight%2522%253A225%252C%2522iframeWidth%2522%253A720%257D&amp;raw" style="border: 0;" width="720px"></iframe></div><span data-dcnode-id="5184" instrument_node="">
</span><p data-dcnode-id="5183"></p><span data-dcnode-id="5182" instrument_node="">
</span><h2 data-dcnode-id="5180"><span data-dcnode-id="5181" instrument_node="">If you’re camping, bring a really warm sleeping bag and pitch away from the main road</span></h2><span data-dcnode-id="5179" instrument_node="">
</span><p data-dcnode-id="5177"><span data-dcnode-id="5178" instrument_node="">Even in the summer the nights in the mountains get really cold, so make sure your sleeping bag can withstand freezing temperatures.</span></p><span data-dcnode-id="5176" instrument_node="">
</span><p data-dcnode-id="5174"><span data-dcnode-id="5175" instrument_node="">And while wild camping is totally legal here, I do try to camp out of sight of the road. Last summer there was a lot of press in Norway about European tourists loading their cars with food and camping their way through Norway, spending almost no money while here, so a lot of locals don’t look too kindly on&nbsp;tents.</span></p><span data-dcnode-id="5173" instrument_node="">
</span><p data-dcnode-id="5171"><span data-dcnode-id="5172" instrument_node="">It’s really silly, but the one time I did camp by the side of a road I was honked at all night, and when I asked other travelers about it many had experienced the same thing. Besides,&nbsp;it’s much nicer camping away from the noise of traffic anyway!</span></p><span data-dcnode-id="5170" instrument_node="">
</span><p data-dcnode-id="5166"><picture data-dcnode-id="5167"><source data-dcnode-id="5169" sizes="(max-width: 1000px) 100vw, 1000px" srcset="https://www.heartmybackpack.com/wp-content/uploads/2016/09/IMG_0687.jpg.webp 1000w, https://www.heartmybackpack.com/wp-content/uploads/2016/09/IMG_0687-150x100.jpg.webp 150w, https://www.heartmybackpack.com/wp-content/uploads/2016/09/IMG_0687-300x200.jpg.webp 300w" type="image/webp"><img alt="wild camping norway" class="alignleft size-full wp-image-7845 webpexpress-processed" data-dcnode-id="5168" data-jpibfi-post-excerpt="" data-jpibfi-post-title="How to Plan an Epic Road Trip in Norway" data-jpibfi-post-url="https://www.heartmybackpack.com/norway/plan-road-trip-norway/" data-jpibfi-src="http://www.heartmybackpack.com/wp-content/uploads/2016/09/IMG_0687.jpg" height="667" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.heartmybackpack.com/wp-content/uploads/2016/09/IMG_0687.jpg&amp;raw" srcset="https://www.heartmybackpack.com/wp-content/uploads/2016/09/IMG_0687.jpg 1000w, https://www.heartmybackpack.com/wp-content/uploads/2016/09/IMG_0687-150x100.jpg 150w, https://www.heartmybackpack.com/wp-content/uploads/2016/09/IMG_0687-300x200.jpg 300w" width="1000"></picture></p><span data-dcnode-id="5165" instrument_node="">
</span><p data-dcnode-id="5163"><span data-dcnode-id="5164" instrument_node="">&nbsp;</span></p><span data-dcnode-id="5162" instrument_node="">
</span><h2 data-dcnode-id="5160"><span data-dcnode-id="5161" instrument_node="">Alternate between grocery store meals and restaurants</span></h2><span data-dcnode-id="5159" instrument_node="">
</span><p data-dcnode-id="5157"><span data-dcnode-id="5158" instrument_node="">Having the extra space of a car makes it a lot easier to buy and store food for meals, which can save a ton of money while traveling in Norway. I generally eat one restaurant meal a day on my travels and balance out the expense with cheap grocery store meals the rest of the day.</span></p><span data-dcnode-id="5156" instrument_node="">

</span><p data-dcnode-id="4384"><span data-dcnode-id="4385" instrument_node="">I was just reminded that I do have a tip for roadtrippers: if you don’t plan on camping, but do want to go in summer, book really early! Accommodation anywhere near any of the big fjord tourist draws fills up incredibly early, so you may have to book half a year in advance if you want to sleep in one of the prettiest villages on the Geiranger fjord, for instance.</span></p><span data-dcnode-id="4383" instrument_node="">

</span><p class="comment-meta" data-dcnode-id="4090"><time class="comment-time" data-dcnode-id="4091" datetime="2017-06-30T16:40:09+02:00" itemprop="datePublished"><a class="comment-time-link" data-dcnode-id="4092" href="#comment-181030" itemprop="url"><span data-dcnode-id="4093" instrument_node="">June 30, 2017 at 4:40 pm</span></a></time></p><span data-dcnode-id="4089" instrument_node=""> </span></header><span data-dcnode-id="4087" instrument_node="">
</span><div class="comment-content" data-dcnode-id="4067" itemprop="text"><span data-dcnode-id="4086" instrument_node="">
</span><p data-dcnode-id="4084"><span data-dcnode-id="4085" instrument_node="">Hi Silvia,</span></p><span data-dcnode-id="4083" instrument_node="">
</span><p data-dcnode-id="4079"><span data-dcnode-id="4082" instrument_node="">my companion and I have hired a campervan for the last week of August and the first week of September 2017.  We have worked out a rough route starting in Oslo/Jesshiem, heading straight up the RV3 and E6 to Mo i rana.  From there we will head south to Trondheim, Alesund, Bergen, Stavanger and finally back to Oslo.  We hope to have enough time to go via the Atlantic Highway, Trollstigen, Gerainger, Dalsnibba and Nigardsbreen.</span><br data-dcnode-id="4081"><span data-dcnode-id="4080" instrument_node="">
Do you have any suggestions for places that we should make a point of stopping at along our route, other than those I’ve mentioned.  I would hate to miss a “must see” because I was unaware of it.</span></p><span data-dcnode-id="4078" instrument_node="">
</span><p data-dcnode-id="4074"><span data-dcnode-id="4077" instrument_node="">I should point out that the route is not “set in stone”, it will depend on how much time we spend in various places along the way.  If we find somewhere we particularly like, we may spend more time there and perhaps miss out one or two of other planned stops.</span><br data-dcnode-id="4076"><span data-dcnode-id="4075" instrument_node="">
Any other tips you have would be greatly appreciated.</span></p><span data-dcnode-id="4073" instrument_node="">
</span><p data-dcnode-id="4069"><span data-dcnode-id="4072" instrument_node="">kind regards</span><br data-dcnode-id="4071"><span data-dcnode-id="4070" instrument_node="">

</span><div class="comment-content" data-dcnode-id="3638" itemprop="text"><span data-dcnode-id="3642" instrument_node="">
</span><p data-dcnode-id="3640"><span data-dcnode-id="3641" instrument_node="">Hello, Silvia.  We are planning a trip to Sweden and Norway.  We lived in Stockholm for two years many years ago and visited the Norwegian fjords via a cruise.  This time, we are traveling with our daughter and would like to gain a different perspective of Norway and the fjords.  In May, we will fly into Bergen from Stockholm on the 14th; we have a return flight to the USA reserved for the 19th from Oslo.  Because of jetlag, I have had trouble staying awake when driving in Europe for long distances, so I am wondering whether you could suggest an itinerary for the length of our trip that will not include long driving distances – maybe a combination of driving around the Sognefjord and public transportation for the longer legs of the trip, such as our final leg to Oslo.  We will be grateful if you share your firsthand insight.  Thank you!</span></p><span data-dcnode-id="3639" instrument_node="">
</span></div><span data-dcnode-id="3637" instrument_node="">
</span><div class="comment-reply" data-dcnode-id="3634"><a aria-label="Reply to Bill" class="comment-reply-link" data-belowelement="comment-190405" data-commentid="190405" data-dcnode-id="3635" data-postid="8020" data-replyto="Reply to Bill" data-respondelement="respond" href="#comment-190405" rel="nofollow"><span data-dcnode-id="3636" instrument_node="">Reply</span></a></div><span data-dcnode-id="3633" instrument_node="">

</span><p data-dcnode-id="3523"><span data-dcnode-id="3524" instrument_node="">Oslo to Tromso is over 20 hours of driving, but I guess it would be doable in 9 days. Though if you’re just interested in the Northern Lights you could just drive up to Bodø, which is closer to Oslo but still above the Arctic Circle. If you want to drive through the mountains you should try to stay driving in Norway, even though maps might want you to go through Sweden as they have bigger roads (but the scenery isn’t as nice).</span></p><span data-dcnode-id="3522" instrument_node="">

</span><p data-dcnode-id="3309"><span data-dcnode-id="3310" instrument_node="">Hi, I am loving your articles, so easy to read and lots of great tips and to especially get off the beaten track. We are looking forward to coming to Norway in August, we know it will be busy, but we are coming from Sydney and this is part of our european summer escape, and probably the only time we will get to visit. We are very lucky to be staying with friends in Trondheim and Alesund, but we are undecided about what to do when we first arrive in Norway. We fly into Amsterdam and then are debating whether to fly from Amsterdam to Oslo, spend one day, then pick up a hire car for three days, drive to Bergen via Telemark and then spend two days coming back to Oslo to drop off car, then fly to Alesund. Or do the train trip from Oslo to Bergen and pick up a hire car there for three days (maybe even follow your Norway in a Nutshell hack love it). Alternatively, we fly direct to Bergen from Amsterdam, have a hire car for four days from Bergen to explore area, but won’t visit Oslo or possibly Telemark…. Basically shall we miss Oslo to have more time with the hire car from Bergen? We will visit the Geiranger fjord from Alesund so I don’t think we need to do any ferry trips from Bergen. Any tips you can provide would be wonderful.</span></p><span data-dcnode-id="3308" instrument_node="">

</span><p class="comment-meta" data-dcnode-id="2961"><time class="comment-time" data-dcnode-id="2962" datetime="2018-04-09T03:05:21+02:00" itemprop="datePublished"><a class="comment-time-link" data-dcnode-id="2963" href="#comment-195283" itemprop="url"><span data-dcnode-id="2964" instrument_node="">April 9, 2018 at 3:05 am</span></a></time></p><span data-dcnode-id="2960" instrument_node=""> </span></header><span data-dcnode-id="2958" instrument_node="">
</span><div class="comment-content" data-dcnode-id="2919" itemprop="text"><span data-dcnode-id="2957" instrument_node="">
</span><p data-dcnode-id="2955"><span data-dcnode-id="2956" instrument_node="">In July my wife and I will be traveling to Norway, Sweden, and Denmark.  For the Norway portion of the trip we plan on renting a car in Stavanager then driving it to Alesund.  I just wanted to get a sanity check to see if the driving portion of my trip will be too crazy combined with the activities we were thinking:</span></p><span data-dcnode-id="2954" instrument_node="">
</span><p data-dcnode-id="2924"><span data-dcnode-id="2953" instrument_node="">Saturday, June 30th – Arrive in Oslo at 12:10 PM, explore city and then sleep in Oslo</span><br data-dcnode-id="2952"><span data-dcnode-id="2951" instrument_node="">
Sunday, July 1st – Explore Oslo, 9:00 PM flight to Stavanager, Arrive at 9:50 PM, sleep – Stavanager</span><br data-dcnode-id="2950"><span data-dcnode-id="2949" instrument_node="">
Monday, July 2nd – Hike Pulpit Rock then drive to Odda.  Sleep in Odda</span><br data-dcnode-id="2948"><span data-dcnode-id="2947" instrument_node="">
Tuesday, July 3rd – Hike TrollTunga, then drive to Bergen.  Sleep in Bergen</span><br data-dcnode-id="2946"><span data-dcnode-id="2945" instrument_node="">
Wednesday, July 4th – Free Day in Bergen.  Sleep in Bergen</span><br data-dcnode-id="2944"><span data-dcnode-id="2943" instrument_node="">
Thursday, July 5th – Drive from Bergen to Skei (Scenic Highway E16). Sleep in Skei</span><br data-dcnode-id="2942"><span data-dcnode-id="2941" instrument_node="">
Friday, July 6th – Drive from Skei to Geiranger.  Do Kayak Tour of Geirangerfjord. Drive to Alesund.</span><br data-dcnode-id="2940"><span data-dcnode-id="2939" instrument_node="">
Saturday, July 7th – Free Day in Alesund</span><br data-dcnode-id="2938"><span data-dcnode-id="2937" instrument_node="">
Sunday, July 8th – Half Day in Alesund and then Fly to Stockholm.  Sleep in Stockholm</span><br data-dcnode-id="2936"><span data-dcnode-id="2935" instrument_node="">
Monday, July 9th – Free Day Stockholm</span><br data-dcnode-id="2934"><span data-dcnode-id="2933" instrument_node="">
Tuesday, July 10th – Free Day Stockholm</span><br data-dcnode-id="2932"><span data-dcnode-id="2931" instrument_node="">
Wednesday, July 11th – Morning Train to Copenhagen.  Half day in Copenhagen</span><br data-dcnode-id="2930"><span data-dcnode-id="2929" instrument_node="">
Thursday, July 12th – Free Day Copenhagen</span><br data-dcnode-id="2928"><span data-dcnode-id="2927" instrument_node="">
Friday, July 13th – Free Day Copenhagen</span><br data-dcnode-id="2926"><span data-dcnode-id="2925" instrument_node="">
Saturday – Afternoon flights back home</span></p><span data-dcnode-id="2923" instrument_node="">
</span><p data-dcnode-id="2921"><span data-dcnode-id="2922" instrument_node="">If we need to add an extra 0.5 or 1.0 days in Norway we would likely take it from Stockholm</span></p><span data-dcnode-id="2920" instrument_node="">
