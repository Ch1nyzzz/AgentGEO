</span><h1 class="entry-title" data-dcnode-id="4811"><span data-dcnode-id="4812" instrument_node="">How to Plan an Unforgettable Oregon Coast Road Trip</span></h1><div class="entry-meta entry-meta-divider-dash" data-dcnode-id="4794"><span data-dcnode-id="4810" instrument_node="">

</span><div class="entry-content single-content" data-dcnode-id="2614"><span data-dcnode-id="4788" instrument_node="">
</span><p data-dcnode-id="4786"><span data-dcnode-id="4787" instrument_node="">What up, wanderers! It’s me again—Diana Flowers, your roving Portland reporter here to enlighten you about all things Oregon! And this time you’re in for a treat. Yes, friends—it’s road trip time, and here we’re exploring every nook and cranny of the gorgeous Oregon coast. I’ll run down all my favorite spots from the tippy top of the state in Astoria down to the</span></p><span data-dcnode-id="4785" instrument_node="">
</span><p data-dcnode-id="4783"><span data-dcnode-id="4784" instrument_node=""> California border. We’ll cover the best hikes, viewpoints, beaches, restaurants, lighthouses, and funky seaside attractions and how to fit them all together for an exceptional Oregon coast road trip.</span></p><span data-dcnode-id="4782" instrument_node="">
</span><p data-dcnode-id="4780"><span data-dcnode-id="4781" instrument_node="">We’ll start with some things to know – like tides, passes, and weather – before getting into the 14 best places to visit along the Oregon Coast (with things to do and places to stay for each), and ending with how to put it all together in a three, five, or seven day itinerary. </span></p><span data-dcnode-id="4779" instrument_node="">
</span><p data-dcnode-id="4777"><span data-dcnode-id="4778" instrument_node="">Sound good to you? Let’s get to exploring the Oregon Coast!</span></p><span data-dcnode-id="4776" instrument_node="">

</span></div></div><h2 class="has-text-align-center" data-dcnode-id="4401"><span data-dcnode-id="4402" id="Tips_for_Exploring_the_Oregon_Coast"><span data-dcnode-id="4403" instrument_node="">Tips for Exploring the Oregon Coast</span></span></h2><span data-dcnode-id="4400" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="4398"><img alt="" class="wp-image-81379" data-dcnode-id="4399" height="682" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//westcoastwayfarers.com/wp-content/uploads/2021/08/DSC01256-1024x682.jpg&amp;raw" srcset="https://westcoastwayfarers.com/wp-content/uploads/2021/08/DSC01256-1024x682.jpg 1024w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/DSC01256-300x200.jpg 300w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/DSC01256-768x512.jpg 768w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/DSC01256-1536x1024.jpg 1536w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/DSC01256.jpg 2000w" width="1024"></figure><p data-dcnode-id="4396"><span data-dcnode-id="4397" instrument_node="">Here are some tips and resources you’ll want to keep in mind as you’re planning for your drive on the Oregon Coast. </span></p><span data-dcnode-id="4395" instrument_node="">
</span><p data-dcnode-id="4380"><strong data-dcnode-id="4393"><span data-dcnode-id="4394" instrument_node="">Weather</span></strong><span data-dcnode-id="4392" instrument_node="">:</span><strong data-dcnode-id="4390"><span data-dcnode-id="4391" instrument_node=""> </span></strong><span data-dcnode-id="4389" instrument_node="">Even if you’re traveling in the summer, you’ll want to prepare for rain. Pack a good rain jacket and decent hiking shoes. Personally, I find waterproof hiking boots too sweaty, so I just accept that my feet will be wet during a rainy day (but I always wear wool socks so I don’t get cold), and I have a dry pair of shoes/socks in the car to change into. Also the coast is frequently overcast, but this </span><em data-dcnode-id="4387"><span data-dcnode-id="4388" instrument_node="">tends to</span></em><span data-dcnode-id="4386" instrument_node=""> (no promises)</span><em data-dcnode-id="4384"><span data-dcnode-id="4385" instrument_node=""> </span></em><span data-dcnode-id="4383" instrument_node="">burn off in the afternoon, so you can think about planning your day around this trend. As I find myself frequently telling visiting friends—it’s not the beach, it’s the </span><em data-dcnode-id="4381"><span data-dcnode-id="4382" instrument_node="">coast.</span></em></p><span data-dcnode-id="4379" instrument_node="">
</span><p data-dcnode-id="4370"><strong data-dcnode-id="4377"><span data-dcnode-id="4378" instrument_node="">Tide Tables</span></strong><span data-dcnode-id="4376" instrument_node="">:</span><strong data-dcnode-id="4374"><span data-dcnode-id="4375" instrument_node=""> </span></strong><span data-dcnode-id="4373" instrument_node="">Know them. Love them. Respect them. </span><a data-dcnode-id="4371" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tidesandcurrents.noaa.gov/map/index.html%3Fregion%3DOregon" rel="noopener" target="_blank"><span data-dcnode-id="4372" instrument_node="">Reference them often.</span></a></p><span data-dcnode-id="4369" instrument_node="">
</span><p data-dcnode-id="4344"><strong data-dcnode-id="4367"><span data-dcnode-id="4368" instrument_node="">Day-use Fees and Passes</span></strong><span data-dcnode-id="4366" instrument_node="">:</span><strong data-dcnode-id="4364"><span data-dcnode-id="4365" instrument_node=""> </span></strong><span data-dcnode-id="4363" instrument_node="">This is a tough one because it really depends on what you plan on doing. In general, there aren’t a </span><em data-dcnode-id="4361"><span data-dcnode-id="4362" instrument_node="">ton </span></em><span data-dcnode-id="4360" instrument_node="">of places where you’ll need a parking permit, and if you do it’s usually no more than five bucks. That said, it can still add up and there is one pass I’d recommend, the </span><a data-dcnode-id="4358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fs.usda.gov/detail/r6/passes-permits/recreation/%3Fcid%3Dfsbdev7_007224" rel="noopener" target="_blank"><span data-dcnode-id="4359" instrument_node="">Oregon Pacific Coast Passport</span></a><span data-dcnode-id="4357" instrument_node="">. They have a 5-day pass available for $10 and it gets you into all the locations below (I’ve </span><strong data-dcnode-id="4355"><span data-dcnode-id="4356" instrument_node="">bolded</span></strong><span data-dcnode-id="4354" instrument_node=""> the ones I’ve specifically recommended and here’s a </span><a data-dcnode-id="4352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fs.usda.gov/Internet/FSE_DOCUMENTS/fseprd574927.pdf" rel="noopener" target="_blank"><span data-dcnode-id="4353" instrument_node="">handy brochure</span></a><span data-dcnode-id="4351" instrument_node=""> with a map), so if you’re planning on hitting up two or more of these parks (and you really </span><em data-dcnode-id="4349"><span data-dcnode-id="4350" instrument_node="">should</span></em><span data-dcnode-id="4348" instrument_node="">), you’ll save time and money by purchasing a pass at the beginning of your trip. The catch is you can only buy the 5-day pass in person, but if you’re starting in Astoria you can pick one up easily at the </span><a data-dcnode-id="4346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.travelastoria.com/about/visitor-center.html" rel="noopener" target="_blank"><span data-dcnode-id="4347" instrument_node="">Astoria Visitor Center</span></a><span data-dcnode-id="4345" instrument_node="">.&nbsp;</span></p><span data-dcnode-id="4343" instrument_node="">
</span><ul data-dcnode-id="4300"><li data-dcnode-id="4340"><strong data-dcnode-id="4341"><span data-dcnode-id="4342" instrument_node="">Ft. Stevens State Park</span></strong></li><li data-dcnode-id="4337"><strong data-dcnode-id="4338"><span data-dcnode-id="4339" instrument_node="">Lewis and Clark National Historical Park</span></strong></li><li data-dcnode-id="4334"><strong data-dcnode-id="4335"><span data-dcnode-id="4336" instrument_node="">Ecola State Park</span></strong></li><li data-dcnode-id="4332"><span data-dcnode-id="4333" instrument_node="">Nehalem Bay State Park</span></li><li data-dcnode-id="4329"><strong data-dcnode-id="4330"><span data-dcnode-id="4331" instrument_node="">Cape Lookout State Park</span></strong></li><li data-dcnode-id="4327"><span data-dcnode-id="4328" instrument_node="">Sand Lake Recreation Area (on the sand and Derrick Road)</span></li><li data-dcnode-id="4325"><span data-dcnode-id="4326" instrument_node="">Hebo Lake</span></li><li data-dcnode-id="4322"><strong data-dcnode-id="4323"><span data-dcnode-id="4324" instrument_node="">Drift Creek Falls Trail</span></strong></li><li data-dcnode-id="4319"><strong data-dcnode-id="4320"><span data-dcnode-id="4321" instrument_node="">Yaquina Head Outstanding Natural Area</span></strong></li><li data-dcnode-id="4317"><span data-dcnode-id="4318" instrument_node="">Marys Peak Recreation Area</span></li><li data-dcnode-id="4314"><strong data-dcnode-id="4315"><span data-dcnode-id="4316" instrument_node="">Cape Perpetua Scenic Area</span></strong></li><li data-dcnode-id="4311"><strong data-dcnode-id="4312"><span data-dcnode-id="4313" instrument_node="">Heceta Head Lighthouse Viewpoint</span></strong></li><li data-dcnode-id="4309"><span data-dcnode-id="4310" instrument_node="">Sutton Recreation Area</span></li><li data-dcnode-id="4307"><span data-dcnode-id="4308" instrument_node="">Honeyman State Park</span></li><li data-dcnode-id="4304"><strong data-dcnode-id="4305"><span data-dcnode-id="4306" instrument_node="">Oregon Dunes National Recreation Area</span></strong></li><li data-dcnode-id="4301"><strong data-dcnode-id="4302"><span data-dcnode-id="4303" instrument_node="">Shore Acres State Park</span></strong></li></ul><figure class="wp-block-image size-large" data-dcnode-id="4298"><img alt="" class="wp-image-81381" data-dcnode-id="4299" height="683" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//westcoastwayfarers.com/wp-content/uploads/2021/08/DSC00980-1024x683.jpg&amp;raw" srcset="https://westcoastwayfarers.com/wp-content/uploads/2021/08/DSC00980-1024x683.jpg 1024w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/DSC00980-300x200.jpg 300w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/DSC00980-768x512.jpg 768w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/DSC00980-1536x1024.jpg 1536w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/DSC00980.jpg 2048w" width="1024"></figure><h2 class="has-text-align-center" data-dcnode-id="4295"><span data-dcnode-id="4296" id="The_Route_for_Driving_the_Oregon_Coast"><span data-dcnode-id="4297" instrument_node="">The Route for Driving the Oregon Coast</span></span></h2><span data-dcnode-id="4294" instrument_node="">
</span><p data-dcnode-id="4292"><span data-dcnode-id="4293" instrument_node="">This itinerary for driving the Oregon Coast is organized from north to south, which assumes you’re coming from Portland, Seattle, or somewhere else in the Pacific Northwest. </span></p><span data-dcnode-id="4291" instrument_node="">
</span><p data-dcnode-id="4287"><strong data-dcnode-id="4289"><span data-dcnode-id="4290" instrument_node="">How Many Days? </span></strong><span data-dcnode-id="4288" instrument_node="">All-in, it takes about 8 hours (340 miles) to drive from the northern tip of the Oregon Coast alllllll the way to Brookings, which is essentially the California border. </span></p><span data-dcnode-id="4286" instrument_node="">
</span><p data-dcnode-id="4270"><strong data-dcnode-id="4284"><span data-dcnode-id="4285" instrument_node="">The shortest you can realistically do is 3 days</span></strong><span data-dcnode-id="4283" instrument_node="">, which is a perfect long </span><a data-dcnode-id="4281" data-id="3530" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//westcoastwayfarers.com/best-weekend-getaways-from-portland/"><span data-dcnode-id="4282" instrument_node="">weekend getaway from Portland</span></a><span data-dcnode-id="4280" instrument_node="">. You can totally extend this road trip to as long as you’d like, but </span><strong data-dcnode-id="4278"><span data-dcnode-id="4279" instrument_node="">after about seven days</span></strong><span data-dcnode-id="4277" instrument_node=""> it probably makes more sense to turn it into a broader </span><a data-dcnode-id="4275" data-id="80842" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//westcoastwayfarers.com/pacific-northwest-road-trip/"><span data-dcnode-id="4276" instrument_node="">Pacific Northwest road trip</span></a><span data-dcnode-id="4274" instrument_node="">, or an </span><a data-dcnode-id="4272" data-id="4374" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//westcoastwayfarers.com/oregon-road-trip-itinerary/"><span data-dcnode-id="4273" instrument_node="">Oregon road trip</span></a><span data-dcnode-id="4271" instrument_node=""> (click on either of those two to read our super detailed guides!).</span></p><span data-dcnode-id="4269" instrument_node="">
</span><p data-dcnode-id="4253"><strong data-dcnode-id="4267"><span data-dcnode-id="4268" instrument_node="">If you only have a day on the Oregon Coast </span></strong><span data-dcnode-id="4266" instrument_node="">and you’re coming from Portland, we’d recommend choosing either </span><a data-dcnode-id="4264" data-id="3864" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//westcoastwayfarers.com/best-things-to-do-astoria-oregon/"><span data-dcnode-id="4265" instrument_node="">Astoria</span></a><span data-dcnode-id="4263" instrument_node=""> or </span><a data-dcnode-id="4261" data-id="2863" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//westcoastwayfarers.com/things-to-do-in-cannon-beach/"><span data-dcnode-id="4262" instrument_node="">Cannon Beach</span></a><span data-dcnode-id="4260" instrument_node=""> for your day trip destination. One of the best </span><a data-dcnode-id="4258" data-id="3032" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//westcoastwayfarers.com/best-day-trips-from-portland-oregon/"><span data-dcnode-id="4259" instrument_node="">day trips from Portland</span></a><span data-dcnode-id="4257" instrument_node=""> would be creating a mini loop that starts with an early morning visit to Cannon Beach, heads up 101 to Ecola State Park and Seaside, and ends with beers on the water in Astoria before looping back to Portland. Something like </span><a data-dcnode-id="4255" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.google.com/maps/dir/Portland%2C%2BOR/Cannon%2BBeach%2C%2BOR/Ecola%2BState%2BPark%2C%2BCannon%2BBeach%2C%2BOR/Seaside%2C%2BOR/Astoria%2C%2BOR/Portland%2C%2BOR/%4045.8496477%2C-123.8800758%2C9z/data%3D%213m1%214b1%214m38%214m37%211m5%211m1%211s0x54950b0b7da97427%3A0x1c36b9e6f6d18591%212m2%211d-122.6750261%212d45.5051064%211m5%211m1%211s0x5494a52740cfce5d%3A0x1bfe4f4cea593a21%212m2%211d-123.9615274%212d45.8917738%211m5%211m1%211s0x5494a40503af8b91%3A0xed5b054e0e9ba456%212m2%211d-123.9861914%212d45.9406101%211m5%211m1%211s0x5493612cb60e6667%3A0x8d640cf4541bfd22%212m2%211d-123.9226385%212d45.9931636%211m5%211m1%211s0x54937b440995fb8b%3A0xf7dd72f1a11b8abf%212m2%211d-123.8312534%212d46.1878841%211m5%211m1%211s0x54950b0b7da97427%3A0x1c36b9e6f6d18591%212m2%211d-122.6750261%212d45.5051064%213e0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4256" instrument_node="">this</span></a><span data-dcnode-id="4254" instrument_node="">. </span></p><span data-dcnode-id="4252" instrument_node="">
</span><p data-dcnode-id="4248"><a data-dcnode-id="4250" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.google.com/maps/d/u/0/edit%3Fmid%3D110PZjMeVoaQmKNWhGPotewOQCLv8Lmx7%26usp%3Dsharing" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4251" instrument_node="">Here’s a map</span></a><span data-dcnode-id="4249" instrument_node=""> of the stops below so you can get a sense for what your trip is going to look like. </span></p><span data-dcnode-id="4247" instrument_node="">
</span><center data-dcnode-id="4245"><iframe data-dcnode-id="4246" height="480" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.google.com/maps/d/u/0/embed%3Fmid%3D110PZjMeVoaQmKNWhGPotewOQCLv8Lmx7&amp;raw" width="640"></iframe></center><span data-dcnode-id="4244" instrument_node="">
</span><h2 class="has-text-align-center" data-dcnode-id="4241"><span data-dcnode-id="4242" id="The_14_Best_Places_to_Stop_on_an_Oregon_Coast_Road_Trip"><span data-dcnode-id="4243" instrument_node="">The 14 Best Places to Stop on an Oregon Coast Road Trip</span></span></h2><span data-dcnode-id="4240" instrument_node="">
</span><p data-dcnode-id="4238"><span data-dcnode-id="4239" instrument_node="">These stops are laid out from north to south highlighting the best towns, parks, activities, and sights to hit up.</span></p><span data-dcnode-id="4237" instrument_node="">
</span><h3 class="has-text-align-center" data-dcnode-id="4234"><span data-dcnode-id="4235" id="Astoria"><span data-dcnode-id="4236" instrument_node="">Astoria</span></span></h3><span data-dcnode-id="4233" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="4231"><img alt="" class="wp-image-3874" data-dcnode-id="4232" height="634" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//westcoastwayfarers.com/wp-content/uploads/2021/03/View-from-Astoria-Column-1024x634.jpg&amp;raw" srcset="https://westcoastwayfarers.com/wp-content/uploads/2021/03/View-from-Astoria-Column-1024x634.jpg 1024w, https://westcoastwayfarers.com/wp-content/uploads/2021/03/View-from-Astoria-Column-300x186.jpg 300w, https://westcoastwayfarers.com/wp-content/uploads/2021/03/View-from-Astoria-Column-768x476.jpg 768w, https://westcoastwayfarers.com/wp-content/uploads/2021/03/View-from-Astoria-Column-1536x951.jpg 1536w, https://westcoastwayfarers.com/wp-content/uploads/2021/03/View-from-Astoria-Column-scaled.jpg 2048w" width="1024"></figure><p data-dcnode-id="4229"><span data-dcnode-id="4230" instrument_node="">Astoria is one of the oldest settlements on the west coast (est. 1811) and has a unique vibe that sets it apart from other cities on the Oregon coast. </span></p><span data-dcnode-id="4228" instrument_node="">
</span><p data-dcnode-id="4226"><span data-dcnode-id="4227" instrument_node="">It’s rife with parks, restaurants, breweries, and historical places of interest, but it still retains a bit of the pioneer grittiness and fishing-town feel that made it what it is. It’s the perfect place to start your adventure.</span></p><span data-dcnode-id="4225" instrument_node="">
</span><h4 data-dcnode-id="4222"><span data-dcnode-id="4223" id="Things_to_Do_in_Astoria"><span data-dcnode-id="4224" instrument_node="">Things to Do in Astoria</span></span></h4><span data-dcnode-id="4221" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="4219"><img alt="" class="wp-image-3873" data-dcnode-id="4220" height="684" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//westcoastwayfarers.com/wp-content/uploads/2021/03/Astoria-Water-1024x684.jpg&amp;raw" srcset="https://westcoastwayfarers.com/wp-content/uploads/2021/03/Astoria-Water-1024x684.jpg 1024w, https://westcoastwayfarers.com/wp-content/uploads/2021/03/Astoria-Water-300x200.jpg 300w, https://westcoastwayfarers.com/wp-content/uploads/2021/03/Astoria-Water-768x513.jpg 768w, https://westcoastwayfarers.com/wp-content/uploads/2021/03/Astoria-Water-1536x1025.jpg 1536w, https://westcoastwayfarers.com/wp-content/uploads/2021/03/Astoria-Water-scaled.jpg 2048w, https://westcoastwayfarers.com/wp-content/uploads/2021/03/Astoria-Water-900x600.jpg 900w, https://westcoastwayfarers.com/wp-content/uploads/2021/03/Astoria-Water-600x400.jpg 600w" width="1024"></figure><p data-dcnode-id="4205"><a data-dcnode-id="4216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astoriacolumn.org/" rel="noopener" target="_blank"><strong data-dcnode-id="4217"><span data-dcnode-id="4218" instrument_node="">Astoria Column</span></strong></a><span data-dcnode-id="4215" instrument_node="">: The Astoria Column reigns over the city skyline at 600 feet high and has been standing for nearly 100 years. The climb to the top is a calf-burner, but the views are worth it. Plus, they </span><em data-dcnode-id="4213"><span data-dcnode-id="4214" instrument_node="">encourage</span></em><span data-dcnode-id="4212" instrument_node=""> you to send paper airplanes from the top!</span><br data-dcnode-id="4211"><br data-dcnode-id="4210"><a data-dcnode-id="4207" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stateparks.oregon.gov/index.cfm%3Fdo%3Dpark.profile%26parkId%3D129" rel="noopener" target="_blank"><strong data-dcnode-id="4208"><span data-dcnode-id="4209" instrument_node="">Fort Stevens State Park</span></strong></a><span data-dcnode-id="4206" instrument_node="">: Home of the famous Peter Iredale shipwreck, this sprawling state park is bordered by the Pacific and the mouth of the mighty Columbia. Its 4,300 acres will keep you busy all day and the camping is top notch.</span></p><span data-dcnode-id="4204" instrument_node="">
</span><p data-dcnode-id="4199"><a data-dcnode-id="4201" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nps.gov/lewi/index.htm" rel="noopener" target="_blank"><strong data-dcnode-id="4202"><span data-dcnode-id="4203" instrument_node="">Lewis and Clark National Historical Park</span></strong></a><span data-dcnode-id="4200" instrument_node="">: History nerds, unite! When I travel, I make it a point to stop at all local-history-related parks and museums and this is one of the best. Plus, I’m a sucker for docents dressed in old-timey garb and secretly wish I was one. #lifegoals.</span></p><span data-dcnode-id="4198" instrument_node="">
</span><p data-dcnode-id="4193"><a data-dcnode-id="4195" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.crmm.org/" rel="noopener" target="_blank"><strong data-dcnode-id="4196"><span data-dcnode-id="4197" instrument_node="">Maritime Museum</span></strong></a><span data-dcnode-id="4194" instrument_node="">: Another must for history buffs, particularly those interested in the evolution of sea-going vessels. Even if you’re not a nautical-nut, you’ll still enjoy it.</span></p><span data-dcnode-id="4192" instrument_node="">
</span><p data-dcnode-id="4177"><strong data-dcnode-id="4190"><span data-dcnode-id="4191" instrument_node="">Beer at </span></strong><a data-dcnode-id="4187" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.buoybeer.com/" rel="noopener" target="_blank"><strong data-dcnode-id="4188"><span data-dcnode-id="4189" instrument_node="">Buoy</span></strong></a><strong data-dcnode-id="4185"><span data-dcnode-id="4186" instrument_node=""> or </span></strong><a data-dcnode-id="4182" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fortgeorgebrewery.com/" rel="noopener" target="_blank"><strong data-dcnode-id="4183"><span data-dcnode-id="4184" instrument_node="">Fort George</span></strong></a><span data-dcnode-id="4181" instrument_node="">: It wouldn’t be an Oregon road trip without beer! This is also a good time to plug the </span><a data-dcnode-id="4179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.oregoncoastbeer.com/" rel="noopener" target="_blank"><span data-dcnode-id="4180" instrument_node="">North Coast Craft Beer Trail</span></a><span data-dcnode-id="4178" instrument_node="">. Obtain your “passport” at any one of the 12 featured locations and get it “stamped” as you visit each one. If you hit up 10 out of the 12 you get a major award*! (*actually just a small prize).</span></p><span data-dcnode-id="4176" instrument_node="">
</span><p data-dcnode-id="4169"><strong data-dcnode-id="4174"><span data-dcnode-id="4175" instrument_node="">Visit the </span></strong><a data-dcnode-id="4171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//goo.gl/maps/uWdeTwPxJnr8wmJEA" rel="noopener" target="_blank"><strong data-dcnode-id="4172"><span data-dcnode-id="4173" instrument_node="">Goonies House</span></strong></a><span data-dcnode-id="4170" instrument_node="">: This one’s not for everyone, but for those of us who were raised alongside Sloth, Chunk, and Mouth you owe it to your childhood to stop by. And yes, you should do the Truffle Shuffle outside the gate.</span></p><span data-dcnode-id="4168" instrument_node="">
</span><div class="wp-block-columns" data-dcnode-id="4152"><span data-dcnode-id="4167" instrument_node="">
</span><div class="wp-block-column" data-dcnode-id="4161"><span data-dcnode-id="4166" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="4163"><figure class="aligncenter size-large is-resized" data-dcnode-id="4164"><img alt="" class="wp-image-3875" data-dcnode-id="4165" height="768" loading="lazy" sizes="(max-width: 512px) 100vw, 512px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//westcoastwayfarers.com/wp-content/uploads/2021/03/Astoria-Column-683x1024.jpg&amp;raw" srcset="https://westcoastwayfarers.com/wp-content/uploads/2021/03/Astoria-Column-683x1024.jpg 683w, https://westcoastwayfarers.com/wp-content/uploads/2021/03/Astoria-Column-200x300.jpg 200w, https://westcoastwayfarers.com/wp-content/uploads/2021/03/Astoria-Column-768x1152.jpg 768w, https://westcoastwayfarers.com/wp-content/uploads/2021/03/Astoria-Column-1024x1536.jpg 1024w, https://westcoastwayfarers.com/wp-content/uploads/2021/03/Astoria-Column-scaled.jpg 1365w, https://westcoastwayfarers.com/wp-content/uploads/2021/03/Astoria-Column-400x600.jpg 400w" width="512"></figure></div><span data-dcnode-id="4162" instrument_node="">
</span></div><span data-dcnode-id="4160" instrument_node="">
</span><div class="wp-block-column" data-dcnode-id="4154"><span data-dcnode-id="4159" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="4156"><figure class="aligncenter size-large is-resized" data-dcnode-id="4157"><img alt="" class="wp-image-3876" data-dcnode-id="4158" height="768" loading="lazy" sizes="(max-width: 576px) 100vw, 576px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//westcoastwayfarers.com/wp-content/uploads/2021/03/Peter-Iredale-Shipwreck-Astoria-768x1024.jpg&amp;raw" srcset="https://westcoastwayfarers.com/wp-content/uploads/2021/03/Peter-Iredale-Shipwreck-Astoria-768x1024.jpg 768w, https://westcoastwayfarers.com/wp-content/uploads/2021/03/Peter-Iredale-Shipwreck-Astoria-225x300.jpg 225w, https://westcoastwayfarers.com/wp-content/uploads/2021/03/Peter-Iredale-Shipwreck-Astoria-1152x1536.jpg 1152w, https://westcoastwayfarers.com/wp-content/uploads/2021/03/Peter-Iredale-Shipwreck-Astoria-scaled.jpg 1536w" width="576"></figure></div><span data-dcnode-id="4155" instrument_node="">
</span></div><span data-dcnode-id="4153" instrument_node="">
</span></div><span data-dcnode-id="4151" instrument_node="">
</span><h4 data-dcnode-id="4148"><span data-dcnode-id="4149" id="Places_to_Stay_in_Astoria"><span data-dcnode-id="4150" instrument_node="">Places to Stay in Astoria</span></span></h4><span data-dcnode-id="4147" instrument_node="">
</span><p data-dcnode-id="4142"><a data-dcnode-id="4144" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.booking.com/hotel/us/norblad-amp-hostel.en.html%3Faid%3D2106063%26no_rooms%3D1%26group_adults%3D2" rel="noreferrer noopener nofollow" target="_blank"><strong data-dcnode-id="4145"><span data-dcnode-id="4146" instrument_node="">Norblad</span></strong></a><span data-dcnode-id="4143" instrument_node="">: I love hotels like the Norblad—affordable, eclectic, great location, with options for European-style shared bathroom accommodations.&nbsp;</span></p><span data-dcnode-id="4141" instrument_node="">
</span><p data-dcnode-id="4136"><a data-dcnode-id="4138" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.booking.com/hotel/us/commodore-astoria.en.html%3Faid%3D2106063%26no_rooms%3D1%26group_adults%3D2" rel="noreferrer noopener nofollow" target="_blank"><strong data-dcnode-id="4139"><span data-dcnode-id="4140" instrument_node="">The Commodore Hotel</span></strong></a><span data-dcnode-id="4137" instrument_node="">: A slightly spendier choice with a more modern design, but also provides options for shared or private bath rooms. Just a block away from the Norblad, this hotel puts you right in the center of Astoria’s historic downtown riverfront.&nbsp;</span></p><span data-dcnode-id="4135" instrument_node="">
</span><p data-dcnode-id="4129"><span data-dcnode-id="4134" instrument_node="">Camping at </span><a data-dcnode-id="4131" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stateparks.oregon.gov/index.cfm%3Fdo%3Dpark.profile%26parkId%3D129" rel="noopener" target="_blank"><strong data-dcnode-id="4132"><span data-dcnode-id="4133" instrument_node="">Fort Stevens State Park</span></strong></a><span data-dcnode-id="4130" instrument_node="">: An excellent option for my fellow tent-dwellers. This campground is HUGE and even offers yurts if you want to splurge, but you’ll need to reserve them well in advance.</span></p><span data-dcnode-id="4128" instrument_node="">
</span><h3 class="has-text-align-center" data-dcnode-id="4125"><span data-dcnode-id="4126" id="Seaside"><span data-dcnode-id="4127" instrument_node="">Seaside</span></span></h3><span data-dcnode-id="4124" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="4122"><img alt="" class="wp-image-81354" data-dcnode-id="4123" height="678" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//westcoastwayfarers.com/wp-content/uploads/2021/08/Seaside-Oregon-1024x678.jpg&amp;raw" srcset="https://westcoastwayfarers.com/wp-content/uploads/2021/08/Seaside-Oregon-1024x678.jpg 1024w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/Seaside-Oregon-300x199.jpg 300w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/Seaside-Oregon-768x509.jpg 768w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/Seaside-Oregon-1536x1017.jpg 1536w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/Seaside-Oregon-scaled.jpg 2048w" width="1024"></figure><p data-dcnode-id="4118"><strong data-dcnode-id="4120"><span data-dcnode-id="4121" instrument_node="">Drive time from Astoria</span></strong><span data-dcnode-id="4119" instrument_node="">: 30 minutes / 17 miles</span></p><span data-dcnode-id="4117" instrument_node="">
</span><p data-dcnode-id="4112"><span data-dcnode-id="4116" instrument_node="">As the closest beach town from Portland, Seaside sees a </span><em data-dcnode-id="4114"><span data-dcnode-id="4115" instrument_node="">lot </span></em><span data-dcnode-id="4113" instrument_node="">of traffic. It’s also very family-oriented so it makes a popular weekend vacation spot for Oregon families. Seaside is tacky, sometimes trashy, and utterly charming.</span></p><span data-dcnode-id="4111" instrument_node="">
</span><h4 data-dcnode-id="4108"><span data-dcnode-id="4109" id="Things_to_Do_in_Seaside"><span data-dcnode-id="4110" instrument_node="">Things to Do in Seaside</span></span></h4><span data-dcnode-id="4107" instrument_node="">
</span><p data-dcnode-id="4100"><strong data-dcnode-id="4105"><span data-dcnode-id="4106" instrument_node="">Aquarium</span></strong><span data-dcnode-id="4104" instrument_node="">: Try not to compare the </span><a data-dcnode-id="4102" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.seasideaquarium.com/" rel="noopener" target="_blank"><span data-dcnode-id="4103" instrument_node="">Seaside Aquarium</span></a><span data-dcnode-id="4101" instrument_node=""> with the big, glossy one in Newport; they’re different animals. This aquarium is cheaper and smaller but still great in its own right. Buy a cup of sardines for a buck and feed the seals!</span></p><span data-dcnode-id="4099" instrument_node="">
</span><p data-dcnode-id="4094"><a data-dcnode-id="4096" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/funlandseaside/" rel="noopener" target="_blank"><strong data-dcnode-id="4097"><span data-dcnode-id="4098" instrument_node="">Funland Arcade</span></strong></a><span data-dcnode-id="4095" instrument_node="">: It’s really fun! Relive the thrill of running through an arcade and winning reams of tickets to buy cheap toys. Skeeball, Tilt-a-Whirl, and bumper cars!</span></p><span data-dcnode-id="4093" instrument_node="">
</span><p data-dcnode-id="4088"><a data-dcnode-id="4090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.oregonhikers.org/field_guide/Saddle_Mountain_Hike" rel="noopener" target="_blank"><strong data-dcnode-id="4091"><span data-dcnode-id="4092" instrument_node="">Saddle Mountain Hike</span></strong></a><span data-dcnode-id="4089" instrument_node="">: This 5.2 mile hike is about a 30 minute drive east of Seaside, but soooooo worth it. On a clear day you get 360 degree views and can see the whole coastline up to Astoria and behind you the peaks of the Cascade Range.</span></p><span data-dcnode-id="4087" instrument_node="">
</span><p data-dcnode-id="4082"><a data-dcnode-id="4084" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.highlifeadventurepark.com/" rel="noopener" target="_blank"><strong data-dcnode-id="4085"><span data-dcnode-id="4086" instrument_node="">Highlife Adventure Park</span></strong></a><span data-dcnode-id="4083" instrument_node="">: Slightly spendy, but for what you get I doubt you’ll regret it. A truly memorable adventure for kids or adults who still want to be kids.&nbsp;</span></p><span data-dcnode-id="4081" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="4077"><img alt="" class="wp-image-2865" data-dcnode-id="4080" height="683" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//westcoastwayfarers.com/wp-content/uploads/2021/01/Saddle-Mountain-1024x683.jpg&amp;raw" srcset="https://westcoastwayfarers.com/wp-content/uploads/2021/01/Saddle-Mountain-1024x683.jpg 1024w, https://westcoastwayfarers.com/wp-content/uploads/2021/01/Saddle-Mountain-300x200.jpg 300w, https://westcoastwayfarers.com/wp-content/uploads/2021/01/Saddle-Mountain-768x512.jpg 768w, https://westcoastwayfarers.com/wp-content/uploads/2021/01/Saddle-Mountain-1536x1024.jpg 1536w, https://westcoastwayfarers.com/wp-content/uploads/2021/01/Saddle-Mountain-scaled.jpg 2048w, https://westcoastwayfarers.com/wp-content/uploads/2021/01/Saddle-Mountain-900x600.jpg 900w, https://westcoastwayfarers.com/wp-content/uploads/2021/01/Saddle-Mountain-600x400.jpg 600w" width="1024"><figcaption data-dcnode-id="4078"><span data-dcnode-id="4079" instrument_node="">The view from the summit of Saddle Mountain</span></figcaption></figure><hr class="wp-block-separator" data-dcnode-id="4076"><h3 class="has-text-align-center" data-dcnode-id="4073"><span data-dcnode-id="4074" id="Ecola_State_Park"><span data-dcnode-id="4075" instrument_node="">Ecola State Park</span></span></h3><span data-dcnode-id="4072" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="4070"><img alt="" class="wp-image-2864" data-dcnode-id="4071" height="683" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//westcoastwayfarers.com/wp-content/uploads/2021/01/Ecola-State-Park-1024x683.jpg&amp;raw" srcset="https://westcoastwayfarers.com/wp-content/uploads/2021/01/Ecola-State-Park-1024x683.jpg 1024w, https://westcoastwayfarers.com/wp-content/uploads/2021/01/Ecola-State-Park-300x200.jpg 300w, https://westcoastwayfarers.com/wp-content/uploads/2021/01/Ecola-State-Park-768x512.jpg 768w, https://westcoastwayfarers.com/wp-content/uploads/2021/01/Ecola-State-Park-1536x1024.jpg 1536w, https://westcoastwayfarers.com/wp-content/uploads/2021/01/Ecola-State-Park-scaled.jpg 2048w, https://westcoastwayfarers.com/wp-content/uploads/2021/01/Ecola-State-Park-900x600.jpg 900w, https://westcoastwayfarers.com/wp-content/uploads/2021/01/Ecola-State-Park-600x400.jpg 600w" width="1024"></figure><p data-dcnode-id="4066"><strong data-dcnode-id="4068"><span data-dcnode-id="4069" instrument_node="">Drive time from Seaside</span></strong><span data-dcnode-id="4067" instrument_node="">: 18 minutes / 9 miles</span></p><span data-dcnode-id="4065" instrument_node="">
</span><p data-dcnode-id="4061"><a data-dcnode-id="4063" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stateparks.oregon.gov/index.cfm%3Fdo%3Dpark.profile%26parkId%3D136" rel="noopener" target="_blank"><span data-dcnode-id="4064" instrument_node="">Ecola State Park</span></a><span data-dcnode-id="4062" instrument_node=""> sits right on the Tillamook Head halfway between Seaside and Cannon Beach. If you’re just stopping by on your drive south, you catch great views of Cannon Beach and Haystack Rock to the south, or straight out west to “Terrible Tilly,” an 1880 lighthouse shut down in 1957 because it was too treacherous for light keepers. </span></p><span data-dcnode-id="4060" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="4056"><img alt="" class="wp-image-3478" data-dcnode-id="4059" height="683" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//westcoastwayfarers.com/wp-content/uploads/2021/03/Indian-Beach-Ecola-State-Park-1024x683.jpg&amp;raw" srcset="https://westcoastwayfarers.com/wp-content/uploads/2021/03/Indian-Beach-Ecola-State-Park-1024x683.jpg 1024w, https://westcoastwayfarers.com/wp-content/uploads/2021/03/Indian-Beach-Ecola-State-Park-300x200.jpg 300w, https://westcoastwayfarers.com/wp-content/uploads/2021/03/Indian-Beach-Ecola-State-Park-768x512.jpg 768w, https://westcoastwayfarers.com/wp-content/uploads/2021/03/Indian-Beach-Ecola-State-Park-1536x1024.jpg 1536w, https://westcoastwayfarers.com/wp-content/uploads/2021/03/Indian-Beach-Ecola-State-Park-scaled.jpg 2048w, https://westcoastwayfarers.com/wp-content/uploads/2021/03/Indian-Beach-Ecola-State-Park-900x600.jpg 900w, https://westcoastwayfarers.com/wp-content/uploads/2021/03/Indian-Beach-Ecola-State-Park-600x400.jpg 600w" width="1024"><figcaption data-dcnode-id="4057"><span data-dcnode-id="4058" instrument_node="">Indian Beach at Ecola State Park</span></figcaption></figure><p data-dcnode-id="4051"><span data-dcnode-id="4055" instrument_node="">If you’ve got more time, this is a great place for some hikes! Try this lovely </span><a data-dcnode-id="4053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.alltrails.com/trail/us/oregon/clatsop-loop-trail-from-indian-beach" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="4054" instrument_node="">3 mile loop hike from Indian Beach</span></a><span data-dcnode-id="4052" instrument_node="">. </span></p><span data-dcnode-id="4050" instrument_node="">
</span><p data-dcnode-id="4045"><span data-dcnode-id="4049" instrument_node="">If you’re looking for a longer jaunt, I recommend this </span><a data-dcnode-id="4047" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.oregonhikers.org/field_guide/Tillamook_Head_Traverse_Hike" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="4048" instrument_node="">6.3 mile traverse hike</span></a><span data-dcnode-id="4046" instrument_node=""> (you’ll need a shuttle or car drop, or you can do it as an out-and-back for a total of 12 miles).&nbsp;</span></p><span data-dcnode-id="4044" instrument_node="">
</span><h3 class="has-text-align-center" data-dcnode-id="4041"><span data-dcnode-id="4042" id="Cannon_Beach"><span data-dcnode-id="4043" instrument_node="">Cannon Beach</span></span></h3><span data-dcnode-id="4040" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="4038"><img alt="" class="wp-image-81303" data-dcnode-id="4039" height="680" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//westcoastwayfarers.com/wp-content/uploads/2021/08/Cannon-Beach-1024x680.jpg&amp;raw" srcset="https://westcoastwayfarers.com/wp-content/uploads/2021/08/Cannon-Beach-1024x680.jpg 1024w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/Cannon-Beach-300x199.jpg 300w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/Cannon-Beach-768x510.jpg 768w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/Cannon-Beach-1536x1020.jpg 1536w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/Cannon-Beach-scaled.jpg 2048w" width="1024"></figure><p data-dcnode-id="4034"><strong data-dcnode-id="4036"><span data-dcnode-id="4037" instrument_node="">Drive time from Ecola:</span></strong><span data-dcnode-id="4035" instrument_node=""> 12 minutes / 3 miles</span></p><span data-dcnode-id="4033" instrument_node="">
</span><p data-dcnode-id="4028"><span data-dcnode-id="4032" instrument_node="">Cannon Beach is a bit nicer, classier, and chicer than Seaside, and I like both towns equally for different reasons. Cannon also sees a ton of local tourism due to its proximity to Portland. Here you’ll find </span><em data-dcnode-id="4030"><span data-dcnode-id="4031" instrument_node="">slightly</span></em><span data-dcnode-id="4029" instrument_node=""> more upscale (but we’re still talking Oregon coast here) shops, dining, and hotels.&nbsp;</span></p><span data-dcnode-id="4027" instrument_node="">
</span><h4 data-dcnode-id="4024"><span data-dcnode-id="4025" id="Things_to_Do_in_Cannon_Beach"><span data-dcnode-id="4026" instrument_node="">Things to Do in Cannon Beach</span></span></h4><span data-dcnode-id="4023" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="4021"><img alt="" class="wp-image-81355" data-dcnode-id="4022" height="682" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//westcoastwayfarers.com/wp-content/uploads/2021/08/DSC01363-1024x682.jpg&amp;raw" srcset="https://westcoastwayfarers.com/wp-content/uploads/2021/08/DSC01363-1024x682.jpg 1024w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/DSC01363-300x200.jpg 300w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/DSC01363-768x512.jpg 768w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/DSC01363-1536x1024.jpg 1536w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/DSC01363.jpg 2000w" width="1024"></figure><p data-dcnode-id="4007"><span data-dcnode-id="4020" instrument_node="">Obligatory post about </span><strong data-dcnode-id="4018"><span data-dcnode-id="4019" instrument_node="">Haystack Rock</span></strong><span data-dcnode-id="4017" instrument_node="">: Though it’s very big (235 feet) and cool to look at, it’s more fun if you can catch it at low tide and explore the tide pools all around it. Fun fact! There’s an actually taller (327 feet) but less Insta’d Haystack Rock about an hour and a half south in Pacific City.&nbsp;</span><br data-dcnode-id="4016"><br data-dcnode-id="4015"><a data-dcnode-id="4012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stateparks.oregon.gov/index.cfm%3Fdo%3Dpark.profile%26parkId%3D137" rel="noopener" target="_blank"><strong data-dcnode-id="4013"><span data-dcnode-id="4014" instrument_node="">Hug Point</span></strong></a><span data-dcnode-id="4011" instrument_node="">: First thing’s first—Hug Point is gorgeous but the parking lot is small and fills up </span><em data-dcnode-id="4009"><span data-dcnode-id="4010" instrument_node="">fast</span></em><span data-dcnode-id="4008" instrument_node=""> on the weekends, and it’s tricky to find a parking spot elsewhere. Try to get there in the morning and at low tide if you can! Much of the beach here can disappear under the water and you don’t want to get stranded.</span></p><span data-dcnode-id="4006" instrument_node="">
</span><p data-dcnode-id="3999"><strong data-dcnode-id="4004"><span data-dcnode-id="4005" instrument_node="">Walk the Main Drag and Catch Local Events</span></strong><span data-dcnode-id="4003" instrument_node="">: Cannon Beach has a great main drag with a number of shops and restaurants to pop into. It’s also home to a host of beach-y events like the </span><a data-dcnode-id="4001" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cannonbeach.org/events-and-festivals/sandcastle-contest/" rel="noopener" target="_blank"><span data-dcnode-id="4002" instrument_node="">Sandcastle Contest </span></a><span data-dcnode-id="4000" instrument_node="">and the Fat Bike Festival. It seems like every other weekend in spring and fall there’s something going on here.</span></p><span data-dcnode-id="3998" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="3994"><img alt="" class="wp-image-2884" data-dcnode-id="3997" height="624" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//westcoastwayfarers.com/wp-content/uploads/2021/01/Hug-Point-1024x624.jpg&amp;raw" srcset="https://westcoastwayfarers.com/wp-content/uploads/2021/01/Hug-Point-1024x624.jpg 1024w, https://westcoastwayfarers.com/wp-content/uploads/2021/01/Hug-Point-300x183.jpg 300w, https://westcoastwayfarers.com/wp-content/uploads/2021/01/Hug-Point-768x468.jpg 768w, https://westcoastwayfarers.com/wp-content/uploads/2021/01/Hug-Point-1536x935.jpg 1536w, https://westcoastwayfarers.com/wp-content/uploads/2021/01/Hug-Point-scaled.jpg 2048w" width="1024"><figcaption data-dcnode-id="3995"><span data-dcnode-id="3996" instrument_node="">Hug Point near Cannon Beach</span></figcaption></figure><h4 data-dcnode-id="3991"><span data-dcnode-id="3992" id="Places_to_Stay_in_Cannon_Beach"><span data-dcnode-id="3993" instrument_node="">Places to Stay in Cannon Beach</span></span></h4><span data-dcnode-id="3990" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="3986"><img alt="" class="wp-image-81367" data-dcnode-id="3989" height="768" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//westcoastwayfarers.com/wp-content/uploads/2021/08/IMG_9575-1024x768.jpg&amp;raw" srcset="https://westcoastwayfarers.com/wp-content/uploads/2021/08/IMG_9575-1024x768.jpg 1024w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/IMG_9575-300x225.jpg 300w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/IMG_9575-768x576.jpg 768w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/IMG_9575-1536x1152.jpg 1536w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/IMG_9575.jpg 2000w" width="1024"><figcaption data-dcnode-id="3987"><span data-dcnode-id="3988" instrument_node="">The Waves is RIGHT ON Cannon Beach!</span></figcaption></figure><p data-dcnode-id="3978"><a data-dcnode-id="3983" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.booking.com/hotel/us/the-waves-motel.en.html%3Faid%3D2106063%26no_rooms%3D1%26group_adults%3D2" rel="noreferrer noopener nofollow" target="_blank"><strong data-dcnode-id="3984"><span data-dcnode-id="3985" instrument_node="">The Waves</span></strong></a><span data-dcnode-id="3982" instrument_node="">: Great location, great rates, clean rooms. Located on the beach at the north end of town (and right by </span><a data-dcnode-id="3980" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//insomniacoffee.co/" rel="noopener" target="_blank"><span data-dcnode-id="3981" instrument_node="">Insomnia Coffee</span></a><span data-dcnode-id="3979" instrument_node="">).</span></p><span data-dcnode-id="3977" instrument_node="">
</span><p data-dcnode-id="3972"><a data-dcnode-id="3974" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.booking.com/hotel/us/surfsand-resort.en.html%3Faid%3D2106063%26no_rooms%3D1%26group_adults%3D2" rel="noreferrer noopener nofollow" target="_blank"><strong data-dcnode-id="3975"><span data-dcnode-id="3976" instrument_node="">Surfsand Resort</span></strong></a><span data-dcnode-id="3973" instrument_node="">: Moving up the fancy ladder and down the coastline is the Surfsand Resort. This lovely hotel is also on the beach and sits very close to the famous Haystack Rock.</span></p><span data-dcnode-id="3971" instrument_node="">
</span><p data-dcnode-id="3966"><a data-dcnode-id="3968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.booking.com/hotel/us/the-ocean-lodge.en.html%3Faid%3D2106063%26no_rooms%3D1%26group_adults%3D2" rel="noreferrer noopener nofollow" target="_blank"><strong data-dcnode-id="3969"><span data-dcnode-id="3970" instrument_node="">The Ocean Lodge</span></strong></a><span data-dcnode-id="3967" instrument_node="">: Another great, oceanfront hotel close to Haystack Rock.</span></p><span data-dcnode-id="3965" instrument_node="">
</span><p data-dcnode-id="3957"><strong data-dcnode-id="3963"><span data-dcnode-id="3964" instrument_node="">Wanting a place all of your own?</span></strong><span data-dcnode-id="3962" instrument_node=""> This </span><a data-dcnode-id="3959" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jdoqocy.com/click-100295489-11553823%3Furl%3Dhttps%253A%252F%252Fwww.vrbo.com%252F1337495%253FnoDates%253Dtrue" rel="noreferrer noopener nofollow" target="_blank"><strong data-dcnode-id="3960"><span data-dcnode-id="3961" instrument_node="">three-bedroom “sand castle”</span></strong></a><span data-dcnode-id="3958" instrument_node=""> sits right on the beach and is only one block away from restaurants and shops.</span></p><span data-dcnode-id="3956" instrument_node="">
</span><h3 class="has-text-align-center" data-dcnode-id="3953"><span data-dcnode-id="3954" id="Oswald_West_State_Park"><span data-dcnode-id="3955" instrument_node="">Oswald West State Park</span></span></h3><span data-dcnode-id="3952" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="3948"><img alt="" class="wp-image-3479" data-dcnode-id="3951" height="683" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//westcoastwayfarers.com/wp-content/uploads/2021/03/Neahkahnie-Mountain-Viewpoint-1024x683.jpg&amp;raw" srcset="https://westcoastwayfarers.com/wp-content/uploads/2021/03/Neahkahnie-Mountain-Viewpoint-1024x683.jpg 1024w, https://westcoastwayfarers.com/wp-content/uploads/2021/03/Neahkahnie-Mountain-Viewpoint-300x200.jpg 300w, https://westcoastwayfarers.com/wp-content/uploads/2021/03/Neahkahnie-Mountain-Viewpoint-768x512.jpg 768w, https://westcoastwayfarers.com/wp-content/uploads/2021/03/Neahkahnie-Mountain-Viewpoint-1536x1025.jpg 1536w, https://westcoastwayfarers.com/wp-content/uploads/2021/03/Neahkahnie-Mountain-Viewpoint-scaled.jpg 2048w, https://westcoastwayfarers.com/wp-content/uploads/2021/03/Neahkahnie-Mountain-Viewpoint-900x600.jpg 900w, https://westcoastwayfarers.com/wp-content/uploads/2021/03/Neahkahnie-Mountain-Viewpoint-600x400.jpg 600w" width="1024"><figcaption data-dcnode-id="3949"><span data-dcnode-id="3950" instrument_node="">The view from  Neahkahnie Mountain</span></figcaption></figure><p data-dcnode-id="3944"><strong data-dcnode-id="3946"><span data-dcnode-id="3947" instrument_node="">Drive time from Cannon</span></strong><span data-dcnode-id="3945" instrument_node="">: 9 minutes / 6.6 miles</span></p><span data-dcnode-id="3943" instrument_node="">
</span><p data-dcnode-id="3936"><a data-dcnode-id="3941" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stateparks.oregon.gov/index.cfm%3Fdo%3Dpark.profile%26parkId%3D139" rel="noopener" target="_blank"><span data-dcnode-id="3942" instrument_node="">Oswald West</span></a><span data-dcnode-id="3940" instrument_node=""> sits just south of Cannon Beach and is a popular destination for surfers and hikers and spectacular-scenery-lovers of all stripes. While there you must check out the sheltered </span><a data-dcnode-id="3938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stateparks.oregon.gov/index.cfm%3Fdo%3Dpark.profile%26parkId%3D139" rel="noopener" target="_blank"><span data-dcnode-id="3939" instrument_node="">Short Sand Beach</span></a><span data-dcnode-id="3937" instrument_node="">. </span></p><span data-dcnode-id="3935" instrument_node="">
</span><p data-dcnode-id="3927"><span data-dcnode-id="3934" instrument_node="">Two awesome hikes in the park are the 4.5 mile </span><a data-dcnode-id="3932" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.alltrails.com/trail/us/oregon/cape-falcon" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="3933" instrument_node="">Cape Falcon Trail</span></a><span data-dcnode-id="3931" instrument_node=""> and Neahkahnie Mountain (my favorite coastal hike). There are </span><a data-dcnode-id="3929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.oregonhikers.org/field_guide/Neahkahnie_Mountain_Viewpoint" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="3930" instrument_node="">four different options</span></a><span data-dcnode-id="3928" instrument_node=""> for getting to the top of Neahkahnie, so it’s up to you and your time allowance to see how far you want to push it. Regardless of your route, stunning views of Nehalem Bay and the coast await.</span></p><span data-dcnode-id="3926" instrument_node="">
</span><p class="has-text-align-center has-theme-palette-7-background-color has-background" data-dcnode-id="3919"><strong data-dcnode-id="3924"><span data-dcnode-id="3925" instrument_node="">Interested in hiking on the Oregon Coast? </span></strong><span data-dcnode-id="3923" instrument_node="">Don’t miss our guide to the </span><a data-dcnode-id="3921" data-id="3447" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//westcoastwayfarers.com/best-hikes-on-the-oregon-coast/"><span data-dcnode-id="3922" instrument_node="">best hikes on the Oregon Coast</span></a><span data-dcnode-id="3920" instrument_node=""> with all the information you need to hit the trail. </span></p><span data-dcnode-id="3918" instrument_node="">
</span><h3 class="has-text-align-center" data-dcnode-id="3915"><span data-dcnode-id="3916" id="Tillamook"><span data-dcnode-id="3917" instrument_node="">Tillamook</span></span></h3><span data-dcnode-id="3914" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="3912"><img alt="" class="wp-image-3053" data-dcnode-id="3913" height="683" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//westcoastwayfarers.com/wp-content/uploads/2021/02/Tillamook-Creamery-1024x683.jpg&amp;raw" srcset="https://westcoastwayfarers.com/wp-content/uploads/2021/02/Tillamook-Creamery-1024x683.jpg 1024w, https://westcoastwayfarers.com/wp-content/uploads/2021/02/Tillamook-Creamery-300x200.jpg 300w, https://westcoastwayfarers.com/wp-content/uploads/2021/02/Tillamook-Creamery-768x512.jpg 768w, https://westcoastwayfarers.com/wp-content/uploads/2021/02/Tillamook-Creamery-1536x1024.jpg 1536w, https://westcoastwayfarers.com/wp-content/uploads/2021/02/Tillamook-Creamery-scaled.jpg 2048w, https://westcoastwayfarers.com/wp-content/uploads/2021/02/Tillamook-Creamery-900x600.jpg 900w, https://westcoastwayfarers.com/wp-content/uploads/2021/02/Tillamook-Creamery-600x400.jpg 600w" width="1024"></figure><p data-dcnode-id="3908"><strong data-dcnode-id="3910"><span data-dcnode-id="3911" instrument_node="">Drive time from Oswald West State Park</span></strong><span data-dcnode-id="3909" instrument_node="">: 40 minutes / 28 miles</span></p><span data-dcnode-id="3907" instrument_node="">
</span><p data-dcnode-id="3905"><span data-dcnode-id="3906" instrument_node="">The town of Tillamook sits slightly inland from the beach along the Tillamook Bay. It’s known for its surrounding farmland and from those farms come all the cheese you could ever ask for. </span></p><span data-dcnode-id="3904" instrument_node="">
</span><p data-dcnode-id="3902"><span data-dcnode-id="3903" instrument_node="">Yes, you’ve likely heard of (and eaten) Tillamook cheese and ice cream and it’s great! Believe me, I always have a brick of their extra sharp cheddar in my fridge. But, there are many other great creameries and activities to keep you busy in Tillamook.&nbsp;</span></p><span data-dcnode-id="3901" instrument_node="">
</span><h4 data-dcnode-id="3898"><span data-dcnode-id="3899" id="Things_to_Do_in_Tillamook"><span data-dcnode-id="3900" instrument_node="">Things to Do in Tillamook</span></span></h4><span data-dcnode-id="3897" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="3895"><img alt="" class="wp-image-81385" data-dcnode-id="3896" height="683" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//westcoastwayfarers.com/wp-content/uploads/2021/08/Cape-Meares-Lighthouse-1024x683.jpg&amp;raw" srcset="https://westcoastwayfarers.com/wp-content/uploads/2021/08/Cape-Meares-Lighthouse-1024x683.jpg 1024w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/Cape-Meares-Lighthouse-300x200.jpg 300w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/Cape-Meares-Lighthouse-768x513.jpg 768w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/Cape-Meares-Lighthouse-1536x1025.jpg 1536w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/Cape-Meares-Lighthouse-scaled.jpg 2048w" width="1024"></figure><p data-dcnode-id="3888"><strong data-dcnode-id="3893"><span data-dcnode-id="3894" instrument_node="">Cheese Factory!</span></strong><span data-dcnode-id="3892" instrument_node="">: The </span><a data-dcnode-id="3890" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tillamook.com/visit-us/creamery" rel="noopener" target="_blank"><span data-dcnode-id="3891" instrument_node="">Tillamook Creamery</span></a><span data-dcnode-id="3889" instrument_node=""> is kinda famous and for good reason. It’s huge. It’s delicious. They’re good to the local farmers. And they make ice cream! Go for the free samples and factory tour, stay for lunch.</span></p><span data-dcnode-id="3887" instrument_node="">
</span><p data-dcnode-id="3882"><a data-dcnode-id="3884" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.blueheronoregon.com/" rel="noopener" target="_blank"><strong data-dcnode-id="3885"><span data-dcnode-id="3886" instrument_node="">Blue Heron Cheese</span></strong></a><span data-dcnode-id="3883" instrument_node="">: A real contender for best cheese in Tillamook. You be the judge! Not as flashy or big, but many delicious samples await. If you’re a fan of creamy French cheeses, this place is your jam.</span></p><span data-dcnode-id="3881" instrument_node="">
</span><p data-dcnode-id="3873"><a data-dcnode-id="3878" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stateparks.oregon.gov/index.cfm%3Fdo%3Dpark.profile%26parkId%3D131" rel="noopener" target="_blank"><strong data-dcnode-id="3879"><span data-dcnode-id="3880" instrument_node="">Cape Meares Lighthouse</span></strong></a><span data-dcnode-id="3877" instrument_node="">: This lighthouse earns its reputation for being the shortest lighthouse on the Oregon Coast. Well, that’s not </span><em data-dcnode-id="3875"><span data-dcnode-id="3876" instrument_node="">all </span></em><span data-dcnode-id="3874" instrument_node="">it’s famous for (though it is true). It also offers killer views, a weird looking “octopus” tree, and for you lighthouse fans out there it features a kerosene lens which apparently is rather unique!</span></p><span data-dcnode-id="3872" instrument_node="">
</span><p data-dcnode-id="3864"><a data-dcnode-id="3869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stateparks.oregon.gov/index.cfm%3Fdo%3Dpark.profile%26parkId%3D134" rel="noopener" target="_blank"><strong data-dcnode-id="3870"><span data-dcnode-id="3871" instrument_node="">Cape Lookout</span></strong></a><span data-dcnode-id="3868" instrument_node="">: This gorgeous park is open for day-use and camping (and has an amazing campground). There are a number of great hikes, but </span><a data-dcnode-id="3866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.oregonhikers.org/field_guide/Cape_Lookout_Hike" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="3867" instrument_node="">this 5 mile out-and-back</span></a><span data-dcnode-id="3865" instrument_node=""> is my favorite. This spot is known for its great whale watching, and you’ll catch the most in the fall and spring.&nbsp;</span></p><span data-dcnode-id="3863" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="3859"><img alt="" class="wp-image-3480" data-dcnode-id="3862" height="683" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//westcoastwayfarers.com/wp-content/uploads/2021/03/Cape-Lookout-1024x683.jpg&amp;raw" srcset="https://westcoastwayfarers.com/wp-content/uploads/2021/03/Cape-Lookout-1024x683.jpg 1024w, https://westcoastwayfarers.com/wp-content/uploads/2021/03/Cape-Lookout-300x200.jpg 300w, https://westcoastwayfarers.com/wp-content/uploads/2021/03/Cape-Lookout-768x512.jpg 768w, https://westcoastwayfarers.com/wp-content/uploads/2021/03/Cape-Lookout-1536x1024.jpg 1536w, https://westcoastwayfarers.com/wp-content/uploads/2021/03/Cape-Lookout-scaled.jpg 2048w, https://westcoastwayfarers.com/wp-content/uploads/2021/03/Cape-Lookout-900x600.jpg 900w, https://westcoastwayfarers.com/wp-content/uploads/2021/03/Cape-Lookout-600x400.jpg 600w" width="1024"><figcaption data-dcnode-id="3860"><span data-dcnode-id="3861" instrument_node="">The view from Cape Lookout (it’s a great hike!)</span></figcaption></figure><h4 data-dcnode-id="3856"><span data-dcnode-id="3857" id="Places_to_Stay_in_Tillamook"><span data-dcnode-id="3858" instrument_node="">Places to Stay in Tillamook</span></span></h4><span data-dcnode-id="3855" instrument_node="">
</span><p data-dcnode-id="3850"><a data-dcnode-id="3852" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.booking.com/hotel/us/netarts-surf-inn.en.html%3Faid%3D2106063%26no_rooms%3D1%26group_adults%3D2" rel="noreferrer noopener nofollow" target="_blank"><strong data-dcnode-id="3853"><span data-dcnode-id="3854" instrument_node="">Netarts Surf Inn</span></strong></a><span data-dcnode-id="3851" instrument_node="">: This classic beach motel doesn’t look like much from the road, but the rooms are cute and clean and it’s just steps away from the beach!</span></p><span data-dcnode-id="3849" instrument_node="">
</span><p data-dcnode-id="3844"><a data-dcnode-id="3846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jdoqocy.com/click-100295489-13828058%3Furl%3Dhttps%253A%252F%252Fwww.hotels.com%252Fho524397%252Fsheltered-nook-tiny-homes-on-tillamook-bay-bay-city-united-states-of-america%252F" rel="noreferrer noopener nofollow" target="_blank"><strong data-dcnode-id="3847"><span data-dcnode-id="3848" instrument_node="">Sheltered Nook</span></strong></a><span data-dcnode-id="3845" instrument_node="">: A truly unique experience on the coast. The Sheltered Nook is a collection of six, modern tiny-homes all centered around a communal outdoor living space.&nbsp;</span></p><span data-dcnode-id="3843" instrument_node="">
</span><p data-dcnode-id="3838"><a data-dcnode-id="3840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kqzyfj.com/click-100295489-11553823%3Furl%3Dhttps%253A%252F%252Fwww.vrbo.com%252F569526%253FnoDates%253Dtrue" rel="noreferrer noopener nofollow" target="_blank"><strong data-dcnode-id="3841"><span data-dcnode-id="3842" instrument_node="">Fancy Yurt Living!</span></strong></a><span data-dcnode-id="3839" instrument_node="">: Who doesn’t love a yurt? Especially one that features secluded bayfront access with a hot tub!</span></p><span data-dcnode-id="3837" instrument_node="">
</span><p data-dcnode-id="3832"><a data-dcnode-id="3834" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stateparks.oregon.gov/index.cfm%3Fdo%3Dpark.profile%26parkId%3D134" rel="noopener" target="_blank"><strong data-dcnode-id="3835"><span data-dcnode-id="3836" instrument_node="">Camping at Cape Lookout State Park</span></strong></a><span data-dcnode-id="3833" instrument_node="">: A huge and well-maintained campground just a few minutes walk to the beach.</span></p><span data-dcnode-id="3831" instrument_node="">
</span><h3 class="has-text-align-center" data-dcnode-id="3828"><span data-dcnode-id="3829" id="Pacific_City_Cape_Kiwanda"><span data-dcnode-id="3830" instrument_node="">Pacific City &amp; Cape Kiwanda</span></span></h3><span data-dcnode-id="3827" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="3825"><img alt="" class="wp-image-81356" data-dcnode-id="3826" height="682" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//westcoastwayfarers.com/wp-content/uploads/2021/08/DSC01204-1024x682.jpg&amp;raw" srcset="https://westcoastwayfarers.com/wp-content/uploads/2021/08/DSC01204-1024x682.jpg 1024w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/DSC01204-300x200.jpg 300w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/DSC01204-768x512.jpg 768w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/DSC01204-1536x1024.jpg 1536w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/DSC01204.jpg 2000w" width="1024"></figure><p data-dcnode-id="3821"><strong data-dcnode-id="3823"><span data-dcnode-id="3824" instrument_node="">Drive time from Tillamook</span></strong><span data-dcnode-id="3822" instrument_node="">: 32 minutes / 25 miles</span></p><span data-dcnode-id="3820" instrument_node="">
</span><p data-dcnode-id="3818"><span data-dcnode-id="3819" instrument_node="">Pacific City has become synonymous with Cape Kiwanda and the dunes that the area is known for. It’s also a popular destination for surfers, hang-gliders, and for the non-thrill seekers—kites!</span></p><span data-dcnode-id="3817" instrument_node="">
</span><h4 data-dcnode-id="3814"><span data-dcnode-id="3815" id="Things_to_Do_in_Pacific_City"><span data-dcnode-id="3816" instrument_node="">Things to Do in Pacific City</span></span></h4><span data-dcnode-id="3813" instrument_node="">
</span><p data-dcnode-id="3808"><span data-dcnode-id="3812" instrument_node="">When looking out at the ocean at Pacific City, it’s impossible to miss the dunes and giant </span><strong data-dcnode-id="3810"><span data-dcnode-id="3811" instrument_node="">Cape Kiwanda</span></strong><span data-dcnode-id="3809" instrument_node=""> jutting out into the sea on the north side of the beach. </span></p><span data-dcnode-id="3807" instrument_node="">
</span><p data-dcnode-id="3805"><span data-dcnode-id="3806" instrument_node="">A hike up to the top will give you spectacular views, and there’s a ton of cool rock formations you can try your best to climb on top of and look out at the (other) Haystack Rock. </span></p><span data-dcnode-id="3804" instrument_node="">
</span><p data-dcnode-id="3802"><span data-dcnode-id="3803" instrument_node="">Be mindful of the signage though! Some of the ground is unstable and you don’t want to continue the rest of your road trip in an ambulance.</span></p><span data-dcnode-id="3801" instrument_node="">
</span><p data-dcnode-id="3791"><strong data-dcnode-id="3799"><span data-dcnode-id="3800" instrument_node="">Coffee/Food/Beer</span></strong><span data-dcnode-id="3798" instrument_node="">: </span><a data-dcnode-id="3796" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stimuluscoffee.com/" rel="noopener" target="_blank"><span data-dcnode-id="3797" instrument_node="">Stimulus Coffee &amp; Bakery</span></a><span data-dcnode-id="3795" instrument_node=""> is right across the street from the dunes, so you might as well grab coffee and a muffin then head out to the beach. Across the street from Stimulus is </span><a data-dcnode-id="3793" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pelicanbrewing.com/" rel="noopener" target="_blank"><span data-dcnode-id="3794" instrument_node="">Pelican Brewing Co</span></a><span data-dcnode-id="3792" instrument_node=""> that’s been holding down the fort in Pacific City for 25 years! They have a few locations along the coast, but Pacific City is their home base and the only location that sits right on the sand. Clam chowder, burgers, beer—what more could you want?</span></p><span data-dcnode-id="3790" instrument_node="">
</span><p data-dcnode-id="3785"><a data-dcnode-id="3787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fws.gov/refuge/nestucca_bay/" rel="noopener" target="_blank"><strong data-dcnode-id="3788"><span data-dcnode-id="3789" instrument_node="">Nestucca Bay National Wildlife Refuge</span></strong></a><span data-dcnode-id="3786" instrument_node="">: Just south of Pacific City in Cloverdale is beautiful Nestucca Bay. This is a great spot for birders, but even if you’re not a birder you’ll enjoy the miles of well-maintained paths to great views. Bonus, many of the paths are wheelchair accessible.&nbsp;</span></p><span data-dcnode-id="3784" instrument_node="">
</span><h3 class="has-text-align-center" data-dcnode-id="3781"><span data-dcnode-id="3782" id="Lincoln_City"><span data-dcnode-id="3783" instrument_node="">Lincoln City</span></span></h3><span data-dcnode-id="3780" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="3776"><img alt="" class="wp-image-81357" data-dcnode-id="3779" height="682" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//westcoastwayfarers.com/wp-content/uploads/2021/08/DSC01120-1024x682.jpg&amp;raw" srcset="https://westcoastwayfarers.com/wp-content/uploads/2021/08/DSC01120-1024x682.jpg 1024w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/DSC01120-300x200.jpg 300w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/DSC01120-768x512.jpg 768w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/DSC01120-1536x1024.jpg 1536w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/DSC01120.jpg 2000w" width="1024"><figcaption data-dcnode-id="3777"><span data-dcnode-id="3778" instrument_node="">God’s Thumb, one of the best hikes near Lincoln City</span></figcaption></figure><p data-dcnode-id="3772"><strong data-dcnode-id="3774"><span data-dcnode-id="3775" instrument_node="">Drive time from Pacific City</span></strong><span data-dcnode-id="3773" instrument_node="">: 32 minutes / 22 miles</span></p><span data-dcnode-id="3771" instrument_node="">
</span><p data-dcnode-id="3763"><span data-dcnode-id="3770" instrument_node="">About 30 minutes south of Pacific City is another great Oregon coast spot, Lincoln City. This town is fun to walk around in and grab lunch (like at the </span><a data-dcnode-id="3768" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thewildflowergrill.com/" rel="noopener" target="_blank"><span data-dcnode-id="3769" instrument_node="">Wildflower Grill</span></a><span data-dcnode-id="3767" instrument_node=""> – yum!), or explore the waters on a kayak, canoe, or SUP with a rental at </span><a data-dcnode-id="3765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//safaritownsurf.com/" rel="noopener" target="_blank"><span data-dcnode-id="3766" instrument_node="">Safari Town Surf,</span></a><span data-dcnode-id="3764" instrument_node=""> but the best part of this area is the hiking!&nbsp;&nbsp;</span></p><span data-dcnode-id="3762" instrument_node="">
</span><h4 data-dcnode-id="3759"><span data-dcnode-id="3760" id="Things_to_Do_in_Lincoln_City"><span data-dcnode-id="3761" instrument_node="">Things to Do in Lincoln City</span></span></h4><span data-dcnode-id="3758" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="3752"><img alt="" class="wp-image-81106" data-dcnode-id="3757" height="683" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//westcoastwayfarers.com/wp-content/uploads/2021/06/Cascade-Head-on-the-Oregon-Coast-1024x683.jpg&amp;raw" srcset="https://westcoastwayfarers.com/wp-content/uploads/2021/06/Cascade-Head-on-the-Oregon-Coast-1024x683.jpg 1024w, https://westcoastwayfarers.com/wp-content/uploads/2021/06/Cascade-Head-on-the-Oregon-Coast-300x200.jpg 300w, https://westcoastwayfarers.com/wp-content/uploads/2021/06/Cascade-Head-on-the-Oregon-Coast-768x512.jpg 768w, https://westcoastwayfarers.com/wp-content/uploads/2021/06/Cascade-Head-on-the-Oregon-Coast-1536x1024.jpg 1536w, https://westcoastwayfarers.com/wp-content/uploads/2021/06/Cascade-Head-on-the-Oregon-Coast-scaled.jpg 2048w" width="1024"><figcaption data-dcnode-id="3753"><span data-dcnode-id="3756" instrument_node="">Cascade Head is one of the </span><a data-dcnode-id="3754" data-id="3447" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//westcoastwayfarers.com/best-hikes-on-the-oregon-coast/"><span data-dcnode-id="3755" instrument_node="">best hikes on the Oregon Coast</span></a></figcaption></figure><p data-dcnode-id="3746"><span data-dcnode-id="3751" instrument_node="">For the best views, check out </span><a data-dcnode-id="3748" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.alltrails.com/trail/us/oregon/cascade-head" rel="noreferrer noopener nofollow" target="_blank"><strong data-dcnode-id="3749"><span data-dcnode-id="3750" instrument_node="">Cascade Head</span></strong></a><span data-dcnode-id="3747" instrument_node="">. This 6 mile out-and-back is surprisingly difficult as it climbs up for killer views down the coast and out onto the Salmon River estuary. A word to the wise: this hike is very exposed at the top and can be quite windy and sunny so bring a hat/sunscreen/windbreaker. Be prepared for anything!&nbsp;</span></p><span data-dcnode-id="3745" instrument_node="">
</span><p data-dcnode-id="3740"><a data-dcnode-id="3742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.oregonhikers.org/field_guide/Drift_Creek_Falls_Hike" rel="noreferrer noopener nofollow" target="_blank"><strong data-dcnode-id="3743"><span data-dcnode-id="3744" instrument_node="">Drift Creek Falls</span></strong></a><span data-dcnode-id="3741" instrument_node=""> is another fantastic hike, but it’s slightly inland. It’s not far as the crow flies, but the trailhead is down a very windy road so plan on about 40 minutes from Lincoln City. This 3.7 mile modified loop takes you over a very cool suspension bridge (where you get a good view of the falls), but you can also venture further down to the base of the falls if you don’t mind getting a little wet.&nbsp;</span></p><span data-dcnode-id="3739" instrument_node="">
</span><p data-dcnode-id="3734"><a data-dcnode-id="3736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.alltrails.com/trail/us/oregon/gods-thumb-via-the-knoll" rel="noreferrer noopener nofollow" target="_blank"><strong data-dcnode-id="3737"><span data-dcnode-id="3738" instrument_node="">God’s Thumb</span></strong></a><span data-dcnode-id="3735" instrument_node="">: This is a very popular hike in Lincoln City and is so named because you’ll hike out to a thumb-like protrusion that juts out into the ocean and allows for some epic views.&nbsp;</span></p><span data-dcnode-id="3733" instrument_node="">
</span><h3 class="has-text-align-center" data-dcnode-id="3730"><span data-dcnode-id="3731" id="Newport"><span data-dcnode-id="3732" instrument_node="">Newport</span></span></h3><span data-dcnode-id="3729" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="3727"><img alt="" class="wp-image-81358" data-dcnode-id="3728" height="704" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//westcoastwayfarers.com/wp-content/uploads/2021/08/Newport-Oregon-Bridge-1024x704.jpg&amp;raw" srcset="https://westcoastwayfarers.com/wp-content/uploads/2021/08/Newport-Oregon-Bridge-1024x704.jpg 1024w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/Newport-Oregon-Bridge-300x206.jpg 300w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/Newport-Oregon-Bridge-768x528.jpg 768w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/Newport-Oregon-Bridge-1536x1056.jpg 1536w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/Newport-Oregon-Bridge-scaled.jpg 2048w" width="1024"></figure><p data-dcnode-id="3723"><strong data-dcnode-id="3725"><span data-dcnode-id="3726" instrument_node="">Drive time from Pacific City</span></strong><span data-dcnode-id="3724" instrument_node="">: 46 minutes / 25 miles</span></p><span data-dcnode-id="3722" instrument_node="">
</span><p data-dcnode-id="3717"><span data-dcnode-id="3721" instrument_node="">Y’all, I love Newport. There’s plenty to see and do, lots of great hiking and outdoor recreation, </span><em data-dcnode-id="3719"><span data-dcnode-id="3720" instrument_node="">two</span></em><span data-dcnode-id="3718" instrument_node=""> cool lighthouses, an extraordinary aquarium, and it’s still got that fishing town spirit like Astoria that the more touristy coastal towns can lack. Newport is a good balance of a fun and interesting place to visit, but also a town where real people live and work.&nbsp;</span></p><span data-dcnode-id="3716" instrument_node="">
</span><h4 data-dcnode-id="3713"><span data-dcnode-id="3714" id="Things_to_Do_in_Newport"><span data-dcnode-id="3715" instrument_node="">Things to Do in Newport</span></span></h4><span data-dcnode-id="3712" instrument_node="">
