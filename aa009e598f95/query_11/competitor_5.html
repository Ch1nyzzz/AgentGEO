</span><figure class="wp-block-image size-large" data-dcnode-id="3060"><img alt="" class="wp-image-81377" data-dcnode-id="3061" height="682" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//westcoastwayfarers.com/wp-content/uploads/2021/08/DSC00956-1024x682.jpg&amp;raw" srcset="https://westcoastwayfarers.com/wp-content/uploads/2021/08/DSC00956-1024x682.jpg 1024w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/DSC00956-300x200.jpg 300w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/DSC00956-768x512.jpg 768w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/DSC00956-1536x1024.jpg 1536w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/DSC00956.jpg 2000w" width="1024"></figure><h3 data-dcnode-id="3057"><span data-dcnode-id="3058" id="With_7_Days"><span data-dcnode-id="3059" instrument_node="">With 7 Days</span></span></h3><span data-dcnode-id="3056" instrument_node="">
</span><p data-dcnode-id="3054"><span data-dcnode-id="3055" instrument_node="">With a whole week, you can make it down the entire coastline and not have to cram too much in on your last day driving home on day seven. So get ready for stunning views and all the Oregon usuals: beer/coffee/hikes, coast style.&nbsp;</span></p><span data-dcnode-id="3053" instrument_node="">
</span><p data-dcnode-id="3028"><strong data-dcnode-id="3051"><span data-dcnode-id="3052" instrument_node="">Day 1 (Portland to Astoria)</span></strong><span data-dcnode-id="3050" instrument_node="">:</span><strong data-dcnode-id="3048"><span data-dcnode-id="3049" instrument_node=""> </span></strong><span data-dcnode-id="3047" instrument_node="">There’s always too much to do in Astoria, but a perfect day for me would start at the top of the </span><a data-dcnode-id="3045" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astoriacolumn.org/" rel="noopener" target="_blank"><span data-dcnode-id="3046" instrument_node="">Astoria Column</span></a><span data-dcnode-id="3044" instrument_node=""> looking down on the mouth of the Columbia and out to the Pacific. Then I’d grab some grub at </span><a data-dcnode-id="3042" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.instagram.com/coffee_or_waffle/%3Fhl%3Den" rel="noopener" target="_blank"><span data-dcnode-id="3043" instrument_node="">Coffee OR Waffle</span></a><span data-dcnode-id="3041" instrument_node=""> and walk up and down the riverfront, maybe hopping on the</span><a data-dcnode-id="3039" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//old300.org/" rel="noopener" target="_blank"><span data-dcnode-id="3040" instrument_node=""> Astoria Trolley</span></a><span data-dcnode-id="3038" instrument_node="">. The afternoon should be spent exploring </span><a data-dcnode-id="3036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stateparks.oregon.gov/index.cfm%3Fdo%3Dpark.profile%26parkId%3D129" rel="noopener" target="_blank"><span data-dcnode-id="3037" instrument_node="">Fort Stevens State Park</span></a><span data-dcnode-id="3035" instrument_node="">, then enjoying a local brew at </span><a data-dcnode-id="3033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.buoybeer.com/" rel="noopener" target="_blank"><span data-dcnode-id="3034" instrument_node="">Buoy Beer</span></a><span data-dcnode-id="3032" instrument_node="">. For lodging, try this </span><a data-dcnode-id="3030" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jdoqocy.com/click-100295489-11553823%3Furl%3Dhttps%253A%252F%252Fwww.vrbo.com%252F1166392%253FnoDates%253Dtrue" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="3031" instrument_node="">unique cottage</span></a><span data-dcnode-id="3029" instrument_node=""> located on the historic Lewis and Clark Seed Farm at Young’s Bay, just minutes from everything Astoria has to offer.</span></p><span data-dcnode-id="3027" instrument_node="">
</span><p data-dcnode-id="3005"><strong data-dcnode-id="3025"><span data-dcnode-id="3026" instrument_node="">Day 2 (Astoria to Cannon Beach)</span></strong><span data-dcnode-id="3024" instrument_node="">: Cannon Beach is a short drive from Astoria so you’ll have plenty of time for adventures along the way. You should definitely do one hike today, either </span><a data-dcnode-id="3022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.alltrails.com/trail/us/oregon/saddle-mountain" rel="noopener" target="_blank"><span data-dcnode-id="3023" instrument_node="">Saddle Mountain</span></a><span data-dcnode-id="3021" instrument_node=""> or </span><a data-dcnode-id="3019" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.oregonhikers.org/field_guide/Neahkahnie_Mountain_Loop_Hike" rel="noopener" target="_blank"><span data-dcnode-id="3020" instrument_node="">Neahkahnie Mountain</span></a><span data-dcnode-id="3018" instrument_node="">. The former will take longer to drive to and is harder, but also incredible! The latter is also a great hike (and not super easy), but will take less time out of your day. After you get your steps in, spend a little time in Seaside and do all the beachy stuff—get some taffy, play some arcade games, and visit the small yet fun </span><a data-dcnode-id="3016" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.seasideaquarium.com/" rel="noopener" target="_blank"><span data-dcnode-id="3017" instrument_node="">aquarium</span></a><span data-dcnode-id="3015" instrument_node="">. Roll down into Cannon Beach for dinner and beer at one of my favorite places in town, </span><a data-dcnode-id="3013" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cannonbeachhardware.com/%3Futm_source%3Dgmb" rel="noopener" target="_blank"><span data-dcnode-id="3014" instrument_node="">Cannon Beach Hardware and Public House</span></a><span data-dcnode-id="3012" instrument_node=""> (yes, you read that right—a hardware store </span><em data-dcnode-id="3010"><span data-dcnode-id="3011" instrument_node="">and </span></em><span data-dcnode-id="3009" instrument_node="">pub). Call it a night in this </span><a data-dcnode-id="3007" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.anrdoezrs.net/click-100295489-11553823%3Furl%3Dhttps%253A%252F%252Fwww.vrbo.com%252F1337495%253FnoDates%253Dtrue" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="3008" instrument_node="">oceanfront yurt-like house</span></a><span data-dcnode-id="3006" instrument_node=""> with wrap around decks.</span></p><span data-dcnode-id="3004" instrument_node="">
</span><p data-dcnode-id="2979"><strong data-dcnode-id="3002"><span data-dcnode-id="3003" instrument_node="">Day 3 (Cannon Beach to Tillamook)</span></strong><span data-dcnode-id="3001" instrument_node="">: Another relatively short driving day gives plenty of opportunities to see the sights. Just south of Cannon is </span><a data-dcnode-id="2999" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stateparks.oregon.gov/index.cfm%3Fdo%3Dpark.profile%26parkId%3D139" rel="noopener" target="_blank"><span data-dcnode-id="3000" instrument_node="">Oswald West State Park</span></a><span data-dcnode-id="2998" instrument_node=""> with tons of great trails. I’d recommend the </span><a data-dcnode-id="2996" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.oregonhikers.org/field_guide/Cape_Falcon_Hike" rel="noopener" target="_blank"><span data-dcnode-id="2997" instrument_node="">Cape Falcon hike</span></a><span data-dcnode-id="2995" instrument_node=""> (especially if you opted for Saddle Mountain yesterday) or the easy one-mile </span><a data-dcnode-id="2993" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.alltrails.com/trail/us/oregon/short-sand-bach-trail" rel="noopener" target="_blank"><span data-dcnode-id="2994" instrument_node="">Shorts Sands Beach Trail</span></a><span data-dcnode-id="2992" instrument_node="">. Jumping back in the car and heading south is the town of Manzanita which I think has the best brunch spot on the entire coast at </span><a data-dcnode-id="2990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//yolkmanzanita.square.site/" rel="noopener" target="_blank"><span data-dcnode-id="2991" instrument_node="">Yolk</span></a><span data-dcnode-id="2989" instrument_node="">. After brunch, walk down the main drag and relax on the beach looking up to Neahkahnie Mountain to the north and down to Nehalem Bay to the south. Now you’ll head down to the </span><a data-dcnode-id="2987" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stateparks.oregon.gov/index.cfm%3Fdo%3Dpark.profile%26parkId%3D131" rel="noopener" target="_blank"><span data-dcnode-id="2988" instrument_node="">Cape Meares Lighthouse</span></a><span data-dcnode-id="2986" instrument_node=""> for more great views and the locally-famous “octopus tree.” In the evening have dinner at the newly opened </span><a data-dcnode-id="2984" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/wernerbeefandbrew/" rel="noopener" target="_blank"><span data-dcnode-id="2985" instrument_node="">Werner Beef and Brew</span></a><span data-dcnode-id="2983" instrument_node=""> for delicious local beer and surprisingly good pub fare. Sticking with the yurt theme, stay at this </span><a data-dcnode-id="2981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kqzyfj.com/click-100295489-11553823%3Furl%3Dhttps%253A%252F%252Fwww.vrbo.com%252F569526%253FnoDates%253Dtrue" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="2982" instrument_node="">bayside luxury yurt with a hot tub</span></a><span data-dcnode-id="2980" instrument_node="">!&nbsp;</span></p><span data-dcnode-id="2978" instrument_node="">
</span><p data-dcnode-id="2947"><strong data-dcnode-id="2976"><span data-dcnode-id="2977" instrument_node="">Day 4 (Tillamook to Newport)</span></strong><span data-dcnode-id="2975" instrument_node="">: First stop is </span><a data-dcnode-id="2973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stateparks.oregon.gov/index.cfm%3Fdo%3Dpark.profile%26parkId%3D134" rel="noopener" target="_blank"><span data-dcnode-id="2974" instrument_node="">Cape Lookout</span></a><span data-dcnode-id="2972" instrument_node=""> for this fantastic </span><a data-dcnode-id="2970" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.oregonhikers.org/field_guide/Cape_Lookout_Hike" rel="noopener" target="_blank"><span data-dcnode-id="2971" instrument_node="">5 mile out-and-back hike</span></a><span data-dcnode-id="2969" instrument_node=""> through old-growth sitka spruce out to a headland with expansive views. Keep your eyes peeled for whales, particularly if you’re traveling in the spring or fall. Pop back in the car and head to Pacific City for lunch at </span><a data-dcnode-id="2967" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pelicanbrewing.com/" rel="noopener" target="_blank"><span data-dcnode-id="2968" instrument_node="">Pelican Brewing</span></a><span data-dcnode-id="2966" instrument_node=""> and a walk along the beach and up on the dunes into the </span><a data-dcnode-id="2964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stateparks.oregon.gov/index.cfm%3Fdo%3Dpark.profile%26parkId%3D130" rel="noopener" target="_blank"><span data-dcnode-id="2965" instrument_node="">Cape Kiwanda</span></a><span data-dcnode-id="2963" instrument_node=""> area. Keep traveling south and check out the kinda creepy (especially on a foggy, rainy day) </span><a data-dcnode-id="2961" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.atlasobscura.com/places/neskowin-ghost-forest" rel="noopener" target="_blank"><span data-dcnode-id="2962" instrument_node="">Neskowin Ghost Forest</span></a><span data-dcnode-id="2960" instrument_node="">, a grove of ancient sitka spruce stumps with some dating back 2,000 years! The stumps were only uncovered back in 1997 when a huge storm cleared away much of the sand bank. After this, roll down into Newport and stroll down the historic bayfront, get dinner at the original </span><a data-dcnode-id="2958" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moschowder.com/" rel="noopener" target="_blank"><span data-dcnode-id="2959" instrument_node="">Mo’s Chowder</span></a><span data-dcnode-id="2957" instrument_node=""> (is it the </span><em data-dcnode-id="2955"><span data-dcnode-id="2956" instrument_node="">best</span></em><span data-dcnode-id="2954" instrument_node=""> food you’ve ever had? Probably not, but it’s </span><em data-dcnode-id="2952"><span data-dcnode-id="2953" instrument_node="">good</span></em><span data-dcnode-id="2951" instrument_node=""> and the ambiance is so quintessentially Newport that you go for the experience and to say you did it. It’s an Oregon coast thing). Sleep fancy at the </span><a data-dcnode-id="2949" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jdoqocy.com/click-100295489-13828058%3Furl%3Dhttps%253A%252F%252Fwww.hotels.com%252Fho430972%252Finn-at-nye-beach-newport-united-states-of-america%252F%253Fq-rooms%253D1" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="2950" instrument_node="">Inn at Nye Beach</span></a><span data-dcnode-id="2948" instrument_node="">.&nbsp;</span></p><span data-dcnode-id="2946" instrument_node="">
</span><p data-dcnode-id="2912"><strong data-dcnode-id="2944"><span data-dcnode-id="2945" instrument_node="">Day 5 (Newport to Oregon Dunes)</span></strong><span data-dcnode-id="2943" instrument_node="">:</span><strong data-dcnode-id="2941"><span data-dcnode-id="2942" instrument_node=""> </span></strong><span data-dcnode-id="2940" instrument_node="">Get breakfast in town at </span><a data-dcnode-id="2938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ultralifecafe.com/" rel="noopener" target="_blank"><span data-dcnode-id="2939" instrument_node="">Ultralife Nye</span></a><span data-dcnode-id="2937" instrument_node="">, then continue south for your first stop at </span><a data-dcnode-id="2935" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stateparks.oregon.gov/index.cfm%3Fdo%3Dpark.profile%26parkId%3D147" rel="noopener" target="_blank"><span data-dcnode-id="2936" instrument_node="">Seal Rock State Park</span></a><span data-dcnode-id="2934" instrument_node="">, a small and easy spot for cool off-shore rock formations and TONS of tidepools (you might see a seal, but the name is a bit misleading). Onward to Cape Perpetua! There’s two things you should do in this area, though you could probably spend the better part of a day here. First stop is the </span><a data-dcnode-id="2932" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fs.usda.gov/recarea/siuslaw/recarea/%3Frecid%3D42275" rel="noopener" target="_blank"><span data-dcnode-id="2933" instrument_node="">lookout</span></a><span data-dcnode-id="2931" instrument_node="">, the highest point you can reach by car on the Oregon coast. Then you’ll pop down to </span><a data-dcnode-id="2929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.atlasobscura.com/places/thor-s-well" rel="noopener" target="_blank"><span data-dcnode-id="2930" instrument_node="">Thor’s Well</span></a><span data-dcnode-id="2928" instrument_node=""> to witness the “drainpipe of the Pacific” seemingly suck in the entire ocean right before your eyes—it’s very cool. Keep heading south to the </span><a data-dcnode-id="2926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stateparks.oregon.gov/index.cfm%3Fdo%3Dpark.profile%26parkId%3D86" rel="noopener" target="_blank"><span data-dcnode-id="2927" instrument_node="">Heceta Head Lighthouse</span></a><span data-dcnode-id="2925" instrument_node=""> that’s breathtaking to view on its own but if you’re feeling like a little hike, explore the nearby </span><a data-dcnode-id="2923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.alltrails.com/trail/us/oregon/hobbit-trail-and-china-creek-trail-loop" rel="noopener" target="_blank"><span data-dcnode-id="2924" instrument_node="">Hobbit Trail</span></a><span data-dcnode-id="2922" instrument_node="">. Your ultimate stop for this busy day is at the </span><a data-dcnode-id="2920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fs.usda.gov/recarea/siuslaw/recreation/recarea/%3Frecid%3D42465" rel="noopener" target="_blank"><span data-dcnode-id="2921" instrument_node="">Oregon Dunes</span></a><span data-dcnode-id="2919" instrument_node="">. The Dunes have always been a little eerie and Tatooine-esqu to me and this is uniquely true at sunset; it’s like I expect to see two suns setting. A great place to pitch a tent is at the </span><a data-dcnode-id="2917" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//oregonstateparks.reserveamerica.com/camping/umpqua-lighthouse-state-park/r/campgroundDetails.do%3FcontractCode%3DOR%26parkId%3D402343" rel="noopener" target="_blank"><span data-dcnode-id="2918" instrument_node="">Umpqua Lighthouse Campground</span></a><span data-dcnode-id="2916" instrument_node="">, or if you want a real roof over your head try this beautifully renovated and </span><a data-dcnode-id="2914" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.anrdoezrs.net/click-100295489-11553823%3Furl%3Dhttps%253A%252F%252Fwww.vrbo.com%252F1344091%253FnoDates%253Dtrue" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="2915" instrument_node="">secluded chalet with a hot tub</span></a><span data-dcnode-id="2913" instrument_node="">!</span></p><span data-dcnode-id="2911" instrument_node="">
</span><p data-dcnode-id="2880"><strong data-dcnode-id="2909"><span data-dcnode-id="2910" instrument_node="">Day 6 (Dunes to Samuel H. Boardman)</span></strong><span data-dcnode-id="2908" instrument_node="">: Your first stop is in the cute town of Bandon for breakfast at the </span><a data-dcnode-id="2906" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//therollingpinbb.com/" rel="noopener" target="_blank"><span data-dcnode-id="2907" instrument_node="">Rolling Pin</span></a><span data-dcnode-id="2905" instrument_node="">, and cheese samples at </span><a data-dcnode-id="2903" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//facerockcreamery.com/" rel="noopener" target="_blank"><span data-dcnode-id="2904" instrument_node="">Face Rock Creamery</span></a><span data-dcnode-id="2902" instrument_node="">. Take a snack to-go and drive (or walk) over to </span><a data-dcnode-id="2900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stateparks.oregon.gov/index.cfm%3Fdo%3Dpark.profile%26parkId%3D47" rel="noopener" target="_blank"><span data-dcnode-id="2901" instrument_node="">Face Rock Scenic Area</span></a><span data-dcnode-id="2899" instrument_node=""> to enjoy the beach. Next you’ll stop at </span><a data-dcnode-id="2897" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stateparks.oregon.gov/index.cfm%3Fdo%3Dpark.profile%26parkId%3D44" rel="noopener" target="_blank"><span data-dcnode-id="2898" instrument_node="">Cape Blanco</span></a><span data-dcnode-id="2896" instrument_node=""> to see the oldest lighthouse in Oregon (and one of the best campgrounds imo). Stop three is one of my favorites—the </span><a data-dcnode-id="2894" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.prehistoricgardens.com/" rel="noopener" target="_blank"><span data-dcnode-id="2895" instrument_node="">Prehistoric Gardens</span></a><span data-dcnode-id="2893" instrument_node="">, the cheesy and delightful roadside attraction that’s been around since 1955. Stop by </span><a data-dcnode-id="2891" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//goldbeachbarbq.com/%3Fy_source%3D1_MTI3ODExODQtNzE1LWxvY2F0aW9uLndlYnNpdGU%253D" rel="noopener" target="_blank"><span data-dcnode-id="2892" instrument_node="">Gold Beach BBQ</span></a><span data-dcnode-id="2890" instrument_node=""> for grub before ending your day at the </span><a data-dcnode-id="2888" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stateparks.oregon.gov/index.cfm%3Fdo%3Dpark.profile%26parkId%3D56" rel="noopener" target="_blank"><span data-dcnode-id="2889" instrument_node="">Samuel Boardman Corridor</span></a><span data-dcnode-id="2887" instrument_node="">. I urge you to really take your time though this 18-mile section of the southern Oregon Coast. Make all the stops. Do all the things: Arch Rock, Secret Beach, Natural Bridges. Stay fancy at the </span><a data-dcnode-id="2885" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tututun.com/" rel="noopener" target="_blank"><span data-dcnode-id="2886" instrument_node="">Tu Tu’ Tun Lodge</span></a><span data-dcnode-id="2884" instrument_node="">, or throw your tent down at </span><a data-dcnode-id="2882" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stateparks.oregon.gov/index.cfm%3Fdo%3Dpark.profile%26parkId%3D58" rel="noopener" target="_blank"><span data-dcnode-id="2883" instrument_node="">Harris Beach Campground</span></a><span data-dcnode-id="2881" instrument_node="">.</span></p><span data-dcnode-id="2879" instrument_node="">
</span><p data-dcnode-id="2861"><strong data-dcnode-id="2877"><span data-dcnode-id="2878" instrument_node="">Day 7 (Samuel H. Boardman to Home)</span></strong><span data-dcnode-id="2876" instrument_node="">:</span><strong data-dcnode-id="2874"><span data-dcnode-id="2875" instrument_node=""> </span></strong><span data-dcnode-id="2873" instrument_node="">You’ve got a long drive back up to Portland, so you can’t afford to make too many stops, but that doesn’t mean it can’t be an awesome day! First, do all the things you didn’t do along the Samuel H. Boardman Corridor, then start back up north on the 101. Next stop is Cape Sebastian for this </span><a data-dcnode-id="2871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.alltrails.com/trail/us/oregon/cape-sebastian-trail" rel="noopener" target="_blank"><span data-dcnode-id="2872" instrument_node="">lovely 2.5 mile hike</span></a><strong data-dcnode-id="2869"><span data-dcnode-id="2870" instrument_node="">. </span></strong><span data-dcnode-id="2868" instrument_node="">Continue north and stop at </span><a data-dcnode-id="2866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shakenburgercoosbay.com/" rel="noopener" target="_blank"><span data-dcnode-id="2867" instrument_node="">Shake N Burger</span></a><span data-dcnode-id="2865" instrument_node=""> in Coos Bay for lunch. You’ll cut over to I-5 via Highway 38 and on up to Portland. Bonus stop! If it’s a hot day and you’re getting fidgety, take the short detour to </span><a data-dcnode-id="2863" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.recreation.gov/camping/gateways/236" rel="noopener" target="_blank"><span data-dcnode-id="2864" instrument_node="">Dorena Lake</span></a><span data-dcnode-id="2862" instrument_node=""> for a quick dip.</span></p><span data-dcnode-id="2860" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="2858"><img alt="" class="wp-image-81378" data-dcnode-id="2859" height="682" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//westcoastwayfarers.com/wp-content/uploads/2021/08/DSC00762-1024x682.jpg&amp;raw" srcset="https://westcoastwayfarers.com/wp-content/uploads/2021/08/DSC00762-1024x682.jpg 1024w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/DSC00762-300x200.jpg 300w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/DSC00762-768x512.jpg 768w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/DSC00762-1536x1024.jpg 1536w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/DSC00762.jpg 2000w" width="1024"></figure><h2 class="has-text-align-center" data-dcnode-id="2855"><span data-dcnode-id="2856" id="Hiking_on_the_Oregon_Coast"><span data-dcnode-id="2857" instrument_node="">Hiking on the Oregon Coast</span></span></h2><span data-dcnode-id="2854" instrument_node="">
</span><p data-dcnode-id="2852"><span data-dcnode-id="2853" instrument_node="">We’ve outlined a number of hikes throughout the guide, but here’s an easy reference for the best of the best!</span></p><span data-dcnode-id="2851" instrument_node="">
</span><p class="has-text-align-center has-theme-palette-7-background-color has-background" data-dcnode-id="2843"><strong data-dcnode-id="2849"><span data-dcnode-id="2850" instrument_node="">Psst</span></strong><span data-dcnode-id="2848" instrument_node="">! We’ve got a whole guide to </span><strong data-dcnode-id="2845"><a data-dcnode-id="2846" data-id="3447" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//westcoastwayfarers.com/best-hikes-on-the-oregon-coast/"><span data-dcnode-id="2847" instrument_node="">hiking on the Oregon Coast</span></a></strong><span data-dcnode-id="2844" instrument_node=""> if you’re looking for more detail!</span></p><span data-dcnode-id="2842" instrument_node="">
</span><ul data-dcnode-id="2836"><li data-dcnode-id="2837"><a data-dcnode-id="2839" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.oregonhikers.org/field_guide/Saddle_Mountain_Hike" rel="noopener" target="_blank"><strong data-dcnode-id="2840"><span data-dcnode-id="2841" instrument_node="">Saddle Mountain</span></strong></a><span data-dcnode-id="2838" instrument_node="">: 5.2 miles/elevation gain: 1,900 feet/nearest city: Seaside. Standing at 3,282 feet, this is the one of the best views you can get of the northern coastline. It’s a tougher hike than you may think, especially the last quarter mile or so.</span></li></ul><ul data-dcnode-id="2830"><li data-dcnode-id="2831"><a data-dcnode-id="2833" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.alltrails.com/trail/us/oregon/clatsop-loop-trail-from-indian-beach" rel="noopener" target="_blank"><strong data-dcnode-id="2834"><span data-dcnode-id="2835" instrument_node="">Clatsop Loop</span></strong></a><span data-dcnode-id="2832" instrument_node="">: 2.8 miles/elevation gain: 784 feet/nearest city: Cannon Beach. This is an easy hike for families or anyone really who’s looking for a more relaxing jaunt. This hike will take you through forests of big trees, past great coastal views, and lets you see Terrible Tilly.</span></li></ul><ul data-dcnode-id="2821"><li data-dcnode-id="2822"><a data-dcnode-id="2827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.oregonhikers.org/field_guide/Neahkahnie_Mountain_from_South_Hike" rel="noopener" target="_blank"><strong data-dcnode-id="2828"><span data-dcnode-id="2829" instrument_node="">Neahkahnie Mountain</span></strong></a><span data-dcnode-id="2826" instrument_node="">: 2.8 miles/elevation gain: 866 feet/nearest city: Manzanita. This is the shortest and easiest hike up to this popular coast peak for classic, postcard views of Nehalem Bay. There are </span><a data-dcnode-id="2824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.oregonhikers.org/field_guide/Neahkahnie_Mountain_Viewpoint" rel="noopener" target="_blank"><span data-dcnode-id="2825" instrument_node="">three other options</span></a><span data-dcnode-id="2823" instrument_node=""> with the longest coming in at 8 miles.</span></li></ul><ul data-dcnode-id="2815"><li data-dcnode-id="2816"><a data-dcnode-id="2818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.alltrails.com/trail/us/oregon/cascade-head" rel="noopener" target="_blank"><strong data-dcnode-id="2819"><span data-dcnode-id="2820" instrument_node="">Cascade Head</span></strong></a><span data-dcnode-id="2817" instrument_node="">: 6.3 miles/elevation gain: 1,381 feet/nearest city: Lincoln City. This is another fairly difficult hike, but stands out for its views down to Three Rocks and its exposed trail which is a godsend when you need a little vitamin D.</span></li></ul><ul data-dcnode-id="2809"><li data-dcnode-id="2810"><a data-dcnode-id="2812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.oregonhikers.org/field_guide/The_Thumb_via_The_Knoll_Loop_Hike" rel="noopener" target="_blank"><strong data-dcnode-id="2813"><span data-dcnode-id="2814" instrument_node="">God’s Thumb</span></strong></a><span data-dcnode-id="2811" instrument_node="">: 4.8 miles/elevation gain: 1,180 feet/nearest city: Lincoln City. With a name as divine as God’s Thumb, you know you’re in for something spectacular. It’s slightly challenging, but still totally doable to get breathtaking views down to Lincoln City and up to Cascade Head.</span></li></ul><ul data-dcnode-id="2798"><li data-dcnode-id="2804"><a data-dcnode-id="2806" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.alltrails.com/trail/us/oregon/john-dellenback-trail" rel="noopener" target="_blank"><strong data-dcnode-id="2807"><span data-dcnode-id="2808" instrument_node="">John Dellenback Dunes Trail</span></strong></a><span data-dcnode-id="2805" instrument_node="">: 5.5 miles/elevation gain: 308 feet/nearest city: Lakeside. A wonderful way to explore the amazing Oregon Dunes. You’ll also get some top-notch wildflower and birding, but take note this trail is harder than it appears as you’ll be hiking through sand.</span></li><li data-dcnode-id="2799"><a data-dcnode-id="2801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.alltrails.com/trail/us/oregon/john-dellenback-trail" rel="noopener" target="_blank"><strong data-dcnode-id="2802"><span data-dcnode-id="2803" instrument_node="">John Dellenback Dunes Trail</span></strong></a><span data-dcnode-id="2800" instrument_node="">: 5.5 miles/elevation gain: 308 feet/nearest city: Lakeside. A wonderful way to explore the amazing Oregon Dunes. You’ll also get some top-notch wildflower and birding, but take note this trail is harder than it appears as you’ll be hiking through sand.</span></li></ul><h2 class="has-text-align-center" data-dcnode-id="2795"><span data-dcnode-id="2796" id="When_to_Visit_the_Oregon_Coast"><span data-dcnode-id="2797" instrument_node="">When to Visit the Oregon Coast</span></span></h2><span data-dcnode-id="2794" instrument_node="">
</span><p data-dcnode-id="2792"><span data-dcnode-id="2793" instrument_node="">The best time to plan your Oregon coast road trip itinerary is whenever you have time. That sounds like a joke, but I’m serious! </span></p><span data-dcnode-id="2791" instrument_node="">
</span><p data-dcnode-id="2789"><span data-dcnode-id="2790" instrument_node="">I’m a big proponent of all-season travel and truly believe you can have a great time no matter when you head out. Sun, wind, rain, cold—give it to me! To truly experience what the Oregon coast has to offer, you’ve got to embrace it all. But, we all know you’re not about to embark on a year-long road trip, so here’s what you’re looking at for each season of travel.</span></p><span data-dcnode-id="2788" instrument_node="">
</span><p data-dcnode-id="2786"><span data-dcnode-id="2787" instrument_node="">Your itinerary (and your apparel) will need to adjust based on the weather, but the Oregon coast never gets too crazy hot or cold, so gear up and get out there! </span></p><span data-dcnode-id="2785" instrument_node="">
</span><p data-dcnode-id="2781"><strong data-dcnode-id="2783"><span data-dcnode-id="2784" instrument_node="">Summer</span></strong><span data-dcnode-id="2782" instrument_node=""> you’ll definitely see the best weather but you’ll also be fighting crowds and traffic. </span></p><span data-dcnode-id="2780" instrument_node="">
</span><p data-dcnode-id="2776"><strong data-dcnode-id="2778"><span data-dcnode-id="2779" instrument_node="">Fall</span></strong><span data-dcnode-id="2777" instrument_node=""> would probably be my top pick for a coast road trip. It can be a gamble, but you should get a nice mix of clear days for hikes and exploring, and cooler, rainy days for staying in or checking out breweries, museums, and shops.</span></p><span data-dcnode-id="2775" instrument_node="">
</span><p data-dcnode-id="2771"><strong data-dcnode-id="2773"><span data-dcnode-id="2774" instrument_node="">Winter </span></strong><span data-dcnode-id="2772" instrument_node="">is the best for cozying up to a fire and watching the surf or brewery hopping (but I also like getting bundled up and hitting up a sparsely-populated trail. Once my blood gets pumping I don’t mind being wet—I know I can always dry off later!) </span></p><span data-dcnode-id="2770" instrument_node="">
</span><p data-dcnode-id="2766"><strong data-dcnode-id="2768"><span data-dcnode-id="2769" instrument_node="">Spring </span></strong><span data-dcnode-id="2767" instrument_node="">is also lovely but be careful of spring breakers (no, not like Miami Beach), but families come flocking to the coast towards the end of March and beginning of April and things book up fast!</span></p><span data-dcnode-id="2765" instrument_node="">
</span><h2 class="has-text-align-center" data-dcnode-id="2762"><span data-dcnode-id="2763" id="Getting_to_the_Oregon_Coast"><span data-dcnode-id="2764" instrument_node="">Getting to the Oregon Coast&nbsp;</span></span></h2><span data-dcnode-id="2761" instrument_node="">
</span><p data-dcnode-id="2759"><span data-dcnode-id="2760" instrument_node="">If you’re coming from the Portland or Seattle area, your Oregon coast itinerary should start at the very top of the Oregon coast in Astoria and you’ll make your way south. This is how I’ll lay out the sample itineraries below, but they could always be done in the reverse order.</span></p><span data-dcnode-id="2758" instrument_node="">
</span><h3 data-dcnode-id="2755"><span data-dcnode-id="2756" id="From_Portland"><span data-dcnode-id="2757" instrument_node="">From Portland</span></span></h3><span data-dcnode-id="2754" instrument_node="">
</span><p data-dcnode-id="2749"><span data-dcnode-id="2753" instrument_node="">There are a couple ways to get to Astoria from Portland: Highway 30 the whole way (my preference), or the 26W to the coast then up the 101 for another 20 miles to hit Astoria. Both routes are lovely but the 26 can often get backed up so </span><a data-dcnode-id="2751" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tripcheck.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2752" instrument_node="">check traffic times</span></a><span data-dcnode-id="2750" instrument_node=""> before you leave. </span></p><span data-dcnode-id="2748" instrument_node="">
</span><p data-dcnode-id="2746"><span data-dcnode-id="2747" instrument_node="">Also if you take the 26/101 route, you’ll be doubling back and driving at least a (short) section of the 101 again, but this isn’t really a deal breaker. Both routes should take just under two hours.</span></p><span data-dcnode-id="2745" instrument_node="">
</span><h3 data-dcnode-id="2742"><span data-dcnode-id="2743" id="From_Seattle"><span data-dcnode-id="2744" instrument_node="">From Seattle</span></span></h3><span data-dcnode-id="2741" instrument_node="">
</span><p data-dcnode-id="2739"><span data-dcnode-id="2740" instrument_node="">From Seattle, you also have two options. Both start heading south on I-5, and both will take a little over three hours. It’s in Olympia that you’ll need to choose your route. </span></p><span data-dcnode-id="2738" instrument_node="">
</span><p data-dcnode-id="2730"><span data-dcnode-id="2737" instrument_node="">Though it’s </span><em data-dcnode-id="2735"><span data-dcnode-id="2736" instrument_node="">slightly</span></em><span data-dcnode-id="2734" instrument_node=""> longer </span><strong data-dcnode-id="2732"><span data-dcnode-id="2733" instrument_node="">I’d recommend veering west from Olympia</span></strong><span data-dcnode-id="2731" instrument_node=""> on the 8 and then to the 101 south. This route allows you to drive past Willapa Bay (famous for their oysters), and get some SW Washington coast viewing in. Your other option is to stay on I-5 until you get to Longview, then cut west on the 30.&nbsp;</span></p><span data-dcnode-id="2729" instrument_node="">
</span><h3 data-dcnode-id="2726"><span data-dcnode-id="2727" id="From_California"><span data-dcnode-id="2728" instrument_node="">From California</span></span></h3><span data-dcnode-id="2725" instrument_node="">
</span><p data-dcnode-id="2720"><span data-dcnode-id="2724" instrument_node="">If you’re driving up from California, it only makes sense to </span><strong data-dcnode-id="2722"><span data-dcnode-id="2723" instrument_node="">start at the southern end of the coast at Brookings then work your way north to Astoria</span></strong><span data-dcnode-id="2721" instrument_node="">. There’s no direct route here unless you’re starting out in Humboldt or Del Norte County, so be prepared for some time in the car. </span></p><span data-dcnode-id="2719" instrument_node="">
</span><p data-dcnode-id="2717"><span data-dcnode-id="2718" instrument_node="">The drive up the 101 in northern California is marvelous but not the most accessible. If you’re coming from deep in California, you might consider flying into Portland and renting a car (see below).&nbsp;</span></p><span data-dcnode-id="2716" instrument_node="">
</span><h3 data-dcnode-id="2713"><span data-dcnode-id="2714" id="From_Elsewhere"><span data-dcnode-id="2715" instrument_node="">From Elsewhere</span></span></h3><span data-dcnode-id="2712" instrument_node="">
</span><p data-dcnode-id="2704"><span data-dcnode-id="2711" instrument_node="">Flying into </span><strong data-dcnode-id="2709"><span data-dcnode-id="2710" instrument_node="">Portland International Airport (PDX)</span></strong><span data-dcnode-id="2708" instrument_node=""> is a walk in the park compared with almost any other international airport in the country. I frequently boast of the splendor that is “my” airport, but</span><em data-dcnode-id="2706"><span data-dcnode-id="2707" instrument_node=""> you guys it’s so nice and easy!</span></em><span data-dcnode-id="2705" instrument_node=""> From the time the wheels touch down you can grab your bags, rent a car, hit the road and be enjoying a drink in Astoria within three hours. Not bad!</span></p><span data-dcnode-id="2703" instrument_node="">
</span><hr class="wp-block-separator" data-dcnode-id="2702"><p data-dcnode-id="2695"><strong data-dcnode-id="2700"><span data-dcnode-id="2701" instrument_node="">Planning a trip to the Oregon Coast?</span></strong><span data-dcnode-id="2699" instrument_node=""> You won’t want to miss our guide to the </span><a data-dcnode-id="2697" data-id="3447" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//westcoastwayfarers.com/best-hikes-on-the-oregon-coast/"><span data-dcnode-id="2698" instrument_node="">best hikes on the Oregon Coast</span></a><span data-dcnode-id="2696" instrument_node="">, with all sorts of hikes featuring waterfalls, sweeping coastal views, and short walks on the beach. </span></p><span data-dcnode-id="2694" instrument_node="">
</span><div class="wp-container-2 wp-block-group has-theme-palette-7-background-color has-background" data-dcnode-id="2640"><div class="wp-block-group__inner-container" data-dcnode-id="2641"><span data-dcnode-id="2693" instrument_node="">
