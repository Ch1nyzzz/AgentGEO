</span><figure class="wp-block-image size-large" data-dcnode-id="3710"><img alt="" class="wp-image-81386" data-dcnode-id="3711" height="678" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//westcoastwayfarers.com/wp-content/uploads/2021/08/Newport-Oregon-Waterfront-1024x678.jpg&amp;raw" srcset="https://westcoastwayfarers.com/wp-content/uploads/2021/08/Newport-Oregon-Waterfront-1024x678.jpg 1024w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/Newport-Oregon-Waterfront-300x199.jpg 300w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/Newport-Oregon-Waterfront-768x509.jpg 768w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/Newport-Oregon-Waterfront-1536x1017.jpg 1536w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/Newport-Oregon-Waterfront-scaled.jpg 2048w" width="1024"></figure><p data-dcnode-id="3705"><a data-dcnode-id="3707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stateparks.oregon.gov/index.cfm%3Fdo%3Dpark.profile%26parkId%3D152" rel="noopener" target="_blank"><strong data-dcnode-id="3708"><span data-dcnode-id="3709" instrument_node="">Agate Beach</span></strong></a><span data-dcnode-id="3706" instrument_node="">: Agate Beach is long and wide and beautiful! To be clear, it’s called Agate Beach because you can often find magnificent agates, but don’t expect the whole beach to be strewn with them. You’ll have most luck agate hunting in winter and spring especially after a storm.</span></p><span data-dcnode-id="3704" instrument_node="">
</span><p data-dcnode-id="3696"><a data-dcnode-id="3701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.yaquinalights.org/" rel="noopener" target="_blank"><strong data-dcnode-id="3702"><span data-dcnode-id="3703" instrument_node="">Yaquina Head Lighthouse</span></strong></a><span data-dcnode-id="3700" instrument_node="">: There’s actually two lighthouses in Newport, the Yaquina Head and Yaquina Bay, the former taking honors as the tallest lighthouse in Oregon at 93 feet. Both lighthouses are gorgeous and interesting to tour, but the whole Yaquina Head Outstanding Natural Area is incredible with tidepools, whale watching, and trails (I mean, the word </span><em data-dcnode-id="3698"><span data-dcnode-id="3699" instrument_node="">outstanding </span></em><span data-dcnode-id="3697" instrument_node="">is in the name!)</span></p><span data-dcnode-id="3695" instrument_node="">
</span><p data-dcnode-id="3690"><a data-dcnode-id="3692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//aquarium.org/" rel="noopener" target="_blank"><strong data-dcnode-id="3693"><span data-dcnode-id="3694" instrument_node="">Oregon Coast Aquarium</span></strong></a><span data-dcnode-id="3691" instrument_node="">: If you visit the Seaside Aquarium (and I think you should), the Oregon Coast Aquarium will stand out in stark contrast to your earlier experience. The Newport aquarium is big and fancy and well worth a visit, but you should really plan to spend a few hours. The sharks are extra cool. This place gets packed on the weekends so if you can hit it midweek you won’t be wrestling to see all the exhibits.</span></p><span data-dcnode-id="3689" instrument_node="">
</span><p data-dcnode-id="3685"><strong data-dcnode-id="3687"><span data-dcnode-id="3688" instrument_node="">Historic Bayfront</span></strong><span data-dcnode-id="3686" instrument_node="">: This is the epitome of what I love about Newport. It’s a great mix of fantastic restaurants, shops, and museums but it’s also a working bay with the smell of fish pervading every inch and fisherpeople doing their fisherpeople thing alongside the tourists.&nbsp;</span></p><span data-dcnode-id="3684" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="3680"><img alt="" class="wp-image-81359" data-dcnode-id="3683" height="683" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//westcoastwayfarers.com/wp-content/uploads/2021/08/Yaqunia-Head-Lighthouse-on-the-Oregon-Coast-1024x683.jpg&amp;raw" srcset="https://westcoastwayfarers.com/wp-content/uploads/2021/08/Yaqunia-Head-Lighthouse-on-the-Oregon-Coast-1024x683.jpg 1024w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/Yaqunia-Head-Lighthouse-on-the-Oregon-Coast-300x200.jpg 300w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/Yaqunia-Head-Lighthouse-on-the-Oregon-Coast-768x512.jpg 768w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/Yaqunia-Head-Lighthouse-on-the-Oregon-Coast-1536x1024.jpg 1536w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/Yaqunia-Head-Lighthouse-on-the-Oregon-Coast-scaled.jpg 2048w" width="1024"><figcaption data-dcnode-id="3681"><span data-dcnode-id="3682" instrument_node="">Yaquina Head Lighthouse near Newport, Oregon</span></figcaption></figure><h4 data-dcnode-id="3677"><span data-dcnode-id="3678" id="Places_to_Stay_in_Newport"><span data-dcnode-id="3679" instrument_node="">Places to Stay in Newport</span></span></h4><span data-dcnode-id="3676" instrument_node="">
</span><p data-dcnode-id="3671"><a data-dcnode-id="3673" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.booking.com/hotel/us/inn-at-nye-beach.en.html%3Faid%3D2106063%26no_rooms%3D1%26group_adults%3D2" rel="noreferrer noopener nofollow" target="_blank"><strong data-dcnode-id="3674"><span data-dcnode-id="3675" instrument_node="">Inn at Nye Beach</span></strong></a><span data-dcnode-id="3672" instrument_node="">: Nye Beach is on the north end of town and this inn is right on the water. They’ve got lovely, cozy rooms, and a cool back patio for watching the sunset from an infinity pool.&nbsp;</span></p><span data-dcnode-id="3670" instrument_node="">
</span><p data-dcnode-id="3665"><a data-dcnode-id="3667" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//go.skimresources.com/%3Fid%3D136989X1654419%26xs%3D1%26url%3Dhttps%253A%252F%252Fwww.booking.com%252Fhotel%252Fus%252Fagate-beach-motel.en-gb.html%253Faid%253D356980%253Blabel%253Dgog235jc-1DCAso7AFCEWFnYXRlLWJlYWNoLW1vdGVsSDNYA2i0AogBAZgBCbgBF8gBDNgBA-gBAYgCAagCA7gCnraRiQbAAgHSAiRkMDkzZTNiMS03ZTQ5LTQxMDEtOGFhMS0wYmQ5MTgyZGRmM2TYAgTgAgE%253Bsid%253Dfc2e3dbe25c63a5ac57a2212ed066d29%253Bdist%253D0%2526keep_landing%253D1%2526sb_price_type%253Dtotal%2526type%253Dtotal%2526" rel="noreferrer noopener nofollow" target="_blank"><strong data-dcnode-id="3668"><span data-dcnode-id="3669" instrument_node="">Agate Beach Motel</span></strong></a><span data-dcnode-id="3666" instrument_node="">: This place is another great location in town. It’s right on the Yaquina Head and from the hotel you can literally just walk out onto it and over to the lighthouse, or you can head south down the beautiful Agate Beach. First-rate rooms and views.</span></p><span data-dcnode-id="3664" instrument_node="">
</span><p data-dcnode-id="3654"><strong data-dcnode-id="3662"><span data-dcnode-id="3663" instrument_node="">Vacation Rentals</span></strong><span data-dcnode-id="3661" instrument_node="">: I can’t resist an A-frame, and </span><a data-dcnode-id="3659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dpbolvw.net/click-100295489-11553823%3Furl%3Dhttps%253A%252F%252Fwww.vrbo.com%252F420676%253FnoDates%253Dtrue" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="3660" instrument_node="">this one</span></a><span data-dcnode-id="3658" instrument_node=""> reeled me in. It’s eclectic yet functional and comfortable, it has three bedrooms, a HOT TUB, and MS. PACMAN on an original arcade table (!!!!!), and super close to the beach and aquarium. Or there’s </span><a data-dcnode-id="3656" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tkqlhce.com/click-100295489-11553823%3Furl%3Dhttps%253A%252F%252Fwww.vrbo.com%252F7523640ha%253FnoDates%253Dtrue" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="3657" instrument_node="">this excellent option</span></a><span data-dcnode-id="3655" instrument_node=""> that’s right on the beach for a clean, quiet and peaceful stay.</span></p><span data-dcnode-id="3653" instrument_node="">
</span><p data-dcnode-id="3648"><a data-dcnode-id="3650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tkqlhce.com/click-100295489-13828058%3Furl%3Dhttps%253A%252F%252Fwww.hotels.com%252Fho1630002208%252Fthe-newport-belle-newport-united-states-of-america%252F%253Fq-rooms%253D1" rel="noreferrer noopener nofollow" target="_blank"><strong data-dcnode-id="3651"><span data-dcnode-id="3652" instrument_node="">Newport Belle</span></strong></a><span data-dcnode-id="3649" instrument_node="">: You’ve likely never thought it was an option to spend the night on a paddlewheel boat, but now it is! The Newport Belle is docked on the South Beach harbor and has five luxurious and romantic rooms aboard, and to top it off they offer an incredible breakfast.</span></p><span data-dcnode-id="3647" instrument_node="">
</span><h3 class="has-text-align-center" data-dcnode-id="3644"><span data-dcnode-id="3645" id="Cape_Perpetua_Surrounding_Area"><span data-dcnode-id="3646" instrument_node="">Cape Perpetua &amp; Surrounding Area</span></span></h3><span data-dcnode-id="3643" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="3641"><img alt="" class="wp-image-81361" data-dcnode-id="3642" height="682" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//westcoastwayfarers.com/wp-content/uploads/2021/08/DSC01063-1024x682.jpg&amp;raw" srcset="https://westcoastwayfarers.com/wp-content/uploads/2021/08/DSC01063-1024x682.jpg 1024w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/DSC01063-300x200.jpg 300w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/DSC01063-768x512.jpg 768w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/DSC01063-1536x1024.jpg 1536w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/DSC01063.jpg 2000w" width="1024"></figure><p data-dcnode-id="3637"><strong data-dcnode-id="3639"><span data-dcnode-id="3640" instrument_node="">Drive time from Newport</span></strong><span data-dcnode-id="3638" instrument_node="">: 38 minutes / 27 miles</span></p><span data-dcnode-id="3636" instrument_node="">
</span><p data-dcnode-id="3631"><span data-dcnode-id="3635" instrument_node="">The </span><a data-dcnode-id="3633" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fs.usda.gov/recarea/siuslaw/recreation/recarea/%3Frecid%3D42265" rel="noopener" target="_blank"><span data-dcnode-id="3634" instrument_node="">Cape Perpetua Scenic Area</span></a><span data-dcnode-id="3632" instrument_node=""> just south of Yahats is a feast for the outdoor enthusiasts! This area is known for its lush forests, fantastic hiking opportunities, and the incredible, rugged views you’ll get from the winding 101.&nbsp;</span></p><span data-dcnode-id="3630" instrument_node="">
</span><h4 data-dcnode-id="3627"><span data-dcnode-id="3628" id="Things_to_Do_in_Cape_Perpetua"><span data-dcnode-id="3629" instrument_node="">Things to Do in Cape Perpetua</span></span></h4><span data-dcnode-id="3626" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="3624"><img alt="" class="wp-image-4385" data-dcnode-id="3625" height="684" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//westcoastwayfarers.com/wp-content/uploads/2021/05/thors-well-1024x684.png&amp;raw" srcset="https://westcoastwayfarers.com/wp-content/uploads/2021/05/thors-well-1024x684.png 1024w, https://westcoastwayfarers.com/wp-content/uploads/2021/05/thors-well-300x200.png 300w, https://westcoastwayfarers.com/wp-content/uploads/2021/05/thors-well-768x513.png 768w, https://westcoastwayfarers.com/wp-content/uploads/2021/05/thors-well-1536x1025.png 1536w, https://westcoastwayfarers.com/wp-content/uploads/2021/05/thors-well-900x600.png 900w, https://westcoastwayfarers.com/wp-content/uploads/2021/05/thors-well-600x400.png 600w, https://westcoastwayfarers.com/wp-content/uploads/2021/05/thors-well.png 2000w" width="1024"></figure><p data-dcnode-id="3616"><a data-dcnode-id="3621" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.atlasobscura.com/places/thor-s-well" rel="noopener" target="_blank"><strong data-dcnode-id="3622"><span data-dcnode-id="3623" instrument_node="">Thor’s Well</span></strong></a><span data-dcnode-id="3620" instrument_node="">: How could you </span><em data-dcnode-id="3618"><span data-dcnode-id="3619" instrument_node="">not </span></em><span data-dcnode-id="3617" instrument_node="">visit a place with a name like Thor’s Well?! Sometimes called the “drainpipe of the Pacific,” Thor’s Well truly needs to be seen in person to really get a sense of how frickin’ cool it is! Really, it’s just a big hole in a rock on the coast, but when the tide is high (or better yet, about an hour before high tide), the water shoots out then gets sucked back into the hole in a really spectacular manner. Plus, there are cool trails and tidepools to explore while you’re in the area.</span></p><span data-dcnode-id="3615" instrument_node="">
</span><p data-dcnode-id="3608"><strong data-dcnode-id="3613"><span data-dcnode-id="3614" instrument_node="">Devil’s Churn</span></strong><span data-dcnode-id="3612" instrument_node="">: After you check out Thor’s Well, make your way by car or by foot about a mile north to </span><a data-dcnode-id="3610" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fs.usda.gov/recarea/siuslaw/recarea/%3Frecid%3D42293" rel="noopener" target="_blank"><span data-dcnode-id="3611" instrument_node="">Devil’s Churn</span></a><span data-dcnode-id="3609" instrument_node=""> (what’s with these awesome names anyway?), a giant crack in the side of the coastline that water shoots through creating some crazy, frothy, churning, violent wave action.&nbsp;</span></p><span data-dcnode-id="3607" instrument_node="">
</span><p data-dcnode-id="3602"><a data-dcnode-id="3604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fs.usda.gov/recarea/siuslaw/recarea/%3Frecid%3D42275" rel="noopener" target="_blank"><strong data-dcnode-id="3605"><span data-dcnode-id="3606" instrument_node="">Cape Perpetua Lookout</span></strong></a><span data-dcnode-id="3603" instrument_node="">: This is a can’t-miss stop. It’s easy and hella cool. It’s also the highest viewpoint by car along the Oregon 101 at 800 feet, and if that doesn’t sound high to you, just go and then let me know what you think.</span></p><span data-dcnode-id="3601" instrument_node="">
</span><p data-dcnode-id="3593"><a data-dcnode-id="3598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stateparks.oregon.gov/index.cfm%3Fdo%3Dpark.profile%26parkId%3D86" rel="noopener" target="_blank"><strong data-dcnode-id="3599"><span data-dcnode-id="3600" instrument_node="">Heceta Head Lighthouse</span></strong></a><span data-dcnode-id="3597" instrument_node="">: Oh man, this is a pretty one! Definitely one of the most popular lighthouses for photographers, the Heceta Head Lighthouse sits on a 1,000 foot headland. They have tours of the lighthouse, a charming B&amp;B in the old light keeper’s home, and tidepools and trails to explore (including the nearby Shire-esque </span><a data-dcnode-id="3595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.alltrails.com/trail/us/oregon/hobbit-trail-and-china-creek-trail-loop" rel="noopener" target="_blank"><span data-dcnode-id="3596" instrument_node="">Hobbit Trail</span></a><span data-dcnode-id="3594" instrument_node="">).</span></p><span data-dcnode-id="3592" instrument_node="">
</span><p data-dcnode-id="3587"><a data-dcnode-id="3589" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.sealioncaves.com/" rel="noopener" target="_blank"><strong data-dcnode-id="3590"><span data-dcnode-id="3591" instrument_node="">Sea Lion Caves</span></strong></a><span data-dcnode-id="3588" instrument_node="">: Just going down into the expansive caves (the largest sea cave in America!) would be worth the experience, but to top it off, you get to see hundreds of adorable sea lions loafing about and playing and arfing just like the puppy dogs of the sea they are. Go in winter to see the most sea lions.</span></p><span data-dcnode-id="3586" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="3584"><img alt="" class="wp-image-4383" data-dcnode-id="3585" height="683" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//westcoastwayfarers.com/wp-content/uploads/2021/05/Heceta-Head-Lighthouse-1-1024x683.jpg&amp;raw" srcset="https://westcoastwayfarers.com/wp-content/uploads/2021/05/Heceta-Head-Lighthouse-1-1024x683.jpg 1024w, https://westcoastwayfarers.com/wp-content/uploads/2021/05/Heceta-Head-Lighthouse-1-300x200.jpg 300w, https://westcoastwayfarers.com/wp-content/uploads/2021/05/Heceta-Head-Lighthouse-1-768x512.jpg 768w, https://westcoastwayfarers.com/wp-content/uploads/2021/05/Heceta-Head-Lighthouse-1-1536x1024.jpg 1536w, https://westcoastwayfarers.com/wp-content/uploads/2021/05/Heceta-Head-Lighthouse-1-scaled.jpg 2048w, https://westcoastwayfarers.com/wp-content/uploads/2021/05/Heceta-Head-Lighthouse-1-900x600.jpg 900w, https://westcoastwayfarers.com/wp-content/uploads/2021/05/Heceta-Head-Lighthouse-1-600x400.jpg 600w" width="1024"></figure><hr class="wp-block-separator" data-dcnode-id="3583"><h3 class="has-text-align-center" data-dcnode-id="3580"><span data-dcnode-id="3581" id="The_Oregon_Dunes_Bandon"><span data-dcnode-id="3582" instrument_node="">The Oregon Dunes &amp; Bandon&nbsp;</span></span></h3><span data-dcnode-id="3579" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="3577"><img alt="" class="wp-image-81362" data-dcnode-id="3578" height="682" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//westcoastwayfarers.com/wp-content/uploads/2021/08/DSC00986-1-1024x682.jpg&amp;raw" srcset="https://westcoastwayfarers.com/wp-content/uploads/2021/08/DSC00986-1-1024x682.jpg 1024w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/DSC00986-1-300x200.jpg 300w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/DSC00986-1-768x512.jpg 768w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/DSC00986-1-1536x1024.jpg 1536w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/DSC00986-1.jpg 2000w" width="1024"></figure><p data-dcnode-id="3569"><strong data-dcnode-id="3575"><span data-dcnode-id="3576" instrument_node="">Drive time from Cape Perpetua to Oregon Dunes</span></strong><span data-dcnode-id="3574" instrument_node="">: 56 minutes / 44 miles</span><br data-dcnode-id="3573"><strong data-dcnode-id="3571"><span data-dcnode-id="3572" instrument_node="">Drive time from Oregon Dunes to Bandon</span></strong><span data-dcnode-id="3570" instrument_node="">: 1 hour / 50 miles</span></p><span data-dcnode-id="3568" instrument_node="">
</span><p data-dcnode-id="3563"><span data-dcnode-id="3567" instrument_node="">From the Dunes to Bandon is about a 50 miles stretch of coastline that’s well worth visiting, but there aren’t a lot of big towns to stop in (there is Coos Bay, which is </span><em data-dcnode-id="3565"><span data-dcnode-id="3566" instrument_node="">fine, </span></em><span data-dcnode-id="3564" instrument_node="">but has never been one of my favorite spots). I’ll outline the below stops from north to south as you make your way down the 101.</span></p><span data-dcnode-id="3562" instrument_node="">
</span><h4 data-dcnode-id="3559"><span data-dcnode-id="3560" id="Things_to_Do_in_Oregon_Dunes_Bandon"><span data-dcnode-id="3561" instrument_node="">Things to Do in Oregon Dunes &amp; Bandon</span></span></h4><span data-dcnode-id="3558" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="3556"><img alt="" class="wp-image-81363" data-dcnode-id="3557" height="683" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//westcoastwayfarers.com/wp-content/uploads/2021/08/Bandon-Oregon-1024x683.jpg&amp;raw" srcset="https://westcoastwayfarers.com/wp-content/uploads/2021/08/Bandon-Oregon-1024x683.jpg 1024w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/Bandon-Oregon-300x200.jpg 300w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/Bandon-Oregon-768x512.jpg 768w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/Bandon-Oregon-1536x1024.jpg 1536w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/Bandon-Oregon-scaled.jpg 2048w" width="1024"></figure><p data-dcnode-id="3546"><strong data-dcnode-id="3554"><span data-dcnode-id="3555" instrument_node="">Oregon Dunes</span></strong><span data-dcnode-id="3553" instrument_node="">: I highly recommend camping one night at the dunes if you can swing it. The scenery is otherworldly and it’s a truly unique experience to watch the sun set and rise there. If you can only spare a few hours, start at the </span><a data-dcnode-id="3551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fs.usda.gov/recarea/siuslaw/recarea/%3Frecid%3D42467" rel="noopener" target="_blank"><span data-dcnode-id="3552" instrument_node="">day use area</span></a><span data-dcnode-id="3550" instrument_node=""> to get some exploring done on foot. If you’re feeling more adventurous </span><a data-dcnode-id="3548" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ridetheoregondunes.com/" rel="noopener" target="_blank"><span data-dcnode-id="3549" instrument_node="">rent a dune buggy from Spinreel</span></a><span data-dcnode-id="3547" instrument_node="">!</span></p><span data-dcnode-id="3545" instrument_node="">
</span><p data-dcnode-id="3535"><a data-dcnode-id="3542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stateparks.oregon.gov/index.cfm%3Fdo%3Dpark.profile%26parkId%3D66" rel="noopener" target="_blank"><strong data-dcnode-id="3543"><span data-dcnode-id="3544" instrument_node="">Cape Arago</span></strong></a><strong data-dcnode-id="3540"><span data-dcnode-id="3541" instrument_node=""> and Shore Acres</span></strong><span data-dcnode-id="3539" instrument_node="">: More sea lions, you guys! I like this area because it never seems to get too crowded, even on a nice weekend. Head north from the main entrance of Cape Arago to watch sea lions, or south to check out the tide pools. </span><a data-dcnode-id="3537" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stateparks.oregon.gov/index.cfm%3Fdo%3Dpark.profile%26parkId%3D68" rel="noopener" target="_blank"><span data-dcnode-id="3538" instrument_node="">Shore Acres</span></a><span data-dcnode-id="3536" instrument_node=""> is equally as lovely and also features botanical gardens!</span></p><span data-dcnode-id="3534" instrument_node="">
</span><p data-dcnode-id="3530"><strong data-dcnode-id="3532"><span data-dcnode-id="3533" instrument_node="">Bandon</span></strong><span data-dcnode-id="3531" instrument_node=""> is my favorite southern Oregon coastal town. It’s just the right blend of touristy yet real. Stroll along the boardwalk over to the South Jetty Park and collect as many cool beach rocks as you can fit in your pockets.</span></p><span data-dcnode-id="3529" instrument_node="">
</span><p data-dcnode-id="3516"><a data-dcnode-id="3526" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bandonrain.com/" rel="noopener" target="_blank"><strong data-dcnode-id="3527"><span data-dcnode-id="3528" instrument_node="">Bandon Rain Cider</span></strong></a><strong data-dcnode-id="3524"><span data-dcnode-id="3525" instrument_node=""> &amp; </span></strong><a data-dcnode-id="3521" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bandonbrewingcompany.com/" rel="noopener" target="_blank"><strong data-dcnode-id="3522"><span data-dcnode-id="3523" instrument_node="">Bandon Brewing</span></strong></a><span data-dcnode-id="3520" instrument_node="">: Two excellent southern coast spots making superb drinks! Plus, Bandon Rain is conveniently located right next to </span><a data-dcnode-id="3518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//facerockcreamery.com/" rel="noopener" target="_blank"><span data-dcnode-id="3519" instrument_node="">Face Rock Creamery</span></a><span data-dcnode-id="3517" instrument_node=""> that rivals Tillamook for its deliciousness.&nbsp;</span></p><span data-dcnode-id="3515" instrument_node="">
</span><p data-dcnode-id="3507"><a data-dcnode-id="3512" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stateparks.oregon.gov/index.cfm%3Fdo%3Dpark.profile%26parkId%3D50" rel="noopener" target="_blank"><strong data-dcnode-id="3513"><span data-dcnode-id="3514" instrument_node="">Bullards Beach State Park</span></strong></a><span data-dcnode-id="3511" instrument_node="">: My dad’s best friend, Alex, was the harbormaster in Bandon for 26 years, and when we’d visit we’d always walk along Bullards Beach hunting for agates. I was never very good at it and when I would proudly present what I thought to be an agate to Alex, he’d tell me it was a “leaverite.” “What’s a leaverite,” I’d ask naively? He’d throw my “agate” back into the water and say, “</span><em data-dcnode-id="3509"><span data-dcnode-id="3510" instrument_node="">Leave ‘er right</span></em><span data-dcnode-id="3508" instrument_node=""> there.” I’m sure you’ll have better luck than I did. Bullards Beach is beautiful and wild and it’s also got a great campground!</span></p><span data-dcnode-id="3506" instrument_node="">
</span><div class="wp-block-columns" data-dcnode-id="3490"><span data-dcnode-id="3505" instrument_node="">
</span><div class="wp-block-column" data-dcnode-id="3499"><span data-dcnode-id="3504" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="3501"><figure class="aligncenter size-large is-resized" data-dcnode-id="3502"><img alt="" class="wp-image-81364" data-dcnode-id="3503" height="768" loading="lazy" sizes="(max-width: 512px) 100vw, 512px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//westcoastwayfarers.com/wp-content/uploads/2021/08/DSC01000-682x1024.jpg&amp;raw" srcset="https://westcoastwayfarers.com/wp-content/uploads/2021/08/DSC01000-682x1024.jpg 682w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/DSC01000-200x300.jpg 200w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/DSC01000-768x1152.jpg 768w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/DSC01000-1024x1536.jpg 1024w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/DSC01000.jpg 1333w" width="512"></figure></div><span data-dcnode-id="3500" instrument_node="">
</span></div><span data-dcnode-id="3498" instrument_node="">
</span><div class="wp-block-column" data-dcnode-id="3492"><span data-dcnode-id="3497" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="3494"><figure class="aligncenter size-large is-resized" data-dcnode-id="3495"><img alt="" class="wp-image-81365" data-dcnode-id="3496" height="768" loading="lazy" sizes="(max-width: 512px) 100vw, 512px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//westcoastwayfarers.com/wp-content/uploads/2021/08/DSC01047-683x1024.jpg&amp;raw" srcset="https://westcoastwayfarers.com/wp-content/uploads/2021/08/DSC01047-683x1024.jpg 683w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/DSC01047-200x300.jpg 200w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/DSC01047-768x1152.jpg 768w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/DSC01047-1024x1536.jpg 1024w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/DSC01047.jpg 1365w" width="512"></figure></div><span data-dcnode-id="3493" instrument_node="">
</span></div><span data-dcnode-id="3491" instrument_node="">
</span></div><span data-dcnode-id="3489" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="3487"><img alt="" class="wp-image-81366" data-dcnode-id="3488" height="682" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//westcoastwayfarers.com/wp-content/uploads/2021/08/DSC01022-1024x682.jpg&amp;raw" srcset="https://westcoastwayfarers.com/wp-content/uploads/2021/08/DSC01022-1024x682.jpg 1024w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/DSC01022-300x200.jpg 300w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/DSC01022-768x512.jpg 768w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/DSC01022-1536x1024.jpg 1536w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/DSC01022.jpg 2000w" width="1024"></figure><h4 data-dcnode-id="3484"><span data-dcnode-id="3485" id="Places_to_Stay_in_Oregon_Dunes_Bandon"><span data-dcnode-id="3486" instrument_node="">Places to Stay in Oregon Dunes &amp; Bandon</span></span></h4><span data-dcnode-id="3483" instrument_node="">
</span><p data-dcnode-id="3478"><a data-dcnode-id="3480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.booking.com/hotel/us/lamplighter-inn.en.html%3Faid%3D2106063%26no_rooms%3D1%26group_adults%3D2" rel="noreferrer noopener nofollow" target="_blank"><strong data-dcnode-id="3481"><span data-dcnode-id="3482" instrument_node="">Lamplighter Inn</span></strong></a><span data-dcnode-id="3479" instrument_node="">: From the street, the Lamplighter Inn looks just like any other roadside motel, but that belies what is actually a fantastic, clean, budget-friendly motel. Great for road trips when you want something nice, but not fancy.</span></p><span data-dcnode-id="3477" instrument_node="">
</span><p data-dcnode-id="3472"><a data-dcnode-id="3474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//oregonstateparks.reserveamerica.com/camping/bullards-beach-state-park/r/campgroundDetails.do%3FcontractCode%3DOR%26parkId%3D402398" rel="noopener" target="_blank"><strong data-dcnode-id="3475"><span data-dcnode-id="3476" instrument_node="">Bullards Beach Campground</span></strong></a><span data-dcnode-id="3473" instrument_node="">: Very well-maintained campgrounds with options to rent a yurt! The beach is about a ¾ mile walk from the campground, but there’s a nice trail you can take there, so it doesn’t feel too far.</span></p><span data-dcnode-id="3471" instrument_node="">
</span><p data-dcnode-id="3465"><span data-dcnode-id="3470" instrument_node="">A bit inland, but still plenty close enough to appreciate all this area has to offer is this </span><a data-dcnode-id="3467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dpbolvw.net/click-100295489-11553823%3Furl%3Dhttps%253A%252F%252Fwww.vrbo.com%252F1344091%253FnoDates%253Dtrue" rel="noreferrer noopener nofollow" target="_blank"><strong data-dcnode-id="3468"><span data-dcnode-id="3469" instrument_node="">lovely and relaxing chalet</span></strong></a><span data-dcnode-id="3466" instrument_node="">. Big outdoor fire pit, private hot tub on the back deck under a canopy of trees, all on a secluded 10 acre lot with a view of Tenmile Lake? Yes, please!</span></p><span data-dcnode-id="3464" instrument_node="">
</span><h3 class="has-text-align-center" data-dcnode-id="3461"><span data-dcnode-id="3462" id="Cape_Blanco_Port_Orford"><span data-dcnode-id="3463" instrument_node="">Cape Blanco &amp; Port Orford</span></span></h3><span data-dcnode-id="3460" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="3458"><img alt="" class="wp-image-81369" data-dcnode-id="3459" height="678" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//westcoastwayfarers.com/wp-content/uploads/2021/08/Cape-Blanco-Lighthouse-2-1024x678.jpg&amp;raw" srcset="https://westcoastwayfarers.com/wp-content/uploads/2021/08/Cape-Blanco-Lighthouse-2-1024x678.jpg 1024w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/Cape-Blanco-Lighthouse-2-300x199.jpg 300w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/Cape-Blanco-Lighthouse-2-768x509.jpg 768w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/Cape-Blanco-Lighthouse-2-1536x1017.jpg 1536w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/Cape-Blanco-Lighthouse-2.jpg 2048w" width="1024"></figure><p data-dcnode-id="3454"><strong data-dcnode-id="3456"><span data-dcnode-id="3457" instrument_node="">Drive time from Bandon to Port Orford</span></strong><span data-dcnode-id="3455" instrument_node="">: 31 minutes / 27 miles</span></p><span data-dcnode-id="3453" instrument_node="">
</span><p data-dcnode-id="3451"><span data-dcnode-id="3452" instrument_node="">It’s hard for me to write objectively about the southern Oregon coast because I’m so enamored with it. Don’t get me wrong, I love the entire Oregon coast, but when I spend time in the southern parts I just feel a sense of calmness and awe. It’s weird maybe. Or maybe it’s just beautiful and I can’t help it!</span></p><span data-dcnode-id="3450" instrument_node="">
</span><h4 data-dcnode-id="3447"><span data-dcnode-id="3448" id="Things_to_Do_in_Cape_Blanco_Port_Orford"><span data-dcnode-id="3449" instrument_node="">Things to Do in Cape Blanco &amp; Port Orford</span></span></h4><span data-dcnode-id="3446" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="3442"><img alt="" class="wp-image-81370" data-dcnode-id="3445" height="682" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//westcoastwayfarers.com/wp-content/uploads/2021/08/DSC00885-1024x682.jpg&amp;raw" srcset="https://westcoastwayfarers.com/wp-content/uploads/2021/08/DSC00885-1024x682.jpg 1024w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/DSC00885-300x200.jpg 300w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/DSC00885-768x512.jpg 768w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/DSC00885-1536x1024.jpg 1536w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/DSC00885.jpg 2000w" width="1024"><figcaption data-dcnode-id="3443"><span data-dcnode-id="3444" instrument_node="">The hike out to Blacklock Point</span></figcaption></figure><p data-dcnode-id="3437"><a data-dcnode-id="3439" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stateparks.oregon.gov/index.cfm%3Fdo%3Dpark.profile%26parkId%3D44" rel="noopener" target="_blank"><strong data-dcnode-id="3440"><span data-dcnode-id="3441" instrument_node="">Cape Blanco Lighthouse</span></strong></a><span data-dcnode-id="3438" instrument_node="">: The hike out to the Cape Blanco lighthouse is outstanding, and if you can catch it right after sunset AND a full moon AND have a family of deer greet you— oh man! Yes, I was lucky enough to see it this way after a long day backpacking into the driving wind along the Oregon Coast Trail (pro tip: if you ever do the OCT, go north to south). I can’t promise you all this, but I can promise you lovely views. They also have a nice and well-maintained campground.&nbsp;</span></p><span data-dcnode-id="3436" instrument_node="">
</span><p data-dcnode-id="3431"><a data-dcnode-id="3433" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.alltrails.com/trail/us/oregon/port-orford-heads-trail" rel="noreferrer noopener nofollow" target="_blank"><strong data-dcnode-id="3434"><span data-dcnode-id="3435" instrument_node="">Port Orford Heads Loop Hike</span></strong></a><span data-dcnode-id="3432" instrument_node="">: This is a super short one-mile hike along the headlands for phenomenal views up and down the coast. There’s also a cute little museum about the lifeboat station that used to sit here from 1934 to 1970.</span></p><span data-dcnode-id="3430" instrument_node="">
</span><p data-dcnode-id="3422"><a data-dcnode-id="3427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.alltrails.com/trail/us/oregon/blacklock-point-trail" rel="noreferrer noopener nofollow" target="_blank"><strong data-dcnode-id="3428"><span data-dcnode-id="3429" instrument_node="">Blacklock Point Hike</span></strong></a><span data-dcnode-id="3426" instrument_node="">: Another great 4 mile trail that takes you through forest and wildflowers out to Blacklock Point. If you’re craving a longer hike that gives you more time along the coast, try this </span><a data-dcnode-id="3424" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.oregonhikers.org/field_guide/Blacklock_Point_from_Floras_Lake_Hike" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="3425" instrument_node="">9 mile hike</span></a><span data-dcnode-id="3423" instrument_node=""> that takes you along one of the most stunning sections of the Oregon Coast Trail.&nbsp;</span></p><span data-dcnode-id="3421" instrument_node="">
</span><p data-dcnode-id="3416"><a data-dcnode-id="3418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stateparks.oregon.gov/index.cfm%3Fdo%3Dpark.profile%26parkId%3D40" rel="noreferrer noopener" target="_blank"><strong data-dcnode-id="3419"><span data-dcnode-id="3420" instrument_node="">Humbug Mountain Hike</span></strong></a><span data-dcnode-id="3417" instrument_node="">: It’s rare when traveling along the Oregon coast to get a hike that really gives you some elevation gain and gets the heart pumping, but Humbug Mountain will do just that. It’s actually the tallest mountain on the Oregon coast at 1,756 feet and the views you get at the top are epic.</span></p><span data-dcnode-id="3415" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="3411"><img alt="" class="wp-image-81368" data-dcnode-id="3414" height="768" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//westcoastwayfarers.com/wp-content/uploads/2021/08/IMG-9389-1024x768.jpg&amp;raw" srcset="https://westcoastwayfarers.com/wp-content/uploads/2021/08/IMG-9389-1024x768.jpg 1024w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/IMG-9389-300x225.jpg 300w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/IMG-9389-768x576.jpg 768w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/IMG-9389-1536x1152.jpg 1536w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/IMG-9389.jpg 2048w" width="1024"><figcaption data-dcnode-id="3412"><span data-dcnode-id="3413" instrument_node="">The view from the top of Humbug Mountain</span></figcaption></figure><hr class="wp-block-separator" data-dcnode-id="3410"><h3 class="has-text-align-center" data-dcnode-id="3407"><span data-dcnode-id="3408" id="Samuel_H_Boardman_Scenic_Corridor"><span data-dcnode-id="3409" instrument_node="">Samuel H. Boardman Scenic Corridor</span></span></h3><span data-dcnode-id="3406" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="3404"><img alt="" class="wp-image-81371" data-dcnode-id="3405" height="682" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//westcoastwayfarers.com/wp-content/uploads/2021/08/DSC00827-1024x682.jpg&amp;raw" srcset="https://westcoastwayfarers.com/wp-content/uploads/2021/08/DSC00827-1024x682.jpg 1024w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/DSC00827-300x200.jpg 300w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/DSC00827-768x512.jpg 768w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/DSC00827-1536x1024.jpg 1536w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/DSC00827.jpg 2000w" width="1024"></figure><p data-dcnode-id="3400"><strong data-dcnode-id="3402"><span data-dcnode-id="3403" instrument_node="">Drive time from Port Orford to Samuel H. Boardman Scenic Corridor</span></strong><span data-dcnode-id="3401" instrument_node="">: 47 minutes / 41 miles</span></p><span data-dcnode-id="3399" instrument_node="">
</span><p data-dcnode-id="3397"><span data-dcnode-id="3398" instrument_node="">Samuel H. Boardman Scenic Corridor is an 18-mile stretch of the 101 with a lot of really cool stops along the way, some of them require a short hike in, but none of them will take you too long to explore and snap a few photos. This is not to say that it isn’t one of the most spectacular stretches of coastline you’ll ever lay eyes on! So drive and stop, drive and stop, drive and stop. It’s worth it.</span></p><span data-dcnode-id="3396" instrument_node="">
</span><h4 data-dcnode-id="3393"><span data-dcnode-id="3394" id="Stops_Along_the_Samuel_H_Boardman_Scenic_Corridor"><span data-dcnode-id="3395" instrument_node="">Stops Along the Samuel H. Boardman Scenic Corridor</span></span></h4><span data-dcnode-id="3392" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="3390"><img alt="" class="wp-image-81375" data-dcnode-id="3391" height="682" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//westcoastwayfarers.com/wp-content/uploads/2021/08/DSC00810-1024x682.jpg&amp;raw" srcset="https://westcoastwayfarers.com/wp-content/uploads/2021/08/DSC00810-1024x682.jpg 1024w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/DSC00810-300x200.jpg 300w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/DSC00810-768x512.jpg 768w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/DSC00810-1536x1024.jpg 1536w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/DSC00810.jpg 2000w" width="1024"></figure><p data-dcnode-id="3386"><strong data-dcnode-id="3388"><span data-dcnode-id="3389" instrument_node="">Secret Beach</span></strong><span data-dcnode-id="3387" instrument_node="">: Shhhh! Jk. I suppose it’s called Secret Beach because it’s kinda tucked away in a little cove? The trail down isn’t hard but it can be a bit steep/rocky/wet so watch your footing. If you go the whole way down and back you’re looking at about 1.5 miles. Going at low tide will give you more access to the caves, and did I mention there’s a waterfall down there!?</span></p><span data-dcnode-id="3385" instrument_node="">
</span><p data-dcnode-id="3381"><strong data-dcnode-id="3383"><span data-dcnode-id="3384" instrument_node="">Natural Bridges</span></strong><span data-dcnode-id="3382" instrument_node="">: You’ve likely seen someone’s Insta with a picture of them on or near the Natural Bridges area. It’s ripe for social media, but please don’t do anything dangerous to get your shot. There are seven spectacular arches to be found here and they’ll be even more spectacular if no one dies trying to get likes.&nbsp;</span></p><span data-dcnode-id="3380" instrument_node="">
</span><p data-dcnode-id="3375"><a data-dcnode-id="3377" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.oregonhikers.org/field_guide/Samuel_Boardman%3A_Indian_Sands_Hike" rel="noreferrer noopener nofollow" target="_blank"><strong data-dcnode-id="3378"><span data-dcnode-id="3379" instrument_node="">Indian Sands Trail</span></strong></a><span data-dcnode-id="3376" instrument_node="">: This is a 6 mile trail that you’ll ideally do a car drop off and hike it through (or hitchhike? Not gonna lie—I’ve done it with great success), or you can shorten it to any length you’re comfortable with and make it an out-and-back. If you can swing the whole trail though, it’s a great way to see the area. Fun fact! There’s been evidence of human habitation found on Indian Sands beach that dates back 12,000 years!</span></p><span data-dcnode-id="3374" instrument_node="">
</span><p data-dcnode-id="3370"><strong data-dcnode-id="3372"><span data-dcnode-id="3373" instrument_node="">Whaleshead Beach</span></strong><span data-dcnode-id="3371" instrument_node="">: So named because of a sea stack that looks like a whale’s head (I can kinda see it?) and apparently when the waves hit it just right it looks like water spraying out from the whale’s blow hole. I’ve yet to personally witness this, but I hear it’s impressive. This is a great beach for relaxing or picnicking anytime of the day because it’s huge no matter what the tide’s doing</span></p><span data-dcnode-id="3369" instrument_node="">
</span><p data-dcnode-id="3362"><strong data-dcnode-id="3367"><span data-dcnode-id="3368" instrument_node="">Cape Ferrelo and House Rock</span></strong><span data-dcnode-id="3366" instrument_node="">: Sadly the majesty that is the Samuel H. Boardman Corridor must come to an end, but you can see it out with a bang! This is a great </span><a data-dcnode-id="3364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.oregonhikers.org/field_guide/Samuel_Boardman%3A_Lone_Ranch_Beach_to_House_Rock_Hike" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="3365" instrument_node="">5.7 mile trail</span></a><span data-dcnode-id="3363" instrument_node=""> that lets you explore wildflowers along Cape Ferrelo and then takes you up to the House Rock beach and viewpoint. You’ll have to work out the logistics as it’s best done as a car drop off (or more hitchhiking?)</span></p><span data-dcnode-id="3361" instrument_node="">
</span><div class="wp-block-columns" data-dcnode-id="3345"><span data-dcnode-id="3360" instrument_node="">
</span><div class="wp-block-column" data-dcnode-id="3354"><span data-dcnode-id="3359" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="3356"><figure class="aligncenter size-large is-resized" data-dcnode-id="3357"><img alt="" class="wp-image-81373" data-dcnode-id="3358" height="768" loading="lazy" sizes="(max-width: 512px) 100vw, 512px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//westcoastwayfarers.com/wp-content/uploads/2021/08/DSC00821-682x1024.jpg&amp;raw" srcset="https://westcoastwayfarers.com/wp-content/uploads/2021/08/DSC00821-682x1024.jpg 682w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/DSC00821-200x300.jpg 200w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/DSC00821-768x1152.jpg 768w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/DSC00821-1024x1536.jpg 1024w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/DSC00821.jpg 1333w" width="512"></figure></div><span data-dcnode-id="3355" instrument_node="">
</span></div><span data-dcnode-id="3353" instrument_node="">
</span><div class="wp-block-column" data-dcnode-id="3347"><span data-dcnode-id="3352" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="3349"><figure class="aligncenter size-large is-resized" data-dcnode-id="3350"><img alt="" class="wp-image-81374" data-dcnode-id="3351" height="768" loading="lazy" sizes="(max-width: 512px) 100vw, 512px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//westcoastwayfarers.com/wp-content/uploads/2021/08/DSC00832-682x1024.jpg&amp;raw" srcset="https://westcoastwayfarers.com/wp-content/uploads/2021/08/DSC00832-682x1024.jpg 682w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/DSC00832-200x300.jpg 200w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/DSC00832-768x1152.jpg 768w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/DSC00832-1024x1536.jpg 1024w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/DSC00832.jpg 1333w" width="512"></figure></div><span data-dcnode-id="3348" instrument_node="">
</span></div><span data-dcnode-id="3346" instrument_node="">
</span></div><span data-dcnode-id="3344" instrument_node="">
</span><hr class="wp-block-separator" data-dcnode-id="3343"><h3 class="has-text-align-center" data-dcnode-id="3340"><span data-dcnode-id="3341" id="Brookings"><span data-dcnode-id="3342" instrument_node="">Brookings</span></span></h3><span data-dcnode-id="3339" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="3337"><img alt="" class="wp-image-81372" data-dcnode-id="3338" height="682" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//westcoastwayfarers.com/wp-content/uploads/2021/08/DSC00759-1024x682.jpg&amp;raw" srcset="https://westcoastwayfarers.com/wp-content/uploads/2021/08/DSC00759-1024x682.jpg 1024w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/DSC00759-300x200.jpg 300w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/DSC00759-768x512.jpg 768w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/DSC00759-1536x1024.jpg 1536w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/DSC00759.jpg 2000w" width="1024"></figure><p data-dcnode-id="3333"><strong data-dcnode-id="3335"><span data-dcnode-id="3336" instrument_node="">Drive time from Samuel H. Boardman Scenic Corridor to Brookings</span></strong><span data-dcnode-id="3334" instrument_node="">: 15 minutes / 12 miles</span></p><span data-dcnode-id="3332" instrument_node="">
</span><p data-dcnode-id="3330"><span data-dcnode-id="3331" instrument_node="">Brookings is the last town on the Oregon Coast before you cross over into California. But, because Brookings is so far off the beaten path you’ll find much more solitude, secluded beaches, and fantastic trails that won’t be crowded even on the sunniest days. </span></p><span data-dcnode-id="3329" instrument_node="">
</span><p data-dcnode-id="3324"><span data-dcnode-id="3328" instrument_node="">All that said, it </span><em data-dcnode-id="3326"><span data-dcnode-id="3327" instrument_node="">is</span></em><span data-dcnode-id="3325" instrument_node=""> far away and since it is likely the last stop on your list, it will mean a nearly six hour drive back up north to Portland. If you can make it work, there’s definitely cool stuff down there, but you probably don’t need to stay the night.</span></p><span data-dcnode-id="3323" instrument_node="">
</span><h4 data-dcnode-id="3320"><span data-dcnode-id="3321" id="Things_to_Do_in_Brookings"><span data-dcnode-id="3322" instrument_node="">Things to Do in Brookings</span></span></h4><span data-dcnode-id="3319" instrument_node="">
</span><p data-dcnode-id="3314"><a data-dcnode-id="3316" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stateparks.oregon.gov/index.cfm%3Fdo%3Dpark.profile%26parkId%3D58" rel="noopener" target="_blank"><strong data-dcnode-id="3317"><span data-dcnode-id="3318" instrument_node="">Harris Beach State Park</span></strong></a><span data-dcnode-id="3315" instrument_node="">: First off, this is the best southern coast camping spot you can find, and is ideal if you’re wanting to spend more time exploring the Samuel H. Boardman area. But it’s also an excellent spot for sea lion or whale watching, tide pooling, or just relaxing on the sandy beaches. You can also look out onto Goat Island (the largest island on the Oregon Coast) and see thousands of nesting seabirds including puffins!&nbsp;</span></p><span data-dcnode-id="3313" instrument_node="">
</span><p data-dcnode-id="3306"><strong data-dcnode-id="3311"><span data-dcnode-id="3312" instrument_node="">Chetco Point</span></strong><span data-dcnode-id="3310" instrument_node="">: Take the </span><a data-dcnode-id="3308" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.oregonhikers.org/field_guide/Chetco_Point_Hike" rel="noopener" target="_blank"><span data-dcnode-id="3309" instrument_node="">easy and lovely 1 mile hike</span></a><span data-dcnode-id="3307" instrument_node=""> out to an impressive view out to sea off Chetco Point.</span></p><span data-dcnode-id="3305" instrument_node="">
</span><p data-dcnode-id="3300"><a data-dcnode-id="3302" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stateparks.oregon.gov/index.cfm%3Fdo%3Dpark.profile%26parkId%3D51" rel="noopener" target="_blank"><strong data-dcnode-id="3303"><span data-dcnode-id="3304" instrument_node="">Alfred A. Loeb State Park</span></strong></a><span data-dcnode-id="3301" instrument_node="">: Drive 8 miles east along the Chetco River and you’ll find another sensational park and campground, this one along the shores of the remarkably clear&nbsp; Chetco River that’s great for swimming, fishing, or paddling around.</span></p><span data-dcnode-id="3299" instrument_node="">
</span><h2 class="has-text-align-center" data-dcnode-id="3296"><span data-dcnode-id="3297" id="Putting_it_All_Together_Planning_Your_Oregon_Coast_Itinerary"><span data-dcnode-id="3298" instrument_node="">Putting it All Together: Planning Your Oregon Coast Itinerary</span></span></h2><span data-dcnode-id="3295" instrument_node="">
</span><p data-dcnode-id="3293"><span data-dcnode-id="3294" instrument_node="">Now that you have a comprehensive rundown of all the Oregon coast has to offer, let’s look at some actual trips you can make out of them! Keeping in mind that not everyone can afford to chuck it all and head out on a never-ending road trip, we’ll give you options for a 3-day, 5-day, and 7-day trip.</span></p><span data-dcnode-id="3292" instrument_node="">
</span><h3 data-dcnode-id="3289"><span data-dcnode-id="3290" id="With_3_Days"><span data-dcnode-id="3291" instrument_node="">With 3 Days</span></span></h3><span data-dcnode-id="3288" instrument_node="">
</span><p data-dcnode-id="3286"><span data-dcnode-id="3287" instrument_node="">With three days, you really don’t have time to drive the entire coast and spend enough time actually exploring the places you’re passing through. We’d recommend focusing your time on the northern Oregon Coast, exploring Astoria, Cannon Beach and the surrounding area, and Tillamook before returning to Portland.&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span></p><span data-dcnode-id="3285" instrument_node="">
</span><p data-dcnode-id="3254"><strong data-dcnode-id="3283"><span data-dcnode-id="3284" instrument_node="">Day 1 (Portland to Astoria)</span></strong><span data-dcnode-id="3282" instrument_node="">:</span><strong data-dcnode-id="3280"><span data-dcnode-id="3281" instrument_node=""> </span></strong><span data-dcnode-id="3279" instrument_node="">First order of the day is to </span><a data-dcnode-id="3277" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astoriacolumn.org/" rel="noopener" target="_blank"><span data-dcnode-id="3278" instrument_node="">climb the Astoria Column</span></a><span data-dcnode-id="3276" instrument_node="">. It’ll give you a good lay of the land, plus it’s a great way to get the blood pumping and the lungs working after sitting in the car for almost two hours. Next you’ll grab a quick lunch at a phenomenal food cart, </span><a data-dcnode-id="3274" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/Surf2Souloregon/" rel="noopener" target="_blank"><span data-dcnode-id="3275" instrument_node="">Surf 2 Soul</span></a><span data-dcnode-id="3273" instrument_node="">, before heading over to </span><a data-dcnode-id="3271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stateparks.oregon.gov/index.cfm%3Fdo%3Dpark.profile%26parkId%3D129" rel="noopener" target="_blank"><span data-dcnode-id="3272" instrument_node="">Fort Stevens State Park</span></a><span data-dcnode-id="3270" instrument_node=""> (and maybe eat your shrimp Po’Boy on the beach?). Spend the rest of the day strolling down the main drags of Commercial and Marine Dr., drink some beer (</span><a data-dcnode-id="3268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.buoybeer.com/" rel="noopener" target="_blank"><span data-dcnode-id="3269" instrument_node="">Buoy</span></a><span data-dcnode-id="3267" instrument_node=""> or </span><a data-dcnode-id="3265" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fortgeorgebrewery.com/" rel="noopener" target="_blank"><span data-dcnode-id="3266" instrument_node="">Fort George</span></a><span data-dcnode-id="3264" instrument_node="">), eat some food (can’t recommend highly enough </span><a data-dcnode-id="3262" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drinadaisy.com/" rel="noopener" target="_blank"><span data-dcnode-id="3263" instrument_node="">Drina Daisy</span></a><span data-dcnode-id="3261" instrument_node=""> for Bosnian food), then call it a night either at the hip </span><a data-dcnode-id="3259" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.booking.com/hotel/us/norblad-amp-hostel.en.html%3Faid%3D2106063%26no_rooms%3D1%26group_adults%3D2" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="3260" instrument_node="">Norblad Hotel</span></a><span data-dcnode-id="3258" instrument_node="">, or set up your tent at the </span><a data-dcnode-id="3256" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//oregonstateparks.reserveamerica.com/camping/fort-stevens-state-park/r/campgroundDetails.do%3FcontractCode%3DOR%26parkId%3D402178" rel="noopener" target="_blank"><span data-dcnode-id="3257" instrument_node="">Fort Stevens Campground</span></a><span data-dcnode-id="3255" instrument_node="">.</span></p><span data-dcnode-id="3253" instrument_node="">
</span><p data-dcnode-id="3222"><strong data-dcnode-id="3251"><span data-dcnode-id="3252" instrument_node="">Day 2 (Astoria to Cannon Beach)</span></strong><span data-dcnode-id="3250" instrument_node="">: Pick up coffee and a pastry at </span><a data-dcnode-id="3248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bluescorcher.coop/" rel="noopener" target="_blank"><span data-dcnode-id="3249" instrument_node="">Blue Scorcher</span></a><span data-dcnode-id="3247" instrument_node=""> on your way south to Cannon beach. Make your first stop in Seaside and walk up Broadway and spend some time feeding the seals at the </span><a data-dcnode-id="3245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.seasideaquarium.com/" rel="noopener" target="_blank"><span data-dcnode-id="3246" instrument_node="">Seaside Aquarium</span></a><span data-dcnode-id="3244" instrument_node="">, take a spin on the </span><a data-dcnode-id="3242" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/funlandseaside/" rel="noopener" target="_blank"><span data-dcnode-id="3243" instrument_node="">bumper cars</span></a><span data-dcnode-id="3241" instrument_node="">, and pick up a burrito at </span><a data-dcnode-id="3239" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/thestand.seaside" rel="noopener" target="_blank"><span data-dcnode-id="3240" instrument_node="">The Stand</span></a><span data-dcnode-id="3238" instrument_node="">. Then pop back in the car and hit up your daily hike at </span><a data-dcnode-id="3236" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stateparks.oregon.gov/index.cfm%3Fdo%3Dpark.profile%26parkId%3D140" rel="noopener" target="_blank"><span data-dcnode-id="3237" instrument_node="">Saddle Mountain</span></a><span data-dcnode-id="3235" instrument_node=""> as you’ll have better luck with weather in the afternoon. On your way into Cannon Beach stop by </span><a data-dcnode-id="3233" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stateparks.oregon.gov/index.cfm%3Fdo%3Dpark.profile%26parkId%3D136" rel="noopener" target="_blank"><span data-dcnode-id="3234" instrument_node="">Ecola State Park</span></a><span data-dcnode-id="3232" instrument_node=""> then eat at </span><a data-dcnode-id="3230" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.seasonscafecb.com/" rel="noopener" target="_blank"><span data-dcnode-id="3231" instrument_node="">Seasons Cafe</span></a><span data-dcnode-id="3229" instrument_node=""> in town. Stay fancy at the </span><a data-dcnode-id="3227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.booking.com/hotel/us/inn-at-cannon-beach.en.html%3Faid%3D2106063%26no_rooms%3D1%26group_adults%3D2" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="3228" instrument_node="">Inn at Cannon Beach</span></a><span data-dcnode-id="3226" instrument_node=""> or not fancy at </span><a data-dcnode-id="3224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.wrightsforcamping.com/" rel="noopener" target="_blank"><span data-dcnode-id="3225" instrument_node="">Wright’s for Camping</span></a><span data-dcnode-id="3223" instrument_node="">.</span></p><span data-dcnode-id="3221" instrument_node="">
</span><p data-dcnode-id="3202"><strong data-dcnode-id="3219"><span data-dcnode-id="3220" instrument_node="">Day 3</span></strong><span data-dcnode-id="3218" instrument_node=""> (</span><strong data-dcnode-id="3216"><span data-dcnode-id="3217" instrument_node="">Cannon Beach to Tillamook to Home)</span></strong><span data-dcnode-id="3215" instrument_node="">: Coffee and breakfast from </span><a data-dcnode-id="3213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sealevelbakery.com/" rel="noopener" target="_blank"><span data-dcnode-id="3214" instrument_node="">Sea Level</span></a><span data-dcnode-id="3212" instrument_node="">, then a stop in Oswald West State Park to hike </span><a data-dcnode-id="3210" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.oregonhikers.org/field_guide/Neahkahnie_Mountain_from_North_Hike" rel="noopener" target="_blank"><span data-dcnode-id="3211" instrument_node="">Neahkahnie Mountain</span></a><span data-dcnode-id="3209" instrument_node=""> (or just Cape Falcon if you don’t feel like going all the way to the top). Then head straight down to Tillamook where local ordinance demands you stop at the </span><a data-dcnode-id="3207" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tillamook.com/" rel="noopener" target="_blank"><span data-dcnode-id="3208" instrument_node="">Cheese Factory</span></a><span data-dcnode-id="3206" instrument_node=""> (&amp; ICE CREAM YUM). If you have time, jog down to </span><a data-dcnode-id="3204" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stateparks.oregon.gov/index.cfm%3Fdo%3Dpark.profile%26parkId%3D134" rel="noopener" target="_blank"><span data-dcnode-id="3205" instrument_node="">Cape Lookout State Park</span></a><span data-dcnode-id="3203" instrument_node=""> before making your way back to Portland via Highway 6 to the 26. Plan on about a 1 ½ hour drive to get home.</span></p><span data-dcnode-id="3201" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="3199"><img alt="" class="wp-image-81376" data-dcnode-id="3200" height="682" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//westcoastwayfarers.com/wp-content/uploads/2021/08/DSC00940-1024x682.jpg&amp;raw" srcset="https://westcoastwayfarers.com/wp-content/uploads/2021/08/DSC00940-1024x682.jpg 1024w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/DSC00940-300x200.jpg 300w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/DSC00940-768x512.jpg 768w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/DSC00940-1536x1024.jpg 1536w, https://westcoastwayfarers.com/wp-content/uploads/2021/08/DSC00940.jpg 2000w" width="1024"></figure><h3 data-dcnode-id="3196"><span data-dcnode-id="3197" id="With_5_Days"><span data-dcnode-id="3198" instrument_node="">With 5 Days</span></span></h3><span data-dcnode-id="3195" instrument_node="">
</span><p data-dcnode-id="3190"><span data-dcnode-id="3194" instrument_node="">Five days is definitely enough time to dig in and experience the whole coastline without feeling </span><em data-dcnode-id="3192"><span data-dcnode-id="3193" instrument_node="">too</span></em><span data-dcnode-id="3191" instrument_node=""> rushed. You’ll start from the tippy top of Astoria and make your way down to the (almost) end of the coast.</span></p><span data-dcnode-id="3189" instrument_node="">
</span><p data-dcnode-id="3170"><strong data-dcnode-id="3187"><span data-dcnode-id="3188" instrument_node="">Day 1 (Portland to Astoria)</span></strong><span data-dcnode-id="3186" instrument_node="">: Head out early from Portland and grab brunch and coffee in Astoria at </span><a data-dcnode-id="3184" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.thecoffeegirl.com/" rel="noopener" target="_blank"><span data-dcnode-id="3185" instrument_node="">Coffee Girl</span></a><span data-dcnode-id="3183" instrument_node=""> at their location right on Pier 39 on the water. Then head to the </span><a data-dcnode-id="3181" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nps.gov/lewi/index.htm" rel="noopener" target="_blank"><span data-dcnode-id="3182" instrument_node="">Lewis and Clark National Historical Park</span></a><span data-dcnode-id="3180" instrument_node=""> to explore their beautiful trails and visit the replica of Fort Clatsop and interact with their incredibly-knowledgeable rangers (in old-timey garb!). In the afternoon climb to the top of the </span><a data-dcnode-id="3178" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astoriacolumn.org/" rel="noopener" target="_blank"><span data-dcnode-id="3179" instrument_node="">Astoria Column</span></a><span data-dcnode-id="3177" instrument_node="">, walk along the riverfront, get pizza and beer at </span><a data-dcnode-id="3175" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fortgeorgebrewery.com/" rel="noopener" target="_blank"><span data-dcnode-id="3176" instrument_node="">Fort George</span></a><span data-dcnode-id="3174" instrument_node="">, then settle in for the night one block away at the affordable yet cool </span><a data-dcnode-id="3172" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.booking.com/hotel/us/norblad-amp-hostel.en.html%3Faid%3D2106063%26no_rooms%3D1%26group_adults%3D2" rel="noopener" target="_blank"><span data-dcnode-id="3173" instrument_node="">Norblad Hotel</span></a><span data-dcnode-id="3171" instrument_node="">.</span></p><span data-dcnode-id="3169" instrument_node="">
</span><p data-dcnode-id="3144"><strong data-dcnode-id="3167"><span data-dcnode-id="3168" instrument_node="">Day 2 (Astoria to Tillamook)</span></strong><span data-dcnode-id="3166" instrument_node="">: Your first stop today will be </span><a data-dcnode-id="3164" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stateparks.oregon.gov/index.cfm%3Fdo%3Dpark.profile%26parkId%3D139" rel="noopener" target="_blank"><span data-dcnode-id="3165" instrument_node="">Oswald West State Park</span></a><span data-dcnode-id="3163" instrument_node=""> where you can check out the surfers at Short Sands beach then take a hike on the </span><a data-dcnode-id="3161" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.alltrails.com/trail/us/oregon/cape-falcon" rel="noopener" target="_blank"><span data-dcnode-id="3162" instrument_node="">Cape Falcon trail</span></a><span data-dcnode-id="3160" instrument_node=""> for views down into Nehalem Bay. Pop into the cute town of Manzanita for lunch at </span><a data-dcnode-id="3158" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//yolkmanzanita.square.site/" rel="noopener" target="_blank"><span data-dcnode-id="3159" instrument_node="">Yolk</span></a><span data-dcnode-id="3157" instrument_node=""> and spend some time on the beach (that’s frequently less windy than its neighbors). Finally you’ll head into Tillamook where there’s no shortage of cheese—if you’ve already been to the </span><a data-dcnode-id="3155" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tillamook.com/visit-us/creamery" rel="noopener" target="_blank"><span data-dcnode-id="3156" instrument_node="">Tillamook Creamery</span></a><span data-dcnode-id="3154" instrument_node=""> or don’t feel like battling the crowds, try the equally as delicious </span><a data-dcnode-id="3152" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.blueheronoregon.com/" rel="noopener" target="_blank"><span data-dcnode-id="3153" instrument_node="">Blue Heron French Cheese Company</span></a><span data-dcnode-id="3151" instrument_node="">. Stay at the </span><a data-dcnode-id="3149" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.booking.com/hotel/us/netarts-surf-inn.en.html%3Faid%3D2106063%26no_rooms%3D1%26group_adults%3D2" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="3150" instrument_node="">Netarts Surf Inn</span></a><span data-dcnode-id="3148" instrument_node=""> directly east of Tillamook on the coast or the unique tiny home village at the </span><a data-dcnode-id="3146" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tkqlhce.com/click-100295489-13828058%3Furl%3Dhttps%253A%252F%252Fwww.hotels.com%252Fho524397%252Fsheltered-nook-tiny-homes-on-tillamook-bay-bay-city-united-states-of-america%252F%253Fq-rooms%253D1" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="3147" instrument_node="">Sheltered Nook</span></a><span data-dcnode-id="3145" instrument_node=""> just north of town.</span></p><span data-dcnode-id="3143" instrument_node="">
</span><p data-dcnode-id="3112"><strong data-dcnode-id="3141"><span data-dcnode-id="3142" instrument_node="">Day 3 (Tillamook to Newport)</span></strong><span data-dcnode-id="3140" instrument_node="">:</span><strong data-dcnode-id="3138"><span data-dcnode-id="3139" instrument_node=""> </span></strong><span data-dcnode-id="3137" instrument_node="">First stop is in the town of Pacific City where you should climb up to the top of the dunes and the </span><a data-dcnode-id="3135" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stateparks.oregon.gov/index.cfm%3Fdo%3Dpark.profile%26parkId%3D130" rel="noopener" target="_blank"><span data-dcnode-id="3136" instrument_node="">Cape Kiwanda National Scenic Area</span></a><span data-dcnode-id="3134" instrument_node=""> (preferably with </span><a data-dcnode-id="3132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stimuluscoffee.com/" rel="noopener" target="_blank"><span data-dcnode-id="3133" instrument_node="">Stimulus coffee</span></a><span data-dcnode-id="3131" instrument_node=""> in hand). After this you’ll keep heading south to Cascade Head. The best hike is this </span><a data-dcnode-id="3129" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.oregonhikers.org/field_guide/Cascade_Head_Hike" rel="noopener" target="_blank"><span data-dcnode-id="3130" instrument_node="">6.5 mile out-and-back</span></a><span data-dcnode-id="3128" instrument_node=""> but it’s not an easy one (not super hard either, but does take a time and an energy commitment). If you’re short on time or energy try </span><a data-dcnode-id="3126" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.alltrails.com/trail/us/oregon/cascade-head-via-nature-conservancy-trail" rel="noopener" target="_blank"><span data-dcnode-id="3127" instrument_node="">this 2.5 miler</span></a><span data-dcnode-id="3125" instrument_node="">. Once in Newport there’s just so much to do and if I can quickly plug the wonderfully- kitsch </span><a data-dcnode-id="3123" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ripleys.com/newport/" rel="noopener" target="_blank"><span data-dcnode-id="3124" instrument_node="">Ripley’s Believe It or Not World of Adventure</span></a><span data-dcnode-id="3122" instrument_node=""> for great photo-ops and a fun time had by all I will. For dinner, treat yourself to the freshest seafood you’ve ever had at </span><a data-dcnode-id="3120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.localocean.net/" rel="noopener" target="_blank"><span data-dcnode-id="3121" instrument_node="">Local Ocean</span></a><span data-dcnode-id="3119" instrument_node="">, then turn in for the night at the eclectic </span><a data-dcnode-id="3117" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//sylviabeachhotel.com/" rel="noopener" target="_blank"><span data-dcnode-id="3118" instrument_node="">Sylvia Beach Hotel</span></a><span data-dcnode-id="3116" instrument_node="">, or splurge on a room aboard (yes, it’s a riverboat!) the </span><a data-dcnode-id="3114" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tkqlhce.com/click-100295489-13828058%3Furl%3Dhttps%253A%252F%252Fwww.hotels.com%252Fho1630002208%252Fthe-newport-belle-newport-united-states-of-america%252F%253Fq-rooms%253D1" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="3115" instrument_node="">Newport Belle</span></a><span data-dcnode-id="3113" instrument_node="">.</span></p><span data-dcnode-id="3111" instrument_node="">
</span><p data-dcnode-id="3080"><strong data-dcnode-id="3109"><span data-dcnode-id="3110" instrument_node="">Day 4 (Newport to Bandon)</span></strong><span data-dcnode-id="3108" instrument_node="">:</span><strong data-dcnode-id="3106"><span data-dcnode-id="3107" instrument_node=""> </span></strong><span data-dcnode-id="3105" instrument_node="">You’ll spend a lot of time in the car today, but you’ll also see a lot, so head out early with coffee from </span><a data-dcnode-id="3103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/CoastiesRoasties/" rel="noopener" target="_blank"><span data-dcnode-id="3104" instrument_node="">Coasties Roasties</span></a><span data-dcnode-id="3102" instrument_node=""> for your first stop in </span><a data-dcnode-id="3100" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fs.usda.gov/wps/portal/fsinternet/cs/recarea%3Fss%3D110612%26navtype%3DBROWSEBYSUBJECT%26cid%3DFSE_003738%26navid%3D110240000000000%26pnavid%3D110000000000000%26position%3DBROWSEBYSUBJECT%26recid%3D42275%26ttype%3Drecarea%26pname%3DCape%2520Perpetua%2520Day%2520Use" rel="noopener" target="_blank"><span data-dcnode-id="3101" instrument_node="">Cape Perpetua</span></a><span data-dcnode-id="3099" instrument_node=""> at the overlook. This is an easy stop and happens to be the highest spot on the coast highway so don’t miss it. Drive a tad further south to see </span><a data-dcnode-id="3097" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.atlasobscura.com/places/thor-s-well" rel="noopener" target="_blank"><span data-dcnode-id="3098" instrument_node="">Thor’s Well</span></a><span data-dcnode-id="3096" instrument_node="">, then onward to </span><a data-dcnode-id="3094" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stateparks.oregon.gov/index.cfm%3Fdo%3Dpark.profile%26parkId%3D86" rel="noopener" target="_blank"><span data-dcnode-id="3095" instrument_node="">Heceta Head</span></a><span data-dcnode-id="3093" instrument_node=""> and an easy mile-long trail to probably my favorite lighthouse on the coast. Get back in the car (told you), but you </span><em data-dcnode-id="3091"><span data-dcnode-id="3092" instrument_node="">have</span></em><span data-dcnode-id="3090" instrument_node=""> to see the </span><a data-dcnode-id="3088" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fs.usda.gov/recarea/siuslaw/recreation/recarea/%3Frecid%3D42465" rel="noopener" target="_blank"><span data-dcnode-id="3089" instrument_node="">Oregon Dunes!</span></a><span data-dcnode-id="3087" instrument_node=""> You won’t have enough time to rent a quad, but you can see enough of the sights and tromp around at the day-use area. After a long day make your way into Bandon for Argentinian food at</span><a data-dcnode-id="3085" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/pabloscorner541/" rel="noopener" target="_blank"><span data-dcnode-id="3086" instrument_node=""> Pablo’s Corner</span></a><span data-dcnode-id="3084" instrument_node=""> and a relaxing stay at the charming </span><a data-dcnode-id="3082" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//go.skimresources.com/%3Fid%3D136989X1654419%26xs%3D1%26url%3Dhttps%253A%252F%252Fwww.booking.com%252Fhotel%252Fus%252Fbandon-wayside-motel-rv.html" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="3083" instrument_node="">Bandon Wayside Motel + RV</span></a><span data-dcnode-id="3081" instrument_node=""> (that also has tent camping!)</span></p><span data-dcnode-id="3079" instrument_node="">
</span><p data-dcnode-id="3063"><strong data-dcnode-id="3077"><span data-dcnode-id="3078" instrument_node="">Day 5 (Bandon to Samuel H. Boardman to Home)</span></strong><span data-dcnode-id="3076" instrument_node="">:</span><strong data-dcnode-id="3074"><span data-dcnode-id="3075" instrument_node=""> </span></strong><span data-dcnode-id="3073" instrument_node="">You’ve got a long day of driving ahead of you, but you’re SO close to the </span><a data-dcnode-id="3071" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stateparks.oregon.gov/index.cfm%3Fdo%3Dpark.profile%26parkId%3D56" rel="noopener" target="_blank"><span data-dcnode-id="3072" instrument_node="">Samuel H. Boardman Corridor,</span></a><span data-dcnode-id="3070" instrument_node=""> that you’ve just got to go! If you can only fit in one stop, make it the </span><a data-dcnode-id="3068" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.alltrails.com/trail/us/oregon/natural-bridges-cove-north-island-viewpoint-china-beach-trail" rel="noopener" target="_blank"><span data-dcnode-id="3069" instrument_node="">Natural Bridges</span></a><span data-dcnode-id="3067" instrument_node="">. You’ll then head back north on the 101, stopping at </span><a data-dcnode-id="3065" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stateparks.oregon.gov/index.cfm%3Fdo%3Dpark.profile%26parkId%3D44" rel="noopener" target="_blank"><span data-dcnode-id="3066" instrument_node="">Cape Blanco</span></a><span data-dcnode-id="3064" instrument_node=""> if you’ve got the energy, then start heading east from Bandon and back up to Portland.</span></p><span data-dcnode-id="3062" instrument_node="">
