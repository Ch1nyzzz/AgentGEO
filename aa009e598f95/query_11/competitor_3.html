</span><p data-dcnode-id="1347"><span data-dcnode-id="1348" instrument_node="">In the evening, it’s time for your Welcome Lūʻau. Enjoy local Hawaiian cuisine in an authentic setting with fellow travelers.</span></p><span data-dcnode-id="1346" instrument_node="">
</span></div><div class="css-1t6uf2f ecn00d32" data-dcnode-id="1326"><p class="css-pbyh8u ecn00d30" data-dcnode-id="1343"><span data-dcnode-id="1344" instrument_node="">Today's highlights:</span></p><div class="rich-text__Inner-Wrapper css-yiq3ql ecn00d31" data-dcnode-id="1327"><ul data-dcnode-id="1329"><span data-dcnode-id="1342" instrument_node="">
</span><li data-dcnode-id="1340"><span data-dcnode-id="1341" instrument_node="">Arrive at the airport in Kailua-Kona where you’ll meet an EF representative.</span></li><span data-dcnode-id="1339" instrument_node="">
</span><li data-dcnode-id="1337"><span data-dcnode-id="1338" instrument_node="">Transfer to your hotel to check in and check out your room.</span></li><span data-dcnode-id="1336" instrument_node="">
</span><li data-dcnode-id="1334"><span data-dcnode-id="1335" instrument_node="">Receive the latest schedule from your Tour Director.</span></li><span data-dcnode-id="1333" instrument_node="">
</span><li data-dcnode-id="1331"><span data-dcnode-id="1332" instrument_node="">Meet your fellow travelers as they arrive, then keep the festivities going at a Welcome Lua’u.</span></li><span data-dcnode-id="1330" instrument_node="">
</span></ul><span data-dcnode-id="1328" instrument_node="">
</span></div></div><span data-dcnode-id="1325" instrument_node=""></span></div></span></li><li class="css-ip0j1i eb25yzr4" data-dcnode-id="1296"><span class="css-r1989n eb25yzr5" data-dcnode-id="1297"><div class="css-m8x9xt e13e8azy2" data-dcnode-id="1298"><div class="css-z1fwgo e13e8azy1" data-dcnode-id="1320"><span data-dcnode-id="1321" instrument_node="">Day 2: Explore Kailua-Kona and Snorkel Adventure</span></div><div class="rich-text__Inner-Wrapper css-za9k5c e13e8azy0" data-dcnode-id="1316"><p data-dcnode-id="1318"><span data-dcnode-id="1319" instrument_node="">If Kailua-Kona (or Kona, as the locals call it) was good enough for King Kamehameha I, it’s good enough for you. Once a political capital, and later a royal family vacation spot, it’s easy to see what drew Hawaiian royalty here. It’s got it all: turquoise water, black sand beaches, and more palm trees than you can shake a spam musubi at.</span></p><span data-dcnode-id="1317" instrument_node="">
</span></div><div class="css-1t6uf2f ecn00d32" data-dcnode-id="1300"><p class="css-pbyh8u ecn00d30" data-dcnode-id="1314"><span data-dcnode-id="1315" instrument_node="">Today's highlights:</span></p><div class="rich-text__Inner-Wrapper css-yiq3ql ecn00d31" data-dcnode-id="1301"><ul data-dcnode-id="1303"><span data-dcnode-id="1313" instrument_node="">
</span><li data-dcnode-id="1311"><span data-dcnode-id="1312" instrument_node="">Take in the sights, smells, and stories of Kailua-Kona on a walking tour.</span></li><span data-dcnode-id="1310" instrument_node="">
</span><li data-dcnode-id="1308"><span data-dcnode-id="1309" instrument_node="">Stop on Ali’i Drive for souvenir shopping and lunch—fresh ʻahi (yellowfin tuna), anyone?</span></li><span data-dcnode-id="1307" instrument_node="">
</span><li data-dcnode-id="1305"><span data-dcnode-id="1306" instrument_node="">Cruise along the crystal clear waters of the Kohala Coast to snorkel and try and spot dolphins!</span></li><span data-dcnode-id="1304" instrument_node="">
</span></ul><span data-dcnode-id="1302" instrument_node="">
</span></div></div><span data-dcnode-id="1299" instrument_node=""></span></div></span></li><li class="css-ip0j1i eb25yzr4" data-dcnode-id="1270"><span class="css-r1989n eb25yzr5" data-dcnode-id="1271"><div class="css-m8x9xt e13e8azy2" data-dcnode-id="1272"><div class="css-z1fwgo e13e8azy1" data-dcnode-id="1294"><span data-dcnode-id="1295" instrument_node="">Day 3: Kona Coffee Tour</span></div><div class="rich-text__Inner-Wrapper css-za9k5c e13e8azy0" data-dcnode-id="1290"><p data-dcnode-id="1292"><span data-dcnode-id="1293" instrument_node="">Learn how coffee goes from plant to bean to brew during a Kona Coffee Tour. Sip on Hawaii’s prized Kona java brewed from the coffee cherries grown in mountainous and volcanic soil.</span></p><span data-dcnode-id="1291" instrument_node="">
</span></div><div class="css-1t6uf2f ecn00d32" data-dcnode-id="1274"><p class="css-pbyh8u ecn00d30" data-dcnode-id="1288"><span data-dcnode-id="1289" instrument_node="">Today's highlights:</span></p><div class="rich-text__Inner-Wrapper css-yiq3ql ecn00d31" data-dcnode-id="1275"><ul data-dcnode-id="1277"><span data-dcnode-id="1287" instrument_node="">
</span><li data-dcnode-id="1285"><span data-dcnode-id="1286" instrument_node="">Caffeinate. Kona. Coffee. Now say that three times fast.</span></li><span data-dcnode-id="1284" instrument_node="">
</span><li data-dcnode-id="1282"><span data-dcnode-id="1283" instrument_node="">Learn why Hawaii’s java is so expensive. You’ve got to taste it to believe it.</span></li><span data-dcnode-id="1281" instrument_node="">
</span><li data-dcnode-id="1279"><span data-dcnode-id="1280" instrument_node="">Spend the rest of the day at your leisure</span></li><span data-dcnode-id="1278" instrument_node="">
</span></ul><span data-dcnode-id="1276" instrument_node="">
</span></div></div><span data-dcnode-id="1273" instrument_node=""></span></div></span></li><li class="css-ip0j1i eb25yzr4" data-dcnode-id="1229"><span class="css-r1989n eb25yzr5" data-dcnode-id="1230"><div class="css-m8x9xt e13e8azy2" data-dcnode-id="1231"><div class="css-z1fwgo e13e8azy1" data-dcnode-id="1268"><span data-dcnode-id="1269" instrument_node="">Day 4: Beach Day in Kona &amp; Optional Manta Ray Evening Snorkel</span></div><div class="rich-text__Inner-Wrapper css-za9k5c e13e8azy0" data-dcnode-id="1264"><p data-dcnode-id="1266"><span data-dcnode-id="1267" instrument_node="">Kailua-Kona and its beautiful beaches are all yours today. In the afternoon, choose to partake in an optional snorkeling adventure with the majestic Manta Rays</span></p><span data-dcnode-id="1265" instrument_node="">
</span></div><div class="css-1t6uf2f ecn00d32" data-dcnode-id="1251"><p class="css-pbyh8u ecn00d30" data-dcnode-id="1262"><span data-dcnode-id="1263" instrument_node="">Today's highlights:</span></p><div class="rich-text__Inner-Wrapper css-yiq3ql ecn00d31" data-dcnode-id="1252"><ul data-dcnode-id="1254"><span data-dcnode-id="1261" instrument_node="">
</span><li data-dcnode-id="1259"><span data-dcnode-id="1260" instrument_node="">Soak up the laid-back lifestyle of Kailua-Kona at one of its sandy beaches.</span></li><span data-dcnode-id="1258" instrument_node="">
</span><li data-dcnode-id="1256"><span data-dcnode-id="1257" instrument_node="">Embark on an optional snorkeling adventure with Manta Rays</span></li><span data-dcnode-id="1255" instrument_node="">
</span></ul><span data-dcnode-id="1253" instrument_node="">
</span></div></div><span data-dcnode-id="1250" instrument_node=""></span><div class="css-h355mu e1u4gze33" data-dcnode-id="1232"><p class="css-j57fx1 e1u4gze32" data-dcnode-id="1244"><span data-dcnode-id="1249" instrument_node="">Manta Ray Night Snorkel</span><span data-dcnode-id="1247" instrument_node=""> </span><span class="css-1p79urj e1u4gze31" data-dcnode-id="1245"><span data-dcnode-id="1246" instrument_node="">(extra cost)</span></span></p><p class="css-160g3bz e1u4gze30" data-dcnode-id="1233"><span data-dcnode-id="1243" instrument_node="">Join a snorkel guide on this unforgettable wildlife encounter…at night. You’ll float above these majestic creatures as they somersault and glide through the water beneath you. Snacks and snorkel gear included.</span><br data-dcnode-id="1242"><span data-dcnode-id="1241" instrument_node="">
</span><br data-dcnode-id="1240"><span data-dcnode-id="1239" instrument_node="">
</span><strong data-dcnode-id="1234"><span data-dcnode-id="1238" instrument_node="">This excursion is </span><em data-dcnode-id="1236"><span data-dcnode-id="1237" instrument_node="">pre-book</span></em><span data-dcnode-id="1235" instrument_node=""> only and cannot be purchased after 31 days prior to trip departure.</span></strong></p></div></div></span></li><li class="css-ip0j1i eb25yzr4" data-dcnode-id="1200"><span class="css-r1989n eb25yzr5" data-dcnode-id="1201"><div class="css-m8x9xt e13e8azy2" data-dcnode-id="1202"><div class="css-z1fwgo e13e8azy1" data-dcnode-id="1227"><span data-dcnode-id="1228" instrument_node="">Day 5: Punalu'u Black Sand Beach &amp; Tour Hilo</span></div><div class="rich-text__Inner-Wrapper css-za9k5c e13e8azy0" data-dcnode-id="1223"><p data-dcnode-id="1225"><span data-dcnode-id="1226" instrument_node="">Aloha Kona, Aloha Hilo! Prepare for the adrenaline-filled days ahead complete with Black Sand beaches, volcanoes, ziplining, and more. Hilo is the largest settlement on the Big Island, and boasts epic waterfalls and tranquil gardens in addition to its adrenaline-packed activities.</span></p><span data-dcnode-id="1224" instrument_node="">
</span></div><div class="css-1t6uf2f ecn00d32" data-dcnode-id="1204"><p class="css-pbyh8u ecn00d30" data-dcnode-id="1221"><span data-dcnode-id="1222" instrument_node="">Today's highlights:</span></p><div class="rich-text__Inner-Wrapper css-yiq3ql ecn00d31" data-dcnode-id="1205"><ul data-dcnode-id="1207"><span data-dcnode-id="1220" instrument_node="">
</span><li data-dcnode-id="1218"><span data-dcnode-id="1219" instrument_node="">Snap an envy-worthy insta’ at Black Sand Beach on your way from Kailua-Kona to Hilo.</span></li><span data-dcnode-id="1217" instrument_node="">
</span><li data-dcnode-id="1215"><span data-dcnode-id="1216" instrument_node="">See Sea Turtles in their natural habitat and count how many you can find.</span></li><span data-dcnode-id="1214" instrument_node="">
</span><li data-dcnode-id="1212"><span data-dcnode-id="1213" instrument_node="">Play Israel Kamakawiwo’ole’s version of “Somewhere Over the Rainbow” on Spotify while you gaze at the 80-foot Rainbow Falls waterfall.</span></li><span data-dcnode-id="1211" instrument_node="">
</span><li data-dcnode-id="1209"><span data-dcnode-id="1210" instrument_node="">Observe Japanese influence on Hawaiian culture at the Lili’uokalani Gardens’ many pagodas, ponds, and Shinto gates.</span></li><span data-dcnode-id="1208" instrument_node="">
</span></ul><span data-dcnode-id="1206" instrument_node="">
</span></div></div><span data-dcnode-id="1203" instrument_node=""></span></div></span></li><li class="css-ip0j1i eb25yzr4" data-dcnode-id="1170"><span class="css-r1989n eb25yzr5" data-dcnode-id="1171"><div class="css-m8x9xt e13e8azy2" data-dcnode-id="1172"><div class="css-z1fwgo e13e8azy1" data-dcnode-id="1198"><span data-dcnode-id="1199" instrument_node="">Day 6: Hawaii Volcanoes National Park &amp; Crater Rim Trail</span></div><div class="rich-text__Inner-Wrapper css-za9k5c e13e8azy0" data-dcnode-id="1190"><p data-dcnode-id="1196"><span data-dcnode-id="1197" instrument_node="">Today might just be the best day of your life. You get to visit Hawaii Volcanoes National Park and hike through some of the world’s most unique landscapes and active volcanoes. If that’s not enough to get your heart pumping, take a walk on the wild side at Crater Rim Trail. They say that the presence of gasses and steam on the trail confirms that Pele, the volcano goddess, still resides here.</span></p><span data-dcnode-id="1195" instrument_node="">
</span><p data-dcnode-id="1192"><em data-dcnode-id="1193"><span data-dcnode-id="1194" instrument_node="">*Please note: The precise combination of trails we hike on this day will vary based on local logistics and weather conditions.*</span></em></p><span data-dcnode-id="1191" instrument_node="">

</span><li data-dcnode-id="1185"><span data-dcnode-id="1186" instrument_node="">Get to know the Big Island’s two most famous active volcanoes: Kilauea, and Mauna Loa, on a morning hike through the park.</span></li><span data-dcnode-id="1184" instrument_node="">
</span><li data-dcnode-id="1182"><span data-dcnode-id="1183" instrument_node="">Remain calm when you realize you’re in the presence of a celebrity—Mauna Kea is the world’s largest above-water volcano.</span></li><span data-dcnode-id="1181" instrument_node="">
</span><li data-dcnode-id="1179"><span data-dcnode-id="1180" instrument_node="">Marvel at vistas, desert terrains, and rain forest on Crater’s Rim, a trail circling Kilauea's summit caldera.</span></li><span data-dcnode-id="1178" instrument_node="">
</span></ul><span data-dcnode-id="1176" instrument_node="">
</span></div></div><span data-dcnode-id="1173" instrument_node=""></span></div></span></li><li class="css-ip0j1i eb25yzr4" data-dcnode-id="1140"><span class="css-r1989n eb25yzr5" data-dcnode-id="1141"><div class="css-m8x9xt e13e8azy2" data-dcnode-id="1142"><div class="css-z1fwgo e13e8azy1" data-dcnode-id="1168"><span data-dcnode-id="1169" instrument_node="">Day 7: Ziplining &amp; Farewell Dinner</span></div><div class="rich-text__Inner-Wrapper css-za9k5c e13e8azy0" data-dcnode-id="1157"><p data-dcnode-id="1166"><span data-dcnode-id="1167" instrument_node="">Today is your last full day on the island, so it’s time to live it up! Get the adrenaline pumping this morning ziplining up to 65 miles per hour over rushing waterfalls, suspension bridges, and treetops, all while taking in panoramic views of the Pacific Ocean. And then top it all off with an included farewell dinner.</span></p><span data-dcnode-id="1165" instrument_node="">

</span><p data-dcnode-id="1159"><span data-dcnode-id="1160" instrument_node="">Share some last laughs (and maybe shed a few tears) at an included farewell feast and drinks with the group.</span></p><span data-dcnode-id="1158" instrument_node="">

</span><li data-dcnode-id="1152"><span data-dcnode-id="1153" instrument_node="">Spend the morning cruising above the trees and waterfalls on a zipline adventure.</span></li><span data-dcnode-id="1151" instrument_node="">
</span><li data-dcnode-id="1149"><span data-dcnode-id="1150" instrument_node="">Find the perfect Hawaiian shirt in town for your Farewell Dinner in the evening.</span></li><span data-dcnode-id="1148" instrument_node="">
