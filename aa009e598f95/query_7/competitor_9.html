a roadside coffee shack, a cafe, or restaurant, but you can also go on a farm tour.</span></p><p data-dcnode-id="1112"><span data-dcnode-id="1113" instrument_node="">On this page we discuss the following ways of getting to know Kona Coffee:</span></p><div class="fixed-toc" data-dcnode-id="1056"><p data-dcnode-id="1109"><span class="icon-file-text" data-dcnode-id="1111"></span><span data-dcnode-id="1110" instrument_node=""> Table of contents</span></p><p data-dcnode-id="1108"></p><ul data-dcnode-id="1058"><li data-dcnode-id="1099"><strong data-dcnode-id="1105"><a data-dcnode-id="1106" href="#coffee-farms"><span data-dcnode-id="1107" instrument_node="">BIG LIST of coffee plantations</span></a></strong><span data-dcnode-id="1104" instrument_node=""> and farms on the Big Island (with </span><strong data-dcnode-id="1101"><a data-dcnode-id="1102" href="#map"><span data-dcnode-id="1103" instrument_node="">map</span></a></strong><span data-dcnode-id="1100" instrument_node="">)</span></li><li data-dcnode-id="1095"><strong data-dcnode-id="1096"><a data-dcnode-id="1097" href="#coffee-tour"><span data-dcnode-id="1098" instrument_node="">What happens on a Kona coffee tour?</span></a></strong></li><li data-dcnode-id="1090"><span data-dcnode-id="1094" instrument_node="">To the farm! </span><strong data-dcnode-id="1091"><a data-dcnode-id="1092" href="#plan-coffee-tour"><span data-dcnode-id="1093" instrument_node="">Plan your own Kona Coffee tour</span></a></strong></li><li data-dcnode-id="1064"><span data-dcnode-id="1089" instrument_node="">What is the </span><strong data-dcnode-id="1086"><a data-dcnode-id="1087" href="#best-month"><span data-dcnode-id="1088" instrument_node="">best month for a tour?</span></a></strong><span data-dcnode-id="1085" instrument_node=""> (and why)</span><strong data-dcnode-id="1082"><br data-dcnode-id="1084"><span data-dcnode-id="1083" instrument_node=""> </span></strong><p data-dcnode-id="1081"></p><ul data-dcnode-id="1065"><li data-dcnode-id="1076"><s strument_node="">Sunshower farms</span></a></li><li data-dcnode-id="964"><a data-dcnode-id="965" href="#heavenly-hawaiian"><span data-dcnode-id="966" instrument_node="">Heavenly Hawaiian</span></a></li><li data-dcnode-id="961"><a data-dcnode-id="962" href="#mountain-thunder"><span data-dcnode-id="963" instrument_node="">Mountain Thunder</span></a></li><li data-dcnode-id="958"><a data-dcnode-id="959" href="#buddhas-cup"><span data-dcnode-id="960" instrument_node="">Buddha’s Cup</span></a></li><li data-dcnode-id="955"><a data-dcnode-id="956" href="#hala-tree-coffee"><span data-dcnode-id="957" instrument_node="">Hala Tree Coffee</span></a></li><li data-dcnode-id="951"><a data-dcnode-id="953" href="#ueshima"><span data-dcnode-id="954" instrument_node="">Ueshima</span></a><span data-dcnode-id="952" instrument_node=""> coffee (UCC)</span></li><li data-dcnode-id="948"><a data-dcnode-id="949" href="#holualoa"><span data-dcnode-id="950" instrument_node="">Holualoa Kona Coffee plantation</span></a></li><li data-dcnode-id="945"><a data-dcnode-id="946" href="#hula-daddy"><span data-dcnode-id="947" instrument_node="">Hula Daddy</span></a></li><li data-dcnode-id="942"><a data-dcnode-id="943" href="#greenwell"><span data-dcnode-id="944" instrument_node="">Greenwell farm</span></a></li><li data-dcnode-id="938"><a data-dcnode-id="940" href="#kau-coffee"><span data-dcnode-id="941" instrument_node="">Kaʻu coffee mill</span></a><span data-dcnode-id="939" instrument_node=""> (in Kaʻu)</span></li><li data-dcnode-id="934"><a data-dcnode-id="936" href="#long-ears"><span data-dcnode-id="937" instrument_node="">Long Ears coffee company</span></a><span data-dcnode-id="935" instrument_node=""> (in Hilo)</span></li><li data-dcnode-id="930"><a data-dcnode-id="932" href="#hilo-mill"><span data-dcnode-id="933" instrument_node="">Hilo coffee mill</span></a><span data-dcnode-id="931" instrument_node=""> (in Hilo)</span></li></ul><p data-dcnode-id="924"><span data-dcnode-id="928" instrument_node="">We have also added all the tours listed below to a </span><a data-dcnode-id="926" href="#map"><span data-dcnode-id="927" instrument_node="">map</span></a><span data-dcnode-id="925" instrument_node="">, which you can see further down.</span></p><h3 data-dcnode-id="922"><span data-dcnode-id="923" instrument_node="">Kona coffee tours (near Kona)</span></h3><ul data-dcnode-id="825"><li data-dcnode-id="914"><span data-dcnode-id="919" id="living-history"><strong data-dcnode-id="920"><span data-dcnode-id="921" instrument_node="">Kona Coffee Living History Farm:</span></strong></span><span data-dcnode-id="918" instrument_node=""> is the only living history coffee farm in the nation. Their farm is open for you to explore but an admission fee is charged. More information on their </span><a data-dcnode-id="916" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//konahistorical.org/kona-coffee-living-history-farm/" rel="noopener" target="_blank"><span data-dcnode-id="917" instrument_node="">website</span></a><span data-dcnode-id="915" instrument_node="">.</span></li><li data-dcnode-id="906"><span data-dcnode-id="911" id="rooster"><strong data-dcnode-id="912"><span data-dcnode-id="913" instrument_node="">Rooster Farms:</span></strong></span><span data-dcnode-id="910" instrument_node=""> has been a certified organic Kona Coffee farm for 30+ years making it the oldest certified organic farm. They also won the 2016 Kona Coffee Cultural Festival Cupping Contest. Quite impressive! Farm tours are available by appointment for a small fee ($20 per group, includes tasting) and last anywhere between 45 minutes and 1.5 hours. Coffee cupping classes and coffee roasting lessons are also available! See their </span><a data-dcnode-id="908" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.roosterfarms.com/tours.html" rel="noopener" target="_blank"><span data-dcnode-id="909" instrument_node="">website</span></a><span data-dcnode-id="907" instrument_node=""> for contact details.</span></li><li data-dcnode-id="898"><span data-dcnode-id="903" id="kuaiwi"><strong data-dcnode-id="904"><span data-dcnode-id="905" instrument_node="">Kuaiwi Farm:</span></strong></span><span data-dcnode-id="902" instrument_node=""> Grows coffee and cacao and offers a wonderful farm tour. Plan on a two-hour visit, tours cost $15/adult. Tours need to be scheduled, more information on the </span><a data-dcnode-id="900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kuaiwifarm.com/farm-tour" rel="noopener" target="_blank"><span data-dcnode-id="901" instrument_node="">website</span></a><span data-dcnode-id="899" instrument_node="">.</span></li><li data-dcnode-id="890"><span data-dcnode-id="895" id="sunshower"><strong data-dcnode-id="896"><span data-dcnode-id="897" instrument_node="">Sunshower Coffee Farm:</span></strong></span><span data-dcnode-id="894" instrument_node=""> offers private coffee tours with a in-depth cupping (specialty tasting) included, as well as roasting lesson where guests can roast their own coffee to take home. Tours are available 7 days / week but need to be scheduled in advance. $25/tasting. More information on their </span><a data-dcnode-id="892" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sunshowercoffee.com/farm-tours/" rel="noopener" target="_blank"><span data-dcnode-id="893" instrument_node="">website</span></a><span data-dcnode-id="891" instrument_node="">.</span></li><li data-dcnode-id="882"><span data-dcnode-id="887" id="heavenly-hawaiian"><strong data-dcnode-id="888"><span data-dcnode-id="889" instrument_node="">Heavenly Hawaiian coffee farms:</span></strong></span><span data-dcnode-id="886" instrument_node=""> Organizes hourly tours from Monday to Saturday between 9am and 4pm. The tours are “farm to cup” and are concluded with a tasting on the lanai. More information on their </span><a data-dcnode-id="884" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//heavenlyhawaiian.com/" rel="noopener" target="_blank"><span data-dcnode-id="885" instrument_node="">website</span></a><span data-dcnode-id="883" instrument_node="">.</span></li><li data-dcnode-id="874"><span data-dcnode-id="879" id="mountain-thunder"><strong data-dcnode-id="880"><span data-dcnode-id="881" instrument_node="">Mountain Thunder Kona Coffee:</span></strong></span><span data-dcnode-id="878" instrument_node=""> Organizes both free and VIP tours. No reservation needed, tours start every hour, 7 days/week. More details at their </span><a data-dcnode-id="876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mountainthunder.com/content/farm-tour-directions" rel="noopener" target="_blank"><span data-dcnode-id="877" instrument_node="">website</span></a><span data-dcnode-id="875" instrument_node="">.</span></li><li data-dcnode-id="866"><span data-dcnode-id="871" id="buddhas-cup"><strong data-dcnode-id="872"><span data-dcnode-id="873" instrument_node="">Buddha’s Cup:</span></strong></span><span data-dcnode-id="870" instrument_node=""> Winners of the 2010 Kona Coffee cupping competition, 3rd place in 2014. Complimentary Kona coffee tastings and tours are available at their farm, which is open Mon-Fri between 9 am to 4 pm, and Sat between 10 am and 2 pm. See their </span><a data-dcnode-id="868" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//buddhascup.com/pages/konacoffeetours" rel="noopener" target="_blank"><span data-dcnode-id="869" instrument_node="">website</span></a><span data-dcnode-id="867" instrument_node=""> for more information.</span></li><li data-dcnode-id="858"><span data-dcnode-id="863" id="hala-tree-coffee"><strong data-dcnode-id="864"><span data-dcnode-id="865" instrument_node="">Hala Tree Coffee:</span></strong></span><span data-dcnode-id="862" instrument_node=""> Organizes free 1-hour tours Monday through Friday of their certified organic Kona coffee and tea farm overlooking the beautiful south Kona coast. See their </span><a data-dcnode-id="860" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//halatreecoffee.com/farm-tour/" rel="noopener" target="_blank"><span data-dcnode-id="861" instrument_node="">website</span></a><span data-dcnode-id="859" instrument_node=""> for details.</span></li><li data-dcnode-id="850"><span data-dcnode-id="855" id="ueshima"><strong data-dcnode-id="856"><span data-dcnode-id="857" instrument_node="">Ueshima coffee (UCC):</span></strong></span><span data-dcnode-id="854" instrument_node=""> Organizes tours on their estate, reservations are needed and can be made on their </span><a data-dcnode-id="852" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ucc-hawaii.com/estate_tour/" rel="noopener" target="_blank"><span data-dcnode-id="853" instrument_node="">website</span></a><span data-dcnode-id="851" instrument_node="">.</span></li><li data-dcnode-id="842"><span data-dcnode-id="847" id="holualoa"><strong data-dcnode-id="848"><span data-dcnode-id="849" instrument_node="">Holualoa Kona Coffee Company:</span></strong></span><span data-dcnode-id="846" instrument_node=""> Self guided tours Monday through Friday from 8 am to 3 pm. at their Kona Leʻa plantation. More information on their </span><a data-dcnode-id="844" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.konalea.com/" rel="noopener" target="_blank"><span data-dcnode-id="845" instrument_node="">website</span></a><span data-dcnode-id="843" instrument_node="">.</span></li><li data-dcnode-id="834"><span data-dcnode-id="839" id="hula-daddy"><strong data-dcnode-id="840"><span data-dcnode-id="841" instrument_node="">Hula Daddy Kona Coffee:</span></strong></span><span data-dcnode-id="838" instrument_node=""> is open Monday through Friday from 10 am to 4 pm. Tours of the orchard and the roasting room are free. More information on the </span><a data-dcnode-id="836" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.huladaddy.com/visitor-center-and-tasting-room" rel="noopener" target="_blank"><span data-dcnode-id="837" instrument_node="">website</span></a><span data-dcnode-id="835" instrument_node="">.</span></li><li data-dcnode-id="826"><span data-dcnode-id="831" id="greenwell"><strong data-dcnode-id="832"><span data-dcnode-id="833" instrument_node="">Greenwell Farms:</span></strong></span><span data-dcnode-id="830" instrument_node=""> organizes free tours throughout the day. More information on their </span><a data-dcnode-id="828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenwellfarms.com/big-island-kona-coffee-tours/" rel="noopener" target="_blank"><span data-dcnode-id="829" instrument_node="">website</span></a><span data-dcnode-id="827" instrument_node="">.</span></li></ul><div class="wp-caption aligncenter" data-dcnode-id="809" id="attachment_6779" style="width: 810px"><a data-dcnode-id="821" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/wp-content/uploads/kona-coffee-tour-greenwell.jpg" rel="attachment wp-att-6779"><noscript data-dcnode-id="823"><span data-dcnode-id="824" instrument_node="">&lt;img aria-describedby="caption-attachment-6779" class="wp-image-6779 size-large" src="https://www.lovebigisland.com/wp-content/uploads/kona-coffee-tour-greenwell-800x529.jpg" alt="A Kona Coffee Farm Tour at the Greenwell farm" width="800" height="529" srcset="https://www.lovebigisland.com/wp-content/uploads/kona-coffee-tour-greenwell-800x529.jpg 800w, https://www.lovebigisland.com/wp-content/uploads/kona-coffee-tour-greenwell-620x410.jpg 620w, https://www.lovebigisland.com/wp-content/uploads/kona-coffee-tour-greenwell-768x508.jpg 768w, https://www.lovebigisland.com/wp-content/uploads/kona-coffee-tour-greenwell-320x212.jpg 320w, https://www.lovebigisland.com/wp-content/uploads/kona-coffee-tour-greenwell-400x265.jpg 400w, https://www.lovebigisland.com/wp-content/uploads/kona-coffee-tour-greenwell-180x120.jpg 180w, https://www.lovebigisland.com/wp-content/uploads/kona-coffee-tour-greenwell.jpg 1280w" sizes="(max-width: 960px) 90vw, (max-width: 1200px) 620px, 800px" /&gt;</span></noscript><img alt="A Kona Coffee Farm Tour at the Greenwell farm" aria-describedby="caption-attachment-6779" class="wp-image-6779 size-large ls-is-cached lazyloaded" data-dcnode-id="822" data-sizes="(max-width: 960px) 90vw, (max-width: 1200px) 620px, 800px" data-src="https://www.lovebigisland.com/wp-content/uploads/kona-coffee-tour-greenwell-800x529.jpg" data-srcset="https://www.lovebigisland.com/wp-content/uploads/kona-coffee-tour-greenwell-800x529.jpg 800w, https://www.lovebigisland.com/wp-content/uploads/kona-coffee-tour-greenwell-620x410.jpg 620w, https://www.lovebigisland.com/wp-content/uploads/kona-coffee-tour-greenwell-768x508.jpg 768w, https://www.lovebigisland.com/wp-content/uploads/kona-coffee-tour-greenwell-320x212.jpg 320w, https://www.lovebigisland.com/wp-content/uploads/kona-coffee-tour-greenwell-400x265.jpg 400w, https://www.lovebigisland.com/wp-content/uploads/kona-coffee-tour-greenwell-180x120.jpg 180w, https://www.lovebigisland.com/wp-content/uploads/kona-coffee-tour-greenwell.jpg 1280w" height="529" sizes="(max-width: 960px) 90vw, (max-width: 1200px) 620px, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/wp-content/uploads/kona-coffee-tour-greenwell-800x529.jpg&amp;raw" srcset="https://www.lovebigisland.com/wp-content/uploads/kona-coffee-tour-greenwell-800x529.jpg 800w, https://www.lovebigisland.com/wp-content/uploads/kona-coffee-tour-greenwell-620x410.jpg 620w, https://www.lovebigisland.com/wp-content/uploads/kona-coffee-tour-greenwell-768x508.jpg 768w, https://www.lovebigisland.com/wp-content/uploads/kona-coffee-tour-greenwell-320x212.jpg 320w, https://www.lovebigisland.com/wp-content/uploads/kona-coffee-tour-greenwell-400x265.jpg 400w, https://www.lovebigisland.com/wp-content/uploads/kona-coffee-tour-greenwell-180x120.jpg 180w, https://www.lovebigisland.com/wp-content/uploads/kona-coffee-tour-greenwell.jpg 1280w" width="800"></a><p class="wp-caption-text" data-dcnode-id="810" id="caption-attachment-6779"><span data-dcnode-id="820" instrument_node="">Visitors take a Kona Coffee Farm Tour at the Greenwell farm. Source: </span><a data-dcnode-id="818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/horspowr1001/16754987169/in/photostream/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="819" instrument_node="">here</span></a><span data-dcnode-id="817" instrument_node=""> by user </span><a data-dcnode-id="815" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/horspowr1001/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="816" instrument_node="">horspowr1001</span></a><span data-dcnode-id="814" instrument_node=""> under a </span><a data-dcnode-id="812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creativecommons.org/licenses/by-nc/2.0/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="813" instrument_node="">CC BY-NC 2.0</span></a><span data-dcnode-id="811" instrument_node=""> license</span></p></div><h3 data-dcnode-id="807"><span data-dcnode-id="808" instrument_node="">Coffee tours in Kaʻu</span></h3><ul data-dcnode-id="797"><li data-dcnode-id="798"><span data-dcnode-id="803" id="kau-coffee"><span data-dcnode-id="806" instrument_node="">The </span><strong data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">Kaʻu coffee mill:</span></strong></span><span data-dcnode-id="802" instrument_node=""> organizes free ~30 minute tours of their orchards 3 times a day. Find out more on their </span><a data-dcnode-id="800" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kaucoffeemill.com/kau-coffee-tours/" rel="noopener" target="_blank"><span data-dcnode-id="801" instrument_node="">website</span></a><span data-dcnode-id="799" instrument_node="">.</span></li></ul><h3 data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">Coffee tours close to Hilo</span></h3><ul data-dcnode-id="778"><li data-dcnode-id="787"><span data-dcnode-id="792" id="long-ears"><strong data-dcnode-id="793"><span data-dcnode-id="794" instrument_node="">Long Ears Coffee Co: </span></strong></span><span data-dcnode-id="791" instrument_node="">Organizes tours that need to be scheduled ahead of time. See their </span><a data-dcnode-id="789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.longearscoffee.com/tours.htm" rel="noopener" target="_blank"><span data-dcnode-id="790" instrument_node="">website</span></a><span data-dcnode-id="788" instrument_node=""> for details.</span></li><li data-dcnode-id="779"><span data-dcnode-id="784" id="hilo-mill"><strong data-dcnode-id="785"><span data-dcnode-id="786" instrument_node="">Hilo Coffee Mill: </span></strong></span><span data-dcnode-id="783" instrument_node="">Tours of the farm and mill that need to be scheduled. See their </span><a data-dcnode-id="781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hilocoffeemill.com/tours.aspx" rel="noopener" target="_blank"><span data-dcnode-id="782" instrument_node="">website</span></a><span data-dcnode-id="780" instrument_node=""> for details.</span></li></ul><h4 data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">Other places to buy / try good coffee close to Hilo</span></h4><ul data-dcnode-id="760"><li data-dcnode-id="769"><strong data-dcnode-id="774"><span data-dcnode-id="775" instrument_node="">Paradise Roasters</span></strong><span data-dcnode-id="773" instrument_node=""> is a micro-roaster that specializes in high quality and unique espressos and single origin coffee – a great place to talk story and buy wonderful local roasts. Located in Hilo at 250 Keawe St, more information on their </span><a data-dcnode-id="771" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//paradiseroasters.com/" rel="noopener" target="_blank"><span data-dcnode-id="772" instrument_node="">website</span></a><span data-dcnode-id="770" instrument_node="">.</span></li><li data-dcnode-id="761"><span data-dcnode-id="768" instrument_node="">Halfway between Hilo and Volcano Village, </span><strong data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">Koana</span></strong><span data-dcnode-id="765" instrument_node=""> is a cozy coffee shop run by a coffee-loving husband and wife team. More on their </span><a data-dcnode-id="763" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.alohakoana.com/" rel="noopener" target="_blank"><span data-dcnode-id="764" instrument_node="">website</span></a><span data-dcnode-id="762" instrument_node="">.</span></li></ul><h3 data-dcnode-id="758" id="map"><span data-dcnode-id="759" instrument_node="">Map of our favorite coffee farms that organize tours</span></h3><p data-dcnode-id="753"><span data-dcnode-id="757" instrument_node="">We summarize all coffee farms listed on this page and that organize tours on their property, on the map below. Also included are a few </span><a data-dcnode-id="755" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/mauna-kea-tea/"><span data-dcnode-id="756" instrument_node="">tea plantations</span></a><span data-dcnode-id="754" instrument_node=""> that organize tours and tastings at their farms (green symbols).</span></p><p data-dcnode-id="751"><iframe data-dcnode-id="752" height="480" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.google.com/maps/d/u/0/embed%3Fmid%3D1VpBR0959mlO-ZQ61KKQoAzs8OxI&amp;raw" width="100%"></iframe></p><h2 data-dcnode-id="749" id="coffee-tour"><span data-dcnode-id="750" instrument_node="">What to expect on a Kona Coffee tour</span></h2><p data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">There are now more than 650 coffee farms of all sizes clustered along the ±20 miles of scenic roads on the Hualalai and Mauna Loa slopes. Many of these farms offer tours to the public.</span></p><p data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">During these tours you are typically shown around the plantation to see the growing coffee in the field. Then you are taken through the processes that are needed to go from a growing coffee bean to a cup of coffee (drying, processing, and roasting). Many tours end with a (free) tasting of the coffee, very close to a showroom or visitor center where you can buy the local coffee.</span></p><p data-dcnode-id="743"><span data-dcnode-id="744" instrument_node="">Coffee Tours last on average about 30 minutes and are often walking tours (but with only a little bit of walking). Details though vary on a farm-by-farm basis. Most tours start on the farm, which means you have to drive there yourself. Some tours need to be scheduled ahead of time to make sure there are people to show you around, and many tours are free of charge.</span></p><div class="wp-caption aligncenter" data-dcnode-id="736" id="attachment_4433" style="width: 810px"><a data-dcnode-id="739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/wp-content/uploads/coffee-tour.jpg" rel="attachment wp-att-4433"><noscript data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">&lt;img aria-describedby="caption-attachment-4433" class="wp-image-4433 size-large" src="https://www.lovebigisland.com/wp-content/uploads/coffee-tour-800x343.jpg" alt="Kona Coffee" width="800" height="343" srcset="https://www.lovebigisland.com/wp-content/uploads/coffee-tour-800x343.jpg 800w, https://www.lovebigisland.com/wp-content/uploads/coffee-tour-620x266.jpg 620w, https://www.lovebigisland.com/wp-content/uploads/coffee-tour-320x137.jpg 320w, https://www.lovebigisland.com/wp-content/uploads/coffee-tour-400x171.jpg 400w, https://www.lovebigisland.com/wp-content/uploads/coffee-tour-768x329.jpg 768w, https://www.lovebigisland.com/wp-content/uploads/coffee-tour-600x257.jpg 600w, https://www.lovebigisland.com/wp-content/uploads/coffee-tour.jpg 1038w, https://www.lovebigisland.com/wp-content/uploads/coffee-tour-694x298.jpg 694w" sizes="(max-width: 960px) 90vw, (max-width: 1200px) 620px, 800px" /&gt;</span></noscript><img alt="Kona Coffee" aria-describedby="caption-attachment-4433" class="lazyload wp-image-4433 size-large" data-dcnode-id="740" data-sizes="(max-width: 960px) 90vw, (max-width: 1200px) 620px, 800px" data-src="https://www.lovebigisland.com/wp-content/uploads/coffee-tour-800x343.jpg" data-srcset="https://www.lovebigisland.com/wp-content/uploads/coffee-tour-800x343.jpg 800w, https://www.lovebigisland.com/wp-content/uploads/coffee-tour-620x266.jpg 620w, https://www.lovebigisland.com/wp-content/uploads/coffee-tour-320x137.jpg 320w, https://www.lovebigisland.com/wp-content/uploads/coffee-tour-400x171.jpg 400w, https://www.lovebigisland.com/wp-content/uploads/coffee-tour-768x329.jpg 768w, https://www.lovebigisland.com/wp-content/uploads/coffee-tour-600x257.jpg 600w, https://www.lovebigisland.com/wp-content/uploads/coffee-tour.jpg 1038w, https://www.lovebigisland.com/wp-content/uploads/coffee-tour-694x298.jpg 694w" height="343" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20800%20343%22%3E%3C/svg%3E" width="800"></a><p class="wp-caption-text" data-dcnode-id="737" id="caption-attachment-4433"><span data-dcnode-id="738" instrument_node="">Kona Coffee for sale on highway 11 in the Ka’u district, between Naalehu and Volcano</span></p></div><h2 data-dcnode-id="734" id="plan-coffee-tour"><span data-dcnode-id="735" instrument_node="">To the farm! Planning your own Kona Coffee tour</span></h2><p data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">Visiting one (or a couple of) coffee farms during the day to learn about Kona coffee, to buy some coffee and of course for free tastings, is a great way to spend your day!</span></p><p data-dcnode-id="721"><span data-dcnode-id="731" instrument_node="">In our experience it is convenient to plan the visit to a coffee farm in combination with for example a trip to the </span><a data-dcnode-id="729" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/state-national-parks/puuhonua-o-honaunau/"><span data-dcnode-id="730" instrument_node="">Puʻuhonua O Honaunau national park</span></a><span data-dcnode-id="728" instrument_node=""> or with a snorkeling expedition to one of our favorite snorkeling spots: </span><a data-dcnode-id="726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/great-snorkeling-spots-hawaii/%23kealakekua"><span data-dcnode-id="727" instrument_node="">Kealakekua bay</span></a><span data-dcnode-id="725" instrument_node=""> or </span><a data-dcnode-id="723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/great-snorkeling-spots-hawaii/%23honaunau"><span data-dcnode-id="724" instrument_node="">Honaunau bay (two step)</span></a><span data-dcnode-id="722" instrument_node="">.</span></p><p data-dcnode-id="716"><span data-dcnode-id="720" instrument_node="">All the Kona coffee farms are located on or near the&nbsp;20 miles of scenic country roads. Add to that the presence of a few shops, cafes, and the </span><a data-dcnode-id="718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/kailua-kona/painted-church/"><span data-dcnode-id="719" instrument_node="">colorfully painted church</span></a><span data-dcnode-id="717" instrument_node="">, and you have the perfect excuse for a self-drive coffee tour.&nbsp; Plan about one to two hours for a visit, and make sure to check ahead of time whether you need to schedule a tour at your farm of choice.</span></p><h2 data-dcnode-id="714" id="best-month"><span data-dcnode-id="715" instrument_node="">What is the best month to go on a coffee tour?</span></h2><p data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">Coffee farms on the Big Island are open for tours and tastings the whole your round, and the coffee they serve for the free tasting is always fresh. This means that there really is not a ‘bad’ time to visit.</span></p><p data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">However! Coffee in Hawaii has a yearly growing cycle and depending on when you visit you will see other things in the coffee fields.</span></p><div class="content-box-frontpage" data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">Our favorite stages of the coffee cycle are those between the blossoming (February + March) and the harvesting of the ripe, red, fruits (August).</span></div><h3 data-dcnode-id="706" id="kona-snow"><span data-dcnode-id="707" instrument_node="">When to see the small, white, coffee flowers, or “Kona Snow”</span></h3><p data-dcnode-id="704"><span data-dcnode-id="705" instrument_node="">When coffee plants bloom in the months February and March they carry lots of beautiful, small and fragrant flowers.&nbsp; These flowers are especially impressive when you see whole fields of coffee covered with them. It almost looks like the coffee plants are covered in snow, and this is why the flowering fields of coffee are also known as “Kona snow”.</span></p><div class="wp-caption aligncenter" data-dcnode-id="692" id="attachment_6773" style="width: 810px"><a data-dcnode-id="700" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/wp-content/uploads/Kona_snow_South_Kona_Big_Island.jpg" rel="attachment wp-att-6773"><noscript data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">&lt;img aria-describedby="caption-attachment-6773" class="wp-image-6773 size-large" src="https://www.lovebigisland.com/wp-content/uploads/Kona_snow_South_Kona_Big_Island-800x329.jpg" alt="kona snow, coffee flower, hawaii" width="800" height="329" srcset="https://www.lovebigisland.com/wp-content/uploads/Kona_snow_South_Kona_Big_Island-800x329.jpg 800w, https://www.lovebigisland.com/wp-content/uploads/Kona_snow_South_Kona_Big_Island-620x255.jpg 620w, https://www.lovebigisland.com/wp-content/uploads/Kona_snow_South_Kona_Big_Island-768x316.jpg 768w, https://www.lovebigisland.com/wp-content/uploads/Kona_snow_South_Kona_Big_Island-320x132.jpg 320w, https://www.lovebigisland.com/wp-content/uploads/Kona_snow_South_Kona_Big_Island-400x165.jpg 400w, https://www.lovebigisland.com/wp-content/uploads/Kona_snow_South_Kona_Big_Island-600x247.jpg 600w, https://www.lovebigisland.com/wp-content/uploads/Kona_snow_South_Kona_Big_Island-1038x427.jpg 1038w, https://www.lovebigisland.com/wp-content/uploads/Kona_snow_South_Kona_Big_Island-694x286.jpg 694w, https://www.lovebigisland.com/wp-content/uploads/Kona_snow_South_Kona_Big_Island.jpg 1280w" sizes="(max-width: 960px) 90vw, (max-width: 1200px) 620px, 800px" /&gt;</span></noscript><img alt="kona snow, coffee flower, hawaii" aria-describedby="caption-attachment-6773" class="lazyload wp-image-6773 size-large" data-dcnode-id="701" data-sizes="(max-width: 960px) 90vw, (max-width: 1200px) 620px, 800px" data-src="https://www.lovebigisland.com/wp-content/uploads/Kona_snow_South_Kona_Big_Island-800x329.jpg" data-srcset="https://www.lovebigisland.com/wp-content/uploads/Kona_snow_South_Kona_Big_Island-800x329.jpg 800w, https://www.lovebigisland.com/wp-content/uploads/Kona_snow_South_Kona_Big_Island-620x255.jpg 620w, https://www.lovebigisland.com/wp-content/uploads/Kona_snow_South_Kona_Big_Island-768x316.jpg 768w, https://www.lovebigisland.com/wp-content/uploads/Kona_snow_South_Kona_Big_Island-320x132.jpg 320w, https://www.lovebigisland.com/wp-content/uploads/Kona_snow_South_Kona_Big_Island-400x165.jpg 400w, https://www.lovebigisland.com/wp-content/uploads/Kona_snow_South_Kona_Big_Island-600x247.jpg 600w, https://www.lovebigisland.com/wp-content/uploads/Kona_snow_South_Kona_Big_Island-1038x427.jpg 1038w, https://www.lovebigisland.com/wp-content/uploads/Kona_snow_South_Kona_Big_Island-694x286.jpg 694w, https://www.lovebigisland.com/wp-content/uploads/Kona_snow_South_Kona_Big_Island.jpg 1280w" height="329" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20800%20329%22%3E%3C/svg%3E" width="800"></a><p class="wp-caption-text" data-dcnode-id="693" id="caption-attachment-6773"><span data-dcnode-id="699" instrument_node="">Flowers of Kona coffee (“Kona snow”), South Kona, in early March 2012. By Frank Schulenburg – Own work, </span><a data-dcnode-id="697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creativecommons.org/licenses/by-sa/3.0/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="698" instrument_node="">CC BY-SA 3.0</span></a><span data-dcnode-id="696" instrument_node="">, </span><a data-dcnode-id="694" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/w/index.php%3Fcurid%3D18613228" rel="nofollow noopener" target="_blank"><span data-dcnode-id="695" instrument_node="">Link</span></a></p></div><h3 data-dcnode-id="690" id="coffee-cherry"><span data-dcnode-id="691" instrument_node="">When to see the green and red coffee berries (cherries)</span></h3><p data-dcnode-id="688"><span data-dcnode-id="689" instrument_node="">When the flowers are pollinated they fall off and a small green berry starts growing at its base.&nbsp; These berries typically start appearing on the plants in April, and they stay green until they are red, ripe, and ready to be harvested. The berries turn so red that they are called “cherries” for their resemblance to a cherry.</span></p><p data-dcnode-id="686"><span data-dcnode-id="687" instrument_node="">Not all the coffee berries ripen at the same time, and each tree needs to be hand-picked several times between August and ~January.</span></p><div class="wp-caption aligncenter" data-dcnode-id="674" id="attachment_6778" style="width: 810px"><a data-dcnode-id="682" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/wp-content/uploads/Coffee_Berries.jpg" rel="attachment wp-att-6778"><noscript data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">&lt;img aria-describedby="caption-attachment-6778" class="wp-image-6778 size-large" src="https://www.lovebigisland.com/wp-content/uploads/Coffee_Berries-800x440.jpg" alt="coffee berried, red" width="800" height="440" srcset="https://www.lovebigisland.com/wp-content/uploads/Coffee_Berries-800x440.jpg 800w, https://www.lovebigisland.com/wp-content/uploads/Coffee_Berries-620x341.jpg 620w, https://www.lovebigisland.com/wp-content/uploads/Coffee_Berries-768x422.jpg 768w, https://www.lovebigisland.com/wp-content/uploads/Coffee_Berries-320x176.jpg 320w, https://www.lovebigisland.com/wp-content/uploads/Coffee_Berries-400x220.jpg 400w, https://www.lovebigisland.com/wp-content/uploads/Coffee_Berries-600x330.jpg 600w, https://www.lovebigisland.com/wp-content/uploads/Coffee_Berries-1038x571.jpg 1038w, https://www.lovebigisland.com/wp-content/uploads/Coffee_Berries-694x382.jpg 694w, https://www.lovebigisland.com/wp-content/uploads/Coffee_Berries.jpg 1280w" sizes="(max-width: 960px) 90vw, (max-width: 1200px) 620px, 800px" /&gt;</span></noscript><img alt="coffee berried, red" aria-describedby="caption-attachment-6778" class="lazyload wp-image-6778 size-large" data-dcnode-id="683" data-sizes="(max-width: 960px) 90vw, (max-width: 1200px) 620px, 800px" data-src="https://www.lovebigisland.com/wp-content/uploads/Coffee_Berries-800x440.jpg" data-srcset="https://www.lovebigisland.com/wp-content/uploads/Coffee_Berries-800x440.jpg 800w, https://www.lovebigisland.com/wp-content/uploads/Coffee_Berries-620x341.jpg 620w, https://www.lovebigisland.com/wp-content/uploads/Coffee_Berries-768x422.jpg 768w, https://www.lovebigisland.com/wp-content/uploads/Coffee_Berries-320x176.jpg 320w, https://www.lovebigisland.com/wp-content/uploads/Coffee_Berries-400x220.jpg 400w, https://www.lovebigisland.com/wp-content/uploads/Coffee_Berries-600x330.jpg 600w, https://www.lovebigisland.com/wp-content/uploads/Coffee_Berries-1038x571.jpg 1038w, https://www.lovebigisland.com/wp-content/uploads/Coffee_Berries-694x382.jpg 694w, https://www.lovebigisland.com/wp-content/uploads/Coffee_Berries.jpg 1280w" height="440" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20800%20440%22%3E%3C/svg%3E" width="800"></a><p class="wp-caption-text" data-dcnode-id="675" id="caption-attachment-6778"><span data-dcnode-id="681" instrument_node="">Ripe coffee berries ready for harvesting. By Jonathan Wilkins – own work, </span><a data-dcnode-id="679" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creativecommons.org/licenses/by-sa/3.0" rel="nofollow noopener" target="_blank"><span data-dcnode-id="680" instrument_node="">CC BY-SA 3.0</span></a><span data-dcnode-id="678" instrument_node="">, </span><a data-dcnode-id="676" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/w/index.php%3Fcurid%3D33000395" rel="nofollow noopener" target="_blank"><span data-dcnode-id="677" instrument_node="">Link</span></a></p></div><h3 data-dcnode-id="672" id="best-time"><span data-dcnode-id="673" instrument_node="">What is the best time to go on a Kona coffee tour?</span></h3><p data-dcnode-id="667"><span data-dcnode-id="671" instrument_node="">Coffee trees love both sunshine and frequent rains, so expect both. As a rule of thumb, the mornings on the south Kona coast are sunny, and the clouds and rain appear after about 1PM. Read more about </span><a data-dcnode-id="669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com/kailua-kona/average-weather-kona/%23daily-weather"><span data-dcnode-id="670" instrument_node="">average weather in Kona</span></a><span data-dcnode-id="668" instrument_node="">.</span></p><p data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">So, if you like sunshine the best time to plan your Kona coffee tour is before noon.</span></p><h2 data-dcnode-id="663" id="coffee-facts"><span data-dcnode-id="664" instrument_node="">(Even) More interesting things to know about Kona Coffee</span></h2><p data-dcnode-id="661"><span data-dcnode-id="662" instrument_node="">If you would like to find our more about Kona coffee you should have a look at our in-depth Kona Coffee guide. This guide will tell you about:</span></p><ul data-dcnode-id="645"><li data-dcnode-id="656"><span data-dcnode-id="660" instrument_node="">The </span><strong data-dcnode-id="658"><span data-dcnode-id="659" instrument_node="">200 year history</span></strong><span data-dcnode-id="657" instrument_node=""> of Kona Coffee on the Big Island</span></li><li data-dcnode-id="652"><strong data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">Why</span></strong><span data-dcnode-id="653" instrument_node=""> Kona Coffee is so special</span></li><li data-dcnode-id="648"><strong data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">What</span></strong><span data-dcnode-id="649" instrument_node=""> to pay attention to when buying Kona Coffee in a shop or online</span></li><li data-dcnode-id="646"><span data-dcnode-id="647" instrument_node="">The other very tasty Big Island coffees that are not “Kona” (but that are as tasty and more affordable ).</span></li></ul><div class="portfolio" data-dcnode-id="631"><h3 data-dcnode-id="642"><a data-dcnode-id="643" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lovebigisland.com
