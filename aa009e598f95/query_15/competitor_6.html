</span><div class="entry-content clr" data-dcnode-id="1330" itemprop="text"><span data-dcnode-id="1717" instrument_node="">
</span><p class="p1" data-dcnode-id="1714"><i data-dcnode-id="1715"><span data-dcnode-id="1716" instrument_node="">Legazpi City is the capital city of the Province of Albay, located in Bicol Region. The city can be accessed via a 12 to 15 hour Manila to Bicol road trip&nbsp;or an hour-long plane ride from NAIA to Legazpi City Airport.</span></i></p><span data-dcnode-id="1713" instrument_node="">
</span><p class="p1" data-dcnode-id="1711"><img alt="This Bicol road trip itinerary and budget is good for 3 days and for a family of four. www.momonduty.com" class="aligncenter size-full wp-image-7702" data-dcnode-id="1712" height="500" loading="lazy" sizes="(max-width: 750px) 100vw, 750px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.momonduty.com/wp-content/uploads/2017/04/Bicol-Road-Trip-Itinerary.jpg&amp;raw" srcset="https://www.momonduty.com/wp-content/uploads/2017/04/Bicol-Road-Trip-Itinerary.jpg 750w, https://www.momonduty.com/wp-content/uploads/2017/04/Bicol-Road-Trip-Itinerary-360x240.jpg 360w, https://www.momonduty.com/wp-content/uploads/2017/04/Bicol-Road-Trip-Itinerary-300x200.jpg 300w, https://www.momonduty.com/wp-content/uploads/2017/04/Bicol-Road-Trip-Itinerary-740x493.jpg 740w" width="750"></p><span data-dcnode-id="1710" instrument_node="">
</span><h2 data-dcnode-id="1708"><span data-dcnode-id="1709" instrument_node="">Our Manila to Bicol Road Trip</span></h2><span data-dcnode-id="1707" instrument_node="">
</span><p class="p1" data-dcnode-id="1704"><span class="s1" data-dcnode-id="1705"><span data-dcnode-id="1706" instrument_node="">Our family vacation in Bicol was an unplanned one—just like many of our adventures. My husband’s work schedule is very unpredictable, which is why we grab any opportunity to take a trip when his schedule opens up.</span></span></p><span data-dcnode-id="1703" instrument_node="">
</span><p class="p1" data-dcnode-id="1699"><span class="s1" data-dcnode-id="1700"><span data-dcnode-id="1702" instrument_node="">We initially agreed to just book a hotel within Manila to treat the minis to a staycation, but since it is my husband’s first time to get a week off during Holy Week, he just packed our bag at 4 in the morning, got us all in the car, and surprised us with a trip to Bicol. That said, note that all pictures were taken with an iPhone. Our Bicol road trip was such a surprise that I forgot to pack my SLR! </span><img alt="😀" class="emoji" data-dcnode-id="1701" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/13.1.0/svg/1f600.svg&amp;raw"></span></p><span data-dcnode-id="1698" instrument_node="">
</span><p class="p1" data-dcnode-id="1695"><span class="s1" data-dcnode-id="1696"><span data-dcnode-id="1697" instrument_node="">It is recommended to start your Bicol road trip at 12 midnight so you won’t get caught in traffic. We began ours at 4 in the morning, which is why our trip took longer than expected. Note that you will be traversing a lot of towns throughout the trip, some of which have traffic build up if you pass by during the day. So, if you can leave at night, do it!</span></span></p><span data-dcnode-id="1694" instrument_node="">
</span><p class="p1" data-dcnode-id="1691"><span class="s1" data-dcnode-id="1692"><span data-dcnode-id="1693" instrument_node="">Our trip took 15 hours, but they say you can do it in 10 to 12 hours. The road trip to Bicol will take very long so bring water, snacks, and entertainment. Our car has TVs built in so we took a lot of movies with us. The radio won’t work since there is no signal most of the trip—and LTE signal is very hard to get so Spotify won’t work. Your only option? Bring movies (if you have DVD built into your car) and fill up your phone with downloaded music!</span></span></p><span data-dcnode-id="1690" instrument_node="">
</span><p class="p1" data-dcnode-id="1687"><span class="s1" data-dcnode-id="1688"><span data-dcnode-id="1689" instrument_node="">We also took with us pillows and blankets for the kids. If you have little ones with you, it is best to have them secured in their car seats for safety and for a more comfortable trip. Ours slept most of the trip and watched movies or ate their snacks when they were&nbsp;awake.</span></span></p><span data-dcnode-id="1686" instrument_node="">
</span><p class="p1" data-dcnode-id="1683"><span class="s1" data-dcnode-id="1684"><span data-dcnode-id="1685" instrument_node="">We arrived in Bicol at around 8:30 in the evening. If you can book a hotel ahead of your trip, do it. It is difficult to find a hotel last-minute (especially during the Holy Week) so book one before you go. We were just lucky to get the help of the local fire station, who directed us to a hotel with available rooms.</span></span></p><span data-dcnode-id="1682" instrument_node="">
</span><p class="p1" data-dcnode-id="1679"><span class="s1" data-dcnode-id="1680"><span data-dcnode-id="1681" instrument_node="">Now, onto what we did during our trip…</span></span></p><span data-dcnode-id="1678" instrument_node="">
</span><h2 class="p1" data-dcnode-id="1676"><span data-dcnode-id="1677" instrument_node="">Our Legazpi City Hotel Recommendation</span></h2><span data-dcnode-id="1675" instrument_node="">
</span><p class="p1" data-dcnode-id="1668"><span class="s1" data-dcnode-id="1669"><span data-dcnode-id="1674" instrument_node="">We checked into </span><strong data-dcnode-id="1671"><a data-dcnode-id="1672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.travelbook.ph/philippines/albay/legazpi/ninong_s_hotel_904846/%3Faffid%3D0188" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="1673" instrument_node="">Ninong’s Hotel</span></a></strong><span data-dcnode-id="1670" instrument_node=""> Wednesday night. This hotel is right smack at the center of Legazpi City, making it super accessible. Since we took a lot of breaks in between our activities, it was very helpful to have the hotel so near all the tourist spots!</span></span></p><span data-dcnode-id="1667" instrument_node="">
</span><p class="p1" data-dcnode-id="1665"><span data-dcnode-id="1666" instrument_node="">Robinson’s Supermarket is right across the hotel so you can buy snacks there; while restaurants surround it so you have a lot of options come meal time.</span></p><span data-dcnode-id="1664" instrument_node="">
</span><p class="p1" data-dcnode-id="1662"><img alt="Ninong's Hotel in Legazpi City is at the center of the city, making it accessible from all tourist spots." class="aligncenter size-full wp-image-7717" data-dcnode-id="1663" height="750" loading="lazy" sizes="(max-width: 750px) 100vw, 750px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.momonduty.com/wp-content/uploads/2017/04/IMG_3160-e1492322260747.jpg&amp;raw" srcset="https://www.momonduty.com/wp-content/uploads/2017/04/IMG_3160-e1492322260747.jpg 750w, https://www.momonduty.com/wp-content/uploads/2017/04/IMG_3160-e1492322260747-360x360.jpg 360w, https://www.momonduty.com/wp-content/uploads/2017/04/IMG_3160-e1492322260747-100x100.jpg 100w" width="750"></p><span data-dcnode-id="1661" instrument_node="">
</span><p class="p1" data-dcnode-id="1659"><span data-dcnode-id="1660" instrument_node="">Aside from providing easy access to all areas of Legazpi City and surrounding towns, what we love about Ninong’s Hotel are their comfortable accommodation (rooms are airconditioned and the bathroom is spacious) and excellent customer service. They are quick to provide new towels and toiletries for us and are great at dealing with children who tend to get impatient while waiting for their food at the hotel cafe and restaurant.</span></p><span data-dcnode-id="1658" instrument_node="">
</span><p class="p1" data-dcnode-id="1653"><span data-dcnode-id="1657" instrument_node="">Room rates at Ninong’s Hotel start at PHP 2,500 (inclusive of buffet breakfast). But, if you are looking for cheaper options, you can </span><a data-dcnode-id="1655" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.travelbook.ph/philippines/albay/legazpi/%3Faffid%3D0188" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="1656" instrument_node="">book affordable&nbsp;Legazpi City hotels here</span></a><span data-dcnode-id="1654" instrument_node="">.</span></p><span data-dcnode-id="1652" instrument_node="">
</span><h2 data-dcnode-id="1650"><span data-dcnode-id="1651" instrument_node="">Bicol Itinerary (Best for Families with Kids)</span></h2><span data-dcnode-id="1649" instrument_node="">
</span><p data-dcnode-id="1647"><span data-dcnode-id="1648" instrument_node="">This Bicol tourist itinerary is best for families traveling with small children. If you don’t have kids tagging along, you might be able to try more activities or visit more places. However, since our kids were with us during our Bicol trip, we had to make sure that our kids will also enjoy.</span></p><span data-dcnode-id="1646" instrument_node="">
</span><div data-dcnode-id="1619" style="background-color: #ffebee; margin-left: 20px; margin-right: 20px; padding: 20px;"><span data-dcnode-id="1645" instrument_node="">
</span><p data-dcnode-id="1642" style="text-align: left;"><strong data-dcnode-id="1643"><span data-dcnode-id="1644" instrument_node="">Other family-friendly tips you can try:</span></strong></p><span data-dcnode-id="1641" instrument_node="">
</span><ul data-dcnode-id="1621"><span data-dcnode-id="1640" instrument_node="">
</span><li data-dcnode-id="1623" style="list-style-type: none"><span data-dcnode-id="1639" instrument_node="">
</span><ul data-dcnode-id="1625"><span data-dcnode-id="1638" instrument_node="">
</span><li data-dcnode-id="1635"><a data-dcnode-id="1636" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.momonduty.com/dinosaurs-island-clark-pampanga/" rel="noopener" target="_blank"><span data-dcnode-id="1637" instrument_node="">A Jurassic Adventure at Dinosaurs Island Clark</span></a></li><span data-dcnode-id="1634" instrument_node="">
</span><li data-dcnode-id="1631"><a data-dcnode-id="1632" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.momonduty.com/prime-hotel-baguio-review/" rel="noopener" target="_blank"><span data-dcnode-id="1633" instrument_node="">Baguio City and Strawberry Picking With Kids</span></a></li><span data-dcnode-id="1630" instrument_node="">
</span><li data-dcnode-id="1627"><a data-dcnode-id="1628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.momonduty.com/family-trip-to-subic-2016/" rel="noopener" target="_blank"><span data-dcnode-id="1629" instrument_node="">Subic Itinerary for Families</span></a></li><span data-dcnode-id="1626" instrument_node="">
</span></ul><span data-dcnode-id="1624" instrument_node="">
</span></li><span data-dcnode-id="1622" instrument_node="">
</span></ul><span data-dcnode-id="1620" instrument_node="">
</span></div><span data-dcnode-id="1618" instrument_node="">
</span><p class="p1" data-dcnode-id="1613"><span class="s1" data-dcnode-id="1614"><b data-dcnode-id="1615"><br data-dcnode-id="1617"><span data-dcnode-id="1616" instrument_node="">
Day 1 (Thursday)</span></b></span></p><span data-dcnode-id="1612" instrument_node="">
</span><p class="p1" data-dcnode-id="1603"><span class="s1" data-dcnode-id="1605"><span data-dcnode-id="1611" instrument_node="">#1 Mount Mayon ATV with </span><a data-dcnode-id="1609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/pg/mayonskydriveatv/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1610" instrument_node="">Mayon SkyDrive</span></a><span data-dcnode-id="1608" instrument_node="">&nbsp;*MUST TRY*</span><br data-dcnode-id="1607"><span data-dcnode-id="1606" instrument_node="">
</span></span><span data-dcnode-id="1604" instrument_node="">Cost: Php 699 per ATV for the Forest Trail</span></p><span data-dcnode-id="1602" instrument_node="">
</span><p class="p1" data-dcnode-id="1600"><img alt="The ATV ride in Cagsawa is a must try! www.momonduty.com" class="aligncenter size-full wp-image-7707" data-dcnode-id="1601" height="1000" loading="lazy" sizes="(max-width: 750px) 100vw, 750px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.momonduty.com/wp-content/uploads/2017/04/Mayon-ATV-1.jpg&amp;raw" srcset="https://www.momonduty.com/wp-content/uploads/2017/04/Mayon-ATV-1.jpg 750w, https://www.momonduty.com/wp-content/uploads/2017/04/Mayon-ATV-1-360x480.jpg 360w, https://www.momonduty.com/wp-content/uploads/2017/04/Mayon-ATV-1-225x300.jpg 225w, https://www.momonduty.com/wp-content/uploads/2017/04/Mayon-ATV-1-740x987.jpg 740w" width="750"></p><span data-dcnode-id="1599" instrument_node="">
</span><p class="p1" data-dcnode-id="1597"><span data-dcnode-id="1598" instrument_node="">This is a must try activity when you are in Legazpi City! Aside from it being super fun (even for our two little kids), the ATV ride will give you a pretty good view of Mayon Volcano. This is your chance to take lots and lots and lots of photos!</span></p><span data-dcnode-id="1596" instrument_node="">
</span><p class="p1" data-dcnode-id="1594"><img alt="This Bicol road trip itinerary and budget includes activities such as an ATV ride around Mayon Volcano. www.momonduty.com" class="aligncenter size-full wp-image-7710" data-dcnode-id="1595" height="563" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.momonduty.com/wp-content/uploads/2017/04/Mayon-ATV-4.jpg&amp;raw" width="750"></p><span data-dcnode-id="1593" instrument_node="">
</span><p class="p1" data-dcnode-id="1591"><span data-dcnode-id="1592" instrument_node="">The best time to try the ATV ride in the Cagsawa ATV Trail&nbsp;is early in the morning so the sun is not too hot and the place is not yet crowded. If you are here by 8 in the morning, you will save yourself from the wait and the heat.</span></p><span data-dcnode-id="1590" instrument_node="">
</span><p class="p1" data-dcnode-id="1588"><img alt="The ATV ride in Cagsawa is a must try not just for adults, but also for kids! This is your chance to teach your little ones a quick lesson on volcanoes. www.momonduty.com" class="aligncenter size-full wp-image-7709" data-dcnode-id="1589" height="1000" loading="lazy" sizes="(max-width: 750px) 100vw, 750px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.momonduty.com/wp-content/uploads/2017/04/Mayon-ATV-3.jpg&amp;raw" srcset="https://www.momonduty.com/wp-content/uploads/2017/04/Mayon-ATV-3.jpg 750w, https://www.momonduty.com/wp-content/uploads/2017/04/Mayon-ATV-3-360x480.jpg 360w, https://www.momonduty.com/wp-content/uploads/2017/04/Mayon-ATV-3-225x300.jpg 225w, https://www.momonduty.com/wp-content/uploads/2017/04/Mayon-ATV-3-740x987.jpg 740w" width="750"></p><span data-dcnode-id="1587" instrument_node="">
</span><p class="p1" data-dcnode-id="1585"><span data-dcnode-id="1586" instrument_node="">Still, even if you will do this activity early in the morning, remember to bring water, put on sun block, and wear something that will protect you from the sun. We were in our summer clothes when we tried the ATV ride so we ended up with sun burn on our shoulders!</span></p><span data-dcnode-id="1584" instrument_node="">
</span><p class="p1" data-dcnode-id="1582"><img alt="Don't forget to put on sun block and bring hot water when you try the Cagsawa ATV adventure! www.momonduty.com" class="aligncenter size-full wp-image-7708" data-dcnode-id="1583" height="422" loading="lazy" sizes="(max-width: 750px) 100vw, 750px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.momonduty.com/wp-content/uploads/2017/04/Mayon-ATV-2.jpg&amp;raw" srcset="https://www.momonduty.com/wp-content/uploads/2017/04/Mayon-ATV-2.jpg 750w, https://www.momonduty.com/wp-content/uploads/2017/04/Mayon-ATV-2-360x203.jpg 360w, https://www.momonduty.com/wp-content/uploads/2017/04/Mayon-ATV-2-300x169.jpg 300w, https://www.momonduty.com/wp-content/uploads/2017/04/Mayon-ATV-2-740x416.jpg 740w" width="750"></p><span data-dcnode-id="1581" instrument_node="">
</span><p class="p1" data-dcnode-id="1576"><span class="s1" data-dcnode-id="1577"><span data-dcnode-id="1580" instrument_node="">#2 Cagsawa Ruins</span><br data-dcnode-id="1579"><span data-dcnode-id="1578" instrument_node="">
Cost: Php 20 per adult, Php 10 per child</span></span></p><span data-dcnode-id="1575" instrument_node="">
</span><p class="p1" data-dcnode-id="1573"><span data-dcnode-id="1574" instrument_node="">The town of Cagsawa was buried in rocks and sand when Mayon Volcano erupted in February 1, 1814. This bell tower is the only visible structure from&nbsp;the old town.</span></p><span data-dcnode-id="1572" instrument_node="">
</span><p class="p1" data-dcnode-id="1570"><img alt="The Cagsawa Ruins tell us the story behind the beautiful and deadly Mayon Volcano in Bicol. www.momonduty.com" class="aligncenter size-full wp-image-7703" data-dcnode-id="1571" height="616" loading="lazy" sizes="(max-width: 750px) 100vw, 750px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.momonduty.com/wp-content/uploads/2017/04/Cagsawa-Ruins-1.jpg&amp;raw" srcset="https://www.momonduty.com/wp-content/uploads/2017/04/Cagsawa-Ruins-1.jpg 750w, https://www.momonduty.com/wp-content/uploads/2017/04/Cagsawa-Ruins-1-360x296.jpg 360w, https://www.momonduty.com/wp-content/uploads/2017/04/Cagsawa-Ruins-1-300x246.jpg 300w, https://www.momonduty.com/wp-content/uploads/2017/04/Cagsawa-Ruins-1-740x608.jpg 740w" width="750"></p><span data-dcnode-id="1569" instrument_node="">
</span><p class="p1" data-dcnode-id="1567"><span data-dcnode-id="1568" instrument_node="">We like to insert lessons whenever we travel with the minis. Your visit to the Cagsawa Ruins is your chance to share the violent history behind the beautiful and seemingly harmless Mayon Volcano.</span></p><span data-dcnode-id="1566" instrument_node="">
</span><p class="p1" data-dcnode-id="1561"><span class="s1" data-dcnode-id="1562"><span data-dcnode-id="1565" instrument_node="">#3 Buffet lunch at Waway’s Restaurant</span><br data-dcnode-id="1564"><span data-dcnode-id="1563" instrument_node="">
Cost: Php 250 per adult, Php 180 per child</span></span></p><span data-dcnode-id="1560" instrument_node="">
</span><p class="p1" data-dcnode-id="1558"><span data-dcnode-id="1559" instrument_node="">If you want to try Bicol’s authentic food, such as Bicol Express and Pangat, this is the place to go. Located at the heart of Legazpi City, Waway’s Restaurant serves a buffet of Bicolano food favorites as well as dishes common to the rest of the Philippines, like Kare-Kare, Nilasing na Hipon, and Halo-Halo!</span></p><span data-dcnode-id="1557" instrument_node="">
</span><p class="p1" data-dcnode-id="1552"><span data-dcnode-id="1556" instrument_node="">Unfortunately, since we went here after our scorching hot ATV adventure, we forgot to take photos of the food. Haha! </span><em data-dcnode-id="1554"><span data-dcnode-id="1555" instrument_node="">#foodbloggingfail&nbsp;</span></em><span data-dcnode-id="1553" instrument_node="">But seriously–if you want to try an array of Bicolano food, try Waway’s!</span></p><span data-dcnode-id="1551" instrument_node="">
</span><p class="p1" data-dcnode-id="1546"><span class="s1" data-dcnode-id="1547"><span data-dcnode-id="1550" instrument_node="">#4 Stroll in Embarcadero de Legazpi</span><br data-dcnode-id="1549"><span data-dcnode-id="1548" instrument_node="">
Cost: FREE</span></span></p><span data-dcnode-id="1545" instrument_node="">
</span><p class="p1" data-dcnode-id="1543"><span data-dcnode-id="1544" instrument_node="">Take a windy stroll along the port area of Legazpi City. Embarcadero de Legazpi is a wonderful place to sit (or stroll)&nbsp;while you watch the sun set behind Mayon Volcano. There&nbsp;is a long line of food establishments across the port area, too, so you can have dinner here if you would like.</span></p><span data-dcnode-id="1542" instrument_node="">
</span><p class="p1" data-dcnode-id="1540"><img alt="Take a stroll along Embarcadero de Legazpi as you watch the sun set behind Mayon Volcano. www.momonduty.com" class="aligncenter size-full wp-image-7705" data-dcnode-id="1541" height="859" loading="lazy" sizes="(max-width: 750px) 100vw, 750px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.momonduty.com/wp-content/uploads/2017/04/Embarcadero-de-Legazpi-1.jpg&amp;raw" srcset="https://www.momonduty.com/wp-content/uploads/2017/04/Embarcadero-de-Legazpi-1.jpg 750w, https://www.momonduty.com/wp-content/uploads/2017/04/Embarcadero-de-Legazpi-1-360x412.jpg 360w, https://www.momonduty.com/wp-content/uploads/2017/04/Embarcadero-de-Legazpi-1-262x300.jpg 262w, https://www.momonduty.com/wp-content/uploads/2017/04/Embarcadero-de-Legazpi-1-740x848.jpg 740w" width="750"></p><span data-dcnode-id="1539" instrument_node="">
</span><p class="p1" data-dcnode-id="1536"><span class="s1" data-dcnode-id="1537"><span data-dcnode-id="1538" instrument_node="">#5 Dinner and Dessert at 1st Colonial Grill</span></span></p><span data-dcnode-id="1535" instrument_node="">
</span><p class="p1" data-dcnode-id="1527"><span data-dcnode-id="1534" instrument_node="">1st Colonial Grill is known for their Bicolano food inspired desserts. The best seller? Their </span><strong data-dcnode-id="1532"><span data-dcnode-id="1533" instrument_node="">Sili Ice Cream (Php 89 per serving)</span></strong><span data-dcnode-id="1531" instrument_node="">! There are three&nbsp;levels: Level 1 (mild), Level 2 (this is what we tried), Level 3 (good luck!). I am not a big fan of spicy food so when I took a spoonful of Level 2 Sili Ice Cream, I was quick to grab (and finish) a huge glass of water. You will not taste the&nbsp;</span><em data-dcnode-id="1529"><span data-dcnode-id="1530" instrument_node="">labuyo</span></em><span data-dcnode-id="1528" instrument_node=""> at first… until it goes down your throat. It feels both cold and hot!</span></p><span data-dcnode-id="1526" instrument_node="">
</span><p class="p1" data-dcnode-id="1524"><img alt="Sili Ice Cream is a must try when you are in Legazpi City. www.momonduty.com" class="aligncenter size-full wp-image-7701" data-dcnode-id="1525" height="604" loading="lazy" sizes="(max-width: 750px) 100vw, 750px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.momonduty.com/wp-content/uploads/2017/04/1st-Colonial-Grill-2.jpg&amp;raw" srcset="https://www.momonduty.com/wp-content/uploads/2017/04/1st-Colonial-Grill-2.jpg 750w, https://www.momonduty.com/wp-content/uploads/2017/04/1st-Colonial-Grill-2-360x290.jpg 360w, https://www.momonduty.com/wp-content/uploads/2017/04/1st-Colonial-Grill-2-300x242.jpg 300w, https://www.momonduty.com/wp-content/uploads/2017/04/1st-Colonial-Grill-2-740x596.jpg 740w" width="750"></p><span data-dcnode-id="1523" instrument_node="">
</span><p class="p1" data-dcnode-id="1519"><span class="s1" data-dcnode-id="1520"><b data-dcnode-id="1521"><span data-dcnode-id="1522" instrument_node="">Day 2 (Friday)</span></b></span></p><span data-dcnode-id="1518" instrument_node="">
</span><p class="p1" data-dcnode-id="1513"><span class="s1" data-dcnode-id="1514"><span data-dcnode-id="1517" instrument_node=""># 1 Whale Shark Encounter in Donsol, Sorsogon *MUST TRY*</span><br data-dcnode-id="1516"><span data-dcnode-id="1515" instrument_node="">
Cost: Php 3,500 per boat (good for 7 persons), Php 100 per person for environmental fee</span></span></p><span data-dcnode-id="1512" instrument_node="">
</span><p class="p1" data-dcnode-id="1510"><span data-dcnode-id="1511" instrument_node="">Donsol, Sorsogon is a little over an hour drive from Legazpi City. If you do not have a car, there is a van that goes directly to the town. I suggest that if you are already in Legazpi City, then might as well take a side trip to Donsol, Sorsogon.</span></p><span data-dcnode-id="1509" instrument_node="">
</span><p class="p1" data-dcnode-id="1507"><img alt="Do not miss the experience of swimming with Whale Sharks in Donsol, Sorsogon! Just a little over an hour from Legazpi City, the travel time is SO WORTH IT! www.momonduty.com" class="aligncenter size-full wp-image-7704" data-dcnode-id="1508" height="1000" loading="lazy" sizes="(max-width: 750px) 100vw, 750px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.momonduty.com/wp-content/uploads/2017/04/Donsol-Whale-Shark.jpg&amp;raw" srcset="https://www.momonduty.com/wp-content/uploads/2017/04/Donsol-Whale-Shark.jpg 750w, https://www.momonduty.com/wp-content/uploads/2017/04/Donsol-Whale-Shark-360x480.jpg 360w, https://www.momonduty.com/wp-content/uploads/2017/04/Donsol-Whale-Shark-225x300.jpg 225w, https://www.momonduty.com/wp-content/uploads/2017/04/Donsol-Whale-Shark-740x987.jpg 740w" width="750"></p><span data-dcnode-id="1506" instrument_node="">
</span><p class="p1" data-dcnode-id="1504"><span data-dcnode-id="1505" instrument_node="">Our side trip to Donsol is not part of our original plan since we really intended to just stay within Legazpi City and nearby towns. It is a good thing my husband insisted that we take the side trip because the experience of swimming with the Donsol Whale Sharks is AMAZING. I mean, how often can you swim RIGHT BESIDE a Whale Shark, right?!</span></p><span data-dcnode-id="1503" instrument_node="">
</span><p class="p1" data-dcnode-id="1501"><span data-dcnode-id="1502" instrument_node="">The best time to swim with the whale sharks in Donsol is from March to May. DO NOT book your whale shark encounter in Legazpi City because it is a lot more expensive there. Instead, go to Donsol then head over to their Tourist Center. From there, you just need to sign up for an encounter, pay for your boat and the environmental fee, then watch a quick video about the do’s and don’ts during your encounter. After that, you will be called to board your boat.</span></p><span data-dcnode-id="1500" instrument_node="">
</span><p class="p1" data-dcnode-id="1498"><span data-dcnode-id="1499" instrument_node="">The payment scheme is per boat, which is PHP 3,500 for a 7-seater boat. If you want to save money, look for other tourists who are willing to share a boat with you so you can split the amount. The environmental fee is PHP 100 per person.</span></p><span data-dcnode-id="1497" instrument_node="">
</span><p class="p1" data-dcnode-id="1495"><span data-dcnode-id="1496" instrument_node="">The boat fee includes 3 hours of spotting and swimming with whale sharks. However, after one hour and four whale sharks, we decided to go back to shore because the kids were getting hungry already. Lesson: BRING SNACKS.</span></p><span data-dcnode-id="1494" instrument_node="">
</span><p class="p1" data-dcnode-id="1489"><span class="s1" data-dcnode-id="1490"><span data-dcnode-id="1493" instrument_node="">#2 Lunch and Beach Time at Miraya Dive Resort and Restaurant</span><br data-dcnode-id="1492"><span data-dcnode-id="1491" instrument_node="">
Cost: Php 150 per meal, Use of the beach is free</span></span></p><span data-dcnode-id="1488" instrument_node="">
</span><p class="p1" data-dcnode-id="1486"><span data-dcnode-id="1487" instrument_node="">After a tiring encounter with the Donsol Whale Sharks, you will need to recharge and cool down. Miraya Dive Resort and Restaurant is just a few minutes from the Tourist Center, which is where you will be dropped off after your encounter. We brought our car to the resort since all our things are in the car, but&nbsp;it’s close enough to just walk to the resort.</span></p><span data-dcnode-id="1485" instrument_node="">
</span><p class="p1" data-dcnode-id="1483"><span data-dcnode-id="1484" instrument_node="">Although there are shower rooms at the Tourist Center, you can opt to take your shower at Miraya while you wait for them to prepare your lunch. Their meals start at just PHP 150 (complete with rice and viand) so it’s super affordable!</span></p><span data-dcnode-id="1482" instrument_node="">
</span><p class="p1" data-dcnode-id="1480"><span data-dcnode-id="1481" instrument_node="">We were supposed to just shower and have lunch here, but the minis insisted that we stay a few more hours so they can play by the beach. We do not get a lot of beach time lately, so why not!</span></p><span data-dcnode-id="1479" instrument_node="">
</span><p class="p1" data-dcnode-id="1474"><span class="s1" data-dcnode-id="1475"><span data-dcnode-id="1478" instrument_node="">#3 Japanese Tunnel at Lignon Hill</span><br data-dcnode-id="1477"><span data-dcnode-id="1476" instrument_node="">
Cost: Php 20 per adult, Php 10 per child</span></span></p><span data-dcnode-id="1473" instrument_node="">
</span><p class="p1" data-dcnode-id="1471"><span data-dcnode-id="1472" instrument_node="">If you love historic sites like we do, then you cannot miss the experience of going inside a World War II Japanese Tunnel in Lignon Hill.</span></p><span data-dcnode-id="1470" instrument_node="">
</span><p class="p1" data-dcnode-id="1468"><img alt="If you dig history like we do, the Japanese Tunnel in Lignon Hill is a must visit. www.momonduty.com" class="aligncenter size-full wp-image-7706" data-dcnode-id="1469" height="854" loading="lazy" sizes="(max-width: 750px) 100vw, 750px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.momonduty.com/wp-content/uploads/2017/04/Japanese-Tunnel-at-Lignon-Hill.jpg&amp;raw" srcset="https://www.momonduty.com/wp-content/uploads/2017/04/Japanese-Tunnel-at-Lignon-Hill.jpg 750w, https://www.momonduty.com/wp-content/uploads/2017/04/Japanese-Tunnel-at-Lignon-Hill-360x410.jpg 360w, https://www.momonduty.com/wp-content/uploads/2017/04/Japanese-Tunnel-at-Lignon-Hill-263x300.jpg 263w, https://www.momonduty.com/wp-content/uploads/2017/04/Japanese-Tunnel-at-Lignon-Hill-740x843.jpg 740w" width="750"></p><span data-dcnode-id="1467" instrument_node="">
</span><p class="p1" data-dcnode-id="1465"><span data-dcnode-id="1466" instrument_node="">The tour costs PHP 20 per adult and PHP 10 per child. It takes approximately 20 minutes. I was not able to finish the tour since our son got scared, so I had to take him outside.</span></p><span data-dcnode-id="1464" instrument_node="">
</span><p class="p1" data-dcnode-id="1462"><span data-dcnode-id="1463" instrument_node="">What to expect: It is pitch dark inside, but you will be provided a flashlight. Kids are allowed to go in, but do not force them if they are scared. It is pretty scary for little ones inside since it is dark and the space is SO small. As you can see in the photo above, the tunnel is just right for our 5-year old’s height.</span></p><span data-dcnode-id="1461" instrument_node="">
</span><p class="p1" data-dcnode-id="1456"><span class="s1" data-dcnode-id="1457"><span data-dcnode-id="1460" instrument_node="">#4 Dinner at Bigg’s Diner</span><br data-dcnode-id="1459"><span data-dcnode-id="1458" instrument_node="">
Cost: Php 180+ per meal</span></span></p><span data-dcnode-id="1455" instrument_node="">
</span><p class="p1" data-dcnode-id="1450"><span data-dcnode-id="1454" instrument_node="">Although my husband had a grand time eating Bicolano food, which are mostly cooked with&nbsp;</span><em data-dcnode-id="1452"><span data-dcnode-id="1453" instrument_node="">labuyo</span></em><span data-dcnode-id="1451" instrument_node=""> and coconut milk, the minis and I were not big fans–mainly because we are not used to spicy food. So, on our last night, we decided to eat something familiar: American food.</span></p><span data-dcnode-id="1449" instrument_node="">
</span><p class="p1" data-dcnode-id="1447"><span data-dcnode-id="1448" instrument_node="">Bigg’s Diner seems to be all over Legazpi City. There was one just walking distance from our hotel so we decided to eat dinner there. I recommend that you try their Tenderloin Tips–I really loved those! The kids, on the other hand, said they loved their Italian Spaghetti.</span></p><span data-dcnode-id="1446" instrument_node="">
</span><p class="p1" data-dcnode-id="1442"><span class="s1" data-dcnode-id="1443"><b data-dcnode-id="1444"><span data-dcnode-id="1445" instrument_node="">Day 3 (Saturday)</span></b></span></p><span data-dcnode-id="1441" instrument_node="">
</span><p class="p1" data-dcnode-id="1439"><span data-dcnode-id="1440" instrument_node="">We decided to lay low on our third day so we just had breakfast at our hotel then checked out at 11 in the morning. On our way back to Manila, we decided to visit Bicol churches.</span></p><span data-dcnode-id="1438" instrument_node="">
</span><h2 class="p1" data-dcnode-id="1436"><span data-dcnode-id="1437" instrument_node="">Recommended Bicol Tour Itinerary</span></h2><span data-dcnode-id="1435" instrument_node="">
</span><p data-dcnode-id="1433"><span data-dcnode-id="1434" instrument_node="">This itinerary is perfect for families traveling with kids. You will notice that we inserted a lot of rest times at the hotel in between the activities–that is because the kids will really want to cool down and rest. If you are going on a Bicol road trip with kids, it is best to book a hotel that is easily accessible (like Ninong’s Hotel) so you can quickly go back if the kids need to rest.</span></p><span data-dcnode-id="1432" instrument_node="">
</span><p data-dcnode-id="1430"><img alt="This Bicol road trip itinerary is good for 3 days for a family of four (two adults, two kids). www.momonduty.com" class="aligncenter size-full wp-image-7712" data-dcnode-id="1431" height="825" loading="lazy" sizes="(max-width: 598px) 100vw, 598px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.momonduty.com/wp-content/uploads/2017/04/Screenshot-2017-04-16-12.03.30.png&amp;raw" srcset="https://www.momonduty.com/wp-content/uploads/2017/04/Screenshot-2017-04-16-12.03.30.png 598w, https://www.momonduty.com/wp-content/uploads/2017/04/Screenshot-2017-04-16-12.03.30-360x497.png 360w, https://www.momonduty.com/wp-content/uploads/2017/04/Screenshot-2017-04-16-12.03.30-217x300.png 217w" width="598"></p><span data-dcnode-id="1429" instrument_node="">
</span><h2 class="p1" data-dcnode-id="1427"><span data-dcnode-id="1428" instrument_node="">Bicol Itinerary and Expenses Break Down</span></h2><span data-dcnode-id="1426" instrument_node="">
</span><p data-dcnode-id="1422"><strong data-dcnode-id="1423"><em data-dcnode-id="1424"><span data-dcnode-id="1425" instrument_node="">**Please note that our family went on this Manila to Bicol Road Trip in 2016 so all rates are based on 2016 prices.**</span></em></strong></p><span data-dcnode-id="1421" instrument_node="">
</span><p data-dcnode-id="1419"><span data-dcnode-id="1420" instrument_node="">This Bicol road trip budget is good for three&nbsp;days in Bicol. This includes prices for two adults and two children aged 5 years old and 4 years old.</span></p><span data-dcnode-id="1418" instrument_node="">
</span><p data-dcnode-id="1416"><span data-dcnode-id="1417" instrument_node="">If you divide our budget, we spent roughly Php 5,000 per person (two adults, two kids) — food, accommodation, transportation, and activities are included.</span></p><span data-dcnode-id="1415" instrument_node="">
</span><p data-dcnode-id="1413"><img alt="Bicol road trip budget for 4 days and 3 nights for a family of four. www.momonduty.com" class="aligncenter size-full wp-image-7698" data-dcnode-id="1414" height="679" loading="lazy" sizes="(max-width: 443px) 100vw, 443px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.momonduty.com/wp-content/uploads/2017/04/Screenshot-2017-04-16-10.17.06.png&amp;raw" srcset="https://www.momonduty.com/wp-content/uploads/2017/04/Screenshot-2017-04-16-10.17.06.png 443w, https://www.momonduty.com/wp-content/uploads/2017/04/Screenshot-2017-04-16-10.17.06-360x552.png 360w, https://www.momonduty.com/wp-content/uploads/2017/04/Screenshot-2017-04-16-10.17.06-196x300.png 196w" width="443"></p><span data-dcnode-id="1412" instrument_node="">
</span><h2 data-dcnode-id="1410"><span data-dcnode-id="1411" instrument_node="">Bicol Road Trip Essentials</span></h2><span data-dcnode-id="1409" instrument_node="">
</span><ul data-dcnode-id="1386"><span data-dcnode-id="1408" instrument_node="">
</span><li data-dcnode-id="1406"><span data-dcnode-id="1407" instrument_node="">Clothes… lots of it. You will want to change clothes after every activity!</span></li><span data-dcnode-id="1405" instrument_node="">
</span><li data-dcnode-id="1403"><span data-dcnode-id="1404" instrument_node="">Slippers AND rubber shoes</span></li><span data-dcnode-id="1402" instrument_node="">
</span><li data-dcnode-id="1400"><span data-dcnode-id="1401" instrument_node="">Snacks</span></li><span data-dcnode-id="1399" instrument_node="">
</span><li data-dcnode-id="1397"><span data-dcnode-id="1398" instrument_node="">Water (so you do not have to buy bottled water)</span></li><span data-dcnode-id="1396" instrument_node="">
</span><li data-dcnode-id="1394"><span data-dcnode-id="1395" instrument_node="">Camera (water-proof, if you have one)</span></li><span data-dcnode-id="1393" instrument_node="">
</span><li data-dcnode-id="1391"><span data-dcnode-id="1392" instrument_node="">Sunblock</span></li><span data-dcnode-id="1390" instrument_node="">
</span><li data-dcnode-id="1388"><span data-dcnode-id="1389" instrument_node="">Lotion (to help ease sunburn)</span></li><span data-dcnode-id="1387" instrument_node="">
</span></ul><span data-dcnode-id="1385" instrument_node="">
</span><p class="p1" data-dcnode-id="1381"><strong data-dcnode-id="1382"><span class="s1" data-dcnode-id="1383"><span data-dcnode-id="1384" instrument_node="">Bicol Road Trip Tips:</span></span></strong></p><span data-dcnode-id="1380" instrument_node="">
</span><ol data-dcnode-id="1343"><span data-dcnode-id="1379" instrument_node="">
</span><li class="p1" data-dcnode-id="1376"><span class="s1" data-dcnode-id="1377"><span data-dcnode-id="1378" instrument_node="">It took us 15 hours going to Legazpi City. If you do not want to get caught in traffic, leave Manila at 12MN.</span></span></li><span data-dcnode-id="1375" instrument_node="">
</span><li class="p1" data-dcnode-id="1372"><span class="s1" data-dcnode-id="1373"><span data-dcnode-id="1374" instrument_node="">If you do not have a car, tourist spots within Legazpi City are accessible through jeepneys and tricycles. Farther places, such as Donsol, can be reached via a van ride. But if you can bring your car, bring it.</span></span></li><span data-dcnode-id="1371" instrument_node="">
</span><li class="p1" data-dcnode-id="1368"><span class="s1" data-dcnode-id="1369"><span data-dcnode-id="1370" instrument_node="">The best time to go to Donsol, Sorsogon to experience swimming with the Whale Sharks (Butanding) is from March to May. We saw a total of 4 Whale Sharks in one hour!</span></span></li><span data-dcnode-id="1367" instrument_node="">
</span><li class="p1" data-dcnode-id="1364"><span class="s1" data-dcnode-id="1365"><span data-dcnode-id="1366" instrument_node="">Your boat rental for the Whale Shark encounter gives you three hours max with the Whale Sharks.</span></span></li><span data-dcnode-id="1363" instrument_node="">
</span><li class="p1" data-dcnode-id="1360"><span class="s1" data-dcnode-id="1361"><span data-dcnode-id="1362" instrument_node="">The fin rental is not a must for the Whale Shark Encounter. It was actually harder for us to swim with the fins on.</span></span></li><span data-dcnode-id="1359" instrument_node="">
</span><li class="p1" data-dcnode-id="1356"><span class="s1" data-dcnode-id="1357"><span data-dcnode-id="1358" instrument_node="">There are more activities in Donsol, such as island hopping. You will need one full day for that. Go for it if you have time!</span></span></li><span data-dcnode-id="1355" instrument_node="">
</span><li class="p1" data-dcnode-id="1352"><span class="s1" data-dcnode-id="1353"><span data-dcnode-id="1354" instrument_node="">There are a lot of activities at Lignon Hill. We went there right after our Whale Shark encounter so we were so tired already. Hence, we opted to just visit the Japanese Tunnel.</span></span></li><span data-dcnode-id="1351" instrument_node="">
</span><li class="p1" data-dcnode-id="1345"><span class="s1" data-dcnode-id="1346"><span data-dcnode-id="1350" instrument_node="">Meals in Legazpi City will cost you approximately P500.00 per meal for a group with two adults and two kids. You may lower the cost if you are willing to eat in a </span><i data-dcnode-id="1348"><span data-dcnode-id="1349" instrument_node="">carenderia</span></i><span data-dcnode-id="1347" instrument_node="">.</span></span></li><span data-dcnode-id="1344" instrument_node="">
</span></ol><span data-dcnode-id="1342" instrument_node="">
</span><p data-dcnode-id="1340"><span data-dcnode-id="1341" instrument_node="">The road trip to Bicol was long. We got bored to death at one point and wanted to go back to Manila, but we do not regret going ahead with the trip! Cross my heart, a family vacation to Bicol is SO WORTH IT. We only explored Legazpi City, its neighboring towns, and Donsol in Sorsogon… so we are already making plans for another trip so we can experience what the rest of Bicol offers.</span></p><span data-dcnode-id="1339" instrument_node="">
</span><p data-dcnode-id="1335"><strong data-dcnode-id="1337"><span data-dcnode-id="1338" instrument_node="">Dios mabalos, Bicol!!!</span></strong><span data-dcnode-id="1336" instrument_node=""> Until we meet again.</span></p><span data-dcnode-id="1334" instrument_node="">
</span><p data-dcnode-id="1332" style="text-align: center;"><iframe allowfullscreen="allowfullscreen" data-dcnode-id="1333" frameborder="0" height="360" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/Q9CSEvKQ2RE&amp;raw" width="640"></iframe></p><span data-dcnode-id="1331" instrument_node="">
</span></div><span data-dcnode-id="1328" instrument_node="">
</span><section class="clr" data-dcnode-id="1299" id="author-bio"><span data-dcnode-id="1327" instrument_node="">
</span><div data-dcnode-id="1302" id="author-bio-inner"><span data-dcnode-id="1326" instrument_node="">
</span><div class="author-bio-avatar" data-dcnode-id="1319"><span data-dcnode-id="1325" instrument_node="">
</span><a data-dcnode-id="1321" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.momonduty.com/author/momonduty/" rel="author" title="Visit author page"><span data-dcnode-id="1324" instrument_node="">
</span><img alt="Post author avatar" class="avatar avatar-100 photo" data-dcnode-id="1323" height="100" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/e00f171b027b64e6f2809106df27cc63%3Fs%3D100%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/e00f171b027b64e6f2809106df27cc63?s=200&amp;r=g 2x" width="100"><span data-dcnode-id="1322" instrument_node=""> </span></a><span data-dcnode-id="1320" instrument_node="">

</span><div class="author-bio-content clr" data-dcnode-id="1304"><span data-dcnode-id="1316" instrument_node="">
</span><h3 class="author-bio-title" data-dcnode-id="1311"><span data-dcnode-id="1315" instrument_node="">
</span><a data-dcnode-id="1313" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.momonduty.com/author/momonduty/" title="Visit author page"><span data-dcnode-id="1314" instrument_node="">
