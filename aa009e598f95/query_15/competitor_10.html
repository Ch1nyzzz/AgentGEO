</span><p data-dcnode-id="1605"><span data-dcnode-id="1606" instrument_node="">While you cannot expect to visit the whole country from just one location, you can still see quite a lot of Iceland by taking organized tours and day trips from Reykjavik, also in winter. </span></p><span data-dcnode-id="1604" instrument_node="">

</span><p data-dcnode-id="1480"><em data-dcnode-id="1497"><span data-dcnode-id="1498" instrument_node="">What can you expect to see?</span></em><span data-dcnode-id="1496" instrument_node=""> The three main </span><strong data-dcnode-id="1494"><span data-dcnode-id="1495" instrument_node="">highlights of the Golden Circle </span></strong><span data-dcnode-id="1493" instrument_node="">are the spectacular </span><strong data-dcnode-id="1491"><span data-dcnode-id="1492" instrument_node="">Geysir area </span></strong><span data-dcnode-id="1490" instrument_node="">with the incredibly active </span><strong data-dcnode-id="1488"><span data-dcnode-id="1489" instrument_node="">Stokkur geyser</span></strong><span data-dcnode-id="1487" instrument_node=""> that goes off every 5-10 minutes, </span><strong data-dcnode-id="1485"><span data-dcnode-id="1486" instrument_node="">Gullfoss waterfall</span></strong><span data-dcnode-id="1484" instrument_node="">, and </span><strong data-dcnode-id="1482"><span data-dcnode-id="1483" instrument_node="">Thingvellir National Park</span></strong><span data-dcnode-id="1481" instrument_node="">.</span></p><span data-dcnode-id="1479" instrument_node="">

</span><h3 data-dcnode-id="1423" id="south-coast"><span data-dcnode-id="1424" instrument_node="">Southern Iceland: Waterfalls, Glaciers, and Beaches</span></h3><span data-dcnode-id="1422" instrument_node="">
</span><p data-dcnode-id="1417"><span data-dcnode-id="1421" instrument_node="">If you have a chance, try to see at least some of the </span><strong data-dcnode-id="1419"><span data-dcnode-id="1420" instrument_node="">South Coast of Iceland</span></strong><span data-dcnode-id="1418" instrument_node="">. It’s one of the nicest areas that you can visit on a day trip from Reykjavik, also in winter.&nbsp;</span></p><span data-dcnode-id="1416" instrument_node="">
</span><p data-dcnode-id="1403"><em data-dcnode-id="1414"><span data-dcnode-id="1415" instrument_node="">What can you expect to see? </span></em><span data-dcnode-id="1413" instrument_node="">The main highlights of the South Coast tours are the </span><strong data-dcnode-id="1411"><span data-dcnode-id="1412" instrument_node="">Seljalandsfoss</span></strong><span data-dcnode-id="1410" instrument_node=""> and </span><strong data-dcnode-id="1408"><span data-dcnode-id="1409" instrument_node="">Skógafoss</span></strong><span data-dcnode-id="1407" instrument_node=""> waterfalls and the black sand beach of </span><strong data-dcnode-id="1405"><span data-dcnode-id="1406" instrument_node="">Vik</span></strong><span data-dcnode-id="1404" instrument_node=""> (Reynisfjara). The description often mentions a glacier as well, but these tours don’t actually go on the glacier – you will see it in the distance, or in the best case drive up to one of the glacier tongues. </span></p><span data-dcnode-id="1402" instrument_node="">
</span><p data-dcnode-id="1397"><span data-dcnode-id="1401" instrument_node="">You can find my selection of the best glacier and ice caving tours further in this article. In the meantime, here are </span><strong data-dcnode-id="1399"><span data-dcnode-id="1400" instrument_node="">the best Reykjavik day trips to the South Coast of Iceland</span></strong><span data-dcnode-id="1398" instrument_node="">:</span></p><span data-dcnode-id="1396" instrument_node="">
</span><ul data-dcnode-id="1378"><li data-dcnode-id="1392"><span data-dcnode-id="1395" instrument_node="">Highly rated and most popular </span><a data-dcnode-id="1393" data-gyg-scraped="1650806502668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/-t67018/%3Fpartner_id%3D6N2B5KS%26cmp%3DReykjavikWinterDayTrips%26deeplink_id%3D038bf14b-1258-562e-b335-bb41b7a6fb5f" rel="noreferrer noopener sponsored" target="_blank"><span data-dcnode-id="1394" instrument_node="">South of Iceland Full-Day Tour from Reykjavik</span></a></li><li data-dcnode-id="1388"><a data-dcnode-id="1390" data-gyg-scraped="1650806502668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/-t72110/%3Fpartner_id%3D6N2B5KS%26cmp%3DReykjavikWinterDayTrips%26deeplink_id%3Daf50ac21-9cca-5680-b4d2-9344fefaf0d4" rel="noreferrer noopener sponsored" target="_blank"><span data-dcnode-id="1391" instrument_node="">South Coast Classic: Full-Day Tour from Reykjavik.</span></a><span data-dcnode-id="1389" instrument_node="">&nbsp;This tour is the best price/quality option for families: kids 0-11 yrs travel free, older kids pay half the price. Most other tours offer free trips for kids under 7 or 9.</span></li><li data-dcnode-id="1384"><a data-dcnode-id="1386" data-gyg-scraped="1650806502668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/-t154362/%3Fpartner_id%3D6N2B5KS%26cmp%3DReykjavikWinterDayTrips%26deeplink_id%3D7bf69974-c578-5bb3-901b-7bcb6bc356ea" rel="noreferrer noopener sponsored nofollow" target="_blank"><span data-dcnode-id="1387" instrument_node="">Iceland’s South Coast Day Tour by Minibus.</span></a><span data-dcnode-id="1385" instrument_node="">&nbsp;One of the best-rated South Coast tours.</span></li><li data-dcnode-id="1379"><span data-dcnode-id="1383" instrument_node="">Combination tour of </span><a data-dcnode-id="1381" data-gyg-scraped="1650806502668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/-t148457/%3Fpartner_id%3D6N2B5KS%26cmp%3DReykjavikWinterDayTrips%26deeplink_id%3D3214ee12-3037-5e5c-b6fb-cb6b2da715fc" rel="noreferrer noopener sponsored nofollow" target="_blank"><span data-dcnode-id="1382" instrument_node="">South Coast &amp; Glacier Hike</span></a><span data-dcnode-id="1380" instrument_node="">. Great option, especially if you have no time to do the two separately.</span></li></ul><span data-dcnode-id="1377" instrument_node="">

uploads/2016/09/Partially-frozen-Seljalandsfoss-waterfall-in-Iceland-in-winter.jpg.webp&amp;raw" srcset="https://fullsuitcase.com/wp-content/uploads/2016/09/Partially-frozen-Seljalandsfoss-waterfall-in-Iceland-in-winter.jpg.webp 585w, https://fullsuitcase.com/wp-content/uploads/2016/09/Partially-frozen-Seljalandsfoss-waterfall-in-Iceland-in-winter-200x300.jpg.webp 200w, https://fullsuitcase.com/wp-content/uploads/2016/09/Partially-frozen-Seljalandsfoss-waterfall-in-Iceland-in-winter-100x150.jpg.webp 100w" width="585"><figcaption data-dcnode-id="1349"><span data-dcnode-id="1350" instrument_node="">Seljalandsfoss</span></figcaption></figure></div><span data-dcnode-id="1346" instrument_node="">

</span><h3 data-dcnode-id="1338" id="jokulsarlon"><span data-dcnode-id="1339" instrument_node="">South Iceland &amp; Jökulsárlón Glacier Lagoon</span></h3><span data-dcnode-id="1337" instrument_node="">
</span><p data-dcnode-id="1332"><span data-dcnode-id="1336" instrument_node="">I have to be honest with you – I have really mixed feelings about taking a&nbsp;Jökulsárlón day trip from Reykjavik and certainly in winter. To me, the Jokulsarlon Glacier Lagoon is no. 1 among the best </span><a data-dcnode-id="1334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fullsuitcase.com/iceland-top-places/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1335" instrument_node="">must-see places in Iceland</span></a><span data-dcnode-id="1333" instrument_node="">. However, it’s such a long drive from Reykjavik! You are going to be sitting on the bus the entire day.</span></p><span data-dcnode-id="1331" instrument_node="">
</span><p data-dcnode-id="1326"><span data-dcnode-id="1330" instrument_node="">Most Jokulsarlon day trips from Reykjavik don’t even run in winter as the daylight hours are simply too short. But for those who are short on time and absolutely want to see Jokulsarlon, here are the two best (and only) options for </span><strong data-dcnode-id="1328"><span data-dcnode-id="1329" instrument_node="">Jokulsarlon winter day trips from Reykjavik</span></strong><span data-dcnode-id="1327" instrument_node="">.</span></p><span data-dcnode-id="1325" instrument_node="">
</span><ul data-dcnode-id="1316"><li data-dcnode-id="1321"><a data-dcnode-id="1323" data-gyg-scraped="1650806502668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/-t67020/%3Fpartner_id%3D6N2B5KS%26cmp%3DReykjavikWinterDayTrips%26deeplink_id%3D31f44295-4bc6-5070-8e41-8fa09cce4eaa" rel="noreferrer noopener sponsored nofollow" target="_blank"><span data-dcnode-id="1324" instrument_node="">Jokulsarlon Glacier Lagoon Full-Day Tour from Reykjavik</span></a><span data-dcnode-id="1322" instrument_node="">. This tour is the cheapest option, has great reviews, and runs daily in winter.</span></li><li data-dcnode-id="1317"><a data-dcnode-id="1319" data-gyg-scraped="1650806502668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/-t26432/%3Fpartner_id%3D6N2B5KS%26cmp%3DReykjavikWinterDayTrips%26deeplink_id%3Da643966b-79bf-5678-88fb-bda55a9250f7" rel="noreferrer noopener sponsored nofollow" target="_blank"><span data-dcnode-id="1320" instrument_node="">South Coast and Jokulsarlon Glacier Lagoon Full-Day Small-Group Tour from Reykjavik.</span></a><span data-dcnode-id="1318" instrument_node="">&nbsp;This tour is a bit more expensive, but the group size is smaller.</span></li></ul><span data-dcnode-id="1315" instrument_node="">
</span><p data-dcnode-id="1301"><strong data-dcnode-id="1312"><em data-dcnode-id="1313"><span data-dcnode-id="1314" instrument_node="">TIP: </span></em></strong><span data-dcnode-id="1311" instrument_node="">If you have some extra time and aren’t bound to staying in Reykjavik, I strongly advise doing a </span><a data-dcnode-id="1309" data-gyg-scraped="1650806502669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/-t177312/%3Fpartner_id%3D6N2B5KS%26cmp%3DReykjavikWinterDayTrips%26deeplink_id%3D88df89dd-042a-577b-b2c8-f398dd19a761" rel="noreferrer noopener sponsored nofollow" target="_blank"><span data-dcnode-id="1310" instrument_node="">2-day South Iceland tour</span></a><span data-dcnode-id="1308" instrument_node="">&nbsp;instead of two separate day trips to the South Coast and Jokulsarlon. This tour offers great value as it also </span><strong data-dcnode-id="1306"><span data-dcnode-id="1307" instrument_node="">includes a visit to an ice cave</span></strong><span data-dcnode-id="1305" instrument_node=""> (value of about 200 EUR and one of the </span><a data-dcnode-id="1303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fullsuitcase.com/winter-experiences-iceland/"><span data-dcnode-id="1304" instrument_node="">best winter activities in Iceland</span></a><span data-dcnode-id="1302" instrument_node="">).</span></p><span data-dcnode-id="1300" instrument_node="">

</span><h3 data-dcnode-id="1271" id="northern-lights"><span data-dcnode-id="1272" instrument_node="">Northern Lights Tours from Reykjavik</span></h3><span data-dcnode-id="1270" instrument_node="">
</span><p data-dcnode-id="1262"><span data-dcnode-id="1269" instrument_node="">Seeing </span><strong data-dcnode-id="1267"><span data-dcnode-id="1268" instrument_node="">the Northern Lights</span></strong><span data-dcnode-id="1266" instrument_node=""> was one of the main reasons why I traveled to </span><a data-dcnode-id="1264" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fullsuitcase.com/iceland-winter-trip-itinerary/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1265" instrument_node="">Iceland in winter</span></a><span data-dcnode-id="1263" instrument_node="">. On a good night, you might be lucky and see the auroras in Reykjavik too, but the light pollution makes it more difficult. That’s why you have bigger chances to see the Northern Lights outside of the city.  </span></p><span data-dcnode-id="1261" instrument_node="">
</span><p data-dcnode-id="1259"><span data-dcnode-id="1260" instrument_node="">Taking the Northern Lights tour is increases your chances of actually catching the auroras. The tour companies always keep an eye on the radar and will do their best to bring you to locations where the chances of seeing auroras are the highest for that specific night.</span></p><span data-dcnode-id="1258" instrument_node="">
</span><p data-dcnode-id="1256"><span data-dcnode-id="1257" instrument_node="">There are many tours available. Some go by big bus, some others offer a private 4WD experience (this can be really pricey), or you can even take a boat and watch the Northern Lights from the water.</span></p><span data-dcnode-id="1255" instrument_node="">
</span><p data-dcnode-id="1247"><strong data-dcnode-id="1252"><em data-dcnode-id="1253"><span data-dcnode-id="1254" instrument_node="">Good to know: </span></em></strong><span data-dcnode-id="1251" instrument_node="">Nobody can guarantee that you will actually get to see the Northern Lights. You might think that it’s better to wait to book a tour till you see what the&nbsp;</span><a data-dcnode-id="1249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.vedur.is/weather/forecasts/aurora/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1250" instrument_node="">aurora forecast</span></a><span data-dcnode-id="1248" instrument_node="">&nbsp;looks like,&nbsp;but the best (= small group) tours actually sell out pretty quickly. So it’s up to you to decide if you want to take the risk. I advise booking your Northern Lights tour in advance in order to avoid disappointment. If the forecast looks really bad, you can always cancel the tour up to 24 hrs in advance (if you book via GetYourGuide, as we recommend).</span></p><span data-dcnode-id="1246" instrument_node="">
</span><p data-dcnode-id="1241"><strong data-dcnode-id="1243"><em data-dcnode-id="1244"><span data-dcnode-id="1245" instrument_node="">TIP: </span></em></strong><span data-dcnode-id="1242" instrument_node="">Book your Northern Lights tour at the beginning of your stay in Reykjavik – some tours offer a second tour free of charge the next day if you don’t see the Northern Lights the first time.</span></p><span data-dcnode-id="1240" instrument_node="">
</span><div class="content_hint" data-dcnode-id="1239"></div><span data-dcnode-id="1238" instrument_node="">
</span><p data-dcnode-id="1233"><span data-dcnode-id="1237" instrument_node="">Below is the selection of </span><strong data-dcnode-id="1235"><span data-dcnode-id="1236" instrument_node="">the best Northern Lights tours from Reykjavik</span></strong><span data-dcnode-id="1234" instrument_node="">. All these tours offer free cancellation up to 24hrs in advance, so if the weather is bad or aurora activity is really low, you can cancel it the day before.</span></p><span data-dcnode-id="1232" instrument_node="">
</span><ul data-dcnode-id="1217"><li data-dcnode-id="1228"><a data-dcnode-id="1230" data-gyg-scraped="1650806502669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/-t125063/%3Fpartner_id%3D6N2B5KS%26cmp%3DReykjavikWinterDayTrips%26deeplink_id%3D7a814027-3b94-5b38-8f1c-3bbf93371268" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1231" instrument_node="">Northern Lights Luxury Bus Tour</span></a><span data-dcnode-id="1229" instrument_node="">. This is a big luxury bus with a glass roof, so you can watch the Northern Lights from the inside. But the price is really high.</span></li><li data-dcnode-id="1224"><a aria-label=" (opens in a new tab)" data-dcnode-id="1226" data-gyg-scraped="1650806502669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/-t67019/%3Fpartner_id%3D6N2B5KS%26cmp%3DReykjavikWinterDayTrips%26deeplink_id%3D8f71774d-10d4-5187-a9b6-89dd46f84de5" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1227" instrument_node="">Northern Lights Tour by Big Bus</span></a><span data-dcnode-id="1225" instrument_node="">. This is the best-rated big bus Northern Lights tour that I was able to find. It also includes a visit to the Aurora Museum and a free retry if you haven’t seen the lights on the first day. This tour offers the best value of them all. </span></li><li data-dcnode-id="1218"><a data-dcnode-id="1222" data-gyg-scraped="1650806502669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/-t26020/%3Fpartner_id%3D6N2B5KS%26cmp%3DReykjavikWinterDayTrips%26deeplink_id%3D504dcdfc-882a-570c-bcca-1c3417fca284" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1223" instrument_node="">Northern Lights by Boat.</span></a><span data-dcnode-id="1221" instrument_node="">&nbsp;This tour is quite popular and has really good reviews too. Just beware that it can get really cold on the water. It’s extremely difficult to get any good pictures of the auroras from a boat. You need a tripod and long aperture for the Northern Lights, and so ideally you stand on a solid surface. If you want to learn a bit more about photographing the Northern Lights, check this post:&nbsp;&nbsp;</span><a data-dcnode-id="1219" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fullsuitcase.com/photograph-northern-lights-beginners/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1220" instrument_node="">How to find and photograph the Northern Lights – beginner’s guide.</span></a></li></ul><span data-dcnode-id="1216" instrument_node="">
</span><p class="has-text-align-center has-background" data-dcnode-id="1211" style="background-color:#f9f9f9"><strong data-dcnode-id="1214"><span data-dcnode-id="1215" instrument_node="">LEARN MORE: </span></strong><a data-dcnode-id="1212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fullsuitcase.com/northern-lights-iceland/"><span data-dcnode-id="1213" instrument_node="">Tips for Seeing the Northern Lights in Iceland</span></a></p><span data-dcnode-id="1210" instrument_node="">
</span><div class="wp-block-columns" data-dcnode-id="1186"><span data-dcnode-id="1209" instrument_node="">

</span><div class="wp-block-image" data-dcnode-id="1201"><figure class="aligncenter size-full" data-dcnode-id="1202"><noscript data-dcnode-id="1206"><span data-dcnode-id="1207" instrument_node="">&lt;img loading="lazy" width="682" height="1023" src="https://fullsuitcase.com/wp-content/uploads/2020/02/Northern-Lights-in-Iceland.jpg" alt="Northern Lights in Iceland" class="wp-image-13460" srcset="https://fullsuitcase.com/wp-content/uploads/2020/02/Northern-Lights-in-Iceland.jpg 682w, https://fullsuitcase.com/wp-content/uploads/2020/02/Northern-Lights-in-Iceland-200x300.jpg 200w, https://fullsuitcase.com/wp-content/uploads/2020/02/Northern-Lights-in-Iceland-100x150.jpg 100w" sizes="(max-width: 760px) calc(100vw - 40px), 720px"&gt;</span></noscript><img alt="Northern Lights in Iceland" class="wp-image-13460 lazyload" data-dcnode-id="1205" data-pin-media="https://fullsuitcase.com/wp-content/uploads/2020/02/Northern-Lights-in-Iceland.jpg" data-src="https://fullsuitcase.com/wp-content/uploads/2020/02/Northern-Lights-in-Iceland.jpg.webp" data-srcset="https://fullsuitcase.com/wp-content/uploads/2020/02/Northern-Lights-in-Iceland.jpg.webp 682w, https://fullsuitcase.com/wp-content/uploads/2020/02/Northern-Lights-in-Iceland-200x300.jpg.webp 200w, https://fullsuitcase.com/wp-content/uploads/2020/02/Northern-Lights-in-Iceland-100x150.jpg.webp 100w" data-trellis-processed="1" data-webp="true" height="1023" id="mv-trellis-img-9" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fullsuitcase.com/wp-content/uploads/2020/02/Northern-Lights-in-Iceland.jpg.webp&amp;raw" srcset="https://fullsuitcase.com/wp-content/uploads/2020/02/Northern-Lights-in-Iceland.jpg.webp 682w, https://fullsuitcase.com/wp-content/uploads/2020/02/Northern-Lights-in-Iceland-200x300.jpg.webp 200w, https://fullsuitcase.com/wp-content/uploads/2020/02/Northern-Lights-in-Iceland-100x150.jpg.webp 100w" width="682"><figcaption data-dcnode-id="1203"><span data-dcnode-id="1204" instrument_node="">Northern Lights in Iceland</span></figcaption></figure></div><span data-dcnode-id="1200" instrument_node="">

</span><div class="wp-block-image" data-dcnode-id="1190"><figure class="aligncenter size-full" data-dcnode-id="1191"><noscript data-dcnode-id="1195"><span data-dcnode-id="1196" instrument_node="">&lt;img loading="lazy" width="585" height="878" src="https://fullsuitcase.com/wp-content/uploads/2016/09/Spectacular-Northern-Lights-in-Iceland-in-winter.jpg" alt="Spectacular Northern Lights in Iceland in winter" class="wp-image-9120" srcset="https://fullsuitcase.com/wp-content/uploads/2016/09/Spectacular-Northern-Lights-in-Iceland-in-winter.jpg 585w, https://fullsuitcase.com/wp-content/uploads/2016/09/Spectacular-Northern-Lights-in-Iceland-in-winter-200x300.jpg 200w, https://fullsuitcase.com/wp-content/uploads/2016/09/Spectacular-Northern-Lights-in-Iceland-in-winter-100x150.jpg 100w" sizes="(max-width: 760px) calc(100vw - 40px), 720px"&gt;</span></noscript><img alt="Spectacular Northern Lights in Iceland in winter" class="wp-image-9120 lazyload" data-dcnode-id="1194" data-pin-media="https://fullsuitcase.com/wp-content/uploads/2016/09/Spectacular-Northern-Lights-in-Iceland-in-winter.jpg" data-src="https://fullsuitcase.com/wp-content/uploads/2016/09/Spectacular-Northern-Lights-in-Iceland-in-winter.jpg.webp" data-srcset="https://fullsuitcase.com/wp-content/uploads/2016/09/Spectacular-Northern-Lights-in-Iceland-in-winter.jpg.webp 585w, https://fullsuitcase.com/wp-content/uploads/2016/09/Spectacular-Northern-Lights-in-Iceland-in-winter-200x300.jpg.webp 200w, https://fullsuitcase.com/wp-content/uploads/2016/09/Spectacular-Northern-Lights-in-Iceland-in-winter-100x150.jpg.webp 100w" data-trellis-processed="1" data-webp="true" height="878" id="mv-trellis-img-10" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fullsuitcase.com/wp-content/uploads/2016/09/Spectacular-Northern-Lights-in-Iceland-in-winter.jpg.webp&amp;raw" srcset="https://fullsuitcase.com/wp-content/uploads/2016/09/Spectacular-Northern-Lights-in-Iceland-in-winter.jpg.webp 585w, https://fullsuitcase.com/wp-content/uploads/2016/09/Spectacular-Northern-Lights-in-Iceland-in-winter-200x300.jpg.webp 200w, https://fullsuitcase.com/wp-content/uploads/2016/09/Spectacular-Northern-Lights-in-Iceland-in-winter-100x150.jpg.webp 100w" width="585"><figcaption data-dcnode-id="1192"><span data-dcnode-id="1193" instrument_node="">Auroras in Iceland</span></figcaption></figure></div><span data-dcnode-id="1189" instrument_node="">

</span><div class="content_hint" data-dcnode-id="1184"></div><span data-dcnode-id="1183" instrument_node="">
</span><h3 data-dcnode-id="1181" id="geothermal-baths"><span data-dcnode-id="1182" instrument_node="">Blue Lagoon, Secret Lagoon, and Laugarvatn Fontana Lagoon</span></h3><span data-dcnode-id="1180" instrument_node="">
</span><p data-dcnode-id="1175"><span data-dcnode-id="1179" instrument_node="">Visiting geothermal pools is one of the musts in Iceland (and one of the most popular excursions from Reykjavik in winter). Below are some of the </span><strong data-dcnode-id="1177"><span data-dcnode-id="1178" instrument_node="">best geothermal pools that you can also visit on a day trip from Reykjavik in winter</span></strong><span data-dcnode-id="1176" instrument_node="">:</span></p><span data-dcnode-id="1174" instrument_node="">
</span><p data-dcnode-id="1170"><strong data-dcnode-id="1172"><span data-dcnode-id="1173" instrument_node="">Blue Lagoon</span></strong><span data-dcnode-id="1171" instrument_node=""> is Iceland’s most popular attraction. Yes, it’s expensive, and yes, it’s busy. But there’s nothing better than to soak in a hot geothermal pool after a long cold winter day. </span></p><span data-dcnode-id="1169" instrument_node="">
</span><p data-dcnode-id="1158"><span data-dcnode-id="1168" instrument_node="">Blue Lagoon is located about 45 minutes drive from Reykjavik and if you don’t have a car it’s best to book the </span><a aria-label=" (opens in a new tab)" data-dcnode-id="1166" data-gyg-scraped="1650806502669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/-t230667/%3Fpartner_id%3D6N2B5KS%26cmp%3DReykjavikWinterDayTrips%26deeplink_id%3Df2e19e37-b84c-50b5-80f9-390c840f6ed2" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1167" instrument_node="">Blue Lagoon bus transfer from Reykjavik</span></a><span data-dcnode-id="1165" instrument_node="">. Note that you have to</span><a data-dcnode-id="1163" data-gyg-scraped="1650806502669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/-t393203/%3Fpartner_id%3D6N2B5KS%26cmp%3DReykjavikWinterDayTrips%26deeplink_id%3D01ade4c6-4c33-5ebe-8b4f-a7965c98100a" rel="noreferrer noopener sponsored nofollow" target="_blank"><span data-dcnode-id="1164" instrument_node=""> pre-book Blue Lagoon tickets</span></a><span data-dcnode-id="1162" instrument_node=""> in advance as well. Or you can book a trip that combines </span><a data-dcnode-id="1160" data-gyg-scraped="1650806502670" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/-t106207/%3Fpartner_id%3D6N2B5KS%26cmp%3DReykjavikWinterDayTrips%26deeplink_id%3D9c932315-557d-5ad6-af58-635f3f18ea56" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1161" instrument_node="">Blue Lagoon with a day trip to the Golden Circle</span></a><span data-dcnode-id="1159" instrument_node=""> (note that you’ll still have to buy the Blue Lagoon tickets separately).</span></p><span data-dcnode-id="1157" instrument_node="">
</span><p data-dcnode-id="1150"><strong data-dcnode-id="1155"><span data-dcnode-id="1156" instrument_node="">Secret Lagoon</span></strong><span data-dcnode-id="1154" instrument_node=""> is a smaller, less crowded, and cheaper alternative along the Golden Circle.  It’s much less fancy than the Blue Lagoon and the two experiences are actually very different, and both unique in their own way. Here you can book </span><a data-dcnode-id="1152" data-gyg-scraped="1650806502670" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/-t101339/%3Fpartner_id%3D6N2B5KS%26cmp%3DReykjavikDayTrips%26deeplink_id%3D41e10cee-c450-5937-a730-f401ae8c299a" rel="noreferrer noopener sponsored nofollow" target="_blank"><span data-dcnode-id="1153" instrument_node="">Golden Circle tour that includes Secret Lagoon admission tickets</span></a><span data-dcnode-id="1151" instrument_node="">.</span></p><span data-dcnode-id="1149" instrument_node="">
</span><p data-dcnode-id="1141"><span data-dcnode-id="1148" instrument_node="">Another less known, but really beautiful geothermal pool is </span><strong data-dcnode-id="1146"><span data-dcnode-id="1147" instrument_node="">Laugarvatn Fontana Lagoon</span></strong><span data-dcnode-id="1145" instrument_node="">. Its location close to the Golden Circle, make it a perfect day trip from Reykjavik in any season. Here’s a highly-rated </span><a data-dcnode-id="1143" data-gyg-scraped="1650806502670" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/-t62249/%3Fpartner_id%3D6N2B5KS%26cmp%3DReykjavikWinterDayTrips%26deeplink_id%3Da91c6048-aa72-57c5-a5f7-96440521c240" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1144" instrument_node="">tour that combines the Golden Circle with Fontana Lagoon</span></a><span data-dcnode-id="1142" instrument_node="">.</span></p><span data-dcnode-id="1140" instrument_node="">
</span><div class="wp-block-columns" data-dcnode-id="1116"><span data-dcnode-id="1139" instrument_node="">

</span><h3 data-dcnode-id="1111" id="glaciers"><span data-dcnode-id="1112" instrument_node="">Glacier Hiking and Ice Caving</span></h3><span data-dcnode-id="1110" instrument_node="">
</span><p data-dcnode-id="1100"><strong data-dcnode-id="1108"><span data-dcnode-id="1109" instrument_node="">Glacier hiking</span></strong><span data-dcnode-id="1107" instrument_node=""> is one of the most popular excursions that you can do in Iceland the whole year round. Whereas visiting </span><strong data-dcnode-id="1105"><span data-dcnode-id="1106" instrument_node="">a natural ice cave</span></strong><span data-dcnode-id="1104" instrument_node=""> can best be done in winter, usually not before the end of October – November. Some winter excursions are more adventurous and offer </span><strong data-dcnode-id="1102"><span data-dcnode-id="1103" instrument_node="">ice climbing</span></strong><span data-dcnode-id="1101" instrument_node=""> as well. </span></p><span data-dcnode-id="1099" instrument_node="">
</span><p data-dcnode-id="1094"><span data-dcnode-id="1098" instrument_node="">I don’t know about ice climbing, but glacier hiking and ice caving can be done by anyone in a reasonable physical condition. Kids under a certain age are not allowed (varies per tour). As for older people, we had a couple of 70-year-olds in our group on a glacier and despite their concerns, they had no difficulties with it. Safety equipment is provided, but you have to wear </span><a data-dcnode-id="1096" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amazon.com/Columbia-Womens-Newton-Hiking-Quarry/dp/B006A1EZ4U/ref%3Das_li_bk_tl/%3Ftag%3Dfullsuit-20%26linkId%3D9b30f99aab90ad033f4baf8ac4636082%26linkCode%3Dktl" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1097" instrument_node="">sturdy waterproof walking shoes</span></a><span data-dcnode-id="1095" instrument_node=""> to fit the crampons on.</span></p><span data-dcnode-id="1093" instrument_node="">
</span><p data-dcnode-id="1091"><span data-dcnode-id="1092" instrument_node="">And since I sometimes get this question – no, it’s really not a good idea to walk on a glacier without a guide. You may also want to read our complete guide to glacier hiking in Iceland for more information. Check it out via the link below!</span></p><span data-dcnode-id="1090" instrument_node="">
</span><p class="has-text-align-center has-background" data-dcnode-id="1085" style="background-color:#f9f9f9"><strong data-dcnode-id="1086"><span data-dcnode-id="1089" instrument_node="">LEARN MORE: </span><a data-dcnode-id="1087" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fullsuitcase.com/glacier-hike-iceland/"><span data-dcnode-id="1088" instrument_node="">Iceland Glacier Hike</span></a></strong></p><span data-dcnode-id="1084" instrument_node="">
</span><p data-dcnode-id="1079"><span data-dcnode-id="1083" instrument_node="">Here are </span><strong data-dcnode-id="1081"><span data-dcnode-id="1082" instrument_node="">the best glacier hiking winter day trips from Reykjavik</span></strong><span data-dcnode-id="1080" instrument_node="">:</span></p><span data-dcnode-id="1078" instrument_node="">
</span><ul data-dcnode-id="1071"><li data-dcnode-id="1075"><a data-dcnode-id="1076" data-gyg-scraped="1650806502670" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/-t148457/%3Fpartner_id%3D6N2B5KS%26cmp%3DReykjavikWinterDayTrips%26deeplink_id%3D3214ee12-3037-5e5c-b6fb-cb6b2da715fc" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1077" instrument_node="">Glacier Hiking&amp; South Coast from Reykjavik</span></a></li><li data-dcnode-id="1072"><a data-dcnode-id="1073" data-gyg-scraped="1650806502670" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/-t26030/%3Fpartner_id%3D6N2B5KS%26cmp%3DReykjavikWinterDayTrips%26deeplink_id%3D5d8e2bd4-90f9-57d7-97fb-456412b27bb1" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1074" instrument_node="">Reykjavík Combo Trip: Glacier Hiking &amp; Ice Climbing Day-Tour</span></a></li></ul><span data-dcnode-id="1070" instrument_node="">
</span><p data-dcnode-id="1066"><span data-dcnode-id="1069" instrument_node="">And here are some of the best winter tours from Reykjavik that visit </span><strong data-dcnode-id="1067"><span data-dcnode-id="1068" instrument_node="">ice caves:</span></strong></p><span data-dcnode-id="1065" instrument_node="">
</span><ul data-dcnode-id="1052"><li data-dcnode-id="1061"><a data-dcnode-id="1063" data-gyg-scraped="1650806502671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/-t73980/%3Fpartner_id%3D6N2B5KS%26cmp%3DReykjavikWinterDayTrips%26deeplink_id%3D119029c8-c8a1-5a9a-9901-e279dcee8b27" rel="noreferrer noopener sponsored nofollow" target="_blank"><span data-dcnode-id="1064" instrument_node="">From Reykjavik: Langjökull Glacier Ice Cave Tour</span></a><span data-dcnode-id="1062" instrument_node="">. Note that this is a man-made ice cave.</span></li><li data-dcnode-id="1057"><a data-dcnode-id="1059" data-gyg-scraped="1650806502671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/-t408292/%3Fpartner_id%3D6N2B5KS%26cmp%3DReykjavikWinterDayTrips%26deeplink_id%3D2c02baa0-0d59-5faa-8daf-852c24937dea" rel="noreferrer noopener sponsored nofollow" target="_blank"><span data-dcnode-id="1060" instrument_node="">Crystal Ice Cave &amp; Golden Circle</span></a><span data-dcnode-id="1058" instrument_node="">. This is a newly-discovered natural ice cave that is closest to Reykjavik.</span></li><li data-dcnode-id="1053"><a data-dcnode-id="1055" data-gyg-scraped="1650806502671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/-t135519/%3Fpartner_id%3D6N2B5KS%26cmp%3DReykjavikWinterDayTrips%26deeplink_id%3D51b82f6e-07ae-5afc-8730-0322db8f0230" rel="noreferrer noopener sponsored nofollow" target="_blank"><span data-dcnode-id="1056" instrument_node="">Katla Ice Cave Tour from Reykjavik</span></a><span data-dcnode-id="1054" instrument_node="">. This is the only natural ice cave that can be visited year-round, and one of the few that you can visit as a day trip from Reykjavik in winter.</span></li></ul><span data-dcnode-id="1051" instrument_node="">
</span><p data-dcnode-id="1043"><span data-dcnode-id="1050" instrument_node="">The best natural ice caves are actually located </span><a aria-label="near Skaftafell National Park or Jokulsarlon area (opens in a new tab)" data-dcnode-id="1048" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//guidetoiceland.is/process/tours/search%3Fadults%3D1%26durations%255B%255D%3D1%26limit%3D24%26min_age_to%3D21%26mode%3Dsheet%26order_by%3Dpopularity%26order_direction%3Ddesc%26page%3D1%26total_count%3D1%26tour_category_id%3D17%26a%3D523167" rel="noreferrer noopener sponsored" target="_blank"><span data-dcnode-id="1049" instrument_node="">near Skaftafell National Park or Jokulsarlon area</span></a><span data-dcnode-id="1047" instrument_node="">. Those are difficult to visit as a day trip from Reykjavik. If you don’t plan to rent a car and self-drive, it’s easiest to visit the natural ice caves on </span><a data-dcnode-id="1045" data-gyg-scraped="1650806502671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/-t124865/%3Fpartner_id%3D6N2B5KS%26cmp%3DReykjavikWinterDayTrips%26deeplink_id%3D6abe7ed0-24a6-5d21-b2db-222475b36b1f" rel="noreferrer noopener sponsored nofollow" target="_blank"><span data-dcnode-id="1046" instrument_node="">a 2-day trip like this one</span></a><span data-dcnode-id="1044" instrument_node="">.</span></p><span data-dcnode-id="1042" instrument_node="">
</span><div class="wp-block-columns" data-dcnode-id="1018"><span data-dcnode-id="1041" instrument_node="">
</span><div class="wp-block-column" data-dcnode-id="1031"><span data-dcnode-id="1040" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1033"><figure class="aligncenter size-full" data-dcnode-id="1034"><noscript data-dcnode-id="1038"><span data-dcnode-id="1039" instrument_node="">&lt;img loading="lazy" width="585" height="878" src="https://fullsuitcase.com/wp-content/uploads/2016/11/Glacier-ice-caving-in-Iceland.jpg" alt="Visiting a natural ice cave - one of the best things to do in Iceland in winter" class="wp-image-4365" srcset="https://fullsuitcase.com/wp-content/uploads/2016/11/Glacier-ice-caving-in-Iceland.jpg 585w, https://fullsuitcase.com/wp-content/uploads/2016/11/Glacier-ice-caving-in-Iceland-200x300.jpg 200w, https://fullsuitcase.com/wp-content/uploads/2016/11/Glacier-ice-caving-in-Iceland-100x150.jpg 100w" sizes="(max-width: 760px) calc(100vw - 40px), 720px"&gt;</span></noscript><img alt="Visiting a natural ice cave - one of the best things to do in Iceland in winter" class="wp-image-4365 lazyload" data-dcnode-id="1037" data-pin-media="https://fullsuitcase.com/wp-content/uploads/2016/11/Glacier-ice-caving-in-Iceland.jpg" data-src="https://fullsuitcase.com/wp-content/uploads/2016/11/Glacier-ice-caving-in-Iceland.jpg.webp" data-srcset="https://fullsuitcase.com/wp-content/uploads/2016/11/Glacier-ice-caving-in-Iceland.jpg.webp 585w, https://fullsuitcase.com/wp-content/uploads/2016/11/Glacier-ice-caving-in-Iceland-200x300.jpg.webp 200w, https://fullsuitcase.com/wp-content/uploads/2016/11/Glacier-ice-caving-in-Iceland-100x150.jpg.webp 100w" data-trellis-processed="1" data-webp="true" height="878" id="mv-trellis-img-13" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fullsuitcase.com/wp-content/uploads/2016/11/Glacier-ice-caving-in-Iceland.jpg.webp&amp;raw" srcset="https://fullsuitcase.com/wp-content/uploads/2016/11/Glacier-ice-caving-in-Iceland.jpg.webp 585w, https://fullsuitcase.com/wp-content/uploads/2016/11/Glacier-ice-caving-in-Iceland-200x300.jpg.webp 200w, https://fullsuitcase.com/wp-content/uploads/2016/11/Glacier-ice-caving-in-Iceland-100x150.jpg.webp 100w" width="585"><figcaption data-dcnode-id="1035"><span data-dcnode-id="1036" instrument_node="">Ice Cave – Image © Anna Omelchenko/ iStock</span></figcaption></figure></div><span data-dcnode-id="1032" instrument_node="">

</span><p data-dcnode-id="1003"><strong data-dcnode-id="1008"><a data-dcnode-id="1010" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fullsuitcase.com/snaefellsnes-peninsula/"><span data-dcnode-id="1011" instrument_node="">Snæfellsnes Peninsula</span></a><span data-dcnode-id="1009" instrument_node=""> </span></strong><span data-dcnode-id="1007" instrument_node="">is located North of the city and is another popular day trip from Reyjavik, also in winter. This is a wonderful place to visit and there is </span><a data-dcnode-id="1005" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fullsuitcase.com/best-things-to-do-snaefellsnes-peninsula/"><span data-dcnode-id="1006" instrument_node="">so much to see and do in Snaefellsnes Peninsula</span></a><span data-dcnode-id="1004" instrument_node="">! </span></p><span data-dcnode-id="1002" instrument_node="">

</span><p data-dcnode-id="448"><span data-dcnode-id="452" instrument_node="">Hi Akansha, I have something just for you!!! A few days ago we announced a small group tour that my friend (Icelandic tour guide) has created especially for the readers of Full Suitcase. You can read a bit more about it on Facebook or directly on their website where you can also book it if you are interested.
It's a winter tour that includes everything that we cover in our winter itinerary and a few other things like a visit to an ice cave and Reykjanes Peninsula, etc.
This is just one tour, especially for our readers, and there will be no other this winter. You should arrive in Iceland on February 29 at the latest and it takes 7 days. You can stay longer and explore Reykjavik and maybe take a day trip to the Snaefellsnes Peninsula after that if you want to see more.
It's ideal for people who don't want to drive and want to experience the best of Iceland in winter. Otherwise, in any case, you have to take multi-day tours or day trips from Reykjavik (see suggestions in this article), because public transport is really not an option for sightseeing in Iceland.
PS If you are interested in this tour and book it before the 1st of Decembern</span><strong data-dcnode-id="450"><span data-dcnode-id="451" instrument_node=""> mention 'Full Suitcase'</span></strong><span data-dcnode-id="449" instrument_node=""> and you'll get free private airport transfers included (value +-400 USD (taxi costs about 200 USD one way).</span></p><span data-dcnode-id="447" instrument_node="">

</span><p data-dcnode-id="425"><span data-dcnode-id="426" instrument_node="">Jurga,
Your article is very enjoyable and informative. My husband and I will be visiting Iceland April 24-27 and staying in central Reykjavik. He can walk, but has mobility issues and uses a small, foldable, motorized chair to assist with endurance. I am wondering if the Afternoon Golden Circle tour would be able to accommodate wheelchair? Also do you know if the Flybus is handicapped accessible or if there is any other economical way to get from KEF to Reykjavik? If you could share the name of the local guide and contact info you mentioned, that may also be beneficial for us as large groups makes it much more difficult to get around. Do you know any details about the Sumardagurinn Fyrsti (Norse first day of summer!) festival that I think will be celebrated while we're there? Any info on these areas you could provide would be greatly appreciated!
Belinda</span></p><span data-dcnode-id="424" instrument_node="">
</span></div><span data-dcnode-id="422" instrument_node="">

</span><div class="trellis-comment-text" data-dcnode-id="412"><span data-dcnode-id="419" instrument_node="">
</span><p class="trellis-comment-author" data-dcnode-id="417"><span data-dcnode-id="418" instrument_node="">Jurga</span></p><span data-dcnode-id="416" instrument_node="">
</span><p class="trellis-comment-date" data-dcnode-id="414"><span data-dcnode-id="415" instrument_node="">Monday 11th of March 2019</span></p><span data-dcnode-id="413" instrument_node="">
</span></div><span data-dcnode-id="411" instrument_node="">
</span></div><span data-dcnode-id="409" instrument_node="">
</span><div data-dcnode-id="404"><span data-dcnode-id="408" instrument_node="">
</span><p data-dcnode-id="406"><span data-dcnode-id="407" instrument_node="">Hi Belinda, I'm afraid I can't help you out a lot as I really have no idea how accessible buses or tours are. Flybus (and most other buses I saw) is just a regular passenger bus, not one that has any special equipment for wheelchairs I'm afraid. Public transport will probably be better equipped, but you can't see much with that...
The local guide I know and trust is Kjartan from Glacial Experience. He runs private tours only, so it's not cheap, but in your case, I think it might be one of the better options as I really don't think you'll find many group tours that will be able to accommodate you. Send him an email, tell him I sent you, tell him all your concerns, and I'm sure he'll do his best to show you the best of Iceland in a way that you can enjoy it.
As for the festival, I'm afraid I can't help you. All the best and I hope you have a wonderful trip!</span></p><span data-dcnode-id="405" instrument_node="">

</span><p data-dcnode-id="380"><span data-dcnode-id="381" instrument_node="">Thank you for an amazing article.

</span><div data-dcnode-id="350"><span data-dcnode-id="354" instrument_node="">
</span><p data-dcnode-id="352"><span data-dcnode-id="353" instrument_node="">Hi Rupert, it's a bit difficult for me to advise something since I don't know what your girlfriend would like. Does she like some pampering? In that case, a visit to the Blue Lagoon with some spa treatments might be an option. Or one of the other lagoons - see more options in this article.
Do you like adventure? Then visiting ice caves is probably something that you both would remember for a long time... The problem with ice caves is that there aren't that many of them easily visited as a day trip from Reykjavik, but if you search here, maybe you'll find one that you like.
Maybe also try to book a Northern Lights tour as well. Some are more luxurious than the others, so you can make it more special I suppose.
Hope this helps a bit. Enjoy your trip!</span></p><span data-dcnode-id="351" instrument_node="">

</span><p data-dcnode-id="329"><span data-dcnode-id="330" instrument_node="">Hi Jurga,</span></p><span data-dcnode-id="328" instrument_node="">
</span><p data-dcnode-id="326"><span data-dcnode-id="327" instrument_node="">Thank you so much for the detailed article. I'll be in Iceland from 26th December to 1st January (I'll reach on 26th December evening so you can count it out). How can I best use the 5 days, 5 night available? I'm looking for budget trips and tours. Also, could you suggest some tour guides you've had a good experience with? </span></p><span data-dcnode-id="325" instrument_node="">
</span><p data-dcnode-id="323"><span data-dcnode-id="324" instrument_node="">Cheers!</span></p><span data-dcnode-id="322" instrument_node="">
</span></div><span data-dcnode-id="320" instrument_node="">
</span><div class="trellis-comment-child trellis-comment-new" data-dcnode-id="300"><span data-dcnode-id="319" instrument_node="">
</span><div class="trellis-comment-header" data-dcnode-id="308"><span data-dcnode-id="318" instrument_node="">
</span><div class="trellis-comment-text" data-dcnode-id="310"><span data-dcnode-id="317" instrument_node="">
</span><p class="trellis-comment-author" data-dcnode-id="315"><span data-dcnode-id="316" instrument_node="">Jurga</span></p><span data-dcnode-id="314" instrument_node="">
</span><p class="trellis-comment-date" data-dcnode-id="312"><span data-dcnode-id="313" instrument_node="">Friday 7th of December 2018</span></p><span data-dcnode-id="311" instrument_node="">
</span></div><span data-dcnode-id="309" instrument_node="">
</span></div><span data-dcnode-id="307" instrument_node="">
</span><div data-dcnode-id="302"><span data-dcnode-id="306" instrument_node="">
</span><p data-dcnode-id="304"><span data-dcnode-id="305" instrument_node="">Hello, if you haven't booked your hotels or anything else yet, then it's really last minute. I suggest looking into a multi-day tour like this 5 day South Coast trip or this 3 day trip + add some time in Reykjavik. None of these are cheap, but they include accommodation, transport, and quite some tours that would cost you quite a lot separately as well.
If you rather stay in Reykjavik the whole time, you can just opt to do day trips. Here you can find my hand-picked winter day trips from Reykjavik. All the most popular places that you can visit from Reykjavik in winter are covered in that selection.
Just a note - Christmas/New Year is extremely busy in Iceland, so I urge you to book your hotels/tours asap. Traveling on a budget is already not easy in Iceland, but finding affordable accommodation on such short notice won't be very easy either. If you don't know where to start, you can checl my Iceland accommodation guide, but I think at this point you really just have to go to Booking.com and see what's still available for your travel dates.
PS that's advantage of multi-day tours, they have accommodation covered. In that case you only need to find hotel for the nights you'll spend in Reykjavik.
Hope this helps.</span></p><span data-dcnode-id="303" instrument_node="">
