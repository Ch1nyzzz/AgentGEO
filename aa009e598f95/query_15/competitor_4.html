</span><h1 class="entry-title p_post_titles_font" data-dcnode-id="2701"><span data-dcnode-id="2702" instrument_node="">Colorado Ski Trip: Winter Park With Kids</span></h1><span data-dcnode-id="2700" instrument_node=""> </span></header><span data-dcnode-id="2697" instrument_node="">
</span><div class="clearfix entry-content" data-dcnode-id="1609"><span data-dcnode-id="2696" instrument_node="">
</span><img alt="Colorado Ski Trip: Winter Park With Kids" class="aligncenter" data-dcnode-id="2695" data-pin-description="Colorado Ski Trip: Winter Park With Kids" data-pin-url="https://themomtrotter.com/winter-park-with-kids/" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//themomtrotter.com/wp-content/uploads/2018/01/fraser-tubing-hill-1024x683.jpg&amp;raw"><span data-dcnode-id="2694" instrument_node="">
</span><div class="code-block code-block-1" data-dcnode-id="2686" style="margin: -10px 0px 40px 0px; text-align: center; display: block; clear: both;"><span data-dcnode-id="2693" instrument_node="">
</span><p class="disclosure" data-dcnode-id="2687"><i data-dcnode-id="2688"><span data-dcnode-id="2692" instrument_node="">This post may contain affiliate links. By clicking on any of the links below, I may get a commission if you make a purchase at absolutely no additional charge to you. This helps offset the costs of running this blog &amp; I appreciate your support. Please see my </span><a data-dcnode-id="2690" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//themomtrotter.com/privacy-policy/"><span data-dcnode-id="2691" instrument_node="">privacy &amp; disclosure policy</span></a><span data-dcnode-id="2689" instrument_node=""> for more.</span></i></p></div><span data-dcnode-id="2685" instrument_node="">
</span><span data-dcnode-id="2684" instrument_node="">
</span><p data-dcnode-id="2680"><span data-dcnode-id="2683" instrument_node="">A few weeks into January, Aiden asked me when was it going to be Christmas because it hadn’t snowed yet. I knew right away that I better get to planning a ski trip with kids. He wanted to see and feel real snow and wouldn’t stop asking me about it. </span><strong data-dcnode-id="2681"><span data-dcnode-id="2682" instrument_node="">Winter Park Colorado</span></strong></p><span data-dcnode-id="2679" instrument_node="">
</span><p data-dcnode-id="2677"><span data-dcnode-id="2678" instrument_node="">I the decided to plan a kid friendly ski trip to Winter Park, Colorado so he could experience the snow, and taste it too. In his words “Mom, I really want to eat snow.” As I was planning, I realized my sister’s birthday was going to fall on our trip, and that made it even more exciting!</span></p><span data-dcnode-id="2676" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="2673"><figure class="aligncenter" data-dcnode-id="2674"><img alt="the-mom-trotter-2" class="wp-image-1871 p3_pinterest_hover_img" data-dcnode-id="2675" data-pin-description="Planning your first ever ski trip with kids can be very exciting. Our family spent a few days in Winter Park Colorado with kids and had such a great time. #skitrip #coloradoski #skicolorado #winterpark #themomtrotter #familytravel" data-pin-media="https://themomtrotter.com/wp-content/uploads/2018/01/the-mom-trotter-2.png" data-pin-title="Colorado Ski Trip: Winter Park With Kids" data-pin-url="https://themomtrotter.com/winter-park-with-kids/" height="900" sizes="(max-width: 680px) 100vw, 680px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//themomtrotter.com/wp-content/uploads/2018/01/the-mom-trotter-2.png&amp;raw" srcset="https://themomtrotter.com/wp-content/uploads/2018/01/the-mom-trotter-2.png 680w, https://themomtrotter.com/wp-content/uploads/2018/01/the-mom-trotter-2-227x300.png 227w, https://themomtrotter.com/wp-content/uploads/2018/01/the-mom-trotter-2-300x397.png 300w" width="680"></figure></div><span data-dcnode-id="2672" instrument_node="">
</span><p data-dcnode-id="2670"><span data-dcnode-id="2671" instrument_node="">This was how our conversation went: </span></p><span data-dcnode-id="2669" instrument_node="">
</span><p data-dcnode-id="2657"><span data-dcnode-id="2668" instrument_node="">A: “Mom, when is it going to be Christmas?”</span><br data-dcnode-id="2667"><span data-dcnode-id="2666" instrument_node="">Me: (looking confused) “A, Christmas was in December. Remember you were in Sweden with your cousins and you opened your gifts?”</span><br data-dcnode-id="2665"><span data-dcnode-id="2664" instrument_node="">A: “But Mom, it didn’t snow yet. That means Christmas didn’t come yet.”</span><br data-dcnode-id="2663"><span data-dcnode-id="2662" instrument_node="">Me: (laughing so hard) “It doesn’t always snow during Christmas son.”</span><br data-dcnode-id="2661"><span data-dcnode-id="2660" instrument_node="">A: “But Mom, I really really want to see snow because I really really love it.”</span><br data-dcnode-id="2659"><span data-dcnode-id="2658" instrument_node="">Me: “Okay Baby Boy, I’ve heard you.”</span></p><span data-dcnode-id="2656" instrument_node="">
</span><p data-dcnode-id="2654"><span data-dcnode-id="2655" instrument_node="">After Aiden and I had this conversation, I started looking at different family friendly snow resorts in Utah and Colorado. I also immediately started tracking the weather for when it would snow. I knew there would be snow at the ski resort, but I wanted it to snow while we were there so Aiden could experience it all. </span></p><span data-dcnode-id="2653" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="2647"><div class="p3_pin_wrapper_outer" data-dcnode-id="2648"><div class="p3_pin_wrapper" data-dcnode-id="2649"><img alt="snow-ball-fight" class="wp-image-1797 p3_pinterest_hover_img" data-dcnode-id="2652" data-pin-description="Planning your first ever ski trip with kids can be very exciting. Our family spent a few days in Winter Park Colorado with kids and had such a great time. #skitrip #coloradoski #skicolorado #winterpark #themomtrotter #familytravel" data-pin-media="https://themomtrotter.com/wp-content/uploads/2018/01/snow-ball-fight.jpg" data-pin-title="Colorado Ski Trip: Winter Park With Kids" data-pin-url="https://themomtrotter.com/winter-park-with-kids/" height="4480" loading="lazy" sizes="(max-width: 6720px) 100vw, 6720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//themomtrotter.com/wp-content/uploads/2018/01/snow-ball-fight.jpg&amp;raw" srcset="https://themomtrotter.com/wp-content/uploads/2018/01/snow-ball-fight.jpg 6720w, https://themomtrotter.com/wp-content/uploads/2018/01/snow-ball-fight-300x200.jpg 300w, https://themomtrotter.com/wp-content/uploads/2018/01/snow-ball-fight-768x512.jpg 768w, https://themomtrotter.com/wp-content/uploads/2018/01/snow-ball-fight-1024x683.jpg 1024w" width="6720"><a class="PIN_1650943070181_button_pin PIN_1650943070181_save" data-dcnode-id="2650" data-pin-href="https://www.pinterest.com/pin/create/button/?guid=fr43wnuduAwr-1&amp;url=https%3A%2F%2Fthemomtrotter.com%2Fwinter-park-with-kids%2F&amp;media=https%3A%2F%2Fthemomtrotter.com%2Fwp-content%2Fuploads%2F2018%2F01%2Fsnow-ball-fight.jpg&amp;description=%20Planning%20your%20first%20ever%20ski%20trip%20with%20kids%20can%20be%20very%20exciting.%20Our%20family%20spent%20a%20few%20days%20in%20Winter%20Park%20Colorado%20with%20kids%20and%20had%20such%20a%20great%20time.%20" data-pin-log="button_pinit" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pinterest.com/pin/create/button/%3Fguid%3Dfr43wnuduAwr-1%26url%3Dhttps%253A%252F%252Fthemomtrotter.com%252Fwinter-park-with-kids%252F%26media%3Dhttps%253A%252F%252Fthemomtrotter.com%252Fwp-content%252Fuploads%252F2018%252F01%252Fsnow-ball-fight.jpg%26description%3D%2520Planning%2520your%2520first%2520ever%2520ski%2520trip%2520with%2520kids%2520can%2520be%2520very%2520exciting.%2520Our%2520family%2520spent%2520a%2520few%2520days%2520in%2520Winter%2520Park%2520Colorado%2520with%2520kids%2520and%2520had%2520such%2520a%2520great%2520time.%2520"><span data-dcnode-id="2651" instrument_node="">Save</span></a></div></div></figure><span data-dcnode-id="2646" instrument_node="">
</span><p data-dcnode-id="2641"><span data-dcnode-id="2645" instrument_node="">I narrowed my choices to Keystone, Winter Park and Breckenridge, all family friendly ski resorts in Colorado and finally decided on </span><a data-dcnode-id="2643" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.winterparkresort.com/" rel="noreferrer noopener nofollow external" target="_blank"><span data-dcnode-id="2644" instrument_node="">Winter Park Resort</span></a><span data-dcnode-id="2642" instrument_node="">. There was one deciding factor for me when I picked Winter Park, and it was because they were the only resort offering half day ski school. This was not because of the price, but time spent on the slopes. Aiden and my sister, Ells would be skiing for the first time, and I didn’t want them on the slopes all day just in case they hated it (but boy o boy was I wrong. they LOVED it). Winter Park was the best choice for our ski trip with kids.</span></p><span data-dcnode-id="2640" instrument_node="">

</span><p data-dcnode-id="2480"><span data-dcnode-id="2484" instrument_node="">There are several options for tubing in Winter Park, but </span><a data-dcnode-id="2482" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tripadvisor.com/Attraction_Review-g33431-d1642638-Reviews-Fraser_Tubing_Hill-Fraser_Grand_County_Colorado.html" rel="noreferrer noopener nofollow external" target="_blank"><span data-dcnode-id="2483" instrument_node="">Fraser Tubing Hill</span></a><span data-dcnode-id="2481" instrument_node="">&nbsp;place was recommended by the hotel so we decided to go there. We had originally planned on going to the Coca Cola Tubing Hill at the Winter Park Resort but changed our minds after the recommendation.</span></p><span data-dcnode-id="2479" instrument_node="">
</span><p data-dcnode-id="2474"><span data-dcnode-id="2478" instrument_node="">The Coca Cola Tubing Hill Requires advance reservations and cost $26 per person for 60 minutes which is the max time you can tube for. The Fraser Tubing Hill cost $26 for 90 minutes and was free for Aiden, so definitely a better deal. Check out&nbsp;</span><a data-dcnode-id="2476" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.playwinterpark.com/sledding-tubing" rel="noreferrer noopener nofollow external" target="_blank"><span data-dcnode-id="2477" instrument_node="">Winter Park Tubing</span></a><span data-dcnode-id="2475" instrument_node="">&nbsp;for other options.</span></p><span data-dcnode-id="2473" instrument_node="">

e/button/%3Fguid%3Dfr43wnuduAwr-7%26url%3Dhttps%253A%252F%252Fthemomtrotter.com%252Fwinter-park-with-kids%252F%26media%3Dhttps%253A%252F%252Fthemomtrotter.com%252Fwp-content%252Fuploads%252F2018%252F01%252Fsnow-with-kids.jpg%26description%3D%2520Planning%2520your%2520first%2520ever%2520ski%2520trip%2520with%2520kids%2520can%2520be%2520very%2520exciting.%2520Our%2520family%2520spent%2520a%2520few%2520days%2520in%2520Winter%2520Park%2520Colorado%2520with%2520kids%2520and%2520had%2520such%2520a%2520great%2520time.%2520"><span data-dcnode-id="2431" instrument_node="">Save</span></a></div></div></figure><span data-dcnode-id="2426" instrument_node="">

</span><p data-dcnode-id="2420"><span data-dcnode-id="2421" instrument_node="">When I found out that I could rent a kids snowmobile for Aiden, I knew he would love it. We went snowmobiling in Turkey, but he rode with me on the adult snow mobile. This time he was going to be able to ride it himself.</span></p><span data-dcnode-id="2419" instrument_node="">
</span><p data-dcnode-id="2414"><span data-dcnode-id="2418" instrument_node="">We rented with </span><a data-dcnode-id="2416" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.grandadventures.com/snowmobiling/" rel="noreferrer noopener nofollow external" target="_blank"><span data-dcnode-id="2417" instrument_node="">Grand Adventures</span></a><span data-dcnode-id="2415" instrument_node="">&nbsp;and it cost $20 for about 30 minutes. which included a helmet. He was able to ride in an open space while he snowed. Must add to your list when planning a ski trip with kids.</span></p><span data-dcnode-id="2413" instrument_node="">

</span><p data-dcnode-id="2386"><span data-dcnode-id="2387" instrument_node="">This came up as one of the things to do with kids in Winter Park. I knew we would all enjoy the scenic ride and most of all roasted marshmallows and hot chocolate.</span></p><span data-dcnode-id="2385" instrument_node="">
