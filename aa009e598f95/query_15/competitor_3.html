</span><p data-dcnode-id="1844"><span data-dcnode-id="1845" instrument_node="">Keeping a toddler busy in a stroller can be a challenge, as toddlers tend to get distracted easily and need incentive to keep still. You may put your toddler in the stroller to get outside more and run around with your toddler in tow. To keep your toddler happy and relaxed in the stroller, start by preparing them for the stroller so they are excited to go on a little trip outside. Then, give them snacks and toys and use games to keep them occupied while in the stroller.
</span></p><span data-dcnode-id="1843" instrument_node="">

</span><b class="whb" data-dcnode-id="1764"><span data-dcnode-id="1765" instrument_node="">Get your toddler excited for the stroller.</span></b><span data-dcnode-id="1763" instrument_node=""> Start by asking your toddler if they’d like to go outside in the stroller for a little while. Tell them it will be an exciting adventure and that they can play in the stroller. Emphasize that the stroller will be a place where they play, sleep, or simply watch the world outside. This can help your toddler get excited about going into the stroller and make the stroller ride easier for you.
</span><ul data-dcnode-id="1760"><li data-dcnode-id="1761"><span data-dcnode-id="1762" instrument_node="">For example, you may say to your toddler, "Are you ready to go on an adventure in the stroller?" or "Ready for stroller time?"</span></li></ul><span data-dcnode-id="1759" instrument_node="">

</span><div class="step_num" data-dcnode-id="1720"><span data-dcnode-id="1721" instrument_node="">2</span></div><div class="step" data-dcnode-id="1689"><span data-dcnode-id="1719" instrument_node="">
</span><b class="whb" data-dcnode-id="1717"><span data-dcnode-id="1718" instrument_node="">Make them snug and comfortable in the stroller.</span></b><span data-dcnode-id="1716" instrument_node=""> Make sure your toddler is comfortable in the stroller so they will be more willing to stay in it while you are out. Use blankets and small pillows to provide padding in the stroller. Bundle up your toddler in layers, especially if the weather is going to be temperate or a little chilly outside. Put socks and gloves on your toddler so they are warm and cozy.</span><sup aria-label="Link to Reference 1" class="reference" data-dcnode-id="1700" id="_ref-1"><a data-dcnode-id="1714" href="#_note-1"><span data-dcnode-id="1715" instrument_node="">[1]</span></a><span class="ts_popup" data-dcnode-id="1702" hidden="" id="ts_popup_1" style="display: none;"><span data-dcnode-id="1713" instrument_node="">
</span><span class="ts_close" data-dcnode-id="1711"><span data-dcnode-id="1712" instrument_node="">X</span></span><span data-dcnode-id="1710" instrument_node="">
</span><span class="ts_name" data-dcnode-id="1708"><span data-dcnode-id="1709" instrument_node="">Research source</span></span><span data-dcnode-id="1707" instrument_node="">
</span><span class="ts_description" data-dcnode-id="1706"></span><span data-dcnode-id="1705" instrument_node="">

</span></span><span data-dcnode-id="1701" instrument_node="">
</span></sup><span data-dcnode-id="1699" instrument_node="">
</span><ul data-dcnode-id="1691"><span data-dcnode-id="1698" instrument_node="">
</span><li data-dcnode-id="1696"><span data-dcnode-id="1697" instrument_node="">You can also check that your toddler is comfortable in the stroller before you set off. Ask them, "Are you comfortable in there?" or "How does being in the stroller feel?"</span></li><span data-dcnode-id="1695" instrument_node="">
</span><li data-dcnode-id="1693"><span data-dcnode-id="1694" instrument_node="">Make sure they are shaded from the sun in the stroller. Put a hat on your toddler. Make sure a sun shade is down over the stroller, if there is one.</span></li><span data-dcnode-id="1692" instrument_node="">
</span></ul><span data-dcnode-id="1690" instrument_node="">

</span><li data-dcnode-id="1349"><span data-dcnode-id="1350" instrument_node="">You may limit your child’s access to electronics to only when they are in the stroller. This way, they will have more of an incentive to spend time in the stroller.</span></li><span data-dcnode-id="1348" instrument_node="">
</span><li data-dcnode-id="1346"><span data-dcnode-id="1347" instrument_node="">Put the electronic item in a case with a strap that can attach to the stroller to prevent it from breaking if your toddler tosses it out along the way.</span></li><span data-dcnode-id="1345" instrument_node="">

</span><b class="whb" data-dcnode-id="1276"><span data-dcnode-id="1277" instrument_node="">Talk and sing to your toddler.</span></b><span data-dcnode-id="1275" instrument_node=""> Interact with your toddler during stroller walks so they feel engaged and excited to be in the stroller. Chat with them about the day and the things they are seeing outside. Do singalongs with them to keep them busy and engaged.</span><sup aria-label="Link to Reference 8" class="reference" data-dcnode-id="1259" id="_ref-8"><a data-dcnode-id="1273" href="#_note-8"><span data-dcnode-id="1274" instrument_node="">[8]</span></a><span class="ts_popup" data-dcnode-id="1261" hidden="" id="ts_popup_8" style="display: none;"><span data-dcnode-id="1272" instrument_node="">

</span><b class="whb" data-dcnode-id="1218"><span data-dcnode-id="1219" instrument_node="">Play "I Spy."</span></b><span data-dcnode-id="1217" instrument_node=""> Another way to keep them occupied is to play games like "I Spy." This can be a great way to keep your toddler interested in what they are seeing from their stroller and to keep them calm and busy. Start off the game by saying, "I spy with my little eye something…". Then, let your toddler guess. Once they get it right, it becomes their turn to spy something based on a color around them.</span><sup aria-label="Link to Reference 9" class="reference" data-dcnode-id="1201" id="_ref-9"><a data-dcnode-id="1215" href="#_note-9"><span data-dcnode-id="1216" instrument_node="">[9]</span></a><span class="ts_popup" data-dcnode-id="1203" hidden="" id="ts_popup_9" style="display: none;"><span data-dcnode-id="1214" instrument_node="">

</span></sup><span data-dcnode-id="1200" instrument_node="">
</span><ul data-dcnode-id="1197"><li data-dcnode-id="1198"><span data-dcnode-id="1199" instrument_node="">If your toddler knows their shapes, you can also play "I Spy" with shapes, where they have to spot items based on their shape.</span></li></ul><span data-dcnode-id="1196" instrument_node="">

</span><b class="whb" data-dcnode-id="1160"><span data-dcnode-id="1161" instrument_node="">Try different walking paths.</span></b><span data-dcnode-id="1159" instrument_node=""> Keep the stroller walks or jogs interesting for your toddler by switching up your walking routine. Go for different walking paths or trails. Try taking your toddler to different or new settings in the stroller. This way, you can point out new things to them and keep them busy by exposing them to different environments.
</span><ul data-dcnode-id="1156"><li data-dcnode-id="1157"><span data-dcnode-id="1158" instrument_node="">As part of a game, you may also ask your toddler where they want to go today in the stroller. Let them choose the destination so they are more excited to be in the stroller and are willing to stay calm in the stroller as you walk to their chosen destination.</span></li></ul><span data-dcnode-id="1155" instrument_node="">
