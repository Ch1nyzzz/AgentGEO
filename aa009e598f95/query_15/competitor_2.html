</span><h1 class="entry-title" data-dcnode-id="1638" itemprop="headline"><span data-dcnode-id="1639" instrument_node="">The 10 Best Family Outdoor Adventure Trips</span></h1><span data-dcnode-id="1637" instrument_node=""> </span><div class="entry-meta" data-dcnode-id="1622"><span data-dcnode-id="1636" instrument_node="">
</span><span class="posted-on" data-dcnode-id="1631"><time class="updated" data-dcnode-id="1634" datetime="2021-12-19T06:01:31-07:00" itemprop="dateModified"><span data-dcnode-id="1635" instrument_node="">December 19, 2021</span></time><time class="entry-date published" data-dcnode-id="1632" datetime="2021-12-19T03:00:23-07:00" itemprop="datePublished"><span data-dcnode-id="1633" instrument_node="">December 19, 2021</span></time></span><span data-dcnode-id="1630" instrument_node=""> </span><span class="byline" data-dcnode-id="1624"><span data-dcnode-id="1629" instrument_node="">by </span><span class="author vcard" data-dcnode-id="1625" itemprop="author" itemscope="" itemtype="https://schema.org/Person"><a class="url fn n" data-dcnode-id="1626" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thebigoutside.com/author/michaelalanza/" itemprop="url" rel="author" title="View all posts by Michael Lanza"><span class="author-name" data-dcnode-id="1627" itemprop="name"><span data-dcnode-id="1628" instrument_node="">Michael Lanza</span></span></a></span></span><span data-dcnode-id="1623" instrument_node=""> </span></div><span data-dcnode-id="1621" instrument_node="">
</span></header><span data-dcnode-id="1619" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1140" itemprop="text"><span data-dcnode-id="1618" instrument_node="">
</span><p data-dcnode-id="1616"><span data-dcnode-id="1617" instrument_node="">By Michael Lanza</span></p><span data-dcnode-id="1615" instrument_node="">
</span><p data-dcnode-id="1613"><span data-dcnode-id="1614" instrument_node="">As a parent of two college-age young adults who’s taken them outdoors since before they can remember, I’ll share with you the biggest and in some ways most surprising lesson I’ve learned from these trips: Our outdoor adventures have been the best times we’ve had together as a family—and not just because the places are so special. The greatest benefit of these trips is that they have given us innumerable days with only each other and nature for entertainment—no electronic devices or other distractions that construct virtual walls within families in everyday life.</span></p><span data-dcnode-id="1612" instrument_node="">
</span><p data-dcnode-id="1610"><span data-dcnode-id="1611" instrument_node="">For my family, our experiences together outdoors make up most of our richest and favorite memories. They have brought us closer together. </span></p><span data-dcnode-id="1609" instrument_node="">
</span><span data-dcnode-id="1608" id="more-3364"></span><span data-dcnode-id="1607" instrument_node="">
</span><p data-dcnode-id="1602"><span data-dcnode-id="1606" instrument_node="">That’s a gift we’ve given ourselves as a family, one that I’ve cherished every minute of (well, </span><em data-dcnode-id="1604"><span data-dcnode-id="1605" instrument_node="">most</span></em><span data-dcnode-id="1603" instrument_node=""> of the minutes, anyway). I also know our kids will appreciate it more and more as they get older—and I’m confident they will pass this gift on to their own children.</span></p><span data-dcnode-id="1601" instrument_node="">
</span><p data-dcnode-id="1599"><span data-dcnode-id="1600" instrument_node="">No matter where you go or what you do with your kids, you can reap that reward. But if you want to share with your family the very best experiences and places in nature, well, I have a pretty darn awesome list for you.</span></p><span data-dcnode-id="1598" instrument_node="">
</span><hr data-dcnode-id="1597"><span data-dcnode-id="1596" instrument_node="">

</span><p data-dcnode-id="1561"><span data-dcnode-id="1565" instrument_node="">For this story, I’ve picked out the 10 very best adventures my family has taken and I’ve written about at The Big Outside—which also rank among the most beautiful and inspiring trips I’ve taken over the past three decades as an outdoors writer, including </span><a data-dcnode-id="1563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thebigoutside.com/about/"><span data-dcnode-id="1564" instrument_node="">many years running this blog and previously as a field editor for Backpacker</span></a><span data-dcnode-id="1562" instrument_node=""> magazine. </span></p><span data-dcnode-id="1560" instrument_node="">
</span><p data-dcnode-id="1558"><span data-dcnode-id="1559" instrument_node="">This tick list includes seven national parks, three world-class paddling adventures, three trips that should be on every backpacker’s to-do list, America’s most scenic and fascinating volcano hike, and cross-country skiing or hiking among the greatest concentration of active geysers in the world.</span></p><span data-dcnode-id="1557" instrument_node="">
</span><p data-dcnode-id="1555"><span data-dcnode-id="1556" instrument_node="">Not surprisingly, all of these trips are extremely popular and require planning and making reservations months in advance.</span></p><span data-dcnode-id="1554" instrument_node="">
</span><p data-dcnode-id="1549"><span data-dcnode-id="1553" instrument_node="">The writeups below all link to my full feature story about each trip at The Big Outside, which include more images and detailed tips on planning each one yourself (and which require a </span><a data-dcnode-id="1551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thebigoutside.com/join/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1552" instrument_node="">paid subscription</span></a><span data-dcnode-id="1550" instrument_node=""> to read in full).</span></p><span data-dcnode-id="1548" instrument_node="">
</span><p data-dcnode-id="1543"><span data-dcnode-id="1547" instrument_node="">You may also want to peruse </span><a data-dcnode-id="1545" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thebigoutside.com/new-year-inspiration-my-top-10-adventure-trips/"><span data-dcnode-id="1546" instrument_node="">my list of 10 all-time favorite adventures</span></a><span data-dcnode-id="1544" instrument_node="">, domestic and international—there are definitely trips that could be on either list (and there’s no overlap between the two).</span></p><span data-dcnode-id="1542" instrument_node="">
</span><p data-dcnode-id="1540"><span data-dcnode-id="1541" instrument_node="">I’d love to read your comments about any of these trips or the entire list, and other readers and I would appreciate any advice you have on any of these trips. Share your thoughts in the comments section at the bottom of this story. I try to respond to all comments.</span></p><span data-dcnode-id="1539" instrument_node="">
</span><p data-dcnode-id="1537"><span data-dcnode-id="1538" instrument_node="">Here’s wishing you many years of forging lasting memories together as a family.</span></p><span data-dcnode-id="1536" instrument_node="">

</span><h3 data-dcnode-id="1511"><span data-dcnode-id="1517" instrument_node="">1. </span><a data-dcnode-id="1515" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thebigoutside.com/three-generations-one-big-volcano-pushing-limits-on-mount-st-helens/"><span data-dcnode-id="1516" instrument_node="">Three Generations, One Big Volcano: Hiking</span></a><span data-dcnode-id="1514" instrument_node=""> </span><a data-dcnode-id="1512" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thebigoutside.com/three-generations-one-big-volcano-pushing-limits-on-mount-st-helens/"><span data-dcnode-id="1513" instrument_node="">Mount St. Helens</span></a></h3><span data-dcnode-id="1510" instrument_node="">
</span><p data-dcnode-id="1508"><span data-dcnode-id="1509" instrument_node="">I’ll make you this guarantee: Mount St. Helens is one of the coolest dayhikes in America, period. Hikers on the standard route, Monitor Ridge, soon emerge from shady rainforest onto a stark, gray and black moonscape of volcanic rocks, pumice, and ash, with infinite views of the Cascade Range, including other snow-capped volcanoes like Hood, Adams, and Rainier. </span></p><span data-dcnode-id="1507" instrument_node="">
</span><p data-dcnode-id="1505"><span data-dcnode-id="1506" instrument_node="">It’s also a tough hike at 10 miles round-trip and 4,500 vertical feet up and down, most of it on rugged terrain that varies from loose stones and dirt to ash that’s like hiking a giant sand dune. We had a special component to our trip up and down the mountain: a three-generation family group with a 66-year spread between the youngest, my 10-year-old daughter, and the oldest, my 76-year-old mother. When I scored last-minute permits to hike the mountain, I wasn’t sure everyone could make it. Then, hours into the ascent, events seemed to take an ominous turn. </span></p><span data-dcnode-id="1504" instrument_node="">
</span><p data-dcnode-id="1500"><a data-dcnode-id="1502" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thebigoutside.com/three-generations-one-big-volcano-pushing-limits-on-mount-st-helens/"><span data-dcnode-id="1503" instrument_node="">Read my story</span></a><span data-dcnode-id="1501" instrument_node=""> to find out how it all turned out.</span></p><span data-dcnode-id="1499" instrument_node="">
</span><h4 class="has-text-align-center" data-dcnode-id="1494"><span data-dcnode-id="1498" instrument_node="">Hiking Mount St. Helens was one of my “</span><a data-dcnode-id="1496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thebigoutside.com/my-25-most-scenic-days-of-hiking-ever/"><span data-dcnode-id="1497" instrument_node="">30 Most Scenic Days of Hiking Ever</span></a><span data-dcnode-id="1495" instrument_node="">.”</span></h4><span data-dcnode-id="1493" instrument_node="">

</span><h3 data-dcnode-id="1479"><span data-dcnode-id="1482" instrument_node="">2. </span><a data-dcnode-id="1480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thebigoutside.com/the-magic-of-falling-water-hiking-to-yosemites-waterfalls/"><span data-dcnode-id="1481" instrument_node="">The Magic of Hiking to Yosemite’s Waterfalls</span></a></h3><span data-dcnode-id="1478" instrument_node="">
</span><p data-dcnode-id="1476"><span data-dcnode-id="1477" instrument_node="">Stand at the brink of a thunderous waterfall that drops a sheer 1,400 feet over a cliff. Hike a trail in the heavy shower of mist raining from a clear, blue sky. Dayhike through one of the most iconic landscapes in America—Yosemite Valley. </span></p><span data-dcnode-id="1475" instrument_node="">
</span><p data-dcnode-id="1473"><span data-dcnode-id="1474" instrument_node="">The Valley’s towering cliffs and waterfalls will awe any adult and even the most cynical teenager. But for kids, there are also the thrills of walking through the mist from a giant waterfall, and moments like traversing the narrow catwalk blasted out of granite on the final steps to the top of Upper Yosemite Falls. </span></p><span data-dcnode-id="1472" instrument_node="">

</span><h3 data-dcnode-id="1443"><span data-dcnode-id="1449" instrument_node="">3. </span><a data-dcnode-id="1447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thebigoutside.com/still-waters-run-deep-tackling-americas-best-multi-day-float-trip-on-the-green-river/"><span data-dcnode-id="1448" instrument_node="">Tackling America’s Best Easy,</span></a><span data-dcnode-id="1446" instrument_node=""> </span><a data-dcnode-id="1444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thebigoutside.com/still-waters-run-deep-tackling-americas-best-multi-day-float-trip-on-the-green-river/"><span data-dcnode-id="1445" instrument_node="">Multi-Day Float Trip</span></a></h3><span data-dcnode-id="1442" instrument_node="">
</span><p data-dcnode-id="1440"><span data-dcnode-id="1441" instrument_node="">For 52 miles through Stillwater Canyon in Utah’s Canyonlands National Park, the Green River slowly unfurls beneath a constant backdrop of giant redrock cliffs and spires. Off the water, you camp on sandy beaches and slickrock benches, hike to centuries-old Puebloan rock art and cliff dwellings, and maybe even spot bighorn sheep scrambling around on precipitous rock faces.</span></p><span data-dcnode-id="1439" instrument_node="">
</span><p data-dcnode-id="1437"><span data-dcnode-id="1438" instrument_node="">An easy trip for beginners and families—our party of 17 ranged in age from four to 80 and included eight kids—floating the Green River stood, for years, as my family’s gold standard for river trips (eventually replaced, when our kids got older, by the last trip on this list).</span></p><span data-dcnode-id="1436" instrument_node="">

</span><h3 data-dcnode-id="1407"><span data-dcnode-id="1410" instrument_node="">4. </span><a data-dcnode-id="1408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thebigoutside.com/hiking-the-tour-du-mont-blanc-at-an-80-year-old-snails-pace/"><span data-dcnode-id="1409" instrument_node="">Trekking the Tour du Mont Blanc in the Alps</span></a></h3><span data-dcnode-id="1406" instrument_node="">
</span><p data-dcnode-id="1404"><span data-dcnode-id="1405" instrument_node="">My list would be incomplete without one of the biggest, most beautiful and fun adventures my family has ever taken. And you’ll find the Tour du Mont Blanc (also the lead photo at top of story) on just about any list of the world’s greatest trails. The main reason is the sheer majesty of this roughly 105-mile (170k) walking path around the “Monarch of the Alps,” 15,771-foot (4807m) Mont Blanc. Passing through three Alpine nations—France, Italy, and Switzerland—and over several mountain passes reaching nearly 9,000 feet, it delivers almost constant views of glaciers, pointy peaks and “augilles,” and the snowy dome of Mont Blanc. </span></p><span data-dcnode-id="1403" instrument_node="">
</span><p data-dcnode-id="1401"><span data-dcnode-id="1402" instrument_node="">Making this trip all the more special was the fact that we had three generations of my extended family represented, including my 80-year-old mother. </span></p><span data-dcnode-id="1400" instrument_node="">

</span><p data-dcnode-id="1371"><span data-dcnode-id="1372" instrument_node="">For our kids, who were nine and seven, this three-day backpacking trip on the wilderness coastline of Washington’s Olympic National Park ranked as a favorite for all the expected reasons that children love a wild ocean shore: playing for hours in water, exploring the variety of sea life in tide pools, and picking, awestruck, through the myriad flotsam from civilization like old, salt-worn buoys (my son took one home). </span></p><span data-dcnode-id="1370" instrument_node="">
</span><p data-dcnode-id="1365"><span data-dcnode-id="1369" instrument_node="">For adults, the scores of offshore sea stacks, giant trees, and natural beauty make the Olympic coast one of </span><a data-dcnode-id="1367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thebigoutside.com/my-top-10-favorite-backpacking-trips/"><span data-dcnode-id="1368" instrument_node="">America’s classic backpacking trips</span></a><span data-dcnode-id="1366" instrument_node="">. </span></p><span data-dcnode-id="1364" instrument_node="">

</span><p data-dcnode-id="1326"><span data-dcnode-id="1330" instrument_node="">Sure, any trip in the Big Ditch is worthy of a top 10 list—you could fill a top 10 list just with </span><a data-dcnode-id="1328" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thebigoutside.com/tag/grand-canyon-south-rim-backpacking-trips/"><span data-dcnode-id="1329" instrument_node="">Grand Canyon hikes</span></a><span data-dcnode-id="1327" instrument_node="">. But in this rugged terrain and unforgiving environment, choosing the right backpacking route becomes critical; most trails are rough, many trailheads remote. </span></p><span data-dcnode-id="1325" instrument_node="">
</span><p data-dcnode-id="1323"><span data-dcnode-id="1324" instrument_node="">This four-day, 29-mile hike combines two of the most spectacular and accessible trails coming off the South Rim—the Grandview and South Kaibab—with an easier, less-busy stretch of the Tonto Trail that delivers constant, big views. </span></p><span data-dcnode-id="1322" instrument_node="">

</span><h3 data-dcnode-id="1295"><span data-dcnode-id="1298" instrument_node="">7. </span><a data-dcnode-id="1296" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thebigoutside.com/like-no-other-place-paddling-the-everglades/"><span data-dcnode-id="1297" instrument_node="">Like No Other Place: Paddling the Everglades</span></a></h3><span data-dcnode-id="1294" instrument_node="">
</span><p data-dcnode-id="1292"><span data-dcnode-id="1293" instrument_node="">Seeing scores of large, exotic birds like brown pelicans, roseate spoonbills, white ibises, and black anhingas. Canoeing among remote islands to camp on a wilderness beach you have all to yourself. Watching a dolphin surface just off your canoe’s bow and swim a wide circle around you. Paddling a flatwater river shared with alligators (kept at a safe distance). </span></p><span data-dcnode-id="1291" instrument_node="">
</span><p data-dcnode-id="1289"><span data-dcnode-id="1290" instrument_node="">It’s hard to overstate how exciting and fun this park is for adults and children. And the trip my family took when our kids were ten and almost eight was one of the most beginner-friendly in the Everglades.</span></p><span data-dcnode-id="1288" instrument_node="">

</span><h3 data-dcnode-id="1256"><span data-dcnode-id="1259" instrument_node="">8. </span><a data-dcnode-id="1257" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thebigoutside.com/pilgrimage-across-zion-traversing-a-land-of-otherworldly-scenery/"><span data-dcnode-id="1258" instrument_node="">Backpacking Zion, a Land of Otherworldly Scenery</span></a></h3><span data-dcnode-id="1255" instrument_node="">
</span><p data-dcnode-id="1250"><span data-dcnode-id="1254" instrument_node="">Many hikers content themselves with exploring the trails of Zion Canyon and the popular dayhike up </span><a data-dcnode-id="1252" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thebigoutside.com/hiking-angels-landing-what-you-need-to-know/"><span data-dcnode-id="1253" instrument_node="">Angels Landing</span></a><span data-dcnode-id="1251" instrument_node="">—all worthwhile. But backpack into the backcountry and you discover a sprawling landscape that’s unique even in the Southwest. </span></p><span data-dcnode-id="1249" instrument_node="">
</span><p data-dcnode-id="1247"><span data-dcnode-id="1248" instrument_node="">Cliffs of pure white and blood-red sandstone soar hundreds of feet overhead, rock ripples like water, and you walk along a high rim looking down on a labyrinth of slot canyons and isolated mesas. This trip’s moderate difficulty and multiple itinerary options make it ideal for families and beginner backpackers. </span></p><span data-dcnode-id="1246" instrument_node="">
</span><p data-dcnode-id="1241"><span data-dcnode-id="1245" instrument_node="">Read </span><a data-dcnode-id="1243" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thebigoutside.com/pilgrimage-across-zion-traversing-a-land-of-otherworldly-scenery/"><span data-dcnode-id="1244" instrument_node="">my story</span></a><span data-dcnode-id="1242" instrument_node=""> and I think you’ll see why.</span></p><span data-dcnode-id="1240" instrument_node="">

</span><h3 data-dcnode-id="1221"><span data-dcnode-id="1222" instrument_node="">9. Exploring Yellowstone</span></h3><span data-dcnode-id="1220" instrument_node="">
</span><p data-dcnode-id="1218"><span data-dcnode-id="1219" instrument_node="">Visiting the world’s first national park, Yellowstone, should be a requirement of American citizenship (and I would gladly contribute to a fund to make it affordable for every family). Besides the opportunity to see a range of wildlife that nearly mirrors what North America looked like before Columbus, you can watch geysers erupt and see natural hot springs, whistling fumaroles, bubbling mud pots, and some beautiful waterfalls. </span></p><span data-dcnode-id="1217" instrument_node="">
</span><p data-dcnode-id="1215"><span data-dcnode-id="1216" instrument_node="">I’ve visited many times, with my kids and before I had a family, in every season. It’s wonderful for everyone, at any stage in life, partly because so many of its highlight features can be seen on short walks. And to me, cross-country skiing the almost flat, 2.5 miles of trail through Yellowstone’s Upper Geyser Basin, past one-fourth of the active geysers in the world (and the greatest concentration of them), is one of the most fascinating experiences in the National Park System.</span></p><span data-dcnode-id="1214" instrument_node="">

</span><h3 data-dcnode-id="1178"><span data-dcnode-id="1181" instrument_node="">10. </span><a data-dcnode-id="1179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thebigoutside.com/big-water-big-wilderness-rafting-idahos-incomparable-middle-fork-salmon-river/"><span data-dcnode-id="1180" instrument_node="">Rafting Idaho’s Incomparable Middle Fork Salmon River</span></a></h3><span data-dcnode-id="1177" instrument_node="">
</span><p data-dcnode-id="1175"><span data-dcnode-id="1176" instrument_node="">For a complete package of sheer thrills, five-star scenery, immersion in a vast wilderness, beautiful campsites, repeated episodes of children shrieking with joy, and an experience guaranteed to be a family favorite that you’ll want to repeat—not to mention eating like every day was Thanksgiving—few trips we’ve taken as a family compare to our guided float down Idaho’s Middle Fork of the Salmon River. </span></p><span data-dcnode-id="1174" instrument_node="">
</span><p data-dcnode-id="1172"><span data-dcnode-id="1173" instrument_node="">Flowing like an artery through the heart of the second-largest federal wilderness in the continental United States, the nearly 2.4-million-acre Frank Church-River of No Return Wilderness, the Middle Fork is widely considered second only to the Colorado River through the Grand Canyon in terms of raw beauty. My family might argue it’s better—and we already have our next Middle Fork trip on the calendar.</span></p><span data-dcnode-id="1171" instrument_node="">
</span><p data-dcnode-id="1163"><span data-dcnode-id="1170" instrument_node="">See my stories about my family’s first two trips on the Middle Fork, “</span><a data-dcnode-id="1168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thebigoutside.com/reunions-of-the-heart-on-idahos-middle-fork-salmon-river/"><span data-dcnode-id="1169" instrument_node="">Reunions of the Heart on Idaho’s Middle Fork Salmon River</span></a><span data-dcnode-id="1167" instrument_node="">” and “</span><a data-dcnode-id="1165" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thebigoutside.com/big-water-big-wilderness-rafting-idahos-incomparable-middle-fork-salmon-river/"><span data-dcnode-id="1166" instrument_node="">Big Water, Big Wilderness: Rafting Idaho’s Middle Fork Salmon River</span></a><span data-dcnode-id="1164" instrument_node="">.”</span></p><span data-dcnode-id="1162" instrument_node="">

</span><p data-dcnode-id="888"><span data-dcnode-id="891" instrument_node="">Have you backpacked (or paddled) Isle Royal in Lake Superior? This trip was one of my favorites. It may not have the awe factor of some of the big western parks but lovely and lots of wildlife (moose in particular, wolves unfortunately now nearly extinct from island if I recall correctly – wonderful ecology lessons here). While we did this trip prior to kids, I think that it would work well for kids with some experience – there are lots of established campsites to offer varying trail distances as well as trails that vary in difficulty.</span><br data-dcnode-id="890"><span data-dcnode-id="889" instrument_node="">
The Boundary Waters (or Quetico for even greater seclusion) offers a similar experience though most likely canoe-based. I find this type of trip appealing for the greater relaxation opportunity compared to backpacking, at least as I’ve done these trips. We were planning a family canoe camping trip until delayed by job change &amp; move.</span></p><span data-dcnode-id="887" instrument_node="">

</span><p data-dcnode-id="662"><span data-dcnode-id="666" instrument_node="">Hi Thomas, that’s a broad question and there are many good answers. I suggest you scroll through the many stories under my Family Adventures category above (</span><a data-dcnode-id="664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thebigoutside.com/category/family-adventures/" rel="nofollow ugc"><span data-dcnode-id="665" instrument_node="">https://thebigoutside.com/category/family-adventures/</span></a><span data-dcnode-id="663" instrument_node="">). Also, I always tell people that Yellowstone is a great park for taking young kids (or anyone who wants to see a lot with little effort). You will see a lot of wildlife, many of the geysers and other thermal features can be seen on walks of just 20 minutes, and it’s definitely one of the most amazing places in the world.</span></p><span data-dcnode-id="661" instrument_node="">
