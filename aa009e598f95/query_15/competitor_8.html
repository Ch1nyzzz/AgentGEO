</span><h2 data-dcnode-id="1142" id="day-5"><span data-dcnode-id="1143" instrument_node="">Day 5: Roman Ruins of Conimbriga and the City of Coimbra</span></h2><span data-dcnode-id="1141" instrument_node="">
</span><p data-dcnode-id="1139"><span data-dcnode-id="1140" instrument_node="">On this day, we visited some lesser-known places in Central Portugal, as well as Coimbra – the biggest town of the region. Take a look!</span></p><span data-dcnode-id="1138" instrument_node="">
</span><h3 data-dcnode-id="1136"><span data-dcnode-id="1137" instrument_node="">Roman Ruins of Conimbriga</span></h3><span data-dcnode-id="1135" instrument_node="">
</span><p data-dcnode-id="1132"><em data-dcnode-id="1133"><span data-dcnode-id="1134" instrument_node="">Driving time from Alcobaca to Conimbriga – 1hr.</span></em></p><span data-dcnode-id="1131" instrument_node="">
</span><p data-dcnode-id="1124"><span data-dcnode-id="1130" instrument_node="">Our first stop today was the&nbsp;</span><strong data-dcnode-id="1126"><span data-dcnode-id="1129" instrument_node="">ancient Roman city of </span><a data-dcnode-id="1127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.awin1.com/cread.php%3Fawinmid%3D5986%26awinaffid%3D313305%26clickref%3D%26p%3Dhttps%253A%252F%252Fwww.tripadvisor.com%252FAttraction_Review-g1190898-d911530-Reviews-Museu_Monografico_de_Conimbriga-Condeixa_a_Nova_Coimbra_District_Central_Portugal.html" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1128" instrument_node="">Conimbriga</span></a></strong><span data-dcnode-id="1125" instrument_node="">. It’s one of the best-preserved Roman towns in Portugal, with lots of very impressive mosaic floors. A small adjacent museum is also worth a short visit. Plan to spend&nbsp;about an hour.</span></p><span data-dcnode-id="1123" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1116"><figure class="aligncenter size-full" data-dcnode-id="1117"><noscript data-dcnode-id="1121"><span data-dcnode-id="1122" instrument_node="">&lt;img loading="lazy" width="878" height="585" src="https://fullsuitcase.com/wp-content/uploads/2017/04/Floor-mosaic-at-Conimbriga-Ancient-Roman-Site-in-Central-Portugal-.jpg" alt="Floor mosaic at Conimbriga Ancient Roman Site in Central Portugal" class="wp-image-5401" srcset="https://fullsuitcase.com/wp-content/uploads/2017/04/Floor-mosaic-at-Conimbriga-Ancient-Roman-Site-in-Central-Portugal-.jpg 878w, https://fullsuitcase.com/wp-content/uploads/2017/04/Floor-mosaic-at-Conimbriga-Ancient-Roman-Site-in-Central-Portugal--300x200.jpg 300w, https://fullsuitcase.com/wp-content/uploads/2017/04/Floor-mosaic-at-Conimbriga-Ancient-Roman-Site-in-Central-Portugal--768x512.jpg 768w, https://fullsuitcase.com/wp-content/uploads/2017/04/Floor-mosaic-at-Conimbriga-Ancient-Roman-Site-in-Central-Portugal--100x67.jpg 100w" sizes="(max-width: 760px) calc(100vw - 40px), 720px"&gt;</span></noscript><img alt="Floor mosaic at Conimbriga Ancient Roman Site in Central Portugal" class="wp-image-5401 lazyload" data-dcnode-id="1120" data-pin-media="https://fullsuitcase.com/wp-content/uploads/2017/04/Floor-mosaic-at-Conimbriga-Ancient-Roman-Site-in-Central-Portugal-.jpg" data-src="https://fullsuitcase.com/wp-content/uploads/2017/04/Floor-mosaic-at-Conimbriga-Ancient-Roman-Site-in-Central-Portugal-.jpg.webp" data-srcset="https://fullsuitcase.com/wp-content/uploads/2017/04/Floor-mosaic-at-Conimbriga-Ancient-Roman-Site-in-Central-Portugal-.jpg.webp 878w, https://fullsuitcase.com/wp-content/uploads/2017/04/Floor-mosaic-at-Conimbriga-Ancient-Roman-Site-in-Central-Portugal--300x200.jpg.webp 300w, https://fullsuitcase.com/wp-content/uploads/2017/04/Floor-mosaic-at-Conimbriga-Ancient-Roman-Site-in-Central-Portugal--768x512.jpg.webp 768w, https://fullsuitcase.com/wp-content/uploads/2017/04/Floor-mosaic-at-Conimbriga-Ancient-Roman-Site-in-Central-Portugal--100x67.jpg.webp 100w" data-trellis-processed="1" data-webp="true" height="585" id="mv-trellis-img-10" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fullsuitcase.com/wp-content/uploads/2017/04/Floor-mosaic-at-Conimbriga-Ancient-Roman-Site-in-Central-Portugal-.jpg.webp&amp;raw" srcset="https://fullsuitcase.com/wp-content/uploads/2017/04/Floor-mosaic-at-Conimbriga-Ancient-Roman-Site-in-Central-Portugal-.jpg.webp 878w, https://fullsuitcase.com/wp-content/uploads/2017/04/Floor-mosaic-at-Conimbriga-Ancient-Roman-Site-in-Central-Portugal--300x200.jpg.webp 300w, https://fullsuitcase.com/wp-content/uploads/2017/04/Floor-mosaic-at-Conimbriga-Ancient-Roman-Site-in-Central-Portugal--768x512.jpg.webp 768w, https://fullsuitcase.com/wp-content/uploads/2017/04/Floor-mosaic-at-Conimbriga-Ancient-Roman-Site-in-Central-Portugal--100x67.jpg.webp 100w" width="878"><figcaption data-dcnode-id="1118"><span data-dcnode-id="1119" instrument_node="">Floor mosaic at Conimbriga </span></figcaption></figure></div><span data-dcnode-id="1115" instrument_node="">



&nbsp;
</span><div class="content_hint" data-dcnode-id="1114"></div><span data-dcnode-id="1113" instrument_node="">
</span><h3 data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node="">Coimbra</span></h3><span data-dcnode-id="1110" instrument_node="">
</span><p data-dcnode-id="1107"><em data-dcnode-id="1108"><span data-dcnode-id="1109" instrument_node="">Driving time from Conimbriga to Coimbra – 20min.</span></em></p><span data-dcnode-id="1106" instrument_node="">
</span><p data-dcnode-id="1093"><strong data-dcnode-id="1104"><span data-dcnode-id="1105" instrument_node="">Coimbra</span></strong><span data-dcnode-id="1103" instrument_node="">&nbsp;is the biggest town of Central Portugal and the ancient medieval capital of the country.&nbsp;The compact city center of Coimbra is best explored on foot, just be prepared to do some serious climbing. Don’t miss the </span><strong data-dcnode-id="1101"><span data-dcnode-id="1102" instrument_node="">University of Coimbra</span></strong><span data-dcnode-id="1100" instrument_node=""> and in particular the </span><strong data-dcnode-id="1098"><span data-dcnode-id="1099" instrument_node="">library</span></strong><span data-dcnode-id="1097" instrument_node=""> and the</span><strong data-dcnode-id="1095"><span data-dcnode-id="1096" instrument_node=""> Saint Michael’s Chapel</span></strong><span data-dcnode-id="1094" instrument_node="">.</span></p><span data-dcnode-id="1092" instrument_node="">
</span><p data-dcnode-id="1081"><em data-dcnode-id="1088"><strong data-dcnode-id="1090"><span data-dcnode-id="1091" instrument_node="">Tip:</span></strong><span data-dcnode-id="1089" instrument_node=""> </span></em><span data-dcnode-id="1087" instrument_node="">Just on the other side of the river you can find </span><a data-dcnode-id="1085" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.awin1.com/cread.php%3Fawinmid%3D5986%26awinaffid%3D313305%26clickref%3D%26p%3Dhttps%253A%252F%252Fwww.tripadvisor.com%252FAttraction_Review-g189143-d456688-Reviews-Portugal_dos_Pequenitos-Coimbra_Coimbra_District_Central_Portugal.html" rel="noreferrer noopener sponsored" target="_blank"><span data-dcnode-id="1086" instrument_node="">Portugal dos Pequenitos</span></a><em data-dcnode-id="1083"><span data-dcnode-id="1084" instrument_node="">&nbsp;</span></em><span data-dcnode-id="1082" instrument_node="">– a park with miniature buildings of Portugal and the former colonies. Check it out if visiting Coimbra with kids.</span></p><span data-dcnode-id="1080" instrument_node="">
</span><p data-dcnode-id="1077"><strong data-dcnode-id="1078"><span data-dcnode-id="1079" instrument_node="">Practical information for visiting Coimbra:</span></strong></p><span data-dcnode-id="1076" instrument_node="">
</span><ul data-dcnode-id="1067"><li data-dcnode-id="1068"><span data-dcnode-id="1075" instrument_node="">Book a </span><a data-dcnode-id="1073" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.booking.com/city/pt/coimbra.html%3Faid%3D925665%26no_rooms%3D1%26group_adults%3D1" rel="noreferrer noopener sponsored" target="_blank"><span data-dcnode-id="1074" instrument_node="">centrally located hotel</span></a><span data-dcnode-id="1072" instrument_node=""> and explore the city on foot. We stayed at </span><a data-dcnode-id="1070" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.booking.com/hotel/pt/oslo.html%3Faid%3D925665%26no_rooms%3D1%26group_adults%3D1" rel="noreferrer noopener sponsored" target="_blank"><span data-dcnode-id="1071" instrument_node="">hotel Oslo</span></a><span data-dcnode-id="1069" instrument_node=""> in the city center. The terrace/bar had the best views of the old city you could wish for.</span></li></ul><span data-dcnode-id="1066" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1059"><figure class="aligncenter size-full" data-dcnode-id="1060"><noscript data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node="">&lt;img loading="lazy" width="878" height="586" src="https://fullsuitcase.com/wp-content/uploads/2017/04/Coimbra-old-town-at-sunset.jpg" alt="Coimbra old town at sunset" class="wp-image-5399" srcset="https://fullsuitcase.com/wp-content/uploads/2017/04/Coimbra-old-town-at-sunset.jpg 878w, https://fullsuitcase.com/wp-content/uploads/2017/04/Coimbra-old-town-at-sunset-300x200.jpg 300w, https://fullsuitcase.com/wp-content/uploads/2017/04/Coimbra-old-town-at-sunset-768x513.jpg 768w, https://fullsuitcase.com/wp-content/uploads/2017/04/Coimbra-old-town-at-sunset-100x67.jpg 100w" sizes="(max-width: 760px) calc(100vw - 40px), 720px"&gt;</span></noscript><img alt="Coimbra old town at sunset" class="wp-image-5399 lazyload" data-dcnode-id="1063" data-pin-media="https://fullsuitcase.com/wp-content/uploads/2017/04/Coimbra-old-town-at-sunset.jpg" data-src="https://fullsuitcase.com/wp-content/uploads/2017/04/Coimbra-old-town-at-sunset.jpg.webp" data-srcset="https://fullsuitcase.com/wp-content/uploads/2017/04/Coimbra-old-town-at-sunset.jpg.webp 878w, https://fullsuitcase.com/wp-content/uploads/2017/04/Coimbra-old-town-at-sunset-300x200.jpg.webp 300w, https://fullsuitcase.com/wp-content/uploads/2017/04/Coimbra-old-town-at-sunset-768x513.jpg.webp 768w, https://fullsuitcase.com/wp-content/uploads/2017/04/Coimbra-old-town-at-sunset-100x67.jpg.webp 100w" data-trellis-processed="1" data-webp="true" height="586" id="mv-trellis-img-11" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fullsuitcase.com/wp-content/uploads/2017/04/Coimbra-old-town-at-sunset.jpg.webp&amp;raw" srcset="https://fullsuitcase.com/wp-content/uploads/2017/04/Coimbra-old-town-at-sunset.jpg.webp 878w, https://fullsuitcase.com/wp-content/uploads/2017/04/Coimbra-old-town-at-sunset-300x200.jpg.webp 300w, https://fullsuitcase.com/wp-content/uploads/2017/04/Coimbra-old-town-at-sunset-768x513.jpg.webp 768w, https://fullsuitcase.com/wp-content/uploads/2017/04/Coimbra-old-town-at-sunset-100x67.jpg.webp 100w" width="878"><figcaption data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">Coimbra old town at sunset</span></figcaption></figure></div><span data-dcnode-id="1058" instrument_node="">



&nbsp;
</span><div class="content_hint" data-dcnode-id="1057"></div><span data-dcnode-id="1056" instrument_node="">
</span><h2 data-dcnode-id="1054" id="day-6"><span data-dcnode-id="1055" instrument_node="">Day 6: Mata Nacional do Buçaco – Costa Nova – Aveiro</span></h2><span data-dcnode-id="1053" instrument_node="">
</span><p data-dcnode-id="1051"><span data-dcnode-id="1052" instrument_node="">This was another amazing day discovering a hidden gem of Central Portugal – Bussaco Forest. We also visited Aveiro and – one of the most picturesque towns in Portugal – Costa Nova. Take a look below for more details!</span></p><span data-dcnode-id="1050" instrument_node="">
</span><h3 data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node="">Mata Nacional do Buçaco</span></h3><span data-dcnode-id="1047" instrument_node="">
</span><p data-dcnode-id="1044"><em data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">Driving time from Coimbra to the forest – 30min.</span></em></p><span data-dcnode-id="1043" instrument_node="">
</span><p data-dcnode-id="1035"><span data-dcnode-id="1042" instrument_node="">Just 30km North of Coimbra lays the&nbsp;beautiful </span><strong data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node="">Bussaco forest</span></strong><span data-dcnode-id="1039" instrument_node=""> (</span><a data-dcnode-id="1037" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.awin1.com/cread.php%3Fawinmid%3D5986%26awinaffid%3D313305%26clickref%3D%26p%3Dhttps%253A%252F%252Fwww.tripadvisor.com%252FAttraction_Review-g580263-d2437022-Reviews-Mata_Nacional_do_Bucaco-Luso_Aveiro_District_Northern_Portugal.html" rel="noreferrer noopener sponsored" target="_blank"><span data-dcnode-id="1038" instrument_node="">Mata Nacional do Buçaco</span></a><span data-dcnode-id="1036" instrument_node="">). It’s a true hidden gem! Not to be missed is the beautiful Palace Hotel, the gardens, but also the staircase of Fonte Fria and the Via Sacra.</span></p><span data-dcnode-id="1034" instrument_node="">
</span><p data-dcnode-id="1031"><strong data-dcnode-id="1032"><span data-dcnode-id="1033" instrument_node="">Practical information for Buçaco forest:</span></strong></p><span data-dcnode-id="1030" instrument_node="">
</span><ul data-dcnode-id="1016"><li data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">Entrance fee: 5 EUR/ car</span></li><li data-dcnode-id="1026"><span data-dcnode-id="1027" instrument_node="">Ask for a map at the entrance. The forest is huge and without a map, you’ll quickly get disoriented.</span></li><li data-dcnode-id="1024"><span data-dcnode-id="1025" instrument_node="">Pack a picnic and plan to spend at least 3-4 hours. Alternatively, you can have lunch at a small cafe close to the hotel.</span></li><li data-dcnode-id="1022"><span data-dcnode-id="1023" instrument_node="">Leave your car at the Palace Hotel and explore the forest on foot.</span></li><li data-dcnode-id="1017"><span data-dcnode-id="1021" instrument_node="">If I were to go back, I’d spend at least one night at the beautiful </span><a data-dcnode-id="1019" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.booking.com/hotel/pt/palace-do-bussaco.html%3Faid%3D925665%26no_rooms%3D1%26group_adults%3D1" rel="noreferrer noopener sponsored" target="_blank"><span data-dcnode-id="1020" instrument_node="">Buçaco Palace Hotel</span></a><span data-dcnode-id="1018" instrument_node="">.</span></li></ul><span data-dcnode-id="1015" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1008"><figure class="aligncenter size-full" data-dcnode-id="1009"><noscript data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">&lt;img loading="lazy" width="878" height="585" src="https://fullsuitcase.com/wp-content/uploads/2017/04/Bussaco-Palace-Hotel-at-Mata-do-Bucaco-Portugal.jpg" alt="Bussaco Palace Hotel at Mata do Bucaco Portugal" class="wp-image-5403" srcset="https://fullsuitcase.com/wp-content/uploads/2017/04/Bussaco-Palace-Hotel-at-Mata-do-Bucaco-Portugal.jpg 878w, https://fullsuitcase.com/wp-content/uploads/2017/04/Bussaco-Palace-Hotel-at-Mata-do-Bucaco-Portugal-300x200.jpg 300w, https://fullsuitcase.com/wp-content/uploads/2017/04/Bussaco-Palace-Hotel-at-Mata-do-Bucaco-Portugal-768x512.jpg 768w, https://fullsuitcase.com/wp-content/uploads/2017/04/Bussaco-Palace-Hotel-at-Mata-do-Bucaco-Portugal-100x67.jpg 100w" sizes="(max-width: 760px) calc(100vw - 40px), 720px"&gt;</span></noscript><img alt="Bussaco Palace Hotel at Mata do Bucaco Portugal" class="wp-image-5403 lazyload" data-dcnode-id="1012" data-pin-media="https://fullsuitcase.com/wp-content/uploads/2017/04/Bussaco-Palace-Hotel-at-Mata-do-Bucaco-Portugal.jpg" data-src="https://fullsuitcase.com/wp-content/uploads/2017/04/Bussaco-Palace-Hotel-at-Mata-do-Bucaco-Portugal.jpg.webp" data-srcset="https://fullsuitcase.com/wp-content/uploads/2017/04/Bussaco-Palace-Hotel-at-Mata-do-Bucaco-Portugal.jpg.webp 878w, https://fullsuitcase.com/wp-content/uploads/2017/04/Bussaco-Palace-Hotel-at-Mata-do-Bucaco-Portugal-300x200.jpg.webp 300w, https://fullsuitcase.com/wp-content/uploads/2017/04/Bussaco-Palace-Hotel-at-Mata-do-Bucaco-Portugal-768x512.jpg.webp 768w, https://fullsuitcase.com/wp-content/uploads/2017/04/Bussaco-Palace-Hotel-at-Mata-do-Bucaco-Portugal-100x67.jpg.webp 100w" data-trellis-processed="1" data-webp="true" height="585" id="mv-trellis-img-12" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fullsuitcase.com/wp-content/uploads/2017/04/Bussaco-Palace-Hotel-at-Mata-do-Bucaco-Portugal.jpg.webp&amp;raw" srcset="https://fullsuitcase.com/wp-content/uploads/2017/04/Bussaco-Palace-Hotel-at-Mata-do-Bucaco-Portugal.jpg.webp 878w, https://fullsuitcase.com/wp-content/uploads/2017/04/Bussaco-Palace-Hotel-at-Mata-do-Bucaco-Portugal-300x200.jpg.webp 300w, https://fullsuitcase.com/wp-content/uploads/2017/04/Bussaco-Palace-Hotel-at-Mata-do-Bucaco-Portugal-768x512.jpg.webp 768w, https://fullsuitcase.com/wp-content/uploads/2017/04/Bussaco-Palace-Hotel-at-Mata-do-Bucaco-Portugal-100x67.jpg.webp 100w" width="878"><figcaption data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">Bussaco Palace Hotel</span></figcaption></figure></div><span data-dcnode-id="1007" instrument_node="">



&nbsp;
</span><div class="content_hint" data-dcnode-id="1006"></div><span data-dcnode-id="1005" instrument_node="">
</span><h3 data-dcnode-id="1003"><span data-dcnode-id="1004" instrument_node="">Aveiro and Costa Nova</span></h3><span data-dcnode-id="1002" instrument_node="">
</span><p data-dcnode-id="999"><em data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node="">Driving time from Bussaco forest to Aveiro&nbsp;– 45min.</span></em></p><span data-dcnode-id="998" instrument_node="">
</span><p data-dcnode-id="988"><strong data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">Aveiro</span></strong><span data-dcnode-id="995" instrument_node=""> (50km drive from Bucaco) is a nice little town, also called </span><em data-dcnode-id="993"><span data-dcnode-id="994" instrument_node="">the Venice of Portugal</span></em><span data-dcnode-id="992" instrument_node="">. One of the musts here is a</span><strong data-dcnode-id="990"><span data-dcnode-id="991" instrument_node=""> boat ride on the canals</span></strong><span data-dcnode-id="989" instrument_node="">. Aveiro is a nice place to spend a couple of hours, but then you have seen it all.</span></p><span data-dcnode-id="987" instrument_node="">
</span><p data-dcnode-id="979"><em data-dcnode-id="984"><strong data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">TIP:</span></strong></em><span data-dcnode-id="983" instrument_node=""> visit the nearby town </span><strong data-dcnode-id="981"><span data-dcnode-id="982" instrument_node="">Praia da Costa Nova</span></strong><span data-dcnode-id="980" instrument_node=""> with its colorful striped houses.</span></p><span data-dcnode-id="978" instrument_node="">
</span><p data-dcnode-id="970"><span data-dcnode-id="977" instrument_node="">Depending on how much time you have and on your other plans, you can either spend a night in </span><a data-dcnode-id="975" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.booking.com/city/pt/aveiro.html%3Faid%3D925665%26no_rooms%3D1%26group_adults%3D1" rel="noreferrer noopener sponsored" target="_blank"><span data-dcnode-id="976" instrument_node="">Aveiro</span></a><span data-dcnode-id="974" instrument_node="">, or drive&nbsp;to </span><a data-dcnode-id="972" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.booking.com/city/pt/porto.html%3Faid%3D925665%26no_rooms%3D1%26group_adults%3D1" rel="noreferrer noopener sponsored" target="_blank"><span data-dcnode-id="973" instrument_node="">Porto</span></a><span data-dcnode-id="971" instrument_node=""> (less than 1hr drive).</span></p><span data-dcnode-id="969" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="962"><figure class="aligncenter size-full" data-dcnode-id="963"><noscript data-dcnode-id="967"><span data-dcnode-id="968" instrument_node="">&lt;img loading="lazy" width="878" height="585" src="https://fullsuitcase.com/wp-content/uploads/2017/04/Aveiro.jpg" alt="Aveiro in Portugal" class="wp-image-5398" srcset="https://fullsuitcase.com/wp-content/uploads/2017/04/Aveiro.jpg 878w, https://fullsuitcase.com/wp-content/uploads/2017/04/Aveiro-300x200.jpg 300w, https://fullsuitcase.com/wp-content/uploads/2017/04/Aveiro-768x512.jpg 768w, https://fullsuitcase.com/wp-content/uploads/2017/04/Aveiro-100x67.jpg 100w" sizes="(max-width: 760px) calc(100vw - 40px), 720px"&gt;</span></noscript><img alt="Aveiro in Portugal" class="wp-image-5398 lazyload" data-dcnode-id="966" data-pin-media="https://fullsuitcase.com/wp-content/uploads/2017/04/Aveiro.jpg" data-src="https://fullsuitcase.com/wp-content/uploads/2017/04/Aveiro.jpg.webp" data-srcset="https://fullsuitcase.com/wp-content/uploads/2017/04/Aveiro.jpg.webp 878w, https://fullsuitcase.com/wp-content/uploads/2017/04/Aveiro-300x200.jpg.webp 300w, https://fullsuitcase.com/wp-content/uploads/2017/04/Aveiro-768x512.jpg.webp 768w, https://fullsuitcase.com/wp-content/uploads/2017/04/Aveiro-100x67.jpg.webp 100w" data-trellis-processed="1" data-webp="true" height="585" id="mv-trellis-img-13" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fullsuitcase.com/wp-content/uploads/2017/04/Aveiro.jpg.webp&amp;raw" srcset="https://fullsuitcase.com/wp-content/uploads/2017/04/Aveiro.jpg.webp 878w, https://fullsuitcase.com/wp-content/uploads/2017/04/Aveiro-300x200.jpg.webp 300w, https://fullsuitcase.com/wp-content/uploads/2017/04/Aveiro-768x512.jpg.webp 768w, https://fullsuitcase.com/wp-content/uploads/2017/04/Aveiro-100x67.jpg.webp 100w" width="878"><figcaption data-dcnode-id="964"><span data-dcnode-id="965" instrument_node="">Aveiro</span></figcaption></figure></div><span data-dcnode-id="961" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="954"><figure class="aligncenter size-full" data-dcnode-id="955"><noscript data-dcnode-id="959"><span data-dcnode-id="960" instrument_node="">&lt;img loading="lazy" width="878" height="585" src="https://fullsuitcase.com/wp-content/uploads/2017/04/Praia-da-Costa-Nova-Portugal.jpg" alt="Praia da Costa Nova is one of the most charming little towns you should visit in Portugal" class="wp-image-5402" srcset="https://fullsuitcase.com/wp-content/uploads/2017/04/Praia-da-Costa-Nova-Portugal.jpg 878w, https://fullsuitcase.com/wp-content/uploads/2017/04/Praia-da-Costa-Nova-Portugal-300x200.jpg 300w, https://fullsuitcase.com/wp-content/uploads/2017/04/Praia-da-Costa-Nova-Portugal-768x512.jpg 768w, https://fullsuitcase.com/wp-content/uploads/2017/04/Praia-da-Costa-Nova-Portugal-100x67.jpg 100w" sizes="(max-width: 760px) calc(100vw - 40px), 720px"&gt;</span></noscript><img alt="Praia da Costa Nova is one of the most charming little towns you should visit in Portugal" class="wp-image-5402 lazyload" data-dcnode-id="958" data-pin-media="https://fullsuitcase.com/wp-content/uploads/2017/04/Praia-da-Costa-Nova-Portugal.jpg" data-src="https://fullsuitcase.com/wp-content/uploads/2017/04/Praia-da-Costa-Nova-Portugal.jpg.webp" data-srcset="https://fullsuitcase.com/wp-content/uploads/2017/04/Praia-da-Costa-Nova-Portugal.jpg.webp 878w, https://fullsuitcase.com/wp-content/uploads/2017/04/Praia-da-Costa-Nova-Portugal-300x200.jpg.webp 300w, https://fullsuitcase.com/wp-content/uploads/2017/04/Praia-da-Costa-Nova-Portugal-768x512.jpg.webp 768w, https://fullsuitcase.com/wp-content/uploads/2017/04/Praia-da-Costa-Nova-Portugal-100x67.jpg.webp 100w" data-trellis-processed="1" data-webp="true" height="585" id="mv-trellis-img-14" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fullsuitcase.com/wp-content/uploads/2017/04/Praia-da-Costa-Nova-Portugal.jpg.webp&amp;raw" srcset="https://fullsuitcase.com/wp-content/uploads/2017/04/Praia-da-Costa-Nova-Portugal.jpg.webp 878w, https://fullsuitcase.com/wp-content/uploads/2017/04/Praia-da-Costa-Nova-Portugal-300x200.jpg.webp 300w, https://fullsuitcase.com/wp-content/uploads/2017/04/Praia-da-Costa-Nova-Portugal-768x512.jpg.webp 768w, https://fullsuitcase.com/wp-content/uploads/2017/04/Praia-da-Costa-Nova-Portugal-100x67.jpg.webp 100w" width="878"><figcaption data-dcnode-id="956"><span data-dcnode-id="957" instrument_node="">Praia da Costa Nova </span></figcaption></figure></div><span data-dcnode-id="953" instrument_node="">



&nbsp;
</span><div class="content_hint" data-dcnode-id="952"></div><span data-dcnode-id="951" instrument_node="">
</span><h2 data-dcnode-id="949" id="day-7"><span data-dcnode-id="950" instrument_node="">Day 7: Douro Valley and the vineyards of Porto and to Porto</span></h2><span data-dcnode-id="948" instrument_node="">
</span><p data-dcnode-id="945"><em data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">Driving time: depends on the route you choose. Count at least half a day.</span></em></p><span data-dcnode-id="944" instrument_node="">
</span><p data-dcnode-id="939"><span data-dcnode-id="943" instrument_node="">Because we were traveling with kids, we chose to visit the </span><strong data-dcnode-id="941"><span data-dcnode-id="942" instrument_node="">Douro Valley</span></strong><span data-dcnode-id="940" instrument_node=""> by car. </span></p><span data-dcnode-id="938" instrument_node="">
</span><p data-dcnode-id="930"><strong data-dcnode-id="935"><em data-dcnode-id="936"><span data-dcnode-id="937" instrument_node="">TIP: </span></em></strong><span data-dcnode-id="934" instrument_node="">If you stay in Porto, consider one of the many available </span><a aria-label="organized day tours to Douro valley (opens in a new tab)" data-dcnode-id="932" data-gyg-scraped="1650964269756" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/s/%3Fq%3DDouro%2520Valley%26partner_id%3D6N2B5KS%26cmp%3DPortugalItinerary%26deeplink_id%3D19c9f9f1-a105-5b6f-a211-addca7612a63" rel="noreferrer noopener sponsored" target="_blank"><span data-dcnode-id="933" instrument_node="">organized day tours to Douro Valley</span></a><span data-dcnode-id="931" instrument_node="">. That way you can actually taste Porto wine without having to drive. There are also boat trips you can take from Porto, from Peso de Regua or from Pinhao. Furthermore, there is also a possibility to explore the wine region by train. Take a look below for the best Douro Valley tours and experiences.</span></p><span data-dcnode-id="929" instrument_node="">
</span><div data-dcnode-id="927" data-gyg-cmp="PortugalItineraryW" data-gyg-href="https://widget.getyourguide.com/default/activites.frame" data-gyg-locale-code="en-US" data-gyg-number-of-items="3" data-gyg-partner-id="6N2B5KS" data-gyg-tour-ids="62439,86657,73660" data-gyg-widget="activities" data-gyg-widget-created="1650964269878" style="height: 608px;"><iframe data-dcnode-id="928" data-gyg-scraped="1650964270745" frameborder="0" name="GYG-1d2d100c-66d6-4706-9144-e7e9c141732c" scrolling="no" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widget.getyourguide.com/default/activities.frame%3Flocale_code%3Den-US%26widget%3Dactivities%26number_of_items%3D3%26cmp%3DPortugalItineraryW%26partner_id%3D6N2B5KS%26tour_ids%3D62439%252C86657%252C73660%26widget_created%3D1650964269878%26website%3Dhttps%253A%252F%252Ffullsuitcase.com%252F10-days-portugal-trip-itinerary%252F%26visitor_id%3D502F20A0E92D460B863C76800F7AF59A&amp;raw" style="border: none; position: relative; visibility: visible; display: block; margin: 0px; padding: 0px; width: 100%; height: 100%;"></iframe></div><span data-dcnode-id="926" instrument_node="">
&nbsp;



</span><p data-dcnode-id="921"><span data-dcnode-id="925" instrument_node="">If you drive to the Douro Valley by car, don’t miss the </span><strong data-dcnode-id="923"><span data-dcnode-id="924" instrument_node="">scenic road from Sabrosa to Pinhao</span></strong><span data-dcnode-id="922" instrument_node="">. Make sure you do this road from Sabrosa and not in the other direction because driving down you’ll have incredible views all the time. </span></p><span data-dcnode-id="920" instrument_node="">
</span><p data-dcnode-id="906"><span data-dcnode-id="919" instrument_node="">Other highlights include </span><strong data-dcnode-id="917"><span data-dcnode-id="918" instrument_node="">Solar de Mateus</span></strong><span data-dcnode-id="916" instrument_node=""> just outside Vile Real, </span><strong data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">Casal de Loivos viewpoint</span></strong><span data-dcnode-id="913" instrument_node=""> near Pinhao, and also the towns of </span><strong data-dcnode-id="911"><span data-dcnode-id="912" instrument_node="">Amarante</span></strong><span data-dcnode-id="910" instrument_node=""> and </span><strong data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">Guimaraes</span></strong><span data-dcnode-id="907" instrument_node="">.</span></p><span data-dcnode-id="905" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="898"><figure class="aligncenter size-full" data-dcnode-id="899"><noscript data-dcnode-id="903"><span data-dcnode-id="904" instrument_node="">&lt;img loading="lazy" width="878" height="585" src="https://fullsuitcase.com/wp-content/uploads/2017/04/Douro-Valley-Portugal.jpg" alt="Douro Valley Portugal" class="wp-image-5400" srcset="https://fullsuitcase.com/wp-content/uploads/2017/04/Douro-Valley-Portugal.jpg 878w, https://fullsuitcase.com/wp-content/uploads/2017/04/Douro-Valley-Portugal-300x200.jpg 300w, https://fullsuitcase.com/wp-content/uploads/2017/04/Douro-Valley-Portugal-768x512.jpg 768w, https://fullsuitcase.com/wp-content/uploads/2017/04/Douro-Valley-Portugal-100x67.jpg 100w" sizes="(max-width: 760px) calc(100vw - 40px), 720px"&gt;</span></noscript><img alt="Douro Valley Portugal" class="wp-image-5400 lazyload" data-dcnode-id="902" data-pin-media="https://fullsuitcase.com/wp-content/uploads/2017/04/Douro-Valley-Portugal.jpg" data-src="https://fullsuitcase.com/wp-content/uploads/2017/04/Douro-Valley-Portugal.jpg.webp" data-srcset="https://fullsuitcase.com/wp-content/uploads/2017/04/Douro-Valley-Portugal.jpg.webp 878w, https://fullsuitcase.com/wp-content/uploads/2017/04/Douro-Valley-Portugal-300x200.jpg.webp 300w, https://fullsuitcase.com/wp-content/uploads/2017/04/Douro-Valley-Portugal-768x512.jpg.webp 768w, https://fullsuitcase.com/wp-content/uploads/2017/04/Douro-Valley-Portugal-100x67.jpg.webp 100w" data-trellis-processed="1" data-webp="true" height="585" id="mv-trellis-img-15" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fullsuitcase.com/wp-content/uploads/2017/04/Douro-Valley-Portugal.jpg.webp&amp;raw" srcset="https://fullsuitcase.com/wp-content/uploads/2017/04/Douro-Valley-Portugal.jpg.webp 878w, https://fullsuitcase.com/wp-content/uploads/2017/04/Douro-Valley-Portugal-300x200.jpg.webp 300w, https://fullsuitcase.com/wp-content/uploads/2017/04/Douro-Valley-Portugal-768x512.jpg.webp 768w, https://fullsuitcase.com/wp-content/uploads/2017/04/Douro-Valley-Portugal-100x67.jpg.webp 100w" width="878"><figcaption data-dcnode-id="900"><span data-dcnode-id="901" instrument_node="">Douro Valley</span></figcaption></figure></div><span data-dcnode-id="897" instrument_node="">



&nbsp;
</span><div class="content_hint" data-dcnode-id="896"></div><span data-dcnode-id="895" instrument_node="">
</span><h2 data-dcnode-id="893" id="day-8"><span data-dcnode-id="894" instrument_node="">Day 8: Porto</span></h2><span data-dcnode-id="892" instrument_node="">
</span><p data-dcnode-id="888"><strong data-dcnode-id="890"><span data-dcnode-id="891" instrument_node="">Porto</span></strong><span data-dcnode-id="889" instrument_node=""> is a beautiful city with a really nice atmosphere. You can easily spend more than a day in Porto. However, Porto isn’t as big as Lisbon and we found that one day in Porto was enough for the main highlights.</span></p><span data-dcnode-id="887" instrument_node="">
</span><p data-dcnode-id="883"><strong data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">Practical tips for visiting Porto:</span></strong><span data-dcnode-id="884" instrument_node="">&nbsp;</span></p><span data-dcnode-id="882" instrument_node="">
</span><ul data-dcnode-id="873"><li data-dcnode-id="874"><span data-dcnode-id="881" instrument_node="">Stay in the city center of Porto so that you can explore it on foot. We stayed at the beautiful </span><a aria-label="Flores Boutique Hotel &amp; Spa (opens in a new tab)" data-dcnode-id="879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.booking.com/hotel/pt/flores-village-amp-spa.en.html%3Faid%3D925665" rel="noreferrer noopener sponsored" target="_blank"><span data-dcnode-id="880" instrument_node="">Flores Boutique Hotel &amp; Spa</span></a><span data-dcnode-id="878" instrument_node=""> right in the old city center, and I would highly recommend it (although, getting there by car and parking a car in their secure parking place was quite an adventure).&nbsp;Here you can find </span><a data-dcnode-id="876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.booking.com/city/pt/porto.html%3Faid%3D925665%26no_rooms%3D1%26group_adults%3D1" rel="noreferrer noopener sponsored" target="_blank"><span data-dcnode-id="877" instrument_node="">the best deals for Porto accommodation</span></a><span data-dcnode-id="875" instrument_node="">.</span></li></ul><span data-dcnode-id="872" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="865"><figure class="aligncenter size-full" data-dcnode-id="866"><noscript data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">&lt;img loading="lazy" width="878" height="586" src="https://fullsuitcase.com/wp-content/uploads/2017/04/View-over-Porto-old-town-centre.jpg" alt="View over Porto old town centre" class="wp-image-5407" srcset="https://fullsuitcase.com/wp-content/uploads/2017/04/View-over-Porto-old-town-centre.jpg 878w, https://fullsuitcase.com/wp-content/uploads/2017/04/View-over-Porto-old-town-centre-300x200.jpg 300w, https://fullsuitcase.com/wp-content/uploads/2017/04/View-over-Porto-old-town-centre-768x513.jpg 768w, https://fullsuitcase.com/wp-content/uploads/2017/04/View-over-Porto-old-town-centre-100x67.jpg 100w" sizes="(max-width: 760px) calc(100vw - 40px), 720px"&gt;</span></noscript><img alt="View over Porto old town centre" class="wp-image-5407 lazyload" data-dcnode-id="869" data-pin-media="https://fullsuitcase.com/wp-content/uploads/2017/04/View-over-Porto-old-town-centre.jpg" data-src="https://fullsuitcase.com/wp-content/uploads/2017/04/View-over-Porto-old-town-centre.jpg.webp" data-srcset="https://fullsuitcase.com/wp-content/uploads/2017/04/View-over-Porto-old-town-centre.jpg.webp 878w, https://fullsuitcase.com/wp-content/uploads/2017/04/View-over-Porto-old-town-centre-300x200.jpg.webp 300w, https://fullsuitcase.com/wp-content/uploads/2017/04/View-over-Porto-old-town-centre-768x513.jpg.webp 768w, https://fullsuitcase.com/wp-content/uploads/2017/04/View-over-Porto-old-town-centre-100x67.jpg.webp 100w" data-trellis-processed="1" data-webp="true" height="586" id="mv-trellis-img-16" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fullsuitcase.com/wp-content/uploads/2017/04/View-over-Porto-old-town-centre.jpg.webp&amp;raw" srcset="https://fullsuitcase.com/wp-content/uploads/2017/04/View-over-Porto-old-town-centre.jpg.webp 878w, https://fullsuitcase.com/wp-content/uploads/2017/04/View-over-Porto-old-town-centre-300x200.jpg.webp 300w, https://fullsuitcase.com/wp-content/uploads/2017/04/View-over-Porto-old-town-centre-768x513.jpg.webp 768w, https://fullsuitcase.com/wp-content/uploads/2017/04/View-over-Porto-old-town-centre-100x67.jpg.webp 100w" width="878"><figcaption data-dcnode-id="867"><span data-dcnode-id="868" instrument_node="">Porto</span></figcaption></figure></div><span data-dcnode-id="864" instrument_node="">



&nbsp;
</span><div class="content_hint" data-dcnode-id="863"></div><span data-dcnode-id="862" instrument_node="">
</span><h2 data-dcnode-id="860" id="day-9"><span data-dcnode-id="861" instrument_node="">Day 9: Porto to Sintra. Visit Pena Palace and Castle of the Moors</span></h2><span data-dcnode-id="859" instrument_node="">
</span><p data-dcnode-id="856"><em data-dcnode-id="857"><span data-dcnode-id="858" instrument_node="">Driving time from Porto to Lisbon (Sintra) – 3 hours.</span></em></p><span data-dcnode-id="855" instrument_node="">
</span><h3 data-dcnode-id="853"><span data-dcnode-id="854" instrument_node="">Sintra</span></h3><span data-dcnode-id="852" instrument_node="">
</span><p data-dcnode-id="848"><strong data-dcnode-id="850"><span data-dcnode-id="851" instrument_node="">Sintra</span></strong><span data-dcnode-id="849" instrument_node=""> is a well known UNESCO World Heritage Site area, just outside of Lisbon. It has a lot to offer, but most visitors only come for one day. We had a day and a half, but it still felt rushed.</span></p><span data-dcnode-id="847" instrument_node="">
</span><p data-dcnode-id="832"><span data-dcnode-id="846" instrument_node="">On the first day we visited the </span><strong data-dcnode-id="844"><span data-dcnode-id="845" instrument_node="">Pena Palace </span></strong><span data-dcnode-id="843" instrument_node="">(see the featured image all the way on top)&nbsp;and </span><strong data-dcnode-id="841"><span data-dcnode-id="842" instrument_node="">the Gardens of Pena</span></strong><span data-dcnode-id="840" instrument_node="">. We then walked to the nearby </span><strong data-dcnode-id="838"><span data-dcnode-id="839" instrument_node="">Moorish Castle</span></strong><em data-dcnode-id="836"><span data-dcnode-id="837" instrument_node="">.&nbsp;</span></em><strong data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">Palacio Nacional</span></strong><span data-dcnode-id="833" instrument_node=""> right in the town center of Sintra is also worth a visit.</span></p><span data-dcnode-id="831" instrument_node="">
</span><p class="has-text-align-center has-background" data-dcnode-id="826" style="background-color:#f9f9f9"><strong data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">LEARN MORE: </span></strong><a data-dcnode-id="827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fullsuitcase.com/sintra-itinerary/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="828" instrument_node="">Sintra itinerary for one, two, or&nbsp;three days</span></a></p><span data-dcnode-id="825" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="818"><figure class="aligncenter size-full" data-dcnode-id="819"><noscript data-dcnode-id="823"><span data-dcnode-id="824" instrument_node="">&lt;img loading="lazy" width="878" height="585" src="https://fullsuitcase.com/wp-content/uploads/2017/04/Castle-of-the-Moors-in-Sintra-Portugal.jpg" alt="Exploring the Castle of the Moors in Sintra Portugal with kids" class="wp-image-5405" srcset="https://fullsuitcase.com/wp-content/uploads/2017/04/Castle-of-the-Moors-in-Sintra-Portugal.jpg 878w, https://fullsuitcase.com/wp-content/uploads/2017/04/Castle-of-the-Moors-in-Sintra-Portugal-300x200.jpg 300w, https://fullsuitcase.com/wp-content/uploads/2017/04/Castle-of-the-Moors-in-Sintra-Portugal-768x512.jpg 768w, https://fullsuitcase.com/wp-content/uploads/2017/04/Castle-of-the-Moors-in-Sintra-Portugal-100x67.jpg 100w" sizes="(max-width: 760px) calc(100vw - 40px), 720px"&gt;</span></noscript><img alt="Exploring the Castle of the Moors in Sintra Portugal with kids" class="wp-image-5405 lazyload" data-dcnode-id="822" data-pin-media="https://fullsuitcase.com/wp-content/uploads/2017/04/Castle-of-the-Moors-in-Sintra-Portugal.jpg" data-src="https://fullsuitcase.com/wp-content/uploads/2017/04/Castle-of-the-Moors-in-Sintra-Portugal.jpg.webp" data-srcset="https://fullsuitcase.com/wp-content/uploads/2017/04/Castle-of-the-Moors-in-Sintra-Portugal.jpg.webp 878w, https://fullsuitcase.com/wp-content/uploads/2017/04/Castle-of-the-Moors-in-Sintra-Portugal-300x200.jpg.webp 300w, https://fullsuitcase.com/wp-content/uploads/2017/04/Castle-of-the-Moors-in-Sintra-Portugal-768x512.jpg.webp 768w, https://fullsuitcase.com/wp-content/uploads/2017/04/Castle-of-the-Moors-in-Sintra-Portugal-100x67.jpg.webp 100w" data-trellis-processed="1" data-webp="true" height="585" id="mv-trellis-img-17" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fullsuitcase.com/wp-content/uploads/2017/04/Castle-of-the-Moors-in-Sintra-Portugal.jpg.webp&amp;raw" srcset="https://fullsuitcase.com/wp-content/uploads/2017/04/Castle-of-the-Moors-in-Sintra-Portugal.jpg.webp 878w, https://fullsuitcase.com/wp-content/uploads/2017/04/Castle-of-the-Moors-in-Sintra-Portugal-300x200.jpg.webp 300w, https://fullsuitcase.com/wp-content/uploads/2017/04/Castle-of-the-Moors-in-Sintra-Portugal-768x512.jpg.webp 768w, https://fullsuitcase.com/wp-content/uploads/2017/04/Castle-of-the-Moors-in-Sintra-Portugal-100x67.jpg.webp 100w" width="878"><figcaption data-dcnode-id="820"><span data-dcnode-id="821" instrument_node="">Castle of the Moors</span></figcaption></figure></div><span data-dcnode-id="817" instrument_node="">



&nbsp;
</span><div class="content_hint" data-dcnode-id="816"></div><span data-dcnode-id="815" instrument_node="">
</span><h2 data-dcnode-id="813" id="day-10"><span data-dcnode-id="814" instrument_node="">Day 10: Sintra: Quinta de Regaleira and the Palace of Monserrate</span></h2><span data-dcnode-id="812" instrument_node="">
</span><p data-dcnode-id="805"><span data-dcnode-id="811" instrument_node="">On our second day in Sintra, we&nbsp;visited </span><strong data-dcnode-id="809"><span data-dcnode-id="810" instrument_node="">Quinta de Regaleira</span></strong><span data-dcnode-id="808" instrument_node=""> and </span><strong data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">the Park and Place of Monserrate.</span></strong></p><span data-dcnode-id="804" instrument_node="">
</span><p data-dcnode-id="793"><em data-dcnode-id="801"><strong data-dcnode-id="802"><span data-dcnode-id="803" instrument_node="">Tip:&nbsp;</span></strong></em><span data-dcnode-id="800" instrument_node="">If you have more time in Sintra and have a car, you can drive to the nearby </span><strong data-dcnode-id="798"><span data-dcnode-id="799" instrument_node="">Cabo da Roca</span></strong><span data-dcnode-id="797" instrument_node=""> or the coastal town </span><strong data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">Azenhas do Mar</span></strong><span data-dcnode-id="794" instrument_node="">.</span></p><span data-dcnode-id="792" instrument_node="">
</span><p data-dcnode-id="789"><strong data-dcnode-id="790"><span data-dcnode-id="791" instrument_node="">Practical information for visiting Sintra:</span></strong></p><span data-dcnode-id="788" instrument_node="">
</span><ul data-dcnode-id="770"><li data-dcnode-id="786"><span data-dcnode-id="787" instrument_node="">Sintra is a popular day trip from Lisbon, but if you are coming by car anyway, I would recommend spending at least two days here.</span></li><li data-dcnode-id="781"><span data-dcnode-id="785" instrument_node="">Without the car, the best way to reach Sintra is by train from Lisbon. It takes about 45 minutes. Or you can take </span><a aria-label="an organized tour (opens in a new tab)" data-dcnode-id="783" data-gyg-scraped="1650964269756" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/s/%3Fq%3Dsintra%26et%3D612%26partner_id%3D6N2B5KS%26cmp%3DPortugalItinerary%26deeplink_id%3D6ade6786-210e-5205-8634-5bd529248e2a" rel="noreferrer noopener sponsored" target="_blank"><span data-dcnode-id="784" instrument_node="">an organized tour</span></a><span data-dcnode-id="782" instrument_node="">. Some tours visit the places outside of Sintra too – places you can’t see if you don’t have a car.</span></li><li data-dcnode-id="776"><span data-dcnode-id="780" instrument_node="">Accommodation is very limited in Sintra, so book well in advance. You can find </span><a data-dcnode-id="778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.booking.com/city/pt/sintra.html%3Faid%3D925665%26no_rooms%3D1%26group_adults%3D1" rel="noreferrer noopener sponsored" target="_blank"><span data-dcnode-id="779" instrument_node="">the best deals for Sintra accommodation</span></a><span data-dcnode-id="777" instrument_node=""> here.</span></li><li data-dcnode-id="771"><span data-dcnode-id="775" instrument_node="">For more information about the parks, gardens, and monuments of Sintra, take a look at the </span><a data-dcnode-id="773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//parquesdesintra.pt/en/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="774" instrument_node="">official website of Parques de Sintra</span></a><span data-dcnode-id="772" instrument_node="">. </span></li></ul><span data-dcnode-id="769" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="762"><figure class="aligncenter size-full" data-dcnode-id="763"><noscript data-dcnode-id="767"><span data-dcnode-id="768" instrument_node="">&lt;img loading="lazy" width="878" height="586" src="https://fullsuitcase.com/wp-content/uploads/2017/04/Initiation-Well-at-Quinta-de-Regaleira-in-Sintra-Portugal.jpg" alt="Initiation Well at Quinta de Regaleira in Sintra Portugal" class="wp-image-5406" srcset="https://fullsuitcase.com/wp-content/uploads/2017/04/Initiation-Well-at-Quinta-de-Regaleira-in-Sintra-Portugal.jpg 878w, https://fullsuitcase.com/wp-content/uploads/2017/04/Initiation-Well-at-Quinta-de-Regaleira-in-Sintra-Portugal-300x200.jpg 300w, https://fullsuitcase.com/wp-content/uploads/2017/04/Initiation-Well-at-Quinta-de-Regaleira-in-Sintra-Portugal-768x513.jpg 768w, https://fullsuitcase.com/wp-content/uploads/2017/04/Initiation-Well-at-Quinta-de-Regaleira-in-Sintra-Portugal-100x67.jpg 100w" sizes="(max-width: 760px) calc(100vw - 40px), 720px"&gt;</span></noscript><img alt="Initiation Well at Quinta de Regaleira in Sintra Portugal" class="wp-image-5406 lazyload" data-dcnode-id="766" data-pin-media="https://fullsuitcase.com/wp-content/uploads/2017/04/Initiation-Well-at-Quinta-de-Regaleira-in-Sintra-Portugal.jpg" data-src="https://fullsuitcase.com/wp-content/uploads/2017/04/Initiation-Well-at-Quinta-de-Regaleira-in-Sintra-Portugal.jpg.webp" data-srcset="https://fullsuitcase.com/wp-content/uploads/2017/04/Initiation-Well-at-Quinta-de-Regaleira-in-Sintra-Portugal.jpg.webp 878w, https://fullsuitcase.com/wp-content/uploads/2017/04/Initiation-Well-at-Quinta-de-Regaleira-in-Sintra-Portugal-300x200.jpg.webp 300w, https://fullsuitcase.com/wp-content/uploads/2017/04/Initiation-Well-at-Quinta-de-Regaleira-in-Sintra-Portugal-768x513.jpg.webp 768w, https://fullsuitcase.com/wp-content/uploads/2017/04/Initiation-Well-at-Quinta-de-Regaleira-in-Sintra-Portugal-100x67.jpg.webp 100w" data-trellis-processed="1" data-webp="true" height="586" id="mv-trellis-img-18" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fullsuitcase.com/wp-content/uploads/2017/04/Initiation-Well-at-Quinta-de-Regaleira-in-Sintra-Portugal.jpg.webp&amp;raw" srcset="https://fullsuitcase.com/wp-content/uploads/2017/04/Initiation-Well-at-Quinta-de-Regaleira-in-Sintra-Portugal.jpg.webp 878w, https://fullsuitcase.com/wp-content/uploads/2017/04/Initiation-Well-at-Quinta-de-Regaleira-in-Sintra-Portugal-300x200.jpg.webp 300w, https://fullsuitcase.com/wp-content/uploads/2017/04/Initiation-Well-at-Quinta-de-Regaleira-in-Sintra-Portugal-768x513.jpg.webp 768w, https://fullsuitcase.com/wp-content/uploads/2017/04/Initiation-Well-at-Quinta-de-Regaleira-in-Sintra-Portugal-100x67.jpg.webp 100w" width="878"><figcaption data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">Initiation Well at Quinta de Regaleira</span></figcaption></figure></div><span data-dcnode-id="761" instrument_node="">



&nbsp;
</span><div class="content_hint" data-dcnode-id="760"></div><span data-dcnode-id="759" instrument_node="">
</span><h2 class="has-text-align-center" data-dcnode-id="757" id="suggestions-for-any-trip"><span data-dcnode-id="758" instrument_node="">Portugal Itinerary for Any Duration</span></h2><span data-dcnode-id="756" instrument_node="">
</span><p data-dcnode-id="745"><span data-dcnode-id="755" instrument_node="">The above&nbsp;is </span><strong data-dcnode-id="753"><span data-dcnode-id="754" instrument_node="">our trip itinerary for 10 days in Portugal&nbsp;</span></strong><span data-dcnode-id="752" instrument_node="">with kids. The distances in Portugal are quite small, so you can easily adapt this itinerary to </span><em data-dcnode-id="750"><span data-dcnode-id="751" instrument_node="">your interests</span></em><span data-dcnode-id="749" instrument_node=""> and </span><em data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">any trip duration</span></em><span data-dcnode-id="746" instrument_node="">.</span></p><span data-dcnode-id="744" instrument_node="">
</span><p data-dcnode-id="739"><span data-dcnode-id="743" instrument_node="">We traveled to </span><a data-dcnode-id="741" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fullsuitcase.com/portugal-with-kids/"><span data-dcnode-id="742" instrument_node="">Portugal with kids</span></a><span data-dcnode-id="740" instrument_node="">, so our days were not fully packed with sightseeing (although the kids would probably disagree :)). We found that this itinerary left quite some free time to explore deeper, have long meals, take a dip in the pool, etc.</span></p><span data-dcnode-id="738" instrument_node="">
</span><ul data-dcnode-id="732"><li data-dcnode-id="733"><span data-dcnode-id="737" instrument_node="">If you have at least two more days in Portugal, visit </span><a data-dcnode-id="735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fullsuitcase.com/algarve-best-beaches/"><span data-dcnode-id="736" instrument_node="">the beaches of Algarve </span></a><span data-dcnode-id="734" instrument_node="">as well. If you are driving to Algarve, you could do this at the end of this trip, after returning to Lisbon. That way you leave the more relaxing beach stay for the end of your trip. </span></li></ul><span data-dcnode-id="731" instrument_node="">
</span><ul data-dcnode-id="728"><li data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">If you have less time than 10 days, skip the places that don’t interest you, or try to squeeze more in a day. As I said, the distances aren’t big and you can see a lot in a short time.</span></li></ul><span data-dcnode-id="727" instrument_node="">
</span><ul data-dcnode-id="724"><li data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">If you don’t want to rent a car in Portugal, please take a look at our suggestions for day tours that I included where possible. For a bigger distance, like Lisbon to Porto, you can take a train.</span></li></ul><span data-dcnode-id="723" instrument_node="">
</span><p data-dcnode-id="708"><em data-dcnode-id="719"><strong data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">TIP:</span></strong><span data-dcnode-id="720" instrument_node=""> </span></em><span data-dcnode-id="718" instrument_node="">Find the best deals for </span><a data-dcnode-id="716" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.rentalcars.com/Home.do%3FaffiliateCode%3Dfullsuitcase" rel="noreferrer noopener sponsored" target="_blank"><span data-dcnode-id="717" instrument_node="">rental cars</span></a><span data-dcnode-id="715" instrument_node=""> and </span><a data-dcnode-id="713" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.booking.com/index.html%3Faid%3D925665" rel="noreferrer noopener sponsored" target="_blank"><span data-dcnode-id="714" instrument_node="">hotels</span></a><span data-dcnode-id="712" instrument_node=""> for your trip here. And don’t forget </span><a data-dcnode-id="710" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.worldnomads.com/Turnstile/AffiliateLink%3FpartnerCode%3D7u77se%26utm_source%3D7u77se%26source%3Dweblink%26utm_content%3Dweblink%26path%3Dhttps%3A//www.worldnomads.com/" rel="noreferrer noopener sponsored" target="_blank"><span data-dcnode-id="711" instrument_node="">good travel insurance</span></a><span data-dcnode-id="709" instrument_node="">!</span></p><span data-dcnode-id="707" instrument_node="">
</span><p data-dcnode-id="702"><span data-dcnode-id="706" instrument_node="">P.S. We used </span><a data-dcnode-id="704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Michelin-Green-Portugal-Madeira-Azores/dp/2067216139/ref%3Das_li_bk_tl/%3Ftag%3Dfullsuit-20%26linkId%3D136a785cd041b7ff50d206dbf8504c17%26linkCode%3Dktl" rel="noreferrer noopener sponsored" target="_blank"><span data-dcnode-id="705" instrument_node="">Michelin Green Guide Portugal</span></a><span data-dcnode-id="703" instrument_node=""> to plan this trip. It’s a great resource containing lots of practical information for each of the locations described in this post.</span></p><span data-dcnode-id="701" instrument_node="">
</span><p data-dcnode-id="694"><em data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">Update:</span></em><span data-dcnode-id="698" instrument_node=""> We loved Portugal so much that we returned a year later to visit the Algarve region, as well as Madeira Island. You can find more information about all these places in our </span><a data-dcnode-id="696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fullsuitcase.com/portugal/"><span data-dcnode-id="697" instrument_node="">Portugal travel guide</span></a><span data-dcnode-id="695" instrument_node="">.</span></p><span data-dcnode-id="693" instrument_node="">



&nbsp;
</span><div class="content_hint" data-dcnode-id="692"></div><span data-dcnode-id="691" instrument_node="">
</span><h2 class="has-text-align-center" data-dcnode-id="689"><span data-dcnode-id="690" instrument_node="">Best Time to Visit</span></h2><span data-dcnode-id="688" instrument_node="">
</span><p data-dcnode-id="686"><span data-dcnode-id="687" instrument_node="">Portugal is a year-round destination. If you are planning to visit towns and cultural landmarks, then you can plan a trip at any time of the year, but I would suggest avoiding the hottest summer months. If you are planning to visit the beaches, then come from May to October. July and August are the peak months when it’s very busy everywhere.</span></p><span data-dcnode-id="685" instrument_node="">
</span><p data-dcnode-id="683"><span data-dcnode-id="684" instrument_node="">If you want to explore Portugal to the fullest, then visit in April – May or in September – October. That’s when the weather is really nice but not too hot for sightseeing, it’s not too busy, and accommodation prices are lower.</span></p><span data-dcnode-id="682" instrument_node="">
</span><p data-dcnode-id="677"><span data-dcnode-id="681" instrument_node="">We made this trip in April and it was an excellent time to be here. For more information on what to expect in this season, please read our guide to </span><a data-dcnode-id="679" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fullsuitcase.com/portugal-in-april/"><span data-dcnode-id="680" instrument_node="">Portugal in April</span></a><span data-dcnode-id="678" instrument_node="">.</span></p><span data-dcnode-id="676" instrument_node="">
</span><p class="has-text-align-center has-background" data-dcnode-id="671" style="background-color:#f9f9f9"><strong data-dcnode-id="674"><span data-dcnode-id="675" instrument_node="">READ ALSO: </span></strong><a data-dcnode-id="672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fullsuitcase.com/best-time-to-visit-europe/"><span data-dcnode-id="673" instrument_node="">Best time to visit Europe</span></a></p><span data-dcnode-id="670" instrument_node="">

</span><p data-dcnode-id="493"><span data-dcnode-id="494" instrument_node="">Hi Sarah, depending on where you start/end your trip, you can rent a car at the airport or in the city. Sometimes, there's a price difference, but usually - it's almost the same.
For this specific trip, we rented our can in Lisbon, after visiting the city first. The car rental was in town, but still far enough from our hotel that we had to take a taxi there (very affordable).
As for where to rent, there are many options. Over the recent years, we have rented all our cars via this website. I like it that you can compare all the best options and choose the car/supplier that best suits you. They also have the best prices (every time I can find better deals via them than anywhere else). The information on where the car rental offices of each local supplier are located is also provided, so you can see what makes more sense for your trip.
We also always take full coverage via this same website. Last summer, we actually had to make a claim after our trip in the Azores, Portugal. It went very smoothly and they paid us 2 or 3 days after submitting all the documents. We now never take insurance directly with the car hire companies anymore since they tend to be quite a lot more expensive.
Hope this helps.</span></p><span data-dcnode-id="492" instrument_node="">

Really enjoyed this itinerary - it has inspired me to go forth to discover Portugal! Wondered if you had a rough costing of your ten day trip, to mostly include the hotels and petrol. We are just two adults. Thanks in advance!</span></p><span data-dcnode-id="385" instrument_node="">

</span><p data-dcnode-id="367"><span data-dcnode-id="368" instrument_node="">Hi Sandy, glad to hear that this inspired you to visit Portugal. You'll love it!
As for the costs, I always find it difficult to say as so much depends on the season when you travel, how much in advance you book, and on your choices (hotel, car, tours, etc.). In general, Portugal is one of the cheapest destinations in Western/Southern Europe. In smaller cities, you can find really nice 3-4* hotels for about 100 EUR/ night for 2 adults, breakfast included. In Lisbon or Porto, it might be more expensive, but you also have more choice of budget accommodations. Check the hotels I linked to in the article for the dates when you think of traveling, and you'll quickly get a good idea what's available and how much it costs. I'd say if you budget 1000 EUR for 10 days, it's possible if it's not the highest season. If you travel in low season or choose more budget hotels, you can even make it cheaper than that. If you want somewhat nicer hotels or are traveling in summer, then you should probably count at least 1500 EUR for 10 nights for the two of you.
As for car rental, we only paid 180 EUR for 10 days for this trip, but we booked well in advance and that was crazy cheap. On our other trips, we sometimes paid about twice that price, which is still very cheap compared to most other places. Here you can find the best deals for car rental. We always use this website now, especially in the current situation because they have amazing customer service and cancelation policies. We had to cancel two car rentals this year and got all our money back both times.
Keep in mind that toll roads are (surprisingly) quite expensive in Portugal. Petrol prices are a bit like in other European countries.
Hope this helps a bit. If you check the car rental and the hotels for your travel dates, you'll quickly be able to come up with a good price estimate yourself.</span></p><span data-dcnode-id="366" instrument_node="">

</span><p data-dcnode-id="304"><span data-dcnode-id="305" instrument_node="">Hi Jun, most of our suggestions for the places to visit in Portugal are already mentioned in this article and also some accommodation suggestions. It's going to be hot in July, so I would definitely advise driving down to the Algarve beaches for at least 3-5 days.
