</span><p data-dcnode-id="1635"><span data-dcnode-id="1639" instrument_node="">Are you looking for ideas for</span><strong data-dcnode-id="1637"><span data-dcnode-id="1638" instrument_node=""> Portugal itinerary</span></strong><span data-dcnode-id="1636" instrument_node=""> and are not sure where to start? In this article, you can find our 10-day itinerary for Portugal, covering all the most beautiful places between Lisbon and Porto. Take a look!</span></p><span data-dcnode-id="1634" instrument_node="">
</span><p data-dcnode-id="1629"><span data-dcnode-id="1633" instrument_node="">When we booked&nbsp;the flights for a </span><strong data-dcnode-id="1631"><span data-dcnode-id="1632" instrument_node="">10 day trip to Portugal</span></strong><span data-dcnode-id="1630" instrument_node="">, we had a very different trip in mind than the one we ended up doing. At first, we thought to visit Lisbon and Sintra, then head to the beautiful beaches of Algarve and all the way to Faro… </span></p><span data-dcnode-id="1628" instrument_node="">
</span><p data-dcnode-id="1623"><span data-dcnode-id="1627" instrument_node="">After a little research, however, we quickly realized that we would be missing the most interesting places in Portugal.&nbsp;And so we decided to leave Algarve and the beaches for the next trip and to visit </span><strong data-dcnode-id="1625"><span data-dcnode-id="1626" instrument_node="">the main highlights, the most beautiful places in Portugal</span></strong><span data-dcnode-id="1624" instrument_node=""> instead.</span></p><span data-dcnode-id="1622" instrument_node="">
</span><p data-dcnode-id="1617"><strong data-dcnode-id="1619"><em data-dcnode-id="1620"><span data-dcnode-id="1621" instrument_node="">Good to know: </span></em></strong><span data-dcnode-id="1618" instrument_node="">Because it was cheaper for us to fly in and out of Lisbon, we started this trip in Lisbon, visited all the nicest places of Central Portugal, drove all the way to Porto and the Douro Valley, and ended our trip back in Lisbon area (Sintra). </span></p><span data-dcnode-id="1616" instrument_node="">
</span><p data-dcnode-id="1614"><span data-dcnode-id="1615" instrument_node="">Because driving distances in Portugal aren’t that big, it was perfectly doable. You can adapt this itinerary a bit and start in Lisbon and end in Porto or vice versa. At the bottom of this article, we also have some alternative itinerary suggestions for your trip to Portugal. Read on!</span></p><span data-dcnode-id="1613" instrument_node="">
</span><p class="has-text-align-center has-background" data-dcnode-id="1608" style="background-color:#f9f9f9"><strong data-dcnode-id="1611"><span data-dcnode-id="1612" instrument_node="">READ ALSO: </span></strong><a data-dcnode-id="1609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fullsuitcase.com/portugal-towns/"><span data-dcnode-id="1610" instrument_node="">Best Cities &amp; Towns in Portugal</span></a></p><span data-dcnode-id="1607" instrument_node="">



&nbsp;
</span><div class="content_hint" data-dcnode-id="1606"></div><span data-dcnode-id="1605" instrument_node="">
</span><h3 class="has-text-align-center" data-dcnode-id="1603"><span data-dcnode-id="1604" instrument_node="">Portugal Itinerary with the Main Highlights of Central Portugal from Lisbon to Porto:</span></h3><span data-dcnode-id="1602" instrument_node="">
</span><ul data-dcnode-id="1568"><li data-dcnode-id="1599"><a data-dcnode-id="1600" href="#day-1"><span data-dcnode-id="1601" instrument_node="">Day 1: Lisbon (sleep in Lisbon)</span></a></li><li data-dcnode-id="1596"><a data-dcnode-id="1597" href="#day-2"><span data-dcnode-id="1598" instrument_node="">Day 2: Evora (sleep in Evora)</span></a></li><li data-dcnode-id="1593"><a data-dcnode-id="1594" href="#day-3"><span data-dcnode-id="1595" instrument_node="">Day 3: Obidos and Alcobaca (sleep in Alcobaca – Nazare area)</span></a></li><li data-dcnode-id="1590"><a data-dcnode-id="1591" href="#day-4"><span data-dcnode-id="1592" instrument_node="">Day 4: Batalha, Grutas de Mira de Aire, Nazare&nbsp;(sleep in Alcobaca –&nbsp;Nazare area)</span></a></li><li data-dcnode-id="1587"><a data-dcnode-id="1588" href="#day-5"><span data-dcnode-id="1589" instrument_node="">Day 5: Conimbriga and Coimbra (sleep in Coimbra)</span></a></li><li data-dcnode-id="1584"><a data-dcnode-id="1585" href="#day-6"><span data-dcnode-id="1586" instrument_node="">Day 6: Buçaco forest – Costa Nova – Aveiro (sleep in Aveiro)</span></a></li><li data-dcnode-id="1581"><a data-dcnode-id="1582" href="#day-7"><span data-dcnode-id="1583" instrument_node="">Day 7: Douro Valley (sleep in Porto)</span></a></li><li data-dcnode-id="1578"><a data-dcnode-id="1579" href="#day-8"><span data-dcnode-id="1580" instrument_node="">Day 8: Porto (sleep in Porto)</span></a></li><li data-dcnode-id="1575"><a data-dcnode-id="1576" href="#day-9"><span data-dcnode-id="1577" instrument_node="">Day 9: Sintra (sleep in Sintra)</span></a></li><li data-dcnode-id="1572"><a data-dcnode-id="1573" href="#day-10"><span data-dcnode-id="1574" instrument_node="">Day 10: Sintra and fly home</span></a></li><li data-dcnode-id="1569"><a data-dcnode-id="1570" href="#suggestions-for-any-trip"><span data-dcnode-id="1571" instrument_node="">Portugal trip itinerary for any duration</span></a></li></ul><span data-dcnode-id="1567" instrument_node="">

</span><h2 class="has-text-align-center" data-dcnode-id="1565"><span data-dcnode-id="1566" instrument_node="">Portugal Trip Itinerary and Map</span></h2><span data-dcnode-id="1564" instrument_node="">
</span><p data-dcnode-id="1562"><span data-dcnode-id="1563" instrument_node="">Below, you can find a detailed day-to-day Portugal itinerary, exactly as we did it. We also included some practical tips for the most important landmarks and day tour suggestions for some places that you could potentially also visit as a day trip with an organized tour. Take a look!</span></p><span data-dcnode-id="1561" instrument_node="">
</span><p data-dcnode-id="1559"><span data-dcnode-id="1560" instrument_node="">To help you get a better idea of where everything is located, I also included a map indicating all the places mentioned in this article. See below.</span></p><span data-dcnode-id="1558" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1553"><figure class="aligncenter size-full" data-dcnode-id="1554"><noscript data-dcnode-id="1556"><span data-dcnode-id="1557" instrument_node="">&lt;img width="682" height="1024" src="https://fullsuitcase.com/wp-content/uploads/2017/04/Portugal-10-dy-itinerary-map.jpg" alt="Portugal 10 day itinerary map" class="wp-image-5391" srcset="https://fullsuitcase.com/wp-content/uploads/2017/04/Portugal-10-dy-itinerary-map.jpg 682w, https://fullsuitcase.com/wp-content/uploads/2017/04/Portugal-10-dy-itinerary-map-200x300.jpg 200w, https://fullsuitcase.com/wp-content/uploads/2017/04/Portugal-10-dy-itinerary-map-100x150.jpg 100w" sizes="(max-width: 760px) calc(100vw - 40px), 720px"&gt;</span></noscript><img alt="Portugal 10 day itinerary map" class="wp-image-5391 lazyload" data-dcnode-id="1555" data-pin-media="https://fullsuitcase.com/wp-content/uploads/2017/04/Portugal-10-dy-itinerary-map.jpg" data-src="https://fullsuitcase.com/wp-content/uploads/2017/04/Portugal-10-dy-itinerary-map.jpg.webp" data-srcset="https://fullsuitcase.com/wp-content/uploads/2017/04/Portugal-10-dy-itinerary-map.jpg.webp 682w, https://fullsuitcase.com/wp-content/uploads/2017/04/Portugal-10-dy-itinerary-map-200x300.jpg.webp 200w, https://fullsuitcase.com/wp-content/uploads/2017/04/Portugal-10-dy-itinerary-map-100x150.jpg.webp 100w" data-trellis-processed="1" data-webp="true" height="1024" id="mv-trellis-img-2" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fullsuitcase.com/wp-content/uploads/2017/04/Portugal-10-dy-itinerary-map.jpg.webp&amp;raw" srcset="https://fullsuitcase.com/wp-content/uploads/2017/04/Portugal-10-dy-itinerary-map.jpg.webp 682w, https://fullsuitcase.com/wp-content/uploads/2017/04/Portugal-10-dy-itinerary-map-200x300.jpg.webp 200w, https://fullsuitcase.com/wp-content/uploads/2017/04/Portugal-10-dy-itinerary-map-100x150.jpg.webp 100w" width="682"></figure></div><span data-dcnode-id="1552" instrument_node="">

</span><h2 data-dcnode-id="1548" id="day-1"><span data-dcnode-id="1549" instrument_node="">Day 1: Lisbon</span></h2><span data-dcnode-id="1547" instrument_node="">
</span><p data-dcnode-id="1539"><span data-dcnode-id="1546" instrument_node="">We arrived in </span><strong data-dcnode-id="1544"><span data-dcnode-id="1545" instrument_node="">Lisbon</span></strong><span data-dcnode-id="1543" instrument_node=""> late in the evening, so I’m not going to count this travel day. In addition, we spent one full day in Lisbon. We stayed </span><a data-dcnode-id="1541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.booking.com/district/pt/lisbon/baixa.html%3Faid%3D925665%26no_rooms%3D1%26group_adults%3D1" rel="noreferrer noopener sponsored nofollow" target="_blank"><span data-dcnode-id="1542" instrument_node="">in the heart of Lisbon, close to Rossio square,</span></a><span data-dcnode-id="1540" instrument_node=""> and the location was perfect&nbsp;for dining and sightseeing.</span></p><span data-dcnode-id="1538" instrument_node="">
</span><p data-dcnode-id="1524"><span data-dcnode-id="1537" instrument_node="">While one day isn’t enough to see </span><a data-dcnode-id="1535" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fullsuitcase.com/lisbon-best-things-to-do/"><span data-dcnode-id="1536" instrument_node="">all the best places and attractions in Lisbon,</span></a><span data-dcnode-id="1534" instrument_node=""> you can still do a lot. We focused on the </span><strong data-dcnode-id="1532"><span data-dcnode-id="1533" instrument_node="">city center</span></strong><span data-dcnode-id="1531" instrument_node="">, </span><strong data-dcnode-id="1529"><span data-dcnode-id="1530" instrument_node="">Alfama district</span></strong><span data-dcnode-id="1528" instrument_node="">, and did a </span><a data-dcnode-id="1526" data-gyg-scraped="1650964269756" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/s/%3Fq%3Dlisbon%2520sailing%26partner_id%3D6N2B5KS%26cmp%3DPortugalItinerary%26deeplink_id%3D948167e6-a0a0-598d-a1d4-b6bbccd4138d" rel="noreferrer noopener sponsored nofollow" target="_blank"><span data-dcnode-id="1527" instrument_node="">sailing cruise on the Tagus River</span></a><span data-dcnode-id="1525" instrument_node="">. Below you can find all our tips and recommendations for what to see and do in Lisbon in one day. Check it out for more details!</span></p><span data-dcnode-id="1523" instrument_node="">
</span><p data-dcnode-id="1494"><strong data-dcnode-id="1519"><em data-dcnode-id="1521"><span data-dcnode-id="1522" instrument_node="">TIP:</span></em><span data-dcnode-id="1520" instrument_node=""> </span></strong><span data-dcnode-id="1518" instrument_node="">If you have</span><em data-dcnode-id="1516"><span data-dcnode-id="1517" instrument_node=""> </span></em><strong data-dcnode-id="1514"><span data-dcnode-id="1515" instrument_node="">two days in Lisbon</span></strong><span data-dcnode-id="1513" instrument_node="">, make sure you also visit the </span><strong data-dcnode-id="1511"><span data-dcnode-id="1512" instrument_node="">Belém District</span></strong><span data-dcnode-id="1510" instrument_node=""> as well. The main highlights here are the </span><strong data-dcnode-id="1508"><span data-dcnode-id="1509" instrument_node="">Jeronimos Monastery </span></strong><span data-dcnode-id="1507" instrument_node="">(</span><a aria-label="book tickets (opens in a new tab)" data-dcnode-id="1505" data-gyg-scraped="1650964269756" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/-t131169/%3Fpartner_id%3D6N2B5KS%26cmp%3DPortugalItinerary%26deeplink_id%3Dca49037a-4c47-58cb-9d8b-b29cbb469a96" rel="noreferrer noopener sponsored" target="_blank"><span data-dcnode-id="1506" instrument_node="">book tickets</span></a><span data-dcnode-id="1504" instrument_node=""> in advance!), </span><strong data-dcnode-id="1502"><span data-dcnode-id="1503" instrument_node="">Belem Tower</span></strong><span data-dcnode-id="1501" instrument_node=""> (also best to</span><a aria-label=" book in advance (opens in a new tab)" data-dcnode-id="1499" data-gyg-scraped="1650964269756" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/-t137750/%3Fpartner_id%3D6N2B5KS%26cmp%3DPortugalItinerary%26deeplink_id%3D1f86f797-39df-5f86-934a-7e88124fad76" rel="noreferrer noopener sponsored" target="_blank"><span data-dcnode-id="1500" instrument_node=""> book in advance</span></a><span data-dcnode-id="1498" instrument_node="">), and the </span><strong data-dcnode-id="1496"><span data-dcnode-id="1497" instrument_node="">Discoveries Monument</span></strong><span data-dcnode-id="1495" instrument_node="">. Count at least half a day for this part of town – that’s if you buy tickets in advance. Otherwise, you’ll probably need even more time.</span></p><span data-dcnode-id="1493" instrument_node="">
</span><p class="has-text-align-center has-background" data-dcnode-id="1488" style="background-color:#f9f9f9"><strong data-dcnode-id="1491"><span data-dcnode-id="1492" instrument_node="">LEARN MORE: </span></strong><a data-dcnode-id="1489" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fullsuitcase.com/best-of-lisbon-one-day/"><span data-dcnode-id="1490" instrument_node="">One Day in Lisbon</span></a></p><span data-dcnode-id="1487" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1480"><figure class="aligncenter size-full" data-dcnode-id="1481"><noscript data-dcnode-id="1485"><span data-dcnode-id="1486" instrument_node="">&lt;img loading="lazy" width="878" height="585" src="https://fullsuitcase.com/wp-content/uploads/2017/04/Largo-das-Portas-do-Sol-Lisbon.jpg" alt="See the best of Lisbon in one day with this itinerary that brings you to the most beautiful places in Lisboa, Portugal" class="wp-image-5337" srcset="https://fullsuitcase.com/wp-content/uploads/2017/04/Largo-das-Portas-do-Sol-Lisbon.jpg 878w, https://fullsuitcase.com/wp-content/uploads/2017/04/Largo-das-Portas-do-Sol-Lisbon-300x200.jpg 300w, https://fullsuitcase.com/wp-content/uploads/2017/04/Largo-das-Portas-do-Sol-Lisbon-768x512.jpg 768w, https://fullsuitcase.com/wp-content/uploads/2017/04/Largo-das-Portas-do-Sol-Lisbon-100x67.jpg 100w" sizes="(max-width: 760px) calc(100vw - 40px), 720px"&gt;</span></noscript><img alt="See the best of Lisbon in one day with this itinerary that brings you to the most beautiful places in Lisboa, Portugal" class="wp-image-5337 lazyload" data-dcnode-id="1484" data-pin-media="https://fullsuitcase.com/wp-content/uploads/2017/04/Largo-das-Portas-do-Sol-Lisbon.jpg" data-src="https://fullsuitcase.com/wp-content/uploads/2017/04/Largo-das-Portas-do-Sol-Lisbon.jpg.webp" data-srcset="https://fullsuitcase.com/wp-content/uploads/2017/04/Largo-das-Portas-do-Sol-Lisbon.jpg.webp 878w, https://fullsuitcase.com/wp-content/uploads/2017/04/Largo-das-Portas-do-Sol-Lisbon-300x200.jpg.webp 300w, https://fullsuitcase.com/wp-content/uploads/2017/04/Largo-das-Portas-do-Sol-Lisbon-768x512.jpg.webp 768w, https://fullsuitcase.com/wp-content/uploads/2017/04/Largo-das-Portas-do-Sol-Lisbon-100x67.jpg.webp 100w" data-trellis-processed="1" data-webp="true" height="585" id="mv-trellis-img-3" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fullsuitcase.com/wp-content/uploads/2017/04/Largo-das-Portas-do-Sol-Lisbon.jpg.webp&amp;raw" srcset="https://fullsuitcase.com/wp-content/uploads/2017/04/Largo-das-Portas-do-Sol-Lisbon.jpg.webp 878w, https://fullsuitcase.com/wp-content/uploads/2017/04/Largo-das-Portas-do-Sol-Lisbon-300x200.jpg.webp 300w, https://fullsuitcase.com/wp-content/uploads/2017/04/Largo-das-Portas-do-Sol-Lisbon-768x512.jpg.webp 768w, https://fullsuitcase.com/wp-content/uploads/2017/04/Largo-das-Portas-do-Sol-Lisbon-100x67.jpg.webp 100w" width="878"><figcaption data-dcnode-id="1482"><span data-dcnode-id="1483" instrument_node="">Lisbon</span></figcaption></figure></div><span data-dcnode-id="1479" instrument_node="">



&nbsp;
</span><div class="content_hint" data-dcnode-id="1478"></div><span data-dcnode-id="1477" instrument_node="">
</span><h2 data-dcnode-id="1475" id="day-2"><span data-dcnode-id="1476" instrument_node="">Day 2: Evora</span></h2><span data-dcnode-id="1474" instrument_node="">
</span><p data-dcnode-id="1472"><span data-dcnode-id="1473" instrument_node="">We had planned to visit Belem in the morning before leaving Lisbon. Unfortunately, one of our kids&nbsp;didn’t feel well and so we decided to leave Lisbon and head straight to&nbsp;Evora. We rented a car starting on this day and we picked it up in the city center. </span></p><span data-dcnode-id="1471" instrument_node="">
</span><p data-dcnode-id="1463"><strong data-dcnode-id="1468"><em data-dcnode-id="1469"><span data-dcnode-id="1470" instrument_node="">TIP: </span></em></strong><span data-dcnode-id="1467" instrument_node="">Here you can find </span><a aria-label="the best deals for car rental (opens in a new tab)" data-dcnode-id="1465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rentalcars.com/Home.do%3FaffiliateCode%3Dfullsuitcase" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1466" instrument_node="">the best deals for car rental</span></a><span data-dcnode-id="1464" instrument_node=""> – it’s the car rental deals searching engine that we always use and recommend to our readers.</span></p><span data-dcnode-id="1462" instrument_node="">
</span><p data-dcnode-id="1459"><em data-dcnode-id="1460"><span data-dcnode-id="1461" instrument_node="">Driving time from Lisbon to Evora – 1,5 hrs.</span></em></p><span data-dcnode-id="1458" instrument_node="">
</span><p data-dcnode-id="1445"><strong data-dcnode-id="1456"><span data-dcnode-id="1457" instrument_node="">Evora</span></strong><span data-dcnode-id="1455" instrument_node=""> is a small cozy medieval town. The main sights in Evora are: </span><strong data-dcnode-id="1453"><span data-dcnode-id="1454" instrument_node="">Chapel of Bones</span></strong><span data-dcnode-id="1452" instrument_node="">, </span><strong data-dcnode-id="1450"><span data-dcnode-id="1451" instrument_node="">Templo Romano</span></strong><span data-dcnode-id="1449" instrument_node="">, and the </span><strong data-dcnode-id="1447"><span data-dcnode-id="1448" instrument_node="">Cathedral </span></strong><span data-dcnode-id="1446" instrument_node="">(tower). Other highlights include the Public Park of Evora, Church of Nossa Senhora da Graça, the Town Square, Evora Aqueduct and the City Walls.</span></p><span data-dcnode-id="1444" instrument_node="">
</span><p data-dcnode-id="1441"><strong data-dcnode-id="1442"><span data-dcnode-id="1443" instrument_node="">Practical information for visiting Evora:</span></strong></p><span data-dcnode-id="1440" instrument_node="">
</span><ul data-dcnode-id="1434"><li data-dcnode-id="1435"><span data-dcnode-id="1439" instrument_node="">Evora is perfectly doable </span><a aria-label="as a day trip from Lisbon (opens in a new tab)" data-dcnode-id="1437" data-gyg-scraped="1650964269756" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/-t28465/%3Fpartner_id%3D6N2B5KS%26cmp%3DPortugalItinerary%26deeplink_id%3D4b0a2ee3-649b-5060-8d36-18fae626f0ba" rel="noreferrer noopener sponsored" target="_blank"><span data-dcnode-id="1438" instrument_node="">as a day trip from Lisbon</span></a><span data-dcnode-id="1436" instrument_node="">, but if you are renting a car for your trip anyway, I suggest you spend a night there. Hotels are much cheaper than in Lisbon, there are many good local restaurants and there are very few tourists.</span></li></ul><span data-dcnode-id="1433" instrument_node="">
</span><ul data-dcnode-id="1427"><li data-dcnode-id="1428"><span data-dcnode-id="1432" instrument_node="">Book a hotel&nbsp;just inside the city walls. We stayed at the&nbsp;</span><a data-dcnode-id="1430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.booking.com/hotel/pt/muralhas.html%3Faid%3D925665%26no_rooms%3D1%26group_adults%3D1" rel="noreferrer noopener sponsored" target="_blank"><span data-dcnode-id="1431" instrument_node="">centrally located hotel M’AR de Ar Muralhas</span></a><span data-dcnode-id="1429" instrument_node="">.&nbsp;I would have loved to stay 2 nights in Evora just for this hotel.</span></li></ul><span data-dcnode-id="1426" instrument_node="">
</span><ul data-dcnode-id="1423"><li data-dcnode-id="1424"><span data-dcnode-id="1425" instrument_node="">Leave your car outside the city walls (or at the hotel parking) and explore Evora on foot.</span></li></ul><span data-dcnode-id="1422" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1415"><figure class="aligncenter size-full" data-dcnode-id="1416"><noscript data-dcnode-id="1420"><span data-dcnode-id="1421" instrument_node="">&lt;img loading="lazy" width="878" height="585" src="https://fullsuitcase.com/wp-content/uploads/2017/04/Chapel-of-Bones-in-Evora-Portugal.jpg" alt="Chapel of Bones in Evora Portugal" class="wp-image-5393" srcset="https://fullsuitcase.com/wp-content/uploads/2017/04/Chapel-of-Bones-in-Evora-Portugal.jpg 878w, https://fullsuitcase.com/wp-content/uploads/2017/04/Chapel-of-Bones-in-Evora-Portugal-300x200.jpg 300w, https://fullsuitcase.com/wp-content/uploads/2017/04/Chapel-of-Bones-in-Evora-Portugal-768x512.jpg 768w, https://fullsuitcase.com/wp-content/uploads/2017/04/Chapel-of-Bones-in-Evora-Portugal-100x67.jpg 100w" sizes="(max-width: 760px) calc(100vw - 40px), 720px"&gt;</span></noscript><img alt="Chapel of Bones in Evora Portugal" class="wp-image-5393 lazyload" data-dcnode-id="1419" data-pin-media="https://fullsuitcase.com/wp-content/uploads/2017/04/Chapel-of-Bones-in-Evora-Portugal.jpg" data-src="https://fullsuitcase.com/wp-content/uploads/2017/04/Chapel-of-Bones-in-Evora-Portugal.jpg.webp" data-srcset="https://fullsuitcase.com/wp-content/uploads/2017/04/Chapel-of-Bones-in-Evora-Portugal.jpg.webp 878w, https://fullsuitcase.com/wp-content/uploads/2017/04/Chapel-of-Bones-in-Evora-Portugal-300x200.jpg.webp 300w, https://fullsuitcase.com/wp-content/uploads/2017/04/Chapel-of-Bones-in-Evora-Portugal-768x512.jpg.webp 768w, https://fullsuitcase.com/wp-content/uploads/2017/04/Chapel-of-Bones-in-Evora-Portugal-100x67.jpg.webp 100w" data-trellis-processed="1" data-webp="true" height="585" id="mv-trellis-img-4" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fullsuitcase.com/wp-content/uploads/2017/04/Chapel-of-Bones-in-Evora-Portugal.jpg.webp&amp;raw" srcset="https://fullsuitcase.com/wp-content/uploads/2017/04/Chapel-of-Bones-in-Evora-Portugal.jpg.webp 878w, https://fullsuitcase.com/wp-content/uploads/2017/04/Chapel-of-Bones-in-Evora-Portugal-300x200.jpg.webp 300w, https://fullsuitcase.com/wp-content/uploads/2017/04/Chapel-of-Bones-in-Evora-Portugal-768x512.jpg.webp 768w, https://fullsuitcase.com/wp-content/uploads/2017/04/Chapel-of-Bones-in-Evora-Portugal-100x67.jpg.webp 100w" width="878"><figcaption data-dcnode-id="1417"><span data-dcnode-id="1418" instrument_node="">Chapel of Bones in Evora </span></figcaption></figure></div><span data-dcnode-id="1414" instrument_node="">



&nbsp;
</span><div class="content_hint" data-dcnode-id="1413"></div><span data-dcnode-id="1412" instrument_node="">
</span><h2 data-dcnode-id="1410" id="day-3"><span data-dcnode-id="1411" instrument_node="">Day 3: Obidos and Alcobaca</span></h2><span data-dcnode-id="1409" instrument_node="">
</span><p data-dcnode-id="1407"><span data-dcnode-id="1408" instrument_node="">After leaving Evora, we drove to one of the most picturesque little towns of Portugal, Obidos. It’s a very popular day tour from Lisbon and you can expect it to be busy. I recommend getting here as early as possible. After visiting Obidos, we also visited the famous Alcobaca Monastery.</span></p><span data-dcnode-id="1406" instrument_node="">
</span><p data-dcnode-id="1398"><strong data-dcnode-id="1403"><em data-dcnode-id="1404"><span data-dcnode-id="1405" instrument_node="">TIP:</span></em></strong><span data-dcnode-id="1402" instrument_node=""> So many of our readers are asking </span><strong data-dcnode-id="1400"><span data-dcnode-id="1401" instrument_node="">how to visit these stunning places in Portugal without a car</span></strong><span data-dcnode-id="1399" instrument_node="">. While you can’t see everything from this itinerary without a car, it is possible to visit places mentioned in day 3 and day 4 of this itinerary with a tour. </span></p><span data-dcnode-id="1397" instrument_node="">
</span><p data-dcnode-id="1389"><span data-dcnode-id="1396" instrument_node="">You can see Obidos, Batalha Monastery, Fatima Sanctuary, and Nazaré village with an organized small-group tour from Lisbon in one day. In that case, I recommend that you go with </span><a data-dcnode-id="1394" data-gyg-scraped="1650964269756" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/s/%3Fq%3Dobidos%26et%3D61950%26partner_id%3D6N2B5KS%26cmp%3DPortugalItinerary%26deeplink_id%3Db0dfd0ba-385e-5668-bac3-5c6da2ba10d0" rel="noreferrer noopener sponsored" target="_blank"><span data-dcnode-id="1395" instrument_node="">a small-group tour like this one</span></a><span data-dcnode-id="1393" instrument_node=""> or with </span><a data-dcnode-id="1391" data-gyg-scraped="1650964269756" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/s/%3Fq%3Dobidos%26et%3D47853%26partner_id%3D6N2B5KS%26cmp%3DPortugalItinerary%26deeplink_id%3De925c9fe-f29c-5bf4-8b94-8f3a3aab7ebb" rel="noreferrer noopener sponsored" target="_blank"><span data-dcnode-id="1392" instrument_node="">a private tour like this one</span></a><span data-dcnode-id="1390" instrument_node="">. Without any doubt, this is one of the best day trips that you can do from Lisbon.</span></p><span data-dcnode-id="1388" instrument_node="">
</span><div data-dcnode-id="1386" data-gyg-cmp="PortugalItineraryW" data-gyg-href="https://widget.getyourguide.com/default/activites.frame" data-gyg-locale-code="en-US" data-gyg-number-of-items="3" data-gyg-partner-id="6N2B5KS" data-gyg-tour-ids="61950,2683,71798" data-gyg-widget="activities" data-gyg-widget-created="1650964269877" style="height: 608px;"><iframe data-dcnode-id="1387" data-gyg-scraped="1650964270745" frameborder="0" name="GYG-a31cf207-4a5e-459d-b9f3-f91b53f9d613" scrolling="no" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widget.getyourguide.com/default/activities.frame%3Flocale_code%3Den-US%26widget%3Dactivities%26number_of_items%3D3%26cmp%3DPortugalItineraryW%26partner_id%3D6N2B5KS%26tour_ids%3D61950%252C2683%252C71798%26widget_created%3D1650964269877%26website%3Dhttps%253A%252F%252Ffullsuitcase.com%252F10-days-portugal-trip-itinerary%252F%26visitor_id%3D502F20A0E92D460B863C76800F7AF59A&amp;raw" style="border: none; position: relative; visibility: visible; display: block; margin: 0px; padding: 0px; width: 100%; height: 100%;"></iframe></div><span data-dcnode-id="1385" instrument_node="">
&nbsp;



</span><h3 data-dcnode-id="1383"><span data-dcnode-id="1384" instrument_node="">Obidos</span></h3><span data-dcnode-id="1382" instrument_node="">
</span><p data-dcnode-id="1379"><em data-dcnode-id="1380"><span data-dcnode-id="1381" instrument_node="">Driving time from Evora to Obidos – 2hrs.</span></em></p><span data-dcnode-id="1378" instrument_node="">
</span><p data-dcnode-id="1373"><span data-dcnode-id="1377" instrument_node="">The absolute&nbsp;</span><strong data-dcnode-id="1375"><span data-dcnode-id="1376" instrument_node="">must-do in Obidos is walking the city walls</span></strong><span data-dcnode-id="1374" instrument_node="">. It’s really fun and the views are spectacular; just watch your kids! The biggest part of the wall has no railings or any other kind of protection on one side.</span></p><span data-dcnode-id="1372" instrument_node="">
</span><p data-dcnode-id="1367"><span data-dcnode-id="1371" instrument_node="">Make sure to taste the specialty of the area –</span><em data-dcnode-id="1369"><span data-dcnode-id="1370" instrument_node=""> Ginja de Óbidos</span></em><span data-dcnode-id="1368" instrument_node="">&nbsp;– sour cherry liquor.</span></p><span data-dcnode-id="1366" instrument_node="">
</span><p data-dcnode-id="1363"><strong data-dcnode-id="1364"><span data-dcnode-id="1365" instrument_node="">Practical tips for Obidos:</span></strong></p><span data-dcnode-id="1362" instrument_node="">
</span><ul data-dcnode-id="1357"><li data-dcnode-id="1360"><span data-dcnode-id="1361" instrument_node="">Park your car at one of the many big parking areas outside the city gate.</span></li><li data-dcnode-id="1358"><span data-dcnode-id="1359" instrument_node="">Count 2 to 4 hours to visit Obidos. We spent 2 relaxing hours sightseeing here; this didn’t include time for lunch.</span></li></ul><span data-dcnode-id="1356" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1349"><figure class="aligncenter size-full" data-dcnode-id="1350"><noscript data-dcnode-id="1354"><span data-dcnode-id="1355" instrument_node="">&lt;img loading="lazy" width="878" height="585" src="https://fullsuitcase.com/wp-content/uploads/2017/04/Walking-on-the-city-walls-of-Obidos-in-Portugal.jpg" alt="Kids walking on the city walls of Obidos in Portugal" class="wp-image-5397" srcset="https://fullsuitcase.com/wp-content/uploads/2017/04/Walking-on-the-city-walls-of-Obidos-in-Portugal.jpg 878w, https://fullsuitcase.com/wp-content/uploads/2017/04/Walking-on-the-city-walls-of-Obidos-in-Portugal-300x200.jpg 300w, https://fullsuitcase.com/wp-content/uploads/2017/04/Walking-on-the-city-walls-of-Obidos-in-Portugal-768x512.jpg 768w, https://fullsuitcase.com/wp-content/uploads/2017/04/Walking-on-the-city-walls-of-Obidos-in-Portugal-100x67.jpg 100w" sizes="(max-width: 760px) calc(100vw - 40px), 720px"&gt;</span></noscript><img alt="Kids walking on the city walls of Obidos in Portugal" class="wp-image-5397 lazyload" data-dcnode-id="1353" data-pin-media="https://fullsuitcase.com/wp-content/uploads/2017/04/Walking-on-the-city-walls-of-Obidos-in-Portugal.jpg" data-src="https://fullsuitcase.com/wp-content/uploads/2017/04/Walking-on-the-city-walls-of-Obidos-in-Portugal.jpg.webp" data-srcset="https://fullsuitcase.com/wp-content/uploads/2017/04/Walking-on-the-city-walls-of-Obidos-in-Portugal.jpg.webp 878w, https://fullsuitcase.com/wp-content/uploads/2017/04/Walking-on-the-city-walls-of-Obidos-in-Portugal-300x200.jpg.webp 300w, https://fullsuitcase.com/wp-content/uploads/2017/04/Walking-on-the-city-walls-of-Obidos-in-Portugal-768x512.jpg.webp 768w, https://fullsuitcase.com/wp-content/uploads/2017/04/Walking-on-the-city-walls-of-Obidos-in-Portugal-100x67.jpg.webp 100w" data-trellis-processed="1" data-webp="true" height="585" id="mv-trellis-img-5" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fullsuitcase.com/wp-content/uploads/2017/04/Walking-on-the-city-walls-of-Obidos-in-Portugal.jpg.webp&amp;raw" srcset="https://fullsuitcase.com/wp-content/uploads/2017/04/Walking-on-the-city-walls-of-Obidos-in-Portugal.jpg.webp 878w, https://fullsuitcase.com/wp-content/uploads/2017/04/Walking-on-the-city-walls-of-Obidos-in-Portugal-300x200.jpg.webp 300w, https://fullsuitcase.com/wp-content/uploads/2017/04/Walking-on-the-city-walls-of-Obidos-in-Portugal-768x512.jpg.webp 768w, https://fullsuitcase.com/wp-content/uploads/2017/04/Walking-on-the-city-walls-of-Obidos-in-Portugal-100x67.jpg.webp 100w" width="878"><figcaption data-dcnode-id="1351"><span data-dcnode-id="1352" instrument_node="">Obidos</span></figcaption></figure></div><span data-dcnode-id="1348" instrument_node="">



&nbsp;
</span><div class="content_hint" data-dcnode-id="1347"></div><span data-dcnode-id="1346" instrument_node="">
</span><h3 data-dcnode-id="1344"><span data-dcnode-id="1345" instrument_node="">Alcobaça Monastery</span></h3><span data-dcnode-id="1343" instrument_node="">
</span><p data-dcnode-id="1340"><em data-dcnode-id="1341"><span data-dcnode-id="1342" instrument_node="">Driving time from Obidos to Alcobaca – 30 minutes.</span></em></p><span data-dcnode-id="1339" instrument_node="">
</span><p data-dcnode-id="1334"><span data-dcnode-id="1338" instrument_node="">Our next stop for the day was </span><strong data-dcnode-id="1336"><span data-dcnode-id="1337" instrument_node="">Alçobaca Monastery. </span></strong><span data-dcnode-id="1335" instrument_node="">Alcobaca is&nbsp;one of the oldest convents in Portugal and a UNESCO World Heritage Site.</span></p><span data-dcnode-id="1333" instrument_node="">
</span><p data-dcnode-id="1330"><strong data-dcnode-id="1331"><span data-dcnode-id="1332" instrument_node="">Practical tips for visiting Alcobaça Monastery:</span></strong></p><span data-dcnode-id="1329" instrument_node="">
</span><ul data-dcnode-id="1324"><li data-dcnode-id="1327"><span data-dcnode-id="1328" instrument_node="">Count 1-1,5hrs for a visit.</span></li><li data-dcnode-id="1325"><span data-dcnode-id="1326" instrument_node="">Take a sweater with you. Despite the fact that it was really warm outside when we visited, it was quite chilly inside the church and the cloister.</span></li></ul><span data-dcnode-id="1323" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1316"><figure class="aligncenter size-full" data-dcnode-id="1317"><noscript data-dcnode-id="1321"><span data-dcnode-id="1322" instrument_node="">&lt;img loading="lazy" width="878" height="585" src="https://fullsuitcase.com/wp-content/uploads/2017/04/Alcobaca-Monastery-in-Portugal.jpg" alt="Alcobaca Monastery in Portugal" class="wp-image-5392" srcset="https://fullsuitcase.com/wp-content/uploads/2017/04/Alcobaca-Monastery-in-Portugal.jpg 878w, https://fullsuitcase.com/wp-content/uploads/2017/04/Alcobaca-Monastery-in-Portugal-300x200.jpg 300w, https://fullsuitcase.com/wp-content/uploads/2017/04/Alcobaca-Monastery-in-Portugal-768x512.jpg 768w, https://fullsuitcase.com/wp-content/uploads/2017/04/Alcobaca-Monastery-in-Portugal-100x67.jpg 100w" sizes="(max-width: 760px) calc(100vw - 40px), 720px"&gt;</span></noscript><img alt="Alcobaca Monastery in Portugal" class="wp-image-5392 lazyload" data-dcnode-id="1320" data-pin-media="https://fullsuitcase.com/wp-content/uploads/2017/04/Alcobaca-Monastery-in-Portugal.jpg" data-src="https://fullsuitcase.com/wp-content/uploads/2017/04/Alcobaca-Monastery-in-Portugal.jpg.webp" data-srcset="https://fullsuitcase.com/wp-content/uploads/2017/04/Alcobaca-Monastery-in-Portugal.jpg.webp 878w, https://fullsuitcase.com/wp-content/uploads/2017/04/Alcobaca-Monastery-in-Portugal-300x200.jpg.webp 300w, https://fullsuitcase.com/wp-content/uploads/2017/04/Alcobaca-Monastery-in-Portugal-768x512.jpg.webp 768w, https://fullsuitcase.com/wp-content/uploads/2017/04/Alcobaca-Monastery-in-Portugal-100x67.jpg.webp 100w" data-trellis-processed="1" data-webp="true" height="585" id="mv-trellis-img-6" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fullsuitcase.com/wp-content/uploads/2017/04/Alcobaca-Monastery-in-Portugal.jpg.webp&amp;raw" srcset="https://fullsuitcase.com/wp-content/uploads/2017/04/Alcobaca-Monastery-in-Portugal.jpg.webp 878w, https://fullsuitcase.com/wp-content/uploads/2017/04/Alcobaca-Monastery-in-Portugal-300x200.jpg.webp 300w, https://fullsuitcase.com/wp-content/uploads/2017/04/Alcobaca-Monastery-in-Portugal-768x512.jpg.webp 768w, https://fullsuitcase.com/wp-content/uploads/2017/04/Alcobaca-Monastery-in-Portugal-100x67.jpg.webp 100w" width="878"><figcaption data-dcnode-id="1318"><span data-dcnode-id="1319" instrument_node="">Alcobaca Monastery</span></figcaption></figure></div><span data-dcnode-id="1315" instrument_node="">



&nbsp;
</span><div class="content_hint" data-dcnode-id="1314"></div><span data-dcnode-id="1313" instrument_node="">
</span><h4 data-dcnode-id="1311"><span data-dcnode-id="1312" instrument_node="">Where to Stay for Visiting Alcobaça, Batalha, Tomar Monasteries and Fatima</span></h4><span data-dcnode-id="1310" instrument_node="">
</span><p data-dcnode-id="1308"><span data-dcnode-id="1309" instrument_node="">To&nbsp;visit the monasteries, I recommend staying in&nbsp;the Alcobaca –&nbsp;Nazare area. There is so much to see and do that you can easily spend several days here.</span></p><span data-dcnode-id="1307" instrument_node="">
</span><p data-dcnode-id="1302"><span data-dcnode-id="1306" instrument_node="">We spent 2 nights at the</span><a data-dcnode-id="1304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.booking.com/hotel/pt/vale-d-39-azenha-amp-residences.html%3Faid%3D925665%26no_rooms%3D1%26group_adults%3D1" rel="noreferrer noopener sponsored" target="_blank"><span data-dcnode-id="1305" instrument_node="">&nbsp;beautiful hotel Vale d’Azenha</span></a><span data-dcnode-id="1303" instrument_node="">, just a few kilometers outside of Alcobaça. This modern hotel has amazing views, an infinity pool, and a really nice spa area. On top of that, they have a very good restaurant that uses fresh local ingredients; it was one of the best meals we had in Portugal.</span></p><span data-dcnode-id="1301" instrument_node="">
</span><p data-dcnode-id="1297"><span data-dcnode-id="1300" instrument_node="">Alternatively, if you prefer to stay closer to the action, you might find a bigger choice of </span><a aria-label="accommodation in the nearby coastal resort Nazaré. (opens in a new tab)" data-dcnode-id="1298" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.booking.com/city/pt/nazare.html%3Faid%3D925665%26no_rooms%3D1%26group_adults%3D1" rel="noreferrer noopener sponsored" target="_blank"><span data-dcnode-id="1299" instrument_node="">accommodation in the nearby coastal resort Nazaré.</span></a></p><span data-dcnode-id="1296" instrument_node="">
</span><div class="content_hint" data-dcnode-id="1295"></div><span data-dcnode-id="1294" instrument_node="">
</span><h2 data-dcnode-id="1292" id="day-4"><span data-dcnode-id="1293" instrument_node="">Day 4: Batalha Monastery, Grutas de Mira de Aire, Nazare</span></h2><span data-dcnode-id="1291" instrument_node="">
</span><p data-dcnode-id="1289"><span data-dcnode-id="1290" instrument_node="">Another top day in Portugal today! We had another fantastic landmark in our planning – Batalha Monastery. In addition, we visited stunning underground caves, and one of our favorite coastal towns of Portugal – Nazaré. Below, you can find more details about each of these places. Read on!</span></p><span data-dcnode-id="1288" instrument_node="">
</span><h3 data-dcnode-id="1286"><span data-dcnode-id="1287" instrument_node="">Batalha&nbsp;Monastery</span></h3><span data-dcnode-id="1285" instrument_node="">
</span><p data-dcnode-id="1282"><em data-dcnode-id="1283"><span data-dcnode-id="1284" instrument_node="">Driving time from Alcobaca to Batalha – 30 minutes.</span></em></p><span data-dcnode-id="1281" instrument_node="">
</span><p data-dcnode-id="1274"><strong data-dcnode-id="1279"><span data-dcnode-id="1280" instrument_node="">If you visit just one monastery in Portugal, make it the Batalha!</span></strong><span data-dcnode-id="1278" instrument_node=""> Do not miss </span><strong data-dcnode-id="1276"><span data-dcnode-id="1277" instrument_node="">the Unfinished Chapels</span></strong><span data-dcnode-id="1275" instrument_node="">, it’s an absolute must!</span></p><span data-dcnode-id="1273" instrument_node="">
</span><p data-dcnode-id="1259"><span data-dcnode-id="1272" instrument_node="">We chose to visit just two monasteries – </span><strong data-dcnode-id="1270"><span data-dcnode-id="1271" instrument_node="">Alcobaca</span></strong><span data-dcnode-id="1269" instrument_node=""> and </span><strong data-dcnode-id="1267"><span data-dcnode-id="1268" instrument_node="">Batalha</span></strong><span data-dcnode-id="1266" instrument_node="">. </span><strong data-dcnode-id="1264"><span data-dcnode-id="1265" instrument_node="">Tomar</span></strong><span data-dcnode-id="1263" instrument_node=""> seems to be worth a detour if you have an hour or two to spare. As for </span><strong data-dcnode-id="1261"><span data-dcnode-id="1262" instrument_node="">Fatima</span></strong><span data-dcnode-id="1260" instrument_node="">, I had read in several books and also hear from people who visited that it’s not really worth it from the touristic point of view.</span></p><span data-dcnode-id="1258" instrument_node="">
</span><p data-dcnode-id="1255"><strong data-dcnode-id="1256"><span data-dcnode-id="1257" instrument_node="">Practical tips for Batalha Monastery:</span></strong></p><span data-dcnode-id="1254" instrument_node="">
</span><ul data-dcnode-id="1247"><li data-dcnode-id="1252"><span data-dcnode-id="1253" instrument_node="">Count 2 hrs for a visit.</span></li><li data-dcnode-id="1250"><span data-dcnode-id="1251" instrument_node="">Arrive early to avoid big groups.</span></li><li data-dcnode-id="1248"><span data-dcnode-id="1249" instrument_node="">Carry&nbsp;a sweater.</span></li></ul><span data-dcnode-id="1246" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1239"><figure class="aligncenter size-full" data-dcnode-id="1240"><noscript data-dcnode-id="1244"><span data-dcnode-id="1245" instrument_node="">&lt;img loading="lazy" width="878" height="585" src="https://fullsuitcase.com/wp-content/uploads/2017/04/The-Unfinished-Chapels-in-Batalha-Monastery-one-of-absolute-highlights-of-our-10-day-trip-in-Portugal.jpg" alt="The Unfinished Chapels in Batalha Monastery - one of absolute highlights of our 10 day trip in Portugal" class="wp-image-5395" srcset="https://fullsuitcase.com/wp-content/uploads/2017/04/The-Unfinished-Chapels-in-Batalha-Monastery-one-of-absolute-highlights-of-our-10-day-trip-in-Portugal.jpg 878w, https://fullsuitcase.com/wp-content/uploads/2017/04/The-Unfinished-Chapels-in-Batalha-Monastery-one-of-absolute-highlights-of-our-10-day-trip-in-Portugal-300x200.jpg 300w, https://fullsuitcase.com/wp-content/uploads/2017/04/The-Unfinished-Chapels-in-Batalha-Monastery-one-of-absolute-highlights-of-our-10-day-trip-in-Portugal-768x512.jpg 768w, https://fullsuitcase.com/wp-content/uploads/2017/04/The-Unfinished-Chapels-in-Batalha-Monastery-one-of-absolute-highlights-of-our-10-day-trip-in-Portugal-100x67.jpg 100w" sizes="(max-width: 760px) calc(100vw - 40px), 720px"&gt;</span></noscript><img alt="The Unfinished Chapels in Batalha Monastery - one of absolute highlights of our 10 day trip in Portugal" class="wp-image-5395 lazyload" data-dcnode-id="1243" data-pin-media="https://fullsuitcase.com/wp-content/uploads/2017/04/The-Unfinished-Chapels-in-Batalha-Monastery-one-of-absolute-highlights-of-our-10-day-trip-in-Portugal.jpg" data-src="https://fullsuitcase.com/wp-content/uploads/2017/04/The-Unfinished-Chapels-in-Batalha-Monastery-one-of-absolute-highlights-of-our-10-day-trip-in-Portugal.jpg.webp" data-srcset="https://fullsuitcase.com/wp-content/uploads/2017/04/The-Unfinished-Chapels-in-Batalha-Monastery-one-of-absolute-highlights-of-our-10-day-trip-in-Portugal.jpg.webp 878w, https://fullsuitcase.com/wp-content/uploads/2017/04/The-Unfinished-Chapels-in-Batalha-Monastery-one-of-absolute-highlights-of-our-10-day-trip-in-Portugal-300x200.jpg.webp 300w, https://fullsuitcase.com/wp-content/uploads/2017/04/The-Unfinished-Chapels-in-Batalha-Monastery-one-of-absolute-highlights-of-our-10-day-trip-in-Portugal-768x512.jpg.webp 768w, https://fullsuitcase.com/wp-content/uploads/2017/04/The-Unfinished-Chapels-in-Batalha-Monastery-one-of-absolute-highlights-of-our-10-day-trip-in-Portugal-100x67.jpg.webp 100w" data-trellis-processed="1" data-webp="true" height="585" id="mv-trellis-img-7" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fullsuitcase.com/wp-content/uploads/2017/04/The-Unfinished-Chapels-in-Batalha-Monastery-one-of-absolute-highlights-of-our-10-day-trip-in-Portugal.jpg.webp&amp;raw" srcset="https://fullsuitcase.com/wp-content/uploads/2017/04/The-Unfinished-Chapels-in-Batalha-Monastery-one-of-absolute-highlights-of-our-10-day-trip-in-Portugal.jpg.webp 878w, https://fullsuitcase.com/wp-content/uploads/2017/04/The-Unfinished-Chapels-in-Batalha-Monastery-one-of-absolute-highlights-of-our-10-day-trip-in-Portugal-300x200.jpg.webp 300w, https://fullsuitcase.com/wp-content/uploads/2017/04/The-Unfinished-Chapels-in-Batalha-Monastery-one-of-absolute-highlights-of-our-10-day-trip-in-Portugal-768x512.jpg.webp 768w, https://fullsuitcase.com/wp-content/uploads/2017/04/The-Unfinished-Chapels-in-Batalha-Monastery-one-of-absolute-highlights-of-our-10-day-trip-in-Portugal-100x67.jpg.webp 100w" width="878"><figcaption data-dcnode-id="1241"><span data-dcnode-id="1242" instrument_node="">The Unfinished Chapels in Batalha </span></figcaption></figure></div><span data-dcnode-id="1238" instrument_node="">

</span><h3 data-dcnode-id="1234"><span data-dcnode-id="1235" instrument_node="">Grutas de Mira de Aire</span></h3><span data-dcnode-id="1233" instrument_node="">
</span><p data-dcnode-id="1230"><em data-dcnode-id="1231"><span data-dcnode-id="1232" instrument_node="">Driving time from Batalha to Grutas de Mira de Aire – 30 minutes.</span></em></p><span data-dcnode-id="1229" instrument_node="">
</span><p data-dcnode-id="1222"><span data-dcnode-id="1228" instrument_node="">Our second stop today was </span><strong data-dcnode-id="1226"><span data-dcnode-id="1227" instrument_node="">Parque Natural de las Sierras de Aire e Candeeiros</span></strong><span data-dcnode-id="1225" instrument_node="">, and in particular </span><strong data-dcnode-id="1223"><span data-dcnode-id="1224" instrument_node="">the caves – Grutas de Mira de Aire.</span></strong></p><span data-dcnode-id="1221" instrument_node="">
</span><p data-dcnode-id="1217"><span data-dcnode-id="1220" instrument_node="">We have visited many caves all over the world during our travels. However, I cannot remember that any of them would have been as big and as impressive as Grutas de Mira de Aire. We were a bit uncertain whether these caves were worth the detour, but yes, they absolutely are! </span><em data-dcnode-id="1218"><span data-dcnode-id="1219" instrument_node="">It was one of the highlights of our Portugal trip for the whole family!</span></em></p><span data-dcnode-id="1216" instrument_node="">
</span><p data-dcnode-id="1213"><strong data-dcnode-id="1214"><span data-dcnode-id="1215" instrument_node="">Practical information for visiting Grutas de Mira de Aire:</span></strong></p><span data-dcnode-id="1212" instrument_node="">
</span><ul data-dcnode-id="1204"><li data-dcnode-id="1207"><span data-dcnode-id="1211" instrument_node="">The caves are a bit outside the main tourist routes. You can find all the practical information on their </span><a data-dcnode-id="1209" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.grutasmiradaire.com/pt/11/contacto" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1210" instrument_node="">official website</span></a><span data-dcnode-id="1208" instrument_node="">.</span></li><li data-dcnode-id="1205"><span data-dcnode-id="1206" instrument_node="">You can only visit the caves with a guide. There is one tour hourly, at 40min after the hour.</span></li></ul><span data-dcnode-id="1203" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1196"><figure class="aligncenter size-full" data-dcnode-id="1197"><noscript data-dcnode-id="1201"><span data-dcnode-id="1202" instrument_node="">&lt;img loading="lazy" width="878" height="585" src="https://fullsuitcase.com/wp-content/uploads/2017/04/Grutas-de-Mira-de-Aire-in-Central-Portugal.jpg" alt="Grutas de Mira de Aire in Central Portugal" class="wp-image-5394" srcset="https://fullsuitcase.com/wp-content/uploads/2017/04/Grutas-de-Mira-de-Aire-in-Central-Portugal.jpg 878w, https://fullsuitcase.com/wp-content/uploads/2017/04/Grutas-de-Mira-de-Aire-in-Central-Portugal-300x200.jpg 300w, https://fullsuitcase.com/wp-content/uploads/2017/04/Grutas-de-Mira-de-Aire-in-Central-Portugal-768x512.jpg 768w, https://fullsuitcase.com/wp-content/uploads/2017/04/Grutas-de-Mira-de-Aire-in-Central-Portugal-100x67.jpg 100w" sizes="(max-width: 760px) calc(100vw - 40px), 720px"&gt;</span></noscript><img alt="Grutas de Mira de Aire in Central Portugal" class="wp-image-5394 lazyload" data-dcnode-id="1200" data-pin-media="https://fullsuitcase.com/wp-content/uploads/2017/04/Grutas-de-Mira-de-Aire-in-Central-Portugal.jpg" data-src="https://fullsuitcase.com/wp-content/uploads/2017/04/Grutas-de-Mira-de-Aire-in-Central-Portugal.jpg.webp" data-srcset="https://fullsuitcase.com/wp-content/uploads/2017/04/Grutas-de-Mira-de-Aire-in-Central-Portugal.jpg.webp 878w, https://fullsuitcase.com/wp-content/uploads/2017/04/Grutas-de-Mira-de-Aire-in-Central-Portugal-300x200.jpg.webp 300w, https://fullsuitcase.com/wp-content/uploads/2017/04/Grutas-de-Mira-de-Aire-in-Central-Portugal-768x512.jpg.webp 768w, https://fullsuitcase.com/wp-content/uploads/2017/04/Grutas-de-Mira-de-Aire-in-Central-Portugal-100x67.jpg.webp 100w" data-trellis-processed="1" data-webp="true" height="585" id="mv-trellis-img-8" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fullsuitcase.com/wp-content/uploads/2017/04/Grutas-de-Mira-de-Aire-in-Central-Portugal.jpg.webp&amp;raw" srcset="https://fullsuitcase.com/wp-content/uploads/2017/04/Grutas-de-Mira-de-Aire-in-Central-Portugal.jpg.webp 878w, https://fullsuitcase.com/wp-content/uploads/2017/04/Grutas-de-Mira-de-Aire-in-Central-Portugal-300x200.jpg.webp 300w, https://fullsuitcase.com/wp-content/uploads/2017/04/Grutas-de-Mira-de-Aire-in-Central-Portugal-768x512.jpg.webp 768w, https://fullsuitcase.com/wp-content/uploads/2017/04/Grutas-de-Mira-de-Aire-in-Central-Portugal-100x67.jpg.webp 100w" width="878"><figcaption data-dcnode-id="1198"><span data-dcnode-id="1199" instrument_node="">Grutas de Mira de Aire</span></figcaption></figure></div><span data-dcnode-id="1195" instrument_node="">

</span><h3 data-dcnode-id="1191"><span data-dcnode-id="1192" instrument_node="">Nazaré</span></h3><span data-dcnode-id="1190" instrument_node="">
</span><p data-dcnode-id="1187"><em data-dcnode-id="1188"><span data-dcnode-id="1189" instrument_node="">Driving time from the caves to Nazaré – 50 minutes.</span></em></p><span data-dcnode-id="1186" instrument_node="">
</span><p data-dcnode-id="1178"><span data-dcnode-id="1185" instrument_node="">A charming little coastal town of </span><strong data-dcnode-id="1183"><span data-dcnode-id="1184" instrument_node="">Nazare</span></strong><span data-dcnode-id="1182" instrument_node=""> is a mix of old traditions and a busy beach destination. Don’t miss the </span><em data-dcnode-id="1180"><span data-dcnode-id="1181" instrument_node="">O Sitio district</span></em><span data-dcnode-id="1179" instrument_node="">&nbsp;up&nbsp;on the cliffs overlooking the city. Nazare also holds the record to the&nbsp;world’s largest&nbsp;waves. Even in calm weather, they were impressive!</span></p><span data-dcnode-id="1177" instrument_node="">
</span><p data-dcnode-id="1171"><em data-dcnode-id="1173"><strong data-dcnode-id="1175"><span data-dcnode-id="1176" instrument_node="">Tip:</span></strong><span data-dcnode-id="1174" instrument_node=""> </span></em><span data-dcnode-id="1172" instrument_node="">If visiting in summer, consider spending&nbsp;an extra day in Nazare and enjoy the beautiful beaches in the area.</span></p><span data-dcnode-id="1170" instrument_node="">
</span><p data-dcnode-id="1167"><strong data-dcnode-id="1168"><span data-dcnode-id="1169" instrument_node="">Practical information for visiting Nazaré:</span></strong></p><span data-dcnode-id="1166" instrument_node="">
</span><ul data-dcnode-id="1161"><li data-dcnode-id="1164"><span data-dcnode-id="1165" instrument_node="">Park your car in the city center and explore the town on foot.</span></li><li data-dcnode-id="1162"><span data-dcnode-id="1163" instrument_node="">You can reach the O Sitio district&nbsp;by funicular (recommended). Alternatively, you can take a car.</span></li></ul><span data-dcnode-id="1160" instrument_node="">
</span><p class="has-text-align-center has-background" data-dcnode-id="1155" style="background-color:#f9f9f9"><strong data-dcnode-id="1158"><span data-dcnode-id="1159" instrument_node="">LEARN MORE: </span></strong><a data-dcnode-id="1156" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fullsuitcase.com/visiting-nazare-portugal/"><span data-dcnode-id="1157" instrument_node="">What to Do in Nazaré</span></a></p><span data-dcnode-id="1154" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1147"><figure class="aligncenter size-full" data-dcnode-id="1148"><noscript data-dcnode-id="1152"><span data-dcnode-id="1153" instrument_node="">&lt;img loading="lazy" width="878" height="585" src="https://fullsuitcase.com/wp-content/uploads/2017/04/View-over-Nazare-in-Central-Portugal-from-funicular.jpg" alt="View over Nazare in Central Portugal from funicular" class="wp-image-5396" srcset="https://fullsuitcase.com/wp-content/uploads/2017/04/View-over-Nazare-in-Central-Portugal-from-funicular.jpg 878w, https://fullsuitcase.com/wp-content/uploads/2017/04/View-over-Nazare-in-Central-Portugal-from-funicular-300x200.jpg 300w, https://fullsuitcase.com/wp-content/uploads/2017/04/View-over-Nazare-in-Central-Portugal-from-funicular-768x512.jpg 768w, https://fullsuitcase.com/wp-content/uploads/2017/04/View-over-Nazare-in-Central-Portugal-from-funicular-100x67.jpg 100w" sizes="(max-width: 760px) calc(100vw - 40px), 720px"&gt;</span></noscript><img alt="View over Nazare in Central Portugal from funicular" class="wp-image-5396 lazyload" data-dcnode-id="1151" data-pin-media="https://fullsuitcase.com/wp-content/uploads/2017/04/View-over-Nazare-in-Central-Portugal-from-funicular.jpg" data-src="https://fullsuitcase.com/wp-content/uploads/2017/04/View-over-Nazare-in-Central-Portugal-from-funicular.jpg.webp" data-srcset="https://fullsuitcase.com/wp-content/uploads/2017/04/View-over-Nazare-in-Central-Portugal-from-funicular.jpg.webp 878w, https://fullsuitcase.com/wp-content/uploads/2017/04/View-over-Nazare-in-Central-Portugal-from-funicular-300x200.jpg.webp 300w, https://fullsuitcase.com/wp-content/uploads/2017/04/View-over-Nazare-in-Central-Portugal-from-funicular-768x512.jpg.webp 768w, https://fullsuitcase.com/wp-content/uploads/2017/04/View-over-Nazare-in-Central-Portugal-from-funicular-100x67.jpg.webp 100w" data-trellis-processed="1" data-webp="true" height="585" id="mv-trellis-img-9" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fullsuitcase.com/wp-content/uploads/2017/04/View-over-Nazare-in-Central-Portugal-from-funicular.jpg.webp&amp;raw" srcset="https://fullsuitcase.com/wp-content/uploads/2017/04/View-over-Nazare-in-Central-Portugal-from-funicular.jpg.webp 878w, https://fullsuitcase.com/wp-content/uploads/2017/04/View-over-Nazare-in-Central-Portugal-from-funicular-300x200.jpg.webp 300w, https://fullsuitcase.com/wp-content/uploads/2017/04/View-over-Nazare-in-Central-Portugal-from-funicular-768x512.jpg.webp 768w, https://fullsuitcase.com/wp-content/uploads/2017/04/View-over-Nazare-in-Central-Portugal-from-funicular-100x67.jpg.webp 100w" width="878"><figcaption data-dcnode-id="1149"><span data-dcnode-id="1150" instrument_node="">View over Nazare from funicular</span></figcaption></figure></div><span data-dcnode-id="1146" instrument_node="">
