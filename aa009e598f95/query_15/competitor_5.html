</span><p data-dcnode-id="1738"><em data-dcnode-id="1739"><span data-dcnode-id="1743" instrument_node="">Are you planning a trip to Iceland and looking for </span><strong data-dcnode-id="1741"><span data-dcnode-id="1742" instrument_node="">the best Iceland itinerary</span></strong><span data-dcnode-id="1740" instrument_node="">? This guide will give you a good overview of some of the best itineraries for any trip to Iceland. Take a look!</span></em></p><span data-dcnode-id="1737" instrument_node="">
</span><p data-dcnode-id="1732"><span data-dcnode-id="1736" instrument_node="">Every day I get reader questions about </span><strong data-dcnode-id="1734"><span data-dcnode-id="1735" instrument_node="">how to plan their Iceland itinerary</span></strong><span data-dcnode-id="1733" instrument_node="">… You may have seen articles claiming they have the best Iceland itinerary for X days for any season, but in reality, it’s not possible. Just one example – Iceland in winter or in summer is like two different countries… The weather is different, the sights are more or less accessible, and the daylight time varies from just 3 to 24 hours…</span></p><span data-dcnode-id="1731" instrument_node="">
</span><p data-dcnode-id="1719"><strong data-dcnode-id="1720"><span data-dcnode-id="1730" instrument_node="">So the best Iceland itinerary for your trip will depend a lot on </span><em data-dcnode-id="1728"><span data-dcnode-id="1729" instrument_node="">when</span></em><span data-dcnode-id="1727" instrument_node=""> you travel, </span><em data-dcnode-id="1725"><span data-dcnode-id="1726" instrument_node="">how much time</span></em><span data-dcnode-id="1724" instrument_node=""> you have, and of course on your </span><em data-dcnode-id="1722"><span data-dcnode-id="1723" instrument_node="">interests</span></em><span data-dcnode-id="1721" instrument_node="">.</span></strong></p><span data-dcnode-id="1718" instrument_node="">
</span><p data-dcnode-id="1710"><span data-dcnode-id="1717" instrument_node="">While there is no one Iceland itinerary that fits it all, I created </span><strong data-dcnode-id="1715"><span data-dcnode-id="1716" instrument_node="">several suggested Iceland road trip itineraries</span></strong><span data-dcnode-id="1714" instrument_node=""> for different durations. This article covers </span><strong data-dcnode-id="1712"><span data-dcnode-id="1713" instrument_node="">some of the most popular Iceland trip itineraries for 1, 2, 3, 4, 5, 6 days, a week, 10 days, and 14 days</span></strong><span data-dcnode-id="1711" instrument_node="">. </span></p><span data-dcnode-id="1709" instrument_node="">
</span><p data-dcnode-id="1707"><span data-dcnode-id="1708" instrument_node="">These Iceland itineraries are meant to show you what’s worth visiting the most and how much time it normally takes to see it all with regular sightseeing days of about 8-10 hours.</span></p><span data-dcnode-id="1706" instrument_node="">
</span><div class="content_hint" data-dcnode-id="1705"></div><span data-dcnode-id="1704" instrument_node="">
</span><p data-dcnode-id="1696"><span data-dcnode-id="1703" instrument_node="">We’ve been to Iceland multiple times and did several road trips in different seasons. So these </span><strong data-dcnode-id="1701"><span data-dcnode-id="1702" instrument_node="">suggested Iceland trip itineraries</span></strong><span data-dcnode-id="1700" instrument_node=""> are based on our experience. We highly recommend that you</span><a data-dcnode-id="1698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rentalcars.com/CountryLandingPage.do%3FcountryCode%3Dis%26affiliateCode%3Dfullsuitcase%26preflang%3D%26adcamp%3DIcelandItinerary" rel="noreferrer noopener sponsored nofollow" target="_blank"><span data-dcnode-id="1699" instrument_node=""> rent a car</span></a><span data-dcnode-id="1697" instrument_node=""> and explore Iceland on a self-drive road trip.</span></p><span data-dcnode-id="1695" instrument_node="">
</span><p data-dcnode-id="1684"><span data-dcnode-id="1694" instrument_node="">The shorter trip itineraries – up to one week – only focus on </span><em data-dcnode-id="1692"><span data-dcnode-id="1693" instrument_node="">Reykjavik and South Iceland</span></em><span data-dcnode-id="1691" instrument_node=""> and can be done in any season. If you are traveling in the dark season, you can also expect to see the </span><a data-dcnode-id="1689" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fullsuitcase.com/northern-lights-iceland/"><span data-dcnode-id="1690" instrument_node="">Northern Lights in Iceland </span></a><span data-dcnode-id="1688" instrument_node="">following those itineraries. The longer road trips – </span><em data-dcnode-id="1686"><span data-dcnode-id="1687" instrument_node="">10-day trips and the 14-day complete Iceland Ring Road tour including the Westfjords</span></em><span data-dcnode-id="1685" instrument_node=""> – are recommended in summer only.</span></p><span data-dcnode-id="1683" instrument_node="">
</span><p data-dcnode-id="1678"><span data-dcnode-id="1682" instrument_node="">I included </span><a data-dcnode-id="1680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fullsuitcase.com/iceland-top-places/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1681" instrument_node="">the most beautiful places of Iceland</span></a><span data-dcnode-id="1679" instrument_node=""> in each Iceland itinerary (as much as possible, depending on the duration). That way you can get the most out of your trip, no matter how much time you have in Iceland, or in which season you travel. Find out!</span></p><span data-dcnode-id="1677" instrument_node="">
</span><div class="content_hint" data-dcnode-id="1676"></div><span data-dcnode-id="1675" instrument_node="">
</span><h3 data-dcnode-id="1673"><span data-dcnode-id="1674" instrument_node="">How much time do you need in Iceland?</span></h3><span data-dcnode-id="1672" instrument_node="">
</span><p data-dcnode-id="1667"><span data-dcnode-id="1671" instrument_node="">Iceland is worth a longer trip than just a day or two and 4 days is an absolute minimum for Reykjavik and the </span><a data-dcnode-id="1669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fullsuitcase.com/iceland-south-coast/"><span data-dcnode-id="1670" instrument_node="">South Coast</span></a><span data-dcnode-id="1668" instrument_node="">. However, no matter whether you’re traveling – in summer or in winter – I recommend planning at least 5-7 days if you want to see some of the main highlights of Iceland. With 10 days, you could drive the entire Ring Road, whereas in two weeks, you could see all the main places in Iceland and get a bit off the beaten path.</span></p><span data-dcnode-id="1666" instrument_node="">
</span><p data-dcnode-id="1664"><span data-dcnode-id="1665" instrument_node="">Nevertheless, I know that Iceland has become a popular stopover destination and there are also many people looking for suggestions on what to see and do in Iceland in just one, two, or three days.</span></p><span data-dcnode-id="1663" instrument_node="">
</span><p data-dcnode-id="1655"><span data-dcnode-id="1662" instrument_node="">So in this post, </span><strong data-dcnode-id="1657"><span data-dcnode-id="1661" instrument_node="">we share suggestions for </span><em data-dcnode-id="1659"><span data-dcnode-id="1660" instrument_node="">any</span></em><span data-dcnode-id="1658" instrument_node=""> Iceland itinerary. </span></strong><span data-dcnode-id="1656" instrument_node="">Whether you have just a few days or a few weeks in Iceland, this article will help you plan your trip. Find out!</span></p><span data-dcnode-id="1654" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1649"><figure class="aligncenter size-full" data-dcnode-id="1650"><noscript data-dcnode-id="1652"><span data-dcnode-id="1653" instrument_node="">&lt;img width="682" height="1364" src="https://fullsuitcase.com/wp-content/uploads/2017/02/Iceland-itinerary-one-day-to-two-weeks.jpg" alt="Best Iceland itinerary - one day to two weeks" data-pin-description="Best Iceland itinerary - one day to two weeks #iceland" class="wp-image-10415" srcset="https://fullsuitcase.com/wp-content/uploads/2017/02/Iceland-itinerary-one-day-to-two-weeks.jpg 682w, https://fullsuitcase.com/wp-content/uploads/2017/02/Iceland-itinerary-one-day-to-two-weeks-150x300.jpg 150w, https://fullsuitcase.com/wp-content/uploads/2017/02/Iceland-itinerary-one-day-to-two-weeks-512x1024.jpg 512w, https://fullsuitcase.com/wp-content/uploads/2017/02/Iceland-itinerary-one-day-to-two-weeks-100x200.jpg 100w" sizes="(max-width: 760px) calc(100vw - 40px), 720px"&gt;</span></noscript><img alt="Best Iceland itinerary - one day to two weeks" class="wp-image-10415 lazyload" data-dcnode-id="1651" data-pin-description="Best Iceland itinerary - one day to two weeks #iceland" data-pin-media="https://fullsuitcase.com/wp-content/uploads/2017/02/Iceland-itinerary-one-day-to-two-weeks.jpg" data-src="https://fullsuitcase.com/wp-content/uploads/2017/02/Iceland-itinerary-one-day-to-two-weeks.jpg.webp" data-srcset="https://fullsuitcase.com/wp-content/uploads/2017/02/Iceland-itinerary-one-day-to-two-weeks.jpg.webp 682w, https://fullsuitcase.com/wp-content/uploads/2017/02/Iceland-itinerary-one-day-to-two-weeks-150x300.jpg.webp 150w, https://fullsuitcase.com/wp-content/uploads/2017/02/Iceland-itinerary-one-day-to-two-weeks-512x1024.jpg.webp 512w, https://fullsuitcase.com/wp-content/uploads/2017/02/Iceland-itinerary-one-day-to-two-weeks-100x200.jpg.webp 100w" data-trellis-processed="1" data-webp="true" height="1364" id="mv-trellis-img-2" loading="lazy" sizes="(max-width: 760px) calc(100vw 1605" instrument_node="">

</span><h2 data-dcnode-id="1594" id="1-day"><span data-dcnode-id="1595" instrument_node="">1 day stopover in Iceland – best of Reykjavik in a day</span></h2><span data-dcnode-id="1593" instrument_node="">
</span><p data-dcnode-id="1590"><strong data-dcnode-id="1591"><span data-dcnode-id="1592" instrument_node="">Day 1 : Reykjavik city tour + Blue Lagoon or 1/2 day excursion</span></strong></p><span data-dcnode-id="1589" instrument_node="">
</span><p data-dcnode-id="1587"><span data-dcnode-id="1588" instrument_node="">Reykjavik isn’t such a big city, so you can see the main highlights in just half a day:</span></p><span data-dcnode-id="1586" instrument_node="">
</span><ul data-dcnode-id="1559"><li data-dcnode-id="1578"><span data-dcnode-id="1585" instrument_node="">Walk along the waterfront and see the two main landmarks – the </span><strong data-dcnode-id="1583"><span data-dcnode-id="1584" instrument_node="">Harpa concert hall</span></strong><span data-dcnode-id="1582" instrument_node=""> and the </span><strong data-dcnode-id="1580"><span data-dcnode-id="1581" instrument_node="">Sun Voyager sculpture</span></strong><span data-dcnode-id="1579" instrument_node="">.</span></li><li data-dcnode-id="1570"><span data-dcnode-id="1577" instrument_node="">Stroll the two main shopping streets, </span><strong data-dcnode-id="1575"><span data-dcnode-id="1576" instrument_node="">Laugavegur</span></strong><span data-dcnode-id="1574" instrument_node=""> and </span><strong data-dcnode-id="1572"><span data-dcnode-id="1573" instrument_node="">Skólavörðustígur</span></strong><span data-dcnode-id="1571" instrument_node="">.</span></li><li data-dcnode-id="1565"><span data-dcnode-id="1569" instrument_node="">Visit the </span><strong data-dcnode-id="1567"><span data-dcnode-id="1568" instrument_node="">Hallgrimskirkja church</span></strong><span data-dcnode-id="1566" instrument_node=""> and make sure you go all the way to the top for the best views.</span></li><li data-dcnode-id="1560"><span data-dcnode-id="1564" instrument_node="">If you have time, you can visit one of the </span><strong data-dcnode-id="1562"><span data-dcnode-id="1563" instrument_node="">museums or fun attractions of Reykjavik</span></strong><span data-dcnode-id="1561" instrument_node="">.</span></li></ul><span data-dcnode-id="1558" instrument_node="">
</span><p data-dcnode-id="1547"><span data-dcnode-id="1557" instrument_node="">In the afternoon head to the </span><strong data-dcnode-id="1555"><span data-dcnode-id="1556" instrument_node="">Blue Lagoon</span></strong><span data-dcnode-id="1554" instrument_node=""> – the most famous hot tub of Iceland. It’s located a bit outside of the city and the best way to get there is by booking </span><a aria-label="a bus transfer from Reykjavik (opens in a new tab)" data-dcnode-id="1552" data-gyg-scraped="1650779172504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/-t230667/%3Fpartner_id%3D6N2B5KS%26cmp%3DIcelandItinerary%26deeplink_id%3Db65b4b56-99ba-53f2-bb26-1ce8e0e21874" rel="noreferrer noopener sponsored" target="_blank"><span data-dcnode-id="1553" instrument_node="">a bus transfer from Reykjavik</span></a><span data-dcnode-id="1551" instrument_node="">. Entrance tickets to the Blue Lagoon have to be booked at least a few days in advance; you can </span><a data-dcnode-id="1549" data-gyg-scraped="1650779172504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/-t393203/%3Fpartner_id%3D6N2B5KS%26cmp%3DIcelandItinerary%26deeplink_id%3Dd77e975d-13c2-5c10-8462-9821247408a9" rel="noreferrer noopener sponsored nofollow" target="_blank"><span data-dcnode-id="1550" instrument_node="">book Blue Lagoon tickets here</span></a><span data-dcnode-id="1548" instrument_node="">.</span></p><span data-dcnode-id="1546" instrument_node="">
</span><p data-dcnode-id="1537"><span data-dcnode-id="1545" instrument_node="">Alternatively, take </span><strong data-dcnode-id="1543"><span data-dcnode-id="1544" instrument_node="">a short excursion from Reykjavik</span></strong><span data-dcnode-id="1542" instrument_node=""> – there are so many amazing options! Here you can find our guide to the very best </span><a data-dcnode-id="1539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fullsuitcase.com/reykjavik-half-day-tours/"><strong data-dcnode-id="1540"><span data-dcnode-id="1541" instrument_node="">half-day tours from Reykjavik</span></strong></a><span data-dcnode-id="1538" instrument_node="">.</span></p><span data-dcnode-id="1536" instrument_node="">
</span><p data-dcnode-id="1531"><span data-dcnode-id="1535" instrument_node="">For dinner, you’ll find plenty of restaurants and pubs in the city center. Reykjavik is also famous for its nightlife. Not sure where to start? Check these great </span><a data-dcnode-id="1533" data-gyg-scraped="1650779172504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/s/%3Fq%3Dreykjavik%2520food%26partner_id%3D6N2B5KS%26cmp%3DIcelandItinerary%26deeplink_id%3Dc6599af1-25bc-5ad5-9173-6253ba41c0b1" rel="noreferrer noopener sponsored" target="_blank"><span data-dcnode-id="1534" instrument_node="">Icelandic food tours in Reykjavik</span></a><span data-dcnode-id="1532" instrument_node="">.</span></p><span data-dcnode-id="1530" instrument_node="">
</span><ul data-dcnode-id="1517"><li data-dcnode-id="1524"><span data-dcnode-id="1529" instrument_node="">Here you can read more about </span><a data-dcnode-id="1526" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fullsuitcase.com/reykjavik-best-things-to-do/"><strong data-dcnode-id="1527"><span data-dcnode-id="1528" instrument_node="">what to do when visiting Reykjavik</span></strong></a><span data-dcnode-id="1525" instrument_node="">.</span></li><li data-dcnode-id="1518"><span data-dcnode-id="1523" instrument_node="">Looking for the best accommodation options in Reykjavik? Check our </span><a data-dcnode-id="1520" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fullsuitcase.com/best-places-to-stay-in-reykjavik/"><strong data-dcnode-id="1521"><span data-dcnode-id="1522" instrument_node="">Reykjavik hotel suggestions</span></strong></a><span data-dcnode-id="1519" instrument_node="">.</span></li></ul><span data-dcnode-id="1516" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1509"><figure class="aligncenter size-full" data-dcnode-id="1510"><noscript data-dcnode-id="1514"><span data-dcnode-id="1515" instrument_node="">&lt;img loading="lazy" width="878" height="585" src="https://fullsuitcase.com/wp-content/uploads/2017/02/Hallgrimskirkja-church-in-Reykjavik.jpg" alt="Iceland itinerary - Hallgrimskirkja church in Reykjavik" class="wp-image-5157" srcset="https://fullsuitcase.com/wp-content/uploads/2017/02/Hallgrimskirkja-church-in-Reykjavik.jpg 878w, https://fullsuitcase.com/wp-content/uploads/2017/02/Hallgrimskirkja-church-in-Reykjavik-300x200.jpg 300w, https://fullsuitcase.com/wp-content/uploads/2017/02/Hallgrimskirkja-church-in-Reykjavik-768x512.jpg 768w, https://fullsuitcase.com/wp-content/uploads/2017/02/Hallgrimskirkja-church-in-Reykjavik-100x67.jpg 100w" sizes="(max-width: 760px) calc(100vw - 40px), 720px"&gt;</span></noscript><img alt="Iceland itinerary - Hallgrimskirkja church in Reykjavik" class="wp-image-5157 lazyload" data-dcnode-id="1513" data-pin-media="https://fullsuitcase.com/wp-content/uploads/2017/02/Hallgrimskirkja-church-in-Reykjavik.jpg" data-src="https://fullsuitcase.com/wp-content/uploads/2017/02/Hallgrimskirkja-church-in-Reykjavik.jpg.webp" data-srcset="https://fullsuitcase.com/wp-content/uploads/2017/02/Hallgrimskirkja-church-in-Reykjavik.jpg.webp 878w, https://fullsuitcase.com/wp-content/uploads/2017/02/Hallgrimskirkja-church-in-Reykjavik-300x200.jpg.webp 300w, https://fullsuitcase.com/wp-content/uploads/2017/02/Hallgrimskirkja-church-in-Reykjavik-768x512.jpg.webp 768w, https://fullsuitcase.com/wp-content/uploads/2017/02/Hallgrimskirkja-church-in-Reykjavik-100x67.jpg.webp 100w" data-trellis-processed="1" data-webp="true" height="585" id="mv-trellis-img-3" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fullsuitcase.com/wp-content/uploads/2017/02/Hallgrimskirkja-church-in- </span><div class="content_hint" data-dcnode-id="1507"></div><span data-dcnode-id="1506" instrument_node="">
</span><h2 data-dcnode-id="1504" id="2-days"><span data-dcnode-id="1505" instrument_node="">How to spend two days in Iceland (no car needed)</span></h2><span data-dcnode-id="1503" instrument_node="">
</span><p data-dcnode-id="1495"><strong data-dcnode-id="1501"><span data-dcnode-id="1502" instrument_node="">Day 1:</span></strong><span data-dcnode-id="1500" instrument_node=""> Reykjavik city tour + Blue Lagoon</span><br data-dcnode-id="1499"><strong data-dcnode-id="1497"><span data-dcnode-id="1498" instrument_node="">Day 2:</span></strong><span data-dcnode-id="1496" instrument_node=""> The Golden Circle or South Coast</span></p><span data-dcnode-id="1494" instrument_node="">
</span><p data-dcnode-id="1492"><span data-dcnode-id="1493" instrument_node="">If you have two days in Iceland, spend one day in Reykjavik and the Blue Lagoon (as described above), and the second day exploring outside the city.</span></p><span data-dcnode-id="1491" instrument_node="">
</span><p data-dcnode-id="1480"><span data-dcnode-id="1490" instrument_node="">The most popular day trip from Reykjavik is a visit to the area called the </span><strong data-dcnode-id="1488"><span data-dcnode-id="1489" instrument_node="">Golden Circle</span></strong><span data-dcnode-id="1487" instrument_node="">. It includes a visit to Thingvellir National Park, Gullfoss waterfall, and the Geysir area. You can do this tour by car, but if you don’t feel like renting a car for just a day, you can easily book one of the organized tours. Here you can book a </span><a data-dcnode-id="1485" data-gyg-scraped="1650779172504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/-t67012/%3Fpartner_id%3D6N2B5KS%26cmp%3DIcelandItineraries%26deeplink_id%3D1c584836-218b-5a3e-9547-a79c428714cb" rel="noreferrer noopener sponsored" target="_blank"><span data-dcnode-id="1486" instrument_node="">highly-rated Golden Circle group tour</span></a><span data-dcnode-id="1484" instrument_node=""> or a </span><a aria-label="private tour (opens in a new tab)" data-dcnode-id="1482" data-gyg-scraped="1650779172504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/-t93498/%3Fpartner_id%3D6N2B5KS%26cmp%3DIcelandItinerarySuggestions%26deeplink_id%3D8b66162b-1bef-5352-b50d-e55687b64f94" rel="noreferrer noopener sponsored" target="_blank"><span data-dcnode-id="1483" instrument_node="">private tour</span></a><span data-dcnode-id="1481" instrument_node="">.</span></p><span data-dcnode-id="1479" instrument_node="">
</span><p data-dcnode-id="1471"><span data-dcnode-id="1478" instrument_node="">Some of the Golden Circle tours offer combination tours that include food tasting, whale watching, geothermal lagoons, or Northern Lights viewing (in winter). You can find </span><a data-dcnode-id="1476" data-gyg-scraped="1650779172504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/s/%3Fq%3DGolden%2520Circle%26partner_id%3D6N2B5KS%26cmp%3DIcelandItineraries%26deeplink_id%3Db593fc32-f184-5040-ac2b-a9b485e3e17d" rel="noreferrer noopener sponsored" target="_blank"><span data-dcnode-id="1477" instrument_node="">the best Golden Circle tour options here</span></a><span data-dcnode-id="1475" instrument_node=""> or check our hand-picked selection of the </span><a data-dcnode-id="1473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fullsuitcase.com/best-iceland-tours/"><span data-dcnode-id="1474" instrument_node="">best day trips from Reykjavik</span></a><span data-dcnode-id="1472" instrument_node="">.</span></p><span data-dcnode-id="1470" instrument_node="">
</span><p data-dcnode-id="1466"><strong data-dcnode-id="1468"><span data-dcnode-id="1469" instrument_node="">South Coast</span></strong><span data-dcnode-id="1467" instrument_node=""> is another extremely popular day trip – more information further below. </span></p><span data-dcnode-id="1465" instrument_node="">
</span><p data-dcnode-id="1458"><strong data-dcnode-id="1463"><span data-dcnode-id="1464" instrument_node="">South Coast and Jokulsarlon. </span></strong><span data-dcnode-id="1462" instrument_node="">Alternatively, you can opt for a </span><a aria-label="tour of the South Coast and Jokulsarlon Glacier Lagoon (opens in a new tab)" data-dcnode-id="1460" data-gyg-scraped="1650779172504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/-t67020/%3Fpartner_id%3D6N2B5KS%26cmp%3DIcelandItineraries%26deeplink_id%3D03a7eef1-cc9c-55ea-925b-dc7ebccb659d" rel="noreferrer noopener sponsored" target="_blank"><span data-dcnode-id="1461" instrument_node="">tour of the South Coast and Jokulsarlon Glacier Lagoon</span></a><span data-dcnode-id="1459" instrument_node="">. This tour covers all the main highlights of the South Coast, but also goes all the way to Jokulsarlon. However, it’s a very long tour of 14 hours. It’s good for those who have little time in Iceland and want to get the absolute most of their trip and don’t mind a long day on a bus.</span></p><span data-dcnode-id="1457" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1450"><figure class="aligncenter size-full" data-dcnode-id="1451"><noscript data-dcnode-id="1455"><span data-dcnode-id="1456" instrument_node="">&lt;img loading="lazy" width="878" height="585" src="https://fullsuitcase.com/wp-content/uploads/2016/09/Oxararfoss-waterfall-in-Thingvellir-NP-Iceland-in-winter.jpg" alt="Iceland road trip itinerary suggestions" class="wp-image-9126" srcset="https://fullsuitcase.com/wp-content/uploads/2016/09/Oxararfoss-waterfall-in-Thingvellir-NP-Iceland-in-winter.jpg 878w, https://fullsuitcase.com/wp-content/uploads/2016/09/Oxararfoss-waterfall-in-Thingvellir-NP-Iceland-in-winter-300x200.jpg 300w, https://fullsuitcase.com/wp-content/uploads/2016/09/Oxararfoss-waterfall-in-Thingvellir-NP-Iceland-in-winter-768x512.jpg 768w, https://fullsuitcase.com/wp-content/uploads/2016/09/Oxararfoss-waterfall-in-Thingvellir-NP-Iceland-in-winter-100x67.jpg 100w" sizes="(max-width: 760px) calc(100vw - 40px), 720px"&gt;</span></noscript><img alt="Iceland road trip itinerary suggestions" class="wp-image-9126 lazyload" data-dcnode-id="1454" data-pin-media="https://fullsuitcase.com/wp-content/uploads/2016/09/Oxararfoss-waterfall-in-Thingvellir-NP-Iceland-in-winter.jpg" data-src="https://fullsuitcase.com/wp-content/uploads/2016/09/Oxararfoss-waterfall-in-Thingvellir-NP-Iceland-in-winter.jpg.webp" data-srcset="https://fullsuitcase.com/wp-content/uploads/2016/09/Oxararfoss-waterfall-in-Thingvellir-NP-Iceland-in-winter.jpg.webp 878w, https://fullsuitcase.com/wp-content/uploads/2016/09/Oxararfoss-waterfall-in-Thingvellir-NP-Iceland-in-winter-300x200.jpg.webp 300w, https://fullsuitcase.com/wp-content/uploads/2016/09/Oxararfoss-waterfall-in-Thingvellir-NP-Iceland-in-winter-768x512.jpg.webp 768w, https://fullsuitcase.com/wp-content/uploads/2016/09/Oxararfoss-waterfall-in-Thingvellir-NP-Iceland-in-winter-100x67.jpg.webp 100w" data-trellis-processed="1" data-webp="true" height="585" id="mv-trellis-img-4" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fullsuitcase.com/wp-content/uploads/2016/09/Oxararfoss-waterfall-in-Thingvellir-NP-Iceland-in-winter.jpg.webp&amp;raw" srcset="https://fullsuitcase.com/wp-content/uploads/2016/09/Oxararfoss-waterfall-in-Thingvellir-NP-Iceland-in-winter.jpg.webp 878w, https://fullsuitcase.com/wp-content/uploads/2016/09/Oxararfoss-waterfall-in-Thingvellir-NP-Iceland-in-winter-300x200.jpg.webp 300w, https://fullsuitcase.com/wp-content/uploads/2016/09/Oxararfoss-waterfall-in-Thingvellir-NP-Iceland-in-winter-768x512.jpg.webp 768w, https://fullsuitcase.com/wp-content/uploads/2016/09/Oxararfoss-waterfall-in-Thingvellir-NP-Iceland-in-winter-100x67.jpg.webp 100w" width="878"><figcaption data-dcnode-id="1452"><span data-dcnode-id="1453" instrument_node="">Oxararfoss waterfall in Thingvellir NP</span></figcaption></figure></div><span data-dcnode-id="1449" instrument_node="">



&nbsp;
</span><div class="content_hint" data-dcnode-id="1448"></div><span data-dcnode-id="1447" instrument_node="">
</span><h2 data-dcnode-id="1445" id="3-days"><span data-dcnode-id="1446" instrument_node="">Iceland itinerary for three days (no rental car needed)</span></h2><span data-dcnode-id="1444" instrument_node="">
</span><p data-dcnode-id="1432"><strong data-dcnode-id="1442"><span data-dcnode-id="1443" instrument_node="">Day 1: </span></strong><span data-dcnode-id="1441" instrument_node="">Reykjavik city tour + Blue Lagoon</span><br data-dcnode-id="1440"><strong data-dcnode-id="1438"><span data-dcnode-id="1439" instrument_node="">Day 2: </span></strong><span data-dcnode-id="1437" instrument_node="">Golden Circle</span><br data-dcnode-id="1436"><strong data-dcnode-id="1434"><span data-dcnode-id="1435" instrument_node="">Day 3: </span></strong><span data-dcnode-id="1433" instrument_node="">South Coast</span></p><span data-dcnode-id="1431" instrument_node="">
</span><p data-dcnode-id="1423"><span data-dcnode-id="1430" instrument_node="">If you have three days in Iceland, you definitely should try to take </span><a data-dcnode-id="1428" data-gyg-scraped="1650779172504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/s/%3Fq%3DSouth_coast_of_Iceland%26et%3D67018%26partner_id%3D6N2B5KS%26cmp%3DIcelandItinerarySuggestions%26deeplink_id%3Da5e0b513-8952-5d94-8f08-d4cb3b336ab7" rel="noreferrer noopener sponsored" target="_blank"><span data-dcnode-id="1429" instrument_node="">a tour of the South Coast</span></a><span data-dcnode-id="1427" instrument_node="">. The highlights include the&nbsp;</span><strong data-dcnode-id="1425"><span data-dcnode-id="1426" instrument_node="">black sand beaches of Vik, Skogafoss and Seljalandsfoss waterfalls,</span></strong><span data-dcnode-id="1424" instrument_node=""> and also glaciers. </span></p><span data-dcnode-id="1422" instrument_node="">
</span><p data-dcnode-id="1414"><span data-dcnode-id="1421" instrument_node="">Here is </span><a data-dcnode-id="1419" data-gyg-scraped="1650779172504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/-t67018/%3Fpartner_id%3D6N2B5KS%26cmp%3DIcelandItineraries%26deeplink_id%3Dd0feccc2-779a-54a5-a418-3ecc19344a6b" rel="noreferrer noopener sponsored" target="_blank"><span data-dcnode-id="1420" instrument_node="">the best price-quality day trip to South Coast&nbsp;</span></a><span data-dcnode-id="1418" instrument_node="">that I found. Alternatively, check out</span><a aria-label=" this tour (opens in a new tab)" data-dcnode-id="1416" data-gyg-scraped="1650779172504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/-t148457/%3Fpartner_id%3D6N2B5KS%26cmp%3DIcelandItineraries%26deeplink_id%3D43fdb493-a98b-53fb-a603-1ab88f8eedbd" rel="noreferrer noopener sponsored" target="_blank"><span data-dcnode-id="1417" instrument_node=""> this tour</span></a><span data-dcnode-id="1415" instrument_node=""> – it is more expensive, but it includes glacier hiking as well.</span></p><span data-dcnode-id="1413" instrument_node="">
</span><p data-dcnode-id="1408"><span data-dcnode-id="1412" instrument_node="">Alternatively, you can opt for a </span><a data-dcnode-id="1410" data-gyg-scraped="1650779172504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/-t67020/%3Fpartner_id%3D6N2B5KS%26cmp%3DIcelandItineraries%26deeplink_id%3D03a7eef1-cc9c-55ea-925b-dc7ebccb659d" rel="noreferrer noopener sponsored" target="_blank"><span data-dcnode-id="1411" instrument_node="">South Iceland tour that takes you all the way to Jokulsarlon glacier lagoon</span></a><span data-dcnode-id="1409" instrument_node="">, but it will be a very long day with lots of driving.</span></p><span data-dcnode-id="1407" instrument_node="">
</span><p data-dcnode-id="1399"><strong data-dcnode-id="1404"><em data-dcnode-id="1405"><span data-dcnode-id="1406" instrument_node="">Good to know: </span></em></strong><span data-dcnode-id="1403" instrument_node="">If you have three days in Iceland (and you are not traveling in winter), you can do this tour with a rental car. If you rent a car, consider </span><a data-dcnode-id="1401" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.booking.com/city/is/hveragerdi.html%3Faid%3D925665" rel="noreferrer noopener sponsored" target="_blank"><span data-dcnode-id="1402" instrument_node="">staying in Hvergaderi area</span></a><span data-dcnode-id="1400" instrument_node=""> after you visit the Golden Circle, instead of heading back to Reykjavik. It will save you quite some driving time. If you do this, you can easily add a glacier hike to your day 3 itinerary as well.</span></p><span data-dcnode-id="1398" instrument_node="">
</span><p data-dcnode-id="1393"><span data-dcnode-id="1397" instrument_node="">Alternatively, if you only have 1-3 days in Iceland, you can also stay in the city and make </span><a data-dcnode-id="1395" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fullsuitcase.com/best-iceland-tours/"><span data-dcnode-id="1396" instrument_node="">day trips from Reykjavik</span></a><span data-dcnode-id="1394" instrument_node="">. Most day tours will pick you up at the hotel in Reykjavik or in the city center.</span></p><span data-dcnode-id="1392" instrument_node="">
</span><p class="has-text-align-center has-background" data-dcnode-id="1387" style="background-color:#f9f9f9"><strong data-dcnode-id="1388"><span data-dcnode-id="1391" instrument_node="">READ ALSO: </span><a data-dcnode-id="1389" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fullsuitcase.com/iceland-south-coast/"><span data-dcnode-id="1390" instrument_node="">Iceland South Coast: Best Sights &amp; Attractions</span></a></strong></p><span data-dcnode-id="1386" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1379"><figure class="aligncenter size-full" data-dcnode-id="1380"><noscript data-dcnode-id="1384"><span data-dcnode-id="1385" instrument_node="">&lt;img loading="lazy" width="878" height="585" src="https://fullsuitcase.com/wp-content/uploads/2017/02/Scenery-along-South-Coast-Iceland.jpg" alt="Scenery along South Coast Iceland" class="wp-image-5155" srcset="https://fullsuitcase.com/wp-content/uploads/2017/02/Scenery-along-South-Coast-Iceland.jpg 878w, https://fullsuitcase.com/wp-content/uploads/2017/02/Scenery-along-South-Coast-Iceland-300x200.jpg 300w, https://fullsuitcase.com/wp-content/uploads/2017/02/Scenery-along-South-Coast-Iceland-768x512.jpg 768w, https://fullsuitcase.com/wp-content/uploads/2017/02/Scenery-along-South-Coast-Iceland-100x67.jpg 100w" sizes="(max-width: 760px) calc(100vw - 40px), 720px"&gt;</span></noscript><img alt="Scenery along South Coast Iceland" class="wp-image-5155 lazyload" data-dcnode-id="1383" data-pin-media="https://fullsuitcase.com/wp-content/uploads/2017/02/Scenery-along-South-Coast-Iceland.jpg" data-src="https://fullsuitcase.com/wp-content/uploads/2017/02/Scenery-along-South-Coast-Iceland.jpg.webp" data-srcset="https://fullsuitcase.com/wp-content/uploads/2017/02/Scenery-along-South-Coast-Iceland.jpg.webp 878w, https://fullsuitcase.com/wp-content/uploads/2017/02/Scenery-along-South-Coast-Iceland-300x200.jpg.webp 300w, https://fullsuitcase.com/wp-content/uploads/2017/02/Scenery-along-South-Coast-Iceland-768x512.jpg.webp 768w, https://fullsuitcase.com/wp-content/uploads/2017/02/Scenery-along-South-Coast-Iceland-100x67.jpg.webp 100w" data-trellis-processed="1" data-webp="true" height="585" id="mv-trellis-img-5" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fullsuitcase.com/wp-content/uploads/2017/02/Scenery-along-South-Coast-Iceland.jpg.webp&amp;raw" srcset="https://fullsuitcase.com/wp-content/uploads/2017/02/Scenery-along-South-Coast-Iceland.jpg.webp 878w, https://fullsuitcase.com/wp-content/uploads/2017/02/Scenery-along-South-Coast-Iceland-300x200.jpg.webp 300w, https://fullsuitcase.com/wp-content/uploads/2017/02/Scenery-along-South-Coast-Iceland-768x512.jpg.webp 768w, https://fullsuitcase.com/wp-content/uploads/2017/02/Scenery-along-South-Coast-Iceland-100x67.jpg.webp 100w" width="878"><figcaption data-dcnode-id="1381"><span data-dcnode-id="1382" instrument_node="">Scenery along South Coast </span></figcaption></figure></div><span data-dcnode-id="1378" instrument_node="">

</span><div class="content_hint" data-dcnode-id="1377"></div><span data-dcnode-id="1376" instrument_node="">
</span><h2 data-dcnode-id="1374" id="4-days"><span data-dcnode-id="1375" instrument_node="">Four days Iceland itinerary</span></h2><span data-dcnode-id="1373" instrument_node="">
</span><p data-dcnode-id="1357"><strong data-dcnode-id="1371"><span data-dcnode-id="1372" instrument_node="">Day 1: </span></strong><span data-dcnode-id="1370" instrument_node="">Reykjavik city tour + Blue Lagoon</span><br data-dcnode-id="1369"><strong data-dcnode-id="1367"><span data-dcnode-id="1368" instrument_node="">Day 2: </span></strong><span data-dcnode-id="1366" instrument_node="">The Golden Circle</span><br data-dcnode-id="1365"><strong data-dcnode-id="1363"><span data-dcnode-id="1364" instrument_node="">Day 3:</span></strong><span data-dcnode-id="1362" instrument_node=""> Southern Iceland – glaciers, waterfalls and beaches</span><br data-dcnode-id="1361"><strong data-dcnode-id="1359"><span data-dcnode-id="1360" instrument_node="">Day 4: </span></strong><span data-dcnode-id="1358" instrument_node="">Skaftafell National Park – Jokulsarlon – Fjallsarlon</span></p><span data-dcnode-id="1356" instrument_node="">
</span><p data-dcnode-id="1351"><span data-dcnode-id="1355" instrument_node="">If you have four days in Iceland, you’re probably better off </span><a data-dcnode-id="1353" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rentalcars.com/CountryLandingPage.do%3FcountryCode%3Dis%26affiliateCode%3Dfullsuitcase%26preflang%3D%26adcamp%3DIcelandItinerary" rel="noreferrer noopener sponsored nofollow" target="_blank"><span data-dcnode-id="1354" instrument_node="">renting a car</span></a><span data-dcnode-id="1352" instrument_node=""> and making a road trip. It’s the best way to explore the country!</span></p><span data-dcnode-id="1350" instrument_node="">
</span><p data-dcnode-id="1348"><span data-dcnode-id="1349" instrument_node="">Days 1-3 as above.</span></p><span data-dcnode-id="1347" instrument_node="">
</span><p data-dcnode-id="1333"><span data-dcnode-id="1346" instrument_node="">Day 4. Take one of the many</span><a data-dcnode-id="1344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vatnajokulsthjodgardur.is/en/areas/skaftafell/plan-your-visit/hiking" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1345" instrument_node=""> hikes in Skaftafell National Park</span></a><span data-dcnode-id="1343" instrument_node="">. Then drive to the famous glacier lagoon – </span><strong data-dcnode-id="1341"><span data-dcnode-id="1342" instrument_node="">Jokulsarlon</span></strong><span data-dcnode-id="1340" instrument_node="">. You can explore the area of the lagoon on foot or – weather permitting – take a boat tour on the glacial lake. Make sure to also visit the </span><strong data-dcnode-id="1338"><span data-dcnode-id="1339" instrument_node="">Jokulsarlon beach</span></strong><span data-dcnode-id="1337" instrument_node="">, also called the Diamond beach, and the smaller glacial lagoon </span><strong data-dcnode-id="1335"><span data-dcnode-id="1336" instrument_node="">Fjallsarlon</span></strong><span data-dcnode-id="1334" instrument_node="">.</span></p><span data-dcnode-id="1332" instrument_node="">
</span><p data-dcnode-id="1322"><strong data-dcnode-id="1329"><em data-dcnode-id="1330"><span data-dcnode-id="1331" instrument_node="">TIP: </span></em></strong><span data-dcnode-id="1328" instrument_node="">we now published a very detailed </span><strong data-dcnode-id="1324"><a data-dcnode-id="1326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fullsuitcase.com/4-days-in-iceland/"><span data-dcnode-id="1327" instrument_node="">Iceland 4 days itinerary</span></a><span data-dcnode-id="1325" instrument_node=""> </span></strong><span data-dcnode-id="1323" instrument_node="">covering all these places and more. Check it out!</span></p><span data-dcnode-id="1321" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1314"><figure class="aligncenter size-full" data-dcnode-id="1315"><noscript data-dcnode-id="1319"><span data-dcnode-id="1320" instrument_node="">&lt;img loading="lazy" width="878" height="585" src="https://fullsuitcase.com/wp-content/uploads/2017/02/Jokulsarlon-glacier-lagoon-should-be-in-any-Iceland-trip-itinerary.jpg" alt="Iceland trip itinerary - Jokulsarlon glacier lagoon is not to be missed" class="wp-image-5154" srcset="https://fullsuitcase.com/wp-content/uploads/2017/02/Jokulsarlon-glacier-lagoon-should-be-in-any-Iceland-trip-itinerary.jpg 878w, https://fullsuitcase.com/wp-content/uploads/2017/02/Jokulsarlon-glacier-lagoon-should-be-in-any-Iceland-trip-itinerary-300x200.jpg 300w, https://fullsuitcase.com/wp-content/uploads/2017/02/Jokulsarlon-glacier-lagoon-should-be-in-any-Iceland-trip-itinerary-768x512.jpg 768w, https://fullsuitcase.com/wp-content/uploads/2017/02/Jokulsarlon-glacier-lagoon-should-be-in-any-Iceland-trip-itinerary-100x67.jpg 100w" sizes="(max-width: 760px) calc(100vw - 40px), 720px"&gt;</span></noscript><img alt="Iceland trip itinerary - Jokulsarlon glacier lagoon is not to be missed" class="wp-image-5154 lazyload" data-dcnode-id="1318" data-pin-media="https://fullsuitcase.com/wp-content/uploads/2017/02/Jokulsarlon-glacier-lagoon-should-be-in-any-Iceland-trip-itinerary.jpg" data-src="https://fullsuitcase.com/wp-content/uploads/2017/02/Jokulsarlon-glacier-lagoon-should-be-in-any-Iceland-trip-itinerary.jpg.webp" data-srcset="https://fullsuitcase.com/wp-content/uploads/2017/02/Jokulsarlon-glacier-lagoon-should-be-in-any-Iceland-trip-itinerary.jpg.webp 878w, https://fullsuitcase.com/wp-content/uploads/2017/02/Jokulsarlon-glacier-lagoon-should-be-in-any-Iceland-trip-itinerary-300x200.jpg.webp 300w, https://fullsuitcase.com/wp-content/uploads/2017/02/Jokulsarlon-glacier-lagoon-should-be-in-any-Iceland-trip-itinerary-768x512.jpg.webp 768w, https://fullsuitcase.com/wp-content/uploads/2017/02/Jokulsarlon-glacier-lagoon-should-be-in-any-Iceland-trip-itinerary-100x67.jpg.webp 100w" data-trellis-processed="1" data-webp="true" height="585" id="mv-trellis-img-6" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fullsuitcase.com/wp-content/uploads/2017/02/Jokulsarlon-glacier-lagoon-should-be-in-any-Iceland-trip-itinerary.jpg.webp&amp;raw" srcset="https://fullsuitcase.com/wp-content/uploads/2017/02/Jokulsarlon-glacier-lagoon-should-be-in-any-Iceland-trip-itinerary.jpg.webp 878w, https://fullsuitcase.com/wp-content/uploads/2017/02/Jokulsarlon-glacier-lagoon-should-be-in-any-Iceland-trip-itinerary-300x200.jpg.webp 300w, https://fullsuitcase.com/wp-content/uploads/2017/02/Jokulsarlon-glacier-lagoon-should-be-in-any-Iceland-trip-itinerary-768x512.jpg.webp 768w, https://fullsuitcase.com/wp-content/uploads/2017/02/Jokulsarlon-glacier-lagoon-should-be-in-any-Iceland-trip-itinerary-100x67.jpg.webp 100w" width="878"><figcaption data-dcnode-id="1316"><span data-dcnode-id="1317" instrument_node="">Jokulsarlon glacier lagoon </span></figcaption></figure></div><span data-dcnode-id="1313" instrument_node="">



&nbsp;
</span><div class="content_hint" data-dcnode-id="1312"></div><span data-dcnode-id="1311" instrument_node="">
</span><h2 data-dcnode-id="1309" id="5-6-days"><span data-dcnode-id="1310" instrument_node="">Iceland itinerary for five to six days</span></h2><span data-dcnode-id="1308" instrument_node="">
</span><p data-dcnode-id="1306"><span data-dcnode-id="1307" instrument_node="">If you have five or six days in Iceland, you should cover all the main highlights from the 4-day Iceland itinerary mentioned above. In addition, you can add some of the following highlights to your 5-6 day Iceland itinerary:</span></p><span data-dcnode-id="1305" instrument_node="">
</span><ul data-dcnode-id="1261"><li data-dcnode-id="1300"><span data-dcnode-id="1304" instrument_node="">Visit </span><a data-dcnode-id="1302" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fullsuitcase.com/snaefellsnes-peninsula/"><span data-dcnode-id="1303" instrument_node="">Snaefellsnes Peninsula</span></a><span data-dcnode-id="1301" instrument_node=""> – one full day is a minimum.</span></li><li data-dcnode-id="1295"><span data-dcnode-id="1299" instrument_node="">Visit </span><a data-dcnode-id="1297" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fullsuitcase.com/westman-islands-iceland/"><span data-dcnode-id="1298" instrument_node="">Heimaey Island</span></a><span data-dcnode-id="1296" instrument_node=""> – it can be easily combined with your South Coast itinerary and one day is enough.</span></li><li data-dcnode-id="1287"><span data-dcnode-id="1294" instrument_node="">Visit the highlands. You can visit </span><a data-dcnode-id="1292" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fullsuitcase.com/haifoss-iceland/"><span data-dcnode-id="1293" instrument_node="">Haifoss Waterfall</span></a><span data-dcnode-id="1291" instrument_node=""> in your own car or take </span><a aria-label="a day tour to Landmannalaugar  (opens in a new tab)" data-dcnode-id="1289" data-gyg-scraped="1650779172504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/-l2243/%3Fpartner_id%3D6N2B5KS%26cmp%3DIcelandItinerary%26deeplink_id%3D30d0919a-9eb4-50c4-948d-926ed3ae1bc0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1290" instrument_node="">a day tour to Landmannalaugar </span></a><span data-dcnode-id="1288" instrument_node="">(summer only).</span></li><li data-dcnode-id="1282"><span data-dcnode-id="1286" instrument_node="">Visit </span><a data-dcnode-id="1284" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fullsuitcase.com/reykjanes-peninsula/"><span data-dcnode-id="1285" instrument_node="">Reykjanes Peninsula</span></a><span data-dcnode-id="1283" instrument_node=""> – it’s close to Reykjavik and Keflavik airport and half a day is enough for the main highlights.</span></li><li data-dcnode-id="1274"><span data-dcnode-id="1281" instrument_node="">Go </span><a data-dcnode-id="1279" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fullsuitcase.com/glacier-hike-iceland/"><span data-dcnode-id="1280" instrument_node="">glacier hiking&nbsp;</span></a><span data-dcnode-id="1278" instrument_node="">– make sure you </span><a data-dcnode-id="1276" data-gyg-scraped="1650779172504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/-t68907/%3Fpartner_id%3D6N2B5KS%26cmp%3DIcelandItinerarySuggestions%26deeplink_id%3D27129921-3fa0-574c-936f-8d29b27efd52" rel="noreferrer noopener sponsored" target="_blank"><span data-dcnode-id="1277" instrument_node="">book a tour in advance</span></a><span data-dcnode-id="1275" instrument_node="">! It only requires half a day and can be easily added to your South Coast itinerary.</span></li><li data-dcnode-id="1272"><span data-dcnode-id="1273" instrument_node="">Explore the Skaftafell National Park&nbsp;a bit more and take one or two longer hikes. We hiked to the famous Svartifoss waterfall and continued on the Sjónarnípa trail. It was definitely worth it!</span></li><li data-dcnode-id="1262"><span data-dcnode-id="1271" instrument_node="">Visit </span><a data-dcnode-id="1269" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.awin1.com/cread.php%3Fawinmid%3D5986%26awinaffid%3D313305%26clickref%3D%26p%3Dhttps%253A%252F%252Fwww.tripadvisor.com%252FAttraction_Review-g608884-d1468114-Reviews-Skogar_Museum-Skogar_South_Region.html" rel="noreferrer noopener sponsored" target="_blank"><span data-dcnode-id="1270" instrument_node="">Skogar Museum</span></a><span data-dcnode-id="1268" instrument_node="">, </span><a data-dcnode-id="1266" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.awin1.com/cread.php%3Fawinmid%3D5986%26awinaffid%3D313305%26clickref%3D%26p%3Dhttps%253A%252F%252Fwww.tripadvisor.com%252FAttraction_Review-g315850-d6781780-Reviews-Fjadrargljufur_Canyon-Kirkjubaejarklaustur_South_Region.html" rel="noreferrer noopener sponsored" target="_blank"><span data-dcnode-id="1267" instrument_node="">Fjadrargljufur Canyon</span></a><span data-dcnode-id="1265" instrument_node="">, and </span><a data-dcnode-id="1263" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.awin1.com/cread.php%3Fawinmid%3D5986%26awinaffid%3D313305%26clickref%3D%26p%3Dhttps%253A%252F%252Fwww.tripadvisor.com%252FAttraction_Review-g315850-d13148370-Reviews-Skaftareldahraun-Kirkjubaejarklaustur_South_Region.html" rel="noreferrer noopener sponsored" target="_blank"><span data-dcnode-id="1264" instrument_node="">Eldhraun lava field</span></a></li></ul><span data-dcnode-id="1260" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1253"><figure class="aligncenter size-full" data-dcnode-id="1254"><noscript data-dcnode-id="1258"><span data-dcnode-id="1259" instrument_node="">&lt;img loading="lazy" width="878" height="585" src="https://fullsuitcase.com/wp-content/uploads/2017/02/Glacier-hiking-guides-in-Iceland.jpg" alt="Glacier hiking guides in Iceland" class="wp-image-5160" srcset="https://fullsuitcase.com/wp-content/uploads/2017/02/Glacier-hiking-guides-in-Iceland.jpg 878w, https://fullsuitcase.com/wp-content/uploads/2017/02/Glacier-hiking-guides-in-Iceland-300x200.jpg 300w, https://fullsuitcase.com/wp-content/uploads/2017/02/Glacier-hiking-guides-in-Iceland-768x512.jpg 768w, https://fullsuitcase.com/wp-content/uploads/2017/02/Glacier-hiking-guides-in-Iceland-100x67.jpg 100w" sizes="(max-width: 760px) calc(100vw - 40px), 720px"&gt;</span></noscript><img alt="Glacier hiking guides in Iceland" class="wp-image-5160 lazyload" data-dcnode-id="1257" data-pin-media="https://fullsuitcase.com/wp-content/uploads/2017/02/Glacier-hiking-guides-in-Iceland.jpg" data-src="https://fullsuitcase.com/wp-content/uploads/2017/02/Glacier-hiking-guides-in-Iceland.jpg.webp" data-srcset="https://fullsuitcase.com/wp-content/uploads/2017/02/Glacier-hiking-guides-in-Iceland.jpg.webp 878w, https://fullsuitcase.com/wp-content/uploads/2017/02/Glacier-hiking-guides-in-Iceland-300x200.jpg.webp 300w, https://fullsuitcase.com/wp-content/uploads/2017/02/Glacier-hiking-guides-in-Iceland-768x512.jpg.webp 768w, https://fullsuitcase.com/wp-content/uploads/2017/02/Glacier-hiking-guides-in-Iceland-100x67.jpg.webp 100w" data-trellis-processed="1" data-webp="true" height="585" id="mv-trellis-img-7" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fullsuitcase.com/wp-content/uploads/2017/02/Glacier-hiking-guides-in-Iceland.jpg.webp&amp;raw" srcset="https://fullsuitcase.com/wp-content/uploads/2017/02/Glacier-hiking-guides-in-Iceland.jpg.webp 878w, https://fullsuitcase.com/wp-content/uploads/2017/02/Glacier-hiking-guides-in-Iceland-300x200.jpg.webp 300w, https://fullsuitcase.com/wp-content/uploads/2017/02/Glacier-hiking-guides-in-Iceland-768x512.jpg.webp 768w, https://fullsuitcase.com/wp-content/uploads/2017/02/Glacier-hiking-guides-in-Iceland-100x67.jpg.webp 100w" width="878"><figcaption data-dcnode-id="1255"><span data-dcnode-id="1256" instrument_node="">Glacier hiking is one of the nicest year-round outdoor experiences in Iceland</span></figcaption></figure></div><span data-dcnode-id="1252" instrument_node="">



&nbsp;
</span><div class="content_hint" data-dcnode-id="1251"></div><span data-dcnode-id="1250" instrument_node="">
</span><h2 data-dcnode-id="1248" id="one-week"><span data-dcnode-id="1249" instrument_node="">Iceland one week itinerary</span></h2><span data-dcnode-id="1247" instrument_node="">
</span><p data-dcnode-id="1239"><span data-dcnode-id="1246" instrument_node="">There are many ways to spend a week in Iceland. A lot depends on your interests and when you travel. In any case, Golden Circle and South Coast are a must and I highly recommend planning a day in Snaefellsnes Peninsula. In addition, consider a tour to see </span><a data-dcnode-id="1244" data-gyg-scraped="1650779172504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/s/%3Fq%3Diceland%2520whales%26partner_id%3D6N2B5KS%26cmp%3DIcelandItinerarySuggestions%26deeplink_id%3Dd4b98019-ee63-5cc7-a47f-693920ba8997" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1245" instrument_node="">whales</span></a><span data-dcnode-id="1243" instrument_node=""> and/or </span><a data-dcnode-id="1241" data-gyg-scraped="1650779172504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/s/%3Fq%3Diceland%2520puffin%26partner_id%3D6N2B5KS%26cmp%3DIcelandItinerarySuggestions%26deeplink_id%3D7adfcb16-286e-5b02-b01e-d6ca89264fa6" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1242" instrument_node="">puffins</span></a><span data-dcnode-id="1240" instrument_node="">. And I also recommend spending some time in Skaftafell National Park or exploring the glaciers of Iceland.</span></p><span data-dcnode-id="1238" instrument_node="">
</span><p data-dcnode-id="1233"><span data-dcnode-id="1237" instrument_node="">Here you can find </span><a data-dcnode-id="1235" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fullsuitcase.com/iceland-winter-trip-itinerary/"><span data-dcnode-id="1236" instrument_node="">our detailed one week Iceland winter trip itinerary</span></a><span data-dcnode-id="1234" instrument_node="">. It’s specifically tailored for short daylight hours and unpredictable roads. This itinerary is perfect for a trip between October and March.</span></p><span data-dcnode-id="1232" instrument_node="">
</span><p data-dcnode-id="1230"><span data-dcnode-id="1231" instrument_node="">In summer, the days will be much longer and so you’ll have more time to explore and/or add some additional activities to your trip – see our suggested Iceland itinerary for a summer trip below.</span></p><span data-dcnode-id="1229" instrument_node="">
</span><p data-dcnode-id="1226"><strong data-dcnode-id="1227"><span data-dcnode-id="1228" instrument_node="">If you are traveling in summer (+-May to September), your one week Iceland itinerary could look as follows:</span></strong></p><span data-dcnode-id="1225" instrument_node="">
</span><p data-dcnode-id="1193"><strong data-dcnode-id="1223"><span data-dcnode-id="1224" instrument_node="">Day 1: </span></strong><span data-dcnode-id="1222" instrument_node="">Blue Lagoon and drive to Snaefellsnes</span><br data-dcnode-id="1221"><strong data-dcnode-id="1219"><span data-dcnode-id="1220" instrument_node="">Day 2: </span></strong><a data-dcnode-id="1217" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fullsuitcase.com/snaefellsnes-peninsula/"><span data-dcnode-id="1218" instrument_node="">Snaefellsnes Peninsula</span></a><br data-dcnode-id="1216"><strong data-dcnode-id="1214"><span data-dcnode-id="1215" instrument_node="">Day 3: </span></strong><span data-dcnode-id="1213" instrument_node="">Golden Circle</span><br data-dcnode-id="1212"><strong data-dcnode-id="1210"><span data-dcnode-id="1211" instrument_node="">Day 4:</span></strong><span data-dcnode-id="1209" instrument_node=""> </span><a data-dcnode-id="1207" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fullsuitcase.com/westman-islands-iceland/"><span data-dcnode-id="1208" instrument_node="">Heimaey Island</span></a><span data-dcnode-id="1206" instrument_node=""> or Icelandic Highlands</span><br data-dcnode-id="1205"><strong data-dcnode-id="1203"><span data-dcnode-id="1204" instrument_node="">Day 5: </span></strong><span data-dcnode-id="1202" instrument_node="">South Coast</span><br data-dcnode-id="1201"><strong data-dcnode-id="1199"><span data-dcnode-id="1200" instrument_node="">Day 6:</span></strong><span data-dcnode-id="1198" instrument_node=""> Skaftafell National Park and glaciers</span><br data-dcnode-id="1197"><strong data-dcnode-id="1195"><span data-dcnode-id="1196" instrument_node="">Day 7:</span></strong><span data-dcnode-id="1194" instrument_node=""> Reykjavik (+ whale and puffin tour) or Reykjanes Peninsula</span></p><span data-dcnode-id="1192" instrument_node="">

</span><h2 data-dcnode-id="1098" id="10-days"><span data-dcnode-id="1099" instrument_node="">Iceland road trip in summer – 10 days itinerary from Akureyri to Reykjavik</span></h2><span data-dcnode-id="1097" instrument_node="">
</span><p data-dcnode-id="1092"><span data-dcnode-id="1096" instrument_node="">The first time we visited Iceland in summer, we took ten days to explore this beautiful country. This is </span><strong data-dcnode-id="1094"><span data-dcnode-id="1095" instrument_node="">our 10-day Iceland trip itinerary from Akureyri to Reykjavik in a nutshell</span></strong><span data-dcnode-id="1093" instrument_node="">. This is a more relaxed itinerary where you really have the time to explore deeper.</span></p><span data-dcnode-id="1091" instrument_node="">
</span><p data-dcnode-id="1089"><span data-dcnode-id="1090" instrument_node="">Please note that this is a summer itinerary. We visited in June, and there were still quite some places we couldn’t get to and things we couldn’t do. I would only recommend this trip in June, July or August, maybe still in September – October, but be prepared for some snow…</span></p><span data-dcnode-id="1088" instrument_node="">

57"><span data-dcnode-id="1056" instrument_node="">Day 8: </span></strong><span data-dcnode-id="1054" instrument_node="">Vik black sand beach, Skogafoos, and Seljalandsfoss waterfalls, Hekla volcano lava fields</span><strong data-dcnode-id="1051"><br data-dcnode-id="1053"><span data-dcnode-id="1052" instrument_node="">Day 9: </span></strong><span data-dcnode-id="1050" instrument_node="">The Golden Circle</span><strong data-dcnode-id="1047"><br data-dcnode-id="1049"><span data-dcnode-id="1048" instrument_node="">Day 10: </span></strong><span data-dcnode-id="1046" instrument_node="">Reykjavik</span></p><span data-dcnode-id="1044" instrument_node="">

</span><p data-dcnode-id="1029"><span data-dcnode-id="1030" instrument_node="">This is one of our favorite summer trips to Iceland. In 10 days, we visited the best places in the West, the North, and also the Highlands of Iceland.</span></p><span data-dcnode-id="1028" instrument_node="">

</span><h2 data-dcnode-id="968" id="two-weeks"><span data-dcnode-id="969" instrument_node="">Iceland Ring Road trip – two weeks Iceland itinerary</span></h2><span data-dcnode-id="967" instrument_node="">
</span><p data-dcnode-id="962"><span data-dcnode-id="966" instrument_node="">Just as the 10-day trip, </span><strong data-dcnode-id="964"><span data-dcnode-id="965" instrument_node="">the complete Iceland Ring Road trip </span></strong><span data-dcnode-id="963" instrument_node="">is best done in the warmest months +- June to September.</span></p><span data-dcnode-id="961" instrument_node="">
</span><p data-dcnode-id="956"><span data-dcnode-id="960" instrument_node="">Someone told me I shouldn’t say it’s not possible to do the whole Ring Road in winter. It’s true, it’s not impossible. However, you might face road closures and icy roads, so I do not recommend driving in the North in winter unless you are very flexible with your schedule and feel confident driving in a serious snowstorm the dark. You may want to read this post for more information about </span><a data-dcnode-id="958" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fullsuitcase.com/winter-driving-iceland/"><span data-dcnode-id="959" instrument_node="">driving in Iceland in winter</span></a><span data-dcnode-id="957" instrument_node="">.</span></p><span data-dcnode-id="955" instrument_node="">

</span><h2 data-dcnode-id="813" id="faq"><span data-dcnode-id="814" instrument_node="">Iceland itinerary FAQ</span></h2><span data-dcnode-id="812" instrument_node="">
</span><div class="schema-faq wp-block-yoast-faq-block" data-dcnode-id="764"><div class="schema-faq-section" data-dcnode-id="802" id="faq-question-1617458008805"><strong class="schema-faq-question" data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">How many days do I need in Iceland?</span></strong><span data-dcnode-id="809" instrument_node=""> </span><p class="schema-faq-answer" data-dcnode-id="804"><span data-dcnode-id="808" instrument_node="">If you are visiting Iceland for the first time, </span><strong data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">we recommend at least 5-7 days.</span></strong><span data-dcnode-id="805" instrument_node=""> This will allow you to visit Reykjavik, the Blue Lagoon, Golden Circle, and the highlights of the South Coast. In addition, you could also visit Snaefellsnes Peninsula and – depending on the season – maybe also take a day trip to the highlands.</span></p><span data-dcnode-id="803" instrument_node=""> </span></div><span data-dcnode-id="801" instrument_node=""> </span><div class="schema-faq-section" data-dcnode-id="791" id="faq-question-1617458698761"><strong class="schema-faq-question" data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">Can you do the Ring Road in Iceland in 7 days?</span></strong><span data-dcnode-id="798" instrument_node=""> </span><p class="schema-faq-answer" data-dcnode-id="793"><span data-dcnode-id="797" instrument_node="">While you can drive the entire Ring Road of Iceland in just 1 day and see the main highlights along the Ring Road in 7-8 days, </span><strong data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">we recommend at least 10 days for the Ring Road road trip</span></strong><span data-dcnode-id="794" instrument_node="">. Doing the entire Ring Road in 7 days would be very rushed and you would spend more time driving than sightseeing. 10-12 days will allow you to explore deeper, with 14 days, you could also add the Westfjords to your itinerary.</span></p><span data-dcnode-id="792" instrument_node=""> </span></div><span data-dcnode-id="790" instrument_node=""> </span><div class="schema-faq-section" data-dcnode-id="774" id="faq-question-1617458094628"><strong class="schema-faq-question" data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">What is the best month to visit Iceland?</span></strong><span data-dcnode-id="787" instrument_node=""> </span><p class="schema-faq-answer" data-dcnode-id="776"><span data-dcnode-id="786" instrument_node="">Visiting Iceland in different seasons is a very different experience. But while every season has its charms,</span><strong data-dcnode-id="784"><span data-dcnode-id="785" instrument_node=""> the best months to explore Iceland are between May and September.</span></strong><span data-dcnode-id="783" instrument_node=""> That’s when the temperatures are mild, the days are long, and driving conditions are good. If you want to explore everything and also have a chance to see the Northern Lights,</span><strong data-dcnode-id="781"><span data-dcnode-id="782" instrument_node=""> September is the very best month for the first trip to Iceland.</span></strong><span data-dcnode-id="780" instrument_node=""> Here you can read more about </span><a data-dcnode-id="778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fullsuitcase.com/iceland-in-september/"><span data-dcnode-id="779" instrument_node="">visiting Iceland in September</span></a><span data-dcnode-id="777" instrument_node="">.</span></p><span data-dcnode-id="775" instrument_node=""> </span></div><span data-dcnode-id="773" instrument_node=""> </span><div class="schema-faq-section" data-dcnode-id="766" id="faq-question-1617458293874"><strong class="schema-faq-question" data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">How much does an Iceland trip cost?</span></strong><span data-dcnode-id="770" instrument_node=""> </span><p class="schema-faq-answer" data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">Iceland is not a cheap country, but how much your trip costs depends a lot on the choices you make (hotels, rental car, tours), and also on the season when you travel. As a rule of thumb, count about 1500 USD per person per week, not including the flights. This should cover mid-budget accommodations, car rental, and daily expenses, plus one or two activities such as whale watching tour or glacier hiking.</span></p><span data-dcnode-id="767" instrument_node=""> </span></div><span data-dcnode-id="765" instrument_node=""> </span></div><span data-dcnode-id="763" instrument_node="">

</span><div class="trellis-comment-content" data-dcnode-id="519"><span data-dcnode-id="523" instrument_node="">
</span><p data-dcnode-id="521"><span data-dcnode-id="522" instrument_node="">Do you have any itinerary that includes a stay in the Blue Lagoon hotel? Would you recommend it for at least one night? Should I start or end there? Any other tips for traveling with a 6 and 7 year old?</span></p><span data-dcnode-id="520" instrument_node="">

</span><p class="trellis-comment-author" data-dcnode-id="492"><span data-dcnode-id="493" instrument_node="">Helena</span></p><span data-dcnode-id="491" instrument_node="">

</span><div data-dcnode-id="479"><span data-dcnode-id="483" instrument_node="">
</span><p data-dcnode-id="481"><span data-dcnode-id="482" instrument_node="">@Jurga, you are super helpful and thank you for all the information, we are planning on going on June 2 for 7 days. I can’t wait!</span></p><span data-dcnode-id="480" instrument_node="">

</span><div class="trellis-comment-child trellis-comment-new" data-dcnode-id="438"><span data-dcnode-id="475" instrument_node="">
</span><div class="trellis-comment-header" data-dcnode-id="464"><span data-dcnode-id="474" instrument_node="">
</span><div class="trellis-comment-text" data-dcnode-id="466"><span data-dcnode-id="473" instrument_node="">
</span><p class="trellis-comment-author" data-dcnode-id="471"><span data-dcnode-id="472" instrument_node="">Jurga</span></p><span data-dcnode-id="470" instrument_node="">
</span><p class="trellis-comment-date" data-dcnode-id="468"><span data-dcnode-id="469" instrument_node="">Monday 29th of November 2021</span></p><span data-dcnode-id="467" instrument_node="">
</span></div><span data-dcnode-id="465" instrument_node="">
</span></div><span data-dcnode-id="463" instrument_node="">
</span><div data-dcnode-id="440"><span data-dcnode-id="462" instrument_node="">
</span><p data-dcnode-id="460"><span data-dcnode-id="461" instrument_node="">Hi Helena, you can start or end ANY itinerary here since it's so close to the airport. So I'd let it depend on your flight schedule and see what fits you best. If you are renting a car, then spending a night in this area is definitely nice. And if you have some extra time, visit some of the best places of Reykjanes Peninsula nearby. </span></p><span data-dcnode-id="459" instrument_node="">
</span><p data-dcnode-id="457"><span data-dcnode-id="458" instrument_node="">I'm not so sure about staying at the Blue Lagoon Silica Hotel or the Retreat at Blue Lagoon with kids, however. Not only it's very expensive, it's also more meant for couples; I don't even think they have rooms to accommodate a family with 2 kids. But it's not adults-only, so it could work, but I think their rooms can accommodate a maximum of 2 adults and 1 child.</span></p><span data-dcnode-id="456" instrument_node="">
</span><p data-dcnode-id="454"><span data-dcnode-id="455" instrument_node="">There's another hotel nearby - Northern Light Inn - that's much more affordable and has family rooms, and they also have a shuttle to the Blue Lagoon if you don't feel like walking for 20-25 minutes (or don't have a car). But, of course, it doesn't include access to the Blue Lagoon and it's obviously not the same experience. But for the location and more relaxed atmosphere, with kids, I'd probably look into this one instead.</span></p><span data-dcnode-id="453" instrument_node="">
</span><p data-dcnode-id="451"><span data-dcnode-id="452" instrument_node="">As for any other tips with kids, try to look for local pools everywhere you go. The last time we were in Iceland with our kids, we researched local pools of every place where we stayed a night and went swimming every evening. Local pools are amazing for kids, better than the Blue Lagoon. They are cheap, you can actually swim in (or just sit in a hot tub while your kids swim), there are usually saunas too, and often also slides or floats for kids, etc. And they cost around 8-10 USD for adults, and even less for kids.</span></p><span data-dcnode-id="450" instrument_node="">
</span><p data-dcnode-id="448"><span data-dcnode-id="449" instrument_node="">In Reykjavik, check out Whales of Iceland and FlyOver Iceland, and also Perlan museum - all are great for families. Here you can find more info about the best things to do in Reykjavik.</span></p><span data-dcnode-id="447" instrument_node="">
</span><p data-dcnode-id="445"><span data-dcnode-id="446" instrument_node="">For the rest, it really depends on the time of the year when you go and how much time you have. In summer, go whale watching and try to find puffins, or maybe book a horse riding tour. You can also visit some lava caves. While natural ice caves and glacier hiking usually have age limit (minimum 8 years in most cases), you can visit some lava caves with younger kids as well.</span></p><span data-dcnode-id="444" instrument_node="">
</span><p data-dcnode-id="442"><span data-dcnode-id="443" instrument_node="">Hope this helps.
Good luck with the planning!</span></p><span data-dcnode-id="441" instrument_node="">
</span></div><span data-dcnode-id="439" instrument_node="">

</span><div class="trellis-comment-header" data-dcnode-id="423"><span data-dcnode-id="433" instrument_node="">
</span><div class="trellis-comment-text" data-dcnode-id="425"><span data-dcnode-id="432" instrument_node="">
</span><p class="trellis-comment-author" data-dcnode-id="430"><span data-dcnode-id="431" instrument_node="">Aimee</span></p><span data-dcnode-id="429" instrument_node="">
</span><p class="trellis-comment-date" data-dcnode-id="427"><span data-dcnode-id="428" instrument_node="">Monday 15th of November 2021</span></p><span data-dcnode-id="426" instrument_node="">

</span></div><span data-dcnode-id="422" instrument_node="">
</span><div class="trellis-comment-content" data-dcnode-id="417"><span data-dcnode-id="421" instrument_node="">
</span><p data-dcnode-id="419"><span data-dcnode-id="420" instrument_node="">Your website is amazing and VERY helpful.  I am planning a family trip to Iceland in June.  We plan to be there for 10 days.  We are very outdoorsy and love hiking.  I can't decide if we should do the 7 day southern route and find some off the path hiking places to go or if we should do your west/north and highlands 10 day itinerary.  My daughter really wants to do a ice cave tour and it seems as if Vik is the only place that does them in June and that isn't part of your west/north/highlands itinerary.  I also am not sure of doing the full Ring road - Id rather concentrate on more specific areas.  Seems like a lot of driving.  Any suggestions would be greatly appreciated.  We just want to see it all! Thanks again! - Aimee</span></p><span data-dcnode-id="418" instrument_node="">
</span></div><span data-dcnode-id="416" instrument_node="">
</span><div class="trellis-comment-child trellis-comment-new" data-dcnode-id="396"><span data-dcnode-id="415" instrument_node="">
</span><div class="trellis-comment-header" data-dcnode-id="404"><span data-dcnode-id="414" instrument_node="">
</span><div class="trellis-comment-text" data-dcnode-id="406"><span data-dcnode-id="413" instrument_node="">
</span><p class="trellis-comment-author" data-dcnode-id="411"><span data-dcnode-id="412" instrument_node="">Jurga</span></p><span data-dcnode-id="410" instrument_node="">
</span><p class="trellis-comment-date" data-dcnode-id="408"><span data-dcnode-id="409" instrument_node="">Tuesday 16th of November 2021</span></p><span data-dcnode-id="407" instrument_node="">
</span></div><span data-dcnode-id="405" instrument_node="">
</span></div><span data-dcnode-id="403" instrument_node="">
</span><div data-dcnode-id="398"><span data-dcnode-id="402" instrument_node="">
</span><p data-dcnode-id="400"><span data-dcnode-id="401" instrument_node="">Hi Aimee, it's always a tough decision where to go. One thing - you can't see 'everything' in Iceland in 10 days. Also, many places in the highlands might not be accessible yet (depends on when exactly you travel and how the weather is).
However, if you want to see a bit of all the main areas, consider doing the entire Ring Road. We have this 10-day Ring Road itinerary that includes all the best places. The days are endless in June and you can see and do a lot.
If you don't want to do the entire Ring Road, you can also use our 7-day itinerary and add a few nights to it at the places that interest you the most (this would be more relaxing and would allow you to explore deeper, take a few tours, etc). Vik could be a good place to add a night and you could also potentially visit part of the Westfjords from Snaefellsnes Peninsula for just 1 night or so (but you'd need a 4WD for that part and that's a big extra cost compared to a regular car). See more info here: Westfjords 1 day itinerary.
About the ice cave tour from Vik - it's, at the moment, indeed the only natural ice cave tour that runs the whole year round. But please keep in mind that it's nature and you can't know in advance how it will look like when you visit.
There is really not one 'best' itinerary and you can't go wrong with any option. Just pick the places that interest you the most and don't feel obliged to do the whole ring just because many people do it. Most often, the quieter, slower-going trips, are more enjoyable because it allows you to experience the place better. You could easily spend 3-5 days on the South Coast alone - see here for more suggestions on what to see and do on the South Coast.
Hope this helps a bit.</span></p><span data-dcnode-id="399" instrument_node="">

</span><div class="trellis-comment-content" data-dcnode-id="375"><span data-dcnode-id="379" instrument_node="">
</span><p data-dcnode-id="377"><span data-dcnode-id="378" instrument_node="">Jurga, I am very glad to have found your blog. We are traveling to Iceland for 10 days in August. We have rented a campervan from Kuku. We will have the van for 8 days and 7 nights.  We are doing the ring road west to East so that we end with two days in Reykjavik.  Your packing list and itinerary with distances is wonderful.  Is there a print version? Thank you.</span></p><span data-dcnode-id="376" instrument_node="">

</span><p class="trellis-comment-author" data-dcnode-id="346"><span data-dcnode-id="347" instrument_node="">wenlee</span></p><span data-dcnode-id="345" instrument_node="">
</span><p class="trellis-comment-date" data-dcnode-id="343"><span data-dcnode-id="344" instrument_node="">Saturday 15th of May 2021</span></p><span data-dcnode-id="342" instrument_node="">

</span></div><span data-dcnode-id="338" instrument_node="">
</span><div class="trellis-comment-content" data-dcnode-id="321"><span data-dcnode-id="337" instrument_node="">
</span><p data-dcnode-id="335"><span data-dcnode-id="336" instrument_node="">Hi Jurga,</span></p><span data-dcnode-id="334" instrument_node="">
</span><p data-dcnode-id="332"><span data-dcnode-id="333" instrument_node="">Love reading everything about Iceland, we are going this September, can't wait.</span></p><span data-dcnode-id="331" instrument_node="">
</span><p data-dcnode-id="329"><span data-dcnode-id="330" instrument_node="">We are planning a 10 days self-driving trip, does it make a difference to drive the ring road clock or counterclockwise? Most of the tour starts from the airport and to Golden Circle right away. Just wondering if most cars are going the same direction.</span></p><span data-dcnode-id="328" instrument_node="">
</span><p data-dcnode-id="326"><span data-dcnode-id="327" instrument_node="">Thanks,</span></p><span data-dcnode-id="325" instrument_node="">
</span><p data-dcnode-id="323"><span data-dcnode-id="324" instrument_node="">Wenlee</span></p><span data-dcnode-id="322" instrument_node="">
</span></div><span data-dcnode-id="320" instrument_node="">
</span><div class="trellis-comment-child trellis-comment-new" data-dcnode-id="300"><span data-dcnode-id="319" instrument_node="">
</span><div class="trellis-comment-header" data-dcnode-id="308"><span data-dcnode-id="318" instrument_node="">
</span><div class="trellis-comment-text" data-dcnode-id="310"><span data-dcnode-id="317" instrument_node="">
</span><p class="trellis-comment-author" data-dcnode-id="315"><span data-dcnode-id="316" instrument_node="">Jurga</span></p><span data-dcnode-id="314" instrument_node="">
</span><p class="trellis-comment-date" data-dcnode-id="312"><span data-dcnode-id="313" instrument_node="">Sunday 16th of May 2021</span></p><span data-dcnode-id="311" instrument_node="">
</span></div><span data-dcnode-id="309" instrument_node="">
</span></div><span data-dcnode-id="307" instrument_node="">
</span><div data-dcnode-id="302"><span data-dcnode-id="306" instrument_node="">
</span><p data-dcnode-id="304"><span data-dcnode-id="305" instrument_node="">Hi Wenlee, somehow I think that you'll enjoy your trip more if you start with the busiest places - Golden Circle and the South Coast - first and leave the rest for later. That's also what locals will always recommend and also why many tours indeed start with the Golden Circle and the South Coast first.
But apart from that, no, it doesn't really matter that much if you do our trip clockwise or anticlockwise. So if you prefer to go west and north first, you can do it too. In that case, you can start with the Snaefellsnes Peninsula - a great place to get acquainted with Iceland.
Also, traffic is not busy in Iceland at all. The busiest place is Reykjavik, but once you leave the city, it's usually very quiet. That being said, there are several ways to visit the Golden Circle and so there, you'll see people driving in all directions, depending on where they started their day. The South Coast is a very popular destination by itself, so many people drive up and down the same road without continuing their trip further east or north. So there will always be quite some traffic there, no matter which way you drive.
But the chances that everyone/anyone will do the exact same trip as you do are minimal, so it's not like you'll start in Reykjavik and keep on running into the same people along the way for the rest of the trip.
Good luck with the planning and have a great trip!</span></p><span data-dcnode-id="303" instrument_node="">
