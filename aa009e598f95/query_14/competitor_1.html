</span><div class="a-divider a-divider-section" data-dcnode-id="2704"><div class="a-divider-inner" data-dcnode-id="2705"></div></div><span data-dcnode-id="2703" instrument_node=""> </span><h2 data-dcnode-id="2701"><span data-dcnode-id="2702" instrument_node=""> Editorial Reviews </span></h2><span data-dcnode-id="2700" instrument_node=""> </span><div class="a-section a-spacing-small a-padding-base" data-dcnode-id="2599"><span data-dcnode-id="2699" instrument_node=""> </span><div class="a-row a-expander-container a-expander-extend-container" data-dcnode-id="2601"><span data-dcnode-id="2698" instrument_node=""> </span><h3 data-dcnode-id="2695"><span data-dcnode-id="2696"><span data-dcnode-id="2697" instrument_node="">Review</span></span></h3><span data-dcnode-id="2694" instrument_node=""> </span><div class="a-section a-spacing-small a-padding-small" data-dcnode-id="2644"><span data-dcnode-id="2693" instrument_node=""> </span><span data-dcnode-id="2646"><span data-dcnode-id="2692" instrument_node="">The finest guidebook ever written for the Big Island. Now you can plan your best vacation--ever. This all new sixth edition is a candid, humorous guide to everything there is to see and do on the Big Island. Best-selling author and longtime Hawai'i resident, Andrew Doughty, unlocks the secrets of an island so vast and diverse that many visitors never realize all that it has to offer. Explore with him as he reveals breathtaking trails, secluded beaches, pristine reefs, delicious places to dine, relaxing resorts, an active volcano and so much more. Every restaurant, activity provider, business and resort is reviewed personally and anonymously. This book and a rental car are all you need to discover what makes the Big Island so exciting.</span><br data-dcnode-id="2691"><br data-dcnode-id="2690"><br data-dcnode-id="2689"><br data-dcnode-id="2688"><span data-dcnode-id="2687" instrument_node="">• The most up-to-date and accurate information available anyplace with up-to-the-minute changes posted to our website</span><br data-dcnode-id="2686"><br data-dcnode-id="2685"><span data-dcnode-id="2684" instrument_node="">• Frank, brutally honest reviews of restaurants, hotels and activities show you which companies really are the best…and which to avoid--no advertisements</span><br data-dcnode-id="2683"><br data-dcnode-id="2682"><span data-dcnode-id="2681" instrument_node="">• Driving tours let you structure your trip your way, point out sights not to be missed along the way and are complemented by 120 spectacular color photographs</span><br data-dcnode-id="2680"><br data-dcnode-id="2679"><span data-dcnode-id="2678" instrument_node="">• 38 specially-created maps in an easy-to-follow format with mile markers--so you'll always know where you are on the island</span><br data-dcnode-id="2677"><br data-dcnode-id="2676"><span data-dcnode-id="2675" instrument_node="">• Clear, concise directions to those hard-to-find places such as deserted black sand beaches, tropical rain forests, hidden waterfalls, the most dramatic part of the erupting volcano, freshwater lava pools (some volcanically heated) and scores of other hidden gems listed nowhere else </span><br data-dcnode-id="2674"><br data-dcnode-id="2673"><span data-dcnode-id="2672" instrument_node="">• 28 pages on Big Island's beaches with detailed descriptions including ocean safety </span><br data-dcnode-id="2671"><br data-dcnode-id="2670"><span data-dcnode-id="2669" instrument_node="">• Over 65 pages of exciting adventures and activities</span><br data-dcnode-id="2668"><br data-dcnode-id="2667"><span data-dcnode-id="2666" instrument_node="">• Fascinating sections on Hawai'i's history, culture, language and legends</span><br data-dcnode-id="2665"><br data-dcnode-id="2664"><span data-dcnode-id="2663" instrument_node="">• Companion website with links to every business, events calendar, over 90 resort reviews complete with aerial photos--so you'll know if oceanfront really means oceanfront </span><br data-dcnode-id="2662"><br data-dcnode-id="2661"><br data-dcnode-id="2660"><br data-dcnode-id="2659"><span data-dcnode-id="2658" instrument_node="">"Hawaii The Big Island Revealed" covers it all--from the snow-covered top of Mauna Kea, to the sparkling underwater reefs. This is the best investment you can make for your Big Island visit. Whether you are a first time visitor, or a longtime kama'aina, you will find out more about the Big Island from this book than from any other source. Discover the island of your dreams with "Hawaii The Big Island Revealed."</span><br data-dcnode-id="2657"><br data-dcnode-id="2656"><br data-dcnode-id="2655"><br data-dcnode-id="2654"><span data-dcnode-id="2653" instrument_node="">"Succeeded in telling us everything there is to know about traveling on the island of Hawaii...this book is essential reading..." Library Journal</span><br data-dcnode-id="2652"><br data-dcnode-id="2651"><span data-dcnode-id="2650" instrument_node="">"A colorful book--covers it all. I was pleased by the numerous little tips that can make a trip more pleasant." The San Diego Union-Tribune</span><br data-dcnode-id="2649"><br data-dcnode-id="2648"><span data-dcnode-id="2647" instrument_node="">"Superbly researched and easy-to-read reference... It's jammed with details and maps." Houston Chronicle</span></span><span data-dcnode-id="2645" instrument_node=""> </span></div><span data-dcnode-id="2643" instrument_node=""> </span><h3 data-dcnode-id="2640"><span data-dcnode-id="2641"><span data-dcnode-id="2642" instrument_node="">Book Description</span></span></h3><span data-dcnode-id="2639" instrument_node=""> </span><div class="a-section a-spacing-small a-padding-small" data-dcnode-id="2634"><span data-dcnode-id="2638" instrument_node=""> </span><span data-dcnode-id="2636"><span data-dcnode-id="2637" instrument_node="">Most travel titles are put together in a few weeks by visiting travel writers. Wizard guidebooks take over a year to compile and the writers are residents who personally and anonymously review every facet of the island. Their maps are the best you'll find. From restaurants to helicopter companies to scuba to beaches to trails. They see it all and show you the best the island has to offer. They also reveal who's the worst and who to stay away from. All told in a frank, humorous way that keeps the reading fun.</span></span><span data-dcnode-id="2635" instrument_node=""> </span></div><span data-dcnode-id="2633" instrument_node=""> </span><div aria-expanded="false" class="a-expander-content a-expander-extend-content" data-dcnode-id="2611" style="display:none"><span data-dcnode-id="2632" instrument_node=""> </span><h3 data-dcnode-id="2629"><span data-dcnode-id="2630"><span data-dcnode-id="2631" instrument_node="">From the Inside Flap</span></span></h3><span data-dcnode-id="2628" instrument_node=""> </span><div class="a-section a-spacing-small a-padding-small" data-dcnode-id="2623"><span data-dcnode-id="2627" instrument_node=""> </span><span data-dcnode-id="2625"><span data-dcnode-id="2626" instrument_node="">Most travel titles are put together in a few weeks by visiting travel writers. Wizard guidebooks take over a year to compile and the writers are residents who personally and anonymously review every facet of the island. Their maps are the best you'll find. From restaurants to helicopter companies to scuba to beaches to trails. They see it all and show you the best the island has to offer. They also reveal who's the worst and who to stay away from. All told in a frank, humorous way that keeps the reading fun.</span></span><span data-dcnode-id="2624" instrument_node=""> </span></div><span data-dcnode-id="2622" instrument_node=""> </span><h3 data-dcnode-id="2619"><span data-dcnode-id="2620"><span data-dcnode-id="2621" instrument_node="">Excerpt. © Reprinted by permission. All rights reserved.</span></span></h3><span data-dcnode-id="2618" instrument_node=""> </span><div class="a-section a-spacing-small a-padding-small" data-dc </span><span data-dcnode-id="1737"><span data-dcnode-id="1738" instrument_node="">
  My suggestion to anyone moving to or vacationing on the Big Island: Buy the Lonely Planet guidebook, and if you have an iPhone, buy the Big Island Revealed app. I moved here 4 weeks ago, and have been using the Big Island Revealed book as my guide. I have grown increasingly frustrated with two things: (1) It is poorly organized (2) It is full of needless information, boasting about how great the author and book are, and lame jokes. Seriously, this book has gotten annoying. A few days ago, we picked up the Lonely Planet guide, and it is a breath of fresh air. After comparing the content and organization of the books, I now much prefer the Lonely Planet guide. They are about equally thorough in listing things to see and do. Big Island Revealed makes a big deal out of claiming to show you some kind of secret insider's view of the island, but after a few weeks, I honestly think this is all hype. Lonely Planet lists all of the best things we have seen and done here, and gives it to you in a much more organized and concise way. That said, I have found the Revealed iPhone app to be pretty useful, especially when I don't have a book with me. With a tap of the screen, you can see nearby attractions, restaurants, etc.

</span><span data-dcnode-id="1654"><span data-dcnode-id="1657" instrument_node="">
  I've had the pleasure of visiting the Big Island twice now, and this blue "bible" has been indispensable both times. Their reviews of various hotels, restaurants and attractions are unbiased, detailed and accurate. They are careful to highlight things that are "Not to be missed" and "Real Gems". Since most of us have finite time to explore this beautiful island, these highlights are surely appreciated. You want to spend your time relaxing? They tell you the best resort and restaurants to hang out in. You want adventure? You've found the right book since there are all manner of hikes, parasailing, volcano highlights, snorkeling, SCUBA, etc. to choose from. They even suggest places that are not on any other tour book's reviews, you know..those remote, hidden gems that only a local would even know about. You'll find them all here. Another brilliant thing about this book is that the directions to each location is very detailed, allowing little room to get lost. Mile markers along the highways and in the book keep you on track the whole way.</span><br data-dcnode-id="1656"><span data-dcnode-id="1655" instrument_node="">Don't go to the big island without this book!

</span><span data-dcnode-id="1586"><span data-dcnode-id="1589" instrument_node="">
  Wonderful guide to the Big Island! This book has it all, even a beautiful fold out map. It is highly organized in sections like "beaches", "Kona restaurants" and then "activities" and "adventures". Do you know that feeling you get when you talk to a local on vacation, and they give you all kinds of great advice for the best local spots? That feeling like you know something the other tourists don't know? This is what I feel like after reading this book. I assure you it will be tucked under my arm throughout my entire trip.</span><br data-dcnode-id="1588"><span data-dcnode-id="1587" instrument_node="">I will update this review after visiting HI. I have bookmarked several pages for trips I'm taking across the island, so I will update with my experiences in comparison to the author's perspective.

</span><span data-dcnode-id="1514"><span data-dcnode-id="1521" instrument_node="">
  The books in this series are probably the best printed option for the Hawaiian islands because most other guidebooks are just bad and outdated. This one stays fairly well updated and they claim to have all sorts of other information and updates on their site. That's sort of true and yet not entirely true.</span><br data-dcnode-id="1520"><br data-dcnode-id="1519"><span data-dcnode-id="1518" instrument_node="">Their site does offer minor updates like "Bubba's Brah is now closed" and "The Mahalo Rewards cards are no longer accepted for happy hour Chi-Chi's at the Marriott lounge" but offers little beyond that. The website tends to be just an advertisement for their other island books and phone apps.</span><br data-dcnode-id="1517"><br data-dcnode-id="1516"><span data-dcnode-id="1515" instrument_node="">It does have great info on beaches (which doesn't really change and thus makes it easier to put in a printed book) but It would be nice if it had more info on restaurants and hotels in the actual printed book. It really falls short on that sort of thing. It's still a must buy if you are going to the Big Island (all their books are must buys) but it could be so much better.

</span><span data-dcnode-id="1446"><span data-dcnode-id="1449" instrument_node="">
  I am considering a trip this year, so decided to get this book for a good souce of info on Hawaii.  The info was well written and interesting.  I am handicapped and would have liked to have some suggestions for activities for people like me.  The book is really geared towards people who are very physically active and able to hike everywhere.  Actually, as a result of this book, I am looking at other places to take my trip rather than Hawaii because I need to go where there is lots of accessible places for handicapped people like me.</span><br data-dcnode-id="1448"><span data-dcnode-id="1447" instrument_node="">At least this book helped me know what I would be getting into if I booked my trip to Hawaii.  It would have been a shame to go on the trip and then find out there were very limited activities that I could participate in.  So in this case this book saved me several hundred dollars which I would have spent on a destination I would not have enjoyed as well as I had hoped.

</span><span data-dcnode-id="1377"><span data-dcnode-id="1384" instrument_node="">
  I lived on Oahu for four years, and my wife was born and lived there until she was 23.  Neither of us had been to the Big Island, so I decided to get some guide books.  We're celebrating our 20th anniversary in Kona with a focus on SCUBA diving, so I wanted to really plan the trip.  This book was far better than the others with insightful and honest reviews of every aspect of a trip.</span><br data-dcnode-id="1383"><br data-dcnode-id="1382"><span data-dcnode-id="1381" instrument_node="">I could tell they really analyzed all facets of the Big Island for visitors.  The SCUBA section was excellent.  It was so good that I wanted to share it with my Divemaster class.  I emailed the publisher to ask for permission.  They responded quickly, politely and professionally.  They were very helpful and released the page for our use.  I also got the app for my phone in case the book isn't handy.</span><br data-dcnode-id="1380"><br data-dcnode-id="1379"><span data-dcnode-id="1378" instrument_node="">I've already recommended it to others that are traveling to Hawaii this year.

</span><span data-dcnode-id="1173"><span data-dcnode-id="1174" instrument_node="">
  I'd purchased the Fodor's and Frommer's guide books on Hawaii, which cover all islands.  Andrew Doughty's books were recommended to me by a Hawaiian lady I rented a cottage from.  I'd seen them while searching on Amazon, but I thought I could save money by buying the "all island" books instead.  Mistake.  These island specific books by Doughty are much better than the Fodor's and Frommer's "all island" books in my opinion (I bought Doughty's Big Island and Kauai books).  Not that the Fodor's or Frommer's Hawaii books were bad, they were just not nearly as good.  Doughty's recommendations helped make for an awesome family vacation on the Big Island and Kauai.  His writing is readable and entertaining.  We carried the books in the car wherever we went.  Each book has an accompanying smart phone app (sold separately for iPhone or Android) that is a great complement to the book.  It uses the phone GPS to tell you what is nearby and even shows your exact position when on a hiking trail out of cell phone coverage area!  I will be buying his Maui book (and accompanying smart phone app) before I return to Hawaii to visit that island.
