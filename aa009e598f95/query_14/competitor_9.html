een-button-corner-2" data-dcnode-id="1848"><use class="ytp-svg-shadow" data-dcnode-id="1850" href="#ytp-id-8"><path class="ytp-svg-fill" d="m 24,24 -4,0 0,2 L 26,26 l 0,-6 -2,0 0,4 0,0 z" data-dcnode-id="1851" id="ytp-id-8"></path></use><path class="ytp-svg-fill" d="m 24,24 -4,0 0,2 L 26,26 l 0,-6 -2,0 0,4 0,0 z" data-dcnode-id="1849" id="ytp-id-8"></path></g><g class="ytp-fullscreen-button-corner-3" data-dcnode-id="1844"><use class="ytp-svg-shadow" data-dcnode-id="1846" href="#ytp-id-9"><path class="ytp-svg-fill" d="M 12,20 10,20 10,26 l 6,0 0,-2 -4,0 0,-4 0,0 z" data-dcnode-id="1847" id="ytp-id-9"></path></use><path class="ytp-svg-fill" d="M 12,20 10,20 10,26 l 6,0 0,-2 -4,0 0,-4 0,0 z" data-dcnode-id="1845" id="ytp-id-9"></path></g></svg></button></div></div></div></div></div><noscript data-dcnode-id="1831"><span data-dcnode-id="1832" instrument_node="">&lt;div class="player-unavailable"&gt;&lt;h1 class="message"&gt;An error occurred.&lt;/h1&gt;&lt;div class="submessage"&gt;&lt;a href="https://www.youtube.com/watch?v=IVz_HAm1S8g" target="_blank"&gt;Try watching this video on www.youtube.com&lt;/a&gt;, or enable JavaScript if it is disabled in your browser.&lt;/div&gt;&lt;/div&gt;</span></noscript></body></html></iframe></p><span data-dcnode-id="1825" instrument_node="">
</span><h3 data-dcnode-id="1822"><strong data-dcnode-id="1823"><span data-dcnode-id="1824" instrument_node="">Disney’s Aulani Resort Review</span></strong></h3><span data-dcnode-id="1821" instrument_node="">
</span><p data-dcnode-id="1816"><span data-dcnode-id="1820" instrument_node="">Opened in 2011, </span><a data-dcnode-id="1818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.disneyaulani.com/" rel="noopener" target="_blank"><span data-dcnode-id="1819" instrument_node="">Aulani</span></a><span data-dcnode-id="1817" instrument_node=""> (pronounced ow-LAH-nee) is located on the west side of the island of Oahu in the resort community of Ko’olina. If you’re not super familiar with Hawaii, Oahu is the main island (but not the “Big Island”) and where you’ll find Honolulu (the main city and state capitol) and Waikiki (a resort/tourist oriented neighborhood in Honolulu). Daniel K Inouye International Airport (HNL) is the airport you’ll be flying in and out of (whether you’re coming from the US mainland, a neighboring island, or somewhere international).</span></p><span data-dcnode-id="1815" instrument_node="">
</span><p data-dcnode-id="1813"><span data-dcnode-id="1814" instrument_node="">Ko’olina is about 20 miles west of Honolulu, but it feels like a world away.&nbsp; While Honolulu and Waikiki are the pulse of the island, full of hustle and bustle and all manner of goings on, Ko’olina feels like a true island getaway.</span></p><span data-dcnode-id="1812" instrument_node="">
</span><p data-dcnode-id="1809"><a data-dcnode-id="1810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-11-3.png"><img alt="Disney's Aulani Resort Review" class="alignnone wp-image-7113 size-full" data-dcnode-id="1811" data-jpibfi-post-excerpt="" data-jpibfi-post-title="Aulani Resort &amp; Spa: Disney’s Resort in Hawaii" data-jpibfi-post-url="https://hulalandblog.com/disney-aulani-review/" data-jpibfi-src="https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-11-3.png" height="450" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-11-3.png&amp;raw" srcset="https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-11-3.png 700w, https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-11-3-300x193.png 300w, https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-11-3-610x392.png 610w, https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-11-3-480x309.png 480w" title="Disney's Aulani Resort Review" width="700"></a></p><span data-dcnode-id="1808" instrument_node="">
</span><h3 data-dcnode-id="1805"><b data-dcnode-id="1806"><span data-dcnode-id="1807" instrument_node="">What to Expect at Aulani</span></b></h3><span data-dcnode-id="1804" instrument_node="">
</span><p data-dcnode-id="1802"><span data-dcnode-id="1803" instrument_node="">If you know Disney at all, you probably have pretty high expectations. Disney is known for top-notch theming, world-class service, and that sprinkling of pixie dust, which is hard to describe, but you know it when you see it. Well, good news folks. Aulani won’t let you down! But it’s a different kind of magic than what you’re likely used to experiencing at the Disney parks and on the Disney Cruise Line.</span></p><span data-dcnode-id="1801" instrument_node="">
</span><p data-dcnode-id="1799"><span data-dcnode-id="1800" instrument_node="">First things first, there are obviously no theme parks in Hawaii so it’s hard to make a direct comparison between a trip to Walt Disney World or Disneyland and Aulani. The big draw to Aulani is simply BEING in Hawaii. And honestly that’s not enough for a lot of mega Disney theme park fans. But for those who enjoy a more laid back vacation (or who have simply always wanted to see Hawaii), Aulani has a lot to offer. Namely, this:</span></p><span data-dcnode-id="1798" instrument_node="">
</span><p data-dcnode-id="1796"><span data-dcnode-id="1797" instrument_node="">*It’s a world-class resort located in PARADISE. Hawaii has a reputation as being among the most beautiful places on earth and it’s not unfounded. It’s easy to say that all beach destinations are similar or that there are good beaches closer to home. Until you’ve been to Hawaii. There’s a magic to the islands, the people, and the culture that makes it like no place on earth.</span></p><span data-dcnode-id="1795" instrument_node="">
</span><p data-dcnode-id="1793"><span data-dcnode-id="1794" instrument_node="">*For being some of the most remote islands in the world, Hawaii is a relatively convenient destination coming from the mainland. Of course being a state helps with this greatly. There’s no shortage of flight routes available (and it’s only 4-5 hours from California) making it much more accessible than places like Fiji, French Polynesia, the Maldives, or the Seychelles.</span></p><span data-dcnode-id="1792" instrument_node="">
</span><p data-dcnode-id="1790"><span data-dcnode-id="1791" instrument_node="">*It’s Disney and that means it’s familiar. You just know what to expect to a certain extent when you’re dealing with Disney.</span></p><span data-dcnode-id="1789" instrument_node="">
</span><p data-dcnode-id="1787"><span data-dcnode-id="1788" instrument_node="">*It has the very best theming and atmosphere of any resort in Hawaii. I stand by that statement. A lot of people say they don’t want to stay at Aulani because they didn’t come to Hawaii for Disney. They want the real Hawaii. I hate to break it to you Jack, but you’re not going to find another resort in Hawaii that has more authentically or&nbsp; respectfully incorporated Hawaiian culture into the property or the guest experience. Most guests are impressed by the property in general, but it’s the locals that really appreciate what Disney has done with the details. I’ll be honest…you can find more luxurious resorts in Hawaii, you can find cheaper resorts in Hawaii, and you can find more adult oriented resorts in Hawaii, but you can’t find a resort that represents and integrates the culture of Hawaii any better than Aulani.</span></p><span data-dcnode-id="1786" instrument_node="">
</span><p data-dcnode-id="1783"><a data-dcnode-id="1784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-9-4.png"><img alt="Disney's Aulani Resort Review" class="alignnone wp-image-7111 size-full" data-dcnode-id="1785" data-jpibfi-post-excerpt="" data-jpibfi-post-title="Aulani Resort &amp; Spa: Disney’s Resort in Hawaii" data-jpibfi-post-url="https://hulalandblog.com/disney-aulani-review/" data-jpibfi-src="https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-9-4.png" height="450" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-9-4.png&amp;raw" srcset="https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-9-4.png 700w, https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-9-4-300x193.png 300w, https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-9-4-610x392.png 610w, https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-9-4-480x309.png 480w" title="Disney's Aulani Resort Review" width="700"></a></p><span data-dcnode-id="1782" instrument_node="">
</span><p data-dcnode-id="1780"><span data-dcnode-id="1781" instrument_node="">*It’s really fun! Aulani basically has an entire waterpark complex. Family pools, adults only pools, infinity pools (and hot tubs), water slides (even tube slides!), a lazy river, a kids splash area and playground complex, AND a manmade snorkel reef not to mention a tranquil and almost completely protected BEACH LAGOON. That’s enough to impress even the most jaded traveler. Add in Auntie’s Beach House (the kid’s club), character meet and greets, and a billion other activities and it’s possible to come and stay for the week and never want to leave the property.</span></p><span data-dcnode-id="1779" instrument_node="">
</span><p data-dcnode-id="1777"><span data-dcnode-id="1778" instrument_node="">*It’s located on Oahu, which is the Hawaiian Island with by far the most things to “see and do” especially when it comes to attractions. Pearl Harbor, Kualoa Ranch (Jurassic Park), the Polynesian Cultural Center, the famous North Shore, and Waikiki are all top of most people’s don’t miss list in Hawaii and they’re all on the same island as Aulani.</span></p><span data-dcnode-id="1776" instrument_node="">
</span><p data-dcnode-id="1774"><span data-dcnode-id="1775" instrument_node="">*But….it’s location in Ko’olina means that it’s waaaaay less crowded than staying in Waikiki. Waikiki is a busy city on a beach (albeit a beautiful one) and that’s not the vibe most people come to Hawaii for.&nbsp; Staying in Ko’olina means it’s possible to see and do all the things on Oahu (which can be a very crowded island), while returning to the respite of a laid back resort community at the end of the day. Everything in Ko’olina is walkable (or there’s a shuttle). The four lagoons are connected with by a walking trail. There’s an upscale shopping center with plenty of restaurants across the street from Aulani (including a market), and there’s a Four Seasons and Marriott vacation club resort nearby for added amenities. You’ve got golfing, tennis, a marina, and the number one rated luau on Oahu all within walking distance. AND you feel like you’re approximately 5000 miles away from busy Waikiki.</span></p><span data-dcnode-id="1773" instrument_node="">
</span><p data-dcnode-id="1771"><span data-dcnode-id="1772" instrument_node="">*Aulani is a Disney Vacation Club resort (Disney’s version of a timeshare) meaning in addition to the regular hotel rooms, you can also rent studios as well as one, two, and three-bedroom villas with full kitchens and washers and dryers in room.</span></p><span data-dcnode-id="1770" instrument_node="">
</span><p data-dcnode-id="1768"><span data-dcnode-id="1769" instrument_node="">If you’re 1) traveling with kids, 2) a Disney fan, or 3) not the most frequent traveler, Aulani is 10/10 going to be the resort I recommend (assuming you’re staying on Oahu).</span></p><span data-dcnode-id="1767" instrument_node="">
</span><p data-dcnode-id="1764"><a data-dcnode-id="1765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-14-2.png"><img alt="Disney's Aulani Resort Review" class="alignnone wp-image-7116 size-full" data-dcnode-id="1766" data-jpibfi-post-excerpt="" data-jpibfi-post-title="Aulani Resort &amp; Spa: Disney’s Resort in Hawaii" data-jpibfi-post-url="https://hulalandblog.com/disney-aulani-review/" data-jpibfi-src="https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-14-2.png" height="450" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-14-2.png&amp;raw" srcset="https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-14-2.png 700w, https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-14-2-300x193.png 300w, https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-14-2-610x392.png 610w, https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-14-2-480x309.png 480w" title="Disney's Aulani Resort Review" width="700"></a></p><span data-dcnode-id="1763" instrument_node="">
</span><p data-dcnode-id="1743"><span data-dcnode-id="1762" instrument_node="">RELATED: Not very familiar with Oahu? Read up on the </span><a data-dcnode-id="1760" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hulalandblog.com/where-to-stay-on-oahu-waikiki/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1761" instrument_node="">lay of the (is)land and where to stay</span></a><span data-dcnode-id="1759" instrument_node=""> plus my favorite </span><a data-dcnode-id="1757" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hulalandblog.com/waikiki-beach-resorts-oahu/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1758" instrument_node="">beach resorts</span></a><span data-dcnode-id="1756" instrument_node="">, </span><a data-dcnode-id="1754" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hulalandblog.com/10-oahu-budget-hotels-waikiki-beyond/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1755" instrument_node="">budget hotels</span></a><span data-dcnode-id="1753" instrument_node="">, </span><a data-dcnode-id="1751" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hulalandblog.com/25-amazing-airbnb-rentals-on-oahu/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1752" instrument_node="">condos</span></a><span data-dcnode-id="1750" instrument_node="">, </span><a data-dcnode-id="1748" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hulalandblog.com/top-10-luxury-resorts-in-hawaii/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1749" instrument_node="">luxury resorts</span></a><span data-dcnode-id="1747" instrument_node="">, and </span><a data-dcnode-id="1745" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hulalandblog.com/12-favorite-boutique-hotels-in-hawaii/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1746" instrument_node="">boutique hotels</span></a><span data-dcnode-id="1744" instrument_node="">.</span></p><span data-dcnode-id="1742" instrument_node="">
</span><h3 data-dcnode-id="1739"><b data-dcnode-id="1740"><span data-dcnode-id="1741" instrument_node="">My Aulani Trips</span></b></h3><span data-dcnode-id="1738" instrument_node="">
</span><p data-dcnode-id="1736"><span data-dcnode-id="1737" instrument_node="">I’ve stayed at Aulani and visited several times since it opened. Usually my trips are shorter stays tacked on to longer trips to Hawaii (or staycations when I used to live there). I’ve stayed as short as two nights and as long as 5. I’ve traveled there with children and on adult only trips. I’ve done split stays on Oahu part of the time in Waikiki and part of the time at Aulani. And I’ve done split island trips staying part of the time on Maui and then finishing up the trip at Aulani. I’ve stayed in a regular hotel room and also in a villa. But mostly, I’ve traveled through Hawaii extensively (umm hi hello have you read my blog?) so I have a pretty good eye for comparing places to stay, how to get the best value, and how to make sure you enjoy your vacation at the resort while not missing out on the “real Hawaii.”</span></p><span data-dcnode-id="1735" instrument_node="">
</span><p data-dcnode-id="1732"><a data-dcnode-id="1733" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-5-4.png"><img alt="Disney's Aulani Resort Review" class="alignnone wp-image-7107 size-full" data-dcnode-id="1734" data-jpibfi-post-excerpt="" data-jpibfi-post-title="Aulani Resort &amp; Spa: Disney’s Resort in Hawaii" data-jpibfi-post-url="https://hulalandblog.com/disney-aulani-review/" data-jpibfi-src="https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-5-4.png" height="450" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-5-4.png&amp;raw" srcset="https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-5-4.png 700w, https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-5-4-300x193.png 300w, https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-5-4-610x392.png 610w, https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-5-4-480x309.png 480w" title="Disney's Aulani Resort Review" width="700"></a></p><span data-dcnode-id="1731" instrument_node="">
</span><p data-dcnode-id="1729"><span data-dcnode-id="1730" instrument_node="">So as an accumulation of all of my stays at Aulani and experience traveling to Hawaii, I offer you this compilation of tips and information:</span></p><span data-dcnode-id="1728" instrument_node="">
</span><h3 data-dcnode-id="1725"><b data-dcnode-id="1726"><span data-dcnode-id="1727" instrument_node="">Everything You Need to Know about Staying at Aulani</span></b></h3><span data-dcnode-id="1724" instrument_node="">
</span><p data-dcnode-id="1722"><span data-dcnode-id="1723" id="more-2144"></span></p><span data-dcnode-id="1721" instrument_node="">
</span><p data-dcnode-id="1717"><b data-dcnode-id="1719"><span data-dcnode-id="1720" instrument_node="">Best Number of Days to Stay at Aulani:</span></b><span data-dcnode-id="1718" instrument_node=""> I never recommend coming to Hawaii for less than a week (it’s just so far). And I rarely recommend staying on any one island for less than a week. A lot of people come with grand plans to see all four main islands in 10 days and honestly that’s just absolutely nuts. So assuming you’re going to be on Oahu for a week…if you’ve got the cash to stay at Aulani the whole time, go for it! Plan to spend some days just hanging at the resort and other days out exploring the island (or half and half each day). If a week long stay at Aulani just isn’t in the budget, 3-4 nights is PLENTY of time to really experience the resort. I’m one of those people who can alternate between the beach and pool at a resort cranking through a book a day for weeks on end and never get bored so I could definitely justify a longer trip, but 4 nights is a really good chunk of time to spend at Aulani and get to play and have fun and still relax.</span></p><span data-dcnode-id="1716" instrument_node="">
</span><p data-dcnode-id="1713"><a data-dcnode-id="1714" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-13-3.png"><img alt="Disney's Aulani Resort Review" class="alignnone wp-image-7115 size-full" data-dcnode-id="1715" data-jpibfi-post-excerpt="" data-jpibfi-post-title="Aulani Resort &amp; Spa: Disney’s Resort in Hawaii" data-jpibfi-post-url="https://hulalandblog.com/disney-aulani-review/" data-jpibfi-src="https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-13-3.png" height="450" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-13-3.png&amp;raw" srcset="https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-13-3.png 700w, https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-13-3-300x193.png 300w, https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-13-3-610x392.png 610w, https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-13-3-480x309.png 480w" title="Disney's Aulani Resort Review" width="700"></a></p><span data-dcnode-id="1712" instrument_node="">
</span><p data-dcnode-id="1708"><b data-dcnode-id="1710"><span data-dcnode-id="1711" instrument_node="">Rental Cars:</span></b><span data-dcnode-id="1709" instrument_node=""> As in, do you need one? Here’s what I do: I never get one! Every time I’ve stayed at Aulani, I’ve worked it so I stay there the last few days of my trip with absolutely no plans to leave the Ko’olina area. Meaning, I don’t make plans to tour Pearl Harbor, have dinner in Waikiki, or see the dinosaurs at Kualoa Ranch while I’m staying at Aulani. There was one trip that coincided with Billabong Pipemasters on the north shore so we rented a car at the resort just for that day and drove over to see it, but other than that I either take a shuttle from the airport out to Aulani OR I drop off my rental car at Aulani if I’ve been staying elsewhere on Oahu first.</span></p><span data-dcnode-id="1707" instrument_node="">
</span><p data-dcnode-id="1705"><span data-dcnode-id="1706" instrument_node="">Here’s how that works. If you fly into Honolulu and you’re staying somewhere else on the island and want to rent a car for a few days, you pick it up at the airport as normal but select your return destination as Ko’olina-Aulani. For a $50 fee, you can drive right up to portico and hand your keys to the bellman instead of taking it back to the airport. This works with Alamo for sure and maybe others. I always use Hawaii Discount Car Rental and when you put Ko’olina as your drop off location it will only show you companies that have this feature available.</span></p><span data-dcnode-id="1704" instrument_node="">
</span><p data-dcnode-id="1702"><span data-dcnode-id="1703" instrument_node="">Full disclaimer: I travel to Hawaii a LOT. I have seen and done and explored Oahu like you wouldn’t believe so I don’t feel like I have to get out and go and do when I’m staying at Aulani. But if you’ve never been to Hawaii, I do NOT recommend never leaving your resort. Whether you do a split stay and do your exploring while you’re staying somewhere cheaper, or whether you rent a car the whole time or just for certain days (you can do that right at Aulani), DEFINITELY MAKE A PLAN TO SEE THE ISLAND.</span></p><span data-dcnode-id="1701" instrument_node="">
</span><p data-dcnode-id="1698"><a data-dcnode-id="1699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-31.png"><img alt="Disney's Aulani Resort Review" class="alignnone wp-image-7133 size-full" data-dcnode-id="1700" data-jpibfi-post-excerpt="" data-jpibfi-post-title="Aulani Resort &amp; Spa: Disney’s Resort in Hawaii" data-jpibfi-post-url="https://hulalandblog.com/disney-aulani-review/" data-jpibfi-src="https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-31.png" height="450" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-31.png&amp;raw" srcset="https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-31.png 700w, https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-31-300x193.png 300w, https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-31-610x392.png 610w, https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-31-480x309.png 480w" title="Disney's Aulani Resort Review" width="700"></a></p><span data-dcnode-id="1697" instrument_node="">
</span><p data-dcnode-id="1693"><b data-dcnode-id="1695"><span data-dcnode-id="1696" instrument_node="">Get Lei’d: </span></b><span data-dcnode-id="1694" instrument_node="">Aulani starts your trip off right with a fresh flower lei greeting upon arrival. Women get an orchid lei and men get a kukui nut lei. Children get some sort of necklace with Maui’s hook? If your kid would rather have a flower lei, ask for one.</span></p><span data-dcnode-id="1692" instrument_node="">
</span><p data-dcnode-id="1688"><b data-dcnode-id="1690"><span data-dcnode-id="1691" instrument_node="">Daily ‘Iwa:</span></b><span data-dcnode-id="1689" instrument_node=""> If you’re a Disney planner, you’re going to live for the Daily Iwa. This printed daily schedule is the holy grail of information for what is scheduled to happen at the resort every day. If you’re familiar with Disney at all, you know that even when things appear spontaneous, they’re not. They’re carefully planned. Every activity from fish feedings and yoga to movie nights and dance parties are listed in the Daily ‘Iwa. It designates locations for events and activities as well as what’s complimentary and what has an additional charge plus what requires a reservation. They usually start to put out copies of the next day’s Daily ‘Iwa around the lobby the night before. Here are a few things to keep an eye out for: the Menehune Adventure Trail (a high tech scavenger hunt), yoga (and other fitness classes) on the beach, resort tours, and the hours (and happenings) in the Pau Hana Community Center (where they have group activities AND movies that you can check out to watch in your room).</span></p><span data-dcnode-id="1687" instrument_node="">
</span><p data-dcnode-id="1684"><a data-dcnode-id="1685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-20-1.png"><img alt="Disney's Aulani Resort Review" class="alignnone wp-image-7122 size-full" data-dcnode-id="1686" data-jpibfi-post-excerpt="" data-jpibfi-post-title="Aulani Resort &amp; Spa: Disney’s Resort in Hawaii" data-jpibfi-post-url="https://hulalandblog.com/disney-aulani-review/" data-jpibfi-src="https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-20-1.png" height="450" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-20-1.png&amp;raw" srcset="https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-20-1.png 700w, https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-20-1-300x193.png 300w, https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-20-1-610x392.png 610w, https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-20-1-480x309.png 480w" title="Disney's Aulani Resort Review" width="700"></a></p><span data-dcnode-id="1683" instrument_node="">
</span><p data-dcnode-id="1679"><b data-dcnode-id="1681"><span data-dcnode-id="1682" instrument_node="">Character Meet &amp; Greets:</span></b><span data-dcnode-id="1680" instrument_node=""> Did you even go to Disneyland if you didn’t meet Mickey and Minnie? Well, in Hawaii it’s more like…did you even go to Aulani if you didn’t meet DUFFY AND SHELLIE MAY??! More about Duffy and Friends in a bit, but yes, you can meet Disney characters at Aulani and just like the parks, yes it runs on a schedule. While the info isn’t printed on the Daily ‘Iwa, the schedule does include the phone number to call to get the daily character line up. Character schedules are announced each morning at 8AM and it’s pretty exciting. There’s something novel about having to call the phone number and listen to all of the listings. Remember when we used to do that for movie times?? If meeting characters is high on your list, I strongly recommend calling each morning to see who will be out and about (and when and where). Not every character is out every day and some meet in locations that you might not naturally stumble upon. The schedules change often (and availability is somewhat seasonal to meet demand), but generally Mickey, Minnie, and Moana are available most days while Donald, Goofy, Daisy, Stitch, and Chip and Dale seem to alternate every other day. Duffy and Shellie May are out less often (maybe once or twice a week?) but this seems to fluctuate based on travel patterns as they’re more popular with visitors from Japan.</span></p><span data-dcnode-id="1678" instrument_node="">
</span><p data-dcnode-id="1675"><a data-dcnode-id="1676" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-21-1.png"><img alt="Disney's Aulani Resort Review" class="alignnone wp-image-7123 size-full" data-dcnode-id="1677" data-jpibfi-post-excerpt="" data-jpibfi-post-title="Aulani Resort &amp; Spa: Disney’s Resort in Hawaii" data-jpibfi-post-url="https://hulalandblog.com/disney-aulani-review/" data-jpibfi-src="https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-21-1.png" height="450" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-21-1.png&amp;raw" srcset="https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-21-1.png 700w, https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-21-1-300x193.png 300w, https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-21-1-610x392.png 610w, https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-21-1-480x309.png 480w" title="Disney's Aulani Resort Review" width="700"></a></p><span data-dcnode-id="1674" instrument_node="">
</span><p data-dcnode-id="1150"><b data-dcnode-id="1672"><span data-dcnode-id="1673" instrument_node="">Gift Shop:</span></b><span data-dcnode-id="1671" instrument_node=""> I’m not ashamed to say that my first stop at Aulani is ALWAYS Kalepa’s Store (the gift shop). There are two gift shops at Aulani (one a traditional Disney gift shop and one a bit more upscale) and they are both AMAZING. Aulani carries a lot of exclusive merchandise that you can’t find anywhere else. Besides Aulani specific merch, they stock a lot of Stitch items and DUFFY AND FRIENDS merch.</span><br data-dcnode-id="1670"><span data-dcnode-id="1669" instrument_node="">

</span><p data-dcnode-id="1147"><span data-dcnode-id="1148" instrument_node="">Which brings me too…</span></p><span data-dcnode-id="1146" instrument_node="">
</span><p data-dcnode-id="1142"><b data-dcnode-id="1144"><span data-dcnode-id="1145" instrument_node="">Jump on the Duffy Train: </span></b><span data-dcnode-id="1143" instrument_node="">If you know, you know and if you don’t, well then let me introduce you! Duffy and Friends are a set of Disney characters that originated in the Asian parks. I think of them as Disney’s answer to Hello Kitty. They’re cute little stuffed animals (all with their own backstories) and in Asia (and now Aulani!) you can buy absolutely everything you can imagine with their faces on it. Let me break it down for you: 1) Duffy is Mickey’s teddy bear. Mickey was going on a long trip and Minnie made the bear for Mickey to take with him. She put him in Mickey’s duffel bag aaaaand…Duffy was born! 2) Shellie May is Minnie’s teddy bear. Duffy’s girl. She has blue eyes and a large bow and she’s my queen. 3) Gelatoni is a cat that Duffy met on his travels. He wears a beret and paints with his tail (with gelato of course). 4) Stella Lou is a purple bunny ballerina that dreams of dancing on a Broadway stage. 5) Cookie Ann is a yellow puppy with a passion for the culinary arts (and the color pink!), AND 6) Olu Mel is a ukulele playing turtle who is the first of Duffy’s friends to be exclusive to Aulani! If you’re scratching your head, I’ll just tell you it’s a “thing” and while Duffy and Friends have never been popular in the US parks (Duffy was briefly in Epcot years ago), these characters are SUPER popular in Asia and since Hawaii has so many Japanese visitors, Aulani is really the only place in the US to find Duffy and Friends merchandise AND meet Duffy and Shellie May.</span></p><span data-dcnode-id="1141" instrument_node="">
</span><p data-dcnode-id="1138"><a data-dcnode-id="1139" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-3-4.png"><img alt="Disney's Aulani Resort Review" class="alignnone wp-image-7105 size-full" data-dcnode-id="1140" data-jpibfi-post-excerpt="" data-jpibfi-post-title="Aulani Resort &amp; Spa: Disney’s Resort in Hawaii" data-jpibfi-post-url="https://hulalandblog.com/disney-aulani-review/" data-jpibfi-src="https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-3-4.png" height="450" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-3-4.png&amp;raw" srcset="https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-3-4.png 700w, https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-3-4-300x193.png 300w, https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-3-4-610x392.png 610w, https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-3-4-480x309.png 480w" title="Disney's Aulani Resort Review" width="700"></a></p><span data-dcnode-id="1137" instrument_node="">
</span><p data-dcnode-id="1135"><span data-dcnode-id="1136" instrument_node="">Here’s an insider tip: Even if you’re not that into Duffy and his friends, if you see on the schedule that they’ll be meeting during your trip, walk over and just watch all of the interactions. The Asian guests get sooooo excited to meet these characters (not to mention it’s some of the best character interaction I’ve ever witnessed-Shellie May in particular) that it is high key entertaining. Don’t believe me? Watch my video on Instagram!</span></p><span data-dcnode-id="1134" instrument_node="">

</span><p data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">Also, I mentioned in my intro that I have yet to find a way that Disney, Hawaii, and koalas all intersected, but I’ve decided that this is where it needs to be. Duffy needs a KOALA FRIEND. Disney if you’re reading this…can this happen???</span></p><span data-dcnode-id="1027" instrument_node="">
</span><p data-dcnode-id="1023"><b data-dcnode-id="1025"><span data-dcnode-id="1026" instrument_node="">The Food Situation:</span></b><span data-dcnode-id="1024" instrument_node=""> I vacillate on what I think about the food situation at Aulani. Some of it’s great, some not so great, but here’s basically what you need to know: There’s a huge buffet restaurant (Makahiki) similar to what you’d expect from Disney (i.e. Chef Mickey’s, Boma, etc).. For breakfast it includes characters and for dinner SOME nights it includes characters but not all. There’s the “signature” restaurant (think California Grill, Napa Rose, etc.) AMA AMA that sits right on the water and serves breakfast, lunch, and dinner. There’s a quick service spot called Ulu Cafe which has grab and go snacks, poke bowls, acai bowls, flatbreads, and daily specials. There’s a food stand at the pool that serves mostly baskets of fried foods (Mama’s) and a shave ice shack. There’s a snack stand down by the beach, a coffee kiosk, an evening lounge, and a pool bar (Off Da Hook) which also does pool chair service. Besides these options there are three other large resorts within walking distance that all have restaurants plus a shopping center across the street that has a handful of restaurants plus a small market. Those are the basic facts…now onto my opinions!</span></p><span data-dcnode-id="1022" instrument_node="">
</span><p data-dcnode-id="1019"><a data-dcnode-id="1020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-25.png"><img alt="Disney's Aulani Resort Review" class="alignnone wp-image-7127 size-full" data-dcnode-id="1021" data-jpibfi-post-excerpt="" data-jpibfi-post-title="Aulani Resort &amp; Spa: Disney’s Resort in Hawaii" data-jpibfi-post-url="https://hulalandblog.com/disney-aulani-review/" data-jpibfi-src="https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-25.png" height="450" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-25.png&amp;raw" srcset="https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-25.png 700w, https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-25-300x193.png 300w, https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-25-610x392.png 610w, https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-25-480x309.png 480w" title="Disney's Aulani Resort Review" width="700"></a></p><span data-dcnode-id="1018" instrument_node="">
</span><p data-dcnode-id="1014"><b data-dcnode-id="1016"><span data-dcnode-id="1017" instrument_node="">Makahiki (Character Dining): </span></b><span data-dcnode-id="1015" instrument_node="">I’ve done it three times now and every time I say I’m not going to do it again. The food is actually pretty good. My reluctance to return probably has more to do with the price tag and the fact that character dining kind of stresses me out. With tax and tip it ends up being $50/adult. You stand in line after you check in to meet Mickey (there’s a photopass photographer there), and then 2-3 other characters come to your table once you sit down. It’s usually Minnie, Goofy, and Pluto. There’s an “auntie” that roams around with a ukulele and a microphone singing songs and trying to get people to engage. There’s napkin waving, loud parades with children (I honestly can’t even remember if they’re shaking shakers, beating drums, or pushing coconuts around the floor with brooms, oh wait no that’s at WDW), and auntie singing songs to people celebrating birthdays and anniversaries. Geez, it’s not as bad as I’m making it sound but if you’ve been to Ohana, Chef Mickey’s or the Hoop Dee Doo at Walt Disney World then you already know what to expect. Kids love it. If I go back again, it will be to try the dinner buffet without characters. All you can eat seafood is so hard for me to turn down.</span></p><span data-dcnode-id="1013" instrument_node="">
</span><p data-dcnode-id="1010"><a data-dcnode-id="1011" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-24.png"><img alt="Disney's Aulani Resort Review" class="alignnone wp-image-7126 size-full" data-dcnode-id="1012" data-jpibfi-post-excerpt="" data-jpibfi-post-title="Aulani Resort &amp; Spa: Disney’s Resort in Hawaii" data-jpibfi-post-url="https://hulalandblog.com/disney-aulani-review/" data-jpibfi-src="https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-24.png" height="450" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-24.png&amp;raw" srcset="https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-24.png 700w, https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-24-300x193.png 300w, https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-24-610x392.png 610w, https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-24-480x309.png 480w" title="Disney's Aulani Resort Review" width="700"></a></p><span data-dcnode-id="1009" instrument_node="">
</span><p data-dcnode-id="1005"><b data-dcnode-id="1007"><span data-dcnode-id="1008" instrument_node="">‘AMA AMA: </span></b><span data-dcnode-id="1006" instrument_node="">This probably isn’t a popular opinion, buuuuttttt…I’m not a big ‘AMA AMA fan. It’s not that it’s bad. It’s just not as good as other comparable places. Especially for the money. This is the high end, check your kids into Auntie’s (the kid’s club) and have a nice romantic dinner at sunset place. The food isn’t bad, but I’ve never had anything particularly phenomenal there. If money isn’t a serious concern, then definitely have dinner there. And make sure your reservation is before sunset because if you show up after dark, you’re missing out bigtime. But if you’re only going to have one really nice meal on your trip, skip it. I’d head over to the Four Seasons instead. Or Haleiwa Joe’s (the one in Kaneohe) or Mama’s Fish House (on Maui). However, I do REALLY like ‘AMA AMA for breakfast. The prices are a LOT better and in general it’s just really hard to mess up breakfast. They also do lunch, but I can’t usually be bothered to leave the beach or pool for a sit down lunch.</span></p><span data-dcnode-id="1004" instrument_node="">
</span><p data-dcnode-id="1001"><a data-dcnode-id="1002" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-29.png"><img alt="Disney's Aulani Resort Review" class="alignnone wp-image-7131 size-full" data-dcnode-id="1003" data-jpibfi-post-excerpt="" data-jpibfi-post-title="Aulani Resort &amp; Spa: Disney’s Resort in Hawaii" data-jpibfi-post-url="https://hulalandblog.com/disney-aulani-review/" data-jpibfi-src="https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-29.png" height="450" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-29.png&amp;raw" srcset="https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-29.png 700w, https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-29-300x193.png 300w, https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-29-610x392.png 610w, https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-29-480x309.png 480w" title="Disney's Aulani Resort Review" width="700"></a></p><span data-dcnode-id="1000" instrument_node="">
</span><p data-dcnode-id="996"><b data-dcnode-id="998"><span data-dcnode-id="999" instrument_node="">Ulu Cafe: </span></b><span data-dcnode-id="997" instrument_node="">If you’re a frequent Disney traveler, you know the Disney quick service food scene. Ulu Cafe is on par with what you’d expect at a deluxe resort like the Grand Floridian or Polynesian and not like what you’d expect at a value resort or in the theme park. It’s fairly small and there’s not an enormous selection (some of it does vary day to day) but what they have is good. There are usually a few different kinds of flatbreads and a daily special or to. The poke bowls and acai bowls are both pretty decent here and there’s Dole Whip. And then there’s a grab and go section with treats (so many of them Mickey shaped). The Mickey Musubi is a must try. There is covered seating at the cafe, but it’s also easy enough to grab your food and take it back to your pool chairs. Ulu Cafe is also where you can get your refillable mugs filled (they’re about $20 and you’ll get unlimited refills on soda, coffee, tea, water, etc. for the length of your stay).</span></p><span data-dcnode-id="995" instrument_node="">
</span><p data-dcnode-id="992"><a data-dcnode-id="993" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-22.png"><img alt="Disney's Aulani Resort Review" class="alignnone wp-image-7124 size-full" data-dcnode-id="994" data-jpibfi-post-excerpt="" data-jpibfi-post-title="Aulani Resort &amp; Spa: Disney’s Resort in Hawaii" data-jpibfi-post-url="https://hulalandblog.com/disney-aulani-review/" data-jpibfi-src="https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-22.png" height="450" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-22.png&amp;raw" srcset="https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-22.png 700w, https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-22-300x193.png 300w, https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-22-610x392.png 610w, https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-22-480x309.png 480w" title="Disney's Aulani Resort Review" width="700"></a></p><span data-dcnode-id="991" instrument_node="">
</span><p data-dcnode-id="987"><b data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">Food and Snack Stands: </span></b><span data-dcnode-id="988" instrument_node="">There’s a handful of food stands around property. Mama’s is your best bet if you want to walk up and get something while at the pool. Burgers, chicken tenders, friend shrimp etc. can all be found there. The shave ice stand is right next door. I’ll be the first to admit that I am not a major shave ice fan. That being said…I don’t think the shave ice at Aulani is the best I’ve ever had, but it is the cutest! You can add little Mickey ears for $1. There’s a small snack stand close to the beach that’s not particularly notable but they do have Dole Whips and usually soft pretzels. There’s also a coffee kiosk near Ulu Cafe which is where you’ll find your more high end caffeinated beverages.</span></p><span data-dcnode-id="986" instrument_node="">
</span><p data-dcnode-id="983"><a data-dcnode-id="984" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-25-copy.png"><img alt="Disney's Aulani Resort Review" class="alignnone wp-image-7140 size-full" data-dcnode-id="985" data-jpibfi-post-excerpt="" data-jpibfi-post-title="Aulani Resort &amp; Spa: Disney’s Resort in Hawaii" data-jpibfi-post-url="https://hulalandblog.com/disney-aulani-review/" data-jpibfi-src="https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-25-copy.png" height="450" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-25-copy.png&amp;raw" srcset="https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-25-copy.png 700w, https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-25-copy-300x193.png 300w, https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-25-copy-610x392.png 610w, https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-25-copy-480x309.png 480w" title="Disney's Aulani Resort Review" width="700"></a></p><span data-dcnode-id="982" instrument_node="">
</span><p data-dcnode-id="978"><b data-dcnode-id="980"><span data-dcnode-id="981" instrument_node="">Off Da Hook:</span></b><span data-dcnode-id="979" instrument_node=""> I really like this pool bar. It’s a nice step up from Ulu Cafe without having to leave the pool. Food’s good, drinks are good, but the main thing you need to know are about the giant pineapple drinks. This is where you get them. They’re not cheap. But they’re fun! When I got mine, I think it was about $27 including tax and tip.You pick the drink you want and then I believe the pineapple was about $10 extra.</span></p><span data-dcnode-id="977" instrument_node="">
</span><p data-dcnode-id="974"><a data-dcnode-id="975" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-25-1.png"><img alt="Disney's Aulani Resort Review" class="alignnone wp-image-7139 size-full" data-dcnode-id="976" data-jpibfi-post-excerpt="" data-jpibfi-post-title="Aulani Resort &amp; Spa: Disney’s Resort in Hawaii" data-jpibfi-post-url="https://hulalandblog.com/disney-aulani-review/" data-jpibfi-src="https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-25-1.png" height="450" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-25-1.png&amp;raw" srcset="https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-25-1.png 700w, https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-25-1-300x193.png 300w, https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-25-1-610x392.png 610w, https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-25-1-480x309.png 480w" title="Disney's Aulani Resort Review" width="700"></a></p><span data-dcnode-id="973" instrument_node="">
</span><p data-dcnode-id="969"><b data-dcnode-id="971"><span data-dcnode-id="972" instrument_node="">Olele Lounge:</span></b><span data-dcnode-id="970" instrument_node=""> If there is one food and beverage related experience you definitely shouldn’t miss, it’s after dinner drinks at Olele Lounge. The inside is cool and tells the story of the Hawaiian language (there’s often a linguist on hand), but outside there’s live music every night and I’m not going to lie…it’s often the best music I’ve heard ANYWHERE in Hawaii. I say “often” because they rotate different acts and they’re all great, but one night it was a duo playing traditional Hawaiian music and it was unbelievably good. The music usually starts around 6:30 and goes until 10 or 11. It’ll be printed in the Daily ‘Iwa.</span></p><span data-dcnode-id="968" instrument_node="">
</span><p data-dcnode-id="965"><a data-dcnode-id="966" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-19-1.png"><img alt="Disney's Aulani Resort Review" class="alignnone wp-image-7121 size-full" data-dcnode-id="967" data-jpibfi-post-excerpt="" data-jpibfi-post-title="Aulani Resort &amp; Spa: Disney’s Resort in Hawaii" data-jpibfi-post-url="https://hulalandblog.com/disney-aulani-review/" data-jpibfi-src="https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-19-1.png" height="450" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-19-1.png&amp;raw" srcset="https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-19-1.png 700w, https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-19-1-300x193.png 300w, https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-19-1-610x392.png 610w, https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-19-1-480x309.png 480w" title="Disney's Aulani Resort Review" width="700"></a></p><span data-dcnode-id="964" instrument_node="">
</span><p data-dcnode-id="960"><b data-dcnode-id="962"><span data-dcnode-id="963" instrument_node="">Dining at Other Resorts: </span></b><span data-dcnode-id="961" instrument_node="">The Four Seasons is right next door and the Marriott is a short stroll away. You can dine at either without staying there. Mina’s Fish House at the Four Seasons usually has a great happy hour and there’s also an opulent weekend brunch that I have not been able to try yet but it’s tippy top of my list for next time. The Marriott has a Longhi’s (there’s a couple on Maui) and it’s definitely worth a try. There’s also a Roy’s on the golf course.</span></p><span data-dcnode-id="959" instrument_node="">
</span><p data-dcnode-id="951"><span data-dcnode-id="958" instrument_node="">Side Note: If you’re looking for a rental car for your trip, I LOVE </span><a data-dcnode-id="956" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.discounthawaiicarrental.com/%3Freferral_code%3Dacyypyvzgc" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="957" instrument_node="">Discount Hawaii Car Rentals</span></a><span data-dcnode-id="955" instrument_node="">. They’re seriously the only company I ever use. They’ll give you the very best prices, you don’t have to reserve with a credit card or pay until you show up, you can cancel and re-book anytime if you find a better rate, and they usually have a special that adds additional drivers for no fee. It’s a no brainer. Click </span><a data-dcnode-id="953" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.discounthawaiicarrental.com/%3Freferral_code%3Dacyypyvzgc" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="954" instrument_node="">here</span></a><span data-dcnode-id="952" instrument_node=""> to check rates for your trip.</span></p><span data-dcnode-id="950" instrument_node="">
</span><p data-dcnode-id="947"><b data-dcnode-id="948"><span data-dcnode-id="949" instrument_node="">Ok, I tried to give it a fair shake and while food at Aulani isn’t exactly bad, I’m always left a bit at a loss for dinner. So usually I go to….</span></b></p><span data-dcnode-id="946" instrument_node="">
</span><p data-dcnode-id="942"><b data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">Monkeypod:</span></b><span data-dcnode-id="943" instrument_node=""> I used to live on Maui and we went to the Monkeypod for happy hour sooooo often so when they built the one in Ko’olina I was THRILLED. Here’s the deal…it’s just always good. Food, service, atmosphere…check, check, check. It has some haters (I think mostly because so many people rave about it that there’s bound to be some naysayers), but every night it’s where I gravitate towards. Their mai tais are legendary and the atmosphere is always a party. But like the kind of party it’s ok to bring your kids to. The only downside is that it’s usually pretty crowded. So make a reservation or show up early for happy hour (there’s a late happy hour too) when drinks are $9 and appetizers are half price.</span></p><span data-dcnode-id="941" instrument_node="">
</span><p data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">There are also a handful of restaurants across the street from Aulani (in the same shopping center as the Monkeypod) to try. There’s a pizza place, taco place, breakfast place (Eggs n Things) and an Island Vintage Coffee.</span></p><span data-dcnode-id="938" instrument_node="">
</span><p data-dcnode-id="934"><b data-dcnode-id="936"><span data-dcnode-id="937" instrument_node="">Groceries: </span></b><span data-dcnode-id="935" instrument_node="">If you want to pick up some simple groceries, bottles of water, or liquor for making your own drinks, you’ll find all of that (and cheap souvenirs) at the Island Gourmet Market/ABC Store in the shopping center across the street. If you have a car and you need to do a serious grocery run, there is a Target and Costco in Kapolei just about 5-10 minutes away. All of the villas (one, two, and three bedrooms) have full kitchens so if you’re trying to save money it’s possible to do quite a bit of cooking.</span></p><span data-dcnode-id="933" instrument_node="">
</span><p data-dcnode-id="930"><a data-dcnode-id="931" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-27.png"><img alt="Disney's Aulani Resort Review" class="alignnone wp-image-7129 size-full" data-dcnode-id="932" data-jpibfi-post-excerpt="" data-jpibfi-post-title="Aulani Resort &amp; Spa: Disney’s Resort in Hawaii" data-jpibfi-post-url="https://hulalandblog.com/disney-aulani-review/" data-jpibfi-src="https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-27.png" height="450" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-27.png&amp;raw" srcset="https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-27.png 700w, https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-27-300x193.png 300w, https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-27-610x392.png 610w, https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-27-480x309.png 480w" title="Disney's Aulani Resort Review" width="700"></a></p><span data-dcnode-id="929" instrument_node="">
</span><p data-dcnode-id="925"><b data-dcnode-id="927"><span data-dcnode-id="928" instrument_node="">What the Beach is Like:</span></b><span data-dcnode-id="926" instrument_node=""> I get a lot of questions about the beach at Aulani and that makes me think it’s because it’s a topic of conversation ; ) It’s not a great beach but it’s not a bad beach! There are four lagoons in Ko’olina (they’re actually man made) and Aulani and the Four Seasons share lagoon #4. It’s a little crescent of a beach with calm water. It’s almost entirely protected from the ocean which makes it GREAT for kids. I can’t imagine going out there to snorkel (it’s literally all sand), but there are always people out there and they say there are a few fish. I think it just depends on what your expectations are. I wouldn’t call it “real” snorkeling. So some people really like the beach (hey, locals come out to Ko’olina with their kids or to sunbathe) and some are disappointed. When I stay at Aulani, I’m not there for the beach so it doesn’t bother me but if you’ve never been to Hawaii then definitely plan to spend time out exploring the island because there are some truly amazing beaches on Oahu. I will say, at pretty much any time of day and time of the year, you can always find good chairs on the beach. That is hardly ever the case for the pool.</span></p><span data-dcnode-id="924" instrument_node="">
</span><p data-dcnode-id="921"><a data-dcnode-id="922" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-18-1.png"><img alt="Disney's Aulani Resort Review" class="alignnone wp-image-7120 size-full" data-dcnode-id="923" data-jpibfi-post-excerpt="" data-jpibfi-post-title="Aulani Resort &amp; Spa: Disney’s Resort in Hawaii" data-jpibfi-post-url="https://hulalandblog.com/disney-aulani-review/" data-jpibfi-src="https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-18-1.png" height="450" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-18-1.png&amp;raw" srcset="https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-18-1.png 700w, https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-18-1-300x193.png 300w, https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-18-1-610x392.png 610w, https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-18-1-480x309.png 480w" title="Disney's Aulani Resort Review" width="700"></a></p><span data-dcnode-id="920" instrument_node="">
</span><p data-dcnode-id="916"><b data-dcnode-id="918"><span data-dcnode-id="919" instrument_node="">The Pool! The Pool! The Pool!:</span></b><span data-dcnode-id="917" instrument_node=""> The main attraction at Aulani is definitely the pool. I wouldn’t call it a pool so much as a complex. It’s almost a waterpark. There are pools for families, adults, small children, EVERYONE. My personal favorite spot is the family infinity pool. I like to be able to see the ocean from the pool and it’s a great spot for that. There’s also an adjoining hot tub. There’s an adults only area, but I’m not crazy about it. It is MUCH quieter than the rest of the resort so that’s a bonus, but it’s tucked away in a corner and I feel like I spend most of my time there just staring at a wall. I mean, it’s a nice wall but in Hawaii I much prefer the ocean. To each their own. The main pool has zero entry so it’s great for kids and it’s close to the pool bar/restaurant and has easy access down to the beach. There’s also an adults only infinity HOT TUB nearby which looks out over the ocean and that is hands down my favorite place to be. But while there are a few chairs it’s not really a place I’d want to set up for the day. It’s a great place to watch the sunset though! Definitely don’t miss the lazy river and the slides (there’s a body slide and a tube slide). I think you can skip Rainbow Reef. It’s essentially a large fish tank you can snorkel in for an extra fee (it’s a lot like Shark Reef at Typhoon Lagoon if you’ve done that). There are a lot of fish, but it’s not terribly big and the water is COLD. It’s $25/adult and $20/kid for one-day access and $45/adult and $35/kid for length of stay access. When my friend and I took her daughter (age 7) we were all ready to get out about 15 seconds after we got in and still to this day laugh about that time we thought it would be a good idea to go in there.</span></p><span data-dcnode-id="915" instrument_node="">
</span><p data-dcnode-id="912"><a data-dcnode-id="913" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-7-4.png"><img alt="Disney's Aulani Resort Review" class="alignnone wp-image-7109 size-full" data-dcnode-id="914" data-jpibfi-post-excerpt="" data-jpibfi-post-title="Aulani Resort &amp; Spa: Disney’s Resort in Hawaii" data-jpibfi-post-url="https://hulalandblog.com/disney-aulani-review/" data-jpibfi-src="https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-7-4.png" height="450" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-7-4.png&amp;raw" srcset="https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-7-4.png 700w, https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-7-4-300x193.png 300w, https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-7-4-610x392.png 610w, https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-7-4-480x309.png 480w" title="Disney's Aulani Resort Review" width="700"></a></p><span data-dcnode-id="911" instrument_node="">
</span><p data-dcnode-id="909"><span data-dcnode-id="910" instrument_node="">You can pick up towels and wristbands from a few kiosks spread out around the pool deck and you must have a wristband to do pretty much anything. Including sit down on a pool chair. Which brings me to…</span></p><span data-dcnode-id="908" instrument_node="">
</span><p data-dcnode-id="905"><a data-dcnode-id="906" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-26.png"><img alt="Disney's Aulani Resort Review" class="alignnone wp-image-7128 size-full" data-dcnode-id="907" data-jpibfi-post-excerpt="" data-jpibfi-post-title="Aulani Resort &amp; Spa: Disney’s Resort in Hawaii" data-jpibfi-post-url="https://hulalandblog.com/disney-aulani-review/" data-jpibfi-src="https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-26.png" height="450" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-26.png&amp;raw" srcset="https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-26.png 700w, https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-26-300x193.png 300w, https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-26-610x392.png 610w, https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-26-480x309.png 480w" title="Disney's Aulani Resort Review" width="700"></a></p><span data-dcnode-id="904" instrument_node="">
</span><p data-dcnode-id="900"><b data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">The Pool Chair Situation:</span></b><span data-dcnode-id="901" instrument_node=""> All of you little Disney planning nuts are going to LOVE this. One does not simply show up poolside at Aulani and plop down in a chair. Planning is involved. Alarms need to be set. Dads must be loaded up with the family’s possessions and sent down to the pool early in the morning to secure the family’s basecamp.</span></p><span data-dcnode-id="899" instrument_node="">
</span><p data-dcnode-id="897"><span data-dcnode-id="898" instrument_node="">All jokes aside, here’s the deal…while chairs are pretty easy to come by down at the beach, the pool is by far the most popular spot at Aulani and those chairs fill up fast. I’ve seen so many people come down around 10 or 11 and not be able to find chairs in the main pool areas (Waikolohe Pool and Ka Maka Grotto Infinity Pool). There is often more availability in the more kid oriented sections (where the water feature/playground and splash pads are) and the adults only area. The pools don’t open until 8 AM but many people come down early to get prime spots. There are signs posted saying that if you leave items on chairs unattended BEFORE 8 they will be removed. So if you go down early, you’ll have to hang out with your stuff. There are also signs warning that if you leave your chairs for over an hour, they will be marked by the staff and if you don’t return in another hour, your belongings will be removed so that others can use those chairs. And I’ve seen this happen a few times.</span></p><span data-dcnode-id="896" instrument_node="">
</span><p data-dcnode-id="893"><a data-dcnode-id="894" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-35.png"><img alt="Disney's Aulani Resort Review" class="alignnone wp-image-7136 size-full" data-dcnode-id="895" data-jpibfi-post-excerpt="" data-jpibfi-post-title="Aulani Resort &amp; Spa: Disney’s Resort in Hawaii" data-jpibfi-post-url="https://hulalandblog.com/disney-aulani-review/" data-jpibfi-src="https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-35.png" height="450" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-35.png&amp;raw" srcset="https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-35.png 700w, https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-35-300x193.png 300w, https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-35-610x392.png 610w, https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-35-480x309.png 480w" title="Disney's Aulani Resort Review" width="700"></a></p><span data-dcnode-id="892" instrument_node="">
</span><p data-dcnode-id="890"><span data-dcnode-id="891" instrument_node="">Lest this sound like a crazy Disney thing, I can assure you that this happens at every resort with a desirable pool around the world. Even at the classiest, most high brow joints. Dads can be found lining up at a nondescript gate with their family’s possessions ready to throw an elbow to ensure that they snag the most desirable spot at the pool. It happens at Disney, it happens at the Four Seasons, it just happens everywhere. So if having a good spot by the pool is important to you, definitely plan to show up early.</span></p><span data-dcnode-id="889" instrument_node="">
</span><p data-dcnode-id="887"><span data-dcnode-id="888" instrument_node="">The good news is that with the time change, most people coming from the mainland are up and at ‘em pretty early anyways. Also, the pool chair situation does seem to fluctuate with the season. During slow season when the resort isn’t at capacity it may be a LOT easier to find a place to sit and they may be more lenient about clearing your items away if you’ve been gone for a while.</span></p><span data-dcnode-id="886" instrument_node="">
</span><p data-dcnode-id="883"><a data-dcnode-id="884" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-30.png"><img alt="Disney's Aulani Resort Review" class="alignnone wp-image-7132 size-full" data-dcnode-id="885" data-jpibfi-post-excerpt="" data-jpibfi-post-title="Aulani Resort &amp; Spa: Disney’s Resort in Hawaii" data-jpibfi-post-url="https://hulalandblog.com/disney-aulani-review/" data-jpibfi-src="https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-30.png" height="450" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-30.png&amp;raw" srcset="https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-30.png 700w, https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-30-300x193.png 300w, https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-30-610x392.png 610w, https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-30-480x309.png 480w" title="Disney's Aulani Resort Review" width="700"></a></p><span data-dcnode-id="882" instrument_node="">
</span><p data-dcnode-id="878"><b data-dcnode-id="880"><span data-dcnode-id="881" instrument_node="">Leave the kids at Auntie’s Beach House:</span></b><span data-dcnode-id="879" instrument_node=""> Disney runs some of the best kids clubs in the world and Auntie’s is no exception! Drop the kids off while you go to the spa or to dinner, and I guarantee you they’ll be begging to spend the rest of their vacation there. Auntie’s is free (you can stop in and check it out most mornings before drop offs stop), but there are some premium activities that cost extra.</span></p><span data-dcnode-id="877" instrument_node="">
</span><p data-dcnode-id="869"><span data-dcnode-id="876" instrument_node="">Side Note: If you’re looking for a rental car for your trip, I LOVE </span><a data-dcnode-id="874" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.discountusacarrental.com/ducr/%3Freferral_code%3Dzsfthanjea" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="875" instrument_node="">Discount Hawaii Car Rentals</span></a><span data-dcnode-id="873" instrument_node="">. They’re seriously the only company I ever use. They’ll give you the very best prices, you don’t have to reserve with a credit card or pay until you show up, you can cancel and re-book anytime if you find a better rate, and they usually have a special that adds additional drivers for no fee. It’s a no brainer. Click </span><a data-dcnode-id="871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.discountusacarrental.com/ducr/%3Freferral_code%3Dzsfthanjea" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="872" instrument_node="">here</span></a><span data-dcnode-id="870" instrument_node=""> to check rates for your trip.</span></p><span data-dcnode-id="868" instrument_node="">
</span><p data-dcnode-id="865"><a data-dcnode-id="866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-23.png"><img alt="Disney's Aulani Resort Review" class="alignnone wp-image-7125 size-full" data-dcnode-id="867" data-jpibfi-post-excerpt="" data-jpibfi-post-title="Aulani Resort &amp; Spa: Disney’s Resort in Hawaii" data-jpibfi-post-url="https://hulalandblog.com/disney-aulani-review/" data-jpibfi-src="https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-23.png" height="450" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-23.png&amp;raw" srcset="https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-23.png 700w, https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-23-300x193.png 300w, https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-23-610x392.png 610w, https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-23-480x309.png 480w" title="Disney's Aulani Resort Review" width="700"></a></p><span data-dcnode-id="864" instrument_node="">
</span><p data-dcnode-id="857"><b data-dcnode-id="862"><span data-dcnode-id="863" instrument_node="">How about a Luau?:</span></b><span data-dcnode-id="861" instrument_node=""> Going to a luau is at the top of most people’s Hawaii bucket lists. Good news: if you’re staying at Aulani you’ve got plenty of good options. Disney has their own luau (Ka Wa’a Luau) on property several nights per week but also…the #1 rated luau on Oahu is just down the street at Paradise Cove. So I get a LOT of questions about which luau is better. The honest truth is…they’re just totally different. The Aulani luau is smaller, has better food (prime rib!) and feels a bit like a backyard party. The lush garden setting is beautiful and there are quite a few activities and cultural crafts to participate in before dinner and the show starts. A major thing to note is that while it’s not over the top Disney, there ARE some Disney elements. Moana comes out to start the show, Mickey and Minnie lead the children’s hula lesson, there are Moana cupcakes, etc. Overall, I’d say it’s probably better for younger kids. My 7 year old professional luau reviewer had a GREAT time. Read my full review of the luau </span><a data-dcnode-id="859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hulalandblog.com/kawaa-luau-aulani/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="860" instrument_node="">here</span></a><span data-dcnode-id="858" instrument_node="">.</span></p><span data-dcnode-id="856" instrument_node="">
</span><p data-dcnode-id="851"><span data-dcnode-id="855" instrument_node="">And watch our video review below!</span><br data-dcnode-id="854"><span data-dcnode-id="853" instrument_node="">
</span><iframe allowfullscreen="allowfullscreen" data-dcnode-id="852" frameborder="0" height="315" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/-d0md6xAGOg&amp;raw" width="560"></iframe></p><span data-dcnode-id="850" instrument_node="">
</span><p data-dcnode-id="845"><span data-dcnode-id="849" instrument_node="">Paradise Cove is a serious operation. The luau grounds are enormous (and right on the ocean!) and they offer soooo much entertainment. There’s an emu ceremony (where they pull the pig out of the ground), a hukilau (pulling the nets in from the ocean), the shower of flowers (where a guy climbs up a palm tree and showers the onlookers with flower petals), hula lessons and so much more. There are several crafts/activities that have a separate fee and there are a lot of booths and kiosks with things to buy (which I’ve heard some people don’t like that vibe). The food and drinks are ok (not great), but on par with most large luaus. Paradise Cove is probably the best overall luau on Oahu. Read my full review </span><a data-dcnode-id="847" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hulalandblog.com/paradise-cove-luau-oahu/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="848" instrument_node="">here</span></a><span data-dcnode-id="846" instrument_node="">.</span></p><span data-dcnode-id="844" instrument_node="">
</span><p data-dcnode-id="841"><a data-dcnode-id="842" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-34.png"><img alt="Disney's Aulani Resort Review" class="alignnone wp-image-7135 size-full" data-dcnode-id="843" data-jpibfi-post-excerpt="" data-jpibfi-post-title="Aulani Resort &amp; Spa: Disney’s Resort in Hawaii" data-jpibfi-post-url="https://hulalandblog.com/disney-aulani-review/" data-jpibfi-src="https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-34.png" height="450" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-34.png&amp;raw" srcset="https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-34.png 700w, https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-34-300x193.png 300w, https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-34-610x392.png 610w, https://hulalandblog.com/wp-content/uploads/2017/07/Untitled-design-34-480x309.png 480w" title="Disney's Aulani Resort Review" width="700"></a></p><span data-dcnode-id="840" instrument_node="">
</span><p data-dcnode-id="833"><b data-dcnode-id="838"><span data-dcnode-id="839" instrument_node="">Chill at the spa:</span></b><span data-dcnode-id="837" instrument_node=""> The Laniwai Spa is one of the most spectacular spas in Hawaii and definitely not to be missed. The outdoor hydrotherapy garden in one of a kind! Read more about my trip to the spa </span><a data-dcnode-id="835" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hulalandblog.com/best-oahu-spas/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="836" instrument_node="">here</span></a><span data-dcnode-id="834" instrument_node="">.</span></p><span data-dcnode-id="832" instrument_node="">
</span><p data-dcnode-id="828"><b data-dcnode-id="830"><span data-dcnode-id="831" instrument_node="">Check Out Time:</span></b><span data-dcnode-id="829" instrument_node=""> Check out is at 11 AM but a lot of flights to the US mainland don’t leave until much later. No worries! Check out, store your bags with bell services, spend the day enjoying the resort, and when you’re ready to get cleaned up, bell services will give you a pass to the Luana Lounge where there are lockers and showers. I love going back on the red eye (or at least a late flight) so I can take full advantage of that last day.</span></p><span data-dcnode-id="827" instrument_node="">
</span><p data-dcnode-id="823"><b data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">Getting to the Airport:</span></b><span data-dcnode-id="824" instrument_node=""> Disney contracts their airport shuttle service with Speedi Shuttle. You can often book a package at Aulani that includes airport transfers. It’s nice because they know what time you’ll need to leave the resort to get to the airport depending on the time of day. If you’re driving yourself, don’t underestimate how long the drive is with traffic. Generally traffic is worse going into Honolulu in the mornings and coming back to Aulani in the evenings (it follows commuter patterns) and even though the airport is only 20 miles or so it can take an hour or more with traffic. The Honolulu airport is also really hit or miss with crowds. It seems like groups of flights leave all at once which can create bottlenecks at the check in counters and security so leave plenty of time.</span></p><span data-dcnode-id="822" instrument_node="">
