</span><section class="container-wrap main-title alternate-color main-right-breadcrumb border-bottom breadcrumbs-container" data-dcnode-id="1790"><div class="container" data-dcnode-id="1791"><h1 class="page-title" data-dcnode-id="1807"><span data-dcnode-id="1808" instrument_node="">Cultural Relativism</span></h1><div class="breadcrumb-extra" data-dcnode-id="1792"><span data-dcnode-id="1806" instrument_node="">
</span><div class="kleo_framework breadcrumb" data-dcnode-id="1793" itemscope="" itemtype="http://schema.org/BreadcrumbList"><span data-dcnode-id="1801" itemprop="itemListElement" itemscope="" itemtype="http://schema.org/ListItem"><a data-dcnode-id="1803" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//probe.org/" itemprop="item" title="Probe Ministries"><span data-dcnode-id="1804" itemprop="name"><span data-dcnode-id="1805" instrument_node="">Home</span></span></a><meta content="1" data-dcnode-id="1802" itemprop="position"></span><span data-dcnode-id="1800" instrument_node="">

</span><article class="clearfix post-249 post type-post status-publish format-standard hentry category-theology-and-philosophy category-worldview-philosophy tag-bible tag-biblical-perspective tag-biblical-worldview tag-christian tag-christian-view tag-cultural-relativism tag-ethics tag-evolutionary-ethics tag-gods-character tag-john-dewey tag-michael-herskovitz tag-morality tag-sociobiology tag-william-graham-sumner" data-dcnode-id="1296" id="post-249"><span data-dcnode-id="1781" instrument_node="">
</span><div class="article-meta" data-dcnode-id="1760"><span data-dcnode-id="1780" instrument_node="">
</span><span class="post-meta" data-dcnode-id="1762"><span data-dcnode-id="1779" instrument_node="">
</span><small class="meta-author author vcard" data-dcnode-id="1771"><a class="url fn n" data-dcnode-id="1772" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//probe.org/author/kerbyanderson/" rel="author" title="View all POSTS by Kerby Anderson"><img class="avatar pp-user-avatar avatar-50 photo lazyloaded" data-dcnode-id="1778" data-del="avatar" data-src="https://i0.wp.com/www.probe.org/wp-content/uploads/2019/03/Kerby_150x150-1.jpg?fit=50%2C50&amp;ssl=1" height="50" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.probe.org/wp-content/uploads/2019/03/Kerby_150x150-1.jpg%3Ffit%3D50%252C50%26ssl%3D1&amp;raw" width="50"><noscript data-dcnode-id="1776"><span data-dcnode-id="1777" instrument_node="">&lt;img data-del="avatar" src='https://i0.wp.com/www.probe.org/wp-content/uploads/2019/03/Kerby_150x150-1.jpg?fit=50%2C50&amp;ssl=1' class='avatar pp-user-avatar avatar-50 photo ' height='50' width='50'/&gt;</span></noscript><span data-dcnode-id="1775" instrument_node=""> </span><span class="author-name" data-dcnode-id="1773"><span data-dcnode-id="1774" instrument_node="">Kerby Anderson</span></span></a></small><span data-dcnode-id="1770" instrument_node="">, </span><small data-dcnode-id="1764"><a class="post-time" data-dcnode-id="1765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//probe.org/cultural-relativism/" rel="bookmark"><time class="entry-date" data-dcnode-id="1768" datetime="2004-05-27T17:15:44-05:00"><span data-dcnode-id="1769" instrument_node="">May 27, 2004</span></time><time class="modify-date hide hidden updated" data-dcnode-id="1766" datetime="2020-05-22T10:27:50-05:00"><span data-dcnode-id="1767" instrument_node="">May 22, 2020</span></time></a></small><span data-dcnode-id="1763" instrument_node=""> </span></span><span data-dcnode-id="1761" instrument_node="">
</span></div><span data-dcnode-id="1758" instrument_node="">
</span><div class="article-content" data-dcnode-id="1299"><span data-dcnode-id="1757" instrument_node="">
</span><p data-dcnode-id="1754"><em data-dcnode-id="1755"><span data-dcnode-id="1756" instrument_node="">Kerby Anderson presents the basics of cultural relativism and evaluates it from a Christian worldview perspective.&nbsp; Comparing the tenets of cultural relativism to a biblical view of ethics shows how these popular ideas fail the reasonableness test.</span></em></p><span data-dcnode-id="1753" instrument_node="">
</span><p data-dcnode-id="1743" style="text-align: right;"><em data-dcnode-id="1744"><span data-dcnode-id="1752" instrument_node="">This article is also available in </span><a data-dcnode-id="1750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ministeriosprobe.org/docs/relativismo.html" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1751" instrument_node="">Spanish</span></a><span data-dcnode-id="1749" instrument_node="">. </span><a data-dcnode-id="1745" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ministeriosprobe.org/docs/relativismo.html" rel="noopener noreferrer" target="_blank"><img alt="" border="0" class="lazyloaded" data-dcnode-id="1748" data-recalc-dims="1" data-src="https://i0.wp.com/www.probe.org/wp-content/uploads/2005/05/spanish_flag.jpg?w=1200&amp;ssl=1" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.probe.org/wp-content/uploads/2005/05/spanish_flag.jpg%3Fw%3D1200%26ssl%3D1&amp;raw"><noscript data-dcnode-id="1746"><span data-dcnode-id="1747" instrument_node="">&lt;img src="https://i0.wp.com/www.probe.org/wp-content/uploads/2005/05/spanish_flag.jpg?w=1200&amp;#038;ssl=1" alt="" border="0" data-recalc-dims="1" /&gt;</span></noscript></a></em></p><span data-dcnode-id="1742" instrument_node="">
</span><h3 data-dcnode-id="1740"><span data-dcnode-id="1741" instrument_node="">John Dewey</span></h3><span data-dcnode-id="1739" instrument_node="">
</span><p data-dcnode-id="1733"><a data-dcnode-id="1735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/3cXKUW3"><img align="right" alt="" border="0" class="lazyloaded" data-dcnode-id="1738" data-recalc-dims="1" data-src="https://i0.wp.com/www.probe.org/wp-content/uploads/2014/12/measmor.gif?resize=90%2C140&amp;ssl=1" height="140" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.probe.org/wp-content/uploads/2014/12/measmor.gif%3Fresize%3D90%252C140%26ssl%3D1&amp;raw" style="padding-left: 15px;" width="90"><noscript data-dcnode-id="1736"><span data-dcnode-id="1737" instrument_node="">&lt;img style="padding-left: 15px;" src="https://i0.wp.com/www.probe.org/wp-content/uploads/2014/12/measmor.gif?resize=90%2C140&amp;#038;ssl=1" alt="" width="90" height="140" align="right" border="0" data-recalc-dims="1" /&gt;</span></noscript></a><span data-dcnode-id="1734" instrument_node="">Any student in a class on anthropology cannot help but notice the differences between various cultures of the world. Differences in dress, diet, and social norms are readily apparent. Such diversity in terms of ethics and justice are also easily seen and apparently shaped by the culture in which we live.</span></p><span data-dcnode-id="1732" instrument_node="">
</span><p data-dcnode-id="1724"><span data-dcnode-id="1731" instrument_node="">If there is no transcendent ethical standard, then often culture becomes the ethical norm for determining whether an action is right or wrong. This ethical system is known as </span><em data-dcnode-id="1729"><span data-dcnode-id="1730" instrument_node="">cultural relativism</span></em><span data-dcnode-id="1728" instrument_node="">.</span><a data-dcnode-id="1726" href="#text1"><span data-dcnode-id="1727" instrument_node="">{1}</span></a><span data-dcnode-id="1725" instrument_node=""> Cultural relativism is the view that all ethical truth is relative to a specific culture. Whatever a cultural group approves is considered right within that culture. Conversely, whatever a cultural group condemns is wrong.</span></p><span data-dcnode-id="1723" instrument_node="">
</span><p data-dcnode-id="1721"><span data-dcnode-id="1722" instrument_node="">The key to cultural relativism is that right and wrong can only be judged relative to a specified society. There is no ultimate standard of right and wrong by which to judge culture.</span></p><span data-dcnode-id="1720" instrument_node="">
</span><p data-dcnode-id="1718"><span data-dcnode-id="1719" instrument_node="">A famous proponent of this view was John Dewey, often considered the father of American education. He taught that moral standards were like language and therefore the result of custom. Language evolved over time and eventually became organized by a set of principles known as grammar. But language also changes over time to adapt to the changing circumstances of its culture.</span></p><span data-dcnode-id="1717" instrument_node="">
</span><p data-dcnode-id="1715"><span data-dcnode-id="1716" instrument_node="">Likewise, Dewey said, ethics were also the product of an evolutionary process. There are no fixed ethical norms. These are merely the result of particular cultures attempting to organize a set of moral principles. But these principles can also change over time to adapt to the changing circumstances of the culture.</span></p><span data-dcnode-id="1714" instrument_node="">
</span><p data-dcnode-id="1712"><span data-dcnode-id="1713" instrument_node="">This would also mean that different forms of morality evolved in different communities. Thus, there are no universal ethical principles. What may be right in one culture would be wrong in another culture, and vice versa.</span></p><span data-dcnode-id="1711" instrument_node="">
</span><p data-dcnode-id="1709"><span data-dcnode-id="1710" instrument_node="">Although it is hard for us in the modern world to imagine, a primitive culture might value genocide, treachery, deception, even torture. While we may not like these traits, a true follower of cultural relativism could not say these are wrong since they are merely the product of cultural adaptation.</span></p><span data-dcnode-id="1708" instrument_node="">
</span><p data-dcnode-id="1701"><span data-dcnode-id="1707" instrument_node="">Clifford Gertz argued that culture must be seen as “webs of meaning” within which humans must live.</span><a data-dcnode-id="1705" href="#text2"><span data-dcnode-id="1706" instrument_node="">{2}</span></a><span data-dcnode-id="1704" instrument_node=""> Gertz believed that “Humans are shaped exclusively by their culture and therefore there exists no unifying cross-cultural human characteristics.”</span><a data-dcnode-id="1702" href="#text3"><span data-dcnode-id="1703" instrument_node="">{3}</span></a></p><span data-dcnode-id="1700" instrument_node="">
</span><p data-dcnode-id="1697"><span data-dcnode-id="1699" instrument_node="">As we will see, cultural relativism allows us to be tolerant toward other cultures, but it provides no basis to judge or evaluate other cultures and their practices. </span><a data-dcnode-id="1698" name="graham" style="width: 20px; height: 20px; text-indent: 20px; background-image: url('https://www.kintera.com/CuteEditor6/CuteSoft_Client_6.6/CuteEditor/Load.ashx?type=image&amp;file=anchor.gif'); background-repeat: no-repeat;"></a></p><span data-dcnode-id="1696" instrument_node="">
</span><h3 data-dcnode-id="1694"><span data-dcnode-id="1695" instrument_node="">William Graham Sumner</span></h3><span data-dcnode-id="1693" instrument_node="">
</span><p data-dcnode-id="1691"><span data-dcnode-id="1692" instrument_node="">A key figure who expanded on Dewey’s ideas was William Graham Sumner of Yale University. He argued that what our conscience tells us depends solely upon our social group. The moral values we hold are not part of our moral nature, according to Sumner. They are part of our training and upbringing.</span></p><span data-dcnode-id="1690" instrument_node="">
</span><p data-dcnode-id="1682"><span data-dcnode-id="1689" instrument_node="">Sumner argued in his book, </span><em data-dcnode-id="1687"><span data-dcnode-id="1688" instrument_node="">Folkways</span></em><span data-dcnode-id="1686" instrument_node="">: “World philosophy, life policy, right, rights, and morality are all products of the folkways.”</span><a data-dcnode-id="1684" href="#text4"><span data-dcnode-id="1685" instrument_node="">{4}</span></a><span data-dcnode-id="1683" instrument_node=""> In other words, what we perceive as conscience is merely the product of culture upon our minds through childhood training and cultural influence. There are no universal ethical principles, merely different cultural conditioning.</span></p><span data-dcnode-id="1681" instrument_node="">
</span><p data-dcnode-id="1679"><span data-dcnode-id="1680" instrument_node="">Sumner studied all sorts of societies (primitive and advanced), and was able to document numerous examples of cultural relativism. Although many cultures promoted the idea, for example, that a man could have many wives, Sumner discovered that in Tibet a woman was encouraged to have many husbands. He also described how some Eskimo tribes allowed deformed babies to die by being exposed to the elements. In the Fiji Islands, aged parents were killed.</span></p><span data-dcnode-id="1678" instrument_node="">
</span><p data-dcnode-id="1676"><span data-dcnode-id="1677" instrument_node="">Sumner believed that this diversity of moral values clearly demonstrated that culture is the sole determinant of our ethical standards. In essence, culture determines what is right and wrong. And different cultures come to different ethical conclusions.</span></p><span data-dcnode-id="1675" instrument_node="">
</span><p data-dcnode-id="1673"><span data-dcnode-id="1674" instrument_node="">Proponents of cultural relativism believe this cultural diversity proves that culture alone is responsible for our morality. There is no soul or spirit or mind or conscience. Moral relativists say that what we perceive as moral convictions or conscience are the byproducts of culture.</span></p><span data-dcnode-id="1672" instrument_node="">
</span><p data-dcnode-id="1670"><span data-dcnode-id="1671" instrument_node="">The strength of cultural relativism is that it allows us to withhold moral judgments about the social practices of another culture. In fact, proponents of cultural relativism would say that to pass judgment on another culture would be ethnocentric.</span></p><span data-dcnode-id="1669" instrument_node="">
</span><p data-dcnode-id="1666"><span data-dcnode-id="1668" instrument_node="">This strength, however, is also a major weakness. Cultural relativism excuses us from judging the moral practices of another culture. Yet we all feel compelled to condemn such actions as the Holocaust or ethnic cleansing. Cultural relativism as an ethical system, however, provides no foundation for doing so. </span><a data-dcnode-id="1667" name="melville" style="width: 20px; height: 20px; text-indent: 20px; background-image: url('https://www.kintera.com/CuteEditor6/CuteSoft_Client_6.6/CuteEditor/Load.ashx?type=image&amp;file=anchor.gif'); background-repeat: no-repeat;"></a></p><span data-dcnode-id="1665" instrument_node="">
</span><h3 data-dcnode-id="1663"><span data-dcnode-id="1664" instrument_node="">Melville Herskovits</span></h3><span data-dcnode-id="1662" instrument_node="">
</span><p data-dcnode-id="1654"><span data-dcnode-id="1661" instrument_node="">Melville J. Herskovits wrote in </span><em data-dcnode-id="1659"><span data-dcnode-id="1660" instrument_node="">Cultural Relativism</span></em><span data-dcnode-id="1658" instrument_node="">: “Judgments are based on experience, and experience is interpreted by each individual in terms of his own enculturation.”</span><a data-dcnode-id="1656" href="#text5"><span data-dcnode-id="1657" instrument_node="">{5}</span></a><span data-dcnode-id="1655" instrument_node=""> In other words, a person’s judgment about what is right and wrong is determined by their cultural experiences. This would include everything from childhood training to cultural pressures to conform to the majority views of the group. Herskovits went on to argue that even the definition of what is normal and abnormal is relative to culture.</span></p><span data-dcnode-id="1653" instrument_node="">
</span><p data-dcnode-id="1651"><span data-dcnode-id="1652" instrument_node="">He believed that cultures were flexible, and so ethical norms change over time. The standard of ethical conduct may change over time to meet new cultural pressures and demands. When populations are unstable and infant mortality is high, cultures value life and develop ethical systems to protect it. When a culture is facing overpopulation, a culture redefines ethical systems and even the value of life. Life is valuable and sacred in the first society. Mercy killing might become normal and acceptable in the second society.</span></p><span data-dcnode-id="1650" instrument_node="">
</span><p data-dcnode-id="1648"><span data-dcnode-id="1649" instrument_node="">Polygamy might be a socially acceptable standard for society. But later, that society might change its perspective and believe that it is wrong for a man to have more than one wife. Herskovits believed that whatever a society accepted or rejected became the standard of morality for the individuals in that society.</span></p><span data-dcnode-id="1647" instrument_node="">
</span><p data-dcnode-id="1642"><span data-dcnode-id="1646" instrument_node="">He believed that “the need for a cultural relativistic point of view has become apparent because of the realization that there is no way to play this game of making judgment across cultures except with loaded dice.”</span><a data-dcnode-id="1644" href="#text6"><span data-dcnode-id="1645" instrument_node="">{6}</span></a><span data-dcnode-id="1643" instrument_node=""> Ultimately, he believed, culture determines our moral standards and attempting to compare or contrast cultural norms is futile.</span></p><span data-dcnode-id="1641" instrument_node="">
</span><p data-dcnode-id="1639"><span data-dcnode-id="1640" instrument_node="">In a sense, the idea of cultural relativism has helped encourage such concepts as multiculturalism and postmodernism. After all, if truth is created not discovered, then all truths created by a particular culture are equally true. This would mean that cultural norms and institutions should be considered equally valid if they are useful to a particular group of people within a culture.</span></p><span data-dcnode-id="1638" instrument_node="">
</span><p data-dcnode-id="1635"><span data-dcnode-id="1637" instrument_node="">And this is one of the major problems with a view of cultural relativism: you cannot judge the morality of another culture. If there is no objective standard, then someone in one culture does not have a right to evaluate the actions or morality of another culture. Yet in our hearts we know that certain things like racism, discrimination, and exploitation are wrong. </span><a data-dcnode-id="1636" name="ethics" style="width: 20px; height: 20px; text-indent: 20px; background-image: url('https://www.kintera.com/CuteEditor6/CuteSoft_Client_6.6/CuteEditor/Load.ashx?type=image&amp;file=anchor.gif'); background-repeat: no-repeat;"></a></p><span data-dcnode-id="1634" instrument_node="">
</span><h3 data-dcnode-id="1632"><span data-dcnode-id="1633" instrument_node="">Evolutionary Ethics</span></h3><span data-dcnode-id="1631" instrument_node="">
</span><p data-dcnode-id="1629"><span data-dcnode-id="1630" instrument_node="">Foundational to the view of cultural relativism is the theory of evolution. Since social groups experience cultural change with the passage of time, changing customs and morality evolve differently in different places and times.</span></p><span data-dcnode-id="1628" instrument_node="">
</span><p data-dcnode-id="1620"><span data-dcnode-id="1627" instrument_node="">Anthony Flew, author of </span><em data-dcnode-id="1625"><span data-dcnode-id="1626" instrument_node="">Evolutionary Ethics,</span></em><span data-dcnode-id="1624" instrument_node=""> states his perspective this way: “All morals, ideas and ideals have been originated in the world; and that, having thus in the past been subject to change, they will presumably in the future too, for better or worse, continue to evolve.”</span><a data-dcnode-id="1622" href="#text7"><span data-dcnode-id="1623" instrument_node="">{7}</span></a><span data-dcnode-id="1621" instrument_node=""> He denies the existence of God and therefore an objective, absolute moral authority. But he also believes in the authority of a value system.</span></p><span data-dcnode-id="1619" instrument_node="">
</span><p data-dcnode-id="1617"><span data-dcnode-id="1618" instrument_node="">His theory is problematic because it does not adequately account for the origin, nature, and basis of morals. Flew suggests that morals somehow originated in this world and are constantly evolving.</span></p><span data-dcnode-id="1616" instrument_node="">
</span><p data-dcnode-id="1608"><span data-dcnode-id="1615" instrument_node="">Even if we concede his premise, we must still ask, Where and when did the first moral value originate? Essentially, Flew is arguing that a value came from a non-value. In rejecting the biblical idea of a Creator whose character establishes a moral standard for values, Flew is forced to attempt to derive an </span><em data-dcnode-id="1613"><span data-dcnode-id="1614" instrument_node="">ought</span></em><span data-dcnode-id="1612" instrument_node=""> from an </span><em data-dcnode-id="1610"><span data-dcnode-id="1611" instrument_node="">is</span></em><span data-dcnode-id="1609" instrument_node="">.</span></p><span data-dcnode-id="1607" instrument_node="">
</span><p data-dcnode-id="1602"><span data-dcnode-id="1606" instrument_node="">Evolutionary ethics rests upon the assumption that values are by nature constantly changing or evolving. It claims that it is of value that values are changing. But is </span><em data-dcnode-id="1604"><span data-dcnode-id="1605" instrument_node="">this</span></em><span data-dcnode-id="1603" instrument_node=""> value changing?</span></p><span data-dcnode-id="1601" instrument_node="">
</span><p data-dcnode-id="1599"><span data-dcnode-id="1600" instrument_node="">If the answer to this question is no, then that would mean that moral values don’t have to always change. And if that is the case, then there could be unchanging values (known as absolute standards). However, if the value that values change is itself unchanging, then the view is self-contradictory.</span></p><span data-dcnode-id="1598" instrument_node="">
</span><p data-dcnode-id="1591"><span data-dcnode-id="1597" instrument_node="">Another form of evolutionary ethics is </span><em data-dcnode-id="1595"><span data-dcnode-id="1596" instrument_node="">sociobiology</span></em><span data-dcnode-id="1594" instrument_node="">. E. O. Wilson of Harvard University is a major advocate of sociobiology, and claims that scientific materialism will eventually replace traditional religion and other ideologies.</span><a data-dcnode-id="1592" href="#text8"><span data-dcnode-id="1593" instrument_node="">{8}</span></a></p><span data-dcnode-id="1590" instrument_node="">
</span><p data-dcnode-id="1588"><span data-dcnode-id="1589" instrument_node="">According to sociobiology, human social systems have been shaped by an evolutionary process. Human societies exist and survive because they work and because they have worked in the past.</span></p><span data-dcnode-id="1587" instrument_node="">
</span><p data-dcnode-id="1582"><span data-dcnode-id="1586" instrument_node="">A key principle is the reproductive imperative.</span><a data-dcnode-id="1584" href="#text9"><span data-dcnode-id="1585" instrument_node="">{9}</span></a><span data-dcnode-id="1583" instrument_node=""> The ultimate goal of any organism is to survive and reproduce. Moral systems exist because they ultimately promote human survival and reproduction.</span></p><span data-dcnode-id="1581" instrument_node="">
</span><p data-dcnode-id="1579"><span data-dcnode-id="1580" instrument_node="">Another principle is that all behavior is selfish at the most basic level. We love our children, according to this view, because love is an effective means of raising effective reproducers.</span></p><span data-dcnode-id="1578" instrument_node="">
</span><p data-dcnode-id="1576"><span data-dcnode-id="1577" instrument_node="">At the very least, sociobiology is a very cynical view of human nature and human societies. Are we really to believe that all behavior is selfish? Is there no altruism?</span></p><span data-dcnode-id="1575" instrument_node="">
</span><p data-dcnode-id="1566"><span data-dcnode-id="1574" instrument_node="">The Bible and human experience seem to strongly contradict this. Ray Bohlin’s </span><a data-dcnode-id="1572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.probe.org/sociobiology-evolution-genes-and-morality/" title="Sociobiology"><span data-dcnode-id="1573" instrument_node="">article</span></a><span data-dcnode-id="1571" instrument_node=""> on the Probe Web site provides a detailed refutation of this form of evolutionary ethics.</span><a data-dcnode-id="1569" href="#text10"><span data-dcnode-id="1570" instrument_node="">{10}</span></a><span data-dcnode-id="1568" instrument_node=""> </span><a data-dcnode-id="1567" name="eval"></a></p><span data-dcnode-id="1565" instrument_node="">
</span><h3 data-dcnode-id="1563"><span data-dcnode-id="1564" instrument_node="">Evaluating Cultural Relativism</span></h3><span data-dcnode-id="1562" instrument_node="">
</span><p data-dcnode-id="1560"><span data-dcnode-id="1561" instrument_node="">In attempting to evaluate cultural relativism, we should acknowledge that we could indeed learn many things from other cultures. We should never fall into the belief that our culture has all the answers. No culture has a complete monopoly on the truth. Likewise, Christians must guard against the assumption that their Christian perspective on their cultural experiences should be normative for every other culture.</span></p><span data-dcnode-id="1559" instrument_node="">
</span><p data-dcnode-id="1557"><span data-dcnode-id="1558" instrument_node="">However, as we have already seen, the central weakness of cultural relativism is its unwillingness to evaluate another culture. This may seem satisfactory when we talk about language, customs, even forms of worship. But this non-judgmental mindset breaks down when confronted by real evils such as slavery or genocide. The Holocaust, for example, cannot be merely explained away as an appropriate cultural response for Nazi Germany.</span></p><span data-dcnode-id="1556" instrument_node="">
</span><p data-dcnode-id="1554"><span data-dcnode-id="1555" instrument_node="">Cultural relativism faces other philosophical problems. For example, it is insufficient to say that morals originated in the world and that they are constantly changing. Cultural relativists need to answer how value originated out of non-value. How did the first value arise?</span></p><span data-dcnode-id="1553" instrument_node="">
</span><p data-dcnode-id="1551"><span data-dcnode-id="1552" instrument_node="">Fundamental to cultural relativism is a belief that values change. But if the value that values change is itself unchanging, then this theory claims an unchanging value that all values change and evolve. The position is self-contradictory.</span></p><span data-dcnode-id="1550" instrument_node="">
</span><p data-dcnode-id="1548"><span data-dcnode-id="1549" instrument_node="">Another important concern is conflict. If there are no absolute values that exist trans-culturally or externally to the group, how are different cultures to get along when values collide? How are we to handle these conflicts?</span></p><span data-dcnode-id="1547" instrument_node="">
</span><p data-dcnode-id="1545"><span data-dcnode-id="1546" instrument_node="">Moreover, is there ever a place for courageous individuals to challenge the cultural norm and fight against social evil? Cultural relativism seems to leave no place for social reformers. The abolition movement, the suffrage movement, and the civil rights movement are all examples of social movements that ran counter to the social circumstances of the culture. Abolishing slavery and providing rights to citizens are good things even if they were opposed by many people within society.</span></p><span data-dcnode-id="1544" instrument_node="">
</span><p data-dcnode-id="1542"><span data-dcnode-id="1543" instrument_node="">The Bible provides a true standard by which to judge attitudes and actions. Biblical standards can be used to judge individual sin as well as corporate sin institutionalized within a culture.</span></p><span data-dcnode-id="1541" instrument_node="">
</span><p data-dcnode-id="1539"><span data-dcnode-id="1540" instrument_node="">By contrast, culture cannot be used to judge right and wrong. A changing culture cannot provide a fixed standard for morality. Only God’s character, revealed in the Bible provides a reliable measure for morality.</span></p><span data-dcnode-id="1538" instrument_node="">
</span><p data-dcnode-id="1535"><strong data-dcnode-id="1536"><span data-dcnode-id="1537" instrument_node="">Notes</span></strong></p><span data-dcnode-id="1534" instrument_node="">
</span><p data-dcnode-id="1532"><a data-dcnode-id="1533" name="text1"></a></p><span data-dcnode-id="1531" instrument_node="">

eral books, including </span><em data-dcnode-id="1388"><span data-dcnode-id="1389" instrument_node="">Christian Ethics in Plain Language</span></em><span data-dcnode-id="1387" instrument_node="">, </span><em data-dcnode-id="1385"><span data-dcnode-id="1386" instrument_node="">Genetic Engineering</span></em><span data-dcnode-id="1384" instrument_node="">, </span><em data-dcnode-id="1382"><span data-dcnode-id="1383" instrument_node="">Origin Science</span></em><span data-dcnode-id="1381" instrument_node="">, </span><em data-dcnode-id="1379"><span data-dcnode-id="1380" instrument_node="">Signs of Warning, Signs of Hope</span></em><span data-dcnode-id="1378" instrument_node=""> and </span><em data-dcnode-id="1376"><span data-dcnode-id="1377" instrument_node="">Making the Most of Your Money in Tough Times</span></em><span data-dcnode-id="1375" instrument_node="">. His new series with Harvest House Publishers includes: </span><em data-dcnode-id="1373"><span data-dcnode-id="1374" instrument_node="">A Biblical Point of View on Islam,</span></em><span data-dcnode-id="1372" instrument_node=""> </span><em data-dcnode-id="1370"><span data-dcnode-id="1371" instrument_node="">A Biblical Point of View on Homosexuality</span></em><span data-dcnode-id="1369" instrument_node="">, </span><em data-dcnode-id="1367"><span data-dcnode-id="1368" instrument_node="">A Biblical Point of View on Intelligent Design</span></em><span data-dcnode-id="1366" instrument_node=""> and </span><em data-dcnode-id="1364"><span data-dcnode-id="1365" instrument_node="">A Biblical Point of View on Spiritual Warfare</span></em><span data-dcnode-id="1363" instrument_node="">. He is the host of "Point of View" (USA Radio Network) heard on 360 radio outlets nationwide as well as on the Internet (</span><a data-dcnode-id="1361" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.pointofview.net/"><span data-dcnode-id="1362" instrument_node="">www.pointofview.net</span></a><span data-dcnode-id="1360" instrument_node="">) and shortwave. He is also a regular guest on "Prime Time America" (Moody Broadcasting Network) and "Fire Away" (American Family Radio). He produces a daily syndicated radio commentary and writes editorials that have appeared in papers such as the </span><em data-dcnode-id="1358"><span data-dcnode-id="1359" instrument_node="">Dallas Morning News</span></em><span data-dcnode-id="1357" instrument_node="">, the </span><em data-dcnode-id="1355"><span data-dcnode-id="1356" instrument_node="">Miami Herald</span></em><span data-dcnode-id="1354" instrument_node="">, the </span><em data-dcnode-id="1352"><span data-dcnode-id="1353" instrument_node="">San Jose Mercury</span></em><span data-dcnode-id="1351" instrument_node="">, and the </span><em data-dcnode-id="1349"><span data-dcnode-id="1350" instrument_node="">Houston Post</span></em><span data-dcnode-id="1348" instrument_node="">.</span></p><span data-dcnode-id="1346" instrument_node="">

ata-dcnode-id="444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//probe.org/defending-theism-a-response-to-hume-russell-and-dawkins/"><span data-dcnode-id="445" instrument_node="">Defending Theism: A Response to Hume, Russell, and Dawkins</span></a><span data-dcnode-id="443" instrument_node=""> </span><span class="rss-date" data-dcnode-id="441"><span data-dcnode-id="442" instrument_node="">April 3, 2022</span></span><div class="rssSummary" data-dcnode-id="439"><span data-dcnode-id="440" instrument_node="">T.S. Weaver looks at anti-God arguments from three prominent philosophers, showing why belief is God is more reasonable than their objections to His existence.</span></div><span data-dcnode-id="438" instrument_node=""> </span><cite data-dcnode-id="436"><span data-dcnode-id="437" instrument_node="">T.S. Weaver</span></cite></li><li data-dcnode-id="424"><a class="rsswidget" data-dcnode-id="433" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//probe.org/is-god-still-doing-miracles/"><span data-dcnode-id="434" instrument_node="">Is God Still Doing Miracles?</span></a><span data-dcnode-id="432" instrument_node=""> </span><span class="rss-date" data-dcnode-id="430"><span data-dcnode-id="431" instrument_node="">March 20, 2022</span></span><div class="rssSummary" data-dcnode-id="428"><span data-dcnode-id="429" instrument_node="">Sue Bohlin asked Dr. Cara Polsley to give an account of the big, magnificent answers to prayer in the wake of a horrific car accident that left her paralyzed but still overcoming major obstacles with God's grace.</span></div><span data-dcnode-id="427" instrument_node=""> </span><cite data-dcnode-id="425"><span data-dcnode-id="426" instrument_node="">Sue Bohlin</span></cite></li><li data-dcnode-id="413"><a class="rsswidget" data-dcnode-id="422" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//probe.org/probe-survey-2020-report-6-nothing-in-particulars-and-biblical-views/"><span data-dcnode-id="423" instrument_node="">Probe Survey 2020 Report 6: Nothing in Particulars and Biblical Views</span></a><span data-dcnode-id="421" instrument_node=""> </span><span class="rss-date" data-dcnode-id="419"><span data-dcnode-id="420" instrument_node="">February 4, 2022</span></span><div class="rssSummary" data-dcnode-id="417"><span data-dcnode-id="418" instrument_node="">Steve Cable continues his analysis of Probe's 2020 Survey on religious beliefs, examining some basic beliefs of "Nothing in Particulars" on salvation, biblical worldview, and sexual issues.</span></div><span data-dcnode-id="416" instrument_node=""> </span><cite data-dcnode-id="414"><span data-dcnode-id="415" instrument_node="">Steve Cable</span></cite></li><li data-dcnode-id="402"><a class="rsswidget" data-dcnode-id="411" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//probe.org/dr-ray-bohlin-presents-natural-limits-to-biological-change/"><span data-dcnode-id="412" instrument_node="">Dr. Ray Bohlin Presents 'Natural Limits to Biological Change'</span></a><span data-dcnode-id="410" instrument_node=""> </span><span class="rss-date" data-dcnode-id="408"><span data-dcnode-id="409" instrument_node="">January 26, 2022</span></span><div class="rssSummary" data-dcnode-id="406"><span data-dcnode-id="407" instrument_node="">Discovery Institute’s Dallas Conference on Science and Faith (January 22, 2022) featured Probe VP and Discovery Institute Fellow Dr. Ray Bohlin’s breakout session on his book 'The Natural Limits to Biological Change.' Here is the video of that presentation.</span></div><span data-dcnode-id="405" instrument_node=""> </span><cite data-dcnode-id="403"><span data-dcnode-id="404" instrument_node="">Dr. Ray Bohlin</span></cite></li><li data-dcnode-id="391"><a class="rsswidget" data-dcnode-id="400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//probe.org/talking-about-the-problem-of-evil/"><span data-dcnode-id="401" instrument_node="">Talking About the Problem of Evil</span></a><span data-dcnode-id="399" instrument_node=""> </span><span class="rss-date" data-dcnode-id="397"><span data-dcnode-id="398" instrument_node="">January 23, 2022</span></span><div class="rssSummary" data-dcnode-id="395"><span data-dcnode-id="396" instrument_node="">T.S. Weaver has put together an intellectual response to the problem of evil that includes a theology of evil and suffering, and a philosophical/theological series of proper defenses of God and his righteousness considering evil.</span></div><span data-dcnode-id="394" instrument_node=""> </span><cite data-dcnode-id="392"><span data-dcnode-id="393" instrument_node="">T.S. Weaver</span></cite></li><li data-dcnode-id="380"><a class="rsswidget" data-dcnode-id="389" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//probe.org/return-of-the-god-hypothesis-for-regular-people/"><span data-dcnode-id="390" instrument_node="">'Return of the God Hypothesis' for Regular People</span></a><span data-dcnode-id="388" instrument_node=""> </span><span class="rss-date" data-dcnode-id="386"><span data-dcnode-id="387" instrument_node="">January 9, 2022</span></span><div class="rssSummary" data-dcnode-id="384"><span data-dcnode-id="385" instrument_node="">Dr. Ray Bohlin provides an overview of Stephen Meyer’s Return of the God Hypothesis, looking at how recent scientific discoveries provide evidence for an intelligent creator.</span></div><span data-dcnode-id="383" instrument_node=""> </span><cite data-dcnode-id="381"><span data-dcnode-id="382" instrument_node="">Dr. Ray Bohlin</span></cite></li><li data-dcnode-id="369"><a class="rsswidget" data-dcnode-id="378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//probe.org/probe-survey-2020-report-5-sexual-attitudes-and-religion-vs-science/"><span data-dcnode-id="379" instrument_node="">Probe Survey 2020 Report 5: Sexual Attitudes and Religion vs. Science</span></a><span
