</span><meta content="In the globalization era, social media become more popular in everyone’s daily life with its user friendly and effective functions. Social media support the people across the world in communicating, meeting new people, making socialization, sharing knowledge, learning different experiences and interacting with each other instead of distance and separation between persons. Moreover, social media can encourage the increasing of intercultural adaptation level of people who are facing different cultural experiences in new communities. The study shows that people use social media to become more adaptable with the new cultures of the host countries and to preserve their connections with home countries. This paper attempts to find out how social media shape the intercultural adaptation process and bridge the connection with their home countries while they are in new community analyzing on 15 international students who are currently studying in China with the support of Chinese government scholarship program. In-depth interviews using qualitative method are applied in this research. Depending on the analysis result, the discussions are openly stated about the impact of social media in cultural adaptation process." data-dcnode-id="1205" http-equiv="description"><span data-dcnode-id="1204" instrument_node="">

</span></v:imagedata></v:shape></p><p class="cs_address" data-dcnode-id="917"><img data-dcnode-id="919" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//html.scirp.org/file/9-2500537x3.png&amp;raw"><img data-dcnode-id="918" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//html.scirp.org/file/9-2500537x2.png&amp;raw"></p><p data-dcnode-id="915"><img data-dcnode-id="916" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//html.scirp.org/file/18-1760983x4.png&amp;raw"></p><p class="cs_time" data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">Received: August 16, 2018; Accepted: September 11, 2018; Published: September 14, 2018</span></p><span data-dcnode-id="912" instrument_node="">

</span><p class="E-Title1" data-dcnode-id="903"><a data-dcnode-id="904" id="txtF0" target="_self"><span data-dcnode-id="905" instrument_node="">ABSTRACT</span></a></p><p class="abstractCon" data-dcnode-id="901"><span data-dcnode-id="902" instrument_node="">In the globalization era, social media become more popular in everyone’s daily life with its user friendly and effective functions. Social media support the people across the world in communicating, meeting new people, making socialization, sharing knowledge, learning different experiences and interacting with each other instead of distance and separation between persons. Moreover, social media can encourage the increasing of intercultural adaptation level of people who are facing different cultural experiences in new communities. The study shows that people use social media to become more adaptable with the new cultures of the host countries and to preserve their connections with home countries. This paper attempts to find out how social media shape the intercultural adaptation process and bridge the connection with their home countries while they are in new community analyzing on 15 international students who are currently studying in China with the support of Chinese government scholarship program. In-depth interviews using qualitative method are applied in this research. Depending on the analysis result, the discussions are openly stated about the impact of social media in cultural adaptation process.</span></p><p data-dcnode-id="898"><strong data-dcnode-id="899" style="color:#31849B;"><span data-dcnode-id="900" instrument_node="">Keywords:</span></strong></p><p class="abstractCon" data-dcnode-id="896"><span data-dcnode-id="897" instrument_node="">Culture, Social Media, Intercultural Communication, Cultural Adaptation, International Students</span></p><p data-dcnode-id="894"><img data-dcnode-id="895" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//html.scirp.org/file/2-1410169x6.png&amp;raw"></p><p class="E-Title1" data-dcnode-id="891"><a data-dcnode-id="892" id="txtF1" target="_self"><span data-dcnode-id="893" instrument_node="">1. Introduction</span></a></p><p data-dcnode-id="886"><span data-dcnode-id="890" instrument_node="">It can be said that cultures around the world have their own values, individual traditions, beliefs and norms which can surely make them unique from each other. According to 
</span><a class="content_c05" data-dcnode-id="888" href="#ref05" id="return0" onclick="returnAuhor(05,0)" target="_self"><span data-dcnode-id="889" instrument_node="">
  Chen &amp; Zhang (2010) 
</span></a><span data-dcnode-id="887" instrument_node="">, due to the convergence of new media and globalization, has shrunk the world into a much smaller interactive field. Moreover, during the globalization era, the number of people who go abroad for studying, doing business and so on has become significantly increased.</span></p><p data-dcnode-id="881"><span data-dcnode-id="885" instrument_node="">Due to the different culture and community practices, the sojourners always face culture shock when they first get to the host countries. Therefore, they use different methods and resources to lessen the shock and to be adjustable in the new culture and community. 
</span><a class="content_c01" data-dcnode-id="883" href="#ref01" id="return1" onclick="returnAuhor(01,1)" target="_self"><span data-dcnode-id="884" instrument_node="">
  Adelman (1988) 
</span></a><span data-dcnode-id="882" instrument_node=""> mentioned that it is widely accepted that the social outlook of human assistance is necessary in the process of cross-cultural adaptation in terms of social support from people from home country and host country with new culture. Those kinds of support come from the various ways; however, social networking technologies or social media are the most effective way for sojourners in communication and learning new culture. Social networking technologies help people to communicate in different modes of geographic location and time.</span></p><p data-dcnode-id="876"><span data-dcnode-id="880" instrument_node="">Social media connect people across space and time and allowing them to find like-minded communities and participate creatively in public life as never before. Moreover, social media promote the interconnectedness and interdependence of our culturally diverse world. Media for social interaction allow for people to communicate and engage with information that is quickly accessible on the Internet. In recent years, social media have become more popular in daily activities and routines of the people as the number of internet users become higher. While social media provide a common way of linking people together through knowledge, behavior, and attitudes, a sense of belonging to a greater social network other than one’s own local community is significantly established. The social media support the effective way to connect a diversity of people, traditions, opinions and places with each other across the world without being restricted by the limitations of time and distance 
</span><a class="content_c20" data-dcnode-id="878" href="#ref20" id="return2" onclick="returnAuhor(20,2)" target="_self"><span data-dcnode-id="879" instrument_node="">
  (Sawyer &amp; Chen, 2012) 
</span></a><span data-dcnode-id="877" instrument_node="">.</span></p><p data-dcnode-id="871"><span data-dcnode-id="875" instrument_node="">Based on such kind of multi functions, social media become important for sojourners in settling down the stress and depression from the physical and geographical separation from the previous community in the home country. The sites can help to build a new relation in the host culture and also become the most important factor for the issue of cultural adaption of sojourners 
</span><a class="content_c06" data-dcnode-id="873" href="#ref06" id="return3" onclick="returnAuhor(06,3)" target="_self"><span data-dcnode-id="874" instrument_node="">
  (Church, 1982) 
</span></a><span data-dcnode-id="872" instrument_node="">. Therefore, it is so significant that social networking sites provide the chances for the sojourners to be familiar with both old relations with the community in the home country and also new one in the host community.</span></p><p data-dcnode-id="869"><span data-dcnode-id="870" instrument_node="">Alan Dershowitz’s famous statement shows that internet knows no borders. With the effect of social media, geographical borders are overcome by individuals. It can be obviously seen that two persons from different places with different cultures are now sharing the similar meanings. Throughout the intercultural adaptation, social media are widely used for learning about their host countries, implement the relationships and stay connected with the events in their home countries. Communication and interaction are two main factors that have impact how social media affect intercultural adaptation.</span></p><p data-dcnode-id="864"><span data-dcnode-id="868" instrument_node="">As 
</span><a class="content_c22" data-dcnode-id="866" href="#ref22" id="return4" onclick="returnAuhor(22,4)" target="_self"><span data-dcnode-id="867" instrument_node="">
  Steger (2009) 
</span></a><span data-dcnode-id="865" instrument_node=""> mentioned,</span></p><p data-dcnode-id="862"><span data-dcnode-id="863" instrument_node="">“Due to the thrust of new media, the global trend creates new social networks and activities, redefines political, cultural, economic, geographical and other boundaries of human society, expands and stretches social relations, intensifies and accelerates social exchanges and involves both the micro-structures of personhood and macro-structures of community.”</span></p><p data-dcnode-id="854"><span data-dcnode-id="861" instrument_node="">When 
</span><a class="content_c20" data-dcnode-id="859" href="#ref20" id="return5" onclick="returnAuhor(20,5)" target="_self"><span data-dcnode-id="860" instrument_node="">
  Sawyer &amp; Chen (2012) 
</span></a><span data-dcnode-id="858" instrument_node=""> analyzed how international students apply social media for their intercultural adaptation, they found that social media could create a community for international students to connect with people not only from their home but also from the host countries. Therefore, it can absolutely support them having a strong personal relationship and establish a sense of adaptation to the culture of host country. Using social media significantly supports international student to overcome barriers of cross cultural communication in the stage of intercultural adaptation. It is found out that sojourners start relying much on social media in the beginning stage of living in the host country because of the culture shock and connection with the people from their home country for getting rid of the sense of homesickness and building a new comfort zone in the different community. After the initial stage with the time passing by, their use of social media has been changed to interaction with the people from the host culture for the adaptation of the new culture 
</span><a class="content_c20" data-dcnode-id="856" href="#ref20" id="return6" onclick="returnAuhor(20,6)" target="_self"><span data-dcnode-id="857" instrument_node="">
  (Sawyer &amp; Chen, 2012) 
</span></a><span data-dcnode-id="855" instrument_node="">.</span></p><p data-dcnode-id="850"><a class="content_c07" data-dcnode-id="852" href="#ref07" id="return7" onclick="returnAuhor(07,7)" target="_self"><span data-dcnode-id="853" instrument_node="">
  Croucher (2011) 
</span></a><span data-dcnode-id="851" instrument_node=""> attempted to figure out a theoretical model through the integration of cultivation theory and ethnic group vitality to shape the connection between social networking and cultural adaptation. He illustrated two statements and the first one is that the use of social networking sites has impacts immigrants’ interaction with the dominant culture during cultural adaptation. And the second statement is that the use of social networking sites will affect immigrants’ in-group communication during cultural adaptation.</span></p><p data-dcnode-id="848"><span data-dcnode-id="849" instrument_node="">There are so many researches in finding out the relation between the social network and cultural adaptation of international students or sojourners based on different regions of the world. However, it can be said that China is the significant region in term of supplying social networking sites. The most popular social networking sites around the world such as Facebook, Twitter, Instagram, YouTube and Google products are blocked in China and so the international students who first come to China face big culture shocks in terms of social media. Therefore, this study focus on the cultural adaptation process and social media effect on international students who are studying in China for their degrees. The study will show how social media has impact on cultural adaptation of international students in host country and also how it can maintain the connections of international students between their host countries and home countries.</span></p><p class="E-Title1" data-dcnode-id="845"><a data-dcnode-id="846" id="txtF2" target="_self"><span data-dcnode-id="847" instrument_node="">2. Theoretical Background</span></a></p><p class="E-Title2" data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">2.1. Culture</span></p><p data-dcnode-id="838"><span data-dcnode-id="842" instrument_node="">According to Edward Burnett Tylor, culture is a complex whole which includes knowledge, belief, art, morals, law, custom and any other capabilities and habits acquired by man as a member of society 
</span><a class="content_c24" data-dcnode-id="840" href="#ref24" id="return8" onclick="returnAuhor(24,8)" target="_self"><span data-dcnode-id="841" instrument_node="">
  (Tylor, 1871) 
</span></a><span data-dcnode-id="839" instrument_node="">. Therefore, it can be said that culture and communication is a related phenomenon that could express that culture is a communication process and communication is a culture process. The more different between high context culture and low context culture, the more impacts have on cultural representation on electronic media. It means that culture orientations have impacts on the choices of users on social network applications.</span></p><p data-dcnode-id="833"><span data-dcnode-id="837" instrument_node="">Power distance, individualism/collectivism, masculinity/femininity, uncertainty avoidance and long-term/short-term orientation are Hofstede’s cultural dimensions 
</span><a class="content_c14" data-dcnode-id="835" href="#ref14" id="return9" onclick="returnAuhor(14,9)" target="_self"><span data-dcnode-id="836" instrument_node="">
  (Itim, 2009) 
</span></a><span data-dcnode-id="834" instrument_node="">. Power distance is defined as under the situation when the less powerful members of organizations and institutions accept and expect that power is distributed unequally. This represents inequality but defined from below, not from above. The various degrees that can affect the individual and the groups is individualism and collectivism. On the individualist side, it is found that societies in which the ties between individuals are loose that everyone is expected to look after him or herself and his or her family while it is found out that people from birth onward are integrated into strong, cohesive in-groups, often extended families that continue protecting them in exchange for unquestioning loyalty on the collectivist side. The method showing the distribution of roles between the genders such as assertive and competitive and caring and nurturing is referred as masculinity and femininity. The studies by IBM showed that a) women’s values differ less among societies than men’s values and b) men’s values from one country to another contain a dimension from very assertive and competitive and maximally different from women’s values on the side, to modest and caring and similar to women’s values on the other.</span></p><p data-dcnode-id="828"><span data-dcnode-id="832" instrument_node="">Uncertainty avoidance relates to the society’s tolerance for uncertainty and ambiguity. Due to inner nervous energy, people from uncertainty avoiding countries are also more emotional and motivated. However, uncertainty accepting cultures are more tolerant of opinions different from what they are used to such as they try to have as few rules as possible. The final one of cultural dimensions by 
</span><a class="content_c13" data-dcnode-id="830" href="#ref13" id="return10" onclick="returnAuhor(13,10)" target="_self"><span data-dcnode-id="831" instrument_node="">
  Hofstede (2001) 
</span></a><span data-dcnode-id="829" instrument_node=""> is long-term and short-term orientations that shape the focus and values of a culture. Both of positive and negative values of this dimension can be found in the teachings of Confucius, the most influential Chinese philosopher who lived around 500 B.C, however, the dimension also applies to countries without a Confucian heritage.</span></p><p data-dcnode-id="823"><span data-dcnode-id="827" instrument_node="">The French sociologist, Gabriel Trade first mentioned about the Diffusion of Innovation Theory in 1903 and then that theory was followed by Ryan and Gross in 1943 who discussed about the adopter categories that were later used in the current theory by Everett Rogers. 
</span><a class="content_c15" data-dcnode-id="825" href="#ref15" id="return11" onclick="returnAuhor(15,11)" target="_self"><span data-dcnode-id="826" instrument_node="">
  Katz (1957) 
</span></a><span data-dcnode-id="824" instrument_node=""> is also credited for first introducing the notion of opinion leaders, opinion followers and how the media interacts to influence these two groups. The Diffusion of Innovation theory is often regarded as a valuable change model for guiding technological innovation where the innovation itself is modified and presented in ways that meet the needs across all levels of adopters. It also stresses the importance of communication and peer networking within the adoption process. In general term, the diffusion of innovation theory refers to the process that occurs as people adopt a new idea, product, practice, philosophy and so on.</span></p><p class="E-Title2" data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">2.2. New Media</span></p><p data-dcnode-id="811"><a class="content_c03" data-dcnode-id="819" href="#ref03" id="return12" onclick="returnAuhor(03,12)" target="_self"><span data-dcnode-id="820" instrument_node="">
  Chen (2007) 
</span></a><span data-dcnode-id="818" instrument_node=""> stated that the influence of digital or new media on the society is illustrated in terms of the cognition, social effect and a form of aesthetics. Throughout the world, according to the need of new media, new social networks and activities are created in reshaping the lines of human society in terms of politics, culture, economic and geography. 
</span><a class="content_c22" data-dcnode-id="816" href="#ref22" id="return13" onclick="returnAuhor(22,13)" target="_self"><span data-dcnode-id="817" instrument_node="">
  Steger (2009) 
</span></a><span data-dcnode-id="815" instrument_node=""> mentioned that new social media can accelerate social changes involving in the structure of community. New media is identified into five characteristics and they are digitality, convergency, interactivity, hyperactivity, hypertextuality and virtuality 
</span><a class="content_c05" data-dcnode-id="813" href="#ref05" id="return14" onclick="returnAuhor(05,14)" target="_self"><span data-dcnode-id="814" instrument_node="">
  (Chen &amp; Zhang, 2010) 
</span></a><span data-dcnode-id="812" instrument_node="">.</span></p><p data-dcnode-id="809"><span data-dcnode-id="810" instrument_node="">The most significant feature of new media is digitalization among those five characteristics. New media applies all kind of mathematical operations for dematerializing media text by converting data from analog into digital form. The convergency in new media is defined as the way that new media converges the forms and functions of media, electronic communication and media and it is clearly seen in the emergence of the Internet. The interactivity is mentioned as the function between users and the system in terms of use of information resources. New media introduce hypertextuality that information can move around freely and interconnect. New media created cyberspace which make people to generate virtual experience and reality. The form and content of messages can be influenced by the new media. Moreover, new social media has impacts on how people understand each other in the process of human communication in the specific cultural and traditional group.</span></p><p data-dcnode-id="804"><span data-dcnode-id="808" instrument_node="">As stated by 
</span><a class="content_c11" data-dcnode-id="806" href="#ref11" id="return15" onclick="returnAuhor(11,15)" target="_self"><span data-dcnode-id="807" instrument_node="">
  Georgetown University, 2010 
</span></a><span data-dcnode-id="805" instrument_node="">, new social media means that everyone is a publisher and everyone is a critic. Therefore, it is so significant that online contexts in social media are interactive dialogues that can show from different points of view. People communicate with others by using different networks which new social media provide. People nowadays, use social media in terms of gaining knowledge, learning about different opinions, perspectives of issues, topic and events and also interacting with others. Moreover, new social media is mainly used for socializing which is type of media that make people include in conversations and online talks without being face-to-face with other participants.</span></p><p data-dcnode-id="799"><span data-dcnode-id="803" instrument_node="">Social media of these days can create a place where people throughout the world can stay in touch and more connected despite of the distance, boundaries, culture and so on. 
</span><a class="content_c04" data-dcnode-id="801" href="#ref04" id="return16" onclick="returnAuhor(04,16)" target="_self"><span data-dcnode-id="802" instrument_node="">
  Chen (2012) 
</span></a><span data-dcnode-id="800" instrument_node=""> stated that new social media such as Facebook, blogs, MySpace, YouTube, Twitter and Instagram have allowed people from every single place of the world to represent themselves in their significant ways and stay touched in technological world.</span></p><p class="E-Title2" data-dcnode-id="797"><span data-dcnode-id="798" instrument_node="">2.3. Intercultural Communication</span></p><p data-dcnode-id="792"><span data-dcnode-id="796" instrument_node="">Intercultural communication is the process of interaction between people from different cultures and different communities. According to Karlfried Knapp in the book of “Encyclopedia of Communication Theory” 
</span><a class="content_c17" data-dcnode-id="794" href="#ref17" id="return17" onclick="returnAuhor(17,17)" target="_self"><span data-dcnode-id="795" instrument_node="">
  (Littlejohn &amp; Foss, 2009) 
</span></a><span data-dcnode-id="793" instrument_node="">, intercultural communication is referred as the interpersonal interaction between the people from diverse groups which are different from each other under the different forms of knowledge and symbolic behavior in terms of cultures, norms, traditional practices and so on. Therefore, it can be said that the people’s behavior, communication, and concepts from different countries and communities have impacts on intercultural communication. Culture hugely affects communication in significant way.</span></p><p data-dcnode-id="790"><span data-dcnode-id="791" instrument_node="">It can be clearly seen that intercultural communication appeared since the beginning of history. In ancient times, people travel around the world and made long-distance journey. From that point, people settled down in different regions as different communities. Researchers always attempt to find out the traces the prehistoric movements and gestures of people by using analysis of their characteristics, language, families, blood types and so on. Differences and diversity of people in cultural norms, values and perceptions can be assumed as a quiet and invisible root of misunderstanding and misconceptions in different regions and communities. The problems are mostly seen when cultural verbal and nonverbal meanings are affected to the other people with different cultures.</span></p><p data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">Hall showed the methods for understanding of cultural differences with the Information Systems Theory (Primary Message Systems). The Information Systems Theory (1959) labels human activities into ten main message systems and they are 1) interaction, 2) association, 3) subsistence, 4) bisexuality, 5) territoriality, 6) temporality, 7) learning and acquisition, 8) play, 9) defence and 10) exploitation. Hall mentioned that interaction is situated in the center place of the culture world and it is also the complex and being at the most institutionalized communal life sustained by living beings belongs to humans.</span></p><p data-dcnode-id="784"><a class="content_c19" data-dcnode-id="786" href="#ref19" id="return18" onclick="returnAuhor(19,18)" target="_self"><span data-dcnode-id="787" instrument_node="">
  Neuliep (2014) 
</span></a><span data-dcnode-id="785" instrument_node=""> stated that intercultural communication is the communication between people of different cultures and ethnicities. Moreover, it is also symbolic sign of intercultural contact that organize an open and respectful interaction among individuals, groups and organization with different cultural beliefs and background. Intercultural communication can improve mutual understanding of diverse culture and practices and foster the equality among the different things and also enhance creative process. It is so significant that new media can make new culture increase in human society and the obvious part is in the process of intercultural communication.</span></p><p class="E-Title2" data-dcnode-id="782"><span data-dcnode-id="783" instrument_node="">2.4. Cultural Adaptation and Social Media</span></p><p data-dcnode-id="772"><a class="content_c02" data-dcnode-id="780" href="#ref02" id="return19" onclick="returnAuhor(02,19)" target="_self"><span data-dcnode-id="781" instrument_node="">
  Bennett (1977) 
</span></a><span data-dcnode-id="779" instrument_node=""> who is a cross-cultural writer mentioned cultural adaptation as a process of “transition experiences”. He defined cultural adaptation as the responses to the sharping changes in life situations that handle the “tensions and anxieties we face whenever change threatens the stability of our lives”. According to 
</span><a class="content_c25" data-dcnode-id="777" href="#ref25" id="return20" onclick="returnAuhor(25,20)" target="_self"><span data-dcnode-id="778" instrument_node="">
  Weaver (1993) 
</span></a><span data-dcnode-id="776" instrument_node="">, in the adaptation process, the most significant thing, “cultural shock” is generally used as the term “cultural adjustment stress”. One of the cultural trainer recently advised that the expression “being effective abroad” is surely needed to substitute the necessary survival factors of the cross-cultural construct 
</span><a class="content_c18" data-dcnode-id="774" href="#ref18" id="return21" onclick="returnAuhor(18,21)" target="_self"><span data-dcnode-id="775" instrument_node="">
  (McCaffery, 1986) 
</span></a><span data-dcnode-id="773" instrument_node="">.</span></p><p data-dcnode-id="764"><span data-dcnode-id="771" instrument_node="">According to 
</span><a class="content_c16" data-dcnode-id="769" href="#ref16" id="return22" onclick="returnAuhor(16,22)" target="_self"><span data-dcnode-id="770" instrument_node="">
  Kim (2001) 
</span></a><span data-dcnode-id="768" instrument_node="">, the multicultural community is enlarged along with the practices of sojourners, immigrants and other people who can make the shift from one specific culture to another, so it can be surely said that intercultural studies totally focus on the interactions between people from different cultural backgrounds. 
</span><a class="content_c12" data-dcnode-id="766" href="#ref12" id="return23" onclick="returnAuhor(12,23)" target="_self"><span data-dcnode-id="767" instrument_node="">
  Gudykunst (2003) 
</span></a><span data-dcnode-id="765" instrument_node=""> mentioned the adaptation as a “dynamic process by which individuals, upon relocating to an unfamiliar cultural environment, establish or reestablish and maintain a relatively stable, reciprocal and functional relationship with the environment.”</span></p><p data-dcnode-id="759"><span data-dcnode-id="763" instrument_node="">According to 
</span><a class="content_c23" data-dcnode-id="761" href="#ref23" id="return24" onclick="returnAuhor(23,24)" target="_self"><span data-dcnode-id="762" instrument_node="">
  Stewart &amp; Mendenhall (1991) 
</span></a><span data-dcnode-id="760" instrument_node="">, U-curve adjustment theory by Sverre Lysgaard, a Norwegian sociologist in 1955, shows that the important and considerable four stages can be seen and they are honeymoon, crisis, adjustment and biculturalism when it draws connections intercultural adaptation to social media use. In honeymoon stage, people will face the initial relaxation for being in different country. After that, people start meeting the crisis stage which includes resentment and sadness for residing in a totally different culture and community. Later, they try to get adjustment and recovery and after that stage, the last stage “biculturalism” is the one which is the stage of fully adjustment and adaptation with the new culture and society.</span></p><p data-dcnode-id="748"><span data-dcnode-id="758" instrument_node="">Based on those four stages, research showed that social media has a social, physical and cultural influence on cultural adaptation. According to 
</span><a class="content_c10" data-dcnode-id="756" href="#ref10" id="return25" onclick="returnAuhor(10,25)" target="_self"><span data-dcnode-id="757" instrument_node="">
  Elola &amp; Oskoz (2009) 
</span></a><span data-dcnode-id="755" instrument_node="">, the use of social media especially blogging and vlogging can have positive impacts on the intercultural relationship and also improve the degree of participants’ intercultural communication competence. It is significant that the information used and shared in the social media will surely have impacts either positively or negatively to the improvement of intercultural relationships in the virtual community by creating its own network of personal connection ( 
</span><a class="content_c08" data-dcnode-id="753" href="#ref08" id="return26" onclick="returnAuhor(08,26)" target="_self"><span data-dcnode-id="754" instrument_node="">
  Donath &amp; Boyd, 2004; 
</span></a><span data-dcnode-id="752" instrument_node="">
</span><a class="content_c09" data-dcnode-id="750" href="#ref09" id="return27" onclick="returnAuhor(09,27)" target="_self"><span data-dcnode-id="751" instrument_node="">
  Ellison, Steinfield, &amp; Lanmpe, 2009 
</span></a><span data-dcnode-id="749" instrument_node="">).</span></p><p data-dcnode-id="734"><span data-dcnode-id="747" instrument_node="">From the process of sending messages to posting on social apps, they are ongoing uses of digital media that shows all the channels that make online personal communications possible 
</span><a class="content_c27" data-dcnode-id="745" href="#ref27" id="return28" onclick="returnAuhor(27,28)" target="_self"><span data-dcnode-id="746" instrument_node="">
  (Wooley, 2013) 
</span></a><span data-dcnode-id="744" instrument_node="">. 
</span><a class="content_c03" data-dcnode-id="742" href="#ref03" id="return29" onclick="returnAuhor(03,29)" target="_self"><span data-dcnode-id="743" instrument_node="">
  Chen (2007) 
</span></a><span data-dcnode-id="741" instrument_node=""> mentioned that the effect of digital or social media is illustrated in the points of cognition, social effect and a starting form of aesthetics. Moreover, according to Piechota mentioned by 
</span><a class="content_c21" data-dcnode-id="739" href="#ref21" id="return30" onclick="returnAuhor(21,30)" target="_self"><span data-dcnode-id="740" instrument_node="">
  Seyfi &amp; Guven (2016) 
</span></a><span data-dcnode-id="738" instrument_node="">, social media plays a significant sector in building new forms of multicultural interactions apart from being regarded as an important tool in the sharing of messages. Relating to those findings, social media and intercultural communication are aspects that have impacts and outline each other. Moreover, regarding to that concept, it can be significantly seen that an adjustment and sense of community appear along with the use of social media in intercultural communication. In cultural adaptation, adjustment is one of the most important factors and this process is influenced by social media. According to 
</span><a class="content_c20" data-dcnode-id="736" href="#ref20" id="return31" onclick="returnAuhor(20,31)" target="_self"><span data-dcnode-id="737" instrument_node="">
  Sawyer &amp; Chen (2012) 
</span></a><span data-dcnode-id="735" instrument_node="">, the adjustment process of migrants to the host culture in America becomes improved with the use of social media.</span></p><p class="E-Title1" data-dcnode-id="731"><a data-dcnode-id="732" id="txtF3" target="_self"><span data-dcnode-id="733" instrument_node="">3. Methodology</span></a></p><p data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">For analyzing the impact of social media in the process of cultural adaptation among international students, the researcher made in-depth interview with 15 international students who are studying master degree and PhD degree in Huazhong University of Science and Technology, Wuhan City, Hubei Province, People Republic of China. In order to get more specific data, the research is based on qualitative research method and used investigative questions by talking with them, questioning in detail and figuring out the analysis based on their answers. Apart from the specific questions, the researcher made more detailed questions based on their opinions and comments. Moreover, the researcher met the participants more than once to discuss about the questions and make sure in getting exact information and analysis in the research. The participants are from Asia, Africa and even in some Pacific island countries and most participants have never been to China before. The participants are from Asia, Africa and even in some Pacific island countries and most participants have never been to China before they came to China for study and become the students of Huazhong University of Science and Technology. According to the answers they mentioned in the interview, it can be found out that some participants have never known about Chinese culture and traditions before they have registered as the students in China.</span></p><p data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">The interview was designed to figure out how social media effect on their daily lives in the new culture of host country and maintain the relation the connections to the communities in the home countries.</span></p><p data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">Analyzing about the impact of social media in the process of international students’ cultural adaptation, the questions are based on how their adjustment to verbal and non-verbal communication in the host country, what their culture shocks are, what they learnt about new culture using social media, how social making on social media help them to have adaptation to the new culture of the host country and so on. Unlike the research which analyzed about other regions, China is somehow significant in social media usage because there are blockages to some popular social networking sites in most of the countries around the world such as Facebook, Twitter, Instagram, Google, Youtube and so on. Therefore, the questions also focus on the shocks regarding the use of social media in China for international students because of censorship system and language barriers when they use Chinese social networking sites with Chinese language.</span></p><p class="E-Title2" data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">3.1. Data Collection</span></p><p data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">For data, the researcher collected data making in-depth interviews from 15 international students who are currently studying in Huazhong University of Science and Technology under the support of Chinese government scholarship program. According to more specific data collection, the data which showed that their visits (or) stays to other countries except China were also collected. The researcher also figured out the questions that could show the significant views of each international student concerning the impact of social media on cultural adaptation.</span></p><p data-dcnode-id="716"><span data-dcnode-id="720" instrument_node="">The </span><a data-dcnode-id="718" href="#t1" target="_self"><span data-dcnode-id="719" instrument_node="">Table 1</span></a><span data-dcnode-id="717" instrument_node=""> below is shown the brief description of participants in the research.</span></p><p class="E-Title2" data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">3.2. Data Analysis</span></p><p data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">Depending on the questionnaires, it can be divided into three sectors; 1) culture shocks (the things when the participants meet when they get to China), 2) Adjustment via socialization (how participants have tried to socialize in the new community) and 3) adaptation via social media (how participants use social media to get adaptation in the new culture of the host community).</span></p><p class="E-Title3" data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">3.2.1. Facing New Things as Culture Shocks</span></p><p data-dcnode-id="705"><span data-dcnode-id="709" instrument_node="">According to the anthropologists Kalervo Oberg and George Foster in the late 1950s, culture shock was a medical condition describing feelings of disorientation following entry into a new culture, feelings often so strong as to degenerate into physical symptoms. By seeing those definitions, culture shock is usually regarded as an affliction that comes from the individual as an occupational illness and also with the impact of a falling piano 
</span><a class="content_c26" data-dcnode-id="707" href="#ref26" id="return32" onclick="returnAuhor(26,32)" target="_self"><span data-dcnode-id="708" instrument_node="">
  (Winkelman 1994) 
</span></a><span data-dcnode-id="706" instrument_node="">. On the other hand, from being cultural point, culture shock is simply frustration reaction syndrome. The participants’ answer in the interview about their culture shocks which they</span></p><span data-dcnode-id="704" instrument_node=""> </span><div class="Css_sac" data-dcnode-id="693"><p class="imgGroupCss_v" data-dcnode-id="700"><span data-dcnode-id="703" instrument_node=""> </span><a data-dcnode-id="701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//html.scirp.org/file/_1-2840166_1.htm" target="_blank"><img class="lazy" data-dcnode-id="702" data-original="Images/Table_Tmp.jpg" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAAAXNSR0IArs4c6QAAAARnQU1BAACxjwv8YQUAAAAJcEhZcwAADsQAAA7EAZUrDhsAAAANSURBVBhXYzh8+PB/AAffA0nNPuCLAAAAAElFTkSuQmCC"></a></p><span data-dcnode-id="699" instrument_node=""> </span><p class="sacImgMarkCss" data-dcnode-id="694"><a data-dcnode-id="696" id="t1" name="t1"><span class="cs_fig_con" data-dcnode-id="697"><span data-dcnode-id="698" instrument_node="">Table 1</span></span></a><span data-dcnode-id="695" instrument_node="">. Brief description of participants in the research.</span></p></div><p data-dcnode-id="691"><span data-dcnode-id="692" instrument_node="">face when they get to China could highlight about how they have to struggle in their daily lives in the new community.</span></p><p data-dcnode-id="689"><span data-dcnode-id="690" instrument_node="">“Travelling to a new culture can mean seeing things on the menu that you never even knew you could eat. For instance, in China and in many Chinese restaurants around the world, chicken feet are served regularly and are a delicacy here in China.” (Interviewee J)</span></p><p data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">“I remember feeling helpless and frustrated at my inability to understand anything. Everything took extra time to figure out. I felt anxiety about asking directions because I couldn’t understand what the other person was saying. At times I just didn’t want to go out because it took too much effort.” (Interviewee K)</span></p><p data-dcnode-id="685"><span data-dcnode-id="686" instrument_node="">“When I first came to China, I was surprised to learn that many of the bathrooms were actually squatting toilets. I admit, at first these differences in the toilet do seem a bit strange but after a while you barely notice.” (Interviewee K)</span></p><p data-dcnode-id="683"><span data-dcnode-id="684" instrument_node="">“I am really surprised that blocked on social media, controlled of power voltage, elder people working in odd jobs in China.” (Interviewee H)</span></p><p data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">“Totally shocking for me. Because I’m from the place where I rarely find any people without religion in the whole world either through news or through social media. But here in china, if you ask somebody about the religion, they reply to you as they don’t have any religion. Don’t know why?” (Interviewee E)</span></p><p data-dcnode-id="679"><span data-dcnode-id="680" instrument_node="">“You will almost always notice people crowding at the service window at the bus station or a line with people cutting in line. Chinese people have a mentality that they need to be first in line to get what they need due to past experiences. It isn’t true in all places in China although, but you may be surprised with this occasion while traveling around China.” (Interviewee J)</span></p><p data-dcnode-id="677"><span data-dcnode-id="678" instrument_node="">“I never have an experience of big problems concerning with culture shocks though. I still have very rare and only one of my uncomfortable experience of culture shock is at China concerning with language barrier. Since most of Chinese people don’t speak English or even a person who can speak English don’t want to speak English a lot.” (Interviewee M)</span></p><p class="E-Title3" data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">3.2.2. Adjustment via Socialization in Various Communities</span></p><p data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">For the adjustment using socialization with local people in China is one of the most popular ways for expats who are living China. Some international students are socializing not only with local people but also with students from other communities for their difficulties and culture shocks in China. On the other hand, according to the participants, social media sites can help them to adjust their language barriers in daily activities.</span></p><p data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">“I wouldn’t really call is socializing, as most encounters with the Chinese locals are on the borders of just either small talk, or when you need help from them in terms of translations, directions etc. Without prejudice, they are very sociable people, however, it all depends on the nature of a person.” (Interviewee J)</span></p><p data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">“Everyday I meet my Chinese friends in the office where I do my research work, but I got very rare talk with the Chinese friends due to the language problem. Regarding Chinese locals, I meet and try to talk with then like once a week during my indoor tour in the city and in the market place when I need to buy something.” (Interviewee E)</span></p><p data-dcnode-id="667"><span data-dcnode-id="668" instrument_node="">“In the university that I study, most of them are from different community and societies that the locals. So I find very variant nature in them according to their born city. Like people from big cities tries to communicate in other to learn English but the people from other village or small cities rarely express and share their talks with others.” (Interviewee E)</span></p><p data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">According to the participants’ answers, it might be clearly seen that some international students mostly socialize with international students because of the language barriers. However, they become friends with Chinese locals through social media. Mostly, they make socialization because of the stress and culture shocks which they face in the new community with different culture. It also shows that some students even learnt some cultures of hots country from socialization with locals. Moreover, respondents in the research mentioned about the verbal communication which are somehow difficult for them.</span></p><p data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">“I have to speak real slow and stopped using jargons or slangs that would necessarily be accepted as the normal way to converse in the other countries that I have been to. I have also had to make changes in a sense to use certain words that are seen/perceived to be offensive, when they are not.” (Interviewee J)</span></p><p data-dcnode-id="661"><span data-dcnode-id="662" instrument_node="">“I am trying to learn Chinese language communicating with Chinese people and also made some friends who want to make friends to learn English language. Mostly I communicate with them using language translation software and sometimes with gestures.” (Interviewee E)</span></p><p class="E-Title3" data-dcnode-id="659"><span data-dcnode-id="660" instrument_node="">3.2.3. Cultural Adaptation via Social Media</span></p><p data-dcnode-id="657"><span data-dcnode-id="658" instrument_node="">Under the part of the cultural adaptation of international students by using social media, it can be divided into two parts. First one is how social media support the international students in communicating with the home country or their community in China and the second one is how social media can help them adapt the new culture while living in the new community. Moreover, some respondents in research use social media not only for social making but also for removing their loneliness and boredom.</span></p><p data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">“Yes, I use social media a lot. It is due to lack in the number of friends to hang out with and of course due to the absence of family, the only way is to spend time on social media.” (Interviewee E)</span></p><p data-dcnode-id="653"><span data-dcnode-id="654" instrument_node="">“Yes, I use social media here in China much more time than I use at home because sometimes am feeling very lonely.” (Interviewee F)</span></p><p data-dcnode-id="651"><span data-dcnode-id="652" instrument_node="">In the research, the participants openly mentioned that social media can help them to communicate with their home countries and also get in touch with the people in their respective communities in China. Social media supports the most as the effective and economical way for international students to keep in contact with their families and friends in their home countries. Moreover, social media become the most basic requirement for getting information not only from the home countries of the international students but also about China while they are staying in China.</span></p><p data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">“I fully communicate with my community with social media.” (Interviewee B)</span></p><p data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">“It was very easy to get in touch with my community because of the social media mostly WeChat that I use often to communicate and its very fast and economical media. It makes you communicate in a rapid way by making groups of my own community and friends so that to share in formations very easily.” (Interviewee E)</span></p><p data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">“Social media do help to connect people together in all time and social media is an easy mode of communicating than voice mode. Social media is more attractive and communicate in different language.” (Interviewee B)</span></p><p data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">“Of course, WeChat has helped me through to get in touch with my own community in China as we can’t access other apps like Facebook and Viber which most of our majority people in back home using.” (Interviewee I)</span></p><p data-dcnode-id="641"><span data-dcnode-id="642" instrument_node="">“Social media help me to get easily in contact with my own community and I really appreciate that means a lot. I am feeling very close to my country mates because of social media.” (Interviewee F)</span></p><p data-dcnode-id="639"><span data-dcnode-id="640" instrument_node="">“Helped ease communication with my own community when I don’t have a phone and this means a lot to me.” (Interviewee K)</span></p><p data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">“It has helped me a lot. I do get a lot of invaluable information through social media. It means a lot to me and brings about convenience because I am assured to find almost most of the basic information that I need for my day to day survival in China.” (Interviewee G)</span></p><p data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">Apart from helping to communicate with the home country and their own respective communities in China, social media support international students to adapt the different culture while living in new community. The respondents mentioned that they learnt many things about China from social media not only before they come to China but also after they arrive to China especially Chinese culture and tradition. Although it would have taken more time to really grasp and comprehend the new culture in China for international students, social media make it much easier than it would have been otherwise. In the community with language barriers and other difficulties, respondents use social media as a guide for their daily activities especially buying stuffs online, booking for some events and celebrations, arranging trip plans, making friends and even sharing the idea in group or making study groups.</span></p><p data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">“Some apps in social media has enabled many domestic entrepreneur and infused different countries’ culture with an amazing richness of creativity.” (Interviewee K)</span></p><p data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">“The social media like WeChat in China, we can buy any and everything, so this kind of social media help the people to living and adapt in China.” (Interviewee A)</span></p><p data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">“Some things are generally not explained yet is somehow expected to be like the norm of the society. But these things are generally learnt from social media, due to perhaps the stigma of actually discussing them out loud and openly.” (Interviewee J)</span></p><p data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">“Yes, I am because I love reading experiences that users sharing on social media. That helps me to understand china and its culture.” (Interviewee F)</span></p><p data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">“Social media has enabled me to know more of what I already know such as interesting and unknown facts about China, especially interesting places and where to buy delicious food or buy clothes, also updates me with what is currently happening in China.” (Interviewee K)</span></p><p class="E-Title1" data-dcnode-id="622"><a data-dcnode-id="623" id="txtF4" target="_self"><span data-dcnode-id="624" instrument_node="">4. Conclusion</span></a></p><p data-dcnode-id="620"><span data-dcnode-id="621" instrument_node="">The result of this research points out how social media shape the cultural adaptation of international students who are studying in China between their home countries and host countries. Throughout the study, the participants overcame culture shocks what they face as soon as they arrive to China mostly using social media not only for socializing but also for learning new things in their host countries. They infer that the interactions and conversations through the social media can make them strengthen to adapt the new culture in the host countries by overcoming the new challenges in the new community and building a sense of community with different cultures.</span></p><p data-dcnode-id="618"><span data-dcnode-id="619" instrument_node="">It is widely accepted that adjustment is the basic fundamental factor in cultural adaptation, and social media are the most influential support in this process for international students. Before they arrive in China, the respondents talked that they used some social media to know more about China and its people and also Chinese cultural practices for their daily activities. Therefore, this research can show that social media play as one of the best methods for interaction and conversation for international students to keep in touch with their home countries and learn about intercultural practices and experiences.</span></p><p data-dcnode-id="616"><span data-dcnode-id="617" instrument_node="">Furthermore, in the research, the respondents mentioned about using some Chinese social media applications to understand Chinese cultural norms and practices. The participants acknowledged that the information and learnings through the social media could change the stereotypes and biases which they had known before coming to China into the positive impression and different opinions for international students. The Chinese social media have changed the students’ views regarding the information and comments that they used to think about China before their visit. Social media can support the international students in not only helping to get cultural adaptation but also for getting academic-related information and interact with professors easily. Therefore, some respondents mentioned that they sometimes feel worried about themselves to become social media addicts because the amount of time they are spending in social media platforms has already increased due to its user friendly and helpful functions for them.</span></p><p data-dcnode-id="614"><span data-dcnode-id="615" instrument_node="">The research analyzes about how many social media have impacts on the cultural adaptation of the students from Huazhong University of Science and Technology in the new community in China. It can be seen that the previous researches were mostly about the cultural adaptation process of students from some specific countries who are studying in China or students who are studying in some other European countries under some other scholarship programs. This research figured out the result based on the data collected from the students from different countries around the world who are currently staying in China. Though the research is based on the students in only one university in China, the participants in the research are from Asia, Africa and some Pacific island countries so it can be strongly said that there is diversity in data collection process.</span></p><p data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">However, there are some facts in this research are limited. The first thing is that the researcher only interviewed 15 students who are studying in Huazhong University of Science and Technology, Wuhan City, Hubei Province in China due to time limitations. Hence, it is strongly suggested that interviewing more students in some other universities throughout the city or province or even the country, China for the further research to get more comprehensive aspects about the impact of social media in cultural adaptation from various and diverse community. Moreover, the interviews to not only students but also for working people and migrants in China are suggested for more specific research about the use of social media for intercultural adaptation.</span></p><p class="E-Title1" data-dcnode-id="609"><a data-dcnode-id="610" id="txtF5" target="_self"><span data-dcnode-id="611" instrument_node="">Acknowledgements</span></a></p><p data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">I would like to thank to all my professors and colleagues who always encourage me to carry out this research paper. Moreover, I would like to show my sincere gratitude to the participants who actively helped me and answered my in-depth interview questions regardless of their busy schedules.</span></p><p class="E-Title1" data-dcnode-id="604"><a data-dcnode-id="605" id="txtF6" target="_self"><span data-dcnode-id="606" instrument_node="">Conflicts of Interest</span></a></p><p data-dcnode-id="602"><span data-dcnode-id="603" instrument_node="">The authors declare no conflicts of interest regarding the publication of this paper.</span></p><p class="E-Title1" data-dcnode-id="599"><a data-dcnode-id="600" id="txtF7" target="_self"><span data-dcnode-id="601" instrument_node="">Cite this paper</span></a></p><p data-dcnode-id="597"><span data-dcnode-id="598" instrument_node=""> Zaw, H. T. (2018). The Impact of Social Media on Cultural Adaptation Process: Study on Chinese Government Scholarship Students. Advances in Journalism and Communication, 6, 75-89. https://doi.org/10.4236/ajc.2018.63007</span></p><p class="E-Title1" data-dcnode-id="594"><a data-dcnode-id="595" id="txtF8" target="_self"><span data-dcnode-id="596" instrument_node="">References</span></a></p><div class="refences_css" data-dcnode-id="290"><ol data-dcnode-id="291"><li data-dcnode-id="580"><a data-dcnode-id="593" id="ref1" name="ref1" target="_self"></a><a data-dcnode-id="591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scirp.org/reference/ReferencesPapers.aspx%3FReferenceID%3D2359897" target="_blank"><span data-dcnode-id="592" instrument_node="">1.</span></a><span data-dcnode
