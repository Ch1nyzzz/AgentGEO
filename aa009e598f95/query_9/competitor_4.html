3" instrument_node="">Fig. 3</span></a><span data-dcnode-id="2851" instrument_node=""> shows the spatial distribution of each CES value index (VI) generated by the four methods for different value types, which reflects the area of the park evaluated as having CES values and the levels of perception of the CES values. Warm colors show a high CES VI, i.e., greater than 4. Except for VEP, the distribution of high VI areas concentrates on the main attractions, with different methods focusing on slightly different main attractions. Waterfalls and streams, the lawn park, the Wusong Fort Memorial Square, the pit garden and the waterfront plank path have high CES value scores. Among structured interviews, document analysis, and social media photograph analysis, the distribution of high VI areas based on structured interviews is obviously centralized in the south of the park, document analysis generates a high VI of recreational value, especially in the waterfront, and for social media photograph analysis, the distribution across the main attractions is nearly uniform. Compared to these three methods, we find that the high VI areas based on VEP are evenly distributed and stretch from the main attractions. In addition, the low CES value index (below 4) of VEP covers a larger area in the park. This spatial pattern means that VEP is a better method for completely evaluating the CESs of the entire park and shows the correlation among the main attractions, while the M-VI under VEP is the lowest because of the lower kernel density.</span></p><figure class="figure text-xs" data-dcnode-id="2825" id="fig0015"><span data-dcnode-id="2834"><img alt="Fig. 3" aria-describedby="cap0015" data-dcnode-id="2849" height="759" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1618866720307627-gr3.jpg&amp;raw"><span data-dcnode-id="2848" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="2835"><li data-dcnode-id="2842"><a class="anchor download-link u-font-sans" data-dcnode-id="2843" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1618866720307627-gr3_lrg.jpg" target="_blank" title="Download high-res image (704KB)"><span class="anchor-text" data-dcnode-id="2844"><span data-dcnode-id="2847" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="2845"><span data-dcnode-id="2846" instrument_node="">Download high-res image (704KB)</span></span></span></a></li><li data-dcnode-id="2836"><a class="anchor download-link u-font-sans" data-dcnode-id="2837" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1618866720307627-gr3.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="2838"><span data-dcnode-id="2841" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="2839"><span data-dcnode-id="2840" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="2826"><span data-dcnode-id="2827" id="cap0015"><p data-dcnode-id="2828" id="spar0015"><span class="label" data-dcnode-id="2832"><span data-dcnode-id="2833" instrument_node="">Fig. 3</span></span><span data-dcnode-id="2831" instrument_node="">. </span><span data-dcnode-id="2829" instrument_node="">Spatial distribution of the CES value index: 1) document analysis; 2) social media photo analysis; 3) structured interviews; and 4) VEP; a) aesthetic, b) historical, c) educational, d) recreational, and e) therapeutic.</span></p></span></span></figure></div></section></section><section data-dcnode-id="2653" id="sec0070"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="2816" id="sect0080"><span data-dcnode-id="2821" instrument_node="">4</span><span data-dcnode-id="2819" instrument_node="">. </span><span data-dcnode-id="2817" instrument_node="">Discussion</span></h2><section data-dcnode-id="2784" id="sec0075"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="2810" id="sect0085"><span data-dcnode-id="2815" instrument_node="">4.1</span><span data-dcnode-id="2813" instrument_node="">. </span><span data-dcnode-id="2811" instrument_node="">Differences in and limitations of data access</span></h3><p data-dcnode-id="2793" id="par0100"><span data-dcnode-id="2809" instrument_node="">Sample size is the first point that needs to be considered when researchers plan a qualitative study. It must be sufficient in quantity to ascertain that most perceptions are uncovered (</span><a class="workspace-trigger" data-dcnode-id="2807" href="#bib0180" name="bbib0180"><span data-dcnode-id="2808" instrument_node="">Sandelowski, 1995</span></a><span data-dcnode-id="2806" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="2804" href="#bib0135" name="bbib0135"><span data-dcnode-id="2805" instrument_node="">Mason, 2010</span></a><span data-dcnode-id="2803" instrument_node="">). In this study, we obtained enough items/respondents to be able to study using four methods. A sufficiently large sample size can better address the aims of the study (N and </span><a class="workspace-trigger" data-dcnode-id="2801" href="#bib0125" name="bbib0125"><span data-dcnode-id="2802" instrument_node="">Marshall, 1996</span></a><span data-dcnode-id="2800" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="2798" href="#bib0155" name="bbib0155"><span data-dcnode-id="2799" instrument_node="">Patton, 2003</span></a><span data-dcnode-id="2797" instrument_node="">), and acquiring data from social media makes it possible to obtain a large amount of user-generated data. In our study, document analysis and social media photograph analysis obtained 1410 and 918 pieces of data, respectively. Structured interviews and VEP cannot obtain a large amount of data, but the data acquired by the two methods have larger information power. Information power indicates that a large sample size is not necessary when the study subjects hold a large amount of information (</span><a class="workspace-trigger" data-dcnode-id="2795" href="#bib0120" name="bbib0120"><span data-dcnode-id="2796" instrument_node="">Malterud et al., 2016</span></a><span data-dcnode-id="2794" instrument_node="">). Based on information power, the judgment of information mastery mainly considers the aim of the study, the specificity of the sample, the theoretical background, the quality of dialogue and the strategy for analysis. Under structured interviews and VEP, we told the respondents the aim and content of the study before the experiment; thus, these two methods can greatly cover most perceptions with fewer respondents. The four CES valuation methods in this study ensure sufficient data to cover perceptions in two ways, which increases the amount and information power of this data.</span></p><p data-dcnode-id="2785" id="par0105"><span data-dcnode-id="2792" instrument_node="">In the process of data access, the four methods face different challenges. Among these methods, structured interviews are a popular and traditional method of acquiring public preferences. It has the least limitations, and its effective data rate is higher. It can be applied to multiple situations, including an oversized study area (</span><a class="workspace-trigger" data-dcnode-id="2790" href="#bib0210" name="bbib0210"><span data-dcnode-id="2791" instrument_node="">Sherrouse et al., 2017</span></a><span data-dcnode-id="2789" instrument_node="">). VEP has an effective data rate of 100%. Its number of respondents is the lowest because there are many limitations on equipment and respondents. It is difficult for researchers to provide many mobile phones with the specific application, and respondents need to expertly use the mobile phones and the specific application and take pictures; thus, older people and children are usually excluded. For document analysis and social media photograph analysis, the ease or complexity of data access mainly depends on the platforms selected. With some platforms, such as Flickr, Twitter and Instagram, researchers can obtain publicly available geotagged data via the platform’s application programming interfaces (APIs) (</span><a class="workspace-trigger" data-dcnode-id="2787" href="#bib0055" name="bbib0055"><span data-dcnode-id="2788" instrument_node="">Ghermandi and Sinclair, 2019</span></a><span data-dcnode-id="2786" instrument_node="">). However, platforms such as Dianping do not have APIs and do not allow other applications to access data. Researchers have to obtain data from these platforms manually, which greatly decreases the efficiency of data access. Moreover, platforms also influence the location of photographs in social media photography analysis. In the absence of geotagged data, it is necessary to locate the photographs by identifying scenery, which results in a large number of invalid data because nature photographs without landmarks are difficult to locate. For instance, many visitors take photographs in wetlands to show their aesthetic value, but the wetland landscape is uniform and covers a large area, and it is difficult to identify and calculate accurate coordinates. Besides, identifying the scenery in a photograph requires researchers to recognize the study area. In addition to the limitations of platforms, document analysis also faces limitations due to words in regard to distinguishing value types or calculating coordinates. Many people have a limited expression ability, and their words cannot communicate sufficient and specific messages for further study, especially without any guidance from researchers. Therefore, compared to the other three methods, document analysis faces the greatest challenges in research, with the lowest effective data rate of only 38.58%.</span></p></section><section data-dcnode-id="2765" id="sec0080"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="2778" id="sect0090"><span data-dcnode-id="2783" instrument_node="">4.2</span><span data-dcnode-id="2781" instrument_node="">. </span><span data-dcnode-id="2779" instrument_node="">Reliability and representativeness of the methods</span></h3><p data-dcnode-id="2773" id="par0110"><span data-dcnode-id="2777" instrument_node="">CES valuation needs to answer the following two questions: Where can CESs’ values be perceived? Which types of CES are ascribed to these locations? To address these two questions, the key to research is whether the data that have been gathered could be well representative of visitors’ perceptions of the park at the time of their visit. Memory strength decreases over time (</span><a class="workspace-trigger" data-dcnode-id="2775" href="#bib0075" name="bbib0075"><span data-dcnode-id="2776" instrument_node="">Hinrichs, 1970</span></a><span data-dcnode-id="2774" instrument_node="">); thus, a timelier acquisition of perceptions makes the data more representative. Information efficiency makes a great difference in the reliability of the results. In addition, spatial accuracy is related to reliability, as it influences the location of CES points.</span></p><p data-dcnode-id="2768" id="par0115"><span data-dcnode-id="2772" instrument_node="">VEP has the most information efficiency because the CES valuation of the park and visiting occur simultaneously and people can immediately react to the stimulus of the landscape and record their perceptions using their mobile phone. Regarding structured interviews, experiments were also conducted inside the park, although it requires respondents to be reminded of the locations having CES value. For most respondents, the main attractions marked on paper map made a deep impression on them. In comparison, the information efficiency of document analysis and social media photography analysis is low. Visitors usually evaluate the park after all the sightseeing is completed, and sometimes, the time lag between sightseeing and comments is long. Biases of perception should be recognized in research, but they are difficult to measure. In this study, social media photography analysis is more reliable than document analysis because photographs were shot while visiting and can help remind visitors of the feelings that they had while visiting. The overlap between memory and presentation can stimulate memory and activate recall (</span><a class="workspace-trigger" data-dcnode-id="2770" href="#bib0060" name="bbib0060"><span data-dcnode-id="2771" instrument_node="">Glenberg et al., 1983</span></a><span data-dcnode-id="2769" instrument_node="">).</span></p><p data-dcnode-id="2766" id="par0120"><span data-dcnode-id="2767" instrument_node="">Among the four methods, the spatial accuracy of document analysis is also the lowest. We identify the locations that have CES value by analyzing comments, and such locations are mostly main attractions that cover a large area. We can locate only points in these attractions and not specific coordinates in the extensive area that they cover. Randomly arranging the points that belong to the same attractions in the area decreases the subjective bias of researchers, but in document analysis, the spatial error between the coordinates obtained by researchers and the locations evaluated as having CES by visitors cannot be avoided. In addition to social media photography analysis, the coordinates of the CES points can be arranged by manually identifying the locations of photographs, and the spatial accuracy is higher because many landmarks in photographs can help with locating them. In theory, structured interviews and VEP provide information with the highest spatial accuracy. In structured interviews, the respondents directly mark the locations that have CES value on a map, and VEP can obtain geotagged data via an application on a mobile phone. But in fact, there are still a few errors in structured interviews because it is difficult for respondents to accurately locate sites based on their perceptions. In the experiment, we assisted the interviewees by providing the location of the main attractions. In terms of geotagged data access, such as in VEP, there is a debate about spatial accuracy. The data of geotagged photographs represent the shooting location instead of the landscape location. However, in the vast majority of cases, the location whose CES value the respondents want to evaluate is the landscape location, and the errors are obvious in shooting scenes that are far away. The errors in close-up photography are minimal, and when shooting scenes from a long distance and capturing a panoramic scene, errors can also be ignored because people usually think that the shooting location where visitors overlook the panoramic scene is the location with CES value.</span></p></section><section data-dcnode-id="2654" id="sec0085"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="2759" id="sect0095"><span data-dcnode-id="2764" instrument_node="">4.3</span><span data-dcnode-id="2762" instrument_node="">. </span><span data-dcnode-id="2760" instrument_node="">Applicability of different evaluations</span></h3><p data-dcnode-id="2757" id="par0125"><span data-dcnode-id="2758" instrument_node="">We have demonstrated that all four methods can be used to assess CES value. A few results of the CES evaluation generated from the different data acquired coincide. These results reflect only the basics of the WPW park; for instance, there are two or more areas of the park that were evaluated extensively for their CES value by each method, and all of these areas are main attractions. Other results regarding the spatial distribution and CES VI are different under the four methods, and it is impossible to evaluate the CES evaluation method that most closely approaches public perceptions. Based on the differences in the results of each method, the choice of method should be associated with the purpose of the research being conducted.</span></p><p data-dcnode-id="2752" id="par0130"><span data-dcnode-id="2756" instrument_node="">Document analysis and social media photography analysis involve the sources of revealed preferences, and the respondents in the two methods provide data grounded in individual behavior (</span><a class="workspace-trigger" data-dcnode-id="2754" href="#bib0090" name="bbib0090"><span data-dcnode-id="2755" instrument_node="">Jeon and Herriges, 2016</span></a><span data-dcnode-id="2753" instrument_node="">). They are passive participants in the experiment and are not guided by researchers to understand the purpose of the study. In a sense, the results of document analysis and social media photography analysis reflect the natural perceptions of visitors and public preferences for CESs. Regarding the results of this study, the M-VIs of educational value and therapeutic value based on document analysis and social media photography analysis are as low as 0. Although the two values also receive the least attention among the five types of CES values in other CES evaluations, the M-VI values in these other methods are greater than 0. Rather than suggesting that the park has no educational value or therapeutic value, we suggest that these two types of value are not evaluated by document analysis and social media photography analysis, which reveals that without guidance, the public gives less attention to these two CES values. When researchers study the public’s natural perceptions of CES value, document analysis and social media photography analysis are options, but they are not suitable for evaluating each CES value type. In contrast, methods based on stated preference sources, such as structured interviews and VEP, which introduce experimental control by researchers, are good methods for covering the perceptions of every CES value type.</span></p><p data-dcnode-id="2750" id="par0135"><span data-dcnode-id="2751" instrument_node="">Regarding revealed preferences, the data of document analysis and social media photography analysis came from the same platform, but the data types were different, specifically, text and pictures, respectively. This difference in the data type can affect the index and rank of CES value. Social media photography analysis emphasizes esthetic value and historical value, while the CES value type that has the largest M-VI based on document analysis is recreational value. Because the definition of recreational value is pleasant, its value is often based on the other value types, and they are strongly linked. Evaluating recreational value requires more assessment statements by visitors, and to this end, document analysis is suitable. When using social media photographs as user-generated data, researchers allocate one value type to each photo based on the characteristics of the contents of the photograph, which avoids adding extra subjective opinions. Some value types, such as aesthetic and historical values with specific characteristics, can be easier to evaluate under photography analysis. In terms of studying the perceptions of CES value, researchers can select methods based on the type of CES value and the purpose of their study.</span></p><p data-dcnode-id="2748" id="par0140"><span data-dcnode-id="2749" instrument_node="">Regarding the stated preference, the main difference between structured interviews and VEP is the spatial distribution. Based on the Jaccard index, the spatial overlap between the two methods is the lowest, which makes the two methods quite different in evaluating the CESs of the park. Because of the prominent real-time nature of VEP, VEP data are the most spread out and cover most areas in the park, and CES evaluations of the park are more comprehensive. Moreover, each VEP respondent evaluated a large number of CES values, which makes it possible to more completely acquire each respondent’s perceptions of the park. For structured interviews, in the experiment, the respondents were affected by the main attractions on the map. Thus, the CES value points that were allocated remarkably focus on these attractions, and as a result, structured interviews generate a high M-VI for each CES value. Further analysis of the CES values, such as the relationship between CES values and the environment, usually requires relatively high M-VIs. Above all, VEP can be adopted to assess the match between the designer’s intentions and visitors’ perceptions by fully evaluating the park, and structured interviews can be applied to study in depth the CES values of the park.</span></p><div data-dcnode-id="2655"><p data-dcnode-id="2743" id="par0145"><span data-dcnode-id="2747" instrument_node="">Notably, any discussion of the applicability of different methods should consider not only the match between the results of the CES evaluation and the purpose of the research but also the limitations of data acquisition and data reliability, as mentioned above. We summarize the crucial characteristics of the four methods in </span><a class="workspace-trigger" data-dcnode-id="2745" href="#tbl0040" name="btbl0040"><span data-dcnode-id="2746" instrument_node="">Table 8</span></a><span data-dcnode-id="2744" instrument_node=""> to help researchers intuitively and comprehensively understand these methods and make their choice. Moreover, to better cover public perceptions and evaluate CESs, the use of some methods can be combined.</span></p><div class="tables frame-topbot rowsep-0 colsep-0" data-dcnode-id="2656" id="tbl0040"><span class="captions" data-dcnode-id="2735"><span data-dcnode-id="2736" id="cap0055"><p data-dcnode-id="2737" id="spar0055"><span class="label" data-dcnode-id="2741"><span data-dcnode-id="2742" instrument_node="">Table 8</span></span><span data-dcnode-id="2740" instrument_node="">. </span><span data-dcnode-id="2738" instrument_node="">Comparison of different data acquisition methods.</span></p></span></span><div class="groups" data-dcnode-id="2657"><table data-dcnode-id="2658"><thead class="valign-top" data-dcnode-id="2716"><tr data-dcnode-id="2722"><th class="align-left rowsep-1 valign-middle" data-dcnode-id="2733" rowspan="2" scope="col"><span data-dcnode-id="2734" instrument_node="">Methods</span></th><th class="align-left rowsep-1 valign-middle" data-dcnode-id="2731" rowspan="2" scope="col"><span data-dcnode-id="2732" instrument_node="">Efficiency of data acquisition</span></th><th class="align-left rowsep-1 valign-middle" data-dcnode-id="2729" rowspan="2" scope="col"><span data-dcnode-id="2730" instrument_node="">Limitation</span></th><th class="align-left rowsep-1 valign-middle" data-dcnode-id="2727" rowspan="2" scope="col"><span data-dcnode-id="2728" instrument_node="">Information efficiency</span></th><th class="align-left rowsep-1 valign-middle" data-dcnode-id="2725" rowspan="2" scope="col"><span data-dcnode-id="2726" instrument_node="">Spatial accuracy</span></th><th class="align-left rowsep-1" colspan="2" data-dcnode-id="2723" scope="col"><span data-dcnode-id="2724" instrument_node="">Applicability</span></th></tr><tr class="rowsep-1" data-dcnode-id="2717"><th class="align-left" data-dcnode-id="2720" scope="col"><span data-dcnode-id="2721" instrument_node="">Assessment purpose</span></th><th class="align-left" data-dcnode-id="2718" scope="col"><span data-dcnode-id="2719" instrument_node="">Specific content</span></th></tr></thead><tbody data-dcnode-id="2659"><tr data-dcnode-id="2701"><th class="align-left" data-dcnode-id="2714" scope="row"><span data-dcnode-id="2715" instrument_node="">Document analysis</span></th><td class="align-left" data-dcnode-id="2712"><span data-dcnode-id="2713" instrument_node="">Lowest</span></td><td class="align-left" data-dcnode-id="2710"><span data-dcnode-id="2711" instrument_node="">Depends on the platform</span></td><td class="align-left" data-dcnode-id="2708"><span data-dcnode-id="2709" instrument_node="">Lowest</span></td><td class="align-left" data-dcnode-id="2706"><span data-dcnode-id="2707" instrument_node="">Relatively Low</span></td><td class="align-left valign-middle" data-dcnode-id="2704" rowspan="2"><span data-dcnode-id="2705" instrument_node="">Studying the public’s natural perceptions of CES value</span></td><td class="align-left" data-dcnode-id="2702"><span data-dcnode-id="2703" instrument_node="">Aim at recreational value</span></td></tr><tr data-dcnode-id="2688"><th class="align-left" data-dcnode-id="2699" scope="row"><span data-dcnode-id="2700" instrument_node="">Social media photograph analysis</span></th><td class="align-left" data-dcnode-id="2697"><span data-dcnode-id="2698" instrument_node="">Medium</span></td><td class="align-left" data-dcnode-id="2695"><span data-dcnode-id="2696" instrument_node="">Depends on the platform</span></td><td class="align-left" data-dcnode-id="2693"><span data-dcnode-id="2694" instrument_node="">Medium</span></td><td class="align-left" data-dcnode-id="2691"><span data-dcnode-id="2692" instrument_node="">Relatively high</span></td><td class="align-left" data-dcnode-id="2689"><span data-dcnode-id="2690" instrument_node="">Aim at aesthetic and historical values</span></td></tr><tr data-dcnode-id="2673"><th class="align-left" data-dcnode-id="2686" scope="row"><span data-dcnode-id="2687" instrument_node="">Structured interviews</span></th><td class="align-left" data-dcnode-id="2684"><span data-dcnode-id="2685" instrument_node="">Relatively high</span></td><td class="align-left" data-dcnode-id="2682"><span data-dcnode-id="2683" instrument_node="">Few limitations</span></td><td class="align-left" data-dcnode-id="2680"><span data-dcnode-id="2681" instrument_node="">Relatively high</span></td><td class="align-left" data-dcnode-id="2678"><span data-dcnode-id="2679" instrument_node="">High</span></td><td class="align-left valign-middle" data-dcnode-id="2676" rowspan="2"><span data-dcnode-id="2677" instrument_node="">Evaluating each CES value type in a park</span></td><td class="align-left" data-dcnode-id="2674"><span data-dcnode-id="2675" instrument_node="">Fully assessing a park</span></td></tr><tr data-dcnode-id="2660"><th class="align-left" data-dcnode-id="2671" scope="row"><span data-dcnode-id="2672" instrument_node="">VEP</span></th><td class="align-left" data-dcnode-id="2669"><span data-dcnode-id="2670" instrument_node="">Very high</span></td><td class="align-left" data-dcnode-id="2667"><span data-dcnode-id="2668" instrument_node="">In equipment</span></td><td class="align-left" data-dcnode-id="2665"><span data-dcnode-id="2666" instrument_node="">Very high</span></td><td class="align-left" data-dcnode-id="2663"><span data-dcnode-id="2664" instrument_node="">Uncertain</span></td><td class="align-left" data-dcnode-id="2661"><span data-dcnode-id="2662" instrument_node="">Studying CESs in depth</span></td></tr></tbody></table></div></div></div></section></section><section data-dcnode-id="2644" id="sec0090"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="2647" id="sect0100"><span data-dcnode-id="2652" instrument_node="">5</span><span data-dcnode-id="2650" instrument_node="">. </span><span data-dcnode-id="2648" instrument_node="">Conclusion</span></h2><p data-dcnode-id="2645" id="par0150"><span data-dcnode-id="2646" instrument_node="">In this study, we evaluate the CES values of the WPW park using four representative CES evaluation methods to acquire data, namely, document analysis, social media photograph analysis, structured interviews and VEP. We compare their assessment processes and results, and find differences among them in the process from perception to CES evaluation. We propose that their limitations, reliability and applicability should be considered when using these four methods, and we provide some suggestions about the choice of method. Among them, the reliability of document analysis is low; thus, this method is better utilized as a supplement to the other approaches. When using an appropriate platform, social media photograph analysis is an excellent potential method for valuing CESs, especially when studying people’s perceptions of CESs. Because structured interviews generate a high VI for each CES value type and have few limitations and high reliability, structured interviews are a good way of studying CES value in depth. VEP makes it possible to comprehensively value CESs, and this method can be used by administrators to ascertain whether the designer’s intentions and visitors’ perceptions match.</span></p></section><section data-dcnode-id="2635" id="sec0095"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="2638" id="sect0105"><span data-dcnode-id="2643" instrument_node="">6</span><span data-dcnode-id="2641" instrument_node="">. </span><span data-dcnode-id="2639" instrument_node="">Author statement</span></h2><p data-dcnode-id="2636" id="par0155"><span data-dcnode-id="2637" instrument_node="">Dr. Yue Che is responsible for the study conception and design, and providing critical revisions; Tian Tian is responsible for the acquisition of data, analysis of data and drafting manuscript; Lin Sun is responsible for the acquisition of data and interpretation of data. Dr. Fengyun Sun is responsible for the study analysis and providing critical revisions; Dr. Shengjing Peng is responsible for providing critical revision.</span></p></section></div><section data-dcnode-id="2629" id="coi0010"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="2632" id="sect0110"><span data-dcnode-id="2633" instrument_node="">Declaration of Competing Interest</span></h2><p data-dcnode-id="2630" id="par0160"><span data-dcnode-id="2631" instrument_node="">We confirm that this manuscript is original and has not been published elsewhere nor is it currently under consideration for publication elsewhere; We have permission to reproduce any previously published material; All individuals listed as authors qualify as authors and have agre rticles-article0-title"><span data-dcnode-id="324" instrument_node="">Prioritizing stakeholders’ preferences for policy scenarios of vulnerable ecosystems with spatial heterogeneity in choice experiment: Coupling stated preferences with elevation</span></h3></a><div class="article-source ellipsis" data-dcnode-id="320"><span data-dcnode-id="321" instrument_node="">2022, Journal of Environmental Management</span></div></div><div class="buttons" data-dcnode-id="313"><button aria-controls="citing-articles-article0" aria-describedby="citing-articles-article0-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="314" type="button"><span class="button-link-text" data-dcnode-id="317"><span data-dcnode-id="318" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="315" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="316"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="308"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="309" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="310"><p data-dcnode-id="311" id="abspara0010"><span data-dcnode-id="312" instrument_node="">Understanding public preferences and evaluating the river basin are essential for effective river basin management, and enhancing its environmental attributes can provide considerable non-market benefits. As such, the study explores the heterogeneity in people's preferences and rankings of river ecosystem services based on their willingness to pay (WTP) to upgrade these services. A research survey was conducted throughout the river basin using a choice experiment approach. In this study, we evaluated the impact of study area elevation (a spatial attribute) on residents' willingness to pay for rehabilitation of environmental attributes. The study incorporates 6 ecological attributes in order to examine the differences in people's willingness to pay at various elevation levels. A total of five cities and 33 surrounding villages and townships were surveyed, while five elevation groups were made on an ad hoc basis to split samples, i.e., 1000–1600&nbsp;m, ≤1600–2200&nbsp;m, ≤2200–2800&nbsp;m, &gt; 2800–3400&nbsp;m, and 3400–4000&nbsp;m. The results of the mixed logit model recognized that people living at different elevations value rehabilitation of varying environmental attributes differently. For example, the inhabitants in Group 1 (1000–1600&nbsp;mm) are willing to pay RMB 6.70 per year for biodiversity upgrades; while the WTP of the people for the same attributes is RMB 32.68 in Group 5 (3400–4000&nbsp;mm). The Krinsky Robb approach confirmed that agricultural product quality and greenhouse gases (GHGs) were the most highly valued attributes, with a willingness to pay of RMB 90.40 and RMB 47.17, respectively. Applying these results as a reference for sustainable improvements and uplift of deteriorated ecological qualities is an example of how they may be helpful in bettering the world.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="289"><div class="sub-heading" data-dcnode-id="301"><a data-dcnode-id="304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S1618866722000188" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="305" id="citing-articles-article1-title"><span data-dcnode-id="306" instrument_node="">Urban Green infrastructures: How much did they affect property prices in Singapore?</span></h3></a><div class="article-source ellipsis" data-dcnode-id="302"><span data-dcnode-id="303" instrument_node="">2022, Urban Forestry and Urban Greening</span></div></div><div class="buttons" data-dcnode-id="295"><button aria-controls="citing-articles-article1" aria-describedby="citing-articles-article1-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="296" type="button"><span class="button-link-text" data-dcnode-id="299"><span data-dcnode-id="300" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="297" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="298"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="290"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="291" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="292"><p data-dcnode-id="293" id="spar0170"><span data-dcnode-id="294" instrument_node="">In 2015, 17 Sustainable Development Goals were outlined within the 2030 Agenda by the United Nations. Objective 11.7 aims to provide universal access to safe, inclusive, and accessible green and public spaces, highlighting the strategic role of these areas in cities. In the international literature, the theory of Ecosystem Services (ESs) has been developed to raise public awareness of the need to preserve biodiversity, enhance community cohesion, civic identity, and quality of life. In this study, we explored the economic value of Singapore's Urban Green Infrastructures (UGI) by investigating the private condominium and apartment unit market through the Hedonic Pricing Method (HPM). The HPM was integrated with Geographic Information System (GIS) to spatialize housing units, measure the distance of different green spaces, and consider the dependence effects among housing unit transactions. The results highlighted a positive effect on values of the proximity to the natural green areas, as well as to the regional, city parks, and small nature areas. The annual benefits of UGIs on households within 800 m range from 10,305,275 USD for nature areas to 59,723,703 USD for the city parks and 74,011,689 USD for the regional parks. Estimates showed the small contribution of park connectors (PCN) and neighborhood parks. The HPM results are a useful aid to understanding the amenity value of UGIs. The modeling outcomes could be used to inform policymakers and municipal green managers about UGIs preservation and new allocation starting from households’ preferences.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="271"><div class="sub-heading" data-dcnode-id="283"><a data-dcnode-id="286" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0169204621002243" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="287" id="citing-articles-article2-title"><span data-dcnode-id="288" instrument_node="">In the AI of the beholder: A comparative analysis of computer vision-assisted characterizations of human-nature interactions in urban green spaces</span></h3></a><div class="article-source ellipsis" data-dcnode-id="284"><span data-dcnode-id="285" instrument_node="">2022, Landscape and Urban Planning</span></div></div><div class="buttons" data-dcnode-id="277"><button aria-controls="citing-articles-article2" aria-describedby="citing-articles-article2-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="278" type="button"><span class="button-link-text" data-dcnode-id="281"><span data-dcnode-id="282" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="279" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="280"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="272"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="273" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="274"><p data-dcnode-id="275" id="sp0010"><span data-dcnode-id="276" instrument_node="">Big data from photo-sharing platforms offer unique opportunities for the study of human-nature interactions and landscape planning. Research increasingly relies on computer vision in artificial intelligence to identify elements of interest in photographs and user preferences and sentiment towards them. Studies largely rely on pre-trained models from one of several available cloud-based, commercial image recognition services, but the extent to which findings depend on the implemented technology has not yet been explored. Here, we analyze&nbsp;∼&nbsp;10,000 outdoor photographs retrieved from three social media platforms and geolocated within green and blue spaces in Haifa (Israel) by means of machine tags from three popular cloud-based services. We find that clustering of the 45 investigated sites based on common characteristics of the photographs is considerably affected by the image recognition service chosen, especially for sites with limited data points (&lt;80 photographs). Moreover, after associating the individual tags to specific aspects of the outdoor experience, we find substantial differences in the identification and ranking of outdoor recreational activities, characterization of the local biophysical environment (e.g., wildlife and vegetation), and feelings associated with the photographs. With no image recognition service clearly outperforming the others in all evaluation criteria, we argue that the optimal choice of image recognition service to rely on likely depends on the intended final application. Time and resource permitting, future studies should consider combining information from multiple sources for a characterization that is more nuanced and less prone to be affected by the idiosyncrasies of the individual technologies.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="260"><div class="sub-heading" data-dcnode-id="265"><a data-dcnode-id="268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.3390/su13052765" target="_blank"><h3 class="article-title ellipsis text-s" data-dcnode-id="269" id="citing-articles-article3-title"><span data-dcnode-id="270" instrument_node="">A cultural heritage low entropy enhancement approach: An ex post evaluation of creative practices</span></h3></a><div class="article-source ellipsis" data-dcnode-id="266"><span data-dcnode-id="267" instrument_node="">2021, Sustainability (Switzerland)</span></div></div><div class="buttons" data-dcnode-id="264"></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="261"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="262" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="263"></div></div></div></li><li class="ListArticleItem" data-dcnode-id="249"><div class="sub-heading" data-dcnode-id="254"><a data-dcnode-id="257" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.3390/f12060779" target="_blank"><h3 class="article-title ellipsis text-s" data-dcnode-id="258" id="citing-articles-article4-title"><span data-dcnode-id="259" instrument_node="">Citizen science data to measure human use of green areas and forests in european cities</span></h3></a><div class="article-source ellipsis" data-dcnode-id="255"><span data-dcnode-id="256" instrument_node="">2021, Forests</span></div></div><div class="buttons" data-dcnode-id="253"></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="250"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="251" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="252"></div></div></div></li></ul><span data-dcnode-id="247" instrument_node=""></span></div></div></section></div><a class="anchor abstract-link" data-dcnode-id="240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/abs/pii/S1618866720307627"><span class="anchor-text" data-dcnode-id="241"><span data-dcnode-id="242" instrument_node="">View Abstract</span></span></a><div class="Copyright" data-dcnode-id="237"><span class="copyright-line" data-dcnode-id="238"><span data-dcnode-id="239" instrument_node="">© 2020 Elsevier GmbH. All rights reserved.</span></span></div></article><div class="u-show-from-md col-lg-6 col-md-8 pad-right" data-dcnode-id="127"><aside aria-label="Related content" class="RelatedContent" data-dcnode-id="128"><section class="SidePanel u-margin-s-bottom" data-dcnode-id="140"><header class="side-panel-header u-margin-s-bottom" data-dcnode-id="229" id="recommended-articles-header"><button aria-expanded="true" class="button-link side-panel-toggle is-up button-link-primary" data-aa-button="sd:product:journal:article:location=recommended-articles:type=close" data-dcnode-id="230" type="button"><span class="button-link-text" data-dcnode-id="233"><h2 class="section-title u-h4" data-dcnode-id="234"><span data-dcnode-id="235" instrument_node="">Recommended articles</span></h2></span><svg class="icon icon-navigate-down" data-dcnode-id="231" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="232"></path></svg></button></header><div aria-describedby="recommended-articles-header" aria-hidden="false" class="" data-dcnode-id="141"><div data-dcnode-id="155" id="recommended-articles"><ul data-dcnode-id="156"><li class="SidePanelItem" data-dcnode-id="205"><div class="sub-heading" data-dcnode-id="221"><a data-dcnode-id="225" href="https://chatnoir-webco
