</span><meta content="<div class=&quot;Abstracts u-font-serif&quot; id=&quot;abstracts&quot;><div class=&quot;abstract author&quot; id=&quot;abs0005&quot;><h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot;>Abstract</h2><div id=&quot;abst0005&quot;><p id=&quot;spar0060&quot;>There is a close-knit link between people and cultural ecosystem services (CESs). Many methods have been verified as being able to value CESs. However, different methods have focused on specific aspects of CESs and have different highlights and challenges, which makes it difficult to select an appropriate method for specific research. To solve this problem, it is important to understand comprehensively and deeply the various CES valuation methods that exist. This study selects four representative methods, i.e., document analysis, social media photograph analysis, structured interviews and visitor-employed photography (VEP), and combines them with a participatory mapping method based on the Social Values for Ecosystem Services (SolVES) tool to compare their performance in assessing most facets of CESs. We find that the major differences among these four valuation methods are in the process from perception to CES assessment, and we list the advantages and limitations of each method for distinct aspects. Structured interviews are the most practical method because they can be applied to most situations, with few limitations and high accuracy and efficiency. Social media photograph analysis and VEP make a considerable difference in gaining perception for separate valuation purposes. The accuracy and efficiency of document analysis are low; thus, this method is better as a supplement than as an independent assessment.</p></div></div></div>" data-dcnode-id="4476" lang="en" name="citation_abstract"><span data-dcnode-id="4475" instrument_node="">

e-id="3907" id="export-citation-popover"><div data-dcnode-id="3908" id="popover-trigger-export-citation-popover"><button aria-expanded="false" aria-haspopup="true" class="button button-anchor" data-dcnode-id="3909" type="button"><svg class="icon icon-cited-by-66" data-dcnode-id="3912" focusable="false" height="16" viewBox="0 0 106 128" width="16"><path d="m2 58.78v47.22h44v-42h-34v-5.22c0-18.5 17.08-26.78 34-26.78v-1e1c-25.9 0-44 15.12-44 36.78zm1e2 -26.78v-1e1c-25.9 0-44 15.12-44 36.78v47.22h44v-42h-34v-5.22c0-18.5 17.08-26.78 34-26.78z" data-dcnode-id="3913" xmlns="http://www.w3.org/2000/svg"></path></svg><span class="button-text" data-dcnode-id="3910"><span data-dcnode-id="3911" instrument_node="">Cite</span></span></button></div></div></div></div></div><div class="ArticleIdentifierLinks" data-dcnode-id="3899" id="article-identifier-links"><a aria-label="Persistent link using digital object identifier" class="doi" data-dcnode-id="3902" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1016/j.ufug.2020.126945" rel="noreferrer noopener" target="_blank" title="Persistent link using digital object identifier"><span data-dcnode-id="3903" instrument_node="">https://doi.org/10.1016/j.ufug.2020.126945</span></a><a class="rights-and-content" data-dcnode-id="3900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s100.copyright.com/AppDispatchServlet%3FpublisherName%3DELS%26contentID%3DS1618866720307627%26orderBeanReset%3Dtrue" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3901" instrument_node="">Get rights and content</span></a></div><section class="ReferencedArticles" data-dcnode-id="3898"></section><section class="ReferencedArticles" data-dcnode-id="3897"></section><div class="PageDivider" data-dcnode-id="3896"></div><div class="Abstracts u-font-serif" data-dcnode-id="3889" id="abstracts"><div class="abstract author" data-dcnode-id="3890" id="abs0005"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3894"><span data-dcnode-id="3895" instrument_node="">Abstract</span></h2><div data-dcnode-id="3891" id="abst0005"><p data-dcnode-id="3892" id="spar0060"><span data-dcnode-id="3893" instrument_node="">There is a close-knit link between people and cultural ecosystem services (CESs). Many methods have been verified as being able to value CESs. However, different methods have focused on specific aspects of CESs and have different highlights and challenges, which makes it difficult to select an appropriate method for specific research. To solve this problem, it is important to understand comprehensively and deeply the various CES valuation methods that exist. This study selects four representative methods, i.e., document analysis, social media photograph analysis, structured interviews and visitor-employed photography (VEP), and combines them with a participatory mapping method based on the Social Values for Ecosystem Services (SolVES) tool to compare their performance in assessing most facets of CESs. We find that the major differences among these four valuation methods are in the process from perception to CES assessment, and we list the advantages and limitations of each method for distinct aspects. Structured interviews are the most practical method because they can be applied to most situations, with few limitations and high accuracy and efficiency. Social media photograph analysis and VEP make a considerable difference in gaining perception for separate valuation purposes. The accuracy and efficiency of document analysis are low; thus, this method is better as a supplement than as an independent assessment.</span></p></div></div></div><ul class="issue-navigation u-margin-s-bottom u-bg-grey1" data-dcnode-id="3866" id="issue-navigation"><li class="previous move-left u-padding-s-ver u-padding-s-left" data-dcnode-id="3878"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="3879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S1618866720307767"><svg class="icon icon-navigate-left" data-dcnode-id="3887" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 61l45-45 7 7-38 38 38 38-7 7z" data-dcnode-id="3888"></path></svg><span class="button-alternative-text" data-dcnode-id="3880"><strong data-dcnode-id="3885"><span data-dcnode-id="3886" instrument_node="">Previous </span></strong><span class="extra-detail-1" data-dcnode-id="3883"><span data-dcnode-id="3884" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="3881"><span data-dcnode-id="3882" instrument_node=""> in issue</span></span></span></a></li><li class="next move-right u-padding-s-ver u-padding-s-right" data-dcnode-id="3867"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="3868" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S1618866720307706"><span class="button-alternative-text" data-dcnode-id="3871"><strong data-dcnode-id="3876"><span data-dcnode-id="3877" instrument_node="">Next </span></strong><span class="extra-detail-1" data-dcnode-id="3874"><span data-dcnode-id="3875" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="3872"><span data-dcnode-id="3873" instrument_node=""> in issue</span></span></span><svg class="icon icon-navigate-right" data-dcnode-id="3869" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 99l38-38-38-38 7-7 45 45-45 45z" data-dcnode-id="3870"></path></svg></a></li></ul><div class="Keywords u-font-serif" data-dcnode-id="3847"><div class="keywords-section" data-dcnode-id="3848" id="kwd0005"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3864"><span data-dcnode-id="3865" instrument_node="">Keywords</span></h2><div class="keyword" data-dcnode-id="3861" id="kw0005"><span data-dcnode-id="3862"><span data-dcnode-id="3863" instrument_node="">Cultural ecosystem services</span></span></div><div class="keyword" data-dcnode-id="3858" id="kw0010"><span data-dcnode-id="3859"><span data-dcnode-id="3860" instrument_node="">Visitor-employed photography</span></span></div><div class="keyword" data-dcnode-id="3855" id="kw0015"><span data-dcnode-id="3856"><span data-dcnode-id="3857" instrument_node="">SolVES</span></span></div><div class="keyword" data-dcnode-id="3852" id="kw0020"><span data-dcnode-id="3853"><span data-dcnode-id="3854" instrument_node="">Social media photograph analysis</span></span></div><div class="keyword" data-dcnode-id="3849" id="kw0025"><span data-dcnode-id="3850"><span data-dcnode-id="3851" instrument_node="">Method comparison</span></span></div></div></div><span data-dcnode-id="3846" instrument_node=""></span><div class="Body u-font-serif" data-dcnode-id="2614" id="body"><div data-dcnode-id="2634"><section data-dcnode-id="3732" id="sec0005"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3840" id="sect0015"><span data-dcnode-id="3845" instrument_node="">1</span><span data-dcnode-id="3843" instrument_node="">. </span><span data-dcnode-id="3841" instrument_node="">Introduction</span></h2><p data-dcnode-id="3790" id="par0005"><span data-dcnode-id="3839" instrument_node="">Our attitude toward and reaction to the natural environment have changed gradually with our perception of the environmental deterioration that we as human beings have caused. To fully understand our relationship with the environment, ecosystem services (ESs) were proposed to describe and categorize this relationship (</span><a class="workspace-trigger" data-dcnode-id="3837" href="#bib0160" name="bbib0160"><span data-dcnode-id="3838" instrument_node="">Pharo and Daily, 1999</span></a><span data-dcnode-id="3836" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="3834" href="#bib0150" name="bbib0150"><span data-dcnode-id="3835" instrument_node="">Mooney and Ehrlich, 1997</span></a><span data-dcnode-id="3833" instrument_node="">). Initially, in the 1970s, ESs were defined as the benefits that humans obtain from the natural environment (</span><a class="workspace-trigger" data-dcnode-id="3831" href="#bib0235" name="bbib0235"><span data-dcnode-id="3832" instrument_node="">Westman, 1977</span></a><span data-dcnode-id="3830" instrument_node="">). As adopted by the Millennium Ecosystem Assessment (MEA), this concept has become a widely used tool in decision making for assessing the ecosystem (</span><a class="workspace-trigger" data-dcnode-id="3828" href="#bib0010" name="bbib0010"><span data-dcnode-id="3829" instrument_node="">Bateman, 2009</span></a><span data-dcnode-id="3827" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="3825" href="#bib0115" name="bbib0115"><span data-dcnode-id="3826" instrument_node="">Maes et al., 2016</span></a><span data-dcnode-id="3824" instrument_node="">). Among the typical ES classifications, such as provisioning services, regulating services and cultural services, cultural ecosystem services (CESs) emphasize the nonmaterial benefits that humans obtain from an ecosystem (MEA, 2005). According to the MEA (2005), the relationship between CESs and humans is mainly reflected in spiritual enrichment, cognitive development, reflection, recreation, and aesthetic experience. Thus, it is highly recognized that CESs have the most direct influence on human well-being (</span><a class="workspace-trigger" data-dcnode-id="3822" href="#bib0110" name="bbib0110"><span data-dcnode-id="3823" instrument_node="">Kenter et al., 2011</span></a><span data-dcnode-id="3821" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="3819" href="#bib0165" name="bbib0165"><span data-dcnode-id="3820" instrument_node="">Plieninger et al., 2013</span></a><span data-dcnode-id="3818" instrument_node="">). With the development of society and the economy, people depend more on CESs than on other types of ESs (</span><a class="workspace-trigger" data-dcnode-id="3816" href="#bib0050" name="bbib0050"><span data-dcnode-id="3817" instrument_node="">Gee and Burkhard, 2010</span></a><span data-dcnode-id="3815" instrument_node="">), and it is necessary to incorporate CESs into ecosystem service assessments (</span><a class="workspace-trigger" data-dcnode-id="3813" href="#bib0190" name="bbib0190"><span data-dcnode-id="3814" instrument_node="">Schaich et al., 2010</span></a><span data-dcnode-id="3812" instrument_node="">). Thus, there is an increasing number of studies about CESs and the appropriate methods for assessing them (</span><a class="workspace-trigger" data-dcnode-id="3810" href="#bib0170" name="bbib0170"><span data-dcnode-id="3811" instrument_node="">Raymond et al., 2013</span></a><span data-dcnode-id="3809" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="3807" href="#bib0100" name="bbib0100"><span data-dcnode-id="3808" instrument_node="">Katz-Gerro and Orenstein, 2015</span></a><span data-dcnode-id="3806" instrument_node="">). CESs usually depend on intermediate ESs (</span><a class="workspace-trigger" data-dcnode-id="3804" href="#bib0045" name="bbib0045"><span data-dcnode-id="3805" instrument_node="">Fisher et al., 2009</span></a><span data-dcnode-id="3803" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="3801" href="#bib0095" name="bbib0095"><span data-dcnode-id="3802" instrument_node="">Johnston and Russell, 2011</span></a><span data-dcnode-id="3800" instrument_node="">) and cover many disciplines, including ecology, economics, and the social sciences (</span><a class="workspace-trigger" data-dcnode-id="3798" href="#bib0145" name="bbib0145"><span data-dcnode-id="3799" instrument_node="">Milcu et al., 2013</span></a><span data-dcnode-id="3797" instrument_node="">). This characteristic makes CESs not only different from other ESs but also difficult to incorporate in assessments (</span><a class="workspace-trigger" data-dcnode-id="3795" href="#bib0020" name="bbib0020"><span data-dcnode-id="3796" instrument_node="">Chan et al., 2012a</span></a><span data-dcnode-id="3794" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3792" href="#bib0025" name="bbib0025"><span data-dcnode-id="3793" instrument_node="">b</span></a><span data-dcnode-id="3791" instrument_node="">).</span></p><p data-dcnode-id="3746" id="par0010"><span data-dcnode-id="3789" instrument_node="">The current research on CES assessment is mainly divided into monetary and nonmonetary methods (</span><a class="workspace-trigger" data-dcnode-id="3787" href="#bib0080" name="bbib0080"><span data-dcnode-id="3788" instrument_node="">Hirons et al., 2016</span></a><span data-dcnode-id="3786" instrument_node="">), and both methods have received extensive attention (</span><a class="workspace-trigger" data-dcnode-id="3784" href="#bib0030" name="bbib0030"><span data-dcnode-id="3785" instrument_node="">Cheng et al., 2019</span></a><span data-dcnode-id="3783" instrument_node="">). </span><a class="workspace-trigger" data-dcnode-id="3781" href="#bib0185" name="bbib0185"><span data-dcnode-id="3782" instrument_node="">Sander and Haight (2012)</span></a><span data-dcnode-id="3780" instrument_node=""> used hedonic pricing to quantify people’s willingness to spend more money on housing close to green/blue infrastructure compared to areas without clear CESs. </span><a class="workspace-trigger" data-dcnode-id="3778" href="#bib0225" name="bbib0225"><span data-dcnode-id="3779" instrument_node="">Termansen et al. (2013)</span></a><span data-dcnode-id="3777" instrument_node=""> assessed the spatial diversity of value by combining recreational choice modeling and economic valuation based on a geographic information system (GIS). </span><a class="workspace-trigger" data-dcnode-id="3775" href="#bib0035" name="bbib0035"><span data-dcnode-id="3776" instrument_node="">Costanza et al. (1989)</span></a><span data-dcnode-id="3774" instrument_node=""> studied the value of coastal Louisiana based on both people’s willingness to pay and energy analysis-based methodologies. These monetary methods for CES assessment can provide a compelling economic case for decision makers (</span><a class="workspace-trigger" data-dcnode-id="3772" href="#bib0215" name="bbib0215"><span data-dcnode-id="3773" instrument_node="">Spangenberg and Settele, 2010</span></a><span data-dcnode-id="3771" instrument_node="">). However, market-based valuation techniques are often inadequate because they fail to completely assess CESs. Therefore, in the past 10 years, researchers have given more attention to nonmonetary methods for CES assessment (</span><a class="workspace-trigger" data-dcnode-id="3769" href="#bib0085" name="bbib0085"><span data-dcnode-id="3770" instrument_node="">James et al., 2013</span></a><span data-dcnode-id="3768" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="3766" href="#bib0175" name="bbib0175"><span data-dcnode-id="3767" instrument_node="">Sagie et al., 2013</span></a><span data-dcnode-id="3765" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="3763" href="#bib0195" name="bbib0195"><span data-dcnode-id="3764" instrument_node="">Scholte et al., 2015</span></a><span data-dcnode-id="3762" instrument_node="">). </span><a class="workspace-trigger" data-dcnode-id="3760" href="#bib0030" name="bbib0030"><span data-dcnode-id="3761" instrument_node="">Cheng et al. (2019)</span></a><span data-dcnode-id="3759" instrument_node=""> classified existing CES valuation methods into thirteen categories and find that the interview and questionnaire approaches are the most frequently used among these methods. In addition, </span><a class="workspace-trigger" data-dcnode-id="3757" href="#bib0195" name="bbib0195"><span data-dcnode-id="3758" instrument_node="">Scholte et al. (2015)</span></a><span data-dcnode-id="3756" instrument_node=""> estimated CES values by analyzing text, images, or other forms of material from individuals or groups. The social media-based method acquires data from web platforms, including Flickr, Panoramio, and Instagram (</span><a class="workspace-trigger" data-dcnode-id="3754" href="#bib0130" name="bbib0130"><span data-dcnode-id="3755" instrument_node="">Martínez Pastur et al., 2015</span></a><span data-dcnode-id="3753" instrument_node="">). The participatory mapping method, the participatory GIS (PGIS) method and the public participation GIS (PPGIS) method concentrate on the relationship between the location and the CESs perceived by people (</span><a class="workspace-trigger" data-dcnode-id="3751" href="#bib0040" name="bbib0040"><span data-dcnode-id="3752" instrument_node="">Dramstad et al., 2006</span></a><span data-dcnode-id="3750" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="3748" href="#bib0015" name="bbib0015"><span data-dcnode-id="3749" instrument_node="">Brown and Hausner, 2017</span></a><span data-dcnode-id="3747" instrument_node="">).</span></p><p data-dcnode-id="3735" id="par0015"><span data-dcnode-id="3745" instrument_node="">Previous literature reviews on CES valuation methods have emphasized the advantages of different methods (</span><a class="workspace-trigger" data-dcnode-id="3743" href="#bib0080" name="bbib0080"><span data-dcnode-id="3744" instrument_node="">Hirons et al., 2016</span></a><span data-dcnode-id="3742" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="3740" href="#bib0030" name="bbib0030"><span data-dcnode-id="3741" instrument_node="">Cheng et al., 2019</span></a><span data-dcnode-id="3739" instrument_node="">). </span><a class="workspace-trigger" data-dcnode-id="3737" href="#bib0065" name="bbib0065"><span data-dcnode-id="3738" instrument_node="">Gosal et al. (2018)</span></a><span data-dcnode-id="3736" instrument_node=""> compared three methods in examining recreational and aesthetic value, namely, structured survey, participatory GIS (PGIS) and Global Positioning System (GPS) tracking methods. All of these studies indicate that it is necessary to be more comprehensive when assessing CES assessment methods to improve the accuracy of such assessments.</span></p><p data-dcnode-id="3733" id="par0020"><span data-dcnode-id="3734" instrument_node="">In this study, we compare the four most popular methods, i.e. document analysis, social media photograph analysis, structured interviews and visitor-employed photography (VEP), and further assess several types of the CESs, including aesthetic, historical, educational, recreational and therapeutic. Additionally, to better quantify and map CES assessment methods, we combine these methods with a participatory mapping method based on the Social Values for Ecosystem Services (SolVES) tool. We then discuss the differences among these methods in data access, reliability, representativeness and applicability.</span></p></section><section data-dcnode-id="3412" id="sec0010"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3726" id="sect0020"><span data-dcnode-id="3731" instrument_node="">2</span><span data-dcnode-id="3729" instrument_node="">. </span><span data-dcnode-id="3727" instrument_node="">Data sets and methods</span></h2><section data-dcnode-id="3679" id="sec0015"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3720" id="sect0025"><span data-dcnode-id="3725" instrument_node="">2.1</span><span data-dcnode-id="3723" instrument_node="">. </span><span data-dcnode-id="3721" instrument_node="">Study area</span></h3><div data-dcnode-id="3680"><p data-dcnode-id="3706" id="par0025"><span data-dcnode-id="3719" instrument_node="">The Wusong Paotaiwan Wetland (WPW) park is located in Shanghai, China, where the Yangtze and Huangpu Rivers converge to the East China Sea (</span><a class="workspace-trigger" data-dcnode-id="3717" href="#fig0005" name="bfig0005"><span data-dcnode-id="3718" instrument_node="">Fig. 1</span></a><span data-dcnode-id="3716" instrument_node="">). The park covers an area of approximately 106.6 ha and has a coastline of 1,694.13 m in length. More than 60% of the total area is wetlands that can provide many essential ESs both directly (e.g., floodwater storage) and indirectly (e.g., microclimate regulation) to humans. CESs are also included (</span><a class="workspace-trigger" data-dcnode-id="3714" href="#bib0140" name="bbib0140"><span data-dcnode-id="3715" instrument_node="">MEA, 2005</span></a><span data-dcnode-id="3713" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="3711" href="#bib0105" name="bbib0105"><span data-dcnode-id="3712" instrument_node="">Keddy et al., 2009</span></a><span data-dcnode-id="3710" instrument_node="">). The construction of the WPW park was completed entirely in 2007 after many years of construction. Historically, the location of the WPW park was an important military fort. Moreover, in the 1960s, the area was built using slag for purposes of combat readiness. Considering the area’s natural conditions and historical background, designers made ecological restoration and cultural reconstruction the focus of the design and built main attractions such as the pit garden, Wusong Fort Memorial Square, waterfront plank path, and waterfront observation deck. Meanwhile, the park also includes attractions that provide places for recreation and education, e.g., the Shell Theatre, the Yangtze River Estuary Science and Technology Museum, Rihui Bridge, a lawn park, and waterfalls and streams (</span><a class="workspace-trigger" data-dcnode-id="3708" href="#fig0005" name="bfig0005"><span data-dcnode-id="3709" instrument_node="">Fig. 1</span></a><span data-dcnode-id="3707" instrument_node="">). Additionally, fitness trails in the park can promote physical activity. The WPW park is an excellent provider of the entire range of CESs.</span></p><figure class="figure text-xs" data-dcnode-id="3681" id="fig0005"><span data-dcnode-id="3690"><img alt="Fig. 1" aria-describedby="cap0005" data-dcnode-id="3705" height="302" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1618866720307627-gr1.jpg&amp;raw"><span data-dcnode-id="3704" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="3691"><li data-dcnode-id="3698"><a class="anchor download-link u-font-sans" data-dcnode-id="3699" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1618866720307627-gr1_lrg.jpg" target="_blank" title="Download high-res image (537KB)"><span class="anchor-text" data-dcnode-id="3700"><span data-dcnode-id="3703" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="3701"><span data-dcnode-id="3702" instrument_node="">Download high-res image (537KB)</span></span></span></a></li><li data-dcnode-id="3692"><a class="anchor download-link u-font-sans" data-dcnode-id="3693" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1618866720307627-gr1.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="3694"><span data-dcnode-id="3697" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="3695"><span data-dcnode-id="3696" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="3682"><span data-dcnode-id="3683" id="cap0005"><p data-dcnode-id="3684" id="spar0005"><span class="label" data-dcnode-id="3688"><span data-dcnode-id="3689" instrument_node="">Fig. 1</span></span><span data-dcnode-id="3687" instrument_node="">. </span><span data-dcnode-id="3685" instrument_node="">Map of the location and main attractions of the study area.</span></p></span></span></figure></div></section><section data-dcnode-id="3448" id="sec0020"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3673" id="sect0030"><span data-dcnode-id="3678" instrument_node="">2.2</span><span data-dcnode-id="3676" instrument_node="">. </span><span data-dcnode-id="3674" instrument_node="">Data acquisition and processing</span></h3><div data-dcnode-id="3552"><p data-dcnode-id="3656" id="par0030"><span data-dcnode-id="3672" instrument_node="">The Common International Classification of Ecosystem Services (CICES) is a classification scheme that focuses on the contribution of the ecosystem to well-being (</span><a class="workspace-trigger" data-dcnode-id="3670" href="#bib0005" name="bbib0005"><span data-dcnode-id="3671" instrument_node="">Affek et al., 2020</span></a><span data-dcnode-id="3669" instrument_node="">). Based on the CICES, we chose the following five types of CES values to study through field research and preliminary experiments: aesthetic, historical, educational, recreational, and therapeutic values. The explanations of these five CES value types are listed in </span><a class="workspace-trigger" data-dcnode-id="3667" href="#tbl0005" name="btbl0005"><span data-dcnode-id="3668" instrument_node="">Table 1</span></a><span data-dcnode-id="3666" instrument_node="">. According to the classification standard, we gathered the perceptions of CESs from various data sources using four different methods (</span><a class="workspace-trigger" data-dcnode-id="3664" href="#tbl0010" name="btbl0010"><span data-dcnode-id="3665" instrument_node="">Table 2</span></a><span data-dcnode-id="3663" instrument_node="">). Among these four methods, the perceptions of document analysis and social media photograph analysis are the revealed preferences, while the perceptions of structured interviews and VEP, which were gathered from </span><a class="workspace-trigger" data-dcnode-id="3661" href="#bib0230" name="bbib0230"><span data-dcnode-id="3662" instrument_node="">Wang et al. (2016)</span></a><span data-dcnode-id="3660" instrument_node=""> and </span><a class="workspace-trigger" data-dcnode-id="3658" href="#bib0220" name="bbib0220"><span data-dcnode-id="3659" instrument_node="">Sun et al. (2019)</span></a><span data-dcnode-id="3657" instrument_node="">, respectively, are the stated preferences. The revealed preference data were gathered from Dianping, which is one of the world’s first third-party delivery platforms that includes consumer reviews. Users can comment on the park by marking and posting with text, photographs or video. For the data subset consisting of structured interviews and VEP, we filtered out data that unfit for our CES classification.</span></p><div class="tables frame-topbot rowsep-0 colsep-0" data-dcnode-id="3613" id="tbl0005"><span class="captions" data-dcnode-id="3648"><span data-dcnode-id="3649" id="cap0020"><p data-dcnode-id="3650" id="spar0020"><span class="label" data-dcnode-id="3654"><span data-dcnode-id="3655" instrument_node="">Table 1</span></span><span data-dcnode-id="3653" instrument_node="">. </span><span data-dcnode-id="3651" instrument_node="">Explanations of the CES value types employed in this study (adapt from the CICES V5.1).</span></p></span></span><div class="groups" data-dcnode-id="3614"><table data-dcnode-id="3615"><thead class="valign-top" data-dcnode-id="3642"><tr class="rowsep-1" data-dcnode-id="3643"><th class="align-left" data-dcnode-id="3646" scope="col"><span data-dcnode-id="3647" instrument_node="">CES value type</span></th><th class="align-left" data-dcnode-id="3644" scope="col"><span data-dcnode-id="3645" instrument_node="">Explanation</span></th></tr></thead><tbody data-dcnode-id="3616"><tr data-dcnode-id="3637"><th class="align-left" data-dcnode-id="3640" scope="row"><span data-dcnode-id="3641" instrument_node="">Aesthetic value</span></th><td class="align-left" data-dcnode-id="3638"><span data-dcnode-id="3639" instrument_node="">Sense of place, artistic representations of nature</span></td></tr><tr data-dcnode-id="3632"><th class="align-left" data-dcnode-id="3635" scope="row"><span data-dcnode-id="3636" instrument_node="">Historical value</span></th><td class="align-left" data-dcnode-id="3633"><span data-dcnode-id="3634" instrument_node="">Historical records, cultural heritage and symbolic interactions with natural environment</span></td></tr><tr data-dcnode-id="3627"><th class="align-left" data-dcnode-id="3630" scope="row"><span data-dcnode-id="3631" instrument_node="">Educational value</span></th><td class="align-left" data-dcnode-id="3628"><span data-dcnode-id="3629" instrument_node="">Subject matter for research and education both on site and via other media or experiential interactions with natural environment</span></td></tr><tr data-dcnode-id="3622"><th class="align-left" data-dcnode-id="3625" scope="row"><span data-dcnode-id="3626" instrument_node="">Recreational value</span></th><td class="align-left" data-dcnode-id="3623"><span data-dcnode-id="3624" instrument_node="">Development of recreational activities in different environmental settings and ex situ viewing or the experience of the natural world through different media</span></td></tr><tr data-dcnode-id="3617"><th class="align-left" data-dcnode-id="3620" scope="row"><span data-dcnode-id="3621" instrument_node="">Therapeutic value</span></th><td class="align-left" data-dcnode-id="3618"><span data-dcnode-id="3619" instrument_node="">Physical interaction with natural environment and the promotion of physical and mental health</span></td></tr></tbody></table></div></div><div class="tables frame-topbot rowsep-0 colsep-0" data-dcnode-id="3553" id="tbl0010"><span class="captions" data-dcnode-id="3605"><span data-dcnode-id="3606" id="cap0025"><p data-dcnode-id="3607" id="spar0025"><span class="label" data-dcnode-id="3611"><span data-dcnode-id="3612" instrument_node="">Table 2</span></span><span data-dcnode-id="3610" instrument_node="">. </span><span data-dcnode-id="3608" instrument_node="">Details of the data generated by the four methods.</span></p></span></span><div class="groups" data-dcnode-id="3554"><table data-dcnode-id="3555"><thead class="valign-top" data-dcnode-id="3595"><tr class="rowsep-1" data-dcnode-id="3596"><th class="align-left" data-dcnode-id="3603" scope="col"><span data-dcnode-id="3604" instrument_node="">Method</span></th><th class="align-left" data-dcnode-id="3601" scope="col"><span data-dcnode-id="3602" instrument_node="">Preference type</span></th><th class="align-left" data-dcnode-id="3599" scope="col"><span data-dcnode-id="3600" instrument_node="">Source</span></th><th class="align-left" data-dcnode-id="3597" scope="col"><span data-dcnode-id="3598" instrument_node="">Time period</span></th></tr></thead><tbody data-dcnode-id="3556"><tr data-dcnode-id="3586"><th class="align-left" data-dcnode-id="3593" scope="row"><span data-dcnode-id="3594" instrument_node="">Document analysis</span></th><td class="align-left" data-dcnode-id="3591"><span data-dcnode-id="3592" instrument_node="">Revealed preferences</span></td><td class="align-left" data-dcnode-id="3589"><span data-dcnode-id="3590" instrument_node="">Dianping</span></td><td class="align-left" data-dcnode-id="3587"><span data-dcnode-id="3588" instrument_node="">1/1/2015−12/31/2017</span></td></tr><tr data-dcnode-id="3577"><th class="align-left" data-dcnode-id="3584" scope="row"><span data-dcnode-id="3585" instrument_node="">Social media photograph analysis</span></th><td class="align-left" data-dcnode-id="3582"><span data-dcnode-id="3583" instrument_node="">Revealed preferences</span></td><td class="align-left" data-dcnode-id="3580"><span data-dcnode-id="3581" instrument_node="">Dianping</span></td><td class="align-left" data-dcnode-id="3578"><span data-dcnode-id="3579" instrument_node="">1/1/2015−12/31/2017</span></td></tr><tr data-dcnode-id="3567"><th class="align-left" data-dcnode-id="3575" scope="row"><span data-dcnode-id="3576" instrument_node="">Structured interviews</span></th><td class="align-left" data-dcnode-id="3573"><span data-dcnode-id="3574" instrument_node="">Stated preferences</span></td><td class="align-left" data-dcnode-id="3570"><a class="workspace-trigger" data-dcnode-id="3571" href="#bib0230" name="bbib0230"><span data-dcnode-id="3572" instrument_node="">Wang et al. (2016)</span></a></td><td class="align-left" data-dcnode-id="3568"><span data-dcnode-id="3569" instrument_node="">6/1/2015−7/31/2015</span></td></tr><tr data-dcnode-id="3557"><th class="align-left" data-dcnode-id="3565" scope="row"><span data-dcnode-id="3566" instrument_node="">Visitor-employed photography (VEP)</span></th><td class="align-left" data-dcnode-id="3563"><span data-dcnode-id="3564" instrument_node="">Stated preferences</span></td><td class="align-left" data-dcnode-id="3560"><a class="workspace-trigger" data-dcnode-id="3561" href="#bib0220" name="bbib0220"><span data-dcnode-id="3562" instrument_node="">Sun et al. (2019)</span></a></td><td class="align-left" data-dcnode-id="3558"><span data-dcnode-id="3559" instrument_node="">11/7/2015, 11/22/2015, and 12/4/2015</span></td></tr></tbody></table></div></div></div><section data-dcnode-id="3541" id="sec0025"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3546" id="sect0035"><span data-dcnode-id="3551" instrument_node="">2.2.1</span><span data-dcnode-id="3549" instrument_node="">. </span><span data-dcnode-id="3547" instrument_node="">Document analysis</span></h4><p data-dcnode-id="3544" id="par0035"><span data-dcnode-id="3545" instrument_node="">As the data of document analysis, we studied the text in comments that cover three calendar years, from 2015 to 2017. Through manual analysis, the following steps were sequentially applied for each comment: (i) we identified the location mentioned in the text, excluding locations outside the park or inside the Yangtze River Estuary Science and Technology Museum; (ii) we distinguished the value types associated with the location via text analysis, and more than one value type can be assigned to each location; (iii) we calculated the latitude and longitude coordinates for each location; and (iv) we assigned a score, which is 100 divided by the number of CES values evaluated per comment, to every CES value.</span></p><p data-dcnode-id="3542" id="par0040"><span data-dcnode-id="3543" instrument_node="">To improve the data quality, obscure or oversized locations were invalid because of difficulties in calculating the coordinates. For example, it is difficult to determine the exact location of the “waterfront”, as indicated by visitors, because the coastline is 1,694.13 m long and extends in a straight line. Thus, the “waterfront” was considered an invalid location. The same applied to the word “lawn”. In addition, the comments that did not include personal feelings or opinions about the location, for example, comments that only mentioned the location of park attractions, were not included in further analysis.</span></p></section><section data-dcnode-id="3473" id="sec0030"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3535" id="sect0040"><span data-dcnode-id="3540" instrument_node="">2.2.2</span><span data-dcnode-id="3538" instrument_node="">. </span><span data-dcnode-id="3536" instrument_node="">Social media photograph analysis</span></h4><div data-dcnode-id="3476"><p data-dcnode-id="3530" id="par0045"><span data-dcnode-id="3534" instrument_node="">As the data of social media photograph analysis, we studied the photographs in the comments that cover three calendar years, from 2015 to 2017. Through manual analysis, the following steps were sequentially applied to each comment: (i) we filtered out the photographs shot outside the park or inside the Yangtze River Estuary Science and Technology Museum; (ii) we classified each photograph based on examples of CESs (</span><a class="workspace-trigger" data-dcnode-id="3532" href="#tbl0015" name="btbl0015"><span data-dcnode-id="3533" instrument_node="">Table 3</span></a><span data-dcnode-id="3531" instrument_node="">); (iii) we identified the location in the photograph and calculated the latitude and longitude coordinates for each photograph; and (iv) we assigned a score, which is 100 divided by the number of CES values evaluated per comment, to every CES value.</span></p><div class="tables frame-topbot rowsep-0 colsep-0" data-dcnode-id="3477" id="tbl0015"><span class="captions" data-dcnode-id="3522"><span data-dcnode-id="3523" id="cap0030"><p data-dcnode-id="3524" id="spar0030"><span class="label" data-dcnode-id="3528"><span data-dcnode-id="3529" instrument_node="">Table 3</span></span><span data-dcnode-id="3527" instrument_node="">. </span><span data-dcnode-id="3525" instrument_node="">Examples of CESs.</span></p></span></span><div class="groups" data-dcnode-id="3478"><table data-dcnode-id="3479"><thead class="valign-top" data-dcnode-id="3516"><tr class="rowsep-1" data-dcnode-id="3517"><th class="align-left" data-dcnode-id="3520" scope="col"><span data-dcnode-id="3521" instrument_node="">Social value type</span></th><th class="align-left" data-dcnode-id="3518" scope="col"><span data-dcnode-id="3519" instrument_node="">Examples</span></th></tr></thead><tbody data-dcnode-id="3480"><tr data-dcnode-id="3511"><th class="align-left" data-dcnode-id="3514" scope="row"><span data-dcnode-id="3515" instrument_node="">Aesthetic value</span></th><td class="align-left" data-dcnode-id="3512"><span data-dcnode-id="3513" instrument_node="">Scenic or beautiful architecture</span></td></tr><tr data-dcnode-id="3504"><th class="align-left" data-dcnode-id="3509" scope="row"><span data-dcnode-id="3510" instrument_node="">Historical value</span></th><td class="align-left" data-dcnode-id="3505"><span data-dcnode-id="3508" instrument_node="">Physical heritage (historical buildings, cultural landscapes, and species related to local culture)</span><br data-dcnode-id="3507"><span data-dcnode-id="3506" instrument_node="">Intangible cultural heritage (traditional customs and folk customs)</span></td></tr><tr data-dcnode-id="3497"><th class="align-left" data-dcnode-id="3502" scope="row"><span data-dcnode-id="3503" instrument_node="">Educational value</span></th><td class="align-left" data-dcnode-id="3498"><span data-dcnode-id="3501" instrument_node="">Ongoing research or educational activity</span><br data-dcnode-id="3500"><span data-dcnode-id="3499" instrument_node="">Research or educational equipment in use without people</span></td></tr><tr data-dcnode-id="3488"><th class="align-left" data-dcnode-id="3495" scope="row"><span data-dcnode-id="3496" instrument_node="">Recreational value</span></th><td class="align-left" data-dcnode-id="3489"><span data-dcnode-id="3494" instrument_node="">The use and influence of nature in art (e.g., painting, music, and drama), local symbols, portraits, etc.</span><br data-dcnode-id="3493"><span data-dcnode-id="3492" instrument_node="">Photographs that have been artfully processed</span><br data-dcnode-id="3491"><span data-dcnode-id="3490" instrument_node="">Religious rituals and entertainment activities in natural or seminatural conditions</span></td></tr><tr data-dcnode-id="3481"><th class="align-left" data-dcnode-id="3486" scope="row"><span data-dcnode-id="3487" instrument_node="">Therapeutic value</span></th><td class="align-left" data-dcnode-id="3482"><span data-dcnode-id="3485" instrument_node="">People participating in athletic activities</span><br data-dcnode-id="3484"><span data-dcnode-id="3483" instrument_node="">Sports facilities</span></td></tr></tbody></table></div></div></div><p data-dcnode-id="3474" id="par0050"><span data-dcnode-id="3475" instrument_node="">To enhance the data quality, additional processes similar to those used for document analysis were carried out. Photographs depicting people (e.g., selfies), pets, plants, signboards or other facilities as their main subjects were excluded. Moreover, photographs for which the shot location could not be accurately calculated were not studied in further analysis.</span></p></section><section data-dcnode-id="3461" id="sec0035"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3467" id="sect0045"><span data-dcnode-id="3472" instrument_node="">2.2.3</span><span data-dcnode-id="3470" instrument_node="">. </span><span data-dcnode-id="3468" instrument_node="">Structured interviews</span></h4><p data-dcnode-id="3462" id="par0055"><span data-dcnode-id="3466" instrument_node="">In </span><a class="workspace-trigger" data-dcnode-id="3464" href="#bib0230" name="bbib0230"><span data-dcnode-id="3465" instrument_node="">Wang et al. (2016)</span></a><span data-dcnode-id="3463" instrument_node="">, random structured interviews were conducted in the WPW park during the period from June 1, 2015 to July 31, 2015. Each survey consisted of four sections as follows: (i) we introduced the study area and the purpose of the interview; (ii) we asked the interviewees about the characteristics of sightseeing and their feelings about it; (iii) we let the interviewees allocate social value on the map with main attractions and mark points of social value; and (iv) we inquired about the basic socioeconomic status of the interviewees. The third section was the critical part of the structured interviews. The interviewees scored each type of CES value for the overall park based on their perception while sightseeing. In addition, they were asked to mark the locations having CES values on a paper map. These locations were used to calculate latitude and longitude coordinates based on the GIS in the following work.</span></p></section><section data-dcnode-id="3449" id="sec0040"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3455" id="sect0050"><span data-dcnode-id="3460" instrument_node="">2.2.4</span><span data-dcnode-id="3458" instrument_node="">. </span><span data-dcnode-id="3456" instrument_node="">Visitor-employed photography (VEP)</span></h4><p data-dcnode-id="3450" id="par0060"><span data-dcnode-id="3454" instrument_node="">In the report by </span><a class="workspace-trigger" data-dcnode-id="3452" href="#bib0220" name="bbib0220"><span data-dcnode-id="3453" instrument_node="">Sun et al. (2019)</span></a><span data-dcnode-id="3451" instrument_node="">, employed participants carried an Apple iPhone with the Map Plus application to the WPW park. This app integrates a camera, GPS, in-app map and other assistance tools, which can be used to take photographs and record their location. To make the experiment achieve a high capacity, we sent detailed instructions about using Map Plus software and some attention points to each participant before the experiment, and we did not limit the number of photographs or touring routes. The participants could visit the park as usual and freely react to a stimulus. After filtering out photographs that were taken repeatedly or incorrectly, we collected the valid photographs and obtained the coordinate data of these photographs from the app. Furthermore, the participants were asked to identify the CES value type of each photograph based on the largest area ratio when subject elicitation was confused because of overlapping categories within a photograph, and they allocated a hypothetical score of 100 to these value types.</span></p></section></section><section data-dcnode-id="3436" id="sec0045"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3442" id="sect0055"><span data-dcnode-id="3447" instrument_node="">2.3</span><span data-dcnode-id="3445" instrument_node="">. </span><span data-dcnode-id="3443" instrument_node="">Spatial analysis</span></h3><p data-dcnode-id="3437" id="par0065"><span data-dcnode-id="3441" instrument_node="">We compared the proportion and distribution of the CES value points perceived by stakeholders, following the methods of </span><a class="workspace-trigger" data-dcnode-id="3439" href="#bib0070" name="bbib0070"><span data-dcnode-id="3440" instrument_node="">Heikinheimo et al. (2020)</span></a><span data-dcnode-id="3438" instrument_node="">. We subdivided the study area into 10 m × 10 m grid squares and calculated the number of value points in each grid square according to each method. If the attribute values of the grid squares were greater than 0, then there were CES values in the grid squares. The Jaccard index was used to compare the similarity of distribution between the two methods. This index is calculated as the intersection of the two methods (both attribute values in the grid square are more than 0) divided by their sum. A value of 1 indicates that the distribution of the two methods completely overlaps, while a value of 0 indicates that they do not overlap. Based on the number of CES value points, the top quantile (20% of value points) was defined as hotpots. The Jaccard index was also applied to the hotpots.</span></p></section><section data-dcnode-id="3413" id="sec0050"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3430" id="sect0060"><span data-dcnode-id="3435" instrument_node="">2.4</span><span data-dcnode-id="3433" instrument_node="">. </span><span data-dcnode-id="3431" instrument_node="">Value quantification and mapping (SolVES)</span></h3><p data-dcnode-id="3416" id="par0070"><span data-dcnode-id="3429" instrument_node="">We conduct valuing and mapping CES by using the Social Values for Ecosystem Services (SolVES, </span><a data-dcnode-id="3427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//solves.cr.usgs.gov/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3428" instrument_node="">http://solves.cr.usgs.gov</span></a><span data-dcnode-id="3426" instrument_node="">) tool. SolVES is a tool that can quantify social values, manifest the attitudes and preferences of research objects and illustrate the connection among social values, environmental characteristics and locations (</span><a class="workspace-trigger" data-dcnode-id="3424" href="#bib0200" name="bbib0200"><span data-dcnode-id="3425" instrument_node="">Sherrouse et al., 2011</span></a><span data-dcnode-id="3423" instrument_node="">). SolVES depends on a GIS and integrates Maxent maximum entropy modeling software (</span><a class="workspace-trigger" data-dcnode-id="3421" href="#bib0205" name="bbib0205"><span data-dcnode-id="3422" instrument_node="">Sherrouse et al., 2014</span></a><span data-dcnode-id="3420" instrument_node="">). This tool has the following three parts: (i) an ecosystem services social-values model that calculates the maximum value index (M-VI) and the location of the highest-rated social value identified; (ii) a value mapping model that generates a social value map and environmental metrics; and (iii) a value transfer mapping model that predicts social value and environmental metrics. In this study, we used only the first two parts. The study data included the study area boundary, a value type table, survey points and a value allocation table. The value type table stored the ID and description of each value type, which was the same as </span><a class="workspace-trigger" data-dcnode-id="3418" href="#tbl0005" name="btbl0005"><span data-dcnode-id="3419" instrument_node="">Table 1</span></a><span data-dcnode-id="3417" instrument_node="">. The survey point data represented the locations selected by every study object that has a CES value type. Each point had one corresponding value type, and points with the same latitude and longitude could have different value types. The grades of these value types were stored in the value allocation table. The data generated by the four methods provided information about the survey points and value allocation.</span></p><p data-dcnode-id="3414" id="par0075"><span data-dcnode-id="3415" instrument_node="">The kernel density was generated for each value type, weighted by the total amount of each value. By comparing each cell among all the kernel densities, the maximum kernel density value of each cell was identified and written to a single grid. Then, the overall maximum kernel density value was evaluated, and the value mapping model was used to normalize the kernel density surfaces. Ultimately, value maps were generated. The average nearest neighbor statistics were calculated and used to conduct completely spatially random (CSR) hypothesis testing for the point data. The R value, the ratio of the observed distance to the expected distance between points, identifies the point pattern, and the value less than 1 indicates clustering. Then, the selected kernel density surfaces were divided by the maximum grid and standardized into a 10-point-based value index integer grid. A constant grid of the maximum value in each value was generated (M-VI). By multiplying each value layer with its corresponding M-VI, the value mapping model output value map of the final value index ranged from 0 to 10.</span></p></section></section><section data-dcnode-id="2822" id="sec0055"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3406" id="sect0065"><span data-dcnode-id="3411" instrument_node="">3</span><span data-dcnode-id="3409" instrument_node="">. </span><span data-dcnode-id="3407" instrument_node="">Results</span></h2><section data-dcnode-id="3213" id="sec0060"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3400" id="sect0070"><span data-dcnode-id="3405" instrument_node="">3.1</span><span data-dcnode-id="3403" instrument_node="">. </span><span data-dcnode-id="3401" instrument_node="">The number and location of CES values</span></h3><div data-dcnode-id="3317"><p data-dcnode-id="3395" id="par0080"><span data-dcnode-id="3399" instrument_node="">The number of investigated items/respondents and the CES values obtained by the four selected methods are shown in </span><a class="workspace-trigger" data-dcnode-id="3397" href="#tbl0020" name="btbl0020"><span data-dcnode-id="3398" instrument_node="">Table 4</span></a><span data-dcnode-id="3396" instrument_node="">. Among the four approaches, document analysis has the most investigated items (1410), while its effective data rate (38.58%) and the number of CES value points are the lowest. Social media photograph analysis has the greatest number of valid items and CES value points. Regarding questionnaires, the effective data rate and average number of CES values per valid respondent are second, which are 98.08% and 5.72, respectively. Among the four methods, VEP has the lowest number of respondents, but the effective data rate is 100%; moreover, the average number of CES values per valid respondent, 82.92, is much larger than that based on the other methods. This higher average number indicates that the assessment of the park is more comprehensive and that the perceptions generated while visiting the park better translate into CES valuation.</span></p><div class="tables frame-topbot rowsep-0 colsep-0" data-dcnode-id="3318" id="tbl0020"><span class="captions" data-dcnode-id="3387"><span data-dcnode-id="3388" id="cap0035"><p data-dcnode-id="3389" id="spar0035"><span class="label" data-dcnode-id="3393"><span data-dcnode-id="3394" instrument_node="">Table 4</span></span><span data-dcnode-id="3392" instrument_node="">. </span><span data-dcnode-id="3390" instrument_node="">Quantitative information based on the four methods.</span></p></span></span><div class="groups" data-dcnode-id="3319"><table data-dcnode-id="3320"><thead class="valign-top" data-dcnode-id="3374"><tr class="rowsep-1" data-dcnode-id="3375"><th class="align-left" data-dcnode-id="3386" scope="col"></th><th class="align-left" data-dcnode-id="3384" scope="col"><span data-dcnode-id="3385" instrument_node="">No. investigated items/respondents</span></th><th class="align-left" data-dcnode-id="3382" scope="col"><span data-dcnode-id="3383" instrument_node="">No. valid items/respondents</span></th><th class="align-left" data-dcnode-id="3380" scope="col"><span data-dcnode-id="3381" instrument_node="">Effective data rate</span></th><th class="align-left" data-dcnode-id="3378" scope="col"><span data-dcnode-id="3379" instrument_node="">No. CES value points</span></th><th class="align-left" data-dcnode-id="3376" scope="col"><span data-dcnode-id="3377" instrument_node="">Average number of CES values per valid item/respondent</span></th></tr></thead><tbody data-dcnode-id="3321"><tr data-dcnode-id="3361"><th class="align-left" data-dcnode-id="3372" scope="row"><span data-dcnode-id="3373" instrument_node="">Document analysis</span></th><td class="align-left" data-dcnode-id="3370"><span data-dcnode-id="3371" instrument_node="">1410</span></td><td class="align-left" data-dcnode-id="3368"><span data-dcnode-id="3369" instrument_node="">544</span></td><td class="align-left" data-dcnode-id="3366"><span data-dcnode-id="3367" instrument_node="">38.58%</span></td><td class="align-left" data-dcnode-id="3364"><span data-dcnode-id="3365" instrument_node="">1005</span></td><td class="align-left" data-dcnode-id="3362"><span data-dcnode-id="3363" instrument_node="">1.85</span></td></tr><tr data-dcnode-id="3348"><th class="align-left" data-dcnode-id="3359" scope="row"><span data-dcnode-id="3360" instrument_node="">Social media photograph analysis</span></th><td class="align-left" data-dcnode-id="3357"><span data-dcnode-id="3358" instrument_node="">918</span></td><td class="align-left" data-dcnode-id="3355"><span data-dcnode-id="3356" instrument_node="">837</span></td><td class="align-left" data-dcnode-id="3353"><span data-dcnode-id="3354" instrument_node="">91.18%</span></td><td class="align-left" data-dcnode-id="3351"><span data-dcnode-id="3352" instrument_node="">3727</span></td><td class="align-left" data-dcnode-id="3349"><span data-dcnode-id="3350" instrument_node="">4.45</span></td></tr><tr data-dcnode-id="3335"><th class="align-left" data-dcnode-id="3346" scope="row"><span data-dcnode-id="3347" instrument_node="">Structured interviews</span></th><td class="align-left" data-dcnode-id="3344"><span data-dcnode-id="3345" instrument_node="">261</span></td><td class="align-left" data-dcnode-id="3342"><span data-dcnode-id="3343" instrument_node="">256</span></td><td class="align-left" data-dcnode-id="3340"><span data-dcnode-id="3341" instrument_node="">98.08%</span></td><td class="align-left" data-dcnode-id="3338"><span data-dcnode-id="3339" instrument_node="">1493</span></td><td class="align-left" data-dcnode-id="3336"><span data-dcnode-id="3337" instrument_node="">5.72</span></td></tr><tr data-dcnode-id="3322"><th class="align-left" data-dcnode-id="3333" scope="row"><span data-dcnode-id="3334" instrument_node="">Visitor-employed photography (VEP)</span></th><td class="align-left" data-dcnode-id="3331"><span data-dcnode-id="3332" instrument_node="">26</span></td><td class="align-left" data-dcnode-id="3329"><span data-dcnode-id="3330" instrument_node="">26</span></td><td class="align-left" data-dcnode-id="3327"><span data-dcnode-id="3328" instrument_node="">100%</span></td><td class="align-left" data-dcnode-id="3325"><span data-dcnode-id="3326" instrument_node="">2156</span></td><td class="align-left" data-dcnode-id="3323"><span data-dcnode-id="3324" instrument_node="">82.92</span></td></tr></tbody></table></div></div></div><div data-dcnode-id="3214"><p data-dcnode-id="3301" id="par0085"><a class="workspace-trigger" data-dcnode-id="3315" href="#fig0010" name="bfig0010"><span data-dcnode-id="3316" instrument_node="">Fig. 2</span></a><span data-dcnode-id="3314" instrument_node=""> provides density maps that show the location and number of the CES values based on the four methods. Their spatial patterns are dramatically different. </span><a class="workspace-trigger" data-dcnode-id="3312" href="#tbl0025" name="btbl0025"><span data-dcnode-id="3313" instrument_node="">Table 5</span></a><span data-dcnode-id="3311" instrument_node=""> also shows that among the data sets, all of the Jaccard indices are below 0.2, which means that the similarity of the four methods is low. The Jaccard index between two social media data acquisitions is the maximum (0.19). The CES values obtained by social media are mainly located in wetlands, the pit garden and the Wusong Fort Memorial Square (</span><a class="workspace-trigger" data-dcnode-id="3309" href="#fig0010" name="bfig0010"><span data-dcnode-id="3310" instrument_node="">Fig. 2</span></a><span data-dcnode-id="3308" instrument_node="">). Notably, the Jaccard index of data hotpots from two social media data acquisitions also reaches a maximum of 0.19, while the other Jaccard indices between data hotspots are all below 0.1 (</span><a class="workspace-trigger" data-dcnode-id="3306" href="#tbl0025" name="btbl0025"><span data-dcnode-id="3307" instrument_node="">Table 5</span></a><span data-dcnode-id="3305" instrument_node="">). This result means that among the pairwise comparisons of all of the methods, two data acquisitions from social media generate the most similar spatial patterns of CES value, especially in hotpots. In </span><a class="workspace-trigger" data-dcnode-id="3303" href="#fig0010" name="bfig0010"><span data-dcnode-id="3304" instrument_node="">Fig. 2</span></a><span data-dcnode-id="3302" instrument_node="">, the distribution of CES value points from structured interviews is obviously concentrated, and the opposite is the case for VEP. The spatial patterns of the two methods have minimum correlation and the smallest Jaccard index (0.09).</span></p><figure class="figure text-xs" data-dcnode-id="3276" id="fig0010"><span data-dcnode-id="3285"><img alt="Fig. 2" aria-describedby="cap0010" data-dcnode-id="3300" height="200" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1618866720307627-gr2.jpg&amp;raw"><span data-dcnode-id="3299" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="3286"><li data-dcnode-id="3293"><a class="anchor download-link u-font-sans" data-dcnode-id="3294" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&  (0.19)</span></td><td class="align-left" data-dcnode-id="3243"><span data-dcnode-id="3244" instrument_node="">1 (1)</span></td><td class="align-left" data-dcnode-id="3242"></td><td class="align-left" data-dcnode-id="3241"></td></tr><tr data-dcnode-id="3230"><th class="align-left" data-dcnode-id="3238" scope="row"><span data-dcnode-id="3239" instrument_node="">Structured interviews</span></th><td class="align-left" data-dcnode-id="3236"><span data-dcnode-id="3237" instrument_node="">0.14 (0)</span></td><td class="align-left" data-dcnode-id="3234"><span data-dcnode-id="3235" instrument_node="">0.11 (0)</span></td><td class="align-left" data-dcnode-id="3232"><span data-dcnode-id="3233" instrument_node="">1 (1)</span></td><td class="align-left" data-dcnode-id="3231"></td></tr><tr data-dcnode-id="3219"><th class="align-left" data-dcnode-id="3228" scope="row"><span data-dcnode-id="3229" instrument_node="">VEP</span></th><td class="align-left" data-dcnode-id="3226"><span data-dcnode-id="3227" instrument_node="">0.11 (0.04)</span></td><td class="align-left" data-dcnode-id="3224"><span data-dcnode-id="3225" instrument_node="">0.15 (0.08)</span></td><td class="align-left" data-dcnode-id="3222"><span data-dcnode-id="3223" instrument_node="">0.09 (0.03)</span></td><td class="align-left" data-dcnode-id="3220"><span data-dcnode-id="3221" instrument_node="">1 (1)</span></td></tr></tbody></table></div></div></div></section><section data-dcnode-id="2823" id="sec0065"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3207" id="sect0075"><span data-dcnode-id="3212" instrument_node="">3.2</span><span data-dcnode-id="3210" instrument_node="">. </span><span data-dcnode-id="3208" instrument_node="">The M-VI and spatial distribution of CES value</span></h3><div data-dcnode-id="2854"><p data-dcnode-id="3199" id="par0090"><span data-dcnode-id="3206" instrument_node="">The results of the average nearest neighbor analysis (</span><a class="workspace-trigger" data-dcnode-id="3204" href="#tbl0030" name="btbl0030"><span data-dcnode-id="3205" instrument_node="">Table 6</span></a><span data-dcnode-id="3203" instrument_node="">) show that the spatial distribution of all CES value types obtained by the four methods conforms to the clustering model (R &lt; 1), which indicates that the spatial distribution is suitable for further analysis. The M-VI is generated by normalizing the kernel density surface, weighted by the total amount of value allocated to each CES value type. It has a strong positive correlation with preferences and CES values. We sum and rank the M-VI of five CES values per method, and the results among the four methods vary. As shown in </span><a class="workspace-trigger" data-dcnode-id="3201" href="#tbl0035" name="btbl0035"><span data-dcnode-id="3202" instrument_node="">Table 7</span></a><span data-dcnode-id="3200" instrument_node="">, the total M-VI is larger for structured interviews than for the other methods (27), and there are two types of CES values that have the highest M-VI, namely, aesthetic (9.3) and therapeutic (2.9) values. Regarding social media photography analysis, the M-VI of both the educational and therapeutic values is 0, while the total M-VI, 21.5, is the second highest among the four methods; furthermore, the M-VI of historical value is the largest (8.0). The total M-VI generated by VEP is 18.1, which has an identical rank to structured interviews, but the M-VI values of most VEP types is lower than that of structured interviews, except for educational value. VEP has the maximum M-VI of educational value, 1.8, while the M-VI of this value type based on the other methods is 0 or near 0. In terms of document analysis, the M-VI of recreational value is obviously higher than the recreational value based on the other methods (9.2), while the M-VI of the other value types is very low; thus, the total M-VI based on document analysis is the lowest, only 16.2. As for the four methods, structured interviews and VEP can comprehensively assess each value type, and document analysis and social media photography analysis focus on the valuation of recreational value and historical value, respectively. By comparing the M-VI of each CES value, we find that aesthetic value is the most important value and that educational value is rarely evaluated under most methods.</span></p><div class="tables frame-topbot rowsep-0 colsep-0" data-dcnode-id="2940" id="tbl0030"><span class="captions" data-dcnode-id="3191"><span data-dcnode-id="3192" id="cap0045"><p data-dcnode-id="3193" id="spar0045"><span class="label" data-dcnode-id="3197"><span data-dcnode-id="3198" instrument_node="">Table 6</span></span><span data-dcnode-id="3196" instrument_node="">. </span><span data-dcnode-id="3194" instrument_node="">Results of the average nearest neighbor analysis.</span></p></span></span><div class="groups" data-dcnode-id="2941"><table data-dcnode-id="2942"><thead class="valign-top" data-dcnode-id="3174"><tr data-dcnode-id="3184"><th class="align-left rowsep-1 valign-middle" data-dcnode-id="3189" rowspan="2" scope="col"><span data-dcnode-id="3190" instrument_node="">Social value type</span></th><th class="align-left rowsep-1 valign-middle" data-dcnode-id="3187" rowspan="2" scope="col"><span data-dcnode-id="3188" instrument_node="">Data source type</span></th><th class="align-left rowsep-1" colspan="4" data-dcnode-id="3185" scope="col"><span data-dcnode-id="3186" instrument_node="">Performance indicators</span></th></tr><tr class="rowsep-1" data-dcnode-id="3175"><th class="align-left" data-dcnode-id="3182" scope="col"><span data-dcnode-id="3183" instrument_node="">Sample size</span></th><th class="align-left" data-dcnode-id="3180" scope="col"><span data-dcnode-id="3181" instrument_node="">R-ratio</span></th><th class="align-left" data-dcnode-id="3178" scope="col"><span data-dcnode-id="3179" instrument_node="">Z-score</span></th><th class="align-left" data-dcnode-id="3176" scope="col"><span data-dcnode-id="3177
