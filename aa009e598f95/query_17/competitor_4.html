</span><p class="author" data-dcnode-id="1497"><span data-dcnode-id="1502" instrument_node="">Written by Jane Foster and </span><a data-dcnode-id="1500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.planetware.com/carri-wilbanks-bio.htm"><span data-dcnode-id="1501" instrument_node="">Carri Wilbanks</span></a><br data-dcnode-id="1499"><span data-dcnode-id="1498" instrument_node="">Updated Mar 30, 2022</span></p><p class="dis" data-dcnode-id="1485"><span data-dcnode-id="1496" instrument_node="">We may earn a commission from affiliate </span><span data-dcnode-id="1486" style="white-space: nowrap"><span data-dcnode-id="1495" instrument_node="">links (</span><svg class="lnkout lnkoutdemo" data-dcnode-id="1488"><use data-dcnode-id="1489" xlink:href="#svglnkout"><svg data-dcnode-id="1490" fill="none" height="14" id="svglnkout" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="14"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" data-dcnode-id="1494"></path><polyline data-dcnode-id="1493" points="15 3 21 3 21 9"></polyline><line data-dcnode-id="1492" x1="10" x2="21" y1="14" y2="3"></line></svg></use></svg><span data-dcnode-id="1491" instrument_node="">

</span><span data-dcnode-id="1480" instrument_node="">
</span><p data-dcnode-id="1478"><span data-dcnode-id="1479" instrument_node="">Beautiful Corfu, the most northerly of the Ionian Islands, is easy on the eyes. Filled with natural beauty, the island boasts rolling green hills in its south, and rugged limestone rock formations in its north. It also has a mild climate, lush Mediterranean vegetation, and some stunning beaches and underwater caves and tunnels. As such, Corfu is a popular tourist destination with many things to do – tourism is the main source of revenue here.</span></p><span data-dcnode-id="1477" instrument_node="">
</span><span data-dcnode-id="1475" instrument_node="">
</span><span data-dcnode-id="1473" instrument_node="">
</span><p data-dcnode-id="1468"><span data-dcnode-id="1472" instrument_node="">The island also comes with its share of history. From 1386 to 1797, a period that gave it much of its most beautiful architecture, Corfu was held by the Venetians. Then, along with the rest of the Ionian Islands, it was under the British from 1815 to 1864. Corfu Airport lies five kilometers south of </span><a data-dcnode-id="1470" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.planetware.com/tourist-attractions-/corfu-town-gr-ion-kerkt.htm"><span data-dcnode-id="1471" instrument_node="">Corfu Town</span></a><span data-dcnode-id="1469" instrument_node="">. </span></p><span data-dcnode-id="1467" instrument_node="">
</span><span data-dcnode-id="1465" instrument_node="">
</span><span data-dcnode-id="1463" instrument_node="">
</span><p data-dcnode-id="1461"><span data-dcnode-id="1462" instrument_node="">Plan your trip and discover the best places to visit with our list of the top attractions on Corfu Island.</span></p><span data-dcnode-id="1460" instrument_node="">
</span><span data-dcnode-id="1458" instrument_node="">
</span><span data-dcnode-id="1456" instrument_node="">
</span><p data-dcnode-id="1453" style="font-style: italic; font-size: .9em;"><span data-dcnode-id="1454" instrument_node="">Note: Some businesses may be temporarily closed due to recent global health and safety issues.</span></p><span data-dcnode-id="1452" instrument_node="">
</span></div><span data-dcnode-id="1449" instrument_node="">
</span><div class="article_block site" data-dcnode-id="1387"><span data-dcnode-id="1448" instrument_node="">
</span><h2 class="sitename" data-dcnode-id="1446" id="GR-ION-KERKT"><span data-dcnode-id="1447" instrument_node="">1. Corfu Town</span></h2><span data-dcnode-id="1445" instrument_node="">
</span><span data-dcnode-id="1443" instrument_node="">
</span><span data-dcnode-id="1441" instrument_node="">
</span><p data-dcnode-id="1440"></p><figure class="wp-block-image is-resized" data-dcnode-id="1436"><img alt="Corfu Town" data-dcnode-id="1439" height="487" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.planetware.com/wpimages/2019/01/greece-corfu-island-top-attractions-corfu-town.jpg&amp;raw" width="730"><figcaption data-dcnode-id="1437"><span data-dcnode-id="1438" instrument_node="">Corfu Town</span></figcaption></figure><p data-dcnode-id="1435"></p><span data-dcnode-id="1434" instrument_node="">
</span><span data-dcnode-id="1432" instrument_node="">
</span><span data-dcnode-id="1430" instrument_node="">
</span><div class="site_desc" data-dcnode-id="1390"><span data-dcnode-id="1429" instrument_node="">
</span><p data-dcnode-id="1415"><span data-dcnode-id="1428" instrument_node="">The island's lovely capital, </span><a data-dcnode-id="1426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.planetware.com/tourist-attractions-/corfu-town-gr-ion-kerkt.htm"><span data-dcnode-id="1427" instrument_node="">Corfu Town</span></a><span data-dcnode-id="1425" instrument_node="">, is a warren of cobbled alleys and elegant Venetian-era buildings, many of which now host informal seafood tavernas and souvenir shops at ground level. Centering on the </span><strong data-dcnode-id="1423"><span data-dcnode-id="1424" instrument_node="">Esplanade</span></strong><span data-dcnode-id="1422" instrument_node="">, an expansive green square, the UNESCO-listed old town is guarded by two imposing 16th-century fortresses and also includes a number of churches, like the Church of St. Spyridon, which is easily recognized by its red-domed bell tower. The waterfront incorporates a port, with regular ferries to </span><strong data-dcnode-id="1420"><span data-dcnode-id="1421" instrument_node="">Igoumenitsa</span></strong><span data-dcnode-id="1419" instrument_node=""> on the Greek mainland, and daily excursion boats to neighboring </span><strong data-dcnode-id="1417"><span data-dcnode-id="1418" instrument_node="">Albania</span></strong><span data-dcnode-id="1416" instrument_node="">.</span></p><span data-dcnode-id="1414" instrument_node="">
</span><span data-dcnode-id="1412" instrument_node="">
</span><span data-dcnode-id="1410" instrument_node="">
</span><p data-dcnode-id="1396"><span data-dcnode-id="1409" instrument_node="">Accommodation: </span><a data-dcnode-id="1397" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.jdoqocy.com/click-2339553-10842362%3FURL%3Dhttp%253A%252F%252Fwww.tripadvisor.com%252FSmartDeals-g189458-Corfu_Ionian_Islands-Hotel-Deals.html%253Fcja%253D10842362%2526cjp%253D2339553%2526m%253D13092" onclick="ga('send', 'event', 'hotel inline', 'tripadvisor', 'http://www.jdoqocy.com/click-2339553-10842362?URL=http%3A%2F%2Fwww.tripadvisor.com%2FSmartDeals-g189458-Corfu_Ionian_Islands-Hotel-Deals.html%3Fcja%3D10842362%26cjp%3D2339553%26m%3D13092');" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="1408" instrument_node="">Where to Stay on Corfu </span><span data-dcnode-id="1399" style="white-space: nowrap"><span data-dcnode-id="1407" instrument_node="">Island</span><svg class="lnkout" data-dcnode-id="1400"><use data-dcnode-id="1401" xlink:href="#svglnkout"><svg data-dcnode-id="1402" fill="none" height="14" id="svglnkout" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="14"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" data-dcnode-id="1406"></path><polyline data-dcnode-id="1405" points="15 3 21 3 21 9"></polyline><line data-dcnode-id="1404" x1="10" x2="21" y1="14" y2="3"></line></svg></use></svg><span data-dcnode-id="1403" instrument_node="">
</span></span><span data-dcnode-id="1398" instrument_node=""> </span></a></p><span data-dcnode-id="1395" instrument_node="">

</span><h2 class="sitename" data-dcnode-id="1382" id="GR-ION-ACHI"><span data-dcnode-id="1383" instrument_node="">2. The Achilleion</span></h2><span data-dcnode-id="1381" instrument_node="">
</span><span data-dcnode-id="1379" instrument_node="">
</span><span data-dcnode-id="1377" instrument_node="">
</span><p data-dcnode-id="1376"></p><figure class="wp-block-image is-resized" data-dcnode-id="1372"><img alt="The Achilleion" data-dcnode-id="1375" height="487" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.planetware.com/photos-large/GR/greece-corfu-island-achilleion.jpg&amp;raw" width="730"><figcaption data-dcnode-id="1373"><span data-dcnode-id="1374" instrument_node="">The Achilleion</span></figcaption></figure><p data-dcnode-id="1371"></p><span data-dcnode-id="1370" instrument_node="">
</span><span data-dcnode-id="1368" instrument_node="">
</span><span data-dcnode-id="1366" instrument_node="">
</span><div class="site_desc" data-dcnode-id="1357"><span data-dcnode-id="1365" instrument_node="">
</span><p data-dcnode-id="1363"><span data-dcnode-id="1364" instrument_node="">Just outside the village of Gastouri, 10 kilometers southwest of Corfu Town, this white Neoclassical villa was the summer escape of Sisi, Empress Elisabeth of Austria (1837-1898). A lover of beauty, Sisi immersed herself in Greece's mythical history and lush nature. You can see inside the grandiose villa and explore the gardens, which are filled with towering palm trees and Neoclassical statues to give you some idea of the idyllic world Sisi was seeking.</span></p><span data-dcnode-id="1362" instrument_node="">
</span><span data-dcnode-id="1360" instrument_node="">
</span><span data-dcnode-id="1358" instrument_node="">
</span></div><span data-dcnode-id="1355" instrument_node="">
</span></div><span data-dcnode-id="1352" instrument_node="">
</span><div class="article_block site" data-dcnode-id="1311"><span data-dcnode-id="1351" instrument_node="">
</span><h2 class="sitename" data-dcnode-id="1349" id="GR-ION-KASS"><span data-dcnode-id="1350" instrument_node="">3. Kassiopi</span></h2><span data-dcnode-id="1348" instrument_node="">
</span><span data-dcnode-id="1346" instrument_node="">
</span><span data-dcnode-id="1344" instrument_node="">
</span><p data-dcnode-id="1343"></p><figure class="wp-block-image is-resized" data-dcnode-id="1339"><img alt="Kassiopi" data-dcnode-id="1342" height="487" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.planetware.com/photos-large/GR/greece-corfu-island-kassiopi.jpg&amp;raw" width="730"><figcaption data-dcnode-id="1340"><span data-dcnode-id="1341" instrument_node="">Kassiopi</span></figcaption></figure><p data-dcnode-id="1338"></p><span data-dcnode-id="1337" instrument_node="">
</span><span data-dcnode-id="1335" instrument_node="">
</span><span data-dcnode-id="1333" instrument_node="">
</span><div class="site_desc" data-dcnode-id="1314"><span data-dcnode-id="1332" instrument_node="">
</span><p data-dcnode-id="1327"><span data-dcnode-id="1331" instrument_node="">In the northeast of the island, 36 kilometers north of </span><strong data-dcnode-id="1329"><span data-dcnode-id="1330" instrument_node="">Corfu Town</span></strong><span data-dcnode-id="1328" instrument_node="">, this traditional fishing village has retained its character despite its popularity. Overlooking a pretty harbor filled with wooden fishing boats, it offers a choice of seafood tavernas and cafés, which are popular with affluent Brits and Italians, some of whom have villas here. Calm and unhurried, it is especially noted for its numerous small coves with white pebble beaches and amazing turquoise blue sea. </span></p><span data-dcnode-id="1326" instrument_node="">
</span><span data-dcnode-id="1324" instrument_node="">
</span><span data-dcnode-id="1322" instrument_node="">
</span><p data-dcnode-id="1320"><span data-dcnode-id="1321" instrument_node="">The best way to explore this stretch of coast is to hire a small boat. For amazing views hike up to the ruined Byzantine castle on the hillside behind the village.</span></p><span data-dcnode-id="1319" instrument_node="">
</span><span data-dcnode-id="1317" instrument_node="">
</span><span data-dcnode-id="1315" instrument_node="">
</span></div><span data-dcnode-id="1312" instrument_node="">
</span></div><span data-dcnode-id="1309" instrument_node="">
</span><div class="article_block site" data-dcnode-id="1275"><span data-dcnode-id="1308" instrument_node="">
</span><h2 class="sitename" data-dcnode-id="1306" id="GR-ION-15"><span data-dcnode-id="1307" instrument_node="">4. Paleokastritsa Beaches</span></h2><span data-dcnode-id="1305" instrument_node="">
</span><span data-dcnode-id="1303" instrument_node="">
</span><span data-dcnode-id="1301" instrument_node="">
</span><p data-dcnode-id="1300"></p><figure class="wp-block-image is-resized" data-dcnode-id="1296"><img alt="Paleokastritsa" data-dcnode-id="1299" height="449" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.planetware.com/wpimages/2019/01/greece-corfu-island-top-attractions-paleokastritsa-beaches.jpg&amp;raw" width="730"><figcaption data-dcnode-id="1297"><span data-dcnode-id="1298" instrument_node="">Paleokastritsa</span></figcaption></figure><p data-dcnode-id="1295"></p><span data-dcnode-id="1294" instrument_node="">
</span><span data-dcnode-id="1292" instrument_node="">
</span><span data-dcnode-id="1290" instrument_node="">
</span><div class="site_desc" data-dcnode-id="1278"><span data-dcnode-id="1289" instrument_node="">
</span><p data-dcnode-id="1284"><span data-dcnode-id="1288" instrument_node="">On the west coast, 25 kilometers northwest of </span><strong data-dcnode-id="1286"><span data-dcnode-id="1287" instrument_node="">Corfu Town</span></strong><span data-dcnode-id="1285" instrument_node="">, Paleokastritsa encompasses a glorious stretch of indented coast, with six deep, curving bays sheltering lovely beaches, both of sand and pebble, extending to a crystal-clear, blue sea. It's popular with day trippers, so it does get busy in peak season. In the hills rising above the coast, you'll find another attraction – a 13th-century monastery with a courtyard garden, church, and small museum.</span></p><span data-dcnode-id="1283" instrument_node="">
</span><span data-dcnode-id="1281" instrument_node="">
</span><span data-dcnode-id="1279" instrument_node="">
</span></div><span data-dcnode-id="1276" instrument_node="">
</span></div><span data-dcnode-id="1273" instrument_node="">
</span><div class="article_block site" data-dcnode-id="1236"><span data-dcnode-id="1272" instrument_node="">
</span><h2 class="sitename" data-dcnode-id="1270" id="GR-ION-16"><span data-dcnode-id="1271" instrument_node="">5. Glyfada</span></h2><span data-dcnode-id="1269" instrument_node="">
</span><span data-dcnode-id="1267" instrument_node="">
</span><span data-dcnode-id="1265" instrument_node="">
</span><p data-dcnode-id="1264"></p><figure class="wp-block-image is-resized" data-dcnode-id="1260"><img alt="Glyfada Beach" data-dcnode-id="1263" height="488" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.planetware.com/wpimages/2019/01/greece-corfu-island-top-attractions-glyfada.jpg&amp;raw" width="730"><figcaption data-dcnode-id="1261"><span data-dcnode-id="1262" instrument_node="">Glyfada Beach</span></figcaption></figure><p data-dcnode-id="1259"></p><span data-dcnode-id="1258" instrument_node="">
</span><span data-dcnode-id="1256" instrument_node="">
</span><span data-dcnode-id="1254" instrument_node="">
</span><div class="site_desc" data-dcnode-id="1239"><span data-dcnode-id="1253" instrument_node="">
</span><p data-dcnode-id="1245"><span data-dcnode-id="1252" instrument_node="">Considered by many to be the very best beach on the island, Glyfada also lies on Corfu's west coast, 26 kilometers west of </span><strong data-dcnode-id="1250"><span data-dcnode-id="1251" instrument_node="">Corfu Town</span></strong><span data-dcnode-id="1249" instrument_node=""> and two kilometers south of the village of </span><strong data-dcnode-id="1247"><span data-dcnode-id="1248" instrument_node="">Pelekas</span></strong><span data-dcnode-id="1246" instrument_node="">. A blissful, long stretch of fine golden sand beach, it's lined with sunbeds and umbrellas and backed by hillsides covered with pine woods and olive groves. A couple of big hotels and apartments are in the area, and tourists will also find tavernas, cafés, and water sports facilities, including jet skis, pedal boats, and banana boat rides. Facing west, it has amazing sunsets but does get very busy in summer, especially in August.</span></p><span data-dcnode-id="1244" instrument_node="">
</span><span data-dcnode-id="1242" instrument_node="">
</span><span data-dcnode-id="1240" instrument_node="">
</span></div><span data-dcnode-id="1237" instrument_node="">
</span></div><span data-dcnode-id="1234" instrument_node="">
</span><div class="article_block site" data-dcnode-id="1200"><span data-dcnode-id="1233" instrument_node="">
</span><h2 class="sitename" data-dcnode-id="1231"><span data-dcnode-id="1232" instrument_node="">6. Canal d'Amour</span></h2><span data-dcnode-id="1230" instrument_node="">
</span><span data-dcnode-id="1228" instrument_node="">
</span><span data-dcnode-id="1226" instrument_node="">
</span><p data-dcnode-id="1225"></p><figure class="wp-block-image is-resized" data-dcnode-id="1221"><img alt="Aerial view of Canal d'Amour" data-dcnode-id="1224" height="511" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.planetware.com/wpimages/2019/01/greece-corfu-island-top-attractions-canal-damour.jpg&amp;raw" width="730"><figcaption data-dcnode-id="1222"><span data-dcnode-id="1223" instrument_node="">Aerial view of Canal d'Amour </span></figcaption></figure><p data-dcnode-id="1220"></p><span data-dcnode-id="1219" instrument_node="">
</span><span data-dcnode-id="1217" instrument_node="">
</span><span data-dcnode-id="1215" instrument_node="">
</span><div class="site_desc" data-dcnode-id="1203"><span data-dcnode-id="1214" instrument_node="">
</span><p data-dcnode-id="1209"><span data-dcnode-id="1213" instrument_node="">On Corfu's northwestern tip, about a 20-minute walk from the equally intriguing small village of </span><strong data-dcnode-id="1211"><span data-dcnode-id="1212" instrument_node="">Sidari</span></strong><span data-dcnode-id="1210" instrument_node="">, the Canal d'Amour is one of Corfu's top natural wonders. It boasts impressive sandstone rock formations that create a natural passage from its small beach into the Ionian Sea's sparkling blue waters. You can jump off rocks into the warm, salty sea and then swim through tunnels and caves for awesome, fishy underwater explorations - snorkeling equipment can be rented at the beach where there are also sun-loungers and umbrellas for hire.   </span></p><span data-dcnode-id="1208" instrument_node="">
</span><span data-dcnode-id="1206" instrument_node="">
</span><span data-dcnode-id="1204" instrument_node="">
</span></div><span data-dcnode-id="1201" instrument_node="">
</span></div><span data-dcnode-id="1198" instrument_node="">
</span><div class="article_block site" data-dcnode-id="1164"><span data-dcnode-id="1197" instrument_node="">
</span><h2 class="sitename" data-dcnode-id="1195"><span data-dcnode-id="1196" instrument_node="">7. La Grotta Beach</span></h2><span data-dcnode-id="1194" instrument_node="">
</span><span data-dcnode-id="1192" instrument_node="">
</span><span data-dcnode-id="1190" instrument_node="">
</span><p data-dcnode-id="1189"></p><figure class="wp-block-image is-resized" data-dcnode-id="1185"><img alt="Leaping off the diving board at La Grotta Beach" data-dcnode-id="1188" height="410" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.planetware.com/wpimages/2019/01/greece-corfu-island-top-attractions-la-grotta-beach.jpg&amp;raw" width="730"><figcaption data-dcnode-id="1186"><span data-dcnode-id="1187" instrument_node="">Leaping off the diving board at La Grotta Beach</span></figcaption></figure><p data-dcnode-id="1184"></p><span data-dcnode-id="1183" instrument_node="">
</span><span data-dcnode-id="1181" instrument_node="">
</span><span data-dcnode-id="1179" instrument_node="">
</span><div class="site_desc" data-dcnode-id="1167"><span data-dcnode-id="1178" instrument_node="">
</span><p data-dcnode-id="1173"><span data-dcnode-id="1177" instrument_node="">La Grotta Beach in </span><strong data-dcnode-id="1175"><span data-dcnode-id="1176" instrument_node="">Paleokastrttsa</span></strong><span data-dcnode-id="1174" instrument_node=""> is on Corfu's west coast and is another one of the island's most stunning beaches. The beach itself is small and rocky, but head into the clear blue waters, and you'll find an underwater world filled with colorful fish. The beach also boasts a diving board and a jump rock from which you can leap into the sea below. The beach gets crowded in the summer, but there are some rocks you can also stretch out on in the vicinity.    </span></p><span data-dcnode-id="1172" instrument_node="">
</span><span data-dcnode-id="1170" instrument_node="">
</span><span data-dcnode-id="1168" instrument_node="">
</span></div><span data-dcnode-id="1165" instrument_node="">
</span></div><span data-dcnode-id="1162" instrument_node="">
</span><div class="article_block site" data-dcnode-id="1118"><span data-dcnode-id="1161" instrument_node="">
</span><h2 class="sitename" data-dcnode-id="1159" id="GR-ION-17"><span data-dcnode-id="1160" instrument_node="">8. Mount Pantokrator</span></h2><span data-dcnode-id="1158" instrument_node="">
</span><span data-dcnode-id="1156" instrument_node="">
</span><span data-dcnode-id="1154" instrument_node="">
</span><p data-dcnode-id="1153"></p><figure class="wp-block-image is-resized" data-dcnode-id="1149"><img alt="Mount Pantokrator" data-dcnode-id="1152" height="488" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.planetware.com/photos-large/GR/greece-corfu-island-mount-pantokrator.jpg&amp;raw" width="730"><figcaption data-dcnode-id="1150"><span data-dcnode-id="1151" instrument_node="">Mount Pantokrator</span></figcaption></figure><p data-dcnode-id="1148"></p><span data-dcnode-id="1147" instrument_node="">
</span><span data-dcnode-id="1145" instrument_node="">
</span><span data-dcnode-id="1143" instrument_node="">
</span><div class="site_desc" data-dcnode-id="1121"><span data-dcnode-id="1142" instrument_node="">
</span><p data-dcnode-id="1140"><span data-dcnode-id="1141" instrument_node="">In the north of Corfu, the highest point on the island, Mount Pantokrator rises 906 meters. A road leads all the way to the top, so you can drive up, though some people prefer to hike from the village of Perithia (the walking time is approximately two hours). </span></p><span data-dcnode-id="1139" instrument_node="">
</span><span data-dcnode-id="1137" instrument_node="">
</span><span data-dcnode-id="1135" instrument_node="">
</span><p data-dcnode-id="1127"><span data-dcnode-id="1134" instrument_node="">At the top, the </span><strong data-dcnode-id="1132"><span data-dcnode-id="1133" instrument_node="">Pantokrator Monastery </span></strong><span data-dcnode-id="1131" instrument_node="">dates back to the 14th century, though its present appearance is mainly from the 19th century. The views from the summit are stunning, with Albania to the east, the Diapontia islands (Mathraki, Erracusa, and Othondi) to the north, and the islands of </span><strong data-dcnode-id="1129"><span data-dcnode-id="1130" instrument_node="">Paxos</span></strong><span data-dcnode-id="1128" instrument_node=""> and Anti Paxos to the south. On a clear day, you can even see the southern tip of Italy some 130 kilometers away.</span></p><span data-dcnode-id="1126" instrument_node="">
</span><span data-dcnode-id="1124" instrument_node="">
</span><span data-dcnode-id="1122" instrument_node="">
</span></div><span data-dcnode-id="1119" instrument_node="">
</span></div><span data-dcnode-id="1116" instrument_node="">
</span><div class="article_block site" data-dcnode-id="1073"><span data-dcnode-id="1115" instrument_node="">
</span><h2 class="sitename" data-dcnode-id="1113"><span data-dcnode-id="1114" instrument_node="">9. Corfu Donkey Rescue</span></h2><span data-dcnode-id="1112" instrument_node="">
</span><span data-dcnode-id="1110" instrument_node="">
</span><span data-dcnode-id="1108" instrument_node="">
</span><p data-dcnode-id="1107"></p><figure class="wp-block-image is-resized" data-dcnode-id="1103"><img alt="Feeding a donkey at Corfu Donkey Rescue" data-dcnode-id="1106" height="548" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.planetware.com/wpimages/2019/01/greece-corfu-island-top-attractions-corfu-donkey-rescue.jpg&amp;raw" width="730"><figcaption data-dcnode-id="1104"><span data-dcnode-id="1105" instrument_node="">Feeding a donkey at Corfu Donkey Rescue</span></figcaption></figure><p data-dcnode-id="1102"></p><span data-dcnode-id="1101" instrument_node="">
</span><span data-dcnode-id="1099" instrument_node="">
</span><span data-dcnode-id="1097" instrument_node="">
</span><div class="site_desc" data-dcnode-id="1076"><span data-dcnode-id="1096" instrument_node="">
</span><p data-dcnode-id="1091"><span data-dcnode-id="1095" instrument_node="">The Corfu Donkey Rescue in </span><strong data-dcnode-id="1093"><span data-dcnode-id="1094" instrument_node="">Paleokastrttsa</span></strong><span data-dcnode-id="1092" instrument_node=""> is well worth a visit for animal lovers. One of the top things to do on this part of the island, it offers refuge to homeless donkeys that have been abandoned or need a safe place to live out their retirement years (donkey's used to be an integral means of transport and work aid in Corfu). The sanctuary is located on a beautiful piece of land filled with olive trees and a mountainous backdrop, and visitors can hang out with the donkeys daily between 10am and 5pm. There is no entrance fee, but a donation is greatly appreciated as this is a charity organization.</span></p><span data-dcnode-id="1090" instrument_node="">
</span><span data-dcnode-id="1088" instrument_node="">
</span><span data-dcnode-id="1086" instrument_node="">
</span><p data-dcnode-id="1082"><span data-dcnode-id="1085" instrument_node="">Official Site: </span><a data-dcnode-id="1083" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.corfu-donkeys.com/" onclick="ga('send', 'event', 'externalsite inline', 'site', 'http://www.corfu-donkeys.com');" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="1084" instrument_node="">www.corfu-donkeys.com</span></a></p><span data-dcnode-id="1081" instrument_node="">
</span><span data-dcnode-id="1079" instrument_node="">
</span><span data-dcnode-id="1077" instrument_node="">
</span></div><span data-dcnode-id="1074" instrument_node="">
</span></div><span data-dcnode-id="1071" instrument_node="">
</span><div class="article_block site" data-dcnode-id="1021"><span data-dcnode-id="1070" instrument_node="">
</span><h2 class="sitename" data-dcnode-id="1068" id="GR-ION-CGCC"><span data-dcnode-id="1069" instrument_node="">10. Corfu Golf Club</span></h2><span data-dcnode-id="1067" instrument_node="">
</span><span data-dcnode-id="1065" instrument_node="">
</span><span data-dcnode-id="1063" instrument_node="">
</span><p data-dcnode-id="1062"></p><figure class="wp-block-image size-large" data-dcnode-id="1058"><img alt="Aerial view of Corfu Golf Club" class="wpimg" data-dcnode-id="1061" height="487" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.planetware.com/wpimages/2022/03/greece-corfu-island-top-attractions-corfu-golf-club-aerial.jpg&amp;raw" width="730"><figcaption data-dcnode-id="1059"><span data-dcnode-id="1060" instrument_node="">Aerial view of Corfu Golf Club</span></figcaption></figure><p data-dcnode-id="1057"></p><span data-dcnode-id="1056" instrument_node="">
</span><span data-dcnode-id="1054" instrument_node="">
</span><span data-dcnode-id="1052" instrument_node="">
</span><div class="site_desc" data-dcnode-id="1024"><span data-dcnode-id="1051" instrument_node="">
</span><p data-dcnode-id="1046"><span data-dcnode-id="1050" instrument_node="">In the Ropa Valley, 17 kilometers from </span><strong data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node="">Corfu Town</span></strong><span data-dcnode-id="1047" instrument_node="">, this beautifully landscaped 18-hole golf course was designed by Swiss architect Donald Harradine. It incorporates natural elements such as the River Nafsika, as well as several lakes and meandering streams and is popular with both beginner and advanced players. From March to November, it enjoys warm sunshine and blue skies, plus a cool sea breeze. It is open daily and has golf clubs for hire.</span></p><span data-dcnode-id="1045" instrument_node="">
</span><span data-dcnode-id="1043" instrument_node="">
</span><span data-dcnode-id="1041" instrument_node="">
</span><p class="nospc" data-dcnode-id="1039"><span data-dcnode-id="1040" instrument_node="">Address: Ropa Valley, Corfu 49100</span></p><span data-dcnode-id="1038" instrument_node="">
</span><span data-dcnode-id="1036" instrument_node="">
</span><span data-dcnode-id="1034" instrument_node="">
</span><p data-dcnode-id="1030"><span data-dcnode-id="1033" instrument_node="">Official site: </span><a data-dcnode-id="1031" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.corfugolfclub.com/" onclick="ga('send', 'event', 'externalsite inline', 'site', 'http://www.corfugolfclub.com');" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="1032" instrument_node="">www.corfugolfclub.com</span></a></p><span data-dcnode-id="1029" instrument_node="">
</span><span data-dcnode-id="1027" instrument_node="">
</span><span data-dcnode-id="1025" instrument_node="">
</span></div><span data-dcnode-id="1022" instrument_node="">
</span></div><span data-dcnode-id="1019" instrument_node="">
</span><div class="article_block site" data-dcnode-id="967"><span data-dcnode-id="1018" instrument_node="">
</span><h2 class="sitename" data-dcnode-id="1016"><span data-dcnode-id="1017" instrument_node="">11. Angelokastro</span></h2><span data-dcnode-id="1015" instrument_node="">
</span><span data-dcnode-id="1013" instrument_node="">
</span><span data-dcnode-id="1011" instrument_node="">
</span><p data-dcnode-id="1010"></p><figure class="wp-block-image size-large" data-dcnode-id="1006"><img alt="Angelokastro" class="wpimg" data-dcnode-id="1009" height="486" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.planetware.com/wpimages/2022/03/greece-corfu-island-top-attractions-angelokastro.jpg&amp;raw" width="730"><figcaption data-dcnode-id="1007"><span data-dcnode-id="1008" instrument_node="">Angelokastro</span></figcaption></figure><p data-dcnode-id="1005"></p><span data-dcnode-id="1004" instrument_node="">
</span><span data-dcnode-id="1002" instrument_node="">
</span><span data-dcnode-id="1000" instrument_node="">
</span><div class="site_desc" data-dcnode-id="970"><span data-dcnode-id="999" instrument_node="">
</span><p data-dcnode-id="997"><span data-dcnode-id="998" instrument_node="">Located on the side of a steep cliff on Corfu's highest peak, Angelokastro is a 13th-century Byzantine castle. On the island's northwest coast near Palaiokastritsa, it was constructed on rocky and hard-to-access terrain as a protection measure. </span></p><span data-dcnode-id="996" instrument_node="">
</span><span data-dcnode-id="994" instrument_node="">
</span><span data-dcnode-id="992" instrument_node="">
</span><p data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">Along with Kassiopi and Gardiki castles, it served as a defensive triangle that provided occupants views in all directions. During the centuries in which it was in operation, it played a key role in defending Corfu against pirate attacks, as well as during three Ottoman sieges, and it never fell.</span></p><span data-dcnode-id="989" instrument_node="">
</span><span data-dcnode-id="987" instrument_node="">
</span><span data-dcnode-id="985" instrument_node="">
</span><p data-dcnode-id="983"><span data-dcnode-id="984" instrument_node="">Today only ruins remain, including a small church, an underground chapel, and the original walls. It is worth hiking up to Angelokastro for the views of Corfu Town, the sea, and the Greek mainland to the southeast. There is a 3 euro entrance fee. </span></p><span data-dcnode-id="982" instrument_node="">
</span><span data-dcnode-id="980" instrument_node="">
</span><span data-dcnode-id="978" instrument_node="">
</span><p data-dcnode-id="976"><span data-dcnode-id="977" instrument_node="">Note that to reach the castle, it is a steep and rocky climb from the parking lot, so you will need to be in decent shape.  </span></p><span data-dcnode-id="975" instrument_node="">
</span><span data-dcnode-id="973" instrument_node="">
</span><span data-dcnode-id="971" instrument_node="">
</span></div><span data-dcnode-id="968" instrument_node="">
</span></div><span data-dcnode-id="965" instrument_node="">
</span><div class="article_block site" data-dcnode-id="911"><span data-dcnode-id="964" instrument_node="">
</span><h2 class="sitename" data-dcnode-id="962"><span data-dcnode-id="963" instrument_node="">12. Corfu Museum of Asian Art</span></h2><span data-dcnode-id="961" instrument_node="">
</span><span data-dcnode-id="959" instrument_node="">
</span><span data-dcnode-id="957" instrument_node="">
</span><p data-dcnode-id="956"></p><figure class="wp-block-image size-large" data-dcnode-id="952"><img alt="Palace of St. Michael and St. George, housing Corfu’s Museum of Asian Art" class="wpimg" data-dcnode-id="955" height="366" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.planetware.com/wpimages/2022/03/greece-corfu-island-top-attractions-corfu-museum-of-asian-art.jpg&amp;raw" width="730"><figcaption data-dcnode-id="953"><span data-dcnode-id="954" instrument_node="">Palace of St. Michael and St. George, housing Corfu's Museum of Asian Art</span></figcaption></figure><p data-dcnode-id="951"></p><span data-dcnode-id="950" instrument_node="">
</span><span data-dcnode-id="948" instrument_node="">
</span><span data-dcnode-id="946" instrument_node="">
</span><div class="site_desc" data-dcnode-id="914"><span data-dcnode-id="945" instrument_node="">
</span><p data-dcnode-id="943"><span data-dcnode-id="944" instrument_node="">In the Palace of St. Michael and St. George, Corfu's Museum of Asian Art is also worth exploring. It is the only museum in Greece devoted solely to art and antiquities from around the Asian continent.</span></p><span data-dcnode-id="942" instrument_node="">
</span><span data-dcnode-id="940" instrument_node="">
</span><span data-dcnode-id="938" instrument_node="">
</span><p data-dcnode-id="936"><span data-dcnode-id="937" instrument_node="">Founded in 1928 as the Museum of Sino-Japanese Art, it has evolved to host collections comprising of around 15,000 works of art from across Asia. There are works from India, Pakistan, Thailand, and Tibet among other countries. It has a number of rare pieces and is also known for its international and rotating exhibits.</span></p><span data-dcnode-id="935" instrument_node="">
</span><span data-dcnode-id="933" instrument_node="">

</span><ul data-dcnode-id="733"><li data-dcnode-id="750"><strong data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">Small Group Tour of Corfu</span></strong><span data-dcnode-id="763" instrument_node="">: If you don't have a lot of time to explore Corfu and want to make sure you don't miss anything around the island check out this </span><a data-dcnode-id="752" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.viator.com/tours/Corfu/Shore-Excursion-Leisurely-Small-Group-Tour-of-Corfu/d4279-21019P2%3Feap%3Dplanetware-tours-14254%26aid%3Dvba14254en" onclick="ga('send', 'event', 'viator inline direct', 'site', 'https://www.viator.com/tours/Corfu/Shore-Excursion-Leisurely-Small-Group-Tour-of-Corfu/d4279-21019P2?eap=planetware-tours-14254&amp;aid=vba14254en');" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="762" instrument_node="">Small-Group Tour of </span><span data-dcnode-id="753" style="white-space: nowrap"><span data-dcnode-id="761" instrument_node="">Corfu</span><svg class="lnkout" data-dcnode-id="754"><use data-dcnode-id="755" xlink:href="#svglnkout"><svg data-dcnode-id="756" fill="none" height="14" id="svglnkout" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="14"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" data-dcnode-id="760"></path><polyline data-dcnode-id="759" points="15 3 21 3 21 9"></polyline><line data-dcnode-id="758" x1="10" x2="21" y1="14" y2="3"></line></svg></use></svg><span data-dcnode-id="757" instrument_node="">

</span><p data-dcnode-id="689"><img alt="image" class="thumb" data-dcnode-id="701" height="200" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.planetware.com/photos-tiles/greece-santorini-fira-view-out-to-sea.jpg&amp;raw" width="300"><strong data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">Greek Islands</span></strong><span data-dcnode-id="698" instrument_node="">: Greece is home to some 6,000 islands, including Corfu, and you could easily spend months just island hopping from one to another without getting bored. One of the most famous </span><a data-dcnode-id="696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.planetware.com/greece/15-top-rated-greek-islands-gr-zzz-11.htm"><span data-dcnode-id="697" instrument_node="">Greek islands</span></a><span data-dcnode-id="695" instrument_node=""> is Santorini, which is known for its dramatic architecture, views, and outstanding cliffside resorts. For more on exploring this special place, see our articles on </span><a data-dcnode-id="693" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.planetware.com/greece/where-to-stay-in-santorini-best-areas-hotels-gr-1-7.htm"><span data-dcnode-id="694" instrument_node="">Where to Stay on Santorini: Best Areas &amp; Hotels</span></a><span data-dcnode-id="692" instrument_node="">, and for things to do, our piece on </span><a data-dcnode-id="690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.planetware.com/greece/santorini-gr-aeg-santo.htm"><span data-dcnode-id="691" instrument_node="">Top-Rated Tourist Attractions on Santorini.</span></a></p><span data-dcnode-id="688" instrument_node="">
