 class="sw swp_email_icon" data-dcnode-id="1107"></i><span class="swp_share" data-dcnode-id="1105"><span data-dcnode-id="1106" instrument_node="">Email</span></span></span></span></span></a></div></div><h2 data-dcnode-id="1096"><strong data-dcnode-id="1097"><span data-dcnode-id="1098" instrument_node="">Visit Kona Historical Sites in Downtown Kailua-Kona</span></strong></h2><span data-dcnode-id="1095" instrument_node="">
</span><p data-dcnode-id="1093"><span data-dcnode-id="1094" instrument_node="">The main destination and home base for visitors to the Big Island is the historic village of Kailua-Kona. A cultural hotspot for tourist-oriented activities, dining, and shopping, the town represents classic Hawaii like no other, and the historical significance of the area simply can’t be missed.
</span></p><p data-dcnode-id="1090"><img alt="Cultural Festival at Hulihe'e Palace - a Kona Historical Site" class="aligncenter wp-image-16901 size-full" data-dcnode-id="1092" height="540" sizes="(max-width: 950px) 100vw, 950px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bigislandguide.com/wp-content/uploads/2018/04/kokua-kailua-hulihee-palace.jpg&amp;raw" srcset="https://bigislandguide.com/wp-content/uploads/2018/04/kokua-kailua-hulihee-palace.jpg 950w, https://bigislandguide.com/wp-content/uploads/2018/04/kokua-kailua-hulihee-palace-300x171.jpg 300w, https://bigislandguide.com/wp-content/uploads/2018/04/kokua-kailua-hulihee-palace-768x437.jpg 768w" width="950"><span data-dcnode-id="1091" instrument_node="">
</span></p><p data-dcnode-id="1088"><span data-dcnode-id="1089" instrument_node="">Home to numerous Hawaiian structures, the village is easily walkable and offers plenty of attractions for families to enjoy. For those trying to maximize their experience in Kailua-Kona, the following destinations will make for an entertaining and enlightening journey through the historic village along the Big Island’s western side.
</span></p><p data-dcnode-id="1085"><img alt="Overview of Historic Downtown Kailua Kona" class="aligncenter wp-image-11237 size-full" data-dcnode-id="1087" height="540" sizes="(max-width: 950px) 100vw, 950px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bigislandguide.com/wp-content/uploads/2018/02/kailua-bay-kona-from-air-1.jpg&amp;raw" srcset="https://bigislandguide.com/wp-content/uploads/2018/02/kailua-bay-kona-from-air-1.jpg 950w, https://bigislandguide.com/wp-content/uploads/2018/02/kailua-bay-kona-from-air-1-300x171.jpg 300w, https://bigislandguide.com/wp-content/uploads/2018/02/kailua-bay-kona-from-air-1-768x437.jpg 768w" width="950"><span data-dcnode-id="1086" instrument_node="">
</span></p><h3 data-dcnode-id="1082"><strong data-dcnode-id="1083"><span data-dcnode-id="1084" instrument_node="">Hulihe’e Palace</span></strong></h3><span data-dcnode-id="1081" instrument_node="">
</span><p data-dcnode-id="1079"><span data-dcnode-id="1080" instrument_node="">A former vacation residence for Hawaiian royalty, the Hulihe’e Palace today offers exhibits of Hawaiian furniture and artifacts from the era of the kings. Located along Ali’i Drive, it’s hard to miss – plantation-style architecture and a lovely contrast of beige and teal, as well as stunningly well-maintained landscaping right on the waterfront, make for a sight to behold.
</span></p><p data-dcnode-id="1075"><img alt="Hulihe'e Palace - Kona Historical Sites in Downtown Kailua-Kona" class="aligncenter wp-image-11231 size-full" data-dcnode-id="1078" height="540" sizes="(max-width: 950px) 100vw, 950px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bigislandguide.com/wp-content/uploads/2018/02/hulihee-palace-kona-1.jpg&amp;raw" srcset="https://bigislandguide.com/wp-content/uploads/2018/02/hulihee-palace-kona-1.jpg 950w, https://bigislandguide.com/wp-content/uploads/2018/02/hulihee-palace-kona-1-300x171.jpg 300w, https://bigislandguide.com/wp-content/uploads/2018/02/hulihee-palace-kona-1-768x437.jpg 768w" width="950"><br data-dcnode-id="1077"><span data-dcnode-id="1076" instrument_node="">
Originally built by a governor of Hawaii, the property was sold to King Kalakaua in the late 19th century. It became a National Register of Historic Places Property in 1973 and has been preserved by the Daughters of Hawaii ever since.
</span></p><p data-dcnode-id="1072"><img alt="Dancers on the back lawn of Hulihe'e Palace - Kona Historical Sites" class="aligncenter wp-image-10003 size-full" data-dcnode-id="1074" height="540" sizes="(max-width: 950px) 100vw, 950px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bigislandguide.com/wp-content/uploads/2018/02/hulihee-palace-dancers-kona-hawaii.jpg&amp;raw" srcset="https://bigislandguide.com/wp-content/uploads/2018/02/hulihee-palace-dancers-kona-hawaii.jpg 950w, https://bigislandguide.com/wp-content/uploads/2018/02/hulihee-palace-dancers-kona-hawaii-300x171.jpg 300w, https://bigislandguide.com/wp-content/uploads/2018/02/hulihee-palace-dancers-kona-hawaii-768x437.jpg 768w" width="950"><span data-dcnode-id="1073" instrument_node="">
</span></p><h3 data-dcnode-id="1069"><strong data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">Moku’aikaua Church</span></strong></h3><span data-dcnode-id="1068" instrument_node="">
</span><p data-dcnode-id="1066"><span data-dcnode-id="1067" instrument_node="">The oldest church in the Hawaiian Islands, Moku’aikaua Church was founded in 1820 by American Christian Missionaries, but after several fires, the stone structure still seen today was constructed.
</span></p><p data-dcnode-id="1063"><img alt="Moku'aikaua Church - a Kona Historical Site established in 1820" class="aligncenter wp-image-12679 size-full" data-dcnode-id="1065" height="540" sizes="(max-width: 950px) 100vw, 950px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bigislandguide.com/wp-content/uploads/2018/02/mokuaikaua-church-kona.jpg&amp;raw" srcset="https://bigislandguide.com/wp-content/uploads/2018/02/mokuaikaua-church-kona.jpg 950w, https://bigislandguide.com/wp-content/uploads/2018/02/mokuaikaua-church-kona-300x171.jpg 300w, https://bigislandguide.com/wp-content/uploads/2018/02/mokuaikaua-church-kona-768x437.jpg 768w" width="950"><span data-dcnode-id="1064" instrument_node="">
</span></p><p data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">The interior is decorated with Koa wood from the Big Island’s lush rainforests and remains a beautiful, free exhibit with weekly Sunday service to all who wish to experience the beauty of this historic structure in the heart of Kailua-Kona.
</span></p><p data-dcnode-id="1058"><img alt="Kona Historical Site - Moku'aikaua Church" class="aligncenter wp-image-11324 size-full" data-dcnode-id="1060" height="540" sizes="(max-width: 950px) 100vw, 950px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bigislandguide.com/wp-content/uploads/2018/02/mokuaikaua-church-kona-hawaii-1-1.jpg&amp;raw" srcset="https://bigislandguide.com/wp-content/uploads/2018/02/mokuaikaua-church-kona-hawaii-1-1.jpg 950w, https://bigislandguide.com/wp-content/uploads/2018/02/mokuaikaua-church-kona-hawaii-1-1-300x171.jpg 300w, https://bigislandguide.com/wp-content/uploads/2018/02/mokuaikaua-church-kona-hawaii-1-1-768x437.jpg 768w" width="950"><span data-dcnode-id="1059" instrument_node="">
</span></p><h3 data-dcnode-id="1055"><strong data-dcnode-id="1056"><span data-dcnode-id="1057" instrument_node="">Kamakahonu and Anu’ena Heiau</span></strong></h3><span data-dcnode-id="1054" instrument_node="">
</span><p data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">Heiau is a common Hawaiian term for a sacred temple, offerings were given for blessings in such things as health, farming and fishing, and prayers for various outcomes such as rain, fertility, peace, success for voyagers, and success in war. Two of the most remarkable Heiaus are located in Kailua-Kona in Kamakahonu and Anu’ena Heiaus.
</span></p><p data-dcnode-id="1049"><img alt="" class="aligncenter size-full wp-image-17795" data-dcnode-id="1051" height="540" sizes="(max-width: 950px) 100vw, 950px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bigislandguide.com/wp-content/uploads/2018/03/kamakahonu-beach-park-9313.jpg&amp;raw" srcset="https://bigislandguide.com/wp-content/uploads/2018/03/kamakahonu-beach-park-9313.jpg 950w, https://bigislandguide.com/wp-content/uploads/2018/03/kamakahonu-beach-park-9313-300x171.jpg 300w, https://bigislandguide.com/wp-content/uploads/2018/03/kamakahonu-beach-park-9313-768x437.jpg 768w" width="950"><span data-dcnode-id="1050" instrument_node="">
</span></p><p data-dcnode-id="1044"><span data-dcnode-id="1048" instrument_node="">Kamakahonu was a royal residence of King Kamehameha II. This property is now a part of the </span><a data-dcnode-id="1046" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bigislandguide.com/marriott-king-kamehamehas-kona-beach-hotel"><span data-dcnode-id="1047" instrument_node="">King Kamehameha’s Kona Beach Hotel</span></a><span data-dcnode-id="1045" instrument_node=""> and the neighboring Anu’ena Heiau was reconstructed in 1970 and while is still viewable by the public, it’s closed to entry and remains a sacred area.
