</span><p data-dcnode-id="1648"><span data-dcnode-id="1650" style="font-weight: 400;"><span data-dcnode-id="1657" instrument_node="">If you live in the Seattle area long enough, you’ll most likely visit an island or two at some point. Bainbridge boasts cafes, galleries, and the popular </span><a data-dcnode-id="1655" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kidimu.org/"><span data-dcnode-id="1656" instrument_node="">Kids Discovery Museum</span></a><span data-dcnode-id="1654" instrument_node="">. The San Juan Islands are home to arguably some of the most beautiful spots in the world, with idyllic and family-friendly campsites to boot. And Whidbey and Camano Islands offer drive-on options. </span><strong data-dcnode-id="1652"><span data-dcnode-id="1653" instrument_node="">And then there’s Vashon Island.</span></strong><span data-dcnode-id="1651" instrument_node=""> Proximity-wise, very close to Seattle’s bustling city life, but once you’ve arrived, you may as well be miles away.&nbsp;</span></span><span data-dcnode-id="1649" instrument_node="">
</span></p><p data-dcnode-id="1644"><span data-dcnode-id="1646" style="font-weight: 400;"><span data-dcnode-id="1647" instrument_node="">With ferry-only access, the slow-paced island feels the most removed from the daily grind, but still within easy day-tripping distance. Here are some favorite stops to add to your itinerary the next time you need some island time.&nbsp;</span></span><span data-dcnode-id="1645" instrument_node="">
</span></p><h3 data-dcnode-id="1641"><b data-dcnode-id="1642"><span data-dcnode-id="1643" instrument_node="">Food &amp; Drink</span></b></h3><span data-dcnode-id="1640" instrument_node="">
</span><p data-dcnode-id="1633"><a data-dcnode-id="1637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vashonislandbakingcompany.com/"><b data-dcnode-id="1638"><span data-dcnode-id="1639" instrument_node="">Vashon Island Baking Company</span></b></a><span data-dcnode-id="1635" style="font-weight: 400;"><span data-dcnode-id="1636" instrument_node=""> – Pop into this delightful bakery for a pastry and coffee on your way into town, or follow our lead: grab cookies for the long wait when you accidentally miss the ferry back to Seattle (afternoon ferries are less frequent – beware!).&nbsp;</span></span><span data-dcnode-id="1634" instrument_node="">
</span></p><p data-dcnode-id="1626"><a data-dcnode-id="1630" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vashonsnapdragon.com/"><b data-dcnode-id="1631"><span data-dcnode-id="1632" instrument_node="">Snapdragon</span></b></a><span data-dcnode-id="1628" style="font-weight: 400;"><span data-dcnode-id="1629" instrument_node=""> – the vegetarian food here is delicious and even kid-friendly! Their beet reuben can’t be beat (did you catch that mom joke?) and kids will devour the grilled cheese and humongous cookies. There’s a patio out back, or you can pack your sandwiches for a picnic at one of the many beaches around the island. Make sure you visit on a weekend — the cafe currently has a sign out front saying it’s only open from Friday-Sunday.</span></span><span data-dcnode-id="1627" instrument_node="">
</span></p><div data-dcnode-id="1624" id="zone_load_114648036" style="margin:5px auto; margin-bottom: 15px;"><broadstreet-zone callback="zone_load_114648036" data-dcnode-id="1625" keywords="not_home_page,not_landing_page,is_article_page,day-trips,explore,explore,things-to-do,family-travel-northwest,things-to-do,things-to-do,vashon-island-day-trip,post" place="0" soft-keywords="true" zone-alias="" zone-id="89659"></broadstreet-zone></div><span data-dcnode-id="1621" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="1614" id="attachment_28291" style="width: 1374px"><img alt="Vashon island " class="wp-image-28291 size-full entered error" data-dcnode-id="1620" data-lazy-src="https://d1urgxgdb4lky3.cloudfront.net/wp-content/uploads/2021/07/EDD3B2C1-51AF-4C95-9C30-197A81AF37A8.jpeg" data-ll-status="error" height="1818" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d1urgxgdb4lky3.cloudfront.net/wp-content/uploads/2021/07/EDD3B2C1-51AF-4C95-9C30-197A81AF37A8.jpeg&amp;raw" width="1364"><noscript data-dcnode-id="1618"><span data-dcnode-id="1619" instrument_node="">&lt;img class="wp-image-28291 size-full" src="https://d1urgxgdb4lky3.cloudfront.net/wp-content/uploads/2021/07/EDD3B2C1-51AF-4C95-9C30-197A81AF37A8.jpeg" alt="Vashon island " width="1364" height="1818" /&gt;</span></noscript><div class="img-info" data-dcnode-id="1615"><p class="wp-caption-text" data-dcnode-id="1616"><span data-dcnode-id="1617" instrument_node="">Lunch alfresco (photo: Natasha Dillinger)</span></p></div></div><span data-dcnode-id="1613" instrument_node="">
</span><p data-dcnode-id="1606"><a data-dcnode-id="1610" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvicr.com/"><b data-dcnode-id="1611"><span data-dcnode-id="1612" instrument_node="">Vashon Island Coffee Roasterie</span></b></a><span data-dcnode-id="1608" style="font-weight: 400;"><span data-dcnode-id="1609" instrument_node=""> – The original roastery location of Seattle’s Best Coffee is a popular local hangout with an adjacent market selling natural foods. You can’t rush deliciousness, so take a seat on the porch and people watch while you wait for your coffee, or strike up a conversation with one of the regulars (whose mugs bear their names and hang on a wall inside).&nbsp;</span></span><span data-dcnode-id="1607" instrument_node="">
</span></p><p data-dcnode-id="1599"><a data-dcnode-id="1603" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.glassbottlecreamery.com/"><b data-dcnode-id="1604"><span data-dcnode-id="1605" instrument_node="">Glass Bottle Creamery</span></b></a><span data-dcnode-id="1601" style="font-weight: 400;"><span data-dcnode-id="1602" instrument_node=""> – with a selection of eight rotating flavors (including at least one dairy-free option), this little ice cream shop is the perfect place to pick up a cone while you stroll the main street after a beach day.&nbsp;</span></span><span data-dcnode-id="1600" instrument_node="">
</span></p><h3 data-dcnode-id="1596"><b data-dcnode-id="1597"><span data-dcnode-id="1598" instrument_node="">Things to do</span></b></h3><span data-dcnode-id="1595" instrument_node="">
</span><p data-dcnode-id="1588"><a data-dcnode-id="1592" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vashonparks.org/ober-park"><b data-dcnode-id="1593"><span data-dcnode-id="1594" instrument_node="">Ober Park</span></b></a><span data-dcnode-id="1590" style="font-weight: 400;"><span data-dcnode-id="1591" instrument_node=""> – you can’t miss this playground on your way into town and my kids always ask to visit. It’s a great bookend to your trip (either waiting for activities to open in the morning, or killing time before an afternoon ferry). The structures at this community gathering place are mostly wooden treasures and there’s lots of room to spread out. You’ll even find a meadow to run through if little legs need to wiggle.</span></span><span data-dcnode-id="1589" instrument_node="">
</span></p><p data-dcnode-id="1580"><a data-dcnode-id="1585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vashonadventures.com/"><b data-dcnode-id="1586"><span data-dcnode-id="1587" instrument_node="">Vashon Adventures</span></b></a><span data-dcnode-id="1584" instrument_node=""> </span><span data-dcnode-id="1582" style="font-weight: 400;"><span data-dcnode-id="1583" instrument_node="">– this is the only spot near Seattle you’ll find to rent e-bikes and it’s worth the ferry trip by itself! Hop on a standard model or strap the kids on a cargo version. After an orientation from the patient and welcoming staff, you’ll be ready to conquer the hills of Vashon with the breeze blowing through your helmet. You can also rent kayaks from their Jensen Point location, which are perfect for a day on the water.</span></span><span data-dcnode-id="1581" instrument_node="">
</span></p><div class="newsletter-subscribe-area" data-dcnode-id="1573"><div class="newsletter-text" data-dcnode-id="1577"><p data-dcnode-id="1578"><span data-dcnode-id="1579" instrument_node="">For more family friendly things to do, news, events and travel, sign up for Seattle's Child newsletters</span></p></div><div class="newsletter-btn-area" data-dcnode-id="1574"><button class="newsletter-btn popup-newsletter popmake-14254 pum-trigger" data-dcnode-id="1575" style="cursor: pointer;" type="button"><span data-dcnode-id="1576" instrument_node="">Sign Up</span></button></div></div><span data-dcnode-id="1572" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="1565" id="attachment_28290" style="width: 2434px"><img alt="Vashon adventures " class="wp-image-28290 size-full entered error" data-dcnode-id="1571" data-lazy-src="https://d1urgxgdb4lky3.cloudfront.net/wp-content/uploads/2021/07/D99E7F25-E496-42B6-83E1-C192BB532506.jpeg" data-ll-status="error" height="1818" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d1urgxgdb4lky3.cloudfront.net/wp-content/uploads/2021/07/D99E7F25-E496-42B6-83E1-C192BB532506.jpeg&amp;raw" width="2424"><noscript data-dcnode-id="1569"><span data-dcnode-id="1570" instrument_node="">&lt;img class="wp-image-28290 size-full" src="https://d1urgxgdb4lky3.cloudfront.net/wp-content/uploads/2021/07/D99E7F25-E496-42B6-83E1-C192BB532506.jpeg" alt="Vashon adventures " width="2424" height="1818" /&gt;</span></noscript><div class="img-info" data-dcnode-id="1566"><p class="wp-caption-text" data-dcnode-id="1567"><span data-dcnode-id="1568" instrument_node="">Ready to ride! / Vashon Adventures / (photo: Natasha Dillinger)</span></p></div></div><span data-dcnode-id="1564" instrument_node="">
</span><p data-dcnode-id="1556"><a data-dcnode-id="1561" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vashonparks.org/point-robinson"><b data-dcnode-id="1562"><span data-dcnode-id="1563" instrument_node="">Point Robinson Lighthouse</span></b></a><span data-dcnode-id="1560" instrument_node=""> </span><span data-dcnode-id="1558" style="font-weight: 400;"><span data-dcnode-id="1559" instrument_node="">– park in the upper lot at this wonderful Vashon beach, or coast all the way down to the lower lot if you have an ADA permit or are on a bike (but remember it’s a steep ascent back up!). A short hike will bring you down to a beach with tons of activity choices — stick to the southern part of the beach for sand castle building, explore the driftwood forts near the lighthouse, or head further north for some tide pools and a rocky beach shaded by large trees. We’ve often spotted seals and eagles here and have even seen a pod of orcas swimming by, so this is a great spot to relax while keeping your eyes peeled for wildlife.&nbsp;</span></span><span data-dcnode-id="1557" instrument_node="">
</span></p><div class="wp-caption aligncenter" data-dcnode-id="1549" id="attachment_28289" style="width: 1135px"><img alt="Lighthouse Vashon " class="wp-image-28289 size-full entered error" data-dcnode-id="1555" data-lazy-src="https://d1urgxgdb4lky3.cloudfront.net/wp-content/uploads/2021/07/42B770C9-B150-4866-9B34-26283CEFFF3F.jpeg" data-ll-status="error" height="1500" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d1urgxgdb4lky3.cloudfront.net/wp-content/uploads/2021/07/42B770C9-B150-4866-9B34-26283CEFFF3F.jpeg&amp;raw" width="1125"><noscript data-dcnode-id="1553"><span data-dcnode-id="1554" instrument_node="">&lt;img class="wp-image-28289 size-full" src="https://d1urgxgdb4lky3.cloudfront.net/wp-content/uploads/2021/07/42B770C9-B150-4866-9B34-26283CEFFF3F.jpeg" alt="Lighthouse Vashon " width="1125" height="1500" /&gt;</span></noscript><div class="img-info" data-dcnode-id="1550"><p class="wp-caption-text" data-dcnode-id="1551"><span data-dcnode-id="1552" instrument_node="">Driftwood forts and Point Robinson Lighthouse (photo: Natasha Dillinger)</span></p></div></div><span data-dcnode-id="1548" instrument_node="">
</span><p data-dcnode-id="1526"><a data-dcnode-id="1545" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vashonfarmersmarket.org/"><b data-dcnode-id="1546"><span data-dcnode-id="1547" instrument_node="">Support local farms</span></b></a><span data-dcnode-id="1543" style="font-weight: 400;"><span data-dcnode-id="1544" instrument_node=""> – Vashon is a pastoral paradise full of locally grown foods, meats and flowers. Whether it’s gathering U-Pick Lavender at </span></span><a data-dcnode-id="1540" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lavenderhillvashon.com/u-cut-lavender"><span data-dcnode-id="1541" style="font-weight: 400;"><span data-dcnode-id="1542" instrument_node="">Lavender Hill Farm</span></span></a><span data-dcnode-id="1538" style="font-weight: 400;"><span data-dcnode-id="1539" instrument_node=""> (2021 season extends until July 25), visiting one of the many </span></span><a data-dcnode-id="1535" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vigavashon.org/farm-stand-map"><span data-dcnode-id="1536" style="font-weight: 400;"><span data-dcnode-id="1537" instrument_node="">island farm stands</span></span></a><span data-dcnode-id="1533" style="font-weight: 400;"><span data-dcnode-id="1534" instrument_node=""> or spending a Saturday morning perusing the </span></span><a data-dcnode-id="1530" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vashonfarmersmarket.org/"><span data-dcnode-id="1531" style="font-weight: 400;"><span data-dcnode-id="1532" instrument_node="">farmers market</span></span></a><span data-dcnode-id="1528" style="font-weight: 400;"><span data-dcnode-id="1529" instrument_node="">, you’re sure to find island-grown products for your picnic or your pantry.&nbsp;</span></span><span data-dcnode-id="1527" instrument_node="">
</span></p><div class="wp-caption aligncenter" data-dcnode-id="1519" id="attachment_28288" style="width: 1135px"><img alt="Lavender farm " class="wp-image-28288 size-full entered error" data-dcnode-id="1525" data-lazy-src="https://d1urgxgdb4lky3.cloudfront.net/wp-content/uploads/2021/07/62511A53-6DDE-4794-82F4-7783AC200323.jpeg" data-ll-status="error" height="1500" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d1urgxgdb4lky3.cloudfront.net/wp-content/uploads/2021/07/62511A53-6DDE-4794-82F4-7783AC200323.jpeg&amp;raw" width="1125"><noscript data-dcnode-id="1523"><span data-dcnode-id="1524" instrument_node="">&lt;img class="wp-image-28288 size-full" src="https://d1urgxgdb4lky3.cloudfront.net/wp-content/uploads/2021/07/62511A53-6DDE-4794-82F4-7783AC200323.jpeg" alt="Lavender farm " width="1125" height="1500" /&gt;</span></noscript><div class="img-info" data-dcnode-id="1520"><p class="wp-caption-text" data-dcnode-id="1521"><span data-dcnode-id="1522" instrument_node="">U-pick Lavender (photo: Natasha Dillinger)</span></p></div></div><span data-dcnode-id="1518" instrument_node="">
</span><p data-dcnode-id="1502"><b data-dcnode-id="1516"><span data-dcnode-id="1517" instrument_node="">Take a nature walk </span></b><span data-dcnode-id="1514" style="font-weight: 400;"><span data-dcnode-id="1515" instrument_node="">– stroll along a small boardwalk to the calm estuary of </span></span><a data-dcnode-id="1511" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vashonlandtrust.org/portfolio-item/fern-cove/"><span data-dcnode-id="1512" style="font-weight: 400;"><span data-dcnode-id="1513" instrument_node="">Fern Cove</span></span></a><span data-dcnode-id="1509" style="font-weight: 400;"><span data-dcnode-id="1510" instrument_node=""> or hike one of the trails at </span></span><a data-dcnode-id="1506" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kingcounty.gov/services/parks-recreation/parks/parks-and-natural-lands/natural-lands/maury-island-marine-park.aspx"><span data-dcnode-id="1507" style="font-weight: 400;"><span data-dcnode-id="1508" instrument_node="">Maury Island Marine Park</span></span></a><span data-dcnode-id="1504" style="font-weight: 400;"><span data-dcnode-id="1505" instrument_node=""> (it’s only three quarters of a mile to the beach!).&nbsp;</span></span><span data-dcnode-id="1503" instrument_node="">
</span></p><p data-dcnode-id="1497"><em data-dcnode-id="1499"><b data-dcnode-id="1500"><span data-dcnode-id="1501" instrument_node="">Keep in mind…</span></b></em><span data-dcnode-id="1498" instrument_node="">
</span></p><p data-dcnode-id="1478"><span data-dcnode-id="1495" style="font-weight: 400;"><span data-dcnode-id="1496" instrument_node="">Vashon isn’t quite as bustling as other island destinations (if you’re ready for more island fun, enjoy day trips to other local islands like </span></span><a data-dcnode-id="1492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.seattleschild.com/day-trip-or-longer-with-kids-look-for-gnome-homes-on-bainbridge-island/"><span data-dcnode-id="1493" style="font-weight: 400;"><span data-dcnode-id="1494" instrument_node="">Bainbridge</span></span></a><span data-dcnode-id="1490" style="font-weight: 400;"><span data-dcnode-id="1491" instrument_node="">, </span></span><a data-dcnode-id="1487" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.seattleschild.com/parent-review-a-hiking-day-trip-to-ebeys-landing/"><span data-dcnode-id="1488" style="font-weight: 400;"><span data-dcnode-id="1489" instrument_node="">Whidbey</span></span></a><span data-dcnode-id="1485" style="font-weight: 400;"><span data-dcnode-id="1486" instrument_node=""> and the </span></span><a data-dcnode-id="1482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.seattleschild.com/lime-kiln-point-state-park-draft/"><span data-dcnode-id="1483" style="font-weight: 400;"><span data-dcnode-id="1484" instrument_node="">San Juans</span></span></a><span data-dcnode-id="1480" style="font-weight: 400;"><span data-dcnode-id="1481" instrument_node="">), but the community is tight knit and you’ll see locals catching up with each other as they sip coffee. Many shops aren’t open on weekdays (particularly Monday), service operates on island time and the gaps between ferries can be over an hour. Plan accordingly and enjoy an extra scoop of ice cream and time at the beach instead of rushing back to the city.&nbsp;</span></span><span data-dcnode-id="1479" instrument_node="">
</span></p><h3 data-dcnode-id="1475"><b data-dcnode-id="1476"><span data-dcnode-id="1477" instrument_node="">Getting to the island</span></b></h3><span data-dcnode-id="1474" instrument_node="">
</span><p data-dcnode-id="1465"><a data-dcnode-id="1471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wsdot.com/ferries/schedule/scheduledetail.aspx%3Fdepartingterm%3D9%26arrivingterm%3D22%26roundtrip%3Dtrue"><b data-dcnode-id="1472"><span data-dcnode-id="1473" instrument_node="">Fauntleroy Ferry</span></b></a><b data-dcnode-id="1469"><span data-dcnode-id="1470" instrument_node="">: </span></b><span data-dcnode-id="1467" style="font-weight: 400;"><span data-dcnode-id="1468" instrument_node="">Ferries depart from West Seattle (adjacent to Lincoln Park) at intervals as short as 20 minutes and as long as 70 minutes. Check the schedule carefully.&nbsp;</span></span><span data-dcnode-id="1466" instrument_node="">
</span></p><p data-dcnode-id="1448"><a data-dcnode-id="1462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wsdot.com/ferries/schedule/scheduledetailbyroute.aspx%3Froute%3Dpd-tal"><b data-dcnode-id="1463"><span data-dcnode-id="1464" instrument_node="">Point Defiance Ferry</span></b></a><span data-dcnode-id="1460" style="font-weight: 400;"><span data-dcnode-id="1461" instrument_node="">: Ferries depart from Tacoma roughly every 50 minutes. Make a day of it by </span></span><a data-dcnode-id="1457" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.seattleschild.com/five-very-pnw-day-trips-near-seattle-for-the-summer/"><span data-dcnode-id="1458" style="font-weight: 400;"><span data-dcnode-id="1459" instrument_node="">renting a surrey at nearby Point Ruston</span></span></a><span data-dcnode-id="1455" style="font-weight: 400;"><span data-dcnode-id="1456" instrument_node="">, visiting the Point Defiance zoo or ride the </span></span><a data-dcnode-id="1452" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.seattleschild.com/explore-the-new-dune-peninsula-at-point-defiance-park/"><span data-dcnode-id="1453" style="font-weight: 400;"><span data-dcnode-id="1454" instrument_node="">chutes and ladders staircase</span></span></a><span data-dcnode-id="1450" style="font-weight: 400;"><span data-dcnode-id="1451" instrument_node=""> while you wait for the ferry.</span></span><span data-dcnode-id="1449" instrument_node="">
</span></p><p data-dcnode-id="1444"><span data-dcnode-id="1446" style="font-weight: 400;"><span data-dcnode-id="1447" instrument_node="">A standard vehicle and driver fare is $25.95, but you’ll only pay on the way to the island.</span></span><span data-dcnode-id="1445" instrument_node="">
</span></p><p data-dcnode-id="1442"><span data-dcnode-id="1443" instrument_node="">&nbsp;


</span></p><p data-dcnode-id="1438"><strong data-dcnode-id="1440"><span data-dcnode-id="1441" instrument_node="">More from Seattle’s Child:</span></strong><span data-dcnode-id="1439" instrument_node="">
</span></p><p data-dcnode-id="1434"><a data-dcnode-id="1436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.seattleschild.com/surf-sand-mermaids-westport/"><span data-dcnode-id="1437" instrument_node="">Surf, sand, and mermaids: Westport’s small town is more family-friendly than ever&nbsp;</span></a><span data-dcnode-id="1435" instrument_node="">
</span></p><p data-dcnode-id="1430"><a data-dcnode-id="1432" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.seattleschild.com/five-very-pnw-day-trips-near-seattle-for-the-summer/"><span data-dcnode-id="1433" instrument_node="">5 family-friendly and very PNW day trips near Seattle</span></a><span data-dcnode-id="1431" instrument_node="">
</span></p></div><span data-dcnode-id="1428" instrument_node="">

</span><h3 data-dcnode-id="1421"><span data-dcnode-id="1422" instrument_node="">About the Author</span></h3><span data-dcnode-id="1420" instrument_node="">
</span></div><span data-dcnode-id="1418" instrument_node="">
