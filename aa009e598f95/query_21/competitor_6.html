</span><h3 data-dcnode-id="1146"><span data-dcnode-id="1147" instrument_node="">Fontainebleau</span></h3><span data-dcnode-id="1145" instrument_node="">
</span><p data-dcnode-id="1136"><a data-dcnode-id="1143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//mamalovesparis.com/image1-2/"><img alt="Day trips from Paris" class="alignleft size-medium wp-image-5927" data-attachment-id="5927" data-comments-opened="1" data-dcnode-id="1144" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="Fontainbleau" data-large-file="https://i2.wp.com/mamalovesparis.com/wp-content/uploads/2016/04/image1-2.jpg?fit=750%2C732" data-medium-file="https://i2.wp.com/mamalovesparis.com/wp-content/uploads/2016/04/image1-2.jpg?fit=300%2C293" data-orig-file="https://i2.wp.com/mamalovesparis.com/wp-content/uploads/2016/04/image1-2.jpg?fit=750%2C732" data-orig-size="750,732" data-permalink="http://mamalovesparis.com/day-trips-from-paris/image1-2/" height="271" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i2.wp.com/mamalovesparis.com/wp-content/uploads/2016/04/image1-2.jpg%3Fresize%3D300%252C293&amp;raw" srcset="https://i2.wp.com/mamalovesparis.com/wp-content/uploads/2016/04/image1-2.jpg?resize=300%2C293 300w, https://i2.wp.com/mamalovesparis.com/wp-content/uploads/2016/04/image1-2.jpg?w=750 750w" width="277"></a><a data-dcnode-id="1141" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.chateaudefontainebleau.fr/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1142" instrument_node="">Fontainebleau</span></a><span data-dcnode-id="1140" instrument_node=""> is a beautiful chateau and has great gardens to explore. It also has the great advantage of the adjoining town and forests to give a little variety for the kids. The chateau has some great </span><a data-dcnode-id="1138" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.chateaudefontainebleau.fr/VACANCES-DE-PRINTEMPS" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1139" instrument_node="">family activities for the April 2016</span></a><span data-dcnode-id="1137" instrument_node=""> school holidays, including a session called ‘Dans le Peau d’un Courtisan” that looks like great fun, as kids get to play the role of a visiting Marquis, Prince or even the King! Getting there is easy. Take a train from Gare de Lyon in the direction of Montargis, Montereau, ou Laroche-Migennes. The green space around date chateau fabulous for bike riding and the village overall is extremely charming.</span></p><span data-dcnode-id="1135" instrument_node="">
</span><h3 data-dcnode-id="1133"><span data-dcnode-id="1134" instrument_node="">Parc Asterix</span></h3><span data-dcnode-id="1132" instrument_node="">
</span><p data-dcnode-id="1130"><span data-dcnode-id="1131" instrument_node="">If you want something a little different to Disney, then this is it. Yes, it’s based on the characters from the famous comic books but, even if your children are not into Asterix, Obelix and their merry friends, there is a huge amount of fun to be had. Rollercoasters, sea-lion and dolphin shows, playgrounds and the new Forest of Dogmatix area. It’s so much fun for the family and teens will love it too.</span></p><span data-dcnode-id="1129" instrument_node="">
</span><blockquote data-dcnode-id="1126"><p data-dcnode-id="1127"><span data-dcnode-id="1128" instrument_node="">“We paid €94 for hubby, myself and 5-year-old. Fantastic park like Disney with loads of roller coasters and shows. If your child is 1m tall, there is plenty for them to do (sometimes you need to accompany them). Longest queue was 30 mins (for the bigger rides). We spent all day there and would definitely go back and a good option for those who Disney is just a bit too expensive for.”</span></p></blockquote><span data-dcnode-id="1125" instrument_node="">
</span><p data-dcnode-id="1122"><em data-dcnode-id="1123"><span data-dcnode-id="1124" instrument_node="">Super Mama Meagan – visited Parc Asterix April 3 2016</span></em></p><span data-dcnode-id="1121" instrument_node="">
</span><p data-dcnode-id="1113"><span data-dcnode-id="1120" instrument_node="">There are several ways to get there, including a coach (</span><em data-dcnode-id="1118"><span data-dcnode-id="1119" instrument_node="">‘navette’</span></em><span data-dcnode-id="1117" instrument_node="">) that will pick you up at the Louvre or you can take the RER to Charles-de-Gaulle Terminals 1 and 3 stop and take a coach from there. Details for both options can be found on the </span><a data-dcnode-id="1115" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.parcasterix.fr/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1116" instrument_node="">Parc Asterix website</span></a><span data-dcnode-id="1114" instrument_node="">.</span></p><span data-dcnode-id="1112" instrument_node="">
</span><h3 data-dcnode-id="1110"><span data-dcnode-id="1111" instrument_node="">Giverny</span></h3><span data-dcnode-id="1109" instrument_node="">
</span><p data-dcnode-id="1093"><a data-dcnode-id="1107" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//mamalovesparis.com/ten-brilliant-workshops-kids-paris/monet-gardens-1-xlarge_trans4mvoqch8rnhstxp15xlyx1vse9jsn00kzbur3ixhago/" rel="attachment wp-att-5882"><img alt="Paris with Kids" class="alignright size-medium wp-image-5882" data-attachment-id="5882" data-comments-opened="1" data-dcnode-id="1108" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="Monet" data-large-file="https://i1.wp.com/mamalovesparis.com/wp-content/uploads/2016/04/monet-gardens-1-xlarge_trans4mvOqcH8RNHsTxP15XLyX1Vse9JsN00kzbUr3IXHaGo.jpg?fit=1024%2C640" data-medium-file="https://i1.wp.com/mamalovesparis.com/wp-content/uploads/2016/04/monet-gardens-1-xlarge_trans4mvOqcH8RNHsTxP15XLyX1Vse9JsN00kzbUr3IXHaGo.jpg?fit=300%2C188" data-orig-file="https://i1.wp.com/mamalovesparis.com/wp-content/uploads/2016/04/monet-gardens-1-xlarge_trans4mvOqcH8RNHsTxP15XLyX1Vse9JsN00kzbUr3IXHaGo.jpg?fit=1280%2C800" data-orig-size="1280,800" data-permalink="http://mamalovesparis.com/?attachment_id=5882" data-recalc-dims="1" height="188" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i1.wp.com/mamalovesparis.com/wp-content/uploads/2016/04/monet-gardens-1-xlarge_trans4mvOqcH8RNHsTxP15XLyX1Vse9JsN00kzbUr3IXHaGo.jpg%3Fresize%3D300%252C188&amp;raw" srcset="https://i1.wp.com/mamalovesparis.com/wp-content/uploads/2016/04/monet-gardens-1-xlarge_trans4mvOqcH8RNHsTxP15XLyX1Vse9JsN00kzbUr3IXHaGo.jpg?resize=300%2C188 300w, https://i1.wp.com/mamalovesparis.com/wp-content/uploads/2016/04/monet-gardens-1-xlarge_trans4mvOqcH8RNHsTxP15XLyX1Vse9JsN00kzbUr3IXHaGo.jpg?resize=768%2C480 768w, https://i1.wp.com/mamalovesparis.com/wp-content/uploads/2016/04/monet-gardens-1-xlarge_trans4mvOqcH8RNHsTxP15XLyX1Vse9JsN00kzbUr3IXHaGo.jpg?resize=1024%2C640 1024w, https://i1.wp.com/mamalovesparis.com/wp-content/uploads/2016/04/monet-gardens-1-xlarge_trans4mvOqcH8RNHsTxP15XLyX1Vse9JsN00kzbUr3IXHaGo.jpg?w=1280 1280w" width="300"></a><span data-dcnode-id="1106" instrument_node="">This is a must-do trip out to Giverny to see what was Claude Monet’s house and garden for 40 years and where he created his famous Waterlily paintings. Just a 45 minute train ride from Gare St Lazare in Paris to Vernon and then a shuttle bus – timed to meet each train and bring visitors to the Monet house. Before you visit, do think about introducing your kids to Monet and his Waterlilies through a visit to the </span><a data-dcnode-id="1104" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.musee-orangerie.fr/en" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1105" instrument_node="">Orangerie museum</span></a><span data-dcnode-id="1103" instrument_node=""> inside the Tuileries gardens in Paris. There are also many picture books for children such as </span><a data-dcnode-id="1101" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amazon.co.uk/Katie-Waterlily-Pond-Journey-Masterpieces/dp/1408332450/ref%3Dpd_sim_14_7%3Fie%3DUTF8%26dpID%3D61Wx8eQvKpL%26dpSrc%3Dsims%26preST%3D_AC_UL160_SR160%252C160_%26refRID%3D0H1PGX8K6YHF38RAGZDD" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1102" instrument_node="">Katie and the Waterlily Pond </span></a><span data-dcnode-id="1100" instrument_node="">and </span><a data-dcnode-id="1098" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amazon.co.uk/Magical-Garden-Claude-Anholts-Artists/dp/1845071360/ref%3Dsr_1_7%3Fie%3DUTF8%26qid%3D1460550053%26sr%3D8-7%26keywords%3Dmonet%2Bgarden" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1099" instrument_node="">The Magical Garden of Claude Monet</span></a><span data-dcnode-id="1097" instrument_node="">&nbsp;that are great introductions for 3 – 7 year olds. Do bring the sketch pads and the colouring pencils to Giverny! Create a lovely&nbsp;childhood memory of drawing waterlilies in Monet’s garden with your offspring! Buy </span><a data-dcnode-id="1095" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//fondation-monet.com/en/practical-informations/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1096" instrument_node="">tickets in advance online</span></a><span data-dcnode-id="1094" instrument_node="">.</span></p><span data-dcnode-id="1092" instrument_node="">
</span><h3 data-dcnode-id="1090"><span data-dcnode-id="1091" instrument_node="">Chantilly</span></h3><span data-dcnode-id="1089" instrument_node="">
</span><p data-dcnode-id="1077"><a class="single-image-gallery" data-dcnode-id="1087" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//mamalovesparis.com/day-trips-from-paris/image1-3/" rel="attachment wp-att-5932"><img alt="Day trips from Paris " class="alignleft size-medium wp-image-5932" data-attachment-id="5932" data-comments-opened="1" data-dcnode-id="1088" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="Chantilly" data-large-file="https://i1.wp.com/mamalovesparis.com/wp-content/uploads/2016/04/image1-3.jpg?fit=750%2C715" data-medium-file="https://i1.wp.com/mamalovesparis.com/wp-content/uploads/2016/04/image1-3.jpg?fit=300%2C286" data-orig-file="https://i1.wp.com/mamalovesparis.com/wp-content/uploads/2016/04/image1-3.jpg?fit=750%2C715" data-orig-size="750,715" data-permalink="http://mamalovesparis.com/day-trips-from-paris/image1-3/" height="265" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i1.wp.com/mamalovesparis.com/wp-content/uploads/2016/04/image1-3.jpg%3Fresize%3D300%252C286&amp;raw" srcset="https://i1.wp.com/mamalovesparis.com/wp-content/uploads/2016/04/image1-3.jpg?resize=300%2C286 300w, https://i1.wp.com/mamalovesparis.com/wp-content/uploads/2016/04/image1-3.jpg?w=750 750w" width="277"></a><a data-dcnode-id="1085" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.domainedechantilly.com/en/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1086" instrument_node="">Chantilly</span></a><span data-dcnode-id="1084" instrument_node=""> is stunning. Highlights of the Chateau include the art galleries and private suites. But even the grounds alone are worth the visit – fountains, flower beds and Anglo-Chinese Garden. Children love the maze and The Children’s Hamlet – two play areas, one for 3 – 6 year olds with a huge snail-shaped play area covered in grass, mini wooden houses and farm animals on springs. The other is for children aged 8 to 12, with a play structure on which bigger children can climb and jump from. There is also the Petit Parc with sheep and kangaroos and from April to November, a mini train. On Tuesdays, Thursdays and Saturdays you can take a coach out to Chantilly from rue des Pyramides in central Paris run by </span><a data-dcnode-id="1082" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.pariscityvision.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1083" instrument_node="">ParisCityVision&nbsp;</span></a><span data-dcnode-id="1081" instrument_node=""> An alternative however, is to take the train from Gare du Nord to Chantilly-Gouvieux and then it’s a five-minute taxi ride or 20 minute walk to the Chateau or a free DUC</span><a data-dcnode-id="1079" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//bus%20timetable%20-%20http%3A//www.ville-chantilly.fr/wp-content/uploads/2011/09/horaires-DUC-grilles-au-31-ao%25C3%25BBt-2015.pdf" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1080" instrument_node=""> bus ride to ‘Chantilly</span></a><span data-dcnode-id="1078" instrument_node="">, Eglise Notre Dame.</span></p><span data-dcnode-id="1076" instrument_node="">
</span><h3 data-dcnode-id="1074"><span data-dcnode-id="1075" instrument_node="">Playmobil</span></h3><span data-dcnode-id="1073" instrument_node="">
</span><p data-dcnode-id="1062"><span data-dcnode-id="1072" instrument_node="">Did you know there is a</span><a data-dcnode-id="1070" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.playmobil.fr/on/demandware.store/Sites-FR-Site/fr_FR/Link-Page%3Fcid%3DSTART_PARIS" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1071" instrument_node=""> Playmobil fun park</span></a><span data-dcnode-id="1069" instrument_node=""> accessible on public transport from Paris? The park has 12 play areas with themes such as the farm, wild animals, pirates, a zoo </span><em data-dcnode-id="1067"><span data-dcnode-id="1068" instrument_node="">and</span></em><span data-dcnode-id="1066" instrument_node=""> Vikings. There is a special area for the very little ones aged </span><strong data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node="">18 – 36 months</span></strong><span data-dcnode-id="1063" instrument_node="">. Entry price is very reasonable at just 3 Euros (and it is free for kids under 3). As the price suggests, this is not Disneyland, but it’s a great option for younger children on a rainy day. To get there on public transport, take RER B to Croix de Berny and then the TVM bus in the direction of St Maur/Creteil to the stop Clos la Garenne or Montjean.</span></p><span data-dcnode-id="1061" instrument_node="">
</span><h3 data-dcnode-id="1059"><span data-dcnode-id="1060" instrument_node="">Auvers-sur-Oise</span></h3><span data-dcnode-id="1058" instrument_node="">
</span><p data-dcnode-id="1047"><span data-dcnode-id="1057" instrument_node="">Auvers-sur-Oise is a beautiful village outside Paris, best known for being the residence&nbsp;of the one and only&nbsp;Vincent Van Gogh. He lived and painted there, as did Cezanne, Pissarro, Corot and Daubigny. If you visit, you’ll see why they chose it. The rural and village scenes are inspiring. Perhaps&nbsp;get your kids familiar with some of the famous paintings such as Van Gogh’s Church at Auvers-Sur-Oise and his Wheat Field with Crows (</span><em data-dcnode-id="1055"><span data-dcnode-id="1056" instrument_node="">see pic</span></em><span data-dcnode-id="1054" instrument_node="">) before they go so they can enjoy spotting the scenes when they get there. </span><a data-dcnode-id="1052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//mamalovesparis.com/auvers-sur-oise-wheatfield-with-crows-painting-by-van-gogh/"><img alt="Day trips from Paris" class="aligncenter wp-image-5924 size-large" data-attachment-id="5924" data-comments-opened="1" data-dcnode-id="1053" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="Auvers-sur-Oise – wheatfield with Crows painting by Van Gogh" data-large-file="https://i0.wp.com/mamalovesparis.com/wp-content/uploads/2016/04/Auvers-sur-Oise-wheatfield-with-Crows-painting-by-Van-Gogh.jpg?fit=1024%2C479" data-medium-file="https://i0.wp.com/mamalovesparis.com/wp-content/uploads/2016/04/Auvers-sur-Oise-wheatfield-with-Crows-painting-by-Van-Gogh.jpg?fit=300%2C140" data-orig-file="https://i0.wp.com/mamalovesparis.com/wp-content/uploads/2016/04/Auvers-sur-Oise-wheatfield-with-Crows-painting-by-Van-Gogh.jpg?fit=1280%2C599" data-orig-size="1280,599" data-permalink="http://mamalovesparis.com/day-trips-from-paris/auvers-sur-oise-wheatfield-with-crows-painting-by-van-gogh/" height="288" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/mamalovesparis.com/wp-content/uploads/2016/04/Auvers-sur-Oise-wheatfield-with-Crows-painting-by-Van-Gogh.jpg%3Fresize%3D1024%252C479&amp;raw" srcset="https://i0.wp.com/mamalovesparis.com/wp-content/uploads/2016/04/Auvers-sur-Oise-wheatfield-with-Crows-painting-by-Van-Gogh.jpg?resize=1024%2C479 1024w, https://i0.wp.com/mamalovesparis.com/wp-content/uploads/2016/04/Auvers-sur-Oise-wheatfield-with-Crows-painting-by-Van-Gogh.jpg?resize=300%2C140 300w, https://i0.wp.com/mamalovesparis.com/wp-content/uploads/2016/04/Auvers-sur-Oise-wheatfield-with-Crows-painting-by-Van-Gogh.jpg?resize=768%2C359 768w, https://i0.wp.com/mamalovesparis.com/wp-content/uploads/2016/04/Auvers-sur-Oise-wheatfield-with-Crows-painting-by-Van-Gogh.jpg?w=1280 1280w" width="617"></a><span data-dcnode-id="1051" instrument_node=""> As well as the village, you can explore the 17th century Château d’Auvers-sur-Oise, with its lovely park and gardens. From April through October, a direct train runs from Gare du Nord in Paris to Auvers-Sur-Oise in the morning and back again early evening, making this a very easy day out in spring, summer and early autumn. &nbsp;Given the </span><a data-dcnode-id="1049" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.transilien.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1050" instrument_node="">timings of the trains</span></a><span data-dcnode-id="1048" instrument_node="">, do think about bringing food for a scenic picnic lunch or make plans to eat at Chateau restaurant. Another nice option in the village is the little restaurant Le Chemin de Peintres. If you eat at Auberge Ravoux, you can go upstairs to see Vincent Van Gogh’s bedroom&nbsp;which also happens to be his final resting place.</span></p><span data-dcnode-id="1046" instrument_node="">
</span><h3 data-dcnode-id="1044"><span data-dcnode-id="1045" instrument_node="">Versailles</span></h3><span data-dcnode-id="1043" instrument_node="">
</span><p data-dcnode-id="1032"><span data-dcnode-id="1042" instrument_node="">Where to begin with </span><a data-dcnode-id="1040" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.chateauversailles.fr/homepage" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1041" instrument_node="">Versailles</span></a><span data-dcnode-id="1039" instrument_node="">? The Palace, the Gardens, The Grand Trianon are amazing. But&nbsp;let’s not forget&nbsp;the Petit Trianon area, created by Marie Antoinette as a rural escape, away from the pomp of Versailles. There is so much to see and do here that it is advisable to just try and see</span><em data-dcnode-id="1037"><span data-dcnode-id="1038" instrument_node=""> some</span></em><span data-dcnode-id="1036" instrument_node=""> of it, with your children and have faith that you’ll return again soon to see the rest. It’s a magical experience and you won’t regret the jaunt. Do keep in mind that strollers and baby carriers with metal frames are not allowed inside some of the rooms in the palace so a sling might be a good idea. SNCF trains will bring you from Gare Montparnasse to Versailles Chantiers or from Gare Saint Lazare to Versailles Rive Droite. The RER line C will bring you to Versailles Chateau Rive Gauche. There is also the </span><a data-dcnode-id="1034" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.versaillesexpress.com/fr" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1035" instrument_node="">Versailles Express coach</span></a><span data-dcnode-id="1033" instrument_node=""> that will bring you from central Paris.</span></p><span data-dcnode-id="1031" instrument_node="">
</span><h3 data-dcnode-id="1029"><span data-dcnode-id="1030" instrument_node="">Disneyland</span></h3><span data-dcnode-id="1028" instrument_node="">
</span><p data-dcnode-id="1020"><span data-dcnode-id="1027" instrument_node="">We are not going to tell you it is as great as the one in Florida but it is still a great&nbsp;fun family day out. It is really two parks, Walt Disney Studios and Disneyland Park. Take the RER A from either Chatelet or Gare de Lyon to Marne –La Vallee which literally brings you right to the entrance of Disney. It couldn’t be easier. If you’ve got younger children, they will be more than happy with the gentle ‘It’s a Small World’ ride, and Spinning Teacups at the </span><a data-dcnode-id="1025" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.disneylandparis.com/en-us/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1026" instrument_node="">Disneyland Park</span></a><span data-dcnode-id="1024" instrument_node="">. Be warned that if they want to meet a Princess, you should reserve that immediately upon your arrival. BTW, it’s true that little girls often walk around the park in their full princess outfits. There are mini Elsa’s everywhere! So do pack accordingly or you may end up witnessing the quivering bottom lip of your little ‘princess in waiting’ and/or end up investing in a new purchase complete with tiara! </span><a class="single-image-gallery" data-dcnode-id="1022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//mamalovesparis.com/day-trips-from-paris/n013047_2019may13_sleeping-beauty-castle_900x360/" rel="attachment wp-att-5929"><img alt="Day trips form Paris" class="aligncenter wp-image-5929 size-full" data-attachment-id="5929" data-comments-opened="1" data-dcnode-id="1023" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="Disneyland" data-large-file="https://i0.wp.com/mamalovesparis.com/wp-content/uploads/2016/04/n013047_2019may13_sleeping-beauty-castle_900x360.jpg?fit=900%2C360" data-medium-file="https://i0.wp.com/mamalovesparis.com/wp-content/uploads/2016/04/n013047_2019may13_sleeping-beauty-castle_900x360.jpg?fit=300%2C120" data-orig-file="https://i0.wp.com/mamalovesparis.com/wp-content/uploads/2016/04/n013047_2019may13_sleeping-beauty-castle_900x360.jpg?fit=900%2C360" data-orig-size="900,360" data-permalink="http://mamalovesparis.com/day-trips-from-paris/n013047_2019may13_sleeping-beauty-castle_900x360/" height="247" sizes="(max-width: 900px) 100vw, 900px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/mamalovesparis.com/wp-content/uploads/2016/04/n013047_2019may13_sleeping-beauty-castle_900x360.jpg%3Fresize%3D900%252C360&amp;raw" srcset="https://i0.wp.com/mamalovesparis.com/wp-content/uploads/2016/04/n013047_2019may13_sleeping-beauty-castle_900x360.jpg?w=900 900w, https://i0.wp.com/mamalovesparis.com/wp-content/uploads/2016/04/n013047_2019may13_sleeping-beauty-castle_900x360.jpg?resize=300%2C120 300w, https://i0.wp.com/mamalovesparis.com/wp-content/uploads/2016/04/n013047_2019may13_sleeping-beauty-castle_900x360.jpg?resize=768%2C307 768w" width="617"></a><span data-dcnode-id="1021" instrument_node=""> The boys are likely to love the cars racing rides and the brilliant car rally event which is worth signing up to. Older children will want to head for the Walt Disney Studios park, with special effects rides based on films. Armageddon and RC Racer &nbsp;which, in all honesty, were a bit too much for this MLP writer. I’ll stick with the Spinning Teacups! If you’ve got very young children and have the flexibility, do think about choosing a week day to avoid crowds and very long queues. And if it’s a chilly day, do remember it feels even colder in the queues so bring layers. Food options inside the park are not great so keep that in mind.</span></p><span data-dcnode-id="1019" instrument_node="">
</span><h3 data-dcnode-id="1017"><span data-dcnode-id="1018" instrument_node="">Baladobus!</span></h3><span data-dcnode-id="1016" instrument_node="">
</span><p data-dcnode-id="1008"><span data-dcnode-id="1015" instrument_node="">MLP is very eager to try the </span><a data-dcnode-id="1013" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.yvelines.fr/agenda/baladobus-navette-touristique/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1014" instrument_node="">Baladobus</span></a><span data-dcnode-id="1012" instrument_node="">. It really opens up the countryside to Paris residents. Take the RER to Saint-Rémy-lès-Chevreuse or an SNCF to Rambouillet and the Baladobus will take you drop you at various countryside locations. Destinations include Chateau de la Madeleine, Chateau du Breteuil, Vaux de Cernay Petit Moulin and Abbaye Vaux de Cernay. More information about the adventures made possible by the Baladobus in the Parc Naturel Régional de la Haute Vallée de Chevreuse can be </span><a data-dcnode-id="1010" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.parc-naturel-chevreuse.fr/destination-parc/panorama-se-deplacer-acces/baladobus" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1011" instrument_node="">found here</span></a><span data-dcnode-id="1009" instrument_node=""> :</span></p><span data-dcnode-id="1007" instrument_node="">
</span><h3 data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">Caribou Aventures</span></h3><span data-dcnode-id="1004" instrument_node="">
</span><p data-dcnode-id="999"><span data-dcnode-id="1003" instrument_node="">I know we said day trips but how about treating the kids to a real adventure and camping overnight? MLP is intrigued by </span><a data-dcnode-id="1001" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.caribouaventures.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1002" instrument_node="">Caribou</span></a><span data-dcnode-id="1000" instrument_node="">. You can sleep in a bubble suspended in a tree which lets you star gaze, a tipi or a gite and have access to all their outdoor activities, from climbing wall to swimming pool to high ropes. All in the glorious setting of the Fontainebleau forest. The best news is that all of this is on RER lines B (Maisse) and D (Fontainebleau) and the owners will pick you up at the station for a 20 Euro fee per booking.</span></p><span data-dcnode-id="998" instrument_node="">
</span><p data-dcnode-id="995"><em data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">Wow! Mama Jen (Jennifer Hamerman) what great great day trips from Paris tips!&nbsp;</span></em></p><span data-dcnode-id="994" instrument_node="">
</span><p data-dcnode-id="977"><span data-dcnode-id="993" instrument_node="">This and more will be coming to you from Mama Loves Paris, so keep it locked. </span><a data-dcnode-id="991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//mamalovesparis.com/subscribe/"><span data-dcnode-id="992" instrument_node="">Sign up</span></a><span data-dcnode-id="990" instrument_node=""> to the Mama Loves Paris newsletter and follow us on </span><a data-dcnode-id="988" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.facebook.com/mamalovesparis/"><span data-dcnode-id="989" instrument_node="">Facebook</span></a><span data-dcnode-id="987" instrument_node="">, </span><a data-dcnode-id="985" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.twitter.com/mamalovesparis/"><span data-dcnode-id="986" instrument_node="">Twitter</span></a><span data-dcnode-id="984" instrument_node="">, </span><a data-dcnode-id="982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.instagram.com/mamalovesparis/"><span data-dcnode-id="983" instrument_node="">Instagram</span></a><span data-dcnode-id="981" instrument_node=""> and </span><a data-dcnode-id="979" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.pinterest.com/mamalovesparis/"><span data-dcnode-id="980" instrument_node="">Pinterest</span></a><span data-dcnode-id="978" instrument_node="">.</span></p><span data-dcnode-id="976" instrument_node="">
</span><p data-dcnode-id="968"><span data-dcnode-id="975" instrument_node="">If you need more inspiration about what to do in Paris over the holidays then check out our previous posts about</span><a data-dcnode-id="973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//mamalovesparis.com/ten-brilliant-workshops-kids-paris/"><span data-dcnode-id="974" instrument_node=""> ateliers </span></a><span data-dcnode-id="972" instrument_node="">and </span><a data-dcnode-id="970" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//mamalovesparis.com/expos-kids-holidays-paris/"><span data-dcnode-id="971" instrument_node="">entertainment</span></a><span data-dcnode-id="969" instrument_node=""> for kids.</span></p><span data-dcnode-id="967" instrument_node="">

</span><p data-dcnode-id="961"><em data-dcnode-id="962"><span data-dcnode-id="963" instrument_node="">Offering escapism for you and the kids</span></em></p><span data-dcnode-id="960" instrument_node="">
