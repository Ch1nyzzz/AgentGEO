While most kids visiting Hawaii are happy to build sandcastles and splash in the waves all day, there are so many more ways to experiences this amazing place together as a family. On your next trip, consider taking a tour of one of the many Hawaii cultural, historical or scenic sites that offer something for all ages.&nbsp;</span><br data-dcnode-id="1805"><span data-dcnode-id="1804" instrument_node="">
</span><br data-dcnode-id="1803"><span data-dcnode-id="1802" instrument_node="">
Explore a real Polynesian village, followed by a sunset luau, at the Polynesian Cultural Center. Show your little ones a piece of history with a tour of Pearl Harbor.&nbsp;Or explore Hawaii's underwater world on a submarine tour. The possibilities are just about endless (and so is the fun).&nbsp;</span></div></div><span data-dcnode-id="1799" instrument_node="">
