</span><div class="field-short-subtitle" data-dcnode-id="455"></div><div class="field-cta" data-dcnode-id="454"></div><div class="field-main-text field-main-text-cols-one" data-dcnode-id="452"><span data-dcnode-id="453" instrument_node="">
The Hawaiian Islands are loved by families for plenty of good reasons: there’s loads to do for kids of all ages, there’s a variety of places to eat, often with free entertainment or a kids eat free option, and there’s a raft of family-friendly places to stay. 

Beyond the beautiful beaches and hotels, there are some activities and attractions that will create lasting happy memories if you decide to explore further.

Here are 10 activities for families to experience when they’re on the island of Oahu.</span></div><span data-dcnode-id="451" instrument_node="">
</span></div><span data-dcnode-id="449" instrument_node="">
</span></div><span data-dcnode-id="447" instrument_node="">

</span><header data-dcnode-id="441"><span data-dcnode-id="444" instrument_node="">
</span><h2 class="component-title" data-dcnode-id="442"><span data-dcnode-id="443" instrument_node="">1. Free Hawaiian entertainment</span></h2></header><span data-dcnode-id="440" instrument_node="">
</span><div class="field-short-subtitle" data-dcnode-id="439"></div><div class="field-cta" data-dcnode-id="438"></div><div class="field-main-text field-main-text-cols-one" data-dcnode-id="436"><span data-dcnode-id="437" instrument_node="">
Care to learn hula or ukelele? Weave a traditional floral lei or learn Hawaiian quilting? The Royal Hawaiian Center offers free lessons throughout the week, and also has free live entertainment and hula shows most evenings. The Ala Moana Center has a daily hula show at 1pm at Centerstage, and International Market Place has everything from Hawaiian music to storytelling and lei making.</span></div><span data-dcnode-id="435" instrument_node="">
</span></div><span data-dcnode-id="433" instrument_node="">
</span></div><span data-dcnode-id="431" instrument_node="">
</span><div class="asset asset-view-mode-default asset-wrapper asset aid-10991 asset-single-column-text" data-dcnode-id="416" id="asset-aid-10991" style="background-color:#ededed;"><span data-dcnode-id="430" instrument_node="">
</span><div class="entity entity-asset" data-dcnode-id="418"><span data-dcnode-id="429" instrument_node="">
</span><header data-dcnode-id="425"><span data-dcnode-id="428" instrument_node="">
</span><h2 class="component-title" data-dcnode-id="426"><span data-dcnode-id="427" instrument_node="">2. Learn to sail an outrigger canoe together</span></h2></header><span data-dcnode-id="424" instrument_node="">
</span><div class="field-short-subtitle" data-dcnode-id="423"></div><div class="field-cta" data-dcnode-id="422"></div><div class="field-main-text field-main-text-cols-one" data-dcnode-id="420"><span data-dcnode-id="421" instrument_node="">
Family holidays are all about bonding and learning to sail is a true team effort. Paddle across the waves of Waikiki Beach, pick up some sailing tips and hear all about how the ancient Hawaiians navigated the South Pacific with nothing but the stars to guide them. </span></div><span data-dcnode-id="419" instrument_node="">
</span></div><span data-dcnode-id="417" instrument_node="">
</span></div><span data-dcnode-id="415" instrument_node="">
</span><div class="asset asset-view-mode-default asset-wrapper asset aid-10996 asset-single-column-text" data-dcnode-id="400" id="asset-aid-10996" style="background-color:#ededed;"><span data-dcnode-id="414" instrument_node="">

</span><h2 class="component-title" data-dcnode-id="410"><span data-dcnode-id="411" instrument_node="">3. Road trip to the North Shore</span></h2></header><span data-dcnode-id="408" instrument_node="">
</span><div class="field-short-subtitle" data-dcnode-id="407"></div><div class="field-cta" data-dcnode-id="406"></div><div class="field-main-text field-main-text-cols-one" data-dcnode-id="404"><span data-dcnode-id="405" instrument_node="">
Hop into a hire car and leave the hustle and bustle of Waikiki behind. Stop off at colourful roadside shacks for shave ice and locally farmed shrimp, explore local village shops and pack your swimmers for a dip along the way.</span></div><span data-dcnode-id="403" instrument_node="">
</span></div><span data-dcnode-id="401" instrument_node="">

</span><h2 class="component-title" data-dcnode-id="384"><a data-dcnode-id="385" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gohawaii.com/listing/polynesian-cultural-center/708"><span data-dcnode-id="386" instrument_node="">4. Day trip to the Polynesian Cultural Center </span></a></h2></header><span data-dcnode-id="382" instrument_node="">
</span><div class="field-short-subtitle" data-dcnode-id="381"></div><div class="field-cta" data-dcnode-id="380"></div><div class="field-main-text field-main-text-cols-one" data-dcnode-id="375"><span data-dcnode-id="379" instrument_node="">
Sneak in some education with a day out at the </span><a data-dcnode-id="377" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gohawaii.com/listing/polynesian-cultural-center/708"><span data-dcnode-id="378" instrument_node="">Polynesian Cultural Center</span></a><span data-dcnode-id="376" instrument_node="">. Built to look like a traditional grass hut village, the Polynesian Cultural Center takes you on a figurative journey through the South Pacific where you will learn about the history, culture, mythology, food and handicrafts of this vibrant region.</span></div><span data-dcnode-id="374" instrument_node="">
</span></div><span data-dcnode-id="372" instrument_node="">
</span></div><span data-dcnode-id="370" instrument_node="">
</span><div class="asset asset-view-mode-default asset-wrapper asset aid-11011 asset-single-column-text" data-dcnode-id="352" id="asset-aid-11011" style="background-color:#ededed;"><span data-dcnode-id="369" instrument_node="">
</span><div class="entity entity-asset" data-dcnode-id="354"><span data-dcnode-id="368" instrument_node="">
</span><header data-dcnode-id="364"><span data-dcnode-id="367" instrument_node="">
</span><h2 class="component-title" data-dcnode-id="365"><span data-dcnode-id="366" instrument_node="">5. Day out to the Honolulu Zoo Society</span></h2></header><span data-dcnode-id="363" instrument_node="">
</span><div class="field-short-subtitle" data-dcnode-id="362"></div><div class="field-cta" data-dcnode-id="361"></div><div class="field-main-text field-main-text-cols-one" data-dcnode-id="356"><span data-dcnode-id="360" instrument_node="">
Located a short drive from Waikiki, the </span><a data-dcnode-id="358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gohawaii.com/listing/honolulu-zoo-society/442"><span data-dcnode-id="359" instrument_node="">Honolulu Zoo</span></a><span data-dcnode-id="357" instrument_node=""> is set on 42 lush tropical acres that are often referred to as a botanical garden because it’s so beautiful. For something a little different, head along on one of the Twilight Tours held on Friday and Saturday nights.</span></div><span data-dcnode-id="355" instrument_node="">
</span></div><span data-dcnode-id="353" instrument_node="">
</span></div><span data-dcnode-id="351" instrument_node="">
</span><div class="asset asset-view-mode-default asset-wrapper asset aid-11016 asset-single-column-text" data-dcnode-id="336" id="asset-aid-11016" style="background-color:#ededed;"><span data-dcnode-id="350" instrument_node="">
</span><div class="entity entity-asset" data-dcnode-id="338"><span data-dcnode-id="349" instrument_node="">
</span><header data-dcnode-id="345"><span data-dcnode-id="348" instrument_node="">
</span><h2 class="component-title" data-dcnode-id="346"><span data-dcnode-id="347" instrument_node="">6. Diamond Head Crater hike</span></h2></header><span data-dcnode-id="344" instrument_node="">
</span><div class="field-short-subtitle" data-dcnode-id="343"></div><div class="field-cta" data-dcnode-id="342"></div><div class="field-main-text field-main-text-cols-one" data-dcnode-id="340"><span data-dcnode-id="341" instrument_node="">
Does your family enjoy a challenge? If so, lace up those sneakers, slap on some sunscreen and make your way to the Diamond Head Crater trail head. The 1.2km hike is steep but if you make it to the top, you will be rewarded with a view that includes a lighthouse, Koko Head and, in winter, passing humpback whales.</span></div><span data-dcnode-id="339" instrument_node="">
</span></div><span data-dcnode-id="337" instrument_node="">
</span></div><span data-dcnode-id="335" instrument_node="">
</span><div class="asset asset-view-mode-default asset-wrapper asset aid-11021 asset-single-column-text" data-dcnode-id="317" id="asset-aid-11021" style="background-color:#ededed;"><span data-dcnode-id="334" instrument_node="">
</span><div class="entity entity-asset" data-dcnode-id="319"><span data-dcnode-id="333" instrument_node="">
</span><header data-dcnode-id="329"><span data-dcnode-id="332" instrument_node="">
</span><h2 class="component-title" data-dcnode-id="330"><span data-dcnode-id="331" instrument_node="">7. Go deep with Atlantis Submarines</span></h2></header><span data-dcnode-id="328" instrument_node="">
</span><div class="field-short-subtitle" data-dcnode-id="327"></div><div class="field-cta" data-dcnode-id="326"></div><div class="field-main-text field-main-text-cols-one" data-dcnode-id="321"><span data-dcnode-id="325" instrument_node="">
Submarines are generally only used by the navy, super heroes and James Bond villains but you and your keikis (kids) can go under cover - the cover of water, that is - and explore the underwater world off the coast of Oahu. In </span><a data-dcnode-id="323" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gohawaii.com/listing/atlantis-submarines/722"><span data-dcnode-id="324" instrument_node="">Atlantis Submarines</span></a><span data-dcnode-id="322" instrument_node="">' fully air-conditioned vessel, you will see marine life, exotic tropical reefs and sunken vessels.</span></div><span data-dcnode-id="320" instrument_node="">

Why not take a </span><a data-dcnode-id="295" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gohawaii.com/listing/kahuku-farms/1294"><span data-dcnode-id="296" instrument_node="">Kahuku Farm</span></a><span data-dcnode-id="294" instrument_node=""> tour before you enjoy lunch in the on-site cafe? This is a true farm-to-fork experience where you can enjoy produce that has been picked that very morning.</span></div><span data-dcnode-id="292" instrument_node="">

</span><div class="field-short-subtitle" data-dcnode-id="280"></div><div class="field-cta" data-dcnode-id="279"></div><div class="field-main-text field-main-text-cols-one" data-dcnode-id="274"><span data-dcnode-id="278" instrument_node="">
You can add a dash of Disney to your holiday with a night out at the </span><a data-dcnode-id="276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gohawaii.com/listing/ka-waa-a-luau-at-aulani-a-disney-resort-spa/93391"><span data-dcnode-id="277" instrument_node="">Ka Waa Luau at Aulani</span></a><span data-dcnode-id="275" instrument_node="">, A Disney Resort and Spa. Set on the lawns of the resort, outside visitors are welcome to buy tickets for dinner and the show. The luau performance brings The Hawaiian Islands’ ancient legends and lore to life, and the dinner showcases regional specialties like Kalua pig.</span></div><span data-dcnode-id="273" instrument_node="">

</span><a data-dcnode-id="248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gohawaii.com/listing/bishop-museum/1378"><span data-dcnode-id="249" instrument_node="">The Bishop Museum</span></a><span data-dcnode-id="247" instrument_node=""> is a treasure trove of significant South Pacific artefacts, including King Kamehameha’s feathered cape and headdress, only recently returned to The Hawaiian Islands from the British Museum in the last few years. There is a planetarium where you can learn about star navigation, a special skill of the ancient Hawaiians, and there are highlight exhibitions throughout the year that focus on science and nature.</span></div><span data-dcnode-id="245" instrument_node="">
