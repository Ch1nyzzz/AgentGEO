</span><section class="title-box" data-dcnode-id="863"><span data-dcnode-id="882" instrument_node="">

</span><div class="content" data-dcnode-id="869"><span data-dcnode-id="879" instrument_node="">
</span><h2 data-dcnode-id="877"><span data-dcnode-id="878" instrument_node="">Creating Your Dream Vacation</span></h2><span data-dcnode-id="876" instrument_node="">
</span><div class="summary-content" data-dcnode-id="871"><span data-dcnode-id="875" instrument_node="">
</span><p data-dcnode-id="873"><span data-dcnode-id="874" instrument_node="">With over 60 lush and beautiful islands to discover, it's no surprise that the British Virgin Islands are known as "Nature's Little Secret." Consequently, your itinerary can be as adventurous or relaxing as you wish and can easily be adjusted if another island “floats your boat," shall we say. From boat recommendations to questions about passports, currency, crews, customs, and charts, we are here to make planning the perfect BVI vacation as easy as possible. If you need more information about the topics listed here, or anything else, please contact us.</span></p><span data-dcnode-id="872" instrument_node="">
</span></div><span data-dcnode-id="870" instrument_node="">
</span></div><span data-dcnode-id="868" instrument_node="">
</span></div><span data-dcnode-id="866" instrument_node="">

</span></section><span data-dcnode-id="862" instrument_node="">
</span><section class="callout-flexible" data-dcnode-id="628" style=""><span data-dcnode-id="861" instrument_node="">

</span><div class="details" data-dcnode-id="838"><span data-dcnode-id="849" instrument_node="">
</span><h2 data-dcnode-id="847"><span data-dcnode-id="848" instrument_node="">Arrival: MarineMax Vacations Base-Nanny Cay</span></h2><span data-dcnode-id="846" instrument_node="">
</span><div class="summary" data-dcnode-id="843"><p data-dcnode-id="844"><span data-dcnode-id="845" instrument_node="">Arrive at the beautiful BVI’s via ferry from St. Thomas or fly into Beef Island and make your way by taxi to Nanny Cay. To get a head start on your charter, choose the sleep aboard option. Stow your gear and provisions and spend your first night aboard your yacht. Or spend your first night in a hotel room at the Nanny Cay Hotel. Explore the various restaurant options onsite, whether you're hungry for pizza, BBQ, burgers, or sandwiches.</span></p></div><span data-dcnode-id="842" instrument_node="">
</span><ul class="ctas" data-dcnode-id="840"><span data-dcnode-id="841" instrument_node="">
</span></ul><span data-dcnode-id="839" instrument_node="">
</span></div><span data-dcnode-id="837" instrument_node="">

</span></li><span data-dcnode-id="833" instrument_node="">
</span><li data-dcnode-id="804"><span data-dcnode-id="832" instrument_node="">
</span><div class="callout image-left" data-dcnode-id="806"><span data-dcnode-id="831" instrument_node="">
</span><div class="image" data-dcnode-id="827"><span data-dcnode-id="830" instrument_node="">
</span><img alt="View of British Virgin Islands" data-dcnode-id="829" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.marinemax.com/-/media/images/vacations/callouts/bviitinerary-flex2-11052021.ashx%3Fh%3D278%26w%3D609%26la%3Den%26hash%3D2A4BB90F4DA051C2954A15A07BF3F66C&amp;raw"><span data-dcnode-id="828" instrument_node=""> </span></div><span data-dcnode-id="826" instrument_node="">
</span><div class="details" data-dcnode-id="808"><span data-dcnode-id="825" instrument_node="">
</span><h2 data-dcnode-id="823"><span data-dcnode-id="824" instrument_node="">Day 1: Norman Island</span></h2><span data-dcnode-id="822" instrument_node="">
</span><div class="summary" data-dcnode-id="813"><p data-dcnode-id="820"><span data-dcnode-id="821" instrument_node="">Enjoy the morning sunrise and take a stroll on the private beach or go for an early swim. Check the schedule for your boat and charter briefings. After completing your charter instruction, depart on your journey to your first destination. </span></p><span data-dcnode-id="819" instrument_node="">
</span><p data-dcnode-id="817"><span data-dcnode-id="818" instrument_node="">Cruise through the crystal-clear waters of the Sir Francis Drake Channel towards The Bight on Norman Island, rumored to be the site of Robert Louis Stevenson’s famous novel, “Treasure Island.” Grab a park buoy at the Indians along the way to swim or snorkel before entering The Bight to pick up your overnight mooring. After tying up the boat, jump on your dinghy and head to The Caves to enjoy the wonders of the coral reef and its colorful inhabitants. </span></p><span data-dcnode-id="816" instrument_node="">
</span><p data-dcnode-id="814"><span data-dcnode-id="815" instrument_node="">End the night with dinner at Pirates Night ashore, serving great food and offering the utmost in casual dining.</span></p></div><span data-dcnode-id="812" instrument_node="">
</span><ul class="ctas" data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">
</span></ul><span data-dcnode-id="809" instrument_node="">

</span><img alt="View of British Virgin Islands" data-dcnode-id="799" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.marinemax.com/-/media/images/vacations/callouts/bviitinerary-flex3-11052021.ashx%3Fh%3D278%26w%3D609%26la%3Den%26hash%3DCDD107DC30FA0E1C1D1B3E656CF1CD4C&amp;raw"><span data-dcnode-id="798" instrument_node=""> </span></div><span data-dcnode-id="796" instrument_node="">
</span><div class="details" data-dcnode-id="780"><span data-dcnode-id="795" instrument_node="">
</span><h2 data-dcnode-id="793"><span data-dcnode-id="794" instrument_node="">Day 2: The Baths</span></h2><span data-dcnode-id="792" instrument_node="">
</span><div class="summary" data-dcnode-id="785"><p data-dcnode-id="790"><span data-dcnode-id="791" instrument_node="">Next up is one of the main attractions of the islands—the famed rock formations at The Baths' enormous granite boulders. Hike the trail through the boulders to the top of the Baths restaurant for some lunch and a dip in the pool. After lunch, head to North Sound on Virgin Gorda. </span></p><span data-dcnode-id="789" instrument_node="">
</span><p data-dcnode-id="787"><span data-dcnode-id="788" instrument_node="">Head to Leverick Bay and grab a mooring ball or stay in their marina facility. Conveniently, there is a store located in the area to grab provisions or ice, if needed. Use your dinghy to cruise the bay to look for many beautiful, deserted beaches, or snorkel the Eustatia Reef. Visit the local restaurants such as Hog Heaven Bar in Virgin Gorda or Fat Virgin's Café on Biras Creek. Or travel to the iconic Bitter End Yacht Club, stunning Saba Rock restaurant or Oil Nut Bay resort.</span></p><span data-dcnode-id="786" instrument_node="">
</span></div><span data-dcnode-id="784" instrument_node="">
</span><ul class="ctas" data-dcnode-id="782"><span data-dcnode-id="783" instrument_node="">
</span></ul><span data-dcnode-id="781" instrument_node="">

</span></div><span data-dcnode-id="777" instrument_node="">

</span><div class="callout image-left" data-dcnode-id="750"><span data-dcnode-id="773" instrument_node="">
</span><div class="image" data-dcnode-id="769"><span data-dcnode-id="772" instrument_node="">
</span><img alt="View of British Virgin Islands" data-dcnode-id="771" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.marinemax.com/-/media/images/vacations/callouts/bviitinerary-flex4-11052021.ashx%3Fh%3D278%26w%3D609%26la%3Den%26hash%3DA63E7794617DAD26DCBAEC09D8640546&amp;raw"><span data-dcnode-id="770" instrument_node=""> </span></div><span data-dcnode-id="768" instrument_node="">
</span><div class="details" data-dcnode-id="752"><span data-dcnode-id="767" instrument_node="">
</span><h2 data-dcnode-id="765"><span data-dcnode-id="766" instrument_node="">Day 3: Bitter End</span></h2><span data-dcnode-id="764" instrument_node="">
</span><div class="summary" data-dcnode-id="757"><p data-dcnode-id="762"><span data-dcnode-id="763" instrument_node="">Take a swim, eat breakfast, and relax on your journey to the Bitter End Yacht Club. Enjoy this beachfront quaint gem located on the north end of Virgin Gorda. Hit the beach and relax and enjoy the various eateries in the area. Or pull out the water toys and explore the marine life of this beautiful location through the turquoise blue water. Lay by the pool or dive in and Scuba with some of the most colorful wildlife you can find. </span></p><span data-dcnode-id="761" instrument_node="">
</span><p data-dcnode-id="759"><span data-dcnode-id="760" instrument_node="">Start your journey north to Oil Nut Bay where you will moor or dock up for the remainder of the night. Enjoy the many amenities offered in the area, from spas, to tennis and yoga and so much more. Lay by the pool and scuba dive with some of the most colorful wildlife you can find. </span></p><span data-dcnode-id="758" instrument_node="">
</span></div><span data-dcnode-id="756" instrument_node="">

</span><div class="details" data-dcnode-id="724"><span data-dcnode-id="739" instrument_node="">
</span><h2 data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">Day 4: Jost Van Dyke</span></h2><span data-dcnode-id="736" instrument_node="">
</span><div class="summary" data-dcnode-id="729"><p data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">Another day in paradise, and another day with endless options. Pick up a mooring ball in Great Harbor, then enjoy and explore Foxy’s. Take your tender over to Soggy Dollar Bar for drinks and food. </span></p><span data-dcnode-id="733" instrument_node="">
</span><p data-dcnode-id="731"><span data-dcnode-id="732" instrument_node="">After you enjoy your hike to the ocean’s edge of Bubbly Pool and finish your drinks at Coco Locos Beach &amp; Sports Bar, make your way back to Great Harbor for the night.</span></p><span data-dcnode-id="730" instrument_node="">
</span></div><span data-dcnode-id="728" instrument_node="">

</span><div class="callout image-left" data-dcnode-id="694"><span data-dcnode-id="717" instrument_node="">

</span><div class="details" data-dcnode-id="696"><span data-dcnode-id="711" instrument_node="">
</span><h2 data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">Day 5: Cane Garden Bay</span></h2><span data-dcnode-id="708" instrument_node="">
</span><div class="summary" data-dcnode-id="701"><p data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">Wake up to the beautiful beachfront scenery and enjoy your ride to your next destination. This destination you have been to before, now it’s time to explore the other side of the coast. Cane Garden Bay is the center of activity in the BVI. You can spend the day at this northwestern beach swimming with the fishes, snorkeling around the western edge and enjoying great food.</span></p><span data-dcnode-id="705" instrument_node="">
</span><p data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">Happy hour and live music are aplenty in the area, so be sure to wear your dancing shoes, or follow the tradition of the BVI’s with no shoes at all. Enjoy dinner at one of the thrumming local bars like “Quito’s Gazebo,” “Elm” or “Myett’s.” When you’ve danced and you can’t dance anymore grab your dinghy and head back to your home away from home at one of the various mooring balls.</span></p><span data-dcnode-id="702" instrument_node="">
</span></div><span data-dcnode-id="700" instrument_node="">

</span><div class="details" data-dcnode-id="666"><span data-dcnode-id="683" instrument_node="">
</span><h2 data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">Day 6: Cooper Island</span></h2><span data-dcnode-id="680" instrument_node="">
</span><div class="summary" data-dcnode-id="671"><p data-dcnode-id="675"><span data-dcnode-id="679" instrument_node="">This vacation isn’t over yet! Take a morning dip in the clear blue water, grab some breakfast</span><span data-dcnode-id="677" style="background-color: #ffffff; color: #202124;"><span data-dcnode-id="678" instrument_node="">—</span></span><span data-dcnode-id="676" instrument_node="">it is time to go to Cooper Island. Pick up an overnight mooring buoy (no anchoring here please). Time for more snorkeling off Cistern Point, visiting the local shops and restaurants, and soak in the morning sun and lounge on the beach all afternoon. </span></p><span data-dcnode-id="674" instrument_node="">
</span><p data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">Head over to the Cooper Island Beach club for cold drinks and delicious food. Enjoy your last night in the islands and dream of when you’ll return soon. </span></p></div><span data-dcnode-id="670" instrument_node="">

</span><h2 data-dcnode-id="651"><span data-dcnode-id="652" instrument_node="">Day 7: Nanny Cay</span></h2><span data-dcnode-id="650" instrument_node="">
</span><div class="summary" data-dcnode-id="647"><p data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">Take your last morning dive and make your way back to the MarineMax Vacations Nanny Cay base. You can enjoy lunch at the resort and relax on the beach. Once you complete your boat debrief with our MarineMax Vacations team, we won’t be saying our good-byes, but rather, "see you later". You’ll head home with a week's worth of memories and an experience you’ll never forget.</span></p></div><span data-dcnode-id="646" instrument_node="">
