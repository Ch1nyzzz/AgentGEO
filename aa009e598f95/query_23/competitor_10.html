</span><div class="name" data-dcnode-id="1156"><span data-dcnode-id="1157" instrument_node="">Pro Tip</span></div><span data-dcnode-id="1155" instrument_node="">
</span><p data-dcnode-id="1153"><span data-dcnode-id="1154" instrument_node=""> </span></p><span data-dcnode-id="1152" instrument_node="">
</span><p data-dcnode-id="1150"><span data-dcnode-id="1151" instrument_node="">Pro tip: days 1 and 2 are best explored while you’re based on the south coast. If not feasible, simply account for longer driving times when planning your day. </span></p><span data-dcnode-id="1149" instrument_node="">
</span></div><span data-dcnode-id="1147" instrument_node="">
</span></div><span data-dcnode-id="1145" instrument_node="">
</span></div><span data-dcnode-id="1143" instrument_node="">
</span></div><span data-dcnode-id="1141" instrument_node="">
</span></section><span data-dcnode-id="1139" instrument_node="">
</span><span data-dcnode-id="1137" instrument_node="">
</span><h3 data-dcnode-id="1135" id="h-around-lihue"><span data-dcnode-id="1136" instrument_node="">Around Lihue</span></h3><span data-dcnode-id="1134" instrument_node="">
</span><p data-dcnode-id="1112"><span data-dcnode-id="1132" style="font-weight: 400;"><span data-dcnode-id="1133" instrument_node="">Lihue is the largest town in Kauai and it is here that you’ll find fast-food joints, shopping centers, large supermarkets and everything else a small town has to offer. </span></span><b data-dcnode-id="1130"><span data-dcnode-id="1131" instrument_node="">There are no must-see tourist attractions in the town itself</span></b><span data-dcnode-id="1128" style="font-weight: 400;"><span data-dcnode-id="1129" instrument_node=""> but check if your visit coincides with either the busting </span></span><a data-dcnode-id="1125" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.kauaicommunitymarket.org/location.html" rel="nofollow external noopener noreferrer" target="_blank"><span data-dcnode-id="1126" style="font-weight: 400;"><span data-dcnode-id="1127" instrument_node="">Kauai community farmers market</span></span></a><span data-dcnode-id="1123" style="font-weight: 400;"><span data-dcnode-id="1124" instrument_node=""> (Saturdays) and the smaller </span></span><a data-dcnode-id="1120" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.google.co.il/search%3Fq%3DKauai%2BGrove%2BCenter%2Bfarmers%2Bmarket%26oq%3DKauai%2BGrove%2BCenter%2Bfarmers%2Bmarket%26aqs%3Dchrome..69i57.118j0j7%26sourceid%3Dchrome%26ie%3DUTF-8" rel="nofollow external noopener noreferrer" target="_blank"><span data-dcnode-id="1121" style="font-weight: 400;"><span data-dcnode-id="1122" instrument_node="">Kauai Grove Center farmers market </span></span></a><span data-dcnode-id="1118" style="font-weight: 400;"><span data-dcnode-id="1119" instrument_node="">(Mondays) and Kauai sunshine market (Friday). Here’s a good list of all </span></span><a data-dcnode-id="1115" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tastingkauai.com/farmers-markets/" rel="nofollow external noopener noreferrer" target="_blank"><span data-dcnode-id="1116" style="font-weight: 400;"><span data-dcnode-id="1117" instrument_node="">Kauai farmer’s markets</span></span></a><span data-dcnode-id="1113" style="font-weight: 400;"><span data-dcnode-id="1114" instrument_node="">. </span></span></p><span data-dcnode-id="1111" instrument_node="">
</span><h3 data-dcnode-id="1109" id="h-menehune-fishpond-overlook"><span data-dcnode-id="1110" instrument_node="">Menehune Fishpond Overlook</span></h3><span data-dcnode-id="1108" instrument_node="">
</span><p data-dcnode-id="1096"><span data-dcnode-id="1106" style="font-weight: 400;"><span data-dcnode-id="1107" instrument_node="">A brief scenic stop away from the main highway, the overlook reveals sweeping views of the Hule’ia Valley and the river that cuts through it. In ancient times, the river was tamed to form a large pond. The best time to visit the overlook is actually just before </span></span><b data-dcnode-id="1104"><span data-dcnode-id="1105" instrument_node="">sunset</span></b><span data-dcnode-id="1102" style="font-weight: 400;"><span data-dcnode-id="1103" instrument_node="">, as the changing lights from the setting sun illuminate the valley. However, you can easily come back here for sunset (and drinks at </span></span><a data-dcnode-id="1099" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.dukeskauai.com/menus/barefoot-bar" rel="nofollow external noopener noreferrer" target="_blank"><span data-dcnode-id="1100" style="font-weight: 400;"><span data-dcnode-id="1101" instrument_node="">Duke’s Bar</span></span></a><span data-dcnode-id="1097" style="font-weight: 400;"><span data-dcnode-id="1098" instrument_node="">) but only if the skies are clear.</span></span></p><span data-dcnode-id="1095" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1092"><figure class="aligncenter" data-dcnode-id="1093"><img alt="Menehune Fishpond Overlook - Kauai Hawaii" class="wp-image-7797" data-dcnode-id="1094" data-spai-egr="1" height="433" sizes="(max-width: 650px) 100vw, 650px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shortpixel.ai/spai/q_lossy%2Bret_img%2Bto_webp/https%3A//xdaysiny.com/wp-content/uploads/2017/06/Menehune-Fishpond-Overlook-Kauai-Hawaii.jpg&amp;raw" srcset="https://cdn.shortpixel.ai/spai/q_lossy+ret_img+to_webp/https://xdaysiny.com/wp-content/uploads/2017/06/Menehune-Fishpond-Overlook-Kauai-Hawaii.jpg 650w, https://cdn.shortpixel.ai/spai/q_lossy+ret_img+to_webp/https://xdaysiny.com/wp-content/uploads/2017/06/Menehune-Fishpond-Overlook-Kauai-Hawaii-600x400.jpg 600w, https://cdn.shortpixel.ai/spai/q_lossy+ret_img+to_webp/https://xdaysiny.com/wp-content/uploads/2017/06/Menehune-Fishpond-Overlook-Kauai-Hawaii-350x233.jpg 350w, https://cdn.shortpixel.ai/spai/q_lossy+ret_img+to_webp/https://xdaysiny.com/wp-content/uploads/2017/06/Menehune-Fishpond-Overlook-Kauai-Hawaii-620x412.jpg 620w" width="650"></figure></div><span data-dcnode-id="1091" instrument_node="">
</span><h3 data-dcnode-id="1089" id="h-tunnel-of-trees"><span data-dcnode-id="1090" instrument_node="">Tunnel of Trees</span></h3><span data-dcnode-id="1088" instrument_node="">
</span><p data-dcnode-id="1085"><span data-dcnode-id="1086" style="font-weight: 400;"><span data-dcnode-id="1087" instrument_node="">Right after the turnoff to Maluhia Rd (Highway 520) from the main highway (Highway 50), you’ll drive through a brief tree-covered section rightly nicknamed the ‘tunnel of trees’. It’s about a mile-long, enchanting and cool, and in case you were wondering – man-made. For the best photo op, pull over at the fork.</span></span></p><span data-dcnode-id="1084" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1081"><figure class="aligncenter" data-dcnode-id="1082"><img alt="tunnel of trees Kauai - hawaii" class="wp-image-7360" data-dcnode-id="1083" data-spai-egr="1" height="433" sizes="(max-width: 650px) 100vw, 650px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shortpixel.ai/spai/q_lossy%2Bret_img%2Bto_webp/https%3A//xdaysiny.com/wp-content/uploads/2014/07/tunnel-of-trees-Kauai-hawaii.jpg&amp;raw" srcset="https://cdn.shortpixel.ai/spai/q_lossy+ret_img+to_webp/https://xdaysiny.com/wp-content/uploads/2014/07/tunnel-of-trees-Kauai-hawaii.jpg 650w, https://cdn.shortpixel.ai/spai/q_lossy+ret_img+to_webp/https://xdaysiny.com/wp-content/uploads/2014/07/tunnel-of-trees-Kauai-hawaii-600x400.jpg 600w, https://cdn.shortpixel.ai/spai/q_lossy+ret_img+to_webp/https://xdaysiny.com/wp-content/uploads/2014/07/tunnel-of-trees-Kauai-hawaii-350x233.jpg 350w, https://cdn.shortpixel.ai/spai/q_lossy+ret_img+to_webp/https://xdaysiny.com/wp-content/uploads/2014/07/tunnel-of-trees-Kauai-hawaii-620x412.jpg 620w" width="650"></figure></div><span data-dcnode-id="1080" instrument_node="">
</span><h3 data-dcnode-id="1078" id="h-old-koloa-town"><span data-dcnode-id="1079" instrument_node="">Old Koloa Town</span></h3><span data-dcnode-id="1077" instrument_node="">
</span><p data-dcnode-id="1064"><span data-dcnode-id="1075" style="font-weight: 400;"><span data-dcnode-id="1076" instrument_node="">Home to Hawaii’s first sugar mill (1835), </span></span><a data-dcnode-id="1072" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.oldkoloa.com/" rel="nofollow external noopener noreferrer" target="_blank"><span data-dcnode-id="1073" style="font-weight: 400;"><span data-dcnode-id="1074" instrument_node="">Old Koloa Town</span></span></a><span data-dcnode-id="1070" style="font-weight: 400;"><span data-dcnode-id="1071" instrument_node=""> is on your way so you might as well stop and have a look around. A former plantation town that’s been carefully restored into a tourist shopping complex, you’ll find here a small museum explaining the history of the region, souvenir shops, and eateries. If you happen to be here on a Monday, check out the </span></span><a data-dcnode-id="1067" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.yelp.com/biz/koloa-farmers-market-koloa" rel="nofollow external noopener noreferrer" target="_blank"><span data-dcnode-id="1068" style="font-weight: 400;"><span data-dcnode-id="1069" instrument_node="">Koloa Farmer’s Market</span></span></a><span data-dcnode-id="1065" style="font-weight: 400;"><span data-dcnode-id="1066" instrument_node=""> (noon-2 pm). </span></span></p><span data-dcnode-id="1063" instrument_node="">
</span><p data-dcnode-id="1055"><span data-dcnode-id="1061" style="font-weight: 400;"><span data-dcnode-id="1062" instrument_node="">Personally, I wasn’t a huge fan of all these ‘historic towns’ in Hawaii. You find them on almost every island. Sure, they are historical, but nowadays, they’re essentially just a collection of tacky souvenir shops. I do recommend stopping by at the </span></span><a data-dcnode-id="1058" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.yelp.com/biz/koloa-fish-market-koloa-2" rel="nofollow external noopener noreferrer" target="_blank"><span data-dcnode-id="1059" style="font-weight: 400;"><span data-dcnode-id="1060" instrument_node="">Koloa Fish Market</span></span></a><span data-dcnode-id="1056" style="font-weight: 400;"><span data-dcnode-id="1057" instrument_node=""> for some lunch to go (excellent poke bowls and traditional Hawaiian plate lunches).</span></span></p><span data-dcnode-id="1054" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1051"><figure class="aligncenter" data-dcnode-id="1052"><img alt="Old Koloa Town - Kauai - Hawaii" class="wp-image-7799" data-dcnode-id="1053" data-spai-egr="1" height="433" sizes="(max-width: 650px) 100vw, 650px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shortpixel.ai/spai/q_lossy%2Bret_img%2Bto_webp/https%3A//xdaysiny.com/wp-content/uploads/2017/06/Old-Koloa-Town-Kauai-Hawaii.jpg&amp;raw" srcset="https://cdn.shortpixel.ai/spai/q_lossy+ret_img+to_webp/https://xdaysiny.com/wp-content/uploads/2017/06/Old-Koloa-Town-Kauai-Hawaii.jpg 650w, https://cdn.shortpixel.ai/spai/q_lossy+ret_img+to_webp/https://xdaysiny.com/wp-content/uploads/2017/06/Old-Koloa-Town-Kauai-Hawaii-600x400.jpg 600w, https://cdn.shortpixel.ai/spai/q_lossy+ret_img+to_webp/https://xdaysiny.com/wp-content/uploads/2017/06/Old-Koloa-Town-Kauai-Hawaii-350x233.jpg 350w, https://cdn.shortpixel.ai/spai/q_lossy+ret_img+to_webp/https://xdaysiny.com/wp-content/uploads/2017/06/Old-Koloa-Town-Kauai-Hawaii-620x412.jpg 620w" width="650"></figure></div><span data-dcnode-id="1050" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1047"><figure class="aligncenter" data-dcnode-id="1048"><img alt="Old Koloa Town - Kauai - Hawaii - shops" class="wp-image-7798" data-dcnode-id="1049" data-spai-egr="1" height="433" sizes="(max-width: 650px) 100vw, 650px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shortpixel.ai/spai/q_lossy%2Bret_img%2Bto_webp/https%3A//xdaysiny.com/wp-content/uploads/2017/06/Old-Koloa-Town-Kauai-Hawaii-shops.jpg&amp;raw" srcset="https://cdn.shortpixel.ai/spai/q_lossy+ret_img+to_webp/https://xdaysiny.com/wp-content/uploads/2017/06/Old-Koloa-Town-Kauai-Hawaii-shops.jpg 650w, https://cdn.shortpixel.ai/spai/q_lossy+ret_img+to_webp/https://xdaysiny.com/wp-content/uploads/2017/06/Old-Koloa-Town-Kauai-Hawaii-shops-600x400.jpg 600w, https://cdn.shortpixel.ai/spai/q_lossy+ret_img+to_webp/https://xdaysiny.com/wp-content/uploads/2017/06/Old-Koloa-Town-Kauai-Hawaii-shops-350x233.jpg 350w, https://cdn.shortpixel.ai/spai/q_lossy+ret_img+to_webp/https://xdaysiny.com/wp-content/uploads/2017/06/Old-Koloa-Town-Kauai-Hawaii-shops-620x412.jpg 620w" width="650"></figure></div><span data-dcnode-id="1046" instrument_node="">
</span><h3 data-dcnode-id="1044" id="h-shipwreck-beach"><span data-dcnode-id="1045" instrument_node="">Shipwreck Beach</span></h3><span data-dcnode-id="1043" instrument_node="">
</span><p data-dcnode-id="1035"><span data-dcnode-id="1041" style="font-weight: 400;"><span data-dcnode-id="1042" instrument_node="">This would be the south coast’s prettiest beach if it weren’t for the massive </span></span><a data-dcnode-id="1038" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.booking.com/hotel/us/grand-hyatt-kauai-resort-amp-spa.html%3Faid%3D815721%26no_rooms%3D1%26group_adults%3D1" rel="nofollow external noopener noreferrer" target="_blank"><span data-dcnode-id="1039" style="font-weight: 400;"><span data-dcnode-id="1040" instrument_node="">Hyatt resort</span></span></a><span data-dcnode-id="1036" style="font-weight: 400;"><span data-dcnode-id="1037" instrument_node=""> which reminds you we’re still in America after all. Shipwreck Beach is blessed with soft golden sand and its shaded grassy area has picnic tables. Though the water looks very inviting, swimming can be very hazardous so perhaps just work on your tan, have lunch and rest before the upcoming hike.</span></span></p><span data-dcnode-id="1034" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1031"><figure class="aligncenter" data-dcnode-id="1032"><img alt="Shipwreck Beach - Poipu - Kauai - Hawaii_2" class="wp-image-7800" data-dcnode-id="1033" data-spai-egr="1" height="433" sizes="(max-width: 650px) 100vw, 650px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shortpixel.ai/spai/q_lossy%2Bret_img%2Bto_webp/https%3A//xdaysiny.com/wp-content/uploads/2017/06/Shipwreck-Beach-Poipu-Kauai-Hawaii_2.jpg&amp;raw" srcset="https://cdn.shortpixel.ai/spai/q_lossy+ret_img+to_webp/https://xdaysiny.com/wp-content/uploads/2017/06/Shipwreck-Beach-Poipu-Kauai-Hawaii_2.jpg 650w, https://cdn.shortpixel.ai/spai/q_lossy+ret_img+to_webp/https://xdaysiny.com/wp-content/uploads/2017/06/Shipwreck-Beach-Poipu-Kauai-Hawaii_2-600x400.jpg 600w, https://cdn.shortpixel.ai/spai/q_lossy+ret_img+to_webp/https://xdaysiny.com/wp-content/uploads/2017/06/Shipwreck-Beach-Poipu-Kauai-Hawaii_2-350x233.jpg 350w, https://cdn.shortpixel.ai/spai/q_lossy+ret_img+to_webp/https://xdaysiny.com/wp-content/uploads/2017/06/Shipwreck-Beach-Poipu-Kauai-Hawaii_2-620x412.jpg 620w" width="650"></figure></div><span data-dcnode-id="1030" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1027"><figure class="aligncenter" data-dcnode-id="1028"><img alt="Shipwreck Beach - Poipu - Kauai - Hawaii" class="wp-image-7801" data-dcnode-id="1029" data-spai-egr="1" height="433" sizes="(max-width: 650px) 100vw, 650px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shortpixel.ai/spai/q_lossy%2Bret_img%2Bto_webp/https%3A//xdaysiny.com/wp-content/uploads/2017/06/Shipwreck-Beach-Poipu-Kauai-Hawaii.jpg&amp;raw" srcset="https://cdn.shortpixel.ai/spai/q_lossy+ret_img+to_webp/https://xdaysiny.com/wp-content/uploads/2017/06/Shipwreck-Beach-Poipu-Kauai-Hawaii.jpg 650w, https://cdn.shortpixel.ai/spai/q_lossy+ret_img+to_webp/https://xdaysiny.com/wp-content/uploads/2017/06/Shipwreck-Beach-Poipu-Kauai-Hawaii-600x400.jpg 600w, https://cdn.shortpixel.ai/spai/q_lossy+ret_img+to_webp/https://xdaysiny.com/wp-content/uploads/2017/06/Shipwreck-Beach-Poipu-Kauai-Hawaii-350x233.jpg 350w, https://cdn.shortpixel.ai/spai/q_lossy+ret_img+to_webp/https://xdaysiny.com/wp-content/uploads/2017/06/Shipwreck-Beach-Poipu-Kauai-Hawaii-620x412.jpg 620w" width="650"></figure></div><span data-dcnode-id="1026" instrument_node="">
</span><h3 data-dcnode-id="1024" id="h-mahaulepu-heritage-coastal-trail"><span data-dcnode-id="1025" instrument_node="">Mahaulepu Heritage Coastal Trail</span></h3><span data-dcnode-id="1023" instrument_node="">
</span><p data-dcnode-id="1016"><span data-dcnode-id="1021" style="font-weight: 400;"><span data-dcnode-id="1022" instrument_node="">Likely </span></span><b data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node="">the highlight of the day</span></b><span data-dcnode-id="1017" style="font-weight: 400;"><span data-dcnode-id="1018" instrument_node="">, it’s time to slip into your hiking shoes and embark on an easy scenic hike along the coastline on the Mahaulepu Heritage Coastal Trail. The trail starts at Shipwreck Beach and ends two miles east in remote Ha’ula Beach (can drive here with a 4WD). </span></span></p><span data-dcnode-id="1015" instrument_node="">
</span><p data-dcnode-id="1008"><span data-dcnode-id="1013" style="font-weight: 400;"><span data-dcnode-id="1014" instrument_node="">The trail begins with a brief climb to </span></span><b data-dcnode-id="1011"><span data-dcnode-id="1012" instrument_node="">Makawehi Point</span></b><span data-dcnode-id="1009" style="font-weight: 400;"><span data-dcnode-id="1010" instrument_node=""> via the ironwood forest. From here, you’re treated to panoramic views of Shipwreck Beach and the rugged coastline which you’ll now be hiking along. The cliff is also a favorite spot for locals and overconfident tourists who bravely (or foolishly) take the plunge. </span></span></p><span data-dcnode-id="1007" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1004"><figure class="aligncenter" data-dcnode-id="1005"><img alt="Makawehi Point - Mahaulepu Heritage Coastal Trail - Shipwreck Beach - Kauai Hawaii" class="wp-image-7802" data-dcnode-id="1006" data-spai-egr="1" height="433" sizes="(max-width: 650px) 100vw, 650px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shortpixel.ai/spai/q_lossy%2Bret_img%2Bto_webp/https%3A//xdaysiny.com/wp-content/uploads/2017/06/Makawehi-Point-Mahaulepu-Heritage-Coastal-Trail-Shipwreck-Beach-Kauai-Hawaii.jpg&amp;raw" srcset="https://cdn.shortpixel.ai/spai/q_lossy+ret_img+to_webp/https://xdaysiny.com/wp-content/uploads/2017/06/Makawehi-Point-Mahaulepu-Heritage-Coastal-Trail-Shipwreck-Beach-Kauai-Hawaii.jpg 650w, https://cdn.shortpixel.ai/spai/q_lossy+ret_img+to_webp/https://xdaysiny.com/wp-content/uploads/2017/06/Makawehi-Point-Mahaulepu-Heritage-Coastal-Trail-Shipwreck-Beach-Kauai-Hawaii-600x400.jpg 600w, https://cdn.shortpixel.ai/spai/q_lossy+ret_img+to_webp/https://xdaysiny.com/wp-content/uploads/2017/06/Makawehi-Point-Mahaulepu-Heritage-Coastal-Trail-Shipwreck-Beach-Kauai-Hawaii-350x233.jpg 350w, https://cdn.shortpixel.ai/spai/q_lossy+ret_img+to_webp/https://xdaysiny.com/wp-content/uploads/2017/06/Makawehi-Point-Mahaulepu-Heritage-Coastal-Trail-Shipwreck-Beach-Kauai-Hawaii-620x412.jpg 620w" width="650"></figure></div><span data-dcnode-id="1003" instrument_node="">
</span><p data-dcnode-id="1000"><span data-dcnode-id="1001" style="font-weight: 400;"><span data-dcnode-id="1002" instrument_node="">From Makawehi Point, the hike is mostly flat going and even if you veer off the sandy main trail, the general direction is pretty clear. Before the halfway mark, you’ll reach a gorgeous cove that’s hugged by sharp limestone pinnacles. On this side of the island, the strong winds have beautifully sculpted the eroding limestone in magnificent works of natural art and it is all yours to enjoy with very few people on the trail.</span></span></p><span data-dcnode-id="999" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="996"><figure class="aligncenter" data-dcnode-id="997"><img alt="Eroded sharp limestone sea cliffs - Maha'ulepu Heritage Trail - Kauai, Hawaii" class="wp-image-7325" data-dcnode-id="998" data-spai-egr="1" height="433" sizes="(max-width: 650px) 100vw, 650px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shortpixel.ai/spai/q_lossy%2Bret_img%2Bto_webp/https%3A//xdaysiny.com/wp-content/uploads/2014/07/Eroded-sharp-limestone-sea-cliffs-Mahaulepu-Heritage-Trail-Kauai-Hawaii.jpg&amp;raw" srcset="https://cdn.shortpixel.ai/spai/q_lossy+ret_img+to_webp/https://xdaysiny.com/wp-content/uploads/2014/07/Eroded-sharp-limestone-sea-cliffs-Mahaulepu-Heritage-Trail-Kauai-Hawaii.jpg 650w, https://cdn.shortpixel.ai/spai/q_lossy+ret_img+to_webp/https://xdaysiny.com/wp-content/uploads/2014/07/Eroded-sharp-limestone-sea-cliffs-Mahaulepu-Heritage-Trail-Kauai-Hawaii-600x400.jpg 600w, https://cdn.shortpixel.ai/spai/q_lossy+ret_img+to_webp/https://xdaysiny.com/wp-content/uploads/2014/07/Eroded-sharp-limestone-sea-cliffs-Mahaulepu-Heritage-Trail-Kauai-Hawaii-350x233.jpg 350w, https://cdn.shortpixel.ai/spai/q_lossy+ret_img+to_webp/https://xdaysiny.com/wp-content/uploads/2014/07/Eroded-sharp-limestone-sea-cliffs-Mahaulepu-Heritage-Trail-Kauai-Hawaii-620x412.jpg 620w" width="650"></figure></div><span data-dcnode-id="995" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="992"><figure class="aligncenter" data-dcnode-id="993"><img alt="Mahaulepu Heritage Coastal Trail - Kauai - Hawaii" class="wp-image-7803" data-dcnode-id="994" data-spai-egr="1" height="433" sizes="(max-width: 650px) 100vw, 650px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shortpixel.ai/spai/q_lossy%2Bret_img%2Bto_webp/https%3A//xdaysiny.com/wp-content/uploads/2017/06/Mahaulepu-Heritage-Coastal-Trail-Kauai-Hawaii.jpg&amp;raw" srcset="https://cdn.shortpixel.ai/spai/q_lossy+ret_img+to_webp/https://xdaysiny.com/wp-content/uploads/2017/06/Mahaulepu-Heritage-Coastal-Trail-Kauai-Hawaii.jpg 650w, https://cdn.shortpixel.ai/spai/q_lossy+ret_img+to_webp/https://xdaysiny.com/wp-content/uploads/2017/06/Mahaulepu-Heritage-Coastal-Trail-Kauai-Hawaii-600x400.jpg 600w, https://cdn.shortpixel.ai/spai/q_lossy+ret_img+to_webp/https://xdaysiny.com/wp-content/uploads/2017/06/Mahaulepu-Heritage-Coastal-Trail-Kauai-Hawaii-350x233.jpg 350w, https://cdn.shortpixel.ai/spai/q_lossy+ret_img+to_webp/https://xdaysiny.com/wp-content/uploads/2017/06/Mahaulepu-Heritage-Coastal-Trail-Kauai-Hawaii-620x412.jpg 620w" width="650"></figure></div><span data-dcnode-id="991" instrument_node="">
</span><p data-dcnode-id="984"><span data-dcnode-id="989" style="font-weight: 400;"><span data-dcnode-id="990" instrument_node="">Moving along, you’ll pass by the sacred remnants of an ancient Hawaiian structure as you round the golf course. It is here that you might, with a bit of luck, spot </span></span><b data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">sea turtles </span></b><span data-dcnode-id="985" style="font-weight: 400;"><span data-dcnode-id="986" instrument_node="">cruising up and down the coast. At this point, you can either turn around or continue to Makauwahi Cave, Mahaulepu Beach and even further to Ha’ula Beach. </span></span></p><span data-dcnode-id="983" instrument_node="">
</span><p data-dcnode-id="978"><b data-dcnode-id="981"><span data-dcnode-id="982" instrument_node="">Logistics</span></b><span data-dcnode-id="979" style="font-weight: 400;"><span data-dcnode-id="980" instrument_node="">: wear comfortable walking shoes, bring lots of water and wear a hat as there’s no shade along the trail. </span></span></p><span data-dcnode-id="977" instrument_node="">
</span><h3 data-dcnode-id="975" id="h-makauwahi-cave-mahaulepu-beach"><span data-dcnode-id="976" instrument_node="">Makauwahi Cave &amp; Mahaulepu Beach</span></h3><span data-dcnode-id="974" instrument_node="">
</span><p data-dcnode-id="962"><span data-dcnode-id="972" style="font-weight: 400;"><span data-dcnode-id="973" instrument_node="">One of the coolest spots in Kauai, the </span></span><a data-dcnode-id="969" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cavereserve.org/" rel="nofollow external noopener noreferrer" target="_blank"><span data-dcnode-id="970" style="font-weight: 400;"><span data-dcnode-id="971" instrument_node="">Makauwahi Cave</span></span></a><span data-dcnode-id="967" style="font-weight: 400;"><span data-dcnode-id="968" instrument_node=""> is reached via a giant sinkhole and is regarded as </span></span><b data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">one of the richest fossil sites in Hawaii</span></b><span data-dcnode-id="963" style="font-weight: 400;"><span data-dcnode-id="964" instrument_node=""> and perhaps the entire Pacific. It has only recently been excavated and is not that frequented by the masses. Through years of detective work, researchers have partially managed to peel the layers of mystery around the religious rituals that were performed on this site by ancient Hawaiians. They have also discovered rare animal species, fossil remains and peculiar “magic tricks” performed by algae. This place is so unique and beautiful, that even Hollywood took notice. Scenes from Pirates of the Caribbean and one of the Indiana Jones films were shot right here! </span></span></p><span data-dcnode-id="961" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="958"><figure class="aligncenter" data-dcnode-id="959"><img alt="Makauwahi Cave - kauai - Photo by Tony Crider" class="wp-image-7805" data-dcnode-id="960" data-spai-egr="1" height="364" sizes="(max-width: 650px) 100vw, 650px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shortpixel.ai/spai/q_lossy%2Bret_img%2Bto_webp/https%3A//xdaysiny.com/wp-content/uploads/2017/06/Makauwahi-Cave-kauai-Photo-by-Tony-Crider.jpg&amp;raw" srcset="https://cdn.shortpixel.ai/spai/q_lossy+ret_img+to_webp/https://xdaysiny.com/wp-content/uploads/2017/06/Makauwahi-Cave-kauai-Photo-by-Tony-Crider.jpg 650w, https://cdn.shortpixel.ai/spai/q_lossy+ret_img+to_webp/https://xdaysiny.com/wp-content/uploads/2017/06/Makauwahi-Cave-kauai-Photo-by-Tony-Crider-600x336.jpg 600w, https://cdn.shortpixel.ai/spai/q_lossy+ret_img+to_webp/https://xdaysiny.com/wp-content/uploads/2017/06/Makauwahi-Cave-kauai-Photo-by-Tony-Crider-350x196.jpg 350w" title="Image via Flickr by Tony Crider" width="650"></figure></div><span data-dcnode-id="957" instrument_node="">
</span><p data-dcnode-id="950"><span data-dcnode-id="955" style="font-weight: 400;"><span data-dcnode-id="956" instrument_node="">A short walk from the cave brings you to Lida’s Field of Dreams, a private conservation project where you can get closely acquainted with large turtles. From here, it’s a stone’s throw away to </span></span><b data-dcnode-id="953"><span data-dcnode-id="954" instrument_node="">Mahaulepu Beach</span></b><span data-dcnode-id="951" style="font-weight: 400;"><span data-dcnode-id="952" instrument_node=""> (a.k.a Gillin’s Beach). It’s one of the wildest beaches in Kauai, where clothing is optional and snorkeling is good at its western edge when the ocean is calm. </span></span></p><span data-dcnode-id="949" instrument_node="">
</span><p data-dcnode-id="946"><span data-dcnode-id="947" style="font-weight: 400;"><span data-dcnode-id="948" instrument_node="">Come here to chill, swim, snorkel or just for a quick stroll but bring everything you need because there’s nothing man-made around here aside from a historic off-the-grid home. On some days (especially after storms), beach water might be contaminated from the nearby stream, but there will be signs in such cases. </span></span></p><span data-dcnode-id="945" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="942"><figure class="aligncenter" data-dcnode-id="943"><img alt="Mahaulepu Beach - Kauai Hawaii - by DarTar" class="wp-image-7806" data-dcnode-id="944" data-spai-egr="1" height="199" sizes="(max-width: 650px) 100vw, 650px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shortpixel.ai/spai/q_lossy%2Bret_img%2Bto_webp/https%3A//xdaysiny.com/wp-content/uploads/2017/06/Mahaulepu-Beach-Kauai-Hawaii-by-DarTar.jpg&amp;raw" srcset="https://cdn.shortpixel.ai/spai/q_lossy+ret_img+to_webp/https://xdaysiny.com/wp-content/uploads/2017/06/Mahaulepu-Beach-Kauai-Hawaii-by-DarTar.jpg 650w, https://cdn.shortpixel.ai/spai/q_lossy+ret_img+to_webp/https://xdaysiny.com/wp-content/uploads/2017/06/Mahaulepu-Beach-Kauai-Hawaii-by-DarTar-600x184.jpg 600w, https://cdn.shortpixel.ai/spai/q_lossy+ret_img+to_webp/https://xdaysiny.com/wp-content/uploads/2017/06/Mahaulepu-Beach-Kauai-Hawaii-by-DarTar-350x107.jpg 350w" title="Image via Wikimedia by DarTar" width="650"></figure></div><span data-dcnode-id="941" instrument_node="">
</span><p data-dcnode-id="931"><b data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">Logistics</span></b><span data-dcnode-id="937" style="font-weight: 400;"><span data-dcnode-id="938" instrument_node="">: you can reach the cave and beach via the Mahaulepu Heritage Coastal Trail or drive here on the dirt road which begins right after the </span></span><a data-dcnode-id="934" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.booking.com/hotel/us/grand-hyatt-kauai-resort-amp-spa.html%3Faid%3D815721%26no_rooms%3D1%26group_adults%3D1" rel="nofollow external noopener noreferrer" target="_blank"><span data-dcnode-id="935" style="font-weight: 400;"><span data-dcnode-id="936" instrument_node="">Grand Hyatt</span></span></a><span data-dcnode-id="932" style="font-weight: 400;"><span data-dcnode-id="933" instrument_node="">. When you reach a gate, turn right and park along the fence of the horse ranch. Free (and very interesting) guided tours are offered by the researchers themselves throughout most of the week (9 am-2 pm) and donations are highly appreciated. </span></span></p><span data-dcnode-id="930" instrument_node="">
</span><h3 data-dcnode-id="928" id="h-poipu-to-hanapepe"><span data-dcnode-id="929" instrument_node="">Poipu to Hanapepe</span></h3><span data-dcnode-id="927" instrument_node="">
</span><p data-dcnode-id="919"><span data-dcnode-id="925" style="font-weight: 400;"><span data-dcnode-id="926" instrument_node="">It’s about a 25-minute drive from Poipu to Hanapepe – the last leg of the day. After all that walking and soaking in the sun, make a pit stop at </span></span><a data-dcnode-id="922" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thefreshshave.com/" rel="nofollow external noopener noreferrer" target="_blank"><b data-dcnode-id="923"><span data-dcnode-id="924" instrument_node="">The Fresh Shave Ice</span></b></a><span data-dcnode-id="920" style="font-weight: 400;"><span data-dcnode-id="921" instrument_node="">. It’s the best shave ice in Kauai and they quickly run out of popular flavors (~$6 per cup). &nbsp;</span></span></p><span data-dcnode-id="918" instrument_node="">
</span><p data-dcnode-id="911"><span data-dcnode-id="916" style="font-weight: 400;"><span data-dcnode-id="917" instrument_node="">At mile marker 14, stop at the signposted </span></span><b data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">Hanapepe Valley Lookout </span></b><span data-dcnode-id="912" style="font-weight: 400;"><span data-dcnode-id="913" instrument_node="">and catch a preview of the type of spectacular scenery waiting in tomorrow’s trip to Waimea Canyon. The lush Hanapepe Valley is prime agricultural land and you should already spot the reddish color of the soil that you’ll be more acquainted with tomorrow.</span></span></p><span data-dcnode-id="910" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="907"><figure class="aligncenter" data-dcnode-id="908"><img alt="Hanapepe Valley Lookout - Kauai - Hawaii" class="wp-image-7807" data-dcnode-id="909" data-spai-egr="1" height="433" sizes="(max-width: 650px) 100vw, 650px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shortpixel.ai/spai/q_lossy%2Bret_img%2Bto_webp/https%3A//xdaysiny.com/wp-content/uploads/2017/06/Hanapepe-Valley-Lookout-Kauai-Hawaii.jpg&amp;raw" srcset="https://cdn.shortpixel.ai/spai/q_lossy+ret_img+to_webp/https://xdaysiny.com/wp-content/uploads/2017/06/Hanapepe-Valley-Lookout-Kauai-Hawaii.jpg 650w, https://cdn.shortpixel.ai/spai/q_lossy+ret_img+to_webp/https://xdaysiny.com/wp-content/uploads/2017/06/Hanapepe-Valley-Lookout-Kauai-Hawaii-600x400.jpg 600w, https://cdn.shortpixel.ai/spai/q_lossy+ret_img+to_webp/https://xdaysiny.com/wp-content/uploads/2017/06/Hanapepe-Valley-Lookout-Kauai-Hawaii-350x233.jpg 350w, https://cdn.shortpixel.ai/spai/q_lossy+ret_img+to_webp/https://xdaysiny.com/wp-content/uploads/2017/06/Hanapepe-Valley-Lookout-Kauai-Hawaii-620x412.jpg 620w" width="650"></figure></div><span data-dcnode-id="906" instrument_node="">
</span><h3 data-dcnode-id="904" id="h-hanapepe"><span data-dcnode-id="905" instrument_node="">Hanapepe</span></h3><span data-dcnode-id="903" instrument_node="">
</span><p data-dcnode-id="896"><span data-dcnode-id="901" style="font-weight: 400;"><span data-dcnode-id="902" instrument_node="">Dubbed ‘Kauai’s Biggest Little Town’, Hanapepe is actually super tiny. This charming town (I shouldn’t even call it that) was a prosperous place back in the sugar plantation days. These days, </span></span><b data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">Hanapepe is very laid back</span></b><span data-dcnode-id="897" style="font-weight: 400;"><span data-dcnode-id="898" instrument_node="">, attracting young residents who appreciate the sunshine and lack of noise. Over on the main street, Hanapepe’s old wooden structures have been well maintained and a rich art scene has developed. </span></span></p><span data-dcnode-id="895" instrument_node="">
</span><p data-dcnode-id="892"><span data-dcnode-id="893" style="font-weight: 400;"><span data-dcnode-id="894" instrument_node="">Hanapepe is a nice place to stop and stretch your legs and even base yourself at if you want to enjoy the Poipu sunshine without the crowds. For an extra bit of fun, cross the swinging bridge. As far as dining options, Hanapepe has plenty of those from the casual to the formal and even awesome local taro chips at Taro Ko Farm.</span></span></p><span data-dcnode-id="891" instrument_node="">
</span><h3 data-dcnode-id="889" id="h-sunset-in-salt-pond-beach"><span data-dcnode-id="890" instrument_node="">Sunset in Salt Pond Beach</span></h3><span data-dcnode-id="888" instrument_node="">
</span><p data-dcnode-id="880"><span data-dcnode-id="886" style="font-weight: 400;"><span data-dcnode-id="887" instrument_node="">Celebrate your first day of sightseeing in Kauai with a magical sunset in Salt Pond Park. The beach is quite popular with locals and it is named so thanks to the nearby salt ponds still in use today. There’s a beautiful crescent of golden sand, palm trees that sway in the gentle wind and even a small rocky tide pool for the kids. On a clear day, the </span></span><a data-dcnode-id="883" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.huffingtonpost.com/entry/inside-hawaiis-forbidden-island_us_559f57ece4b096729155e13a" rel="nofollow external noopener noreferrer" target="_blank"><span data-dcnode-id="884" style="font-weight: 400;"><span data-dcnode-id="885" instrument_node="">forbidden island of Ni‘ihau</span></span></a><span data-dcnode-id="881" style="font-weight: 400;"><span data-dcnode-id="882" instrument_node=""> can be seen in the distance. </span></span></p><span data-dcnode-id="879" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="876"><figure class="aligncenter" data-dcnode-id="877"><img alt="Salt Pond Beach - sunset in Kauai - Hawaii" class="wp-image-7808" data-dcnode-id="878" data-spai-egr="1" height="433" sizes="(max-width: 650px) 100vw, 650px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shortpixel.ai/spai/q_lossy%2Bret_img%2Bto_webp/https%3A//xdaysiny.com/wp-content/uploads/2017/06/Salt-Pond-Beach-sunset-in-Kauai-Hawaii.jpg&amp;raw" srcset="https://cdn.shortpixel.ai/spai/q_lossy+ret_img+to_webp/https://xdaysiny.com/wp-content/uploads/2017/06/Salt-Pond-Beach-sunset-in-Kauai-Hawaii.jpg 650w, https://cdn.shortpixel.ai/spai/q_lossy+ret_img+to_webp/https://xdaysiny.com/wp-content/uploads/2017/06/Salt-Pond-Beach-sunset-in-Kauai-Hawaii-600x400.jpg 600w, https://cdn.shortpixel.ai/spai/q_lossy+ret_img+to_webp/https://xdaysiny.com/wp-content/uploads/2017/06/Salt-Pond-Beach-sunset-in-Kauai-Hawaii-350x233.jpg 350w, https://cdn.shortpixel.ai/spai/q_lossy+ret_img+to_webp/https://xdaysiny.com/wp-content/uploads/2017/06/Salt-Pond-Beach-sunset-in-Kauai-Hawaii-620x412.jpg 620w" width="650"></figure></div><span data-dcnode-id="875" instrument_node="">
</span><p data-dcnode-id="862"><b data-dcnode-id="872"><i data-dcnode-id="873"><span data-dcnode-id="874" instrument_node="">Extra</span></i></b><i data-dcnode-id="869"><span data-dcnode-id="870" style="font-weight: 400;"><span data-dcnode-id="871" instrument_node="">: got more time? Check out the peculiar </span></span></i><b data-dcnode-id="866"><i data-dcnode-id="867"><span data-dcnode-id="868" instrument_node="">Glass Beach</span></i></b><i data-dcnode-id="863"><span data-dcnode-id="864" style="font-weight: 400;"><span data-dcnode-id="865" instrument_node="">. Thanks to a nearby recycling plant, the sand has pretty much been taken over by tiny pebbles of glass in various colors. </span></span></i></p><span data-dcnode-id="861" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="858"><figure class="aligncenter" data-dcnode-id="859"><img alt="Glass Beach - Kauai - Hawaii" class="wp-image-7810" data-dcnode-id="860" data-spai-egr="1" height="488" sizes="(max-width: 650px) 100vw, 650px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shortpixel.ai/spai/q_lossy%2Bret_img%2Bto_webp/https%3A//xdaysiny.com/wp-content/uploads/2017/06/Glass-Beach-Kauai-Hawaii.jpg&amp;raw" srcset="https://cdn.shortpixel.ai/spai/q_lossy+ret_img+to_webp/https://xdaysiny.com/wp-content/uploads/2017/06/Glass-Beach-Kauai-Hawaii.jpg 650w, https://cdn.shortpixel.ai/spai/q_lossy+ret_img+to_webp/https://xdaysiny.com/wp-content/uploads/2017/06/Glass-Beach-Kauai-Hawaii-600x450.jpg 600w, https://cdn.shortpixel.ai/spai/q_lossy+ret_img+to_webp/https://xdaysiny.com/wp-content/uploads/2017/06/Glass-Beach-Kauai-Hawaii-350x263.jpg 350w" width="650"></figure></div><span data-dcnode-id="857" instrument_node="">
