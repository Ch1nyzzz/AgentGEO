</span><h2 data-dcnode-id="1448"><span data-dcnode-id="1449" id="Day_1_Welcome_to_Waikiki"><span data-dcnode-id="1450" style="font-weight: 400;"><span data-dcnode-id="1451" instrument_node="">Day 1: Welcome to Waikiki</span></span></span></h2><span data-dcnode-id="1447" instrument_node="">
</span><p data-dcnode-id="1444"><span data-dcnode-id="1445" style="font-size: 18px;"><span data-dcnode-id="1446" instrument_node="">Aloha! Welcome to Oahu. By now you’ve stepped off the plane into the open-air airport and you’re smelling the flowers that fill the air.&nbsp;</span></span></p><span data-dcnode-id="1443" instrument_node="">
</span><p data-dcnode-id="1440"><span data-dcnode-id="1441" style="font-weight: 400;"><span data-dcnode-id="1442" instrument_node="">But before you hit vacation mode, you have a little more to do. For this itinerary, you’ll want a car. So head over to the rental car counter to pick up your car. And have patience, you’re on island time now. Those lines move a lot slower than they do on the mainland.</span></span></p><span data-dcnode-id="1439" instrument_node="">
</span><p data-dcnode-id="1431"><span data-dcnode-id="1437" style="font-weight: 400;"><span data-dcnode-id="1438" instrument_node="">Pro-tip: Have a lot of luggage or kids that you don’t want to put on a rental car shuttle? Book with Advantage, Avis, Enterprise, Hertz, or National. These rental car agencies have a desk right at the airport. And by using </span></span><a data-dcnode-id="1434" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thehawaiivacationguide.com/discount-car-rental"><b data-dcnode-id="1435"><span data-dcnode-id="1436" instrument_node="">Discount Hawaii Car Rental</span></b></a><span data-dcnode-id="1432" style="font-weight: 400;"><span data-dcnode-id="1433" instrument_node=""> you can get the best price on the island.&nbsp;</span></span></p><span data-dcnode-id="1430" instrument_node="">
</span><p data-dcnode-id="1422"><span data-dcnode-id="1428" style="font-weight: 400;"><span data-dcnode-id="1429" instrument_node="">Seriously, using </span></span><a data-dcnode-id="1425" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thehawaiivacationguide.com/discount-car-rental"><b data-dcnode-id="1426"><span data-dcnode-id="1427" instrument_node="">Discount Hawaii Car Rental</span></b></a><span data-dcnode-id="1423" style="font-weight: 400;"><span data-dcnode-id="1424" instrument_node=""> saved us over $300 on our trip to the Big Island and $60 on our trip to Oahu. That’s a lot of Mai Tais.&nbsp;</span></span></p><span data-dcnode-id="1421" instrument_node="">
</span><p data-dcnode-id="1418"><span data-dcnode-id="1419" style="font-weight: 400;"><span data-dcnode-id="1420" instrument_node="">Now that you have your car, head southeast to Waikiki. Depending on the time of day you may hit some traffic, but once you drop off your car at the hotel, you won’t be using it for the rest of the day.&nbsp;</span></span></p><span data-dcnode-id="1417" instrument_node="">
</span><p data-dcnode-id="1415"><span data-dcnode-id="1416" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1414" instrument_node="">

</span><p data-dcnode-id="1391"><span data-dcnode-id="1392" style="font-weight: 400;"><span data-dcnode-id="1393" instrument_node="">Once you’re settled in, it’s time to take in the sights of Waikiki. Take a walk from your hotel and explore Waikiki by foot. It’s only 1.5 miles long and two to three-blocks deep, so you can see everything you need to without a car. If you’re tired, don’t worry, there is a trolley or hop on hop off bus tour you can take.&nbsp;&nbsp;</span></span></p><span data-dcnode-id="1390" instrument_node="">
</span><p data-dcnode-id="1380"><span data-dcnode-id="1388" style="font-weight: 400;"><span data-dcnode-id="1389" instrument_node="">Before you set out on your walk, read this article about </span></span><a data-dcnode-id="1385" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thehawaiivacationguide.com/why-is-waikiki-beach-famous/"><span data-dcnode-id="1386" style="font-weight: 400;"><span data-dcnode-id="1387" instrument_node="">why Waikiki is famous</span></span></a><span data-dcnode-id="1383" style="font-weight: 400;"><span data-dcnode-id="1384" instrument_node="">. It’ll give you the background to appreciate everything that you see; from the Duke </span></span><span data-dcnode-id="1381" style="font-weight: 400;"><span data-dcnode-id="1382" instrument_node="">Kahanamoku statue to the eight beautiful Waikiki beaches.&nbsp;</span></span></p><span data-dcnode-id="1379" instrument_node="">

acationguide.com/wp-content/uploads/2020/02/Day-3-Itinerary-Duke-Statue-Waikiki-980x653.jpg 980w, https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-3-Itinerary-Duke-Statue-Waikiki-480x320.jpg 480w" sizes="(min-width: 0px) and (max-width: 480px) 480px, (min-width: 481px) and (max-width: 980px) 980px, (min-width: 981px) 1024px, 100vw" /&gt;</span></noscript></p><span data-dcnode-id="1374" instrument_node="">
</span><p data-dcnode-id="1366"><span data-dcnode-id="1372" style="font-weight: 400;"><span data-dcnode-id="1373" instrument_node="">After a day of travel, we recommend unwinding with drinks and music at the </span></span><a data-dcnode-id="1369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.marriott.com/hotels/travel/hnlwi-moana-surfrider-a-westin-resort-and-spa-waikiki-beach/"><span data-dcnode-id="1370" style="font-weight: 400;"><span data-dcnode-id="1371" instrument_node="">Moana Surfrider Hotel</span></span></a><span data-dcnode-id="1367" style="font-weight: 400;"><span data-dcnode-id="1368" instrument_node=""> — the first hotel in Waikiki that was opened in 1901. It’ll put you in the right Hawaiian spirit and it can almost make you feel like you’re back in 1960’s Hawaii, when the Moana was the choice location for celebrities.&nbsp;</span></span></p><span data-dcnode-id="1365" instrument_node="">

</span><p data-dcnode-id="1347"><span data-dcnode-id="1355" style="font-weight: 400;"><span data-dcnode-id="1356" instrument_node="">Most restaurants in Waikiki require a reservation (or you have to endure a long wait). If you don’t have anything booked for the evening and you don’t feel like waiting, head to </span></span><a data-dcnode-id="1352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//shopinternationalmarketplace.com/stores/the-street-food-hall-by-michael-mina"><span data-dcnode-id="1353" style="font-weight: 400;"><span data-dcnode-id="1354" instrument_node="">The Street Food Hall by Michael Mina at the International Marketplace</span></span></a><span data-dcnode-id="1350" style="font-weight: 400;"><span data-dcnode-id="1351" instrument_node="">. You’ll find great food at a good price in a relaxed atmosphere. It’s a great way to end a long day of travel.</span></span><span data-dcnode-id="1348" style="font-weight: 400;"><span data-dcnode-id="1349" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="1346" instrument_node="">
</span><p data-dcnode-id="1344"><span data-dcnode-id="1345" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1343" instrument_node="">
</span><h2 data-dcnode-id="1339"><span data-dcnode-id="1340" id="Day_2_Morning_Hike_and_Southeast_Road_Trip"><span data-dcnode-id="1341" style="font-weight: 400;"><span data-dcnode-id="1342" instrument_node="">Day 2: Morning Hike and Southeast Road Trip</span></span></span></h2><span data-dcnode-id="1338" instrument_node="">
</span><p data-dcnode-id="1335"><span data-dcnode-id="1336" style="font-weight: 400;"><span data-dcnode-id="1337" instrument_node="">Odds are you’re going to wake up very early this morning thanks to jet-lag, so let’s make the most of it.&nbsp;</span></span></p><span data-dcnode-id="1334" instrument_node="">
</span><p data-dcnode-id="1326"><span data-dcnode-id="1332" style="font-weight: 400;"><span data-dcnode-id="1333" instrument_node="">Grab a coffee and light breakfast from </span></span><a data-dcnode-id="1329" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.honolulucoffee.com/pages/moana-surfrider"><span data-dcnode-id="1330" style="font-weight: 400;"><span data-dcnode-id="1331" instrument_node="">Honolulu Coffee Company at the Moana Surfrider Hotel</span></span></a><span data-dcnode-id="1327" style="font-weight: 400;"><span data-dcnode-id="1328" instrument_node="">. You’ll need a bite to eat since your morning is going to start with a hike up a 300,000-year-old volcanic crater.&nbsp;</span></span></p><span data-dcnode-id="1325" instrument_node="">

-content/uploads/2020/02/Day-2-Honolulu-Coffee-Company-Oahu-Itinerary-1024x768.jpg 1024w, https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-2-Honolulu-Coffee-Company-Oahu-Itinerary-980x735.jpg 980w, https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-2-Honolulu-Coffee-Company-Oahu-Itinerary-480x360.jpg 480w" sizes="(min-width: 0px) and (max-width: 480px) 480px, (min-width: 481px) and (max-width: 980px) 980px, (min-width: 981px) 1024px, 100vw" /&gt;</span></noscript></p><span data-dcnode-id="1320" instrument_node="">

</span><p data-dcnode-id="1308"><span data-dcnode-id="1314" style="font-weight: 400;"><span data-dcnode-id="1315" instrument_node="">Hop in your car and head to </span></span><a data-dcnode-id="1311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dlnr.hawaii.gov/dsp/parks/oahu/diamond-head-state-monument/"><span data-dcnode-id="1312" style="font-weight: 400;"><span data-dcnode-id="1313" instrument_node="">Diamond Head, Hawaii’s most popular state park</span></span></a><span data-dcnode-id="1309" style="font-weight: 400;"><span data-dcnode-id="1310" instrument_node="">.&nbsp;</span></span></p><span data-dcnode-id="1307" instrument_node="">

ent/uploads/2020/02/Day-2-Itinerary-Diamond-Head-Hike-980x735.jpg 980w, https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-2-Itinerary-Diamond-Head-Hike-480x360.jpg 480w" sizes="(min-width: 0px) and (max-width: 480px) 480px, (min-width: 481px) and (max-width: 980px) 980px, (min-width: 981px) 1024px, 100vw" /&gt;</span></noscript></p><span data-dcnode-id="1302" instrument_node="">
</span><p data-dcnode-id="1296"><span data-dcnode-id="1297" style="font-weight: 400;"><span data-dcnode-id="1301" instrument_node="">&nbsp;</span><img alt="Day 2 Oahu Diamond Head" class="wp-image-2473 aligncenter size-large entered lazyloaded" data-dcnode-id="1300" data-lazy-sizes="(min-width: 0px) and (max-width: 480px) 480px, (min-width: 481px) 770px, 100vw" data-lazy-src="https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-2-Oahu-Diamond-Head-770x1024.jpg" data-lazy-srcset="https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-2-Oahu-Diamond-Head-770x1024.jpg 770w, https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-2-Oahu-Diamond-Head-480x639.jpg 480w" data-ll-status="loaded" height="1024" sizes="(min-width: 0px) and (max-width: 480px) 480px, (min-width: 481px) 770px, 100vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-2-Oahu-Diamond-Head-770x1024.jpg&amp;raw" srcset="https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-2-Oahu-Diamond-Head-770x1024.jpg 770w, https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-2-Oahu-Diamond-Head-480x639.jpg 480w" width="770"><noscript data-dcnode-id="1298"><span data-dcnode-id="1299" instrument_node="">&lt;img class="wp-image-2473 aligncenter size-large" src="https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-2-Oahu-Diamond-Head-770x1024.jpg" alt="Day 2 Oahu Diamond Head" width="770" height="1024" srcset="https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-2-Oahu-Diamond-Head-770x1024.jpg 770w, https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-2-Oahu-Diamond-Head-480x639.jpg 480w" sizes="(min-width: 0px) and (max-width: 480px) 480px, (min-width: 481px) 770px, 100vw" /&gt;</span></noscript></span></p><span data-dcnode-id="1295" instrument_node="">
</span><p data-dcnode-id="1293"><span data-dcnode-id="1294" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1292" instrument_node="">
</span><p data-dcnode-id="1289"><span data-dcnode-id="1290" style="font-weight: 400;"><span data-dcnode-id="1291" instrument_node="">If you get there early enough, you’ll be able to find a spot in the parking lot. Bring cash: it’s $5 per car to park or $1 per person to walk in. The hike is 1.6-miles and fairly steep, taking you up the side of the crater so you can get some fantastic views.&nbsp;</span></span></p><span data-dcnode-id="1288" instrument_node="">
</span><p data-dcnode-id="1281"><em data-dcnode-id="1282"><strong data-dcnode-id="1283"><span data-dcnode-id="1287" instrument_node="">Want to see it all without endless internet research? Our Oahu itinerary and guide gives you everything you need to know to plan your dream vacation with just one click. </span><a data-dcnode-id="1285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thehawaiivacationguide.com/best-hawaii-itineraries/"><span data-dcnode-id="1286" instrument_node="">Check it out here</span></a><span data-dcnode-id="1284" instrument_node="">.&nbsp;</span></strong></em></p><span data-dcnode-id="1280" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="1274" id="attachment_2280" style="width: 1034px"><img alt="View of Waikiki Beach from Diamond Head" aria-describedby="caption-attachment-2280" class="wp-image-2280 size-large" data-dcnode-id="1279" data-lazy-sizes="(min-width: 0px) and (max-width: 480px) 480px, (min-width: 481px) and (max-width: 980px) 980px, (min-width: 981px) 1024px, 100vw" data-lazy-src="https://thehawaiivacationguide.com/wp-content/uploads/2020/02/View-of-Waikiki-Beach-from-Diamond-Head-1024x683.jpg" data-lazy-srcset="https://thehawaiivacationguide.com/wp-content/uploads/2020/02/View-of-Waikiki-Beach-from-Diamond-Head-1024x683.jpg 1024w, https://thehawaiivacationguide.com/wp-content/uploads/2020/02/View-of-Waikiki-Beach-from-Diamond-Head-980x653.jpg 980w, https://thehawaiivacationguide.com/wp-content/uploads/2020/02/View-of-Waikiki-Beach-from-Diamond-Head-480x320.jpg 480w" height="683" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201024%20683'%3E%3C/svg%3E" width="1024"><noscript data-dcnode-id="1277"><span data-dcnode-id="1278" instrument_node="">&lt;img aria-describedby="caption-attachment-2280" class="wp-image-2280 size-large" src="https://thehawaiivacationguide.com/wp-content/uploads/2020/02/View-of-Waikiki-Beach-from-Diamond-Head-1024x683.jpg" alt="View of Waikiki Beach from Diamond Head" width="1024" height="683" srcset="https://thehawaiivacationguide.com/wp-content/uploads/2020/02/View-of-Waikiki-Beach-from-Diamond-Head-1024x683.jpg 1024w, https://thehawaiivacationguide.com/wp-content/uploads/2020/02/View-of-Waikiki-Beach-from-Diamond-Head-980x653.jpg 980w, https://thehawaiivacationguide.com/wp-content/uploads/2020/02/View-of-Waikiki-Beach-from-Diamond-Head-480x320.jpg 480w" sizes="(min-width: 0px) and (max-width: 480px) 480px, (min-width: 481px) and (max-width: 980px) 980px, (min-width: 981px) 1024px, 100vw" /&gt;</span></noscript><p class="wp-caption-text" data-dcnode-id="1275" id="caption-attachment-2280"><span data-dcnode-id="1276" instrument_node="">The view from the top of Diamond Head. The hike is easy and a great way to shake jet lag.</span></p></div><span data-dcnode-id="1273" instrument_node="">
</span><p data-dcnode-id="1270"><span data-dcnode-id="1271" style="font-weight: 400;"><span data-dcnode-id="1272" instrument_node="">Once you’ve taken in the beautiful views and you’re done with your hike, you have two options.</span></span></p><span data-dcnode-id="1269" instrument_node="">
</span><ol data-dcnode-id="1259"><span data-dcnode-id="1268" instrument_node="">
</span><li data-dcnode-id="1265"><span data-dcnode-id="1266" style="font-weight: 400;"><span data-dcnode-id="1267" instrument_node=""> You can head back to Waikiki and spend the rest of the day on the beach</span></span></li><span data-dcnode-id="1264" instrument_node="">
</span><li data-dcnode-id="1261"><span data-dcnode-id="1262" style="font-weight: 400;"><span data-dcnode-id="1263" instrument_node="">You can hop in your car and head south.&nbsp;</span></span></li><span data-dcnode-id="1260" instrument_node="">
</span></ol></div><span data-dcnode-id="1257" instrument_node="">

</span><div class="et_pb_text_inner" data-dcnode-id="941"><h3 data-dcnode-id="1244"><span data-dcnode-id="1245" id="1_Back_to_Waikiki"><span data-dcnode-id="1246" instrument_node="">1. Back to Waikiki</span></span></h3><span data-dcnode-id="1243" instrument_node="">
</span><p data-dcnode-id="1235"><span data-dcnode-id="1241" style="font-weight: 400;"><span data-dcnode-id="1242" instrument_node="">If you decide to head back to Waikiki, grab a plate lunch at the local spot </span></span><a data-dcnode-id="1238" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rainbowdrivein.com/"><span data-dcnode-id="1239" style="font-weight: 400;"><span data-dcnode-id="1240" instrument_node="">Rainbow Drive-In</span></span></a><span data-dcnode-id="1236" style="font-weight: 400;"><span data-dcnode-id="1237" instrument_node=""> first.</span></span></p><span data-dcnode-id="1234" instrument_node="">
</span><p data-dcnode-id="1230"><img alt="Day 2 Oahu Rainbow Drive-In Hawaii" class="wp-image-2472 aligncenter size-large" data-dcnode-id="1233" data-lazy-sizes="(min-width: 0px) and (max-width: 480px) 480px, (min-width: 481px) 768px, 100vw" data-lazy-src="https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-2-Oahu-Rainbow-Drive-In-Hawaii-768x1024.jpg" data-lazy-srcset="https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-2-Oahu-Rainbow-Drive-In-Hawaii-768x1024.jpg 768w, https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-2-Oahu-Rainbow-Drive-In-Hawaii-480x640.jpg 480w" height="1024" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20768%201024'%3E%3C/svg%3E" width="768"><noscript data-dcnode-id="1231"><span data-dcnode-id="1232" instrument_node="">&lt;img class="wp-image-2472 aligncenter size-large" src="https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-2-Oahu-Rainbow-Drive-In-Hawaii-768x1024.jpg" alt="Day 2 Oahu Rainbow Drive-In Hawaii" width="768" height="1024" srcset="https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-2-Oahu-Rainbow-Drive-In-Hawaii-768x1024.jpg 768w, https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-2-Oahu-Rainbow-Drive-In-Hawaii-480x640.jpg 480w" sizes="(min-width: 0px) and (max-width: 480px) 480px, (min-width: 481px) 768px, 100vw" /&gt;</span></noscript></p><span data-dcnode-id="1229" instrument_node="">
</span><p data-dcnode-id="1227"><span data-dcnode-id="1228" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1226" instrument_node="">
</span><p data-dcnode-id="1222"><img alt="Day 2 Oahu Itinerary Rainbow Drive-In" class="wp-image-2501 aligncenter size-large" data-dcnode-id="1225" data-lazy-sizes="(min-width: 0px) and (max-width: 480px) 480px, (min-width: 481px) and (max-width: 980px) 980px, (min-width: 981px) 1024px, 100vw" data-lazy-src="https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-2-Oahu-Itinerary-Rainbow-Drive-In-1024x768.jpg" data-lazy-srcset="https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-2-Oahu-Itinerary-Rainbow-Drive-In-1024x768.jpg 1024w, https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-2-Oahu-Itinerary-Rainbow-Drive-In-980x735.jpg 980w, https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-2-Oahu-Itinerary-Rainbow-Drive-In-480x360.jpg 480w" height="768" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201024%20768'%3E%3C/svg%3E" width="1024"><noscript data-dcnode-id="1223"><span data-dcnode-id="1224" instrument_node="">&lt;img class="wp-image-2501 aligncenter size-large" src="https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-2-Oahu-Itinerary-Rainbow-Drive-In-1024x768.jpg" alt="Day 2 Oahu Itinerary Rainbow Drive-In" width="1024" height="768" srcset="https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-2-Oahu-Itinerary-Rainbow-Drive-In-1024x768.jpg 1024w, https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-2-Oahu-Itinerary-Rainbow-Drive-In-980x735.jpg 980w, https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-2-Oahu-Itinerary-Rainbow-Drive-In-480x360.jpg 480w" sizes="(min-width: 0px) and (max-width: 480px) 480px, (min-width: 481px) and (max-width: 980px) 980px, (min-width: 981px) 1024px, 100vw" /&gt;</span></noscript></p><span data-dcnode-id="1221" instrument_node="">
</span><p data-dcnode-id="1219"><span data-dcnode-id="1220" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1218" instrument_node="">
</span><p data-dcnode-id="1215"><span data-dcnode-id="1216" style="font-weight: 400;"><span data-dcnode-id="1217" instrument_node="">Once you’re back in Waikiki there are plenty of activities to do if you don’t want to lay around the pool or beach. Head to the Duke Paoa Kahanamoku Statue and check out the stand-up paddle, kayak or surfboard rental options.&nbsp;</span></span></p><span data-dcnode-id="1214" instrument_node="">
</span><p data-dcnode-id="1210"><img alt="Waikiki Surf Lessons" class="wp-image-2261 aligncenter size-large" data-dcnode-id="1213" data-lazy-sizes="(min-width: 0px) and (max-width: 480px) 480px, (min-width: 481px) and (max-width: 980px) 980px, (min-width: 981px) 1024px, 100vw" data-lazy-src="https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Waikiki-Surf-Lessons-1024x683.jpg" data-lazy-srcset="https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Waikiki-Surf-Lessons-1024x683.jpg 1024w, https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Waikiki-Surf-Lessons-980x653.jpg 980w, https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Waikiki-Surf-Lessons-480x320.jpg 480w" height="683" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201024%20683'%3E%3C/svg%3E" width="1024"><noscript data-dcnode-id="1211"><span data-dcnode-id="1212" instrument_node="">&lt;img class="wp-image-2261 aligncenter size-large" src="https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Waikiki-Surf-Lessons-1024x683.jpg" alt="Waikiki Surf Lessons" width="1024" height="683" srcset="https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Waikiki-Surf-Lessons-1024x683.jpg 1024w, https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Waikiki-Surf-Lessons-980x653.jpg 980w, https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Waikiki-Surf-Lessons-480x320.jpg 480w" sizes="(min-width: 0px) and (max-width: 480px) 480px, (min-width: 481px) and (max-width: 980px) 980px, (min-width: 981px) 1024px, 100vw" /&gt;</span></noscript></p><span data-dcnode-id="1209" instrument_node="">
</span><p data-dcnode-id="1207"><span data-dcnode-id="1208" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1206" instrument_node="">
</span><h3 data-dcnode-id="1203"><span data-dcnode-id="1204" id="2_Venturing_Further_South"><span data-dcnode-id="1205" instrument_node="">2. Venturing Further South</span></span></h3><span data-dcnode-id="1202" instrument_node="">
</span><p data-dcnode-id="1199"><span data-dcnode-id="1200" style="font-weight: 400;"><span data-dcnode-id="1201" instrument_node="">If you decide to take a driving tour of the southeast coast of Oahu, you’ll follow these stops:</span></span></p><span data-dcnode-id="1198" instrument_node="">
</span><ul data-dcnode-id="1159"><span data-dcnode-id="1197" instrument_node="">
</span><li data-dcnode-id="1192" style="font-weight: 400;"><b data-dcnode-id="1195"><span data-dcnode-id="1196" instrument_node="">Lanai Lookout:</span></b><span data-dcnode-id="1193" style="font-weight: 400;"><span data-dcnode-id="1194" instrument_node=""> Enjoy the beautiful, crashing waves and try to catch a glimpse of the Hawaiian island of Lanai from this spot on a clear day. There’s plenty of parking, which makes this an easy first stop after your hike.&nbsp;</span></span></li><span data-dcnode-id="1191" instrument_node="">
</span><li data-dcnode-id="1186" style="font-weight: 400;"><b data-dcnode-id="1189"><span data-dcnode-id="1190" instrument_node="">Halona Blowhole and Halona Cove (Cockroach Beach)</span></b><span data-dcnode-id="1187" style="font-weight: 400;"><span data-dcnode-id="1188" instrument_node="">: If you have yet to see a blowhole, this is worth a stop. It’s a short trip from Lanai Lookout. After the blowhole, you can also visit the beach in Halona Cove, with it’s turquoise blue waters.</span></span></li><span data-dcnode-id="1185" instrument_node="">
</span><li data-dcnode-id="1174" style="font-weight: 400;"><b data-dcnode-id="1183"><span data-dcnode-id="1184" instrument_node="">Sandy Beach:</span></b><span data-dcnode-id="1181" style="font-weight: 400;"><span data-dcnode-id="1182" instrument_node=""> If you skipped Halona Cove and you want to admire (but not swim) a beautiful beach, make a stop at Sandy Beach. The beach is at the base of Koko crater and is beautiful. But stay out of the water — the </span></span><span data-dcnode-id="1177" style="font-weight: 400;"><a data-dcnode-id="1179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//hawaiibeachsafety.com/oahu/sandy-beach"><span data-dcnode-id="1180" instrument_node="">dangerous </span></a><span data-dcnode-id="1178" instrument_node="">shore break</span></span><span data-dcnode-id="1175" style="font-weight: 400;"><span data-dcnode-id="1176" instrument_node="">&nbsp;makes it a place you won’t want to swim. This is a famous bodyboarding beach so check out the action.</span></span></li><span data-dcnode-id="1173" instrument_node="">
</span><li data-dcnode-id="1168" style="font-weight: 400;"><b data-dcnode-id="1171"><span data-dcnode-id="1172" instrument_node="">Makapu’u Point Lighthouse Trail:</span></b><span data-dcnode-id="1169" style="font-weight: 400;"><span data-dcnode-id="1170" instrument_node=""> I know, another hike. But this one is a 2-mile round trip walk on a paved path and we like this hike even more than Diamond Head. The views from the path are outstanding. And during whale season you’ll often see whales from the trail. If you’re in the area, walking this trail is a must.</span></span></li><span data-dcnode-id="1167" instrument_node="">
</span><li data-dcnode-id="1161" style="font-weight: 400;"><b data-dcnode-id="1165"><span data-dcnode-id="1166" instrument_node="">Waimanalo Beach:</span></b><span data-dcnode-id="1164" instrument_node=""> </span><span data-dcnode-id="1162" style="font-weight: 400;"><span data-dcnode-id="1163" instrument_node="">The last stop for the day is Waimanalo beach. Cool off with a swim here after your Makapu’u Point walk. The beach is large, crescent-shaped, and less crowded than Waikiki or Lanikai (which you’ll visit tomorrow).&nbsp;</span></span></li><span data-dcnode-id="1160" instrument_node="">
</span></ul><span data-dcnode-id="1158" instrument_node="">
</span><p data-dcnode-id="1156"><span data-dcnode-id="1157" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1155" instrument_node="">
</span><p data-dcnode-id="1147"><span data-dcnode-id="1153" style="font-weight: 400;"><span data-dcnode-id="1154" instrument_node="">If you are hungry before hitting the beach, head to the </span></span><a data-dcnode-id="1150" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.google.com/maps/place/Hawaiian%2BIsland%2BCafe/%4021.348362%2C-157.7214026%2C15z/data%3D%214m5%213m4%211s0x0%3A0x553b015333868103%218m2%213d21.348362%214d-157.7214026"><span data-dcnode-id="1151" style="font-weight: 400;"><span data-dcnode-id="1152" instrument_node="">Hawaiian Island Cafe</span></span></a><span data-dcnode-id="1148" style="font-weight: 400;"><span data-dcnode-id="1149" instrument_node="">. This small, reasonably priced cafe has something for almost everyone: pizza, acai bowls, and sandwiches. Don’t let it’s laid back decor fool you, this may be one of the best meals we’ve had on the island.</span></span></p><span data-dcnode-id="1146" instrument_node="">
</span><p data-dcnode-id="1143"><span data-dcnode-id="1144" style="font-weight: 400;"><span data-dcnode-id="1145" instrument_node="">After the drive, you can head back to Waikiki either by retracing your path or by taking the stunning Pali highway back through the mountains.&nbsp;</span></span></p><span data-dcnode-id="1142" instrument_node="">
</span><p data-dcnode-id="1119"><span data-dcnode-id="1140" style="font-weight: 400;"><span data-dcnode-id="1141" instrument_node="">Once you arrive back in Waikiki, head to a restaurant on the beach for the beautiful colors at sunset. Try to make a reservation at </span></span><a data-dcnode-id="1137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dukeswaikiki.com/"><span data-dcnode-id="1138" style="font-weight: 400;"><span data-dcnode-id="1139" instrument_node="">Duke’s</span></span></a><span data-dcnode-id="1135" style="font-weight: 400;"><span data-dcnode-id="1136" instrument_node="">, </span></span><a data-dcnode-id="1132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hulagrillwaikiki.com/"><span data-dcnode-id="1133" style="font-weight: 400;"><span data-dcnode-id="1134" instrument_node="">Hula Grill</span></span></a><span data-dcnode-id="1130" style="font-weight: 400;"><span data-dcnode-id="1131" instrument_node="">, </span></span><a data-dcnode-id="1127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.halekulani.com/dining/house-without-a-key"><span data-dcnode-id="1128" style="font-weight: 400;"><span data-dcnode-id="1129" instrument_node="">House Without a Key</span></span></a><span data-dcnode-id="1125" style="font-weight: 400;"><span data-dcnode-id="1126" instrument_node="">, </span></span><a data-dcnode-id="1122" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.halekoa.com/dining-drinks/barefoot-bar"><span data-dcnode-id="1123" style="font-weight: 400;"><span data-dcnode-id="1124" instrument_node="">Barefoot Bar</span></span></a><span data-dcnode-id="1120" style="font-weight: 400;"><span data-dcnode-id="1121" instrument_node="">.</span></span></p><span data-dcnode-id="1118" instrument_node="">
</span><p data-dcnode-id="1114"><img alt="Day 3 Oahu Itinerary Waikiki Beach" class="wp-image-2485 aligncenter size-large" data-dcnode-id="1117" data-lazy-sizes="(min-width: 0px) and (max-width: 480px) 480px, (min-width: 481px) and (max-width: 980px) 980px, (min-width: 981px) 1024px, 100vw" data-lazy-src="https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-3-Oahu-Itinerary-Waikiki-Beach-1024x683.jpg" data-lazy-srcset="https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-3-Oahu-Itinerary-Waikiki-Beach-1024x683.jpg 1024w, https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-3-Oahu-Itinerary-Waikiki-Beach-980x653.jpg 980w, https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-3-Oahu-Itinerary-Waikiki-Beach-480x320.jpg 480w" height="683" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201024%20683'%3E%3C/svg%3E" width="1024"><noscript data-dcnode-id="1115"><span data-dcnode-id="1116" instrument_node="">&lt;img class="wp-image-2485 aligncenter size-large" src="https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-3-Oahu-Itinerary-Waikiki-Beach-1024x683.jpg" alt="Day 3 Oahu Itinerary Waikiki Beach" width="1024" height="683" srcset="https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-3-Oahu-Itinerary-Waikiki-Beach-1024x683.jpg 1024w, https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-3-Oahu-Itinerary-Waikiki-Beach-980x653.jpg 980w, https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-3-Oahu-Itinerary-Waikiki-Beach-480x320.jpg 480w" sizes="(min-width: 0px) and (max-width: 480px) 480px, (min-width: 481px) and (max-width: 980px) 980px, (min-width: 981px) 1024px, 100vw" /&gt;</span></noscript></p><span data-dcnode-id="1113" instrument_node="">
</span><p data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1110" instrument_node="">
</span><h2 data-dcnode-id="1106"><span data-dcnode-id="1107" id="Day_3_Historical_Sites_and_the_Windward_Side"><span data-dcnode-id="1108" style="font-weight: 400;"><span data-dcnode-id="1109" instrument_node="">Day 3: Historical Sites and the Windward Side</span></span></span></h2><span data-dcnode-id="1105" instrument_node="">
</span><p data-dcnode-id="1102"><span data-dcnode-id="1103" style="font-weight: 400;"><span data-dcnode-id="1104" instrument_node="">When we lived on Oahu this was my favorite day trip to send people on. Not too much driving, a little culture, and a lot of beautiful beach.</span></span></p><span data-dcnode-id="1101" instrument_node="">
</span><p data-dcnode-id="1093"><span data-dcnode-id="1099" style="font-weight: 400;"><span data-dcnode-id="1100" instrument_node="">Your morning starts out with another drive. Grab a quick coffee if you need it and hit the road on the Pali highway. If you’re driving on a weekday, you’ll be happy to see that you’re going in the opposite direction of the commute traffic. You’ll wind your way through the mountains and tunnels before you make your way to the </span></span><a data-dcnode-id="1096" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tripadvisor.com/Attraction_Review-g29222-d319414-Reviews-Nu_uanu_Pali-Oahu_Hawaii.html"><span data-dcnode-id="1097" style="font-weight: 400;"><span data-dcnode-id="1098" instrument_node="">Nu’uanu Pali lookout</span></span></a><span data-dcnode-id="1094" style="font-weight: 400;"><span data-dcnode-id="1095" instrument_node="">.&nbsp;</span></span></p><span data-dcnode-id="1092" instrument_node="">
</span><p data-dcnode-id="1088"><img alt="Day 3 Pali Lookout Oahu" class="wp-image-2480 aligncenter size-large" data-dcnode-id="1091" data-lazy-sizes="(min-width: 0px) and (max-width: 480px) 480px, (min-width: 481px) and (max-width: 980px) 980px, (min-width: 981px) 1024px, 100vw" data-lazy-src="https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-3-Pali-Lookout-Oahu-1024x683.jpg" data-lazy-srcset="https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-3-Pali-Lookout-Oahu-1024x683.jpg 1024w, https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-3-Pali-Lookout-Oahu-980x653.jpg 980w, https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-3-Pali-Lookout-Oahu-480x320.jpg 480w" height="683" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201024%20683'%3E%3C/svg%3E" width="1024"><noscript data-dcnode-id="1089"><span data-dcnode-id="1090" instrument_node="">&lt;img class="wp-image-2480 aligncenter size-large" src="https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-3-Pali-Lookout-Oahu-1024x683.jpg" alt="Day 3 Pali Lookout Oahu" width="1024" height="683" srcset="https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-3-Pali-Lookout-Oahu-1024x683.jpg 1024w, https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-3-Pali-Lookout-Oahu-980x653.jpg 980w, https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-3-Pali-Lookout-Oahu-480x320.jpg 480w" sizes="(min-width: 0px) and (max-width: 480px) 480px, (min-width: 481px) and (max-width: 980px) 980px, (min-width: 981px) 1024px, 100vw" /&gt;</span></noscript></p><span data-dcnode-id="1087" instrument_node="">
</span><p data-dcnode-id="1085"><span data-dcnode-id="1086" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1084" instrument_node="">
</span><p data-dcnode-id="1081"><span data-dcnode-id="1082" style="font-weight: 400;"><span data-dcnode-id="1083" instrument_node="">Here, you’ll be greeted with panoramic views from the windward side, which are even more beautiful in the early morning hours. Take in the view (and take some pictures) before you hop back in the car and make your way to Kailua town.</span></span></p><span data-dcnode-id="1080" instrument_node="">
</span><p data-dcnode-id="1077"><span data-dcnode-id="1078" style="font-weight: 400;"><span data-dcnode-id="1079" instrument_node="">By now you’re probably ready for breakfast, and Kailua has plenty of options. Our favorites are: </span></span></p><span data-dcnode-id="1076" instrument_node="">
</span><p data-dcnode-id="1073" style="padding-left: 30px;"><span data-dcnode-id="1074" style="font-weight: 400;"><span data-dcnode-id="1075" instrument_node="">🍍 Boots &amp; Kimo’s Homestyle Kitchen</span></span></p><span data-dcnode-id="1072" instrument_node="">
</span><p data-dcnode-id="1069" style="padding-left: 30px;"><span data-dcnode-id="1070" style="font-weight: 400;"><span data-dcnode-id="1071" instrument_node="">🍍 Moke’s Bread and Breakfast</span></span></p><span data-dcnode-id="1068" instrument_node="">
</span><p data-dcnode-id="1065" style="padding-left: 30px;"><span data-dcnode-id="1066" style="font-weight: 400;"><span data-dcnode-id="1067" instrument_node="">🍍 Over Easy&nbsp;</span></span></p><span data-dcnode-id="1064" instrument_node="">
</span><p data-dcnode-id="1061" style="padding-left: 30px;"><span data-dcnode-id="1062" style="font-weight: 400;"><span data-dcnode-id="1063" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="1060" instrument_node="">

d="1055" id="caption-attachment-2459"><span data-dcnode-id="1056" instrument_node="">Henry was a fan of Boots and Kimo’s fried rice and legendary pancakes.</span></p></div><span data-dcnode-id="1053" instrument_node="">
