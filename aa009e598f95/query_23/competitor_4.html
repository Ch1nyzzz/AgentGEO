</span><p data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1047" instrument_node="">
</span><p data-dcnode-id="1042" style="padding-left: 30px;"><span data-dcnode-id="1043" style="font-weight: 400;"><img alt="Boots and Kimos Oahu Itinerary Pancakes" class="wp-image-2460 aligncenter size-large" data-dcnode-id="1046" data-lazy-sizes="(min-width: 0px) and (max-width: 480px) 480px, (min-width: 481px) and (max-width: 980px) 980px, (min-width: 981px) 1024px, 100vw" data-lazy-src="https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Boots-and-Kimos-Oahu-Itinerary-Pancakes-1024x576.jpg" data-lazy-srcset="https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Boots-and-Kimos-Oahu-Itinerary-Pancakes-1024x576.jpg 1024w, https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Boots-and-Kimos-Oahu-Itinerary-Pancakes-980x551.jpg 980w, https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Boots-and-Kimos-Oahu-Itinerary-Pancakes-480x270.jpg 480w" height="576" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201024%20576'%3E%3C/svg%3E" width="1024"><noscript data-dcnode-id="1044"><span data-dcnode-id="1045" instrument_node="">&lt;img class="wp-image-2460 aligncenter size-large" src="https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Boots-and-Kimos-Oahu-Itinerary-Pancakes-1024x576.jpg" alt="Boots and Kimos Oahu Itinerary Pancakes" width="1024" height="576" srcset="https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Boots-and-Kimos-Oahu-Itinerary-Pancakes-1024x576.jpg 1024w, https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Boots-and-Kimos-Oahu-Itinerary-Pancakes-980x551.jpg 980w, https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Boots-and-Kimos-Oahu-Itinerary-Pancakes-480x270.jpg 480w" sizes="(min-width: 0px) and (max-width: 480px) 480px, (min-width: 481px) and (max-width: 980px) 980px, (min-width: 981px) 1024px, 100vw" /&gt;</span></noscript></span></p><span data-dcnode-id="1041" instrument_node="">
</span><p data-dcnode-id="1039"><span data-dcnode-id="1040" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1038" instrument_node="">
</span><p data-dcnode-id="1030"><span data-dcnode-id="1036" style="font-weight: 400;"><span data-dcnode-id="1037" instrument_node="">Or, if you’re not too hungry yet, grab a snack and a coffee at </span></span><a data-dcnode-id="1033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kalapawaimarket.com/kailua-beach/%23menu"><span data-dcnode-id="1034" style="font-weight: 400;"><span data-dcnode-id="1035" instrument_node="">Kalapawai Market</span></span></a><span data-dcnode-id="1031" style="font-weight: 400;"><span data-dcnode-id="1032" instrument_node="">.</span></span></p><span data-dcnode-id="1029" instrument_node="">
</span><p data-dcnode-id="1025"><img alt="Day 3 Oahu Kailua Coffee" class="wp-image-2469 aligncenter size-large" data-dcnode-id="1028" data-lazy-sizes="(min-width: 0px) and (max-width: 480px) 480px, (min-width: 481px) and (max-width: 980px) 980px, (min-width: 981px) 1024px, 100vw" data-lazy-src="https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-3-Oahu-Kailua-Coffee-1024x683.jpg" data-lazy-srcset="https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-3-Oahu-Kailua-Coffee-1024x683.jpg 1024w, https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-3-Oahu-Kailua-Coffee-980x653.jpg 980w, https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-3-Oahu-Kailua-Coffee-480x320.jpg 480w" height="683" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201024%20683'%3E%3C/svg%3E" width="1024"><noscript data-dcnode-id="1026"><span data-dcnode-id="1027" instrument_node="">&lt;img class="wp-image-2469 aligncenter size-large" src="https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-3-Oahu-Kailua-Coffee-1024x683.jpg" alt="Day 3 Oahu Kailua Coffee" width="1024" height="683" srcset="https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-3-Oahu-Kailua-Coffee-1024x683.jpg 1024w, https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-3-Oahu-Kailua-Coffee-980x653.jpg 980w, https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-3-Oahu-Kailua-Coffee-480x320.jpg 480w" sizes="(min-width: 0px) and (max-width: 480px) 480px, (min-width: 481px) and (max-width: 980px) 980px, (min-width: 981px) 1024px, 100vw" /&gt;</span></noscript></p><span data-dcnode-id="1024" instrument_node="">
</span><p data-dcnode-id="1022"><span data-dcnode-id="1023" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1021" instrument_node="">
</span><p data-dcnode-id="1008"><span data-dcnode-id="1019" style="font-weight: 400;"><span data-dcnode-id="1020" instrument_node="">From here you’ll head to beautiful </span></span><a data-dcnode-id="1016" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tripadvisor.com/Attraction_Review-g60652-d526149-Reviews-Lanikai_Beach-Kailua_Oahu_Hawaii.html"><span data-dcnode-id="1017" style="font-weight: 400;"><span data-dcnode-id="1018" instrument_node="">Lanikai Beach</span></span></a><span data-dcnode-id="1014" style="font-weight: 400;"><span data-dcnode-id="1015" instrument_node="">, one of the most beautiful beaches (and possibly most instagrammed beaches) on Oahu. You can choose to either spend your time laying on the beach or rent Kayaks and head out to the </span></span><a data-dcnode-id="1011" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tripadvisor.com/Attraction_Review-g29222-d109856-Reviews-Mokulua_Islands-Oahu_Hawaii.html"><span data-dcnode-id="1012" style="font-weight: 400;"><span data-dcnode-id="1013" instrument_node="">Mokulua islands</span></span></a><span data-dcnode-id="1009" style="font-weight: 400;"><span data-dcnode-id="1010" instrument_node="">. If you want to rent a kayak, you’ll do that in Kailua (near Kailua Beach) and paddle out to Lanikai Beach and Mokulua Islands.&nbsp;</span></span></p><span data-dcnode-id="1007" instrument_node="">
</span><p data-dcnode-id="1003"><img alt="Day 3 Oahu Beach day" class="wp-image-2477 aligncenter size-large" data-dcnode-id="1006" data-lazy-sizes="(min-width: 0px) and (max-width: 480px) 480px, (min-width: 481px) and (max-width: 980px) 980px, (min-width: 981px) 1024px, 100vw" data-lazy-src="https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-3-Oahu-Beach-day-1024x683.jpg" data-lazy-srcset="https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-3-Oahu-Beach-day-1024x683.jpg 1024w, https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-3-Oahu-Beach-day-980x653.jpg 980w, https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-3-Oahu-Beach-day-480x320.jpg 480w" height="683" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201024%20683'%3E%3C/svg%3E" width="1024"><noscript data-dcnode-id="1004"><span data-dcnode-id="1005" instrument_node="">&lt;img class="wp-image-2477 aligncenter size-large" src="https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-3-Oahu-Beach-day-1024x683.jpg" alt="Day 3 Oahu Beach day" width="1024" height="683" srcset="https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-3-Oahu-Beach-day-1024x683.jpg 1024w, https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-3-Oahu-Beach-day-980x653.jpg 980w, https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-3-Oahu-Beach-day-480x320.jpg 480w" sizes="(min-width: 0px) and (max-width: 480px) 480px, (min-width: 481px) and (max-width: 980px) 980px, (min-width: 981px) 1024px, 100vw" /&gt;</span></noscript></p><span data-dcnode-id="1002" instrument_node="">
</span><p data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node="">&nbsp;</span></p><span data-dcnode-id="999" instrument_node="">
</span><p data-dcnode-id="995"><img alt="Day 3 Oahu Itinerary Lanikai beach" class="wp-image-2478 aligncenter size-large" data-dcnode-id="998" data-lazy-sizes="(min-width: 0px) and (max-width: 480px) 480px, (min-width: 481px) and (max-width: 980px) 980px, (min-width: 981px) 1024px, 100vw" data-lazy-src="https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-3-Oahu-Itinerary-Lanikai-beach-1024x683.jpg" data-lazy-srcset="https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-3-Oahu-Itinerary-Lanikai-beach-1024x683.jpg 1024w, https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-3-Oahu-Itinerary-Lanikai-beach-980x653.jpg 980w, https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-3-Oahu-Itinerary-Lanikai-beach-480x320.jpg 480w" height="683" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201024%20683'%3E%3C/svg%3E" width="1024"><noscript data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">&lt;img class="wp-image-2478 aligncenter size-large" src="https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-3-Oahu-Itinerary-Lanikai-beach-1024x683.jpg" alt="Day 3 Oahu Itinerary Lanikai beach" width="1024" height="683" srcset="https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-3-Oahu-Itinerary-Lanikai-beach-1024x683.jpg 1024w, https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-3-Oahu-Itinerary-Lanikai-beach-980x653.jpg 980w, https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-3-Oahu-Itinerary-Lanikai-beach-480x320.jpg 480w" sizes="(min-width: 0px) and (max-width: 480px) 480px, (min-width: 481px) and (max-width: 980px) 980px, (min-width: 981px) 1024px, 100vw" /&gt;</span></noscript></p><span data-dcnode-id="994" instrument_node="">
</span><p data-dcnode-id="992"><span data-dcnode-id="993" instrument_node="">&nbsp;</span></p><span data-dcnode-id="991" instrument_node="">
</span><p data-dcnode-id="988"><span data-dcnode-id="989" style="font-weight: 400;"><span data-dcnode-id="990" instrument_node="">Once you’ve gotten your fill of the beach, head back into town for a quick lunch from Kalapawai Market for sandwiches, wraps, salads, or poke bowls.&nbsp;</span></span></p><span data-dcnode-id="987" instrument_node="">
</span><p data-dcnode-id="984"><span data-dcnode-id="985" style="font-weight: 400;"><span data-dcnode-id="986" instrument_node="">With the afternoon upon you, it’s time to drive back to the other side of the island and make a stop at the historical site of your choice: Pearl Harbor or Iolani Palace. Both are excellent and we highly recommend taking the time to visit at least one.&nbsp;</span></span></p><span data-dcnode-id="983" instrument_node="">
</span><p data-dcnode-id="977"><a data-dcnode-id="980" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.iolanipalace.org/"><span data-dcnode-id="981" style="font-weight: 400;"><span data-dcnode-id="982" instrument_node="">Iolani Palace</span></span></a><span data-dcnode-id="978" style="font-weight: 400;"><span data-dcnode-id="979" instrument_node="">, located in downtown Honolulu, was the royal residence of the Hawaiian monarchy. It’s the only palace in the US and offers an incredible opportunity to learn about Hawaiian culture and history.&nbsp;</span></span></p><span data-dcnode-id="976" instrument_node="">
</span><p data-dcnode-id="973"><span data-dcnode-id="974" style="font-weight: 400;"><span data-dcnode-id="975" instrument_node="">Pearl Harbor is located just north of downtown Honolulu, and holds a number of museums and memorials that you can visit, including the memorial of the submerged USS Arizona. The museums and memorials are extremely well done.&nbsp;</span></span></p><span data-dcnode-id="972" instrument_node="">
</span><p data-dcnode-id="959"><span data-dcnode-id="970" style="font-weight: 400;"><span data-dcnode-id="971" instrument_node="">A note about Pearl Harbor tickets: tickets to the visitor center and USS Arizona memorial are </span></span><i data-dcnode-id="967"><span data-dcnode-id="968" style="font-weight: 400;"><span data-dcnode-id="969" instrument_node="">free</span></span></i><span data-dcnode-id="965" style="font-weight: 400;"><span data-dcnode-id="966" instrument_node=""> on a first-come, first-serve basis. If you’re traveling during a peak time and want a free ticket, you should flip the itinerary for the day and visit Pearl Harbor first, before heading to the windward side. Tickets are also available to reserve. You can find more information on the </span></span><a data-dcnode-id="962" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nps.gov/valr/faqs.htm"><span data-dcnode-id="963" style="font-weight: 400;"><span data-dcnode-id="964" instrument_node="">National Park Service website</span></span></a><span data-dcnode-id="960" style="font-weight: 400;"><span data-dcnode-id="961" instrument_node="">.&nbsp;</span></span></p><span data-dcnode-id="958" instrument_node="">
</span><p data-dcnode-id="953"><span data-dcnode-id="956" style="font-weight: 400;"><span data-dcnode-id="957" instrument_node="">Once your tour is done, you can head back to your hotel in Waikiki for a well-deserved cocktail and relaxing evening. Try one of the spots for dinner that you didn’t make it to from the Day 2 list.&nbsp;</span></span><span data-dcnode-id="954" style="font-weight: 400;"><span data-dcnode-id="955" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="952" instrument_node="">
</span><p data-dcnode-id="948"><img alt="Day 3 Oahu Itinerary Waikiki Pools" class="wp-image-2486 aligncenter size-large" data-dcnode-id="951" data-lazy-sizes="(min-width: 0px) and (max-width: 480px) 480px, (min-width: 481px) and (max-width: 980px) 980px, (min-width: 981px) 1024px, 100vw" data-lazy-src="https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-3-Oahu-Itinerary-Waikiki-Pools-1024x683.jpg" data-lazy-srcset="https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-3-Oahu-Itinerary-Waikiki-Pools-1024x683.jpg 1024w, https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-3-Oahu-Itinerary-Waikiki-Pools-980x653.jpg 980w, https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-3-Oahu-Itinerary-Waikiki-Pools-480x320.jpg 480w" height="683" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201024%20683'%3E%3C/svg%3E" width="1024"><noscript data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">&lt;img class="wp-image-2486 aligncenter size-large" src="https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-3-Oahu-Itinerary-Waikiki-Pools-1024x683.jpg" alt="Day 3 Oahu Itinerary Waikiki Pools" width="1024" height="683" srcset="https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-3-Oahu-Itinerary-Waikiki-Pools-1024x683.jpg 1024w, https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-3-Oahu-Itinerary-Waikiki-Pools-980x653.jpg 980w, https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-3-Oahu-Itinerary-Waikiki-Pools-480x320.jpg 480w" sizes="(min-width: 0px) and (max-width: 480px) 480px, (min-width: 481px) and (max-width: 980px) 980px, (min-width: 981px) 1024px, 100vw" /&gt;</span></noscript></p><span data-dcnode-id="947" instrument_node="">
</span><p data-dcnode-id="945"><span data-dcnode-id="946" instrument_node="">&nbsp;</span></p><span data-dcnode-id="944" instrument_node="">
</span><p data-dcnode-id="942"><span data-dcnode-id="943" instrument_node="">&nbsp;</span></p></div><span data-dcnode-id="940" instrument_node="">
</span></div><div class="et_pb_module et_pb_image et_pb_image_1" data-dcnode-id="931"><span data-dcnode-id="938" instrument_node="">
</span><a data-dcnode-id="933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thehawaiivacationguide.com/best-hawaii-itineraries/" target="_blank"><span class="et_pb_image_wrap" data-dcnode-id="934"><img alt="Hawaii Vacation Guide Cheat Sheets Info" class="wp-image-5638" data-dcnode-id="937" data-lazy-sizes="(min-width: 0px) and (max-width: 480px) 480px, (min-width: 481px) 700px, 100vw" data-lazy-src="https://thehawaiivacationguide.com/wp-content/uploads/2020/03/Itinerary-in-line-ad.jpg" data-lazy-srcset="https://thehawaiivacationguide.com/wp-content/uploads/2020/03/Itinerary-in-line-ad.jpg 700w, https://thehawaiivacationguide.com/wp-content/uploads/2020/03/Itinerary-in-line-ad-480x271.jpg 480w" height="395" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20700%20395'%3E%3C/svg%3E" title="Itinerary in-line ad" width="700"><noscript data-dcnode-id="935"><span data-dcnode-id="936" instrument_node="">&lt;img width="700" height="395" src="https://thehawaiivacationguide.com/wp-content/uploads/2020/03/Itinerary-in-line-ad.jpg" alt="Hawaii Vacation Guide Cheat Sheets Info" title="Itinerary in-line ad" srcset="https://thehawaiivacationguide.com/wp-content/uploads/2020/03/Itinerary-in-line-ad.jpg 700w, https://thehawaiivacationguide.com/wp-content/uploads/2020/03/Itinerary-in-line-ad-480x271.jpg 480w" sizes="(min-width: 0px) and (max-width: 480px) 480px, (min-width: 481px) 700px, 100vw" class="wp-image-5638" /&gt;</span></noscript></span></a><span data-dcnode-id="932" instrument_node="">
</span></div><div class="et_pb_module et_pb_text et_pb_text_2 et_pb_text_align_left et_pb_bg_layout_light" data-dcnode-id="453"><span data-dcnode-id="930" instrument_node="">
</span><div class="et_pb_text_inner" data-dcnode-id="455"><h2 data-dcnode-id="926"><span data-dcnode-id="927" id="Day_4_Exploring_the_North_Shore"><span data-dcnode-id="928" style="font-weight: 400;"><span data-dcnode-id="929" instrument_node="">Day 4: Exploring the North Shore</span></span></span></h2><span data-dcnode-id="925" instrument_node="">
</span><p data-dcnode-id="922"><span data-dcnode-id="923" style="font-weight: 400;"><span data-dcnode-id="924" instrument_node="">This may sound crazy, but on day 4 we’re packing up your bags and heading to the north shore of Oahu for the night. Ok yes, it is crazy but here’s why we suggest this: there is so much to do on the north shore that missing it would be a shame. And the drive from Waikiki is long, so a day trip can take away from the whole vacation vibe feeling.&nbsp;</span></span></p><span data-dcnode-id="921" instrument_node="">
</span><p data-dcnode-id="913"><span data-dcnode-id="919" style="font-weight: 400;"><span data-dcnode-id="920" instrument_node="">Once your bags are packed and you’re ready to hit the road, set out on your overnight adventure. If you can wait, we recommend stopping for breakfast (or brunch) along the way at </span></span><a data-dcnode-id="916" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//greenworldcoffeefarm.com/"><span data-dcnode-id="917" style="font-weight: 400;"><span data-dcnode-id="918" instrument_node="">Green World Coffee Farm in Wahiawa</span></span></a><span data-dcnode-id="914" style="font-weight: 400;"><span data-dcnode-id="915" instrument_node="">. The coffee farm is 30-40 minutes from Waikiki. Here, you can stop for food, coffee, and even a coffee roasting tour.&nbsp;</span></span></p><span data-dcnode-id="912" instrument_node="">
</span><p data-dcnode-id="908"><img alt="Day 4 Oahu Coffee Farm Tour" class="wp-image-2499 aligncenter size-large" data-dcnode-id="911" data-lazy-sizes="(min-width: 0px) and (max-width: 480px) 480px, (min-width: 481px) and (max-width: 980px) 980px, (min-width: 981px) 1024px, 100vw" data-lazy-src="https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-4-Oahu-Coffee-Farm-Tour-1024x768.jpg" data-lazy-srcset="https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-4-Oahu-Coffee-Farm-Tour-1024x768.jpg 1024w, https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-4-Oahu-Coffee-Farm-Tour-980x735.jpg 980w, https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-4-Oahu-Coffee-Farm-Tour-480x360.jpg 480w" height="768" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201024%20768'%3E%3C/svg%3E" width="1024"><noscript data-dcnode-id="909"><span data-dcnode-id="910" instrument_node="">&lt;img class="wp-image-2499 aligncenter size-large" src="https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-4-Oahu-Coffee-Farm-Tour-1024x768.jpg" alt="Day 4 Oahu Coffee Farm Tour" width="1024" height="768" srcset="https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-4-Oahu-Coffee-Farm-Tour-1024x768.jpg 1024w, https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-4-Oahu-Coffee-Farm-Tour-980x735.jpg 980w, https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-4-Oahu-Coffee-Farm-Tour-480x360.jpg 480w" sizes="(min-width: 0px) and (max-width: 480px) 480px, (min-width: 481px) and (max-width: 980px) 980px, (min-width: 981px) 1024px, 100vw" /&gt;</span></noscript></p><span data-dcnode-id="907" instrument_node="">
</span><p data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">&nbsp;</span></p><span data-dcnode-id="904" instrument_node="">
</span><p data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">&nbsp;</span></p><span data-dcnode-id="901" instrument_node="">
</span><p data-dcnode-id="898"><span data-dcnode-id="899" style="font-weight: 400;"><span data-dcnode-id="900" instrument_node="">If you are traveling with kids (or you’re a kid at heart), make a stop just up the road at the Dole Plantation. Take a tour of the plantation to see how pineapples are grown, get lost in the pineapple maze, and sample Dole Whip.&nbsp;</span></span></p><span data-dcnode-id="897" instrument_node="">
</span><p data-dcnode-id="894"><span data-dcnode-id="895" style="font-weight: 400;"><span data-dcnode-id="896" instrument_node="">Continue up to the North Shore and drop your bags at Turtle Bay Resort — our favorite hotel on the North Shore. Once you’re ready, grab the complimentary snorkel gear and head to a beach. You can stay and snorkel at Turtle Bay, but we also recommend either Shark’s Cove or Waimea Bay, depending on the water conditions.&nbsp;</span></span></p><span data-dcnode-id="893" instrument_node="">
</span><p data-dcnode-id="889"><img alt="Day 4 North Shore Sunset" class="wp-image-2492 aligncenter size-large" data-dcnode-id="892" data-lazy-sizes="(min-width: 0px) and (max-width: 480px) 480px, (min-width: 481px) and (max-width: 980px) 980px, (min-width: 981px) 1024px, 100vw" data-lazy-src="https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-4-North-Shore-Sunset-1024x683.jpg" data-lazy-srcset="https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-4-North-Shore-Sunset-1024x683.jpg 1024w, https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-4-North-Shore-Sunset-980x653.jpg 980w, https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-4-North-Shore-Sunset-480x320.jpg 480w" height="683" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201024%20683'%3E%3C/svg%3E" width="1024"><noscript data-dcnode-id="890"><span data-dcnode-id="891" instrument_node="">&lt;img class="wp-image-2492 aligncenter size-large" src="https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-4-North-Shore-Sunset-1024x683.jpg" alt="Day 4 North Shore Sunset" width="1024" height="683" srcset="https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-4-North-Shore-Sunset-1024x683.jpg 1024w, https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-4-North-Shore-Sunset-980x653.jpg 980w, https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-4-North-Shore-Sunset-480x320.jpg 480w" sizes="(min-width: 0px) and (max-width: 480px) 480px, (min-width: 481px) and (max-width: 980px) 980px, (min-width: 981px) 1024px, 100vw" /&gt;</span></noscript></p><span data-dcnode-id="888" instrument_node="">
</span><p data-dcnode-id="885"><span data-dcnode-id="886" style="font-weight: 400;"><span data-dcnode-id="887" instrument_node="">Waimea Bay is beautiful and has a rock that juts out into the bay, perfect for jumping.</span></span></p><span data-dcnode-id="884" instrument_node="">
</span><p data-dcnode-id="880"><img alt="Day 5 Waimea Bay Swim and Cliff Jump Oahu" class="wp-image-2487 aligncenter size-large" data-dcnode-id="883" data-lazy-sizes="(min-width: 0px) and (max-width: 480px) 480px, (min-width: 481px) and (max-width: 980px) 980px, (min-width: 981px) 1024px, 100vw" data-lazy-src="https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-5-Waimea-Bay-Swim-and-Cliff-Jump-Oahu-1024x683.jpg" data-lazy-srcset="https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-5-Waimea-Bay-Swim-and-Cliff-Jump-Oahu-1024x683.jpg 1024w, https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-5-Waimea-Bay-Swim-and-Cliff-Jump-Oahu-980x653.jpg 980w, https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-5-Waimea-Bay-Swim-and-Cliff-Jump-Oahu-480x320.jpg 480w" height="683" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201024%20683'%3E%3C/svg%3E" width="1024"><noscript data-dcnode-id="881"><span data-dcnode-id="882" instrument_node="">&lt;img class="wp-image-2487 aligncenter size-large" src="https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-5-Waimea-Bay-Swim-and-Cliff-Jump-Oahu-1024x683.jpg" alt="Day 5 Waimea Bay Swim and Cliff Jump Oahu" width="1024" height="683" srcset="https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-5-Waimea-Bay-Swim-and-Cliff-Jump-Oahu-1024x683.jpg 1024w, https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-5-Waimea-Bay-Swim-and-Cliff-Jump-Oahu-980x653.jpg 980w, https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-5-Waimea-Bay-Swim-and-Cliff-Jump-Oahu-480x320.jpg 480w" sizes="(min-width: 0px) and (max-width: 480px) 480px, (min-width: 481px) and (max-width: 980px) 980px, (min-width: 981px) 1024px, 100vw" /&gt;</span></noscript></p><span data-dcnode-id="879" instrument_node="">
</span><p data-dcnode-id="877"><span data-dcnode-id="878" instrument_node="">&nbsp;</span></p><span data-dcnode-id="876" instrument_node="">
</span><p data-dcnode-id="873"><span data-dcnode-id="874" style="font-weight: 400;"><span data-dcnode-id="875" instrument_node="">Note: if you’re visiting in the winter, the waves at Waimea Bay can be huge and dangerous. Skip snorkeling and just enjoy the view from the beach. Or try snorkeling at Turtle Bay where the water can be quite a bit calmer.&nbsp;</span></span></p><span data-dcnode-id="872" instrument_node="">
</span><p data-dcnode-id="868"><img alt="Day 5 Waimea Bay Beach" class="wp-image-2489 aligncenter size-large" data-dcnode-id="871" data-lazy-sizes="(min-width: 0px) and (max-width: 480px) 480px, (min-width: 481px) and (max-width: 980px) 980px, (min-width: 981px) 1024px, 100vw" data-lazy-src="https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-5-Waimea-Bay-Beach-1024x683.jpg" data-lazy-srcset="https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-5-Waimea-Bay-Beach-1024x683.jpg 1024w, https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-5-Waimea-Bay-Beach-980x653.jpg 980w, https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-5-Waimea-Bay-Beach-480x320.jpg 480w" height="683" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201024%20683'%3E%3C/svg%3E" width="1024"><noscript data-dcnode-id="869"><span data-dcnode-id="870" instrument_node="">&lt;img class="wp-image-2489 aligncenter size-large" src="https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-5-Waimea-Bay-Beach-1024x683.jpg" alt="Day 5 Waimea Bay Beach" width="1024" height="683" srcset="https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-5-Waimea-Bay-Beach-1024x683.jpg 1024w, https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-5-Waimea-Bay-Beach-980x653.jpg 980w, https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-5-Waimea-Bay-Beach-480x320.jpg 480w" sizes="(min-width: 0px) and (max-width: 480px) 480px, (min-width: 481px) and (max-width: 980px) 980px, (min-width: 981px) 1024px, 100vw" /&gt;</span></noscript></p><span data-dcnode-id="867" instrument_node="">
</span><p data-dcnode-id="865"><span data-dcnode-id="866" instrument_node="">&nbsp;</span></p><span data-dcnode-id="864" instrument_node="">
</span><p data-dcnode-id="856"><span data-dcnode-id="862" style="font-weight: 400;"><span data-dcnode-id="863" instrument_node="">Grab a quick lunch at one of the many food trucks that dot the north shore, like the </span></span><a data-dcnode-id="859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tripadvisor.com/Restaurant_Review-g60647-d3753216-Reviews-Pupukea_Grill-Haleiwa_Oahu_Hawaii.html"><span data-dcnode-id="860" style="font-weight: 400;"><span data-dcnode-id="861" instrument_node="">Pupukea Grill</span></span></a><span data-dcnode-id="857" style="font-weight: 400;"><span data-dcnode-id="858" instrument_node="">.&nbsp;</span></span></p><span data-dcnode-id="855" instrument_node="">
</span><p data-dcnode-id="847"><span data-dcnode-id="853" style="font-weight: 400;"><span data-dcnode-id="854" instrument_node="">Once you’re done with the beach and lunch, head to do a short hike up the </span></span><a data-dcnode-id="850" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.waimeavalley.net/"><span data-dcnode-id="851" style="font-weight: 400;"><span data-dcnode-id="852" instrument_node="">Waimea Valley trail</span></span></a><span data-dcnode-id="848" style="font-weight: 400;"><span data-dcnode-id="849" instrument_node=""> to a waterfall. There are a number of waterfalls on the North Shore, but we recommend stopping at this private park — it’s worth the entrance fee if you really want to do a waterfall swim.&nbsp;</span></span></p><span data-dcnode-id="846" instrument_node="">
</span><p data-dcnode-id="842"><img alt="Day 5 Waimea Bay Beach" class="wp-image-2493 aligncenter size-large" data-dcnode-id="845" data-lazy-sizes="(min-width: 0px) and (max-width: 480px) 480px, (min-width: 481px) 683px, 100vw" data-lazy-src="https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-5-Waimea-Valley-Waterfall-Hike-683x1024.jpg" data-lazy-srcset="https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-5-Waimea-Valley-Waterfall-Hike-683x1024.jpg 683w, https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-5-Waimea-Valley-Waterfall-Hike-480x720.jpg 480w" height="1024" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20683%201024'%3E%3C/svg%3E" width="683"><noscript data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">&lt;img class="wp-image-2493 aligncenter size-large" src="https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-5-Waimea-Valley-Waterfall-Hike-683x1024.jpg" alt="Day 5 Waimea Bay Beach" width="683" height="1024" srcset="https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-5-Waimea-Valley-Waterfall-Hike-683x1024.jpg 683w, https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-5-Waimea-Valley-Waterfall-Hike-480x720.jpg 480w" sizes="(min-width: 0px) and (max-width: 480px) 480px, (min-width: 481px) 683px, 100vw" /&gt;</span></noscript></p><span data-dcnode-id="841" instrument_node="">
</span><p data-dcnode-id="839"><span data-dcnode-id="840" instrument_node="">&nbsp;</span></p><span data-dcnode-id="838" instrument_node="">
</span><p data-dcnode-id="825"><span data-dcnode-id="836" style="font-weight: 400;"><span data-dcnode-id="837" instrument_node="">Once you’re done, head back to Turtle Bay for some downtime. You can enjoy the pool and join the other guests as they view the sunset from the point. For dinner, there are plenty of options onsite, like </span></span><a data-dcnode-id="833" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.turtlebayresort.com/Oahu-Restaurants/roys-beach-house"><span data-dcnode-id="834" style="font-weight: 400;"><span data-dcnode-id="835" instrument_node="">Roy’s Beach House</span></span></a><span data-dcnode-id="831" style="font-weight: 400;"><span data-dcnode-id="832" instrument_node=""> (expensive but delicious) and </span></span><a data-dcnode-id="828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.turtlebayresort.com/Oahu-Restaurants/Lei-Leis-Bar"><span data-dcnode-id="829" style="font-weight: 400;"><span data-dcnode-id="830" instrument_node="">Lei Lei’s</span></span></a><span data-dcnode-id="826" style="font-weight: 400;"><span data-dcnode-id="827" instrument_node=""> (reasonable and kid-friendly).&nbsp;</span></span></p><span data-dcnode-id="824" instrument_node="">
</span><p data-dcnode-id="811"><span data-dcnode-id="822" style="font-weight: 400;"><span data-dcnode-id="823" instrument_node="">Or drive a little further for some famed North Shore shrimp at </span></span><a data-dcnode-id="819" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tripadvisor.com/Restaurant_Review-g60651-d2005821-Reviews-Romy_s_Kahuku_Prawns_and_Shrimp-Kahuku_Oahu_Hawaii.html"><span data-dcnode-id="820" style="font-weight: 400;"><span data-dcnode-id="821" instrument_node="">Romy’s Kahuku Prawns Shrimp Hut</span></span></a><span data-dcnode-id="817" style="font-weight: 400;"><span data-dcnode-id="818" instrument_node=""> or </span></span><a data-dcnode-id="814" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tripadvisor.com/Restaurant_Review-g60651-d3733567-Reviews-Fumi_s_Kahuku_Shrimp_Truck-Kahuku_Oahu_Hawaii.html"><span data-dcnode-id="815" style="font-weight: 400;"><span data-dcnode-id="816" instrument_node="">Fumi’s Kahuku Shrimp</span></span></a><span data-dcnode-id="812" style="font-weight: 400;"><span data-dcnode-id="813" instrument_node="">.</span></span></p><span data-dcnode-id="810" instrument_node="">
</span><p data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">&nbsp;</span></p><span data-dcnode-id="807" instrument_node="">
</span><h2 data-dcnode-id="803"><span data-dcnode-id="804" id="Day_5_Stand_Up_Paddle_Haleiwa_and_a_Perfect_Sunset"><span data-dcnode-id="805" style="font-weight: 400;"><span data-dcnode-id="806" instrument_node="">Day 5: Stand Up Paddle, Haleiwa, and a Perfect Sunset</span></span></span></h2><span data-dcnode-id="802" instrument_node="">
</span><p data-dcnode-id="799"><span data-dcnode-id="800" style="font-weight: 400;"><span data-dcnode-id="801" instrument_node="">It’s time to start your last day on Oahu on the beautiful North Shore (lucky you). Waking up here before things get busy will help you appreciate the stark difference between Waikiki and the North Shore. It’s a completely different experience up here.&nbsp;</span></span></p><span data-dcnode-id="798" instrument_node="">
</span><p data-dcnode-id="795"><span data-dcnode-id="796" style="font-weight: 400;"><span data-dcnode-id="797" instrument_node="">Today you’re going to spend most of the day in and around Haleiwa Town. There aren’t many cute downtown areas in Hawaii, but this is one of the few. Start your drive down to Haleiwa town in time for breakfast because you have a few stand-out choices for food.&nbsp;</span></span></p><span data-dcnode-id="794" instrument_node="">
</span><p data-dcnode-id="790"><img alt="Day 5 Oahu Itinerary Haleiwa Town" class="wp-image-2491 aligncenter size-large" data-dcnode-id="793" data-lazy-sizes="(min-width: 0px) and (max-width: 480px) 480px, (min-width: 481px) and (max-width: 980px) 980px, (min-width: 981px) 1024px, 100vw" data-lazy-src="https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-5-Oahu-Itinerary-Haleiwa-Town-1024x683.jpg" data-lazy-srcset="https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-5-Oahu-Itinerary-Haleiwa-Town-1024x683.jpg 1024w, https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-5-Oahu-Itinerary-Haleiwa-Town-980x653.jpg 980w, https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-5-Oahu-Itinerary-Haleiwa-Town-480x320.jpg 480w" height="683" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201024%20683'%3E%3C/svg%3E" width="1024"><noscript data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">&lt;img class="wp-image-2491 aligncenter size-large" src="https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-5-Oahu-Itinerary-Haleiwa-Town-1024x683.jpg" alt="Day 5 Oahu Itinerary Haleiwa Town" width="1024" height="683" srcset="https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-5-Oahu-Itinerary-Haleiwa-Town-1024x683.jpg 1024w, https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-5-Oahu-Itinerary-Haleiwa-Town-980x653.jpg 980w, https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-5-Oahu-Itinerary-Haleiwa-Town-480x320.jpg 480w" sizes="(min-width: 0px) and (max-width: 480px) 480px, (min-width: 481px) and (max-width: 980px) 980px, (min-width: 981px) 1024px, 100vw" /&gt;</span></noscript></p><span data-dcnode-id="789" instrument_node="">
</span><p data-dcnode-id="787"><span data-dcnode-id="788" instrument_node="">&nbsp;</span></p><span data-dcnode-id="786" instrument_node="">
</span><p data-dcnode-id="768"><span data-dcnode-id="784" style="font-weight: 400;"><span data-dcnode-id="785" instrument_node="">10 minutes from the Turtle Bay resort is Ted’s Bakery, a great place to stop for breakfast if you’re in the mood for pancakes or bakery items (or come back for some cake later). Prefer a breakfast burrito? Head to </span></span><a data-dcnode-id="781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.konosnorthshore.com/"><span data-dcnode-id="782" style="font-weight: 400;"><span data-dcnode-id="783" instrument_node="">Kono’s</span></span></a><span data-dcnode-id="779" style="font-weight: 400;"><span data-dcnode-id="780" instrument_node="">. Or if you’re looking for something for everyone, try </span></span><a data-dcnode-id="776" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cafehaleiwahawaiianislands.com/"><span data-dcnode-id="777" style="font-weight: 400;"><span data-dcnode-id="778" instrument_node="">Cafe Haleiwa</span></span></a><span data-dcnode-id="774" style="font-weight: 400;"><span data-dcnode-id="775" instrument_node=""> or </span></span><a data-dcnode-id="771" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.turtlebayrentals.com/waialua-bakery-haleiwa-must-for-every-vacationer-oahu"><span data-dcnode-id="772" style="font-weight: 400;"><span data-dcnode-id="773" instrument_node="">Waialua Bakery</span></span></a><span data-dcnode-id="769" style="font-weight: 400;"><span data-dcnode-id="770" instrument_node="">.&nbsp;</span></span></p><span data-dcnode-id="767" instrument_node="">
</span><p data-dcnode-id="764"><span data-dcnode-id="765" style="font-weight: 400;"><span data-dcnode-id="766" instrument_node="">(Can you tell we love the food on the North Shore?)</span></span></p><span data-dcnode-id="763" instrument_node="">
</span><p data-dcnode-id="759"><img alt="Day 4 North Shore Itinerary Shopping" class="wp-image-2490 aligncenter size-large" data-dcnode-id="762" data-lazy-sizes="(min-width: 0px) and (max-width: 480px) 480px, (min-width: 481px) and (max-width: 980px) 980px, (min-width: 981px) 1024px, 100vw" data-lazy-src="https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-4-North-Shore-Itinerary-Shopping-1024x683.jpg" data-lazy-srcset="https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-4-North-Shore-Itinerary-Shopping-1024x683.jpg 1024w, https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-4-North-Shore-Itinerary-Shopping-980x653.jpg 980w, https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-4-North-Shore-Itinerary-Shopping-480x320.jpg 480w" height="683" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201024%20683'%3E%3C/svg%3E" width="1024"><noscript data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">&lt;img class="wp-image-2490 aligncenter size-large" src="https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-4-North-Shore-Itinerary-Shopping-1024x683.jpg" alt="Day 4 North Shore Itinerary Shopping" width="1024" height="683" srcset="https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-4-North-Shore-Itinerary-Shopping-1024x683.jpg 1024w, https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-4-North-Shore-Itinerary-Shopping-980x653.jpg 980w, https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-4-North-Shore-Itinerary-Shopping-480x320.jpg 480w" sizes="(min-width: 0px) and (max-width: 480px) 480px, (min-width: 481px) and (max-width: 980px) 980px, (min-width: 981px) 1024px, 100vw" /&gt;</span></noscript></p><span data-dcnode-id="758" instrument_node="">
</span><p data-dcnode-id="756"><span data-dcnode-id="757" instrument_node="">&nbsp;</span></p><span data-dcnode-id="755" instrument_node="">
</span><p data-dcnode-id="752"><span data-dcnode-id="753" style="font-weight: 400;"><span data-dcnode-id="754" instrument_node="">After breakfast, you’re ready to start your day. It’s time to grab a board and get in the water to try either a surf lesson or try your hand at SUP. Or, skip the lesson and rent a SUP board and paddle up the river. The North Shore is famous for surfing so if you’re going to get in the water anywhere, this is the spot.</span></span></p><span data-dcnode-id="751" instrument_node="">
</span><p data-dcnode-id="748"><span data-dcnode-id="749" style="font-weight: 400;"><span data-dcnode-id="750" instrument_node="">Once your lesson is done, head back to Haleiwa town to explore. The little town is full of boutique shops and restaurants, and you could easily spend a couple of hours exploring all that is there.&nbsp;</span></span></p><span data-dcnode-id="747" instrument_node="">
</span><p data-dcnode-id="743"><img alt="Day 5 Itinerary Haleiwa Tour" class="wp-image-2494 aligncenter size-large" data-dcnode-id="746" data-lazy-sizes="(min-width: 0px) and (max-width: 480px) 480px, (min-width: 481px) 683px, 100vw" data-lazy-src="https://thehawaiivacationguide.com/wp-content/uploads/2020/02/DAy-5-Itinerary-Haleiwa-Tour-683x1024.jpg" data-lazy-srcset="https://thehawaiivacationguide.com/wp-content/uploads/2020/02/DAy-5-Itinerary-Haleiwa-Tour-683x1024.jpg 683w, https://thehawaiivacationguide.com/wp-content/uploads/2020/02/DAy-5-Itinerary-Haleiwa-Tour-480x720.jpg 480w" height="1024" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20683%201024'%3E%3C/svg%3E" width="683"><noscript data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">&lt;img class="wp-image-2494 aligncenter size-large" src="https://thehawaiivacationguide.com/wp-content/uploads/2020/02/DAy-5-Itinerary-Haleiwa-Tour-683x1024.jpg" alt="Day 5 Itinerary Haleiwa Tour" width="683" height="1024" srcset="https://thehawaiivacationguide.com/wp-content/uploads/2020/02/DAy-5-Itinerary-Haleiwa-Tour-683x1024.jpg 683w, https://thehawaiivacationguide.com/wp-content/uploads/2020/02/DAy-5-Itinerary-Haleiwa-Tour-480x720.jpg 480w" sizes="(min-width: 0px) and (max-width: 480px) 480px, (min-width: 481px) 683px, 100vw" /&gt;</span></noscript></p><span data-dcnode-id="742" instrument_node="">
</span><p data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">&nbsp;</span></p><span data-dcnode-id="739" instrument_node="">
</span><p data-dcnode-id="736"><span data-dcnode-id="737" style="font-weight: 400;"><span data-dcnode-id="738" instrument_node="">If you’re hungry again, check out the famous Giovanni’s shrimp truck located right in town. But be prepared to wait — we showed up at 11:10 am (they open at 11) and there were already at least 30 people there. You may also want to pop into Matsumoto Shave Ice, one of the most famous treats on the island.&nbsp;</span></span></p><span data-dcnode-id="735" instrument_node="">
</span><p data-dcnode-id="731"><img alt="Day 5 Oahu Food Shrimp Truck" class="wp-image-2496 aligncenter size-large" data-dcnode-id="734" data-lazy-sizes="(min-width: 0px) and (max-width: 480px) 480px, (min-width: 481px) and (max-width: 980px) 980px, (min-width: 981px) 1024px, 100vw" data-lazy-src="https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-5-Oahu-Food-Shrimp-Truck-1024x683.jpg" data-lazy-srcset="https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-5-Oahu-Food-Shrimp-Truck-1024x683.jpg 1024w, https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-5-Oahu-Food-Shrimp-Truck-980x653.jpg 980w, https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-5-Oahu-Food-Shrimp-Truck-480x320.jpg 480w" height="683" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201024%20683'%3E%3C/svg%3E" width="1024"><noscript data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">&lt;img class="wp-image-2496 aligncenter size-large" src="https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-5-Oahu-Food-Shrimp-Truck-1024x683.jpg" alt="Day 5 Oahu Food Shrimp Truck" width="1024" height="683" srcset="https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-5-Oahu-Food-Shrimp-Truck-1024x683.jpg 1024w, https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-5-Oahu-Food-Shrimp-Truck-980x653.jpg 980w, https://thehawaiivacationguide.com/wp-content/uploads/2020/02/Day-5-Oahu-Food-Shrimp-Truck-480x320.jpg 480w" sizes="(min-width: 0px) and (max-width: 480px) 480px, (min-width: 481px) and (max-width: 980px) 980px, (min-width: 981px) 1024px, 100vw" /&gt;</span></noscript></p><span data-dcnode-id="730" instrument_node="">
</span><p data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">&nbsp;</span></p><span data-dcnode-id="727" instrument_node="">
</span><p data-dcnode-id="724"><span data-dcnode-id="725" style="font-weight: 400;"><span data-dcnode-id="726" instrument_node="">After that, jump in your car and head to the beach to see if you can catch a glimpse of some Honu, the Hawaiian green sea turtle. Most people stop at Laniakea Beach to see the turtles, but we’ve found that there’s often a crowd. Instead, head to Papa’iloa Beach. This beautiful beach became well known after being featured on the TV show Lost and we’ve had the best luck seeing turtles here without the crowd.&nbsp;</span></span></p><span data-dcnode-id="723" instrument_node="">
</span><p data-dcnode-id="715"><span data-dcnode-id="721" style="font-weight: 400;"><span data-dcnode-id="722" instrument_node="">Remember, there are rules when you see turtles. You shouldn’t disturb them and you should </span></span><a data-dcnode-id="718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dlnr.hawaii.gov/dar/species/sea-turtles/"><span data-dcnode-id="719" style="font-weight: 400;"><span data-dcnode-id="720" instrument_node="">stay 10 feet away from them</span></span></a><span data-dcnode-id="716" style="font-weight: 400;"><span data-dcnode-id="717" instrument_node="">.</span></span></p><span data-dcnode-id="714" instrument_node="">
</span><p data-dcnode-id="711"><span data-dcnode-id="712" style="font-weight: 400;"><span data-dcnode-id="713" instrument_node="">With your last full day winding down, you have a choice: head back to Turtle Bay for dinner and a sunset or head to (yet another) food truck and watch the sunset from Sunset Beach.&nbsp;</span></span></p><span data-dcnode-id="710" instrument_node="">

</span><p data-dcnode-id="668"><span data-dcnode-id="675" instrument_node="">&nbsp;</span><em data-dcnode-id="669"><strong data-dcnode-id="670"><span data-dcnode-id="674" instrument_node="">Stop scrolling and start packing. Our full Oahu itinerary and guide will give you the best of the best. 7+ excursion days, the best restaurants, beaches, and snorkel spots organized by location. </span><a data-dcnode-id="672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thehawaiivacationguide.com/best-hawaii-itineraries/"><span data-dcnode-id="673" instrument_node="">We’ve got you covered.</span></a><span data-dcnode-id="671" instrument_node="">&nbsp;</span></strong></em></p><span data-dcnode-id="667" instrument_node="">
</span><h2 data-dcnode-id="663"><span data-dcnode-id="664" id="Can_You_Save_Money_with_the_Go_Oahu_Card"><span data-dcnode-id="665" style="font-weight: 400;"><span data-dcnode-id="666" instrument_node="">Can You Save Money with the Go Oahu Card</span></span></span></h2><span data-dcnode-id="662" instrument_node="">
</span><p data-dcnode-id="659"><span data-dcnode-id="660" style="font-weight: 400;"><span data-dcnode-id="661" instrument_node="">We, generally, have shied away from purchasing passes when visiting cities. However, we’ve recently started to do the math, and, depending on what to do, in some places, it absolutely makes sense to purchase a pass.&nbsp;</span></span></p><span data-dcnode-id="658" instrument_node="">
</span><p data-dcnode-id="650"><span data-dcnode-id="656" style="font-weight: 400;"><span data-dcnode-id="657" instrument_node="">Oahu just might be one of these places. You can read our </span></span><a data-dcnode-id="653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thehawaiivacationguide.com/is-the-go-oahu-card-worth-it/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="654" style="font-weight: 400;"><span data-dcnode-id="655" instrument_node="">full review and breakdown to see if the Go Oahu Card</span></span></a><span data-dcnode-id="651" style="font-weight: 400;"><span data-dcnode-id="652" instrument_node=""> is worth it for you, but if you plan to do even just a few activities on this list, the pass can actually end up saving you money.&nbsp;</span></span></p><span data-dcnode-id="649" instrument_node="">
</span><p data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">&nbsp;</span></p><span data-dcnode-id="646" instrument_node="">
</span><h2 data-dcnode-id="642"><span data-dcnode-id="643" id="How_Long_Do_You_Need_on_Oahu"><span data-dcnode-id="644" style="font-weight: 400;"><span data-dcnode-id="645" instrument_node="">How Long Do You Need on Oahu?</span></span></span></h2><span data-dcnode-id="641" instrument_node="">
</span><p data-dcnode-id="638"><span data-dcnode-id="639" style="font-weight: 400;"><span data-dcnode-id="640" instrument_node="">Well really, how long can you stay? There’s so much to do and see on every island. This itinerary takes you through 5 action-packed days to explore the island. But, there’s even more to see. Or, you could take it at a slower pace and alternate one beach/pool day with one day of adventure.&nbsp;</span></span></p><span data-dcnode-id="637" instrument_node="">
</span><p data-dcnode-id="629"><span data-dcnode-id="635" style="font-weight: 400;"><span data-dcnode-id="636" instrument_node="">According to the Hawaii Tourism Authority, in 2017 a </span></span><a data-dcnode-id="632" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//files.hawaii.gov/dbedt/visitor/visitor-research/2017-annual-visitor.pdf"><span data-dcnode-id="633" style="font-weight: 400;"><span data-dcnode-id="634" instrument_node="">visitor to Oahu spent an average of 6.74 days</span></span></a><span data-dcnode-id="630" style="font-weight: 400;"><span data-dcnode-id="631" instrument_node="">:</span></span></p><span data-dcnode-id="628" instrument_node="">
</span><ul data-dcnode-id="602"><span data-dcnode-id="627" instrument_node="">
</span><li data-dcnode-id="624" style="font-weight: 400;"><span data-dcnode-id="625" style="font-weight: 400;"><span data-dcnode-id="626" instrument_node="">Maui: 8.10 days</span></span></li><span data-dcnode-id="623" instrument_node="">
</span><li data-dcnode-id="620" style="font-weight: 400;"><span data-dcnode-id="621" style="font-weight: 400;"><span data-dcnode-id="622" instrument_node="">Oahu: 6.74 days</span></span></li><span data-dcnode-id="619" instrument_node="">
</span><li data-dcnode-id="616" style="font-weight: 400;"><span data-dcnode-id="617" style="font-weight: 400;"><span data-dcnode-id="618" instrument_node="">Kauai: 7.52 days</span></span></li><span data-dcnode-id="615" instrument_node="">
</span><li data-dcnode-id="612" style="font-weight: 400;"><span data-dcnode-id="613" style="font-weight: 400;"><span data-dcnode-id="614" instrument_node="">Hawai’i: 7.34 days</span></span></li><span data-dcnode-id="611" instrument_node="">
</span><li data-dcnode-id="608" style="font-weight: 400;"><span data-dcnode-id="609" style="font-weight: 400;"><span data-dcnode-id="610" instrument_node="">Lanai: 3.4 days</span></span></li><span data-dcnode-id="607" instrument_node="">
</span><li data-dcnode-id="604" style="font-weight: 400;"><span data-dcnode-id="605" style="font-weight: 400;"><span data-dcnode-id="606" instrument_node="">Molokai: 4.76 days</span></span></li><span data-dcnode-id="603" instrument_node="">
</span></ul><span data-dcnode-id="601" instrument_node="">
</span><p data-dcnode-id="599"><span data-dcnode-id="600" instrument_node="">&nbsp;</span></p><span data-dcnode-id="598" instrument_node="">
</span><p data-dcnode-id="592"><span data-dcnode-id="593" style="font-weight: 400;"><span data-dcnode-id="597" instrument_node="">Whether you can come to the islands for a long trip or you can only fit in a quick getaway, you should make the most of your time here with the best planning and advice — that’s why we started this guide! Read up for more information on the </span><a data-dcnode-id="595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thehawaiivacationguide.com/how-many-days-do-you-need-on-oahu/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="596" instrument_node="">ideal number of days to spend on Oahu here</span></a><span data-dcnode-id="594" instrument_node="">.</span></span></p><span data-dcnode-id="591" instrument_node="">
</span><p data-dcnode-id="589"><span data-dcnode-id="590" instrument_node="">&nbsp;</span></p><span data-dcnode-id="588" instrument_node="">
</span><h2 data-dcnode-id="584"><span data-dcnode-id="585" id="Staying_Longer_on_Oahu"><span data-dcnode-id="586" style="font-weight: 400;"><span data-dcnode-id="587" instrument_node="">Staying Longer on Oahu?</span></span></span></h2><span data-dcnode-id="583" instrument_node="">
</span><p data-dcnode-id="580"><span data-dcnode-id="581" style="font-weight: 400;"><span data-dcnode-id="582" instrument_node="">If you’re staying longer on the island (I hope you are!), there is so much more to see. Here are some suggestions:</span></span></p><span data-dcnode-id="579" instrument_node="">
</span><p data-dcnode-id="577"><span data-dcnode-id="578" instrument_node="">&nbsp;</span></p><span data-dcnode-id="576" instrument_node="">
</span><h3 data-dcnode-id="572"><span data-dcnode-id="573" id="Easy_and_Short_Hikes_on_Oahu"><span data-dcnode-id="574" style="font-weight: 400;"><span data-dcnode-id="575" instrument_node="">Easy and Short Hikes on Oahu:</span></span></span></h3><span data-dcnode-id="571" instrument_node="">
</span><ul data-dcnode-id="553"><span data-dcnode-id="570" instrument_node="">
</span><li data-dcnode-id="567" style="font-weight: 400;"><span data-dcnode-id="568" style="font-weight: 400;"><span data-dcnode-id="569" instrument_node="">Koko Crater: this Stairmaster workout, takes you up a mile-long hike of steps, an old railway line, to the top of Koko crater.</span></span></li><span data-dcnode-id="566" instrument_node="">
</span><li data-dcnode-id="563" style="font-weight: 400;"><span data-dcnode-id="564" style="font-weight: 400;"><span data-dcnode-id="565" instrument_node="">Moana Falls: easy hike to a waterfall and a pretty drive from Honolulu</span></span></li><span data-dcnode-id="562" instrument_node="">
</span><li data-dcnode-id="559" style="font-weight: 400;"><span data-dcnode-id="560" style="font-weight: 400;"><span data-dcnode-id="561" instrument_node="">Euhaki (sunset) Pillbox Hike: This North Shore hike takes you up a 30-minute climb, and is a good spot for sunsets</span></span></li><span data-dcnode-id="558" instrument_node="">
</span><li data-dcnode-id="555" style="font-weight: 400;"><span data-dcnode-id="556" style="font-weight: 400;"><span data-dcnode-id="557" instrument_node="">Kaiwa Ridge (Lanikai Pillbox): A 1.8-mile hike up to the pillbox with views of Lanikai Beach below</span></span></li><span data-dcnode-id="554" instrument_node="">
</span></ul><span data-dcnode-id="552" instrument_node="">
</span><p data-dcnode-id="550"><span data-dcnode-id="551" instrument_node="">&nbsp;</span></p><span data-dcnode-id="549" instrument_node="">
</span><h3 data-dcnode-id="545"><span data-dcnode-id="546" id="Polynesian_Cultural_Center"><span data-dcnode-id="547" style="font-weight: 400;"><span data-dcnode-id="548" instrument_node="">Polynesian Cultural Center:</span></span></span></h3><span data-dcnode-id="544" instrument_node="">
</span><p data-dcnode-id="541"><span data-dcnode-id="542" style="font-weight: 400;"><span data-dcnode-id="543" instrument_node="">Stay one more day on the North Shore and visit the Polynesian Cultural Center. Learn about the cultures of Hawaii, Fiji, Aotearoa (New Zealand), Samoa, Tahiti, and Tonga. Spend the day exploring and stay for the Ali’i Luau.&nbsp;</span></span></p><span data-dcnode-id="540" instrument_node="">
</span><p data-dcnode-id="530"><span data-dcnode-id="538" style="font-weight: 400;"><span data-dcnode-id="539" instrument_node="">If you visit the Polynesian Cultural Center, it will probably be worth the money to </span></span><span data-dcnode-id="536" style="font-weight: 400;"><span data-dcnode-id="537" instrument_node="">buy the </span></span><a data-dcnode-id="533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thehawaiivacationguide.com/is-the-go-oahu-card-worth-it/"><span data-dcnode-id="534" style="font-weight: 400;"><span data-dcnode-id="535" instrument_node="">Go Oahu Pass</span></span></a><span data-dcnode-id="531" style="font-weight: 400;"><span data-dcnode-id="532" instrument_node="">.&nbsp;</span></span></p><span data-dcnode-id="529" instrument_node="">
</span><p data-dcnode-id="527"><span data-dcnode-id="528" instrument_node="">&nbsp;</span></p><span data-dcnode-id="526" instrument_node="">
</span><h3 data-dcnode-id="522"><span data-dcnode-id="523" id="Explore_Downtown_Honolulu"><span data-dcnode-id="524" style="font-weight: 400;"><span data-dcnode-id="525" instrument_node="">Explore Downtown Honolulu:</span></span></span></h3><span data-dcnode-id="521" instrument_node="">
</span><p data-dcnode-id="508"><span data-dcnode-id="519" style="font-weight: 400;"><span data-dcnode-id="520" instrument_node="">We love downtown Honolulu and with one more day on Oahu, I’d put this at the top of your list. You got a tiny view of the city when you visited Iolani Palace, but there is so much more to see. </span></span><a data-dcnode-id="516" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.alohatower.com/"><span data-dcnode-id="517" style="font-weight: 400;"><span data-dcnode-id="518" instrument_node="">Aloha Tower</span></span></a><span data-dcnode-id="514" style="font-weight: 400;"><span data-dcnode-id="515" instrument_node="">, fish markets (</span></span><a data-dcnode-id="511" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unclesfishmarket.com/"><span data-dcnode-id="512" style="font-weight: 400;"><span data-dcnode-id="513" instrument_node="">eat at this one</span></span></a><span data-dcnode-id="509" style="font-weight: 400;"><span data-dcnode-id="510" instrument_node="">), and Chinatown are our favorites.</span></span></p><span data-dcnode-id="507" instrument_node="">
</span><p data-dcnode-id="505"><span data-dcnode-id="506" instrument_node="">&nbsp;</span></p><span data-dcnode-id="504" instrument_node="">

</span><p data-dcnode-id="496"><span data-dcnode-id="497" style="font-weight: 400;"><span data-dcnode-id="498" instrument_node="">Many visitors to Hawaii don’t just visit one island. If you’re heading elsewhere, we’ve got you covered with island-specific itineraries, the best places to stay, and amazing things to do.&nbsp;</span></span></p><span data-dcnode-id="495" instrument_node="">
