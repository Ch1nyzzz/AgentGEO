</span><h2 data-dcnode-id="1715"><span class="ez-toc-section" data-dcnode-id="1719" id="Explore_with_day_tours_5_days_in_Switzerland_itinerary_Sample_3"></span><strong data-dcnode-id="1717"><span data-dcnode-id="1718" instrument_node="">Explore with day tours: 5 days in Switzerland itinerary (Sample 3)</span></strong><span class="ez-toc-section-end" data-dcnode-id="1716"></span></h2><span data-dcnode-id="1714" instrument_node="">
</span><p data-dcnode-id="1712"><span data-dcnode-id="1713" instrument_node="">It is possible to explore Switzerland in 5 days, by combining multiple day tours. We have done something like this in Seville, and Zurich is a perfect base city for that.&nbsp;</span></p><span data-dcnode-id="1711" instrument_node="">
</span><p data-dcnode-id="1705"><span data-dcnode-id="1710" instrument_node="">We personally </span><strong data-dcnode-id="1707"><a data-dcnode-id="1708" data-gyg-scraped="1650878262346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/%3Fpartner_id%3DXT8GSDM%26utm_medium%3Donline_publisher%26utm_source%3Dto_some_place_new%26placement%3Dcontent-middle%26cmp%3Dswiss5%26deeplink_id%3D97b1dfeb-112b-5664-8ee3-7567ea73497b" rel="noreferrer noopener sponsored nofollow" target="_blank"><span data-dcnode-id="1709" instrument_node="">use GetYourGuide for our day tours</span></a></strong><span data-dcnode-id="1706" instrument_node="">, and love their customer service. They are available by phone, email for support when you need them. Best of all you can cancel up to 24 hours before your activity starts for a full refund.</span></p><span data-dcnode-id="1704" instrument_node="">
</span><ul data-dcnode-id="1639"><li data-dcnode-id="1689"><strong data-dcnode-id="1702"><span data-dcnode-id="1703" instrument_node="">Day 1: </span></strong><span data-dcnode-id="1701" instrument_node="">Arrive in Zurich, and explore</span><strong data-dcnode-id="1699"><span data-dcnode-id="1700" instrument_node="">. </span></strong><a data-dcnode-id="1696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.freewalk.ch/zurich/" rel="noreferrer noopener" target="_blank"><strong data-dcnode-id="1697"><span data-dcnode-id="1698" instrument_node="">Opt for a free walking tour</span></strong></a><strong data-dcnode-id="1694"><span data-dcnode-id="1695" instrument_node=""> </span></strong><span data-dcnode-id="1693" instrument_node="">of the city, or get </span><a data-dcnode-id="1690" data-gyg-scraped="1650878262346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/zurich-l55/zurich-private-tour-with-a-local-t103733/%3Fpartner_id%3DXT8GSDM%26utm_medium%3Donline_publisher%26utm_source%3Dto_some_place_new%26placement%3Dcontent-middle%26deeplink_id%3D9342ca68-96c1-5dee-8e08-5d4685c117c4" rel="noreferrer noopener sponsored nofollow" target="_blank"><strong data-dcnode-id="1691"><span data-dcnode-id="1692" instrument_node="">exploring with a local 2 to 6 hour sightseeing</span></strong></a></li><li data-dcnode-id="1681"><strong data-dcnode-id="1687"><span data-dcnode-id="1688" instrument_node="">Day 2</span></strong><span data-dcnode-id="1686" instrument_node="">: </span><a data-dcnode-id="1683" data-gyg-scraped="1650878262346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/zurich-l55/spectacular-northern-switzerland-tour-from-zuerich-t58180/%3Fpartner_id%3DXT8GSDM%26utm_medium%3Donline_publisher%26utm_source%3Dto_some_place_new%26placement%3Dcontent-middle%26deeplink_id%3D1b229881-21ed-593c-a34b-1d6f557c426f" rel="noreferrer noopener sponsored nofollow" target="_blank"><strong data-dcnode-id="1684"><span data-dcnode-id="1685" instrument_node="">Explore Rhine falls in a 4 hour tour</span></strong></a><span data-dcnode-id="1682" instrument_node="">, and then spend the rest of the day in Zurich</span></li><li data-dcnode-id="1660"><strong data-dcnode-id="1679"><span data-dcnode-id="1680" instrument_node="">Day 3</span></strong><span data-dcnode-id="1678" instrument_node="">: Day tour to Lucerne.&nbsp;</span><ul data-dcnode-id="1661"><li data-dcnode-id="1670"><strong data-dcnode-id="1676"><span data-dcnode-id="1677" instrument_node="">Option 1</span></strong><span data-dcnode-id="1675" instrument_node=""> is </span><a data-dcnode-id="1672" data-gyg-scraped="1650878262346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/zurich-l55/lucerne-and-engelberg-full-day-tour-from-zurich-t25860/%3Fpartner_id%3DXT8GSDM%26utm_medium%3Donline_publisher%26utm_source%3Dto_some_place_new%26placement%3Dcontent-middle%26deeplink_id%3Dab858eac-cda9-5656-b0c9-30f101cb4d89" rel="noreferrer noopener sponsored nofollow" target="_blank"><strong data-dcnode-id="1673"><span data-dcnode-id="1674" instrument_node="">Lucerne and Endelberg day tour</span></strong></a><span data-dcnode-id="1671" instrument_node="">. This includes exploring a cute Swiss village, a quick hike in the Alps, and tons of beautiful scenery in Lucerne</span></li><li data-dcnode-id="1662"><strong data-dcnode-id="1668"><span data-dcnode-id="1669" instrument_node="">Option 2</span></strong><span data-dcnode-id="1667" instrument_node=""> is </span><a data-dcnode-id="1664" data-gyg-scraped="1650878262346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/zurich-l55/titlis-eternal-snow-and-glacier-from-zuerich-t1329/%3Fpartner_id%3DXT8GSDM%26utm_medium%3Donline_publisher%26utm_source%3Dto_some_place_new%26placement%3Dcontent-middle%26deeplink_id%3Deab23d21-9118-5777-8895-86155d2f210d" rel="noreferrer noopener sponsored nofollow" target="_blank"><strong data-dcnode-id="1665"><span data-dcnode-id="1666" instrument_node="">Mount Titlis and Lucerne day tour.</span></strong></a><span data-dcnode-id="1663" instrument_node="">&nbsp; Explore Lake Lucerne and embark on a city tour, Engelberg with a cable car ride to Mount Titlis. Visit an ice grotto.&nbsp;</span></li></ul></li><li data-dcnode-id="1650"><strong data-dcnode-id="1658"><span data-dcnode-id="1659" instrument_node="">Day 4</span></strong><span data-dcnode-id="1657" instrument_node="">: Day Trip to </span><strong data-dcnode-id="1655"><span data-dcnode-id="1656" instrument_node="">Jungfraujoch – Top of Europe</span></strong><span data-dcnode-id="1654" instrument_node="">. This tour includes travel through Interlaken, Grindelwald, Lauterbrunnen, and of course Top of Europe! </span><a data-dcnode-id="1651" data-gyg-scraped="1650878262346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/zurich-l55/zurichlucerneinterlaken-to-jungfraujochtop-of-europe-t42645/%3Fpartner_id%3DXT8GSDM%26utm_medium%3Donline_publisher%26utm_source%3Dto_some_place_new%26placement%3Dcontent-middle%26deeplink_id%3D717252f8-7662-5581-bf6e-9001fa8a12cb" rel="noreferrer noopener sponsored nofollow" target="_blank"><strong data-dcnode-id="1652"><span data-dcnode-id="1653" instrument_node="">Book this day tour to Jungfrau, one of the bucket list items!</span></strong></a></li><li data-dcnode-id="1640"><strong data-dcnode-id="1648"><span data-dcnode-id="1649" instrument_node="">Day 5</span></strong><span data-dcnode-id="1647" instrument_node="">: Day tour to the capital city of Switzerland, </span><strong data-dcnode-id="1645"><span data-dcnode-id="1646" instrument_node="">Bern</span></strong><span data-dcnode-id="1644" instrument_node="">. Learn about the city’s history and capture cultural nuances. </span><a data-dcnode-id="1641" data-gyg-scraped="1650878262346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/zurich-l55/berne-swiss-capital-tour-from-zurich-or-lucerne-t49469/%3Fpartner_id%3DXT8GSDM%26utm_medium%3Donline_publisher%26utm_source%3Dto_some_place_new%26placement%3Dcontent-middle%26deeplink_id%3D65739abd-e87d-5b3d-b168-b0d681fcc6e3" rel="noreferrer noopener sponsored nofollow" target="_blank"><strong data-dcnode-id="1642"><span data-dcnode-id="1643" instrument_node="">View this tour here</span></strong></a></li></ul><span data-dcnode-id="1638" instrument_node="">
</span><p data-dcnode-id="1627"><span data-dcnode-id="1637" instrument_node="">If you are feeling fancy, take a </span><a data-dcnode-id="1635" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tosomeplacenew.com/zurich-to-liechtenstein-day-trip-itinerary/"><span data-dcnode-id="1636" instrument_node="">day trip to Liechtenstein</span></a><span data-dcnode-id="1634" instrument_node=""> and stop at Heidiland and Rapperswil (Switzerland). Liechtenstein is a micro-state aka a </span><a data-dcnode-id="1632" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tosomeplacenew.com/travel-europe/european-microstates/"><span data-dcnode-id="1633" instrument_node="">small nation in Europe</span></a><span data-dcnode-id="1631" instrument_node="">, and it can be easily explored from Zurich. </span><a data-dcnode-id="1628" data-gyg-scraped="1650878262346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/zurich-l55/from-zurich-private-trip-to-liechtenstein-and-heidiland-t377256/%3Fpartner_id%3DXT8GSDM%26utm_medium%3Donline_publisher%26utm_source%3Dto_some_place_new%26placement%3Dcontent-middle%26deeplink_id%3Dab4ea843-4698-5d99-a91c-afaa61324bc6" rel="noreferrer noopener sponsored nofollow" target="_blank"><strong data-dcnode-id="1629"><span data-dcnode-id="1630" instrument_node="">Check out this day tour</span></strong></a></p><span data-dcnode-id="1626" instrument_node="">
</span><p class="has-theme-primary-background-color has-background" data-dcnode-id="1621"><span data-dcnode-id="1625" instrument_node="">For a full packaged tour, opt for G-Adventures. We are known for conducting ethical small group tours. What I liked about them is that they are a Canadian company, and they focus on cultural travel. You can </span><strong data-dcnode-id="1622"><a data-dcnode-id="1623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.awin1.com/cread.php%3Fawinaffid%3D683305%26awinmid%3D2204%26platform%3Ddl%26ued%3Dhttps%253A%252F%252Fwww.gadventures.com%252Fdestinations%252Feurope%252Fswitzerland%252F" rel="noreferrer noopener sponsored nofollow" target="_blank"><span data-dcnode-id="1624" instrument_node="">view their current Switzerland tour offers here</span></a></strong></p><span data-dcnode-id="1620" instrument_node="">
</span><h2 data-dcnode-id="1615"><span class="ez-toc-section" data-dcnode-id="1619" id="Scenic_Train_Routes_Switzerland_Travel_Itinerary_5_days_Sample_4"></span><strong data-dcnode-id="1617"><span data-dcnode-id="1618" instrument_node="">Scenic Train Routes: Switzerland Travel Itinerary 5 days (Sample 4)</span></strong><span class="ez-toc-section-end" data-dcnode-id="1616"></span></h2><span data-dcnode-id="1614" instrument_node="">
</span><p data-dcnode-id="1612"><span data-dcnode-id="1613" instrument_node="">Here is a 5 day itinerary for Switzerland starting in Zurich and exploring Zermatt by train, embarking on the Glacier Express to St. Moritz, and returning to Zurich on day 5.&nbsp;</span></p><span data-dcnode-id="1611" instrument_node="">
</span><ul data-dcnode-id="1598"><li data-dcnode-id="1607"><strong data-dcnode-id="1609"><span data-dcnode-id="1610" instrument_node="">Day 1 Explore Zurich</span></strong><span data-dcnode-id="1608" instrument_node="">: Explore the city in the morning. Set aside 2-4 hours in the Old Town. Grab some lunch and then hop on a train to Zermatt from the Zurich Main Station.&nbsp;</span></li><li data-dcnode-id="1603"><strong data-dcnode-id="1605"><span data-dcnode-id="1606" instrument_node="">The train ride from Zurich to Zermatt:</span></strong><span data-dcnode-id="1604" instrument_node=""> Zurich to Zermatt train time is about 3 hours+ covering the 100 miles (161 km) long route. The train passes through Bern and Thun, before arriving in Zermatt. The ride from Visp to Zermatt is super scenic so make sure to stay awake 🙂&nbsp;</span></li><li data-dcnode-id="1599"><strong data-dcnode-id="1601"><span data-dcnode-id="1602" instrument_node="">Day 2: Wake up in Zermatt</span></strong><span data-dcnode-id="1600" instrument_node="">. Spend time exploring this beautiful mountain town. There are a ton of hikes and walks of all difficulty levels to enjoy here. If you prefer to sit back and just drool at the mountains without a hike, then head up to Gornergrat. This steep train ride will take you to an altitude of 3.089 metres (10.135 feet) above sea level and you can soak in the views of the Gorner Glacier and the Matterhorn.&nbsp;</span></li></ul><span data-dcnode-id="1597" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1585"><figure class="aligncenter size-large" data-dcnode-id="1586"><div class="dpsp-pin-it-wrapper wp-image-20558" data-dcnode-id="1591"><img alt="Zermatt: Sightseeing packed 5 days in Switzerland Itinerary for your trip. It includes 5 samples for Switzerland Itinerary 5 days, plus travel tips. " class="" data-dcnode-id="1596" data-lazy-sizes="(max-width: 800px) 100vw, 800px" data-lazy-src="https://www.tosomeplacenew.com/wp-content/uploads/2020/12/Zermatt.jpg" data-lazy-srcset="https://www.tosomeplacenew.com/wp-content/uploads/2020/12/Zermatt.jpg 800w, https://www.tosomeplacenew.com/wp-content/uploads/2020/12/Zermatt-300x200.jpg 300w, https://www.tosomeplacenew.com/wp-content/uploads/2020/12/Zermatt-768x513.jpg 768w, https://www.tosomeplacenew.com/wp-content/uploads/2020/12/Zermatt-600x400.jpg 600w" data-pin-description="Zermatt: Sightseeing packed 5 days in Switzerland Itinerary for your trip. It includes 5 samples for Switzerland Itinerary 5 days, plus travel tips. " data-pin-title="Perfect 5 days in Switzerland Itinerary (with 5 samples)" height="534" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20800%20534'%3E%3C/svg%3E" style="" width="800"><a aria-label="Pin It" class="dpsp-pin-it-button dpsp-pin-it-button-top-left dpsp-pin-it-button-shape-rectangular dpsp-pin-it-button-has-label" data-dcnode-id="1592" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pinterest.com/pin/create/bookmarklet/%3Fmedia%3Dhttps%253A%252F%252Fwww.tosomeplacenew.com%252Fwp-content%252Fuploads%252F2020%252F12%252FZermatt.jpg%26url%3Dhttps%253A%252F%252Fwww.tosomeplacenew.com%252F5-days-in-switzerland-itinerary%252F%26is_video%3Dfalse%26description%3DZermatt%253A%2520Sightseeing%2520packed%25205%2520days%2520in%2520Switzerland%2520Itinerary%2520for%2520your%2520trip.%2520It%2520includes%25205%2520samples%2520for%2520Switzerland%2520Itinerary%25205%2520days%252C%2520plus%25 own</span></figcaption></figure></div><span data-dcnode-id="1584" instrument_node="">
</span><ul data-dcnode-id="1565"><li data-dcnode-id="1577"><strong data-dcnode-id="1582"><span data-dcnode-id="1583" instrument_node="">Day 3: Next day ride the scenic Glacier Express</span></strong><span data-dcnode-id="1581" instrument_node="">. This train leaves Zermatt twice a day and takes you to St Moritz in about 8 hours. The train takes you across 291 bridges, through 91 tunnels, three cantons, and two language regions. </span><strong data-dcnode-id="1578"><a data-dcnode-id="1579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.booking.com/hotel/ch/the-piz.en.html%3Faid%3D1567021%26no_rooms%3D1%26group_adults%3D2" rel="noreferrer noopener sponsored nofollow" target="_blank"><span data-dcnode-id="1580" instrument_node="">Stay in Piz St. Moritz Lodge, a no frills 2-star hotel.&nbsp;</span></a></strong></li><li data-dcnode-id="1570"><strong data-dcnode-id="1575"><span data-dcnode-id="1576" instrument_node="">Day 4: Explore St. Moritz for a day</span></strong><span data-dcnode-id="1574" instrument_node="">. There are a ton of outdoorsy things to do in St Moritz from hiking, stand up paddling, swimming, windsurfing, to skiing, snowboarding, snowshoeing, cross-country skiing in </span><a data-dcnode-id="1572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tosomeplacenew.com/best-places-to-visit-in-switzerland-in-winter/"><span data-dcnode-id="1573" instrument_node="">winters in Switzerland.</span></a><span data-dcnode-id="1571" instrument_node=""> You can also explore soft adventure/light activities like strolling the town centre, eating your heart out or taking the train from Ospizio Bernina (highest spot of the Bernina Express Line) to nearby areas.&nbsp;</span></li><li data-dcnode-id="1566"><strong data-dcnode-id="1568"><span data-dcnode-id="1569" instrument_node="">Day 5: Return to Zurich. </span></strong><span data-dcnode-id="1567" instrument_node="">Train from St Moritz to Zurich is only 3 hours long, so you can explore in the morning or stop at Walenstadt (Lake Walensee). This lake is the perfect stopover between the two cities, offering mesmerizing views.&nbsp;</span></li></ul><span data-dcnode-id="1564" instrument_node="">
</span><p data-dcnode-id="1562"><span data-dcnode-id="1563" instrument_node="">There are other scenic train routes available including the Golden Pass Train Line that goes from Lucerne to Montreux via Interlaken and Zweisimmen.&nbsp;</span></p><span data-dcnode-id="1561" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1549"><figure class="aligncenter size-large" data-dcnode-id="1550"><div class="dpsp-pin-it-wrapper wp-image-20559" data-dcnode-id="1555"><img alt="Views of Montreux in summer time" class="" data-dcnode-id="1560" data-lazy-sizes="(max-width: 800px) 100vw, 800px" data-lazy-src="https://www.tosomeplacenew.com/wp-content/uploads/2020/12/Montreaux.jpg" data-lazy-srcset="https://www.tosomeplacenew.com/wp-content/uploads/2020/12/Montreaux.jpg 800w, https://www.tosomeplacenew.com/wp-content/uploads/2020/12/Montreaux-300x195.jpg 300w, https://www.tosomeplacenew.com/wp-content/uploads/2020/12/Montreaux-768x498.jpg 768w" data-pin-description="Views of Montreux in summer time" data-pin-title="Perfect 5 days in Switzerland Itinerary (with 5 samples)" height="519" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20800%20519'%3E%3C/svg%3E" style="" width="800"><a aria-label="Pin It" class="dpsp-pin-it-button dpsp-pin-it-button-top-left dpsp-pin-it-button-shape-rectangular dpsp-pin-it-button-has-label" data-dcnode-id="1556" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pinterest.com/pin/create/bookmarklet/%3Fmedia%3Dhttps%253A%252F%252Fwww.tosomeplacenew.com%252Fwp-content%252Fuploads%252F2020%252F12%252FMontreaux.jpg%26url%3Dhttps%253A%252F%252Fwww.tosomeplacenew.com%252F5-days-in-switzerland-itinerary%252F%26is_video%3Dfalse%26description%3DViews%2520of%2520Montreux%2520in%2520summer%2520time" rel="noopener" target="_blank" title="Pin It"><span class="dpsp-network-icon" data-dcnode-id="1557"><svg data-dcnode-id="1558" height="32" viewBox="0 0 23 32" width="23" xmlns="http://www.w3.org/2000/svg"><path d="M0 10.656q0-1.92 0.672-3.616t1.856-2.976 2.72-2.208 3.296-1.408 3.616-0.448q2.816 0 5.248 1.184t3.936 3.456 1.504 5.12q0 1.728-0.32 3.36t-1.088 3.168-1.792 2.656-2.56 1.856-3.392 0.672q-1.216 0-2.4-0.576t-1.728-1.568q-0.16 0.704-0.48 2.016t-0.448 1.696-0.352 1.28-0. </span><h2 data-dcnode-id="1543"><span class="ez-toc-section" data-dcnode-id="1547" id="Culture_Exploration_Switzerland_5_Day_Itinerary_Sample_5"></span><strong data-dcnode-id="1545"><span data-dcnode-id="1546" instrument_node="">Culture Exploration: Switzerland 5 Day Itinerary (Sample 5)</span></strong><span class="ez-toc-section-end" data-dcnode-id="1544"></span></h2><span data-dcnode-id="1542" instrument_node="">
</span><p data-dcnode-id="1537"><span data-dcnode-id="1541" instrument_node="">This Switzerland 5 day itinerary starts in Geneva and goes across the country exploring the </span><a data-dcnode-id="1539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tosomeplacenew.com/history-and-culture/"><span data-dcnode-id="1540" instrument_node="">UNESCO/cultural gems</span></a><span data-dcnode-id="1538" instrument_node=""> along the way.&nbsp;</span></p><span data-dcnode-id="1536" instrument_node="">
</span><ul data-dcnode-id="1515"><li data-dcnode-id="1532"><strong data-dcnode-id="1534"><span data-dcnode-id="1535" instrument_node="">Day 1: Arrive and explore Geneva.</span></strong><span data-dcnode-id="1533" instrument_node=""> Stroll the downtown/city centre area and stop by the UN buildings aka Palais des Nations. Be sure to book a guided tour to learn more about the UN formation (League of Nations) and its functioning today. The water jet –&nbsp; Jet d’Eau – is a must see attraction in the city. It receives water from Lake Geneva. In the evening, leave for Bern. Stay in Bern for the night.</span></li><li data-dcnode-id="1528"><strong data-dcnode-id="1530"><span data-dcnode-id="1531" instrument_node="">Day 2: Explore Bern</span></strong><span data-dcnode-id="1529" instrument_node="">. Bern is a UNESCO listed city, and there are plenty of activities to keep you busy. choose from. Take a stroll through the old town, stop by the bear park, or visit the Bundeshaus (House of Parliament). Nature is still at your doorstep here, so take time to head to Rosengarten for the views. Or visit the botanical garden, and later go for a swim either in the River Aare.&nbsp;</span></li><li data-dcnode-id="1524"><strong data-dcnode-id="1526"><span data-dcnode-id="1527" instrument_node="">Day 3: From Bern, start for La Chaux-de-Fonds</span></strong><span data-dcnode-id="1525" instrument_node=""> in the Canton of Neuchâtel. The city is known for Le Corbusier, one of the most influential architects of the 20th century who was born here. You will also find watches/watch factories here. Take your time here, relax and then when ready return to Bern. In the evening,&nbsp; catch the train to St. Gallen (two hour train ride)</span></li><li data-dcnode-id="1520"><strong data-dcnode-id="1522"><span data-dcnode-id="1523" instrument_node="">Day 4: Start your day in St. Gallen</span></strong><span data-dcnode-id="1521" instrument_node="">. Explore the old town of St. Gallen, and wander through the UNESCO listed Abbey District. The Cathedral and the impressive Abbey Library will take your breath away. From the city you can venture into the mountains – the nearby Alpstein range. Lake Constance is also easily accessible from St. Gallen. In the evening head back to Bern.&nbsp;&nbsp;</span></li><li data-dcnode-id="1516"><strong data-dcnode-id="1518"><span data-dcnode-id="1519" instrument_node="">Day 5: Bern to Morat &amp; Neuchâtel.</span></strong><span data-dcnode-id="1517" instrument_node=""> In the morning, take the train to the quaint little town of Morat from Bern. Train ride is about 30 minutes, and will engulf you into a town steeped in prettiness. Stroll the historic town centre, or hang out at the Lake Morat in Salavaux. From here, travel to Neuchâtel. Head to Chaumont, a mountain in Neuchâtel. You can take the funicular from Le Coudre to the top and then you can hike down to Cressier via Trois Cheminées. From Cressier, board the bus back to Neuchâtel (and take the train to Geneva in the evening. Trains take 1.25 hour).</span></li></ul><span data-dcnode-id="1514" instrument_node="">
</span><h2 data-dcnode-id="1509"><span class="ez-toc-section" data-dcnode-id="1513" id="Using_Swiss_Travel_Pass_for_Getting_Around"></span><strong data-dcnode-id="1511"><span data-dcnode-id="1512" instrument_node="">Using Swiss Travel Pass for Getting Around</span></strong><span class="ez-toc-section-end" data-dcnode-id="1510"></span></h2><span data-dcnode-id="1508" instrument_node="">
</span><p data-dcnode-id="1506"><span data-dcnode-id="1507" instrument_node="">As a highly-functional country, Switzerland’s transportation system runs like a well-oiled machine. There are car rentals, bus stops, and even lake cruises available as options to get from A to B. But perhaps the most efficient way to travel around Switzerland is by train.&nbsp;</span></p><span data-dcnode-id="1505" instrument_node="">
</span><p data-dcnode-id="1500"><span data-dcnode-id="1504" instrument_node="">The train is used as a popular mode of transport for both intercity and intracity movements. But there are also several </span><a data-dcnode-id="1502" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tosomeplacenew.com/most-scenic-train-rides-in-switzerland/"><span data-dcnode-id="1503" instrument_node="">scenic train rides in Switzerland</span></a><span data-dcnode-id="1501" instrument_node=""> that can be enjoyed as an activity in their own right.&nbsp;</span></p><span data-dcnode-id="1499" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1489"><figure class="aligncenter size-large" data-dcnode-id="1490"><div class="dpsp-pin-it-wrapper wp-image-20561" data-dcnode-id="1493"><img alt="View from Swiss trains to the countryside and tracks" class="" data-dcnode-id="1498" data-lazy-sizes="(max-width: 800px) 100vw, 800px" data-lazy-src="https://www.tosomeplacenew.com/wp-content/uploads/2020/12/Swiss-Train-Rides.jpg" data-lazy-srcset="https://www.tosomeplacenew.com/wp-content/uploads/2020/12/Swiss-Train-Rides.jpg 800w, https://www.tosomeplacenew.com/wp-content/uploads/2020/12/Swiss-Train-Rides-300x225.jpg 300w, https://www.tosomeplacenew.com/wp-content/uploads/2020/12/Swiss-Train-Rides-768x576.jpg 768w" data-pin-description="View from Swiss trains to the countryside and tracks" data-pin-title="Perfect 5 days in Switzerland Itinerary (with 5 samples)" height="600" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20800%20600'%3E%3C/svg%3E" style="" width="800"><a aria-label="Pin It" class="dpsp-pin-it-button dpsp-pin-it-button-top-left dpsp-pin-it-button-shape-rectangular dpsp-pin-it-button-has-label" data-dcnode-id="1494" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pinterest.com/pin/create/bookmarklet/%3Fmedia%3Dhttps%253A%252F%252Fwww.tosomeplacenew.com%252Fwp-content%252Fuploads%252F2020%252F12%252FSwiss-Train-Rides.jpg%26url%3Dhttps%253A%252F%252Fwww.tosomeplacenew.com%252F5-days-in-switzerland-itinerary%252F%26is_video%3Dfalse%26description%3DView%2520from%2520Swiss%2520trains%2520to%2520the%2520countryside%2520and%2520tracks" rel="noopener" target="_blank" title="Pin It"><span class="dpsp-network-icon" data-dcnode-id="1495"><svg data-dcnode-id="1496" height="32" viewBox="0 0 23 32" width="23" xmlns="http://www.w3.org/2000/svg"><path d="M0 10.656q0-1.92 0.672-3.616t1.856-2.976 2.72-2.208 3.296-1.408 3.616-0.448q2.816 0 5.248 1.184t3.936 3.456 1.504 5.12q0 1.728-0.32 3.36t-1.088 3.168-1.79 </span><p data-dcnode-id="1483"><strong data-dcnode-id="1485"><a data-dcnode-id="1486" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//affiliate.klook.com/jump/en-CA/activity/11366-swiss-travel-rail-pass/%3Fadid%3D83647%26af_wid%3D5680" rel="noreferrer noopener sponsored nofollow" target="_blank"><span data-dcnode-id="1487" instrument_node="">The Swiss Travel Pass is a savings card</span></a></strong><span data-dcnode-id="1484" instrument_node=""> that gives you access to train rides throughout Switzerland. These passes help you to save money in the long run, while traveling in comfort and style.&nbsp;&nbsp;</span></p><span data-dcnode-id="1482" instrument_node="">
</span><p data-dcnode-id="1480"><span data-dcnode-id="1481" instrument_node="">The pass gives unlimited access to trains, boats, and buses across the country for your choice of 3, 4, 8, or 15 consecutive days. In addition, it offers entry into select museums and includes select mountain excursions.</span></p><span data-dcnode-id="1479" instrument_node="">
</span><p class="has-theme-primary-background-color has-background" data-dcnode-id="1474"><em data-dcnode-id="1475"><strong data-dcnode-id="1476"><a data-dcnode-id="1477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//affiliate.klook.com/jump/en-CA/activity/11366-swiss-travel-rail-pass/%3Fadid%3D83647%26af_wid%3D5680" rel="noreferrer noopener sponsored nofollow" target="_blank"><span data-dcnode-id="1478" instrument_node="">Get your Swiss Travel Pass online before you arrive</span></a></strong></em></p><span data-dcnode-id="1473" instrument_node="">
</span><h2 data-dcnode-id="1468"><span class="ez-toc-section" data-dcnode-id="1472" id="Why_Not_Extend_Your_Switzerland_Trip"></span><strong data-dcnode-id="1470"><span data-dcnode-id="1471" instrument_node="">Why Not Extend Your Switzerland Trip?</span></strong><span class="ez-toc-section-end" data-dcnode-id="1469"></span></h2><span data-dcnode-id="1467" instrument_node="">
</span><p data-dcnode-id="1465"><span data-dcnode-id="1466" instrument_node="">Before you know it, your surreal time in Switzerland will be over and you’ll be begging for more. If these itineraries only served to whet your appetite, and you can afford to extend your stay, then we’d highly recommend that you do!</span></p><span data-dcnode-id="1464" instrument_node="">
</span><p data-dcnode-id="1459"><span data-dcnode-id="1463" instrument_node="">To help you get started on further planning, you can browse our </span><a data-dcnode-id="1461" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tosomeplacenew.com/best-switzerland-itinerary-7-days/"><span data-dcnode-id="1462" instrument_node="">7-day Switzerland itinerary</span></a><span data-dcnode-id="1460" instrument_node="">. The beautiful country is warm and welcoming – even in winter. So pack your snow boots or your sun hat and enjoy the trip!</span></p><span data-dcnode-id="1458" instrument_node="">

</span><p data-dcnode-id="506"><span data-dcnode-id="507" instrument_node="">It will cover your trip fully until Grindelwald. From here you can get to Jungfraujoch with a 25% discount by using the Swiss Travel Pass. Then for Mount Titlis, you will get 50%. </span></p><span data-dcnode-id="505" instrument_node="">
</span><p data-dcnode-id="503"><span data-dcnode-id="504" instrument_node="">Because you are traveling with a child, you can request a free Swiss Family Card when ordering (the card allows kids aged 6–15 to travel free with a parent). To get the Family Card directly, add the child as a passenger under ‘Add passengers’ when you buy your Swiss Travel Pass. (The 25% and 50% ticket discount also applies to the child passenger)</span></p><span data-dcnode-id="502" instrument_node="">
</span><p data-dcnode-id="500"><span data-dcnode-id="501" instrument_node="">I hope this helps! Happy Travels 🙂</span></p><span data-dcnode-id="499" instrument_node="">

</span><section class="widget widget_text" data-dcnode-id="397" id="text-38"><h2 class="widget-title" data-dcnode-id="410"><span data-dcnode-id="411" instrument_node="">About the travelers!</span></h2><span data-dcnode-id="409" instrument_node=""> </span><div class="textwidget" data-dcnode-id="399"><p data-dcnode-id="401"><img alt="" class="aligncenter size-full wp-image-19153" data-dcnode-id="408" data-lazy-sizes="(max-width: 700px) 100vw, 700px" data-lazy-src="https://www.tosomeplacenew.com/wp-content/uploads/2020/08/About-the-travelers_ToSomePlaceNew.png" data-lazy-srcset="https://www.tosomeplacenew.com/wp-content/uploads/2020/08/About-the-travelers_ToSomePlaceNew.png 700w, https://www.tosomeplacenew.com/wp-content/uploads/2020/08/About-the-travelers_ToSomePlaceNew-210x300.png 210w" height="1000" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20700%201000'%3E%3C/svg%3E" width="700"><noscript data-dcnode-id="406"><span data-dcnode-id="407" instrument_node="">&lt;img class="aligncenter size-full wp-image-19153" src="https://www.tosomeplacenew.com/wp-content/uploads/2020/08/About-the-travelers_ToSomePlaceNew.png" alt="" width="700" height="1000" srcset="https://www.tosomeplacenew.com/wp-content/uploads/2020/08/About-the-travelers_ToSomePlaceNew.png 700w, https://www.tosomeplacenew.com/wp-content/uploads/2020/08/About-the-travelers_ToSomePlaceNew-210x300.png 210w" sizes="(max-width: 700px) 100vw, 700px" /&gt;</span></noscript><span data-dcnode-id="405" instrument_node=""> </span><span data-dcnode-id="402" style="font-weight: 200;"><br data-dcnode-id="404"><span data-dcnode-id="403" instrument_node="">
