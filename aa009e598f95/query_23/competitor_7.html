</span><p data-dcnode-id="113" style="text-align: center;"><span data-dcnode-id="114" instrument_node="">This is a challenging time for our clients given the uncertainty around the spread of coronavirus, particularly for those with near-term travel plans in impacted areas. We’re working with our suppliers on being flexible with their booking conditions, and enabling families to postpone travel to a later date without a penalty, when possible. Likewise, given the unpredictability around destinations that may be impacted in the future, we’re helping clients planning new trips and understand ways that they can protect themselves until the situation improves. We are ready to help our clients work through questions and concerns.</span></p><span data-dcnode-id="112" instrument_node="">
