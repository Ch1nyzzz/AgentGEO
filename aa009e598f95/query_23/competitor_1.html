</span></div><span data-dcnode-id="1180" instrument_node="">
</span><h2 class="text-title" data-dcnode-id="1178"><span data-dcnode-id="1179" instrument_node="">Alaska 5 Day Itinerary</span></h2><p data-dcnode-id="1176"><span data-dcnode-id="1177" instrument_node="">Even though most visitors leave Alaska wishing they had more time, there are still plenty of ways to fit in exciting activities and memorable destinations when you're working with just five days. </span></p><p data-dcnode-id="1141"><span data-dcnode-id="1175" instrument_node="">Our five-day itineraries focus on the top </span><a data-dcnode-id="1173" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.alaskatravel.com/destinations/"><span data-dcnode-id="1174" instrument_node="">Alaska destinations</span></a><span data-dcnode-id="1172" instrument_node="">. In one trip, you can take a wildlife </span><a data-dcnode-id="1170" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.alaskatravel.com/things-to-do/denali-bus-tours/"><span data-dcnode-id="1171" instrument_node="">bus tour</span></a><span data-dcnode-id="1169" instrument_node=""> into </span><a data-dcnode-id="1167" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.alaskatravel.com/denali-national-park/"><span data-dcnode-id="1168" instrument_node="">Denali National Park</span></a><span data-dcnode-id="1166" instrument_node=""> and </span><a data-dcnode-id="1164" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.alaskatravel.com/things-to-do/day-cruises/"><span data-dcnode-id="1165" instrument_node="">day cruise</span></a><span data-dcnode-id="1163" instrument_node=""> into </span><a data-dcnode-id="1161" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.alaskatravel.com/parks/kenai-fjords/"><span data-dcnode-id="1162" instrument_node="">Kenai Fjords National Park</span></a><span data-dcnode-id="1160" instrument_node="">, </span><a data-dcnode-id="1158" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.alaskatravel.com/denali-national-park/rafting-scenic/"><span data-dcnode-id="1159" instrument_node="">raft </span></a><span data-dcnode-id="1157" instrument_node="">the Nenana River, and even go </span><a data-dcnode-id="1155" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.alaskatravel.com/things-to-do/flightseeing/"><span data-dcnode-id="1156" instrument_node="">flightseeing </span></a><span data-dcnode-id="1154" instrument_node="">through the Alaska Range. Overnight destinations on these tours can include </span><a data-dcnode-id="1152" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.alaskatravel.com/seward/"><span data-dcnode-id="1153" instrument_node="">Seward</span></a><span data-dcnode-id="1151" instrument_node="">, </span><a data-dcnode-id="1149" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.alaskatravel.com/anchorage/"><span data-dcnode-id="1150" instrument_node="">Anchorage</span></a><span data-dcnode-id="1148" instrument_node="">, </span><a data-dcnode-id="1146" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.alaskatravel.com/talkeetna/"><span data-dcnode-id="1147" instrument_node="">Talkeetna</span></a><span data-dcnode-id="1145" instrument_node="">, and the </span><a data-dcnode-id="1143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.alaskatravel.com/denali-national-park/"><span data-dcnode-id="1144" instrument_node="">Denali Park</span></a><span data-dcnode-id="1142" instrument_node=""> area.</span></p><p data-dcnode-id="1137"><a class="show-more-link" data-dcnode-id="1138" href="#"><span data-dcnode-id="1140" instrument_node="">Show More </span><i class="fa-angle-right fa" data-dcnode-id="1139"></i></a></p><p class="show-more" data-dcnode-id="1126"><span data-dcnode-id="1136" instrument_node="">These packages also include a range of transportation options, which in a place as big as Alaska, is an important part of the travel experience. Most combine travel by both </span><a data-dcnode-id="1134" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.alaskatravel.com/alaska-railroad/"><span data-dcnode-id="1135" instrument_node="">railroad </span></a><span data-dcnode-id="1133" instrument_node="">and </span><a data-dcnode-id="1131" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.alaskatravel.com/park-connection-bus/"><span data-dcnode-id="1132" instrument_node="">motorcoach</span></a><span data-dcnode-id="1130" instrument_node="">, guaranteeing that you'll see as much of Alaska as possible in five days. There is also a self-drive travel package, our </span><a data-dcnode-id="1128" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.alaskatravel.com/tours/148/"><span data-dcnode-id="1129" instrument_node="">Both Sides of Denali Self-Drive</span></a><span data-dcnode-id="1127" instrument_node=""> tour, that includes a rental car. It's perfect for visitors who like a little more freedom to explore on their own.</span></p><p class="show-more" data-dcnode-id="1109"><span data-dcnode-id="1125" instrument_node="">A five-day land tour also pairs nicely with an </span><a data-dcnode-id="1123" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.alaskatravel.com/cruises/"><span data-dcnode-id="1124" instrument_node="">Alaska cruise</span></a><span data-dcnode-id="1122" instrument_node=""> to create a perfect </span><a data-dcnode-id="1120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.alaskatravel.com/vacations/cruise-tours/"><span data-dcnode-id="1121" instrument_node="">cruise tour vacation</span></a><span data-dcnode-id="1119" instrument_node="">. See our </span><a data-dcnode-id="1117" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.alaskatravel.com/find/cruises/"><span data-dcnode-id="1118" instrument_node="">Cruise Finder</span></a><span data-dcnode-id="1116" instrument_node=""> to look for a cruise, and our </span><a data-dcnode-id="1114" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.alaskatravel.com/vacations/pre-cruise-tours/"><span data-dcnode-id="1115" instrument_node="">pre-cruise</span></a><span data-dcnode-id="1113" instrument_node=""> or </span><a data-dcnode-id="1111" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.alaskatravel.com/vacations/post-cruise-tours/"><span data-dcnode-id="1112" instrument_node="">post-cruise</span></a><span data-dcnode-id="1110" instrument_node=""> pages for land tour ideas. </span></p><p class="show-more" data-dcnode-id="1107"><span data-dcnode-id="1108" instrument_node="">All our trip packages are fully customizable. You can upgrade your transportation, add destinations, and pick different activities. Our staff of local Alaskans is happy to work with you to create your ideal Alaskan vacation.</span></p><p class="show-more" data-dcnode-id="1093"><span data-dcnode-id="1106" instrument_node="">You can also use our </span><a data-dcnode-id="1104" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.alaskatravel.com/find/packages/"><span data-dcnode-id="1105" instrument_node="">Trip Finder</span></a><span data-dcnode-id="1103" instrument_node=""> to search for travel packages that include specific destinations, </span><a data-dcnode-id="1101" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.alaskatravel.com/things-to-do/"><span data-dcnode-id="1102" instrument_node="">things to do</span></a><span data-dcnode-id="1100" instrument_node="">, and types of transportation. We also have </span><a data-dcnode-id="1098" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.alaskatravel.com/land-tours/7-day-itinerary/"><span data-dcnode-id="1099" instrument_node="">seven-day</span></a><span data-dcnode-id="1097" instrument_node=""> and </span><a data-dcnode-id="1095" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.alaskatravel.com/land-tours/10-day-itinerary/"><span data-dcnode-id="1096" instrument_node="">10-day Alaska itineraries</span></a><span data-dcnode-id="1094" instrument_node=""> in case you decide that five days in Alaska just isn't enough.</span></p><p data-dcnode-id="1089"><a class="show-more show-less-link" data-dcnode-id="1090" href="#"><i class="fa-angle-left fa" data-dcnode-id="1092"></i><span data-dcnode-id="1091" instrument_node=""> Show Less</span></a></p><span data-dcnode-id="1088" instrument_node=""> </span><div class="widget-sidebar one-third desktop-hidden" data-dcnode-id="1045"><span data-dcnode-id="1087" instrument_node="">
