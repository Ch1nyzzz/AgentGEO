</span><h1 data-dcnode-id="1284"><span data-dcnode-id="1285" instrument_node="">20. The Sanctity of Marriage (Exodus 20:14)</span></h1><span data-dcnode-id="1283" instrument_node=""> </span><span data-dcnode-id="1281" instrument_node="">
</span><div data-dcnode-id="1280" id="mediaHolder"></div><span data-dcnode-id="1279" instrument_node="">
</span><span class="print-link" data-dcnode-id="1278"></span><div class="field field-name-body field-type-text-with-summary field-label-hidden" data-dcnode-id="619"><div class="field-items" data-dcnode-id="620"><div class="field-item even" data-dcnode-id="621"><h3 data-dcnode-id="1276"><span data-dcnode-id="1277" instrument_node="">Introduction</span></h3><span data-dcnode-id="1275" instrument_node="">
</span><p class="bodytext" data-dcnode-id="1273"><span data-dcnode-id="1274" instrument_node="">A few months ago, I was talking on the phone to my friend, John Maurer. In the midst of that conversation I said to John, “John you would not have been very happy with me. I did something which would make you cringe. Can you guess what that was?” John did not hesitate, even for a moment. He responded, “I’ll bet you’ve been using that Stanley wood chisel to scrape gaskets off of automobile engines again.” </span></p><span data-dcnode-id="1272" instrument_node="">
</span><p class="bodytext" data-dcnode-id="1270"><span data-dcnode-id="1271" instrument_node="">To understand John’s response, you have to understand John. To John, my Stanley chisel is a wood chisel, only to be used for chiseling wood. He is a purist in that regard—I am not. To me, my Stanley wood chisel is a very fine instrument for scraping old gasket material off an automobile engine. The difference between John and me in this instance is that John believes everything should be used for the purpose it was made. </span></p><span data-dcnode-id="1269" instrument_node="">
</span><p class="bodytext" data-dcnode-id="1267"><span data-dcnode-id="1268" instrument_node="">You may wonder what wood chisels have to do with the Seventh Commandment. As a matter of fact, my differences with John over the proper use of a wood chisel have a great deal to do with the commandment, “You shall not commit adultery.” The principle underlying this commandment is that of the sanctity of marriage. The difference between John and myself over the use of a wood chisel is also a matter of sanctification. To John, a wood chisel is to be sanctified—set apart for use only on wood. To me, a wood chisel can be used for any number of things, including, if necessary, automobile engines.</span></p><span data-dcnode-id="1266" instrument_node="">
</span><p class="bodytext" data-dcnode-id="1261"><span data-dcnode-id="1265" instrument_node="">Throughout the Bible, God sets certain things apart; He restricts their use; He sanctifies them. Mount Sinai, from which God spoke to Moses and the Israelites, was sanctified, set apart. Neither man nor beast was allowed to draw too near to it (</span><a class="NETBibleTagged" data-dcnode-id="1263" href="javascript:%7B%7D"><span data-dcnode-id="1264" instrument_node="">Exod. 19:12-13</span></a><span data-dcnode-id="1262" instrument_node="">, 23-24). The Israelites themselves were set apart from the Egyptians and from all other nations. We will discover in our lesson that marriage and sex were also sanctified by God. The implications of the sanctity of sex and marriage are the subject of this lesson.</span></p><span data-dcnode-id="1260" instrument_node="">
</span><p class="bodytext" data-dcnode-id="1258"><span data-dcnode-id="1259" instrument_node="">Our approach to this study will be to consider the progressively revealed truths of God about sex and marriage, beginning in the Old Testament, and then going to the New Testament. Finally, we shall attempt to distill the biblical teaching into a few guiding and governing principles. Finally, we will attempt to discover how these principles apply to our daily Christian walk.</span></p><span data-dcnode-id="1257" instrument_node="">
</span><h3 data-dcnode-id="1255"><span data-dcnode-id="1256" instrument_node="">Adultery in the Old Testament</span></h3><span data-dcnode-id="1254" instrument_node="">
</span><p class="bodytext" data-dcnode-id="1252"><span data-dcnode-id="1253" instrument_node="">The foundation for the sanctity of marriage and sex is laid early in the Book of Genesis, where we read of the first marriage.</span></p><span data-dcnode-id="1251" instrument_node="">
</span><p class="bodytext" data-dcnode-id="1249"><span data-dcnode-id="1250" instrument_node="">Then the LORD GOD said, “It is not good for the man to be alone; I will make him a helper suitable for him.” And out of the ground the LORD GOD formed every beast of the field and every bird of the sky, and brought them to the man to see what he would call them; and whatever the man called a living creature, that was its name. And the man gave names to all the cattle, and to the birds of the sky, and to every beast of the field, but for Adam there was not found a helper suitable for him. So the LORD GOD caused a deep sleep to fall upon the man, and he slept; then He took one of his ribs, and closed up the flesh at the place. And the LORD GOD fashioned into a woman the rib which He had taken from the man, and brought her to the man. And the man said, </span></p><span data-dcnode-id="1248" instrument_node="">
</span><p class="bodytext" data-dcnode-id="1243"><span data-dcnode-id="1247" instrument_node="">“This is now bone of my bones, And flesh of my flesh; She shall be called Woman, Because she was taken out of Man.” For this cause a man shall leave his father and his mother, and shall cleave to his wife; and they shall become one flesh (</span><a class="NETBibleTagged" data-dcnode-id="1245" href="javascript:%7B%7D"><span data-dcnode-id="1246" instrument_node="">Gen. 2:18-24</span></a><span data-dcnode-id="1244" instrument_node="">).</span></p><span data-dcnode-id="1242" instrument_node="">
</span><p class="bodytext" data-dcnode-id="1236"><span data-dcnode-id="1241" instrument_node="">Just as God gave life to all of His creatures in Genesis chapter 1, now in chapter 2 He gives a woman to Adam as his wife. It is God who brought Adam and Eve together as husband and wife. God not only created man and woman, He also created the institution of marriage. He joined the first man and the first woman together in marriage. This union involved the husband’s leaving of his parents</span><sup data-dcnode-id="1238"><a data-dcnode-id="1239" href="#P2224_840567"><span data-dcnode-id="1240" instrument_node="">42</span></a></sup><span data-dcnode-id="1237" instrument_node=""> and cleaving to his wife. The old dependent and submissive relationship of child to parent had to be set aside so that this unity of husband and wife could be established (v. 24). God has here joined a man and a woman so that they have become a unity. He has also set this unity apart, distinguishing it from the previous parental-child entity. In short, there has been both a leaving and a cleaving, a separation and a union. I believe that the sexual union of Adam and Eve consummated their marital union, and thus there is implied here a sanctity of both the marriage and the sexual relationship of Adam and Eve. From the very beginning of creation, to commit adultery was to violate the sanctity of sex in marriage.</span></p><span data-dcnode-id="1235" instrument_node="">
</span><p class="bodytext" data-dcnode-id="1228"><b data-dcnode-id="1233"><span data-dcnode-id="1234" instrument_node="">The third chapter of the Book of Genesis is significant to our study as well</span></b><span data-dcnode-id="1232" instrument_node="">. When the first sin was committed by partaking of the “forbidden fruit” God pronounced punishments which were appropriate to each party involved, as well as the consequences for all mankind. The important thing to note here is that God also promised salvation through the seed of the woman in the midst of the curse pronounced on Satan: “And I will put enmity Between you and the woman, And between your seed and her seed; He shall bruise you on the head, And you will bruise him on the heel” (</span><a class="NETBibleTagged" data-dcnode-id="1230" href="javascript:%7B%7D"><span data-dcnode-id="1231" instrument_node="">Gen. 3:15</span></a><span data-dcnode-id="1229" instrument_node="">).</span></p><span data-dcnode-id="1227" instrument_node="">
</span><p class="bodytext" data-dcnode-id="1225"><span data-dcnode-id="1226" instrument_node="">Satan, to save his skin, would begin to understand that he must begin to wage war on the seed of the woman. We would thus expect him to wage war on the marital union, for it is through marital union that the seed will be preserved and the promised seed will come. We know, of course, that the Lord Jesus was not born of the union of Mary and Joseph, but by a supernatural conception brought about by the Holy Spirit. But the messianic line until Mary was preserved through the union of a man and a woman in marriage. Satan can be expected to attack the sanctity of marriage in order to wage war on the “seed.”</span></p><span data-dcnode-id="1224" instrument_node="">
</span><p class="bodytext" data-dcnode-id="1213"><span data-dcnode-id="1223" instrument_node="">In </span><b data-dcnode-id="1221"><span data-dcnode-id="1222" instrument_node="">Genesis chapter 12</span></b><span data-dcnode-id="1220" instrument_node=""> further revelation about man’s salvation is given as the benefits brought about by human (and ultimately divine) seed: “And I will make you a great nation, And I will bless you; And make your name great; And so you shall be a blessing; And I will bless those who bless you, And the one who curses you I will curse. And in you all the families of the earth shall be blessed” (</span><a class="NETBibleTagged" data-dcnode-id="1218" href="javascript:%7B%7D"><span data-dcnode-id="1219" instrument_node="">Gen. 12:2-3</span></a><span data-dcnode-id="1217" instrument_node="">). God told Satan, Adam and Eve that the Savior of mankind would be the seed of the woman. Now, he tells Abram that the blessings He will give him and all the nations will come through his seed. Just a few verses away from the Abrahamic covenant in </span><a class="NETBibleTagged" data-dcnode-id="1215" href="javascript:%7B%7D"><span data-dcnode-id="1216" instrument_node="">Genesis 12:1-3</span></a><span data-dcnode-id="1214" instrument_node="">, Abram places the “seed” in jeopardy, at least from a human perspective:</span></p><span data-dcnode-id="1212" instrument_node="">
</span><p class="bodytext" data-dcnode-id="1207"><span data-dcnode-id="1211" instrument_node="">Now there was a famine in the land; so Abram went down to Egypt to sojourn there, for the famine was severe in the land. And it came about when he came near to Egypt, that he said to Sarai his wife, “See now, I know that you are a beautiful woman; and it will come about when the Egyptians see you, that they will say, ‘This is his wife’; and they will kill me, but they will let you live. Please say that you are my sister so that it may go well with me because of you, and that I may live on account of you” (</span><a class="NETBibleTagged" data-dcnode-id="1209" href="javascript:%7B%7D"><span data-dcnode-id="1210" instrument_node="">Gen. 12:10-13</span></a><span data-dcnode-id="1208" instrument_node="">).</span></p><span data-dcnode-id="1206" instrument_node="">
</span><p class="bodytext" data-dcnode-id="1204"><span data-dcnode-id="1205" instrument_node="">Abram’s request was for Sarai to lie, representing herself as an eligible bride, and thus potentially putting her in another man’s bed in order to save his life. In effect, Abram was not only endangering the promises of God and the purity of his wife, but he was paving the way for men to unknowingly commit adultery with his wife. This is not one of the high points in Abram’s life.</span></p><span data-dcnode-id="1203" instrument_node="">
</span><p class="bodytext" data-dcnode-id="1197"><span data-dcnode-id="1202" instrument_node="">There are other instances of sexual immorality in Genesis, but let us turn our attention to the bright light of Joseph’s character, in contrast to that of his close relatives.</span><sup data-dcnode-id="1199"><a data-dcnode-id="1200" href="#P2231_844886"><span data-dcnode-id="1201" instrument_node="">43</span></a></sup><span data-dcnode-id="1198" instrument_node=""> Joseph was a young man, with all of the sexual desires of any other healthy male. Away from his family, perhaps never again to return to his own people, how easy it would have been for him to succumb to the advances of his master’s wife:</span></p><span data-dcnode-id="1196" instrument_node="">
</span><p class="bodytext" data-dcnode-id="1191"><span data-dcnode-id="1195" instrument_node="">And it came about after these events that his master’s wife looked with desire at Joseph, and she said, “Lie with me.” But he refused and said to his master’s wife, “Behold, with me around, my master does not concern himself with anything in the house, and he has put all that he owns in my charge. There is no one greater in this house than I, and he has withheld nothing from me except you, because you are his wife. How then could I do this great evil, and sin against God?” And it came about as she spoke to Joseph day after day, that he did not listen to her to lie beside her, or be with her (</span><a class="NETBibleTagged" data-dcnode-id="1193" href="javascript:%7B%7D"><span data-dcnode-id="1194" instrument_node="">Gen. 39:7-10</span></a><span data-dcnode-id="1192" instrument_node="">).</span></p><span data-dcnode-id="1190" instrument_node="">
</span><p class="bodytext" data-dcnode-id="1188"><span data-dcnode-id="1189" instrument_node="">This incident reveals several important truths:</span></p><span data-dcnode-id="1187" instrument_node="">
</span><p class="bodytext" data-dcnode-id="1183"><b data-dcnode-id="1185"><span data-dcnode-id="1186" instrument_node="">(1) Joseph knew he could not lie with this woman because she was the wife of another man</span></b><span data-dcnode-id="1184" instrument_node="">. Marriage, in Joseph’s understanding, was an exclusive relationship. Not only did his master not give him authority over his wife, he could not have done so.</span></p><span data-dcnode-id="1182" instrument_node="">
</span><p class="bodytext" data-dcnode-id="1178"><b data-dcnode-id="1180"><span data-dcnode-id="1181" instrument_node="">(2) We can see by Joseph’s words that adultery was not only wrong, but that he understood it to be sin</span></b><span data-dcnode-id="1179" instrument_node="">.</span></p><span data-dcnode-id="1177" instrument_node="">
</span><p class="bodytext" data-dcnode-id="1171"><b data-dcnode-id="1175"><span data-dcnode-id="1176" instrument_node="">(3) Joseph understood that, more than anything else, adultery was a sin against God</span></b><span data-dcnode-id="1174" instrument_node="">.</span><b data-dcnode-id="1172"><span data-dcnode-id="1173" instrument_node=""> </span></b></p><span data-dcnode-id="1170" instrument_node="">
</span><p class="bodytext" data-dcnode-id="1166"><b data-dcnode-id="1168"><span data-dcnode-id="1169" instrument_node="">(4) The immediate results of Joseph’s actions were painful, but the ultimate outcome was the blessing of God</span></b><span data-dcnode-id="1167" instrument_node="">.</span></p><span data-dcnode-id="1165" instrument_node="">
</span><p class="bodytext" data-dcnode-id="1157"><span data-dcnode-id="1164" instrument_node="">It is against the backdrop of Israel’s history as described in Genesis that the Seventh Commandment is given to the Israelites: “You shall not commit adultery” (</span><a class="NETBibleTagged" data-dcnode-id="1162" href="javascript:%7B%7D"><span data-dcnode-id="1163" instrument_node="">Exod. 20:14</span></a><span data-dcnode-id="1161" instrument_node="">; </span><a class="NETBibleTagged" data-dcnode-id="1159" href="javascript:%7B%7D"><span data-dcnode-id="1160" instrument_node="">Deut. 5:18</span></a><span data-dcnode-id="1158" instrument_node="">).</span></p><span data-dcnode-id="1156" instrument_node="">
</span><p class="bodytext" data-dcnode-id="1154"><span data-dcnode-id="1155" instrument_node="">From what we have already learned in Genesis, it is apparent that the Israelites understood what adultery was and that it was sin. Nevertheless, the rest of the Pentateuch (the Pentateuch is the five books of the Old Testament, written by Moses) provides us with a great deal of detail concerning sexual sins, and the various forms of punishment required by each. Let us briefly summarize this revelation.</span></p><span data-dcnode-id="1153" instrument_node="">
</span><p class="bodytext" data-dcnode-id="1146"><b data-dcnode-id="1148"><span data-dcnode-id="1152" instrument_node=""></span><a class="NETBibleTagged" data-dcnode-id="1150" href="javascript:%7B%7D"><span data-dcnode-id="1151" instrument_node="">Exodus 22:16-17</span></a><span data-dcnode-id="1149" instrument_node=""></span></b><span data-dcnode-id="1147" instrument_node="">—A man who seduces a virgin must marry her or pay the price of a virgin’s dowry.</span></p><span data-dcnode-id="1145" instrument_node="">
</span><p class="bodytext" data-dcnode-id="1138"><b data-dcnode-id="1140"><span data-dcnode-id="1144" instrument_node=""></span><a class="NETBibleTagged" data-dcnode-id="1142" href="javascript:%7B%7D"><span data-dcnode-id="1143" instrument_node="">Leviticus 18</span></a><span data-dcnode-id="1141" instrument_node=""></span></b><span data-dcnode-id="1139" instrument_node="">—Israel is to distinguish herself from practices of Egypt and Canaan by maintaining sexual purity (vss. 3, 24-30). Uncovering the nakedness of a relative is prohibited (vss. 6-18), as well as illicit intercourse (vss. 19-23). Sexual sin defiles the people (vss. 24, 30) and the land (vss. 25, 27, 28), thus resulting in expulsion from the land.</span></p><span data-dcnode-id="1137" instrument_node="">
</span><p class="bodytext" data-dcnode-id="1130"><b data-dcnode-id="1132"><span data-dcnode-id="1136" instrument_node=""></span><a class="NETBibleTagged" data-dcnode-id="1134" href="javascript:%7B%7D"><span data-dcnode-id="1135" instrument_node="">Leviticus 20</span></a><span data-dcnode-id="1133" instrument_node=""></span></b><span data-dcnode-id="1131" instrument_node="">—Israel is not to “play the harlot” by consulting mediums or spiritists, but they are to consecrate themselves to the God of Israel, who sanctifies them (vss. 6-8). Sexual sins and their penalties are spelled out in detail (vss. 10-21). Sanctification is then stressed, so that Israel must not practice the immorality of the Canaanites before them, lest they too be thrust from the land (vss. 22-27).</span></p><span data-dcnode-id="1129" instrument_node="">
</span><p class="bodytext" data-dcnode-id="1122"><b data-dcnode-id="1124"><span data-dcnode-id="1128" instrument_node=""></span><a class="NETBibleTagged" data-dcnode-id="1126" href="javascript:%7B%7D"><span data-dcnode-id="1127" instrument_node="">Numbers 5</span></a><span data-dcnode-id="1125" instrument_node=""></span></b><span data-dcnode-id="1123" instrument_node="">—A test is given to determine whether or not a wife has been unfaithful to her husband. The consequences of either guilt or innocence are spelled out (vss. 11-31). </span></p><span data-dcnode-id="1121" instrument_node="">
</span><p class="bodytext" data-dcnode-id="1114"><b data-dcnode-id="1116"><span data-dcnode-id="1120" instrument_node=""></span><a class="NETBibleTagged" data-dcnode-id="1118" href="javascript:%7B%7D"><span data-dcnode-id="1119" instrument_node="">Deuteronomy 22</span></a><span data-dcnode-id="1117" instrument_node=""></span></b><span data-dcnode-id="1115" instrument_node="">—When a man accuses his wife of not being a virgin at the time they were married, the parents can show her (blood-stained) garment as proof of her purity. The consequences of guilt or innocence are spelled out (vss. 13-21).</span></p><span data-dcnode-id="1113" instrument_node="">
</span><p class="bodytext" data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node="">Taken as a whole, I believe that the above passages convey several vitally important truths, which we must pause to underscore:</span></p><span data-dcnode-id="1110" instrument_node="">
</span><p class="bodytext" data-dcnode-id="1106"><b data-dcnode-id="1108"><span data-dcnode-id="1109" instrument_node="">(1) Adultery is a more serious sexual sin because it is a violation of a marriage</span></b><span data-dcnode-id="1107" instrument_node="">. While the seduction of a virgin entails either marriage to the virgin or the payment of her dowry price to the father, sexual union with a married woman is punishable by death. While illicit sexual union is a sin, those unions which violate a marriage are taken more seriously. The reason seems to be solely because God has sanctified the marriage and the sexual sin has profaned it. </span></p><span data-dcnode-id="1105" instrument_node="">
</span><p class="bodytext" data-dcnode-id="1095"><b data-dcnode-id="1103"><span data-dcnode-id="1104" instrument_node="">(2) Sexual impurity defiles both the persons involved and the land</span></b><span data-dcnode-id="1102" instrument_node="">. </span><a class="NETBibleTagged" data-dcnode-id="1100" href="javascript:%7B%7D"><span data-dcnode-id="1101" instrument_node="">Leviticus 18</span></a><span data-dcnode-id="1099" instrument_node=""> and 20 emphasize the defiling nature of adultery, and warn that the practice of such sins will defile the land and will result in expulsion from the land, just as the Canaanites were expelled (cf. </span><a class="NETBibleTagged" data-dcnode-id="1097" href="javascript:%7B%7D"><span data-dcnode-id="1098" instrument_node="">Lev. 18:24-30; 20:22-26</span></a><span data-dcnode-id="1096" instrument_node="">).</span></p><span data-dcnode-id="1094" instrument_node="">
</span><p class="bodytext" data-dcnode-id="1087"><b data-dcnode-id="1092"><span data-dcnode-id="1093" instrument_node="">(3) Terms referring to adultery and sexual immorality are employed non-literally, referring to Israel’s infidelity to God</span></b><span data-dcnode-id="1091" instrument_node="">. “‘As for the person who turns to mediums and to spiritists, to play the harlot after them, I will also set My face against that person and will cut him off from among his people’” (</span><a class="NETBibleTagged" data-dcnode-id="1089" href="javascript:%7B%7D"><span data-dcnode-id="1090" instrument_node="">Lev. 20:6</span></a><span data-dcnode-id="1088" instrument_node="">). This is a point which the prophets of the Old Testament will take up and greatly expand upon in later times.</span></p><span data-dcnode-id="1086" instrument_node="">
</span><p class="bodytext" data-dcnode-id="1084"><span data-dcnode-id="1085" instrument_node="">The dubious distinction for the most well-known case of adultery would have to go to David, who sinned by committing adultery with Bathsheba, the wife of Uriah:</span></p><span data-dcnode-id="1083" instrument_node="">
</span><p class="bodytext" data-dcnode-id="1078"><span data-dcnode-id="1082" instrument_node="">Then it happened in the spring, at the time when kings go out to battle, that David sent Joab and his servants with him and all Israel, and they destroyed the sons of Ammon and besieged Rabbah. But David stayed at Jerusalem. Now when evening came David arose from his bed and walked around on the roof of the king’s house, and from the roof he saw a woman bathing; and the woman was very beautiful in appearance. So David sent and inquired about the woman. And one said, “Is this not Bathsheba, the daughter of Eliam, the wife of Uriah the Hittite?” And David sent messengers and took her, and when she came to him, he lay with her; and when she had purified herself from her uncleanness, she returned to her house. And the woman conceived; and she sent and told David, and said, “I am pregnant.” Then David sent to Joab, saying, “Send me Uriah the Hittite.” So Joab sent Uriah to David. When Uriah came to him, David asked concerning the welfare of Joab and the people and the state of the war. Then David said to Uriah, “Go down to your house, and wash your feet.” And Uriah went out of the king’s house, and a present from the king was sent out after him. But Uriah slept at the door of the king’s house with all the servants of his lord, and did not go down to his house. Now when they told David, saying, “Uriah did not go down to his house,” David said to Uriah, “Have you not come from a journey? Why did you not go down to your house?” And Uriah said to David, “The ark and Israel and Judah are staying in temporary shelters, and my lord Joab and the servants of my lord are camping in the open field. Shall I then go to my house to eat and to drink and to lie with my wife? By your life and the life of your soul, I will not do this thing.” Then David said to Uriah, “Stay here today also, and tomorrow I will let you go.” So Uriah remained in Jerusalem that day and the next. Now David called him, and he ate and drank before him, and he made him drunk; and in the evening he went out to lie on his bed with his lord’s servants, but he did not go down to his house” (</span><a class="NETBibleTagged" data-dcnode-id="1080" href="javascript:%7B%7D"><span data-dcnode-id="1081" instrument_node="">2 Samuel 11:1-13</span></a><span data-dcnode-id="1079" instrument_node="">). </span></p><span data-dcnode-id="1077" instrument_node="">
</span><p class="bodytext" data-dcnode-id="1075"><span data-dcnode-id="1076" instrument_node="">In these verses the sin of David is contrasted against the backdrop of the devotion and discipline of Uriah. Note these points of contrast:</span></p><span data-dcnode-id="1074" instrument_node="">
</span><p class="bodytext" data-dcnode-id="1070"><b data-dcnode-id="1072"><span data-dcnode-id="1073" instrument_node="">(1) Uriah’s military devotion in the “front lines” of battle is contrasted with David’s complacency, who never even makes it to the battle</span></b><span data-dcnode-id="1071" instrument_node="">.</span></p><span data-dcnode-id="1069" instrument_node="">
</span><p class="bodytext" data-dcnode-id="1065"><b data-dcnode-id="1067"><span data-dcnode-id="1068" instrument_node="">(2) While David enjoys all the luxuries of the palace, Uriah refused to enjoy them, even when urged on him</span></b><span data-dcnode-id="1066" instrument_node="">.</span></p><span data-dcnode-id="1064" instrument_node="">
</span><p class="bodytext" data-dcnode-id="1060"><b data-dcnode-id="1062"><span data-dcnode-id="1063" instrument_node="">(3) While David enjoyed sexual intimacy with Bathsheba, even though forbidden, Uriah refused such pleasure, even when legitimate and encouraged by the king</span></b><span data-dcnode-id="1061" instrument_node="">.</span></p><span data-dcnode-id="1059" instrument_node="">
</span><p class="bodytext" data-dcnode-id="1055"><b data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">(4) While Uriah was willing to lay down his life for the king and the nation, David was willing to take Uriah’s life to save his own reputation and to satisfy his own sexual desires</span></b><span data-dcnode-id="1056" instrument_node="">.</span></p><span data-dcnode-id="1054" instrument_node="">
</span><p class="bodytext" data-dcnode-id="1050"><b data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">(5) Though David had many wives, he was willing to take the one wife that Uriah possessed</span></b><span data-dcnode-id="1051" instrument_node="">.</span></p><span data-dcnode-id="1049" instrument_node="">
</span><p class="bodytext" data-dcnode-id="1045"><b data-dcnode-id="1047"><span data-dcnode-id="1048" instrument_node="">(6) Though David was of the chosen seed, Uriah was but a Hittite</span></b><span data-dcnode-id="1046" instrument_node="">. Uriah was a Canaanite, but a godly one, while David, the Israelite, acted like a heathen.</span></p><span data-dcnode-id="1044" instrument_node="">
</span><p class="bodytext" data-dcnode-id="1036"><span data-dcnode-id="1043" instrument_node="">The Scriptures frankly tell us that sexual sin can be the source of other sins. It can dull the mind, like wine, making one insensitive to reality (</span><a class="NETBibleTagged" data-dcnode-id="1041" href="javascript:%7B%7D"><span data-dcnode-id="1042" instrument_node="">Hos. 4:11-12</span></a><span data-dcnode-id="1040" instrument_node="">). Here, David’s immorality led to the additional sin of murder. Sexual sin is also related to religious apostasy (cf. </span><a class="NETBibleTagged" data-dcnode-id="1038" href="javascript:%7B%7D"><span data-dcnode-id="1039" instrument_node="">Num. 25:1-9</span></a><span data-dcnode-id="1037" instrument_node="">).</span></p><span data-dcnode-id="1035" instrument_node="">
</span><p class="bodytext" data-dcnode-id="1031"><b data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node="">The Old Testament prophets take up the themes already developed in the Pentateuch</span></b><span data-dcnode-id="1032" instrument_node="">. The sexual immorality of Israel has defiled the people and the land, and necessitates their expulsion from the land. Spiritual adultery has also become rampant, and is condemned. Judgment awaits this nation, which is likened to a harlot. Her restoration is described as a marriage between God and His bride. </span></p><span data-dcnode-id="1030" instrument_node="">
</span><p class="bodytext" data-dcnode-id="1025"><span data-dcnode-id="1029" instrument_node="">“Why should I pardon you? Your sons have forsaken Me And sworn by those who are not gods. When I had fed them to the full, They committed adultery And trooped to the harlot’s house. They were well-fed lusty horses, Each one neighing after his neighbor’s wife. Shall I not punish these people,” declares the LORD, “And on a nation such as this Shall I not avenge Myself?” (</span><a class="NETBibleTagged" data-dcnode-id="1027" href="javascript:%7B%7D"><span data-dcnode-id="1028" instrument_node="">Jer. 5:7-9</span></a><span data-dcnode-id="1026" instrument_node="">).</span></p><span data-dcnode-id="1024" instrument_node="">
</span><p class="bodytext" data-dcnode-id="1019"><span data-dcnode-id="1023" instrument_node="">“As for your adulteries and your lustful neighings, The lewdness of your prostitution On the hills in the field, I have seen your abominations. Woe to you, O Jerusalem! How long will you remain unclean?” (</span><a class="NETBibleTagged" data-dcnode-id="1021" href="javascript:%7B%7D"><span data-dcnode-id="1022" instrument_node="">Jer. 13:27</span></a><span data-dcnode-id="1020" instrument_node="">).</span></p><span data-dcnode-id="1018" instrument_node="">
</span><p class="bodytext" data-dcnode-id="1013"><span data-dcnode-id="1017" instrument_node="">“I will also put an end to all her gaiety, Her feasts, her new moons, her Sabbaths, And all her festal assemblies. And I will destroy her vines and fig trees, Of which she said, ‘These are my wages Which my lovers have given me.’ And I will make them a forest, And the beasts of the field will devour them” (</span><a class="NETBibleTagged" data-dcnode-id="1015" href="javascript:%7B%7D"><span data-dcnode-id="1016" instrument_node="">Hos. 2:11-12</span></a><span data-dcnode-id="1014" instrument_node="">).</span></p><span data-dcnode-id="1012" instrument_node="">
</span><p class="bodytext" data-dcnode-id="1007"><span data-dcnode-id="1011" instrument_node="">Harlotry, wine, and new wine take away the understanding. My people consult their wooden idol, and the diviner’s wand informs them; For a spirit of harlotry has led them astray, And they have played the harlot, departing from their God (</span><a class="NETBibleTagged" data-dcnode-id="1009" href="javascript:%7B%7D"><span data-dcnode-id="1010" instrument_node="">Hos. 4:11-12</span></a><span data-dcnode-id="1008" instrument_node="">).</span></p><span data-dcnode-id="1006" instrument_node="">
</span><p class="bodytext" data-dcnode-id="1004"><span data-dcnode-id="1005" instrument_node="">Thus, because Israel practiced the same sins as the Canaanites, who lived in the land before them, they were thrust forth from the land, just as their predecessors, and just as God had warned:</span></p><span data-dcnode-id="1003" instrument_node="">
</span><p class="bodytext" data-dcnode-id="998"><span data-dcnode-id="1002" instrument_node="">“’Do not defile yourselves by any of these things; for by all these the nations which I am casting out before you have become defiled. For the land has become defiled, therefore I have visited its punishment upon it, so the land has spewed out its inhabitants. But as for you, you are to keep My statutes and My judgments, and shall not do any of these abominations, neither the native, nor the alien who sojourns among you (for the men of the land who have been before you have done all these abominations, and the land has become defiled); so that the land may not spew you out, should you defile it, as it has spewed out the nation which has been before you. For whoever does any of these abominations, those persons who do so shall be cut off from among their people. Thus you are to keep My charge, that you do not practice any of the abominable customs which have been practiced before you, so as not to defile yourselves with them; I am the LORD your GOD’” (</span><a class="NETBibleTagged" data-dcnode-id="1000" href="javascript:%7B%7D"><span data-dcnode-id="1001" instrument_node="">Lev. 18:24-30</span></a><span data-dcnode-id="999" instrument_node="">).</span></p><span data-dcnode-id="997" instrument_node="">
</span><p class="bodytext" data-dcnode-id="992"><span data-dcnode-id="996" instrument_node="">“’You are therefore to keep all My statutes and all My ordinances and do them, so that the land to which I am bringing you to live will not spew you out. Moreover, you shall not follow the customs of the nation which I shall drive out before you, for they did all these things, and therefore I have abhorred them. Hence I have said to you, “You are to possess their land, and I Myself will give it to you to possess it, a land flowing with milk and honey.” I am the LORD your God, who has separated you from the peoples. You are therefore to make a distinction between the clean animal and the unclean, and between the unclean bird and the clean; and you shall not make yourselves detestable by animal or by bird or by anything that creeps on the ground, which I have separated for you as unclean. Thus you are to be holy to Me, for I the LORD am holy; and I have set you apart from the peoples to be Mine. As for a man or a woman, if there is a medium or a spiritist among them, they shall surely be put to death; they shall be stoned with stones, their bloodguiltiness is upon them’” (</span><a class="NETBibleTagged" data-dcnode-id="994" href="javascript:%7B%7D"><span data-dcnode-id="995" instrument_node="">Lev. 20:22-27</span></a><span data-dcnode-id="993" instrument_node="">).</span></p><span data-dcnode-id="991" instrument_node="">
</span><h3 data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">Adultery in the New Testament</span></h3><span data-dcnode-id="988" instrument_node="">
</span><p class="bodytext" data-dcnode-id="984"><b data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">Jesus did not have nearly as much to say about adultery and sexual immorality as did the apostles</span></b><span data-dcnode-id="985" instrument_node="">. Furthermore, He may even appear to be lenient on those guilty of immorality. Such could be the conclusion one would reach from a reading of John chapter 4, where Jesus spoke to the immoral woman at the well, or of John chapter 8, where Jesus refused to cast stones at the woman caught in the very act of adultery. There are several reasons for the difference in the emphasis of our Lord from that of the Old Testament, which condemned adultery and demanded the death penalty.</span></p><span data-dcnode-id="983" instrument_node="">
</span><p class="bodytext" data-dcnode-id="976"><b data-dcnode-id="981"><span data-dcnode-id="982" instrument_node="">(1) Jesus had come to bear the penalty for sinners, and thus He did not come to condemn anyone, but to offer salvation to all</span></b><span data-dcnode-id="980" instrument_node=""> (cf. </span><a class="NETBibleTagged" data-dcnode-id="978" href="javascript:%7B%7D"><span data-dcnode-id="979" instrument_node="">John 3:16-17</span></a><span data-dcnode-id="977" instrument_node="">). At His second coming He will bring judgment to the wicked.</span></p><span data-dcnode-id="975" instrument_node="">
</span><p class="bodytext" data-dcnode-id="971"><b data-dcnode-id="973"><span data-dcnode-id="974" instrument_node="">(2) Jesus was speaking to a Jewish audience, while most of the apostles addressed Gentiles</span></b><span data-dcnode-id="972" instrument_node="">. Judaism condemned adultery and sexual immorality, as can be seen from John chapter 8. The Gentiles were more like the Canaanites of Old Testament times—they were distinctly pagan in their sexual conduct and values. Thus, it was not necessary for our Lord to dwell on the sinfulness of sexual immorality, since the Jews of His day agreed with Him on this point. </span></p><span data-dcnode-id="970" instrument_node="">
</span><p class="bodytext" data-dcnode-id="966"><b data-dcnode-id="968"><span data-dcnode-id="969" instrument_node="">(3) The Jewish religious leaders felt smugly self-righteous because they did not practice this form of sin, but they were guilty of other, more subtle, sins, which were more socially acceptable</span></b><span data-dcnode-id="967" instrument_node="">. The sexually immoral, such as the woman caught in the act of adultery, honestly acknowledged their sin, but the scribes and Pharisees were hypocritical, refusing to acknowledge their own self-righteousness. Thus Jesus majored on those sins which were more subtle, and which were more characteristic of the religious leadership of Israel.</span></p><span data-dcnode-id="965" instrument_node="">
</span><p class="bodytext" data-dcnode-id="963"><span data-dcnode-id="964" instrument_node="">If these Jewish leaders condemned sins which were overtly wrong actions, Jesus chose to focus on those hidden sins which were attitudes. Thus, in the gospels we see how our Lord pressed beyond the actual act of adultery to the attitudinal sins of adultery:</span></p><span data-dcnode-id="962" instrument_node="">
</span><p class="bodytext" data-dcnode-id="957"><span data-dcnode-id="961" instrument_node="">“You have heard that it was said, ‘YOU SHALL NOT COMMIT ADULTERY’; but I say to you, that every one who looks on a woman to lust for her has committed adultery with her already in his heart. And if your right eye makes you stumble, tear it out, and throw it from you; for it is better for you that one of the parts of your body perish, than for your whole body to be thrown into hell. And if you right hand makes you stumble, cut it off, and throw it from you; for it is better for you that one of the parts of your body perish, than for your whole body to go into hell. And it was said, ‘WHOEVER DIVORCES HIS WIFE, LET HIM GIVE HER A CERTIFICATE OF DISMISSAL’; but I say to you that every one who divorces his wife, except for the cause of unchastity, makes her commit adultery; and whoever marries a divorced woman commits adultery” (</span><a class="NETBibleTagged" data-dcnode-id="959" href="javascript:%7B%7D"><span data-dcnode-id="960" instrument_node="">Matt. 5:27-32</span></a><span data-dcnode-id="958" instrument_node="">).</span></p><span data-dcnode-id="956" instrument_node="">
</span><p class="bodytext" data-dcnode-id="951"><span data-dcnode-id="955" instrument_node="">“For out of the heart come evil thoughts, murders, adulteries, fornications, thefts, false witness, slanders” (</span><a class="NETBibleTagged" data-dcnode-id="953" href="javascript:%7B%7D"><span data-dcnode-id="954" instrument_node="">Matt. 15:19</span></a><span data-dcnode-id="952" instrument_node="">).</span></p><span data-dcnode-id="950" instrument_node="">
</span><p class="bodytext" data-dcnode-id="945"><span data-dcnode-id="949" instrument_node="">“And I say to you, whoever divorces his wife, except for immorality, and marries another commits adultery” (</span><a class="NETBibleTagged" data-dcnode-id="947" href="javascript:%7B%7D"><span data-dcnode-id="948" instrument_node="">Matt. 19:9</span></a><span data-dcnode-id="946" instrument_node="">).</span></p><span data-dcnode-id="944" instrument_node="">
</span><p class="bodytext" data-dcnode-id="942"><span data-dcnode-id="943" instrument_node="">These three texts provide us with the essence of our Lord’s teaching on adultery and sexual immorality. Let us briefly consider the important truths our Lord taught on sex and marriage.</span></p><span data-dcnode-id="941" instrument_node="">
</span><p class="bodytext" data-dcnode-id="937"><b data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">(1) Jesus teaches here that it is not enough to keep the Law in its letter, but must also keep it in spirit</span></b><span data-dcnode-id="938" instrument_node="">. We must begin by taking the Bible literally, and thus we acknowledge that any act of adultery must be avoided. But this does not take the Law far enough, as our Lord must continually point out to His listeners, and to His literalistic opponents, the scribes and Pharisees.</span></p><span data-dcnode-id="936" instrument_node="">
</span><p class="bodytext" data-dcnode-id="929"><b data-dcnode-id="934"><span data-dcnode-id="935" instrument_node="">(2) Jesus thus teaches here that attitudinal sins precede sins of action</span></b><span data-dcnode-id="933" instrument_node=""> (cf. </span><a class="NETBibleTagged" data-dcnode-id="931" href="javascript:%7B%7D"><span data-dcnode-id="932" instrument_node="">James 1:13-15</span></a><span data-dcnode-id="930" instrument_node="">). He does not necessarily teach that attitudinal sins are as bad as action sins. From the standpoint of the harm done to men, action sins are more serious. (It is better for society that a man only think of murder than it is for him to take a life.) From the standpoint of our sin against God, attitudinal sins and action sins are both rebellion against God.</span></p><span data-dcnode-id="928" instrument_node="">
</span><p class="bodytext" data-dcnode-id="924"><b data-dcnode-id="926"><span data-dcnode-id="927" instrument_node="">(3) The way to fully keep the Seventh Commandment is to view sexual sin as so serious (damning) that we are willing to take any measure required to prevent it</span></b><span data-dcnode-id="925" instrument_node="">. We must begin by understanding that plucking out eyes and cutting off hands will not cure sin or assure us of keeping the Seventh (or any other) Commandment. Hands and eyes are involved as precipitating causes of immorality, however. Visual and sensory (touch) stimulation are often the prelude to immorality. Having said this, let us note that eyes and hands are very precious body members. To remove either is a drastic action (as, for example, one would do in the case of cancer). If one were so serious as to be willing to pluck out an eye or cut off a hand then that person’s attitude is what it should be with regard to adultery. Our Lord is teaching us that we must, unlike our culture, take sexual sin most seriously. When we are willing to do whatever it takes to avoid a sin, we will likely take the steps necessary to avoid it.</span></p><span data-dcnode-id="923" instrument_node="">
</span><p class="bodytext" data-dcnode-id="919"><b data-dcnode-id="921"><span data-dcnode-id="922" instrument_node="">(4) Adultery is a violation of the union of marriage</span></b><span data-dcnode-id="920" instrument_node="">. It is significant that our Lord began by talking about adultery, but that He almost immediately came to the subject of divorce. It is also significant that He taught divorce causes adultery, except in the case where the divorce was based upon previous adultery. The inference is quite clear: since sexual union joins a man and woman in marriage, adultery violates that union. Thus, when a divorce is granted due to adultery, a later marriage on the part of the innocent (that is, not guilty of adultery) party is not viewed to be adulterous.</span></p><span data-dcnode-id="918" instrument_node="">
</span><p class="bodytext" data-dcnode-id="916"><span data-dcnode-id="917" instrument_node="">It is very important for me to be precise in what I say here. First, I believe that a Christian has the right to divorce a spouse for adultery, but that this is never one’s duty, and seldom one’s highest calling. I do not think that it is correct to conclude that adultery terminates a marriage, any more than it is correct to conclude that sin terminates our salvation. Thus, one should be careful not to think or say that since adultery is a sin against a marriage, it has also, de facto, terminated the marriage.</span></p><span data-dcnode-id="915" instrument_node="">
</span><p class="bodytext" data-dcnode-id="908"><b data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">(5) Divorce causes adultery</span></b><span data-dcnode-id="912" instrument_node="">. How many times have we heard that adultery breaks the marriage union, that is, that adultery (legitimately) causes divorce? Our culture believes that the obtaining of a certificate of divorce legitimizes adultery. Our Lord teaches us here that divorce causes adultery. According to </span><a class="NETBibleTagged" data-dcnode-id="910" href="javascript:%7B%7D"><span data-dcnode-id="911" instrument_node="">Matthew 19:9</span></a><span data-dcnode-id="909" instrument_node="">, if one divorces and marries another (except for the divorce based on the immorality of the other partner) that person commits adultery. The assumption here is that the divorce is obtained in order to marry another, or that it will ultimately result in marriage to another. Furthermore, the one who divorces their spouse also causes them to commit adultery, since a remarriage is assumed. Let those who would consider divorce an option carefully ponder the implications of their actions in accordance with our Lord’s words here. Let those who have already divorced and remarried remember that divorce and immorality (as all other sins save unbelief) is not an unpardonable sin. Let those who think this is an occasion or an excuse for sin read Romans chapter 6 very carefully.</span></p><span data-dcnode-id="907" instrument_node="">
</span><p class="bodytext" data-dcnode-id="899"><span data-dcnode-id="906" instrument_node="">When we leave the gospels of the New Testament and come to the epistles, there is a change which we should recognize and appreciate. </span><b data-dcnode-id="904"><span data-dcnode-id="905" instrument_node="">First, we move from a Jewish to a Gentile culture</span></b><span data-dcnode-id="903" instrument_node="">. Pagan religion often intermingled sexual immorality with its “worship.” We therefore would expect to find some very specific revelation on the subject of adultery and sexual sin in the epistles. </span><b data-dcnode-id="901"><span data-dcnode-id="902" instrument_node="">Second, we move from an Old Testament dispensation (centered around the nation Israel) to a New Testament dispensation (centered around a predominantly Gentile church)</span></b><span data-dcnode-id="900" instrument_node="">. Israel’s sexual conduct set them apart from the Egyptians and the Canaanites. It also assured the integrity of the home and a righteous seed, through whom the Redeemer would come. This was now accomplished. What is it that makes sexual purity so important to the New Testament saint, who is not an Israelite, but a member of the church, the body of Christ? This is what we shall seek to learn from the writings of the apostles in the New Testament. </span></p><span data-dcnode-id="898" instrument_node="">
</span><p class="bodytext" data-dcnode-id="896"><span data-dcnode-id="897" instrument_node="">The apostle Paul has the most to say of the apostles on the subject of sexual purity. In the Book of 1 Corinthians he focuses on illicit sexual union and its relationship to the believer’s union with Christ:</span></p><span data-dcnode-id="895" instrument_node="">
</span><p class="bodytext" data-dcnode-id="890"><span data-dcnode-id="894" instrument_node="">Do you not know that your bodies are members of Christ? Shall I then take away the members of Christ and make them members of a harlot? May it never be! Or do you not know that the one who joins himself to a harlot is one body with her? For He says, “the two will become one flesh.” But the one who joins himself to the Lord is one spirit with Him. Flee immorality. Every other sin that a man commits is outside the body, but the immoral man sins against his own body. Or do you not know that your body is a temple of the Holy Spirit who is in you, whom you have from God, and that you are not your own? For you have been bought with a price: therefore glorify God in your body (</span><a class="NETBibleTagged" data-dcnode-id="892" href="javascript:%7B%7D"><span data-dcnode-id="893" instrument_node="">1 Cor. 6:15-20</span></a><span data-dcnode-id="891" instrument_node="">).</span></p><span data-dcnode-id="889" instrument_node="">
</span><p class="bodytext" data-dcnode-id="875"><span data-dcnode-id="888" instrument_node="">Throughout the Scriptures, both Old Testament (cf. </span><a class="NETBibleTagged" data-dcnode-id="886" href="javascript:%7B%7D"><span data-dcnode-id="887" instrument_node="">Gen. 39:9</span></a><span data-dcnode-id="885" instrument_node="">; </span><a class="NETBibleTagged" data-dcnode-id="883" href="javascript:%7B%7D"><span data-dcnode-id="884" instrument_node="">2 Sam. 12:13</span></a><span data-dcnode-id="882" instrument_node="">; </span><a class="NETBibleTagged" data-dcnode-id="880" href="javascript:%7B%7D"><span data-dcnode-id="881" instrument_node="">Ps. 51:4</span></a><span data-dcnode-id="879" instrument_node="">) and New, adultery is, first and foremost, a sin against God. From the Old Testament perspective, adultery was a violation of the sanctity of marriage, which God established, and which the Law sought to maintain. </span><b data-dcnode-id="877"><span data-dcnode-id="878" instrument_node="">Paul’s words in 1 Corinthians chapter 6 go much farther, showing the implications of a Christian’s sexual union with a harlot</span></b><span data-dcnode-id="876" instrument_node="">. When one comes to faith in Christ, when he is born again, that person becomes one with Christ. Thus, whatever one does, he does in union with Christ.</span></p><span data-dcnode-id="874" instrument_node="">
</span><p class="bodytext" data-dcnode-id="872"><span data-dcnode-id="873" instrument_node="">Sexual intercourse with a harlot, contrary to popular thought, is no casual matter, it is a union as well. Indeed, in verse 16 Paul makes a statement of monumental importance. He equates sexual union with marital union. When one enters into a sexual union, Paul reasons, one enters into marital union. For a Christian to engage in sexual intercourse with a harlot puts two unions in conflict: his union with Christ and his union with a harlot. Just as no man can have two masters, neither can one have two unions—one with Christ, and another with a harlot. Sexual sin has very serious theological implications. </span></p><span data-dcnode-id="871" instrument_node="">
</span><p class="bodytext" data-dcnode-id="869"><span data-dcnode-id="870" instrument_node="">In Ephesians chapter 5 Paul focuses on the relationship between the Christian husband and wife, and the way it portrays an important spiritual truth to the world: </span></p><span data-dcnode-id="868" instrument_node="">
</span><p class="bodytext" data-dcnode-id="863"><span data-dcnode-id="867" instrument_node="">So husbands ought also to love their own wives as their own bodies. He who loves his own wife loves himself; for no one ever hated his own flesh, but nourishes and cherishes it, just as Christ also does the church, because we are members of His body. For this cause a man shall leave his father and mother, and shall cleave to his wife; and the two shall become one flesh. This mystery is great; but I am speaking with reference to Christ and the church (</span><a class="NETBibleTagged" data-dcnode-id="865" href="javascript:%7B%7D"><span data-dcnode-id="866" instrument_node="">Eph. 5:28-32</span></a><span data-dcnode-id="864" instrument_node="">).</span></p><span data-dcnode-id="862" instrument_node="">
</span><p class="bodytext" data-dcnode-id="860"><span data-dcnode-id="861" instrument_node="">While I have cited only a portion of this important paragraph (vss. 22-33), the important point to recognize here is that the relationship of a Christian husband and wife is to be a reflection of the relationship of Jesus Christ to His church.</span></p><span data-dcnode-id="859" instrument_node="">
</span><p class="bodytext" data-dcnode-id="856"><b data-dcnode-id="857"><span data-dcnode-id="858" instrument_node="">Finally, sexual purity is vitally important to the Christian life because it is directly related to one’s sanctification:</span></b></p><span data-dcnode-id="855" instrument_node="">
</span><p class="bodytext" data-dcnode-id="850"><span data-dcnode-id="854" instrument_node="">For this is the will of God, your sanctification; that is, that you abstain from sexual immorality; that each of you know how to possess his own vessel in sanctification and honor, not in lustful passion, like the Gentiles who do not know God; and that no man transgress and defraud his brother in the matter because the Lord is the avenger in all these things, just as we also told you before and solemnly warned you. For God has not called us for the purpose of impurity, but in sanctification (</span><a class="NETBibleTagged" data-dcnode-id="852" href="javascript:%7B%7D"><span data-dcnode-id="853" instrument_node="">1 Thess. 4:3-8</span></a><span data-dcnode-id="851" instrument_node="">).</span></p><span data-dcnode-id="849" instrument_node="">
</span><p class="bodytext" data-dcnode-id="844"><span data-dcnode-id="848" instrument_node="">Nevertheless, the firm foundation of God stands, having this seal, “The Lord knows those who are His,” and, “Let everyone who names the name of the Lord abstain from wickedness.” Now in a large house there are not only gold and silver vessels, but also vessels of wood and of earthenware, and some to honor and some to dishonor. Therefore, if a man cleanses himself from these things, he will be a vessel for honor, sanctified, useful to the Master, prepared for every good work. Now flee from youthful lusts, and pursue righteousness, faith, love and peace, with those who call on the Lord from a pure heart (</span><a class="NETBibleTagged" data-dcnode-id="846" href="javascript:%7B%7D"><span data-dcnode-id="847" instrument_node="">2 Tim. 2:19-22</span></a><span data-dcnode-id="845" instrument_node="">).</span></p><span data-dcnode-id="843" instrument_node="">
</span><p class="bodytext" data-dcnode-id="841"><span data-dcnode-id="842" instrument_node="">In 1 Thessalonians chapter 4 Paul says that the will of God is for us to be sanctified. He then immediately turns to our sanctification as it relates to our sexual conduct. Our sanctification cannot be expressed or realized apart from a radical change in our sexual conduct—that is, a radical change in the way we conduct ourselves sexually, as contrasted with our former conduct and that of the pagan world around us.</span></p><span data-dcnode-id="840" instrument_node="">
</span><p class="bodytext" data-dcnode-id="838"><span data-dcnode-id="839" instrument_node="">In 2 Timothy chapter 2 Paul’s instruction is more general, but still very much to the point of sexual morality. Sanctification involves setting something apart for a special use. Sanctification involves purity, the absence of what is unclean. And, Paul says, it involves for Timothy the fleeing of youthful lusts, which surely include illicit sexual passions and conduct.</span></p><span data-dcnode-id="837" instrument_node="">
</span><p class="bodytext" data-dcnode-id="832"><span data-dcnode-id="836" instrument_node="">When we come to our last text, we come full circle: “Let marriage be held in honor among all, and let the marriage bed be undefiled; for fornicators and adulterers God will judge” (</span><a class="NETBibleTagged" data-dcnode-id="834" href="javascript:%7B%7D"><span data-dcnode-id="835" instrument_node="">Heb. 13:4</span></a><span data-dcnode-id="833" instrument_node="">). The marriage union which God established, God also sanctified. Sexual purity begins with highly esteeming that which God has given—marriage, and the one whom God has given—our mate. When we thus honor marriage, we will see to it that the marriage bed, the blessing of sexual union, remains undefiled by sexual union outside of that marriage, which profanes.</span></p><span data-dcnode-id="831" instrument_node="">
</span><h3 data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">Conclusion</span></h3><span data-dcnode-id="828" instrument_node="">
</span><p class="bodytext" data-dcnode-id="826"><span data-dcnode-id="827" instrument_node="">We can see, then, that throughout the Bible, the enjoyment of sex is restricted to marriage, and to that which is consistent with our position and calling in Christ. Let us conclude by seeking to isolate the principles which underlie and govern sexual purity, and then some of the practical outworkings of these principles.</span></p><span data-dcnode-id="825" instrument_node="">
</span><p class="bodytext" data-dcnode-id="821"><b data-dcnode-id="823"><span data-dcnode-id="824" instrument_node="">(1) The principle of sanctification</span></b><span data-dcnode-id="822" instrument_node="">. Sanctification is one of the great principles of the Bible, whether in the Old or the New Testament. Sanctification was, for example, the first great test which man failed in the Garden of Eden. Some have attempted to show that the sin committed in the Garden of Eden was a sexual sin. I think there is little evidence for this conclusion. I do, however, believe that the first sin is similar to that of adultery, and thus very instructive. Consider, for a moment, how that “forbidden fruit” (whatever it might have been) is similar to the “forbidden fruit” of illicit sex.</span></p><span data-dcnode-id="820" instrument_node="">
</span><p class="bodytext" data-dcnode-id="807"><b data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">In both cases, the “forbidden fruit” is very desirable</span></b><span data-dcnode-id="817" instrument_node="">. I find it interesting that the fruit of this tree of knowledge of good and evil was good, like everything else God created (cf. </span><a class="NETBibleTagged" data-dcnode-id="815" href="javascript:%7B%7D"><span data-dcnode-id="816" instrument_node="">Gen. 1:11-12</span></a><span data-dcnode-id="814" instrument_node="">, 31). More than this, it was very desirable: “And out of the ground the Lord God caused to grow every tree that is pleasing to the sight and good for food; the tree of life also in the midst of the garden, and the tree of the knowledge of good and evil” (</span><a class="NETBibleTagged" data-dcnode-id="812" href="javascript:%7B%7D"><span data-dcnode-id="813" instrument_node="">Gen. 2:9</span></a><span data-dcnode-id="811" instrument_node="">). It is no wonder, then, that Eve was attracted to the “forbidden fruit”: “When the woman saw that the tree was good for food, and that it was a delight to the eyes, and that the tree was desirable to make one wise, she took from its fruit and ate; and she gave also to her husband with her, and he ate” (</span><a class="NETBibleTagged" data-dcnode-id="809" href="javascript:%7B%7D"><span data-dcnode-id="810" instrument_node="">Gen. 3:6</span></a><span data-dcnode-id="808" instrument_node="">).</span></p><span data-dcnode-id="806" instrument_node="">
</span><p class="bodytext" data-dcnode-id="802"><b data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">In both cases, the “forbidden fruit” is available</span></b><span data-dcnode-id="803" instrument_node="">. Just as God placed the “forbidden fruit” in sight and within the reach of Adam and Eve, so the “forbidden fruit” of sexual immorality is visible and available.</span></p><span data-dcnode-id="801" instrument_node="">
</span><p class="bodytext" data-dcnode-id="797"><b data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">In both cases, the “forbidden fruit” is forbidden</span></b><span data-dcnode-id="798" instrument_node="">. Just as God had clearly forbidden the partaking of the “forbidden fruit” in the garden, so He has clearly forbidden the “fruit” of sexual impurity.</span></p><span data-dcnode-id="796" instrument_node="">
</span><p class="bodytext" data-dcnode-id="789"><b data-dcnode-id="794"><span data-dcnode-id="795" instrument_node="">In both cases, partaking of the “forbidden fruit” brings disastrous results</span></b><span data-dcnode-id="793" instrument_node="">. Satan made great promises about the benefits of partaking of the fruit of that tree, but he failed to tell all. Great were the consequences. Sin entered the human race and human history, and the consequences are evident all about us. So, too, the pleasures of sexual sin are prominently proclaimed, but the price for immorality is exceedingly high (cf. </span><a class="NETBibleTagged" data-dcnode-id="791" href="javascript:%7B%7D"><span data-dcnode-id="792" instrument_node="">Prov. 2:16-22</span></a><span data-dcnode-id="790" instrument_node="">).</span></p><span data-dcnode-id="788" instrument_node="">
</span><p class="bodytext" data-dcnode-id="786"><span data-dcnode-id="787" instrument_node="">The “forbidden fruit was not forbidden because is was intrinsically bad. It did not look bad, it did not taste bad. In fact, it wasn’t bad, in and of itself. Remember that God made it, and that all He made was good. The forbidden fruit was forbidden, not because of any evil characteristic of the fruit itself, but because God “sanctified” or set it apart. He did not permit man to use it.</span></p><span data-dcnode-id="785" instrument_node="">
</span><p class="bodytext" data-dcnode-id="783"><span data-dcnode-id="784" instrument_node="">Sanctification, therefore, was the first test which God gave mankind, and it was this test which man failed. It is little wonder, then, that God has so much to teach man about sanctification in the Bible.</span></p><span data-dcnode-id="782" instrument_node="">
</span><p class="bodytext" data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">Abraham, and his seed, is set apart from the rest of mankind, and through Him Messiah will come and will bring blessing and salvation to all nations. The nation Israel is kept apart from other nations by her time in Egypt, and in the plagues, the Israelites are distinguished from the Egyptians. The covenant which God made with Israel on Mt. Sinai was a further means of sanctifying His people, to be a priestly nation:</span></p><span data-dcnode-id="779" instrument_node="">
</span><p class="bodytext" data-dcnode-id="774"><span data-dcnode-id="778" instrument_node="">“‘You yourselves have seen what I did to the Egyptians and how I bore you on eagles’ wings, and brought you to Myself. Now then, if you will indeed obey My voice and keep My covenant, then you shall be My own possession among all the peoples, for all the earth is Mine; and you shall be to Me a kingdom of priests and a holy nation’” (</span><a class="NETBibleTagged" data-dcnode-id="776" href="javascript:%7B%7D"><span data-dcnode-id="777" instrument_node="">Exod. 19:4-6</span></a><span data-dcnode-id="775" instrument_node="">a). </span></p><span data-dcnode-id="773" instrument_node="">
</span><p class="bodytext" data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">To play out her role as God’s priestly nation, Israel had to be separate, sanctified, different from the surrounding nations. Those distinctions are spelled out in the Law, one of which is that of the maintenance of sexual and marital sanctity.</span></p><span data-dcnode-id="770" instrument_node="">
</span><p class="bodytext" data-dcnode-id="756"><span data-dcnode-id="769" instrument_node="">The New Testament portrays a very similar picture. Here, the church is the “bride of Christ,” with the responsibility of exemplifying the relationship of Christ to His church (</span><a class="NETBibleTagged" data-dcnode-id="767" href="javascript:%7B%7D"><span data-dcnode-id="768" instrument_node="">Eph. 5:22-33</span></a><span data-dcnode-id="766" instrument_node="">). In order to do this, Christians must be holy, sanctified, just as God is holy (</span><a class="NETBibleTagged" data-dcnode-id="764" href="javascript:%7B%7D"><span data-dcnode-id="765" instrument_node="">1 Peter 1:14-16</span></a><span data-dcnode-id="763" instrument_node="">). The Christian life therefore involves making many distinctions and then living them out. We must distinguish between truth and error, between good and evil, between holiness and unrighteousness. We must even distinguish between what is personally permissible and what is personally beneficial (</span><a class="NETBibleTagged" data-dcnode-id="761" href="javascript:%7B%7D"><span data-dcnode-id="762" instrument_node="">1 Cor. 6:12</span></a><span data-dcnode-id="760" instrument_node="">). Furthermore, there must be a distinction drawn between what is personally permissible and what is detrimental to others (cf. </span><a class="NETBibleTagged" data-dcnode-id="758" href="javascript:%7B%7D"><span data-dcnode-id="759" instrument_node="">1 Cor. 8-10</span></a><span data-dcnode-id="757" instrument_node="">).</span></p><span data-dcnode-id="755" instrument_node="">
</span><p class="bodytext" data-dcnode-id="747"><span data-dcnode-id="754" instrument_node="">The differences between holy and unholy, clean and unclean are crucial. In a divine vision, God said to Peter, “What God has cleansed, no longer consider unholy” (</span><a class="NETBibleTagged" data-dcnode-id="752" href="javascript:%7B%7D"><span data-dcnode-id="753" instrument_node="">Acts 10:15</span></a><span data-dcnode-id="751" instrument_node="">). At times we are tempted to think that what God has called clean is really unclean (as was the case with Peter; cf. also </span><a class="NETBibleTagged" data-dcnode-id="749" href="javascript:%7B%7D"><span data-dcnode-id="750" instrument_node="">1 Tim. 4:1-5</span></a><span data-dcnode-id="748" instrument_node="">). At other times, we are tempted to call “clean” what God has called “unclean.” One of the most important decisions the Christian can make is to rightly distinguish between the holy and the unholy—the see what God has sanctified and what He has not. Sanctification is therefore one of the great, governing and guiding principles of the Word of God.</span></p><span data-dcnode-id="746" instrument_node="">
</span><p class="bodytext" data-dcnode-id="742"><b data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">(2) The sanctity of marriage</span></b><span data-dcnode-id="743" instrument_node="">. If we have accepted the principle of sanctification in general, we must then see it in the particulars of our Christian experience. One of these particulars is that of marriage. Marriage, by God’s decree, is sanctified, it is a relationship that is set apart and restricted. The sin of adultery is dealt with so severely because it is a violation of the sanctity of the marriage which God has ordained and set apart.</span></p><span data-dcnode-id="741" instrument_node="">
</span><p class="bodytext" data-dcnode-id="733"><span data-dcnode-id="740" instrument_node="">The sanctity of marriage is indicated by the statement in </span><a class="NETBibleTagged" data-dcnode-id="738" href="javascript:%7B%7D"><span data-dcnode-id="739" instrument_node="">Genesis 2:24</span></a><span data-dcnode-id="737" instrument_node="">, that a man must leave his father and mother and cleave to his wife. This union is set apart, it is to be distinct from the previous relationship of parent and child. When our Lord commented on this text He said, “Consequently they are no more two, but one flesh. What therefore God has joined together, let no man separate” (</span><a class="NETBibleTagged" data-dcnode-id="735" href="javascript:%7B%7D"><span data-dcnode-id="736" instrument_node="">Matt. 19:6</span></a><span data-dcnode-id="734" instrument_node="">). The Law pertaining to adultery also confirms the sanctity of marriage.</span></p><span data-dcnode-id="732" instrument_node="">
</span><p class="bodytext" data-dcnode-id="730"><span data-dcnode-id="731" instrument_node="">Just what is it that distinguishes a man’s relationship with his wife from other relationships? In other words, what is it that makes a marriage distinct, unique, sanctified? I believe that there are several ways in which marriage is sanctified:</span></p><span data-dcnode-id="729" instrument_node="">
</span><p class="bodytext" data-dcnode-id="722"><b data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">Unity</span></b><span data-dcnode-id="726" instrument_node="">. The relationship between a husband and his wife is a union. The husband and wife become one. They become one in spirit, and sexually they become one in physical union. This sexual union consummates and symbolizes the union of marriage. Our Lord says that this union of husband and wife must not be severed (</span><a class="NETBibleTagged" data-dcnode-id="724" href="javascript:%7B%7D"><span data-dcnode-id="725" instrument_node="">Matt. 19:6</span></a><span data-dcnode-id="723" instrument_node="">). The Bible seems to teach that this union is not severed by anything but death, anything including divorce. The union of husband and wife is one of the unique elements of marriage. This union is violated and defiled by adultery. Adultery mocks the union of a man and his wife, and the God who joined them together.</span></p><span data-dcnode-id="721" instrument_node="">
</span><p class="bodytext" data-dcnode-id="717"><b data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">Intimacy</span></b><span data-dcnode-id="718" instrument_node="">. Closely related to the union of a husband and his wife is the intimacy which they experience in marriage. Physical intimacy is the most obvious, but there is also a spiritual and emotional intimacy. This intimacy can be both constructive and destructive. One can build up the other in those intimate areas of one’s heart and life, but one can also do great damage in the intimate areas as well. Who knows better how to hurt his mate than the one who has the most intimate knowledge of her?</span></p><span data-dcnode-id="716" instrument_node="">
</span><p class="bodytext" data-dcnode-id="709"><b data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">Reproduction</span></b><span data-dcnode-id="713" instrument_node="">. When God brought man and woman together as husband and wife, He commanded them to “be fruitful and multiply” (</span><a class="NETBibleTagged" data-dcnode-id="711" href="javascript:%7B%7D"><span data-dcnode-id="712" instrument_node="">Gen. 1:27-28</span></a><span data-dcnode-id="710" instrument_node="">). The reproduction of life is that function which is carried out within the marriage union, according to God’s design and decree. It marks out yet another way in which the marriage is sanctified.</span></p><span data-dcnode-id="708" instrument_node="">
</span><p class="bodytext" data-dcnode-id="701"><b data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">Fellowship</span></b><span data-dcnode-id="705" instrument_node="">. When God had created a mate for all of His other creatures, He looked upon Adam in his solitude and said, “It is not good for the man to be alone; I will make him a helper suitable for him” (</span><a class="NETBibleTagged" data-dcnode-id="703" href="javascript:%7B%7D"><span data-dcnode-id="704" instrument_node="">Gen. 2:18</span></a><span data-dcnode-id="702" instrument_node="">). God created Eve and brought her to Adam for fellowship, to be his helper and his companion. Marriage is sanctified in the degree to which a man and his wife have fellowship with one another.</span></p><span data-dcnode-id="700" instrument_node="">
</span><p class="bodytext" data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">There are two specific applications which I would suggest emerge from the observation of these unique areas in which marriage is sanctified, unique. The first is that the sanctity of marriage not only demands that we not defile the union in any way, including adultery, but that we actively seek to enhance the marriage. I would suggest that the categories of unity, intimacy, reproduction, and fellowship are four specific benchmarks of the quality of our marriages, and thus four specific areas for concentrated effort. I would further suggest that these four areas (there are probably others, too) provide the “glue” which holds a marriage together. Let us work at growth in each of these areas.</span></p><span data-dcnode-id="697" instrument_node="">
</span><p class="bodytext" data-dcnode-id="692"><span data-dcnode-id="696" instrument_node="">The second layer of application relates to the church. I would suggest that the four things which set a marriage apart from other relationships are the very four things which distinguish a Christian’s relationship with his Lord and with His body, the church. Time will not permit further exploration, but take note of how often unity (e.g. </span><a class="NETBibleTagged" data-dcnode-id="694" href="javascript:%7B%7D"><span data-dcnode-id="695" instrument_node="">Eph. 4:1</span></a><span data-dcnode-id="693" instrument_node="">ff.,), intimacy and fellowship, and reproduction (evangelism, fruit bearing) are discussed in the context of one’s personal walk with the Lord or with the corporate union of believers in the body of Christ.</span></p><span data-dcnode-id="691" instrument_node="">
</span><p class="bodytext" data-dcnode-id="687"><b data-dcnode-id="689"><span data-dcnode-id="690" instrument_node="">(3) The sanctity of sex</span></b><span data-dcnode-id="688" instrument_node="">. If the Seventh Commandment teaches the sanctity of marriage, it also teaches the sanctity of sex, for it is only in marriage that the pleasure and product (children) are to be experienced. Our culture is adamantly opposed to the sanctity of sex. Most Americans seem to think that human sexuality is to be used in the same way I use my Stanley chisel—the more uses to which it can be put, the better. Viewed from a contemporary secular perspective, sexual pleasure restricted only to marriage is a tragic waste, a failure to make full use of one’s sexual potential, and thus to deprive oneself of a great deal of sexual pleasure. Virginity is thus looked upon as a stigma, from which one should rid oneself as quickly as possible. </span></p><span data-dcnode-id="686" instrument_node="">
</span><p class="bodytext" data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">In my opinion, the rampant sexual immorality of our day is not primarily the result of greater temptation, of increased sexual desire, of greater opportunity, or even of the availability of the pill and abortion. The epidemic of sexual immorality is, I believe, the result of a failure to understand or appreciate the sanctity of sex and of marriage. For this and other reasons, the Seventh Commandment is of vital importance, not only to a pagan world, but to a carnal and permissive church. </span></p><span data-dcnode-id="683" instrument_node="">
</span><p class="bodytext" data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">Here we come to one of the very crucial implications of the sanctity of sex. When we sanctify sex, it is because we value it highly, not because we disdain it as something of little worth. We sanctify those things to which we attach great value. Our culture protests that Christians disdain and demean sex, that we have little appreciation for it. The opposite is true. We sanctify sex because we value it highly, as a good gift from the hand of a gracious God.</span></p><span data-dcnode-id="680" instrument_node="">
</span><p class="bodytext" data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">Think about this carefully, for it is of the greatest importance. Women, why do keep your silver in a special place, bringing it out only for “special” occasions? The same could be asked about your best china, or that very special dress (maybe even your wedding dress). Men, what about that special car, or gun, or golf club? If you owned a Mercedes Benz, would you loan it to a neighbor to go hunting in, or to haul firewood? We all restrict the use of (we sanctify) those things which we most highly prize.</span></p><span data-dcnode-id="677" instrument_node="">
</span><p class="bodytext" data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">Teenagers, culture is lying to you. Our culture does not value sex, it thinks of it as very common, so common that virtual strangers will share life’s most intimate treasure. How tragic it is to see young people seduced (philosophically and physically), so that they will share that most treasured gift with those who cannot even be named or numbered. The sanctity of sex in marriage clearly calls for the sanctity of sex before marriage. May God grant you the conviction to stand against the flood of cultural and peer pressure.</span></p><span data-dcnode-id="674" instrument_node="">
</span><p class="bodytext" data-dcnode-id="669"><span data-dcnode-id="673" instrument_node="">In conclusion, let me suggest three additional ways in which the sanctity of sex is to be applied in a practical way. First, since the sanctity of sex reflects its value, its beauty, its goodness, let us never think of sex as something dirty and defiling. Some people seem to disdain sex in marriage as much as the Bible disdains it outside of marriage. The Bible speaks otherwise. In both the New and Old Testaments we are urged to let the pleasure and enjoyment of sex within marriage serve as a godly defense against sexual immorality:</span><sup data-dcnode-id="670"><a data-dcnode-id="671" href="#P2328_884597"><span data-dcnode-id="672" instrument_node="">44</span></a></sup></p><span data-dcnode-id="668" instrument_node="">
</span><p class="bodytext" data-dcnode-id="663"><span data-dcnode-id="667" instrument_node="">Drink water from your own cistern, And fresh water from your own well. Should your springs be dispersed abroad, Streams of water in the streets? Let them be yours alone, And not for strangers with you. Let your fountain be blessed, And rejoice in the wife of your youth. As a loving hind and a graceful doe, Let her breasts satisfy you at all times; Be exhilarated always with her love. For why should you, my son, be exhilarated with an adulteress, And embrace the bosom of a foreigner? (</span><a class="NETBibleTagged" data-dcnode-id="665" href="javascript:%7B%7D"><span data-dcnode-id="666" instrument_node="">Prov. 5:15-20</span></a><span data-dcnode-id="664" instrument_node="">). </span></p><span data-dcnode-id="662" instrument_node="">
