</span><p class="bodytext" data-dcnode-id="657"><span data-dcnode-id="661" instrument_node="">Let the husband fulfill his duty to his wife, and likewise also the wife to her husband. The wife does not have authority over her own body, but the husband does; and likewise also the husband does not have authority over his own body, but the wife does. Stop depriving one another, except by agreement for a time that you may devote yourselves to prayer, and come together again lest Satan tempt you because of your lack of self-control (</span><a class="NETBibleTagged" data-dcnode-id="659" href="javascript:%7B%7D"><span data-dcnode-id="660" instrument_node="">1 Cor. 7:3-5</span></a><span data-dcnode-id="658" instrument_node="">).</span></p><span data-dcnode-id="656" instrument_node="">
</span><p class="bodytext" data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">Second, in order to avoid the evils of sex, we need to minimize our exposure to those things which only stimulate lustful thoughts and sexual temptations. Specifically, I am referring to what Paul has written in the Book of Ephesians, which especially relates to sexual impurity:</span></p><span data-dcnode-id="653" instrument_node="">
</span><p class="bodytext" data-dcnode-id="648"><span data-dcnode-id="652" instrument_node="">Therefore be imitators of God, as beloved children; and walk in love, just as Christ also loved you, and gave Himself up for us, an offering and a sacrifice to God as a fragrant aroma. But do not let immorality or any impurity or greed even be named among you, as is proper among saints; and there must be no filthiness and silly talk, or coarse jesting, which are not fitting, but rather giving of thanks. For this you know with certainty, that no immoral or impure person or covetous man, who is an idolater, has an inheritance in the kingdom of Christ and God. Let no one deceive you with empty words, for because of these things the wrath of God comes upon the sons of disobedience. Therefore do not be partakers with them; for you were formerly darkness, but now you are light in the Lord; walk as children of light (for the fruit of the light consists in all goodness and righteousness and truth), trying to learn what is pleasing to the Lord. And do not participate in the unfruitful deeds of darkness, but instead even expose them; for it is disgraceful even to speak of the things which are done by them in secret. But all things become visible when they are exposed by the light, for everything that becomes visible is light. For this reason it says, “Awake, sleeper, and arise from the dead, and Christ will shine on you” (</span><a class="NETBibleTagged" data-dcnode-id="650" href="javascript:%7B%7D"><span data-dcnode-id="651" instrument_node="">Eph. 5:1-14</span></a><span data-dcnode-id="649" instrument_node="">).</span></p><span data-dcnode-id="647" instrument_node="">
</span><p class="bodytext" data-dcnode-id="639"><span data-dcnode-id="646" instrument_node="">Third, we must beware of that teaching (either by direct statement or by inference, or by silence) which holds that any and every sexual pleasure can be enjoyed by a married couple behind closed doors. I understand that “possessing one’s vessel in sanctification and honor” (</span><a class="NETBibleTagged" data-dcnode-id="644" href="javascript:%7B%7D"><span data-dcnode-id="645" instrument_node="">1 Thes. 4:4</span></a><span data-dcnode-id="643" instrument_node="">), and “holding the marriage bed in honor,” “keeping the marriage bed undefiled” (</span><a class="NETBibleTagged" data-dcnode-id="641" href="javascript:%7B%7D"><span data-dcnode-id="642" instrument_node="">Heb. 13:4</span></a><span data-dcnode-id="640" instrument_node="">) implies that not every sexual practice of the pagan world is permissible or beneficial for the Christian. This may be a matter of personal conviction, over which there is some disagreement, but marriage does not make every sexual practice holy.</span></p><span data-dcnode-id="638" instrument_node="">
</span><p class="bodytext" data-dcnode-id="636"><span data-dcnode-id="637" instrument_node="">May God grant that we hold sex and marriage to be sacred, and may God enable each of us, by His grace and through His Spirit, to move ahead in the process of sanctification, to the praise of the glory of His grace.</span></p><span data-dcnode-id="635" instrument_node="">
</span><hr data-dcnode-id="634" size="2" width="80%"><span data-dcnode-id="633" instrument_node="">
</span><p class="bodytext" data-dcnode-id="630"><a data-dcnode-id="632" name="P2224_840567" target="_blank"></a><span data-dcnode-id="631" instrument_node="">42 One may wonder why only the husband is to leave his father and mother, and not the wife. Some of this may be cultural, but I think the primary reason is that in those days especially (and in other cultures still today) the woman is under the authority of her parents, and her parents authority over her is simply transferred to her husband. The man, on the other hand, is under his parents’ authority as a child, but when he “leaves” them he terminates that “chain of command” and establishes a new “chain of command,” being the head of his wife and the family which may follow.</span></p><span data-dcnode-id="629" instrument_node="">
</span><p class="bodytext" data-dcnode-id="626"><a data-dcnode-id="628" name="P2231_844886" target="_blank"></a><span data-dcnode-id="627" instrument_node="">43 In Genesis chapter 34, Dinah is apparently forcibly raped by Shechem, a deed to which Jacob’s sons violently reacted as an abomination (cf. 34:7). In chapter 35, Ruben lay with one of his father’s concubines (35:22). In chapter 38, Judah engaged in sexual union with his daughter-in-law, whom he thought to be a Canaanite cult prostitute (38:14-23). His indignation at discovering his daughter-in-law was pregnant out of wedlock (not knowing yet it was by him), reveals that sexual immorality was clearly condemned (cf. v. 24). The incidents in chapters 34 and 38 indicate that the Law of Moses only codified what was already understood to be wrong.</span></p><span data-dcnode-id="625" instrument_node="">
</span><p class="bodytext" data-dcnode-id="622"><a data-dcnode-id="624" name="P2328_884597" target="_blank"></a><span data-dcnode-id="623" instrument_node="">44 In saying that sexual pleasure in marriage is one of God’s safeguards against immorality, I am not saying that the husband or wife who gives freely of themselves in a sexual way thereby guarantees the sexual purity of their partner. I have heard it cruelly stated or implied that had a mate satisfied his or her partner in marriage, adultery would have been prevented. While depriving a partner tempts them, fulfilling a partner does not necessarily keep them from sexual sin. We need only look at men like David and Solomon, who had so many wives they couldn’t keep up with them, but still sought after more (such as David sought Bathsheba).</span></p></div></div></div><span data-dcnode-id="618" instrument_node=""> </span><div class="book-navigation" data-dcnode-id="597" id="book-navigation-6232"><span data-dcnode-id="617" instrument_node="">

</span><p data-dcnode-id="184"><span data-dcnode-id="212" instrument_node="">2  at three o’clock in the afternoon. </span><sup data-dcnode-id="210"><span data-dcnode-id="211" instrument_node="">3</span></sup><span data-dcnode-id="209" instrument_node="">
</span><strong data-dcnode-id="207"><span data-dcnode-id="208" instrument_node="">3:2</span></strong><span data-dcnode-id="206" instrument_node=""> And a man lame </span><sup data-dcnode-id="204"><span data-dcnode-id="205" instrument_node="">4</span></sup><span data-dcnode-id="203" instrument_node="">  from birth </span><sup data-dcnode-id="201"><span data-dcnode-id="202" instrument_node="">5</span></sup><span data-dcnode-id="200" instrument_node="">  was being carried up, who was placed at the temple gate called “the Beautiful Gate” every day </span><sup data-dcnode-id="198"><span data-dcnode-id="199" instrument_node="">6</span></sup><span data-dcnode-id="197" instrument_node="">  so he could beg for money </span><sup data-dcnode-id="195"><span data-dcnode-id="196" instrument_node="">7</span></sup><span data-dcnode-id="194" instrument_node="">  from those going into the temple courts. </span><sup data-dcnode-id="192"><span data-dcnode-id="193" instrument_node="">8</span></sup><span data-dcnode-id="191" instrument_node=""> </span><strong data-dcnode-id="189"><span data-dcnode-id="190" instrument_node="">3:3</span></strong><span data-dcnode-id="188" instrument_node=""> When he saw Peter and John about to go into the temple courts, </span><sup data-dcnode-id="186"><span data-dcnode-id="187" instrument_node="">9</span></sup><span data-dcnode-id="185" instrument_node="">  he asked them for money. </span></p><span data-dcnode-id="183" instrument_node="">
</span><p data-dcnode-id="137"><sup data-dcnode-id="181"><span data-dcnode-id="182" instrument_node="">10</span></sup><span data-dcnode-id="180" instrument_node=""> </span><strong data-dcnode-id="178"><span data-dcnode-id="179" instrument_node="">3:4</span></strong><span data-dcnode-id="177" instrument_node=""> Peter looked directly </span><sup data-dcnode-id="175"><span data-dcnode-id="176" instrument_node="">11</span></sup><span data-dcnode-id="174" instrument_node="">  at him (as did John) and said, “Look at us!” </span><strong data-dcnode-id="172"><span data-dcnode-id="173" instrument_node="">3:5</span></strong><span data-dcnode-id="171" instrument_node=""> So the lame man </span><sup data-dcnode-id="169"><span data-dcnode-id="170" instrument_node="">12</span></sup><span data-dcnode-id="168" instrument_node="">  paid attention to them, expecting to receive something from them. </span><strong data-dcnode-id="166"><span data-dcnode-id="167" instrument_node="">3:6</span></strong><span data-dcnode-id="165" instrument_node=""> But Peter said, “I have no silver or gold, </span><sup data-dcnode-id="163"><span data-dcnode-id="164" instrument_node="">13</span></sup><span data-dcnode-id="162" instrument_node="">  but what I do have I give you. In the name </span><sup data-dcnode-id="160"><span data-dcnode-id="161" instrument_node="">14</span></sup><span data-dcnode-id="159" instrument_node="">  of Jesus Christ </span><sup data-dcnode-id="157"><span data-dcnode-id="158" instrument_node="">15</span></sup><span data-dcnode-id="156" instrument_node="">  the Nazarene, stand up and </span><sup data-dcnode-id="154"><span data-dcnode-id="155" instrument_node="">16</span></sup><span data-dcnode-id="153" instrument_node="">  walk!” </span><strong data-dcnode-id="151"><span data-dcnode-id="152" instrument_node="">3:7</span></strong><span data-dcnode-id="150" instrument_node=""> Then </span><sup data-dcnode-id="148"><span data-dcnode-id="149" instrument_node="">17</span></sup><span data-dcnode-id="147" instrument_node="">  Peter </span><sup data-dcnode-id="145"><span data-dcnode-id="146" instrument_node="">18</span></sup><span data-dcnode-id="144" instrument_node="">  took hold </span><sup data-dcnode-id="142"><span data-dcnode-id="143" instrument_node="">19</span></sup><span data-dcnode-id="141" instrument_node="">  of him by the right hand and raised him up, and at once the man’s </span><sup data-dcnode-id="139"><span data-dcnode-id="140" instrument_node="">20</span></sup><span data-dcnode-id="138" instrument_node="">  feet and ankles were made strong. </span></p><span data-dcnode-id="136" instrument_node="">
</span><p data-dcnode-id="105"><sup data-dcnode-id="134"><span data-dcnode-id="135" instrument_node="">21</span></sup><span data-dcnode-id="133" instrument_node=""> </span><strong data-dcnode-id="131"><span data-dcnode-id="132" instrument_node="">3:8</span></strong><span data-dcnode-id="130" instrument_node=""> He </span><sup data-dcnode-id="128"><span data-dcnode-id="129" instrument_node="">22</span></sup><span data-dcnode-id="127" instrument_node="">  jumped up, </span><sup data-dcnode-id="125"><span data-dcnode-id="126" instrument_node="">23</span></sup><span data-dcnode-id="124" instrument_node="">  stood and began walking around, and he entered the temple courts </span><sup data-dcnode-id="122"><span data-dcnode-id="123" instrument_node="">24</span></sup><span data-dcnode-id="121" instrument_node="">  with them, walking and leaping and praising God. </span><strong data-dcnode-id="119"><span data-dcnode-id="120" instrument_node="">3:9</span></strong><span data-dcnode-id="118" instrument_node=""> All </span><sup data-dcnode-id="116"><span data-dcnode-id="117" instrument_node="">25</span></sup><span data-dcnode-id="115" instrument_node="">  the people saw him walking and praising God, </span><strong data-dcnode-id="113"><span data-dcnode-id="114" instrument_node="">3:10</span></strong><span data-dcnode-id="112" instrument_node=""> and they recognized him as the man who used to sit and ask for donations </span><sup data-dcnode-id="110"><span data-dcnode-id="111" instrument_node="">26</span></sup><span data-dcnode-id="109" instrument_node="">  at the Beautiful Gate of the temple, and they were filled with astonishment and amazement </span><sup data-dcnode-id="107"><span data-dcnode-id="108" instrument_node="">27</span></sup><span data-dcnode-id="106" instrument_node="">  at what had happened to him.</span></p><span data-dcnode-id="104" instrument_node="">
