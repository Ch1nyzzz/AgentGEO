</span><p data-dcnode-id="1319"><span data-dcnode-id="1332" instrument_node="">
					“Behold, I send my messenger, and he will prepare the way before me. And the Lord whom you seek will suddenly come to his temple; and the messenger of the covenant in whom you delight, behold, he is coming, says the </span><span class="sc" data-dcnode-id="1330"><span data-dcnode-id="1331" instrument_node="">Lord</span></span><span data-dcnode-id="1329" instrument_node=""> of hosts. But who can endure the day of his coming, and who can stand when he appears? For he is like a refiner's fire and like fullers' soap. He will sit as a refiner and purifier of silver, and he will purify the sons of Levi and refine them like gold and silver, and they will bring offerings in righteousness to the </span><span class="sc" data-dcnode-id="1327"><span data-dcnode-id="1328" instrument_node="">Lord</span></span><span data-dcnode-id="1326" instrument_node="">. Then the offering of Judah and Jerusalem will be pleasing to the </span><span class="sc" data-dcnode-id="1324"><span data-dcnode-id="1325" instrument_node="">Lord</span></span><span data-dcnode-id="1323" instrument_node=""> as in the days of old and as in former years. “Then I will draw near to you for judgment. I will be a swift witness against the sorcerers, against the adulterers, against those who swear falsely, against those who oppress the hired worker in his wages, the widow and the fatherless, against those who thrust aside the sojourner, and do not fear me, says the </span><span class="sc" data-dcnode-id="1321"><span data-dcnode-id="1322" instrument_node="">Lord</span></span><span data-dcnode-id="1320" instrument_node=""> of hosts. ...				</span></p><span data-dcnode-id="1318" instrument_node="">

</span><p data-dcnode-id="1288"><span data-dcnode-id="1298" instrument_node="">
					Behold, a day is coming for the </span><span class="sc" data-dcnode-id="1296"><span data-dcnode-id="1297" instrument_node="">Lord</span></span><span data-dcnode-id="1295" instrument_node="">, when the spoil taken from you will be divided in your midst. For I will gather all the nations against Jerusalem to battle, and the city shall be taken and the houses plundered and the women raped. Half of the city shall go out into exile, but the rest of the people shall not be cut off from the city. Then the </span><span class="sc" data-dcnode-id="1293"><span data-dcnode-id="1294" instrument_node="">Lord</span></span><span data-dcnode-id="1292" instrument_node=""> will go out and fight against those nations as when he fights on a day of battle. On that day his feet shall stand on the Mount of Olives that lies before Jerusalem on the east, and the Mount of Olives shall be split in two from east to west by a very wide valley, so that one half of the Mount shall move northward, and the other half southward. And you shall flee to the valley of my mountains, for the valley of the mountains shall reach to Azal. And you shall flee as you fled from the earthquake in the days of Uzziah king of Judah. Then the </span><span class="sc" data-dcnode-id="1290"><span data-dcnode-id="1291" instrument_node="">Lord</span></span><span data-dcnode-id="1289" instrument_node=""> my God will come, and all the holy ones with him. ...				</span></p><span data-dcnode-id="1287" instrument_node="">

</span><p data-dcnode-id="1229"><span data-dcnode-id="1233" instrument_node="">
					Blow a trumpet in Zion; sound an alarm on my holy mountain! Let all the inhabitants of the land tremble, for the day of the </span><span class="sc" data-dcnode-id="1231"><span data-dcnode-id="1232" instrument_node="">Lord</span></span><span data-dcnode-id="1230" instrument_node=""> is coming; it is near, a day of darkness and gloom, a day of clouds and thick darkness! Like blackness there is spread upon the mountains a great and powerful people; their like has never been before, nor will be again after them through the years of all generations. Fire devours before them, and behind them a flame burns. The land is like the garden of Eden before them, but behind them a desolate wilderness, and nothing escapes them. Their appearance is like the appearance of horses, and like war horses they run. As with the rumbling of chariots, they leap on the tops of the mountains, like the crackling of a flame of fire devouring the stubble, like a powerful army drawn up for battle. ...				</span></p><span data-dcnode-id="1228" instrument_node="">

</span><p data-dcnode-id="1201"><span data-dcnode-id="1208" instrument_node="">
					Hear the word of the </span><span class="sc" data-dcnode-id="1206"><span data-dcnode-id="1207" instrument_node="">Lord</span></span><span data-dcnode-id="1205" instrument_node="">, O children of Israel, for the </span><span class="sc" data-dcnode-id="1203"><span data-dcnode-id="1204" instrument_node="">Lord</span></span><span data-dcnode-id="1202" instrument_node=""> has a controversy with the inhabitants of the land. There is no faithfulness or steadfast love, and no knowledge of God in the land; there is swearing, lying, murder, stealing, and committing adultery; they break all bounds, and bloodshed follows bloodshed. Therefore the land mourns, and all who dwell in it languish, and also the beasts of the field and the birds of the heavens, and even the fish of the sea are taken away. Yet let no one contend, and let none accuse, for with you is my contention, O priest. You shall stumble by day; the prophet also shall stumble with you by night; and I will destroy your mother. ...				</span></p><span data-dcnode-id="1200" instrument_node="">

					In the year that King Uzziah died I saw the Lord sitting upon a throne, high and lifted up; and the train of his robe filled the temple. Above him stood the seraphim. Each had six wings: with two he covered his face, and with two he covered his feet, and with two he flew. And one called to another and said: “Holy, holy, holy is the </span><span class="sc" data-dcnode-id="850"><span data-dcnode-id="851" instrument_node="">Lord</span></span><span data-dcnode-id="849" instrument_node=""> of hosts; the whole earth is full of his glory!” And the foundations of the thresholds shook at the voice of him who called, and the house was filled with smoke. And I said: “Woe is me! For I am lost; for I am a man of unclean lips, and I dwell in the midst of a people of unclean lips; for my eyes have seen the King, the </span><span class="sc" data-dcnode-id="847"><span data-dcnode-id="848" instrument_node="">Lord</span></span><span data-dcnode-id="846" instrument_node=""> of hosts!” ...				</span></p><span data-dcnode-id="844" instrument_node="">

					A Psalm of Asaph. Truly God is good to Israel, to those who are pure in heart. But as for me, my feet had almost stumbled, my steps had nearly slipped. For I was envious of the arrogant when I saw the prosperity of the wicked. For they have no pangs until death; their bodies are fat and sleek. They are not in trouble as others are; they are not stricken like the rest of mankind. ...				</span></p><span data-dcnode-id="800" instrument_node="">

					To the choirmaster. A Psalm of David, when Nathan the prophet went to him, after he had gone in to Bathsheba. Have mercy on me, O God, according to your steadfast love; according to your abundant mercy blot out my transgressions. Wash me thoroughly from my iniquity, and cleanse me from my sin! For I know my transgressions, and my sin is ever before me. Against you, you only, have I sinned and done what is evil in your sight, so that you may be justified in your words and blameless in your judgment. Behold, I was brought forth in iniquity, and in sin did my mother conceive me. ...				</span></p><span data-dcnode-id="778" instrument_node="">

					To the choirmaster: according to The Doe of the Dawn. A Psalm of David. My God, my God, why have you forsaken me? Why are you so far from saving me, from the words of my groaning? O my God, I cry by day, but you do not answer, and by night, but I find no rest. Yet you are holy, enthroned on the praises of Israel. In you our fathers trusted; they trusted, and you delivered them. To you they cried and were rescued; in you they trusted and were not put to shame. ...				</span></p><span data-dcnode-id="756" instrument_node="">

</span><p data-dcnode-id="726"><span data-dcnode-id="736" instrument_node="">
					To the choirmaster: with stringed instruments. A Psalm of David. Answer me when I call, O God of my righteousness! You have given me relief when I was in distress. Be gracious to me and hear my prayer! O men, how long shall my honor be turned into shame? How long will you love vain words and seek after lies? Selah But know that the </span><span class="sc" data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">Lord</span></span><span data-dcnode-id="733" instrument_node=""> has set apart the godly for himself; the </span><span class="sc" data-dcnode-id="731"><span data-dcnode-id="732" instrument_node="">Lord</span></span><span data-dcnode-id="730" instrument_node=""> hears when I call to him. Be angry, and do not sin; ponder in your own hearts on your beds, and be silent. Selah Offer right sacrifices, and put your trust in the </span><span class="sc" data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">Lord</span></span><span data-dcnode-id="727" instrument_node="">. ...				</span></p><span data-dcnode-id="725" instrument_node="">

</span><p data-dcnode-id="701"><span data-dcnode-id="705" instrument_node="">
					Josiah was eight years old when he began to reign, and he reigned thirty-one years in Jerusalem. And he did what was right in the eyes of the </span><span class="sc" data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">Lord</span></span><span data-dcnode-id="702" instrument_node="">, and walked in the ways of David his father; and he did not turn aside to the right hand or to the left. For in the eighth year of his reign, while he was yet a boy, he began to seek the God of David his father, and in the twelfth year he began to purge Judah and Jerusalem of the high places, the Asherim, and the carved and the metal images. And they chopped down the altars of the Baals in his presence, and he cut down the incense altars that stood above them. And he broke in pieces the Asherim and the carved and the metal images, and he made dust of them and scattered it over the graves of those who had sacrificed to them. He also burned the bones of the priests on their altars and cleansed Judah and Jerusalem. ...				</span></p><span data-dcnode-id="700" instrument_node="">

</span><p data-dcnode-id="679"><span data-dcnode-id="680" instrument_node="">
					After these things and these acts of faithfulness, Sennacherib king of Assyria came and invaded Judah and encamped against the fortified cities, thinking to win them for himself. And when Hezekiah saw that Sennacherib had come and intended to fight against Jerusalem, he planned with his officers and his mighty men to stop the water of the springs that were outside the city; and they helped him. A great many people were gathered, and they stopped all the springs and the brook that flowed through the land, saying, “Why should the kings of Assyria come and find much water?” He set to work resolutely and built up all the wall that was broken down and raised towers upon it, and outside it he built another wall, and he strengthened the Millo in the city of David. He also made weapons and shields in abundance. ...				</span></p><span data-dcnode-id="678" instrument_node="">

</span></h3><span data-dcnode-id="659" instrument_node="">
</span><p data-dcnode-id="645"><span data-dcnode-id="658" instrument_node="">
					After this the Moabites and Ammonites, and with them some of the Meunites, came against Jehoshaphat for battle. Some men came and told Jehoshaphat, “A great multitude is coming against you from Edom, from beyond the sea; and, behold, they are in Hazazon-tamar” (that is, Engedi). Then Jehoshaphat was afraid and set his face to seek the </span><span class="sc" data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">Lord</span></span><span data-dcnode-id="655" instrument_node="">, and proclaimed a fast throughout all Judah. And Judah assembled to seek help from the </span><span class="sc" data-dcnode-id="653"><span data-dcnode-id="654" instrument_node="">Lord</span></span><span data-dcnode-id="652" instrument_node="">; from all the cities of Judah they came to seek the </span><span class="sc" data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">Lord</span></span><span data-dcnode-id="649" instrument_node="">. And Jehoshaphat stood in the assembly of Judah and Jerusalem, in the house of the </span><span class="sc" data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">Lord</span></span><span data-dcnode-id="646" instrument_node="">, before the new court, ...				</span></p><span data-dcnode-id="644" instrument_node="">
