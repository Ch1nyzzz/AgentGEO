</span><h3 class="post-title entry-title" data-dcnode-id="3391" itemprop="name"><span data-dcnode-id="3392" instrument_node="">
Bible Commands Christians to Kill Nonbelievers
</span></h3><span data-dcnode-id="3390" instrument_node="">
</span><div class="post-header" data-dcnode-id="3386"><span data-dcnode-id="3389" instrument_node="">
</span><div class="post-header-line-1" data-dcnode-id="3388"></div><span data-dcnode-id="3387" instrument_node="">
</span></div><span data-dcnode-id="3385" instrument_node="">
</span><div class="post-body entry-content" data-dcnode-id="3320" id="post-body-111005143404327840" itemprop="articleBody"><span data-dcnode-id="3384" instrument_node="">
</span><span data-dcnode-id="3383" instrument_node="">
</span><span data-dcnode-id="3375" instrument_node="">
</span><span data-dcnode-id="3368" instrument_node="">
</span><table cellpadding="0" cellspacing="0" class="tr-caption-container zemanta-img" data-dcnode-id="3366" style="float: right; margin-right: 1em; text-align: right;"><tbody data-dcnode-id="3367"><tr data-dcnode-id="3376"><td data-dcnode-id="3377" style="text-align: center;"><div class="zemanta-img" data-dcnode-id="3379"><span data-dcnode-id="3382" instrument_node="">
</span><a data-dcnode-id="3380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/File%3AIvanov_pagans.jpg" imageanchor="1" style="margin-bottom: 1em; margin-left: auto; margin-right: auto; text-align: clear:right;"><img alt="Christians and Pagans, a painting by Sergei Ivanov" border="0" class="zemanta-img-inserted zemanta-img-configured" data-dcnode-id="3381" height="230" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/en/thumb/9/9b/Ivanov_pagans.jpg/350px-Ivanov_pagans.jpg&amp;raw" style="border: medium none; font-size: 0.8em;" title="Christians and pagans" width="320"></a></div><span data-dcnode-id="3378" instrument_node="">
</span></td></tr><tr data-dcnode-id="3369"><td class="tr-caption zemanta-img-attribution" data-dcnode-id="3370" style="text-align: center; width: 350px;"><span data-dcnode-id="3374" instrument_node="">Christians and Pagans, a painting by Sergei Ivanov (Photo credit: </span><a data-dcnode-id="3372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/File%3AIvanov_pagans.jpg" target="_blank"><span data-dcnode-id="3373" instrument_node="">Wikipedia</span></a><span data-dcnode-id="3371" instrument_node="">)</span></td></tr></tbody></table><span data-dcnode-id="3365" instrument_node="">
</span><p data-dcnode-id="3357"><span data-dcnode-id="3364" instrument_node="">One often hears that it is not religious belief itself that is problematic but </span><i data-dcnode-id="3362"><span data-dcnode-id="3363" instrument_node="">religious extremism</span></i><span data-dcnode-id="3361" instrument_node="">. This sounds appealing until one realizes that the presence of religious believers, including religious moderates, is what often shields religious extremists from criticism. That is, the </span><a data-dcnode-id="3359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.atheistrev.com/2012/04/responsibility-of-religious-moderates.html"><span data-dcnode-id="3360" instrument_node="">presence of religious moderates</span></a><span data-dcnode-id="3358" instrument_node=""> seems to provide a context in which religious extremism doesn't seem nearly as irrational and dangerous as it probably should. Moderate believers make it more difficult to question even the most extreme religious beliefs.</span></p><span data-dcnode-id="3356" instrument_node="">
</span><p data-dcnode-id="3348"><span data-dcnode-id="3355" instrument_node="">But isn't it a bit of an exaggeration to say that religious extremism is actually dangerous? Maybe </span><a data-dcnode-id="3353" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.atheistrev.com/2016/01/how-we-talk-about-islam-and-muslims.html"><span data-dcnode-id="3354" instrument_node="">some Islamic extremists</span></a><span data-dcnode-id="3352" instrument_node=""> are dangerous, but surely there is nothing wrong with their Christian counterparts in the U.S.! I mean, isn't their "holy" book mostly about how they should be nice to others (e.g., </span><a data-dcnode-id="3350" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.atheistrev.com/2015/06/loving-thy-neighbor-unless.html"><span data-dcnode-id="3351" instrument_node="">love thy neighbor</span></a><span data-dcnode-id="3349" instrument_node=""> and all that)? Even if many seem to ignore these parts and treat others with anything but kindness, doesn't their instruction book at least convey that positive message?</span></p><span data-dcnode-id="3347" instrument_node="">
</span><a data-dcnode-id="3346" name="more"></a><p data-dcnode-id="3341"><span data-dcnode-id="3345" instrument_node="">Let's examine our trusty </span><a data-dcnode-id="3343" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/2VdaL3L" target="_blank"><span data-dcnode-id="3344" instrument_node="">Christian bible</span></a><span data-dcnode-id="3342" instrument_node=""> for a moment by taking a look at Deuteronomy 17:</span></p><blockquote data-dcnode-id="3339"><span data-dcnode-id="3340" instrument_node="">If there be found among you, within any of thy gates which the LORD thy God giveth thee, man or woman, that hath wrought wickedness in the sight of the LORD thy God, in transgressing his covenant; 17:3 And hath gone and served other gods, and worshipped them, either the sun, or moon, or any of the host of heaven, which I have not commanded; 17:4 And it be told thee, and thou hast heard of it, and enquired diligently, and, behold, it be true, and the thing certain, that such abomination is wrought in Israel; 17:5 Then shalt thou bring forth that man or that woman, which have committed that wicked thing, unto thy gates, even that man or that woman, and shalt stone them with stones, till they die.</span></blockquote><span data-dcnode-id="3338" instrument_node="">Fairly clear, isn't it? A book, claimed by many to be </span><a data-dcnode-id="3336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.atheistrev.com/2014/04/the-christian-bible-holy-or-not.html"><span data-dcnode-id="3337" instrument_node="">"holy" in some way</span></a><span data-dcnode-id="3335" instrument_node="">, instructs people to murder persons who do not believe in their god. Why haven't we heard more about this? Because many Christians are content to ignore certain parts of their bible while obsessing about others (i.e., cherry picking). And what of those who do not ignore such parts of their "sacred" text? We call them extremists...or worse.</span><p data-dcnode-id="3334"></p><span data-dcnode-id="3333" instrument_node="">
</span><p data-dcnode-id="3328"><span data-dcnode-id="3332" instrument_node="">For more on this topic, see </span><a data-dcnode-id="3330" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.atheistrev.com/2015/03/my-holy-book-says-that-people-like-you.html"><span data-dcnode-id="3331" instrument_node="">My Holy Book Says That People Like You Should Be Killed</span></a><span data-dcnode-id="3329" instrument_node="">.</span></p><span data-dcnode-id="3327" instrument_node="">
</span><br data-dcnode-id="3326"><span data-dcnode-id="3325" instrument_node="">
</span><br data-dcnode-id="3324"><span data-dcnode-id="3323" instrument_node="">
</span><div data-dcnode-id="3322" style="clear: both;"></div><span data-dcnode-id="3321" instrument_node="">

n data-dcnode-id="2737" instrument_node="">The Golden Rule from Many Sources </span><br data-dcnode-id="2736"><span data-dcnode-id="2735" instrument_node="">The Love your Neighbor meme predated the New Testament from numerous sources (From the Big Book of Lists): </span><br data-dcnode-id="2734"><span data-dcnode-id="2733" instrument_node="">1.One should always treat others as they themselves wish to be treated.–Hitopadesa; Hinduism: 3200 BC </span><br data-dcnode-id="2732"><span data-dcnode-id="2731" instrument_node="">2.Thou shalt not avenge nor ear any grudge against the children of thy people, but thou shalt love thy neighbor as thyself.–Leviticus 19:18: 1300 BCE </span><br data-dcnode-id="2730"><span data-dcnode-id="2729" instrument_node="">3."Whatever is disagreeable to yourself, do not do unto others." –Shast-na-shayast 13: 29; Zoroastrianism: 600 BC </span><br data-dcnode-id="2728"><span data-dcnode-id="2727" instrument_node="">4."Hurt not others with that which pains yourself." –Udanavarga 5: 18; Buddhism: 560 BC </span><br data-dcnode-id="2726"><span data-dcnode-id="2725" instrument_node="">5."What you do not want done to yourself, do not do to others." –Analects 15: 23; Confucianism: 557 BC </span><br data-dcnode-id="2724"><span data-dcnode-id="2723" instrument_node="">6.Do not do to others what would anger you if done to you by others.–Isocrates: 375 BCE </span><br data-dcnode-id="2722"><span data-dcnode-id="2721" instrument_node="">7.This is the sum of all true righteousness: deal with others as thou wouldst thyself be dealt by. Do nothing to thy neighbor which thou wouldst not have him do to thee hereafter.–Mahabharata: 150 BCE. </span><br data-dcnode-id="2720"><span data-dcnode-id="2719" instrument_node="">8."Whatsoever ye would that others should do to you, do ye even so to them." –Matthew 7: 12 KJV; Christianity: 30 AD </span><br data-dcnode-id="2718"><span data-dcnode-id="2717" instrument_node="">9.As ye would that men should do to you, do ye also to them likewise.–Luke 6:31: 70 CE. </span><br data-dcnode-id="2716"><span data-dcnode-id="2715" instrument_node="">10.What thou avoidest suffering thyself seek not to impose on others –Epictetus: 100 CE. </span><br data-dcnode-id="2714"><span data-dcnode-id="2713" instrument_node="">11.Serve God, and join not any partners with Him; and do good- to parents, kinsfolk, orphans, those in need, neighbors who are near, neighbors who are strangers, the companion by your side, the wayfarer (ye meet), and what your right hands possess [the slave]: For God loveth not the arrogant, the vainglorious” –Quran: 4:36: 632 CE. </span><br data-dcnode-id="2712"><span data-dcnode-id="2711" instrument_node=""> </span><br data-dcnode-id="2710"><span data-dcnode-id="2709" instrument_node="">My recent post </span><a data-dcnode-id="2707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.12uh.com/improbulos/i-m-probulos-9-books-in-amazon-agnostic-top-20-sep-22-2013/" rel="nofollow" target="_blank"><span data-dcnode-id="2708" instrument_node="">I M Probulos – 9 books in Amazon Agnostic Top 20 – Sep 22 2013</span></a><span data-dcnode-id="2706" instrument_node=""> </span></div><span data-dcnode-id="2704" instrument_node=""> </span></div><span data-dcnode-id="2702" instrument_node=""> </span><div class="idc-c-b" data-dcnode-id="2675" id="IDCommentBottom777564827"><span data-dcnode-id="2701" instrument_node=""> </span><div class="idc-right" data-dcnode-id="2696" id="IDCommentLinksRight777564827"><span data-dcnode-id="2700" instrument_node=""> </span><a data-dcnode-id="2698" href="javascript:%20showReportBox(777564827)"><span data-dcnode-id="2699" instrument_node="">Report</span></a><span data-dcnode-id="2697" instrument_node=""> </span></div><span data-dcnode-id="2695" instrument_node=""> </span><div data-dcnode-id="2687" id="IDCommentPostReplyLink777564827"><span data-dcnode-id="2694" instrument_node=""> </span><span class="idc-btn_s" data-dcnode-id="2689"><span d "2562" instrument_node="">If you have never read the bible in full, you should, then make a solid decision on your beliefs. I have always been open minded to all beliefs, but I read the bible in FULL and understand the big picture, the message. Please for your own sake READ what you so say you don't believe first, then if you still want to be an atheist, a follower of the dark one, more power to you. </span></div><span data-dcnode-id="2560" instrument_node=""> </span></div><span data-dcnode-id="2558" instrument_node=""> </span><div class="idc-c-b" data-dcnode-id="2531" id="IDCommentBottom787943909"><span data-dcnode-id="2557" instrument_node=""> </span><div class="idc-right" data-dcnode-id="2552" id="IDCommentLinksRight787943909"><span data-dcnode-id="2556" instrument_node=""> </span><a data-dcnode-id="2554" href="javascript:%20showReportBox(787943909)"><span data-dcnode-id="2555" instrument_node="">Report</span></a><span data-dcnode-id="2553" instrument_node=""> </span></div><span data-dcnode-id="2551" instrument_node=""> </span><div data-dcnode-id="2543" id="IDCommentPostReplyLink787943909"><span data-dcnode-id="2550" instrument_node=""> </span><span class="idc-btn_s" data-dcnode-id="2545"><span data-dcnode-id="2548"><input data-dcnode-id="2549" id="reqUsersOn" type="hidden" value="no"></span><span class="idc-r" data-dcnode-id="2546"><span data-dcnode-id="2547" instrument_node="">Reply</span></span></span><span data-dcnode-id="2544" instrument_node=""> </span></div><span data-dcnode-id="2542" instrument_node=""> </span><a class="idc-collapselink_closed" data-dcnode-id="2540" href="javascript:%20collapseThread(787943909);" id="IDCommentCollapseLink787943909"><span data-dcnode-id="2541" instrument_node="">8 replies </span></a><span data-dcnode-id="2539" instrument_node=""> </span><em class="idc-thread_active" data-dcnode-id="2535"><span data-dcnode-id="2538" instrument_node="">· </span><span class="IDCommentThreadTimeRead" data-dcnode-id="2536" id="IDCommentThreadTi ="idc-thread" data-dcnode-id="2387" id="IDCommentSubThread790279068"></div></div><span data-dcnode-id="2385" instrument_node=""> </span><div class="idc-thread idc-collapse" data-dcnode-id="2283" id="IDThread792403367"><div class="idc-c idc-anonymous" data-dcnode-id="2285" id="IDComment792403367"><div class="idc-c-h" data-dcnode-id="2352"><span data-dcnode-id="2384" instrument_node=""> </span><div class="idc-c-h-inner" data-dcnode-id="2353"><span data-dcnode-id="2383" instrument_node=""> </span><div class="idc-v" data-dcnode-id="2370"><span data-dcnode-id="2382" instrument_node=""> </span><span class="idc-v-total" data-dcnode-id="2380" id="IDCommentVoteScore792403367"><span data-dcnode-id="2381" instrument_node="">+13</span></span><span data-dcnode-id="2379" instrument_node=""> </span><a class="idc-v-up" data-dcnode-id="2376" href="javascript:%20voteComment(792403367,%201)"><span data-dcnode-id="2377"><span data-dcnode-id="2378" instrument_node="">Vote up</span></span></a><span data-dcnode-id="2375" instrument_node=""> </span><a class="idc-v-down" data-dcnode-id="2372" href="javascript:%20voteComment(792403367,%200)"><span data-dcnode-id="2373"><span data-dcnode-id="2374" instrument_node="">Vote down</span></span></a><span data-dcnode-id="2371" instrument_node=""> </span></div><span data-dcnode-id="2369" instrument_node=""> </span><span class="idc-a" data-dcnode-id="2366"><img alt="Christian's avatar" class="idc-avatar" data-dcnode-id="2368" height="26" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.intensedebate.com/images/avatar-normal.png&amp;raw" width="26"><span data-dcnode-id="2367" instrument_node=""> </span></span><span data-dcnode-id="2365" instrument_node=""> </span><p class="idc-i" data-dcnode-id="2355"><span data-dcnode-id="2364" instrument_node=""> </span><span data-dcnode-id="2362"><span data-dcnode-id="2363" instrument_node=""> Christian </span></span><span data-dcnode-id="2361" instrument_node=""> </span><em class="idc-time" data-dcnode-id="2357"><span data-dcnode-id="2360" instrument_node="">· </span><a class="IDCommentTime" data-dcnode-id="2358" href="#IDComment792403367" id="IDCommentTime792403367" title="Comment Permalink"><span data-dcnode-id="2359" instrument_node="">428 weeks ago</span></a></em><span data-dcnode-id="2356" instrument_node=""> </span></p><span data-dcnode-id="2354" instrument_node=""> </span></div></div><span data-dcnode-id="2351" instrument_node=""> </span><div class="idc-c-t" data-dcnode-id="2314" id="IDCommentTop792403367"><span data-dcnode-id="2350" instrument_node=""> </span><div class="idc-c-t-inner" data-dcnode-id="2316" id="IDComment-CommentText792403367"><span data-dcnode-id="2349" instrument_node=""> In the OT, God gave rules for priests to obey. </span><br data-dcnode-id="2348"><span data-dcnode-id="2347" instrument_node=""> </span><br data-dcnode-id="2346"><span data-dcnode-id="2345" instrument_node="">Guess what? Now we don't need priests (to sacrifice), so those laws do not govern how Christians should act today. </span><br data-dcnode-id="2344"><span data-dcnode-id="2343" instrument_node=""> </span><br data-dcnode-id="2342"><span data-dcnode-id="2341" instrument_node="">There are certain rules in the OT that do not pertain to Christians today, and this is one of them. Why? Here: </span><br data-dcnode-id="2340"><span data-dcnode-id="2339" instrument_node=""> </span><br data-dcnode-id="2338"><span data-dcnode-id="2337" instrument_node="">1) God's kingdom went from being external/physical (Israel), to internal/spiritual (Christians). He is no longer trying to protect a physical group of people, but a multi-ethnic, diverse bunch of INDIVIDUALS. </span><br data-dcnode-id="2336"><span data-dcnode-id="2335" instrument_node="">2) Notice how it says, "in Israel." See? He was talking to a nation. Now, the NT is not about a single nation, but a single individual. You. Me. Etc. (If I wanted to be smart about it I could say, "I'm not in Israel so why is this a problem?") </span><br data-dcnode-id="2334"><span data-dcnode-id="2333" instrument_node="">3) I could go on and on. The OT was about conduct (sacrifices, laws, rules, rules, rules). The NT is about heart/faith (relationships, mindsets, etc.) </span><br data-dcnode-id="2332"><span data-dcnode-id="2331" instrument_node=""> </span><br data-dcnode-id="2330"><span data-dcnode-id="2329" instrument_node="">The hard and fast rule to "what OT laws apply to Christians today?" could be summed up as: "If the law was talking to Israel's government and only Israel's government (as this one does), it may not apply. If the law was talking to a single person (Thou shalt not…), it may apply." </span><br data-dcnode-id="2328"><span data-dcnode-id="2327" instrument_node=""> </span><br data-dcnode-id="2326"><span data-dcnode-id="2325" instrument_node="">An example of applying this rule would be the infamous "stone the devil kid" law in the OT. Before stoning the brat, I think the family/group was supposed to go to the city/town council before getting permission. That was for Israel's government. </span><br data-dcnode-id="2324"><span data-dcnode-id="2323" instrument_node=""> </span><br data-dcnode-id="2322"><span data-dcnode-id="2321" instrument_node="">Thou shalt not murder is for individuals. </span><br data-dcnode-id="2320"><span data-dcnode-id="2319" instrument_node=""> </span><br data-dcnode-id="2318"><span data-dcnode-id="2317" instrument_node="">To summarize: I am a Christian, the law of the OT no longer condemns me :) Though I still can't go around murdering people while shouting, "Freedom!" </span></div><span data-dcnode-id="2315" instrument_node=""> </span></div><span data-dcnode-id="2313" instrument_node=""> </span><div class="idc-c-b" data-dcnode-id="2286" id="IDCommentBottom792403367"><span data-dcnode-id="2312" instrument_node=""> </span><div class="idc-right" data-dcnode-id="2307" id="IDCommentLinksRight792403367"><span data-dcnode-id="2311" instrument_node=""> </span><a data-dcnode-id="2309" href="javascript:%20showReportBox(792403367)"><span data-dcnode-id="2310" instrument_node="">Report</span></a><span data-dcnode-id="2308" instrument_node=""> </span></div><span data-dcnode-id="2306" instrument_node=""> </span><div data-dcnode-id="2298" id="IDCommentPostReplyLink792403367"><span data-dcnode-id="2305" instrument_node=""> </span><span class="idc-btn_s" data-dcnode-id="2300"><span data-dcnode-id="2303"><input data-dcnode-id="2304" id="reqUsersOn" type="hidden" value="no"></span><span class="idc-r" data-dcnode-id="2301"><span data-dcnode-id="2302" instrument_node="">Reply</span></span></span><span data-dcnode-id="2299" instrument_node=""> </span></div><span data-dcnode-id="2297" instrument_node=""> </span><a class="idc-collapselink_closed" data-dcnode-id="2295" href="javascript:%20collapseThread(792403367);" id="IDCommentCollapseLink792403367"><span data-dcnode-id="2296" instrument_node="">4 replies </span></a><span data-dcnode-id="2294" instrument_node=""> </span><em class="idc-thread_active" data-dcnode-id="2290"><span data-dcnode-id="2293" instrument_node="">· </span><span class="IDCommentThreadTimeRead" data-dcnode-id="2291" id="IDCommentThreadTime792403367"><span data-dcnode-id="2292" instrument_node="">active 396 weeks ago</span></span></em><span data-dcnode-id="2289" instrument_node=""> </span><span class="idc-clear" data-dcnode-id="2288"></span><span data-dcnode-id="2287" instrument_node=""> </span></div></div><div class="idc-thread" data-dcnode-id="2284" id="IDCommentSubThread792403367"></div></div><span data-dcnode-id="2282" instrument_node=""> </span><div class="idc-thread" data-dcnode-id="2207" id="IDThread792530035"><div class="idc-c idc-anonymous" data-dcnode-id="2209" id="IDComment792530035"><div class="idc-c-h" data-dcnode-id="2249"><span data-dcnode-id="2281" instrument_node=""> </span><div class="idc-c-h-inner" data-dcnode-id="2250"><span data-dcnode-id="2280" instrument_node=""> </span><div class="idc-v" data n><a class="IDCommentTime" data-dcnode-id="1497" href="#IDComment867884245" id="IDCommentTime867884245" title="Comment Permalink"><span data-dcnode-id="1498" instrument_node="">400 weeks ago</span></a></em><span data-dcnode-id="1495" instrument_node=""> </span></p><span data-dcnode-id="1493" instrument_node=""> </span></div></div><span data-dcnode-id="1490" instrument_node=""> </span><div class="idc-c-t" data-dcnode-id="1485" id="IDCommentTop867884245"><span data-dcnode-id="1489" instrument_node=""> </span><div class="idc-c-t-inner" data-dcnode-id="1487" id="IDComment-CommentText867884245"><span data-dcnode-id="1488" instrument_node=""> The story of the teacher we call Jesus makes it very clear that that he was bringing a new teaching and explicitly rejecting many of the teachings of the Torah and many of the practices of the Jews. The Law he speaks of many times is summed up by him in a few words... Love The Lord with all your heart and your neighbour as yourself. No one who actually reads the Bible from start to finish could ever think that it mandates the killing of unbelievers or most of the crazy stuff as set out in the Old Testament. This kind of Old Testament "criticism" of Christians is the bastion of illiterate fundamendalist atheists. They do not read the Bible in its context at all, they read it literally and assume all Christians do as well. It's a story written by men. That is a fact. It speaks of people who did and said good and bad things. The good things are obvious. It is a guide book to a relationship with beings who have and still exist and who love all humanity. Take it or leave it. The choice is yours. But try not to be a fundamentalist atheist, it's kind of boring. </span></div><span data-dcnode-id="1486" instrument_node=""> </span></div><span data-dcnode-id="1484" instrument_node=""> </span><div class="idc-c-b" data-dcnode-id="1456" id="IDCommentBottom867884245"><span data-dcnode-id="1483" instrument_node=""> </span><div class="idc-right" data
