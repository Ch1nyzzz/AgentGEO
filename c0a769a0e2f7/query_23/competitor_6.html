"https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/profile/amzn1.account.AFUFS4BO5RLSXTDVBJAGCBEWZSOQ/ref%3Datv_dp_cp_url"><img alt="" aria-label="Customer Profile link" class="C9h022" data-dcnode-id="1178" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/avatar/default/amzn1.account.AFUFS4BO5RLSXTDVBJAGCBEWZSOQ%3Fmax_width%3D50%26square%3Dtrue&amp;raw"><span class="_1O9NWx" data-dcnode-id="1176"><span data-dcnode-id="1177" instrument_node="">Zsuzsa</span></span></a><span class="_3gvi4K" data-dcnode-id="1173"><span data-dcnode-id="1174" instrument_node="">Reviewed in the United States on October 20, 2019</span></span></div><div class="abwJ5F _16AW_S _2LF_6p _1vYcYX" data-dcnode-id="1157"><span class="_3PfIMz _1I_IFp ghzfef dvui-tooltip-container" data-dcnode-id="1160"><label class="_2gl_vG" data-dcnode-id="1165" for="tooltip-sevvs6fz1we" tabindex="0"><div class="_1OnCd3 _2P6ICV" data-dcnode-id="1166"><div class="_1UiYYY" data-dcnode-id="1171"></div><div class="_1UiYYY" data-dcnode-id="1170"></div><div class="_1UiYYY" data-dcnode-id="1169"></div><div class="_1UiYYY" data-dcnode-id="1168"></div><div class="_1UiYYY" data-dcnode-id="1167"></div></div></label><span class="_1bS_Hq dvui-tooltip" data-dcnode-id="1161" id="tooltip-sevvs6fz1we" style="margin-left:0"><div class="drR4-f" data-dcnode-id="1162"><span class="_36qUej" data-automation-id="review-rating-tooltip-0" data-dcnode-id="1163" data-testid="review-rating-tooltip-0"><span data-dcnode-id="1164" instrument_node="">5.0 out of 5 stars</span></span></div></span></span><strong data-dcnode-id="1158" dir="auto"><span data-dcnode-id="1159" instrument_node="">Sophisticated police procedural, could do without all the melodrama in the subplot</span></strong></div><div class="mlmPSf _3zF9LN" data-dcnode-id="1143"><input class="wgGFDs" data-dcnode-id="1156" id="review-expander-0" type="checkbox"><label class="_1W5VSv" data-dcnode-id="1155" for="review-expander-0"></label><div class="_3qsVvm _1wxob_" data-dcnode-id="1144"><div data-dcnode-id="1145" dir="auto"><span data-dcnode-id="1154" instrument_node="">I start with saying that I enjoyed a show with a strong lead female character very much. She is sensitive, emphatic, intuitive but above all thorough. And she is wearing practical clothes, not to mention shoes. If I see one more female detective wobbling along in high heels in murder scenes, I am going to scream. Her authority comes from her competence and those working with her realize and accept it and respect her for her talent and hard work.</span><br data-dcnode-id="1153"><span data-dcnode-id="1152" instrument_node="">She is also obsessive and pretty much destroying her own life with her uncontrollable need to know her family’s past. Her mother and uncle know everything but don’t tell her the truth “to protect” her, when it is obvious to anybody else that not knowing is worse for her than whatever the truth (or whatever the writers can come up to justify this ridiculous omerta) can be. Honestly, enough of this melodrama.</span><br data-dcnode-id="1151"><span data-dcnode-id="1150" instrument_node="">My other problem is her relationship with her boss. Workplace relationships happen, but if they happen between a young attractive woman and her significantly older boss, that is not right. So many other factors play in the relationship besides attraction in these cases and in this particular case this is especially true. For some reason everybody just seems to think that it is all right.</span><br data-dcnode-id="1149"><span data-dcnode-id="1148" instrument_node="">Interestingly detective Farro’s moral compass works perfectly fine when it comes to others.</span><br data-dcnode-id="1147"><span data-dcnode-id="1146" instrument_node="">The chemistry is especially strong between her and her associate who is in love with her. I hope in the eleventh series they will get together. Or even better: they just dispense with the basic plot line and concentrate on the individual cases. If it worked for Agatha Christie, it could work for other crime series.</span></div></div></div><span class="_1dW6n4" data-dcnode-id="1141"><span data-dcnode-id="1142" instrument_node="">24 people found this helpful</span></span><div class="_1ZRB-9" data-dcnode-id="1135"><button aria-label="Helpful" aria-live="polite" class="_2VnS0E _15Ikr8 _20uSE4 _2X_Irl zfFfQG" data-automation-id="helpful-button-0" data-dcnode-id="1139" data-testid="helpful-button-0" role="button"><span data-dcnode-id="1140" instrument_node="">Helpful</span></button><span class="_28lp9F" data-dcnode-id="1136"><button aria-label="Report abuse" class="_1O7K2I" data-automation-id="report-abuse-link-0" data-dcnode-id="1137" id="reportAbuseTrigger"><span data-dcnode-id="1138" instrument_node="">Report abuse</span></button></span></div></div><div class="_2dVGOh" data-automation-id="review-item-1" data-dcnode-id="1097"><div class="abwJ5F _16AW_S _2LF_6p _1vYcYX" data-dcnode-id="1127"><a aria-label="Customer Profile link" class="_21cmh7" data-automation-id="customer-profile-link-1" data-dcnode-id="1130" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/profile/amzn1.account.AHBSRYRVO76T3TCUZ5A7ZUY2KLOA/ref%3Datv_dp_cp_url"><img alt="" aria-label="Customer Profile link" class="C9h022" data-dcnode-id="1133" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/avatar/default/amzn1.account.AHBSRYRVO76T3TCUZ5A7ZUY2KLOA%3Fmax_width%3D50%26square%3Dtrue&amp;raw"><span class="_1O9NWx" data-dcnode-id="1131"><span data-dcnode-id="1132" instrument_node="">Dslsurfer</span></span></a><span class="_3gvi4K" data-dcnode-id="1128"><span data-dcnode-id="1129" instrument_node="">Reviewed in the United States on December 8, 2019</span></span></div><div class="abwJ5F _16AW_S _2LF_6p _1vYcYX" data-dcnode-id="1112"><span class="_3PfIMz _1I_IFp ghzfef d ass="_2tKs5V" data-dcnode-id="1086"></div><div class="_2tKs5V" data-dcnode-id="1085"></div></div></label><span class="_1bS_Hq dvui-tooltip" data-dcnode-id="1079" id="tooltip-y94h1ere8lh" style="margin-left:0"><div class="drR4-f" data-dcnode-id="1080"><span class="_36qUej" data-automation-id="review-rating-tooltip-2" data-dcnode-id="1081" data-testid="review-rating-tooltip-2"><span data-dcnode-id="1082" instrument_node="">2.0 out of 5 stars</span></span></div></span></span><strong data-dcnode-id="1076" dir="auto"><span data-dcnode-id="1077" instrument_node="">So much wasted time</span></strong></div><div class="mlmPSf _3zF9LN" data-dcnode-id="1057"><input class="wgGFDs" data-dcnode-id="1074" id="review-expander-2" type="checkbox"><label class="_1W5VSv" data-dcnode-id="1073" for="review-expander-2"></label><div class="_3qsVvm _1wxob_" data-dcnode-id="1058"><div data-dcnode-id="1059" dir="auto"><span data-dcnode-id="1072" instrument_node="">Ok, so I got hooked on the first 5 or so episodes and am now viewing Season 2. But! more and more frustrated with the acting and the blood and guts violence-centered plots. Inspector Valeria is a piece of work. I think she’s rather a b^tch, especially her high and mighty attitude towards her more than gracious and caring mother. Truly, the producers are wasting viewers’ time. The whole series could easily be compressed into one season.</span><br data-dcnode-id="1071"><br data-dcnode-id="1070"><span data-dcnode-id="1069" instrument_node="">Plots drag on and on, including the sub-plot of Valeria’s situation with her Mother. The different murder cases in individual episodes always take boring twists and turns — not good writing. Although I’m sticking with it only to get to the end (and frequently fast forwarding) I’ve already figured out who really killed her father.</span><br data-dcnode-id="1068"><br data-dcnode-id="1067"><span data-dcnode-id="1066" instrument_node="">She did, the young Valeria. Here’s my guess:  Some kind of amnesia kicked in from the trauma afterwards, and because her gracious and caring Mother loves her, she took the rap/blame to protect her. And for that heroic deed then served a decade in prison. I figure this will all be revealed in the last episode. Can’t wait to see the expression on Valeria’s smug face.</span><br data-dcnode-id="1065"><br data-dcnode-id="1064"><span data-dcnode-id="1063" instrument_node="">Plus, she dresses like a slob. It’s a wonder the crime division lets her be seen in public.</span><br data-dcnode-id="1062"><br data-dcnode-id="1061"><span data-dcnode-id="1060" instrument_node="">I prefer mysteries that keep me guessing and intrigued right to the end.</span></div></div></div><span class="_1dW6n4" data-dcnode-id="1055"><span data-dcnode-id="1056" instrument_node="">9 people found this helpful</span></span><div class="_1ZRB-9" data-dcnode-id="1049"><button aria-label="Helpful" aria-live="polite" class="_2VnS0E _15Ikr8 _20uSE4 _2X_Irl zfFfQG" data-automation-id="helpful-button-2" data-dcnode-id="1053" data-testid="helpful-button-2" role="button"><span data-dcnode-id="1054" instrument_node="">Helpful</span></button><span class="_28lp9F" data-dcnode-id="1050"><button aria-label="Report abuse" class="_1O7K2I" data-automation-id="report-abuse-link-2" data-dcnode-id="1051" id="reportAbuseTrigger"><span data-dcnode-id="1052" instrument_node="">Report abuse</span></button></span></div></div><div class="_2dVGOh" data-automation-id="review-item-3" data-dcnode-id="1011"><div class="abwJ5F _16AW_S _2LF_6p _1vYcYX" data-dcnode-id="1041"><a aria-label="Customer Profile link" class="_21cmh7" data-automation-id="customer-profile-link-3" data-dcnode-id="1044" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/profile/amzn1.account.AFLKEW6NNPFNVFHHG22RXEEDHCAQ/ref%3Datv_dp_cp_url"><img alt="" aria-label="Customer Profile link" class="C9h022" data-dcnode-id="1047" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/avatar/default/amzn1.account.AFLKEW6NNPFNVFHHG22RXEEDHCAQ%3Fmax_width%3D50%26square%3Dtrue&amp;raw"><span class="_1O9NWx" data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">J. Hume</span></span></a><span class="_3gvi4K" data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">Reviewed in the United States on October 16, 2020</span></span></div><div class="abwJ5F _16AW_S _2LF_6p _1vYcYX" data-dcnode-id="1026"><span class="_3PfIMz _1I_IFp ghzfef dvui-tooltip-container" data-dcnode-id="1029"><label class="_2gl_vG" data-dcnode-id="1034" for="tooltip-nqj29d43ih" tabindex="0"><div class="_1OnCd3 _2P6ICV" data-dcnode-id="1035"><div class="_1UiYYY" data-dcnode-id="1040"></div><div class="_2tKs5V" data-dcnode-id="1039"></div><div class="_2tKs5V" data-dcnode-id="1038"></div><div class="_2tKs5V" data-dcnode-id="1037"></div><div class="_2tKs5V" data-dcnode-id="1036"></div></div></label><span class="_1bS_Hq dvui-tooltip" data-dcnode-id="1030" id="tooltip-nqj29d43ih" style="margin-left:0"><div class="drR4-f" data-dcnode-id="1031"><span class="_36qUej" data-automation-id="review-rating-tooltip-3" data-dcnode-id="1032" data-testid="review-rating-tooltip-3"><span data-dcnode-id="1033" instrument_node="">1.0 out of 5 stars</span></span></div></span></span><strong data-dcnode-id="1027" dir="auto"><span data-dcnode-id="1028" instrument_node="">Thou Shalt Regret Wasting Time On This</span></strong></div><div class="mlmPSf _3zF9LN" data-dcnode-id="1020"><input class="wgGFDs" data-dcnode-id="1025" id="review-expander-3" type="checkbox"><label class="_1W5VSv" data-dcnode-id="1024" for="review-expander-3"></label><div class="_3qsVvm _1wxob_" data-dcnode-id="1021"><div data-dcnode-id="1022" dir="auto"><span data-dcnode-id="1023" instrument_node="">This started out mildly interesting (Season 1) but once the mother came back from prison, things rapidly deteriorated. I made it through Season 2, but just 2 episodes into Season 3, I can’t wait for it to end. The story begins with gorgeous but arrogant Chief Inspector Valeria Ferro sleeping with her boss, magically solving crimes by being able to read people, and hating her mother, who in the opening episodes is in the process of being released a year early after having served 17 years for the murder of Valeria’s father. Although her mother confessed to the crime, Valeria believes (correctly) that she hasn’t provided the full story and is obsessed with finding out what actually happened. That was an interesting idea for a few episodes, but it’s not sustainable for two entire seasons. For that matter, the mother, Lucia Ferro/Maria Grazia, depending on what episode you’re watching, is a cold, unsympathetic character in Seasons 1 and 2, and early in Season 3 she’s revealed to be an absolute narcissistic witch. I found it impossible to believe that any man found her irresistible, because she’s not bright or pretty or funny or empathic or interesting, and add to that she has absolutely no sense of style, dressing like she bought all her clothes at Goodwill in the 80s. Don’t waste your time on this drivel. There are better things to watch on Walter Presents.</span></div></div></div><span class="_1dW6n4" data-dcnode-id="1018"><span data-dcnode-id="1019" instrument_node="">4 people found this helpful</span></span><div class="_1ZRB-9" data-dcnode-id="1012"><button aria-label="Helpful" aria-live="polite" class="_2VnS0E _15Ikr8 _20uSE4 _2X_Irl zfFfQG" data-automation-id="helpful-button-3" data-dcnode-id="1016" data-testid="helpful-button-3" role="button"><span data-dcnode-id="1017" instrument_node="">Helpful</span></button><span class="_28lp9F" data-dcnode-id="1013"><button aria-label="Report abuse" class="_1O7K2I" data-automation-id="report-abuse-link-3" data-dcnode-id="1014" id="reportAbuseTrigger"><span data-dcnode-id="1015" instrument_node="">Report abuse</span></button></span></div></div><div class="_2dVGOh" data-automation-id="review-item-4" data-dcnode-id="974"><div class="abwJ5F _16AW_S _2LF_6p _1vYcYX" data-dcnode-id="1004"><a aria-label="Customer Profile link" class="_21cmh7" data-automation-id="customer-profile-link-4" data-dcnode-id="1007" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/profile/amzn1.account.AHVREARADVKEUSV4CIITWI6IM4CQ/ref%3Datv_dp_cp_url"><img alt="" aria-label="Customer Profile link" class="C9h022" data-dcnode-id="1010" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/avatar/default/amzn1.account.AHVREARADVKEUSV4CIITWI6IM4CQ%3Fmax_width%3D50%26square%3Dtrue&amp;raw"><span class="_1O9NWx" data-dcnode-id="1008"><span data-dcnode-id="1009" instrument_node="">June2015</span></span></a><span class="_3gvi4K" data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">Reviewed in the United States on May 29, 2020</span></span></div><div class="abwJ5F _16AW_S _2LF_6p _1vYcYX" data-dcnode-id="989"><span class="_3PfIMz _1I_IFp ghzfef dvui-tooltip-container" data-dcnode-id="992"><label class="_2gl_vG" data-dcnode-id="997" for="tooltip-g5dj8v2ti36" tabindex="0"><div class="_1OnCd3 _2P6ICV" data-dcnode-id="998"><div class="_1UiYYY" data-dcnode-id="1003"></div><div class="_1UiYYY" data-dcnode-id="1002"></div><div class="_2tKs5V" data-dcnode-id="1001"></div><div class="_2tKs5V" data-dcnode-id="1000"></div><div class="_2tKs5V" data-dcnode-id="999"></div></div></label><span class="_1bS_Hq dvui-tooltip" data-dcnode-id="993" id="tooltip-g5dj8v2ti36" style="margin-left:0"><div class="drR4-f" data-dcnode-id="994"><span class="_36qUej" data-automation-id="review-rating-tooltip-4" data-dcnode-id="995" data-testid="review-rating-tooltip-4"><span data-dcnode-id="996" instrument_node="">2.0 out of 5 stars</span></span></div></span></span><strong data-dcnode-id="990" dir="auto"><span data-dcnode-id="991" instrument_node="">Bitter, vindictive lead character spoils an otherwise interesting drama</span></strong></div><div class="mlmPSf _3zF9LN" data-dcnode-id="983"><input class="wgGFDs" data-dcnode-id="988" id="review-expander-4" type="checkbox"><label class="_1W5VSv" data-dcnode-id="987" for="review-expander-4"></label><div class="_3qsVvm _1wxob_" data-dcnode-id="984"><div data-dcnode-id="985" dir="auto"><span data-dcnode-id="986" instrument_node="">I stuck with this show through two seasons because the crimes and investigations were for the most part interesting and the cinematography was outstanding (both audio and video).  From the first, I had sympathy for our heroine. Her mother spent 17 years in prison for the murder of her father and her brother and sister-in-law went behind her back to file a successful appeal.  It soon became apparent why her brother resorted to such underhanded trickery.  Our heroine is a bitter, vindictive woman with a pretty face who is now obsessed with finding the truth about her father's murder though she apparently had no interest whatsoever while her mother was incarcerated.  She has sex with her boss as it suits her agenda, in order to have a place to sleep after fights with her family or if she wants to question him about her mother's arrest (he was the arresting officer when he was quite young-seventeen years earlier).  She does wear sensible shoes, as one reviewer mentioned, and the same clothes for days at a time.  If you enjoy humor with your noir you won't find it here.  The only time I laughed was when a colleague offered to let our beleaguered miss spend the night at his place so that she could have a proper shower.  She has a high ranking job and doesn't spend her money on her wardrobe or personal hygiene products.  Her colleagues are apparently able to afford homes, yet she prefers to flop at the boss's house, or her uncle's house, a dead girl's hotel room, or the office couch. Why?  Although I would have liked to know who did murder her father, I don't care enough at this point to suffer through two more seasons. A pity.  Otherwise very well done.</span></div></div></div><span class="_1dW6n4" data-dcnode-id="981"><span data-dcnode-id="982" instrument_node="">5 people found this helpful</span></span><div class="_1ZRB-9" data-dcnode-id="975"><button aria-label="Helpful" aria-live="polite" class="_2VnS0E _15Ikr8 _20uSE4 _2X_Irl zfFfQG" data-automation-id="helpful-button-4" data-dcnode-id="979" data-testid="helpful-button-4" role="button"><span data-dcnode-id="980" instrument_node="">Helpful</span></button><span class="_28lp9F" data-dcnode-id="976"><button aria-label="Report abuse" class="_1O7K2I" data-automation-id="report-abuse-link-4" data-dcnode-id="977" id="reportAbuseTrigger"><span data-dcnode-id="978" instrument_node="">Report abuse</span></button></span></div></div><div class="_2dVGOh" data-automation-id="review-item-5" data-dcnode-id="937"><div class="abwJ5F _16AW_S _2LF_6p _1vYcYX" data-dcnode-id="967"><a aria-label="Customer Profile link" class="_21cmh7" data-automation-id="customer-profile-link-5" data-dcnode-id="970" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/profile/amzn1.account.AFIBBBAT3KJMPVFY3FWCIBJE3ZDQ/ref%3Datv_dp_cp_url"><img alt="" aria-label="Customer Profile link" class="C9h022" data-dcnode-id="973" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/avatar/default/amzn1.account.AFIBBBAT3KJMPVFY3FWCIBJE3ZDQ%3Fmax_width%3D50%26square%3Dtrue&amp;raw"><span class="_1O9NWx" data-dcnode-id="971"><span data-dcnode-id="972" instrument_node="">WHL</span></span></a><span class="_3gvi4K" data-dcnode-id="968"><span data-dcnode-id="969" instrument_node="">Reviewed in the United States on March 2, 2021</span></span></div><div class="abwJ5F _16AW_S _2LF_6p _1vYcYX" data-dcnode-id="952"><span class="_3PfIMz _1I_IFp ghzfef dvui-tooltip-container" data-dcnode-id="955"><label class="_2gl_vG" data-dcnode-id="960" for="tooltip-wpnh8w9fc8j" tabindex="0"><div class="_1OnCd3 _2P6ICV" data-dcnode-id="961"><div class="_1UiYYY" data-dcnode-id="966"></div><div class="_2tKs5V" data-dcnode-id="965"></div><div class="_2tKs5V" data-dcnode-id="964"></div><div class="_2tKs5V" data-dcnode-id="963"></div><div class="_2tKs5V" data-dcnode-id="962"></div></div></label><span class="_1bS_Hq dvui-tooltip" data-dcnode-id="956" id="tooltip-wpnh8w9fc8j" style="margin-left:0"><div class="drR4-f" data-dcnode-id="957"><span class="_36qUej" data-automation-id="review-rating-tooltip-5" data-dcnode-id="958" data-testid="review-rating-tooltip-5"><span data-dcnode-id="959" instrument_node="">1.0 out of 5 stars</span></span></div></span></span><strong data-dcnode-id="953" dir="auto"><span data-dcnode-id="954" instrument_node="">Prissy Female Detective Sleepwalks Thru Turin</span></strong></div><div class="mlmPSf _3zF9LN" data-dcnode-id="946"><input class="wgGFDs" data-dcnode-id="951" id="review-expander-5" type="checkbox"><label class="_1W5VSv" data-dcnode-id="950" for="review-expander-5"></label><div class="_3qsVvm _1wxob_" data-dcnode-id="947"><div data-dcnode-id="948" dir="auto"><span data-dcnode-id="949" instrument_node="">How do you screw up a detective series set in "bellissima" Torino?  Watch this show and find out.  The cases in each episode are set into the "frame" of the main detective trying to discover why her mother murdered her father.  That might work, except it plays like a slow-motion soap opera with a lead who is alternatively bitchy, somnambulistic, or just boring.  Like ALL Euro detective shows...the bar has been set very high by Engrenages (Spiral) and Beck.  The team putting on this show need more realistic cases to solve instead of the too-often sexual fetish shocker.  They need to more involve their supporting cast (which is strong, in fact); the art direction needs to ditch the somber grays of the sets and ESPECIALLY the two leads' sweaters (!!!)  One of the reasons Hollywood triumphed over European studios was that they had layers of story editors and profit driven producers who weeded out self-absorbed "auteur" directors and gave the audience a good product.  This production teams needs to stop trying to impress each other and focus on quality. It would also help if nearly every "location" shot wasn't made at the Piazza Vittorio Veneto.  Marone!</span></div></div></div><span class="_1dW6n4" data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">2 people found this helpful</span></span><div class="_1ZRB-9" data-dcnode-id="938"><button aria-label="Helpful" aria-live="polite" class="_2VnS0E _15Ikr8 _20uSE4 _2X_Irl zfFfQG" data-automation-id="helpful-button-5" data-dcnode-id="942" data-testid="helpful-button-5" role="button"><span data-dcnode-id="943" instrument_node="">Helpful</span></button><span class="_28lp9F" data-dcnode-id="939"><button aria-label="Report abuse" class="_1O7K2I" data-automation-id="report-abuse-link-5" data-dcnode-id="940" id="reportAbuseTrigger"><span data-dcnode-id="941" instrument_node="">Report abuse</span></button></span></div></div><div class="_2dVGOh" data-automation-id="review-item-6" data-dcnode-id="900"><div class="abwJ5F _16AW_S _2LF_6p _1vYcYX" data-dcnode-id="930"><a aria-label="Customer Profile link" class="_21cmh7" data-automation-id="customer-profile-link-6" data-dcnode-id="933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/profile/amzn1.account.AGUJFFJLPG2HNPWF2HUAFGTHG4YA/ref%3Datv_dp_cp_url"><img alt="" aria-label="Customer Profile link" class="C9h022" data-dcnode-id="936" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/avatar/default/amzn1.account.AGUJFFJLPG2HNPWF2HUAFGTHG4YA%3Fmax_width%3D50%26square%3Dtrue&amp;raw"><span class="_1O9NWx" data-dcnode-id="934"><span data-dcnode-id="935" instrument_node="">rocco</span></span></a><span class="_3gvi4K" data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">Reviewed in the United States on
