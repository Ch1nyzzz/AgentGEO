 plot were all fantastic.  Unfortunately, they leave it on a cliff hanger.  After 4 years how can you leave the series so undone.  Lombardi makes a deal with the mafia boss to kill Valeria's real father in exchange for the Mafia killing Andrea.  The last scene is Valeria packing heat to go kill Lombardi and you don't finish any of those story lines?  Come on!  Put together a 2 hour series finale and close all the plot lines.</span></div></div></div><span class="_1dW6n4" data-dcnode-id="1124"><span data-dcnode-id="1125" instrument_node="">46 people found this helpful</span></span><div class="_1ZRB-9" data-dcnode-id="1118"><button aria-label="Helpful" aria-live="polite" class="_2VnS0E _15Ikr8 _20uSE4 _2X_Irl zfFfQG" data-automation-id="helpful-button-0" data-dcnode-id="1122" data-testid="helpful-button-0" role="button"><span data-dcnode-id="1123" instrument_node="">Helpful</span></button><span class="_28lp9F" data-dcnode-id="1119"><button aria-label="Report abuse" class="_1O7K2I" data-automation-id="report-abuse-link-0" data-dcnode-id="1120" id="reportAbuseTrigger"><span data-dcnode-id="1121" instrument_node="">Report abuse</span></button></span></div></div><div class="_2dVGOh" data-automation-id="review-item-1" data-dcnode-id="1080"><div class="abwJ5F _16AW_S _2LF_6p _1vYcYX" data-dcnode-id="1110"><a aria-label="Customer Profile link" class="_21cmh7" data-automation-id="customer-profile-link-1" data-dcnode-id="1113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/profile/amzn1.account.AEBUC3KIPIVTAKL5IA2GDNL53ZGQ/ref%3Datv_dp_cp_url"><img alt="" aria-label="Customer Profile link" class="C9h022" data-dcnode-id="1116" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/avatar/default/amzn1.account.AEBUC3KIPIVTAKL5IA2GDNL53ZGQ%3Fmax_width%3D50%26square%3Dtrue&amp;raw"><span class="_1O9NWx" data-dcnode-id="1114"><span data-dcnode-id="1115" instrument_node="">The Anthonys</span></span></a><span class="_3gvi4K" data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node="">Reviewed in the United States on July 6, 2020</span></span></div><div class="abwJ5F _16AW_S _2LF_6p _1vYcYX" data-dcnode-id="1095"><span class="_3PfIMz _1I_IFp ghzfef dvui-tooltip-container" data-dcnode-id="1098"><label class="_2gl_vG" data-dcnode-id="1103" for="tooltip-8v8psqy6zl6" tabindex="0"><div class="_1OnCd3 _2P6ICV" data-dcnode-id="1104"><div class="_1UiYYY" data-dcnode-id="1109"></div><div class="_1UiYYY" data-dcnode-id="1108"></div><div class="_1UiYYY" data-dcnode-id="1107"></div><div class="_1UiYYY" data-dcnode-id="1106"></div><div class="_1UiYYY" data-dcnode-id="1105"></div></div></label><span class="_1bS_Hq dvui-tooltip" data-dcnode-id="1099" id="tooltip-8v8psqy6zl6" style="margin-left:0"><div class="drR4-f" data-dcnode-id="1100"><span class="_36qUej" data-automation-id="review-rating-tooltip-1" data-dcnode-id="1101" data-testid="review-rating-tooltip-1"><span data-dcnode-id="1102" instrument_node="">5.0 out of 5 stars</span></span></div></span></span><strong data-dcnode-id="1096" dir="auto"><span data-dcnode-id="1097" instrument_node="">Absolutely superb</span></strong></div><div class="mlmPSf _3zF9LN" data-dcnode-id="1089"><input class="wgGFDs" data-dcnode-id="1094" id="review-expander-1" type="checkbox"><label class="_1W5VSv" data-dcnode-id="1093" for="review-expander-1"></label><div class="_3qsVvm _1wxob_" data-dcnode-id="1090"><div data-dcnode-id="1091" dir="auto"><span data-dcnode-id="1092" instrument_node="">I rarely write reviews because I'm generally not that impressed with anything I see.  But this I consider one of the best police dramas I have seen in a very, very long time.  Perhaps since the first season of NYPD Blue.  Although I am American and do not speak Italian, the writing is deep and touching, the characters are very real and deeply human, and the casting seemed perfect to me in every episode thus far.  I am in the middle of Season 3 and I see continued character development and a wonderful ensemble still doing their best work, with a beautiful musical score in the background perfectly accenting the drama. Difficult subjects continue to be handled caringly and thoughtfully, and the acting never ceases to be deep and real.  I will be very disappointed when I get to the end of this series, because quite simply, I know nothing else will come close after this.  So I'm watching it slowly, like drinking a fine wine.</span></div></div></div><span class="_1dW6n4" data-dcnode-id="1087"><span data-dcnode-id="1088" instrument_node="">13 people found this helpful</span></span><div class="_1ZRB-9" data-dcnode-id="1081"><button aria-label="Helpful" aria-live="polite" class="_2VnS0E _15Ikr8 _20uSE4 _2X_Irl zfFfQG" data-automation-id="helpful-button-1" data-dcnode-id="1085" data-testid="helpful-button-1" role="button"><span data-dcnode-id="1086" instrument_node="">Helpful</span></button><span class="_28lp9F" data-dcnode-id="1082"><button aria-label="Report abuse" class="_1O7K2I" data-automation-id="report-abuse-link-1" data-dcnode-id="1083" id="reportAbuseTrigger"><span data-dcnode-id="1084" instrument_node="">Report abuse</span></button></span></div></div><div class="_2dVGOh" data-automation-id="review-item-2" data-dcnode-id="1043"><div class="abwJ5F _16AW_S _2LF_6p _1vYcYX" data-dcnode-id="1073"><a aria-label="Customer Profile link" class="_21cmh7" data-automation-id="customer-profile-link-2" data-dcnode-id="1076" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/profile/amzn1.account.AEYK7SCC3D3WT2UJ6BDDA3OWTGWQ/ref%3Datv_dp_cp_url"><img alt="" aria-label="Customer Profile link" class="C9h022" data-dcnode-id="1079" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/avatar/default/amzn1.account.AEYK7SCC3D3WT2UJ6BDDA3OWTGWQ%3Fmax_width%3D50%26square%3Dtrue&amp;raw"><span class="_1O9NWx" data-dcnode-id="1077"><span data-dcnode-id="1078" instrument_node="">Erda</span></span></a><span class="_3gvi4K" data-dcnode-id="1074"><span data-dcnode-id="1075" instrument_node="">Reviewed in the United States on August 11, 2020</span></span></div><div class="abwJ5F _16AW_S _2LF_6p _1vYcYX" data-dcnode-id="1058"><span class="_3PfIMz _1I_IFp ghzfef dvui-tooltip-container" data-dcnode-id="1061"><label class="_2gl_vG" data-dcnode-id="1066" for="tooltip-52mf5wazix8" tabindex="0"><div class="_1OnCd3 _2P6ICV" data-dcnode-id="1067"><div class="_1UiYYY" data-dcnode-id="1072"></div><div class="_1UiYYY" data-dcnode-id="1071"></div><div class="_1UiYYY" data-dcnode-id="1070"></div><div class="_1UiYYY" data-dcnode-id="1069"></div><div class="_1UiYYY" data-dcnode-id="1068"></div></div></label><span class="_1bS_Hq dvui-tooltip" data-dcnode-id="1062" id="tooltip-52mf5wazix8" style="margin-left:0"><div class="drR4-f" data-dcnode-id="1063"><span class="_36qUej" data-automation-id="review-rating-tooltip-2" data-dcnode-id="1064" data-testid="review-rating-tooltip-2"><span data-dcnode-id="1065" instrument_node="">5.0 out of 5 stars</span></span></div></span></span><strong data-dcnode-id="1059" dir="auto"><span data-dcnode-id="1060" instrument_node="">Rich in Character Studies and the Flaws That Make Us Human</span></strong></div><div class="mlmPSf _3zF9LN" data-dcnode-id="1052"><input class="wgGFDs" data-dcnode-id="1057" id="review-expander-2" type="checkbox"><label class="_1W5VSv" data-dcnode-id="1056" for="review-expander-2"></label><div class="_3qsVvm _1wxob_" data-dcnode-id="1053"><div data-dcnode-id="1054" dir="auto"><span data-dcnode-id="1055" instrument_node="">I found this series irresistibly addictive, so different from the shoot-'em-up plots and thin character development of US cop shows.  Valeria, the central character, has evolved from lost to bitter to empathetic and willing to love - to the extent this is possible given that she spends every waking moment solving gruesome murders.  I am just in the middle of season 4, but so far the writers and director have resisted the temptation to make her colleagues corrupt, drug-ridden sociopaths, as is so often the case in an American series.  While some of the plots are a bit of a stretch, what makes them work are the character studies of both the good guys and the bad guys - we not only find out WHO did it, we explore, along with Valeria and her sidekicks, the nuances and consequences of WHY.  Sometimes this moves slowly, but it's worth paying close attention and savoring the details.</span></div></div></div><span class="_1dW6n4" data-dcnode-id="1050"><span data-dcnode-id="1051" instrument_node="">8 people found this helpful</span></span><div class="_1ZRB-9" data-dcnode-id="1044"><button aria-label="Helpful" aria-live="polite" class="_2VnS0E _15Ikr8 _20uSE4 _2X_Irl zfFfQG" data-automation-id="helpful-button-2" data-dcnode-id="1048" data-testid="helpful-button-2" role="button"><span data-dcnode-id="1049" instrument_node="">Helpful</span></button><span class="_28lp9F" data-dcnode-id="1045"><button aria-label="Report abuse" class="_1O7K2I" data-automation-id="report-abuse-link-2" data-dcnode-id="1046" id="reportAbuseTrigger"><span data-dcnode-id="1047" instrument_node="">Report abuse</span></button></span></div></div><div class="_2dVGOh" data-automation-id="review-item-3" data-dcnode-id="1006"><div class="abwJ5F _16AW_S _2LF_6p _1vYcYX" data-dcnode-id="1036"><a aria-label="Customer Profile link" class="_21cmh7" data-automation-id="customer-profile-link-3" data-dcnode-id="1039" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/profile/amzn1.account.AFQVKJ55BELHJ663T6CKXUALXVWA/ref%3Datv_dp_cp_url"><img alt="" aria-label="Customer Profile link" class="C9h022" data-dcnode-id="1042" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/avatar/default/amzn1.account.AFQVKJ55BELHJ663T6CKXUALXVWA%3Fmax_width%3D50%26square%3Dtru anks at her age seems shockingly improbable, which makes the stories improbable, but not so much as the majority of confessions.  valeria sits in a gloomy room across the table from the perp. valeria oftern has no actual proof that could lead to a conviction, much less the need for a confession, but as soon as she says, "hey, you done it, now cofess," inevitably they do!  maybe this is an Italian thing, what with the church and going to confession, but thiseagerness to confess  is a real weakness of the show both in itself and also because the writers couldn't manage to organize the plot so that valeria and we have the proof.  and, frankly, sometimes there is no basis whatsoever to see how valeria reached her conclusion.  the music is good, and camera angles interesting.</span></div></div></div><span class="_1dW6n4" data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">7 people found this helpful</span></span><div class="_1ZRB-9" data-dcnode-id="1007"><button aria-label="Helpful" aria-live="polite" class="_2VnS0E _15Ikr8 _20uSE4 _2X_Irl zfFfQG" data-automation-id="helpful-button-3" data-dcnode-id="1011" data-testid="helpful-button-3" role="button"><span data-dcnode-id="1012" instrument_node="">Helpful</span></button><span class="_28lp9F" data-dcnode-id="1008"><button aria-label="Report abuse" class="_1O7K2I" data-automation-id="report-abuse-link-3" data-dcnode-id="1009" id="reportAbuseTrigger"><span data-dcnode-id="1010" instrument_node="">Report abuse</span></button></span></div></div><div class="_2dVGOh" data-automation-id="review-item-4" data-dcnode-id="969"><div class="abwJ5F _16AW_S _2LF_6p _1vYcYX" data-dcnode-id="999"><a aria-label="Customer Profile link" class="_21cmh7" data-automation-id="customer-profile-link-4" data-dcnode-id="1002" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/profile/amzn1.account.AEZIBCFMKC3ZTMS34KPEVHEZLPXQ/ref%3Datv_dp_cp_url"><img alt="" aria-label="Customer Profile link id="916" data-testid="review-rating-tooltip-6"><span data-dcnode-id="917" instrument_node="">5.0 out of 5 stars</span></span></div></span></span><strong data-dcnode-id="911" dir="auto"><span data-dcnode-id="912" instrument_node="">Exceptional</span></strong></div><div class="mlmPSf _3zF9LN" data-dcnode-id="904"><input class="wgGFDs" data-dcnode-id="909" id="review-expander-6" type="checkbox"><label class="_1W5VSv" data-dcnode-id="908" for="review-expander-6"></label><div class="_3qsVvm _1wxob_" data-dcnode-id="905"><div data-dcnode-id="906" dir="auto"><span data-dcnode-id="907" instrument_node="">If you love crime series, this one is not to be missed. It is extraordinary. Miriam Leone plays 'Detective Valeria Ferro,' a woman in her 30's who is a brilliant investigator, with a deeply troubled emotional/family life. The arc story is--did her mother murder her father? In Season 3 Valeria has a well-deserved breakdown. Each episode solves a different crime apart from the arc story. It is photographed in sepia tones: browns, ochres and grays, which creates shadows and moodiness. Tension is always bubbling underneath the scenes. The writing/stories are excellent and all the actors are wonderful. Highly recommend. Set in Turin, Italy. In Italian, with English subtitles.</span></div></div></div><span class="_1dW6n4" data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">8 people found this helpful</span></span><div class="_1ZRB-9" data-dcnode-id="896"><button aria-label="Helpful" aria-live="polite" class="_2VnS0E _15Ikr8 _20uSE4 _2X_Irl zfFfQG" data-automation-id="helpful-button-6" data-dcnode-id="900" data-testid="helpful-button-6" role="button"><span data-dcnode-id="901" instrument_node="">Helpful</span></button><span class="_28lp9F" data-dcnode-id="897"><button aria-label="Report abuse" class="_1O7K2I" data-automation-id="report-abuse-link-6" data-dcnode-id="898" id="reportAbuseTrigger"><span data-dcnode-id="899" instrument_node="">Report abuse</span></button endetta!</span></strong></div><div class="mlmPSf _3zF9LN" data-dcnode-id="867"><input class="wgGFDs" data-dcnode-id="872" id="review-expander-7" type="checkbox"><label class="_1W5VSv" data-dcnode-id="871" for="review-expander-7"></label><div class="_3qsVvm _1wxob_" data-dcnode-id="868"><div data-dcnode-id="869" dir="auto"><span data-dcnode-id="870" instrument_node="">Loved the Clint Eastwood ending...or so one imagines. This is a sterling series, loved just about everything about it except the extremely dark scenes that hurt my eyes, and the lack of humor. I do appreciate a certain amount of wit with my detective/murder series.This was like a great meal with a key ingredient missing: in short, humor, to lighten the load. However: I binged all twelve episodes and adored all of the characters inhabited by brilliant actors, as well as the writing, direction, etc. Do I want more of it? I think I'm good. Four seasons, twelve fascinating episodes each will suffice. I might even go back and watch some again, there was so much subtlety, nuance and yes mystery in the stories that invite another viewing. Maybe this crew will make a future series that lives up to this one, but with a pinch of leggera.</span></div></div></div><span class="_1dW6n4" data-dcnode-id="865"><span data-dcnode-id="866" instrument_node="">5 people found this helpful</span></span><div class="_1ZRB-9" data-dcnode-id="859"><button aria-label="Helpful" aria-live="polite" class="_2VnS0E _15Ikr8 _20uSE4 _2X_Irl zfFfQG" data-automation-id="helpful-button-7" data-dcnode-id="863" data-testid="helpful-button-7" role="button"><span data-dcnode-id="864" instrument_node="">Helpful</span></button><span class="_28lp9F" data-dcnode-id="860"><button aria-label="Report abuse" class="_1O7K2I" data-automation-id="report-abuse-link-7" data-dcnode-id="861" id="reportAbuseTrigger"><span data-dcnode-id="862" instrument_node="">Report abuse</span></button></span></div></div><a class="_1NNx6V TtG3yR" data-automation-id="see-all-
