nteresting angles that, again, do not rely on quick cuts from just one actor speaking to another, but offer interesting views and  lingers enough on faces to allow the viewer to almost "see"beyond the spoken words. I do hope this series continues to Season 3 and I will definitely watch it!</span></div></div></div><span class="_1dW6n4" data-dcnode-id="1124"><span data-dcnode-id="1125" instrument_node="">20 people found this helpful</span></span><div class="_1ZRB-9" data-dcnode-id="1118"><button aria-label="Helpful" aria-live="polite" class="_2VnS0E _15Ikr8 _20uSE4 _2X_Irl zfFfQG" data-automation-id="helpful-button-0" data-dcnode-id="1122" data-testid="helpful-button-0" role="button"><span data-dcnode-id="1123" instrument_node="">Helpful</span></button><span class="_28lp9F" data-dcnode-id="1119"><button aria-label="Report abuse" class="_1O7K2I" data-automation-id="report-abuse-link-0" data-dcnode-id="1120" id="reportAbuseTrigger"><span data-dcnode-id="1121" instrument_node="">Report abuse</span></button></span></div></div><div class="_2dVGOh" data-automation-id="review-item-1" data-dcnode-id="1080"><div class="abwJ5F _16AW_S _2LF_6p _1vYcYX" data-dcnode-id="1110"><a aria-label="Customer Profile link" class="_21cmh7" data-automation-id="customer-profile-link-1" data-dcnode-id="1113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/profile/amzn1.account.AEWRCA6LJDH5O7QA6EIS5H4EKCHA/ref%3Datv_dp_cp_url"><img alt="" aria-label="Customer Profile link" class="C9h022" data-dcnode-id="1116" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/avatar/default/amzn1.account.AEWRCA6LJDH5O7QA6EIS5H4EKCHA%3Fmax_width%3D50%26square%3Dtrue&amp;raw"><span class="_1O9NWx" data-dcnode-id="1114"><span data-dcnode-id="1115" instrument_node="">Archdzi9r</span></span></a><span class="_3gvi4K" data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node="">Reviewed in the United States on Ma  a young male beats a man badly enough to be hospitalized yet he is not arrested much less sentenced.  The best feature to me was that the scenery was beautiful.  The writing and story lines are average but for the most part the acting is slightly above average.</span></div></div></div><span class="_1dW6n4" data-dcnode-id="1050"><span data-dcnode-id="1051" instrument_node="">8 people found this helpful</span></span><div class="_1ZRB-9" data-dcnode-id="1044"><button aria-label="Helpful" aria-live="polite" class="_2VnS0E _15Ikr8 _20uSE4 _2X_Irl zfFfQG" data-automation-id="helpful-button-2" data-dcnode-id="1048" data-testid="helpful-button-2" role="button"><span data-dcnode-id="1049" instrument_node="">Helpful</span></button><span class="_28lp9F" data-dcnode-id="1045"><button aria-label="Report abuse" class="_1O7K2I" data-automation-id="report-abuse-link-2" data-dcnode-id="1046" id="reportAbuseTrigger"><span data-dcnode-id="1047" instrument_node="">Report abuse</span></button></span></div></div><div class="_2dVGOh" data-automation-id="review-item-3" data-dcnode-id="1006"><div class="abwJ5F _16AW_S _2LF_6p _1vYcYX" data-dcnode-id="1036"><a aria-label="Customer Profile link" class="_21cmh7" data-automation-id="customer-profile-link-3" data-dcnode-id="1039" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/profile/amzn1.account.AHPTXKI5SEHZOVXQTKVLEECZ6KTQ/ref%3Datv_dp_cp_url"><img alt="" aria-label="Customer Profile link" class="C9h022" data-dcnode-id="1042" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/avatar/default/amzn1.account.AHPTXKI5SEHZOVXQTKVLEECZ6KTQ%3Fmax_width%3D50%26square%3Dtrue&amp;raw"><span class="_1O9NWx" data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node="">B. Schneier</span></span></a><span class="_3gvi4K" data-dcnode-id="1037"><span data-dcnode-id="1038" instrument_node="">Reviewed in the United States on February 26, 2019</span></spa
