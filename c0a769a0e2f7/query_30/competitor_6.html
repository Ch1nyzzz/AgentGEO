f being able to simulate an entire economy at high resolution faster than in real-time. Program trading run amok in financial markets has caused global economic crises before. Now, accelerate that risk by orders of magnitude. Again, too much opportunity to gain extreme wealth and power for bad actors to ignore. The threat/opportunity of QC already fuels a global arms race in cryptography and privacy. Ethics barely has a chair in the hallway – let alone at the table in the national war rooms. That said, if a cost and scale breakthrough allows for the widespread democratization of QC, then the playing field is leveled. What if a $30 Raspberry Pi/Q gave every device a quantum-supremacy-level capability?”</span></p><p data-dcnode-id="648" style="padding-left: 30px"><strong data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">Charlie Kaufman</span></strong><span data-dcnode-id="649" instrument_node="">, a security architect with Dell EMC, said, “Quantum computing may have an important influence on cryptography and in solving problems in physics and chemistry, and it might be used to accelerate AI if it is developed to solve those other problems, but AI doesn’t need it. AI will benefit from computation becoming cheaper and more parallel. In terms of hardware advances, the most important are likely to be in GPUs, FPGAs [field-programmable gate arrays] and customized CPUs.”</span></p><p data-dcnode-id="644"><strong data-dcnode-id="646"><span data-dcnode-id="647" instrument_node="">Dan S. Wallach</span></strong><span data-dcnode-id="645" instrument_node="">, a professor in the systems group at Rice University’s Department of Computer Science, said, “Quantum computing promises speedups over classical computing in a very small number of circumstances. Probably the only such task of note today is that quantum computers have the potential to break cryptographic algorithms in widespread use today. Academic cryptographers are already hard at work on ‘post-quantum’ cryptography, which works today but is significantly less efficient than classical cryptosystems. Hopefully, by the time quantum computers are operational, we’ll have better substitutes ready. It is, of course, entirely possible that quantum computers will be able to someday accelerate the process of training machine learning models or other tasks that today are exceptionally computationally intensive. That would be fantastic, but it really has nothing to do with ethical vs. unethical AI. It’s just about spending less electricity and time to compute the same solution.”</span></p><p data-dcnode-id="640" style="padding-left: 30px"><strong data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">John Smart</span></strong><span data-dcnode-id="641" instrument_node="">, foresight educator, scholar, author, consultant and speaker, observed, “Quantum computing should be thought of like fusion. A high-cost, complex technology easily captured, slowed down and restricted by plutocrats. There’s nothing commodity about it. Human brains don’t use quantum computing. The real coming disruption is in neuro-inspired, self-improving AI. Quantum computing could definitely assist in building more brain-inspired systems, via simulation of neurodynamics. Simulation of biological and chemical processes to improve medicine, find new materials, etc., is the killer app.”</span></p><p data-dcnode-id="636"><strong data-dcnode-id="638"><span data-dcnode-id="639" instrument_node="">Glenn Edens</span></strong><span data-dcnode-id="637" instrument_node="">, professor at Thunderbird School of Global Management, Arizona State University, previously a vice president at PARC, observed, “Quantum computing has a long way to go, and we barely understand it, how to ‘program’ it and how to build it at cost-effective scale. My point of view is that we will just be crossing those thresholds in 10 years’ time, maybe eight years. I’d be surprised (pleasantly so) if we got to commercial scale QC in five years. Meanwhile, AI and ML are well on the way to commercialization at scale, as well as custom silicon SoCs (system on chip) targeted to provide high-speed performance for AI and ML algorithms. This custom silicon will have the most impact in the next five to 10 years, as well as the continued progress of memory systems, CPUs and GPUs. Quantum computing will ‘miss’ this first wave of mass commercialization of AI and ML and thus will not be a significant factor. Why? It is possible that QC might have an impact in the 10- to 20-year timeframe, but it’s way too early to predict with any confidence (we simply have too much work ahead). Will humans still be in the loop? That is as much a policy decision as a pragmatic decision – we are rapidly getting to the point where synthetically created algorithms (be it AI, CA, etc.) will be very hard for humans to understand; there are a few examples that suggest we may already be to that point. Can we even create testing and validation algorithms for ML (much less AI) is a key question, and how will we verify these systems?”</span></p><p data-dcnode-id="632" style="padding-left: 30px"><strong data-dcnode-id="634"><span data-dcnode-id="635" instrument_node="">Michael Richardson</span></strong><span data-dcnode-id="633" instrument_node="">, open-source consulting engineer, responded, “It is very unlikely that a practical quantum computer will become available before 2030 that will be cheap enough to apply to AI. Will a big company and/or government manage to build a QC with enough qubits to factor current 2048-bit RSA keys easily? Maybe. At a cost that breaks the internet? Not sure. At a cost where it can be applied to AI? No. Will ML chips able to simulate thousands of neurons become very cheap? Yes, and the Moore’s Law for them will be very different because the power usage will be far more distributed. This will open many opportunities, but none of them are in the AI of science fiction.”</span></p><p data-dcnode-id="628"><strong data-dcnode-id="630"><span data-dcnode-id="631" instrument_node="">Neil Davies</span></strong><span data-dcnode-id="629" instrument_node="">, co-founder of Predictable Network Solutions and a pioneer of the committee that oversaw the UK’s initial networking developments, commented, “Quantum computing only helps on algorithms where the underlying relationships are reversible – it has the potential to reduce the elapsed time for a ‘result’ to appear – it is not a magical portal to a realm where things that were intrinsically unanswerable suddenly become answerable. Where is the underlying theoretical basis for the evaluation of ethics as a function of a set numerical values that underpin the process? Without such a framework accelerating the time to get a ‘result’ only results in creating more potential hazards. Why? because to exploit quantum computation means deliberately not using a whole swath of techniques, hence reducing the diversity (thus negating any self-correcting assurance that may have been latent).”</span></p><p data-dcnode-id="624" style="padding-left: 30px"><strong data-dcnode-id="626"><span data-dcnode-id="627" instrument_node="">Kenneth A. Grady</span></strong><span data-dcnode-id="625" instrument_node="">, adjunct professor at Michigan State University College of Law and editor of “The Algorithmic Society” on Medium, said, “Despite the many impressive advances of the entities pursuing quantum computing, it is a complicated, expensive and difficult-to-scale technology at this time. The initial uses will be high-end, such as military and financial, and key applications such as pharmaceutical development. Widespread application of quantum computing to enforce ethical AI will face many challenges that quantum computing alone cannot solve (e.g., what is ‘ethical,’ when should it be enforced). Those pursuing quantum computing fall into more than one category. That is, for every entity who sees its ‘ethical’ potentials, we must assume there is any entity who sees its ‘unethical’ potentials. As with prior technology races, the participants are not limited to those who share one ideology.”</span></p><p data-dcnode-id="620"><strong data-dcnode-id="622"><span data-dcnode-id="623" instrument_node="">Chris Savage</span></strong><span data-dcnode-id="621" instrument_node="">, a leading expert in legal and regulatory issues based in Washington, D.C., noted, “AI has something of an architecture problem: It is highly computationally intensive (think Alexa or Siri), to such a degree that it is difficult to do onsite. Instead, robust connections to a powerful central processing capability (in the cloud) is necessary to make it work, which requires robust high-speed connectivity to the end points, which raises problems of latency (too much time getting the bits between the endpoint and the processing) for many applications. Quantum computing may make the centralized/cloud-based computations more rapid and thorough, but it will have no effect on latency. And if we can’t get enough old-style Boolean silicon-based computing power out to the edges, which we seem unable to do, the prospect of getting enough quantum computing resources to the edges is bleak. As to ethics, the problem with building ethical AI isn’t that we don’t have enough computational power to do it right (an issue that quantum computing could, in theory, address), it’s that we don’t know what ‘doing it right’ means in the first place.”</span></p><p data-dcnode-id="616" style="padding-left: 30px"><strong data-dcnode-id="618"><span data-dcnode-id="619" instrument_node="">Carol Smith</span></strong><span data-dcnode-id="617" instrument_node="">, a senior research scientist in human-machine interaction at Carnegie Mellon University’s Software Engineering Institute, said, “Quantum computing will likely evolve to improve computing power, but people are what will make AI systems ethical … AI systems created by humans will be no better at ethics than we are – and, in many cases, much worse, as they will struggle to see the most important aspects. The humanity of each individual and the context in which significant decisions must always be considered.”</span></p><p data-dcnode-id="612"><strong data-dcnode-id="614"><span data-dcnode-id="615" instrument_node="">Kevin T. Leicht</span></strong><span data-dcnode-id="613" instrument_node="">, professor and head of the department of sociology at the University of Illinois-Urbana-Champaign, commented, “Relying on one technology to fix the potential defects in another technology suffers from the same basic problem – technologies don’t determine ethics. People, cultures and institutions do. If those people, cultures and institutions are strong, then the potential of getting more ethical outcomes is more likely than not. We simply don’t have that. In fact, relying on quantum computing to fix anything sounds an awful lot like expecting free markets to fix the problems created by free markets. This homeopathic solution has not worked with markets, so it is difficult to see how it will work with computing. So, let’s take an elementary example that may be more applicable to the English-speaking world than elsewhere. The inventor of an AI program seeks to make as much money as possible in the shortest amount of time, because that is the prevailing institutional and economic model they have been exposed to. They develop their AI/quantum computing platform to make ‘ethical decisions,’ but those decisions happen in a context where the institutional environment where the inventor is rewards the behaviors associated with making as much money as possible in shortest amount of time. I ask you, given the initial constraint (‘The primary goal is to be a billionaire’), all of the ethical decisions programmed into the AI/quantum computing application will be oriented toward that primary goal and make ethical decisions around that.”</span></p><p data-dcnode-id="608" style="padding-left: 30px"><strong data-dcnode-id="610"><span data-dcnode-id="611" instrument_node="">Paul Jones</span></strong><span data-dcnode-id="609" instrument_node="">, professor emeritus of information science at the University of North Carolina, Chapel Hill, observed, “While engineers are excited about quantum computing, it only answers part of what is needed to improve AI challenges. Massive amounts of data, massive amounts of computing power (not limited to quantum as a source), reflexive software design, heuristic environments, highly connected devices, sensors (or other inputs) in real time are all needed. Quantum computing is only part of the solution. More important will be insight as to how to evaluate AI’s overall impact and learning.”</span></p><p data-dcnode-id="604"><strong data-dcnode-id="606"><span data-dcnode-id="607" instrument_node="">Glynn Rogers</span></strong><span data-dcnode-id="605" instrument_node="">, retired, previously senior principal engineer and a founding member at the CSIRO Centre for Complex Systems Science, said, “Computer power is not the fundamental issue. What we mean by AI, what expectations we have of it and what constraints we need to place on it are the fundamental issues. It may be that implementing AI systems that satisfy these requirements will need the level of computing power that quantum computing provides if it is the full understanding of the implications of quantum mechanics that will provide insights into the nature of intelligence, not quantum computing technology itself.”</span></p><p data-dcnode-id="600" style="padding-left: 30px"><strong data-dcnode-id="602"><span data-dcnode-id="603" instrument_node="">A telecommunications and internet industry economist, architect and consultant with over 25 years of experience</span></strong><span data-dcnode-id="601" instrument_node=""> responded, “Quantum computing will develop, yes, but will it benefit ethical AI systems? AI systems will, once fully unleashed, have their own biology. I do not think we understand their complex system interaction effects any more than we understand pre-AI economics. All of our models are at best partial.”</span></p><p data-dcnode-id="596"><strong data-dcnode-id="598"><span data-dcnode-id="599" instrument_node="">An ethics expert who served as an advisor on the UK’s report on “AI in Health Care”</span></strong><span data-dcnode-id="597" instrument_node=""> responded, “Quantum computing will take an already barely tractable problem (AI explainability) and make it completely intractable. Quantum algorithms will be even less susceptible of description and verification by external parties, in particular laypeople, than current statistical algorithms.”</span></p><p data-dcnode-id="592" style="padding-left: 30px"><strong data-dcnode-id="594"><span data-dcnode-id="595" instrument_node="">Gregory Shannon</span></strong><span data-dcnode-id="593" instrument_node="">, chief scientist at the CERT software engineering institute at Carnegie Mellon University, wrote, “I don’t see the connection between quantum computing and AI ethics. They seem very orthogonal. QC in 2030 might make building AI models/systems faster/more efficient, but that doesn’t impact ethics per se. If anything, QC could make AI systems less ethical because it will still take significant financial resources in 2030 for QC. So, a QC-generated model might be able to ‘hide’ features/decisions that non-QC capable users/inspectors would not see/observe due to their limited computational resources.”</span></p><p data-dcnode-id="588"><strong data-dcnode-id="590"><span data-dcnode-id="591" instrument_node="">Micah Altman</span></strong><span data-dcnode-id="589" instrument_node="">, a social and information scientist at MIT, said, “Quantum computing will not be of great help in building ethical AI in the next decade, since the most fundamental technical challenge in building ethical systems is in our basic theoretical understanding of how to encode within algorithms and/or teach ethical rules to learning systems. Although QC is certain to advance, and likely to advance substantially, such advances are [also] likely to apply to specific problem domains that are not closely related such as cryptography and secure communication, solving difficult search and optimization problems. Even if QC advances in a revolutionary way, for example by (despite daunting theoretical and practical barriers) exponentially speeding up computing broadly or even to the extent of catalyzing the development of self-aware general artificial intelligence – this will serve only to make the problem of developing ethical AI more urgent.”</span></p><p data-dcnode-id="584" style="padding-left: 30px"><strong data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">A distinguished professor of computer science and engineering</span></strong><span data-dcnode-id="585" instrument_node=""> said, “Quantum computing might be helpful in some limited utilitarian ethical evaluations (i.e., pre-evaluating the set of potential outcomes to identify serious failings), but I don’t see most ethical frameworks benefiting from the explore/recognize model of quantum computing.”</span></p><p data-dcnode-id="580"><strong data-dcnode-id="582"><span data-dcnode-id="583" instrument_node="">Michael G. Dyer</span></strong><span data-dcnode-id="581" instrument_node="">, a professor emeritus of computer science at UCLA expert in Natural Language Processing, responded, “What quantum computing offers is an incredible speed-up for certain tasks. It is possible that some task (e.g., hunting for certain patterns in large datasets) would be a subfunction in a larger classical reasoning/planning system with moral-based reasoning/planning capabilities. If we are talking simply about classification tasks (which artificial neural networks, such as ‘deep’ neural networks, already perform) then, once scaled up, a quantum computer could aid in classification tasks. Some classification tasks might be deemed ‘moral’ in the sense that [for example] people would get classified in various ways, affecting their career outcomes. I do not think quantum computing will ‘assist in building ethical AI.’”</span></p><p data-dcnode-id="576" style="padding-left: 30px"><strong data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">An anonymous respondent</span></strong><span data-dcnode-id="577" instrument_node=""> observed, “I expect that quantum computing will evolve to assist in building AI. The sheer increase in computation capacity will make certain problems tractable that simple wouldn’t be otherwise. However, I don’t know that these improvements will be particularly biased toward ethical AI. I suppose there is some hope that greater computing capacity (and hence lower cost) will allow for the inclusion of factors in models that otherwise would have been considered marginal, making it easier in some sense to do the right thing.”</span></p><p data-dcnode-id="569"><strong data-dcnode-id="574"><span data-dcnode-id="575" instrument_node="">John Harlow</span></strong><span data-dcnode-id="573" instrument_node="">, smart cities research specialist at the Engagement Lab @ Emerson College, noted, “We don’t really have quantum computing now, or ethical AI, so the likeliest scenario is that they don’t mature into being and interact in mutually reinforcing ways. Maybe I’m in the wrong circles, but I don’t see momentum toward ethical AI anywhere. I see momentum toward effective AI, and effective AI relying on biased datasets. I see momentum toward banning facial recognition technologies in the U.S. and some GDPR movement in Europe about data. I don’t see ethicists embedded with the scientists developing AI, and even if there were, how exactly will we decide what is ethical at scale? I mean, ethicists have differences of opinion. Clearly, individuals have different ethics. How would it be possible to attach a consensus ‘ethics’ to AI in general? The predictive policing model is awful: Pay us to run your data through a racist black box. Ethics in AI is expansive, though (</span><a data-dcnode-id="571" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//anatomyof.ai/"><span data-dcnode-id="572" instrument_node="">https://anatomyof.ai/</span></a><span data-dcnode-id="570" instrument_node="">). Where are we locating AI ethics that we could separate it from the stack of ethical crises we have already? Is it ethical for Facebook workers to watch traumatic content to moderate the site? Is it ethical for slaves to mine the materials that make up the devices and servers needed for AI? Is it ethical for AI to manifest in languages, places and applications that have historically been white supremacist?”</span></p><p data-dcnode-id="565" style="padding-left: 30px"><strong data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">John L. King</span></strong><span data-dcnode-id="566" instrument_node="">, a professor at the University of Michigan School of Information, commented, “There could be earth-shattering, unforeseen breakthroughs. They have happened before. But they are rare. It is likely that the effect of technological advances will be held back by the sea anchor of human behavior (e.g., individual choices, folkways, mores, social conventions, rules, regulations, laws).”</span></p><p data-dcnode-id="561"><strong data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">Douglas Rushkoff</span></strong><span data-dcnode-id="562" instrument_node="">, well-known media theorist, author and professor of media at City University of New York, wrote, “I am thinking, or at least hoping, that quantum computing is further off than we imagine. We are just not ready for it as a civilization. I don’t know if humans will be ‘in the loop’ because quantum isn’t really a cybernetic feedback loop like what we think of as computers today. I don’t know how much humans are in the loop even now, between capitalism and digital. Quantum would take us out of the equation.”</span></p><h1 data-dcnode-id="559"><span data-dcnode-id="560" instrument_node="">About this canvassing of experts</span></h1><p data-dcnode-id="551"><span data-dcnode-id="558" instrument_node="">This report is the second of two reports issued in 2021 that share results from the 12th “</span><a data-dcnode-id="556" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/topic/internet-technology/emerging-technology/future-of-the-internet/"><span data-dcnode-id="557" instrument_node="">Future of the Internet</span></a><span data-dcnode-id="555" instrument_node="">” canvassing by the Pew Research Center and Elon University’s Imagining the Internet Center. The </span><a data-dcnode-id="553" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.elon.edu/u/imagining/surveys/xii-2021/post-covid-new-normal-2025/"><span data-dcnode-id="554" instrument_node="">first report examined the “new normal”</span></a><span data-dcnode-id="552" instrument_node=""> that could exist in 2025 in the wake of the outbreak of the global pandemic and other crises in 2020.</span></p><p data-dcnode-id="549"><span data-dcnode-id="550" instrument_node="">For this report, experts were asked to respond to several questions about the future of ethical artificial intelligence via a web-based instrument that was open to them from June 30-July 27. In all, 602 people responded after invitations were emailed to more than 10,000 experts and members of the interested public. The results published here come from a nonscientific, nonrandom, opt-in sample and are not projectable to any other population other than the individuals expressing their points of view in this sample.</span></p><p data-dcnode-id="547"><span data-dcnode-id="548" instrument_node="">Respondent answers were solicited though the following prompts:</span></p><p data-dcnode-id="543" style="padding-left: 30px"><strong data-dcnode-id="545"><span data-dcnode-id="546" instrument_node="">Application of AI Ethics by 2030:</span></strong><span data-dcnode-id="544" instrument_node=""> In recent years, there have been scores of convenings and even more papers generated proposing ethical frameworks for the application of artificial intelligence (AI). They cover a host of issues including transparency, justice and fairness, privacy, freedom and human autonomy, beneficence and non-maleficence, freedom, trust, sustainability and dignity. Our questions here seek your predictions about the possibilities for such efforts.</span></p><p data-dcnode-id="539" style="padding-left: 30px"><strong data-dcnode-id="541"><span data-dcnode-id="542" instrument_node="">The question on the future of ethical AI:</span></strong><span data-dcnode-id="540" instrument_node=""> By 2030, will most of the AI systems being used by organizations of all sorts employ ethical principles focused primarily on the public good?</span></p><p data-dcnode-id="534" style="padding-left: 30px"><span data-dcnode-id="538" instrument_node="">–</span><strong data-dcnode-id="536"><span data-dcnode-id="537" instrument_node="">YES</span></strong><span data-dcnode-id="535" instrument_node="">, ethical principles focused primarily on the public good WILL be employed in most AI systems&nbsp;by 2030</span></p><p data-dcnode-id="529" style="padding-left: 30px"><span data-dcnode-id="533" instrument_node="">–</span><strong data-dcnode-id="531"><span data-dcnode-id="532" instrument_node="">NO</span></strong><span data-dcnode-id="530" instrument_node="">, ethical principles focused primarily on the public good WILL NOT be employed in most AI systems by 2030</span></p><p data-dcnode-id="525" style="padding-left: 30px"><strong data-dcnode-id="527"><span data-dcnode-id="528" instrument_node="">Follow-up question on ethical AI</span></strong><span data-dcnode-id="526" instrument_node="">, seeking a written elaboration on the previous question: Will AI mostly be used in ethical or questionable ways in the next decade? Why? What gives you the most hope? What worries you the most? How do you see AI applications making a difference in the lives of most people? As you look at the global competition over AI systems, what issues concern you or excite you?</span></p><p data-dcnode-id="523"><span data-dcnode-id="524" instrument_node="">Results for the quantitative question regarding how widely deployed ethical AI systems will be in 2030:</span></p><ul data-dcnode-id="508"><li data-dcnode-id="516"><strong data-dcnode-id="521"><span data-dcnode-id="522" instrument_node="">32%</span></strong><span data-dcnode-id="520" instrument_node=""> said </span><strong data-dcnode-id="518"><span data-dcnode-id="519" instrument_node="">YES</span></strong><span data-dcnode-id="517" instrument_node="">, ethical principles focused primarily on the public good WILL be employed in most AI systems&nbsp;by 2030</span></li><li data-dcnode-id="509"><strong data-dcnode-id="514"><span data-dcnode-id="515" instrument_node="">68%</span></strong><span data-dcnode-id="513" instrument_node=""> said </span><strong data-dcnode-id="511"><span data-dcnode-id="512" instrument_node="">NO</span></strong><span data-dcnode-id="510" instrument_node="">, ethical principles focused primarily on the public good WILL NOT be employed in most AI systems by 2030</span></li></ul><p data-dcnode-id="503"><span data-dcnode-id="507" instrument_node="">The web-based instrument was first sent directly to an international set of experts (primarily U.S.-based) identified and accumulated by Pew Research and Elon University during previous “Future of the Internet” studies, as well as those identified in </span><a data-dcnode-id="505" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.elon.edu/u/imagining/time-capsule/early-90s/"><span data-dcnode-id="506" instrument_node="">a 2003 study of people who made predictions about the likely future of the internet between 1990 and 1995</span></a><span data-dcnode-id="504" instrument_node="">. Additional experts with proven interest in digital health, artificial intelligence ethics and other aspects of these particular research topics were also added to the list. We invited a large number of professionals and policy people from government bodies and technology businesses, think tanks and interest networks (for instance, those that include professionals and academics in law, ethics, medicine, political science, economics, social and civic innovation, sociology, psychology and communications); globally located people working with communications technologies in government positions; technologists and innovators; top universities’ engineering/computer science, political science, sociology/anthropology and business/entrepreneurship faculty, graduate students and postgraduate researchers; plus some who are active in civil society organizations that focus on digital life; and those affiliated with newly emerging nonprofits and other research units examining the impacts of digital life.</span></p><p data-dcnode-id="501"><span data-dcnode-id="502" instrument_node="">Among those invited were researchers, developers and business leaders from leading global organizations, including Oxford, Cambridge, MIT, Stanford and Carnegie Mellon universities; Google, Microsoft, Akamai, IBM and Cloudflare; leaders active in the advancement of and innovation in global communications networks and technology policy, such as the Internet Engineering Task Force (IETF), Internet Corporation for Assigned Names and Numbers (ICANN), Internet Society (ISOC), International Telecommunications Union (ITU), Association of Internet Researchers (AoIR), and the Organization for Economic Cooperation and Development (OECD). Invitees were encouraged to share the survey link with others they believed would have an interest in participating, thus there may have been somewhat of a “snowball” effect as some invitees invited others to weigh in.</span></p><p data-dcnode-id="499"><span data-dcnode-id="500" instrument_node="">The respondents’ remarks reflect their personal positions and are not the positions of their employers; the descriptions of their leadership roles help identify their background and the locus of their expertise. Some responses are lightly edited for style and readability.</span></p><p data-dcnode-id="497"><span data-dcnode-id="498" instrument_node="">A large number of the expert respondents elected to remain anonymous. Because people’s level of expertise is an important element of their participation in the conversation, anonymous respondents were given the opportunity to share a description of their internet expertise or background, and this was noted, when available, in this report.</span></p><p data-dcnode-id="495"><span data-dcnode-id="496" instrument_node="">In this canvassing, 65% of respondents answered at least one of the demographic questions. Seventy percent of these 591 people identified as male and 30% as female. Some 77% identified themselves as being based in North America, while 23% are located in other parts of the world. When asked about their “primary area of interest,” 37% identified themselves as professor/teacher; 14% as research scientists; 13% as futurists or consultants; 9% as technology developers or administrators; 7% as advocates or activist users; 8% as entrepreneurs or business leaders; 3% as pioneers or originators; and 10% specified their primary area of interest as “other.”</span></p><p data-dcnode-id="493"><span data-dcnode-id="494" instrument_node="">Following is a list noting a selection of key respondents who took credit for their responses on at least one of the overall topics in this canvassing. Workplaces are included to show expertise; they reflect the respondents’ job titles and locations at the time of this canvassing.</span></p><p data-dcnode-id="171"><strong data-dcnode-id="491"><span data-dcnode-id="492" instrument_node="">Sam Adams</span></strong><span data-dcnode-id="490" instrument_node="">, 24-year veteran of IBM now senior research scientist in artificial intelligence for RTI International; </span><strong data-dcnode-id="488"><span data-dcnode-id="489" instrument_node="">Micah Altman</span></strong><span data-dcnode-id="487" instrument_node="">, a social and information scientist at MIT; </span><strong data-dcnode-id="485"><span data-dcnode-id="486" instrument_node="">Robert D. Atkinson</span></strong><span data-dcnode-id="484" instrument_node="">, president of the Information Technology and Innovation Foundation; </span><strong data-dcnode-id="482"><span data-dcnode-id="483" instrument_node="">David Barnhizer</span></strong><span data-dcnode-id="481" instrument_node="">, professor of law emeritus and co-author of “The Artificial Intelligence Contagion: Can Democracy Withstand the Imminent Transformation of Work, Wealth and the Social Order?”; </span><strong data-dcnode-id="479"><span data-dcnode-id="480" instrument_node="">Marjory S. Blumenthal</span></strong><span data-dcnode-id="478" instrument_node="">, director of the science, technology and policy program at RAND Corporation; </span><strong data-dcnode-id="476"><span data-dcnode-id="477" instrument_node="">Gary A. Bolles</span></strong><span data-dcnode-id="475" instrument_node="">, chair for the future of work at Singularity University; </span><strong data-dcnode-id="473"><span data-dcnode-id="474" instrument_node="">danah boyd</span></strong><span data-dcnode-id="472" instrument_node="">, principal researcher, Microsoft Research, and founder of Data and Society; </span><strong data-dcnode-id="470"><span data-dcnode-id="471" instrument_node="">Stowe Boyd</span></strong><span data-dcnode-id="469" instrument_node="">, consulting futurist expert in technological evolution and the future of work; </span><strong data-dcnode-id="467"><span data-dcnode-id="468" instrument_node="">Henry E. Brady</span></strong><span data-dcnode-id="466" instrument_node="">, dean of the Goldman School of Public Policy at the University of California, Berkeley; </span><strong data-dcnode-id="464"><span data-dcnode-id="465" instrument_node="">Tim Bray</span></strong><span data-dcnode-id="463" instrument_node="">, technology leader who has worked for Amazon, Google and Sun Microsystems; </span><strong data-dcnode-id="461"><span data-dcnode-id="462" instrument_node="">David Brin</span></strong><span data-dcnode-id="460" instrument_node="">, physicist, futures thinker and author of the science fiction novels “Earth” and “Existence”; </span><strong data-dcnode-id="458"><span data-dcnode-id="459" instrument_node="">Nigel Cameron</span></strong><span data-dcnode-id="457" instrument_node="">, president emeritus, Center for Policy on Emerging Technologies; </span><strong data-dcnode-id="455"><span data-dcnode-id="456" instrument_node="">Kathleen M. Carley</span></strong><span data-dcnode-id="454" instrument_node="">, director, Center for Computational Analysis of Social and Organizational Systems, Carnegie Mellon University; </span><strong data-dcnode-id="452"><span data-dcnode-id="453" instrument_node="">Jamais Cascio</span></strong><span data-dcnode-id="451" instrument_node="">, distinguished fellow at the Institute for the Future; </span><strong data-dcnode-id="449"><span data-dcnode-id="450" instrument_node="">Vint Cerf</span></strong><span data-dcnode-id="448" instrument_node="">, Internet Hall of Fame member and vice president and chief internet evangelist at Google; </span><strong data-dcnode-id="446"><span data-dcnode-id="447" instrument_node="">Barry Chudakov</span></strong><span data-dcnode-id="445" instrument_node="">, founder and principal at Sertain Research; Adam Clayton Powell III, senior fellow, USC Annenberg Center on Communication Leadership and Policy; </span><strong data-dcnode-id="443"><span data-dcnode-id="444" instrument_node="">Christina J. Colclough</span></strong><span data-dcnode-id="442" instrument_node="">, an expert on the future of work and the politics of technology and ethics in AI; </span><strong data-dcnode-id="440"><span data-dcnode-id="441" instrument_node="">Susan Crawford</span></strong><span data-dcnode-id="439" instrument_node="">, a professor at Harvard Law School and former special assistant in the Obama White House for science, technology and innovation policy; </span><strong data-dcnode-id="437"><span data-dcnode-id="438" instrument_node="">Kenneth Cukier</span></strong><span data-dcnode-id="436" instrument_node="">, senior editor at The Economist and coauthor of “Big Data”; </span><strong data-dcnode-id="434"><span data-dcnode-id="435" instrument_node="">Neil Davies</span></strong><span data-dcnode-id="433" instrument_node="">, co-founder of Predictable Network Solutions and a pioneer of the committee that oversaw the UK’s initial networking developments; </span><strong data-dcnode-id="431"><span data-dcnode-id="432" instrument_node="">Rosalie Day</span></strong><span data-dcnode-id="430" instrument_node="">, policy leader and consultancy owner specializing in system approaches to data ethics, compliance and trust; </span><strong data-dcnode-id="428"><span data-dcnode-id="429" instrument_node="">Abigail De Kosnik</span></strong><span data-dcnode-id="427" instrument_node="">, director of the Center for New Media, University of California, Berkeley; </span><strong data-dcnode-id="425"><span data-dcnode-id="426" instrument_node="">Amali De Silva-Mitchell</span></strong><span data-dcnode-id="424" instrument_node="">, futurist and consultant participating in global internet governance processes; </span><strong data-dcnode-id="422"><span data-dcnode-id="423" instrument_node="">Jeanne Dietsch</span></strong><span data-dcnode-id="421" instrument_node="">, New Hampshire senator and former CEO of MobileRobots Inc.; </span><strong data-dcnode-id="419"><span data-dcnode-id="420" instrument_node="">Stephen Downes</span></strong><span data-dcnode-id="418" instrument_node="">, senior research officer for digital technologies, National Research Council of Canada; </span><strong data-dcnode-id="416"><span data-dcnode-id="417" instrument_node="">Bill Dutton</span></strong><span data-dcnode-id="415" instrument_node="">, professor of media and information policy at Michigan State University, former director of the Oxford Internet Institute; </span><strong data-dcnode-id="413"><span data-dcnode-id="414" instrument_node="">Esther Dyson</span></strong><span data-dcnode-id="412" instrument_node="">, internet pioneer, journalist, entrepreneur and executive founder of Way to Wellville; </span><strong data-dcnode-id="410"><span data-dcnode-id="411" instrument_node="">Glenn Edens</span></strong><span data-dcnode-id="409" instrument_node="">, professor at Thunderbird School of Global Management, Arizona State University, previously a vice president at PARC; </span><strong data-dcnode-id="407"><span data-dcnode-id="408" instrument_node="">June Anne English-Luec</span></strong><span data-dcnode-id="406" instrument_node="">k, professor of anthropology at San Jose State University and a distinguished fellow at the Institute for the Future; </span><strong data-dcnode-id="404"><span data-dcnode-id="405" instrument_node="">Susan Etlinger</span></strong><span data-dcnode-id="403" instrument_node="">, industry analyst for Altimeter Group; </span><strong data-dcnode-id="401"><span data-dcnode-id="402" instrument_node="">Daniel Farber</span></strong><span data-dcnode-id="400" instrument_node="">, author, historian and professor of law at the University of California, Berkeley; </span><strong data-dcnode-id="398"><span data-dcnode-id="399" instrument_node="">Marcel Fafchamps</span></strong><span data-dcnode-id="397" instrument_node="">, professor of economics and senior fellow at the Center on Democracy, Development and the Rule of Law at Stanford University; </span><strong data-dcnode-id="395"><span data-dcnode-id="396" instrument_node="">Seth Finkelstein</span></strong><span data-dcnode-id="394" instrument_node="">, consulting programmer and Electronic Frontier Foundation Pioneer Award winner; </span><strong data-dcnode-id="392"><span data-dcnode-id="393" instrument_node="">Rob Frieden</span></strong><span data-dcnode-id="391" instrument_node="">, professor of telecommunications law at Penn State, previously worked with Motorola and held senior U.S. policy positions at the FCC and National Telecommunications and Information Administration; </span><strong data-dcnode-id="389"><span data-dcnode-id="390" instrument_node="">Edward A. Friedman</span></strong><span data-dcnode-id="388" instrument_node="">, professor emeritus of technology management at Stevens Institute of Technology; </span><strong data-dcnode-id="386"><span data-dcnode-id="387" instrument_node="">Jerome C. Glenn</span></strong><span data-dcnode-id="385" instrument_node="">, co-founder and CEO of the futures-research organization The Millennium Project; </span><strong data-dcnode-id="383"><span data-dcnode-id="384" instrument_node="">Mike Godwin</span></strong><span data-dcnode-id="382" instrument_node="">, former general counsel for the Wikimedia Foundation and author of Godwin’s Law; </span><strong data-dcnode-id="380"><span data-dcnode-id="381" instrument_node="">Kenneth Grady</span></strong><span data-dcnode-id="379" instrument_node="">, futurist, founding author of The Algorithmic Society blog; </span><strong data-dcnode-id="377"><span data-dcnode-id="378" instrument_node="">Erhardt Graeff</span></strong><span data-dcnode-id="376" instrument_node="">, researcher expert in the design and use of technology for civic and political engagement, Olin College of Engineering; </span><strong data-dcnode-id="374"><span data-dcnode-id="375" instrument_node="">Benjamin Grosof</span></strong><span data-dcnode-id="373" instrument_node="">, chief scientist at Kyndi, a Silicon Valley AI startup; </span><strong data-dcnode-id="371"><span data-dcnode-id="372" instrument_node="">Glenn Grossman</span></strong><span data-dcnode-id="370" instrument_node="">, a consultant of banking analytics at FICO; </span><strong data-dcnode-id="368"><span data-dcnode-id="369" instrument_node="">Wendy M. Grossman</span></strong><span data-dcnode-id="367" instrument_node="">, a UK-based science writer, author of “net.wars” and founder of the magazine The Skeptic; </span><strong data-dcnode-id="365"><span data-dcnode-id="366" instrument_node="">Jonathan Grudin</span></strong><span data-dcnode-id="364" instrument_node="">, principal researcher, Microsoft; </span><strong data-dcnode-id="362"><span data-dcnode-id="363" instrument_node="">John Harlow</span></strong><span data-dcnode-id="361" instrument_node="">, smart-city research specialist at the Engagement Lab at Emerson College; </span><strong data-dcnode-id="359"><span data-dcnode-id="360" instrument_node="">Brian Harvey</span></strong><span data-dcnode-id="358" instrument_node="">, emeritus professor of computer science at the University of California, Berkeley; </span><strong data-dcnode-id="356"><span data-dcnode-id="357" instrument_node="">Su Sonia Herring</span></strong><span data-dcnode-id="355" instrument_node="">, a Turkish-American internet policy researcher with Global Internet Policy Digital Watch; </span><strong data-dcnode-id="353"><span data-dcnode-id="354" instrument_node="">Mirielle Hildebrandt</span></strong><span data-dcnode-id="352" instrument_node="">, expert in cultural anthropology and the law and editor of “Law, Human Agency and Autonomic Computing”; </span><strong data-dcnode-id="350"><span data-dcnode-id="351" instrument_node="">Gus Hosein</span></strong><span data-dcnode-id="349" instrument_node="">, executive director of Privacy International; </span><strong data-dcnode-id="347"><span data-dcnode-id="348" instrument_node="">Stephan G. Humer</span></strong><span data-dcnode-id="346" instrument_node="">, lecturer expert in digital life at Hochschule Fresenius University of Applied Sciences in Berlin; </span><strong data-dcnode-id="344"><span data-dcnode-id="345" instrument_node="">Alan Inouye</span></strong><span data-dcnode-id="343" instrument_node="">, senior director for public policy and government, American Library Association; </span><strong data-dcnode-id="341"><span data-dcnode-id="342" instrument_node="">Shel Israel</span></strong><span data-dcnode-id="340" instrument_node="">, Forbes columnist and author of many books on disruptive technologies; </span><strong data-dcnode-id="338"><span data-dcnode-id="339" instrument_node="">Maggie Jackson</span></strong><span data-dcnode-id="337" instrument_node="">, former Boston Globe columnist and author of “Distracted: Reclaiming Our Focus in a World of Lost Attention”; </span><strong data-dcnode-id="335"><span data-dcnode-id="336" instrument_node="">Jeff Jarvis</span></strong><span data-dcnode-id="334" instrument_node="">, director, Tow-Knight Center, City University of New York; </span><strong data-dcnode-id="332"><span data-dcnode-id="333" instrument_node="">Jeff Johnson</span></strong><span data-dcnode-id="331" instrument_node="">, professor of computer science, University of San Francisco, previously worked at Xerox, HP Labs and Sun Microsystems; </span><strong data-dcnode-id="329"><span data-dcnode-id="330" instrument_node="">Paul Jones</span></strong><span data-dcnode-id="328" instrument_node="">, professor emeritus of information science at the University of North Carolina, Chapel Hill; </span><strong data-dcnode-id="326"><span data-dcnode-id="327" instrument_node="">Anthony Judge</span></strong><span data-dcnode-id="325" instrument_node="">, editor of the Encyclopedia of World Problems and Human Potential; </span><strong data-dcnode-id="323"><span data-dcnode-id="324" instrument_node="">David Karger</span></strong><span data-dcnode-id="322" instrument_node="">, professor at MIT’s Computer Science and Artificial Intelligence Laboratory; </span><strong data-dcnode-id="3
