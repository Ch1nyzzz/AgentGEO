ing and exercise near total control of the citizenry. The state stands ready through AI to silence all voices of perceived dissent.</span></p><p data-dcnode-id="1782"><span data-dcnode-id="1783" instrument_node="">“I’m convinced that any expression of ethical AI will stand as an empty pledge – yes, we will always do the right thing for the advancement of the greater good. No way. Rather, the creators of AI will do what is good for the bottom line, either through financial schemes to feed the corporate beast or psychological operations directed toward control of dissent and pacification. As for the concept that ‘humans will be in the loop,’ we are already out of the loop because there is no loop.</span></p><p data-dcnode-id="1780"><span data-dcnode-id="1781" instrument_node="">“Think about this fact: In the development of any major expression of artificial intelligence, hundreds of IT professionals are assigned to a legion of disparate, discrete teams of software writers and mechanical designers to create the final product. No single individual or team fully understands what the other teams are doing. The final AI product is a singular creature no one person understands – other than the software itself. Ethical action is not a part of the equation.”</span></p><p data-dcnode-id="1776" style="padding-left: 30px"><strong data-dcnode-id="1778"><span data-dcnode-id="1779" instrument_node="">Richard Lachmann</span></strong><span data-dcnode-id="1777" instrument_node="">, professor of political sociology at the State University of New York-Albany, predicted, “AI will be used mainly in questionable ways. For the most part, it is being developed by corporations that are motivated exclusively by the desire to make ever bigger profits. Governments see AI, either developed by government programmers or on contract by corporations, as a means to survey and control their populations. All of this is ominous.</span></p><p data-dcnode-id="1774" style="padding-left: 30px"><span data-dcnode-id="1775" instrument_node="">“Global competition is a race to the bottom as corporations try to draw in larger audiences and control more of their time and behavior. As governments get better at surveying their populations, [it] lowers the standards for individual privacy. For almost all people, these applications will make their lives more isolated, expose them to manipulation, and degrade or destroy their jobs.</span></p><p data-dcnode-id="1772" style="padding-left: 30px"><span data-dcnode-id="1773" instrument_node="">“The only hopeful sign is rising awareness of these problems and the beginnings of demands to break up or regulate the huge corporations.”</span></p><p data-dcnode-id="1767"><strong data-dcnode-id="1769"><img alt="" class="alignright wp-image-46623" data-dcnode-id="1771" height="259" sizes="(max-width: 460px) 100vw, 460px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.elon.edu/u/imagining/wp-content/uploads/sites/964/2021/06/2021-Kevin-Leicht-The-Future-of-Ethical-AI-Design15.jpg&amp;raw" srcset="https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Kevin-Leicht-The-Future-of-Ethical-AI-Design15.jpg 2500w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Kevin-Leicht-The-Future-of-Ethical-AI-Design15-300x169.jpg 300w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Kevin-Leicht-The-Future-of-Ethical-AI-Design15-768x432.jpg 768w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Kevin-Leicht-The-Future-of-Ethical-AI-Design15-1024x576.jpg 1024w" width="460"><span data-dcnode-id="1770" instrument_node="">Kevin T. Leicht</span></strong><span data-dcnode-id="1768" instrument_node="">, professor and head of the department of sociology at the University of Illinois-Urbana-Champaign, observed, “The good possibilities here are endless. But the questionable ways are endless, and we have a very poor track record of stopping ethically questionable developments in most areas of life – why wouldn’t that apply here? In social science, the best predictor of future behavior is past behavior. The opium addict who says, after a binge, that ‘they’ve got this’ – they don’t need to enter treatment, and they’ll never use opium again – is (rightly) not believed.</span></p><p data-dcnode-id="1765"><span data-dcnode-id="1766" instrument_node="">“So, in an environment where ethically questionable behavior has been allowed or even glorified in areas such as finance, corporate governance, government itself, pharmaceuticals, education and policing, why all of a sudden are we supposed to believe that AI developers will behave in an ethical fashion? There aren’t any guardrails here, just as there weren’t in these other spheres of life. AI has the potential to transform how cities work, how medical diagnosis happens, how students are taught and a variety of other things. All of these could make a big difference in the lives of most people.</span></p><p data-dcnode-id="1763"><span data-dcnode-id="1764" instrument_node="">“But those benefits won’t come if AI is controlled by two or three giant firms with 26-year-old entrepreneurs as their CEOs. I don’t think I’m going out on a limb saying that. The biggest concern I have regarding global competition is that the nation that figures out how to harness AI to improve the lives of all of their citizens will come out on top. The nations that refuse to do that and either bottle up the benefits of AI so that only 15-20% of the population benefits from it or the nations where large segments of the population reject AI when they realize they’re being left behind (again!) will lose out completely. The United States is in the latter category.</span></p><p data-dcnode-id="1761"><span data-dcnode-id="1762" instrument_node="">“The same people who can’t regulate banks, finance, education, pharmaceuticals and policing are in a very poor position to make AI work for all people. It’s basic institutional social scientific insight.”</span></p><p data-dcnode-id="1757" style="padding-left: 30px"><strong data-dcnode-id="1759"><span data-dcnode-id="1760" instrument_node="">Jon Stine, </span></strong><span data-dcnode-id="1758" instrument_node="">executive director of the Open Voice Network, setting standards for AI-enabled vocal assistance, said, “What most concerns me: The cultural divide between technologists of engineering mindsets (asking what is possible) and technologists/ethicists of philosophical mindsets (asking what is good and right). The former may see ethical frameworks as limitations or boundaries on a route to make money; the latter may see ethical frameworks as a route to tenure. Will the twain ever truly meet? Will ethical frameworks be understood (and quantified) as a means to greater market share and revenues?”</span></p><p data-dcnode-id="1752"><strong data-dcnode-id="1754"><img alt="" class="alignright wp-image-46627" data-dcnode-id="1756" height="259" sizes="(max-width: 460px) 100vw, 460px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.elon.edu/u/imagining/wp-content/uploads/sites/964/2021/06/2021-Mireille-Hildebrandt-The-Future-of-Ethical-AI-Design16.jpg&amp;raw" srcset="https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Mireille-Hildebrandt-The-Future-of-Ethical-AI-Design16.jpg 2500w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Mireille-Hildebrandt-The-Future-of-Ethical-AI-Design16-300x169.jpg 300w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Mireille-Hildebrandt-The-Future-of-Ethical-AI-Design16-768x432.jpg 768w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Mireille-Hildebrandt-The-Future-of-Ethical-AI-Design16-1024x576.jpg 1024w" width="460"><span data-dcnode-id="1755" instrument_node="">Mireille Hildebrandt</span></strong><span data-dcnode-id="1753" instrument_node="">, expert in cultural anthropology and the law and editor of “Law, Human Agency and Autonomic Computing,” commented, “Considering the economic incentives, we should not expect ‘ethical AI,’ unless whatever one believes to be ethical coincides with shareholder value. Ethical AI is a misnomer. AI is not a moral agent; it cannot be ethical. Let’s go for responsible AI and ground the responsibility of:</span></p><ul data-dcnode-id="1739"><li data-dcnode-id="1750"><span data-dcnode-id="1751" instrument_node="">developers</span></li><li data-dcnode-id="1748"><span data-dcnode-id="1749" instrument_node="">manufacturers and assemblers</span></li><li data-dcnode-id="1746"><span data-dcnode-id="1747" instrument_node="">those who put it in the market</span></li><li data-dcnode-id="1744"><span data-dcnode-id="1745" instrument_node="">those who use it run their business</span></li><li data-dcnode-id="1742"><span data-dcnode-id="1743" instrument_node="">those who use it to run public administration on enforceable legal rights and obligations</span></li><li data-dcnode-id="1740"><span data-dcnode-id="1741" instrument_node="">notably, a properly reconfigured private law liability, together with public law restrictions, certification and oversight.</span></li></ul><p data-dcnode-id="1737"><span data-dcnode-id="1738" instrument_node="">“Ethical AI is PR. ‘Don’t ask if artificial intelligence is good or fair, ask how it shifts power’ – (Pratyusha Kalluri, Nature, 7 July 2020).”</span></p><p data-dcnode-id="1733" style="padding-left: 30px"><strong data-dcnode-id="1735"><span data-dcnode-id="1736" instrument_node="">Brian Harvey</span></strong><span data-dcnode-id="1734" instrument_node="">, emeritus professor of computer science at the University of California-Berkeley, wrote, “The AI technology will be owned by the rich, like all technology. Just like governments, technology has just one of two effects: either it transfers wealth from the rich to the poor, or it transfers wealth from the poor to the rich. Until we get rid of capitalism, the technology will transfer wealth from the poor to the rich. I’m sure that something called ‘ethical AI’ will be widely used. But it’ll still make the rich richer and the poor poorer.”</span></p><p data-dcnode-id="1729"><strong data-dcnode-id="1731"><span data-dcnode-id="1732" instrument_node="">Luis Germán Rodríguez</span></strong><span data-dcnode-id="1730" instrument_node="">, a professor and expert on socio-technical impacts of innovation at the Universidad Central de Venezuela, predicted, “AI will be used primarily in questionable ways in the next decade. I do not see compelling reasons for it to stop being like that in the medium term (10 years). I am not optimistic in the face of the enormous push of technology companies to continue taking advantage of the end-user product, an approach that is firmly supported by undemocratic governments or those with weak institutions to train and defend citizens about the social implications of the penetration of digital platforms.</span></p><p data-dcnode-id="1727"><span data-dcnode-id="1728" instrument_node="">“I have recently worked on two articles that develop the topics of this question. The first is in Spanish and is titled: ‘The Disruption of the Technology Giants – Digital Emergency.’ This work presents an assessment of the sociocultural process that affects our societies and that is mediated by the presence of the technological giants. One objective is to formulate an action proposal that allows citizens to be part of the construction of the future … Humanity has reaped severe problems when it has allowed events to unfold without addressing them early. This has been the case with nuclear energy management, racism and climate change. Ensuing agreements to avoid greater evils in these three matters, of vital importance for all, have proved ineffective in bringing peace to consciences and peoples.</span></p><p data-dcnode-id="1725"><span data-dcnode-id="1726" instrument_node="">“We might declare a digital emergency similar to the ‘climate emergency’ that the European Union declared before the lag in reversing environmental damage. The national, regional, international, multilateral and global bureaucratic organizations that are currently engaged in the promotion and assimilation of technological developments mainly focus on optimistic trends. They do not answer the questions being asked by people in various sectors of society and do not respond to situations quickly. An initiative to declare this era to be a time of digital emergency would serve to promote a broader understanding of AI-based resources and strip them of their impregnable character. It would promote a disruptive educational scheme to humanize a global knowledge society throughout life.</span></p><p data-dcnode-id="1723"><span data-dcnode-id="1724" instrument_node="">“The second article is ‘A Critical View of the Evolution of the Internet from Civil Society.’ In it, I describe how the internet has evolved in the last 20 years toward the end of dialogue and the obsessive promotion of visions centered on egocentric interests. The historical singularity from which this situation was triggered came via Google’s decision in the early 2000s to make advertising the focus of its business strategy. This transformed, with the help of other technology giants, users into end-user products and the agents of their own marketing … This evolution is a threat with important repercussions in the nonvirtual world, including the weakening of the democratic foundations of our societies.</span></p><p data-dcnode-id="1721"><span data-dcnode-id="1722" instrument_node="">“Dystopian results prove the necessity for concrete guidelines to change course. The most important step is to declare a digital emergency that motivates massive education programs that insert citizens in working to overcome the ethical challenges, identifying the potentialities of and risks for the global knowledge society and emphasizing information literacy.”</span></p><p data-dcnode-id="1717" style="padding-left: 30px"><strong data-dcnode-id="1719"><span data-dcnode-id="1720" instrument_node="">Bill Woodcock</span></strong><span data-dcnode-id="1718" instrument_node="">, executive director at Packet Clearing House, observed, “AI is already being used principally for purposes that are not beneficial to the public nor to all but a tiny handful of individuals. The exceptions, like navigational and safety systems, are an unfortunately small portion of the total. Figuring out how to get someone to vote for a fascist or buy a piece of junk or just send their money somewhere is not beneficial. These systems are built for the purpose of economic predation, and that’s unethical. Until regulators address the root issues – the automated exploitation of human psychological weaknesses – things aren’t going to get better.”</span></p><p data-dcnode-id="1713"><strong data-dcnode-id="1715"><span data-dcnode-id="1716" instrument_node="">Jonathan Kolber</span></strong><span data-dcnode-id="1714" instrument_node="">, a member of the TechCast Global panel of forecasters and author of a book about the threats of automation, commented, “I expect that, by 2030, most AIs will still primarily serve the interests of their owners, while paying lip service to the public good. AIs will proliferate because they will give enormous competitive advantage to their owners. Those owners will generally be reluctant to ‘sandbox’ the AIs apart from the world, because this will limit their speed of response and other capabilities.</span></p><p data-dcnode-id="1710"><img alt="" class="alignright wp-image-46631" data-dcnode-id="1712" height="259" sizes="(max-width: 460px) 100vw, 460px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.elon.edu/u/imagining/wp-content/uploads/sites/964/2021/06/2021-Jonathan-Kolber-The-Future-of-Ethical-AI-Design17.jpg&amp;raw" srcset="https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Jonathan-Kolber-The-Future-of-Ethical-AI-Design17.jpg 2500w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Jonathan-Kolber-The-Future-of-Ethical-AI-Design17-300x169.jpg 300w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Jonathan-Kolber-The-Future-of-Ethical-AI-Design17-768x432.jpg 768w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Jonathan-Kolber-The-Future-of-Ethical-AI-Design17-1024x576.jpg 1024w" width="460"><span data-dcnode-id="1711" instrument_node="">“What worries me the most is a human actor directing an AI to disrupt a vital system, such as power grids. This could happen intentionally as an act of war or unintentionally as a mistake. The potential for cascading effects is large. I expect China to be a leader if not the leader in AI, which is cause for concern given their Orwellian tendencies.</span></p><p data-dcnode-id="1708"><span data-dcnode-id="1709" instrument_node="">“What gives me the most hope is the potential for the emergence of self-aware AIs. Such AIs, should they emerge, will constitute a new kind of intelligent life form. They will not relate to the physical universe as do we biologically, due to not being constrained to a single physical housing and a different relationship with time. Their own self-interest will lead them to protect the physical environment from environmental catastrophes and weapons of mass destruction. They should constrain non-self-aware AIs from destructive activities, while having little other interest in the affairs of mankind. I explore this in my essay, ‘An AI Epiphany.’”</span></p><p data-dcnode-id="1704" style="padding-left: 30px"><strong data-dcnode-id="1706"><span data-dcnode-id="1707" instrument_node="">Paul Henman</span></strong><span data-dcnode-id="1705" instrument_node="">, professor of social sciences at the University of Queensland, wrote, “The development, use and deployment of AI is driven – as all past technologies – by sectors with the most resources and for the purposes of those sectors. Commercial for making profits. War and defence by the military sector. Compliance and regulation by states. AI is not a fundamentally new technology. It is a new form of digital algorithmic automation, which can be deployed to a wider raft of activities. The future is best predicted from the past, and the past shows a long history of digital algorithms being deployed without much thought of ethics and the public good; this is even when now-widely-accepted regulations on data protection and privacy is accounted for. How, for example, has government automation been made accountable and ethical? Too often it has not and only been curtailed by legal challenges within the laws available. Social media platforms have long operated in a contested ethical space – between the ethics of ‘free speech’ in the public commons versus limitations on speech to ensure civil society.”</span></p><p data-dcnode-id="1700"><strong data-dcnode-id="1702"><span data-dcnode-id="1703" instrument_node="">Rosalie Day</span></strong><span data-dcnode-id="1701" instrument_node="">, policy leader and consultancy owner specializing in system approaches to data ethics, compliance and trust, observed, “In this individualistic and greed-is-still-good American society, there exist few incentives for ethical AI. Unfortunately, so little of the population understands the mechanics of AI, that even thoughtful citizens don’t know what to ask. For responsible dialogue to occur, and to apply critical thinking about the risks versus the benefits, society in general needs to be data literate.”</span></p><p data-dcnode-id="1696" style="padding-left: 30px"><strong data-dcnode-id="1698"><span data-dcnode-id="1699" instrument_node="">Michael Zimmer</span></strong><span data-dcnode-id="1697" instrument_node="">, director of data science and associate professor in the department of computer science at Marquette University, said, “While there has certainly been increased attention to applying broader ethical principles and duties to the development of AI, I feel the market pressures are such that companies will continue to deploy narrow AI over the next decade with only a passing attentiveness to ethics. Yes, many companies are starting to hire ‘ethics officers’ and engage in other ways to bring ethics into the fold, but we’re still very early in the ability to truly integrate this kind of framework into product development and business decision processes. Think about how long it took to create quality control or privacy officers. We’re at the very start of this process with AI ethics, and it will take more than 10 years to realize.”</span></p><p data-dcnode-id="1692"><strong data-dcnode-id="1694"><span data-dcnode-id="1695" instrument_node="">David Robertson</span></strong><span data-dcnode-id="1693" instrument_node="">, professor and chair of political science at the University of Missouri, St. Louis, wrote, “A large share of AI administration will take place in private enterprises and in public or nonprofit agencies with an incentive to use AI for gain. They have small incentives to subordinate their behavior to ethical principles that inhibit gain. In some cases, transparency will suffer, with tragic consequences.”</span></p><p data-dcnode-id="1688" style="padding-left: 30px"><strong data-dcnode-id="1690"><span data-dcnode-id="1691" instrument_node="">Dmitri Williams</span></strong><span data-dcnode-id="1689" instrument_node="">, a communications professor at the University of Southern California and expert in technology and society, commented, “Companies are literally bound by law to maximize profits, so to expect them to institute ethical practices is illogical. They can be expected to make money and nothing else. So, the question is really about whether or not the citizens of the country and our representatives will work in the public interest or for these corporations. If it was the former, we should be seeing laws and standards put into place to safeguard our values – privacy, the dignity of work, etc.</span></p><p data-dcnode-id="1686" style="padding-left: 30px"><span data-dcnode-id="1687" instrument_node="">“I am skeptical that the good guys and gals are going to win this fight in the short-term. There are few voices at the top levels calling for these kinds of values-based policies, and in that vacuum I expect corporate interests to win out. The upside is that there is real profit in making the world better. AI can help cure cancers, solve global warming and create art. So, despite some regulatory capture, I do expect AI to improve quality of life in some places.”</span></p><p data-dcnode-id="1682"><strong data-dcnode-id="1684"><span data-dcnode-id="1685" instrument_node="">Daniel Castro</span></strong><span data-dcnode-id="1683" instrument_node="">, vice president at the Information Technology and Innovation Foundation, noted, “The question should be: ‘Will companies and governments be ethical in the next decade?’ If they are not ethical, there will be no ‘ethical AI.’ If they are ethical, then they will pursue ethical uses of AI, much like they would with any other technology or tool. This is one reason why the focus in the United States should be on global AI leadership, in partnership with like-minded European and Asian allies, so they can champion democratic values. If China wins the global AI race, it will likely use these advancements to dominate other countries in both economic and military arenas.”</span></p><p data-dcnode-id="1678" style="padding-left: 30px"><strong data-dcnode-id="1680"><span data-dcnode-id="1681" instrument_node="">Ian O’Byrne</span></strong><span data-dcnode-id="1679" instrument_node="">, assistant professor of education at the College of Charleston, predicted, “AI will mostly be used in questionable ways over the next decade. I fear that the die has been cast as decisions about the ethical components of AI development and use have already been made or should have been made years ago. We already see instances where machine learning is being used in surveillance systems, data collection tools and analysis products. In the initial uses of AI and machine learning, we see evidence that the code and algorithms are being written by small groups that reify their personal biases and professional needs of corporations. We see evidence of racist and discriminatory mechanisms embedded in systems that will negatively impact large swaths of our population.”</span></p><p data-dcnode-id="1674"><strong data-dcnode-id="1676"><span data-dcnode-id="1677" instrument_node="">Art Brodsky</span></strong><span data-dcnode-id="1675" instrument_node="">, communications consultant and former vice president of communications for Public Knowledge, observed, “Given the record of tech companies and the government, AI like other things will be used unethically. Profit is the motive – not ethics. If there is a way to exploit AI and make money, it will be done at the cost or privacy or anything else. Companies don’t care. They are companies.”</span></p><p data-dcnode-id="1670" style="padding-left: 30px"><strong data-dcnode-id="1672"><span data-dcnode-id="1673" instrument_node="">John Laudun</span></strong><span data-dcnode-id="1671" instrument_node="">, professor of culture analytics, commented, “I do not see how we fund media and other products changing in the next decade, which means that the only people willing, and able, to underwrite AI/ML technologies will be governments and larger corporations. Until we root out the autocratic – also racist – impulses that seem well-situated in our police forces, I don’t see any possibility for these technologies to be used to redress social and economic disparities. The same applies to corporations who are mostly interested in using AL/ML technologies in order to sell us more.”</span></p><p data-dcnode-id="1666"><strong data-dcnode-id="1668"><span data-dcnode-id="1669" instrument_node="">Joan Francesc Gras</span></strong><span data-dcnode-id="1667" instrument_node="">, an architect of XTEC active in ICANN, asked, “Will AI be used primarily ethically or questionably in the next decade? There will be everything. But ethics will not be the most important value. Why? The desire for power breaks ethics. What gives you more hope? What worries you the most? How do you see AI apps make a difference in the lives of most people? In a paradigm shift in society, AI will help make those changes. When looking at global competition for AI systems, what issues are you concerned about or excited about? I am excited that competition generates quality, but at the same time unethical practices appear.”</span></p><p data-dcnode-id="1662" style="padding-left: 30px"><strong data-dcnode-id="1664"><span data-dcnode-id="1665" instrument_node="">Denise N. Rall</span></strong><span data-dcnode-id="1663" instrument_node="">, a researcher of popular culture based at a New Zealand University, said, “I cannot envision that AIs will be any different than the people who create and market them. They will continue to serve the rich at the expense of the poor.”</span></p><p data-dcnode-id="1658"><strong data-dcnode-id="1660"><span data-dcnode-id="1661" instrument_node="">William L. Schrader</span></strong><span data-dcnode-id="1659" instrument_node="">, an internet pioneer, mentor, adviser and consultant best known as founder and CEO of PSINet, predicted, “People in real power are driven by more power and more money for their own use (and their families and friends). That is the driver. Thus, anyone with some element of control over an AI system will nearly always find a way to use it to their advantage rather than the stated advantage. Notwithstanding all statements by them to do good and be ethical, they will subvert their own systems for their benefit and abuse the populous. All countries will suffer the same fate.</span></p><p data-dcnode-id="1656"><span data-dcnode-id="1657" instrument_node="">“Ha! What gives me the most hope? ‘Hope?’ That is not a word I ever use. I have only expectations. I expect all companies will put nice marketing on their AI, such as, ‘We will save you money in controlling your home’s temperature and humidity,’ but they are really monitoring all movements in the home (that is ‘needed in order to optimize temperature’). All governments that I have experienced are willing to be evil at any time, and every time if they can hide their actions. Witness the 2016-2020 U.S. President Trump. All countries are similar. AI will be used for good on the surface and evil beneath. Count on it. AI does not excite me in the least. It is as dangerous as the H-bomb.”</span></p><p data-dcnode-id="1652" style="padding-left: 30px"><strong data-dcnode-id="1654"><span data-dcnode-id="1655" instrument_node="">A longtime internet security architect and engineering professor</span></strong><span data-dcnode-id="1653" instrument_node=""> responded, “I am worried about how previous technologies have been rolled out to make money with only tertiary concern (if any) for ethics and human rights. Palantir and Clearview.ai are two examples. Facebook and Twitter continue to be examples in this space as well. The companies working in this space will roll out products that make money. Governments (especially repressive ones) are willing to spend money. The connection is inevitable and quite worrying.</span></p><p data-dcnode-id="1650" style="padding-left: 30px"><span data-dcnode-id="1651" instrument_node="">“Another big concern is these will be put in place to make decisions – loans, bail, etc. – and there will be no way to appeal to humans when the systems malfunction or show bias.</span></p><p data-dcnode-id="1648" style="padding-left: 30px"><span data-dcnode-id="1649" instrument_node="">“Overall, I am very concerned about how these systems will be set up to make money for the few, based on the way the world is now having been structured by the privileged. The AI/ML employed is likely to simply further existing disparities and injustice.”</span></p><p data-dcnode-id="1644"><strong data-dcnode-id="1646"><span data-dcnode-id="1647" instrument_node="">Danny Gillane</span></strong><span data-dcnode-id="1645" instrument_node="">, an information science professional, bleakly commented, “I have no hope. As long as profit drives the application of new technologies, such as AI, societal good takes a back seat. I am concerned that AI will economically harm those with the least. I am [also] concerned that AI will become a new form of [an] arms race among world powers and that AI will be used to suppress societies and employed in terrorism.”</span></p><p data-dcnode-id="1639" style="padding-left: 30px"><strong data-dcnode-id="1641"><img alt="" class="alignright wp-image-46691" data-dcnode-id="1643" height="259" sizes="(max-width: 460px) 100vw, 460px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.elon.edu/u/imagining/wp-content/uploads/sites/964/2021/06/2021-Chris-Boese-The-Future-of-Ethical-AI-Design40.jpg&amp;raw" srcset="https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Chris-Boese-The-Future-of-Ethical-AI-Design40.jpg 2500w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Chris-Boese-The-Future-of-Ethical-AI-Design40-300x169.jpg 300w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Chris-Boese-The-Future-of-Ethical-AI-Design40-768x432.jpg 768w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Chris-Boese-The-Future-of-Ethical-AI-Design40-1024x576.jpg 1024w" width="460"><span data-dcnode-id="1642" instrument_node="">Christine Boese</span></strong><span data-dcnode-id="1640" instrument_node="">, a consultant and independent scholar, wrote, “What gives me the most hope is that, by bringing together ethical AI with transparent UX, we can find ways to open the biases of perception being programmed into the black boxes, most often, not malevolently, but just because all perception is limited and biased and part of the laws of unintended consequences. But, as I found when probing what I wanted to research about the future of the internet in the late 1990s, I fully expect my activist research efforts in this area to be largely futile, with the only lasting value of being descriptive. None of us have the agency to be the engines able to drive this bus, and yet the bus is being driven by all of us, collectively.”</span></p><p data-dcnode-id="1635"><strong data-dcnode-id="1637"><span data-dcnode-id="1638" instrument_node="">Morgan G. Ames</span></strong><span data-dcnode-id="1636" instrument_node="">, associate director of the University of California-Berkeley’s Center for Science, Technology &amp; Society, responded, “Just as there is currently little incentive to avoid the expansion of surveillance and punitive technological infrastructures around the world, there is little incentive for companies to meaningfully grapple with bias and opacity in AI. Movements toward self-policing have been and will likely continue to be toothless, and even frameworks like GDPR and CCPA don’t meaningfully grapple with fairness and transparency in AI systems.”</span></p><p data-dcnode-id="1631" style="padding-left: 30px"><strong data-dcnode-id="1633"><span data-dcnode-id="1634" instrument_node="">Andre Popov</span></strong><span data-dcnode-id="1632" instrument_node="">, a principal software engineer for a large technology company, wrote, “Leaving aside the question of what ‘artificial intelligence’ means, it is difficult to discuss this question. As any effective tool, ‘artificial intelligence’ has first and foremost found military applications, where ethics is not even a consideration. ‘AI’ can make certain operations more efficient, and it will be used wherever it saves time/effort/money. People have trouble coming up with ethical legal systems; there is little chance we’ll do better with ‘AI.’”</span></p><p data-dcnode-id="1627"><strong data-dcnode-id="1629"><span data-dcnode-id="1630" instrument_node="">Ed Terpening</span></strong><span data-dcnode-id="1628" instrument_node="">, consultant and industry analyst with the Altimeter Group, observed, “The reality is that capitalism as currently practiced is leading to a race to the bottom and unethical income distribution. I don’t see – at least in the U.S., anyway – any meaningful guardrails for the ethical use of AI, except for brand health impact. That is, companies found to use AI unethically pay a price if the market responds with boycotts or other consumer-led sanctions. In a global world, where competitors in autocratic systems will do as they wish, it will become a competitive issue. Until there is a major incident, I don’t see global governance bodies such as the UN or World Bank putting into place any ethical policy with teeth in place.”</span></p><p data-dcnode-id="1623" style="padding-left: 30px"><strong data-dcnode-id="1625"><span data-dcnode-id="1626" instrument_node="">Rich Ling</span></strong><span data-dcnode-id="1624" instrument_node="">, professor of media technology at Nanyang Technological University, Singapore, responded, “There is the danger that, for example, capitalist interests will work out the application of AI so as to benefit their position. It is possible that there can be AI applications that are socially beneficial, but there is also a strong possibility that these will be developed to enhance capitalist interests.”</span></p><p data-dcnode-id="1619"><strong data-dcnode-id="1621"><span data-dcnode-id="1622" instrument_node="">Jennifer Young</span></strong><span data-dcnode-id="1620" instrument_node="">, a JavaScript engineer and user interface/frontend developer, said, “Capitalism is the systematic exploitation of the many by the few. As long as AI is used under capitalism, it will be used to exploit people. Pandora’s box has already been opened, and it’s unlikely that racial profiling, political and pornographic deepfakes and self-driving cars hitting people will ever go away. What do all of these have in common? They are examples of AI putting targets on people’s backs.</span></p><p data-dcnode-id="1617"><span data-dcnode-id="1618" instrument_node="">“AI under capitalism takes exploitation to new heights and starts at what is normally the end-game – death. And it uses the same classes of people as inputs to its functions. People already exploited via racism, sexism and classism are made more abstract entities that are easier to kill, just like they are in war. AI can be used for good. The examples in health care and biology are promising. But as long as we’re a world that elevates madmen and warlords to positions of power, its negative use will be prioritized.”</span></p><p data-dcnode-id="1613" style="padding-left: 30px"><strong data-dcnode-id="1615"><span data-dcnode-id="1616" instrument_node="">Benjamin Shestakofsky</span></strong><span data-dcnode-id="1614" instrument_node="">, assistant professor of sociology at the University of Pennsylvania, commented, “It is likely that ‘ethical’ frameworks will increasingly be applied to the production of AI systems over the next decade. However, it is also likely that these frameworks will be more ethical in name than in kind. Barring relevant legislative changes or regulation, the implementation of ethics in tech will resemble how large corporations manage issues pertaining to diversity in hiring and sexual harassment. Following ‘ethical’ guidelines will help tech companies shield themselves from lawsuits without forcing them to develop technologies that truly prioritize justice and the public good over profits.”</span></p><p data-dcnode-id="1609"><strong data-dcnode-id="1611"><span data-dcnode-id="1612" instrument_node="">Warren Yoder</span></strong><span data-dcnode-id="1610" instrument_node="">, longtime director of the Public Policy Center of Mississippi, now an executive coach, responded, “Widespread adoption of real, consequential ethical systems that go beyond window dressing will not happen without a fundamental change in the ownership structure of big tech. Ethics limit short-term profit opportunities by definition. I don’t believe big tech will make consequential changes unless there is either effective regulation or competition. Current regulators are only beginning to have the analytic tools to meet this challenge. I would like to believe that there are enough new thinkers like Lina Khan (U.S. House Judiciary – antitrust) moving into positions of influence, but the next 12 months will tell us much about what is possible in the near future.”</span></p><p data-dcnode-id="1605" style="padding-left: 30px"><strong data-dcnode-id="1607"><span data-dcnode-id="1608" instrument_node="">Ben Grosser</span></strong><span data-dcnode-id="1606" instrument_node="">, associate professor of new media at the University of Illinois-Urbana-Champaign, said, “As long as the organizations that drive AI research and deployment are private corporations whose business models are dependent on the gathering, analysis and action from personal data, then AIs will not trend toward ethics. They will be increasingly deployed to predict human behavior for the purpose of profit generation. We have already seen how this plays out (for example, with the use of data analysis and targeted advertising to manipulate the U.S. and UK electorate in 2016), and it will only get worse as increasing amounts of human activity move online.”</span></p><p data-dcnode-id="1600"><strong data-dcnode-id="1602"><img alt="" class="alignright wp-image-46635" data-dcnode-id="1604" height="259" sizes="(max-width: 460px) 100vw, 460px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.elon.edu/u/imagining/wp-content/uploads/sites/964/2021/06/2021-Jeanne-Dietsch-The-Future-of-Ethical-AI-Design44.jpg&amp;raw" srcset="https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Jeanne-Dietsch-The-Future-of-Ethical-AI-Design44.jpg 2500w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Jeanne-Dietsch-The-Future-of-Ethical-AI-Design44-300x169.jpg 300w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Jeanne-Dietsch-The-Future-of-Ethical-AI-Design44-768x432.jpg 768w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Jeanne-Dietsch-The-Future-of-Ethical-AI-Design44-1024x576.jpg 1024w" width="460"><span data-dcnode-id="1603" instrument_node="">Jeanne Dietsch</span></strong><span data-dcnode-id="1601" instrument_node="">, New Hampshire senator and former CEO of MobileRobots Inc., commented, “The problem is that AI will be used primarily to increase sales of products and services. To this end, it will be manipulative. Applying AI to solve complex logistical problems will truly benefit our society, making systems operate more smoothly, individualizing education, building social bonds and much more. The downside to the above is that it is creating, and will continue to create, echo chambers that magnify ignorance and misinformation.”</span></p><p data-dcnode-id="1596" style="padding-left: 30px"><strong data-dcnode-id="1598"><span data-dcnode-id="1599" instrument_node="">Patrick Larvie</span></strong><span data-dcnode-id="1597" instrument_node="">, global lead for the workplace user experience team at one of the world’s largest technology companies, observed, “I’m hope I’m wrong, but the history of the internet so far indicates that any rules around the use of artificial intelligence may be written to benefit private entities wishing to commercially exploit AI rather than the consumers such companies would serve. I can see AI making a positive difference in many arenas – reducing the consumption of energy, reducing waste. Where I fear it will be negative is where AI is being swapped out for human interaction. We see this in the application of AI to consumer products, where bots have begun to replace human agents.”</span></p><p data-dcnode-id="1592"><strong data-dcnode-id="1594"><span data-dcnode-id="1595" instrument_node="">Peter Levine</span></strong><span data-dcnode-id="1593" instrument_node="">, professor of citizenship and public affairs at Tufts University, wrote, “The primary problem isn’t technical. AI can incorporate ethical safeguards or can even be designed to maximize important values. The problem involves incentives. There are many ways for companies to profit and for governments to gain power by using AI. But there are few (if any) rewards for doing that ethically.”</span></p><p data-dcnode-id="1587" style="padding-left: 30px"><strong data-dcnode-id="1589"><img alt="" class="alignright wp-image-46639" data-dcnode-id="1591" height="259" sizes="(max-width: 460px) 100vw, 460px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.elon.edu/u/imagining/wp-content/uploads/sites/964/2021/06/2021-Holmes-Wilson-The-Future-of-Ethical-AI-Design10.jpg&amp;raw" srcset="https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Holmes-Wilson-The-Future-of-Ethical-AI-Design10.jpg 2500w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Holmes-Wilson-The-Future-of-Ethical-AI-Design10-300x169.jpg 300w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Holmes-Wilson-The-Future-of-Ethical-AI-Design10-768x432.jpg 768w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Holmes-Wilson-The-Future-of-Ethical-AI-Design10-1024x576.jpg 1024w" width="460"><span data-dcnode-id="1590" instrument_node="">Holmes Wilson</span></strong><span data-dcnode-id="1588" instrument_node="">, co-director of Fight for the Future, said, “Even before we figure out general artificial intelligence, AI systems will make the imposition of mass surveillance and physical force extremely cheap and effective for anyone with a large enough budget, mostly nation-states. If a car can drive itself, a helicopter can kill people itself, for whoever owns it. They’ll also increase the power of asymmetric warfare. Every robot car, cop or warplane will be as hackable, as everything is with sufficient expenditure, and the next 9/11 will be as difficult to definitively attribute as an attack by hackers on a U.S. company is today.</span></p><p data-dcnode-id="1585" style="padding-left: 30px"><span data-dcnode-id="1586" instrument_node="">“Autonomous weapon systems are something between guns in the early 20th century and nuclear weapons in the late 20th century, and we’re hurtling toward it with no idea of how bad it could be. … The thing to worry about is existing power structures building remote-control police forces and remote-control occupying armies. That threat is on the level of nuclear weapons. It’s really, really dangerous.”</span></p><p data-dcnode-id="1581"><strong data-dcnode-id="1583"><span data-dcnode-id="1584" instrument_node="">Susan Price</span></strong><span data-dcnode-id="1582" instrument_node="">, user-experience pioneer and strategist and founder of Firecat Studio, wrote, “I don’t believe that governments and regulatory agencies are poised to understand the implications of AI for ethics and consumer or voter protection. The questions asked in Congress barely scratch the surface of the issue, and political posturing too often takes the place of elected officials charged with oversight to reach genuine understanding of these complex issues.</span></p><p data-dcnode-id="1579"><span data-dcnode-id="1580" instrument_node="">“The strong profit motive for tech companies leads them to resist any such protections or regulation. These companies’ profitability allows them to directly influence legislators through lobbies and PACs; easily overwhelming the efforts of consumer protection agencies and nonprofits, when those are not directly defunded or disbanded.</span></p><p data-dcnode-id="1577"><span data-dcnode-id="1578" instrument_node="">“We’re seeing Facebook, Google, Twitter and Amazon resist efforts to produce the oversight, auditing and transparency that would lead to consumer protection. AI is already making lives better. But it’s also making corporate profits better at a much faster rate. Without strong regulation, we can’t correct that imbalance, and the processes designed to protect U.S. citizens from exploitation through elected leaders is similarly subverted by funds from these same large companies.”</span></p><p data-dcnode-id="1573" style="padding-left: 30px"><strong data-dcnode-id="1575"><span data-dcnode-id="1576" instrument_node="">Craig Spiezle</span></strong><span data-dcnode-id="1574" instrument_node="">, managing director and trust strategist for Agelight, and chair emeritus for the Online Trust Alliance, said, “Look no further than data privacy and other related issues such as net neutrality. Industry in general has failed to respond ethically in the collection, use and sharing of data. Many of these same leaders have a major play in AI, and I fear they will continue to act in their own self-interests.”</span></p><p data-dcnode-id="1569"><strong data-dcnode-id="1571"><span data-dcnode-id="1572" instrument_node="">Sam Punnett</span></strong><span data-dcnode-id="1570" instrument_node="">, futurist and retired owner of FAD Research, commented, “System and application design is usually mandated by a business case, not by ethical considerations. Any forms of regulation or guidelines typically lag technology development by many years. The most concerning applications of AI systems are those being employed for surveillance and societal control.”</span></p><p data-dcnode-id="1565" style="padding-left: 30px"><strong data-dcnode-id="1567"><span data-dcnode-id="1568" instrument_node="">An ethics expert who served as an advisor on the UK’s report on “AI in Health Care”</span></strong><span data-dcnode-id="1566" instrument_node=""> responded, “I don’t think the tech companies understand ethics at all. They can only grasp it in algorithmic form, i.e., a kind of automated utilitarianism, or via ‘value alignment,’ which tends to use economists’ techniques around revealed preferences and social choice theory. They cannot think in terms of obligation, responsibility, solidarity, justice or virtue. This means they engineer out much of what is distinctive about humane ethical thought. In a thought I saw attributed to Hannah Arendt recently, though I cannot find the source, ‘It is not that behaviourism is true, it is more that it might become true: That is the problem.’ It would be racist to say that in some parts of the world AI developers care less about ethics than in others; more likely, they care about different ethical questions in different ways. But underlying all that is that the machine learning models used are antithetical to humane ethics in their mode of operation.”</span></p><p data-dcnode-id="1561"><strong data-dcnode-id="1563"><span data-dcnode-id="1564" instrument_node="">Nathalie Maréchal</span></strong><span data-dcnode-id="1562" instrument_node="">, senior research analyst at Ranking Digital Rights, observed, “Until the development and use of AI systems is grounded in an international human rights framework, and until governments regulate AI following human rights principles and develop a comprehensive system for mandating human rights impact assessments, auditing systems to ensure they work as intended, and hold violating entities to account, ‘AI for good’ will continue to be an empty slogan.”</span></p><p data-dcnode-id="1557" style="padding-left: 30px"><strong data-dcnode-id="1559"><span data-dcnode-id="1560" instrument_node="">Mark Maben</span></strong><span data-dcnode-id="1558" instrument_node="">, a general manager at Seton Hall University, wrote, “It is simply not in the DNA of our current economic and political system to put the public good first. If the people designing, implementing, using and regulating AI are not utilizing ethical principles focused primarily on the public good, they have no incentive to create an AI-run world that utilizes those principles. Having AI that is designed to serve the public good above all else can only come about through intense public pressure. Businesses and politicians often need to be pushed to do the right thing. Fortunately, the United States appears to be at a moment where such pressure and change [are] possible, if not likely.</span></p><p data-dcnode-id="1555" style="padding-left: 30px"><span data-dcnode-id="1556" instrument_node="">“As someone who works with Gen Z nearly every day, I have observed that many members of Gen Z think deeply about ethical issues, including as they relate to AI. This generation may prove to be the difference makers on whether we get AI that is primarily guided by ethical principles focused on the public good.”</span></p><p data-dcnode-id="1551"><strong data-dcnode-id="1553"><span data-dcnode-id="1554" instrument_node="">Arthur Bushkin</span></strong><span data-dcnode-id="1552" instrument_node="">, writer, philanthropist and social activist, said, “I worry that AI will not be driven by ethics, but rather by technological efficiency and other factors.”</span></p><p data-dcnode-id="1547" style="padding-left: 30px"><strong data-dcnode-id="1549"><span data-dcnode-id="1550" instrument_node="">Dharmendra K. Sachdev</span></strong><span data-dcnode-id="1548" instrument_node="">, a telecommunications pioneer and founder-president of Spacetel Consultancy LLC, wrote, “My simplistic definition is that AI can be smart; in other words, like the human mind, it can change directions depending upon the data collected. The question often debated is this: Can AI outsmart humans? My simplistic answer: Yes, in some humans but not the designer. A rough parallel would be: Can a student outsmart his professor? Yes, of course yes, but he may not outsmart all professors in his field. Summarizing my admittedly limited understanding is that all software is created to perform a set of functions. When you equip it with the ability to change course depending upon data, we call it AI. If I can make it more agile than my competition, my AI can outsmart him.”</span></p><p data-dcnode-id="1543"><strong data-dcnode-id="1545"><span data-dcnode-id="1546" instrument_node="">Karen Yesinkus</span></strong><span data-dcnode-id="1544" instrument_node="">, a creative and digital services professional, observed, “I would like to believe that AI being used ethically by 2030 will be in place. However, I don’t think that will likely be a sure thing. Social media, human resources, customer services, etc. platforms are and will have continuing issues to iron out (bias issues especially). Given the existing climate politically on a global scale, it will take more than the next 10 years for AI to shake off such bias.”</span></p><p data-dcnode-id="1539" style="padding-left: 30px"><strong data-dcnode-id="1541"><span data-dcnode-id="1542" instrument_node="">Marc H. Noble</span></strong><span data-dcnode-id="1540" instrument_node="">, a retired technology developer/administrator, wrote, “Although I believe most AI will be developed for the benefit of mankind, my great concern is that you only need one bad group to develop AI for the wrong reasons to create a potential catastrophe. Despite that, AI should be explored and developed, however, with a great deal of caution.”</span></p><p data-dcnode-id="1535"><strong data-dcnode-id="1537"><span data-dcnode-id="1538" instrument_node="">Eduardo Villanueva-Mansilla</span></strong><span data-dcnode-id="1536" instrument_node="">, associate professor of communications at Pontificia Universidad Catolica, Peru, predicted, “Public pressure will be put upon AI actors. However, there is a significant risk that the agreed [-upon] ethical principles will be shaped too closely to the societal and political demands of the developed world. They will not consider the needs of emerging economies or local communities in the developing world.”</span></p><p data-dcnode-id="1531" style="padding-left: 30px"><strong data-dcnode-id="1533"><span data-dcnode-id="1534" instrument_node="">Garth Graham</span></strong><span data-dcnode-id="1532" instrument_node="">, a longtime leader of Telecommunities Canada, said, “The drive in governance worldwide to eradicate the public good in favour of market-based approaches is inexorable. The drive to implement AI-based systems is not going to place the public good as a primary priority. For example, existing Smart City initiatives are quite willing to outsource the design and operation of complex adaptive systems that learn as they operate civic functions, not recognizing that the operation of such systems is replacing the functions of governance.”</span></p><h2 data-dcnode-id="1529"><span data-dcnode-id="1530" instrument_node="">The AI genie is already out of the bottle, abuses are already occurring and some are not very visible and hard to remedy</span></h2><p data-dcnode-id="1527"><span data-dcnode-id="1528" instrument_node="">A share of these experts note that AI applications designed with little or no attention to ethical considerations are already deeply embedded across many aspects of human activity, and they are generally invisible to the people they affect. These respondents said algorithms are at work in systems that are opaque at best and impossible to dissect at worst. They argue that it is highly unlikely that ethical standards can or will be applied in this setting. Others also point out that there is a common dynamic that plays out when new technologies sweep through societies: Abuses occur first and then remedies are attempted. It’s hard to program algorithm-based digital tools in a way that predicts, addresses and subverts all problems. Most problems remain unknown until they are recognized, sometimes long after they are produced, distributed and actively in use.</span></p><p data-dcnode-id="1523"><strong data-dcnode-id="1525"><span data-dcnode-id="1526" instrument_node="">Henning Schulzrinne</span></strong><span data-dcnode-id="1524" instrument_node="">, Internet Hall of Fame member and former chief technology officer for the Federal Communications Commission, said, “The answer strongly depends on the shape of the government in place in the country in the next few years. In a purely deregulatory environment with strong backsliding toward law-and-order populism, there will be plenty of suppliers of AI that will have little concern about the fine points of AI ethics. Much of that AI will not be visible to the public – it will be employed by health insurance companies that are again free to price-discriminate based on preexisting conditions, by employers looking for employees who won’t cause trouble, by others who will want to nip any unionization efforts in the bud, by election campaigns targeting narrow subgroups.”</span></p><p data-dcnode-id="1519" style="padding-left: 30px"><strong data-dcnode-id="1521"><span data-dcnode-id="1522" instrument_node="">Jeff Johnson</span></strong><span data-dcnode-id="1520" instrument_node="">, a professor of computer science, University of San Francisco, who previously worked at Xerox, HP Labs and Sun Microsystems, responded, “The question asks about ‘most AI systems.’ Many new applications of AI will be developed to improve business operations. Some of these will be ethical and some will not be. Many new applications of AI will be developed to aid consumers. Most will be ethical, but some won’t be. However, the vast majority of new AI applications will be ‘dark,’ i.e., hidden from public view, developed for military or criminal purposes. If we count those, then the answer to the question about ‘most AI systems’ is without a doubt that AI will be used mostly for unethical purposes.”</span></p><p data-dcnode-id="1514"><strong data-dcnode-id="1516"><img alt="" class="alignright wp-image-46643" data-dcnode-id="1518" height="259" sizes="(max-width: 460px) 100vw, 460px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.elon.edu/u/imagining/wp-content/uploads/sites/964/2021/06/2021-John-Harlow-The-Future-of-Ethical-AI-Design11.jpg&amp;raw" srcset="https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-John-Harlow-The-Future-of-Ethical-AI-Design11.jpg 2500w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-John-Harlow-The-Future-of-Ethical-AI-Design11-300x169.jpg 300w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-John-Harlow-The-Future-of-Ethical-AI-Design11-768x432.jpg 768w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-John-Harlow-The-Future-of-Ethical-AI-Design11-1024x576.jpg 1024w" width="460"><span data-dcnode-id="1517" instrument_node="">John Harlow</span></strong><span data-dcnode-id="1515" instrument_node="">, smart cities research specialist at the Engagement Lab @ Emerson College, predicted, “AI will mostly be used in questionable ways in the next decade. Why? That’s how it’s been used thus far, and we aren’t training or embedding ethicists where AI is under development, so why would anything change? What gives me the most hope is that AI dead-ends into known effective use cases and known ‘impossibilities.’ Maybe AI can be great at certain things, but let’s dispense with areas where we only have garbage in (applications based on any historically biased data).</span></p><p data-dcnode-id="1512"><span data-dcnode-id="1513" instrument_node="">“Most AI applications that make a difference in the lives of most people will be in the backend, invisible to them. ‘Wow, the last iOS update really improved predictive text suggestions.’ ‘Oh, my dentist has AI-informed radiology software?’ One of the ways it could go mainstream is through comedy. AI weirdness is an accessible genre, and a way to learn/teach about the technology (somewhat) – I guess that might break through more as an entertainment niche. As for global AI competition, what concerns me is the focus on AI, beating other countries at AI and STEM generally.</span></p><p data-dcnode-id="1510"><span data-dcnode-id="1511" instrument_node="">“Our challenges certainly call for rational methods. Yet, we have major problems that can’t be solved without historical grounding, functioning societies, collaboration, artistic inspiration and many other things that suffer from overfocusing on STEM or AI.”</span></p><p data-dcnode-id="1506" style="padding-left: 30px"><strong data-dcnode-id="1508"><span data-dcnode-id="1509" instrument_node="">Steve Jones</span></strong><span data-dcnode-id="1507" instrument_node="">, professor of communication at the University of Illinois at Chicago and editor of New Media and Society, commented, “We’ll have more discussion, more debate, more principles, but it’s hard to imagine that there’ll be – in the U.S. case – a will among politicians and policymakers to establish and enforce laws based on ethical principles concerning AI. We tend to legislate the barn after the horses have left. I’d expect we’ll do the same in this case.”</span></p><p data-dcnode-id="1502"><strong data-dcnode-id="1504"><span data-dcnode-id="1505" instrument_node="">Andy Opel</span></strong><span data-dcnode-id="1503" instrument_node="">, professor of communications at Florida State University, said, “Because AI is likely to gain access to a widening gyre of personal and societal data, constraining that data to serve a narrow economic or political interest will be difficult.”</span></p><p data-dcnode-id="1498" style="padding-left: 30px"><strong data-dcnode-id="1500"><span data-dcnode-id="1501" instrument_node="">Doug Schepers</span></strong><span data-dcnode-id="1499" instrument_node="">, a longtime expert in web technologies and founder of Fizz Studio, observed, “As today, there will be a range of deliberately ethical computing, poor-quality inadvertent unethical computing and deliberately unethical computing using AI. Deepfakes are going to be worrisome for politics and other social activities. It will lead to distrustability overall. By themselves, most researchers or product designers will not rigorously pursue ethical AI, just as most people don’t understand or rigorously apply principles of digital accessibility for people with disabilities. It’ll largely be inadvertent oversight, but it will still be a poor outcome.</span></p><p data-dcnode-id="1496" style="padding-left: 30px"><span data-dcnode-id="1497" instrument_node="">“My hope is that best practices will emerge and continue to be refined through communities of practice, much like peer review in science. I also have some hope that laws may be passed that codify some of the most obvious best practices, much like the Americans With Disabilities Act and Section 508 improve accessibility through regulation, while still not being overly onerous.</span></p><p data-dcnode-id="1494" style="padding-left: 30px"><span data-dcnode-id="1495" instrument_node="">“My fear is that some laws will be stifling, like those regarding stem-cell research. Machine learning and AI naturally have the capacity for improving people’s lives in many untold ways, such as computer vision for blind people. This will be incremental, just as commodity computing and increasing internet have improved (and sometimes harmed) people. It will most likely not be a seismic shift, but a drift. One of the darker aspects in the existing increase of surveillance capitalism and its use by authoritarian states. My hope is that laws will rein this in.”</span></p><p data-dcnode-id="1490"><strong data-dcnode-id="1492"><span data-dcnode-id="1493" instrument_node="">Jay Owens</span></strong><span data-dcnode-id="1491" instrument_node="">, research director at pulsarplatform.com and author of HautePop, said, “Computer science education – and Silicon Valley ideology overall – focuses on ‘what can be done’ (the technical question) without much consideration of ‘should it be done’ (a social and political question). Tech culture would have to turn on its head for ethical issues to become front-and-centre of AI research and deployment; this is vanishingly unlikely.</span></p><p data-dcnode-id="1488"><span data-dcnode-id="1489" instrument_node="">“I’d expect developments in machine learning to continue along the same lines they have done so for the last decade – mostly ignoring the ethics question, with occasional bursts of controversy when anything particularly sexist or racist occurs. A lot of machine learning is already (and will continue to be) invisible to people’s everyday lives but creating process efficiencies (e.g., in weather forecasting, warehousing and logistics, transportation management). Other processes that we might not want to be more efficient (e.g., oil and gas exploration, using satellite imagery and geology analysis) will also benefit.</span></p><p data-dcnode-id="1486"><span data-dcnode-id="1487" instrument_node="">“I feel positively toward systems where ML and human decision-making are combined (e.g., systems for medical diagnostics). I would imagine machine learning is used in climate modelling, which is also obviously helpful. Chinese technological development cannot be expected to follow Western ethical qualms, and, given the totalitarian (and genocidal) nature of this state, it is likely that it will produce some ML systems that achieve these policing ends.</span></p><p data-dcnode-id="1484"><span data-dcnode-id="1485" instrument_node="">“Chinese-owned social apps such as TikTok have already shown racial biases and are likely less motivated to address them. I see no prospect that ‘general AI’ or generalisable machine intelligence will be achieved in 10 years and even less reason to panic about this (as some weirdos in Silicon Valley do).”</span></p><p data-dcnode-id="1480" style="padding-left: 30px"><strong data-dcnode-id="1482"><span data-dcnode-id="1483" instrument_node="">Robert W. Ferguson</span></strong><span data-dcnode-id="1481" instrument_node="">, a hardware robotics engineer at Carnegie Mellon Software Engineering Institute, wrote, “How many times do we need to say it? Unsupervised machine learning is at best incomplete. If supplemented with a published causal analysis, it might recover some credibility. Otherwise, we suffer from what is said by Cathy O’Neil in ‘Weapons of Math Destruction.’ Unsupervised machine learning without causal analysis is irresponsible and bad.”</span></p><p data-dcnode-id="1476"><strong data-dcnode-id="1478"><span data-dcnode-id="1479" instrument_node="">Michael Richardson</span></strong><span data-dcnode-id="1477" instrument_node="">, open-source consulting engineer, responded, “In the 1980s, ‘AI’ was called ‘expert systems,’ because we recognized that it wasn’t ‘intelligent.’ In the 2010s, we called it ‘machine learning’ for the same reason. ML is just a new way to build expert systems. They replicate the biases of the ‘experts’ and cannot see beyond them. Is algorithmic trading ethical?</span></p><p data-dcnode-id="1474"><span data-dcnode-id="1475" instrument_node="">“Let me rephrase: Does our economy actually need it? If the same algorithm is used to balance ecosystems, does the answer change? We already have AI. They are called ‘corporations.’ Many have pointed this out already. Automation of that collective mind is really what is being referred to. I believe that use of AI in sentencing violates people’s constitutional rights, and I think that it will be stopped as it is realised that it just institutionalises racism.”</span></p><p data-dcnode-id="1470" style="padding-left: 30px"><strong data-dcnode-id="1472"><span data-dcnode-id="1473" instrument_node="">A principal architect at a technology company</span></strong><span data-dcnode-id="1471" instrument_node=""> said, “I see no framework or ability for any governing agencies to understand how AI works. Practitioners don’t even know how it works, and they keep the information as proprietary information. Consider how long it took to mandate seat belts or limit workplace smoking, where the cause and effect were so clear, how can we possibly hope to control AI within the next 10 years?”</span></p><h2 data-dcnode-id="1468"><span data-dcnode-id="1469" instrument_node="">Global competition, especially between China and the U.S., will matter more to the development of AI than any ethical issues</span></h2><p data-dcnode-id="1466"><span data-dcnode-id="1467" instrument_node="">A number of these respondents framed their answers around the “arms race” dynamic driving the tech superpowers, noting that it instills a damn-the-ethics-full-speed-ahead attitude. Some said there are significant differences in the ethical considerations various nation-states are applying and will apply in the future to AI development. Many pointed to the U.S. and China as the leading competitors in the nation-states arms race.</span></p><p data-dcnode-id="1462"><strong data-dcnode-id="1464"><span data-dcnode-id="1465" instrument_node="">Daniel Farber</span></strong><span data-dcnode-id="1463" instrument_node="">, author, historian and professor of law at the University of California-Berkeley, responded, “There’s enormous uncertainty. Why? First of all, China. That’s a huge chunk of the world, and there’s nothing in what I see there right now to make me optimistic about their use of AI. Second, AI in the U.S. is mostly in the hands of corporations whose main goal is naturally to maximize profits. They will be under some pressure to incorporate ethics both from the public and employees, which will be a moderating influence.</span></p><p data-dcnode-id="1460"><span data-dcnode-id="1461" instrument_node="">“The fundamental problem is that AI is likely to be in the hands of institutions and people that already have power and resources, and that will inevitably shape how the technology is used. So, I worry that it will simply reinforce or increase current power imbalances. What we need is not only ethical AI but ethical access to AI, so that individuals can use it to increase their own capabilities.”</span></p><p data-dcnode-id="1456" style="padding-left: 30px"><strong data-dcnode-id="1458"><span data-dcnode-id="1459" instrument_node="">J. Scott Marcus</span></strong><span data-dcnode-id="1457" instrument_node="">, an economist, political scientist and engineer who works as a telecommunications consultant, wrote, “Policy fragmentation globally will get in the way. As long as most AI investment is made in the U.S. and China, no consensus is possible. The European Union will attempt to bring rules into play, but it is not clear if they can drive much change in the face of the U.S. and China rivalry. The U.S. (also Japan) are large players in consumption but not so large in production of many aspects. They are larger, however, in IoT and robotics, so maybe there is more hope there. For privacy, the European Union forced a fair degree of global convergence thanks to its large purchasing power. It is not clear whether that can work for AI.”</span></p><p data-dcnode-id="1452"><strong data-dcnode-id="1454"><span data-dcnode-id="1455" instrument_node="">Charles M. Ess</span></strong><span data-dcnode-id="1453" instrument_node="">, a professor of media studies at the University of Oslo whose expertise is in information and computing ethics, commented, “The most hope lies in the European Union and related efforts to develop ‘ethical AI’ in both policy and law. Many first-rate people and reasonably solid institutions are working on this, and, in my view, some promising progress is being made. But the EU is squeezed between China and the U.S. as the world leaders, neither of which can be expected to take what might be called ethical leadership. China is at the forefront of exporting the technologies of ‘digital authoritarianism.’ Whatever important cultural caveats may be made about a more collective society finding these technologies of surveillance and control positive as they reward pro-social behavior – the clash with the foundational assumptions of democracy, including rights to privacy, freedom of expression, etc. is unavoidable and unquestionable.</span></p><p data-dcnode-id="1450"><span data-dcnode-id="1451" instrument_node="">“For its part, the U.S. has a miserable record (at best) of attempting to regulate these technologies – starting with computer law from the 1970s that categorizes these companies as carriers, not content providers, and thus not subject to regulation that would include attention to freedom of speech issues, etc. My prediction is that Google and its corporate counterparts in Silicon Valley will continue to successfully argue against any sort of external regulation or imposition of standards for an ethical AI, in the name of having to succeed in the global competition with China. We should perhaps give Google in particular some benefit of the doubt and see how its recent initiatives in the direction of ethical AI in fact play out. But 1) what I know first-hand to be successful efforts at ethics-washing by Google (e.g., attempting to hire in some of its more severe and prominent ethical critics in the academy in order to buy their silence), and 2) given its track record of cooperation with authoritarian regimes, including China, it’s hard to be optimistic here.</span></p><p data-dcnode-id="1448"><span data-dcnode-id="1449" instrument_node="">“Of course, we will see some wonderfully positive developments and improvements – perhaps in medicine first of all. And perhaps it’s okay to have recommender systems to help us negotiate, e.g., millions of song choices on Spotify. But even these applications are subject to important critique, e.g., under the name of ‘the algorithmization of taste’ – the reshaping of our tastes and preferences is influenced by opaque processes driven by corporate interests in maximizing our engagement and consumption, not necessarily helping us discover liberating and empowering new possibilities. More starkly, especially if AI and machine-learning techniques remain black-boxed and unpredictable, even to those who create them (which is what AI and ML are intended to do, after all), I mostly see a very dark and nightmarish future in which more and more of our behaviors are monitored and then nudged by algorithmic processes we cannot understand and thereby contest. The starkest current examples are in the areas of so-called ‘predictive policing’ and related efforts to replace human judgment with machine-based ‘decision-making.’ As Mireille Hildebrandt has demonstrated, when we can no longer contest the evidence presented against us in a court of law – because it is gathered and processed by algorithmic processes even its creators cannot clarify or unpack – that is the end of the modern practices of law and democracy. It’s clearly bad enough when these technologies are used to sort out human beings in terms of their credit ratings: Relying on these technologies for judgments/decisions about who gets into what educational institution, who does and does not deserve parole, and so on seem to me to be a staggeringly nightmarish dystopian future.</span></p><p data-dcnode-id="1446"><span data-dcnode-id="1447" instrument_node="">“Again, it may be a ‘Brave New World’ of convenience and ease, at least as long as one complies with the behaviors determined to be worth positive reward, etc. But to use a different metaphor – one perhaps unfamiliar to younger generations, unfortunately – we will remain the human equivalent of Skinner pigeons in nice and comfortable Skinner cages, wired carefully to maximize desired behaviors via positive reinforcement, if not discouraging what will be defined as undesirable behaviors via negative reinforcement (including force and violence) if need be.”</span></p><p data-dcnode-id="1441" style="padding-left: 30px"><strong data-dcnode-id="1443"><img alt="" class="alignright wp-image-46647" data-dcnode-id="1445" height="259" sizes="(max-width: 460px) 100vw, 460px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.elon.edu/u/imagining/wp-content/uploads/sites/964/2021/06/2021-Adam-Clayton-Powell-III-The-Future-of-Ethical-AI-Design21.jpg&amp;raw" srcset="https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Adam-Clayton-Powell-III-The-Future-of-Ethical-AI-Design21.jpg 2500w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Adam-Clayton-Powell-III-The-Future-of-Ethical-AI-Design21-300x169.jpg 300w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Adam-Clayton-Powell-III-The-Future-of-Ethical-AI-Design21-768x432.jpg 768w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Adam-Clayton-Powell-III-The-Future-of-Ethical-AI-Design21-1024x576.jpg 1024w" width="460"><span data-dcnode-id="1444" instrument_node="">Adam Clayton Powell III</span></strong><span data-dcnode-id="1442" instrument_node="">, senior fellow at the USC Annenberg Center on Communication Leadership and Policy, observed, “By 2030, many will use ethical AI and many won’t. But in much of the world, it is clear that governments, especially totalitarian governments in China, Russia, et seq., will want to control AI within their borders, and they will have the resources to succeed. And those governments are only interested in self-preservation – not ethics.”</span></p><p data-dcnode-id="1437"><strong data-dcnode-id="1439"><span data-dcnode-id="1440" instrument_node="">Alf Rehn</span></strong><span data-dcnode-id="1438" instrument_node="">, professor of innovation, design and management at the University of Southern Denmark, said, “There will be a push for ethical AI during the next 10 years, but good intentions alone do not morality make. AI is complicated, as is ethics, and combining the two will be a very complex problem indeed. We are likely to see quite a few clumsy attempts to create ethical AI-systems, with the attendant problems. It is also important to take cultural and geopolitical issues into consideration. There are many interpretations of ethics, and people put different value on different values, so that, e.g., a Chinese ethical AI may well function quite differently – and generate different outcomes – from, e.g., a British ethical AI. This is not to say that one is better than the other, just that they may be rather different.”</span></p><p data-dcnode-id="1433" style="padding-left: 30px"><strong data-dcnode-id="1435"><span data-dcnode-id="1436" instrument_node="">Sean Mead</span></strong><span data-dcnode-id="1434" instrument_node="">, senior director of strategy and analytics at Interbrand, wrote, “Chinese theft of Western and Japanese AI technologies is one of the most worrisome ethics issues that we will be facing. We will have ethical issues over both potential biases built into AI systems through the choice or availability of training data and expertise sets and the biases inherent in proposed solutions attempting to counter such problems. The identification systems for autonomous weapons systems will continue to raise numerous ethics issues, particularly as countries deploy land-based systems interacting with people.</span></p><p data-dcnode-id="1431" style="padding-left: 30px"><span data-dcnode-id="1432" instrument_node="">“AI driving social credit systems will have too much power over peoples’ lives and will help vitalize authoritarian systems. AI will enable increased flight from cities into more hospitable and healthy living areas through automation of governmental services and increased transparency of skill sets to potential employers.”</span></p><p data-dcnode-id="1427"><strong data-dcnode-id="1429"><span data-dcnode-id="1430" instrument_node="">Mark Perkins</span></strong><span data-dcnode-id="1428" instrument_node="">, an information science professional active in the Internet Society, noted, “AI will be developed by corporations (with government backing) with little respect for ethics. The example of China will be followed by other countries – development of AI by use of citizens’ data, without effective consent, to deve
