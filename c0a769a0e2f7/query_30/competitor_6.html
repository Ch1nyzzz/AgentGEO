19" id="menu-item-793"><a data-dcnode-id="2920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.elon.edu/u/imagining/surveys/v-2012/"><span data-dcnode-id="2921" instrument_node="">Survey V-2012</span></a></li><li class="menu-item menu-item-type-post_type menu-item-object-page menu-item-790" data-dcnode-id="2916" id="menu-item-790"><a data-dcnode-id="2917" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.elon.edu/u/imagining/surveys/iv-2010/"><span data-dcnode-id="2918" instrument_node="">Survey IV-2010</span></a></li><li class="menu-item menu-item-type-post_type menu-item-object-page menu-item-787" data-dcnode-id="2913" id="menu-item-787"><a data-dcnode-id="2914" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.elon.edu/u/imagining/surveys/iii-2008/"><span data-dcnode-id="2915" instrument_node="">Survey III-2008</span></a></li><li class="menu-item menu-item-type-post_type menu-item-object-page menu-item-784" data-dcnode-id="2910" id="menu-item-784"><a data-dcnode-id="2911" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.elon.edu/u/imagining/surveys/ii-2006/"><span data-dcnode-id="2912" instrument_node="">Survey II-2006</span></a></li><li class="menu-item menu-item-type-post_type menu-item-object-page menu-item-781" data-dcnode-id="2907" id="menu-item-781"><a data-dcnode-id="2908" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.elon.edu/u/imagining/surveys/i-2004/"><span data-dcnode-id="2909" instrument_node="">Survey I-2004</span></a></li></ul></li><li class="menu-item menu-item-type-custom menu-item-object-custom menu-item-has-children menu-item-382" data-dcnode-id="2888" id="menu-item-382"><a data-dcnode-id="2902"><span data-dcnode-id="2904" instrument_node="">Time Capsule</span><span class="dropdown-menu-toggle" data-dcnode-id="2903" role="presentation"></span></a><ul class="sub-menu" data-dcnode-id="2889"><li class="menu-item menu-item-type-post_type menu-item-object-page menu-item-834" data-dcnode-id="2899" id="menu-item-834"><a data-dcnode-id="2900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.elon.edu/u/imagining/time-capsule/"><span data-dcnode-id="2901" instrument_node="">Time Capsule Home</span></a></li><li class="menu-item menu-item-type-post_type menu-item-object-page menu-item-843" data-dcnode-id="2896" id="menu-item-843"><a data-dcnode-id="2897" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.elon.edu/u/imagining/time-capsule/early-90s/"><span data-dcnode-id="2898" instrument_node="">Early ’90s Predictions</span></a></li><li class="menu-item menu-item-type-post_type menu-item-object-page menu-item-840" data-dcnode-id="2893" id="menu-item-840"><a data-dcnode-id="2894" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.elon.edu/u/imagining/time-capsule/150-years/"><span data-dcnode-id="2895" instrument_node="">Forward 150 / Back 150</span></a></li><li class="menu-item menu-item-type-post_type menu-item-object-page menu-item-837" data-dcnode-id="2890" id="menu-item-837"><a data-dcnode-id="2891" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.elon.edu/u/imagining/time-capsule/one-week/"><span data-dcnode-id="2892" instrument_node="">One Neighborhood, One Week On the Internet</span></a></li></ul></li><li class="menu-item menu-item-type-post_type menu-item-object-page menu-item-855" data-dcnode-id="2885" id="menu-item-855"><a data-dcnode-id="2886" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.elon.edu/u/imagining/vox-populi/"><span data-dcnode-id="2887" instrument_node="">Voices of the People</span></a></li></ul></div></div></nav><div class="hfeed site grid-container container grid-parent" data-dcnode-id="48" id="page"><div class="site-content" data-dcnode-id="49" id="content"><div class="content-area grid-parent mobile-grid-100 push-25 grid-75 tablet-push-25 tablet-grid-75" data-dcnode-id="146" id="primary"><main class="site-main" data-dcnode-id="147" id="main"><article class="post-46143 page type-page status-publish" data-dcnode-id="148" id="post-46143" itemscope="" itemtype="https://schema.org/CreativeWork"><div class="inside-article" data-dcnode-id="149"><header class="entry-header" data-dcnode-id="2878"><h1 class="entry-title" data-dcnode-id="2879" itemprop="headline"><span data-dcnode-id="2880" instrument_node="">Survey XII: What Is the Future of Ethical AI Design?</span></h1></header><div class="entry-content" data-dcnode-id="150" itemprop="text"><h2 data-dcnode-id="2876"><span data-dcnode-id="2877" instrument_node="">Majority fears the evolution of AI by 2030 will continue to be focused on optimizing profits and social control</span></h2><h4 data-dcnode-id="2871"><strong data-dcnode-id="2872"><a data-dcnode-id="2874" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.elon.edu/u/imagining/wp-content/uploads/sites/964/2021/06/The-Future-of-Ethical-AI-Design-Elon-Pew.pdf"><img alt="" class="alignright wp-image-46220" data-dcnode-id="2875" height="300" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.elon.edu/u/imagining/wp-content/uploads/sites/964/2021/04/DGraphic-AI-Design--1024x1024.jpg&amp;raw" srcset="https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/04/DGraphic-AI-Design--1024x1024.jpg 1024w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/04/DGraphic-AI-Design--150x150.jpg 150w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/04/DGraphic-AI-Design--300x300.jpg 300w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/04/DGraphic-AI-Design--768x768.jpg 768w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/04/DGraphic-AI-Design-.jpg 1170w" width="300"></a><span data-dcnode-id="2873" instrument_node="">Machine-driven algorithms are swiftly becoming a dominant force, thus global attention has turned to the purpose and impact of artificial intelligence (AI). Of primary concern to many experts in this 2020 canvassing is the fact that humanity’s rapidly advancing AI ecosystem is developed and dominated by businesses seeking to compete and maximize profits and by governments seeking to compete, surveil and exert control. A majority said it is quite unlikely that AI design will evolve to be more focused on the common good by 2030.&nbsp;They also noted that ethical behaviors and outcomes are extremely difficult to define, implement and enforce.&nbsp;</span></strong></h4><p data-dcnode-id="2867"><strong data-dcnode-id="2869"><span data-dcnode-id="2870" instrument_node="">Results released June 16, 2021</span></strong><span data-dcnode-id="2868" instrument_node=""> – Pew Research Center and Elon University’s Imagining the Internet Center asked experts where they thought efforts aimed at ethical artificial intelligence design would stand in the year 2030. Some 602 technology innovators, developers, business and policy leaders, researchers and activists responded to this specific question.</span></p><h4 data-dcnode-id="2864"><strong data-dcnode-id="2865"><span data-dcnode-id="2866" instrument_node="">This page carries the full 127-page report in one online scroll; you can also read the digital PDF online or download it by clicking on the related graphic.</span></strong></h4><p data-dcnode-id="2857" style="padding-left: 30px"><em data-dcnode-id="2858"><strong data-dcnode-id="2860"><a data-dcnode-id="2862" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.elon.edu/u/imagining/wp-content/uploads/sites/964/2021/06/The-Future-of-Ethical-AI-Design-Elon-Pew.pdf"><img alt="" class="alignright wp-image-46336" data-dcnode-id="2863" height="367" sizes="(max-width: 284px) 100vw, 284px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.elon.edu/u/imagining/wp-content/uploads/sites/964/2021/04/Report-Cover-Elon-Pew-Ethical-AI-Design-791x1024.png&amp;raw" srcset="https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/04/Report-Cover-Elon-Pew-Ethical-AI-Design-791x1024.png 791w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/04/Report-Cover-Elon-Pew-Ethical-AI-Design-232x300.png 232w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/04/Report-Cover-Elon-Pew-Ethical-AI-Design-768x994.png 768w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/04/Report-Cover-Elon-Pew-Ethical-AI-Design.png 1082w" width="284"></a><span data-dcnode-id="2861" instrument_node="">The Question –</span></strong><span data-dcnode-id="2859" instrument_node="">&nbsp;Regarding the application of AI Ethics by 2030:&nbsp;In recent years, there have been scores of convenings and even more papers generated proposing ethical frameworks for the application of artificial intelligence (AI). They cover a host of issues including transparency, justice and fairness, privacy, freedom and human autonomy, beneficence and non-maleficence, freedom, trust, sustainability and dignity. Our questions here seek your predictions about the possibilities for such efforts.&nbsp;By 2030, will most of the AI systems being used by organizations of all sorts employ ethical principles focused primarily on the public good, yes or no? Follow-ups requested in written elaboration:&nbsp;Will AI mostly be used in ethical or questionable ways in the next decade? Why? What gives you the most hope? What worries you the most? How do you see AI applications making a difference in the lives of most people? As you look at the global competition over AI systems, what issues concern you or excite you?</span></em></p><p data-dcnode-id="2854"><strong data-dcnode-id="2855"><span data-dcnode-id="2856" instrument_node="">602 respondents answered the yes-no question</span></strong></p><ul data-dcnode-id="2835"><li data-dcnode-id="2845"><strong data-dcnode-id="2852"><span data-dcnode-id="2853" instrument_node="">68%&nbsp;</span></strong><span data-dcnode-id="2851" instrument_node="">said they expect that ethical principles focused primarily on the public good </span><em data-dcnode-id="2847"><strong data-dcnode-id="2848"><span data-dcnode-id="2849" style="text-decoration: underline"><span data-dcnode-id="2850" instrument_node="">will not</span></span></strong></em><span data-dcnode-id="2846" instrument_node=""> be employed in most AI systems by 2030.</span></li><li data-dcnode-id="2836"><strong data-dcnode-id="2843"><span data-dcnode-id="2844" instrument_node="">32%</span></strong><span data-dcnode-id="2842" instrument_node="">&nbsp;said they expect or at least hope that ethical principles focused primarily on the public good </span><em data-dcnode-id="2838"><strong data-dcnode-id="2839"><span data-dcnode-id="2840" style="text-decoration: underline"><span data-dcnode-id="2841" instrument_node="">will</span></span></strong></em><span data-dcnode-id="2837" instrument_node=""> be employed in most AI systems&nbsp;by 2030.</span></li></ul><h3 data-dcnode-id="2833"><span data-dcnode-id="2834" instrument_node="">Among the key themes emerging in these respondents’ overall answers were:</span></h3><p data-dcnode-id="2801"><strong data-dcnode-id="2831"><span data-dcnode-id="2832" instrument_node="">* WORRIES</span></strong><span data-dcnode-id="2830" instrument_node="">&nbsp;</span><strong data-dcnode-id="2828"><span data-dcnode-id="2829" instrument_node="">–</span></strong><span data-dcnode-id="2827" instrument_node=""> </span><span data-dcnode-id="2824" style="text-decoration: underline"><em data-dcnode-id="2825"><span data-dcnode-id="2826" instrument_node="">It is difficult to define “ethical” AI</span></em></span><span data-dcnode-id="2823" instrument_node="">: Context matters. There are cultural differences, and the nature and power of the actors in any given scenario are crucial. Norms and standards are currently under discussion, but global consensus may not be likely. In addition, formal ethics training and emphasis is not embedded in the human systems creating AI.&nbsp;</span><em data-dcnode-id="2820"><strong data-dcnode-id="2821"><span data-dcnode-id="2822" instrument_node="">–</span></strong></em><span data-dcnode-id="2817" style="text-decoration: underline"><em data-dcnode-id="2818"><span data-dcnode-id="2819" instrument_node=""> Control of AI is concentrated in the hands of powerful companies and governments driven by motives other than ethical concerns</span></em></span><span data-dcnode-id="2816" instrument_node="">: Over the next decade, AI development will continue to be aimed at finding ever-more-sophisticated ways to exert influence over people’s emotions and beliefs in order to convince them to buy goods, services and ideas.&nbsp;</span><strong data-dcnode-id="2814"><span data-dcnode-id="2815" instrument_node="">–</span></strong><span data-dcnode-id="2813" instrument_node=""> </span><span data-dcnode-id="2810" style="text-decoration: underline"><em data-dcnode-id="2811"><span data-dcnode-id="2812" instrument_node="">The AI genie is already out of the bottle, abuses are already occurring, and some are not very visible and hard to remedy</span></em></span><span data-dcnode-id="2809" instrument_node="">: AI applications are already at work in systems that are opaque at best and, at worst, impossible to dissect. How can ethical standards be applied under these conditions? While history has shown that when abuses arise as new tools are introduced societies always adjust and work to find remedies, this time it’s different. AI is a major threat.&nbsp;</span><strong data-dcnode-id="2807"><span data-dcnode-id="2808" instrument_node="">–</span></strong><span data-dcnode-id="2806" instrument_node=""> </span><span data-dcnode-id="2803" style="text-decoration: underline"><em data-dcnode-id="2804"><span data-dcnode-id="2805" instrument_node="">Global competition, especially between China and the U.S., will matter more to the development of AI than any ethical issues</span></em></span><span data-dcnode-id="2802" instrument_node="">: There is an arms race between the two tech superpowers that overshadows concerns about ethics. Plus, the two countries define ethics in different ways. The acquisition of techno-power is the real impetus for advancing AI systems. Ethics takes a back seat.</span></p><p data-dcnode-id="2782"><strong data-dcnode-id="2799"><span data-dcnode-id="2800" instrument_node="">* HOPES</span></strong><span data-dcnode-id="2798" instrument_node="">&nbsp;</span><strong data-dcnode-id="2796"><span data-dcnode-id="2797" instrument_node="">–</span></strong><span data-dcnode-id="2795" instrument_node=""> </span><span data-dcnode-id="2792" style="text-decoration: underline"><em data-dcnode-id="2793"><span data-dcnode-id="2794" instrument_node="">AI advances are inevitable; we will work on fostering ethical AI design</span></em></span><span data-dcnode-id="2791" instrument_node="">: More applications will emerge to help make people’s lives easier and safer. Healthcare breakthroughs are coming that will allow better diagnosis and treatment, some of which will emerge from personalized medicine that radically improves the human condition. All systems can be enhanced by AI; thus, it is likely that support for ethical AI will grow.&nbsp;– </span><span data-dcnode-id="2788" style="text-decoration: underline"><em data-dcnode-id="2789"><span data-dcnode-id="2790" instrument_node="">A consensus around ethical AI is emerging and open-source solutions can help</span></em></span><span data-dcnode-id="2787" instrument_node="">: There has been extensive study and discourse around ethical AI for several years, and it is bearing fruit. Many groups working on this are focusing on the already-established ethics of the biomedical community. – </span><span data-dcnode-id="2784" style="text-decoration: underline"><em data-dcnode-id="2785"><span data-dcnode-id="2786" instrument_node="">Ethics will evolve and progress will come as different fields show the way</span></em></span><span data-dcnode-id="2783" instrument_node="">: No technology endures if it broadly delivers unfair or unwanted outcomes. The market and legal systems will drive out the worst AI systems. Some fields will be faster to the mark in getting ethical AI rules and code in place, and they will point the way for laggards.</span></p><p data-dcnode-id="2778"><a data-dcnode-id="2779" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.elon.edu/u/imagining/wp-content/uploads/sites/964/2021/06/News-ReleaseEthical-AI-Design-6.16.21.pdf"><strong data-dcnode-id="2780"><span data-dcnode-id="2781" instrument_node="">A news release with a nutshell version of analysis/findings is available here</span></strong></a></p><p data-dcnode-id="2772"><strong data-dcnode-id="2773"><span data-dcnode-id="2777" instrument_node="">Choose a link below to read </span><em data-dcnode-id="2775"><span data-dcnode-id="2776" instrument_node="">only</span></em><span data-dcnode-id="2774" instrument_node=""> the expert responses, with no sort or analysis</span></strong></p><p data-dcnode-id="2768" style="padding-left: 30px"><a data-dcnode-id="2769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.elon.edu/u/imagining/surveys/xii-2021/ethical-ai-design-2030/credit/"><strong data-dcnode-id="2770"><span data-dcnode-id="2771" instrument_node="">All credited responses on the future of ethical AI design</span></strong></a></p><p data-dcnode-id="2763" style="padding-left: 30px"><strong data-dcnode-id="2764"><a data-dcnode-id="2766" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.elon.edu/u/imagining/surveys/xii-2021/ethical-ai-design-2030/anon/"><span data-dcnode-id="2767" instrument_node="">All anonymous responses on the future of ethical AI design</span></a><span data-dcnode-id="2765" instrument_node="">&nbsp;</span></strong></p><h2 data-dcnode-id="2761"><span data-dcnode-id="2762" instrument_node="">Summary of Key Findings and Full Report</span></h2><h3 data-dcnode-id="2759"><span data-dcnode-id="2760" instrument_node="">Experts are concerned that ethical AI design will not evolve</span></h3><h3 data-dcnode-id="2757"><span data-dcnode-id="2758" instrument_node="">A majority worries that the evolution of artificial intelligence by 2030 will continue to be primarily focused on optimizing profits and social control. They also cite the difficulty of achieving consensus about ethics. Many who expect positive progress say it is not likely within the next decade. Still, a portion celebrate coming AI breakthroughs that will improve life</span></h3><p data-dcnode-id="2754"><a data-dcnode-id="2755" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.elon.edu/u/imagining/wp-content/uploads/sites/964/2021/06/The-Future-of-Ethical-AI-Design-Elon-Pew.pdf"><img alt="" class="alignright wp-image-46208" data-dcnode-id="2756" height="244" sizes="(max-width: 450px) 100vw, 450px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.elon.edu/u/imagining/wp-content/uploads/sites/964/2021/04/Graphic-Ethical-AI-Design-Elon-Pew-1024x556.jpg&amp;raw" srcset="https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/04/Graphic-Ethical-AI-Design-Elon-Pew-1024x556.jpg 1024w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/04/Graphic-Ethical-AI-Design-Elon-Pew-300x163.jpg 300w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/04/Graphic-Ethical-AI-Design-Elon-Pew-768x417.jpg 768w" width="450"></a></p><p data-dcnode-id="2692"><span data-dcnode-id="2753" instrument_node="">Artificial intelligence systems “understand” and </span><a data-dcnode-id="2751" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Applications_of_artificial_intelligence%23List_of_applications"><span data-dcnode-id="2752" instrument_node="">shape a lot of what happens in people’s lives</span></a><span data-dcnode-id="2750" instrument_node="">. AI applications “speak” to people and answer questions when the name of a </span><a data-dcnode-id="2748" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.technologyreview.com/topic/artificial-intelligence/voice-assistants/"><span data-dcnode-id="2749" instrument_node="">digital voice assistant</span></a><span data-dcnode-id="2747" instrument_node=""> is called out. They run the </span><a data-dcnode-id="2745" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.drift.com/learn/chatbot/ai-chatbots/"><span data-dcnode-id="2746" instrument_node="">chatbots</span></a><span data-dcnode-id="2744" instrument_node=""> that handle customer-service issues people have with companies. They </span><a data-dcnode-id="2742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cancer.gov/research/areas/diagnosis/artificial-intelligence"><span data-dcnode-id="2743" instrument_node="">help diagnose cancer</span></a><span data-dcnode-id="2741" instrument_node="">&nbsp;and </span><a data-dcnode-id="2739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/326460"><span data-dcnode-id="2740" instrument_node="">other conditions</span></a><span data-dcnode-id="2738" instrument_node="">.They scour the </span><a data-dcnode-id="2736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pymnts.com/fraud-prevention/2021/ai-ml-fraud-customer-satisfaction/"><span data-dcnode-id="2737" instrument_node="">use of credit cards for signs of fraud</span></a><span data-dcnode-id="2735" instrument_node=""> and they determine who could be a </span><a data-dcnode-id="2733" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//brighterion.com/how-fis-use-ai-to-manage-credit-risk/"><span data-dcnode-id="2734" instrument_node="">credit risk</span></a><span data-dcnode-id="2732" instrument_node="">. They </span><a data-dcnode-id="2730" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ieeexplore.ieee.org/document/5608862"><span data-dcnode-id="2731" instrument_node="">help people drive</span></a><span data-dcnode-id="2729" instrument_node=""> from point A to point B and update traffic information to shorten travel times. They are the operating system of </span><a data-dcnode-id="2727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.machinedesign.com/mechanical-motion-systems/article/21838234/how-ai-is-paving-the-way-for-autonomous-cars"><span data-dcnode-id="2728" instrument_node="">driverless vehicles</span></a><span data-dcnode-id="2726" instrument_node="">. They sift applications to make recommendations about </span><a data-dcnode-id="2724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hbr.org/2019/04/the-legal-and-ethical-implications-of-using-ai-in-hiring"><span data-dcnode-id="2725" instrument_node="">job candidates</span></a><span data-dcnode-id="2723" instrument_node="">. They determine the material that is offered up in people’s </span><a data-dcnode-id="2721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.digitalinformationworld.com/2021/01/how-does-facebooks-ai-determine-users.html"><span data-dcnode-id="2722" instrument_node="">newsfeeds</span></a><span data-dcnode-id="2720" instrument_node=""> and </span><a data-dcnode-id="2718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.forbes.com/sites/bernardmarr/2019/08/23/the-amazing-ways-youtube-uses-artificial-intelligence-and-machine-learning/"><span data-dcnode-id="2719" instrument_node="">video choices</span></a><span data-dcnode-id="2717" instrument_node="">. They </span><a data-dcnode-id="2715" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/d41586-020-03413-y"><span data-dcnode-id="2716" instrument_node="">recognize people’s faces</span></a><span data-dcnode-id="2714" instrument_node="">, </span><a data-dcnode-id="2712" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pairaphrase.com/ai-language-translation-how-to-train-your-machine-translation-engine/"><span data-dcnode-id="2713" instrument_node="">translate languages</span></a><span data-dcnode-id="2711" instrument_node=""> and suggest how to </span><a data-dcnode-id="2709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbc.com/future/article/20190812-how-ai-powered-predictive-text-affects-your-brain"><span data-dcnode-id="2710" instrument_node="">complete people’s sentences or search queries</span></a><span data-dcnode-id="2708" instrument_node="">. They can </span><a data-dcnode-id="2706" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/d41586-021-00868-5"><span data-dcnode-id="2707" instrument_node="">“read” people’s emotions</span></a><span data-dcnode-id="2705" instrument_node="">. They </span><a data-dcnode-id="2703" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbc.com/news/technology-40042581"><span data-dcnode-id="2704" instrument_node="">beat them at sophisticated games</span></a><span data-dcnode-id="2702" instrument_node="">. They </span><a data-dcnode-id="2700" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Automated_journalism"><span data-dcnode-id="2701" instrument_node="">write news stories</span></a><span data-dcnode-id="2699" instrument_node="">, </span><a data-dcnode-id="2697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newscientist.com/article/2200791-ai-learns-to-paint-in-the-styles-of-van-gogh-turner-and-vermeer/"><span data-dcnode-id="2698" instrument_node="">paint in the style</span></a><span data-dcnode-id="2696" instrument_node=""> of Vermeer and Van Gogh and </span><a data-dcnode-id="2694" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbva.com/en/artificial-intelligence-resuscitates-beatles-bach/"><span data-dcnode-id="2695" instrument_node="">create music</span></a><span data-dcnode-id="2693" instrument_node=""> that sounds quite like the Beatles and Bach.</span></p><p data-dcnode-id="2682"><a data-dcnode-id="2690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//arxiv.org/pdf/1905.02092.pdf"><span data-dcnode-id="2691" instrument_node="">Corporations</span></a><span data-dcnode-id="2689" instrument_node=""> and </span><a data-dcnode-id="2687" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www-cdn.law.stanford.edu/wp-content/uploads/2020/02/ACUS-AI-Report.pdf"><span data-dcnode-id="2688" instrument_node="">governments</span></a><span data-dcnode-id="2686" instrument_node=""> are charging evermore expansively into AI development. Increasingly, there are </span><a data-dcnode-id="2684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.softwaretestingmaterial.com/artificial-intelligence-software/"><span data-dcnode-id="2685" instrument_node="">off-the-shelf, pre-built AI tools</span></a><span data-dcnode-id="2683" instrument_node=""> that non-programmers can set up as they prefer.</span></p><p data-dcnode-id="2662"><span data-dcnode-id="2681" instrument_node="">As this has unfolded, a number of experts and advocates around the world have become worried about the long-term impact and implications of AI applications. They have </span><a data-dcnode-id="2679" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/internet/2018/12/10/artificial-intelligence-and-the-future-of-humans/"><span data-dcnode-id="2680" instrument_node="">concerns</span></a><span data-dcnode-id="2678" instrument_node=""> about how advances in AI will affect what it means to be human, to be productive and to exercise free will. </span><a data-dcnode-id="2676" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//arxiv.org/ftp/arxiv/papers/1906/1906.11668.pdf"><span data-dcnode-id="2677" instrument_node="">Dozens</span></a><span data-dcnode-id="2675" instrument_node=""> of convenings and study groups </span><a data-dcnode-id="2673" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//zenodo.org/record/4067990%23.YMDz_pNKg-S"><span data-dcnode-id="2674" instrument_node="">have issued papers proposing</span></a><span data-dcnode-id="2672" instrument_node=""> what the tenets of ethical AI should be and </span><a data-dcnode-id="2670" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nscai.gov/wp-content/uploads/2021/03/Full-Report-Digital-1.pdf"><span data-dcnode-id="2671" instrument_node="">government</span></a><span data-dcnode-id="2669" instrument_node=""> </span><a data-dcnode-id="2667" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//digital-strategy.ec.europa.eu/en/library/ethics-guidelines-trustworthy-ai"><span data-dcnode-id="2668" instrument_node="">working</span></a><span data-dcnode-id="2666" instrument_node=""> </span><a data-dcnode-id="2664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//futureoflife.org/ai-policy-japan/"><span data-dcnode-id="2665" instrument_node="">teams</span></a><span data-dcnode-id="2663" instrument_node=""> have tried to address these issues.</span></p><p data-dcnode-id="2660"><span data-dcnode-id="2661" instrument_node="">In light of this, Pew Research Center and Elon University’s Imagining the Internet Center asked experts where they thought efforts aimed at ethical artificial intelligence design would stand in the year 2030. Some 602 technology innovators, developers, business and policy leaders, researchers and activists responded to this specific question:</span></p><p data-dcnode-id="2657" style="padding-left: 30px"><em data-dcnode-id="2658"><span data-dcnode-id="2659" instrument_node="">By 2030, will most of the AI systems being used by organizations of all sorts employ ethical principles focused primarily on the public good?</span></em></p><p data-dcnode-id="2649"><span data-dcnode-id="2656" instrument_node="">In response </span><strong data-dcnode-id="2654"><span data-dcnode-id="2655" instrument_node="">68%</span></strong><span data-dcnode-id="2653" instrument_node=""> chose the option declaring that ethical principles focused primarily on the public good will not be employed in most AI systems by 2030; </span><strong data-dcnode-id="2651"><span data-dcnode-id="2652" instrument_node="">32%</span></strong><span data-dcnode-id="2650" instrument_node=""> chose the option positing that ethical principles focused primarily on the public good will be employed in most AI systems&nbsp;by 2030.</span></p><p data-dcnode-id="2647"><span data-dcnode-id="2648" instrument_node="">This is a nonscientific canvassing, based on a nonrandom sample. The results represent only the opinions of the individuals who responded to the queries and are not projectable to any other population.</span></p><p data-dcnode-id="2645"><span data-dcnode-id="2646" instrument_node="">The bulk of this report covers these experts’ written answers explaining their responses. They sounded many broad themes about the ways in which individuals and groups are accommodating to adjusting to AI systems. It is important to note that the responses were gathered in the summer of 2020 in a different cultural context amid the pandemic, before COVID-19 vaccines had been approved, at a time when racial justice issues were particularly prominent in the U.S. and before the conclusion of the U.S. presidential election.</span></p><p data-dcnode-id="2634"><span data-dcnode-id="2644" instrument_node="">In addition, these responses came prior to the most recent studies aimed at addressing issues in ethical AI design and development. For instance, in early 2021 the Stanford Institute for Human-Centered Artificial Intelligence released an updated </span><a data-dcnode-id="2642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hai.stanford.edu/research/ai-index-2021"><span data-dcnode-id="2643" instrument_node="">AI Index Report</span></a><span data-dcnode-id="2641" instrument_node="">, the IEEE deepened its focus on </span><a data-dcnode-id="2639" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//standards.ieee.org/initiatives/artificial-intelligence-systems/index.html"><span data-dcnode-id="2640" instrument_node="">setting standards for AI systems</span></a><span data-dcnode-id="2638" instrument_node=""> and the U.S. National Security Commission on AI, headed by tech leaders including Eric Schmidt, Andy Jassy, Eric Horvitz, Katharina McFarland and Robert Work, released its massive report on </span><a data-dcnode-id="2636" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nscai.gov/wp-content/uploads/2021/03/Full-Report-Digital-1.pdf"><span data-dcnode-id="2637" instrument_node="">accelerating innovation while defending against malign uses of AI</span></a><span data-dcnode-id="2635" instrument_node="">.</span></p><p data-dcnode-id="2632"><span data-dcnode-id="2633" instrument_node="">The key themes these experts voiced in the written elaborations explaining their choices are outlined in the accompanying tables.</span></p><p data-dcnode-id="2630"><img alt="" class="wp-image-46414 aligncenter" data-dcnode-id="2631" height="1084" sizes="(max-width: 780px) 100vw, 780px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.elon.edu/u/imagining/wp-content/uploads/sites/964/2021/06/Ethical-AI-Design-Elon-Pew-Themes-Graphic.png&amp;raw" srcset="https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/Ethical-AI-Design-Elon-Pew-Themes-Graphic.png 944w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/Ethical-AI-Design-Elon-Pew-Themes-Graphic-216x300.png 216w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/Ethical-AI-Design-Elon-Pew-Themes-Graphic-768x1067.png 768w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/Ethical-AI-Design-Elon-Pew-Themes-Graphic-737x1024.png 737w" width="780"></p><p data-dcnode-id="2628"><span data-dcnode-id="2629" instrument_node="">The respondents whose insights are shared in this report focus their lives on technology and its study. They addressed some of the toughest questions that cultures confront. How do you apply ethics to any situation? Is maximum freedom the ethical imperative or is maximum human safety? Should systems steer clear of activities that substantially impact human agency, allowing people to make decisions for themselves, or should they be set up to intervene when it seems clear that human decision-making may be harmful?</span></p><p data-dcnode-id="2623"><span data-dcnode-id="2627" instrument_node="">They wrestled with the meaning of such grand concepts as beneficence, nonmaleficence, autonomy and justice (</span><a data-dcnode-id="2625" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC6404626/"><span data-dcnode-id="2626" instrument_node="">the foundational considerations of bioethicists</span></a><span data-dcnode-id="2624" instrument_node="">) when it comes to tech systems. Some described their approach as a comparative one: It’s not whether AI systems alone produce questionable ethical outcomes, it’s whether the AI systems are less biased than the current human systems and their known biases. A share of these respondents began their comments on our question by arguing that the issue is not, “What do we want AI to be?” Instead, they noted the issue should be, “What kind of humans do we want to be? How do we want to evolve as a species?”</span></p><p data-dcnode-id="2621"><span data-dcnode-id="2622" instrument_node="">Many experts noted that much is at stake in these arguments. AI systems will be used in ways that affect people’s livelihoods and well-being – their jobs, their family environment, their access to things like housing and credit, the way they move around, the things they buy, the cultural activities to which they are exposed, their leisure activities and even what they believe to be true. One respondent noted, “Rabelais used to say, ‘Science without conscience is the ruin of the soul.’”</span></p><p data-dcnode-id="2619"><span data-dcnode-id="2620" instrument_node="">In the next pages, we quote some of the experts who gave wide-ranging answers to our question about the future of ethical AI. After that, there is a chapter covering the responses that touched on the most troubling concerns these experts have about AI and another chapter with comments from those who expressed hope these issues will be sorted out by the year 2030 or soon thereafter.</span></p><p data-dcnode-id="2617"><span data-dcnode-id="2618" instrument_node="">The respondents’ remarks reflect their personal positions and are not the positions of their employers; the descriptions of their leadership roles help identify their background and the locus of their expertise. Some responses are lightly edited for style and readability.</span></p><h3 data-dcnode-id="2613"><em data-dcnode-id="2614"><strong data-dcnode-id="2615"><span data-dcnode-id="2616" instrument_node="">Following is a selection of some of the most-comprehensive overarching responses shared by 35 of the thought leaders participating in this canvassing. The fuller report, with thousands of quotes that are sorted by the themes in the graphic above, comes after this long section.</span></strong></em></h3><h4 data-dcnode-id="2611"><span data-dcnode-id="2612" instrument_node="">We do not acknowledge that our gadgets change us and they may abridge our humanity, compassion, empathy and social fabric</span></h4><figure class="wp-caption alignright" data-dcnode-id="2607" id="attachment_46434" style="width: 450px"><img alt="" class="wp-image-46434" data-dcnode-id="2610" height="259" sizes="(max-width: 460px) 100vw, 460px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.elon.edu/u/imagining/wp-content/uploads/sites/964/2021/06/2021-Barry-Chudakov-The-Future-of-Ethical-AI-Design34.jpg&amp;raw" srcset="https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Barry-Chudakov-The-Future-of-Ethical-AI-Design34.jpg 2500w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Barry-Chudakov-The-Future-of-Ethical-AI-Design34-300x169.jpg 300w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Barry-Chudakov-The-Future-of-Ethical-AI-Design34-768x432.jpg 768w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Barry-Chudakov-The-Future-of-Ethical-AI-Design34-1024x576.jpg 1024w" width="460"><figcaption class="wp-caption-text" data-dcnode-id="2608"><span data-dcnode-id="2609" instrument_node="">Quote graphics by Tommy Kopetskie</span></figcaption></figure><p data-dcnode-id="2601"><strong data-dcnode-id="2605"><span data-dcnode-id="2606" instrument_node="">Bar</span></strong><strong data-dcnode-id="2603"><span data-dcnode-id="2604" instrument_node="">ry Chudakov</span></strong><span data-dcnode-id="2602" instrument_node="">, founder and principal of Sertain Research, said, “Before answering whether AI will mostly be used in ethical or questionable ways in the next decade, a key question for guidance going forward will be, What is the ethical framework for understanding and managing artificial intelligence? Our ethical frameworks grew out of tribal wisdom, which was set down in so-called holy books that were the foundation of religions. These have been the ethical frameworks for the Judeo-Christian–Islamic–Buddhist world. While the humanitarian precepts of these teachings are valid today, modern technologies and artificial intelligence raise a host of AI quandaries these frameworks simply don’t address. Issues such as management of multiple identities; the impingement of the virtual world on the actual world and how boundaries should be drawn – if boundaries should be drawn; striking a balance between screen time and real-world time; parsing, analyzing and improving the use of tracking data to ensure individual liberty; collecting, analyzing and manipulating data exhaust from online ventures to ensure citizen privacy; the use of facial recognition technologies, at the front door of homes and by municipal police forces, to stop crime. That is a small set of examples, but there are many more that extend to air and water pollution, climate degradation, warfare, finance and investment trading and civil rights.</span></p><p data-dcnode-id="2593"><span data-dcnode-id="2600" instrument_node="">“Our ethical book is half-written. While we would not suggest our existing ethical frameworks have no value, there are pages and chapters missing. Further, while we have a host of regulatory injunctions such as speed limits, tax rates, mandatory housing codes and permits, etc., we consider our devices so much a part of our bodies that we use them without a moment’s thought for their effects upon the user. We accept the algorithms that enhance our searches and follow us around the internet and suggest another brand of facial moisturizer as a new wrinkle on a convenience and rarely give it a second thought. We do not acknowledge that our technologies change us as we use them; that our thinking and behaviors are altered by the cyber effect (</span><a data-dcnode-id="2598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.maryaiken.com/cyber-effect"><span data-dcnode-id="2599" instrument_node="">Mary Aiken</span></a><span data-dcnode-id="2597" instrument_node="">); that devices and gadgets don’t just turn us into gadget junkies, they may abridge our humanity, compassion, empathy and social fabric. As Greg Brockman, co-founder of OpenAI, </span><a data-dcnode-id="2595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fastcompany.com/90396213/google-quantum-supremacy-future-ai-humanity"><span data-dcnode-id="2596" instrument_node="">remarked</span></a><span data-dcnode-id="2594" instrument_node="">: ‘Now is the time to ask questions. Think about the kinds of thoughts you wish people had inventing fire, starting the industrial revolution, or [developing] atomic power.’</span></p><p data-dcnode-id="2585"><span data-dcnode-id="2592" instrument_node="">“Will AI mostly be used in ethical or questionable ways the next decade? I would start answering this question by referencing what Derrick de Kerckhove described recently </span><a data-dcnode-id="2590" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//noemalab.eu/memo/events/consciousness-reframed-x-experiencing-design-behaving-media/"><span data-dcnode-id="2591" instrument_node="">in his ‘Five Words for the Future’</span></a><span data-dcnode-id="2589" instrument_node="">: Big data is a paradigmatic change from networks and databases. The chief characteristic of big data is that the information does not exist until the question. It is not like the past where you didn’t know where the information was; it was somewhere, and you just had to find it. Now, and it’s a big challenge to intelligence, you create the answer by the question. (Ethics then effectively becomes) ‘How do you create the right question for the data?’ So, for AI to be mostly used in ethical ways, we must become comfortable with not knowing; with needing to ask the right question and understanding that this is an iterative process that is exploratory – not dogmatic. Beginner’s mind (</span><a data-dcnode-id="2587" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DvjpXPECBi5o"><span data-dcnode-id="2588" instrument_node="">Shunryu Suzuki</span></a><span data-dcnode-id="2586" instrument_node="">) becomes our first principle – the understanding from which ethics flows. Many of our ethical frameworks have been built on dogmatic injunctions: Thou shalt and shalt not. Thus, big data effectively reimagines ethical discourse: If until you ask the question, you will not hear or know the answer, you proceed from unknowing. With that understanding, for AI to be used in ethical ways, and to avoid questionable approaches, we must begin by reimagining ethics itself.”</span></p><h4 data-dcnode-id="2582" style="padding-left: 30px"><img alt="" class="alignright wp-image-46458" data-dcnode-id="2584" height="259" sizes="(max-width: 460px) 100vw, 460px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.elon.edu/u/imagining/wp-content/uploads/sites/964/2021/06/2021-Mike-Godwin-The-Future-of-Ethical-AI-Design7.jpg&amp;raw" srcset="https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Mike-Godwin-The-Future-of-Ethical-AI-Design7.jpg 2500w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Mike-Godwin-The-Future-of-Ethical-AI-Design7-300x169.jpg 300w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Mike-Godwin-The-Future-of-Ethical-AI-Design7-768x432.jpg 768w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Mike-Godwin-The-Future-of-Ethical-AI-Design7-1024x576.jpg 1024w" width="460"><span data-dcnode-id="2583" instrument_node="">No matter how this complex problem is tackled, responses will be piecemeal and limited</span></h4><p data-dcnode-id="2578" style="padding-left: 30px"><strong data-dcnode-id="2580"><span data-dcnode-id="2581" instrument_node="">Mike Godwin</span></strong><span data-dcnode-id="2579" instrument_node="">, former general counsel for the Wikimedia Foundation and creator of Godwin’s Law, wrote, “The most likely outcome, even in the face of increasing public discussions and convenings regarding ethical AI, will be that governments and public policy will be slow to adapt. The costs of AI-powered technologies will continue to decline, making deployment prior to privacy guarantees and other ethical safeguards more likely. The most likely scenario is that some kind of public abuse of AI technologies will come to light, and this will trigger reactive limitations on the use of AI, which will either be blunt-instrument categorical restrictions on its use or (more likely) a patchwork of particular ethical limitations addressed to particular use cases, with unrestricted use occurring outside the margins of these limitations.”</span></p><h4 data-dcnode-id="2576"><span data-dcnode-id="2577" instrument_node="">Sometimes there are no good answers, only varieties of bad outcomes</span></h4><p data-dcnode-id="2571"><strong data-dcnode-id="2573"><img alt="" class="alignright wp-image-46474" data-dcnode-id="2575" height="259" sizes="(max-width: 460px) 100vw, 460px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.elon.edu/u/imagining/wp-content/uploads/sites/964/2021/06/2021-Jamais-Cascio-Future-of-Ethical-AI-Design30.jpg&amp;raw" srcset="https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Jamais-Cascio-Future-of-Ethical-AI-Design30.jpg 2500w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Jamais-Cascio-Future-of-Ethical-AI-Design30-300x169.jpg 300w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Jamais-Cascio-Future-of-Ethical-AI-Design30-768x432.jpg 768w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Jamais-Cascio-Future-of-Ethical-AI-Design30-1024x576.jpg 1024w" width="460"><span data-dcnode-id="2574" instrument_node="">Jamais Cascio</span></strong><span data-dcnode-id="2572" instrument_node="">, research fellow at the Institute for the Future, observed, “I expect that there will be an effort to explicitly include ethical systems in AI that have direct interaction with humans but largely in the most clear-cut, unambiguous situations. The most important ethical dilemmas are ones where the correct behavior by the machine is situational: Health care AI that intentionally lies to memory care patients rather than re-traumatize them with news of long-dead spouses; military AI that recognizes and refuses an illegal order; all of the ‘trolley problem’-type dilemmas where there are no good answers, only varieties of bad outcomes. But, more importantly, the vast majority of AI systems will be deployed in systems for which ethical questions are indirect, even if they ultimately have outcomes that could be harmful.</span></p><p data-dcnode-id="2569"><span data-dcnode-id="2570" instrument_node="">“High-frequency trading AI will not be programmed to consider the ethical results of stock purchases. Deepfake AIs will not have built-in restrictions on use. And so forth.</span></p><p data-dcnode-id="2567"><span data-dcnode-id="2568" instrument_node="">“What concerns me the most about the wider use of AI is the lack of general awareness that digital systems can only manage problems that can be put in a digital format. An AI can’t reliably or consistently handle a problem that can’t be quantified. There are situations and systems for which AI is a perfect tool, but there are important arenas – largely in the realm of human behavior and personal interaction – where the limits of AI can be problematic. I would hate to see a world where some problems are ignored because we can’t easily design an AI response.”</span></p><h4 data-dcnode-id="2565"><span data-dcnode-id="2566" instrument_node="">AI is more capable than humans of delivering unemotional ethical judgment</span></h4><p data-dcnode-id="2561" style="padding-left: 30px"><strong data-dcnode-id="2563"><span data-dcnode-id="2564" instrument_node="">Marcel Fafchamps</span></strong><span data-dcnode-id="2562" instrument_node="">, professor of economics and senior fellow at the Center on Democracy, Development and the Rule of Law at Stanford University, commented, “AI is just a small cog in a big system. The main danger currently associated with AI is that machine learning reproduces past discrimination – e.g., in judicial processes for setting bail, sentencing or parole review. But if there hadn’t been discrimination in the first place, machine learning would have worked fine. This means that AI, in this example, offers the possibility of improvement over unregulated social processes.</span></p><p data-dcnode-id="2559" style="padding-left: 30px"><span data-dcnode-id="2560" instrument_node="">“A more subtle danger is when humans are actually more generous than machine-learning algorithms. For instance, it has been shown that judges are more lenient toward first offenders than machine learning in the sense that machine learning predicts a high probability of reoffending, and this probability is not taken into account by judges when sentencing. In other words, judges give first offenders ‘a second chance,’ a moral compass that the algorithm lacks. But, more generally, the algorithm only does what it is told to do: If the law that has been voted on by the public ends up throwing large fractions of poor young males in jail, then that’s what the algorithm will implement, removing the judge’s discretion to do some minor adjustment at the margin. Don’t blame AI for that: Blame the criminal justice system that has been created by voters.</span></p><p data-dcnode-id="2556" style="padding-left: 30px"><img alt="" class="alignright wp-image-46478" data-dcnode-id="2558" height="259" sizes="(max-width: 460px) 100vw, 460px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.elon.edu/u/imagining/wp-content/uploads/sites/964/2021/06/2021-Marcel-Fafchamps-The-Future-of-Ethical-AI-Design42.jpg&amp;raw" srcset="https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Marcel-Fafchamps-The-Future-of-Ethical-AI-Design42.jpg 2500w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Marcel-Fafchamps-The-Future-of-Ethical-AI-Design42-300x169.jpg 300w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Marcel-Fafchamps-The-Future-of-Ethical-AI-Design42-768x432.jpg 768w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Marcel-Fafchamps-The-Future-of-Ethical-AI-Design42-1024x576.jpg 1024w" width="460"><span data-dcnode-id="2557" instrument_node="">“A more pernicious development is the loss of control people will have over their immediate environment, e.g., when their home appliances will make choices for them ‘in their interest.’ Again, this is not really new. But it will occur in a new way. My belief is as follows:</span></p><p data-dcnode-id="2554" style="padding-left: 30px"><span data-dcnode-id="2555" instrument_node="">1) By construction, AI implicitly or explicitly integrates ethical principles, whether people realize it or not. This is most easily demonstrated in the case of self-driving cars but will apply to all self-‘something’ technology, including health care AI apps, for instance. A self-driving car must, at some point, decide whether to protect its occupants or protect other people on the road. A human driver would make a choice partly based on social preferences, as has been shown for instance in ‘The Moral Machine Experiment’ (Nature, 2018), partly based on moral considerations (e.g., did the pedestrian have the right to be on the path of the car at that time? In the March 2018 fatality in Tempe, Florida, a human driver could have argued that the pedestrian ‘appeared out of nowhere’ in order to be exonerated).</span></p><p data-dcnode-id="2552" style="padding-left: 30px"><span data-dcnode-id="2553" instrument_node="">2) The fact that AI integrates ethical principles does not mean that it integrates ‘your’ preferred ethical principles. So the question is not whether it integrates ethical principles, but which ethical principles it integrates.</span></p><p data-dcnode-id="2550" style="padding-left: 30px"><span data-dcnode-id="2551" instrument_node="">“Here, the main difficulty will be that human morality is not always rational or even predictable. Hence, whatever principle is built into AI, there will be situations in which the application of that ethical principle to a particular situation will be found unacceptable by many people, no matter how well-meant that principle was. To minimize this possibility, the guideline at this point in time is to embed into AI whatever factual principles are applied by courts. This should minimize court litigation. But, of course, if the principles applied by courts are detrimental to certain groups, this will be reproduced by AI.</span></p><p data-dcnode-id="2548" style="padding-left: 30px"><span data-dcnode-id="2549" instrument_node="">“What would be really novel would be to take AI as an opportunity to introduce more coherent ethical judgment than what people make based on an immediate emotional reaction. For instance, if the pedestrian in Tempe had been a just-married young bride, a pregnant woman or a drug offender, people would judge the outcome differently, even though, at the moment of the accident, this could not be deduced by the driver, whether human or AI. That does not make good sense: An action cannot be judged differently based on a consequence that was materially unpredictable to the perpetrator. AI can be an opportunity to improve the ethical behavior of cars (and other apps), based on rational principles instead of knee-jerk emotional reaction.”</span></p><h4 data-dcnode-id="2546"><span data-dcnode-id="2547" instrument_node="">Global politics and rogue actors are oft-ignored aspects to consider</span></h4><p data-dcnode-id="2541"><strong data-dcnode-id="2543"><img alt="" class="alignright wp-image-46486" data-dcnode-id="2545" height="259" sizes="(max-width: 460px) 100vw, 460px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.elon.edu/u/imagining/wp-content/uploads/sites/964/2021/06/2021-Amy-Webb-The-Future-of-Ethical-AI-Design.jpg&amp;raw" srcset="https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Amy-Webb-The-Future-of-Ethical-AI-Design.jpg 2500w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Amy-Webb-The-Future-of-Ethical-AI-Design-300x169.jpg 300w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Amy-Webb-The-Future-of-Ethical-AI-Design-768x432.jpg 768w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Amy-Webb-The-Future-of-Ethical-AI-Design-1024x576.jpg 1024w" width="460"><span data-dcnode-id="2544" instrument_node="">Amy Webb</span></strong><span data-dcnode-id="2542" instrument_node="">, founder of the Future Today Institute, wrote, “We’re living through a precarious moment in time. China is shaping the world order in its own image, and it is exporting its technologies and surveillance systems to other countries around the world. As China expands into African countries and throughout Southeast Asia and Latin America, it will also begin to eschew operating systems, technologies and infrastructure built by the West. China has already announced that it will no longer use U.S.-made computers and software. China is rapidly expanding its 5G and mobile footprints. At the same time, China is drastically expanding its trading partners. While India, Japan and South Korea have plenty of technologies to offer the world, it would appear as though China is quickly ascending to global supremacy. At the moment, the U.S. is enabling this, and our leaders do not appear to be thinking about the long-term consequences.</span></p><p data-dcnode-id="2539"><span data-dcnode-id="2540" instrument_node="">“When it comes to AI, we should pay close attention to China, which has talked openly about its plans for cyber sovereignty. But we should also remember that there are cells of rogue actors who could cripple our economies simply by mucking with the power or traffic grids, causing traffic spikes on the internet or locking us out of our connected home appliances. These aren’t big, obvious signs of aggression, and that is a problem for many countries, including the United States. Most governments don’t have a paradigm describing a constellation of aggressive actions. Each action on its own might be insignificant. What are the escalation triggers? We don’t have a definition, and that creates a strategic vulnerability.”</span></p><h4 data-dcnode-id="2537" style="padding-left: 30px"><span data-dcnode-id="2538" instrument_node="">Concentrated wealth works against hope for a Human Spring and social justice</span></h4><p data-dcnode-id="2533" style="padding-left: 30px"><strong data-dcnode-id="2535"><span data-dcnode-id="2536" instrument_node="">Stowe Boyd</span></strong><span data-dcnode-id="2534" instrument_node="">, consulting futurist expert in technological evolution and the future of work, noted, “I have projected a social movement that would require careful application of AI as one of several major pillars. I’ve called this the Human Spring, conjecturing that a worldwide social movement will arise in 2023, demanding the right to work and related social justice issues, a massive effort to counter climate catastrophe, and efforts to control artificial intelligence. AI, judiciously used, can lead to breakthroughs in many areas. But widespread automation of many kinds of work – unless introduced gradually, and not as fast as profit-driven companies would like – could be economically destabilizing.</span></p><p data-dcnode-id="2531" style="padding-left: 30px"><span data-dcnode-id="2532" instrument_node="">“I’m concerned that AI will most likely be concentrated in the hands of corporations who are in the business of concentrating wealth for their owners and not primarily driven by bettering the world for all of us. AI applied in narrow domains that are really beyond the reach of human cognition – like searching for new ways to fold proteins to make new drugs or optimizing logistics to minimize the number of miles that trucks drive everyday – are sensible and safe applications of AI. But AI directed toward making us buy consumer goods we don’t need or surveilling everyone moving through public spaces to track our every move, well, that should be prohibited.”</span></p><h4 data-dcnode-id="2529"><span data-dcnode-id="2530" instrument_node="">The principal use of AI is likely to remain convincing people to buy things they don’t need</span></h4><p data-dcnode-id="2525"><strong data-dcnode-id="2527"><span data-dcnode-id="2528" instrument_node="">Jonathan Grudin</span></strong><span data-dcnode-id="2526" instrument_node="">, principal researcher with the Natural Interaction Group at Microsoft Research, said, “The past quarter-century has seen an accelerating rise of online bad actors (not all of whom would agree they are bad actors) and an astronomical rise in the costs of efforts to combat them, with AI figuring in this. We pose impossible demands: We would like social media to preserve individual privacy but also identify Russian or Chinese hackers that will require sophisticated construction of individual behavior patterns.</span></p><p data-dcnode-id="2523"><span data-dcnode-id="2524" instrument_node="">“The principal use of AI is likely to be finding ever more sophisticated ways to convince people to buy things that they don’t really need, leaving us deeper in debt with no money to contribute to efforts to combat climate change, environmental catastrophe, social injustice and inequality and so on.”</span></p><h4 data-dcnode-id="2521" style="padding-left: 30px"><span data-dcnode-id="2522" instrument_node="">User-experience designers must play a key role in shaping human control of systems</span></h4><p data-dcnode-id="2517" style="padding-left: 30px"><strong data-dcnode-id="2519"><span data-dcnode-id="2520" instrument_node="">Ben Shneiderman</span></strong><span data-dcnode-id="2518" instrument_node="">, distinguished professor of computer science and founder of Human Computer Interaction Lab, University of Maryland, commented, “Ethical principles (responsibility, fairness, transparency, accountability, auditability, explainable, reliable, resilient, safe, trustworthy) are a good starting point, but much more is needed to bridge the gap with the realities of practice in software engineering, organization management and independent oversight. … I see promising early signs. A simple step is a flight data recorder for every robot and AI system. The methods that have made civil aviation so safe could be adopted to recording what every robot and AI system does, so that when errors occur, the forensic investigation will have the data it needs to understand what went wrong and make enforceable measurable testable improvements. AI applications can bring many benefits, but they are more likely to succeed when user-experience designers have a leading role in shaping human control of highly automated systems.”</span></p><h4 data-dcnode-id="2514"><img alt="" class="alignright wp-image-46518" data-dcnode-id="2516" height="259" sizes="(max-width: 460px) 100vw, 460px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.elon.edu/u/imagining/wp-content/uploads/sites/964/2021/06/2021-danah-boyd-Future-of-Ethical-AI-Design26.jpg&amp;raw" srcset="https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-danah-boyd-Future-of-Ethical-AI-Design26.jpg 2500w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-danah-boyd-Future-of-Ethical-AI-Design26-300x169.jpg 300w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-danah-boyd-Future-of-Ethical-AI-Design26-768x432.jpg 768w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-danah-boyd-Future-of-Ethical-AI-Design26-1024x576.jpg 1024w" width="460"><span data-dcnode-id="2515" instrument_node="">AI systems today fetishize efficiency, scale and automation; they should embrace social justice</span></h4><p data-dcnode-id="2510"><strong data-dcnode-id="2512"><span data-dcnode-id="2513" instrument_node="">danah boyd</span></strong><span data-dcnode-id="2511" instrument_node="">, founder and president of the Data &amp; Society Research Institute, and principal researcher at Microsoft, explained, “We misunderstand ethics when we think of it as a binary, when we think that things can be ethical or unethical. A true commitment to ethics is a commitment to understanding societal values and power dynamics – and then working toward justice.</span></p><p data-dcnode-id="2508"><span data-dcnode-id="2509" instrument_node="">“Most data-driven systems, especially AI systems, entrench existing structural inequities into their systems by using training data to build models. The key here is to actively identify and combat these biases, which requires the digital equivalent of reparations. While most large corporations are willing to talk about fairness and eliminating biases, most are not willing to entertain the idea that they have a responsibility for data justice. These systems are also primarily being built within the context of late-stage capitalism, which fetishizes efficiency, scale and automation. A truly ethical stance on AI requires us to focus on augmentation, localized context and inclusion, three goals that are antithetical to the values justified by late-stage capitalism. We cannot meaningfully talk about ethical AI until we can call into question the logics of late-stage capitalism.”</span></p><h4 data-dcnode-id="2505" style="padding-left: 30px"><img alt="" class="alignright wp-image-46498" data-dcnode-id="2507" height="259" sizes="(max-width: 460px) 100vw, 460px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.elon.edu/u/imagining/wp-content/uploads/sites/964/2021/06/2021-Gary-Bolles-The-Future-of-Ethical-AI-Design5.jpg&amp;raw" srcset="https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Gary-Bolles-The-Future-of-Ethical-AI-Design5.jpg 2500w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Gary-Bolles-The-Future-of-Ethical-AI-Design5-300x169.jpg 300w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Gary-Bolles-The-Future-of-Ethical-AI-Design5-768x432.jpg 768w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Gary-Bolles-The-Future-of-Ethical-AI-Design5-1024x576.jpg 1024w" width="460"><span data-dcnode-id="2506" instrument_node="">If we don’t fix this, we can’t even imagine how bad it will get when AI is creating AI</span></h4><p data-dcnode-id="2501" style="padding-left: 30px"><strong data-dcnode-id="2503"><span data-dcnode-id="2504" instrument_node="">Gary A. Bolles</span></strong><span data-dcnode-id="2502" instrument_node="">, chair for the future of work at Singularity University, responded, “I hope we will shift the mindset of engineers, product managers and marketers from ethics and human centricity as a tack-on after AI products are released, to a model that guarantees ethical development from inception. Everyone in the technology development food chain will have the tools and incentives to ensure the creation of ethical and beneficial AI-related technologies, so there is no additional effort required. Massive energy will be focused on new technologies that can sense when new technologies are created that violate ethical guidelines and automatically mitigate those impacts.</span></p><p data-dcnode-id="2499" style="padding-left: 30px"><span data-dcnode-id="2500" instrument_node="">“Humans will gain tremendous benefits as an increasing amount of technology advocates for them automatically. My concerns: None of this may happen, if we don’t change the financial structure. There are far too many incentives – not just to cut corners but to deliberately leave out ethical and inclusive functions, because those technologies aren’t perceived to make as much money, or to deliver as much power, as those that ignore them. If we don’t fix this, we can’t even imagine how much off the rails this can go once AI is creating AI.”</span></p><h4 data-dcnode-id="2496"><img alt="" class="alignright wp-image-46502" data-dcnode-id="2498" height="259" sizes="(max-width: 460px) 100vw, 460px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.elon.edu/u/imagining/wp-content/uploads/sites/964/2021/06/2021-Douglas-Rushkoff-The-Future-of-Ethical-AI-Design28.jpg&amp;raw" srcset="https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Douglas-Rushkoff-The-Future-of-Ethical-AI-Design28.jpg 2500w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Douglas-Rushkoff-The-Future-of-Ethical-AI-Design28-300x169.jpg 300w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Douglas-Rushkoff-The-Future-of-Ethical-AI-Design28-768x432.jpg 768w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Douglas-Rushkoff-The-Future-of-Ethical-AI-Design28-1024x576.jpg 1024w" width="460"><span data-dcnode-id="2497" instrument_node="">Even ethical people think in terms of using tech on humans instead of the opposite</span></h4><p data-dcnode-id="2492"><strong data-dcnode-id="2494"><span data-dcnode-id="2495" instrument_node="">Douglas Rushkoff</span></strong><span data-dcnode-id="2493" instrument_node="">, well-known media theorist, author and professor of media at City University of New York, wrote, “Why should AI become the very first technology whose development is dictated by moral principles? We haven’t done it before, and I don’t see it happening now. Most basically, the reasons why I think AI won’t be developed ethically is because AI is being developed by companies looking to make money – not to improve the human condition. So, while there will be a few simple AIs used to optimize water use on farms or help manage other limited resources, I think the majority is being used on people.</span></p><p data-dcnode-id="2490"><span data-dcnode-id="2491" instrument_node="">“My concern is that even the ethical people still think in terms of using technology on human beings instead of the other way around. So, we may develop a ‘humane’ AI, but what does that mean? It extracts value from us in the most ‘humane’ way possible?”</span></p><h4 data-dcnode-id="2488" style="padding-left: 30px"><span data-dcnode-id="2489" instrument_node="">AIs built to be reciprocally competitive could keep an eye on each other, report bad things</span></h4><p data-dcnode-id="2483" style="padding-left: 30px"><strong data-dcnode-id="2485"><img alt="" class="alignright wp-image-46506" data-dcnode-id="2487" height="259" sizes="(max-width: 460px) 100vw, 460px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.elon.edu/u/imagining/wp-content/uploads/sites/964/2021/06/2021-David-Brin-The-Future-of-Ethical-AI-Design41.jpg&amp;raw" srcset="https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-David-Brin-The-Future-of-Ethical-AI-Design41.jpg 2500w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-David-Brin-The-Future-of-Ethical-AI-Design41-300x169.jpg 300w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-David-Brin-The-Future-of-Ethical-AI-Design41-768x432.jpg 768w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-David-Brin-The-Future-of-Ethical-AI-Design41-1024x576.jpg 1024w" width="460"><span data-dcnode-id="2486" instrument_node="">David Brin</span></strong><span data-dcnode-id="2484" instrument_node="">, physicist, futures thinker and author of “Earth” and “Existence,” commented, “Isaac Asimov in his ‘Robots’ series conceived a future when ethical matters would be foremost in the minds of designers of AI brains, not for reasons of judiciousness, but in order to quell the fears of an anxious public, and hence Asimov’s famed ‘Three Laws of Robotics.’ No such desperate anxiety about AI seems to surge across today’s populace, perhaps because we are seeing our AI advances in more abstract ways, mostly on screens and such, not in powerful, clanking mechanical men.</span></p><p data-dcnode-id="2481" style="padding-left: 30px"><span data-dcnode-id="2482" instrument_node="">“Oh, there are serious conferences on this topic. I’ve participated in many. Alas, statements urging ethical consideration in AI development are at best palliatives. I am often an outlier, proposing that AIs’ ‘ethical behavior’ be promoted the way it is in most humans – especially most males – via accountability.</span></p><p data-dcnode-id="2479" style="padding-left: 30px"><span data-dcnode-id="2480" instrument_node="">“If AIs are many and diverse and reciprocally competitive, then it will be in their individual interest to keep an eye on each other and report bad things, because doing so will be to their advantage. This depends on giving them a sense of separate individuality. It is a simple recourse, alas seldom even discussed.”</span></p><h4 data-dcnode-id="2477"><span data-dcnode-id="2478" instrument_node="">Within the next 300 years, humans will be replaced by their own sentient creations</span></h4><p data-dcnode-id="2473"><strong data-dcnode-id="2475"><span data-dcnode-id="2476" instrument_node="">Michael G. Dyer</span></strong><span data-dcnode-id="2474" instrument_node="">, professor emeritus of computer science at UCLA, expert in natural language processing, responded, “Ethical software is an ambiguous notion and includes:</span></p><p data-dcnode-id="2471"><span data-dcnode-id="2472" instrument_node="">1) Software that makes choices normally considered to be in the ethical/moral sphere. An example of this would be software that makes (or aids in making) decisions concerning punishments for crimes or software that decides whether or not some applicant is worthy of some desirable job or university. This type of task can be carried out via classification and the field of classification (and learning classification from data) is already well developed and could be (and is being) applied to tasks that relate to the moral sphere.</span></p><p data-dcnode-id="2469"><span data-dcnode-id="2470" instrument_node="">2) Software that decides who receives a negative (vs. positive) outcome in zero-sum circumstances. A classic case is that of a driverless car in which the driving software will have to decide whether to protect the passenger or the pedestrian in an immediately predicted accident.</span></p><p data-dcnode-id="2467"><span data-dcnode-id="2468" instrument_node="">3) Software that includes ethics/morality when planning to achieve goals (a generalization of 2). I am personally more interested in this type of AI software.</span></p><p data-dcnode-id="2465"><span data-dcnode-id="2466" instrument_node="">“Consider that you, in the more distant future, own a robot and you ask it to get you an umbrella because you see that it might rain today. Your robot goes out and sees a little old lady with an umbrella. Your robot takes the umbrella away from her and returns to hand it to you. That is a robot without ethical reasoning capability. It has a goal, and it achieves that goal without considering the effect of its plan on the goals of other agents; therefore, ethical planning is a much more complicated form of planning because it has to take into account the goals and plans of other agents. Another example. You tell your robot that Mr. Mean is your enemy (vs. friend). In this case, the robot might choose a plan to achieve your goal that, at the same time, harms some goal of Mr. Mean.</span></p><p data-dcnode-id="2463"><span data-dcnode-id="2464" instrument_node="">“Ethical reasoning is more complicated than ethical planning, because it requires building inverted ‘trees’ of logical (and/or probabilistic) support for any beliefs that themselves might support a given plan or goal. For example, if a robot believes that goal G1 is wrong, then the robot is not going to plan to achieve G1. However, if the robot believes that agent A1 has goal G1, then the robot might generate a counterplan to block A1 in executing the predicted plan (or plans) of agent A1 to achieve G1 (which is an undesirable goal for the robot). Software that is trained on data to categorize/classify already exists and is extremely popular and has been and will continue to be used to also classify people (does Joe go to jail for five years or 10 years? Does Mary get that job? etc.).</span></p><p data-dcnode-id="2455"><span data-dcnode-id="2462" instrument_node="">“Software that performs sophisticated moral reasoning will not be widespread by 2025 but will become more common in 2030. (You asked for predictions, so I am making them.) Like any technology, AI can be used for good or evil. Face recognition can be used to enslave everyone (à la Orwell’s ‘Nineteen Eighty-Four’) or to track down serial killers. Technology depends on how humans use it (since self-aware sentient robots are still at least 40 years away). It is possible that a ‘critical mass’ of intelligence could be reached, in which an AI entity works on improving its own intelligent design, thus entering into a positive feedback loop resulting rapidly in a super-intelligent form of AI (e.g., see D. Lenat’s </span><a data-dcnode-id="2460" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//users.cs.northwestern.edu/~mek802/papers/not-mine/Lenat_1983_theory_formation_by_heuristic_search.pdf"><span data-dcnode-id="2461" instrument_node="">Heurisko</span></a><span data-dcnode-id="2459" instrument_node=""> work done years ago, in which it invented not only various structures but also invented new heuristics of invention). A research project that also excites me is that of computer modeling of the </span><a data-dcnode-id="2457" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.humanconnectomeproject.org/"><span data-dcnode-id="2458" instrument_node="">human connectome</span></a><span data-dcnode-id="2456" instrument_node="">. One could then build a humanoid form of intelligence without understanding how human neural intelligence actually works (which could be quite dangerous).</span></p><p data-dcnode-id="2450"><span data-dcnode-id="2454" instrument_node="">“I am concerned and also convinced that, at some point within the next 300 years, humanity will be replaced by its own creations, once they become sentient and more intelligent than ourselves. Computers are already smarter at many tasks, but they are not an existential threat to humanity (at this point) because they lack sentience. AI chess- (and now Go-) playing systems beat world grand masters, but they are not aware that they are playing a game. They currently lack the ability to converse (in human natural languages, such as English or Chinese) about the games they play, and they lack their own autonomous goals. However, subfields of AI include machine learning and computational evolution. AI systems are right now being evolved to survive (and learn) in simulated environments and such systems, if given language comprehension abilities (being developed in the AI field of natural language processing), would then achieve a form of sentience (awareness of one’s awareness and ability to communicate that awareness to others, and an ability to debate beliefs via reasoning, counterfactual and otherwise, e.g., see work of </span><a data-dcnode-id="2452" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//bayes.cs.ucla.edu/jp_home.html"><span data-dcnode-id="2453" instrument_node="">Judea Pearl</span></a><span data-dcnode-id="2451" instrument_node="">).”</span></p><h4 data-dcnode-id="2448" style="padding-left: 30px"><span data-dcnode-id="2449" instrument_node="">There are challenges, but better systems will emerge to improve the human condition</span></h4><p data-dcnode-id="2
