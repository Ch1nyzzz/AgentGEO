imize profits over people. The only possible way of preventing that trajectory is with national policies that mandate or proscribe basic AI principles, and those kinds of national policies are only possible with international cooperation; otherwise, governments will be too worried about putting their own countries’ businesses at a disadvantage.”</span></p><p data-dcnode-id="2111"><strong data-dcnode-id="2113"><span data-dcnode-id="2114" instrument_node="">Valerie Bock</span></strong><span data-dcnode-id="2112" instrument_node="">, VCB Consulting, former Technical Services Lead at Q2 Learning, commented, “I don’t think we’ve developed the philosophical sophistication in the humans who design AI sufficiently to expect them to be able to build ethical sophistication into their software. Again and again, we are faced with the ways our own unconscious biases pop up in our creations. It is turning out that we do not understand ourselves or our motivations as well as we would like to imagine we might. Work in AI helps lay some of this out for us, aiding us in a quest [that] humanity has pursued for millennia. A little humility based on what we are learning is in order.”</span></p><p data-dcnode-id="2107" style="padding-left: 30px"><strong data-dcnode-id="2109"><span data-dcnode-id="2110" instrument_node="">The director of a military center for strategy and technology</span></strong><span data-dcnode-id="2108" instrument_node=""> said, “Most AI will attempt to embed ethical concerns at some level. It is not clear how ‘unbiased’ AI can be created. Perfectly unbiased training datasets don’t exist, and, due to human biases being an inherent part of interactions, such a goal may be unobtainable. As such, we may see gender or racial biases in some training datasets, which will spill over into operational AI systems, in spite of our efforts to combat this.”</span></p><p data-dcnode-id="2103"><strong data-dcnode-id="2105"><span data-dcnode-id="2106" instrument_node="">Alan S. Inouye</span></strong><span data-dcnode-id="2104" instrument_node="">, director of the Office for Information Technology Policy at the American Library Association, responded, “I don’t see people or organizations setting out in a nefarious path in their use of AI. But of course, they will use it to advance their missions and goals and, in some sense, employ ‘local’ ethics. But ethics is neither standardized nor additive across domains. What is ethics across AI systems? It is like asking, ‘What is cybersecurity across society?’”</span></p><p data-dcnode-id="2098" style="padding-left: 30px"><strong data-dcnode-id="2100"><img alt="" class="alignright wp-image-46687" data-dcnode-id="2102" height="259" sizes="(max-width: 460px) 100vw, 460px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.elon.edu/u/imagining/wp-content/uploads/sites/964/2021/06/2021-Maggie-Jackson-The-Future-of-Ethical-AI-Design13.jpg&amp;raw" srcset="https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Maggie-Jackson-The-Future-of-Ethical-AI-Design13.jpg 2500w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Maggie-Jackson-The-Future-of-Ethical-AI-Design13-300x169.jpg 300w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Maggie-Jackson-The-Future-of-Ethical-AI-Design13-768x432.jpg 768w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Maggie-Jackson-The-Future-of-Ethical-AI-Design13-1024x576.jpg 1024w" width="460"><span data-dcnode-id="2101" instrument_node="">Maggie Jackson</span></strong><span data-dcnode-id="2099" instrument_node="">, former Boston Globe columnist and author of “Distracted: Reclaiming Our Focus in a World of Lost Attention,” wrote, “I am deeply concerned by how little we understand of what AI algorithms know or how they know it. This black-box effect is real and leads to unintended impact. Most importantly, in the absence of true understanding, assumptions are held up as the foundation of current and future goals. There should be far greater attention paid to the hidden and implicit value systems that are inherent in the design and development of AI in all forms. An example: robot caregivers, assistants and tutors are being increasingly used in caring for the most vulnerable members of society despite known misgivings by both scientist–roboticists, ethicists and users, potential and current. It’s highly alarming that the robots’ morally dubious façade of care is increasingly seen as a good-enough substitute for the blemished yet reciprocal care carried out by humans.</span></p><p data-dcnode-id="2096" style="padding-left: 30px"><span data-dcnode-id="2097" instrument_node="">“New ethical AI guidelines that emphasize transparency are a good first step in trying to ensure that care recipients and others understand who/what they are dealing with. But profit-driven systems, the hubris of inventors, humans’ innate tendency to try to relate to any objects that seem to have agency, and other forces combine to work against the human skepticism that is needed if we are to create assistive robots that preserve the freedom and dignity of the humans who receive their care.”</span></p><p data-dcnode-id="2092"><strong data-dcnode-id="2094"><span data-dcnode-id="2095" instrument_node="">Alan D. Mutter</span></strong><span data-dcnode-id="2093" instrument_node="">, a consultant and former Silicon Valley CEO, said, “AI is only as smart and positive as the people who train it. We need to spend as much time on the moral and ethical implementation of AI as we do on hardware, software and business models. Last time I checked, there was no code of ethics in Silicon Valley. We need a better moral barometer than the NASDAQ index.”</span></p><p data-dcnode-id="2088" style="padding-left: 30px"><strong data-dcnode-id="2090"><span data-dcnode-id="2091" instrument_node="">Fred Baker</span></strong><span data-dcnode-id="2089" instrument_node="">, board member of the Internet Systems Consortium and longtime IETF leader, commented, “I would like to see AI be far more ethical than it is. That said, human nature hasn’t changed, and the purposes to which AI is applied have not fundamentally changed. We may talk about it more, but I don’t think AI ethics will ultimately change.”</span></p><p data-dcnode-id="2084"><strong data-dcnode-id="2086"><span data-dcnode-id="2087" instrument_node="">Randall Mayes</span></strong><span data-dcnode-id="2085" instrument_node="">, a technology analyst at TechCast Global, observed, “The standardization of AI ethics concerns me because the American, European and Chinese governments and Silicon Valley companies have different ideas about what is ethical. How AI is used will depend on your government’s hierarchy of values among economic development, international competitiveness and social impacts.”</span></p><p data-dcnode-id="2080" style="padding-left: 30px"><strong data-dcnode-id="2082"><span data-dcnode-id="2083" instrument_node="">Jim Witte</span></strong><span data-dcnode-id="2081" instrument_node="">, director of the Center for Social Science Research at George Mason University, responded, “The question assumes that ethics and morals are static systems. With developments in AI, there may also be an evolution of these systems such that what is moral and ethical tomorrow may be very different from what we see as moral and ethical today.”</span></p><p data-dcnode-id="2076"><strong data-dcnode-id="2078"><span data-dcnode-id="2079" instrument_node="">Yves Mathieu</span></strong><span data-dcnode-id="2077" instrument_node="">, co-director at Missions Publiques, based in Paris, France, wrote, “Ethical AI will require legislation like the European [GDPR] legislation to protect privacy rights on the internet. Some governments will take measures but not all will, as is the case today in regard to the production, marketing and usage of guns. There might be an initiative by some corporations, but there will be a need for engagement of the global chain of production of AI, which will be a challenge if some of the production is coming from countries not committed in the same ethical principles. Strong economic sanctions on nonethical AI production and use may be effective.”</span></p><p data-dcnode-id="2072" style="padding-left: 30px"><strong data-dcnode-id="2074"><span data-dcnode-id="2075" instrument_node="">Amy Sample Ward</span></strong><span data-dcnode-id="2073" instrument_node="">, CEO of NTEN: The Nonprofit Technology Network, said, “There’s no question whether AI will be used in questionable ways. Humans do not share a consistent and collective commitment to ethical standards of any technology, especially not with artificial intelligence. Creating standards is not difficult, but accountability to them is very difficult, especially as government, military and commercial interests regularly find ways around systems of accountability. What systems will be adopted on a large scale to enforce ethical standards and protections for users? How will users have power over their data? How will user education be invested in for all products and services? These questions should guide us in our decision-making today so that we have more hope of AI being used to improve or benefit lives in the years to come.”</span></p><p data-dcnode-id="2068"><strong data-dcnode-id="2070"><span data-dcnode-id="2071" instrument_node="">Dan McGarry</span></strong><span data-dcnode-id="2069" instrument_node="">, an independent journalist based in Vanuatu, noted, “Just like every other algorithm ever deployed, AI will be a manifestation of human bias and the perspective of its creator. Facebook’s facial-recognition algorithm performs abysmally when asked to identify Black faces. AIs programmed in the affluent West will share its strengths and weaknesses. Likewise, AIs developed elsewhere will share the assumptions and the environment of their creators. They will not be images of them; they will be products of them and recognisable as such.”</span></p><p data-dcnode-id="2063" style="padding-left: 30px"><strong data-dcnode-id="2065"><img alt="" class="alignright wp-image-46599" data-dcnode-id="2067" height="259" sizes="(max-width: 460px) 100vw, 460px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.elon.edu/u/imagining/wp-content/uploads/sites/964/2021/06/2021-Abigail-De-Kosnik-The-Future-of-Ethical-AI-Design19.jpg&amp;raw" srcset="https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Abigail-De-Kosnik-The-Future-of-Ethical-AI-Design19.jpg 2500w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Abigail-De-Kosnik-The-Future-of-Ethical-AI-Design19-300x169.jpg 300w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Abigail-De-Kosnik-The-Future-of-Ethical-AI-Design19-768x432.jpg 768w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Abigail-De-Kosnik-The-Future-of-Ethical-AI-Design19-1024x576.jpg 1024w" width="460"><span data-dcnode-id="2066" instrument_node="">Abigail De Kosnik</span></strong><span data-dcnode-id="2064" instrument_node="">, associate professor and director of the Center for New Media at the University of California-Berkeley, said, “I don’t see nearly enough understanding in the general public, tech workers or in STEM students about the possible dangers of AI – the ways that AI can harm and fail society. I am part of a wave of educators trying to introduce more ethics training and courses into our instruction, and I am hopeful that will shift the tide, but I am not optimistic about our chances. AI that is geared toward generating revenue for corporations will nearly always work against the interests of society.”</span></p><p data-dcnode-id="2059"><strong data-dcnode-id="2061"><span data-dcnode-id="2062" instrument_node="">Irina Raicu</span></strong><span data-dcnode-id="2060" instrument_node="">, a member of the Partnership on AI’s working group on Fair, Transparent and Accountable AI, observed, “The conversation around AI ethics has been going on for several years now. However, what seems to be obvious among those who have been a part of it for some time has not trickled down into the curricula of many universities who are training the next generation of AI experts. Given that, it looks like it will take more than 10 years for ‘most of the AI systems being used by organizations of all sorts to employ ethical principles focused primarily on the public good.’ Also, many organizations are simply focused primarily on other goals – not on protecting or promoting the public good.”</span></p><p data-dcnode-id="2055" style="padding-left: 30px"><strong data-dcnode-id="2057"><span data-dcnode-id="2058" instrument_node="">A lawyer and former law school dean who specializes in technology issues</span></strong><span data-dcnode-id="2056" instrument_node=""> wrote, “AI is an exciting new space, but it is unregulated and, at least in early stages, will evolve as investment and monetary considerations direct. It is sufficiently known that there are no acknowledged ethical standards and probably won’t be until beyond the time horizon you mention (2030). During that time, there will be an accumulation of ‘worst-case scenarios,’ major scandals on its use, a growth in pernicious use that will offend common sense and community moral and ethical standards. Those occasions and situations will lead to a gradual and increasing demand for regulation, oversight and ethical policies on use and misuse. But by whom (or what)? Who gets to impose those ethical prescriptions – the industries themselves? The government?”</span></p><p data-dcnode-id="2051"><strong data-dcnode-id="2053"><span data-dcnode-id="2054" instrument_node="">The director of a public policy center</span></strong><span data-dcnode-id="2052" instrument_node=""> responded, “I see a positive future for AI in the areas of health and education. However, there are ethical challenges here, too. Will the corporation who access and hold this data use it responsibly? What will be the role of government? Perhaps AI can help the developing water deal with climate change and water resources, but again, I see a real risk in the areas of equitable distribution, justice and privacy protections.”</span></p><h2 data-dcnode-id="2049"><span data-dcnode-id="2050" instrument_node="">Humans are the problem: Whose ethics? Who decides? Who cares? Who enforces?</span></h2><p data-dcnode-id="2047"><span data-dcnode-id="2048" instrument_node="">A number of the experts who have concerns about the future of ethical AI raised issues around the fundamental nature of people. Flawed humans necessarily will be in the thick of these issues. Moreover, some experts argued that humans will have to create the governance systems overseeing the application of AI and judging how applications are affecting societies. These experts also asserted that there will always be fundamentally unethical people and organizations that will not adopt such principles. Further, some experts mentioned the fact that in a globally networked age even lone wolves can cause massive problems.</span></p><p data-dcnode-id="2043"><strong data-dcnode-id="2045"><span data-dcnode-id="2046" instrument_node="">Leslie Daigle</span></strong><span data-dcnode-id="2044" instrument_node="">, a longtime leader in the organizations building the internet and making it secure, noted, “My biggest concern with respect to AI and its ethical use has nothing to do with AI as a technology and everything to do with people. Nothing about the 21st century convinces me that we, as a society, understand that we are interdependent and need to think of something beyond our own immediate interests. Do we even have a common view of what is ethical?</span></p><p data-dcnode-id="2041"><span data-dcnode-id="2042" instrument_node="">“Taking one step back from the brink of despair, the things I’d like to see AI successfully applied to, by 2030, include things like medical diagnoses (reading x-rays, etc.). Advances there could be monumental. I still don’t want my fridge to order my groceries by 2030, but maybe that just makes me old? :-)”</span></p><p data-dcnode-id="2037" style="padding-left: 30px"><strong data-dcnode-id="2039"><span data-dcnode-id="2040" instrument_node="">Tracey P. Lauriault</span></strong><span data-dcnode-id="2038" instrument_node="">, a professor expert in critical media studies and big data based at Carleton University, Ottawa, Canada, commented, “Automation, AI and machine learning (ML) used in traffic management as in changing the lights to improve the flow of traffic, or to search protein databases in big biochemistry analytics, or to help me sort out ideas on what show to watch next or books to read next, or to do land-classification of satellite images, or even to achieve organic and fair precision agriculture, or to detect seismic activity, the melting of polar ice caps, or to predict ocean issues are not that problematic (and its use, goodness forbid, to detect white-collar crime in a fintech context is not a problem).</span></p><p data-dcnode-id="2035" style="padding-left: 30px"><span data-dcnode-id="2036" instrument_node="">“If, however, the question is about social welfare intake systems, biometric sorting, predictive policing and border control, etc., then we are getting into quite a different scenario. How will these be governed, scrutinized, and who will be accountable for decisions and will those decisions about the procurement and use of these technologies or the intelligence derived from them?</span></p><p data-dcnode-id="2033" style="padding-left: 30px"><span data-dcnode-id="2034" instrument_node="">“They will reflect our current forms of governance, and these seem rather biased and unequal. If we can create a more just society then we may be able to have more-just AI/ML.”</span></p><p data-dcnode-id="2029"><strong data-dcnode-id="2031"><span data-dcnode-id="2032" instrument_node="">Leiska Evanson</span></strong><span data-dcnode-id="2030" instrument_node="">, futurist and consultant, wrote, “Humanity has biases. Humans are building the algorithms around the machine learning masquerading as AI. The ‘AI’ will have biases. It is impossible to have ethical AI (really, ML) if the ‘parent’ is biased. Companies such as banks are eager to use ML to justify not lending to certain minorities who simply do not create profit for them. Governments want to attend to the needs of the many before the few. The current concepts of AI are all about feeding more data to an electromechanical bureaucrat to rubberstamp, with no oversight from humans with competing biases.”</span></p><p data-dcnode-id="2025" style="padding-left: 30px"><strong data-dcnode-id="2027"><span data-dcnode-id="2028" instrument_node="">A director of standards and strategy at a major technology company</span></strong><span data-dcnode-id="2026" instrument_node=""> commented, “I believe that people are mostly good and that the intention will be to create ethical AI. However, an issue that I have become aware of is the fact that we all have intrinsic biases, unintentional biases, that can be exposed in subtle and yet significant ways. Consider that AI systems are built by people, and so they inherently work according to how the people that built them work. Thus, these intrinsic, unintentional biases are present in these systems. Even learning systems will ‘learn’ in a biased way. So, the interesting research question is whether or not we learn in a way that overcomes our intrinsic biases.”</span></p><p data-dcnode-id="2021"><strong data-dcnode-id="2023"><span data-dcnode-id="2024" instrument_node="">Jean Seaton</span></strong><span data-dcnode-id="2022" instrument_node="">, director of the Orwell Foundation and professor of media history at the University of Westminster, responded, “The ethics question also begs the questions of who would create and police such standards internationally? We need some visionary leaders and some powerful movements. The last big ‘ethical’ leap came after World War II. The Holocaust and World War II produced a set of institutions that in time led to the notion of human rights. That collective ethical step change (of course compromised but nevertheless immensely significant) was embodied in institutions with some collective authority. So that is what has to happen over AI. People have to be terrified enough, leaders have to be wise enough, people have to be cooperative enough, tech people have to be forward thinking enough, responsibility has to be felt vividly, personally, overwhelmingly enough – to get a set of rules passed and policed.”</span></p><p data-dcnode-id="2017" style="padding-left: 30px"><strong data-dcnode-id="2019"><span data-dcnode-id="2020" instrument_node="">Cliff Lynch</span></strong><span data-dcnode-id="2018" instrument_node="">, director at the Coalition for Networked Information, wrote, “Efforts will be made to create mostly ‘ethical’ AI applications by the end of the decade, but please understand that an ethical AI application is really just software that’s embedded in an organization that’s doing something; it’s the organization rather than the software that bears the burden to be ethical. There will be some obvious exceptions for research, some kinds of national security, military and intelligence applications, market trading and economic prediction systems – many of these things operate under various sorts of ‘alternative ethical norms’ such as the ‘laws of war’ or the laws of the marketplace. And many efforts to unleash AI (really machine-learning) on areas like physics or protein-folding will fall outside all of the discussion of ‘ethical AI.’</span></p><p data-dcnode-id="2015" style="padding-left: 30px"><span data-dcnode-id="2016" instrument_node="">“We should resist the temptation to anthropomorphize these systems. (As the old saying goes, ‘machines hate that.’) Don’t attribute agency and free will to software. …The problems here are people and organizations, not code! … A lot of the discussion of ethical AI is really misguided. It’s clear that there’s a huge problem with machine learning and pattern-recognition systems, for example, that are trained on inappropriate, incomplete or biased data (or data that reflect historical social biases) or where the domain of applicability and confidence of the classifiers or predictors aren’t well-demarcated and understood. There’s another huge problem where organizations are relying on (often failure-prone and unreliable, or trained on biased data, or otherwise problematic) pattern recognition or prediction algorithms (again machine-learning-based, usually) and devolving too much decision-making to these. Some of the recent facial-recognition disasters are good examples here. There are horrible organizational and societal practices that appeal to computer-generated decisions that are correct, unbiased, impartial or transparent and that place unjustified faith and authority in this kind of technology. But framing this in terms of AI ethics rather than bad human decision-making, stupidity, ignorance, wishful thinking, organizational failures and attempts to avoid responsibility seems wrong to me. We should be talking instead about the human and organizational ethics of using machine-learning and prediction systems for various purposes, perhaps.</span></p><p data-dcnode-id="2013" style="padding-left: 30px"><span data-dcnode-id="2014" instrument_node="">“I think we’ll see various players employ machine learning, pattern recognition and prediction in some really evil ways over the coming decade. Coupling this to social media or other cultural motivation and reward mechanisms is particularly scary. An early example here might be China’s development of its ‘social capital’ rewards and tracking system. I’m also frightened of targeted propaganda/advertising/persuasion systems. I’m hopeful we’ll also see organizations and governments in at least a few cases choose not to use these systems or to try to use them very cautiously and wisely and not delegate too much decision-making to them.</span></p><p data-dcnode-id="2011" style="padding-left: 30px"><span data-dcnode-id="2012" instrument_node="">“It’s possible to make good choices here, and I think some will. Genuine AI ethics seems to be part of the thinking about general-purpose AI, and I think we are a very, very, long way from this, though I’ve seen some predictions to the contrary from people perhaps better informed than I am. The (rather more theoretical and speculative) philosophical and research discussions about superintelligence and about how one might design and develop such a general-purpose AI that won’t rapidly decide to exterminate humanity are extremely useful, important and valid, but they have little to do with the rhetorical social justice critiques that confuse algorithms with the organizations that stupidly and inappropriately design, train and enshrine and apply them in today’s world.”</span></p><p data-dcnode-id="2007"><strong data-dcnode-id="2009"><span data-dcnode-id="2010" instrument_node="">Deirdre Williams</span></strong><span data-dcnode-id="2008" instrument_node="">, an independent researcher expert in global technology policy, commented, “I can’t be optimistic. We, the ‘average persons,’ have been schooled in preceding years toward&nbsp; selfishness, individualism, materialism and the ultimate importance of convenience. These values create the ‘ethos.’ At the very root of AI are databases, and these databases are constructed by human beings who decide which data are to be collected and how that data should be described and categorised. A tiny human error or bias at the very beginning can balloon into an enormous error of truth and/or justice.”</span></p><p data-dcnode-id="2002" style="padding-left: 30px"><strong data-dcnode-id="2004"><img alt="" class="alignright wp-image-46603" data-dcnode-id="2006" height="259" sizes="(max-width: 460px) 100vw, 460px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.elon.edu/u/imagining/wp-content/uploads/sites/964/2021/06/2021-Alexa-Raad-The-Future-of-Ethical-AI-Design45.jpg&amp;raw" srcset="https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Alexa-Raad-The-Future-of-Ethical-AI-Design45.jpg 2500w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Alexa-Raad-The-Future-of-Ethical-AI-Design45-300x169.jpg 300w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Alexa-Raad-The-Future-of-Ethical-AI-Design45-768x432.jpg 768w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Alexa-Raad-The-Future-of-Ethical-AI-Design45-1024x576.jpg 1024w" width="460"><span data-dcnode-id="2005" instrument_node="">Alexa Raad</span></strong><span data-dcnode-id="2003" instrument_node="">, co-founder and co-host of the TechSequences podcast and former chief operating officer at Farsight Security, said, “There is hope for AI in terms of applications in health care that will make a positive difference. But legal/policy and regulatory frameworks almost always lag behind technical innovations. In order to guard against the negative repercussions of AI, we need a policy governance and risk-mitigation framework that is universally adopted. There needs to be an environment of global collaboration for a greater good. Although globalization led to many of the advances we have today (for example, the internet’s design and architecture as well as its multistakeholder governance model), globalization is under attack. What we see across the world is a trend toward isolationism, separatism as evidenced by political movements such as populism, nationalism and outcomes such as Brexit. In order to come up with and adopt a comprehensive set of guidelines or framework for the use of AI or risk mitigation for abuse of AI, we would need a global current that supports collaboration. I hope I am wrong, but trends like this need longer than 10 years to run their course and for the pendulum to swing back the other way. By then, I am afraid some of the downsides and risks of AI will already be in play.”</span></p><p data-dcnode-id="1998"><strong data-dcnode-id="2000"><span data-dcnode-id="2001" instrument_node="">Andrea Romaoli Garcia</span></strong><span data-dcnode-id="1999" instrument_node="">, an international lawyer actively involved with multistakeholder activities of the International Telecommunication Union and Internet Society, said, “I define ethics as all possible and available choices where the conscience establishes the best option. Values and principles are the limiters that guide the conscience into this choice alongside the purposes; thus, ethics is a process. In terms of ethics for AI, the process for discovering what is good and right means choosing among all possible and available applications to find the one that best applies to the human-centred purposes, respecting all the principles and values that make human life possible.</span></p><p data-dcnode-id="1996"><span data-dcnode-id="1997" instrument_node="">“The human-centred approach in ethics was first described by the Greek philosopher Socrates in his effort to turn attention from the outside world to the human condition. AI is a cognitive technology that allows greater advances in health, economic, political and social fields. It is impossible to deny how algorithms impact human evolution. Thus, an ethical AI requires that all instruments and applications place humans at the center. Despite the fact that there are some countries building ethical principles for AI, there is a lack of any sort of international instrument that covers all of the fields that guide the development and application of AI in a human-centred approach. AI isn’t model-driven; it has a data-centred approach for highly scalable neural networks. Thus, the data should be selected and classified through human action. Through this human action, sociocultural factors are imprinted on the behavior of the algorithm and machine learning. This justifies the concerns about ethics and also focuses on issues such as freedom of expression, privacy and surveillance, ownership of data and discrimination, manipulation of information and trust, environmental and global warming and also on how the power will be established among society.</span></p><p data-dcnode-id="1994"><span data-dcnode-id="1995" instrument_node="">“These are factors that determine human understanding and experience. All instruments that are built for ethical AI have different bases, values and purposes depending on the field to which they apply. The lack of harmony in defining these pillars compromises ethics for AI and affects human survival. It could bring new invisible means of exclusion or deploy threats to social peace that will be invisible to human eyes. Thus, there is a need for joint efforts gathering stakeholders, civil society, scientists, governments and intergovernmental bodies to work toward building a harmonious ethical AI that is human-centred and applicable to all nations. 2030 is 10 years from now. We don’t need to wait 10 years – we can start working now. 2020 presents several challenges in regard to technology’s impact on people. Human rights violations are being exposed and values are under threat. This scenario should accelerate efforts at international cooperation to establish a harmonious ethical AI that supports human survival and global evolution.”</span></p><p data-dcnode-id="1990" style="padding-left: 30px"><strong data-dcnode-id="1992"><span data-dcnode-id="1993" instrument_node="">Olivier MJ Crépin-Leblond</span></strong><span data-dcnode-id="1991" instrument_node="">, entrepreneur and longtime participant in the activities of ICANN and IGF, said, “What worries me the most is that some actors in nondemocratic regimes do not see the same ‘norm’ when it comes to ethics. These norms are built on a background of culture and ideology, and not all ideologies are the same around the world. It is clear that, today, some nation-states see AI as another means of conquest and establishing their superiority instead of a means to do good.”</span></p><p data-dcnode-id="1986"><strong data-dcnode-id="1988"><span data-dcnode-id="1989" instrument_node="">A professor emeritus of social science</span></strong><span data-dcnode-id="1987" instrument_node=""> said, “The algorithms that represent ethics in AI are neither ethical nor intelligent. We are building computer models of social prejudices and structural racism, sexism, ageism, xenophobia and other forms of social inequality. It’s the realization of some of Foucault’s worst nightmares.”</span></p><p data-dcnode-id="1982" style="padding-left: 30px"><strong data-dcnode-id="1984"><span data-dcnode-id="1985" instrument_node="">An advocate and activist</span></strong><span data-dcnode-id="1983" instrument_node=""> said, “Most of the large AI convenings to date have been dominated by status quo power elites whose sense of risk, harm, threat are distorted. Largely comprised of elite white men with an excessive faith in technical solutions and a disdain for sociocultural dimensions of risk and remedy. These communities – homogenous, limited experientially, overly confident – are made up of people who fail to see themselves as a risk. As a result, I believe that most dominant outcomes – how ‘ethical’ is defined, how ‘acceptable risk’ is perceived, how ‘optimal solutions’ will be determined – will be limited and almost certainly perpetuate and amplify existing harms. As you can see, I’m all sunshine and joy.”</span></p><p data-dcnode-id="1978"><strong data-dcnode-id="1980"><span data-dcnode-id="1981" instrument_node="">Glenn Grossman</span></strong><span data-dcnode-id="1979" instrument_node="">, a consultant of banking analytics at FICO, noted, “It’s necessary for leaders in all sectors to recognize that AI is just the growth of mathematical models and the application of these techniques. We have model governance in most organizations today. We need to keep the same safeguards in place. The challenge is that many business leaders are not good at math! They cannot understand the basics of predictive analytics, models and such. Therefore, they hear ‘AI’ and think of it as some new, cool, do-it-all technology. It is simply math at the heart of it. Man governs how they use math. So, we need to apply ethical standards to monitor and calibrate. AI is a tool,&nbsp;not a solution for everything. Just like the PC ushered in automation, AI can usher in automation in the area of decisions. Yet it is humans that use these decisions and design the systems. So, we need to apply ethical standards to any AI-driven system.”</span></p><p data-dcnode-id="1974" style="padding-left: 30px"><strong data-dcnode-id="1976"><span data-dcnode-id="1977" instrument_node="">R. “Ray” Wang</span></strong><span data-dcnode-id="1975" instrument_node="">, principal analyst, founder and CEO of Silicon Valley-based Constellation Research, noted, “Right now we have no way of enforcing these principles in play. Totalitarian, Chinese, CCP-style AI is the preferred approach for dictators. The question is: Can we require and can we enforce AI ethics? We can certainly require, but the enforcement may be tough.”</span></p><p data-dcnode-id="1970"><strong data-dcnode-id="1972"><span data-dcnode-id="1973" instrument_node="">Maja Vujovic</span></strong><span data-dcnode-id="1971" instrument_node="">, a consultant for digital and ICT at Compass Communications, noted, “Ethical AI might become a generally agreed upon standard, but it will be impossible to enforce it. In a world where media content and production, including fake news, will routinely be AI-generated, it is more likely that our expectations around ethics will need to be lowered. Audiences might develop a ‘thicker skin’ and become more tolerant toward the overall unreliability of the news. This trend will not render them more skeptical or aloof but rather more active and much more involved in the generation of news, in a range of ways. Certification mechanisms and specialized AI tools will be developed to deal specifically with unethical AI, as humans will prove too gullible. In those sectors where politics don’t have a direct interest, such as health and medicine, transportation, e-commerce and entertainment, AI as an industry might get more leeway to grow organically, including self-regulation.”</span></p><h2 data-dcnode-id="1968"><span data-dcnode-id="1969" instrument_node="">Like all tools, AI can be used for good or ill; that makes standards setting a challenge</span></h2><p data-dcnode-id="1966"><span data-dcnode-id="1967" instrument_node="">A number of respondents noted that any attempt at rule-making is complicated by the fact that any technology can be used for noble and harmful purposes. It is difficult to design ethical digital tools that privilege the former while keeping the latter in check.</span></p><p data-dcnode-id="1962"><strong data-dcnode-id="1964"><span data-dcnode-id="1965" instrument_node="">Chris Arkenberg</span></strong><span data-dcnode-id="1963" instrument_node="">, research manager at Deloitte’s Center for Technology, Media and Telecommunications, noted, “The answer is both good and bad. Technology doesn’t adopt ethical priorities that humans don’t prioritize themselves. So, a better question could be whether society will pursue a more central role of ethics and values than we’ve seen in the past 40 years or so. Arguably, 2020 has shown a resurgent demand for values and principles for a balanced society. If, for example, education becomes a greater priority for the Western world, AI could amplify our ability to learn more effectively. Likewise, with racial and gender biases. But this trend is strongest only in some Western democracies.</span></p><p data-dcnode-id="1958"><strong data-dcnode-id="1960"><img alt="" class="alignright wp-image-46607" data-dcnode-id="1961" height="259" sizes="(max-width: 460px) 100vw, 460px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.elon.edu/u/imagining/wp-content/uploads/sites/964/2021/06/2021-Chris-Arkenberg-The-Future-of-Ethical-AI-Design20.jpg&amp;raw" srcset="https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Chris-Arkenberg-The-Future-of-Ethical-AI-Design20.jpg 2500w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Chris-Arkenberg-The-Future-of-Ethical-AI-Design20-300x169.jpg 300w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Chris-Arkenberg-The-Future-of-Ethical-AI-Design20-768x432.jpg 768w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Chris-Arkenberg-The-Future-of-Ethical-AI-Design20-1024x576.jpg 1024w" width="460"></strong><span data-dcnode-id="1959" instrument_node="">“China, for example, places a greater value on social stability and enjoys a fairly monochromatic population. With the current trade wars, the geopolitical divide is also becoming a technological divide that could birth entirely different shapes of AI depending on their origin. And it is now a very multipolar world with an abundance of empowered actors.</span></p><p data-dcnode-id="1956"><span data-dcnode-id="1957" instrument_node="">“So, these tools lift up many other boats with their own agendas [that] may be less bound by Western liberal notions of ethics and values. The pragmatic assumption might be that many instances of ethical AI will be present where regulations, market development, talent attraction, and societal expectations require them to be so. At the same time, there will likely be innumerable instances of ‘bad AI,’ weaponized machine intelligence and learning systems designed to exploit weaknesses. Like the internet and globalization, the path forward is likely less about guiding such complex systems toward utopian outcomes and more about adapting to how humans wield them under the same competitive and collaborative drivers that have attended the entirety of human history.”</span></p><p data-dcnode-id="1951" style="padding-left: 30px"><strong data-dcnode-id="1953"><img alt="" class="alignright wp-image-46611" data-dcnode-id="1955" height="259" sizes="(max-width: 460px) 100vw, 460px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.elon.edu/u/imagining/wp-content/uploads/sites/964/2021/06/2021-Kenneth-Cukier-The-Future-of-Ethical-AI-Design43.jpg&amp;raw" srcset="https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Kenneth-Cukier-The-Future-of-Ethical-AI-Design43.jpg 2500w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Kenneth-Cukier-The-Future-of-Ethical-AI-Design43-300x169.jpg 300w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Kenneth-Cukier-The-Future-of-Ethical-AI-Design43-768x432.jpg 768w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Kenneth-Cukier-The-Future-of-Ethical-AI-Design43-1024x576.jpg 1024w" width="460"><span data-dcnode-id="1954" instrument_node="">Kenneth Cukier</span></strong><span data-dcnode-id="1952" instrument_node="">, senior editor at The Economist and coauthor of “Big Data,” said, “Few will set out to use AI in bad ways (though some criminals certainly will). The majority of institutions will apply AI to address real-world problems effectively, and AI will indeed work for that purpose. But if it is facial recognition, it will mean less privacy and risks of being singled out unfairly. If it is targeted advertising, it will be the risk of losing anonymity. In health care, an AI system may identify that some people need more radiation to penetrate the pigment in their skin to get a clearer medical image, but if this means Black people are blasted with higher doses of radiation and are therefore prone to negative side effects, people will believe there is an unfair bias.</span></p><p data-dcnode-id="1949" style="padding-left: 30px"><span data-dcnode-id="1950" instrument_node="">“In regard to global economics, a ‘neocolonial’ or ‘imperial’ commercial structure will form, whereby all countries have to become customers of AI from one of the major powers, America, China and, to a lesser extent, perhaps Europe.”</span></p><p data-dcnode-id="1945"><strong data-dcnode-id="1947"><span data-dcnode-id="1948" instrument_node="">Bruce Mehlman</span></strong><span data-dcnode-id="1946" instrument_node="">, a futurist and consultant, responded, “AI is powerful and has a huge impact, but it’s only a tool like gunpowder, electricity or aviation. Good people will use it in good ways for the benefit of mankind. Bad people will use it in nefarious ways to the detriment of society. Human nature has not changed and will neither be improved nor worsened by AI. It will be the best of technologies and the worst of technologies.”</span></p><p data-dcnode-id="1941" style="padding-left: 30px"><strong data-dcnode-id="1943"><span data-dcnode-id="1944" instrument_node="">Ian Thomson</span></strong><span data-dcnode-id="1942" instrument_node="">, a pioneer developer of the Pacific Knowledge Hub, observed, “It will always be the case that new uses of AI will raise ethical issues, but over time, these issues will be addressed so that the majority of uses will be ethical. Good uses of AI will include highlighting trends and developments that we are unhappy with. Bad uses will be around using AI to manipulate our opinions and behaviors for the financial gain of those rich enough to develop the AI and to the disadvantage of those less well-off. I am excited by how AI can help us make better decisions, but I am wary that it can also be used to manipulate us.”</span></p><p data-dcnode-id="1937"><strong data-dcnode-id="1939"><span data-dcnode-id="1940" instrument_node="">A professor of international affairs and economics at a Washington, D.C.-area university</span></strong><span data-dcnode-id="1938" instrument_node=""> wrote, “AI tends to be murky in the way it operates and the kinds of outcomes that it obtains. Consequently, it can easily be used to both good and bad ends without much practical oversight. AI, as it is currently implemented, tends to reduce the personal agency of individuals&nbsp; and instead creates a parallel agent who anticipates and creates needs in accordance with what others think is right. The individual being aided by AI should be able to fully comprehend what it is doing and easily alter how it works to better align with their own preferences. My concerns are allayed to the extent that the operation of AI, and its potential biases and/or manipulation remain unclear to the user. I fear its impact. This, of course, is independent from an additional concern for individual privacy. I want the user to be in control of the technology, not the other way around.”</span></p><p data-dcnode-id="1933" style="padding-left: 30px"><strong data-dcnode-id="1935"><span data-dcnode-id="1936" instrument_node="">Kate Klonick</span></strong><span data-dcnode-id="1934" instrument_node="">, a law professor at St. John’s University whose research is focused on law and technology, said, “AI will be used for both good and bad, like most new technologies. I do not see AI as a zero-sum negative of bad or good. I think at net AI has improved people’s lives and will continue to do so, but this is a source of massive contention within the communities that build AI systems and the communities that study their effects on society.”</span></p><p data-dcnode-id="1929"><strong data-dcnode-id="1931"><span data-dcnode-id="1932" instrument_node="">Stephan G. Humer</span></strong><span data-dcnode-id="1930" instrument_node="">, lecturer expert in digital life at Hochschule Fresenius University of Applied Sciences in Berlin, predicted, “We will see a dichotomy: Official systems will no longer be designed in such a naive and technology-centered way as in the early days of digitization, and ethics will play a major role in that. ‘Unofficial’ designs will, of course, take place without any ethical framing, for example, in the area of crime as a service. What worries me the most is lack of knowledge: Those who know little about AI will fear it, and the whole idea of AI will suffer. Spectacular developments will be mainly in the U.S. and China. The rest of the world will not play a significant role for the time being.”</span></p><p data-dcnode-id="1925" style="padding-left: 30px"><strong data-dcnode-id="1927"><span data-dcnode-id="1928" instrument_node="">An anonymous respondent</span></strong><span data-dcnode-id="1926" instrument_node=""> wrote, “It’s an open question. Black Lives Matter and other social justice movements must ‘shame’ and force profit-focused companies to delve into the inherently biased data and information they’re feeding the AI systems – the bots and robots – and try to keep those biased ways of thinking to a minimum. There will need to be checks and balances to ensure the AI systems don’t have the final word, including on hiring, promoting and otherwise rewarding people. I worry that AI systems such as facial recognition will be abused, especially by totalitarian governments, police forces in all countries and even retail stores – in regard to who is the ‘best’ and ‘most-suspicious’ shopper coming in the door. I worry that AI systems will lull people into being okay with giving up their privacy rights. But I also see artists, actors, movie directors and other creatives using AI to give voice to issues that our country needs to confront. I also hope that AI will somehow ease transportation, education and health care inequities.”</span></p><p data-dcnode-id="1921"><strong data-dcnode-id="1923"><span data-dcnode-id="1924" instrument_node="">Ilana Schoenfeld</span></strong><span data-dcnode-id="1922" instrument_node="">, an expert in designing online education and knowledge-sharing systems, said, “I am frightened and at the same time excited about the possibilities of the use of AI applications in the lives of more and more people. AI will be used in both ethical and questionable ways, as there will always be people on both sides of the equation trying to find ways to further their agendas. In order to ensure that the ethical use of AI outweighs its questionable use, we need to get our institutional safeguards right – both in terms of their structures and their enforcement by nonpartisan entities.”</span></p><p data-dcnode-id="1917" style="padding-left: 30px"><strong data-dcnode-id="1919"><span data-dcnode-id="1920" instrument_node="">A pioneer in venture philanthropy</span></strong><span data-dcnode-id="1918" instrument_node=""> commented, “While many will be ethical in the development and deployment of AI/ML, one cannot assume ‘goodness.’ Why will AI/ML be any different than how:</span></p><p data-dcnode-id="1915" style="padding-left: 30px"><span data-dcnode-id="1916" instrument_node="">1) cellphones enabled Al-Qaeda,</span></p><p data-dcnode-id="1913" style="padding-left: 30px"><span data-dcnode-id="1914" instrument_node="">2) ISIS exploited social media,</span></p><p data-dcnode-id="1911" style="padding-left: 30px"><span data-dcnode-id="1912" instrument_node="">3) Cambridge Analytica influenced elections,</span></p><p data-dcnode-id="1909" style="padding-left: 30px"><span data-dcnode-id="1910" instrument_node="">4) elements of foreign governments who launched service denial attacks or employed digital mercenaries and on and on. If anything, the potential for misuse and frightening abuse just escalates, making the need for a global ethical compact all that more essential.”</span></p><p data-dcnode-id="1905"><strong data-dcnode-id="1907"><span data-dcnode-id="1908" instrument_node="">Greg Shatan</span></strong><span data-dcnode-id="1906" instrument_node="">, a partner in Moses &amp; Singer LLC’s intellectual property group and a member of its internet and technology practice, wrote, “Ethical use will be widespread, but ethically questionable use will be where an ethicist would least want it to be: Oppressive state action in certain jurisdictions; the pursuit of profit leading to the hardening of economic strata; policing, etc.”</span></p><h2 data-dcnode-id="1903"><span data-dcnode-id="1904" instrument_node="">Further AI evolution itself raises questions and complications</span></h2><p data-dcnode-id="1901"><span data-dcnode-id="1902" instrument_node="">Some respondents said that the rise of AI raises new questions about what it means to be ethical. A number of these experts argued that today’s AI is unsophisticated compared with what the future is likely to bring. Acceleration from narrow AI to artificial general intelligence and possibly to artificial superintelligence is expected by some to evolve these tools beyond human control and understanding. Then, too, there’s the problem of misinformation and disinformation (such as deepfakes) and how they might befoul ethics systems.</span></p><p data-dcnode-id="1897" style="padding-left: 30px"><strong data-dcnode-id="1899"><span data-dcnode-id="1900" instrument_node="">David Barnhizer</span></strong><span data-dcnode-id="1898" instrument_node="">, professor of law emeritus and author of “The Artificial Intelligence Contagion: Can Democracy Withstand the Imminent Transformation of Work, Wealth and the Social Order?” wrote, “The pace of AI development has accelerated and is continuing to pick up speed. In considering the fuller range of the ‘goods’ and ‘bads’ of artificial intelligence, think of the implications of Masayoshi Son’s warning that: ‘Supersmart robots will outnumber humans, and more than a trillion objects will be connected to the internet within three decades.’ Researchers are creating systems that are increasingly able to teach themselves and use their new and expanding ability to improve and evolve. The ability to do this is moving ahead with amazing rapidity. They can achieve great feats, like driving cars and predicting diseases, and some of their makers say they aren’t entirely in control of their creations. Consider the implications of a system that can access, store, manipulate, evaluate, integrate and utilize all forms of knowledge. This has the potential to reach levels so far beyond what humans are capable of that it could end up as an omniscient and omnipresent system.</span></p><p data-dcnode-id="1895" style="padding-left: 30px"><span data-dcnode-id="1896" instrument_node="">“Is AI humanity’s ‘last invention’? Oxford’s Nick Bostrom suggests we may lose control of AI systems sooner than we think. He asserts that our increasing inability to understand what such systems are doing, what they are learning and how the ‘AI Mind’ works as it further develops could inadvertently cause our own destruction. Our challenges are numerous, even if we only had to deal with the expanding capabilities of AI systems based on the best binary technology. The incredible miniaturization and capability shift represented by quantum computers has implications far beyond binary AI.</span></p><p data-dcnode-id="1893" style="padding-left: 30px"><span data-dcnode-id="1894" instrument_node="">“The work on technological breakthroughs such as quantum computers capable of operating at speeds that are multiple orders of magnitude beyond even the fastest current computers is still at a relatively early stage and will take time to develop beyond the laboratory context. If scientists are successful in achieving a reliable quantum computer system, the best exascale system will pale in relation to the reduced size and exponentially expanded capacity of the most advanced existing computer systems. This will create AI/robotics applications and technologies we can now only imagine. … When fully developed, quantum computers will have data-handling and processing capabilities far beyond those of current binary systems. When this occurs in the commercialized context, predictions about what will happen to humans and their societies are ‘off the board.’”</span></p><p data-dcnode-id="1889"><strong data-dcnode-id="1891"><span data-dcnode-id="1892" instrument_node="">An expert in the regulation of risk and the roles of politics within science and science within politics</span></strong><span data-dcnode-id="1890" instrument_node=""> observed, “In my work, I use cost-benefit analysis. It is an elegant model that is generally recognized to ignore many of the most important aspects of decision-making – how to ‘value’ nonmonetary benefits, for example. Good CBA analysts tend to be humble about their techniques, noting that they provide a partial view of decision structures. I’ve heard too many AI enthusiasts talk about AI applications with no humility at all. Cathy O’Neil’s book ‘Weapons of Math Destruction’ was perfectly on target: If you can’t count it, it doesn’t exist. The other major problem is widely discussed: the transparency of the algorithms. One problem with AI is that it is self-altering. We almost certainly won’t know what an algorithm has learned, adopted, mal-adopted, etc. This problem already exists, for example, in using AI for hiring decisions. I doubt there will be much hesitancy about grabbing AI as the ‘neutral, objective, fast, cheap’ way to avoid all those messy human-type complications, such as justice, empathy, etc.”</span></p><p data-dcnode-id="1885" style="padding-left: 30px"><strong data-dcnode-id="1887"><span data-dcnode-id="1888" instrument_node="">Neil Davies</span></strong><span data-dcnode-id="1886" instrument_node="">, co-founder of Predictable Network Solutions and a pioneer of the committee that oversaw the UK’s initial networking developments, commented, “Machine learning (I refuse to call it AI, as the prerequisite intelligence behind such systems is definitely not artificial) is fundamentally about transforming a real-world issue into a numerical value system, the processing (and decisions) being performed entirely in that numerical system. For there to be an ethical dimension to such analysis, there needs to be a means of assessing the ethical outcome as a (function from) such a numerical value space. I know of no such work. …</span></p><p data-dcnode-id="1883" style="padding-left: 30px"><span data-dcnode-id="1884" instrument_node="">“There is a nontrivial possibility of multiple dystopian outcomes. The UK government’s track record, as an example – but other countries have their examples, too, on universal credit, Windrush, EU settled status, etc., are all examples of a value-based assessment process in which the notion of assurance against some ethical framework is absent. The global competition aspect is likely to lead to monopolistic tendencies over the ‘ownership’ of information – much of which would be seen as a common good today. …</span></p><p data-dcnode-id="1881" style="padding-left: 30px"><span data-dcnode-id="1882" instrument_node="">“A cautionary tale: In the mathematics that underpins all modelling of this kind (category theory), there are the notions of ‘infidelity’ and ‘junk.’ Infidelity is the failure to capture the ‘real world’ well enough to even have the appropriate values (and structure of values) in the evaluatable model; this leads to ‘garbage in, garbage out.’ Junk, on the other hand, are things that come into existence only as artefacts in the model. Such junk artefacts are often difficult to recognise (in that, if they were easy the model would have been adapted to deny their very existence) and can be alluring to the model creator (the human intelligence) and the machine algorithms as they seek their goal. Too many of these systems will create negative (and destructive) value because of the failure to recognise recognize this fundamental limitation; the failure to perform adequate (or even any) assurance on the operation of the system; and, pure hubris driven by the need to show a ‘return on investment’ for such endeavours.”</span></p><p data-dcnode-id="1877"><strong data-dcnode-id="1879"><span data-dcnode-id="1880" instrument_node="">Sarita Schoenebeck</span></strong><span data-dcnode-id="1878" instrument_node="">, an associate professor at the School of Information at the University of Michigan, said, “AI will mostly be used in questionable ways and sometimes not used at all. There’s little evidence that researchers can discern or agree on what ethical AI looks like, let alone be able to build it within a decade. Ethical AI should minimize harm, repair injustices, avoid re-traumatization and center user needs rather than technological goals. Ethical AI will need to shift away from notions of fairness, which overlook concepts like harm, injustice and trauma. This requires reconciling AI design principles like scalability and automation with individual and community values.”</span></p><p data-dcnode-id="1873" style="padding-left: 30px"><strong data-dcnode-id="1875"><span data-dcnode-id="1876" instrument_node="">Jeff Gulati</span></strong><span data-dcnode-id="1874" instrument_node="">, professor of political science at Bentley University, responded, “It seems that more AI and the data coming out could be useful in increasing public safety and national security. In a crisis, we will be more willing to rely on these applications and data. As the crisis subsides, it is unlikely that the structures and practices built during the crisis will go away and unlikely to remain idle. I could see it being used in the name of prevention and lead to further erosion of privacy and civil liberties in general. And, of course, these applications will be available to commercial organizations, who will get to know us more intimately so they can sell us more stuff we don’t really need.”</span></p><p data-dcnode-id="1869"><strong data-dcnode-id="1871"><span data-dcnode-id="1872" instrument_node="">A senior leader for an international digital rights organization</span></strong><span data-dcnode-id="1870" instrument_node=""> commented, “Why would AI be used ethically? You only have to look at the status quo to see that it’s not used ethically. Lots of policymakers don’t understand AI at all. Predictive policing is a buzzword, but most of it is snake oil. Companies will replace workers with AI systems if they can. They’re training biased biometric systems. And we don’t even know in many cases what the algorithm is really doing; we are fighting for transparency and explainability.</span></p><p data-dcnode-id="1867"><span data-dcnode-id="1868" instrument_node="">“I expect this inherent opaqueness of AI/ML techs to be a feature for companies (and governments) – not a bug. Deepfakes are an example. Do you expect ethical use? Don’t we think about it precisely because we expect unethical, bad-faith use in politics, ‘revenge porn,’ etc.? In a tech-capitalist economy, you have to create and configure the system even to begin to have incentives for ethical behavior. And one basic part of ethics is thinking about who might be harmed by your actions and maybe even respecting their agency in decisions that are fateful for them.</span></p><p data-dcnode-id="1865"><span data-dcnode-id="1866" instrument_node="">“Finally, of course AI has enormous military applications, and U.S. thinking on AI takes place in a realm of conflict with China. That again does not make me feel good. China is leading, or trying to lead, the world in social and political surveillance, so it’s driving facial recognition and biometrics. Presumably, China is trying to do the same in military or defense areas, and the Pentagon is presumably competing like mad. I don’t even know how to talk about ethical AI in the military context.”</span></p><p data-dcnode-id="1861" style="padding-left: 30px"><strong data-dcnode-id="1863"><span data-dcnode-id="1864" instrument_node="">Emmanuel Evans Ntekop</span></strong><span data-dcnode-id="1862" instrument_node=""> observed, “Without the maker, the object is useless. The maker is the programmer and the god to its objects. It was an idea from the start to support as a slave to its master the people, like automobiles.”</span></p><h2 data-dcnode-id="1859"><span data-dcnode-id="1860" instrument_node="">Control of AI is concentrated in the hands of powerful companies and governments driven by profit and power motives</span></h2><p data-dcnode-id="1857"><span data-dcnode-id="1858" instrument_node="">Many of these experts expressed concern that AI systems are being built by for-profit firms and by governments focused on applying AI for their own purposes. Some said governments are passive enablers of corporate abuses of AI. They noted that the public is unable to understand how the systems are built, they are not informed as to their impact and they are unable to challenge firms that try to invoke ethics in a public relations context but are not truly committed to ethics. Some experts said the phrase “ethical AI” will merely be used as public relations window dressing to try to deflect scrutiny of questionable applications.</span></p><p data-dcnode-id="1855"><span data-dcnode-id="1856" instrument_node="">A number of these experts framed their concerns around the lack of transparency about how AI products are designed and trained. Some noted that product builders are programming AI by using available datasets with no analysis of the potential for built-in bias or other possible quality or veracity concerns.</span></p><p data-dcnode-id="1851"><strong data-dcnode-id="1853"><span data-dcnode-id="1854" instrument_node="">Joseph Turow</span></strong><span data-dcnode-id="1852" instrument_node="">, professor of communication at the University of Pennsylvania, wrote, “Terms such ‘transparency, justice and fairness, privacy, freedom and human autonomy, beneficence and nonmaleficence, freedom, trust, sustainability and dignity’ can have many definitions so that companies (and governments) can say they espouse one or another term but then implement it algorithmically in ways that many outsiders would not find satisfactory. For example, the Chinese government may say its AI technologies embed values of freedom, human autonomy and dignity. My concern is that companies will define ‘ethical’ in ways that best match their interests, often with vague precepts that sound good from a PR standpoint but, when integrated into code, allow their algorithms to proceed in ways that do not constrain them from creating products that ‘work’ in a pragmatic sense.”</span></p><p data-dcnode-id="1846" style="padding-left: 30px"><strong data-dcnode-id="1848"><img alt="" class="alignright wp-image-46615" data-dcnode-id="1850" height="259" sizes="(max-width: 460px) 100vw, 460px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.elon.edu/u/imagining/wp-content/uploads/sites/964/2021/06/2021-Charlie-Kaufman-The-Future-of-Ethical-AI-Design3.jpg&amp;raw" srcset="https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Charlie-Kaufman-The-Future-of-Ethical-AI-Design3.jpg 2500w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Charlie-Kaufman-The-Future-of-Ethical-AI-Design3-300x169.jpg 300w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Charlie-Kaufman-The-Future-of-Ethical-AI-Design3-768x432.jpg 768w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Charlie-Kaufman-The-Future-of-Ethical-AI-Design3-1024x576.jpg 1024w" width="460"><span data-dcnode-id="1849" instrument_node="">Charlie Kaufman</span></strong><span data-dcnode-id="1847" instrument_node="">, a security architect with Dell EMC, said, “There may be ethical guidelines imposed on AI-based systems by legal systems in 2030, but they will have little effect – just as privacy principles have little effect today. Businesses are motivated to maximize profits, and they will find ways to do that, giving only lip service to other goals. If ethical behavior or results were easy to define or measure, perhaps society could incentivize them. But usually, the implications of some new technological development don’t become clear until it has already spread too far to contain it.</span></p><p data-dcnode-id="1844" style="padding-left: 30px"><span data-dcnode-id="1845" instrument_node="">“The biggest impact of AI-based systems is the ability to automate increasingly complex jobs, and this will cause dislocations in the job market and in society. Whether it turns out to be a benefit to society or a disaster depends on how society responds and adjusts. But it doesn’t matter, because there is no way to suppress the technology. The best we can do is figure out how to optimize the society that results.</span></p><p data-dcnode-id="1842" style="padding-left: 30px"><span data-dcnode-id="1843" instrument_node="">“I’m not concerned about the global competition in AI systems. Regardless of where the progress comes from, it will affect us all. And it is unlikely the most successful developers will derive any permanent advantage. The most important implication of the global competition is that it is pointless for any one country or group of countries to try to suppress the technology. Unless it can be suppressed everywhere, it is coming. Let’s try to make that be a good thing!”</span></p><p data-dcnode-id="1838"><strong data-dcnode-id="1840"><span data-dcnode-id="1841" instrument_node="">Simeon Yates</span></strong><span data-dcnode-id="1839" instrument_node="">, a professor expert in digital culture and personal interaction at the University of Liverpool and the research lead for the UK government’s Digital Culture team, predicted, “Until we bring in ‘ethical-by-design’ (responsible innovation) principles to ICT [information and communications technologies] and AI/machine learning design – like attempts to create ‘secure-by-design’ systems to fight cybercrime – the majority of AI systems will remain biased and unethical in principle. Though there is a great public debate about AI ethics, and many organisations are seeking to provide both advice and research on the topic, there is no economic or political imperative to make AI systems ethical. First of all, there is great profit to be made from the manipulation of data and, through it, people. Second, there is a limited ability at present for governments to think through how to regulate AI and enforce ethics (as they do say for bio-sciences). Third, governments are complicit often in poor and ethically questionable use of data. Further, this is not in the main ‘artificial intelligence’ – but relatively simplistic statistical machine learning based on biased datasets. The knowing use of such is in and of itself unethical yet often profitable. The presentation of such solutions as bias-free or more rational or often ‘cleverer’ as they are based on ‘cold computation,’ not ‘emotive human thinking,’ is itself a false and an unethical claim.”</span></p><p data-dcnode-id="1834" style="padding-left: 30px"><strong data-dcnode-id="1836"><span data-dcnode-id="1837" instrument_node="">Colin Allen</span></strong><span data-dcnode-id="1835" instrument_node="">, a cognitive scientist and philosopher who has studied and written about AI ethics, wrote, “Corporate and government statements of ethics are often broad and nonspecific and thus vague with respect to what specifically is disallowed. This allows considerable leeway in how such principles are implemented and makes enforcement difficult. In the U.S., I don’t see strong laws being enacted within 10 years that would allow for the kind of oversight that would prevent unethical or questionable uses of AI, whether intended or accidental.</span></p><p data-dcnode-id="1832" style="padding-left: 30px"><span data-dcnode-id="1833" instrument_node="">“On the hopeful side, there is increasing public awareness and journalistic coverage of these issues that may influence corporations to build and protect their reputations for good stewardship of AI. But corporations have a long history of hiding or obfuscating their true intent (it’s partly required to stay competitive, not to let everyone else know what you are doing) as well as engaging actively in public disinformation campaigns. I don’t see that changing, and, given that the business advantages to using AI will be mostly in data analytics and prediction and not so much in consumer gadgets in the next 10 years, much of the use of AI will be ‘behind the scenes,’ so to speak.</span></p><p data-dcnode-id="1830" style="padding-left: 30px"><span data-dcnode-id="1831" instrument_node="">“Another class of problem is that individuals in both corporate and government jobs who have access to data will be tempted, as we have seen already, to access information about people they know and use that information in some way against them. Nevertheless, there will undoubtedly be some very useful products that consumers will want to use and that they will benefit from. The question is whether these added benefits will constitute a Faustian bargain, leading down a path that will be difficult if not impossible to reverse.”</span></p><p data-dcnode-id="1826"><strong data-dcnode-id="1828"><span data-dcnode-id="1829" instrument_node="">Alice E. Marwick</span></strong><span data-dcnode-id="1827" instrument_node="">, assistant professor of communication at the University of North Carolina, Chapel Hill, and adviser for the Media Manipulation project at the Data &amp; Society Research Institute, commented, “I have no faith in our current system of government to pass any sort of legislation that deals with technology in a complex or nuanced way. We cannot depend on technology companies to self-regulate, as there are too many financial incentives to employ AI systems in ways that disadvantage people or are unethical.”</span></p><p data-dcnode-id="1821" style="padding-left: 30px"><strong data-dcnode-id="1823"><img alt="" class="alignright wp-image-46619" data-dcnode-id="1825" height="259" sizes="(max-width: 460px) 100vw, 460px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.elon.edu/u/imagining/wp-content/uploads/sites/964/2021/06/2021-Jillian-York-The-Future-of-Ethical-AI-Design38.jpg&amp;raw" srcset="https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Jillian-York-The-Future-of-Ethical-AI-Design38.jpg 2500w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Jillian-York-The-Future-of-Ethical-AI-Design38-300x169.jpg 300w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Jillian-York-The-Future-of-Ethical-AI-Design38-768x432.jpg 768w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Jillian-York-The-Future-of-Ethical-AI-Design38-1024x576.jpg 1024w" width="460"><span data-dcnode-id="1824" instrument_node="">Jillian York</span></strong><span data-dcnode-id="1822" instrument_node="">, director of international freedom of expression for the Electronic Frontier Foundation, said, “There is absolutely no question that AI will be used in questionable ways. There is no regulatory regime, and many ‘ethics in AI’ projects are simply window dressing for an unaccountable and unethical industry. When it comes to AI, everything concerns me and nothing excites me. I don’t see the positive potential, just another ethical morass, because the people running the show have no desire to build technology to benefit the 99%.”</span></p><p data-dcnode-id="1817"><strong data-dcnode-id="1819"><span data-dcnode-id="1820" instrument_node="">David Mussington</span></strong><span data-dcnode-id="1818" instrument_node="">, a senior fellow at CIGI and professor and director at the Center for Public Policy and Private Enterprise at the University of Maryland, predicted, “Most AI systems deployed by 2030 will be owned and developed in the private sector, both in the U.S. and elsewhere in the world. I can’t conceive of a legislative framework fully up to understanding and selectively intervening in AI rollouts in a manner with predictable consequences. Also, the mode of intervention – because I think interventions by public authorities will be attempted (just not successful) – is itself in doubt. Key questions:</span></p><ul data-dcnode-id="1808"><li data-dcnode-id="1815"><span data-dcnode-id="1816" instrument_node="">Do public authorities understand AI and its applications?</span></li><li data-dcnode-id="1813"><span data-dcnode-id="1814" instrument_node="">Is public-institution-sponsored R&amp;D in AI likely to inform government and public research agencies of the scale and capability trajectory of private sector AI research and development?</span></li><li data-dcnode-id="1811"><span data-dcnode-id="1812" instrument_node="">As tool sets for AI development continue to empower small research groups and individuals (datasets, software-development frameworks and open-source algorithms), how is a government going to keep up – let alone maintain awareness – of AI progress?</span></li><li data-dcnode-id="1809"><span data-dcnode-id="1810" instrument_node="">Does the government have access to the expertise necessary to make good policy – and anticipate possible risk factors?</span></li></ul><p data-dcnode-id="1806"><span data-dcnode-id="1807" instrument_node="">“I think that the answers to most of these questions are in the negative.”</span></p><p data-dcnode-id="1802" style="padding-left: 30px"><strong data-dcnode-id="1804"><span data-dcnode-id="1805" instrument_node="">Giacomo Mazzone</span></strong><span data-dcnode-id="1803" instrument_node="">, head of institutional relations for the European Broadcasting Union and Eurovision, observed, “Nobody could realistically predict ethics for AI will evolve, despite all of the efforts deployed by the UN secretary general, the UNESCO director general and many others. Individuals alone can’t make these decisions because AI is applied at mass scale. Nobody will create an algorithm to solve it. Ethical principles are likely to be applied only if industry agrees to do so; it is likely that this will not happen until governments that value human rights will oblige companies to do so.</span></p><p data-dcnode-id="1800" style="padding-left: 30px"><span data-dcnode-id="1801" instrument_node="">“The size and influence of the companies that control AI and its impact on citizens is making them more powerful than any one nation-state. So, it is very likely only regional supranational powers such as the European Union or multilateral institutions such as the United Nations – if empowered by all nation-states – could require companies to apply ethical rules to AI. Of course, many governments already do not support human rights principles, considering the preservation of the existing regime to be a priority more important than individual citizens’ rights.”</span></p><p data-dcnode-id="1796"><strong data-dcnode-id="1798"><span data-dcnode-id="1799" instrument_node="">Rob Frieden</span></strong><span data-dcnode-id="1797" instrument_node="">, a professor of telecommunications law at Penn State who previously worked with Motorola and has held senior policy positions at the FCC and the NTIA, said, “I cannot see a future scenario where governments can protect citizens from the incentives of stakeholders to violate privacy and fair-minded consumer protections. Surveillance, discrimination, corner cutting, etc., are certainties. I’m mindful of the adage: garbage in, garbage out. It’s foolish to think AI will lack flawed coding.”</span></p><p data-dcnode-id="1792" style="padding-left: 30px"><strong data-dcnode-id="1794"><span data-dcnode-id="1795" instrument_node="">Alex Halavais</span></strong><span data-dcnode-id="1793" instrument_node="">, associate professor of critical data studies, Arizona State University, noted, “It isn’t a binary question. I teach in a graduate program that has training in the ethical use of data at its core and hopes to serve organizations that aim to incorporate ethical approaches. There are significant ethical issues in the implementation of any algorithmic system, and such systems have the ethical questions they address coded into them. In most cases, these will substantially favor the owners of the technologies that implement them rather than the consumers.</span></p><p data-dcnode-id="1790" style="padding-left: 30px"><span data-dcnode-id="1791" instrument_node="">“I have no doubt that current unethical practices by companies, governments and other organizations will continue to grow. We will have a growing number of cases where those ethical concerns come to the forefront (as they have recently with facial recognition), but unless they rise to the level of very widespread abuse, it is unlikely that they will be regulated. As a result, they will continue to serve those who pay for the technologies or own them, and the rights and interests of individual users will be pushed to the sidelines. That does not mean that ethics will be ignored.</span></p><p data-dcnode-id="1788" style="padding-left: 30px"><span data-dcnode-id="1789" instrument_node="">“I expect many large technology companies will make an effort to hire professional ethicists to audit their work, and that we may see companies that differentiate themselves through more ethical approaches to their work.”</span></p><p data-dcnode-id="1784"><strong data-dcnode-id="1786"><span data-dcnode-id="1787" instrument_node="">Ebenezer Baldwin Bowles</span></strong><span data-dcnode-id="1785" instrument_node="">, an advocate/activist, commented, “Altruism on the part of the designers of AI is a myth of corporate propaganda. Ethical interfaces between AI and citizenry in 2030 will be a cynical expression by the designers of a digital Potemkin Village – looks good from the outside but totally empty behind the facade. AI will function according to two motivations: one, to gather more and more personal information for the purposes of subliminal and direct advertising and marketing campaigns; and two, to employ big data to root out radical think
