444" style="padding-left: 30px"><strong data-dcnode-id="2446"><span data-dcnode-id="2447" instrument_node="">Marjory S. Blumenthal</span></strong><span data-dcnode-id="2445" instrument_node="">, director of the science, technology and policy program at RAND Corporation, observed, “This is the proverbial onion; there is no simple answer. Some of the challenge is in the lifecycle – it begins with how the data are collected, labeled (if they are for training) and then used, possibly involving different actors with different views of what is ethical. Some of the challenges involve the interest-balancing of companies, especially startups, that have always placed function and product delivery over security and privacy.</span></p><p data-dcnode-id="2442" style="padding-left: 30px"><span data-dcnode-id="2443" instrument_node="">“Some of the challenges reflect the fact that, in addition to privacy and security for some applications, safety is also a concern (and there are others). Some of the challenges reflect the fact that. even with international efforts like that of IEEE, views of what ethics are appropriate differ around the world.</span></p><p data-dcnode-id="2440" style="padding-left: 30px"><span data-dcnode-id="2441" instrument_node="">“Today’s AI mania implies that a lot of people are rushing to be able to say that they use or produce AI, and anything rushed will have compromises. Notwithstanding the concerns, the enthusiasm for AI builds on long histories improving processing hardware, data-handling capability and algorithms. Better systems for education and training should be available and should enable the kind of customization long promised but seldom achieved. Aids to medical diagnoses should become more credible, along with aids to development of new therapies. The support provided by today’s ‘smart speakers’ should become more meaningful and more useful (especially if clear attention to privacy and security comes with the increased functionality).”</span></p><h4 data-dcnode-id="2437"><img alt="" class="alignright wp-image-46510" data-dcnode-id="2439" height="259" sizes="(max-width: 460px) 100vw, 460px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.elon.edu/u/imagining/wp-content/uploads/sites/964/2021/06/2021-Ethan-Zuckerman-The-Future-of-Ethical-AI-Design12.jpg&amp;raw" srcset="https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Ethan-Zuckerman-The-Future-of-Ethical-AI-Design12.jpg 2500w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Ethan-Zuckerman-The-Future-of-Ethical-AI-Design12-300x169.jpg 300w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Ethan-Zuckerman-The-Future-of-Ethical-AI-Design12-768x432.jpg 768w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Ethan-Zuckerman-The-Future-of-Ethical-AI-Design12-1024x576.jpg 1024w" width="460"><span data-dcnode-id="2438" instrument_node="">Ethical AI is definitely being addressed, creating a rare opportunity to deploy it positively</span></h4><p data-dcnode-id="2433"><strong data-dcnode-id="2435"><span data-dcnode-id="2436" instrument_node="">Ethan Zuckerman</span></strong><span data-dcnode-id="2434" instrument_node="">, director of MIT’s Center for Civic Media and associate professor at the MIT Media Lab, commented, “The activists and academics advocating for ethical uses of AI have been remarkably successful in having their concerns aired even as harms of misused AI are just becoming apparent.</span></p><p data-dcnode-id="2431"><span data-dcnode-id="2432" instrument_node="">“The campaigns to stop the use of facial recognition because of racial biases is a precursor of a larger set of conversations about serious ethical issues around AI. Because these pioneers have been so active in putting AI ethics on the agenda, I think we have a rare opportunity to deploy AI in a vastly more thoughtful way that we otherwise might have.”</span></p><h4 data-dcnode-id="2429" style="padding-left: 30px"><span data-dcnode-id="2430" instrument_node="">Failures despite good intentions loom ahead, but society will still reap benefits</span></h4><p data-dcnode-id="2424" style="padding-left: 30px"><strong data-dcnode-id="2426"><img alt="" class="alignright wp-image-46526" data-dcnode-id="2428" height="259" sizes="(max-width: 460px) 100vw, 460px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.elon.edu/u/imagining/wp-content/uploads/sites/964/2021/06/2021-Vint-Cerf-The-Future-of-Ethical-AI-Design33.jpg&amp;raw" srcset="https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Vint-Cerf-The-Future-of-Ethical-AI-Design33.jpg 2500w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Vint-Cerf-The-Future-of-Ethical-AI-Design33-300x169.jpg 300w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Vint-Cerf-The-Future-of-Ethical-AI-Design33-768x432.jpg 768w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Vint-Cerf-The-Future-of-Ethical-AI-Design33-1024x576.jpg 1024w" width="460"><span data-dcnode-id="2427" instrument_node="">Vint Cerf</span></strong><span data-dcnode-id="2425" instrument_node="">, Internet Hall of Fame member and vice president and chief internet evangelist at Google, observed, “There will be a good-faith effort, but I am skeptical that the good intentions will necessarily result in the desired outcomes. Machine learning is still in its early days, and our ability to predict various kinds of failures and their consequences is limited.</span></p><p data-dcnode-id="2422" style="padding-left: 30px"><span data-dcnode-id="2423" instrument_node="">“The ML design space is huge and largely unexplored. If we have trouble with ordinary software whose behavior is at least analytic, ML is another story. And our track record on normal software stinks (buggy code!).</span></p><p data-dcnode-id="2420" style="padding-left: 30px"><span data-dcnode-id="2421" instrument_node="">“We are, however, benefiting enormously from many ML applications, including speech recognition and language translation, search efficiency and effectiveness, medical diagnosis, exploration of massive data to find patterns, trends and unique properties (e.g., pharmaceuticals). Discovery science is benefiting (e.g., finding planets around distant stars). Pretty exciting stuff.”</span></p><h4 data-dcnode-id="2417"><img alt="" class="alignright wp-image-46534" data-dcnode-id="2419" height="259" sizes="(max-width: 460px) 100vw, 460px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.elon.edu/u/imagining/wp-content/uploads/sites/964/2021/06/2021-Susan-Etlinger-The-Future-of-Ethical-AI-Design29.jpg&amp;raw" srcset="https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Susan-Etlinger-The-Future-of-Ethical-AI-Design29.jpg 2500w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Susan-Etlinger-The-Future-of-Ethical-AI-Design29-300x169.jpg 300w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Susan-Etlinger-The-Future-of-Ethical-AI-Design29-768x432.jpg 768w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Susan-Etlinger-The-Future-of-Ethical-AI-Design29-1024x576.jpg 1024w" width="460"><span data-dcnode-id="2418" instrument_node="">Commitment can bring positive results; all bets are off when it comes to weapons</span></h4><p data-dcnode-id="2413"><strong data-dcnode-id="2415"><span data-dcnode-id="2416" instrument_node="">Susan Etlinger</span></strong><span data-dcnode-id="2414" instrument_node="">, industry analyst for Altimeter, wrote, “AI is, fundamentally, an idea about how we can make machines that replicate some aspects of human ability. So, we should expect to see ethical norms around bias, governance and transparency become more common, much the same way we’ve seen the auto industry and others adopt safety measures like seatbelts, airbags and traffic signals over time. But of course people are people, so for every ethical principle there will always be someone who ignores or circumvents it.</span></p><p data-dcnode-id="2411"><span data-dcnode-id="2412" instrument_node="">“I’m heartened by some of the work I’ve seen from the large tech companies. It’s not consistent, it’s not enough, but there are enough people who are genuinely committed to using technology responsibly that we will see some measure of positive change. Of course, all claims of AGI – automated general intelligence –&nbsp;are immediately suspect, not only because it’s still hypothetical at this point, but because we haven’t even ironed out the governance implications of automation. And all bets are off when we are talking about AI-enabled weaponry, which will require a level of diplomacy, policy and global governance similar to nuclear power.”</span></p><h4 data-dcnode-id="2408" style="padding-left: 30px"><img alt="" class="alignright wp-image-46538" data-dcnode-id="2410" height="259" sizes="(max-width: 460px) 100vw, 460px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.elon.edu/u/imagining/wp-content/uploads/sites/964/2021/06/2021-Esther-Dyson-The-Future-of-Ethical-AI-Design31.jpg&amp;raw" srcset="https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Esther-Dyson-The-Future-of-Ethical-AI-Design31.jpg 2500w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Esther-Dyson-The-Future-of-Ethical-AI-Design31-300x169.jpg 300w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Esther-Dyson-The-Future-of-Ethical-AI-Design31-768x432.jpg 768w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Esther-Dyson-The-Future-of-Ethical-AI-Design31-1024x576.jpg 1024w" width="460"><span data-dcnode-id="2409" instrument_node="">More transparency in digital and human systems can emerge from all of this</span></h4><p data-dcnode-id="2404" style="padding-left: 30px"><strong data-dcnode-id="2406"><span data-dcnode-id="2407" instrument_node="">Esther Dyson</span></strong><span data-dcnode-id="2405" instrument_node="">, internet pioneer, journalist, entrepreneur and executive founder of Wellville, responded, “With luck, we’ll increase transparency around what AI is doing (as well as around what people are doing), because it will be easier to see the impact of decisions made by both people and algorithms. Cue the research about what time of day you want to go to trial (e.g., before or after the judge has lunch).</span></p><p data-dcnode-id="2402" style="padding-left: 30px"><span data-dcnode-id="2403" instrument_node="">“The more we use AI to reveal such previously hidden patterns, the better for us all. So, a lot depends on society’s willingness to look at the truth and to act/make decisions accordingly. With luck, a culture of transparency will cause this to happen. But history shows that a smooth trajectory toward enlightenment is unlikely.”</span></p><h4 data-dcnode-id="2400"><span data-dcnode-id="2401" instrument_node="">AI making decisions on its own is an understandable but possibly unstoppable worry</span></h4><p data-dcnode-id="2396"><strong data-dcnode-id="2398"><span data-dcnode-id="2399" instrument_node="">Brad Templeton</span></strong><span data-dcnode-id="2397" instrument_node="">, internet pioneer, futurist, activist and chair emeritus of the Electronic Frontier Foundation, said, “For now, at least, and probably to 2030, AI is a tool, not an actor in its own right. It will not be good or evil, but it will be used with good and evil intent and also for unintended reasons. But this is not a question for a simple survey. People are writing books about this question. To go into a few of the popular topics: The use of AI to replace jobs is way overblown. We have 150 years of Chicken Little predictions that machines would take all the jobs, and they’ve always been wrong. First, that in most cases they didn’t take the jobs, or that we would be bothered when they did. There are more bank tellers today than in 1970, it is reported. At the same time, half of us worked in agriculture in 1900, and now a small percentage do.</span></p><p data-dcnode-id="2393"><img alt="" class="alignright wp-image-46542" data-dcnode-id="2395" height="259" sizes="(max-width: 460px) 100vw, 460px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.elon.edu/u/imagining/wp-content/uploads/sites/964/2021/06/2021-Brad-Templeton-The-Future-of-Ethical-AI-Design47.jpg&amp;raw" srcset="https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Brad-Templeton-The-Future-of-Ethical-AI-Design47.jpg 2500w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Brad-Templeton-The-Future-of-Ethical-AI-Design47-300x169.jpg 300w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Brad-Templeton-The-Future-of-Ethical-AI-Design47-768x432.jpg 768w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Brad-Templeton-The-Future-of-Ethical-AI-Design47-1024x576.jpg 1024w" width="460"><span data-dcnode-id="2394" instrument_node="">“The privacy worries are real, including the undefined threat that AI in the future will be able to examine the data of the present (which we are recording, but can’t yet process) in ways that will come back to bite you. I call this the threat of ‘time travelling robots from the future.’ They don’t really go back in time, but the AI of the future can affect what you do today. The fears of bias are both real and overblown. Yes, we will encode our biases into AIs. At the same time, the great thing about computers is once you see a problem you can usually fix it. Studies have shown it’s nearly impossible for humans to correct their biases, even when aware of them. For machines, that will be nothing. Strangely, when some people hear ‘AIs will be able to do one-third of the tasks you do in your work,’ some of them react with fear of losing a job. The other group reacts with, ‘Shut up and take my money!’ – they relish not having to do those tasks.</span></p><p data-dcnode-id="2391"><span data-dcnode-id="2392" instrument_node="">“When we start to worry about AI with agency – making decisions on its own – it is understandable why people worry about that. Unfortunately, relinquishment of AI development is not a choice. It just means the AIs of the future are built by others, which is to say your rivals. You can’t pick a world without AI; you can only pick a world where you have it or not.”</span></p><h4 data-dcnode-id="2389" style="padding-left: 30px"><span data-dcnode-id="2390" instrument_node="">It will be very difficult to predict what will be important and how things will work</span></h4><p data-dcnode-id="2385" style="padding-left: 30px"><strong data-dcnode-id="2387"><span data-dcnode-id="2388" instrument_node="">John L. King</span></strong><span data-dcnode-id="2386" instrument_node="">, a professor at the University of Michigan School of Information, commented, “There will be a huge increase in the discussion of revolutionary AI in daily life, but on closer inspection, things will be more incremental than most imagine. The ethical issues will sneak up on us as we move more slowly than people think when, suddenly, we cross some unforeseen threshold (it will be nonlinear) and things get serious. It will be very difficult to predict what will be important and how things will work.”</span></p><h4 data-dcnode-id="2383"><span data-dcnode-id="2384" instrument_node="">The public must take action to better align corporate interests with the public good</span></h4><p data-dcnode-id="2378"><strong data-dcnode-id="2380"><img alt="" class="alignright wp-image-46546" data-dcnode-id="2382" height="259" sizes="(max-width: 460px) 100vw, 460px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.elon.edu/u/imagining/wp-content/uploads/sites/964/2021/06/2021-David-Karger-The-Future-of-Ethical-AI-Design23.jpg&amp;raw" srcset="https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-David-Karger-The-Future-of-Ethical-AI-Design23.jpg 2500w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-David-Karger-The-Future-of-Ethical-AI-Design23-300x169.jpg 300w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-David-Karger-The-Future-of-Ethical-AI-Design23-768x432.jpg 768w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-David-Karger-The-Future-of-Ethical-AI-Design23-1024x576.jpg 1024w" width="460"><span data-dcnode-id="2381" instrument_node="">David Karger</span></strong><span data-dcnode-id="2379" instrument_node="">, professor at MIT’s Computer Science and Artificial Intelligence Laboratory, said, “The question as framed suggests that AI systems will be thinking by 2030. I don’t believe that’s the case. In 2030, AI systems will continue to be machines that do what their human users tell them to do. So, the important question is whether their human users will employ ethical principles focused primarily on the public good. Since that isn’t true now, I don’t expect it will be true in 2030 either. Just like now, most users of AI systems will be for-profit corporations, and just like now, they will be focused on profit rather than social good. These AI systems will certainly enable corporations to do a much better job of extracting profit, likely with a corresponding decrease in public good, unless the public itself takes action to better align the profit-interests of these corporations with the public good.</span></p><p data-dcnode-id="2376"><span data-dcnode-id="2377" instrument_node="">“In great part, this requires the passage of laws constraining what corporations can do in pursuit of profit; it also means the government quantifying and paying for public goods so that companies have a profit motive in pursuing them.</span></p><p data-dcnode-id="2374"><span data-dcnode-id="2375" instrument_node="">“Even in this time of tremendous progress, I find little to excite me about AI systems. In our frenzy to enhance the capabilities of machines, we are neglecting the existing and latent capabilities of human beings, where there is just as much opportunity for progress as there is in AI. We should be directing far more attention to research on helping people learn better, helping them interact online better and helping them make decisions better.”</span></p><h4 data-dcnode-id="2371" style="padding-left: 30px"><img alt="" class="alignright wp-image-46550" data-dcnode-id="2373" height="259" sizes="(max-width: 460px) 100vw, 460px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.elon.edu/u/imagining/wp-content/uploads/sites/964/2021/06/2021-Beth-Noveck-The-Future-of-Ethical-AI-Design9.jpg&amp;raw" srcset="https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Beth-Noveck-The-Future-of-Ethical-AI-Design9.jpg 2500w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Beth-Noveck-The-Future-of-Ethical-AI-Design9-300x169.jpg 300w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Beth-Noveck-The-Future-of-Ethical-AI-Design9-768x432.jpg 768w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Beth-Noveck-The-Future-of-Ethical-AI-Design9-1024x576.jpg 1024w" width="460"><span data-dcnode-id="2372" instrument_node="">AI tools must be designed with input from diverse groups of those affected by them</span></h4><p data-dcnode-id="2367" style="padding-left: 30px"><strong data-dcnode-id="2369"><span data-dcnode-id="2370" instrument_node="">Beth Noveck</span></strong><span data-dcnode-id="2368" instrument_node="">, director of the NYU Governance Lab and its MacArthur Research Network on Opening Governance, responded, “Successful AI applications depend upon the use of large quantities of data to develop algorithms. But a great deal of human decision-making is also involved in the design of such algorithms, beginning with the choice about what data to include and exclude. Today, most of that decision-making is done by technologists working behind closed doors on proprietary private systems.</span></p><p data-dcnode-id="2365" style="padding-left: 30px"><span data-dcnode-id="2366" instrument_node="">“If we are to realize the positive benefits of AI, we first need to change the governance of AI and ensure that these technologies are designed in a more participatory fashion with input and oversight from diverse audiences, including those most affected by the technologies. While AI can help to increase the efficiency and decrease the cost, for example, of interviewing and selecting job candidates, these tools need to be designed with workers lest they end up perpetuating bias.</span></p><p data-dcnode-id="2363" style="padding-left: 30px"><span data-dcnode-id="2364" instrument_node="">“While AI can make it possible to diagnose disease better than a single doctor can with the naked eye, if the tool is designed only using data from white men, it may be less optimal for diagnosing diseases among Black women. Until we commit to making AI more transparent and participatory, we will not realize its positive potential or mitigate the significant risks.”</span></p><h4 data-dcnode-id="2361"><span data-dcnode-id="2362" instrument_node="">There is no way to force unethical players to follow the ethics playbook</span></h4><p data-dcnode-id="2357"><strong data-dcnode-id="2359"><span data-dcnode-id="2360" instrument_node="">Sam S. Adams</span></strong><span data-dcnode-id="2358" instrument_node="">, a 24-year veteran of IBM, now working as a senior research scientist in artificial intelligence for RTI International, architecting national-scale knowledge graphs for global good, wrote, “The AI genie is completely out of the bottle already, and by 2030 there will be dramatic increases in the utility and universal access to advanced AI technology. This means there is practically no way to force ethical use in the fundamentally unethical fractions of global society.</span></p><p data-dcnode-id="2354"><img alt="" class="alignright wp-image-46554" data-dcnode-id="2356" height="259" sizes="(max-width: 460px) 100vw, 460px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.elon.edu/u/imagining/wp-content/uploads/sites/964/2021/06/2021-Sam-Adams-The-Future-of-Ethical-AI-Design18.jpg&amp;raw" srcset="https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Sam-Adams-The-Future-of-Ethical-AI-Design18.jpg 2500w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Sam-Adams-The-Future-of-Ethical-AI-Design18-300x169.jpg 300w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Sam-Adams-The-Future-of-Ethical-AI-Design18-768x432.jpg 768w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Sam-Adams-The-Future-of-Ethical-AI-Design18-1024x576.jpg 1024w" width="460"><span data-dcnode-id="2355" instrument_node="">“The multimillennial problem with ethics has always been: Whose ethics? Who decides and then who agrees to comply? That is a fundamentally human problem that no technical advance or even existential threat will totally eliminate. Basically, we are stuck with each other and hopefully at least a large fraction will try to make the best of it. But there is too much power and wealth available for those who will use advanced technology unethically, and universal access via cloud, IoT [Internet of Things] and open-source software will make it all too easy for an unethical player to exploit.</span></p><p data-dcnode-id="2352"><span data-dcnode-id="2353" instrument_node="">“I believe the only realistic path is to provide an open playing field. That universal access to the technology at least arms both sides equally. This may be the equivalent of a mutually assured destruction policy, but to take guns away from the good guys only means they can’t defend themselves from the bad guys anymore.”</span></p><h4 data-dcnode-id="2350" style="padding-left: 30px"><span data-dcnode-id="2351" instrument_node="">AI for personalized medicine could lead to the ‘Brave New World’ of Aldous Huxley</span></h4><p data-dcnode-id="2346" style="padding-left: 30px"><strong data-dcnode-id="2348"><span data-dcnode-id="2349" instrument_node="">Joël Colloc</span></strong><span data-dcnode-id="2347" instrument_node="">, professor of computer sciences at Le Havre University, Normandy, responded, “Most researchers in the public domain have an ethical and epistemological culture and do research to find new ways to improve the lives of humanity. Rabelais used to say, ‘Science without conscience is the ruin of the soul.’ Science provides powerful tools. When these tools are placed only in the hands of private interests, for the sole purpose of making profit and getting even more money and power, the use of science can lead to deviances and even uses against the states themselves – even though it is increasingly difficult for these companies to enforce the laws, which do not necessarily have the public interest as their concern. It all depends on the degree of wisdom and ethics of the leader.</span></p><p data-dcnode-id="2344" style="padding-left: 30px"><span data-dcnode-id="2345" instrument_node="">“Hope: Some leaders have an ethical culture and principles that can lead to interesting goals for citizens. All applications of AI (especially when they are in the field of health, the environment, etc.) should require a project submission to an ethics board composed of scientists and respect general charters of good conduct. A monitoring committee can verify that the ethics and the state of the art are well respected by private companies.</span></p><p data-dcnode-id="2342" style="padding-left: 30px"><span data-dcnode-id="2343" instrument_node="">“The concern is what I see: clinical trials on people in developing countries where people are treated like guinea pigs under pretext that one claims to discover knowledge by applying deep learning algorithms. This is disgusting. AI can offer very good tools, but it can also be used to profile and to sort, monitor and constrain fundamental freedoms as seen in some countries. On AI competition, it is the acceptability and ability to make tools that end users find useful in improving their lives that will make the difference. Many gadgets or harmful devices are offered.</span></p><p data-dcnode-id="2340" style="padding-left: 30px"><span data-dcnode-id="2341" instrument_node="">“I am interested in mastering time in clinical decision-making in medicine and how AI can take it into account. What scares me most is the use of AI for personalized medicine that, under the guise of prevention, will lead to a new eugenics and all the cloning drifts, etc., that can lead to the ‘Brave New World’ of Aldous Huxley.”</span></p><h4 data-dcnode-id="2337"><img alt="" class="alignright wp-image-46558" data-dcnode-id="2339" height="259" sizes="(max-width: 460px) 100vw, 460px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.elon.edu/u/imagining/wp-content/uploads/sites/964/2021/06/2021-Susan-Crawford-The-Future-of-Ethical-AI-Design39.jpg&amp;raw" srcset="https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Susan-Crawford-The-Future-of-Ethical-AI-Design39.jpg 2500w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Susan-Crawford-The-Future-of-Ethical-AI-Design39-300x169.jpg 300w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Susan-Crawford-The-Future-of-Ethical-AI-Design39-768x432.jpg 768w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Susan-Crawford-The-Future-of-Ethical-AI-Design39-1024x576.jpg 1024w" width="460"><span data-dcnode-id="2338" instrument_node="">We have no institutions that can impose ethical constraints upon AI designers</span></h4><p data-dcnode-id="2333"><strong data-dcnode-id="2335"><span data-dcnode-id="2336" instrument_node="">Susan Crawford</span></strong><span data-dcnode-id="2334" instrument_node="">, a professor at Harvard Law School and former special assistant in the Obama White House for Science Technology and Innovation Policy, noted, “For AI, just substitute ‘digital processing.’ We have no basis on which to believe that the animal spirits of those designing digital processing services, bent on scale and profitability, will be restrained by some internal memory of ethics, and we have no institutions that could impose those constraints externally.”</span></p><h4 data-dcnode-id="2331" style="padding-left: 30px"><span data-dcnode-id="2332" instrument_node="">Unless the idea that all tech is neutral is corrected there is little hope</span></h4><p data-dcnode-id="2323" style="padding-left: 30px"><strong data-dcnode-id="2328"><img alt="" class="alignright wp-image-46562" data-dcnode-id="2330" height="259" sizes="(max-width: 460px) 100vw, 460px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.elon.edu/u/imagining/wp-content/uploads/sites/964/2021/06/2021-Paul-Jones-The-Future-of-Ethical-AI-Design22.jpg&amp;raw" srcset="https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Paul-Jones-The-Future-of-Ethical-AI-Design22.jpg 2500w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Paul-Jones-The-Future-of-Ethical-AI-Design22-300x169.jpg 300w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Paul-Jones-The-Future-of-Ethical-AI-Design22-768x432.jpg 768w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Paul-Jones-The-Future-of-Ethical-AI-Design22-1024x576.jpg 1024w" width="460"><span data-dcnode-id="2329" instrument_node="">Paul Jones</span></strong><span data-dcnode-id="2327" instrument_node="">, professor emeritus of information science at the University of North Carolina, Chapel Hill, observed, “Unless, as I hope happens, the idea that all tech is neutral is corrected, there is little hope or incentive to create ethical AI. Current applications of AI and their creators rarely interrogate ethical issues except as some sort of parlor game. More often I hear data scientists disparaging what they consider ‘soft sciences’ and claiming that their socially agnostic engineering approach or their complex statistical approach is a ‘hard science.’ While I don’t fear an AI war, a </span><a data-dcnode-id="2325" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/R.U.R."><span data-dcnode-id="2326" instrument_node="">Capek-like robot uprising</span></a><span data-dcnode-id="2324" instrument_node="">, I do fear the tendency not to ask the tough questions of AI –&nbsp;not just of general AI, where most of such questions are entertained, but in narrow AI where most progress and deployment are happening quickly.</span></p><p data-dcnode-id="2321" style="padding-left: 30px"><span data-dcnode-id="2322" instrument_node="">“I love to talk to Google about music, news and trivia. I love my home being alert to my needs. I love doctors getting integrated feedback on lab work and symptoms. I could not now live without Google Maps. But I am aware that ‘We become what we behold. We shape our tools and then our tools shape us,’ as Father John Culkin reminded us.</span></p><p data-dcnode-id="2319" style="padding-left: 30px"><span data-dcnode-id="2320" instrument_node="">“For most of us, the day-to-day conveniences of AI by far outweigh the perceived dangers. Dangers will come on slow and then cascade before most of us notice. That’s not limited to AI. Can AI help us see the dangers before they cascade? And if AI does, will it listen and react properly?”</span></p><h4 data-dcnode-id="2317"><span data-dcnode-id="2318" instrument_node="">AI can and will be engineered toward utopian and dystopian ends</span></h4><p data-dcnode-id="2313"><strong data-dcnode-id="2315"><span data-dcnode-id="2316" instrument_node="">Dan S. Wallach</span></strong><span data-dcnode-id="2314" instrument_node="">, a professor in the systems group at Rice University’s Department of Computer Science, said, “Building an AI system that works well is an exceptionally hard task, currently requiring our brightest minds and huge computational resources. Adding the additional constraint that they’re built in an ethical fashion is even harder yet again.</span></p><p data-dcnode-id="2311"><span data-dcnode-id="2312" instrument_node="">“Consider, for example, an AI intended for credit rating. It would be unethical for that AI to consider gender, race or a variety of other factors. Nonetheless, even if those features are explicitly excluded from the training set, the training data might well encode the biases of human raters, and the AI could pick up on secondary features that infer the excluded ones (e.g., silently inferring a proxy variable for race from income and postal address).</span></p><p data-dcnode-id="2309"><span data-dcnode-id="2310" instrument_node="">“Consider further the use of AI systems in warfare. The big buzzword today is ‘autonomy,’ which is to say, weapon systems that can make on-the-fly tactical decisions without human input while still following their orders. An ethical stance might say that we should never develop such systems, under any circumstances, yet exactly such systems are already in conception or development now and might well be used in the field by 2030.</span></p><p data-dcnode-id="2307"><span data-dcnode-id="2308" instrument_node="">“Without a doubt, AI will do great things for us, whether it’s self-driving cars that significantly reduce automotive death and injury, or whether it is computers reading radiological scans and identifying tumors earlier in their development than any human radiologist might do reliably. But AI will also be used in horribly dystopian situations, such as China’s rollout of facial-recognition camera systems throughout certain western provinces in the country. As such, AI is just a tool, just like computers are a tool. AI can and will be engineered toward utopian and dystopian ends.”</span></p><h4 data-dcnode-id="2305" style="padding-left: 30px"><span data-dcnode-id="2306" instrument_node="">Government shouldn’t regulate it until it is dedicated to serving the needs of the people</span></h4><p data-dcnode-id="2301" style="padding-left: 30px"><strong data-dcnode-id="2303"><span data-dcnode-id="2304" instrument_node="">Shel Israel</span></strong><span data-dcnode-id="2302" instrument_node="">, Forbes columnist and author of many books on disruptive technologies, commented, “Most developers of AI are well-intentioned, but issues that have been around for over 50 years remain unresolved:</span></p><p data-dcnode-id="2299" style="padding-left: 30px"><span data-dcnode-id="2300" instrument_node="">1) Should AI replace people or back them up? I prefer the latter in many cases. But economics drive business and returns to shareholders. So current trends will continue for more than five years because the problems will not be overwhelmingly obvious for more years than five.</span></p><p data-dcnode-id="2297" style="padding-left: 30px"><span data-dcnode-id="2298" instrument_node="">2) Google already knows who we are, where we are, the context of our activities, who we are with. Five years from now, technology will know our health, when we will die, if it is by natural causes, and so on down the line. Will AI help a patient by warning her/him of a cancer likelihood so they can get help, or an employer so they can get rid of those employees before they become an expense? I think both will occur, so AI will make things both better and worse.</span></p><p data-dcnode-id="2295" style="padding-left: 30px"><span data-dcnode-id="2296" instrument_node="">3) The technology itself is neither good nor evil. It is just a series of algorithms. It is how people will use it that will make a difference. Will government regulate it better? I doubt it. Should it? Not until we can have better governments who are more dedicated to serving the needs of everyday people.”</span></p><h4 data-dcnode-id="2293"><span data-dcnode-id="2294" instrument_node="">We are ill-prepared for the onslaught and implications of bad AI applications</span></h4><p data-dcnode-id="2289"><strong data-dcnode-id="2291"><span data-dcnode-id="2292" instrument_node="">Calton Pu</span></strong><span data-dcnode-id="2290" instrument_node="">, professor and chair in the School of Computer Science at Georgia Tech, wrote, “The main worry about the development of AI and ML (machine learning) technologies is the current AI/ML practice of using fixed training data (ground truth) for experimental evaluation as proof that they work. This proof is only valid for the relatively small and fixed training datasets. The gap between the limited ground truth and the actual reality has severely restricted the practical applicability of AI/ML systems, which rely on human operators to handle the gap. For example, the chatbots used in customer support contact centers can only handle the subset of most common conversations. …</span></p><p data-dcnode-id="2284"><span data-dcnode-id="2288" instrument_node="">“There is a growing gap between AI systems and the evolving reality, which explains the difficulties in the actual deployment of autonomous vehicles. This growing gap appears to be a blind spot for current AI/ML researchers and companies. With all due respect to the billions of dollars being invested, it is an inconvenient truth. As a result of this growing gap, the ‘good’ AI applications will see decreasing applicability, as their ground truth lags behind the evolving actual reality. However, I imagine the bad guys will see this growing gap soon and utilize it to create ‘bad’ AI applications by feeding their AI systems with distorted ground truth through skillful manipulations of training data. This can be done with today’s software tools. These bad AI applications can be distorted in many ways, one of them being unethical. With the AI/ML research community turning a blind eye to the growing gap, we will be ill-prepared for the onslaught of these bad AI applications. An early illustration of this kind of attack was </span><a data-dcnode-id="2286" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spectrum.ieee.org/tech-talk/artificial-intelligence/machine-learning/in-2016-microsofts-racist-chatbot-revealed-the-dangers-of-online-conversation"><span data-dcnode-id="2287" instrument_node="">Microsoft’s Tay chatbot</span></a><span data-dcnode-id="2285" instrument_node="">, introduced in 2016 and deactivated within one day due to inappropriate postings learned from purposeful racists interactions.</span></p><p data-dcnode-id="2282"><span data-dcnode-id="2283" instrument_node="">“The global competition over AI systems with fixed training data is a game. These AI systems compete within the fixed ground truth and rules. Current AI/ML systems do quite well with games with fixed rules and data, e.g., AlphaGo. However, these AI systems modeled after games are unaware of the growing gap between their ground truth (within the game) and the evolving actual reality out there. … To change these limitations, the ML/AI community and companies will need to face the inconvenient truth, the growing gap, and start to work on the growing gap instead of simply shutting down AI systems that no longer work (when the gap grew too wide), which has been the case of the Microsoft Tay chatbot and Google Flu Trends, among others.”</span></p><h4 data-dcnode-id="2280" style="padding-left: 30px"><span data-dcnode-id="2281" instrument_node="">AI may not be as useful in the future due to its dependency on past data and patterns</span></h4><p data-dcnode-id="2275" style="padding-left: 30px"><strong data-dcnode-id="2277"><img alt="" class="alignright wp-image-46566" data-dcnode-id="2279" height="259" sizes="(max-width: 460px) 100vw, 460px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.elon.edu/u/imagining/wp-content/uploads/sites/964/2021/06/2021-Greg-Sherwin-The-Future-of-Ethical-AI-Design6.jpg&amp;raw" srcset="https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Greg-Sherwin-The-Future-of-Ethical-AI-Design6.jpg 2500w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Greg-Sherwin-The-Future-of-Ethical-AI-Design6-300x169.jpg 300w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Greg-Sherwin-The-Future-of-Ethical-AI-Design6-768x432.jpg 768w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Greg-Sherwin-The-Future-of-Ethical-AI-Design6-1024x576.jpg 1024w" width="460"><span data-dcnode-id="2278" instrument_node="">Greg Sherwin</span></strong><span data-dcnode-id="2276" instrument_node="">, vice president for engineering and information technology at Singularity University, responded, “Explainable AI will become ever more important. As privileged classes on the edges get caught up on the vortex of negative algorithmic biases, political will must shift toward addressing the challenges of algorithmic oppression for all. For example, companies will be sued – unsuccessfully at first – for algorithmic discrimination. Processes for redress and appeal will need to be introduced to challenge the decisions of algorithms. Meanwhile, the hype cycle will drop for the practical value of AI.</span></p><p data-dcnode-id="2273" style="padding-left: 30px"><span data-dcnode-id="2274" instrument_node="">“As the world and society become more defined by VUCA [volatile, uncertain, complex, ambiguous] forces, the less AI will be useful given its complete dependency on past data, existing patterns and its ineffectiveness in novel situations. AI will simply become much like what computers were to society a couple decades ago: algorithmic tools in the background, with inherent and many known flaws (bugs, etc.), that are no longer revered for their mythical innovative novelty but are rather understood in context within limits, within boundaries that are more popularly understood.”</span></p><h4 data-dcnode-id="2271"><span data-dcnode-id="2272" instrument_node="">How will AI be used to assess, direct, control and alter human interaction?</span></h4><p data-dcnode-id="2266"><strong data-dcnode-id="2268"><img alt="" class="alignright wp-image-46570" data-dcnode-id="2270" height="259" sizes="(max-width: 460px) 100vw, 460px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.elon.edu/u/imagining/wp-content/uploads/sites/964/2021/06/2021-Kathleen-Carley-The-Future-of-Ethical-AI-Design27.jpg&amp;raw" srcset="https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Kathleen-Carley-The-Future-of-Ethical-AI-Design27.jpg 2500w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Kathleen-Carley-The-Future-of-Ethical-AI-Design27-300x169.jpg 300w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Kathleen-Carley-The-Future-of-Ethical-AI-Design27-768x432.jpg 768w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Kathleen-Carley-The-Future-of-Ethical-AI-Design27-1024x576.jpg 1024w" width="460"><span data-dcnode-id="2269" instrument_node="">Kathleen M. Carley</span></strong><span data-dcnode-id="2267" instrument_node="">, director of the Center for Computational Analysis of Social and Organizational Systems at Carnegie Mellon University, commented, “While there is a move toward ethical AI, it is unlikely to be realized in the next decade. First, there are a huge number of legacy systems that would need to be changed. Second, what it means for AI to be ethical is not well understood; and once understood, it is likely to be the case that there are different ethical foundations that are not compatible with each other. Which means that AI might be ethical by one framework but not by another. Third, for international conflict and for conflict with nonstate actors, terror groups and crime groups – there will be AI on both sides. It is unlikely that both sides would employ the same ethical frameworks.</span></p><p data-dcnode-id="2264"><span data-dcnode-id="2265" instrument_node="">“What gives me the most hope is that most people, regardless of where they are from, want AI and technology in general to be used in more ethical ways. What worries me the most is that, without a clear understanding of the ramifications of ethical principles, we will put in place guidelines and policies that will cripple the development of new technologies that would better serve humanity.</span></p><p data-dcnode-id="2262"><span data-dcnode-id="2263" instrument_node="">“AI will save time, allow for increased control over your living space, do boring tasks, help with planning, auto-park your car, fill out grocery lists, remind you to take medicines, support medical diagnosis, etc.</span></p><p data-dcnode-id="2260"><span data-dcnode-id="2261" instrument_node="">“The issues that are both exciting and concerning center on how AI will be used to assess, direct, control and alter human interaction and discourse. Where AI meets human social behavior is a difficult area. Tools that auto-declare messages as disinformation could be used by authoritarian states to harm individuals.”</span></p><h4 data-dcnode-id="2258" style="padding-left: 30px"><span data-dcnode-id="2259" instrument_node="">We don’t really know what human, ethical, public-interest decision-making looks like</span></h4><p data-dcnode-id="2254" style="padding-left: 30px"><strong data-dcnode-id="2256"><span data-dcnode-id="2257" instrument_node="">Chris Savage</span></strong><span data-dcnode-id="2255" instrument_node="">, a leading expert in legal and regulatory issues based in Washington, D.C., wrote, “AI is the new social network, by which I mean: Back in 2007 and 2008, it was easy to articulate the benefits of robust social networking, and people adopted the technology rapidly, but its toxic elements – cognitive and emotional echo chambers, economic incentives of the platforms to drive engagement via stirred-up negative emotions, rather than driving increased awareness and acceptance (or at least tolerance) of others – took some time to play out.</span></p><p data-dcnode-id="2252" style="padding-left: 30px"><span data-dcnode-id="2253" instrument_node="">“Similarly, it is easy to articulate the benefits of robust and ubiquitous AI, and those benefits will drive substantial adoption in a wide range of contexts.</span></p><p data-dcnode-id="2250" style="padding-left: 30px"><span data-dcnode-id="2251" instrument_node="">“But we simply do not know enough about what ‘ethical’ or ‘public-interested’ algorithmic decision-making looks like to build those concepts into actually deployed AI (actually, we don’t actually know enough about what human ‘ethical’ and ‘public-interested’ decision-making looks like to effectively model it). Trying to address those concerns will take time and money on the part of the AI developers, with no evident return on that expenditure. So, it won’t happen, or will be short-changed, and – as with social media – I predict a ‘Ready, Fire, Aim’ scenario for the deployment of AI. On a longer timescale – give me 50 years instead of 10 – I think AI will be a net plus even in ethical/public interest terms. But the initial decade or so will be messy.”</span></p><h4 data-dcnode-id="2247"><img alt="" class="alignright wp-image-46574" data-dcnode-id="2249" height="259" sizes="(max-width: 460px) 100vw, 460px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.elon.edu/u/imagining/wp-content/uploads/sites/964/2021/06/2021-Jeff-Jarvis-The-Future-of-Ethical-AI-Design32.jpg&amp;raw" srcset="https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Jeff-Jarvis-The-Future-of-Ethical-AI-Design32.jpg 2500w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Jeff-Jarvis-The-Future-of-Ethical-AI-Design32-300x169.jpg 300w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Jeff-Jarvis-The-Future-of-Ethical-AI-Design32-768x432.jpg 768w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Jeff-Jarvis-The-Future-of-Ethical-AI-Design32-1024x576.jpg 1024w" width="460"><span data-dcnode-id="2248" instrument_node="">Why the moral panic? Does this really require an entirely new branch of ethics?</span></h4><p data-dcnode-id="2243"><strong data-dcnode-id="2245"><span data-dcnode-id="2246" instrument_node="">Jeff Jarvis</span></strong><span data-dcnode-id="2244" instrument_node="">, director of the Tow-Knight Center and professor of journalism innovation at City University of New York, said, “AI is an overbroad label for sets of technical abilities to gather, analyze and learn from data to predict behavior, something we have done in our heads since some point in our evolution as a species. We did likewise with computers once we got them, getting help looking for correlations, asking ‘what if?’ and making predictions.</span></p><p data-dcnode-id="2241"><span data-dcnode-id="2242" instrument_node="">“Now, machines will make some predictions – often without explanation – better than we could, and that is leading to a level of moral panic sufficient to inspire questions such as this.</span></p><p data-dcnode-id="2239"><span data-dcnode-id="2240" instrument_node="">“The ethical challenges are not vastly different than they have ever been: Did you have permission to gather the data you did? Were you transparent about its collection and use? Did you allow people a choice in taking part in that process? Did you consider the biases and gaps in the data you gathered? Did you consider the implications of acting on mistaken predictions? And so on. I have trouble seeing this treated as if it is an entirely new branch of ethics, for that brings an air of mystery to what should be clear and understandable questions of responsibility.”</span></p><h4 data-dcnode-id="2236" style="padding-left: 30px"><img alt="" class="alignright wp-image-46578" data-dcnode-id="2238" height="259" sizes="(max-width: 460px) 100vw, 460px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.elon.edu/u/imagining/wp-content/uploads/sites/964/2021/06/2021-David-Kreiger-The-Future-of-Ethical-AI-Design8.jpg&amp;raw" srcset="https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-David-Kreiger-The-Future-of-Ethical-AI-Design8.jpg 2500w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-David-Kreiger-The-Future-of-Ethical-AI-Design8-300x169.jpg 300w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-David-Kreiger-The-Future-of-Ethical-AI-Design8-768x432.jpg 768w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-David-Kreiger-The-Future-of-Ethical-AI-Design8-1024x576.jpg 1024w" width="460"><span data-dcnode-id="2237" instrument_node="">Perhaps traditional notions of civil liberties need to be revised and updated</span></h4><p data-dcnode-id="2232" style="padding-left: 30px"><strong data-dcnode-id="2234"><span data-dcnode-id="2235" instrument_node="">David Krieger</span></strong><span data-dcnode-id="2233" instrument_node="">, director of the Institute for Communication and Leadership, based in Switzerland, commented, “It appears that, in the wake of the pandemic, we are moving faster toward the data-driven global network society than ever before. Some have predicted that the pandemic will end the ‘techlash,’ since what we need to survive is more information and not less about everyone and everything. This information must be analyzed and used as quickly as possible, which spurs on investments in AI and big data analytics.</span></p><p data-dcnode-id="2230" style="padding-left: 30px"><span data-dcnode-id="2231" instrument_node="">“Calls for privacy, for regulation of tech giants and for moratoriums on the deployment of tracking, surveillance and AI are becoming weaker and losing support throughout the world. Perhaps traditional notions of civil liberties need to be revised and updated for a world in which connectivity, flow, transparency and participation are the major values.”</span></p><h4 data-dcnode-id="2227"><img alt="" class="alignright wp-image-46530" data-dcnode-id="2229" height="259" sizes="(max-width: 460px) 100vw, 460px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.elon.edu/u/imagining/wp-content/uploads/sites/964/2021/06/2021-John-Smart-The-Future-of-Ethical-AI-Design37.jpg&amp;raw" srcset="https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-John-Smart-The-Future-of-Ethical-AI-Design37.jpg 2500w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-John-Smart-The-Future-of-Ethical-AI-Design37-300x169.jpg 300w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-John-Smart-The-Future-of-Ethical-AI-Design37-768x432.jpg 768w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-John-Smart-The-Future-of-Ethical-AI-Design37-1024x576.jpg 1024w" width="460"><span data-dcnode-id="2228" instrument_node="">Post-2040, we’ll see truly powerful personal AIs that will help improve civil society</span></h4><p data-dcnode-id="2220"><strong data-dcnode-id="2225"><span data-dcnode-id="2226" instrument_node="">John Smart</span></strong><span data-dcnode-id="2224" instrument_node="">, foresight educator, scholar, author, consultant and speaker, predicted, “Ethical AI frameworks will be used in high-reliability and high-risk situations, but the frameworks will remain primitive and largely human-engineered (top-down) in 2030. Truly bottom-up, evolved and selected collective ethics and empathy (affective AI), similar to what we find in our domestic animals, won’t emerge until we have truly bottom-up, evo-devo [</span><a data-dcnode-id="2222" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pbs.org/wgbh/nova/article/what-evo-devo/"><span data-dcnode-id="2223" instrument_node="">evolutionary developmental biology</span></a><span data-dcnode-id="2221" instrument_node="">] approaches to AI. AI will be used well and poorly, like any tool. The worries are the standard ones, plutocracy, lack of transparency, unaccountability of our leaders. The real benefits of AI will come when we’ve moved into a truly bottom-up style of AI development, with hundreds of millions of coders using open-source AI code on GitHub, with natural language development platforms that lower the complexity of altering code, with deeply neuro-inspired commodity software and hardware, and with both evolutionary and developmental methods being used to select, test and improve AI. In that world, which I expect post-2040, we’ll see truly powerful personal AIs. Personal AIs are what really matter to improving civil society. The rest are typically serving the plutocracy.”</span></p><h3 data-dcnode-id="2217"><em data-dcnode-id="2218"><span data-dcnode-id="2219" instrument_node="">The sections of this report that follow organize hundreds of additional expert quotes under the headings that follow the common themes listed in the tables at the beginning of this report. For more on how this canvassing was conducted, see the last section, “About This Canvassing.”</span></em></h3><h1 data-dcnode-id="2215"><span data-dcnode-id="2216" instrument_node="">1. Worries about developments in AI</span></h1><p data-dcnode-id="2213"><span data-dcnode-id="2214" instrument_node="">It would be quite difficult – some might say impossible – to design broadly adopted ethical AI systems. A share of the experts responding noted that ethics are hard to define, implement and enforce. They said context matters when it comes to ethical considerations. Any attempt to fashion ethical rules generates countless varying scenarios in which applications of those rules can be messy. The nature and relative power of the actors in any given scenario also matter. Social standards and norms evolve and can become wholly different as cultures change. Few people have much education or training in ethics. Additionally, good and bad actors exploit loopholes and gray areas where ethical rules aren’t crisp, so workarounds, patches or other remedies are often created with varying levels of success.</span></p><p data-dcnode-id="2211"><span data-dcnode-id="2212" instrument_node="">The experts who expressed worries also invoked governance concerns. They asked: Whose ethical systems should be applied? Who gets to make that decision? Who has responsibility to care about implementing ethical AI? Who might enforce ethical regimes once they are established? How?</span></p><p data-dcnode-id="2209"><span data-dcnode-id="2210" instrument_node="">A large number of respondents argued that geopolitical and economic competition are the main drivers for AI developers, while moral concerns take a back seat. A share of these experts said creators of AI tools work in groups that have little or no incentive to design systems that address ethical concerns.</span></p><p data-dcnode-id="2207"><span data-dcnode-id="2208" instrument_node="">Some respondents noted that, even if workable ethics requirements might be established, they could not be applied or governed because most AI design is proprietary, hidden and complex. How can harmful AI “outcomes” be diagnosed and addressed if the basis for AI “decisions” cannot be discerned? Some of these experts also note that existing AI systems and databases are often used to build new AI applications. That means the biases and ethically troubling aspects of current systems are being designed into the new systems. They say diagnosing and unwinding the pre-existing problems may be difficult if not impossible to achieve.</span></p><h2 data-dcnode-id="2205"><span data-dcnode-id="2206" instrument_node="">It is difficult to define ‘ethical’ AI</span></h2><p data-dcnode-id="2203"><span data-dcnode-id="2204" instrument_node="">A portion of these experts infused their answers with questions that amount to this overarching question: How can ethical standards be defined and applied for a global, cross-cultural, ever-evolving, ever-expanding universe of diverse black-box systems in which bad actors and misinformation thrive?</span></p><p data-dcnode-id="2201"><span data-dcnode-id="2202" instrument_node="">A selection of respondents’ comments on this broad topic is organized over the next 20 pages under these subheadings: 1) It can be hard to agree as to what constitutes ethical behavior. 2) Humans are the problem: Whose ethics? Who decides? Who cares? Who enforces? 3) Like all tools, AI can be used for good or ill, which makes standards-setting a challenge. 4) Further AI evolution itself raises questions and complications.</span></p><p data-dcnode-id="2196"><strong data-dcnode-id="2198"><img alt="" class="alignright wp-image-46679" data-dcnode-id="2200" height="259" sizes="(max-width: 460px) 100vw, 460px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.elon.edu/u/imagining/wp-content/uploads/sites/964/2021/06/2021-Stephen-Downes-The-Future-of-Ethical-AI-Design46.jpg&amp;raw" srcset="https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Stephen-Downes-The-Future-of-Ethical-AI-Design46.jpg 2500w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Stephen-Downes-The-Future-of-Ethical-AI-Design46-300x169.jpg 300w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Stephen-Downes-The-Future-of-Ethical-AI-Design46-768x432.jpg 768w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Stephen-Downes-The-Future-of-Ethical-AI-Design46-1024x576.jpg 1024w" width="460"><span data-dcnode-id="2199" instrument_node="">Stephen Downes</span></strong><span data-dcnode-id="2197" instrument_node="">, senior research officer for digital technologies with the National Research Council of Canada, observed, “The problem with the application of ethical principles to artificial intelligence is that there is no common agreement about what those are. While it is common to assume there is some sort of unanimity about ethical principles, this unanimity is rarely broader than a single culture, profession or social group. This is made manifest by the ease with which we perpetuate unfairness, injustice and even violence and death to other people. No nation is immune.</span></p><p data-dcnode-id="2194"><span data-dcnode-id="2195" instrument_node="">“Compounding this is the fact that contemporary artificial intelligence is not based on principles or rules. Modern AI is based on applying mathematical functions on large collections of data. This type of processing is not easily shaped by ethical principles; there aren’t ‘good’ or ‘evil’ mathematical functions, and the biases and prejudices in the data are not easily identified nor prevented. Meanwhile, the application of AI is underdetermined by the outcome; the same prediction, for example, can be used to provide social support and assistance to a needy person or to prevent that person from obtaining employment, insurance or financial services.</span></p><p data-dcnode-id="2192"><span data-dcnode-id="2193" instrument_node="">“Ultimately, our AI will be an extension of ourselves, and the ethics of our AI will be an extension of our own ethics. To the extent that we can build a more ethical society, whatever that means, we will build more ethical AI, even if only by providing our AI with the models and examples it needs in order to be able to distinguish right from wrong. I am hopeful that the magnification of the ethical consequences of our actions may lead us to be more mindful of them; I am fearful that they may not.”</span></p><p data-dcnode-id="2188" style="padding-left: 30px"><strong data-dcnode-id="2190"><span data-dcnode-id="2191" instrument_node="">Kenneth A. Grady</span></strong><span data-dcnode-id="2189" instrument_node="">, adjunct professor at Michigan State University College of Law and editor of The Algorithmic Society on Medium, said, “Getting those creating AI to use it in an ‘ethical’ way faces many hurdles that society is unlikely to overcome in the foreseeable future. In some key ways, regulating AI ethics is akin to regulating ethics in society at large. AI is a distributed and relatively inexpensive technology. I can create and use AI in my company, my research lab or my home with minimal resources. That AI may be quite powerful. I can unleash it on the world at no cost.</span></p><p data-dcnode-id="2186" style="padding-left: 30px"><span data-dcnode-id="2187" instrument_node="">“Assuming that we could effectively regulate it, we face another major hurdle: What do we mean by ‘ethical?’ Putting aside philosophical debates, we face practical problems in defining ethical AI. We do not have to look far to see similar challenges. During the past few years, what is or is not ethical behavior in U.S. politics has been up for debate. Other countries have faced similar problems.</span></p><p data-dcnode-id="2184" style="padding-left: 30px"><span data-dcnode-id="2185" instrument_node="">“Even if we could decide on a definition [for ethics] in the U.S., it would likely vary from the definitions used in other countries. Given AI’s ability to fluidly cross borders, regulating AI would prove troublesome. We also will find that ethical constraints may be at odds with other self-interests. Situational ethics could easily arise when we face military or intelligence threats, economic competitive threats, and even political threats.</span></p><p data-dcnode-id="2182" style="padding-left: 30px"><span data-dcnode-id="2183" instrument_node="">“Further, AI itself presents some challenges. Today, much of what happens in some AI systems is not known to the creators of the systems. This is the black-box problem. Regulating what happens in the black box may be difficult. Alternatively, banning black boxes may hinder AI development, putting our economic, military or political interests at risk.”</span></p><p data-dcnode-id="2178"><strong data-dcnode-id="2180"><span data-dcnode-id="2181" instrument_node="">Ryan Sweeney</span></strong><span data-dcnode-id="2179" instrument_node="">, director of analytics for Ignite Social Media, commented, “The definition of ‘public good’ is important here. How much does intent versus execution matter? Take Facebook, for instance. They might argue that their AI content review platform is in the interest of ‘public good,’ but it continues to fail. AI is only as ethical and wise as those who program it. One person’s racism is another’s free speech. What might be an offensive word to someone might not even be in the programmer’s lexicon.</span></p><p data-dcnode-id="2176"><span data-dcnode-id="2177" instrument_node="">“I’m sure AI will be used with ethical intent, but ethics require empathy. In order to program ethics, there has to be a definitive right and wrong, but situations likely aren’t that simple and require some form of emotional and contextual human analysis. The success of ethical AI execution comes down to whether or not the programmers literally thought of every possible scenario. In other words, AI will likely be developed and used with ethical intent, but it will likely fall short of what we, as humans, can do.</span></p><p data-dcnode-id="2174"><span data-dcnode-id="2175" instrument_node="">“We should use AI as a tool to help guide our decisions, but not rely on it entirely to make those decisions. Otherwise, the opportunity for abuse or unintended consequences will show its face. I’m also sure that AI will be used with questionable intent, as technology is neither inherently good nor bad. Since technology is neutral, I’m sure we will see cases of AI abused for selfish gains or other questionable means and privacy violations. Ethical standards are complicated to design and hard to program.”</span></p><h2 data-dcnode-id="2172"><span data-dcnode-id="2173" instrument_node="">It can be hard to agree as to what constitutes ethical behavior</span></h2><p data-dcnode-id="2170"><span data-dcnode-id="2171" instrument_node="">Below is a sampling of expert answers that speak to the broad concerns that ethical behaviors can be hard to define and even more difficult to build into AI systems.</span></p><p data-dcnode-id="2166"><strong data-dcnode-id="2168"><span data-dcnode-id="2169" instrument_node="">Mark Lemley</span></strong><span data-dcnode-id="2167" instrument_node="">, director of Stanford University’s Program in Law, Science and Technology, observed, “People will use AI for both good and bad purposes. Most companies will try to design the technology to make good decisions, but many of those decisions are hard moral choices with no great answer. AI offers the most promise in replacing very poor human judgment in things like facial recognition and police stops.”</span></p><p data-dcnode-id="2162" style="padding-left: 30px"><strong data-dcnode-id="2164"><span data-dcnode-id="2165" instrument_node="">Marc Brenman</span></strong><span data-dcnode-id="2163" instrument_node="">, managing member at IDARE, a transformational training and leadership development consultancy based in Washington, D.C., wrote, “As societies, we are very weak on morality and ethics generally. There is no particular reason to think that our machines or systems will do better than we do. Faulty people create faulty systems. In general, engineers and IT people and developers have no idea what ethics are. How could they possibly program systems to have what they do not? As systems learn and develop themselves, they will look around at society and repeat its errors, biases, stereotypes and prejudices. We already see this in facial recognition.</span></p><p data-dcnode-id="2160" style="padding-left: 30px"><span data-dcnode-id="2161" instrument_node="">“AI will make certain transactions faster, such as predicting what I will buy online. AI systems may get out of control as they become autonomous. Of what use are humans to them? They may permit mistakes to be made very fast, but the systems may not recognize the consequences of their actions as ‘mistakes.’ For example, if they maximize efficiency, then the Chinese example of social control may dominate.</span></p><p data-dcnode-id="2158" style="padding-left: 30px"><span data-dcnode-id="2159" instrument_node="">“When AI systems are paired with punishment or kinetic feedback systems, they will be able to control our behavior. Imagine a pandemic where a ‘recommendation’ is made to shelter in place or wear a mask or stay six feet away from other people. If people are hooked up to AI systems, the system may give an electrical shock to a person who does not implement the recommendation. This will be like all of us wearing shock collars that some of us use on our misbehaving dogs.”</span></p><p data-dcnode-id="2154"><strong data-dcnode-id="2156"><span data-dcnode-id="2157" instrument_node="">June Anne English-Lueck</span></strong><span data-dcnode-id="2155" instrument_node="">, professor of anthropology at San Jose State University and a distinguished fellow at the Institute for the Future, said, “AI systems employ algorithms that are only as sound as the premises on which they are built and the accuracy of the data with which they learn. Human ethical systems are complex and contradictory. Such nuances as good for whom and bad for whom are difficult to parse. Smart cities, drawing on systems of surveillance and automated government need mechanisms of human oversight. Oversight has not been our strong suit in the last few decades, and there is little reason to believe it will be instituted in human-automation interactions.”</span></p><p data-dcnode-id="2150" style="padding-left: 30px"><strong data-dcnode-id="2152"><span data-dcnode-id="2153" instrument_node="">Amali De Silva-Mitchell</span></strong><span data-dcnode-id="2151" instrument_node="">, a futurist and consultant participating in multistakeholder, global internet governance processes, wrote, “Although there are lots of discussions, there are few standards or those that exist are at a high level or came too late for the hundreds of AI applications already rolled out. These base AI applications will not be reinvented, so there is embedded risk. However, the more discussion there is, the greater the understanding of the existing ethical issues, and that can be seen to be developing, especially as societal norms and expectations change. AI applications have the potential to be beneficial, but the applications have to be managed so as not to cause unintended harms. For global delivery and integrated service, there needs to be common standards, transparency and collaboration. Duplication of efforts is a waste of resources.”</span></p><p data-dcnode-id="2146"><strong data-dcnode-id="2148"><span data-dcnode-id="2149" instrument_node="">Glenn Edens</span></strong><span data-dcnode-id="2147" instrument_node="">, professor at Thunderbird School of Global Management, Arizona State University, previously a vice president at PARC, observed, “The promise: AI and ML could create a world that is more efficient, wasting less energy or resources providing health care, education, entertainment, food and shelter to more people at lower costs. Being legally blind, I look forward to the day of safe and widely available self-driving cars, for example. Just like the steam engine, electricity, bicycles and personal computers (especially laptops) amplify human capacity AI, and ML hopefully will do the same.</span></p><p data-dcnode-id="2143"><img alt="" class="alignright wp-image-46683" data-dcnode-id="2145" height="259" sizes="(max-width: 460px) 100vw, 460px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.elon.edu/u/imagining/wp-content/uploads/sites/964/2021/06/2021-Glenn-Edens-The-Future-of-Ethical-AI-Design24.jpg&amp;raw" srcset="https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Glenn-Edens-The-Future-of-Ethical-AI-Design24.jpg 2500w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Glenn-Edens-The-Future-of-Ethical-AI-Design24-300x169.jpg 300w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Glenn-Edens-The-Future-of-Ethical-AI-Design24-768x432.jpg 768w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Glenn-Edens-The-Future-of-Ethical-AI-Design24-1024x576.jpg 1024w" width="460"><span data-dcnode-id="2144" instrument_node="">“The concerns: AI and its cousin ML are still in their infancy – and while the technology progress is somewhat predictable, the actual human consequences are murky. The promise is great – so was our naive imagination of what the internet would do for humankind. Commercial interests (and thus their deployment of AI and ML) are far more agile and adaptable than either the humans they supposedly serve or the governance systems. Regulation is largely reactionary, rarely proactive – typically, bad things have to happen before frameworks to guide responsible and equitable behavior are written into laws, standards emerge or usage is codified into acceptable norms. It is great that the conversation has started; however, there is a lot of ongoing development in the boring world of enterprise software development that is largely invisible.</span></p><p data-dcnode-id="2141"><span data-dcnode-id="2142" instrument_node="">“Credit scoring comes to mind as a major potential area of concern – while the credit-scoring firms always position their work as providing consumers more access to financial products, the reality is that we’ve created a system that unfairly penalizes the poor and dramatically limits fair access to financial products at equitable prices. AI and ML will be used by corporations to evaluate everything they do and every transaction, rate every customer and their potential (value), predict demand, pricing, targeting as well as their own employees and partners – while this can lead to efficiency, productivity and creation of economic value, a lot of it will lead to segmenting, segregation, discrimination, profiling and inequity. Imagine a world where pricing is different for everyone from one moment to the next, and these predictive systems can transfer huge sums of value in an instant, especially from the most vulnerable.”</span></p><p data-dcnode-id="2137" style="padding-left: 30px"><strong data-dcnode-id="2139"><span data-dcnode-id="2140" instrument_node="">A strategy and planning expert</span></strong><span data-dcnode-id="2138" instrument_node=""> responded, “While I say and believe that, yes, ethical boundaries will be put in place for AI by 2030, I also realize that doing this is going to be incredibly difficult. The understanding of what an AI is doing as it builds and adapts its understandings and approaches rather quickly gets to a point where human knowing and keeping up gets left behind. The how and why something was done or recommended can be unknowable. Also, life and the understanding of right and wrong or good-ish and bad-ish can be fluid for people, as things swing to accommodate the impacts on the human existence and condition as well as livable life on our planet. Setting bounds and limitations has strong value, but being able to understand when things are shifting out of areas that are comfortable or have introduced a new realization for a need to correct for unintended consequences is needed. But bounds around bias need to be considered and worked through before setting ethical limitations in place.”</span></p><p data-dcnode-id="2133"><strong data-dcnode-id="2135"><span data-dcnode-id="2136" instrument_node="">A vice president at a major global company</span></strong><span data-dcnode-id="2134" instrument_node=""> wrote, “AI is too distributed a technology to be effectively governed. It is too easily accessible to any individual, company or organization with reasonably modest resources. That means that unlike, say, nuclear or bioweapons, it will be almost impossible to govern, and there always will be someone willing to develop the technology without regard to ethical consequences.”</span></p><p data-dcnode-id="2129" style="padding-left: 30px"><strong data-dcnode-id="2131"><span data-dcnode-id="2132" instrument_node="">Wendy M. Grossman</span></strong><span data-dcnode-id="2130" instrument_node="">, a UK-based science writer, author of “net.wars” and founder of the magazine The Skeptic, predicted, “The distribution of this will be uneven. I’ve just read Jane Mayer’s piece in The New Yorker on poultry-packing plants, and it provides a great example of why it’s not enough to have laws and ethics; you must enforce them and give the people you’re trying to protect sufficient autonomy to participate in enforcing them. I think ethical/unethical AI will be unevenly distributed. It will all depend on what the society into which the technology is being injected will accept and who is speaking. At the moment, we have two divergent examples:</span></p><p data-dcnode-id="2127" style="padding-left: 30px"><span data-dcnode-id="2128" instrument_node="">1) AI applications whose impact on most people’s lives appears to be in refusing them access to things – probation in the criminal justice system, welfare in the benefits system, credit in the financial system.</span></p><p data-dcnode-id="2125" style="padding-left: 30px"><span data-dcnode-id="2126" instrument_node="">2) AI systems that answer questions and offer help (recommendation algorithms, Siri, Google search, etc.).</span></p><p data-dcnode-id="2123" style="padding-left: 30px"><span data-dcnode-id="2124" instrument_node="">“But then what we have today isn’t AI as originally imagined by the Dartmouth group. We are still a very long way from any sort of artificial general intelligence with any kind of independent autonomy. The systems we have depend for their ethics on two things: access to the data necessary to build them and the ethics of the owner. It isn’t AI that needs ethics, it’s the owners.”</span></p><p data-dcnode-id="2119"><strong data-dcnode-id="2121"><span data-dcnode-id="2122" instrument_node="">Glynn Rogers</span></strong><span data-dcnode-id="2120" instrument_node="">, retired, previously senior principal engineer and a founding member at the CSIRO Centre for Complex Systems Science, said, “AI and its successors are potentially so powerful that we have no choice but to ensure attention to ethics. The alternative would be to hand over control of our way of life to a class of developers and implementors that are either focused on short-term and shortsighted interests or who have some form of political agenda particularly ‘state actors.’ The big question is how to ensure this. A regulatory framework is part of the answer, but I suspect that a major requirement is to change the culture of the AI industry. Rather than developing technologies simply for the sake of it, or to publish clever papers, there needs to be a cultural environment in which developers see as an inherent part of their task to consider the potential social and economic impacts of their activities and an employment framework that does not seek to repress this. Perhaps moral and political philosophy should be part of the education of AI developers.”</span></p><p data-dcnode-id="2115" style="padding-left: 30px"><strong data-dcnode-id="2117"><span data-dcnode-id="2118" instrument_node="">Alexandra Samuel</span></strong><span data-dcnode-id="2116" instrument_node="">, technology writer, researcher, speaker and regular contributor to the Wall Street Journal and Harvard Business Review, wrote, “Without serious, enforceable international agreements on the appropriate use and principles for AI, we face an almost inevitable race to the bottom. The business value of AI has no intrinsic dependence on ethical principles; if you can make more money with AIs that prioritize the user over other people, or that prioritize business needs over end users, then companies will build AIs that max
