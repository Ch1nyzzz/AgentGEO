style="padding-left: 30px"><span data-dcnode-id="1055" instrument_node="">“I worry most about uses of AI for surveillance and political control, and I’m a little concerned about genetic applications that might have unintended consequences, maybe because I saw a lot of giant bug movies in the 1950s. I think AI can facilitate better management and understanding of complexity and greater use of knowledge- and decision-support systems. Evolving use of AI for transportation services has been getting a lot of attention and may be the key to overcoming transportation inefficiency and congestion.”</span></p><p data-dcnode-id="1050"><strong data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">Amar Ashar</span></strong><span data-dcnode-id="1051" instrument_node="">, assistant director of research at the Berkman Klein Center for Internet &amp; Society, said, “We are currently in a phase where companies, countries and other groups who have produced high-level AI principles are looking to implement them in practice. This application into specific real-world domains and challenges will play out in different ways. Some AI-based systems may adhere to certain principles in a general sense, since many of the terms used in principles documents are broad and defined differently by different actors. But whether these principles meet those definitions or the spirit of how these principles are currently being articulated is still an open question.</span></p><p data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node="">“Implementation of AI principles cannot be left to AI designers and developers alone. The principles often require technical, social, legal, communication and policy systems to work in coordination with one another. If implemented without accountability mechanisms, these principles statements are also bound to fail.”</span></p><p data-dcnode-id="1044" style="padding-left: 30px"><strong data-dcnode-id="1046"><span data-dcnode-id="1047" instrument_node="">A journalism professor emeritus</span></strong><span data-dcnode-id="1045" instrument_node=""> predicted, “The initial applications, ones easily accepted in society, will be in areas where the public benefit is manifestly apparent. These would include health and medicine, energy management, complex manufacturing and quality control applications. All good and easy to adhere to ethical standards, because they’re either directly helpful to an individual or they make things less expensive and more reliable. But that won’t be the end of it. Unless there are both ethical and legal constraints with real teeth, we’ll find all manner of exploitations in finance, insurance, investing, employment, personal data harvesting, surveillance and dynamic pricing of almost everything from a head of lettuce to real estate. And those who control the AI will always have the advantage – always.</span></p><p data-dcnode-id="1042" style="padding-left: 30px"><span data-dcnode-id="1043" instrument_node="">“What most excites me beyond applications in health and medicine are applications in materials science, engineering, energy and resource management systems and education. The ability to deploy AI as tutors and learning coaches could be transformative for equalizing opportunities for educational attainment. I am concerned about using AI to write news stories unless the ‘news’ is a sports score, weather report or some other description of data … My greatest fear, not likely in my lifetime, is that AI eventually is deployed as our minders – telling us when to get up, what to eat, when to sleep, how much and how to exercise, how to spend our time and money, where to vacation, who to socialize with, what to watch or read and then secretly rates us for employers or others wanting to size us up.”</span></p><p data-dcnode-id="1038"><strong data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node="">Michael R. Nelson</span></strong><span data-dcnode-id="1039" instrument_node="">, research associate at CSC Leading Edge Forum, observed, “What gives me hope: Companies providing machine learning and big data services so all companies and governments can apply these tools. Misguided efforts to make technology ‘ethical by design’ worry me. Cybersecurity making infrastructure work better and more safely is an exciting machine-learning application, and ‘citizen science’ and sousveillance knowledge tools that help me make sense of the flood of data we swim in.”</span></p><p data-dcnode-id="1034" style="padding-left: 30px"><strong data-dcnode-id="1036"><span data-dcnode-id="1037" instrument_node="">Edward A. Friedman</span></strong><span data-dcnode-id="1035" instrument_node="">, professor emeritus of technology management at Stevens Institute of Technology, responded, “AI will greatly improve medical diagnostics for all people. AI will provide individualized instruction for all people. I see these as ethically neutral applications.”</span></p><p data-dcnode-id="1029"><strong data-dcnode-id="1031"><img alt="" class="alignright wp-image-46671" data-dcnode-id="1033" height="259" sizes="(max-width: 460px) 100vw, 460px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.elon.edu/u/imagining/wp-content/uploads/sites/964/2021/06/2021-Lee-McKnight-The-Future-of-Ethical-AI-Design35.jpg&amp;raw" srcset="https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Lee-McKnight-The-Future-of-Ethical-AI-Design35.jpg 2500w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Lee-McKnight-The-Future-of-Ethical-AI-Design35-300x169.jpg 300w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Lee-McKnight-The-Future-of-Ethical-AI-Design35-768x432.jpg 768w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Lee-McKnight-The-Future-of-Ethical-AI-Design35-1024x576.jpg 1024w" width="460"><span data-dcnode-id="1032" instrument_node="">Lee McKnight</span></strong><span data-dcnode-id="1030" instrument_node="">, associate professor at the Syracuse University School of Information Studies, wrote, “When we say ‘AI,’ most people really mean a wider range of systems and applications, including machine learning, neural networks and natural language processing to name a few. ‘Artificial general intelligence’ remains the province through 2030 of science fiction and Elon Musk.</span></p><p data-dcnode-id="1027"><span data-dcnode-id="1028" instrument_node="">“A wide array of ‘industrial AI’ will in 2023, for example, help accelerate or slow down planes, trains and rocket ships. Most of those industrial applications of AI will be designed by firms, and the exact algorithms used and adapted will be considered proprietary trade secrets – not subject to public review or ethics audit. I am hopeful that smart cities and communities initially and eventually all levels of public organizations, and nonprofits – will write into their procurement contracts requirements that firms not only commit to an ethical review process for AI applications touching on people directly – such as facial recognition. Further, I expect communities will in their requests for proposals make clear that inability to explain how an algorithm is being used and where the data generated is going/who will control the information will be disqualifying.</span></p><p data-dcnode-id="1025"><span data-dcnode-id="1026" instrument_node="">“These steps will be needed to restore communities’ trust in smart systems, which was shaken by self-serving initiatives by some of the technology giants trying to turn real communities into company towns. I am excited to see this clear need and also the complexity of developing standards and curricula for ‘certified ethical AI developers,’ which will be a growth area worldwide. How exactly to determine if one is truly ‘certified’ in ethics is obviously an area where the public would laugh in the faces of corporate representatives claiming their internal, not publicly disclosed, or audited, ethical training efforts are sufficient. This will take years to sort out and will require wide public dialogue and new international organizations to emerge. I am excited to help in this effort where I can.”</span></p><p data-dcnode-id="1021" style="padding-left: 30px"><strong data-dcnode-id="1023"><span data-dcnode-id="1024" instrument_node="">A professor at a university in the U.S. Midwest</span></strong><span data-dcnode-id="1022" instrument_node=""> said, “I anticipate some ethical principles for AI will be adopted by 2030; however, they will not be strong or transparent. Bottom line: Capitalism incentivizes exploitation of resources, and the development of AI and its exploitation of information is no different than any other industry. AI has great potential, but we need to better differentiate its uses. It can help us understand disease and how to treat it but has already inflicted great harms on individuals. As we have seen, AI has also disproportionately impacted those already marginalized – the COMPAS recidivism algorithm and the use of facial-recognition technology by police agencies are examples. The concept of general and narrow AI that Meredith Broussard uses is appropriate. Applied in particular areas, AI is hugely important and will better the lives of most. Other applications are nefarious and should be carefully implemented.”</span></p><p data-dcnode-id="1017"><strong data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node="">Mark Monchek</span></strong><span data-dcnode-id="1018" instrument_node="">, author, keynote speaker and self-described “culture of opportunity strategist,” commented, “In order for ethical principles to prevail, we need to embrace the idea of citizenship. By ‘citizenship,’ I mean a core value that each of us, our families and communities have a responsibility to actively participate in the world that affects us. This means carefully ‘voting’ every day when choosing who we buy from, consume technology from, work for and live with, etc. We would need to be much more proactive in our use of technology, including privacy issues, understanding, consuming media more like we consume food, etc.”</span></p><p data-dcnode-id="1013" style="padding-left: 30px"><strong data-dcnode-id="1015"><span data-dcnode-id="1016" instrument_node="">Monica Murero</span></strong><span data-dcnode-id="1014" instrument_node="">, director, E-Life International Institute and associate professor in Communication and New Technologies at the University of Naples Federico II, asked, “Will there be ethical or questionable outcomes? In the next decade (2020-2030), I see both, but I expect AI to become more questionable. I think about AI as an ‘umbrella’ term with different technologies, techniques, and applications that may lead to pretty different scenarios. The real challenge to consider is how AI will be used in combination with other disruptive technologies such as Internet of Things, 3D printing, cloud computing, blockchain, genomics engineering, implantable devices, new materials and environment-friendly technologies, new ways to store energy and how the environment and people will be affected and at the same part of the change – physically and mentally for the human race. I am worried about the changes in ‘humans’ and the rise of new inequalities in addition to the effects on objects and content that will be around us. The question is much broader than ‘ethical,’ and the answers, as a society, should start in a public debate at the international level. We should decide who or what should benefit the most. Many countries and companies are still very behind this race, and others will take advantage of it. This worries me the most because I do not expect that things will evolve in a transparent and ‘ethical’ manner. I am very much in favor of creating systems of evaluation and regulation that seriously look at the outcomes over time.”</span></p><h1 data-dcnode-id="1011"><span data-dcnode-id="1012" instrument_node="">3. Cross-cutting and novel statements</span></h1><p data-dcnode-id="1009"><span data-dcnode-id="1010" instrument_node="">A number of the respondents wrote about cross-cutting themes, introduced novel ideas or shared thoughts that were not widely mentioned by others. This section features a selection of that material.</span></p><h4 data-dcnode-id="1007"><span data-dcnode-id="1008" instrument_node="">Questions about AI figure into the grandest challenges humans face</span></h4><p data-dcnode-id="1003"><strong data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">Michael G. Dyer</span></strong><span data-dcnode-id="1004" instrument_node="">, professor emeritus of computer science at UCLA, expert in natural language processing, argued, “The greatest scientific questions are:</span></p><p data-dcnode-id="1001" style="padding-left: 30px"><span data-dcnode-id="1002" instrument_node="">1) Nature of Matter/Energy</span></p><p data-dcnode-id="999" style="padding-left: 30px"><span data-dcnode-id="1000" instrument_node="">2) Nature of Life</span></p><p data-dcnode-id="997" style="padding-left: 30px"><span data-dcnode-id="998" instrument_node="">3) Nature of Mind</span></p><p data-dcnode-id="995"><span data-dcnode-id="996" instrument_node="">“Developing technology in each of these areas brings about great progress but also existential threats. Nature of Matter/Energy: progress in lasers, computers, materials, etc., but hydrogen bombs with missile delivery systems. Nature of Life: progress in genetics, neuroscience, health care, etc., but possibility of man-made deadly artificial viruses. Nature of Mind: intelligence software to perform tasks in many areas but possibility of the creation of a general-AI that could eliminate and replace humankind.</span></p><p data-dcnode-id="993"><span data-dcnode-id="994" instrument_node="">“We can’t stop our exploration into these three areas, because then others will continue without us. The world is running on open, and the best we can do is to try to establish fair, democratic and noncorrupt governments. Hopefully in the U.S., government corruption, which is currently at the highest levels (with nepotism, narcissism, alternate ‘facts,’ racism, etc.), will see a new direction in 2021.”</span></p><h4 data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">Was the internet mostly used in ethical or questionable ways the past decade?</span></h4><p data-dcnode-id="987"><strong data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">Seth Finkelstein</span></strong><span data-dcnode-id="988" instrument_node="">, programmer, consultant and EFF Pioneer of the Electronic Frontier Award winner, noted, “Just substitute ‘the internet’ for ‘AI’ here – ‘Was the internet mostly used in ethical or questionable ways in the last decade?’ It was/will be used in many ways, and the net result ends up with both good and bad, according to various social forces. I believe technological advances are positive overall, but that shouldn’t be used to ignore and dismiss dealing with associated negative effects. There’s an AI ‘moral panic’ percolating now, as always happens with new technologies. A little while ago, there was a fear-mongering fad about theoretical ‘trolley problems’ (choosing actions in a car accident scenario). This was largely written about by people who apparently had no interest in the extensive topic of engineering safety trade-offs.</span></p><p data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">“Since discussion of, for example, structural racism or sexism pervading society is more a humanities field of study than a technological one, there’s been a somewhat better grasp by many writers that the development of AI isn’t going to take place outside existing social structures there.</span></p><p data-dcnode-id="983"><span data-dcnode-id="984" instrument_node="">“As always, follow the money. Take the old aphorism ‘It is difficult to get a man to understand something when his salary depends upon his not understanding it.’ We can adapt it to ‘It is difficult to get an AI to understand something when the developer’s salary depends upon the AI not understanding it.’</span></p><p data-dcnode-id="981"><span data-dcnode-id="982" instrument_node="">“Is there going to be a fortune in funding AI that can make connections between different academic papers or an AI that can make impulse purchases more likely? Will an AI assistant tell you that you’re spending too much time on social media and you should cut down for your mental health (‘log off now, okay?’) or that there’s new controversy brewing and get clicking otherwise you may be missing out (‘read this bleat, okay?’)?”</span></p><h4 data-dcnode-id="979"><span data-dcnode-id="980" instrument_node="">The future of work is a central issue in this debate</span></h4><p data-dcnode-id="975"><strong data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">Jonathan Taplin</span></strong><span data-dcnode-id="976" instrument_node="">, author of “Move Fast and Break Things: How Google, Facebook and Amazon Cornered Culture and Undermined Democracy,” observed, “Even if most major players in AI will abide by ethical rules, the role of bad actors using AI can have outsized effects on society. The ability to use deepfakes to influence political outcomes will be tested.</span></p><p data-dcnode-id="973"><span data-dcnode-id="974" instrument_node="">“What worries me the most is that the substitution of AI (and robotics) for human work will accelerate post-COVID-19. The political class, with the notable exception of Andrew Yang, is in total denial about this. And the substitution will affect radiologists just as much as meat cutters. The job losses will cut across classes.”</span></p><h4 data-dcnode-id="971"><span data-dcnode-id="972" instrument_node="">Intellectual product is insufficient to protect us from dystopic outcomes</span></h4><p data-dcnode-id="966"><strong data-dcnode-id="968"><img alt="" class="alignright wp-image-46675" data-dcnode-id="970" height="259" sizes="(max-width: 460px) 100vw, 460px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.elon.edu/u/imagining/wp-content/uploads/sites/964/2021/06/2021-Frank-Kaufmann-The-Future-of-Ethical-AI-Design14.jpg&amp;raw" srcset="https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Frank-Kaufmann-The-Future-of-Ethical-AI-Design14.jpg 2500w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Frank-Kaufmann-The-Future-of-Ethical-AI-Design14-300x169.jpg 300w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Frank-Kaufmann-The-Future-of-Ethical-AI-Design14-768x432.jpg 768w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Frank-Kaufmann-The-Future-of-Ethical-AI-Design14-1024x576.jpg 1024w" width="460"><span data-dcnode-id="969" instrument_node="">Frank Kaufmann</span></strong><span data-dcnode-id="967" instrument_node="">, president of the Twelve Gates Foundation, noted, “Will AI mostly be used in ethical or questionable ways in the next decade? And why? This is a complete and utter toss-up. I believe there is no way to predict which will be the case.</span></p><p data-dcnode-id="964"><span data-dcnode-id="965" instrument_node="">“It is a great relief that, in recent years, there have been scores of convenings and even more papers generated proposing ethical frameworks for the application of artificial intelligence. They cover a host of issues, including transparency, justice and fairness, privacy, freedom and human autonomy, beneficence and nonmaleficence, freedom, trust, sustainability and dignity. But, then again, there have been the Treaty of Versailles, and the literal tons of paper the United Nations has produced talking about peace, the Declaration of Human Rights and so forth.</span></p><p data-dcnode-id="962"><span data-dcnode-id="963" instrument_node="">“I am glad people meet sincerely and in earnest to examine vital ethical concerns related to the development of AI. The problem is that intellectual product is insufficient to protect us from dystopic outcomes. The hope and opportunity to enhance, support and grow human freedom, dignity, creativity and compassion through AI systems excite me. The chance to enslave, oppress and exploit human beings through AI systems concerns me.”</span></p><h4 data-dcnode-id="960"><span data-dcnode-id="961" instrument_node="">Technological determinism should be ‘challenged by critical research’</span></h4><p data-dcnode-id="956"><strong data-dcnode-id="958"><span data-dcnode-id="959" instrument_node="">Bill Dutton,</span></strong><span data-dcnode-id="957" instrument_node=""> professor of media and information policy at Michigan State University, said, “AI is not new and has generally been supportive of the public good, such as in supporting online search engines. The fact that many people are discovering AI as some new development during a dystopian period of digital discourse has fostered a narrative about evil corporations challenged by ethical principles. This technologically deterministic good versus evil narrative needs to be challenged by critical research.”</span></p><h4 data-dcnode-id="954"><span data-dcnode-id="955" instrument_node="">Is it possible to design cross-cultural ethics systems?</span></h4><p data-dcnode-id="950"><strong data-dcnode-id="952"><span data-dcnode-id="953" instrument_node="">Michael Muller</span></strong><span data-dcnode-id="951" instrument_node="">, a researcher for a top global technology company focused on human aspects of data science and ethics and values in applications of artificial intelligence, wrote, “I am concerned about what might be called ‘traveling AI’ – i.e., AI solutions that cross cultural boundaries.</span></p><p data-dcnode-id="948"><span data-dcnode-id="949" instrument_node="">“Most AI systems are likely to be designed and developed in the individualistic EuroWestern cultures. These systems may be ill-suited – and in fact harmful – to collectivist cultures. The risk is particularly severe for indigenous cultures in, e.g., the Americas, Africa and Australia.</span></p><p data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">“How can we design systems that are ethical in the cultural worlds of their users – whose ethics are based on very different values from the individualistic EuroWestern traditions?”</span></p><h4 data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">Most people have no idea how limited and brittle these capabilities are</span></h4><p data-dcnode-id="940"><strong data-dcnode-id="942"><span data-dcnode-id="943" instrument_node="">Steven Miller</span></strong><span data-dcnode-id="941" instrument_node="">, professor emeritus of information systems at Singapore Management University, responded, “We have to move beyond the current mindset of AI being this special thing – an almost mystical thing. I wish we would stop using the term AI (though I use it a lot myself), and just refer to it for what it is – pattern-recognition systems, statistical analysis systems that learn from data, logical reasoning data, goal-seeking systems. Just look at the table of contents for an AI textbook (such as ‘Artificial Intelligence: A Modern Approach,’ Stuart Russell and Peter Norvig, 4th edition, published 2020). Each item in the table of contents is a subarea of AI, and there are a lot of subareas. …</span></p><p data-dcnode-id="938"><span data-dcnode-id="939" instrument_node="">“There are ethical issues associated with any deployment of any engineering and technology system, any automation system, any science effort (especially the application of the science), and/or any policy analysis effort. So, there is nothing special about the fact that we are going to have ethical issues associated with the use of AI-enabled systems. As soon as we stop thinking of AI as ‘special,’ and to some extent magical (at least to the layman who does not understand how these things work, as machines and tools), and start looking at each of these applications, and families of applications as deployments of tools and machines – covering both physical realms of automation and/or augmentation, and cognitive and decision-making realms of automation and/or augmentation – then we can have real discussions.</span></p><p data-dcnode-id="936"><span data-dcnode-id="937" instrument_node="">“Years back, invariably, there had to have been many questions raised about ‘the ethics of using computers,’ especially in the 1950s, 1960s and 1970s, when our civilisation was still experiencing the possibilities of computerising many tasks for the very first time. AI is an extension of this, though taking us into a much wider range of tasks and tasks of increasing cognitive sophistication. …</span></p><p data-dcnode-id="934"><span data-dcnode-id="935" instrument_node="">“Now, of course, our ability to create machines that can sense, predict, respond and adapt has vastly improved. Even so, most lay people have no idea of just how limited and brittle these capabilities are – even though they are remarkable and far above human capability in certain specific subdomains, under certain circumstances. What is happening is that most laypeople are jumping to the conclusion that, ‘Because it is an AI-based system, it must be right, and therefore, I should not question the output of the machine, for I am just a mere human.’ So now the pendulum has swung to the other extreme of layperson assuming AI-enabled algorithms and machines are actually more capable (or more robust and more context-aware) than they actually are. And this will lead to accidents, mistakes and problems. …</span></p><p data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">“Just like there will be all types of people with all types of motives pursuing their interests in all realms of human activity, the same will be true of people making use of AI-enabled systems for automation, or augmentation or related human support. And some of these people will have noble goals and want to help others. And some of these people will be nefarious and want to gain advantage in ways others might not understand, and there will even be the extreme of some who purposely want to bring harm to others. We saw this with social media. In years, decades and centuries past, we saw this with every technological innovation that appeared, going back to the printing press and even earlier. … Let’s start getting specific about use cases and situations. One cannot talk in the abstract as to whether an automobile will be used ethically. Or whether a computer will be used ethically. Or biology as an entire field will be used ethically. One has to get much more specific about classes of issues or types of problems that are related to the usage of these big categories of ‘things.’”</span></p><h4 data-dcnode-id="930"><span data-dcnode-id="931" instrument_node="">AI ‘must not be used to make any decision that has direct impact on people’s lives’</span></h4><p data-dcnode-id="926"><strong data-dcnode-id="928"><span data-dcnode-id="929" instrument_node="">Fernando Barrio</span></strong><span data-dcnode-id="927" instrument_node="">, a lecturer in business law at Queen Mary University of London expert in AI and human rights, responded, “If ethical codes for AI will be in place for the majority of cases for 2030, they will purport to be in the public good (which would seem to imply a ‘yes’ to the question as it was asked), but they will not result in public good. The problem is that the question assumes that the sole existence and use of ethical codes would be in the public good.</span></p><p data-dcnode-id="924"><span data-dcnode-id="925" instrument_node="">“AI, not as the singularity but as machine learning or even deep learning, has an array of positive potential applications but must not be used to make any decision that has a direct impact on people’s lives. In certain sectors, like the criminal system, it must not be used even in case management, since the inherent and unavoidable bias (either from the data or the algorithmic bias resulting from its own selection or discovery of patterns) leads that individuals and their cases are not judged or managed, taking into account the characteristics that make every human unique but in those characteristics that make that person ‘computable.’</span></p><p data-dcnode-id="922"><span data-dcnode-id="923" instrument_node="">“Those who propose the use of AI to avoid human bias, such as those that judges and jurors might implement, tend to overlook – let’s assume naively – that those biases can be challenged through appeals, and they can be made explicit and transparent. The AI inherent, one cannot be challenged because, between other things, the lack of transparency and, especially, for the insistence of its proponents that the technology can be unbiased.”</span></p><p data-dcnode-id="918"><span data-dcnode-id="921" instrument_node="">Just as with drugs, without rigorous study prior to release, AI side effects can be dangerous</span><br data-dcnode-id="920"><span data-dcnode-id="919" instrument_node=""> An internet pioneer and principal architect at a major technology company said, “AI is a lot like new drug development – without rigorous studies and regulations, there will always be the potential for unexpected side effects.</span></p><p data-dcnode-id="916"><span data-dcnode-id="917" instrument_node="">“Bias is an inherent risk in any AI system that can have major effects on people’s lives. While there is more of an understanding of the challenges of ethical AI, implicit bias is very difficult to avoid because it is hard to detect. For example, you may not discover that a facial-recognition system has excessively high false-recognition rates with some racial or ethnic groups until it has been released – the data to test all the potential problems may not have been available before the product is released.</span></p><p data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">“The alternative is to move to a drug-development model for AI, where very extensive trials with increasingly large populations are required prior to release, with government agencies monitoring progress at each stage. I don’t see that happening, though, because it will slow innovation, and tech companies will make the campaign contributions necessary to prevent regulation from becoming that intrusive.”</span></p><h4 data-dcnode-id="912"><span data-dcnode-id="913" instrument_node="">Has AI has been shifting the nature of thought and discourse and, if so, how?</span></h4><p data-dcnode-id="908"><strong data-dcnode-id="910"><span data-dcnode-id="911" instrument_node="">A professor of urban planning</span></strong><span data-dcnode-id="909" instrument_node=""> noted, “Already the general ‘co-evolution’ of humanity and technology suggests that humans are not nearly as in control as they think they are of technology’s operations, much less its trajectory. While I am not an enthusiast of singularity speculations, there does seem to be a move toward AI stepping in to save the planet, and humans remain useful to that for a while, maybe in bright perpetuity.</span></p><p data-dcnode-id="906"><span data-dcnode-id="907" instrument_node="">“With wondrous exceptions of course, humans themselves seem ever less inclined to dwell on the question of what is good, generally, or more specifically, what is good about mindful reflectivity in the face of rampant distraction engineering.</span></p><p data-dcnode-id="904"><span data-dcnode-id="905" instrument_node="">“While one could worry that humans will unleash AI problems simply because it would be technically possible, perhaps the greater worry is that AI, and lesser technological projects, too, have already been shifting the nature of thought and discourse toward conditions where cultural deliberations on more timeless and perennial questions of philosophy have no place. Google is already better at answers. Humans had best cultivate their advantage at questions. But if you are just asking about everyday AI assistance, just look how much AI underlies the autocomplete to a simple search query. Or, gosh, watch the speed and agility of the snippets and IntelliSense amid the keyboard experience of coding. Too bad.”</span></p><h4 data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">Can any type of honor code – ‘AI omerta’ – really keep developers in line?</span></h4><p data-dcnode-id="898"><strong data-dcnode-id="900"><span data-dcnode-id="901" instrument_node="">Anthony Judge</span></strong><span data-dcnode-id="899" instrument_node="">, editor of the Encyclopedia of World Problems and Human Potential, observed, “The interesting issue for me is how one could navigate either conclusion to the questions and thereby subvert any intention.</span></p><p data-dcnode-id="896"><span data-dcnode-id="897" instrument_node="">“We can’t assume that the ‘bad guys’ will not be developing AI assiduously to their own ends (as could already be argued to be the case), according to their own standards of ethics. AI omerta? Appropriate retribution for failing to remain loyal to the family? Eradicate those who oppose the mainstream consensus? What is to check against these processes? What will the hackers do?”</span></p><p data-dcnode-id="892"><span data-dcnode-id="895" instrument_node="">When there is no trust in others, people focus on self-interests to the detriment of others</span><br data-dcnode-id="894"><span data-dcnode-id="893" instrument_node=""> Rebecca Theobald, assistant research professor at the University of Colorado-Colorado Springs, predicted, “AI will mostly be used in questionable ways in the next decade because people do not trust the motives of others. Articulate people willing to speak up give me the most hope. People who are scared about their and their families’ well-being worry me the most because they feel there is no other choice but to scramble to support themselves and their dependents.</span></p><p data-dcnode-id="890"><span data-dcnode-id="891" instrument_node="">“Without some confidence in the climate, economy, health system and societal interaction processes, people will become focused on their own issues and have less time and capital to focus on others. AI applications in health and transportation will make a difference in the lives of most people. Although the world is no longer playing as many geopolitical games over territory, corporations and governments still seek power and influence. AI will play a large role in that. Still, over time, science will win out over ignorance.”</span></p><h4 data-dcnode-id="888"><span data-dcnode-id="889" instrument_node="">In order to assure it is for public good, perhaps AI could be regulated like a utility</span></h4><p data-dcnode-id="884"><strong data-dcnode-id="886"><span data-dcnode-id="887" instrument_node="">A director with a strategy firm</span></strong><span data-dcnode-id="885" instrument_node=""> commented, “The creators of AI and AI in general are most likely to be used by those in power to keep power. Whether to wage war or financial war or manage predicted outcomes, most AIs are there to do complex tasks. Unless there is some mechanism to make them for the public benefit, they will further encourage winner-take-all.</span></p><p data-dcnode-id="882"><span data-dcnode-id="883" instrument_node="">“Regarding lives, let’s take the Tesla example. Its claim is that it will soon have Level 5 AI in its vehicles. Let’s assume that it takes a couple of years beyond that. The markets are already betting that: 1) It will happen, and 2) No one else is in any position to follow. If so, rapid scaling of production would enable fleets of robocall-taxis; it could destroy the current car industry as the costs are radically lower, and the same tech will impact on most public transport, too, in five years.</span></p><p data-dcnode-id="880"><span data-dcnode-id="881" instrument_node="">“Technology-wise, I love the above scenario. It does mean, however, that only the elite will drive or have a desire to have their own vehicle. Thus, for the majority, this is a utility. Utilities are traditionally for the public good. It’s why in most countries the telephone system or the postal system were originally owned by the government. It’s why public transport is a local government service. We will not be well served by a winner-take-all transportation play! Amazon seems to be doing pretty well with AI. They can predict your purchases. They can see their resellers success and at scale simply replace them. Their delivery network is at scale and expected to also go to autonomous. I can’t live without it; however, each purchase kills another small supplier. Because economics eliminate choice – one has to feed oneself.</span></p><p data-dcnode-id="878"><span data-dcnode-id="879" instrument_node="">“As long as AI can be owned, those who have it or access to it have an advantage. Those who don’t are going to suffer and be disadvantaged.”</span></p><h4 data-dcnode-id="874"><span data-dcnode-id="877" instrument_node="">Three respondents’ views:</span><br data-dcnode-id="876"><span data-dcnode-id="875" instrument_node=""> The biggest concerns involve ill-considered AI systems, large and small</span></h4><p data-dcnode-id="870"><strong data-dcnode-id="872"><span data-dcnode-id="873" instrument_node="">Joshua Hatch</span></strong><span data-dcnode-id="871" instrument_node="">, a journalist who covers technology issues, commented, “While I think most AI will be used ethically, that’s probably irrelevant. This strikes me as an issue where it’s not so much about what ‘most’ AI applications do but about the behavior of even just a few applications. It just takes one Facebook to cause misinformation nightmares, even if ‘most’ social networks do a better job with misinformation (not saying they do; just providing an example that it only takes one bad actor). Furthermore, even ethical uses can have problematic outcomes. You can already see this in algorithms that help judges determine sentences. A flawed algorithm leads to flawed outcomes – even if the intent behind the system was pure. So, you can count on misuse or problematic AI just as you can with any new technology. And even if most uses are benign, the scale of problem AI could quickly create a calamity. That said, probably the best potential for AI is for use in medical situations to help doctors diagnose illnesses and possibly develop treatments. What concerns me the most is the use of AI for policing and spying.”</span></p><p data-dcnode-id="866"><strong data-dcnode-id="868"><span data-dcnode-id="869" instrument_node="">A research scientist who works at Google</span></strong><span data-dcnode-id="867" instrument_node=""> commented, “I’m involved in some AI work, and I know that we will do the right thing. It will be tedious, expensive and difficult, but we’ll do the right thing. The problem will be that it’s very cheap and easy for a small company to not do the right thing (see the recent example of ClearView, which scraped billions of facial images, violating terms of service and created a global facial-recognition dataset). This kind of thing will continue. Large companies have incentives to do the right thing, but smaller ones do not (see, e.g., Martin Shkreli and his abuse of pharma patents).”</span></p><p data-dcnode-id="862"><strong data-dcnode-id="864"><span data-dcnode-id="865" instrument_node="">Another research scientist who works on AI innovation with Google</span></strong><span data-dcnode-id="863" instrument_node=""> commented, “There will be a mix. It won’t be wholly questionable or ethical. Mostly, I worry about people pushing ahead on AI advancements without thinking about testing, evaluation, verification and validation of those systems. They will deploy them without requiring the types of assurance we require in other software. For global competition, I worry that U.S. tech companies and workers do not appreciate the national security implications.”</span></p><h1 data-dcnode-id="860"><span data-dcnode-id="861" instrument_node="">4. Could a quantum leap someday aid ethical AI?</span></h1><p data-dcnode-id="855"><span data-dcnode-id="859" instrument_node="">As they considered the potential evolution of ethical AI design, the people responding to this canvassing were given the opportunity to speculate as to whether </span><a data-dcnode-id="857" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ibm.com/quantum-computing/learn/what-is-quantum-computing/"><span data-dcnode-id="858" instrument_node="">quantum computing</span></a><span data-dcnode-id="856" instrument_node=""> (QC), which is still in its early days of development, might somehow be employed in the future in support of&nbsp; the development of ethical AI systems.</span></p><p data-dcnode-id="850"><span data-dcnode-id="854" instrument_node="">In March 2021, a team at the University of Vienna announced it had </span><a data-dcnode-id="852" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41586-021-03242-7"><span data-dcnode-id="853" instrument_node="">designed a hybrid AI</span></a><span data-dcnode-id="851" instrument_node=""> that relies on quantum and classical computing and showed that – thanks to quantum quirkiness – it could simultaneously screen a handful of different ways to solve a problem. The result was a reinforcement learning AI that learned more than 60% faster than a nonquantum-enabled setup. This was one of the first tests to show that adding quantum speed can accelerate AI agent training/learning. It is projected that this capability, when scaled up, also might lead to a more-capable “quantum internet.”</span></p><p data-dcnode-id="839"><span data-dcnode-id="849" instrument_node="">Although there have been </span><a data-dcnode-id="847" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.forbes.com/sites/stephenibaraki/2021/01/29/what-you-need-for-your-quantum-computing-pilots-in-2021/"><span data-dcnode-id="848" instrument_node="">many other announcements</span></a><span data-dcnode-id="846" instrument_node=""> of </span><a data-dcnode-id="844" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedaily.com/releases/2021/02/210202113837.htm"><span data-dcnode-id="845" instrument_node="">new steps toward advancing QC</span></a><span data-dcnode-id="843" instrument_node=""> in the past year or two, it is still so nascent that even its developers are somewhat uncertain about its likely future applications, and the </span><a data-dcnode-id="841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.techrepublic.com/article/6-experts-share-quantum-computing-predictions-for-2021/"><span data-dcnode-id="842" instrument_node="">search is on for specific use cases</span></a><span data-dcnode-id="840" instrument_node="">.</span></p><p data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">Because this tech is still in its early days, of course these respondents’ answers are speculative reflections, but their discussion of the question raises a number of important issues. The question they considered was:</span></p><p data-dcnode-id="835"><span data-dcnode-id="836" instrument_node="">How likely is it that quantum computing will evolve over the next decade to assist in creating ethical artificial intelligence systems? If you think that will be likely, why do you think so? If you do not think it likely that quantum computing will evolve to assist in building ethical AI, why not?</span></p><p data-dcnode-id="833"><span data-dcnode-id="834" instrument_node="">Here, we share four overarching responses. They are followed by responses from those who said it might be possible in the future for AI ethics systems to get a boost from QC and by responses from experts who said that such a development is somewhat or quite unlikely.</span></p><p data-dcnode-id="829" style="padding-left: 30px"><strong data-dcnode-id="831"><span data-dcnode-id="832" instrument_node="">Greg Sherwin</span></strong><span data-dcnode-id="830" instrument_node="">, vice president for engineering and information technology at Singularity University, wrote, “Binary computing is a lossy, reductionist crutch that models the universe along the lines of false choices. Quantum computing has an opportunity to better embrace the complexity of humanity and the world, as humans can hold paradoxes in their minds while binary computers cannot. Probabilistic algorithms and thinking will predominate the future, leading to more emphasis on the necessary tools for such scenario planning, which is where quantum computers can serve and binary computers fail. That demand for the answers that meet the challenges of the future will require us to abandon our old, familiar tools of the past and to explore and embrace new paradigms of thinking, planning and projecting. I do see ethical AI as something orthogonal to the question of binary vs. quantum computing. It will be required in either context. So, the question of whether quantum computing will evolve as a tool to assist building ethical AI is a nonstarter. Either because there is little ‘quantum’ specialty about it, or because building ethical AI is a need independent of its computational underpinnings. Humans will continue to be in the loop for decisions that have significant impacts to our lives, our health, our governance and our social well-being. Machines will be wholly entrusted for only those things that are mechanized, routine and subject to linear optimization.”</span></p><p data-dcnode-id="825"><strong data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">Barry Chudakov</span></strong><span data-dcnode-id="826" instrument_node="">, founder and principal of Sertain Research, said, “I believe quantum computers may evolve to assist in building ethical AI, not just because they can work faster than traditional computers, but because they operate differently. AI systems depend on massive amounts of data that algorithms ingest, classify and analyze using specific characteristics; quantum computers enable more precise classification of that data. Eventually, quantum computing-based AI algorithms could find patterns that are invisible to classical computers, making certain types of intractable problems solvable. But there is a fundamental structural problem that must be addressed first: vastly more powerful computing power may not resolve the human factor. Namely, that the moral and ethical framework for building societal entities (churches, governments, constitutions, laws, etc.) grew out of tribal culture, nomadic culture, which recorded precepts which then turned into codified law. …</span></p><p data-dcnode-id="820"><span data-dcnode-id="824" instrument_node="">“We’re in a different world now. As William Gibson said in 2007: “The distinction between cyberspace and that which isn’t cyberspace is going to be unimaginable.” It’s now time to imagine the unimaginable. This is because AI operates from an entirely different playbook. The tool logic of artificial intelligence is embedded machine learning; it is quantum, random, multifarious. We are leaving the </span><a data-dcnode-id="822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Gutenberg_Galaxy"><span data-dcnode-id="823" instrument_node="">Gutenberg Galaxy</span></a><span data-dcnode-id="821" instrument_node=""> and its containment patterns of rule-based injunctions. The tool logic of the book is linear, celebrates one-at-a-timeness and the single point of view; alphabetic sequentiality supplanted global/spatial awareness and fostered fear of the image; literacy deified books as holy and the ‘word of God.’ AI, on the other hand, takes datasets and ‘learns’ or improves from the analysis of that data. This is a completely different dynamic, with a different learning curve and demands. …</span></p><p data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">“I believe we need a 21st-century Quantum AI Constitutional Convention. The purpose of such a convention is clear: To inaugurate a key issue not only for AI tech companies in the coming decade but for the known world, namely, establishing clear ethical guidelines and protocols for the deployment of AI and then creating an enlightened, equitable means of policing and enforcing those guidelines. This will necessitate addressing the complexities of sensitive contexts and environments (face recognition, policing, security, travel, etc.) as well as a host of intrusive data collection and use case issues, such as tracking, monitoring, AI screening for employment, or algorithmic biases. This will demand transparency, both at the site of the deployment of AI as well as addressing its implications. Without those guidelines and protocols – the 21st-century equivalent of the Magna Carta and its evolved cousin, the U.S. Constitution – there will be manufactured controversy over what is ethical and what is questionable. … AI is ubiquitous and pervasive. We hardly have the language or the inclination to fully appreciate what AI can and will do in our lives. This is not to say that we cannot; it is to say that we are unprepared to see, think, debate and wisely decide how to best move forward with AI development.</span></p><p data-dcnode-id="816"><span data-dcnode-id="817" instrument_node="">“Once there is a global constitution and Bill of AI Rights, with willing signatories around the world, quantum computing will be on track to evolve in assisting the building of ethical AI. However, the unfolding of that evolution will collide with legacy cultural and societal structures. So, as we embrace and adopt the logic of AI, we will change ourselves and our mores; effectively, we will be turning from hundreds or thousands of years of codified traditional behaviors to engage with and adapt to the ‘chaotic implications’ of AI. …</span></p><p data-dcnode-id="814"><span data-dcnode-id="815" instrument_node="">“AI represents not human diminishment and replacement but a different way of being in the world, a different way of thinking about and responding to the world, namely, to use designed intelligence to augment and expand human intelligence. Yes, this will create new quandaries and dilemmas for us – some of which may portend great danger. … We will braid AI into the fabric of our lives, and, in order to do so successfully, society at many levels must be present and mindful at every step of AI integration into human society.”</span></p><p data-dcnode-id="810" style="padding-left: 30px"><strong data-dcnode-id="812"><span data-dcnode-id="813" instrument_node="">David Brin</span></strong><span data-dcnode-id="811" instrument_node="">, physicist, futures thinker and author of the science fiction novels “Earth” and “Existence,” predicted, “Quantum computing has genuine potential. Roger Penrose and associates believe it already takes place, in trillions of subcellular units inside human neurons. If so, it may take a while to build quantum computers on that kind of scale. The ethical matter is interesting, though totally science fictional, that quantum computers might connect in ways that promote reciprocal understanding and empathy.”</span></p><p data-dcnode-id="806"><strong data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">Jerome C. Glenn</span></strong><span data-dcnode-id="807" instrument_node="">, co-founder and CEO of the futures-research organization The Millennium Project, wrote, “Elementary quantum computing is already here and will accelerate faster than people think, but the applications will take longer to implement than people think. It will improve computer security, AI and computational sciences, which in turn accelerate scientific breakthroughs and tech applications, which in turn increase both positive and negative impacts for humanity. These potentials are too great for humanity to remain so ignorant. We are in a new arms race for artificial general intelligence and more-mature quantum computing, but, like the nuclear race that got agreements about standards and governance (International Atomic Energy Agency), we will need the same for these new technologies while the race continues.”</span></p><h4 data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">Responses from those who said quantum computing is very or somewhat likely to assist in working toward ethical design of artificial intelligence</span></h4><p data-dcnode-id="800" style="padding-left: 30px"><strong data-dcnode-id="802"><span data-dcnode-id="803" instrument_node="">Stanley Maloy</span></strong><span data-dcnode-id="801" instrument_node="">, associate vice president for research and innovation and professor of biology at San Diego State University, responded, “Quantum computing will develop hand-in-hand with 5G technologies to provide greater access to computer applications that will affect everyone’s lives, from self-driving cars to effective drone delivery systems, and many, many other applications that require both decision-making and rapid analysis of large datasets. This technology can also be used in harmful ways, including misuse of identification technologies that bypass privacy rights.”</span></p><p data-dcnode-id="796"><strong data-dcnode-id="798"><span data-dcnode-id="799" instrument_node="">A longtime network technology administrator and leader based in Oceania</span></strong><span data-dcnode-id="797" instrument_node="">, said, “Quantum computing gives us greater computational power to tackle complex problems. It is therefore a simple relationship – if more computational power is available, it will be used to tackle those complex problems that are too difficult to solve today.”</span></p><p data-dcnode-id="792" style="padding-left: 30px"><strong data-dcnode-id="794"><span data-dcnode-id="795" instrument_node="">Sean Mead</span></strong><span data-dcnode-id="793" instrument_node="">, senior director of strategy and analytics at Interbrand, said, “Quantum computing enables an exponential increase in computing power, which frees up the processing overhead so that more ethical considerations can be incorporated into AI decision-making. Quantum computing injects its own ethical dilemmas in that it makes the breaking of modern encryption trivial. Quantum computing’s existence means current techniques to protect financial information, privacy, control over network-connected appliances, etc., are no longer valid, and any security routines relying on them are likewise no longer valid and effective.”</span></p><p data-dcnode-id="788"><strong data-dcnode-id="790"><span data-dcnode-id="791" instrument_node="">David Mussington</span></strong><span data-dcnode-id="789" instrument_node="">, a senior fellow at CIGI and professor and director at the Center for Public Policy and Private Enterprise at the University of Maryland, wrote, “I am guardedly optimistic that quantum computing ‘could’ develop in a salutary direction. The question is, ‘whose values will AI research reflect?’ It is not obvious to me that the libertarian ideologies of many private sector ICT and software companies will ‘naturally’ lead to the deployment of safe – let alone secure – AI tools and AI-delivered digital services. Transparency in the technologies, and in the decisions that AI may enable, may run into information-sharing limits due to trade secrets, nondisclosure agreements and international competition for dominance in cyberspace. Humans will still be in the loop of decisions, but those humans have different purposes, cultural views and – to the extent that they represent states – conflicting interests.”</span></p><p data-dcnode-id="784" style="padding-left: 30px"><strong data-dcnode-id="786"><span data-dcnode-id="787" instrument_node="">Vint Cerf</span></strong><span data-dcnode-id="785" instrument_node="">, Internet Hall of Fame member and vice president and chief internet evangelist at Google, observed, “There is some evidence that quantum methods may be applicable to ML systems for optimization for example. But it’s early days yet.”</span></p><p data-dcnode-id="780"><strong data-dcnode-id="782"><span data-dcnode-id="783" instrument_node="">Jamais Cascio</span></strong><span data-dcnode-id="781" instrument_node="">, research fellow at the Institute for the Future, observed, “To the degree that quantum computing will allow for the examination of a wide variety of possible answers to a given problem, quantum computing may enhance the capacity of systems to evaluate best long-term outcomes. There’s no reason to believe that quantum computing will make ethical systems easier to create, however. And if quantum computing doesn’t allow for ready examination of multiple outcomes, then it would be no better or worse than conventional systems.”</span></p><p data-dcnode-id="776" style="padding-left: 30px"><strong data-dcnode-id="778"><span data-dcnode-id="779" instrument_node="">Gary A. Bolles</span></strong><span data-dcnode-id="777" instrument_node="">, chair for the future of work at Singularity University, responded, “We might as well ask if faster cars will allow us to go help people more quickly. Sure, but they can also deliver bad actors to their destination faster, as well. The quantum computing model lends itself to certain processes that will eventually blow past traditional microprocessors, such as completely new forms of encryption. Those methods, and the products created using them, could enable unbreakable privacy. Or they could be used to circumvent traditional approaches to encryption and create far more risk for anyone depending on traditional computing systems. As Benjamin Bratton presciently discusses in The Stack, if we don’t specifically create technology to help us manage the complexity of technology, that complexity alone will ensure that only a rarefied few will benefit.”</span></p><p data-dcnode-id="772"><strong data-dcnode-id="774"><span data-dcnode-id="775" instrument_node="">A journalist and industry analyst expert in AI ethics</span></strong><span data-dcnode-id="773" instrument_node=""> said, “Quantum is going to be made available via the cloud because of the cooling requirements. A lot of innovation has already happened, but in the next decade there will be major advancements. It will break cybersecurity as we know it today. Humans need to be in the loop. However, they will likely find themselves out of the loop unless safeguards are built into the system. AI can already do many tasks several orders of magnitude faster than humans. Quantum computing will add yet more orders of speed magnitude.”</span></p><p data-dcnode-id="768" style="padding-left: 30px"><strong data-dcnode-id="770"><span data-dcnode-id="771" instrument_node="">A professor of digital economy based in Europe</span></strong><span data-dcnode-id="769" instrument_node=""> responded, “The fascination with quantum computing means that technology companies will do a lot of work on it without being too concerned about how many of these new inventions will facilitate human life. The emphasis will remain on monetizing this frontier and enabling AI that is less guided by human interventions. In effect, these technologies will be more error-prone, and as such they will unleash even more ethical concerns as they unravel through time. Its speed of calculation will be matched by glitches that will require human deliberation.”</span></p><p data-dcnode-id="764"><strong data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">Ibon Zugasti</span></strong><span data-dcnode-id="765" instrument_node="">, futurist, strategist and director with Prospektiker, wrote, “Artificial intelligence will drive the development of quantum computing, and then quantum computing will further drive the development of artificial intelligence. This mutual acceleration could grow beyond human control and understanding. Scientific and technological leaders, advanced research institutes and foundations are exploring how to anticipate and manage this issue.”</span></p><p data-dcnode-id="760" style="padding-left: 30px"><strong data-dcnode-id="762"><span data-dcnode-id="763" instrument_node="">Joshua Hatch</span></strong><span data-dcnode-id="761" instrument_node="">, a journalist who covers technology issues, commented, “It seems to me that every technological advance will be put to use to solve technological dilemmas, and this is no different. As for when we’ll see dramatic advances, I would guess over the next 10 years.”</span></p><p data-dcnode-id="756"><strong data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">A director of standards and strategy at a major technology company</span></strong><span data-dcnode-id="757" instrument_node=""> commented, “In general, our digital future depends on advances in two very broad, very basic areas: bandwidth and computer power. Most generally, I need to be able to complete tasks, and I need to be able to move information and generally communicate with others. Quantum computing is one of the promising areas for computing power.”</span></p><p data-dcnode-id="752" style="padding-left: 30px"><strong data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">Ray Schroeder</span></strong><span data-dcnode-id="753" instrument_node="">, associate vice chancellor of online learning, University of Illinois-Springfield, responded, “The power of quantum computing will enable AI to bridge the interests of the few to serve the interests of the many. These values will become part of the AI ethos, built into the algorithms of our advanced programs. Humans will continue to be part of the partnership with the technologies as they evolve – but this will become more of an equal partnership with technology rather than humans micromanaging technology as we have in the past.”</span></p><p data-dcnode-id="748"><strong data-dcnode-id="750"><span data-dcnode-id="751" instrument_node="">A complex systems researcher based in Australia</span></strong><span data-dcnode-id="749" instrument_node=""> wrote, “Once AI systems can start to self-replicate, then there will be an explosive evolution. I doubt it will become the fabled singularity (where humans are no longer needed), but there will be many changes.”</span></p><p data-dcnode-id="744" style="padding-left: 30px"><strong data-dcnode-id="746"><span data-dcnode-id="747" instrument_node="">A technology developer/administrator</span></strong><span data-dcnode-id="745" instrument_node=""> commented, “Quantum computing may be a more efficient way to implement a neural network. That doesn’t change the final result, though. Just as I can compile my C for any architecture, an AI algorithm may be implemented on a different hardware platform. The results will be equivalent, though hopefully faster/cheaper to execute.”</span></p><p data-dcnode-id="740"><strong data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">Moira de Roche</span></strong><span data-dcnode-id="741" instrument_node="">, chair of IFIP IP3, noted, “AI systems rely on massive amounts of data. Quantum computing can help classify the data in meaningful ways. Quantum will boost machine learning.”</span></p><p data-dcnode-id="736" style="padding-left: 30px"><strong data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">A futurist and consultant</span></strong><span data-dcnode-id="737" instrument_node=""> responded, “AI is about managing ever-larger datasets and machine learning. Quantum accelerates both.”</span></p><p data-dcnode-id="732"><strong data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">Eric Knorr</span></strong><span data-dcnode-id="733" instrument_node="">, pioneering technology journalist and editor in chief of IDG, commented, “Yes, computing power a magnitude greater than currently available could raise the possibility of some emulation of general intelligence at some point. But how we apply that is up to us.”</span></p><p data-dcnode-id="728" style="padding-left: 30px"><strong data-dcnode-id="730"><span data-dcnode-id="731" instrument_node="">Philip M. Neches</span></strong><span data-dcnode-id="729" instrument_node="">, lead mentor at Enterprise Roundtable Accelerator and longtime trustee at California Institute of Technology, commented, “I expect cost-effective quantum computing hardware to emerge by 2030. Programming will remain a work-in-progress for some decades after 2030.”</span></p><p data-dcnode-id="724"><strong data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">Nigel Cameron</span></strong><span data-dcnode-id="725" instrument_node="">, president emeritus at the Center for Policy on Emerging Technologies, commented, “It’s hard to predict the timeline, even though it does seem inevitable that quantum systems will dominate. It’s a tantalizing idea that we can just build ethics into the algorithms. Some years back, the Department of Defense issued a strange press release in defense of robotic warfare that suggested it would be more humane, since the Geneva Conventions could be built into the programming. I’m fascinated, and horrified, by the experiences of military drone operators playing de facto video games before going home for dinner after taking out terrorists on the other side of the world. A phrase from a French officer during our high-level, super-safe (for the U.S.) bombing of Serbia comes to mind: If a cause is worth killing for, it has to be worth dying for. The susceptibility of our democracy to various forms of AI-related subversion could lead to a big backlash. I remember the general counsel of Blackberry, a former federal prosecutor, saying that ‘we have yet to have our cyber 9/11.’ When I chaired the GITEX conference in Dubai some years back, we had a huge banner on the stage that said, I think, ‘Our Digital Tomorrow.’ In my closing remarks, I suggested that, unless we get a whole lot more serious about cybersecurity, one big disaster – say, a hacked connected car system that leaves 10,000 dead and 100,000 injured by making a million cars turn left at 8:45 one morning – will give us an Analog Tomorrow instead.”</span></p><p data-dcnode-id="720" style="padding-left: 30px"><strong data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">Richard Lachmann</span></strong><span data-dcnode-id="721" instrument_node="">, professor of political sociology at the State University of New York-Albany, said, “Whatever quantum computing achieves, it will be created by humans who serve particular interests, either for corporations of making profit or for governments of controlling populations. So, humans will be in the loop, but not all humans, most likely just those with money and power. Those people always work to serve their own interests, and so it is unrealistic to expect that the AI systems they create or contract to be created will be ethical. The only hope for ethical AI is if social movements make those demands and keep up the pressure to be able to see what is being created and to impose controls.”</span></p><p data-dcnode-id="716"><strong data-dcnode-id="718"><span data-dcnode-id="719" instrument_node="">The digital minister for a Southeast Asian nation-state</span></strong><span data-dcnode-id="717" instrument_node=""> said, “The problem with programming anything is the programmer. If they are not ethical, their system will not be.”</span></p><p data-dcnode-id="712" style="padding-left: 30px"><strong data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">A professor of government at one of the world’s leading universities</span></strong><span data-dcnode-id="713" instrument_node=""> said, “Ethical efforts will occur in parallel with efforts that are not. The question is not whether quantum computing will assist in building ethical AI but whether it will significantly retard less-favorable developments.”</span></p><p data-dcnode-id="705"><strong data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">A research director for a major university center investigating the impact of digital evolution on humanity</span></strong><span data-dcnode-id="709" instrument_node=""> said, “</span><a data-dcnode-id="707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.computerweekly.com/news/252475371/Stanford-University-finds-that-AI-is-outpacing-Moores-Law"><span data-dcnode-id="708" instrument_node="">Computing power for AI is advancing faster than Moore’s law</span></a><span data-dcnode-id="706" instrument_node="">. There have been recent breakthroughs in quantum computing publicized by Google and other companies. However, although system performance may improve, transparency may not – such systems may become even more complicated, unintelligible and more difficult to regulate.”</span></p><p data-dcnode-id="701" style="padding-left: 30px"><strong data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">Shel Israel</span></strong><span data-dcnode-id="702" instrument_node="">, Forbes columnist and author of many books on disruptive technologies, commented, “Quantum computing does not change the principles of computing. But, in theory, it allows computers to solve problems and perform faster by orders of magnitude. They will be smarter because AI is starting to improve exponentially. Once again, the computing itself will be neither good nor evil. That is up to those who develop, sell and use the technologies. Perhaps gunmakers intend them for defense, but that does not stop thousands and thousands of human deaths and animals being killed just for the fun of it.”</span></p><p data-dcnode-id="697"><strong data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">Andrea Romaoli Garcia</span></strong><span data-dcnode-id="698" instrument_node="">, an international lawyer actively involved with multistakeholder activities of the International Telecommunication Union and Internet Society, said, “Classical computers have limitations, and quantum computers are necessary to allow the ultimate implementations of AI and machine learning. However, ethical regulation and laws are not keeping up with advances in AI and are not ready for the arrival of quantum computing. Quantum’s capability to process huge volumes of data will create a huge profit center for corporations, and this has typically led them to move quickly and not always ethically. It also allows bad actors to operate freely. Ethical AI should be supported by strong regulatory tools that encourage safe technological advancement. If not, we will face new and dangerous cyber threats.”</span></p><p data-dcnode-id="693" style="padding-left: 30px"><strong data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">Maja Vujovic</span></strong><span data-dcnode-id="694" instrument_node="">, a consultant for digital and ICT at Compass Communications, noted, “Quantum computing will prove quite elusive and hard to measure and therefore will progress slowly and painstakingly. Combining two insufficiently understood technologies would not be prudent. Perhaps the right approach would be to couple each with blockchain-based ledgers, as a way to track and decode their black-box activity.”</span></p><p data-dcnode-id="689"><strong data-dcnode-id="691"><span data-dcnode-id="692" instrument_node="">Monica Murero</span></strong><span data-dcnode-id="690" instrument_node="">, director, E-Life International Institute and associate professor in Communication and New Technologies at the University of Naples Federico II, noted, “A quantum computing superpower may somewhat assist in creating ethical artificial intelligence systems that help regulate, evaluate and ‘control’ AI in-out process. But I do not think that a cool technological solution is enough or is the key. In the near future, society will rapidly change thanks to AI and quantum computing. It’s like reorganizing society. We need, as a community, to work together and rewrite the fundamental rules of coexistence that go well beyond ethical considerations. A sort of Rousseau’s new social contract: An AIQC contract. We need the means to enforce the new rules because quantum computing super-power can be extremely attractive for governments and big companies. Think about generating fake news at quantum computing super-power: unacceptable. Now think about quantum computing fighting fake news: pretty cool. My view of quantum computing in the next decade is systemic. Quantum computing can somewhat help an ethical development of AI if we regulate it. I see quantum computing super-power to have the potential of solving (faster) many complex scientific problems – in health care, for example. But I also see this technology being able to break ‘normal’ encryption systems that are currently protecting our society around the world. I also see a developing business to make quantum computing and machine learning run and then sell ‘the antidote’ to protect our systems at a fair price to cure the problem: Quantum-safe cryptography blockchain. It’s like a computer virus and the antivirus business. We truly have to urgently work as a society to regulate our ecosystem and arrive in the next decade by planning in advance rather than by going along with the outcomes.”</span></p><p data-dcnode-id="685" style="padding-left: 30px"><strong data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">A military strategy and technology director</span></strong><span data-dcnode-id="686" instrument_node=""> responded, “Quantum will evolve. The timescale is uncertain, but my gut sense is quantum computing will emerge in a significant way in the early to mid-2030s. How much it will assist in creating AI appears to be dependent on the nature of the AI. Quantum computing may help in complex pattern recognition.”</span></p><p data-dcnode-id="681"><strong data-dcnode-id="683"><span data-dcnode-id="684" instrument_node="">The head of research at a major U.S. wireless communications trade association</span></strong><span data-dcnode-id="682" instrument_node=""> responded, “It is likely that quantum computing will evolve, and that it might be deployed by those hoping to build ethical AI, but that those responsible for implementing the AI systems will either underrate its importance in the nominally neutral systems being deployed by local governments and private-sector institutions or consider it irrelevant or even hostile to the intended uses of the non-neutral monitoring and control systems being developed for use by state and nonstate institutions. Those who may not underrate its importance will not be those with the decision-making power with respect to its implementation. Ethical individuals are essential but will be marginalized by significant decision-makers.”</span></p><p data-dcnode-id="677" style="padding-left: 30px"><strong data-dcnode-id="679"><span data-dcnode-id="680" instrument_node="">An expert in learning technologies and digital life</span></strong><span data-dcnode-id="678" instrument_node=""> wrote, “Many folks, including experts, still don’t know what they think about quantum computing and how to think about quantum computing in relation to AI, much less about the possibilities of its assistance with ethical AI. The theoretical musings on the subject cover the waterfront of exploratory communication among experts and amateur experts. Humans will still be in the loop as AI systems are created and implemented, assuming we don’t create our own destruction device, which we are perfectly capable of doing through ignorance, fatigue, lack of care, existing unethical practice, etc. A crisis can help an evolution unfold because of great need(s), but crisis-driven thinking and feeling are not always rational enough to benefit the changes needed.”</span></p><p data-dcnode-id="670"><strong data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">The chief technology officer for a technology strategies and solutions company</span></strong><span data-dcnode-id="674" instrument_node=""> said, “This isn’t a technical question. It’s about the people charged with research and development. I hope no one has cause to repeat </span><a data-dcnode-id="672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wired.co.uk/article/manhattan-project-robert-oppenheimer"><span data-dcnode-id="673" instrument_node="">Robert Oppenheimer’s thought</span></a><span data-dcnode-id="671" instrument_node=""> after the first atomic bomb exploded.”</span></p><h4 data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">Responses from those who said quantum computing is somewhat unlikely or very unlikely to assist in working toward ethical design of artificial intelligence</span></h4><p data-dcnode-id="664" style="padding-left: 30px"><strong data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">David Karger</span></strong><span data-dcnode-id="665" instrument_node="">, professor at MIT’s Computer Science and Artificial Intelligence Laboratory, said, “Quantum computing is, in public, being used as shorthand for ‘really fast computers.’ But that’s not what it is. Quantum computers are highly specialized devices that are good at very specific tasks such as factoring. There’s a small chance these computers will have a significant impact on cryptography by 2030 (I doubt it), but I see almost no chance that they will improve our ability to solve complex machine-learning problems, much less have any impact on our understanding of knowledge representation or creativity or any of the other key attributes of natural intelligence that we have been trying to understand and emulate in machines for decades. Finally, even if we do somehow create super-fast computers, they still won’t help us with the key challenge in the design of ethical AI, which is to understand ethics. After thousands of years, this is something people are still arguing about. Having faster computers won’t change the arguments one bit.”</span></p><p data-dcnode-id="660"><strong data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">Jim Spohrer</span></strong><span data-dcnode-id="661" instrument_node="">, director of cognitive open technologies and the AI developer ecosystem at IBM, said, “Quantum computing is decades away from being practical. It will be important by 2040.”</span></p><p data-dcnode-id="656" style="padding-left: 30px"><strong data-dcnode-id="658"><span data-dcnode-id="659" instrument_node="">Michael Wollowski</span></strong><span data-dcnode-id="657" instrument_node="">, a professor of computer science at Rose-Hulman Institute of expert in artificial intelligence, said, “Quantum computing is still in its infancy. In 15 or 20 years, yes, we can build real systems. I don’t think we will be able to build usable systems in 10 years. Furthermore, quantum computing is still a computational system. It is the software or in case of statistical machine learning, the data that makes a system ethical or not.”</span></p><p data-dcnode-id="652"><strong data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">Sam S. Adams</span></strong><span data-dcnode-id="653" instrument_node="">, a 24-year veteran of IBM now working as a senior research scientist in artificial intelligence for RTI International, “Quantum computing, if and when it becomes a commercially scalable reality, will basically allow AI systems to consider vast high-dimensional alternatives at near-instantaneous speed. This will allow not only playing hyper-dimensional chess in real-time but consider the impact o
