lop products not in the interest of such citizens (surveillance, population control, predictive policing, etc.). AI will also be developed to implement differential pricing/offers further enlarging the ‘digital divide’ AI will be used by both governments and corporations to take nontransparent, nonaccountable decisions regarding citizens AI will be treated as a ‘black box,’ with citizens having little – if any – understanding of how they function, on what basis they make decisions, etc.”</span></p><p data-dcnode-id="1423" style="padding-left: 30px"><strong data-dcnode-id="1425"><span data-dcnode-id="1426" instrument_node="">Wendell Wallach</span></strong><span data-dcnode-id="1424" instrument_node="">, ethicist and scholar at Yale University’s Interdisciplinary Center for Bioethics, responded, “While I applaud the proliferation of ethical principles, I remain concerned about the ability of countries to put meat on the bone. Broad principles do not easily translate into normative actions, and governments will have difficulty enacting strong regulations.</span></p><p data-dcnode-id="1421" style="padding-left: 30px"><span data-dcnode-id="1422" instrument_node="">“Those that do take the lead in regulating digital technologies, such as the EU, will be criticized for slowing innovation, and this will remain a justification for governments and corporations to slow putting in place any strong regulations backed by enforcement. So far, ethics whitewashing is the prevailing approach among the corporate elite. While there are signs of a possible shift in this posture, I remain skeptical while hopeful.”</span></p><p data-dcnode-id="1417"><strong data-dcnode-id="1419"><span data-dcnode-id="1420" instrument_node="">Pamela McCorduck</span></strong><span data-dcnode-id="1418" instrument_node="">, writer, consultant and author of several books, including “Machines Who Think,” wrote, “Many efforts are underway worldwide to define ethical AI, suggesting that this is already considered a grave problem worthy of intense study and legal remedy. Eventually, a set of principles and precepts will come to define ethical AI, and I think they will define the preponderance of AI applications. But you can be assured that unethical AI will exist, be practiced and sometimes go unrecognized until serious damage is done.</span></p><p data-dcnode-id="1415"><span data-dcnode-id="1416" instrument_node="">“Much of the conflict between ethical and unethical applications is cultural. In the U.S. we would find the kind of social surveillance practiced in China to be not only repugnant – but illegal. It forms the heart of Chinese practices. In the short term, only the unwillingness of Western courts to accept evidence gathered this way (as inadmissible) will protect Western citizens from this kind of thing, including the ‘social scores’ the Chinese government assigns to its citizens as a consequence of what surveillance turns up. I sense more everyday people will invest social capital in their interactions with AIs, out of loneliness or for other reasons. This is unwelcome to me, but then I have a wide social circle. Not everybody does, and I want to resist judgment here.”</span></p><p data-dcnode-id="1411" style="padding-left: 30px"><strong data-dcnode-id="1413"><span data-dcnode-id="1414" instrument_node="">An architect of practice specializing in AI for a major global technology company</span></strong><span data-dcnode-id="1412" instrument_node=""> said, “The European Union has the most concrete proposals, and I believe we will see their legislation in place within three years. My hope is that we will see a ripple effect in the U.S. like we did from GDPR – global companies had to comply with GDPR, so some good actions happened in the U.S. as a result. … We may be more likely to see a continuation of individual cities and states imposing their own application-specific laws (e.g., facial-recognition technology limits in Oakland, Boston, etc.). The reasons I am doubtful that the majority of AI apps will be ethical/benefit the social good are:</span></p><ul data-dcnode-id="1404"><li data-dcnode-id="1409"><span data-dcnode-id="1410" instrument_node="">Even the EU’s proposals are limited in what they will require;</span></li><li data-dcnode-id="1407"><span data-dcnode-id="1408" instrument_node="">China will never limit AI for social benefit over the government’s benefit;</span></li><li data-dcnode-id="1405"><span data-dcnode-id="1406" instrument_node="">The ability to create a collection of oversight organizations with the budget to audit and truly punish offenders is unlikely.</span></li></ul><p data-dcnode-id="1402" style="padding-left: 30px"><span data-dcnode-id="1403" instrument_node="">“I look at the Food and Drug Administration or NTSB [National Transportation Safety Board] and see how those organizations got too cozy with the companies they were supposed to regulate and see their failures. These organizations are regulating products much less complex than AI, so I have little faith the U.S. government will be up to the task. Again, maybe the EU will be better.”</span></p><p data-dcnode-id="1398"><strong data-dcnode-id="1400"><span data-dcnode-id="1401" instrument_node="">A researcher in bioinformatics and computational biology</span></strong><span data-dcnode-id="1399" instrument_node=""> observed, “Take into account the actions of the CCP [Chinese Communist Party] in China. They have been leading the way recently in demonstrating how these tools can be used in unethical ways. And the United States has failed to make strong commitments to ethics in AI, unlike EU nations. AI and the ethics surrounding its use could be one of the major ideological platforms for the incoming next Cold War. I am most concerned about the use of AI to further invade privacy and erode trust in institutions.</span></p><p data-dcnode-id="1396"><span data-dcnode-id="1397" instrument_node="">“I also worry about its use to shape policy in nontransparent, noninterpretable and nonreproducible ways. There is also the risk that some of the large datasets that are the fundamental to a lot of decision-making – from facial recognition, to criminal sentencing, to loan applications – being conducted using AI that are critically biased and will continue to produce biased outcomes if they are used without undergoing severe audits – issues with transparency compound these problems. Advances to medical treatment using AI run the risk of not being fairly distributed as well.”</span></p><p data-dcnode-id="1392" style="padding-left: 30px"><strong data-dcnode-id="1394"><span data-dcnode-id="1395" instrument_node="">Sam Lehman-Wilzig</span></strong><span data-dcnode-id="1393" instrument_node="">, professor and former chair of communication at Bar-Ilan University, Israel, said, “I am optimistic because the issue is now on the national agenda – scientific, academic and even political/legislative. I want to believe that scientists and engineers are somewhat more open to ‘ethical’ considerations than the usual ‘businesspeople.’ The major concern is what other (nondemocratic) countries might be doing – and whether we should be involved in such an ‘arms race,’ e.g., AI-automated weaponry. Thus, I foresee a move to international treaties dealing with the most worrisome aspects of ‘AI ethics.’”</span></p><p data-dcnode-id="1388"><strong data-dcnode-id="1390"><span data-dcnode-id="1391" instrument_node="">An economist who works in government</span></strong><span data-dcnode-id="1389" instrument_node=""> responded, “Ethical principles will be developed and applied in democratic countries by 2030, focusing on the public good, global competition and cyber breaches. Other less-democratic countries will be focused more on cyberbreaches and global competition. Nongovernmental entities such as private companies will presumably concentrate on innovation and other competitive responses. AI will have a considerable impact on people, especially regarding their jobs and also regarding their ability to impact the functions controlled by AI. This control and the impact of cybercrimes will be of great concern, and innovation will intrigue.”</span></p><p data-dcnode-id="1384" style="padding-left: 30px"><strong data-dcnode-id="1386"><span data-dcnode-id="1387" instrument_node="">Ian Peter</span></strong><span data-dcnode-id="1385" instrument_node="">, a pioneering internet rights activist, said, “The biggest threats we face are weaponisation of AI and development of AI being restricted within geopolitical alliances. We are already seeing the beginnings of this in actions taken to restrict activities of companies because they are seen to be threatening (e.g., Huawei). More and more developments in this field are being controlled by national interests or trade wars rather than ethical development, and much of the promise which could arise from AI utilisation may not be realised. Ethics is taking a second-row seat behind trade and geopolitical interests.”</span></p><p data-dcnode-id="1380"><strong data-dcnode-id="1382"><span data-dcnode-id="1383" instrument_node="">Jannick Pedersen</span></strong><span data-dcnode-id="1381" instrument_node="">, a co-founder, CEO and futurist based in Europe, commented, “AI is the next arms race. Though mainstream AI applications will include ethical considerations, a large amount of AI will be made for profit and be applied in business systems, not visible to the users.”</span></p><p data-dcnode-id="1376" style="padding-left: 30px"><strong data-dcnode-id="1378"><span data-dcnode-id="1379" instrument_node="">Marita Prandoni</span></strong><span data-dcnode-id="1377" instrument_node="">, linguist, freelance writer, editor, translator and research associate with the Shape of History group, predicted, “Ethical uses of AI will dominate, but it will be a constant struggle against disruptive bots and international efforts to undermine nations. Algorithms have proven to magnify bias and engender injustice, so reliance on them for distracting, persuading or manipulating opinion is wrong. What excites me is that advertisers are rejecting platforms that allow for biased and dangerous hate speech and that increasingly there are economic drivers (i.e., corporate powers) that take the side of social justice.”</span></p><p data-dcnode-id="1372"><strong data-dcnode-id="1374"><span data-dcnode-id="1375" instrument_node="">Gus Hosein</span></strong><span data-dcnode-id="1373" instrument_node="">, executive director of Privacy International, observed, “Unless AI becomes a competition problem and gets dominated by huge American and Chinese companies, then the chances of ethical AI are low, which is a horrible reality. If it becomes widespread in deployment, as we’ve seen with facial recognition, then the only way to stem its deployment in unethical ways is to come up with clear bans and forced transparency. This is why AI is so challenging. Equally, it’s quite pointless, but that won’t stop us from trying to deploy it everywhere.</span></p><p data-dcnode-id="1370"><span data-dcnode-id="1371" instrument_node="">“The underlying data quality and societal issues mean that AI will just punish people in new, different and the same ways. If we continue to be obsessed with innovators and innovation rather than social infrastructure, then we are screwed.”</span></p><h1 data-dcnode-id="1368"><span data-dcnode-id="1369" instrument_node="">2. Hopes about developments in ethical AI</span></h1><p data-dcnode-id="1366"><span data-dcnode-id="1367" instrument_node="">Early developments in AI have been of overwhelmingly great importance and value to society. Most of the experts responding to this canvassing – both the pessimists and the optimists – expect that it will continue to provide clear benefits to humanity. Those who are hopeful argue that its advance will naturally include mitigating activities, noting that these problems are too big to ignore. They said society will begin to better-anticipate potential harms and act to mute them. Among the commonly expressed points:</span></p><p data-dcnode-id="1364" style="padding-left: 30px"><span data-dcnode-id="1365" instrument_node="">– Historically, ethics have evolved as new technologies mature and become embedded in cultures; as problems arise so do adjustments.</span></p><p data-dcnode-id="1362" style="padding-left: 30px"><span data-dcnode-id="1363" instrument_node="">– Fixes are likely to roll out in different ways along different timelines in different domains.</span></p><p data-dcnode-id="1360" style="padding-left: 30px"><span data-dcnode-id="1361" instrument_node="">– Expert panels concerned about ethical AI are being convened in many settings across the globe.</span></p><p data-dcnode-id="1358" style="padding-left: 30px"><span data-dcnode-id="1359" instrument_node="">– Social upheavals arising due to AI problems are a force that may drive it closer to the top of human agendas.</span></p><p data-dcnode-id="1356" style="padding-left: 30px"><span data-dcnode-id="1357" instrument_node="">– Political and judicial systems will be asked to keep abuses in check, and evolving case law will emerge (some experts are concerned this could be a net negative).</span></p><p data-dcnode-id="1354" style="padding-left: 30px"><span data-dcnode-id="1355" instrument_node="">– AI itself can be used to assess AI impacts and hunt down unethical applications.</span></p><p data-dcnode-id="1352" style="padding-left: 30px"><span data-dcnode-id="1353" instrument_node="">– A new generation of technologists whose training has been steeped with ethical thinking will lead the movement toward design that values people and positive progress above profit and power motives and the public will become wiser about the downsides of being code-dependent.</span></p><p data-dcnode-id="1350"><span data-dcnode-id="1351" instrument_node="">This section includes hopeful comments about the potential development of ethical AI.</span></p><h2 data-dcnode-id="1348"><span data-dcnode-id="1349" instrument_node="">AI advances are inevitable; we will work on fostering ethical AI design</span></h2><p data-dcnode-id="1346"><span data-dcnode-id="1347" instrument_node="">A number of these expert respondents noted breakthroughs that have already occurred in AI and said they imagine a future in which even more applications emerge to help solve problems and make people’s lives easier and safer. They expect that AI design will evolve positively as these tools continue to influence the majority of human lives in mostly positive ways.</span></p><p data-dcnode-id="1344"><span data-dcnode-id="1345" instrument_node="">They especially focused on the likelihood that there will be more medical and scientific breakthroughs that help people live healthier and more productive lives, and they noted that there will be increasing efficiency in AI quickly mastering most tasks. They said AI tools are simply better than humans at pattern-recognition and crunching massive amounts of data. Some said they expect AI will expand positively to augment humans, working in sync as their ally.</span></p><p data-dcnode-id="1340"><strong data-dcnode-id="1342"><span data-dcnode-id="1343" instrument_node="">Benjamin Grosof</span></strong><span data-dcnode-id="1341" instrument_node="">, chief scientist at Kyndi, a Silicon Valley start-up aimed at the reasoning and knowledge representation side of AI, wrote, “Some things that give me hope are the following: Most AI technical researchers (as distinguished from business or government deployers of AI) care quite a lot about ethicality of AI. It has tremendous potential to improve productivity economically and to save people effort even when money is not flowing directly by better automating decisions and information analysis/supply in a broad range of work processes. Conversational assistants and question-answering, smarter-workflow and manufacturing robots are some examples where I foresee AI applications making a positive difference in the lives of most people, either indirectly or directly. I am excited by the fact that many national governments are increasing funding for scientific research in AI. I am concerned that so much of that is directed toward military purposes or controlled by military branches of governments.”</span></p><p data-dcnode-id="1336" style="padding-left: 30px"><strong data-dcnode-id="1338"><span data-dcnode-id="1339" instrument_node="">Perry Hewitt</span></strong><span data-dcnode-id="1337" instrument_node="">, chief marketing officer at data.org, responded, “I am hopeful that ‘ethical AI’ will extend beyond the lexicon to the code by 2030. The awareness of the risks gives me the most hope. For example, for centuries we have put white men in judicial robes and trusted them to make the right decisions and pretended that biases, proximity to lunchtime and the case immediately preceding had no effect on the outcome. Scale those decisions with AI and the flaws emerge. And when these flaws are visible, effective regulation can begin. This is the decade of narrow AI – specific applications that will affect everything from the jobs you are shown on LinkedIn to the new sneakers advertised to you on Instagram. Clearly, the former makes more of a difference than the latter for your economic well-being, but in all cases, lives are changed by AI under the hood. Transparency around the use of AI will make a difference as will effective regulation.”</span></p><p data-dcnode-id="1332"><strong data-dcnode-id="1334"><span data-dcnode-id="1335" instrument_node="">Donald A. Hicks</span></strong><span data-dcnode-id="1333" instrument_node="">, a professor of public policy and political economy at the University of Dallas whose research specialty is technological innovation, observed, “AI/automation technologies do not assert themselves. They are always invited in by investors, adopters and implementers. They require investments to be made by someone, and those investments are organized around the benefits of costs cut or reduced and/or possibilities for new revenue flows. New technologies that cannot offer those prospects remain on the shelf. So, inevitably, new technologies like AI only proliferate if they are ‘pulled’ into use. This gives great power to users and leads to applications that look to be beneficial to a widening user base. This whole process ‘tilts’ toward long-term ethical usage. I know of no technology that endured while delivering unwanted/unfair outcomes broadly. Consider our nation’s history with slavery. Gradually and inevitably, as the agricultural economies of Southern states became industrialized, it no longer made sense to use slaves. It was not necessary to change men’s hearts before slavery could be abandoned. Economic outcomes mattered more, although eventually hearts did follow.</span></p><p data-dcnode-id="1330"><span data-dcnode-id="1331" instrument_node="">“But again, the transitions between old and new do engender displacements via turnover and replacement, and certain people and places can feel – and are – harmed by such technology-driven changes. But their children are likely thankful that their lives are not simply linear extensions of the lives of their parents. To date, AI and automation have had their greatest impacts in augmenting the capabilities of humans, not supplanting them. The more sophisticated AI applications and automation become, the more we appreciate the special capabilities in human beings that are of ultimate value and that are not likely to be captured by even the most sophisticated software programs. I’m bullish on where all of this is leading us because I’m old enough to compare today with yesterday.”</span></p><p data-dcnode-id="1326" style="padding-left: 30px"><strong data-dcnode-id="1328"><span data-dcnode-id="1329" instrument_node="">Jim Spohrer</span></strong><span data-dcnode-id="1327" instrument_node="">, director of cognitive open technologies and the AI developer ecosystem at IBM, noted, “The Linux Foundation Artificial Intelligence Trusted AI Committee is working on this. The members of that community are taking steps to put principles in place and collect examples of industry use cases. The contribution into Linux Foundation AI (by major technology companies) of the open-source project code for Trusted AI for AI-Fairness, AI-Robustness and AI-Explainability on which their products are based is a very positive sign.”</span></p><p data-dcnode-id="1322"><strong data-dcnode-id="1324"><span data-dcnode-id="1325" instrument_node="">Michael Wollowski</span></strong><span data-dcnode-id="1323" instrument_node="">, a professor of computer science at Rose-Hulman Institute of Technology and expert in artificial intelligence, said, “It would be unethical to develop systems that do not abide by ethical codes, if we can develop those systems to be ethical. Europe will insist that systems will abide by ethical codes. Since Europe is a big market, since developing systems that abide by ethical code is not a trivial endeavor and since the big tech companies (except for Facebook) by and large want to do good (well, their employees by and large want to work for companies that do good), they will develop their systems in a way that they abide by ethical codes. I very much doubt that the big tech companies are interested (or are able to find young guns) in maintaining an unethical version of their systems.</span></p><p data-dcnode-id="1320"><span data-dcnode-id="1321" instrument_node="">“AI systems, in concert with continued automation, including the Internet of Things, will bring many conveniences. Think along the lines of personal assistants [who] manage various aspects of people’s lives. Up until COVID-19, I would have been concerned about bad actors using AI to do harm. I am sure that right now bad actors are probably hiring virologists to develop viruses with which they can hold the world hostage. I am very serious that rogue leaders are thinking about this possibility. The AI community in the U.S. is working very hard to establish a few large research labs. This is exciting, as it enables the AI community to develop and test systems at scale. Many good things will come out of those initiatives. Finally, let us not forget that AI systems are engineered systems. They can do many interesting things, but they cannot think or understand. While they can be used to automate many things and while people by and large are creatures of habit, it is my fond hope that we will rediscover what it means to be human.”</span></p><p data-dcnode-id="1316" style="padding-left: 30px"><strong data-dcnode-id="1318"><span data-dcnode-id="1319" instrument_node="">Paul Epping</span></strong><span data-dcnode-id="1317" instrument_node="">, chairman and co-founder of XponentialEQ and well-known keynote speaker on exponential change, wrote, “The power of AI and machine learning (and deep learning) is underestimated. The speed of advancements is incredible and will lead to automating of virtually all processes (blue- and white-collar jobs). In health care: Early detection of diseases, fully AI-driven triage, including info from sensors (on or inside your body), leading to personalised health (note: not personalised medicine). AI will help to compose the right medication for you – and not the generic stuff that we get today, surpassing what the pharmaceutical industry is doing. AI is helping to solve the world’s biggest problems, finding new materials, running simulations, digital twins (including personal digital twins that can be used to run experiments in case of treatments). My biggest concern: How are we going to solve the control problem? (Read Stuart Russell’s ‘Human Compatible’) and follow the Future of Life Institute and the problem of biased data and algorithms.)”</span></p><p data-dcnode-id="1312"><strong data-dcnode-id="1314"><span data-dcnode-id="1315" instrument_node="">Adel Elmaghraby</span></strong><span data-dcnode-id="1313" instrument_node="">, a leader in IEEE and professor and former chairman of the Computer Engineering and Computer Science Department at the University of Louisville, responded, “Societal pressure will be a positive influence for adoption of ethical and transparent approaches to AI. However, the uncomfortable greed for political and financial benefit will need to be reined in.”</span></p><p data-dcnode-id="1307" style="padding-left: 30px"><strong data-dcnode-id="1309"><img alt="" class="alignright wp-image-46655" data-dcnode-id="1311" height="259" sizes="(max-width: 460px) 100vw, 460px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.elon.edu/u/imagining/wp-content/uploads/sites/964/2021/06/2021-Greg-Shannon-The-Future-of-Ethical-AI-Design36.jpg&amp;raw" srcset="https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Greg-Shannon-The-Future-of-Ethical-AI-Design36.jpg 2500w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Greg-Shannon-The-Future-of-Ethical-AI-Design36-300x169.jpg 300w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Greg-Shannon-The-Future-of-Ethical-AI-Design36-768x432.jpg 768w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Greg-Shannon-The-Future-of-Ethical-AI-Design36-1024x576.jpg 1024w" width="460"><span data-dcnode-id="1310" instrument_node="">Gregory Shannon</span></strong><span data-dcnode-id="1308" instrument_node="">, chief scientist at the CERT software engineering institute at Carnegie Mellon University, said, “There will be lots of unethical applications as AI matures as an engineering discipline. I expect that to improve. Just like there are unethical uses of technology today, there will be for AI. AI provides transformative levels of efficiency for digesting information and making pretty good decisions. And some will certainly exploit that in unethical ways. However, the ‘demand’ from the market (most of the world’s population) will be for ethical AI products and services. It will be bumpy, and in 2030 we might be halfway there. The use of AI by totalitarian and authoritarian governments is a clear concern. But I don’t expect the use of such tech to overcome the yearning of populations for agency in their lives, at least after a few decades of such repression. Unethical systems/solutions are not trustworthy. So, they can only have narrow application. Ethical systems/solutions will be more widely adopted, eventually.”</span></p><p data-dcnode-id="1303"><strong data-dcnode-id="1305"><span data-dcnode-id="1306" instrument_node="">Robert D. Atkinson</span></strong><span data-dcnode-id="1304" instrument_node="">, president of the Information Technology and Innovation Foundation, wrote, “The real question is not whether all AI developers sign up to some code of principles, but rather whether most AI applications work in ways that society expects them to, and the answer to that question is almost 100% ‘yes.’”</span></p><p data-dcnode-id="1298" style="padding-left: 30px"><strong data-dcnode-id="1300"><img alt="" class="alignright wp-image-46659" data-dcnode-id="1302" height="259" sizes="(max-width: 460px) 100vw, 460px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.elon.edu/u/imagining/wp-content/uploads/sites/964/2021/06/2021-Ben-Shneiderman-The-Future-of-Ethical-AI-Design2-1.jpg&amp;raw" srcset="https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Ben-Shneiderman-The-Future-of-Ethical-AI-Design2-1.jpg 2500w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Ben-Shneiderman-The-Future-of-Ethical-AI-Design2-1-300x169.jpg 300w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Ben-Shneiderman-The-Future-of-Ethical-AI-Design2-1-768x432.jpg 768w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Ben-Shneiderman-The-Future-of-Ethical-AI-Design2-1-1024x576.jpg 1024w" width="460"><span data-dcnode-id="1301" instrument_node="">Ben Shneiderman</span></strong><span data-dcnode-id="1299" instrument_node="">, distinguished professor of computer science and founder of the Human-Computer Interaction Lab at the University of Maryland, commented, “While technology raises many serious problems, efforts to limit malicious actors should eventually succeed and make these technologies safer. The huge interest in ethical principles for AI and other technologies is beginning to shift attention toward practical steps that will produce positive change. Already the language of responsible and human-centered AI is changing the technology, guiding students in new ways and reframing the work of researchers. … I foresee improved appliance-like and tele-operated devices with highly automated systems that are reliable, safe and trustworthy. Shoshanna Zuboff’s analysis in her book ‘Surveillance Capitalism’ describes the dangers and also raises awareness enough to promote some changes. I believe the arrival of independent oversight methods will help in many cases. Facebook’s current semi-independent oversight board is a small step forward, but changing Facebook’s culture and Zuckerberg’s attitudes is a high priority to ensuring better outcomes. True change will come when corporate business choices are designed to limit the activity of malicious actors – criminals, political operatives, hate groups and terrorists – while increasing user privacy.”</span></p><p data-dcnode-id="1294"><strong data-dcnode-id="1296"><span data-dcnode-id="1297" instrument_node="">Carol Smith</span></strong><span data-dcnode-id="1295" instrument_node="">, a senior research scientist in human–machine interaction at Carnegie Mellon University’s Software Engineering Institute, said, “There are still many lessons to be learned with regard to AI and very little in the way of regulation to support human rights and safety. I’m hopeful that the current conversations about AI ethics are being heard, and that, as we see tremendous misuse and abuse of these systems, the next generation will be much more concerned about ethical implications. I’m concerned that many people, organizations and governments see only monetary gain from unethical applications of these technologies and will continue to misuse and abuse data and AI systems for as long as they can. AI systems short-term will continue to replace humans in dull, dirty, dangerous and dear work. This is good for overall safety and quality of life but is bad for family livelihoods. We need to invest in making sure that people can continue to contribute to society when their jobs are replaced. Longer-term, these systems will begin to make many people more efficient and effective at their jobs. I see AI systems improving nearly every industry and area of our lives when used properly. Humans must be kept in the loop with regard to decisions involving people’s lives, quality of life, health and reputation, and humans must be ultimately responsible for all AI decisions and recommendations (not the AI system).”</span></p><p data-dcnode-id="1290" style="padding-left: 30px"><strong data-dcnode-id="1292"><span data-dcnode-id="1293" instrument_node="">Marvin Borisch</span></strong><span data-dcnode-id="1291" instrument_node="">, chief technology officer at RED Eagle Digital based in Berlin, wrote, “When used for the greater good, AI can and will help us fight a lot of human problems in the next decade. Prediagnostics, fair ratings for insurance or similar, supporting humans in space and other exploration and giving us theoretical solutions for economic and ecological problems – these are just a few examples of how AI is already helping us and can and will help us in the future. If we focus on solving specific human problems or using AI as a support for human work instead of replacing human work, I am sure that we can and will tackle any problem. What worries me the most is that AI developers are trying to trump each other – not for the better use but for the most medial outcome in order to impress stakeholders and potential investors.”</span></p><p data-dcnode-id="1286"><strong data-dcnode-id="1288"><span data-dcnode-id="1289" instrument_node="">Tim Bray</span></strong><span data-dcnode-id="1287" instrument_node="">, well-known technology leader who has worked for Amazon, Google and Sun Microsystems, predicted, “Unethical AI-driven behavior will produce sufficiently painful effects that legal and regulatory frameworks will be imposed that make its production and deployment unacceptable.”</span></p><p data-dcnode-id="1282" style="padding-left: 30px"><strong data-dcnode-id="1284"><span data-dcnode-id="1285" instrument_node="">Gary M. Grossman</span></strong><span data-dcnode-id="1283" instrument_node="">, associate director in the School for the Future of Innovation in Society at Arizona State University, responded, “AI will be used in both ethical and questionable ways in the next decade. Such is the nature of the beast, and we, the beasts that will make the ethical choices. I do not think policy alone will be sufficient to ensure ethical choices to be made every time. Like everything else, it will stabilize in some type of compromised structure within the decade time frame the question anticipates.”</span></p><p data-dcnode-id="1278"><strong data-dcnode-id="1280"><span data-dcnode-id="1281" instrument_node="">Erhardt Graeff</span></strong><span data-dcnode-id="1279" instrument_node="">, a researcher expert in the design and use of digital technologies for civic and political engagement, noted, “Ethical AI is boring directly into the heart of the machine-learning community and, most importantly, influencing how it is taught in the academy. By 2030, we will have a generation of AI professionals that will see ethics as inseparable from their technical work. Companies wishing to hire these professionals will need to have clear ethical practices built into their engineering divisions and strong accountability to the public good at the top of their org charts. This will certainly describe the situation at the major software companies like Alphabet, Apple, Facebook, Microsoft and Salesforce, whose products are used on a massive scale. Hopefully, smaller companies and those that don’t draw the same level of scrutiny from regulators and private citizens will adopt similar practices and join ethical AI consortia and find themselves staffed with upstanding technologists. One application of AI that will touch nearly all sectors and working people is in human resources and payroll technology. I expect we will see new regulation and scrutiny of those tools and the major vendors that provide them.</span></p><p data-dcnode-id="1276"><span data-dcnode-id="1277" instrument_node="">“I caveat my hopes for ethical AI with three ways unethical AI will persist.</span></p><p data-dcnode-id="1274"><span data-dcnode-id="1275" instrument_node="">1) There will continue to be a market for unethical AI, especially the growing desire for surveillance tools from governments, corporations and powerful individuals.</span></p><p data-dcnode-id="1272"><span data-dcnode-id="1273" instrument_node="">2) The democratization of machine learning as APIs, simple libraries and embedded products will allow many people who have not learned to apply this technology in careful ways to build problematic tools and perform bad data analysis for limited, but meaningful distributions that will be hard to hold to account.</span></p><p data-dcnode-id="1270"><span data-dcnode-id="1271" instrument_node="">3) A patchwork of regulations across national and international jurisdictions and fights over ethical AI standards will undermine attempts to independently regulate technology companies and their code through auditing and clear mechanisms for accountability.”</span></p><p data-dcnode-id="1266" style="padding-left: 30px"><strong data-dcnode-id="1268"><span data-dcnode-id="1269" instrument_node="">Katie McAuliffe</span></strong><span data-dcnode-id="1267" instrument_node="">, executive director for Digital Liberty, wrote, “There are going to be mistakes in AI, even when companies and coders try their best. We need to be patient with the mistakes, find them and adjust. We need to accept that some mistakes don’t equal failure in the entire system. No, AI will not be used in mostly questionable ways. We are using forms of AI every day already. The thing about AI is that, once it works, we call it something else. With a new name, it’s not as amorphous and threatening. AI and machine learning will benefit us the most in the health context – being able to examine thousands of possibilities and variables in a few seconds, but human professionals will always have to examine the data and context to apply any results. We need to be sure that something like insurance doesn’t affect a doctor or researcher’s readout in these contexts.”</span></p><p data-dcnode-id="1262"><strong data-dcnode-id="1264"><span data-dcnode-id="1265" instrument_node="">Su Sonia Herring</span></strong><span data-dcnode-id="1263" instrument_node="">, a Turkish-American internet policy researcher with Global Internet Policy Digital watch, said, “AI will be used in questionable ways due to companies and governments putting profit and control in front of ethical principles and the public good. Civil society, researchers and institutions who are concerned about human rights give me hope. Algorithmic black boxes, digital divide, the need to control, surveil and profit off masses worry me the most. I see AI applications making a difference in people’s lives in taking care of making mundane, time-consuming work (while making certain jobs obsolete), helping identify trends and informing public policy. Issues related to privacy, security and accountability and transparency related to AI tech concerns me, while the potential of processing big data to solve global issues excites me.”</span></p><p data-dcnode-id="1258" style="padding-left: 30px"><strong data-dcnode-id="1260"><span data-dcnode-id="1261" instrument_node="">Edson Prestes</span></strong><span data-dcnode-id="1259" instrument_node="">, a professor of computer science at Federal University of Rio Grande do Sul, Brazil, commented, “By 2030, technology in general will be developed taking into account ethical considerations. We are witnessing a huge movement these days. Most people who have access to information are worried about the misuse of technology and its impact on their own lives. Campaigns to ban lethal weapons powered by AI are growing. Discussions on the role of technology and its impact on jobs are also growing. People are becoming more aware about fake news and proliferation of hate speech. All these efforts are creating a massive channel of information and awareness. Some communities will be left behind, either because some governments want to keep their citizens in poverty and consequently keep them under control, or because they do not have enough infrastructure and human and institutional capacities to reap the benefits of the technological domain. In these cases, efforts led by the United Nations are extremely valuable. The UN Secretary-General António Guterres is a visionary in establishing the High-Level Panel on Digital Cooperation. Guterres used the panel’s recommendations to create a roadmap with concrete actions that address the digital domain in a holistic way, engaging a wide group of organisations to deal with the consequences emerging from the digital domain.”</span></p><p data-dcnode-id="1254"><strong data-dcnode-id="1256"><span data-dcnode-id="1257" instrument_node="">James Blodgett</span></strong><span data-dcnode-id="1255" instrument_node="">, futurist, author and consultant, said, “‘Focused primarily on the public good’ is not enough if the exception is a paperclip maximizer. ‘Paperclip maximizer’ is an improbable metaphor, but it makes the point that one big mistake can be enough. We can’t refuse to do anything – because not to decide is also a decision. The best we can do is to think carefully, pick what seems to be the best plan and execute, perhaps damning [the] torpedoes as part of that execution. But we had better think very carefully and be very careful.”</span></p><p data-dcnode-id="1250" style="padding-left: 30px"><strong data-dcnode-id="1252"><span data-dcnode-id="1253" instrument_node="">A futurist and managing principal for a consultancy</span></strong><span data-dcnode-id="1251" instrument_node=""> commented, “AI offers extremely beneficial opportunities, but only if we actively address the ethical principles and regulate and work toward:</span></p><p data-dcnode-id="1248" style="padding-left: 60px"><span data-dcnode-id="1249" instrument_node="">1) Demographically balanced human genome databases,</span></p><p data-dcnode-id="1246" style="padding-left: 60px"><span data-dcnode-id="1247" instrument_node="">2) Gender-balanced human genome databases (especially in the area of clinical drug trials where women are severely under tested),</span></p><p data-dcnode-id="1244" style="padding-left: 60px"><span data-dcnode-id="1245" instrument_node="">3) Real rules around the impact of algorithms and machine learning developed by poor data collection of availability. We see this in the use of facial recognition, police data, education data, Western bias in humanities collections, etc.</span></p><p data-dcnode-id="1242" style="padding-left: 30px"><span data-dcnode-id="1243" instrument_node="">“AI also has the potential to once again be a job killer but also assist the practice medicine, law enforcement, etc. It can also be a job creator, but countries outside the U.S. are making greater progress on building AI hubs.”</span></p><p data-dcnode-id="1238"><strong data-dcnode-id="1240"><span data-dcnode-id="1241" instrument_node="">A European business leader</span></strong><span data-dcnode-id="1239" instrument_node=""> argued, “I do believe AI systems will be governed by ethics, but they will be equal parts new legislation and litigation avoidance. If your AI rejects my insurance claim, I can sue to find out why and ensure your learning model wasn’t built on, say, racially biased source data.”</span></p><p data-dcnode-id="1234" style="padding-left: 30px"><strong data-dcnode-id="1236"><span data-dcnode-id="1237" instrument_node="">Christina J. Colclough</span></strong><span data-dcnode-id="1235" instrument_node="">, an expert on the future of work and the politics of technology and ethics in AI, observed, “By 2030, governments will have woken up to the huge challenges AI (semi/autonomous systems, machine learning, predictive analytics, etc.) pose to democracy, legal compliance and our human and fundamental rights. What is necessary is that these ‘ethical principles’ are enforceable and governed. Otherwise, they risk being good intentions with little effect.”</span></p><p data-dcnode-id="1230"><strong data-dcnode-id="1232"><span data-dcnode-id="1233" instrument_node="">Thomas Birkland</span></strong><span data-dcnode-id="1231" instrument_node="">, professor of public and international affairs at North Carolina State University, wrote, “AI will be informed by ethical considerations in the coming years because the stakes for companies and organizations making investments in AI are too high. However, I am not sure that these ethical considerations are going to be evenly applied, and I am not sure how carefully these ethical precepts will be adopted. What gives me the most hope is the widespread discussions that are already occurring about ethics in AI – no one will be caught by surprise by the need for an ethical approach to AI. What worries me the most is that the benefits of such systems are likely to flow to the wealthy and powerful. For example, we know that facial-recognition software, which is often grounded in AI, has severe accuracy problems in recognizing ‘nonwhite’ faces. This is a significant problem. AI systems may be able to increase productivity and accuracy in systems that require significant human intervention. I am somewhat familiar with AI systems that, for example, can read x-rays and other scans to look for signs of disease that may not be immediately spotted by a physician or radiologist. AI can also aid in pattern recognition in large sets of social data. For example, AI systems may aid researchers in coding data relating to the correlates of health. What worries me is the uncritical use of AI systems without human intervention. There has been some talk, for example, of AI applications to warfare – do we leave weapons targeting decisions to AI? This is a simplistic example, but it illustrates the problem of ensuring that AI systems do not replace humans as the ultimate decision-maker, particularly in areas where there are ethical considerations. All this being said, the deployment of AI is going to be more evolutionary than revolutionary, and that the effects on our daily lives will be subtle and incremental over time.”</span></p><p data-dcnode-id="1226" style="padding-left: 30px"><strong data-dcnode-id="1228"><span data-dcnode-id="1229" instrument_node="">Jerome C. Glenn</span></strong><span data-dcnode-id="1227" instrument_node="">, co-founder and CEO of the futures-research organization The Millennium Project, wrote, “There were few discussions about the ethical issues in the early spread of the internet in the 1970s and 1980s. Now there are far, far more discussions about AI around the world. However, most do not make clear distinctions among narrow, general and super AI. If we don’t get our standards right in the transition from artificial narrow intelligence to artificial general intelligence, then the emergence of super from general could have the consequences science fiction has warned about.”</span></p><p data-dcnode-id="1221"><strong data-dcnode-id="1223"><img alt="" class="alignright wp-image-46663" data-dcnode-id="1225" height="259" sizes="(max-width: 460px) 100vw, 460px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.elon.edu/u/imagining/wp-content/uploads/sites/964/2021/06/2021-Ben-Kuipers-The-Future-of-Ethical-AI-Design4.jpg&amp;raw" srcset="https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Ben-Kuipers-The-Future-of-Ethical-AI-Design4.jpg 2500w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Ben-Kuipers-The-Future-of-Ethical-AI-Design4-300x169.jpg 300w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Ben-Kuipers-The-Future-of-Ethical-AI-Design4-768x432.jpg 768w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Ben-Kuipers-The-Future-of-Ethical-AI-Design4-1024x576.jpg 1024w" width="460"><span data-dcnode-id="1224" instrument_node="">Benjamin Kuipers</span></strong><span data-dcnode-id="1222" instrument_node="">, a professor of computer science and engineering at the University of Michigan known for research in qualitative simulation, observed, “I choose to believe that things will work out well in the choice we face as a society. I can’t predict the likelihood of that outcome. Ethics is the set of norms that society provides, telling individuals how to be trustworthy, because trust is essential for cooperation, and cooperation is essential for a society to thrive, and even to survive (see Robert Wright’s book ‘Nonzero’). Yes, we need to understand ethics well enough to program AIs so they behave ethically. More importantly, we need to understand that corporations, including nonprofits, governments, churches, etc., are also artificially intelligent entities participating in society, and they need to behave ethically. We also need to understand that we as a society have been spreading an ideology that teaches individuals that they should behave selfishly rather than ethically. We need an ethical society, not just ethical AI. But AI gives us new tools to understand the mind, including ethics.”</span></p><p data-dcnode-id="1217" style="padding-left: 30px"><strong data-dcnode-id="1219"><span data-dcnode-id="1220" instrument_node="">John Verdon</span></strong><span data-dcnode-id="1218" instrument_node="">, a retired complexity and foresight consultant, said, “Ultimately what is most profitable in the long run is a well-endowed citizenry able to pursue their curiosities and expand the agencies. To enable this condition will require the appropriate legislative protections and constraints. The problems of today and the future are increasing in complexity. Any systems that seek monopolistic malevolence essentially will act like a cancer killing its own host. Distributed-ledger technologies may well enable the necessary ‘accounting systems’ to both credit creators and users of what has been created while liberating creations to be used freely (like both free beer and liberty). This enables a capacity to unleash all human creativity to explore the problem and possibility space. Slaves don’t create a flourishing society – only a static and fearful elite increasingly unable to solve the problems they create. New institutions like an ‘auditor general of algorithms’ (to oversee that algorithms and other computations actually produce the results they intend, and to offer ways to respond and correct) will inevitably arise – just like our other institutions of oversight.”</span></p><p data-dcnode-id="1213"><strong data-dcnode-id="1215"><span data-dcnode-id="1216" instrument_node="">James Morris</span></strong><span data-dcnode-id="1214" instrument_node="">, professor of computer science at Carnegie Mellon, wrote, “I had to say ‘yes.’ The hope is that engineers get control away from capitalists and rebuild technology to embody a new ‘constitution.’ I actually think that’s a longshot in the current atmosphere. Ask me after November. If the competition between the U.S. and China becomes zero-sum, we won’t be able to stop a rush toward dystopia.”</span></p><p data-dcnode-id="1209" style="padding-left: 30px"><strong data-dcnode-id="1211"><span data-dcnode-id="1212" instrument_node="">J. Francisco Álvarez</span></strong><span data-dcnode-id="1210" instrument_node="">, professor of logic and philosophy of science at UNED, the National University of Distance Education in Spain, commented, “Concerns about the use of AI and its ethical aspects will be very diverse and will produce very uneven effects between public good and a set of new, highly marketable services. We will have to expand the spheres of personal autonomy and the recognition of a new generation of rights in the digital society. It is not enough to apply ethical codes in AI devices. Instead, a new ‘constitution’ must be formulated for the digital age and its governance.”</span></p><p data-dcnode-id="1205"><strong data-dcnode-id="1207"><span data-dcnode-id="1208" instrument_node="">Aaron Chia Yuan Hung</span></strong><span data-dcnode-id="1206" instrument_node="">, assistant professor of educational technology at Adelphi University, said, “The use of AI now for surveillance and criminal justice is very problematic. The AI can’t be fair if it is designed based on or drawing from the data collected from a criminal justice system that is inherently unjust. The fact that some people are having these conversations makes me think that there is positive potential. Humans are not the best at decision-making. We have implicit bias. We have cognitive biases. We are irrational (in the behavioral economics sense). AI can correct that or at least make it visible to us so that we can make better decisions. Most people are wary enough of AI systems not to blindly adopt another country’s AI system without a lot of scrutiny. Hopefully that allows us to remain vigilant.”</span></p><p data-dcnode-id="1201" style="padding-left: 30px"><strong data-dcnode-id="1203"><span data-dcnode-id="1204" instrument_node="">Moira de Roche</span></strong><span data-dcnode-id="1202" instrument_node="">, chair of the International Federation of Information Processing’s professional practice sector, wrote, “There is a trend toward ethics, especially in AI applications. AI will continue to improve people’s lives in ways we cannot even anticipate presently. Pretty much every technology we use on a day-to-day basis employs AI (email, mobile phones, etc.). In fact, it worries me that AI is seen as something new, whereas we have used it on a daily basis for a decade or more. Perhaps the conversation should be more about robotics and automation than AI, per se. I am concerned that there are so many codes of ethics. There should not be so many (at present there are several). I worry that individuals will choose the code they like the best – which is why a plethora of codes is dangerous.”</span></p><p data-dcnode-id="1197"><strong data-dcnode-id="1199"><span data-dcnode-id="1200" instrument_node="">Nigel Cameron</span></strong><span data-dcnode-id="1198" instrument_node="">, president emeritus at the Center for Policy on Emerging Technologies, commented, “The social and economic shifts catalyzed by the COVID plague are going to bring increasing focus to our dependence on digital technologies, and with that focus will likely come pressure for algorithmic transparency and concerns over equity and so forth. Antitrust issues are highly relevant, as is the current pushback against China and, in particular, Huawei (generally, I think a helpful response).”</span></p><p data-dcnode-id="1193" style="padding-left: 30px"><strong data-dcnode-id="1195"><span data-dcnode-id="1196" instrument_node="">Peter B. Reiner</span></strong><span data-dcnode-id="1194" instrument_node="">, professor of neuroethics at the University of British Columbia, said, “As AI-driven applications become ever more entwined in our daily lives, there will be substantial demand from the public for what might be termed ‘ethical AI.’ Precisely how that will play out is unknown, but it seems unlikely that the present business model of surveillance capitalism will hold, at least not to the degree that it does today. I expect that clever entrepreneurs will recognize opportunities and develop new, disruptive business models that can be marketed both for the utility of the underlying AI and the ethics that everyone wishes to see put into place. An alternative is that a new regulatory regime emerges, constraining AI service providers and mandating ethical practice.”</span></p><p data-dcnode-id="1189"><strong data-dcnode-id="1191"><span data-dcnode-id="1192" instrument_node="">Ronnie Lowenstein</span></strong><span data-dcnode-id="1190" instrument_node="">, a pioneer in interactive technologies, noted, “AI and the related integration of technologies holds the potential of altering lives in profound ways. I fear the worse but have hopes. Two things that bring me hope: Increased civic engagement of youth all over the world – not only do I see youth as hope for the future, but seeing more people listening to youth encourages me that the adults are re-examining their beliefs and assumptions so necessary for designing transformative policies and practices. And the&nbsp;growth futures/foresight strategies as fostered by The Millennium Project.”</span></p><p data-dcnode-id="1185" style="padding-left: 30px"><strong data-dcnode-id="1187"><span data-dcnode-id="1188" instrument_node="">Peter Dambier</span></strong><span data-dcnode-id="1186" instrument_node="">, a longtime Internet Engineering Task Force participant based in Germany, said, “Personal AI must be as personal as your underwear. No spying, no malware. AI will develop like humans and should have rights like humans. I do not continue visiting a doctor I do not trust. I do not allow anything or anybody I do not trust to touch my computer. Anything that is not open-source I do not trust. Most people should learn informatics and have one person in the family who understands computers.”</span></p><p data-dcnode-id="1181"><strong data-dcnode-id="1183"><span data-dcnode-id="1184" instrument_node="">Ray Schroeder</span></strong><span data-dcnode-id="1182" instrument_node="">, associate vice chancellor of online learning, University of Illinois-Springfield, responded, “One of the aspects of this topic that gives me the most hope is that, while there is the possibility of unethical use of AI, the technology of AI can also be used to uncover those unethical applications. That is, we can use AI to help patrol unethical AI. I see that artificial intelligence will be able to bridge communications across languages and cultures. I see that AI will enable us to provide enhanced telemedicine and agricultural planning. I see that AI will enable us to more clearly predict vulnerabilities and natural disasters so that we can intervene before people are hurt. I am most excited about quantum computing supercharging AI to provide awesome performance in solving our world’s problems. I am further excited about the potential for AI networking to enable us to work across borders to benefit more of the world’s citizens.”</span></p><p data-dcnode-id="1177" style="padding-left: 30px"><strong data-dcnode-id="1179"><span data-dcnode-id="1180" instrument_node="">Melissa R. Michelson</span></strong><span data-dcnode-id="1178" instrument_node="">, a professor of political science at Menlo College, commented, “Because of the concurrent rise of support for the Black Lives Matter movement, I see people taking a second look at the role of AI in our daily lives, as exemplified by the decision to stop police use of facial recognition technology. I am optimistic that our newfound appreciation of racism and discrimination will continue to impact decisions about when and how to implement AI.”</span></p><p data-dcnode-id="1173"><strong data-dcnode-id="1175"><span data-dcnode-id="1176" instrument_node="">Andrew K. Koch</span></strong><span data-dcnode-id="1174" instrument_node="">, president and chief operating officer at the John N. Gardner Institute for Excellence in Undergraduate Education, wrote, “If there was a ‘Yes, but’ option, I would have selected it. I am an optimist. But I am also a realist. AI is moving quickly. Self-interested (defined in individual and corporate ways) entities are exploiting AI in dubious and unethical ways now. They will do so in the future. But I also believe that national and global ethical standards will continue to develop and adapt. The main challenge is the pace of evolution for these standards. AI may have to be used to help keep up with adaptation needed for the ethical standards needed for AI systems.”</span></p><p data-dcnode-id="1169" style="padding-left: 30px"><strong data-dcnode-id="1171"><span data-dcnode-id="1172" instrument_node="">Anne Collier</span></strong><span data-dcnode-id="1170" instrument_node="">, editor of Net Family News and founder of The Net Safety Collaborative, responded, “Policymakers, newsmakers, users and consumers will exert and feel the pressure for ethics with regard to tech and policy because of three things:</span></p><p data-dcnode-id="1167" style="padding-left: 60px"><span data-dcnode-id="1168" instrument_node="">1) A blend of the internet and a pandemic has gotten us all thinking as a planet more than ever.</span></p><p data-dcnode-id="1165" style="padding-left: 60px"><span data-dcnode-id="1166" instrument_node="">2) The disruption COVID-19 introduced to business- and governance-as-usual.</span></p><p data-dcnode-id="1163" style="padding-left: 60px"><span data-dcnode-id="1164" instrument_node="">3) Because of the growing activism and power of youth seeking environmental ethics and social justice.</span></p><p data-dcnode-id="1161" style="padding-left: 30px"><span data-dcnode-id="1162" instrument_node="">“Populism and authoritarianism in a number of countries certainly threaten that trajectory, but – though seemingly on the rise now – I don’t see this as a long-term threat (a sense of optimism that comes from watching the work of so-called ‘Gen Z’). I wish, for example, that someone could survey a representative sample of Gen Z citizens of the Philippines, Turkey, Brazil, China, Venezuela, Iran and the U.S. and ask them this question, explaining how AI could affect their everyday lives, then publish that study. I believe it would give many other adults a sense of optimism similar to mine.”</span></p><p data-dcnode-id="1157"><strong data-dcnode-id="1159"><span data-dcnode-id="1160" instrument_node="">Eric Knorr</span></strong><span data-dcnode-id="1158" instrument_node="">, pioneering technology journalist and editor in chief of International Data Group, the publisher of a number of leading technology journals, commented, “First, only a tiny slice of AI touches ethics – it’s primarily an automation tool to relieve humans of performing rote tasks. Current awareness of ethical issues offers hope that AI will either be adjusted to compensate for potential bias or sequestered from ethical judgment.”</span></p><p data-dcnode-id="1153" style="padding-left: 30px"><strong data-dcnode-id="1155"><span data-dcnode-id="1156" instrument_node="">Anthony Clayton</span></strong><span data-dcnode-id="1154" instrument_node="">, an expert policy analysis, futures studies and scenario and strategic planning based at the University of the West Indies, said, “Technology firms will come under increasing regulatory pressure to introduce standards (with regard to, e.g., ethical use, error-checking and monitoring) for the use of algorithms when dealing with sensitive data. AI will also enable, e.g., autonomous lethal weapons systems, so it will be important to develop ethical and legal frameworks to define acceptable use.”</span></p><p data-dcnode-id="1149"><strong data-dcnode-id="1151"><span data-dcnode-id="1152" instrument_node="">Fabrice Popineau</span></strong><span data-dcnode-id="1150" instrument_node="">, an expert on AI, computer intelligence and knowledge engineering based in France, responded, “I have hope that AI will follow the same path as other potential harmful technologies before (nuclear, bacteriological); safety mechanisms will be put in motion to guarantee that AI use stays beneficial.”</span></p><p data-dcnode-id="1145" style="padding-left: 30px"><strong data-dcnode-id="1147"><span data-dcnode-id="1148" instrument_node="">Concepcion Olavarrieta</span></strong><span data-dcnode-id="1146" instrument_node="">, foresight and economic consultant and president of the Mexico node of The Millennium Project, wrote, “Yes, there will be progress:</span></p><p data-dcnode-id="1143" style="padding-left: 60px"><span data-dcnode-id="1144" instrument_node="">1) Ethical issues are involved in most human activities.</span></p><p data-dcnode-id="1141" style="padding-left: 60px"><span data-dcnode-id="1142" instrument_node="">2) The pandemic experience plays into this development.</span></p><p data-dcnode-id="1139" style="padding-left: 60px"><span data-dcnode-id="1140" instrument_node="">3) Societal risk factors will not be attended.</span></p><p data-dcnode-id="1137" style="padding-left: 60px"><span data-dcnode-id="1138" instrument_node="">4) AI will become core in most people’s lives by 2030.</span></p><p data-dcnode-id="1135" style="padding-left: 60px"><span data-dcnode-id="1136" instrument_node="">5) It is important to assure an income and or offer a basic income to people.”</span></p><p data-dcnode-id="1131"><strong data-dcnode-id="1133"><span data-dcnode-id="1134" instrument_node="">Sharon Sputz</span></strong><span data-dcnode-id="1132" instrument_node="">, executive director of strategic programs at The Data Science Institute at Columbia University, predicted, “In the distant future, ethical systems will prevail, but it will take time.”</span></p><p data-dcnode-id="1127" style="padding-left: 30px"><strong data-dcnode-id="1129"><span data-dcnode-id="1130" instrument_node="">A well-known cybernetician and emeritus professor of business management</span></strong><span data-dcnode-id="1128" instrument_node=""> commented, “AI will be used to help people who can afford to build and use AI systems. Lawsuits will help to persuade companies what changes are needed. Companies will learn to become sensitive to AI-related issues.”</span></p><h2 data-dcnode-id="1125"><span data-dcnode-id="1126" instrument_node="">A consensus around ethical AI is emerging, and open-source solutions can help</span></h2><p data-dcnode-id="1123"><span data-dcnode-id="1124" instrument_node="">A portion of these experts optimistically say they expect progress toward ethical AI systems. They say there has been intense and widespread activity across all aspects of science and technology development on this front for years, and it is bearing fruit. Some point out that the field of bioethics has already managed to broadly embrace the concepts of beneficence, nonmaleficence, autonomy and justice in its work to encourage and support positive biotech evolution that serves the common good.</span></p><p data-dcnode-id="1121"><span data-dcnode-id="1122" instrument_node="">Some of these experts expect to see an expansion of the type of ethical leadership already being demonstrated by open-source AI developers, a cohort of highly principled AI builders who take the view that it should be thoughtfully created in a fairly transparent manner and be sustained and innovated in ways that serve the public well and avoid doing harm. They are hopeful that there is enough energy and brainpower in this cohort to set the good examples that can help steer positive AI evolution across all applications.</span></p><p data-dcnode-id="1119"><span data-dcnode-id="1120" instrument_node="">Also of note: Over the past few years, tech industry, government and citizen participants have been enlisted to gather in many different and diverse working groups on ethical AI; while some experts in this canvassing see this to mostly be public relations window-dressing, others believe that these efforts will be effective.</span></p><p data-dcnode-id="1115" style="padding-left: 30px"><strong data-dcnode-id="1117"><span data-dcnode-id="1118" instrument_node="">Micah Altman</span></strong><span data-dcnode-id="1116" instrument_node="">, a social and information scientist at MIT, said, “First, the good news: In the last several years, dozens of major reports and policy statements have been published by stakeholders from across all sectors arguing that the need for ethical design of AI is urgent and articulating general ethical principles that should guide such design. Moreover, despite significant differences in the recommendations of these reports, most share a focused common core of ethical principles. This is progress. And there are many challenges to meaningfully incorporating these principles into AI systems; into the processes and methods that would be needed to design, evaluate and audit ethical AI systems; and into the law, economics and culture of society that is needed to drive ethical design.</span></p><p data-dcnode-id="1113" style="padding-left: 30px"><span data-dcnode-id="1114" instrument_node="">“We do not yet know (generally) how to build ethical decision-making into AI systems directly; but we could and should take steps toward evaluating and holding organizations accountable for AI-based decisions. And this is more difficult than the work of articulating these principles. It will be a long journey.”</span></p><p data-dcnode-id="1109"><strong data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node="">Henry E. Brady</span></strong><span data-dcnode-id="1110" instrument_node="">, dean of the Goldman School of Public Policy at the University of California-Berkeley, responded, “There seems to be a growing movement to examine these issues, so I am hopeful that by 2030 most algorithms will be assessed in terms of ethical principles. The problem, of course, is that we know that, in the case of medical experiments, it is a long time from the infamous Tuskegee study to committees for the protection of human subjects. But I think the emergence of AI has actually helped to make clear the inequities and injustices in some of our practices. Consequently, they provide a useful focal point for democratic discussion and action.</span></p><p data-dcnode-id="1107"><span data-dcnode-id="1108" instrument_node="">“I think public agencies will take these issues very seriously, and mechanisms will be created to improve AI (although the issues pose difficult problems for legislators due to [the] highly technical nature). I am more worried about private companies and their use of algorithms. It is important, by the way, to recognize that a great deal of AI (perhaps all of it) is simply the application of ‘super-charged’ statistical methods that have been known for quite a long time.</span></p><p data-dcnode-id="1105"><span data-dcnode-id="1106" instrument_node="">“It is also worth remembering that AI is very good at predictions given a fixed and unchanging set of circumstances, but it is not good at causal inference, and its predictions are often based upon proxies for an outcome that may be questionable or unethical.</span></p><p data-dcnode-id="1103"><span data-dcnode-id="1104" instrument_node="">“Finally, AI uses training sets that often embed practices that should be questioned. A lot of issues in AI concern me. The possibility of ‘deepfakes’ means that reality may become protean and shape-shifting in ways that will be hard to cope with. Facial recognition provides for the possibility of tracking people that has enormous privacy implications. Algorithms that use proxies and past practice can embed unethical and unfair results. One of the problems with some multilayer AI methods is that it is hard to understand what rules or principles they are using. Hence, it is hard to open up the ‘black box’ and see what is inside.”</span></p><p data-dcnode-id="1099" style="padding-left: 30px"><strong data-dcnode-id="1101"><span data-dcnode-id="1102" instrument_node="">J. Nathan Matias</span></strong><span data-dcnode-id="1100" instrument_node="">, an assistant professor at Cornell University and expert in digital governance and behavior change in groups and networks, noted, “Unless there is a widespread effort to halt their deployment, artificial intelligence systems will become a basic part of how people and institutions make decisions. By 2030, a well-understood set of ethical guidelines and compliance checks will be adopted by the technology industry. These compliance checks will assuage critics but will not challenge the underlying questions of conflicting values that many societies will be unable to agree on. By 2030, computer scientists will have made great strides in attempts to engineer fairer, more equitable algorithmic decision-making.</span></p><p data-dcnode-id="1097" style="padding-left: 30px"><span data-dcnode-id="1098" instrument_node="">“Attempts to deploy these systems in the field will face legal and policy attacks from multiple constituencies for constituting a form of discrimination. By 2030, scientists will have an early answer to the question of whether it is possible to make general predictions about the behavior of algorithms in society.</span></p><p data-dcnode-id="1095" style="padding-left: 30px"><span data-dcnode-id="1096" instrument_node="">“If the behavior and social impacts of artificial intelligence can be predicted and modeled, then it may become possible to reliably govern the power of such systems. If the behavior of AI systems in society cannot be reliably predicted, then the challenge of governing AI will continue to remain a large risk of unknown dimensions.”</span></p><p data-dcnode-id="1091"><strong data-dcnode-id="1093"><span data-dcnode-id="1094" instrument_node="">Jean Paul Nkurunziza</span></strong><span data-dcnode-id="1092" instrument_node="">, secretary-general of the Burundi Youth Training Centre, wrote, “The use of AI is still at its infancy. The ethical aspects of that domain are not yet clear. I believe that around 2025 ethical issues about the use of AI may erupt (privacy, the use of the AI in violence such as war and order keeping by police, for instance). I foresee that issues caused by the primary use of AI will bring the community to debate about that, and we will come up with some ethical guidelines around AI by 2030.”</span></p><p data-dcnode-id="1087" style="padding-left: 30px"><strong data-dcnode-id="1089"><span data-dcnode-id="1090" instrument_node="">Doris Marie Provine</span></strong><span data-dcnode-id="1088" instrument_node="">, emeritus professor of justice and social inquiry at Arizona State University, noted, “I am encouraged by the attention that ethical responsibilities are getting. I expect that attention to translate into action. The critical discussion around facial-recognition technology gives me hope. AI can make some tasks easier, e.g., sending a warning signal about a medical condition. But it also makes people lazier, which may be even more dangerous. At a global level, I worry about AI being used as the next phase of cyber warfare, e.g., to mess up public utilities.”</span></p><p data-dcnode-id="1083"><strong data-dcnode-id="1085"><span data-dcnode-id="1086" instrument_node="">Judith Schoßböck</span></strong><span data-dcnode-id="1084" instrument_node="">, research fellow at Danube University Krems, said, “I don’t believe that most AI systems will be used in ethical ways. Governments would have to make this a standard, but, due to the pandemic and economic crisis, they might have other priorities. Implementation and making guidelines mandatory will be important. The most difference will be felt in the area of bureaucracy. I am excited about AI’s prospects for assisted living.”</span></p><p data-dcnode-id="1079" style="padding-left: 30px"><strong data-dcnode-id="1081"><span data-dcnode-id="1082" instrument_node="">Gary L. Kreps</span></strong><span data-dcnode-id="1080" instrument_node="">, distinguished professor of communication and director of the Center for Health and Risk Communication at George Mason University, responded, “I am guardedly optimistic that ethical guidelines will be used to govern the use of AI in the future. Increased attention to issues of privacy, autonomy and justice in digital activities and services should lead to safeguards and regulations concerning ethical use of AI.”</span></p><p data-dcnode-id="1075"><strong data-dcnode-id="1077"><span data-dcnode-id="1078" instrument_node="">Michael Marien</span></strong><span data-dcnode-id="1076" instrument_node="">, director of Global Foresight Books, futurist and compiler of the annual list of the best futures books of the year, said, “We have too many crises right now, and many more ahead, where technology can only play a secondary role at best. Technology should be aligned with the UN’s 17 Sustainable Development Goals and especially concerned about reducing the widening inequality gap (SDG #10), e.g., in producing and distributing nutritious food (SDG #2).”</span></p><p data-dcnode-id="1071" style="padding-left: 30px"><strong data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node="">Ibon Zugasti</span></strong><span data-dcnode-id="1072" instrument_node="">, futurist, strategist and director with Prospektiker, wrote, “The use of technologies, ethics and privacy must be guaranteed through transparency. What data will be used and what will be shared? There is a need to define a new governance system for the transition from current narrow AI to the future general AI.”</span></p><p data-dcnode-id="1067"><strong data-dcnode-id="1069"><span data-dcnode-id="1070" instrument_node="">Gerry Ellis</span></strong><span data-dcnode-id="1068" instrument_node="">, an accessibility and usability consultant, said, “The concepts of fairness and bias are key to ensure that AI supports the needs of all of society, particularly those who are vulnerable, such as many (but not all) persons with disabilities. Overall, AI and associated technologies will be for the good, but individual organizations often do not look beyond their own circumstances and their own profits. One does not need to look beyond sweatshops, dangerous working conditions and poor wages in some industries to demonstrate this. Society and legislation must keep up with technological developments to ensure that the good of society is at the heart of society, and that is in its industrial practices.”</span></p><h2 data-dcnode-id="1065"><span data-dcnode-id="1066" instrument_node="">Ethics will evolve and progress will come as different fields show the way</span></h2><p data-dcnode-id="1063"><span data-dcnode-id="1064" instrument_node="">A number of these experts insisted that no technology endures if it broadly delivers unfair or unwanted outcomes. They said technologies that cause harms are adjusted or replaced as, over time, people recognize and work to overcome difficulties to deliver better results. Others said ethics will come to rule at least some aspects of AI but it will perhaps not gain ground until regulatory constraints or other incentives for tech businesses emerge.</span></p><p data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">A number of respondents made the case that the application of ethics to AI applications will likely unfold in different ways, depending upon the industry or public arena in which they unfold. Some say this rollout will depend upon the nature of the data involved. For instance, elaborate ethics regimes have already been developed around the use of health and medical data. Other areas such as the arguments over privacy and surveillance systems have been more contested.</span></p><p data-dcnode-id="1056" style="padding-left: 30px"><strong data-dcnode-id="1058"><img alt="" class="alignright wp-image-46667" data-dcnode-id="1060" height="259" sizes="(max-width: 460px) 100vw, 460px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.elon.edu/u/imagining/wp-content/uploads/sites/964/2021/06/2021-Jon-Lebkowsky-The-Future-of-Ethical-AI-Design25.jpg&amp;raw" srcset="https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Jon-Lebkowsky-The-Future-of-Ethical-AI-Design25.jpg 2500w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Jon-Lebkowsky-The-Future-of-Ethical-AI-Design25-300x169.jpg 300w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Jon-Lebkowsky-The-Future-of-Ethical-AI-Design25-768x432.jpg 768w, https://eloncdn.blob.core.windows.net/eu3/sites/964/2021/06/2021-Jon-Lebkowsky-The-Future-of-Ethical-AI-Design25-1024x576.jpg 1024w" width="460"><span data-dcnode-id="1059" instrument_node="">Jon Lebkowsky</span></strong><span data-dcnode-id="1057" instrument_node="">, CEO, founder and digital strategist at Polycot Associates, wrote, “I have learned from exposure to strategic foresight thinking and projects that we can’t predict the future, but we can determine scenarios that we want to see and work to make those happen. So, I am not predicting that we’ll have ethical AI so much as stating an aspiration – it’s what I would work toward. Certainly, there will be ways to abuse AI/ML/big data, especially in tracking and surveillance. Globally, we need to start thinking about what we think the ethical implications will be and how we can address those within technology development. Given the current state of global politics, it’s harder to see an opportunity for global cooperation, but hopefully the pendulum will swing back to a more reasonable global political framework. The ‘AI for Good’ gatherings might be helpful if they continue. AI can be great for big data analysis and data-driven action, especially where data discretion can be programmed into systems via machine-learning algorithms. Some of the more interesting applications will be in translation, transportation, including aviation; finance, government (including decision support), medicine and journalism.</span></p><p data-dcnode-id="1054"
