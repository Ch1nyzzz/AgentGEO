</span><div class="comment-body" data-dcnode-id="5804"><p data-dcnode-id="5875"><span data-dcnode-id="5876" instrument_node="">HI Aaron, thanks you for taking the time to reply, didn’t expect that so close to Christmas. </span></p><span data-dcnode-id="5874" instrument_node="">
</span><p data-dcnode-id="5872"><span data-dcnode-id="5873" instrument_node="">Of course if you assume god is perfectly good then by definition anything he does is good. </span></p><span data-dcnode-id="5871" instrument_node="">
</span><p data-dcnode-id="5867"><span data-dcnode-id="5870" instrument_node="">However I feel you have failed to address my question. If killing innocent children and animals does not disqualify him from being perfectly good, what would?</span><br data-dcnode-id="5869"><span data-dcnode-id="5868" instrument_node="">
As a scientist I would have thought you would be keen to challenge assumptions in the light of observations. It seems that that is not the case. Your entire assessment of the evidence seems to rely on your central assumption, and at no point do you question it. </span></p><span data-dcnode-id="5866" instrument_node="">
</span><p data-dcnode-id="5864"><span data-dcnode-id="5865" instrument_node="">So I repeat my question, is there any action by god which would convince you that god is not perfectly good? Or perhaps I should re phrase it this way, even if you believe there exists a perfect god , is there any action of the god in the bible that would convince you that this character is not that perfect god ? If there is none, then that would seem extremely narrow minded. If there is some, how is genocide not it? </span></p><span data-dcnode-id="5863" instrument_node="">
</span><p data-dcnode-id="5861"><span data-dcnode-id="5862" instrument_node="">I also feel you did not address my question about what legitimises authority. How does one come to be in a position of legitimate authority? A government is deemed to be legitimate if it is elected by the people and does not abuse its power. As Kim Jong Un was not elected I see no reason to say he has legitimate authority. Even if was elected he has clearly abused his authority. So again the question should be asked if genocide doesn’t count as an abuse of authority then what would? Again your argument seems to rely on your inability to question your assumptions in the light of observations. </span></p><span data-dcnode-id="5860" instrument_node="">
</span><p data-dcnode-id="5852"><span data-dcnode-id="5859" instrument_node="">To say there is a reason but we don’t understand it, again seems to show an unwillingness to question your underlying assumption. How do you know there is a good reason? It seems only your starting assumption can give that. But looking at the stories in the bible it seems the opposite is the case. My reading of the Exodus story is that god wanted to show off his power and harden Pharo's heart.</span><br data-dcnode-id="5858"><span data-dcnode-id="5857" instrument_node="">
Exodus 7 :</span><br data-dcnode-id="5856"><span data-dcnode-id="5855" instrument_node="">
“And I will harden Pharaoh's heart, and multiply my signs and my wonders in the land of Egypt....</span><br data-dcnode-id="5854"><span data-dcnode-id="5853" instrument_node="">
5 And the Egyptians shall know that I am the LORD, when I stretch forth mine hand upon Egypt, and bring out the children of Israel from among them.</span></p><span data-dcnode-id="5851" instrument_node="">
</span><p data-dcnode-id="5849"><span data-dcnode-id="5850" instrument_node="">Now of course I might be reading the story wrong, but if we don’t know gods reasons then we don’t know they are good. Unless of course your refuse to challenge your starting assumption. </span></p><span data-dcnode-id="5848" instrument_node="">
</span><p data-dcnode-id="5840"><span data-dcnode-id="5847" instrument_node="">To say that animals have less moral status than humans is not to say they have no moral status. Yet the passages in the bible and your own stance seem to imply that. Consider that it isn’t just the Canaanite massacres but also many others instances. For example the great flood, the 10 plagues etc.</span><br data-dcnode-id="5846"><span data-dcnode-id="5845" instrument_node="">
Consider Joshua 11:6,</span><br data-dcnode-id="5844"><span data-dcnode-id="5843" instrument_node="">
6 And the LORD said unto Joshua, Be not afraid because of them: for to morrow about this time will I deliver them up all slain before Israel: thou shalt hough their horses, and burn their chariots with fire.”</span><br data-dcnode-id="5842"><span data-dcnode-id="5841" instrument_node="">
To hough a horse is too severe it’s Achilles tendon, would you not expect a perfectly good god to disable the enemies horses in a less painful way? He could have put them to sleep, but instead he ordered this barbarism. </span></p><span data-dcnode-id="5839" instrument_node="">
</span><p data-dcnode-id="5835"><span data-dcnode-id="5838" instrument_node="">You seem utterly indifferent to the suffering of the animals and your explanation treats them as if they are simply property. On that basis someone who batters their dog to death with baseball bat has committed no moral crime as the dog is the possession of the person.</span><br data-dcnode-id="5837"><span data-dcnode-id="5836" instrument_node="">
In Leviticus if a man has sex with animals, not only is the man to be killed but the animal as well. How is that the command of a perfect loving god? </span></p><span data-dcnode-id="5834" instrument_node="">
</span><p data-dcnode-id="5832"><span data-dcnode-id="5833" instrument_node="">God could have made those animals impossible for the Israelites to steal by some miraculous means but instead he decided to have them put to death by the sword or the stone. He could have just killed the Egyptian task masters but instead he not only had their children killed but their animals too. He could have wiped out humans in the flood but he chose to kill animals too. Sending a 40 day flood down to drown would not qualify as a humane way to kill in my humble opinion. Perhaps you differ? </span></p><span data-dcnode-id="5831" instrument_node="">
</span><p data-dcnode-id="5829"><span data-dcnode-id="5830" instrument_node="">Again if that doesn’t convince that the god of the bible is not perfectly good then what will? </span></p><span data-dcnode-id="5828" instrument_node="">
</span><p data-dcnode-id="5816"><span data-dcnode-id="5827" instrument_node="">Even if Carthage did practice child sacrifice (which your own source said is disputed) it does not in any way show that the Canaanites did. Even within a particular religion the practice of that religion can vary significantly from place to place. In Christianity there are estimated to be thousands of different denominations. Many Christians campaigned against slavery and racism, other Christians kept slaves and used the bible to justify it, and some are racists. Orthodox Jews wont drive on the Sabbath, reform Jews will. I’m sorry but you can’t prove guilt by association.</span><br data-dcnode-id="5826"><span data-dcnode-id="5825" instrument_node="">
   In the Old Testament the Hebrews are commanded to kill their own children for religious reasons too and of course god kills all the first born Egyptians. I don’t see why child sacrifice is worse than genocide or stoning your child to death if they don’t follow your religion? What I find particularly cruel and inconsistent with al loving god is the following command: Deut 13</span><br data-dcnode-id="5824"><span data-dcnode-id="5823" instrument_node="">
If thy brother, the son of thy mother, or thy son, or thy daughter, or the wife of thy bosom, or thy friend, which is as thine own soul, entice thee secretly, saying, Let us go and serve other gods, which thou hast not known, thou, nor thy fathers;</span><br data-dcnode-id="5822"><span data-dcnode-id="5821" instrument_node="">
7 Namely, of the gods of the people which are round about you, nigh unto thee, or far off from thee, from the one end of the earth even unto the other end of the earth;</span><br data-dcnode-id="5820"><span data-dcnode-id="5819" instrument_node="">
8 Thou shalt not consent unto him, nor hearken unto him; neither shall thine eye pity him, neither shalt thou spare, neither shalt thou conceal him:</span><br data-dcnode-id="5818"><span data-dcnode-id="5817" instrument_node="">
9 But thou shalt surely kill him; thine hand shall be first upon him to put him to death, and afterwards the hand of all the people.”</span></p><span data-dcnode-id="5815" instrument_node="">
</span><p data-dcnode-id="5813"><span data-dcnode-id="5814" instrument_node="">Why does god command the parent to kill the child? even if it is right for the child to be killed, to make the parent do it seems especially cruel. Imagine an authority  commanding you to kill your own child , is this an act fo a loving authority, that is all perfect?</span></p><span data-dcnode-id="5812" instrument_node="">
</span><p data-dcnode-id="5806"><span data-dcnode-id="5811" instrument_node="">If gods concern was a culture why did ne not employ more peaceful means to change it? For example American culture kept slaves, did that mean it would have been ok to wipe out all Americans? Culture can change and grow more peaceful and empathetic over time. Read Steven Pinker’s book “The Better Angles of Our Nature” for some good work on this. If god can harden hearts ( as he claimed for Pharaoh) why can’t he soften them?</span><br data-dcnode-id="5810"><span data-dcnode-id="5809" instrument_node="">
God can command to kill but not to love and or adopt? God could have commanded them to be merciful, but he chose violence instead.</span><br data-dcnode-id="5808"><span data-dcnode-id="5807" instrument_node="">
To say you only have to sign off on a couple of genocides long ago is very worrying. My empathy is not limited to those around me now but to any one in history that has to go through such a terrible fate. I would hope yours does too.</span></p><span data-dcnode-id="5805" instrument_node="">
</span></div><span data-dcnode-id="5803" instrument_node="">

</span><li class="comment byuser comment-author-aron bypostauthor odd alt thread-odd thread-alt depth-1" data-dcnode-id="5703" id="li-comment-2637710"><span data-dcnode-id="5793" instrument_node="">
</span><div data-dcnode-id="5706" id="comment-2637710"><span data-dcnode-id="5792" instrument_node="">
</span><div class="comment-author vcard" data-dcnode-id="5783"><span data-dcnode-id="5791" instrument_node="">
</span><cite class="fn" data-dcnode-id="5788"><a class="url" data-dcnode-id="5789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.wall.org/~aron/main" rel="external nofollow"><span data-dcnode-id="5790" instrument_node="">Aron Wall</span></a></cite><span data-dcnode-id="5787" instrument_node=""> </span><span class="says" data-dcnode-id="5785"><span data-dcnode-id="5786" instrument_node="">says:</span></span><span data-dcnode-id="5784" instrument_node=""> </span></div><span data-dcnode-id="5781" instrument_node="">
</span><div class="comment-meta commentmetadata" data-dcnode-id="5777"><a data-dcnode-id="5779" href="#comment-2637710"><span data-dcnode-id="5780" instrument_node="">
				December 23, 2014 at 9:35 AM</span></a><span data-dcnode-id="5778" instrument_node=""> </span></div><span data-dcnode-id="5775" instrument_node="">
</span><div class="comment-body" data-dcnode-id="5712"><p data-dcnode-id="5773"><span data-dcnode-id="5774" instrument_node="">Dear howie,</span></p><span data-dcnode-id="5772" instrument_node="">
</span><p data-dcnode-id="5767"><span data-dcnode-id="5771" instrument_node="">First of all, it is insulting to me that you leap to the conclusion that I don't have ordinary human feelings for animals, when I maintain that God had a good reason to kill them.  I don't believe that animals are </span><i data-dcnode-id="5769"><span data-dcnode-id="5770" instrument_node="">merely</span></i><span data-dcnode-id="5768" instrument_node=""> property, and I do believe that they have some moral status, but that doesn't mean there can't be good reasons to kill them.  (Are you by any chance a vegetarian?  Because if not, your criticism is especially odd.)  Can we please assume that I am a normal human being, that babies being killed is also disturbing to me, but that nevertheless as a rational being I understand that in principle it can sometimes occur that certain bad things are necessary in order to prevent worse things from happening?  Thanks.</span></p><span data-dcnode-id="5766" instrument_node="">
</span><p data-dcnode-id="5764"><span data-dcnode-id="5765" instrument_node="">And perhaps you can also accept that, as a religious person, who believes in a being who transcends human limitations, whom I believe is perfectly good and wise, and who swears he has non-cruel motivations, that this is not the same as me personally liking the idea of killing women and children, and having no empathy for their sufferings?</span></p><span data-dcnode-id="5763" instrument_node="">
</span><blockquote data-dcnode-id="5760"><p data-dcnode-id="5761"><span data-dcnode-id="5762" instrument_node="">
However I feel you have failed to address my question. If killing innocent children and animals does not disqualify him from being perfectly good, what would?
</span></p></blockquote><span data-dcnode-id="5759" instrument_node="">
</span><p data-dcnode-id="5757"><span data-dcnode-id="5758" instrument_node="">Actually I did answer your question, when I said: "Killing innocents without sufficiently good reason would indicate that a being is not perfectly good. It is not necessary that the reason be one we can fully understand, although in this case God did choose to disclose some, but not necessarily all, of his reasons."  You did not provide any response to this.</span></p><span data-dcnode-id="5756" instrument_node="">
</span><p data-dcnode-id="5754"><span data-dcnode-id="5755" instrument_node="">But perhaps we should distinguish between two questions.  Are you asking "What would constitute perfect goodness in God?" or are you asking "By what evidence would we come to know that God is in fact good?"  The questions differ in that the first one is a conceptual question about possible states of affairs, while the second one is a question about our own knowledge.  It is not particularly surprising that a good but omniscient being should sometimes act in a way that does not appear to be good to us.</span></p><span data-dcnode-id="5753" instrument_node="">
</span><blockquote data-dcnode-id="5750"><p data-dcnode-id="5751"><span data-dcnode-id="5752" instrument_node="">
As a scientist I would have thought you would be keen to challenge assumptions in the light of observations. It seems that that is not the case. Your entire assessment of the evidence seems to rely on your central assumption, and at no point do you question it.
</span></p></blockquote><span data-dcnode-id="5749" instrument_node="">
</span><p data-dcnode-id="5747"><span data-dcnode-id="5748" instrument_node="">You might be surprised at how often scientists refuse to question their fundamental theories on the basis of various challenges to them.  The majority of time, theories which are originally well-supported (like general relativity) end up triumphing over experimental challenges which at first sight seem to contradict them.</span></p><span data-dcnode-id="5746" instrument_node="">
</span><p data-dcnode-id="5738"><span data-dcnode-id="5745" instrument_node="">This, of course, raises the question of whether the original belief that God is perfectly good has any positive evidential support.  But I said quite explicitly that my belief that God is good comes from other sources, which are not currently under discussion.  I agree with you that the Canaanite genocide is </span><i data-dcnode-id="5743"><span data-dcnode-id="5744" instrument_node="">prima facie</span></i><span data-dcnode-id="5742" instrument_node=""> evidence against God's justice and mercy, but I don't think it's irrational for me to decide my beliefs on the basis of </span><i data-dcnode-id="5740"><span data-dcnode-id="5741" instrument_node="">all</span></i><span data-dcnode-id="5739" instrument_node=""> the evidence, which includes positive evidence of God's character elsewhere.  The question is whether the positive evidence for his perfect goodness exceeds the negative.</span></p><span data-dcnode-id="5737" instrument_node="">
</span><p data-dcnode-id="5735"><span data-dcnode-id="5736" instrument_node="">Nevertheless, I don't think it's very useful to broaden this conversation by you citing more and more examples of Old Testament passages (e.g. parents stoning rebellious children) whose morality is problematic to modern readers, and then I can cite all of the passages which portray God as good and loving.  If we are to make any progress in this conversation, we need to keep things focused.  Perhaps on the concept of authority?</span></p><span data-dcnode-id="5734" instrument_node="">
</span><p data-dcnode-id="5732"><span data-dcnode-id="5733" instrument_node="">Your statement that the legitimacy of political authority comes from democratic elections is clearly false.  Prior to the 18th century, very few government systems were democratically elected (though many had the support of the bulk of the people).  Your view would imply that before that time, there was no such thing as a just trial.  This is absurd.  As for abuse of power, I agree that Kim Jung Un does it in spades, but I fail to see how that should make a difference on those rare occassions when his judicial system acts to punish actual wrongdoers.  Does living under an oppressive government make it acceptable to loot your neighbors?  If not, then it is legitimate for the oppressive government to punish you for being a thief.  I agree with you that elections are a good system for reducing government abuse, but that does not imply that all monarchies are illegitimate by nature, just that they produce good outcomes less frequently.</span></p><span data-dcnode-id="5731" instrument_node="">
</span><p data-dcnode-id="5729"><span data-dcnode-id="5730" instrument_node="">The Christian answer to your question is that all political authority on earth is ultimately delegated from God, who possesses authority over us because he created us, loves us, and knows us perfectly.  In other words he is not even remotely like Kim Jung Un.  Supposing hypothetically that you knew such a being existed (if necessary, suppose that the Old Testament passages in question didn't really happen, and postulate whatever is the minimum amount of hypothetical evidence that would make you confident of his existence), would you agree that he would have legitimate authority over you?  And do you also agree that there are at least some things which such a being could legitimately do, which would be presumptuous for a being with lesser power and wisdom to do?</span></p><span data-dcnode-id="5728" instrument_node="">
</span><p data-dcnode-id="5724"><span data-dcnode-id="5727" instrument_node="">Aron</span><br data-dcnode-id="5726"><span data-dcnode-id="5725" instrument_node="">
(If you don't mind, my name has only one "A" in it.)</span></p><span data-dcnode-id="5723" instrument_node="">
</span><p data-dcnode-id="5721"><span data-dcnode-id="5722" instrument_node="">PS I agree with St. Dennis' remarks about why trying to prove that the Canaanites practiced child sacrifice is a red-herring:</span></p><span data-dcnode-id="5720" instrument_node="">
</span><blockquote data-dcnode-id="5717"><p data-dcnode-id="5718"><span data-dcnode-id="5719" instrument_node="">
Christian and Jewish defenders of the God of the Hebrew scripture do not need to give evidence for this. The entire issue is posed hypothetically since many skeptics do not even believe the Exodus or most of the claimed historical events of the Hebrew scripture occurred anyway. So the question is, If the God of the Bible exists and did command the Canaanite genocide, would there be any justification for this act? Well, yes there would be, if the Canaanites were as bad as the scripture says they were. So at this level of the argument, what really did happen does not matter. What matters are the hypothetical answers to the hypothetical questions. But in fact, as Aron points out, there is some evidence that the Canaanites were this bad.
</span></p></blockquote><span data-dcnode-id="5716" instrument_node="">
</span><p data-dcnode-id="5714"><span data-dcnode-id="5715" instrument_node="">PS2 Yes, God can soften people's hearts: that's the main point of the New Testament.  But I suppose God doesn't generally want to do so when it would override the will of the person in question.  Pharoah hardened his own heart (Ex. 8:15, 8:32) twice before God hardened it for him (9:12).  The word translated as "harden" also means to "strengthen".  God was merely giving Pharoah the psychological strength to do what Pharoah himself wanted to do.  (7:3) is earlier in the chronology, but this is merely a prediction of what is going to happen.</span></p><span data-dcnode-id="5713" instrument_node="">
</span></div><span data-dcnode-id="5711" instrument_node="">

</span><div data-dcnode-id="5623" id="comment-2637728"><span data-dcnode-id="5700" instrument_node="">
</span><div class="comment-author vcard" data-dcnode-id="5692"><span data-dcnode-id="5699" instrument_node="">
</span><cite class="fn" data-dcnode-id="5697"><span data-dcnode-id="5698" instrument_node="">howie</span></cite><span data-dcnode-id="5696" instrument_node=""> </span><span class="says" data-dcnode-id="5694"><span data-dcnode-id="5695" instrument_node="">says:</span></span><span data-dcnode-id="5693" instrument_node=""> </span></div><span data-dcnode-id="5690" instrument_node="">
</span><div class="comment-meta commentmetadata" data-dcnode-id="5686"><a data-dcnode-id="5688" href="#comment-2637728"><span data-dcnode-id="5689" instrument_node="">

</span><div class="comment-body" data-dcnode-id="5629"><p data-dcnode-id="5680"><span data-dcnode-id="5683" instrument_node="">Hi Aron</span><br data-dcnode-id="5682"><span data-dcnode-id="5681" instrument_node="">
Sorry for misspelling your name and I hope you had a nice Christmas. </span></p><span data-dcnode-id="5679" instrument_node="">
</span><p data-dcnode-id="5671"><span data-dcnode-id="5678" instrument_node="">I'm also sorry if you feel insulted over the issues of animals.</span><br data-dcnode-id="5677"><span data-dcnode-id="5676" instrument_node="">
I, of course do not know you and so can only respond to what you put in your posts.</span><br data-dcnode-id="5675"><span data-dcnode-id="5674" instrument_node="">
What is in your post does seem to show a lack of concern for the animals that are killed and tortured at gods command and by god in the bible.</span><br data-dcnode-id="5673"><span data-dcnode-id="5672" instrument_node="">
Your response was:</span></p><span data-dcnode-id="5670" instrument_node="">
</span><p data-dcnode-id="5666"><span data-dcnode-id="5669" instrument_node="">"To me this seems a much lesser concern than the infants. Animals don't have the same moral status that human beings do. Even human beings have the moral authority to kill groups of animals for good cause. Presumably God ordered the destruction of the animals for the same reason as the gold and other property: to prevent the Israelites from thinking that the purpose of the genocide was to enrich themselves, and to emphasize the severity of the judgement."</span><br data-dcnode-id="5668"><span data-dcnode-id="5667" instrument_node="">
This response does seem to treat animals as property and I fail to see any empathy for the hurt animals in your post. Perhaps I have overlooked something, could you can point it out to me?</span></p><span data-dcnode-id="5665" instrument_node="">
</span><p data-dcnode-id="5663"><span data-dcnode-id="5664" instrument_node="">To answer your question, yes I am vegetarian. I see no reason to eat animals when we don’t have to. But the killing of the animals in the bible seems to go far beyond killing animals for food. They are killed and not eaten and they are not just killed but also tortured. At no point in your post do I see any empathy for this. I'm not saying you personally don’t have any, I'm saying I don’t see any in your post and in your argument. I hope you understand my issue is with what you post, I know nothing of you as person.  If you are the nicest person in the world and spend all your time working for wounded animals, I will still have the same issue with your post. I hope you will also see that the validity of my arguments do not depend on whether or not I'm a vegetarian. </span></p><span data-dcnode-id="5662" instrument_node="">
</span><p data-dcnode-id="5650"><span data-dcnode-id="5661" instrument_node="">The justification you imagined for killing all the animals of the Canaanites was so the Israelites didn’t enrich themselves, which implies its okay to kill animals to prevent personal enrichment. Moreover, god could have made the animals temporarily immobile, he could have given the Israelites a burning pain if they tried to touch the animals, he could have made them invisble, all of this would have given them the same lesson but with less violence. Yet god chose the way of violence and suffering. Again if that doesn’t show god is not morally perfect, what will?</span><br data-dcnode-id="5660"><span data-dcnode-id="5659" instrument_node="">
You respond:</span><br data-dcnode-id="5658"><span data-dcnode-id="5657" instrument_node="">
"Killing innocents without sufficiently good reason would indicate that a being is not perfectly good. It is not necessary that the reason be one we can fully understand, although in this case God did choose to disclose some, but not necessarily all, of his reasons."</span><br data-dcnode-id="5656"><span data-dcnode-id="5655" instrument_node="">
And no sufficient reason has been given so I fail to see why we should not conclude that in the absence of a sufficient reason that the god of the bible is not perfectly good. Of course its possible that god has some good reason for his apparent evil acts. But its also possible he has an evil reasons for his apparently good acts.  Surely we have to assess those agents based on the evidence we see not on a hypothetical reasons that no one has been shown.</span><br data-dcnode-id="5654"><span data-dcnode-id="5653" instrument_node="">
If I want someone to love and I appear to do evil acts, shouldn't I should explain myself to that person? If I do not then it seems perfectly reasonable for that person to withdraw their affections.</span><br data-dcnode-id="5652"><span data-dcnode-id="5651" instrument_node="">
So far I have seen no good explanation in your posts about why god can not only allow so much suffering for animals but actually command it. Why does he use so much violence when peaceful methods could be used?</span></p><span data-dcnode-id="5649" instrument_node="">
</span><p data-dcnode-id="5645"><span data-dcnode-id="5648" instrument_node="">I have no problem with your belief in god coming from other sources, what I find hard to understand is why someone trained in scientific method, would still not want to test your otherwise derived beliefs against the available observational evidence. Surely no matter how reasonable a theory may seem we must always test it against the evidence wherever we can? I would not [be] surprised to find one observation not over turning an a compelling piece of theory. But observation after observation, most certainly should. If it doesn’t that's a problem with science not a defence of god. And that is what we see in the bible, time and time agin,  if the stories are true, we see gods being needlessly violent.  When you don’t up date your beliefs in the light of observations then you are lost in a delusion.</span><br data-dcnode-id="5647"><span data-dcnode-id="5646" instrument_node="">
I don’t doubt god does some good things as well in the bile, but if he does good things ands bad things, then how is that consistent with being perfectly good?  </span></p><span data-dcnode-id="5644" instrument_node="">
</span><p data-dcnode-id="5642"><span data-dcnode-id="5643" instrument_node="">With regard to authority, I asked what legitimises authority? Your response was god delegating power but this argument would imply that any government that has not been delegated by god has no authority. So a just trial done by a government not delegated by god is not just? How do you know if they are delegated by god or not? I don’t see why creating someone means you have absolute authority over them, should my parents have absolute auhtority over me? What if they could build a mind reading machine? They would then know me perfectly, does that mean they can enslave me? Your argument form authority doesn’t follow. </span></p><span data-dcnode-id="5641" instrument_node="">
</span><p data-dcnode-id="5637"><span data-dcnode-id="5640" instrument_node="">As we have seen the evidence that the Canaanites committed child sacrifice is not as compelling as many Christian apologists imply. Your response is to quote someone saying you don’t need any evidence. This seems to be a consistent theme. Yet they also say "If the God of the Bible exists and did command the Canaanite genocide, would there be any justification for this act? Well, yes there would be, if the Canaanites were as bad as the scripture says they were." Note the conditional "if the Canaanites were as bad as the scripture says they were." But how do we know if they were that bad? We need evidence and the evidence presented is not compelling. Moreover I haven't seen the claim that the Canaanites sacrificed their children nor the Egyptians, nor the pre flood population in the bible. But even if it is there why is child sacrifice worse than killing disobedient chidlren in the case of the Hebrews or keeping slaves as in the Americans? I have not seen any reason for this.</span><br data-dcnode-id="5639"><span data-dcnode-id="5638" instrument_node="">
Perhaps even more importantly do you think if we found a society today that killed their children should they be wiped out? Personally I would not condone genocide even for such a soceity. The Germans of WII killed millions of their own citizens, does that mean a genocide aganst the Germans in 1945 would have been justified? </span></p><span data-dcnode-id="5636" instrument_node="">
</span><p data-dcnode-id="5634"><span data-dcnode-id="5635" instrument_node="">Why should god give Pharaoh the psychological strength to lead to the death of so many innocents? The first born of every Egyptian, and their animals, not to mentioned that suffering of the other plagues? Why would god give pharaoh the strength for this outcome? How is this consistent with a perfectly loving god?</span></p><span data-dcnode-id="5633" instrument_node="">
</span><p data-dcnode-id="5631"><span data-dcnode-id="5632" instrument_node="">[Several typos fixed on request--AW]</span></p><span data-dcnode-id="5630" instrument_node="">

</span><li class="comment byuser comment-author-aron bypostauthor odd alt thread-odd thread-alt depth-1" data-dcnode-id="5516" id="li-comment-2637734"><span data-dcnode-id="5618" instrument_node="">
</span><div data-dcnode-id="5519" id="comment-2637734"><span data-dcnode-id="5617" instrument_node="">
</span><div class="comment-author vcard" data-dcnode-id="5608"><span data-dcnode-id="5616" instrument_node="">
</span><cite class="fn" data-dcnode-id="5613"><a class="url" data-dcnode-id="5614" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.wall.org/~aron/main" rel="external nofollow"><span data-dcnode-id="5615" instrument_node="">Aron Wall</span></a></cite><span data-dcnode-id="5612" instrument_node=""> </span><span class="says" data-dcnode-id="5610"><span data-dcnode-id="5611" instrument_node="">says:</span></span><span data-dcnode-id="5609" instrument_node=""> </span></div><span data-dcnode-id="5606" instrument_node="">
</span><div class="comment-meta commentmetadata" data-dcnode-id="5602"><a data-dcnode-id="5604" href="#comment-2637734"><span data-dcnode-id="5605" instrument_node="">
				December 31, 2014 at 2:13 PM</span></a><span data-dcnode-id="5603" instrument_node=""> </span></div><span data-dcnode-id="5600" instrument_node="">
</span><div class="comment-body" data-dcnode-id="5525"><p data-dcnode-id="5598"><span data-dcnode-id="5599" instrument_node="">howie,</span></p><span data-dcnode-id="5597" instrument_node="">
</span><p data-dcnode-id="5589"><span data-dcnode-id="5596" instrument_node="">Thanks; I had a nice Christmas.  But unfortunately I have the flu right now and thus I don't have the energy to make a detailed response to all of your arguments.  But let me clarify what I meant by government having divine authority.  I was referring to the Christian doctrine that government is </span><i data-dcnode-id="5594"><span data-dcnode-id="5595" instrument_node="">in general</span></i><span data-dcnode-id="5593" instrument_node=""> authorized by God to do certain things, as St. Paul says in </span><a data-dcnode-id="5591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biblegateway.com/passage/%3Fsearch%3DRomans%2B13%26version%3DNIV" rel="nofollow"><span data-dcnode-id="5592" instrument_node="">Romans 13</span></a><span data-dcnode-id="5590" instrument_node="">:</span></p><span data-dcnode-id="5588" instrument_node="">
</span><blockquote data-dcnode-id="5582"><p data-dcnode-id="5586"><span data-dcnode-id="5587" instrument_node="">
Let everyone be subject to the governing authorities, for there is no authority except that which God has established. The authorities that exist have been established by God.  Consequently, whoever rebels against the authority is rebelling against what God has instituted, and those who do so will bring judgment on themselves.  For rulers hold no terror for those who do right, but for those who do wrong. Do you want to be free from fear of the one in authority? Then do what is right and you will be commended.  For the one in authority is God’s servant for your good. But if you do wrong, be afraid, for rulers do not bear the sword for no reason. They are God’s servants, agents of wrath to bring punishment on the wrongdoer.  Therefore, it is necessary to submit to the authorities, not only because of possible punishment but also as a matter of conscience.</span></p><span data-dcnode-id="5585" instrument_node="">
</span><p data-dcnode-id="5583"><span data-dcnode-id="5584" instrument_node="">This is also why you pay taxes, for the authorities are God’s servants, who give their full time to governing.  Give to everyone what you owe them: If you owe taxes, pay taxes; if revenue, then revenue; if respect, then respect; if honor, then honor.
</span></p></blockquote><span data-dcnode-id="5581" instrument_node="">
</span><p data-dcnode-id="5579"><span data-dcnode-id="5580" instrument_node="">St. Paul did not mean, of course, that the Roman government was authorized from God in the sense that God specifically spoke from heaven and said "I command that there be a Roman Senate and Emperor", and that there are other governments which were not authorized.  (The only nation which has ever been directly founded by God was ancient Israel, and therefore that was the only legitimate theocracy to ever exist.  All other goverments are presumptuous if they seek to enforce a religious code of law.)</span></p><span data-dcnode-id="5578" instrument_node="">
</span><p data-dcnode-id="5576"><span data-dcnode-id="5577" instrument_node="">He meant that God has providentially arranged so that human beings are capable of forming governments for the purpose of justice, using our own wisdom, and that those governments therefore possess real delegated authority from God.  Similar to the way God has delegated authority to you to feed your own body and look after it.  He didn't need to tell you in a voice from heaven to do that, it's built into his creation.</span></p><span data-dcnode-id="5575" instrument_node="">
</span><p data-dcnode-id="5573"><span data-dcnode-id="5574" instrument_node="">So when you ask "So a just trial done by a government not delegated by god is not just? How do you know if they are delegated by god or not?"; the answer is that ALL governments are delegated by God in this way, whenever they seek to do justice.  Of course this doesn't justify them when they do injustice (for example when, somewhat ironically in light of the passage I just quoted, the same Roman government executed St. Paul).</span></p><span data-dcnode-id="5572" instrument_node="">
</span><p data-dcnode-id="5570"><span data-dcnode-id="5571" instrument_node="">Regarding parental authority:</span></p><span data-dcnode-id="5569" instrument_node="">
</span><blockquote data-dcnode-id="5566"><p data-dcnode-id="5567"><span data-dcnode-id="5568" instrument_node="">
I don’t see why creating someone means you have absolute authority over them, should my parents have absolute authority over me?
</span></p></blockquote><span data-dcnode-id="5565" instrument_node="">
</span><p data-dcnode-id="5563"><span data-dcnode-id="5564" instrument_node="">You are taking isolated things out of context.  I never said that creating somebody gives you absolute authority over them.  </span></p><span data-dcnode-id="5562" instrument_node="">
</span><p data-dcnode-id="5557"><span data-dcnode-id="5561" instrument_node="">But it does give some authority.  As you know, your parents had quite a lot of authority over you while you were younger.  For example a parent is allowed to punish their own child, but not a random adult or a stranger's child.  This authority was grounded </span><i data-dcnode-id="5559"><span data-dcnode-id="5560" instrument_node="">partly</span></i><span data-dcnode-id="5558" instrument_node=""> in the fact that they begat and bore you (it would be an exaggeration to call this creation given that they have almost no control over the process), but also in additional facts about them and facts about you.  Assuming your parents were ordinary decent people, they would have loved you more than anyone else, devoted time and effort to raising you, knew you better than almost anyone (sometimes better than you knew yourself).  You on the other hand were weaker, less rational, had a great need to be taken care of and so on.  It is therefore quite natural that parents should have (nonabsolute) authority over their children.  When the children grow up they rightly assume control over their own lives, although they always owe their parents respect and honor, not just for bringing them into existence but also for services rendered which cannot ever be fully repayed.</span></p><span data-dcnode-id="5556" instrument_node="">
</span><p data-dcnode-id="5554"><span data-dcnode-id="5555" instrument_node="">The authority of parents is rightly limited because parents never love or know their children perfectly, and in the end they are the same kind of being.  The child does not exist solely for the sake of their parent: their DNA (which the parent only transmitted, not controlled) has made them into a being who properly has their own independent interests and ambitions.</span></p><span data-dcnode-id="5553" instrument_node="">
</span><p data-dcnode-id="5551"><span data-dcnode-id="5552" instrument_node="">Now God's authority over you is rooted in a similar natural situation of parent to child, only his authority is absolute because the ratio of his greatness to yours is infinitely greater, even after we grow up.  There is no chance of you being right and him being wrong.  Also, he created you for a specific purpose, and knows that you will be unhappy if you don't fulfil it.  And he knows better than you do how to acquire true happiness.  And yet it is true that he's delegated quite a lot of freedom to you, so apparently he isn't a bossy micromanager either.</span></p><span data-dcnode-id="5550" instrument_node="">
</span><blockquote data-dcnode-id="5547"><p data-dcnode-id="5548"><span data-dcnode-id="5549" instrument_node="">
What if they could build a mind reading machine? They would then know me perfectly, does that mean they can enslave me?
</span></p></blockquote><span data-dcnode-id="5546" instrument_node="">
</span><p data-dcnode-id="5544"><span data-dcnode-id="5545" instrument_node="">Didn't I also mention something about love?</span></p><span data-dcnode-id="5543" instrument_node="">
</span><blockquote data-dcnode-id="5540"><p data-dcnode-id="5541"><span data-dcnode-id="5542" instrument_node="">
If I want someone to love and I appear to do evil acts, shouldn't I should explain myself to that person? If I do not then it seems perfectly reasonable for that person to withdraw their affections.
</span></p></blockquote><span data-dcnode-id="5539" instrument_node="">
</span><p data-dcnode-id="5537"><span data-dcnode-id="5538" instrument_node="">That seems to presuppose you and the other person are roughly equal in wisdom, so that they can fully understand your reasons for behaving the way that you do (and that you have no good reason to withhold the information from them).  But in the case of a parent and a small child, parents may know perfectly well that their explanations won't always satisfy the child, and yet they still reasonably ask them to trust and obey them.  Or if a proven good friend whose character you trust says "I can't tell you why I'm doing this without breaking a confidence.  You'll just have to trust me," then that might be reasonable in certain circumstances.  Of course I am presupposing in both cases that the person trusting has other, positive experiences of the parent/friend, on which to base the judgement of trust.</span></p><span data-dcnode-id="5536" instrument_node="">
</span><blockquote data-dcnode-id="5533"><p data-dcnode-id="5534"><span data-dcnode-id="5535" instrument_node="">
Perhaps even more importantly do you think if we found a society today that killed their children should they be wiped out? Personally I would not condone genocide even for such a soceity. The Germans of WII killed millions of their own citizens, does that mean a genocide aganst the Germans in 1945 would have been justified?
</span></p></blockquote><span data-dcnode-id="5532" instrument_node="">
</span><p data-dcnode-id="5530"><span data-dcnode-id="5531" instrument_node="">If you go back and read my previous comments you will find that I stated twice that no human beings have the right to commit genocide in the absence of specific divine authorization.  So the answer to your question is NO.</span></p><span data-dcnode-id="5529" instrument_node="">
</span><p data-dcnode-id="5527"><span data-dcnode-id="5528" instrument_node="">I have responded to only a small portion of your questions, and yet my reply has still gotten rather long.  With these internet exchanges it's best to keep things very tightly focused or they quickly spin out of control.  As I said, I don't have the energy to follow up this conversation much longer (but don't let that keep other people from responding if they wish).</span></p><span data-dcnode-id="5526" instrument_node="">

</span><div class="comment-body" data-dcnode-id="5483"><p data-dcnode-id="5494"><span data-dcnode-id="5495" instrument_node="">Hello again Aron &amp; howie,</span></p><span data-dcnode-id="5493" instrument_node="">
</span><p data-dcnode-id="5491"><span data-dcnode-id="5492" instrument_node="">howie, please look back at the post I did on the 22nd. In my thinking I’ve answered most of the arguments you’ve presented. Of course I think Aron has as well but for some reason you have simply ignored or misunderstood most of what he has said. (To be charitable, I’ll assume the latter.) He had to say more than once that he has answered certain of your accusations against the biblical God and then he repeated his answers, yet you keep repeating the same accusations. </span></p><span data-dcnode-id="5490" instrument_node="">
</span><p data-dcnode-id="5488"><span data-dcnode-id="5489" instrument_node="">So would you go over my comments (from the 22nd) and point out what you think I have failed to answer?  (I know you have added some new arguments since the 22nd, e.g. the problem of Deut 13, but they are extraneous to the basic issue covered in this particular blog topic.) In the meantime I will try to go over Aron's and your posts and try to find some arguments to which no one has responded and I will make some comments. Hopefully I won’t be too long in getting a post out to you. </span></p><span data-dcnode-id="5487" instrument_node="">
</span><p data-dcnode-id="5485"><span data-dcnode-id="5486" instrument_node="">And as Aron mentioned, some other readers may have comments as well. Hope you're feeling better, Aron. Maybe you just need a good break from your blogging.</span></p><span data-dcnode-id="5484" instrument_node="">

</span><li class="comment odd alt thread-odd thread-alt depth-1" data-dcnode-id="5432" id="li-comment-2637742"><span data-dcnode-id="5472" instrument_node="">
</span><div data-dcnode-id="5435" id="comment-2637742"><span data-dcnode-id="5471" instrument_node="">
</span><div class="comment-author vcard" data-dcnode-id="5462"><span data-dcnode-id="5470" instrument_node="">
</span><cite class="fn" data-dcnode-id="5467"><a class="url" data-dcnode-id="5468" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.encounter1%2Corg/~aron/blog/when-god-kills-the-innocent" rel="external nofollow"><span data-dcnode-id="5469" instrument_node="">Dennis Jensen</span></a></cite><span data-dcnode-id="5466" instrument_node=""> </span><span class="says" data-dcnode-id="5464"><span data-dcnode-id="5465" instrument_node="">says:</span></span><span data-dcnode-id="5463" instrument_node=""> </span></div><span data-dcnode-id="5460" instrument_node="">
</span><div class="comment-meta commentmetadata" data-dcnode-id="5456"><a data-dcnode-id="5458" href="#comment-2637742"><span data-dcnode-id="5459" instrument_node="">
				January 2, 2015 at 11:40 AM</span></a><span data-dcnode-id="5457" instrument_node=""> </span></div><span data-dcnode-id="5454" instrument_node="">
</span><div class="comment-body" data-dcnode-id="5441"><p data-dcnode-id="5452"><span data-dcnode-id="5453" instrument_node="">Hi howie,</span></p><span data-dcnode-id="5451" instrument_node="">
</span><p data-dcnode-id="5449"><span data-dcnode-id="5450" instrument_node="">You quote me: “If the God of the Bible exists and did command the Canaanite genocide, would there be any justification for this act? Well, yes there would be, if the Canaanites were as bad as the scripture says they were.” You then go on to say, “Note the conditional ‘if the Canaanites were as bad as the scripture says they were.’ But how do we know if they were that bad? We need evidence and the evidence presented is not compelling.” I went on to point out that this is merely a hypothetical argument needing nothing more than a hypothetical answer. It seems to me that you do not understand that the burden of proof is not on me to provide additional evidence, it’s on you to show an inconsistency given the information we have. </span></p><span data-dcnode-id="5448" instrument_node="">
</span><p data-dcnode-id="5446"><span data-dcnode-id="5447" instrument_node="">At the risk of repeating much of Aron’s statement, let me try to explain my argument differently. You are making the claim that there is an inconsistency in the Hebrew scriptures such that one cannot claim that the God described there is completely just and good as it claims (e.g. Gen 18.25). God’s actions, according to the text, show that this God cannot be good, you claim. But if we are going entirely and only by what the Hebrew scripture says, one cannot pick and choose which portions one wants to accept and which one wants to reject. It’s the fact that this book says that the Canaanites practiced child sacrifice and that this was a major reason these people should be destroyed (Lev 18.21, 27-28) that makes the account consistent. It is consistent for it to say that God is absolutely good and just as well as to say that God judged that by the Canaanites’ wickedness they deserved destruction.</span></p><span data-dcnode-id="5445" instrument_node="">
</span><p data-dcnode-id="5443"><span data-dcnode-id="5444" instrument_node="">Nevertheless, though it is not needed for the above argument to work, there is good external evidence that the Canaanites did practice child sacrifice. The cultural connections between Phoenecian Carthage and Canaan, the archeological evidence that they worshiped the same deities, and the references throughout the Bible and other Near Eastern writings provide good evidence that this did happen in Canaan. A. R. W. Green’s book The Role of Human Sacrifice in the Ancient Near East (1975) would be the best place to look for the most complete evidence.</span></p><span data-dcnode-id="5442" instrument_node="">
</span></div><span data-dcnode-id="5440" instrument_node="">
</span><div class="reply" data-dcnode-id="5438"><span data-dcnode-id="5439" instrument_node="">
</span></div><span data-dcnode-id="5436" instrument_node="">
</span></div><span data-dcnode-id="5433" instrument_node="">
</span></li><span data-dcnode-id="5431" instrument_node="">
</span><li class="comment even thread-even depth-1" data-dcnode-id="5362" id="li-comment-2637858"><span data-dcnode-id="5430" instrument_node="">
</span><div data-dcnode-id="5365" id="comment-2637858"><span data-dcnode-id="5429" instrument_node="">
</span><div class="comment-author vcard" data-dcnode-id="5421"><span data-dcnode-id="5428" instrument_node="">
</span><cite class="fn" data-dcnode-id="5426"><span data-dcnode-id="5427" instrument_node="">howie</span></cite><span data-dcnode-id="5425" instrument_node=""> </span><span class="says" data-dcnode-id="5423"><span data-dcnode-id="5424" instrument_node="">says:</span></span><span data-dcnode-id="5422" instrument_node=""> </span></div><span data-dcnode-id="5419" instrument_node="">
</span><div class="comment-meta commentmetadata" data-dcnode-id="5415"><a data-dcnode-id="5417" href="#comment-2637858"><span data-dcnode-id="5418" instrument_node="">
				February 13, 2015 at 3:51 AM</span></a><span data-dcnode-id="5416" instrument_node=""> </span></div><span data-dcnode-id="5413" instrument_node="">
</span><div class="comment-body" data-dcnode-id="5371"><p data-dcnode-id="5407"><span data-dcnode-id="5412" instrument_node="">Hi Aron, Sorry to hear about your flu, hope you are recovered now.</span><br data-dcnode-id="5411"><span data-dcnode-id="5410" instrument_node="">
I have been very very busy over the last few months but have finally found some time to reply. I recognize you earlier said you are bowing out of the conversation, so no worries if you don’t reply to this. I thank you for the time you have spent on it.</span><br data-dcnode-id="5409"><span data-dcnode-id="5408" instrument_node="">
Dennis Jensen, if I get some more time I will post a reply to your post. </span></p><span data-dcnode-id="5406" instrument_node="">
</span><p data-dcnode-id="5404"><span data-dcnode-id="5405" instrument_node="">Aron:</span></p><span data-dcnode-id="5403" instrument_node="">
</span><p data-dcnode-id="5399"><span data-dcnode-id="5402" instrument_node="">When you say that all governments are delegated by god whenever they seek to do justice. I don't see any real argument here, because the phrase "doing justice" is not clearly defined.</span><br data-dcnode-id="5401"><span data-dcnode-id="5400" instrument_node="">
For example some Christians feel they are doing justice when they prevent homosexual marriages, others think this is itself unjust. Some Jews feel that it is wrong to drive on the Sabbath, others feel its fine. Some Muslims think blasphemy should be punished by death, others think this is wrong. In short simply saying a government is legitimate when it’s just is not a clear answer, as even believers in the same religious text do not agree upon what is just. </span></p><span data-dcnode-id="5398" instrument_node="">
</span><p data-dcnode-id="5392"><span data-dcnode-id="5397" instrument_node="">With respect top parental authority no one is claiming parents have the rights to kill their children or read their inner thoughts. So I think the analogy is weak. You accept of course that parents have limited authority over their children but only because their knowledge of them is imperfect. But again, what if In the future it is possible to read someone’s thoughts? You answer is simply:</span><br data-dcnode-id="5396"><span data-dcnode-id="5395" instrument_node="">
"Didn't I mention something about love".</span><br data-dcnode-id="5394"><span data-dcnode-id="5393" instrument_node="">
I’m sorry I don't understand how this is an answer at all. The questions remains. </span></p><span data-dcnode-id="5391" instrument_node="">
</span><p data-dcnode-id="5389"><span data-dcnode-id="5390" instrument_node="">A parent that doesn't even try to explain their apparently cruel actions is quite possibly an irresponsible parent.  You say that parent and the child have to be roughly equal in wisdom, where is the justification for this? A child that is punished for being naughty may well know they were being naughty, that doesn’t mena they are even close to equal in wisdom to their parent. They need to have a minimum amount of knowledge, I see no reason to suggest they have to have an equal amount of knowledge. </span></p><span data-dcnode-id="5388" instrument_node="">
</span><p data-dcnode-id="5382"><span data-dcnode-id="5387" instrument_node="">It’s possible that a parent that appears to be cruel is really loving, but of course it’s also possible that they really are cruel. Surely we have to go on the basis of evidence that we have and not just reconfirm our preconceived notions, which is what it seems you are doing.</span><br data-dcnode-id="5386"><span data-dcnode-id="5385" instrument_node="">
You make statements such as “There is no chance of you being right and him being wrong” but this just confirms that you are not open to evidence, instead you simply seek to rationalize your already held beliefs. You say “Also, he created you for a specific purpose, and knows that you will be unhappy if you don't fulfil it.”</span><br data-dcnode-id="5384"><span data-dcnode-id="5383" instrument_node="">
Would you tell that to the mothers of the slaughtered Egyptian children, that god knew what would make them happy and fulfilled and so killed their first born children?</span></p><span data-dcnode-id="5381" instrument_node="">
</span><p data-dcnode-id="5379"><span data-dcnode-id="5380" instrument_node="">How can you seriously claim that the god that supposedly created the entire universe yet is interested in my sex life is not a bossy micro manager? </span></p><span data-dcnode-id="5378" instrument_node="">
</span><p data-dcnode-id="5376"><span data-dcnode-id="5377" instrument_node="">I understand that you think no human being has the right to commit genocide in the absence of divine authorization. But I think you are missing the point. The point is you are trying to give some justificaiton for god’s actions. For example, when you appeal to the child sacrifice of the Canaanites, you are effectively arguing that there are some circumstances when it’s okay to commit genocide when it’s right for god to command it. So my question is, if it was right for god to command the Israelites to kill the Cannonites why would it not be right for the Israelites to kill all the Germans after WWII? To simply hide behind the fact that god didn't command it, doesn't explain why gods commands are just. </span></p><span data-dcnode-id="5375" instrument_node="">
</span><p data-dcnode-id="5373"><span data-dcnode-id="5374" instrument_node="">I also don't see any justification for the torture of the animal found in the bible in your reply. Quite frankly I have never seen a good justification of this. Let us remind ourselves that god commands the Hebrew armies to severe the Achilles tendons of their opponents horses. God could have just put these horses to sleep but instead he commanded them to tortured instead. If that sort of evidence doesn’t convince you this is not a loving god, what would ? One can only assume that you are simply not open to evidence. I find that an incredible state of affairs for someone of the very high level of scientific training you have.</span></p><span data-dcnode-id="5372" instrument_node="">
</span></div><span data-dcnode-id="5370" instrument_node="">

</span><div class="comment-body" data-dcnode-id="5301"><p data-dcnode-id="5337"><span data-dcnode-id="5342" instrument_node="">Hi Dennis</span><br data-dcnode-id="5341"><span data-dcnode-id="5340" instrument_node="">
Sorry it’s taken such a long time to respond, I was extremely busy over the last two months.</span><br data-dcnode-id="5339"><span data-dcnode-id="5338" instrument_node="">
I hope you had a nice Christmas and New Years.</span></p><span data-dcnode-id="5336" instrument_node="">
</span><p data-dcnode-id="5330"><span data-dcnode-id="5335" instrument_node="">You say that god is acting with justice but you a re ignoring the fact the god commands animals to be killed and tortured, so even if you are correct about the humans I don’t see how you can apply it to the animals. So the accusation stands, god is barbaric.</span><br data-dcnode-id="5334"><span data-dcnode-id="5333" instrument_node="">
Similarly you justify the killing of the Egyptian children (and their animals) by appealing to the fact that the Israelites were enslaved. That maybe true but the Egyptian children did not enslave them? God kills the innocents, why didn’t he just kill the Pharaoh?</span><br data-dcnode-id="5332"><span data-dcnode-id="5331" instrument_node="">
Would it be just to kill American children for the crimes of slavery ?</span></p><span data-dcnode-id="5329" instrument_node="">
</span><p data-dcnode-id="5325"><span data-dcnode-id="5328" instrument_node="">You claim that the Canaanite children were compensated, but it does not say this in the bible, so you are simply assuming that, furthermore do the animals get compensated? Also I don’t see how compensation implies justification.</span><br data-dcnode-id="5327"><span data-dcnode-id="5326" instrument_node="">
Lets suppose a child molester compensates the said child by buying them lots of things they like; toys, candy etc. Does the compensation mean we ignore the crimes of the molester? Is the molester no longer guilty?</span></p><span data-dcnode-id="5324" instrument_node="">
</span><p data-dcnode-id="5320"><span data-dcnode-id="5323" instrument_node="">I think your answer is extremely callous, imagine watching your mother killed before your eyes. Whatever compensation you receive, how could you possibly claim that the said child experiences “no loss”?</span><br data-dcnode-id="5322"><span data-dcnode-id="5321" instrument_node="">
This is where your religion is taking you, to really believe that the most horrible of crimes is really “no loss”. That is extremely worrying. </span></p><span data-dcnode-id="5319" instrument_node="">
</span><p data-dcnode-id="5315"><span data-dcnode-id="5318" instrument_node="">I do not see why the Canaanite civilization needed to be wiped out. Lets assume they did have child sacrifice, why is that worse that the slavery institutionalized in America for hundreds of years? Would you say that the American civilization should be wiped out?</span><br data-dcnode-id="5317"><span data-dcnode-id="5316" instrument_node="">
Where is your evidence that a barbaric practice that a culture is performing at some time T will always be practiced into the indefinite future?</span></p><span data-dcnode-id="5314" instrument_node="">
</span><p data-dcnode-id="5308"><span data-dcnode-id="5313" instrument_node="">Lots of societies were barbaric in the past, including our own. God could use his powers to protect the children from such practice, instead he decided on genocide and we are really to believe he is all loving?</span><br data-dcnode-id="5312"><span data-dcnode-id="5311" instrument_node="">
Even if we agree they should be killed,</span><br data-dcnode-id="5310"><span data-dcnode-id="5309" instrument_node="">
God could have killed the Canaanites peacefully in their sleep; instead he chose the violence of the sword. </span></p><span data-dcnode-id="5307" instrument_node="">
</span><p data-dcnode-id="5303"><span data-dcnode-id="5306" instrument_node="">Coming back to the issues of animals, you claim that animals may not feel pain in any significant manner; do you have any evidence for this?</span><br data-dcnode-id="5305"><span data-dcnode-id="5304" instrument_node="">
If that is so why do animals chose to take painkillers when in pain? Your alternative is that god has another plan for them, but unless you tell me what this plain is and provide some evidence for it, I have no reason to take such an argument seriously.</span></p><span data-dcnode-id="5302" instrument_node="">
</span></div><span data-dcnode-id="5300" instrument_node="">
