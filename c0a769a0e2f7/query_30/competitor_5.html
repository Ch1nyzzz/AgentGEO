</span><article class="post-2070 post type-post status-publish format-standard hentry category-theology" data-dcnode-id="6300" id="post-2070"><span data-dcnode-id="6711" instrument_node="">
</span><header data-dcnode-id="6688"><span data-dcnode-id="6710" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="6708"><span data-dcnode-id="6709" instrument_node="">When God kills the Innocent</span></h1><span data-dcnode-id="6707" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="6691"><span data-dcnode-id="6706" instrument_node="">
</span><span class="meta-sep" data-dcnode-id="6704"><span data-dcnode-id="6705" instrument_node="">by</span></span><span data-dcnode-id="6703" instrument_node=""> </span><span class="author vcard" data-dcnode-id="6700"><a class="url fn n" data-dcnode-id="6701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.wall.org/~aron/blog/author/aron/" title="View all posts by Aron Wall"><span data-dcnode-id="6702" instrument_node="">Aron Wall</span></a></span><span data-dcnode-id="6699" instrument_node=""> </span><span class="meta-prep meta-prep-author" data-dcnode-id="6697"><span data-dcnode-id="6698" instrument_node="">Posted on</span></span><span data-dcnode-id="6696" instrument_node=""> </span><a data-dcnode-id="6693" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.wall.org/~aron/blog/when-god-kills-the-innocent/" rel="bookmark" title="8:24 PM"><span class="entry-date" data-dcnode-id="6694"><span data-dcnode-id="6695" instrument_node="">March 8, 2014</span></span></a><span data-dcnode-id="6692" instrument_node=""> </span></div><span data-dcnode-id="6689" instrument_node="">
</span></header><span data-dcnode-id="6687" instrument_node="">
</span><div class="entry-content" data-dcnode-id="6338"><span data-dcnode-id="6686" instrument_node="">
</span><p data-dcnode-id="6684"><span data-dcnode-id="6685" instrument_node="">A Christian reader named Paul wrotes to me from New Zealand with the following common question.&nbsp; With permission, I am posting his question and my answer on my blog.</span></p><span data-dcnode-id="6683" instrument_node="">
</span><p data-dcnode-id="6681"><span data-dcnode-id="6682" instrument_node="">St. Paul writes:</span></p><span data-dcnode-id="6680" instrument_node="">
</span><blockquote data-dcnode-id="6662"><p data-dcnode-id="6675"><span data-dcnode-id="6679" instrument_node="">A few months ago I discovered your blog via the </span><a data-dcnode-id="6677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//biologos.org/"><span data-dcnode-id="6678" instrument_node="">Biologos</span></a><span data-dcnode-id="6676" instrument_node=""> website. It has been a real encouragement for me to read your articles and I can honestly say that I enjoyed everything that I've read.</span></p><span data-dcnode-id="6674" instrument_node="">
</span><p data-dcnode-id="6672"><span data-dcnode-id="6673" instrument_node="">Anyway, a Church friend and I have been meeting up every few weeks to have discussions about tricky issues in Christianity and something that has come up (and was always bound to...) is the depictions of God in the Old Testament. In the Old Testament, God is often depicted as acting violently and sometimes in ways that can seem barbaric. For example, God gives instructions for the Israelites to kill people. Likewise, an atheist friend of mine was shocked when I referred to God as "just" because he had just read about the exodus and the plagues.</span></p><span data-dcnode-id="6671" instrument_node="">
</span><p data-dcnode-id="6669"><span data-dcnode-id="6670" instrument_node="">The issue for me is not that God doesn't have a right to judge/ punish guilty people (for example the Canaanites), but the fact that innocent people are also involved in some of these situations. For example children and babies. In some verses they seem to be explicitly mentioned (i.e. 1 Samuel 15:3). I realise this is only a single example, but there are one or two other examples that are quite easy to find.</span></p><span data-dcnode-id="6668" instrument_node="">
</span><p data-dcnode-id="6666"><span data-dcnode-id="6667" instrument_node="">The most common response of Christians seems to be that God created all of us and therefore He can do whatever He wants. I agree that God is sovereign, but these actions seem inconsistent with the nature of God revealed clearly in Jesus.</span></p><span data-dcnode-id="6665" instrument_node="">
</span><p data-dcnode-id="6663"><span data-dcnode-id="6664" instrument_node="">I have some ideas about what to make of it all, but I thought that I would ask you what you make of these sorts of verses? I realise that you must be very busy (and you don't know me!) so please don't feel obligated to reply! However, if you have the time and the inclination I would really appreciate it.</span></p></blockquote><span data-dcnode-id="6661" instrument_node="">
</span><p data-dcnode-id="6659"><span data-dcnode-id="6660" instrument_node="">My reply:</span></p><span data-dcnode-id="6658" instrument_node="">
</span><p data-dcnode-id="6653"><span data-dcnode-id="6657" instrument_node="">This is a tricky problem in theology, isn't it! &nbsp;But it isn't just an Old Testament vs. New Testament thing. &nbsp;The following verses are </span><em data-dcnode-id="6655"><span data-dcnode-id="6656" instrument_node="">all</span></em><span data-dcnode-id="6654" instrument_node=""> God speaking in the Old Testament:</span></p><span data-dcnode-id="6652" instrument_node="">
</span><ol data-dcnode-id="6614"><span data-dcnode-id="6651" instrument_node="">
</span><li data-dcnode-id="6642"><span data-dcnode-id="6650" instrument_node="">"I, the Lord your God, am a jealous God, punishing the children for the sin of the parents to the third and fourth generation of those who hate me, but showing love to a thousand generations of those who love me and keep my commandments." (</span><a data-dcnode-id="6648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.biblegateway.com/passage/%3Fsearch%3DEx.%2B20%253A5-6%26version%3DNIV"><span data-dcnode-id="6649" instrument_node="">Ex. 20:5-6</span></a><span data-dcnode-id="6647" instrument_node="">)</span><br data-dcnode-id="6646"><span data-dcnode-id="6645" instrument_node="">
</span><span data-dcnode-id="6643" style="color: #ffffff;"><span data-dcnode-id="6644" instrument_node="">.</span></span></li><span data-dcnode-id="6641" instrument_node="">
</span><li data-dcnode-id="6632"><span data-dcnode-id="6640" instrument_node="">"My angel will go ahead of you and bring you into the land of the Amorites, Hittites, Perizzites, Canaanites, Hivites and Jebusites, and I will wipe them out." [including the children, as other parts of Scripture make clear] (</span><a data-dcnode-id="6638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.biblegateway.com/passage/%3Fsearch%3DEx.%2B23%253A23%26version%3DNIV"><span data-dcnode-id="6639" instrument_node="">Ex. 23:23</span></a><span data-dcnode-id="6637" instrument_node="">)</span><br data-dcnode-id="6636"><span data-dcnode-id="6635" instrument_node="">
</span><span data-dcnode-id="6633" style="color: #ffffff;"><span data-dcnode-id="6634" instrument_node="">.</span></span></li><span data-dcnode-id="6631" instrument_node="">
</span><li data-dcnode-id="6622"><span data-dcnode-id="6630" instrument_node="">"Fathers are not to be put to death for their children or children for their fathers; each person will be put to death for his own sin.&nbsp; Do not deny justice to a foreigner or fatherless child, and do not take a widow's garment as security. &nbsp;Remember that you were a slave in Egypt, and the Lord your God redeemed you from there. Therefore I am commanding you to do this." (</span><a data-dcnode-id="6628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.biblegateway.com/passage/%3Fsearch%3DDeut%2B24%253A16-18%26version%3DHCSB"><span data-dcnode-id="6629" instrument_node="">Deut. 24:16-18</span></a><span data-dcnode-id="6627" instrument_node="">)</span><br data-dcnode-id="6626"><span data-dcnode-id="6625" instrument_node="">
</span><span data-dcnode-id="6623" style="color: #ffffff;"><span data-dcnode-id="6624" instrument_node="">.</span></span></li><span data-dcnode-id="6621" instrument_node="">
</span><li data-dcnode-id="6616"><span data-dcnode-id="6620" instrument_node="">"Yet you ask, 'Why does the son not share the guilt of his father?' Since the son has done what is just and right and has been careful to keep all my decrees, he will surely live. The one who sins is the one who will die. The son will not share the guilt of the father, nor will the father share the guilt of the son. The righteousness of the righteous will be credited to them, and the wickedness of the wicked will be charged against them." (</span><a data-dcnode-id="6618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.biblegateway.com/passage/%3Fsearch%3DEzekiel%2B18%253A19-20%26version%3DNIV"><span data-dcnode-id="6619" instrument_node="">Ezekiel 18:19-20</span></a><span data-dcnode-id="6617" instrument_node="">)</span></li><span data-dcnode-id="6615" instrument_node="">
</span></ol><span data-dcnode-id="6613" instrument_node="">
</span><p data-dcnode-id="6611"><span data-dcnode-id="6612" instrument_node="">The tension lies within the pages of Hebrew Scripture itself. &nbsp;We have to understand in what sense all of these Scriptures can be true.</span></p><span data-dcnode-id="6610" instrument_node="">
</span><p data-dcnode-id="6607"><strong data-dcnode-id="6608"><span data-dcnode-id="6609" instrument_node="">The Righteousness of God</span></strong></p><span data-dcnode-id="6606" instrument_node="">
</span><p data-dcnode-id="6601"><span data-dcnode-id="6605" instrument_node="">Let me start by demolishing the idea that "God created all of us and therefore He can do whatever He wants." &nbsp;If this were true, there would be no meaning in saying that God is just and righteous in how he treats us. &nbsp;It wouldn't allow us to predict anything whatsoever about what he would do. &nbsp;Yet St. Abraham—our father in faith—pleads for Sodom and Gommorah by asking: "Far be it from you to do such a thing--to kill the righteous with the wicked, treating the righteous and the wicked alike. Far be it from you! Will not the Judge of all the earth do right?" (</span><a data-dcnode-id="6603" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.biblegateway.com/passage/%3Fsearch%3DGen%2B18%253A25%26version%3DNIV"><span data-dcnode-id="6604" instrument_node="">Gen. 18:25</span></a><span data-dcnode-id="6602" instrument_node="">).&nbsp; God does not respond by saying "Whatever I do is just by definition". &nbsp;Rather, he grants Abraham's requests, and goes beyond them to ensure that, in this case, the innocent are not punished alongside the guilty. &nbsp;The fact that God is just, implies that there are some things which he won't do—because they are unfair.</span></p><span data-dcnode-id="6600" instrument_node="">
</span><p data-dcnode-id="6598"><span data-dcnode-id="6599" instrument_node="">Because of this, I reject any "divine command theory" in which morality is simply a matter of what God happens to arbitrarily command.&nbsp; No, morality is rooted in God's own character, in his essential and immutable goodness and love!</span></p><span data-dcnode-id="6597" instrument_node="">
</span><p data-dcnode-id="6595"><span data-dcnode-id="6596" instrument_node="">As St. Geroge MacDonald wrote:</span></p><span data-dcnode-id="6594" instrument_node="">
</span><blockquote data-dcnode-id="6588"><p data-dcnode-id="6589"><span data-dcnode-id="6593" instrument_node="">If you say, That may be right of God to do which it would not be right of man to do, I answer, Yes, because the relation of the maker to his creatures is very different from the relation of one of those creatures to another, and he has therefore duties toward his creatures requiring of him what no man would have the right to do to his fellow-man; but he can have no duty that is not both just and merciful.&nbsp; More is required of the maker, by his own act of creation, than can be required of men. More and higher justice and righteousness is required of him by himself, the Truth;--greater nobleness, more penetrating sympathy; and&nbsp;nothing&nbsp;but what, if an honest man understood it, he would say was right.&nbsp; If it be a thing man cannot understand, then man can say nothing as to whether it is right or wrong.&nbsp; He cannot even know that God does&nbsp;it, when the&nbsp;it&nbsp;is unintelligible to him.&nbsp; What he calls&nbsp;it&nbsp;may be but the smallest facet of a composite action.&nbsp; His part is silence.&nbsp;&nbsp;(</span><a data-dcnode-id="6591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.online-literature.com/george-macdonald/unspoken-sermons/31/"><span data-dcnode-id="6592" instrument_node="">Unspoken Sermons</span></a><span data-dcnode-id="6590" instrument_node="">)</span></p></blockquote><span data-dcnode-id="6587" instrument_node="">
</span><p data-dcnode-id="6582"><span data-dcnode-id="6586" instrument_node="">St. MacDonald himself was famously unwilling to accept any doctrine (however much theologians might claim it was supported by Scripture) that would paint God's character in a bad light.&nbsp; I myself take a more conservative point of view regarding the reliability of Scripture, but this does not change the fact that, as I </span><a data-dcnode-id="6584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.wall.org/~aron/blog/for-the-love-of-god/" title="For the Love of God!"><span data-dcnode-id="6585" instrument_node="">wrote in another post</span></a><span data-dcnode-id="6583" instrument_node="">:</span></p><span data-dcnode-id="6581" instrument_node="">
</span><blockquote data-dcnode-id="6578"><p data-dcnode-id="6579"><span data-dcnode-id="6580" instrument_node="">The doctrine that God is good is more fundamental even than the doctrine that the Scriptures are inspired.&nbsp; So that if it were necessary to choose between them (which it is not!) one should certainly pick the former over the latter.&nbsp; This is the faith of Abraham, who lived before any part of our current Bible was written.</span></p></blockquote><span data-dcnode-id="6577" instrument_node="">
</span><p data-dcnode-id="6575"><span data-dcnode-id="6576" instrument_node="">Even Abraham, when he God asked him to sacrifice his son Isaac, started to obey God only because he believed&nbsp;that God intended it for good.&nbsp; As the New Testament interprets the story:</span></p><span data-dcnode-id="6574" instrument_node="">
</span><blockquote data-dcnode-id="6566"><p data-dcnode-id="6567"><span data-dcnode-id="6573" instrument_node="">By faith Abraham, when God tested him, offered Isaac as a sacrifice.&nbsp;He who had embraced the promises was about to sacrifice his one and only son, even though God had said to him, “It is through Isaac that your offspring will be reckoned.” Abraham reasoned that God could even raise the dead,&nbsp;and so in a manner of speaking he did receive Isaac back from death.&nbsp; </span><em data-dcnode-id="6568"><span data-dcnode-id="6572" instrument_node="">(</span><a data-dcnode-id="6570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biblegateway.com/passage/%3Fsearch%3DHebrews%2B11%253A17-19%26version%3DNIV"><span data-dcnode-id="6571" instrument_node="">Hebrews 11:17-19</span></a><span data-dcnode-id="6569" instrument_node="">)</span></em></p></blockquote><span data-dcnode-id="6565" instrument_node="">
</span><p data-dcnode-id="6563"><span data-dcnode-id="6564" instrument_node="">And this interpetation can be shown to be reasonable in the original text based on Abraham's own words:</span></p><span data-dcnode-id="6562" instrument_node="">
</span><blockquote data-dcnode-id="6543"><p data-dcnode-id="6544"><span data-dcnode-id="6561" instrument_node="">He said to his servants, “Stay here with the donkey while </span><strong data-dcnode-id="6559"><span data-dcnode-id="6560" instrument_node="">I and&nbsp;</span></strong><strong data-dcnode-id="6557"><span data-dcnode-id="6558" instrument_node="">the boy</span></strong><span data-dcnode-id="6556" instrument_node=""> go over there. </span><strong data-dcnode-id="6554"><span data-dcnode-id="6555" instrument_node="">We</span></strong><span data-dcnode-id="6553" instrument_node=""> will worship and then </span><strong data-dcnode-id="6551"><span data-dcnode-id="6552" instrument_node="">we</span></strong><span data-dcnode-id="6550" instrument_node=""> will come back to you.”&nbsp; </span><em data-dcnode-id="6545"><span data-dcnode-id="6549" instrument_node="">(</span><a data-dcnode-id="6547" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/genesis/22-5.htm"><span data-dcnode-id="6548" instrument_node="">Genesis 22:5</span></a><span data-dcnode-id="6546" instrument_node="">, emphasis added)</span></em></p></blockquote><span data-dcnode-id="6542" instrument_node="">
</span><p data-dcnode-id="6540"><span data-dcnode-id="6541" instrument_node="">In other words, Abraham believed that Isaac would somehow be returned to him, even after having been sacrificed.&nbsp; He made the decision to interpret even God's most terrible command in a way that was consistent with his goodness, and faithfulness to his promises.&nbsp; In this way he is a microcosm of our decision, whether to obey God even when it may (falsely) appear that he is acting malevolently towards us, or another person.</span></p><span data-dcnode-id="6539" instrument_node="">
</span><p data-dcnode-id="6534"><span data-dcnode-id="6538" instrument_node="">Furthermore, as Christians, we interpret the entire Bible (as well as&nbsp;</span><a data-dcnode-id="6536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.wall.org/~aron/blog/god-and-evil/" title="God and Evil"><span data-dcnode-id="6537" instrument_node="">all the evil</span></a><span data-dcnode-id="6535" instrument_node="">&nbsp;that appears in the world) in light of the love which Jesus showed on the Cross.&nbsp; Jesus is the highest revelation from God, the place where God's character becomes most clear.&nbsp; Every other place in the Bible (especially the Old Testament, where God was revealing himself in a more imperfect way to people at a lower stage of spiritual development) must be interpreted in light of this.</span></p><span data-dcnode-id="6533" instrument_node="">
</span><p data-dcnode-id="6531"><span data-dcnode-id="6532" instrument_node="">So in light of all this, what do we make of passages in which, e.g. God orders the genocide of various ancient Caananite tribes?</span></p><span data-dcnode-id="6530" instrument_node="">
</span><p data-dcnode-id="6525"><span data-dcnode-id="6529" instrument_node="">Wrestling with the text in silence is one possible answer, as St. MacDonald suggests above.&nbsp; But I think there are at least a few things that can be said, from our own limited human perspective.&nbsp; (If nothing else, we can always remind ourselves just how limited our own perspective must be, in comparison with that of God, who sees everything!)&nbsp; As the sovereign Lord who loves humankind, God's orders to kill simply </span><em data-dcnode-id="6527"><span data-dcnode-id="6528" instrument_node="">cannot</span></em><span data-dcnode-id="6526" instrument_node=""> be regarded as being at all similar to that of a human murderer.&nbsp; This is true for at least four reasons:</span></p><span data-dcnode-id="6524" instrument_node="">
</span><p data-dcnode-id="6520"><strong data-dcnode-id="6521"><span data-dcnode-id="6522" style="text-decoration: underline;"><span data-dcnode-id="6523" instrument_node="">I. God has rightful authority over human life, humans do not</span></span></strong></p><span data-dcnode-id="6519" instrument_node="">
</span><p data-dcnode-id="6514"><span data-dcnode-id="6518" instrument_node="">God IS the ruler of the universe. &nbsp;This gives him the authority to make decisions which ordinary human beings are not allowed to make. &nbsp;Just like an earthly Governor or Judge has authority to do some things which ordinary citizens don't have the right to do, God has the authority to do anything, i.e. any type of act. &nbsp;For example, everything belongs to God, so when he takes things from us it is not stealing, but doing what he likes with his own property.&nbsp; Similarly, if God kills people it is not murder, because our lives belong to him (</span><a data-dcnode-id="6516" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//biblehub.com/deuteronomy/32-39.htm"><span data-dcnode-id="6517" instrument_node="">Deut. 32:39</span></a><span data-dcnode-id="6515" instrument_node="">).</span></p><span data-dcnode-id="6513" instrument_node="">
</span><p data-dcnode-id="6505"><span data-dcnode-id="6512" instrument_node="">(This does not, I think contradict the point of the previous section, in which I rejected the theory in which morality reduces to arbitrary divine commands.&nbsp; The&nbsp;</span><em data-dcnode-id="6510"><span data-dcnode-id="6511" instrument_node="">scope</span></em><span data-dcnode-id="6509" instrument_node="">&nbsp;of authority is different from how one&nbsp;</span><em data-dcnode-id="6507"><span data-dcnode-id="6508" instrument_node="">uses</span></em><span data-dcnode-id="6506" instrument_node="">&nbsp;that authority. &nbsp;God has the authority to do anything, precisely because, since he is perfectly good, he never abuses this authority, but only does what is just and right.)</span></p><span data-dcnode-id="6504" instrument_node="">
</span><p data-dcnode-id="6499"><span data-dcnode-id="6503" instrument_node="">Note that, as the ruler of the universe God actually kills&nbsp;</span><em data-dcnode-id="6501"><span data-dcnode-id="6502" instrument_node="">everyone</span></em><span data-dcnode-id="6500" instrument_node="">.&nbsp; All people are mortal, some of them die young, and God is responsible for this state of affairs. &nbsp;Sometimes he does it miraculously in order to make a special point, but more often it he causes it to happen naturally. &nbsp;Before I ask whether I can trust a God who killed the Caananite children, I first need to ask whether I can trust a God who will kill ME.&nbsp; As Christians, we trust that God is using death as a tool in order to turn us into the people he wants us to become.&nbsp; Partly, we trust him because he came to Earth as Jesus, and died for us on the Cross, so he isn't asking us to suffer anything which he hasn't gone through himself.</span></p><span data-dcnode-id="6498" instrument_node="">
</span><p data-dcnode-id="6494"><span data-dcnode-id="6495" style="text-decoration: underline;"><strong data-dcnode-id="6496"><span data-dcnode-id="6497" instrument_node="">II. God is always benevolent, human killers are not</span></strong></span></p><span data-dcnode-id="6493" instrument_node="">
</span><p data-dcnode-id="6488"><span data-dcnode-id="6492" instrument_node="">God's motivations for killing people are not the same as that of a human murderer. &nbsp;Most of the time, people kill other people out of hatred, because they want something bad to happen to them, or because they don't care about them. &nbsp;But God solemnly swears to us that this is not why he does it. "As surely as I live, declares the Sovereign Lord, I take no pleasure in the death of the wicked, but rather that they turn from their ways and live" (</span><a data-dcnode-id="6490" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.biblegateway.com/passage/%3Fsearch%3DEz%2B33%253A11%26version%3DNIV"><span data-dcnode-id="6491" instrument_node="">Ezekiel 33:11</span></a><span data-dcnode-id="6489" instrument_node="">)</span></p><span data-dcnode-id="6487" instrument_node="">
</span><p data-dcnode-id="6482"><span data-dcnode-id="6486" instrument_node="">To illustrate this: Suppose that a baby is very sick and a surgeon cuts his chest open in order to operate on his heart and save his life.&nbsp; Now the surgeon's act of cutting open the baby cannot be regarded as being in the same moral world as if he were a Nazi, cutting open the baby's chest cavity out of callous indifference.&nbsp; It is in fact </span><em data-dcnode-id="6484"><span data-dcnode-id="6485" instrument_node="">totally the opposite</span></em><span data-dcnode-id="6483" instrument_node="">&nbsp;because it is done with the intention of healing, rather than harming, the innocent.</span></p><span data-dcnode-id="6481" instrument_node="">
</span><p data-dcnode-id="6473"><span data-dcnode-id="6480" instrument_node="">Now Jesus is "the Resurrection and the Life" (</span><a data-dcnode-id="6478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/john/11-25.htm"><span data-dcnode-id="6479" instrument_node="">John 11:25</span></a><span data-dcnode-id="6477" instrument_node="">).&nbsp; So when he chooses to take a child to himself (ending its earthly life), this is because he is able to give it a heavenly life which is far superior to anything it would have on Earth, in the bosom of the Father who cares for him.&nbsp; If we have faith in God, then we must believe that whenever he takes the life of an innocent person, he is </span><em data-dcnode-id="6475"><span data-dcnode-id="6476" instrument_node="">much more</span></em><span data-dcnode-id="6474" instrument_node=""> like the diligent surgeon, then he is anything like the Nazi.&nbsp; In other words, we believe that he is acting for the good of the person concerned.</span></p><span data-dcnode-id="6472" instrument_node="">
</span><p data-dcnode-id="6467"><span data-dcnode-id="6471" instrument_node="">Since we on this side of the curtain of death and can only speculate about what is on the other side, </span><em data-dcnode-id="6469"><span data-dcnode-id="6470" instrument_node="">we</span></em><span data-dcnode-id="6468" instrument_node=""> do not have any such authority over the lives of our felow human beings.&nbsp; God expects us to obey the commandment "Do not murder", which means that, apart from exceptional situations (just war, punishment for crime, etc) we are not to kill other human beings.&nbsp; However, this situation does not obtain in biblical situations where God himself orders people to kill, since there God is exercising his own authority over life and death, and is using the humans involved only as his instruments.</span></p><span data-dcnode-id="6466" instrument_node="">
</span><p data-dcnode-id="6462"><span data-dcnode-id="6463" style="text-decoration: underline;"><strong data-dcnode-id="6464"><span data-dcnode-id="6465" instrument_node="">III. God is incorruptible, humans are not</span></strong></span></p><span data-dcnode-id="6461" instrument_node="">
</span><p data-dcnode-id="6459"><span data-dcnode-id="6460" instrument_node="">God is unchangable. &nbsp;If you or I killed somebody, we would become more violent and hateful people who would be more likely to kill someone else. &nbsp;Whereas God's character, being eternal, cannot be corrupted.&nbsp; Paradoxically, this means that a perfectly good being may be more likely than a good human to do bad things in order to produce good consequences.&nbsp; Unlike us, he doesn't need to worry about his motivations being wrong, or it producing bad habits of character.</span></p><span data-dcnode-id="6458" instrument_node="">
</span><p data-dcnode-id="6447"><span data-dcnode-id="6457" instrument_node="">(This consideration does not apply completely to cases in which, rather than taking a human life himself, God orders another person to do it; since that human being could certainly be norally corrupted.&nbsp; In this case, it would have been important to make sure that the humans are acting solely based on obedience to God's command, and </span><em data-dcnode-id="6455"><span data-dcnode-id="6456" instrument_node="">not</span></em><span data-dcnode-id="6454" instrument_node=""> for the sake of the benefits they might receive.&nbsp; This may be why God strictly commanded the Israelites not to take any plunder from the Canaanite cities they conquered—a rule that was enforced in&nbsp;</span><a data-dcnode-id="6452" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biblegateway.com/passage/%3Fsearch%3DJoshua%25207%26version%3DNIV"><span data-dcnode-id="6453" instrument_node="">Joshua 7</span></a><span data-dcnode-id="6451" instrument_node="">—in order&nbsp;to make it clear that they were acting as agents of divine wrath on those cities, and </span><em data-dcnode-id="6449"><span data-dcnode-id="6450" instrument_node="">not</span></em><span data-dcnode-id="6448" instrument_node=""> for personally selfish reasons.)</span></p><span data-dcnode-id="6446" instrument_node="">
</span><p data-dcnode-id="6442"><span data-dcnode-id="6443" style="text-decoration: underline;"><strong data-dcnode-id="6444"><span data-dcnode-id="6445" instrument_node="">IV. God has complete knowledge, humans do not</span></strong></span></p><span data-dcnode-id="6441" instrument_node="">
</span><p data-dcnode-id="6439"><span data-dcnode-id="6440" instrument_node="">God is omniscient, so he knows when a group of people have become so wicked that it would be bad for them, and for their children, and for the rest of the world, if they remain alive to keep sinning. &nbsp;For example, the Canaanites sacrificed their children as part of their religion, and if God hadn't put an end to them, we might still be doing that today.&nbsp; It may seem ironic that God also ordered that their innocent children be killed, but remember that they would not have remained innocent if they had been able to come to maturity. &nbsp;Instead they went to Heaven, which might not have been possible if they had been corrupted by the religion of their parents.</span></p><span data-dcnode-id="6438" instrument_node="">
</span><p data-dcnode-id="6430"><span data-dcnode-id="6437" instrument_node="">We humans, on the other hand, have a very limited ability to guess the future.&nbsp; Therefore no human being could ethically order a genocide on his own cognizance, because we are </span><em data-dcnode-id="6435"><span data-dcnode-id="6436" instrument_node="">never</span></em><span data-dcnode-id="6434" instrument_node=""> really in a good position to be morally certain that the speculative goods arising from the elimination of a culture outweigh the </span><em data-dcnode-id="6432"><span data-dcnode-id="6433" instrument_node="">immediate and obvious</span></em><span data-dcnode-id="6431" instrument_node=""> evils involved in killing a large cultural group.&nbsp;&nbsp;Furthermore any such decision would almost certainly be tainted by prejudice and racism, rather than being an act of impartial justice.</span></p><span data-dcnode-id="6429" instrument_node="">
</span><p data-dcnode-id="6424"><span data-dcnode-id="6428" instrument_node="">Unlike humans, God is free from such favoritism (</span><a data-dcnode-id="6426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/acts/10-34.htm"><span data-dcnode-id="6427" instrument_node="">Acts 10:34</span></a><span data-dcnode-id="6425" instrument_node="">), and only acts in ways that he knows are just and merciful (even if his reasons may sometimes be obscure to us).</span></p><span data-dcnode-id="6423" instrument_node="">
</span><p data-dcnode-id="6420"><strong data-dcnode-id="6421"><span data-dcnode-id="6422" instrument_node="">Group vs. Individual Justice</span></strong></p><span data-dcnode-id="6419" instrument_node="">
</span><p data-dcnode-id="6417"><span data-dcnode-id="6418" instrument_node="">This brings us back to the group justice vs. individual justice question. &nbsp;Ultimately, I believe God is committed to bring justice and vindication to every innocent person, including those who were victims of bad circumstances. &nbsp;On the other hand, God has also set up the world in such a way that our good or bad actions can have an effect on other people: if we sin against others, they are harmed, and can be tempted either to hate or to imitate us. &nbsp;This is especially true in the case of our parents, who bring us into being and choose what enviornment we will come to maturity in. &nbsp;Because of this strong moral influence, it is inevitable that to some extent our moral and cultural condition is inherited from others. &nbsp;Alcoholic parents often have alcoholic children. &nbsp;We may resist this influence and become different people than our parents, but there is a correlation which cannot be entirely removed.</span></p><span data-dcnode-id="6416" instrument_node="">
</span><p data-dcnode-id="6405"><span data-dcnode-id="6415" instrument_node="">As a result, in his role as Judge of the Earth, Guardian of Human Culture and Supervisor of the Gene Pool, God must necessarily engage in some amount of group justice as well as individual justice, because that is the nature of how humans propagate ourselves (and our ideas).&nbsp; </span><em data-dcnode-id="6413"><span data-dcnode-id="6414" instrument_node="">He does not, however, delegate this authority to us.</span></em><span data-dcnode-id="6412" instrument_node=""> &nbsp;The ordinary Israelite judicial system was based strictly on individual actions (although even there, indirect punishment of others is inevitable: see the story in </span><a data-dcnode-id="6410" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.biblegateway.com/passage/%3Fsearch%3D2%2BSam%2B14%253A5-7%26version%3DNIV"><span data-dcnode-id="6411" instrument_node="">2 Samuel 14:6-7</span></a><span data-dcnode-id="6409" instrument_node=""> for an example).&nbsp; Apart from this, the Israelites were </span><em data-dcnode-id="6407"><span data-dcnode-id="6408" instrument_node="">also</span></em><span data-dcnode-id="6406" instrument_node=""> commanded to exterminate certain people groups, but had no authority to decide which ones—God provided them with a specific and limited list.</span></p><span data-dcnode-id="6404" instrument_node="">
</span><p data-dcnode-id="6402"><span data-dcnode-id="6403" instrument_node="">In the end, God will provide us all with individual justice. &nbsp;But I think that once everything is revealed, our moral interdependence will prove to have been a means of grace. &nbsp;If no innocent people ever suffered punishment for guilty people, then Christ could not have saved us, and we would be dead in our sins. &nbsp;If we ourselves struggle, if sins have been transmitted to us by others, or if the punishment of others has ruined our lives as well, then what?</span></p><span data-dcnode-id="6401" instrument_node="">
</span><p data-dcnode-id="6399"><span data-dcnode-id="6400" instrument_node="">I think that by forgiving our forbears, and by seeking God's help for our problems, we become imitators of Jesus, as St. Peter says:</span></p><span data-dcnode-id="6398" instrument_node="">
</span><blockquote data-dcnode-id="6354"><p data-dcnode-id="6355"><span data-dcnode-id="6397" instrument_node="">For you were called to this,</span><br data-dcnode-id="6396"><span data-dcnode-id="6395" instrument_node="">
because Christ also suffered for you,</span><br data-dcnode-id="6394"><span data-dcnode-id="6393" instrument_node="">
leaving you an example,</span><br data-dcnode-id="6392"><span data-dcnode-id="6391" instrument_node="">
so that you should follow in His steps.</span><br data-dcnode-id="6390"><span data-dcnode-id="6389" instrument_node="">
He did not commit sin,</span><br data-dcnode-id="6388"><span data-dcnode-id="6387" instrument_node="">
and no deceit was found in His mouth;</span><br data-dcnode-id="6386"><span data-dcnode-id="6385" instrument_node="">
when He was reviled,</span><br data-dcnode-id="6384"><span data-dcnode-id="6383" instrument_node="">
He did not revile in return;</span><br data-dcnode-id="6382"><span data-dcnode-id="6381" instrument_node="">
when He was suffering,</span><br data-dcnode-id="6380"><span data-dcnode-id="6379" instrument_node="">
He did not threaten</span><br data-dcnode-id="6378"><span data-dcnode-id="6377" instrument_node="">
but entrusted Himself to the One who judges justly.</span><br data-dcnode-id="6376"><span data-dcnode-id="6375" instrument_node="">
He Himself bore our sins</span><br data-dcnode-id="6374"><span data-dcnode-id="6373" instrument_node="">
in His body on the tree,</span><br data-dcnode-id="6372"><span data-dcnode-id="6371" instrument_node="">
so that, having died to sins,</span><br data-dcnode-id="6370"><span data-dcnode-id="6369" instrument_node="">
we might live for righteousness;</span><br data-dcnode-id="6368"><span data-dcnode-id="6367" instrument_node="">
you have been healed by His wounds.</span><br data-dcnode-id="6366"><span data-dcnode-id="6365" instrument_node="">
For you were like sheep going astray,</span><br data-dcnode-id="6364"><span data-dcnode-id="6363" instrument_node="">
but you have now returned</span><br data-dcnode-id="6362"><span data-dcnode-id="6361" instrument_node="">
to the Shepherd and Guardian of your souls. </span><em data-dcnode-id="6356"><span data-dcnode-id="6360" instrument_node="">(</span><a data-dcnode-id="6358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.biblegateway.com/passage/%3Fsearch%3D1%2BPeter%2B2%253A21-25%26version%3DHCSB"><span data-dcnode-id="6359" instrument_node="">1 Peter 2:21-25</span></a><span data-dcnode-id="6357" instrument_node="">)</span></em></p></blockquote><span data-dcnode-id="6353" instrument_node="">
</span><p data-dcnode-id="6351"><span data-dcnode-id="6352" instrument_node="">If Christ—the Innocent One—suffered for the sins of others and brought about the redemption of the world, then all of us who in lighter measure bear the sin of others, will also recieve through Christ this redemption. &nbsp;From the the infants killed by St. Joshua for the sins of the guilty Canaanites, to the infants killed by wicked Herod in place of the innocent Christ-child, everyone who has a share in the sufferings of Christ will also rise with him in eternal glory. &nbsp;This is both a justice and a mercy beyond our comprehension.</span></p><span data-dcnode-id="6350" instrument_node="">
</span><p data-dcnode-id="6347"><em data-dcnode-id="6348"><span data-dcnode-id="6349" instrument_node="">[Note: I expanded this blog post significantly on Aug 16, 2021.&nbsp; </span></em></p><span data-dcnode-id="6346" instrument_node="">
</span><p data-dcnode-id="6340"><em data-dcnode-id="6341"><span data-dcnode-id="6345" instrument_node="">Also, there are a lot of people who have read this post and comment on it solely for purposes of expressing their anger against the God of the Bible, or that anyone could believe in such a Deity.&nbsp; Most of these comments don't engage in any substantive way with the things I've written.&nbsp; If you wish to make an argument against this blog post, please make sure to re-read the four sections labelled </span><strong data-dcnode-id="6343"><span data-dcnode-id="6344" instrument_node="">I-IV</span></strong><span data-dcnode-id="6342" instrument_node=""> and then make sure that what you are saying is actually responsive what I've written.&nbsp; Thanks!—AW]</span></em></p><span data-dcnode-id="6339" instrument_node="">
</span></div><span data-dcnode-id="6336" instrument_node="">

</span><div class="comment-body" data-dcnode-id="6188"><p data-dcnode-id="6190"><span data-dcnode-id="6191" instrument_node="">No, thank you, Aron, for all of your work for the Kingdom. In addition to the high admiration I have for your blog writings, I've also thoroughly enjoyed your technical articles as well. I recently attended the Craig vs. Carroll debate at which Dr. Craig cited one of your papers; that's the way in which I came across your work. I have to say that it is very encouraging and inspiring to see someone with your level of intellect also be so ardent a Christian. I appreciate it.</span></p><span data-dcnode-id="6189" instrument_node="">

</span><div class="comment-meta commentmetadata" data-dcnode-id="6162"><a data-dcnode-id="6164" href="#comment-2637696"><span data-dcnode-id="6165" instrument_node="">
				December 22, 2014 at 3:24 AM</span></a><span data-dcnode-id="6163" instrument_node=""> </span></div><span data-dcnode-id="6160" instrument_node="">
</span><div class="comment-body" data-dcnode-id="6122"><p data-dcnode-id="6156"><span data-dcnode-id="6159" instrument_node="">Hello Aaron, I just read this post and found it most interesting. But there are some points I feel I must take issue with.</span><br data-dcnode-id="6158"><span data-dcnode-id="6157" instrument_node="">
Firstly you states “God IS the ruler of the universe.  This gives him authority to make decisions which ordinary human beings are not allowed to make.  Just like an earthly Governor or Judge has authority to do some things which ordinary citizens don't have the right to do, God has the authority to do anything,”</span></p><span data-dcnode-id="6155" instrument_node="">
</span><p data-dcnode-id="6149"><span data-dcnode-id="6154" instrument_node="">I don’t see how this follows. The fact that someone rules does not necessarily give them moral authority.  I don’t think you would doubt that Kim Jong Un is the ruler of North Korea. But it doesn’t follow that he has legitimate authority to imprison his own population. You need to establish how authority is made legitimate and then show that god does this. Simply declaring him ruler does not achieve this.</span><br data-dcnode-id="6153"><span data-dcnode-id="6152" instrument_node="">
It is certainly possible that an intelligent being created the universe but does not rule it or  even communicate with it.</span><br data-dcnode-id="6151"><span data-dcnode-id="6150" instrument_node="">
If Kim Jung On murders his own people, is it murder? </span></p><span data-dcnode-id="6148" instrument_node="">
</span><p data-dcnode-id="6146"><span data-dcnode-id="6147" instrument_node="">I also think your argument is circular; you are assuming that god is perfectly good and then stating his killing of the innocent can’t be an abuse of authority because he is perfectly good. Of course if you assume has perfectly good then that’s true. But perhaps god is not perfectly good. Surely killing innocents disqualifies him from being perfectly good. If that doesn’t, what would? </span></p><span data-dcnode-id="6145" instrument_node="">
</span><p data-dcnode-id="6141"><span data-dcnode-id="6144" instrument_node="">I don’t thin it follows that if god created there world with beings who are mortal, then he actually kills them. This is a weird definition of killing.  If i create a computer that cannot last forever and then it breaks down, did I break it?</span><br data-dcnode-id="6143"><span data-dcnode-id="6142" instrument_node="">
Killing is to deprive someone of life. If someone dies of old age, no one would say they have been killed. </span></p><span data-dcnode-id="6140" instrument_node="">
</span><p data-dcnode-id="6138"><span data-dcnode-id="6139" instrument_node="">The point is, by selecting, say, the first born Egyptian for premature death well before their normal mortality would have kicked in he acted unjustly. Think of the mothers crying over the death of their young children, is it just to make them go through that rather than letting the children grow up and run the normal course of their lives?</span></p><span data-dcnode-id="6137" instrument_node="">
</span><p data-dcnode-id="6135"><span data-dcnode-id="6136" instrument_node="">You say god is omniscient so he knows when a people have become so wicked that they and all their children should be killed.  So why did the animals have to be killed as well? Were they so wicked too? I think this is a crucial point you have over looked. </span></p><span data-dcnode-id="6134" instrument_node="">
</span><p data-dcnode-id="6130"><span data-dcnode-id="6133" instrument_node="">You have not presented any evidence that the Canaanites really did carry out child sacrifice and even if they did why that does mean their children and animals have to be killed?</span><br data-dcnode-id="6132"><span data-dcnode-id="6131" instrument_node="">
If the entire parent were killed and the children and animals adopted, cared for and loved would that mean they would still be doing child sacrifices? Do you think that there is a gene for this? </span></p><span data-dcnode-id="6129" instrument_node="">
</span><p data-dcnode-id="6127"><span data-dcnode-id="6128" instrument_node="">When a society does carry out child sacrifice I doubt they kill all their children, which is what god commanded the Hebrews to do, how is killing all the children better than killing some of them? </span></p><span data-dcnode-id="6126" instrument_node="">
</span><p data-dcnode-id="6124"><span data-dcnode-id="6125" instrument_node="">People need to be judged by their actions, judging them by which group they belong to is just another form for racism. By justifying winnowing the gene pool for dislikable groups it’s a particularly scary form of racism quite frankly.</span></p><span data-dcnode-id="6123" instrument_node="">

</span><div class="comment-body" data-dcnode-id="5988"><p data-dcnode-id="6091"><span data-dcnode-id="6092" instrument_node="">Thanks for your comment, howie.</span></p><span data-dcnode-id="6090" instrument_node="">
</span><p data-dcnode-id="6082"><span data-dcnode-id="6089" instrument_node="">First let me address the issue of circular reasoning.  Circular reasoning is only an issue when you are trying to prove that an idea is </span><i data-dcnode-id="6087"><span data-dcnode-id="6088" instrument_node="">true</span></i><span data-dcnode-id="6086" instrument_node="">.  But when somebody raises an objection to an idea you believe, and you are trying merely to prove that the idea is </span><i data-dcnode-id="6084"><span data-dcnode-id="6085" instrument_node="">consistent</span></i><span data-dcnode-id="6083" instrument_node="">, then in order to do that you only need to describe an account of how it could make sense.  In constructing this account, it is perfectly valid and acceptable (indeed necessary) to assume for the sake of argument that the idea in question is true, to see what does and does not follow.</span></p><span data-dcnode-id="6081" instrument_node="">
</span><p data-dcnode-id="6076"><span data-dcnode-id="6080" instrument_node="">I do believe that there is good reason to believe that God is perfectly good, partly for philosophical reasons which I will eventually get to in my current series on “Fundamental Reality”, and partly for historical reasons having to do with the teaching, moral character, and miracles of Jesus.  But the purpose of this post was not to prove that God is perfectly good.  It was merely to address a purported inconsistency between God being good, and his orders to e.g. kill the Caananites.  The original question was, </span><i data-dcnode-id="6078"><span data-dcnode-id="6079" instrument_node="">assuming</span></i><span data-dcnode-id="6077" instrument_node=""> the biblical accounts of these events to be accurate, is it consistent with God being loving and good?</span></p><span data-dcnode-id="6075" instrument_node="">
</span><p data-dcnode-id="6073"><span data-dcnode-id="6074" instrument_node="">Now about authority.  If somebody steals something from me, as a private citizen I have no political authority to imprison the thief in my basement as a punishment.  Nor do I have the authority to kill somebody I believe is a murderer.  Only the state has the political authority to do that (operating according to the established judicial, police or military rules suitable to the situation).  Apart from exceptional circumstances such as self-defence, citizens have the moral duty not to undermine the political order by taking justice into their own hand.</span></p><span data-dcnode-id="6072" instrument_node="">
</span><p data-dcnode-id="6070"><span data-dcnode-id="6071" instrument_node="">Kim Jong Un is the ruler of North Korea, and as such he does have some legitimate authority which I lack, although this authority is not unlimited.  For example, if one person in North Korea stole something from his neighbor, as the ruler Kim would have the authority to imprison that person as a punishment.</span></p><span data-dcnode-id="6069" instrument_node="">
</span><p data-dcnode-id="6067"><span data-dcnode-id="6068" instrument_node="">Now in fact Kim is a brutal and capricious tyrant.  So his actions are often unjust, either because he abuses his authority (for example, by imprisoning and killing people for arbitrary or personal reasons) or because he exceeds his authority (for example, by requiring people to give him honors which belong only to God).  That is tragic, but it doesn't change the fact that he is acting legitimately whenever he uses the powers of the state to punish actual wrongdoers.</span></p><span data-dcnode-id="6066" instrument_node="">
</span><p data-dcnode-id="6064"><span data-dcnode-id="6065" instrument_node="">Indeed, the North Korean dictatorship is so unjust that it would be morally right for him to be overthrown by a revolution and replaced by a different form of government.  But even that does not change the fact that, while his power lasts, he has legitimate functions.</span></p><span data-dcnode-id="6063" instrument_node="">
</span><p data-dcnode-id="6055"><span data-dcnode-id="6062" instrument_node="">So in order for killing someone to be moral, it is (normally) necessary but not sufficient that the killer have the authority to do so.  If I kill a murderer, you can criticize me for acting outside my authority, whereas if a lawfully convened judge and jury sentence a person to death, they cannot be criticized for acting without authority, although they might be criticized for another reason (e.g. acting on insufficient evidence).  As I said, “The </span><i data-dcnode-id="6060"><span data-dcnode-id="6061" instrument_node="">scope</span></i><span data-dcnode-id="6059" instrument_node=""> of authority is different from how one </span><i data-dcnode-id="6057"><span data-dcnode-id="6058" instrument_node="">uses</span></i><span data-dcnode-id="6056" instrument_node=""> that authority”.</span></p><span data-dcnode-id="6054" instrument_node="">
</span><p data-dcnode-id="6049"><span data-dcnode-id="6053" instrument_node="">Now God has complete and perfect authority, not merely because he is the ruler and creator of the world, but also because he is completely and totally wise and good; in fact he is the source from which all other wisdom and goodness flows.  Do I really need to explain why such a being would have the right to rule as well as the power to rule?  (An intelligent but limited alien being, who created the universe but wasn't perfect and didn't care for it intimately, would not at all be the same situation.)  God can be trusted not to abuse his authority in any way, although we in our limited knowledge may have questions and concerns about what he does.  He always chooses to do what produces on balance the most good, and </span><i data-dcnode-id="6051"><span data-dcnode-id="6052" instrument_node="">for this very reason</span></i><span data-dcnode-id="6050" instrument_node=""> may do some things which would be prohibited if you or I did them.</span></p><span data-dcnode-id="6048" instrument_node="">
</span><p data-dcnode-id="6046"><span data-dcnode-id="6047" instrument_node="">Now it is not extremely implausible that there have existed, in human history, some cultural groups which the world would have been better off without.  But I claim that no human society has the moral authority to make this judgment, because (a) we don't have sufficient information to decide this reliably, (b) we would be morally corrupted by trying to do it, and (c) it would disrupt the international political order if people could decide to do this on their own initiative.  Thus we human beings are best served by an absolute rule prohibiting genocide, with no exceptions.</span></p><span data-dcnode-id="6045" instrument_node="">
</span><p data-dcnode-id="6043"><span data-dcnode-id="6044" instrument_node="">But none of these three reasons (a-c) apply to God, who is omniscient, unchangable, and in charge of the human community rather than (by nature) a member of it.  Thus if God were to reveal by clear and unmistakable signs (such as we read about in the Torah) that he wanted a cultural group to be wiped out, I claim that the usual reasons for prohibiting genocide would not apply.  Of course, if somebody falsely claimed to have divine authority to kill people, then religious and secular people alike can agree that this would be very wrong.</span></p><span data-dcnode-id="6042" instrument_node="">
</span><blockquote data-dcnode-id="6039"><p data-dcnode-id="6040"><span data-dcnode-id="6041" instrument_node="">
But perhaps god is not perfectly good. Surely killing innocents disqualifies him from being perfectly good. If that doesn’t, what would?
</span></p></blockquote><span data-dcnode-id="6038" instrument_node="">
</span><p data-dcnode-id="6036"><span data-dcnode-id="6037" instrument_node="">If God were not perfectly good, that would be a different situation.  In the context of the question, I only need to ask what a perfectly good being might do.  </span></p><span data-dcnode-id="6035" instrument_node="">
</span><p data-dcnode-id="6033"><span data-dcnode-id="6034" instrument_node="">Killing innocents without sufficiently good reason would indicate that a being is not perfectly good.  It is not necessary that the reason be one we can fully understand, although in this case God did choose to disclose some, but not necessarily all, of his reasons.</span></p><span data-dcnode-id="6032" instrument_node="">
</span><blockquote data-dcnode-id="6029"><p data-dcnode-id="6030"><span data-dcnode-id="6031" instrument_node="">
I don’t thin it follows that if god created there world with beings who are mortal, then he actually kills them. This is a weird definition of killing.  If i create a computer that cannot last forever and then it breaks down, did I break it?
</span></p></blockquote><span data-dcnode-id="6028" instrument_node="">
</span><p data-dcnode-id="6026"><span data-dcnode-id="6027" instrument_node="">When you create a computer, you build it out of pre-existing materials and then it has an existence independent from you.  But that is not the relationship between God and the computer.  God is the power which actively sustains the computer at every moment.  Not a single electron moves within its circuitry without his permission and cooperation.  When it breaks down, it breaks down in accordance with his purposes and his plans in order to accomplish his purposes.  Not the same.</span></p><span data-dcnode-id="6025" instrument_node="">
</span><blockquote data-dcnode-id="6022"><p data-dcnode-id="6023"><span data-dcnode-id="6024" instrument_node="">So why did the animals have to be killed as well? Were they so wicked too? I think this is a crucial point you have over looked.</span></p></blockquote><span data-dcnode-id="6021" instrument_node="">
</span><p data-dcnode-id="6019"><span data-dcnode-id="6020" instrument_node="">To me this seems a much lesser concern than the infants.  Animals don't have the same moral status that human beings do.  Even human beings have the moral authority to kill groups of animals for good cause.  Presumably God ordered the destruction of the animals for the same reason as the gold and other property: to prevent the Israelities from thinking that the purpose of the genocide was to enrich themselves, and to emphasize the severity of the judgement.</span></p><span data-dcnode-id="6018" instrument_node="">
</span><blockquote data-dcnode-id="6015"><p data-dcnode-id="6016"><span data-dcnode-id="6017" instrument_node="">
You have not presented any evidence that the Canaanites really did carry out child sacrifice
</span></p></blockquote><span data-dcnode-id="6014" instrument_node="">
</span><p data-dcnode-id="6009"><span data-dcnode-id="6013" instrument_node="">No, but there is evidence.  Carthage seems to have had the same culture and religion as the Canaanites, and we have independent claims from Roman sources (independent from the Bible) that the Carthaginians practiced child sacrifice.  Some scholars used to think this was a lie used to justify the wars, but then they dug up the graves.  I have seen the </span><a data-dcnode-id="6011" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.theguardian.com/science/2014/jan/21/carthaginians-sacrificed-own-children-study" rel="nofollow"><span data-dcnode-id="6012" instrument_node="">Tophet</span></a><span data-dcnode-id="6010" instrument_node=""> in Carthage (a burial place of sacrifices) with my own eyes.  (Most of the graves are animal sacrifices, but some are human infants.)</span></p><span data-dcnode-id="6008" instrument_node="">
</span><p data-dcnode-id="6003"><span data-dcnode-id="6007" instrument_node="">Within the biblical record, we have multiple sources telling us that the Israelites did </span><i data-dcnode-id="6005"><span data-dcnode-id="6006" instrument_node="">not</span></i><span data-dcnode-id="6004" instrument_node=""> in fact kill all the Canaanites, and (just as Moses warned) they were led astray by the worship of Baal and Asherah, and constructed their own Tophet in Jerusalem.</span></p><span data-dcnode-id="6002" instrument_node="">
</span><blockquote data-dcnode-id="5999"><p data-dcnode-id="6000"><span data-dcnode-id="6001" instrument_node="">
If the entire parent were killed and the children and animals adopted, cared for and loved would that mean they would still be doing child sacrifices? Do you think that there is a gene for this?
</span></p></blockquote><span data-dcnode-id="5998" instrument_node="">
</span><p data-dcnode-id="5996"><span data-dcnode-id="5997" instrument_node="">No, I don't think there is a gene for sacrificing children.  I imagine that God's primary objection to the Caananites was their culture rather than their genes.  (I do think that God has a millions of year long genetic experiment involving the human race, so that he might well for all I know have genetic motivations for some of his decisions.  But it's hard to believe that there would be any measurable selection effect on the gene pool after merely hundreds of years of wickedness.)</span></p><span data-dcnode-id="5995" instrument_node="">
</span><p data-dcnode-id="5993"><span data-dcnode-id="5994" instrument_node="">You could ask why God didn't ask the Israelites to just adopt all of the Canaanite children under a certain age.  I don't know, but it's not hard to imagine that there would be practical difficulties given that the Israelities had children of their own, and probably were not prepared to love the Canaanite children equally.  Probably they would have been more likely to end up as a permanent slave class.  In any case they were not the only children in the world to die at a tender age.  Since I maintain that God kills everybody, this is not a difference that matters at the level of divine action.</span></p><span data-dcnode-id="5992" instrument_node="">
</span><p data-dcnode-id="5990"><span data-dcnode-id="5991" instrument_node="">This would only be a “particularly scary form of racism” if I thought that any human being was equipped to make such decisions.  As it is, I only have to sign off on a couple genocides long ago with no implications for any currently existing race of human beings.  And even if the Canaanites did still exist today, the New Covenant message of reconciliation and forgiveness through Christ, for all cultures, would take precedence.</span></p><span data-dcnode-id="5989" instrument_node="">
</span></div><span data-dcnode-id="5987" instrument_node="">

</span><li class="comment odd alt thread-odd thread-alt depth-1" data-dcnode-id="5896" id="li-comment-2637704"><span data-dcnode-id="5977" instrument_node="">
</span><div data-dcnode-id="5899" id="comment-2637704"><span data-dcnode-id="5976" instrument_node="">

</span><cite class="fn" data-dcnode-id="5973"><span data-dcnode-id="5974" instrument_node="">Dennis Jensen</span></cite><span data-dcnode-id="5972" instrument_node=""> </span><span class="says" data-dcnode-id="5970"><span data-dcnode-id="5971" instrument_node="">says:</span></span><span data-dcnode-id="5969" instrument_node=""> </span></div><span data-dcnode-id="5966" instrument_node="">
</span><div class="comment-meta commentmetadata" data-dcnode-id="5962"><a data-dcnode-id="5964" href="#comment-2637704"><span data-dcnode-id="5965" instrument_node="">
				December 22, 2014 at 8:39 PM</span></a><span data-dcnode-id="5963" instrument_node=""> </span></div><span data-dcnode-id="5960" instrument_node="">
</span><div class="comment-body" data-dcnode-id="5905"><p data-dcnode-id="5958"><span data-dcnode-id="5959" instrument_node="">I just refreshed my screen to notice that Aron has just responded to your comments, howie. But this is such an interesting and, in some critics' eyes, devastating criticism of the God of the Bible that I hope you (and Aron) don’t mind that I weigh in some comments as well. Hopefully I won’t duplicate other previous comments too much.</span></p><span data-dcnode-id="5957" instrument_node="">
</span><p data-dcnode-id="5955"><span data-dcnode-id="5956" instrument_node="">God is not depicted in the OT as acting “violently” and barbarically and should not be seen as such any more than our executing a criminal might be thought of as violent and barbaric. God was merely carrying out justice. Remember that God didn’t have the genocide carried out sooner because they didn’t deserve it sooner; the “wickedness of the Amorites” was not yet full (Gen 15.16). Likewise the “plagues” in Egypt were fully deserved when we recall that the Israelites were enslaved and oppressed there for hundreds of years. </span></p><span data-dcnode-id="5954" instrument_node="">
</span><p data-dcnode-id="5952"><span data-dcnode-id="5953" instrument_node="">But the big issue is the death of the innocent. The problem is that the innocent were certainly killed when God required, in justice, that an entire people group be destroyed. </span></p><span data-dcnode-id="5951" instrument_node="">
</span><p data-dcnode-id="5949"><span data-dcnode-id="5950" instrument_node="">Earthly governors and judges do not have authority to do evil; they only have the authority to carry out justice. But our creator has the right to do some things we have no right to do to each other (whether we be rulers or not). If God created us, God has the right to take our lives whenever he chooses. God did not create us with a promise that we should live forever, nor was God obligated to do so. Suffering is not in the same category as death, even if death is seen as cessation of existence. It would be evil of God to cause undeserved suffering unless God has morally justifying reason for doing so and provides equivalent compensation to the recipients of this suffering. It is not evil for God to extinguish a life.</span></p><span data-dcnode-id="5948" instrument_node="">
</span><p data-dcnode-id="5946"><span data-dcnode-id="5947" instrument_node="">But the Christian teaching is that, in fact, death is not our final end. Even if God has the right to cause us to cease to exist, he does not. So the innocent children who were killed when their guilty parents were also killed in the Canaanite genocide were compensated for any undeserved suffering they endured and (from my view of the teaching of scripture) are given another opportunity of life to fulfill their destiny. (It is conceivable that they could be returned to another world much like our own—maybe they will even return to this world. Some theologians think they will be admitted immediately to paradise. Whatever it is, there is no loss to the child who dies prematurely.) </span></p><span data-dcnode-id="5945" instrument_node="">
</span><p data-dcnode-id="5943"><span data-dcnode-id="5944" instrument_node="">The Canaanite civilization needed to be wiped out. The institutionalized evil of child sacrifice they practiced was so horrendous and culturally ingrained that it is very conceivable that God determined that the entire civilization needed to be destroyed. Thus a creator, under the above stipulations, cannot be accused of evil for commanding the Canaanite genocide or, say, the deaths of the firstborn of Egypt. </span></p><span data-dcnode-id="5942" instrument_node="">
</span><p data-dcnode-id="5940"><span data-dcnode-id="5941" instrument_node="">God could have destroyed the Canaanites without commanding the Israelites to do it. God could have sent a plague or, like he did millennia earlier, a flood. But in fact the Canaanite conquest was more merciful than the Flood. God gave them plenty of time, in fact 40 years, to flee before facing the doom they feared (cf. Josh 2.8-11). </span></p><span data-dcnode-id="5939" instrument_node="">
</span><p data-dcnode-id="5937"><span data-dcnode-id="5938" instrument_node="">Today God would not be able to command his followers to carry out a Canaanite genocide—not after we had received Jesus’ teachings. His teachings about not offending these little ones, or that of such is the kingdom of heaven, or that we have to become like children, or that what we have done to the least of these we have done to him all make it impossible that his followers should kill a child. So if God wanted a genocide like this carried out again, he would have to do it himself or use a nation which does not follow Jesus’ teachings. </span></p><span data-dcnode-id="5936" instrument_node="">
</span><p data-dcnode-id="5934"><span data-dcnode-id="5935" instrument_node="">You say, “I don’t think it follows that if god created there world with beings who are mortal, then he actually kills them. This is a weird definition of killing. If I create a computer that cannot last forever and then it breaks down, did I break it?”</span></p><span data-dcnode-id="5933" instrument_node="">
</span><p data-dcnode-id="5931"><span data-dcnode-id="5932" instrument_node="">It's not a weird definition of killing at all. God could create us so that we would never die so in fact God does take our lives by creating us to be such that we will eventually die.</span></p><span data-dcnode-id="5930" instrument_node="">
</span><p data-dcnode-id="5928"><span data-dcnode-id="5929" instrument_node="">Again you comment, “So why did the animals have to be killed as well? Were they so wicked too? I think this is a crucial point you have over looked.” </span></p><span data-dcnode-id="5927" instrument_node="">
</span><p data-dcnode-id="5925"><span data-dcnode-id="5926" instrument_node="">This statement ignores the fact that all animals also die sooner or later. God even allowed mass extinctions and the scripture speaks of these cycles of extinction and replenishing as part of the God’s wondrous creation, something which brings glory to God (see Ps 104). So animals either don’t feel pain in any significant manner as we do or God has some other plan for them which hasn’t been revealed to us because it isn’t really any of our business to know. In any case the problem of animal pain, in just about any context you place it, has some pretty easy answers.</span></p><span data-dcnode-id="5924" instrument_node="">
</span><p data-dcnode-id="5922"><span data-dcnode-id="5923" instrument_node="">You say, “You have not presented any evidence that the Canaanites really did carry out child sacrifice. . . .”</span></p><span data-dcnode-id="5921" instrument_node="">
</span><p data-dcnode-id="5919"><span data-dcnode-id="5920" instrument_node="">Christian and Jewish defenders of the God of the Hebrew scripture do not need to give evidence for this. The entire issue is posed hypothetically since many skeptics do not even believe the Exodus or most of the claimed historical events of the Hebrew scripture occurred anyway. So the question is, If the God of the Bible exists and did command the Canaanite genocide, would there be any justification for this act? Well, yes there would be, if the Canaanites were as bad as the scripture says they were. So at this level of the argument, what really did happen does not matter. What matters are the hypothetical answers to the hypothetical questions. But in fact, as Aron points out, there is some evidence that the Canaanites were this bad.</span></p><span data-dcnode-id="5918" instrument_node="">
</span><p data-dcnode-id="5916"><span data-dcnode-id="5917" instrument_node="">You ask, “When a society does carry out child sacrifice I doubt they kill all their children, which is what god commanded the Hebrews to do, how is killing all the children better than killing some of them?”</span></p><span data-dcnode-id="5915" instrument_node="">
</span><p data-dcnode-id="5913"><span data-dcnode-id="5914" instrument_node="">An institutionalized evil like this will continue generation after generation without end until the culture is fully destroyed. The conquest of Canaan occurred once and only once. Also, a sword to the neck is much more merciful than being placed upon the glowing red-hot arms of an idol. Having mentioned a “merciful” “sword to the neck,” I need to reemphasize my earlier statement that the biblical view is that God does compensate any undeserved suffering and that this is not something a Christian could ever do. I also need to emphasize that if the Israelites were morally incapable of killing these children (if they were not in some way, might we say, semi-barbaric) God would have done this himself. God chose this people to do this because their moral development in this particular regard was not as high as it would be after the time of Jesus’ teachings. In other ways, however, the Israelite morality was much higher than that of their neighbors.</span></p><span data-dcnode-id="5912" instrument_node="">
</span><p data-dcnode-id="5910"><span data-dcnode-id="5911" instrument_node="">You say, “People need to be judged by their actions, judging them by which group they belong to is just another form for racism.”</span></p><span data-dcnode-id="5909" instrument_node="">
</span><p data-dcnode-id="5907"><span data-dcnode-id="5908" instrument_node="">The Canaanites were not killed because of any racial or ethnic identity. But if the parents were killed because of their wickedness, the children could have been killed because this too was part of the punishment of the adults. This was a time in which loss of progeny and the continuation of ones’ linage was considered probably the greatest of all punishments. Anticipation of this punishment by the Canaanites was a punishment in itself. And again, remember that in God’s economy the children are not punished at all since all undeserved punishment is compensated (cf. Rm 8.18, Gen 18.25, etc.).</span></p><span data-dcnode-id="5906" instrument_node="">
</span></div><span data-dcnode-id="5904" instrument_node="">

</span><cite class="fn" data-dcnode-id="5890"><span data-dcnode-id="5891" instrument_node="">howie</span></cite><span data-dcnode-id="5889" instrument_node=""> </span><span class="says" data-dcnode-id="5887"><span data-dcnode-id="5888" instrument_node="">says:</span></span><span data-dcnode-id="5886" instrument_node=""> </span></div><span data-dcnode-id="5883" instrument_node="">
</span><div class="comment-meta commentmetadata" data-dcnode-id="5879"><a data-dcnode-id="5881" href="#comment-2637707"><span data-dcnode-id="5882" instrument_node="">
