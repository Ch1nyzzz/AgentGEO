</span><div class="comment-body" data-dcnode-id="3474"><p data-dcnode-id="3504"><span data-dcnode-id="3505" instrument_node="">I was hoping Aron would respond to this, but he's pretty overwhelmed right now.  But your post filled me with a lot of compassion, so I'm hoping to respond to it with what I've been thinking the last few days.</span></p><span data-dcnode-id="3503" instrument_node="">
</span><p data-dcnode-id="3501"><span data-dcnode-id="3502" instrument_node="">1) I totally get your problem that you are trying to describe as "would there be anything God could do that would make you think him to be not good?"  I was raised in a Nazarene church, which is Wesleyan, which means that we believe in free will, and that whether things turn out well for us in the eternal sense is at least partly based on our choices.  But I went to Baptist schools, and was exposed to a lot of Calvinist thinking, which varies, but usually involves the position that nothing we do can save us, and therefore God must ultimately choose who gets eternity with Him in bliss and who doesn't, more or less arbitrarily.  I went through a very bad time in my young teen years where I was thinking something along the lines of, but if I really mean it when I say I serve God, then I have to accept whatever he chooses, even if it seems bad to me, right?  I had some (very good and loving) teachers at that school who tried to explain things to me in a way that I could accept, but eventually I had to decide that I was serving God because He was good, and not because He was powerful, so I guess maybe if there was writing across the sky saying the Calvinists are right and God just sends people to hell for nothing they can help, I think I would spit in his face and refuse him...capitalization differences purposeful.  So yes, I guess maybe there's something.  Not sure if Aron feels exactly the same though he is my son...</span></p><span data-dcnode-id="3500" instrument_node="">
</span><p data-dcnode-id="3498"><span data-dcnode-id="3499" instrument_node="">2) But that's not the same as people or children or animals dying--we all die sometime.  There's some sense in which God kills us all, innocent and guilty.  You can argue that God should have made a universe with no suffering in it, which I don't think is logically possible (assuming there are any conscious being who can suffer) but that's a long philosophical argument that people have been having for centuries.  </span></p><span data-dcnode-id="3497" instrument_node="">
</span><p data-dcnode-id="3495"><span data-dcnode-id="3496" instrument_node="">3) And there's a big distinction in how you believe in facts and how you believe in people.  You have to go through a certain amount of "fact believing" or at least "provisional proposition accepting" to get towards God at all, because we can't see Him like we see most people, but some of us at least feel that we have come to know Him in some of the ways one knows a person, and when you have experience with a person that convinces you that that person is good and trustworthy, long and intimate experience, then it's not ridiculous to respond to counter-evidence by assuming that there must be some explanation and looking for it.  </span></p><span data-dcnode-id="3494" instrument_node="">
</span><p data-dcnode-id="3492"><span data-dcnode-id="3493" instrument_node="">4) And most of all, this Jesus that you (and many others) perceive as being wise and loving--where does this wisdom and love come from?  Jesus continually shows his deep understanding and trust of the God he calls Father and always identifies Him with the God of the OT.  See in particular John 5:19:  "Jesus gave them this answer: “Very truly I tell you, the Son can do nothing by himself; he can do only what he sees his Father doing, because whatever the Father does the Son also does."</span></p><span data-dcnode-id="3491" instrument_node="">
</span><p data-dcnode-id="3489"><span data-dcnode-id="3490" instrument_node="">Not only Jesus, but many wise and loving people whom I have met, and others through the centuries whose writings I have read, find the loving and wise Father in the OT, though there are passages that we all struggle with too.  </span></p><span data-dcnode-id="3488" instrument_node="">
</span><p data-dcnode-id="3486"><span data-dcnode-id="3487" instrument_node="">5) But, because I am convinced that God is in fact loving and wise, I am certain that if you devote yourself to following the very best good you can see, the Father will find you and lead you into more good.  I don't want you just to bow to a tyrant that you can't love, and I'm convinced He doesn't either.  Here's an OT quote for you:</span></p><span data-dcnode-id="3485" instrument_node="">
</span><p data-dcnode-id="3479"><span data-dcnode-id="3484" instrument_node="">A bruised reed he will not break,</span><br data-dcnode-id="3483"><span data-dcnode-id="3482" instrument_node="">
    and a smoldering wick he will not snuff out.</span><br data-dcnode-id="3481"><span data-dcnode-id="3480" instrument_node="">
In faithfulness he will bring forth justice (Isaiah 42:3)</span></p><span data-dcnode-id="3478" instrument_node="">
</span><p data-dcnode-id="3476"><span data-dcnode-id="3477" instrument_node="">So please don't give up, my dear smoldering candle, but tend the fire you have the best you can and may God reveal Himself to you in a way you can accept.</span></p><span data-dcnode-id="3475" instrument_node="">
</span></div><span data-dcnode-id="3473" instrument_node="">

</span><div class="comment-body" data-dcnode-id="3424"><p data-dcnode-id="3444"><span data-dcnode-id="3445" instrument_node="">Interesting discussion, I believe Howie raised many questions that turn people (nonbelievers) away from the biblical God, and I myself have wrestled with the same questions as a struggling Christian.</span></p><span data-dcnode-id="3443" instrument_node="">
</span><p data-dcnode-id="3441"><span data-dcnode-id="3442" instrument_node="">If all righteousness resides in God, then His judgements must be perfect (Deuteronomy 32:4). But we also know; “I form the light, and create darkness: I make peace, and create evil: I the LORD do all these things.” (Isaiah 45:7).  Evil is the result of sin, Eve's disobedience introduced evil to mankind, it ended life for all living things. </span></p><span data-dcnode-id="3440" instrument_node="">
</span><p data-dcnode-id="3438"><span data-dcnode-id="3439" instrument_node="">Unfortunately for animals, they are part of the fallen world even though they are innocent. Consider that neither dogs or cats sin, they don't even know what sin is, in fact, they fulfill the purpose for which they were created, and yet they suffer, feel pain, and die.</span></p><span data-dcnode-id="3437" instrument_node="">
</span><p data-dcnode-id="3435"><span data-dcnode-id="3436" instrument_node="">How could a righteous God permit perfect creatures to suffer and die? What's fair about that judgement? God is good? There seems to be no righteousness in the torture and death of animals, and that's a big turn-off to an animal lover like myself. I just had to have my cat put to sleep because he was suffering from saddle thrombus, there's no rhyme or reason for his pain, he did nothing wrong, yet his fate was worse than any human, with no life-after-death for his perfect little soul. Nothing fair about it, nothing righteous about it, and no justice about it.</span></p><span data-dcnode-id="3434" instrument_node="">
</span><p data-dcnode-id="3432"><span data-dcnode-id="3433" instrument_node="">Revelation 21:4 says that "God shall wipe away all tears", but who created the conditions that caused those tears in the first place? That's the circular logic that's difficult for me to grasp. Its like punching someone in the eye and then giving them a cold compress to reduce the swelling.</span></p><span data-dcnode-id="3431" instrument_node="">
</span><p data-dcnode-id="3429"><span data-dcnode-id="3430" instrument_node="">But I try to trust that God is good, I don't know the bigger picture, nor do I grasp the reason for evil befalling on the innocent &amp; sinless, but nature is cruel (evil), and it doesn't discriminate against anything living.</span></p><span data-dcnode-id="3428" instrument_node="">
</span><p data-dcnode-id="3426"><span data-dcnode-id="3427" instrument_node="">"For my thoughts are not your thoughts, neither are your ways my ways, saith the Lord. For as the heavens are higher than the earth, so are my ways higher than your ways, and my thoughts than your thoughts." (Isaiah 55:8-9)</span></p><span data-dcnode-id="3425" instrument_node="">

</span><div class="comment-body" data-dcnode-id="3392"><p data-dcnode-id="3394"><span data-dcnode-id="3395" instrument_node="">God is working on the spiritual level, we are in the natural. It is nearly impossible without spiritual awareness from his point of view to fully understand why some things are done, such as ordering entire people groups to be murdered including children and animals. We can only speculate where the answers from the Bible still leave us with questions. My thoughts on it is that the people group are spiritually corrupt in a way akin to contamination so they must be wiped out. Who's to say the children and animals were not already abused, which has it's own host of problems, or had demon possession (even animals can be possessed and demons can be transferred if we believe what Jesus did in the new testament casting out demons out of a man and into a herd of pigs). The other consideration is that the killing is a mercy, for children and animals without people to take care of them are going to die but slowly. The Hebrews might not have had the capacity to take on orphans at the time. Moreover, the children with grow up to learn their history and may perpetuate a war. We don't have all the answers, but it is premature to bring judgement against God when we by nature do not have understanding or knowledge (see Job). It's like giving up, getting angry and declaring a math problem unsolvable, when you are the one who hasn't got the knowledge to solve it.</span></p><span data-dcnode-id="3393" instrument_node="">

</span><div class="comment-body" data-dcnode-id="3351"><p data-dcnode-id="3358"><span data-dcnode-id="3363" instrument_node="">Hitler: “I never killed a single person.”</span><br data-dcnode-id="3362"><span data-dcnode-id="3361" instrument_node="">
Nazi Soldiers: “We were just following orders”</span><br data-dcnode-id="3360"><span data-dcnode-id="3359" instrument_node="">
There you have it. No one is guilty. </span></p><span data-dcnode-id="3357" instrument_node="">
</span><p data-dcnode-id="3353"><span data-dcnode-id="3356" instrument_node="">Facetiousness aside, the OT has a serious crisis of legitimacy. This pages long and complicated debate is actually evidence that the Old Testament is in serious trouble with modern civilization. It should not be this hard to explain to reasonable people. I mean even if there was a some theory of justice contained in the bible that says “Here’s the reason killing the kids and animals is the only way.” we could discuss that. But nothing is presented. Without that it appears that men are justifying acts of typical ancient human atrocities and saying “We were just following Gods orders!” And we are supposed to ignore the fact that this particular claim is like THE most popular excuse in human history for doing absolutely devilish things to other people. This is why Kings, Chieftains and WarLords  always kept a magi, witch doctor or prophet or priest very close by. Because when your agenda becomes inexplicably cruel, all you need is a divine edict and all questions are answered by mystery and authority.</span><br data-dcnode-id="3355"><span data-dcnode-id="3354" instrument_node="">
Fewer and fewer people in an ethically, legally and scientifically advanced world are going to buy it.</span></p><span data-dcnode-id="3352" instrument_node="">

</span><cite class="fn" data-dcnode-id="3335"><a class="url" data-dcnode-id="3336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.wall.org/~aron/main" rel="external nofollow"><span data-dcnode-id="3337" instrument_node="">Aron Wall</span></a></cite><span data-dcnode-id="3334" instrument_node=""> </span><span class="says" data-dcnode-id="3332"><span data-dcnode-id="3333" instrument_node="">says:</span></span><span data-dcnode-id="3331" instrument_node=""> </span></div><span data-dcnode-id="3328" instrument_node="">

</span><div class="comment-body" data-dcnode-id="3243"><p data-dcnode-id="3318"><span data-dcnode-id="3321" instrument_node="">Dan,</span><br data-dcnode-id="3320"><span data-dcnode-id="3319" instrument_node="">
My condolences on the death of your beloved cat.  I also have had to say goodbye to some sick feline friends and it is very hard.</span></p><span data-dcnode-id="3317" instrument_node="">
</span><p data-dcnode-id="3315"><span data-dcnode-id="3316" instrument_node="">I believe that the fossil record makes it clear that animals died long before human beings arrived on the scene.  So when St. Paul says that sin brought death into the world, he must have been talking about human death, or perhaps the conscious understanding and awareness of death.</span></p><span data-dcnode-id="3314" instrument_node="">
</span><p data-dcnode-id="3309"><span data-dcnode-id="3313" instrument_node="">But I don't know why you think that there is no life after death for animals.  The prophet Isaiah seems to be pretty clear that there </span><em data-dcnode-id="3311"><span data-dcnode-id="3312" instrument_node="">will</span></em><span data-dcnode-id="3310" instrument_node=""> be animals in the New Heavens and Earth:</span></p><span data-dcnode-id="3308" instrument_node="">
</span><blockquote data-dcnode-id="3269"><p data-dcnode-id="3270"><span data-dcnode-id="3307" instrument_node="">
“See, I will create</span><br data-dcnode-id="3306"><span data-dcnode-id="3305" instrument_node="">
    new heavens and a new earth.</span><br data-dcnode-id="3304"><span data-dcnode-id="3303" instrument_node="">
The former things will not be remembered,</span><br data-dcnode-id="3302"><span data-dcnode-id="3301" instrument_node="">
    nor will they come to mind.</span><br data-dcnode-id="3300"><span data-dcnode-id="3299" instrument_node="">
But be glad and rejoice forever</span><br data-dcnode-id="3298"><span data-dcnode-id="3297" instrument_node="">
    in what I will create,</span><br data-dcnode-id="3296"><span data-dcnode-id="3295" instrument_node="">
for I will create Jerusalem to be a delight</span><br data-dcnode-id="3294"><span data-dcnode-id="3293" instrument_node="">
    and its people a joy.</span><br data-dcnode-id="3292"><span data-dcnode-id="3291" instrument_node="">
I will rejoice over Jerusalem</span><br data-dcnode-id="3290"><span data-dcnode-id="3289" instrument_node="">
    and take delight in my people;</span><br data-dcnode-id="3288"><span data-dcnode-id="3287" instrument_node="">
the sound of weeping and of crying</span><br data-dcnode-id="3286"><span data-dcnode-id="3285" instrument_node="">
    will be heard in it no more.</span><br data-dcnode-id="3284"><span data-dcnode-id="3283" instrument_node="">
...</span><br data-dcnode-id="3282"><span data-dcnode-id="3281" instrument_node="">
The wolf and the lamb will feed together,</span><br data-dcnode-id="3280"><span data-dcnode-id="3279" instrument_node="">
    and the lion will eat straw like the ox,</span><br data-dcnode-id="3278"><span data-dcnode-id="3277" instrument_node="">
    and dust will be the serpent’s food.</span><br data-dcnode-id="3276"><span data-dcnode-id="3275" instrument_node="">
They will neither harm nor destroy</span><br data-dcnode-id="3274"><span data-dcnode-id="3273" instrument_node="">
    on all my holy mountain,”</span><br data-dcnode-id="3272"><span data-dcnode-id="3271" instrument_node="">
says the Lord.  (Isaiah 65:17-19, 25)
</span></p></blockquote><span data-dcnode-id="3268" instrument_node="">
</span><p data-dcnode-id="3263"><span data-dcnode-id="3267" instrument_node="">While I don't pretend that this resolves all of the hard questions, I don't think you there is any need to add to yourself the extra grief of thinking that God will permanently separate you from your pet.  I think that part of God wiping away every tear from your eye will be restoring him to you again at the Resurrection of the righteous, plain and simple.  Not that your blessedness there will consist primarily in getting back things you lost on Earth.  But once you experience the beatific vision of God, and thus no longer </span><em data-dcnode-id="3265"><span data-dcnode-id="3266" instrument_node="">need</span></em><span data-dcnode-id="3264" instrument_node=""> a cat to ease your loneliness, you will be freed to love your cat even more than you can now, and that will be all the more reason to have him around as a glorified creature, to share your joy with.  Every creature that has, even in a very small way, participated in the sufferings of Christ, will also be raised in him.  That's what I think, anyway.</span></p><span data-dcnode-id="3262" instrument_node="">
</span><p data-dcnode-id="3257"><span data-dcnode-id="3261" instrument_node="">Having said these comforting words, I hope you will forgive me if I violate the proverb </span><i data-dcnode-id="3259"><span data-dcnode-id="3260" instrument_node="">De mortuis nil nisi bonum</span></i><span data-dcnode-id="3258" instrument_node="">, and remind you that while cats are sinless in the sense of not having rational awareness of doing wrong, that is very different from saying they are morally pure in the same sense that a rational person can be morally pure.  Don't let your sentimentality blind you to the fact that, by instinct, cats inflict on other animals a notable portion of Nature's cruelty, as well as receiving it.</span></p><span data-dcnode-id="3256" instrument_node="">
</span><p data-dcnode-id="3254"><span data-dcnode-id="3255" instrument_node="">As a cat lover I think God was still justified in creating cats, but I won't deny that there is a mystery involved in his choice to do so (just as there is a mystery in why he chose to create each of us).  In the New Creation, it seems that carnivorousness will be abolished, and yet the lion will still be fully leonine.  (There are some interesting reflections about animal sufferng in the next-to-last chapter of St. C.S. Lewis' book The Problem of Pain, that you may find helpful.)</span></p><span data-dcnode-id="3253" instrument_node="">
</span><p data-dcnode-id="3248"><span data-dcnode-id="3252" instrument_node="">Nor is it at all true that your cat suffered worse than any human being.  A cat can suffer pain from disease, but it does not experience the horror of anticipating death after a terminal diagnosis.  Nor the depression of feeling like life has no meaning or significance.  Nor can it experience what a person experiences when a close friend betrays him.  We are higher beings than cats, made in the </span><a data-dcnode-id="3250" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.wall.org/~aron/blog/the-image-of-god/" rel="nofollow" title="The Image of God"><span data-dcnode-id="3251" instrument_node="">image of God</span></a><span data-dcnode-id="3249" instrument_node="">, and as a result our capacity for both pain and joy are greater.  Indeed, it is quite probable that you yourself have already suffered far worse emotional pain over the illness and death of your cat, than he ever experienced.</span></p><span data-dcnode-id="3247" instrument_node="">
</span><p data-dcnode-id="3245"><span data-dcnode-id="3246" instrument_node="">Anyway, I pray that you find comfort in your grief during this hard time.  If the cat cannot understand why the vet prods and pokes him, why should we be able to understand why God does things to us?  But when he hurts us I believe that, like the vet, it is motivated by kindness.  I think we can know this when we look at Jesus Christ.  Blessings and peace.</span></p><span data-dcnode-id="3244" instrument_node="">
</span></div><span data-dcnode-id="3242" instrument_node="">

</span><div class="comment-body" data-dcnode-id="3211"><p data-dcnode-id="3213"><span data-dcnode-id="3214" instrument_node="">Thanks for responding Aron.... I understand that there will be animals in heaven, but I wouldn't want just another cat, I'd want the one I lost, but there's nothing to say that his little soul was resurrected. And I imagine that verse, "The former things will not be remembered, nor will they come to mind", doesn't give pet owners much comfort, because most would want to remember what they cherished. Otherwise its simply wiping away ones tears by removing their memory. Anyhow, it still doesn't seem fair to create an innocent little life just to permanently destroy it, in fact, it seems very mean to me, even sadistic. The bible says that Jesus was moved by compassion to heal people (Matthew 14:14), I just think if God were good, that compassion would extent to animals.</span></p><span data-dcnode-id="3212" instrument_node="">

</span><div class="comment-meta commentmetadata" data-dcnode-id="3185"><a data-dcnode-id="3187" href="#comment-2647395"><span data-dcnode-id="3188" instrument_node="">

</span><div class="comment-body" data-dcnode-id="3177"><p data-dcnode-id="3179"><span data-dcnode-id="3182" instrument_node="">My question is this:</span><br data-dcnode-id="3181"><span data-dcnode-id="3180" instrument_node="">
Abraham negotiates with G-d to spare Sodom &amp; Gemorrah. G-d has the power to wipe out an entire city /or nation in one instance, in fact if G-d stops breathing for just one second, our entire world may not exist.  However, in the bible, G-d commands man to eliminate his fellow man for wrongdoing. Why did he ask us to do this when he could do this himself. By asking us, he taught man how to kill, even though it was his commandment. If he took on that responsibility himself and taught us only to love, we would be in a very different world.</span></p><span data-dcnode-id="3178" instrument_node="">
</span></div><span data-dcnode-id="3176" instrument_node="">

</span><cite class="fn" data-dcnode-id="3161"><a class="url" data-dcnode-id="3162" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.wall.org/~aron/main" rel="external nofollow"><span data-dcnode-id="3163" instrument_node="">Aron Wall</span></a></cite><span data-dcnode-id="3160" instrument_node=""> </span><span class="says" data-dcnode-id="3158"><span data-dcnode-id="3159" instrument_node="">says:</span></span><span data-dcnode-id="3157" instrument_node=""> </span></div><span data-dcnode-id="3154" instrument_node="">
</span><div class="comment-meta commentmetadata" data-dcnode-id="3150"><a data-dcnode-id="3152" href="#comment-2647397"><span data-dcnode-id="3153" instrument_node="">
				November 17, 2019 at 10:13 AM</span></a><span data-dcnode-id="3151" instrument_node=""> </span></div><span data-dcnode-id="3148" instrument_node="">
</span><div class="comment-body" data-dcnode-id="3114"><p data-dcnode-id="3144"><span data-dcnode-id="3147" instrument_node="">Dan,</span><br data-dcnode-id="3146"><span data-dcnode-id="3145" instrument_node="">
Apparently my comment was not clear enough.  When I said that God would give you "your cat" back, I meant the very same animal you had on Earth (but resurrected).  Not a different one of the same species!  (If I knew his name, I could say this to you more easily...)  Just as, when Abraham offered Isaac up on the mountain, God gave him back---not a different son---but the same son that he already loved.</span></p><span data-dcnode-id="3143" instrument_node="">
</span><p data-dcnode-id="3138"><span data-dcnode-id="3142" instrument_node="">In the Isaiah passage, "The former things will not be remembered, nor will they come to mind" is a biblical idiom meaning that God is going to bring about very different conditions from before (compare Jeremiah 16:14-15, Jeremiah 3:16, or Isaiah 43:18 for similar examples).  It can't be taken literally to mean that the Blessed will have literally no memory of their former lives (because that would not be a good thing).  And it obviously does NOT imply that there can be no animals there to remember events from the previous world, since if you interpret the verse that way, it would require there to be no resurrected humans either.  In your case, it means that there will be no need to dwell any longer on the past pain of your pet's death </span><em data-dcnode-id="3140"><span data-dcnode-id="3141" instrument_node="">because he will be right there with you</span></em><span data-dcnode-id="3139" instrument_node="">, in a better and closer way than he was on Earth.</span></p><span data-dcnode-id="3137" instrument_node="">
</span><p data-dcnode-id="3135"><span data-dcnode-id="3136" instrument_node="">Sometimes people get into a mental state where the divine promises in the Bible get twisted and distorted, because the context isn't completely clear and they are in pain, and something in their mind resolves the ambiguities in whatever way makes them feel most depressed and wronged.  But God isn't actually like how you are imagining him, as I think you know deep in your heart.  Let me quote some other passages for you:</span></p><span data-dcnode-id="3134" instrument_node="">
</span><p data-dcnode-id="3119"><span data-dcnode-id="3133" instrument_node="">"Take delight in the LORD, and he will give you </span><em data-dcnode-id="3131"><span data-dcnode-id="3132" instrument_node="">the desires of your heart</span></em><span data-dcnode-id="3130" instrument_node="">." (Psalm 37:4)</span><br data-dcnode-id="3129"><span data-dcnode-id="3128" instrument_node="">
"For the LORD God is a sun and shield; the LORD bestows favor and honor; </span><em data-dcnode-id="3126"><span data-dcnode-id="3127" instrument_node="">no good thing does he withhold</span></em><span data-dcnode-id="3125" instrument_node=""> from those whose walk is blameless." (Psalm 84:11)</span><br data-dcnode-id="3124"><span data-dcnode-id="3123" instrument_node="">
"If you, then, though you are evil, know how to give good gifts to your children, how much more will your Father in heaven give </span><em data-dcnode-id="3121"><span data-dcnode-id="3122" instrument_node="">good gifts</span></em><span data-dcnode-id="3120" instrument_node=""> to those who ask him!" (Matthew 7:11)</span></p><span data-dcnode-id="3118" instrument_node="">
</span><p data-dcnode-id="3116"><span data-dcnode-id="3117" instrument_node="">It might be that there are some hobbies we enjoy on Earth that are not going to be in Heaven, because when we have grown sufficiently in holiness and perfection we will no longer need to do those things.  But I cannot imagine anyone being too holy to care for animals, any more than somebody could be "too holy" to care for people.  Holiness includes the innocence of a child, as well as St. Francis's peace with Nature.  If the children and saints love animals, than surely God does as well.  After all, he created them.  Can the New Heaven and Earth be less rich and fulfilling than the old one?  The question answers itself.</span></p><span data-dcnode-id="3115" instrument_node="">
</span></div><span data-dcnode-id="3113" instrument_node="">

</span><div data-dcnode-id="3034" id="comment-2647398"><span data-dcnode-id="3102" instrument_node="">
</span><div class="comment-author vcard" data-dcnode-id="3093"><span data-dcnode-id="3101" instrument_node="">
</span><cite class="fn" data-dcnode-id="3098"><a class="url" data-dcnode-id="3099" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.wall.org/~aron/main" rel="external nofollow"><span data-dcnode-id="3100" instrument_node="">Aron Wall</span></a></cite><span data-dcnode-id="3097" instrument_node=""> </span><span class="says" data-dcnode-id="3095"><span data-dcnode-id="3096" instrument_node="">says:</span></span><span data-dcnode-id="3094" instrument_node=""> </span></div><span data-dcnode-id="3091" instrument_node="">
</span><div class="comment-meta commentmetadata" data-dcnode-id="3087"><a data-dcnode-id="3089" href="#comment-2647398"><span data-dcnode-id="3090" instrument_node="">
				November 17, 2019 at 11:34 AM</span></a><span data-dcnode-id="3088" instrument_node=""> </span></div><span data-dcnode-id="3085" instrument_node="">
</span><div class="comment-body" data-dcnode-id="3040"><p data-dcnode-id="3081"><span data-dcnode-id="3084" instrument_node="">Joseph,</span><br data-dcnode-id="3083"><span data-dcnode-id="3082" instrument_node="">
I don't think the Bible supports the point you are trying to make about capital punishment.</span></p><span data-dcnode-id="3080" instrument_node="">
</span><p data-dcnode-id="3078"><span data-dcnode-id="3079" instrument_node="">For purposes of answering your question, let's read through the book of Genesis literally, without worrying too much about which parts may be historical and which parts may be mythological.  (Either way, I believe it is inspired by God and teaches us important truths about God and human nature.)</span></p><span data-dcnode-id="3077" instrument_node="">
</span><p data-dcnode-id="3075"><span data-dcnode-id="3076" instrument_node="">The original plan was for human beings to coexist peacefully in harmony with God, with Nature, and with each other.  But after human beings acquired the "knowledge of good and evil" on their own terms (Gen 3), it was not God who first told them to kill each other.  Cain kills Abel even though God advised him to try to master his implulses (4:7).  At this stage, God does not introduce captial punishment to eliminate the offender, but rather imposes a lesser penalty himself, and then commands that nobody harm Cain (4:15).  Yet six generations later, this very protection of Cain has been misinterpeted to justify a cycle of violence, when Cain's descendent Lamech boasts that he has killed a man for insulting him (4:23-24).  In a couple chapters, we read that "the earth was corrupt in God's sight and was full of violence" (6:11).  </span></p><span data-dcnode-id="3074" instrument_node="">
</span><p data-dcnode-id="3072"><span data-dcnode-id="3073" instrument_node="">In other words, God didn't "teach man how to kill".  Man figured out how to do that all by himself, long before there was any commandment to the righteous to have a death penalty.  After the Flood, God gives humanity a fresh start, and it is only then that he commands for humans to create governments and to impose the death penalty (9:6).  But that wasn't his ideal plan A or even plan B; it was more like contingency plan C or D...</span></p><span data-dcnode-id="3071" instrument_node="">
</span><p data-dcnode-id="3069"><span data-dcnode-id="3070" instrument_node="">The Law of Moses, which was given to Israel---the only example in history of a theocracy that was actually legitimately instituted by God---commanded the death penalty for murder, adultery, and several other offenses.  Although, not for every sort of wrongdoing, or there would be no one left!  (It also commanded wiping out the Caananites, as discussed in the post above, but that is a completely separate matter; God did not give the human race any discretion to commit genocide, that can only be justified by a direct and clear command of God, and was limited to that specific historical context only.)</span></p><span data-dcnode-id="3068" instrument_node="">
</span><p data-dcnode-id="3063"><span data-dcnode-id="3067" instrument_node="">Much later, when the Messiah came to Earth (as Christians believe), he stopped a proposed execution by saying "Let him who has no sin cast the first stone" (John 8:7), and when they walked away one by one, he said "Neither do I condemn thee: go, and sin no more" (John 8:11).  This new plan, the forgiveness of the offender and reconciliation with the community, is always the best </span><em data-dcnode-id="3065"><span data-dcnode-id="3066" instrument_node="">when it can be done successfully</span></em><span data-dcnode-id="3064" instrument_node="">.  But if it is done incorrectly, it leads people to think there are no consequences and will lead to the Earth once more being filled with violence.  So I don't think we should advocate for the abolition of all criminal penalties quite yet.  (Although unlike the ancient world, it is now technologically and socially possible to imprison people for long periods of time, in relatively humane conditions, making recourse to capital punishment less necessary.)</span></p><span data-dcnode-id="3062" instrument_node="">
</span><p data-dcnode-id="3060"><span data-dcnode-id="3061" instrument_node="">Anyone who thinks that if there were no religion, there would also be no wars, hasn't studied history very well.  Religion can be an excuse for violence, but the excuse only has power because it comes after people already want to kill each other.  Without religion, you'd better believe we'd find plenty of other excuses.  The history of Communism in the 20th century shows that.  Meanwhile, people of good will who want to stop criminal violence can have reasonable debates about whether the death penalty is helpful or not, but none of the choices we make about that issue, will bring us back to a pre-Fall paradise where no violence occurs.  That's not realistic, given human nature as it currently is.</span></p><span data-dcnode-id="3059" instrument_node="">
</span><p data-dcnode-id="3054"><span data-dcnode-id="3058" instrument_node="">You ask why God commands us to take responsibility for justice when he could do it himself.  But you could have asked this question about lots of other things too.  Why does God allow us to make our own economic system, why does he ask us to grow our own crops and construct our own buildings and figure out how to take care of each other?  Why does he let us brush our own teeth?  He could just treat us like small children and do everything for us, but instead he has chosen to treat us like adults and have us figure things out for ourselves, which means that we learn a lot of things the hard way.  I think it probably has to do with the fact that he created us in the </span><a data-dcnode-id="3056" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.wall.org/~aron/blog/the-image-of-god/" rel="nofollow" title="The Image of God"><span data-dcnode-id="3057" instrument_node="">Image of God</span></a><span data-dcnode-id="3055" instrument_node="">.</span></p><span data-dcnode-id="3053" instrument_node="">
</span><p data-dcnode-id="3048"><span data-dcnode-id="3052" instrument_node="">[I have removed a comment by Joshua Milks because it did not conform to the </span><a data-dcnode-id="3050" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.wall.org/~aron/blog/comments/" rel="nofollow" title="Comments"><span data-dcnode-id="3051" instrument_node="">comment policy</span></a><span data-dcnode-id="3049" instrument_node="">: </span></p><span data-dcnode-id="3047" instrument_node="">
</span><p data-dcnode-id="3045"><span data-dcnode-id="3046" instrument_node="">6) This is a Christian website, which exists for the purpose of glorifying God.  Commenters with other beliefs are welcome to comment on the site for purposes of friendly discussion, but I ask that you refrain from gratuitious blasphemy (i.e. derogatory insults and jokes directed at God which aren't necessary in order to respectfully state your position). </span></p><span data-dcnode-id="3044" instrument_node="">
</span><p data-dcnode-id="3042"><span data-dcnode-id="3043" instrument_node="">It should be possible to express your position without directing swear-words at our Father in heaven; or if it isn't, you can start your own blog.---AW]</span></p><span data-dcnode-id="3041" instrument_node="">

</span><cite class="fn" data-dcnode-id="2860"><a class="url" data-dcnode-id="2861" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.wall.org/~aron/main" rel="external nofollow"><span data-dcnode-id="2862" instrument_node="">Aron Wall</span></a></cite><span data-dcnode-id="2859" instrument_node=""> </span><span class="says" data-dcnode-id="2857"><span data-dcnode-id="2858" instrument_node="">says:</span></span><span data-dcnode-id="2856" instrument_node=""> </span></div><span data-dcnode-id="2853" instrument_node="">

</span><div class="comment-body" data-dcnode-id="2803"><p data-dcnode-id="2843"><span data-dcnode-id="2846" instrument_node="">Scott [the most recent one to post on this thread],</span><br data-dcnode-id="2845"><span data-dcnode-id="2844" instrument_node="">
If you think you know God better than the Bible and 3,000 years of religious tradition, I doubt you will listen to anything I have to say.  But I think it's quite odd that you seem to take for granted that all the people described in the Bible (like Moses and Aaron) really existed and did important things, but aren't willing to accept the accuracy of what they taught and believed about God.  </span></p><span data-dcnode-id="2842" instrument_node="">
</span><p data-dcnode-id="2838"><span data-dcnode-id="2841" instrument_node="">Jerald &amp; Izzy,</span><br data-dcnode-id="2840"><span data-dcnode-id="2839" instrument_node="">
This thread seems to be a magnet for people who just want to shout out their two cent blasphemy and then depart.  I don't have time to respond to all such comments myself, but my friend St. Jack Lewis has kindly provided me with suitable replies to each of you:</span></p><span data-dcnode-id="2837" instrument_node="">
</span><p data-dcnode-id="2830"><span data-dcnode-id="2836" instrument_node="">from </span><a data-dcnode-id="2834" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.angelfire.com/ga4/readings/Lewis.html" rel="nofollow"><span data-dcnode-id="2835" instrument_node="">"Miracles"</span></a><span data-dcnode-id="2833" instrument_node="">:</span><br data-dcnode-id="2832"><span data-dcnode-id="2831" instrument_node="">
"There is a vulgar anti-God paper which some anonymous donor sends me every week. In it recently I saw the taunt that we Christians believe in a God who committed adultery with the wife of a Jewish carpenter. The answer to that is that if you describe the action of God in fertilizing Mary as “adultery” then, in that sense, God would have committed adultery with every woman who ever had a baby. For what He did once without a human father, He does always even when He uses a human father as His instrument. For the human father in ordinary generation is only a carrier, sometimes an unwilling carrier, always the last in a long line of carriers, of life that comes from the supreme life. Thus the filth that our poor, muddled, sincere, resentful enemies fling at the Holy One, either does not stick, or, sticking, turns into glory. "</span></p><span data-dcnode-id="2829" instrument_node="">
</span><p data-dcnode-id="2827"><span data-dcnode-id="2828" instrument_node="">[If I may add, the fact that Jerald calls Mary "another man's wife", thus indirectly calling the Creator of the Universe a "man" (i.e. adult male human being) seems like a rather revealing slip---he really thinks of God as being a being just like us, only more powerful, and naturally resents his outrageous pretention in claiming authority to rule over human beings.  But God is not a man, but rather the source of all goodness, and far beyond our comprehension.  One could similarly respond to the rest of his accusations, but there is no point because Jerald is making a deliberate choice to interpret God's actions in the way that will maximize his own sense of unfairness.  Only Jerald can choose to stop doing that, no other person can make him do so.---AW]</span></p><span data-dcnode-id="2826" instrument_node="">
</span><p data-dcnode-id="2818"><span data-dcnode-id="2825" instrument_node="">from </span><em data-dcnode-id="2822"><a data-dcnode-id="2823" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/26077627-a-grief-observed" rel="nofollow"><span data-dcnode-id="2824" instrument_node="">A Grief Observed</span></a></em><span data-dcnode-id="2821" instrument_node="">:</span><br data-dcnode-id="2820"><span data-dcnode-id="2819" instrument_node="">
"Sooner or later I must face the question in plain language. What reason have we, except our own desperate wishes, to believe that God is, by any standard we can conceive, 'good'? Doesn't all the prima facie evidence suggest exactly the opposite? What have we to set against it?</span></p><span data-dcnode-id="2817" instrument_node="">
</span><p data-dcnode-id="2815"><span data-dcnode-id="2816" instrument_node="">We set Christ against it. But how if He were mistaken? Almost His last words may have a perfectly clear meaning. He had found that the Being He called Father was horribly and infinitely different from what He had supposed. The trap, so long and carefully prepared and so subtly baited, was at last sprung, on the cross. The vile practical joke had succeeded.</span></p><span data-dcnode-id="2814" instrument_node="">
</span><p data-dcnode-id="2808"><span data-dcnode-id="2813" instrument_node="">What chokes every prayer and every hope is the memory of all the prayers H. and I offered and all the false hopes we had. Not hopes raised merely by our own wishful thinking, hopes encouraged, even forced upon us, by false diagnoses, by X-ray photographs, by strange remissions, by one temporary recovery that might have ranked as a miracle. Step by step we were 'led up the garden path.' Time after time, when He seemed most gracious He was really preparing the next torture.</span><br data-dcnode-id="2812"><span data-dcnode-id="2811" instrument_node="">
---</span><br data-dcnode-id="2810"><span data-dcnode-id="2809" instrument_node="">
I wrote that last night. It was a yell rather than a thought. Let me try it over again. Is it rational to believe in a bad God? Anyway, in a God so bad as all that? The Cosmic Sadist, the spiteful imbecile?</span></p><span data-dcnode-id="2807" instrument_node="">
</span><p data-dcnode-id="2805"><span data-dcnode-id="2806" instrument_node="">I think it is, if nothing else, too anthropomorphic. When you come to think of it, it is far more anthropomorphic than picturing Him as a grave old king with a long beard. That image is a Jungian archetype. It links God with all the wise old kings in the fairy-tales, with prophets, sages, magicians. Though it is (formally) the picture of a man, it suggests something more than humanity. At the very least it gets in the idea of something older than yourself, something that knows more, something you can't fathom. It preserves mystery. Therefore room for hope. Therefore room for a dread or awe that needn't be mere fear of mischief from a spiteful potentate. But the picture I was building up last night is simply the picture of a man like S.C. — who used to sit next to me at dinner and tell me what he'd been doing to the cats that afternoon. Now a being like S.C., however magnified, couldn't invent or create or govern anything. He would set up traps and try to bait them. But he'd never have thoughts of baits like love, or laughter, or daffodils, or a frosty sunset. He make a universe? He couldn't make a joke, or a bow, or an apology, or a friend."</span></p><span data-dcnode-id="2804" instrument_node="">

</span><div class="comment-body" data-dcnode-id="2765"><p data-dcnode-id="2773"><span data-dcnode-id="2774" instrument_node="">After 2 years of painful searching, I finally found out why God killed the innocent children. In the Bible it says that God waited patiently until the sin of the Canaanites had reached its full measure. Then he moved in judgement upon them. According to the Bible God waited 400 years for their sin to reach its full measure before inflicting judgement. </span></p><span data-dcnode-id="2772" instrument_node="">
</span><p data-dcnode-id="2770"><span data-dcnode-id="2771" instrument_node="">But how can it be fair to inflict that final judgement for sins of people over a 400 year period? ONLY IF THE SAME SOULS WERE RETURNING TO THE SAME TRIBAL GROUPS OVER AND OVER AGAIN. </span></p><span data-dcnode-id="2769" instrument_node="">

</span><div class="comment-body" data-dcnode-id="2558"><p data-dcnode-id="2605"><span data-dcnode-id="2606" instrument_node="">Hello commentators!</span></p><span data-dcnode-id="2604" instrument_node="">
</span><p data-dcnode-id="2602"><span data-dcnode-id="2603" instrument_node="">Thanks for all the great thoughts and ideas you have shared in this thread. </span></p><span data-dcnode-id="2601" instrument_node="">
</span><p data-dcnode-id="2599"><span data-dcnode-id="2600" instrument_node="">Quickly, let me share mine. </span></p><span data-dcnode-id="2598" instrument_node="">
</span><p data-dcnode-id="2596"><span data-dcnode-id="2597" instrument_node="">When it comes to bible, there are only two ways to read it. You can think of it as God's revelation and read it by applying faith and belief that it's without any errors. The alternative way of reading is to put it through strict scrutiny and have an unbiased analytical approach. </span></p><span data-dcnode-id="2595" instrument_node="">
</span><p data-dcnode-id="2593"><span data-dcnode-id="2594" instrument_node="">The first method is best done by evangelicals. The second method is best done by skeptics. Now it gets interesting I guarantee. Almost all evangelicals claim that they also employ analytical and critical approach when studying the Bible on top of their faith commitments. Imagine, the Bible on a table, a cloud of faith is spread just above it and our dear evangelist is looking from above the cloud with a pair of skeptical eyes! The faith cloud is going to distort the actual view of the Bible?! </span></p><span data-dcnode-id="2592" instrument_node="">
</span><p data-dcnode-id="2590"><span data-dcnode-id="2591" instrument_node="">On the other hand, skeptics clear away that faith cloud in order to get the best and near accurate picture of what was happening in the days when some sincere men and women are convinced to write and rewrite history by having a deity in the mix of their writings. </span></p><span data-dcnode-id="2589" instrument_node="">
</span><p data-dcnode-id="2587"><span data-dcnode-id="2588" instrument_node="">There is an interesting aspect in critical scholarship  of biblical studies. It is called documentary hypothesis. Scholars, with the help of archeological findings and extra biblical sources of antiquity and with extensive cross examination of the Hebrew Bible have convincingly established the historical background of the books of Hebrew Bible. More so on the first 5 books of the Bible. </span></p><span data-dcnode-id="2586" instrument_node="">
</span><p data-dcnode-id="2584"><span data-dcnode-id="2585" instrument_node="">As you probably wondered (if you've ever read the Bible!), the creation narrative seems to have two stories. In the first God is portrayed as a cosmic figure. He creates non living objects first, then living things from plants and then ends with humans. No clay man story there. Next chapter gives the order of creation in a strikingly different way. God starts with Adam, then tries to find a mate suitable for him, creates animals to see it'll be good for Adam to play with. Then it strikes his mind. Oh, it should be someone comparable to Adam's size and shape. Look, here God is a trial and error guy! Just like us, humans. Are you getting an idea of who wrote this book? And who has or had and never will have a part in it?! </span></p><span data-dcnode-id="2583" instrument_node="">
</span><p data-dcnode-id="2581"><span data-dcnode-id="2582" instrument_node="">To know more, please read the book 'Who Wrote The Bible' by Richard Friedman. </span></p><span data-dcnode-id="2580" instrument_node="">
</span><p data-dcnode-id="2578"><span data-dcnode-id="2579" instrument_node="">Please remove your cloud at least temporarily and read the Bible to see what it says actually. It's lot more interesting and useful to read the Bible as it is. </span></p><span data-dcnode-id="2577" instrument_node="">
</span><p data-dcnode-id="2575"><span data-dcnode-id="2576" instrument_node="">Oh, no! God cannot order humans (Israelites) to kill horses of a foreign nation by causing excruciating pain like cutting through their tendons!</span></p><span data-dcnode-id="2574" instrument_node="">
</span><p data-dcnode-id="2572"><span data-dcnode-id="2573" instrument_node="">God, if there's one, is definitely a better person than a vengeful figure who shows extreme favoritism to Israelites alone on the earth and is willing to painfully exterminate any nation, including disobeying Israelites just to show he's angry. </span></p><span data-dcnode-id="2571" instrument_node="">
</span><p data-dcnode-id="2569"><span data-dcnode-id="2570" instrument_node="">The God who chose not to instinctively reveal himself within our brains has no reason to question what we choose to have as supernatural figures including sun, moon, air, thunder and for that matter, Jesus, Yahweh, Allah, Krishna etc. </span></p><span data-dcnode-id="2568" instrument_node="">
</span><p data-dcnode-id="2566"><span data-dcnode-id="2567" instrument_node="">Hope you enjoyed reading my thoughts. Please feel free to share your opinions. </span></p><span data-dcnode-id="2565" instrument_node="">
</span><p data-dcnode-id="2563"><span data-dcnode-id="2564" instrument_node="">Cheers!</span></p><span data-dcnode-id="2562" instrument_node="">
</span><p data-dcnode-id="2560"><span data-dcnode-id="2561" instrument_node="">Luder</span></p><span data-dcnode-id="2559" instrument_node="">

</span><div class="comment-author vcard" data-dcnode-id="2537"><span data-dcnode-id="2545" instrument_node="">
</span><cite class="fn" data-dcnode-id="2542"><a class="url" data-dcnode-id="2543" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.wall.org/~aron/main" rel="external nofollow"><span data-dcnode-id="2544" instrument_node="">Aron Wall</span></a></cite><span data-dcnode-id="2541" instrument_node=""> </span><span class="says" data-dcnode-id="2539"><span data-dcnode-id="2540" instrument_node="">says:</span></span><span data-dcnode-id="2538" instrument_node=""> </span></div><span data-dcnode-id="2535" instrument_node="">
</span><div class="comment-meta commentmetadata" data-dcnode-id="2531"><a data-dcnode-id="2533" href="#comment-2647805"><span data-dcnode-id="2534" instrument_node="">
				February 11, 2020 at 8:44 AM</span></a><span data-dcnode-id="2532" instrument_node=""> </span></div><span data-dcnode-id="2529" instrument_node="">
</span><div class="comment-body" data-dcnode-id="2454"><p data-dcnode-id="2525"><span data-dcnode-id="2528" instrument_node="">Luder,</span><br data-dcnode-id="2527"><span data-dcnode-id="2526" instrument_node="">
Thanks for your comment.  </span></p><span data-dcnode-id="2524" instrument_node="">
</span><p data-dcnode-id="2522"><span data-dcnode-id="2523" instrument_node="">However, I strongly disagree with your metaphor that faith is like a "cloud" that obscures, whereas skepticism can see clearly.  In my experience, the exact opposite is the case.</span></p><span data-dcnode-id="2521" instrument_node="">
</span><p data-dcnode-id="2516"><span data-dcnode-id="2520" instrument_node="">Most skeptics are able to read the Bible only in a very limited and superficial way, that is far from being "unbiased".  As I </span><a data-dcnode-id="2518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.wall.org/~aron/blog/comparing-religions-i-introduction/" rel="nofollow"><span data-dcnode-id="2519" instrument_node="">wrote</span></a><span data-dcnode-id="2517" instrument_node=""> about a year ago:</span></p><span data-dcnode-id="2515" instrument_node="">
</span><blockquote data-dcnode-id="2509"><p data-dcnode-id="2513"><span data-dcnode-id="2514" instrument_node="">
At this point I should also mention another "skeptical" approach to evaluating religions which I think has very little merit, just to get it out of the way.  And that is to read the scriptures of a religion solely for the purpose of compiling a long list of "contradictions" that supposely disprove the books in question.  The main problem with this approach is that, generally speaking, the "worse" of a reader you are (i.e. superficial, hostile, and literal-minded) the more seeming contradictions you will find.  In other words, this is an approach which rewards poor reading.  And as St. Lewis remarked in one of his Narnia books, "the trouble about trying to make yourself stupider than you really are is that you very often succeed."  (Of course, this approach is even sillier when done by followers of another religion, seemingly oblivious to the fact that their own holy book might be subjected to the same treatment.)</span></p><span data-dcnode-id="2512" instrument_node="">
</span><p data-dcnode-id="2510"><span data-dcnode-id="2511" instrument_node="">You have to give a text an chance, "suspending your disbelief" and savoring its taste on your tongue, even in order to find out what it is really saying.  Only then can you judge whether the ideas in it are sound or not.
</span></p></blockquote><span data-dcnode-id="2508" instrument_node="">
</span><p data-dcnode-id="2500"><span data-dcnode-id="2507" instrument_node="">On the other hand believers, precisely </span><em data-dcnode-id="2505"><span data-dcnode-id="2506" instrument_node="">because</span></em><span data-dcnode-id="2504" instrument_node=""> they are sympathetic to the perspective of those who wrote it, are able to read the text as a unity, and can clearly perceive many things about the Bible that skeptics are completely oblivious to.  I can see the differences between Genesis 1 and Genesis 2 just as clearly as you can, but I can also extract from their common themes a message about what </span><em data-dcnode-id="2502"><span data-dcnode-id="2503" instrument_node="">I myself</span></em><span data-dcnode-id="2501" instrument_node=""> am, that is capable of revolutionizing how I live my life.  I can also read the text in a community of other people who are trying to apply the text to their lives (the Church).  On the other hand, very few people who read the Bible with a skeptical mindset, or within the mental frame of a secular academic community, ever change how they live their lives as a result.  (Excluding of course those who come to faith as a result of reading the text, as has happened to some people I know.)</span></p><span data-dcnode-id="2499" instrument_node="">
</span><p data-dcnode-id="2497"><span data-dcnode-id="2498" instrument_node="">Who knows a person better?  His friends, or a sociologist who studies him from the outside by looking at his demographic information?  Obviously, the friend knows him better (even if the sociologist might know some specific "facts" that the friend does not know).  In the same way, the person of faith knows many things about God, that are completely invisible to skeptics.</span></p><span data-dcnode-id="2496" instrument_node="">
</span><p data-dcnode-id="2488"><span data-dcnode-id="2495" instrument_node="">Here are some </span><a data-dcnode-id="2493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thomism.wordpress.com/2010/02/08/reading-with-faith-as-a-hermeneutic/" rel="nofollow"><span data-dcnode-id="2494" instrument_node="">additional</span></a><span data-dcnode-id="2492" instrument_node=""> </span><a data-dcnode-id="2490" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thomism.wordpress.com/2011/03/01/3-march-2011/" rel="nofollow"><span data-dcnode-id="2491" instrument_node="">reflections</span></a><span data-dcnode-id="2489" instrument_node=""> by another Christian blogger about how faith changes one's approach to reading the text.</span></p><span data-dcnode-id="2487" instrument_node="">
</span><blockquote data-dcnode-id="2484"><p data-dcnode-id="2485"><span data-dcnode-id="2486" instrument_node="">
On the other hand, skeptics clear away that faith cloud in order to get the best and near accurate picture of what was happening in the days when some sincere men and women are convinced to write and rewrite history by having a deity in the mix of their writings.
</span></p></blockquote><span data-dcnode-id="2483" instrument_node="">
</span><p data-dcnode-id="2478"><span data-dcnode-id="2482" instrument_node="">Here you are begging the question, by </span><em data-dcnode-id="2480"><span data-dcnode-id="2481" instrument_node="">assuming</span></em><span data-dcnode-id="2479" instrument_node=""> that said Deity does not exist.  If this assumption of yours is wrong, then of course you will not come to a more accurate reading of texts describing the men and women who spoke with God.  Yes, the Bible often describes God's actions in a limited and anthropmorphic way, but that is exactly what you would expect if he was revealing himself to limited anthropods.  (If God only used 100% literally accurate language to describe himself, none of it would be understandable to humans, since our minds are finite, whereas God is infinite and unlimited.)  If on the other hand, God is real, and wants to use the Bible to show us truths which exceed our natural powers of understanding, then excluding God from the conversation will obviously make it impossible for us to come to see those truths.</span></p><span data-dcnode-id="2477" instrument_node="">
</span><p data-dcnode-id="2475"><span data-dcnode-id="2476" instrument_node="">(Yes, some believers are also stupid and interpret the text badly, in a way which can be extremely embarrasing to more sophisticated people.  And yet the stupidest Christian who has an actual relationship with Jesus, is in a better position to learn something helpful from the Bible, than the most intelligent critical scholar who is only interested in dividing adjacent verses of the bible among distinct "source communities".</span></p><span data-dcnode-id="2474" instrument_node="">
</span><blockquote data-dcnode-id="2471"><p data-dcnode-id="2472"><span data-dcnode-id="2473" instrument_node="">
There is an interesting aspect in critical scholarship of biblical studies. It is called documentary hypothesis. Scholars, with the help of archeological findings and extra biblical sources of antiquity and with extensive cross examination of the Hebrew Bible have convincingly established the historical background of the books of Hebrew Bible. More so on the first 5 books of the Bible.
</span></p></blockquote><span data-dcnode-id="2470" instrument_node="">
</span><p data-dcnode-id="2456"><span data-dcnode-id="2469" instrument_node="">Interesting, yes.  Convincing, no.  I am familiar with the Documentary Hypothesis, and I think it's probably bogus.  You can probably figure out why I think that from reading my post on </span><a data-dcnode-id="2467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.wall.org/~aron/blog/some-comments-on-biblical-history/" rel="nofollow" title="Some comments on Biblical History"><span data-dcnode-id="2468" instrument_node="">Some comments on Biblical History</span></a><span data-dcnode-id="2466" instrument_node=""> and clicking on some links </span><a data-dcnode-id="2464" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.wall.org/~aron/blog/science-and-sin-random-links/" rel="nofollow" title="Science and Sin: Random Links"><span data-dcnode-id="2465" instrument_node="">in the last bullet point here</span></a><span data-dcnode-id="2463" instrument_node="">.  (But, even if the Documentary Hypothesis </span><em data-dcnode-id="2461"><span data-dcnode-id="2462" instrument_node="">were</span></em><span data-dcnode-id="2460" instrument_node=""> true, somebody (who for all you know was really named Moses) deliberately decided to place Genesis 1 next to Genesis 2.  And if you want to understand what </span><em data-dcnode-id="2458"><span data-dcnode-id="2459" instrument_node="">that</span></em><span data-dcnode-id="2457" instrument_node=""> person was thinking, then you've got to read the two chapters in a way which mkaes them harmonize with each other.)</span></p><span data-dcnode-id="2455" instrument_node="">
</span></div><span data-dcnode-id="2453" instrument_node="">
</span><div class="reply" data-dcnode-id="2451"><span data-dcnode-id="2452" instrument_node="">
</span></div><span data-dcnode-id="2449" instrument_node="">
</span></div><span data-dcnode-id="2446" instrument_node="">

</span><cite class="fn" data-dcnode-id="2439"><span data-dcnode-id="2440" instrument_node="">Luder</span></cite><span data-dcnode-id="2438" instrument_node=""> </span><span class="says" data-dcnode-id="2436"><span data-dcnode-id="2437" instrument_node="">says:</span></span><span data-dcnode-id="2435" instrument_node=""> </span></div><span data-dcnode-id="2432" instrument_node="">
</span><div class="comment-meta commentmetadata" data-dcnode-id="2428"><a data-dcnode-id="2430" href="#comment-2647808"><span data-dcnode-id="2431" instrument_node="">

</span><div class="comment-body" data-dcnode-id="2383"><p data-dcnode-id="2424"><span data-dcnode-id="2425" instrument_node="">Hello Aron, </span></p><span data-dcnode-id="2423" instrument_node="">
</span><p data-dcnode-id="2421"><span data-dcnode-id="2422" instrument_node="">Thanks for taking your time to respond to my post. </span></p><span data-dcnode-id="2420" instrument_node="">
</span><p data-dcnode-id="2418"><span data-dcnode-id="2419" instrument_node="">As much as I want to respond to your ideas individually, I'm right now busy with my work. I'm a forex day trader. 2018 was a great year, I made enough but last year sucked. I'm working on tweaking my strategy. So, I'm caught up most of the time. </span></p><span data-dcnode-id="2417" instrument_node="">
</span><p data-dcnode-id="2415"><span data-dcnode-id="2416" instrument_node="">Well, for you, I assume it might be the same. If I'm not mistaken, you're a professor, right? I know for teaching at university, 24 hours a day won't be enough as I took a part time teaching job last year! I couldn't manage time, and I quit. </span></p><span data-dcnode-id="2414" instrument_node="">
</span><p data-dcnode-id="2412"><span data-dcnode-id="2413" instrument_node="">Okay, without wasting time, let me cut to the chase. </span></p><span data-dcnode-id="2411" instrument_node="">
</span><p data-dcnode-id="2409"><span data-dcnode-id="2410" instrument_node=""> I wish you answer me on this. If you want to and when you're free. In the meantime, I'll prepare some interesting responses to your ideas. </span></p><span data-dcnode-id="2408" instrument_node="">
</span><p data-dcnode-id="2406"><span data-dcnode-id="2407" instrument_node="">Well, the question is this. Actually two questions rolled into one!</span></p><span data-dcnode-id="2405" instrument_node="">
</span><p data-dcnode-id="2403"><span data-dcnode-id="2404" instrument_node="">Is the God of the Bible limited by time? To expand, is it possible for him to time travel as he sees fit? Say, go to Moses's period and come back to our period in seconds and do it again if necessary and vice versa?</span></p><span data-dcnode-id="2402" instrument_node="">
</span><p data-dcnode-id="2400"><span data-dcnode-id="2401" instrument_node="">And the next related question, is the God of the Bible bound to go our standards of legal code? Meaning, today he cannot directly order one nation to kill another nation? Or can he? Even today? </span></p><span data-dcnode-id="2399" instrument_node="">
</span><p data-dcnode-id="2397"><span data-dcnode-id="2398" instrument_node="">For the second question, please try answering without bringing Jesus into the picture. I know the traditional evangelical answer is Yehweh no longer operates the way he used to because Jesus has a much more toned down approach and he's at work in everybody's lives. </span></p><span data-dcnode-id="2396" instrument_node="">
</span><p data-dcnode-id="2394"><span data-dcnode-id="2395" instrument_node="">So, please try try answering more or less like yes or no. If you think I'm asking too much, you don't have to respond. </span></p><span data-dcnode-id="2393" instrument_node="">

</span><cite class="fn" data-dcnode-id="2162"><a class="url" data-dcnode-id="2163" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.wall.org/~aron/main" rel="external nofollow"><span data-dcnode-id="2164" instrument_node="">Aron Wall</span></a></cite><span data-dcnode-id="2161" instrument_node=""> </span><span class="says" data-dcnode-id="2159"><span data-dcnode-id="2160" instrument_node="">says:</span></span><span data-dcnode-id="2158" instrument_node=""> </span></div><span data-dcnode-id="2155" instrument_node="">
</span><div class="comment-meta commentmetadata" data-dcnode-id="2151"><a data-dcnode-id="2153" href="#comment-2648075"><span data-dcnode-id="2154" instrument_node="">

</span><div class="comment-body" data-dcnode-id="2095"><p data-dcnode-id="2145"><span data-dcnode-id="2148" instrument_node="">Luder,</span><br data-dcnode-id="2147"><span data-dcnode-id="2146" instrument_node="">
You've guessed correctly about my extreme lack of time.&nbsp; Actually I happen not to be teaching this term, but I have just moved to a new house in Cambridge (for the 3rd time in 10 months) which is almost as bad...</span></p><span data-dcnode-id="2144" instrument_node="">
</span><blockquote data-dcnode-id="2141"><p data-dcnode-id="2142"><span data-dcnode-id="2143" instrument_node="">
Is the God of the Bible limited by time? To expand, is it possible for him to time travel as he sees fit? Say, go to Moses's period and come back to our period in seconds and do it again if necessary and vice versa?
</span></p></blockquote><span data-dcnode-id="2140" instrument_node="">
</span><p data-dcnode-id="2135"><span data-dcnode-id="2139" instrument_node="">I interpret the Bible as saying that God is </span><a data-dcnode-id="2137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.wall.org/~aron/blog/god-and-time-vi-eternity-in-holy-writ/" rel="nofollow" title="God and Time VI: Eternity in Holy Writ"><span data-dcnode-id="2138" instrument_node="">timeless</span></a><span data-dcnode-id="2136" instrument_node="">.&nbsp; That is, as an eternal being, he is outside of time altogether. &nbsp;(This is related to the fact that he has no material body, is not composed of parts, and is not changeable.) &nbsp;So this means: </span></p><span data-dcnode-id="2134" instrument_node="">
</span><p data-dcnode-id="2132"><span data-dcnode-id="2133" instrument_node="">1. Yes, he is not limited by time.</span></p><span data-dcnode-id="2131" instrument_node="">
</span><p data-dcnode-id="2129"><span data-dcnode-id="2130" instrument_node="">2. But "time travel" is not really the right way to think about it.&nbsp; Time travel would describe the life of a being who normally progrsses through time much as we do, but has the ability to skip back to the past or forward future.&nbsp; But God doesn't progress through time at all.&nbsp; Instead he exists equally at all times, similar to how he is onmipresent (rather than having a particular spatial location).&nbsp; Thus, he transcends time even more than the time traveller.&nbsp; It does not even take him "seconds" to go back to the time of Moses and back, rather he is always present at Moses' time just as much as he is present at our own time.</span></p><span data-dcnode-id="2128" instrument_node="">
</span><blockquote data-dcnode-id="2125"><p data-dcnode-id="2126"><span data-dcnode-id="2127" instrument_node="">
And the next related question, is the God of the Bible bound to go our standards of legal code? Meaning, today he cannot directly order one nation to kill another nation? Or can he? Even today?
</span></p></blockquote><span data-dcnode-id="2124" instrument_node="">
</span><p data-dcnode-id="2116"><span data-dcnode-id="2123" instrument_node="">That question is easy.  God is certainly not bound by our legal codes, since legal codes are created by human beings to regulate the conduct of other humans, and human beings have no authority to legislate for God.&nbsp; (While as a general rule </span><em data-dcnode-id="2121"><span data-dcnode-id="2122" instrument_node="">Christians</span></em><span data-dcnode-id="2120" instrument_node=""> are supposed to obey lawful government authorities, when the government orders us to do something which conflicts with God's commands (e.g. something which is unethical) then in such cases it is necessary to </span><a data-dcnode-id="2118" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/acts/5-29.htm" rel="nofollow"><span data-dcnode-id="2119" instrument_node="">prioritize God's commands</span></a><span data-dcnode-id="2117" instrument_node="">.)</span></p><span data-dcnode-id="2115" instrument_node="">
</span><p data-dcnode-id="2110"><span data-dcnode-id="2114" instrument_node="">The more interesting question (and more relevant to the issue of genocide) of how God is related to our human notions of </span><a data-dcnode-id="2112" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.wall.org/~aron/blog/fundamental-reality-xii-the-good-and-the-not/" rel="nofollow" title="Fundamental Reality XII: The Good, and the Not"><span data-dcnode-id="2113" instrument_node="">ethics</span></a><span data-dcnode-id="2111" instrument_node="">.  Jews and Christians believe that God is perfectly good, so this has to affect how we understand Biblical passages like the ones being discussed.</span></p><span data-dcnode-id="2109" instrument_node="">
</span><blockquote data-dcnode-id="2106"><p data-dcnode-id="2107"><span data-dcnode-id="2108" instrument_node="">
For the second question, please try answering without bringing Jesus into the picture. I know the traditional evangelical answer is Yehweh no longer operates the way he used to because Jesus has a much more toned down approach and he's at work in everybody's lives.
</span></p></blockquote><span data-dcnode-id="2105" instrument_node="">
</span><p data-dcnode-id="2103"><span data-dcnode-id="2104" instrument_node="">This is like prefacing a question to a physicist with: "I'm curious about the structure of atoms, but please try answering without bringing Quantum Mechanics into the picture.  Just answer the way you would if all you knew about was Classical Mechanics."  I mean, I could try to indulge such a request, but it would result in me saying things about the subject that I believe to be wrong or at least extremely incomplete.  And there would be puzzles and paradoxes which couldn't be resolved in that framework because their resolution involves quantum effects.  (E.g. classically, you'd expect electrons to radiate EM waves and fall all the way into the nucleus, rather than staying in their orbits, and you also wouldn't expect them to jump between discrete energy levels.)</span></p><span data-dcnode-id="2102" instrument_node="">
</span><p data-dcnode-id="2097"><span data-dcnode-id="2101" instrument_node="">As Christians we believe that Jesus reveals what were God's purposes </span><i data-dcnode-id="2099"><span data-dcnode-id="2100" instrument_node="">all along</span></i><span data-dcnode-id="2098" instrument_node="">.  To ignore him in my answer to you, means ignoring highly relevant data.  If you really want to know how somebody who doesn't believe in Jesus would interpret God's actions, then maybe you should ask an Orthodox Jew instead of me.</span></p><span data-dcnode-id="2096" instrument_node="">

</span><div class="comment-body" data-dcnode-id="2001"><p data-dcnode-id="2015"><span data-dcnode-id="2034" instrument_node="">Much of what God does is hidden until we see the bigger picture.</span><br data-dcnode-id="2033"><span data-dcnode-id="2032" instrument_node="">
The Bible relates the destruction of the Canaanites and depicts the slaughter of women, children and animals by the sword. In order to understand this even we should see it in the context of the cycle of Covenant and Judgement that occurs throughout the Old Testament.</span><br data-dcnode-id="2031"><span data-dcnode-id="2030" instrument_node="">
From the time of the Floods (Ussher 2348 B.C.) and the time of Jeremiah (640 B.C.) God entered into a series of covenants with his people -</span><br data-dcnode-id="2029"><span data-dcnode-id="2028" instrument_node="">
Noachic Covenant (2348 B.C.)</span><br data-dcnode-id="2027"><span data-dcnode-id="2026" instrument_node="">
Abrahamic Covenant (1921 B.C)</span><br data-dcnode-id="2025"><span data-dcnode-id="2024" instrument_node="">
Mosaic Covenant (1491 B.C.)</span><br data-dcnode-id="2023"><span data-dcnode-id="2022" instrument_node="">
Davidic Covenant (1011 B.C.)</span><br data-dcnode-id="2021"><span data-dcnode-id="2020" instrument_node="">
New Covenant (640 B.C)</span><br data-dcnode-id="2019"><span data-dcnode-id="2018" instrument_node="">
What is apparent is that each covenant is separated by approximately 430 years from the preceding one. Also, each covenant is associated with a judgement falling upon the people who broke the previous covenant.</span><br data-dcnode-id="2017"><span data-dcnode-id="2016" instrument_node="">
In Noahs time, the judgement was the Flood. In Abrahams time, the judgement was the destruction of Sodom and Gomorrah. In Moses time, the judgement was the Exodus and Conquest of Canaan. In Davids time the judgement was the destruction of the Palestinians. In Jeremiahs time the destruction as that of the Jews and Jerusalem which were taken into capitivity by the Babylonians.</span></p><span data-dcnode-id="2014" instrument_node="">
</span><p data-dcnode-id="2012"><span data-dcnode-id="2013" instrument_node="">So there is a cycle of Covenant and Judgement lasting approximately 430 years. And during this 430 years God is patient and allows sins to accumulate. "Their sins have not yet reached their full measure" . Then God carries out judgement against a particular generation for the sins of the prior generations during the 430 year period. </span></p><span data-dcnode-id="2011" instrument_node="">
</span><p data-dcnode-id="2009"><span data-dcnode-id="2010" instrument_node="">But how can one generation be held responsible for the sins of a prior generation? Only if the same souls were being reborn into the same geographical and tribal groups over and over again. </span></p><span data-dcnode-id="2008" instrument_node="">
</span><p data-dcnode-id="2006"><span data-dcnode-id="2007" instrument_node="">So the cycle of judgement and covenant is only understandable if there is a cycle of souls. And this would explain why God allowed and indeed commanded the children to perish during the Canaanite conquest.</span></p><span data-dcnode-id="2005" instrument_node="">
</span><p data-dcnode-id="2003"><span data-dcnode-id="2004" instrument_node="">What appears unfair and unjust from the usual vantage point of a singular lifetime, may appear just and fair from the vantage point of the bigger picture.</span></p><span data-dcnode-id="2002" instrument_node="">

</span><div class="comment-body" data-dcnode-id="1865"><p data-dcnode-id="1867"><span data-dcnode-id="1870" instrument_node="">I think that before any of us place God under the microscope we should acknowledge that he is probably much smarter than any of us and thus concluding that he makes stupid or bad decisions is illogical and it seems so because of your lack of a better understanding. So question with caution. I live in a country so deeply rooted in religion that people are exploited through it almost on a daily basis. I had been a hundred percent devoted Christian and few months back could never imagine that I could be in a position of doubt as I am now. My prayers weren't being answered and I started seeing that it didn't make a difference if I didn't pray so I gave up. After stepping back and trying to scrutinize Christianity from an outside perspective most of it makes sense and is factual including the existence of the God of the Bible (this is my very unbiased opinion).But what bothers me and I guess most people is the lack of God's direct intervention in our lives</span><br data-dcnode-id="1869"><span data-dcnode-id="1868" instrument_node="">
I  meant why doesn't that supernatural biblical stuff happen in my life?and why doesn't God answer prayers? Trust me I asked seeked and knocked very persistently but I had to always convince myself that in future God would do it. But in truth there was that feeling of constant inner peace, joy and assurance and few supernatural experiences that kept me going. So now I'm afraid of getting disappointed again. I am still on a personal journey to try to reconcile with the fact that God isn't always going to be available to my expectations. But what I have learnt is that Christianity and any other religion require the followers to have a lot of faith and trust in their God. These are the basic pillars because many things are not according to our expectations and you have to trust and believe that God is powerful wise and good. So for me and anyone else I believe that the answer we seek is not so much of a change on God's part but on ours.</span></p><span data-dcnode-id="1866" instrument_node="">

</span><div class="comment-body" data-dcnode-id="1656"><p data-dcnode-id="1658"><span data-dcnode-id="1661" instrument_node="">I think that your supposition rests on a literal reading of OT. In fact, the battles described in Joshua are not known to have actually occurred, i.e. there is little archeological or other evidence that they did. So it seems that we could interpret this (as well as some other books in OT) other than literally. The theologian Paul Copan has argued that passages such as that which you describe may be read as “hagiographic hyperbole” intended for rhetorical effect not proposals of God for actual warfare. This way of reading OT is, of course, very old. Thus Origen (180-250 AD) wrote of Genesis “For who that has understanding will suppose that the first, and second, and third day, and the evening and the morning, existed without a sun, and moon, and stars? and that the first day was, as it were, also without a sky? And who is so foolish as to suppose that God, after the manner of a husbandman, planted a paradise in Eden, towards the east, and placed in it a tree of life, visible and palpable, so that one tasting of the fruit by the bodily teeth obtained life? and again, that one was a partaker of good and evil by masticating what was taken from the tree? And if God is said to walk in the paradise in the evening, and Adam to hide himself under a tree, I do not suppose that anyone doubts that these things figuratively indicate certain mysteries, the history having taken place in appearance, and not literally.”</span><br data-dcnode-id="1660"><span data-dcnode-id="1659" instrument_node="">
(Ante-Nicene Fathers Vol. 4, p. 365).</span></p><span data-dcnode-id="1657" instrument_node="">
</span></div><span data-dcnode-id="1655" instrument_node="">
