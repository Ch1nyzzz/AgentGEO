</span><li class="comment byuser comment-author-aron bypostauthor odd alt thread-odd thread-alt depth-1" data-dcnode-id="1546" id="li-comment-2649181"><span data-dcnode-id="1645" instrument_node="">
</span><div data-dcnode-id="1549" id="comment-2649181"><span data-dcnode-id="1644" instrument_node="">
</span><div class="comment-author vcard" data-dcnode-id="1635"><span data-dcnode-id="1643" instrument_node="">
</span><cite class="fn" data-dcnode-id="1640"><a class="url" data-dcnode-id="1641" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.wall.org/~aron/main" rel="external nofollow"><span data-dcnode-id="1642" instrument_node="">Aron Wall</span></a></cite><span data-dcnode-id="1639" instrument_node=""> </span><span class="says" data-dcnode-id="1637"><span data-dcnode-id="1638" instrument_node="">says:</span></span><span data-dcnode-id="1636" instrument_node=""> </span></div><span data-dcnode-id="1633" instrument_node="">
</span><div class="comment-meta commentmetadata" data-dcnode-id="1629"><a data-dcnode-id="1631" href="#comment-2649181"><span data-dcnode-id="1632" instrument_node="">
				November 4, 2020 at 9:33 AM</span></a><span data-dcnode-id="1630" instrument_node=""> </span></div><span data-dcnode-id="1627" instrument_node="">
</span><div class="comment-body" data-dcnode-id="1555"><p data-dcnode-id="1623"><span data-dcnode-id="1626" instrument_node="">Christine,</span><br data-dcnode-id="1625"><span data-dcnode-id="1624" instrument_node="">
First of all, congratulations on your baptism into the body of Christ!&nbsp; May the love of God bless you as you seek to follow Christ more closely through his Holy Spirit.</span></p><span data-dcnode-id="1622" instrument_node="">
</span><p data-dcnode-id="1620"><span data-dcnode-id="1621" instrument_node="">I hope that the following considerations may be helpful to you.</span></p><span data-dcnode-id="1619" instrument_node="">
</span><p data-dcnode-id="1614"><span data-dcnode-id="1618" instrument_node="">1. After doing a bit of research online, it seems to be not completely clear whether the Hebrew word עָקַר (aqar) actually means to hamstring, or something else.&nbsp; I found some authors arguing that this word </span><em data-dcnode-id="1616"><span data-dcnode-id="1617" instrument_node="">might</span></em><span data-dcnode-id="1615" instrument_node=""> in this case mean `castrate' or `exterminate'. &nbsp;(I take it from your comment that you would not find those meanings as objectionable.)</span></p><span data-dcnode-id="1613" instrument_node="">
</span><p data-dcnode-id="1611"><span data-dcnode-id="1612" instrument_node="">I'm not enough of an expert in ancient Hebrew to adjudicate this dispute, but when dealing with a text written 3,000 years ago in another language (without any vowels, or spaces between the words), one can never entirely rule out the possibility that the English translation of an individual verse may not be entirely correct.&nbsp; In many cases the translators have to reply on centuries-later traditions about what a verse means.&nbsp; Of course this sort of thing doesn't affect the main message of the Scriptures, but humility means we sometimes have to hold lightly to our understanding of particular details.</span></p><span data-dcnode-id="1610" instrument_node="">
</span><p data-dcnode-id="1605"><span data-dcnode-id="1609" instrument_node="">2. In Christian theology, while God does indeed care about animals, human beings are regarded as more important than other animals, due to being created in the </span><a data-dcnode-id="1607" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.wall.org/~aron/blog/the-image-of-god/" rel="nofollow" title="The Image of God"><span data-dcnode-id="1608" instrument_node="">image of God</span></a><span data-dcnode-id="1606" instrument_node="">.&nbsp; Jesus affirms both of these truths when he says:</span></p><span data-dcnode-id="1604" instrument_node="">
</span><blockquote data-dcnode-id="1601"><p data-dcnode-id="1602"><span data-dcnode-id="1603" instrument_node="">
Are not five sparrows sold for two pennies? Yet not one of them is forgotten by God... So do not be afraid; you are worth more than many sparrows. &nbsp;(Luke 12:6-7)
</span></p></blockquote><span data-dcnode-id="1600" instrument_node="">
</span><p data-dcnode-id="1598"><span data-dcnode-id="1599" instrument_node="">As a child of God, it does you credit that you have compassion for innocent horses, and I would never want you to stop feeling that sympathy.&nbsp; However, I am unable to share a perspective on Joshua 11 in which animals being injured is a more important issue than an entire city of humans being killed.</span></p><span data-dcnode-id="1597" instrument_node="">
</span><p data-dcnode-id="1592"><span data-dcnode-id="1596" instrument_node="">3. It's important to realize that in that era, horses weren't just pets, they were also </span><em data-dcnode-id="1594"><span data-dcnode-id="1595" instrument_node="">military technology</span></em><span data-dcnode-id="1593" instrument_node="">.&nbsp; By commanding the Israelites to eliminate the horses (or castrate, or whatever it actually was), God was preventing the next few generations of Israelites from attempting to become a military superpower in the Middle East.&nbsp; Because that wasn't really the type of nation he was trying to build...</span></p><span data-dcnode-id="1591" instrument_node="">
</span><p data-dcnode-id="1589"><span data-dcnode-id="1590" instrument_node="">4. Yes, unlike a tank, a horse is sentient and can suffer.&nbsp; That's an important distinction.&nbsp; But animals are often killed or maimed in the wild, and if you can believe in a God who would create Nature as we see it, I think it is not impossible to believe in a God who would command horses to be injured or killed for a sufficiently good purpose.&nbsp; We aren't always able to understand God's reasons, but that doesn't mean they aren't there.</span></p><span data-dcnode-id="1588" instrument_node="">
</span><p data-dcnode-id="1586"><span data-dcnode-id="1587" instrument_node="">5. Whether or not any of the above considerations make sense to you, every Christian who reads the Bible is going to ecounter some things that they don't like or understand. &nbsp;If we are nevertheless able to trust that God is good, it is because we have had an encounter with the love of Jesus that reassures us of the goodness of God. &nbsp;When one has become certain of the character of God through his own love for us, seen through the lens of the Cross, we are then able to trust him with the earlier moments in history. &nbsp;That doesn't mean we shouldn't wrestle with these issues, but we do so from a position where we already have reason to view him as good and loving.</span></p><span data-dcnode-id="1585" instrument_node="">
</span><p data-dcnode-id="1578"><span data-dcnode-id="1584" instrument_node="">JamesH,</span><br data-dcnode-id="1583"><span data-dcnode-id="1582" instrument_node="">
I think you are conflating two very different scenarios here.  It sounds like you believe that the Canaanite conquest never happened at all, and that the accounts of it in Joshua are mythological.  This is very different from the position of St. Paul Copan, who appears to believe (if I have understood correctly from blog posts reviewing his book) that the Canaanite conquest </span><em data-dcnode-id="1580"><span data-dcnode-id="1581" instrument_node="">was</span></em><span data-dcnode-id="1579" instrument_node=""> a historical event, but that certain particular descriptions of it are hyperbolic.</span></p><span data-dcnode-id="1577" instrument_node="">
</span><p data-dcnode-id="1572"><span data-dcnode-id="1576" instrument_node="">The conquest of Canaan is, on the face of it, much more embedded in the middle of the Old Testament historical narrative than Genesis 1.  It is easy to read Genesis 1-11 as partially mythological without changing much of substance in what follows.  On the other hand, a total denial of the historicity of the conquest of Canaan would also seem to also undermine the historicity of Moses, the Exodus, and the giving of the law.  Are you prepared to say that these events are totally mythological?  I </span><a data-dcnode-id="1574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.wall.org/~aron/blog/some-comments-on-biblical-history/" rel="nofollow" title="Some comments on Biblical History"><span data-dcnode-id="1575" instrument_node="">am not</span></a><span data-dcnode-id="1573" instrument_node="">.  On that scenario, it would seem like Judaism is basically false in its core historical claims.  (Maybe there is a way for this to be compatible with the Incarnation really having occured, but if there is a God who is willing to enter history around AD 1, he would also be willing to act previous to that time to prepare the way for that.)</span></p><span data-dcnode-id="1571" instrument_node="">
</span><p data-dcnode-id="1569"><span data-dcnode-id="1570" instrument_node="">Regarding St. Paul Copan's view, while I don't find it at all implausible that (1) the degree of success in wiping out the Canaanites is sometimes exaggerated (since many Canaanites seem to still be around in later events), and that (2) some of the shrewder Canaanites might have fled the Holy Land and so been spared.  But it seems disingenuous to interpret the text in any way that wouldn't be considered genocide today.  On the face of it, the instructions to Israel were instructed to kill even noncombatants, and their failure to do this completely is explicitly identified later on as a sin.  Given the stories (like Achan, or Samuel) in which Israel is rebuked for making exceptions, I find it difficult to understand these texts in a way that is at all compatible with modern sensibilities.</span></p><span data-dcnode-id="1568" instrument_node="">
</span><p data-dcnode-id="1563"><span data-dcnode-id="1567" instrument_node="">By the way, in medieval theology, allegorical interpretations of the Bible were regarded as an </span><em data-dcnode-id="1565"><span data-dcnode-id="1566" instrument_node="">additional</span></em><span data-dcnode-id="1564" instrument_node=""> layer of meaning, not an alternative to the text being literally true.  As St. Thomas Aquinas pointed out, God has the power to symbolize his intended message by means of historical events that actually occurred.  So the allegorical meaning actually rests on the foundation of properly understanding the literal meaning --- which doesn't of course mean that we can ignore genre conventions, about to what extent the narrative is intended to reflect real historical events.  But things are more complicated than just: allegorical or historical, pick one.</span></p><span data-dcnode-id="1562" instrument_node="">
</span><p data-dcnode-id="1557"><span data-dcnode-id="1561" instrument_node="">(Nor is it obvious to me that denying the historicity of the event would remove the ethical problem from the text.  Even if the event didn't </span><em data-dcnode-id="1559"><span data-dcnode-id="1560" instrument_node="">actually</span></em><span data-dcnode-id="1558" instrument_node=""> happen historically, it's still presented in divinely inspired Scripture as a narrative that is supposed to reveal something about God's character and values.  For example, I think we learn something from the Noah story about how God doesn't grade human beings on the curve --- it is possible for virtually everyone to flunk the test --- and this is still revelatory, even if a global Flood didn't literally happen.)</span></p><span data-dcnode-id="1556" instrument_node="">
</span></div><span data-dcnode-id="1554" instrument_node="">

</span><div class="comment-meta commentmetadata" data-dcnode-id="1529"><a data-dcnode-id="1531" href="#comment-2649183"><span data-dcnode-id="1532" instrument_node="">

</span><div class="comment-body" data-dcnode-id="1508"><p data-dcnode-id="1525"><span data-dcnode-id="1526" instrument_node="">“I think you are conflating two very different scenarios here. It sounds like you believe that the Canaanite conquest never happened at all, and that the accounts of it in Joshua are mythological. “</span></p><span data-dcnode-id="1524" instrument_node="">
</span><p data-dcnode-id="1522"><span data-dcnode-id="1523" instrument_node="">I am open-minded on the question of whether the conquest actually happened. My understanding is that there is not very much archeological or other evidence that it did. However, this question does not seem to be central to the “hamstring” issue. Even if the conquest was an actual historical event, that doesn’t seem to be a good reason to suppose that God would impart a message to hamstring horses; those present at an actual conquest may have simply  felt that God was imparting a message about how to deal with horses, or it may have been some sort of elaboration. This last interpretation seems to be consistent with Copan’s “hagiographic hyperbole.”</span></p><span data-dcnode-id="1521" instrument_node="">
</span><p data-dcnode-id="1519"><span data-dcnode-id="1520" instrument_node="">“...The conquest of Canaan is, on the face of it, much more embedded in the middle of the Old Testament historical narrative than Genesis 1. It is easy to read Genesis 1-11 as partially mythological without changing much of substance in what follows. On the other hand, a total denial of the historicity of the conquest of Canaan would also seem to also undermine the historicity of Moses, the Exodus, and the giving of the law. Are you prepared to say that these events are totally mythological? “</span></p><span data-dcnode-id="1518" instrument_node="">
</span><p data-dcnode-id="1516"><span data-dcnode-id="1517" instrument_node="">I agree that it’s easier to read Genesis mythologically than these other books. On the reading of Exodus etc.,  all I would say is that we just don’t know how much of these books is history and how much is mythology, “hagiographic hyperbole” or something similar. All we can do is go along with the best available scholarship and be prepared to modify our views as necessary in the light of any new evidence.</span></p><span data-dcnode-id="1515" instrument_node="">
</span><p data-dcnode-id="1513"><span data-dcnode-id="1514" instrument_node="">“Even if the event didn't actually happen historically, it's still presented in divinely inspired Scripture as a narrative that is supposed to reveal something about God's character and values. For example, I think we learn something from the Noah story about how God doesn't grade human beings on the curve --- it is possible for virtually everyone to flunk the test --- and this is still revelatory, even if a global Flood didn't literally happen.)”</span></p><span data-dcnode-id="1512" instrument_node="">
</span><p data-dcnode-id="1510"><span data-dcnode-id="1511" instrument_node="">I agree with this completely. I am just arguing that the Bible is a collection of books in different genres. All we can do is use the best available scholarship to elucidate whether a given book should be read historically, as a moral fable or so on. A moral fable can impart a true moral message and can just as well be divinely inspired as an historical text. We should always be prepared to modify our views in the light of new historical or other evidence.</span></p><span data-dcnode-id="1509" instrument_node="">
</span></div><span data-dcnode-id="1507" instrument_node="">
</span><div class="reply" data-dcnode-id="1505"><span data-dcnode-id="1506" instrument_node="">

</span><div class="comment-body" data-dcnode-id="1474"><p data-dcnode-id="1476"><span data-dcnode-id="1479" instrument_node="">Genesis 1 is very different from the later chapters. Fr Jaki claims that Genesis 1 is post-exile and its purpose was to held up God as model for sabbath observance.  I am unsure whether it could be called a myth.</span><br data-dcnode-id="1478"><span data-dcnode-id="1477" instrument_node="">
I wonder if there are any myths, properly speaking,  in the Bible.</span></p><span data-dcnode-id="1475" instrument_node="">

</span><div class="comment-body" data-dcnode-id="1442"><p data-dcnode-id="1444"><span data-dcnode-id="1445" instrument_node="">Yes, “myth” and “mythological” might not be the best words to use here as these terms have a variety of different meanings. I meant to say that we should read Genesis allegorically. Since the Bible is not a single book but a collection of books spanning many centuries, it isn’t always obvious, either, whether a given book should be read allegorically or not.</span></p><span data-dcnode-id="1443" instrument_node="">

</span><div class="comment-body" data-dcnode-id="1407"><p data-dcnode-id="1412"><span data-dcnode-id="1413" instrument_node="">I want to believe that scripture reflects the Ancient cultural world view of the people retelling their history. God is active and guiding them to a fuller knowledge of himself. Even now 2000 years after Christ, we have to admit that our own cultural world view influences how we interpret scripture, politics, and  the news. Even in our personal lives our perceptions cloud reality. I choose to believe that Jesus is God’s Word to us and that God continues to evolve our world view and align it to his, through scripture, prayer, loving and supportive community, personal and corporate experiences (history and science) And by  the power of His Holy Spirit we get ever closer to knowing Him and experiencing eternal life now.</span></p><span data-dcnode-id="1411" instrument_node="">
</span><p data-dcnode-id="1409"><span data-dcnode-id="1410" instrument_node="">The ancient people had many gods and thought the most powerful god was the warrior god that could defeat all others. The Israelites thought Yahweh was like this and God worked with them to eventually reveal his true heart and character, culminating in the incarnation of himself.</span></p><span data-dcnode-id="1408" instrument_node="">

</span><div class="comment-body" data-dcnode-id="1365"><p data-dcnode-id="1367"><span data-dcnode-id="1378" instrument_node="">One thing about perceptions of God, it's subject to projection of ones own mentality and thought processes, as well as those one is familiar with.  Biblical narratives often are out of the scope of many understanding because of these traits of human thought.</span><br data-dcnode-id="1377"><span data-dcnode-id="1376" instrument_node="">

</span><div class="comment-body" data-dcnode-id="1327"><p data-dcnode-id="1335"><span data-dcnode-id="1336" instrument_node="">Hi Aron,</span></p><span data-dcnode-id="1334" instrument_node="">
</span><p data-dcnode-id="1329"><span data-dcnode-id="1333" instrument_node="">I appreciate your thoughts on this highly controversial and divisive topic of the OT God being anything but the God of love. I have to admit that in order to accept the killing of innocent babies and animals even by God you have to turn off your humanistic feeling. It is never right to stab infants perdiod. I refuse to live in a world where it’s ever right nor can I hope to find myself in a “heaven” bought with such a horrifying price. I stopped being a Christian when I had a baby. Looking at him and imagining him to be in those times “rightly” slaughtered by “God’s people” makes me so scared and confused that I cannot understand how such a religion could exist for so long. The fact that you and I habe such different moral thresholds for suffering of the innocent shows that in favt people don’t have some built-in moral compasses as implied in the Bible. I still think that it’s beneficial for some people to clung to this faith to feel complete amd happy and in no way do I judge them, but for me such depictions of God only make sense if they were people’s imagination created either with evil purpose or by some honest mistake. Please note that don’t consider myself an atheist as I am convinced that there is life after we die and that this world is not just a freaky cosmic accident. I just think that going in the direction of abrahamic religious will not lead to the truth, it will only lead to confusion the evidence for which this discussion is. I hope everyone is going to come to terms with the evil in this world one way or another, may you all have peace of mind. As for me, I don’t know which religion is true and for that matter if any of them are true, but I do believe that people who saw the light and the other side during their near death experiences don’t lie. Please read their  stories online (for example </span><a data-dcnode-id="1331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nderf.org/Archives/NDERF_NDEs.html" rel="nofollow"><span data-dcnode-id="1332" instrument_node="">https://www.nderf.org/Archives/NDERF_NDEs.html</span></a><span data-dcnode-id="1330" instrument_node="">) There are so many of people who did experience something when their heart stopped beating for a while, my mother’s included. Blessings to y’all.</span></p><span data-dcnode-id="1328" instrument_node="">

</span><div class="comment-author vcard" data-dcnode-id="1306"><span data-dcnode-id="1314" instrument_node="">
</span><cite class="fn" data-dcnode-id="1311"><a class="url" data-dcnode-id="1312" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.wall.org/~aron/main" rel="external nofollow"><span data-dcnode-id="1313" instrument_node="">Aron Wall</span></a></cite><span data-dcnode-id="1310" instrument_node=""> </span><span class="says" data-dcnode-id="1308"><span data-dcnode-id="1309" instrument_node="">says:</span></span><span data-dcnode-id="1307" instrument_node=""> </span></div><span data-dcnode-id="1304" instrument_node="">
</span><div class="comment-meta commentmetadata" data-dcnode-id="1300"><a data-dcnode-id="1302" href="#comment-2650861"><span data-dcnode-id="1303" instrument_node="">
				August 16, 2021 at 12:41 AM</span></a><span data-dcnode-id="1301" instrument_node=""> </span></div><span data-dcnode-id="1298" instrument_node="">
</span><div class="comment-body" data-dcnode-id="1230"><p data-dcnode-id="1291"><span data-dcnode-id="1297" instrument_node="">Bert,</span><br data-dcnode-id="1296"><span data-dcnode-id="1295" instrument_node="">
You make some interesting points, which are certainly germane to the question of the Canaanite conquest.  But I also find your comment very disturbing, with its seeming implication that genocide might also be justifiable even in the case of large modern ethnicities (including, apparently some subgroups of Russians, Native Americans, Chinese, Rwandans...).  I have to </span><em data-dcnode-id="1293"><span data-dcnode-id="1294" instrument_node="">strongly dissent</span></em><span data-dcnode-id="1292" instrument_node=""> from your implication that it is possible for human beings to correctly identify, using merely human wisdom, cultures that are worthy of being wiped out.</span></p><span data-dcnode-id="1290" instrument_node="">
</span><p data-dcnode-id="1284"><span data-dcnode-id="1289" instrument_node="">Let me emphasize that according to my blog post (like what the Nazis did) is still </span><em data-dcnode-id="1286"><strong data-dcnode-id="1287"><span data-dcnode-id="1288" instrument_node="">ALWAYS WRONG</span></strong></em><span data-dcnode-id="1285" instrument_node=""> except when justified by an explicit divine command.  (And there are no such divine commands valid for this era of history, in which Christians are instead commanded to tell the good news about Jesus to all nations, and to love even those who seek to kill or harm us.)</span></p><span data-dcnode-id="1283" instrument_node="">
</span><p data-dcnode-id="1281"><span data-dcnode-id="1282" instrument_node="">The exception arises, not because I am a divine command theorist, but because only God is able to make the moral judgements required.  All cultures contain some good as well as some evil, and it would require superhuman wisdom to know that the speculative long term good obtained by removing a culture, outweighs the very obvious and palpable evil associated with killing innocent children.  Hence, a human being who orders a genocide (apart from the limited exceptions found in the Torah, which were valid only for Old Testament period) is always and invariably evil.</span></p><span data-dcnode-id="1280" instrument_node="">
</span><p data-dcnode-id="1273"><span data-dcnode-id="1279" instrument_node="">Karolyn,</span><br data-dcnode-id="1278"><span data-dcnode-id="1277" instrument_node="">
Thanks for your comment.  Your feelings of moral revulsion towards killing babies certainly do you credit.  I assure you that, as the parent of a 7 week old infant, the thought of anyone killing such a being is as loathsome to me, as to any other parent.  But emotions by themselves don't add up to a logical argument. I can't help but notice that your comment is based almost entirely on an emotional argument---claiming I'm inhuman, as if I </span><i data-dcnode-id="1275"><span data-dcnode-id="1276" instrument_node="">liked</span></i><span data-dcnode-id="1274" instrument_node=""> the idea of killing babies---rather than refuting any of my specific arguments in which I mentioned several specific ways in which God is quite different than human murderers.</span></p><span data-dcnode-id="1272" instrument_node="">
</span><p data-dcnode-id="1270"><span data-dcnode-id="1271" instrument_node="">St. John says that "God is love", and "God is light, and in him there is no darkness at all."  So it is certainly common ground between us that God could never do anything which is not loving.  I am not asking you to believe in a God who is evil---it would be better not to believe in God at all, than that.  The question is what difference God's far superior knowledge and power makes.</span></p><span data-dcnode-id="1269" instrument_node="">
</span><p data-dcnode-id="1261"><span data-dcnode-id="1268" instrument_node="">In order to judge whether an act is ethical, it needs to be taken in light of the full circumstances.  For example, when a surgeon cuts open a baby's chest cavity in order to perform a life-saving operation, this is very different morally than if another person did a similar act just for fun.  If you jumped up and down and said "It's just </span><i data-dcnode-id="1266"><span data-dcnode-id="1267" instrument_node="">wrong</span></i><span data-dcnode-id="1265" instrument_node=""> to cut open a baby, no matter </span><i data-dcnode-id="1263"><span data-dcnode-id="1264" instrument_node="">what</span></i><span data-dcnode-id="1262" instrument_node=""> the circumstances are!" then that would not change the fact that the surgeon is morally justified, because there is a greater good (the long term health of the child) which justifies it.</span></p><span data-dcnode-id="1260" instrument_node="">
</span><p data-dcnode-id="1255"><span data-dcnode-id="1259" instrument_node="">Now you say you are not an atheist, and that you DO believe in an afterlife.  So it is clear you think there is a life beyond this one.  If God is responsible for providing this life after death, then obviously this opens up the possibility of a greater good which we only obtain by dying in this life.  Hence, for all your protests, you </span><i data-dcnode-id="1257"><span data-dcnode-id="1258" instrument_node="">cannot</span></i><span data-dcnode-id="1256" instrument_node=""> logically rule out the possibility that when God takes the life of a child, he does so in order to provide the child with a far greater good than what they would have experienced in this life.  </span></p><span data-dcnode-id="1254" instrument_node="">
</span><p data-dcnode-id="1252"><span data-dcnode-id="1253" instrument_node="">So I don't think your argument succeeds.  And it is for this logical reason---and not because I am morally defective, I hope---that I am willing to state that God (but not humans) has moral authority over human life over death. </span></p><span data-dcnode-id="1251" instrument_node="">
</span><p data-dcnode-id="1249"><span data-dcnode-id="1250" instrument_node="">You wrote:</span></p><span data-dcnode-id="1248" instrument_node="">
</span><blockquote data-dcnode-id="1241"><p data-dcnode-id="1242"><span data-dcnode-id="1247" instrument_node="">
I have to admit that in order to accept the killing of innocent babies and animals even by God you have to turn off your humanistic feeling.</span><br data-dcnode-id="1246"><span data-dcnode-id="1245" instrument_node="">
[...]</span><br data-dcnode-id="1244"><span data-dcnode-id="1243" instrument_node="">
The fact that you and I habe such different moral thresholds for suffering of the innocent shows that in favt people don’t have some built-in moral compasses as implied in the Bible.
</span></p></blockquote><span data-dcnode-id="1240" instrument_node="">
</span><p data-dcnode-id="1238"><span data-dcnode-id="1239" instrument_node="">Even if you were right about the ethics of the genocides in the Old Testament, this argument doesn't follow at all.  If, as you say, somebody has to "turn off" their humanistic feelings, then logically that implies that they still have those feelings, they are just suppressing or ignoring them.  And that is exactly what St. Paul meant by the "law written in our hearts".  Paul certainly wasn't trying to say that everybody always follows his moral compass!  Or that people never ignore it and do bad things in the name of religion---if that were true, then Jesus would not have been condemned by the Sanhedren, and crucified.</span></p><span data-dcnode-id="1237" instrument_node="">
</span><p data-dcnode-id="1235"><span data-dcnode-id="1236" instrument_node="">(But perhaps you were just lashing out in anger, and didn't really mean to assert this?)</span></p><span data-dcnode-id="1234" instrument_node="">
</span><p data-dcnode-id="1232"><span data-dcnode-id="1233" instrument_node="">Also, I don't think our moral thresholds are that different.  "Never commit genocide", and "Never commit genocide, unless explicitly commanded to do so by God" work out to pretty much the same thing in day-to-day life, especially since I don't think God gives such commands in the modern era.</span></p><span data-dcnode-id="1231" instrument_node="">

</span><p data-dcnode-id="1193"><span data-dcnode-id="1197" instrument_node="">Also, there are a lot of people who have read this post and comment on it solely for purposes of expressing their anger against the God of the Bible, or that anyone could believe in such a Deity.  Most of these posts don't engage in any substantive way with the things I've written.  If you wish to make an argument against this blog post, please make sure to re-read the four sections labelled </span><strong data-dcnode-id="1195"><span data-dcnode-id="1196" instrument_node="">I-IV</span></strong><span data-dcnode-id="1194" instrument_node=""> and then make sure that what you are saying is actually responsive what I've written.  Thanks!—AW]</span></p><span data-dcnode-id="1192" instrument_node="">

</span><cite class="fn" data-dcnode-id="1176"><span data-dcnode-id="1177" instrument_node="">JamesH</span></cite><span data-dcnode-id="1175" instrument_node=""> </span><span class="says" data-dcnode-id="1173"><span data-dcnode-id="1174" instrument_node="">says:</span></span><span data-dcnode-id="1172" instrument_node=""> </span></div><span data-dcnode-id="1169" instrument_node="">
</span><div class="comment-meta commentmetadata" data-dcnode-id="1165"><a data-dcnode-id="1167" href="#comment-2650897"><span data-dcnode-id="1168" instrument_node="">
				August 20, 2021 at 7:16 AM</span></a><span data-dcnode-id="1166" instrument_node=""> </span></div><span data-dcnode-id="1163" instrument_node="">
</span><div class="comment-body" data-dcnode-id="1156"><p data-dcnode-id="1161"><span data-dcnode-id="1162" instrument_node="">"Karolyn writes: As for me, I don’t know which religion is true and for that matter if any of them are true, but I do believe that people who saw the light and the other side during their near death experiences don’t lie."</span></p><span data-dcnode-id="1160" instrument_node="">
</span><p data-dcnode-id="1158"><span data-dcnode-id="1159" instrument_node="">I have always been very sceptical about these reported "near death" experiences on theological grounds. Surely, God, being omnipotent, would know whether someone was about to die or not. If He knows that they are *not* going to die, then, presumably, He would not "run" a near-death experience for that person. To suppose otherwise is, in effect, to suppose that He is not omnipotent.</span></p><span data-dcnode-id="1157" instrument_node="">
</span></div><span data-dcnode-id="1155" instrument_node="">

</span><li class="comment byuser comment-author-aron bypostauthor odd alt thread-odd thread-alt depth-1" data-dcnode-id="1085" id="li-comment-2650923"><span data-dcnode-id="1145" instrument_node="">
</span><div data-dcnode-id="1088" id="comment-2650923"><span data-dcnode-id="1144" instrument_node="">
</span><div class="comment-author vcard" data-dcnode-id="1135"><span data-dcnode-id="1143" instrument_node="">
</span><cite class="fn" data-dcnode-id="1140"><a class="url" data-dcnode-id="1141" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.wall.org/~aron/main" rel="external nofollow"><span data-dcnode-id="1142" instrument_node="">Aron Wall</span></a></cite><span data-dcnode-id="1139" instrument_node=""> </span><span class="says" data-dcnode-id="1137"><span data-dcnode-id="1138" instrument_node="">says:</span></span><span data-dcnode-id="1136" instrument_node=""> </span></div><span data-dcnode-id="1133" instrument_node="">
</span><div class="comment-meta commentmetadata" data-dcnode-id="1129"><a data-dcnode-id="1131" href="#comment-2650923"><span data-dcnode-id="1132" instrument_node="">
				August 26, 2021 at 1:17 PM</span></a><span data-dcnode-id="1130" instrument_node=""> </span></div><span data-dcnode-id="1127" instrument_node="">
</span><div class="comment-body" data-dcnode-id="1094"><p data-dcnode-id="1123"><span data-dcnode-id="1126" instrument_node="">JamesH,</span><br data-dcnode-id="1125"><span data-dcnode-id="1124" instrument_node="">
I don't put a huge amount of stock in NDE's myself, but since Karolyn thinks they are important, I thought I would say something about what would follow from them.  It is true that there are enough commonalities between different reports of NDE's that I'm not sure they can be dismissed out of hand.</span></p><span data-dcnode-id="1122" instrument_node="">
</span><p data-dcnode-id="1114"><span data-dcnode-id="1121" instrument_node="">Regarding your theological objections, I agree that it seems inconsistent with God's omnisicence for him to accept somebody into heaven proper, given that he knows whether or not they are going to die.  But, I'm not sure that's a necessary implication here.  There's a reason why NDE are called </span><i data-dcnode-id="1119"><span data-dcnode-id="1120" instrument_node="">near</span></i><span data-dcnode-id="1118" instrument_node=""> death experiences rather than </span><i data-dcnode-id="1116"><span data-dcnode-id="1117" instrument_node="">actual</span></i><span data-dcnode-id="1115" instrument_node=""> death experiences.  It is not necessary to assume that NDE's are identical to what happens to people who are "all dead", as Miracle Max would say.  (And in many cases the spiritual beings explain to the person in question that they are going to have to return, which seems fully consistent with God knowing whether the person is going to really die or not.)</span></p><span data-dcnode-id="1113" instrument_node="">
</span><p data-dcnode-id="1105"><span data-dcnode-id="1112" instrument_node="">Given the existence of a spirtual world, it is not suprising if people might be more likely to have mystical visions or experiences at times when their ordinary mental processing is disrupted (e.g. during a state of cardiac arrest, but it's not as if </span><em data-dcnode-id="1110"><span data-dcnode-id="1111" instrument_node="">only</span></em><span data-dcnode-id="1109" instrument_node=""> near-death patients have visions).  St. Paul himself talks about an event of being "caught up to paradise" (</span><a data-dcnode-id="1107" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biblegateway.com/passage/%3Fsearch%3D2%2BCor%2B12%253A2-4%26version%3DHCSB" rel="nofollow"><span data-dcnode-id="1108" instrument_node="">2 Cor 12:2-4</span></a><span data-dcnode-id="1106" instrument_node="">) in what seems to regard as a possible "out of body experience"---but he is careful not to say that he actually knows.  And if a person is having a medical crisis, it may make sense for their vision or dream to be thematically related to life after death, even if that person is not really going to die.</span></p><span data-dcnode-id="1104" instrument_node="">
</span><p data-dcnode-id="1102"><span data-dcnode-id="1103" instrument_node="">As always, such visions should not be uncritically treated as infallible, especially given the tendency of some people to remember spurious detials after the fact (a fact which is not necessarily helped by talking to researchers who are trying to study stereotypical NDE experiences).  Nor are such experiences as authoritative as established biblical revelation (cf. Numbers 12:6-8).</span></p><span data-dcnode-id="1101" instrument_node="">
</span><p data-dcnode-id="1096"><span data-dcnode-id="1100" instrument_node="">In any case God does not necessarily need to follow our own rules in deciding how to reach people.  I have a friend who converted to Christianity as a result of an intense theological psychadelic trip he experienced, after smoking weed (which occasionally has effects more similar to LSD).  Now I myself would strongly advise </span><em data-dcnode-id="1098"><span data-dcnode-id="1099" instrument_node="">against</span></em><span data-dcnode-id="1097" instrument_node=""> using drugs as a method to obtain spiritual insight, since I think it dramatically increases the risk of false (or even demonic) spiritual experiences.  But, this is a rule of human wisdom, and not a restriction that I am in a position to place on God himself, who can do whatever he wants.</span></p><span data-dcnode-id="1095" instrument_node="">
</span></div><span data-dcnode-id="1093" instrument_node="">
</span><div class="reply" data-dcnode-id="1091"><span data-dcnode-id="1092" instrument_node="">
</span></div><span data-dcnode-id="1089" instrument_node="">
</span></div><span data-dcnode-id="1086" instrument_node="">
</span></li><span data-dcnode-id="1084" instrument_node="">
</span><li class="comment even thread-even depth-1" data-dcnode-id="1032" id="li-comment-2653692"><span data-dcnode-id="1083" instrument_node="">
</span><div data-dcnode-id="1035" id="comment-2653692"><span data-dcnode-id="1082" instrument_node="">
</span><div class="comment-author vcard" data-dcnode-id="1073"><span data-dcnode-id="1081" instrument_node="">
</span><cite class="fn" data-dcnode-id="1078"><a class="url" data-dcnode-id="1079" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freedomofdissociation.wordpress.com/" rel="external nofollow"><span data-dcnode-id="1080" instrument_node="">Lilith of Abaddon</span></a></cite><span data-dcnode-id="1077" instrument_node=""> </span><span class="says" data-dcnode-id="1075"><span data-dcnode-id="1076" instrument_node="">says:</span></span><span data-dcnode-id="1074" instrument_node=""> </span></div><span data-dcnode-id="1071" instrument_node="">
</span><div class="comment-meta commentmetadata" data-dcnode-id="1067"><a data-dcnode-id="1069" href="#comment-2653692"><span data-dcnode-id="1070" instrument_node="">
				March 2, 2022 at 5:46 PM</span></a><span data-dcnode-id="1068" instrument_node=""> </span></div><span data-dcnode-id="1065" instrument_node="">
</span><div class="comment-body" data-dcnode-id="1041"><p data-dcnode-id="1063"><span data-dcnode-id="1064" instrument_node="">I.</span></p><span data-dcnode-id="1062" instrument_node="">
</span><p data-dcnode-id="1060"><span data-dcnode-id="1061" instrument_node="">There is no meaningful distinction between "When God commands something, it is right because God has commanded it" and "God is only capable of commanding that which is right, because God is Good." Both are examples of Divine Command morality and, indeed, both are the same statement. If we cannot reason what makes one act 'Good' and another 'Evil', beyond 'God did it' then it can serve no purpose to us nor does it make sense to deliver unto us via sacred texts. It is much more reasonable to consider that the God of the Israelites is a narrative device of their King and, as such, God must be depicted as capricious because at times the King will be capricious. The God of the Israelites is no different than the multitude of Bronze Age patron deities of City/States, in this respect except that people still make such logical blunders in attempt to rationalize his actions and I've yet to see any attempt to rationalize Marduk as such. If I kill and claim God has commanded me to, it makes no difference as to which God I am claiming has commanded me, I have committed an immoral act because there is no reasonable means of drawing distinction between my claim being the truth, psychosis or an excuse.</span></p><span data-dcnode-id="1059" instrument_node="">
</span><p data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">When Abraham pleads with God not to destroy Sodom, it is most interesting to me that, not only does Abraham suggests that this might be an immoral act and that God sees enough truth to let him make his case (which is textual evidence against your entire supposition), but that at no point does God stop him or tell him 'that's too few righteous; at that point the morality calculus doesn't weigh out' but Abraham simply gives up having negotiated God down to 10. I cannot help but to wonder if God wasn't waiting for Abraham to say, 'Actually, maybe you just shouldn't murder them all, either way?'</span></p><span data-dcnode-id="1056" instrument_node="">
</span><p data-dcnode-id="1054"><span data-dcnode-id="1055" instrument_node="">Similarly, Abraham being ordered to murder his son, regardless of Abraham's (potentially flawed) assumptions, it makes very little sense for an all-good and all-knowing God to abuse Abraham and traumatize Issac in this way. Ostensibly, God should know the result and there should be no need to test, and even if we assume there was some point to the test (and thus accept a limit to God's knowing), walking Abraham to that point only to call him back at the last moment doesn't actually test Abraham because he doesn't actually do it. An all-powerful God could raise Issac back from the dead and, thus, there would be no reason to stop Abraham.</span></p><span data-dcnode-id="1053" instrument_node="">
</span><p data-dcnode-id="1051"><span data-dcnode-id="1052" instrument_node="">The only pretext that could make sense, in my reckoning, is that there are limits to God's knowledge (specifically preserving free-will) and that Abraham was on the precipice of doing it and thusly failed God's test of his morality. Abraham (and by extension, humanity) had not developed a moral philosophy sophisticated enough to reason that he should challenge God.</span></p><span data-dcnode-id="1050" instrument_node="">
</span><p data-dcnode-id="1046"><span data-dcnode-id="1049" instrument_node="">If God orders you to kill someone, I should hope you'd argue the point.</span><br data-dcnode-id="1048"><span data-dcnode-id="1047" instrument_node="">
I certainly would.</span></p><span data-dcnode-id="1045" instrument_node="">
</span><p data-dcnode-id="1043"><span data-dcnode-id="1044" instrument_node="">The faithful often have said 'God works in mysterious ways', yet this seems to invariably come up as rationalization for why the irrational 'moral of the story' should be accepted and never why deeper reasoning, which sheds light upon that mystery, might be considered. Almost as if, 'it didn't make sense then, therefore we cannot make sense of it now.'</span></p><span data-dcnode-id="1042" instrument_node="">
</span></div><span data-dcnode-id="1040" instrument_node="">
</span><div class="reply" data-dcnode-id="1038"><span data-dcnode-id="1039" instrument_node="">
</span></div><span data-dcnode-id="1036" instrument_node="">
</span></div><span data-dcnode-id="1033" instrument_node="">
</span></li><span data-dcnode-id="1031" instrument_node="">

</span><div class="comment-author vcard" data-dcnode-id="1020"><span data-dcnode-id="1028" instrument_node="">
</span><cite class="fn" data-dcnode-id="1025"><a class="url" data-dcnode-id="1026" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freedomofdissociation.wordpress.com/" rel="external nofollow"><span data-dcnode-id="1027" instrument_node="">Lilith of Abaddon</span></a></cite><span data-dcnode-id="1024" instrument_node=""> </span><span class="says" data-dcnode-id="1022"><span data-dcnode-id="1023" instrument_node="">says:</span></span><span data-dcnode-id="1021" instrument_node=""> </span></div><span data-dcnode-id="1018" instrument_node="">
</span><div class="comment-meta commentmetadata" data-dcnode-id="1014"><a data-dcnode-id="1016" href="#comment-2653693"><span data-dcnode-id="1017" instrument_node="">
				March 2, 2022 at 6:00 PM</span></a><span data-dcnode-id="1015" instrument_node=""> </span></div><span data-dcnode-id="1012" instrument_node="">
</span><div class="comment-body" data-dcnode-id="1005"><p data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">Aron, I could not help but notice your last comment and I can't help but wonder...</span></p><span data-dcnode-id="1009" instrument_node="">
</span><p data-dcnode-id="1007"><span data-dcnode-id="1008" instrument_node="">For what reason do you believe your friend's experience was not false or even demonic, beyond simply agreeing with the conclusion?</span></p><span data-dcnode-id="1006" instrument_node="">
</span></div><span data-dcnode-id="1004" instrument_node="">
</span><div class="reply" data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">

</span><li class="comment byuser comment-author-aron bypostauthor even thread-even depth-1" data-dcnode-id="877" id="li-comment-2655013"><span data-dcnode-id="994" instrument_node="">
</span><div data-dcnode-id="880" id="comment-2655013"><span data-dcnode-id="993" instrument_node="">
</span><div class="comment-author vcard" data-dcnode-id="984"><span data-dcnode-id="992" instrument_node="">
</span><cite class="fn" data-dcnode-id="989"><a class="url" data-dcnode-id="990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.wall.org/~aron/main" rel="external nofollow"><span data-dcnode-id="991" instrument_node="">Aron Wall</span></a></cite><span data-dcnode-id="988" instrument_node=""> </span><span class="says" data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">says:</span></span><span data-dcnode-id="985" instrument_node=""> </span></div><span data-dcnode-id="982" instrument_node="">
</span><div class="comment-meta commentmetadata" data-dcnode-id="978"><a data-dcnode-id="980" href="#comment-2655013"><span data-dcnode-id="981" instrument_node="">
				April 16, 2022 at 12:00 PM</span></a><span data-dcnode-id="979" instrument_node=""> </span></div><span data-dcnode-id="976" instrument_node="">
</span><div class="comment-body" data-dcnode-id="886"><p data-dcnode-id="972"><span data-dcnode-id="975" instrument_node="">Lilith,</span><br data-dcnode-id="974"><span data-dcnode-id="973" instrument_node="">
Welcome to my blog.  Here are a few reactions to your comments.</span></p><span data-dcnode-id="971" instrument_node="">
</span><p data-dcnode-id="966"><span data-dcnode-id="970" instrument_node="">As a matter of fact, I did not rule out the possibility of "false or even demonic" elements in his weird trip.  Some of the aspects did seem to me to be potentially dangerous or potentially leading to arrogance.  But I think there were probably also some elements which came from God.  When my friend told me about his experience, I prayed and asked God "Well I don't know if it's your will to give me the gift of discerning spirits in general, but I need it </span><i data-dcnode-id="968"><span data-dcnode-id="969" instrument_node="">right now</span></i><span data-dcnode-id="967" instrument_node="">".  I ended up telling him I thought his visions were a mix of different elements and if he wanted to sort it out in his mind, it would be a good idea to lay of the drugs and engage in more mundane religious practices for a while.</span></p><span data-dcnode-id="965" instrument_node="">
</span><p data-dcnode-id="963"><span data-dcnode-id="964" instrument_node="">That being said, I don't think it is necessarily illegitimate for "agreeing with the conclusion" to play a role.  There is a time and a place to weigh the evidence about whether Christianity is true, but the rest of the time one must act on the assumption that one's beliefs are correct.</span></p><span data-dcnode-id="962" instrument_node="">
</span><blockquote data-dcnode-id="959"><p data-dcnode-id="960"><span data-dcnode-id="961" instrument_node="">
It is much more reasonable to consider that the God of the Israelites is a narrative device of their King and, as such, God must be depicted as capricious because at times the King will be capricious. The God of the Israelites is no different than the multitude of Bronze Age patron deities of City/States, in this respect except that people still make such logical blunders in attempt to rationalize his actions and I've yet to see any attempt to rationalize Marduk as such.
</span></p></blockquote><span data-dcnode-id="958" instrument_node="">
</span><p data-dcnode-id="956"><span data-dcnode-id="957" instrument_node="">You can't have read very far in the Bible if you think that God invariably supports the actions of the Israelite King (or more generally, the ascendant powers of the time).  In fact it is far more frequent for the prophets to be morally critical of Israel.  Even King David and King Solomon are at times severely rebuked for moral wrongdoing.  </span></p><span data-dcnode-id="955" instrument_node="">
</span><p data-dcnode-id="953"><span data-dcnode-id="954" instrument_node="">I agree that support for political powers was pretty much normal for "the multitude of Bronze Age patron deities of City/States" but that makes it all the more remarkable that the Old Testament generally does not adhere to this pattern!  In fact, I'd go further and say that our basic modern assumption that it's a good thing to critique the ruling authorities, is something that we ultimately inherit from Judaism.</span></p><span data-dcnode-id="952" instrument_node="">
</span><blockquote data-dcnode-id="949"><p data-dcnode-id="950"><span data-dcnode-id="951" instrument_node="">
There is no meaningful distinction between "When God commands something, it is right because God has commanded it" and "God is only capable of commanding that which is right, because God is Good." Both are examples of Divine Command morality and, indeed, both are the same statement.
</span></p></blockquote><span data-dcnode-id="948" instrument_node="">
</span><p data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">This is simply an incorrect use of words---in the philosophy literature, the phrase "divine command theory" refers only to the second claim and not to the first one.  As for saying that there is no difference, there is all the difference in the world.  If some act X is good but for reasons I don't understand, then by doing X I obtain the goods in question even if I don't understand how my act is connected to them.  For example, if I get sick and the doctor tells me to take some nasty tasting medicine, but I don't understand his explanation of why it will cure my disease, that doesn't mean I can't accept on his authority that it will help.  Obviously this is not equivalent to the statement: "health by definition just means obeying whatever doctors say" (which obviously wouldn't be correct).</span></p><span data-dcnode-id="945" instrument_node="">
</span><p data-dcnode-id="943"><span data-dcnode-id="944" instrument_node="">Another difference between the two statements comes from the fact that, if God commands me to do a thing (not necessarily killing somebody, my point is more general) for an unknown reason, that maybe at some later point I will come to understand what that reason is.  So I actually agree with your statement that we shouldn't do the following:</span></p><span data-dcnode-id="942" instrument_node="">
</span><blockquote data-dcnode-id="939"><p data-dcnode-id="940"><span data-dcnode-id="941" instrument_node="">
The faithful often have said 'God works in mysterious ways', yet this seems to invariably come up as rationalization for why the irrational 'moral of the story' should be accepted and never why deeper reasoning, which sheds light upon that mystery, might be considered. Almost as if, 'it didn't make sense then, therefore we cannot make sense of it now.'
</span></p></blockquote><span data-dcnode-id="938" instrument_node="">
</span><p data-dcnode-id="936"><span data-dcnode-id="937" instrument_node="">Yeah, I think a better approach would be to try to understand the deeper reasoning behind the events as much as possible.</span></p><span data-dcnode-id="935" instrument_node="">
</span><blockquote data-dcnode-id="932"><p data-dcnode-id="933"><span data-dcnode-id="934" instrument_node="">
If I kill and claim God has commanded me to, it makes no difference as to which God I am claiming has commanded me, I have committed an immoral act because there is no reasonable means of drawing distinction between my claim being the truth, psychosis or an excuse.
</span></p></blockquote><span data-dcnode-id="931" instrument_node="">
</span><p data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">I would certainly meet you part way here, and say that the burden of proof is higher for supposed divine commands to kill people (or to do other things which seem severely wrong by ordinary moral standards).  Even though I do believe that God has talked to me on a number of occasions, if I thought he was telling me to kill somebody I would hold it to a higher burden of proof than normally.  But in cases where the divine voice has already confirmed itself with numerous miracles (e.g. the miracles of the Exodus) I think the people who heard God's commands under such circumstances did have reasonable means of distinguishing the commands from psychosis or excuses.  (Obviously, a skeptic might think the Torah miracles never happened, but this is an uninteresting hypothetical since in that case Judaism is false and obviously the commands of a nonexistent deity should not carry any moral weight.)</span></p><span data-dcnode-id="928" instrument_node="">
</span><blockquote data-dcnode-id="923"><p data-dcnode-id="924"><span data-dcnode-id="927" instrument_node="">
If God orders you to kill someone, I should hope you'd argue the point.</span><br data-dcnode-id="926"><span data-dcnode-id="925" instrument_node="">
I certainly would.
</span></p></blockquote><span data-dcnode-id="922" instrument_node="">
</span><p data-dcnode-id="917"><span data-dcnode-id="921" instrument_node="">As the Abraham and Sodom story indicates, the God of the Bible does make room for human reactions to change his decisions, so you wouldn't necessarily be off-base to do so.  (There are </span><a data-dcnode-id="919" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.wall.org/~aron/blog/god-and-time-iv-impassibility-and-the-bible/" rel="nofollow" title="God and Time IV: Impassibility and the Bible"><span data-dcnode-id="920" instrument_node="">numerous other examples</span></a><span data-dcnode-id="918" instrument_node=""> of God accepting such requests in the Bible.)</span></p><span data-dcnode-id="916" instrument_node="">
</span><blockquote data-dcnode-id="913"><p data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">
Ostensibly, God should know the result and there should be no need to test, and even if we assume there was some point to the test (and thus accept a limit to God's knowing),
</span></p></blockquote><span data-dcnode-id="912" instrument_node="">
</span><p data-dcnode-id="904"><span data-dcnode-id="911" instrument_node="">My view is that while God knows all realities (including </span><a data-dcnode-id="909" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.wall.org/~aron/blog/god-and-time-v-foreknowledge-from-scripture/" rel="nofollow" title="God and Time V: Foreknowledge from Scripture"><span data-dcnode-id="910" instrument_node="">the future</span></a><span data-dcnode-id="908" instrument_node="">), if God had not tested Abraham, there would have been no fact of the matter about what Abraham </span><i data-dcnode-id="906"><span data-dcnode-id="907" instrument_node="">would</span></i><span data-dcnode-id="905" instrument_node=""> have done (since human beings have free will).  So even though God knows everything that exists, he still needed to test him in order to know this.</span></p><span data-dcnode-id="903" instrument_node="">
</span><blockquote data-dcnode-id="900"><p data-dcnode-id="901"><span data-dcnode-id="902" instrument_node="">
walking Abraham to that point only to call him back at the last moment doesn't actually test Abraham because he doesn't actually do it.  An all-powerful God could raise Issac back from the dead and, thus, there would be no reason to stop Abraham.
</span></p></blockquote><span data-dcnode-id="899" instrument_node="">
</span><p data-dcnode-id="897"><span data-dcnode-id="898" instrument_node="">This seems like a pretty minor quibble compared to the other stuff.  Abraham's other actions make it clear that he intended to go through with the sacrifice (even though Abraham also seems to have believed that he would get Isaac back afterwards somehow).  </span></p><span data-dcnode-id="896" instrument_node="">
</span><p data-dcnode-id="888"><span data-dcnode-id="895" instrument_node="">Yes, God could have raised Isaac from the dead (a point made in </span><a data-dcnode-id="893" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biblegateway.com/passage/%3Fsearch%3DHebrews%252011%253A17-19%26version%3DNIV" rel="nofollow"><span data-dcnode-id="894" instrument_node="">Hebrews 11:19</span></a><span data-dcnode-id="892" instrument_node="">).  But by stopping the sacrifice, God made it more clear that he didn't want human sacrifices to be a part of the Israelite religion going forward (cf </span><a data-dcnode-id="890" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biblegateway.com/passage/%3Fsearch%3DLeviticus%2B20%253A1-5%26version%3DNIV" rel="nofollow"><span data-dcnode-id="891" instrument_node="">Leviticus 20:1-5</span></a><span data-dcnode-id="889" instrument_node="">).  Furthermore, the substitution of the ram for Isaac points to the principle of substitutionary atonement, and foreshadows the way Christ dies in our place for our sins.  Since Isaac was not Christ, it was unfitting for his sacrifice to be taken to its conclusion.</span></p><span data-dcnode-id="887" instrument_node="">
</span></div><span data-dcnode-id="885" instrument_node="">
</span><div class="reply" data-dcnode-id="883"><span data-dcnode-id="884" instrument_node="">
