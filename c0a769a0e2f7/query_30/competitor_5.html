</span><div data-dcnode-id="5185" id="comment-2637861"><span data-dcnode-id="5289" instrument_node="">
</span><div class="comment-author vcard" data-dcnode-id="5280"><span data-dcnode-id="5288" instrument_node="">
</span><cite class="fn" data-dcnode-id="5285"><a class="url" data-dcnode-id="5286" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.wall.org/~aron/main" rel="external nofollow"><span data-dcnode-id="5287" instrument_node="">Aron Wall</span></a></cite><span data-dcnode-id="5284" instrument_node=""> </span><span class="says" data-dcnode-id="5282"><span data-dcnode-id="5283" instrument_node="">says:</span></span><span data-dcnode-id="5281" instrument_node=""> </span></div><span data-dcnode-id="5278" instrument_node="">
</span><div class="comment-meta commentmetadata" data-dcnode-id="5274"><a data-dcnode-id="5276" href="#comment-2637861"><span data-dcnode-id="5277" instrument_node="">
				February 14, 2015 at 10:04 PM</span></a><span data-dcnode-id="5275" instrument_node=""> </span></div><span data-dcnode-id="5272" instrument_node="">
</span><div class="comment-body" data-dcnode-id="5191"><p data-dcnode-id="5270"><span data-dcnode-id="5271" instrument_node="">Howie,</span></p><span data-dcnode-id="5269" instrument_node="">
</span><p data-dcnode-id="5258"><span data-dcnode-id="5268" instrument_node="">The argument from parents and government officials is </span><i data-dcnode-id="5266"><span data-dcnode-id="5267" instrument_node="">a fortiori</span></i><span data-dcnode-id="5265" instrument_node="">.  That is, if parents and judges have </span><i data-dcnode-id="5263"><span data-dcnode-id="5264" instrument_node="">some</span></i><span data-dcnode-id="5262" instrument_node=""> authority despite being human beings with limited wisdom, love, and connection to those they rule over, then how much </span><i data-dcnode-id="5260"><span data-dcnode-id="5261" instrument_node="">more</span></i><span data-dcnode-id="5259" instrument_node=""> authority would reside in a being with infinite love and wisdom who created everything?  This is the same type of argument that Jesus uses in Matthew 7:11:</span></p><span data-dcnode-id="5257" instrument_node="">
</span><blockquote data-dcnode-id="5254"><p data-dcnode-id="5255"><span data-dcnode-id="5256" instrument_node=""> If you, then, though you are evil, know how to give good gifts to your children, how much more will your Father in heaven give good gifts to those who ask him!</span></p></blockquote><span data-dcnode-id="5253" instrument_node="">
</span><p data-dcnode-id="5251"><span data-dcnode-id="5252" instrument_node="">That there is disagreement about the exact scope of government authority is irrelevant.  All that matters for my argument is that they have some legitimate authority.  (But my own personal belief is that, apart from the specific divine authorization to ancient Israel, no government has any buisness imposing a particular religion or religious ritual on anybody else.)</span></p><span data-dcnode-id="5250" instrument_node="">
</span><blockquote data-dcnode-id="5243"><p data-dcnode-id="5244"><span data-dcnode-id="5249" instrument_node="">
But again, what if In the future it is possible to read someone’s thoughts? You answer is simply:</span><br data-dcnode-id="5248"><span data-dcnode-id="5247" instrument_node="">
"Didn't I mention something about love".</span><br data-dcnode-id="5246"><span data-dcnode-id="5245" instrument_node="">
I’m sorry I don't understand how this is an answer at all. The questions remains.
</span></p></blockquote><span data-dcnode-id="5242" instrument_node="">
</span><p data-dcnode-id="5240"><span data-dcnode-id="5241" instrument_node="">Do I really need to spell this out for you?  The ability to read people's minds would increase our knowledge, but it would not necessarily make us more loving or even more wise.  Furthermore it would be a much lesser degree of knowledge than omniscience.  So the parallel to God is lacking.  (Also I doubt many human beings have the wisdom to handle mind reading; I strongly suspect it would make most people worse parents rather than better.)</span></p><span data-dcnode-id="5239" instrument_node="">
</span><blockquote data-dcnode-id="5236"><p data-dcnode-id="5237"><span data-dcnode-id="5238" instrument_node="">
How can you seriously claim that the god that supposedly created the entire universe yet is interested in my sex life is not a bossy micro manager?
</span></p></blockquote><span data-dcnode-id="5235" instrument_node="">
</span><p data-dcnode-id="5230"><span data-dcnode-id="5234" instrument_node="">How can you possibly suggest that a God who cares about human beings, could be uninterested in one of the most important parts of human behavior?  Which incidentally is also the mechanism for creating new human beings.  How could he </span><i data-dcnode-id="5232"><span data-dcnode-id="5233" instrument_node="">not</span></i><span data-dcnode-id="5231" instrument_node=""> be interested in sex?  Your concept of God is much too anthropomorphic, you are thinking of him as a sourpuss and a killjoy rather than as the cosmic artist who created sex in the first place.  I assume that God is great enough to be interested in every electron in the universe (or it would not exist), so why should he not be interested in the things that people care about?  You may as well say that Leonardo de Vinci was a bossy micromanager when he made sure every little fleck of paint on the Mona Lisa was exactly how he wanted it to be.</span></p><span data-dcnode-id="5229" instrument_node="">
</span><p data-dcnode-id="5227"><span data-dcnode-id="5228" instrument_node="">And yet, when was the last time he spoke from heaven and told you to refrain from a particular sex act you were about to perform?  Or made himself so obstrusively present that you felt that your privacy was violated?  Seems to me he's given you quite a bit of space and freedom to make your own choices.  Quite the opposite of a micromanager, really.  When you consider what God could easily do with his power, it seems to me he shows far more humility and restraint than any human being would, if given absolute power.</span></p><span data-dcnode-id="5226" instrument_node="">
</span><blockquote data-dcnode-id="5221"><p data-dcnode-id="5222"><span data-dcnode-id="5225" instrument_node="">
You make statements such as “There is no chance of you being right and him being wrong” but this just confirms that you are not open to evidence, instead you simply seek to rationalize your already held beliefs. You say “Also, he created you for a specific purpose, and knows that you will be unhappy if you don't fulfil it.”</span><br data-dcnode-id="5224"><span data-dcnode-id="5223" instrument_node="">
Would you tell that to the mothers of the slaughtered Egyptian children, that god knew what would make them happy and fulfilled and so killed their first born children?
</span></p></blockquote><span data-dcnode-id="5220" instrument_node="">
</span><p data-dcnode-id="5218"><span data-dcnode-id="5219" instrument_node="">I don't know whether I would have the right to say it to a grieving mother, but it would be true.  The only thing capable of fulfilling the eternal longings of the human heart is a relationship with God, not with a human child.  See Chapter 11 of the Great Divorce by St. C.S. Lewis.</span></p><span data-dcnode-id="5217" instrument_node="">
</span><p data-dcnode-id="5215"><span data-dcnode-id="5216" instrument_node="">As for hamstringing the horses, I don't know what God's exact motives were, but I can speculate.  I know you will find this difficult to believe, but although God loves animals he thinks human beings are even more important.  So what he wanted to teach Israel (about not relying on cavalry) was more important than the sufferings of the horses.  Possibly their lives were still better than if they'd just been killed; I'm not in a position to know that.  Of course God could have intervened miraculously to teleport them all to a Happy Horse Paradise, but the same could be said about every other evil in the world (that God could remove it if he chose to).  There's already lots of suffering in Nature due to disease and carnivores.  Presumably God's plan includings limiting the amount of direct intervention he uses, and accomplishing some of his goals through human beings and natural processes instead of doing it all miraculously.  Necessarily, some amount of evil must be tolerated as a result, but good also comes from it.</span></p><span data-dcnode-id="5214" instrument_node="">
</span><p data-dcnode-id="5212"><span data-dcnode-id="5213" instrument_node="">The fact that the Germans repented of their anti-Semitism after WWII shows that they weren't irredeemably evil.  Only God is in a position to know this sort of thing in advance.  If we humans acted alone without divine guidance, we would be in danger of pulling up the wheat with the tares (Matt. 13:29).</span></p><span data-dcnode-id="5211" instrument_node="">
</span><blockquote data-dcnode-id="5208"><p data-dcnode-id="5209"><span data-dcnode-id="5210" instrument_node="">
...One can only assume that you are simply not open to evidence. I find that an incredible state of affairs for someone of the very high level of scientific training you have.
</span></p></blockquote><span data-dcnode-id="5207" instrument_node="">
</span><p data-dcnode-id="5205"><span data-dcnode-id="5206" instrument_node="">I'm plenty open to the evidence, it's just I'm working from a broader base of evidence than you are.  (There was an experiment a while back where it looked like neutrinos were going faster than light.  Yet most physicists refused to accept the obvious conclusion because they were working from a broader base of evidence than just that one experiment, which indeed turned out to be wrong.)</span></p><span data-dcnode-id="5204" instrument_node="">
</span><p data-dcnode-id="5196"><span data-dcnode-id="5203" instrument_node="">My additional evidence includes: 1) Metaphysical arguments about the fundamental nature of reality of the sort described in </span><a data-dcnode-id="5201" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.wall.org/~aron/blog/fundamental-reality-xii-the-good-and-the-not/" rel="nofollow" title="Fundamental Reality XII: The Good, and the Not"><span data-dcnode-id="5202" instrument_node="">my most recent post</span></a><span data-dcnode-id="5200" instrument_node=""> and the preceeding posts, 2) God's own explicit statements in the Bible that he takes no pleasure in the death of the wicked, and has motives other than cruelty to act the way he does, 3) The New Testament revelation of God's universal love revealed particularly in the life, teaching, and sacrificial death of Jesus, 4) My own personal religious experiences of God, which without exception has revealed God as holy and ethical and loving (yet not always </span><i data-dcnode-id="5198"><span data-dcnode-id="5199" instrument_node="">nice</span></i><span data-dcnode-id="5197" instrument_node="">), 5) the religious experiences of other Christians I respect, which are similar in character.</span></p><span data-dcnode-id="5195" instrument_node="">
</span><p data-dcnode-id="5193"><span data-dcnode-id="5194" instrument_node="">Since we have not discussed most of these additional sources of evidence (something which would take quite some time), you are being much too hasty in accusing me of closed-mindedness.  Can't we discuss the particular topic in front of us in a civilized and rational manner, without all of this grandstanding about how irrational and heartless anyone must be to disagree with you?</span></p><span data-dcnode-id="5192" instrument_node="">
</span></div><span data-dcnode-id="5190" instrument_node="">
</span><div class="reply" data-dcnode-id="5188"><span data-dcnode-id="5189" instrument_node="">
</span></div><span data-dcnode-id="5186" instrument_node="">
</span></div><span data-dcnode-id="5183" instrument_node="">
</span></li><span data-dcnode-id="5181" instrument_node="">
</span><li class="comment odd alt thread-odd thread-alt depth-1" data-dcnode-id="5077" id="li-comment-2637870"><span data-dcnode-id="5180" instrument_node="">
</span><div data-dcnode-id="5080" id="comment-2637870"><span data-dcnode-id="5179" instrument_node="">
</span><div class="comment-author vcard" data-dcnode-id="5171"><span data-dcnode-id="5178" instrument_node="">
</span><cite class="fn" data-dcnode-id="5176"><span data-dcnode-id="5177" instrument_node="">howie</span></cite><span data-dcnode-id="5175" instrument_node=""> </span><span class="says" data-dcnode-id="5173"><span data-dcnode-id="5174" instrument_node="">says:</span></span><span data-dcnode-id="5172" instrument_node=""> </span></div><span data-dcnode-id="5169" instrument_node="">
</span><div class="comment-meta commentmetadata" data-dcnode-id="5165"><a data-dcnode-id="5167" href="#comment-2637870"><span data-dcnode-id="5168" instrument_node="">
				February 18, 2015 at 3:32 AM</span></a><span data-dcnode-id="5166" instrument_node=""> </span></div><span data-dcnode-id="5163" instrument_node="">
</span><div class="comment-body" data-dcnode-id="5086"><p data-dcnode-id="5159"><span data-dcnode-id="5162" instrument_node="">Hi Aron</span><br data-dcnode-id="5161"><span data-dcnode-id="5160" instrument_node="">
Thank you again for taking the time to respond, it is very gracious of you. </span></p><span data-dcnode-id="5158" instrument_node="">
</span><p data-dcnode-id="5152"><span data-dcnode-id="5157" instrument_node="">It appears though that you didn’t really address the central problem of government authority. Recall you said governments had the authority of god when they seek to do justice. I raised the problem of how do we know when they are acting justly or not. I don’t feel that was replied. Even people of the same religious faith don’t agree on fundamental issues of justice. If you read the debates that took place over slavery in the 18th and 19th century you will find both sides of that debate used the bible to justify their position.</span><br data-dcnode-id="5156"><span data-dcnode-id="5155" instrument_node="">
I don’t see how claiming that god has infinite love or wisdom helps us here. More importantly the issue is, does the god of the bible really have infinite love and wisdom? Of course if you assume from the outset he does you will get the answer back that you want. Whenever you look at a behavior that looks barbaric you can always assume he has some good reason for it.</span><br data-dcnode-id="5154"><span data-dcnode-id="5153" instrument_node="">
It reminds me of stories of wives who are continually beaten up by their husbands and still assume he is the right and its for her own good as he really loves her!</span></p><span data-dcnode-id="5151" instrument_node="">
</span><p data-dcnode-id="5143"><span data-dcnode-id="5150" instrument_node="">As regards god’s interest in sexual behavior, you tell me that god is not a micromanager and he respects free will. Yet he says about homosexual sex:</span><br data-dcnode-id="5149"><span data-dcnode-id="5148" instrument_node="">
“ If a man also lie with mankind, as he lieth with a woman, both of them have committed an abomination: they shall surely be put to death; their blood shall be upon them.” Lev 20:13</span><br data-dcnode-id="5147"><span data-dcnode-id="5146" instrument_node="">
You state god should be concerned because its one of the most important part of human behavior and the mechanism of creating new humans. But in the case of homosexual sex it is not going to lead to the creation of new humans. Even in the case of hetro sexual sex, this is not necessarily the case. Killing homosexuals certainly does qualify god as more than a killjoy. I don’t see how the command to kill homo sexuals is consistent with your statement:</span><br data-dcnode-id="5145"><span data-dcnode-id="5144" instrument_node="">
“And yet, when was the last time he spoke from heaven and told you to refrain from a particular sex act you were about to perform? Or made himself so obstrusively present that you felt that your privacy was violated? Seems to me he's given you quite a bit of space and freedom to make your own choices.”</span></p><span data-dcnode-id="5142" instrument_node="">
</span><p data-dcnode-id="5138"><span data-dcnode-id="5141" instrument_node="">Perhaps you would like to read accounts of religious homo sexuals who have killed themselves or been killed by others because they thought homo sexuality conflicted with the bible to see if you want to continue to make such claims.</span><br data-dcnode-id="5140"><span data-dcnode-id="5139" instrument_node="">
I think it’s quite wrong to not consider that having god speak from heaven (in the form of the bible) and condemn a sexual practice like homosexuality is exactly what happens in this case. Perhaps you don’t feel this, but if you look at the wider world you will see many people do. </span></p><span data-dcnode-id="5137" instrument_node="">
</span><p data-dcnode-id="5129"><span data-dcnode-id="5136" instrument_node="">It seems you are moving the goal posts with regarding people ability to read minds. Recall you stated :</span><br data-dcnode-id="5135"><span data-dcnode-id="5134" instrument_node="">
“The Christian answer to your question is that all political authority on earth is ultimately delegated from God, who possesses authority over us because he created us, loves us, and knows us perfectly.”</span><br data-dcnode-id="5133"><span data-dcnode-id="5132" instrument_node="">
If in the future technology enabled a parent to read the mind of their children they would fulfill all of your required criteria. Yet of course no one would think they then have the right to torture or kill their children.</span><br data-dcnode-id="5131"><span data-dcnode-id="5130" instrument_node="">
I note you assume that humans being couldn’t handle mind reading, maybe you are right. This reminds of the phrase power corrupts and absolute power corrupts absolutely. But why not consider that the same is true for god? Would you not consider that his absolute power could possibly corrupt him?</span></p><span data-dcnode-id="5128" instrument_node="">
</span><p data-dcnode-id="5122"><span data-dcnode-id="5127" instrument_node="">Again if you assume that god has all the omnis, then sure he can do no wrong and he can’t be corrupted.  The problem the non-believer has is that our observations of the world and our observations of the stories in the bible do not look like they are consistent with the god of the bible having all the omnis. This is the central problem I feel you do not address.</span><br data-dcnode-id="5126"><span data-dcnode-id="5125" instrument_node="">
A god that is all powerful and all loving does not need to command the torture of animals to ensure the Israelites armies are successful in battle. He could have put the horses to sleep magically; that he chose to have them tortured instead must surely count as evidence against the god of the bible possessing those Omnis.</span><br data-dcnode-id="5124"><span data-dcnode-id="5123" instrument_node="">
Yet your replies always start with the assumption that he does possess those Omnis therefore he can do no wrong. </span></p><span data-dcnode-id="5121" instrument_node="">
</span><p data-dcnode-id="5115"><span data-dcnode-id="5120" instrument_node="">You say you are open to evidence but working from a broader base and give an example of FTL neutrinos. I’m afraid I don’t think this example works. The problem with the neutrinos was not just they contradicted what we expect from relativity but that the experiment just did not stand up to replication and scrutiny. No one experiment should ever over turn a broad body of evidence for the opposite when it has not been replicated. But let us suppose though that it was replicated and scrutinized and after thousands of years and many other examples and may other teams all found the same result, would you still disregard them?</span><br data-dcnode-id="5119"><span data-dcnode-id="5118" instrument_node="">
I think in this hypothetical example you would be abandoning the scientific method.</span><br data-dcnode-id="5117"><span data-dcnode-id="5116" instrument_node="">
However if you failed to believe the FTL neutrinos in the real world scenario that actually played out you would not because there was plenty of legitimate scope to doubt the results. </span></p><span data-dcnode-id="5114" instrument_node="">
</span><p data-dcnode-id="5110"><span data-dcnode-id="5113" instrument_node="">In the case of the bible though you are not in such a place to doubt the data of god’s cruelty. If you are going to believe in the bible as a reliable document then you must accept the stories as true, you cannot disregard the data that is before your eyes and assume they must have some explanation that is consistent with your sacred assumption. At some point you must ask whether your sacred assumption is false.</span><br data-dcnode-id="5112"><span data-dcnode-id="5111" instrument_node="">
The amount of data we had about FTL was insufficient to throw out relativity - or even modify it or find some verification for a loophole in it. But if the data became sufficiently robust, eventually that is what any honest scientist would have done. </span></p><span data-dcnode-id="5109" instrument_node="">
</span><p data-dcnode-id="5107"><span data-dcnode-id="5108" instrument_node="">If you believe that god did order those horses to be tortured and the Egyptian children (and their animals) to be killed and for the all the beings in the world (save Noah and his family) to be slowly killed over multiple days and nights then you are not in a position to disregard the data as the skeptics of FTL neutrinos were. </span></p><span data-dcnode-id="5106" instrument_node="">
</span><p data-dcnode-id="5102"><span data-dcnode-id="5105" instrument_node="">So again the question remains at what point does the data of gods actions make you question your metaphysical arguments?</span><br data-dcnode-id="5104"><span data-dcnode-id="5103" instrument_node="">
It seems to me there is no point at which you do this. If god can act with cruelty why is it impossible for him to lie? Perhaps god has some reason to lie that you are not privy to? If god has good reasons to kill, then perhaps he has good reason to lie? Or is lying a worse crime than torture and murder? Hence you should have reason to doubt god’s word. </span></p><span data-dcnode-id="5101" instrument_node="">
</span><p data-dcnode-id="5093"><span data-dcnode-id="5100" instrument_node="">I don’t see how even if the NT is true this undermines the evidence of god’s cruelty. Human beings can sometimes act lovingly and at other times act with cruelty. So even if the NT is full of love and kindness and we can ignore or re intpret passages such as Jesus saying</span><br data-dcnode-id="5099"><span data-dcnode-id="5098" instrument_node="">
“If a man abide not in me, he is cast forth as a branch, and is withered; and men gather them, and cast them into the fire, and they are burned.” John 15: 6</span><br data-dcnode-id="5097"><span data-dcnode-id="5096" instrument_node="">
That does not undermine the cruelty of the OT. Again only if you refuse to question your sacred assumption will this be the case.</span><br data-dcnode-id="5095"><span data-dcnode-id="5094" instrument_node="">
Although one must consider that Jesus knew that people would use their faith to send people to be burnt to death  n the future, yet he still chose those words. </span></p><span data-dcnode-id="5092" instrument_node="">
</span><p data-dcnode-id="5088"><span data-dcnode-id="5091" instrument_node="">You experience I’m sure is very real to you. But experience can be misinterpreted. Many people feel they have had a real experience of being kidnapped by aliens, but I would think it’s more likely they are misinterpreting sleep paralysis and false memories.</span><br data-dcnode-id="5090"><span data-dcnode-id="5089" instrument_node="">
I have no doubt your experiences seem real to you, others think god has told them to kill infidels and their experience may seem real to them. I suspect you disregard their experiences as being inconsistent with your assumptions but should it not cast doubt on the validity of such personal experiences in the first place?</span></p><span data-dcnode-id="5087" instrument_node="">
</span></div><span data-dcnode-id="5085" instrument_node="">

</span><li class="comment byuser comment-author-aron bypostauthor even thread-even depth-1" data-dcnode-id="5000" id="li-comment-2637914"><span data-dcnode-id="5075" instrument_node="">
</span><div data-dcnode-id="5003" id="comment-2637914"><span data-dcnode-id="5074" instrument_node="">
</span><div class="comment-author vcard" data-dcnode-id="5065"><span data-dcnode-id="5073" instrument_node="">
</span><cite class="fn" data-dcnode-id="5070"><a class="url" data-dcnode-id="5071" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.wall.org/~aron/main" rel="external nofollow"><span data-dcnode-id="5072" instrument_node="">Aron Wall</span></a></cite><span data-dcnode-id="5069" instrument_node=""> </span><span class="says" data-dcnode-id="5067"><span data-dcnode-id="5068" instrument_node="">says:</span></span><span data-dcnode-id="5066" instrument_node=""> </span></div><span data-dcnode-id="5063" instrument_node="">
</span><div class="comment-meta commentmetadata" data-dcnode-id="5059"><a data-dcnode-id="5061" href="#comment-2637914"><span data-dcnode-id="5062" instrument_node="">
				March 5, 2015 at 11:40 AM</span></a><span data-dcnode-id="5060" instrument_node=""> </span></div><span data-dcnode-id="5057" instrument_node="">
</span><div class="comment-body" data-dcnode-id="5009"><p data-dcnode-id="5055"><span data-dcnode-id="5056" instrument_node="">Dear howie,</span></p><span data-dcnode-id="5054" instrument_node="">
</span><p data-dcnode-id="5052"><span data-dcnode-id="5053" instrument_node="">I don't think you are using the word "micromanager" correctly.  Look it up in a dictionary.  I think your real objection is to God "managing" people's sex lives, and you just added that prefix "micro" as an emotional reaction, to make it seem more oppresive than it is.  "Micromanaging" would be if God told us exactly which sex positions to use, and how often per week, and checked up on us every evening to ask us questions about whether we complied.</span></p><span data-dcnode-id="5051" instrument_node="">
</span><p data-dcnode-id="5049"><span data-dcnode-id="5050" instrument_node="">Telling people one bit of information about who to have sex with (opposite gender) a few millennia ago, and then (in the modern era, since we are no longer living in ancient Israel) not preventing people from doing it if they want to defy his notions of sin, is about as "macro" a management of sex as one can imagine.  Was it also "micromanaging" when he said not to have sex with animals, or does that word only apply when you disagree with the prohibition?</span></p><span data-dcnode-id="5048" instrument_node="">
</span><p data-dcnode-id="5046"><span data-dcnode-id="5047" instrument_node="">I don't want to deny the suffering likely present in a teenage boy who finds himself attracted to other males, but is living in a religious culture that views it as a sin.  However killing oneself is pretty obviously an irrational response to that situation.  Either it is true that God exists and that the Bible is a reliable source about him, or it is not true.  If it is true, then presumably he has also read the parts that say that God loves everyone, that everyone is a sinner, that Jesus died to save people, including homosexuals, and that he desires for everyone to be saved.  Giving up hope and killing yourself makes no sense (and is a far worse sin) on the relgious view.  Or, if you think it is not true, then surely going off to college and screwing whoever you want to is more rational than committing suicide on the supposed orders of a god you don't believe in.  The people who kill themselves are obviously deeply confused about what they themselves believe.  Both Christians and secular people can agree that such people ought to experience more compassion, not hatred.</span></p><span data-dcnode-id="5045" instrument_node="">
</span><p data-dcnode-id="5043"><span data-dcnode-id="5044" instrument_node="">Of course, if somebody else kills you, you're out of luck (so far as this life is concerned).  But no major Christian denomination teaches that homosexuality should receive the death penalty today.  Christianity is about offering forgiveness to sinners, not condemning them.  Most Christians know this, even if the implementation is often flawed.</span></p><span data-dcnode-id="5042" instrument_node="">
</span><blockquote data-dcnode-id="5039"><p data-dcnode-id="5040"><span data-dcnode-id="5041" instrument_node="">
I raised the problem of how do we know when [governments] are acting justly or not. I don’t feel that was replied.
</span></p></blockquote><span data-dcnode-id="5038" instrument_node="">
</span><p data-dcnode-id="5036"><span data-dcnode-id="5037" instrument_node="">Once again, I didn't address this issue because it is absolutely irrelevant to my claim, that governments have authority whenever they do act justly.  If people disagree about whether an act is just, then they also will disagree about whether the government has moral authority to do it.  So what?  My only claim what that sometimes governments do have the authority to e.g. punish in situations where private citizens do not.</span></p><span data-dcnode-id="5035" instrument_node="">
</span><p data-dcnode-id="5030"><span data-dcnode-id="5034" instrument_node="">It might be relevant if you thought it was impossible for human beings to </span><i data-dcnode-id="5032"><span data-dcnode-id="5033" instrument_node="">ever</span></i><span data-dcnode-id="5031" instrument_node=""> know whether an act is just.  But since you seem to have strong opinions about justice yourself, I take it you do not believe that.</span></p><span data-dcnode-id="5029" instrument_node="">
</span><p data-dcnode-id="5027"><span data-dcnode-id="5028" instrument_node="">The point about the FTL neutrinos is that if a theory is supported by a bunch of positive evidence, and there's also some counter-evidence, then we ought to look for a way to reconcile all of the data.  In the case of FTL neutrinos, that was by supposing an equipment error.  No rational person believes the experiment never happened.  In the case of the Torah, it is by recognizing that an omniscient God is very likely to know more than we do about what needs to be done (the Christian view) or by denying that the events in the Torah really happened (if you are an atheist or perhaps a theologically liberal Christian).</span></p><span data-dcnode-id="5026" instrument_node="">
</span><p data-dcnode-id="5024"><span data-dcnode-id="5025" instrument_node="">Now, to see whether this is reasonable we need to use Bayes' Theorem.  We need to calculate the odds that, if a moral God exists and is omniscient, his correct moral pronouncements would agree in every respect with the opinions of a certain individual howie living in the 21st century (bearing in mind that if they agree with him in every respect, they will therefore disagree with a great many other people through history.)  The odds are nearly zero, so the theory that a moral God exists is barely disconfirmed at all, by the mere fact that you do not agree with all of it.</span></p><span data-dcnode-id="5023" instrument_node="">
</span><p data-dcnode-id="5021"><span data-dcnode-id="5022" instrument_node="">Of course, this is simplistic, since we would also have to take into account the nature and magnitude of the disagreements.  But I am curious to isolate this from the other issues.  Suppose that, counterfactually, the Bible agreed with your modern day 21st century morality in every single respect, except one.  There is exactly one bizarre seeming command: "You must not ever wear shoes with shoelaces, nor allow your children to do so".  You're just going to have to trust me on this one, you can't understand why but it's important".  Everything else---the command to celebrate sexual diversity, the continual injunctions to respect the environment, pacificism except in self-defence---it all seems to be of the greatest wisdom and value from your 21st century perspective (rather miraculously, since it was written millennia ago, and this is the first age in which this would be true).  Would you be capable of trusting such a deity?</span></p><span data-dcnode-id="5020" instrument_node="">
</span><blockquote data-dcnode-id="5017"><p data-dcnode-id="5018"><span data-dcnode-id="5019" instrument_node="">"If a man abide not in me, he is cast forth as a branch, and is withered; and men gather them, and cast them into the fire, and they are burned."</span></p></blockquote><span data-dcnode-id="5016" instrument_node="">
</span><p data-dcnode-id="5014"><span data-dcnode-id="5015" instrument_node="">You have not understood this passage, if you think it is merely a threat to be cruel in an arbitrary way.  Jesus claims to be the source of all life.  If you cut yourself off from him, the withering is not an artificial punishment that will be imposed from without.  It is a description of what will happen to you morally and spiritually, through your own choices, if you go your own way.  The branches are "burned" only because there is nothing better to be done with them, if they refuse to be nourished with the life-given sap of the branch, and have passed the point of no return.  God does not want the branches to end up being destroyed, he wants them to bear much fruit.  It is a metaphor, not a literal description.</span></p><span data-dcnode-id="5013" instrument_node="">
</span><p data-dcnode-id="5011"><span data-dcnode-id="5012" instrument_node="">You think you can be good without God?  Go ahead, try the experiment.  Be as good a person as you can possibly be, and see how that works for you.  If it works, no reason to take religion seriously.  But if at some point you find you can't do it by yourself, when you find that there is a vital need to be saved from your sins, perhaps you can reconsider.</span></p><span data-dcnode-id="5010" instrument_node="">
</span></div><span data-dcnode-id="5008" instrument_node="">

</span><div class="comment-body" data-dcnode-id="4828"><p data-dcnode-id="4839"><span data-dcnode-id="4840" instrument_node="">We must also remember Children are not innocent, but born in original sin and are implicated in the guilt of Adam's sin. Therefore if God wills their death it is just because the wages of original sin is death, guilt, punishment. </span></p><span data-dcnode-id="4838" instrument_node="">
</span><p data-dcnode-id="4836"><span data-dcnode-id="4837" instrument_node="">If it were not, then God would be unjust in consuming Sodom with Fire from above. But he justly destroyed not only the whole city, but every living thing found within, for every living thing was impure, including infants.</span></p><span data-dcnode-id="4835" instrument_node="">
</span><p data-dcnode-id="4833"><span data-dcnode-id="4834" instrument_node="">It may be hard to accept, but it's the most internally consistent conclusion- with God we all get what we deserve. They got it, so they must deserve it as an act of divine vengeance, therefore they have received what was due to them.</span></p><span data-dcnode-id="4832" instrument_node="">
</span><p data-dcnode-id="4830"><span data-dcnode-id="4831" instrument_node="">If you think this is wrong, we must countenance an unjust God.</span></p><span data-dcnode-id="4829" instrument_node="">

</span><p data-dcnode-id="4756"><span data-dcnode-id="4757" instrument_node="">I must disagree. Children not innocent? Infants impure? Spiritually impure, i assume? While god did state that "all have sinned" and "none is good" when it comes to kids, ESPECIALLY infants, i only see pure souls. I suppose some kids can reflect poor behaviour and not just in a "boys will be boys" kinda way(as being evil and knowing it), but babies cant be impure even if they were born within a sinful world. Even if they were considered impure by nature, i cant for the life of me imagine them being punished in the afterlife....afterall, god is "just", no? So all the infants who dies, how does god handle that? </span></p><span data-dcnode-id="4755" instrument_node="">
</span><p data-dcnode-id="4753"><span data-dcnode-id="4754" instrument_node="">The most appropiate answer you and possibly every other person(both theists and atheists alike) would supply is that "god would cleanse them and admit them into heaven" or something similar to this. Still, i have and still read the bible to understand and to broaden my perspective on christians and their god however, i fail to see god's love what with all the genocides and massacres(including animals. God loves him some bbq).</span></p><span data-dcnode-id="4752" instrument_node="">
</span><p data-dcnode-id="4750"><span data-dcnode-id="4751" instrument_node="">I have read through all the comments here trying my utmost to understand and accept both atheist and christian perspectives, but seeing as god has quite literally an arsenal of options to choose from when dealing with people, it would seem the option he mostly goes with is "killing everything". Heck, exodus 32 moses went and had 3000 people killed by the levites(which, according to him, was commanded by god) for worshipping the colden calf. The rest of the people were plagued upon by god. </span></p><span data-dcnode-id="4749" instrument_node="">
</span><p data-dcnode-id="4747"><span data-dcnode-id="4748" instrument_node="">Sure the israelites broke the first 2 commandmendts, but not even a day after recieving the tablets did moses break the 6th commandmendt by having people killed. And i didnt read anywhere where god told moses to instruct the levites to kill. Did he lie? Is my bible version misstranslated? Had i been god, i would use my awesome power to change people's hearts without having to consort to "death upon them".</span></p><span data-dcnode-id="4746" instrument_node="">
</span><p data-dcnode-id="4744"><span data-dcnode-id="4745" instrument_node="">As for free will(seems a fragile topic), i believe god could make it so everyone would know he exist and still have the people be given the option to reject or accept him. God himself had made it clear to the israelites concerning his existence back in exodus, yet at times they still rejected him in odd ways. Free will intact. One could hardly deny god with evidence like "parting the red sea". Hundreds of thousands of israelites saw that with their own eyes.</span></p><span data-dcnode-id="4743" instrument_node="">

</span><cite class="fn" data-dcnode-id="4726"><a class="url" data-dcnode-id="4727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.wall.org/~aron/main" rel="external nofollow"><span data-dcnode-id="4728" instrument_node="">Aron Wall</span></a></cite><span data-dcnode-id="4725" instrument_node=""> </span><span class="says" data-dcnode-id="4723"><span data-dcnode-id="4724" instrument_node="">says:</span></span><span data-dcnode-id="4722" instrument_node=""> </span></div><span data-dcnode-id="4719" instrument_node="">
</span><div class="comment-meta commentmetadata" data-dcnode-id="4715"><a data-dcnode-id="4717" href="#comment-2640083"><span data-dcnode-id="4718" instrument_node="">

</span><div class="comment-body" data-dcnode-id="4683"><p data-dcnode-id="4709"><span data-dcnode-id="4712" instrument_node="">vincent,</span><br data-dcnode-id="4711"><span data-dcnode-id="4710" instrument_node="">
Thanks for your comment.  What Daniel said is horrible, and I'm glad you disagree with it too.  It might be better not to be a theist at all, than to think that God is like that.  But better still to appreciate who God really is.  In fact, Jesus said that the kingdom of God belongs to small children, and that we need to change to become innocent like them.  Even St. Paul says, referring to the innocence of childhood,  "I once was alive, apart from the law".  Yes, we are all corrupted by sin, but we do not become personally responsible for this until we voluntarily contribute to the problem.</span></p><span data-dcnode-id="4708" instrument_node="">
</span><p data-dcnode-id="4706"><span data-dcnode-id="4707" instrument_node="">The 6th commandment is better translated "you shall not murder", rather than "you shall not kill".  For example, legitimate homicide (such as capital punishment for deserving offenders, killing enemy soldiers when necessary in the course of a just war, and self-defense) is not usually considered murder even today.  The same would apply (I argued in my post above) if God clearly commands you to kill somebody.  </span></p><span data-dcnode-id="4705" instrument_node="">
</span><p data-dcnode-id="4703"><span data-dcnode-id="4704" instrument_node="">It is also not murder to kill animals, since human beings are more important than animals, and hence God allows us to kill them to satisfy genunine human needs (such as food and clothing, and before Christ, religious worship), so long as we avoid cruelty, and remember that their lives belong to God and that they do not exist solely for us (this is why God commanded not to eat their blood).  However, that does not mean that God does not care about animals; he does (see e.g. Genesis 1, Psalm 145, and the very last words of Jonah).  Animals in their present form are mortal; they were going to die one way or another anyway, and they mostly do not have the intelligence to understand the concept of annihilation and fear it.  Furthermore, some animals need to prey on others to live, so death is inextricable from the animal kingdom in its current form.  However, Isaiah 11 and 65 seem to teach that animals will also be participants in the new Heaven and Earth, and at that time they will no longer kill or be killed.</span></p><span data-dcnode-id="4702" instrument_node="">
</span><p data-dcnode-id="4694"><span data-dcnode-id="4701" instrument_node="">The actions of Moses were kind of a special case.  God had just told Moses he was going to kill </span><i data-dcnode-id="4699"><span data-dcnode-id="4700" instrument_node="">all</span></i><span data-dcnode-id="4698" instrument_node=""> of the Israelities, and Moses had successfully interceded to prevent him from doing so.  For Moses to kill a fraction of a percent of them, was a way of telling the people they </span><i data-dcnode-id="4696"><span data-dcnode-id="4697" instrument_node="">all</span></i><span data-dcnode-id="4695" instrument_node=""> deserved to die.  But Moses clearly preferred for them to live, that was the whole point of the story.  It is mysterious that God, who knows everything, cares so much about our opinions that he is willing to sometimes relent from punishment when we request him to.  But I think he was pleased that Moses asked him to relent.</span></p><span data-dcnode-id="4693" instrument_node="">
</span><p data-dcnode-id="4691"><span data-dcnode-id="4692" instrument_node="">I agree with you that we would still have free will if God made his existence obvious to everyone.   (As can be seen in the Exodus narratives.)  But it changes the calculus.  It is perhaps better to have a world where people who don't want to accept God usually become atheists, rather than dystheists (people who believe in God but dislike him).  This prevents moral corruption by providing a plausible outlet for not going along with the program, for those who aren't interested.  But Israel was being singled out for special treatment, and as a result God spent a lot more time disciplining them, than other nations (which he mostly let go their own way, until the Gospel was proclaimed).  </span></p><span data-dcnode-id="4690" instrument_node="">
</span><p data-dcnode-id="4688"><span data-dcnode-id="4689" instrument_node="">Finally, you ask why God couldn't change people's hearts, as his main form of influence.  Well, if you read the whole Bible, that is plan A!  Also known as the Gospel message.  But God wanted it to be done properly, so he had a long period of preparation (Israel) and a crucial key event (the death, resurrection, and ascension of Jesus) before he was in a position to send his Holy Spirit to change people's hearts on a large scale.  But heart-change was still availble before Jesus, on a more limited basis, to those few people who really wanted it.  </span></p><span data-dcnode-id="4687" instrument_node="">
</span><p data-dcnode-id="4685"><span data-dcnode-id="4686" instrument_node="">So, you have to look at biblical history in its proper perspective.  When God is doing things one way, he may just be laying groundwork to do something better in the future.</span></p><span data-dcnode-id="4684" instrument_node="">

</span><div class="comment-body" data-dcnode-id="4456"><p data-dcnode-id="4458"><span data-dcnode-id="4477" instrument_node="">After reading the comments, I admit, I cannot understand why many of the guest commenters seem to have such contempt for God. It seems to be that all the accusations against God, are founded upon irrational expectations of His very nature.</span><br data-dcnode-id="4476"><span data-dcnode-id="4475" instrument_node="">
  One must remember that God is a God of Love, Mercy, Forgiveness, Forbearance &amp; Grace. His capacity for these exceed beyond our comprehension &amp; understanding, and are some reasons why I love &amp; worship Him.</span><br data-dcnode-id="4474"><span data-dcnode-id="4473" instrument_node="">
  That said, we must also realize that God is also a God that is perfect, righteous, just, consistent, and above all----HOLY.  These are some reasons why I respect, honor, and reverence Him.</span><br data-dcnode-id="4472"><span data-dcnode-id="4471" instrument_node="">
  When I reflect that God, who is omniscient, omnipresent &amp; omnipotent...the very Creator who fashioned me in my mother's womb, and instilled in me a soul, a spirit , a remarkably functioning &amp; resilient body, the freewill to accept or reject Him, and wrote His law upon my heart so that I would know to search for Him, I cannot help but to glorify Him.</span><br data-dcnode-id="4470"><span data-dcnode-id="4469" instrument_node="">
   It does not occur to me that, as a mere human, I am in any position to look down upon Him or His judgment, knowing that, He is immeasurably &amp; exponentially superior to me in every way.</span><br data-dcnode-id="4468"><span data-dcnode-id="4467" instrument_node="">
   What DOES occur to me, however, is that I am a sinner, I have transgressed God's law. I am ashamed, because I have caused GOD, who CANNOT sin &amp; is PURE HOLINESS, to look down at me &amp; see the hideous, abominable sins I have committed. I know that if He reached down and cast me in Hell forever to punish my sins, that she would be completely JUST to do so.</span><br data-dcnode-id="4466"><span data-dcnode-id="4465" instrument_node="">
  Instead, in His forbearance &amp; great mercy, He has sent Jesus Christ to faithfully &amp; completely pay my (&amp; everyone else's) debt of sin in FULL.</span><br data-dcnode-id="4464"><span data-dcnode-id="4463" instrument_node="">
  And we DO NOT EVEN DESERVE IT.</span><br data-dcnode-id="4462"><span data-dcnode-id="4461" instrument_node="">
It is THE greatest act of love this world has EVER seen.</span><br data-dcnode-id="4460"><span data-dcnode-id="4459" instrument_node="">
“But God commendeth his love toward us, in that, while we were yet sinners, Christ died for us.” ....Romans 5:8 KJB</span></p><span data-dcnode-id="4457" instrument_node="">

</span><div class="comment-body" data-dcnode-id="4418"><p data-dcnode-id="4426"><span data-dcnode-id="4427" instrument_node="">If it was necessary for god to kill the Canaanite children, then he should have done so without causing them suffering. Putting them to the sword (hacking them or stabbing them to death) caused them unnecessary suffering, and unjust suffering, since children are hardly responsible for the religion and practices of their parents. Let us take the case of Sodom. God rained down molten rocks upon adults and children alike. They were burned to death.</span></p><span data-dcnode-id="4425" instrument_node="">
</span><p data-dcnode-id="4423"><span data-dcnode-id="4424" instrument_node="">In failing to differentiate between the wicked parents and the innocent children, the Old Testament God has proven himself to be unjust. </span></p><span data-dcnode-id="4422" instrument_node="">
</span><p data-dcnode-id="4420"><span data-dcnode-id="4421" instrument_node="">The only way out of this is to prove that the children were not innocent. The burden lies with the prosecution to prove their charge.</span></p><span data-dcnode-id="4419" instrument_node="">

</span><div class="comment-body" data-dcnode-id="4377"><p data-dcnode-id="4388"><span data-dcnode-id="4389" instrument_node="">If the account of the Egyptian plagues and death of the first born was a story to make an instructional point rather than literally true (in the same way as the Bible uses allegory, parables etc) as many theologians claim, then   God is not on trial for literal physical infanticide but there is still a problem for our modern culture today where many 21st century readers would lose the point of the story and be struck with horror at the seeming blanket destruction and death of masses of people (including children) at the hands (or command) of God. </span></p><span data-dcnode-id="4387" instrument_node="">
</span><p data-dcnode-id="4385"><span data-dcnode-id="4386" instrument_node="">The people of the time at the point of origin of this story being given this account orally or reading it would not at all be worried by the prevalence of death and gore as they were living through times when family members were dying or being killed all the time as a matter of course and people were used to actually seeing this directly not from the sanitised observation post of a TV (disease, complications at birth, brutal forms of capital punishment, often in a public arena, soldiers killed in battle or families wiped out in wars). </span></p><span data-dcnode-id="4384" instrument_node="">
</span><p data-dcnode-id="4382"><span data-dcnode-id="4383" instrument_node="">They wouldn't react with the indignation of our humanist friends (and perhaps many Christians if they were honest with themselves) and be 'distracted' from the point of the story which has to be centred on justice.  </span></p><span data-dcnode-id="4381" instrument_node="">
</span><p data-dcnode-id="4379"><span data-dcnode-id="4380" instrument_node="">Once you use a filter for the culture of the time (which I believe one must do for so much of the Bible), and understand with the theologians that nobody is being physically killed here, one is likely to be much more open to what the story is really trying to say. People of the age would have been deeply puzzled by the prevalence of the reaction "But surely this shows God to be a capricious, unloving, and violent being and far from perfect". Its a period narrative and the loss of life (even of children) and violence would have been tangential to them. We feel aggrieved if we lose 10 professional soldiers in a war now and in the future we may not lose any when battles are fought with drones. But back in the days of the events under discussion loss of life, dismemberment, rotting disease etc were commonplace happening right before children's eyes and very much part of their experience and taken in their stride.  Deliverance from oppression and slavery; the sovereignty of a nation, and the consequences (which don't have to be literal) of practising infanticide (which Egypt was doing) seem to have gotten passed over while the debate and the 'story' seems to have been hijacked and it's now (for some) all about 'the bad God'!</span></p><span data-dcnode-id="4378" instrument_node="">
</span></div><span data-dcnode-id="4376" instrument_node="">

</span><div class="comment-body" data-dcnode-id="4254"><p data-dcnode-id="4271"><span data-dcnode-id="4277" instrument_node="">Welcome Sandra,</span><br data-dcnode-id="4276"><span data-dcnode-id="4275" instrument_node="">
First of all, "murder" refers to the </span><i data-dcnode-id="4273"><span data-dcnode-id="4274" instrument_node="">unlawful</span></i><span data-dcnode-id="4272" instrument_node=""> or unjust killing of human beings.  For example, it is not murder for an individual to kill in self-defense to avoid being killed themselves, nor is it murder for a state to apply the death penalty for serious crimes.  And since God has ultimate authority over life and death, killing that is ordered by God is also not murder.</span></p><span data-dcnode-id="4270" instrument_node="">
</span><p data-dcnode-id="4268"><span data-dcnode-id="4269" instrument_node="">God could do everything himself always, but then there would be no point in creating other beings beside himself!  I think that when God asks other people to play a role in executing justice (e.g. when a judge sentences an offender to prison) it gives human beings an opportunity to understand his commands and to participate in justice ourselves.  Just as he commands us to show mercy to the poor, in order to become more merciful.  </span></p><span data-dcnode-id="4267" instrument_node="">
</span><p data-dcnode-id="4262"><span data-dcnode-id="4266" instrument_node="">That being said, God does not ask anyone today to commit genocide.  This took place during a far bloodier age (before the teaching of Christ), when slavery and genocide were common, as was mentioned in St. Dennis' </span><a data-dcnode-id="4264" href="#comment-2637704" rel="nofollow"><span data-dcnode-id="4265" instrument_node="">valuable comment</span></a><span data-dcnode-id="4263" instrument_node="">.  The normal rule is, with good reason, not to kill other people.</span></p><span data-dcnode-id="4261" instrument_node="">
</span><p data-dcnode-id="4256"><span data-dcnode-id="4260" instrument_node="">Since there is no practical danger of you being asked to kill anybody, I think your real question is probably something more like: </span><i data-dcnode-id="4258"><span data-dcnode-id="4259" instrument_node="">Can I trust this God?</span></i><span data-dcnode-id="4257" instrument_node="">  What does it mean to try to pray today to same God described in the Bible?  Here I have only one answer for you, and that is JESUS.  As St. E. Stanley Jones said somewhere, "God is Light when, and only when, you see that Light in the face of Jesus."  Jesus is the fullest revelation of who the Father is, and what his love for human beings is like.  So first you should look at Jesus and ask if you can trust him.  If you can trust Jesus, you will find that you can trust God too, and then prayer will come naturally.</span></p><span data-dcnode-id="4255" instrument_node="">

</span><p data-dcnode-id="4039"><span data-dcnode-id="4040" instrument_node=""> I'm NOT religious, I'm also not an atheist. I believe in the possibility of a creator, call him/her/it God or not. What I do know for 100% certain is my inner moral compass/voice gets me through life, the little guy on my shoulder whispers into my ear and relays the messages..., And when I listen to him he's never let me down, when I shoo him away , tell him to stop bothering me and ignore his advice, I alway end up wishing I had listened to him and in one way or another regretting my actions. Deep down I know he's right, he's always right. If God were a human he'd be on death row a thousand times over for all the atrocities he committed. My inner KNOWS voice is wrong, what is right, what is good and what is bad, and no matter how you "believers" try to twist EVIL acts and turn them into loving companions acts...it never works, because you're all talking in circles trying to convince yourselves... I'm a human, not a god.. and even I know in my heart wrong from right... and none of this jealous murdering God stuff is right, not in any world.</span></p><span data-dcnode-id="4038" instrument_node="">

Thanks for sharing your honest opinion.  </span></p><span data-dcnode-id="4003" instrument_node="">
</span><p data-dcnode-id="4001"><span data-dcnode-id="4002" instrument_node="">However, I think what you aren't taking into account is that the Creator is NOT like a mere human being (only bigger) trying to make his way in the world, with a little guy sitting on his shoulder telling him what to do.  Rather he is goodness itself, and is so different from human beings in many important respects (he is immutable, authoratative, immune to moral corruption, omniscient, the judge of the whole world, and powerful enough to vindicate the rights of the innocent after death) that I think your analogy to virtuous human conduct breaks down on multiple points.  I gave specific arguments why each of these adjectives changes the moral calculus involved, and nothing in your comment responded to these arguments.</span></p><span data-dcnode-id="4000" instrument_node="">
</span><p data-dcnode-id="3995"><span data-dcnode-id="3999" instrument_node="">But it's more than a little ironic, when you say that if God were a human he would be on death row.  Because God becoming a human (Jesus) and being executed (on the cross) is exactly what </span><em data-dcnode-id="3997"><span data-dcnode-id="3998" instrument_node="">did</span></em><span data-dcnode-id="3996" instrument_node=""> happen 2000 years ago.  However, as a human being on Earth (acting under limitations similar to ours) the Son of God lived a perfectly blameless life (in the ordinary human sense of the word), and therefore I believe it was not God's sins, but rather my own, that he was paying for.</span></p><span data-dcnode-id="3994" instrument_node="">

</span><div class="comment-body" data-dcnode-id="3961"><p data-dcnode-id="3963"><span data-dcnode-id="3964" instrument_node="">The God of the OT is clearly evil, and I say that as a (former?) Christian. It was something I found amongst God's many contradictive laws that finally did it for me. It was the one about God providing a way for a killer to hide if God had delivered the killer's victim into his hands. That is disgusting, morally repugnant and indefensible ( though I am sure some of you will try via the usual mental gymnastics). As well as being evil, God is ill in the head. Schizophrenic even. God tells people to kill those who sacrifice to other gods, and then later tells people not to revile the gods! He despises bastards in one passage, and then tells us not to misjudge them in another!  So who might we say creates and causes such confusion? That's right! Satan! The author of confusion. The author of the Old Testament.</span></p><span data-dcnode-id="3962" instrument_node="">

Have you considered the possibility that the confusion might be your own?</span></p><span data-dcnode-id="3927" instrument_node="">
</span><p data-dcnode-id="3919"><span data-dcnode-id="3926" instrument_node="">The Hebrew word in </span><a data-dcnode-id="3924" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/exodus/22-28.htm" rel="nofollow"><span data-dcnode-id="3925" instrument_node="">Exodus 22:28</span></a><span data-dcnode-id="3923" instrument_node=""> is </span><em data-dcnode-id="3921"><span data-dcnode-id="3922" instrument_node="">elohim</span></em><span data-dcnode-id="3920" instrument_node="">, and "gods" is only one possible translation of this word.  Almost all modern translations give "God" (i.e. the God of Israel) or "the judges" (referring to humans), either of which is more plausible for the reason you mentioned.</span></p><span data-dcnode-id="3918" instrument_node="">
</span><p data-dcnode-id="3910"><span data-dcnode-id="3917" instrument_node="">Similarly, </span><a data-dcnode-id="3915" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/exodus/21-13.htm" rel="nofollow"><span data-dcnode-id="3916" instrument_node="">Exodus 21:13</span></a><span data-dcnode-id="3914" instrument_node=""> is referring to one person accidentally killing another person through negligence.  See e.g. </span><a data-dcnode-id="3912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/commentaries/deuteronomy/19-5.htm" rel="nofollow"><span data-dcnode-id="3913" instrument_node="">Deut 19:5</span></a><span data-dcnode-id="3911" instrument_node=""> for a specific example.  Most modern nations also distinguish between negligent homicide (i.e. manslaughter) and deliberate homicide (i.e. murder), and assign to the former a lighter penalty.  In fact it would be unjust not to do so!</span></p><span data-dcnode-id="3909" instrument_node="">
</span><p data-dcnode-id="3907"><span data-dcnode-id="3908" instrument_node="">I am not going to say that there is nothing disturbing or morally difficult in the Bible.  However, it is amazing to me that you can read a text that was written for a different culture over 3,000 years ago (probably in a translation written over 400 years ago), and if you get confused your first instinct is to blame the Devil, rather than trying to ask scholars what it actually means.</span></p><span data-dcnode-id="3906" instrument_node="">

</span><div class="comment-body" data-dcnode-id="3818"><p data-dcnode-id="3841"><span data-dcnode-id="3842" instrument_node="">First, I want you to know that I am a Christian.  I accepted the Lord Jesus into my life about 25 years ago, and I love to learn about God's Word the Bible.  Second, I am a family man married to my wife for 14 years, and we have six kids.  All adopted.  Third, I am a certified consulting meteorologist so I certainly love physics, science and math in general.  Enough about my background.</span></p><span data-dcnode-id="3840" instrument_node="">
</span><p data-dcnode-id="3838"><span data-dcnode-id="3839" instrument_node="">Thank you Aron for taking the time to blog on this important topic.  This topic is near and dear to my daily thoughts and earthly experience.  Here is my story.</span></p><span data-dcnode-id="3837" instrument_node="">
</span><p data-dcnode-id="3835"><span data-dcnode-id="3836" instrument_node="">My wife unexpectedly got pregnant 3 years ago after years of doctors saying that pregnancy is not likely for us.  We were so so so excited to learn of the unexpected pregnancy.  We praised God often.  God gave us a miracle baby, right?  Yes.  Well, 18 weeks into the pregnancy my wife's water broke spelling trouble.  The baby was predicted to be still born within 3 days to 3 weeks later the doctors said.  That did not happen.  Instead, my wife proactively went on bed rest, and our baby boy remained alive in her womb for another 11 weeks!  At week 26, she was admitted into the hospital for her health and safety reasons as well as for the expected delivery of the baby at any point and time.  Deacon Wade (meaning servant of the Lord by the water's edge) our baby boy was born 3 weeks later at week 29.  He was alive!  He was very small at 3 lb, but beautiful.  All his outward physical features were there, toes, fingers, etc.  We had so much hope that all would be well.  But God intervened, I believe.  36 hours later we were grieving of his death.  At birth, we later found out, his lungs were severely underdeveloped as the previous ultrasounds were unable to detect this severe internal physical problem.  So this is my story.  Sad, yes.  But God, right?  I hope your answer is Yes to Him no matter what.</span></p><span data-dcnode-id="3834" instrument_node="">
</span><p data-dcnode-id="3832"><span data-dcnode-id="3833" instrument_node="">I believe God gave and took Deacon at God's perfect timing despite our human desire not for Him to do so.  Many Christians that I speak with and even my wife have a hard time believing that a "good" God would take away our son.  My son was innocent given to us for a very short period of time.  God took him.  God brought us his life and the He ended his life.    </span></p><span data-dcnode-id="3831" instrument_node="">
</span><p data-dcnode-id="3829"><span data-dcnode-id="3830" instrument_node="">This is the first Christian site to date that I have visited that makes the case that God kills the innocent for His good and perfect reasoning.  I may not understand His ways all the time, but I trust His control. </span></p><span data-dcnode-id="3828" instrument_node="">
</span><p data-dcnode-id="3826"><span data-dcnode-id="3827" instrument_node="">Thank you Lord God for blessing me with Deacon Wade.  I can't wait to spend eternity in Heaven with you Lord and all your faithful and I look so forward to worshiping you Lord in Heaven with Deacon and the rest.  May you be glorified in all the things I think, say and do.  Also, please continue to bless Aron and his work for you.</span></p><span data-dcnode-id="3825" instrument_node="">
</span><p data-dcnode-id="3823"><span data-dcnode-id="3824" instrument_node="">With best regards,</span></p><span data-dcnode-id="3822" instrument_node="">
</span><p data-dcnode-id="3820"><span data-dcnode-id="3821" instrument_node="">Dave</span></p><span data-dcnode-id="3819" instrument_node="">

</span><div class="comment-body" data-dcnode-id="3786"><p data-dcnode-id="3788"><span data-dcnode-id="3789" instrument_node="">I can't believe that anyone would actually try to justify God's murderous behavior.  First, this creates a euthyphro dilemma for God.  Did God give us the 10 commandments because the 10 commandments are universally good?  Or, did God give us the 10 commandments because he thinks the 10 commandments are good?  If He gave us the 10 commandments because those 10 things are by nature good, then even He would have to abide by them, because after all, those things are good.  But if He decided those 10 things are good, then He would be the source of such morality.  In the one instance, God would be a murderer because he isn't living up to the 10 commandments which are universally good.  But if He decided the 10 commandments are good, then at worse He would be a moral hypocrite, i.e., do as I say, not as I do.  In one instance God is killing off humans because of their evil nature, then Jesus comes along telling us to turn the other cheek and not to cast the first stone.  We are taught about the prodigal son and that we should forgive, but if we apply the God/Jesus equation to the prodigal son story, then the father of the prodigal son would have to kill his good son in order to forgive the wayward son.  Doesn't make sense.  Why couldn't God just forgive, he expects me and you to do it, so wouldn't a more moral entity be even more willing to forgive?  The fact is that God loves murder, he loves it so much that he even had to kill off Jesus.  I've read so many places how folks say that God loves them, but if you read the Old Testament, there's absolutely no loving God there.</span></p><span data-dcnode-id="3787" instrument_node="">

</span><p data-dcnode-id="3749"><span data-dcnode-id="3753" instrument_node="">I believe some of your concerns were addressed in Aron's post. But beyond that, I would recommend to you Brian Davies' book </span><a data-dcnode-id="3751" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Reality-God-Problem-Evil/dp/082649241X/ref%3Dsr_1_4%3Fkeywords%3Dthe%2Breality%2Bof%2Bgod%26qid%3D1557951439%26s%3Dgateway%26sr%3D8-4" rel="nofollow"><span data-dcnode-id="3752" instrument_node="">The Reality of God and the Problem of Evil</span></a><span data-dcnode-id="3750" instrument_node="">. It's one of the best and most complete studies of the relationship between God and morality from the perspective of classical theism in print. It won't wrap the whole problem up in a nice tidy package with a bow. But it does provide a thorough overview of why there's far more to it than simplistic Euthyphro dilemmas or assertions that God is an asshole because innocent people suffer.</span></p><span data-dcnode-id="3748" instrument_node="">

</span><div class="comment-body" data-dcnode-id="3534"><p data-dcnode-id="3557"><span data-dcnode-id="3558" instrument_node="">Hello, I've been reading through this and saw you were still responding to comments!</span></p><span data-dcnode-id="3556" instrument_node="">
</span><p data-dcnode-id="3554"><span data-dcnode-id="3555" instrument_node="">I've been a Christain for years, until just recently. Not gonna lie, i was still in school and had a rough childhood, and was desperately looking for hope, so i put aside my logic brain and just accepted everything, even the stuff that never sat well (ironically,  2-3 months after you posted this artical.) as I've gotten older, though, I've begun questioning how loving God is. I have the belief that any belief you hold should be tested, if it stands its worth keeping, if its full of holes should be amended or discarded. So if you have the time, i would like you to respond to each individual point, as their all crucial to me.</span></p><span data-dcnode-id="3553" instrument_node="">
</span><p data-dcnode-id="3551"><span data-dcnode-id="3552" instrument_node="">1: is there any theoretical action God could have taken in the old testament to convince you that he is not a perfectly good God? You may say this is a pointless question, but i feel like its one Howie tried to ask years ago that always got evaded. At the very least, an outsider never saw it answered. Even theoretically, could God be anything less than good in your eyes, if he always said "there's a reason" after every action, no matter how horrendous?</span></p><span data-dcnode-id="3550" instrument_node="">
</span><p data-dcnode-id="3548"><span data-dcnode-id="3549" instrument_node="">2: Jesus, i would gladly follow for my entire life. He actually was the being that taught me how to truly love, and i hold all actions to discover whether they be loving or unloving to Jesus's own. Jesus states "if you have seen me, you have seen the father" (john 14:9) Now, Jesus seems to  teach and do things that old testament God wouldn't. "Love your enemies" (matt 5:44)  for example. When peter attacked the guards who came to arrest him, He said "those that live by the sword die by the sword", even healing one's ear. That, in my eyes, is proof that when Jesus says "Love your enemies", He means it. The old testament God, however, is suppose to be shown through Jesus, and the old testament God i feel would never do this based on his previous actions, which would lead me to the conclusion Jesus is a liar or a madman. How can i see the old testament God in you, when what i see is you doing good to those who hate you, and the old testament god ordering your death if you set a toe outta line, or were related to someone setting a toe outta line?</span></p><span data-dcnode-id="3547" instrument_node="">
</span><p data-dcnode-id="3545"><span data-dcnode-id="3546" instrument_node="">3: i do believe in a god, but i believe him a being. Not inherently holy or unholy. I also believe him a being that uses people to get what he wants, and who shows off and wants to rule. Your sources for God being Holy, loving, good, righteous, all come from god himself. Every ruler that has ever existed tries to set themselves up to look better than they actually are. Taking my premise, just for a moment, that God is not inherently good, do you see why its so hard to believe he's loving? And why people who do not start at that premise have a hard time understanding people that do? I honestly have never really had the spiritual gift of faith, so its hard for me to understand your viewpoints, especially if my premise about God is true. </span></p><span data-dcnode-id="3544" instrument_node="">
</span><p data-dcnode-id="3542"><span data-dcnode-id="3543" instrument_node="">4: God has refrained from genocide as a punishment. He was going to punish, then a human convinced him not to. (EX 32:11-14) This shows me A: He acknowledges theres more ways than just genocide to deal with a rebellious people and B: for someone you claim is inherently right in all he does, it seems odd that if he's right, y not just do it? If we are to just accept His treatment, why not punish those who speak against? But no, he does in fact reward people who question and challenge him. Which makes me wonder if the nations that you say deserved to die would have been saved had someone challenged him. It also makes my earlier premise seem more likely, for a god as you describe would do whatever despite what we say, for his ways are higher and he is wiser, while a being not smarter than us or only slightly so might good "hmm, good point."</span></p><span data-dcnode-id="3541" instrument_node="">
</span><p data-dcnode-id="3539"><span data-dcnode-id="3540" instrument_node="">5: and a personal one for me. I feel as if God has set it up in such i way that i cannot be with him. when asked the greatest commandment is Jesus responds "Love the Lord your God with all your heart and with all your soul and with all your mind". (matt 22:37) Now, for someone that doesn't begin with the premise that God is loving, i look at his actions to determine whether he is loving or cruel. I have no gift of faith when it comes to the character of God. I cannot honestly say i love God with my /entire/ heart when i see all the cruelty to my fellow humans, especially when given excuses like "Well, there was some reason they had to die". I also cannot love God with my mind, since i see such a difference in teaching between Jesus and old testament god. One preaches fire and brimstone, the other compassion and love, so theres a giant unexplained disconnect filled with "his ways are higher than ours". Maybe that's true, but i can't love him with all my mind if he withholds information that would otherwise fill gaping inconsistencies. Now, if you believe in predestination, this entire point could be considered moot and i was just one of the unlucky, which if he is who he says he is, that's my leading theory. But, if he is who he says he is and predestination is false, He has made it so that i cannot fulfill the greatest commandment.</span></p><span data-dcnode-id="3538" instrument_node="">
</span><p data-dcnode-id="3536"><span data-dcnode-id="3537" instrument_node="">Thank you for taking the time to read this</span></p><span data-dcnode-id="3535" instrument_node="">
