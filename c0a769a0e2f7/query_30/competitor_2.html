</span><p data-dcnode-id="1160"><span data-dcnode-id="1164" instrument_node="">The scientist who isolated human embryonic stem cells in 1998 struggled with this dilemma, consulting ethicists before proceeding. But in the end, the scientist, Dr. James Thomson of the </span><u data-dcnode-id="1162"><span data-dcnode-id="1163" instrument_node="">University of Wisconsin</span></u><span data-dcnode-id="1161" instrument_node="">, decided to go ahead because the embryos were from fertility clinics and were going to be destroyed anyway. And, he reasoned, the work could greatly benefit humanity.</span></p><span data-dcnode-id="1159" instrument_node="">
</span><p data-dcnode-id="1154"><span data-dcnode-id="1158" instrument_node="">Yet despite the high hopes for embryonic stem cells, progress has been slow — so far there are no treatments with the cells. The </span><u data-dcnode-id="1156"><span data-dcnode-id="1157" instrument_node="">Food and Drug Administration</span></u><span data-dcnode-id="1155" instrument_node=""> just approved the first clinical study, a dose and safety test, of human embryonic stem cells to treat spinal cord injuries.</span></p><span data-dcnode-id="1153" instrument_node="">
</span><p data-dcnode-id="1151"><span data-dcnode-id="1152" instrument_node="">All along, though, scientists wondered if they could sidestep the ethical debate by creating embryonic stem cells without the embryos. Every cell has the same DNA. A heart cell is different from a liver cell because it uses different genes. But all the genes to make a liver cell, or any other cell, are there in the cell. The liver genes are masked in a heart cell and vice versa. Why can’t scientists find a way to unmask all of a cell’s genes and turn it directly into a stem cell without using an embryo?</span></p><span data-dcnode-id="1150" instrument_node="">
</span><p data-dcnode-id="1148"><span data-dcnode-id="1149" instrument_node="">A few years ago, two groups of researchers — one led by Dr. Thomson — did just that. They discovered that all they had to do was add four genes and a cell would reprogram itself back to its original state when it was a stem cell in an embryo. Like an embryonic stem cell, that reprogrammed cell seemed to be able to then turn into the many kinds of specialized cells in the body, an ability called pluripotent.</span></p><span data-dcnode-id="1147" instrument_node="">
</span><p data-dcnode-id="1145"><span data-dcnode-id="1146" instrument_node="">What has happened since that discovery, scientists say, is that stem cell biology turned out to be more complicated than they anticipated. Besides the stem cells from embryos, there are so-called adult stem cells found in all tissues but with limited potential because they can only turn into cells from their tissue of origin. And there are these newer cells made by reprogramming mature cells.</span></p><span data-dcnode-id="1144" instrument_node="">
</span><p data-dcnode-id="1142"><span data-dcnode-id="1143" instrument_node="">Now researchers are trying to figure out whether stem cells made by this reprogramming process really are the same as ones taken from embryos. Some say they found subtle differences between these cells, known as induced pluripotent stem cells, or I.P.S.C.’s, and embryonic stem cells. Others are not so sure.</span></p><span data-dcnode-id="1141" instrument_node="">
</span><p data-dcnode-id="1139"><span data-dcnode-id="1140" instrument_node="">They say they need embryonic stem cells as a basis of comparison, a gold standard to see if the newer reprogrammed cells are as good.</span></p><span data-dcnode-id="1138" instrument_node="">
</span><p data-dcnode-id="1136"><span data-dcnode-id="1137" instrument_node="">“We are not at the stage where you will find many investigators saying, ‘We don’t need embryonic stem cells because I.P. cells are the same,” said Dr. Timothy Kamp, a stem cell researcher and professor of medicine at the University of Wisconsin School of Medicine and Public Health. “We don’t know that yet.”</span></p><span data-dcnode-id="1135" instrument_node="">
</span><p data-dcnode-id="1133"><span data-dcnode-id="1134" instrument_node="">One complication is that different labs use different methods to obtain the reprogrammed cells and to study them, Dr. Kamp said. As a result, he said, “not all I.P. cells are the same.”</span></p><span data-dcnode-id="1132" instrument_node="">
</span><p data-dcnode-id="1127"><span data-dcnode-id="1131" instrument_node="">John Gearhart, director of the </span><u data-dcnode-id="1129"><span data-dcnode-id="1130" instrument_node="">University of Pennsylvania</span></u><span data-dcnode-id="1128" instrument_node="">, and one of the first to isolate human embryonic stem cells, said some investigators ended up with reprogrammed cells “that will have little utility.” They are only partly reprogrammed, he explains.</span></p><span data-dcnode-id="1126" instrument_node="">
</span><p data-dcnode-id="1124"><span data-dcnode-id="1125" instrument_node="">“One worries about how safe and effective they are going to be” if they are ever used in therapies, Dr. Gearhart said.</span></p><span data-dcnode-id="1123" instrument_node="">
</span><p data-dcnode-id="1121"><span data-dcnode-id="1122" instrument_node="">Dr. George Q. Daley, a stem cell researcher at Children’s Hospital in Boston, saw subtle differences in a recent study. When he just compared the two types of cells side by side with molecular tests, they looked identical. Then he tried turning them into various types of mature cells and comparing the results.</span></p><span data-dcnode-id="1120" instrument_node="">
</span><p data-dcnode-id="1118"><span data-dcnode-id="1119" instrument_node="">Dr. Daley published a paper in March, in Nature Biotechnology, reporting that mouse I.P.S.C.’s from different tissues remembered, in a sense, where they came from. He has a similar paper under review showing the same effect with human induced pluripotent stem cells.</span></p><span data-dcnode-id="1117" instrument_node="">
</span><p data-dcnode-id="1115"><span data-dcnode-id="1116" instrument_node="">In the mouse study, it was harder to get pluripotent mouse cells derived from a skin cell, for example, to turn into blood cells than it was to get pluripotent stem cells made from blood cells to turn into blood cells.</span></p><span data-dcnode-id="1114" instrument_node="">
</span><p data-dcnode-id="1112"><span data-dcnode-id="1113" instrument_node="">“They tended to remember their tissue of origin,” Dr. Daley said.</span></p><span data-dcnode-id="1111" instrument_node="">
</span><p data-dcnode-id="1109"><span data-dcnode-id="1110" instrument_node="">Researchers need to find ways to make the cells forget where they came from, he said.</span></p><span data-dcnode-id="1108" instrument_node="">
</span><p data-dcnode-id="1104"><u data-dcnode-id="1106"><span data-dcnode-id="1107" instrument_node="">M.I.T.</span></u><span data-dcnode-id="1105" instrument_node="">, said he was not certain there were meaningful differences between human embryonic stem cells and human induced pluripotent cells.</span></p><span data-dcnode-id="1103" instrument_node="">
</span><p data-dcnode-id="1101"><span data-dcnode-id="1102" instrument_node="">But to answer that question will require the use of embryonic stem cells for comparisons, Dr. Jaenisch said.</span></p><span data-dcnode-id="1100" instrument_node="">
</span><p data-dcnode-id="1098"><span data-dcnode-id="1099" instrument_node="">“Things are very much in flux,” he said. “We will probably need human embryonic stem cells for a while. And then we probably will not need them anymore.”</span></p><span data-dcnode-id="1097" instrument_node="">
