</span></a><span data-dcnode-id="1690" instrument_node="">&nbsp;
</span></div><span data-dcnode-id="1688" instrument_node="">
</span><p data-dcnode-id="1686"><span data-dcnode-id="1687" instrument_node="">The story for the year 1997 was the sacred. We fear a Promethean blunder. We fear that our own human hubris will violate something sacred in our nature; and we fear that nature will retaliate with disaster. To protect ourselves from a possible Promethean blunder by science, we are tempted to stop further research with the commandment: “thou shalt not play God!”</span></p><span data-dcnode-id="1685" instrument_node="">
</span><p data-dcnode-id="1683"><span data-dcnode-id="1684" instrument_node="">Then, during 1999, we opened the first few pages on chapter two of the cloning controversy story. I will refer to this chapter as “the stem cell debate.” The debate has only begun. What is not yet clear is just what needs to be debated. Perhaps nothing. Perhaps everything. What is clear is that the fallout from the cloning explosion is still lighting fires here and there. Whether or not the public will add stem cells to the fuel to make those fires burn hotter remains to be seen.</span></p><span data-dcnode-id="1682" instrument_node="">
</span><p data-dcnode-id="1680"><span data-dcnode-id="1681" instrument_node="">Stem cells have become front page news in Australia, as well as in the United States and other countries. On February 4, 1999, the Australian National Academy of Science issued a position statement. Note the structure of Recommendation 1.</span></p><span data-dcnode-id="1679" instrument_node="">
</span><p data-dcnode-id="1677"><span data-dcnode-id="1678" instrument_node="">Council considers that reproductive cloning to produce human fetuses is unethical and unsafe and should be prohibited….However, human cells derived from cloning techniques, from germ cells should not be precluded from use in approved research activities in cellular and developmental biology</span></p><span data-dcnode-id="1676" instrument_node="">
</span><p data-dcnode-id="1674"><span data-dcnode-id="1675" instrument_node="">Here two things are put together. First, disapproval of reproductive cloning for the purposes of making children. Second, approval of research on human embryonic stem cells, approval even in the face of ethical squeamishness regarding embryo research. If this Australian statement is a barometer, we need to ask: what is the cultural weather forecast? What might be coming?</span></p><span data-dcnode-id="1673" instrument_node="">
</span><p data-dcnode-id="1671"><span data-dcnode-id="1672" instrument_node="">In what follows it will be my task to report on the fast-moving frontier of stem cell research within the field of anthropology, agenda questions raised by science that need to be addressed by systematic theologians and public policy makers. I will ask more questions than I am ready to answer. Yet, I believe that such work invested in trying to formulate the relevant question (die Fragestellung) takes us more than just halfway toward a helpful answer.</span></p><span data-dcnode-id="1670" instrument_node="">
</span><p data-dcnode-id="1664"><span data-dcnode-id="1669" instrument_node="">The Human Embryonic Stem Cell Debate</span><br data-dcnode-id="1668"><span data-dcnode-id="1667" instrument_node="">
Science, Ethics, and Public Policy</span><br data-dcnode-id="1666"><span data-dcnode-id="1665" instrument_node="">
Edited by Laurie Zoloth</span></p><span data-dcnode-id="1663" instrument_node="">
</span><p data-dcnode-id="1661"><span data-dcnode-id="1662" instrument_node="">Human embryonic stem cells can divide indefinitely and have the potential to develop into many types of tissue. Research on these cells is essential to one of the most intriguing medical frontiers, regenerative medicine. It also raises a host of difficult ethical issues and has sparked great public interest and controversy.</span></p><span data-dcnode-id="1660" instrument_node="">
</span><p data-dcnode-id="1658"><span data-dcnode-id="1659" instrument_node="">This book offers a foundation for thinking about the many issues involved in human embryonic stem cell research. It considers questions about the nature of human life, the limits of intervention into human cells and tissues, and the meaning of our corporeal existence. The fact that stem cells may be derived from living embryos that are destroyed in the process or from aborted fetuses ties the discussion of stem cell research to the ongoing debates on abortion. In addition to these issues, the essays in the book touch on broader questions such as who should approve controversial research and what constitutes human dignity, respect, and justice. The book contains contributions from the Ethics Advisory Board of the Geron Coroporation; excerpts from expert testimony given before the National Bioethics Advisory Commission, which helped shape recent National Institutes of Health policy; and original analytical essays on the implications of this research.</span></p><span data-dcnode-id="1657" instrument_node="">
</span><h2 data-dcnode-id="1655"><span data-dcnode-id="1656" instrument_node="">Pros and Cons</span></h2><span data-dcnode-id="1654" instrument_node="">
</span><p data-dcnode-id="1652"><span data-dcnode-id="1653" instrument_node="">Debates over the ethics of embryonic blastocysts.</span></p><span data-dcnode-id="1651" instrument_node="">
</span><h3 data-dcnode-id="1649"><span data-dcnode-id="1650" instrument_node="">Latest Developments</span></h3><span data-dcnode-id="1648" instrument_node="">
</span><p data-dcnode-id="1646"><span data-dcnode-id="1647" instrument_node="">The most recent research has shown that there are many options available other than working with embryonic stem cells. Stem cells can be obtained from cord blood or derived by manipulating differentiated cells (i.e. skin cells) to revert them to a pluripotent state. These are alternatives that may help broaden the acceptance of stem cell research.</span></p><span data-dcnode-id="1645" instrument_node="">
</span><h3 data-dcnode-id="1643"><span data-dcnode-id="1644" instrument_node="">Background</span></h3><span data-dcnode-id="1642" instrument_node="">
</span><p data-dcnode-id="1640"><span data-dcnode-id="1641" instrument_node="">In November 1998 the first published research paper reported that stem cells could be taken from human embryos. Subsequent research led to the ability to maintain undifferentiated stem cell lines (pluripotent cells) and techniques for differentiating them into cells specific to various tissues and organs.</span></p><span data-dcnode-id="1639" instrument_node="">
</span><p data-dcnode-id="1637"><span data-dcnode-id="1638" instrument_node="">The debates over the ethics of stem cell research began almost immediately in 1999, despite reports that stem cells cannot grow into complete organisms.</span></p><span data-dcnode-id="1636" instrument_node="">
</span><p data-dcnode-id="1634"><span data-dcnode-id="1635" instrument_node="">In 2000 – 2001, governments worldwide were beginning to draft proposals and guidelines in an effort to control stem cell research and the handling of embryonic tissues, and reach universal policies to prevent “brain-drains” (emigration of top scientists) between countries. The CIHR (Canadian Institute of Health Sciences) drafted a list of recommendations for stem cell research in 2001. The Clinton administration drafted guidelines for stem cell research in 2000, but Clinton left office prior to them being released. The Bush government has had to deal with the issue throughout his administration. Australia, Germany, UK and other countries have also formulated policies.</span></p><span data-dcnode-id="1633" instrument_node="">
</span><h3 data-dcnode-id="1631"><span data-dcnode-id="1632" instrument_node="">Pros</span></h3><span data-dcnode-id="1630" instrument_node="">
</span><p data-dcnode-id="1628"><span data-dcnode-id="1629" instrument_node="">The therapeutic cloning. Stem cells provide huge potential for finding treatments and cures to a vast array of diseases including different cancers, diabetes, spinal cord injuries, Alzheimers, MS, Huntingtons, Parkinsons and more.</span></p><span data-dcnode-id="1627" instrument_node="">
</span><p data-dcnode-id="1625"><span data-dcnode-id="1626" instrument_node="">There is endless potential for scientists to learn about human growth and cell development from studying stem cells.</span></p><span data-dcnode-id="1624" instrument_node="">
</span><p data-dcnode-id="1622"><span data-dcnode-id="1623" instrument_node="">Use of adult-derived stem cells, from blood, cord blood, skin and other tissues, known as IPSCs, has been demonstrated to be effective for treating different diseases in animal models. Umbilical-cord-derived stem cells (obtained from the cord blood) have also been isolated and utilized for various experimental treatments. Another option is use of uniparental stem cells. Although these cells lines have some disadvantages or shortcomings compared to embryonic cell lines (they are shorter-lived), there is vast potential if enough money is invested in researching them further, and they are not technically considered individual living beings by pro-life advocates.</span></p><span data-dcnode-id="1621" instrument_node="">
</span><h3 data-dcnode-id="1619"><span data-dcnode-id="1620" instrument_node="">Cons</span></h3><span data-dcnode-id="1618" instrument_node="">
</span><p data-dcnode-id="1616"><span data-dcnode-id="1617" instrument_node="">Use of embryonic stem cells for reasearch involves the destruction of blastocysts formed from laboratory-fertilized human eggs. For those who believe that life begins at conception, the blastocyst is a human life and to destroy it is unacceptable and immoral. This seems to be the only controversial issue standing in the way of stem cell research in North America.</span></p><span data-dcnode-id="1615" instrument_node="">
</span><h3 data-dcnode-id="1613"><span data-dcnode-id="1614" instrument_node="">Where It Stands</span></h3><span data-dcnode-id="1612" instrument_node="">
</span><p data-dcnode-id="1610"><span data-dcnode-id="1611" instrument_node="">In the summer of 2006 President Bush stood his ground on the issue of stem cell research and vetoed a bill passed by the Senate that would have expanded federal funding of embryonic stem cell research. Currently, American federal funding can only go to research on stem cells from existing (already destroyed) embryos. Similarly, in Canada, as of 2002, scientists cannot create or clone embryos for research but must used existing embryos discarded by couples. The UK allows embryonic stem cell cloning.</span></p><span data-dcnode-id="1609" instrument_node="">
</span><p data-dcnode-id="1607"><span data-dcnode-id="1608" instrument_node="">Use of stem cell lines from alternative non-embryonic sources has received more attention in recent years and has already been demonstrated as a successful option for treatment of certain diseases. For example, adult stem cells can be used to replace blood-cell-forming cells killed during chemotherapy in bone marrow transplant patients. Biotech companies such as ACT are researching techniques for cellular reprogramming of adult cells, use of amnionic fluid, or stem cell extraction techniques that do not damage the embryo, that also provide alternatives for obtaining viable stem cell lines.</span></p><span data-dcnode-id="1606" instrument_node="">
</span><p data-dcnode-id="1604"><span data-dcnode-id="1605" instrument_node="">Out of necessity, the research on these alternatives is catching up with embryonic stem cell research and, with sufficient funding, other solutions might be found that are acceptable to everyone.</span></p><span data-dcnode-id="1603" instrument_node="">
</span><p data-dcnode-id="1601"><span data-dcnode-id="1602" instrument_node="">On March 9, 2009, President Obama overturned Bush’s ruling, allowing US Federal funding to go to embryonic stem cell research. However, the stipulation applies that normal NIH policies on data sharing must be followed. Despite the progress being made in other areas of stem cell research, using pluripotent cells from other sources, many American scientists were putting pressure on the government to allow their participation and compete with the Europeans. However, many people are still strongly opposed</span></p><span data-dcnode-id="1600" instrument_node="">
</span><h2 data-dcnode-id="1598"><span data-dcnode-id="1599" instrument_node="">Research Ethics and Stem Cells</span></h2><span data-dcnode-id="1597" instrument_node="">
</span><p data-dcnode-id="1595"><span data-dcnode-id="1596" instrument_node="">Stem cells show potential for many different areas of health and medical research, and studying them can help us understand how they transform into the dazzling array of specialized cells that make us what we are. Some of the most serious medical conditions, such as cancer and birth defects, are caused by problems that occur somewhere in this process. A better understanding of normal cell development will allow us to understand and perhaps correct the errors that cause these medical conditions.</span></p><span data-dcnode-id="1594" instrument_node="">
</span><p data-dcnode-id="1592"><span data-dcnode-id="1593" instrument_node="">Research on one kind of stem cell—human embryonic stem cells—has generated much interest and public debate. Pluripotent stem cells (cells that can develop into many different cell types of the body) are isolated from human embryos that are a few days old. Pluripotent stem cell lines have also been developed from fetal tissue (older than 8 weeks of development).</span></p><span data-dcnode-id="1591" instrument_node="">
</span><p data-dcnode-id="1589"><span data-dcnode-id="1590" instrument_node="">As science and technology continue to advance, so do ethical viewpoints surrounding these developments. It is important to educate and explore the issues, scientifically and ethically.</span></p><span data-dcnode-id="1588" instrument_node="">
</span><p data-dcnode-id="1586"><span data-dcnode-id="1587" instrument_node="">The discovery, isolation, and culturing of human embryonic stem cells has been described as one of the most significant breakthroughs in biomedicine of the century.1 This description would be warranted by virtue of the biological uniqueness of these cells alone—their ability to self-renew infinitely while retaining a remarkable capacity to differentiate into any form of cell tissue. But as well as this, the culturing of embryonic stem cells holds tremendous potential for the development of new forms of regenerative medicine to treat debilitating or fatal conditions that would not otherwise be curable.2</span></p><span data-dcnode-id="1585" instrument_node="">
</span><p data-dcnode-id="1583"><span data-dcnode-id="1584" instrument_node="">It is somewhat of an irony that the discovery of cells with such a tremendous potential for improving and prolonging our own lives, should bring with it some of the most trenchant and intractable questions about the value of life itself. The harvesting of embryonic stem cells results in the destruction of the embryos from which they are harvested. It results, in other words, in the expiration of the very beginnings of a possible human life. Issues about the value of life emerge here in perhaps their most stark and poignant form in the question of whether life for those already existing should be improved at the seeming expense of a possible human life that has just come into being.</span></p><span data-dcnode-id="1582" instrument_node="">
</span><p data-dcnode-id="1580"><span data-dcnode-id="1581" instrument_node="">Needless to say, what the most ethically justified response is to this sort of question is far from obvious. It is not immediately apparent, either, just what should count as the appropriate criteria for assessing possible responses to it. Indeed, it is even contentious as to what the right concepts and terminology are for framing the central questions. What is clear, though, is that it would be remiss to fail to engage with these questions in a manner that is commensurate with their depth, complexity and importance.</span></p><span data-dcnode-id="1579" instrument_node="">
</span><p data-dcnode-id="1577"><span data-dcnode-id="1578" instrument_node="">With due regard to that, the following discussion provides a brief overview of some of the core ethical issues arising from the Research Involving Embryos Bill 2002 and to some extent the Prohibition of Human Cloning Bill 2002.3 The public debate has focused mostly on ethical problems associated with the destruction of embryos (in the case of the first Bill), and with the creation of cloned human embryos (in the case of the second Bill). The current paper will confine its primary focus to the first set of problems, since many of the salient ethical issues about cloning will arise, as it turns out, in connection with embryonic stem cell research.4</span></p><span data-dcnode-id="1576" instrument_node="">
</span><h2 data-dcnode-id="1574"><span data-dcnode-id="1575" instrument_node="">Key Ethical Issues in Embryonic Stem Cell Research</span></h2><span data-dcnode-id="1573" instrument_node="">
</span><p data-dcnode-id="1571"><span data-dcnode-id="1572" instrument_node="">The paper takes most of the major ethical concerns in the debate to be encompassed by the following core questions:</span></p><span data-dcnode-id="1570" instrument_node="">
</span><ul data-dcnode-id="1553"><span data-dcnode-id="1569" instrument_node="">
</span><li data-dcnode-id="1567"><span data-dcnode-id="1568" instrument_node="">What, in principle, is ethically at issue with destructive embryo research?</span></li><span data-dcnode-id="1566" instrument_node="">
</span><li data-dcnode-id="1564"><span data-dcnode-id="1565" instrument_node="">What is important when it comes to judging the value of the potential consequences of destructive embryo research?</span></li><span data-dcnode-id="1563" instrument_node="">
</span><li data-dcnode-id="1561"><span data-dcnode-id="1562" instrument_node="">In what does the value of the human embryo consist?</span></li><span data-dcnode-id="1560" instrument_node="">
</span><li data-dcnode-id="1558"><span data-dcnode-id="1559" instrument_node="">Does the means by which an embryo expires—whether it is destroyed or merely succumbs—make a moral difference?</span></li><span data-dcnode-id="1557" instrument_node="">
</span><li data-dcnode-id="1555"><span data-dcnode-id="1556" instrument_node="">Is there anything morally worse about using embryos created for research purposes compared to using existing excess or surplus ART (assisted reproductive treatment) embryos?</span></li><span data-dcnode-id="1554" instrument_node="">
</span></ul><span data-dcnode-id="1552" instrument_node="">
</span><p data-dcnode-id="1550"><span data-dcnode-id="1551" instrument_node="">The purpose of the following discussion is to clarify some relevant moral and conceptual distinctions connected with these core questions, and to clarify the basic structure of the major views and argument themes that have been developed by philosophers, bioethicists and theologians in response to these questions. Of course, in their more fully expanded form these distinctions and arguments will involve subtleties and complexities that are beyond the limited scope of this paper to address. Nonetheless, the discussion here will hopefully give an impression of where some of those further complexities and subtleties might lie.</span></p><span data-dcnode-id="1549" instrument_node="">
</span><h3 data-dcnode-id="1547"><span data-dcnode-id="1548" instrument_node="">The Basic Ethical Problem</span></h3><span data-dcnode-id="1546" instrument_node="">
</span><p data-dcnode-id="1544"><span data-dcnode-id="1545" instrument_node="">The possibility of destructive embryo research, particularly embryonic stem cell research, presents us with a moral problem because it appears to bring into tension two fundamental moral principles that we esteem very highly: one principle enjoins the prevention or alleviation of suffering, and the other enjoins us to respect the value of human life. As noted, the harvesting and culturing of embryonic stem cells has considerable potential to bring about remarkable potential benefits in the way of alleviating debilitating medical conditions. So, it satisfies the first principle to a very great degree.</span></p><span data-dcnode-id="1543" instrument_node="">
</span><p data-dcnode-id="1541"><span data-dcnode-id="1542" instrument_node="">On the other hand, there is a case to be made that the harvesting of human embryonic stem cells violates the second principle in that it results in the destruction of human life with value (i.e. human embryos). Accordingly, both principles apparently cannot simultaneously be respected in the case of embryonic stem cell research. The question then is which principle ought to be given precedence in this conflict situation. Should we give more weight to the first, and permit destructive embryonic stem cell research because of its remarkable potential benefits? Or should we give more weight to the second, and prohibit destructive embryonic research because it violates respect for the value of the</span></p><span data-dcnode-id="1540" instrument_node="">
</span><h2 data-dcnode-id="1538"><span data-dcnode-id="1539" instrument_node="">Key Ethical Issues in Embryonic Stem Cell Research</span></h2><span data-dcnode-id="1537" instrument_node="">
</span><p data-dcnode-id="1535"><span data-dcnode-id="1536" instrument_node="">embryo as the very beginnings of a possible human life? This, at bottom, is the ethical problem generated by destructive embryo research.</span></p><span data-dcnode-id="1534" instrument_node="">
</span><p data-dcnode-id="1532"><span data-dcnode-id="1533" instrument_node="">Crude as it may sound, responding to this problem calls for a moral calculation—a decision about how the positive value of destructive embryo research is to be weighted, from a moral point of view, in comparison to the negative value (or disvalue) of destroying embryos. Whatever way that calculation is done, it is important to get a clear idea of what moral weight each side of the equation has. This will involve:</span></p><span data-dcnode-id="1531" instrument_node="">
</span><p data-dcnode-id="1529"><span data-dcnode-id="1530" instrument_node="">(i) developing a sound and accurate picture of what the real value is of the benefits of embryonic research, and</span></p><span data-dcnode-id="1528" instrument_node="">
</span><p data-dcnode-id="1526"><span data-dcnode-id="1527" instrument_node="">(ii) clarifying what the value of embryos might consist in, and what, if anything, may be wrong with destroying them.</span></p><span data-dcnode-id="1525" instrument_node="">
</span><p data-dcnode-id="1523"><span data-dcnode-id="1524" instrument_node="">The rest of this paper outlines some of the ethical arguments and philosophical considerations that have been considered relevant to these two matters.</span></p><span data-dcnode-id="1522" instrument_node="">
</span><h3 data-dcnode-id="1520"><span data-dcnode-id="1521" instrument_node="">Evaluating the Benefits of Embryonic Stem Cell Research</span></h3><span data-dcnode-id="1519" instrument_node="">
</span><p data-dcnode-id="1517"><span data-dcnode-id="1518" instrument_node="">Evaluating the beneficial consequences of embryonic stem cell research is not straightforward. There are complexities associated with assessing how realistic the potential of the benefits is, how alternatives with different combinations of benefits and drawbacks are to be compared, and factoring in all of the sometimes overlooked possible consequences of embryonic research.</span></p><span data-dcnode-id="1516" instrument_node="">
</span><h4 data-dcnode-id="1514"><span data-dcnode-id="1515" instrument_node="">Judging the Benefits</span></h4><span data-dcnode-id="1513" instrument_node="">
</span><p data-dcnode-id="1511"><span data-dcnode-id="1512" instrument_node="">Most attention has centred on the medical potential of embryonic stem cell research and cultivation, particularly somatic gene therapy for genetic disorders5, and the generation of replacement tissues and organs for transplant.6 There is no doubt that these outcomes, once realised, would be highly valuable. It is important to keep in mind, however, that currently these benefits are potential ones. A sound evaluation of stem cell research needs to take account of the likelihood of achieving its beneficial outcomes. In matters of science, and particularly, in areas that are newly developing and comparatively uncharted (such as embryonic stem cell research), it is sometimes difficult to settle on those probabilities with complete confidence. It is the nature of scientific discoveries and progress, that they are not easily predicted. Both advances and impediments to advancement can arise unexpectedly. This uncertainty about how real the potential benefits are, needs to be kept in mind when weighing and evaluating the consequences of embryonic stem cell research.</span></p><span data-dcnode-id="1510" instrument_node="">
</span><h2 data-dcnode-id="1508"><span data-dcnode-id="1509" instrument_node="">Key Ethical Issues in Embryonic Stem Cell Research</span></h2><span data-dcnode-id="1507" instrument_node="">
</span><h3 data-dcnode-id="1505"><span data-dcnode-id="1506" instrument_node="">Comparing the Benefits and Harms of Alternatives to Embryonic Stem Cell Research</span></h3><span data-dcnode-id="1504" instrument_node="">
</span><h4 data-dcnode-id="1502"><span data-dcnode-id="1503" instrument_node="">Adult Stem Cell Research</span></h4><span data-dcnode-id="1501" instrument_node="">
</span><p data-dcnode-id="1499"><span data-dcnode-id="1500" instrument_node="">Whether destructive embryonic stem cell research is the right thing to do or not, will partly depend on what the alternatives are, and how their particular benefits and drawbacks balance out. There is another research program involving adult stem cells that are present in and drawn from bone marrow, brain and gut, and other tissues. Some of these stem cells have a capacity to differentiate into a limited number of different cell types, such as blood cells, muscles and neurones (i.e., they are multipotent), but they have not been shown to be pluripotent (able to differentiate into any cell-type) in the way that embryonic stem cells are.7 This limitation means that adult stem cells offer more limited potential benefits in regenerative medicine and gene therapy, at least from the standpoint of our current understanding and available biotechnology. (But with that said, it is worth keeping in mind the points made above about the limited predictability of scientific advances, including the possibility of inducing adult stem cells to differentiate into a greater range of tissue types.)</span></p><span data-dcnode-id="1498" instrument_node="">
</span><p data-dcnode-id="1496"><span data-dcnode-id="1497" instrument_node="">The harvesting and use of adult stem cells for biomedical purposes, however, avoids some of the ethically and biomedically problematic features of using embryonic stem cells. For a start, harvesting adult stem cells does not involve the destruction of embryos. The extent to which that is an advantage will depend on the extent to which that destruction turns out to be a bad thing, (and this will be taken up shortly). Tissues grown from adult stem cells will be immunologically compatible with the person from whom the stem cells are harvested. This means that those tissues can be transplanted into that person without fear of the body rejecting them. Tissues produced from embryonic stem cells for the purpose of regenerative therapy, however, are unlikely to be immunocompatible with the person for whom they are intended. The immunological properties of the tissue are set by the characteristics of whatever embryo the stem cells are derived from.</span></p><span data-dcnode-id="1495" instrument_node="">
</span><p data-dcnode-id="1493"><span data-dcnode-id="1494" instrument_node="">Apart from the ongoing use of immunosuppressant drugs (with its possible serious side effects), two other potential solutions to this immunological limitation have been suggested. The first proposes a ’tissue bank’ with a sufficiently large number of different embryonic stem cell types to generate tissue that can be immunologically matched with different recipients. Hall points out, however, that ‘this would require a huge number of human embryonic stem cell lines (the number being a matter of debate). Such an embryonic stem cell bank would be technically difficult and expensive to generate. The number of embryos that would be required to produce the cell bank would probably test public support … ‘8. The second possible way of overcoming the problem of immunological incompatibility is through what has been called ‘therapeutic cloning’. In this process, the nucleus of a human oocyte or egg is removed and replaced with the nucleus of a cell taken from the body of the intended tissue recipient. The new egg is induced to develop into an embryo, from which immunocompatible stem cells are harvested. The embryo will be a human embryonic clone of the recipient, with all his/her</span></p><span data-dcnode-id="1492" instrument_node="">
</span><h2 data-dcnode-id="1490"><span data-dcnode-id="1491" instrument_node="">Key Ethical Issues in Embryonic Stem Cell Research</span></h2><span data-dcnode-id="1489" instrument_node="">
</span><p data-dcnode-id="1487"><span data-dcnode-id="1488" instrument_node="">exact genetic characteristics. To date, there have only been one or two reported attempts at human cloning that have met with some success.</span></p><span data-dcnode-id="1486" instrument_node="">
</span><p data-dcnode-id="1484"><span data-dcnode-id="1485" instrument_node="">A number of ethical objections have been expressed to therapeutic cloning, all revolving around the creating of an embryo, and moreover, the creating of an embryo for a use that will destroy it. These objections and arguments usually rely centrally on certain views about the value or moral status of the embryo, and these views will be outlined later in the paper.</span></p><span data-dcnode-id="1483" instrument_node="">
</span><p data-dcnode-id="1481"><span data-dcnode-id="1482" instrument_node="">Whatever benefit the pluripotency of embryonic stem cells has in generating immunocompatible tissue, this benefit is likely to be possible only at the cost of having to engage in either the morally contentious practice of human (therapeutic) cloning, or the morally contentious practice of using (and destroying) a large number of embryos to create a sufficient range of embryonic stem cell lines for organ banks. It is especially important to note also, that if the Prohibition of Human Cloning Bill 2002 is passed in its current form, and any kind of human cloning, including therapeutic cloning, is prohibited, there will be less opportunity to maximise the potential benefits of embryonic stem cell research, and embryonic stem cells will effectively have less of the advantage they would otherwise have over adult stem cells.</span></p><span data-dcnode-id="1480" instrument_node="">
</span><h3 data-dcnode-id="1478"><span data-dcnode-id="1479" instrument_node="">The Inevitable Succumbing of Surplus IVF Embryos</span></h3><span data-dcnode-id="1477" instrument_node="">
</span><p data-dcnode-id="1475"><span data-dcnode-id="1476" instrument_node="">The Research Involving Embryos Bill 2002 only permits excess ART embryos existing before 5 April 2002 to be used for research purposes in accordance with a licensing regime. It is a fact about those embryos that they would likely expire or succumb anyway. They would still be destroyed, in other words, but through exposure to natural processes. On the face of it, this looks as if the harm or negative value involved in embryos expiring (whatever it might be) will be the same whether embryo research is allowed or not. In each case the embryo will expire.</span></p><span data-dcnode-id="1474" instrument_node="">
</span><p data-dcnode-id="1472"><span data-dcnode-id="1473" instrument_node="">But this impression can be a little oversimplified. Some philosophers argue that there is a moral difference between acts and omissions, between actively killing something, and passively failing to intervene to stop its death from other causes (when one could have). Even though the outcome is the same in each case, it can be argued that there is something worse, or more morally culpable, about actively bringing about the death oneself. There are different views on what the moral difference between killing and letting die amounts to, and there are those who argue that there is no significant difference. Whichever way one comes out on this, it is not clear that the act-omission distinction maps neatly onto the particular embryo research scenario under discussion. Destroying surplus embryos through research is certainly an act. But so too, some would argue, is removing surplus embryos from the cold storage that keeps them from expiring. They would hold that this looks less like failing to intervene in independently occurring causal processes (that will lead to expiry), than an act that sets those processes in motion. If this is true, then the first impression above will stand. The harm or negative value involved in embryos expiring (whatever it might be) will be the same whether embryo research is allowed or not.</span></p><span data-dcnode-id="1471" instrument_node="">
</span><h2 data-dcnode-id="1469"><span data-dcnode-id="1470" instrument_node="">Key Ethical Issues in Embryonic Stem Cell Research</span></h2><span data-dcnode-id="1468" instrument_node="">
</span><p data-dcnode-id="1466"><span data-dcnode-id="1467" instrument_node="">Some would argue that there is an important logical upshot from this. If the only two alternatives in the circumstances (destroying embryos in research vs making them succumb) involve the same level of harm or disvalue or moral wrongness, but embryo research involves much greater benefits than the other alternative, then it could be argued, it makes sense to opt for the more beneficial embryo research. And indeed, some might construe that as a sufficient case for the moral preferability of that option. (This would change, of course, if the relevant alternatives change—if say, embryos were purpose created for research, which were not pre-existing and destined to be expired).9</span></p><span data-dcnode-id="1465" instrument_node="">
</span><h3 data-dcnode-id="1463"><span data-dcnode-id="1464" instrument_node="">Taking into Account all of the Relevant Benefits and Harms</span></h3><span data-dcnode-id="1462" instrument_node="">
</span><p data-dcnode-id="1460"><span data-dcnode-id="1461" instrument_node="">The embryonic stem cell debate has been pre-occupied with the biological and medical benefits or drawbacks of that research. Central as these certainly are, there are nonetheless other, often-overlooked non-medical impacts that may be important to factor in. Some of the major among these are possible social impacts including:</span></p><span data-dcnode-id="1459" instrument_node="">
</span><h4 data-dcnode-id="1457"><span data-dcnode-id="1458" instrument_node="">De-sensitisation to the Destruction of Human Life</span></h4><span data-dcnode-id="1456" instrument_node="">
</span><p data-dcnode-id="1454"><span data-dcnode-id="1455" instrument_node="">It is argued by some10 that allowing the destruction of embryos to become an entrenched practice would serve to desensitise the scientific establishment, regulating bodies, and society in general, to the destruction of life in general. An increased social toleration of loss of life, it would be argued, may make it easier for society to accede to (currently) more controversial practices involving the ending of life such as, late term elective abortion, or withdrawal of treatment for severely disabled infants, for example. This ‘slippery slope’ argument about potential consequences is based on empirical assumptions about the causes and effects of certain social attitudes, and needs to be assessed in the light of their plausibility.</span></p><span data-dcnode-id="1453" instrument_node="">
</span><h4 data-dcnode-id="1451"><span data-dcnode-id="1452" instrument_node="">Contributions to Social Oppression</span></h4><span data-dcnode-id="1450" instrument_node="">
</span><p data-dcnode-id="1448"><span data-dcnode-id="1449" instrument_node="">One strong but minority strand of argument emphasises the impact that biotechnology has on broader social relationships. It has been argued that ‘research should be evaluated not only in terms of its effects on the subjects of the experiment but also in terms of its connection with existing patterns of oppression and domination in society’.11 There is a considerable body of writing that explores the impacts of new reproductive technologies (such as IVF) on the interests of women, particularly how those technologies might contribute to oppression.12 In the case of embryonic research, it is sometimes argued that women who donate ova or embryos are at risk of exploitation to the extent that male-dominated medical practice appropriates their reproductive labour for research and commercial benefits. Women are at risk, therefore, of being alienated from their reproductive labour. Moreover, it is argued that women’s body parts are at risk of being commodified, and their acts of altruistic donation demeaned, if downstream users can develop commercial applications for stem cells developed from their ova and embryos.13</span></p><span data-dcnode-id="1447" instrument_node="">
</span><h2 data-dcnode-id="1445"><span data-dcnode-id="1446" instrument_node="">Key Ethical Issues in Embryonic Stem Cell Research</span></h2><span data-dcnode-id="1444" instrument_node="">
</span><h3 data-dcnode-id="1442"><span data-dcnode-id="1443" instrument_node="">The Value of the Embryo</span></h3><span data-dcnode-id="1441" instrument_node="">
</span><p data-dcnode-id="1439"><span data-dcnode-id="1440" instrument_node="">What weight does the other side of the moral equation have? What is wrong, if anything, with destroying embryos? If there is something wrong with that, is it sufficiently wrong to outweigh or override the benefits of embryo research, and therefore, render that research morally impermissible? Most of the leading arguments about the rightness or wrongness of destroying embryos are based on some view or other about the moral status of the embryo—how the embryo ought to be regarded or treated from the moral point of view, in virtue of it arguably possessing certain morally important intrinsic characteristics.</span></p><span data-dcnode-id="1438" instrument_node="">
</span><p data-dcnode-id="1436"><span data-dcnode-id="1437" instrument_node="">It is relatively uncontroversial to describe embryos as human life (at its very beginnings). It is another thing, however, to describe embryos as persons, or human beings, or potential persons, etc. These descriptions are morally laden in that they carry with them potential implications about what can and cannot be done to embryos from a moral point of view. What those potential implications are, and indeed, whether they are sound ones, will depend on the nature and plausibility of the particular arguments that accompany each view on the moral status of the embryo. There are different views about this moral status. The leading views speculate that embryos have the status of:</span></p><span data-dcnode-id="1435" instrument_node="">
</span><ul data-dcnode-id="1415"><span data-dcnode-id="1434" instrument_node="">
</span><li data-dcnode-id="1432"><span data-dcnode-id="1433" instrument_node="">persons, or</span></li><span data-dcnode-id="1431" instrument_node="">
</span><li data-dcnode-id="1429"><span data-dcnode-id="1430" instrument_node="">potential persons, or</span></li><span data-dcnode-id="1428" instrument_node="">
</span><li data-dcnode-id="1426"><span data-dcnode-id="1427" instrument_node="">divine creations, or</span></li><span data-dcnode-id="1425" instrument_node="">
</span><li data-dcnode-id="1423"><span data-dcnode-id="1424" instrument_node="">subjects of moral ‘harm’, or</span></li><span data-dcnode-id="1422" instrument_node="">
</span><li data-dcnode-id="1420"><span data-dcnode-id="1421" instrument_node="">the beginnings of human life, with intrinsic value, or</span></li><span data-dcnode-id="1419" instrument_node="">
</span><li data-dcnode-id="1417"><span data-dcnode-id="1418" instrument_node="">organic material with no more moral standing than other body parts.</span></li><span data-dcnode-id="1416" instrument_node="">
</span></ul><span data-dcnode-id="1414" instrument_node="">
</span><p data-dcnode-id="1412"><span data-dcnode-id="1413" instrument_node="">Each of these will be outlined in turn, with particular attention to (i) what the intrinsic moral characteristics are the each particular view attributes to embryos, and (ii) what these alleged characteristics or moral status are held to imply for our moral treatment of embryos—particularly whether they can ever or never be destroyed.</span></p><span data-dcnode-id="1411" instrument_node="">
</span><h3 data-dcnode-id="1409"><span data-dcnode-id="1410" instrument_node="">Embryos have Status as Human Beings or Persons</span></h3><span data-dcnode-id="1408" instrument_node="">
</span><p data-dcnode-id="1406"><span data-dcnode-id="1407" instrument_node="">Some argue that, despite obvious physical differences between developed humans and embryos, the latter ought still be regarded as human beings or persons. One of the more plausible arguments to this effect relies on pointing out that there is no non-arbitrary point in the physical growth continuum between embryo and developed human that counts as a morally significant dividing line.14 Consequently, if individuals at their fully developed stage are human beings or persons, there is no non-arbitrary ground to think that they should not count as the same at their embryonic stage. Those who hold otherwise,</span></p><span data-dcnode-id="1405" instrument_node="">
</span><h2 data-dcnode-id="1403"><span data-dcnode-id="1404" instrument_node="">Key Ethical Issues in Embryonic Stem Cell Research</span></h2><span data-dcnode-id="1402" instrument_node="">
</span><p data-dcnode-id="1400"><span data-dcnode-id="1401" instrument_node="">according to this argument, need to indicate the developmental point at which personhood, or status as a human being, is acquired.</span></p><span data-dcnode-id="1399" instrument_node="">
</span><p data-dcnode-id="1397"><span data-dcnode-id="1398" instrument_node="">The argument continues that it is a very deeply and commonly held view in modern liberal democracies that individual persons are deserving of especially strong moral respect in certain ways. All individuals, by virtue of being persons, have fundamental rights not to have their basic human interests interfered with in certain ways, and most importantly, their interest in the maintenance of their life and bodily integrity. If embryos have the status of persons, then they too will have rights not to be harmed or killed. Or, put in another way, we will be under a very strong moral obligation not to harm or kill embryos.</span></p><span data-dcnode-id="1396" instrument_node="">
</span><p data-dcnode-id="1394"><span data-dcnode-id="1395" instrument_node="">Most prominent ethicists, philosophers and commentators would agree that persons have a status deserving of strong and special moral respect, protection and dignity. Many, however, would dispute that embryos should be considered persons or human beings in any serious sense. Even if one cannot point to an exact black and white dividing line in human development, it is still reasonable (they hold) to point to the fact that wherever the transition occurs, embryos do not have the psychological, physiological, emotional, intellectual properties that we tend to centrally associate with personhood. Embryos, particularly the very early pre-implantation blastocysts involved in stem cell research,15 do not, for instance, have consciousness, individuality, the ability to reason, or the ability to form courses of action in life and to choose between them.16</span></p><span data-dcnode-id="1393" instrument_node="">
</span><h3 data-dcnode-id="1391"><span data-dcnode-id="1392" instrument_node="">Embryos have Status as Potential Persons</span></h3><span data-dcnode-id="1390" instrument_node="">
</span><p data-dcnode-id="1388"><span data-dcnode-id="1389" instrument_node="">Some ethicists have a response to the foregoing objection to viewing embryos as persons. It is to concede that embryos do not currently exhibit these properties of personhood, but they will, if allowed to develop and fulfil their potential. To the extent that embryos are potential persons, it is argued, they ought to still be accorded the moral respect and dignity that personhood warrants.</span></p><span data-dcnode-id="1387" instrument_node="">
</span><p data-dcnode-id="1385"><span data-dcnode-id="1386" instrument_node="">This potential person argument gains some of its impetus from the observation that we still treat humans as persons (with the attendant moral respect) when they are temporarily unconscious or asleep. While in these incapacitated conditions, individuals are not conscious, can not reason, and can not form and choose courses of action—the characteristics we associate with personhood. But we still see it as morally wrong to harm them or violate their basic rights. It is argued that we see it this way because we know that even though they are not able to exercise the properties of personhood in their present state, these people will be able to when they become conscious again. This same reasoning it is argued, and the fact they will exercise these capacities when they eventually become fully developed humans, should inform our attitude to embryos.</span></p><span data-dcnode-id="1384" instrument_node="">
</span><h2 data-dcnode-id="1382"><span data-dcnode-id="1383" instrument_node="">Key Ethical Issues in Embryonic Stem Cell Research</span></h2><span data-dcnode-id="1381" instrument_node="">
</span><p data-dcnode-id="1379"><span data-dcnode-id="1380" instrument_node="">Three types of concern have been expressed about this argument:</span></p><span data-dcnode-id="1378" instrument_node="">
</span><p data-dcnode-id="1376"><span data-dcnode-id="1377" instrument_node="">The probability of IVF embryos developing into full-term successful births is low. There is a high rate of foetal loss in early embryos—up to 73 per cent in pre-implantation embryos.17 If probability is a reflection of potential, then there is relatively little potential for any one pre-embryo to become a person.</span></p><span data-dcnode-id="1375" instrument_node="">
</span><p data-dcnode-id="1373"><span data-dcnode-id="1374" instrument_node="">Potential is very context-dependent, and it may not make sense to talk simply about the potential of something. The probability of an IVF embryo becoming a successful birth depends heavily on human action and intervention (e.g., transferral to the uterus), as well as other biological conditions (e.g., whether the embryo implants, grows to term, is born properly, etc., etc.). A great deal has to come from the outside for a successful birth, in the case of both natural and assisted pregnancy. So much so, it might be argued that it is not entirely clear what could be meant when speaking of the inherent potential of an embryo to become a person.18 From what contextual base line could that inherent potential be measured? (Some might also wish to point out that, in the case where surplus IVF embryos are used for stem cell harvest, these would naturally succumb anyway, and consequently would not have the potential to become persons.)</span></p><span data-dcnode-id="1372" instrument_node="">
</span><p data-dcnode-id="1370"><span data-dcnode-id="1371" instrument_node="">Some would argue, that it is not clear why something that could become a person should be morally regarded as if it actually were a person. They would hold that the observation made above about people who are temporarily unconscious does not necessarily make the required case. Arguably, we treat the temporarily unconscious with the full moral respect of personhood because we knew that before lapsing into unconsciousness they had all the properties of personhood, and we know they will have them again after they come out of it. This scepticism is not presented as suggesting that the potential personhood of embryos counts for nothing in the way they are regarded morally. Only that it might not count for the full complement of rights and respect that actual persons warrant.</span></p><span data-dcnode-id="1369" instrument_node="">
</span><p data-dcnode-id="1367"><span data-dcnode-id="1368" instrument_node="">Before leaving these views about the moral status of embryos as persons or potential persons, there is an important qualification to be noted. Even if embryos were shown to have this status, and the accompanying moral respect, dignity and protections due to persons, it can be argued that this still might not necessarily mean that embryos should never be intentionally destroyed. A lot depends on one's philosophical understanding of the moral rights and obligations associated with personhood. Some would argue that the human right not to be killed, and the moral obligation not to kill persons, are absolute and inviolable, and must be observed with no exception, regardless of what the consequences are. Others might argue that the obligation not to kill persons, although a very very strong obligation, is not an absolute and indefeasible one that can never be overridden. There may be some circumstances where very great harms can be averted by actively ending someone's life. For example, assassinating Hitler and saving 6 million Jews, or even pulling the plug on life-support in order to spare someone's intense suffering. Someone very attuned to the importance of consequences, therefore, might want to hold that even if embryos do have the full complement of human rights, it is still not an absolute and indefeasible obligation not to destroy embryos regardless of the consequences. The fact</span></p><span data-dcnode-id="1366" instrument_node="">
</span><h2 data-dcnode-id="1364"><span data-dcnode-id="1365" instrument_node="">Key Ethical Issues in Embryonic Stem Cell Research</span></h2><span data-dcnode-id="1363" instrument_node="">
</span><p data-dcnode-id="1361"><span data-dcnode-id="1362" instrument_node="">that many people would accept abortion in cases where the pregnant woman is at significant physical risk, is testimony to the prevalence of this consequentialist turn in people's ordinary moral thinking.</span></p><span data-dcnode-id="1360" instrument_node="">
</span><h3 data-dcnode-id="1358"><span data-dcnode-id="1359" instrument_node="">Embryos have Status as Divine Creations</span></h3><span data-dcnode-id="1357" instrument_node="">
</span><p data-dcnode-id="1355"><span data-dcnode-id="1356" instrument_node="">It is sometimes implicit in some points of view, particularly theistic ones, that embryos warrant special moral importance because they are divine creations in being the beginnings of human life. In other words, embryos are not ours to destroy (nor create).</span></p><span data-dcnode-id="1354" instrument_node="">
</span><p data-dcnode-id="1352"><span data-dcnode-id="1353" instrument_node="">A number of concerns might be expressed about this view. For those who do not subscribe to a theistic worldview, the most obvious would relate to questions about the reality of a divine creator or creative agency. It is not clear what publicly available procedure could resolve that question. Some might also observe that this argument, at least in its simple form, could be too strong, since it argues against the destructive use of e.g., plants. On top of this, some might add, our limited knowledge of the nature of the divine tends to also limit our understanding of what divine status exactly implies re our moral obligations.</span></p><span data-dcnode-id="1351" instrument_node="">
</span><h3 data-dcnode-id="1349"><span data-dcnode-id="1350" instrument_node="">Embryos are Harmed by their Destruction (Whatever their Moral Status)</span></h3><span data-dcnode-id="1348" instrument_node="">
</span><p data-dcnode-id="1346"><span data-dcnode-id="1347" instrument_node="">It is generally held that one of the traditional reasons for protecting life, is that loss of life causes various sorts of harm—to the killer, those close to the deceased, society in general, and most importantly the deceased. Some have argued that loss of embryonic life is a harm, inflicted on the embryo, by destroying it. Philip Devine, for instance, argues that:</span></p><span data-dcnode-id="1345" instrument_node="">
</span><p data-dcnode-id="1343"><span data-dcnode-id="1344" instrument_node="">… loss of life ... is a harm that can be inflicted on any organism; plants and non-human animals. Human organisms of every stage of development including the embryonic can all suffer loss of life.19</span></p><span data-dcnode-id="1342" instrument_node="">
</span><p data-dcnode-id="1340"><span data-dcnode-id="1341" instrument_node="">Others, however, have argued that embryos cannot be harmed in the sense we usually understand that idea. The eminent American social and legal philosopher, Joel Feinberg, for instance, analyses the concept of harm in terms of the 'thwarting, setting back, or defeating of an interest'.20 For a being to have an 'interest', for Feinberg, is a matter of it having beliefs, desires, expectations, aims and purposes. These, he holds, are what are thwarted, in the thwarting of an interest. According to his views trees or the environment are not themselves morally harmed by their destruction. Feinberg allows that future or potential interests might be attributed to a developing embryo, but that these only take effect if and when the potential interest becomes actual. Another theorist makes this same point by example:</span></p><span data-dcnode-id="1339" instrument_node="">
</span><p data-dcnode-id="1337"><span data-dcnode-id="1338" instrument_node="">Imagine that, just as Dr Frankenstein reached for the lever that would bring life to the assemblage of body parts on his laboratory table, someone appalled at the experiment smashed the apparatus. That act, whatever we think of it, would not have been harmful or unfair to the assemblage, or against its interests.21</span></p><span data-dcnode-id="1336" instrument_node="">
</span><h2 data-dcnode-id="1334"><span data-dcnode-id="1335" instrument_node="">Key Ethical Issues in Embryonic Stem Cell Research</span></h2><span data-dcnode-id="1333" instrument_node="">
</span><p data-dcnode-id="1331"><span data-dcnode-id="1332" instrument_node="">The nub of this view is that because embryos are not the 'subject' of interests, they cannot be the subject of basic rights that protect interests.</span></p><span data-dcnode-id="1330" instrument_node="">
</span><h3 data-dcnode-id="1328"><span data-dcnode-id="1329" instrument_node="">Embryos have Status as Human Life with Intrinsic Value</span></h3><span data-dcnode-id="1327" instrument_node="">
</span><p data-dcnode-id="1325"><span data-dcnode-id="1326" instrument_node="">Even if the foregoing views of Feinberg were accepted, some have argued that there is still something bad about the loss of life that is involved in the destruction of an embryo. In an attempt to get at the heart of this persistent residual conviction, the prominent Anglo-American legal and political philosopher Ronald Dworkin has proposed that we need to look at the value of a life in a particular way. Dworkin observes that we can conceive of the value of a life from two (compatible) points of view or directions. We very often think of the value of lives from the inside, as it were, in terms of the value they have to the livers of those lives. Through rights and liberties, we protect a person's life and interests, not because these are valuable from the point of view of the universe, but because they are important to the person concerned. But as well as recognising that a life has value to the liver, we also recognise that a life can have value from a more objective and impersonal point of view. In much the same way that a unique and magnificent work of art has intrinsic value, a value which makes it deserving of respect and protection, Dworkin observes that a single human life commands respect. Dworkin eloquently encapsulates the intrinsic value of human life in the following.</span></p><span data-dcnode-id="1324" instrument_node="">
</span><p data-dcnode-id="1322"><span data-dcnode-id="1323" instrument_node="">(a single human life has value) … no matter in what form or shape, because of the complex creative investment it represents and because of our wonder at the divine or evolutionary processes that produce new lives from old ones, at the processes of nation and community and language through which a human being will come to absorb and continue hundreds of generations of cultures and forms of life and value, and, finally, when mental life has begun and flourishes, at the process of internal personal creation and judgement by which a person will make and remake himself, a mysterious, inescapable process in which we each participate, and which is therefore the most powerful and inevitable source of empathy and communion we have with every other creature who faces the same frightening challenge.22</span></p><span data-dcnode-id="1321" instrument_node="">
</span><p data-dcnode-id="1319"><span data-dcnode-id="1320" instrument_node="">Thinking of the value of a life in this more external or impersonal way, argues Dworkin, provides another way of understanding what of moral importance is lost in the loss of a human life. Because this understanding is not based on any supposed moral harms to the liver of the life, as the subject of human interests, it is an understanding that can be applied in the case of human life at its very beginnings, i.e., embryos.</span></p><span data-dcnode-id="1318" instrument_node="">
</span><p data-dcnode-id="1316"><span data-dcnode-id="1317" instrument_node="">There is however one crucial qualification in Dworkin's view. There are degrees of intrinsic value of a life depending on the stage at which the life is being lived, and correspondingly, there are degrees of respect that ought to be shown it at those stages. Dworkin observes that we tend to make different judgements of how great a loss the ending of a life is at different stages in that life. For example, many would argue that a life ended at the peak of its achievements and promise is a greater loss than a life lost at its sunset, after its achievements and promise have been realised. Some also would argue that</span></p><span data-dcnode-id="1315" instrument_node="">
</span><h2 data-dcnode-id="1313"><span data-dcnode-id="1314" instrument_node="">Key Ethical Issues in Embryonic Stem Cell Research</span></h2><span data-dcnode-id="1312" instrument_node="">
</span><p data-dcnode-id="1310"><span data-dcnode-id="1311" instrument_node="">a human life that ends at its very beginnings is a less serious loss than a life that ends some time after it has begun to actively engage in the process of human and social involvement that Dworkin speaks of in the passage above. We do, for instance, see sudden infant death as a more serious loss than early miscarriage, or failure of an embryo to implant. These different judgements of the degree of loss involved in the ending of a life, reflect the degree of intrinsic value we attach to human life at those stages. Or so Dworkin argues.</span></p><span data-dcnode-id="1309" instrument_node="">
</span><p data-dcnode-id="1307"><span data-dcnode-id="1308" instrument_node="">The important implication of Dworkin's arguments, is that even though embryos, as human life, deserve respect and protection, the degree of respect and protection they warrant may not be as great as that accorded to later stage human life. Consequently, some would argue that there may be circumstances where the limited loss of value involved in an embryo being destroyed is outweighed from a moral point of view, by the possible benefits in allowing that to happen.</span></p><span data-dcnode-id="1306" instrument_node="">
</span><h3 data-dcnode-id="1304"><span data-dcnode-id="1305" instrument_node="">Embryos have the Status of Mere Body Parts</span></h3><span data-dcnode-id="1303" instrument_node="">
</span><p data-dcnode-id="1301"><span data-dcnode-id="1302" instrument_node="">Some might hold that embryos are merely parts of other people's bodies until they reach a certain autonomous or independent developmental stage (and there will be differing views on when that might be). Accordingly, embryos have no independent moral status at all, and are merely the property of the people from whose body they came. The only respect due to embryos is the respect that should be accorded other people's property. This no-status view is argued for on grounds that none of the other arguments in favour of an independent moral status are compelling.</span></p><span data-dcnode-id="1300" instrument_node="">
</span><h4 data-dcnode-id="1298"><span data-dcnode-id="1299" instrument_node="">Embryos Created for Research Purposes?</span></h4><span data-dcnode-id="1297" instrument_node="">
</span><p data-dcnode-id="1295"><span data-dcnode-id="1296" instrument_node="">Is it somehow worse to use embryos created specifically for research, than it is to use embryos that are surplus to the reproductive treatments for which they were created? In other words, is there anything independently wrong with creating embryos for research purposes above and beyond whatever (if anything) might be wrong with destroying them as part of the research process?</span></p><span data-dcnode-id="1294" instrument_node="">
</span><p data-dcnode-id="1292"><span data-dcnode-id="1293" instrument_node="">Some argue that creating embryos for research is to create them merely as a means to others' ends (no matter how laudable those ends might be).23 If embryos do have a significant person-like moral status (as, e.g., persons, potential persons, divine creations), then this amounts to treating them with deep moral disrespect. They are being commodified. However, when embryos are created for reproductive purposes, each has the same initial chance of being transferred to the uterus, even if it will probably turn out that not all of them are needed in the end. They are still being created 'respectfully'—for a use that fits with their intrinsic or natural ends or purpose, not others'.</span></p><span data-dcnode-id="1291" instrument_node="">
</span><p data-dcnode-id="1289"><span data-dcnode-id="1290" instrument_node="">Some would reply, however, that this argument is based on a view about the moral status of embryos that needs to be fully established. Moreover, if using embryos for others' ends is wrong, then that may well count against the donating of embryos for research purposes.</span></p><span data-dcnode-id="1288" instrument_node="">
</span><h2 data-dcnode-id="1286"><span data-dcnode-id="1287" instrument_node="">Key Ethical Issues in Embryonic Stem Cell Research 13</span></h2><span data-dcnode-id="1285" instrument_node="">
</span><p data-dcnode-id="1283"><span data-dcnode-id="1284" instrument_node="">Another argument has been expressed which does not rely on attributing person-like moral status to embryos, but something more like the status outlined in Dworkin's views noted above. Embryos, even if they are not the holders of rights, nonetheless have considerable value to the extent that they are the beginnings of a possible human life. Embryos can, therefore, function as powerful symbols and provide the opportunity for a community to demonstrate or express commitment to human life generally by, for example, condemning creation of embryos for research purposes. As the philosopher John A. Robertson says, 'In taking such a stance, persons define or constitute themselves as highly protective of human life.'24 Robertson notes, however, that this same symbolic respect for life can be expressed through allowing embryos to be created so that others' lives can be prolonged, or deaths averted.</span></p><span data-dcnode-id="1282" instrument_node="">
</span><p data-dcnode-id="1280"><span data-dcnode-id="1281" instrument_node="">Today, a man lies dying of liver failure in a hospital. There is little expectation that he will be one of the lucky few to receive a transplant before he becomes too ill to save. Even if he did receive a transplant, he will be burdened with taking multiple anti-rejection drugs for the rest of his life, which in and of themselves would significantly compromise his health.</span></p><span data-dcnode-id="1279" instrument_node="">
</span><p data-dcnode-id="1277"><span data-dcnode-id="1278" instrument_node="">Tomorrow, scientists develop a method to build this man a new liver, one that would be a perfect match for him, requiring no anti-rejection drugs whatsoever. There is a catch. To perfect such a solution would require the destruction of other lives. Would Judaism sanction such a solution?</span></p><span data-dcnode-id="1276" instrument_node="">
</span><p data-dcnode-id="1274"><span data-dcnode-id="1275" instrument_node="">Jewish law clearly forbids the taking of one life to save another. The Talmud forbids saving one's life at the expense of another by asking how one knows that his life is more valuable than his neighbor's. Perhaps your neighbor's life is more valuable.</span></p><span data-dcnode-id="1273" instrument_node="">
</span><h3 data-dcnode-id="1271"><span data-dcnode-id="1272" instrument_node="">WHEN THE FETUS IS A THREAT TO LIFE</span></h3><span data-dcnode-id="1270" instrument_node="">
</span><h3 data-dcnode-id="1268"><span data-dcnode-id="1269" instrument_node="">One may kill someone who is unjustly pursuing a third party to kill him.</span></h3><span data-dcnode-id="1267" instrument_node="">
</span><p data-dcnode-id="1265"><span data-dcnode-id="1266" instrument_node="">But, what if the life that would need to be sacrificed was that of a fetus? May we permit abortion to save the life of an already born person? The Mishna clearly states that if the life of a woman in labor is threatened by her fetus, the fetus should be aborted. But once a portion of the baby has emerged, we may not abort the fetus, because "one may not set aside one person's life for the sake of another." The principle behind this ruling is that one may kill someone who is unjustly pursuing a third party to kill him. Since the fetus, who is not yet considered a "complete" person, is "pursuing" the mother in a way that will inevitably result in her death, we may kill it first. But, once it has even partially emerged, it is considered a full-fledged person. Now we are faced with a dilemma, states Rabbi Moshe Feinstein, one of the most respected rabbis of the 20th century: who is pursuing whom?</span></p><span data-dcnode-id="1264" instrument_node="">
</span><h3 data-dcnode-id="1262"><span data-dcnode-id="1263" instrument_node="">WHEN PURSUING EACH OTHER</span></h3><span data-dcnode-id="1261" instrument_node="">
</span><p data-dcnode-id="1259"><span data-dcnode-id="1260" instrument_node="">Imagine that you are transported back in time to Weehawken, New Jersey, on July 11, 1804. As you step out of the time machine you see Aaron Burr, pulling out a revolver to shoot Alexander Hamilton, Former United States Secretary Of The Treasury. Simultaneously, you see Hamilton also drawing his revolver to kill Burr! What should you do? Kill Burr? Kill Hamilton? Jewish law would rule that you may kill neither, because they are pursuing each other and you do not know which one, if either, is an innocent party.</span></p><span data-dcnode-id="1258" instrument_node="">
</span><p data-dcnode-id="1256"><span data-dcnode-id="1257" instrument_node="">In our case of the baby struggling to be born at the expense of the mother and the mother struggling to survive at the expense of the fetus, are not the baby and the mother each "pursuing" the other? In such a case, the general rule is that we may not choose either, since each is a complete and autonomous person, and each is both the pursuer and the pursued. Luckily for us, these scenarios are very rare occurrences in our day thanks to Caesarian sections.</span></p><span data-dcnode-id="1255" instrument_node="">
</span><h3 data-dcnode-id="1253"><span data-dcnode-id="1254" instrument_node="">A life-threatening situation for another adult would not justify our killing a fetus.</span></h3><span data-dcnode-id="1252" instrument_node="">
</span><p data-dcnode-id="1250"><span data-dcnode-id="1251" instrument_node="">But, since the rationale for abortion in Jewish law is based on the fetus being a pursuer of the mother, a life-threatening situation for another adult would not justify our killing a fetus, since the fetus does not threaten the life of anyone except the mother. Therefore, we cannot allow abortion, even to save the life of our patient with liver failure.</span></p><span data-dcnode-id="1249" instrument_node="">
</span><h3 data-dcnode-id="1247"><span data-dcnode-id="1248" instrument_node="">DESTROYING "PRE-EMBRYOS"</span></h3><span data-dcnode-id="1246" instrument_node="">
</span><p data-dcnode-id="1244"><span data-dcnode-id="1245" instrument_node="">But there is hope. What if the scientists "merely" needed to destroy excess fertilized eggs from in vitro fertilization (IVF) procedures that are only a few days old and have not yet been implanted in a woman's uterus? Is the destruction of these "pre-embryos" ethically acceptable to us? That is exactly the debate that currently rages regarding stem cell research.</span></p><span data-dcnode-id="1243" instrument_node="">
</span><p data-dcnode-id="1241"><span data-dcnode-id="1242" instrument_node="">While stem cells can be derived from aborted fetuses and even adults, the best source for stem cells is the small clump of cells that compose the early zygote only a few days following conception. Therefore, to best investigate the latent possibilities inherent in stem cells, scientists wish to use the approximately 100,000 "excess" frozen pre-embryos that are "left over" from earlier IVF attempts. Is it ethical to allow the destruction of pre-embryos to obtain stem cells for research that may some day save thousands of lives?</span></p><span data-dcnode-id="1240" instrument_node="">
</span><p data-dcnode-id="1238"><span data-dcnode-id="1239" instrument_node="">Early stem cells have the ability to differentiate into every cell of the human body, potentially forming an entire fetus. If we were able to manipulate the conditions controlling cellular differentiation, we might create replacement cells and organs, potentially curing illnesses such as diabetes, Alzheimer's disease, and Parkinson's disease.</span></p><span data-dcnode-id="1237" instrument_node="">
</span><p data-dcnode-id="1235"><span data-dcnode-id="1236" instrument_node="">But, the ultimate promise of stem cell technology would be to combine it with cloning. Imagine our man dying of liver failure. If we could clone one of his cells, but instead of allowing the cloned cell to develop into a fetus, we might place it into the appropriate environment that would cause it to differentiate into a liver that would be virtually genetically identical to that of the sick man. If we could "grow" this liver to maturity, we could offer the sick man a liver transplant without the risk of rejection and without the need for anti-rejection drugs.</span></p><span data-dcnode-id="1234" instrument_node="">
</span><p data-dcnode-id="1232"><span data-dcnode-id="1233" instrument_node="">Unfortunately, we still do not know if we can successfully clone a human, nor are we sure what practical value can be derived from stem cells. It will require years of very expensive, labor-intensive research to determine the potential that stem cells hold for the treatment, palliation, and cure of human illness.</span></p><span data-dcnode-id="1231" instrument_node="">
</span><h3 data-dcnode-id="1229"><span data-dcnode-id="1230" instrument_node="">ARE "PRE-EMBRYOS" INCLUDED IN THE PROHIBITION OF ABORTION?</span></h3><span data-dcnode-id="1228" instrument_node="">
</span><p data-dcnode-id="1226"><span data-dcnode-id="1227" instrument_node="">Is it ethical to sacrifice pre-embryos to experiment with their stem cells in the hope of some day saving many lives? While many ethical issues arise, the key one is whether pre-embryos are included in the prohibition of abortion. The consensus thus far is that it an embryo is not protected by the limitations on abortion until it is implanted in a woman. Most rationales given for why the Torah forbids abortion, except to save the mother's life, revolve around the fetus being within the woman.</span></p><span data-dcnode-id="1225" instrument_node="">
</span><h4 data-dcnode-id="1223"><span data-dcnode-id="1224" instrument_node="">The consensus is that an embryo is not protected by the limitations on abortion until it is implanted in a woman</span></h4><span data-dcnode-id="1222" instrument_node="">
</span><p data-dcnode-id="1220"><span data-dcnode-id="1221" instrument_node="">The logic of only ascribing humanity to an embryo once it is implanted in the womb is simple. Left undisturbed, an embryo in its mother's womb will most likely continue to grow and reach parturition. But the pre-embryo created by IVF, if left untouched in its "test tube," will die. The pre-embryo requires active intervention to even reach a situation which we consider to be true potential life. The alternative to this reasoning would be to argue that the killing of adult skin cells is forbidden, since a person could potentially be cloned from any cell in an adult's body.</span></p><span data-dcnode-id="1219" instrument_node="">
</span><h3 data-dcnode-id="1217"><span data-dcnode-id="1218" instrument_node="">ANOTHER RATIONALE</span></h3><span data-dcnode-id="1216" instrument_node="">
</span><p data-dcnode-id="1211"><span data-dcnode-id="1215" instrument_node="">Additionally, there is another sound reason to allow destruction of pre-embryos to save a life. When necessary to save a life, Judaism requires us to transgress all of the laws in the Torah, with the exception of murder, adultery, and idol worship. For example, if someone is gravely ill on Yom Kippur, we would drive in a car to get them non-kosher food even if necessary to save their life. If a pre-embryo is not covered by the Biblical commandment of "thou shall not murder," then we might allow destroying a pre-embryo for its stem cells </span><strong data-dcnode-id="1213"><span data-dcnode-id="1214" instrument_node="">if</span></strong><span data-dcnode-id="1212" instrument_node=""> it would save the life of an already born person. We are left with the question of whether research is considered the saving of a life. This argument becomes even more appealing if concrete life-saving medical treatments can be demonstrated.</span></p><span data-dcnode-id="1210" instrument_node="">
</span><p data-dcnode-id="1208"><span data-dcnode-id="1209" instrument_node="">For these as well as many other reasons, many contemporary halachic decisors have ruled that the destruction of preexisting pre-embryos for stem cell research is permitted (see my more extensive article on stem cell research and Jewish Law at: http://www.jlaw.com/Articles/stemcellres.html)</span></p><span data-dcnode-id="1207" instrument_node="">
</span><h3 data-dcnode-id="1205"><span data-dcnode-id="1206" instrument_node="">CHEAPENING THE VALUE OF HUMAN LIFE</span></h3><span data-dcnode-id="1204" instrument_node="">
</span><p data-dcnode-id="1202"><span data-dcnode-id="1203" instrument_node="">Nevertheless, many Rabbis oppose the deliberate creation of pre-embryos for the purpose of their destruction, as this would cheapen the value of human life.</span></p><span data-dcnode-id="1201" instrument_node="">
</span><p data-dcnode-id="1199"><span data-dcnode-id="1200" instrument_node="">The halachic process offers fascinating insight into all areas of ethics, including biomedical ethics. It gives us the opportunity to evaluate the explosion of technology that surrounds us through the lens of the Torah, insuring that we remain the masters of our science and not vice versa. Judaism has no issue with technology. It only requires the ethical and responsible use of science to better our lives. Let us pray that tomorrow, our patient with liver failure will be cured.</span></p><span data-dcnode-id="1198" instrument_node="">
</span><h3 data-dcnode-id="1196"><span data-dcnode-id="1197" instrument_node="">Stem Cell Biology and Its Complications</span></h3><span data-dcnode-id="1195" instrument_node="">
</span><p data-dcnode-id="1190"><span data-dcnode-id="1194" instrument_node="">The renewed debate over embryonic </span><u data-dcnode-id="1192"><span data-dcnode-id="1193" instrument_node="">stem cells</span></u><span data-dcnode-id="1191" instrument_node=""> highlights the advances and complications that have arisen in the field since its controversial beginnings.</span></p><span data-dcnode-id="1189" instrument_node="">
</span><h3 data-dcnode-id="1187"><span data-dcnode-id="1188" instrument_node="">Multimedia</span></h3><span data-dcnode-id="1186" instrument_node="">
</span><p data-dcnode-id="1184"><span data-dcnode-id="1185" instrument_node="">Graphic</span></p><span data-dcnode-id="1183" instrument_node="">
</span><p data-dcnode-id="1181"><span data-dcnode-id="1182" instrument_node="">Type of Stem Cells</span></p><span data-dcnode-id="1180" instrument_node="">
</span><h3 data-dcnode-id="1178"><span data-dcnode-id="1179" instrument_node="">Related</span></h3><span data-dcnode-id="1177" instrument_node="">
</span><p data-dcnode-id="1175"><span data-dcnode-id="1176" instrument_node="">* Stem Cell Ruling Will Be Appealed (August 25, 2010)</span></p><span data-dcnode-id="1174" instrument_node="">
</span><p data-dcnode-id="1172"><span data-dcnode-id="1173" instrument_node="">The cells are a sort of blank slate, plucked from human embryos just a few days after fertilization. They tantalize scientists because they could in theory turn into any of the body’s 200 mature cell types, from blood to brain to liver to heart. They could be used to study and treat diseases and to study the basic biology of what determines a cell’s destiny — why a heart cell becomes a heart cell, for example, instead of a brain cell.</span></p><span data-dcnode-id="1171" instrument_node="">
</span><p data-dcnode-id="1166"><span data-dcnode-id="1170" instrument_node="">The problem is their origin — human embryos. In order to get stem cells, embryos must be destroyed. It is this fact that led to </span><u data-dcnode-id="1168"><span data-dcnode-id="1169" instrument_node="">the court ruling on Monday</span></u><span data-dcnode-id="1167" instrument_node=""> blocking most federal financing for embryonic stem cell research.</span></p><span data-dcnode-id="1165" instrument_node="">
