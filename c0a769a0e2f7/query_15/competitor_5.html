</span><div class="et_pb_text et_pb_module et_pb_bg_layout_light et_pb_text_align_left et_pb_text_0" data-dcnode-id="77"><span data-dcnode-id="784" instrument_node="">
				
[ </span><a data-dcnode-id="782" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//bmei.org/jbem/"><span data-dcnode-id="783" instrument_node="">JBEM Index</span></a><span data-dcnode-id="781" instrument_node=""> / </span><a data-dcnode-id="779" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//bmei.org/jbem-volume-9/"><span data-dcnode-id="780" instrument_node="">Volume 9</span></a><span data-dcnode-id="778" instrument_node=""> / </span><a data-dcnode-id="776" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//bmei.org/volume-1-number-2/"><span data-dcnode-id="777" instrument_node="">Number 2</span></a><span data-dcnode-id="775" instrument_node=""> ]
</span><h1 class="title" data-dcnode-id="773" style="text-align: center;"><span data-dcnode-id="774" instrument_node="">The Christian Worldview of Medicine</span></h1><span data-dcnode-id="772" instrument_node="">
</span><p class="byline" data-dcnode-id="768"><span data-dcnode-id="771" instrument_node="">Ed Payne, M.D., Chairman</span><br data-dcnode-id="770"><span data-dcnode-id="769" instrument_node="">
William Reed, M.D., Co-chairman</span></p><span data-dcnode-id="767" instrument_node="">
</span><p class="info" data-dcnode-id="761"><span data-dcnode-id="766" instrument_node="">With contributions by members of the Medicine Committee of the Coalition on Revival</span><br data-dcnode-id="765"><span data-dcnode-id="764" instrument_node="">
Jay Grimstead, D.Min., General Editor</span><br data-dcnode-id="763"><span data-dcnode-id="762" instrument_node="">
E. Calvin Beisner, M.A., Assistant to the General Editor</span></p><span data-dcnode-id="760" instrument_node="">
</span><p class="info" data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">Ed’s Note:</span></p><span data-dcnode-id="757" instrument_node="">
</span><p class="info" data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">The Coalition on Revival was an outgrowth of the International Conference on Biblical inerrancy that met in Chicago in 1978 to take a stand against the assault on Biblical truth. That conference’s statement took the form of Affirmations and Denials. The Coalition determined to apply Biblical truth to spheres of knowledge in the modern world. These spheres were Law, Government, Economics, Business and Occupations, Education, Art and Communication, Medicine, Psychology and Counseling, Science and Technology, Christian Unity, Local and World Evangelism, Making of Disciples, Helping the Hurting, Revitalizing Christian Colleges and Seminaries, Family, Pastoral Renewal, and Educating Christians on Social, Political, and Moral Issues. The Affirmations and Denials (and other information on their activities) of all these spheres are available in one bound volume @ (800) 954-1122, Ext. 900.</span></p><span data-dcnode-id="754" instrument_node="">
</span><p class="info" data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">While I wrote almost all of this document, it has received some editing and additions with which I do not fully agree. However, they are not sufficiently major to require further comment here.</span></p><span data-dcnode-id="751" instrument_node="">
</span><p align="center" class="heading1" data-dcnode-id="747"><span data-dcnode-id="750" instrument_node="">
</span><b data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">INTRODUCTION</span></b></p><span data-dcnode-id="746" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">The usual training of health-care workers and the practice of medicine virtually ignore the spiritual side of man, the reality of God and supernatural revelation, and the historical role of the healer as a kind of priest. This situation in medicine reflects the dominant view of Western society that man is only an evolved animal. Medical ethics are relative and can give no concrete answers to the complex dilemmas of today’s advanced bio-technology. Man believes that he is the master of his own fate and is able to “improve” his physical and mental abilities through drugs, artificial reproduction, and genetic engineering. Health-care costs continue to rise above the resources of individuals and society.</span></p><span data-dcnode-id="743" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">Unfortunately, most Christian health-care workers have not been able to discern the difference between Biblical and naturalistic values and ethics. They have been taught to maintain a “neutral” and “non-judgmental” attitude. The Bible, in contrast, speaks of light and darkness, a contrast that is readily apparent and that does not allow a Christian to be neutral. If Christians believe that all Scripture is able to “thoroughly furnish” and “adequately equip for every good work” (II Timothy 3:16, 17), then the starting point must be a thorough understanding of God’s Word and a consistent practice conditioned by that understanding.</span></p><span data-dcnode-id="740" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">In an age of widespread specialization and heavy patient demands, it is extremely difficult to resist the pressure simply to work hard in one’s field, to try to be moral, and to go home exhausted. The prevalence of abortion, however, has awakened us to the implications of the modern medical ethic. We must ask ourselves this question: If abortion is so readily accepted as “good” medical practice, are there other common medical practices equally wrong. from God’s perspective? This document is an initial attempt to discern Biblical concepts for health and the practice of medicine.</span></p><span data-dcnode-id="737" instrument_node="">
</span><p align="center" class="bodyParagraph" data-dcnode-id="734"><b data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">STATEMENTS OF AFFIRMATION AND DENIAL &nbsp;</span></b></p><span data-dcnode-id="733" instrument_node="">
</span><p align="center" class="bodyParagraph" data-dcnode-id="730"><b data-dcnode-id="731"><span data-dcnode-id="732" instrument_node="">EPISTEMOLOGY</span></b></p><span data-dcnode-id="729" instrument_node="">
</span><p class="heading2" data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">1. Revelation And Science</span></p><span data-dcnode-id="726" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">We affirm that the health-care worker must have a thorough knowledge of the Bible practically applied to his personal and professional life (II Timothy 3:16, 17; II Peter 3:1).</span></p><span data-dcnode-id="723" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">We deny that the Bible conflicts with medical science when both are correctly understood (Genesis 1:12:25; Colossians 2:3).</span></p><span data-dcnode-id="720" instrument_node="">
</span><p class="heading2" data-dcnode-id="718"><span data-dcnode-id="719" instrument_node="">2. Authority</span></p><span data-dcnode-id="717" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="715"><span data-dcnode-id="716" instrument_node="">We affirm that the Bible is the final authority for health, medical care, and medical ethics (II Timothy 3:16, 17; 11 Pet. 3:1).</span></p><span data-dcnode-id="714" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">We deny that medical ethics should be determined by the desires of the patient, the ethics of a medical organization, current medical practice, technical feasibility, or governmental legislation (II Timothy 3:16, 17; II Pet. 3:1).</span></p><span data-dcnode-id="711" instrument_node="">
</span><p class="heading2" data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">3. Anthropology</span></p><span data-dcnode-id="708" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">We affirm that God created man distinct from the animals as a unity of non-material (nonphysical) and material (physical) components that both affect the presence or absence of health (Genesis 1:26-28; 2:7).</span></p><span data-dcnode-id="705" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">We deny that man can be treated medically as simply a bio-chemical entity that has evolved (Genesis 2:7).</span></p><span data-dcnode-id="702" instrument_node="">
</span><p class="heading2" data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">4. Human Worth</span></p><span data-dcnode-id="699" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="697"><span data-dcnode-id="698" instrument_node="">We affirm that the worth of an individual person is determined by his creation in the image of God (Genesis 1:27).</span></p><span data-dcnode-id="696" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">We deny that the worth of a person can ever be determined by his quality of life or his usefulness to society, and that the health of collective humanity necessarily supersedes the health of the individual (Genesis 1:27).</span></p><span data-dcnode-id="693" instrument_node="">
</span><p align="center" class="heading1" data-dcnode-id="690"><b data-dcnode-id="691"><span data-dcnode-id="692" instrument_node="">HEALTH</span></b></p><span data-dcnode-id="689" instrument_node="">
</span><p class="heading2" data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">5. Health</span></p><span data-dcnode-id="686" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">We affirm that perfect health is a Biblical concept that has been experienced only by Adam and Eve prior to their sin (Genesis 2:17b; Romans 5:12; I Corinthians 15:21, 22).</span></p><span data-dcnode-id="683" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">We deny that perfect health is possible except for the state of believers in Heaven (Hebrews 9:27; I Corinthians 15:42-58; II Corinthians 5:1-4).</span></p><span data-dcnode-id="680" instrument_node="">
</span><p class="heading2" data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">6. Optimal Health</span></p><span data-dcnode-id="677" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">We affirm that optimal health is achieved through spiritual regeneration, Biblical obedience, and current medical knowledge, the latter always under the authority of the Bible (Nehemiah 8:10b; Psalm 90:10; II Corinthians 5:17; Exodus 15:26; I Kings 3:14; Psalm 38; Proverbs 3:7, 8; II Timothy 3:16, 17).</span></p><span data-dcnode-id="674" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">We deny that optimal health may be achieved through medical knowledge alone (Exodus 15:26; 1 Kings 3:14; Psalm 38; Proverbs 3:7, 8).</span></p><span data-dcnode-id="671" instrument_node="">
</span><p class="heading2" data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">7. The Family’s Responsibility</span></p><span data-dcnode-id="668" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">We affirm that the primary responsibility for health maintenance, disease prevention, and medical care resides with the family, as it is defined Biblically (Genesis 2:24; Exodus 20:12, 14; Ephesians 5:226:4).</span></p><span data-dcnode-id="665" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">We deny that optimal health can be achieved without the assumption of this primary responsibility, and that minor children should ever be treated for any medical problem, except in an emergency that is clearly life-threatening, without the consent of one or both parents (Genesis 2:24; Exodus 20:12. 14).</span></p><span data-dcnode-id="662" instrument_node="">
</span><p class="heading2" data-dcnode-id="660"><span data-dcnode-id="661" instrument_node="">8. Mental Health</span></p><span data-dcnode-id="659" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="657"><span data-dcnode-id="658" instrument_node="">We affirm that spiritual regeneration and Biblical obedience are absolutely essential to a Biblical concept of mental health (Ephesians 4:916; II Timothy 1:7; James 1:6-8).</span></p><span data-dcnode-id="656" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">We deny that psychiatrists can promote mental health without evangelism of their unsaved patients and a thorough application of Biblical principles for their Christian patients (Nehemiah 8:10b; Psalm 90:10; I Corinthians 15:1-19; II Corinthians 5:17).</span></p><span data-dcnode-id="653" instrument_node="">
</span><p class="heading2" data-dcnode-id="651"><span data-dcnode-id="652" instrument_node="">9. Longevity</span></p><span data-dcnode-id="650" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">We affirm that increased longevity generally results from obedience to specific Biblical commands (Psalm 90:10; Proverbs 3:7, 8; Ephesians 6:2. 3).</span></p><span data-dcnode-id="647" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">We deny that long life may generally be achieved without obedience to these specific commands (Deuteronomy 28; Romans 6:23a).</span></p><span data-dcnode-id="644" instrument_node="">
</span><p align="center" class="heading1" data-dcnode-id="641"><b data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">DISEASE AND DEATH</span></b></p><span data-dcnode-id="640" instrument_node="">
</span><p class="heading2" data-dcnode-id="638"><span data-dcnode-id="639" instrument_node="">10. Sin And Disease</span></p><span data-dcnode-id="637" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">We affirm that the ultimate cause of all disease, deformity, disability, and death is the sin of Adam and Eve (Genesis 2:17b; Romans 5:12: I Corinthians 15:21, 22).</span></p><span data-dcnode-id="634" instrument_node="">
</span><p class="heading2" data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">11. Death</span></p><span data-dcnode-id="631" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">We affirm that spiritual death is immeasurably worse than physical death (Matthew 10:28b; Revelation 20:14, 15).</span></p><span data-dcnode-id="628" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="626"><span data-dcnode-id="627" instrument_node="">We deny that treatment of the physical body is the highest priority for the health-care worker (Matthew 10:28b; I Timothy 4:8b).</span></p><span data-dcnode-id="625" instrument_node="">
</span><p class="heading2" data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">12. Sins And Disease</span></p><span data-dcnode-id="622" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="620"><span data-dcnode-id="621" instrument_node="">We affirm that medical problems are very frequently caused by personal sins (Proverbs 23:1921, 29-34; I Corinthians 3:17; 1 Corinthians 6:9, 10).</span></p><span data-dcnode-id="619" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">We deny that the presence of disease, deformity, and disability necessarily implies God’s temporal judgment on the person afflicted (lob 2:4-8; John 9:1-3; Acts 3:2).</span></p><span data-dcnode-id="616" instrument_node="">
</span><p align="center" class="heading1" data-dcnode-id="613"><b data-dcnode-id="614"><span data-dcnode-id="615" instrument_node="">HEALTH-CARE WORKERS AND THE PRACTICE OF MEDICINE</span></b></p><span data-dcnode-id="612" instrument_node="">
</span><p class="heading2" data-dcnode-id="610"><span data-dcnode-id="611" instrument_node="">13. Priestly Calling</span></p><span data-dcnode-id="609" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">We affirm that the health-care worker has a priestly calling, because health involves the whole person (Luke 4:18; Hebrews 12:13; 1 Peter 2:9).</span></p><span data-dcnode-id="606" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="598"><span data-dcnode-id="605" instrument_node="">We deny that this high calling allows the health-care worker to neglect other callings of God, such as his spouse and family, worship and work with his local church, and personal Bible study and prayer (Ephesians 5:22-33; Hebrews 10:25; Ephesians 4:11-13; Psalm 1:2; </span><u data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">Matthe</span></u><span data-dcnode-id="602" instrument_node="">w </span><u data-dcnode-id="600"><span data-dcnode-id="601" instrument_node="">6</span></u><span data-dcnode-id="599" instrument_node="">:9-13).</span></p><span data-dcnode-id="597" instrument_node="">
</span><p class="heading2" data-dcnode-id="595"><span data-dcnode-id="596" instrument_node="">14. Role Model</span></p><span data-dcnode-id="594" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="592"><span data-dcnode-id="593" instrument_node="">We affirm that the health-care worker should maintain a lifestyle that is an example of spiritual and physical health (Philippians 3:17; 1 Timothy 3:1-13).</span></p><span data-dcnode-id="591" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="589"><span data-dcnode-id="590" instrument_node="">We deny that the health-care worker is able to fulfill his priestly role without this lifestyle (Philippians 3:17; 1 Timothy 3:1-13).</span></p><span data-dcnode-id="588" instrument_node="">
</span><p class="heading2" data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">15. Sabbath</span></p><span data-dcnode-id="585" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">We affirm that the physician must regularly rest and worship on one day in seven (Exodus 20:8-11).</span></p><span data-dcnode-id="582" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="580"><span data-dcnode-id="581" instrument_node="">We deny that all medical care supersedes the observance of a weekly sabbath rest by healthcare workers (Exodus 20:8-11).</span></p><span data-dcnode-id="579" instrument_node="">
</span><p class="heading2" data-dcnode-id="577"><span data-dcnode-id="578" instrument_node="">16. Wholistic Medicine</span></p><span data-dcnode-id="576" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="574"><span data-dcnode-id="575" instrument_node="">We affirm that health-care workers should provide resources for disease prevention and health maintenance, as well as therapeutic and rehabilitative measures, and demonstrate the interrelatedness of these areas (Luke 10:30-37; 1 Corinthians 6:19, 20; I Timothy 4:8).</span></p><span data-dcnode-id="573" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">We deny that health care can be primarily concerned with therapy and rehabilitation (Luke 10:30-37; I Timothy 4:8).</span></p><span data-dcnode-id="570" instrument_node="">
</span><p class="heading2" data-dcnode-id="568"><span data-dcnode-id="569" instrument_node="">17. Malpractice</span></p><span data-dcnode-id="567" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="565"><span data-dcnode-id="566" instrument_node="">We affirm that untoward effects of diagnostic procedures and of medical treatments should be carefully weighed against their benefits (I Corinthians 3:16, 17; 10:31).</span></p><span data-dcnode-id="564" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">We deny that the current prevalence of malpractice suits results from a Biblical concept of liability (Exodus 21:23-25).</span></p><span data-dcnode-id="561" instrument_node="">
</span><p class="heading2" data-dcnode-id="559"><span data-dcnode-id="560" instrument_node="">18. Competence</span></p><span data-dcnode-id="558" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">We affirm that Christian healthcare workers should achieve and maintain high levels of professional competence (Matthew 5:48; Romans 12:1, 2; II Thessalonians 3:11, 12).</span></p><span data-dcnode-id="555" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">We deny that a health-care worker’s status as a Christian excuses inferior standards of medical care (Matthew 25:14-20; Romans 12:1, -2; II Thessalonians 3:11, 12).</span></p><span data-dcnode-id="552" instrument_node="">
</span><p class="heading2" data-dcnode-id="550"><span data-dcnode-id="551" instrument_node="">19. Health-Care Team</span></p><span data-dcnode-id="549" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="547"><span data-dcnode-id="548" instrument_node="">We affirm that physicians ought to consult nurses, therapists, and other allied health-care workers for information related to patient care decisions (I Corinthians 12:12-31).</span></p><span data-dcnode-id="546" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="544"><span data-dcnode-id="545" instrument_node="">We deny that final decisions can be made by anyone other than the patients and their physicians (Romans 12:4-8; James 5:14-16).</span></p><span data-dcnode-id="543" instrument_node="">
</span><p class="heading2" data-dcnode-id="541"><span data-dcnode-id="542" instrument_node="">20. Broad Care</span></p><span data-dcnode-id="540" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">We affirm that Christians should provide loving care across the entire spectrum of health care, especially where gaps exist in the current system-e.g., terminally ill patients and unwed mothers (Matthew 18:1-6; Luke 4:18; James 1:27).</span></p><span data-dcnode-id="537" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">We deny that the current health-and medical-care systems, even with an increase in government programs, is able to meet these needs (Matthew 26:11; Romans 13:4).</span></p><span data-dcnode-id="534" instrument_node="">
</span><p class="heading2" data-dcnode-id="532"><span data-dcnode-id="533" instrument_node="">21. Spiritual Dimensions Of Illness</span></p><span data-dcnode-id="531" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="529"><span data-dcnode-id="530" instrument_node="">We affinn that the treatment of the spiritual dimension of illness by health-care workers is ethical (Matthew 5:29, 30; 6:25-34; 10:28; 1 Corinthians 13:3).</span></p><span data-dcnode-id="528" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="526"><span data-dcnode-id="527" instrument_node="">We deny that any agencies of civil government or of any other institution have the authority to prevent this dimension of treatment (Matthew 22:21; Acts 5:29; Romans 13:7).</span></p><span data-dcnode-id="525" instrument_node="">
</span><p class="heading2" data-dcnode-id="523"><span data-dcnode-id="524" instrument_node="">22. Economics</span></p><span data-dcnode-id="522" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="520"><span data-dcnode-id="521" instrument_node="">We affirm that the cost of health and medical care should be borne primarily by the family with supplementation by private voluntary insurance, contributions, and the Church according to Biblical design (II Thessalonians 3:10-14; I Timothy 5:8).</span></p><span data-dcnode-id="519" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="517"><span data-dcnode-id="518" instrument_node="">We deny that medical care should be provided by civil government except for disease, disabilities, and injuries directly caused by governmental service (Romans 13:1-5).</span></p><span data-dcnode-id="516" instrument_node="">
</span><p class="heading2" data-dcnode-id="514"><span data-dcnode-id="515" instrument_node="">23. Motivation And Remuneration</span></p><span data-dcnode-id="513" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="511"><span data-dcnode-id="512" instrument_node="">We affirm that the health-care worker should receive payment for his services as determined by the free market (Matthew 10:10b; Luke 10:7; II Thessalonians 3:10; I Timothy 5:18b).</span></p><span data-dcnode-id="510" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="508"><span data-dcnode-id="509" instrument_node="">We deny that the primary motivation of the health-care worker should be financial gain (Titus 1:7; I Peter 5:2).</span></p><span data-dcnode-id="507" instrument_node="">
</span><p class="heading2" data-dcnode-id="505"><span data-dcnode-id="506" instrument_node="">24. Sexuality</span></p><span data-dcnode-id="504" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="502"><span data-dcnode-id="503" instrument_node="">We affirm that according to Biblical design, sexual stimulation and fulfillment should take place only between a man and a woman who are legally married to each other (Genesis 2:24, 25; Exodus 20:14; 1 Timothy 3:12).</span></p><span data-dcnode-id="501" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="499"><span data-dcnode-id="500" instrument_node="">We deny that adultery, fornication, homosexuality, or lesbianism constitute moral behavior in any situation, and that the prescription of birth control methods to unmarried men or women is Biblical (Exodus 20:14; Matthew 5:27, 28; I Corinthians 6:9, 10; I Timothy 1:811). We further deny that homosexuals qualify as a specially protected legal minority and that homosexuality is a civil rights issue.</span></p><span data-dcnode-id="498" instrument_node="">
</span><p class="heading2" data-dcnode-id="496"><span data-dcnode-id="497" instrument_node="">25. Responsibility For Health Education</span></p><span data-dcnode-id="495" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="493"><span data-dcnode-id="494" instrument_node="">We affirm that the primary responsibility for health education resides in the family, the Church, and the health-care community.</span></p><span data-dcnode-id="492" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="490"><span data-dcnode-id="491" instrument_node="">We deny that health education should be provided by civil government, because governmental involvement in health education has generally proved to be pernicious, immoral, and anti-Biblical.</span></p><span data-dcnode-id="489" instrument_node="">
</span><p class="heading2" data-dcnode-id="487"><span data-dcnode-id="488" instrument_node="">26. Quarantine Of Communicable Diseases</span></p><span data-dcnode-id="486" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="484"><span data-dcnode-id="485" instrument_node="">We affirm that AIDS (Acquired Immuno-Deficiency Syndrome) should be quarantined in a manner similar to other communicable diseases such as tuberculosis and typhoid fever.</span></p><span data-dcnode-id="483" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="481"><span data-dcnode-id="482" instrument_node="">We deny that AIDS qualifies as a handicap that should be given special status and remuneration.</span></p><span data-dcnode-id="480" instrument_node="">
</span><p class="heading2" data-dcnode-id="478"><span data-dcnode-id="479" instrument_node="">27. Community</span></p><span data-dcnode-id="477" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="475"><span data-dcnode-id="476" instrument_node="">We affirm that Christians should have other Christians for their physicians (when they are available) because medicine is a priestly calling (I Corinthians 6:1-8; James 5:14-16).</span></p><span data-dcnode-id="474" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="472"><span data-dcnode-id="473" instrument_node="">We deny that medicine and the Church are unrelated fields of service (I Corinthians 6:1-8; James 5:14-16).</span></p><span data-dcnode-id="471" instrument_node="">
</span><p class="heading2" data-dcnode-id="469"><span data-dcnode-id="470" instrument_node="">28. Priority</span></p><span data-dcnode-id="468" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="466"><span data-dcnode-id="467" instrument_node="">We affirm that health and medical care should be available to all people within the capacities of a free market to provide them and the consumer to pay for them (Matthew 25:32-46; Luke 4:18, 19).</span></p><span data-dcnode-id="465" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="463"><span data-dcnode-id="464" instrument_node="">We deny that such care is an unlimited right that may be promoted to the detriment of other social responsibilities (Matthew 4:4; I Timothy 4:8; II Thessalonians 3:10).</span></p><span data-dcnode-id="462" instrument_node="">
</span><p align="center" class="heading1" data-dcnode-id="459"><b data-dcnode-id="460"><span data-dcnode-id="461" instrument_node="">HEALING</span></b></p><span data-dcnode-id="458" instrument_node="">
</span><p class="heading2" data-dcnode-id="456"><span data-dcnode-id="457" instrument_node="">29. Healing Process</span></p><span data-dcnode-id="455" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="453"><span data-dcnode-id="454" instrument_node="">We affirm that healing may occur through the body’s natural processes, God’s supernatural act, or demonic forces, concurrent with or entirely separate from standard medical intervention (Matthew 7:21-23; Luke 10:34; I Thessalonians 2:9, 10; I Timothy 5:23; James 5:14-16).</span></p><span data-dcnode-id="452" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="450"><span data-dcnode-id="451" instrument_node="">We deny that miraculous healing is limited to any particular time in history (James 5:14-16).</span></p><span data-dcnode-id="449" instrument_node="">
</span><p class="heading2" data-dcnode-id="447"><span data-dcnode-id="448" instrument_node="">30. Presence Of Disease</span></p><span data-dcnode-id="446" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="444"><span data-dcnode-id="445" instrument_node="">We affirm that God allows some Christians to experience acute and chronic disease, disability, or deformity (Job 2:4,8; John 9:1-3; Hebrews 12:5-11; I Peter 1:6, 7).</span></p><span data-dcnode-id="443" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="441"><span data-dcnode-id="442" instrument_node="">We deny that any absence of healing is necessarily due to a personal sin or a lack of prayer, faith, or spiritual maturity (II Corinthians 12:8, 9; Philippians 2:27; I Timothy 5:23).</span></p><span data-dcnode-id="440" instrument_node="">
</span><p align="center" data-dcnode-id="437"><b data-dcnode-id="438"><span data-dcnode-id="439" instrument_node="">METHODOLOGY FOR ETHICAL DECISIONS</span></b></p><span data-dcnode-id="436" instrument_node="">
</span><p class="heading2" data-dcnode-id="434"><span data-dcnode-id="435" instrument_node="">31. The Situation</span></p><span data-dcnode-id="433" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="431"><span data-dcnode-id="432" instrument_node="">We affirm that within the world view structured by Biblical principles, the patient’s situation points to those principles that govern the actions of health-care workers (Matthew 18:25-27; John 8:10, 11; 9:1-3).</span></p><span data-dcnode-id="430" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="428"><span data-dcnode-id="429" instrument_node="">We deny that the situation without this Biblical structure, that is, “situation ethics,” determines the ethical decision (Matthew 5:17-20: John 14:15, 21; Romans 13:10; 1 Corinthians 13:1-3).</span></p><span data-dcnode-id="427" instrument_node="">
</span><p class="heading2" data-dcnode-id="425"><span data-dcnode-id="426" instrument_node="">32. Motives</span></p><span data-dcnode-id="424" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="422"><span data-dcnode-id="423" instrument_node="">We affirm that personal motive, in addition to behavior, determines whether an act is ethical or unethical (I Samuel 16:7; Psalm 139:23, 24; Matthew 5:27, 28; Hebrews 4:12).</span></p><span data-dcnode-id="421" instrument_node="">
</span><p class="heading2" data-dcnode-id="419"><span data-dcnode-id="420" instrument_node="">33. Truth-Telling</span></p><span data-dcnode-id="418" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="416"><span data-dcnode-id="417" instrument_node="">We affirm that the Ninth Commandment requires a physician always to tell the truth to his patients (Exodus 20:16).</span></p><span data-dcnode-id="415" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="413"><span data-dcnode-id="414" instrument_node="">We deny that lying promotes the health of patients and necessary relationships within their families (Exodus 20:16).</span></p><span data-dcnode-id="412" instrument_node="">
</span><p class="heading2" data-dcnode-id="410"><span data-dcnode-id="411" instrument_node="">34. Confidentiality</span></p><span data-dcnode-id="409" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="407"><span data-dcnode-id="408" instrument_node="">We affirm that Biblical authority within the family and the welfare of others in society may supersede the confidentiality of the physician’s relations with individual patients, and that confidentiality should be strictly guarded when it does not conflict with other Biblical principles (Genesis 2:24, 25; Ephesians 6:1-3; I Peter 3:7; Matthew 18:15-17; I Corinthians 5:113).</span></p><span data-dcnode-id="406" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="404"><span data-dcnode-id="405" instrument_node="">We deny that confidentiality of individual patients is an absolute requirement for health-care workers (Matthew 18:15-17; I Corinthians 5:113).</span></p><span data-dcnode-id="403" instrument_node="">
</span><p align="center" class="heading1" data-dcnode-id="400"><b data-dcnode-id="401"><span data-dcnode-id="402" instrument_node="">ISSUES AT THE BEGINNING OF LIFE</span></b></p><span data-dcnode-id="399" instrument_node="">
</span><p class="heading2" data-dcnode-id="397"><span data-dcnode-id="398" instrument_node="">35. Beginning Of Human Life</span></p><span data-dcnode-id="396" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="392"><span data-dcnode-id="395" instrument_node="">We affirm that individual human life begins with the fertilization of the human egg with the human sperm (Genesis 4:1; Numbers 11:12; Psalm </span><u data-dcnode-id="393"><span data-dcnode-id="394" instrument_node="">51:5).</span></u></p><span data-dcnode-id="391" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="389"><span data-dcnode-id="390" instrument_node="">We deny that the embryo conceived by this process must meet any other criteria to attain the full ethical and legal status of a person (Psalm 51:5; Matthew 18:8-10).</span></p><span data-dcnode-id="388" instrument_node="">
</span><p class="heading2" data-dcnode-id="386"><span data-dcnode-id="387" instrument_node="">36. Abortion</span></p><span data-dcnode-id="385" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="383"><span data-dcnode-id="384" instrument_node="">We affirm that induced abortion is murder except to save the physical life of the mother, and that participation at any level is sin (Exodus 20:13; 23:22-25; Psalm 51:5; 139:13-15; Jeremiah 1:5).</span></p><span data-dcnode-id="382" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="380"><span data-dcnode-id="381" instrument_node="">We deny that the choice of the mother takes precedence over the life of the unborn child, and that detection of abnormalities or defects in the unborn child is grounds for induced abortion (Exodus 20:13; Psalm 139:13-15).</span></p><span data-dcnode-id="379" instrument_node="">
</span><p class="heading2" data-dcnode-id="377"><span data-dcnode-id="378" instrument_node="">37. Infanticide</span></p><span data-dcnode-id="376" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="374"><span data-dcnode-id="375" instrument_node="">We affirm that infanticide, either by deliberate action or by inaction, is murder (Exodus 20:13).</span></p><span data-dcnode-id="373" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="371"><span data-dcnode-id="372" instrument_node="">We deny that the best interests of the family in particular or society in general are improved by infanticide (Matthew 18:1-10).</span></p><span data-dcnode-id="370" instrument_node="">
</span><p class="heading2" data-dcnode-id="368"><span data-dcnode-id="369" instrument_node="">38. Intrauterine Intervention</span></p><span data-dcnode-id="367" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="365"><span data-dcnode-id="366" instrument_node="">We affirm that intervention with an unborn child at any stage after conception should be permitted only to correct clearly defined physical disease or deformity when sufficient evidence exists that the potential benefit to the child clearly outweighs any harmful effects or the possibility of death (Psalm 139:13-16; I Corinthians 6:19, 20).</span></p><span data-dcnode-id="364" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="362"><span data-dcnode-id="363" instrument_node="">We deny that the unborn child should receive medical treatment that is any less careful or necessary than that provided to any human being (Genesis 4:1; Psalm 51:5).</span></p><span data-dcnode-id="361" instrument_node="">
</span><p class="heading2" data-dcnode-id="359"><span data-dcnode-id="360" instrument_node="">39. Genetic Engineering</span></p><span data-dcnode-id="358" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="356"><span data-dcnode-id="357" instrument_node="">We affirm that alterations of human genes before or after birth should be strictly limited to the correction of clearly defined disease or deformity when sufficient evidence exists that the potential benefit to the person clearly outweighs any harmful effects or the possibility of death (Genesis 4:1; Psalm 51:5).</span></p><span data-dcnode-id="355" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="353"><span data-dcnode-id="354" instrument_node="">We deny that man has the wisdom to change human genes except to correct clearly defined physical disease or deformity (Psalm 139:1316; Luke 4:40; James 5:14-16).</span></p><span data-dcnode-id="352" instrument_node="">
</span><p class="heading2" data-dcnode-id="350"><span data-dcnode-id="351" instrument_node="">40. Fertilization</span></p><span data-dcnode-id="349" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="347"><span data-dcnode-id="348" instrument_node="">We affirm that fertilization of the wife’s egg by her husband’s sperm is the Biblical pattern of reproduction (Genesis 2:24; Matthew 19:4-6).</span></p><span data-dcnode-id="346" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="344"><span data-dcnode-id="345" instrument_node="">We deny that the fertilization of the egg of a woman with the sperm of a man who is not her husband is Biblical (Genesis 17:19-21; 38:24).</span></p><span data-dcnode-id="343" instrument_node="">
</span><p class="heading2" data-dcnode-id="341"><span data-dcnode-id="342" instrument_node="">41. In Vitro Fertilization/Surrogate Mothers</span></p><span data-dcnode-id="340" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="338"><span data-dcnode-id="339" instrument_node="">We affirm that the Biblical location for conception and development of an embryo or fetus is its biological mother (Deuteronomy 6:4-9; Ephesians 6:4).</span></p><span data-dcnode-id="337" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="335"><span data-dcnode-id="336" instrument_node="">We deny that the conception and development of an embryo and fetus should take place within any in vivo or in vitro location other than its biological mother except possibly for the few hours needed for in vitro fertilization and the growth of the embryos) to the stage that allow for its (their) transfer (Deuteronomy 6:49; Ephesians 6:4).</span></p><span data-dcnode-id="334" instrument_node="">
</span><p class="heading1" data-dcnode-id="332"><span data-dcnode-id="333" instrument_node="">ISSUES AT THE END OF LIFE</span></p><span data-dcnode-id="331" instrument_node="">
</span><p class="heading2" data-dcnode-id="329"><span data-dcnode-id="330" instrument_node="">42. Euthanasia</span></p><span data-dcnode-id="328" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="326"><span data-dcnode-id="327" instrument_node="">We affirm that euthanasia, either by deliberate action or by inaction, is murder (Exodus 20:13).</span></p><span data-dcnode-id="325" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="323"><span data-dcnode-id="324" instrument_node="">We deny that intervention in the disease process of a terminally ill patient is always the ethical course of action (II Corinthians 5:1-9; Philippians 1:21).</span></p><span data-dcnode-id="322" instrument_node="">
</span><p class="heading2" data-dcnode-id="320"><span data-dcnode-id="321" instrument_node="">43. Treatment Of The Terminally Ill</span></p><span data-dcnode-id="319" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="317"><span data-dcnode-id="318" instrument_node="">We affirm that only the patient’s physician, in consultation with other health-care workers, the patient, and the patient’s family, is able to assess ethical treatment or non-treatment of the terminally ill (James 5:14-16).</span></p><span data-dcnode-id="316" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="314"><span data-dcnode-id="315" instrument_node="">We deny that living wills simplify these decisions (James 4:13-17; 5:1416).</span></p><span data-dcnode-id="313" instrument_node="">
</span><p class="heading2" data-dcnode-id="311"><span data-dcnode-id="312" instrument_node="">44. Right To Die/Death With Dignity</span></p><span data-dcnode-id="310" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="308"><span data-dcnode-id="309" instrument_node="">We affirm that all men and women will inevitably die (except Christians who are raptured at the Second Coming of Christ) because of the sin of Adam and Eve (Genesis 2:17b; 3:19b; I Thessalonians 4:17; Hebrews 9:27).</span></p><span data-dcnode-id="307" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="305"><span data-dcnode-id="306" instrument_node="">We deny that anyone has the “right to die” by any means or for any reason, and that “death with dignity” is compatible with a Biblical understanding of death and sin (Exodus 20:13; Ecclesiastes 8:8; Romans 14:7, 8; 1 Corinthians 6:19, 20; 15:56), except that it is honorable and loving for a man to lay down his life in voluntary sacrifice for another (John 15:13).</span></p><span data-dcnode-id="304" instrument_node="">
</span><p class="heading2" data-dcnode-id="302"><span data-dcnode-id="303" instrument_node="">45. Sustenance For The Terminally Ill</span></p><span data-dcnode-id="301" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="299"><span data-dcnode-id="300" instrument_node="">We affirm that the image of God in all patients and the love that Jesus Christ calls us to give to all people determine the quality of care and comfort of the terminally ill (Genesis 1:26, 27; Matthew 25:32-t6).</span></p><span data-dcnode-id="298" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="296"><span data-dcnode-id="297" instrument_node="">We deny that water, food, and air should ever be withheld from patients, or that they have the right to refuse these basics of life, when their medical conditions allow these substances to be taken by natural routes</span></p><span data-dcnode-id="295" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="293"><span data-dcnode-id="294" instrument_node="">(Exodus 20:3; Matthew 25:32-46; I Corinthians 6:19, 20).</span></p><span data-dcnode-id="292" instrument_node="">
</span><p class="heading2" data-dcnode-id="290"><span data-dcnode-id="291" instrument_node="">46. Evangelism</span></p><span data-dcnode-id="289" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="287"><span data-dcnode-id="288" instrument_node="">We affirm that the unsaved status of a patient may indicate measures that would not usually be implemented with a believer, in order to gain additional time for evangelism (Acts 4:12; Hebrews 9:27; Revelation 20:14, 15).</span></p><span data-dcnode-id="286" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="284"><span data-dcnode-id="285" instrument_node="">We deny that the medical condition of the patient is the only relevant issue in terminally ill patients (Acts 4:12; Hebrews 9:27; Revelation 20:14, 15).</span></p><span data-dcnode-id="283" instrument_node="">
</span><p class="heading2" data-dcnode-id="281"><span data-dcnode-id="282" instrument_node="">47. Suicide</span></p><span data-dcnode-id="280" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="278"><span data-dcnode-id="279" instrument_node="">We affirm that suicide is a violation of the Sixth Commandment (Exodus 20:13).</span></p><span data-dcnode-id="277" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="275"><span data-dcnode-id="276" instrument_node="">We deny that suicide is a Biblical solution to any life situation (John 10:10; I Corinthians 10:13; Philippians 4:19).</span></p><span data-dcnode-id="274" instrument_node="">
</span><p class="heading2" data-dcnode-id="272"><span data-dcnode-id="273" instrument_node="">48. Organ Transplantation</span></p><span data-dcnode-id="271" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="269"><span data-dcnode-id="270" instrument_node="">We affirm that transplantation of human organs is ethical when Biblical standards govern the treatment of both donor and recipient through deliberate peer review (Matthew 19:12; John 9:1-3; Acts 3:1, 2), and that the premature pronouncement of a patient’s death in order to obtain his donor organs is murder (Exodus 20:13; I Corinthians 13:3).</span></p><span data-dcnode-id="268" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="266"><span data-dcnode-id="267" instrument_node="">We deny that transplantation of organs violates the sanctity of the human body.</span></p><span data-dcnode-id="265" instrument_node="">
</span><p align="center" class="heading1" data-dcnode-id="262"><b data-dcnode-id="263"><span data-dcnode-id="264" instrument_node="">DRUGS AND DRUG ABUSE</span></b></p><span data-dcnode-id="261" instrument_node="">
</span><p class="heading2" data-dcnode-id="259"><span data-dcnode-id="260" instrument_node="">49. Therapeutic Drugs</span></p><span data-dcnode-id="258" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="256"><span data-dcnode-id="257" instrument_node="">We affirm that drugs may be used under the proper supervision of health-care workers in diagnosis and treatment (Luke 10:34; I Timothy 5:23; James 5:14b).</span></p><span data-dcnode-id="255" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="253"><span data-dcnode-id="254" instrument_node="">We deny that drugs are necessary or sufficient in the diagnosis and treatment of all medical conditions (Luke 12:22-34; John 4:32-34; Romans 14:17; I Timothy 4:7, 8).</span></p><span data-dcnode-id="252" instrument_node="">
</span><p class="heading2" data-dcnode-id="250"><span data-dcnode-id="251" instrument_node="">50. Psychotropic Drugs</span></p><span data-dcnode-id="249" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="247"><span data-dcnode-id="248" instrument_node="">We affirm that health-care workers should work to prevent drug abuse and dependency with patients who require drugs that affect the mind or senses (Proverbs 20:1; 23:29-35; Ephesians 5:18; I Peter 4:4).</span></p><span data-dcnode-id="246" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="244"><span data-dcnode-id="245" instrument_node="">We deny that medical care should be administered on the basis of chemical determinism as the only explanation of disordered states of the mind or senses (Genesis 1:26-28; I Samuel 21:13-15).</span></p><span data-dcnode-id="243" instrument_node="">
</span><p class="heading2" data-dcnode-id="241"><span data-dcnode-id="242" instrument_node="">51. Substance Abuse</span></p><span data-dcnode-id="240" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="238"><span data-dcnode-id="239" instrument_node="">We affirm that abuse of such substances as drugs and alcohol involves physical disease, spiritual bondage, and distorted personal relationships (Proverbs 23:29-35; Ephesians 5:18; Genesis 9:20-23; 19:30-38).</span></p><span data-dcnode-id="237" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="235"><span data-dcnode-id="236" instrument_node="">We deny that the treatment of substance abuse can rightly exclude ministry to the whole person (Romans 12:3; Ephesians 5:18; II Timothy 1:7).</span></p><span data-dcnode-id="234" instrument_node="">
</span><p align="center" class="heading1" data-dcnode-id="231"><b data-dcnode-id="232"><span data-dcnode-id="233" instrument_node="">NEW AGE MEDICINE</span></b></p><span data-dcnode-id="230" instrument_node="">
</span><p class="heading2" data-dcnode-id="228"><span data-dcnode-id="229" instrument_node="">52. Psychic Modalities</span></p><span data-dcnode-id="227" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="225"><span data-dcnode-id="226" instrument_node="">We affirm that the use of any psychic or supernatural means in diagnosis or healing, other than prayer to God according to Biblical instructions, is a dangerous exposure to occult and Satanic powers (Deuteronomy 18:10-12; Isaiah 8:19; Matthew 24:24; Revelation 9:21; 21:8).</span></p><span data-dcnode-id="224" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="222"><span data-dcnode-id="223" instrument_node="">We deny that psychic abilities, spiritism, divination, life energies, and other paranormal processes promote health or otherwise have any ethical or scientific basis in the practice of medicine (Deuteronomy 18:1012; Isaiah 8:19; Matthew 24:24; Revelation 9:21; 21:8).</span></p><span data-dcnode-id="221" instrument_node="">
</span><p class="heading2" data-dcnode-id="219"><span data-dcnode-id="220" instrument_node="">53. Meditation</span></p><span data-dcnode-id="218" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="216"><span data-dcnode-id="217" instrument_node="">We affirm that conscious, rational meditation on God’s attributes and Biblical content is a necessary dimension of health (Joshua 1:8; Psalm 1:2; 19:7; 119:50).</span></p><span data-dcnode-id="215" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="213"><span data-dcnode-id="214" instrument_node="">We deny that meditation or drugs that derange normal thought patterns or states of consciousness promote health in any way (Galatians 5:23; Ephesians 5:18, II Timothy 1:7).</span></p><span data-dcnode-id="212" instrument_node="">
</span><p align="center" class="heading1" data-dcnode-id="209"><b data-dcnode-id="210"><span data-dcnode-id="211" instrument_node="">A CALL TO ACTION IN MEDICINE GENERAL ACTIONS </span></b></p><span data-dcnode-id="208" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="206"><span data-dcnode-id="207" instrument_node="">Because of the preceding convictions, we call upon all men and women who name Christ as their personal Savior and Lord to join us in:</span></p><span data-dcnode-id="205" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="203"><span data-dcnode-id="204" instrument_node="">1. examining earnestly these affirmations and denials in the light of God’s Word to see if they are true, and informing us directly of those points in which they believe we have departed from Scripture or logic;</span></p><span data-dcnode-id="202" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="197"><span data-dcnode-id="201" instrument_node="">2. re-ex</span><u data-dcnode-id="199"><span data-dcnode-id="200" instrument_node="">amini</span></u><span data-dcnode-id="198" instrument_node="">ng our own medical theories and practices and asking God to show us where we are falling short;</span></p><span data-dcnode-id="196" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="194"><span data-dcnode-id="195" instrument_node="">3. repenting of all known sins, confessing and forsaking them, asking forgiveness both of God Himself and of all those who have been offended, and then making all possible restitution;</span></p><span data-dcnode-id="193" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="191"><span data-dcnode-id="192" instrument_node="">4. preparing for God to fill all of His people with the enabling power of the Holy Spirit in order that we may bring our personal lives and our medical theories and practice into closer conformity to His revealed will on a permanent and consistent basis;</span></p><span data-dcnode-id="190" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="188"><span data-dcnode-id="189" instrument_node="">5. seeking guidance from our brethren and local church authorities as to how we can mutually support and influence one another to make our medical practices glorifying to God;</span></p><span data-dcnode-id="187" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="185"><span data-dcnode-id="186" instrument_node="">6. seeking a balance of time committed to all areas in which we are called as Christians, especially to regular, systematic Bible study.</span></p><span data-dcnode-id="184" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="182"><span data-dcnode-id="183" instrument_node="">Having dealt with our own personal sins and failures, and placing ourselves accountable to the Bible and to the brethren, we now commit ourselves to:</span></p><span data-dcnode-id="181" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="179"><span data-dcnode-id="180" instrument_node="">1 conversing with all health-care workers and other Christians with the goal of discerning, clarifying, and implementing a Biblical practice of medicine;</span></p><span data-dcnode-id="178" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="176"><span data-dcnode-id="177" instrument_node="">2. influencing any known Christians or Christian associations with whom we work to consider seriously our affirmations and denials with the goal of enlisting their responses;</span></p><span data-dcnode-id="175" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="173"><span data-dcnode-id="174" instrument_node="">3. influencing those in the field of medicine who agree with our affirmations and denials to implement these proposals in their work;</span></p><span data-dcnode-id="172" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="170"><span data-dcnode-id="171" instrument_node="">4. mobilizing and networking our Christian resources and working in concert with the other professional spheres both inside and outside COR, to see the behavior of the Body of Christ and our nation change to approximate more closely the view of reality and morality presented to us in the Holy Scriptures.</span></p><span data-dcnode-id="169" instrument_node="">
</span><p align="center" class="heading1" data-dcnode-id="166"><b data-dcnode-id="167"><span data-dcnode-id="168" instrument_node="">SPECIFIC ACTIONS</span></b></p><span data-dcnode-id="165" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="163"><span data-dcnode-id="164" instrument_node="">To these ends, we commit ourselves to the following specific actions:</span></p><span data-dcnode-id="162" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="160"><span data-dcnode-id="161" instrument_node="">1. All Christian health-care workers must join the fight against abortion. According to their situations and opportunities, individuals and groups should be involved in definite acts of activism against abortion. These efforts may be separate from or, preferably, in conjunction with Christians in other disciplines and with those pro-life groups (e.g., Christian Action Council and Birth-Right) that already have programs and strategies.</span></p><span data-dcnode-id="159" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="157"><span data-dcnode-id="158" instrument_node="">Health-care professionals should help pastors of Bible-believing churches to shut down all legalized abortions in their counties by employing the “Puget Sound Plan,” which stopped all abortions in one Washington State county within 30 days. The plan works as follows:</span></p><span data-dcnode-id="156" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="154"><span data-dcnode-id="155" instrument_node="">1.1. Two letters are written back-to-back on a single sheet of paper (see model available from the Coalition on Revival, 89 Pioneer Way, Mountain View, California, 94041, or from the National Association of Christian Educators, P.O. Box 3200, Costa Mesa, California, 92628). One letter is from the pastor to his congregation, explaining the Biblical reasons why abortion is clearly murder and should be stopped by God-honoring people. The other is a form letter from Christian families to their family doctors kindly but family explaining that, if their doctors perform abortions or refer for abortions, they will immediately find new family doctors who do not. If a doctor’s name appears on the list of doctors in that county who perform or refer for abortions, the letter tells him that if he wants to continue being their family doctor, they insist that he place his name in the local newspaper with a growing list of other doctors in the town or county who are publicly claiming they will no longer perform or refer for abortions. The power of this plan is that only doctors may legally perform abortions, and that most family practice doctors would lose much more than they would gain financially by not complying with such a demand.</span></p><span data-dcnode-id="153" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="151"><span data-dcnode-id="152" instrument_node="">1.2. The plan calls for pastors on a given Sunday to pass out the back-to-back letter to all people in their congregations and urge them to send the letter to their family doctor in the following two weeks (or go personally and read it to him), and to follow up with a phone call asking for his decision.</span></p><span data-dcnode-id="150" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="148"><span data-dcnode-id="149" instrument_node="">1.3 One person must see that the list of abortion doctors is obtained and that arrangements are made for a jointly funded newspaper ad.</span></p><span data-dcnode-id="147" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="145"><span data-dcnode-id="146" instrument_node="">2. Regular publications and seminars that teach Christians how to be proper stewards of their bodies should be promoted at regional and local areas. Christians need better health to have more energy, tolerate more stress, become depressed less often, and be more creative than our non-Christian counterparts for the advancement of God’s Kingdom. Specific topics that should be addressed include weight loss, nutrition, exercise, sabbath-breaking, sleep, recreation, tranquilizers, alcohol, caffeine and other stimulants, tobacco, bulimia, lack of forgiveness, lack of personal integrity, and disobedience to God’s laws 7. in general.</span></p><span data-dcnode-id="144" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="142"><span data-dcnode-id="143" instrument_node="">3. The economics of medicine must be re-structured according to Biblical economic principles in which the patient is responsible for the payment of medical care for himself and his family. This plan would eventually eliminate all levels of civil government from medical payments except for those problems that result directly from public or military service. Extreme care should be taken to make this transition with as little disruption to good medical care as possible. Physicians are called upon to be more cost conscious and to seek to create less costly alternatives to present practices without significantly changing their standard of care.</span></p><span data-dcnode-id="141" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="139"><span data-dcnode-id="140" instrument_node="">4. A formal dialogue should be established among Christian health-care professionals in which Christians who use God’s supernatural power to bring about miraculous healings and the casting out of demons related to physical illness can discuss this issue peacefully with those Christians who do not use these means or who believe they are not valid.</span></p><span data-dcnode-id="138" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="136"><span data-dcnode-id="137" instrument_node="">5. A coordinated, national warning needs to go out to all Christians about the spiritual and physical dangers of participating as either doctors or patients in psychic, New Age medicine.</span></p><span data-dcnode-id="135" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="133"><span data-dcnode-id="134" instrument_node="">6. A group of traditional doctors needs to dialogue together with non-traditional practitioners to examine the credibility of such non-traditional health-care methods and treatments as chiropractic, combining diets, herbal cures, laetrile, and colonics, so that these treatments may be examined first-hand to determine their scientific medical value.</span></p><span data-dcnode-id="132" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="130"><span data-dcnode-id="131" instrument_node="">7. The national and regional cochairmen of the medical sphere of The Coalition on Revival should plan seminars to teach these Affirmations and Denials and the thoughts upon which they are based at the regional and local levels.</span></p><span data-dcnode-id="129" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="127"><span data-dcnode-id="128" instrument_node="">8. Letters-to-the-editor in medical publications are a simple method of expressing one’s ideas to a national audience. A very high percentage of these are published when they are reasonably written. Such letters are more likely to be published if they are not explicitly Biblical, even though they may be quite conservative in their content.</span></p><span data-dcnode-id="126" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="124"><span data-dcnode-id="125" instrument_node="">9. Attempts must be made to teach Christians who are psychiatrists where their “therapy” fails to conform to the Bible. This effort may be made on a personal basis, through seminars, or in publications. The COR Affirmations and Denials for Psychology and Counseling contain these basics and could be used in this manner.</span></p><span data-dcnode-id="123" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="121"><span data-dcnode-id="122" instrument_node="">10. Private practitioners should consider “donating” 10 percent of their time to the care of indigent patients, if they are not already doing so.</span></p><span data-dcnode-id="120" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="118"><span data-dcnode-id="119" instrument_node="">11. Opportunities must be sought to demonstrate that medical ethics are not discerned without a discussion of values, and that on that basis, the Bible is more concrete with a stronger tradition and larger following than any other source of values.</span></p><span data-dcnode-id="117" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="115"><span data-dcnode-id="116" instrument_node="">12. Those health-care workers who believe that they have the gift of discernment must somehow find time to study more, to write and speak, and to consider attending seminary or being discipled by someone who is more mature in the faith, in order to expand their influence among other Christians. This need may be the most critical to the transformation of medicine toward the Biblical ideal.</span></p><span data-dcnode-id="114" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="112"><span data-dcnode-id="113" instrument_node="">13. Publications, such as journals and newsletters, must be begun on a national level in which serious Biblical arguments concerning medical practice can be presented and readers can respond. Groups involved in this area should dialogue with each other and, where there is significant agreement, combine resources or in other ways support what the others are doing.</span></p><span data-dcnode-id="111" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="109"><span data-dcnode-id="110" instrument_node="">14. Some Christians will need to decrease their patient loads and/or working hours to become more balanced in all the responsibilities to which God calls us. One’s spouse is the best person to judge whether this situation exists.</span></p><span data-dcnode-id="108" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="106"><span data-dcnode-id="107" instrument_node="">15. Efforts at the state level must be made to repeal the laws that allow minor teenage women to have abortions, to be treated without parental consent for sexually transmitted diseases, and to have contraceptives prescribed. In the meantime, Christian health-care workers can (with the kindness and mercy of Jesus Christ) refuse to treat these women in this way.</span></p><span data-dcnode-id="105" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="103"><span data-dcnode-id="104" instrument_node="">16. Every opportunity must be taken to oppose the “right to die” (including suicide), living wills, and euthanasia before greater momentum can be generated for the legislation of these concepts into law.</span></p><span data-dcnode-id="102" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="100"><span data-dcnode-id="101" instrument_node="">17. Physicians should restrict their prescriptions to drugs that are clearly effective. In particular, the use of minor tranquilizers and psychotropic drugs must be reduced, and in many cases eliminated, when they are prescribed primarily to reduce stress instead of to solve underlying problems.</span></p><span data-dcnode-id="99" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="97"><span data-dcnode-id="98" instrument_node="">18. Christian medical organizations and institutions such as Oral Roberts University and the Christian Medical Society should make a concerted effort to study these Affirmations and Denials to determine where they stand in regard to them in their practice and teaching.</span></p><span data-dcnode-id="96" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="94"><span data-dcnode-id="95" instrument_node="">19. “Alternative” sexual practices, both homosexual and heterosexual, as a moral choice between “consenting adults,” must be opposed at every level. They should not be condoned by psychiatrists and others in medicine as if they did not have serious physical and spiritual consequences. Divorce, as a solution to any problem other than adultery and desertion, must never be presented as an option for believers or unbelievers in “psychotherapy” or any other type of counseling by health-care workers.</span></p><span data-dcnode-id="93" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="91"><span data-dcnode-id="92" instrument_node="">20. Physicians should exercise their special opportunity to evangelize their patients, because salvation is the most pressing need for their health.</span></p><span data-dcnode-id="90" instrument_node="">
</span><p class="bodyParagraph" data-dcnode-id="88"><span data-dcnode-id="89" instrument_node="">21. In addition, simple-to-understand pamphlets need to be written to explain how bodily symptoms can be manifestations of spiritual problems, thus directing patients to Biblical solutions: first salvation, then obedience.</span></p><span data-dcnode-id="87" instrument_node="">
[ </span><a data-dcnode-id="85" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//bmei.org/jbem/"><span data-dcnode-id="86" instrument_node="">JBEM Index</span></a><span data-dcnode-id="84" instrument_node=""> / </span><a data-dcnode-id="82" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//bmei.org/jbem-volume-9/"><span data-dcnode-id="83" instrument_node="">Volume 9</span></a><span data-dcnode-id="81" instrument_node=""> / </span><a data-dcnode-id="79" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//bmei.org/volume-1-number-2/"><span data-dcnode-id="80" instrument_node="">Number 2</span></a><span data-dcnode-id="78" instrument_node=""> ]
