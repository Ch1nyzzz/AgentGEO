</span><h3 class="fl-heading" data-dcnode-id="1621"><span data-dcnode-id="1625" instrument_node="">
</span><span class="fl-heading-text" data-dcnode-id="1623"><span data-dcnode-id="1624" instrument_node="">The Ethics of the SARS-CoV-2 Vaccines Revisited</span></span><span data-dcnode-id="1622" instrument_node="">
</span></h3><span data-dcnode-id="1620" instrument_node="">
</span></div><span data-dcnode-id="1618" instrument_node="">
</span></div><span data-dcnode-id="1616" instrument_node="">
</span><div class="fl-module fl-module-heading fl-node-5bd0bdf039920" data-dcnode-id="1605" data-node="5bd0bdf039920"><span data-dcnode-id="1615" instrument_node="">
</span><div class="fl-module-content fl-node-content" data-dcnode-id="1607"><span data-dcnode-id="1614" instrument_node="">
</span><h6 class="fl-heading" data-dcnode-id="1609"><span data-dcnode-id="1613" instrument_node="">
</span><span class="fl-heading-text" data-dcnode-id="1611"><span data-dcnode-id="1612" instrument_node="">September 15, 2021</span></span><span data-dcnode-id="1610" instrument_node="">
</span></h6><span data-dcnode-id="1608" instrument_node="">
</span></div><span data-dcnode-id="1606" instrument_node="">
</span></div><span data-dcnode-id="1604" instrument_node="">
</span><div class="fl-module fl-module-photo fl-node-5bd0b74b4672d fl-animation fl-fade-left fl-animated" data-animation-delay="0.0" data-dcnode-id="1591" data-node="5bd0b74b4672d"><span data-dcnode-id="1603" instrument_node="">
</span><div class="fl-module-content fl-node-content" data-dcnode-id="1593"><span data-dcnode-id="1602" instrument_node="">
</span><div class="fl-photo fl-photo-align-left" data-dcnode-id="1595" itemscope="" itemtype="https://schema.org/ImageObject"><span data-dcnode-id="1601" instrument_node="">
</span><div class="fl-photo-content fl-photo-img-png" data-dcnode-id="1597"><span data-dcnode-id="1600" instrument_node="">
</span><img alt="04072020POINTBLOG" class="fl-photo-img wp-image-12565 size-full no-lazyload" data-dcnode-id="1599" height="400" itemprop="image" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cmda.org/wp-content/uploads/2020/04/04072020POINTBLOG.png&amp;raw" title="04072020POINTBLOG" width="800"><span data-dcnode-id="1598" instrument_node="">
</span></div><span data-dcnode-id="1596" instrument_node="">
</span></div><span data-dcnode-id="1594" instrument_node="">
</span></div><span data-dcnode-id="1592" instrument_node="">
</span></div><span data-dcnode-id="1590" instrument_node="">
</span><div class="fl-module fl-module-rich-text fl-node-5bd0c0e118acc" data-dcnode-id="1578" data-node="5bd0c0e118acc"><span data-dcnode-id="1589" instrument_node="">
</span><div class="fl-module-content fl-node-content" data-dcnode-id="1580"><span data-dcnode-id="1588" instrument_node="">
</span><div class="fl-rich-text" data-dcnode-id="1582"><span data-dcnode-id="1587" instrument_node="">
</span><p data-dcnode-id="1584"><strong data-dcnode-id="1585"><span data-dcnode-id="1586" instrument_node="">by Jeffrey Barrows, DO, MA (Bioethics)</span></strong></p><span data-dcnode-id="1583" instrument_node="">
</span></div><span data-dcnode-id="1581" instrument_node="">
</span></div><span data-dcnode-id="1579" instrument_node="">
</span></div><span data-dcnode-id="1577" instrument_node="">
</span><div class="fl-module fl-module-rich-text fl-node-5a4e460949b73" data-dcnode-id="1489" data-node="5a4e460949b73"><span data-dcnode-id="1576" instrument_node="">
</span><div class="fl-module-content fl-node-content" data-dcnode-id="1491"><span data-dcnode-id="1575" instrument_node="">
</span><div class="fl-rich-text" data-dcnode-id="1493"><span data-dcnode-id="1574" instrument_node="">
</span><p data-dcnode-id="1567"><span data-dcnode-id="1573" instrument_node="">In the </span><a data-dcnode-id="1569" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cmda.org/article/cmda-today-spring-2021/"><span data-dcnode-id="1572" instrument_node="">spring 2021 edition of </span><em data-dcnode-id="1570"><span data-dcnode-id="1571" instrument_node="">CMDA Today</span></em></a><span data-dcnode-id="1568" instrument_node="">, CMDA published an article that examined the ethical basis for taking a COVID-19 vaccine. The goal of the article was to reassure CMDA members of the good reasons to utilize the COVID-19 vaccines produced in the last year. Since the article’s publication, several members have written with ongoing questions and concerns about the ethical status of the vaccines due to their association with abortion-derived fetal cell lines. The purpose of this blog post is to address those concerns. An update on the safety and efficacy of the vaccines will be addressed in the future.</span></p><span data-dcnode-id="1566" instrument_node="">
</span><p data-dcnode-id="1564"><span data-dcnode-id="1565" instrument_node="">Hopefully, we can all agree that the COVID-19 vaccines’ utilization of fetal cell lines from abortions generates an emotional response of revulsion and disgust. This God-given emotional response is meant to alert us to the danger of possible association with evil. However, God has also given us the capacity to reason through problems so our eventual decisions are based not just on an emotional reaction, but a mind renewed by the gospel of Jesus Christ.</span></p><span data-dcnode-id="1563" instrument_node="">
</span><p data-dcnode-id="1561"><span data-dcnode-id="1562" instrument_node="">Let me first begin by clearly stating that CMDA is firmly opposed to abortion, taking the stance that life begins at fertilization. Any complicity with abortion is unacceptable to CMDA. Therefore, the major ethical question for either accepting or refusing COVID-19 vaccines is whether utilization of these vaccines constitutes complicity with the evil of abortion.</span></p><span data-dcnode-id="1560" instrument_node="">
</span><p data-dcnode-id="1555"><span data-dcnode-id="1559" instrument_node="">CMDA’s position statement entitled </span><a data-dcnode-id="1557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cmda.org/policy-issues-home/position-statements/"><span data-dcnode-id="1558" instrument_node="">Moral Complicity with Evil</span></a><span data-dcnode-id="1556" instrument_node=""> lays out three separate conditions that must be satisfied to avoid complicity with evil. For the utilization of the COVID-19 vaccines to be ethical despite their association with abortion-derived fetal cell lines, all three conditions must be met.</span></p><span data-dcnode-id="1554" instrument_node="">
</span><p data-dcnode-id="1552"><span data-dcnode-id="1553" instrument_node="">The first condition is that the association with the past evil must be sufficiently uncertain or distanced from the original evil act. Regarding the COVID-19 vaccines and their association with abortion-derived fetal cell lines, this means there should be no evidence the original abortion was performed for the purpose of creating the fetal cell line. This includes complete absence of evidence that the original abortion was coerced in any way. Finally, there should be maximal separation between the abortion itself and the development of the fetal cell line.</span></p><span data-dcnode-id="1551" instrument_node="">
</span><p data-dcnode-id="1549"><span data-dcnode-id="1550" instrument_node="">Only two fetal cell lines were used in the development of the SARS-CoV-2 vaccines within the United States. The first is known as HEK-293, which was used in association with the development of the Pfizer and Moderna vaccines. The second cell line is called PER.C6, which was used in the development of the Johnson &amp; Johnson vaccine. Both cell lines were created by scientists working in the lab of Dr. Alex Van der Eb.</span></p><span data-dcnode-id="1548" instrument_node="">
</span><p data-dcnode-id="1543"><span data-dcnode-id="1547" instrument_node="">HEK-293 stands for a human embryonic kidney cell line derived from the 293rd attempt to establish a successful immortal cell line. The tissue utilized in the development of this cell line was obtained from an abortion performed in 1972 in the Netherlands. During the U.S. Food and Drug Administration (FDA) hearing in 2001 to approve the medical use of this cell line, Dr. Van der Eb gave testimony regarding the development of these fetal cell lines, which can be found </span><a data-dcnode-id="1545" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//web.archive.org/web/20170516050447/https%3A/www.fda.gov/ohrms/dockets/ac/01/transcripts/3750t1_01.pdf"><span data-dcnode-id="1546" instrument_node="">online</span></a><span data-dcnode-id="1544" instrument_node="">.</span></p><span data-dcnode-id="1542" instrument_node="">
</span><p data-dcnode-id="1540"><span data-dcnode-id="1541" instrument_node="">Importantly, Dr. Van der Eb testified that the original reason for the abortion in 1972 was unknown to him. This critical testimony establishes that he had not engaged in motivating the woman to have the abortion in 1972. Additional testimony by Dr. Van der Eb documents that the HEK-293 cell line itself was created by another researcher one year later, in 1973, creating another layer of separation from the abortion itself and the subsequent development of the fetal cell line.</span></p><span data-dcnode-id="1539" instrument_node="">
</span><p data-dcnode-id="1537"><span data-dcnode-id="1538" instrument_node="">The PER.C6 cell line was created in 1995 from embryonic retinal tissue cultures derived from fetal tissue that came from an abortion in 1985. During this same hearing, Dr. Van der Eb testified that the abortion performed in 1985 was “…simply because the woman wanted to get rid of the fetus.” The 10-year interval between the original abortion and the fact that the PER.C6 cell line was developed by scientists other than Dr. Van der Eb once again increases the separation from the evil of abortion and the development of the fetal cell line.</span></p><span data-dcnode-id="1536" instrument_node="">
</span><p data-dcnode-id="1534"><span data-dcnode-id="1535" instrument_node="">If there was any evidence that even part of the motivation for either of these women to have the abortion was to establish the fetal cell lines, any subsequent use of the cell lines would constitute complicity with evil. Separation from the original evil of abortion is maximized by four different factors:</span></p><span data-dcnode-id="1533" instrument_node="">
</span><ol data-dcnode-id="1519"><span data-dcnode-id="1532" instrument_node="">
</span><li data-dcnode-id="1530"><span data-dcnode-id="1531" instrument_node="">Lack of association between the motivation for the abortion and the development of the fetal cell lines.</span></li><span data-dcnode-id="1529" instrument_node="">
</span><li data-dcnode-id="1527"><span data-dcnode-id="1528" instrument_node="">One scientist collecting the original tissue and a different scientist creating the cell line.</span></li><span data-dcnode-id="1526" instrument_node="">
</span><li data-dcnode-id="1524"><span data-dcnode-id="1525" instrument_node="">The interval between the original abortion and the development of the fetal cell lines.</span></li><span data-dcnode-id="1523" instrument_node="">
</span><li data-dcnode-id="1521"><span data-dcnode-id="1522" instrument_node="">The subsequent decades that have passed since the original abortions.</span></li><span data-dcnode-id="1520" instrument_node="">
</span></ol><span data-dcnode-id="1518" instrument_node="">
</span><p data-dcnode-id="1516"><span data-dcnode-id="1517" instrument_node="">Let me expand on this point through an example I have found helpful to illustrate this point. Imagine a 6-month-old child brought into the emergency department by his mother. Multiple skull fractures are found upon examination, and the mother admits previous child abuse by her boyfriend. Further evaluation of the baby reveals the tragedy that this 6-month-old child has no functioning brain activity. Also imagine that a six-month-old baby with a congenital heart defect is in the same hospital awaiting cardiac transplantation. Would the transplantation of this heart into the child with the congenital heart anomaly constitute complicity with the evil of child abuse? Most would say no, because of the clear separation between the evil of the abuse and the good of the transplant.</span></p><span data-dcnode-id="1515" instrument_node="">
</span><p data-dcnode-id="1513"><span data-dcnode-id="1514" instrument_node="">I believe the reason most Christians struggle with the utilization of these COVID-19 vaccines relates to their difficulty separating the evil of abortion from the subsequent use of the tissue from the abortions. However, careful comparison of the two scenarios reveals no difference in terms of the separation from the evil. In both scenarios, a horrendous evil has occurred. But completely separate from that evil, tissue is being utilized for good. Thus, the first condition of avoiding complicity with evil is met.</span></p><span data-dcnode-id="1512" instrument_node="">
</span><p data-dcnode-id="1504"><span data-dcnode-id="1511" instrument_node="">The second condition that must be met to negate any moral complicity with evil is that the action must not reward, perpetuate, justify, cooperate with or ignore the original evil. In the case of the COVID-19 vaccines, any utilization of a COVID-19 vaccine must not incentivize pharmaceutical companies to develop new abortion-derived fetal cell lines. Fortunately, ethical alternatives such as insect and animal cell lines have been developed that can replace abortion-derived fetal cell lines. Therefore, CMDA has actively advocated through </span><a data-dcnode-id="1509" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cmda.org/pressrelease/christian-medical-dental-associations-joins-physician-group-in-support-of-ethical-vaccines/"><span data-dcnode-id="1510" instrument_node="">press releases</span></a><span data-dcnode-id="1508" instrument_node="">, interviews and </span><a data-dcnode-id="1506" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cmda.org/navigating-vaccine-ethics/"><span data-dcnode-id="1507" instrument_node="">written articles</span></a><span data-dcnode-id="1505" instrument_node=""> that any future development of vaccines be done in an ethically pure manner by using these ethical alternatives. This advocacy has also served to raise awareness of the use of these abortion-derived cell lines so members themselves can advocate against their future use.</span></p><span data-dcnode-id="1503" instrument_node="">
</span><p data-dcnode-id="1501"><span data-dcnode-id="1502" instrument_node="">The third condition that must be satisfied to avoid moral complicity with evil is that the intent of the action must be for good. In the case of the utilization of COVID-19 vaccines, this means their utilization must have some good result. It is clear from the increasing medical evidence that these vaccines are highly successful in preventing hospitalization and mortality from COVID-19. In addition, there is some evidence that utilization of the COVID-19 vaccines does decrease the spread of the SARS-Co-V2 virus. Both the decrease in hospitalization and mortality from COVID-19 and the decrease in the spread of the SARS-Co-V2 virus constitute definite goods. Therefore, the third condition for avoiding moral complicity with evil is also met.</span></p><span data-dcnode-id="1500" instrument_node="">
</span><p data-dcnode-id="1498"><span data-dcnode-id="1499" instrument_node="">I would be remiss if I did not briefly point out that there is a difference in the level of utilization of these abortion-derived fetal cell lines by the three vaccines currently approved for use in the United States. Specifically, both the Pfizer and Moderna vaccines used the HEK-293 fetal cell line in a single confirmatory step during the development of the vaccines. Neither the Pfizer nor the Moderna vaccine utilize abortion-derived fetal cell lines for the ongoing production of the vaccine. However, the Johnson &amp; Johnson vaccine is a different type of vaccine. It utilized the Per.C6 cell line in the development of the vaccine AND ongoing production of the vaccine. I make note of this to inform members of all the facts surrounding the association of the COVID-19 vaccines and abortion-derived fetal cell lines.</span></p><span data-dcnode-id="1497" instrument_node="">
</span><p data-dcnode-id="1495"><span data-dcnode-id="1496" instrument_node="">If utilizing the COVID-19 vaccines constituted moral complicity with the evil of abortion, there is no question CMDA would be opposed to their use. However, as is shown by this ethical analysis, the COVID-19 vaccines may be used without engaging in complicity with the evil of the original abortions, as long as their use is accompanied by efforts to raise awareness of the evil of abortion and advocate for the ethically pure development of future vaccines. CMDA has done that for its members and will continue to do so throughout this pandemic.</span></p><span data-dcnode-id="1494" instrument_node="">
</span></div><span data-dcnode-id="1492" instrument_node="">
</span></div><span data-dcnode-id="1490" instrument_node="">
</span></div><span data-dcnode-id="1488" instrument_node="">
</span></div><span data-dcnode-id="1486" instrument_node="">
</span></div><span data-dcnode-id="1484" instrument_node="">
</span><div class="fl-col fl-node-5a3836fc7864c fl-col-small" data-dcnode-id="1200" data-node="5a3836fc7864c"><span data-dcnode-id="1483" instrument_node="">
</span><div class="fl-col-content fl-node-content" data-dcnode-id="1202"><span data-dcnode-id="1482" instrument_node="">

</span><p data-dcnode-id="1080"><span data-dcnode-id="1081" instrument_node="">As it relates to good and evil…My biggest issue with this is it smacks of the opioid crisis and the way it too was incentivized and politicized, and all the gov. efforts to heal it that have been undone by this current pandemic.To me, it all leads back to big pharma and their power and influence suppressing tried and true treatments for the new experimental cocktails that don’t stop the spread, nor the symptoms, nor the aftermath. All in the name of power and control. The Lord will reveal that the same people that created this virus likely created all the COVIDS for the purposes of engineered Darwinism. As to this latest round, Frankenstein’s monster was let loose from the lab, as they simultaneously developed “the cure.” to go with it. That is what bilological warfare is and does, and leave it to China who does not value life, to be the epicenter of all these CORONA outbreaks. But make no mistake we funded it and supported it. This to me lines up exactly with evil as a trick of the enemy leading nations astray with sorcery as stated in Revelation, because we can either put our faith in God or the gov., not both.</span></p><span data-dcnode-id="1079" instrument_node="">

</span><img alt="Avatar" class="avatar avatar-80wp-user-avatar wp-user-avatar-80 alignnone photo avatar-default no-lazyload no-lazyload" data-dcnode-id="963" height="80" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cmda.org/wp-content/uploads/2020/03/avatar_square.png&amp;raw" width="80"><span data-dcnode-id="962" instrument_node=""> </span></span><span data-dcnode-id="960" instrument_node="">
</span><span class="comment-author-link" data-dcnode-id="958"><span data-dcnode-id="959" instrument_node="">Amy Heneisen</span></span><span data-dcnode-id="957" instrument_node=""> </span><span class="comment-date" data-dcnode-id="955"><span data-dcnode-id="956" instrument_node="">on December 6, 2021 at 11:49 am</span></span><span data-dcnode-id="954" instrument_node="">

</span><p data-dcnode-id="948"><span data-dcnode-id="949" instrument_node="">Jeff,</span></p><span data-dcnode-id="947" instrument_node="">
</span><p data-dcnode-id="945"><span data-dcnode-id="946" instrument_node="">While I have not yet had the means or opportunity to track down every reference in this article and interview, I can see no particular reason to doubt the author’s veracity at this time.  I too used to believe as you argued in your original article, thinking that the abortions involved were remote and done not for research purposes.  As I just recently began reading more about the acquisition of fetal cells for research, I came to the horrible realization that the cells must be obtained from living tissue because otherwise they quickly become unusable AND I realized the ongoing use of fetal cells and tissues in a variety of vaccine and pharmaceutical research endeavors.</span></p><span data-dcnode-id="944" instrument_node="">
</span><p data-dcnode-id="941"><a data-dcnode-id="942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lifesitenews.com/news/babies-were-aborted-alive-placed-in-fridge-to-harvest-cell-lines-used-in-some-vaccines-researcher/" rel="nofollow ugc"><span data-dcnode-id="943" instrument_node="">https://www.lifesitenews.com/news/babies-were-aborted-alive-placed-in-fridge-to-harvest-cell-lines-used-in-some-vaccines-researcher/</span></a></p><span data-dcnode-id="940" instrument_node="">
</span><p data-dcnode-id="938"><span data-dcnode-id="939" instrument_node="">“ Acker quoted Dr. C. Ward Kischer, an embryologist and emeritus professor of anatomy from the University of Arizona College of Medicine, who stated the following regarding the cells obtained for aborted fetal cell lines: “In order to sustain 95% of the cells, the live tissue would need to be preserved within 5 minutes of the abortion […] within an hour the cells would continue to deteriorate, rendering the specimen useless.”</span></p><span data-dcnode-id="937" instrument_node="">
</span><p data-dcnode-id="931"><span data-dcnode-id="936" instrument_node="">Acker said that if the baby used in the production of HEK-293 “had already been dead (through a natural miscarriage), the tissue would certainly have been of no use to Mr. Graham in making a cell line after it had been stored in a freezer.”</span><br data-dcnode-id="935"><span data-dcnode-id="934" instrument_node="">
She speculated that the tissue from the baby used for the production of HEK-293 was likely procured by the surgical method of whole-fetus extraction, often referred to as a C-section abortion, which can include the removal of the uterus along with the living baby still inside.</span><br data-dcnode-id="933"><span data-dcnode-id="932" instrument_node="">
Acker quoted a 1952 study from Dr. Thomas Weller and Dr. John Enders (among others), who were awarded the Nobel Prize in 1954 for their polio research involving growing cultures in various types of tissue, where they explained how “human embryonic tissues” were obtained for their experiments.</span></p><span data-dcnode-id="930" instrument_node="">
</span><p data-dcnode-id="924"><span data-dcnode-id="929" instrument_node="">“This material was employed in most of the experiments. It was obtained under sterile precautions at the time of abdominal hysterotomy for therapeutic indications. Embryos of between 12 and 18 weeks’ gestation have been utilized. Rarely tissues were obtained from stillborn fetuses, or from premature infants at autopsy … In the experiments on prolonged propagation of virus, three sorts of embryonic materials were used: elements of skin, connective tissue, and muscle; intestinal tissue; brain tissue,” the researchers stated.</span><br data-dcnode-id="928"><span data-dcnode-id="927" instrument_node="">
“Embryonic tissues were prepared in the following manner. Whenever possible the embryo was removed from the amniotic sac under sterile precautions, transferred to a sterile towel and kept at 5 C until dissected,” (bold added) they added.</span><br data-dcnode-id="926"><span data-dcnode-id="925" instrument_node="">
Acker then quoted from Dr. Gonzalo Herranz, Professor of Histology and General Embryology at the University of Navarra, Spain, who described how abortions must be done to obtain uncontaminated fetal material in Italian scientist Pietro Croce’s book Vivisection or Science? first published in English in 1991.</span></p><span data-dcnode-id="923" instrument_node="">
</span><p data-dcnode-id="919"><span data-dcnode-id="922" instrument_node="">“To obtain embryo cells, embryos from spontaneous abortions cannot be used, nor can those obtained by means of abortions performed via the vagina: in both cases, the embryo will be contaminated by micro-organisms,” wrote Herranz.</span><br data-dcnode-id="921"><span data-dcnode-id="920" instrument_node="">
“The correct way consists in having recourse to Caesarian section or to the removal of the uterus. Only in this way can bacteriological sterility be guaranteed. In either case, then, to obtain embryo cells for culture, a programmed abortion must be adopted, choosing the age of the embryo and dissecting it while still alive to remove tissues to be placed in culture media,” (bold added) he added.”</span></p><span data-dcnode-id="918" instrument_node="">
</span><p data-dcnode-id="916"><span data-dcnode-id="917" instrument_node="">I am continuing to consider the further implications of this information beyond the COVID injection situation.</span></p><span data-dcnode-id="915" instrument_node="">
</span><p data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">I certainly accept that other believers may reach different decisions.  That is between each individual and the Lord.</span></p><span data-dcnode-id="912" instrument_node="">
</span><p data-dcnode-id="910"><span data-dcnode-id="911" instrument_node="">It seems, however, that now that we know this information, we may adopt a more humble approach toward those who for these reasons choose to forego particular medical therapies or procedures.</span></p><span data-dcnode-id="909" instrument_node="">

</span><p data-dcnode-id="786"><span data-dcnode-id="787" instrument_node="">Sir: </span></p><span data-dcnode-id="785" instrument_node="">
</span><p data-dcnode-id="783"><span data-dcnode-id="784" instrument_node="">It saddens my heart to read your thoughts on this subject.</span></p><span data-dcnode-id="782" instrument_node="">
</span><p data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">In Christ’s loving Truth, I must disagree with you, because I agree with the Bible–God’s Holy Word that says: “Thou shall not murder.”  I understand that to mean I should not use any type of murder: so that I can to keep my job, for the “betterment” of my health, and certainly not for my comfort. </span></p><span data-dcnode-id="779" instrument_node="">
</span><p data-dcnode-id="777"><span data-dcnode-id="778" instrument_node="">God’s Word also says in 1 Corinthians 3:16-17: “Do you not know that you are the temple of God and that the Spirit of God dwells in you? If anyone defiles the temple of God, God will destroy him. For the temple of God is holy, which temple you are.”</span></p><span data-dcnode-id="776" instrument_node="">
</span><p data-dcnode-id="774"><span data-dcnode-id="775" instrument_node="">Did the creators and developers of the covid vaccines know they were using murdered babies? Yes. Did they care? No. Did they understand that these babies are the temple of God? Do you? If you question that they are the temple of God, re-reading the scripture above, do you want to “chance it?”</span></p><span data-dcnode-id="773" instrument_node="">
</span><p data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">How can you call using murdered babies this way “ethical” simply because these murdered babies were used in a “good” way? That makes absolutely no sense. Should we use all other murdered/aborted babies in a “good” way too? Would that be ethical? Would that make it okay? (This thought process lines right up with pro-abortionists.)</span></p><span data-dcnode-id="770" instrument_node="">
</span><p data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">The FDA reports record Dr. Van Der Eb speaking very callously about using babies cells to develop the cell lines. It’s never stated in the FDA report that he *only used one* baby. No one asked exactly how many babies he cut apart to use their cells. Should any of this be okay with anyone who says they are pro-life? God’s Word overrides “ethics” if one is *truly* a Christian.</span></p><span data-dcnode-id="767" instrument_node="">
</span><p data-dcnode-id="765"><span data-dcnode-id="766" instrument_node="">You say: “CMDA is firmly opposed to abortion.” Yes–unless it has to do with the “betterment” of health–or keeping your job. Then, by default, you agree with these abortions. You are speaking out of both sides of your mouth. You can’t use chopped up, murdered babies and jab them into your arm, and then say you are pro life. That, sir, is a lie. </span></p><span data-dcnode-id="764" instrument_node="">
</span><p data-dcnode-id="762"><span data-dcnode-id="763" instrument_node="">In the past, barbaric civilizations sacrificed their children to idols for better crops, health, fertility, etc. Is our society any better? We justify doing the same exact thing. Many agree with the sacrifice of these babies so they can stay healthy and/or keep their jobs–so they can continue their comfortable way of life. In the past we knew these societies who sacrificed people were uncivilized idol worshipers. Do we understand now what those who agree with this type of “ethics” are?</span></p><span data-dcnode-id="761" instrument_node="">
</span><p data-dcnode-id="759"><span data-dcnode-id="760" instrument_node="">Your example of the 6-month-olds is completely different from that of a helpless baby being ripped out of its mother’s womb, and then callously used for scientific purposes–they chopped up this human baby (or babies) to get their cells over and over again to force them to accept the virus. Repeatedly, the cells rejected the viruses. However, this “doctor” continued anyway until he was finally able to make the aborted cells work. How sick and twisted does someone have to be, to be that persistent using murdered baby cells?</span></p><span data-dcnode-id="758" instrument_node="">
</span><p data-dcnode-id="756"><span data-dcnode-id="757" instrument_node="">These babies were aborted decades ago–so it no longer matters. ??? Jesus died for our sins over 2,000 years ago. Does that still matter? Or does it only matter if it happened in the last year or so? How fresh does a murder/abortion have to be before we stand up and say: MURDER IS WRONG! I WILL STAND FOR THE TRUTH AS OUTLINED IN GOD’S INERRANT, AND HOLY WORD.</span></p><span data-dcnode-id="755" instrument_node="">
</span><p data-dcnode-id="753"><span data-dcnode-id="754" instrument_node="">I have cried many, many tears for murdered babies… 60+ million at last count… Lord have mercy…</span></p><span data-dcnode-id="752" instrument_node="">
</span><p data-dcnode-id="750"><span data-dcnode-id="751" instrument_node="">I am praying discernment for you and those who have accepted the lying travesty of “ethics” you outline above.</span></p><span data-dcnode-id="749" instrument_node="">
</span><p data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">In Christ’s service, and yes, in His love. (Jesus is Truth. And even when Truth hurts, God is love.)</span></p><span data-dcnode-id="746" instrument_node="">

</span><p data-dcnode-id="523"><span data-dcnode-id="526" instrument_node="">I appreciate your discussion of how you ethically justify your position. I realize my decision to not be vaccinated is not mainstream. I have prayed about this as honestly as I can, and asked God if I should be vaccinated, so far answer has been no. This is hard as I may not be even able to practice, even though I had the infection from caring for infected patients. I don’t know God’s ways , but I will trust Him.</span><br data-dcnode-id="525"><span data-dcnode-id="524" instrument_node="">
I did have a couple of comments. The first is that although a person may be able to explain things that is their thinking process for their opinion, that may be good for them and helpful to others, but we all have to take things to God and follow His leading for us. His opinion counts most. Second, if you have justified the moral legitimacy of the vaccines, why would someone, especially a non-Christian, need to clean up vaccines to make them more acceptable. Third, if I understood your example correctly, taking a heart from a brain dead child, who will die shortly is not even close to using cells from a baby that had its whole life ahead of it if not aborted.</span></p><span data-dcnode-id="522" instrument_node="">

I agree that each person must stand before the Lord to give an account of their life, therefore God’s opinion matters the most. </span></p><span data-dcnode-id="488" instrument_node="">
</span><p data-dcnode-id="486"><span data-dcnode-id="487" instrument_node="">Second, you are absolutely correct in that there is no good reason for a non-Christian to “clean up” the vaccines from the association of abortion derived fetal cell lines (ADFCL’s). That is why it is so important to advocate publicly against the future development of vaccines associated with ADFCL’s. CMDA has done that on a number of occasions and we will continue to do so with every opportunity the Lord provides. </span></p><span data-dcnode-id="485" instrument_node="">
</span><p data-dcnode-id="483"><span data-dcnode-id="484" instrument_node="">Regarding my example of the heart transplant, the important point is that the decision to abort or kill the baby was made separate from the action of taking the cell sample. As I clearly laid out in the article above, if there was ANY connection between the motivation for getting the abortion and the later use of the fetal cell line, than there is NO ethical justification for using those cells. It is only because there is no connection that they can be seen as two separate events. The abortion in 1972 was going to happen, regardless of whether cells would be used. Therefore, while the baby did have his/her whole life ahead, that was taken away by the decision of the mother, not the researcher.</span></p><span data-dcnode-id="482" instrument_node="">

</span><p data-dcnode-id="362"><span data-dcnode-id="363" instrument_node="">Hepatitis A, rabies, rubella and varicella vaccines are also produced via fetal cells lines.  Christian Pediatricians would basically deny their Hippocratic oath, be liable for malpractice and risk loss of state licensure should they not both offer and encourage their administration for the children under their care.  I totally agree that we are to fight for equally qualified alternatives to use in place of immortalized fetal cell lines.  Should I have a patient needing any of such vaccines, my administration does not condone the elective abortions performed during 1972 and 1985 which produced the cell lines used in vaccine manufacturing or testing nor does it encourage current or future abortions.  Thank you Dr. Barrows for your wisdom and Godly perspective.</span></p><span data-dcnode-id="361" instrument_node="">

</span><span class="comment-author-link" data-dcnode-id="265"><span data-dcnode-id="266" instrument_node="">Michael M.</span></span><span data-dcnode-id="264" instrument_node=""> </span><span class="comment-date" data-dcnode-id="262"><span data-dcnode-id="263" instrument_node="">on January 14, 2022 at 1:55 am</span></span><span data-dcnode-id="261" instrument_node="">
</span></div><span data-dcnode-id="258" instrument_node="">
</span><div class="comment-content clearfix" data-dcnode-id="253"><span data-dcnode-id="257" instrument_node="">
</span><p data-dcnode-id="255"><span data-dcnode-id="256" instrument_node="">Why does no one ever answer the question:  “Is it immoral to use the immortalized cells today?”  I, for one, could never conduct an experiment on these cells, because I believe the very act of propagating them is immoral.  It is desecration of a human body that has never been properly laid to rest.  The cells still contain the unique information coded by God to a unique soul.  They were stolen from their rightful owner by tortuous murder, with no one to give just consent to their donation. They could not have been obtained without the torture of a live human being who was them subjected to theft of their bodily remains.  The tissue “dies” too quickly for miscarriages to be “as effective”.  The process necessitates “fresh flesh”.  But hey, I didn’t have to be there to see the dissection of a live, human being without anasthesia, and I have EVERY right to propagate the unique DNA of a human in perpetuity for profit.  It will make the world a better place.  Does God smile when he sees the unique DNA code of one of His creations propagated ad infinitum?  Or, did God lay down principles for properly laying a human to rest?  I’d love to see someone write this article defending the day-to-day use of the cells.  If I can be convinced there’s nothing wrong with me having some leftover cells in my fridge from a brutally murdered person I never met, then sign me up for the vaccines.</span></p><span data-dcnode-id="254" instrument_node="">
