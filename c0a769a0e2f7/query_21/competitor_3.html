rksR ksmyRn" data-attribute-verso-pattern="article-body" data-dcnode-id="280"><div class="ArticlePageChunksContent-hqHLaf cyochf" data-dcnode-id="286" data-event-boundary="click" data-event-click="{&quot;pattern&quot;:&quot;ChunkedArticleContent&quot;}" data-in-view="{&quot;pattern&quot;:&quot;ChunkedArticleContent&quot;}" data-include-experiments="true"><div class="ArticlePageChunks-lglntq zseeC" data-dcnode-id="296" data-testid="ArticlePageChunks"><div class="GridWrapper-vNBSO jMumET grid grid-margins grid-items-2 ArticlePageChunksGrid-kRgPDq DBpfE grid-layout--adrail narrow wide-adrail" data-dcnode-id="486"><div class="GridItem-buSdEM PibmB grid--item grid-layout__content" data-dcnode-id="509"><div class="BodyWrapper-ctnerm eoZKFd body body__container article__body" data-dcnode-id="510" data-journey-hook="client-content" data-testid="BodyWrapper"><div class="body__inner-container" data-dcnode-id="511"><div class="GenericCalloutWrapper-XXWD dXXHUF callout--has-top-border" data-dcnode-id="575" data-event-boundary="click" data-event-click="{&quot;pattern&quot;:&quot;GenericCallout&quot;}" data-in-view="{&quot;pattern&quot;:&quot;GenericCallout&quot;}" data-include-experiments="true" data-testid="GenericCallout"><figure class="AssetEmbedWrapper-iLfYbx iclJOW asset-embed" data-dcnode-id="576"><div class="AssetEmbedAssetContainer-fogSSF kRpSOB asset-embed__asset-container" data-dcnode-id="585"><span class="SpanWrapper-kGGzGm fCMktF responsive-asset AssetEmbedResponsiveAsset-eqsnW ehcXJi asset-embed__responsive-asset" data-dcnode-id="586"><picture class="ResponsiveImagePicture-jIKgcS fArnhQ AssetEmbedResponsiveAsset-eqsnW ehcXJi asset-embed__responsive-asset responsive-image" data-dcnode-id="587" style=""><img alt="Image may contain Art and Painting" class="ResponsiveImageContainer-dlOMGF byslZC responsive-image__image" data-dcnode-id="588" sizes="100vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.vanityfair.com/photos/54cc009f3c894ccb27c84ad9/master/w_1600%252Cc_limit/image.jpg&amp;raw" srcset="https://media.vanityfair.com/photos/54cc009f3c894ccb27c84ad9/master/w_120,c_limit/image.jpg 120w, https://media.vanityfair.com/photos/54cc009f3c894ccb27c84ad9/master/w_240,c_limit/image.jpg 240w, https://media.vanityfair.com/photos/54cc009f3c894ccb27c84ad9/master/w_320,c_limit/image.jpg 320w, https://media.vanityfair.com/photos/54cc009f3c894ccb27c84ad9/master/w_640,c_limit/image.jpg 640w, https://media.vanityfair.com/photos/54cc009f3c894ccb27c84ad9/master/w_960,c_limit/image.jpg 960w, https://media.vanityfair.com/photos/54cc009f3c894ccb27c84ad9/master/w_1280,c_limit/image.jpg 1280w, https://media.vanityfair.com/photos/54cc009f3c894ccb27c84ad9/master/w_1600,c_limit/image.jpg 1600w"></picture></span></div><div class="CaptionWrapper-brisHk jRgaKi caption AssetEmbedCaption-eXYFag elaSvI asset-embed__caption" data-dcnode-id="577" data-event-boundary="click" data-event-click="{&quot;pattern&quot;:&quot;Caption&quot;}" data-in-view="{&quot;pattern&quot;:&quot;Caption&quot;}" data-include-experiments="true"><span class="BaseWrap-sc-TURhJ BaseText-fFzBQt CaptionText-cOFJqa eTiIvU dOeJmt hTa-dbB caption__text" data-dcnode-id="579"><p data-dcnode-id="581"><span data-dcnode-id="584" instrument_node="">Clean Slate: Thou shalt not abide by outdated commandments. </span><em data-dcnode-id="582"><span data-dcnode-id="583" instrument_node="">Illustration by Edward Sorel.</span></em></p><span data-dcnode-id="580" instrument_node="">
</span></span><span data-dcnode-id="578" instrument_node=""></span></div></figure></div><p data-dcnode-id="573"><span data-dcnode-id="574" instrument_node="">What do we say when we want to revisit a long-standing policy or scheme that no longer seems to be serving us or has ceased to produce useful results? We begin by saying tentatively, “Well, it’s not exactly written in stone.” (Sometimes this comes out as “not set in stone.”)</span></p><p class="paywall" data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">By that, people mean that it’s not one of the immutable Tablets of the Law. Thus, more recent fetishes such as the gold standard, or the supposedly holy laws of the free market, can be discarded as not being incised on granite or marble. But what if it is the original stone version that badly needs a re-write? Who will take up the revisionist chisel?</span></p><div class="AdWrapper-fFweuL dIvDeZ ad ad--in-content" data-dcnode-id="569"><div class="ad__slot ad__slot--in-content" data-dcnode-id="570" data-node-id="qxa8ke"></div></div><p class="paywall" data-dcnode-id="564"><span data-dcnode-id="568" instrument_node="">There is in fact a good biblical precedent for doing just that, since the giving of the divine Law by Moses appears in three or four wildly different scriptural versions. (When you hear people demanding that the Ten Commandments be displayed in courtrooms and schoolrooms, always be sure to ask which set. It works every time.) The first and most famous set comes in Exodus 20 but ends with Moses himself smashing the supposedly most sacred artifacts ever known to man: the original, God-dictated panels of Holy Writ. The second edition occurs in Exodus 34, where new but completely different tablets are presented after some heavenly re-write session and are for the first time called “the ten commandments.” In the fifth chapter of Deuteronomy, Moses once more calls his audience together and recites the original Sinai speech with one highly significant alteration (the Sabbath commandment’s justifications in each differ greatly). But plainly discontented with the effect of this, he musters the flock </span><em data-dcnode-id="566"><span data-dcnode-id="567" instrument_node="">again</span></em><span data-dcnode-id="565" instrument_node=""> 22 chapters further on, as the river Jordan is coming into view, and gives an additional set of orders—chiefly terse curses—which are also to be inscribed in stone. As with the gold plates on which Joseph Smith found the Book of Mormon in upstate New York, no trace of any of these original yet conflicting tablets survives.</span></p><div class="Container-imGeBO ftlPuP" data-dcnode-id="563" data-event-boundary="click" data-event-click="{&quot;pattern&quot;:&quot;CNEInterludeEmbed&quot;}" data-in-view="{&quot;pattern&quot;:&quot;CNEInterludeEmbed&quot;}" data-include-experiments="true"></div><p class="paywall" data-dcnode-id="561"><span data-dcnode-id="562" instrument_node="">Thus we are fully entitled to consider them as a work in progress. May there not be some old commandments that could be retired, as well as some new ones that might be adopted? Taking the most celebrated Top 10 in order, we find (I am using the King James, or “Authorized,” version of the text):</span></p><div aria-hidden="false" class="ConsumerMarketingUnitThemedWrapper-kkMeXf hBFNZw consumer-marketing-unit consumer-marketing-unit--article-mid-content" data-dcnode-id="530" role="presentation"><div class="consumer-marketing-unit__slot consumer-marketing-unit__slot--article-mid-content consumer-marketing-unit__slot--in-content" data-dcnode-id="560"></div><div class="journey-unit" data-dcnode-id="531"><div class="cm-in-content-container journey-template--in-content" data-dcnode-id="532"><span data-dcnode-id="557" instrument_node="">
</span><div data-dcnode-id="533"><p class="cm-in-content-detail cm-in-content-mobile-only" data-dcnode-id="549"><b data-dcnode-id="555"><span data-dcnode-id="556" instrument_node="">Spring Sale</span></b><br data-dcnode-id="554"><span data-dcnode-id="553" instrument_node="">Get 1 year for just </span><strike data-dcnode-id="551"><span data-dcnode-id="552" instrument_node="">$29.99</span></strike><span data-dcnode-id="550" instrument_node=""> $8 + a free tote. </span></p><span data-dcnode-id="548" instrument_node="">

      </span><div class="cm-in-content-subscribe-button-arrow" data-dcnode-id="535"></div></a></div></div></div></div><p class="paywall" data-dcnode-id="527"><strong data-dcnode-id="528"><span data-dcnode-id="529" instrument_node="">I. and II.</span></strong></p><div class="inline-recirc-wrapper inline-recirc-observer-target-1 viewport-monitor-anchor" data-attr-viewport-monitor="inline-recirc" data-dcnode-id="526" data-event-boundary="click" data-event-click="{&quot;pattern&quot;:&quot;InlineRecirc&quot;}" data-in-view="{&quot;pattern&quot;:&quot;InlineRecirc&quot;}" data-include-experiments="true"></div><p class="paywall" data-dcnode-id="512"><span data-dcnode-id="525" instrument_node="">These commandments are in fact a mixture of related injunctions. </span><em data-dcnode-id="523"><span data-dcnode-id="524" instrument_node="">I am the lord thy God.… Thou shalt have no other gods before me.</span></em><span data-dcnode-id="522" instrument_node=""> This use of capitalization and upper- and lowercase carries the intriguing implication that there perhaps </span><em data-dcnode-id="520"><span data-dcnode-id="521" instrument_node="">are</span></em><span data-dcnode-id="519" instrument_node=""> some other gods but not equally deserving of respect or awe. (Scholars differ about the epoch during which the Jewish people decided on monotheism.) Then comes the prohibition of “graven images” or indeed “any likeness of anything that is in heaven above, or that is in the earth beneath, or that is in the water under the earth.” This appears to forbid representational art, just as some Muslims interpret the Koran to forbid the depiction of any human form, let alone any sacred one. (It certainly seems to discourage Christian iconography, with its crucifixes, and statues of virgins and saints.) But the ban is obviously intended as a very emphatic one, since it comes with a reminder that </span><em data-dcnode-id="517"><span data-dcnode-id="518" instrument_node="">I the lord thy God am a jealous God, visiting the iniquity of the fathers upon the children unto the third and fourth generation.</span></em><span data-dcnode-id="516" instrument_node=""> The collective punishment of future children, for the sin of </span><em data-dcnode-id="514"><span data-dcnode-id="515" instrument_node="">lèse-majesté,</span></em><span data-dcnode-id="513" instrument_node=""> may not strike everyone as an especially moral promise.</span></p></div></div></div><div class="GridItem-buSdEM gKfJBS grid--item grid-layout__aside" data-dcnode-id="487"><div class="StickyBoxWrapper-euhCxU luKJG sticky-box" data-dcnode-id="488"><div class="StickyBoxPrimary-fEgDcn dFVkFO sticky-box__primary" data-dcnode-id="490"><div class="Container-imGeBO ftlPuP" data-dcnode-id="497" data-event-boundary="click" data-event-click="{&quot;pattern&quot;:&quot;CNEInterludeEmbed&quot;}" data-in-view="{&quot;pattern&quot;:&quot;CNEInterludeEmbed&quot;}" data-include-experiments="true"><figure class="VideoFigure-hZUgyy fSPdhr" data-dcnode-id="498" data-testid="cne-interlude-container-right-rail"><p class="BaseWrap-sc-TURhJ BaseText-fFzBQt InterludeHeader-bqgsPm eTiIvU fRTstr eUVYFg" data-dcnode-id="507"><span data-dcnode-id="508" instrument_node="">WATCH</span></p><figure class="CneVideoEmbedFigure-bJIZil dApMCp cne-video-embed" data-dcnode-id="502"><div data-dcnode-id="503" data-testid="script-container"><div class="cne-player-container" data-dcnode-id="505" id="270248a0-2f8d-69a6-8caa-2f7f25c837d0" style="box-sizing:content-box;display:inline-block;height:0px;padding-top:56.25%;position:relative;transition:height 300ms ease-in-out;vertical-align:top;width:100%;"><iframe allowfullscreen="true" allowtransparency="true" data-dcnode-id="506" frameborder="0" msallowfullscreen="true" scrolling="no" style="height:1px !important;left:0px;min-height:100%;min-width:100%;position:absolute;top:0px;width:1px !important;" title="Video Player"></iframe></div></div></figure><a class="BaseWrap-sc-TURhJ BaseText-fFzBQt BaseLink-gZQqBA InterludeTitleLink-bfxTQh eTiIvU kVeaGy fBZHiW csoDwQ" data-dcnode-id="499" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vanityfair.com/video/watch/how-a-celebrity-trainer-gets-actors-in-shape-for-movies" rel="noopener noreferrer" target="_blank"><p class="BaseWrap-sc-TURhJ BaseText-fFzBQt InterludeRightRailTitle-fiGQEr eTiIvU bvfzOs cWonjf" data-dcnode-id="500"><span data-dcnode-id="501" instrument_node="">How a Celebrity Trainer Gets Actors in Shape for Movies</span></p></a></figure></div><div class="AdWrapper-fFweuL dIvDeZ ad ad--rail" data-dcnode-id="495"><div class="ad__slot ad__slot--rail" data-dcnode-id="496" data-node-id="41k42i"></div></div><div aria-hidden="true" class="ConsumerMarketingUnitThemedWrapper-kkMeXf hBFNZw consumer-marketing-unit consumer-marketing-unit--display-rail" data-dcnode-id="492" role="presentation"><div class="consumer-marketing-unit__slot consumer-marketing-unit__slot--display-rail" data-dcnode-id="494"></div><div class="journey-unit" data-dcnode-id="493"></div></div><div class="RecircMostPopularWrapper-laeRwu btOzvW recirc-most-popular-wrapper viewport-monitor-anchor" data-attr-viewport-monitor="" data-dcnode-id="491" data-event-boundary="click" data-event-click="{&quot;pattern&quot;:&quot;RecircMostPopular&quot;}" data-in-view="{&quot;pattern&quot;:&quot;RecircMostPopular&quot;}" data-include-experiments="true"></div></div><div class="StickyBoxPlaceholder-jNQMsI laMCLq" data-dcnode-id="489"></div></div></div></div><div class="RowWrapper-egDQBE hVsKfd full-bleed-ad row-mid-content-ad" data-dcnode-id="483"><div class="AdWrapper-fFweuL dIvDeZ ad ad--mid-content" data-dcnode-id="484"><div class="ad__slot ad__slot--mid-content" data-dcnode-id="485" data-node-id="ewr7kt"></div></div></div><div class="GridWrapper-vNBSO jMumET grid grid-margins grid-items-2 ArticlePageChunksGrid-kRgPDq DBpfE grid-layout--adrail narrow wide-adrail" data-dcnode-id="438"><div class="GridItem-buSdEM PibmB grid--item grid-layout__content" data-dcnode-id="449"><div class="BodyWrapper-ctnerm eoZKFd body body__container article__body" data-dcnode-id="450" data-journey-hook="client-content" data-testid="BodyWrapper"><div class="body__inner-container" data-dcnode-id="451"><p class="paywall" data-dcnode-id="480"><strong data-dcnode-id="481"><span data-dcnode-id="482" instrument_node="">III.</span></strong></p><p class="paywall" data-dcnode-id="476"><em data-dcnode-id="478"><span data-dcnode-id="479" instrument_node="">Thou shalt not take the name of the lord thy God in vain, for the lord will not hold him guiltless that taketh his name in vain.</span></em><span data-dcnode-id="477" instrument_node=""> A slightly querulous and repetitive note is struck here, as if of injured vanity. Nobody knows how to obey this commandment, or how to avoid blasphemy or profanity. For example, I say “God alone knows” when I sincerely intend to say “Nobody knows.” Is this ontologically dangerous? Ought not unalterable laws to be plain and unambiguous?</span></p><p class="paywall" data-dcnode-id="473"><strong data-dcnode-id="474"><span data-dcnode-id="475" instrument_node="">IV.</span></strong></p><p class="paywall" data-dcnode-id="469"><em data-dcnode-id="471"><span data-dcnode-id="472" instrument_node="">Remember the sabbath day, to keep it holy.</span></em><span data-dcnode-id="470" instrument_node=""> This ostensibly brief commandment goes on for a long time—for four verses in fact—and stresses the importance of a day dedicated to the lord, during which neither one’s children nor one’s servants or animals should be allowed to perform any tasks. (Query: Why is it specifically addressed to people who are assumed to have staff?)</span></p><p class="paywall" data-dcnode-id="467"><span data-dcnode-id="468" instrument_node="">Nobody is opposed to a day of rest. The international Communist movement got its start by proclaiming a strike for an eight-hour day on May 1, 1886, against Christian employers who used child labor seven days a week. But in Exodus 20:8–11, the reason given for the day off is that “in six days the lord made heaven and earth, the sea, and all that in them is, and rested the seventh day.” Yet in Deuteronomy 5:15 a different reason for the Sabbath observance is offered: “Remember that thou wast a servant in the land of Egypt, and that the lord thy God brought thee out thence through a mighty hand and by a stretched out arm: therefore the lord thy God commanded thee to keep the sabbath day.” Preferable though this may be, with its reminder of previous servitude, we again find mixed signals here. Why can’t rest be recommended for its own sake? Also, why can’t the infallible and omniscient and omnipotent one make up his mind what the real reason is?</span></p><p class="paywall" data-dcnode-id="464"><strong data-dcnode-id="465"><span data-dcnode-id="466" instrument_node="">V.</span></strong></p><p class="paywall" data-dcnode-id="460"><em data-dcnode-id="462"><span data-dcnode-id="463" instrument_node="">Honor thy father and thy mother.</span></em><span data-dcnode-id="461" instrument_node=""> Innocuous as this may seem, it is the only commandment that comes with an inducement instead of an implied threat. Both the Exodus and Deuteronomy versions urge it for the same reason: “that thy days may be long upon the land which the lord thy God giveth thee.” This perhaps has the slight suggestion of being respectful to Father and Mother in order to come into an inheritance—the Israelites have already been promised the Canaanite territory that is currently occupied by other people, so the prospective legacy pickings are rather rich. Again, why not propose filial piety as a nice thing in itself?</span></p><div class="inline-recirc-wrapper inline-recirc-observer-target-2 viewport-monitor-anchor" data-attr-viewport-monitor="inline-recirc" data-dcnode-id="459" data-event-boundary="click" data-event-click="{&quot;pattern&quot;:&quot;InlineRecirc&quot;}" data-in-view="{&quot;pattern&quot;:&quot;InlineRecirc&quot;}" data-include-experiments="true"></div><p class="paywall" data-dcnode-id="456"><strong data-dcnode-id="457"><span data-dcnode-id="458" instrument_node="">VI.</span></strong></p><p class="paywall" data-dcnode-id="452"><em data-dcnode-id="454"><span data-dcnode-id="455" instrument_node="">Thou shalt not kill.</span></em><span data-dcnode-id="453" instrument_node=""> This very celebrated commandment quite obviously cannot mean what it seems to say in English translation. In the original Hebrew it comes across as something more equivalent to “Thou shalt do no murder.” We can be fairly sure that the “original intent” is not in any way pacifistic, because immediately after he breaks the original tablets in a fit of rage, Moses summons his Levite faction and says (Exodus 32:27–28):</span></p></div></div></div><div class="GridItem-buSdEM gKfJBS grid--item grid-layout__aside" data-dcnode-id="439"><div class="StickyBoxWrapper-euhCxU hyXuto sticky-box" data-dcnode-id="440"><div class="StickyBoxPrimary-fEgDcn dFVkFO sticky-box__primary" data-dcnode-id="442"><div class="AdWrapper-fFweuL dIvDeZ ad ad--rail" data-dcnode-id="447"><div class="ad__slot ad__slot--rail" data-dcnode-id="448" data-node-id="sw7b9"></div></div><div aria-hidden="true" class="ConsumerMarketingUnitThemedWrapper-kkMeXf hBFNZw consumer-marketing-unit consumer-marketing-unit--display-rail" data-dcnode-id="444" role="presentation"><div class="consumer-marketing-unit__slot consumer-marketing-unit__slot--display-rail" data-dcnode-id="446"></div><div class="journey-unit" data-dcnode-id="445"></div></div><div class="RecircMostPopularWrapper-laeRwu btOzvW recirc-most-popular-wrapper viewport-monitor-anchor" data-attr-viewport-monitor="" data-dcnode-id="443" data-event-boundary="click" data-event-click="{&quot;pattern&quot;:&quot;RecircMostPopular&quot;}" data-in-view="{&quot;pattern&quot;:&quot;RecircMostPopular&quot;}" data-include-experiments="true"></div></div><div class="StickyBoxPlaceholder-jNQMsI laMCLq" data-dcnode-id="441"></div></div></div></div><div class="RowWrapper-egDQBE hVsKfd full-bleed-ad row-mid-content-ad" data-dcnode-id="435"><div class="AdWrapper-fFweuL dIvDeZ ad ad--mid-content" data-dcnode-id="436"><div class="ad__slot ad__slot--mid-content" data-dcnode-id="437" data-node-id="3bkte5"></div></div></div><div class="GridWrapper-vNBSO jMumET grid grid-margins grid-items-2 ArticlePageChunksGrid-kRgPDq DBpfE grid-layout--adrail narrow wide-adrail" data-dcnode-id="393"><div class="GridItem-buSdEM PibmB grid--item grid-layout__content" data-dcnode-id="404"><div class="BodyWrapper-ctnerm eoZKFd body body__container article__body" data-dcnode-id="405" data-journey-hook="client-content" data-testid="BodyWrapper"><div class="body__inner-container" data-dcnode-id="406"><p class="paywall" data-dcnode-id="433"><span data-dcnode-id="434" instrument_node="">Thus saith the lord God of Israel, put every man his sword by his side, and go in and out from gate to gate throughout the camp, and slay every man his brother, and every man his companion, and every man his neighbor. And the children of Levi did according to the word of Moses: and there fell of the people that day about three thousand men.</span></p><p class="paywall" data-dcnode-id="431"><span data-dcnode-id="432" instrument_node="">With its seven-word preface, that order, too, obviously constituted a “commandment” of some sort. The whole book of Exodus is a commandment-rich environment, littered with other fierce orders to slay people for numberless minor offenses (including violations of the Sabbath) and also includes the sinister, ominous verse “Thou shalt not suffer [permit] a witch to live,” which was taken as a divine instruction by Christians until relatively recently in human history. Some work is obviously needed here: what is first-degree or third-degree killing and what isn’t? Distinguishing killing from murder is not a job easily left to mortals: what are we to do if God himself can’t tell the difference?</span></p><p class="paywall" data-dcnode-id="428"><strong data-dcnode-id="429"><span data-dcnode-id="430" instrument_node="">VII.</span></strong></p><p class="paywall" data-dcnode-id="424"><em data-dcnode-id="426"><span data-dcnode-id="427" instrument_node="">Thou shalt not commit adultery.</span></em><span data-dcnode-id="425" instrument_node=""> For some reason, “the seventh” is the only one of the commandments that is still widely known by its actual number. Extramarital carnal knowledge was probably more of a threat to society when families and tribes were closer-knit, and more bound by stern codes of honor. Having provided the raw material for most of the plays and novels ever published in non–Middle Eastern languages, adultery continues to be a great source of misery and joy and fascination. Most criminal codes have long given up the attempt to make it a punishable offense in law: its rewards and punishments are carefully administered by its practitioners and victims. It perhaps does not deserve to be classed with murder or theft or perjury, which brings us to:</span></p><p class="paywall" data-dcnode-id="421"><strong data-dcnode-id="422"><span data-dcnode-id="423" instrument_node="">VIII.</span></strong></p><p class="paywall" data-dcnode-id="417"><em data-dcnode-id="419"><span data-dcnode-id="420" instrument_node="">Thou shalt not steal.</span></em><span data-dcnode-id="418" instrument_node=""> Not much to query here. Those who have worked hard to acquire a bit of property are entitled to resent those who would rather steal than work, and when society evolves to the point where there is wealth that belongs to nobody—public or social property—those who plunder it for private gain are rightly regarded with hatred and contempt. Admittedly, the prosperity of some families and some states is also founded on original theft, but in that case the same principle of disapproval can apply.</span></p><div class="inline-recirc-wrapper inline-recirc-observer-target-3 viewport-monitor-anchor" data-attr-viewport-monitor="inline-recirc" data-dcnode-id="416" data-event-boundary="click" data-event-click="{&quot;pattern&quot;:&quot;InlineRecirc&quot;}" data-in-view="{&quot;pattern&quot;:&quot;InlineRecirc&quot;}" data-include-experiments="true"></div><p class="paywall" data-dcnode-id="413"><strong data-dcnode-id="414"><span data-dcnode-id="415" instrument_node="">IX.</span></strong></p><p class="paywall" data-dcnode-id="409"><em data-dcnode-id="411"><span data-dcnode-id="412" instrument_node="">Thou shalt not bear false witness against thy neighbor.</span></em><span data-dcnode-id="410" instrument_node=""> This is possibly the most sophisticated ruling in the whole Decalogue. Human society is inconceivable unless words are to some extent bonds, and in legal disputes we righteously demand the swearing of oaths that entail severe penalties for perjury. Until recently, much testimony before Congress was taken without witnesses being “sworn”: this allowed a great deal of official lying. Nothing focuses the attention more than a reminder that one is speaking on oath. The word “witness” expresses one of our noblest concepts. “Bearing witness” is a high moral responsibility.</span></p><p class="paywall" data-dcnode-id="407"><span data-dcnode-id="408" instrument_node="">Note, also, how relatively flexible this commandment is. Its fulcrum is the word “against.” If you are quite sure of somebody’s innocence and you shade the truth a little in the witness-box, you are no doubt technically guilty of perjury and may be privately troubled. But if you consciously lie in order to indict someone who is not guilty, you have done something irretrievably foul.</span></p></div></div></div><div class="GridItem-buSdEM gKfJBS grid--item grid-layout__aside" data-dcnode-id="394"><div class="StickyBoxWrapper-euhCxU hyXuto sticky-box" data-dcnode-id="395"><div class="StickyBoxPrimary-fEgDcn dFVkFO sticky-box__primary" data-dcnode-id="397"><div class="AdWrapper-fFweuL dIvDeZ ad ad--rail" data-dcnode-id="402"><div class="ad__slot ad__slot--rail" data-dcnode-id="403" data-node-id="9zni2"></div></div><div aria-hidden="true" class="ConsumerMarketingUnitThemedWrapper-kkMeXf hBFNZw consumer-marketing-unit consumer-marketing-unit--display-rail" data-dcnode-id="399" role="presentation"><div class="consumer-marketing-unit__slot consumer-marketing-unit__slot--display-rail" data-dcnode-id="401"></div><div class="journey-unit" data-dcnode-id="400"></div></div><div class="RecircMostPopularWrapper-laeRwu btOzvW recirc-most-popular-wrapper viewport-monitor-anchor" data-attr-viewport-monitor="" data-dcnode-id="398" data-event-boundary="click" data-event-click="{&quot;pattern&quot;:&quot;RecircMostPopular&quot;}" data-in-view="{&quot;pattern&quot;:&quot;RecircMostPopular&quot;}" data-include-experiments="true"></div></div><div class="StickyBoxPlaceholder-jNQMsI laMCLq" data-dcnode-id="396"></div></div></div></div><div class="RowWrapper-egDQBE hVsKfd full-bleed-ad row-mid-content-ad" data-dcnode-id="390"><div class="AdWrapper-fFweuL dIvDeZ ad ad--mid-content" data-dcnode-id="391"><div class="ad__slot ad__slot--mid-content" data-dcnode-id="392" data-node-id="2scvsq"></div></div></div><div class="GridWrapper-vNBSO jMumET grid grid-margins grid-items-2 ArticlePageChunksGrid-kRgPDq DBpfE grid-layout--adrail narrow wide-adrail" data-dcnode-id="340"><div class="GridItem-buSdEM PibmB grid--item grid-layout__content" data-dcnode-id="351"><div class="BodyWrapper-ctnerm eoZKFd body body__container article__body" data-dcnode-id="352" data-journey-hook="client-content" data-testid="BodyWrapper"><div class="body__inner-container" data-dcnode-id="353"><p class="paywall" data-dcnode-id="387"><strong data-dcnode-id="388"><span data-dcnode-id="389" instrument_node="">X.</span></strong></p><p class="paywall" data-dcnode-id="383"><em data-dcnode-id="385"><span data-dcnode-id="386" instrument_node="">Thou shalt not covet thy neighbor’s house, thou shalt not covet thy neighbor’s wife, nor his manservant, nor his maidservant, nor his ox, nor his ass, nor any thing that is thy neighbor’s.</span></em><span data-dcnode-id="384" instrument_node=""> There are several details that make this perhaps the most questionable of the commandments. Leaving aside the many jokes about whether or not it’s O.K. or kosher to covet thy neighbor’s wife’s ass, you are bound to notice once again that, like the Sabbath order, it’s addressed to the servant-owning and property-owning class. Moreover, it lumps the wife in with the rest of the chattel (and in that epoch could have been rendered as “thy neighbor’s wives,” to boot).</span></p><p class="paywall" data-dcnode-id="375"><span data-dcnode-id="382" instrument_node="">Notice also that no specific </span><em data-dcnode-id="380"><span data-dcnode-id="381" instrument_node="">act</span></em><span data-dcnode-id="379" instrument_node=""> is being pronounced as either compulsory (the Sabbath) or forbidden (perjury). Instead, this is the first but not the last introduction in the Bible of the totalitarian concept of “</span><em data-dcnode-id="377"><span data-dcnode-id="378" instrument_node="">thought crime.</span></em><span data-dcnode-id="376" instrument_node="">” You are being told, in effect, not even to think about it. (Jesus of Nazareth in the New Testament takes this a step further, announcing that those with lust in their heart have already committed the sin of adultery. In that case, you might as well be hung—or stoned—for a sheep as for a lamb, or for an ox or an ass if it cometh to that.) Wise lawmakers know that it is a mistake to promulgate legislation that is impossible to obey.</span></p><p class="paywall" data-dcnode-id="367"><span data-dcnode-id="374" instrument_node="">There are further objections to be made. From the “left” point of view, how is it moral to prohibit people from regarding the gains of the rich as ill-gotten, or from demanding a fairer distribution of wealth? From the “right” point of view, why is it wicked to be ambitious and acquisitive? And is not envy a great spur to emulation and competition? I once had a debate on these points with Rabbi Harold Kushner, author of that consoling text </span><em data-dcnode-id="372"><span data-dcnode-id="373" instrument_node="">When Bad Things Happen to Good People,</span></em><span data-dcnode-id="371" instrument_node=""> and he told me that there is a scholarly Talmudic argument, or </span><em data-dcnode-id="369"><span data-dcnode-id="370" instrument_node="">midrash,</span></em><span data-dcnode-id="368" instrument_node=""> maintaining that “neighbor” in this context really does mean immediate next-door neighbor. For that matter, there is persuasive textual argument that “neighbor” in much of the Bible means only “fellow Jew.” But it seems rather a waste of a commandment to confine it to either the Joneses or the Semites.</span></p><p class="has-dropcap paywall" data-dcnode-id="365"><span data-dcnode-id="366" instrument_node="">What emerges from the first review is this: the Ten Commandments were derived from situational ethics. They show every symptom of having been man-made and improvised under pressure. They are addressed to a nomadic tribe whose main economy is primitive agriculture and whose wealth is sometimes counted in people as well as animals. They are also addressed to a group that has been promised the land and flocks of other people: the Amalekites and Midianites and others whom God orders them to kill, rape, enslave, or exterminate. And this, too, is important because at every step of their arduous journey the Israelites are reminded to keep to the laws, not because they are right but just because they will lead them to become conquerors (of, as it happens, almost the only part of the Middle East that has no oil).</span></p><p class="paywall" data-dcnode-id="363"><span data-dcnode-id="364" instrument_node="">So, then: how to prune and how to amend? Numbers One through Three can simply go, since they have nothing to do with morality and are no more than a long, rasping throat clearing by an admittedly touchy dictator. Mere fear of unseen authority is not a sound basis for ethics. The associated ban on sculpture and pictorial art should also be lifted. Number Four can possibly stay, though rest periods are not exactly an ethical imperative and are mandated by practicality as much as by heaven. At least, if shorn of its first and third and fourth redundant verses (none of which can possibly apply to non-Jews), Number Four does imply that there are rights as well as duties. For millions of people for thousands of years, the Sabbath was made a dreary burden of obligation and strict observance instead of a day of leisure or recreation. It also led to absurd hypocrisies that seem to treat God as a fool: He won’t notice if we make the elevators stop on every floor so that no pious Jew needs to press a button. This is unwholesome and over-strenuous.</span></p><div class="inline-recirc-wrapper inline-recirc-observer-target-4 viewport-monitor-anchor" data-attr-viewport-monitor="inline-recirc" data-dcnode-id="362" data-event-boundary="click" data-event-click="{&quot;pattern&quot;:&quot;InlineRecirc&quot;}" data-in-view="{&quot;pattern&quot;:&quot;InlineRecirc&quot;}" data-include-experiments="true"></div><p class="paywall" data-dcnode-id="360"><span data-dcnode-id="361" instrument_node="">As for Number Five, by all means respect for the elders, but why is there nothing to forbid child abuse? (Insolence on the part of children is punishable by death, according to Leviticus 20:9, only a few verses before the stipulation of the death penalty for male homosexuals.) A cruel or rude child is a ghastly thing, but a cruel or brutal parent can do infinitely more harm. Yet even in a long and exhaustive list of prohibitions, parental sadism or neglect is never once condemned. Memo to Sinai: rectify this omission.</span></p><p class="paywall" data-dcnode-id="358"><span data-dcnode-id="359" instrument_node="">Number Six: Note that mere human systems have done better subsequently in distinguishing different moral scales of homicide. Memo to Sinai: Are you morally absolute or aren’t you? If so, what about the poor massacred Midianites?</span></p><p class="paywall" data-dcnode-id="356"><span data-dcnode-id="357" instrument_node="">Number Seven: Fair enough if you must, but is polygamy adultery? Also, could not permanent monogamy have been made slightly more consonant with human nature? Why create people with lust in their hearts? Then again, what about rape? It seems to be very strongly recommended, along with genocide, slavery, and infanticide, in Numbers 31:1–18, and surely constitutes a rather extreme version of sex outside marriage.</span></p><p class="paywall" data-dcnode-id="354"><span data-dcnode-id="355" instrument_node="">Numbers Eight and Nine: Admirable. Also brief and to the point, with one rather useful nuance in the keyword “against.”</span></p></div></div></div><div class="GridItem-buSdEM gKfJBS grid--item grid-layout__aside" data-dcnode-id="341"><div class="StickyBoxWrapper-euhCxU hyXuto sticky-box" data-dcnode-id="342"><div class="StickyBoxPrimary-fEgDcn dFVkFO sticky-box__primary" data-dcnode-id="344"><div class="AdWrapper-fFweuL dIvDeZ ad ad--rail" data-dcnode-id="349"><div class="ad__slot ad__slot--rail" data-dcnode-id="350" data-node-id="gcwsyb"></div></div><div aria-hidden="true" class="ConsumerMarketingUnitThemedWrapper-kkMeXf hBFNZw consumer-marketing-unit consumer-marketing-unit--display-rail" data-dcnode-id="346" role="presentation"><div class="consumer-marketing-unit__slot consumer-marketing-unit__slot--display-rail" data-dcnode-id="348"></div><div class="journey-unit" data-dcnode-id="347"></div></div><div class="RecircMostPopularWrapper-laeRwu btOzvW recirc-most-popular-wrapper viewport-monitor-anchor" data-attr-viewport-monitor="" data-dcnode-id="345" data-event-boundary="click" data-event-click="{&quot;pattern&quot;:&quot;RecircMostPopular&quot;}" data-in-view="{&quot;pattern&quot;:&quot;RecircMostPopular&quot;}" data-include-experiments="true"></div></div><div class="StickyBoxPlaceholder-jNQMsI laMCLq" data-dcnode-id="343"></div></div></div></div><div class="RowWrapper-egDQBE hVsKfd full-bleed-ad row-mid-content-ad" data-dcnode-id="337"><div class="AdWrapper-fFweuL dIvDeZ ad ad--mid-content" data-dcnode-id="338"><div class="ad__slot ad__slot--mid-content" data-dcnode-id="339" data-node-id="jmj4el"></div></div></div><div class="GridWrapper-vNBSO jMumET grid grid-margins grid-items-2 ArticlePageChunksGrid-kRgPDq DBpfE grid-layout--adrail narrow wide-adrail" data-dcnode-id="297"><div class="GridItem-buSdEM PibmB grid--item grid-layout__content" data-dcnode-id="307"><div class="BodyWrapper-ctnerm eoZKFd body body__container article__body" data-dcnode-id="308" data-journey-hook="client-content" data-testid="BodyWrapper"><div class="body__inner-container" data-dcnode-id="309"><p class="paywall" data-dcnode-id="335"><span data-dcnode-id="336" instrument_node="">Number Ten: Does wrong to women by making them property and also necessitates continual celestial wiretapping of private thoughts. Sinister and despotic in that it cannot be obeyed and thus makes sinners even of quite thoughtful people.</span></p><p class="paywall" data-dcnode-id="330"><span data-dcnode-id="334" instrument_node="">I am trying my best not to view things through a smug later prism. Only the Almighty can scan matters </span><em data-dcnode-id="332"><span data-dcnode-id="333" instrument_node="">sub specie aeternitatis:</span></em><span data-dcnode-id="331" instrument_node=""> from the viewpoint of eternity. One must also avoid cultural and historical relativism: there’s no point in retroactively ordering the Children of Israel to develop a germ theory of disease (so as to avoid mistaking plagues for divine punishments) or to understand astronomy (so as not to make foolish predictions and boasts based on the planets and stars). Still, if we think of the evils that afflict humanity today and that are man-made and not inflicted by nature, we would be morally numb if we did not feel strongly about genocide, slavery, rape, child abuse, sexual repression, white-collar crime, the wanton destruction of the natural world, and people who yak on cell phones in restaurants. (Also, people who commit simultaneous suicide and murder while screaming “God is great”: is that taking the Lord’s name in vain or is it not?)</span></p><p class="paywall" data-dcnode-id="310"><span data-dcnode-id="329" instrument_node="">It’s difficult to take oneself with sufficient seriousness to begin any sentence with the words “Thou shalt not.” But who cannot summon the confidence to say: </span><em data-dcnode-id="327"><span data-dcnode-id="328" instrument_node="">Do not</span></em><span data-dcnode-id="326" instrument_node=""> condemn people on the basis of their ethnicity or color. </span><em data-dcnode-id="324"><span data-dcnode-id="325" instrument_node="">Do not</span></em><span data-dcnode-id="323" instrument_node=""> ever use people as private property. Despise those who use violence or the threat of it in sexual relations. Hide your face and weep if you dare to harm a child. </span><em data-dcnode-id="321"><span data-dcnode-id="322" instrument_node="">Do not</span></em><span data-dcnode-id="320" instrument_node=""> condemn people for their inborn </span><em data-dcnode-id="318"><span data-dcnode-id="319" instrument_node="">nature</span></em><span data-dcnode-id="317" instrument_node="">—why would God create so many homosexuals only in order to torture and destroy them? Be aware that you too are an animal and dependent on the web of nature, and think and act accordingly. </span><em data-dcnode-id="315"><span data-dcnode-id="316" instrument_node="">Do not</span></em><span data-dcnode-id="314" instrument_node=""> imagine that you can escape judgment if you rob people with a false prospectus rather than with a knife. Turn off that fucking cell phone—you have no idea how </span><em data-dcnode-id="312"><span data-dcnode-id="313" instrument_node="">un</span></em><span data-dcnode-id="311" instrument_node="">important your call is to us. Denounce all jihadists and crusaders for what they are: psychopathic criminals with ugly delusions. Be willing to renounce any god or any religion if any holy commandments should contradict any of the above. In short: Do not swallow your moral code in tablet form.</span></p></div></div></div><div class="GridItem-buSdEM gKfJBS grid--item grid-layout__aside" data-dcnode-id="298"><div class="StickyBoxWrapper-euhCxU hyXuto sticky-box" data-dcnode-id="299"><div class="StickyBoxPrimary-fEgDcn dFVkFO sticky-box__primary" data-dcnode-id="301"><div class="AdWrapper-fFweuL dIvDeZ ad ad--rail" data-dcnode-id="305"><div class="ad__slot ad__slot--rail" data-dcnode-id="306" data-node-id="ai2fh4"></div></div><div aria-hidden="true" class="ConsumerMarketingUnitThemedWrapper-kkMeXf hBFNZw consumer-marketing-unit consumer-marketing-unit--display-rail" data-dcnode-id="302" role="presentation"><div class="consumer-marketing-unit__slot consumer-marketing-unit__slot--display-rail" data-dcnode-id="304"></div><div class="journey-unit" data-dcnode-id="303"></div></div></div><div class="StickyBoxPlaceholder-jNQMsI laMCLq" data-dcnode-id="300"></div></div></div></div></div><div class="GridWrapper-vNBSO jMumET grid grid-margins grid-items-2 PaywallInlineBarrierWithWrapperGrid-gqzRWW iCxbFx grid-layout--adrail narrow wide-adrail" data-dcnode-id="287"><div class="GridItem-buSdEM PibmB grid--item grid-layout__content" data-dcnode-id="288"><div class="body body__inline-barrier article__body" data-dcnode-id="289"><div class="container container--body" data-dcnode-id="290"><div class="container--body-inner" data-dcnode-id="291"><aside class="PaywallInlineBarrierWrapper-bpaAxo lhNbqc" data-dcn
