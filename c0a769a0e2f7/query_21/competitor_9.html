</span><p align="justify" data-dcnode-id="3455"><span data-dcnode-id="3456" instrument_node="">The Prophet Hosea rebuked the house of Israel for bearing 
strange children: </span></p><span data-dcnode-id="3454" instrument_node="">
</span><blockquote data-dcnode-id="3446"><span data-dcnode-id="3453" instrument_node="">
</span><p align="justify" data-dcnode-id="3448"><span data-dcnode-id="3452" instrument_node="">"They have dealt treacherously against YHVH: for </span><b data-dcnode-id="3450"><span data-dcnode-id="3451" instrument_node="">they have 
begotten strange children</span></b><span data-dcnode-id="3449" instrument_node="">…." (Hosea 5:7).</span></p><span data-dcnode-id="3447" instrument_node="">
</span></blockquote><span data-dcnode-id="3445" instrument_node="">
</span><p align="justify" data-dcnode-id="3443"><span data-dcnode-id="3444" instrument_node="">Until very recently, miscegenation was almost unheard of -- a 
historic anomaly. But in the last fifty years, like homosexuality, it has become 
more and more culturally acceptable. This alone should cause people to question 
it. If it had been Biblically acceptable all along, why has it taken nearly two 
millennia for Christians to get it correct? </span></p><span data-dcnode-id="3442" instrument_node="">
</span><p align="justify" data-dcnode-id="3437"><span data-dcnode-id="3441" instrument_node="">Typical of people who have rejected their Biblical moorings 
and who, more often than not, call good evil and evil good (Isaiah 5:20), 
today’s multicultural society condemns segregation as racist and hateful and 
promotes miscegenation as something good. Man’s desire to integrate and 
miscegenate will ultimately destroy the different races and their cultures. In 
contrast, </span><b data-dcnode-id="3439"><span data-dcnode-id="3440" instrument_node="">YEHOVAH’s Biblical design for man to segregate and remain pure protects 
and perpetuates the different races and their cultures</span></b><span data-dcnode-id="3438" instrument_node="">. </span></p><span data-dcnode-id="3436" instrument_node="">
</span><p align="justify" data-dcnode-id="3434"><span data-dcnode-id="3435" instrument_node="">Miscegenation adulterates the races, mixing two seeds that 
YEHOVAH God never intended to be mixed. </span></p><span data-dcnode-id="3433" instrument_node="">
</span><p align="center" data-dcnode-id="3430"><b data-dcnode-id="3431"><span data-dcnode-id="3432" instrument_node="">Answering the Critics’ Objections</span></b></p><span data-dcnode-id="3429" instrument_node="">
</span><p align="justify" data-dcnode-id="3424"><span data-dcnode-id="3428" instrument_node="">In an effort to counter the Scriptures’ prohibitions against 
miscegenation, people often provide supposed examples of race mixing in the 
Bible. Although Moses and Zipporah, Moses and Adoniah, Joseph and Asenath, 
Salmon and Rahab, and Boaz and Ruth are often exploited as Biblically sanctioned 
precedents for interracial relationships, none of these instances represent race 
mixing for the simple reason that in each of these five instances </span><b data-dcnode-id="3426"><span data-dcnode-id="3427" instrument_node="">the husband 
and wife were from the same race</span></b><span data-dcnode-id="3425" instrument_node="">. </span></p><span data-dcnode-id="3423" instrument_node="">
</span><p align="justify" data-dcnode-id="3420"><b data-dcnode-id="3421"><span data-dcnode-id="3422" instrument_node="">Moses and Zipporah</span></b></p><span data-dcnode-id="3419" instrument_node="">
</span><blockquote data-dcnode-id="3411"><span data-dcnode-id="3418" instrument_node="">
</span><p align="justify" data-dcnode-id="3416"><span data-dcnode-id="3417" instrument_node="">"…A man of the house of Levi…took to wife a daughter of 
Levi. And the woman conceived, and bare a son….And she [Pharaoh’s daughter] 
called his name Moses…." (Exodus 2:1-10).</span></p><span data-dcnode-id="3415" instrument_node="">
</span><p align="justify" data-dcnode-id="3413"><span data-dcnode-id="3414" instrument_node="">"Now the priest of Midian…gave Moses Zipporah his daughter" 
(Exodus 2:16-21).</span></p><span data-dcnode-id="3412" instrument_node="">
</span></blockquote><span data-dcnode-id="3410" instrument_node="">
</span><p align="justify" data-dcnode-id="3408"><span data-dcnode-id="3409" instrument_node="">Only one race is represented in the marriage of Moses and 
Zipporah. Moses was a descendant of Abraham, an Israelite from the tribe of 
Levi. Zipporah was a Midianite, a descendant from Abraham through his wife 
Keturah’s fourth son Midian: </span></p><span data-dcnode-id="3407" instrument_node="">
</span><blockquote data-dcnode-id="3402"><span data-dcnode-id="3406" instrument_node="">
</span><p align="justify" data-dcnode-id="3404"><span data-dcnode-id="3405" instrument_node="">"Then again Abraham took a wife, and her name was Keturah. And 
she bare him…Midian…." (Genesis 25:1-2).</span></p><span data-dcnode-id="3403" instrument_node="">
</span></blockquote><span data-dcnode-id="3401" instrument_node="">
</span><p align="justify" data-dcnode-id="3398"><b data-dcnode-id="3399"><span data-dcnode-id="3400" instrument_node="">Moses and Adoniah</span></b></p><span data-dcnode-id="3397" instrument_node="">
</span><blockquote data-dcnode-id="3392"><span data-dcnode-id="3396" instrument_node="">
</span><p align="justify" data-dcnode-id="3394"><span data-dcnode-id="3395" instrument_node="">"And Miriam and Aaron spake against Moses because of the 
Ethiopian woman whom he had married…." (Numbers 12:1).</span></p><span data-dcnode-id="3393" instrument_node="">
</span></blockquote><span data-dcnode-id="3391" instrument_node="">
</span><p align="justify" data-dcnode-id="3379"><span data-dcnode-id="3390" instrument_node="">This woman was not Moses’ wife Zipporah as many people have 
supposed. She was a woman by the name of Adoniah (Jasher 73:31), who, according 
to some English versions of the Bible, is purported to be an Ethiopian. However, 
“Ethiopian,” as it has been rendered in the King James Version, is a poor 
translation of the Hebrew word </span><i data-dcnode-id="3388"><span data-dcnode-id="3389" instrument_node="">Kuwshiyt</span></i><span data-dcnode-id="3387" instrument_node="">. </span><i data-dcnode-id="3384"><b data-dcnode-id="3385"><span data-dcnode-id="3386" instrument_node="">Strong’s Concordance</span></b></i><span data-dcnode-id="3383" instrument_node=""> defines
</span><i data-dcnode-id="3381"><span data-dcnode-id="3382" instrument_node="">Kuwshiyt</span></i><span data-dcnode-id="3380" instrument_node="">:
</span></p><span data-dcnode-id="3378" instrument_node="">
</span><blockquote data-dcnode-id="3371"><span data-dcnode-id="3377" instrument_node="">
</span><p align="justify" data-dcnode-id="3373"><span data-dcnode-id="3376" instrument_node="">"…Patronymically from OT:3568; a Cushite, or descendant of 
Cush." </span><b data-dcnode-id="3374"><span data-dcnode-id="3375" instrument_node="">[19]</span></b></p><span data-dcnode-id="3372" instrument_node="">
</span></blockquote><span data-dcnode-id="3370" instrument_node="">
</span><p align="justify" data-dcnode-id="3368"><span data-dcnode-id="3369" instrument_node="">The Cushites were descendants of Cush, Noah’s grandson by 
Ham: </span></p><span data-dcnode-id="3367" instrument_node="">
</span><blockquote data-dcnode-id="3362"><span data-dcnode-id="3366" instrument_node="">
</span><p align="justify" data-dcnode-id="3364"><span data-dcnode-id="3365" instrument_node="">"And the sons of Ham; Cush, and Mizraim, and Phut, and Canaan" 
(Genesis 10:6).</span></p><span data-dcnode-id="3363" instrument_node="">
</span></blockquote><span data-dcnode-id="3361" instrument_node="">
</span><p align="justify" data-dcnode-id="3359"><span data-dcnode-id="3360" instrument_node="">Cush’s father Ham was a brother of Noah’s firstborn son Shem, 
a progenitor of the Israelites. Therefore, Ham’s descendants, including Cush, 
were from the same race as Shem’s descendants through Abraham, Isaac, and Jacob.
</span></p><span data-dcnode-id="3358" instrument_node="">
</span><p align="justify" data-dcnode-id="3356"><span data-dcnode-id="3357" instrument_node="">If Adoniah was a racial Cushite, she would have been of the 
same race as Moses. There is reason to believe, however, that she was not a 
Cushite but a Canaanite. Although it is not a part of the canonized Scripture, 
the book of Jasher, cited in Joshua 10:13 and 2 Samuel 1:18 and referenced in 2 
Timothy 3:8, provides the following pertinent information concerning Moses and 
Adoniah’s relationship during Moses’ exile from Egypt after he had delivered the 
Cushites from the children of Aram: </span></p><span data-dcnode-id="3355" instrument_node="">
</span><blockquote data-dcnode-id="3350"><span data-dcnode-id="3354" instrument_node="">
</span><p align="justify" data-dcnode-id="3352"><span data-dcnode-id="3353" instrument_node="">"…They [the Cushites] gave him [Moses] for a wife Adoniah the 
Cushite queen, wife of Kikianus [deceased king of the Cushites]. And Moses 
feared the LORD God of his fathers, so that he came not to her, nor did he turn 
eyes to her. For Moses remembered how Abraham had made his servant Eliezer 
swear, saying unto him, Thou shalt not take a woman from the daughters of Canaan 
[half brother of Cush] for my son Isaac. Also what Isaac did when Jacob had fled 
from his brother, when he commanded him, saying, Thou shalt not take a wife from 
the daughters of Canaan…." (Jasher 73:31-34).</span></p><span data-dcnode-id="3351" instrument_node="">
</span></blockquote><span data-dcnode-id="3349" instrument_node="">
</span><p align="justify" data-dcnode-id="3344"><span data-dcnode-id="3348" instrument_node="">Apparently Adoniah was of Canaanite descent, a Cushite only 
by citizenship. Although Moses accepted her as a gift from the Cushites, he 
never cohabited with her, knowing that by YEHOVAH’s law he was forbidden to do 
so. For those who would argue that Numbers 12:1 states that Moses married Adoniah, the Hebrew word 
</span><i data-dcnode-id="3346"><span data-dcnode-id="3347" instrument_node="">laaqaach</span></i><span data-dcnode-id="3345" instrument_node="">, translated “marriage,” simply means “took” 
and does not necessarily imply marriage. </span></p><span data-dcnode-id="3343" instrument_node="">
</span><p align="justify" data-dcnode-id="3340"><b data-dcnode-id="3341"><span data-dcnode-id="3342" instrument_node="">Joseph and Asenath</span></b></p><span data-dcnode-id="3339" instrument_node="">
</span><blockquote data-dcnode-id="3334"><span data-dcnode-id="3338" instrument_node="">
</span><p align="justify" data-dcnode-id="3336"><span data-dcnode-id="3337" instrument_node="">"And Pharaoh called Joseph’s name Zaphnath-paaneah; and he 
gave him to wife Asenath the daughter of Poti-pherah priest of On…." (Genesis 
41:45).</span></p><span data-dcnode-id="3335" instrument_node="">
</span></blockquote><span data-dcnode-id="3333" instrument_node="">
</span><p align="justify" data-dcnode-id="3328"><span data-dcnode-id="3332" instrument_node="">Asenath, although not specifically identified as such, was 
most likely an Egyptian. Psalm 78:50-51, 105:23-27, and 106:21-22 affirm that 
</span><b data-dcnode-id="3330"><span data-dcnode-id="3331" instrument_node="">the Egyptians of that day were Hamites</span></b><span data-dcnode-id="3329" instrument_node="">.* Joseph was an Israelite, a descendant 
of Shem, the first-born son of Noah, and Asenath was a Hamite, a descendant of 
Ham, the second-born son of Noah. Only one race was represented in Joseph’s 
marriage to Asenath. </span></p><span data-dcnode-id="3327" instrument_node="">
</span><p align="justify" data-dcnode-id="3320"><span data-dcnode-id="3326" instrument_node="">*The Israelites in Genesis 50:11, Moses in Exodus 2:19, and 
Paul in Acts 21:38 were all misidentified as Egyptians. </span><b data-dcnode-id="3324"><span data-dcnode-id="3325" instrument_node="">The Egyptians, or Hamites</span></b><span data-dcnode-id="3323" instrument_node="">, obviously, looked very similar in appearance to the Shemites, from whom 
the Israelites were descended. The Shemites and Hamites were both descended from 
Noah and his wife, through Noah’s sons, Shem and Ham. This destroys the 
hypothesis that Hamites were black. </span><b data-dcnode-id="3321"><span data-dcnode-id="3322" instrument_node="">Because Hamites looked like Shemites, they 
had to have been white like the Israelites.</span></b></p><span data-dcnode-id="3319" instrument_node="">
</span><p align="justify" data-dcnode-id="3316"><b data-dcnode-id="3317"><span data-dcnode-id="3318" instrument_node="">Salmon and Rahab</span></b></p><span data-dcnode-id="3315" instrument_node="">
</span><blockquote data-dcnode-id="3310"><span data-dcnode-id="3314" instrument_node="">
</span><p align="justify" data-dcnode-id="3312"><span data-dcnode-id="3313" instrument_node="">"And Salmon [a Judahite] begat Booz [Boaz] of Rachab [Rahab]…." 
(Matthew 1:5).</span></p><span data-dcnode-id="3311" instrument_node="">
</span></blockquote><span data-dcnode-id="3309" instrument_node="">
</span><p align="justify" data-dcnode-id="3307"><span data-dcnode-id="3308" instrument_node="">Rahab is often alleged to be the Canaanite who helped the two 
Israelites spies escape from Jericho. There is no conclusive proof, however, 
that the Rahab who helped the Israelite spies in Joshua 2 is the same woman 
Salmon married, or that she was even of Canaanite descent. Rahab is never 
identified as a Canaanite. Although she lived in the Canaanite city of Jericho, 
it is speculation to identify her as a Canaanite from this fact alone. As an 
example, Moses, who was unquestionably an Israelite, was identified as an 
Egyptian by the daughters of Reuel: </span></p><span data-dcnode-id="3306" instrument_node="">
</span><blockquote data-dcnode-id="3301"><span data-dcnode-id="3305" instrument_node="">
</span><p align="justify" data-dcnode-id="3303"><span data-dcnode-id="3304" instrument_node="">"And when they came to Reuel their father…they said, An 
Egyptian delivered us out of the hand of the shepherds…." (Exodus 2:18-19).</span></p><span data-dcnode-id="3302" instrument_node="">
</span></blockquote><span data-dcnode-id="3300" instrument_node="">
</span><p align="justify" data-dcnode-id="3298"><span data-dcnode-id="3299" instrument_node="">Moses was known as an Egyptian, not because he came from the 
loins of the Egyptians, but because he came from the land of Egypt. </span></p><span data-dcnode-id="3297" instrument_node="">
</span><p align="justify" data-dcnode-id="3295"><span data-dcnode-id="3296" instrument_node="">Because Rahab is listed in the book of Hebrews -- in the 
Hebrew hall of fame no less (Hebrews 11:31) -- she was very possibly an Israelite 
slave who resided in Jericho (Numbers 21:1). This could perhaps explain why the 
two Israelite spies sought her out and also why the king of Jericho suspected 
her of harboring them (Joshua 2:1-3). </span></p><span data-dcnode-id="3294" instrument_node="">
</span><p align="justify" data-dcnode-id="3292"><span data-dcnode-id="3293" instrument_node="">It makes no difference whether the Rahab from Jericho was a 
Canaanite. Even if Rahab were a racial Canaanite, two races were not represented 
in Salmon’s marriage to Rahab. As already established, the Canaanites, although 
a forbidden lineage, were descendants of Ham, the brother of Shem who was a 
progenitor of the Israelites. Rahab and Salmon were from the same race and, 
therefore, their marriage was not interracial. </span></p><span data-dcnode-id="3291" instrument_node="">
</span><p align="justify" data-dcnode-id="3288"><b data-dcnode-id="3289"><span data-dcnode-id="3290" instrument_node="">Boaz and Ruth</span></b></p><span data-dcnode-id="3287" instrument_node="">
</span><blockquote data-dcnode-id="3282"><span data-dcnode-id="3286" instrument_node="">
</span><p align="justify" data-dcnode-id="3284"><span data-dcnode-id="3285" instrument_node="">"…And Booz [a Judahite] begat Obed of Ruth" (Matthew 1:5).</span></p><span data-dcnode-id="3283" instrument_node="">
</span></blockquote><span data-dcnode-id="3281" instrument_node="">
</span><p align="justify" data-dcnode-id="3279"><span data-dcnode-id="3280" instrument_node="">Ruth, a resident of Moab, is identified five times as a 
Moabitess in Ruth 1:22, 2:2, 2:21, 4:5, and 4:10. Once again, even if Ruth were 
a racial Moabite, she was not from another race. The Moabites were descendants 
of Abraham’s nephew Lot (Genesis 12:5) through his incestuous relationship with 
his eldest daughter: </span></p><span data-dcnode-id="3278" instrument_node="">
</span><blockquote data-dcnode-id="3273"><span data-dcnode-id="3277" instrument_node="">
</span><p align="justify" data-dcnode-id="3275"><span data-dcnode-id="3276" instrument_node="">"And Lot…dwelt in the mountain, and his two daughters with 
him….And they made their father drink wine that night: and the firstborn went 
in, and lay with her father…. And the firstborn bare a son, and called his name 
Moab: the same is the father of the Moabites…." (Genesis 19:30-37).</span></p><span data-dcnode-id="3274" instrument_node="">
</span></blockquote><span data-dcnode-id="3272" instrument_node="">
</span><p align="justify" data-dcnode-id="3270"><span data-dcnode-id="3271" instrument_node="">Only one race is represented in Boaz and Ruth’s marriage. In 
fact, there is no reason to even conclude that Ruth was a racial Moabite. She 
could not have been a racial Moabite for the same reason that Rahab could not 
have been a racial Canaanite: the Israelites were forbidden to intermarry with 
the Moabites. It was for this very reason that Ezra commanded the Judahites to 
put away their Moabite companions: </span></p><span data-dcnode-id="3269" instrument_node="">
</span><blockquote data-dcnode-id="3264"><span data-dcnode-id="3268" instrument_node="">
</span><p align="justify" data-dcnode-id="3266"><span data-dcnode-id="3267" instrument_node="">"…The people of Israel…have not separated themselves from 
the people of the lands…even of the Canaanites, the Hittites, the Perizzites, 
the Jebusites, the Ammonites, the Moabites….For they have taken of their 
daughters for themselves, and for their sons: so that the holy seed have mingled 
themselves with the people of those lands….Now therefore give not your 
daughters unto their sons, neither take their daughters unto your sons…." (Ezra 
9:1-12).</span></p><span data-dcnode-id="3265" instrument_node="">
</span></blockquote><span data-dcnode-id="3263" instrument_node="">
</span><p align="justify" data-dcnode-id="3261"><span data-dcnode-id="3262" instrument_node="">Had Ruth been a racial Moabite, Boaz would have been required 
to put Ruth away, if he had even married her in the first place. Ruth must have 
been known as a Moabite because she had lived in the country of Moab, a 
possession of the Reubenites at that time. </span></p><span data-dcnode-id="3260" instrument_node="">
</span><p align="justify" data-dcnode-id="3258"><span data-dcnode-id="3259" instrument_node="">Evidence that Ruth was a Moabite by residence rather than by 
physical descent was demonstrated when Boaz applied the levirate law to her. The 
levirate law requires Israelite men to raise up a male heir for a deceased 
kinsman, in order to preserve his name and estate: </span></p><span data-dcnode-id="3257" instrument_node="">
</span><blockquote data-dcnode-id="3249"><span data-dcnode-id="3256" instrument_node="">
</span><p align="justify" data-dcnode-id="3254"><span data-dcnode-id="3255" instrument_node="">"If brethren dwell together, and one of them die, and have no 
child, the wife of the dead shall not marry without unto a stranger: her 
husband’s brother [or “nigh of kin,” Leviticus 25:48-49] shall go in unto her, 
and take her to him to wife, and perform the duty of an husband’s brother unto 
her. And it shall be, that the firstborn which she beareth shall succeed in the 
name of his brother which is dead, that his name be not put out of Israel" 
(Deuteronomy 25:5-6).</span></p><span data-dcnode-id="3253" instrument_node="">
</span><p align="justify" data-dcnode-id="3251"><span data-dcnode-id="3252" instrument_node="">"And he [Boaz] said, Who art thou? And she answered, I am Ruth…thou art a near kinsman. And he said,…it is true that I am thy near kinsman: 
howbeit…will I do the part of a kinsman to thee…." (Ruth 3:9-13).</span></p><span data-dcnode-id="3250" instrument_node="">
</span></blockquote><span data-dcnode-id="3248" instrument_node="">
</span><p align="justify" data-dcnode-id="3246"><span data-dcnode-id="3247" instrument_node="">Had Ruth been from the forbidden lineage of Moab or from 
another race, the levirate law would not have applied because her previous 
relationship with Boaz’s kinsman Mahlon would have been unlawful and, therefore, 
adulterous. Had Ruth been a racial Moabite, the nearer kinsman (Ruth 3:12, 
4:5-6) would have only needed to raise this objection to keep from having to 
redeem Ruth along with Mahlon’s land. </span></p><span data-dcnode-id="3245" instrument_node="">
</span><p align="justify" data-dcnode-id="3243"><span data-dcnode-id="3244" instrument_node="">Ruth must have been an Israelite, or at least a descendant of 
a racially alike lineage with whom the Israelites were permitted to marry. 
Otherwise, Mahlon’s estate, in part or in whole, would have been lost to a 
non-Israelite descendant, which was one of the reasons that prompted Ezra to 
command the Judahites to put away their Moabite and other foreign wives in Ezra 
9:1 - 10:3. </span></p><span data-dcnode-id="3242" instrument_node="">
</span><p align="justify" data-dcnode-id="3240"><span data-dcnode-id="3241" instrument_node="">For the point under discussion, it does not make any 
difference whether Ruth was an Israelite or a Moabite. In either instance, she 
was of the same race as Boaz her husband. </span></p><span data-dcnode-id="3239" instrument_node="">
</span><p align="center" data-dcnode-id="3236"><b data-dcnode-id="3237"><span data-dcnode-id="3238" instrument_node="">The Idolatry Argument</span></b></p><span data-dcnode-id="3235" instrument_node="">
</span><p align="justify" data-dcnode-id="3229"><span data-dcnode-id="3234" instrument_node="">People who condone miscegenation often argue that the Old 
Testament prohibitions were only to protect Israel from the idolatry that was 
being promoted by the non-Israelites at that time. This assertion is reflected 
in the following article published in the December 1995 installment of </span><b data-dcnode-id="3231"><i data-dcnode-id="3232"><span data-dcnode-id="3233" instrument_node="">Home Life</span></i></b><span data-dcnode-id="3230" instrument_node=""> 
magazine’s “Ask Mike and Mary” column: </span></p><span data-dcnode-id="3228" instrument_node="">
</span><blockquote data-dcnode-id="3212"><span data-dcnode-id="3227" instrument_node="">
</span><p align="justify" data-dcnode-id="3222"><span data-dcnode-id="3226" instrument_node="">"</span><b data-dcnode-id="3224"><span data-dcnode-id="3225" instrument_node="">Q.</span></b><span data-dcnode-id="3223" instrument_node=""> What does the Bible teach about interracial relationships 
or mixed marriages? I am concerned my 13-year-old daughter may be headed in that 
direction. I have told her this is wrong and I do not approve. The Church 
doesn’t seem to address this problem. Could this be a sign of a more deep-rooted 
problem? Do you think I should worry?</span></p><span data-dcnode-id="3221" instrument_node="">
</span><p align="justify" data-dcnode-id="3214"><span data-dcnode-id="3220" instrument_node="">"</span><b data-dcnode-id="3218"><span data-dcnode-id="3219" instrument_node="">A.</span></b><span data-dcnode-id="3217" instrument_node=""> Your question is one that concerns many parents. We would 
welcome a passage clearly instructing our children not to mix with other races 
when they date or marry. That would make our parenting assignment easier. The 
trouble is, I just don’t believe the Bible makes that statement. It does not 
support the idea of keeping race as a dividing line. True, in Deuteronomy 7:3 
the Israelites were told specifically not to marry the members of the nations 
they would encounter when they would occupy the promised land. But the next 
verse clarifies this warning. It is not about race; it is about faith in the 
true God…." </span><b data-dcnode-id="3215"><span data-dcnode-id="3216" instrument_node="">[20]</span></b></p><span data-dcnode-id="3213" instrument_node="">
</span></blockquote><span data-dcnode-id="3211" instrument_node="">
</span><p align="justify" data-dcnode-id="3209"><span data-dcnode-id="3210" instrument_node="">Consider Deuteronomy 17:1-4 and its idolatry implications:
</span></p><span data-dcnode-id="3208" instrument_node="">
</span><blockquote data-dcnode-id="3203"><span data-dcnode-id="3207" instrument_node="">
</span><p align="justify" data-dcnode-id="3205"><span data-dcnode-id="3206" instrument_node="">"When YHVH thy God shall bring thee [the nation of Israel] 
into the land whither thou goest to possess it, and hath cast out many nations 
before thee, the Hittites, and the Girgashites, and the Amorites, and the 
Canaanites, and the Perizzites, and the Hivites, and the Jebusites…thou shalt 
make no…marriages with them; thy daughter thou shalt not give unto his son, 
nor his daughter shalt thou take unto thy son. For they will turn away thy son 
from following me, that they may serve other gods: so will the anger of YHVH be 
kindled against you, and destroy thee suddenly" (Deuteronomy 7:1-4).</span></p><span data-dcnode-id="3204" instrument_node="">
</span></blockquote><span data-dcnode-id="3202" instrument_node="">
</span><p align="justify" data-dcnode-id="3191"><span data-dcnode-id="3201" instrument_node="">In Ecclesiastes 1:9, King Solomon declared “that which has 
been is that which will be, and that which has been done is that which will be 
done. So, there is nothing new under the sun.” Even if idolatry were the only 
reason for this prohibition, its consequences still remain. In 1776, 
approximately 2.5 million people lived in America. More than 99 percent of the 
population was white Christian Israelite </span><b data-dcnode-id="3199"><span data-dcnode-id="3200" instrument_node="">[21]</span></b><span data-dcnode-id="3198" instrument_node=""> Protestants. The remaining one 
percent was collectively represented by 20,000 Catholics, 3,000 non-Israelite 
Jews, </span><b data-dcnode-id="3196"><span data-dcnode-id="3197" instrument_node="">[21]</span></b><span data-dcnode-id="3195" instrument_node=""> and a few deists. In light of these figures and present-day 
demographics, it is a fact that the more non-Israelite immigrants allowed to 
enter and remain in the United States, the less Christian this nation becomes. 
</span><b data-dcnode-id="3193"><span data-dcnode-id="3194" instrument_node="">The more racially mixed and multicultural America becomes, the more pluralistic 
she becomes, and the more pluralistic she becomes, the more heathen she becomes.
</span></b><span data-dcnode-id="3192" instrument_node="">
</span></p><span data-dcnode-id="3190" instrument_node="">
</span><p align="justify" data-dcnode-id="3184"><span data-dcnode-id="3189" instrument_node="">In her book </span><b data-dcnode-id="3186"><i data-dcnode-id="3187"><span data-dcnode-id="3188" instrument_node="">The Official Guide to the American Marketplace</span></i></b><span data-dcnode-id="3185" instrument_node="">, 
demographics specialist Cheryl Russell confirmed this paganizing of America: </span></p><span data-dcnode-id="3183" instrument_node="">
</span><blockquote data-dcnode-id="3176"><span data-dcnode-id="3182" instrument_node="">
</span><p align="justify" data-dcnode-id="3178"><span data-dcnode-id="3181" instrument_node="">"Immigration will slowly change the nation’s [predominately 
Christian] religious affiliation….Because most of the nation’s immigrants are 
from Mexico…the Roman Catholic church is likely to gain adherents. The influx 
of Asian immigrants should boost the share of Americans who are Buddhist or 
Hindu." </span><b data-dcnode-id="3179"><span data-dcnode-id="3180" instrument_node="">[22]</span></b></p><span data-dcnode-id="3177" instrument_node="">
</span></blockquote><span data-dcnode-id="3175" instrument_node="">
</span><p align="justify" data-dcnode-id="3173"><span data-dcnode-id="3174" instrument_node="">Martin E. Marty, a nationally acclaimed demographics expert, 
also confirmed this inevitable consequence of mixing the races: </span></p><span data-dcnode-id="3172" instrument_node="">
</span><p align="justify" data-dcnode-id="3168"><span data-dcnode-id="3171" instrument_node="">"No one noticed it at the time, but the biggest event 
affecting pluralism [the increasing multi-religious composition of the United 
States] was in 1965, when immigration quotas that favored Europeans were 
altered." </span><b data-dcnode-id="3169"><span data-dcnode-id="3170" instrument_node="">[23]</span></b></p><span data-dcnode-id="3167" instrument_node="">
</span><p align="justify" data-dcnode-id="3165"><span data-dcnode-id="3166" instrument_node="">The Bible repeatedly declares that YEHOVAH is the God of the 
Israelites. In other words, YEHOVAH is the innate God of ONLY the Israelites. 
Without the religious influence of the Israelites, non-Israelites naturally 
serve other gods. It is a sad commentary that when Israelites mix with other 
races, they usually turn to the gods of the people with whom they mix. Nothing 
has changed since Deuteronomy 7. </span></p><span data-dcnode-id="3164" instrument_node="">
</span><p align="center" data-dcnode-id="3161"><b data-dcnode-id="3162"><span data-dcnode-id="3163" instrument_node="">No Proselyte Exceptions</span></b></p><span data-dcnode-id="3160" instrument_node="">
</span><p align="justify" data-dcnode-id="3158"><span data-dcnode-id="3159" instrument_node="">Faith in the true God is central to the Bible’s prohibitions 
against mixing with forbidden lineages, but it is not the only reason for racial 
segregation. If it were, the Bible would provide exceptions for believers among 
the forbidden nations. No exception clause for believers can be found in 
Deuteronomy 7 or anywhere else. Consider again Ezra’s instructions: </span></p><span data-dcnode-id="3157" instrument_node="">
</span><blockquote data-dcnode-id="3152"><span data-dcnode-id="3156" instrument_node="">
</span><p align="justify" data-dcnode-id="3154"><span data-dcnode-id="3155" instrument_node="">"…The princes came to me, saying, The people of Israel…have 
not separated themselves from the people of the lands, doing according to their 
abominations….For they have taken of their daughters for themselves, and for 
their sons: so that the holy seed have mingled themselves…O my God…we have 
forsaken thy commandments….Now therefore give not your daughters unto their 
sons, neither take their daughters unto your sons.…Should we again break thy 
commandments, and join in affinity with the people of these abominations?…Shechaniah…answered and said unto Ezra, We have trespassed against our God, 
and have taken strange wives of the people of the land….Now therefore let us 
make a covenant with our God to put away all the wives, and such as are born of 
them…let it be done according to the law" (Ezra 9:1-10:3).</span></p><span data-dcnode-id="3153" instrument_node="">
</span></blockquote><span data-dcnode-id="3151" instrument_node="">
</span><p align="justify" data-dcnode-id="3149"><span data-dcnode-id="3150" instrument_node="">Ezra and Shechaniah made no exceptions for foreign wives who 
had converted to YEHOVAH God or for children who might have been spiritually 
influenced by their Israelite fathers. Most Christians completely overlook this 
important fact.</span></p><span data-dcnode-id="3148" instrument_node="">
</span><p align="center" data-dcnode-id="3145"><b data-dcnode-id="3146"><span data-dcnode-id="3147" instrument_node="">Additional Reasons for Racial Purity</span></b></p><span data-dcnode-id="3144" instrument_node="">
</span><p align="justify" data-dcnode-id="3142"><span data-dcnode-id="3143" instrument_node="">In addition to idolatry, Ezra provided two more reasons for 
the Israelites to separate from the other nations listed in Ezra 9: </span></p><span data-dcnode-id="3141" instrument_node="">
</span><blockquote data-dcnode-id="3136"><span data-dcnode-id="3140" instrument_node="">
</span><p align="justify" data-dcnode-id="3138"><span data-dcnode-id="3139" instrument_node="">"…They have taken of their daughters for themselves, and for 
their sons: so that the holy seed [race, NASV] have mingled themselves with the 
people of those lands…." (Ezra 9:2).</span></p><span data-dcnode-id="3137" instrument_node="">
</span></blockquote><span data-dcnode-id="3135" instrument_node="">
</span><p align="justify" data-dcnode-id="3133"><span data-dcnode-id="3134" instrument_node="">Mixed relationships were condemned by Ezra not only because 
they polluted the religion of the Israelites, but because they also polluted or 
adulterated the genes of the Israelites. </span></p><span data-dcnode-id="3132" instrument_node="">
</span><p align="justify" data-dcnode-id="3130"><span data-dcnode-id="3131" instrument_node="">Verse 12 provides another explanation for why the Israelites 
were commanded to separate from their foreign wives: </span></p><span data-dcnode-id="3129" instrument_node="">
</span><blockquote data-dcnode-id="3124"><span data-dcnode-id="3128" instrument_node="">
</span><p align="justify" data-dcnode-id="3126"><span data-dcnode-id="3127" instrument_node="">"…Give not your daughters unto their sons, neither take their 
daughters unto your sons, nor seek their peace or their wealth for ever: that ye 
may be strong, and eat the good of the land, and leave it for an inheritance to 
your children for ever" (Ezra 9:12).</span></p><span data-dcnode-id="3125" instrument_node="">
</span></blockquote><span data-dcnode-id="3123" instrument_node="">
</span><p align="justify" data-dcnode-id="3121"><span data-dcnode-id="3122" instrument_node="">If these mixed relationships had been allowed to continue, 
Israel’s land inheritance would have been in jeopardy of being lost or turned 
over to the mixed progeny born to these relationships. This would have occurred 
even if both parents of these mixed-blood children or the children themselves 
were believers in YEHOVAH God. Israel would have been dispossessed of her land. </span></p><span data-dcnode-id="3120" instrument_node="">
</span><p align="justify" data-dcnode-id="3118"><span data-dcnode-id="3119" instrument_node="">Hosea addressed the same problem: </span></p><span data-dcnode-id="3117" instrument_node="">
</span><blockquote data-dcnode-id="3109"><span data-dcnode-id="3116" instrument_node="">
</span><p align="justify" data-dcnode-id="3114"><span data-dcnode-id="3115" instrument_node="">"They have dealt treacherously against YHVH: for they have 
begotten strange children: now shall a month devour them with their portions" 
(Hosea 5:7).</span></p><span data-dcnode-id="3113" instrument_node="">
</span><p align="justify" data-dcnode-id="3111"><span data-dcnode-id="3112" instrument_node="">"Strangers have devoured his strength, and he knoweth it not…." 
(Hosea 7:9).</span></p><span data-dcnode-id="3110" instrument_node="">
</span></blockquote><span data-dcnode-id="3108" instrument_node="">
</span><p align="justify" data-dcnode-id="3106"><span data-dcnode-id="3107" instrument_node="">The same thing is occurring throughout the world today. 
Birthright, history, posterity, and future spurned through miscegenation can 
never be recovered. Once a child has been conceived and born from a mixed-race 
relationship, no one can go back and change it. </span></p><span data-dcnode-id="3105" instrument_node="">
</span><p align="center" data-dcnode-id="3102"><b data-dcnode-id="3103"><span data-dcnode-id="3104" instrument_node="">False Accusations</span></b></p><span data-dcnode-id="3101" instrument_node="">
</span><p align="justify" data-dcnode-id="3099"><span data-dcnode-id="3100" instrument_node="">It is politically incorrect to teach that race-mixing is 
Biblically prohibited. This emotionally charged issue is a lightning rod for 
false accusations from non-Christians and Christians alike. People who believe 
that miscegenation is Biblically immoral and who promote the separation and 
purity of the different races are often accused of racism, hatred, and even 
white supremacy. The basis for such accusations is emotional rather than 
rational or Biblical. </span></p><span data-dcnode-id="3098" instrument_node="">
</span><p align="justify" data-dcnode-id="3096"><span data-dcnode-id="3097" instrument_node="">People who promote integration and miscegenation of the 
different races are advancing a position that ultimately destroys the purity and 
distinct culture of each race. People who promote the separation and purity of 
the races are advancing a position that promotes the perpetuation and 
preservation of the races and their distinct cultures. It should be very obvious 
which position demonstrates less respect and concern for the people of other 
races. </span></p><span data-dcnode-id="3095" instrument_node="">
</span><p align="center" data-dcnode-id="3092"><b data-dcnode-id="3093"><span data-dcnode-id="3094" instrument_node="">Genocide</span></b></p><span data-dcnode-id="3091" instrument_node="">
</span><p align="justify" data-dcnode-id="3085"><span data-dcnode-id="3090" instrument_node="">Genocide, as defined by </span><b data-dcnode-id="3087"><i data-dcnode-id="3088"><span data-dcnode-id="3089" instrument_node="">Random House Webster’s College 
Dictionary</span></i></b><span data-dcnode-id="3086" instrument_node="">, is the inevitable outcome of miscegenation: </span></p><span data-dcnode-id="3084" instrument_node="">
</span><blockquote data-dcnode-id="3077"><span data-dcnode-id="3083" instrument_node="">
</span><p align="justify" data-dcnode-id="3079"><span data-dcnode-id="3082" instrument_node="">"…The deliberate and systematic extermination of a national, 
racial, political, or cultural group." </span><b data-dcnode-id="3080"><span data-dcnode-id="3081" instrument_node="">[24]</span></b></p><span data-dcnode-id="3078" instrument_node="">
</span></blockquote><span data-dcnode-id="3076" instrument_node="">
</span><p align="justify" data-dcnode-id="3070"><span data-dcnode-id="3075" instrument_node="">The </span><b data-dcnode-id="3072"><i data-dcnode-id="3073"><span data-dcnode-id="3074" instrument_node="">Winnipeg Free Press</span></i></b><span data-dcnode-id="3071" instrument_node=""> contained an article by Gwynne Dyer 
entitled “Tiger Wood’s description of himself says it all. The future is light 
brown”: </span></p><span data-dcnode-id="3069" instrument_node="">
</span><blockquote data-dcnode-id="3056"><span data-dcnode-id="3068" instrument_node="">
</span><p align="justify" data-dcnode-id="3066"><span data-dcnode-id="3067" instrument_node="">"Just under three-quarters of the present American population 
(73.1 per cent) is classified as 'non-Hispanic white' by the United States 
Census Bureau. But within 50 years, it predicts, white America will be barely 
half the population (52.8 percent)….</span></p><span data-dcnode-id="3065" instrument_node="">
</span><p align="justify" data-dcnode-id="3063"><span data-dcnode-id="3064" instrument_node="">"The U.S. Census Bureau is almost certainly wrong. The man who 
has it right is Tiger Woods…who…outraged practically everybody by announcing 
on the Oprah Winfrey show that he does not see himself as black, but a 
	'Cablinasian'…a word that describes what may be the largest American 'race' by 
2050: A mixed-race group in various shades of light brown that combines the 
genetic heritage of most major groups on the planet. Canada promises to be an 
even more comprehensive mixture, and Australia and even Britain are moving in 
the same direction.</span></p><span data-dcnode-id="3062" instrument_node="">
</span><p align="justify" data-dcnode-id="3058"><span data-dcnode-id="3061" instrument_node="">"Woods made up the word 'Cablinasian' because he had no word 
to describe himself. His father had one white, one native Indian and two black 
grandparents, and his mother was half Chinese, half Thai. 'Growing up, I came up 
with this name -- I’m a Cablinasian,' Woods explained -- a mix of Caucasian, 
black, Indian, and Asian." </span><b data-dcnode-id="3059"><span data-dcnode-id="3060" instrument_node="">[25]</span></b></p><span data-dcnode-id="3057" instrument_node="">
</span></blockquote><span data-dcnode-id="3055" instrument_node="">
</span><p align="justify" data-dcnode-id="3053"><span data-dcnode-id="3054" instrument_node="">Woods’ admission that there is no word to describe himself 
does indeed say it all. Dyer’s article pointed out that mixed marriages are not 
only increasing among Caucasians but also, to a much greater degree, among other 
races: </span></p><span data-dcnode-id="3052" instrument_node="">
</span><blockquote data-dcnode-id="3042"><span data-dcnode-id="3051" instrument_node="">
</span><p align="justify" data-dcnode-id="3049"><span data-dcnode-id="3050" instrument_node="">"…In America, the racial walls are breaking down. Only four 
per cent of U.S. marriages are inter-racial, but that bald figure conceals a 
huge generational shift. In the ’40s and ’50s, less than two per cent of black 
men married white women. In the past decade, the figure has soared to nearly 10 
per cent. And other non-white Americans, who do not suffer the special prejudice 
that weighs on African-American descendants of former slaves, are now [1997] 
	'marrying out' at a staggering rate.</span></p><span data-dcnode-id="3048" instrument_node="">
</span><p align="justify" data-dcnode-id="3044"><span data-dcnode-id="3047" instrument_node="">"Some 60 per cent of Asian-born Americans in their 20s marry 
somebody of another race, and nearly 70 per cent of native American Indians 
under the age of 25 are doing the same. 'In recent years the proportion of both 
men and women from all racial groups who "marry out" has increased,' concluded 
University of Michigan demographer Reynolds Farley in a study published last 
month." </span><b data-dcnode-id="3045"><span data-dcnode-id="3046" instrument_node="">[26]</span></b></p><span data-dcnode-id="3043" instrument_node="">
</span></blockquote><span data-dcnode-id="3041" instrument_node="">
</span><p align="justify" data-dcnode-id="3035"><span data-dcnode-id="3040" instrument_node="">The </span><b data-dcnode-id="3037"><i data-dcnode-id="3038"><span data-dcnode-id="3039" instrument_node="">Century Dictionary and Cyclopedia</span></i></b><span data-dcnode-id="3036" instrument_node=""> defines miscegenation:
</span></p><span data-dcnode-id="3034" instrument_node="">
</span><blockquote data-dcnode-id="3027"><span data-dcnode-id="3033" instrument_node="">
</span><p align="justify" data-dcnode-id="3029"><span data-dcnode-id="3032" instrument_node="">"…Mixture or amalgamation of races: applied especially to 
sexual union between individuals of the black and white races. Individuals 
sometimes show a desperate desire for miscegenation, but they indulge in it 
always at the expense of a loss of the respect of both races." </span><b data-dcnode-id="3030"><span data-dcnode-id="3031" instrument_node="">[27]</span></b></p><span data-dcnode-id="3028" instrument_node="">
</span></blockquote><span data-dcnode-id="3026" instrument_node="">
</span><p align="justify" data-dcnode-id="3021"><span data-dcnode-id="3025" instrument_node="">Not only is the white race being destroyed through 
miscegenation at a staggering rate, but so are the blacks, Asians, and other 
races. </span><b data-dcnode-id="3023"><span data-dcnode-id="3024" instrument_node="">Racial segregation and purity benefit all, not just whites. </span></b><span data-dcnode-id="3022" instrument_node=""> </span></p><span data-dcnode-id="3020" instrument_node="">
</span><p align="justify" data-dcnode-id="3015"><span data-dcnode-id="3019" instrument_node="">Dyer declared, “The ‘melting pot’ is finally working, even in 
the U.S.” The melting pot may well be working, but not to the betterment of 
everyone involved. What it is working toward is </span><b data-dcnode-id="3017"><span data-dcnode-id="3018" instrument_node="">the genocide of all races and 
their distinct cultures</span></b><span data-dcnode-id="3016" instrument_node="">. </span></p><span data-dcnode-id="3014" instrument_node="">
</span><p align="justify" data-dcnode-id="3008"><span data-dcnode-id="3013" instrument_node="">The </span><b data-dcnode-id="3010"><i data-dcnode-id="3011"><span data-dcnode-id="3012" instrument_node="">San Ramon Valley Times</span></i></b><span data-dcnode-id="3009" instrument_node=""> ran an article entitled “Working 
toward one race.” Author Stephen Magagnini wrote of the search for identity by 
those born from multi-racial relationships: </span></p><span data-dcnode-id="3007" instrument_node="">
</span><blockquote data-dcnode-id="3000"><span data-dcnode-id="3006" instrument_node="">
</span><p align="justify" data-dcnode-id="3002"><span data-dcnode-id="3005" instrument_node="">"SACRAMENTO -- On a recent night, the Madrone Room of Berkley’s 
MLK Student Center is overflowing with young people on a quest for identity, 
acceptance and a new way of looking at race. They are checking out the Hapa 
Issues Forum, a 5-year-old organization for people of mixed race." </span><b data-dcnode-id="3003"><span data-dcnode-id="3004" instrument_node="">[28]</span></b></p><span data-dcnode-id="3001" instrument_node="">
</span></blockquote><span data-dcnode-id="2999" instrument_node="">
</span><p align="justify" data-dcnode-id="2997"><span data-dcnode-id="2998" instrument_node="">The fact that these young people of mixed race are on a 
“quest for identity” indicates a problem in itself. They have no identity, no 
race, and no culture with which to relate. Magagnini continued his observations:
</span></p><span data-dcnode-id="2996" instrument_node="">
</span><blockquote data-dcnode-id="2989"><span data-dcnode-id="2995" instrument_node="">
</span><p align="justify" data-dcnode-id="2991"><span data-dcnode-id="2994" instrument_node="">"There are now more than 1.5 million interracial couples in 
America and 2 million mixed-race children, according to the census….More than 
70 percent of American Indians, 60 percent of Japanese-Americans and many 
California Hispanics and Filipinos marry people of other races or ethnic groups. 
Their children are redefining California culture and religion." </span><b data-dcnode-id="2992"><span data-dcnode-id="2993" instrument_node="">[29]</span></b></p><span data-dcnode-id="2990" instrument_node="">
</span></blockquote><span data-dcnode-id="2988" instrument_node="">
</span><p align="justify" data-dcnode-id="2986"><span data-dcnode-id="2987" instrument_node="">Children from interracial relationships have to redefine 
their culture and religion because the heritage that might have been theirs has 
been destroyed through miscegenation. </span></p><span data-dcnode-id="2985" instrument_node="">
</span><p align="justify" data-dcnode-id="2983"><span data-dcnode-id="2984" instrument_node="">From 1960 to 1990, according to the U.S. Census, marriages 
between blacks and whites increased by 400 percent and marriages between whites 
and Asians increased nearly 1,000 percent. In 1970 there were 310,000 
interracially married couples in the United States. By 1998 that number had 
increased to 1.6 million, according to a 1998 population survey. As staggering 
as this increase is, it has only gotten worse in the years since. </span></p><span data-dcnode-id="2982" instrument_node="">
</span><p align="justify" data-dcnode-id="2978"><b data-dcnode-id="2980"><span data-dcnode-id="2981" instrument_node="">Everyone, no matter what his race, needs to take a stand on 
this issue and condemn this abomination</span></b><span data-dcnode-id="2979" instrument_node=""> that is quickly becoming an epidemic 
both here in the United States and abroad. Unless we turn the tide, 
miscegenation will destroy the races and their individual cultures. </span></p><span data-dcnode-id="2977" instrument_node="">
</span><p align="justify" data-dcnode-id="2975"><span data-dcnode-id="2976" instrument_node="">Lack of respect for one’s own race and the uniqueness of the 
other races promotes integration, miscegenation, and the ultimate eradication of 
the different races. Those who would have us believe that this disrespect is 
actually love are perhaps best described by the Prophet Isaiah: </span></p><span data-dcnode-id="2974" instrument_node="">
</span><blockquote data-dcnode-id="2969"><span data-dcnode-id="2973" instrument_node="">
</span><p align="justify" data-dcnode-id="2971"><span data-dcnode-id="2972" instrument_node="">"Woe unto them that call evil good, and good evil; that put 
darkness for light, and light for darkness; that put bitter for sweet, and sweet 
for bitter!" (Isaiah 5:20).</span></p><span data-dcnode-id="2970" instrument_node="">
</span></blockquote><span data-dcnode-id="2968" instrument_node="">
</span><p align="justify" data-dcnode-id="2966"><span data-dcnode-id="2967" instrument_node="">The brazen promotion and practice of miscegenation is a clear 
sign of our modern world’s rapid progression into depravity. If we are to change 
the direction that our nation is presently headed, we must determine to be true 
to our God, His laws, our ancestors, ourselves, our children, and our race. </span></p><span data-dcnode-id="2965" instrument_node="">
</span><p align="center" data-dcnode-id="2962"><b data-dcnode-id="2963"><span data-dcnode-id="2964" instrument_node="">Homosexuality</span></b></p><span data-dcnode-id="2961" instrument_node="">
</span><blockquote data-dcnode-id="2956"><span data-dcnode-id="2960" instrument_node="">
</span><p align="justify" data-dcnode-id="2958"><span data-dcnode-id="2959" instrument_node="">"Thou shalt not lie with mankind, as with womankind: it is 
abomination" (Leviticus 18:22).</span></p><span data-dcnode-id="2957" instrument_node="">
</span></blockquote><span data-dcnode-id="2955" instrument_node="">
</span><p align="justify" data-dcnode-id="2952"><b data-dcnode-id="2953"><span data-dcnode-id="2954" instrument_node="">Perversion</span></b></p><span data-dcnode-id="2951" instrument_node="">
</span><p align="justify" data-dcnode-id="2946"><span data-dcnode-id="2950" instrument_node="">The fact that society has been more disposed to label 
homosexuality a perversion than they have other sexual iniquities has Biblical 
precedence. Leviticus 18:26-30 collectively identifies all the sexual sins 
listed therein as abominations, but only homosexuality is specifically singled 
out with the same designation. </span><b data-dcnode-id="2948"><span data-dcnode-id="2949" instrument_node="">Genesis 13:13 describes sodomites as exceedingly 
wicked sinners</span></b><span data-dcnode-id="2947" instrument_node="">, and Genesis 18:20 identifies their sin as very grievous to 
YEHOVAH God, a description that, in the Bible, is used exclusively for homosexuality.
</span></p><span data-dcnode-id="2945" instrument_node="">
</span><p align="justify" data-dcnode-id="2937"><span data-dcnode-id="2944" instrument_node="">The New Testament uses the Greek word </span><i data-dcnode-id="2942"><span data-dcnode-id="2943" instrument_node="">pornea</span></i><span data-dcnode-id="2941" instrument_node="">, translated

</span><blockquote data-dcnode-id="2928"><span data-dcnode-id="2935" instrument_node="">
</span><p align="justify" data-dcnode-id="2930"><span data-dcnode-id="2934" instrument_node="">"Even as Sodom and Gomorrha…giving themselves over to

</span></blockquote><span data-dcnode-id="2927" instrument_node="">
</span><p align="justify" data-dcnode-id="2923"><i data-dcnode-id="2925"><span data-dcnode-id="2926" instrument_node="">Ekporneusasai </span></i><span data-dcnode-id="2924" instrument_node="">is defined by James Strong and Joseph Thayer:
</span></p><span data-dcnode-id="2922" instrument_node="">
</span><blockquote data-dcnode-id="2907"><span data-dcnode-id="2921" instrument_node="">
</span><p align="justify" data-dcnode-id="2917"><span data-dcnode-id="2920" instrument_node="">"…To be utterly unchaste." </span><b data-dcnode-id="2918"><span data-dcnode-id="2919" instrument_node="">[30]</span></b></p><span data-dcnode-id="2916" instrument_node="">
</span><p align="justify" data-dcnode-id="2909"><span data-dcnode-id="2915" instrument_node="">"…the prefix </span><i data-dcnode-id="2913"><span data-dcnode-id="2914" instrument_node="">ek</span></i><span data-dcnode-id="2912" instrument_node=""> seems to indicate a lust that gluts itself,

</span></blockquote><span data-dcnode-id="2906" instrument_node="">
</span><p align="center" data-dcnode-id="2903"><b data-dcnode-id="2904"><span data-dcnode-id="2905" instrument_node="">Calling Evil Good and Good Evil</span></b></p><span data-dcnode-id="2902" instrument_node="">
</span><p align="justify" data-dcnode-id="2900"><span data-dcnode-id="2901" instrument_node="">Without YEHOVAH’s law, we have no standard by which to

</span><p align="justify" data-dcnode-id="2897"><span data-dcnode-id="2898" instrument_node="">This moral deterioration is evidenced by the many politicians 
and citizens who invert nearly everything, calling good evil and evil good --

</span><blockquote data-dcnode-id="2889"><span data-dcnode-id="2895" instrument_node="">
</span><p align="justify" data-dcnode-id="2891"><span data-dcnode-id="2894" instrument_node="">"Confidential to Heartbroken Mother of a Boy With a Twisted

</span></blockquote><span data-dcnode-id="2888" instrument_node="">
</span><p align="justify" data-dcnode-id="2879"><span data-dcnode-id="2887" instrument_node="">The National Education Association (NEA) -- which has a

</span><i data-dcnode-id="2884"><b data-dcnode-id="2885"><span data-dcnode-id="2886" instrument_node="">Homophobia and Education: How to Deal with Name Calling</span></b></i><span data-dcnode-id="2883" instrument_node="">, designed for classroom

</span><p align="justify" data-dcnode-id="2862"><span data-dcnode-id="2865" instrument_node="">"…3. Is it possible your heterosexuality is just a phase you

</span><p align="justify" data-dcnode-id="2852"><span data-dcnode-id="2853" instrument_node="">"Woe unto them that call evil good, and good evil…! Woe unto

</span><p align="justify" data-dcnode-id="2844"><span data-dcnode-id="2848" instrument_node="">In 1 Kings 15:11-12 and 2 Kings 23:7, </span><b data-dcnode-id="2846"><span data-dcnode-id="2847" instrument_node="">YEHOVAH God commended Kings Asa and Josiah for purging the land of sodomites</span></b><span data-dcnode-id="2845" instrument_node="">, as per His law. Unlike the

</span><p align="justify" data-dcnode-id="2838"><span data-dcnode-id="2842" instrument_node="">The underlying reason homosexuality has become an accepted

</span></blockquote><span data-dcnode-id="2824" instrument_node="">
</span><p align="justify" data-dcnode-id="2812"><span data-dcnode-id="2823" instrument_node="">Upon release of its October 1993 edition of </span><b data-dcnode-id="2820"><i data-dcnode-id="2821"><span data-dcnode-id="2822" instrument_node="">The Church and

</span><p align="justify" data-dcnode-id="2807"><span data-dcnode-id="2810" instrument_node="">Over 70 bishops of the Episcopal Church signed a “Statement

</span><p align="justify" data-dcnode-id="2221"><span data-dcnode-id="2225" instrument_node="">The idea of legalizing prostitution is periodically discussed

</span></b><span data-dcnode-id="2222" instrument_node="">
</span></p><span data-dcnode-id="2220" instrument_node="">
</span><p align="justify" data-dcnode-id="2215"><span data-dcnode-id="2219" instrument_node="">YEHOVAH views prostitution as so grievous a sin that </span><b data-dcnode-id="2217"><span data-dcnode-id="2218" instrument_node="">He

</span><blockquote data-dcnode-id="2209"><span data-dcnode-id="2213" instrument_node="">
</span><p align="justify" data-dcnode-id="2211"><span data-dcnode-id="2212" instrument_node="">"In the twilight, in the evening, in the black and dark night…there met him a woman with the attire of an harlot, and subtle [cunning, NASV]

</span></blockquote><span data-dcnode-id="2208" instrument_node="">
</span><p align="justify" data-dcnode-id="2206"><span data-dcnode-id="2207" instrument_node="">Verse 26 declares that many strong men have been slain by

</span><blockquote data-dcnode-id="2197"><span data-dcnode-id="2204" instrument_node="">
</span><p align="justify" data-dcnode-id="2202"><span data-dcnode-id="2203" instrument_node="">"Lust not after her beauty in thine heart; neither let her

</span></blockquote><span data-dcnode-id="2196" instrument_node="">
</span><p align="justify" data-dcnode-id="2194"><span data-dcnode-id="2195" instrument_node="">The apostle Paul admonished the Corinthian Christians to flee

</span><p align="justify" data-dcnode-id="2191"><span data-dcnode-id="2192" instrument_node="">Prostitutes are not the only guilty parties in this sin. King

</span><blockquote data-dcnode-id="2185"><span data-dcnode-id="2189" instrument_node="">
</span><p align="justify" data-dcnode-id="2187"><span data-dcnode-id="2188" instrument_node="">"For at the window of my house I looked through my casement,

</span><p align="justify" data-dcnode-id="2176"><span data-dcnode-id="2183" instrument_node="">Such a man is not only a simpleton -- </span><b data-dcnode-id="2181"><span data-dcnode-id="2182" instrument_node="">he is a pervert,

</span><p align="center" data-dcnode-id="2164"><b data-dcnode-id="2165"><span data-dcnode-id="2166" instrument_node="">The “Victimless” Crime</span></b></p><span data-dcnode-id="2163" instrument_node="">
</span><p align="justify" data-dcnode-id="2161"><span data-dcnode-id="2162" instrument_node="">It is a travesty that prostitution is often described as the

</span><p align="justify" data-dcnode-id="2154"><span data-dcnode-id="2159" instrument_node="">Seldom do we hear the statistics regarding the abuse to 
prostitutes themselves. In a </span><i data-dcnode-id="2156"><b data-dcnode-id="2157"><span data-dcnode-id="2158" instrument_node="">Reader’s Digest </span></b></i><span data-dcnode-id="2155" instrument_node="">article entitled “Why the Shocking 
Rise in Prostitution?,” Nathan M. Adams provides the following quotation: </span></p><span data-dcnode-id="2153" instrument_node="">
</span><blockquote data-dcnode-id="2146"><span data-dcnode-id="2152" instrument_node="">
</span><p align="justify" data-dcnode-id="2148"><span data-dcnode-id="2151" instrument_node="">“'Many judges and prosecutors consider prostitution a 
	"victimless crime,”' says former Washington police chief Maurice Cullinane. 
	'Time after time, I have asked them to increase fines and award jail time, but

</span></blockquote><span data-dcnode-id="2145" instrument_node="">
</span><p align="justify" data-dcnode-id="2139"><span data-dcnode-id="2144" instrument_node="">In an article entitled “The Truth on Prostitution” by Amanda 
Smith, </span><b data-dcnode-id="2141"><i data-dcnode-id="2142"><span data-dcnode-id="2143" instrument_node="">The Rocky Mountain News</span></i></b><span data-dcnode-id="2140" instrument_node=""> reported the following: </span></p><span data-dcnode-id="2138" instrument_node="">
</span><blockquote data-dcnode-id="2128"><span data-dcnode-id="2137" instrument_node="">
</span><p align="justify" data-dcnode-id="2135"><span data-dcnode-id="2136" instrument_node="">"There is a class of people in this country who are regularly 
beaten, tortured, raped, kidnapped, bought, sold, traded and jailed. They are 
poor, addicted and homeless. They live in every town. Most of us barely know 
they are there. Those of us who do know tend to snicker. They’re called 
prostitutes.</span></p><span data-dcnode-id="2134" instrument_node="">
</span><p align="justify" data-dcnode-id="2130"><span data-dcnode-id="2133" instrument_node="">"The Council for Prostitution Alternatives in Portland, Ore., 
offers these stomach-churning statistics from women in their program: The age 
when they entered prostitution ranged from 1 to 34. 78% have been raped, an 
average of 46 times a year. 84% assaulted, an average of 103 times a year. 49% 
kidnapped by pimps or customers, 10 times a year. 55% tortured. 27% mutilated. 
65% have attempted suicide. 87% have been homeless." </span><b data-dcnode-id="2131"><span data-dcnode-id="2132" instrument_node="">[65]</span></b></p><span data-dcnode-id="2129" instrument_node="">
</span></blockquote><span data-dcnode-id="2127" instrument_node="">
</span><p align="justify" data-dcnode-id="2125"><span data-dcnode-id="2126" instrument_node="">Not included in these figures is the devastation wreaked by 
venereal diseases. Hardly a prostitute alive has not been infected with venereal

</span><p align="center" data-dcnode-id="2121"><b data-dcnode-id="2122"><span data-dcnode-id="2123" instrument_node="">The Solution</span></b></p><span data-dcnode-id="2120" instrument_node="">
</span><p align="justify" data-dcnode-id="2118"><span data-dcnode-id="2119" instrument_node="">King Solomon provided the means for avoiding the siren song 
of prostitutes: </span></p><span data-dcnode-id="2117" instrument_node="">
</span><blockquote data-dcnode-id="2109"><span data-dcnode-id="2116" instrument_node="">
</span><p align="justify" data-dcnode-id="2114"><span data-dcnode-id="2115" instrument_node="">"For the commandment is a lamp; and the law is light; and 
reproofs of instruction are the way of life: To keep thee from the evil woman, 
from the flattery of the tongue of a strange woman" (Proverbs 6:23-24).</span></p><span data-dcnode-id="2113" instrument_node="">
</span><p align="justify" data-dcnode-id="2111"><span data-dcnode-id="2112" instrument_node="">"My son, keep my words, and lay up my commandments with thee. 
Keep my commandments, and live; and my law as the apple of thine eye. Bind them
