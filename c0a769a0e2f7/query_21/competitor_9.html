the adulteress shall surely be put to death. And the man that lieth with his 
father’s wife hath uncovered his father’s nakedness: both of them shall surely 
be put to death; their blood shall be upon them. And if a man lie with his 
daughter in law, both of them shall surely be put to death: they have wrought 
confusion; their blood shall be upon them. </span></p><span data-dcnode-id="1421" instrument_node="">
</span><p align="justify" data-dcnode-id="1416"><span data-dcnode-id="1420" instrument_node="">"If a man also lie with mankind, as he lieth with a woman, both of them have committed an abomination: they shall 
surely be put to death; their blood shall be upon them. And if a man take a wife 
and her mother, it is wickedness: they shall be </span><b data-dcnode-id="1418"><span data-dcnode-id="1419" instrument_node="">burnt with fire</span></b><span data-dcnode-id="1417" instrument_node="">, both he and 
they; that there be no wickedness among you. And if a man lie with a beast, he 
shall surely be put to death: and ye shall slay the beast. And if a woman 
approach unto any beast, and lie down thereto, thou shalt kill the woman, and 
the beast: they shall surely be put to death; their blood shall be upon them" 
(Leviticus 20:10-16 *).</span></p><span data-dcnode-id="1415" instrument_node="">
</span></blockquote><span data-dcnode-id="1413" instrument_node="">
</span><p align="justify" data-dcnode-id="1408"><span data-dcnode-id="1412" instrument_node="">*The phrase “</span><b data-dcnode-id="1410"><span data-dcnode-id="1411" instrument_node="">burnt with fire</span></b><span data-dcnode-id="1409" instrument_node="">” in verse 14 is probably 
referring to what is to be done with the corpse following the stoning, as was 
done with Achan’s body in Joshua 7:15-25.</span></p><span data-dcnode-id="1407" instrument_node="">
</span><p align="justify" data-dcnode-id="1398"><span data-dcnode-id="1406" instrument_node="">This and other Old Testament passages reveal that YEHOVAH’s 
view of adultery is so loathsome that it requires the death penalty. </span><b data-dcnode-id="1404"><span data-dcnode-id="1405" instrument_node="">[74]</span></b><span data-dcnode-id="1403" instrument_node=""> The 
</span><b data-dcnode-id="1400"><i data-dcnode-id="1401"><span data-dcnode-id="1402" instrument_node="">Universal Jewish Encyclopedia</span></i></b><span data-dcnode-id="1399" instrument_node=""> sheds light on a possible reason why adultery is 
seldom punished at all any longer: </span></p><span data-dcnode-id="1397" instrument_node="">
</span><blockquote data-dcnode-id="1371"><span data-dcnode-id="1396" instrument_node="">
</span><p align="justify" data-dcnode-id="1394"><span data-dcnode-id="1395" instrument_node="">"Actual capital punishment for adultery ceased when the Second 
Temple was destroyed (70 C.E.)….During the Gaonic period the culprit was 
flogged, his head and beard were shaven, and he was excommunicated for a 
period….Where Jews had a measure of autonomy in the Middle Ages the adulterer 
was punished by flagellation, imprisonment or exile.…</span></p><span data-dcnode-id="1393" instrument_node="">
</span><p align="justify" data-dcnode-id="1373"><span data-dcnode-id="1392" instrument_node="">"The rabbis…received many 
requests from confessed adulterers for a suitable program of penance. The 
earliest and most famous of these programs are those of Eliezer of Worms and 
Judah of Regensburg (</span><b data-dcnode-id="1389"><i data-dcnode-id="1390"><span data-dcnode-id="1391" instrument_node="">Sefer Hasidim</span></i></b><span data-dcnode-id="1388" instrument_node="">, edit. Margulies, No. 167) of the 12th cent., 
who advised bathing in icy waters in winter time, exposure to the bites of 
insects, and frequent fasting. Maharam of Lublin (</span><b data-dcnode-id="1385"><i data-dcnode-id="1386"><span data-dcnode-id="1387" instrument_node="">Responsum</span></i></b><span data-dcnode-id="1384" instrument_node=""> no. 45) went to the 
length of advising fasting for an entire year (eating only at night), refraining 
from meat and wine, sleeping on hard surfaces, and letting oneself be flogged 
daily. Ezekiel Landau (18th cent.) and others placed more stress on 
self-abasement, the study of Torah and the performance of charitable deeds 
(</span><i data-dcnode-id="1381"><b data-dcnode-id="1382"><span data-dcnode-id="1383" instrument_node="">Responsa</span></b></i><span data-dcnode-id="1380" instrument_node="">, vol. I; </span><b data-dcnode-id="1377"><i data-dcnode-id="1378"><span data-dcnode-id="1379" instrument_node="">Orah Hayim</span></i></b><span data-dcnode-id="1376" instrument_node="">, no. 35)." </span><b data-dcnode-id="1374"><span data-dcnode-id="1375" instrument_node="">[75]</span></b></p><span data-dcnode-id="1372" instrument_node="">
</span></blockquote><span data-dcnode-id="1370" instrument_node="">
</span><p align="justify" data-dcnode-id="1368"><span data-dcnode-id="1369" instrument_node="">As time has marched on, the rejection of YEHOVAH’s judgment 
has only become more entrenched. Modern society has become so tolerant of 
adultery that even a misdemeanor judgment against this sin is protested: </span></p><span data-dcnode-id="1367" instrument_node="">
</span><blockquote data-dcnode-id="1350"><span data-dcnode-id="1366" instrument_node="">
</span><p align="justify" data-dcnode-id="1360"><span data-dcnode-id="1365" instrument_node="">"</span><i data-dcnode-id="1362"><b data-dcnode-id="1363"><span data-dcnode-id="1364" instrument_node="">The Charlotte (N.C.) Observer</span></b></i><span data-dcnode-id="1361" instrument_node="">: Taylorsville, N.C. 
	-- A judge’s 
decision to charge an Alexander County couple with adultery under a seldom-used 
1805 law could cause havoc in the courts, some lawyers say. District Court Judge 
Jimmy Myers of Davie County issued the charges…shocking lawyers and others in 
the Alexander County courtroom…. “This statute is rarely ever prosecuted by 
private citizens or by judges, mainly because a substantial part of our 
population violate it,” said Chas Coltrane, chairman of the Family Law Section 
of the North Carolina Bar Association….</span></p><span data-dcnode-id="1359" instrument_node="">
</span><p align="justify" data-dcnode-id="1357"><span data-dcnode-id="1358" instrument_node="">"The adultery law -- which prohibits a man and woman who aren’t 
married to each other to “lewdly and lasciviously associate, bed and cohabit 
together” -- is prosecuted a few times each year in North Carolina….Violating it 
is a misdemeanor; prison time is only possible if the defendant has prior 
criminal convictions….</span></p><span data-dcnode-id="1356" instrument_node="">
</span><p align="justify" data-dcnode-id="1352"><span data-dcnode-id="1355" instrument_node="">“'The way people are living, it is (outdated) …,' said Sen. 
John Garwood, R-Wilkes…." </span><b data-dcnode-id="1353"><span data-dcnode-id="1354" instrument_node="">[76]</span></b></p><span data-dcnode-id="1351" instrument_node="">
</span></blockquote><span data-dcnode-id="1349" instrument_node="">
</span><p align="justify" data-dcnode-id="1347"><span data-dcnode-id="1348" instrument_node="">According to Chairman Coltrane and Senator Garwood, sin 
should be overlooked entirely provided it is trendy. YEHOVAH God, His morality, and 
therefore His judgment for adultery does not change with the trends. Despite 
Talmudic or American law to the contrary, adultery is still a capital crime! </span></p><span data-dcnode-id="1346" instrument_node="">
</span><p align="center" data-dcnode-id="1343"><b data-dcnode-id="1344"><span data-dcnode-id="1345" instrument_node="">The Woman Taken in Adultery</span></b></p><span data-dcnode-id="1342" instrument_node="">
</span><p align="justify" data-dcnode-id="1340"><span data-dcnode-id="1341" instrument_node="">Some Christians cite John 8:1-11, in which the Messiah pardoned 
the woman taken in adultery, as evidence that this sin should no longer be 
considered a capital crime: </span></p><span data-dcnode-id="1339" instrument_node="">
</span><blockquote data-dcnode-id="1334"><span data-dcnode-id="1338" instrument_node="">
</span><p align="justify" data-dcnode-id="1336"><span data-dcnode-id="1337" instrument_node="">"…the scribes and Pharisees brought unto him a woman taken in 
adultery….They say unto him, Master, this woman was taken in adultery, in the 
very act. Now Moses in the law commanded us, that such should be stoned: but 
what sayest thou?…Yeshua stooped down, and with his finger wrote on the 
ground….So when they continued asking him, he…said unto them, He that is 
without sin among you, let him first cast a stone at her.…And they which heard 
it, being convicted by their own conscience, went out one by one….When Jesus…saw none but the woman, he said unto her, Woman, where are those thine accusers? 
Hath no man condemned thee? She said, No man, Lord. And Jesus said unto her, 
Neither do I condemn thee: go, and sin no more" (John 8:3-11).</span></p><span data-dcnode-id="1335" instrument_node="">
</span></blockquote><span data-dcnode-id="1333" instrument_node="">
</span><p align="justify" data-dcnode-id="1331"><span data-dcnode-id="1332" instrument_node="">This incident is often used by opponents of the death penalty 
in an attempt to do away with capital punishment altogether under the New 
Covenant. </span></p><span data-dcnode-id="1330" instrument_node="">
</span><p align="justify" data-dcnode-id="1328"><span data-dcnode-id="1329" instrument_node="">If the Messiah's statement abolished capital punishment in 
contradistinction to YEHOVAH’s law, He would have sinned in doing so and could 
not be our Savior. In order to be our Savior, He had to perfectly teach and 
observe all the laws of YEHOVAH God, which is precisely what He did in this and all 
other instances recorded in the New Testament (Matthew 5:17-19). </span></p><span data-dcnode-id="1327" instrument_node="">
</span><p align="justify" data-dcnode-id="1325"><span data-dcnode-id="1326" instrument_node="">By pardoning this woman instead of requiring her to be 
stoned, the Messiah did not repeal capital punishment. Instead, he upheld it, as 
demonstrated in his initial ruling that this woman was to be stoned by her 
witnesses in compliance with YEHOVAH’s judgment for adultery in Leviticus 20. </span></p><span data-dcnode-id="1324" instrument_node="">
</span><p align="justify" data-dcnode-id="1322"><span data-dcnode-id="1323" instrument_node="">Some scholars suggest that when the Messiah bent down and wrote 
something in the dirt, he wrote the names of those standing before him, accusing 
them of being the woman’s fellow adulterers. Whatever it was that he wrote, it 
caused the accusers to exit the scene, in effect leaving no witnesses against 
the woman. Deuteronomy 17:6 and 19:15 (a statute that the Messiah referred to in John 
8:17) require that capital punishment cannot be administered without the 
testimony of two or three witnesses -- who are required to throw the first stones 
at the execution: </span></p><span data-dcnode-id="1321" instrument_node="">
</span><blockquote data-dcnode-id="1316"><span data-dcnode-id="1320" instrument_node="">
</span><p align="justify" data-dcnode-id="1318"><span data-dcnode-id="1319" instrument_node="">"At the mouth of two witnesses, or three witnesses, shall he 
that is worthy of death be put to death; but at the mouth of one witness he 
shall not be put to death. The hands of the witnesses shall be first upon him to 
put him to death, and afterward the hands of all the people. So thou shalt put 
the evil away from among you" (Deuteronomy 17:6-7).</span></p><span data-dcnode-id="1317" instrument_node="">
</span></blockquote><span data-dcnode-id="1315" instrument_node="">
</span><p align="justify" data-dcnode-id="1313"><span data-dcnode-id="1314" instrument_node="">Yeshua required this prerequisite when he told the woman’s 
accusers, “He that is without sin among you, let him first cast a stone at her.” 
Apparently these men were guilty of the same sin they could not witness against 
the woman without subjecting themselves to the same judgment.</span></p><span data-dcnode-id="1312" instrument_node="">
</span><p align="justify" data-dcnode-id="1307"><span data-dcnode-id="1311" instrument_node="">This, however, could be a moot point since the verses from 
John 7:53 through 8:11 have obviously been added to the original text of John's 
Gospel. These verses are NOT found in the Sinaitic Manuscript or the Vatican 
Manuscript No. 1209 -- though they do appear in the 6th-century Codex Bezae and 
later Greek manuscripts. </span><b data-dcnode-id="1309"><span data-dcnode-id="1310" instrument_node="">They are omitted, however, by most of the early 
versions.</span></b><span data-dcnode-id="1308" instrument_node=""> It is evident, therefore, that these verses are not part of John's 
Gospel. One later group of Greek manuscripts places this passage at the end of 
John's Gospel; another group puts it after Luke 21:38 -- supporting the 
conclusion that it is a spurious and uninspired text. </span></p><span data-dcnode-id="1306" instrument_node="">
</span><p align="justify" data-dcnode-id="1304"><span data-dcnode-id="1305" instrument_node="">The Messiah did not change the judgment for adulterers. He upheld 
YEHOVAH’s law perfectly, as required in order for him to be our sinless sacrifice 
and Savior. </span></p><span data-dcnode-id="1303" instrument_node="">
</span><p align="center" data-dcnode-id="1300"><b data-dcnode-id="1301"><span data-dcnode-id="1302" instrument_node="">The Incestuous Man</span></b></p><span data-dcnode-id="1299" instrument_node="">
</span><p align="justify" data-dcnode-id="1297"><span data-dcnode-id="1298" instrument_node="">Some people also cite 1 Corinthians 5 in an attempt to 
abrogate the death penalty under the New Covenant: </span></p><span data-dcnode-id="1296" instrument_node="">
</span><blockquote data-dcnode-id="1291"><span data-dcnode-id="1295" instrument_node="">
</span><p align="justify" data-dcnode-id="1293"><span data-dcnode-id="1294" instrument_node="">"It is reported commonly that there is fornication among you…that one should have his father’s wife….For I verily…have judged…concerning 
him that hath so done this deed, in the name of our Lord Jesus Christ, when ye 
are gathered together, and my spirit, with the power of our Lord Jesus Christ, 
to deliver such an one unto Satan for the destruction of the flesh, that the 
spirit may be saved in the day of the Lord Jesus" (1 Corinthians 5:1-5).</span></p><span data-dcnode-id="1292" instrument_node="">
</span></blockquote><span data-dcnode-id="1290" instrument_node="">
</span><p align="justify" data-dcnode-id="1288"><span data-dcnode-id="1289" instrument_node="">Because it appears the apostle Paul recommended 
excommunication instead of the death penalty for this adulterer,* it is 
sometimes assumed that capital punishment is not an option under the New 
Covenant. But, this interpretation pits 1 Corinthians 5:1-5 against John 8:1-11, 
Romans 1:28-32 and 13:1-4, and 1 Timothy 1:8-10, all of which advocate capital 
punishment. Another interpretation for 1 Corinthians 5 must exist, one that 
harmonizes these passages and explains why Paul appears to have recommended a 
different punishment. </span></p><span data-dcnode-id="1287" instrument_node="">
</span><p align="justify" data-dcnode-id="1285"><span data-dcnode-id="1286" instrument_node="">*The woman’s punishment for this sin was not addressed, 
therefore she must not have been a part of the Christian community in Corinth.</span></p><span data-dcnode-id="1284" instrument_node="">
</span><p align="justify" data-dcnode-id="1282"><span data-dcnode-id="1283" instrument_node="">The answer is found in part in 2 Corinthians 10: </span></p><span data-dcnode-id="1281" instrument_node="">
</span><blockquote data-dcnode-id="1276"><span data-dcnode-id="1280" instrument_node="">
</span><p align="justify" data-dcnode-id="1278"><span data-dcnode-id="1279" instrument_node="">"For though we walk in the flesh, we do not war after the 
flesh: (For the weapons of our warfare are not carnal, but mighty through God to 
the pulling down of strong holds;) casting down imaginations, and every high 
thing that exalteth itself against the knowledge of God, and bringing into 
captivity every thought to the obedience of Christ; and having in a readiness to 
revenge all disobedience, when your obedience is fulfilled" (2 Corinthians 
10:3-6).</span></p><span data-dcnode-id="1277" instrument_node="">
</span></blockquote><span data-dcnode-id="1275" instrument_node="">
</span><p align="justify" data-dcnode-id="1269"><span data-dcnode-id="1274" instrument_node="">In the </span><b data-dcnode-id="1271"><i data-dcnode-id="1272"><span data-dcnode-id="1273" instrument_node="">New American Standard</span></i></b><span data-dcnode-id="1270" instrument_node="">, this last phrase is translated 
“…we are ready to punish all disobedience, whenever your obedience is complete.” 
Why would Paul wait to punish sin until the Christians’ obedience was complete? 
This verse does not make sense unless it refers to a future point in time when 
the church was large and powerful enough to influence and even control 
government polity, including the punishment of the wicked. </span></p><span data-dcnode-id="1268" instrument_node="">
</span><p align="justify" data-dcnode-id="1266"><span data-dcnode-id="1267" instrument_node="">This is substantiated by the fact that Paul expected the 
Christian community to set up their own judicial system: </span></p><span data-dcnode-id="1265" instrument_node="">
</span><blockquote data-dcnode-id="1260"><span data-dcnode-id="1264" instrument_node="">
</span><p align="justify" data-dcnode-id="1262"><span data-dcnode-id="1263" instrument_node="">"Dare any of you, having a matter against another, go to law 
before the unjust, and not before the saints? Do ye not know that the saints 
shall judge the world? And if the world shall be judged by you, are ye unworthy 
to judge the smallest matters? Know ye not that we shall judge angels? How much 
more things that pertain to this life? If then ye have judgments of things 
pertaining to this life, set them to judge who are least esteemed in the church. 
I speak to your shame. Is it so, that there is not a wise man among you? No, not 
one that shall be able to judge between his brethren? But brother goeth to law 
with brother, and that before the unbelievers" (1 Corinthians 6:1-6).</span></p><span data-dcnode-id="1261" instrument_node="">
</span></blockquote><span data-dcnode-id="1259" instrument_node="">
</span><p align="justify" data-dcnode-id="1254"><span data-dcnode-id="1258" instrument_node="">Because the church in its infancy did not have the civil 
force to carry out capital punishment, and because capital punishment may only 
be executed by vigilantes in rare and specific cases, capital punishment was not 
an option for the church at that time. </span><b data-dcnode-id="1256"><span data-dcnode-id="1257" instrument_node="">[77] </span></b><span data-dcnode-id="1255" instrument_node=""> </span></p><span data-dcnode-id="1253" instrument_node="">
</span><p align="justify" data-dcnode-id="1251"><span data-dcnode-id="1252" instrument_node="">Not until the Christian community had grown in size and 
political clout -- when their obedience had become complete -- would they be able 
to punish all disobedience as described in Romans 13: </span></p><span data-dcnode-id="1250" instrument_node="">
</span><blockquote data-dcnode-id="1242"><span data-dcnode-id="1249" instrument_node="">
</span><p align="justify" data-dcnode-id="1244"><span data-dcnode-id="1248" instrument_node="">"For rulers are not a terror to good works, but to the evil. 
Wilt thou then not be afraid of the power? Do that which is good, and thou shalt 
have praise of the same: For he is the minister of God to thee for good. But if 
thou do that which is evil, be afraid; for he beareth not the </span><b data-dcnode-id="1246"><span data-dcnode-id="1247" instrument_node="">sword</span></b><span data-dcnode-id="1245" instrument_node=""> in vain: for 
he is the minister of God, a revenger to execute wrath upon him that doeth 
evil” (Romans 13:3-4 *).</span></p><span data-dcnode-id="1243" instrument_node="">
</span></blockquote><span data-dcnode-id="1241" instrument_node="">
</span><p align="justify" data-dcnode-id="1234"><span data-dcnode-id="1240" instrument_node="">*Many ministers have turned this passage into “a </span><b data-dcnode-id="1238"><span data-dcnode-id="1239" instrument_node="">sword</span></b><span data-dcnode-id="1237" instrument_node=""> of 
oppression rather than a shield from tyranny.” The apostle Paul is explicit 
regarding the type of rulers he was referring to. Three times in five verses he 
identified them as ministers of God who do good to the righteous and strike fear 
in the hearts of the wicked. </span><b data-dcnode-id="1235"><span data-dcnode-id="1236" instrument_node="">[78]</span></b></p><span data-dcnode-id="1233" instrument_node="">
</span><p align="justify" data-dcnode-id="1222"><span data-dcnode-id="1232" instrument_node="">Paul’s intent in 2 Corinthians 10:6 is evident in his use of 
the Greek word </span><i data-dcnode-id="1230"><span data-dcnode-id="1231" instrument_node="">ekdikeesai</span></i><span data-dcnode-id="1229" instrument_node="">, translated “revenge” in the phrase “in readiness to 
revenge all disobedience.” </span><i data-dcnode-id="1227"><span data-dcnode-id="1228" instrument_node="">Ekdikeesai</span></i><span data-dcnode-id="1226" instrument_node=""> is derived from the word </span><i data-dcnode-id="1224"><span data-dcnode-id="1225" instrument_node="">ekdikos</span></i><span data-dcnode-id="1223" instrument_node="">, 
translated “revenger” in the phrase “the minister of God, a revenger to execute 
wrath upon him that doeth evil” in Romans 13:4. </span></p><span data-dcnode-id="1221" instrument_node="">
</span><p align="justify" data-dcnode-id="1210"><span data-dcnode-id="1220" instrument_node="">If </span><i data-dcnode-id="1218"><span data-dcnode-id="1219" instrument_node="">satana</span></i><span data-dcnode-id="1217" instrument_node=""> had been properly </span><b data-dcnode-id="1215"><span data-dcnode-id="1216" instrument_node="">translated</span></b><span data-dcnode-id="1214" instrument_node=""> “adversary” instead of 
</span><b data-dcnode-id="1212"><span data-dcnode-id="1213" instrument_node="">transliterated</span></b><span data-dcnode-id="1211" instrument_node="">** “Satan,” 1 Corinthians 5:5 could be understood to say that Paul 
was turning this man over to the Corinthian government -- which was an adversary 
to the Christians -- to be put to death (the destruction of his flesh). The 
phrase “put away from among yourselves that wicked person” in 1 Corinthians 5:13 
appears to be a paraphrase of “so thou shalt put the evil away from among you” 
-- 
a judgment of death -- in Deuteronomy 17:7. This evidence seems to indicate that 
this man was to be turned over to the Corinthian government for execution. </span></p><span data-dcnode-id="1209" instrument_node="">
</span><p align="justify" data-dcnode-id="1201"><span data-dcnode-id="1208" instrument_node="">**</span><b data-dcnode-id="1206"><span data-dcnode-id="1207" instrument_node="">Translation</span></b><span data-dcnode-id="1205" instrument_node=""> commutes the meaning of a word from one 
language to another and should be used for words other than the names of people, 
places, etc. </span><b data-dcnode-id="1203"><span data-dcnode-id="1204" instrument_node="">Transliteration</span></b><span data-dcnode-id="1202" instrument_node=""> commutes the letters of a word from one language to 
another and should be used exclusively for the names of people, places, etc..</span></p><span data-dcnode-id="1200" instrument_node="">
</span><p align="center" data-dcnode-id="1197"><b data-dcnode-id="1198"><span data-dcnode-id="1199" instrument_node="">Death Penalty Exceptions</span></b></p><span data-dcnode-id="1196" instrument_node="">
</span><p align="justify" data-dcnode-id="1194"><span data-dcnode-id="1195" instrument_node="">YEHOVAH’s law regarding adultery provides TWO EXCEPTIONS to 
the death penalty. The first concerns sexual relations with a slave: </span></p><span data-dcnode-id="1193" instrument_node="">
</span><blockquote data-dcnode-id="1185"><span data-dcnode-id="1192" instrument_node="">
</span><p align="justify" data-dcnode-id="1187"><span data-dcnode-id="1191" instrument_node="">"Now if a man lies carnally with a woman who is a </span><b data-dcnode-id="1189"><span data-dcnode-id="1190" instrument_node="">slave</span></b><span data-dcnode-id="1188" instrument_node=""> 
acquired [betrothed, KJV] for another man, but who has in no way been redeemed, 
nor given her freedom, there shall be punishment; they shall not, however, be 
put to death, because she was not free. And he shall bring his guilt offering to 
YHVH to the doorway of the tent of meeting, a ram for a guilt offering. The 
priest shall also make atonement for him with the ram of the guilt offering 
before YHVH for his sin which he has committed, and the sin which he has 
committed shall be forgiven him" (Leviticus 19:20-22, NASV *).</span></p><span data-dcnode-id="1186" instrument_node="">
</span></blockquote><span data-dcnode-id="1184" instrument_node="">
</span><p align="justify" data-dcnode-id="1179"><span data-dcnode-id="1183" instrument_node="">*This statute does not apply to </span><b data-dcnode-id="1181"><span data-dcnode-id="1182" instrument_node="">slaves</span></b><span data-dcnode-id="1180" instrument_node=""> from Canaanite, 
Moabite, or Ammonite lineages or from different races because such betrothing 
would be a transgression of Leviticus 18:21 to begin with.</span></p><span data-dcnode-id="1178" instrument_node="">
</span><p align="justify" data-dcnode-id="1176"><span data-dcnode-id="1177" instrument_node="">This judgment does not set well with some people, but YEHOVAH 
God 
always knows best, whether or not we like it or understand His reasoning. We 
must be careful to conform our morality to the Bible, not the Bible to our 
opinions. </span></p><span data-dcnode-id="1175" instrument_node="">
</span><p align="justify" data-dcnode-id="1173"><span data-dcnode-id="1174" instrument_node="">Because female slaves were women who had been forced into 
bondage, neither they nor their male companions were held to as severe a 
judgment as were free women and their companions. Rousas John Rushdoony provides 
a possible explanation for this exception to capital punishment: </span></p><span data-dcnode-id="1172" instrument_node="">
</span><blockquote data-dcnode-id="1162"><span data-dcnode-id="1171" instrument_node="">
</span><p align="justify" data-dcnode-id="1164"><span data-dcnode-id="1170" instrument_node="">"…A “bondmaid betrothed to a husband” (Lev. 19:20), i.e., a 
girl who has been secured as a concubine, could not be put to death for 
adultery; both she and the guilty man could only be punished by </span><b data-dcnode-id="1168"><span data-dcnode-id="1169" instrument_node="">scourging</span></b><span data-dcnode-id="1167" instrument_node="">.* The 
reason is given: “they shall not be put to death, because she was not free” 
(Lev. 19:20). A principle is clearly in evidence here: to whom much is given, 
from him much can be expected. But, since a concubine receives a limited status 
and receives less dignity in the marriage, only a limited loyalty can be 
expected. She was expected to be faithful, but in case of adultery her 
punishment was less, because her status was lower than that of the endowered 
wife. The wife had the security of her dowry and a status of authority; her 
punishment for adultery, as was the punishment for her husband for adultery, was 
death." </span><b data-dcnode-id="1165"><span data-dcnode-id="1166" instrument_node="">[79]</span></b></p><span data-dcnode-id="1163" instrument_node="">
</span></blockquote><span data-dcnode-id="1161" instrument_node="">
</span><p align="justify" data-dcnode-id="1156"><span data-dcnode-id="1160" instrument_node="">*Although the King James Version uses the word “scourged” in 
Leviticus 19:20, </span><b data-dcnode-id="1158"><span data-dcnode-id="1159" instrument_node="">scourging</span></b><span data-dcnode-id="1157" instrument_node=""> is not necessarily indicated in the Hebrew.</span></p><span data-dcnode-id="1155" instrument_node="">
</span><p align="justify" data-dcnode-id="1153"><span data-dcnode-id="1154" instrument_node="">The second exception to the death penalty for adultery is 
when a man seduces an unbetrothed virgin as per Exodus 22:16-17 and Deuteronomy 
22:28-29, cited earlier on pages 62-63. </span></p><span data-dcnode-id="1152" instrument_node="">
</span><p align="justify" data-dcnode-id="1147"><span data-dcnode-id="1151" instrument_node="">Except in these two instances and possibly in the case of 
deliberate menstrual contamination, the Bible requires the death penalty for all 
unrepentant adulterers.* </span><b data-dcnode-id="1149"><span data-dcnode-id="1150" instrument_node="">Adultery is a sin that destroys not only marriages but 
also the family unit and, ultimately, society in general.</span></b><span data-dcnode-id="1148" instrument_node=""> History has 
demonstrated that the more adulterous and immoral a society becomes, the closer 
it is to self-destructing. No wonder YEHOVAH God deems this sin a capital crime.</span></p><span data-dcnode-id="1146" instrument_node="">
</span><p align="justify" data-dcnode-id="1144"><span data-dcnode-id="1145" instrument_node="">*Rushdoony believes that Leviticus 20:19-21 provides a third 
exception for those who would “marry” the wife of an uncle, a blood aunt, or a 
brother’s wife. He interprets “die childless” to mean that they would have “no 
legal heir in their progeny” (Rushdoony, pp. 368-369). However, a more 
consistent interpretation is that they are to be put to death before they bear 
any children.</span></p><span data-dcnode-id="1143" instrument_node="">
</span><p align="center" data-dcnode-id="1140"><b data-dcnode-id="1141"><span data-dcnode-id="1142" instrument_node="">Biblical Marriage</span></b></p><span data-dcnode-id="1139" instrument_node="">
</span><p align="justify" data-dcnode-id="1134"><span data-dcnode-id="1138" instrument_node="">Incest, conjugal relations during a wife’s menstrual cycle, 
infidelity, forbidden lineage and interracial relationships, homosexuality, 
bestiality, prostitution, remarriage to a twice-divorced woman, marriage to a 
put-away woman, and mixed-faith relationships </span><b data-dcnode-id="1136"><span data-dcnode-id="1137" instrument_node="">all adulterate YEHOVAH’s plan for 
marriage and pervert the holy and normal sexual relations intended for a man and 
his wife</span></b><span data-dcnode-id="1135" instrument_node="">. What, then, constitutes Biblical marriage? </span></p><span data-dcnode-id="1133" instrument_node="">
</span><p align="justify" data-dcnode-id="1130"><b data-dcnode-id="1131"><span data-dcnode-id="1132" instrument_node="">Sexual Relations Alone</span></b></p><span data-dcnode-id="1129" instrument_node="">
</span><p align="justify" data-dcnode-id="1127"><span data-dcnode-id="1128" instrument_node="">Do sexual relations alone constitute a lawful marriage? Those 
who believe that it does cite Genesis 24:67, when Isaac “brought her [Rebekah] 
into his mother Sarah’s tent, and took Rebekah, and she became his wife.” 
Because nothing is said in this incident about vows or a public ceremony, some 
people maintain that such are not necessary for a couple to be lawfully married. 
However, just because this passage does not mention vows or a public ceremony 
does not mean that they did not occur. Doctrine cannot be established by 
silence. </span></p><span data-dcnode-id="1126" instrument_node="">
</span><p align="justify" data-dcnode-id="1124"><span data-dcnode-id="1125" instrument_node="">The following passage disproves that physical relations alone 
constitute marriage: </span></p><span data-dcnode-id="1123" instrument_node="">
</span><blockquote data-dcnode-id="1118"><span data-dcnode-id="1122" instrument_node="">
</span><p align="justify" data-dcnode-id="1120"><span data-dcnode-id="1121" instrument_node="">"What? Know ye not that he which is joined to an harlot is one 
body? For two, saith he, shall be one flesh….Flee fornication…." (1 Corinthians 
6:16-18).</span></p><span data-dcnode-id="1119" instrument_node="">
</span></blockquote><span data-dcnode-id="1117" instrument_node="">
</span><p align="justify" data-dcnode-id="1115"><span data-dcnode-id="1116" instrument_node="">If the “one flesh” experience alone constitutes a lawful 
marriage, then the apostle Paul would have identified the relationship with such 
women as marriage, not fornication, and the women as wives, not harlots. </span></p><span data-dcnode-id="1114" instrument_node="">
</span><p align="justify" data-dcnode-id="1112"><span data-dcnode-id="1113" instrument_node="">In his encounter with the Samaritan woman, the Messiah made a 
distinction between her husbands and the man she simply cohabited with: </span></p><span data-dcnode-id="1111" instrument_node="">
</span><blockquote data-dcnode-id="1106"><span data-dcnode-id="1110" instrument_node="">
</span><p align="justify" data-dcnode-id="1108"><span data-dcnode-id="1109" instrument_node="">"Jesus saith unto her, Go, call thy husband, and come hither. 
The woman answered and said, I have no husband. Jesus said unto her, Thou hast 
well said, I have no husband: For thou hast had five husbands; and he whom thou 
now hast is not thy husband: in that saidst thou truly" (John 4:16-18).</span></p><span data-dcnode-id="1107" instrument_node="">
</span></blockquote><span data-dcnode-id="1105" instrument_node="">
</span><p align="justify" data-dcnode-id="1100"><span data-dcnode-id="1104" instrument_node="">This woman had been married to five different men whom the 
Messiah 
recognized as husbands. But the man with whom she was living at the time was not 
her husband. Something set the former five husbands apart from the man she was 
cohabiting with at the time. </span><b data-dcnode-id="1102"><span data-dcnode-id="1103" instrument_node="">Merely living with a man or a women does not 
constitute a lawful marriage. </span></b><span data-dcnode-id="1101" instrument_node=""> </span></p><span data-dcnode-id="1099" instrument_node="">
</span><p align="justify" data-dcnode-id="1096"><b data-dcnode-id="1097"><span data-dcnode-id="1098" instrument_node="">Public Marriage Vows</span></b></p><span data-dcnode-id="1095" instrument_node="">
</span><p align="justify" data-dcnode-id="1093"><span data-dcnode-id="1094" instrument_node="">Because we are not told what it was that caused the Messiah to 
identify the five men as husbands, we must look elsewhere for the answer. </span></p><span data-dcnode-id="1092" instrument_node="">
</span><blockquote data-dcnode-id="1087"><span data-dcnode-id="1091" instrument_node="">
</span><p align="justify" data-dcnode-id="1089"><span data-dcnode-id="1090" instrument_node="">"…At the mouth of two witnesses, or at the mouth of three 
witnesses, shall the matter be established" (Deuteronomy 19:15).</span></p><span data-dcnode-id="1088" instrument_node="">
</span></blockquote><span data-dcnode-id="1086" instrument_node="">
</span><p align="justify" data-dcnode-id="1082"><b data-dcnode-id="1084"><span data-dcnode-id="1085" instrument_node="">Bible law requires two or three witnesses to a covenant of 
any sort, including marriage.</span></b><span data-dcnode-id="1083" instrument_node=""> One of those witnesses would most likely be the 
bride’s father because a daughter must have her father’s permission for the 
marriage to be lawful. </span></p><span data-dcnode-id="1081" instrument_node="">
</span><p align="justify" data-dcnode-id="1078"><b data-dcnode-id="1079"><span data-dcnode-id="1080" instrument_node="">Written Marriage Covenants</span></b></p><span data-dcnode-id="1077" instrument_node="">
</span><p align="justify" data-dcnode-id="1075"><span data-dcnode-id="1076" instrument_node="">What father, in his right mind, would not require an oral 
marriage vow and perhaps a written contract from his son-in-law? </span></p><span data-dcnode-id="1074" instrument_node="">
</span><p align="justify" data-dcnode-id="1068"><span data-dcnode-id="1073" instrument_node="">The ancient </span><b data-dcnode-id="1070"><i data-dcnode-id="1071"><span data-dcnode-id="1072" instrument_node="">Code of Hammurabi</span></i></b><span data-dcnode-id="1069" instrument_node="">, which some scholars believe 
may have been derived from the laws of YEHOVAH God, requires a written agreement for 
a marriage to be valid: </span></p><span data-dcnode-id="1067" instrument_node="">
</span><blockquote data-dcnode-id="1062"><span data-dcnode-id="1066" instrument_node="">
</span><p align="justify" data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node="">"If a man take a wife and does not draw up a contract with 
her, that woman is not a wife" (Hammurabi 128).</span></p><span data-dcnode-id="1063" instrument_node="">
</span></blockquote><span data-dcnode-id="1061" instrument_node="">
</span><p align="justify" data-dcnode-id="1059"><span data-dcnode-id="1060" instrument_node="">That this might have been a custom with the Israelites is 
perhaps manifest in that a writ of divorce is one of the three elements that 
constitute a lawful divorce in Deuteronomy 24:1-2. </span></p><span data-dcnode-id="1058" instrument_node="">
</span><p align="justify" data-dcnode-id="1053"><span data-dcnode-id="1057" instrument_node="">A written agreement between a husband and his wife may have 
been a custom of the Israelites, but that does not make it a precedent for 
government licenses. </span><b data-dcnode-id="1055"><span data-dcnode-id="1056" instrument_node="">The State has no jurisdiction licensing anything that 
YEHOVAH God has already instituted and sanctioned.</span></b><span data-dcnode-id="1054" instrument_node="">* State marriage licenses are just 
a cunning means of collecting revenue, and, more disconcerting, they make the 
State the controlling power in the marriage, ultimately placing any children 
thereof under the authority and control of the State. </span></p><span data-dcnode-id="1052" instrument_node="">
</span><p align="justify" data-dcnode-id="1045"><span data-dcnode-id="1051" instrument_node="">*</span><b data-dcnode-id="1049"><span data-dcnode-id="1050" instrument_node="">A government license often legalizes what is otherwise 
unlawful.</span></b><span data-dcnode-id="1048" instrument_node=""> The first marriage license was issued circa 1870 to legalize 
miscegenation. </span><b data-dcnode-id="1046"><span data-dcnode-id="1047" instrument_node="">The State has no jurisdiction to license what YEHOVAH God has declared 
unlawful.</span></b></p><span data-dcnode-id="1044" instrument_node="">
</span><p align="justify" data-dcnode-id="1041"><b data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">Yeshua’s Testimony</span></b></p><span data-dcnode-id="1040" instrument_node="">
</span><p align="justify" data-dcnode-id="1038"><span data-dcnode-id="1039" instrument_node="">The fact that the Messiah’s first miracle was performed at a 
public wedding ceremony in John 2:1-11, and the fact that he compared the 
kingdom to a wedding in Matthew 22:2-13 is indicative of his tacit sanction of 
public ceremonies. </span></p><span data-dcnode-id="1037" instrument_node="">
</span><p align="justify" data-dcnode-id="1033"><b data-dcnode-id="1035"><span data-dcnode-id="1036" instrument_node="">Sexual intimacy does not constitute a marriage -- it 
consummates the vows. </span></b><span data-dcnode-id="1034" instrument_node=""> </span></p><span data-dcnode-id="1032" instrument_node="">
</span><p align="justify" data-dcnode-id="1029"><b data-dcnode-id="1030"><span data-dcnode-id="1031" instrument_node="">Marital Fidelity</span></b></p><span data-dcnode-id="1028" instrument_node="">
</span><p align="justify" data-dcnode-id="1023"><span data-dcnode-id="1027" instrument_node="">Any study on the Seventh Commandment would be incomplete 
without devoting some time to the positive side of this commandment -- </span><b data-dcnode-id="1025"><span data-dcnode-id="1026" instrument_node="">fidelity 
within the covenant of matrimony</span></b><span data-dcnode-id="1024" instrument_node="">. </span></p><span data-dcnode-id="1022" instrument_node="">
</span><p align="justify" data-dcnode-id="1011"><span data-dcnode-id="1021" instrument_node="">Too many people view marriage as an event in their life. The 
wedding is the event; </span><b data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node="">marriage is a lifetime accomplishment</span></b><span data-dcnode-id="1018" instrument_node="">. Simply put, 
</span><b data-dcnode-id="1016"><span data-dcnode-id="1017" instrument_node="">marriage is work</span></b><span data-dcnode-id="1015" instrument_node="">. But, as with any good work, </span><b data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">the returns from this labor of 
love far outweigh the effort expended</span></b><span data-dcnode-id="1012" instrument_node="">. Dividends are paid not only to the 
couple, but also to their children and all generations to follow. </span></p><span data-dcnode-id="1010" instrument_node="">
</span><p align="justify" data-dcnode-id="1005"><span data-dcnode-id="1009" instrument_node="">YEHOVAH God designed the family unit, beginning with the 
relationship between husbands and wives, </span><b data-dcnode-id="1007"><span data-dcnode-id="1008" instrument_node="">as the very fabric of a healthy 
society</span></b><span data-dcnode-id="1006" instrument_node="">: </span></p><span data-dcnode-id="1004" instrument_node="">
</span><blockquote data-dcnode-id="996"><span data-dcnode-id="1003" instrument_node="">
</span><p align="justify" data-dcnode-id="998"><span data-dcnode-id="1002" instrument_node="">"</span><b data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node="">Let marriage be held in honor among all</span></b><span data-dcnode-id="999" instrument_node="">, and let the marriage 
bed be undefiled; for fornicators and adulterers God will judge" (Hebrews 13:4, NASV).</span></p><span data-dcnode-id="997" instrument_node="">
</span></blockquote><span data-dcnode-id="995" instrument_node="">
</span><p align="justify" data-dcnode-id="990"><span data-dcnode-id="994" instrument_node="">Any society that fails to safeguard the sanctity of marriage 
is its own worst enemy. </span><b data-dcnode-id="992"><span data-dcnode-id="993" instrument_node="">A strong society is impossible to maintain without 
healthy families resting upon the bedrock of faithful marriages. </span></b><span data-dcnode-id="991" instrument_node=""> </span></p><span data-dcnode-id="989" instrument_node="">
</span><p align="justify" data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">Anyone who would dishonor the sanctity of his wedding vows 
can hardly be trusted with any other vows, agreements, contracts, business 
deals, or partnerships. If a man’s wife cannot trust him, why should anyone 
else? In 1 Timothy 3:1-12 and Titus 1:5-9, YEHOVAH made a man’s personal life -- 
including his relationship with his wife -- essential to being a leader in 
Christian society. </span></p><span data-dcnode-id="986" instrument_node="">
</span><p align="justify" data-dcnode-id="981"><span data-dcnode-id="985" instrument_node="">Because </span><b data-dcnode-id="983"><span data-dcnode-id="984" instrument_node="">the destruction of the marriage covenant is 
ultimately the ruin of society</span></b><span data-dcnode-id="982" instrument_node="">, it is important that we rebuild the foundation 
of matrimony as YEHOVAH God intends it and that we pass this vision on to our 
children and grandchildren. </span></p><span data-dcnode-id="980" instrument_node="">
</span><p align="justify" data-dcnode-id="977"><b data-dcnode-id="978"><span data-dcnode-id="979" instrument_node="">Fully Committed to YEHOVAH</span></b></p><span data-dcnode-id="976" instrument_node="">
</span><p align="justify" data-dcnode-id="971"><span data-dcnode-id="975" instrument_node="">A Biblical relationship must begin with both the husband and 
wife being fully committed to YEHOVAH God and the Messiah. Neither spouse will ever be what the other 
needs without first endeavoring to be everything that YEHOVAH and the Messiah intends them to be.
</span><b data-dcnode-id="973"><span data-dcnode-id="974" instrument_node="">YEHOVAH God must come first -- even before the Messiah and a spouse</span></b><span data-dcnode-id="972" instrument_node="">:</span></p><span data-dcnode-id="970" instrument_node="">
</span><blockquote data-dcnode-id="956"><span data-dcnode-id="969" instrument_node="">
</span><p align="justify" data-dcnode-id="958"><span data-dcnode-id="968" instrument_node="">"You shall love the LORD your God with </span><b data-dcnode-id="966"><span data-dcnode-id="967" instrument_node="">ALL</span></b><span data-dcnode-id="965" instrument_node=""> your 
	heart, with </span><b data-dcnode-id="963"><span data-dcnode-id="964" instrument_node="">ALL</span></b><span data-dcnode-id="962" instrument_node=""> your soul, and with </span><b data-dcnode-id="960"><span data-dcnode-id="961" instrument_node="">ALL</span></b><span data-dcnode-id="959" instrument_node=""> your might" 
	(Deuteronomy 6:5).</span></p><span data-dcnode-id="957" instrument_node="">
</span></blockquote><span data-dcnode-id="955" instrument_node="">
</span><p align="justify" data-dcnode-id="953"><span data-dcnode-id="954" instrument_node="">Next -- the Messiah:</span></p><span data-dcnode-id="952" instrument_node="">
</span><blockquote data-dcnode-id="947"><span data-dcnode-id="951" instrument_node="">
</span><p align="justify" data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">"He that loveth father or mother more than me is not worthy of 
me: and he that loveth son or daughter more than me is not worthy of me. And he 
that taketh not his cross, and followeth after me, is not worthy of me" (Matthew 
10:37-38).</span></p><span data-dcnode-id="948" instrument_node="">
</span></blockquote><span data-dcnode-id="946" instrument_node="">
</span><p align="justify" data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">Next to YEHOVAH God and the Messiah, spouses should love each other above all 
others: </span></p><span data-dcnode-id="943" instrument_node="">
</span><blockquote data-dcnode-id="938"><span data-dcnode-id="942" instrument_node="">
</span><p align="justify" data-dcnode-id="940"><span data-dcnode-id="941" instrument_node="">"Therefore shall a man leave his father and his mother, and 
shall cleave unto his wife: and they shall be one flesh" (Genesis 2:24).</span></p><span data-dcnode-id="939" instrument_node="">
</span></blockquote><span data-dcnode-id="937" instrument_node="">
</span><p align="justify" data-dcnode-id="933"><b data-dcnode-id="935"><span data-dcnode-id="936" instrument_node="">This love for your spouse must exceed even that for your 
children.</span></b><span data-dcnode-id="934" instrument_node=""> To love your children more than you do your mate is not only 
destructive to the relationship, it passes a poor legacy on to your children and 
their future mates. </span></p><span data-dcnode-id="932" instrument_node="">
</span><p align="justify" data-dcnode-id="930"><span data-dcnode-id="931" instrument_node="">As much as your children need to know that you love them, 
they have an even greater need to know that next to YEHOVAH God and the Messiah, your spouse comes 
first in your life. </span></p><span data-dcnode-id="929" instrument_node="">
</span><p align="justify" data-dcnode-id="926"><b data-dcnode-id="927"><span data-dcnode-id="928" instrument_node="">Oneness</span></b></p><span data-dcnode-id="925" instrument_node="">
</span><p align="justify" data-dcnode-id="923"><span data-dcnode-id="924" instrument_node="">The world’s idea of a marital relationship is the antithesis 
of YEHOVAH’s idea. YEHOVAH calls for oneness or singularity and, therefore, 
self-sacrifice. The world touts individuality and self-fulfillment. YEHOVAH’s 
design reaps the deepest of relationships, whereas the world’s idea provides, at 
the best, shallow and superficial relationships. </span></p><span data-dcnode-id="922" instrument_node="">
</span><p align="justify" data-dcnode-id="918"><b data-dcnode-id="920"><span data-dcnode-id="921" instrument_node="">Our goal should be to become completely one with our spouses 
-- physically, mentally, emotionally, and socially.</span></b><span data-dcnode-id="919" instrument_node=""> Although, the physical 
relationship between a husband and wife alone will not make for a healthy 
relationship, this is not to say that it certainly isn’t unimportant. Women, 
generally speaking, are unable to find physical oneness and fulfillment without 
experiencing oneness in the other areas as well, whereas men, generally 
speaking, are unable to find oneness in other areas without experiencing oneness 
physically. YEHOVAH God designed men and women so that we cannot experience oneness 
and fulfillment ourselves without seeking to please and satisfy our spouses: </span></p><span data-dcnode-id="917" instrument_node="">
</span><blockquote data-dcnode-id="909"><span data-dcnode-id="916" instrument_node="">
</span><p align="justify" data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">"My beloved is mine, and I am his…." (Song of Solomon 2:16).</span></p><span data-dcnode-id="913" instrument_node="">
</span><p align="justify" data-dcnode-id="911"><span data-dcnode-id="912" instrument_node="">"Let the husband fulfill his duty to his wife, and likewise 
also the wife to her husband. The wife does not have authority over her own 
body, but the husband does; and likewise also the husband does not have 
authority over his own body, but the wife does. Stop depriving one another, 
except by agreement for a time that you may devote yourselves to prayer, and 
come together again lest Satan tempt you because of your lack of self-control" 
(1 Corinthians 7:3-5).</span></p><span data-dcnode-id="910" instrument_node="">
</span></blockquote><span data-dcnode-id="908" instrument_node="">
</span><p align="justify" data-dcnode-id="905"><b data-dcnode-id="906"><span data-dcnode-id="907" instrument_node="">The Right Person</span></b></p><span data-dcnode-id="904" instrument_node="">
</span><p align="justify" data-dcnode-id="893"><span data-dcnode-id="903" instrument_node="">Benjamin Franklin once said, “Keep your eyes wide open before 
marriage and half shut afterward.” Good advice! But success in marriage depends 
more upon being the right person than it does upon finding the right person. 
</span><b data-dcnode-id="901"><span data-dcnode-id="902" instrument_node="">Most marital problems are the consequence of a union between two people who are 
more in love with themselves than they are with each other.</span></b><span data-dcnode-id="900" instrument_node=""> Couples would do 
well to remember that in the word “wedding,” </span><b data-dcnode-id="898"><span data-dcnode-id="899" instrument_node="">WE</span></b><span data-dcnode-id="897" instrument_node=""> comes before </span><b data-dcnode-id="895"><span data-dcnode-id="896" instrument_node="">I</span></b><span data-dcnode-id="894" instrument_node="">. </span></p><span data-dcnode-id="892" instrument_node="">
</span><p align="justify" data-dcnode-id="890"><span data-dcnode-id="891" instrument_node="">Taken by itself, Franklin’s advice about keeping our eyes 
half shut after the wedding is not enough to maintain a happy and lasting 
relationship. Even with eyes half closed, plenty of faults will still need to be 
overlooked or forgiven. Love, as described in 1 Corinthians 13, takes no account 
of a wrong suffered, thereby blinding us to our partner’s faults: </span></p><span data-dcnode-id="889" instrument_node="">
</span><blockquote data-dcnode-id="881"><span data-dcnode-id="888" instrument_node="">
</span><p align="justify" data-dcnode-id="883"><span data-dcnode-id="887" instrument_node="">"Above all, keep fervent in your love for one another, because
