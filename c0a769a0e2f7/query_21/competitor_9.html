</span><title data-dcnode-id="4303">The Seventh Commandment and Miscegenation</title><span data-dcnode-id="4302" instrument_node="">
</span><span data-dcnode-id="4300" instrument_node="">
</span><span data-dcnode-id="4299" instrument_node="">
</span><p align="justify" data-dcnode-id="4293"><b data-dcnode-id="4294"><font data-dcnode-id="4295" face="Arial" size="5"><u data-dcnode-id="4297"><span data-dcnode-id="4298" instrument_node="">Hope of Israel Ministries 
(Ecclesia of YEHOVAH)</span></u><span data-dcnode-id="4296" instrument_node="">:</span></font></b></p><span data-dcnode-id="4292" instrument_node="">
</span><p align="justify" data-dcnode-id="4288"><b data-dcnode-id="4289"><font data-dcnode-id="4290" face="Arial" size="4"><span data-dcnode-id="4291" instrument_node="">"Thou shalt not commit 
adultery" (Exodus 20:14).*</span></font></b></p><span data-dcnode-id="4287" instrument_node="">
</span><p align="center" data-dcnode-id="4283"><b data-dcnode-id="4284"><font data-dcnode-id="4285" face="Arial" size="7"><span data-dcnode-id="4286" instrument_node="">The Seventh Commandment and 
Miscegenation </span></font></b></p><span data-dcnode-id="4282" instrument_node="">
</span><div align="center" data-dcnode-id="4266"><span data-dcnode-id="4281" instrument_node="">
</span><span data-dcnode-id="4280" instrument_node="">
</span><span data-dcnode-id="4279" instrument_node="">
</span><span data-dcnode-id="4272" instrument_node="">
</span><span data-dcnode-id="4270" instrument_node="">
</span><table border="0" cellpadding="0" data-dcnode-id="4268" style="border-collapse: collapse" width="475"><tbody data-dcnode-id="4269"><tr data-dcnode-id="4271"><td data-dcnode-id="4273"><span data-dcnode-id="4278" instrument_node="">
</span><p align="justify" data-dcnode-id="4274"><span data-dcnode-id="4277" instrument_node="">
</span><font data-dcnode-id="4275" face="Arial" size="4"><span data-dcnode-id="4276" instrument_node="">
			Until very recently, miscegenation was almost unheard of -- a 
historic anomaly. But in the last fifty years, like homosexuality, it has become 
more and more culturally acceptable. This alone should cause people to question 
it. If it had been Biblically acceptable all along, why has it taken nearly two 
millennia for Christians to get it correct? Today’s multicultural society 
			condemns segregation as racist and hateful and promotes 
			miscegenation as something good. Man’s desire to integrate and miscegenate 
			will ultimately destroy the different races and their cultures.</span></font></p></td></tr></tbody></table><span data-dcnode-id="4267" instrument_node="">
</span></div><span data-dcnode-id="4265" instrument_node="">
</span><p align="center" data-dcnode-id="4261"><b data-dcnode-id="4262"><font data-dcnode-id="4263" face="Arial" size="5"><span data-dcnode-id="4264" instrument_node="">by Ted R. Weiland</span></font></b></p><span data-dcnode-id="4260" instrument_node="">
</span><font data-dcnode-id="4233" size="4"><span data-dcnode-id="4259" instrument_node="">
</span><p align="justify" data-dcnode-id="4256"><font data-dcnode-id="4257" face="Arial"><span data-dcnode-id="4258" instrument_node="">*All Scripture is quoted from the King 
James Version unless otherwise noted. Portions of Scripture have been omitted 
for brevity’s sake. If there are questions regarding any passage, please open 
your Bible and study the text to ensure that it has been properly used.</span></font></p><span data-dcnode-id="4255" instrument_node="">
</span><p align="justify" data-dcnode-id="4252"><font data-dcnode-id="4253" face="Arial"><span data-dcnode-id="4254" instrument_node="">The Seventh Commandment is found twice in 
the Old Testament and six times in the New Testament: Exodus 20:14, Deuteronomy 
5:18, Matthew 5:27, Matthew 19:18, Mark 10:19, Luke 18:20, Romans 13:9, and 
James 2:11. </span></font></p><span data-dcnode-id="4251" instrument_node="">
</span><p align="justify" data-dcnode-id="4248"><font data-dcnode-id="4249" face="Arial"><span data-dcnode-id="4250" instrument_node="">This article is devoted to the sexual 
intimacy that YEHOVAH God* designed for a man and a woman joined together in 
holy matrimony to experience and enjoy. After YEHOVAH provided Eve as his 
helpmeet, Adam referred to this husband and wife relationship in the following 
manner: </span></font></p><span data-dcnode-id="4247" instrument_node="">
</span><blockquote data-dcnode-id="4241"><span data-dcnode-id="4246" instrument_node="">
</span><p align="justify" data-dcnode-id="4243"><font data-dcnode-id="4244" face="Arial"><span data-dcnode-id="4245" instrument_node="">"…This is now bone of my bones, and 
	flesh of my flesh: she shall be called Woman, because she was taken out of 
	Man. Therefore shall a man leave his father and his mother, and shall cleave 
	unto his wife: and they shall be one flesh" (Genesis 2:23-24).</span></font></p><span data-dcnode-id="4242" instrument_node="">
</span></blockquote><span data-dcnode-id="4240" instrument_node="">
</span><p align="justify" data-dcnode-id="4235"><font data-dcnode-id="4236" face="Arial"><span data-dcnode-id="4239" instrument_node="">*YHVH, properly pronounced YEHOVAH, is the 
English transliteration of the Tetragrammaton, the principal Hebrew name of the 
God of the Bible.</span><b data-dcnode-id="4237"><span data-dcnode-id="4238" instrument_node=""> [1]</span></b></font></p><span data-dcnode-id="4234" instrument_node="">
</span></font><p align="justify" data-dcnode-id="4225"><font data-dcnode-id="4229" size="4"><font data-dcnode-id="4231" face="Arial"><span data-dcnode-id="4232" instrument_node="">When this “one flesh” relationship between 
a husband and his wife is approached and experienced as YEHOVAH intends it, 
sexual intercourse is one of the most intimate and beautiful acts shared by a 
man and a woman. However, when it is perverted or adulterated, it becomes one of 
mankind’s most debased, obscene, and repugnant acts. When man turns away from 
YEHOVAH’s created order, he makes what is beautiful ugly, what is wholesome 
obscene, and what is lovely vulgar. In short, man makes what is good evil, what 
is light dark, and what is sweet bitter </span></font><span data-dcnode-id="4230" instrument_node="">
</span></font><span data-dcnode-id="4228" instrument_node="">
</span><font data-dcnode-id="4226" face="Arial" size="4"><span data-dcnode-id="4227" instrument_node="">-- Isaiah 5:20. </span></font></p><font data-dcnode-id="4141" face="Arial" size="4"><span data-dcnode-id="4224" instrument_node="">
</span><p align="justify" data-dcnode-id="4222"><span data-dcnode-id="4223" instrument_node="">Without YEHOVAH God and His laws, man is capable of devising, 
participating in, and justifying the vilest behavior. The Seventh Commandment -- 
the antithesis of mankind’s decadent sexual conduct -- brings YEHOVAH’s 
condemnation upon the sin of adultery. </span></p><span data-dcnode-id="4221" instrument_node="">
</span><p align="center" data-dcnode-id="4218"><b data-dcnode-id="4219"><span data-dcnode-id="4220" instrument_node="">Adultery</span></b></p><span data-dcnode-id="4217" instrument_node="">
</span><p align="justify" data-dcnode-id="4211"><span data-dcnode-id="4216" instrument_node="">Adultery is sexual relations with anyone besides one’s 
husband or wife. However, this limited application does not encompass the full 
scope of the Seventh Commandment. Adultery is not merely having extra-marital 
relations. All sexual transgressions, as defined by the Bible, fall under the 
Seventh Commandment. Adultery is any sexual violation that defiles the marriage 
bed. </span><i data-dcnode-id="4213"><b data-dcnode-id="4214"><span data-dcnode-id="4215" instrument_node="">Webster’s American Dictionary of the English Language</span></b></i><span data-dcnode-id="4212" instrument_node=""> (1828) 
corroborates this broader definition: </span></p><span data-dcnode-id="4210" instrument_node="">
</span><blockquote data-dcnode-id="4203"><span data-dcnode-id="4209" instrument_node="">
</span><p align="justify" data-dcnode-id="4205"><span data-dcnode-id="4208" instrument_node="">"1. Violation of the marriage bed; a crime, or a civil 
	injury, which introduces, or may introduce, into a family, a spurious 
	offspring. In common usage, adultery means the unfaithfulness of any married 
	person to the marriage bed….2. In a scriptural sense, all manner of lewdness 
	or unchastity, as in the seventh commandment." </span><b data-dcnode-id="4206"><span data-dcnode-id="4207" instrument_node="">[2]</span></b></p><span data-dcnode-id="4204" instrument_node="">
</span></blockquote><span data-dcnode-id="4202" instrument_node="">
</span><p align="justify" data-dcnode-id="4197"><b data-dcnode-id="4199"><i data-dcnode-id="4200"><span data-dcnode-id="4201" instrument_node="">Webster’s New Collegiate Dictionary</span></i></b><span data-dcnode-id="4198" instrument_node=""> defines 
“adulterate”: </span></p><span data-dcnode-id="4196" instrument_node="">
</span><blockquote data-dcnode-id="4189"><span data-dcnode-id="4195" instrument_node="">
</span><p align="justify" data-dcnode-id="4191"><span data-dcnode-id="4194" instrument_node="">"…To corrupt, debase, or make impure by the addition of a 
	foreign or inferior substance…spurious." </span><b data-dcnode-id="4192"><span data-dcnode-id="4193" instrument_node="">[3]</span></b></p><span data-dcnode-id="4190" instrument_node="">
</span></blockquote><span data-dcnode-id="4188" instrument_node="">
</span><p align="justify" data-dcnode-id="4186"><span data-dcnode-id="4187" instrument_node="">Infidelity, miscegenation, sodomy, bestiality, incest, and 
other immoral sexual relations satisfy this definition because they all corrupt, 
debase, and make impure by the addition of a foreign or inferior substance. </span></p><span data-dcnode-id="4185" instrument_node="">
</span><p align="justify" data-dcnode-id="4177"><span data-dcnode-id="4184" instrument_node="">Hebrews 13:4, which is probably the best commentary on the 
Seventh Commandment, associates not only </span><i data-dcnode-id="4182"><span data-dcnode-id="4183" instrument_node="">moichous</span></i><span data-dcnode-id="4181" instrument_node="">, the Greek word 
translated “adulterers,” with defiling the marriage bed, but also </span><i data-dcnode-id="4179"><span data-dcnode-id="4180" instrument_node="">pornous</span></i><span data-dcnode-id="4178" instrument_node="">, 
the Greek word translated “whoremongers” or “fornicators.” </span></p><span data-dcnode-id="4176" instrument_node="">
</span><blockquote data-dcnode-id="4171"><span data-dcnode-id="4175" instrument_node="">
</span><p align="justify" data-dcnode-id="4173"><span data-dcnode-id="4174" instrument_node="">"Let marriage be held in honor among all, and let the 
	marriage bed be undefiled; for fornicators and adulterers God will judge" 
	(Hebrews 13:4, NASV).</span></p><span data-dcnode-id="4172" instrument_node="">
</span></blockquote><span data-dcnode-id="4170" instrument_node="">
</span><p align="justify" data-dcnode-id="4160"><span data-dcnode-id="4169" instrument_node="">Hebrews 13:4 in the </span><b data-dcnode-id="4166"><i data-dcnode-id="4167"><span data-dcnode-id="4168" instrument_node="">New American Standard Version</span></i></b><span data-dcnode-id="4165" instrument_node=""> 
(NASV), is very similar to </span><i data-dcnode-id="4162"><b data-dcnode-id="4163"><span data-dcnode-id="4164" instrument_node="">The Bible in Basic English</span></b></i><span data-dcnode-id="4161" instrument_node="">’s 
translation of Exodus 20:14: “Do not be false to the married relation.” </span></p><span data-dcnode-id="4159" instrument_node="">
</span><p align="justify" data-dcnode-id="4143"><i data-dcnode-id="4157"><span data-dcnode-id="4158" instrument_node="">Pornous</span></i><span data-dcnode-id="4156" instrument_node="">, a form of </span><i data-dcnode-id="4154"><span data-dcnode-id="4155" instrument_node="">porneia</span></i><span data-dcnode-id="4153" instrument_node=""> from which our 
English word “pornography” is derived, is usually translated “fornication” in 
the New Testament. </span><i data-dcnode-id="4151"><span data-dcnode-id="4152" instrument_node="">Pornous</span></i><span data-dcnode-id="4150" instrument_node=""> or </span><i data-dcnode-id="4148"><span data-dcnode-id="4149" instrument_node="">porneia</span></i><span data-dcnode-id="4147" instrument_node=""> are much more inclusive than 
most Christians* realize. While fornication is nearly always portrayed as the 
sexual misconduct between an unmarried couple, this is only one form of </span><i data-dcnode-id="4145"><span data-dcnode-id="4146" instrument_node="">
porneia</span></i><span data-dcnode-id="4144" instrument_node="">.</span></p><span data-dcnode-id="4142" instrument_node="">
</span></font><font data-dcnode-id="2514" face="Arial" size="4"><span data-dcnode-id="4140" instrument_node="">
</span><p align="justify" data-dcnode-id="4136"><span data-dcnode-id="4139" instrument_node="">*Not everyone claiming to be a Christian has been properly 
instructed in the Biblical plan of salvation. Mark 16:15-16, Acts 2:36-41, 
22:1-16, Romans 6:3-4, Galatians 3:26-27, Colossians 2:11-13, and 1 Peter 3:21 
should be studied to understand what is required to be covered by the blood of 
Yeshua the Messiah and forgiven of your sins.</span><b data-dcnode-id="4137"><span data-dcnode-id="4138" instrument_node=""> [4]</span></b></p><span data-dcnode-id="4135" instrument_node="">
</span><p align="justify" data-dcnode-id="4128"><b data-dcnode-id="4133"><span data-dcnode-id="4134" instrument_node="">Incest</span></b><span data-dcnode-id="4132" instrument_node=""> is described as</span><i data-dcnode-id="4130"><span data-dcnode-id="4131" instrument_node=""> porneia</span></i><span data-dcnode-id="4129" instrument_node=""> in 1 Corinthians 
5: </span></p><span data-dcnode-id="4127" instrument_node="">
</span><blockquote data-dcnode-id="4122"><span data-dcnode-id="4126" instrument_node="">
</span><p align="justify" data-dcnode-id="4124"><span data-dcnode-id="4125" instrument_node="">"It is reported commonly that there is fornication among 
	you, and such fornication…that one should have his father’s wife" (1 
	Corinthians 5:1).</span></p><span data-dcnode-id="4123" instrument_node="">
</span></blockquote><span data-dcnode-id="4121" instrument_node="">
</span><p align="justify" data-dcnode-id="4114"><b data-dcnode-id="4119"><span data-dcnode-id="4120" instrument_node="">Harlotry</span></b><span data-dcnode-id="4118" instrument_node=""> is identified as </span><i data-dcnode-id="4116"><span data-dcnode-id="4117" instrument_node="">porneia</span></i><span data-dcnode-id="4115" instrument_node=""> in 1 
Corinthians 6: </span></p><span data-dcnode-id="4113" instrument_node="">
</span><blockquote data-dcnode-id="4108"><span data-dcnode-id="4112" instrument_node="">
</span><p align="justify" data-dcnode-id="4110"><span data-dcnode-id="4111" instrument_node="">"…The body is not for fornication, but for the Lord; and 
	the Lord for the body….Shall I then take the members of Christ, and make 
	them the members of an harlot?..." (1 Corinthians 6:13-15).</span></p><span data-dcnode-id="4109" instrument_node="">
</span></blockquote><span data-dcnode-id="4107" instrument_node="">
</span><p align="justify" data-dcnode-id="4099"><span data-dcnode-id="4106" instrument_node="">Esau’s</span><b data-dcnode-id="4104"><span data-dcnode-id="4105" instrument_node=""> forbidden-lineage relationships</span></b><span data-dcnode-id="4103" instrument_node=""> with Canaanite 
women are described as </span><i data-dcnode-id="4101"><span data-dcnode-id="4102" instrument_node="">pornos</span></i><span data-dcnode-id="4100" instrument_node=""> in Hebrews 12: </span></p><span data-dcnode-id="4098" instrument_node="">
</span><blockquote data-dcnode-id="4093"><span data-dcnode-id="4097" instrument_node="">
</span><p align="justify" data-dcnode-id="4095"><span data-dcnode-id="4096" instrument_node="">"Looking diligently lest any man fail of the grace of 
	God…lest there be any fornicator…as Esau…." (Hebrews 12:15-16).</span></p><span data-dcnode-id="4094" instrument_node="">
</span></blockquote><span data-dcnode-id="4092" instrument_node="">
</span><p align="justify" data-dcnode-id="4082"><b data-dcnode-id="4090"><span data-dcnode-id="4091" instrument_node="">Sodomy or homosexuality</span></b><span data-dcnode-id="4089" instrument_node=""> is defined by </span><i data-dcnode-id="4087"><span data-dcnode-id="4088" instrument_node="">ekporneusasai</span></i><span data-dcnode-id="4086" instrument_node="">, 
a Greek word closely related to </span><i data-dcnode-id="4084"><span data-dcnode-id="4085" instrument_node="">porneia</span></i><span data-dcnode-id="4083" instrument_node="">, in Jude 1: </span></p><span data-dcnode-id="4081" instrument_node="">
</span><blockquote data-dcnode-id="4076"><span data-dcnode-id="4080" instrument_node="">
</span><p align="justify" data-dcnode-id="4078"><span data-dcnode-id="4079" instrument_node="">"…As Sodom and Gomorrha…giving themselves over to 
	fornication, and going after strange flesh [women with women and men with 
	men -- Romans 1:26-27]…." (Jude 1:7).</span></p><span data-dcnode-id="4077" instrument_node="">
</span></blockquote><span data-dcnode-id="4075" instrument_node="">
</span><p align="justify" data-dcnode-id="4064"><span data-dcnode-id="4074" instrument_node="">These four acts of sexual immorality -- incest, harlotry, 
forbidden-lineage relationships, and sodomy -- are identified in the New 
Testament as </span><i data-dcnode-id="4072"><span data-dcnode-id="4073" instrument_node="">porneia</span></i><span data-dcnode-id="4071" instrument_node=""> or fornication. Miscegenation and bestiality, 
although not identified as </span><i data-dcnode-id="4069"><span data-dcnode-id="4070" instrument_node="">porneia</span></i><span data-dcnode-id="4068" instrument_node=""> in the New Testament, also constitute
</span><i data-dcnode-id="4066"><span data-dcnode-id="4067" instrument_node="">porneia</span></i><span data-dcnode-id="4065" instrument_node=""> and can be placed under the broader heading of adultery. Because 
YEHOVAH’s design for sexual intimacy is exclusive to the marital relationship 
between a husband and his wife, sexual sins committed prior to the wedding also 
defile the marriage bed. </span></p><span data-dcnode-id="4063" instrument_node="">
</span><p align="justify" data-dcnode-id="4061"><span data-dcnode-id="4062" instrument_node="">In short, adultery is any sexual impropriety that is false to 
the marriage covenant. </span></p><span data-dcnode-id="4060" instrument_node="">
</span><p align="center" data-dcnode-id="4057"><b data-dcnode-id="4058"><span data-dcnode-id="4059" instrument_node="">Incest</span></b></p><span data-dcnode-id="4056" instrument_node="">
</span><blockquote data-dcnode-id="4051"><span data-dcnode-id="4055" instrument_node="">
</span><p align="justify" data-dcnode-id="4053"><span data-dcnode-id="4054" instrument_node="">"None of you shall approach to any that is near of kin to 
	him, to uncover their nakedness: I am YHVH" * (Leviticus 18:6).</span></p><span data-dcnode-id="4052" instrument_node="">
</span></blockquote><span data-dcnode-id="4050" instrument_node="">
</span><p align="justify" data-dcnode-id="4046"><span data-dcnode-id="4049" instrument_node="">*Where the Tetragrammaton YHVH -- the four Hebrew characters 
that represent the personal name of God -- has been incorrectly rendered the 
LORD or GOD in English translations, I have taken the liberty to correct this 
error by inserting YHVH. </span><b data-dcnode-id="4047"><span data-dcnode-id="4048" instrument_node="">[5]</span></b></p><span data-dcnode-id="4045" instrument_node="">
</span><p align="justify" data-dcnode-id="4043"><span data-dcnode-id="4044" instrument_node="">Verse 6 condemns all incestuous relationships. The twelve 
verses that follow expand upon this statute by prohibiting sexual relationships 
between parents and children, siblings or half-siblings, grandparents and 
grandchildren, uncles or aunts and nephews or nieces, and in-laws. </span></p><span data-dcnode-id="4042" instrument_node="">
</span><p align="justify" data-dcnode-id="4040"><span data-dcnode-id="4041" instrument_node="">Leviticus 18:7-8 uses the idiom “uncovering your father’s 
nakedness” to describe incest with a person’s mother or stepmother: </span></p><span data-dcnode-id="4039" instrument_node="">
</span><blockquote data-dcnode-id="4034"><span data-dcnode-id="4038" instrument_node="">
</span><p align="justify" data-dcnode-id="4036"><span data-dcnode-id="4037" instrument_node="">"The nakedness of thy father, or the nakedness of thy 
	mother, shalt thou not uncover: she is thy mother; thou shalt not uncover 
	her nakedness. The nakedness of thy father’s wife shalt thou not uncover: it 
	is thy father’s nakedness" (Leviticus 18:7-8).</span></p><span data-dcnode-id="4035" instrument_node="">
</span></blockquote><span data-dcnode-id="4033" instrument_node="">
</span><p align="justify" data-dcnode-id="4031"><span data-dcnode-id="4032" instrument_node="">The phrase “discover his father’s skirt” in Deuteronomy 22:30 
and the phrase “uncovereth his father’s skirt” in Deuteronomy 27:20 are also 
euphemistic descriptions of incest with a person’s mother or stepmother. </span></p><span data-dcnode-id="4030" instrument_node="">
</span><p align="justify" data-dcnode-id="4028"><span data-dcnode-id="4029" instrument_node="">The proper understanding of these phrases is crucial to 
understanding YEHOVAH’s judgment upon Noah’s grandson Canaan. Many Bible readers 
are bewildered as to why Canaan was cursed for his father Ham’s sin in Genesis 
9: </span></p><span data-dcnode-id="4027" instrument_node="">
</span><blockquote data-dcnode-id="4022"><span data-dcnode-id="4026" instrument_node="">
</span><p align="justify" data-dcnode-id="4024"><span data-dcnode-id="4025" instrument_node="">"…Ham, the father of Canaan, saw the nakedness of his 
	father, and told his two brethren without….And Noah awoke from his wine, and 
	knew what his younger son [Ham] had done unto him. And he said, Cursed be 
	Canaan; a servant of servants shall he be unto his brethren…." (Genesis 
	9:22-27).</span></p><span data-dcnode-id="4023" instrument_node="">
</span></blockquote><span data-dcnode-id="4021" instrument_node="">
</span><p align="justify" data-dcnode-id="4019"><span data-dcnode-id="4020" instrument_node="">The Biblical interpretation of the phrase “the nakedness of 
his father” reveals why the curse was upon Canaan and his descendants, and not 
any of Ham’s other sons and their descendants. When you permit the Bible -- 
specifically Leviticus 18:7-8, Deuteronomy 22:30 and 27:20 -- to be its own 
commentary, it is apparent that Canaan was cursed because he was the offspring 
of Ham’s incestuous relationship with his own mother. </span></p><span data-dcnode-id="4018" instrument_node="">
</span><p align="justify" data-dcnode-id="4016"><span data-dcnode-id="4017" instrument_node="">Some people may still question why Canaan was cursed instead 
of Ham, but YEHOVAH God in His omniscience knew that the progeny from this 
incestuous relationship would prove to be morally reprobate. This was also true 
of the Moabites and the Ammonites, who came from the incestuous relationships of 
Lot and his two daughters, described in Genesis 19:30-38. In Ezra 9:1-12, the 
Moabites and the Ammonites were placed under the same curse as the Canaanites, 
and the Israelites were forbidden to marry them.* </span></p><span data-dcnode-id="4015" instrument_node="">
</span><p align="justify" data-dcnode-id="4013"><span data-dcnode-id="4014" instrument_node="">*Ezra 9:1 lists Egyptians [Hamites -- Psalm 78:50-51, 
105:23-27, and 106:21-22] among the peoples from whom the Israelites were to 
separate themselves. The Hamites, as a whole, were not forbidden for the 
Israelites to marry, which would seem to indicate that the Hamites in this 
instance had intermingled with the Canaanites.</span></p><span data-dcnode-id="4012" instrument_node="">
</span><p align="justify" data-dcnode-id="4007"><span data-dcnode-id="4011" instrument_node="">The gravity of </span><b data-dcnode-id="4009"><span data-dcnode-id="4010" instrument_node="">incest</span></b><span data-dcnode-id="4008" instrument_node=""> is also demonstrated in the New 
Testament. Mark 6:14-28 relates how John the Baptist was imprisoned and later 
beheaded because he dared preach against King Herod’s incest with his brother’s 
wife. The apostle Paul condemned incest in 1 Corinthians 5:1-5. </span></p><span data-dcnode-id="4006" instrument_node="">
</span><p align="center" data-dcnode-id="4003"><b data-dcnode-id="4004"><span data-dcnode-id="4005" instrument_node="">Physical Consequences of Incest</span></b></p><span data-dcnode-id="4002" instrument_node="">
</span><p align="justify" data-dcnode-id="3997"><span data-dcnode-id="4001" instrument_node="">Although the Israelites of Moses’ day may not have recognized 
the spiritual and physical consequences of these close genetic relationships,* 
we are now able to see the destructive consequences of </span><b data-dcnode-id="3999"><span data-dcnode-id="4000" instrument_node="">incest</span></b><span data-dcnode-id="3998" instrument_node="">. </span></p><span data-dcnode-id="3996" instrument_node="">
</span><p align="justify" data-dcnode-id="3991"><span data-dcnode-id="3995" instrument_node="">*</span><b data-dcnode-id="3993"><span data-dcnode-id="3994" instrument_node="">Incest</span></b><span data-dcnode-id="3992" instrument_node=""> is usually defined as forbidden sexual relations 
between near-blood kinsmen. However, Leviticus 18:8 and 16 and Deuteronomy 27:23 
expand the term “near of kin” to include stepmothers, sister-in-laws, and 
mother-in-laws.</span></p><span data-dcnode-id="3990" instrument_node="">
</span><p align="justify" data-dcnode-id="3986"><span data-dcnode-id="3989" instrument_node="">Arthur C. Custance expounded upon the physical consequences 
of incestuous relationships. He studied thirteen children who were born from 
either father and daughter or brother and sister relationships. Eight out of 
thirteen were born with severe mental or physical deficiencies. Three of the 
children were dead before they reached their eighth birthday.</span><b data-dcnode-id="3987"><span data-dcnode-id="3988" instrument_node=""> [6] </span></b></p><span data-dcnode-id="3985" instrument_node="">
</span><p align="justify" data-dcnode-id="3983"><span data-dcnode-id="3984" instrument_node="">Although early man may not yet have known about these 
potential abnormalities, YEHOVAH God had already established the consequences of 
these adulterous relationships long before He commanded Moses to ban them. </span></p><span data-dcnode-id="3982" instrument_node="">
</span><p align="center" data-dcnode-id="3979"><b data-dcnode-id="3980"><span data-dcnode-id="3981" instrument_node="">Menstrual Impurity</span></b></p><span data-dcnode-id="3978" instrument_node="">
</span><blockquote data-dcnode-id="3970"><span data-dcnode-id="3977" instrument_node="">
</span><p align="justify" data-dcnode-id="3975"><span data-dcnode-id="3976" instrument_node="">"And if a woman have an issue, and her issue in her flesh 
	be blood, she shall be put apart seven days: and whosoever toucheth her 
	shall be unclean until the even. And every thing that she lieth upon in her 
	separation…also that she sitteth upon shall be unclean. And whosoever 
	toucheth her bed…whosoever toucheth any thing that she sat upon shall wash 
	his clothes, and bathe himself in water, and be unclean until the even….And 
	if any man lie with her at all, and her flowers [menstrual impurity, NASV] 
	be upon him, he shall be unclean seven days; and all the bed whereon he 
	lieth shall be unclean" (Leviticus 15:19-24).</span></p><span data-dcnode-id="3974" instrument_node="">
</span><p align="justify" data-dcnode-id="3972"><span data-dcnode-id="3973" instrument_node="">"Also thou shalt not approach unto a woman to uncover her 
	nakedness, as long as she is put apart for her uncleanness [menstrual 
	impurity, NASV]" (Leviticus 18:19).</span></p><span data-dcnode-id="3971" instrument_node="">
</span></blockquote><span data-dcnode-id="3969" instrument_node="">
</span><p align="justify" data-dcnode-id="3967"><span data-dcnode-id="3968" instrument_node="">These passages address an area of privacy seldom spoken of or 
written about. This statute is principally speaking of menstruation, the monthly 
cycle that follows a woman’s ovulation. Because many people are unaware that the 
Bible addresses this area of intimacy, many Christians transgress this Seventh 
Commandment statute. </span></p><span data-dcnode-id="3966" instrument_node="">
</span><p align="justify" data-dcnode-id="3964"><span data-dcnode-id="3965" instrument_node="">A man’s wife, especially a prudent wife, is a gift of YEHOVAH 
God. But YEHOVAH has not given man license to do whatever he wishes with his 
wife. The gift comes with certain conditions, as do all of YEHOVAH’s gifts. </span></p><span data-dcnode-id="3963" instrument_node="">
</span><p align="justify" data-dcnode-id="3961"><span data-dcnode-id="3962" instrument_node="">Even though Adam and his progeny were given the earth to 
inhabit, cultivate, and subdue, the Bible contains many agricultural statutes 
that dictate how the land is to be farmed. Included in those laws is a 
stipulation that the land is to be rested every seven years. For at least seven 
days every month, a similar standard applies to a man’s wife. Menstruation is a 
time when women are to be set apart and protected. </span></p><span data-dcnode-id="3960" instrument_node="">
</span><p align="justify" data-dcnode-id="3958"><span data-dcnode-id="3959" instrument_node="">Just as the land suffers when YEHOVAH’s agricultural laws are 
abandoned, so does a woman’s health when the statutes regulating sexual 
relations are ignored. It is a medical fact that a woman’s health, specifically 
the environment of the womb, is compromised when YEHOVAH’s statutes concerning 
sexual abstinence are ignored. </span></p><span data-dcnode-id="3957" instrument_node="">
</span><p align="justify" data-dcnode-id="3955"><span data-dcnode-id="3956" instrument_node="">Couples should abstain from conjugal relations for seven 
days, from the beginning of the woman’s menstrual cycle, provided the cycle is 
normal. Although, opinions differ as to whether this passage requires total 
separation, there is no question that YEHOVAH God demands sexual abstinence 
during this cleansing cycle. The law applies so long as the blood flow 
continues: </span></p><span data-dcnode-id="3954" instrument_node="">
</span><blockquote data-dcnode-id="3949"><span data-dcnode-id="3953" instrument_node="">
</span><p align="justify" data-dcnode-id="3951"><span data-dcnode-id="3952" instrument_node="">"And if a woman have an issue of her blood many days out 
	of the time of her separation, or if it run beyond the time of her 
	separation; all the days of the issue of her uncleanness shall be as the 
	days of her separation: she shall be unclean….But if she be cleansed of her 
	issue, then she shall number to herself seven days, and after that she shall 
	be clean" (Leviticus 15:25-28).</span></p><span data-dcnode-id="3950" instrument_node="">
</span></blockquote><span data-dcnode-id="3948" instrument_node="">
</span><p align="justify" data-dcnode-id="3946"><span data-dcnode-id="3947" instrument_node="">Leviticus 12:2-5 mandates sexual abstinence following 
childbirth. The duration differs depending upon the gender of the child -- forty 
days for a male child and eighty days for a female child. </span></p><span data-dcnode-id="3945" instrument_node="">
</span><p align="justify" data-dcnode-id="3943"><span data-dcnode-id="3944" instrument_node="">The Bible does not disclose why sexual abstinence is to be 
twice as long following the birth of a female child as it is for a male child, 
neither has medical science determined the reason for this stipulation. Perhaps 
the difference may relate to hormonal variations. Regardless, unquestioning 
obedience is required. At the best, it is an inconsiderate and selfish husband 
who would demand or do otherwise. </span></p><span data-dcnode-id="3942" instrument_node="">
</span><p align="justify" data-dcnode-id="3940"><span data-dcnode-id="3941" instrument_node="">The judgment for transgressing Leviticus 18:19 depends upon 
whether defilement during menstruation is inadvertent or deliberate. According 
to Leviticus 15, inadvertent contamination results only in physical uncleanness, 
requiring purification by a self-imposed separation or quarantine. A deliberate 
offence, however, is much more serious in YEHOVAH’s sight: </span></p><span data-dcnode-id="3939" instrument_node="">
</span><blockquote data-dcnode-id="3934"><span data-dcnode-id="3938" instrument_node="">
</span><p align="justify" data-dcnode-id="3936"><span data-dcnode-id="3937" instrument_node="">"And if a man shall lie with a woman having her sickness 
	[menstruous woman, NASV], and shall uncover her nakedness; he hath 
	discovered her fountain, and she hath uncovered the fountain of her blood: 
	and both of them shall be cut off from among their people" (Leviticus 
	20:18).</span></p><span data-dcnode-id="3935" instrument_node="">
</span></blockquote><span data-dcnode-id="3933" instrument_node="">
</span><p align="justify" data-dcnode-id="3931"><span data-dcnode-id="3932" instrument_node="">The phrase “cut off from among their people” is used in the 
Old Testament for both capital punishment and excommunication. Most likely it is 
the latter that is the intended punishment in this instance, but no matter how 
this phrase is interpreted, it is obvious that deliberate transgression of this 
statute is a serious infraction in YEHOVAH God’s sight. </span></p><span data-dcnode-id="3930" instrument_node="">
</span><p align="center" data-dcnode-id="3927"><b data-dcnode-id="3928"><span data-dcnode-id="3929" instrument_node="">Marital Infidelity</span></b></p><span data-dcnode-id="3926" instrument_node="">
</span><blockquote data-dcnode-id="3921"><span data-dcnode-id="3925" instrument_node="">
</span><p align="justify" data-dcnode-id="3923"><span data-dcnode-id="3924" instrument_node="">"Moreover thou shalt not lie carnally with thy neighbor’s 
	wife, to defile thyself with her" (Leviticus 18:20).</span></p><span data-dcnode-id="3922" instrument_node="">
</span></blockquote><span data-dcnode-id="3920" instrument_node="">
</span><p align="justify" data-dcnode-id="3918"><span data-dcnode-id="3919" instrument_node="">With the limited definition that most Christians assign to 
the Commandment “Thou shalt not commit adultery,” many people think that this 
verse is nothing more than a reiteration of the Seventh Commandment. Leviticus 
18:20, however, is one of many statutes that falls under and helps to explain 
the Seventh Commandment. </span></p><span data-dcnode-id="3917" instrument_node="">
</span><p align="justify" data-dcnode-id="3915"><span data-dcnode-id="3916" instrument_node="">The Bible contains many warnings against marital infidelity 
and its consequences: </span></p><span data-dcnode-id="3914" instrument_node="">
</span><blockquote data-dcnode-id="3909"><span data-dcnode-id="3913" instrument_node="">
</span><p align="justify" data-dcnode-id="3911"><span data-dcnode-id="3912" instrument_node="">"…Wisdom…knowledge…discretion…[and] understanding 
	shall…deliver thee from the strange woman, even from the stranger which 
	flattereth with her words….For her house inclineth unto death, and her paths 
	unto the dead. None that go unto her return again, neither take they hold of 
	the paths of life" (Proverbs 2:10-19).</span></p><span data-dcnode-id="3910" instrument_node="">
</span></blockquote><span data-dcnode-id="3908" instrument_node="">
</span><p align="justify" data-dcnode-id="3906"><span data-dcnode-id="3907" instrument_node="">Within marriage, sexual relations are meant to produce life. 
Outside of marriage, they can lead to death, both physically and spiritually.
</span></p><span data-dcnode-id="3905" instrument_node="">
</span><p align="justify" data-dcnode-id="3903"><span data-dcnode-id="3904" instrument_node="">The last statement of in Proverbs 2:10 is intentionally 
hyperbolic for the sake of emphasis. King David, among others, returned to the 
paths of life after repenting of their sexual unfaithfulness. The apostle Paul 
commented about such people: </span></p><span data-dcnode-id="3902" instrument_node="">
</span><blockquote data-dcnode-id="3897"><span data-dcnode-id="3901" instrument_node="">
</span><p align="justify" data-dcnode-id="3899"><span data-dcnode-id="3900" instrument_node="">"Know ye not that…neither fornicators…nor 
	adulterers…shall inherit the kingdom of God. And such were some of you: but 
	ye are washed, but ye are sanctified, but ye are justified in the name of 
	the Lord Yeshua,* and by the spirit of our God" (1 Corinthians 6:9-11).</span></p><span data-dcnode-id="3898" instrument_node="">
</span></blockquote><span data-dcnode-id="3896" instrument_node="">
</span><p align="justify" data-dcnode-id="3892"><span data-dcnode-id="3895" instrument_node="">*Yeshua is the English transliteration of our Savior’s Hebrew 
name.</span><b data-dcnode-id="3893"><span data-dcnode-id="3894" instrument_node=""> [7]</span></b></p><span data-dcnode-id="3891" instrument_node="">
</span><p align="justify" data-dcnode-id="3889"><span data-dcnode-id="3890" instrument_node="">The number of people who escape the addictive nature of this 
sin are far fewer than those who, once entrapped, are unable to flee its dire 
consequences. King Solomon devoted a good portion of four chapters in Proverbs 
to warning his sons about the dangers of marital infidelity and whore-mongering:
</span></p><span data-dcnode-id="3888" instrument_node="">
</span><blockquote data-dcnode-id="3874"><span data-dcnode-id="3887" instrument_node="">
</span><p align="justify" data-dcnode-id="3885"><span data-dcnode-id="3886" instrument_node="">"…The lips of a strange woman drop as an honeycomb, and 
	her mouth is smoother than oil: But her end is bitter as wormwood, sharp as 
	a two-edged sword. Her feet go down to death; her steps take hold on hell [sheol]….Remove 
	thy way far from her, and come not nigh the door of her house: Lest thou 
	give thine honour unto others, and thy years unto the cruel: Lest strangers 
	be filled with thy wealth…and thou mourn at the last, when thy flesh and thy 
	body are consumed….Lust not after her beauty in thine heart; neither let her 
	take thee with her eyelids. For by means of a whorish woman a man is brought 
	to a piece of bread….</span></p><span data-dcnode-id="3884" instrument_node="">
</span><p align="justify" data-dcnode-id="3882"><span data-dcnode-id="3883" instrument_node="">"Can a man take fire in his bosom, and his clothes not 
	be burned? Can one go upon hot coals, and his feet not be burned? So he that goeth in to his neighbour’s wife; whosoever toucheth her shall not be 
	innocent.…whoso committeth adultery with a woman lacketh understanding: he 
	that doeth it destroyeth his own soul….</span></p><span data-dcnode-id="3881" instrument_node="">
</span><p align="justify" data-dcnode-id="3879"><span data-dcnode-id="3880" instrument_node="">"Keep my commandments, and live; and 
	my law as the apple of thine eye. Bind them upon thy fingers, write them 
	upon the table of thine heart….That they may keep thee from the strange 
	woman, from the stranger which flattereth with her words. For at the window 
	of my house I looked through my casement, and beheld among the simple 
	ones...a young man void of understanding….And, behold, there met him…an 
	harlot…subtil of heart….So she caught him, and kissed him, and with an 
	impudent face said unto him,…Come, let us take our fill of love until the 
	morning….</span></p><span data-dcnode-id="3878" instrument_node="">
</span><p align="justify" data-dcnode-id="3876"><span data-dcnode-id="3877" instrument_node="">"With her much fair speech she caused him to yield, with the 
	flattering of her lips she forced him. He goeth after her straightway, as an 
	ox goeth to the slaughter, or as a fool to the correction of the stocks; 
	till a dart strike through his liver; as a bird hasteth to the snare, and 
	knoweth not that it is for his life….Let not thine heart decline to her 
	ways, go not astray in her paths. For she hath cast down many wounded: yea, 
	many strong men have been slain by her. Her house is the way to hell [sheol], 
	going down to the chambers of death" (Proverbs 5:3 - 7:27).</span></p><span data-dcnode-id="3875" instrument_node="">
</span></blockquote><span data-dcnode-id="3873" instrument_node="">
</span><p align="center" data-dcnode-id="3870"><b data-dcnode-id="3871"><span data-dcnode-id="3872" instrument_node="">Forbidden-Lineage and Interracial Relationships</span></b></p><span data-dcnode-id="3869" instrument_node="">
</span><p align="justify" data-dcnode-id="3867"><span data-dcnode-id="3868" instrument_node="">Sandwiched between statutes against marital infidelity (verse 
20) and sodomy (verse 22), is a prohibition that at first appears to be entirely 
out of context: </span></p><span data-dcnode-id="3866" instrument_node="">
</span><blockquote data-dcnode-id="3861"><span data-dcnode-id="3865" instrument_node="">
</span><p align="justify" data-dcnode-id="3863"><span data-dcnode-id="3864" instrument_node="">"And thou shalt not let any of thy seed pass through the 
	fire to Molech, neither shalt thou profane the name of thy God: I am YHVH" 
	(Leviticus 18:21).</span></p><span data-dcnode-id="3862" instrument_node="">
</span></blockquote><span data-dcnode-id="3860" instrument_node="">
</span><p align="justify" data-dcnode-id="3858"><span data-dcnode-id="3859" instrument_node="">This verse is typically interpreted as a prohibition against 
idolatry. But why would a statement about idolatry (specifically child 
sacrifice) be included in a chapter devoted to sexual interdictions? Perhaps 
this prohibition is not out of place after all, provided it is translated and 
interpreted correctly. </span></p><span data-dcnode-id="3857" instrument_node="">
</span><p align="justify" data-dcnode-id="3855"><span data-dcnode-id="3856" instrument_node="">The words “the fire” in verse 21 are in italics, indicating 
that there are no corresponding words in the Hebrew manuscripts and that these 
two words were added by the translators and do not belong in this verse. Molech 
worship did sometimes include the offering of children as burnt sacrifices, as 
indicated in other passages but this is not what is being addressed in Leviticus 
18. </span></p><span data-dcnode-id="3854" instrument_node="">
</span><p align="justify" data-dcnode-id="3852"><span data-dcnode-id="3853" instrument_node="">The judgment for passing seed to Molech is found in Leviticus 
20:</span></p><span data-dcnode-id="3851" instrument_node="">
</span><blockquote data-dcnode-id="3846"><span data-dcnode-id="3850" instrument_node="">
</span><p align="justify" data-dcnode-id="3848"><span data-dcnode-id="3849" instrument_node="">"…Whosoever…giveth any of his seed unto Molech; he shall 
	surely be put to death: the people of the land shall stone him with stones" 
	(Leviticus 20:1-2).</span></p><span data-dcnode-id="3847" instrument_node="">
</span></blockquote><span data-dcnode-id="3845" instrument_node="">
</span><p align="justify" data-dcnode-id="3843"><span data-dcnode-id="3844" instrument_node="">The translators did not add “the fire” in the judgment for 
this sin; its absence, along with some other factors, demonstrates that there is 
more than one way to offer or sacrifice seed to Molech. </span></p><span data-dcnode-id="3842" instrument_node="">
</span><p align="justify" data-dcnode-id="3834"><span data-dcnode-id="3841" instrument_node="">It should not be overlooked that neither Leviticus 18:21 nor 
Leviticus 20:1-2 uses the Hebrew word </span><i data-dcnode-id="3839"><span data-dcnode-id="3840" instrument_node="">ben</span></i><span data-dcnode-id="3838" instrument_node="">, translated “children.” 
Instead, the word </span><i data-dcnode-id="3836"><span data-dcnode-id="3837" instrument_node="">zera</span></i><span data-dcnode-id="3835" instrument_node="">`, meaning “sperm” or “future progeny” was used.
</span></p><span data-dcnode-id="3833" instrument_node="">
</span><p align="justify" data-dcnode-id="3817"><span data-dcnode-id="3832" instrument_node="">Leviticus 18:21 forbids letting one’s seed pass through to 
Molech. The phrase “pass through” is translated from the Hebrew word `</span><i data-dcnode-id="3830"><span data-dcnode-id="3831" instrument_node="">abiyr</span></i><span data-dcnode-id="3829" instrument_node="">.
</span><i data-dcnode-id="3826"><b data-dcnode-id="3827"><span data-dcnode-id="3828" instrument_node="">Strong’s Concordance</span></b></i><span data-dcnode-id="3825" instrument_node=""> and </span><b data-dcnode-id="3822"><i data-dcnode-id="3823"><span data-dcnode-id="3824" instrument_node="">The New Brown-Driver-Briggs-Gesenius 
Hebrew-English Lexicon</span></i></b><span data-dcnode-id="3821" instrument_node=""> define `</span><i data-dcnode-id="3819"><span data-dcnode-id="3820" instrument_node="">abiyr</span></i><span data-dcnode-id="3818" instrument_node="">: </span></p><span data-dcnode-id="3816" instrument_node="">
</span><blockquote data-dcnode-id="3804"><span data-dcnode-id="3815" instrument_node="">
</span><p align="justify" data-dcnode-id="3811"><span data-dcnode-id="3814" instrument_node="">"…A primitive root; to cross over…specifically, to cover 
	(in copulation)." </span><b data-dcnode-id="3812"><span data-dcnode-id="3813" instrument_node="">[8]</span></b></p><span data-dcnode-id="3810" instrument_node="">
</span><p align="justify" data-dcnode-id="3806"><span data-dcnode-id="3809" instrument_node="">"…Prop. causeth to pass over, sc. semen…." </span><b data-dcnode-id="3807"><span data-dcnode-id="3808" instrument_node="">[9]</span></b></p><span data-dcnode-id="3805" instrument_node="">
</span></blockquote><span data-dcnode-id="3803" instrument_node="">
</span><p align="justify" data-dcnode-id="3798"><span data-dcnode-id="3802" instrument_node="">The latter lexicon also quotes Job 21 in which the Hebrew 
word `</span><i data-dcnode-id="3800"><span data-dcnode-id="3801" instrument_node="">abiyr</span></i><span data-dcnode-id="3799" instrument_node=""> is translated “gendereth”: </span></p><span data-dcnode-id="3797" instrument_node="">
</span><blockquote data-dcnode-id="3792"><span data-dcnode-id="3796" instrument_node="">
</span><p align="justify" data-dcnode-id="3794"><span data-dcnode-id="3795" instrument_node="">"Their bull gendereth, and faileth not; their cow calveth, 
	and casteth not her calf" (Job 21:10).</span></p><span data-dcnode-id="3793" instrument_node="">
</span></blockquote><span data-dcnode-id="3791" instrument_node="">
</span><p align="justify" data-dcnode-id="3786"><span data-dcnode-id="3790" instrument_node="">Other versions of Job 21:10 translate `</span><i data-dcnode-id="3788"><span data-dcnode-id="3789" instrument_node="">abiyr</span></i><span data-dcnode-id="3787" instrument_node=""> as 
“mates” and “breeds.” It may not yet be evident what specific sexual sin is 
condemned in Leviticus 18:21, but it should be apparent that this prohibition 
does indeed agree with the context and is consonant with the other Seventh 
Commandment statutes found in Leviticus 18. </span></p><span data-dcnode-id="3785" instrument_node="">
</span><p align="justify" data-dcnode-id="3781"><span data-dcnode-id="3784" instrument_node="">The statute in Leviticus 18 and the judgment in Leviticus 20 
are obviously not meant to be understood as prohibitions against sexual 
participation with the god Molech itself. Therefore, Molech must represent 
something or someone else. The fact that Molech was the national deity of the 
Ammonites -- one of several lineages with whom the Israelites were forbidden to 
intermarry -- is the final clue in discovering the correct interpretation of 
this prohibition. </span><b data-dcnode-id="3782"><span data-dcnode-id="3783" instrument_node="">Passing one’s seed to Molech is a Hebrew idiom prohibiting 
forbidden-lineage and, by extension, interracial relationships. </span></b></p><span data-dcnode-id="3780" instrument_node="">
</span><p align="center" data-dcnode-id="3777"><b data-dcnode-id="3778"><span data-dcnode-id="3779" instrument_node="">The Syriac Translation</span></b></p><span data-dcnode-id="3776" instrument_node="">
</span><p align="justify" data-dcnode-id="3771"><b data-dcnode-id="3773"><i data-dcnode-id="3774"><span data-dcnode-id="3775" instrument_node="">Peake’s Commentary on the Bible</span></i></b><span data-dcnode-id="3772" instrument_node=""> questions the 
customary interpretation of Leviticus 18:21 and then provides alternate analyses 
and translations: </span></p><span data-dcnode-id="3770" instrument_node="">
</span><blockquote data-dcnode-id="3763"><span data-dcnode-id="3769" instrument_node="">
</span><p align="justify" data-dcnode-id="3765"><span data-dcnode-id="3768" instrument_node="">"21 is generally interpreted as referring to a ceremony 
	whereby children were passed through fire, possibly burning them as 
	whole-offerings. But it is curious that the prohibition here occurs among 
	sexual matters. The ancient versions have 'cause to serve’ (Sam.), ‘serve,’ 
	(LXX), ‘cause to lie down for sexual intercourse’ (Syr.), whilst other Greek 
	Versions have ‘compel by force’." </span><b data-dcnode-id="3766"><span data-dcnode-id="3767" instrument_node="">[10]</span></b></p><span data-dcnode-id="3764" instrument_node="">
</span></blockquote><span data-dcnode-id="3762" instrument_node="">
</span><p align="justify" data-dcnode-id="3756"><span data-dcnode-id="3761" instrument_node="">In his book </span><b data-dcnode-id="3758"><i data-dcnode-id="3759"><span data-dcnode-id="3760" instrument_node="">Old Testament Light: The Indispensable 
Guide to the Customs, Manners, &amp; Idioms of Biblical Times</span></i></b><span data-dcnode-id="3757" instrument_node="">, George Lamsa 
provides Leviticus 18:21 from the Syriac translation of the Old Testament: </span></p><span data-dcnode-id="3755" instrument_node="">
</span><blockquote data-dcnode-id="3748"><span data-dcnode-id="3754" instrument_node="">
</span><p align="justify" data-dcnode-id="3750"><span data-dcnode-id="3753" instrument_node="">"'Seed,' in this instance, means 'semen.' The Eastern 
	text reads: 'You shall not let any of your semen be cast into a strange 
	woman to cause her to be pregnant….' …This ordinance is against cohabiting 
	with pagan women…." </span><b data-dcnode-id="3751"><span data-dcnode-id="3752" instrument_node="">[11]</span></b></p><span data-dcnode-id="3749" instrument_node="">
</span></blockquote><span data-dcnode-id="3747" instrument_node="">
</span><p align="justify" data-dcnode-id="3745"><span data-dcnode-id="3746" instrument_node="">At the time that Leviticus 18:21 was written “pagan women” 
referred not only to non-believers, and more specifically to non-Israelites. 
During the Old Covenant dispensation, only lineages closely related to Israel 
worshiped YEHOVAH God; everyone else was considered pagan. Leviticus 18:21 
applies to both forbidden lineage and interracial relationships because both 
results in Israelites marrying pagans. </span></p><span data-dcnode-id="3744" instrument_node="">
</span><p align="justify" data-dcnode-id="3740"><span data-dcnode-id="3743" instrument_node="">Lamsa also points out that the word “‘Molech’ … [in] the 
Aramaic reads ‘a strange woman’; that is, a woman of another race or religion.”
</span><b data-dcnode-id="3741"><span data-dcnode-id="3742" instrument_node="">[12]</span></b></p><span data-dcnode-id="3739" instrument_node="">
</span><p align="center" data-dcnode-id="3736"><b data-dcnode-id="3737"><span data-dcnode-id="3738" instrument_node="">The Book of Jubilees</span></b></p><span data-dcnode-id="3735" instrument_node="">
</span><p align="justify" data-dcnode-id="3721"><span data-dcnode-id="3734" instrument_node="">Both the </span><i data-dcnode-id="3731"><b data-dcnode-id="3732"><span data-dcnode-id="3733" instrument_node="">Encyclopedia Judaica</span></b></i><span data-dcnode-id="3730" instrument_node=""> and </span><b data-dcnode-id="3727"><i data-dcnode-id="3728"><span data-dcnode-id="3729" instrument_node="">The 
Jewish Encyclopedia</span></i></b><span data-dcnode-id="3726" instrument_node=""> reference the </span><b data-dcnode-id="3723"><i data-dcnode-id="3724"><span data-dcnode-id="3725" instrument_node="">Book of Jubilees</span></i></b><span data-dcnode-id="3722" instrument_node="">* while commenting 
upon the meaning of this idiom in Leviticus 18 and 20: </span></p><span data-dcnode-id="3720" instrument_node="">
</span><blockquote data-dcnode-id="3705"><span data-dcnode-id="3719" instrument_node="">
</span><p align="justify" data-dcnode-id="3715"><span data-dcnode-id="3718" instrument_node="">"The book of Jubilees 30:7ff. connects intermarriage or 
	rather the marrying off of one’s children to pagans with the sin of 
	Moloch.…The prohibition of Moloch…the impregnation of a pagan woman, an 
	interpretation lying behind the Syriac translation in Leviticus 18 and 20. 
	The common denominator of all these traditions is the understanding of 
	Moloch worship as the transfer of Jewish [Israelite] children to paganism 
	either by delivering them directly to pagan priests or by procreation 
	through intercourse with a pagan woman. This tradition, which could hardly 
	be an invention, is now corroborated by the evidence in the Assyrian 
	documents." </span><b data-dcnode-id="3716"><span data-dcnode-id="3717" instrument_node="">[13]</span></b></p><span data-dcnode-id="3714" instrument_node="">
</span><p align="justify" data-dcnode-id="3707"><span data-dcnode-id="3713" instrument_node="">"In the book of Jubilees intermarriage with all 
	</span><b data-dcnode-id="3711"><span data-dcnode-id="3712" instrument_node="">Gentiles</span></b><span data-dcnode-id="3710" instrument_node="">** is prohibited, no allowance being made for proselytes (Jubilees, 
	xx. 4, xxii. 20, xxx. 11; comp. Targ. Yer. To Lev. xviii. 21, 'Thou shalt 
	not give any of thy seed to make them pass through the fire of Moloch,' 
	which is translated: 'Thou shalt not give a child in marriage to a Gentile 
	by which the offspring is turned over to idolatry….')” </span><b data-dcnode-id="3708"><span data-dcnode-id="3709" instrument_node="">[14]</span></b></p><span data-dcnode-id="3706" instrument_node="">
</span></blockquote><span data-dcnode-id="3704" instrument_node="">
</span><p align="justify" data-dcnode-id="3699"><span data-dcnode-id="3703" instrument_node="">*</span><b data-dcnode-id="3701"><span data-dcnode-id="3702" instrument_node="">Jubilees</span></b><span data-dcnode-id="3700" instrument_node=""> is a pseudepigraphic work, containing the views and 
religious practices of the most rigid Hasdaen school at the time of John Hycanus, 
during whose reign over the house of Judah (135 and 105 B.C.) it was written.
</span></p><span data-dcnode-id="3698" instrument_node="">
</span><p align="justify" data-dcnode-id="3689"><span data-dcnode-id="3697" instrument_node="">**“The word ‘</span><b data-dcnode-id="3695"><span data-dcnode-id="3696" instrument_node="">Gentile</span></b><span data-dcnode-id="3694" instrument_node="">’ corresponds to the late Hebrew ‘goi,’…signifying 
‘stranger,’ ‘non-Jew [non-Israelites].’…In its most comprehensive sense ‘goi’ 
corresponds to the other late term, ‘ummot ha-‘olam’ (the peoples of the 
world).” “Gentile,” </span><b data-dcnode-id="3691"><i data-dcnode-id="3692"><span data-dcnode-id="3693" instrument_node="">The Jewish Encyclopedia</span></i></b><span data-dcnode-id="3690" instrument_node=""> (New York &amp; London: 
Funk and Wagnalls Company, 1904) Volume V, p. 615.</span></p><span data-dcnode-id="3688" instrument_node="">
</span><p align="justify" data-dcnode-id="3686"><span data-dcnode-id="3687" instrument_node="">A portion of the passage from the book of Jubilees follows:
</span></p><span data-dcnode-id="3685" instrument_node="">
</span><blockquote data-dcnode-id="3680"><span data-dcnode-id="3684" instrument_node="">
</span><p align="justify" data-dcnode-id="3682"><span data-dcnode-id="3683" instrument_node="">"…If there is any man in Israel who desires to give his 
	daughter or his sister to any man who is of the seed of the Gentiles, he 
	shall surely die…for he has committed a sin and a shame in Israel….And to 
	this law there is no limit of days and no ceasing and no forgiveness, but he 
	shall be rooted out who defiles his daughter, among all Israel, because he 
	has given of his seed to Moloch….And thou, Moses, command the children of 
	Israel and testify over them that they shall not give any of their daughters 
	to the Gentiles and that they shall not take any of the daughters of the 
	Gentiles; for this is accursed before the Lord….And it is disgraceful to 
	Israel to those that give and to those that receive from any Gentiles any 
	daughters, for it is unclean and accursed to Israel; and Israel will not be 
	clean of this uncleanness of him who has of the daughters of the Gentiles 
	for a wife, or who has given of his daughters to a man who is of any of the 
	seed of the Gentiles…." (Jubilees 30:6-12).</span></p><span data-dcnode-id="3681" instrument_node="">
</span></blockquote><span data-dcnode-id="3679" instrument_node="">
</span><p align="justify" data-dcnode-id="3677"><span data-dcnode-id="3678" instrument_node="">Except for a few rare exceptions, YEHOVAH was the exclusive 
God of the Israelites. Therefore to Old Covenant Israelites, both the forbidden 
lineages and people from other races were considered pagans and gentiles. In 
Leviticus 18:21, Molech represents not only the Ammonites, but all forbidden 
lineages and other races of mankind. All such unions polluted Israel’s genes and 
inevitably led to idolatry. </span></p><span data-dcnode-id="3676" instrument_node="">
</span><p align="justify" data-dcnode-id="3674"><span data-dcnode-id="3675" instrument_node="">Only peoples of other races and the forbidden lineages of 
Canaan, Moab, and Ammon are included in the prohibition in Leviticus 18:21. 
Israelites were permitted to marry other racially alike non-Israelites. The 
Midianites, for example, were not Israelites, but because they were descendants 
of Abraham, they were not included in the Leviticus 18:21 prohibition. </span></p><span data-dcnode-id="3673" instrument_node="">
</span><p align="justify" data-dcnode-id="3671"><span data-dcnode-id="3672" instrument_node="">Leviticus 18:21 addresses this sin in an idiomatic fashion; 
the priest Ezra is more direct: </span></p><span data-dcnode-id="3670" instrument_node="">
</span><blockquote data-dcnode-id="3662"><span data-dcnode-id="3669" instrument_node="">
</span><p align="justify" data-dcnode-id="3664"><span data-dcnode-id="3668" instrument_node="">"The people of Israel, and the priests, and the Levites, 
	have not separated themselves from the people of the lands, doing according 
	to their abominations, even of the Canaanites, the Hittites, the Perizzites, 
	the Jebusites, the Ammonites, the Moabites, the </span><b data-dcnode-id="3666"><span data-dcnode-id="3667" instrument_node="">Egyptians</span></b><span data-dcnode-id="3665" instrument_node="">,* and the 
	Amorites. For they have taken of their daughters for themselves, and for 
	their sons: so that the holy seed have mingled themselves with the people of 
	those lands….Now therefore give not your daughters unto their sons, neither 
	take their daughters unto your sons…that ye may be strong, and eat the good 
	of the land, and leave it for an inheritance to your children for ever" 
	(Ezra 9:1-12).</span></p><span data-dcnode-id="3663" instrument_node="">
</span></blockquote><span data-dcnode-id="3661" instrument_node="">
</span><p align="justify" data-dcnode-id="3656"><span data-dcnode-id="3660" instrument_node="">*Ezra 9:1 lists </span><b data-dcnode-id="3658"><span data-dcnode-id="3659" instrument_node="">Egyptians</span></b><span data-dcnode-id="3657" instrument_node=""> [Hamites -- Psalm 78:50-51, 
105:23-27, and 106:21-22] among the peoples from whom the Israelites were to 
separate themselves. The Hamites, as a whole, were not forbidden for the 
Israelites to marry, which would seem to indicate that the Hamites in this 
instance had intermingled with the Canaanites.</span></p><span data-dcnode-id="3655" instrument_node="">
</span><blockquote data-dcnode-id="3650"><span data-dcnode-id="3654" instrument_node="">
</span><p align="justify" data-dcnode-id="3652"><span data-dcnode-id="3653" instrument_node="">"We have trespassed against our God, and have taken 
	strange wives of the people of the land….Now therefore let us make a 
	covenant with our God to put away all the wives, and such as are born of 
	them, according to the counsel of my lord, and of those that tremble at the 
	commandment of our God; and let it be done according to the law" (Ezra 
	10:2-3).</span></p><span data-dcnode-id="3651" instrument_node="">
</span></blockquote><span data-dcnode-id="3649" instrument_node="">
</span><p align="justify" data-dcnode-id="3641"><span data-dcnode-id="3648" instrument_node="">With these witnesses in mind, and because Deuteronomy 20 
associates Leviticus 18:21’s sin with whoredom; and because the phrase “pass 
through” can have sexual implications; and because </span><i data-dcnode-id="3646"><span data-dcnode-id="3647" instrument_node="">zera</span></i><span data-dcnode-id="3645" instrument_node="">, meaning “sperm,” 
was used instead of </span><i data-dcnode-id="3643"><span data-dcnode-id="3644" instrument_node="">ben</span></i><span data-dcnode-id="3642" instrument_node="">, meaning “children”; and because Leviticus 18 is 
a chapter devoted to sexual perversions and not to idolatry, it should be 
apparent that verse 21 fits the chapter’s context. This verse prohibits 
forbidden-lineage and, by extension, interracial relationships -- also known as 
miscegenation -- both of which pollute Israel’s genes and often lead to the 
worship of false gods. </span></p><span data-dcnode-id="3640" instrument_node="">
</span><p align="center" data-dcnode-id="3637"><b data-dcnode-id="3638"><span data-dcnode-id="3639" instrument_node="">Racial Segregation</span></b></p><span data-dcnode-id="3636" instrument_node="">
</span><p align="justify" data-dcnode-id="3631"><span data-dcnode-id="3635" instrument_node="">The fact that Israelites were commanded to live separate from 
all other peoples and that, for the most part, they have remained unmixed for 
the last several millennia, demonstrates that YEHOVAH God does not want the 
</span><b data-dcnode-id="3633"><span data-dcnode-id="3634" instrument_node="">Israelites</span></b><span data-dcnode-id="3632" instrument_node="">* mixing with people from other races. </span></p><span data-dcnode-id="3630" instrument_node="">
</span><p align="justify" data-dcnode-id="3623"><span data-dcnode-id="3629" instrument_node="">*The term “</span><b data-dcnode-id="3627"><span data-dcnode-id="3628" instrument_node="">Israelites</span></b><span data-dcnode-id="3626" instrument_node="">” is not meant to indicate today’s Jews, 
but instead today’s Celtic, Scandinavian, Germanic, Anglo Saxon, and kindred 
peoples. </span><b data-dcnode-id="3624"><span data-dcnode-id="3625" instrument_node="">[15]</span></b></p><span data-dcnode-id="3622" instrument_node="">
</span><p align="justify" data-dcnode-id="3620"><span data-dcnode-id="3621" instrument_node="">Deuteronomy 7:6, 14:2, 32:8-9, 1 Kings 8:51-52, 1 Chronicles 
17:21-22, and Amos 3:1-2 all affirm that YEHOVAH God chose Israel out of all the 
peoples of the earth to be His inheritance: </span></p><span data-dcnode-id="3619" instrument_node="">
</span><blockquote data-dcnode-id="3614"><span data-dcnode-id="3618" instrument_node="">
</span><p align="justify" data-dcnode-id="3616"><span data-dcnode-id="3617" instrument_node="">"…O children of Israel….You only have I known of all the 
	families of the earth…." (Amos 3:1-2).</span></p><span data-dcnode-id="3615" instrument_node="">
</span></blockquote><span data-dcnode-id="3613" instrument_node="">
</span><p align="justify" data-dcnode-id="3611"><span data-dcnode-id="3612" instrument_node="">Numerous prophecies reveal that this special marital 
relationship was to continue between YEHOVAH God and a remnant of Christian 
Israelites under the New Covenant as well: </span></p><span data-dcnode-id="3610" instrument_node="">
</span><blockquote data-dcnode-id="3599"><span data-dcnode-id="3609" instrument_node="">
</span><p align="justify" data-dcnode-id="3607"><span data-dcnode-id="3608" instrument_node="">"Behold, the days come, saith YHVH, that I will make a new 
covenant with the house of Israel, and with the house of Judah….Thus saith YHVH, 
which giveth the sun for a light by day, and the ordinances of the moon and of 
the stars for a light by night….If those ordinances depart from before me, saith YHVH, then the seed of Israel also shall cease from being a nation before 
me for ever. Thus saith YHVH; If heaven above can be measured, and the 
foundations of the earth searched out beneath, I will also cast off all the seed 
of Israel for all that they have done, saith YHVH" (Jeremiah 31:31-37).</span></p><span data-dcnode-id="3606" instrument_node="">
</span><p align="justify" data-dcnode-id="3601"><span data-dcnode-id="3605" instrument_node="">"…the children of Israel shall be as the sand of the sea…and 
it shall come to pass, that in the place where it was said unto them, Ye are not 
my people, there it shall be said unto them, Ye are the sons of the living God. 
Then shall the children of Judah and the children of Israel be gathered 
together, and appoint themselves one head….And it shall be at that day, saith 
YHVH, that thou shalt call me </span><i data-dcnode-id="3603"><span data-dcnode-id="3604" instrument_node="">Ishi</span></i><span data-dcnode-id="3602" instrument_node=""> [husband]….And I will betroth thee unto me 
for ever; yea, I will betroth thee unto me in righteousness, and in judgment, 
and in lovingkindness, and in mercies" (Hosea 1:10-11 and 2:16).</span></p><span data-dcnode-id="3600" instrument_node="">
</span></blockquote><span data-dcnode-id="3598" instrument_node="">
</span><p align="justify" data-dcnode-id="3593"><span data-dcnode-id="3597" instrument_node="">If the Israelites had mixed with the other races, eventually 
they would have been indistinguishable from everyone else, and the fulfillment 
of these prophecies would have been impossible. </span><b data-dcnode-id="3595"><span data-dcnode-id="3596" instrument_node="">[16] </span></b><span data-dcnode-id="3594" instrument_node=""> </span></p><span data-dcnode-id="3592" instrument_node="">
</span><p align="center" data-dcnode-id="3589"><b data-dcnode-id="3590"><span data-dcnode-id="3591" instrument_node="">Creation’s Testimony</span></b></p><span data-dcnode-id="3588" instrument_node="">
</span><p align="justify" data-dcnode-id="3586"><span data-dcnode-id="3587" instrument_node="">YEHOVAH’s desire for racial purity can be witnessed in His 
design for His creation. Ten times in Genesis 1, YEHOVAH declared how He made His 
creation to produce after their own kind. This idea was expanded upon in the 
apocryphal books of Ecclesiasticus and Tobit: </span></p><span data-dcnode-id="3585" instrument_node="">
</span><blockquote data-dcnode-id="3568"><span data-dcnode-id="3584" instrument_node="">
</span><p align="justify" data-dcnode-id="3582"><span data-dcnode-id="3583" instrument_node="">"Every beast loveth his like….All flesh consorteth according 
to kind, and a man will cleave to his like" (Ecclesiasticus 13:15-16).</span></p><span data-dcnode-id="3581" instrument_node="">
</span><p align="justify" data-dcnode-id="3570"><span data-dcnode-id="3580" instrument_node="">"Beware of all whoredom, my son, and chiefly take a wife of 
the seed of thy fathers, and </span><b data-dcnode-id="3578"><span data-dcnode-id="3579" instrument_node="">take not a strange woman to wife</span></b><span data-dcnode-id="3577" instrument_node="">, </span><b data-dcnode-id="3575"><span data-dcnode-id="3576" instrument_node="">which is not of 
thy father’s tribe</span></b><span data-dcnode-id="3574" instrument_node="">: for we are the children of the prophets, Noe [Noah], 
Abraham, Isaac, and Jacob: remember, my son, that our fathers from the 
beginning, even that </span><b data-dcnode-id="3572"><span data-dcnode-id="3573" instrument_node="">they all married wives of their own kindred</span></b><span data-dcnode-id="3571" instrument_node="">, and were 
blessed in their children, and their seed shall inherit the land. Now therefore, 
my son, love thy brethren, and despise not in thy heart thy brethren, the sons 
and daughters of thy people, in not taking a wife of them…." (Tobit 4:12-13).</span></p><span data-dcnode-id="3569" instrument_node="">
</span></blockquote><span data-dcnode-id="3567" instrument_node="">
</span><p align="justify" data-dcnode-id="3565"><span data-dcnode-id="3566" instrument_node="">Consider also the following prohibitions: </span></p><span data-dcnode-id="3564" instrument_node="">
</span><blockquote data-dcnode-id="3559"><span data-dcnode-id="3563" instrument_node="">
</span><p align="justify" data-dcnode-id="3561"><span data-dcnode-id="3562" instrument_node="">"…Thou shalt not let thy cattle gender with a diverse kind: 
thou shalt not sow thy field with mingled seed: neither shall a garment mingled 
of linen and woollen come upon thee" (Leviticus 19:19).</span></p><span data-dcnode-id="3560" instrument_node="">
</span></blockquote><span data-dcnode-id="3558" instrument_node="">
</span><p align="justify" data-dcnode-id="3556"><span data-dcnode-id="3557" instrument_node="">Was YEHOVAH God only concerned with livestock, produce, and 
clothing? Or did He also intend for us to refrain from gendering diverse kinds? 
The answer to this question is found in Deuteronomy 23: </span></p><span data-dcnode-id="3555" instrument_node="">
</span><blockquote data-dcnode-id="3547"><span data-dcnode-id="3554" instrument_node="">
</span><p align="justify" data-dcnode-id="3549"><span data-dcnode-id="3553" instrument_node="">"A bastard shall not enter into the congregation of YHVH; even 
	</span><b data-dcnode-id="3551"><span data-dcnode-id="3552" instrument_node="">to his tenth generation</span></b><span data-dcnode-id="3550" instrument_node="">* shall he not enter into the congregation of YHVH" 
(Deuteronomy 23:2).</span></p><span data-dcnode-id="3548" instrument_node="">
</span></blockquote><span data-dcnode-id="3546" instrument_node="">
</span><p align="justify" data-dcnode-id="3538"><span data-dcnode-id="3545" instrument_node="">*Nehemiah 13:1 demonstrates that the phrase “</span><b data-dcnode-id="3543"><span data-dcnode-id="3544" instrument_node="">to his tenth 
generation</span></b><span data-dcnode-id="3542" instrument_node="">” is in Deuteronomy 23:2 </span><b data-dcnode-id="3540"><span data-dcnode-id="3541" instrument_node="">is a Hebrew idiom meaning forever</span></b><span data-dcnode-id="3539" instrument_node="">.</span></p><span data-dcnode-id="3537" instrument_node="">
</span><p align="justify" data-dcnode-id="3528"><span data-dcnode-id="3536" instrument_node="">The Hebrew word </span><i data-dcnode-id="3534"><span data-dcnode-id="3535" instrument_node="">mamzeer</span></i><span data-dcnode-id="3533" instrument_node="">, translated “bastard” and 
“illegitimate birth” in the King James and New American Standard versions, 
respectively, is defined in </span><i data-dcnode-id="3530"><b data-dcnode-id="3531"><span data-dcnode-id="3532" instrument_node="">Strong’s Hebrew Dictionary</span></b></i><span data-dcnode-id="3529" instrument_node="">: </span></p><span data-dcnode-id="3527" instrument_node="">
</span><blockquote data-dcnode-id="3520"><span data-dcnode-id="3526" instrument_node="">
</span><p align="justify" data-dcnode-id="3522"><span data-dcnode-id="3525" instrument_node="">"…To alienate; a mongrel, i.e. born of a Jewish [Israelite] 
father and a heathen mother." </span><b data-dcnode-id="3523"><span data-dcnode-id="3524" instrument_node="">[17]</span></b></p><span data-dcnode-id="3521" instrument_node="">
</span></blockquote><span data-dcnode-id="3519" instrument_node="">
</span><p align="justify" data-dcnode-id="3514"><span data-dcnode-id="3518" instrument_node="">Because of what “bastard” and “illegitimate birth” represent 
today, it is a poor translation of </span><i data-dcnode-id="3516"><span data-dcnode-id="3517" instrument_node="">mamzeer</span></i><span data-dcnode-id="3515" instrument_node="">. The prohibition against entering the 
congregation of YEHOVAH God only applies to a child of mixed heritage. </span></p><span data-dcnode-id="3513" instrument_node="">
</span><p align="justify" data-dcnode-id="3511"><span data-dcnode-id="3512" instrument_node="">Along with other Old Testament passages, Nehemiah’s inspired 
commentary (Nehemiah 13:1-3) on Deuteronomy 23:3 reveals that the reference to 
the congregation or assembly of YEHOVAH is, in fact, referring to Israel as a 
people. The Bible dictates geographical and, therefore, racial segregation for 
the Israelites in Exodus 33:16, Leviticus 20:24-26, Numbers 23:9, Deuteronomy 
32:8, 1 Kings 8:51-53, Acts 17:26, etc. Deuteronomy 23:2 requires that 
Israelites segregate themselves from the offspring of forbidden-lineage or 
interracial relationships as well. </span></p><span data-dcnode-id="3510" instrument_node="">
</span><p align="justify" data-dcnode-id="3508"><span data-dcnode-id="3509" instrument_node="">The judgment upon the offspring of forbidden-lineage or 
interracial relationships, as described in Deuteronomy 23, may seem harsh, 
especially because the offspring was not responsible for the initial sin. 
However, the Bible provides precedent for this kind of judgment. Canaan, Moab, 
and Ammon were the consequence of incest, and YEHOVAH God judged them and their 
respective lineages by forbidding Israel to intermarry with or live among them, 
even though they were racially alike. </span></p><span data-dcnode-id="3507" instrument_node="">
</span><p align="justify" data-dcnode-id="3502"><span data-dcnode-id="3506" instrument_node="">Why would YEHOVAH be so harsh upon innocent victims of the 
parents’ transgressions? YEHOVAH knows the beginning from the end and His 
judgments are remedial in nature for the overall good of His people. YEHOVAH’s 
judgment upon the </span><i data-dcnode-id="3504"><span data-dcnode-id="3505" instrument_node="">mamzeer</span></i><span data-dcnode-id="3503" instrument_node=""> or mongrel was meant to deter the perpetuation of the 
same sin, thereby retaining purity in the bloodlines and preventing the 
weaknesses that result from genetic interbreeding. </span></p><span data-dcnode-id="3501" instrument_node="">
</span><p align="justify" data-dcnode-id="3499"><span data-dcnode-id="3500" instrument_node="">Ezra and other leaders of the house of Judah understood the 
importance of keeping Israel’s bloodline pure: </span></p><span data-dcnode-id="3498" instrument_node="">
</span><blockquote data-dcnode-id="3493"><span data-dcnode-id="3497" instrument_node="">
</span><p align="justify" data-dcnode-id="3495"><span data-dcnode-id="3496" instrument_node="">"…The princes came to me, saying, The people of Israel…have 
not separated themselves from the people of the lands, doing according to their 
abominations….For they have taken of their daughters for themselves, and for 
their sons: so that the holy seed have mingled themselves with the people of 
those lands….Now therefore give not your daughters unto their sons, neither 
take their daughters unto your sons, nor seek their peace or their wealth for 
ever: that ye may be strong, and eat the good of the land, and leave it for an 
inheritance to your children for ever….Should we again break thy commandments, 
and join in affinity with the people of these abominations? Wouldest not thou be 
angry with us till thou hadst consumed us, so that there should be no remnant 
nor escaping? O YHVH God of Israel, thou art righteous…behold, we are before 
thee in our trespasses: for we cannot stand before thee because of this" (Ezra 
9:1-15).</span></p><span data-dcnode-id="3494" instrument_node="">
</span></blockquote><span data-dcnode-id="3492" instrument_node="">
</span><p align="justify" data-dcnode-id="3487"><span data-dcnode-id="3491" instrument_node="">This passage is addressing Canaan, Moab, Ammon, and people 
with whom they had mixed. These were the people in and near the land of Judah in 
Ezra’s day. The same would have applied to other races if they had been in the 
land at that time. Nehemiah expanded and applied the prohibition of Deuteronomy 
23:3 </span><b data-dcnode-id="3489"><span data-dcnode-id="3490" instrument_node="">to preclude all forbidden foreigners</span></b><span data-dcnode-id="3488" instrument_node="">: </span></p><span data-dcnode-id="3486" instrument_node="">
</span><blockquote data-dcnode-id="3475"><span data-dcnode-id="3485" instrument_node="">
</span><p align="justify" data-dcnode-id="3477"><span data-dcnode-id="3484" instrument_node="">"…In the book of Moses…therein [Deuteronomy 23:3] was found 
written, that the Ammonite and the Moabite should not come into the congregation 
of God for ever….Now it came to pass, when they had heard the law, that they 
separated from Israel all the </span><b data-dcnode-id="3482"><span data-dcnode-id="3483" instrument_node="">mixed multitude</span></b><span data-dcnode-id="3481" instrument_node="">….And I [Nehemiah] contended with 
them…and made them swear by God, saying, Ye shall not give your daughters unto 
their sons, nor take their daughters unto your sons, or for yourselves. Did not 
Solomon king of Israel sin by these things?…Shall we then hearken unto you to 
do all this great evil, to transgress against our God in marrying strange wives?…</span><b data-dcnode-id="3479"><span data-dcnode-id="3480" instrument_node="">Thus cleansed I them from all strangers</span></b><span data-dcnode-id="3478" instrument_node="">…." (Nehemiah 13:1-30).</span></p><span data-dcnode-id="3476" instrument_node="">
</span></blockquote><span data-dcnode-id="3474" instrument_node="">
</span><p align="justify" data-dcnode-id="3466"><span data-dcnode-id="3473" instrument_node="">The phrase “the mixed multitude” is translated from the 
Hebrew word `</span><i data-dcnode-id="3471"><span data-dcnode-id="3472" instrument_node="">eereb</span></i><span data-dcnode-id="3470" instrument_node="">. `</span><i data-dcnode-id="3468"><span data-dcnode-id="3469" instrument_node="">Eereb</span></i><span data-dcnode-id="3467" instrument_node=""> is defined by James Strong: </span></p><span data-dcnode-id="3465" instrument_node="">
</span><blockquote data-dcnode-id="3458"><span data-dcnode-id="3464" instrument_node="">
</span><p align="justify" data-dcnode-id="3460"><span data-dcnode-id="3463" instrument_node="">"…The web (or transverse threads of cloth); also a mixture, 
(or mongrel race)." </span><b data-dcnode-id="3461"><span data-dcnode-id="3462" instrument_node="">[18]</span></b></p><span data-dcnode-id="3459" instrument_node="">
</span></blockquote><span data-dcnode-id="3457" instrument_node="">
