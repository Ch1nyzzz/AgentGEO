(Proverbs 7:1-5).</span></p><span data-dcnode-id="2110" instrument_node="">
</span></blockquote><span data-dcnode-id="2108" instrument_node="">
</span><p align="justify" data-dcnode-id="2106"><span data-dcnode-id="2107" instrument_node="">The Psalmist concurred: </span></p><span data-dcnode-id="2105" instrument_node="">
</span><blockquote data-dcnode-id="2100"><span data-dcnode-id="2104" instrument_node="">
</span><p align="justify" data-dcnode-id="2102"><span data-dcnode-id="2103" instrument_node="">"Wherewithal shall a young man cleanse his way [keep his way 
pure, NASV]? By taking heed thereto according to thy word. With my whole heart 
have I sought thee: O let me not wander from thy commandments. Thy word have I 
hid in mine heart, that I might not sin against thee" (Psalm 119:9-11).</span></p><span data-dcnode-id="2101" instrument_node="">
</span></blockquote><span data-dcnode-id="2099" instrument_node="">
</span><p align="justify" data-dcnode-id="2097"><span data-dcnode-id="2098" instrument_node="">Serve YEHOVAH God, keep His commandments, flee fornication, and 
you will be one of today’s Josephs, going where few travel -- on YEHOVAH’s high 
road to purity and holiness. </span></p><span data-dcnode-id="2096" instrument_node="">
</span><p align="center" data-dcnode-id="2093"><b data-dcnode-id="2094"><span data-dcnode-id="2095" instrument_node="">Remarriage to a Twice-Divorced Woman</span></b></p><span data-dcnode-id="2092" instrument_node="">
</span><blockquote data-dcnode-id="2087"><span data-dcnode-id="2091" instrument_node="">
</span><p align="justify" data-dcnode-id="2089"><span data-dcnode-id="2090" instrument_node="">"When a man hath taken a wife, and married her, and it come to 
pass that she find no favour in his eyes, because he hath found some uncleanness 
in her: then let him write her a bill of divorcement, and give it in her hand, 
and send her out of his house. And when she is departed out of his house, she 
may go and be another man’s wife" (Deuteronomy 24:1-2).</span></p><span data-dcnode-id="2088" instrument_node="">
</span></blockquote><span data-dcnode-id="2086" instrument_node="">
</span><p align="justify" data-dcnode-id="2084"><span data-dcnode-id="2085" instrument_node="">Although it was not His original desire for us, YEHOVAH God did 
provide for divorce. This provision was confirmed by the Messiah: </span></p><span data-dcnode-id="2083" instrument_node="">
</span><blockquote data-dcnode-id="2078"><span data-dcnode-id="2082" instrument_node="">
</span><p align="justify" data-dcnode-id="2080"><span data-dcnode-id="2081" instrument_node="">"The Pharisees also came…saying unto him, Is it lawful for a 
man to put away his wife for every cause? And he answered…Have ye not read, 
that he which made them…made them male and female, and said, For this cause 
shall a man leave father and mother, and shall cleave to his wife: and they 
twain shall be one flesh?...What therefore God hath joined together, let not 
man put asunder. They say unto him, Why did Moses then command to give a writing 
of divorcement, and to put her away? He saith unto them, Moses because of the 
hardness of your hearts suffered you to put away your wives: but from the 
beginning it was not so" (Matthew 19:3-8).</span></p><span data-dcnode-id="2079" instrument_node="">
</span></blockquote><span data-dcnode-id="2077" instrument_node="">
</span><p align="justify" data-dcnode-id="2075"><span data-dcnode-id="2076" instrument_node="">YEHOVAH knew that not all men and women would be able to 
fulfill His plan concerning marriage. He provided the means for a couple to end 
an unwholesome or dangerous relationship. But, divorce is nevertheless certainly 
not without its repercussions. </span></p><span data-dcnode-id="2074" instrument_node="">
</span><p align="justify" data-dcnode-id="2072"><span data-dcnode-id="2073" instrument_node="">The tragedy of divorce has lasting effects on generations to 
come. In most instances, divorce leaves deep and often permanent scars on one or 
both divorced partners, sometimes even resulting in suicide and murder. Before 
deciding to marry, every couple should understand that “Getting married is like 
buying a phonograph record. Although you buy it for what is on one side, you 
have to take the flip side as well. Divorce, however, is like getting the hole 
in the middle.” </span></p><span data-dcnode-id="2071" instrument_node="">
</span><p align="justify" data-dcnode-id="2067"><b data-dcnode-id="2069"><span data-dcnode-id="2070" instrument_node="">Divorce should always be the last resort</span></b><span data-dcnode-id="2068" instrument_node="">, the solution only 
when all else fails and reconciliation is impossible. Divorce is seldom, if 
ever, a positive good. At best, it is the lesser of two evils. </span></p><span data-dcnode-id="2066" instrument_node="">
</span><p align="justify" data-dcnode-id="2064"><span data-dcnode-id="2065" instrument_node="">In light of YEHOVAH’s law and the Messiah’s validation of it, 
divorce and remarriage cannot be entirely denounced. Many Christians erroneously 
believe that remarriage is only permitted in instances involving marital 
infidelity. In Deuteronomy 24, YEHOVAH sanctioned remarriage with only one 
exception: </span></p><span data-dcnode-id="2063" instrument_node="">
</span><blockquote data-dcnode-id="2058"><span data-dcnode-id="2062" instrument_node="">
</span><p align="justify" data-dcnode-id="2060"><span data-dcnode-id="2061" instrument_node="">"And if the latter [second] husband hate her, and write her a 
bill of divorcement, and giveth it in her hand, and sendeth her out of his 
house; or if the latter husband die, which took her to be his wife; her former 
[first] husband, which sent her away, may not take her again to be his wife, 
after that she is defiled; for that is abomination before YHVH…." (Deuteronomy 
24:3-4).</span></p><span data-dcnode-id="2059" instrument_node="">
</span></blockquote><span data-dcnode-id="2057" instrument_node="">
</span><p align="justify" data-dcnode-id="2055"><span data-dcnode-id="2056" instrument_node="">In defiance to this Seventh Commandment statute, certain 
churches require women who have married a second time to divorce their second 
husbands and return to their first husbands as a part of their repentance in 
coming to the Messiah for salvation. Such antinomian churches are no different from 
churches who perform sodomite weddings; both are blatant violators of YEHOVAH’s 
morality, as codified in His law. </span></p><span data-dcnode-id="2054" instrument_node="">
</span><p align="center" data-dcnode-id="2051"><b data-dcnode-id="2052"><span data-dcnode-id="2053" instrument_node="">Marriage to a Put-Away but Undivorced Woman</span></b></p><span data-dcnode-id="2050" instrument_node="">
</span><p align="justify" data-dcnode-id="2048"><span data-dcnode-id="2049" instrument_node="">Based almost entirely upon Malachi 2, it has become a mantra 
that “God hates divorce.” Although YEHOVAH certainly hates the consequences of 
divorce, He was not speaking about divorce in Malachi 2: </span></p><span data-dcnode-id="2047" instrument_node="">
</span><blockquote data-dcnode-id="2042"><span data-dcnode-id="2046" instrument_node="">
</span><p align="justify" data-dcnode-id="2044"><span data-dcnode-id="2045" instrument_node="">"…Take heed to your spirit, and let none deal treacherously 
against the wife of his youth. For YHVH, the God of Israel, saith that he hateth 
putting away: for one covereth violence with his garment, saith YHVH of hosts: 
therefore take heed to your spirit, that ye deal not treacherously" (Malachi 
2:15-16).</span></p><span data-dcnode-id="2043" instrument_node="">
</span></blockquote><span data-dcnode-id="2041" instrument_node="">
</span><p align="justify" data-dcnode-id="2033"><span data-dcnode-id="2040" instrument_node="">Had YEHOVAH God wanted to convey hatred for divorce, He would have 
used the Hebrew word </span><i data-dcnode-id="2038"><span data-dcnode-id="2039" instrument_node="">keriythuwth</span></i><span data-dcnode-id="2037" instrument_node="">. Instead, He used </span><i data-dcnode-id="2035"><span data-dcnode-id="2036" instrument_node="">shalach</span></i><span data-dcnode-id="2034" instrument_node="">, correctly translated 
in the King James Bible as putting away. </span></p><span data-dcnode-id="2032" instrument_node="">
</span><p align="justify" data-dcnode-id="2021"><span data-dcnode-id="2031" instrument_node="">Deuteronomy 24:1-2 stipulates three elements that comprise a 
lawful divorce: </span><b data-dcnode-id="2029"><span data-dcnode-id="2030" instrument_node="">1)</span></b><span data-dcnode-id="2028" instrument_node=""> the husband must write out a certificate of divorce, 
</span><b data-dcnode-id="2026"><span data-dcnode-id="2027" instrument_node="">2)</span></b><span data-dcnode-id="2025" instrument_node=""> he 
must deliver the certificate to his wife, and </span><b data-dcnode-id="2023"><span data-dcnode-id="2024" instrument_node="">3)</span></b><span data-dcnode-id="2022" instrument_node=""> he must put her out of his 
house. Putting away alone does not constitute a lawful divorce. </span></p><span data-dcnode-id="2020" instrument_node="">
</span><p align="justify" data-dcnode-id="2018"><span data-dcnode-id="2019" instrument_node="">YEHOVAH is not the author of confusion. Because divorce is a 
lawful institution, it could not be the treachery described in Malachi. The 
Israelite men in Malachi’s day were dealing treacherously with their wives 
because they were putting them out of their homes without the certificate of 
divorce required in Deuteronomy 24. Consequently, these put away -- but undivorced 
-- women could not seek another husband without committing adultery.
</span></p><span data-dcnode-id="2017" instrument_node="">
</span><p align="justify" data-dcnode-id="2012"><span data-dcnode-id="2016" instrument_node="">In their vindictiveness, these husbands were forcing their 
wives into a deplorable predicament. If one of these women “remarried” or 
attached herself to another man, she would have been an adulterer and subject to 
stoning. </span><b data-dcnode-id="2014"><span data-dcnode-id="2015" instrument_node="">[66]</span></b><span data-dcnode-id="2013" instrument_node=""> By law, without a certificate of divorce, she was still married to 
her first husband. </span></p><span data-dcnode-id="2011" instrument_node="">
</span><p align="justify" data-dcnode-id="2009"><span data-dcnode-id="2010" instrument_node="">Any man who “married” a put away -- but undivorced -- women 
became a partner in her crime of adultery. Without a lawful divorce contract 
annulling her previous marriage contract, she would still be another man’s wife.
</span></p><span data-dcnode-id="2008" instrument_node="">
</span><p align="justify" data-dcnode-id="2006"><span data-dcnode-id="2007" instrument_node="">If she chose not to commit adultery, the woman would be left 
to fend for herself, which was nearly impossible under the conditions of that 
time. No doubt, some women felt they had no choice but to resort to prostitution 
in order to provide for themselves and their children. One can understand why 
YEHOVAH hated the treachery those men committed against their wives. </span></p><span data-dcnode-id="2005" instrument_node="">
</span><p align="justify" data-dcnode-id="1997"><span data-dcnode-id="2004" instrument_node="">Because some words in Matthew 5 were poorly translated, it 
may not be immediately apparent that this was the same treachery the Messiah 
commented upon. In the text below, </span><i data-dcnode-id="2002"><span data-dcnode-id="2003" instrument_node="">apoluo</span></i><span data-dcnode-id="2001" instrument_node="">, which means “to put away,” and 
</span><i data-dcnode-id="1999"><span data-dcnode-id="2000" instrument_node="">apostasion</span></i><span data-dcnode-id="1998" instrument_node="">, which means “divorce,” have been inserted into the New American 
Standard Bible text to assist in determining Yeshua’s intention: </span></p><span data-dcnode-id="1996" instrument_node="">
</span><blockquote data-dcnode-id="1979"><span data-dcnode-id="1995" instrument_node="">
</span><p align="justify" data-dcnode-id="1981"><span data-dcnode-id="1994" instrument_node="">"And it was said, 'Whoever sends his wife away [</span><i data-dcnode-id="1992"><span data-dcnode-id="1993" instrument_node="">apoluo</span></i><span data-dcnode-id="1991" instrument_node="">], let 
him give her a certificate of divorce [</span><i data-dcnode-id="1989"><span data-dcnode-id="1990" instrument_node="">apostasion</span></i><span data-dcnode-id="1988" instrument_node="">];” but I say to you that 
everyone who divorces [</span><i data-dcnode-id="1986"><span data-dcnode-id="1987" instrument_node="">apoluo</span></i><span data-dcnode-id="1985" instrument_node=""> -- puts away] his wife, except for the cause of unchastity, makes her commit adultery; and whoever marries a divorced [</span><i data-dcnode-id="1983"><span data-dcnode-id="1984" instrument_node="">apoluo</span></i><span data-dcnode-id="1982" instrument_node=""> 
	-- 
put away] woman commits adultery" (Matthew 5:31-32, NASV).</span></p><span data-dcnode-id="1980" instrument_node="">
</span></blockquote><span data-dcnode-id="1978" instrument_node="">
</span><p align="justify" data-dcnode-id="1976"><span data-dcnode-id="1977" instrument_node="">Even though the King James Bible rendered these two verses 
more correctly, its translation still leaves something to be desired: </span></p><span data-dcnode-id="1975" instrument_node="">
</span><blockquote data-dcnode-id="1958"><span data-dcnode-id="1974" instrument_node="">
</span><p align="justify" data-dcnode-id="1960"><span data-dcnode-id="1973" instrument_node="">"And it was said, “Whoever sends his wife away [</span><i data-dcnode-id="1971"><span data-dcnode-id="1972" instrument_node="">apoluo</span></i><span data-dcnode-id="1970" instrument_node="">], let 
him give her a certificate of divorce [</span><i data-dcnode-id="1968"><span data-dcnode-id="1969" instrument_node="">apostasion</span></i><span data-dcnode-id="1967" instrument_node="">];” But I say unto you, That 
whosoever shall put away [</span><i data-dcnode-id="1965"><span data-dcnode-id="1966" instrument_node="">apoluo</span></i><span data-dcnode-id="1964" instrument_node="">] his wife, saving for the cause of fornication, 
causeth her to commit adultery: and whosoever shall marry her that is divorced 
[</span><i data-dcnode-id="1962"><span data-dcnode-id="1963" instrument_node="">apoluo</span></i><span data-dcnode-id="1961" instrument_node=""> -- put away] committeth adultery" (Matthew 5:31-32).</span></p><span data-dcnode-id="1959" instrument_node="">
</span></blockquote><span data-dcnode-id="1957" instrument_node="">
</span><p align="justify" data-dcnode-id="1952"><span data-dcnode-id="1956" instrument_node="">Both of these translations put the Messiah in conflict with 
YEHOVAH’s mandate in Deuteronomy 24. If the intent of the last clause in Matthew 
5 had been “whosoever shall marry her that is divorced committeth adultery,” 
Matthew would have used the Greek word </span><i data-dcnode-id="1954"><span data-dcnode-id="1955" instrument_node="">apostasion</span></i><span data-dcnode-id="1953" instrument_node="">. When correctly translated 
“whosoever shall marry her that is put away committeth adultery,” the Messiah’s 
statement is in perfect harmony with YEHOVAH’s law. Had he taught anything 
contrary to this law, he would have promoted disobedience to the law of YEHOVAH 
God 
and could not have been our Savior. </span></p><span data-dcnode-id="1951" instrument_node="">
</span><p align="justify" data-dcnode-id="1949"><span data-dcnode-id="1950" instrument_node="">Yeshua pointed out that the husband who puts away his wife 
without a writ of divorce causes her to commit adultery if she becomes another 
man’s “wife.” The man who “marries” a put away -- but undivorced -- woman would be 
a partner in her crime of adultery because without a lawful divorce contract 
that annuls any previous marriage contract, she would still be another man’s 
wife. </span></p><span data-dcnode-id="1948" instrument_node="">
</span><p align="justify" data-dcnode-id="1946"><span data-dcnode-id="1947" instrument_node="">The following account from John 4 provides a final witness, 
which proves the usual interpretation of Matthew 5:31-32 is incorrect: </span></p><span data-dcnode-id="1945" instrument_node="">
</span><blockquote data-dcnode-id="1940"><span data-dcnode-id="1944" instrument_node="">
</span><p align="justify" data-dcnode-id="1942"><span data-dcnode-id="1943" instrument_node="">"The woman saith unto him, Sir, give me this water, that I 
thirst not, neither come hither to draw. Jesus saith unto her, Go, call thy 
husband, and come hither. The woman answered and said, I have no husband. Jesus 
said unto her, Thou hast well said, I have no husband: For thou hast had five 
husbands; and he whom thou now hast is not thy husband: in that saidst thou 
truly" (John 4:15-18).</span></p><span data-dcnode-id="1941" instrument_node="">
</span></blockquote><span data-dcnode-id="1939" instrument_node="">
</span><p align="justify" data-dcnode-id="1934"><span data-dcnode-id="1938" instrument_node="">It is often incorrectly deduced from Matthew 5 that if a 
divorced woman marries another man she becomes an adulteress and that the second 
man or any man thereafter who takes her for his wife becomes an adulterer. But 
if this were true, Yeshua would have designated only the first man as this 
woman’s lawful husband, and all five other men as adulterers. </span><b data-dcnode-id="1936"><span data-dcnode-id="1937" instrument_node="">[67] </span></b><span data-dcnode-id="1935" instrument_node=""> </span></p><span data-dcnode-id="1933" instrument_node="">
</span><p align="center" data-dcnode-id="1930"><b data-dcnode-id="1931"><span data-dcnode-id="1932" instrument_node="">The Exception Clause</span></b></p><span data-dcnode-id="1929" instrument_node="">
</span><p align="justify" data-dcnode-id="1927"><span data-dcnode-id="1928" instrument_node="">At first glance, the Messiah’s statement in Matthew 5:32, “saving 
for the cause of fornication,” appears to be in conflict with the previous 
interpretation. But it, too, fits perfectly with YEHOVAH’s law on divorce. </span></p><span data-dcnode-id="1926" instrument_node="">
</span><p align="justify" data-dcnode-id="1912"><span data-dcnode-id="1925" instrument_node="">The word “fornication” is translated from the Greek word 
</span><i data-dcnode-id="1923"><span data-dcnode-id="1924" instrument_node="">porneias</span></i><span data-dcnode-id="1922" instrument_node="">, and is used in the New Testament to describe incest in 1 Corinthians 
5:1, harlotry in 1 Corinthians 6:13-18 and 10:8, and forbidden lineage 
relationships in Hebrews 12:15-16. In Jude 1:7, homosexuality is translated from 
the closely related word </span><i data-dcnode-id="1920"><span data-dcnode-id="1921" instrument_node="">ekporneusasai</span></i><span data-dcnode-id="1919" instrument_node="">. Although not specifically mentioned in 
the New Testament, </span><b data-dcnode-id="1917"><span data-dcnode-id="1918" instrument_node="">miscegenation, bestiality, remarriage to a twice-divorced 
woman, and marriage to a put-away but undivorced woman are also fornication</span></b><span data-dcnode-id="1916" instrument_node="">.
</span><i data-dcnode-id="1914"><span data-dcnode-id="1915" instrument_node="">Porneia</span></i><span data-dcnode-id="1913" instrument_node=""> can be used to describe any unlawful sexual relationship. </span></p><span data-dcnode-id="1911" instrument_node="">
</span><p align="justify" data-dcnode-id="1909"><span data-dcnode-id="1910" instrument_node="">How do these acts of fornication relate to the Messiah’s 
declaration in Matthew 5:31-32? It must be remembered that in Matthew 5, Yeshua 
was not condemning divorce, but rather the putting away of a wife without a bill 
of divorcement. With this in mind, Matthew 5:31-32 should be understood to say 
the following: </span></p><span data-dcnode-id="1908" instrument_node="">
</span><blockquote data-dcnode-id="1882"><span data-dcnode-id="1907" instrument_node="">
</span><p align="justify" data-dcnode-id="1884"><span data-dcnode-id="1906" instrument_node="">"And it was said, 'Whoever sends his wife away [</span><i data-dcnode-id="1904"><span data-dcnode-id="1905" instrument_node="">apoluo</span></i><span data-dcnode-id="1903" instrument_node="">], let 
him give her a certificate of divorce [</span><i data-dcnode-id="1901"><span data-dcnode-id="1902" instrument_node="">apostasion</span></i><span data-dcnode-id="1900" instrument_node="">];' But I say unto you, That 
whosoever shall put away [</span><i data-dcnode-id="1898"><span data-dcnode-id="1899" instrument_node="">apoluo</span></i><span data-dcnode-id="1897" instrument_node="">] his wife [</span><b data-dcnode-id="1895"><span data-dcnode-id="1896" instrument_node="">without a certificate of divorce</span></b><span data-dcnode-id="1894" instrument_node="">], 
saving for the cause of fornication [</span><b data-dcnode-id="1892"><span data-dcnode-id="1893" instrument_node="">incest, forbidden lineage relationships, 
miscegenation, etc.</span></b><span data-dcnode-id="1891" instrument_node="">], causeth her to commit adultery: and whosoever shall marry 
her [</span><b data-dcnode-id="1889"><span data-dcnode-id="1890" instrument_node="">any undivorced woman</span></b><span data-dcnode-id="1888" instrument_node="">] that is put away [</span><i data-dcnode-id="1886"><span data-dcnode-id="1887" instrument_node="">apoluo</span></i><span data-dcnode-id="1885" instrument_node="">] committeth adultery" 
(Matthew 5:31-32).</span></p><span data-dcnode-id="1883" instrument_node="">
</span></blockquote><span data-dcnode-id="1881" instrument_node="">
</span><p align="justify" data-dcnode-id="1874"><b data-dcnode-id="1879"><span data-dcnode-id="1880" instrument_node="">Deuteronomy 24:1 forbids a man from putting away his lawful 
wife without a certificate of divorce.</span></b><span data-dcnode-id="1878" instrument_node=""> But, a divorce certificate is not 
required if the union is </span><i data-dcnode-id="1876"><span data-dcnode-id="1877" instrument_node="">porneia</span></i><span data-dcnode-id="1875" instrument_node="">, or fornication. Such relationships are not 
lawful marriages and, therefore, do not require a divorce certificate. As 
demonstrated in Ezra 10, termination of these types of relationships only 
requires repentance and the putting away of the unlawful partner: </span></p><span data-dcnode-id="1873" instrument_node="">
</span><blockquote data-dcnode-id="1868"><span data-dcnode-id="1872" instrument_node="">
</span><p align="justify" data-dcnode-id="1870"><span data-dcnode-id="1871" instrument_node="">"And Shechaniah…answered and said unto Ezra, We have 
trespassed against our God, and have taken strange wives of the people of the 
land….Now therefore let us make a covenant with our God to put away all the 
wives, and such as are born of them, according to the counsel of my lord, and of 
those that tremble at the commandment of our God; and let it be done according 
to the law" (Ezra 10:2-3).</span></p><span data-dcnode-id="1869" instrument_node="">
</span></blockquote><span data-dcnode-id="1867" instrument_node="">
</span><p align="justify" data-dcnode-id="1859"><span data-dcnode-id="1866" instrument_node="">Instead of being at odds with the law of YEHOVAH God, the 
Messiah 
expounded upon and confirmed that </span><b data-dcnode-id="1864"><span data-dcnode-id="1865" instrument_node="">Deuteronomy 24:1-4 was the standard for 
divorce and remarriage, except in cases of fornication, which only require the 
putting away of an unlawful partner</span></b><span data-dcnode-id="1863" instrument_node="">. </span><b data-dcnode-id="1861"><span data-dcnode-id="1862" instrument_node="">[67]</span></b><span data-dcnode-id="1860" instrument_node=""> This interpretation of Matthew 5:32’s 
exception clause is the only interpretation that harmonizes with Deuteronomy 
24:1 and does not put the Messiah in conflict with YEHOVAH’s morality. </span></p><span data-dcnode-id="1858" instrument_node="">
</span><p align="center" data-dcnode-id="1855"><b data-dcnode-id="1856"><span data-dcnode-id="1857" instrument_node="">Mixed-Faith Relationships</span></b></p><span data-dcnode-id="1854" instrument_node="">
</span><blockquote data-dcnode-id="1846"><span data-dcnode-id="1853" instrument_node="">
</span><p align="justify" data-dcnode-id="1851"><span data-dcnode-id="1852" instrument_node="">"Take heed to thyself, lest thou make a covenant with the 
inhabitants of the land whither thou goest, lest it be for a snare in the midst 
of thee: But ye shall destroy their altars, break their images, and cut down 
their groves: For thou shalt worship no other god: for YHVH, whose name is 
Jealous, is a jealous God: Lest thou make a covenant with the inhabitants of the 
land, and they go a whoring after their gods…and thou take of their daughters 
unto thy sons, and their daughters go a whoring after their gods, and make thy 
sons go a whoring after their gods" (Exodus 34:12-16).</span></p><span data-dcnode-id="1850" instrument_node="">
</span><p align="justify" data-dcnode-id="1848"><span data-dcnode-id="1849" instrument_node="">"Be ye not unequally yoked together with unbelievers: for what 
fellowship hath righteousness with unrighteousness? And what communion hath 
light with darkness? And what concord hath Christ with Belial? Or what part hath 
he that believeth with an infidel? And what agreement hath the temple of God 
with idols? For ye are the temple of the living God; as God hath said, I will 
dwell in them, and walk in them; and I will be their God, and they shall be my 
people. Wherefore come out from among them, and be ye separate, saith the Lord, 
and touch not the unclean thing; and I will receive you, and will be a Father 
unto you, and ye shall be my sons and daughters, saith the Lord Almighty" (2 
Corinthians 6:14-18).</span></p><span data-dcnode-id="1847" instrument_node="">
</span></blockquote><span data-dcnode-id="1845" instrument_node="">
</span><p align="justify" data-dcnode-id="1841"><b data-dcnode-id="1843"><span data-dcnode-id="1844" instrument_node="">Even when both partners are racially alike, mixed-faith 
relationships do not constitute a lawful marriage.</span></b><span data-dcnode-id="1842" instrument_node=""> The one exception to this law 
is when one partner becomes a Christian after already having been married as a 
non-Christian to a non-Christian: </span></p><span data-dcnode-id="1840" instrument_node="">
</span><blockquote data-dcnode-id="1835"><span data-dcnode-id="1839" instrument_node="">
</span><p align="justify" data-dcnode-id="1837"><span data-dcnode-id="1838" instrument_node="">"If any brother hath a wife that believeth not, and she be 
pleased to dwell with him, let him not put her away. And the woman which hath an 
husband that believeth not, and if he be pleased to dwell with her, let her not 
leave him. For the unbelieving husband is sanctified by the wife, and the 
unbelieving wife is sanctified by the husband: else were your children unclean; 
but now are they holy. But if the unbelieving depart, let him depart. A brother 
or a sister is not under bondage in such cases: but God hath called us to peace. 
For what knowest thou, O wife, whether thou shalt save thy husband? Or how 
knowest thou, O man, whether thou shalt save thy wife?" (1 Corinthians 7:12-16).</span></p><span data-dcnode-id="1836" instrument_node="">
</span></blockquote><span data-dcnode-id="1834" instrument_node="">
</span><p align="justify" data-dcnode-id="1832"><span data-dcnode-id="1833" instrument_node="">Although not specified, a non-Christian to non-Christian 
marriage must be the kind of relationship described by Paul. Otherwise, this 
passage would provide license to mixed-faith relationships in contradiction to 
Exodus 34:12-16, 2 Corinthians 6:14-18, and 1 Corinthians 7:39. </span></p><span data-dcnode-id="1831" instrument_node="">
</span><p align="justify" data-dcnode-id="1826"><span data-dcnode-id="1830" instrument_node="">The Greek word translated “unequally yoked” in 2 Corinthians 
6:14 is </span><i data-dcnode-id="1828"><span data-dcnode-id="1829" instrument_node="">heterozugountes</span></i><span data-dcnode-id="1827" instrument_node="">, which means “to associate discordantly.” Disparate 
yoking is forbidden even with animals: </span></p><span data-dcnode-id="1825" instrument_node="">
</span><blockquote data-dcnode-id="1820"><span data-dcnode-id="1824" instrument_node="">
</span><p align="justify" data-dcnode-id="1822"><span data-dcnode-id="1823" instrument_node="">"Thou shalt not plow with an ox and an ass together" 
(Deuteronomy 22:10).</span></p><span data-dcnode-id="1821" instrument_node="">
</span></blockquote><span data-dcnode-id="1819" instrument_node="">
</span><p align="justify" data-dcnode-id="1817"><span data-dcnode-id="1818" instrument_node="">The dissimilar gaits of an ox and an ass have a tendency to 
chafe both animals and can contribute to the physical break down of one or both 
animals when yoked together. Similarly, no matter how well-intentioned their 
“marriage,” a Christian and a non-Christian will always be out of step with each 
other: * </span></p><span data-dcnode-id="1816" instrument_node="">
</span><blockquote data-dcnode-id="1811"><span data-dcnode-id="1815" instrument_node="">
</span><p align="justify" data-dcnode-id="1813"><span data-dcnode-id="1814" instrument_node="">"Can two walk together, except they be agreed?" (Amos 3:3).</span></p><span data-dcnode-id="1812" instrument_node="">
</span></blockquote><span data-dcnode-id="1810" instrument_node="">
</span><p align="justify" data-dcnode-id="1808"><span data-dcnode-id="1809" instrument_node="">*This principle also applies to miscegenation.</span></p><span data-dcnode-id="1807" instrument_node="">
</span><p align="justify" data-dcnode-id="1805"><span data-dcnode-id="1806" instrument_node="">Horses are yoked together for the purpose of pulling a load 
in the same direction. Their combined strength is multiplied for the task at 
hand. For example, a 2,200-pound draft horse can, by himself, pull his own 
weight. Harness two draft horses together, and they can pull from 12,000 to 
16,000 pounds. </span></p><span data-dcnode-id="1804" instrument_node="">
</span><p align="justify" data-dcnode-id="1796"><span data-dcnode-id="1803" instrument_node="">This combined strength and purpose is certainly needed in the 
relationship of a husband and wife. </span><b data-dcnode-id="1801"><span data-dcnode-id="1802" instrument_node="">Nothing can frustrate or thwart this effort 
like a mixed-faith relationship.</span></b><span data-dcnode-id="1800" instrument_node=""> Not only will the world views of a Christian 
and non-Christian oppose each other, but everything from child rearing to career 
objectives will be affected. </span><b data-dcnode-id="1798"><span data-dcnode-id="1799" instrument_node="">It will, at best, be a discordant relationship.
</span></b><span data-dcnode-id="1797" instrument_node=""> </span></p><span data-dcnode-id="1795" instrument_node="">
</span><p align="justify" data-dcnode-id="1793"><span data-dcnode-id="1794" instrument_node="">If the Christian in an unequally yoked relationship holds 
firm to his morals and principles and, especially, if he requires that all be 
done according to YEHOVAH’s laws, he and his spouse will inevitably find 
themselves disputing with each other over nearly everything. Most marriages have 
enough challenges without the inherent problems caused by discordant religious 
beliefs. </span></p><span data-dcnode-id="1792" instrument_node="">
</span><p align="justify" data-dcnode-id="1790"><span data-dcnode-id="1791" instrument_node="">The Christian in such a relationship will have a difficult 
enough task maintaining his own faith, much less influencing his mate. The deck 
is stacked against the Christian because “bad company corrupts good morals” (1 
Corinthians 15:33, NASV). If a person consorts with an evil or negative 
influence long enough, his objection will become tolerance, his tolerance will 
become acceptance, and his acceptance will turn to participation and probably 
even enjoyment. </span></p><span data-dcnode-id="1789" instrument_node="">
</span><p align="justify" data-dcnode-id="1784"><span data-dcnode-id="1788" instrument_node="">In 1 Corinthians 7, the apostle </span><b data-dcnode-id="1786"><span data-dcnode-id="1787" instrument_node="">Paul reaffirmed the mandate 
that Christians are to marry only Christians</span></b><span data-dcnode-id="1785" instrument_node="">: </span></p><span data-dcnode-id="1783" instrument_node="">
</span><blockquote data-dcnode-id="1775"><span data-dcnode-id="1782" instrument_node="">
</span><p align="justify" data-dcnode-id="1777"><span data-dcnode-id="1781" instrument_node="">"The wife is bound by the law as long as her husband liveth; 
but if her husband be dead, she is at liberty to be married to whom she will; 
</span><b data-dcnode-id="1779"><span data-dcnode-id="1780" instrument_node="">only in the Lord</span></b><span data-dcnode-id="1778" instrument_node="">" (1 Corinthians 7:39).</span></p><span data-dcnode-id="1776" instrument_node="">
</span></blockquote><span data-dcnode-id="1774" instrument_node="">
</span><p align="justify" data-dcnode-id="1772"><span data-dcnode-id="1773" instrument_node="">Common sense alone provides plenty of reasons to shun 
mixed-faith relationships, but the fact that the relationship would be adultery 
in the eyes of YEHOVAH God should be the only reason a Christian needs. </span></p><span data-dcnode-id="1771" instrument_node="">
</span><p align="center" data-dcnode-id="1768"><b data-dcnode-id="1769"><span data-dcnode-id="1770" instrument_node="">Courtship</span></b></p><span data-dcnode-id="1767" instrument_node="">
</span><p align="justify" data-dcnode-id="1765"><span data-dcnode-id="1766" instrument_node="">Because marriage should be the only intent of courtship, 
Christians should never court non-Christians. To do otherwise is to invite 
trouble, distress, grief, and possibly even damnation. Once a Christian is 
emotionally involved with a non-Christian, emotions will almost invariably 
overrule convictions. </span></p><span data-dcnode-id="1764" instrument_node="">
</span><p align="justify" data-dcnode-id="1762"><span data-dcnode-id="1763" instrument_node="">The young person who determines never to court a 
non-Christian will never have to concern himself with “marrying” a 
non-Christian. Daughters should never be faced with such a decision in the first 
place because the final decision regarding whom a daughter courts and marries 
belongs to her father: </span></p><span data-dcnode-id="1761" instrument_node="">
</span><blockquote data-dcnode-id="1756"><span data-dcnode-id="1760" instrument_node="">
</span><p align="justify" data-dcnode-id="1758"><span data-dcnode-id="1759" instrument_node="">"If a woman also vow a vow unto YHVH, and bind herself by a 
bond, being in her father’s house in her youth; and her father hear her vow, and 
her bond wherewith she hath bound her soul, and her father shall hold his peace 
at her: then all her vows shall stand, and every bond wherewith she hath bound 
her soul shall stand. But if her father disallow her in the day that he heareth; 
not any of her vows, or of her bonds wherewith she hath bound her soul, shall 
stand: and YHVH shall forgive her, because her father disallowed her" (Numbers 
30:3-5 *).</span></p><span data-dcnode-id="1757" instrument_node="">
</span></blockquote><span data-dcnode-id="1755" instrument_node="">
</span><p align="justify" data-dcnode-id="1753"><span data-dcnode-id="1754" instrument_node="">*It stands to reason that under a patriarchal system, if a 
woman’s father is no longer living, the final decision concerning her mate 
passes to her oldest brother or her father’s nearest male relative.</span></p><span data-dcnode-id="1752" instrument_node="">
</span><p align="justify" data-dcnode-id="1750"><span data-dcnode-id="1751" instrument_node="">Fathers ultimately have the final choice even as it pertains 
to defiled virgins: </span></p><span data-dcnode-id="1749" instrument_node="">
</span><blockquote data-dcnode-id="1744"><span data-dcnode-id="1748" instrument_node="">
</span><p align="justify" data-dcnode-id="1746"><span data-dcnode-id="1747" instrument_node="">"And if a man entice a maid that is not betrothed, and lie 
with her, he shall surely endow her to be his wife. If her father utterly refuse 
to give her unto him, he shall pay money according to the dowry of virgins" 
(Exodus 22:16-17).</span></p><span data-dcnode-id="1745" instrument_node="">
</span></blockquote><span data-dcnode-id="1743" instrument_node="">
</span><p align="justify" data-dcnode-id="1738"><span data-dcnode-id="1742" instrument_node="">No matter who the couple may find to perform the ceremony or 
what license the state may provide, </span><b data-dcnode-id="1740"><span data-dcnode-id="1741" instrument_node="">elopements are not lawful marriages in 
YEHOVAH’s eyes</span></b><span data-dcnode-id="1739" instrument_node="">. Any magistrate or pastor who performs such a wedding is no 
different from one who performs a ceremony for homosexuals. Just as man should 
not put asunder what YEHOVAH God has joined together, man cannot join together what 
YEHOVAH has NOT united. </span></p><span data-dcnode-id="1737" instrument_node="">
</span><p align="justify" data-dcnode-id="1735"><span data-dcnode-id="1736" instrument_node="">Fathers should also be looking for suitable wives for their 
sons, although that decision ultimately belongs to the prospective 
father-in-law. Unless he decides he wants to pass on the coverture of his 
daughter, it makes no difference how much you may want his daughter as a wife 
for your son. Neither you nor your son nor anyone else has jurisdiction over 
another man’s daughter. </span></p><span data-dcnode-id="1734" instrument_node="">
</span><p align="justify" data-dcnode-id="1732"><span data-dcnode-id="1733" instrument_node="">It is a disgrace when fathers do not take seriously the 
responsibility of choosing their daughters’ husbands. The father’s passing of 
his coverture responsibilities to a worthy and competent man is the most 
important facet of a wedding and the marriage to follow. </span></p><span data-dcnode-id="1731" instrument_node="">
</span><p align="justify" data-dcnode-id="1729"><span data-dcnode-id="1730" instrument_node="">A prospective son-in-law should be chosen very carefully and 
should, at the bare minimum, meet the following criteria: </span></p><span data-dcnode-id="1728" instrument_node="">
</span><p align="justify" data-dcnode-id="1721"><b data-dcnode-id="1726"><span data-dcnode-id="1727" instrument_node="">(1)</span></b><span data-dcnode-id="1725" instrument_node=""> He must be </span><b data-dcnode-id="1723"><span data-dcnode-id="1724" instrument_node="">a passionate Christian</span></b><span data-dcnode-id="1722" instrument_node="">.*</span></p><span data-dcnode-id="1720" instrument_node="">
</span><p align="justify" data-dcnode-id="1713"><b data-dcnode-id="1718"><span data-dcnode-id="1719" instrument_node="">(2)</span></b><span data-dcnode-id="1717" instrument_node=""> He must be </span><b data-dcnode-id="1715"><span data-dcnode-id="1716" instrument_node="">of the same race</span></b><span data-dcnode-id="1714" instrument_node="">.</span></p><span data-dcnode-id="1712" instrument_node="">

</span><p align="center" data-dcnode-id="1634"><b data-dcnode-id="1635"><span data-dcnode-id="1636" instrument_node="">Seduction and Rape</span></b></p><span data-dcnode-id="1633" instrument_node="">
</span><p align="justify" data-dcnode-id="1630"><b data-dcnode-id="1631"><span data-dcnode-id="1632" instrument_node="">Seduction</span></b></p><span data-dcnode-id="1629" instrument_node="">
</span><blockquote data-dcnode-id="1621"><span data-dcnode-id="1628" instrument_node="">
</span><p align="justify" data-dcnode-id="1623"><span data-dcnode-id="1627" instrument_node="">"And if a man entice a maid that is not betrothed, and lie

</span></blockquote><span data-dcnode-id="1620" instrument_node="">
</span><p align="justify" data-dcnode-id="1608"><span data-dcnode-id="1619" instrument_node="">This passage is addressing consensual sexual participation 
between a man and an unmarried woman. “Endow” is translated from the Hebrew 
</span><i data-dcnode-id="1617"><span data-dcnode-id="1618" instrument_node="">maahor</span></i><span data-dcnode-id="1616" instrument_node=""> and is defined in </span><i data-dcnode-id="1613"><b data-dcnode-id="1614"><span data-dcnode-id="1615" instrument_node="">Strong’s Concordance</span></b></i><span data-dcnode-id="1612" instrument_node=""> as “to bargain for.”
</span><b data-dcnode-id="1610"><span data-dcnode-id="1611" instrument_node="">[70]</span></b><span data-dcnode-id="1609" instrument_node=""> A man who 
seduces a virgin is required to marry her, provided her father sanctions the 
marriage. The dowry is required even if the father forbids the marriage. </span></p><span data-dcnode-id="1607" instrument_node="">
</span><p align="justify" data-dcnode-id="1602"><span data-dcnode-id="1606" instrument_node="">YEHOVAH’s law protects women from predatory men. If a man robs 
a maiden of her virginity, he is to monetarily remunerate her father and, if the 
father agrees, take the woman as his wife. </span><b data-dcnode-id="1604"><span data-dcnode-id="1605" instrument_node="">The man can never divorce this woman</span></b><span data-dcnode-id="1603" instrument_node="">:
</span></p><span data-dcnode-id="1601" instrument_node="">
</span><blockquote data-dcnode-id="1593"><span data-dcnode-id="1600" instrument_node="">
</span><p align="justify" data-dcnode-id="1595"><span data-dcnode-id="1599" instrument_node="">"If a man find a damsel that is a virgin, which is not 
betrothed, and lay hold on her, and lie with her, and they be found; then the 
man that lay with her shall give unto the damsel’s father fifty shekels of 
silver, and she shall be his wife; because he hath humbled her, </span><b data-dcnode-id="1597"><span data-dcnode-id="1598" instrument_node="">he may not put 
her away all his days</span></b><span data-dcnode-id="1596" instrument_node="">" (Deuteronomy 22:28-29).</span></p><span data-dcnode-id="1594" instrument_node="">
</span></blockquote><span data-dcnode-id="1592" instrument_node="">
</span><p align="justify" data-dcnode-id="1590"><span data-dcnode-id="1591" instrument_node="">A shekel was considered equal to a day’s wage. Until we 
return to a silver standard at an equivalent value, the dowry must be computed 
depending upon the man’s daily wage. For example, if his daily wage is $100 per 
day, the dowry would be $5,000, and if his wage is $200 per day, the dowry would 
be $10,000. If these statutes were still implemented today, far fewer 
unprincipled men would take advantage of unsuspecting women. There would also be 
far fewer pre-marital pregnancies, many of which end in infanticide. </span></p><span data-dcnode-id="1589" instrument_node="">
</span><p align="justify" data-dcnode-id="1586"><b data-dcnode-id="1587"><span data-dcnode-id="1588" instrument_node="">Rape</span></b></p><span data-dcnode-id="1585" instrument_node="">
</span><p align="justify" data-dcnode-id="1583"><span data-dcnode-id="1584" instrument_node="">The seducer who refuses to pay the dowry and marry the woman 
would have to be dealt with in the same manner as a rapist: </span></p><span data-dcnode-id="1582" instrument_node="">
</span><blockquote data-dcnode-id="1577"><span data-dcnode-id="1581" instrument_node="">
</span><p align="justify" data-dcnode-id="1579"><span data-dcnode-id="1580" instrument_node="">"If a damsel that is a virgin be betrothed unto an husband, 
and a man find her in the city, and lie with her; then ye shall bring them both 
out unto the gate of that city, and ye shall stone them with stones that they 
die; the damsel, because she cried not, being in the city; and the man, because 
he hath humbled his neighbour’s wife: so thou shalt put away evil from among 
you. But if a man find a betrothed damsel in the field, and the man force her, 
and lie with her: then the man only that lay with her shall die: But unto the 
damsel thou shalt do nothing; there is in the damsel no sin worthy of death: for 
as when a man riseth against his neighbour, and slayeth him, even so is this 
matter: For he found her in the field, and the betrothed damsel cried, and there 
was none to save her" (Deuteronomy 22:23-27).</span></p><span data-dcnode-id="1578" instrument_node="">
</span></blockquote><span data-dcnode-id="1576" instrument_node="">
</span><p align="justify" data-dcnode-id="1572"><b data-dcnode-id="1574"><span data-dcnode-id="1575" instrument_node="">Rape is a capital crime</span></b><span data-dcnode-id="1573" instrument_node="">, not only for the rapist, but also 
for the betrothed woman who does not cry out for help when in earshot of others. 
If the victim is physically capable of crying out and does not, she is 
indistinguishable from a willing participant in adultery and, therefore, subject

</span><p align="justify" data-dcnode-id="1566"><span data-dcnode-id="1570" instrument_node="">It is extremely important that parents teach their daughters 
to scream and fight if accosted. Not only will this establish their innocence, 
but most rapists will desist in their attacks when confronted with such

they should instruct them in self-defense and the use of firearms. </span><b data-dcnode-id="1568"><span data-dcnode-id="1569" instrument_node="">[71] </span></b><span data-dcnode-id="1567" instrument_node=""> </span></p><span data-dcnode-id="1565" instrument_node="">
</span><p align="center" data-dcnode-id="1562"><b data-dcnode-id="1563"><span data-dcnode-id="1564" instrument_node="">Transgression of the Heart</span></b></p><span data-dcnode-id="1561" instrument_node="">
</span><p align="justify" data-dcnode-id="1559"><span data-dcnode-id="1560" instrument_node="">At the core of all Seventh Commandment violations is the sin 
of lust. In Matthew 5, the Messiah elaborated on the spirit of the law concerning 
adultery: </span></p><span data-dcnode-id="1558" instrument_node="">
</span><blockquote data-dcnode-id="1553"><span data-dcnode-id="1557" instrument_node="">
</span><p align="justify" data-dcnode-id="1555"><span data-dcnode-id="1556" instrument_node="">"Ye have heard that it was said by them of old time, Thou 
shalt not commit adultery: But I say unto you, That whosoever looketh on a woman

</span></blockquote><span data-dcnode-id="1552" instrument_node="">
</span><p align="justify" data-dcnode-id="1550"><span data-dcnode-id="1551" instrument_node="">Adultery is not only a violation of the flesh, it is also a 
transgression of the heart, as it is with all sin: </span></p><span data-dcnode-id="1549" instrument_node="">
</span><blockquote data-dcnode-id="1544"><span data-dcnode-id="1548" instrument_node="">
</span><p align="justify" data-dcnode-id="1546"><span data-dcnode-id="1547" instrument_node="">"But those things which proceed out of the mouth come forth 
from the heart; and they defile the man. For out of the heart proceed evil 
thoughts, murders, adulteries, fornications, thefts, false witness, blasphemies" 
(Matthew 15:18-19).</span></p><span data-dcnode-id="1545" instrument_node="">
</span></blockquote><span data-dcnode-id="1543" instrument_node="">
</span><p align="justify" data-dcnode-id="1541"><span data-dcnode-id="1542" instrument_node="">Willful sin is committed in the heart even when it is not 
actually carried out in the flesh. Many men who would never commit physical 
adultery are nonetheless guilty before YEHOVAH God because they have committed 
adultery in their hearts. This is why it is so important that we guard not only 
our actions, but also our hearts: </span></p><span data-dcnode-id="1540" instrument_node="">
</span><blockquote data-dcnode-id="1535"><span data-dcnode-id="1539" instrument_node="">
</span><p align="justify" data-dcnode-id="1537"><span data-dcnode-id="1538" instrument_node="">"Keep thy heart with all diligence; for out of it are the 
issues of life" (Proverbs 4:23).</span></p><span data-dcnode-id="1536" instrument_node="">
</span></blockquote><span data-dcnode-id="1534" instrument_node="">
</span><p align="justify" data-dcnode-id="1532"><span data-dcnode-id="1533" instrument_node="">YEHOVAH does not want us to simply keep His laws by rote with 
the attitude “I will because I have to!” In order for our obedience to be 
pleasing to Him, it must come from our hearts: </span></p><span data-dcnode-id="1531" instrument_node="">
</span><blockquote data-dcnode-id="1526"><span data-dcnode-id="1530" instrument_node="">
</span><p align="justify" data-dcnode-id="1528"><span data-dcnode-id="1529" instrument_node="">"Jesus said unto him, Thou shalt love YHVH thy God with all 
thy heart, and with all thy soul, and with all thy mind. This is the first and 
great commandment. And the second is like unto it, Thou shalt love thy neighbour 
as thyself. On these two commandments hang all the law and the prophets" 
(Matthew 22:37-40).</span></p><span data-dcnode-id="1527" instrument_node="">
</span></blockquote><span data-dcnode-id="1525" instrument_node="">
</span><p align="justify" data-dcnode-id="1523"><span data-dcnode-id="1524" instrument_node="">Because disobedience originates in our hearts, our obedience

obedience, sin is master of our hearts, not YEHOVAH: </span></p><span data-dcnode-id="1522" instrument_node="">
</span><blockquote data-dcnode-id="1514"><span data-dcnode-id="1521" instrument_node="">
</span><p align="justify" data-dcnode-id="1519"><span data-dcnode-id="1520" instrument_node="">"…God be thanked, that ye were the servants of sin, but ye

6:17-18).</span></p><span data-dcnode-id="1518" instrument_node="">
</span><p align="justify" data-dcnode-id="1516"><span data-dcnode-id="1517" instrument_node="">"Not with eye service, as men pleasers; but as the servants of

</span></blockquote><span data-dcnode-id="1513" instrument_node="">
</span><p align="justify" data-dcnode-id="1511"><span data-dcnode-id="1512" instrument_node="">Under the New Covenant, obedience or disobedience to the

</span><blockquote data-dcnode-id="1505"><span data-dcnode-id="1509" instrument_node="">
</span><p align="justify" data-dcnode-id="1507"><span data-dcnode-id="1508" instrument_node="">"I made a covenant with mine eyes; why then should I think 
upon a maid?" (Job 31:1).</span></p><span data-dcnode-id="1506" instrument_node="">
</span></blockquote><span data-dcnode-id="1504" instrument_node="">

</span><p align="justify" data-dcnode-id="1456"><span data-dcnode-id="1457" instrument_node="">This decadent behavior has been deliberately fostered by

</span><p align="justify" data-dcnode-id="1440"><span data-dcnode-id="1441" instrument_node="">Pornography is almost always addictive and progressive in

</span><p align="justify" data-dcnode-id="1433"><span data-dcnode-id="1438" instrument_node="">In 1 Corinthians 6:18, Paul instructs us to flee fornication.

</span><p align="center" data-dcnode-id="1429"><b data-dcnode-id="1430"><span data-dcnode-id="1431" instrument_node="">Seventh Commandment Judgment</span></b></p><span data-dcnode-id="1428" instrument_node="">
</span><p align="justify" data-dcnode-id="1426"><span data-dcnode-id="1427" instrument_node="">Leviticus 20 addresses the judgment for transgressions of

</span><blockquote data-dcnode-id="1414"><span data-dcnode-id="1424" instrument_node="">
</span><p align="justify" data-dcnode-id="1422"><span data-dcnode-id="1423" instrument_node="">"And the man that committeth adultery with another man’s wife,
