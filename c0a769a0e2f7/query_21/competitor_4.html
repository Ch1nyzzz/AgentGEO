</span><h3 data-dcnode-id="786"><span data-dcnode-id="787" instrument_node="">Overview:</span></h3><span data-dcnode-id="785" instrument_node="">
</span><p data-dcnode-id="767"><span data-dcnode-id="784" instrument_node="">The </span><i data-dcnode-id="782"><span data-dcnode-id="783" instrument_node="">Ten Commandments </span></i><span data-dcnode-id="781" instrument_node="">are also called the Decalogue. There are three versions of the 
Ten Commandments mentioned in the Hebrew Scriptures 
-- a.k.a. Old Testament. All are different. They can be found at </span><i data-dcnode-id="774"><span data-dcnode-id="780" instrument_node="">
</span><strong data-dcnode-id="778" style="font-weight: 400"><span data-dcnode-id="779" instrument_node="">Exodus 20:2-17</span></strong><span data-dcnode-id="777" instrument_node="">, 
</span><strong data-dcnode-id="775" style="font-weight: 400"><span data-dcnode-id="776" instrument_node="">
Exodus 34:12-26</span></strong></i><span data-dcnode-id="773" instrument_node="">, and </span><i data-dcnode-id="769"><span data-dcnode-id="772" instrument_node=""> </span><strong data-dcnode-id="770" style="font-weight: 400"><span data-dcnode-id="771" instrument_node="">Deuteronomy 5:6-21</span></strong></i><span data-dcnode-id="768" instrument_node="">. 
They all differ. However, the version in Exodus 20 is by far the most commonly cited.</span></p><span data-dcnode-id="766" instrument_node="">
</span><p data-dcnode-id="761"><span data-dcnode-id="765" instrument_node="">Depending upon how </span><i data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">Ten Commandments</span></i><span data-dcnode-id="762" instrument_node=""> are interpreted, the Exodus 20 
version contain a total of 19 to 25 separate instructions that various faith 
groups have sorted into ten 
commandments. They form part of the 613 injunctions, prohibitions and commands 
which make up the Mosaic Code.</span></p><span data-dcnode-id="760" instrument_node="">
</span><p data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">The Qur'an is the revealed text that Muslims believe was dictated by the 
angel Gabriel to Muhammad, the greatest and final of the prophets of God. </span></p><span data-dcnode-id="757" instrument_node="">
</span><p data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">The Qur'an 
	appears to refer to the 
Decalogue and to urge that they be followed; however it does not contain the actual text:</span></p><span data-dcnode-id="754" instrument_node="">
</span><blockquote data-dcnode-id="747"><span data-dcnode-id="753" instrument_node="">
</span><p data-dcnode-id="749"><span data-dcnode-id="752" instrument_node="">007.145 "</span><i data-dcnode-id="750"><span data-dcnode-id="751" instrument_node="">And We ordained laws for him in the tablets in all 
matters, both commanding and explaining all things, (and said): 'Take 
and hold these with firmness, and enjoin thy people to hold fast by the 
best in the precepts'..."</span></i></p><span data-dcnode-id="748" instrument_node="">
</span></blockquote><span data-dcnode-id="746" instrument_node="">
</span><p data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">Although it does not 
contain the Decalogue as a unit, phrases throughout the Qur'an are very similar

</span><h3 align="left" data-dcnode-id="588"><a data-dcnode-id="590" name="sab"><span data-dcnode-id="591" instrument_node="">Concerning</span></a><span data-dcnode-id="589" instrument_node=""> the Sabbath:</span></h3><span data-dcnode-id="587" instrument_node="">
</span><p align="left" data-dcnode-id="585"><span data-dcnode-id="586" instrument_node="">The Qur'an, at 16:124, states that the Sabbath day of complete 
rest was only required for Jews. </span></p><span data-dcnode-id="584" instrument_node="">
</span><p align="left" data-dcnode-id="576"><span data-dcnode-id="583" instrument_node="">However, congregational prayer (called </span><i data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">Salat Al-Jumu`ah</span></i><span data-dcnode-id="580" instrument_node="">) 
is held on Friday evenings. Muslims are expected to attend. In 62:9, it states: 
"</span><i data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">O you who believe, when the Congregational Prayer is announced on Friday, 
you shall hasten to the commemoration of GOD, and drop all business.</span></i><span data-dcnode-id="577" instrument_node="">" </span></p><span data-dcnode-id="575" instrument_node="">
</span><p align="left" data-dcnode-id="551"><span data-dcnode-id="574" instrument_node="">Imam Hamad Ahmad Chebli, spiritual leader of the </span><i data-dcnode-id="572"><span data-dcnode-id="573" instrument_node="">Islamic 
Society of Central Jersey</span></i><span data-dcnode-id="571" instrument_node="">, near Princeton, said: "</span><i data-dcnode-id="569"><span data-dcnode-id="570" instrument_node="">While the notion of 
Sabbath rest is not found in Islam, more and more Muslims are finding time for 
Friday’s communal midday prayers</span></i><span data-dcnode-id="568" instrument_node="">" </span><font data-dcnode-id="562" face="Trebuchet MS"><sub data-dcnode-id="564"><b data-dcnode-id="566"><span data-dcnode-id="567" instrument_node="">3 </span></b><span data-dcnode-id="565" instrument_node="">
</span></sub><span data-dcnode-id="563" instrument_node="">According to </span></font><span data-dcnode-id="561" instrument_node="">Monique Parsons</span><font data-dcnode-id="559" face="Trebuchet MS"><span data-dcnode-id="560" instrument_node="">' essay in

a community.</span></i><span data-dcnode-id="556" instrument_node="">" </span><font data-dcnode-id="552" face="Trebuchet MS"><sub data-dcnode-id="553"><b data-dcnode-id="554"><span data-dcnode-id="555" instrument_node="">3</span></b></sub></font></p><span data-dcnode-id="550" instrument_node="">
