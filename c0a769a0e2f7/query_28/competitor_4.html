</span><p data-dcnode-id="184"><span data-dcnode-id="212" instrument_node="">2  at three o’clock in the afternoon. </span><sup data-dcnode-id="210"><span data-dcnode-id="211" instrument_node="">3</span></sup><span data-dcnode-id="209" instrument_node="">
</span><strong data-dcnode-id="207"><span data-dcnode-id="208" instrument_node="">3:2</span></strong><span data-dcnode-id="206" instrument_node=""> And a man lame </span><sup data-dcnode-id="204"><span data-dcnode-id="205" instrument_node="">4</span></sup><span data-dcnode-id="203" instrument_node="">  from birth </span><sup data-dcnode-id="201"><span data-dcnode-id="202" instrument_node="">5</span></sup><span data-dcnode-id="200" instrument_node="">  was being carried up, who was placed at the temple gate called “the Beautiful Gate” every day </span><sup data-dcnode-id="198"><span data-dcnode-id="199" instrument_node="">6</span></sup><span data-dcnode-id="197" instrument_node="">  so he could beg for money </span><sup data-dcnode-id="195"><span data-dcnode-id="196" instrument_node="">7</span></sup><span data-dcnode-id="194" instrument_node="">  from those going into the temple courts. </span><sup data-dcnode-id="192"><span data-dcnode-id="193" instrument_node="">8</span></sup><span data-dcnode-id="191" instrument_node=""> </span><strong data-dcnode-id="189"><span data-dcnode-id="190" instrument_node="">3:3</span></strong><span data-dcnode-id="188" instrument_node=""> When he saw Peter and John about to go into the temple courts, </span><sup data-dcnode-id="186"><span data-dcnode-id="187" instrument_node="">9</span></sup><span data-dcnode-id="185" instrument_node="">  he asked them for money. </span></p><span data-dcnode-id="183" instrument_node="">
</span><p data-dcnode-id="137"><sup data-dcnode-id="181"><span data-dcnode-id="182" instrument_node="">10</span></sup><span data-dcnode-id="180" instrument_node=""> </span><strong data-dcnode-id="178"><span data-dcnode-id="179" instrument_node="">3:4</span></strong><span data-dcnode-id="177" instrument_node=""> Peter looked directly </span><sup data-dcnode-id="175"><span data-dcnode-id="176" instrument_node="">11</span></sup><span data-dcnode-id="174" instrument_node="">  at him (as did John) and said, “Look at us!” </span><strong data-dcnode-id="172"><span data-dcnode-id="173" instrument_node="">3:5</span></strong><span data-dcnode-id="171" instrument_node=""> So the lame man </span><sup data-dcnode-id="169"><span data-dcnode-id="170" instrument_node="">12</span></sup><span data-dcnode-id="168" instrument_node="">  paid attention to them, expecting to receive something from them. </span><strong data-dcnode-id="166"><span data-dcnode-id="167" instrument_node="">3:6</span></strong><span data-dcnode-id="165" instrument_node=""> But Peter said, “I have no silver or gold, </span><sup data-dcnode-id="163"><span data-dcnode-id="164" instrument_node="">13</span></sup><span data-dcnode-id="162" instrument_node="">  but what I do have I give you. In the name </span><sup data-dcnode-id="160"><span data-dcnode-id="161" instrument_node="">14</span></sup><span data-dcnode-id="159" instrument_node="">  of Jesus Christ </span><sup data-dcnode-id="157"><span data-dcnode-id="158" instrument_node="">15</span></sup><span data-dcnode-id="156" instrument_node="">  the Nazarene, stand up and </span><sup data-dcnode-id="154"><span data-dcnode-id="155" instrument_node="">16</span></sup><span data-dcnode-id="153" instrument_node="">  walk!” </span><strong data-dcnode-id="151"><span data-dcnode-id="152" instrument_node="">3:7</span></strong><span data-dcnode-id="150" instrument_node=""> Then </span><sup data-dcnode-id="148"><span data-dcnode-id="149" instrument_node="">17</span></sup><span data-dcnode-id="147" instrument_node="">  Peter </span><sup data-dcnode-id="145"><span data-dcnode-id="146" instrument_node="">18</span></sup><span data-dcnode-id="144" instrument_node="">  took hold </span><sup data-dcnode-id="142"><span data-dcnode-id="143" instrument_node="">19</span></sup><span data-dcnode-id="141" instrument_node="">  of him by the right hand and raised him up, and at once the man’s </span><sup data-dcnode-id="139"><span data-dcnode-id="140" instrument_node="">20</span></sup><span data-dcnode-id="138" instrument_node="">  feet and ankles were made strong. </span></p><span data-dcnode-id="136" instrument_node="">
</span><p data-dcnode-id="105"><sup data-dcnode-id="134"><span data-dcnode-id="135" instrument_node="">21</span></sup><span data-dcnode-id="133" instrument_node=""> </span><strong data-dcnode-id="131"><span data-dcnode-id="132" instrument_node="">3:8</span></strong><span data-dcnode-id="130" instrument_node=""> He </span><sup data-dcnode-id="128"><span data-dcnode-id="129" instrument_node="">22</span></sup><span data-dcnode-id="127" instrument_node="">  jumped up, </span><sup data-dcnode-id="125"><span data-dcnode-id="126" instrument_node="">23</span></sup><span data-dcnode-id="124" instrument_node="">  stood and began walking around, and he entered the temple courts </span><sup data-dcnode-id="122"><span data-dcnode-id="123" instrument_node="">24</span></sup><span data-dcnode-id="121" instrument_node="">  with them, walking and leaping and praising God. </span><strong data-dcnode-id="119"><span data-dcnode-id="120" instrument_node="">3:9</span></strong><span data-dcnode-id="118" instrument_node=""> All </span><sup data-dcnode-id="116"><span data-dcnode-id="117" instrument_node="">25</span></sup><span data-dcnode-id="115" instrument_node="">  the people saw him walking and praising God, </span><strong data-dcnode-id="113"><span data-dcnode-id="114" instrument_node="">3:10</span></strong><span data-dcnode-id="112" instrument_node=""> and they recognized him as the man who used to sit and ask for donations </span><sup data-dcnode-id="110"><span data-dcnode-id="111" instrument_node="">26</span></sup><span data-dcnode-id="109" instrument_node="">  at the Beautiful Gate of the temple, and they were filled with astonishment and amazement </span><sup data-dcnode-id="107"><span data-dcnode-id="108" instrument_node="">27</span></sup><span data-dcnode-id="106" instrument_node="">  at what had happened to him.</span></p><span data-dcnode-id="104" instrument_node="">
