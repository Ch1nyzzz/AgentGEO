</span></p><p data-dcnode-id="5000"><span data-dcnode-id="5022" instrument_node="">The general Adventist movement from 1867 followed a policy of </span><a class="mw-redirect" data-dcnode-id="5020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Conscientious_objection" title="Conscientious objection"><span data-dcnode-id="5021" instrument_node="">conscientious objection</span></a><span data-dcnode-id="5019" instrument_node="">. This was confirmed by the Seventh-day Adventist Church in 1914. The official policy allows for military service in </span><a data-dcnode-id="5017" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Non-combatant" title="Non-combatant"><span data-dcnode-id="5018" instrument_node="">non-combative roles</span></a><span data-dcnode-id="5016" instrument_node=""> such as medical corps</span><sup class="reference" data-dcnode-id="5013" id="cite_ref-99"><a data-dcnode-id="5014" href="#cite_note-99"><span data-dcnode-id="5015" instrument_node="">[99]</span></a></sup><span data-dcnode-id="5012" instrument_node=""> much like Seventh-day Adventist </span><a data-dcnode-id="5010" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Desmond_Doss" title="Desmond Doss"><span data-dcnode-id="5011" instrument_node="">Desmond Doss</span></a><span data-dcnode-id="5009" instrument_node=""> who was the first conscientious objector to receive the Medal of Honor and one of only three so honored, and other supportive roles which do not require to kill or carry a weapon.</span><sup class="reference" data-dcnode-id="5006" id="cite_ref-100"><a data-dcnode-id="5007" href="#cite_note-100"><span data-dcnode-id="5008" instrument_node="">[100]</span></a></sup><span data-dcnode-id="5005" instrument_node=""> In practice today, as a pastor from the Seventh-day Adventist church comments in an online magazine runs by members of the Seventh-day Adventist church: "Today in a volunteer army a lot of Adventist young men and women join the military in combat positions, and there are many Adventist pastors electing for military chaplaincy positions, supporting combatants and non-combatants alike. On Veteran's Day, American churches across the country take time to give honor and respect to those who 'served their country,' without any attempt to differentiate how they served, whether as bomber pilots, Navy Seals, or Operation Whitecoat guinea pigs. I have yet to see a service honoring those who ran away to Canada to avoid participation in the senseless carnage of Vietnam in their Biblical pacifism."</span><sup class="reference" data-dcnode-id="5002" id="cite_ref-101"><a data-dcnode-id="5003" href="#cite_note-101"><span data-dcnode-id="5004" instrument_node="">[101]</span></a></sup><span data-dcnode-id="5001" instrument_node="">
</span></p><span data-dcnode-id="4999" instrument_node="">
</span><h2 data-dcnode-id="4989"><span class="mw-headline" data-dcnode-id="4997" id="Other_denominations"><span data-dcnode-id="4998" instrument_node="">Other denominations</span></span><span class="mw-editsection" data-dcnode-id="4990"><span class="mw-editsection-bracket" data-dcnode-id="4995"><span data-dcnode-id="4996" instrument_node="">[</span></span><a data-dcnode-id="4993" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DChristian_pacifism%26action%3Dedit%26section%3D22" title="Edit section: Other denominations"><span data-dcnode-id="4994" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4991"><span data-dcnode-id="4992" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4988" instrument_node="">
</span><h3 data-dcnode-id="4978"><span class="mw-headline" data-dcnode-id="4986" id="Anglicanism"><span data-dcnode-id="4987" instrument_node="">Anglicanism</span></span><span class="mw-editsection" data-dcnode-id="4979"><span class="mw-editsection-bracket" data-dcnode-id="4984"><span data-dcnode-id="4985" instrument_node="">[</span></span><a data-dcnode-id="4982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DChristian_pacifism%26action%3Dedit%26section%3D23" title="Edit section: Anglicanism"><span data-dcnode-id="4983" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4980"><span data-dcnode-id="4981" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4977" instrument_node="">
</span><p data-dcnode-id="4967"><span data-dcnode-id="4976" instrument_node="">Lambeth Conference 1930 Resolution 25 declares that, "The Conference affirms that war as a method of settling international disputes is incompatible with the teaching and example of our Lord Jesus Christ."</span><sup class="reference" data-dcnode-id="4973" id="cite_ref-102"><a data-dcnode-id="4974" href="#cite_note-102"><span data-dcnode-id="4975" instrument_node="">[102]</span></a></sup><span data-dcnode-id="4972" instrument_node=""> The 1948, 1958 and 1968 conferences re-ratified this position.</span><sup class="reference" data-dcnode-id="4969" id="cite_ref-103"><a data-dcnode-id="4970" href="#cite_note-103"><span data-dcnode-id="4971" instrument_node="">[103]</span></a></sup><span data-dcnode-id="4968" instrument_node="">
</span></p><p data-dcnode-id="4962"><span data-dcnode-id="4966" instrument_node="">The </span><a data-dcnode-id="4964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anglican_Pacifist_Fellowship" title="Anglican Pacifist Fellowship"><span data-dcnode-id="4965" instrument_node="">Anglican Pacifist Fellowship</span></a><span data-dcnode-id="4963" instrument_node=""> lobbies the various dioceses of the church to uphold this resolution and work constructively for peace.
</span></p><span data-dcnode-id="4961" instrument_node="">
</span><h3 data-dcnode-id="4951"><span class="mw-headline" data-dcnode-id="4959" id="Baptist"><span data-dcnode-id="4960" instrument_node="">Baptist</span></span><span class="mw-editsection" data-dcnode-id="4952"><span class="mw-editsection-bracket" data-dcnode-id="4957"><span data-dcnode-id="4958" instrument_node="">[</span></span><a data-dcnode-id="4955" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DChristian_pacifism%26action%3Dedit%26section%3D24" title="Edit section: Baptist"><span data-dcnode-id="4956" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4953"><span data-dcnode-id="4954" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4950" instrument_node="">
</span><p data-dcnode-id="4941"><span data-dcnode-id="4949" instrument_node="">Some 400 </span><a data-dcnode-id="4947" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Baptists" title="Baptists"><span data-dcnode-id="4948" instrument_node="">Baptists</span></a><span data-dcnode-id="4946" instrument_node=""> refused combatant duty during World War II.</span><sup class="reference" data-dcnode-id="4943" id="cite_ref-104"><a data-dcnode-id="4944" href="#cite_note-104"><span data-dcnode-id="4945" instrument_node="">[104]</span></a></sup><span data-dcnode-id="4942" instrument_node="">
</span></p><p data-dcnode-id="4916"><a data-dcnode-id="4939" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Martin_Luther_King_Jr." title="Martin Luther King Jr."><span data-dcnode-id="4940" instrument_node="">Martin Luther King Jr.</span></a><span data-dcnode-id="4938" instrument_node=""> was an American Baptist minister and activist who became the most visible spokesman and leader in the </span><a data-dcnode-id="4936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Civil_rights_movement" title="Civil rights movement"><span data-dcnode-id="4937" instrument_node="">civil rights movement</span></a><span data-dcnode-id="4935" instrument_node=""> from 1955 until </span><a data-dcnode-id="4933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Assassination_of_Martin_Luther_King_Jr." title="Assassination of Martin Luther King Jr."><span data-dcnode-id="4934" instrument_node="">his assassination</span></a><span data-dcnode-id="4932" instrument_node=""> in 1968. An </span><a class="mw-redirect" data-dcnode-id="4930" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/African_American" title="African American"><span data-dcnode-id="4931" instrument_node="">African American</span></a><span data-dcnode-id="4929" instrument_node=""> church leader and the son of early civil rights activist and minister </span><a data-dcnode-id="4927" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Martin_Luther_King_Sr." title="Martin Luther King Sr."><span data-dcnode-id="4928" instrument_node="">Martin Luther King Sr.</span></a><span data-dcnode-id="4926" instrument_node="">, King advanced civil rights for people of color in the United States through </span><a data-dcnode-id="4924" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nonviolence" title="Nonviolence"><span data-dcnode-id="4925" instrument_node="">nonviolence</span></a><span data-dcnode-id="4923" instrument_node=""> and </span><a data-dcnode-id="4921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Civil_disobedience" title="Civil disobedience"><span data-dcnode-id="4922" instrument_node="">civil disobedience</span></a><span data-dcnode-id="4920" instrument_node="">, inspired by his Christian beliefs and the nonviolent activism of </span><a data-dcnode-id="4918" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mahatma_Gandhi" title="Mahatma Gandhi"><span data-dcnode-id="4919" instrument_node="">Mahatma Gandhi</span></a><span data-dcnode-id="4917" instrument_node="">.
</span></p><span data-dcnode-id="4915" instrument_node="">
</span><h3 data-dcnode-id="4905"><span class="mw-headline" data-dcnode-id="4913" id="Calvinism"><span data-dcnode-id="4914" instrument_node="">Calvinism</span></span><span class="mw-editsection" data-dcnode-id="4906"><span class="mw-editsection-bracket" data-dcnode-id="4911"><span data-dcnode-id="4912" instrument_node="">[</span></span><a data-dcnode-id="4909" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DChristian_pacifism%26action%3Dedit%26section%3D25" title="Edit section: Calvinism"><span data-dcnode-id="4910" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4907"><span data-dcnode-id="4908" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4904" instrument_node="">
</span><p data-dcnode-id="4898"><span data-dcnode-id="4903" instrument_node="">Today, the orthodox position of conservative Calvinists is Christian pacifism.</span><sup class="reference" data-dcnode-id="4900" id="cite_ref-105"><a data-dcnode-id="4901" href="#cite_note-105"><span data-dcnode-id="4902" instrument_node="">[105]</span></a></sup><span data-dcnode-id="4899" instrument_node="">
</span></p><p data-dcnode-id="4890"><span data-dcnode-id="4897" instrument_node="">Many modern Calvinists, such as </span><a data-dcnode-id="4895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Andr%25C3%25A9_and_Magda_Trocm%25C3%25A9" title="André and Magda Trocmé"><span data-dcnode-id="4896" instrument_node="">André Trocmé</span></a><span data-dcnode-id="4894" instrument_node="">, </span><a data-dcnode-id="4892" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Category%3ACalvinist_pacifists" title="Category:Calvinist pacifists"><span data-dcnode-id="4893" instrument_node="">have been pacifists</span></a><span data-dcnode-id="4891" instrument_node="">.
</span></p><span data-dcnode-id="4889" instrument_node="">
</span><h3 data-dcnode-id="4879"><span class="mw-headline" data-dcnode-id="4887" id="Lutheranism"><span data-dcnode-id="4888" instrument_node="">Lutheranism</span></span><span class="mw-editsection" data-dcnode-id="4880"><span class="mw-editsection-bracket" data-dcnode-id="4885"><span data-dcnode-id="4886" instrument_node="">[</span></span><a data-dcnode-id="4883" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DChristian_pacifism%26action%3Dedit%26section%3D26" title="Edit section: Lutheranism"><span data-dcnode-id="4884" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4881"><span data-dcnode-id="4882" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4878" instrument_node="">
</span><p data-dcnode-id="4869"><span data-dcnode-id="4877" instrument_node="">The </span><a data-dcnode-id="4875" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lutheran_Church_of_Australia" title="Lutheran Church of Australia"><span data-dcnode-id="4876" instrument_node="">Lutheran Church of Australia</span></a><span data-dcnode-id="4874" instrument_node=""> recognises conscientious objection to war as Biblically legitimate.</span><sup class="reference" data-dcnode-id="4871" id="cite_ref-106"><a data-dcnode-id="4872" href="#cite_note-106"><span data-dcnode-id="4873" instrument_node="">[106]</span></a></sup><span data-dcnode-id="4870" instrument_node="">
</span></p><p data-dcnode-id="4864"><span data-dcnode-id="4868" instrument_node="">Since the Second World War, </span><a data-dcnode-id="4866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Category%3ALutheran_pacifists" title="Category:Lutheran pacifists"><span data-dcnode-id="4867" instrument_node="">many notable Lutherans have been pacifists</span></a><span data-dcnode-id="4865" instrument_node="">.
</span></p><span data-dcnode-id="4863" instrument_node="">
</span><h2 data-dcnode-id="4853"><span class="mw-headline" data-dcnode-id="4861" id="Secular_interpretations"><span data-dcnode-id="4862" instrument_node="">Secular interpretations</span></span><span class="mw-editsection" data-dcnode-id="4854"><span class="mw-editsection-bracket" data-dcnode-id="4859"><span data-dcnode-id="4860" instrument_node="">[</span></span><a data-dcnode-id="4857" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DChristian_pacifism%26action%3Dedit%26section%3D27" title="Edit section: Secular interpretations"><span data-dcnode-id="4858" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4855"><span data-dcnode-id="4856" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4852" instrument_node="">
</span><p data-dcnode-id="4844"><span data-dcnode-id="4851" instrument_node="">According to the acclaimed 20th century </span><a class="mw-redirect" data-dcnode-id="4849" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Socialist" title="Socialist"><span data-dcnode-id="4850" instrument_node="">socialist</span></a><span data-dcnode-id="4848" instrument_node=""> writer </span><a data-dcnode-id="4846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Upton_Sinclair" title="Upton Sinclair"><span data-dcnode-id="4847" instrument_node="">Upton Sinclair</span></a><span data-dcnode-id="4845" instrument_node="">,
</span></p><span data-dcnode-id="4843" instrument_node="">
</span><link data-dcnode-id="4842" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="4830"><p data-dcnode-id="4831"><span data-dcnode-id="4841" instrument_node="">…</span><a data-dcnode-id="4839" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Satan" title="Satan"><span data-dcnode-id="4840" instrument_node="">the subtle worm</span></a><span data-dcnode-id="4838" instrument_node=""> assumed the guise of no less a person than </span><a data-dcnode-id="4836" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Constantine_the_Great" title="Constantine the Great"><span data-dcnode-id="4837" instrument_node="">the Emperor</span></a><span data-dcnode-id="4835" instrument_node=""> himself, suggesting that he should become a convert to the new faith, so that the Church and he might work together for the greater glory of God. The bishops and fathers of the Church, ambitious for their organization, fell for this scheme, and Satan went off laughing to himself. He had got everything he had asked from Jesus three hundred years before; he had got the world's greatest religion.</span><sup class="reference" data-dcnode-id="4832" id="cite_ref-107"><a data-dcnode-id="4833" href="#cite_note-107"><span data-dcnode-id="4834" instrument_node="">[107]</span></a></sup></p></blockquote><span data-dcnode-id="4829" instrument_node="">
</span><p data-dcnode-id="4810"><a class="mw-redirect" data-dcnode-id="4827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Linguist" title="Linguist"><span data-dcnode-id="4828" instrument_node="">Linguist</span></a><span data-dcnode-id="4826" instrument_node="">, </span><a data-dcnode-id="4824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Philosopher" title="Philosopher"><span data-dcnode-id="4825" instrument_node="">philosopher</span></a><span data-dcnode-id="4823" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="4821" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cognitive_scientist" title="Cognitive scientist"><span data-dcnode-id="4822" instrument_node="">cognitive scientist</span></a><span data-dcnode-id="4820" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="4818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Social_critic" title="Social critic"><span data-dcnode-id="4819" instrument_node="">social critic</span></a><span data-dcnode-id="4817" instrument_node="">, and </span><a class="mw-redirect" data-dcnode-id="4815" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Libertarian_socialist" title="Libertarian socialist"><span data-dcnode-id="4816" instrument_node="">libertarian socialist</span></a><span data-dcnode-id="4814" instrument_node=""> </span><a data-dcnode-id="4812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Noam_Chomsky" title="Noam Chomsky"><span data-dcnode-id="4813" instrument_node="">Noam Chomsky</span></a><span data-dcnode-id="4811" instrument_node=""> writes,
</span></p><span data-dcnode-id="4809" instrument_node="">
</span><link data-dcnode-id="4808" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="4796"><p data-dcnode-id="4797"><span data-dcnode-id="4807" instrument_node="">The Gospels are radical pacifist material, if you take a look at them. When the Roman emperor Constantine adopted Christianity he shifted it from a radical pacifist religion to the religion of the Roman Empire. So the cross, which was symbol of the suffering of the poor, was put on the shield of Roman soldiers. Since that time the Church has been pretty much the church of the rich and the powerful—the opposite of the message of the Gospels. </span><a data-dcnode-id="4805" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Liberation_theology" title="Liberation theology"><span data-dcnode-id="4806" instrument_node="">Liberation theology</span></a><span data-dcnode-id="4804" instrument_node="">, in </span><a data-dcnode-id="4802" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Brazil" title="Brazil"><span data-dcnode-id="4803" instrument_node="">Brazil</span></a><span data-dcnode-id="4801" instrument_node=""> particularly, brought the actual Gospels to peasants.</span><sup class="reference" data-dcnode-id="4798" id="cite_ref-108"><a data-dcnode-id="4799" href="#cite_note-108"><span data-dcnode-id="4800" instrument_node="">[108]</span></a></sup></p></blockquote><span data-dcnode-id="4795" instrument_node="">
</span><h2 data-dcnode-id="4785"><span class="mw-headline" data-dcnode-id="4793" id="Christian_pacifism_in_action"><span data-dcnode-id="4794" instrument_node="">Christian pacifism in action</span></span><span class="mw-editsection" data-dcnode-id="4786"><span class="mw-editsection-bracket" data-dcnode-id="4791"><span data-dcnode-id="4792" instrument_node="">[</span></span><a data-dcnode-id="4789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DChristian_pacifism%26action%3Dedit%26section%3D28" title="Edit section: Christian pacifism in action"><span data-dcnode-id="4790" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4787"><span data-dcnode-id="4788" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4784" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4771"><div class="thumbinner" data-dcnode-id="4772" style="width:172px;"><a class="image" data-dcnode-id="4782" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A2108-young-arrestthisman.jpg"><img alt="" class="thumbimage" data-dcnode-id="4783" data-file-height="4838" data-file-width="4031" decoding="async" height="204" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/f/f5/2108-young-arrestthisman.jpg/170px-2108-young-arrestthisman.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/f/f5/2108-young-arrestthisman.jpg/255px-2108-young-arrestthisman.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/f/f5/2108-young-arrestthisman.jpg/340px-2108-young-arrestthisman.jpg 2x" width="170"></a><span data-dcnode-id="4781" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4773"><div class="magnify" data-dcnode-id="4779"><a class="internal" data-dcnode-id="4780" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A2108-young-arrestthisman.jpg" title="Enlarge"></a></div><i data-dcnode-id="4777"><span data-dcnode-id="4778" instrument_node="">Arrest This Man</span></i><span data-dcnode-id="4776" instrument_node=""> (c. 1921) by </span><a data-dcnode-id="4774" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Art_Young" title="Art Young"><span data-dcnode-id="4775" instrument_node="">Art Young</span></a></div></div></div><span data-dcnode-id="4770" instrument_node="">
</span><p data-dcnode-id="4713"><span data-dcnode-id="4769" instrument_node="">19th-century Christian abolitionists and </span><a data-dcnode-id="4767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Christian_anarchism" title="Christian anarchism"><span data-dcnode-id="4768" instrument_node="">anarchists</span></a><span data-dcnode-id="4766" instrument_node=""> </span><a data-dcnode-id="4764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Adin_Ballou" title="Adin Ballou"><span data-dcnode-id="4765" instrument_node="">Adin Ballou</span></a><span data-dcnode-id="4763" instrument_node=""> and </span><a data-dcnode-id="4761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/William_Lloyd_Garrison" title="William Lloyd Garrison"><span data-dcnode-id="4762" instrument_node="">William Lloyd Garrison</span></a><span data-dcnode-id="4760" instrument_node=""> were critical of the violent and coercive nature of all human governments. Ballou and Garrison advocated for nonresistance against the institution of slavery and imperialism, as they saw the Bible as the embodiment of “passive nonresistance” and the only way to achieve the new millennium on Earth. Instead of violence, they advocated for </span><a data-dcnode-id="4758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Moral_suasion" title="Moral suasion"><span data-dcnode-id="4759" instrument_node="">moral suasion</span></a><span data-dcnode-id="4757" instrument_node=""> or consistent rebukes against the institution of slavery so to persuade racist southerns and indifferent northerners to the abolitionist's cause. Garrison and Ballou, along with </span><a data-dcnode-id="4755" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Amos_Bronson_Alcott" title="Amos Bronson Alcott"><span data-dcnode-id="4756" instrument_node="">Amos Bronson Alcott</span></a><span data-dcnode-id="4754" instrument_node="">, </span><a data-dcnode-id="4752" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Maria_Weston_Chapman" title="Maria Weston Chapman"><span data-dcnode-id="4753" instrument_node="">Maria Weston Chapman</span></a><span data-dcnode-id="4751" instrument_node="">, </span><a data-dcnode-id="4749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stephen_Symonds_Foster" title="Stephen Symonds Foster"><span data-dcnode-id="4750" instrument_node="">Stephen Symonds Foster</span></a><span data-dcnode-id="4748" instrument_node="">, </span><a data-dcnode-id="4746" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Abby_Kelley" title="Abby Kelley"><span data-dcnode-id="4747" instrument_node="">Abby Kelley</span></a><span data-dcnode-id="4745" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="4743" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Samuel_May" title="Samuel May"><span data-dcnode-id="4744" instrument_node="">Samuel May</span></a><span data-dcnode-id="4742" instrument_node="">, and </span><a class="mw-redirect" data-dcnode-id="4740" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Henry_C._Wright" title="Henry C. Wright"><span data-dcnode-id="4741" instrument_node="">Henry C. Wright</span></a><span data-dcnode-id="4739" instrument_node="">,</span><sup class="reference" data-dcnode-id="4736" id="cite_ref-109"><a data-dcnode-id="4737" href="#cite_note-109"><span data-dcnode-id="4738" instrument_node="">[109]</span></a></sup><span data-dcnode-id="4735" instrument_node=""> founded the </span><a data-dcnode-id="4733" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_England_Non-Resistance_Society" title="New England Non-Resistance Society"><span data-dcnode-id="4734" instrument_node="">New England Non-Resistance Society</span></a><span data-dcnode-id="4732" instrument_node=""> in 1838 in Boston. The society condemned the use of force in resisting evil, in war, for the death penalty, or in self-defense, renounced allegiance to human government, and called for the immediate abolition of slavery without compensation. Garrison's weekly abolitionist newspaper </span><i data-dcnode-id="4729"><a data-dcnode-id="4730" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Liberator_%28newspaper%29" title="The Liberator (newspaper)"><span data-dcnode-id="4731" instrument_node="">The Liberator</span></a></i><span data-dcnode-id="4728" instrument_node=""> (1831–1865) and Ballou's Christian utopian commune the </span><a data-dcnode-id="4726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hopedale_Community" title="Hopedale Community"><span data-dcnode-id="4727" instrument_node="">Hopedale Community</span></a><span data-dcnode-id="4725" instrument_node=""> (established in 1843 in </span><a data-dcnode-id="4723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Milford%2C_Massachusetts" title="Milford, Massachusetts"><span data-dcnode-id="4724" instrument_node="">Milford, Massachusetts</span></a><span data-dcnode-id="4722" instrument_node="">) were also some of their key efforts in propagating Christian pacifism in the United States. Their writings on Christian nonresistance also influenced </span><a data-dcnode-id="4720" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Leo_Tolstoy" title="Leo Tolstoy"><span data-dcnode-id="4721" instrument_node="">Leo Tolstoy</span></a><span data-dcnode-id="4719" instrument_node="">'s theo-political ideology and his non-fiction texts like </span><i data-dcnode-id="4715"><a data-dcnode-id="4717" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Kingdom_of_God_Is_Within_You" title="The Kingdom of God Is Within You"><span data-dcnode-id="4718" instrument_node="">The Kingdom of God is Within You</span></a><span data-dcnode-id="4716" instrument_node="">.</span></i><span data-dcnode-id="4714" instrument_node="">
</span></p><p data-dcnode-id="4692"><span data-dcnode-id="4712" instrument_node="">From the beginning of the </span><a class="mw-redirect" data-dcnode-id="4710" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/First_World_War" title="First World War"><span data-dcnode-id="4711" instrument_node="">First World War</span></a><span data-dcnode-id="4709" instrument_node="">, Christian pacifist organizations emerged to support Christians in denominations other than the historic peace churches. The first was the interdenominational </span><a data-dcnode-id="4707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fellowship_of_Reconciliation" title="Fellowship of Reconciliation"><span data-dcnode-id="4708" instrument_node="">Fellowship of Reconciliation</span></a><span data-dcnode-id="4706" instrument_node=""> ("FoR"), founded in Britain in 1915 but soon joined by sister organizations in the U.S. and other countries. Today pacifist organizations serving specific denominations are more or less closely allied with the FoR: they include the </span><a data-dcnode-id="4704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Methodist_Peace_Fellowship" title="Methodist Peace Fellowship"><span data-dcnode-id="4705" instrument_node="">Methodist Peace Fellowship</span></a><span data-dcnode-id="4703" instrument_node=""> (established in 1933), the Anglican Pacifist Fellowship (established in 1937), </span><a data-dcnode-id="4701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pax_Christi" title="Pax Christi"><span data-dcnode-id="4702" instrument_node="">Pax Christi</span></a><span data-dcnode-id="4700" instrument_node=""> (</span><a class="mw-redirect" data-dcnode-id="4698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Roman_Catholic" title="Roman Catholic"><span data-dcnode-id="4699" instrument_node="">Roman Catholic</span></a><span data-dcnode-id="4697" instrument_node="">, established in 1945), and so forth. The Network of Christian Peace Organisations (NCPO) is a UK-based ecumenical peace network of 28 organizations.</span><sup class="reference" data-dcnode-id="4694" id="cite_ref-110"><a data-dcnode-id="4695" href="#cite_note-110"><span data-dcnode-id="4696" instrument_node="">[110]</span></a></sup><span data-dcnode-id="4693" instrument_node=""> Some of these organizations do not take strictly pacifist positions, describing themselves instead as advocating nonviolence, and some either have members who would not consider themselves Christians or are explicitly interfaith. However, they share historical and philosophical roots in Christian pacifism.
</span></p><p data-dcnode-id="4671"><span data-dcnode-id="4691" instrument_node="">In some cases Christian churches, even if not necessarily committed to Christian pacifism, have supported particular campaigns of </span><a data-dcnode-id="4689" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nonviolent_resistance" title="Nonviolent resistance"><span data-dcnode-id="4690" instrument_node="">nonviolent resistance</span></a><span data-dcnode-id="4688" instrument_node="">, also often called </span><a data-dcnode-id="4686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Civil_resistance" title="Civil resistance"><span data-dcnode-id="4687" instrument_node="">civil resistance</span></a><span data-dcnode-id="4685" instrument_node="">. Examples include the </span><a data-dcnode-id="4683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Southern_Christian_Leadership_Conference" title="Southern Christian Leadership Conference"><span data-dcnode-id="4684" instrument_node="">Southern Christian Leadership Conference</span></a><span data-dcnode-id="4682" instrument_node=""> (a grouping of churches in the southern United States) in supporting the Civil Rights Movement; the Chilean Catholic Church's support for the civic action against authoritarian rule in </span><a class="mw-redirect" data-dcnode-id="4680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Military_dictatorship_of_Chile_%281973%25E2%2580%259390%29" title="Military dictatorship of Chile (1973–90)"><span data-dcnode-id="4681" instrument_node="">Pinochet's Chile</span></a><span data-dcnode-id="4679" instrument_node=""> in the 1980s; and the Polish Catholic Church's support for the </span><a data-dcnode-id="4677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Solidarity_%28Polish_trade_union%29" title="Solidarity (Polish trade union)"><span data-dcnode-id="4678" instrument_node="">Solidarity movement</span></a><span data-dcnode-id="4676" instrument_node=""> in Poland in the 1980s.</span><sup class="reference" data-dcnode-id="4673" id="cite_ref-111"><a data-dcnode-id="4674" href="#cite_note-111"><span data-dcnode-id="4675" instrument_node="">[111]</span></a></sup><span data-dcnode-id="4672" instrument_node="">
</span></p><p data-dcnode-id="4656"><a data-dcnode-id="4669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Walter_Wink" title="Walter Wink"><span data-dcnode-id="4670" instrument_node="">Walter Wink</span></a><span data-dcnode-id="4668" instrument_node=""> writes that "There are three general responses to evil: (1) passivity, (2) violent opposition, and (3) the third way of militant nonviolence articulated by Jesus. Human evolution has conditioned us for only the first two of these responses: fight or flight."</span><sup class="reference" data-dcnode-id="4665" id="cite_ref-112"><a data-dcnode-id="4666" href="#cite_note-112"><span data-dcnode-id="4667" instrument_node="">[112]</span></a></sup><span data-dcnode-id="4664" instrument_node=""> This understanding typifies Walter Wink's book, </span><i data-dcnode-id="4662"><span data-dcnode-id="4663" instrument_node="">Jesus and Nonviolence: A Third Way</span></i><span data-dcnode-id="4661" instrument_node="">.</span><sup class="reference" data-dcnode-id="4658" id="cite_ref-113"><a data-dcnode-id="4659" href="#cite_note-113"><span data-dcnode-id="4660" instrument_node="">[113]</span></a></sup><span data-dcnode-id="4657" instrument_node="">
</span></p><span data-dcnode-id="4655" instrument_node="">
</span><h3 data-dcnode-id="4645"><span class="mw-headline" data-dcnode-id="4653" id="First_World_War"><span data-dcnode-id="4654" instrument_node="">First World War</span></span><span class="mw-editsection" data-dcnode-id="4646"><span class="mw-editsection-bracket" data-dcnode-id="4651"><span data-dcnode-id="4652" instrument_node="">[</span></span><a data-dcnode-id="4649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DChristian_pacifism%26action%3Dedit%26section%3D29" title="Edit section: First World War"><span data-dcnode-id="4650" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4647"><span data-dcnode-id="4648" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4644" instrument_node="">
</span><p data-dcnode-id="4610"><a data-dcnode-id="4642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ben_Salmon" title="Ben Salmon"><span data-dcnode-id="4643" instrument_node="">Ben Salmon</span></a><span data-dcnode-id="4641" instrument_node=""> was an American Catholic pacifist and outspoken critic of </span><a data-dcnode-id="4639" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Just_war_theory" title="Just war theory"><span data-dcnode-id="4640" instrument_node="">just war theory</span></a><span data-dcnode-id="4638" instrument_node="">, as he believed all war to be unjust.</span><sup class="reference" data-dcnode-id="4635" id="cite_ref-114"><a data-dcnode-id="4636" href="#cite_note-114"><span data-dcnode-id="4637" instrument_node="">[114]</span></a></sup><span data-dcnode-id="4634" instrument_node=""> During the First World War, Salmon was arrested for refusing to complete a </span><a data-dcnode-id="4632" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Selective_Service_System" title="Selective Service System"><span data-dcnode-id="4633" instrument_node="">Selective Service</span></a><span data-dcnode-id="4631" instrument_node=""> and report for induction. He was court-martialed at </span><a data-dcnode-id="4629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Camp_Dodge" title="Camp Dodge"><span data-dcnode-id="4630" instrument_node="">Camp Dodge</span></a><span data-dcnode-id="4628" instrument_node="">, Iowa on July 24, 1918, and sentenced to death. This was later revised to 25 years hard labor.</span><sup class="reference" data-dcnode-id="4625" id="cite_ref-115"><a data-dcnode-id="4626" href="#cite_note-115"><span data-dcnode-id="4627" instrument_node="">[115]</span></a></sup><span data-dcnode-id="4624" instrument_node=""> Salmon's steadfast pacifism has since been cited as an inspiration for other Catholics, such as Fathers </span><a data-dcnode-id="4622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Daniel_Berrigan" title="Daniel Berrigan"><span data-dcnode-id="4623" instrument_node="">Daniel Berrigan</span></a><span data-dcnode-id="4621" instrument_node=""> and </span><a data-dcnode-id="4619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Dear" title="John Dear"><span data-dcnode-id="4620" instrument_node="">John Dear</span></a><span data-dcnode-id="4618" instrument_node="">.</span><sup class="reference" data-dcnode-id="4615" id="cite_ref-NCR_116-0"><a data-dcnode-id="4616" href="#cite_note-NCR-116"><span data-dcnode-id="4617" instrument_node="">[116]</span></a></sup><sup class="reference" data-dcnode-id="4612" id="cite_ref-117"><a data-dcnode-id="4613" href="#cite_note-117"><span data-dcnode-id="4614" instrument_node="">[117]</span></a></sup><span data-dcnode-id="4611" instrument_node="">
</span></p><p data-dcnode-id="4602"><span data-dcnode-id="4609" instrument_node="">The </span><a data-dcnode-id="4607" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anglicanism" title="Anglicanism"><span data-dcnode-id="4608" instrument_node="">Episcopal</span></a><span data-dcnode-id="4606" instrument_node=""> bishop </span><a data-dcnode-id="4604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paul_Jones_%28bishop%29" title="Paul Jones (bishop)"><span data-dcnode-id="4605" instrument_node="">Paul Jones</span></a><span data-dcnode-id="4603" instrument_node="">, who had associated himself with the Fellowship of Reconciliation and had been quite outspoken in his opposition to the war, was forced to resign his Utah see in April 1918.
</span></p><p data-dcnode-id="4574"><span data-dcnode-id="4601" instrument_node="">In 1918, four Hutterite brothers from </span><a data-dcnode-id="4599" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/South_Dakota" title="South Dakota"><span data-dcnode-id="4600" instrument_node="">South Dakota</span></a><span data-dcnode-id="4598" instrument_node="">, Jacob Wipf and David, Joseph and Michael Hofer were imprisoned at Alcatraz for refusing to fight in military or put on a military uniform; Joseph and Michael Hofer died in late 1918 at </span><a data-dcnode-id="4596" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fort_Leavenworth" title="Fort Leavenworth"><span data-dcnode-id="4597" instrument_node="">Fort Leavenworth</span></a><span data-dcnode-id="4595" instrument_node="">, </span><a data-dcnode-id="4593" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kansas" title="Kansas"><span data-dcnode-id="4594" instrument_node="">Kansas</span></a><span data-dcnode-id="4592" instrument_node="">, due to the harsh conditions of the imprisonment.</span><sup class="reference" data-dcnode-id="4589" id="cite_ref-118"><a data-dcnode-id="4590" href="#cite_note-118"><span data-dcnode-id="4591" instrument_node="">[118]</span></a></sup><span data-dcnode-id="4588" instrument_node=""> In the Remembering Muted Voices symposium in October 2017, the lives and witness of World War I peace activists, including the four Hutterite brothers, were remembered. The symposium was sponsored by the </span><a data-dcnode-id="4586" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/American_Civil_Liberties_Union" title="American Civil Liberties Union"><span data-dcnode-id="4587" instrument_node="">American Civil Liberties Union</span></a><span data-dcnode-id="4585" instrument_node="">, </span><a data-dcnode-id="4583" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peace_History_Society" title="Peace History Society"><span data-dcnode-id="4584" instrument_node="">Peace History Society</span></a><span data-dcnode-id="4582" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="4580" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Plough_Publishing_House" title="Plough Publishing House"><span data-dcnode-id="4581" instrument_node="">Plough Publishing House</span></a><span data-dcnode-id="4579" instrument_node="">, and the Vaughan Williams Charitable Trust.</span><sup class="reference" data-dcnode-id="4576" id="cite_ref-119"><a data-dcnode-id="4577" href="#cite_note-119"><span data-dcnode-id="4578" instrument_node="">[119]</span></a></sup><span data-dcnode-id="4575" instrument_node="">
</span></p><span data-dcnode-id="4573" instrument_node="">
</span><h3 data-dcnode-id="4563"><span class="mw-headline" data-dcnode-id="4571" id="Second_World_War"><span data-dcnode-id="4572" instrument_node="">Second World War</span></span><span class="mw-editsection" data-dcnode-id="4564"><span class="mw-editsection-bracket" data-dcnode-id="4569"><span data-dcnode-id="4570" instrument_node="">[</span></span><a data-dcnode-id="4567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DChristian_pacifism%26action%3Dedit%26section%3D30" title="Edit section: Second World War"><span data-dcnode-id="4568" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4565"><span data-dcnode-id="4566" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4562" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4549"><div class="thumbinner" data-dcnode-id="4550" style="width:172px;"><a class="image" data-dcnode-id="4560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AAve-Caesar---Crown-copyright-jpg_141626.jpg"><img alt="" class="thumbimage" data-dcnode-id="4561" data-file-height="1500" data-file-width="934" decoding="async" height="273" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/1/13/Ave-Caesar---Crown-copyright-jpg_141626.jpg/170px-Ave-Caesar---Crown-copyright-jpg_141626.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/1/13/Ave-Caesar---Crown-copyright-jpg_141626.jpg/255px-Ave-Caesar---Crown-copyright-jpg_141626.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/1/13/Ave-Caesar---Crown-copyright-jpg_141626.jpg/340px-Ave-Caesar---Crown-copyright-jpg_141626.jpg 2x" width="170"></a><span data-dcnode-id="4559" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4551"><div class="magnify" data-dcnode-id="4557"><a class="internal" data-dcnode-id="4558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AAve-Caesar---Crown-copyright-jpg_141626.jpg" title="Enlarge"></a></div><i data-dcnode-id="4553"><a data-dcnode-id="4555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ave_Imperator%2C_morituri_te_salutant" title="Ave Imperator, morituri te salutant"><span data-dcnode-id="4556" instrument_node="">Ave Caesar! Morituri te salutant</span></a><span data-dcnode-id="4554" instrument_node=""> (Hail Caesar)</span></i><span data-dcnode-id="4552" instrument_node=""> (1941)</span></div></div></div><span data-dcnode-id="4548" instrument_node="">
</span><p data-dcnode-id="4514"><span data-dcnode-id="4547" instrument_node="">In the winter of 1935–36, before the onset of </span><a data-dcnode-id="4545" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_War_II" title="World War II"><span data-dcnode-id="4546" instrument_node="">World War II</span></a><span data-dcnode-id="4544" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="4542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jehovah%25E2%2580%2599s_Witnesses" title="Jehovah’s Witnesses"><span data-dcnode-id="4543" instrument_node="">Jehovah’s Witnesses</span></a><span data-dcnode-id="4541" instrument_node=""> have been reported to make up 20–40% of the prisoners in </span><a data-dcnode-id="4539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nazi_concentration_camps" title="Nazi concentration camps"><span data-dcnode-id="4540" instrument_node="">concentration camps</span></a><span data-dcnode-id="4538" instrument_node="">.</span><sup class="reference" data-dcnode-id="4535" id="cite_ref-120"><a data-dcnode-id="4536" href="#cite_note-120"><span data-dcnode-id="4537" instrument_node="">[120]</span></a></sup><span data-dcnode-id="4534" instrument_node=""> Although Jehovah's Witnesses made up the vast majority of those wearing the </span><a data-dcnode-id="4532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Purple_triangle" title="Purple triangle"><span data-dcnode-id="4533" instrument_node="">purple triangle</span></a><span data-dcnode-id="4531" instrument_node="">, a concentration camp badge used by the </span><a class="mw-redirect" data-dcnode-id="4529" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nazis" title="Nazis"><span data-dcnode-id="4530" instrument_node="">Nazis</span></a><span data-dcnode-id="4528" instrument_node=""> to identify Jehovah's Witnesses in </span><a data-dcnode-id="4526" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nazi_Germany" title="Nazi Germany"><span data-dcnode-id="4527" instrument_node="">Nazi Germany</span></a><span data-dcnode-id="4525" instrument_node="">, a few members of other small pacifist religious groups were also included.</span><sup class="reference" data-dcnode-id="4522" id="cite_ref-121"><a data-dcnode-id="4523" href="#cite_note-121"><span data-dcnode-id="4524" instrument_node="">[121]</span></a></sup><sup class="reference" data-dcnode-id="4519" id="cite_ref-122"><a data-dcnode-id="4520" href="#cite_note-122"><span data-dcnode-id="4521" instrument_node="">[122]</span></a></sup><sup class="reference" data-dcnode-id="4516" id="cite_ref-123"><a data-dcnode-id="4517" href="#cite_note-123"><span data-dcnode-id="4518" instrument_node="">[123]</span></a></sup><span data-dcnode-id="4515" instrument_node="">
</span></p><p data-dcnode-id="4495"><span data-dcnode-id="4513" instrument_node="">The French Christian pacifists André and Magda Trocmé helped conceal hundreds of Jews fleeing the Nazis in the village of </span><a data-dcnode-id="4511" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Le_Chambon-sur-Lignon" title="Le Chambon-sur-Lignon"><span data-dcnode-id="4512" instrument_node="">Le Chambon-sur-Lignon</span></a><span data-dcnode-id="4510" instrument_node="">.</span><sup class="reference" data-dcnode-id="4507" id="cite_ref-pph_124-0"><a data-dcnode-id="4508" href="#cite_note-pph-124"><span data-dcnode-id="4509" instrument_node="">[124]</span></a></sup><sup class="reference" data-dcnode-id="4504" id="cite_ref-125"><a data-dcnode-id="4505" href="#cite_note-125"><span data-dcnode-id="4506" instrument_node="">[125]</span></a></sup><span data-dcnode-id="4503" instrument_node=""> After the war, the Trocmés were declared </span><a data-dcnode-id="4501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Righteous_Among_the_Nations" title="Righteous Among the Nations"><span data-dcnode-id="4502" instrument_node="">Righteous Among the Nations</span></a><span data-dcnode-id="4500" instrument_node="">.</span><sup class="reference" data-dcnode-id="4497" id="cite_ref-pph_124-1"><a data-dcnode-id="4498" href="#cite_note-pph-124"><span data-dcnode-id="4499" instrument_node="">[124]</span></a></sup><span data-dcnode-id="4496" instrument_node="">
</span></p><p data-dcnode-id="4457"><span data-dcnode-id="4494" instrument_node="">The radical Christian </span><a class="mw-redirect" data-dcnode-id="4492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pacifist" title="Pacifist"><span data-dcnode-id="4493" instrument_node="">pacifist</span></a><sup class="reference" data-dcnode-id="4489" id="cite_ref-126"><a data-dcnode-id="4490" href="#cite_note-126"><span data-dcnode-id="4491" instrument_node="">[126]</span></a></sup><span data-dcnode-id="4488" instrument_node=""> </span><a data-dcnode-id="4486" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Middleton_Murry" title="John Middleton Murry"><span data-dcnode-id="4487" instrument_node="">John Middleton Murry</span></a><span data-dcnode-id="4485" instrument_node="">, changed his opinions on Christian pacifism in light of the </span><a class="mw-redirect" data-dcnode-id="4483" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Holocaust" title="Holocaust"><span data-dcnode-id="4484" instrument_node="">Holocaust</span></a><span data-dcnode-id="4482" instrument_node="">. In his early years as a writer of </span><i data-dcnode-id="4480"><span data-dcnode-id="4481" instrument_node="">The Necessity of Pacifism</span></i><span data-dcnode-id="4479" instrument_node=""> (1937) and as editor of the weekly London newspaper, </span><i data-dcnode-id="4476"><a data-dcnode-id="4477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peace_News" title="Peace News"><span data-dcnode-id="4478" instrument_node="">Peace News</span></a></i><span data-dcnode-id="4475" instrument_node="">, he argued that Nazi Germany, should be allowed retain control of mainland Europe, arguing Nazism was a lesser evil compared to the horrors of a </span><a data-dcnode-id="4473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Total_war" title="Total war"><span data-dcnode-id="4474" instrument_node="">total war</span></a><span data-dcnode-id="4472" instrument_node="">.</span><sup class="reference" data-dcnode-id="4469" id="cite_ref-jomh_127-0"><a data-dcnode-id="4470" href="#cite_note-jomh-127"><span data-dcnode-id="4471" instrument_node="">[127]</span></a></sup><sup class="reference" data-dcnode-id="4466" id="cite_ref-128"><a data-dcnode-id="4467" href="#cite_note-128"><span data-dcnode-id="4468" instrument_node="">[128]</span></a></sup><span data-dcnode-id="4465" instrument_node=""> Later, he recanted his pacifism in 1948 and promoted a preventative war against the </span><a data-dcnode-id="4463" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_Union" title="Soviet Union"><span data-dcnode-id="4464" instrument_node="">Soviet Union</span></a><span data-dcnode-id="4462" instrument_node="">.</span><sup class="reference" data-dcnode-id="4459" id="cite_ref-129"><a data-dcnode-id="4460" href="#cite_note-129"><span data-dcnode-id="4461" instrument_node="">[129]</span></a></sup><span data-dcnode-id="4458" instrument_node="">
</span></p><p data-dcnode-id="4387"><span data-dcnode-id="4456" instrument_node="">During </span><a data-dcnode-id="4454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Holocaust_in_Bulgaria" title="The Holocaust in Bulgaria"><span data-dcnode-id="4455" instrument_node="">the Holocaust in Bulgaria</span></a><span data-dcnode-id="4453" instrument_node="">, protests by Bulgarian public figures, among them Bulgarian Orthodox Church bishops </span><a data-dcnode-id="4451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stefan_I_of_Bulgaria" title="Stefan I of Bulgaria"><span data-dcnode-id="4452" instrument_node="">Stefan of Sofia</span></a><span data-dcnode-id="4450" instrument_node=""> and </span><a data-dcnode-id="4448" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cyril_of_Bulgaria" title="Cyril of Bulgaria"><span data-dcnode-id="4449" instrument_node="">Kiril of Plovdiv</span></a><span data-dcnode-id="4447" instrument_node="">, leaders of professional organisations, and others&nbsp;–  persuaded the Tsar first to stop the deportation of Jews temporarily in March 1943, and two months later to postpone it indefinitely.</span><sup class="reference" data-dcnode-id="4444" id="cite_ref-ragaru2_130-0"><a data-dcnode-id="4445" href="#cite_note-ragaru2-130"><span data-dcnode-id="4446" instrument_node="">[130]</span></a></sup><sup class="reference" data-dcnode-id="4441" id="cite_ref-131"><a data-dcnode-id="4442" href="#cite_note-131"><span data-dcnode-id="4443" instrument_node="">[131]</span></a></sup><sup class="reference" data-dcnode-id="4438" id="cite_ref-132"><a data-dcnode-id="4439" href="#cite_note-132"><span data-dcnode-id="4440" instrument_node="">[132]</span></a></sup><span data-dcnode-id="4437" instrument_node=""> The Jews whose deportation from Bulgaria was halted, including all </span><a data-dcnode-id="4435" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sofia" title="Sofia"><span data-dcnode-id="4436" instrument_node="">Sofia's</span></a><span data-dcnode-id="4434" instrument_node=""> 25,743 Jews,</span><sup class="reference" data-dcnode-id="4431" id="cite_ref-133"><a data-dcnode-id="4432" href="#cite_note-133"><span data-dcnode-id="4433" instrument_node="">[133]</span></a></sup><sup class="reference" data-dcnode-id="4428" id="cite_ref-:22_134-0"><a data-dcnode-id="4429" href="#cite_note-:22-134"><span data-dcnode-id="4430" instrument_node="">[134]</span></a></sup><span data-dcnode-id="4427" instrument_node=""> nonetheless had their property confiscated,</span><sup class="reference" data-dcnode-id="4424" id="cite_ref-135"><a data-dcnode-id="4425" href="#cite_note-135"><span data-dcnode-id="4426" instrument_node="">[135]</span></a></sup><sup class="reference" data-dcnode-id="4421" id="cite_ref-:32_136-0"><a data-dcnode-id="4422" href="#cite_note-:32-136"><span data-dcnode-id="4423" instrument_node="">[136]</span></a></sup><sup class="reference" data-dcnode-id="4418" id="cite_ref-:12_137-0"><a data-dcnode-id="4419" href="#cite_note-:12-137"><span data-dcnode-id="4420" instrument_node="">[137]</span></a></sup><span data-dcnode-id="4417" instrument_node=""> were forcibly relocated within the country, and all Jewish males between the ages of 20 and 46 were conscripted into the </span><a class="mw-redirect" data-dcnode-id="4415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Construction_Troops_%28Bulgaria%29" title="Construction Troops (Bulgaria)"><span data-dcnode-id="4416" instrument_node="">Labour Corps</span></a><span data-dcnode-id="4414" instrument_node=""> until September 1944.</span><sup class="reference" data-dcnode-id="4411" id="cite_ref-138"><a data-dcnode-id="4412" href="#cite_note-138"><span data-dcnode-id="4413" instrument_node="">[138]</span></a></sup><sup class="reference" data-dcnode-id="4408" id="cite_ref-:02_139-0"><a data-dcnode-id="4409" href="#cite_note-:02-139"><span data-dcnode-id="4410" instrument_node="">[139]</span></a></sup><sup class="reference" data-dcnode-id="4405" id="cite_ref-:12_137-1"><a data-dcnode-id="4406" href="#cite_note-:12-137"><span data-dcnode-id="4407" instrument_node="">[137]</span></a></sup><sup class="reference" data-dcnode-id="4402" id="cite_ref-:32_136-1"><a data-dcnode-id="4403" href="#cite_note-:32-136"><span data-dcnode-id="4404" instrument_node="">[136]</span></a></sup><span data-dcnode-id="4401" instrument_node=""> The events that prevented the deportation to </span><a data-dcnode-id="4399" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Extermination_camp" title="Extermination camp"><span data-dcnode-id="4400" instrument_node="">extermination camps</span></a><span data-dcnode-id="4398" instrument_node=""> of about 48,000</span><sup class="reference" data-dcnode-id="4395" id="cite_ref-140"><a data-dcnode-id="4396" href="#cite_note-140"><span data-dcnode-id="4397" instrument_node="">[140]</span></a></sup><span data-dcnode-id="4394" instrument_node=""> Jews in spring 1943 are termed the </span><b data-dcnode-id="4392"><span data-dcnode-id="4393" instrument_node="">Rescue of the Bulgarian Jews</span></b><span data-dcnode-id="4391" instrument_node="">. Although most Jews who were deported were murdered, the survival rate of the Jewish population in Bulgaria was one of the highest in </span><a data-dcnode-id="4389" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Axis_powers" title="Axis powers"><span data-dcnode-id="4390" instrument_node="">Axis</span></a><span data-dcnode-id="4388" instrument_node=""> Europe.
</span></p><p data-dcnode-id="4342"><a data-dcnode-id="4385" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vera_Brittain" title="Vera Brittain"><span data-dcnode-id="4386" instrument_node="">Vera Brittain</span></a><span data-dcnode-id="4384" instrument_node=""> was another British Christian pacifist. She worked as a </span><a data-dcnode-id="4382" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Civil_Defence_Service" title="Civil Defence Service"><span data-dcnode-id="4383" instrument_node="">fire warden</span></a><span data-dcnode-id="4381" instrument_node=""> and by travelling around the country raising funds for the </span><a data-dcnode-id="4379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peace_Pledge_Union" title="Peace Pledge Union"><span data-dcnode-id="4380" instrument_node="">Peace Pledge Union</span></a><span data-dcnode-id="4378" instrument_node="">'s food relief campaign. She was vilified for speaking out against the </span><a data-dcnode-id="4376" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Area_bombardment" title="Area bombardment"><span data-dcnode-id="4377" instrument_node="">saturation bombing</span></a><span data-dcnode-id="4375" instrument_node=""> of German cities through her 1944 booklet </span><i data-dcnode-id="4373"><span data-dcnode-id="4374" instrument_node="">Massacre by Bombing</span></i><span data-dcnode-id="4372" instrument_node="">. Her principled pacifist position was vindicated somewhat when, in 1945, the </span><a data-dcnode-id="4370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nazi_Germany" title="Nazi Germany"><span data-dcnode-id="4371" instrument_node="">Nazi's</span></a><span data-dcnode-id="4369" instrument_node=""> </span><a data-dcnode-id="4367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Black_Book_%28list%29" title="The Black Book (list)"><span data-dcnode-id="4368" instrument_node="">Black Book</span></a><span data-dcnode-id="4366" instrument_node=""> of 2000 people to be immediately arrested in Britain after a </span><a data-dcnode-id="4364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Operation_Sea_Lion" title="Operation Sea Lion"><span data-dcnode-id="4365" instrument_node="">German invasion</span></a><span data-dcnode-id="4363" instrument_node=""> was shown to include her name.</span><sup class="reference" data-dcnode-id="4360" id="cite_ref-141"><a data-dcnode-id="4361" href="#cite_note-141"><span data-dcnode-id="4362" instrument_node="">[141]</span></a></sup><span data-dcnode-id="4359" instrument_node=""> After the war, Brittain worked for </span><i data-dcnode-id="4357"><span data-dcnode-id="4358" instrument_node="">Peace News</span></i><span data-dcnode-id="4356" instrument_node=""> magazine, "writing articles against </span><a data-dcnode-id="4354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Apartheid" title="Apartheid"><span data-dcnode-id="4355" instrument_node="">apartheid</span></a><span data-dcnode-id="4353" instrument_node=""> and </span><a data-dcnode-id="4351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Colonialism" title="Colonialism"><span data-dcnode-id="4352" instrument_node="">colonialism</span></a><span data-dcnode-id="4350" instrument_node=""> and in favour of </span><a data-dcnode-id="4348" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nuclear_disarmament" title="Nuclear disarmament"><span data-dcnode-id="4349" instrument_node="">nuclear disarmament</span></a><span data-dcnode-id="4347" instrument_node="">" from a Christian perspective.</span><sup class="reference" data-dcnode-id="4344" id="cite_ref-142"><a data-dcnode-id="4345" href="#cite_note-142"><span data-dcnode-id="4346" instrument_node="">[142]</span></a></sup><span data-dcnode-id="4343" instrument_node="">
</span></p><span data-dcnode-id="4341" instrument_node="">
</span><h3 data-dcnode-id="4331"><span class="mw-headline" data-dcnode-id="4339" id="Post-Second_World_War"><span data-dcnode-id="4340" instrument_node="">Post-Second World War</span></span><span class="mw-editsection" data-dcnode-id="4332"><span class="mw-editsection-bracket" data-dcnode-id="4337"><span data-dcnode-id="4338" instrument_node="">[</span></span><a data-dcnode-id="4335" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DChristian_pacifism%26action%3Dedit%26section%3D31" title="Edit section: Post-Second World War"><span data-dcnode-id="4336" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4333"><span data-dcnode-id="4334" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4330" instrument_node="">
</span><p data-dcnode-id="4302"><span data-dcnode-id="4329" instrument_node="">Having been inspired by the </span><a data-dcnode-id="4327" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sermon_on_the_Mount" title="Sermon on the Mount"><span data-dcnode-id="4328" instrument_node="">Sermon on the Mount</span></a><span data-dcnode-id="4326" instrument_node="">, </span><a data-dcnode-id="4324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Thomas_%28activist%29" title="Thomas (activist)"><span data-dcnode-id="4325" instrument_node="">Thomas</span></a><span data-dcnode-id="4323" instrument_node=""> launched the </span><a data-dcnode-id="4321" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/White_House_Peace_Vigil" title="White House Peace Vigil"><span data-dcnode-id="4322" instrument_node="">White House Peace Vigil</span></a><span data-dcnode-id="4320" instrument_node=""> in 1981; the longest running peace vigil in US history.</span><sup class="reference" data-dcnode-id="4317" id="cite_ref-grove_143-0"><a data-dcnode-id="4318" href="#cite_note-grove-143"><span data-dcnode-id="4319" instrument_node="">[143]</span></a></sup><span data-dcnode-id="4316" instrument_node=""> Over the years, he was joined by numerous </span><a data-dcnode-id="4314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anti-war_movement" title="Anti-war movement"><span data-dcnode-id="4315" instrument_node="">anti-war</span></a><span data-dcnode-id="4313" instrument_node=""> activists including those from the </span><a data-dcnode-id="4311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Catholic_Worker_Movement" title="Catholic Worker Movement"><span data-dcnode-id="4312" instrument_node="">Catholic Worker Movement</span></a><span data-dcnode-id="4310" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="4308" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Plowshares_Movement" title="Plowshares Movement"><span data-dcnode-id="4309" instrument_node="">Plowshares Movement</span></a><span data-dcnode-id="4307" instrument_node="">.</span><sup class="reference" data-dcnode-id="4304" id="cite_ref-144"><a data-dcnode-id="4305" href="#cite_note-144"><span data-dcnode-id="4306" instrument_node="">[144]</span></a></sup><span data-dcnode-id="4303" instrument_node="">
</span></p><p data-dcnode-id="4275"><span data-dcnode-id="4301" instrument_node="">Jehovah's Witness members have been imprisoned in many countries for their refusal of </span><a data-dcnode-id="4299" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Conscription" title="Conscription"><span data-dcnode-id="4300" instrument_node="">conscription</span></a><span data-dcnode-id="4298" instrument_node=""> or compulsory </span><a data-dcnode-id="4296" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Military_service" title="Military service"><span data-dcnode-id="4297" instrument_node="">military service</span></a><span data-dcnode-id="4295" instrument_node="">. Their religious activities are banned or restricted in some countries, including </span><a data-dcnode-id="4293" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Singapore" title="Singapore"><span data-dcnode-id="4294" instrument_node="">Singapore</span></a><span data-dcnode-id="4292" instrument_node="">, </span><a data-dcnode-id="4290" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/China" title="China"><span data-dcnode-id="4291" instrument_node="">China</span></a><span data-dcnode-id="4289" instrument_node="">, </span><a data-dcnode-id="4287" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vietnam" title="Vietnam"><span data-dcnode-id="4288" instrument_node="">Vietnam</span></a><span data-dcnode-id="4286" instrument_node="">, </span><a data-dcnode-id="4284" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russia" title="Russia"><span data-dcnode-id="4285" instrument_node="">Russia</span></a><span data-dcnode-id="4283" instrument_node=""> and many </span><a data-dcnode-id="4281" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Muslim_world" title="Muslim world"><span data-dcnode-id="4282" instrument_node="">Muslim-majority countries</span></a><span data-dcnode-id="4280" instrument_node="">.</span><sup class="reference" data-dcnode-id="4277" id="cite_ref-145"><a data-dcnode-id="4278" href="#cite_note-145"><span data-dcnode-id="4279" instrument_node="">[145]</span></a></sup><span data-dcnode-id="4276" instrument_node="">
</span></p><p data-dcnode-id="4225"><span data-dcnode-id="4274" instrument_node="">In 2017, the </span><a data-dcnode-id="4272" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Methodism" title="Methodism"><span data-dcnode-id="4273" instrument_node="">Methodist</span></a><span data-dcnode-id="4271" instrument_node=""> </span><a data-dcnode-id="4269" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Minister_%28Christianity%29" title="Minister (Christianity)"><span data-dcnode-id="4270" instrument_node="">minister</span></a><span data-dcnode-id="4268" instrument_node=""> Dan Woodhouse and the </span><a data-dcnode-id="4266" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Quakers" title="Quakers"><span data-dcnode-id="4267" instrument_node="">Quaker</span></a><span data-dcnode-id="4265" instrument_node=""> </span><a data-dcnode-id="4263" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sam_Walton_%28peace_activist%29" title="Sam Walton (peace activist)"><span data-dcnode-id="4264" instrument_node="">Sam Walton</span></a><span data-dcnode-id="4262" instrument_node=""> entered the </span><a data-dcnode-id="4260" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/BAE_Systems" title="BAE Systems"><span data-dcnode-id="4261" instrument_node="">British Aerospace</span></a><span data-dcnode-id="4259" instrument_node=""> </span><a data-dcnode-id="4257" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Warton_Aerodrome" title="Warton Aerodrome"><span data-dcnode-id="4258" instrument_node="">Warton Aerodrome site</span></a><span data-dcnode-id="4256" instrument_node=""> to try to disarm </span><a data-dcnode-id="4254" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eurofighter_Typhoon" title="Eurofighter Typhoon"><span data-dcnode-id="4255" instrument_node="">Typhoon fighter jets</span></a><span data-dcnode-id="4253" instrument_node=""> bound for Saudi Arabia. They targeted these jets because they would be used in </span><a data-dcnode-id="4251" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Saudi_Arabian-led_intervention_in_Yemen" title="Saudi Arabian-led intervention in Yemen"><span data-dcnode-id="4252" instrument_node="">Saudi Arabia's bombing campaign of Yemen</span></a><span data-dcnode-id="4250" instrument_node="">. They were arrested before they were able to do any damage.</span><sup class="reference" data-dcnode-id="4247" id="cite_ref-Indep2017_146-0"><a data-dcnode-id="4248" href="#cite_note-Indep2017-146"><span data-dcnode-id="4249" instrument_node="">[146]</span></a></sup><span data-dcnode-id="4246" instrument_node=""> This was the same BAE systems site in which the </span><a data-dcnode-id="4244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Seeds_of_Hope" title="Seeds of Hope"><span data-dcnode-id="4245" instrument_node="">Seeds of Hope</span></a><span data-dcnode-id="4243" instrument_node=""> group of the </span><a data-dcnode-id="4241" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Plowshares_movement" title="Plowshares movement"><span data-dcnode-id="4242" instrument_node="">Plowshares movement</span></a><span data-dcnode-id="4240" instrument_node=""> damaged a </span><a class="mw-redirect" data-dcnode-id="4238" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/BAE_Hawk" title="BAE Hawk"><span data-dcnode-id="4239" instrument_node="">Hawk fighter jet</span></a><span data-dcnode-id="4237" instrument_node=""> in 1996.</span><sup class="reference" data-dcnode-id="4234" id="cite_ref-Indep2017_146-1"><a data-dcnode-id="4235" href="#cite_note-Indep2017-146"><span data-dcnode-id="4236" instrument_node="">[146]</span></a></sup><span data-dcnode-id="4233" instrument_node="">  They appeared in court facing charges of criminal damage in October 2017 and were both found not guilty.</span><sup class="reference" data-dcnode-id="4230" id="cite_ref-147"><a data-dcnode-id="4231" href="#cite_note-147"><span data-dcnode-id="4232" instrument_node="">[147]</span></a></sup><sup class="reference" data-dcnode-id="4227" id="cite_ref-148"><a data-dcnode-id="4228" href="#cite_note-148"><span data-dcnode-id="4229" instrument_node="">[148]</span></a></sup><span data-dcnode-id="4226" instrument_node="">
</span></p><span data-dcnode-id="4224" instrument_node="">
</span><h3 data-dcnode-id="4214"><span class="mw-headline" data-dcnode-id="4222" id="War_tax_resistance"><span data-dcnode-id="4223" instrument_node="">War tax resistance</span></span><span class="mw-editsection" data-dcnode-id="4215"><span class="mw-editsection-bracket" data-dcnode-id="4220"><span data-dcnode-id="4221" instrument_node="">[</span></span><a data-dcnode-id="4218" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DChristian_pacifism%26action%3Dedit%26section%3D32" title="Edit section: War tax resistance"><span data-dcnode-id="4219" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4216"><span data-dcnode-id="4217" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4213" instrument_node="">
</span><link data-dcnode-id="4212" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="4192"><p data-dcnode-id="4201"><a data-dcnode-id="4210" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Demon" title="Demon"><span data-dcnode-id="4211" instrument_node="">Demons</span></a><span data-dcnode-id="4209" instrument_node=""> are the </span><a class="mw-redirect" data-dcnode-id="4207" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Magistrates" title="Magistrates"><span data-dcnode-id="4208" instrument_node="">magistrates</span></a><span data-dcnode-id="4206" instrument_node=""> of this world: they bear the </span><i data-dcnode-id="4203"><a data-dcnode-id="4204" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fasces" title="Fasces"><span data-dcnode-id="4205" instrument_node="">fasces</span></a></i><span data-dcnode-id="4202" instrument_node="">.</span></p><div class="templatequotecite" data-dcnode-id="4193"><span data-dcnode-id="4200" instrument_node="">— </span><cite data-dcnode-id="4194"><a data-dcnode-id="4198" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tertullian" title="Tertullian"><span data-dcnode-id="4199" instrument_node="">Tertullian</span></a><sup class="reference" data-dcnode-id="4195" id="cite_ref-149"><a data-dcnode-id="4196" href="#cite_note-149"><span data-dcnode-id="4197" instrument_node="">[149]</span></a></sup></cite></div></blockquote><span data-dcnode-id="4191" instrument_node="">
</span><p data-dcnode-id="4166"><span data-dcnode-id="4190" instrument_node="">Opposition to war has led some, like </span><a data-dcnode-id="4188" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ammon_Hennacy" title="Ammon Hennacy"><span data-dcnode-id="4189" instrument_node="">Ammon Hennacy</span></a><span data-dcnode-id="4187" instrument_node="">, to a form of </span><a data-dcnode-id="4185" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tax_resistance" title="Tax resistance"><span data-dcnode-id="4186" instrument_node="">tax resistance</span></a><span data-dcnode-id="4184" instrument_node=""> in which they reduce their income below the </span><a data-dcnode-id="4182" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Income_tax_threshold" title="Income tax threshold"><span data-dcnode-id="4183" instrument_node="">tax threshold</span></a><span data-dcnode-id="4181" instrument_node=""> by taking up a </span><a data-dcnode-id="4179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Simple_living" title="Simple living"><span data-dcnode-id="4180" instrument_node="">simple living</span></a><span data-dcnode-id="4178" instrument_node=""> lifestyle.</span><sup class="reference" data-dcnode-id="4175" id="cite_ref-150"><a data-dcnode-id="4176" href="#cite_note-150"><span data-dcnode-id="4177" instrument_node="">[150]</span></a></sup><sup class="reference" data-dcnode-id="4172" id="cite_ref-NWTRCC_151-0"><a data-dcnode-id="4173" href="#cite_note-NWTRCC-151"><span data-dcnode-id="4174" instrument_node="">[151]</span></a></sup><span data-dcnode-id="4171" instrument_node=""> These individuals believe that their government is engaged in immoral, unethical or destructive activities such as war, and paying taxes inevitably funds these activities.</span><sup class="reference" data-dcnode-id="4168" id="cite_ref-152"><a data-dcnode-id="4169" href="#cite_note-152"><span data-dcnode-id="4170" instrument_node="">[152]</span></a></sup><span data-dcnode-id="4167" instrument_node="">
