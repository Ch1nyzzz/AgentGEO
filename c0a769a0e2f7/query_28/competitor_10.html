</span><div class="thumb tright" data-dcnode-id="8421"><div class="thumbinner" data-dcnode-id="8422" style="width:172px;"><a class="image" data-dcnode-id="8434" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ABerruguete_ordeal.jpg"><img alt="" class="thumbimage" data-dcnode-id="8435" data-file-height="3071" data-file-width="1982" decoding="async" height="263" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/0/04/Berruguete_ordeal.jpg/170px-Berruguete_ordeal.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/0/04/Berruguete_ordeal.jpg/255px-Berruguete_ordeal.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/0/04/Berruguete_ordeal.jpg/340px-Berruguete_ordeal.jpg 2x" width="170"></a><span data-dcnode-id="8433" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="8423"><div class="magnify" data-dcnode-id="8431"><a class="internal" data-dcnode-id="8432" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ABerruguete_ordeal.jpg" title="Enlarge"></a></div><span data-dcnode-id="8430" instrument_node="">Painting by </span><a data-dcnode-id="8428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pedro_Berruguete" title="Pedro Berruguete"><span data-dcnode-id="8429" instrument_node="">Pedro Berruguete</span></a><span data-dcnode-id="8427" instrument_node=""> portraying the story of a disputation between </span><a data-dcnode-id="8425" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Saint_Dominic" title="Saint Dominic"><span data-dcnode-id="8426" instrument_node="">Saint Dominic</span></a><span data-dcnode-id="8424" instrument_node=""> and the Cathars (Albigensians), in which the books of both were thrown on a fire and Dominic's books were miraculously preserved from the flames.</span></div></div></div><span data-dcnode-id="8420" instrument_node="">
</span><p data-dcnode-id="8355"><a data-dcnode-id="8418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Catharism" title="Catharism"><span data-dcnode-id="8419" instrument_node="">Catharism</span></a><span data-dcnode-id="8417" instrument_node=""> was a Christian </span><a class="mw-redirect" data-dcnode-id="8415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dualistic_cosmology" title="Dualistic cosmology"><span data-dcnode-id="8416" instrument_node="">dualist</span></a><span data-dcnode-id="8414" instrument_node=""> or </span><a data-dcnode-id="8412" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gnosticism" title="Gnosticism"><span data-dcnode-id="8413" instrument_node="">Gnostic</span></a><span data-dcnode-id="8411" instrument_node=""> movement between the 12th and 14th centuries which thrived in </span><a data-dcnode-id="8409" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Southern_Europe" title="Southern Europe"><span data-dcnode-id="8410" instrument_node="">Southern Europe</span></a><span data-dcnode-id="8408" instrument_node="">, particularly in </span><a data-dcnode-id="8406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Northern_Italy" title="Northern Italy"><span data-dcnode-id="8407" instrument_node="">northern Italy</span></a><span data-dcnode-id="8405" instrument_node=""> and </span><a data-dcnode-id="8403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Southern_France" title="Southern France"><span data-dcnode-id="8404" instrument_node="">southern France</span></a><span data-dcnode-id="8402" instrument_node="">. Followers were described as Cathars and referred to themselves as Good Christians, and are now mainly remembered for a prolonged period of persecution by the </span><a data-dcnode-id="8400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Catholic_Church" title="Catholic Church"><span data-dcnode-id="8401" instrument_node="">Catholic Church</span></a><span data-dcnode-id="8399" instrument_node="">, which did not recognize their unorthodox Christianity. Catharism arrived in Western Europe in the </span><a data-dcnode-id="8397" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Languedoc" title="Languedoc"><span data-dcnode-id="8398" instrument_node="">Languedoc</span></a><span data-dcnode-id="8396" instrument_node=""> region of France in the 11th century.</span><sup class="reference" data-dcnode-id="8393" id="cite_ref-55"><a data-dcnode-id="8394" href="#cite_note-55"><span data-dcnode-id="8395" instrument_node="">[55]</span></a></sup><span data-dcnode-id="8392" instrument_node=""> While most information concerning Cathar belief was written by their accusers, and therefore may be inaccurate, purportedly they were strict pacifists and rigorous </span><a class="mw-redirect" data-dcnode-id="8390" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ascetics" title="Ascetics"><span data-dcnode-id="8391" instrument_node="">ascetics</span></a><span data-dcnode-id="8389" instrument_node="">, abjuring war, killing, lying, swearing, and carnal relations in accordance with their understanding of the </span><a data-dcnode-id="8387" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gospel" title="Gospel"><span data-dcnode-id="8388" instrument_node="">Gospel</span></a><span data-dcnode-id="8386" instrument_node="">. Allegedly rejecting the Old Testament, Cathars despised dogmatic elements of Christianity, while their Priests (</span><a data-dcnode-id="8384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cathar_Perfect" title="Cathar Perfect"><span data-dcnode-id="8385" instrument_node="">Perfects</span></a><span data-dcnode-id="8383" instrument_node="">) subsisted on a diet of little more than vegetables cooked in oil, or fish not a product of sexual union.</span><sup class="reference" data-dcnode-id="8380" id="cite_ref-56"><a data-dcnode-id="8381" href="#cite_note-56"><span data-dcnode-id="8382" instrument_node="">[56]</span></a></sup><sup class="reference" data-dcnode-id="8377" id="cite_ref-Preece_2008_57-0"><a data-dcnode-id="8378" href="#cite_note-Preece_2008-57"><span data-dcnode-id="8379" instrument_node="">[57]</span></a></sup><span data-dcnode-id="8376" instrument_node=""> </span><span data-dcnode-id="8370" title="Latin-language text"><i data-dcnode-id="8371" lang="la"><span data-dcnode-id="8375" instrument_node="">"</span><a data-dcnode-id="8373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Caedite_eos._Novit_enim_Dominus_qui_sunt_eius." title="Caedite eos. Novit enim Dominus qui sunt eius."><span data-dcnode-id="8374" instrument_node="">Caedite eos. Novit enim Dominus qui sunt eius.</span></a><span data-dcnode-id="8372" instrument_node="">"</span></i></span><span data-dcnode-id="8369" instrument_node=""> is a phrase reportedly spoken by the commander of the </span><a data-dcnode-id="8367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Albigensian_Crusade" title="Albigensian Crusade"><span data-dcnode-id="8368" instrument_node="">Albigensian Crusade</span></a><span data-dcnode-id="8366" instrument_node="">, prior to the </span><a data-dcnode-id="8364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Massacre_at_B%25C3%25A9ziers" title="Massacre at Béziers"><span data-dcnode-id="8365" instrument_node="">massacre at Béziers</span></a><span data-dcnode-id="8363" instrument_node=""> on 22 July 1209.</span><sup class="reference" data-dcnode-id="8360" id="cite_ref-McDonald_58-0"><a data-dcnode-id="8361" href="#cite_note-McDonald-58"><span data-dcnode-id="8362" instrument_node="">[58]</span></a></sup><span data-dcnode-id="8359" instrument_node=""> A direct translation of the </span><a data-dcnode-id="8357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Medieval_Latin" title="Medieval Latin"><span data-dcnode-id="8358" instrument_node="">Medieval Latin</span></a><span data-dcnode-id="8356" instrument_node=""> phrase is "Kill them. The Lord knows those that are his own."
</span></p><span data-dcnode-id="8354" instrument_node="">
</span><h3 data-dcnode-id="8344"><span class="mw-headline" data-dcnode-id="8352" id="Lollardy"><span data-dcnode-id="8353" instrument_node="">Lollardy</span></span><span class="mw-editsection" data-dcnode-id="8345"><span class="mw-editsection-bracket" data-dcnode-id="8350"><span data-dcnode-id="8351" instrument_node="">[</span></span><a data-dcnode-id="8348" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DChristian_pacifism%26action%3Dedit%26section%3D8" title="Edit section: Lollardy"><span data-dcnode-id="8349" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8346"><span data-dcnode-id="8347" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8343" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="8331"><div class="thumbinner" data-dcnode-id="8332" style="width:222px;"><a class="image" data-dcnode-id="8341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AWycliffeYeamesLollards_01.jpg"><img alt="" class="thumbimage" data-dcnode-id="8342" data-file-height="900" data-file-width="1200" decoding="async" height="165" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/4/4f/WycliffeYeamesLollards_01.jpg/220px-WycliffeYeamesLollards_01.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/4/4f/WycliffeYeamesLollards_01.jpg/330px-WycliffeYeamesLollards_01.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/4/4f/WycliffeYeamesLollards_01.jpg/440px-WycliffeYeamesLollards_01.jpg 2x" width="220"></a><span data-dcnode-id="8340" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="8333"><div class="magnify" data-dcnode-id="8338"><a class="internal" data-dcnode-id="8339" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AWycliffeYeamesLollards_01.jpg" title="Enlarge"></a></div><span data-dcnode-id="8337" instrument_node="">In this 19th-century illustration, </span><a data-dcnode-id="8335" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Wycliffe" title="John Wycliffe"><span data-dcnode-id="8336" instrument_node="">John Wycliffe</span></a><span data-dcnode-id="8334" instrument_node=""> is shown giving the Bible translation that bore his name to his Lollard followers.</span></div></div></div><span data-dcnode-id="8330" instrument_node="">
</span><p data-dcnode-id="8323"><a class="mw-redirect" data-dcnode-id="8328" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Twelve_Conclusions_of_the_Lollards" title="The Twelve Conclusions of the Lollards"><span data-dcnode-id="8329" instrument_node="">The Twelve Conclusions of the Lollards</span></a><span data-dcnode-id="8327" instrument_node="">, a 1395 document of </span><a data-dcnode-id="8325" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lollardy" title="Lollardy"><span data-dcnode-id="8326" instrument_node="">Lollardy</span></a><span data-dcnode-id="8324" instrument_node="">, asserts that Christians should refrain from warfare, and in particular that wars given religious justifications, such as crusades, are blasphemous because Christ taught men to love and forgive their enemies.
</span></p><span data-dcnode-id="8322" instrument_node="">
</span><h3 data-dcnode-id="8312"><span class="mw-headline" data-dcnode-id="8320" id="Post-Reformation"><span data-dcnode-id="8321" instrument_node="">Post-Reformation</span></span><span class="mw-editsection" data-dcnode-id="8313"><span class="mw-editsection-bracket" data-dcnode-id="8318"><span data-dcnode-id="8319" instrument_node="">[</span></span><a data-dcnode-id="8316" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DChristian_pacifism%26action%3Dedit%26section%3D9" title="Edit section: Post-Reformation"><span data-dcnode-id="8317" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8314"><span data-dcnode-id="8315" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8311" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="8298"><div class="thumbinner" data-dcnode-id="8299" style="width:172px;"><a class="image" data-dcnode-id="8309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AChel%25C4%258Dice_%287%29.jpg"><img alt="" class="thumbimage" data-dcnode-id="8310" data-file-height="3872" data-file-width="2592" decoding="async" height="254" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/3/30/Chel%25C4%258Dice_%287%29.jpg/170px-Chel%25C4%258Dice_%287%29.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/3/30/Chel%C4%8Dice_%287%29.jpg/255px-Chel%C4%8Dice_%287%29.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/3/30/Chel%C4%8Dice_%287%29.jpg/340px-Chel%C4%8Dice_%287%29.jpg 2x" width="170"></a><span data-dcnode-id="8308" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="8300"><div class="magnify" data-dcnode-id="8306"><a class="internal" data-dcnode-id="8307" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AChel%25C4%258Dice_%287%29.jpg" title="Enlarge"></a></div><a data-dcnode-id="8304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Petr_Chel%25C4%258Dick%25C3%25BD" title="Petr Chelčický"><span data-dcnode-id="8305" instrument_node="">Petr Chelčický's</span></a><span data-dcnode-id="8303" instrument_node=""> statue in </span><a data-dcnode-id="8301" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chel%25C4%258Dice" title="Chelčice"><span data-dcnode-id="8302" instrument_node="">Chelčice</span></a></div></div></div><span data-dcnode-id="8297" instrument_node="">
</span><p data-dcnode-id="8269"><span data-dcnode-id="8296" instrument_node="">As early as 1420, </span><a data-dcnode-id="8294" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Petr_Chel%25C4%258Dick%25C3%25BD" title="Petr Chelčický"><span data-dcnode-id="8295" instrument_node="">Petr Chelčický</span></a><span data-dcnode-id="8293" instrument_node=""> taught that violence should not be used in religious matters.</span><sup class="reference" data-dcnode-id="8290" id="cite_ref-59"><a data-dcnode-id="8291" href="#cite_note-59"><span data-dcnode-id="8292" instrument_node="">[59]</span></a></sup><span data-dcnode-id="8289" instrument_node=""> Chelčický used the </span><a class="mw-redirect" data-dcnode-id="8287" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Parable_of_the_Weeds" title="Parable of the Weeds"><span data-dcnode-id="8288" instrument_node="">parable of the wheat and the tares</span></a><sup class="reference" data-dcnode-id="8284" id="cite_ref-60"><a data-dcnode-id="8285" href="#cite_note-60"><span data-dcnode-id="8286" instrument_node="">[60]</span></a></sup><span data-dcnode-id="8283" instrument_node=""> (Matthew 13:24–30)</span><sup class="reference" data-dcnode-id="8280" id="cite_ref-61"><a data-dcnode-id="8281" href="#cite_note-61"><span data-dcnode-id="8282" instrument_node="">[61]</span></a></sup><span data-dcnode-id="8279" instrument_node=""> to show that both the sinners and the saints should be allowed to live together until the harvest. He thought that it is wrong to kill even the sinful and that </span><a data-dcnode-id="8277" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Christians" title="Christians"><span data-dcnode-id="8278" instrument_node="">Christians</span></a><span data-dcnode-id="8276" instrument_node=""> should refuse </span><a data-dcnode-id="8274" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Military_service" title="Military service"><span data-dcnode-id="8275" instrument_node="">military service</span></a><span data-dcnode-id="8273" instrument_node="">. He argued that if the poor refused, the lords would have no one to go to war for them. Since then, many other Christians have made similar stands for </span><a data-dcnode-id="8271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pacifism" title="Pacifism"><span data-dcnode-id="8272" instrument_node="">pacifism</span></a><span data-dcnode-id="8270" instrument_node=""> as the following quotes show:
</span></p><span data-dcnode-id="8268" instrument_node="">
</span><link data-dcnode-id="8267" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="8255"><p data-dcnode-id="8265"><span data-dcnode-id="8266" instrument_node="">The Scriptures teach that there are two opposing princes and two opposing kingdoms: the one is the Prince of peace; the other the prince of strife. Each of these princes has his particular kingdom and as the prince is so is also the kingdom. The Prince of peace is Christ Jesus; His kingdom is the kingdom of peace, which is His church; His messengers are the messengers of peace; His Word is the word of peace; His body is the body of peace; His children are the seed of peace.</span></p><div class="templatequotecite" data-dcnode-id="8256"><span data-dcnode-id="8264" instrument_node="">— </span><cite data-dcnode-id="8257"><a data-dcnode-id="8262" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Menno_Simons" title="Menno Simons"><span data-dcnode-id="8263" instrument_node="">Menno Simons</span></a><span data-dcnode-id="8261" instrument_node=""> (1494–1561), Reply to False Accusations, III</span><sup class="reference" data-dcnode-id="8258" id="cite_ref-62"><a data-dcnode-id="8259" href="#cite_note-62"><span data-dcnode-id="8260" instrument_node="">[62]</span></a></sup></cite></div></blockquote><span data-dcnode-id="8254" instrument_node="">
</span><link data-dcnode-id="8253" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="8239"><p data-dcnode-id="8251"><span data-dcnode-id="8252" instrument_node="">To our most bitter opponents we say: 'We shall match your capacity to inflict suffering by our capacity to endure suffering. We shall meet your physical force with soul force. Do to us what you will, and we shall continue to love you.'</span></p><div class="templatequotecite" data-dcnode-id="8240"><span data-dcnode-id="8250" instrument_node="">— </span><cite data-dcnode-id="8241"><a data-dcnode-id="8248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Martin_Luther_King_Jr." title="Martin Luther King Jr."><span data-dcnode-id="8249" instrument_node="">Martin Luther King Jr.</span></a><span data-dcnode-id="8247" instrument_node=""> (1929–1968), "Loving your Enemies" in </span><i data-dcnode-id="8245"><span data-dcnode-id="8246" instrument_node="">Strength to Love</span></i><sup class="reference" data-dcnode-id="8242" id="cite_ref-63"><a data-dcnode-id="8243" href="#cite_note-63"><span data-dcnode-id="8244" instrument_node="">[63]</span></a></sup></cite></div></blockquote><span data-dcnode-id="8238" instrument_node="">
</span><link data-dcnode-id="8237" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="8225"><p data-dcnode-id="8235"><span data-dcnode-id="8236" instrument_node="">Love without courage and wisdom is sentimentality, as with the ordinary church member. Courage without love and wisdom is foolhardiness, as with the ordinary soldier. Wisdom without love and courage is cowardice, as with the ordinary intellectual. Therefore one who has love, courage, and wisdom is the one in a million who moves the world, as with Jesus, Buddha, and Gandhi.</span></p><div class="templatequotecite" data-dcnode-id="8226"><span data-dcnode-id="8234" instrument_node="">— </span><cite data-dcnode-id="8227"><a data-dcnode-id="8232" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ammon_Hennacy" title="Ammon Hennacy"><span data-dcnode-id="8233" instrument_node="">Ammon Hennacy</span></a><span data-dcnode-id="8231" instrument_node=""> (1893–1970)</span><sup class="reference" data-dcnode-id="8228" id="cite_ref-64"><a data-dcnode-id="8229" href="#cite_note-64"><span data-dcnode-id="8230" instrument_node="">[64]</span></a></sup></cite></div></blockquote><span data-dcnode-id="8224" instrument_node="">
</span><link data-dcnode-id="8223" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="8196"><p data-dcnode-id="8208"><span data-dcnode-id="8222" instrument_node="">"What do you mean by </span><a class="mw-redirect" data-dcnode-id="8220" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anarchist-pacifist" title="Anarchist-pacifist"><span data-dcnode-id="8221" instrument_node="">anarchist-pacifist</span></a><span data-dcnode-id="8219" instrument_node="">?" First, I would say that the two words should go together, especially […] when more and more people, even priests, are turning to violence, and are finding their heroes in </span><a data-dcnode-id="8217" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Camilo_Torres_Restrepo" title="Camilo Torres Restrepo"><span data-dcnode-id="8218" instrument_node="">Camillo Torres</span></a><span data-dcnode-id="8216" instrument_node=""> among the priests, and </span><a data-dcnode-id="8214" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Che_Guevara" title="Che Guevara"><span data-dcnode-id="8215" instrument_node="">Che Guevara</span></a><span data-dcnode-id="8213" instrument_node=""> among laymen. The attraction is strong, because both men literally laid down their lives for their brothers. "Greater love hath no man than this." "Let me say, at the risk of seeming ridiculous, that the true revolutionary is guided by great feelings of love." Che Guevara wrote this, and he is quoted by Chicano youth in </span><span data-dcnode-id="8210" title="Spanish-language text"><i data-dcnode-id="8211" lang="es"><span data-dcnode-id="8212" instrument_node="">El Grito Del Norte</span></i></span><span data-dcnode-id="8209" instrument_node="">.</span></p><div class="templatequotecite" data-dcnode-id="8197"><span data-dcnode-id="8207" instrument_node="">— </span><cite data-dcnode-id="8198"><a data-dcnode-id="8205" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dorothy_Day" title="Dorothy Day"><span data-dcnode-id="8206" instrument_node="">Dorothy Day</span></a><span data-dcnode-id="8204" instrument_node="">  (1897–1980), "On Pilgrimage — Our Spring Appeal", </span><i data-dcnode-id="8202"><span data-dcnode-id="8203" instrument_node="">Catholic Worker</span></i><sup class="reference" data-dcnode-id="8199" id="cite_ref-65"><a data-dcnode-id="8200" href="#cite_note-65"><span data-dcnode-id="8201" instrument_node="">[65]</span></a></sup></cite></div></blockquote><span data-dcnode-id="8195" instrument_node="">
</span><p data-dcnode-id="8169"><a data-dcnode-id="8193" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Charles_Spurgeon" title="Charles Spurgeon"><span data-dcnode-id="8194" instrument_node="">Charles Spurgeon</span></a><span data-dcnode-id="8192" instrument_node=""> did not explicitly identify as a pacifist but expressed very strongly worded anti-war sentiment.</span><sup class="reference" data-dcnode-id="8189" id="cite_ref-spurgeon_66-0"><a data-dcnode-id="8190" href="#cite_note-spurgeon-66"><span data-dcnode-id="8191" instrument_node="">[66]</span></a></sup><span data-dcnode-id="8188" instrument_node=""> </span><a data-dcnode-id="8186" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Leo_Tolstoy" title="Leo Tolstoy"><span data-dcnode-id="8187" instrument_node="">Leo Tolstoy</span></a><span data-dcnode-id="8185" instrument_node=""> wrote extensively on Christian pacifism,</span><sup class="reference" data-dcnode-id="8182" id="cite_ref-67"><a data-dcnode-id="8183" href="#cite_note-67"><span data-dcnode-id="8184" instrument_node="">[67]</span></a></sup><span data-dcnode-id="8181" instrument_node=""> while </span><a class="mw-redirect" data-dcnode-id="8179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mohandas_K._Gandhi" title="Mohandas K. Gandhi"><span data-dcnode-id="8180" instrument_node="">Mohandas K. Gandhi</span></a><span data-dcnode-id="8178" instrument_node=""> considered Tolstoy's </span><i data-dcnode-id="8175"><a class="mw-redirect" data-dcnode-id="8176" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Kingdom_of_God_is_Within_You" title="The Kingdom of God is Within You"><span data-dcnode-id="8177" instrument_node="">The Kingdom of God is Within You</span></a></i><span data-dcnode-id="8174" instrument_node=""> as the text to have the most influence in his life.</span><sup class="reference" data-dcnode-id="8171" id="cite_ref-68"><a data-dcnode-id="8172" href="#cite_note-68"><span data-dcnode-id="8173" instrument_node="">[68]</span></a></sup><span data-dcnode-id="8170" instrument_node="">
</span></p><span data-dcnode-id="8168" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="8153"><div class="thumbinner" data-dcnode-id="8154" style="width:222px;"><a class="image" data-dcnode-id="8166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AGandhi_Tolstoy_Farm.jpg"><img alt="" class="thumbimage" data-dcnode-id="8167" data-file-height="300" data-file-width="479" decoding="async" height="138" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/7/75/Gandhi_Tolstoy_Farm.jpg/220px-Gandhi_Tolstoy_Farm.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/7/75/Gandhi_Tolstoy_Farm.jpg/330px-Gandhi_Tolstoy_Farm.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/7/75/Gandhi_Tolstoy_Farm.jpg/440px-Gandhi_Tolstoy_Farm.jpg 2x" width="220"></a><span data-dcnode-id="8165" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="8155"><div class="magnify" data-dcnode-id="8163"><a class="internal" data-dcnode-id="8164" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AGandhi_Tolstoy_Farm.jpg" title="Enlarge"></a></div><span data-dcnode-id="8162" instrument_node="">Some members of </span><a data-dcnode-id="8160" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tolstoy_Farm" title="Tolstoy Farm"><span data-dcnode-id="8161" instrument_node="">Tolstoy Farm</span></a><span data-dcnode-id="8159" instrument_node=""> in 1910, </span><a class="mw-redirect" data-dcnode-id="8157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mohandas_Gandhi" title="Mohandas Gandhi"><span data-dcnode-id="8158" instrument_node="">Gandhi</span></a><span data-dcnode-id="8156" instrument_node=""> is in the middle, second row fifth from the right</span></div></div></div><span data-dcnode-id="8152" instrument_node="">
</span><h2 data-dcnode-id="8142"><span class="mw-headline" data-dcnode-id="8150" id="Christian_pacifist_denominations"><span data-dcnode-id="8151" instrument_node="">Christian pacifist denominations</span></span><span class="mw-editsection" data-dcnode-id="8143"><span class="mw-editsection-bracket" data-dcnode-id="8148"><span data-dcnode-id="8149" instrument_node="">[</span></span><a data-dcnode-id="8146" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DChristian_pacifism%26action%3Dedit%26section%3D10" title="Edit section: Christian pacifist denominations"><span data-dcnode-id="8147" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8144"><span data-dcnode-id="8145" instrument_node="">]</span></span></span></h2><span data-dcnode-id="8141" instrument_node="">
</span><link data-dcnode-id="8140" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="8136" role="note"><span data-dcnode-id="8139" instrument_node="">Main article: </span><a data-dcnode-id="8137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peace_churches" title="Peace churches"><span data-dcnode-id="8138" instrument_node="">Peace churches</span></a></div><span data-dcnode-id="8135" instrument_node="">
</span><p data-dcnode-id="8110"><span data-dcnode-id="8134" instrument_node="">The first </span><a data-dcnode-id="8132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Conscientious_objector" title="Conscientious objector"><span data-dcnode-id="8133" instrument_node="">conscientious objector</span></a><span data-dcnode-id="8131" instrument_node=""> in the modern sense was a </span><a class="mw-redirect" data-dcnode-id="8129" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Quaker" title="Quaker"><span data-dcnode-id="8130" instrument_node="">Quaker</span></a><span data-dcnode-id="8128" instrument_node=""> in 1815.</span><sup class="reference" data-dcnode-id="8125" id="cite_ref-69"><a data-dcnode-id="8126" href="#cite_note-69"><span data-dcnode-id="8127" instrument_node="">[69]</span></a></sup><span data-dcnode-id="8124" instrument_node=""> Some Quakers had originally served in Cromwell's </span><a data-dcnode-id="8122" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_Model_Army" title="New Model Army"><span data-dcnode-id="8123" instrument_node="">New Model Army</span></a><span data-dcnode-id="8121" instrument_node=""> before the </span><a class="mw-redirect" data-dcnode-id="8119" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peace_testimony" title="Peace testimony"><span data-dcnode-id="8120" instrument_node="">peace testimony</span></a><span data-dcnode-id="8118" instrument_node=""> of Friends was issued after the restoration of the British monarchy in 1660. A number of Christian denominations have taken pacifist positions institutionally, including the Quakers and </span><a class="mw-redirect" data-dcnode-id="8116" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mennonite" title="Mennonite"><span data-dcnode-id="8117" instrument_node="">Mennonites</span></a><span data-dcnode-id="8115" instrument_node="">.</span><sup class="reference" data-dcnode-id="8112" id="cite_ref-70"><a data-dcnode-id="8113" href="#cite_note-70"><span data-dcnode-id="8114" instrument_node="">[70]</span></a></sup><span data-dcnode-id="8111" instrument_node="">
</span></p><span data-dcnode-id="8109" instrument_node="">
</span><h3 data-dcnode-id="8099"><span class="mw-headline" data-dcnode-id="8107" id="Peace_churches"><span data-dcnode-id="8108" instrument_node="">Peace churches</span></span><span class="mw-editsection" data-dcnode-id="8100"><span class="mw-editsection-bracket" data-dcnode-id="8105"><span data-dcnode-id="8106" instrument_node="">[</span></span><a data-dcnode-id="8103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DChristian_pacifism%26action%3Dedit%26section%3D11" title="Edit section: Peace churches"><span data-dcnode-id="8104" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8101"><span data-dcnode-id="8102" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8098" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="8085"><div class="thumbinner" data-dcnode-id="8086" style="width:222px;"><a class="image" data-dcnode-id="8096" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AThe_Deserter.jpg"><img alt="" class="thumbimage" data-dcnode-id="8097" data-file-height="383" data-file-width="581" decoding="async" height="145" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/4/4b/The_Deserter.jpg/220px-The_Deserter.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/4/4b/The_Deserter.jpg/330px-The_Deserter.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/4/4b/The_Deserter.jpg/440px-The_Deserter.jpg 2x" width="220"></a><span data-dcnode-id="8095" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="8087"><div class="magnify" data-dcnode-id="8093"><a class="internal" data-dcnode-id="8094" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AThe_Deserter.jpg" title="Enlarge"></a></div><i data-dcnode-id="8091"><span data-dcnode-id="8092" instrument_node="">The Deserter</span></i><span data-dcnode-id="8090" instrument_node=""> (1916) by </span><a data-dcnode-id="8088" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Boardman_Robinson" title="Boardman Robinson"><span data-dcnode-id="8089" instrument_node="">Boardman Robinson</span></a></div></div></div><span data-dcnode-id="8084" instrument_node="">
</span><p data-dcnode-id="8079"><span data-dcnode-id="8083" instrument_node="">The term "historical peace churches" refers to three churches—the </span><a data-dcnode-id="8081" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Church_of_the_Brethren" title="Church of the Brethren"><span data-dcnode-id="8082" instrument_node="">Church of the Brethren</span></a><span data-dcnode-id="8080" instrument_node="">, the Mennonites and the Quakers—who took part in the first peace church conference, in Kansas in 1935, and who have worked together to represent the view of Christian pacifism.
</span></p><span data-dcnode-id="8078" instrument_node="">
</span><h3 data-dcnode-id="8068"><span class="mw-headline" data-dcnode-id="8076" id="Anabaptist_churches"><span data-dcnode-id="8077" instrument_node="">Anabaptist churches</span></span><span class="mw-editsection" data-dcnode-id="8069"><span class="mw-editsection-bracket" data-dcnode-id="8074"><span data-dcnode-id="8075" instrument_node="">[</span></span><a data-dcnode-id="8072" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DChristian_pacifism%26action%3Dedit%26section%3D12" title="Edit section: Anabaptist churches"><span data-dcnode-id="8073" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8070"><span data-dcnode-id="8071" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8067" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="8038"><div class="thumbinner" data-dcnode-id="8039" style="width:202px;"><a class="image" data-dcnode-id="8065" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AWhipping_of_an_incarcerated_delinquent%2C_Germany_17th_century.jpg"><img alt="" class="thumbimage" data-dcnode-id="8066" data-file-height="640" data-file-width="600" decoding="async" height="213" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/f/fc/Whipping_of_an_incarcerated_delinquent%252C_Germany_17th_century.jpg/200px-Whipping_of_an_incarcerated_delinquent%252C_Germany_17th_century.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/f/fc/Whipping_of_an_incarcerated_delinquent%2C_Germany_17th_century.jpg/300px-Whipping_of_an_incarcerated_delinquent%2C_Germany_17th_century.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/f/fc/Whipping_of_an_incarcerated_delinquent%2C_Germany_17th_century.jpg/400px-Whipping_of_an_incarcerated_delinquent%2C_Germany_17th_century.jpg 2x" width="200"></a><span data-dcnode-id="8064" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="8040"><div class="magnify" data-dcnode-id="8062"><a class="internal" data-dcnode-id="8063" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AWhipping_of_an_incarcerated_delinquent%2C_Germany_17th_century.jpg" title="Enlarge"></a></div><a data-dcnode-id="8060" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Birching" title="Birching"><span data-dcnode-id="8061" instrument_node="">Birching</span></a><span data-dcnode-id="8059" instrument_node=""> of </span><a class="mw-redirect" data-dcnode-id="8057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anabaptist" title="Anabaptist"><span data-dcnode-id="8058" instrument_node="">Anabaptist</span></a><span data-dcnode-id="8056" instrument_node=""> martyr </span><a data-dcnode-id="8054" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ursula_van_Beckum" title="Ursula van Beckum"><span data-dcnode-id="8055" instrument_node="">Ursula</span></a><span data-dcnode-id="8053" instrument_node="">, </span><a data-dcnode-id="8051" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Maastricht" title="Maastricht"><span data-dcnode-id="8052" instrument_node="">Maastricht</span></a><span data-dcnode-id="8050" instrument_node="">, 1570; engraving by </span><a data-dcnode-id="8048" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jan_Luyken" title="Jan Luyken"><span data-dcnode-id="8049" instrument_node="">Jan Luyken</span></a><span data-dcnode-id="8047" instrument_node=""> from </span><i data-dcnode-id="8044"><a data-dcnode-id="8045" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Martyrs_Mirror" title="Martyrs Mirror"><span data-dcnode-id="8046" instrument_node="">Martyrs Mirror</span></a></i><sup class="reference" data-dcnode-id="8041" id="cite_ref-71"><a data-dcnode-id="8042" href="#cite_note-71"><span data-dcnode-id="8043" instrument_node="">[71]</span></a></sup></div></div></div><span data-dcnode-id="8037" instrument_node="">
</span><p data-dcnode-id="8009"><span data-dcnode-id="8036" instrument_node="">Traditionally, </span><a data-dcnode-id="8034" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anabaptism" title="Anabaptism"><span data-dcnode-id="8035" instrument_node="">Anabaptists</span></a><span data-dcnode-id="8033" instrument_node=""> hold firmly to their beliefs in nonviolence. Many of these churches continue to advocate nonviolence, some of which are Mennonites, the </span><a data-dcnode-id="8031" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Amish" title="Amish"><span data-dcnode-id="8032" instrument_node="">Amish</span></a><span data-dcnode-id="8030" instrument_node="">, the </span><a class="mw-redirect" data-dcnode-id="8028" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hutterite" title="Hutterite"><span data-dcnode-id="8029" instrument_node="">Hutterites</span></a><span data-dcnode-id="8027" instrument_node="">,</span><sup class="reference" data-dcnode-id="8024" id="cite_ref-72"><a data-dcnode-id="8025" href="#cite_note-72"><span data-dcnode-id="8026" instrument_node="">[72]</span></a></sup><span data-dcnode-id="8023" instrument_node=""> </span><a data-dcnode-id="8021" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Old_Order_River_Brethren" title="Old Order River Brethren"><span data-dcnode-id="8022" instrument_node="">Old Order River Brethren</span></a><span data-dcnode-id="8020" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="8018" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Brethren_in_Christ" title="Brethren in Christ"><span data-dcnode-id="8019" instrument_node="">Brethren in Christ</span></a><span data-dcnode-id="8017" instrument_node=""> and the </span><a data-dcnode-id="8015" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bruderhof_Communities" title="Bruderhof Communities"><span data-dcnode-id="8016" instrument_node="">Bruderhof Communities</span></a><span data-dcnode-id="8014" instrument_node="">.</span><sup class="reference" data-dcnode-id="8011" id="cite_ref-Thomas2014_73-0"><a data-dcnode-id="8012" href="#cite_note-Thomas2014-73"><span data-dcnode-id="8013" instrument_node="">[73]</span></a></sup><span data-dcnode-id="8010" instrument_node="">
</span></p><span data-dcnode-id="8008" instrument_node="">
</span><h3 data-dcnode-id="7998"><span class="mw-headline" data-dcnode-id="8006" id="Christadelphians"><span data-dcnode-id="8007" instrument_node="">Christadelphians</span></span><span class="mw-editsection" data-dcnode-id="7999"><span class="mw-editsection-bracket" data-dcnode-id="8004"><span data-dcnode-id="8005" instrument_node="">[</span></span><a data-dcnode-id="8002" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DChristian_pacifism%26action%3Dedit%26section%3D13" title="Edit section: Christadelphians"><span data-dcnode-id="8003" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8000"><span data-dcnode-id="8001" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7997" instrument_node="">
</span><p data-dcnode-id="7972"><span data-dcnode-id="7996" instrument_node="">Although the group had already separated from the </span><a data-dcnode-id="7994" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Campbellite" title="Campbellite"><span data-dcnode-id="7995" instrument_node="">Campbellites</span></a><span data-dcnode-id="7993" instrument_node="">, a part of the </span><a data-dcnode-id="7991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Restoration_Movement" title="Restoration Movement"><span data-dcnode-id="7992" instrument_node="">Restoration Movement</span></a><span data-dcnode-id="7990" instrument_node="">, after 1848 for theological reasons as the "Royal Assembly of Believers", among other names, the "</span><a data-dcnode-id="7988" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Christadelphians" title="Christadelphians"><span data-dcnode-id="7989" instrument_node="">Christadelphians</span></a><span data-dcnode-id="7987" instrument_node="">" formed as a church formally in 1863 in response to </span><a data-dcnode-id="7985" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Conscription" title="Conscription"><span data-dcnode-id="7986" instrument_node="">conscription</span></a><span data-dcnode-id="7984" instrument_node=""> in the </span><a data-dcnode-id="7982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/American_Civil_War" title="American Civil War"><span data-dcnode-id="7983" instrument_node="">American Civil War</span></a><span data-dcnode-id="7981" instrument_node="">. They are one of the few churches to have been legally formed over the issue of Christian pacifism.</span><sup class="reference" data-dcnode-id="7978" id="cite_ref-74"><a data-dcnode-id="7979" href="#cite_note-74"><span data-dcnode-id="7980" instrument_node="">[74]</span></a></sup><span data-dcnode-id="7977" instrument_node=""> The British and Canadian arms of the group adopted the name "Christadelphian" in the following year, 1864, and also maintained objection to military service during the First and Second World Wars. Unlike Quakers, Christadelphians generally refused all forms of military service, including stretcher bearers and medics, preferring non-uniformed civil hospital service.</span><sup class="reference" data-dcnode-id="7974" id="cite_ref-75"><a data-dcnode-id="7975" href="#cite_note-75"><span data-dcnode-id="7976" instrument_node="">[75]</span></a></sup><span data-dcnode-id="7973" instrument_node="">
</span></p><span data-dcnode-id="7971" instrument_node="">
</span><h3 data-dcnode-id="7960"><span data-dcnode-id="7970" id="Churches_of_God_.287th_day.29"></span><span class="mw-headline" data-dcnode-id="7968" id="Churches_of_God_(7th_day)"><span data-dcnode-id="7969" instrument_node="">Churches of God (7th day)</span></span><span class="mw-editsection" data-dcnode-id="7961"><span class="mw-editsection-bracket" data-dcnode-id="7966"><span data-dcnode-id="7967" instrument_node="">[</span></span><a data-dcnode-id="7964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DChristian_pacifism%26action%3Dedit%26section%3D14" title="Edit section: Churches of God (7th day)"><span data-dcnode-id="7965" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7962"><span data-dcnode-id="7963" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7959" instrument_node="">
</span><p data-dcnode-id="7947"><span data-dcnode-id="7958" instrument_node="">The different groups evolving under the name </span><a class="mw-redirect" data-dcnode-id="7956" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Church_of_God_%287th_day%29" title="Church of God (7th day)"><span data-dcnode-id="7957" instrument_node="">Church of God (7th day)</span></a><span data-dcnode-id="7955" instrument_node=""> stand opposed to carnal warfare, based on Matthew 26:52; Revelation 13:10; Romans 12:19–21. They believe the weapons of their warfare to not be carnal but spiritual (II Corinthians 10:3–5; Ephesians 6:11–18).</span><sup class="reference" data-dcnode-id="7952" id="cite_ref-76"><a data-dcnode-id="7953" href="#cite_note-76"><span data-dcnode-id="7954" instrument_node="">[76]</span></a></sup><sup class="reference" data-dcnode-id="7949" id="cite_ref-77"><a data-dcnode-id="7950" href="#cite_note-77"><span data-dcnode-id="7951" instrument_node="">[77]</span></a></sup><span data-dcnode-id="7948" instrument_node="">
</span></p><span data-dcnode-id="7946" instrument_node="">
</span><h3 data-dcnode-id="7936"><span class="mw-headline" data-dcnode-id="7944" id="Doukhobors"><span data-dcnode-id="7945" instrument_node="">Doukhobors</span></span><span class="mw-editsection" data-dcnode-id="7937"><span class="mw-editsection-bracket" data-dcnode-id="7942"><span data-dcnode-id="7943" instrument_node="">[</span></span><a data-dcnode-id="7940" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DChristian_pacifism%26action%3Dedit%26section%3D15" title="Edit section: Doukhobors"><span data-dcnode-id="7941" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7938"><span data-dcnode-id="7939" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7935" instrument_node="">
</span><p data-dcnode-id="7919"><span data-dcnode-id="7934" instrument_node="">The </span><a data-dcnode-id="7932" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Doukhobors" title="Doukhobors"><span data-dcnode-id="7933" instrument_node="">Doukhobors</span></a><span data-dcnode-id="7931" instrument_node=""> are a </span><a class="mw-redirect" data-dcnode-id="7929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Spiritual_Christian" title="Spiritual Christian"><span data-dcnode-id="7930" instrument_node="">Spiritual Christian</span></a><span data-dcnode-id="7928" instrument_node=""> denomination that advocate pacifism.</span><sup class="reference" data-dcnode-id="7925" id="cite_ref-Guides2016_78-0"><a data-dcnode-id="7926" href="#cite_note-Guides2016-78"><span data-dcnode-id="7927" instrument_node="">[78]</span></a></sup><span data-dcnode-id="7924" instrument_node=""> On June 29, 1895, the Doukhobors, in what is known as the "Burning of the Arms", "piled up their swords, guns, and other weapons and burned them in large bonfires while they sang psalms".</span><sup class="reference" data-dcnode-id="7921" id="cite_ref-Rak2005_79-0"><a data-dcnode-id="7922" href="#cite_note-Rak2005-79"><span data-dcnode-id="7923" instrument_node="">[79]</span></a></sup><span data-dcnode-id="7920" instrument_node="">
</span></p><span data-dcnode-id="7918" instrument_node="">
</span><h3 data-dcnode-id="7908"><span class="mw-headline" data-dcnode-id="7916" id="Holiness_pacifists"><span data-dcnode-id="7917" instrument_node="">Holiness pacifists</span></span><span class="mw-editsection" data-dcnode-id="7909"><span class="mw-editsection-bracket" data-dcnode-id="7914"><span data-dcnode-id="7915" instrument_node="">[</span></span><a data-dcnode-id="7912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DChristian_pacifism%26action%3Dedit%26section%3D16" title="Edit section: Holiness pacifists"><span data-dcnode-id="7913" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7910"><span data-dcnode-id="7911" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7907" instrument_node="">
</span><p data-dcnode-id="7891"><span data-dcnode-id="7906" instrument_node="">The </span><a data-dcnode-id="7904" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wesleyan_Methodist_Church_%28United_States%29" title="Wesleyan Methodist Church (United States)"><span data-dcnode-id="7905" instrument_node="">Wesleyan Methodist Church</span></a><span data-dcnode-id="7903" instrument_node="">, one of the first Methodist denominations of the </span><a data-dcnode-id="7901" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Holiness_movement" title="Holiness movement"><span data-dcnode-id="7902" instrument_node="">holiness movement</span></a><span data-dcnode-id="7900" instrument_node="">, opposed war as documented in their 1844 </span><i data-dcnode-id="7897"><a data-dcnode-id="7898" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Book_of_Discipline_%28United_Methodist%29" title="Book of Discipline (United Methodist)"><span data-dcnode-id="7899" instrument_node="">Book of Discipline</span></a></i><span data-dcnode-id="7896" instrument_node="">, that noted that the Gospel is in "every way opposed to the practice of War in all its forms; and those customs which tend to foster and perpetuate war spirit, [are] inconsistent with the benevolent designs of the Christian religion."</span><sup class="reference" data-dcnode-id="7893" id="cite_ref-BeamanPipkin2013_80-0"><a data-dcnode-id="7894" href="#cite_note-BeamanPipkin2013-80"><span data-dcnode-id="7895" instrument_node="">[80]</span></a></sup><span data-dcnode-id="7892" instrument_node="">
</span></p><p data-dcnode-id="7857"><span data-dcnode-id="7890" instrument_node="">The </span><a data-dcnode-id="7888" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reformed_Free_Methodist_Church" title="Reformed Free Methodist Church"><span data-dcnode-id="7889" instrument_node="">Reformed Free Methodist Church</span></a><span data-dcnode-id="7887" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="7885" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Emmanuel_Association" title="Emmanuel Association"><span data-dcnode-id="7886" instrument_node="">Emmanuel Association</span></a><span data-dcnode-id="7884" instrument_node="">, the </span><a data-dcnode-id="7882" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Church_of_God_%28Guthrie%2C_Oklahoma%29" title="Church of God (Guthrie, Oklahoma)"><span data-dcnode-id="7883" instrument_node="">Church of God (Guthrie, Oklahoma)</span></a><span data-dcnode-id="7881" instrument_node=""> and </span><a data-dcnode-id="7879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Christ%2527s_Sanctified_Holy_Church" title="Christ's Sanctified Holy Church"><span data-dcnode-id="7880" instrument_node="">Christ's Sanctified Holy Church</span></a><span data-dcnode-id="7878" instrument_node=""> are denominations in the holiness movement known for their opposition to war today; they are known as "holiness pacifists".</span><sup class="reference" data-dcnode-id="7875" id="cite_ref-81"><a data-dcnode-id="7876" href="#cite_note-81"><span data-dcnode-id="7877" instrument_node="">[81]</span></a></sup><sup class="reference" data-dcnode-id="7872" id="cite_ref-Emmanuel2002_82-0"><a data-dcnode-id="7873" href="#cite_note-Emmanuel2002-82"><span data-dcnode-id="7874" instrument_node="">[82]</span></a></sup><sup class="reference" data-dcnode-id="7869" id="cite_ref-83"><a data-dcnode-id="7870" href="#cite_note-83"><span data-dcnode-id="7871" instrument_node="">[83]</span></a></sup><sup class="reference" data-dcnode-id="7866" id="cite_ref-BeamanPipkin2013_80-1"><a data-dcnode-id="7867" href="#cite_note-BeamanPipkin2013-80"><span data-dcnode-id="7868" instrument_node="">[80]</span></a></sup><span data-dcnode-id="7865" instrument_node=""> The Emmanuel Association teaches:</span><sup class="reference" data-dcnode-id="7862" id="cite_ref-BeamanPipkin2013_80-2"><a data-dcnode-id="7863" href="#cite_note-BeamanPipkin2013-80"><span data-dcnode-id="7864" instrument_node="">[80]</span></a></sup><sup class="reference" data-dcnode-id="7859" id="cite_ref-Alexander2011_84-0"><a data-dcnode-id="7860" href="#cite_note-Alexander2011-84"><span data-dcnode-id="7861" instrument_node="">[84]</span></a></sup><span data-dcnode-id="7858" instrument_node="">
</span></p><span data-dcnode-id="7856" instrument_node="">
</span><link data-dcnode-id="7855" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="7849"><p data-dcnode-id="7850"><span data-dcnode-id="7854" instrument_node="">We feel bound explicitly to avow our unshaken persuasion that War is utterly incompatible with the plain precepts of our divine Lord and Law-giver, and with the whole spirit of the Gospel; and that no plea of necessity or policy, however urgent or peculiar, can avail to release either individuals or nations for the paramount allegiance which they owe to Him who hath said, "Love your enemies." Therefore, we cannot participate in war (Rom. 12:19), war activities, or compulsory training.</span><sup class="reference" data-dcnode-id="7851" id="cite_ref-BeamanPipkin2013_80-3"><a data-dcnode-id="7852" href="#cite_note-BeamanPipkin2013-80"><span data-dcnode-id="7853" instrument_node="">[80]</span></a></sup></p></blockquote><span data-dcnode-id="7848" instrument_node="">

</span><p data-dcnode-id="5228"><a data-dcnode-id="5261" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jehovah%2527s_Witnesses_beliefs" title="Jehovah's Witnesses beliefs"><span data-dcnode-id="5262" instrument_node="">The beliefs</span></a><span data-dcnode-id="5260" instrument_node=""> and </span><a data-dcnode-id="5258" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jehovah%2527s_Witnesses_practices" title="Jehovah's Witnesses practices"><span data-dcnode-id="5259" instrument_node="">practices</span></a><span data-dcnode-id="5257" instrument_node=""> of </span><a data-dcnode-id="5255" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jehovah%2527s_Witnesses" title="Jehovah's Witnesses"><span data-dcnode-id="5256" instrument_node="">Jehovah's Witnesses</span></a><span data-dcnode-id="5254" instrument_node=""> have </span><a data-dcnode-id="5252" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Criticism_of_Jehovah%2527s_Witnesses" title="Criticism of Jehovah's Witnesses"><span data-dcnode-id="5253" instrument_node="">engendered controversy</span></a><span data-dcnode-id="5251" instrument_node=""> throughout </span><a data-dcnode-id="5249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/History_of_Jehovah%2527s_Witnesses" title="History of Jehovah's Witnesses"><span data-dcnode-id="5250" instrument_node="">their history</span></a><span data-dcnode-id="5248" instrument_node="">. Consequently, the denomination has been opposed by local governments, communities, and religious groups. Many </span><a data-dcnode-id="5246" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Christian_denomination" title="Christian denomination"><span data-dcnode-id="5247" instrument_node="">Christian denominations</span></a><span data-dcnode-id="5245" instrument_node=""> consider the interpretations and doctrines of Jehovah's Witnesses </span><a data-dcnode-id="5243" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Heresy" title="Heresy"><span data-dcnode-id="5244" instrument_node="">heretical</span></a><span data-dcnode-id="5242" instrument_node="">, and some professors of </span><a data-dcnode-id="5240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Religion" title="Religion"><span data-dcnode-id="5241" instrument_node="">religion</span></a><span data-dcnode-id="5239" instrument_node=""> have classified the denomination as a </span><a data-dcnode-id="5237" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cult" title="Cult"><span data-dcnode-id="5238" instrument_node="">cult</span></a><span data-dcnode-id="5236" instrument_node="">.</span><sup class="reference" data-dcnode-id="5233" id="cite_ref-85"><a data-dcnode-id="5234" href="#cite_note-85"><span data-dcnode-id="5235" instrument_node="">[85]</span></a></sup><sup class="reference" data-dcnode-id="5230" id="cite_ref-86"><a data-dcnode-id="5231" href="#cite_note-86"><span data-dcnode-id="5232" instrument_node="">[86]</span></a></sup><span data-dcnode-id="5229" instrument_node="">
</span></p><p data-dcnode-id="5198"><span data-dcnode-id="5227" instrument_node="">According to </span><a data-dcnode-id="5225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Law" title="Law"><span data-dcnode-id="5226" instrument_node="">law</span></a><span data-dcnode-id="5224" instrument_node=""> professor </span><a data-dcnode-id="5222" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Archibald_Cox" title="Archibald Cox"><span data-dcnode-id="5223" instrument_node="">Archibald Cox</span></a><span data-dcnode-id="5221" instrument_node="">, Jehovah's Witnesses in the United States were "the principal victims of </span><a data-dcnode-id="5219" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Religious_discrimination_in_the_United_States" title="Religious discrimination in the United States"><span data-dcnode-id="5220" instrument_node="">religious persecution</span></a><span data-dcnode-id="5218" instrument_node=""> … they began to attract attention and provoke repression in the 1930s, when their proselytizing and numbers rapidly increased."</span><sup class="reference" data-dcnode-id="5215" id="cite_ref-87"><a data-dcnode-id="5216" href="#cite_note-87"><span data-dcnode-id="5217" instrument_node="">[87]</span></a></sup><span data-dcnode-id="5214" instrument_node=""> At times, political and religious animosity against Jehovah's Witnesses has led to </span><a class="mw-redirect" data-dcnode-id="5212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mob_action" title="Mob action"><span data-dcnode-id="5213" instrument_node="">mob action</span></a><span data-dcnode-id="5211" instrument_node=""> and </span><a data-dcnode-id="5209" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Government" title="Government"><span data-dcnode-id="5210" instrument_node="">governmental</span></a><span data-dcnode-id="5208" instrument_node=""> repression in various countries including the </span><a data-dcnode-id="5206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Persecution_of_Jehovah%2527s_Witnesses_in_the_United_States" title="Persecution of Jehovah's Witnesses in the United States"><span data-dcnode-id="5207" instrument_node="">United States</span></a><span data-dcnode-id="5205" instrument_node="">, </span><a data-dcnode-id="5203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Persecution_of_Jehovah%2527s_Witnesses_in_Canada" title="Persecution of Jehovah's Witnesses in Canada"><span data-dcnode-id="5204" instrument_node="">Canada</span></a><span data-dcnode-id="5202" instrument_node=""> and </span><a data-dcnode-id="5200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Persecution_of_Jehovah%2527s_Witnesses_in_Nazi_Germany" title="Persecution of Jehovah's Witnesses in Nazi Germany"><span data-dcnode-id="5201" instrument_node="">Nazi Germany</span></a><span data-dcnode-id="5199" instrument_node="">.
</span></p><p data-dcnode-id="5183"><span data-dcnode-id="5197" instrument_node="">During </span><a data-dcnode-id="5195" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_War_II" title="World War II"><span data-dcnode-id="5196" instrument_node="">World War II</span></a><span data-dcnode-id="5194" instrument_node="">, Jehovah's Witnesses were targeted in the United States, Canada, and many other countries because they refused to serve in the military or contribute to the war effort due to their </span><a data-dcnode-id="5192" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jehovah%2527s_Witnesses_and_governments" title="Jehovah's Witnesses and governments"><span data-dcnode-id="5193" instrument_node="">doctrine of political neutrality</span></a><span data-dcnode-id="5191" instrument_node="">. In Canada, Jehovah's Witnesses were interned in camps</span><sup class="reference" data-dcnode-id="5188" id="cite_ref-canww2_88-0"><a data-dcnode-id="5189" href="#cite_note-canww2-88"><span data-dcnode-id="5190" instrument_node="">[88]</span></a></sup><span data-dcnode-id="5187" instrument_node=""> along with political dissidents and </span><a data-dcnode-id="5185" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Internment_of_Japanese_Canadians" title="Internment of Japanese Canadians"><span data-dcnode-id="5186" instrument_node="">people of Japanese and Chinese descent</span></a><span data-dcnode-id="5184" instrument_node="">.
</span></p><span data-dcnode-id="5182" instrument_node="">
</span><h3 data-dcnode-id="5172"><span class="mw-headline" data-dcnode-id="5180" id="Molokans"><span data-dcnode-id="5181" instrument_node="">Molokans</span></span><span class="mw-editsection" data-dcnode-id="5173"><span class="mw-editsection-bracket" data-dcnode-id="5178"><span data-dcnode-id="5179" instrument_node="">[</span></span><a data-dcnode-id="5176" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DChristian_pacifism%26action%3Dedit%26section%3D18" title="Edit section: Molokans"><span data-dcnode-id="5177" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5174"><span data-dcnode-id="5175" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5171" instrument_node="">
</span><p data-dcnode-id="5155"><span data-dcnode-id="5170" instrument_node="">The </span><a data-dcnode-id="5168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Molokan" title="Molokan"><span data-dcnode-id="5169" instrument_node="">Molokans</span></a><span data-dcnode-id="5167" instrument_node=""> are a Spiritual Christian denomination that advocate pacifism.</span><sup class="reference" data-dcnode-id="5164" id="cite_ref-Hennacy2010_89-0"><a data-dcnode-id="5165" href="#cite_note-Hennacy2010-89"><span data-dcnode-id="5166" instrument_node="">[89]</span></a></sup><span data-dcnode-id="5163" instrument_node=""> They have historically been </span><a data-dcnode-id="5161" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Persecution_of_Christians" title="Persecution of Christians"><span data-dcnode-id="5162" instrument_node="">persecuted</span></a><span data-dcnode-id="5160" instrument_node=""> for failing to bear arms.</span><sup class="reference" data-dcnode-id="5157" id="cite_ref-Waters1999_90-0"><a data-dcnode-id="5158" href="#cite_note-Waters1999-90"><span data-dcnode-id="5159" instrument_node="">[90]</span></a></sup><span data-dcnode-id="5156" instrument_node="">
</span></p><span data-dcnode-id="5154" instrument_node="">
</span><h3 data-dcnode-id="5144"><span class="mw-headline" data-dcnode-id="5152" id="Moravian_Church"><span data-dcnode-id="5153" instrument_node="">Moravian Church</span></span><span class="mw-editsection" data-dcnode-id="5145"><span class="mw-editsection-bracket" data-dcnode-id="5150"><span data-dcnode-id="5151" instrument_node="">[</span></span><a data-dcnode-id="5148" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DChristian_pacifism%26action%3Dedit%26section%3D19" title="Edit section: Moravian Church"><span data-dcnode-id="5149" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5146"><span data-dcnode-id="5147" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5143" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="5131"><div class="thumbinner" data-dcnode-id="5132" style="width:222px;"><a class="image" data-dcnode-id="5141" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AGnadenhuttenMassacre1852.png"><img alt="" class="thumbimage" data-dcnode-id="5142" data-file-height="782" data-file-width="1101" decoding="async" height="156" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/4/41/GnadenhuttenMassacre1852.png/220px-GnadenhuttenMassacre1852.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/4/41/GnadenhuttenMassacre1852.png/330px-GnadenhuttenMassacre1852.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/4/41/GnadenhuttenMassacre1852.png/440px-GnadenhuttenMassacre1852.png 2x" width="220"></a><span data-dcnode-id="5140" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5133"><div class="magnify" data-dcnode-id="5138"><a class="internal" data-dcnode-id="5139" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AGnadenhuttenMassacre1852.png" title="Enlarge"></a></div><span data-dcnode-id="5137" instrument_node="">Engraving of the </span><a data-dcnode-id="5135" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gnadenhutten_massacre" title="Gnadenhutten massacre"><span data-dcnode-id="5136" instrument_node="">Gnadenhutten massacre</span></a><span data-dcnode-id="5134" instrument_node=""> from 1852</span></div></div></div><span data-dcnode-id="5130" instrument_node="">
</span><p data-dcnode-id="5106"><span data-dcnode-id="5129" instrument_node="">The </span><a data-dcnode-id="5127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Moravian_Church" title="Moravian Church"><span data-dcnode-id="5128" instrument_node="">Moravian Church</span></a><span data-dcnode-id="5126" instrument_node=""> historically adheres to the position of Christian pacifism, evidenced in atrocities such as the </span><a data-dcnode-id="5124" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gnadenhutten_massacre" title="Gnadenhutten massacre"><span data-dcnode-id="5125" instrument_node="">Gnadenhutten massacre</span></a><span data-dcnode-id="5123" instrument_node="">, where the Lenape Moravian martyrs practiced </span><a data-dcnode-id="5121" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nonresistance" title="Nonresistance"><span data-dcnode-id="5122" instrument_node="">nonresistance</span></a><span data-dcnode-id="5120" instrument_node=""> with their murderers, singing hymns until their execution by American revolutionaries.</span><sup class="reference" data-dcnode-id="5117" id="cite_ref-Stoeffler2007_91-0"><a data-dcnode-id="5118" href="#cite_note-Stoeffler2007-91"><span data-dcnode-id="5119" instrument_node="">[91]</span></a></sup><sup class="reference" data-dcnode-id="5114" id="cite_ref-92"><a data-dcnode-id="5115" href="#cite_note-92"><span data-dcnode-id="5116" instrument_node="">[92]</span></a></sup><sup class="reference" data-dcnode-id="5111" id="cite_ref-Schutt2013_93-0"><a data-dcnode-id="5112" href="#cite_note-Schutt2013-93"><span data-dcnode-id="5113" instrument_node="">[93]</span></a></sup><sup class="reference" data-dcnode-id="5108" id="cite_ref-94"><a data-dcnode-id="5109" href="#cite_note-94"><span data-dcnode-id="5110" instrument_node="">[94]</span></a></sup><span data-dcnode-id="5107" instrument_node="">
</span></p><span data-dcnode-id="5105" instrument_node="">
</span><h3 data-dcnode-id="5095"><span class="mw-headline" data-dcnode-id="5103" id="Quakers_and_Shakers"><span data-dcnode-id="5104" instrument_node="">Quakers and Shakers</span></span><span class="mw-editsection" data-dcnode-id="5096"><span class="mw-editsection-bracket" data-dcnode-id="5101"><span data-dcnode-id="5102" instrument_node="">[</span></span><a data-dcnode-id="5099" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DChristian_pacifism%26action%3Dedit%26section%3D20" title="Edit section: Quakers and Shakers"><span data-dcnode-id="5100" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5097"><span data-dcnode-id="5098" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5094" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="5074"><div class="thumbinner" data-dcnode-id="5075" style="width:172px;"><a class="image" data-dcnode-id="5092" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMaryDyerByHowardPyle.jpg"><img alt="" class="thumbimage" data-dcnode-id="5093" data-file-height="855" data-file-width="570" decoding="async" height="255" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/9/92/MaryDyerByHowardPyle.jpg/170px-MaryDyerByHowardPyle.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/9/92/MaryDyerByHowardPyle.jpg/255px-MaryDyerByHowardPyle.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/9/92/MaryDyerByHowardPyle.jpg/340px-MaryDyerByHowardPyle.jpg 2x" width="170"></a><span data-dcnode-id="5091" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5076"><div class="magnify" data-dcnode-id="5089"><a class="internal" data-dcnode-id="5090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMaryDyerByHowardPyle.jpg" title="Enlarge"></a></div><a data-dcnode-id="5087" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mary_Dyer" title="Mary Dyer"><span data-dcnode-id="5088" instrument_node="">Mary Dyer</span></a><span data-dcnode-id="5086" instrument_node=""> being led to the gallows in </span><a data-dcnode-id="5084" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Boston" title="Boston"><span data-dcnode-id="5085" instrument_node="">Boston</span></a><span data-dcnode-id="5083" instrument_node=""> in 1660, painted </span><i data-dcnode-id="5081"><span data-dcnode-id="5082" instrument_node="">c.</span></i><span data-dcnode-id="5080" instrument_node=""> 1905 (Painting by </span><a data-dcnode-id="5078" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Howard_Pyle" title="Howard Pyle"><span data-dcnode-id="5079" instrument_node="">Howard Pyle</span></a><span data-dcnode-id="5077" instrument_node="">)</span></div></div></div><span data-dcnode-id="5073" instrument_node="">
</span><link data-dcnode-id="5072" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="5068" role="note"><span data-dcnode-id="5071" instrument_node="">Further information: </span><a data-dcnode-id="5069" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peace_Testimony" title="Peace Testimony"><span data-dcnode-id="5070" instrument_node="">Peace Testimony</span></a></div><span data-dcnode-id="5067" instrument_node="">
</span><p data-dcnode-id="5044"><span data-dcnode-id="5066" instrument_node="">Most Quakers, also known as Friends (members of the Religious Society of Friends), hold peace as a core value, including the refusal to participate in war</span><sup class="reference" data-dcnode-id="5063" id="cite_ref-95"><a data-dcnode-id="5064" href="#cite_note-95"><span data-dcnode-id="5065" instrument_node="">[95]</span></a></sup><span data-dcnode-id="5062" instrument_node=""> going as far as forming the </span><a data-dcnode-id="5060" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Friends%2527_Ambulance_Unit" title="Friends' Ambulance Unit"><span data-dcnode-id="5061" instrument_node="">Friends' Ambulance Unit</span></a><span data-dcnode-id="5059" instrument_node=""> with the aim of "co-operating with others to build up a new world rather than fighting to destroy the old", and the </span><a data-dcnode-id="5057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/American_Friends_Service_Committee" title="American Friends Service Committee"><span data-dcnode-id="5058" instrument_node="">American Friends Service Committee</span></a><span data-dcnode-id="5056" instrument_node=""> during the two World Wars and subsequent conflicts.</span><sup class="reference" data-dcnode-id="5053" id="cite_ref-96"><a data-dcnode-id="5054" href="#cite_note-96"><span data-dcnode-id="5055" instrument_node="">[96]</span></a></sup><span data-dcnode-id="5052" instrument_node=""> </span><a data-dcnode-id="5050" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shakers" title="Shakers"><span data-dcnode-id="5051" instrument_node="">Shakers</span></a><span data-dcnode-id="5049" instrument_node="">, who emerged in part from Quakerism in 1747, do not believe that it is acceptable to kill or harm others, even in times of war.</span><sup class="reference" data-dcnode-id="5046" id="cite_ref-97"><a data-dcnode-id="5047" href="#cite_note-97"><span data-dcnode-id="5048" instrument_node="">[97]</span></a></sup><span data-dcnode-id="5045" instrument_node="">
</span></p><span data-dcnode-id="5043" instrument_node="">
</span><h3 data-dcnode-id="5033"><span class="mw-headline" data-dcnode-id="5041" id="Seventh-day_Adventists"><span data-dcnode-id="5042" instrument_node="">Seventh-day Adventists</span></span><span class="mw-editsection" data-dcnode-id="5034"><span class="mw-editsection-bracket" data-dcnode-id="5039"><span data-dcnode-id="5040" instrument_node="">[</span></span><a data-dcnode-id="5037" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DChristian_pacifism%26action%3Dedit%26section%3D21" title="Edit section: Seventh-day Adventists"><span data-dcnode-id="5038" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5035"><span data-dcnode-id="5036" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5032" instrument_node="">
</span><p data-dcnode-id="5023"><span data-dcnode-id="5031" instrument_node="">During the American Civil War in 1864, shortly after the formation of the </span><a data-dcnode-id="5029" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Seventh-day_Adventist_Church" title="Seventh-day Adventist Church"><span data-dcnode-id="5030" instrument_node="">Seventh-day Adventist Church</span></a><span data-dcnode-id="5028" instrument_node="">, the Seventh-day Adventists declared, "The denomination of Christians calling themselves Seventh-day Adventists, taking the Bible as their rule of faith and practice, are unanimous in their views that its teaching are contrary to the spirit and practice of war; hence, they have ever been conscientiously opposed to bearing arms."</span><sup class="reference" data-dcnode-id="5025" id="cite_ref-98"><a data-dcnode-id="5026" href="#cite_note-98"><span data-dcnode-id="5027" instrument_node="">[98]</span></a></sup><span data-dcnode-id="5024" instrument_node="">
