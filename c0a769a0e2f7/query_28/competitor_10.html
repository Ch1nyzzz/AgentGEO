</span><div class="thumb tright" data-dcnode-id="9586"><div class="thumbinner" data-dcnode-id="9587" style="width:222px;"><a class="image" data-dcnode-id="9597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ABlessed_are_the_Peacemakers.gif"><img alt="" class="thumbimage" data-dcnode-id="9598" data-file-height="432" data-file-width="349" decoding="async" height="272" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/1/1f/Blessed_are_the_Peacemakers.gif/220px-Blessed_are_the_Peacemakers.gif&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/1/1f/Blessed_are_the_Peacemakers.gif/330px-Blessed_are_the_Peacemakers.gif 1.5x, //upload.wikimedia.org/wikipedia/commons/1/1f/Blessed_are_the_Peacemakers.gif 2x" width="220"></a><span data-dcnode-id="9596" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="9588"><div class="magnify" data-dcnode-id="9594"><a class="internal" data-dcnode-id="9595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ABlessed_are_the_Peacemakers.gif" title="Enlarge"></a></div><i data-dcnode-id="9592"><span data-dcnode-id="9593" instrument_node="">Blessed are the Peacemakers</span></i><span data-dcnode-id="9591" instrument_node=""> (1917) by </span><a data-dcnode-id="9589" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/George_Bellows" title="George Bellows"><span data-dcnode-id="9590" instrument_node="">George Bellows</span></a></div></div></div><span data-dcnode-id="9585" instrument_node="">
</span><p data-dcnode-id="9537"><b data-dcnode-id="9583"><span data-dcnode-id="9584" instrument_node="">Christian pacifism</span></b><span data-dcnode-id="9582" instrument_node=""> is the </span><a data-dcnode-id="9580" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Christian_theology" title="Christian theology"><span data-dcnode-id="9581" instrument_node="">theological</span></a><span data-dcnode-id="9579" instrument_node=""> and </span><a data-dcnode-id="9577" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Christian_ethics" title="Christian ethics"><span data-dcnode-id="9578" instrument_node="">ethical</span></a><span data-dcnode-id="9576" instrument_node=""> position according to which </span><a data-dcnode-id="9574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pacifism" title="Pacifism"><span data-dcnode-id="9575" instrument_node="">pacifism</span></a><span data-dcnode-id="9573" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="9571" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Non-violence" title="Non-violence"><span data-dcnode-id="9572" instrument_node="">non-violence</span></a><span data-dcnode-id="9570" instrument_node=""> have both a scriptural and rational basis for Christians, and affirms that any form of violence is incompatible with the Christian faith.</span><sup class="reference" data-dcnode-id="9567" id="cite_ref-1"><a data-dcnode-id="9568" href="#cite_note-1"><span data-dcnode-id="9569" instrument_node="">[1]</span></a></sup><span data-dcnode-id="9566" instrument_node=""> Christian pacifists state that Jesus himself was a pacifist who taught and practiced pacifism and that his followers must do likewise. Notable Christian pacifists include </span><a data-dcnode-id="9564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Martin_Luther_King_Jr." title="Martin Luther King Jr."><span data-dcnode-id="9565" instrument_node="">Martin Luther King Jr.</span></a><span data-dcnode-id="9563" instrument_node="">, </span><a data-dcnode-id="9561" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Leo_Tolstoy" title="Leo Tolstoy"><span data-dcnode-id="9562" instrument_node="">Leo Tolstoy</span></a><span data-dcnode-id="9560" instrument_node="">,</span><sup class="reference" data-dcnode-id="9557" id="cite_ref-2"><a data-dcnode-id="9558" href="#cite_note-2"><span data-dcnode-id="9559" instrument_node="">[2]</span></a></sup><span data-dcnode-id="9556" instrument_node=""> </span><a data-dcnode-id="9554" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Adin_Ballou" title="Adin Ballou"><span data-dcnode-id="9555" instrument_node="">Adin Ballou</span></a><span data-dcnode-id="9553" instrument_node=""> and </span><a data-dcnode-id="9551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ammon_Hennacy" title="Ammon Hennacy"><span data-dcnode-id="9552" instrument_node="">Ammon Hennacy</span></a><span data-dcnode-id="9550" instrument_node="">. Ballou and Hennacy believed that adherence to Christianity required not just pacifism but, because governments inevitably threatened or used force to resolve conflicts, </span><a data-dcnode-id="9548" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Christian_anarchism" title="Christian anarchism"><span data-dcnode-id="9549" instrument_node="">anarchism</span></a><span data-dcnode-id="9547" instrument_node="">. However, most Christian pacifists, including the </span><a data-dcnode-id="9545" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peace_churches" title="Peace churches"><span data-dcnode-id="9546" instrument_node="">peace churches</span></a><span data-dcnode-id="9544" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="9542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Christian_Peacemaker_Teams" title="Christian Peacemaker Teams"><span data-dcnode-id="9543" instrument_node="">Christian Peacemaker Teams</span></a><span data-dcnode-id="9541" instrument_node="">, and individuals such as </span><a data-dcnode-id="9539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Howard_Yoder" title="John Howard Yoder"><span data-dcnode-id="9540" instrument_node="">John Howard Yoder</span></a><span data-dcnode-id="9538" instrument_node="">, make no claim to be anarchists.
</span></p><span data-dcnode-id="9536" instrument_node="">

</span><h3 data-dcnode-id="9207"><span class="mw-headline" data-dcnode-id="9215" id="Old_Testament"><span data-dcnode-id="9216" instrument_node="">Old Testament</span></span><span class="mw-editsection" data-dcnode-id="9208"><span class="mw-editsection-bracket" data-dcnode-id="9213"><span data-dcnode-id="9214" instrument_node="">[</span></span><a data-dcnode-id="9211" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DChristian_pacifism%26action%3Dedit%26section%3D2" title="Edit section: Old Testament"><span data-dcnode-id="9212" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="9209"><span data-dcnode-id="9210" instrument_node="">]</span></span></span></h3><span data-dcnode-id="9206" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="9185"><div class="thumbinner" data-dcnode-id="9186" style="width:222px;"><a class="image" data-dcnode-id="9204" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ALevites_reading_the_law_to_the_people.jpg"><img alt="" class="thumbimage" data-dcnode-id="9205" data-file-height="789" data-file-width="613" decoding="async" height="283" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/d/d7/Levites_reading_the_law_to_the_people.jpg/220px-Levites_reading_the_law_to_the_people.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/d/d7/Levites_reading_the_law_to_the_people.jpg/330px-Levites_reading_the_law_to_the_people.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/d/d7/Levites_reading_the_law_to_the_people.jpg/440px-Levites_reading_the_law_to_the_people.jpg 2x" width="220"></a><span data-dcnode-id="9203" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="9187"><div class="magnify" data-dcnode-id="9201"><a class="internal" data-dcnode-id="9202" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ALevites_reading_the_law_to_the_people.jpg" title="Enlarge"></a></div><span data-dcnode-id="9200" instrument_node="">A </span><a data-dcnode-id="9198" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tribe_of_Levi" title="Tribe of Levi"><span data-dcnode-id="9199" instrument_node="">Levite</span></a><span data-dcnode-id="9197" instrument_node=""> reading </span><a data-dcnode-id="9195" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Law_of_Moses" title="Law of Moses"><span data-dcnode-id="9196" instrument_node="">the Law</span></a><span data-dcnode-id="9194" instrument_node=""> to the Israelites. </span><a data-dcnode-id="9192" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Maimonides" title="Maimonides"><span data-dcnode-id="9193" instrument_node="">The Rambam</span></a><span data-dcnode-id="9191" instrument_node=""> famously rules that members of the tribe of Levi do not fight in the army.</span><sup class="reference" data-dcnode-id="9188" id="cite_ref-3"><a data-dcnode-id="9189" href="#cite_note-3"><span data-dcnode-id="9190" instrument_node="">[3]</span></a></sup></div></div></div><span data-dcnode-id="9184" instrument_node="">
</span><p data-dcnode-id="9148"><span data-dcnode-id="9183" instrument_node="">Roots of Christian pacifism can be found in the scriptures of the </span><a data-dcnode-id="9181" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Old_Testament" title="Old Testament"><span data-dcnode-id="9182" instrument_node="">Old Testament</span></a><span data-dcnode-id="9180" instrument_node=""> according to Baylor University professor of religion, John A. Wood.</span><sup class="reference" data-dcnode-id="9177" id="cite_ref-:0_4-0"><a data-dcnode-id="9178" href="#cite_note-:0-4"><span data-dcnode-id="9179" instrument_node="">[4]</span></a></sup><span data-dcnode-id="9176" instrument_node=""> Millard C. Lind explains the theology of warfare in ancient Israel as God directing the people of Israel to trust in Him, not in the warring way of the nations, and to seek peace not coercive power. Stephen B. Chapman expresses the Old Testament describes God's divine intervention, not human power politics, or the warring king, as key to the preservation of Israel.</span><sup class="reference" data-dcnode-id="9173" id="cite_ref-:5_5-0"><a data-dcnode-id="9174" href="#cite_note-:5-5"><span data-dcnode-id="9175" instrument_node="">[5]</span></a></sup><span data-dcnode-id="9172" instrument_node=""> Lind asserts the Old Testament reflects that God occasionally sanctions, even commands wars to the point of God actually fighting utilizing the forces of nature, miraculous acts or other nations.</span><sup class="reference" data-dcnode-id="9169" id="cite_ref-:1_6-0"><a data-dcnode-id="9170" href="#cite_note-:1-6"><span data-dcnode-id="9171" instrument_node="">[6]</span></a></sup><span data-dcnode-id="9168" instrument_node=""> Lind further argues God fights so that Israel does not have to fight wars like other nations because God delivers them.</span><sup class="reference" data-dcnode-id="9165" id="cite_ref-:1_6-1"><a data-dcnode-id="9166" href="#cite_note-:1-6"><span data-dcnode-id="9167" instrument_node="">[6]</span></a></sup><span data-dcnode-id="9164" instrument_node=""> God promised to fight for Israel, to be an enemy to their enemies and oppose all that oppose them (Exodus 23:22).</span><sup class="reference" data-dcnode-id="9161" id="cite_ref-7"><a data-dcnode-id="9162" href="#cite_note-7"><span data-dcnode-id="9163" instrument_node="">[7]</span></a></sup><span data-dcnode-id="9160" instrument_node=""> Pacifist, </span><a data-dcnode-id="9158" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Howard_Yoder" title="John Howard Yoder"><span data-dcnode-id="9159" instrument_node="">John Howard Yoder</span></a><span data-dcnode-id="9157" instrument_node=""> explains God sustained and directed his community not by power politics but by the creative power of God's word, of speaking through the law and the prophets.</span><sup class="reference" data-dcnode-id="9154" id="cite_ref-:2_8-0"><a data-dcnode-id="9155" href="#cite_note-:2-8"><span data-dcnode-id="9156" instrument_node="">[8]</span></a></sup><span data-dcnode-id="9153" instrument_node=""> The scriptures in the Old Testament provide background of God's great victory over evil, sin and death. Stephen Vantassel contends the Old Testament exists to put the issue of war and killing in historical and situational context.</span><sup class="reference" data-dcnode-id="9150" id="cite_ref-9"><a data-dcnode-id="9151" href="#cite_note-9"><span data-dcnode-id="9152" instrument_node="">[9]</span></a></sup><span data-dcnode-id="9149" instrument_node="">
</span></p><p data-dcnode-id="9120"><span data-dcnode-id="9147" instrument_node="">Throughout the Old Testament, there is a movement in the role of war. Stephen B. Chapman, associate professor of Old Testament at Duke University asserts God used war to conquer and provide the Promised Land to Israel, and then to defend that land. The Old Testament explains that Israel does not have to fight wars like other nations because God delivers them.</span><sup class="reference" data-dcnode-id="9144" id="cite_ref-:5_5-1"><a data-dcnode-id="9145" href="#cite_note-:5-5"><span data-dcnode-id="9146" instrument_node="">[5]</span></a></sup><span data-dcnode-id="9143" instrument_node=""> Starting with the Exodus out of Egypt, God fights for Israel as a warrior rescuing His people from the oppressive Egyptians (Exodus 15:3).</span><sup class="reference" data-dcnode-id="9140" id="cite_ref-10"><a data-dcnode-id="9141" href="#cite_note-10"><span data-dcnode-id="9142" instrument_node="">[10]</span></a></sup><span data-dcnode-id="9139" instrument_node=""> In Exodus 14:13,</span><sup class="reference" data-dcnode-id="9136" id="cite_ref-11"><a data-dcnode-id="9137" href="#cite_note-11"><span data-dcnode-id="9138" instrument_node="">[11]</span></a></sup><span data-dcnode-id="9135" instrument_node=""> </span><a data-dcnode-id="9133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Moses" title="Moses"><span data-dcnode-id="9134" instrument_node="">Moses</span></a><span data-dcnode-id="9132" instrument_node=""> instructs the Israelites, "The Lord will fight for you; you need only to be still." The miraculous parting of the Red Sea is God being a warrior for Israel through acts of nature and not human armies.</span><sup class="reference" data-dcnode-id="9129" id="cite_ref-:1_6-2"><a data-dcnode-id="9130" href="#cite_note-:1-6"><span data-dcnode-id="9131" instrument_node="">[6]</span></a></sup><span data-dcnode-id="9128" instrument_node=""> God's promise to fight on behalf of his chosen people is affirmed in the scriptures of the Old Testament (Deuteronomy 1:30).</span><sup class="reference" data-dcnode-id="9125" id="cite_ref-12"><a data-dcnode-id="9126" href="#cite_note-12"><span data-dcnode-id="9127" instrument_node="">[12]</span></a></sup><sup class="reference" data-dcnode-id="9122" id="cite_ref-:3_13-0"><a data-dcnode-id="9123" href="#cite_note-:3-13"><span data-dcnode-id="9124" instrument_node="">[13]</span></a></sup><span data-dcnode-id="9121" instrument_node="">
</span></p><p data-dcnode-id="9095"><span data-dcnode-id="9119" instrument_node="">According to Old Testament scholar Peter C. Craige, during the military conquests of the Promised Land, the Israelites fought in real wars against real human enemies; however, it was God who granted them victory in their battles.</span><sup class="reference" data-dcnode-id="9116" id="cite_ref-:3_13-1"><a data-dcnode-id="9117" href="#cite_note-:3-13"><span data-dcnode-id="9118" instrument_node="">[13]</span></a></sup><span data-dcnode-id="9115" instrument_node=""> Craige further contends God determined the outcome of human events with his participation through those humans and their activity; essentially, that God fought through the fighting of his people.</span><sup class="reference" data-dcnode-id="9112" id="cite_ref-:3_13-2"><a data-dcnode-id="9113" href="#cite_note-:3-13"><span data-dcnode-id="9114" instrument_node="">[13]</span></a></sup><span data-dcnode-id="9111" instrument_node=""> Once the Promised Land was secured, and the nation of Israel progressed, God used war to protect or punish the nation of Israel with his sovereign control of the nations to achieve his purposes (2 Kings 18:9–12, Jeremiah 25:8–9, Habakkuk 1:5–11).</span><sup class="reference" data-dcnode-id="9108" id="cite_ref-14"><a data-dcnode-id="9109" href="#cite_note-14"><span data-dcnode-id="9110" instrument_node="">[14]</span></a></sup><span data-dcnode-id="9107" instrument_node=""> Yoder affirms as long as Israel trusted and followed God, God would work his power through Israel to drive occupants from lands God willed them to occupy (Exodus 23:27–33).</span><sup class="reference" data-dcnode-id="9104" id="cite_ref-15"><a data-dcnode-id="9105" href="#cite_note-15"><span data-dcnode-id="9106" instrument_node="">[15]</span></a></sup><sup class="reference" data-dcnode-id="9101" id="cite_ref-:2_8-1"><a data-dcnode-id="9102" href="#cite_note-:2-8"><span data-dcnode-id="9103" instrument_node="">[8]</span></a></sup><span data-dcnode-id="9100" instrument_node=""> The future of Israel was dependent solely on its faith and obedience to God as mediated through the Law and prophets, and not on military strength.</span><sup class="reference" data-dcnode-id="9097" id="cite_ref-:0_4-1"><a data-dcnode-id="9098" href="#cite_note-:0-4"><span data-dcnode-id="9099" instrument_node="">[4]</span></a></sup><span data-dcnode-id="9096" instrument_node="">
</span></p><p data-dcnode-id="9071"><span data-dcnode-id="9094" instrument_node="">Jacob Enz explains God made a covenant with his people of Israel, placing conditions on them that they were to worship only him, and be obedient to the laws of life in the Ten Commandments.</span><sup class="reference" data-dcnode-id="9091" id="cite_ref-:4_16-0"><a data-dcnode-id="9092" href="#cite_note-:4-16"><span data-dcnode-id="9093" instrument_node="">[16]</span></a></sup><span data-dcnode-id="9090" instrument_node=""> When Israel trusted and obeyed God, the nation prospered; when they rebelled, God spoke through prophets such as Ezekiel and Isaiah, telling Israel that God would wage war against Israel to punish her (Isaiah 59:15-19).</span><sup class="reference" data-dcnode-id="9087" id="cite_ref-17"><a data-dcnode-id="9088" href="#cite_note-17"><span data-dcnode-id="9089" instrument_node="">[17]</span></a></sup><sup class="reference" data-dcnode-id="9084" id="cite_ref-18"><a data-dcnode-id="9085" href="#cite_note-18"><span data-dcnode-id="9086" instrument_node="">[18]</span></a></sup><span data-dcnode-id="9083" instrument_node=""> War was used in God's ultimate purpose of restoring peace and harmony for the whole earth with the intention towards salvation of all the nations with the coming of the </span><a data-dcnode-id="9081" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Messiah" title="Messiah"><span data-dcnode-id="9082" instrument_node="">Messiah</span></a><span data-dcnode-id="9080" instrument_node=""> and a new covenant. Jacob Enz describes God's plan was to use the nation of Israel for a higher purpose, and that purpose was to be the mediator between all the peoples and God.</span><sup class="reference" data-dcnode-id="9077" id="cite_ref-:4_16-1"><a data-dcnode-id="9078" href="#cite_note-:4-16"><span data-dcnode-id="9079" instrument_node="">[16]</span></a></sup><span data-dcnode-id="9076" instrument_node=""> The Old Testament reflects how God helped his people of Israel, even after Israel's repeated lapses of faith, demonstrating God's grace, not violence.</span><sup class="reference" data-dcnode-id="9073" id="cite_ref-:4_16-2"><a data-dcnode-id="9074" href="#cite_note-:4-16"><span data-dcnode-id="9075" instrument_node="">[16]</span></a></sup><span data-dcnode-id="9072" instrument_node="">
</span></p><p data-dcnode-id="9058"><span data-dcnode-id="9070" instrument_node="">The Old Testament explains God is the only giver of life and God is sovereign over human life. Man's role is to be a steward who should take care of all of God's creation, and that includes protecting human life. Craige explains God's self-revelation through his participating in human history is referred to as "</span><a class="mw-redirect" data-dcnode-id="9068" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Salvation_History" title="Salvation History"><span data-dcnode-id="9069" instrument_node="">Salvation History</span></a><span data-dcnode-id="9067" instrument_node="">."</span><sup class="reference" data-dcnode-id="9064" id="cite_ref-:3_13-3"><a data-dcnode-id="9065" href="#cite_note-:3-13"><span data-dcnode-id="9066" instrument_node="">[13]</span></a></sup><span data-dcnode-id="9063" instrument_node=""> The main objective of God's participation is man's salvation. God participates in human history by acting through people and in the world that is both in need of salvation, and is thus imperfect. God participates in the human activity of war through sinful human beings for His purpose of bringing salvation to the world.</span><sup class="reference" data-dcnode-id="9060" id="cite_ref-:3_13-4"><a data-dcnode-id="9061" href="#cite_note-:3-13"><span data-dcnode-id="9062" instrument_node="">[13]</span></a></sup><span data-dcnode-id="9059" instrument_node="">
</span></p><p data-dcnode-id="9036"><span data-dcnode-id="9057" instrument_node="">Studies conducted by scholars Friedrich Schwally, Johannes Pedersen, Patrick D. Miller, Rudolf Smend and Gerhard von Rad maintain the wars of Israel in the Old Testament were by God's divine command.</span><sup class="reference" data-dcnode-id="9054" id="cite_ref-:1_6-3"><a data-dcnode-id="9055" href="#cite_note-:1-6"><span data-dcnode-id="9056" instrument_node="">[6]</span></a></sup><span data-dcnode-id="9053" instrument_node=""> This divine activity took place in a world of sinful men and activities, such as war. God's participation through evil human activity such as war was for the sole purposes of both redemption and judgment.</span><sup class="reference" data-dcnode-id="9050" id="cite_ref-:3_13-5"><a data-dcnode-id="9051" href="#cite_note-:3-13"><span data-dcnode-id="9052" instrument_node="">[13]</span></a></sup><span data-dcnode-id="9049" instrument_node=""> God's presence in these Old Testament wars does not justify or deem them holy, and instead is interpreted as servi g to provide hope in a situation of hopelessness.</span><sup class="reference" data-dcnode-id="9046" id="cite_ref-:3_13-6"><a data-dcnode-id="9047" href="#cite_note-:3-13"><span data-dcnode-id="9048" instrument_node="">[13]</span></a></sup><span data-dcnode-id="9045" instrument_node=""> The sixth commandment, "Thou shalt not kill" (Exodus 20:13) and the fundamental principle it holds true is that reverence for human life must be given the highest importance. The Old Testament points to a time when weapons of war shall be transformed into the instruments of peace, and the hope for the consummation of the Kingdom of God when there will be no more war.</span><sup class="reference" data-dcnode-id="9042" id="cite_ref-:3_13-7"><a data-dcnode-id="9043" href="#cite_note-:3-13"><span data-dcnode-id="9044" instrument_node="">[13]</span></a></sup><span data-dcnode-id="9041" instrument_node=""> Wood points to the scriptures of Isaiah and Micah (Isaiah 2:2–4; 9:5; 11:1–9; and Micah 4:1–7) that express the pacifist view of God's plan to bring peace without violence.</span><sup class="reference" data-dcnode-id="9038" id="cite_ref-:0_4-2"><a data-dcnode-id="9039" href="#cite_note-:0-4"><span data-dcnode-id="9040" instrument_node="">[4]</span></a></sup><span data-dcnode-id="9037" instrument_node="">
</span></p><span data-dcnode-id="9035" instrument_node="">
</span><h3 data-dcnode-id="9025"><span class="mw-headline" data-dcnode-id="9033" id="Ministry_of_Jesus"><span data-dcnode-id="9034" instrument_node="">Ministry of Jesus</span></span><span class="mw-editsection" data-dcnode-id="9026"><span class="mw-editsection-bracket" data-dcnode-id="9031"><span data-dcnode-id="9032" instrument_node="">[</span></span><a data-dcnode-id="9029" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DChristian_pacifism%26action%3Dedit%26section%3D3" title="Edit section: Ministry of Jesus"><span data-dcnode-id="9030" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="9027"><span data-dcnode-id="9028" instrument_node="">]</span></span></span></h3><span data-dcnode-id="9024" instrument_node="">

</span><div class="thumb tright" data-dcnode-id="8965"><div class="thumbinner" data-dcnode-id="8966" style="width:222px;"><a class="image" data-dcnode-id="8982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AEcce_homo_by_Antonio_Ciseri_%281%29.jpg"><img alt="" class="thumbimage" data-dcnode-id="8983" data-file-height="612" data-file-width="799" decoding="async" height="169" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/d/de/Ecce_homo_by_Antonio_Ciseri_%25281%2529.jpg/220px-Ecce_homo_by_Antonio_Ciseri_%25281%2529.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/d/de/Ecce_homo_by_Antonio_Ciseri_%281%29.jpg/330px-Ecce_homo_by_Antonio_Ciseri_%281%29.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/d/de/Ecce_homo_by_Antonio_Ciseri_%281%29.jpg/440px-Ecce_homo_by_Antonio_Ciseri_%281%29.jpg 2x" width="220"></a><span data-dcnode-id="8981" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="8967"><div class="magnify" data-dcnode-id="8979"><a class="internal" data-dcnode-id="8980" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AEcce_homo_by_Antonio_Ciseri_%281%29.jpg" title="Enlarge"></a></div><span data-dcnode-id="8976" title="Latin-language text"><i data-dcnode-id="8977" lang="la"><span data-dcnode-id="8978" instrument_node="">Ecce Homo</span></i></span><span data-dcnode-id="8975" instrument_node=""> (</span><abbr data-dcnode-id="8973" title="circa"><span data-dcnode-id="8974" instrument_node="">c.</span></abbr><span data-dcnode-id="8971" style="white-space:nowrap;"><span data-dcnode-id="8972" instrument_node=""> 1880</span></span><span data-dcnode-id="8970" instrument_node="">) by </span><a data-dcnode-id="8968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Antonio_Ciseri" title="Antonio Ciseri"><span data-dcnode-id="8969" instrument_node="">Antonio Ciseri</span></a></div></div></div><span data-dcnode-id="8964" instrument_node="">
</span><p data-dcnode-id="8950"><a data-dcnode-id="8962" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jesus" title="Jesus"><span data-dcnode-id="8963" instrument_node="">Jesus</span></a><span data-dcnode-id="8961" instrument_node=""> appeared to teach pacifism during </span><a data-dcnode-id="8959" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ministry_of_Jesus" title="Ministry of Jesus"><span data-dcnode-id="8960" instrument_node="">his ministry</span></a><span data-dcnode-id="8958" instrument_node=""> when he told his </span><a data-dcnode-id="8956" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Disciple_%28Christianity%29" title="Disciple (Christianity)"><span data-dcnode-id="8957" instrument_node="">disciples</span></a><span data-dcnode-id="8955" instrument_node="">:</span><sup class="reference" data-dcnode-id="8952" id="cite_ref-19"><a data-dcnode-id="8953" href="#cite_note-19"><span data-dcnode-id="8954" instrument_node="">[19]</span></a></sup><span data-dcnode-id="8951" instrument_node="">
</span></p><span data-dcnode-id="8949" instrument_node="">
</span><blockquote class="templatequote" data-dcnode-id="8931"><p data-dcnode-id="8939"><span data-dcnode-id="8946" instrument_node="">You have heard that it was said, 'An </span><a data-dcnode-id="8944" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eye_for_an_eye" title="Eye for an eye"><span data-dcnode-id="8945" instrument_node="">eye for an eye</span></a><span data-dcnode-id="8943" instrument_node="">, and a tooth for a tooth.' But I tell you, do not resist an evil person. If someone strikes you on the right cheek, </span><a data-dcnode-id="8941" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Turning_the_other_cheek" title="Turning the other cheek"><span data-dcnode-id="8942" instrument_node="">turn to him the other also</span></a><span data-dcnode-id="8940" instrument_node="">.</span></p><div class="templatequotecite" data-dcnode-id="8932"><span data-dcnode-id="8938" instrument_node="">— </span><cite data-dcnode-id="8933"><span data-dcnode-id="8937" instrument_node="">Matthew 5:38–39</span><sup class="reference" data-dcnode-id="8934" id="cite_ref-20"><a data-dcnode-id="8935" href="#cite_note-20"><span data-dcnode-id="8936" instrument_node="">[20]</span></a></sup></cite></div></blockquote><span data-dcnode-id="8930" instrument_node="">
</span><link data-dcnode-id="8929" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="8917"><p data-dcnode-id="8925"><a class="mw-redirect" data-dcnode-id="8927" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Love_your_enemies" title="Love your enemies"><span data-dcnode-id="8928" instrument_node="">Love your enemies</span></a><span data-dcnode-id="8926" instrument_node="">, do good to those who hate you, bless those who curse you, pray for those who mistreat you.</span></p><div class="templatequotecite" data-dcnode-id="8918"><span data-dcnode-id="8924" instrument_node="">— </span><cite data-dcnode-id="8919"><span data-dcnode-id="8923" instrument_node="">Matthew 5:43–48, Luke 6:27–28</span><sup class="reference" data-dcnode-id="8920" id="cite_ref-21"><a data-dcnode-id="8921" href="#cite_note-21"><span data-dcnode-id="8922" instrument_node="">[21]</span></a></sup></cite></div></blockquote><span data-dcnode-id="8916" instrument_node="">
</span><link data-dcnode-id="8915" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="8902"><p data-dcnode-id="8910"><span data-dcnode-id="8914" instrument_node="">Put your sword back in its place… for all who </span><a data-dcnode-id="8912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Live_by_the_sword%2C_die_by_the_sword" title="Live by the sword, die by the sword"><span data-dcnode-id="8913" instrument_node="">draw the sword will die by the sword</span></a><span data-dcnode-id="8911" instrument_node="">.</span></p><div class="templatequotecite" data-dcnode-id="8903"><span data-dcnode-id="8909" instrument_node="">— </span><cite data-dcnode-id="8904"><span data-dcnode-id="8908" instrument_node="">Matthew 26:52</span><sup class="reference" data-dcnode-id="8905" id="cite_ref-22"><a data-dcnode-id="8906" href="#cite_note-22"><span data-dcnode-id="8907" instrument_node="">[22]</span></a></sup></cite></div></blockquote><span data-dcnode-id="8901" instrument_node="">
</span><link data-dcnode-id="8900" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="8888"><p data-dcnode-id="8896"><a data-dcnode-id="8898" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Beatitudes" title="Beatitudes"><span data-dcnode-id="8899" instrument_node="">Blessed are the peacemakers</span></a><span data-dcnode-id="8897" instrument_node="">, for they shall be called sons of God.</span></p><div class="templatequotecite" data-dcnode-id="8889"><span data-dcnode-id="8895" instrument_node="">— </span><cite data-dcnode-id="8890"><span data-dcnode-id="8894" instrument_node="">Matthew 5:9</span><sup class="reference" data-dcnode-id="8891" id="cite_ref-23"><a data-dcnode-id="8892" href="#cite_note-23"><span data-dcnode-id="8893" instrument_node="">[23]</span></a></sup></cite></div></blockquote><span data-dcnode-id="8887" instrument_node="">
</span><h3 data-dcnode-id="8877"><span class="mw-headline" data-dcnode-id="8885" id="Early_Church"><span data-dcnode-id="8886" instrument_node="">Early Church</span></span><span class="mw-editsection" data-dcnode-id="8878"><span class="mw-editsection-bracket" data-dcnode-id="8883"><span data-dcnode-id="8884" instrument_node="">[</span></span><a data-dcnode-id="8881" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DChristian_pacifism%26action%3Dedit%26section%3D4" title="Edit section: Early Church"><span data-dcnode-id="8882" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8879"><span data-dcnode-id="8880" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8876" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="8862"><div class="thumbinner" data-dcnode-id="8863" style="width:172px;"><a class="image" data-dcnode-id="8874" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ACrist%25C3%25B3v%25C3%25A3o_de_Figueiredo_-_Mart%25C3%25ADrio_de_Santo_Hip%25C3%25B3lito.jpg"><img alt="" class="thumbimage" data-dcnode-id="8875" data-file-height="565" data-file-width="486" decoding="async" height="198" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/3/31/Crist%25C3%25B3v%25C3%25A3o_de_Figueiredo_-_Mart%25C3%25ADrio_de_Santo_Hip%25C3%25B3lito.jpg/170px-Crist%25C3%25B3v%25C3%25A3o_de_Figueiredo_-_Mart%25C3%25ADrio_de_Santo_Hip%25C3%25B3lito.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/3/31/Crist%C3%B3v%C3%A3o_de_Figueiredo_-_Mart%C3%ADrio_de_Santo_Hip%C3%B3lito.jpg/255px-Crist%C3%B3v%C3%A3o_de_Figueiredo_-_Mart%C3%ADrio_de_Santo_Hip%C3%B3lito.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/3/31/Crist%C3%B3v%C3%A3o_de_Figueiredo_-_Mart%C3%ADrio_de_Santo_Hip%C3%B3lito.jpg/340px-Crist%C3%B3v%C3%A3o_de_Figueiredo_-_Mart%C3%ADrio_de_Santo_Hip%C3%B3lito.jpg 2x" width="170"></a><span data-dcnode-id="8873" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="8864"><div class="magnify" data-dcnode-id="8871"><a class="internal" data-dcnode-id="8872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ACrist%25C3%25B3v%25C3%25A3o_de_Figueiredo_-_Mart%25C3%25ADrio_de_Santo_Hip%25C3%25B3lito.jpg" title="Enlarge"></a></div><span data-dcnode-id="8868" title="Spanish-language text"><i data-dcnode-id="8869" lang="es"><span data-dcnode-id="8870" instrument_node="">Martírio de Santo Hipólito</span></i></span><span data-dcnode-id="8867" instrument_node=""> (Martyrdom of Saint Hippolytus) by </span><a data-dcnode-id="8865" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Crist%25C3%25B3v%25C3%25A3o_de_Figueiredo" title="Cristóvão de Figueiredo"><span data-dcnode-id="8866" instrument_node="">Cristóvão de Figueiredo</span></a></div></div></div><span data-dcnode-id="8861" instrument_node="">
</span><p data-dcnode-id="8735"><span data-dcnode-id="8860" instrument_node="">Several </span><a data-dcnode-id="8858" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Church_Fathers" title="Church Fathers"><span data-dcnode-id="8859" instrument_node="">Church Fathers</span></a><span data-dcnode-id="8857" instrument_node=""> interpreted Jesus' teachings as advocating </span><a data-dcnode-id="8855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nonviolence" title="Nonviolence"><span data-dcnode-id="8856" instrument_node="">nonviolence</span></a><span data-dcnode-id="8854" instrument_node="">.</span><sup class="reference" data-dcnode-id="8851" id="cite_ref-24"><a data-dcnode-id="8852" href="#cite_note-24"><span data-dcnode-id="8853" instrument_node="">[24]</span></a></sup><span data-dcnode-id="8850" instrument_node=""> For example, </span><a data-dcnode-id="8848" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Justin_Martyr" title="Justin Martyr"><span data-dcnode-id="8849" instrument_node="">Justin Martyr</span></a><span data-dcnode-id="8847" instrument_node=""> writes, "we who formerly used to murder one another do not only now refrain from making war upon our enemies, but also, that we may not lie nor deceive our examiners, willingly die confessing Christ,"</span><sup class="reference" data-dcnode-id="8844" id="cite_ref-25"><a data-dcnode-id="8845" href="#cite_note-25"><span data-dcnode-id="8846" instrument_node="">[25]</span></a></sup><span data-dcnode-id="8843" instrument_node=""> and, "we who were filled with war, and mutual slaughter, and every wickedness, have each through the whole earth changed our warlike weapons,—our swords into ploughshares, and our spears into implements of tillage,—and we cultivate piety…".</span><sup class="reference" data-dcnode-id="8840" id="cite_ref-26"><a data-dcnode-id="8841" href="#cite_note-26"><span data-dcnode-id="8842" instrument_node="">[26]</span></a></sup><span data-dcnode-id="8839" instrument_node=""> </span><a data-dcnode-id="8837" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tatian" title="Tatian"><span data-dcnode-id="8838" instrument_node="">Tatian</span></a><span data-dcnode-id="8836" instrument_node=""> writes rhat "I am not anxious to be rich; I decline military command … Die to the world, repudiating the madness that is in it";</span><sup class="reference" data-dcnode-id="8833" id="cite_ref-27"><a data-dcnode-id="8834" href="#cite_note-27"><span data-dcnode-id="8835" instrument_node="">[27]</span></a></sup><span data-dcnode-id="8832" instrument_node=""> and </span><a data-dcnode-id="8830" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aristides_of_Athens" title="Aristides of Athens"><span data-dcnode-id="8831" instrument_node="">Aristides</span></a><span data-dcnode-id="8829" instrument_node=""> writes that "Through love towards their oppressors, they persuade them to become Christians."</span><sup class="reference" data-dcnode-id="8826" id="cite_ref-28"><a data-dcnode-id="8827" href="#cite_note-28"><span data-dcnode-id="8828" instrument_node="">[28]</span></a></sup><span data-dcnode-id="8825" instrument_node=""> </span><a data-dcnode-id="8823" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hippolytus_of_Rome" title="Hippolytus of Rome"><span data-dcnode-id="8824" instrument_node="">Hippolytus of Rome</span></a><span data-dcnode-id="8822" instrument_node=""> went so far as to deny </span><a class="mw-redirect" data-dcnode-id="8820" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soldiers" title="Soldiers"><span data-dcnode-id="8821" instrument_node="">soldiers</span></a><span data-dcnode-id="8819" instrument_node=""> </span><a data-dcnode-id="8817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Baptism" title="Baptism"><span data-dcnode-id="8818" instrument_node="">baptism</span></a><span data-dcnode-id="8816" instrument_node="">: "A soldier of the civil authority must be taught not to kill men and to refuse to do so if he is commanded, and to refuse to take an oath. If he is unwilling to comply, he must be rejected for baptism."</span><sup class="reference" data-dcnode-id="8813" id="cite_ref-29"><a data-dcnode-id="8814" href="#cite_note-29"><span data-dcnode-id="8815" instrument_node="">[29]</span></a></sup><span data-dcnode-id="8812" instrument_node=""> </span><a data-dcnode-id="8810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tertullian" title="Tertullian"><span data-dcnode-id="8811" instrument_node="">Tertullian</span></a><span data-dcnode-id="8809" instrument_node=""> formed an early argument against </span><a data-dcnode-id="8807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Statolatry" title="Statolatry"><span data-dcnode-id="8808" instrument_node="">statolatry</span></a><span data-dcnode-id="8806" instrument_node="">, "There is no agreement between the divine and the human </span><a data-dcnode-id="8804" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sacrament" title="Sacrament"><span data-dcnode-id="8805" instrument_node="">sacrament</span></a><span data-dcnode-id="8803" instrument_node="">, the standard of </span><a class="mw-redirect" data-dcnode-id="8801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Christ" title="Christ"><span data-dcnode-id="8802" instrument_node="">Christ</span></a><span data-dcnode-id="8800" instrument_node=""> and the standard of </span><a class="mw-redirect" data-dcnode-id="8798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_devil" title="The devil"><span data-dcnode-id="8799" instrument_node="">the devil</span></a><span data-dcnode-id="8797" instrument_node="">, the camp of light and the camp of darkness. One soul cannot be due to two masters—God and </span><a data-dcnode-id="8795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Caesar_%28title%29" title="Caesar (title)"><span data-dcnode-id="8796" instrument_node="">Cæsar</span></a><span data-dcnode-id="8794" instrument_node="">," also writing, "the People warred: if it pleases you to sport with the subject. But how will a Christian man war, nay, how will he serve even in peace, without a sword, which the Lord has taken away?"</span><sup class="reference" data-dcnode-id="8791" id="cite_ref-30"><a data-dcnode-id="8792" href="#cite_note-30"><span data-dcnode-id="8793" instrument_node="">[30]</span></a></sup><span data-dcnode-id="8790" instrument_node=""> </span><a data-dcnode-id="8788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Origen" title="Origen"><span data-dcnode-id="8789" instrument_node="">Origen</span></a><span data-dcnode-id="8787" instrument_node="">, whose father </span><a data-dcnode-id="8785" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Leonides_of_Alexandria" title="Leonides of Alexandria"><span data-dcnode-id="8786" instrument_node="">Leonidus</span></a><span data-dcnode-id="8784" instrument_node=""> was martyred during the persecution of the Roman emperor </span><a data-dcnode-id="8782" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Septimius_Severus" title="Septimius Severus"><span data-dcnode-id="8783" instrument_node="">Septimius Severus</span></a><span data-dcnode-id="8781" instrument_node=""> in the year 202 AD, writes, "Jews […] were permitted to take up arms in defence of the members of their families, and to slay their enemies, the Christian Lawgiver [has] altogether forbidden the putting of men to death […] He nowhere teaches that it is right for His own disciples to offer violence to any one, however wicked."</span><sup class="reference" data-dcnode-id="8778" id="cite_ref-31"><a data-dcnode-id="8779" href="#cite_note-31"><span data-dcnode-id="8780" instrument_node="">[31]</span></a></sup><span data-dcnode-id="8777" instrument_node=""> Further examples include </span><a data-dcnode-id="8775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arnobius" title="Arnobius"><span data-dcnode-id="8776" instrument_node="">Arnobius</span></a><span data-dcnode-id="8774" instrument_node="">, "evil ought not to be requited with evil, that it is better to suffer wrong than to inflict it, that we should rather shed our own blood than stain our hands and our </span><a data-dcnode-id="8772" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Conscience" title="Conscience"><span data-dcnode-id="8773" instrument_node="">conscience</span></a><span data-dcnode-id="8771" instrument_node=""> with that of another, an ungrateful world is now for a long period enjoying a benefit from Christ";</span><sup class="reference" data-dcnode-id="8768" id="cite_ref-32"><a data-dcnode-id="8769" href="#cite_note-32"><span data-dcnode-id="8770" instrument_node="">[32]</span></a></sup><span data-dcnode-id="8767" instrument_node=""> </span><a data-dcnode-id="8765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Archelaus_%28bishop_of_Carrhae%29" title="Archelaus (bishop of Carrhae)"><span data-dcnode-id="8766" instrument_node="">Archelaus</span></a><span data-dcnode-id="8764" instrument_node="">, "many [soldiers] were added to the faith of our Lord Jesus Christ and threw off the belt of military service";</span><sup class="reference" data-dcnode-id="8761" id="cite_ref-33"><a data-dcnode-id="8762" href="#cite_note-33"><span data-dcnode-id="8763" instrument_node="">[33]</span></a></sup><span data-dcnode-id="8760" instrument_node=""> </span><a class="mw-redirect" data-dcnode-id="8758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cyprian_of_Carthage" title="Cyprian of Carthage"><span data-dcnode-id="8759" instrument_node="">Cyprian of Carthage</span></a><span data-dcnode-id="8757" instrument_node="">, "The whole world is wet with mutual blood; and murder, which in the case of an individual is admitted to be a crime, is called a virtue when it is committed wholesale";</span><sup class="reference" data-dcnode-id="8754" id="cite_ref-34"><a data-dcnode-id="8755" href="#cite_note-34"><span data-dcnode-id="8756" instrument_node="">[34]</span></a></sup><span data-dcnode-id="8753" instrument_node=""> and </span><a data-dcnode-id="8751" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lactantius" title="Lactantius"><span data-dcnode-id="8752" instrument_node="">Lactantius</span></a><span data-dcnode-id="8750" instrument_node="">, "For when God forbids us to kill, He not only prohibits us from open violence, which is not even allowed by the public laws, but He warns us against the commission of those things which are esteemed lawful among men. Thus it will be neither lawful for a just man to engage in warfare";</span><sup class="reference" data-dcnode-id="8747" id="cite_ref-35"><a data-dcnode-id="8748" href="#cite_note-35"><span data-dcnode-id="8749" instrument_node="">[35]</span></a></sup><span data-dcnode-id="8746" instrument_node=""> while </span><a data-dcnode-id="8744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gregory_of_Nyssa" title="Gregory of Nyssa"><span data-dcnode-id="8745" instrument_node="">Gregory of Nyssa</span></a><span data-dcnode-id="8743" instrument_node=""> conveys the spirit of </span><a data-dcnode-id="8741" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anarchism" title="Anarchism"><span data-dcnode-id="8742" instrument_node="">anarchism</span></a><span data-dcnode-id="8740" instrument_node="">, "How can a man be master of another's life, if he is not even master of his own? Hence he ought to be poor in spirit, and look at Him who for our sake became poor of His own will; let him consider that we are all equal by nature, and not exalt himself impertinently against his own race."</span><sup class="reference" data-dcnode-id="8737" id="cite_ref-36"><a data-dcnode-id="8738" href="#cite_note-36"><span data-dcnode-id="8739" instrument_node="">[36]</span></a></sup><span data-dcnode-id="8736" instrument_node="">
</span></p><p data-dcnode-id="8690"><a class="mw-redirect" data-dcnode-id="8733" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Saint_Maximilian_of_Tebessa" title="Saint Maximilian of Tebessa"><span data-dcnode-id="8734" instrument_node="">Saint Maximilian of Tebessa</span></a><span data-dcnode-id="8732" instrument_node=""> was executed by the order of the proconsul Dion for his refusal to serve in the Roman army as he thought killing was evil; he became recognized as a </span><a data-dcnode-id="8730" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Christian_martyr" title="Christian martyr"><span data-dcnode-id="8731" instrument_node="">Christian martyr</span></a><span data-dcnode-id="8729" instrument_node="">.</span><sup class="reference" data-dcnode-id="8726" id="cite_ref-Franciscan2021_37-0"><a data-dcnode-id="8727" href="#cite_note-Franciscan2021-37"><span data-dcnode-id="8728" instrument_node="">[37]</span></a></sup><span data-dcnode-id="8725" instrument_node=""> However, many early Christians also </span><a data-dcnode-id="8723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Christians_in_the_military" title="Christians in the military"><span data-dcnode-id="8724" instrument_node="">served in the army</span></a><span data-dcnode-id="8722" instrument_node="">,</span><sup class="reference" data-dcnode-id="8719" id="cite_ref-38"><a data-dcnode-id="8720" href="#cite_note-38"><span data-dcnode-id="8721" instrument_node="">[38]</span></a></sup><sup class="reference" data-dcnode-id="8716" id="cite_ref-39"><a data-dcnode-id="8717" href="#cite_note-39"><span data-dcnode-id="8718" instrument_node="">[39]</span></a></sup><span data-dcnode-id="8715" instrument_node=""> with multiple </span><a data-dcnode-id="8713" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Military_saint" title="Military saint"><span data-dcnode-id="8714" instrument_node="">military saints</span></a><span data-dcnode-id="8712" instrument_node=""> before the time of </span><a class="mw-redirect" data-dcnode-id="8710" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Constantine_I" title="Constantine I"><span data-dcnode-id="8711" instrument_node="">Constantine</span></a><span data-dcnode-id="8709" instrument_node="">, and the presence of large numbers of Christians in his army may have been a factor in the conversion of Constantine to Christianity.</span><sup class="reference" data-dcnode-id="8706" id="cite_ref-40"><a data-dcnode-id="8707" href="#cite_note-40"><span data-dcnode-id="8708" instrument_node="">[40]</span></a></sup><span data-dcnode-id="8705" instrument_node=""> </span><a data-dcnode-id="8703" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Marcus_Aurelius" title="Marcus Aurelius"><span data-dcnode-id="8704" instrument_node="">Marcus Aurelius</span></a><span data-dcnode-id="8702" instrument_node=""> allegedly reported to the Roman Senate that his Christian soldiers fought with prayers instead of conventional weapons,</span><sup class="reference" data-dcnode-id="8699" id="cite_ref-41"><a data-dcnode-id="8700" href="#cite_note-41"><span data-dcnode-id="8701" instrument_node="">[41]</span></a></sup><span data-dcnode-id="8698" instrument_node=""> which resulted in the Rain Miracle</span><sup class="reference" data-dcnode-id="8695" id="cite_ref-42"><a data-dcnode-id="8696" href="#cite_note-42"><span data-dcnode-id="8697" instrument_node="">[42]</span></a></sup><span data-dcnode-id="8694" instrument_node=""> of the </span><a data-dcnode-id="8692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Marcomannic_Wars" title="Marcomannic Wars"><span data-dcnode-id="8693" instrument_node="">Marcomannic Wars</span></a><span data-dcnode-id="8691" instrument_node="">.
</span></p><span data-dcnode-id="8689" instrument_node="">
</span><h3 data-dcnode-id="8679"><span class="mw-headline" data-dcnode-id="8687" id="Conversion_of_the_Roman_Empire"><span data-dcnode-id="8688" instrument_node="">Conversion of the Roman Empire</span></span><span class="mw-editsection" data-dcnode-id="8680"><span class="mw-editsection-bracket" data-dcnode-id="8685"><span data-dcnode-id="8686" instrument_node="">[</span></span><a data-dcnode-id="8683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DChristian_pacifism%26action%3Dedit%26section%3D5" title="Edit section: Conversion of the Roman Empire"><span data-dcnode-id="8684" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8681"><span data-dcnode-id="8682" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8678" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="8662"><div class="thumbinner" data-dcnode-id="8663" style="width:172px;"><a class="image" data-dcnode-id="8676" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ALouis_Anselme_Longa%2C_La_charit%25C3%25A9_de_saint_Martin.jpg"><img alt="" class="thumbimage" data-dcnode-id="8677" data-file-height="1755" data-file-width="1778" decoding="async" height="168" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/7/75/Louis_Anselme_Longa%252C_La_charit%25C3%25A9_de_saint_Martin.jpg/170px-Louis_Anselme_Longa%252C_La_charit%25C3%25A9_de_saint_Martin.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/7/75/Louis_Anselme_Longa%2C_La_charit%C3%A9_de_saint_Martin.jpg/255px-Louis_Anselme_Longa%2C_La_charit%C3%A9_de_saint_Martin.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/7/75/Louis_Anselme_Longa%2C_La_charit%C3%A9_de_saint_Martin.jpg/340px-Louis_Anselme_Longa%2C_La_charit%C3%A9_de_saint_Martin.jpg 2x" width="170"></a><span data-dcnode-id="8675" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="8664"><div class="magnify" data-dcnode-id="8673"><a class="internal" data-dcnode-id="8674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ALouis_Anselme_Longa%2C_La_charit%25C3%25A9_de_saint_Martin.jpg" title="Enlarge"></a></div><span data-dcnode-id="8668" title="French-language text"><i data-dcnode-id="8669" lang="fr"><span data-dcnode-id="8672" instrument_node="">La Charité de </span><a data-dcnode-id="8670" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Martin_of_Tours" title="Martin of Tours"><span data-dcnode-id="8671" instrument_node="">Saint-Martin</span></a></i></span><span data-dcnode-id="8667" instrument_node=""> (The Charity of Saint Martin) by </span><a data-dcnode-id="8665" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Louis-Anselme_Longa" title="Louis-Anselme Longa"><span data-dcnode-id="8666" instrument_node="">Louis-Anselme Longa</span></a></div></div></div><span data-dcnode-id="8661" instrument_node="">
</span><div class="hatnote navigation-not-searchable" data-dcnode-id="8655" role="note"><span data-dcnode-id="8658" instrument_node="">See also: </span><a class="mw-redirect" data-dcnode-id="8656" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Constantine_I_and_Christianity" title="Constantine I and Christianity"><span data-dcnode-id="8657" instrument_node="">Constantine I and Christianity</span></a></div><span data-dcnode-id="8654" instrument_node="">
</span><p data-dcnode-id="8607"><span data-dcnode-id="8653" instrument_node="">After the Roman Emperor Constantine converted in AD 312 and began to conquer "in Christ's name", Christianity became entangled with the state, and warfare and violence were increasingly justified by influential Christians. For example, </span><a data-dcnode-id="8651" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Augustine_of_Hippo" title="Augustine of Hippo"><span data-dcnode-id="8652" instrument_node="">Augustine of Hippo</span></a><span data-dcnode-id="8650" instrument_node=""> advocated for state persecution of </span><a data-dcnode-id="8648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Donatism" title="Donatism"><span data-dcnode-id="8649" instrument_node="">Donatists</span></a><span data-dcnode-id="8647" instrument_node="">,</span><sup class="reference" data-dcnode-id="8644" id="cite_ref-43"><a data-dcnode-id="8645" href="#cite_note-43"><span data-dcnode-id="8646" instrument_node="">[43]</span></a></sup><span data-dcnode-id="8643" instrument_node=""> while, according to </span><a class="mw-redirect" data-dcnode-id="8641" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Athanasius" title="Athanasius"><span data-dcnode-id="8642" instrument_node="">Athanasius</span></a><span data-dcnode-id="8640" instrument_node="">, "it is not right to kill, yet in war it is lawful and praiseworthy to destroy the enemy; accordingly not only are they who have distinguished themselves in the field held worthy of great honours, but monuments are put up proclaiming their achievements."</span><sup class="reference" data-dcnode-id="8637" id="cite_ref-44"><a data-dcnode-id="8638" href="#cite_note-44"><span data-dcnode-id="8639" instrument_node="">[44]</span></a></sup><span data-dcnode-id="8636" instrument_node=""> Some scholars believe that "the accession of Constantine terminated the pacifist period in church history."</span><sup class="reference" data-dcnode-id="8633" id="cite_ref-45"><a data-dcnode-id="8634" href="#cite_note-45"><span data-dcnode-id="8635" instrument_node="">[45]</span></a></sup><span data-dcnode-id="8632" instrument_node=""> Nevertheless, the tradition of Christian pacifism was carried on by a few dedicated Christians throughout the ages, such as </span><a data-dcnode-id="8630" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Martin_of_Tours" title="Martin of Tours"><span data-dcnode-id="8631" instrument_node="">Martin of Tours</span></a><span data-dcnode-id="8629" instrument_node="">, who converted during the early days of Christianity in Europe. Martin, who was then a young soldier, declared in AD 336, "I am a soldier of Christ. I cannot fight."</span><sup class="reference" data-dcnode-id="8626" id="cite_ref-Kurlansky_46-0"><a data-dcnode-id="8627" href="#cite_note-Kurlansky-46"><span data-dcnode-id="8628" instrument_node="">[46]</span></a></sup><span data-dcnode-id="8625" instrument_node=""> He was jailed for this action, but later released, eventually became just the third </span><a data-dcnode-id="8623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Roman_Catholic_Archdiocese_of_Tours" title="Roman Catholic Archdiocese of Tours"><span data-dcnode-id="8624" instrument_node="">Bishop of Tours</span></a><span data-dcnode-id="8622" instrument_node="">.</span><sup class="reference" data-dcnode-id="8619" id="cite_ref-Kurlansky_46-1"><a data-dcnode-id="8620" href="#cite_note-Kurlansky-46"><span data-dcnode-id="8621" instrument_node="">[46]</span></a></sup><span data-dcnode-id="8618" instrument_node=""> </span><a data-dcnode-id="8616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jerome" title="Jerome"><span data-dcnode-id="8617" instrument_node="">Jerome</span></a><span data-dcnode-id="8615" instrument_node=""> also writes, "To die is the lot of all, to commit </span><a data-dcnode-id="8613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Homicide" title="Homicide"><span data-dcnode-id="8614" instrument_node="">homicide</span></a><span data-dcnode-id="8612" instrument_node=""> only of the weak man."</span><sup class="reference" data-dcnode-id="8609" id="cite_ref-47"><a data-dcnode-id="8610" href="#cite_note-47"><span data-dcnode-id="8611" instrument_node="">[47]</span></a></sup><span data-dcnode-id="8608" instrument_node="">
</span></p><span data-dcnode-id="8606" instrument_node="">
</span><h3 data-dcnode-id="8596"><span class="mw-headline" data-dcnode-id="8604" id="Middle_Ages"><span data-dcnode-id="8605" instrument_node="">Middle Ages</span></span><span class="mw-editsection" data-dcnode-id="8597"><span class="mw-editsection-bracket" data-dcnode-id="8602"><span data-dcnode-id="8603" instrument_node="">[</span></span><a data-dcnode-id="8600" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DChristian_pacifism%26action%3Dedit%26section%3D6" title="Edit section: Middle Ages"><span data-dcnode-id="8601" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8598"><span data-dcnode-id="8599" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8595" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="8575"><div class="thumbinner" data-dcnode-id="8576" style="width:172px;"><a class="image" data-dcnode-id="8593" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASt_Boniface_-_Baptising-Martyrdom_-_Sacramentary_of_Fulda_-_11Century.jpg"><img alt="" class="thumbimage" data-dcnode-id="8594" data-file-height="777" data-file-width="543" decoding="async" height="243" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/7/79/St_Boniface_-_Baptising-Martyrdom_-_Sacramentary_of_Fulda_-_11Century.jpg/170px-St_Boniface_-_Baptising-Martyrdom_-_Sacramentary_of_Fulda_-_11Century.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/7/79/St_Boniface_-_Baptising-Martyrdom_-_Sacramentary_of_Fulda_-_11Century.jpg/255px-St_Boniface_-_Baptising-Martyrdom_-_Sacramentary_of_Fulda_-_11Century.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/7/79/St_Boniface_-_Baptising-Martyrdom_-_Sacramentary_of_Fulda_-_11Century.jpg/340px-St_Boniface_-_Baptising-Martyrdom_-_Sacramentary_of_Fulda_-_11Century.jpg 2x" width="170"></a><span data-dcnode-id="8592" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="8577"><div class="magnify" data-dcnode-id="8590"><a class="internal" data-dcnode-id="8591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASt_Boniface_-_Baptising-Martyrdom_-_Sacramentary_of_Fulda_-_11Century.jpg" title="Enlarge"></a></div><a data-dcnode-id="8588" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fulda" title="Fulda"><span data-dcnode-id="8589" instrument_node="">Fulda</span></a><span data-dcnode-id="8587" instrument_node=""> </span><a data-dcnode-id="8585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sacramentary" title="Sacramentary"><span data-dcnode-id="8586" instrument_node="">Sacramentary</span></a><span data-dcnode-id="8584" instrument_node="">, </span><a data-dcnode-id="8582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Saint_Boniface" title="Saint Boniface"><span data-dcnode-id="8583" instrument_node="">Saint Boniface</span></a><span data-dcnode-id="8581" instrument_node=""> baptizing (top) and being </span><a class="mw-redirect" data-dcnode-id="8579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Martyred" title="Martyred"><span data-dcnode-id="8580" instrument_node="">martyred</span></a><span data-dcnode-id="8578" instrument_node=""> (bottom)</span></div></div></div><span data-dcnode-id="8574" instrument_node="">
</span><p data-dcnode-id="8544"><span data-dcnode-id="8573" instrument_node="">According to the Bonifacian </span><a data-dcnode-id="8571" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hagiography" title="Hagiography"><span data-dcnode-id="8572" instrument_node="">hagiography</span></a><span data-dcnode-id="8570" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="8568" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Boniface" title="Boniface"><span data-dcnode-id="8569" instrument_node="">Boniface</span></a><span data-dcnode-id="8567" instrument_node="">, in 754, set out with a </span><a data-dcnode-id="8565" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Retinue" title="Retinue"><span data-dcnode-id="8566" instrument_node="">retinue</span></a><span data-dcnode-id="8564" instrument_node=""> for </span><a data-dcnode-id="8562" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Frisia" title="Frisia"><span data-dcnode-id="8563" instrument_node="">Frisia</span></a><span data-dcnode-id="8561" instrument_node="">, with the hope of converting the </span><a data-dcnode-id="8559" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Frisians" title="Frisians"><span data-dcnode-id="8560" instrument_node="">Frisians</span></a><span data-dcnode-id="8558" instrument_node="">. He baptized a great number and summoned a general meeting for confirmation at a place not far from </span><a data-dcnode-id="8556" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dokkum" title="Dokkum"><span data-dcnode-id="8557" instrument_node="">Dokkum</span></a><span data-dcnode-id="8555" instrument_node="">, between </span><a data-dcnode-id="8553" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Franeker" title="Franeker"><span data-dcnode-id="8554" instrument_node="">Franeker</span></a><span data-dcnode-id="8552" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="8550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Groningen_%28city%29" title="Groningen (city)"><span data-dcnode-id="8551" instrument_node="">Groningen</span></a><span data-dcnode-id="8549" instrument_node="">. Instead of his converts, however, a group of armed robbers appeared who slew the aged archbishop. The hagiography mention that Boniface persuaded his (armed) comrades to lay down their arms: "Cease fighting. Lay down your arms, for we are told in scripture not to render evil for evil but to overcome evil by good."</span><sup class="reference" data-dcnode-id="8546" id="cite_ref-48"><a data-dcnode-id="8547" href="#cite_note-48"><span data-dcnode-id="8548" instrument_node="">[48]</span></a></sup><span data-dcnode-id="8545" instrument_node="">
</span></p><p data-dcnode-id="8535"><span data-dcnode-id="8543" instrument_node="">Having killed Boniface and his company, the Frisian bandits ransacked their possessions but found that the company's luggage did not contain the riches they had hoped for: "they broke open the chests containing the books and found, to their dismay, that they held manuscripts instead of gold vessels, pages of sacred texts instead of </span><a data-dcnode-id="8541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Silver" title="Silver"><span data-dcnode-id="8542" instrument_node="">silver</span></a><span data-dcnode-id="8540" instrument_node=""> plates."</span><sup class="reference" data-dcnode-id="8537" id="cite_ref-49"><a data-dcnode-id="8538" href="#cite_note-49"><span data-dcnode-id="8539" instrument_node="">[49]</span></a></sup><span data-dcnode-id="8536" instrument_node="">
</span></p><p data-dcnode-id="8492"><span data-dcnode-id="8534" instrument_node="">The </span><a data-dcnode-id="8532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peace_and_Truce_of_God" title="Peace and Truce of God"><span data-dcnode-id="8533" instrument_node="">Peace and Truce of God</span></a><span data-dcnode-id="8531" instrument_node=""> was a movement in the </span><a data-dcnode-id="8529" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Christianity_in_the_Middle_Ages" title="Christianity in the Middle Ages"><span data-dcnode-id="8530" instrument_node="">Middle Ages</span></a><span data-dcnode-id="8528" instrument_node=""> led by the Catholic Church and the first mass peace movement in history.</span><sup class="reference" data-dcnode-id="8525" id="cite_ref-50"><a data-dcnode-id="8526" href="#cite_note-50"><span data-dcnode-id="8527" instrument_node="">[50]</span></a></sup><span data-dcnode-id="8524" instrument_node=""> The goal of both the </span><span data-dcnode-id="8521" title="Latin-language text"><i data-dcnode-id="8522" lang="la"><span data-dcnode-id="8523" instrument_node="">Pax Dei</span></i></span><span data-dcnode-id="8520" instrument_node=""> and the </span><span data-dcnode-id="8517" title="Latin-language text"><i data-dcnode-id="8518" lang="la"><span data-dcnode-id="8519" instrument_node="">Treuga Dei</span></i></span><span data-dcnode-id="8516" instrument_node=""> was to limit the violence of </span><a data-dcnode-id="8514" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Feud" title="Feud"><span data-dcnode-id="8515" instrument_node="">feuding</span></a><span data-dcnode-id="8513" instrument_node=""> endemic to the </span><a data-dcnode-id="8511" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/West_Francia" title="West Francia"><span data-dcnode-id="8512" instrument_node="">western half</span></a><span data-dcnode-id="8510" instrument_node=""> of the former </span><a data-dcnode-id="8508" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Carolingian_Empire" title="Carolingian Empire"><span data-dcnode-id="8509" instrument_node="">Carolingian Empire</span></a><span data-dcnode-id="8507" instrument_node=""> – following its collapse in the middle of the </span><a class="mw-redirect" data-dcnode-id="8505" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Treaty_of_verdun" title="Treaty of verdun"><span data-dcnode-id="8506" instrument_node="">9th century</span></a><span data-dcnode-id="8504" instrument_node=""> – using the threat of spiritual sanctions.</span><sup class="reference" data-dcnode-id="8501" id="cite_ref-51"><a data-dcnode-id="8502" href="#cite_note-51"><span data-dcnode-id="8503" instrument_node="">[51]</span></a></sup><span data-dcnode-id="8500" instrument_node=""> The </span><a data-dcnode-id="8498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/East_Francia" title="East Francia"><span data-dcnode-id="8499" instrument_node="">eastern half</span></a><span data-dcnode-id="8497" instrument_node=""> of the former Carolingian Empire did not experience the same collapse of central authority, and neither did England.</span><sup class="reference" data-dcnode-id="8494" id="cite_ref-52"><a data-dcnode-id="8495" href="#cite_note-52"><span data-dcnode-id="8496" instrument_node="">[52]</span></a></sup><span data-dcnode-id="8493" instrument_node="">
</span></p><p data-dcnode-id="8480"><span data-dcnode-id="8491" instrument_node="">The Peace of God was first proclaimed in 989, at the Council of </span><a data-dcnode-id="8489" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Charroux%2C_Vienne" title="Charroux, Vienne"><span data-dcnode-id="8490" instrument_node="">Charroux</span></a><span data-dcnode-id="8488" instrument_node="">. It sought to protect ecclesiastical property, agricultural resources and unarmed clerics.</span><sup class="reference" data-dcnode-id="8485" id="cite_ref-53"><a data-dcnode-id="8486" href="#cite_note-53"><span data-dcnode-id="8487" instrument_node="">[53]</span></a></sup><span data-dcnode-id="8484" instrument_node=""> The Truce of God, first proclaimed in 1027 at the Council of </span><a data-dcnode-id="8482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Toulouges" title="Toulouges"><span data-dcnode-id="8483" instrument_node="">Toulouges</span></a><span data-dcnode-id="8481" instrument_node="">, attempted to limit the days of the week and times of year that the nobility engaged in violence.
</span></p><span data-dcnode-id="8479" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="8464"><div class="thumbinner" data-dcnode-id="8465" style="width:172px;"><a class="image" data-dcnode-id="8477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASt-thomas-aquinas.jpg"><img alt="" class="thumbimage" data-dcnode-id="8478" data-file-height="6000" data-file-width="4004" decoding="async" height="255" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/e/e3/St-thomas-aquinas.jpg/170px-St-thomas-aquinas.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/e/e3/St-thomas-aquinas.jpg/255px-St-thomas-aquinas.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/e/e3/St-thomas-aquinas.jpg/340px-St-thomas-aquinas.jpg 2x" width="170"></a><span data-dcnode-id="8476" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="8466"><div class="magnify" data-dcnode-id="8474"><a class="internal" data-dcnode-id="8475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASt-thomas-aquinas.jpg" title="Enlarge"></a></div><span data-dcnode-id="8473" instrument_node="">An altarpiece of </span><a data-dcnode-id="8471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Thomas_Aquinas" title="Thomas Aquinas"><span data-dcnode-id="8472" instrument_node="">Thomas Aquinas</span></a><span data-dcnode-id="8470" instrument_node=""> in Ascoli Piceno, Italy, by </span><a data-dcnode-id="8468" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Carlo_Crivelli" title="Carlo Crivelli"><span data-dcnode-id="8469" instrument_node="">Carlo Crivelli</span></a><span data-dcnode-id="8467" instrument_node=""> (15th century)</span></div></div></div><span data-dcnode-id="8463" instrument_node="">
</span><p data-dcnode-id="8448"><span data-dcnode-id="8462" instrument_node="">By the </span><a data-dcnode-id="8460" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Christianity_in_the_13th_century" title="Christianity in the 13th century"><span data-dcnode-id="8461" instrument_node="">13th century</span></a><span data-dcnode-id="8459" instrument_node="">, </span><a data-dcnode-id="8457" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Thomas_Aquinas" title="Thomas Aquinas"><span data-dcnode-id="8458" instrument_node="">Thomas Aquinas</span></a><span data-dcnode-id="8456" instrument_node=""> was bold enough to declare, concerning </span><a class="mw-redirect" data-dcnode-id="8454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Heretics" title="Heretics"><span data-dcnode-id="8455" instrument_node="">heretics</span></a><span data-dcnode-id="8453" instrument_node="">, "I answer that […] it is lawful to kill dumb animals, in so far as they are naturally directed to man's use, as the imperfect is directed to the perfect."</span><sup class="reference" data-dcnode-id="8450" id="cite_ref-54"><a data-dcnode-id="8451" href="#cite_note-54"><span data-dcnode-id="8452" instrument_node="">[54]</span></a></sup><span data-dcnode-id="8449" instrument_node="">
</span></p><span data-dcnode-id="8447" instrument_node="">
</span><h3 data-dcnode-id="8437"><span class="mw-headline" data-dcnode-id="8445" id="Cathars"><span data-dcnode-id="8446" instrument_node="">Cathars</span></span><span class="mw-editsection" data-dcnode-id="8438"><span class="mw-editsection-bracket" data-dcnode-id="8443"><span data-dcnode-id="8444" instrument_node="">[</span></span><a data-dcnode-id="8441" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DChristian_pacifism%26action%3Dedit%26section%3D7" title="Edit section: Cathars"><span data-dcnode-id="8442" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8439"><span data-dcnode-id="8440" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8436" instrument_node="">
