There is a very strong correlation between water and wisdom in the Bible — for instance: the verb </span><span class="HebF" data-dcnode-id="1148"><span data-dcnode-id="1149" instrument_node="">נהר</span></span><span data-dcnode-id="1147" instrument_node=""> (</span><a class="reg" data-dcnode-id="1143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Dictionary/n/n-w-r.html"><i data-dcnode-id="1145"><span data-dcnode-id="1146" instrument_node="">nahar</span></i><span data-dcnode-id="1144" instrument_node=""> I</span></a><span data-dcnode-id="1142" instrument_node="">) means to flow and the identical verb </span><span class="HebF" data-dcnode-id="1140"><span data-dcnode-id="1141" instrument_node="">נהר</span></span><span data-dcnode-id="1139" instrument_node=""> (</span><i data-dcnode-id="1137"><span data-dcnode-id="1138" instrument_node="">nahar</span></i><span data-dcnode-id="1136" instrument_node=""> II) means to shine; the noun </span><span class="HebF" data-dcnode-id="1134"><span data-dcnode-id="1135" instrument_node="">נר</span></span><span data-dcnode-id="1133" instrument_node=""> (</span><i data-dcnode-id="1131"><span data-dcnode-id="1132" instrument_node="">ner</span></i><span data-dcnode-id="1130" instrument_node="">) means lamp (hence the familiar word </span><a class="reg" data-dcnode-id="1128" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Menorah.html"><span data-dcnode-id="1129" instrument_node="">Menorah</span></a><span data-dcnode-id="1127" instrument_node="">) and the noun </span><span class="HebF" data-dcnode-id="1125"><span data-dcnode-id="1126" instrument_node="">נהר</span></span><span data-dcnode-id="1124" instrument_node=""> (</span><i data-dcnode-id="1122"><span data-dcnode-id="1123" instrument_node="">nahar</span></i><span data-dcnode-id="1121" instrument_node="">) means river — and the Hebrews were very well aware of the hydrologic cycle and clearly applied it to the concept of knowledge (Ecclesiastes 1:7, Isaiah 55:10-11).</span></p><span data-dcnode-id="1119" instrument_node="">
</span></div><h2 data-dcnode-id="1114" id="anc-12" onclick="fold(this.id)"><span class="foldIcon" data-dcnode-id="1116" id="foldic-12"><span data-dcnode-id="1117" instrument_node="">🔽</span></span><span data-dcnode-id="1115" instrument_node="">The heavenly Bahamas</span></h2><div class="h2rule" data-dcnode-id="1113"></div><div class="fold" data-dcnode-id="1085" id="par-12"><span data-dcnode-id="1112" instrument_node="">
</span><p data-dcnode-id="1110"><span data-dcnode-id="1111" instrument_node="">In the Hebrew view, as much as comes down from heaven must go up to heaven, and rivers flow to the sea as much as the sea goes back to the rivers. Egyptians don't recognize the cyclical nature of these things and only recognize one direction: common folks give their surplus to the ruling elite, who then, somehow, pass it on to the gods, who sit in their high heaven far above. The one-way street of the tribute system is still firmly in place in our world, where John Doe is forced to work himself to death so that wealthy industrialists can race their yachts to the heavenly Bahamas.</span></p><p data-dcnode-id="1099"><span data-dcnode-id="1109" instrument_node="">
The universe is an integrated whole. The specifics are still a bit of a mystery, but the unity of the primordial singularity with which the whole thing began, was never compromised. It never "blew apart" as the popular idea suggests, but expanded in an orderly fashion, controlled by laws that crystallized along with it. These specific laws were derived, step by step, from general laws, but never deviated from the original consistency. That is why scientists can work backwards, unifying the mathematical descriptions of the forces of nature into what they affectionately dub the Grand Unified Theory (and which the Bible affectionately dubs the </span><a class="reg" data-dcnode-id="1107" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Dabar.html"><span data-dcnode-id="1108" instrument_node="">Word of God</span></a><span data-dcnode-id="1106" instrument_node=""> — </span><a class="bibRef reg" data-dcnode-id="1104" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/John/John-1-parsed.html%23AVerse-1"><span data-dcnode-id="1105" instrument_node="">John 1:1-3</span></a><span data-dcnode-id="1103" instrument_node="">, </span><a class="bibRef reg" data-dcnode-id="1101" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/Colossians/Colossians-1-parsed.html%23AVerse-16"><span data-dcnode-id="1102" instrument_node="">Colossians 1:16-17</span></a><span data-dcnode-id="1100" instrument_node="">).</span></p><p data-dcnode-id="1097"><span data-dcnode-id="1098" instrument_node="">
But that means that all our beloved great effigies such as Relativity Theory and the Standard Model only make sense when we can view them relative to the whole. We have no idea how much of the whole these theories describe and how much we are still missing. We have some idea what they do internally, but we have no idea of their place in the greater mechanism of the universe. A thousand years from now, our descendants might look back at us in the same way in which we look back on whoever first harnessed fire and thought that making light made him almost like God.</span></p><p data-dcnode-id="1092"><span data-dcnode-id="1096" instrument_node="">
In Egypt, all effort goes into maintaining the status quo and even if the ruling dynasty is knocked off, the system that made the whole thing possible perpetuates itself at all cost. The cost is mostly carried by John Doe, but wisdom too pays its price. Like everything else, the oneness of wisdom is chopped into parts, and the parts are assessed not relative to the whole of wisdom but to the benefits to the status quo. Parts that explain something enticing (that make money) are dubbed great achievements and their discoverers get Nobel prizes, but parts that cost money are ignored like the inconvenient truths they are. Sometimes an abhorred but perfectly good limb is chopped off and replaced by a fancy wooden leg — for instance (dare we say it?) a detrimentally poorly interpreted creation account which was replaced by the magnificently daft classical </span><a class="reg" data-dcnode-id="1094" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Bible-Evolution.html"><span data-dcnode-id="1095" instrument_node="">evolution theory</span></a><span data-dcnode-id="1093" instrument_node=""> that fanned the major happenings of the 20th century and which in present times even evolutionists begin to criticize.</span></p><p data-dcnode-id="1087"><span data-dcnode-id="1091" instrument_node="">
When Moses went to Egypt to tell the </span><a class="reg" data-dcnode-id="1089" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Pharaoh.html"><span data-dcnode-id="1090" instrument_node="">Pharaoh</span></a><span data-dcnode-id="1088" instrument_node=""> that his way of doing things was unstable and that the unified laws of the universe were going to disintegrate his realm by sheer merit of the second law of thermodynamics and a hardy helping of Hawking radiation (which ultimately turns all giant black holes into myriads of smaller ones; the same fate awaits present giants such as Google and Facebook), Moses was, true to Egyptian form, dragged into a battle of wits with Egyptian scholars of incredible skill (Exodus 7:10-12). Pharaoh was obviously interested in wisdom, but not because he valued wisdom but because it gave him power. While the founder and great rulers of Babylon all deeply respected YHWH, the Pharaoh of Egypt uttered the grotesque and noxious words: "Who is YHWH that I should obey his voice to let Israel go? I do not know YHWH, and besides, I will not let Israel go" (Exodus 5:2).</span></p><span data-dcnode-id="1086" instrument_node="">
</span></div><h2 data-dcnode-id="1081" id="anc-13" onclick="fold(this.id)"><span class="foldIcon" data-dcnode-id="1083" id="foldic-13"><span data-dcnode-id="1084" instrument_node="">🔽</span></span><span data-dcnode-id="1082" instrument_node="">Out of Eden</span></h2><div class="h2rule" data-dcnode-id="1080"></div><div class="fold" data-dcnode-id="1030" id="par-13"><span data-dcnode-id="1079" instrument_node="">
</span><p data-dcnode-id="1056"><span data-dcnode-id="1078" instrument_node="">The earliest reference to the Out-Of-Babylon and Out-Of-Egypt twin-theme occurs of course in Paradise. Many enthusiasts have wondered where the Garden of </span><a class="reg" data-dcnode-id="1076" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Eden.html"><span data-dcnode-id="1077" instrument_node="">Eden</span></a><span data-dcnode-id="1075" instrument_node=""> might have been located, and since the Bible mentions that two of its rivers were the mighty </span><a class="reg" data-dcnode-id="1073" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Tigris.html"><span data-dcnode-id="1074" instrument_node="">Tigris</span></a><span data-dcnode-id="1072" instrument_node=""> of Assyria and </span><a class="reg" data-dcnode-id="1070" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Euphrates.html"><span data-dcnode-id="1071" instrument_node="">Euphrates</span></a><span data-dcnode-id="1069" instrument_node=""> of Babylon (Genesis 2:14), it was at some point concluded that Paradise must have been in Mesopotamia. But this assumption is obviously based on an error, because one of the other two paradisal rivers (even the first or oldest two) flows through Africa, namely the </span><a class="reg" data-dcnode-id="1067" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Gihon.html"><span data-dcnode-id="1068" instrument_node="">Gihon</span></a><span data-dcnode-id="1066" instrument_node="">, which flows around the whole land of </span><a class="reg" data-dcnode-id="1064" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Cush.html"><span data-dcnode-id="1065" instrument_node="">Cush</span></a><span data-dcnode-id="1063" instrument_node="">, which is Nubia (Genesis 2:13). The fourth (or rather the first or oldest) is the </span><a class="reg" data-dcnode-id="1061" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Pishon.html"><span data-dcnode-id="1062" instrument_node="">Pishon</span></a><span data-dcnode-id="1060" instrument_node="">, which flows around </span><a class="reg" data-dcnode-id="1058" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Havilah.html"><span data-dcnode-id="1059" instrument_node="">Havilah</span></a><span data-dcnode-id="1057" instrument_node="">. Where Havilah might have been is unclear, but the Pishon may very well have been the Indus River.
</span></p><p data-dcnode-id="1044"><span data-dcnode-id="1055" instrument_node="">The Garden of Eden, therefore, was spread out over the entire Fertile Crescent, or rather: the whole known world, and the expulsion from it had nothing to do with movement in the geographical sense but in the complexity sense. The Bible progresses along a complexity scale and not a temporal or geographical one (see our articles on the names Abraham or Hebrew), and the Garden was situated in the </span><span class="HebF" data-dcnode-id="1053"><span data-dcnode-id="1054" instrument_node="">קדם</span></span><span data-dcnode-id="1052" instrument_node=""> (</span><a class="reg" data-dcnode-id="1049" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Dictionary/q/q-d-mfin.html"><i data-dcnode-id="1050"><span data-dcnode-id="1051" instrument_node="">qedem</span></i></a><span data-dcnode-id="1048" instrument_node="">), which means "east" only secondarily. This word's primary meaning is "past" or "antiquity" (as in Psalm 74:12: God is my King </span><i data-dcnode-id="1046"><span data-dcnode-id="1047" instrument_node="">from of old</span></i><span data-dcnode-id="1045" instrument_node="">).</span></p><p data-dcnode-id="1036"><span data-dcnode-id="1043" instrument_node="">
Paradise was not somewhere, it </span><i data-dcnode-id="1041"><span data-dcnode-id="1042" instrument_node="">is</span></i><span data-dcnode-id="1040" instrument_node=""> some-</span><i data-dcnode-id="1038"><span data-dcnode-id="1039" instrument_node="">how</span></i><span data-dcnode-id="1037" instrument_node=""> — we lose it every time we let the pendulum swing. Contrary to myth, early man was never a fearful oaf, huddled alone in drafty caves, but was always lord of creation. There was no animal on earth that could come close to thinking about competing with a closely bonded team of two dozen, heavily armed human beings. Thanks to their innate level of synchronicity, creatures such as ants and bees are formidable super-organisms and animals such as dolphins and great apes are so efficient that most of their time is spent in leisure. Human society is like an anthill made from dolphins. Until recently, humans had nothing to fear, and today our only true enemy is ourselves.</span></p><p data-dcnode-id="1034"><span data-dcnode-id="1035" instrument_node="">
According to the archeological record, humans have been making music for at least fifty thousand years and art such as rock paintings for at least thirty. The relatively huge amount of pre-historic art that has miraculously survived from that long ago suggests that the original prevalence must have been staggering. Without a doubt, the old world was a carnival of human intervention and since the animal world is riddled with symbols (color codes, for instance) it seems more than logical that early man was even able to deliberately manipulate the behavior of animals by means of art.</span></p><p data-dcnode-id="1032"><span data-dcnode-id="1033" instrument_node="">
Fruits were growing on trees everywhere and animals were abundant. For thousands and thousands of years, the entire Fertile Crescent was one big Bahama and there were no rich or poor and there was party for all. There is even enticing evidence to suggest that pre-historic man possessed seriously advanced technology, arguably of a kind that we don't even have (yet). The pow-wows of early man were not intended to pursue "progress", but rather an emergency board meeting of the wisdom elite that realized that somehow the wrong kind of people was steering all of mankind away from the good life. Doubtlessly their second great concern was that the perpetrators came from their own ranks: the learned-but-not-too-wise who chose to engage their crafts in service of their own benefit and subsequent disadvantage of the people they were supposed to govern.</span></p><span data-dcnode-id="1031" instrument_node="">
</span></div><h2 data-dcnode-id="1026" id="anc-14" onclick="fold(this.id)"><span class="foldIcon" data-dcnode-id="1028" id="foldic-14"><span data-dcnode-id="1029" instrument_node="">🔽</span></span><span data-dcnode-id="1027" instrument_node="">More on Thing Two</span></h2><div class="h2rule" data-dcnode-id="1025"></div><div class="fold" data-dcnode-id="1008" id="par-14"><span data-dcnode-id="1024" instrument_node="">
</span><p data-dcnode-id="1022"><span data-dcnode-id="1023" instrument_node="">Many of the first century folk who eagerly and earnestly expected the Christ didn't like Jesus because he didn't live up to what they expected the Christ to be, namely a military and political leader who would secure the loot, not someone concerned with the lowest classes. Those people who still today make Jesus out to be something he isn't are the same people who insist that the Torah should either be erroneous history or else historical fiction. The error is, of course, entirely theirs and the Torah is wholly true — albeit not in the way they like it.</span></p><p data-dcnode-id="1020"><span data-dcnode-id="1021" instrument_node="">
The unstoppable William G. Dever roared that the Bible is a minority report (page 173 of WDTBWK) because it only reflects the selective perspectives of the Yahwist-sect, and denies the much broader theological spectrum of archeological Israel, which literally contained every god of the ancient world. But it's much worse than that. Not only does the Bible tell only a very select element of the history of geographic Israel, it tells the history of that one element as it developed world-wide and placed Israel at the epic center of it.</span></p><p data-dcnode-id="1018"><span data-dcnode-id="1019" instrument_node="">
Biblical Israel is like archeological Israel the way Rotterdam, NL, is like Rotterdam, NY; one was named after the other but that's largely where the similarities stop. Archeological Israel grew out of the commercial heart of the known world, and Biblical Israel — the heart of the great global debate on wisdom — was named after it. Of course the great theologies of antiquity were most represented in the country they were named after, but they were not confined to them.</span></p><p data-dcnode-id="1010"><span data-dcnode-id="1017" instrument_node="">
Even in a world full of cherry trees, a book on the history of ice-cream won't mention cherry trees, unless of course where it discusses cherry flavored sundaes. The Bible doesn't give a report of the history of geographic Israel, or else it would have mentioned political milestones and would not assess each king, even foreign kings, on the merits of their service to YHWH. King Ahab, namely, and not Solomon, was the great builder king of geographical Israel, but king Solomon wasn't stacking bricks that can be dug from the dusty ground but the wisdoms and insights upon which our present world still stands. Most of Solomon's legacy wasn't preserved in any recognizable format (1 Kings 4:32, see </span><a class="bibRef reg" data-dcnode-id="1015" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/John/John-20-parsed.html%23AVerse-30"><span data-dcnode-id="1016" instrument_node="">John 20:30</span></a><span data-dcnode-id="1014" instrument_node=""> and </span><a class="bibRef reg" data-dcnode-id="1012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/John/John-21-parsed.html%23AVerse-25"><span data-dcnode-id="1013" instrument_node="">21:25</span></a><span data-dcnode-id="1011" instrument_node="">) just like our earliest childhood memories can't be retrieved in any recognizable form. But what every person learned in the first three years of their lives will forever be the landscape through which all their mental rivers flow seaward.</span></p><span data-dcnode-id="1009" instrument_node="">
</span></div><h2 data-dcnode-id="1004" id="anc-15" onclick="fold(this.id)"><span class="foldIcon" data-dcnode-id="1006" id="foldic-15"><span data-dcnode-id="1007" instrument_node="">🔽</span></span><span data-dcnode-id="1005" instrument_node="">Humanity's greatest shock</span></h2><div class="h2rule" data-dcnode-id="1003"></div><div class="fold" data-dcnode-id="991" id="par-15"><span data-dcnode-id="1002" instrument_node="">
</span><p data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node="">Most people know about the stories of the Torah but are unaware that these stories are like the handful of snapshots folks have of themselves as toddlers. The actual Torah is comparable to nothing, except everything. It's like Shakespeare meets Ramanujan on every steroid known to man. Modern sages like the Vilna Gaon and Shneur Zalman claimed that the Torah contained the whole universe, and the hilarity these statements evoked stilled in gurgling awe with the discovery of DNA: nature indeed works in such a way that a small amount of data might constitute a creature that may truly contain the whole universe like a mental image in its magnificent brain.</span></p><p data-dcnode-id="995"><span data-dcnode-id="999" instrument_node="">
History has its eyes on us, because it is our time of which the prophets spoke: Many nations will join themselves to YHWH in that day and will become my people. Thus says YHWH of Hosts, 'In those days ten men from all the nations will grasp the garment of a Jew, saying, "Let us go with you, for we have heard that God is with you. Then the glory of YHWH will be revealed, and all flesh will see together. Then they will see the Son of Man coming in clouds with great power and glory. And then he will send forth the angels, and will gather together his elect from the four winds, from the farthest end of the earth to the farthest end of heaven". (Zechariah 2:11 and 8:23, Isaiah 40:5, </span><a class="bibRef reg" data-dcnode-id="997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/Mark/Mark-13-parsed.html%23AVerse-27"><span data-dcnode-id="998" instrument_node="">Mark 13:27</span></a><span data-dcnode-id="996" instrument_node="">).</span></p><p data-dcnode-id="993"><span data-dcnode-id="994" instrument_node="">Possibly the greatest shock mankind will have to endure in a very near future may come with the discovery that the service of YHWH was never supposed to be a religion, has always been inevitable and constitutes the very fabric of freedom any which way you look at it. Quite possibly, the most religious people among us are going to be the most disappointed ones when the Lord appears on the clouds for all to see.</span></p><span data-dcnode-id="992" instrument_node="">
</span></div><h2 data-dcnode-id="987" id="anc-16" onclick="fold(this.id)"><span class="foldIcon" data-dcnode-id="989" id="foldic-16"><span data-dcnode-id="990" instrument_node="">🔽</span></span><span data-dcnode-id="988" instrument_node="">And a Man wrestled with him until dawn</span></h2><div class="h2rule" data-dcnode-id="986"></div><div class="fold" data-dcnode-id="961" id="par-16"><p data-dcnode-id="969"><span data-dcnode-id="985" instrument_node="">
The genius of the Torah lies not merely in its stories, but in the connections between its stories — the repeating of themes and forms that allows every story to shed light on all other ones. That's why the gospel writers were so diligent in linking their accounts to the Old Testament. Yet Jesus' "fulfilling" the prior Scriptures (</span><a class="bibRef reg" data-dcnode-id="983" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/Matthew/Matthew-1-parsed.html%23AVerse-22"><span data-dcnode-id="984" instrument_node="">Matthew 1:22</span></a><span data-dcnode-id="982" instrument_node="">, </span><a class="bibRef reg" data-dcnode-id="980" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/Matthew/Matthew-2-parsed.html%23AVerse-15"><span data-dcnode-id="981" instrument_node="">2:15</span></a><span data-dcnode-id="979" instrument_node="">, </span><a class="bibRef reg" data-dcnode-id="977" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/Matthew/Matthew-2-parsed.html%23AVerse-17"><span data-dcnode-id="978" instrument_node="">2:17</span></a><span data-dcnode-id="976" instrument_node="">, </span><a class="bibRef reg" data-dcnode-id="974" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/Matthew/Matthew-2-parsed.html%23AVerse-23"><span data-dcnode-id="975" instrument_node="">2:23</span></a><span data-dcnode-id="973" instrument_node="">, </span><a class="bibRef reg" data-dcnode-id="971" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/Matthew/Matthew-4-parsed.html%23AVerse-14"><span data-dcnode-id="972" instrument_node="">4:14</span></a><span data-dcnode-id="970" instrument_node="">, and so on) had nothing to do with being predicted by them, but with the continuation of the pattern that they had set in motion. The prophets didn't simply predict Jesus in any paranormal sense; they foretold the inevitable blooming of the bud they observed with their human eyes.</span></p><p data-dcnode-id="967"><span data-dcnode-id="968" instrument_node="">
The Hebrew Torah is the purified paper version of the marriage of all the old world's temples, from Giza to Machu Picchu and from Angkor Wat to Puma Punku. It's like a brain in which the recognizable narratives are the gyri and the repeated themes the neural pathways. The Torah unfolds like an infinite umbrella of which the narrative stories are the ribs and the connections form the canvass. And it's that canvass that corresponds to our real-time world; not the spokes. The stories of the Torah are the atoms that form the molecules of our world. The stories are the words that form into the sentences that describe our everyday reality.</span></p><p data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">
Trying to translate the intricate patterns of the Bible into a modern whodunit takes a trick or two, and the Exodus account has countless real-time manifestations. One of them, though, is indeed the story of how the unified and autonomous wisdom tradition called Israel came to pass:</span></p><p data-dcnode-id="963"><span data-dcnode-id="964" instrument_node="">
The first line of the Book of Exodus tells us that once upon a time, the world was mostly Egyptian — which means that all skills and knowledge were enslaved by politicians who had no respect for the unity of both wisdom and creation. 
Wisdom, as an autonomous tradition, went through various stages and specializations, but never deviated from its prime directive, which was to engage the Creator in a mutual struggle of teaching and learning, giving and receiving (Genesis 32).</span></p><span data-dcnode-id="962" instrument_node="">
</span></div><h2 data-dcnode-id="957" id="anc-17" onclick="fold(this.id)"><span class="foldIcon" data-dcnode-id="959" id="foldic-17"><span data-dcnode-id="960" instrument_node="">🔽</span></span><span data-dcnode-id="958" instrument_node="">Now these are the names of the sons of Israel</span></h2><div class="h2rule" data-dcnode-id="956"></div><div class="fold" data-dcnode-id="882" id="par-17"><p data-dcnode-id="945"><span data-dcnode-id="955" instrument_node="">
Jacob's first wife (which in the patriarchal cycles denotes a culture or tradition) was </span><a class="reg" data-dcnode-id="953" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Leah.html"><span data-dcnode-id="954" instrument_node="">Leah</span></a><span data-dcnode-id="952" instrument_node="">, the weary and unloved woman who bore Jacob his first four sons: </span><a class="reg" data-dcnode-id="950" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Reuben.html"><span data-dcnode-id="951" instrument_node="">Reuben</span></a><span data-dcnode-id="949" instrument_node="">, </span><a class="reg" data-dcnode-id="947" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Simeon.html"><span data-dcnode-id="948" instrument_node="">Simeon</span></a><span data-dcnode-id="946" instrument_node="">, Levi and Judah. The brothers Reuben and Simeon appear to denote wisdom's discovery of her self: at some point, humans realized that there is such a thing as having knowledge (Reuben) and began to deliberately search for it (Simeon). Son number three, Levi, appears to denote the level at which society at large develops professional wizards — the word wizard literally means very-wise and denotes a man of wisdom: doctors, sages, engineers, legislators and agents of social cohesion; see the Book Leviticus.</span></p><p data-dcnode-id="943"><span data-dcnode-id="944" instrument_node="">
Note that these Levites (and Simeonites) did not have an inheritance in Israel, because the traits they represented were not tied to any particular application or pursuit. This is why the Levites (and Simeonites) lived everywhere, including in Judah. Hence they too were taken to Babylon and that's why these tribes too survived the imperial era. With son number four, Judah, wisdom appears to have assumed its familiar theoretical form: wisdom for the Lord's sake (for the fun of it) rather than for any practical application (Genesis 29:32-35).</span></p><span data-dcnode-id="942" instrument_node="">
</span><p data-dcnode-id="919"><span data-dcnode-id="941" instrument_node="">Jacob's next two sons came from a subset of his beloved but barren wife </span><a class="reg" data-dcnode-id="939" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Rachel.html"><span data-dcnode-id="940" instrument_node="">Rachel</span></a><span data-dcnode-id="938" instrument_node="">, namely her maid </span><a class="reg" data-dcnode-id="936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Bilhah.html"><span data-dcnode-id="937" instrument_node="">Bilhah</span></a><span data-dcnode-id="935" instrument_node="">. Their names were </span><a class="reg" data-dcnode-id="933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Dan.html"><span data-dcnode-id="934" instrument_node="">Dan</span></a><span data-dcnode-id="932" instrument_node=""> (the invention of formal arbitration?) and </span><a class="reg" data-dcnode-id="930" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Naphtali.html"><span data-dcnode-id="931" instrument_node="">Naphtali</span></a><span data-dcnode-id="929" instrument_node=""> (public or senatorial debate?). Next came two sons of </span><a class="reg" data-dcnode-id="927" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Zilpah.html"><span data-dcnode-id="928" instrument_node="">Zilpah</span></a><span data-dcnode-id="926" instrument_node="">, Leah's maid, namely Gad and </span><a class="reg" data-dcnode-id="924" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Asher.html"><span data-dcnode-id="925" instrument_node="">Asher</span></a><span data-dcnode-id="923" instrument_node="">, who both clearly express collective prosperity and enjoyment, followed by </span><a class="reg" data-dcnode-id="921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Issachar.html"><span data-dcnode-id="922" instrument_node="">Issachar</span></a><span data-dcnode-id="920" instrument_node="">, which means Man-Hire and appears to denote commercial employment.</span></p><p data-dcnode-id="911"><span data-dcnode-id="918" instrument_node="">The name Issachar may denote the invention of commercial autonomy, which constitutes a degree of social freedom, and may also be a deliberate nod to the historical king Sakir-Har (Hire-Hill; same root) of the real-time In-And-Out-Of-Egypt people called the Hyksos. The Hyksos were a mixed people of mostly Semitic origin, who came peacefully to Egypt and gradually took over the north, in part due to a famine. They were eventually expelled and driven toward Israel, and these historical events probably formed the scaffolding of the Biblical account of the Exodus (see Josephus' discussion of Manetho in </span><i data-dcnode-id="916"><span data-dcnode-id="917" instrument_node="">Against Apion</span></i><span data-dcnode-id="915" instrument_node="">, Book I). The Hebrew Levitical tradition may have piggybacked on the Hyksos history; their expulsion from Egypt may explain the Exodus of the whole of Israel in the same way that a whole man is saved when he pulls only one limb from a fire (as explained by Paul in </span><a class="bibRef reg" data-dcnode-id="913" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/1-Corinthians/1-Corinthians-12-parsed.html%23AVerse-26"><span data-dcnode-id="914" instrument_node="">1 Corinthians 12:26</span></a><span data-dcnode-id="912" instrument_node="">).</span></p><p data-dcnode-id="897"><span data-dcnode-id="910" instrument_node="">
Issachar's brother was called </span><a class="reg" data-dcnode-id="908" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Zebulun.html"><span data-dcnode-id="909" instrument_node="">Zebulun</span></a><span data-dcnode-id="907" instrument_node=""> (a stable society). Leah then bore </span><a class="reg" data-dcnode-id="905" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Dinah.html"><span data-dcnode-id="906" instrument_node="">Dinah</span></a><span data-dcnode-id="904" instrument_node="">, which is the feminine version of Dan. Since Dinah is female she does not denote a distinct social identity as her brothers do, but rather the sense of justice and fairness that all common people of a stable society are necessarily endowed with. The story tells that Dinah attracted the attentions of </span><a class="reg" data-dcnode-id="902" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Shechem.html"><span data-dcnode-id="903" instrument_node="">Shechem</span></a><span data-dcnode-id="901" instrument_node=""> the </span><a class="reg" data-dcnode-id="899" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Hivite.html"><span data-dcnode-id="900" instrument_node="">Hivite</span></a><span data-dcnode-id="898" instrument_node="">, who subsequently took her by force (the name Shechem means Sense Of Responsibility). That enraged her brothers Levi and Simeon, who subsequently killed Shechem and his family and all the males of his village.</span></p><p data-dcnode-id="895"><span data-dcnode-id="896" instrument_node="">Perhaps the massacre of Shechem illustrates people's natural tendency to shun responsibility when there is a police force and government to take care of things. The females and children of Shechem were absorbed into Israel (Genesis 34).</span></p><p data-dcnode-id="884"><span data-dcnode-id="894" instrument_node="">
Jacob's final two sons are sons of his beloved Rachel: Joseph appears to denote economic growth as well as a deepening of insight into the human mind, and obviously, Joseph became quite a hit in Egypt. The House of Joseph breached into the half-tribes </span><a class="reg" data-dcnode-id="892" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Ephraim.html"><span data-dcnode-id="893" instrument_node="">Ephraim</span></a><span data-dcnode-id="891" instrument_node=""> and </span><a class="reg" data-dcnode-id="889" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Manasseh.html"><span data-dcnode-id="890" instrument_node="">Manasseh</span></a><span data-dcnode-id="888" instrument_node="">. Joseph's brother </span><a class="reg" data-dcnode-id="886" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Benjamin.html"><span data-dcnode-id="887" instrument_node="">Benjamin</span></a><span data-dcnode-id="885" instrument_node="">, the "beloved of the Lord," according to Moses (Deuteronomy 33:12), had skills of even greater importance, and would have been of greater consequence if he hadn't been Israel's quintessential loser.</span></p><span data-dcnode-id="883" instrument_node="">
</span></div><h2 data-dcnode-id="878" id="anc-18" onclick="fold(this.id)"><span class="foldIcon" data-dcnode-id="880" id="foldic-18"><span data-dcnode-id="881" instrument_node="">🔽</span></span><span data-dcnode-id="879" instrument_node="">Vowels and mainframes</span></h2><div class="h2rule" data-dcnode-id="877"></div><div class="fold" data-dcnode-id="837" id="par-18"><p data-dcnode-id="875"><span data-dcnode-id="876" instrument_node="">
Two of the greatest inventions of mankind are the alphabet and vowel notation. Both were achieved by the ancient Semites and the latter was pure Hebrew.</span></p><p data-dcnode-id="873"><span data-dcnode-id="874" instrument_node="">
We moderns are so used to the alphabet that we tend to forget which vast powers of reason and linguistic theory were required to come up with a thing like that, as well as social synchronicity to explain it and make it go viral. The Hebrews' subsequent invention of using symbols for vowels as well as for consonants made it possible for common people to record and accurately reproduce human thoughts. This was obviously a craft bordering on telepathic magic and opened the door to a super-tight economy as well as mass education of entire populations.</span></p><p data-dcnode-id="849"><span data-dcnode-id="872" instrument_node="">The symbols that the Hebrew wizards (or men of wisdom) began to use to record vowels were the letters </span><span class="HebF" data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">ו</span></span><span data-dcnode-id="869" instrument_node=""> (</span><i data-dcnode-id="867"><span data-dcnode-id="868" instrument_node="">waw</span></i><span data-dcnode-id="866" instrument_node="">), </span><span class="HebF" data-dcnode-id="864"><span data-dcnode-id="865" instrument_node="">ה</span></span><span data-dcnode-id="863" instrument_node=""> (</span><i data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">he</span></i><span data-dcnode-id="860" instrument_node="">) and </span><span class="HebF" data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">י</span></span><span data-dcnode-id="857" instrument_node=""> (</span><a class="reg" data-dcnode-id="854" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Dictionary/y/y.html"><i data-dcnode-id="855"><span data-dcnode-id="856" instrument_node="">yod</span></i></a><span data-dcnode-id="853" instrument_node="">) and this wisdom gave them so much power and so much notoriety that they combined these symbols to form the revelatory name of the Creator: </span><span class="HebF" data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">יהוה</span></span><span data-dcnode-id="850" instrument_node=""> (YHWH).</span></p><p data-dcnode-id="841"><span data-dcnode-id="848" instrument_node="">
Judging from the oldest texts we have, the alphabet was invented to make it easier to keep records of economic transactions. The earliest clerks were clergy — both these words ultimately derive from the noun </span><span class="HebF" data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">κληρος</span></span><span data-dcnode-id="845" instrument_node="">, </span><i data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">kleros</span></i><span data-dcnode-id="842" instrument_node="">, meaning lot, that is allotment; the deed of land or an estate assigned as property — who were obviously part of the wisdom tradition.</span></p><p data-dcnode-id="839"><span data-dcnode-id="840" instrument_node="">
Their incredible invention of the alphabet had the same impact on their society as the invention of the PC had on ours. Prior to the invention of both, information was stored in huge mainframes that only specially initiated nerds had access to: the priesthood and the royalty; the keepers of wisdom, or in modern parlance: Information Technology. When the alphabet was established, every ordinary person could learn how to read and write, get access to information, and most importantly, partake in the great world-wide discussion on how to run this thing called earth.</span></p><span data-dcnode-id="838" instrument_node="">
</span></div><h2 data-dcnode-id="833" id="anc-19" onclick="fold(this.id)"><span class="foldIcon" data-dcnode-id="835" id="foldic-19"><span data-dcnode-id="836" instrument_node="">🔽</span></span><span data-dcnode-id="834" instrument_node="">A kingdom of priests</span></h2><div class="h2rule" data-dcnode-id="832"></div><div class="fold" data-dcnode-id="807" id="par-19"><span data-dcnode-id="831" instrument_node="">
</span><p data-dcnode-id="813"><span data-dcnode-id="830" instrument_node="">In effect this meant that all ordinary people could quickly ascend to the rank of priest (that is someone with access to information), and that is why the Lord said that Israel was to be a kingdom of priests (Exodus 19:6, </span><a class="bibRef reg" data-dcnode-id="828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/1-Peter/1-Peter-2-parsed.html%23AVerse-9"><span data-dcnode-id="829" instrument_node="">1 Peter 2:9</span></a><span data-dcnode-id="827" instrument_node="">, </span><a class="bibRef reg" data-dcnode-id="825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/Revelation/Revelation-1-parsed.html%23AVerse-6"><span data-dcnode-id="826" instrument_node="">Revelation 1:6</span></a><span data-dcnode-id="824" instrument_node="">, </span><a class="bibRef reg" data-dcnode-id="822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/Revelation/Revelation-5-parsed.html%23AVerse-10"><span data-dcnode-id="823" instrument_node="">5:10</span></a><span data-dcnode-id="821" instrument_node="">). And again we'll note that with the word </span><span class="HebF" data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">כהן</span></span><span data-dcnode-id="818" instrument_node=""> (</span><a class="reg" data-dcnode-id="815" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Dictionary/k/k-he-nfin.html"><i data-dcnode-id="816"><span data-dcnode-id="817" instrument_node="">cohen</span></i></a><span data-dcnode-id="814" instrument_node="">), meaning "priest", a wizard is meant, and the word "wizard" means very-wise, and the word "wisdom" means having skills and practical knowledge. In other words: old-world priests were not secluded weirdoes mumbling mysteries whilst performing magic tricks; they were the high-profile engineers, doctors, bankers and professors of their societies.</span></p><p data-dcnode-id="811"><span data-dcnode-id="812" instrument_node="">
Egypt's whole land, however, was covered in hieroglyphs and their social structure was based on the monopoly of their IT nerds, so the Egyptian elite famously resisted adaptation to the alphabet. This too is of course a quintessential quality of archetypal (not geographical) Egypt: the desire to perpetuate a situation that derives all its merits from being temporary. Or in the famous words of Leo Tolstoy: "I know that most men can seldom discern even the simplest and most obvious truth if it would oblige them to admit the falsity of conclusions they have formed — conclusions of which they are proud, which they have taught to others, and on which they have built their lives".</span></p><p data-dcnode-id="809"><span data-dcnode-id="810" instrument_node="">
Egypt clung to their millennia old mainframes and their experts-only IT culture, but the Semites to their north-east swiftly turned their societies into a buzzing internet in which everybody shared all they knew (even with whole specialized towns churning out writings: 1 Chronicles 2:55). This gave the Semites such an advantage that Egypt lost its control over them and began its gradual decline while the Semites entered their golden age. Hence the Biblical story of the Exodus.</span></p><span data-dcnode-id="808" instrument_node="">
</span></div><h2 data-dcnode-id="803" id="anc-20" onclick="fold(this.id)"><span class="foldIcon" data-dcnode-id="805" id="foldic-20"><span data-dcnode-id="806" instrument_node="">🔽</span></span><span data-dcnode-id="804" instrument_node="">Post-Exodus, pre-monarchy</span></h2><div class="h2rule" data-dcnode-id="802"></div><div class="fold" data-dcnode-id="778" id="par-20"><p data-dcnode-id="800"><span data-dcnode-id="801" instrument_node="">
What scientists of the previous two centuries mistook for accidental evolution due to random mutations is in fact an integrated complex system's global response to a local disturbance. In other words: the whole wrestles with the parts as much as each part wrestles with the whole. If we throw a stone in a pond, we'll initially see a severe local disturbance of the water's surface, followed by converging waves, that dampen into ripples, until finally the surface settles as smooth as it was before except a little higher. The biosphere is as integrated as the surface of a pond, and so is the wide world of wisdom. The Semitic invention of the perfect alphabet was a colossal bolder hurled into the pond of the world-wide wisdom tradition and caused quite a stir.</span></p><p data-dcnode-id="798"><span data-dcnode-id="799" instrument_node="">
Make no mistake about it: all writing of our modern world is based on the Semitic alphabet and from the Torah the entire human library Big-Banged into existence. How precisely the Torah was formed isn't clear in a historical sense, but its own story emphasizes the acts of the Rachelite tribes (primarily Ephraim, Manasseh and Benjamin, and secondarily Dan and Naphtali) versus those of Judah.</span></p><p data-dcnode-id="796"><span data-dcnode-id="797" instrument_node="">
Directly after the "conquest", Israel lived in Canaan among the indigenous nations that Israel failed to exterminate (Judges 1). Although the archeological culture of Canaan remained uninterrupted, the wisdom culture looked like a Dalmatian dog, with pockets of true knowledge emerging in a world of folly, superstition and oppression. But the same drive that would in time give humanity the Internet made Israel seek consilience among the various schools and disciplines. To bring that about, the Lord appointed a series of "saviors" or "judges" whose sole mission it was to unite the tribes of Israel against invading or overbearing rival traditions.</span></p><p data-dcnode-id="794"><span data-dcnode-id="795" instrument_node="">
The Book of Judges sits neatly between Joshua and 1 Samuel, which makes it seem as if the narrative runs seamlessly from the conquest into the kingdom years. But that's deceptive. The Book of Judges is a late addition to the Bible, and although it obviously consists of very early material, it was completed at some point after Judah went into exile, and perhaps even after the Return. We know this because it frequently refers to there not being a king over Israel yet (Judges 17:6, 18:1, 19:1, 21:25), which is a statement that must have originated after the monarchy was established. But it also mentions "the day of the captivity of the land" (18:30), which refers almost certainly to the Assyrian and Babylonian conquest of the Levant.</span></p><p data-dcnode-id="780"><span data-dcnode-id="793" instrument_node="">
The Book of Judges tells how consilience was achieved from the perspective of being there. It was a rough ride, the authors seem to say. How rough? </span><i data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">Very</span></i><span data-dcnode-id="790" instrument_node=""> rough! The Book of Judges is besides the most violent Book of the Bible also the most comical, with scenes bordering on slapstick (</span><a class="reg" data-dcnode-id="788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Ehud.html"><span data-dcnode-id="789" instrument_node="">Ehud</span></a><span data-dcnode-id="787" instrument_node="">, </span><a class="reg" data-dcnode-id="785" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Manoah.html"><span data-dcnode-id="786" instrument_node="">Manoah</span></a><span data-dcnode-id="784" instrument_node="">, </span><a class="reg" data-dcnode-id="782" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Samson.html"><span data-dcnode-id="783" instrument_node="">Samson</span></a><span data-dcnode-id="781" instrument_node="">) probably to accentuate the contrast with the more sophisticated Babylonian period. Still, it should be noted that Judges was not merely produced to entertain. The following set of brief statements represents worlds of information and intellectual achievements:</span></p><span data-dcnode-id="779" instrument_node="">
</span></div><h2 data-dcnode-id="774" id="anc-21" onclick="fold(this.id)"><span class="foldIcon" data-dcnode-id="776" id="foldic-21"><span data-dcnode-id="777" instrument_node="">🔽</span></span><span data-dcnode-id="775" instrument_node="">Thirteen Saviors</span></h2><div class="h2rule" data-dcnode-id="773"></div><div class="fold" data-dcnode-id="609" id="par-21"><span data-dcnode-id="772" instrument_node="">
</span><ul data-dcnode-id="760"><li data-dcnode-id="761"><a class="reg" data-dcnode-id="770" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Joshua.html"><span data-dcnode-id="771" instrument_node="">Joshua</span></a><span data-dcnode-id="769" instrument_node=""> of Ephraim (Numbers 13:8, see 13:16), the successor of Moses is not really one of the judges, but he could probably be considered their patriarch in a Biblical sort of way (Judges 2:6-10). The word for "deliverer" (see Judges 3:9, 3:15 etcetera) comes from the same verb as the name Joshua (and Jesus), namely </span><span class="HebF" data-dcnode-id="767"><span data-dcnode-id="768" instrument_node="">ישע</span></span><span data-dcnode-id="766" instrument_node=""> (</span><a class="reg" data-dcnode-id="763" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Dictionary/y/y-si-ay.html"><i data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">yasha'</span></i></a><span data-dcnode-id="762" instrument_node="">).</span></li></ul><span data-dcnode-id="759" instrument_node="">
</span><ol data-dcnode-id="644"><li data-dcnode-id="748"><span data-dcnode-id="758" instrument_node="">The first real judge was </span><a class="reg" data-dcnode-id="756" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Othniel.html"><span data-dcnode-id="757" instrument_node="">Othniel</span></a><span data-dcnode-id="755" instrument_node=""> of Judah (Judges 3:9), who saved Israel from king </span><a class="reg" data-dcnode-id="753" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Cushan-rishathaim.html"><span data-dcnode-id="754" instrument_node="">Cushan-rishathaim</span></a><span data-dcnode-id="752" instrument_node=""> of </span><a class="reg" data-dcnode-id="750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Aram-naharaim.html"><span data-dcnode-id="751" instrument_node="">Aram-naharaim</span></a><span data-dcnode-id="749" instrument_node="">, the place where the wives of Isaac and Jacob came from.</span></li><span data-dcnode-id="747" instrument_node="">
</span><li data-dcnode-id="739"><span data-dcnode-id="746" instrument_node="">Ehud of Benjamin (Judges 3:15) assassinated king </span><a class="reg" data-dcnode-id="744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Eglon.html"><span data-dcnode-id="745" instrument_node="">Eglon</span></a><span data-dcnode-id="743" instrument_node=""> of </span><a class="reg" data-dcnode-id="741" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Moab.html"><span data-dcnode-id="742" instrument_node="">Moab</span></a><span data-dcnode-id="740" instrument_node=""> with a home-made double-edged sword and a ruse, and his army defeated the Moabites.</span></li><span data-dcnode-id="738" instrument_node="">
</span><li data-dcnode-id="733"><span data-dcnode-id="737" instrument_node="">Shamgar, son of </span><a class="reg" data-dcnode-id="735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Anath.html"><span data-dcnode-id="736" instrument_node="">Anath</span></a><span data-dcnode-id="734" instrument_node=""> of unclear origin. All we know of his acts as judge is that he struck down six hundred Philistines with an oxgoad (Judges 3:31).</span></li><span data-dcnode-id="732" instrument_node="">
</span><li data-dcnode-id="709"><span data-dcnode-id="731" instrument_node="">Judge </span><a class="reg" data-dcnode-id="729" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Deborah.html"><span data-dcnode-id="730" instrument_node="">Deborah</span></a><span data-dcnode-id="728" instrument_node=""> of Ephraim together with general </span><a class="reg" data-dcnode-id="726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Barak.html"><span data-dcnode-id="727" instrument_node="">Barak</span></a><span data-dcnode-id="725" instrument_node=""> of Naphtali (Judges 4:5-6) took on king </span><a class="reg" data-dcnode-id="723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Jabin.html"><span data-dcnode-id="724" instrument_node="">Jabin</span></a><span data-dcnode-id="722" instrument_node=""> of Canaan and his general </span><a class="reg" data-dcnode-id="720" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Sisera.html"><span data-dcnode-id="721" instrument_node="">Sisera</span></a><span data-dcnode-id="719" instrument_node="">. The latter would fall by the hand of </span><a class="reg" data-dcnode-id="717" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Jael.html"><span data-dcnode-id="718" instrument_node="">Jael</span></a><span data-dcnode-id="716" instrument_node="">, the wife of </span><a class="reg" data-dcnode-id="714" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Heber.html"><span data-dcnode-id="715" instrument_node="">Heber</span></a><span data-dcnode-id="713" instrument_node=""> the </span><a class="reg" data-dcnode-id="711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Kenite.html"><span data-dcnode-id="712" instrument_node="">Kenite</span></a><span data-dcnode-id="710" instrument_node="">.</span></li><span data-dcnode-id="708" instrument_node="">
</span><li data-dcnode-id="698"><a class="reg" data-dcnode-id="706" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Gideon.html"><span data-dcnode-id="707" instrument_node="">Gideon</span></a><span data-dcnode-id="705" instrument_node=""> of Manasseh (Judges 6:15) demolished local shrines of </span><a class="reg" data-dcnode-id="703" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Baal.html"><span data-dcnode-id="704" instrument_node="">Baal</span></a><span data-dcnode-id="702" instrument_node=""> and </span><a class="reg" data-dcnode-id="700" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Asherah.html"><span data-dcnode-id="701" instrument_node="">Asherah</span></a><span data-dcnode-id="699" instrument_node=""> and defeated the vast Midianite army with 300 carefully selected men.</span></li><span data-dcnode-id="697" instrument_node="">
</span><li data-dcnode-id="693"><a class="reg" data-dcnode-id="695" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Abimelech.html"><span data-dcnode-id="696" instrument_node="">Abimelech</span></a><span data-dcnode-id="694" instrument_node="">, son of Gideon of Manasseh (Judges 9:1) spent his short career mostly avenging his own disgrace by the men of Shechem (obviously reminiscent of the rape of Dinah). He was finally killed when an unnamed woman dropped a millstone on his head from a tower.</span></li><span data-dcnode-id="692" instrument_node="">
</span><li data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">Tola of Ephraim, whose family had originated in Issachar, was a minor judge, whose two decades in office appear to have yielded no events worthy of report (Judges 10:1-2).</span></li><span data-dcnode-id="689" instrument_node="">
</span><li data-dcnode-id="681"><span data-dcnode-id="688" instrument_node="">Likewise judge </span><a class="reg" data-dcnode-id="686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Jair.html"><span data-dcnode-id="687" instrument_node="">Jair</span></a><span data-dcnode-id="685" instrument_node=""> of </span><a class="reg" data-dcnode-id="683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Gilead.html"><span data-dcnode-id="684" instrument_node="">Gilead</span></a><span data-dcnode-id="682" instrument_node="">, which is Manasseh (Judges 10:3).</span></li><span data-dcnode-id="680" instrument_node="">
</span><li data-dcnode-id="668"><span data-dcnode-id="679" instrument_node="">Judge </span><a class="reg" data-dcnode-id="677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Jephthah.html"><span data-dcnode-id="678" instrument_node="">Jephthah</span></a><span data-dcnode-id="676" instrument_node="">, also of Gilead, Manasseh (Judges 11:1), initially engaged the </span><a class="reg" data-dcnode-id="674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Ammon.html"><span data-dcnode-id="675" instrument_node="">Ammonites</span></a><span data-dcnode-id="673" instrument_node=""> in elaborate diplomacy, but was finally forced to defeat them in war. Jephthah became most famous on account of his proverbially foolish vow (Judges 11:30-31), but he also managed to unite Ephraim and Manasseh, albeit with a lot of violence (see our article on the word </span><a class="reg" data-dcnode-id="670" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/shibboleth.html"><i data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">shibboleth</span></i></a><span data-dcnode-id="669" instrument_node="">).</span></li><span data-dcnode-id="667" instrument_node="">
</span><li data-dcnode-id="662"><span data-dcnode-id="666" instrument_node="">Ibzan of </span><a class="reg" data-dcnode-id="664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Bethlehem.html"><span data-dcnode-id="665" instrument_node="">Bethlehem</span></a><span data-dcnode-id="663" instrument_node="">, Judah, was a minor judge (Judges 12:8).</span></li><span data-dcnode-id="661" instrument_node="">
</span><li data-dcnode-id="657"><a class="reg" data-dcnode-id="659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Elon.html"><span data-dcnode-id="660" instrument_node="">Elon</span></a><span data-dcnode-id="658" instrument_node=""> of Zebulun was too (Judges 12:11), although he holds the distinction of being the only judge not from Judah or the Rachelite tribes.</span></li><span data-dcnode-id="656" instrument_node="">
</span><li data-dcnode-id="652"><a class="reg" data-dcnode-id="654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Abdon.html"><span data-dcnode-id="655" instrument_node="">Abdon</span></a><span data-dcnode-id="653" instrument_node=""> of Ephraim was also a minor judge (Judges 12:15).</span></li><span data-dcnode-id="651" instrument_node="">
</span><li data-dcnode-id="646"><span data-dcnode-id="650" instrument_node="">The last of the judges was famous Samson of Dan (Judges 13-16; Dan was the first-born of Bilhah and thus the oldest of the Rachelite tribes). Samson fought mostly against the Philistines. As grand finale of his stormy incumbency, Samson destroyed the Philistine temple of </span><a class="reg" data-dcnode-id="648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Dagon.html"><span data-dcnode-id="649" instrument_node="">Dagon</span></a><span data-dcnode-id="647" instrument_node=""> and all the Philistine nobles, as well as himself.</span></li><span data-dcnode-id="645" instrument_node="">
</span></ol><span data-dcnode-id="643" instrument_node="">
</span><ul data-dcnode-id="628"><li data-dcnode-id="629"><a class="reg" data-dcnode-id="641" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Eli.html"><span data-dcnode-id="642" instrument_node="">Eli</span></a><span data-dcnode-id="640" instrument_node="">, the predecessor of </span><a class="reg" data-dcnode-id="638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Samuel.html"><span data-dcnode-id="639" instrument_node="">Samuel</span></a><span data-dcnode-id="637" instrument_node=""> of Ephraim, was not a judge of the savior type, but rather a priest and thus a Levite, who subsequently "judged" in the legislative sense (</span><span class="HebF" data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">שפט</span></span><span data-dcnode-id="634" instrument_node="">, </span><a class="reg" data-dcnode-id="631" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Dictionary/si/si-p-te.html"><i data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">sepet</span></i></a><span data-dcnode-id="630" instrument_node="">; 1 Samuel 4:18). Samuel of Ephraim likewise could technically be regarded as a pre-monarch judge (1 Samuel 7:15), but neither Eli nor Samuel are part of the deliberate cycle of thirteen judges. In fact, it's obvious that the story of Eli and young Samuel sums up the Book of Judges — or in reverse, that Judges is an interjected spin-off from the older Book(s) of Samuel.</span></li></ul><span data-dcnode-id="627" instrument_node="">
</span><p data-dcnode-id="619"><span data-dcnode-id="626" instrument_node="">After Samson, the tone of the Book of Judges changes and neither the office of the judge nor the Philistines are mentioned again. This indicates that Judges 1-16 and Judges 17-21 were originally separate Books, and the second is as separate and timeless as the Books of </span><a class="reg" data-dcnode-id="624" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Ruth.html"><span data-dcnode-id="625" instrument_node="">Ruth</span></a><span data-dcnode-id="623" instrument_node=""> or </span><a class="reg" data-dcnode-id="621" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Job.html"><span data-dcnode-id="622" instrument_node="">Job</span></a><span data-dcnode-id="620" instrument_node="">, and obviously not part of the original account of the Judges (as said, there are no judges mentioned in Judges 17-21).</span></p><p data-dcnode-id="611"><span data-dcnode-id="618" instrument_node="">
In fact, in Judges 18:1 we are told that Dan had no land yet, which indicates that this account plays before the conquest (or better yet: tells of the "conquest" in a more historically veritable way). In 18:31 we are told that the "House of God" (= </span><a class="reg" data-dcnode-id="616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Bethel.html"><span data-dcnode-id="617" instrument_node="">Bethel</span></a><span data-dcnode-id="615" instrument_node="">, or the Tabernacle) was at </span><a class="reg" data-dcnode-id="613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Shiloh.html"><span data-dcnode-id="614" instrument_node="">Shiloh</span></a><span data-dcnode-id="612" instrument_node="">, but in 21:18-19 we learn that neither Shiloh nor the service to YHWH was connected to Israel, but apparently to the indigenous Canaanites, which brings the scope of our story as far back as the days of Melchizedek (Genesis 14:18).</span></p><span data-dcnode-id="610" instrument_node="">
</span></div><h2 data-dcnode-id="605" id="anc-22" onclick="fold(this.id)"><span class="foldIcon" data-dcnode-id="607" id="foldic-22"><span data-dcnode-id="608" instrument_node="">🔽</span></span><span data-dcnode-id="606" instrument_node="">The serpent of Dan</span></h2><div class="h2rule" data-dcnode-id="604"></div><div class="fold" data-dcnode-id="550" id="par-22"><p data-dcnode-id="599"><span data-dcnode-id="603" instrument_node="">
After the story of Samson, the Book of Judges treats us to a satire in which a lady from Ephraim lost eleven hundred silver pieces and lavishly cursed whoever had taken them (Judges 17). That turned out to be her son, </span><a class="reg" data-dcnode-id="601" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Micah.html"><span data-dcnode-id="602" instrument_node="">Micah</span></a><span data-dcnode-id="600" instrument_node="">, who promptly returned them. The cursing mother swiftly switched to blessings (in the name of YHWH, no less) and decided to dedicate the silver to YHWH. This she aimed to achieve by smelting the silver into an effigy, and since Micah had the knack, she charged him with it.</span></p><p data-dcnode-id="597"><span data-dcnode-id="598" instrument_node="">
And so, Micah ended up with a brand new shiny idol, and as he liked to complete things, he consecrated one of his sons to be its priest (which places this story in the patriarchal era, see Job 1:5). Meanwhile in Judah, a young Levite from Bethlehem (and there's that Judah-Levi theme again) set out to find a job. He soon arrived at Micah's house, who generously offered him the position of private priest with a competitive wage to boot. The Levite conceded and Micah ordained him too. "Then Micah said, 'Now I know that YHWH will have me prosper, seeing I have a Levite as priest" (Judges 17:13).</span></p><p data-dcnode-id="595"><span data-dcnode-id="596" instrument_node="">
Although this account is riddled with atrocities, it also serves to show how Ephraim achieved the same wisdom tradition that defined Judah. The sad part of this hilarious story is not so much that diligent but ignorant Micah violated the whole first half of YHWH's Ten Commandments (which places the story before Exodus 20), but that Micah's philosophy is still so common in our world: anywhere symbols, pictures and statues are expected to do more than simply adorn. The Levite of our story represents the whole of the priestly tradition, at this very early stage he is alone and works for money for one seriously deluded rich guy from Ephraim.</span></p><p data-dcnode-id="590"><span data-dcnode-id="594" instrument_node="">
But just as Micah's household settled in its comfortable folly, the lads from Dan came calling. They had not yet received their allotment in Israel (18:1; in other words: they were still an indigenous Canaanite tribe), and they convinced Micah's Levite that working for a whole tribe was much better (more profitable) than working for just one guy. And so the Levite swiped Micah's new statue, and followed the Danites to their new home in </span><a class="reg" data-dcnode-id="592" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Laish.html"><span data-dcnode-id="593" instrument_node="">Laish</span></a><span data-dcnode-id="591" instrument_node="">. Thus the tribe of Dan too adopted the wisdom tradition of Judah, and achieved "foot on the ground" in Israel.</span></p><span data-dcnode-id="589" instrument_node="">
</span><p data-dcnode-id="575"><span data-dcnode-id="588" instrument_node="">Commentators appear to be tempted to write the Micah story off as some inconsequential local legend, but that demonstrates a detrimental unfamiliarity with the nature of the Bible. Especially when common folk became literate, the Bible compilers (an anonymous bunch of scholars who were probably active for centuries, not unlike the later </span><a class="reg" data-dcnode-id="586" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Masoretes.html"><span data-dcnode-id="587" instrument_node="">Masoretes</span></a><span data-dcnode-id="585" instrument_node="">) had tons and tons of material to choose from, and the vast majority of it was at some point of the refinery process rejected (Psalm 12:6). Micah's story wasn't and that can only be because in some way or other, it represents fundamental and universal truths. In the Bible every </span><i data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">yod</span></i><span data-dcnode-id="582" instrument_node=""> and </span><i data-dcnode-id="580"><span data-dcnode-id="581" instrument_node="">title</span></i><span data-dcnode-id="579" instrument_node=""> has myriads of meanings in the literary sense, as well as countless manifestations in the tangible universe (</span><a class="bibRef reg" data-dcnode-id="577" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/Matthew/Matthew-5-parsed.html%23AVerse-18"><span data-dcnode-id="578" instrument_node="">Matthew 5:18</span></a><span data-dcnode-id="576" instrument_node="">).</span></p><p data-dcnode-id="552"><span data-dcnode-id="574" instrument_node="">
To give a hint to the literary complexity of this story: the Levite from Judah who was forced to hire himself to a wealthy Ephraimite is obviously a manifestation of the Suffering Servant of which Jesus is the most familiar. Then note how the Book of the formally unrelated prophet Micah deals with the same themes and even how Matthew weaves these into the gospel of </span><a class="reg" data-dcnode-id="572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Immanuel.html"><span data-dcnode-id="573" instrument_node="">Immanuel</span></a><span data-dcnode-id="571" instrument_node=""> (see Micah 3:11 and </span><a class="bibRef reg" data-dcnode-id="569" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/Matthew/Matthew-21-parsed.html%23AVerse-13"><span data-dcnode-id="570" instrument_node="">Matthew 21:13</span></a><span data-dcnode-id="568" instrument_node="">, Micah 5:2 and </span><a class="bibRef reg" data-dcnode-id="566" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/Matthew/Matthew-2-parsed.html%23AVerse-1"><span data-dcnode-id="567" instrument_node="">Matthew 2:1-6</span></a><span data-dcnode-id="565" instrument_node="">). Also note the obvious similarities with the story of </span><a class="reg" data-dcnode-id="563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Hannah.html"><span data-dcnode-id="564" instrument_node="">Hannah</span></a><span data-dcnode-id="562" instrument_node="">, the bereft wife of </span><a class="reg" data-dcnode-id="560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Elkanah.html"><span data-dcnode-id="561" instrument_node="">Elkanah</span></a><span data-dcnode-id="559" instrument_node=""> (which means God Of Canaan), who dedicated her son Samuel to YHWH; 1 Samuel 1:11. Hannah obviously continues the beloved-but-barren-wife theme of </span><a class="reg" data-dcnode-id="557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Sarah.html"><span data-dcnode-id="558" instrument_node="">Sarah</span></a><span data-dcnode-id="556" instrument_node=""> and Rachel, but also compare 1 Samuel 2:5 with Proverbs 9:1, Exodus 2:16, Isaiah 4:1 and even </span><a class="bibRef reg" data-dcnode-id="554" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/Revelation/Revelation-1-parsed.html%23AVerse-4"><span data-dcnode-id="555" instrument_node="">Revelation 1:4</span></a><span data-dcnode-id="553" instrument_node=""> for what precisely is summed up in the literary character of Samuel.</span></p><span data-dcnode-id="551" instrument_node="">
</span></div><h2 data-dcnode-id="546" id="anc-23" onclick="fold(this.id)"><span class="foldIcon" data-dcnode-id="548" id="foldic-23"><span data-dcnode-id="549" instrument_node="">🔽</span></span><span data-dcnode-id="547" instrument_node="">The rapacious wolf of Benjamin</span></h2><div class="h2rule" data-dcnode-id="545"></div><div class="fold" data-dcnode-id="460" id="par-23"><p data-dcnode-id="536"><span data-dcnode-id="544" instrument_node="">
The same story told from the perspective of the tribe of Benjamin takes on a more malicious character (Judges 19). This time, our Levite was staying in an unspecified but remote (or rather: </span><span class="HebF" data-dcnode-id="542"><span data-dcnode-id="543" instrument_node="">ירכה</span></span><span data-dcnode-id="541" instrument_node="">, </span><a class="reg" data-dcnode-id="538" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Dictionary/y/y-r-kfin.html"><i data-dcnode-id="539"><span data-dcnode-id="540" instrument_node="">yareka</span></i></a><span data-dcnode-id="537" instrument_node="">, the most fundamental or intimate) part of the hill country of Ephraim, and his connection to Bethlehem is explained as the origin of his wayward concubine (Judges 19:1). She gave him the slip and he gave chase, and both ended up in her father's house in Bethlehem.</span></p><p data-dcnode-id="528"><span data-dcnode-id="535" instrument_node="">
After five days of pleading, the Levite and his Bethlehemite concubine finally started back to Ephraim, and as darkness overtook them, the Levite decided to stay the night in </span><a class="reg" data-dcnode-id="533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Gibeah.html"><span data-dcnode-id="534" instrument_node="">Gibeah</span></a><span data-dcnode-id="532" instrument_node=""> of Benjamin instead of nearby Jerusalem, which at that time was still in the hands of the </span><a class="reg" data-dcnode-id="530" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Jebusite.html"><span data-dcnode-id="531" instrument_node="">Jebusites</span></a><span data-dcnode-id="529" instrument_node=""> (which places our story before Joshua 10:1 and Judges 1:8 as well as the more obvious 2 Samuel 5:6).</span></p><p data-dcnode-id="509"><span data-dcnode-id="527" instrument_node="">
An old man originally from the hills of Ephraim took them into his home in Gibeah of Benjamin, and in a manner that clearly revisits the themes and effects of Genesis 19, the locals decided to see if they could get to know the Levite (and the verb </span><span class="HebF" data-dcnode-id="525"><span data-dcnode-id="526" instrument_node="">ידע</span></span><span data-dcnode-id="524" instrument_node="">, </span><a class="reg" data-dcnode-id="521" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Dictionary/y/y-d-ay.html"><i data-dcnode-id="522"><span data-dcnode-id="523" instrument_node="">yada'</span></i></a><span data-dcnode-id="520" instrument_node="">, means to know or have sex with). Instead, the wayward concubine got shoved out the door, and the Benjaminites "knew" her and overpowered her (</span><span class="HebF" data-dcnode-id="518"><span data-dcnode-id="519" instrument_node="">עלל</span></span><span data-dcnode-id="517" instrument_node="">, </span><a class="reg" data-dcnode-id="514" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Dictionary/ay/ay-l-he.html"><i data-dcnode-id="515"><span data-dcnode-id="516" instrument_node="">'alal</span></i></a><span data-dcnode-id="513" instrument_node="">) until dawn, which ultimately killed her. The Levite took her body home and there he cut her into twelve pieces and sent her throughout the land of Israel, with the </span><i data-dcnode-id="511"><span data-dcnode-id="512" instrument_node="">mot d'ordre</span></i><span data-dcnode-id="510" instrument_node=""> to "examine, deliberate and formalize" (Judges 19:30).</span></p><p data-dcnode-id="504"><span data-dcnode-id="508" instrument_node="">
