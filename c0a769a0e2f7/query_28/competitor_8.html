In other words: where the Danites acquired their share of the Levitical tradition by out-funding its Ephraimite host, the Benjaminites, who couldn't get their hands on either the Levite or his Ephraimite host, ravished the informal social following of the Levitical tradition. Whatever they precisely did isn't immediately clear, but the same events are reported in the Book of Samuel, where king Saul of Benjamin forfeited his kingdom by usurping Samuel's sacrificial prerogative, just prior to the battle of </span><a class="reg" data-dcnode-id="506" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Gilgal.html"><span data-dcnode-id="507" instrument_node="">Gilgal</span></a><span data-dcnode-id="505" instrument_node=""> (1 Samuel 13:5-14). And in case the reader doesn't get it, the author of the story informs us that following Saul's transgression, Samuel "got up and went from Gilgal to Gibeah of Benjamin" (1 Samuel 13:15).</span></p><p data-dcnode-id="496"><span data-dcnode-id="503" instrument_node="">
As the concubine's bloody members toured the land, the influence of the Levitical tradition began to pervade the whole of Israel. But whatever the tribe of Benjamin was exactly doing: it killed whatever social movement the Levites were able to generate, however wayward (also see </span><a class="bibRef reg" data-dcnode-id="501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/Matthew/Matthew-13-parsed.html%23AVerse-4"><span data-dcnode-id="502" instrument_node="">Matthew 13:4-7</span></a><span data-dcnode-id="500" instrument_node="">). The rest of Israel arose in retaliation and ultimately decimated Benjamin. A mere 600 men were left and no women. Israel swore to not give them any, but they let them raid </span><a class="reg" data-dcnode-id="498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Jabesh.html"><span data-dcnode-id="499" instrument_node="">Jabesh-gilead</span></a><span data-dcnode-id="497" instrument_node=""> first and the festival at Shiloh later (Judges 21).</span></p><p data-dcnode-id="485"><span data-dcnode-id="495" instrument_node="">
The mysterious dancing women of Shiloh, whom the Benjaminites ended up abducting, are clearly revisited in the story of Samuel, in which the wicked Hophni and </span><a class="reg" data-dcnode-id="493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Phinehas.html"><span data-dcnode-id="494" instrument_node="">Phinehas</span></a><span data-dcnode-id="492" instrument_node=""> helped themselves to the equally mysterious "women who served at the doorway of the Tent of Meeting" at Shiloh (1 Samuel 2:22). And where the previous story connects to the prophet Micah, this one seems to have been the favorite of </span><a class="reg" data-dcnode-id="490" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Hosea.html"><span data-dcnode-id="491" instrument_node="">Hosea</span></a><span data-dcnode-id="489" instrument_node="">, who also married a wayward woman (</span><a class="reg" data-dcnode-id="487" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Gomer.html"><span data-dcnode-id="488" instrument_node="">Gomer</span></a><span data-dcnode-id="486" instrument_node="">), and whose message made copious use of prostitution terminology, including temple prostitution (Hosea 4:14, see Deuteronomy 23:17).</span></p><p data-dcnode-id="462"><span data-dcnode-id="484" instrument_node="">
It's probably not a coincidence that the apostle Paul was from Benjamin (</span><a class="bibRef reg" data-dcnode-id="482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/Romans/Romans-11-parsed.html%23AVerse-1"><span data-dcnode-id="483" instrument_node="">Romans 11:1</span></a><span data-dcnode-id="481" instrument_node="">), that he was most likely unmarried (unlike the others: </span><a class="bibRef reg" data-dcnode-id="479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/1-Corinthians/1-Corinthians-9-parsed.html%23AVerse-5"><span data-dcnode-id="480" instrument_node="">1 Corinthians 9:5</span></a><span data-dcnode-id="478" instrument_node="">, see </span><a class="bibRef reg" data-dcnode-id="476" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/1-Corinthians/1-Corinthians-7-parsed.html%23AVerse-7"><span data-dcnode-id="477" instrument_node="">7:7</span></a><span data-dcnode-id="475" instrument_node="">) and that he was continuously at odds with everybody, before and after his conversion (</span><a class="bibRef reg" data-dcnode-id="473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/Acts/Acts-8-parsed.html%23AVerse-3"><span data-dcnode-id="474" instrument_node="">Acts 8:3</span></a><span data-dcnode-id="472" instrument_node="">, </span><a class="bibRef reg" data-dcnode-id="470" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/Acts/Acts-15-parsed.html%23AVerse-39"><span data-dcnode-id="471" instrument_node="">15:39</span></a><span data-dcnode-id="469" instrument_node="">, </span><a class="bibRef reg" data-dcnode-id="467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/Galatians/Galatians-2-parsed.html%23AVerse-11"><span data-dcnode-id="468" instrument_node="">Galatians 2:11</span></a><span data-dcnode-id="466" instrument_node="">). But, as he himself wrote, "now I will show you the most excellent way" (</span><a class="bibRef reg" data-dcnode-id="464" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/1-Corinthians/1-Corinthians-12-parsed.html%23AVerse-31"><span data-dcnode-id="465" instrument_node="">1 Corinthians 12:31</span></a><span data-dcnode-id="463" instrument_node="">):</span></p><span data-dcnode-id="461" instrument_node="">
</span></div><h2 data-dcnode-id="456" id="anc-24" onclick="fold(this.id)"><span class="foldIcon" data-dcnode-id="458" id="foldic-24"><span data-dcnode-id="459" instrument_node="">🔽</span></span><span data-dcnode-id="457" instrument_node="">The Lion of Judah</span></h2><div class="h2rule" data-dcnode-id="455"></div><div class="fold" data-dcnode-id="394" id="par-24"><p data-dcnode-id="453"><span data-dcnode-id="454" instrument_node="">
How to bring about consilience? That question must have occupied the mind of every judge of Israel, as much as that of every founder of great empires since. Most emperors opted for massive propaganda programs and violent suppression of those elements who realized that their society was getting befuddled, but the Israelites were trying to achieve consilience among wisdom traditions, and people of wisdom are as hard to befuddle as to entice to revise their views.</span></p><p data-dcnode-id="448"><span data-dcnode-id="452" instrument_node="">
From the stories and the meanings of the tribal names it appears that the Rachelite tribes tried to achieve consilience in the same way as modern scholars: via cramming, hammering, and struggling for funding, by ripping things apart and exhausting their every use, and most of all: with a whole lot of vigorous argument, dispute and debate. Rachelism demands obedience, but can never seem to achieve it. No matter how hard a Rachelite leader fights, his people never truly follow and will always slide right off track again once the pressure of guidance is released (</span><a class="bibRef reg" data-dcnode-id="450" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/Romans/Romans-3-parsed.html%23AVerse-10"><span data-dcnode-id="451" instrument_node="">Romans 3:10-20</span></a><span data-dcnode-id="449" instrument_node="">).</span></p><p data-dcnode-id="446"><span data-dcnode-id="447" instrument_node="">
Rachelism culminated in the reign of Saul, who was only a king over a united kingdom in name. In reality his tribes were awry and while he demanded blind obedience of everybody (1 Samuel 11:7) including his son (14:44), he overruled the Law of YHWH when that seemed right to him (13:9, 15:9) and even erected a monument to himself (15:12). Subsequently, under Saul there was neither king nor kingdom, and the un-united tribes of Israel suffered continuously from invasions by the Philistines.</span></p><p data-dcnode-id="432"><span data-dcnode-id="445" instrument_node="">
Israel's request for a unifying king appears to have derived from their struggle with the Philistines (means Agony), and although </span><a class="reg" data-dcnode-id="443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Palestine.html"><span data-dcnode-id="444" instrument_node="">Philistia</span></a><span data-dcnode-id="442" instrument_node=""> (that's the State Of Agony) suffered serious loss under Samuel (1 Samuel 7:10) and Saul and </span><a class="reg" data-dcnode-id="440" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Jonathan.html"><span data-dcnode-id="441" instrument_node="">Jonathan</span></a><span data-dcnode-id="439" instrument_node=""> slew their share (13:3-4), Philistia's systematic decline began when David slew </span><a class="reg" data-dcnode-id="437" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Goliath.html"><span data-dcnode-id="438" instrument_node="">Goliath</span></a><span data-dcnode-id="436" instrument_node=""> in the newly introduced name of YHWH </span><a class="reg" data-dcnode-id="434" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Sabaoth.html"><span data-dcnode-id="435" instrument_node="">Sabaoth</span></a><span data-dcnode-id="433" instrument_node="">, or Lord of Hosts (17:8).</span></p><p data-dcnode-id="418"><span data-dcnode-id="431" instrument_node="">
Saul had his headquarters in </span><a class="reg" data-dcnode-id="429" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Mizpah.html"><span data-dcnode-id="430" instrument_node="">Mizpah</span></a><span data-dcnode-id="428" instrument_node=""> (means Watchtower; see </span><a class="bibRef reg" data-dcnode-id="426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/Luke/Luke-17-parsed.html%23AVerse-20"><span data-dcnode-id="427" instrument_node="">Luke 17:20</span></a><span data-dcnode-id="425" instrument_node="">), but David began his reign in </span><a class="reg" data-dcnode-id="423" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Hebron.html"><span data-dcnode-id="424" instrument_node="">Hebron</span></a><span data-dcnode-id="422" instrument_node=""> (means Joined or Federation; see </span><a class="bibRef reg" data-dcnode-id="420" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/Luke/Luke-17-parsed.html%23AVerse-21"><span data-dcnode-id="421" instrument_node="">Luke 17:21</span></a><span data-dcnode-id="419" instrument_node="">). Saul couldn't track a herd of donkeys (1 Samuel 9:4) but David played harp in such a way that even the Lord's venging spirit backed off (16:23). Saul formed his army by threatening no-shows with brutal retaliation (11:7), but David's men walked willingly into his camp (1 Chronicles 12).</span></p><p data-dcnode-id="398"><span data-dcnode-id="417" instrument_node="">Everybody loved David, from singing civilian ladies (18:7) to crown prince Jonathan (18:1), princess </span><a class="reg" data-dcnode-id="415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Michal.html"><span data-dcnode-id="416" instrument_node="">Michal</span></a><span data-dcnode-id="414" instrument_node=""> (18:20) and even king Saul before he turned (16:21). Priest </span><a class="reg" data-dcnode-id="412" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Ahimelech.html"><span data-dcnode-id="413" instrument_node="">Ahimelech</span></a><span data-dcnode-id="411" instrument_node=""> forfeited his life by giving David bread and Goliath's sword (21:1-9). The king of Moab gave shelter to David's family (22:3). And the Philistine king Achish of </span><a class="reg" data-dcnode-id="409" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Gath.html"><span data-dcnode-id="410" instrument_node="">Gath</span></a><span data-dcnode-id="408" instrument_node=""> (where both Goliath and </span><a class="reg" data-dcnode-id="406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Obed-edom.html"><span data-dcnode-id="407" instrument_node="">Obed-edom</span></a><span data-dcnode-id="405" instrument_node="">, the keeper of the Ark, came from; also see 1 Samuel 7:14 in case you're not confused, and note that the name </span><a class="reg" data-dcnode-id="403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Gethsemane.html"><span data-dcnode-id="404" instrument_node="">Gethsemane</span></a><span data-dcnode-id="402" instrument_node=""> starts with Gath) gave David his first headquarters: the town of </span><a class="reg" data-dcnode-id="400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Ziklag.html"><span data-dcnode-id="401" instrument_node="">Ziklag</span></a><span data-dcnode-id="399" instrument_node="">.</span></p><p data-dcnode-id="396"><span data-dcnode-id="397" instrument_node="">And of course, even the name David means Beloved.</span></p><span data-dcnode-id="395" instrument_node="">
</span></div><h2 data-dcnode-id="390" id="anc-25" onclick="fold(this.id)"><span class="foldIcon" data-dcnode-id="392" id="foldic-25"><span data-dcnode-id="393" instrument_node="">🔽</span></span><span data-dcnode-id="391" instrument_node="">What is love?</span></h2><div class="h2rule" data-dcnode-id="389"></div><div class="fold" data-dcnode-id="325" id="par-25"><p data-dcnode-id="384"><span data-dcnode-id="388" instrument_node="">
In modern times the word "love" has come to denote a personal preference; the statement "I love you" is considered a stronger form of essentially the same statement "I like you". The Biblical idea of love, however, has nothing at all to do with that. In fact, in the Bible the word "love" doesn't even denote a feeling because God is love (</span><a class="bibRef reg" data-dcnode-id="386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/1-John/1-John-4-parsed.html%23AVerse-8"><span data-dcnode-id="387" instrument_node="">1 John 4:8</span></a><span data-dcnode-id="385" instrument_node="">) and God is not a feeling.</span></p><p data-dcnode-id="373"><span data-dcnode-id="383" instrument_node="">
God's Word holds everything together (</span><a class="bibRef reg" data-dcnode-id="381" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/Colossians/Colossians-1-parsed.html%23AVerse-17"><span data-dcnode-id="382" instrument_node="">Colossians 1:17</span></a><span data-dcnode-id="380" instrument_node="">), and sums up everything (</span><a class="bibRef reg" data-dcnode-id="378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/Ephesians/Ephesians-1-parsed.html%23AVerse-10"><span data-dcnode-id="379" instrument_node="">Ephesians 1:10</span></a><span data-dcnode-id="377" instrument_node="">), and God causes all things to work together (</span><a class="bibRef reg" data-dcnode-id="375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/Romans/Romans-8-parsed.html%23AVerse-28"><span data-dcnode-id="376" instrument_node="">Romans 8:28</span></a><span data-dcnode-id="374" instrument_node="">). In other words: Biblical love does not denote one person's overly positive opinion about someone else; Biblical love denotes engagement — the becoming one via mutual exchange. Love starts at the subatomic level. It's why there are things instead of a universe full of quantum dust.</span></p><p data-dcnode-id="368"><span data-dcnode-id="372" instrument_node="">
Love is a catch-all term for the set of mechanisms that allows any integrated and stable system to operate — from atoms sticking together to make objects, to living creatures that comprise our unified biosphere, to humans that form our global economy. Love means to connect and exchange whatever and at any level of appreciation (which means that </span><a class="bibRef reg" data-dcnode-id="370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/John/John-8-parsed.html%23AVerse-12"><span data-dcnode-id="371" instrument_node="">John 8:12</span></a><span data-dcnode-id="369" instrument_node=""> is not a metaphor).</span></p><p data-dcnode-id="360"><span data-dcnode-id="367" instrument_node="">
Snoopy said it best: "to know me is to love me", but he should have said it the other way around: to love is to get to know — hence the Hebrew verb </span><span class="HebF" data-dcnode-id="365"><span data-dcnode-id="366" instrument_node="">ידע</span></span><span data-dcnode-id="364" instrument_node=""> (</span><i data-dcnode-id="362"><span data-dcnode-id="363" instrument_node="">yada'</span></i><span data-dcnode-id="361" instrument_node="">), which both means to know and to enjoy marital intercourse. Loving someone is to study someone, to learn all about them and let them learn all about you. Loving equals fun having, and although especially early learning is accomplished through play, some of the most successful scientific programs of today are based on elaborate games. Israel's wisdom tradition appears to have been infused with play, and quizzing each other was considered prime entertainment (Judges 14:12-13, 1 Kings 10:1).</span></p><p data-dcnode-id="355"><span data-dcnode-id="359" instrument_node="">
Although Solomon was mostly a scientist who lectured on the natural world (1 Kings 4:33), he was an evenly accomplished poet (4:32) and he and his father David placed great emphasis on feasts and musical festivals. Quite significantly, Isaac was the father of Israel and his name means Play or Fun. For thousands of years kings, generals and popes have explained that duty is our highest good and a deep sense of misery is a sure sign that you're doing it right. Today it's becoming increasingly clear that if you're not having fun in your daily life, you're possibly not standing in presence of the Lord of Love (</span><a class="bibRef reg" data-dcnode-id="357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/Jude/Jude-1-parsed.html%23AVerse-24"><span data-dcnode-id="358" instrument_node="">Jude 1:24</span></a><span data-dcnode-id="356" instrument_node="">).</span></p><p data-dcnode-id="343"><span data-dcnode-id="354" instrument_node=""> 
Love culminates in peace, which is another much misunderstood concept, and please read our article on the verb </span><span class="HebF" data-dcnode-id="352"><span data-dcnode-id="353" instrument_node="">שלם</span></span><span data-dcnode-id="351" instrument_node=""> (</span><a class="reg" data-dcnode-id="348" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Dictionary/si/si-l-mfin.html"><i data-dcnode-id="349"><span data-dcnode-id="350" instrument_node="">shalem</span></i></a><span data-dcnode-id="347" instrument_node="">) for a closer look. This verb </span><i data-dcnode-id="345"><span data-dcnode-id="346" instrument_node="">shalem</span></i><span data-dcnode-id="344" instrument_node=""> denotes a unifying and is the opposite of dissenting.</span></p><p data-dcnode-id="338"><span data-dcnode-id="342" instrument_node="">
The opposite of love is not hate, because God hates (Malachi 2:16, </span><a class="bibRef reg" data-dcnode-id="340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/Romans/Romans-9-parsed.html%23AVerse-13"><span data-dcnode-id="341" instrument_node="">Romans 9:13</span></a><span data-dcnode-id="339" instrument_node="">) and God cannot oppose his own nature. The opposite of loving someone is ignoring someone, whether wholly or in part and whether deliberate or by accident. To hate means to reject, not to be angry. It has to do with cleaning, not with feeling.</span></p><p data-dcnode-id="327"><span data-dcnode-id="337" instrument_node="">
Hate requires knowledge and can only exist as consequence of love. One cannot hate what one does not know and one cannot know what one does not love. Since God hates, hate is not intrinsically evil (Psalm 139:21), but virtuous hate requires total knowledge and hate based on incomplete knowledge is the result of incomplete love, which is what God hates (</span><a class="bibRef reg" data-dcnode-id="335" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/1-Corinthians/1-Corinthians-4-parsed.html%23AVerse-1"><span data-dcnode-id="336" instrument_node="">1 Corinthians 4:1-5</span></a><span data-dcnode-id="334" instrument_node="">, </span><a class="bibRef reg" data-dcnode-id="332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/Colossians/Colossians-2-parsed.html%23AVerse-10"><span data-dcnode-id="333" instrument_node="">Colossians 2:10</span></a><span data-dcnode-id="331" instrument_node="">, </span><a class="bibRef reg" data-dcnode-id="329" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/1-John/1-John-4-parsed.html%23AVerse-18"><span data-dcnode-id="330" instrument_node="">1 John 4:18</span></a><span data-dcnode-id="328" instrument_node="">).</span></p><span data-dcnode-id="326" instrument_node="">
</span></div><h2 data-dcnode-id="321" id="anc-26" onclick="fold(this.id)"><span class="foldIcon" data-dcnode-id="323" id="foldic-26"><span data-dcnode-id="324" instrument_node="">🔽</span></span><span data-dcnode-id="322" instrument_node="">Thou shalt feel warm and fuzzy</span></h2><div class="h2rule" data-dcnode-id="320"></div><div class="fold" data-dcnode-id="261" id="par-26"><span data-dcnode-id="319" instrument_node="">
</span><p data-dcnode-id="311"><span data-dcnode-id="318" instrument_node="">Feelings are involuntary and can't be had at will, like you can't flex a non-skeletal muscle on command. The dual command to love the Lord and to love one's neighbor is not designed to evoke involuntary sentiments but a deliberate engaging of both one's neighbor and the Lord — what Jacob began to do at the </span><a class="reg" data-dcnode-id="316" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Jabbok.html"><span data-dcnode-id="317" instrument_node="">Jabbok</span></a><span data-dcnode-id="315" instrument_node="">. Paul's command for husbands to love their wives (</span><a class="bibRef reg" data-dcnode-id="313" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/Ephesians/Ephesians-5-parsed.html%23AVerse-25"><span data-dcnode-id="314" instrument_node="">Ephesians 5:25</span></a><span data-dcnode-id="312" instrument_node="">) also has nothing to do with a command to feel things but rather with the male's tendency to leave the wife the laundry and head to town with the lads. In modern words, Paul instructs men to not neglect their wives, but to unite with them in continuous mutual exchange.</span></p><p data-dcnode-id="303"><span data-dcnode-id="310" instrument_node="">
The Bible certainly stresses the importance of kindness (Proverbs 3:3) but also points out that the kindest people may be the biggest crooks (Proverbs 6:24). The Bible tells us to be just, hospitable and forgiving, but its message has little in common with the kind of pseudo-spiritual humanism that is so popular in our days. God does not want us to be equally sweet to all people but to discern and keep our company careful (Proverbs 28:23, </span><a class="bibRef reg" data-dcnode-id="308" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/1-Corinthians/1-Corinthians-15-parsed.html%23AVerse-33"><span data-dcnode-id="309" instrument_node="">1 Corinthians 15:33</span></a><span data-dcnode-id="307" instrument_node="">). The Bible does not predict a happy ending for everybody, but says that people who behave like a Dodo will go the way of the Dodo (</span><a class="bibRef reg" data-dcnode-id="305" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/Matthew/Matthew-3-parsed.html%23AVerse-12"><span data-dcnode-id="306" instrument_node="">Matthew 3:12</span></a><span data-dcnode-id="304" instrument_node="">).</span></p><p data-dcnode-id="298"><span data-dcnode-id="302" instrument_node="">
Learning to love yourself — another popular endeavor — has nothing to do with feeling good about yourself. You might need a good shaking up, and your bad feeling might have a good reason. Loving yourself (or your neighbor as yourself) is to know yourself (or your neighbor as yourself). The latter is the second clause of the Great Commandment (</span><a class="bibRef reg" data-dcnode-id="300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/Matthew/Matthew-22-parsed.html%23AVerse-39"><span data-dcnode-id="301" instrument_node="">Matthew 22:39</span></a><span data-dcnode-id="299" instrument_node="">), and failure to comply with it is our world's most persistent social cancer. Most of us know more about the average movie star than about the people of our street. Day after day, worlds of anemic fiction wean us away from our own humanity, and make us believe that our neighbors are our enemies, while in fact our enemies are the screens we trust. Our cities are not the strongholds we think they are, but the piles of dust and shards foretold by the prophets.</span></p><p data-dcnode-id="293"><span data-dcnode-id="297" instrument_node="">
The Lord's command to love our enemies has nothing to do with us somehow feeling agreeable towards them, and everything with knowing them. Praying for those who persecute you (</span><a class="bibRef reg" data-dcnode-id="295" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/Matthew/Matthew-5-parsed.html%23AVerse-44"><span data-dcnode-id="296" instrument_node="">Matthew 5:44</span></a><span data-dcnode-id="294" instrument_node="">) likewise has nothing to do with asking the Lord's blessings for abusing brutes but rather with requesting insight into their behavior. As Sun Tzu once noted: war must be avoided but when it comes, knowledge is one's best ally, and knowing one's enemy is as crucial as knowing oneself. Knowledge of the enemy might prevent a costly conflict, while ignorance commonly leads to defeat.</span></p><p data-dcnode-id="273"><span data-dcnode-id="292" instrument_node="">
Jesus said that no one has greater love than someone who lays down his life for his friends (</span><a class="bibRef reg" data-dcnode-id="290" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/John/John-15-parsed.html%23AVerse-13"><span data-dcnode-id="291" instrument_node="">John 15:13</span></a><span data-dcnode-id="289" instrument_node="">), but that should always be viewed in context with </span><a class="bibRef reg" data-dcnode-id="287" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/Matthew/Matthew-7-parsed.html%23AVerse-6"><span data-dcnode-id="288" instrument_node="">Matthew 7:6</span></a><span data-dcnode-id="286" instrument_node="">, where Jesus says not to give what is holy to dogs, or to throw pearls before swine. You are not your own (</span><a class="bibRef reg" data-dcnode-id="284" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/1-Corinthians/1-Corinthians-6-parsed.html%23AVerse-19"><span data-dcnode-id="285" instrument_node="">1 Corinthians 6:19</span></a><span data-dcnode-id="283" instrument_node="">). You are a highly valuable piece of human resource (</span><a class="bibRef reg" data-dcnode-id="281" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/1-Corinthians/1-Corinthians-6-parsed.html%23AVerse-20"><span data-dcnode-id="282" instrument_node="">1 Corinthians 6:20</span></a><span data-dcnode-id="280" instrument_node="">), and the nature of your salvation obligates you to invest yourself with the greatest possible care, and strive for the highest possible return (</span><a class="bibRef reg" data-dcnode-id="278" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/John/John-12-parsed.html%23AVerse-24"><span data-dcnode-id="279" instrument_node="">John 12:24</span></a><span data-dcnode-id="277" instrument_node="">, </span><a class="bibRef reg" data-dcnode-id="275" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/Matthew/Matthew-25-parsed.html%23AVerse-14"><span data-dcnode-id="276" instrument_node="">Matthew 25:14-30</span></a><span data-dcnode-id="274" instrument_node="">). Love never takes the name of the Lord in vain.</span></p><p data-dcnode-id="271"><span data-dcnode-id="272" instrument_node="">
David is the cognitional equivalent of a multicellular organism, which consists of vastly differing cells, which are all based on exactly the same genetic code. God's Word allows for an incredible range of interpretation, and subsequently demands of each culture the acknowledgement that an utterly alien culture may in fact be based on precisely the same revelations (2 Samuel 22:44, 1 Kings 11:38).</span></p><p data-dcnode-id="263"><span data-dcnode-id="270" instrument_node="">
Davidism is no longer concerned with a one and only proper interpretation of the Word of God, but only with a super-culture that consists of a network of interlocked singular cultures (hence YHWH Sabaoth, or Lord of Hosts). It's where nationalism and national socialism stop and why the Torah covers the whole of creation. It's also the reason why David moved his capital to Jerusalem — which derives from the verb </span><i data-dcnode-id="268"><span data-dcnode-id="269" instrument_node="">shalem</span></i><span data-dcnode-id="267" instrument_node="">, just like the names of David's two most important sons: </span><a class="reg" data-dcnode-id="265" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Absalom.html"><span data-dcnode-id="266" instrument_node="">Absalom</span></a><span data-dcnode-id="264" instrument_node=""> and Solomon — and why the era of Israel's kings coincides with the era of the great empires.</span></p><span data-dcnode-id="262" instrument_node="">
</span></div><h2 data-dcnode-id="257" id="anc-27" onclick="fold(this.id)"><span class="foldIcon" data-dcnode-id="259" id="foldic-27"><span data-dcnode-id="260" instrument_node="">🔽</span></span><span data-dcnode-id="258" instrument_node="">Etymology of the name Exodus</span></h2><div class="h2rule" data-dcnode-id="256"></div><div class="fold" data-dcnode-id="162" id="par-27"><p data-dcnode-id="248"><span data-dcnode-id="255" instrument_node="">
The name Exodus consists of two elements. The first part comes from the ubiquitous particle of extraction </span><span class="HebF" data-dcnode-id="253"><span data-dcnode-id="254" instrument_node="">εκ</span></span><span data-dcnode-id="252" instrument_node=""> (</span><i data-dcnode-id="250"><span data-dcnode-id="251" instrument_node="">ek</span></i><span data-dcnode-id="249" instrument_node="">):</span></p><span data-dcnode-id="247" instrument_node="">
</span><div class="Dictionary" data-dcnode-id="216"><div class="dictHead" data-dcnode-id="245"><span data-dcnode-id="246" instrument_node="">Excerpted from: Abarim Publications' Biblical Dictionary</span></div><div class="h2rule" data-dcnode-id="244"></div><span data-dcnode-id="243" instrument_node="">
</span><h6 data-dcnode-id="241"><span data-dcnode-id="242" instrument_node="">εκ</span></h6><p data-dcnode-id="221"><span data-dcnode-id="240" instrument_node="">The prefix </span><span class="HebF" data-dcnode-id="238"><span data-dcnode-id="239" instrument_node="">εκ</span></span><span data-dcnode-id="237" instrument_node=""> (</span><i data-dcnode-id="235"><span data-dcnode-id="236" instrument_node="">ek</span></i><span data-dcnode-id="234" instrument_node="">) or </span><span class="HebF" data-dcnode-id="232"><span data-dcnode-id="233" instrument_node="">εξ</span></span><span data-dcnode-id="231" instrument_node=""> (</span><i data-dcnode-id="229"><span data-dcnode-id="230" instrument_node="">ex</span></i><span data-dcnode-id="228" instrument_node="">) when followed by a vowel, means out, out of or from. It's coincidentally spelled the same as </span><span class="HebF" data-dcnode-id="226"><span data-dcnode-id="227" instrument_node="">εξ</span></span><span data-dcnode-id="225" instrument_node=""> (</span><i data-dcnode-id="223"><span data-dcnode-id="224" instrument_node="">hex</span></i><span data-dcnode-id="222" instrument_node="">), the word for six.</span></p><span data-dcnode-id="220" instrument_node="">
</span><div class="dictHead1" data-dcnode-id="217"><a class="button2" data-dcnode-id="218" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/DictionaryG/e/e-k.html"><span data-dcnode-id="219" instrument_node=""> — See the full Dictionary article and Biblical Concordance — </span></a></div></div><span data-dcnode-id="215" instrument_node="">
</span><p data-dcnode-id="213"><span data-dcnode-id="214" instrument_node="">The second part of our word is the regular Greek word for road, street or way:</span></p><span data-dcnode-id="212" instrument_node="">
</span><div class="Dictionary" data-dcnode-id="164"><div class="dictHead" data-dcnode-id="210"><span data-dcnode-id="211" instrument_node="">Excerpted from: Abarim Publications' Biblical Dictionary</span></div><div class="h2rule" data-dcnode-id="209"></div><span data-dcnode-id="208" instrument_node="">
</span><h6 data-dcnode-id="206"><span data-dcnode-id="207" instrument_node="">οδος</span></h6><p data-dcnode-id="189"><span data-dcnode-id="205" instrument_node="">The noun </span><span class="HebF" data-dcnode-id="203"><span data-dcnode-id="204" instrument_node="">οδος</span></span><span data-dcnode-id="202" instrument_node=""> (</span><i data-dcnode-id="200"><span data-dcnode-id="201" instrument_node="">hodos</span></i><span data-dcnode-id="199" instrument_node="">) is the common </span><a class="reg" data-dcnode-id="197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Hellas.html"><span data-dcnode-id="198" instrument_node="">Greek</span></a><span data-dcnode-id="196" instrument_node=""> word for road, street or way, and, as the word "way" in English, can also be used to describe a method, solution or </span><i data-dcnode-id="194"><span data-dcnode-id="195" instrument_node="">modus operandi</span></i><span data-dcnode-id="193" instrument_node="">. The Romans tied their empire together with their famous highways (whose primary function was to accommodate the movement of the military; ordinary folks were discouraged from travelling by all sorts of taxes), and when </span><a class="reg" data-dcnode-id="191" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Jesus.html"><span data-dcnode-id="192" instrument_node="">Jesus</span></a><span data-dcnode-id="190" instrument_node=""> said "I am the Way," he didn't just volunteer a new way of doing or thinking but rather the one and only way for the whole of humanity to be tied together in a way that no one will oppose.</span></p><p data-dcnode-id="169"><span data-dcnode-id="188" instrument_node="">Possibly related, the noun </span><span class="HebF" data-dcnode-id="186"><span data-dcnode-id="187" instrument_node="">οδους</span></span><span data-dcnode-id="185" instrument_node=""> (</span><i data-dcnode-id="183"><span data-dcnode-id="184" instrument_node="">odous</span></i><span data-dcnode-id="182" instrument_node="">) means tooth. The noun </span><span class="HebF" data-dcnode-id="180"><span data-dcnode-id="181" instrument_node="">οδυνη</span></span><span data-dcnode-id="179" instrument_node=""> (</span><i data-dcnode-id="177"><span data-dcnode-id="178" instrument_node="">odune</span></i><span data-dcnode-id="176" instrument_node="">) means pain. And the noun </span><span class="HebF" data-dcnode-id="174"><span data-dcnode-id="175" instrument_node="">οδυρμος</span></span><span data-dcnode-id="173" instrument_node=""> (</span><i data-dcnode-id="171"><span data-dcnode-id="172" instrument_node="">odurmos</span></i><span data-dcnode-id="170" instrument_node="">) means a lamentation.</span></p><span data-dcnode-id="168" instrument_node="">
</span><div class="dictHead1" data-dcnode-id="165"><a class="button2" data-dcnode-id="166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/DictionaryG/o/o-d-o-sfin.html"><span data-dcnode-id="167" instrument_node=""> — See the full Dictionary article and Biblical Concordance — </span></a></div></div><span data-dcnode-id="163" instrument_node="">
</span></div><h2 data-dcnode-id="158" id="anc-28" onclick="fold(this.id)"><span class="foldIcon" data-dcnode-id="160" id="foldic-28"><span data-dcnode-id="161" instrument_node="">🔽</span></span><span data-dcnode-id="159" instrument_node="">Exodus meaning</span></h2><div class="h2rule" data-dcnode-id="157"></div><div class="fold" data-dcnode-id="148" id="par-28"><p data-dcnode-id="149"><span data-dcnode-id="156" instrument_node="">
The word Exodus literally means </span><b data-dcnode-id="154"><span data-dcnode-id="155" instrument_node="">Way Out</span></b><span data-dcnode-id="153" instrument_node=""> or </span><b data-dcnode-id="151"><span data-dcnode-id="152" instrument_node="">Getting Out</span></b><span data-dcnode-id="150" instrument_node=""> and denotes origin as much as separation from the maternal culture.</span></p></div></article></div><div data-dcnode-id="145" id="GoogleMobBot"></div><div data-dcnode-id="144" id="GooglePadBottom"></div></div><span data-dcnode-id="142" instrument_node="">
