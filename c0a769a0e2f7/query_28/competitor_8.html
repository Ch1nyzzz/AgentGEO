The pseudo-name Exodus is a common </span><a class="reg" data-dcnode-id="1801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Hellas.html"><span data-dcnode-id="1802" instrument_node="">Greek</span></a><span data-dcnode-id="1800" instrument_node=""> word which means "way out" or "departure" (see the etymology below). Because the Septuagint confusingly used this word as title for the second Book of the Bible — which in </span><a class="reg" data-dcnode-id="1798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Hebrew.html"><span data-dcnode-id="1799" instrument_node="">Hebrew</span></a><span data-dcnode-id="1797" instrument_node=""> was known with far greater clarity by its first words, namely </span><i data-dcnode-id="1795"><span data-dcnode-id="1796" instrument_node="">Wa'elleh Shemot</span></i><span data-dcnode-id="1794" instrument_node="">, meaning Now These Are The Names [Of The Sons Of </span><a class="reg" data-dcnode-id="1792" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Israel.html"><span data-dcnode-id="1793" instrument_node="">Israel</span></a><span data-dcnode-id="1791" instrument_node="">] — it became mostly associated with the departure of Israel out of </span><a class="reg" data-dcnode-id="1789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Egypt.html"><span data-dcnode-id="1790" instrument_node="">Egypt</span></a><span data-dcnode-id="1788" instrument_node="">, and as such it was used by </span><a class="reg" data-dcnode-id="1786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Paul.html"><span data-dcnode-id="1787" instrument_node="">Paul</span></a><span data-dcnode-id="1785" instrument_node=""> in </span><a class="bibRef reg" data-dcnode-id="1783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/Hebrews/Hebrews-11-parsed.html%23AVerse-22"><span data-dcnode-id="1784" instrument_node="">Hebrews 11:22</span></a><span data-dcnode-id="1782" instrument_node="">. But our word occurs twice more in the New Testament:</span></p><ul data-dcnode-id="1755"><li data-dcnode-id="1764"><span data-dcnode-id="1780" instrument_node="">In </span><a class="bibRef reg" data-dcnode-id="1778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/Luke/Luke-9-parsed.html%23AVerse-31"><span data-dcnode-id="1779" instrument_node="">Luke 9:31</span></a><span data-dcnode-id="1777" instrument_node=""> the word </span><span class="HebF" data-dcnode-id="1775"><span data-dcnode-id="1776" instrument_node="">εξοδος</span></span><span data-dcnode-id="1774" instrument_node=""> (</span><i data-dcnode-id="1772"><span data-dcnode-id="1773" instrument_node="">exodus</span></i><span data-dcnode-id="1771" instrument_node="">) describes </span><a class="reg" data-dcnode-id="1769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Jesus.html"><span data-dcnode-id="1770" instrument_node="">Jesus'</span></a><span data-dcnode-id="1768" instrument_node=""> immanent departure which he "was about to accomplish in </span><a class="reg" data-dcnode-id="1766" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Jerusalem.html"><span data-dcnode-id="1767" instrument_node="">Jerusalem</span></a><span data-dcnode-id="1765" instrument_node="">".</span></li><li data-dcnode-id="1756"><span data-dcnode-id="1763" instrument_node="">Somewhat similar, </span><a class="reg" data-dcnode-id="1761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Peter.html"><span data-dcnode-id="1762" instrument_node="">Peter</span></a><span data-dcnode-id="1760" instrument_node=""> uses our word to describe his own future death (</span><a class="bibRef reg" data-dcnode-id="1758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/2-Peter/2-Peter-1-parsed.html%23AVerse-15"><span data-dcnode-id="1759" instrument_node="">2 Peter 1:15</span></a><span data-dcnode-id="1757" instrument_node="">).</span></li></ul><p data-dcnode-id="1750"><span data-dcnode-id="1754" instrument_node="">
Our English name Exodus is (still confusingly) associated with one of two Great Departures that play a pervasive role in the Bible. The name Exodus belongs to the Out-Of-Egypt theme, which serves as the ruffled twin brother of the more dignified Out-Of-</span><a class="reg" data-dcnode-id="1752" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Babel.html"><span data-dcnode-id="1753" instrument_node="">Babylon</span></a><span data-dcnode-id="1751" instrument_node=""> theme. Both departure themes appear to be somewhat based on several actual historical departures, but mostly denote an intellectual breaking away from — or rather: a feeding off of — a host or parent tradition (we'll discuss that below).</span></p><p data-dcnode-id="1733"><span data-dcnode-id="1749" instrument_node="">
It should be stressed that although this set of twin-themes is endowed with respective apexes (namely the Exodus and the Return), it is pervasive and does not describe isolated events, but rather a pendular swinging between two extremes. The Bible incorporates this pendular twin as early as in the travels of </span><a class="reg" data-dcnode-id="1747" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Abraham.html"><span data-dcnode-id="1748" instrument_node="">Abraham</span></a><span data-dcnode-id="1746" instrument_node=""> — who came out of Babylon, went into Egypt due to a famine, came out of Egypt very wealthy, sent his chief of staff back into Babylon for a wife for </span><a class="reg" data-dcnode-id="1744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Isaac.html"><span data-dcnode-id="1745" instrument_node="">Isaac</span></a><span data-dcnode-id="1743" instrument_node="">... and so on — and their significance is so great that even an author as late as </span><a class="reg" data-dcnode-id="1741" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Matthew.html"><span data-dcnode-id="1742" instrument_node="">Matthew</span></a><span data-dcnode-id="1740" instrument_node=""> made sure to weave it into his account (see </span><a class="bibRef reg" data-dcnode-id="1738" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/Matthew/Matthew-2-parsed.html%23AVerse-1"><span data-dcnode-id="1739" instrument_node="">Matthew 2:1</span></a><span data-dcnode-id="1737" instrument_node=""> and </span><a class="bibRef reg" data-dcnode-id="1735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/Matthew/Matthew-2-parsed.html%23AVerse-15"><span data-dcnode-id="1736" instrument_node="">2:15</span></a><span data-dcnode-id="1734" instrument_node="">).</span></p><p data-dcnode-id="1695"><span data-dcnode-id="1732" instrument_node="">
For reasons we shall examine below, the Out-Of-Egypt theme is mostly associated with the tribe of </span><a class="reg" data-dcnode-id="1730" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Levi.html"><span data-dcnode-id="1731" instrument_node="">Levi</span></a><span data-dcnode-id="1729" instrument_node=""> (key Levite names such as </span><a class="reg" data-dcnode-id="1727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Moses.html"><span data-dcnode-id="1728" instrument_node="">Moses</span></a><span data-dcnode-id="1726" instrument_node=""> and </span><a class="reg" data-dcnode-id="1724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Aaron.html"><span data-dcnode-id="1725" instrument_node="">Aaron</span></a><span data-dcnode-id="1723" instrument_node=""> are adaptations of Egyptian names) whereas the Out-Of-Babylon theme is mostly associated with Levi's younger brother </span><a class="reg" data-dcnode-id="1721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Judah.html"><span data-dcnode-id="1722" instrument_node="">Judah</span></a><span data-dcnode-id="1720" instrument_node="">. And sure enough, Jesus' father-by-law </span><a class="reg" data-dcnode-id="1718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Joseph.html"><span data-dcnode-id="1719" instrument_node="">Joseph</span></a><span data-dcnode-id="1717" instrument_node=""> came from Judah, but his mother </span><a class="reg" data-dcnode-id="1715" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Mary.html"><span data-dcnode-id="1716" instrument_node="">Mary</span></a><span data-dcnode-id="1714" instrument_node=""> was a kinswoman of </span><a class="reg" data-dcnode-id="1712" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Elizabeth.html"><span data-dcnode-id="1713" instrument_node="">Elizabeth</span></a><span data-dcnode-id="1711" instrument_node="">, and </span><a class="reg" data-dcnode-id="1709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Luke.html"><span data-dcnode-id="1710" instrument_node="">Luke</span></a><span data-dcnode-id="1708" instrument_node=""> points out that she (and her husband </span><a class="reg" data-dcnode-id="1706" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Zacharias.html"><span data-dcnode-id="1707" instrument_node="">Zacharias</span></a><span data-dcnode-id="1705" instrument_node=""> and thus their son </span><a class="reg" data-dcnode-id="1703" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/John.html"><span data-dcnode-id="1704" instrument_node="">John</span></a><span data-dcnode-id="1702" instrument_node=""> the Baptist) were Levites (compare </span><a class="bibRef reg" data-dcnode-id="1700" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/Luke/Luke-1-parsed.html%23AVerse-36"><span data-dcnode-id="1701" instrument_node="">Luke 1:36</span></a><span data-dcnode-id="1699" instrument_node=""> with </span><a class="bibRef reg" data-dcnode-id="1697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/Luke/Luke-1-parsed.html%23AVerse-5"><span data-dcnode-id="1698" instrument_node="">1:5</span></a><span data-dcnode-id="1696" instrument_node="">).</span></p><p data-dcnode-id="1690"><span data-dcnode-id="1694" instrument_node="">That means that even though Jesus was a </span><a class="reg" data-dcnode-id="1692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Jew.html"><span data-dcnode-id="1693" instrument_node="">Jew</span></a><span data-dcnode-id="1691" instrument_node=""> by law, by name and by upbringing, his human genes were entirely Levite.</span></p><span data-dcnode-id="1689" instrument_node="">
</span></div><h2 data-dcnode-id="1684" id="anc-3" onclick="fold(this.id)"><span class="foldIcon" data-dcnode-id="1686" id="foldic-3"><span data-dcnode-id="1687" instrument_node="">🔽</span></span><span data-dcnode-id="1685" instrument_node="">The greatest blunder</span></h2><div class="h2rule" data-dcnode-id="1683"></div><div class="fold" data-dcnode-id="1654" id="par-3"><p data-dcnode-id="1681"><span data-dcnode-id="1682" instrument_node="">
Arguably the greatest intellectual blunder to have come out of the nineteenth century is the idea that competition lies at the heart of all prosperity. But ask any child (or the beautifully minded mathematician John Nash), and you will learn that even though competition is a true phenomenon, it's mostly detrimental if effective at all but — thank God! — massively overwhelmed by the natural tendency of all creatures large and small to cooperate and to exist in complex states of symbiosis.</span></p><p data-dcnode-id="1676"><span data-dcnode-id="1680" instrument_node="">
Imagine a hardy over-the-fence shout-out with your neighbor. At first glance this event seems mostly typified by your differences, but in an absolute sense, it wholly depends on your mutual agreement on language and rules of social engagement. Your argument may take ten minutes, but it took both of you years and years of childhood learning to achieve the level of synchronicity required for a complex </span><i data-dcnode-id="1678"><span data-dcnode-id="1679" instrument_node="">pas de deux</span></i><span data-dcnode-id="1677" instrument_node=""> as an over-the-fence shout-out.</span></p><p data-dcnode-id="1674"><span data-dcnode-id="1675" instrument_node="">
For decades, the bellicose world of the twentieth century was explained to school children by telling them that we humans have always been at each other's throats — that's how we could determine who was the übermensch (or Superman in the US; same ideology) and who wasn't — but modern archeology is showing with increasing relief that in the good old days, mankind very rarely went to war and pursued truth, justice and international trade over anything else. The internet is literally as old as civilization, and has merely grown faster over the centuries. Mankind has always existed not as a bunch of isolated individuals but as a world-wide super-organism from which every individual ultimately derived his definition.</span></p><span data-dcnode-id="1673" instrument_node="">
</span><ul data-dcnode-id="1656"><li data-dcnode-id="1662"><span data-dcnode-id="1672" instrument_node="">Every single great library that has been unearthed in the past century contained international correspondence and most commonly in multiple languages. The </span><a class="reg" data-dcnode-id="1670" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Hittite.html"><span data-dcnode-id="1671" instrument_node="">Hittite</span></a><span data-dcnode-id="1669" instrument_node=""> library found at Hattusa, for instance, contained more than 10,000 texts in </span><i data-dcnode-id="1667"><span data-dcnode-id="1668" instrument_node="">seven</span></i><span data-dcnode-id="1666" instrument_node=""> different Indo-European and </span><a class="reg" data-dcnode-id="1664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Shem.html"><span data-dcnode-id="1665" instrument_node="">Semitic</span></a><span data-dcnode-id="1663" instrument_node=""> languages.</span></li><span data-dcnode-id="1661" instrument_node="">
</span><li data-dcnode-id="1659"><span data-dcnode-id="1660" instrument_node="">The peoples of antiquity were far less interested in violently purloining other people's stuff than scholars of the previous century used to insinuate. There surely were instances of thievery and conquest, but the overwhelming tendency was to fairly exchange goods and much more importantly: skills and knowledge. It's often overlooked how complicated bronze making is, and how many subsidiary technologies have to be in place for it to be possible, yet the Bronze Age began pretty much simultaneously from the Indus Valley to Britain, irrefutably as a result of a continuous world-wide exchange of ideas. And to name another example: inventing the boomerang can hardly be ascribed to serendipity or accident, yet pre-historic boomerangs have been found from Australia to Egypt and even the Netherlands.</span></li><li data-dcnode-id="1657"><span data-dcnode-id="1658" instrument_node="">
The earliest central temples were likewise not institutes of mass distraction (like our modern entertainment) or designed to keep people fearful and subdued (like our modern media), but places where societies stored their surpluses. Mankind's first temples were nothing other than central banks that allowed cultural specialization and subsequent industries to emerge.</span></li></ul><span data-dcnode-id="1655" instrument_node="">
</span></div><h2 data-dcnode-id="1650" id="anc-4" onclick="fold(this.id)"><span class="foldIcon" data-dcnode-id="1652" id="foldic-4"><span data-dcnode-id="1653" instrument_node="">🔽</span></span><span data-dcnode-id="1651" instrument_node="">The suffering servant</span></h2><div class="h2rule" data-dcnode-id="1649"></div><div class="fold" data-dcnode-id="1605" id="par-4"><span data-dcnode-id="1648" instrument_node="">
</span><p data-dcnode-id="1646"><span data-dcnode-id="1647" instrument_node="">A society's surplus both expressed a society's identity (hence totems first and idols later) and constitutes the currency with which a society could interact with other societies. Trade required knowledge of other peoples' languages, cultures, needs and preoccupations and that's how temples grew from central banks into centers of learning. Like the Internet, the painful link between capital and academia is not a modern invention but essential to human society.</span></p><p data-dcnode-id="1641"><span data-dcnode-id="1645" instrument_node="">
One of the first things peoples were bound to discover was that mutual appreciation resulted in fair exchange of knowledge and goods, and made a costly war much less likely to erupt. That made learning a matter of national security, which made it of somewhat dubious interest to political leaders — hence the Bible's dominant theme of the suffering servant or enslaved man of wisdom (and the Hebrew idea of wisdom has to do with verifiable science and practical skill, as opposed to the Greek fad of speculative contemplation; see our article on the name </span><a class="reg" data-dcnode-id="1643" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Hochma.html"><span data-dcnode-id="1644" instrument_node="">Hochma</span></a><span data-dcnode-id="1642" instrument_node="">).</span></p><p data-dcnode-id="1612"><span data-dcnode-id="1640" instrument_node="">
The theme of the enslaved man of wisdom runs from Joseph-son-of-</span><a class="reg" data-dcnode-id="1638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Jacob.html"><span data-dcnode-id="1639" instrument_node="">Jacob</span></a><span data-dcnode-id="1637" instrument_node=""> all the way up to the crucifixion of </span><a class="reg" data-dcnode-id="1635" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Christ.html"><span data-dcnode-id="1636" instrument_node="">Christ</span></a><span data-dcnode-id="1634" instrument_node=""> and the tribulations of the early church. Jesus, after all, is the Word of God through which everything was made and holds together (</span><a class="bibRef reg" data-dcnode-id="1632" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/John/John-1-parsed.html%23AVerse-1"><span data-dcnode-id="1633" instrument_node="">John 1:1-3</span></a><span data-dcnode-id="1631" instrument_node="">, </span><a class="bibRef reg" data-dcnode-id="1629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/Colossians/Colossians-1-parsed.html%23AVerse-16"><span data-dcnode-id="1630" instrument_node="">Colossians 1:16-17</span></a><span data-dcnode-id="1628" instrument_node="">). In other words: although the love of Christ surpasses all knowledge (</span><a class="bibRef reg" data-dcnode-id="1626" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/Ephesians/Ephesians-3-parsed.html%23AVerse-19"><span data-dcnode-id="1627" instrument_node="">Ephesians 3:19</span></a><span data-dcnode-id="1625" instrument_node="">) and no amount of knowledge will ever be salvific (</span><a class="bibRef reg" data-dcnode-id="1623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/1-Corinthians/1-Corinthians-13-parsed.html%23AVerse-2"><span data-dcnode-id="1624" instrument_node="">1 Corinthians 13:2</span></a><span data-dcnode-id="1622" instrument_node="">), Jesus surely also represents everything that can ever be known (compare Proverbs 3:19-20 and Proverbs 8:22-31 with </span><a class="bibRef reg" data-dcnode-id="1620" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/Colossians/Colossians-1-parsed.html%23AVerse-15"><span data-dcnode-id="1621" instrument_node="">Colossians 1:15-18</span></a><span data-dcnode-id="1619" instrument_node=""> and </span><a class="bibRef reg" data-dcnode-id="1617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/John/John-1-parsed.html%23AVerse-1"><span data-dcnode-id="1618" instrument_node="">John 1:1-5</span></a><span data-dcnode-id="1616" instrument_node="">). He is that central bank in which all humanity deposits all surplus (</span><a class="bibRef reg" data-dcnode-id="1614" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/Matthew/Matthew-11-parsed.html%23AVerse-27"><span data-dcnode-id="1615" instrument_node="">Matthew 11:27</span></a><span data-dcnode-id="1613" instrument_node="">) and from which eventually the whole of humanity will be governed (Isaiah 9:6).</span></p><p data-dcnode-id="1607"><span data-dcnode-id="1611" instrument_node="">
All this indicates that the church should be something in between a central bank, an academy and a government building, and should not be a self-congratulatory hobby-club that gets together on Sunday mornings to sing silly songs and cultivate dissension. There is no us versus them; there's only us </span><i data-dcnode-id="1609"><span data-dcnode-id="1610" instrument_node="">for</span></i><span data-dcnode-id="1608" instrument_node=""> them.</span></p><span data-dcnode-id="1606" instrument_node="">
</span></div><h2 data-dcnode-id="1601" id="anc-5" onclick="fold(this.id)"><span class="foldIcon" data-dcnode-id="1603" id="foldic-5"><span data-dcnode-id="1604" instrument_node="">🔽</span></span><span data-dcnode-id="1602" instrument_node="">And a river flowed forth</span></h2><div class="h2rule" data-dcnode-id="1600"></div><div class="fold" data-dcnode-id="1434" id="par-5"><p data-dcnode-id="1589"><span data-dcnode-id="1599" instrument_node="">
Religions, like all cultural phenomena, are like rivers: they usually have a source somewhere but are mostly fed by tributaries and precipitation, and meander through the landscape in simple obedience to gravity. The great river of </span><a class="reg" data-dcnode-id="1597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Christian.html"><span data-dcnode-id="1598" instrument_node="">Christianity</span></a><span data-dcnode-id="1596" instrument_node=""> came about when the river of Judaism was forcibly absorbed by the mighty </span><a class="reg" data-dcnode-id="1594" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Rome.html"><span data-dcnode-id="1595" instrument_node="">Roman</span></a><span data-dcnode-id="1593" instrument_node=""> and </span><a class="reg" data-dcnode-id="1591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Homer.html"><span data-dcnode-id="1592" instrument_node="">Homeric</span></a><span data-dcnode-id="1590" instrument_node=""> ones, and formed a confluent delta of pre-Jesus source-sects:</span></p><span data-dcnode-id="1588" instrument_node="">
</span><ul data-dcnode-id="1487"><li data-dcnode-id="1577"><span data-dcnode-id="1587" instrument_node="">The Baptists: John the Baptist, his disciple </span><a class="reg" data-dcnode-id="1585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Andrew.html"><span data-dcnode-id="1586" instrument_node="">Andrew</span></a><span data-dcnode-id="1584" instrument_node=""> and many others (</span><a class="bibRef reg" data-dcnode-id="1582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/John/John-1-parsed.html%23AVerse-35"><span data-dcnode-id="1583" instrument_node="">John 1:35-37</span></a><span data-dcnode-id="1581" instrument_node="">, </span><a class="bibRef reg" data-dcnode-id="1579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/Acts/Acts-19-parsed.html%23AVerse-1"><span data-dcnode-id="1580" instrument_node="">Acts 19:1-7</span></a><span data-dcnode-id="1578" instrument_node="">).</span></li><span data-dcnode-id="1576" instrument_node="">
</span><li data-dcnode-id="1565"><span data-dcnode-id="1575" instrument_node="">The Sons of Light, who are mentioned in </span><a class="bibRef reg" data-dcnode-id="1573" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/Luke/Luke-16-parsed.html%23AVerse-8"><span data-dcnode-id="1574" instrument_node="">Luke 16:8</span></a><span data-dcnode-id="1572" instrument_node="">, </span><a class="bibRef reg" data-dcnode-id="1570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/John/John-12-parsed.html%23AVerse-36"><span data-dcnode-id="1571" instrument_node="">John 12:36</span></a><span data-dcnode-id="1569" instrument_node="">, </span><a class="bibRef reg" data-dcnode-id="1567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/1-Thessalonians/1-Thessalonians-5-parsed.html%23AVerse-5"><span data-dcnode-id="1568" instrument_node="">1 Thessalonians 5:5</span></a><span data-dcnode-id="1566" instrument_node=""> and in the first or second century BC War Scroll found at Qumran.</span></li><span data-dcnode-id="1564" instrument_node="">
</span><li data-dcnode-id="1547"><span data-dcnode-id="1563" instrument_node="">The </span><a class="reg" data-dcnode-id="1561" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Pharisees.html"><span data-dcnode-id="1562" instrument_node="">Pharisees</span></a><span data-dcnode-id="1560" instrument_node="">, such as Paul, </span><a class="reg" data-dcnode-id="1558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Gamaliel.html"><span data-dcnode-id="1559" instrument_node="">Gamaliel</span></a><span data-dcnode-id="1557" instrument_node=""> and </span><a class="reg" data-dcnode-id="1555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Nicodemus.html"><span data-dcnode-id="1556" instrument_node="">Nicodemus</span></a><span data-dcnode-id="1554" instrument_node="">. Their political rivals were the </span><a class="reg" data-dcnode-id="1552" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Sadducees.html"><span data-dcnode-id="1553" instrument_node="">Sadducees</span></a><span data-dcnode-id="1551" instrument_node="">, whose rejection of the concept of resurrection (</span><a class="bibRef reg" data-dcnode-id="1549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/Matthew/Matthew-22-parsed.html%23AVerse-23"><span data-dcnode-id="1550" instrument_node="">Matthew 22:23</span></a><span data-dcnode-id="1548" instrument_node="">) made them incompatible with the emerging Jesus movement.</span></li><span data-dcnode-id="1546" instrument_node="">
</span><li data-dcnode-id="1541"><span data-dcnode-id="1545" instrument_node="">The </span><a class="reg" data-dcnode-id="1543" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Nazarene.html"><span data-dcnode-id="1544" instrument_node="">Nazarenes</span></a><span data-dcnode-id="1542" instrument_node="">, who appear to have been a particular Jewish sect rather than a few farmer families from an inconsequential rural hamlet (read our article on that name for the details).</span></li><span data-dcnode-id="1540" instrument_node="">
</span><li data-dcnode-id="1514"><span data-dcnode-id="1539" instrument_node="">The Hodosites, or Those Belonging To The Way (</span><a class="bibRef reg" data-dcnode-id="1537" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/Acts/Acts-9-parsed.html%23AVerse-2"><span data-dcnode-id="1538" instrument_node="">Acts 9:2</span></a><span data-dcnode-id="1536" instrument_node="">, </span><a class="bibRef reg" data-dcnode-id="1534" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/Acts/Acts-19-parsed.html%23AVerse-9"><span data-dcnode-id="1535" instrument_node="">19:9</span></a><span data-dcnode-id="1533" instrument_node="">, </span><a class="bibRef reg" data-dcnode-id="1531" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/Acts/Acts-19-parsed.html%23AVerse-23"><span data-dcnode-id="1532" instrument_node="">19:23</span></a><span data-dcnode-id="1530" instrument_node="">, </span><a class="bibRef reg" data-dcnode-id="1528" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/Acts/Acts-24-parsed.html%23AVerse-14"><span data-dcnode-id="1529" instrument_node="">24:14</span></a><span data-dcnode-id="1527" instrument_node="">, </span><a class="bibRef reg" data-dcnode-id="1525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/Acts/Acts-24-parsed.html%23AVerse-22"><span data-dcnode-id="1526" instrument_node="">24:22</span></a><span data-dcnode-id="1524" instrument_node="">), which was either a very early post-Jesus denomination named after Jesus' original claim that he was the Way (</span><a class="bibRef reg" data-dcnode-id="1522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/John/John-14-parsed.html%23AVerse-6"><span data-dcnode-id="1523" instrument_node="">John 14:6</span></a><span data-dcnode-id="1521" instrument_node="">), or, more likely, an already existing Jewish one to which Jesus said: I am the Way that you have been talking about, possibly even following from the ministry of John the Baptist and ultimately from </span><a class="reg" data-dcnode-id="1519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Isaiah.html"><span data-dcnode-id="1520" instrument_node="">Isaiah</span></a><span data-dcnode-id="1518" instrument_node=""> (see </span><a class="bibRef reg" data-dcnode-id="1516" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/John/John-1-parsed.html%23AVerse-23"><span data-dcnode-id="1517" instrument_node="">John 1:23</span></a><span data-dcnode-id="1515" instrument_node=""> and Isaiah 35:8 and 40:1-5).</span></li><span data-dcnode-id="1513" instrument_node="">
</span><li data-dcnode-id="1488"><a class="reg" data-dcnode-id="1511" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Messiah.html"><span data-dcnode-id="1512" instrument_node="">Messianic</span></a><span data-dcnode-id="1510" instrument_node=""> and Christian movements (for instance the </span><a class="reg" data-dcnode-id="1508" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Zealot.html"><span data-dcnode-id="1509" instrument_node="">Zealots</span></a><span data-dcnode-id="1507" instrument_node="">) that were bent on putting a descendant of </span><a class="reg" data-dcnode-id="1505" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/David.html"><span data-dcnode-id="1506" instrument_node="">David</span></a><span data-dcnode-id="1504" instrument_node=""> on the throne of an independent Israel (</span><a class="bibRef reg" data-dcnode-id="1502" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/John/John-6-parsed.html%23AVerse-15"><span data-dcnode-id="1503" instrument_node="">John 6:15</span></a><span data-dcnode-id="1501" instrument_node="">, </span><a class="bibRef reg" data-dcnode-id="1499" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/Acts/Acts-26-parsed.html%23AVerse-28"><span data-dcnode-id="1500" instrument_node="">Acts 26:28</span></a><span data-dcnode-id="1498" instrument_node="">). These groups and their names existed long before Jesus was born, and it's a sad case of historical confusion that the later theology of Jesus of </span><a class="reg" data-dcnode-id="1496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Nazareth.html"><span data-dcnode-id="1497" instrument_node="">Nazareth</span></a><span data-dcnode-id="1495" instrument_node=""> would become known by the titles of these political and presumably violent movements (</span><a class="bibRef reg" data-dcnode-id="1493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/Acts/Acts-11-parsed.html%23AVerse-26"><span data-dcnode-id="1494" instrument_node="">Acts 11:26</span></a><span data-dcnode-id="1492" instrument_node="">, </span><a class="bibRef reg" data-dcnode-id="1490" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/1-Peter/1-Peter-4-parsed.html%23AVerse-16"><span data-dcnode-id="1491" instrument_node="">1 Peter 4:16</span></a><span data-dcnode-id="1489" instrument_node="">; see our article on the term Christian for more details).</span></li></ul><span data-dcnode-id="1486" instrument_node="">
</span><p data-dcnode-id="1481"><span data-dcnode-id="1485" instrument_node="">Contrary to popular belief, these sects were never truly united, or if they were in any meaningful sense, they very quickly Big-Banged into a whole spectrum of very early Christian denominations, most of which died a natural death or were eventually banned by the Church of Constantine (a political entity based on pagan theology, but using for convenience the names and phrases of the Jesus movement — read our article on the name </span><a class="reg" data-dcnode-id="1483" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Caesar.html"><span data-dcnode-id="1484" instrument_node="">Caesar</span></a><span data-dcnode-id="1482" instrument_node="">).</span></p><p data-dcnode-id="1476"><span data-dcnode-id="1480" instrument_node="">
Likewise the "original" river of Judaism was far from pure. In our article on Abraham we point out that "Israel was the melting pot and refinery of the greatest traditions the world had come up with," with sources and tributaries from all over the known world. Even the </span><a class="reg" data-dcnode-id="1478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Torah.html"><span data-dcnode-id="1479" instrument_node="">Torah</span></a><span data-dcnode-id="1477" instrument_node=""> itself was long considered the letter-by-letter dictated Word of God, but in modern times scholars have come to realize that God's Word is "like silver tried in the furnace of the earth, refined seven times" (Psalm 12:6).</span></p><p data-dcnode-id="1468"><span data-dcnode-id="1475" instrument_node="">The Torah is like the three synoptic gospels: very carefully composed, edited and redacted out of very long surviving source material. "Its text may be </span><i data-dcnode-id="1473"><span data-dcnode-id="1474" instrument_node="">edited</span></i><span data-dcnode-id="1472" instrument_node=""> late, but most of its contents are early," roared the unstoppable William G. Dever (page 234 of the paperback), who concluded his eponymous tirade against post-modernism with the amusing outburst: "What Did The Bible Writers Know, and When Did They Know It? They knew a </span><i data-dcnode-id="1470"><span data-dcnode-id="1471" instrument_node="">lot</span></i><span data-dcnode-id="1469" instrument_node="">, and they knew it early".</span></p><p data-dcnode-id="1445"><span data-dcnode-id="1467" instrument_node="">
Most of these Torahic sources are traditional and thus anonymous, but some appear to have been previously collected and published works — for instance the Book of </span><a class="reg" data-dcnode-id="1465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Jashar.html"><span data-dcnode-id="1466" instrument_node="">Jashar</span></a><span data-dcnode-id="1464" instrument_node=""> (referred to in Joshua 10:13 and 2 Samuel 1:18) and the Book of the Wars of </span><a class="reg" data-dcnode-id="1462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/YHWH.html"><span data-dcnode-id="1463" instrument_node="">YHWH</span></a><span data-dcnode-id="1461" instrument_node=""> (Numbers 21:14-15). The royal histories incorporated into the Hebrew Bible are likewise based on a great many sources, either anonymous or not. Among the latter are the works of </span><a class="reg" data-dcnode-id="1459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Nathan.html"><span data-dcnode-id="1460" instrument_node="">Nathan</span></a><span data-dcnode-id="1458" instrument_node=""> the Prophet (1 Chronicles 29:29), </span><a class="reg" data-dcnode-id="1456" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Gad.html"><span data-dcnode-id="1457" instrument_node="">Gad</span></a><span data-dcnode-id="1455" instrument_node=""> the Seer (1 Chronicles 29:29), </span><a class="reg" data-dcnode-id="1453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Ahijah.html"><span data-dcnode-id="1454" instrument_node="">Ahijah</span></a><span data-dcnode-id="1452" instrument_node=""> the Shilonite (1 Chronicles 9:29), </span><a class="reg" data-dcnode-id="1450" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Iddo.html"><span data-dcnode-id="1451" instrument_node="">Iddo</span></a><span data-dcnode-id="1449" instrument_node=""> the Seer (1 Chronicles 9:29, 2 Chronicles 12:15) and </span><a class="reg" data-dcnode-id="1447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Shemaiah.html"><span data-dcnode-id="1448" instrument_node="">Shemaiah</span></a><span data-dcnode-id="1446" instrument_node=""> the Prophet (2 Chronicles 12:15).</span></p><span data-dcnode-id="1444" instrument_node="">
</span><p data-dcnode-id="1436"><span data-dcnode-id="1443" instrument_node="">All this suggests that the traditional author of the Torah, namely Moses (whose name means </span><i data-dcnode-id="1441"><span data-dcnode-id="1442" instrument_node="">Extracted</span></i><span data-dcnode-id="1440" instrument_node="">, whereas the name Exodus means </span><i data-dcnode-id="1438"><span data-dcnode-id="1439" instrument_node="">Extraction</span></i><span data-dcnode-id="1437" instrument_node="">), is not so much the reluctant hero that Hollywood turns him into, but rather the personification of the collective but unorganized and unregulated pre-historic human endeavor to collect the world's wisdoms (skills and knowledge), to perfect them, to preserve them, and ultimately to unite them.</span></p><span data-dcnode-id="1435" instrument_node="">
</span></div><h2 data-dcnode-id="1430" id="anc-6" onclick="fold(this.id)"><span class="foldIcon" data-dcnode-id="1432" id="foldic-6"><span data-dcnode-id="1433" instrument_node="">🔽</span></span><span data-dcnode-id="1431" instrument_node="">The empty grave</span></h2><div class="h2rule" data-dcnode-id="1429"></div><div class="fold" data-dcnode-id="1425" id="par-6"><p data-dcnode-id="1427"><span data-dcnode-id="1428" instrument_node="">
For nearly two centuries now, armies of archeologists, spread out over thousands and thousands of different sites, have made Israel and surrounding areas the most excavated region in the world. All this effort, and this entire tsunami of accumulating evidence upon evidence upon more evidence, has made two things clear beyond the merit of meaningful objection:</span></p><span data-dcnode-id="1426" instrument_node="">
</span></div><h2 data-dcnode-id="1421" id="anc-7" onclick="fold(this.id)"><span class="foldIcon" data-dcnode-id="1423" id="foldic-7"><span data-dcnode-id="1424" instrument_node="">🔽</span></span><span data-dcnode-id="1422" instrument_node="">Thing one</span></h2><div class="h2rule" data-dcnode-id="1420"></div><div class="fold" data-dcnode-id="1400" id="par-7"><p data-dcnode-id="1412"><span data-dcnode-id="1419" instrument_node="">
</span><a class="reg" data-dcnode-id="1417" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Canaan.html"><span data-dcnode-id="1418" instrument_node="">Canaan's</span></a><span data-dcnode-id="1416" instrument_node=""> culture of the last two millennia before Christ was almost entirely indigenous. It was maintained by a collage of autonomous Canaanite tribes that lived in their own city states and were mostly peaceful and cooperative, even to the point that they existed in what may be called a trade union or federation. But much more than trading among themselves, they were the arbiters and landlords of the marketplace upon which the kingdoms of Mesopotamia, Europe, </span><a class="reg" data-dcnode-id="1414" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Arabia.html"><span data-dcnode-id="1415" instrument_node="">Arabia</span></a><span data-dcnode-id="1413" instrument_node="">, Egypt and the rest of Africa and possibly even the Far East conducted their international affairs.</span></p><p data-dcnode-id="1410"><span data-dcnode-id="1411" instrument_node="">
During the Bronze Age, Canaan was mostly under stabilizing and largely benevolent control of Egypt. The collapse of the Bronze Age meant that the existing balance of power was disturbed, trade routes shifted and peoples were displaced and began to move around. Egypt suffered its share of calamities but it clearly never lost a third of its population, let alone the part that comprised its labor force. The collapse was felt in Canaan as well, and there are obvious remains of region-wide destructions. But these destructions clearly happened at different times, sometimes decades apart, and cultures before and after the local destructions remained the same. This means that these destructions were due to frictions within the region rather than a massive influx of foreign-origin people(s). The culture of Canaan has always been continuous and developed uninterrupted.</span></p><p data-dcnode-id="1402"><span data-dcnode-id="1409" instrument_node="">
In the 12th century BC, the </span><a class="reg" data-dcnode-id="1407" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Philistine.html"><span data-dcnode-id="1408" instrument_node="">Philistines</span></a><span data-dcnode-id="1406" instrument_node=""> moved south out of Europe, across the Mediterranean into Egypt and back north up the Canaanite coast and settled their kingdom there. At the end of the 11th century BC (the time of </span><a class="reg" data-dcnode-id="1404" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Saul.html"><span data-dcnode-id="1405" instrument_node="">Saul</span></a><span data-dcnode-id="1403" instrument_node=""> and David) the indigenous communities of the highlands united to form a single state, the United Kingdom, that maintained a very strong (even a suspiciously strong) relation with the Phoenicians directly to the north. This United Kingdom, however, quickly fell apart and formed Israel in the north and Judah in the south.</span></p><span data-dcnode-id="1401" instrument_node="">
</span></div><h2 data-dcnode-id="1396" id="anc-8" onclick="fold(this.id)"><span class="foldIcon" data-dcnode-id="1398" id="foldic-8"><span data-dcnode-id="1399" instrument_node="">🔽</span></span><span data-dcnode-id="1397" instrument_node="">Thing two</span></h2><div class="h2rule" data-dcnode-id="1395"></div><div class="fold" data-dcnode-id="1366" id="par-8"><p data-dcnode-id="1384"><span data-dcnode-id="1394" instrument_node="">
The Bible does not concern the political aspect of humanity's development but the wisdom aspect of it. Had the Bible been as interested in politics as we moderns are, it would have surely mentioned such political milestones as the battle of Qarqar (853 BC), during which the </span><a class="reg" data-dcnode-id="1392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Asshur.html"><span data-dcnode-id="1393" instrument_node="">Assyrian</span></a><span data-dcnode-id="1391" instrument_node=""> king </span><a class="reg" data-dcnode-id="1389" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Shalmaneser.html"><span data-dcnode-id="1390" instrument_node="">Shalmaneser</span></a><span data-dcnode-id="1388" instrument_node=""> III fought against eleven other kings, among whom king </span><a class="reg" data-dcnode-id="1386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Ahab.html"><span data-dcnode-id="1387" instrument_node="">Ahab</span></a><span data-dcnode-id="1385" instrument_node=""> of Israel. It doesn't because the Creator cares about people's adherence to the laws upon which creation operates.</span></p><p data-dcnode-id="1376"><span data-dcnode-id="1383" instrument_node="">
Any tribe that adheres to the natural laws that govern the world will thrive; any tribe that doesn't will develop diseases and discord and will eventually disintegrate. YHWH is not a tribal totem but That Which (or He Who) once produced and still runs the universe. In other words: all that we can know about YHWH is the unified set of natural laws that run the universe (see </span><a class="bibRef reg" data-dcnode-id="1381" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/Romans/Romans-1-parsed.html%23AVerse-20"><span data-dcnode-id="1382" instrument_node="">Romans 1:20</span></a><span data-dcnode-id="1380" instrument_node="">). Science calls this unified set of laws the Grand Unified Theory, and science and </span><a class="reg" data-dcnode-id="1378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/DictionaryG/p/p-e-i-th-om.html"><span data-dcnode-id="1379" instrument_node="">faith</span></a><span data-dcnode-id="1377" instrument_node=""> don't differ in their opinion on whether YHWH exists or not but only on whether he has personhood or not.</span></p><p data-dcnode-id="1374"><span data-dcnode-id="1375" instrument_node="">
This knowledge of YHWH works in every way precisely the way DNA works in organisms. We moderns like to think of an organism as consisting of organs, but there is no chunk of DNA that describes any of them. No part of DNA describes any part of an organism. In the same way does no skill or understanding describe just one nation or one culture. Countries the way we know them exist solely to the benefit of the recipient of people's taxes. To the common person it makes not a lick of difference who sits on the throne or where his realm might formally end.</span></p><p data-dcnode-id="1372"><span data-dcnode-id="1373" instrument_node="">
When we moderns discuss the past, we speak of people groups as if they were countries the way we know them, but that's a folly. In the pre-Roman world there were no borders, no passports, and very little legislation the way we know it. Back then states were far less political (that is: artificially manifested) and much more based on the natural cohesion of a common, naturally progressing culture. People groups distinguished among themselves solely according to their defining cultures, and thus the set of skills and range of knowledge of their wisdom elite. When their political counterparts discovered gullibility of people as means to have them pay for their parties, religions and priests in the modern sense of the word emerged, but before that, a culture's wisdom elite consisted of people who valued wisdom (that is: practical and effective skills and knowledge) above all else, and abhorred falsehood of any kind.</span></p><p data-dcnode-id="1370"><span data-dcnode-id="1371" instrument_node="">
Truth is such a difficult concept that many philosophers broke their teeth on it. The ancients, however, had a very simple way of testing whether something was true or not, namely by demonstration (later rediscovered as part of the scientific method). If someone said something would happen — whether naturally, like a storm, or artificially, when one pushed a button or spoke a spell — and the thing came not about, the person was rightly deemed an imposter. Since lies and nonsense are most detrimental to any society, this imposter would subsequently be executed (Deuteronomy 18:20-22, 1 Kings 18:22-40).</span></p><p data-dcnode-id="1368"><span data-dcnode-id="1369" instrument_node="">
This economy of knowledge was so dominant and pervasive that it triggered civilization as we know it. Long before people became farmers and settled down, they were constructing elaborate buildings to facilitate the pow-wows of their men of wisdom. The magnificent complex found at Göbekli Tepe, for instance, is from the 10th millennium BC, which is long before agriculture began and long before humans settled in cities. We can only guess at its precise use, but it's clear that a multitude of hunter-gatherer collectives made use of it for millennia.</span></p><span data-dcnode-id="1367" instrument_node="">
</span></div><h2 data-dcnode-id="1362" id="anc-9" onclick="fold(this.id)"><span class="foldIcon" data-dcnode-id="1364" id="foldic-9"><span data-dcnode-id="1365" instrument_node="">🔽</span></span><span data-dcnode-id="1363" instrument_node="">The mother of all pow-wows</span></h2><div class="h2rule" data-dcnode-id="1361"></div><div class="fold" data-dcnode-id="1261" id="par-9"><p data-dcnode-id="1356"><span data-dcnode-id="1360" instrument_node="">
Jesus didn't come falling out of heaven fully grown and preaching right away, but was born as a natural baby that had to grow and increase in wisdom (</span><a class="bibRef reg" data-dcnode-id="1358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/Luke/Luke-2-parsed.html%23AVerse-40"><span data-dcnode-id="1359" instrument_node="">Luke 2:40</span></a><span data-dcnode-id="1357" instrument_node="">). So too Yahwism grew slowly within the public debate between the various wisdom traditions of the world. When the Bible speaks of the interaction between people groups (say Egypt and Israel) it is not referring to political states that existed at separate locations on earth but to two wisdom traditions or even attitudes towards knowledge irrespective of where on earth these traditions or attitudes might be adhered to:</span></p><p data-dcnode-id="1348"><span data-dcnode-id="1355" instrument_node="">
"You, Israel, my servant, Jacob whom I have chosen, descendant of Abraham my friend, you whom I have taken </span><i data-dcnode-id="1353"><span data-dcnode-id="1354" instrument_node="">from the ends of the earth</span></i><span data-dcnode-id="1352" instrument_node="">, and called </span><i data-dcnode-id="1350"><span data-dcnode-id="1351" instrument_node="">from its remotest parts</span></i><span data-dcnode-id="1349" instrument_node=""> and said to you, 'You are my servant, I have chosen you and not rejected you'" (Isaiah 41:8).</span></p><p data-dcnode-id="1292"><span data-dcnode-id="1347" instrument_node="">
Long before any formal religion could have existed, the generation of </span><a class="reg" data-dcnode-id="1345" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Seth.html"><span data-dcnode-id="1346" instrument_node="">Seth</span></a><span data-dcnode-id="1344" instrument_node=""> began to call upon the name of YHWH (Genesis 4:26), which is Biblical jargon for saying that they tried to figure out how creation worked (compare Genesis 2:15 to </span><a class="bibRef reg" data-dcnode-id="1342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/Romans/Romans-1-parsed.html%23AVerse-20"><span data-dcnode-id="1343" instrument_node="">Romans 1:20</span></a><span data-dcnode-id="1341" instrument_node="">). Long before righteous Abraham arrived in Canaan, </span><a class="reg" data-dcnode-id="1339" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Melchizedek.html"><span data-dcnode-id="1340" instrument_node="">Melchizedek</span></a><span data-dcnode-id="1338" instrument_node=""> was already a priest of </span><a class="reg" data-dcnode-id="1336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/El.html"><span data-dcnode-id="1337" instrument_node="">El</span></a><span data-dcnode-id="1335" instrument_node=""> </span><a class="reg" data-dcnode-id="1333" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Elyon.html"><span data-dcnode-id="1334" instrument_node="">Elyon</span></a><span data-dcnode-id="1332" instrument_node="">, or the Most High God (Genesis 14:18). Moses' father-in-law </span><a class="reg" data-dcnode-id="1330" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Jethro.html"><span data-dcnode-id="1331" instrument_node="">Jethro</span></a><span data-dcnode-id="1329" instrument_node=""> was a priest in </span><a class="reg" data-dcnode-id="1327" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Midian.html"><span data-dcnode-id="1328" instrument_node="">Midian</span></a><span data-dcnode-id="1326" instrument_node=""> (that's in Arabia). The pagan priest </span><a class="reg" data-dcnode-id="1324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Balaam.html"><span data-dcnode-id="1325" instrument_node="">Balaam</span></a><span data-dcnode-id="1323" instrument_node=""> of </span><a class="reg" data-dcnode-id="1321" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Pethor.html"><span data-dcnode-id="1322" instrument_node="">Pethor</span></a><span data-dcnode-id="1320" instrument_node=""> designed custom curses, but his creativity was checked by his reverence for YHWH-Elahy, or the Lord my God (Numbers 22:18). None other than </span><a class="reg" data-dcnode-id="1318" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Rahab.html"><span data-dcnode-id="1319" instrument_node="">Rahab Inc.</span></a><span data-dcnode-id="1317" instrument_node=""> of </span><a class="reg" data-dcnode-id="1315" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Jericho.html"><span data-dcnode-id="1316" instrument_node="">Jericho</span></a><span data-dcnode-id="1314" instrument_node=""> voiced the position of many, namely that YHWH </span><a class="reg" data-dcnode-id="1312" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Elohim.html"><span data-dcnode-id="1313" instrument_node="">Elohim</span></a><span data-dcnode-id="1311" instrument_node=""> is God in heaven above and on earth beneath (Joshua 2:11). King </span><a class="reg" data-dcnode-id="1309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Achish.html"><span data-dcnode-id="1310" instrument_node="">Achish</span></a><span data-dcnode-id="1308" instrument_node=""> of the Philistines swore by the Life of YHWH to David's virtues (1 Samuel 29:6). Likewise the Phoenician king </span><a class="reg" data-dcnode-id="1306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Hiram.html"><span data-dcnode-id="1307" instrument_node="">Hiram</span></a><span data-dcnode-id="1305" instrument_node=""> of </span><a class="reg" data-dcnode-id="1303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Tyre.html"><span data-dcnode-id="1304" instrument_node="">Tyre</span></a><span data-dcnode-id="1302" instrument_node=""> cheered blessings to YHWH and dominated the building of his temple in Jerusalem (1 Kings 5:7). The founder of Babylon, </span><a class="reg" data-dcnode-id="1300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Nimrod.html"><span data-dcnode-id="1301" instrument_node="">Nimrod</span></a><span data-dcnode-id="1299" instrument_node="">, was a "mighty hunter to YHWH" (Genesis 10:9). Even long before his famous humiliation, </span><a class="reg" data-dcnode-id="1297" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Nebuchadnezzar.html"><span data-dcnode-id="1298" instrument_node="">Nebuchadnezzar</span></a><span data-dcnode-id="1296" instrument_node=""> of Babylon was quite a fan of the Most High (Daniel 4:2-3), and Cyrus of </span><a class="reg" data-dcnode-id="1294" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Persia.html"><span data-dcnode-id="1295" instrument_node="">Persia</span></a><span data-dcnode-id="1293" instrument_node=""> decreed and funded the rebuilding of YHWH's temple and ordered the Return for specifically that purpose (2 Chronicles 36:23, Ezra 6:3-12).</span></p><p data-dcnode-id="1287"><span data-dcnode-id="1291" instrument_node="">
None of these people were Jews in any religious sense and Yahwism was never a local religion but always a universal quest for truth. The Temple in Jerusalem was never meant to serve one nation, but rather all the families of the earth (Genesis 22:18). It was designed to facilitate a continuing pow-wow for representatives of all wisdom traditions of the world. The literary character called </span><a class="reg" data-dcnode-id="1289" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Solomon.html"><span data-dcnode-id="1290" instrument_node="">Solomon</span></a><span data-dcnode-id="1288" instrument_node=""> was not simply the king of some country; he embodied the intersection of all major trade routes, and oversaw the peaceful debate between all mankind's cultures (1 Kings 4:21-24, 1 Kings 10:15):</span></p><p data-dcnode-id="1282"><span data-dcnode-id="1286" instrument_node="">
"So King Solomon became greater than all the kings of the earth in riches and in wisdom. </span><i data-dcnode-id="1284"><span data-dcnode-id="1285" instrument_node="">All the earth</span></i><span data-dcnode-id="1283" instrument_node=""> was seeking the presence of Solomon, to hear his wisdom which God had put in his heart" (1 Kings 10:24).</span></p><span data-dcnode-id="1281" instrument_node="">
</span><p data-dcnode-id="1269"><span data-dcnode-id="1280" instrument_node="">Guarding the treasure of the world's collective wisdom was of course serious business, but the effects were far from glum: "Judah and Israel were as numerous as the sand that is on the seashore in abundance; they were eating and drinking and rejoicing" (1 Kings 4:20). The templar enterprise at large was a huge affair and went far beyond any popular modern depiction of it: the number of people that were somehow active in the operation isn't told, but to keep things running smooth a colossal 24,000 overseers were instated (1 Chronicles 23:4). There were as many gatekeepers (</span><span class="HebF" data-dcnode-id="1278"><span data-dcnode-id="1279" instrument_node="">שמר&nbsp;הסף</span></span><span data-dcnode-id="1277" instrument_node="">, </span><i data-dcnode-id="1271"><a class="reg" data-dcnode-id="1275" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Dictionary/si/si-m-r.html"><span data-dcnode-id="1276" instrument_node="">shemar</span></a><span data-dcnode-id="1274" instrument_node=""> </span><a class="reg" data-dcnode-id="1272" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Dictionary/sa/sa-p-pfin.html"><span data-dcnode-id="1273" instrument_node="">hasap</span></a></i><span data-dcnode-id="1270" instrument_node="">) as there were musicians (namely 4,000; this later grew into the tradition of the Singing Guards). Solomon also reinstated the Pesah festival, which was instituted by YHWH just prior to the Exodus, and even made it a double feature: fourteen days of merriment instead of the prescribed seven (1 Kings 8:65-66).</span></p><span data-dcnode-id="1268" instrument_node="">
</span><p data-dcnode-id="1263"><span data-dcnode-id="1267" instrument_node="">And of course, the total absence of any archeological trace of Solomon's empire renders us the much needed certainty that the Bible is not and has never been talking about an empire that would leave traces in the ground (</span><a class="bibRef reg" data-dcnode-id="1265" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/John/John-18-parsed.html%23AVerse-36"><span data-dcnode-id="1266" instrument_node="">John 18:36-37</span></a><span data-dcnode-id="1264" instrument_node="">).</span></p><span data-dcnode-id="1262" instrument_node="">
</span></div><h2 data-dcnode-id="1257" id="anc-10" onclick="fold(this.id)"><span class="foldIcon" data-dcnode-id="1259" id="foldic-10"><span data-dcnode-id="1260" instrument_node="">🔽</span></span><span data-dcnode-id="1258" instrument_node="">No room in the inn (Babylon)</span></h2><div class="h2rule" data-dcnode-id="1256"></div><div class="fold" data-dcnode-id="1223" id="par-10"><p data-dcnode-id="1254"><span data-dcnode-id="1255" instrument_node="">
The joy of wisdom (which in modern times translates mostly to science, art and technology) works wonders as incentive to keep pursuing it, but still, even then, several things can go wrong:</span></p><span data-dcnode-id="1253" instrument_node="">
</span><ul data-dcnode-id="1231"><span data-dcnode-id="1252" instrument_node="">
</span><li data-dcnode-id="1250"><span data-dcnode-id="1251" instrument_node="">The rule of verification by demonstration (and subsequent execution of failers) as mentioned above, might be embraced as an art itself. If a society allows the sad necessity of arbitration to digress into an autonomous pursuit — combat, after all, requires skills too — individuals will be set against each other in public arenas to slug it out in gory spectacles. And to demonstrate collective skills and superiority, entire armies will engage in what is called "modern warfare" — that is: a willful and orchestrated demonstration of superiority of skill with detrimental results to the inferior. Both Roman times and our own are signified by the gangrenous inflammation of the need to compete, but it's probably also the reason why the common Israelites of the pre-kingdom years were notorious soldiers of fortune (instead of the sages and merchants of the popular image).</span></li><span data-dcnode-id="1249" instrument_node="">
</span><li data-dcnode-id="1235"><span data-dcnode-id="1248" instrument_node="">A culture may have so much fun talking about things that its scholars succumb to endless debate, and the great Inn of Human Reason becomes so overcrowded with legislators, nitpickers and idle babblers that no room is left for true progress. This tragedy appears to have befallen the Rabbinic tradition, as well as the Greek philosophers and early Christian church (</span><a class="bibRef reg" data-dcnode-id="1246" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/1-Corinthians/1-Corinthians-1-parsed.html%23AVerse-20"><span data-dcnode-id="1247" instrument_node="">1 Corinthians 1:20</span></a><span data-dcnode-id="1245" instrument_node="">, </span><a class="bibRef reg" data-dcnode-id="1243" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/Colossians/Colossians-2-parsed.html%23AVerse-8"><span data-dcnode-id="1244" instrument_node="">Colossians 2:8</span></a><span data-dcnode-id="1242" instrument_node="">, </span><a class="bibRef reg" data-dcnode-id="1240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/1-Timothy/1-Timothy-1-parsed.html%23AVerse-4"><span data-dcnode-id="1241" instrument_node="">1 Timothy 1:4</span></a><span data-dcnode-id="1239" instrument_node="">). It took many centuries of precious human time to clear the Great Inn of some of its rubbish and begin to make way for true knowledge (2 Kings 23:4-25, </span><a class="bibRef reg" data-dcnode-id="1237" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/Colossians/Colossians-2-parsed.html%23AVerse-2"><span data-dcnode-id="1238" instrument_node="">Colossians 2:2</span></a><span data-dcnode-id="1236" instrument_node="">).</span></li><span data-dcnode-id="1234" instrument_node="">
</span><li data-dcnode-id="1232"><span data-dcnode-id="1233" instrument_node="">A culture may become so successful that it collectively forgets that it never created anything, and only learned how to use what was already there. A society's chief templar may forget that he didn't produce his society's surplus and merely allocates it, and confuse his own little role in the whole scenario with something worthy of glory and grandeur. Instead of investing the surplus in beneficial infrastructure for all to enjoy, a chief templar may even be tempted to spend it all on entertainment and gadgetry. Nebuchadnezzar succumbed to these temptations (Daniel 4:30) and Solomon even lost the consistency of his empire over it (1 Kings 11:26-28).</span></li></ul><span data-dcnode-id="1230" instrument_node="">
</span><p data-dcnode-id="1225"><span data-dcnode-id="1229" instrument_node="">The Out-Of-Babylon theme has mostly to do with a departure from the enticing all-talk-and-no-action or all-play-and-no-work attitude that tends to overpopulate the great Temple of YHWH, but this folly is still due to enthusiasm and love of wisdom, and easily remedied by a few hangovers (</span><a class="bibRef reg" data-dcnode-id="1227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/Revelation/Revelation-18-parsed.html%23AVerse-2"><span data-dcnode-id="1228" instrument_node="">Revelation 18:2-3</span></a><span data-dcnode-id="1226" instrument_node="">) or a big hand writing on the wall (Daniel 5:5). The Out-Out-Egypt theme, however, revolves around much more sinister pursuits:</span></p><span data-dcnode-id="1224" instrument_node="">
</span></div><h2 data-dcnode-id="1219" id="anc-11" onclick="fold(this.id)"><span class="foldIcon" data-dcnode-id="1221" id="foldic-11"><span data-dcnode-id="1222" instrument_node="">🔽</span></span><span data-dcnode-id="1220" instrument_node="">Snake in the tree (Egypt)</span></h2><div class="h2rule" data-dcnode-id="1218"></div><div class="fold" data-dcnode-id="1118" id="par-11"><span data-dcnode-id="1217" instrument_node="">
</span><p data-dcnode-id="1215"><span data-dcnode-id="1216" instrument_node="">When the rule of verification by demonstration is properly upheld and nobody's rightful happiness turns into ungrateful boasting, all remaining people-of-skill synchronized together know All There Is To Know. The latter is an entity that:</span></p><span data-dcnode-id="1214" instrument_node="">
</span><ul data-dcnode-id="1170"><span data-dcnode-id="1213" instrument_node="">
</span><li data-dcnode-id="1208"><span data-dcnode-id="1212" instrument_node="">Never stops growing (just like a human individual) and can therefore never be represented by a static image (Exodus 20:4, </span><a class="bibRef reg" data-dcnode-id="1210" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/2-Corinthians/2-Corinthians-4-parsed.html%23AVerse-4"><span data-dcnode-id="1211" instrument_node="">2 Corinthians 4:4</span></a><span data-dcnode-id="1209" instrument_node="">).</span></li><span data-dcnode-id="1207" instrument_node="">
</span><li data-dcnode-id="1202"><span data-dcnode-id="1206" instrument_node="">Always remains a singular, indivisible entity (Deuteronomy 6:4, Proverbs 9:10, </span><a class="bibRef reg" data-dcnode-id="1204" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/1-Corinthians/1-Corinthians-1-parsed.html%23AVerse-13"><span data-dcnode-id="1205" instrument_node="">1 Corinthians 1:13</span></a><span data-dcnode-id="1203" instrument_node="">).</span></li><span data-dcnode-id="1201" instrument_node="">
</span><li data-dcnode-id="1187"><span data-dcnode-id="1200" instrument_node="">Never stops to serve all of its tributaries without discrimination (Genesis 22:18, </span><a class="bibRef reg" data-dcnode-id="1198" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/Matthew/Matthew-28-parsed.html%23AVerse-19"><span data-dcnode-id="1199" instrument_node="">Matthew 28:19</span></a><span data-dcnode-id="1197" instrument_node="">, </span><a class="bibRef reg" data-dcnode-id="1195" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/John/John-13-parsed.html%23AVerse-1"><span data-dcnode-id="1196" instrument_node="">John 13:1-20</span></a><span data-dcnode-id="1194" instrument_node="">, </span><a class="bibRef reg" data-dcnode-id="1192" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/Ephesians/Ephesians-3-parsed.html%23AVerse-15"><span data-dcnode-id="1193" instrument_node="">Ephesians 3:15</span></a><span data-dcnode-id="1191" instrument_node="">, </span><a class="bibRef reg" data-dcnode-id="1189" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/Galatians/Galatians-3-parsed.html%23AVerse-28"><span data-dcnode-id="1190" instrument_node="">Galatians 3:28</span></a><span data-dcnode-id="1188" instrument_node="">).</span></li><span data-dcnode-id="1186" instrument_node="">
</span><li data-dcnode-id="1181"><span data-dcnode-id="1185" instrument_node="">Is continuously served by all its tributaries without discrimination (2 Chronicles 9:13-14, </span><a class="bibRef reg" data-dcnode-id="1183" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/Revelation/Revelation-21-parsed.html%23AVerse-24"><span data-dcnode-id="1184" instrument_node="">Revelation 21:24</span></a><span data-dcnode-id="1182" instrument_node="">).</span></li><span data-dcnode-id="1180" instrument_node="">
</span><li data-dcnode-id="1172"><span data-dcnode-id="1179" instrument_node="">Brings about consilience, prosperity and great joy for everybody without discrimination (Deuteronomy 11:27, </span><a class="bibRef reg" data-dcnode-id="1177" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/Ephesians/Ephesians-3-parsed.html%23AVerse-19"><span data-dcnode-id="1178" instrument_node="">Ephesians 3:19</span></a><span data-dcnode-id="1176" instrument_node="">, </span><a class="bibRef reg" data-dcnode-id="1174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Interlinear-New-Testament/Jude/Jude-1-parsed.html%23AVerse-24"><span data-dcnode-id="1175" instrument_node="">Jude 1:24-25</span></a><span data-dcnode-id="1173" instrument_node="">).</span></li><span data-dcnode-id="1171" instrument_node="">
</span></ul><span data-dcnode-id="1169" instrument_node="">
</span><p data-dcnode-id="1167"><span data-dcnode-id="1168" instrument_node="">The "wisdom of Egypt" (which, we shall repeat for clarity sake, is not restricted to geographic Egypt) does violence to any of the above.</span></p><p data-dcnode-id="1156"><span data-dcnode-id="1166" instrument_node="">
Egypt is fanatical about making graven images, and that by itself doesn't have to be a problem. The symmetrical statues of Rameses II and the mesmerizing Giza plateau are admitted favorites of us here at </span><a class="reg" data-dcnode-id="1164" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Abarim.html"><span data-dcnode-id="1165" instrument_node="">Abarim</span></a><span data-dcnode-id="1163" instrument_node=""> Publications, and so are the </span><a class="reg" data-dcnode-id="1161" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/StandardModel.html"><span data-dcnode-id="1162" instrument_node="">Standard Model of Elementary Particles</span></a><span data-dcnode-id="1160" instrument_node=""> and </span><a class="reg" data-dcnode-id="1158" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/QuantumFoam.html%23bank"><span data-dcnode-id="1159" instrument_node="">Relativity Theory</span></a><span data-dcnode-id="1157" instrument_node="">, to name a few.</span></p><p data-dcnode-id="1151"><span data-dcnode-id="1155" instrument_node="">
Aspiring critics should never forget that the Lord's very Ark of the Covenant was equipped with statues of </span><a class="reg" data-dcnode-id="1153" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abarim-publications.com/Meaning/Cherubim.html"><span data-dcnode-id="1154" instrument_node="">Cherubim</span></a><span data-dcnode-id="1152" instrument_node=""> (Exodus 25:18), but aspiring image gravers should be aware that the problem comes when these statues (or dogmas or manifestos or scientific theories) purpose to encapsulate the definite representation of the deity or all his work. The steady state model of the universe and that of the biosphere have now been largely abandoned in favor of the view that everything changes, but "change" might not be the right word.</span></p><p data-dcnode-id="1120"><span data-dcnode-id="1150" instrument_node="">
