</span></p><p data-dcnode-id="4528"><span data-dcnode-id="4552" instrument_node="">In </span><a class="mw-redirect" data-dcnode-id="4550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Epistle_to_the_Romans" title="The Epistle to the Romans"><span data-dcnode-id="4551" instrument_node="">Romans</span></a><span data-dcnode-id="4549" instrument_node=""> 9:17, Paul interprets the hardened heart of Pharaoh during the Plagues of Egypt as referring to the hardened hearts of the Jews who rejected Christ.</span><sup class="reference" data-dcnode-id="4546" id="cite_ref-FOOTNOTEDozemanShectman2016150_125-0"><a data-dcnode-id="4547" href="#cite_note-FOOTNOTEDozemanShectman2016150-125"><span data-dcnode-id="4548" instrument_node="">[116]</span></a></sup><span data-dcnode-id="4545" instrument_node=""> Early Christian authors such as </span><a data-dcnode-id="4543" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Justin_Martyr" title="Justin Martyr"><span data-dcnode-id="4544" instrument_node="">Justin Martyr</span></a><span data-dcnode-id="4542" instrument_node="">, </span><a data-dcnode-id="4540" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Irenaeus" title="Irenaeus"><span data-dcnode-id="4541" instrument_node="">Irenaeus</span></a><span data-dcnode-id="4539" instrument_node="">, and </span><a class="mw-redirect" data-dcnode-id="4537" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Augustine" title="Augustine"><span data-dcnode-id="4538" instrument_node="">Augustine</span></a><span data-dcnode-id="4536" instrument_node=""> all emphasized the </span><a class="mw-redirect" data-dcnode-id="4534" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Supersession" title="Supersession"><span data-dcnode-id="4535" instrument_node="">supersession</span></a><span data-dcnode-id="4533" instrument_node=""> of the Old Covenant of Moses by the New Covenant of Christ, which was open to all people rather than limited to the Jews.</span><sup class="reference" data-dcnode-id="4530" id="cite_ref-FOOTNOTEDozemanShectman2016160_126-0"><a data-dcnode-id="4531" href="#cite_note-FOOTNOTEDozemanShectman2016160-126"><span data-dcnode-id="4532" instrument_node="">[117]</span></a></sup><span data-dcnode-id="4529" instrument_node="">
</span></p><p data-dcnode-id="4500"><span data-dcnode-id="4527" instrument_node="">A number of historical events and situations have been compared to the Exodus. Many early American settlers interpreted their flight from Europe to a new life in America as a new exodus. American "founding fathers" </span><a data-dcnode-id="4525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Thomas_Jefferson" title="Thomas Jefferson"><span data-dcnode-id="4526" instrument_node="">Thomas Jefferson</span></a><span data-dcnode-id="4524" instrument_node=""> and </span><a data-dcnode-id="4522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Benjamin_Franklin" title="Benjamin Franklin"><span data-dcnode-id="4523" instrument_node="">Benjamin Franklin</span></a><span data-dcnode-id="4521" instrument_node=""> recommended for the </span><a data-dcnode-id="4519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Great_Seal_of_the_United_States" title="Great Seal of the United States"><span data-dcnode-id="4520" instrument_node="">Great Seal of the United States</span></a><span data-dcnode-id="4518" instrument_node=""> to depict Moses leading the Israelites across the Red Sea. African Americans suffering under slavery and racial oppression interpreted their situation in terms of the Exodus, making it a catalyst for social change.</span><sup class="reference" data-dcnode-id="4515" id="cite_ref-FOOTNOTETigay2004107_127-0"><a data-dcnode-id="4516" href="#cite_note-FOOTNOTETigay2004107-127"><span data-dcnode-id="4517" instrument_node="">[118]</span></a></sup><sup class="reference" data-dcnode-id="4512" id="cite_ref-FOOTNOTEAssmann2018335_128-0"><a data-dcnode-id="4513" href="#cite_note-FOOTNOTEAssmann2018335-128"><span data-dcnode-id="4514" instrument_node="">[119]</span></a></sup><sup class="reference" data-dcnode-id="4509" id="cite_ref-FOOTNOTECoomber2012123_129-0"><a data-dcnode-id="4510" href="#cite_note-FOOTNOTECoomber2012123-129"><span data-dcnode-id="4511" instrument_node="">[120]</span></a></sup><span data-dcnode-id="4508" instrument_node=""> South American </span><a data-dcnode-id="4506" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Liberation_theology" title="Liberation theology"><span data-dcnode-id="4507" instrument_node="">Liberation theology</span></a><span data-dcnode-id="4505" instrument_node=""> also takes much inspiration from the Exodus.</span><sup class="reference" data-dcnode-id="4502" id="cite_ref-FOOTNOTEBaden2019xiv_15-1"><a data-dcnode-id="4503" href="#cite_note-FOOTNOTEBaden2019xiv-15"><span data-dcnode-id="4504" instrument_node="">[13]</span></a></sup><span data-dcnode-id="4501" instrument_node="">

</span><div class="reflist reflist-lower-alpha" data-dcnode-id="4140"><span data-dcnode-id="4425" instrument_node="">
</span><div class="mw-references-wrap" data-dcnode-id="4141"><ol class="references" data-dcnode-id="4142"><span data-dcnode-id="4424" instrument_node="">
</span><li data-dcnode-id="4408" id="cite_note-1"><span class="mw-cite-backlink" data-dcnode-id="4420"><b data-dcnode-id="4421"><a aria-label="Jump up" data-dcnode-id="4422" href="#cite_ref-1" title="Jump up"><span data-dcnode-id="4423" instrument_node="">^</span></a></b></span><span data-dcnode-id="4419" instrument_node=""> </span><span class="reference-text" data-dcnode-id="4410"><span data-dcnode-id="4418" instrument_node="">The term </span><i data-dcnode-id="4415"><a data-dcnode-id="4416" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Myth" title="Myth"><span data-dcnode-id="4417" instrument_node="">myth</span></a></i><span data-dcnode-id="4414" instrument_node=""> is used here in its academic sense, meaning "a traditional story consisting of events that are ostensibly historical, though often supernatural, explaining the origins of a cultural practice or natural phenomenon." It is </span><i data-dcnode-id="4412"><span data-dcnode-id="4413" instrument_node="">not</span></i><span data-dcnode-id="4411" instrument_node=""> being used to mean "something that is false".</span></span><span data-dcnode-id="4409" instrument_node="">
</span></li><span data-dcnode-id="4407" instrument_node="">
</span><li data-dcnode-id="4389" id="cite_note-3"><span class="mw-cite-backlink" data-dcnode-id="4403"><b data-dcnode-id="4404"><a aria-label="Jump up" data-dcnode-id="4405" href="#cite_ref-3" title="Jump up"><span data-dcnode-id="4406" instrument_node="">^</span></a></b></span><span data-dcnode-id="4402" instrument_node=""> </span><span class="reference-text" data-dcnode-id="4391"><span data-dcnode-id="4401" instrument_node="">The name "exodus" is from </span><a data-dcnode-id="4399" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ancient_Greek" title="Ancient Greek"><span data-dcnode-id="4400" instrument_node="">Greek</span></a><span data-dcnode-id="4398" instrument_node=""> ἔξοδος </span><i data-dcnode-id="4396"><span data-dcnode-id="4397" instrument_node="">exodos</span></i><span data-dcnode-id="4395" instrument_node="">, "going out". For "myth" see Sparks, 2010, p. 73: "Charter (i.e., foundation) myths tell the story of a society's origins, and, in doing so, provide the ideological foundations for the culture and its institutions."</span><sup class="reference" data-dcnode-id="4392" id="cite_ref-FOOTNOTESparks201073_2-1"><a data-dcnode-id="4393" href="#cite_note-FOOTNOTESparks201073-2"><span data-dcnode-id="4394" instrument_node="">[1]</span></a></sup></span><span data-dcnode-id="4390" instrument_node="">
</span></li><span data-dcnode-id="4388" instrument_node="">
</span><li data-dcnode-id="4362" id="cite_note-19"><span class="mw-cite-backlink" data-dcnode-id="4384"><b data-dcnode-id="4385"><a aria-label="Jump up" data-dcnode-id="4386" href="#cite_ref-19" title="Jump up"><span data-dcnode-id="4387" instrument_node="">^</span></a></b></span><span data-dcnode-id="4383" instrument_node=""> </span><span class="reference-text" data-dcnode-id="4364"><span data-dcnode-id="4382" instrument_node="">A "store city" or "supply city" was a city used to store provisions and garrison an important campaign route.</span><sup class="reference" data-dcnode-id="4379" id="cite_ref-FOOTNOTEAssmann201894_16-0"><a data-dcnode-id="4380" href="#cite_note-FOOTNOTEAssmann201894-16"><span data-dcnode-id="4381" instrument_node="">[14]</span></a></sup><span data-dcnode-id="4378" instrument_node=""> The </span><a data-dcnode-id="4376" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Septuagint" title="Septuagint"><span data-dcnode-id="4377" instrument_node="">Septuagint</span></a><span data-dcnode-id="4375" instrument_node=""> version includes a reference to a third "supply city" built by the Hebrews: " On,  which  is  </span><a data-dcnode-id="4373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Heliopolis_%28ancient_Egypt%29" title="Heliopolis (ancient Egypt)"><span data-dcnode-id="4374" instrument_node="">Heliopolis</span></a><span data-dcnode-id="4372" instrument_node="">" (LXX Exodus 1:11, trans. Larry J. Perkins</span><sup class="reference" data-dcnode-id="4369" id="cite_ref-FOOTNOTEPietersmaWright2014_17-0"><a data-dcnode-id="4370" href="#cite_note-FOOTNOTEPietersmaWright2014-17"><span data-dcnode-id="4371" instrument_node="">[15]</span></a></sup><sup class="reference" data-dcnode-id="4366" id="cite_ref-FOOTNOTEDozemanShectman2016139_18-0"><a data-dcnode-id="4367" href="#cite_note-FOOTNOTEDozemanShectman2016139-18"><span data-dcnode-id="4368" instrument_node="">[16]</span></a></sup><span data-dcnode-id="4365" instrument_node="">).</span></span><span data-dcnode-id="4363" instrument_node="">
</span></li><span data-dcnode-id="4361" instrument_node="">
</span><li data-dcnode-id="4321" id="cite_note-23"><span class="mw-cite-backlink" data-dcnode-id="4357"><b data-dcnode-id="4358"><a aria-label="Jump up" data-dcnode-id="4359" href="#cite_ref-23" title="Jump up"><span data-dcnode-id="4360" instrument_node="">^</span></a></b></span><span data-dcnode-id="4356" instrument_node=""> </span><span class="reference-text" data-dcnode-id="4323"><span data-dcnode-id="4355" instrument_node="">These magicians are referred to in the Hebrew text as </span><span data-dcnode-id="4352" title="Hebrew-language text"><i data-dcnode-id="4353" lang="he"><span data-dcnode-id="4354" instrument_node="">ḥartummîm</span></i></span><span data-dcnode-id="4351" instrument_node="">, which derives from </span><a data-dcnode-id="4349" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Egyptian_language" title="Egyptian language"><span data-dcnode-id="4350" instrument_node="">Ancient Egyptian</span></a><span data-dcnode-id="4348" instrument_node=""> </span><span data-dcnode-id="4345" title="Ancient Egyptian-language text"><i data-dcnode-id="4346" lang="egy"><span data-dcnode-id="4347" instrument_node="">ḥrj-tp</span></i></span><span data-dcnode-id="4344" instrument_node=""> (</span><a data-dcnode-id="4342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Demotic_%28Egyptian%29" title="Demotic (Egyptian)"><span data-dcnode-id="4343" instrument_node="">Demotic</span></a><span data-dcnode-id="4341" instrument_node=""> </span><span data-dcnode-id="4338" title="Ancient Egyptian-language text"><i data-dcnode-id="4339" lang="egy"><span data-dcnode-id="4340" instrument_node="">p-hritob</span></i></span><span data-dcnode-id="4337" instrument_node="">, </span><a data-dcnode-id="4335" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Akkadian_language" title="Akkadian language"><span data-dcnode-id="4336" instrument_node="">Akkadian</span></a><span data-dcnode-id="4334" instrument_node="">: </span><i data-dcnode-id="4332" lang="akk"><span data-dcnode-id="4333" instrument_node="">ḥar-tibi</span></i><span data-dcnode-id="4331" instrument_node="">) a title meaning "chief" and shortened from "chief lector priest".</span><sup class="reference" data-dcnode-id="4328" id="cite_ref-FOOTNOTEAssmann2018139_21-0"><a data-dcnode-id="4329" href="#cite_note-FOOTNOTEAssmann2018139-21"><span data-dcnode-id="4330" instrument_node="">[18]</span></a></sup><span data-dcnode-id="4327" instrument_node=""> The Pharaoh's magicians are able to replicate Moses and Aaron's actions until the third plague (gnats), when they are the first to recognize that a divine power is at work (Exodus 8:19). In plague four (festering boils), they themselves are afflicted and no longer contest with Moses and Aaron.</span><sup class="reference" data-dcnode-id="4324" id="cite_ref-FOOTNOTEAssmann2018139–142_22-0"><a data-dcnode-id="4325" href="#cite_note-FOOTNOTEAssmann2018139%E2%80%93142-22"><span data-dcnode-id="4326" instrument_node="">[19]</span></a></sup></span><span data-dcnode-id="4322" instrument_node="">
</span></li><span data-dcnode-id="4320" instrument_node="">
</span><li data-dcnode-id="4308" id="cite_note-44"><span class="mw-cite-backlink" data-dcnode-id="4316"><b data-dcnode-id="4317"><a aria-label="Jump up" data-dcnode-id="4318" href="#cite_ref-44" title="Jump up"><span data-dcnode-id="4319" instrument_node="">^</span></a></b></span><span data-dcnode-id="4315" instrument_node=""> </span><span class="reference-text" data-dcnode-id="4310"><span data-dcnode-id="4314" instrument_node="">"While there is a consensus among scholars that the Exodus did not take place in the manner described in the Bible, surprisingly most scholars agree that the narrative has a historical core, and that some of the highland settlers came, one way or another, from Egypt..." "Archaeology does not really contribute to the debate over the historicity or even historical background of the Exodus itself, but if there was indeed such a group, it contributed the Exodus story to that of all Israel. While I agree that it is most likely that there was such a group, I must stress that this is based on an overall understanding of the development of collective memory and of the authorship of the texts (and their editorial process). Archaeology, unfortunately, cannot directly contribute (yet?) to the study of this specific group of Israel's ancestors."</span><sup class="reference" data-dcnode-id="4311" id="cite_ref-FOOTNOTEFaust2015476_29-2"><a data-dcnode-id="4312" href="#cite_note-FOOTNOTEFaust2015476-29"><span data-dcnode-id="4313" instrument_node="">[25]</span></a></sup></span><span data-dcnode-id="4309" instrument_node="">

</span><li data-dcnode-id="3977" id="cite_note-FOOTNOTEFaust2015p.476:_&quot;While_there_is_a_consensus_among_scholars_that_the_Exodus_did_not_take_place_in_the_manner_described_in_the_Bible,_surprisingly_most_scholars_agree_that_the_narrative_has_a_historical_core,_and_that_some_of_the_highland_settlers_came,_one_way_or_another,_from_Egypt..&quot;-8"><span class="mw-cite-backlink" data-dcnode-id="3984"><b data-dcnode-id="3985"><a aria-label="Jump up" data-dcnode-id="3986" href="#cite_ref-FOOTNOTEFaust2015p.476:_%22While_there_is_a_consensus_among_scholars_that_the_Exodus_did_not_take_place_in_the_manner_described_in_the_Bible,_surprisingly_most_scholars_agree_that_the_narrative_has_a_historical_core,_and_that_some_of_the_highland_settlers_came,_one_way_or_another,_from_Egypt..%22_8-0" title="Jump up"><span data-dcnode-id="3987" instrument_node="">^</span></a></b></span><span data-dcnode-id="3983" instrument_node=""> </span><span class="reference-text" data-dcnode-id="3979"><a data-dcnode-id="3981" href="#CITEREFFaust2015"><span data-dcnode-id="3982" instrument_node="">Faust 2015</span></a><span data-dcnode-id="3980" instrument_node="">, p.476: "While there is a consensus among scholars that the Exodus did not take place in the manner described in the Bible, surprisingly most scholars agree that the narrative has a historical core, and that some of the highland settlers came, one way or another, from Egypt..".</span></span><span data-dcnode-id="3978" instrument_node="">
</span></li><span data-dcnode-id="3976" instrument_node="">
</span><li data-dcnode-id="3965" id="cite_note-FOOTNOTERedmount200161-9"><span class="mw-cite-backlink" data-dcnode-id="3972"><b data-dcnode-id="3973"><a aria-label="Jump up" data-dcnode-id="3974" href="#cite_ref-FOOTNOTERedmount200161_9-0" title="Jump up"><span data-dcnode-id="3975" instrument_node="">^</span></a></b></span><span data-dcnode-id="3971" instrument_node=""> </span><span class="reference-text" data-dcnode-id="3967"><a data-dcnode-id="3969" href="#CITEREFRedmount2001"><span data-dcnode-id="3970" instrument_node="">Redmount 2001</span></a><span data-dcnode-id="3968" instrument_node="">, p.&nbsp;61: "A few authorities have concluded that the core events of the Exodus saga are entirely literary fabrications. But most biblical scholars still subscribe to some variation of the Documentary Hypothesis, and support the basic historicity of the biblical narrative."</span></span><span data-dcnode-id="3966" instrument_node="">
</span></li><span data-dcnode-id="3964" instrument_node="">
</span><li data-dcnode-id="3936" id="cite_note-FOOTNOTERedmount200187-10"><span class="mw-cite-backlink" data-dcnode-id="3943"><span data-dcnode-id="3963" instrument_node="">^ </span><a data-dcnode-id="3956" href="#cite_ref-FOOTNOTERedmount200187_10-0"><span class="cite-accessibility-label" data-dcnode-id="3961"><span data-dcnode-id="3962" instrument_node="">Jump up to: </span></span><sup data-dcnode-id="3957"><i data-dcnode-id="3958"><b data-dcnode-id="3959"><span data-dcnode-id="3960" instrument_node="">a</span></b></i></sup></a><span data-dcnode-id="3955" instrument_node=""> </span><a data-dcnode-id="3950" href="#cite_ref-FOOTNOTERedmount200187_10-1"><sup data-dcnode-id="3951"><i data-dcnode-id="3952"><b data-dcnode-id="3953"><span data-dcnode-id="3954" instrument_node="">b</span></b></i></sup></a><span data-dcnode-id="3949" instrument_node=""> </span><a data-dcnode-id="3944" href="#cite_ref-FOOTNOTERedmount200187_10-2"><sup data-dcnode-id="3945"><i data-dcnode-id="3946"><b data-dcnode-id="3947"><span data-dcnode-id="3948" instrument_node="">c</span></b></i></sup></a></span><span data-dcnode-id="3942" instrument_node=""> </span><span class="reference-text" data-dcnode-id="3938"><a data-dcnode-id="3940" href="#CITEREFRedmount2001"><span data-dcnode-id="3941" instrument_node="">Redmount 2001</span></a><span data-dcnode-id="3939" instrument_node="">, p.&nbsp;87: "The biblical text has its own inner logic and consistency, largely divorced from the concerns of secular history. [...] conversely, the Bible, never intended to function primarily as a historical document, cannot meet modern canons of historical accuracy and reliability. There is, in fact, remarkably little of proven or provable historical worth or reliability in the biblical Exodus narrative, and no reliable independent witnesses attest to the historicity or date of the Exodus events."</span></span><span data-dcnode-id="3937" instrument_node="">
