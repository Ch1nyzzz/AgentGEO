</span><div class="hatnote navigation-not-searchable" data-dcnode-id="6271" role="note"><span data-dcnode-id="6278" instrument_node="">This article is about the events related in the Bible. For the second book of the Bible, see </span><a data-dcnode-id="6276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Book_of_Exodus" title="Book of Exodus"><span data-dcnode-id="6277" instrument_node="">Book of Exodus</span></a><span data-dcnode-id="6275" instrument_node="">. For other uses, see </span><a class="mw-redirect mw-disambig" data-dcnode-id="6273" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Exodus_%28disambiguation%29" title="Exodus (disambiguation)"><span data-dcnode-id="6274" instrument_node="">Exodus (disambiguation)</span></a><span data-dcnode-id="6272" instrument_node="">.</span></div><span data-dcnode-id="6270" instrument_node="">

</span><div class="thumb tright" data-dcnode-id="6253"><div class="thumbinner" data-dcnode-id="6254" style="width:302px;"><a class="image" data-dcnode-id="6265" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ADavid_Roberts-IsraelitesLeavingEgypt_1828.jpg"><img alt="" class="thumbimage" data-dcnode-id="6266" data-file-height="6825" data-file-width="9447" decoding="async" height="217" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/6/6e/David_Roberts-IsraelitesLeavingEgypt_1828.jpg/300px-David_Roberts-IsraelitesLeavingEgypt_1828.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/6/6e/David_Roberts-IsraelitesLeavingEgypt_1828.jpg/450px-David_Roberts-IsraelitesLeavingEgypt_1828.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/6/6e/David_Roberts-IsraelitesLeavingEgypt_1828.jpg/600px-David_Roberts-IsraelitesLeavingEgypt_1828.jpg 2x" width="300"></a><span data-dcnode-id="6264" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6255"><div class="magnify" data-dcnode-id="6262"><a class="internal" data-dcnode-id="6263" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ADavid_Roberts-IsraelitesLeavingEgypt_1828.jpg" title="Enlarge"></a></div><i data-dcnode-id="6260"><span data-dcnode-id="6261" instrument_node="">Departure of the Israelites</span></i><span data-dcnode-id="6259" instrument_node=""> (</span><a data-dcnode-id="6257" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/David_Roberts_%28painter%29" title="David Roberts (painter)"><span data-dcnode-id="6258" instrument_node="">David Roberts</span></a><span data-dcnode-id="6256" instrument_node="">, 1829)</span></div></div></div><span data-dcnode-id="6252" instrument_node="">
</span><p data-dcnode-id="6195"><b data-dcnode-id="6250"><span data-dcnode-id="6251" instrument_node="">The Exodus</span></b><span data-dcnode-id="6249" instrument_node=""> (</span><a data-dcnode-id="6247" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hebrew_language" title="Hebrew language"><span data-dcnode-id="6248" instrument_node="">Hebrew</span></a><span data-dcnode-id="6246" instrument_node="">: יציאת מצרים, </span><i data-dcnode-id="6244"><span data-dcnode-id="6245" instrument_node="">Yeẓi’at Miẓrayim</span></i><span data-dcnode-id="6243" instrument_node="">: </span><abbr data-dcnode-id="6241" title="literal translation"><span data-dcnode-id="6242" instrument_node="">lit.</span></abbr><span data-dcnode-id="6239" style="white-space: nowrap;"><span data-dcnode-id="6240" instrument_node=""> </span></span><span data-dcnode-id="6238" instrument_node="">'Departure from Egypt') is the </span><a class="mw-redirect" data-dcnode-id="6236" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Founding_myth" title="Founding myth"><span data-dcnode-id="6237" instrument_node="">founding myth</span></a><sup class="reference" data-dcnode-id="6233" id="cite_ref-1"><a data-dcnode-id="6234" href="#cite_note-1"><span data-dcnode-id="6235" instrument_node="">[a]</span></a></sup><span data-dcnode-id="6232" instrument_node=""> of the </span><a data-dcnode-id="6230" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Israelites" title="Israelites"><span data-dcnode-id="6231" instrument_node="">Israelites</span></a><span data-dcnode-id="6229" instrument_node="">,</span><sup class="reference" data-dcnode-id="6226" id="cite_ref-FOOTNOTESparks201073_2-0"><a data-dcnode-id="6227" href="#cite_note-FOOTNOTESparks201073-2"><span data-dcnode-id="6228" instrument_node="">[1]</span></a></sup><sup class="reference" data-dcnode-id="6223" id="cite_ref-3"><a data-dcnode-id="6224" href="#cite_note-3"><span data-dcnode-id="6225" instrument_node="">[b]</span></a></sup><span data-dcnode-id="6222" instrument_node=""> recounted in the </span><a data-dcnode-id="6220" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Book_of_Exodus" title="Book of Exodus"><span data-dcnode-id="6221" instrument_node="">Book of Exodus</span></a><span data-dcnode-id="6219" instrument_node="">. It tells a story of Israelite enslavement and departure from Egypt, revelations at </span><a class="mw-redirect" data-dcnode-id="6217" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Biblical_Mount_Sinai" title="Biblical Mount Sinai"><span data-dcnode-id="6218" instrument_node="">biblical Mount Sinai</span></a><span data-dcnode-id="6216" instrument_node="">, and wanderings in the wilderness up to the borders of </span><a data-dcnode-id="6214" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Canaan%23In_Jewish_and_Christian_scriptures" title="Canaan"><span data-dcnode-id="6215" instrument_node="">Canaan</span></a><span data-dcnode-id="6213" instrument_node="">.</span><sup class="reference" data-dcnode-id="6210" id="cite_ref-FOOTNOTERedmount200159_4-0"><a data-dcnode-id="6211" href="#cite_note-FOOTNOTERedmount200159-4"><span data-dcnode-id="6212" instrument_node="">[2]</span></a></sup><span data-dcnode-id="6209" instrument_node=""> Its message is that the Israelites were delivered from </span><a data-dcnode-id="6207" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Slavery" title="Slavery"><span data-dcnode-id="6208" instrument_node="">slavery</span></a><span data-dcnode-id="6206" instrument_node=""> by </span><a data-dcnode-id="6204" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yahweh" title="Yahweh"><span data-dcnode-id="6205" instrument_node="">Yahweh</span></a><span data-dcnode-id="6203" instrument_node=""> their god, and therefore belong to him by </span><a data-dcnode-id="6201" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Covenant_%28biblical%29" title="Covenant (biblical)"><span data-dcnode-id="6202" instrument_node="">covenant</span></a><span data-dcnode-id="6200" instrument_node="">.</span><sup class="reference" data-dcnode-id="6197" id="cite_ref-FOOTNOTESparks201073_2-2"><a data-dcnode-id="6198" href="#cite_note-FOOTNOTESparks201073-2"><span data-dcnode-id="6199" instrument_node="">[1]</span></a></sup><span data-dcnode-id="6196" instrument_node="">
</span></p><p data-dcnode-id="6163"><span data-dcnode-id="6194" instrument_node="">The consensus of modern scholars is that the </span><a data-dcnode-id="6192" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Torah" title="Torah"><span data-dcnode-id="6193" instrument_node="">Torah</span></a><span data-dcnode-id="6191" instrument_node=""> does not give an accurate account of the origins of the Israelites, who appear instead to have formed as an entity in the central highlands of </span><a data-dcnode-id="6189" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Canaan" title="Canaan"><span data-dcnode-id="6190" instrument_node="">Canaan</span></a><span data-dcnode-id="6188" instrument_node=""> in the late second millennium BCE from the indigenous </span><a class="mw-redirect" data-dcnode-id="6186" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Canaanites" title="Canaanites"><span data-dcnode-id="6187" instrument_node="">Canaanite</span></a><span data-dcnode-id="6185" instrument_node=""> culture.</span><sup class="reference" data-dcnode-id="6182" id="cite_ref-FOOTNOTEGrabbe201736_5-0"><a data-dcnode-id="6183" href="#cite_note-FOOTNOTEGrabbe201736-5"><span data-dcnode-id="6184" instrument_node="">[3]</span></a></sup><sup class="reference" data-dcnode-id="6179" id="cite_ref-FOOTNOTEMeyers20056–7_6-0"><a data-dcnode-id="6180" href="#cite_note-FOOTNOTEMeyers20056%E2%80%937-6"><span data-dcnode-id="6181" instrument_node="">[4]</span></a></sup><sup class="reference" data-dcnode-id="6176" id="cite_ref-FOOTNOTEMooreKelle201181_7-0"><a data-dcnode-id="6177" href="#cite_note-FOOTNOTEMooreKelle201181-7"><span data-dcnode-id="6178" instrument_node="">[5]</span></a></sup><span data-dcnode-id="6175" instrument_node=""> Most modern scholars believe that the story of the Exodus has some historical basis,</span><sup class="reference" data-dcnode-id="6172" id="cite_ref-FOOTNOTEFaust2015p.476:_&quot;While_there_is_a_consensus_among_scholars_that_the_Exodus_did_not_take_place_in_the_manner_described_in_the_Bible,_surprisingly_most_scholars_agree_that_the_narrative_has_a_historical_core,_and_that_some_of_the_highland_settlers_came,_one_way_or_another,_from_Egypt..&quot;_8-0"><a data-dcnode-id="6173" href="#cite_note-FOOTNOTEFaust2015p.476:_%22While_there_is_a_consensus_among_scholars_that_the_Exodus_did_not_take_place_in_the_manner_described_in_the_Bible,_surprisingly_most_scholars_agree_that_the_narrative_has_a_historical_core,_and_that_some_of_the_highland_settlers_came,_one_way_or_another,_from_Egypt..%22-8"><span data-dcnode-id="6174" instrument_node="">[6]</span></a></sup><sup class="reference" data-dcnode-id="6169" id="cite_ref-FOOTNOTERedmount200161_9-0"><a data-dcnode-id="6170" href="#cite_note-FOOTNOTERedmount200161-9"><span data-dcnode-id="6171" instrument_node="">[7]</span></a></sup><span data-dcnode-id="6168" instrument_node=""> but contains little material that is provable.</span><sup class="reference" data-dcnode-id="6165" id="cite_ref-FOOTNOTERedmount200187_10-0"><a data-dcnode-id="6166" href="#cite_note-FOOTNOTERedmount200187-10"><span data-dcnode-id="6167" instrument_node="">[8]</span></a></sup><span data-dcnode-id="6164" instrument_node="">
</span></p><p data-dcnode-id="6120"><span data-dcnode-id="6162" instrument_node="">The narrative of the Exodus is spread over four of the biblical books of the </span><a data-dcnode-id="6160" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Torah" title="Torah"><span data-dcnode-id="6161" instrument_node="">Torah</span></a><span data-dcnode-id="6159" instrument_node=""> or Pentateuch, namely </span><a data-dcnode-id="6157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Book_of_Exodus" title="Book of Exodus"><span data-dcnode-id="6158" instrument_node="">Exodus</span></a><span data-dcnode-id="6156" instrument_node="">, </span><a data-dcnode-id="6154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Book_of_Leviticus" title="Book of Leviticus"><span data-dcnode-id="6155" instrument_node="">Leviticus</span></a><span data-dcnode-id="6153" instrument_node="">, </span><a data-dcnode-id="6151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Book_of_Numbers" title="Book of Numbers"><span data-dcnode-id="6152" instrument_node="">Numbers</span></a><span data-dcnode-id="6150" instrument_node="">, and </span><a data-dcnode-id="6148" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Book_of_Deuteronomy" title="Book of Deuteronomy"><span data-dcnode-id="6149" instrument_node="">Deuteronomy</span></a><span data-dcnode-id="6147" instrument_node="">. There is a widespread agreement that the composition of the </span><a data-dcnode-id="6145" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Torah" title="Torah"><span data-dcnode-id="6146" instrument_node="">Torah</span></a><span data-dcnode-id="6144" instrument_node=""> took place in the </span><a class="mw-redirect" data-dcnode-id="6142" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yehud_Medinata" title="Yehud Medinata"><span data-dcnode-id="6143" instrument_node="">Middle Persian Period</span></a><span data-dcnode-id="6141" instrument_node=""> (5th century BCE),</span><sup class="reference" data-dcnode-id="6138" id="cite_ref-FOOTNOTERomer20082_11-0"><a data-dcnode-id="6139" href="#cite_note-FOOTNOTERomer20082-11"><span data-dcnode-id="6140" instrument_node="">[9]</span></a></sup><span data-dcnode-id="6137" instrument_node=""> although some traditions behind it are older since allusions to the story are made  by 8th-century BCE </span><a data-dcnode-id="6135" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prophet" title="Prophet"><span data-dcnode-id="6136" instrument_node="">prophets</span></a><span data-dcnode-id="6134" instrument_node=""> such as </span><a data-dcnode-id="6132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Amos_%28prophet%29" title="Amos (prophet)"><span data-dcnode-id="6133" instrument_node="">Amos</span></a><span data-dcnode-id="6131" instrument_node=""> and </span><a data-dcnode-id="6129" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hosea" title="Hosea"><span data-dcnode-id="6130" instrument_node="">Hosea</span></a><span data-dcnode-id="6128" instrument_node="">.</span><sup class="reference" data-dcnode-id="6125" id="cite_ref-FOOTNOTELemche1985327_12-0"><a data-dcnode-id="6126" href="#cite_note-FOOTNOTELemche1985327-12"><span data-dcnode-id="6127" instrument_node="">[10]</span></a></sup><sup class="reference" data-dcnode-id="6122" id="cite_ref-FOOTNOTERedmount200163_13-0"><a data-dcnode-id="6123" href="#cite_note-FOOTNOTERedmount200163-13"><span data-dcnode-id="6124" instrument_node="">[11]</span></a></sup><span data-dcnode-id="6121" instrument_node="">
</span></p><p data-dcnode-id="6090"><span data-dcnode-id="6119" instrument_node="">The biblical Exodus is central in </span><a data-dcnode-id="6117" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Judaism" title="Judaism"><span data-dcnode-id="6118" instrument_node="">Judaism</span></a><span data-dcnode-id="6116" instrument_node="">, with it being recounted daily in </span><a class="mw-redirect" data-dcnode-id="6114" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jewish_prayers" title="Jewish prayers"><span data-dcnode-id="6115" instrument_node="">Jewish prayers</span></a><span data-dcnode-id="6113" instrument_node=""> and celebrated in festivals such as </span><a data-dcnode-id="6111" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Passover" title="Passover"><span data-dcnode-id="6112" instrument_node="">Passover</span></a><span data-dcnode-id="6110" instrument_node="">. Early Christians saw the Exodus as a </span><a data-dcnode-id="6108" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Typology_%28theology%29" title="Typology (theology)"><span data-dcnode-id="6109" instrument_node="">typological</span></a><span data-dcnode-id="6107" instrument_node=""> prefiguration of resurrection and salvation by </span><a data-dcnode-id="6105" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jesus" title="Jesus"><span data-dcnode-id="6106" instrument_node="">Jesus</span></a><span data-dcnode-id="6104" instrument_node="">. The narrative has also resonated with non-Jewish groups, such as the early American settlers fleeing persecution in Europe, and </span><a data-dcnode-id="6102" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/African_Americans" title="African Americans"><span data-dcnode-id="6103" instrument_node="">African Americans</span></a><span data-dcnode-id="6101" instrument_node=""> striving for freedom and </span><a data-dcnode-id="6099" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Civil_and_political_rights" title="Civil and political rights"><span data-dcnode-id="6100" instrument_node="">civil rights</span></a><span data-dcnode-id="6098" instrument_node="">.</span><sup class="reference" data-dcnode-id="6095" id="cite_ref-FOOTNOTEBerlinBrettler2004_14-0"><a data-dcnode-id="6096" href="#cite_note-FOOTNOTEBerlinBrettler2004-14"><span data-dcnode-id="6097" instrument_node="">[12]</span></a></sup><sup class="reference" data-dcnode-id="6092" id="cite_ref-FOOTNOTEBaden2019xiv_15-0"><a data-dcnode-id="6093" href="#cite_note-FOOTNOTEBaden2019xiv-15"><span data-dcnode-id="6094" instrument_node="">[13]</span></a></sup><span data-dcnode-id="6091" instrument_node="">
</span></p><span data-dcnode-id="6089" instrument_node="">

</span><h2 data-dcnode-id="5922"><span class="mw-headline" data-dcnode-id="5923" id="Biblical_narrative_and_laws"><span data-dcnode-id="5924" instrument_node="">Biblical narrative and laws</span></span></h2><span data-dcnode-id="5921" instrument_node="">
</span><h3 data-dcnode-id="5918"><span class="mw-headline" data-dcnode-id="5919" id="Narrative"><span data-dcnode-id="5920" instrument_node="">Narrative</span></span></h3><span data-dcnode-id="5917" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="5903"><div class="thumbinner" data-dcnode-id="5904" style="width:402px;"><a class="image" data-dcnode-id="5915" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A1867_Edward_Poynter_-_Israel_in_Egypt.jpg"><img alt="" class="thumbimage" data-dcnode-id="5916" data-file-height="1160" data-file-width="2767" decoding="async" height="168" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/5/57/1867_Edward_Poynter_-_Israel_in_Egypt.jpg/400px-1867_Edward_Poynter_-_Israel_in_Egypt.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/5/57/1867_Edward_Poynter_-_Israel_in_Egypt.jpg/600px-1867_Edward_Poynter_-_Israel_in_Egypt.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/5/57/1867_Edward_Poynter_-_Israel_in_Egypt.jpg/800px-1867_Edward_Poynter_-_Israel_in_Egypt.jpg 2x" width="400"></a><span data-dcnode-id="5914" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5905"><div class="magnify" data-dcnode-id="5912"><a class="internal" data-dcnode-id="5913" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A1867_Edward_Poynter_-_Israel_in_Egypt.jpg" title="Enlarge"></a></div><i data-dcnode-id="5910"><span data-dcnode-id="5911" instrument_node="">Israel in Egypt</span></i><span data-dcnode-id="5909" instrument_node=""> (</span><a data-dcnode-id="5907" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Edward_Poynter" title="Edward Poynter"><span data-dcnode-id="5908" instrument_node="">Edward Poynter</span></a><span data-dcnode-id="5906" instrument_node="">, 1867)</span></div></div></div><span data-dcnode-id="5902" instrument_node="">
</span><p data-dcnode-id="5834"><span data-dcnode-id="5901" instrument_node="">The story of the Exodus is told in the first half of </span><a data-dcnode-id="5899" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Book_of_Exodus" title="Book of Exodus"><span data-dcnode-id="5900" instrument_node="">Exodus</span></a><span data-dcnode-id="5898" instrument_node="">, with the remainder recounting the 1st year in the wilderness, and followed by a narrative of 39 more years in the books of </span><a data-dcnode-id="5896" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Book_of_Leviticus" title="Book of Leviticus"><span data-dcnode-id="5897" instrument_node="">Leviticus</span></a><span data-dcnode-id="5895" instrument_node="">, </span><a data-dcnode-id="5893" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Book_of_Numbers" title="Book of Numbers"><span data-dcnode-id="5894" instrument_node="">Numbers</span></a><span data-dcnode-id="5892" instrument_node="">, and </span><a data-dcnode-id="5890" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Book_of_Deuteronomy" title="Book of Deuteronomy"><span data-dcnode-id="5891" instrument_node="">Deuteronomy</span></a><span data-dcnode-id="5889" instrument_node="">, the last four of the first five books of the Bible (also called the </span><a data-dcnode-id="5887" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Torah" title="Torah"><span data-dcnode-id="5888" instrument_node="">Torah</span></a><span data-dcnode-id="5886" instrument_node=""> or Pentateuch).</span><sup class="reference" data-dcnode-id="5883" id="cite_ref-FOOTNOTERedmount200159_4-1"><a data-dcnode-id="5884" href="#cite_note-FOOTNOTERedmount200159-4"><span data-dcnode-id="5885" instrument_node="">[2]</span></a></sup><span data-dcnode-id="5882" instrument_node=""> In the first book of the Pentateuch, the </span><a data-dcnode-id="5880" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Book_of_Genesis" title="Book of Genesis"><span data-dcnode-id="5881" instrument_node="">Book of Genesis</span></a><span data-dcnode-id="5879" instrument_node="">, the </span><a data-dcnode-id="5877" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Israelites" title="Israelites"><span data-dcnode-id="5878" instrument_node="">Israelites</span></a><span data-dcnode-id="5876" instrument_node=""> had come to live in Egypt in the </span><a data-dcnode-id="5874" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Land_of_Goshen" title="Land of Goshen"><span data-dcnode-id="5875" instrument_node="">Land of Goshen</span></a><span data-dcnode-id="5873" instrument_node=""> during a famine due to the fact that an Israelite, </span><a data-dcnode-id="5871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Joseph_%28Genesis%29" title="Joseph (Genesis)"><span data-dcnode-id="5872" instrument_node="">Joseph</span></a><span data-dcnode-id="5870" instrument_node="">, had become a high official in the court of the </span><a data-dcnode-id="5868" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pharaoh" title="Pharaoh"><span data-dcnode-id="5869" instrument_node="">pharaoh</span></a><span data-dcnode-id="5867" instrument_node="">. Exodus begins with the death of Joseph and the ascension of a new pharaoh "who did not know Joseph" (Exodus 1:8). The pharaoh becomes concerned by the number and strength of Israelites in Egypt and enslaves them, commanding them to build at two "supply" or "store cities" called </span><a data-dcnode-id="5865" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pithom" title="Pithom"><span data-dcnode-id="5866" instrument_node="">Pithom</span></a><span data-dcnode-id="5864" instrument_node=""> and </span><a data-dcnode-id="5862" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pi-Ramesses" title="Pi-Ramesses"><span data-dcnode-id="5863" instrument_node="">Rameses</span></a><span data-dcnode-id="5861" instrument_node=""> (Exodus 1:11).</span><sup class="reference" data-dcnode-id="5858" id="cite_ref-19"><a data-dcnode-id="5859" href="#cite_note-19"><span data-dcnode-id="5860" instrument_node="">[c]</span></a></sup><span data-dcnode-id="5857" instrument_node=""> The pharaoh also orders the slaughter at birth of all male Hebrew children. One Hebrew child, however, is rescued by being placed in a basket on the </span><a data-dcnode-id="5855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nile" title="Nile"><span data-dcnode-id="5856" instrument_node="">Nile</span></a><span data-dcnode-id="5854" instrument_node="">. He is found and adopted by </span><a data-dcnode-id="5852" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pharaoh%2527s_daughter_%28Exodus%29" title="Pharaoh's daughter (Exodus)"><span data-dcnode-id="5853" instrument_node="">Pharaoh's daughter</span></a><span data-dcnode-id="5851" instrument_node="">, who names him </span><a data-dcnode-id="5849" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Moses" title="Moses"><span data-dcnode-id="5850" instrument_node="">Moses</span></a><span data-dcnode-id="5848" instrument_node="">. Moses eventually kills an Egyptian he sees beating a Hebrew slave, and is forced to flee to </span><a data-dcnode-id="5846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Midian" title="Midian"><span data-dcnode-id="5847" instrument_node="">Midian</span></a><span data-dcnode-id="5845" instrument_node="">, marrying </span><a data-dcnode-id="5843" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Zipporah" title="Zipporah"><span data-dcnode-id="5844" instrument_node="">Tzipporah</span></a><span data-dcnode-id="5842" instrument_node="">, a daughter of the Midianite priest </span><a data-dcnode-id="5840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jethro_%28biblical_figure%29" title="Jethro (biblical figure)"><span data-dcnode-id="5841" instrument_node="">Jethro</span></a><span data-dcnode-id="5839" instrument_node="">. The old pharaoh dies and a new one ascends to the throne.</span><sup class="reference" data-dcnode-id="5836" id="cite_ref-FOOTNOTERedmount200159_4-2"><a data-dcnode-id="5837" href="#cite_note-FOOTNOTERedmount200159-4"><span data-dcnode-id="5838" instrument_node="">[2]</span></a></sup><span data-dcnode-id="5835" instrument_node="">
</span></p><p data-dcnode-id="5793"><span data-dcnode-id="5833" instrument_node="">Moses, in Midian, goes to </span><a data-dcnode-id="5831" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mount_Horeb" title="Mount Horeb"><span data-dcnode-id="5832" instrument_node="">Mount Horeb</span></a><span data-dcnode-id="5830" instrument_node="">, where </span><a data-dcnode-id="5828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yahweh" title="Yahweh"><span data-dcnode-id="5829" instrument_node="">Yahweh</span></a><span data-dcnode-id="5827" instrument_node=""> appears in a </span><a data-dcnode-id="5825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Burning_bush" title="Burning bush"><span data-dcnode-id="5826" instrument_node="">burning bush</span></a><span data-dcnode-id="5824" instrument_node=""> and commands him to go to Egypt to free the Hebrew slaves and bring them to the </span><a class="mw-redirect" data-dcnode-id="5822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Promised_land" title="Promised land"><span data-dcnode-id="5823" instrument_node="">promised land</span></a><span data-dcnode-id="5821" instrument_node=""> in </span><a data-dcnode-id="5819" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Canaan" title="Canaan"><span data-dcnode-id="5820" instrument_node="">Canaan</span></a><span data-dcnode-id="5818" instrument_node="">. Yahweh also speaks to Moses's brother </span><a data-dcnode-id="5816" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aaron" title="Aaron"><span data-dcnode-id="5817" instrument_node="">Aaron</span></a><span data-dcnode-id="5815" instrument_node="">; they both assemble the Israelites and perform signs so that they believe in Yahweh's promise. Moses and Aaron then go to the Pharaoh and ask him to let the Israelites go into the desert for a religious festival, but the Pharaoh refuses and commands the Israelites to make </span><a data-dcnode-id="5813" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bricks_without_straw" title="Bricks without straw"><span data-dcnode-id="5814" instrument_node="">bricks without straw</span></a><span data-dcnode-id="5812" instrument_node=""> and increases their workload. Moses and Aaron return to the Pharaoh and this time ask him to free the Israelites. The Pharaoh demands for Moses to perform a </span><a data-dcnode-id="5810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Miracle" title="Miracle"><span data-dcnode-id="5811" instrument_node="">miracle</span></a><span data-dcnode-id="5809" instrument_node="">, and Aaron throws down </span><a data-dcnode-id="5807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Staff_of_Moses" title="Staff of Moses"><span data-dcnode-id="5808" instrument_node="">Moses' staff</span></a><span data-dcnode-id="5806" instrument_node="">, which turns into a </span><span data-dcnode-id="5803" title="Hebrew-language text"><i data-dcnode-id="5804" lang="he"><span data-dcnode-id="5805" instrument_node="">tannin</span></i></span><span data-dcnode-id="5802" instrument_node=""> (sea monster</span><sup class="reference" data-dcnode-id="5799" id="cite_ref-FOOTNOTEDozemanShectman2016149_20-0"><a data-dcnode-id="5800" href="#cite_note-FOOTNOTEDozemanShectman2016149-20"><span data-dcnode-id="5801" instrument_node="">[17]</span></a></sup><span data-dcnode-id="5798" instrument_node=""> or snake) (Exodus 7:8-13); however, Pharaoh's magicians</span><sup class="reference" data-dcnode-id="5795" id="cite_ref-23"><a data-dcnode-id="5796" href="#cite_note-23"><span data-dcnode-id="5797" instrument_node="">[d]</span></a></sup><span data-dcnode-id="5794" instrument_node=""> are also able to do this, though Moses' staff devours the others. The Pharaoh then refuses to let the Israelites go.
</span></p><span data-dcnode-id="5792" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="5778"><div class="thumbinner" data-dcnode-id="5779" style="width:222px;"><a class="image" data-dcnode-id="5790" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ALamentations_over_the_Death_of_the_First-Born_of_Egypt_by_Charles_Sprague_Pearce.JPG"><img alt="" class="thumbimage" data-dcnode-id="5791" data-file-height="2459" data-file-width="3305" decoding="async" height="164" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/3/35/Lamentations_over_the_Death_of_the_First-Born_of_Egypt_by_Charles_Sprague_Pearce.JPG/220px-Lamentations_over_the_Death_of_the_First-Born_of_Egypt_by_Charles_Sprague_Pearce.JPG&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/3/35/Lamentations_over_the_Death_of_the_First-Born_of_Egypt_by_Charles_Sprague_Pearce.JPG/330px-Lamentations_over_the_Death_of_the_First-Born_of_Egypt_by_Charles_Sprague_Pearce.JPG 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/3/35/Lamentations_over_the_Death_of_the_First-Born_of_Egypt_by_Charles_Sprague_Pearce.JPG/440px-Lamentations_over_the_Death_of_the_First-Born_of_Egypt_by_Charles_Sprague_Pearce.JPG 2x" width="220"></a><span data-dcnode-id="5789" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5780"><div class="magnify" data-dcnode-id="5787"><a class="internal" data-dcnode-id="5788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ALamentations_over_the_Death_of_the_First-Born_of_Egypt_by_Charles_Sprague_Pearce.JPG" title="Enlarge"></a></div><i data-dcnode-id="5785"><span data-dcnode-id="5786" instrument_node="">Lamentations over the Death of the First-Born of Egypt</span></i><span data-dcnode-id="5784" instrument_node=""> by </span><a data-dcnode-id="5782" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Charles_Sprague_Pearce" title="Charles Sprague Pearce"><span data-dcnode-id="5783" instrument_node="">Charles Sprague Pearce</span></a><span data-dcnode-id="5781" instrument_node=""> (1877)</span></div></div></div><span data-dcnode-id="5777" instrument_node="">
</span><p data-dcnode-id="5728"><span data-dcnode-id="5776" instrument_node="">After this, Yahweh begins inflicting the </span><a data-dcnode-id="5774" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Plagues_of_Egypt" title="Plagues of Egypt"><span data-dcnode-id="5775" instrument_node="">Plagues of Egypt</span></a><span data-dcnode-id="5773" instrument_node="">  on the Egyptians for each time that Moses goes to Pharaoh and Pharaoh refuses to release the Israelites. Pharaoh's magicians are able to replicate the first plagues, in which Yahweh turns the Nile to blood and produces a plague of frogs, but are unable to reproduce any plagues after the third, the plague of </span><a data-dcnode-id="5771" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gnat" title="Gnat"><span data-dcnode-id="5772" instrument_node="">gnats</span></a><span data-dcnode-id="5770" instrument_node="">.</span><sup class="reference" data-dcnode-id="5767" id="cite_ref-FOOTNOTEAssmann2018139–142_22-1"><a data-dcnode-id="5768" href="#cite_note-FOOTNOTEAssmann2018139%E2%80%93142-22"><span data-dcnode-id="5769" instrument_node="">[19]</span></a></sup><span data-dcnode-id="5766" instrument_node=""> After each plague Pharaoh allows the Israelites to worship Yahweh to remove the plague, then refuses to free them. 
Moses is then commanded to fix the </span><a data-dcnode-id="5764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nisan" title="Nisan"><span data-dcnode-id="5765" instrument_node="">first month</span></a><span data-dcnode-id="5763" instrument_node=""> of </span><a data-dcnode-id="5761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aviv" title="Aviv"><span data-dcnode-id="5762" instrument_node="">Aviv</span></a><span data-dcnode-id="5760" instrument_node=""> at the head of the </span><a data-dcnode-id="5758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hebrew_calendar" title="Hebrew calendar"><span data-dcnode-id="5759" instrument_node="">Hebrew calendar</span></a><span data-dcnode-id="5757" instrument_node="">.  He instructs the Israelites to take a lamb on the 10th day of the month, slaughter it on the 14th, and daub its blood on their </span><a class="mw-redirect" data-dcnode-id="5755" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mezuzot" title="Mezuzot"><span data-dcnode-id="5756" instrument_node="">doorposts</span></a><span data-dcnode-id="5754" instrument_node=""> and lintels, and to observe the </span><a data-dcnode-id="5752" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Passover" title="Passover"><span data-dcnode-id="5753" instrument_node="">Passover</span></a><span data-dcnode-id="5751" instrument_node=""> meal that night, the night of the </span><a class="mw-redirect" data-dcnode-id="5749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paschal_full_moon" title="Paschal full moon"><span data-dcnode-id="5750" instrument_node="">full moon</span></a><span data-dcnode-id="5748" instrument_node="">.
In the </span><a data-dcnode-id="5746" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Plagues_of_Egypt%2310._Death_of_firstborn_son%3A_Ex._11%3A1%25E2%2580%259312%3A36" title="Plagues of Egypt"><span data-dcnode-id="5747" instrument_node="">final plague</span></a><span data-dcnode-id="5745" instrument_node="">, Yahweh kills all the firstborn sons of Egypt and the firstborn cattle, but the Israelites, with blood on their doorposts, are spared.  Yahweh commands that the Israelites observe a festival as "a perpetual ordinance" to remember this event (Exodus 12:14). Pharaoh finally agrees to let the Israelites go after his firstborn son is killed. Yahweh leads the Israelites in the form of a </span><a class="mw-redirect" data-dcnode-id="5743" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pillar_of_cloud" title="Pillar of cloud"><span data-dcnode-id="5744" instrument_node="">pillar of cloud</span></a><span data-dcnode-id="5742" instrument_node=""> in the day and a </span><a class="mw-redirect" data-dcnode-id="5740" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pillar_of_fire_%28theophany%29" title="Pillar of fire (theophany)"><span data-dcnode-id="5741" instrument_node="">pillar of fire</span></a><span data-dcnode-id="5739" instrument_node=""> at night. However, once the Israelites have already left, Yahweh hardens Pharaoh's heart. Pharaoh then changes his mind and pursues the Israelites to the shore of the </span><a data-dcnode-id="5737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Red_Sea" title="Red Sea"><span data-dcnode-id="5738" instrument_node="">Red Sea</span></a><span data-dcnode-id="5736" instrument_node="">. Moses uses his staff to </span><a data-dcnode-id="5734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Crossing_the_Red_Sea" title="Crossing the Red Sea"><span data-dcnode-id="5735" instrument_node="">part the Red Sea</span></a><span data-dcnode-id="5733" instrument_node="">, and the Israelites cross on dry ground, but the sea closes down on the pursuing Egyptians, drowning them all.</span><sup class="reference" data-dcnode-id="5730" id="cite_ref-FOOTNOTERedmount200159–60_24-0"><a data-dcnode-id="5731" href="#cite_note-FOOTNOTERedmount200159%E2%80%9360-24"><span data-dcnode-id="5732" instrument_node="">[20]</span></a></sup><span data-dcnode-id="5729" instrument_node="">
</span></p><p data-dcnode-id="5680"><span data-dcnode-id="5727" instrument_node="">The Israelites now begin to complain about Aaron and Moses, as Yahweh miraculously provided them first with water and food, eventually raining </span><a data-dcnode-id="5725" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Manna" title="Manna"><span data-dcnode-id="5726" instrument_node="">manna</span></a><span data-dcnode-id="5724" instrument_node=""> down for them to eat. </span><a data-dcnode-id="5722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Amalek" title="Amalek"><span data-dcnode-id="5723" instrument_node="">Amalek</span></a><span data-dcnode-id="5721" instrument_node=""> attacks at </span><a data-dcnode-id="5719" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rephidim" title="Rephidim"><span data-dcnode-id="5720" instrument_node="">Rephidim</span></a><span data-dcnode-id="5718" instrument_node=""> but is defeated in battle. Jethro comes to Moses with Moses's wife and sons; on Jethro's advice, Moses appoints judges for the tribes of Israel. The Israelites reach the </span><a data-dcnode-id="5716" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sinai_Peninsula" title="Sinai Peninsula"><span data-dcnode-id="5717" instrument_node="">Sinai Desert</span></a><span data-dcnode-id="5715" instrument_node=""> and Yahweh calls Moses to </span><a class="mw-redirect" data-dcnode-id="5713" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Biblical_Mount_Sinai" title="Biblical Mount Sinai"><span data-dcnode-id="5714" instrument_node="">Mount Sinai</span></a><span data-dcnode-id="5712" instrument_node="">, where </span><a data-dcnode-id="5710" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yahweh" title="Yahweh"><span data-dcnode-id="5711" instrument_node="">Yahweh</span></a><span data-dcnode-id="5709" instrument_node=""> reveals himself to his people and establishes the </span><a data-dcnode-id="5707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ten_Commandments" title="Ten Commandments"><span data-dcnode-id="5708" instrument_node="">Ten Commandments</span></a><span data-dcnode-id="5706" instrument_node=""> and </span><a data-dcnode-id="5704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mosaic_covenant" title="Mosaic covenant"><span data-dcnode-id="5705" instrument_node="">Mosaic covenant</span></a><span data-dcnode-id="5703" instrument_node="">: the Israelites are to keep his </span><i data-dcnode-id="5701"><span data-dcnode-id="5702" instrument_node="">torah</span></i><span data-dcnode-id="5700" instrument_node=""> (i.e. law, instruction), and in return he will give them the land of Canaan. Yahweh establishes the </span><a data-dcnode-id="5698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kohen" title="Kohen"><span data-dcnode-id="5699" instrument_node="">Aaronic priesthood</span></a><span data-dcnode-id="5697" instrument_node=""> and various rules for ritual worship, among other laws. However, in Moses's absence the Israelites sin against Yahweh by creating the idol of a </span><a data-dcnode-id="5695" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Golden_calf" title="Golden calf"><span data-dcnode-id="5696" instrument_node="">golden calf</span></a><span data-dcnode-id="5694" instrument_node="">, and as retaliation Yahweh has the </span><a class="mw-redirect" data-dcnode-id="5692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Levites" title="Levites"><span data-dcnode-id="5693" instrument_node="">Levites</span></a><span data-dcnode-id="5691" instrument_node=""> kill three thousand people (Exodus 32:28), and Yahweh sends a plague on the Israelites. The Israelites now accept the covenant, which is reestablished, build a </span><a data-dcnode-id="5689" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tabernacle" title="Tabernacle"><span data-dcnode-id="5690" instrument_node="">tabernacle</span></a><span data-dcnode-id="5688" instrument_node=""> for Yahweh, and receive their laws. Yahweh commands Moses to take a </span><a data-dcnode-id="5686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Census" title="Census"><span data-dcnode-id="5687" instrument_node="">census</span></a><span data-dcnode-id="5685" instrument_node=""> of the Israelites and establishes the duties of the Levites. Then the Israelites depart from Mount Sinai.</span><sup class="reference" data-dcnode-id="5682" id="cite_ref-FOOTNOTERedmount200160_25-0"><a data-dcnode-id="5683" href="#cite_note-FOOTNOTERedmount200160-25"><span data-dcnode-id="5684" instrument_node="">[21]</span></a></sup><span data-dcnode-id="5681" instrument_node="">
</span></p><span data-dcnode-id="5679" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="5670"><div class="thumbinner" data-dcnode-id="5671" style="width:222px;"><a class="image" data-dcnode-id="5677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AIsrael%2527s_Escape_from_Egypt.jpg"><img alt="" class="thumbimage" data-dcnode-id="5678" data-file-height="888" data-file-width="776" decoding="async" height="252" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/b/b4/Israel%2527s_Escape_from_Egypt.jpg/220px-Israel%2527s_Escape_from_Egypt.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/b/b4/Israel%27s_Escape_from_Egypt.jpg/330px-Israel%27s_Escape_from_Egypt.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/b/b4/Israel%27s_Escape_from_Egypt.jpg/440px-Israel%27s_Escape_from_Egypt.jpg 2x" width="220"></a><span data-dcnode-id="5676" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5672"><div class="magnify" data-dcnode-id="5674"><a class="internal" data-dcnode-id="5675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AIsrael%2527s_Escape_from_Egypt.jpg" title="Enlarge"></a></div><span data-dcnode-id="5673" instrument_node="">Illustration of the Exodus from Egypt by the Providence Lithograph Company, 1907</span></div></div></div><span data-dcnode-id="5669" instrument_node="">
</span><p data-dcnode-id="5648"><span data-dcnode-id="5668" instrument_node="">Yahweh commands Moses to send </span><a data-dcnode-id="5666" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Twelve_Spies" title="The Twelve Spies"><span data-dcnode-id="5667" instrument_node="">twelve spies</span></a><span data-dcnode-id="5665" instrument_node=""> ahead to Canaan to scout the land. The spies discover that the Canaanites are strong, and, believing that the Israelites cannot defeat them, the spies falsely report to the Israelites that Canaan is full of giants so that the Israelites will not invade (Numbers 13:31-33). The Israelites refuse to go to Canaan, so Yahweh manifests himself and declares that the generation that left Egypt will have to pass away before the Israelites can enter Canaan. The Israelites will have to remain in the wilderness for forty years,</span><sup class="reference" data-dcnode-id="5662" id="cite_ref-FOOTNOTERedmount200160_25-1"><a data-dcnode-id="5663" href="#cite_note-FOOTNOTERedmount200160-25"><span data-dcnode-id="5664" instrument_node="">[21]</span></a></sup><span data-dcnode-id="5661" instrument_node=""> and Yahweh kills the spies through a plague except for the righteous </span><a data-dcnode-id="5659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Joshua" title="Joshua"><span data-dcnode-id="5660" instrument_node="">Joshua</span></a><span data-dcnode-id="5658" instrument_node=""> and </span><a data-dcnode-id="5656" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Caleb" title="Caleb"><span data-dcnode-id="5657" instrument_node="">Caleb</span></a><span data-dcnode-id="5655" instrument_node="">, who will be allowed to enter the promised land. A group of Israelites led by </span><a data-dcnode-id="5653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Korah" title="Korah"><span data-dcnode-id="5654" instrument_node="">Korah</span></a><span data-dcnode-id="5652" instrument_node="">, son of Izhar, rebels against Moses, but Yahweh opens the earth and sends them living to </span><a data-dcnode-id="5650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sheol" title="Sheol"><span data-dcnode-id="5651" instrument_node="">Sheol</span></a><span data-dcnode-id="5649" instrument_node="">.
</span></p><p data-dcnode-id="5585"><span data-dcnode-id="5647" instrument_node="">The Israelites come to the oasis of </span><a class="mw-redirect" data-dcnode-id="5645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kadesh_Barnea" title="Kadesh Barnea"><span data-dcnode-id="5646" instrument_node="">Kadesh Barnea</span></a><span data-dcnode-id="5644" instrument_node="">, where </span><a data-dcnode-id="5642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Miriam" title="Miriam"><span data-dcnode-id="5643" instrument_node="">Miriam</span></a><span data-dcnode-id="5641" instrument_node=""> dies and the Israelites remain for forty years.</span><sup class="reference" data-dcnode-id="5638" id="cite_ref-FOOTNOTERedmount200160_25-2"><a data-dcnode-id="5639" href="#cite_note-FOOTNOTERedmount200160-25"><span data-dcnode-id="5640" instrument_node="">[21]</span></a></sup><span data-dcnode-id="5637" instrument_node=""> The people are without water, so Yahweh commands Moses to get water from a rock by speaking to it, but Moses strikes the rock with his staff instead, for which Yahweh forbids him from entering the promised land. Moses sends a messenger to the king of </span><a data-dcnode-id="5635" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Edom" title="Edom"><span data-dcnode-id="5636" instrument_node="">Edom</span></a><span data-dcnode-id="5634" instrument_node=""> requesting passage through his land to Canaan, but the king refuses. The Israelites then go to </span><a data-dcnode-id="5632" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mount_Hor" title="Mount Hor"><span data-dcnode-id="5633" instrument_node="">Mount Hor</span></a><span data-dcnode-id="5631" instrument_node="">, where Aaron dies. The Israelites try to go around Edom, but the Israelites complain about lack of bread and water, so Yahweh sends a plague of poisonous snakes to afflict them. After Moses prays for deliverance, Yahweh has him create the </span><a class="mw-redirect" data-dcnode-id="5629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Brazen_serpent" title="Brazen serpent"><span data-dcnode-id="5630" instrument_node="">brazen serpent</span></a><span data-dcnode-id="5628" instrument_node="">, and the Israelites who look at it are cured. The Israelites are soon in conflict with various other kingdoms, and king </span><a data-dcnode-id="5626" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Balak" title="Balak"><span data-dcnode-id="5627" instrument_node="">Balak</span></a><span data-dcnode-id="5625" instrument_node=""> of </span><a data-dcnode-id="5623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Moab" title="Moab"><span data-dcnode-id="5624" instrument_node="">Moab</span></a><span data-dcnode-id="5622" instrument_node=""> attempts to have the seer </span><a data-dcnode-id="5620" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Balaam" title="Balaam"><span data-dcnode-id="5621" instrument_node="">Balaam</span></a><span data-dcnode-id="5619" instrument_node=""> curse the Israelites, but Balaam blesses the Israelites instead. Some Israelites begin having sexual relations with Moabite women and </span><a class="mw-redirect" data-dcnode-id="5617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Heresy_of_Peor" title="Heresy of Peor"><span data-dcnode-id="5618" instrument_node="">worshipping Moabite gods</span></a><span data-dcnode-id="5616" instrument_node="">, so Yahweh orders Moses to </span><a data-dcnode-id="5614" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Impalement" title="Impalement"><span data-dcnode-id="5615" instrument_node="">impale</span></a><span data-dcnode-id="5613" instrument_node=""> the idolators and sends a plague, but the full extent of Yahweh's wrath is averted when </span><a data-dcnode-id="5611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Phinehas" title="Phinehas"><span data-dcnode-id="5612" instrument_node="">Phinehas</span></a><span data-dcnode-id="5610" instrument_node=""> impales </span><a data-dcnode-id="5608" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Zimri_%28prince%29" title="Zimri (prince)"><span data-dcnode-id="5609" instrument_node="">an Israelite</span></a><span data-dcnode-id="5607" instrument_node=""> and a </span><a data-dcnode-id="5605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cozbi" title="Cozbi"><span data-dcnode-id="5606" instrument_node="">Midianite woman</span></a><span data-dcnode-id="5604" instrument_node=""> having intercourse (Numbers 25:7-9). Yahweh commands the Israelites to destroy the Midianites, and Moses and Phinehas take another census. They then conquer the lands of </span><a data-dcnode-id="5602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Og" title="Og"><span data-dcnode-id="5603" instrument_node="">Og</span></a><span data-dcnode-id="5601" instrument_node=""> and </span><a data-dcnode-id="5599" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sihon" title="Sihon"><span data-dcnode-id="5600" instrument_node="">Sihon</span></a><span data-dcnode-id="5598" instrument_node=""> in </span><a data-dcnode-id="5596" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Transjordan_%28region%29" title="Transjordan (region)"><span data-dcnode-id="5597" instrument_node="">Transjordan</span></a><span data-dcnode-id="5595" instrument_node="">, settling the </span><a class="mw-redirect" data-dcnode-id="5593" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gadites" title="Gadites"><span data-dcnode-id="5594" instrument_node="">Gadites</span></a><span data-dcnode-id="5592" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="5590" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reubenites" title="Reubenites"><span data-dcnode-id="5591" instrument_node="">Reubenites</span></a><span data-dcnode-id="5589" instrument_node="">, and half the </span><a data-dcnode-id="5587" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tribe_of_Manasseh" title="Tribe of Manasseh"><span data-dcnode-id="5588" instrument_node="">Tribe of Manasseh</span></a><span data-dcnode-id="5586" instrument_node=""> there.
</span></p><p data-dcnode-id="5570"><span data-dcnode-id="5584" instrument_node="">Moses then addresses the Israelites for a final time on the banks of the </span><a data-dcnode-id="5582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jordan_River" title="Jordan River"><span data-dcnode-id="5583" instrument_node="">Jordan River</span></a><span data-dcnode-id="5581" instrument_node="">, reviewing their travels and giving them further laws. Yahweh tells Moses to summon Joshua, whom Yahweh commissions to lead the </span><a class="mw-redirect" data-dcnode-id="5579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Conquest_of_Canaan" title="Conquest of Canaan"><span data-dcnode-id="5580" instrument_node="">conquest of Canaan</span></a><span data-dcnode-id="5578" instrument_node="">. Yahweh tells Moses to ascend </span><a data-dcnode-id="5576" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mount_Nebo" title="Mount Nebo"><span data-dcnode-id="5577" instrument_node="">Mount Nebo</span></a><span data-dcnode-id="5575" instrument_node="">, from where he sees the promised land and where he dies.</span><sup class="reference" data-dcnode-id="5572" id="cite_ref-FOOTNOTERedmount200160_25-3"><a data-dcnode-id="5573" href="#cite_note-FOOTNOTERedmount200160-25"><span data-dcnode-id="5574" instrument_node="">[21]</span></a></sup><span data-dcnode-id="5571" instrument_node="">
</span></p><span data-dcnode-id="5569" instrument_node="">
</span><h3 data-dcnode-id="5566"><span class="mw-headline" data-dcnode-id="5567" id="Covenant_and_law"><span data-dcnode-id="5568" instrument_node="">Covenant and law</span></span></h3><span data-dcnode-id="5565" instrument_node="">
</span><p data-dcnode-id="5548"><span data-dcnode-id="5564" instrument_node="">The climax of the Exodus is the covenant (binding legal agreement) between God and the Israelites mediated by Moses at Sinai: Yahweh will protect the Israelites as his chosen people for all time, and  the Israelites will keep Yahweh's laws and worship only him.</span><sup class="reference" data-dcnode-id="5561" id="cite_ref-FOOTNOTEBandstra200828-29_26-0"><a data-dcnode-id="5562" href="#cite_note-FOOTNOTEBandstra200828-29-26"><span data-dcnode-id="5563" instrument_node="">[22]</span></a></sup><span data-dcnode-id="5560" instrument_node=""> The covenant is described in stages: at Exodus 24:3–8 the Israelites agree to abide by the "book of the covenant" that Moses has just read to them; shortly afterwards God writes the "words of the covenant" – the </span><a data-dcnode-id="5558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ten_Commandments" title="Ten Commandments"><span data-dcnode-id="5559" instrument_node="">Ten Commandments</span></a><span data-dcnode-id="5557" instrument_node=""> – on stone tablets; and finally, as the people gather in Moab to cross into Canaan, the land God has promised them, Moses makes a new covenant between Yahweh and the Israelites "beside the covenant he made with them at Horeb" (Deuteronomy 29:1).</span><sup class="reference" data-dcnode-id="5554" id="cite_ref-FOOTNOTEMcKenzie20054–5_27-0"><a data-dcnode-id="5555" href="#cite_note-FOOTNOTEMcKenzie20054%E2%80%935-27"><span data-dcnode-id="5556" instrument_node="">[23]</span></a></sup><span data-dcnode-id="5553" instrument_node=""> The laws are set out in a number of codes:</span><sup class="reference" data-dcnode-id="5550" id="cite_ref-FOOTNOTEBandstra2008146_28-0"><a data-dcnode-id="5551" href="#cite_note-FOOTNOTEBandstra2008146-28"><span data-dcnode-id="5552" instrument_node="">[24]</span></a></sup><span data-dcnode-id="5549" instrument_node="">
</span></p><span data-dcnode-id="5547" instrument_node="">
</span><ul data-dcnode-id="5510"><li data-dcnode-id="5543"><a class="mw-redirect" data-dcnode-id="5545" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ethical_Decalogue" title="Ethical Decalogue"><span data-dcnode-id="5546" instrument_node="">Ethical Decalogue</span></a><span data-dcnode-id="5544" instrument_node=""> (i.e., the Ten Commandments), Exodus 20 and Deuteronomy 5;</span></li><span data-dcnode-id="5542" instrument_node="">
</span><li data-dcnode-id="5537"><span data-dcnode-id="5541" instrument_node="">The </span><a data-dcnode-id="5539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Covenant_Code" title="Covenant Code"><span data-dcnode-id="5540" instrument_node="">Book of the Covenant</span></a><span data-dcnode-id="5538" instrument_node="">, Exodus 20:22–23:3;</span></li><span data-dcnode-id="5536" instrument_node="">
</span><li data-dcnode-id="5532"><a data-dcnode-id="5534" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ritual_Decalogue" title="Ritual Decalogue"><span data-dcnode-id="5535" instrument_node="">Ritual Decalogue</span></a><span data-dcnode-id="5533" instrument_node="">, Exodus 34;</span></li><span data-dcnode-id="5531" instrument_node="">
</span><li data-dcnode-id="5523"><span data-dcnode-id="5530" instrument_node="">The ritual laws of </span><a class="mw-redirect" data-dcnode-id="5528" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Leviticus" title="Leviticus"><span data-dcnode-id="5529" instrument_node="">Leviticus</span></a><span data-dcnode-id="5527" instrument_node=""> 1–6 and </span><a data-dcnode-id="5525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Book_of_Numbers" title="Book of Numbers"><span data-dcnode-id="5526" instrument_node="">Numbers</span></a><span data-dcnode-id="5524" instrument_node=""> 1–10;</span></li><span data-dcnode-id="5522" instrument_node="">
</span><li data-dcnode-id="5517"><span data-dcnode-id="5521" instrument_node="">The </span><a class="mw-redirect" data-dcnode-id="5519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Holiness_Code" title="Holiness Code"><span data-dcnode-id="5520" instrument_node="">Holiness Code</span></a><span data-dcnode-id="5518" instrument_node="">, Leviticus 17–26;</span></li><span data-dcnode-id="5516" instrument_node="">
</span><li data-dcnode-id="5511"><span data-dcnode-id="5515" instrument_node="">Deuteronomic Code, </span><a class="mw-redirect" data-dcnode-id="5513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Deuteronomy" title="Deuteronomy"><span data-dcnode-id="5514" instrument_node="">Deuteronomy</span></a><span data-dcnode-id="5512" instrument_node=""> 12–26.</span></li></ul><span data-dcnode-id="5509" instrument_node="">
</span><h2 data-dcnode-id="5506"><span class="mw-headline" data-dcnode-id="5507" id="Origins_and_historicity"><span data-dcnode-id="5508" instrument_node="">Origins and historicity</span></span></h2><span data-dcnode-id="5505" instrument_node="">
</span><link data-dcnode-id="5504" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="5497" role="note"><span data-dcnode-id="5503" instrument_node="">See also: </span><a data-dcnode-id="5501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sources_and_parallels_of_the_Exodus" title="Sources and parallels of the Exodus"><span data-dcnode-id="5502" instrument_node="">Sources and parallels of the Exodus</span></a><span data-dcnode-id="5500" instrument_node=""> and </span><a data-dcnode-id="5498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Historicity_of_the_Bible" title="Historicity of the Bible"><span data-dcnode-id="5499" instrument_node="">Historicity of the Bible</span></a></div><span data-dcnode-id="5496" instrument_node="">
</span><p data-dcnode-id="5449"><span data-dcnode-id="5495" instrument_node="">There are two main positions on the historicity of the Exodus in modern scholarship.</span><sup class="reference" data-dcnode-id="5492" id="cite_ref-FOOTNOTEGrabbe201736_5-1"><a data-dcnode-id="5493" href="#cite_note-FOOTNOTEGrabbe201736-5"><span data-dcnode-id="5494" instrument_node="">[3]</span></a></sup><span data-dcnode-id="5491" instrument_node=""> The majority position is that the biblical Exodus narrative has some historical basis, although there is little of historical worth in the biblical narrative.</span><sup class="reference" data-dcnode-id="5488" id="cite_ref-FOOTNOTERedmount200187_10-1"><a data-dcnode-id="5489" href="#cite_note-FOOTNOTERedmount200187-10"><span data-dcnode-id="5490" instrument_node="">[8]</span></a></sup><sup class="reference" data-dcnode-id="5485" id="cite_ref-FOOTNOTEFaust2015476_29-0"><a data-dcnode-id="5486" href="#cite_note-FOOTNOTEFaust2015476-29"><span data-dcnode-id="5487" instrument_node="">[25]</span></a></sup><sup class="reference" data-dcnode-id="5482" id="cite_ref-FOOTNOTESparks201073_2-3"><a data-dcnode-id="5483" href="#cite_note-FOOTNOTESparks201073-2"><span data-dcnode-id="5484" instrument_node="">[1]</span></a></sup><span data-dcnode-id="5481" instrument_node=""> The other position, often associated with the school of </span><a data-dcnode-id="5479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Biblical_minimalism" title="Biblical minimalism"><span data-dcnode-id="5480" instrument_node="">Biblical minimalism</span></a><span data-dcnode-id="5478" instrument_node="">,</span><sup class="reference" data-dcnode-id="5475" id="cite_ref-FOOTNOTEDavies200423–24_30-0"><a data-dcnode-id="5476" href="#cite_note-FOOTNOTEDavies200423%E2%80%9324-30"><span data-dcnode-id="5477" instrument_node="">[26]</span></a></sup><sup class="reference" data-dcnode-id="5472" id="cite_ref-FOOTNOTEMooreKelle201186–87_31-0"><a data-dcnode-id="5473" href="#cite_note-FOOTNOTEMooreKelle201186%E2%80%9387-31"><span data-dcnode-id="5474" instrument_node="">[27]</span></a></sup><span data-dcnode-id="5471" instrument_node=""> is that the biblical exodus traditions are the invention of the exilic and post-exilic Jewish community, with little to no historical basis.</span><sup class="reference" data-dcnode-id="5468" id="cite_ref-FOOTNOTERussell200911_32-0"><a data-dcnode-id="5469" href="#cite_note-FOOTNOTERussell200911-32"><span data-dcnode-id="5470" instrument_node="">[28]</span></a></sup><span data-dcnode-id="5467" instrument_node=""> The biblical Exodus narrative is best understood as a </span><a class="mw-redirect" data-dcnode-id="5465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Founding_myth" title="Founding myth"><span data-dcnode-id="5466" instrument_node="">founding myth</span></a><span data-dcnode-id="5464" instrument_node=""> of the Jewish people, providing an ideological foundation for their culture and institutions, not an accurate depiction of the history of the Israelites.</span><sup class="reference" data-dcnode-id="5461" id="cite_ref-FOOTNOTECollins200546_33-0"><a data-dcnode-id="5462" href="#cite_note-FOOTNOTECollins200546-33"><span data-dcnode-id="5463" instrument_node="">[29]</span></a></sup><sup class="reference" data-dcnode-id="5458" id="cite_ref-FOOTNOTESparks201073_2-4"><a data-dcnode-id="5459" href="#cite_note-FOOTNOTESparks201073-2"><span data-dcnode-id="5460" instrument_node="">[1]</span></a></sup><span data-dcnode-id="5457" instrument_node=""> The view that the biblical narrative is essentially correct unless it can explicitly be proven wrong (</span><a data-dcnode-id="5455" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Biblical_maximalism" title="Biblical maximalism"><span data-dcnode-id="5456" instrument_node="">Biblical maximalism</span></a><span data-dcnode-id="5454" instrument_node="">) is today held by "few, if any [...] in mainstream scholarship, only on the more fundamentalist fringes."</span><sup class="reference" data-dcnode-id="5451" id="cite_ref-FOOTNOTEGrabbe201736_5-2"><a data-dcnode-id="5452" href="#cite_note-FOOTNOTEGrabbe201736-5"><span data-dcnode-id="5453" instrument_node="">[3]</span></a></sup><span data-dcnode-id="5450" instrument_node="">
</span></p><span data-dcnode-id="5448" instrument_node="">
</span><h3 data-dcnode-id="5445"><span class="mw-headline" data-dcnode-id="5446" id="Reliability_of_the_biblical_account"><span data-dcnode-id="5447" instrument_node="">Reliability of the biblical account</span></span></h3><span data-dcnode-id="5444" instrument_node="">
</span><p data-dcnode-id="5387"><span data-dcnode-id="5443" instrument_node="">Mainstream scholarship no longer accepts the biblical Exodus account as history for a number of reasons. Most scholars agree that the Exodus stories were written centuries after the apparent setting of the stories.</span><sup class="reference" data-dcnode-id="5440" id="cite_ref-FOOTNOTEMooreKelle201181_7-1"><a data-dcnode-id="5441" href="#cite_note-FOOTNOTEMooreKelle201181-7"><span data-dcnode-id="5442" instrument_node="">[5]</span></a></sup><span data-dcnode-id="5439" instrument_node=""> The </span><a data-dcnode-id="5437" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Book_of_Exodus" title="Book of Exodus"><span data-dcnode-id="5438" instrument_node="">Book of Exodus</span></a><span data-dcnode-id="5436" instrument_node=""> itself attempts to ground the event firmly in history, dating the exodus to the 2666th year after creation (Exodus 12:40-41), the construction of the tabernacle to year 2667 (Exodus 40:1-2, 17), stating that the Israelites dwelled in Egypt for 430 years (Exodus 12:40-41), and including place names such as </span><a data-dcnode-id="5434" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Land_of_Goshen" title="Land of Goshen"><span data-dcnode-id="5435" instrument_node="">Goshen</span></a><span data-dcnode-id="5433" instrument_node=""> (Gen. 46:28), </span><a data-dcnode-id="5431" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pithom" title="Pithom"><span data-dcnode-id="5432" instrument_node="">Pithom</span></a><span data-dcnode-id="5430" instrument_node=""> and </span><a data-dcnode-id="5428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pi-Ramesses" title="Pi-Ramesses"><span data-dcnode-id="5429" instrument_node="">Ramesses</span></a><span data-dcnode-id="5427" instrument_node=""> (Exod. 1:11), as well as stating that 600,000 Israelite men were involved (Exodus 12:37).</span><sup class="reference" data-dcnode-id="5424" id="cite_ref-FOOTNOTEDozemanShectman2016138–139_34-0"><a data-dcnode-id="5425" href="#cite_note-FOOTNOTEDozemanShectman2016138%E2%80%93139-34"><span data-dcnode-id="5426" instrument_node="">[30]</span></a></sup><span data-dcnode-id="5423" instrument_node=""> The </span><a data-dcnode-id="5421" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Book_of_Numbers" title="Book of Numbers"><span data-dcnode-id="5422" instrument_node="">Book of Numbers</span></a><span data-dcnode-id="5420" instrument_node=""> further states that the number of Israelites in the desert during the wandering were 603,550, including 22,273 first-borns, which modern estimates put at 2.5-3 million total Israelites, a clearly fanciful number that could never have been supported by the </span><a class="mw-redirect" data-dcnode-id="5418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sinai_Desert" title="Sinai Desert"><span data-dcnode-id="5419" instrument_node="">Sinai Desert</span></a><span data-dcnode-id="5417" instrument_node="">.</span><sup class="reference" data-dcnode-id="5414" id="cite_ref-FOOTNOTEDever200318–19_35-0"><a data-dcnode-id="5415" href="#cite_note-FOOTNOTEDever200318%E2%80%9319-35"><span data-dcnode-id="5416" instrument_node="">[31]</span></a></sup><span data-dcnode-id="5413" instrument_node=""> The geography is vague with regions such as Goshen unidentified, and there are internal problems with dating in the Pentateuch.</span><sup class="reference" data-dcnode-id="5410" id="cite_ref-FOOTNOTEDozemanShectman2016139_18-1"><a data-dcnode-id="5411" href="#cite_note-FOOTNOTEDozemanShectman2016139-18"><span data-dcnode-id="5412" instrument_node="">[16]</span></a></sup><span data-dcnode-id="5409" instrument_node="">  No modern attempt to identify a historical Egyptian prototype for Moses has found wide acceptance, and no period in Egyptian history matches the biblical accounts of the Exodus.</span><sup class="reference" data-dcnode-id="5406" id="cite_ref-FOOTNOTEGrabbe201463–64_36-0"><a data-dcnode-id="5407" href="#cite_note-FOOTNOTEGrabbe201463%E2%80%9364-36"><span data-dcnode-id="5408" instrument_node="">[32]</span></a></sup><span data-dcnode-id="5405" instrument_node=""> Some elements of the story are </span><a data-dcnode-id="5403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Miracle" title="Miracle"><span data-dcnode-id="5404" instrument_node="">miraculous</span></a><span data-dcnode-id="5402" instrument_node=""> and defy rational explanation, such as the </span><a data-dcnode-id="5400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Plagues_of_Egypt" title="Plagues of Egypt"><span data-dcnode-id="5401" instrument_node="">Plagues of Egypt</span></a><span data-dcnode-id="5399" instrument_node=""> and the </span><a class="mw-redirect" data-dcnode-id="5397" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Crossing_of_the_Red_Sea" title="Crossing of the Red Sea"><span data-dcnode-id="5398" instrument_node="">Crossing of the Red Sea</span></a><span data-dcnode-id="5396" instrument_node="">.</span><sup class="reference" data-dcnode-id="5393" id="cite_ref-FOOTNOTEDever200315–17_37-0"><a data-dcnode-id="5394" href="#cite_note-FOOTNOTEDever200315%E2%80%9317-37"><span data-dcnode-id="5395" instrument_node="">[33]</span></a></sup><span data-dcnode-id="5392" instrument_node=""> The Bible also fails to mention the names of any of the Pharaohs involved in the Exodus narrative.</span><sup class="reference" data-dcnode-id="5389" id="cite_ref-FOOTNOTEGrabbe201469_38-0"><a data-dcnode-id="5390" href="#cite_note-FOOTNOTEGrabbe201469-38"><span data-dcnode-id="5391" instrument_node="">[34]</span></a></sup><span data-dcnode-id="5388" instrument_node="">
</span></p><p data-dcnode-id="5351"><span data-dcnode-id="5386" instrument_node="">While </span><a data-dcnode-id="5384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ancient_Egypt" title="Ancient Egypt"><span data-dcnode-id="5385" instrument_node="">ancient Egyptian</span></a><span data-dcnode-id="5383" instrument_node=""> texts from the </span><a class="mw-redirect" data-dcnode-id="5381" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_Kingdom" title="New Kingdom"><span data-dcnode-id="5382" instrument_node="">New Kingdom</span></a><span data-dcnode-id="5380" instrument_node=""> mention "Asiatics" living in Egypt as slaves and workers, these people cannot be securely connected to the Israelites, and no contemporary Egyptian text mentions a large-scale exodus of slaves like that described in the Bible.</span><sup class="reference" data-dcnode-id="5377" id="cite_ref-FOOTNOTEBarmash2015b2–3_39-0"><a data-dcnode-id="5378" href="#cite_note-FOOTNOTEBarmash2015b2%E2%80%933-39"><span data-dcnode-id="5379" instrument_node="">[35]</span></a></sup><span data-dcnode-id="5376" instrument_node=""> The earliest surviving historical mention of the Israelites, the Egyptian </span><a data-dcnode-id="5374" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Merneptah_Stele" title="Merneptah Stele"><span data-dcnode-id="5375" instrument_node="">Merneptah Stele</span></a><span data-dcnode-id="5373" instrument_node=""> (c. 1207 BCE), appears to place them in or around Canaan and gives no indication of any exodus.</span><sup class="reference" data-dcnode-id="5370" id="cite_ref-FOOTNOTEGrabbe201465–67_40-0"><a data-dcnode-id="5371" href="#cite_note-FOOTNOTEGrabbe201465%E2%80%9367-40"><span data-dcnode-id="5372" instrument_node="">[36]</span></a></sup><span data-dcnode-id="5369" instrument_node=""> Archaeologists </span><a data-dcnode-id="5367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Israel_Finkelstein" title="Israel Finkelstein"><span data-dcnode-id="5368" instrument_node="">Israel Finkelstein</span></a><span data-dcnode-id="5366" instrument_node=""> and </span><a data-dcnode-id="5364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Neil_Asher_Silberman" title="Neil Asher Silberman"><span data-dcnode-id="5365" instrument_node="">Neil Asher Silberman</span></a><span data-dcnode-id="5363" instrument_node=""> say that archaeology has not found any evidence for even a small band of wandering Israelites living in the Sinai: "The conclusion – that Exodus did not happen at the time and in the manner described in the Bible – seems irrefutable [...] repeated excavations and surveys throughout the entire area have not provided even the slightest evidence."</span><sup class="reference" data-dcnode-id="5360" id="cite_ref-FOOTNOTEFinkelsteinSilberman200263_41-0"><a data-dcnode-id="5361" href="#cite_note-FOOTNOTEFinkelsteinSilberman200263-41"><span data-dcnode-id="5362" instrument_node="">[37]</span></a></sup><span data-dcnode-id="5359" instrument_node=""> Instead, modern archaeology suggests continuity between Canaanite and Israelite settlement, indicating a primarily Canaanite origin for Israel, with no suggestion that a group of foreigners from Egypt comprised early Israel.</span><sup class="reference" data-dcnode-id="5356" id="cite_ref-FOOTNOTEBarmash2015b4_42-0"><a data-dcnode-id="5357" href="#cite_note-FOOTNOTEBarmash2015b4-42"><span data-dcnode-id="5358" instrument_node="">[38]</span></a></sup><sup class="reference" data-dcnode-id="5353" id="cite_ref-FOOTNOTEShaw2002313_43-0"><a data-dcnode-id="5354" href="#cite_note-FOOTNOTEShaw2002313-43"><span data-dcnode-id="5355" instrument_node="">[39]</span></a></sup><span data-dcnode-id="5352" instrument_node="">
</span></p><span data-dcnode-id="5350" instrument_node="">
</span><h3 data-dcnode-id="5347"><span class="mw-headline" data-dcnode-id="5348" id="Potential_historical_origins"><span data-dcnode-id="5349" instrument_node="">Potential historical origins</span></span></h3><span data-dcnode-id="5346" instrument_node="">
