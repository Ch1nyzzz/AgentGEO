</span><div class="thumb tright" data-dcnode-id="5333"><div class="thumbinner" data-dcnode-id="5334" style="width:222px;"><a class="image" data-dcnode-id="5344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ARamses-ii-relief-from-memphis2.png"><img alt="" class="thumbimage" data-dcnode-id="5345" data-file-height="1133" data-file-width="967" decoding="async" height="258" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Ramses-ii-relief-from-memphis2.png/220px-Ramses-ii-relief-from-memphis2.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Ramses-ii-relief-from-memphis2.png/330px-Ramses-ii-relief-from-memphis2.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Ramses-ii-relief-from-memphis2.png/440px-Ramses-ii-relief-from-memphis2.png 2x" width="220"></a><span data-dcnode-id="5343" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5335"><div class="magnify" data-dcnode-id="5341"><a class="internal" data-dcnode-id="5342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ARamses-ii-relief-from-memphis2.png" title="Enlarge"></a></div><a data-dcnode-id="5339" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ramesses_II" title="Ramesses II"><span data-dcnode-id="5340" instrument_node="">Ramesses II</span></a><span data-dcnode-id="5338" instrument_node="">, one of several </span><a data-dcnode-id="5336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pharaohs_in_the_Bible%23In_the_Book_of_Genesis" title="Pharaohs in the Bible"><span data-dcnode-id="5337" instrument_node="">suggested pharaohs in the Exodus narrative</span></a></div></div></div><span data-dcnode-id="5332" instrument_node="">
</span><p data-dcnode-id="5262"><span data-dcnode-id="5331" instrument_node="">Despite the absence of any archaeological evidence, a majority of scholars agree that the Exodus probably has some historical basis,</span><sup class="reference" data-dcnode-id="5328" id="cite_ref-FOOTNOTEFaust2015476_29-1"><a data-dcnode-id="5329" href="#cite_note-FOOTNOTEFaust2015476-29"><span data-dcnode-id="5330" instrument_node="">[25]</span></a></sup><sup class="reference" data-dcnode-id="5325" id="cite_ref-FOOTNOTERedmount200187_10-2"><a data-dcnode-id="5326" href="#cite_note-FOOTNOTERedmount200187-10"><span data-dcnode-id="5327" instrument_node="">[8]</span></a></sup><span data-dcnode-id="5324" instrument_node=""> with Kenton Sparks referring to it as "mythologized history."</span><sup class="reference" data-dcnode-id="5321" id="cite_ref-FOOTNOTESparks201073_2-5"><a data-dcnode-id="5322" href="#cite_note-FOOTNOTESparks201073-2"><span data-dcnode-id="5323" instrument_node="">[1]</span></a></sup><span data-dcnode-id="5320" instrument_node=""> Scholars posit that a small group of people of Egyptian origin may have joined the early Israelites, and then contributed their own Egyptian Exodus story to all of Israel.</span><sup class="reference" data-dcnode-id="5317" id="cite_ref-44"><a data-dcnode-id="5318" href="#cite_note-44"><span data-dcnode-id="5319" instrument_node="">[e]</span></a></sup><span data-dcnode-id="5316" instrument_node=""> </span><a data-dcnode-id="5314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/William_G._Dever" title="William G. Dever"><span data-dcnode-id="5315" instrument_node="">William G. Dever</span></a><span data-dcnode-id="5313" instrument_node=""> cautiously identifies this group with the </span><a data-dcnode-id="5311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tribe_of_Joseph" title="Tribe of Joseph"><span data-dcnode-id="5312" instrument_node="">Tribe of Joseph</span></a><span data-dcnode-id="5310" instrument_node="">, while </span><a data-dcnode-id="5308" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Richard_Elliott_Friedman" title="Richard Elliott Friedman"><span data-dcnode-id="5309" instrument_node="">Richard Elliott Friedman</span></a><span data-dcnode-id="5307" instrument_node=""> identifies it with the </span><a data-dcnode-id="5305" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tribe_of_Levi" title="Tribe of Levi"><span data-dcnode-id="5306" instrument_node="">Tribe of Levi</span></a><span data-dcnode-id="5304" instrument_node="">.</span><sup class="reference" data-dcnode-id="5301" id="cite_ref-FOOTNOTEDever2003231_45-0"><a data-dcnode-id="5302" href="#cite_note-FOOTNOTEDever2003231-45"><span data-dcnode-id="5303" instrument_node="">[40]</span></a></sup><sup class="reference" data-dcnode-id="5298" id="cite_ref-46"><a data-dcnode-id="5299" href="#cite_note-46"><span data-dcnode-id="5300" instrument_node="">[41]</span></a></sup><span data-dcnode-id="5297" instrument_node="">  Most scholars who accept a historical core of the exodus date this possible exodus group to the thirteenth century BCE at the time of </span><a class="mw-redirect" data-dcnode-id="5295" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ramses_II" title="Ramses II"><span data-dcnode-id="5296" instrument_node="">Ramses II</span></a><span data-dcnode-id="5294" instrument_node="">, with some instead dating it to the twelfth century BCE at the time of </span><a class="mw-redirect" data-dcnode-id="5292" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ramses_III" title="Ramses III"><span data-dcnode-id="5293" instrument_node="">Ramses III</span></a><span data-dcnode-id="5291" instrument_node="">.</span><sup class="reference" data-dcnode-id="5288" id="cite_ref-FOOTNOTEFaust2015476_29-3"><a data-dcnode-id="5289" href="#cite_note-FOOTNOTEFaust2015476-29"><span data-dcnode-id="5290" instrument_node="">[25]</span></a></sup><span data-dcnode-id="5287" instrument_node=""> Evidence in favor of historical traditions forming a background to the Exodus myth include the documented movements of small groups of </span><a data-dcnode-id="5285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ancient_Semitic-speaking_peoples" title="Ancient Semitic-speaking peoples"><span data-dcnode-id="5286" instrument_node="">Ancient Semitic-speaking peoples</span></a><span data-dcnode-id="5284" instrument_node=""> into and out of Egypt during the </span><a data-dcnode-id="5282" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eighteenth_Dynasty_of_Egypt" title="Eighteenth Dynasty of Egypt"><span data-dcnode-id="5283" instrument_node="">Eighteenth</span></a><span data-dcnode-id="5281" instrument_node=""> and </span><a data-dcnode-id="5279" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nineteenth_Dynasty_of_Egypt" title="Nineteenth Dynasty of Egypt"><span data-dcnode-id="5280" instrument_node="">Nineteenth Dynasties</span></a><span data-dcnode-id="5278" instrument_node="">, some elements of Egyptian </span><a data-dcnode-id="5276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Folklore" title="Folklore"><span data-dcnode-id="5277" instrument_node="">folklore</span></a><span data-dcnode-id="5275" instrument_node=""> and culture in the Exodus narrative,</span><sup class="reference" data-dcnode-id="5272" id="cite_ref-FOOTNOTEMeyers20058–10_47-0"><a data-dcnode-id="5273" href="#cite_note-FOOTNOTEMeyers20058%E2%80%9310-47"><span data-dcnode-id="5274" instrument_node="">[42]</span></a></sup><span data-dcnode-id="5271" instrument_node=""> and the names Moses, Aaron and Phinehas, which seem to have an Egyptian origin.</span><sup class="reference" data-dcnode-id="5268" id="cite_ref-FOOTNOTERedmount200165_48-0"><a data-dcnode-id="5269" href="#cite_note-FOOTNOTERedmount200165-48"><span data-dcnode-id="5270" instrument_node="">[43]</span></a></sup><span data-dcnode-id="5267" instrument_node=""> Scholarly estimates for how many people could have been involved in such an exodus range from a few hundred to a few thousand people.</span><sup class="reference" data-dcnode-id="5264" id="cite_ref-FOOTNOTEFaust2015476_29-4"><a data-dcnode-id="5265" href="#cite_note-FOOTNOTEFaust2015476-29"><span data-dcnode-id="5266" instrument_node="">[25]</span></a></sup><span data-dcnode-id="5263" instrument_node="">
</span></p><p data-dcnode-id="5222"><span data-dcnode-id="5261" instrument_node="">Joel S. Baden</span><sup class="reference" data-dcnode-id="5258" id="cite_ref-49"><a data-dcnode-id="5259" href="#cite_note-49"><span data-dcnode-id="5260" instrument_node="">[44]</span></a></sup><span data-dcnode-id="5257" instrument_node=""> notes the presence of Semitic-speaking slaves in Egypt who sometimes escaped in small numbers as potential inspirations for the Exodus.</span><sup class="reference" data-dcnode-id="5254" id="cite_ref-FOOTNOTEBaden20196–7_50-0"><a data-dcnode-id="5255" href="#cite_note-FOOTNOTEBaden20196%E2%80%937-50"><span data-dcnode-id="5256" instrument_node="">[45]</span></a></sup><span data-dcnode-id="5253" instrument_node=""> It is also possible that oppressive Egyptian rule of Canaan during the late second millennium BCE may have aided the adoption of the story of a small group of Egyptian refugees by the native Canaanites among the Israelites.</span><sup class="reference" data-dcnode-id="5250" id="cite_ref-FOOTNOTEFaust2015477_51-0"><a data-dcnode-id="5251" href="#cite_note-FOOTNOTEFaust2015477-51"><span data-dcnode-id="5252" instrument_node="">[46]</span></a></sup><span data-dcnode-id="5249" instrument_node=""> The expulsion of the </span><a data-dcnode-id="5247" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hyksos" title="Hyksos"><span data-dcnode-id="5248" instrument_node="">Hyksos</span></a><span data-dcnode-id="5246" instrument_node="">, a Semitic group that had conquered much of Egypt, by the </span><a data-dcnode-id="5244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Seventeenth_Dynasty_of_Egypt" title="Seventeenth Dynasty of Egypt"><span data-dcnode-id="5245" instrument_node="">Seventeenth Dynasty of Egypt</span></a><span data-dcnode-id="5243" instrument_node=""> is also frequently discussed as a potential historical parallel or origin for the story.</span><sup class="reference" data-dcnode-id="5240" id="cite_ref-FOOTNOTEFaust2015477_51-1"><a data-dcnode-id="5241" href="#cite_note-FOOTNOTEFaust2015477-51"><span data-dcnode-id="5242" instrument_node="">[46]</span></a></sup><sup class="reference" data-dcnode-id="5237" id="cite_ref-FOOTNOTERedmount200178_52-0"><a data-dcnode-id="5238" href="#cite_note-FOOTNOTERedmount200178-52"><span data-dcnode-id="5239" instrument_node="">[47]</span></a></sup><sup class="reference" data-dcnode-id="5234" id="cite_ref-FOOTNOTERedford1992412–413_53-0"><a data-dcnode-id="5235" href="#cite_note-FOOTNOTERedford1992412%E2%80%93413-53"><span data-dcnode-id="5236" instrument_node="">[48]</span></a></sup><span data-dcnode-id="5233" instrument_node=""> Alternatively, Nadav Na'aman argues that oppressive Egyptian rule of Canaan during the Nineteenth and especially the </span><a data-dcnode-id="5231" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Twentieth_Dynasty_of_Egypt" title="Twentieth Dynasty of Egypt"><span data-dcnode-id="5232" instrument_node="">Twentieth Dynasty</span></a><span data-dcnode-id="5230" instrument_node=""> may have inspired the Exodus narrative, forming a "</span><a data-dcnode-id="5228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Collective_memory" title="Collective memory"><span data-dcnode-id="5229" instrument_node="">collective memory</span></a><span data-dcnode-id="5227" instrument_node="">" of Egyptian oppression that was transferred from Canaan to Egypt itself in the popular consciousness.</span><sup class="reference" data-dcnode-id="5224" id="cite_ref-FOOTNOTENa'aman201162–69_54-0"><a data-dcnode-id="5225" href="#cite_note-FOOTNOTENa'aman201162%E2%80%9369-54"><span data-dcnode-id="5226" instrument_node="">[49]</span></a></sup><span data-dcnode-id="5223" instrument_node="">
</span></p><p data-dcnode-id="5184"><span data-dcnode-id="5221" instrument_node="">A minority position among scholars is to see the biblical exodus traditions as the invention of the </span><a class="mw-redirect" data-dcnode-id="5219" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Babylonian_exile" title="Babylonian exile"><span data-dcnode-id="5220" instrument_node="">exilic</span></a><span data-dcnode-id="5218" instrument_node=""> and post-exilic Jewish community, with little to no historical basis.</span><sup class="reference" data-dcnode-id="5215" id="cite_ref-FOOTNOTERussell200911_32-1"><a data-dcnode-id="5216" href="#cite_note-FOOTNOTERussell200911-32"><span data-dcnode-id="5217" instrument_node="">[28]</span></a></sup><span data-dcnode-id="5214" instrument_node=""> </span><a class="mw-redirect" data-dcnode-id="5212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lester_Grabbe" title="Lester Grabbe"><span data-dcnode-id="5213" instrument_node="">Lester Grabbe</span></a><span data-dcnode-id="5211" instrument_node="">, for instance, argues that "[t]here is no compelling reason that the exodus has to be rooted in history,"</span><sup class="reference" data-dcnode-id="5208" id="cite_ref-FOOTNOTEGrabbe201484_55-0"><a data-dcnode-id="5209" href="#cite_note-FOOTNOTEGrabbe201484-55"><span data-dcnode-id="5210" instrument_node="">[50]</span></a></sup><span data-dcnode-id="5207" instrument_node=""> and that the details of the story more closely fit the seventh through the fifth centuries BCE than the traditional dating to the second millennium BCE.</span><sup class="reference" data-dcnode-id="5204" id="cite_ref-FOOTNOTEGrabbe201485_56-0"><a data-dcnode-id="5205" href="#cite_note-FOOTNOTEGrabbe201485-56"><span data-dcnode-id="5206" instrument_node="">[51]</span></a></sup><span data-dcnode-id="5203" instrument_node=""> </span><a data-dcnode-id="5201" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Philip_R._Davies" title="Philip R. Davies"><span data-dcnode-id="5202" instrument_node="">Philip R. Davies</span></a><span data-dcnode-id="5200" instrument_node=""> suggests that the story may have been inspired by the return to Israel of Israelites and Judaeans who were placed in Egypt as garrison troops by the </span><a data-dcnode-id="5198" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Assyria" title="Assyria"><span data-dcnode-id="5199" instrument_node="">Assyrians</span></a><span data-dcnode-id="5197" instrument_node=""> in the fifth and sixth centuries BCE.</span><sup class="reference" data-dcnode-id="5194" id="cite_ref-FOOTNOTEDavies2015105_57-0"><a data-dcnode-id="5195" href="#cite_note-FOOTNOTEDavies2015105-57"><span data-dcnode-id="5196" instrument_node="">[52]</span></a></sup><span data-dcnode-id="5193" instrument_node=""> Finkelstein and Silberman argue that "the most consistent geographical details of the Exodus story come from the seventh century BCE [...] six centuries after the events of the Exodus were supposed to have taken place".</span><sup class="reference" data-dcnode-id="5190" id="cite_ref-FOOTNOTEFinkelsteinSilberman200265_58-0"><a data-dcnode-id="5191" href="#cite_note-FOOTNOTEFinkelsteinSilberman200265-58"><span data-dcnode-id="5192" instrument_node="">[53]</span></a></sup><span data-dcnode-id="5189" instrument_node=""> There is no direct evidence for any of the people or Exodus events in non-biblical ancient texts or in archaeological remains, and this has led most scholars to omit the Exodus events from comprehensive histories of Israel.</span><sup class="reference" data-dcnode-id="5186" id="cite_ref-FOOTNOTEMooreKelle201188_59-0"><a data-dcnode-id="5187" href="#cite_note-FOOTNOTEMooreKelle201188-59"><span data-dcnode-id="5188" instrument_node="">[54]</span></a></sup><span data-dcnode-id="5185" instrument_node="">
</span></p><span data-dcnode-id="5183" instrument_node="">
</span><h2 data-dcnode-id="5180"><span class="mw-headline" data-dcnode-id="5181" id="Development_and_final_composition"><span data-dcnode-id="5182" instrument_node="">Development and final composition</span></span></h2><span data-dcnode-id="5179" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="5163"><div class="thumbinner" data-dcnode-id="5164" style="width:222px;"><a class="image" data-dcnode-id="5177" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A109.Ezra_Reads_the_Law_to_the_People.jpg"><img alt="" class="thumbimage" data-dcnode-id="5178" data-file-height="2907" data-file-width="2301" decoding="async" height="278" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/b/b0/109.Ezra_Reads_the_Law_to_the_People.jpg/220px-109.Ezra_Reads_the_Law_to_the_People.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/b/b0/109.Ezra_Reads_the_Law_to_the_People.jpg/330px-109.Ezra_Reads_the_Law_to_the_People.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/b/b0/109.Ezra_Reads_the_Law_to_the_People.jpg/440px-109.Ezra_Reads_the_Law_to_the_People.jpg 2x" width="220"></a><span data-dcnode-id="5176" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5165"><div class="magnify" data-dcnode-id="5174"><a class="internal" data-dcnode-id="5175" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A109.Ezra_Reads_the_Law_to_the_People.jpg" title="Enlarge"></a></div><i data-dcnode-id="5172"><span data-dcnode-id="5173" instrument_node="">Ezra Reads the Law to the People</span></i><span data-dcnode-id="5171" instrument_node=""> (</span><a data-dcnode-id="5167" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gustave_Dor%25C3%25A9%27s_illustrations_for_La_Grande_Bible_de_Tours" title="Gustave Doré's illustrations for La Grande Bible de Tours"><span data-dcnode-id="5170" instrument_node="">Gustave Doré's illustrations for </span><i data-dcnode-id="5168"><span data-dcnode-id="5169" instrument_node="">La Grande Bible de Tours</span></i></a><span data-dcnode-id="5166" instrument_node="">, 1866)</span></div></div></div><span data-dcnode-id="5162" instrument_node="">
</span><p data-dcnode-id="5116"><span data-dcnode-id="5161" instrument_node="">The earliest traces of the traditions behind the exodus appear in the northern prophets </span><a data-dcnode-id="5159" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Book_of_Amos" title="Book of Amos"><span data-dcnode-id="5160" instrument_node="">Amos</span></a><sup class="reference" data-dcnode-id="5156" id="cite_ref-60"><a data-dcnode-id="5157" href="#cite_note-60"><span data-dcnode-id="5158" instrument_node="">[55]</span></a></sup><span data-dcnode-id="5155" instrument_node=""> and </span><a data-dcnode-id="5153" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Book_of_Hosea" title="Book of Hosea"><span data-dcnode-id="5154" instrument_node="">Hosea</span></a><span data-dcnode-id="5152" instrument_node="">,</span><sup class="reference" data-dcnode-id="5149" id="cite_ref-61"><a data-dcnode-id="5150" href="#cite_note-61"><span data-dcnode-id="5151" instrument_node="">[56]</span></a></sup><span data-dcnode-id="5148" instrument_node=""> both active in the 8th century BCE in  northern </span><a data-dcnode-id="5146" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kingdom_of_Israel_%28Samaria%29" title="Kingdom of Israel (Samaria)"><span data-dcnode-id="5147" instrument_node="">Israel</span></a><span data-dcnode-id="5145" instrument_node="">, but their southern contemporaries </span><a data-dcnode-id="5143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Book_of_Isaiah" title="Book of Isaiah"><span data-dcnode-id="5144" instrument_node="">Isaiah</span></a><span data-dcnode-id="5142" instrument_node=""> and </span><a data-dcnode-id="5140" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Book_of_Micah" title="Book of Micah"><span data-dcnode-id="5141" instrument_node="">Micah</span></a><span data-dcnode-id="5139" instrument_node=""> show no knowledge of an exodus</span><sup class="reference" data-dcnode-id="5136" id="cite_ref-FOOTNOTELemche1985327_12-1"><a data-dcnode-id="5137" href="#cite_note-FOOTNOTELemche1985327-12"><span data-dcnode-id="5138" instrument_node="">[10]</span></a></sup><span data-dcnode-id="5135" instrument_node=""> (</span><a class="external text" data-dcnode-id="5133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bible.oremus.org/%3Fpassage%3DMicah%25206%3A4%25E2%2580%25935%26version%3Dnrsv" rel="nofollow"><span data-dcnode-id="5134" instrument_node="">Micah 6:4–5</span></a><span data-dcnode-id="5132" instrument_node=""> contains a reference to the exodus, which many scholars take to be an addition by a later editor</span><sup class="reference" data-dcnode-id="5129" id="cite_ref-63"><a data-dcnode-id="5130" href="#cite_note-63"><span data-dcnode-id="5131" instrument_node="">[f]</span></a></sup><span data-dcnode-id="5128" instrument_node="">); while </span><a data-dcnode-id="5126" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jeremiah" title="Jeremiah"><span data-dcnode-id="5127" instrument_node="">Jeremiah</span></a><span data-dcnode-id="5125" instrument_node="">, active in the 7th century, mentions both Moses</span><sup class="reference" data-dcnode-id="5122" id="cite_ref-64"><a data-dcnode-id="5123" href="#cite_note-64"><span data-dcnode-id="5124" instrument_node="">[58]</span></a></sup><span data-dcnode-id="5121" instrument_node=""> and the Exodus.</span><sup class="reference" data-dcnode-id="5118" id="cite_ref-65"><a data-dcnode-id="5119" href="#cite_note-65"><span data-dcnode-id="5120" instrument_node="">[59]</span></a></sup><span data-dcnode-id="5117" instrument_node="">
</span></p><p data-dcnode-id="5097"><span data-dcnode-id="5115" instrument_node="">The story may, therefore, have originated a few centuries earlier, perhaps in the 9th or 10th BCE, and there are signs that it took different forms in Israel, in the </span><a data-dcnode-id="5113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Transjordan_%28region%29" title="Transjordan (region)"><span data-dcnode-id="5114" instrument_node="">Transjordan region</span></a><span data-dcnode-id="5112" instrument_node="">, and in the southern </span><a data-dcnode-id="5110" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kingdom_of_Judah" title="Kingdom of Judah"><span data-dcnode-id="5111" instrument_node="">Kingdom of Judah</span></a><span data-dcnode-id="5109" instrument_node=""> before being unified in the Persian era.</span><sup class="reference" data-dcnode-id="5106" id="cite_ref-FOOTNOTERussell20091_66-0"><a data-dcnode-id="5107" href="#cite_note-FOOTNOTERussell20091-66"><span data-dcnode-id="5108" instrument_node="">[60]</span></a></sup><span data-dcnode-id="5105" instrument_node=""> The Exodus narrative was most likely further altered and expanded under the influence of the return from the </span><a data-dcnode-id="5103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Babylonian_captivity" title="Babylonian captivity"><span data-dcnode-id="5104" instrument_node="">Babylonian captivity</span></a><span data-dcnode-id="5102" instrument_node=""> in the sixth century BCE.</span><sup class="reference" data-dcnode-id="5099" id="cite_ref-FOOTNOTENa'aman201140_67-0"><a data-dcnode-id="5100" href="#cite_note-FOOTNOTENa'aman201140-67"><span data-dcnode-id="5101" instrument_node="">[61]</span></a></sup><span data-dcnode-id="5098" instrument_node="">
</span></p><p data-dcnode-id="5025"><span data-dcnode-id="5096" instrument_node="">Evidence from the Bible suggests that the Exodus from Egypt formed a "foundational mythology" or "state ideology" for the </span><a data-dcnode-id="5094" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kingdom_of_Israel_%28Samaria%29" title="Kingdom of Israel (Samaria)"><span data-dcnode-id="5095" instrument_node="">Northern Kingdom of Israel</span></a><span data-dcnode-id="5093" instrument_node="">.</span><sup class="reference" data-dcnode-id="5090" id="cite_ref-FOOTNOTEAssmann201850_68-0"><a data-dcnode-id="5091" href="#cite_note-FOOTNOTEAssmann201850-68"><span data-dcnode-id="5092" instrument_node="">[62]</span></a></sup><span data-dcnode-id="5089" instrument_node=""> The northern psalms </span><a data-dcnode-id="5087" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Psalm_80" title="Psalm 80"><span data-dcnode-id="5088" instrument_node="">80</span></a><span data-dcnode-id="5086" instrument_node=""> and </span><a data-dcnode-id="5084" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Psalm_81" title="Psalm 81"><span data-dcnode-id="5085" instrument_node="">81</span></a><span data-dcnode-id="5083" instrument_node=""> state that God "brought a vine out of Egypt" (Psalm 80:8) and record ritual observances of Israel's deliverance from Egypt as well as a version of part of the </span><a data-dcnode-id="5081" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ten_Commandments" title="Ten Commandments"><span data-dcnode-id="5082" instrument_node="">Ten Commandments</span></a><span data-dcnode-id="5080" instrument_node=""> (Psalm 81:10-11).</span><sup class="reference" data-dcnode-id="5077" id="cite_ref-FOOTNOTEBarmash2015b10–12_69-0"><a data-dcnode-id="5078" href="#cite_note-FOOTNOTEBarmash2015b10%E2%80%9312-69"><span data-dcnode-id="5079" instrument_node="">[63]</span></a></sup><span data-dcnode-id="5076" instrument_node=""> The </span><a data-dcnode-id="5074" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Books_of_Kings" title="Books of Kings"><span data-dcnode-id="5075" instrument_node="">Books of Kings</span></a><span data-dcnode-id="5073" instrument_node=""> records the dedication of two </span><a data-dcnode-id="5071" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Golden_calf" title="Golden calf"><span data-dcnode-id="5072" instrument_node="">golden calves</span></a><span data-dcnode-id="5070" instrument_node=""> in </span><a data-dcnode-id="5068" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bethel" title="Bethel"><span data-dcnode-id="5069" instrument_node="">Bethel</span></a><span data-dcnode-id="5067" instrument_node=""> and </span><a data-dcnode-id="5065" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dan_%28ancient_city%29" title="Dan (ancient city)"><span data-dcnode-id="5066" instrument_node="">Dan</span></a><span data-dcnode-id="5064" instrument_node=""> by the Israelite king </span><a class="mw-redirect" data-dcnode-id="5062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jeroboam_I" title="Jeroboam I"><span data-dcnode-id="5063" instrument_node="">Jeroboam I</span></a><span data-dcnode-id="5061" instrument_node="">, who uses the words "Here are your gods, O Israel, which brought you up out of the land of Egypt" (1 Kings 12:28). Scholars relate Jeroboam's calves to the golden calf made by Aaron of Exodus 32. Both include a nearly identical dedication formula ("These are your gods, O Israel, who brought you up out of the land of Egypt;" Exodus 32:8). This episode in Exodus is "widely regarded as a tendentious narrative against the Bethel calves".</span><sup class="reference" data-dcnode-id="5058" id="cite_ref-FOOTNOTERussell200941_70-0"><a data-dcnode-id="5059" href="#cite_note-FOOTNOTERussell200941-70"><span data-dcnode-id="5060" instrument_node="">[64]</span></a></sup><span data-dcnode-id="5057" instrument_node=""> Egyptologist </span><a data-dcnode-id="5055" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jan_Assmann" title="Jan Assmann"><span data-dcnode-id="5056" instrument_node="">Jan Assmann</span></a><span data-dcnode-id="5054" instrument_node=""> suggests that event, which would have taken place around 931 BCE, may be partially historical due to its association with the historical pharaoh </span><a class="mw-redirect" data-dcnode-id="5052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sheshonq_I" title="Sheshonq I"><span data-dcnode-id="5053" instrument_node="">Sheshonq I</span></a><span data-dcnode-id="5051" instrument_node=""> (the biblical </span><a data-dcnode-id="5049" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shishak" title="Shishak"><span data-dcnode-id="5050" instrument_node="">Shishak</span></a><span data-dcnode-id="5048" instrument_node="">).</span><sup class="reference" data-dcnode-id="5045" id="cite_ref-FOOTNOTEAssmann201850_68-1"><a data-dcnode-id="5046" href="#cite_note-FOOTNOTEAssmann201850-68"><span data-dcnode-id="5047" instrument_node="">[62]</span></a></sup><span data-dcnode-id="5044" instrument_node=""> Stephen Russell dates this tradition to "the eighth century BCE or earlier," and argues that it preserves a genuine Exodus tradition from the Northern Kingdom, but in a </span><a data-dcnode-id="5042" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kingdom_of_Judah" title="Kingdom of Judah"><span data-dcnode-id="5043" instrument_node="">Judahite</span></a><span data-dcnode-id="5041" instrument_node=""> recension.</span><sup class="reference" data-dcnode-id="5038" id="cite_ref-FOOTNOTERussell200955_71-0"><a data-dcnode-id="5039" href="#cite_note-FOOTNOTERussell200955-71"><span data-dcnode-id="5040" instrument_node="">[65]</span></a></sup><span data-dcnode-id="5037" instrument_node=""> Russell and Frank Moore Cross argue that the Israelites of the Northern Kingdom may have believed that the calves at Bethel and Dan were made by Aaron. Russell suggests that the connection to Jeroboam may have been later, possibly coming from a Judahite redactor.</span><sup class="reference" data-dcnode-id="5034" id="cite_ref-FOOTNOTERussell200941–43,_46–47_72-0"><a data-dcnode-id="5035" href="#cite_note-FOOTNOTERussell200941%E2%80%9343,_46%E2%80%9347-72"><span data-dcnode-id="5036" instrument_node="">[66]</span></a></sup><span data-dcnode-id="5033" instrument_node=""> Pauline Viviano, however, concludes that neither the references to Jeroboam's calves in Hosea (Hosea 8:6 and 10:5) nor the frequent prohibitions of idol worship in the seventh-century southern prophet </span><a data-dcnode-id="5031" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jeremiah" title="Jeremiah"><span data-dcnode-id="5032" instrument_node="">Jeremiah</span></a><span data-dcnode-id="5030" instrument_node=""> show any knowledge of a tradition of a golden calf having been created in Sinai.</span><sup class="reference" data-dcnode-id="5027" id="cite_ref-FOOTNOTEViviano201946–47_73-0"><a data-dcnode-id="5028" href="#cite_note-FOOTNOTEViviano201946%E2%80%9347-73"><span data-dcnode-id="5029" instrument_node="">[67]</span></a></sup><span data-dcnode-id="5026" instrument_node="">
</span></p><p data-dcnode-id="4972"><span data-dcnode-id="5024" instrument_node="">Some of the earliest evidence for Judahite traditions of the exodus is found in </span><a data-dcnode-id="5022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Psalm_78" title="Psalm 78"><span data-dcnode-id="5023" instrument_node="">Psalm 78</span></a><span data-dcnode-id="5021" instrument_node="">, which portrays the Exodus as beginning a history culminating in the building of the temple at Jerusalem. Pamela Barmash argues that the psalm is a polemic against the Northern Kingdom; as it fails to mention that kingdom's destruction in 722 BCE, she concludes that it must have been written before then.</span><sup class="reference" data-dcnode-id="5018" id="cite_ref-FOOTNOTEBarmash2015b8-9_74-0"><a data-dcnode-id="5019" href="#cite_note-FOOTNOTEBarmash2015b8-9-74"><span data-dcnode-id="5020" instrument_node="">[68]</span></a></sup><span data-dcnode-id="5017" instrument_node=""> The psalm's version of the Exodus contains some important differences from what is found in the Pentateuch: there is no mention of Moses, there are only seven plagues in Egypt, and the </span><a data-dcnode-id="5015" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Manna" title="Manna"><span data-dcnode-id="5016" instrument_node="">manna</span></a><span data-dcnode-id="5014" instrument_node=""> is described as "food of the mighty" rather than as bread in the wilderness.</span><sup class="reference" data-dcnode-id="5011" id="cite_ref-FOOTNOTEBarmash2015b9_75-0"><a data-dcnode-id="5012" href="#cite_note-FOOTNOTEBarmash2015b9-75"><span data-dcnode-id="5013" instrument_node="">[69]</span></a></sup><span data-dcnode-id="5010" instrument_node=""> Nadav Na'aman argues for other signs that the Exodus was a tradition in Judah before the destruction of the northern kingdom, including the </span><a data-dcnode-id="5008" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Song_of_the_Sea" title="Song of the Sea"><span data-dcnode-id="5009" instrument_node="">Song of the Sea</span></a><span data-dcnode-id="5007" instrument_node=""> and </span><a data-dcnode-id="5005" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Psalm_114" title="Psalm 114"><span data-dcnode-id="5006" instrument_node="">Psalm 114</span></a><span data-dcnode-id="5004" instrument_node="">, as well as the great political importance that the narrative came to assume there.</span><sup class="reference" data-dcnode-id="5001" id="cite_ref-FOOTNOTENa'aman201140_67-1"><a data-dcnode-id="5002" href="#cite_note-FOOTNOTENa'aman201140-67"><span data-dcnode-id="5003" instrument_node="">[61]</span></a></sup><sup class="reference" data-dcnode-id="4998" id="cite_ref-79"><a data-dcnode-id="4999" href="#cite_note-79"><span data-dcnode-id="5000" instrument_node="">[g]</span></a></sup><span data-dcnode-id="4997" instrument_node="">
A Judahite cultic object associated with the exodus was the brazen serpent or </span><a data-dcnode-id="4995" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nehushtan" title="Nehushtan"><span data-dcnode-id="4996" instrument_node="">nehushtan</span></a><span data-dcnode-id="4994" instrument_node="">: according to 2 Kings 18:4, the brazen serpent had been made by Moses and was worshiped in the </span><a data-dcnode-id="4992" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Solomon%2527s_Temple" title="Solomon's Temple"><span data-dcnode-id="4993" instrument_node="">temple</span></a><span data-dcnode-id="4991" instrument_node=""> in Jerusalem until the time of king </span><a data-dcnode-id="4989" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hezekiah" title="Hezekiah"><span data-dcnode-id="4990" instrument_node="">Hezekiah</span></a><span data-dcnode-id="4988" instrument_node=""> of Judah, who destroyed it as part of a religious reform, possibly around 727 BCE.</span><sup class="reference" data-dcnode-id="4985" id="cite_ref-FOOTNOTEBartusch200341_80-0"><a data-dcnode-id="4986" href="#cite_note-FOOTNOTEBartusch200341-80"><span data-dcnode-id="4987" instrument_node="">[73]</span></a></sup><sup class="reference" data-dcnode-id="4982" id="cite_ref-81"><a data-dcnode-id="4983" href="#cite_note-81"><span data-dcnode-id="4984" instrument_node="">[h]</span></a></sup><span data-dcnode-id="4981" instrument_node=""> In the Pentateuch, Moses creates the brazen serpent in Numbers 21:4-9. Meindert Dijkstra writes that while the historicity of the Mosaic origin of the Nehushtan is unlikely, its association with Moses appears genuine rather than the work of a later redactor.</span><sup class="reference" data-dcnode-id="4978" id="cite_ref-FOOTNOTEDijkstra200628_82-0"><a data-dcnode-id="4979" href="#cite_note-FOOTNOTEDijkstra200628-82"><span data-dcnode-id="4980" instrument_node="">[74]</span></a></sup><span data-dcnode-id="4977" instrument_node=""> Mark Walter Bartusch notes that the nehushtan is not mentioned at any prior point in Kings, and suggests that the brazen serpent was brought to Jerusalem from the Northern Kingdom after its destruction in 722 BCE.</span><sup class="reference" data-dcnode-id="4974" id="cite_ref-FOOTNOTEBartusch200341_80-1"><a data-dcnode-id="4975" href="#cite_note-FOOTNOTEBartusch200341-80"><span data-dcnode-id="4976" instrument_node="">[73]</span></a></sup><span data-dcnode-id="4973" instrument_node="">
</span></p><p data-dcnode-id="4944"><span data-dcnode-id="4971" instrument_node="">The revelation of God on Sinai appears to have originally been a tradition unrelated to the Exodus.</span><sup class="reference" data-dcnode-id="4968" id="cite_ref-FOOTNOTEBaden20199_83-0"><a data-dcnode-id="4969" href="#cite_note-FOOTNOTEBaden20199-83"><span data-dcnode-id="4970" instrument_node="">[75]</span></a></sup><span data-dcnode-id="4967" instrument_node=""> Joel S. Baden notes that "[t]he seams [between the Exodus and Wilderness traditions] still show: in the narrative of Israel's rescue from Egypt there is little hint that they will be brought anywhere other than Canaan—yet they find themselves heading first, unexpectedly, and in no obvious geographical order, to an obscure mountain."</span><sup class="reference" data-dcnode-id="4964" id="cite_ref-FOOTNOTEBaden201910_84-0"><a data-dcnode-id="4965" href="#cite_note-FOOTNOTEBaden201910-84"><span data-dcnode-id="4966" instrument_node="">[76]</span></a></sup><span data-dcnode-id="4963" instrument_node=""> In addition, there is widespread agreement that the revelation of the law in Deuteronomy was originally separate from the Exodus:</span><sup class="reference" data-dcnode-id="4960" id="cite_ref-FOOTNOTEAssmann2018204_85-0"><a data-dcnode-id="4961" href="#cite_note-FOOTNOTEAssmann2018204-85"><span data-dcnode-id="4962" instrument_node="">[77]</span></a></sup><span data-dcnode-id="4959" instrument_node=""> the original version of Deuteronomy is generally dated to the 7th century BCE.</span><sup class="reference" data-dcnode-id="4956" id="cite_ref-FOOTNOTEGrabbe201749_86-0"><a data-dcnode-id="4957" href="#cite_note-FOOTNOTEGrabbe201749-86"><span data-dcnode-id="4958" instrument_node="">[78]</span></a></sup><span data-dcnode-id="4955" instrument_node=""> The contents of the books of </span><a class="mw-redirect" data-dcnode-id="4953" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Leviticus" title="Leviticus"><span data-dcnode-id="4954" instrument_node="">Leviticus</span></a><span data-dcnode-id="4952" instrument_node=""> and </span><a data-dcnode-id="4950" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Book_of_Numbers" title="Book of Numbers"><span data-dcnode-id="4951" instrument_node="">Numbers</span></a><span data-dcnode-id="4949" instrument_node=""> are late additions to the narrative by priestly sources.</span><sup class="reference" data-dcnode-id="4946" id="cite_ref-FOOTNOTEDever200199_87-0"><a data-dcnode-id="4947" href="#cite_note-FOOTNOTEDever200199-87"><span data-dcnode-id="4948" instrument_node="">[79]</span></a></sup><span data-dcnode-id="4945" instrument_node="">
</span></p><p data-dcnode-id="4915"><span data-dcnode-id="4943" instrument_node="">Scholars broadly agree that the publication of the Torah (or Pentateuch) took place in the mid-Persian period (the 5th century BCE), echoing a traditional Jewish view which gives </span><a data-dcnode-id="4941" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ezra" title="Ezra"><span data-dcnode-id="4942" instrument_node="">Ezra</span></a><span data-dcnode-id="4940" instrument_node="">, the leader of the Jewish community on its return from Babylon, a pivotal role in its promulgation.</span><sup class="reference" data-dcnode-id="4937" id="cite_ref-FOOTNOTERomer20082_and_fn.3_88-0"><a data-dcnode-id="4938" href="#cite_note-FOOTNOTERomer20082_and_fn.3-88"><span data-dcnode-id="4939" instrument_node="">[80]</span></a></sup><span data-dcnode-id="4936" instrument_node=""> Many theories have been advanced to explain the composition of the first five books of the Bible, but two have been especially influential.</span><sup class="reference" data-dcnode-id="4933" id="cite_ref-FOOTNOTESka2006217_89-0"><a data-dcnode-id="4934" href="#cite_note-FOOTNOTESka2006217-89"><span data-dcnode-id="4935" instrument_node="">[81]</span></a></sup><span data-dcnode-id="4932" instrument_node=""> The first of these, Persian Imperial authorisation, advanced by Peter Frei in 1985, holds that the Persian authorities required the Jews of Jerusalem to present a single body of law as the price of local autonomy.</span><sup class="reference" data-dcnode-id="4929" id="cite_ref-FOOTNOTESka2006218_90-0"><a data-dcnode-id="4930" href="#cite_note-FOOTNOTESka2006218-90"><span data-dcnode-id="4931" instrument_node="">[82]</span></a></sup><span data-dcnode-id="4928" instrument_node=""> Frei's theory was demolished at an interdisciplinary symposium held in 2000, but the relationship between the Persian authorities and Jerusalem remains a crucial question.</span><sup class="reference" data-dcnode-id="4925" id="cite_ref-FOOTNOTEEskenazi200986_91-0"><a data-dcnode-id="4926" href="#cite_note-FOOTNOTEEskenazi200986-91"><span data-dcnode-id="4927" instrument_node="">[83]</span></a></sup><span data-dcnode-id="4924" instrument_node=""> The second theory, associated with Joel P. Weinberg and called the "Citizen-Temple Community", proposes that the Exodus story was composed to serve the needs of a post-exilic Jewish community organized around the Temple, which acted in effect as a bank for those who belonged to it.</span><sup class="reference" data-dcnode-id="4921" id="cite_ref-FOOTNOTESka2006226–227_92-0"><a data-dcnode-id="4922" href="#cite_note-FOOTNOTESka2006226%E2%80%93227-92"><span data-dcnode-id="4923" instrument_node="">[84]</span></a></sup><span data-dcnode-id="4920" instrument_node=""> The books containing the Exodus story served as an "identity card" defining who belonged to this community (i.e., to Israel), thus reinforcing Israel's unity through its new institutions.</span><sup class="reference" data-dcnode-id="4917" id="cite_ref-FOOTNOTESka2006225_93-0"><a data-dcnode-id="4918" href="#cite_note-FOOTNOTESka2006225-93"><span data-dcnode-id="4919" instrument_node="">[85]</span></a></sup><span data-dcnode-id="4916" instrument_node="">
</span></p><span data-dcnode-id="4914" instrument_node="">
</span><h2 data-dcnode-id="4911"><span class="mw-headline" data-dcnode-id="4912" id="Hellenistic_Egyptian_parallel_narratives"><span data-dcnode-id="4913" instrument_node="">Hellenistic Egyptian parallel narratives</span></span></h2><span data-dcnode-id="4910" instrument_node="">
</span><p data-dcnode-id="4821"><span data-dcnode-id="4909" instrument_node="">Writers in Greek and Latin record several Egyptian tales of the expulsion of a group of foreigners that were connected to the Exodus in the </span><a class="mw-redirect" data-dcnode-id="4907" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ptolemaic_kingdom" title="Ptolemaic kingdom"><span data-dcnode-id="4908" instrument_node="">Ptolemaic period</span></a><span data-dcnode-id="4906" instrument_node="">.</span><sup class="reference" data-dcnode-id="4903" id="cite_ref-FOOTNOTEDroge1996134_94-0"><a data-dcnode-id="4904" href="#cite_note-FOOTNOTEDroge1996134-94"><span data-dcnode-id="4905" instrument_node="">[86]</span></a></sup><span data-dcnode-id="4902" instrument_node=""> These tales often include elements of the Hyksos period and most are extremely anti-Jewish.</span><sup class="reference" data-dcnode-id="4899" id="cite_ref-FOOTNOTEAssmann200929,_34–35_95-0"><a data-dcnode-id="4900" href="#cite_note-FOOTNOTEAssmann200929,_34%E2%80%9335-95"><span data-dcnode-id="4901" instrument_node="">[87]</span></a></sup><span data-dcnode-id="4898" instrument_node=""> The earliest non-biblical account is that of </span><a data-dcnode-id="4896" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hecataeus_of_Abdera" title="Hecataeus of Abdera"><span data-dcnode-id="4897" instrument_node="">Hecataeus of Abdera</span></a><span data-dcnode-id="4895" instrument_node=""> (c. 320 BCE), as preserved in the first century CE Jewish historian </span><a data-dcnode-id="4893" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Josephus" title="Josephus"><span data-dcnode-id="4894" instrument_node="">Josephus</span></a><span data-dcnode-id="4892" instrument_node=""> in his work </span><i data-dcnode-id="4889"><a data-dcnode-id="4890" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Against_Apion" title="Against Apion"><span data-dcnode-id="4891" instrument_node="">Against Apion</span></a></i><span data-dcnode-id="4888" instrument_node=""> and in a variant version by the first-century BCE Greek historian </span><a class="mw-redirect" data-dcnode-id="4886" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Diodorus" title="Diodorus"><span data-dcnode-id="4887" instrument_node="">Diodorus</span></a><span data-dcnode-id="4885" instrument_node="">.</span><sup class="reference" data-dcnode-id="4882" id="cite_ref-FOOTNOTEDroge1996131_96-0"><a data-dcnode-id="4883" href="#cite_note-FOOTNOTEDroge1996131-96"><span data-dcnode-id="4884" instrument_node="">[88]</span></a></sup><span data-dcnode-id="4881" instrument_node=""> Hecataeus tells how the Egyptians blamed a plague on foreigners and expelled them from the country, whereupon Moses, their leader, took them to Canaan.</span><sup class="reference" data-dcnode-id="4878" id="cite_ref-FOOTNOTEAssmann200934_97-0"><a data-dcnode-id="4879" href="#cite_note-FOOTNOTEAssmann200934-97"><span data-dcnode-id="4880" instrument_node="">[89]</span></a></sup><span data-dcnode-id="4877" instrument_node=""> In this version, Moses is portrayed extremely positively.</span><sup class="reference" data-dcnode-id="4874" id="cite_ref-FOOTNOTEDroge1996134_94-1"><a data-dcnode-id="4875" href="#cite_note-FOOTNOTEDroge1996134-94"><span data-dcnode-id="4876" instrument_node="">[86]</span></a></sup><span data-dcnode-id="4873" instrument_node=""> </span><a data-dcnode-id="4871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Manetho" title="Manetho"><span data-dcnode-id="4872" instrument_node="">Manetho</span></a><span data-dcnode-id="4870" instrument_node="">, as preserved in Josephus's </span><i data-dcnode-id="4868"><span data-dcnode-id="4869" instrument_node="">Against Apion</span></i><span data-dcnode-id="4867" instrument_node="">, tells how 80,000 lepers and other "impure people", led by a priest named </span><a data-dcnode-id="4865" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Osarseph" title="Osarseph"><span data-dcnode-id="4866" instrument_node="">Osarseph</span></a><span data-dcnode-id="4864" instrument_node="">, join forces with the former Hyksos, now living in Jerusalem, to take over Egypt. They wreak havoc until the pharaoh and his son chase them out to the borders of Syria, where Osarseph gives the lepers a law-code and changes his name to Moses. The identification of Osarseph with Moses in Manetho's account may be an interpolation or may come from Manetho.</span><sup class="reference" data-dcnode-id="4861" id="cite_ref-FOOTNOTEDroge1996134–35_98-0"><a data-dcnode-id="4862" href="#cite_note-FOOTNOTEDroge1996134%E2%80%9335-98"><span data-dcnode-id="4863" instrument_node="">[90]</span></a></sup><sup class="reference" data-dcnode-id="4858" id="cite_ref-FOOTNOTEFeldman1998342_99-0"><a data-dcnode-id="4859" href="#cite_note-FOOTNOTEFeldman1998342-99"><span data-dcnode-id="4860" instrument_node="">[91]</span></a></sup><sup class="reference" data-dcnode-id="4855" id="cite_ref-FOOTNOTEAssmann200934_97-1"><a data-dcnode-id="4856" href="#cite_note-FOOTNOTEAssmann200934-97"><span data-dcnode-id="4857" instrument_node="">[89]</span></a></sup><span data-dcnode-id="4854" instrument_node=""> Other versions of the story are recorded by first-century BCE Egyptian grammarian </span><a data-dcnode-id="4852" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lysimachus_of_Alexandria" title="Lysimachus of Alexandria"><span data-dcnode-id="4853" instrument_node="">Lysimachus of Alexandria</span></a><span data-dcnode-id="4851" instrument_node="">, who sets the story in the time of Pharaoh </span><a data-dcnode-id="4849" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bakenranef" title="Bakenranef"><span data-dcnode-id="4850" instrument_node="">Bakenranef</span></a><span data-dcnode-id="4848" instrument_node=""> (Bocchoris), the first-century CE Egyptian historian </span><a data-dcnode-id="4846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chaeremon_of_Alexandria" title="Chaeremon of Alexandria"><span data-dcnode-id="4847" instrument_node="">Chaeremon of Alexandria</span></a><span data-dcnode-id="4845" instrument_node="">, and the first-century BCE Gallo-Roman historian </span><a data-dcnode-id="4843" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gnaeus_Pompeius_Trogus" title="Gnaeus Pompeius Trogus"><span data-dcnode-id="4844" instrument_node="">Gnaeus Pompeius Trogus</span></a><span data-dcnode-id="4842" instrument_node="">.</span><sup class="reference" data-dcnode-id="4839" id="cite_ref-FOOTNOTEAssmann200935_100-0"><a data-dcnode-id="4840" href="#cite_note-FOOTNOTEAssmann200935-100"><span data-dcnode-id="4841" instrument_node="">[92]</span></a></sup><span data-dcnode-id="4838" instrument_node=""> The first century CE Roman historian </span><a data-dcnode-id="4836" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tacitus" title="Tacitus"><span data-dcnode-id="4837" instrument_node="">Tacitus</span></a><span data-dcnode-id="4835" instrument_node=""> includes a version of the story that claims that the Hebrews worshiped a </span><a data-dcnode-id="4833" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Donkey" title="Donkey"><span data-dcnode-id="4834" instrument_node="">donkey</span></a><span data-dcnode-id="4832" instrument_node=""> as their god in order to ridicule Egyptian religion, while the Roman biographer </span><a data-dcnode-id="4830" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Plutarch" title="Plutarch"><span data-dcnode-id="4831" instrument_node="">Plutarch</span></a><span data-dcnode-id="4829" instrument_node=""> claims that the Egyptian god </span><a data-dcnode-id="4827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Set_%28deity%29" title="Set (deity)"><span data-dcnode-id="4828" instrument_node="">Seth</span></a><span data-dcnode-id="4826" instrument_node=""> was expelled from Egypt and had two sons named Juda and Hierosolyma.</span><sup class="reference" data-dcnode-id="4823" id="cite_ref-FOOTNOTEAssmann200937_101-0"><a data-dcnode-id="4824" href="#cite_note-FOOTNOTEAssmann200937-101"><span data-dcnode-id="4825" instrument_node="">[93]</span></a></sup><span data-dcnode-id="4822" instrument_node="">
</span></p><p data-dcnode-id="4793"><span data-dcnode-id="4820" instrument_node="">It is possible that the stories represent a polemical Egyptian response to the Exodus narrative.</span><sup class="reference" data-dcnode-id="4817" id="cite_ref-FOOTNOTEGmirkin2006170_102-0"><a data-dcnode-id="4818" href="#cite_note-FOOTNOTEGmirkin2006170-102"><span data-dcnode-id="4819" instrument_node="">[94]</span></a></sup><span data-dcnode-id="4816" instrument_node=""> Egyptologist </span><a data-dcnode-id="4814" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jan_Assmann" title="Jan Assmann"><span data-dcnode-id="4815" instrument_node="">Jan Assmann</span></a><span data-dcnode-id="4813" instrument_node=""> proposes that the story comes from oral sources that "must [...] predate the first possible acquaintance of an Egyptian writer with the Hebrew Bible."</span><sup class="reference" data-dcnode-id="4810" id="cite_ref-FOOTNOTEAssmann200934_97-2"><a data-dcnode-id="4811" href="#cite_note-FOOTNOTEAssmann200934-97"><span data-dcnode-id="4812" instrument_node="">[89]</span></a></sup><span data-dcnode-id="4809" instrument_node=""> Assmann suggests that the story has no single origin but rather combines numerous historical experiences, notably the </span><a class="mw-redirect" data-dcnode-id="4807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Amarna_period" title="Amarna period"><span data-dcnode-id="4808" instrument_node="">Amarna</span></a><span data-dcnode-id="4806" instrument_node=""> and Hyksos periods, into a folk memory.</span><sup class="reference" data-dcnode-id="4803" id="cite_ref-FOOTNOTEAssmann2003227_103-0"><a data-dcnode-id="4804" href="#cite_note-FOOTNOTEAssmann2003227-103"><span data-dcnode-id="4805" instrument_node="">[95]</span></a></sup><span data-dcnode-id="4802" instrument_node=""> There is general agreement that the stories originally had nothing to do with the Jews.</span><sup class="reference" data-dcnode-id="4799" id="cite_ref-FOOTNOTEDroge1996134_94-2"><a data-dcnode-id="4800" href="#cite_note-FOOTNOTEDroge1996134-94"><span data-dcnode-id="4801" instrument_node="">[86]</span></a></sup><span data-dcnode-id="4798" instrument_node=""> Erich S. Gruen suggests that it may have been the Jews themselves that inserted themselves into Manetho's narrative, in which various negative actions from the point of view of the Egyptians, such as desecrating temples, are interpreted positively.</span><sup class="reference" data-dcnode-id="4795" id="cite_ref-FOOTNOTEGruen2016218–220_104-0"><a data-dcnode-id="4796" href="#cite_note-FOOTNOTEGruen2016218%E2%80%93220-104"><span data-dcnode-id="4797" instrument_node="">[96]</span></a></sup><span data-dcnode-id="4794" instrument_node="">
</span></p><span data-dcnode-id="4792" instrument_node="">
</span><h2 data-dcnode-id="4789"><span class="mw-headline" data-dcnode-id="4790" id="Religious_and_cultural_significance"><span data-dcnode-id="4791" instrument_node="">Religious and cultural significance</span></span></h2><span data-dcnode-id="4788" instrument_node="">
</span><h3 data-dcnode-id="4785"><span class="mw-headline" data-dcnode-id="4786" id="In_Judaism"><span data-dcnode-id="4787" instrument_node="">In Judaism</span></span></h3><span data-dcnode-id="4784" instrument_node="">
</span><link data-dcnode-id="4783" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="4776" role="note"><span data-dcnode-id="4782" instrument_node="">See also: </span><a data-dcnode-id="4780" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Passover" title="Passover"><span data-dcnode-id="4781" instrument_node="">Passover</span></a><span data-dcnode-id="4779" instrument_node=""> and </span><a data-dcnode-id="4777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Passover_Seder" title="Passover Seder"><span data-dcnode-id="4778" instrument_node="">Passover Seder</span></a></div><span data-dcnode-id="4775" instrument_node="">
</span><p data-dcnode-id="4727"><span data-dcnode-id="4774" instrument_node="">Commemoration of the Exodus is central to </span><a data-dcnode-id="4772" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Judaism" title="Judaism"><span data-dcnode-id="4773" instrument_node="">Judaism</span></a><span data-dcnode-id="4771" instrument_node="">, and </span><a data-dcnode-id="4769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jewish_culture" title="Jewish culture"><span data-dcnode-id="4770" instrument_node="">Jewish culture</span></a><span data-dcnode-id="4768" instrument_node="">. In the Bible, the Exodus is frequently mentioned as the event that created the Israelite people and forged their bond with God, being described as such by the prophets </span><a data-dcnode-id="4766" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hosea" title="Hosea"><span data-dcnode-id="4767" instrument_node="">Hosea</span></a><span data-dcnode-id="4765" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="4763" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jeremiah_%28prophet%29" title="Jeremiah (prophet)"><span data-dcnode-id="4764" instrument_node="">Jeremiah</span></a><span data-dcnode-id="4762" instrument_node="">, and </span><a data-dcnode-id="4760" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ezekiel" title="Ezekiel"><span data-dcnode-id="4761" instrument_node="">Ezekiel</span></a><span data-dcnode-id="4759" instrument_node="">.</span><sup class="reference" data-dcnode-id="4756" id="cite_ref-FOOTNOTEBaden201935–36_105-0"><a data-dcnode-id="4757" href="#cite_note-FOOTNOTEBaden201935%E2%80%9336-105"><span data-dcnode-id="4758" instrument_node="">[97]</span></a></sup><span data-dcnode-id="4755" instrument_node=""> The Exodus is invoked daily in </span><a data-dcnode-id="4753" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/List_of_Jewish_prayers_and_blessings" title="List of Jewish prayers and blessings"><span data-dcnode-id="4754" instrument_node="">Jewish prayers</span></a><span data-dcnode-id="4752" instrument_node=""> and celebrated each year during the Jewish holidays of </span><a data-dcnode-id="4750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Passover" title="Passover"><span data-dcnode-id="4751" instrument_node="">Passover</span></a><span data-dcnode-id="4749" instrument_node="">, </span><a data-dcnode-id="4747" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shavuot" title="Shavuot"><span data-dcnode-id="4748" instrument_node="">Shavuot</span></a><span data-dcnode-id="4746" instrument_node="">, and </span><a data-dcnode-id="4744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sukkot" title="Sukkot"><span data-dcnode-id="4745" instrument_node="">Sukkot</span></a><span data-dcnode-id="4743" instrument_node="">.</span><sup class="reference" data-dcnode-id="4740" id="cite_ref-FOOTNOTETigay2004106_106-0"><a data-dcnode-id="4741" href="#cite_note-FOOTNOTETigay2004106-106"><span data-dcnode-id="4742" instrument_node="">[98]</span></a></sup><span data-dcnode-id="4739" instrument_node=""> The fringes worn at the corners of traditional Jewish prayer shawls are described as a physical reminder of the obligation to observe the laws given at the climax of Exodus: "Look at it and recall all the commandments of the Lord" (Numbers).</span><sup class="reference" data-dcnode-id="4736" id="cite_ref-FOOTNOTESarason201553_107-0"><a data-dcnode-id="4737" href="#cite_note-FOOTNOTESarason201553-107"><span data-dcnode-id="4738" instrument_node="">[99]</span></a></sup><span data-dcnode-id="4735" instrument_node=""> The festivals associated with the Exodus began as agricultural and seasonal feasts but became completely subsumed into the Exodus narrative of Israel's deliverance from oppression at the hands of God.</span><sup class="reference" data-dcnode-id="4732" id="cite_ref-FOOTNOTETigay2004106_106-1"><a data-dcnode-id="4733" href="#cite_note-FOOTNOTETigay2004106-106"><span data-dcnode-id="4734" instrument_node="">[98]</span></a></sup><sup class="reference" data-dcnode-id="4729" id="cite_ref-FOOTNOTENelson201543_108-0"><a data-dcnode-id="4730" href="#cite_note-FOOTNOTENelson201543-108"><span data-dcnode-id="4731" instrument_node="">[100]</span></a></sup><span data-dcnode-id="4728" instrument_node="">
</span></p><span data-dcnode-id="4726" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4714"><div class="thumbinner" data-dcnode-id="4715" style="width:302px;"><a class="image" data-dcnode-id="4724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AA_Seder_table_setting.jpg"><img alt="" class="thumbimage" data-dcnode-id="4725" data-file-height="1429" data-file-width="1906" decoding="async" height="225" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/b/b7/A_Seder_table_setting.jpg/300px-A_Seder_table_setting.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/b/b7/A_Seder_table_setting.jpg/450px-A_Seder_table_setting.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/b/b7/A_Seder_table_setting.jpg/600px-A_Seder_table_setting.jpg 2x" width="300"></a><span data-dcnode-id="4723" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4716"><div class="magnify" data-dcnode-id="4721"><a class="internal" data-dcnode-id="4722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AA_Seder_table_setting.jpg" title="Enlarge"></a></div><span data-dcnode-id="4720" instrument_node="">A </span><a data-dcnode-id="4718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Passover_Seder" title="Passover Seder"><span data-dcnode-id="4719" instrument_node="">Seder</span></a><span data-dcnode-id="4717" instrument_node=""> table setting, commemorating the Passover and Exodus</span></div></div></div><p data-dcnode-id="4689"><span data-dcnode-id="4713" instrument_node="">
For Jews, Passover celebrates the freedom of the Israelites from captivity in Egypt, the settling of Canaan by the Israelites and the "passing over" of the angel of death during the </span><a data-dcnode-id="4711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Plagues_of_Egypt%2310._Death_of_firstborn%3A_Ex._11%3A1%25E2%2580%259312%3A36" title="Plagues of Egypt"><span data-dcnode-id="4712" instrument_node="">death of the first-born</span></a><span data-dcnode-id="4710" instrument_node="">.</span><sup class="reference" data-dcnode-id="4707" id="cite_ref-FOOTNOTEBlack201810_109-0"><a data-dcnode-id="4708" href="#cite_note-FOOTNOTEBlack201810-109"><span data-dcnode-id="4709" instrument_node="">[101]</span></a></sup><sup class="reference" data-dcnode-id="4704" id="cite_ref-FOOTNOTEBlack201826_110-0"><a data-dcnode-id="4705" href="#cite_note-FOOTNOTEBlack201826-110"><span data-dcnode-id="4706" instrument_node="">[102]</span></a></sup><span data-dcnode-id="4703" instrument_node=""> Passover involves a ritual meal called a </span><a data-dcnode-id="4701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Passover_Seder" title="Passover Seder"><span data-dcnode-id="4702" instrument_node="">Seder</span></a><span data-dcnode-id="4700" instrument_node=""> during which parts of the exodus narrative are retold.</span><sup class="reference" data-dcnode-id="4697" id="cite_ref-FOOTNOTEBlack201819_111-0"><a data-dcnode-id="4698" href="#cite_note-FOOTNOTEBlack201819-111"><span data-dcnode-id="4699" instrument_node="">[103]</span></a></sup><span data-dcnode-id="4696" instrument_node=""> In the </span><a class="mw-redirect" data-dcnode-id="4694" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hagaddah" title="Hagaddah"><span data-dcnode-id="4695" instrument_node="">Hagaddah</span></a><span data-dcnode-id="4693" instrument_node=""> of the Seder it is written that every generation is obliged to remind and identify itself in terms of the Exodus. Thus the following words from the </span><a data-dcnode-id="4691" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pesachim" title="Pesachim"><span data-dcnode-id="4692" instrument_node="">Pesaḥim (10:5)</span></a><span data-dcnode-id="4690" instrument_node="">  are recited:</span></p><blockquote data-dcnode-id="4680"><p data-dcnode-id="4681"><span data-dcnode-id="4688" instrument_node="">”In every generation a person is duty-bound to regard himself as if he personally has gone forth from Egypt”.</span><sup class="reference" data-dcnode-id="4685" id="cite_ref-FOOTNOTEKlein1979105_112-0"><a data-dcnode-id="4686" href="#cite_note-FOOTNOTEKlein1979105-112"><span data-dcnode-id="4687" instrument_node="">[104]</span></a></sup><sup class="reference" data-dcnode-id="4682" id="cite_ref-114"><a data-dcnode-id="4683" href="#cite_note-114"><span data-dcnode-id="4684" instrument_node="">[i]</span></a></sup></p></blockquote><span data-dcnode-id="4679" instrument_node="">
</span><p data-dcnode-id="4667"><span data-dcnode-id="4678" instrument_node="">Because the Israelites fled Egypt in haste without time for bread to rise, the unleavened bread </span><a class="mw-redirect" data-dcnode-id="4676" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Matzoh" title="Matzoh"><span data-dcnode-id="4677" instrument_node="">matzoh</span></a><span data-dcnode-id="4675" instrument_node=""> is eaten on Passover, and homes must be cleansed of any items containing leavening agents, known as </span><a data-dcnode-id="4673" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chametz" title="Chametz"><span data-dcnode-id="4674" instrument_node="">Chametz</span></a><span data-dcnode-id="4672" instrument_node="">.</span><sup class="reference" data-dcnode-id="4669" id="cite_ref-FOOTNOTEBlack201822–23_115-0"><a data-dcnode-id="4670" href="#cite_note-FOOTNOTEBlack201822%E2%80%9323-115"><span data-dcnode-id="4671" instrument_node="">[106]</span></a></sup><span data-dcnode-id="4668" instrument_node="">
</span></p><p data-dcnode-id="4630"><span data-dcnode-id="4666" instrument_node="">Shavuot celebrates the granting of the Law to Moses on Mount Sinai; Jews are called to rededicate themselves to the covenant on this day.</span><sup class="reference" data-dcnode-id="4663" id="cite_ref-FOOTNOTEBlack201819_111-1"><a data-dcnode-id="4664" href="#cite_note-FOOTNOTEBlack201819-111"><span data-dcnode-id="4665" instrument_node="">[103]</span></a></sup><span data-dcnode-id="4662" instrument_node=""> Some denominations follow Shavuot with </span><a data-dcnode-id="4660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Three_Weeks" title="The Three Weeks"><span data-dcnode-id="4661" instrument_node="">The Three Weeks</span></a><span data-dcnode-id="4659" instrument_node="">, during which the "two most heinous sins committed by the Jews in their relationship to God" are mourned: the </span><a class="mw-redirect" data-dcnode-id="4657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Golden_Calf" title="Golden Calf"><span data-dcnode-id="4658" instrument_node="">Golden Calf</span></a><span data-dcnode-id="4656" instrument_node=""> and the doubting of God's promise by </span><a data-dcnode-id="4654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Twelve_Spies" title="The Twelve Spies"><span data-dcnode-id="4655" instrument_node="">the Twelve Spies</span></a><span data-dcnode-id="4653" instrument_node="">.</span><sup class="reference" data-dcnode-id="4650" id="cite_ref-FOOTNOTEBlack201819–20_116-0"><a data-dcnode-id="4651" href="#cite_note-FOOTNOTEBlack201819%E2%80%9320-116"><span data-dcnode-id="4652" instrument_node="">[107]</span></a></sup><span data-dcnode-id="4649" instrument_node=""> A third Jewish festival, </span><a data-dcnode-id="4647" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sukkot" title="Sukkot"><span data-dcnode-id="4648" instrument_node="">Sukkot</span></a><span data-dcnode-id="4646" instrument_node="">, the Festival of Booths, is associated with the Israelites living in booths after they left their previous homes in Egypt.</span><sup class="reference" data-dcnode-id="4643" id="cite_ref-FOOTNOTETigay2004106_106-2"><a data-dcnode-id="4644" href="#cite_note-FOOTNOTETigay2004106-106"><span data-dcnode-id="4645" instrument_node="">[98]</span></a></sup><span data-dcnode-id="4642" instrument_node=""> It celebrates how God provided for the Israelites while they wandered in the desert without food or shelter.</span><sup class="reference" data-dcnode-id="4639" id="cite_ref-FOOTNOTEBlack201820_117-0"><a data-dcnode-id="4640" href="#cite_note-FOOTNOTEBlack201820-117"><span data-dcnode-id="4641" instrument_node="">[108]</span></a></sup><span data-dcnode-id="4638" instrument_node=""> It is celebrated by building a </span><a data-dcnode-id="4636" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sukkah" title="Sukkah"><span data-dcnode-id="4637" instrument_node="">sukkah</span></a><span data-dcnode-id="4635" instrument_node="">, a temporary shelter also called a booth or tabernacle, in which the rituals of Sukkot are performed, recalling the impermanence of the Israelites' homes during the desert wanderings.</span><sup class="reference" data-dcnode-id="4632" id="cite_ref-FOOTNOTEBlack201860–61_118-0"><a data-dcnode-id="4633" href="#cite_note-FOOTNOTEBlack201860%E2%80%9361-118"><span data-dcnode-id="4634" instrument_node="">[109]</span></a></sup><span data-dcnode-id="4631" instrument_node="">
</span></p><span data-dcnode-id="4629" instrument_node="">
</span><h3 data-dcnode-id="4626"><span class="mw-headline" data-dcnode-id="4627" id="Non-Jewish_significance"><span data-dcnode-id="4628" instrument_node="">Non-Jewish significance</span></span></h3><span data-dcnode-id="4625" instrument_node="">
</span><p data-dcnode-id="4553"><span data-dcnode-id="4624" instrument_node="">The Christian ritual of the </span><a data-dcnode-id="4622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eucharist" title="Eucharist"><span data-dcnode-id="4623" instrument_node="">eucharist</span></a><span data-dcnode-id="4621" instrument_node=""> and the holiday of </span><a data-dcnode-id="4619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Easter" title="Easter"><span data-dcnode-id="4620" instrument_node="">Easter</span></a><span data-dcnode-id="4618" instrument_node=""> draw directly on the imagery of the Passover and the Exodus.</span><sup class="reference" data-dcnode-id="4615" id="cite_ref-FOOTNOTEBaden201980–86_119-0"><a data-dcnode-id="4616" href="#cite_note-FOOTNOTEBaden201980%E2%80%9386-119"><span data-dcnode-id="4617" instrument_node="">[110]</span></a></sup><span data-dcnode-id="4614" instrument_node=""> In the </span><a data-dcnode-id="4612" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_Testament" title="New Testament"><span data-dcnode-id="4613" instrument_node="">New Testament</span></a><span data-dcnode-id="4611" instrument_node="">, </span><a data-dcnode-id="4609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jesus" title="Jesus"><span data-dcnode-id="4610" instrument_node="">Jesus</span></a><span data-dcnode-id="4608" instrument_node=""> is frequently associated with motifs of the Exodus.</span><sup class="reference" data-dcnode-id="4605" id="cite_ref-FOOTNOTEGraves2019548_120-0"><a data-dcnode-id="4606" href="#cite_note-FOOTNOTEGraves2019548-120"><span data-dcnode-id="4607" instrument_node="">[111]</span></a></sup><span data-dcnode-id="4604" instrument_node=""> The </span><a data-dcnode-id="4602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gospel_of_Mark" title="Gospel of Mark"><span data-dcnode-id="4603" instrument_node="">Gospel of Mark</span></a><span data-dcnode-id="4601" instrument_node=""> has been suggested to be a </span><a data-dcnode-id="4599" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Midrash" title="Midrash"><span data-dcnode-id="4600" instrument_node="">midrash</span></a><span data-dcnode-id="4598" instrument_node=""> on the Exodus, though scholar Larry Perkins thinks this unlikely.</span><sup class="reference" data-dcnode-id="4595" id="cite_ref-FOOTNOTEPerkins2006114_121-0"><a data-dcnode-id="4596" href="#cite_note-FOOTNOTEPerkins2006114-121"><span data-dcnode-id="4597" instrument_node="">[112]</span></a></sup><span data-dcnode-id="4594" instrument_node=""> Mark suggests that the outpouring of Jesus' blood creates a new covenant (Mark 14:24) in the same way that Moses' sacrifice of bulls had created a covenant (Exodus 24:5).</span><sup class="reference" data-dcnode-id="4591" id="cite_ref-FOOTNOTEPerkins2006107_122-0"><a data-dcnode-id="4592" href="#cite_note-FOOTNOTEPerkins2006107-122"><span data-dcnode-id="4593" instrument_node="">[113]</span></a></sup><span data-dcnode-id="4590" instrument_node=""> In the </span><a data-dcnode-id="4588" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gospel_of_Matthew" title="Gospel of Matthew"><span data-dcnode-id="4589" instrument_node="">Gospel of Matthew</span></a><span data-dcnode-id="4587" instrument_node="">, Jesus reverses the direction of the Exodus by escaping from the </span><a data-dcnode-id="4585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Massacre_of_the_Innocents" title="Massacre of the Innocents"><span data-dcnode-id="4586" instrument_node="">Massacre of the Innocents</span></a><span data-dcnode-id="4584" instrument_node=""> committed by </span><a data-dcnode-id="4582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Herod_the_Great" title="Herod the Great"><span data-dcnode-id="4583" instrument_node="">Herod the Great</span></a><span data-dcnode-id="4581" instrument_node=""> before himself returning from Egypt (Matt 2:13-15).</span><sup class="reference" data-dcnode-id="4578" id="cite_ref-FOOTNOTEBaden201953_123-0"><a data-dcnode-id="4579" href="#cite_note-FOOTNOTEBaden201953-123"><span data-dcnode-id="4580" instrument_node="">[114]</span></a></sup><span data-dcnode-id="4577" instrument_node=""> Other parallels in Matthew include that he is baptized by water (Matt 3:13-17), and tested in the desert; unlike the Israelites, he is able to resist temptation (Matt. 4.1-3). The </span><a data-dcnode-id="4575" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gospel_of_John" title="Gospel of John"><span data-dcnode-id="4576" instrument_node="">Gospel of John</span></a><span data-dcnode-id="4574" instrument_node=""> repeatedly calls Jesus the Passover lamb (John 1:29, 13:1, 19:36), something also found in </span><a class="mw-redirect" data-dcnode-id="4572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1_Peter" title="1 Peter"><span data-dcnode-id="4573" instrument_node="">1 Peter</span></a><span data-dcnode-id="4571" instrument_node=""> (1 Pet 1:18-20), and </span><a class="mw-redirect" data-dcnode-id="4569" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1_Corinthians" title="1 Corinthians"><span data-dcnode-id="4570" instrument_node="">1 Corinthians</span></a><span data-dcnode-id="4568" instrument_node=""> (1 Cor 5:7-8). Michael Graves calls </span><a class="mw-redirect" data-dcnode-id="4566" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paul_%28apostle%29" title="Paul (apostle)"><span data-dcnode-id="4567" instrument_node="">Paul</span></a><span data-dcnode-id="4565" instrument_node="">'s discussion of the exodus in 1 Corinthians 5:7-8 and his comparison of the early church in Corinth to the Israelites in the desert "[t]he two most significant NT passages touching on the exodus."</span><sup class="reference" data-dcnode-id="4562" id="cite_ref-FOOTNOTEGraves2019548_120-1"><a data-dcnode-id="4563" href="#cite_note-FOOTNOTEGraves2019548-120"><span data-dcnode-id="4564" instrument_node="">[111]</span></a></sup><span data-dcnode-id="4561" instrument_node=""> John also refers to Jesus as manna (John 6:31-5), water flowing from a rock in the desert (John 7:37-9) and as a pillar of fire (John 8:12). Early Christians frequently interpreted actions taken in the Exodus, and sometimes the Exodus as a whole, </span><a data-dcnode-id="4559" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Typology_%28theology%29" title="Typology (theology)"><span data-dcnode-id="4560" instrument_node="">typologically</span></a><span data-dcnode-id="4558" instrument_node=""> to prefigure Jesus or actions of Jesus.</span><sup class="reference" data-dcnode-id="4555" id="cite_ref-FOOTNOTEGraves2019548–549_124-0"><a data-dcnode-id="4556" href="#cite_note-FOOTNOTEGraves2019548%E2%80%93549-124"><span data-dcnode-id="4557" instrument_node="">[115]</span></a></sup><span data-dcnode-id="4554" instrument_node="">
