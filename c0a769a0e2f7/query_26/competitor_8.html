 data-dcnode-id="943" instrument_node="">FAQ Vs</span></a><span data-dcnode-id="941" instrument_node=""> </span><a class="almclass" data-dcnode-id="939" href="#" rel="almcontact"><span data-dcnode-id="940" instrument_node="">Contact</span></a><span data-dcnode-id="938" instrument_node=""> </span><a data-dcnode-id="936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.the-ten-commandments.org/support.html" rel="nofollow"><span data-dcnode-id="937" instrument_node="">Support</span></a><span data-dcnode-id="935" instrument_node=""> </span><a data-dcnode-id="933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.the-ten-commandments.org/the-ten-commandments-links.html" rel="nofollow"><span data-dcnode-id="934" instrument_node="">Resources</span></a><span data-dcnode-id="932" instrument_node=""> </span></ul><span data-dcnode-id="930" instrument_node=""> </span></div></div><span data-dcnode-id="927" instrument_node="">
</span><div data-dcnode-id="417" id="content"><span data-dcnode-id="926" instrument_node="">
</span><h1 data-dcnode-id="924"><span data-dcnode-id="925" instrument_node="">The Ten Commandments in the Old Testament - Did they Exist Before Moses?</span></h1><span data-dcnode-id="923" instrument_node="">
</span><div class="block" data-dcnode-id="419"><span data-dcnode-id="922" instrument_node="">
</span><p data-dcnode-id="917"><span data-dcnode-id="921" instrument_node="">Many Christians assume that the Ten Commandments did not exist in the Old Testament before they were officially given in Exodus 20. But is this assumption Biblical? A close look at scripture reveals that breaking the Ten Commandments was sin well before the covenant at Mount Sinai. So when were the Ten Commandments first known in the Old Testament regardless of the absence of a written record such as </span><a data-dcnode-id="919" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.the-ten-commandments.org/the-ten-commandments.html"><span data-dcnode-id="920" instrument_node="">Exodus 20:2-17 and Deuteronomy 5:6-21</span></a><span data-dcnode-id="918" instrument_node="">?</span></p><span data-dcnode-id="916" instrument_node="">
</span><p data-dcnode-id="905"><span data-dcnode-id="915" instrument_node="">There are also some that wrongly assume that it was not God that gave the Ten Commandments but Moses. So let's quickly clear up this misunderstanding first. The first written record of the </span><a data-dcnode-id="913" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bibletencommandments.org/"><span data-dcnode-id="914" instrument_node="">Bible Ten Commandments</span></a><span data-dcnode-id="912" instrument_node=""> is found Exodus 20:2-17. Now note carefully that the following scripture is the very verse before the Ten Commandments. </span><span class="teal" data-dcnode-id="910"><span data-dcnode-id="911" instrument_node="">Exodus 20:1</span></span><span data-dcnode-id="909" instrument_node=""> “</span><em data-dcnode-id="907"><span data-dcnode-id="908" instrument_node="">And God spoke all these words, saying.</span></em><span data-dcnode-id="906" instrument_node="">” So who spoke and gave them? God or Moses? Clearly they were spoken by God and you will also note from the scriptures below that they were also personally written by the finger of God. So we find the Ten Commandments were both spoken and written first by God Himself.</span></p><span data-dcnode-id="904" instrument_node="">
</span><p data-dcnode-id="894"><span class="teal" data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">Exodus 31:18</span></span><span data-dcnode-id="901" instrument_node=""> “</span><em data-dcnode-id="896"><span data-dcnode-id="900" instrument_node="">And he gave unto Moses, when he had made an end of communing with him upon mount Sinai, two tables of testimony, tables of stone, </span><span class="blue" data-dcnode-id="898"><span data-dcnode-id="899" instrument_node="">written with the finger of God</span></span><span data-dcnode-id="897" instrument_node="">.</span></em><span data-dcnode-id="895" instrument_node="">”</span></p><span data-dcnode-id="893" instrument_node="">
</span><p data-dcnode-id="877"><span class="teal" data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">Exodus 32:15-16</span></span><span data-dcnode-id="890" instrument_node=""> “</span><em data-dcnode-id="879"><span data-dcnode-id="889" instrument_node="">And Moses turned, and went down from the mount, and the two tables of the testimony were in his hand: the tables were written on both their sides; on the one side and on the other were they written. </span><span class="teal" data-dcnode-id="887"><span data-dcnode-id="888" instrument_node="">16</span></span><span data-dcnode-id="886" instrument_node=""> And </span><span class="blue" data-dcnode-id="884"><span data-dcnode-id="885" instrument_node="">the tables were the work of God</span></span><span data-dcnode-id="883" instrument_node="">, and </span><span class="blue" data-dcnode-id="881"><span data-dcnode-id="882" instrument_node="">the writing was the writing of God</span></span><span data-dcnode-id="880" instrument_node="">, graven upon the tables.</span></em><span data-dcnode-id="878" instrument_node="">”</span></p><span data-dcnode-id="876" instrument_node="">
</span><p data-dcnode-id="860"><span class="teal" data-dcnode-id="874"><span data-dcnode-id="875" instrument_node="">Deuteronomy 4:12-13</span></span><span data-dcnode-id="873" instrument_node=""> “</span><em data-dcnode-id="862"><span data-dcnode-id="872" instrument_node="">And </span><span class="blue" data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">the LORD spoke unto you out of the midst of the fire</span></span><span data-dcnode-id="869" instrument_node="">: you heard the voice of the words, but saw no similitude; only you heard a voice. </span><span class="teal" data-dcnode-id="867"><span data-dcnode-id="868" instrument_node="">13</span></span><span data-dcnode-id="866" instrument_node=""> And he declared unto you his covenant, which he commanded you to perform, even Ten Commandments; and </span><span class="blue" data-dcnode-id="864"><span data-dcnode-id="865" instrument_node="">he wrote them upon two tables of stone</span></span><span data-dcnode-id="863" instrument_node="">.</span></em><span data-dcnode-id="861" instrument_node="">”</span></p><span data-dcnode-id="859" instrument_node="">
</span><p data-dcnode-id="849"><span class="teal" data-dcnode-id="857"><span data-dcnode-id="858" instrument_node="">Deuteronomy 9:10</span></span><span data-dcnode-id="856" instrument_node=""> “</span><em data-dcnode-id="851"><span data-dcnode-id="855" instrument_node="">And </span><span class="blue" data-dcnode-id="853"><span data-dcnode-id="854" instrument_node="">the LORD delivered unto me two tables of stone written with the finger of God</span></span><span data-dcnode-id="852" instrument_node="">; and on them was written according to all the words, which the LORD spoke with you in the mount out of the midst of the fire in the day of the assembly.</span></em><span data-dcnode-id="850" instrument_node="">”</span></p><span data-dcnode-id="848" instrument_node="">
</span><p data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">It was sometime around 1400 to 1500 B.C. when God spoke directly to the Israelites from Mount Sinai located in a desert region south and west of modern day Israel. Here God spoke the Ten Commandments from the mountain top directly to the people as they trembled below in fear. They were so frightened by the sound of His voice that they pleaded with Moses for God not to speak to them. When God spoke these Ten Commandments, did He reveal something entirely new to the Israelites and to the gentile nations of the world through them? Or did they already know the Ten Commandments even though God had not yet “codified” or officially written them down?</span></p><span data-dcnode-id="845" instrument_node="">
</span><p data-dcnode-id="834"><span data-dcnode-id="844" instrument_node="">There was a law written by Moses (Mosaic Law) and this law (given to him by God) is </span><em data-dcnode-id="842"><span data-dcnode-id="843" instrument_node="">never</span></em><span data-dcnode-id="841" instrument_node=""> associated with the eternal moral code, the Ten Commandments, which has in fact operated from the very beginning of human history. Even though the Ten Commandments were not written down until Mount Sinai, they were understood and honoured by the earliest patriarchs. Even Cain knew that it was a sin to kill because we find in </span><span class="teal" data-dcnode-id="839"><span data-dcnode-id="840" instrument_node="">Genesis 4:7</span></span><span data-dcnode-id="838" instrument_node=""> that God told him “</span><em data-dcnode-id="836"><span data-dcnode-id="837" instrument_node="">sin lieth at the door</span></em><span data-dcnode-id="835" instrument_node="">” when he murdered his brother Abel.</span></p><span data-dcnode-id="833" instrument_node="">
</span><p data-dcnode-id="813"><span data-dcnode-id="832" instrument_node="">It is not possible for sin to exist where there is no law. God's Word teaches “</span><em data-dcnode-id="830"><span data-dcnode-id="831" instrument_node="">where no law is, there is no transgression.</span></em><span data-dcnode-id="829" instrument_node="">” </span><span class="teal" data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">Romans 4:15</span></span><span data-dcnode-id="826" instrument_node="">. And again we are told in </span><span class="teal" data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">1 John 3:4</span></span><span data-dcnode-id="823" instrument_node="">, “</span><em data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">Whosoever committeth sin transgresseth also the law: for sin is the transgression of the law.</span></em><span data-dcnode-id="820" instrument_node="">” We see this principle further amplified by Paul in </span><span class="teal" data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">Romans 7:7</span></span><span data-dcnode-id="817" instrument_node=""> when he says, “</span><em data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">I had not known sin, but by the law: for I had not known lust, except the law had said, Thou shalt not covet.</span></em><span data-dcnode-id="814" instrument_node="">” These scriptures alone prove that no sin can be imputed where the Ten Commandment law is not in effect. This is absolute proof that the moral law was in effect at the very beginning of the Old Testament. And why wouldn't it be?</span></p><span data-dcnode-id="812" instrument_node="">
</span><p data-dcnode-id="789"><span data-dcnode-id="811" instrument_node="">The statement by God to Cain about sin lying at the door is in reference to his plan to kill Abel which is a violation of one of the Commandments. The Ten Commandments though not yet codified had to exist from the very beginning of the Old Testament or Cain could not be guilty of the sin of murder and lying. (Genesis 4:8-9) This breaks the </span><a data-dcnode-id="809" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.the-ten-commandments.org/sixth_commandment.html"><span data-dcnode-id="810" instrument_node="">sixth</span></a><span data-dcnode-id="808" instrument_node=""> and </span><a data-dcnode-id="806" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.the-ten-commandments.org/ninth_commandment.html"><span data-dcnode-id="807" instrument_node="">ninth Commandments</span></a><span data-dcnode-id="805" instrument_node="">. Joseph also revealed that he was aware of this same Ten Commandment law. In </span><span class="teal" data-dcnode-id="803"><span data-dcnode-id="804" instrument_node="">Genesis 39:9</span></span><span data-dcnode-id="802" instrument_node="">, he said to Potiphar's wife, “</span><em data-dcnode-id="800"><span data-dcnode-id="801" instrument_node="">How then can I do this great wickedness, and SIN against God.</span></em><span data-dcnode-id="799" instrument_node="">” Joseph knew that adultery was a sin against God. This is breaking the </span><a data-dcnode-id="797" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.the-ten-commandments.org/seventh_commandment.html"><span data-dcnode-id="798" instrument_node="">seventh Commandment</span></a><span data-dcnode-id="796" instrument_node="">. And </span><span class="teal" data-dcnode-id="794"><span data-dcnode-id="795" instrument_node="">Genesis 13:13</span></span><span data-dcnode-id="793" instrument_node=""> says the “</span><em data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">the men of Sodom were exceedingly wicked and sinful against the Lord.</span></em><span data-dcnode-id="790" instrument_node="">” Since sin violates God's Ten Commandment law, the sinful and wicked people of Sodom could not have been punished if there was no law that condemned them for what they were doing. Therefore, God must have had already made known what is sinful.</span></p><span data-dcnode-id="788" instrument_node="">
</span><p data-dcnode-id="786"><span data-dcnode-id="787" instrument_node="">It could even be said that Adam and Eve effectively broke every single one of the Ten Commandments in Genesis chapter 3.</span></p><span data-dcnode-id="785" instrument_node="">
</span><ol data-dcnode-id="723"><span data-dcnode-id="784" instrument_node="">
</span><li data-dcnode-id="779"><span data-dcnode-id="783" instrument_node="">The </span><a data-dcnode-id="781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.the-ten-commandments.org/first_commandment.html"><span data-dcnode-id="782" instrument_node="">first Commandment</span></a><span data-dcnode-id="780" instrument_node=""> by choosing another god when they followed the council of Satan.</span></li><span data-dcnode-id="778" instrument_node="">
</span><li data-dcnode-id="773"><span data-dcnode-id="777" instrument_node="">The </span><a data-dcnode-id="775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.the-ten-commandments.org/second_commandment.html"><span data-dcnode-id="776" instrument_node="">second Commandment</span></a><span data-dcnode-id="774" instrument_node=""> by idolizing the forbidden fruit and making a god of his stomach.</span></li><span data-dcnode-id="772" instrument_node="">
</span><li data-dcnode-id="767"><span data-dcnode-id="771" instrument_node="">The </span><a data-dcnode-id="769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.the-ten-commandments.org/third_commandment.html"><span data-dcnode-id="770" instrument_node="">third Commandment</span></a><span data-dcnode-id="768" instrument_node=""> by not believing in God's warning and in that way taking His name in vain.</span></li><span data-dcnode-id="766" instrument_node="">
</span><li data-dcnode-id="761"><span data-dcnode-id="765" instrument_node="">The </span><a data-dcnode-id="763" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.the-ten-commandments.org/fourth_commandment.html"><span data-dcnode-id="764" instrument_node="">fourth Commandment</span></a><span data-dcnode-id="762" instrument_node=""> by breaking this sinless rest in which they were placed.</span></li><span data-dcnode-id="760" instrument_node="">
</span><li data-dcnode-id="755"><span data-dcnode-id="759" instrument_node="">The </span><a data-dcnode-id="757" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.the-ten-commandments.org/fifth_commandment.html"><span data-dcnode-id="758" instrument_node="">fifth Commandment</span></a><span data-dcnode-id="756" instrument_node=""> by dishonouring their Father in heaven.</span></li><span data-dcnode-id="754" instrument_node="">
</span><li data-dcnode-id="749"><span data-dcnode-id="753" instrument_node="">The </span><a data-dcnode-id="751" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.the-ten-commandments.org/sixth_commandment.html"><span data-dcnode-id="752" instrument_node="">sixth Commandment</span></a><span data-dcnode-id="750" instrument_node=""> by bringing death upon themselves.</span></li><span data-dcnode-id="748" instrument_node="">
</span><li data-dcnode-id="743"><span data-dcnode-id="747" instrument_node="">The </span><a data-dcnode-id="745" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.the-ten-commandments.org/seventh_commandment.html"><span data-dcnode-id="746" instrument_node="">seventh Commandment</span></a><span data-dcnode-id="744" instrument_node=""> by committing spiritual adultery in preferring the creature above the Creator.</span></li><span data-dcnode-id="742" instrument_node="">
</span><li data-dcnode-id="737"><span data-dcnode-id="741" instrument_node="">The </span><a data-dcnode-id="739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.the-ten-commandments.org/eighth_commandment.html"><span data-dcnode-id="740" instrument_node="">eight Commandment</span></a><span data-dcnode-id="738" instrument_node=""> by taking of that which they had no right.</span></li><span data-dcnode-id="736" instrument_node="">
</span><li data-dcnode-id="731"><span data-dcnode-id="735" instrument_node="">The </span><a data-dcnode-id="733" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.the-ten-commandments.org/ninth_commandment.html"><span data-dcnode-id="734" instrument_node="">ninth Commandment</span></a><span data-dcnode-id="732" instrument_node=""> by accepting the serpent's false witness against God.</span></li><span data-dcnode-id="730" instrument_node="">
</span><li data-dcnode-id="725"><span data-dcnode-id="729" instrument_node="">The </span><a data-dcnode-id="727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.the-ten-commandments.org/tenth_commandment.html"><span data-dcnode-id="728" instrument_node="">tenth Commandment</span></a><span data-dcnode-id="726" instrument_node=""> by coveting that which God had not given them.</span></li><span data-dcnode-id="724" instrument_node="">
</span></ol><span data-dcnode-id="722" instrument_node="">
</span><p data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">Below are a few examples of breaking the Ten Commandments found in the first Old Testament book of Genesis.</span></p><span data-dcnode-id="719" instrument_node="">
</span><ul data-dcnode-id="682"><span data-dcnode-id="718" instrument_node="">
</span><li data-dcnode-id="714"><strong data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">Genesis 3:1-24</span></strong><span data-dcnode-id="715" instrument_node=""> Adam and Eve</span></li><span data-dcnode-id="713" instrument_node="">
</span><li data-dcnode-id="709"><strong data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">Genesis 4:1-16</span></strong><span data-dcnode-id="710" instrument_node=""> Cain</span></li><span data-dcnode-id="708" instrument_node="">
</span><li data-dcnode-id="704"><strong data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">Genesis 6:5-12</span></strong><span data-dcnode-id="705" instrument_node=""> Noah</span></li><span data-dcnode-id="703" instrument_node="">
</span><li data-dcnode-id="699"><strong data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">Genesis 18:20-23</span></strong><span data-dcnode-id="700" instrument_node=""> Sodom and Gomorrah</span></li><span data-dcnode-id="698" instrument_node="">
</span><li data-dcnode-id="694"><strong data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">Genesis 20:1-20</span></strong><span data-dcnode-id="695" instrument_node=""> Abimelech and Abraham</span></li><span data-dcnode-id="693" instrument_node="">
</span><li data-dcnode-id="689"><strong data-dcnode-id="691"><span data-dcnode-id="692" instrument_node="">Genesis 26:5-10</span></strong><span data-dcnode-id="690" instrument_node=""> Abimelech and Isaac</span></li><span data-dcnode-id="688" instrument_node="">
</span><li data-dcnode-id="684"><strong data-dcnode-id="686"><span data-dcnode-id="687" instrument_node="">Genesis 39:7-9</span></strong><span data-dcnode-id="685" instrument_node=""> Joseph and Potiphar's wife</span></li><span data-dcnode-id="683" instrument_node="">
</span></ul><span data-dcnode-id="681" instrument_node="">
</span><p data-dcnode-id="670"><span data-dcnode-id="680" instrument_node="">Is there any more solid evidence that these people actually knew God's Commandments and laws? We find that Abraham was applauded by God in </span><span class="teal" data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">Genesis 26:5</span></span><span data-dcnode-id="677" instrument_node=""> with these words: “</span><em data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">Because that Abraham obeyed my voice, and kept my charge, my commandments, my statutes, and my laws.</span></em><span data-dcnode-id="674" instrument_node="">” What Commandments and laws if the Ten Commandments had not been given in the Old Testament before Exodus 20? It is obvious that the law which Abraham faithfully kept was </span><em data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">not</span></em><span data-dcnode-id="671" instrument_node=""> the Mosaic Law, because this law was not given until 430 years later. And we have already established that the Ten Commandments existed before Abraham by the condemning of Cain by God for the sin of murder.</span></p><span data-dcnode-id="669" instrument_node="">
</span><p data-dcnode-id="661"><span data-dcnode-id="668" instrument_node="">There is no doubt that another law was added 430 years later, and that it was in addition to the one Abraham obeyed so diligently. “</span><em data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">And this I say, that the covenant, that was confirmed before of God in Christ, the law, which was four hundred and thirty years after, cannot disannul, that it should make the promise of none effect.</span></em><span data-dcnode-id="665" instrument_node="">” </span><span class="teal" data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">Galatians 3:17</span></span><span data-dcnode-id="662" instrument_node="">.</span></p><span data-dcnode-id="660" instrument_node="">
</span><p data-dcnode-id="652"><span data-dcnode-id="659" instrument_node="">It can be seen from the context of this verse that Paul is referring to the ceremonial law rather than the moral law of the Ten Commandments. In </span><a data-dcnode-id="657" href="#1" onmouseout="hidevtip()" onmouseover="vtip(Galatians310,307)"><span data-dcnode-id="658" instrument_node="">Galatians 3:10</span></a><span data-dcnode-id="656" instrument_node="">, Paul refers to the curses “</span><em data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">which are written in the book of the law.</span></em><span data-dcnode-id="653" instrument_node="">”</span></p><span data-dcnode-id="651" instrument_node="">
</span><p data-dcnode-id="643"><span data-dcnode-id="650" instrument_node="">We also find further confirmation that this later law was indeed the Law of Moses in </span><span class="teal" data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">Galatians 3:19</span></span><span data-dcnode-id="647" instrument_node="">, “</span><em data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">Wherefore then serveth the law? It was added because of transgressions till the seed should come to whom the promise was made...</span></em><span data-dcnode-id="644" instrument_node="">” So here are two very significant facts concerning the law which was added. Note we are told why it was added and also how long this law would remain in effect. These two very significant pieces of information will now be carefully considered since they contain compelling evidence.</span></p><span data-dcnode-id="642" instrument_node="">
</span><p data-dcnode-id="619"><span data-dcnode-id="641" instrument_node="">1) </span><strong data-dcnode-id="639"><span data-dcnode-id="640" instrument_node="">Why was it given?</span></strong><span data-dcnode-id="638" instrument_node=""> Galatians 3:19 states that it was “</span><em data-dcnode-id="636"><span data-dcnode-id="637" instrument_node="">added because of transgressions.</span></em><span data-dcnode-id="635" instrument_node="">” Since we have already established that “</span><em data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">where no law is, there is no transgression.</span></em><span data-dcnode-id="632" instrument_node="">” </span><span class="teal" data-dcnode-id="630"><span data-dcnode-id="631" instrument_node="">Romans 4:15</span></span><span data-dcnode-id="629" instrument_node="">. One cannot be guilty of transgressing a law which does not exist. So in this case one law obviously had to exist and this law had been “</span><em data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">transgressed,</span></em><span data-dcnode-id="626" instrument_node="">” which made it necessary to add another law 430 years after the covenant God made with Abraham. And since </span><span class="teal" data-dcnode-id="624"><span data-dcnode-id="625" instrument_node="">Genesis 26:5</span></span><span data-dcnode-id="623" instrument_node=""> states that “</span><em data-dcnode-id="621"><span data-dcnode-id="622" instrument_node="">Abraham obeyed ... my laws</span></em><span data-dcnode-id="620" instrument_node="">”, we have to believe that that earlier law, which Abraham observed was the Ten Commandments. Moses had not even been born yet, so it could never have been his law!</span></p><span data-dcnode-id="618" instrument_node="">
</span><p data-dcnode-id="568"><span data-dcnode-id="617" instrument_node="">So what must be concluded from this evidence? The Ten Commandments had been transgressed making it necessary to add the </span><a data-dcnode-id="615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ceremoniallaw.com/"><span data-dcnode-id="616" instrument_node="">ceremonial law</span></a><span data-dcnode-id="614" instrument_node="">. This makes perfect sense when you think about. If a law forbidding murder is broken, then another law would have to be enacted to prescribe the punishment or penalty for breaking that first law. In </span><a data-dcnode-id="612" href="#1" onmouseout="hidevtip()" onmouseover="vtip(Galatians310,307)"><span data-dcnode-id="613" instrument_node="">Galatians 3:10</span></a><span data-dcnode-id="611" instrument_node="">, Paul refers to the curses “</span><em data-dcnode-id="609"><span data-dcnode-id="610" instrument_node="">which are written in the book of the law.</span></em><span data-dcnode-id="608" instrument_node="">” This law written in a book was the Mosaic Law. The Ten Commandments were written in stone. You will note from the following scriptures that the “book of the law” is the “Mosaic Law” and not the Ten Commandments and was stored on the OUTSIDE of the Ark of the Covenant.</span><br data-dcnode-id="607"><span data-dcnode-id="606" instrument_node="">
</span><br data-dcnode-id="605"><span data-dcnode-id="604" instrument_node="">
</span><span class="teal" data-dcnode-id="602"><span data-dcnode-id="603" instrument_node="">Joshua 23:6</span></span><span data-dcnode-id="601" instrument_node=""> “</span><em data-dcnode-id="596"><span data-dcnode-id="600" instrument_node="">Therefore be very courageous to keep and to do all that is </span><span class="green" data-dcnode-id="598"><span data-dcnode-id="599" instrument_node="">written in the Book of the Law of Moses</span></span><span data-dcnode-id="597" instrument_node="">, lest you turn aside from it to the right hand or to the left.</span></em><span data-dcnode-id="595" instrument_node="">”</span><br data-dcnode-id="594"><span data-dcnode-id="593" instrument_node="">
</span><span class="teal" data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">Deuteronomy 31:24-26</span></span><span data-dcnode-id="590" instrument_node=""> “</span><em data-dcnode-id="570"><span data-dcnode-id="589" instrument_node="">And it came to pass, when </span><span class="green" data-dcnode-id="587"><span data-dcnode-id="588" instrument_node="">Moses</span></span><span data-dcnode-id="586" instrument_node=""> had made an end of writing the words of this </span><span class="green" data-dcnode-id="584"><span data-dcnode-id="585" instrument_node="">law in a book</span></span><span data-dcnode-id="583" instrument_node="">, until they were finished, </span><span class="teal" data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">25</span></span><span data-dcnode-id="580" instrument_node=""> That Moses commanded the Levites, which bare the ark of the covenant of the LORD, saying, </span><span class="teal" data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">26</span></span><span data-dcnode-id="577" instrument_node=""> Take this </span><span class="green" data-dcnode-id="575"><span data-dcnode-id="576" instrument_node="">book of the law</span></span><span data-dcnode-id="574" instrument_node="">, and put it in the </span><span class="green" data-dcnode-id="572"><span data-dcnode-id="573" instrument_node="">side of the ark</span></span><span data-dcnode-id="571" instrument_node=""> of the covenant of the LORD your God, that it may be there for a witness against you.</span></em><span data-dcnode-id="569" instrument_node="">”</span></p><span data-dcnode-id="567" instrument_node="">
</span><p data-dcnode-id="541"><span data-dcnode-id="566" instrument_node="">The Ten Commandments on the other hand were written on two tables of stone and were stored on the INSIDE of the Ark of the Covenant under the mercy seat.</span><br data-dcnode-id="565"><span data-dcnode-id="564" instrument_node="">
</span><br data-dcnode-id="563"><span data-dcnode-id="562" instrument_node="">
</span><span class="teal" data-dcnode-id="560"><span data-dcnode-id="561" instrument_node="">Deuteronomy 4:13</span></span><span data-dcnode-id="559" instrument_node=""> “</span><em data-dcnode-id="554"><span data-dcnode-id="558" instrument_node="">And he declared unto you his covenant, which he commanded you to perform, even ten commandments; and he wrote them upon </span><span class="red" data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">two tables of stone</span></span><span data-dcnode-id="555" instrument_node="">.</span></em><span data-dcnode-id="553" instrument_node="">”</span><br data-dcnode-id="552"><span data-dcnode-id="551" instrument_node="">
</span><span class="teal" data-dcnode-id="549"><span data-dcnode-id="550" instrument_node="">Deuteronomy 10:5</span></span><span data-dcnode-id="548" instrument_node=""> “</span><em data-dcnode-id="543"><span data-dcnode-id="547" instrument_node="">And I turned myself and came down from the mount, and put the tables </span><span class="red" data-dcnode-id="545"><span data-dcnode-id="546" instrument_node="">in the ark</span></span><span data-dcnode-id="544" instrument_node=""> which I had made; and there they be, as the LORD commanded me.</span></em><span data-dcnode-id="542" instrument_node="">”</span></p><span data-dcnode-id="540" instrument_node="">
</span><p data-dcnode-id="523"><span data-dcnode-id="539" instrument_node="">2) </span><strong data-dcnode-id="537"><span data-dcnode-id="538" instrument_node="">How long did this “added” law remain in effect?</span></strong><span data-dcnode-id="536" instrument_node=""> Galatians 3:19 says, “</span><em data-dcnode-id="534"><span data-dcnode-id="535" instrument_node="">Till the seed should come.</span></em><span data-dcnode-id="533" instrument_node="">” There cannot be any controversy over the identity of that seed. It is Jesus Christ. Do we have any evidence that the law which was blotted out and nailed to the cross was in fact the Law of Moses? This law was designated as the “</span><em data-dcnode-id="531"><span data-dcnode-id="532" instrument_node="">handwriting of ordinances.</span></em><span data-dcnode-id="530" instrument_node="">” </span><a data-dcnode-id="528" href="#1" onmouseout="hidevtip()" onmouseover="vtip(Colossians21416C,450)"><span data-dcnode-id="529" instrument_node="">Colossians 2:14</span></a><span data-dcnode-id="527" instrument_node="">. Nowhere in the entire Bible are the Ten Commandments identified as ordinances. This term is applied to local legal codes which are very narrow and limited, such as “</span><em data-dcnode-id="525"><span data-dcnode-id="526" instrument_node="">town ordinances</span></em><span data-dcnode-id="524" instrument_node="">” which extend to the city limits. In comparison, the Ten Commandments are more like the constitution of the United States.</span></p><span data-dcnode-id="522" instrument_node="">
</span><p data-dcnode-id="511"><span data-dcnode-id="521" instrument_node="">The Greek word for “ordinances” in </span><a data-dcnode-id="519" href="#1" onmouseout="hidevtip()" onmouseover="vtip(Colossians214,265)"><span data-dcnode-id="520" instrument_node="">Colossians 2:14</span></a><span data-dcnode-id="518" instrument_node=""> is “dogma.” The Thayer dictionary states this is the “Law of Moses.” </span><strong data-dcnode-id="516"><span data-dcnode-id="517" instrument_node="">Thayer Definition:</span></strong><span data-dcnode-id="515" instrument_node=""> “</span><em data-dcnode-id="513"><span data-dcnode-id="514" instrument_node="">The rules and requirements of the Law of Moses; carrying a suggestion of severity and of threatened judgment.</span></em><span data-dcnode-id="512" instrument_node="">”</span></p><span data-dcnode-id="510" instrument_node="">
</span><p data-dcnode-id="499"><span data-dcnode-id="509" instrument_node="">See the </span><a data-dcnode-id="507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.the-ten-commandments.org/the-ten-commandments-law.html"><span data-dcnode-id="508" instrument_node="">Ten Commandments and the ceremonial law</span></a><span data-dcnode-id="506" instrument_node=""> for more on </span><a data-dcnode-id="504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.colossians-2-16.com/"><span data-dcnode-id="505" instrument_node="">Colossians 2:14-16</span></a><span data-dcnode-id="503" instrument_node=""> and </span><a data-dcnode-id="501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.the-ten-commandments.org/galatians_ceremoniallaw.html"><span data-dcnode-id="502" instrument_node="">what is the law in Galatians</span></a><span data-dcnode-id="500" instrument_node=""> for more on this very misunderstood book.</span></p><span data-dcnode-id="498" instrument_node="">
</span><p data-dcnode-id="496"><span data-dcnode-id="497" instrument_node="">So we find that there can be no doubt whatsoever that Abraham kept the Ten Commandments of God. But some will erroneously say that this did not include the fourth Commandment the Sabbath. We should all know that the Sabbath was made at creation, but for some reason, many seem to struggle with this so let's clarify this fact further.</span></p><span data-dcnode-id="495" instrument_node="">
</span><p data-dcnode-id="478"><span data-dcnode-id="494" instrument_node="">God said the Sabbath “</span><em data-dcnode-id="492"><span data-dcnode-id="493" instrument_node="">is a sign between me and the children of Israel for ever…</span></em><span data-dcnode-id="491" instrument_node="">” Before we continue with this scripture, note the reason </span><em data-dcnode-id="489"><span data-dcnode-id="490" instrument_node="">why</span></em><span data-dcnode-id="488" instrument_node=""> and </span><em data-dcnode-id="486"><span data-dcnode-id="487" instrument_node="">when</span></em><span data-dcnode-id="485" instrument_node=""> God made the Sabbath day from the remainder of this verse. It was because, “</span><em data-dcnode-id="483"><span data-dcnode-id="484" instrument_node="">…in six days the LORD made heaven and earth, and on the seventh day he rested, and was refreshed.</span></em><span data-dcnode-id="482" instrument_node="">” </span><span class="teal" data-dcnode-id="480"><span data-dcnode-id="481" instrument_node="">Exodus 31:17</span></span><span data-dcnode-id="479" instrument_node="">. So the Sabbath has existed since creation and before sin and before a Jew walked on the face of the Earth!</span></p><span data-dcnode-id="477" instrument_node="">
</span><p data-dcnode-id="463"><span data-dcnode-id="476" instrument_node="">Someone always raises the stale argument that the Sabbath is only a sign of holiness for Israel, but let me remind them of this inspired text: “</span><em data-dcnode-id="474"><span data-dcnode-id="475" instrument_node="">if ye be Christ's, then are ye Abraham's seed, and heirs according to the promise.</span></em><span data-dcnode-id="473" instrument_node="">” </span><span class="teal" data-dcnode-id="471"><span data-dcnode-id="472" instrument_node="">Galatians 3:29</span></span><span data-dcnode-id="470" instrument_node="">. All born again Christians are the true Israel today and have been sanctified unto God. Therefore, the Sabbath is for anyone who is Christ's. Please read </span><a data-dcnode-id="468" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.daniels70weeks.com/"><span data-dcnode-id="469" instrument_node="">Daniel's 70 weeks explained</span></a><span data-dcnode-id="467" instrument_node=""> or </span><a data-dcnode-id="465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.daniel70weeks.com/"><span data-dcnode-id="466" instrument_node="">prophecy of weeks</span></a><span data-dcnode-id="464" instrument_node=""> for more on who is Israel today and why.</span></p><span data-dcnode-id="462" instrument_node="">
</span><p data-dcnode-id="457"><span data-dcnode-id="461" instrument_node="">Further to this evidence, how many know that the word translated “rested” in our English Bibles in </span><a data-dcnode-id="459" href="#1" onmouseout="hidevtip()" onmouseover="vtip(Genesis23,280)"><span data-dcnode-id="460" instrument_node="">Genesis 2:3</span></a><span data-dcnode-id="458" instrument_node=""> is actually “shabbath” in Hebrew and means Sabbath. The Seventh day had been hallowed and set aside as holy by God from the time of Adam and Eve (Genesis 2:1-3).</span></p><span data-dcnode-id="456" instrument_node="">
</span><p data-dcnode-id="436"><span data-dcnode-id="455" instrument_node="">Some will still insist that there is no evidence of the Sabbath being kept before the giving of the Ten Commandments in Exodus 20. Yet we find in </span><a data-dcnode-id="453" href="#1" onmouseout="hidevtip()" onmouseover="vtip(Exodus16430,430)"><span data-dcnode-id="454" instrument_node="">Exodus 16</span></a><span data-dcnode-id="452" instrument_node=""> that God tested Israel (these were not Jews) if they would keep His </span><a data-dcnode-id="450" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.sabbath-day.net/"><span data-dcnode-id="451" instrument_node="">Sabbath day</span></a><span data-dcnode-id="449" instrument_node="">. But even more specifically, God tested to see if they would keep </span><em data-dcnode-id="447"><span data-dcnode-id="448" instrument_node="">the</span></em><span data-dcnode-id="446" instrument_node=""> Seventh day and not just any day they thought was acceptable! Did they keep the Seventh day? No! They thought any day was fine just like many Christians today. So how did God respond? God accused them of breaking </span><em data-dcnode-id="444"><span data-dcnode-id="445" instrument_node="">all</span></em><span data-dcnode-id="443" instrument_node=""> His Commandments and laws. But what Commandments and laws? The Ten Commandments had not been codified by God yet! How could Israel have been breaking the Sabbath and every other Commandment if they had not been given? God clearly speaks of both His “</span><em data-dcnode-id="441"><span data-dcnode-id="442" instrument_node="">commandments and ... laws</span></em><span data-dcnode-id="440" instrument_node="">” as being in force well before He wrote the Ten Commandments at Mount Sinai as given four chapters later! Therefore, the Ten Commandments were only </span><em data-dcnode-id="438"><span data-dcnode-id="439" instrument_node="">codified</span></em><span data-dcnode-id="437" instrument_node="">, that is, written in stone as part of a formal covenant at Mount Sinai. Scripture shows that they existed and were in force well before then. The Old Testament evidence is overwhelming and indisputable. There may have been no specific written record of them been given before Exodus 20 but the evidence is that they definitely knew the Commandments and were keeping them.</span></p><span data-dcnode-id="435" instrument_node="">
</span><p data-dcnode-id="430"><span data-dcnode-id="434" instrument_node="">So did the Old Testament Ten Commandments exist since creation and before sin? That would have to be a resounding yes! We know the Sabbath was made at creation but was the Sabbath Commandment obeyed before the Ten Commandments were first given in Exodus 20? No one can debate that </span><a data-dcnode-id="432" href="#1" onmouseout="hidevtip()" onmouseover="vtip(Exodus16430,430)"><span data-dcnode-id="433" instrument_node="">Exodus 16</span></a><span data-dcnode-id="431" instrument_node=""> comes before Exodus 20!</span></p><span data-dcnode-id="429" instrument_node="">
</span><p data-dcnode-id="421"><span data-dcnode-id="428" instrument_node="">The Bible confirms that the Ten Commandments did not originate with Moses or in his time. Nor were they limited in any way to the Jews only. They were in effect and known long before Moses or a people known as the Jews existed. They are the foundation of God's laws that show us how to love God (defined by the first four Commandments) and how to love our fellow man (defined by the last six). See also </span><a data-dcnode-id="426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.the-ten-commandments.org/greatest_commandment.html"><span data-dcnode-id="427" instrument_node="">what is the greatest Commandment</span></a><span data-dcnode-id="425" instrument_node=""> and the </span><a data-dcnode-id="423" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.newtestamentsabbath.com/"><span data-dcnode-id="424" instrument_node="">Sabbath in the New Testament</span></a><span data-dcnode-id="422" instrument_node="">.</span></p><span data-dcnode-id="420" instrument_node="">
