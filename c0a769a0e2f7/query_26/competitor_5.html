</span><div data-dcnode-id="993"><span data-dcnode-id="994"><span data-dcnode-id="995"><span data-dcnode-id="1002" instrument_node="">THE </span><b data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node="">2nd COMMANDMENT</span></b><span data-dcnode-id="999" instrument_node="">: You shall not take the name of the Lord, your God, in vain. Prescribes respect for the Lord and His name. Using the name of God the Father to curse, condemn, or berate others. Uttering </span><b data-dcnode-id="997"><span data-dcnode-id="998" instrument_node="">against</span></b><span data-dcnode-id="996" instrument_node=""> God words of reproach, hatred or defiance.</span></span></span></div><br data-dcnode-id="992"><p data-dcnode-id="985"><a class="lc" data-dcnode-id="990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//findanyanswer.com/goto/603669" rel="nofollow" target="_blank"><span data-dcnode-id="991" instrument_node="">Click to see full answer </span></a><span data-dcnode-id="989" instrument_node=""> </span><br data-dcnode-id="988"><br data-dcnode-id="987"><span data-dcnode-id="986" instrument_node=""> Beside this,  what are the violations of the Second Commandment?</span></p><p data-dcnode-id="978"><span data-dcnode-id="979"><span data-dcnode-id="980"><span data-dcnode-id="984" instrument_node="">Answer: “The sins forbidden in the </span><b data-dcnode-id="982"><span data-dcnode-id="983" instrument_node="">second commandment</span></b><span data-dcnode-id="981" instrument_node=""> are, all devising, counselling, commanding, using, and any wise approving, any religious worship not instituted by God himself; tolerating a false religion; the making any representation of God, of all or of any of the three persons, either inwardly in our mind, or</span></span></span></p><p data-dcnode-id="973"><span data-dcnode-id="977" instrument_node="">Likewise,  what are the sins against the 1st commandment?  </span><b data-dcnode-id="975"><span data-dcnode-id="976" instrument_node="">Terms in this set (6)</span></b><span data-dcnode-id="974" instrument_node=""> </span></p><ul data-dcnode-id="953"><span data-dcnode-id="972" instrument_node=""> </span><li data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">idolatry. worship of a false God.</span></li><span data-dcnode-id="969" instrument_node=""> </span><li data-dcnode-id="967"><span data-dcnode-id="968" instrument_node="">impiety. treating sacred articles disrespectfully.</span></li><span data-dcnode-id="966" instrument_node=""> </span><li data-dcnode-id="964"><span data-dcnode-id="965" instrument_node="">apostasy. completely abandoning and rejecting all faith.</span></li><span data-dcnode-id="963" instrument_node=""> </span><li data-dcnode-id="961"><span data-dcnode-id="962" instrument_node="">heresy. a partial rejection of one or more of the truths of the faith.</span></li><span data-dcnode-id="960" instrument_node=""> </span><li data-dcnode-id="958"><span data-dcnode-id="959" instrument_node="">superstition. giving an object power which it does not have.</span></li><span data-dcnode-id="957" instrument_node=""> </span><li data-dcnode-id="955"><span data-dcnode-id="956" instrument_node="">schism.</span></li><span data-dcnode-id="954" instrument_node=""> </span></ul><span data-dcnode-id="952" instrument_node=""> </span><p data-dcnode-id="951"></p><p data-dcnode-id="949"><span data-dcnode-id="950" instrument_node=""> Beside this,  what is the meaning of the 2nd commandment?</span></p><p data-dcnode-id="935"><span data-dcnode-id="948" instrument_node=""> </span><span data-dcnode-id="936"><span data-dcnode-id="937"><span data-dcnode-id="947" instrument_node="">From Wikipedia, the free encyclopedia. The </span><b data-dcnode-id="945"><span data-dcnode-id="946" instrument_node="">Second Commandment</span></b><span data-dcnode-id="944" instrument_node=""> refers to: The </span><b data-dcnode-id="942"><span data-dcnode-id="943" instrument_node="">second</span></b><span data-dcnode-id="941" instrument_node=""> of the Ten </span><b data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">Commandments</span></b><span data-dcnode-id="938" instrument_node="">, which is: "Thou shalt not make unto thee any graven image" under the Philonic division used by Hellenistic Jews, Greek Orthodox and Protestants except Lutherans. "Thou shalt have no other gods before me.</span></span></span></p><p data-dcnode-id="933"><span data-dcnode-id="934" instrument_node="">What is the second greatest commandment?</span></p><p data-dcnode-id="926"><span data-dcnode-id="927"><span data-dcnode-id="928"><span data-dcnode-id="932" instrument_node="">The Lord Our </span><b data-dcnode-id="930"><span data-dcnode-id="931" instrument_node="">God, The Lord</span></b><span data-dcnode-id="929" instrument_node=""> is One; Thou shalt love thy Lord, thy God with all thy heart, and with all thy soul, and with all thy mind", before also referring to a second commandment, "And the second is like unto it, thou shalt love thy neighbour as thyself."</span></span></span></p><span data-dcnode-id="925" instrument_node=""> </span></div><span data-dcnode-id="923" instrument_node="">
