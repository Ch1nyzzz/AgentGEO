</span><div class="article-content retro-folders" data-dcnode-id="1238" id="main-article"><span data-dcnode-id="2006" instrument_node="">
</span><p data-dcnode-id="1995"><span data-dcnode-id="2004" instrument_node="">
</span><span data-dcnode-id="2002" instrument_node="">
</span><span data-dcnode-id="2000" instrument_node="">
</span><span data-dcnode-id="1998" instrument_node="">
</span><span data-dcnode-id="1996" instrument_node="">
</span></p><p data-dcnode-id="1988"><span data-dcnode-id="1993" instrument_node="">
</span><span data-dcnode-id="1991" instrument_node="">
</span><span data-dcnode-id="1989" instrument_node="">
</span></p><div class="quoteright" data-dcnode-id="1984" style="width:350px;"><a class="twikilink" data-dcnode-id="1985" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/ComicBook/Batman" title="/pmwiki/pmwiki.php/ComicBook/Batman"><div class="lazy_load_img_box" data-dcnode-id="1986" style="padding-top:84.29%"><img alt="https://static.tvtropes.org/pmwiki/pub/images/no_killv1.jpg" border="0" class="embeddedimage" data-dcnode-id="1987" height="295" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/images/no_killv1.jpg&amp;raw" width="350"></div></a></div><span data-dcnode-id="1983" instrument_node="">
</span><p data-dcnode-id="1982"></p><div class="indent" data-dcnode-id="1966"><em data-dcnode-id="1978"><span data-dcnode-id="1981" instrument_node="">"And God spake all these words, saying... </span><br data-dcnode-id="1980"><span data-dcnode-id="1979" instrument_node=""> Thou shalt not kill."</span></em><span data-dcnode-id="1977" instrument_node="">
</span><div class="indent" data-dcnode-id="1967"><span data-dcnode-id="1976" instrument_node="">— </span><strong data-dcnode-id="1973"><a class="twikilink" data-dcnode-id="1974" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/BookOfExodus" title="/pmwiki/pmwiki.php/Literature/BookOfExodus"><span data-dcnode-id="1975" instrument_node="">Exodus 20:1,13</span></a></strong><span data-dcnode-id="1972" instrument_node="">, </span><em data-dcnode-id="1969"><a class="twikilink" data-dcnode-id="1970" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/TheBible" title="/pmwiki/pmwiki.php/Literature/TheBible"><span data-dcnode-id="1971" instrument_node="">The Bible</span></a></em><span data-dcnode-id="1968" instrument_node="">
</span></div></div><div class="proper-ad-unit mobile-ad square_ad" data-dcnode-id="1960"><span class="ad-caption" data-dcnode-id="1964"><span data-dcnode-id="1965" instrument_node="">Advertisement:</span></span><div data-dcnode-id="1961" id="proper-ad-tvtropes_mobile_ad_1"></div></div><p data-dcnode-id="1948"><span data-dcnode-id="1959" instrument_node="">Ending a life is a permanent thing.</span><span class="notelabel" data-dcnode-id="1956" onclick="togglenote('note0vob0');" style="cursor: pointer;"><sup data-dcnode-id="1957"><span data-dcnode-id="1958" instrument_node="">note&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="1953" id="note0vob0" isnote="true" onclick="togglenote('note0vob0');" style="display: none; cursor: pointer;"><a class="twikilink" data-dcnode-id="1954" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BackFromTheDead" title="/pmwiki/pmwiki.php/Main/BackFromTheDead"><span data-dcnode-id="1955" instrument_node="">Usually.</span></a></span><span data-dcnode-id="1952" instrument_node=""> There's no way to say "I'm sorry", or to make up for it later. And for some people, killing is a line they </span><em data-dcnode-id="1950"><span data-dcnode-id="1951" instrument_node="">will not cross</span></em><span data-dcnode-id="1949" instrument_node="">, no matter how much the death might serve the greater good (or, in some cases, the greater evil). "He needed killing" is not in these people's vocabulary.
</span></p><p data-dcnode-id="1940"><span data-dcnode-id="1947" instrument_node="">This is common in works with </span><a class="twikilink" data-dcnode-id="1945" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BlackAndWhiteMorality" title="/pmwiki/pmwiki.php/Main/BlackAndWhiteMorality"><span data-dcnode-id="1946" instrument_node="">Black-and-White Morality</span></a><span data-dcnode-id="1944" instrument_node="">, but even appears in works with </span><a class="twikilink" data-dcnode-id="1942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GreyAndGrayMorality" title="/pmwiki/pmwiki.php/Main/GreyAndGrayMorality"><span data-dcnode-id="1943" instrument_node="">Grey-and-Gray Morality</span></a><span data-dcnode-id="1941" instrument_node="">. In the latter, it's sometimes the only way to tell the "good" guys from the "bad" guys.
</span></p><p data-dcnode-id="1915"><a class="twikilink" data-dcnode-id="1938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WhatMeasureIsANonHuman" title="/pmwiki/pmwiki.php/Main/WhatMeasureIsANonHuman"><span data-dcnode-id="1939" instrument_node="">Opinions differ on how this applies to sentient life other than humans</span></a><span data-dcnode-id="1937" instrument_node="">, </span><a class="twikilink" data-dcnode-id="1935" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FateWorseThanDeath" title="/pmwiki/pmwiki.php/Main/FateWorseThanDeath"><span data-dcnode-id="1936" instrument_node="">or indeed whether it is always more heroic to spare lives</span></a><span data-dcnode-id="1934" instrument_node="">. In general, it's still up to villains to kill other villains when pulling off a </span><a class="twikilink" data-dcnode-id="1932" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/VillainousRescue" title="/pmwiki/pmwiki.php/Main/VillainousRescue"><span data-dcnode-id="1933" instrument_node="">Villainous Rescue</span></a><span data-dcnode-id="1931" instrument_node="">. It's perfectly fine to </span><a class="twikilink" data-dcnode-id="1929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ImmortalLifeIsCheap" title="/pmwiki/pmwiki.php/Main/ImmortalLifeIsCheap"><span data-dcnode-id="1930" instrument_node="">"kill" immortals though</span></a><span data-dcnode-id="1928" instrument_node=""> as it is to kill the undead. The </span><a class="twikilink" data-dcnode-id="1926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MercyKill" title="/pmwiki/pmwiki.php/Main/MercyKill"><span data-dcnode-id="1927" instrument_node="">Mercy Kill</span></a><span data-dcnode-id="1925" instrument_node=""> sometimes winds up as an exception. </span><a class="twikilink" data-dcnode-id="1923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/KarmicDeath" title="/pmwiki/pmwiki.php/Main/KarmicDeath"><span data-dcnode-id="1924" instrument_node="">Karmic Death</span></a><span data-dcnode-id="1922" instrument_node="">, </span><a class="twikilink" data-dcnode-id="1920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SelfDisposingVillain" title="/pmwiki/pmwiki.php/Main/SelfDisposingVillain"><span data-dcnode-id="1921" instrument_node="">Self-Disposing Villain</span></a><span data-dcnode-id="1919" instrument_node="">, and </span><a class="twikilink" data-dcnode-id="1917" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HoistByHisOwnPetard" title="/pmwiki/pmwiki.php/Main/HoistByHisOwnPetard"><span data-dcnode-id="1918" instrument_node="">Hoist by His Own Petard</span></a><span data-dcnode-id="1916" instrument_node=""> provide alternate ways to kill off villains without forcing the heroes to get their hands dirty.
</span></p><div class="proper-ad-unit mobile-ad square_ad" data-dcnode-id="1909"><span class="ad-caption" data-dcnode-id="1913"><span data-dcnode-id="1914" instrument_node="">Advertisement:</span></span><div data-dcnode-id="1910" id="proper-ad-tvtropes_mobile_ad_2"></div></div><p data-dcnode-id="1883"><span data-dcnode-id="1908" instrument_node="">Thou Shalt Not Kill is closely related to </span><a class="twikilink" data-dcnode-id="1906" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/JokerImmunity" title="/pmwiki/pmwiki.php/Main/JokerImmunity"><span data-dcnode-id="1907" instrument_node="">Joker Immunity</span></a><span data-dcnode-id="1905" instrument_node="">. Whilst many writers believe a never-kill creed makes the hero more likable and righteous, on another level it might simply be a plot device </span><a class="twikilink" data-dcnode-id="1903" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/StatusQuoIsGod" title="/pmwiki/pmwiki.php/Main/StatusQuoIsGod"><span data-dcnode-id="1904" instrument_node="">to prevent the hero from killing off popular recurring villains</span></a><span data-dcnode-id="1902" instrument_node="">: the rationale is that if a hero, say, </span><a class="twikilink" data-dcnode-id="1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/Superman" title="/pmwiki/pmwiki.php/Franchise/Superman"><span data-dcnode-id="1901" instrument_node="">Superman</span></a><span data-dcnode-id="1899" instrument_node=""> were to kill a bad guy in one story, why wouldn't he simply resolve all of his problems by, for example, incinerating </span><a class="twikilink" data-dcnode-id="1897" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/ComicBook/LexLuthor" title="/pmwiki/pmwiki.php/ComicBook/LexLuthor"><span data-dcnode-id="1898" instrument_node="">Lex Luthor</span></a><span data-dcnode-id="1896" instrument_node=""> with his heat vision on sight? Related is </span><a class="twikilink" data-dcnode-id="1894" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PacifismBackfire" title="/pmwiki/pmwiki.php/Main/PacifismBackfire"><span data-dcnode-id="1895" instrument_node="">Pacifism Backfire</span></a><span data-dcnode-id="1893" instrument_node="">, where their reluctance to fight (or to kill as in this trope) may cause </span><a class="twikilink" data-dcnode-id="1891" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/JokerImmunity" title="/pmwiki/pmwiki.php/Main/JokerImmunity"><span data-dcnode-id="1892" instrument_node="">Joker Immunity</span></a><span data-dcnode-id="1890" instrument_node="">. This trope is more common in serial fiction, such as TV shows and comic books, rather than one-shots like movies. In action movies </span><a class="twikilink" data-dcnode-id="1888" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SuperheroMovieVillainsDie" title="/pmwiki/pmwiki.php/Main/SuperheroMovieVillainsDie"><span data-dcnode-id="1889" instrument_node="">it is common and acceptable for the hero to kill the villain</span></a><span data-dcnode-id="1887" instrument_node=""> because there is usually no planned sequel for the villain to appear in. It's also somewhat common for both stand alone and serial storytelling to feature a character who begins adhering to this trope, but over the course of various dramatic devices, such as a </span><a class="twikilink" data-dcnode-id="1885" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TraumaCongaLine" title="/pmwiki/pmwiki.php/Main/TraumaCongaLine"><span data-dcnode-id="1886" instrument_node="">Trauma Conga Line</span></a><span data-dcnode-id="1884" instrument_node="">, is finally forced to — or chooses to — cross the line.
</span></p><div class="proper-ad-unit mobile-ad square_ad" data-dcnode-id="1877"><span class="ad-caption" data-dcnode-id="1881"><span data-dcnode-id="1882" instrument_node="">Advertisement:</span></span><div data-dcnode-id="1878" id="proper-ad-tvtropes_mobile_ad_3"></div></div><p data-dcnode-id="1853"><span data-dcnode-id="1876" instrument_node="">With superhero characters, attitudes toward no-kill policies range from utterly ignoring it (such as the </span><a class="twikilink" data-dcnode-id="1874" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MainCharacters" title="/pmwiki/pmwiki.php/Main/MainCharacters"><span data-dcnode-id="1875" instrument_node="">Main Characters</span></a><span data-dcnode-id="1873" instrument_node=""> of </span><em data-dcnode-id="1870"><a class="twikilink" data-dcnode-id="1871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/ComicBook/Watchmen" title="/pmwiki/pmwiki.php/ComicBook/Watchmen"><span data-dcnode-id="1872" instrument_node="">Watchmen</span></a></em><span data-dcnode-id="1869" instrument_node="">), to treating it as a </span><a class="twikilink" data-dcnode-id="1867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BewareTheNiceOnes" title="/pmwiki/pmwiki.php/Main/BewareTheNiceOnes"><span data-dcnode-id="1868" instrument_node="">preferred outcome</span></a><span data-dcnode-id="1866" instrument_node=""> (such as Superman), to strict adherence to it in all cases (such as </span><a class="twikilink" data-dcnode-id="1864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/Batman" title="/pmwiki/pmwiki.php/Franchise/Batman"><span data-dcnode-id="1865" instrument_node="">Batman</span></a><span data-dcnode-id="1863" instrument_node="">). Whatever the moral case is, this trope is often used to show off the hero's incredible precision, whether it be with a fist or a gun. This can include things like </span><a class="twikilink" data-dcnode-id="1861" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BlastingItOutOfTheirHands" title="/pmwiki/pmwiki.php/Main/BlastingItOutOfTheirHands"><span data-dcnode-id="1862" instrument_node="">separating the mook from their weapon with a precisely aimed bullet</span></a><span data-dcnode-id="1860" instrument_node="">, or possibly </span><a class="twikilink" data-dcnode-id="1858" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TapOnTheHead" title="/pmwiki/pmwiki.php/Main/TapOnTheHead"><span data-dcnode-id="1859" instrument_node="">knocking an opponent out</span></a><span data-dcnode-id="1857" instrument_node="">. Whatever the case, their non-lethal attacks are due to their incredible skill. Note that this often a case of </span><a class="twikilink" data-dcnode-id="1855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RealityIsUnrealistic" title="/pmwiki/pmwiki.php/Main/RealityIsUnrealistic"><span data-dcnode-id="1856" instrument_node="">Reality Is Unrealistic</span></a><span data-dcnode-id="1854" instrument_node=""> as many of these attacks are very capable of causing serious injury or death.
</span></p><p data-dcnode-id="1848"><span data-dcnode-id="1852" instrument_node="">If this trope is used poorly, it can risk leading to audiences seeing heroes holding onto this code as too naive or stubborn due to not accepting that there are villains too dangerous to be left alive and possibly lead to the story's </span><a class="twikilink" data-dcnode-id="1850" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/VillainKiller" title="/pmwiki/pmwiki.php/Main/VillainKiller"><span data-dcnode-id="1851" instrument_node="">Villain Killers</span></a><span data-dcnode-id="1849" instrument_node=""> looking more heroic than heroes who swear by non-lethal force.
</span></p><p data-dcnode-id="1833"><span data-dcnode-id="1847" instrument_node="">"Thou shalt not kill" is derived from the sixth of </span><a class="twikilink" data-dcnode-id="1845" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/TheBible" title="/pmwiki/pmwiki.php/Literature/TheBible"><span data-dcnode-id="1846" instrument_node="">The Bible</span></a><span data-dcnode-id="1844" instrument_node="">'s </span><a class="urllink" data-dcnode-id="1841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ten_Commandments"><span data-dcnode-id="1843" instrument_node="">Ten Commandments</span><img data-dcnode-id="1842" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="1840" instrument_node="">, and the religious implications of taking life in apparent violation of this commandment (which is often translated as "Thou shalt not murder," which results in debates over semantics)</span><span class="notelabel" data-dcnode-id="1837" onclick="togglenote('note1ta9q');" style="cursor: pointer;"><sup data-dcnode-id="1838"><span data-dcnode-id="1839" instrument_node="">note&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="1835" id="note1ta9q" isnote="true" onclick="togglenote('note1ta9q');" style="display: none; cursor: pointer;"><span data-dcnode-id="1836" instrument_node="">The original Hebrew word used is "ratsahk" which could arguably be better translated as "murder" given that it typically refers to unlawful killing, whereas the word "mut" refers purely to the act of killing without any regards to legality of said killing.</span></span><span data-dcnode-id="1834" instrument_node=""> are sometimes also invoked in storytelling.
</span></p><p data-dcnode-id="1826"><a class="twikilink" data-dcnode-id="1831" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SubTrope" title="/pmwiki/pmwiki.php/Main/SubTrope"><span data-dcnode-id="1832" instrument_node="">Sub-Trope</span></a><span data-dcnode-id="1830" instrument_node=""> to </span><a class="twikilink" data-dcnode-id="1828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NoHarmRequirement" title="/pmwiki/pmwiki.php/Main/NoHarmRequirement"><span data-dcnode-id="1829" instrument_node="">No-Harm Requirement</span></a><span data-dcnode-id="1827" instrument_node=""> where characters for one reason or another are restricted in how much harm they can deal to or allow another being to take, if any.
</span></p><p data-dcnode-id="1788"><span data-dcnode-id="1825" instrument_node="">See also </span><a class="twikilink" data-dcnode-id="1823" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ApeShallNeverKillApe" title="/pmwiki/pmwiki.php/Main/ApeShallNeverKillApe"><span data-dcnode-id="1824" instrument_node="">Ape Shall Never Kill Ape</span></a><span data-dcnode-id="1822" instrument_node="">, </span><a class="twikilink" data-dcnode-id="1820" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/KickThemWhileTheyAreDown" title="/pmwiki/pmwiki.php/Main/KickThemWhileTheyAreDown"><span data-dcnode-id="1821" instrument_node="">Kick Them While They Are Down</span></a><span data-dcnode-id="1819" instrument_node="">, </span><a class="twikilink" data-dcnode-id="1817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ActualPacifist" title="/pmwiki/pmwiki.php/Main/ActualPacifist"><span data-dcnode-id="1818" instrument_node="">Actual Pacifist</span></a><span data-dcnode-id="1816" instrument_node="">, </span><a class="twikilink" data-dcnode-id="1814" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RecklessPacifist" title="/pmwiki/pmwiki.php/Main/RecklessPacifist"><span data-dcnode-id="1815" instrument_node="">Reckless Pacifist</span></a><span data-dcnode-id="1813" instrument_node="">, </span><a class="twikilink" data-dcnode-id="1811" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TechnicalPacifist" title="/pmwiki/pmwiki.php/Main/TechnicalPacifist"><span data-dcnode-id="1812" instrument_node="">Technical Pacifist</span></a><span data-dcnode-id="1810" instrument_node="">, </span><a class="twikilink" data-dcnode-id="1808" href="https://chatnoir-webcontent.chatnoir.eu/?index= oesn't Like Guns</span></a><span data-dcnode-id="1792" instrument_node="">, because of the lethal connotations that firearms carry. For a similar trope in video games, see </span><a class="twikilink" data-dcnode-id="1790" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PacifistRun" title="/pmwiki/pmwiki.php/Main/PacifistRun"><span data-dcnode-id="1791" instrument_node="">Pacifist Run</span></a><span data-dcnode-id="1789" instrument_node="">.

</span><ul data-dcnode-id="1658"><li data-dcnode-id="1659"><span data-dcnode-id="1664" instrument_node=""> </span><em data-dcnode-id="1661"><a class="twikilink" data-dcnode-id="1662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Radio/TheLoneRanger" title="/pmwiki/pmwiki.php/Radio/TheLoneRanger"><span data-dcnode-id="1663" instrument_node="">The Lone Ranger</span></a></em><span data-dcnode-id="1660" instrument_node="">, in some ways a precursor to Vash, used silver bullets as a symbol of his pledge never to take human life.
</span></li></ul></div><span data-dcnode-id="1656" instrument_node="">
</span><p data-dcnode-id="1655"></p><div class="folderlabel" data-dcnode-id="1653" onclick="togglefolder('folder2');"><span data-dcnode-id="1654" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Stand-Up Comedy&nbsp;</span></div><div class="folder" data-dcnode-id="1642" id="folder2" isfolder="true" style="display:block;"><span data-dcnode-id="1652" instrument_node="">
</span><ul data-dcnode-id="1643"><li data-dcnode-id="1644"><span data-dcnode-id="1651" instrument_node=""> In </span><a class="twikilink" data-dcnode-id="1649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/GeorgeCarlin" title="/pmwiki/pmwiki.php/Creator/GeorgeCarlin"><span data-dcnode-id="1650" instrument_node="">George Carlin</span></a><span data-dcnode-id="1648" instrument_node="">'s routine on The Ten Commandments, he ends with this one and claims that because more people have been killed in the name of God than for any other reason, it really comes down to who's doing the killing and who's getting killed. He decides it should be renamed "Thou shalt try </span><em data-dcnode-id="1646"><span data-dcnode-id="1647" instrument_node="">really</span></em><span data-dcnode-id="1645" instrument_node=""> hard not to kill anyone, unless they pray to a different invisible man from the one you pray to."
</span></li></ul></div><span data-dcnode-id="1641" instrument_node="">
</span><p data-dcnode-id="1640"></p><div class="folderlabel" data-dcnode-id="1638" onclick="togglefolder('folder3');"><span data-dcnode-id="1639" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Tabletop Games&nbsp;</span></div><div class="folder" data-dcnode-id="1563" id="folder3" isfolder="true" style="display:block;"><span data-dcnode-id="1637" instrument_node="">
</span><ul data-dcnode-id="1564"><li data-dcnode-id="1625"><span data-dcnode-id="1636" instrument_node=""> "Code vs. Killing" is one of the most commonly seen Psychological Limitations in </span><em data-dcnode-id="1633"><a class="twikilink" data-dcnode-id="1634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/TabletopGame/Champions" title="/pmwiki/pmwiki.php/TabletopGame/Champions"><span data-dcnode-id="1635" instrument_node="">Champions</span></a></em><span data-dcnode-id="1632" instrument_node="">, usually bought as "total commitment" (i.e. the character can't bring him- or herself to kill at all and won't stand idly by while others do it either). Normal people are already assumed to be "reluctant to kill" by default (being </span><a class="twikilink" data-dcnode-id="1630" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AxCrazy" title="/pmwiki/pmwiki.php/Main/AxCrazy"><span data-dcnode-id="1631" instrument_node="">Ax-Crazy</span></a><span data-dcnode-id="1629" instrument_node=""> would be its own different Limitation); the code, if taken, is intended to go beyond well beyond that to proper comic book levels. Of course, being a Limitation that you get points for, it's also </span><em data-dcnode-id="1627"><span data-dcnode-id="1628" instrument_node="">supposed</span></em><span data-dcnode-id="1626" instrument_node=""> to cause your character trouble from time to time.
</span></li><li data-dcnode-id="1612"><span data-dcnode-id="1624" instrument_node=""> Some Superhero </span><a class="twikilink" data-dcnode-id="1622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RolePlayingGame" title="/pmwiki/pmwiki.php/Main/RolePlayingGame"><span data-dcnode-id="1623" instrument_node="">RPGs</span></a><span data-dcnode-id="1621" instrument_node=""> would invoke rules against killing. Two notable examples were </span><em data-dcnode-id="1618"><a class="twikilink" data-dcnode-id="1619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/TabletopGame/MarvelSuperHeroes" title="/pmwiki/pmwiki.php/TabletopGame/MarvelSuperHeroes"><span data-dcnode-id="1620" instrument_node="">Marvel Super Heroes</span></a></em><span data-dcnode-id="1617" instrument_node=""> and </span><em data-dcnode-id="1614"><a class="twikilink" data-dcnode-id="1615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/TabletopGame/DCHeroes" title="/pmwiki/pmwiki.php/TabletopGame/DCHeroes"><span data-dcnode-id="1616" instrument_node="">DC Heroes</span></a></em><span data-dcnode-id="1613" instrument_node="">, which would eliminate all Karma/Hero Points (a combination of experience points, and self-boosting reserves for various tasks) and keep you from accumulating more for the rest of the adventure (usually one night of gaming). In DC heroes, this punishment came from using lethal force at all.
</span></li><li data-dcnode-id="1600"><span data-dcnode-id="1611" instrument_node=""> </span><em data-dcnode-id="1608"><a class="twikilink" data-dcnode-id="1609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/TabletopGame/DungeonsAndDragons" title="/pmwiki/pmwiki.php/TabletopGame/DungeonsAndDragons"><span data-dcnode-id="1610" instrument_node="">Dungeons &amp; Dragons</span></a></em><span data-dcnode-id="1607" instrument_node=""> has the Book of Exalted Deeds, which contains the feat "Vow of Peace". It grants benefits as long as you don't inflict lethal damage, allow an ally to finish off a defeated opponent, or cause similar harm to a creature. It takes this trope to extremes; accidentally swallowing a gnat in your drinking water will cause you to lose the benefits of the feat, in fact the feat specifically references paladins drinking their water through a strainer. It doesn't really make you a pacifist, </span><a class="twikilink" data-dcnode-id="1605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TechnicalPacifist" title="/pmwiki/pmwiki.php/Main/TechnicalPacifist"><span data-dcnode-id="1606" instrument_node="">technical</span></a><span data-dcnode-id="1604" instrument_node=""> or </span><a class="twikilink" data-dcnode-id="1602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ActualPacifist" title="/pmwiki/pmwiki.php/Main/ActualPacifist"><span data-dcnode-id="1603" instrument_node="">actual</span></a><span data-dcnode-id="1601" instrument_node="">, though; you can still fight all you want, as long as you never inflict lethal damage.
</span></li><li data-dcnode-id="1588"><span data-dcnode-id="1599" instrument_node=""> </span><em data-dcnode-id="1596"><a class="twikilink" data-dcnode-id="1597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/TabletopGame/GURPS" title="/pmwiki/pmwiki.php/TabletopGame/GURPS"><span data-dcnode-id="1598" instrument_node="">GURPS</span></a></em><span data-dcnode-id="1595" instrument_node=""> has the Pacifist disadvantage, which comes in several flavors, one of which is Cannot Kill. Characters with the "Cannot Kill" disadvantage can start fights and use any tactics they like, but they cannot kill, or be responsible for a death, or leave a wounded enemy to die. They also cannot stand by while their teammates administer the </span><a class="twikilink" data-dcnode-id="1593" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CoupDeGrace" title="/pmwiki/pmwiki.php/Main/CoupDeGrace"><span data-dcnode-id="1594" instrument_node="">Coup de Grâce</span></a><span data-dcnode-id="1592" instrument_node="">. If they do, they </span><a class="twikilink" data-dcnode-id="1590" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Angst" title="/pmwiki/pmwiki.php/Main/Angst"><span data-dcnode-id="1591" instrument_node="">angst</span></a><span data-dcnode-id="1589" instrument_node=""> about it for days and are effectively rendered useless to the team.
</span></li><li data-dcnode-id="1583"><span data-dcnode-id="1587" instrument_node=""> In the </span><a class="twikilink" data-dcnode-id="1585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/TabletopGame/OldWorldOfDarkness" title="/pmwiki/pmwiki.php/TabletopGame/OldWorldOfDarkness"><span data-dcnode-id="1586" instrument_node="">Old World of Darkness</span></a><span data-dcnode-id="1584" instrument_node="">, Lifesaver is a 3 point flaw that makes you unwilling to take life. Pacifist is a 5 point flaw and is taken literally — the character can do no physical harm to others.
</span></li><li data-dcnode-id="1565"><span data-dcnode-id="1582" instrument_node=""> Defied in </span><em data-dcnode-id="1579"><a class="twikilink" data-dcnode-id="1580" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/TabletopGame/SentinelsOfTheMultiverse" title="/pmwiki/pmwiki.php/TabletopGame/SentinelsOfTheMultiverse"><span data-dcnode-id="1581" instrument_node="">Sentinels of the Multiverse</span></a></em><span data-dcnode-id="1578" instrument_node="">. In fact, the resident Batman </span><a class="twikilink" data-dcnode-id="1576" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Expy" title="/pmwiki/pmwiki.php/Main/Expy"><span data-dcnode-id="1577" instrument_node="">Expy</span></a><span data-dcnode-id="1575" instrument_node=""> has a </span><a class="twikilink" data-dcnode-id="1573" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FlavorText" title="/pmwiki/pmwiki.php/Main/FlavorText"><span data-dcnode-id="1574" instrument_node="">Flavor Text</span></a><span data-dcnode-id="1572" instrument_node=""> quote warning against the perils of mercy that originally comes from one of the Caped Crusader's villains. Taken in context, this appears to be a proportionate response thing, since most of the game's villains are potentially apocalyptic threats and there are examples in the wider lore of heroes </span><a class="twikilink" data-dcnode-id="1570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheFettered" title="/pmwiki/pmwiki.php/Main/TheFettered"><span data-dcnode-id="1571" instrument_node="">limiting themselves</span></a><span data-dcnode-id="1569" instrument_node=""> (the example given is that everyone's happy to have </span><a class="twikilink" data-dcnode-id="1567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AllCrimesAreEqual" title="/pmwiki/pmwiki.php/Main/AllCrimesAreEqual"><span data-dcnode-id="1568" instrument_node="">Fanatic</span></a><span data-dcnode-id="1566" instrument_node=""> on their side against villains, but nobody's in a hurry to let her deal with a bank robbery).
</span></li></ul></div><span data-dcnode-id="1562" instrument_node="">
</span><p data-dcnode-id="1561"></p><div class="folderlabel" data-dcnode-id="1559" onclick="togglefolder('folder4');"><span data-dcnode-id="1560" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Toys&nbsp;</span></div><div class="folder" data-dcnode-id="1484" id="folder4" isfolder="true" style="display:block;"><span data-dcnode-id="1558" instrument_node="">
</span><ul data-dcnode-id="1485"><li data-dcnode-id="1486"><span data-dcnode-id="1557" instrument_node=""> </span><em data-dcnode-id="1554"><a class="twikilink" data-dcnode-id="1555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Toys/BIONICLE" title="/pmwiki/pmwiki.php/Toys/BIONICLE"><span data-dcnode-id="1556" instrument_node="">BIONICLE</span></a></em><span data-dcnode-id="1553" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ZigZaggingTrope" title="/pmwiki/pmwiki.php/Main/ZigZaggingTrope"><span data-dcnode-id="1552" instrument_node="">plays with this a lot</span></a><span data-dcnode-id="1550" instrument_node="">, with this principle starting to be subverted as the series went on and </span><a class="twikilink" data-dcnode-id="1548" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DarkerAndEdgier" title="/pmwiki/pmwiki.php/Main/DarkerAndEdgier"><span data-dcnode-id="1549" instrument_node="">gradually became okay with explicitly mentioning death.</span></a><span data-dcnode-id="1547" instrument_node="">
</span><ul data-dcnode-id="1487"><li data-dcnode-id="1519"><span data-dcnode-id="1546" instrument_node=""> Most of the Toa — primarily the main characters of any given </span><a class="twikilink" data-dcnode-id="1544" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/StoryArc" title="/pmwiki/pmwiki.php/Main/StoryArc"><span data-dcnode-id="1545" instrument_node="">Story Arc</span></a><span data-dcnode-id="1543" instrument_node=""> — take this rule very seriously. </span><a class="twikilink" data-dcnode-id="1541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PragmaticHero" title="/pmwiki/pmwiki.php/Main/PragmaticHero"><span data-dcnode-id="1542" instrument_node="">A lot of this is rooted in pragmatism</span></a><span data-dcnode-id="1540" instrument_node="">, as they act as guardians to </span><a class="twikilink" data-dcnode-id="1538" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Hobbits" title="/pmwiki/pmwiki.php/Main/Hobbits"><span data-dcnode-id="1539" instrument_node="">the Matoran</span></a><span data-dcnode-id="1537" instrument_node="">, they adopt the rule to preserve their trust. There is a level of </span><a class="twikilink" data-dcnode-id="1535" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WhatMeasureIsANonHuman" title="/pmwiki/pmwiki.php/Main/WhatMeasureIsANonHuman"><span data-dcnode-id="1536" instrument_node="">What Measure Is a Non-Human?</span></a><span data-dcnode-id="1534" instrument_node=""> as they're willing to destroy the various robots, </span><a class="twikilink" data-dcnode-id="1532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AnimatedArmor" title="/pmwiki/pmwiki.php/Main/AnimatedArmor"><span data-dcnode-id="1533" instrument_node="">Animated Armor</span></a><span data-dcnode-id="1531" instrument_node="">, and mind-controlled wildlife the villains throw at them, but the Toa will generally only kill a </span><em data-dcnode-id="1529"><span data-dcnode-id="1530" instrument_node="">sentient</span></em><span data-dcnode-id="1528" instrument_node=""> opponent when given no other alternative, such as in wartime or when facing extreme threats.
</span><div class="indent" data-dcnode-id="1520"><span data-dcnode-id="1527" instrument_node=""> </span><strong data-dcnode-id="1525"><span data-dcnode-id="1526" instrument_node="">Vakama:</span></strong><span data-dcnode-id="1524" instrument_node=""> Toa aren't killers. If we were, we would have started with </span><a class="twikilink" data-dcnode-id="1522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BigBad" title="/pmwiki/pmwiki.php/Main/BigBad"><span data-dcnode-id="1523" instrument_node="">you</span></a><span data-dcnode-id="1521" instrument_node="">.
</span></div></li><li data-dcnode-id="1505"><span data-dcnode-id="1518" instrument_node=""> The minor character Zaria (</span><a class="twikilink" data-dcnode-id="1516" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SoleSurvivor" title="/pmwiki/pmwiki.php/Main/SoleSurvivor"><span data-dcnode-id="1517" instrument_node="">the sole remaining Toa of Iron</span></a><span data-dcnode-id="1515" instrument_node="">) demonstrates what happens when </span><a class="twikilink" data-dcnode-id="1513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheOathBreaker" title="/pmwiki/pmwiki.php/Main/TheOathBreaker"><span data-dcnode-id="1514" instrument_node="">the oath is broken</span></a><span data-dcnode-id="1512" instrument_node=""> — after being forced to kill a Makuta in self-defense, </span><a class="twikilink" data-dcnode-id="1510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MyGodWhatHaveIDone" title="/pmwiki/pmwiki.php/Main/MyGodWhatHaveIDone"><span data-dcnode-id="1511" instrument_node="">he disappeared for millenia out of guilt</span></a><span data-dcnode-id="1509" instrument_node="">, and </span><a class="twikilink" data-dcnode-id="1507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OnceDoneNeverForgotten" title="/pmwiki/pmwiki.php/Main/OnceDoneNeverForgotten"><span data-dcnode-id="1508" instrument_node="">rumors proliferated for years that he had a habit of murdering all his enemies</span></a><span data-dcnode-id="1506" instrument_node="">.
</span></li><li data-dcnode-id="1488"><span data-dcnode-id="1504" instrument_node=""> There are also several full-on exceptions: Toa Helryx — the very first Toa in existence — came before the Toa established this as a rule, and has opted to not comply with it, forming </span><a class="twikilink" data-dcnode-id="1502" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HeroSecretService" title="/pmwiki/pmwiki.php/Main/HeroSecretService"><span data-dcnode-id="1503" instrument_node="">the Order of Mata Nui</span></a><span data-dcnode-id="1501" instrument_node=""> to </span><a class="twikilink" data-dcnode-id="1499" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WellIntentionedExtremist" title="/pmwiki/pmwiki.php/Main/WellIntentionedExtremist"><span data-dcnode-id="1500" instrument_node="">serve in dirty work for the rest of the heroes in secret</span></a><span data-dcnode-id="1498" instrument_node="">. There's also Toa Tuyet (</span><a class="twikilink" data-dcnode-id="1496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FallenHero" title="/pmwiki/pmwiki.php/Main/FallenHero"><span data-dcnode-id="1497" instrument_node="">who was murderously corrupt</span></a><span data-dcnode-id="1495" instrument_node="">), and </span><a class="twikilink" data-dcnode-id="1493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GooGooGodlike" title="/pmwiki/pmwiki.php/Main/GooGooGodlike"><span data-dcnode-id="1494" instrument_node="">Toa Ignika</span></a><span data-dcnode-id="1492" instrument_node=""> nearly fell into this as well (being an </span><a class="twikilink" data-dcnode-id="1490" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EmergentHuman" title="/pmwiki/pmwiki.php/Main/EmergentHuman"><span data-dcnode-id="1491" instrument_node="">Emergent Toa</span></a><span data-dcnode-id="1489" instrument_node=""> acting entirely on emotional instinct).
</span></li></ul></li></ul></div><span data-dcnode-id="1483" instrument_node="">
</span><p data-dcnode-id="1482"></p><div class="folderlabel" data-dcnode-id="1480" onclick="togglefolder('folder5');"><span data-dcnode-id="1481" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Webcomics&nbsp;</span></div><div class="folder" data-dcnode-id="1373" id="folder5" isfolder="true" style="display:block;"><span data-dcnode-id="1479" instrument_node="">
</span><ul data-dcnode-id="1374"><li data-dcnode-id="1464"><span data-dcnode-id="1478" instrument_node=""> In </span><em data-dcnode-id="1475"><a class="twikilink" data-dcnode-id="1476" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WebComic/TheAdventuresOfDrMcNinja" title="/pmwiki/pmwiki.php/WebComic/TheAdventuresOfDrMcNinja"><span data-dcnode-id="1477" instrument_node="">The Adventures of Dr. McNinja</span></a></em><span data-dcnode-id="1474" instrument_node=""> </span><span class="spoiler" data-dcnode-id="1472" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1473" instrument_node=""> Mongo the superninja has learned the preciousness of life</span></span><span data-dcnode-id="1471" instrument_node="">. </span><a class="twikilink" data-dcnode-id="1469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/Frankenstein1931" title="/pmwiki/pmwiki.php/Film/Frankenstein1931"><span data-dcnode-id="1470" instrument_node="">And also</span></a><span data-dcnode-id="1468" instrument_node=""> that </span><a class="twikilink" data-dcnode-id="1466" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AltText" title="/pmwiki/pmwiki.php/Main/AltText"><span data-dcnode-id="1467" instrument_node="">fire bad</span></a><span data-dcnode-id="1465" instrument_node="">.
</span></li><li data-dcnode-id="1446"><span data-dcnode-id="1463" instrument_node=""> </span><em data-dcnode-id="1460"><a class="twikilink" data-dcnode-id="1461" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Webcomic/DemonFist" title="/pmwiki/pmwiki.php/Webcomic/DemonFist"><span data-dcnode-id="1462" instrument_node="">Demon Fist</span></a></em><span data-dcnode-id="1459" instrument_node="">:
</span><ul data-dcnode-id="1451"><li data-dcnode-id="1454"><span data-dcnode-id="1458" instrument_node=""> The Demon Fist almost never kills humans or peaceful demons, even (especially!) </span><a class="twikilink" data-dcnode-id="1456" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Mooks" title="/pmwiki/pmwiki.php/Main/Mooks"><span data-dcnode-id="1457" instrument_node="">Mooks</span></a><span data-dcnode-id="1455" instrument_node="">.
</span></li><li data-dcnode-id="1452"><span data-dcnode-id="1453" instrument_node=""> Neither does the Hookshot crew. This pays off for them later.
</span></li></ul><div class="indent" data-dcnode-id="1447"><strong data-dcnode-id="1449"><span data-dcnode-id="1450" instrument_node="">Duncan:</span></strong><span data-dcnode-id="1448" instrument_node=""> Your crew fought off all my men without killing any of them. Criminals would not have wasted the effort not to kill their attackers. I can't in good conscience take you all in simply for defending yourselves.
</span></div></li><li data-dcnode-id="1437"><span data-dcnode-id="1445" instrument_node=""> A key point of Gine's character in </span><em data-dcnode-id="1442"><a class="twikilink" data-dcnode-id="1443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Webcomic/DragonBallReboot" title="/pmwiki/pmwiki.php/Webcomic/DragonBallReboot"><span data-dcnode-id="1444" instrument_node="">Dragon Ball Reboot</span></a></em><span data-dcnode-id="1441" instrument_node=""> is her extreme unwillingness to take a life. In fact, the entire reason she left Bardock's squad and became a kitchen worker was because she couldn't find it in herself to kill anyone while on the battlefield. She even chooses to spare the life of a criminal who kidnapped and attempted to murder her son, despite being in full </span><a class="twikilink" data-dcnode-id="1439" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MamaBear" title="/pmwiki/pmwiki.php/Main/MamaBear"><span data-dcnode-id="1440" instrument_node="">Mama Bear</span></a><span data-dcnode-id="1438" instrument_node=""> mode and seeming just about ready to drop him off a cliff.
</span></li><li data-dcnode-id="1422"><span data-dcnode-id="1436" instrument_node=""> </span><em data-dcnode-id="1433"><a class="twikilink" data-dcnode-id="1434" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Webcomic/ErikaAndThePrincesInDistress" title="/pmwiki/pmwiki.php/Webcomic/ErikaAndThePrincesInDistress"><span data-dcnode-id="1435" instrument_node="">Erika and the Princes in Distress</span></a></em><span data-dcnode-id="1432" instrument_node=""> : Averted. After attacking </span><a class="twikilink" data-dcnode-id="1430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ArcVillain" title="/pmwiki/pmwiki.php/Main/ArcVillain"><span data-dcnode-id="1431" instrument_node="">Glucose</span></a><span data-dcnode-id="1429" instrument_node="">, Erika is actually surprised that he survived the hit. </span><span class="spoiler" data-dcnode-id="1424" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1428" instrument_node="">She later gets so furious at him that she starts strangling him with the clear intent of killing him, only stopping herself at the last second when realizing </span><a class="twikilink" data-dcnode-id="1426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MoralityPet" title="/pmwiki/pmwiki.php/Main/MoralityPet"><span data-dcnode-id="1427" instrument_node="">Pita</span></a><span data-dcnode-id="1425" instrument_node=""> wouldn't approve.</span></span><span data-dcnode-id="1423" instrument_node="">
</span></li><li data-dcnode-id="1408"><span data-dcnode-id="1421" instrument_node=""> </span><em data-dcnode-id="1418"><a class="twikilink" data-dcnode-id="1419" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Webcomic/GirlGenius" title="/pmwiki/pmwiki.php/Webcomic/GirlGenius"><span data-dcnode-id="1420" instrument_node="">Girl Genius</span></a></em><span data-dcnode-id="1417" instrument_node="">: The leader of the conspiracy in the science dome in England makes the mistaken assumption that as a hero Tarvek holding a gun to him and his compatriot is just for intimidation and he won't actually kill them. Tarvek </span><a class="urllink" data-dcnode-id="1414" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.girlgeniusonline.com/comic.php%3Fdate%3D20190107"><span data-dcnode-id="1416" instrument_node="">proves him wrong near instantaneously.</span><img data-dcnode-id="1415" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="1413" instrument_node="">
</span><div class="indent" data-dcnode-id="1409"><strong data-dcnode-id="1411"><span data-dcnode-id="1412" instrument_node="">Tarvek:</span></strong><span data-dcnode-id="1410" instrument_node=""> I've never really considered myself the "hero" type.
</span></div></li><li data-dcnode-id="1399"><span data-dcnode-id="1407" instrument_node=""> Decoy Octopus of </span><em data-dcnode-id="1404"><a class="twikilink" data-dcnode-id="1405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WebComic/TheLastDaysOfFoxhound" title="/pmwiki/pmwiki.php/WebComic/TheLastDaysOfFoxhound"><span data-dcnode-id="1406" instrument_node="">The Last Days of FOXHOUND</span></a></em><span data-dcnode-id="1403" instrument_node=""> passes The Sorrow's test because he has never killed anyone and thus has no one to face. The Sorrow is </span><em data-dcnode-id="1401"><span data-dcnode-id="1402" instrument_node="">very</span></em><span data-dcnode-id="1400" instrument_node=""> surprised and Octopus just shrugs, claiming he's more suited for espionage than fighting.
</span></li><li data-dcnode-id="1387"><span data-dcnode-id="1398" instrument_node=""> </span><em data-dcnode-id="1395"><a class="twikilink" data-dcnode-id="1396" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Webcomic/SchlockMercenary" title="/pmwiki/pmwiki.php/Webcomic/SchlockMercenary"><span data-dcnode-id="1397" instrument_node="">Schlock Mercenary</span></a></em><span data-dcnode-id="1394" instrument_node="">: Petey avoids killing if at all possible, and at one point refuses to let a spy go back home because she'll just get needlessly mind-ripped. After </span><span class="spoiler" data-dcnode-id="1392" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1393" instrument_node="">the oafans give everyone immortality</span></span><span data-dcnode-id="1391" instrument_node="">, he starts going to truly absurd lengths to avoid killing, like teraporting entire fleets that are in the middle of a massive fight. As he says, he can't be sure these people will still be his enemies in hundreds or thousands of years, so killing </span><em data-dcnode-id="1389"><span data-dcnode-id="1390" instrument_node="">anyone</span></em><span data-dcnode-id="1388" instrument_node=""> is like killing future allies.
</span></li><li data-dcnode-id="1375"><span data-dcnode-id="1386" instrument_node=""> In </span><em data-dcnode-id="1383"><a class="twikilink" data-dcnode-id="1384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Webcomic/SluggyFreelance" title="/pmwiki/pmwiki.php/Webcomic/SluggyFreelance"><span data-dcnode-id="1385" instrument_node="">Sluggy Freelance</span></a></em><span data-dcnode-id="1382" instrument_node="">, Torg made Oasis swear one of these vows. She sorta forgets it for a while and becomes an </span><a class="twikilink" data-dcnode-id="1380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AllCrimesAreEqual" title="/pmwiki/pmwiki.php/Main/AllCrimesAreEqual"><span data-dcnode-id="1381" instrument_node="">All Crimes Are Equal</span></a><span data-dcnode-id="1379" instrument_node=""> vigilante. When she remembers, she cries, "I've broken my promise! There can be no wedding! </span><em data-dcnode-id="1377"><span data-dcnode-id="1378" instrument_node="">Why does love bring me nothing but pain?</span></em><span data-dcnode-id="1376" instrument_node="">" Ironically, Torg himself doesn't really subscribe to this philosophy, as he was perfectly willing to go in guns blazing and swords swinging during "The Stormbreaker Saga" and "Dangerous Days" arcs.
</span></li></ul></div><span data-dcnode-id="1372" instrument_node="">
</span><p data-dcnode-id="1371"></p><div class="folderlabel" data-dcnode-id="1369" onclick="togglefolder('folder6');"><span data-dcnode-id="1370" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Web Original&nbsp;</span></div><div class="folder" data-dcnode-id="1243" id="folder6" isfolder="true" style="display:block;"><span data-dcnode-id="1368" instrument_node="">
</span><ul data-dcnode-id="1244"><li data-dcnode-id="1362"><span data-dcnode-id="1367" instrument_node=""> </span><em data-dcnode-id="1364"><a class="twikilink" data-dcnode-id="1365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/HeroesSaveTheWorld" title="/pmwiki/pmwiki.php/Literature/HeroesSaveTheWorld"><span data-dcnode-id="1366" instrument_node="">Heroes Save the World</span></a></em><span data-dcnode-id="1363" instrument_node="">: Austin Smith is trying to adhere to this as much as he can. It's disquieting for him when he learns that he has the greatest potential for mass destruction out of the Children located thus far.
</span></li><li data-dcnode-id="1350"><span data-dcnode-id="1361" instrument_node=""> Shortly after 9/11, </span><a class="twikilink" data-dcnode-id="1359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WebSite/TheOnion" title="/pmwiki/pmwiki.php/WebSite/TheOnion"><span data-dcnode-id="1360" instrument_node="">The Onion</span></a><span data-dcnode-id="1358" instrument_node=""> reported that </span><a class="twikilink" data-dcnode-id="1356" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/God" title="/pmwiki/pmwiki.php/Main/God"><span data-dcnode-id="1357" instrument_node="">God</span></a><span data-dcnode-id="1355" instrument_node=""> </span><a class="urllink" data-dcnode-id="1352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.theonion.com/articles/god-angrily-clarifies-dont-kill-rule%2C222/"><span data-dcnode-id="1354" instrument_node="">held a press conference</span><img data-dcnode-id="1353" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="1351" instrument_node=""> to remind everyone exactly what He meant by "Thou Shalt Not Kill."
</span></li><li data-dcnode-id="1335"><span data-dcnode-id="1349" instrument_node=""> The Red Panda and Flying Squirrel of </span><em data-dcnode-id="1346"><a class="twikilink" data-dcnode-id="1347" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Podcast/RedPandaAdventures" title="/pmwiki/pmwiki.php/Podcast/RedPandaAdventures"><span data-dcnode-id="1348" instrument_node="">Red Panda Adventures</span></a></em><span data-dcnode-id="1345" instrument_node=""> go out of their way to avoid using lethal force. Though the Red Panda owns a katana, for example, he won't take it into battle so as to not even have the option. They fight with fists, gadgets, and hypnosis. They aren't as firmly wedded to it as other superheroes with a "no killing" code, however. They can and will employ lethal force if the situation calls for it. Fighting non-living foes such as Professor Zombie's undead minions naturally falls into this, but the pair have also been willing to kill if the entire city, or even world is at stake, such as killing the Nazi Ubermensch, Tevas, to keep him away from the Normandy invasion. The one thing that will make either the Red Panda and Flying Squirrel outright </span><em data-dcnode-id="1343"><span data-dcnode-id="1344" instrument_node="">abandon</span></em><span data-dcnode-id="1342" instrument_node=""> this edict is if a villain seems to have killed one or the other. A developing </span><a class="twikilink" data-dcnode-id="1340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/VillainTeamUp" title="/pmwiki/pmwiki.php/Main/VillainTeamUp"><span data-dcnode-id="1341" instrument_node="">Villain Team-Up</span></a><span data-dcnode-id="1339" instrument_node=""> decides against killing the Squirrel to get to the Red Panda precisely because they know it </span><em data-dcnode-id="1337"><span data-dcnode-id="1338" instrument_node="">will</span></em><span data-dcnode-id="1336" instrument_node="">.
</span></li><li data-dcnode-id="1245"><span data-dcnode-id="1334" instrument_node=""> Averted with extreme prejudice in the </span><a class="twikilink" data-dcnode-id="1332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/WhateleyUniverse" title="/pmwiki/pmwiki.php/Literature/WhateleyUniverse"><span data-dcnode-id="1333" instrument_node="">Whateley Universe</span></a><span data-dcnode-id="1331" instrument_node="">. It's a sad commentary on a </span><a class="twikilink" data-dcnode-id="1329" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CapePunk" title="/pmwiki/pmwiki.php/Main/CapePunk"><span data-dcnode-id="1330" instrument_node="">superheroic</span></a><span data-dcnode-id="1328" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheVerse" title="/pmwiki/pmwiki.php/Main/TheVerse"><span data-dcnode-id="1327" instrument_node="">'verse</span></a><span data-dcnode-id="1325" instrument_node=""> when the person best known for having a code against killing is a super</span><em data-dcnode-id="1323"><span data-dcnode-id="1324" instrument_node="">villain</span></em><span data-dcnode-id="1322" instrument_node=""> (Mimeo, a very high-end </span><a class="twikilink" data-dcnode-id="1320" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PowerCopying" title="/pmwiki/pmwiki.php/Main/PowerCopying"><span data-dcnode-id="1321" instrument_node="">Power Mimic</span></a><span data-dcnode-id="1319" instrument_node="">, so it is not just out of good intentions - he wants to be able to keep getting the power-up from fighting superheroes so he can go after his real targets, meaning that killing his 'donors' would be counterproductive; also, he grew up around mobsters, and was disturbed by the psychological effects becoming a 'made man' had on people he knew).
</span><ul data-dcnode-id="1246"><li data-dcnode-id="1308"><span data-dcnode-id="1318" instrument_node=""> All but two of the members of Team Kimba (who are high school students) have been responsible for multiple deaths, and </span><a class="twikilink" data-dcnode-id="1316" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BewareTheNiceOnes" title="/pmwiki/pmwiki.php/Main/BewareTheNiceOnes"><span data-dcnode-id="1317" instrument_node="">Jade</span></a><span data-dcnode-id="1315" instrument_node=""> in particular has </span><a class="twikilink" data-dcnode-id="1313" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CuteAndPsycho" title="/pmwiki/pmwiki.php/Main/CuteAndPsycho"><span data-dcnode-id="1314" instrument_node="">a body count around 100</span></a><span data-dcnode-id="1312" instrument_node=""> - most of them over </span><em data-dcnode-id="1310"><span data-dcnode-id="1311" instrument_node="">Christmas vacation</span></em><span data-dcnode-id="1309" instrument_node=""> in their freshman year.
</span></li><li data-dcnode-id="1297"><span data-dcnode-id="1307" instrument_node=""> A number of characters — including Carmilla, Diamondback, Scald-Crow, Elle Ruud, and Glow — killed during their origin stories. Sandra, Grainne, and Elle were each acting in self-defense, as was Carmilla for the most part (the exception being a </span><a class="twikilink" data-dcnode-id="1305" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MercyKilling" title="/pmwiki/pmwiki.php/Main/MercyKilling"><span data-dcnode-id="1306" instrument_node="">Mercy Killing</span></a><span data-dcnode-id="1304" instrument_node=""> of </span><a class="twikilink" data-dcnode-id="1302" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TearJerker" title="/pmwiki/pmwiki.php/Main/TearJerker"><span data-dcnode-id="1303" instrument_node="">a fatally injured child she had promised to protect</span></a><span data-dcnode-id="1301" instrument_node="">), but Glow's instance was a bit more ambiguous </span><span class="spoiler" data-dcnode-id="1299" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1300" instrument_node=""> and, as it happens, Ironworks wasn't actually killed when the armored head was cut off — she was actually inside the chest of the armor, controlling it by ferrokinesis, and feigned 'his' death as a way of escaping the losing fight</span></span><span data-dcnode-id="1298" instrument_node="">.
</span></li><li data-dcnode-id="1269"><span data-dcnode-id="1296" instrument_node=""> Several of the students, including Carmilla, Tennyo, Bladedancer, Razorback, and Screech, were forced to kill some of the attacking Chessmen and Tiger Guards during the Halloween Invasion of 2006. The trauma of this (and the attack in general) would reverberate across the school for months.
</span><ul data-dcnode-id="1270"><li data-dcnode-id="1276"><span data-dcnode-id="1295" instrument_node=""> Jimmy T. was in part traumatized by how hard it was to </span><em data-dcnode-id="1293"><span data-dcnode-id="1294" instrument_node="">avoid</span></em><span data-dcnode-id="1292" instrument_node=""> killing; not only did he destroy one </span><a class="twikilink" data-dcnode-id="1290" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DropShip" title="/pmwiki/pmwiki.php/Main/DropShip"><span data-dcnode-id="1291" instrument_node="">Drop Ship</span></a><span data-dcnode-id="1289" instrument_node=""> outright while in his </span><a class="twikilink" data-dcnode-id="1287" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/Godzilla" title="/pmwiki/pmwiki.php/Franchise/Godzilla"><span data-dcnode-id="1288" instrument_node="">Godzilla</span></a><span data-dcnode-id="1286" instrument_node="">-</span><a class="twikilink" data-dcnode-id="1284" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AttackOfThe50FootWhatever" title="/pmwiki/pmwiki.php/Main/AttackOfThe50FootWhatever"><span data-dcnode-id="1285" instrument_node="">esque</span></a><span data-dcnode-id="1283" instrument_node=""> form (presumably killing those in it), he </span><em data-dcnode-id="1281"><span data-dcnode-id="1282" instrument_node="">ate</span></em><span data-dcnode-id="1280" instrument_node=""> a second one when he used his </span><a class="twikilink" data-dcnode-id="1278" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BlobMonster" title="/pmwiki/pmwiki.php/Main/BlobMonster"><span data-dcnode-id="1279" instrument_node="">Blob Monster</span></a><span data-dcnode-id="1277" instrument_node=""> form, and while he avoided digesting (!) the occupants (leaving them naked and in shock, but alive), he later mentioned that it took a lot of willpower not to.
</span></li><li data-dcnode-id="1271"><span data-dcnode-id="1275" instrument_node=""> Not everyone took it so hard, though. Some of the </span><a class="twikilink" data-dcnode-id="1273" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AxCrazy" title="/pmwiki/pmwiki.php/Main/AxCrazy"><span data-dcnode-id="1274" instrument_node="">Ultraviolents</span></a><span data-dcnode-id="1272" instrument_node=""> even captured a fleeing dropship in secret and forced the mercenaries who had been on it to fight in a hidden gladiatorial arena they'd made.
</span></li></ul></li><li data-dcnode-id="1249"><span data-dcnode-id="1268" instrument_node=""> It has been mentioned that in addition to several deadly encounters with </span><span class="spoiler" data-dcnode-id="1266" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1267" instrument_node="">Nazi spies during WWII</span></span><span data-dcnode-id="1265" instrument_node="">, a number of villains have died fighting </span><a class="twikilink" data-dcnode-id="1263" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BigGood" title="/pmwiki/pmwiki.php/Main/BigGood"><span data-dcnode-id="1264" instrument_node="">Lady Astarte</span></a><span data-dcnode-id="1262" instrument_node=""> due to accidents; like most superheroes, she doesn't choose to kill (</span><span class="spoiler" data-dcnode-id="1251" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1261" instrument_node="">and it is a major </span><a class="twikilink" data-dcnode-id="1259" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CharacterDevelopment" title="/pmwiki/pmwiki.php/Main/CharacterDevelopment"><span data-dcnode-id="1260" instrument_node="">Character Development</span></a><span data-dcnode-id="1258" instrument_node=""> moment that she would actually try to kill the </span><a class="twikilink" data-dcnode-id="1256" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AxCrazy" title="/pmwiki/pmwiki.php/Main/AxCrazy"><span data-dcnode-id="1257" instrument_node="">Ax-Crazy</span></a><span data-dcnode-id="1255" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1253" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BloodKnight" title="/pmwiki/pmwiki.php/Main/BloodKnight"><span data-dcnode-id="1254" instrument_node="">Blood Knight</span></a><span data-dcnode-id="1252" instrument_node=""> Deathlist during his attack on the school</span></span><span data-dcnode-id="1250" instrument_node="">), but supervillainy is a dangerous field at the best of times, and even in cases where she could do something, she sees herself as being under no obligation to save them from their own mistakes if it would put others at risk.
</span></li><li data-dcnode-id="1247"><span data-dcnode-id="1248" instrument_node=""> In addition, many supposed superheroes and costumed vigilantes show little compunction about killing. The Dark Avenger and the Lamplighter are two of the better known examples, but far from the only ones. This isn't even considering 'heroes' like Jack Rabbit or Iron Mike, who are basically thugs and thieves pretending to be heroes.
</span></li></ul></li></ul></div><span data-dcnode-id="1242" instrument_node="">
