</span><i class="fa fa-clock-o" data-dcnode-id="1800"></i><span data-dcnode-id="1799" instrument_node=""> Lesson Prep </span><sup data-dcnode-id="1796"><a class="pull-right LessonInstructions hidden-print" data-backdrop="static" data-dcnode-id="1797" data-toggle="modal" href="#LessonPrepInstructions" style="text-decoration:none; color: #cdcdcd; font-size: 32px;"><i class="fa fa-question-circle" data-dcnode-id="1798"></i></a></sup><span data-dcnode-id="1795" instrument_node="">

</span><div class="col-md-8 lesson" data-dcnode-id="1700"><span data-dcnode-id="1785" instrument_node="">
</span><h3 data-dcnode-id="1781"><span data-dcnode-id="1784" instrument_node="">Background Scripture </span><small data-dcnode-id="1782"><span data-dcnode-id="1783" instrument_node="">(read 2-3 times during the week)</span></small></h3><span data-dcnode-id="1780" instrument_node="">
</span><p data-dcnode-id="1776"><a data-dcnode-id="1777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.biblegateway.com/passage/%3Fsearch%3DExodus%252019%3A1-20%3A21" target="_blank"><span data-dcnode-id="1779" instrument_node="">Exodus 19:1-20:21 </span><i class="fa fa-external-link" data-dcnode-id="1778"></i></a></p><span data-dcnode-id="1775" instrument_node="">
</span><h3 data-dcnode-id="1773"><span data-dcnode-id="1774" instrument_node="">Story Summary</span></h3><span data-dcnode-id="1772" instrument_node="">
</span><p data-dcnode-id="1771"></p><p data-dcnode-id="1769"><span data-dcnode-id="1770" instrument_node="">Shortly after God brought the people of Israel out of Egypt, they traveled through the desert to Sinai where they camped in front of Mount Sinai. Mount Sinai, also called Mount Horeb, is a very significant place. There God met and spoke with Moses, telling him why he had rescued Israel from Egypt. &nbsp;God had chosen these people to be made into a holy nation, his treasured possession.&nbsp;"Now obey me completely. Keep my covenant. If you do, then out of all of the nations you will be my special treasure. The whole earth is mine." Exodus 19:5</span></p><span data-dcnode-id="1768" instrument_node="">
</span><p data-dcnode-id="1766"><span data-dcnode-id="1767" instrument_node="">There at the base of this mountain, God held a dialogue with the Israelites through Moses.&nbsp;</span></p><span data-dcnode-id="1765" instrument_node="">
</span><p data-dcnode-id="1763"><span data-dcnode-id="1764" instrument_node="">God told Moses to have the Israelites go through a 2-day preparation period. We don't know much about what this 2-day period entailed. The scripture does tell us that they were supposed to wash their clothes and abstain from sexual activity. Other than that, God just tells Moses: "have the people ready".</span></p><span data-dcnode-id="1762" instrument_node="">
</span><p data-dcnode-id="1760"><span data-dcnode-id="1761" instrument_node="">God also told Moses that he was going to appear before the Israelites on the third day. He told Moses to warn the people not to try to go up the mountain - not to break through the boundaries Moses was to put in place.</span></p><span data-dcnode-id="1759" instrument_node="">
</span><p data-dcnode-id="1757"><span data-dcnode-id="1758" instrument_node="">On the morning of the third day, they were greeted with thunder and lightning. &nbsp;A thick cloud covered the mountain and a trumpet gave a very loud blast (where did the trumpet come from?!?!?!). &nbsp;This made the people very afraid. But it didn't stop there.</span></p><span data-dcnode-id="1756" instrument_node="">
</span><p data-dcnode-id="1754"><span data-dcnode-id="1755" instrument_node="">Moses led the people out of their camp, to the foot of the mountain. Smoke covered the mountain because God appeared on the mountain in fire. The smoke was rolling up the mountain like the smoke from a furnace. The mountain shook and the sound of the trumpet kept getting louder and louder. Moses called out to the Lord, and God answered him.&nbsp;</span></p><span data-dcnode-id="1753" instrument_node="">
</span><p data-dcnode-id="1751"><span data-dcnode-id="1752" instrument_node="">I can understand why the people trembled in fear...</span></p><span data-dcnode-id="1750" instrument_node="">
</span><p data-dcnode-id="1748"><span data-dcnode-id="1749" instrument_node="">God invited Moses up to the top of the mountain and again warned him that the people should set themselves apart for God, and not approach the mountain. God then asked Moses to go down and invite Aaron to come up with him.</span></p><span data-dcnode-id="1747" instrument_node="">
</span><p data-dcnode-id="1745"><span data-dcnode-id="1746" instrument_node="">So, there is thunder, lightning, a thick cloud, fire rolling down the mountain, smoke going up the mountain, the mountain is rumbling as it shakes, and a trumpet is sounding, getting louder and louder and louder. Would you go up to the top of that mountain if you were invited?&nbsp;</span></p><span data-dcnode-id="1744" instrument_node="">
</span><p data-dcnode-id="1742"><span data-dcnode-id="1743" instrument_node="">So Moses and Aaron got to the top of the mountain, and God gives them the 10 Commandments.</span></p><span data-dcnode-id="1741" instrument_node="">
</span><p data-dcnode-id="1737"><span data-dcnode-id="1740" instrument_node="">Commandments #1-4 teach us how to show love towards God.</span><br data-dcnode-id="1739"><span data-dcnode-id="1738" instrument_node="">
Commandments #5-10 teach us how to show love towards others.</span></p><span data-dcnode-id="1736" instrument_node="">
</span><ol data-dcnode-id="1704"><span data-dcnode-id="1735" instrument_node="">
</span><li data-dcnode-id="1733"><span data-dcnode-id="1734" instrument_node="">Do not put any other gods in place of me. (v. 3)</span></li><span data-dcnode-id="1732" instrument_node="">
</span><li data-dcnode-id="1730"><span data-dcnode-id="1731" instrument_node="">Do not make statues of gods that look like anything in the sky or on the earth or in the waters.&nbsp; Do not bow down to them or worship them.(v. 4-5)</span></li><span data-dcnode-id="1729" instrument_node="">
</span><li data-dcnode-id="1727"><span data-dcnode-id="1728" instrument_node="">Do not misuse the name of the Lord your God.(v. 7)</span></li><span data-dcnode-id="1726" instrument_node="">
</span><li data-dcnode-id="1724"><span data-dcnode-id="1725" instrument_node="">Remember to keep the Sabbath day holy.&nbsp; Do all of your work in six days.&nbsp; But the seventh day is a Sabbath in honor of the Lord your God. Do not do any work on that day. (v. 8-10)</span></li><span data-dcnode-id="1723" instrument_node="">
</span><li data-dcnode-id="1721"><span data-dcnode-id="1722" instrument_node="">Honor your father and mother. (v. 12)</span></li><span data-dcnode-id="1720" instrument_node="">
</span><li data-dcnode-id="1718"><span data-dcnode-id="1719" instrument_node="">Do not commit murder. (v. 13)</span></li><span data-dcnode-id="1717" instrument_node="">
</span><li data-dcnode-id="1715"><span data-dcnode-id="1716" instrument_node="">Do not commit adultery. (v. 14)</span></li><span data-dcnode-id="1714" instrument_node="">
</span><li data-dcnode-id="1712"><span data-dcnode-id="1713" instrument_node="">Do not steal. (v. 15)</span></li><span data-dcnode-id="1711" instrument_node="">
</span><li data-dcnode-id="1709"><span data-dcnode-id="1710" instrument_node="">Do not give false witness against your neighbor. (v. 16)</span></li><span data-dcnode-id="1708" instrument_node="">
</span><li data-dcnode-id="1706"><span data-dcnode-id="1707" instrument_node="">Do not long for anything that belongs to your neighbor. (v. 17)</span></li><span data-dcnode-id="1705" instrument_node="">
</span></ol><span data-dcnode-id="1703" instrument_node="">

</span><h2 data-dcnode-id="1601"><i class="fa fa-book" data-dcnode-id="1607"></i><span data-dcnode-id="1606" instrument_node=""> Lesson </span><sup data-dcnode-id="1603"><a class="pull-right LessonInstructions hidden-print" data-backdrop="static" data-dcnode-id="1604" data-toggle="modal" href="#MainLessonInstructions" style="text-decoration:none; color: #cdcdcd; font-size: 32px;"><i class="fa fa-question-circle" data-dcnode-id="1605"></i></a></sup><span data-dcnode-id="1602" instrument_node=""> </span></h2><span data-dcnode-id="1600" instrument_node="">
</span></div><span data-dcnode-id="1598" instrument_node="">
</span></div><span data-dcnode-id="1596" instrument_node="">
</span></div><span data-dcnode-id="1594" instrument_node="">
</span><div class="row" data-dcnode-id="1465"><span data-dcnode-id="1593" instrument_node="">
</span><div class="col-md-12 lesson" data-dcnode-id="1467"><span data-dcnode-id="1592" instrument_node="">
</span><h2 data-dcnode-id="1590"><span data-dcnode-id="1591" instrument_node="">1. Warm Up</span></h2><span data-dcnode-id="1589" instrument_node="">
</span><blockquote class="text-muted" data-dcnode-id="1587"><span data-dcnode-id="1588" instrument_node="">get your kids talking and engaged</span></blockquote><span data-dcnode-id="1586" instrument_node="">
</span><p data-dcnode-id="1585"></p><p data-dcnode-id="1583"><span data-dcnode-id="1584" instrument_node="">You can do several things to get the kids' attention to start this lesson:</span></p><span data-dcnode-id="1582" instrument_node="">
</span><ul data-dcnode-id="1569"><span data-dcnode-id="1581" instrument_node="">
</span><li data-dcnode-id="1579"><span data-dcnode-id="1580" instrument_node="">If possible, get your hands on a smoke machine. Start it up, getting smoke to pour into the room (be careful to announce to them that there is not a fire!)</span></li><span data-dcnode-id="1578" instrument_node="">
</span><li data-dcnode-id="1574"><span data-dcnode-id="1577" instrument_node="">Blow a trumpet to gather the children to the lesson. If you can't get your hands on a real trumpet, make one! Instructions here:&nbsp;</span><a data-dcnode-id="1575" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.instructables.com/id/Make-A-Homemade-TrumpetBugle/"><span data-dcnode-id="1576" instrument_node="">http://www.instructables.com/id/Make-A-Homemade-TrumpetBugle/</span></a></li><span data-dcnode-id="1573" instrument_node="">
</span><li data-dcnode-id="1571"><span data-dcnode-id="1572" instrument_node="">You can do the "Rule Maker" reinforcement activity.</span></li><span data-dcnode-id="1570" instrument_node="">
</span></ul><span data-dcnode-id="1568" instrument_node="">
</span><p data-dcnode-id="1566"><span data-dcnode-id="1567" instrument_node="">Ask the children: how do you feel about thunderstorms? &nbsp;Do you like watching the lightning or do they make you a little nervous?</span></p><span data-dcnode-id="1565" instrument_node="">
</span><p data-dcnode-id="1563"><span data-dcnode-id="1564" instrument_node="">Today, we're going to learn about a time when God appeared to the Israelites in a thunderstorm and gave them some very important directions.</span></p><span data-dcnode-id="1562" instrument_node="">
</span><p data-dcnode-id="1561"></p><span data-dcnode-id="1560" instrument_node="">
</span><h2 data-dcnode-id="1558"><span data-dcnode-id="1559" instrument_node="">2. Teach the Story</span></h2><span data-dcnode-id="1557" instrument_node="">
</span><blockquote class="text-muted" data-dcnode-id="1555"><span data-dcnode-id="1556" instrument_node="">teach a holistic story</span></blockquote><span data-dcnode-id="1554" instrument_node="">
</span><p data-dcnode-id="1553"></p><p data-dcnode-id="1548"><span data-dcnode-id="1552" instrument_node="">Read story from a&nbsp;</span><a data-dcnode-id="1550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.teachusthebible.com/SuggestedBibles.php" target="_blank"><span data-dcnode-id="1551" instrument_node="">Children's storybook Bible</span></a><span data-dcnode-id="1549" instrument_node="">&nbsp;for younger children.</span></p><span data-dcnode-id="1547" instrument_node="">
</span><p data-dcnode-id="1542"><span data-dcnode-id="1546" instrument_node="">For older children, read story from an age-appropriate&nbsp;</span><a data-dcnode-id="1544" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.teachusthebible.com/SuggestedBibles.php" target="_blank"><span data-dcnode-id="1545" instrument_node="">Children's storybook Bible</span></a><span data-dcnode-id="1543" instrument_node="">&nbsp;or tell the story yourself.</span></p><span data-dcnode-id="1541" instrument_node="">
</span><p data-dcnode-id="1539"><span data-dcnode-id="1540" instrument_node="">As you are teaching the lesson, write the commandments on a poster board to display in your classroom.</span></p><span data-dcnode-id="1538" instrument_node="">
</span><p data-dcnode-id="1536"><span data-dcnode-id="1537" instrument_node="">Try your best to help the students really get a feel for what was happening on that moutain, but be sensitive (especially in younger classrooms), not to scare them.&nbsp;</span></p><span data-dcnode-id="1535" instrument_node="">
</span><p data-dcnode-id="1534"></p><span data-dcnode-id="1533" instrument_node="">
</span><h2 data-dcnode-id="1531"><span data-dcnode-id="1532" instrument_node="">3. Bible Mastery</span></h2><span data-dcnode-id="1530" instrument_node="">
</span><blockquote class="text-muted" data-dcnode-id="1528"><span data-dcnode-id="1529" instrument_node="">give them basic Bible skills</span></blockquote><span data-dcnode-id="1527" instrument_node="">
</span><p data-dcnode-id="1521"><strong data-dcnode-id="1525"><span data-dcnode-id="1526" instrument_node="">Scripture for Kids to Read Aloud: </span></strong><a data-dcnode-id="1522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.biblegateway.com/passage/%3Fsearch%3DExodus%252019%3A16-19%2C%2520Exodus%252020%3A3%2C%25204-5%2C%25207%2C%25208%2C%252012%2C%252013%2C%252014%2C%252015%2C%252016%2C%252017%2520%28commandments%29" target="_blank"><span data-dcnode-id="1524" instrument_node="">Exodus 19:16-19, Exodus 20:3, 4-5, 7, 8, 12, 13, 14, 15, 16, 17 (commandments) </span><i class="fa fa-external-link" data-dcnode-id="1523"></i></a></p><span data-dcnode-id="1520" instrument_node="">
</span><h2 data-dcnode-id="1518"><span data-dcnode-id="1519" instrument_node="">4. Comprehension Questions</span></h2><span data-dcnode-id="1517" instrument_node="">
</span><blockquote class="text-muted" data-dcnode-id="1515"><span data-dcnode-id="1516" instrument_node="">make sure they understand the story</span></blockquote><span data-dcnode-id="1514" instrument_node="">
</span><p data-dcnode-id="1508"><em data-dcnode-id="1509"><span data-dcnode-id="1513" instrument_node="">First, ask the children if they have any questions about the story. </span><a class="hidden-print" data-backdrop="static" data-dcnode-id="1510" data-toggle="modal" href="#QuestionInstructions"><i class="fa fa-question-circle" data-dcnode-id="1512"></i><span data-dcnode-id="1511" instrument_node=""> What to do if you don't know the answer?</span></a></em></p><span data-dcnode-id="1507" instrument_node="">
</span><ul data-dcnode-id="1492"><span data-dcnode-id="1506" instrument_node="">
</span><li data-dcnode-id="1504"><span data-dcnode-id="1505" instrument_node="">What was the name of the mountain where the Israelites were camping? (Mount Sinai)</span></li><li data-dcnode-id="1502"><span data-dcnode-id="1503" instrument_node="">Why did God bring them out of Egypt? (to make them his treasured people)</span></li><li data-dcnode-id="1500"><span data-dcnode-id="1501" instrument_node="">Who went up onto the mountain? (Moses and Aaron)</span></li><li data-dcnode-id="1498"><span data-dcnode-id="1499" instrument_node="">What occurred prior to God speaking? (thunder, lightning, smoke, fire, the mountain shook, and sounds of a trumpet)</span></li><li data-dcnode-id="1496"><span data-dcnode-id="1497" instrument_node="">What did God give Moses? (ten commandments)</span></li><li data-dcnode-id="1494"><span data-dcnode-id="1495" instrument_node="">What are the 10 commandments? (see lesson background, see if the kids can come up with them as a group)</span></li><span data-dcnode-id="1493" instrument_node="">
</span></ul><span data-dcnode-id="1491" instrument_node="">
</span><h2 data-dcnode-id="1489"><span data-dcnode-id="1490" instrument_node="">5. Faith Questions</span></h2><span data-dcnode-id="1488" instrument_node="">
</span><blockquote class="text-muted" data-dcnode-id="1486"><span data-dcnode-id="1487" instrument_node="">help them apply the story to their lives and open up a conversation about faith and the gospel; close with prayer</span></blockquote><span data-dcnode-id="1485" instrument_node="">
</span><ul data-dcnode-id="1478"><span data-dcnode-id="1484" instrument_node="">
</span><li data-dcnode-id="1482"><span data-dcnode-id="1483" instrument_node="">Have you kept every one of the 10 Commandments perfectly?</span></li><li data-dcnode-id="1480"><span data-dcnode-id="1481" instrument_node="">We are all sinners (we miss the mark of God's perfect law), but through God's grace, he forgives us if we will ask and repent.</span></li><span data-dcnode-id="1479" instrument_node="">
</span></ul><span data-dcnode-id="1477" instrument_node="">
</span><h2 data-dcnode-id="1475"><span data-dcnode-id="1476" instrument_node="">6. Memory Verse</span></h2><span data-dcnode-id="1474" instrument_node="">
</span><blockquote class="text-muted" data-dcnode-id="1472"><span data-dcnode-id="1473" instrument_node="">hide God's Word in their heart</span></blockquote><span data-dcnode-id="1471" instrument_node="">
</span><em data-dcnode-id="1469"><span data-dcnode-id="1470" instrument_node="">Trust in the Lord with all your heart. Do not depend on your own understanding. Proverbs 3:5</span></em><span data-dcnode-id="1468" instrument_node="">

</span><h3 data-dcnode-id="1380"><span data-dcnode-id="1381" instrument_node="">Clay Tablets</span></h3><span data-dcnode-id="1379" instrument_node="">

</span><span class="label label-info" data-dcnode-id="1333"><span data-dcnode-id="1334" instrument_node="">Heads up!</span></span><span data-dcnode-id="1332" instrument_node=""> </span><em data-dcnode-id="1330"><span data-dcnode-id="1331" instrument_node="">This activity will continue for the next 10 weeks, learning a different commandment each week.</span></em><br data-dcnode-id="1329"><br data-dcnode-id="1328"><span data-dcnode-id="1327" instrument_node="">

</span><span class="label label-success" data-dcnode-id="1317"><span data-dcnode-id="1318" instrument_node="">Supplies</span></span><span data-dcnode-id="1316" instrument_node=""> colored beads, leather string</span><br data-dcnode-id="1315"><br data-dcnode-id="1314"><span data-dcnode-id="1313" instrument_node="">
</span><ul class="ActivityDescription" data-dcnode-id="1298"><span data-dcnode-id="1312" instrument_node="">
</span><li data-dcnode-id="1310"><span data-dcnode-id="1311" instrument_node="">Teach the first commandment.</span></li><li data-dcnode-id="1308"><span data-dcnode-id="1309" instrument_node="">When the child can tell you each commandment  correctly, without assistance, they are given a bead for a bracelet. </span></li><li data-dcnode-id="1306"><span data-dcnode-id="1307" instrument_node="">Keep the bracelet in the classroom and when they have learned all 10 commandments, they get to take it home.</span></li><li data-dcnode-id="1304"><span data-dcnode-id="1305" instrument_node="">To help them remember the commandments, you can separate them into 2 groups for the children. </span></li><li data-dcnode-id="1302"><span data-dcnode-id="1303" instrument_node="">The first four commandments are concerning our relationship with God. </span></li><li data-dcnode-id="1300"><span data-dcnode-id="1301" instrument_node="">The last six are concerning our relationship with others.</span></li><span data-dcnode-id="1299" instrument_node="">

</span><span class="label label-success" data-dcnode-id="1280"><span data-dcnode-id="1281" instrument_node="">Supplies</span></span><span data-dcnode-id="1279" instrument_node=""> card stock, printed commandments, scissors, crayons</span><br data-dcnode-id="1278"><br data-dcnode-id="1277"><span data-dcnode-id="1276" instrument_node="">

</span><li data-dcnode-id="1273"><span data-dcnode-id="1274" instrument_node="">have kids fold over a piece of cardstock and cut a tablet shape out of it (so that it can open like a book)</span></li><li data-dcnode-id="1272"></li><li data-dcnode-id="1270"><span data-dcnode-id="1271" instrument_node="">have them title the cover 'the 10 commandments'</span></li><li data-dcnode-id="1269"></li><li data-dcnode-id="1267"><span data-dcnode-id="1268" instrument_node="">allow the kids to color and decorate the tablet</span></li><li data-dcnode-id="1266"></li><li data-dcnode-id="1264"><span data-dcnode-id="1265" instrument_node="">glue the commandments inside of their tablet/book</span></li><span data-dcnode-id="1263" instrument_node="">

</span><h3 data-dcnode-id="1255"><span data-dcnode-id="1256" instrument_node="">Dry Ice Smoke</span></h3><span data-dcnode-id="1254" instrument_node="">
</span><span class="label label-info" data-dcnode-id="1252"><span data-dcnode-id="1253" instrument_node="">Heads up!</span></span><span data-dcnode-id="1251" instrument_node=""> </span><em data-dcnode-id="1249"><span data-dcnode-id="1250" instrument_node="">Be careful with dry ice. Do not allow it to touch your skin and do not mix it with water in an air-tight container.</span></em><br data-dcnode-id="1248"><br data-dcnode-id="1247"><span data-dcnode-id="1246" instrument_node="">
</span><span class="label label-danger" data-dcnode-id="1244"><span data-dcnode-id="1245" instrument_node="">Scripture</span></span><span data-dcnode-id="1243" instrument_node=""> </span><em data-dcnode-id="1241"><span data-dcnode-id="1242" instrument_node="">Smoke covered Mount Sinai, because the Lord came down on it in fire. The smoke rose up from it like smoke from a furnace. The whole mountain trembled and shook. Exodus 19:18</span></em><br data-dcnode-id="1240"><br data-dcnode-id="1239"><span data-dcnode-id="1238" instrument_node="">
</span><span class="label label-success" data-dcnode-id="1236"><span data-dcnode-id="1237" instrument_node="">Supplies</span></span><span data-dcnode-id="1235" instrument_node=""> 1 lb dry ice, hot water, bucket, tongs, gloves</span><br data-dcnode-id="1234"><br data-dcnode-id="1233"><span data-dcnode-id="1232" instrument_node="">
</span><ul class="ActivityDescription" data-dcnode-id="1215"><span data-dcnode-id="1231" instrument_node="">
</span><li data-dcnode-id="1229"><span data-dcnode-id="1230" instrument_node="">Purchase dry ice at your local grocery store (try and get it the morning of your lesson, or just a couple hours beforehand)</span></li><li data-dcnode-id="1227"><span data-dcnode-id="1228" instrument_node="">Heat about 1/3 to 1/2 gallon of water almost to a boil</span></li><li data-dcnode-id="1225"><span data-dcnode-id="1226" instrument_node="">Pour the hot water into a bucket</span></li><li data-dcnode-id="1223"><span data-dcnode-id="1224" instrument_node="">Use tongs (with gloves on) to place a chunk of dry ice into the bucket</span></li><li data-dcnode-id="1221"><span data-dcnode-id="1222" instrument_node="">What looks like smoke will immediately begin pouring out of the bucket. It is actually gaseous CO2 (carbon dioxide), which is heavier than air, so it will settle to the bottom.</span></li><li data-dcnode-id="1219"><span data-dcnode-id="1220" instrument_node="">You can "pour" the smoke out of the bucket by tipping it slightly (being careful not to pour the hot water out)</span></li><li data-dcnode-id="1217"><span data-dcnode-id="1218" instrument_node="">Be sure there is good ventilation in the room you are doing this activity in.</span></li><span data-dcnode-id="1216" instrument_node="">
</span></ul><span data-dcnode-id="1214" instrument_node="">
</span></div><span data-dcnode-id="1211" instrument_node="">

</span><ul class="ActivityDescription" data-dcnode-id="1189"><span data-dcnode-id="1198" instrument_node="">
</span><li data-dcnode-id="1196"><span data-dcnode-id="1197" instrument_node="">In this relay race, players climb up "Mount Sinai" to collect the Ten Commandments. Use this game to introduce and review your lesson on the Ten Commandments.</span></li><li data-dcnode-id="1191"><span data-dcnode-id="1195" instrument_node="">(From </span><a data-dcnode-id="1193" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biblegamescentral.com/"><span data-dcnode-id="1194" instrument_node="">biblegamescentral.com</span></a><span data-dcnode-id="1192" instrument_node="">)</span></li><span data-dcnode-id="1190" instrument_node="">
</span></ul><span data-dcnode-id="1188" instrument_node="">

</span><a class="btn btn-primary col-md-12 col-xs-12 activity-example-button" data-dcnode-id="1182" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//biblegamescentral.com/come-on-up-moses/" target="_blank" title=""><strong data-dcnode-id="1183"><span data-dcnode-id="1185" instrument_node="">Come on Up Moses! Game </span><i class="fa fa-external-link" data-dcnode-id="1184"></i></strong></a><span data-dcnode-id="1181" instrument_node="">

</span><h3 data-dcnode-id="1171"><span data-dcnode-id="1172" instrument_node="">Mother May I?</span></h3><span data-dcnode-id="1170" instrument_node="">
</span><span class="label label-danger" data-dcnode-id="1168"><span data-dcnode-id="1169" instrument_node="">Scripture</span></span><span data-dcnode-id="1167" instrument_node=""> </span><em data-dcnode-id="1165"><span data-dcnode-id="1166" instrument_node="">Honor your father and mother. Then you will live a long time in the land the Lord your God is giving you. Exodus 20:12</span></em><br data-dcnode-id="1164"><br data-dcnode-id="1163"><span data-dcnode-id="1162" instrument_node="">
</span><ul class="ActivityDescription" data-dcnode-id="1140"><span data-dcnode-id="1161" instrument_node="">
</span><li data-dcnode-id="1159"><span data-dcnode-id="1160" instrument_node="">Have all the children stand in a line and create a finish line about 10-15 feet away from them.</span></li><li data-dcnode-id="1157"><span data-dcnode-id="1158" instrument_node="">Go down the line and give one child at a time instructions to do something.</span></li><li data-dcnode-id="1148"><span data-dcnode-id="1156" instrument_node="">For example:</span><ul data-dcnode-id="1149"><li data-dcnode-id="1154"><span data-dcnode-id="1155" instrument_node="">Take 3 baby steps</span></li><li data-dcnode-id="1152"><span data-dcnode-id="1153" instrument_node="">Take 1 giant step</span></li><li data-dcnode-id="1150"><span data-dcnode-id="1151" instrument_node="">And so on...</span></li></ul></li><li data-dcnode-id="1146"><span data-dcnode-id="1147" instrument_node="">The child must say, "Mother May I?" before they move.</span></li><li data-dcnode-id="1144"><span data-dcnode-id="1145" instrument_node="">If they don't, they must go back to the starting line.</span></li><li data-dcnode-id="1142"><span data-dcnode-id="1143" instrument_node="">The first child to the finish line is the winner.</span></li><span data-dcnode-id="1141" instrument_node="">
</span></ul><span data-dcnode-id="1139" instrument_node="">
</span></div><span data-dcnode-id="1136" instrument_node="">

</span><span class="label label-danger" data-dcnode-id="1130"><span data-dcnode-id="1131" instrument_node="">Scripture</span></span><span data-dcnode-id="1129" instrument_node=""> </span><em data-dcnode-id="1127"><span data-dcnode-id="1128" instrument_node="">On the morning of the third day there was thunder and lightning, with a thick cloud over the mountain, and a very loud trumpet blast. Everyone in the camp trembled. Exodus 19:16</span></em><br data-dcnode-id="1126"><br data-dcnode-id="1125"><span data-dcnode-id="1124" instrument_node="">
</span><span class="label label-success" data-dcnode-id="1122"><span data-dcnode-id="1123" instrument_node="">Supplies</span></span><span data-dcnode-id="1121" instrument_node=""> blue, black and white paint, white paper</span><br data-dcnode-id="1120"><br data-dcnode-id="1119"><span data-dcnode-id="1118" instrument_node="">

</span><li data-dcnode-id="1115"><span data-dcnode-id="1116" instrument_node="">Mix paint colors to make various shades of blue and gray.</span></li><li data-dcnode-id="1113"><span data-dcnode-id="1114" instrument_node="">Paint clouds on white paper to make thunderstorm clouds.</span></li><span data-dcnode-id="1112" instrument_node="">
</span></ul><span data-dcnode-id="1110" instrument_node="">

</span><span class="label label-danger" data-dcnode-id="1093"><span data-dcnode-id="1094" instrument_node="">Scripture</span></span><span data-dcnode-id="1092" instrument_node=""> </span><em data-dcnode-id="1090"><span data-dcnode-id="1091" instrument_node="">Exodus 20:1-17</span></em><br data-dcnode-id="1089"><br data-dcnode-id="1088"><span data-dcnode-id="1087" instrument_node="">
</span><span class="label label-success" data-dcnode-id="1085"><span data-dcnode-id="1086" instrument_node="">Supplies</span></span><span data-dcnode-id="1084" instrument_node=""> posterboard, marker</span><br data-dcnode-id="1083"><br data-dcnode-id="1082"><span data-dcnode-id="1081" instrument_node="">
</span><ul class="ActivityDescription" data-dcnode-id="1070"><span data-dcnode-id="1080" instrument_node="">
</span><li data-dcnode-id="1078"><span data-dcnode-id="1079" instrument_node="">One student is chosen to come up with 10 rules. </span></li><li data-dcnode-id="1076"><span data-dcnode-id="1077" instrument_node="">Write the "commandments" on a posterboard</span></li><li data-dcnode-id="1074"><span data-dcnode-id="1075" instrument_node="">The rest of class has to follow rules. </span></li><li data-dcnode-id="1072"><span data-dcnode-id="1073" instrument_node="">Encourage rule maker to be creative (ex: students must cluck like a chicken before answering questions)</span></li><span data-dcnode-id="1071" instrument_node="">
</span></ul><span data-dcnode-id="1069" instrument_node="">

</span><h3 data-dcnode-id="1063"><span data-dcnode-id="1064" instrument_node="">Climbing Mount Sinai to get Commandments</span></h3><span data-dcnode-id="1062" instrument_node="">
</span><span class="label label-danger" data-dcnode-id="1060"><span data-dcnode-id="1061" instrument_node="">Scripture</span></span><span data-dcnode-id="1059" instrument_node=""> </span><em data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">Exodus 20:1-17</span></em><br data-dcnode-id="1056"><br data-dcnode-id="1055"><span data-dcnode-id="1054" instrument_node="">
</span><span class="label label-success" data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">Supplies</span></span><span data-dcnode-id="1051" instrument_node=""> index cards, one word on each card to spell out ten commandments</span><br data-dcnode-id="1050"><br data-dcnode-id="1049"><span data-dcnode-id="1048" instrument_node="">
</span><ul class="ActivityDescription" data-dcnode-id="1035"><span data-dcnode-id="1047" instrument_node="">
</span><li data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">Have each word of each of the 10 commandments written on separate cards.</span></li><li data-dcnode-id="1043"><span data-dcnode-id="1044" instrument_node="">Divide class into teams and give each team a commandment.</span></li><li data-dcnode-id="1041"><span data-dcnode-id="1042" instrument_node="">One person from each team has to run to Mount Sinai (would be great to have cards at the top of a staircase, or can use a table or other obstacle to climb in room) and retrieve their stack of cards.</span></li><li data-dcnode-id="1039"><span data-dcnode-id="1040" instrument_node="">When they return to their group, the team works to put them in order.</span></li><li data-dcnode-id="1037"><span data-dcnode-id="1038" instrument_node="">You can have them go get another commandment and work on more than one, if the class size is too small to have separate groups do all 10.</span></li><span data-dcnode-id="1036" instrument_node="">
</span></ul><span data-dcnode-id="1034" instrument_node="">

</span><h3 data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">Hot Potato Commandments</span></h3><span data-dcnode-id="1027" instrument_node="">
</span><span class="label label-danger" data-dcnode-id="1025"><span data-dcnode-id="1026" instrument_node="">Scripture</span></span><span data-dcnode-id="1024" instrument_node=""> </span><em data-dcnode-id="1022"><span data-dcnode-id="1023" instrument_node="">Exodus 20:1-17</span></em><br data-dcnode-id="1021"><br data-dcnode-id="1020"><span data-dcnode-id="1019" instrument_node="">
</span><span class="label label-success" data-dcnode-id="1017"><span data-dcnode-id="1018" instrument_node="">Supplies</span></span><span data-dcnode-id="1016" instrument_node=""> chairs, large stone, music</span><br data-dcnode-id="1015"><br data-dcnode-id="1014"><span data-dcnode-id="1013" instrument_node="">
</span><ul class="ActivityDescription" data-dcnode-id="1000"><span data-dcnode-id="1012" instrument_node="">
</span><li data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">Sit up chairs in a circle.</span></li><li data-dcnode-id="1008"><span data-dcnode-id="1009" instrument_node="">Have students pass a rock.</span></li><li data-dcnode-id="1006"><span data-dcnode-id="1007" instrument_node="">When music stops, the person with the stone has to say one of the 10 commandments.</span></li><li data-dcnode-id="1004"><span data-dcnode-id="1005" instrument_node="">They cannot re-use a commandment that someone else has said.</span></li><li data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">If they cannot remember, they are out.</span></li><span data-dcnode-id="1001" instrument_node="">
</span></ul><span data-dcnode-id="999" instrument_node="">

</span><h3 data-dcnode-id="993"><span data-dcnode-id="994" instrument_node="">Commandments Balloon Pop</span></h3><span data-dcnode-id="992" instrument_node="">
</span><span class="label label-danger" data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">Scripture</span></span><span data-dcnode-id="989" instrument_node=""> </span><em data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">Exodus 20:1-17</span></em><br data-dcnode-id="986"><br data-dcnode-id="985"><span data-dcnode-id="984" instrument_node="">
</span><span class="label label-success" data-dcnode-id="982"><span data-dcnode-id="983" instrument_node="">Supplies</span></span><span data-dcnode-id="981" instrument_node=""> 10 balloons for each team (have separate colored balloons for each team) strips of paper with commandments on them</span><br data-dcnode-id="980"><br data-dcnode-id="979"><span data-dcnode-id="978" instrument_node="">
</span><ul class="ActivityDescription" data-dcnode-id="957"><span data-dcnode-id="977" instrument_node="">
</span><li data-dcnode-id="975"><span data-dcnode-id="976" instrument_node="">Place a strip of paper with one of the 10 commandments in each balloon. </span></li><li data-dcnode-id="973"><span data-dcnode-id="974" instrument_node="">Repeat for each color of balloon, depending on how many teams you need. </span></li><li data-dcnode-id="971"><span data-dcnode-id="972" instrument_node="">Place balloons on one side of the room. (Colors can be mixed up now)</span></li><li data-dcnode-id="969"><span data-dcnode-id="970" instrument_node="">Divide students into teams. </span></li><li data-dcnode-id="967"><span data-dcnode-id="968" instrument_node="">One person from each team must go choose a balloon that has their color. </span></li><li data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">Take balloon back to their group and pop balloon. </span></li><li data-dcnode-id="963"><span data-dcnode-id="964" instrument_node="">Repeat until you have all of the strips of paper. </span></li><li data-dcnode-id="961"><span data-dcnode-id="962" instrument_node="">First team to put the commandments in order wins. </span></li><li data-dcnode-id="959"><span data-dcnode-id="960" instrument_node="">Can also have them separate commandments into the two groups (relationship with God or others)</span></li><span data-dcnode-id="958" instrument_node="">
</span></ul><span data-dcnode-id="956" instrument_node="">
</span></div><span data-dcnode-id="953" instrument_node="">
</span><div class="well-alt activity-tile age-Late isotope-item" data-activity-id="286" data-checked="0" data-dcnode-id="899" data-rating="0" data-rating-count="0" style="position: absolute; left: 0px; top: 1632px;"><span data-dcnode-id="952" instrument_node="">
</span><h3 data-dcnode-id="950"><span data-dcnode-id="951" instrument_node="">Sounds on Mount Sinai</span></h3><span data-dcnode-id="949" instrument_node="">
</span><span class="label label-info" data-dcnode-id="947"><span data-dcnode-id="948" instrument_node="">Heads up!</span></span><span data-dcnode-id="946" instrument_node=""> </span><em data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">You can teach story prior to this lesson, so students have a frame of reference for this activity.</span></em><br data-dcnode-id="943"><br data-dcnode-id="942"><span data-dcnode-id="941" instrument_node="">
</span><span class="label label-danger" data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">Scripture</span></span><span data-dcnode-id="938" instrument_node=""> </span><em data-dcnode-id="936"><span data-dcnode-id="937" instrument_node=""> On the morning of the third day there was thunder and lightning, with a thick cloud over the mountain, and a very loud trumpet blast. Everyone in the camp trembled. Then Moses led the people out of the camp to meet with God, and they stood at the foot of the mountain. Mount Sinai was covered with smoke, because the Lord descended on it in fire. The smoke billowed up from it like smoke from a furnace, the whole mountain[b] trembled violently,  and the sound of the trumpet grew louder and louder. Then Moses spoke and the voice of God answered him. Exodus 19:16-19</span></em><br data-dcnode-id="935"><br data-dcnode-id="934"><span data-dcnode-id="933" instrument_node="">
</span><span class="label label-success" data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">Supplies</span></span><span data-dcnode-id="930" instrument_node=""> trumpet, smoke machine, computer </span><br data-dcnode-id="929"><br data-dcnode-id="928"><span data-dcnode-id="927" instrument_node="">
</span><ul class="ActivityDescription" data-dcnode-id="912"><span data-dcnode-id="926" instrument_node="">
</span><li data-dcnode-id="924"><span data-dcnode-id="925" instrument_node="">Have students meditate on the sounds that came from Mount Sinai, consider having them close their eyes.</span></li><li data-dcnode-id="922"><span data-dcnode-id="923" instrument_node="">Blow a trumpet, gradually increasing in volume.</span></li><li data-dcnode-id="920"><span data-dcnode-id="921" instrument_node="">Turn on a smoke machine.</span></li><li data-dcnode-id="918"><span data-dcnode-id="919" instrument_node="">Use a computer to play sounds of thunder.</span></li><li data-dcnode-id="916"><span data-dcnode-id="917" instrument_node="">After this amazing display, verse 20 tells us that the Lord descended to the top of Mount Sinai and called Moses to the top of the mountain. So Moses went up.</span></li><li data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">How do you think Moses felt about going up the mountain with all of this going on around him?</span></li><span data-dcnode-id="913" instrument_node="">
</span></ul><span data-dcnode-id="911" instrument_node="">
</span><div class="row activity-resource" data-dcnode-id="901"><span data-dcnode-id="910" instrument_node="">

</span><a class="btn btn-primary col-md-12 col-xs-12 activity-example-button" data-dcnode-id="905" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//soundbible.com/tags-thunder.html" target="_blank" title="http://soundbible.com/tags-thunder.html"><strong data-dcnode-id="906"><span data-dcnode-id="908" instrument_node="">Thunder sound effects </span><i class="fa fa-external-link" data-dcnode-id="907"></i></strong></a><span data-dcnode-id="904" instrument_node="">
</span></div><span data-dcnode-id="902" instrument_node="">

</span><h3 data-dcnode-id="894"><span data-dcnode-id="895" instrument_node="">Smoke Bombs!</span></h3><span data-dcnode-id="893" instrument_node="">
</span><span class="label label-danger" data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">Scripture</span></span><span data-dcnode-id="890" instrument_node=""> </span><em data-dcnode-id="888"><span data-dcnode-id="889" instrument_node="">Smoke covered Mount Sinai, because the Lord came down on it in fire. The smoke rose up from it like smoke from a furnace. The whole mountain trembled and shook. Exodus 19:18</span></em><br data-dcnode-id="887"><br data-dcnode-id="886"><span data-dcnode-id="885" instrument_node="">
</span><span class="label label-success" data-dcnode-id="883"><span data-dcnode-id="884" instrument_node="">Supplies</span></span><span data-dcnode-id="882" instrument_node=""> one star ping pong balls, pencils, thin aluminum foil, lighter</span><br data-dcnode-id="881"><br data-dcnode-id="880"><span data-dcnode-id="879" instrument_node="">
</span><ul class="ActivityDescription" data-dcnode-id="860"><span data-dcnode-id="878" instrument_node="">
</span><li data-dcnode-id="876"><span data-dcnode-id="877" instrument_node="">Smash and cut up 2 ping pong balls. </span></li><li data-dcnode-id="874"><span data-dcnode-id="875" instrument_node="">Put a hole in a 3rd ball. </span></li><li data-dcnode-id="872"><span data-dcnode-id="873" instrument_node="">Put the smashed pieces into the ball with the hole.</span></li><li data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">Stick a pencil into the hole and cover with aluminum foil, leaving the pencil end uncovered.</span></li><li data-dcnode-id="868"><span data-dcnode-id="869" instrument_node="">Mold foil tightly around ball and pencil.</span></li><li data-dcnode-id="866"><span data-dcnode-id="867" instrument_node="">Remove pencil.</span></li><li data-dcnode-id="864"><span data-dcnode-id="865" instrument_node="">Light bottom (end with ball) of the smoke bomb.</span></li><li data-dcnode-id="862"><span data-dcnode-id="863" instrument_node="">It should take about 10 seconds. It takes longer if your foil is thicker. </span></li><span data-dcnode-id="861" instrument_node="">

</span><div aria-hidden="true" aria-labelledby="LessonPrepInstructionsLabel" class="modal" data-dcnode-id="178" id="LessonPrepInstructions" role="dialog" tabindex="-1"><span data-dcnode-id="210" instrument_node="">
</span><div class="modal-dialog" data-dcnode-id="180"><span data-dcnode-id="209" instrument_node="">
</span><div class="modal-content" data-dcnode-id="182"><span data-dcnode-id="208" instrument_node="">

</span><button aria-hidden="true" class="close" data-dcnode-id="205" data-dismiss="modal" type="button"><i class="fa fa-times" data-dcnode-id="206"></i></button><span data-dcnode-id="204" instrument_node="">
</span><h3 data-dcnode-id="201" id="LessonPrepInstructionsLabel"><i class="fa fa-clock-o" data-dcnode-id="203"></i><span data-dcnode-id="202" instrument_node=""> Lesson Prep</span></h3><span data-dcnode-id="200" instrument_node="">
</span></div><span data-dcnode-id="198" instrument_node="">
</span><div class="modal-body" data-dcnode-id="184"><span data-dcnode-id="197" instrument_node="">
</span><p class="lead" data-dcnode-id="195"><span data-dcnode-id="196" instrument_node="">Start your lesson planning by reading the "Lesson Prep" section about 5 days before you are scheduled to teach.</span></p><span data-dcnode-id="194" instrument_node="">
</span><h4 data-dcnode-id="192"><span data-dcnode-id="193" instrument_node="">Background Scripture</span></h4><span data-dcnode-id="191" instrument_node="">
	        While we provide a summary of the story, we strongly encourage you to read the story directly from the Bible from yourself. God's word is powerful (much more powerful than our summary is!) and you should know the story well before you teach it. We encourage you to read the background scripture 2-3 times during the week before teaching.
	        
	        </span><h4 data-dcnode-id="189"><span data-dcnode-id="190" instrument_node="">Story Summary</span></h4><span data-dcnode-id="188" instrument_node="">
	        We provide a "Cliff's Notes" version of the story to help you see the big picture. Also, if you are not using a storybook Bible, you can use this summary as an outline for your own teaching in class. 
	        
	        </span><h4 data-dcnode-id="186"><span data-dcnode-id="187" instrument_node="">What You Will Need</span></h4><span data-dcnode-id="185" instrument_node="">
	        We place everything you might need to prepare for the actual story telling here (this doesn't include Reinforcement Activity supplies, because we don't know which ones you will choose!). This may include a snack suggestion if there is one that goes well with the story, props you might use in teaching the lesson, and the coloring sheet that goes with each lesson.
	      </span></div><span data-dcnode-id="183" instrument_node="">
</span></div><span data-dcnode-id="181" instrument_node="">
</span></div><span data-dcnode-id="179" instrument_node="">
</span></div><span data-dcnode-id="177" instrument_node="">
</span><div aria-hidden="true" aria-labelledby="LessonInstructionsLabel" class="modal" data-dcnode-id="129" id="MainLessonInstructions" role="dialog" tabindex="-1"><span data-dcnode-id="176" instrument_node="">
</span><div class="modal-dialog" data-dcnode-id="131"><span data-dcnode-id="175" instrument_node="">
</span><div class="modal-content" data-dcnode-id="133"><span data-dcnode-id="174" instrument_node="">
</span><div class="modal-header" data-dcnode-id="165"><span data-dcnode-id="173" instrument_node="">
</span><button aria-hidden="true" class="close" data-dcnode-id="171" data-dismiss="modal" type="button"><i class="fa fa-times" data-dcnode-id="172"></i></button><span data-dcnode-id="170" instrument_node="">
</span><h3 data-dcnode-id="167" id="LessonInstructionsLabel"><i class="fa fa-book" data-dcnode-id="169"></i><span data-dcnode-id="168" instrument_node=""> Lesson</span></h3><span data-dcnode-id="166" instrument_node="">
</span></div><span data-dcnode-id="164" instrument_node="">
</span><div class="modal-body" data-dcnode-id="135"><span data-dcnode-id="163" instrument_node="">
</span><p class="lead" data-dcnode-id="161"><span data-dcnode-id="162" instrument_node="">This section helps you structure your teaching time.</span></p><span data-dcnode-id="160" instrument_node="">
</span><h4 data-dcnode-id="158"><span data-dcnode-id="159" instrument_node="">1. Warm Up</span></h4><span data-dcnode-id="157" instrument_node="">
	        This is a question that goes along with the story for the day. This is designed to get your kids talking and to build a connection with them.
	        
	        </span><h4 data-dcnode-id="155"><span data-dcnode-id="156" instrument_node="">2. Teach the Story</span></h4><span data-dcnode-id="154" instrument_node="">
	        This is the most important part of the lesson. Use all the creativity you have to tell the story in an engaging, and interesting way. Use props. Be sensitive to the age of your children and tell the story in a way they can understand.</span><br data-dcnode-id="153"><br data-dcnode-id="152"><span data-dcnode-id="151" instrument_node="">
	        We always encourage you to use a Bible storybook if you have one available (</span><a data-dcnode-id="149" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.teachusthebible.com/SuggestedBibles.php"><span data-dcnode-id="150" instrument_node="">here is a list of ones we know about</span></a><span data-dcnode-id="148" instrument_node="">)          
	
	        </span><h4 data-dcnode-id="146"><span data-dcnode-id="147" instrument_node="">3. Bible Mastery</span></h4><span data-dcnode-id="145" instrument_node="">
	        If you would like to have your students read out of the Bible themselves, these are good verses to do it. We recommend they do this after you teach the story, however, and certainly not as a substitute for you teaching a holistic story. While it is a good thing that kids get used to reading out loud and reading the Bible for themselves, elementary-aged children do not typically have the reading skills necessary to be able both read out loud and comprehend at the same time. Also, it is difficult for the other students to really understand what they are hearing. So teach the lesson first, then let them read the Scripture out loud.
	
	        </span><h4 data-dcnode-id="143"><span data-dcnode-id="144" instrument_node="">4. Comprehension Questions</span></h4><span data-dcnode-id="142" instrument_node="">
			These questions can help you ensure your students understood the story. Also, use this time to take the topic where the students want to go. Pray for the Holy Spirit to reveal to them what truths he wants them to learn from the story, and help them understand how this story can be applied to their lives. Keep in mind that elementary school children are rarely capable of abstract thought, so don't boil it all down to a simplified principle for them. But let the Scripture and the Holy Spirit speak to them and be sensitive to where the conversation can go.        
	
	        </span><h4 data-dcnode-id="140"><span data-dcnode-id="141" instrument_node="">5. Faith Questions</span></h4><span data-dcnode-id="139" instrument_node="">
	        These questions help the children think about how this story applies to their own life today. Keep in mind that only your oldest elementary school children will be able to think in abstract terms, but you can ask some basic questions that will hopefully open up a conversation about what the children believe. By the prompting of the Holy Spirit in response to His Word, you can encourage your children to surrender their lives to God and present the Gospel to them. Also, feel free to share your own faith experiences with them (being careful not to delve into "adult" struggles, like marriage, sexual sin, etc).
	        
	        </span><h4 data-dcnode-id="137"><span data-dcnode-id="138" instrument_node="">6. Memory Verse</span></h4><span data-dcnode-id="136" instrument_node="">
	        We typically include a memory verse every 4 or 5 lessons, so you can work for several weeks on the same verse. Feel free to give out rewards to the students who successfully memorize the Scripture.
	        
	      </span></div><span data-dcnode-id="134" instrument_node="">
</span></div><span data-dcnode-id="132" instrument_node="">
</span></div><span data-dcnode-id="130" instrument_node="">
</span></div><span data-dcnode-id="128" instrument_node="">
</span><div aria-hidden="true" aria-labelledby="ActivityInstructionsLabel" class="modal" data-dcnode-id="95" id="ActivityInstructions" role="dialog" tabindex="-1"><span data-dcnode-id="127" instrument_node="">
</span><div class="modal-dialog" data-dcnode-id="97"><span data-dcnode-id="126" instrument_node="">
</span><div class="modal-content" data-dcnode-id="99"><span data-dcnode-id="125" instrument_node="">
</span><div class="modal-header" data-dcnode-id="116"><span data-dcnode-id="124" instrument_node="">
</span><button aria-hidden="true" class="close" data-dcnode-id="122" data-dismiss="modal" type="button"><i class="fa fa-times" data-dcnode-id="123"></i></button><span data-dcnode-id="121" instrument_node="">
</span><h3 data-dcnode-id="118" id="ActivityInstructionsLabel"><i class="fa fa-cogs" data-dcnode-id="120"></i><span data-dcnode-id="119" instrument_node=""> Reinforcement Activities</span></h3><span data-dcnode-id="117" instrument_node="">
</span></div><span data-dcnode-id="115" instrument_node="">
</span><div class="modal-body" data-dcnode-id="101"><span data-dcnode-id="114" instrument_node="">
</span><p class="lead" data-dcnode-id="112"><span data-dcnode-id="113" instrument_node="">Use reinforcement activities to help your students remember the story. These activities are not just crafts and games.</span></p><span data-dcnode-id="111" instrument_node="">
</span><h4 data-dcnode-id="109"><span data-dcnode-id="110" instrument_node="">Age Groups</span></h4><span data-dcnode-id="108" instrument_node="">
			Each activity is geared towards either Early Elementary, Late Elementary, or All Ages. Of course, use your discretion as you know your students.
			
	        </span><h4 data-dcnode-id="106"><span data-dcnode-id="107" instrument_node="">Preparation</span></h4><span data-dcnode-id="105" instrument_node="">
	        Several days before you teach, choose the activities you want to do with your class. Take note of any supplies that are needed. You can place a check next to the name of the activity so that you can easily see which ones you are planning to use when you come back to Teach Us the Bible.
	        
	        </span><h4 data-dcnode-id="103"><span data-dcnode-id="104" instrument_node="">Scripture</span></h4><span data-dcnode-id="102" instrument_node="">
			Every activity has a Scripture that helps you see the tie-in from the activity to the story. Make sure to help the students see the tie-in so they don't think you are just playing a random game.
			
	      </span></div><span data-dcnode-id="100" instrument_node="">
</span></div><span data-dcnode-id="98" instrument_node="">
</span></div><span data-dcnode-id="96" instrument_node="">
</span></div><span data-dcnode-id="94" instrument_node="">
</span><div aria-hidden="true" aria-labelledby="QuestionInstructionsLabel" class="modal" data-dcnode-id="52" id="QuestionInstructions" role="dialog" tabindex="-1"><span data-dcnode-id="93" instrument_node="">
</span><div class="modal-dialog" data-dcnode-id="54"><span data-dcnode-id="92" instrument_node="">
</span><div class="modal-content" data-dcnode-id="56"><span data-dcnode-id="91" instrument_node="">
</span><div class="modal-header" data-dcnode-id="82"><span data-dcnode-id="90" instrument_node="">
</span><button aria-hidden="true" class="close" data-dcnode-id="88" data-dismiss="modal" type="button"><i class="fa fa-times" data-dcnode-id="89"></i></button><span data-dcnode-id="87" instrument_node="">
</span><h3 data-dcnode-id="84" id="QuestionInstructionsLabel"><i class="fa fa-clock-o" data-dcnode-id="86"></i><span data-dcnode-id="85" instrument_node=""> What to do when a child asks a question and you don't know the answer</span></h3><span data-dcnode-id="83" instrument_node="">
</span></div><span data-dcnode-id="81" instrument_node="">
</span><div class="modal-body" data-dcnode-id="58"><span data-dcnode-id="80" instrument_node="">
</span><p class="lead" data-dcnode-id="78"><span data-dcnode-id="79" instrument_node="">Children naturally have questions. And sometimes, we don't know the answer! Here's what to do*:</span></p><span data-dcnode-id="77" instrument_node="">
</span><ol data-dcnode-id="63"><span data-dcnode-id="76" instrument_node="">
</span><li data-dcnode-id="74"><span data-dcnode-id="75" instrument_node="">Ask the child to say more about their question.</span></li><span data-dcnode-id="73" instrument_node="">
</span><li data-dcnode-id="71"><span data-dcnode-id="72" instrument_node="">Ask them what they think the answer may be. Perhaps they have the right answer and they just need confirmation.</span></li><span data-dcnode-id="70" instrument_node="">
</span><li data-dcnode-id="68"><span data-dcnode-id="69" instrument_node="">Pose the question to the whole class and see what discussion ensues.</span></li><span data-dcnode-id="67" instrument_node="">
</span><li data-dcnode-id="65"><span data-dcnode-id="66" instrument_node="">If all else fails, tell them that you don't know the answer (this is okay!) and that you will get back to them next week, but only if they will also think about it and do some research during the week as well. For younger students, you might write down their question on a piece of paper and send it home with them. But above all, follow up with the student the next week or at the next opportunity and continue your discussion with your newfound information.</span></li><span data-dcnode-id="64" instrument_node="">
</span></ol><span data-dcnode-id="62" instrument_node="">
</span><em data-dcnode-id="60"><span data-dcnode-id="61" instrument_node="">(* Adapted from "Children's Ministry in the Way of Jesus", by David M. Csinos and Ivy Beckwith)</span></em><span data-dcnode-id="59" instrument_node="">
