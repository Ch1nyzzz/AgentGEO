9-1.5 1.3l.015.14s9.035 6.22 10 6.56c1.02-.395 9.985-6.7 9.985-6.7l-.015-.065z" data-dcnode-id="817" fill="#FFF"></path></svg></span><span class="a2a_label" data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">Email</span></span></a></div></div><p data-dcnode-id="807"><strong data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">PEGGY WEBER</span></strong></p><span data-dcnode-id="806" instrument_node="">
</span><p data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">When people think of the Ten Commandments, the words “covet” and “neighbor’s wife” comes to mind—or the image of Charlton Heston holding two tablets. Your students may think of the Ten Commandments as a list of “do nots”, a checklist for confession, or just another list to memorize. Yet there is a way to present the Ten Commandments in a positive way that will make a lasting impression on your students.</span></p><span data-dcnode-id="803" instrument_node="">
</span><p data-dcnode-id="798"><span data-dcnode-id="802" instrument_node="">Just as a soccer or baseball game has rules—</span><em data-dcnode-id="800"><span data-dcnode-id="801" instrument_node="">Thou shall swing at strikes; Thou shall stay on sides when playing forward in soccer</span></em><span data-dcnode-id="799" instrument_node="">—so too, does a faith-filled life. Let’s take a look at the roadmap God gave us through Moses.</span></p><span data-dcnode-id="797" instrument_node="">
</span><p data-dcnode-id="793" style="text-align: center;"><span data-dcnode-id="794" style="color: #0000ff; background-color: #ffffff;"><strong data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">ACTIVITY</span></strong></span></p><span data-dcnode-id="792" instrument_node="">
</span><p data-dcnode-id="789"><span data-dcnode-id="791" instrument_node="">Read each commandment in its traditional form. Tradition is good, and students should hear these words from Scripture. However, they also need to know what these words mean, especially when many people get tripped up by terms like “strange gods”.</span><img alt="" class="alignright wp-image-8190 size-medium td-animation-stack-type0-2" data-dcnode-id="790" height="300" sizes="(max-width: 199px) 100vw, 199px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.catechist.com/wp-content/uploads/2018/05/shutterstock_123837841-199x300.jpg&amp;raw" srcset="https://www.catechist.com/wp-content/uploads/2018/05/shutterstock_123837841-199x300.jpg 199w, https://www.catechist.com/wp-content/uploads/2018/05/shutterstock_123837841-278x420.jpg 278w, https://www.catechist.com/wp-content/uploads/2018/05/shutterstock_123837841.jpg 662w" width="199"></p><span data-dcnode-id="788" instrument_node="">
</span><p data-dcnode-id="782"><strong data-dcnode-id="786"><span data-dcnode-id="787" instrument_node="">1</span></strong><span data-dcnode-id="785" instrument_node="">.&nbsp;</span><strong data-dcnode-id="783"><span data-dcnode-id="784" instrument_node="">I am the Lord your God; you shall not have strange gods before me.</span></strong></p><span data-dcnode-id="781" instrument_node="">
</span><p data-dcnode-id="776"><span data-dcnode-id="780" instrument_node="">Ask students to make a list of what special things they have in their rooms that show who they are.&nbsp;</span><em data-dcnode-id="778"><span data-dcnode-id="779" instrument_node="">Do you have a sports poster? A picture of a family member? A statue of a dancer? Where is God?&nbsp;</span></em><span data-dcnode-id="777" instrument_node="">Suggest they find a spot for God in their room and observe the First Commandment by honoring the creator who gave us life and this wonderful world.</span></p><span data-dcnode-id="775" instrument_node="">
</span><p data-dcnode-id="772"><strong data-dcnode-id="773"><span data-dcnode-id="774" instrument_node="">2. You shall not take the name of the Lord your God in vain.</span></strong></p><span data-dcnode-id="771" instrument_node="">
</span><p data-dcnode-id="767"><span data-dcnode-id="770" instrument_node="">Explain that we should not use God’s name in a disrespectful manner.&nbsp;</span><em data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">How would you feel if someone said bad things and said swears around your mom or your dad? How do you think God feels when he hears those kinds of words coming from your mouth? Do you swear to fit in with your friends? How can you remember to think before you speak?</span></em></p><span data-dcnode-id="766" instrument_node="">
</span><p data-dcnode-id="763"><strong data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">3. Remember to keep holy the Lord’s Day.</span></strong></p><span data-dcnode-id="762" instrument_node="">
</span><p data-dcnode-id="759"><em data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">How many hours do you spend in school? How much time do you watch television or play video games? What makes a day special? Why is Sunday special?&nbsp;</span></em></p><span data-dcnode-id="758" instrument_node="">
</span><p data-dcnode-id="755"><strong data-dcnode-id="756"><span data-dcnode-id="757" instrument_node="">4. Honor thy father and mother.</span></strong></p><span data-dcnode-id="754" instrument_node="">
</span><p data-dcnode-id="749"><span data-dcnode-id="753" instrument_node="">Name some important honors: the academy awards, MVP for a sport, or even best speller at school. Explain that this use of the word&nbsp;</span><em data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">honor&nbsp;</span></em><span data-dcnode-id="750" instrument_node="">means recognizing the importance of parents as people who are guiding us and helping us grow. Encourage your students to honor their parents each day with a kind word or deed-and watch love flourish.</span></p><span data-dcnode-id="748" instrument_node="">
</span><p data-dcnode-id="745"><strong data-dcnode-id="746"><span data-dcnode-id="747" instrument_node="">5. Thou shalt not kill.</span></strong></p><span data-dcnode-id="744" instrument_node="">
</span><p data-dcnode-id="740"><span data-dcnode-id="743" instrument_node="">This commandment is not just about murder.&nbsp;</span><em data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">Have we “killed” someone’s soul with unkind words or actions? How have we wasted our time or life? What have we done that is destructive to life-abused our bodies, etc.?</span></em></p><span data-dcnode-id="739" instrument_node="">
</span><p data-dcnode-id="736"><strong data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">6. You shall not commit adultery.</span></strong></p><span data-dcnode-id="735" instrument_node="">
</span><p data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">Discuss the sacrament of marriage and the importance of being faithful. Depending on the age of your students, you can also talk about modesty, chastity, and respecting our bodies.</span></p><span data-dcnode-id="732" instrument_node="">
</span><p data-dcnode-id="729"><strong data-dcnode-id="730"><span data-dcnode-id="731" instrument_node="">7. You shall not steal.</span></strong></p><span data-dcnode-id="728" instrument_node="">
</span><p data-dcnode-id="718"><span data-dcnode-id="727" instrument_node="">Forget a discussion of shoplifting for now. Instead, focus on questions like&nbsp;</span><em data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">What do you give in life? How do you help others? How do you use your time for good?&nbsp;</span></em><span data-dcnode-id="724" instrument_node="">Read the parable of the talents (see Matthew 25: 14-30).&nbsp;</span><em data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">Do you bury them, share them, or grow them?&nbsp;</span></em><span data-dcnode-id="721" instrument_node="">Ask your students what they would do with one dollar.&nbsp;</span><em data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">Can you help the world with it? Buy a lottery ticket? Donate it to a worthy cause?</span></em></p><span data-dcnode-id="717" instrument_node="">
</span><p data-dcnode-id="714"><strong data-dcnode-id="715"><span data-dcnode-id="716" instrument_node="">8. You shall not bear false witness against your neighbor.</span></strong></p><span data-dcnode-id="713" instrument_node="">
</span><p data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">Talk about the hurtful nature of gossip and bullying, and how words can really harm. This is a good time to talk about what is appropriate to post on social media sites. Ask your students to write a compliment or words of praise about each classmate. The will see the power of kind words, and this will lead them to understand the harmfulness of mean ones.</span></p><span data-dcnode-id="710" instrument_node="">
</span><p data-dcnode-id="707"><strong data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">9. You shall not covet your neighbor’s wife.</span></strong></p><span data-dcnode-id="706" instrument_node="">
</span><p data-dcnode-id="704"><span data-dcnode-id="705" instrument_node="">This can be grouped with the Tenth Commandment.</span></p><span data-dcnode-id="703" instrument_node="">
</span><p data-dcnode-id="700"><strong data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">10. You shall not covet your neighbor’s goods.</span></strong></p><span data-dcnode-id="699" instrument_node="">
</span><p data-dcnode-id="695"><em data-dcnode-id="697"><span data-dcnode-id="698" instrument_node="">What does covet mean? What makes you want more? Do you look at others and wish you had their stuff?&nbsp;</span></em><span data-dcnode-id="696" instrument_node="">Open a magazine, or show some newspaper flyers, and discuss what companies are trying to sell. Have your students make a list of things they want. Ask them if they have ever given something away and felt really good. Explain the importance of counting one’s blessings and not worrying about what others have or wear.</span></p><span data-dcnode-id="694" instrument_node="">
</span><p data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">&nbsp;</span></p><span data-dcnode-id="691" instrument_node="">
</span><p data-dcnode-id="683"><strong data-dcnode-id="687"><span data-dcnode-id="688" style="color: #3366ff;"><span data-dcnode-id="689" style="background-color: #ffffff;"><span data-dcnode-id="690" instrument_node="">Peggy Weber&nbsp;</span></span></span></strong><span data-dcnode-id="684" style="color: #333333;"><span data-dcnode-id="685" style="background-color: #ffffff;"><span data-dcnode-id="686" instrument_node="">is a reporter and producer for Catholic Communications for the Diocese of Springfield, Mass.&nbsp;</span></span></span></p><span data-dcnode-id="682" instrument_node="">
