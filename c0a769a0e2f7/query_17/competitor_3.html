</span><p data-dcnode-id="2084"><span data-dcnode-id="2085" instrument_node="">We absolutely love teaching Bible memorization with ASL sign language for memory cues. There is not better way to help young children, especially preschoolers, learn God’s Word. This video was created by a homeschool mom on YouTube, check out her channel for more great ideas. </span></p><span data-dcnode-id="2083" instrument_node="">

</span><h2 data-dcnode-id="2079"><span data-dcnode-id="2080" instrument_node="">Child appropriate paraphrase of the Ten Commandments</span></h2><span data-dcnode-id="2078" instrument_node="">
</span><div class="schema-faq wp-block-yoast-faq-block" data-dcnode-id="2051"><div class="schema-faq-section" data-dcnode-id="2053"><strong class="schema-faq-question" data-dcnode-id="2076"><span data-dcnode-id="2077" instrument_node="">What are the 10 Commandments in simple terms?</span></strong><span data-dcnode-id="2075" instrument_node=""> </span><p class="schema-faq-answer" data-dcnode-id="2055"><span data-dcnode-id="2074" instrument_node="">1. Put God first</span><br data-dcnode-id="2073"><span data-dcnode-id="2072" instrument_node="">2. No fake gods</span><br data-dcnode-id="2071"><span data-dcnode-id="2070" instrument_node="">3. Respect God’s name</span><br data-dcnode-id="2069"><span data-dcnode-id="2068" instrument_node="">4. Respect God’s day of rest</span><br data-dcnode-id="2067"><span data-dcnode-id="2066" instrument_node="">5. Respect your parents</span><br data-dcnode-id="2065"><span data-dcnode-id="2064" instrument_node="">6. Do not kill people</span><br data-dcnode-id="2063"><span data-dcnode-id="2062" instrument_node="">7. Respect marriage</span><br data-dcnode-id="2061"><span data-dcnode-id="2060" instrument_node="">8. Do not steal</span><br data-dcnode-id="2059"><span data-dcnode-id="2058" instrument_node="">9. Do not lie</span><br data-dcnode-id="2057"><span data-dcnode-id="2056" instrument_node="">10. Do not be jealous  </span></p><span data-dcnode-id="2054" instrument_node=""> </span></div><span data-dcnode-id="2052" instrument_node=""> </span></div><span data-dcnode-id="2050" instrument_node="">

" instrument_node="">Go Fish Guys sing the 10 Commandment Song</span></a></li></ul><span data-dcnode-id="1862" instrument_node="">
</span><h4 data-dcnode-id="1860"><span data-dcnode-id="1861" instrument_node="">Why do God’s 10 commandments still matter?</span></h4><span data-dcnode-id="1859" instrument_node="">
</span><p data-dcnode-id="1846"><strong data-dcnode-id="1857"><span data-dcnode-id="1858" instrument_node="">The 10 Commandments</span></strong><span data-dcnode-id="1856" instrument_node=""> (</span><a aria-label=" (opens in a new tab)" data-dcnode-id="1854" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biblegateway.com/passage/%3Fsearch%3DExodus%2B20%26version%3DNIV" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1855" instrument_node="">Exodus 20:1–17 </span></a><span data-dcnode-id="1853" instrument_node="">(</span><a aria-label=" (opens in a new tab)" data-dcnode-id="1851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/exodus/20.htm" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1852" instrument_node="">compare 5 translations</span></a><span data-dcnode-id="1850" instrument_node="">) and </span><a aria-label=" (opens in a new tab)" data-dcnode-id="1848" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biblegateway.com/passage/%3Fsearch%3DDeuteronomy%2B5%3A4%25E2%2580%259321%26version%3DNIV" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1849" instrument_node="">Deuteronomy 5:4–21</span></a><span data-dcnode-id="1847" instrument_node="">) are key to understanding the Old Testament and by extension the ministry of Jesus. They show us God’s moral standard for how his people should live. This is a scripture passage that kids need to memorize, but language can get in the way. Here is our way to make them understandable for even preschool aged children. As kids mature they should learn the original Bible verses.</span></p><span data-dcnode-id="1845" instrument_node="">
</span><p data-dcnode-id="1835"><strong data-dcnode-id="1843"><span data-dcnode-id="1844" instrument_node="">God’s rules protect us from ourselves</span></strong><span data-dcnode-id="1842" instrument_node=""> – they are a guide to living a life of blessing in this fallen world. It’s important for </span><em data-dcnode-id="1840"><span data-dcnode-id="1841" instrument_node="">kids and families</span></em><span data-dcnode-id="1839" instrument_node=""> to learn the </span><em data-dcnode-id="1837"><span data-dcnode-id="1838" instrument_node="">God’s rules</span></em><span data-dcnode-id="1836" instrument_node=""> for life. Like everything in the Bible, the commandments show us how a moral lifestyle will protect us from danger and minimize suffering. We think this is a super important lesson for kids to learn at a very young age. </span></p><span data-dcnode-id="1834" instrument_node="">
</span><p data-dcnode-id="1827"><strong data-dcnode-id="1832"><span data-dcnode-id="1833" instrument_node="">God’s LAW lead us to Christ</span></strong><span data-dcnode-id="1831" instrument_node=""> because only he was the perfect example of keeping </span><em data-dcnode-id="1829"><span data-dcnode-id="1830" instrument_node="">God’s rules</span></em><span data-dcnode-id="1828" instrument_node="">. They are a tutor showing children how the life of obedience can be hard and only Jesus can empower us to live in a right relationship to our creator. It’s not about being a good moral person (it’s more important) because the commandments prepare our hearts to repent and accept Christ. This is the hope in teaching children what the Bible says.</span></p><span data-dcnode-id="1826" instrument_node="">

</span><a data-dcnode-id="1288" name="compare"><h2 data-dcnode-id="1289" id="10-commandments-for-kids" style="text-align:center"><span data-dcnode-id="1290" instrument_node="">Ten Commandments for Kids Paraphrase</span></h2></a><span data-dcnode-id="1287" instrument_node="">
</span><figure class="wp-block-table is-style-stripes" data-dcnode-id="1193"><table class="" data-dcnode-id="1194"><tbody data-dcnode-id="1195"><tr data-dcnode-id="1277"><th data-dcnode-id="1286"></th><th data-dcnode-id="1282"><span data-dcnode-id="1285" instrument_node="">Ten Commandments (NIrV) Exodus 20:1-17 </span><br data-dcnode-id="1284"><span data-dcnode-id="1283" instrument_node="">(real version)</span></th><th data-dcnode-id="1278"><span data-dcnode-id="1281" instrument_node="">10 Commandments for Kids</span><br data-dcnode-id="1280"><span data-dcnode-id="1279" instrument_node="">(paraphrase in simple terms) </span></th></tr><tr data-dcnode-id="1270"><td data-dcnode-id="1275"><span data-dcnode-id="1276" instrument_node="">–</span></td><td data-dcnode-id="1273"><span data-dcnode-id="1274" instrument_node="">Here are all the words God spoke. He said, “I am the Lord your God. I brought you out of Egypt. That is the land where you were slaves. </span></td><td data-dcnode-id="1271"><span data-dcnode-id="1272" instrument_node="">I am the God who saves.</span></td></tr><tr data-dcnode-id="1263"><td data-dcnode-id="1268"><span data-dcnode-id="1269" instrument_node="">1</span></td><td data-dcnode-id="1266"><span data-dcnode-id="1267" instrument_node="">“Do not put any other gods in place of me. </span></td><td data-dcnode-id="1264"><span data-dcnode-id="1265" instrument_node="">Put God first.</span></td></tr><tr data-dcnode-id="1256"><td data-dcnode-id="1261"><span data-dcnode-id="1262" instrument_node="">2</span></td><td data-dcnode-id="1259"><span data-dcnode-id="1260" instrument_node="">“Do not make for yourself statues of gods that look like anything in the sky. They may not look like anything on the earth or in the waters either. Do not bow down to them or worship them </span></td><td data-dcnode-id="1257"><span data-dcnode-id="1258" instrument_node="">Do not make fake gods.</span></td></tr><tr data-dcnode-id="1249"><td data-dcnode-id="1254"><span data-dcnode-id="1255" instrument_node="">3</span></td><td data-dcnode-id="1252"><span data-dcnode-id="1253" instrument_node="">Do not misuse the name of the Lord your God </span></td><td data-dcnode-id="1250"><span data-dcnode-id="1251" instrument_node="">Respect God’s name.</span></td></tr><tr data-dcnode-id="1242"><td data-dcnode-id="1247"><span data-dcnode-id="1248" instrument_node="">4</span></td><td data-dcnode-id="1245"><span data-dcnode-id="1246" instrument_node="">Remember to keep the Sabbath day holy. </span></td><td data-dcnode-id="1243"><span data-dcnode-id="1244" instrument_node="">Respect God’s day of rest.</span></td></tr><tr data-dcnode-id="1235"><td data-dcnode-id="1240"><span data-dcnode-id="1241" instrument_node="">5</span></td><td data-dcnode-id="1238"><span data-dcnode-id="1239" instrument_node="">Honor your father and mother. </span></td><td data-dcnode-id="1236"><span data-dcnode-id="1237" instrument_node="">Respect your parents.</span></td></tr><tr data-dcnode-id="1228"><td data-dcnode-id="1233"><span data-dcnode-id="1234" instrument_node="">6</span></td><td data-dcnode-id="1231"><span data-dcnode-id="1232" instrument_node="">Do not murder. </span></td><td data-dcnode-id="1229"><span data-dcnode-id="1230" instrument_node="">Do not kill people.</span></td></tr><tr data-dcnode-id="1221"><td data-dcnode-id="1226"><span data-dcnode-id="1227" instrument_node="">7</span></td><td data-dcnode-id="1224"><span data-dcnode-id="1225" instrument_node="">Do not commit adultery. </span></td><td data-dcnode-id="1222"><span data-dcnode-id="1223" instrument_node="">Respect marriage promises.</span></td></tr><tr data-dcnode-id="1214"><td data-dcnode-id="1219"><span data-dcnode-id="1220" instrument_node="">8</span></td><td data-dcnode-id="1217"><span data-dcnode-id="1218" instrument_node="">Do not steal</span></td><td data-dcnode-id="1215"><span data-dcnode-id="1216" instrument_node="">Do not steal.</span></td></tr><tr data-dcnode-id="1207"><td data-dcnode-id="1212"><span data-dcnode-id="1213" instrument_node="">9</span></td><td data-dcnode-id="1210"><span data-dcnode-id="1211" instrument_node="">Do not be a false witness against your neighbor. </span></td><td data-dcnode-id="1208"><span data-dcnode-id="1209" instrument_node="">Do not lie.</span></td></tr><tr data-dcnode-id="1200"><td data-dcnode-id="1205"><span data-dcnode-id="1206" instrument_node="">10</span></td><td data-dcnode-id="1203"><span data-dcnode-id="1204" instrument_node="">Do not want to have anything your neighbor owns. </span></td><td data-dcnode-id="1201"><span data-dcnode-id="1202" instrument_node="">Do not be jealous.</span></td></tr><tr data-dcnode-id="1196"><td data-dcnode-id="1199"></td><td data-dcnode-id="1198"></td><td data-dcnode-id="1197"></td></tr></tbody></table></figure><span data-dcnode-id="1192" instrument_node="">
</span><p data-dcnode-id="1190"><span data-dcnode-id="1191" instrument_node="">This is only a paraphrase of&nbsp;Exodus 20:1–17 and Deuteronomy 5:4–21 to help children understand. We suggest they learn the real version as soon as possible.</span></p><span data-dcnode-id="1189" instrument_node="">
</span><p data-dcnode-id="1166"><span data-dcnode-id="1188" instrument_node="">You can also compare the </span><strong data-dcnode-id="1186"><span data-dcnode-id="1187" instrument_node="">10 Commandments</span></strong><span data-dcnode-id="1185" instrument_node=""> </span><a data-dcnode-id="1183" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.esvbible.org/Exodus%2B20%253A1-17/"><span data-dcnode-id="1184" instrument_node="">English Standard Version</span></a><span data-dcnode-id="1182" instrument_node=""> or the </span><a data-dcnode-id="1180" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biblegateway.com/passage/%3Fsearch%3DExodus%2B20%3A1-17%26version%3DICB"><span data-dcnode-id="1181" instrument_node="">International Children’s Bible (ICB)</span></a><span data-dcnode-id="1179" instrument_node="">. We also think the </span><a data-dcnode-id="1177" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.biblestudytools.com/msg/exodus/passage/%3Fq%3Dexodus%2B20%3A1-17"><span data-dcnode-id="1178" instrument_node="">Message has a good paraphrase</span></a><span data-dcnode-id="1176" instrument_node="">. For more background, you can even read about the </span><strong data-dcnode-id="1173"><a data-dcnode-id="1174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ten_Commandments"><span data-dcnode-id="1175" instrument_node="">Ten Commandments</span></a></strong><a data-dcnode-id="1171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ten_Commandments"><span data-dcnode-id="1172" instrument_node=""> on </span></a><a data-dcnode-id="1170" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ten_Commandments"></a><a data-dcnode-id="1168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ten_Commandments"><span data-dcnode-id="1169" instrument_node="">Wikipedia</span></a><span data-dcnode-id="1167" instrument_node="">.</span></p><span data-dcnode-id="1165" instrument_node="">
</span><h3 class="has-text-align-center" data-dcnode-id="1161" id="Ten-Commandments-KJV"><span data-dcnode-id="1164" instrument_node="">The Ten Commandments in </span><a data-dcnode-id="1162" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//biblehub.com/kjv/exodus/20.htm"><span data-dcnode-id="1163" instrument_node="">KJV</span></a></h3><span data-dcnode-id="1160" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="1123"><p data-dcnode-id="1158"><span data-dcnode-id="1159" instrument_node="">EXODUS 20:1-17 KJV</span></p><p data-dcnode-id="1124"><span data-dcnode-id="1157" instrument_node="">1 And God spake all these words, saying,</span><br data-dcnode-id="1156"><span data-dcnode-id="1155" instrument_node="">2 I am the Lord thy God, which have brought thee out of the land of Egypt, out of the house of bondage.</span><br data-dcnode-id="1154"><span data-dcnode-id="1153" instrument_node="">3 Thou shalt have no other gods before me.</span><br data-dcnode-id="1152"><span data-dcnode-id="1151" instrument_node="">4 Thou shalt not make unto thee any graven image, or any likeness of any thing that is in heaven above, or that is in the earth beneath, or that is in the water under the earth.</span><br data-dcnode-id="1150"><span data-dcnode-id="1149" instrument_node="">5 Thou shalt not bow down thyself to them, nor serve them: for I the Lord thy God am a jealous God, visiting the iniquity of the fathers upon the children unto the third and fourth generation of them that hate me;</span><br data-dcnode-id="1148"><span data-dcnode-id="1147" instrument_node="">6 And shewing mercy unto thousands of them that love me, and keep my commandments.</span><br data-dcnode-id="1146"><span data-dcnode-id="1145" instrument_node="">7 Thou shalt not take the name of the Lord thy God in vain; for the Lord will not hold him guiltless that taketh his name in vain.</span><br data-dcnode-id="1144"><span data-dcnode-id="1143" instrument_node="">8 Remember the sabbath day, to keep it holy.</span><br data-dcnode-id="1142"><span data-dcnode-id="1141" instrument_node="">9 Six days shalt thou labour, and do all thy work:</span><br data-dcnode-id="1140"><span data-dcnode-id="1139" instrument_node="">10 But the seventh day is the sabbath of the Lord thy God: in it thou shalt not do any work, thou, nor thy son, nor thy daughter, thy manservant, nor thy maidservant, nor thy cattle, nor thy stranger that is within thy gates:</span><br data-dcnode-id="1138"><span data-dcnode-id="1137" instrument_node="">11 For in six days the Lord made heaven and earth, the sea, and all that in them is, and rested the seventh day: wherefore the Lord blessed the sabbath day, and hallowed it.</span><br data-dcnode-id="1136"><span data-dcnode-id="1135" instrument_node="">12 Honour thy father and thy mother: that thy days may be long upon the land which the Lord thy God giveth thee.</span><br data-dcnode-id="1134"><span data-dcnode-id="1133" instrument_node="">13 Thou shalt not kill.</span><br data-dcnode-id="1132"><span data-dcnode-id="1131" instrument_node="">14 Thou shalt not commit adultery.</span><br data-dcnode-id="1130"><span data-dcnode-id="1129" instrument_node="">15 Thou shalt not steal.</span><br data-dcnode-id="1128"><span data-dcnode-id="1127" instrument_node="">16 Thou shalt not bear false witness against thy neighbour.</span><br data-dcnode-id="1126"><span data-dcnode-id="1125" instrument_node="">17 Thou shalt not covet thy neighbour’s house, thou shalt not covet thy neighbour’s wife, nor his manservant, nor his maidservant, nor his ox, nor his ass, nor any thing that is thy neighbour’s.</span></p></blockquote><span data-dcnode-id="1122" instrument_node="">

riculum – </span><em data-dcnode-id="140"><span data-dcnode-id="141" instrument_node="">all 100% free online.</span></em></p><span data-dcnode-id="138" instrument_node="">
</span><p data-dcnode-id="127"><span data-dcnode-id="137" instrument_node="">We believe that </span><strong data-dcnode-id="135"><span data-dcnode-id="136" instrument_node="">God</span></strong><span data-dcnode-id="134" instrument_node=""> is the loving Father of all kids. It is HIS divine will that young people come to faith in </span><strong data-dcnode-id="132"><span data-dcnode-id="133" instrument_node="">Jesus Christ</span></strong><span data-dcnode-id="131" instrument_node=""> and find salvation through the Gospel and the work of the </span><strong data-dcnode-id="129"><span data-dcnode-id="130" instrument_node="">Holy Spirit</span></strong><span data-dcnode-id="128" instrument_node=""> to bring them to faith.</span></p><span data-dcnode-id="126" instrument_node="">
</span><p data-dcnode-id="124"><span data-dcnode-id="125" instrument_node="">Our website has teaching material for children of all aged – starting with the church nursery (age 0-1 years old), toddlers (age 2-3 years old), preschool (age 4-5 years old), young elementary (age 6-8 years old), older elementary (age 9-10 years old), and preteen youth ministry groups (age 11-12 years old).</span></p><span data-dcnode-id="123" instrument_node="">
</span><p data-dcnode-id="118"><span data-dcnode-id="122" instrument_node="">We believe that children and parents benefit from a&nbsp; strong Christian education program in the church. Every kids church ministry deserves the very best resources for </span><em data-dcnode-id="120"><span data-dcnode-id="121" instrument_node="">teaching God’s Word</span></em><span data-dcnode-id="119" instrument_node="">, even when they don’t have the financial resources.</span></p><span data-dcnode-id="117" instrument_node="">
</span><p data-dcnode-id="115"><span data-dcnode-id="116" instrument_node="">Every week, thousands of churches use our Bible lessons, craft ideas, printable resources, and coloring pages to teach kids the Christian faith.</span></p><span data-dcnode-id="114" instrument_node="">
