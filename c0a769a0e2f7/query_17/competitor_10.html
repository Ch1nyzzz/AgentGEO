</span><h1 data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">The Ten Commandments for Kids</span></h1><span data-dcnode-id="708" instrument_node="">
</span><div class="block" data-dcnode-id="693"><span data-dcnode-id="707" instrument_node="">
</span><p data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">The Game Quiz below is to help little children and kids learn the Ten Commandments but first here is a little more information on the Ten Commandments for you kids to help you learn them better and understand why God has given these ten rules to live by.</span></p><span data-dcnode-id="704" instrument_node="">
</span><p data-dcnode-id="698"><span data-dcnode-id="703" instrument_node="">The Bible calls these rules </span><strong data-dcnode-id="700"><a data-dcnode-id="701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.the-ten-commandments.org/the-ten-commandments.html"><span data-dcnode-id="702" instrument_node="">the Ten Commandments</span></a></strong><span data-dcnode-id="699" instrument_node=""> and they are found in Exodus chapter 20.</span></p><span data-dcnode-id="697" instrument_node="">
</span><p data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">Below are the Ten Commandments from the Bible. On the right hand side below are the Ten Commandments as they are found in the King James Version of the Bible, and on the left hand side they are written more simply so you kids and little children can more easily understand them.</span></p><span data-dcnode-id="694" instrument_node="">

</span><table border="1" cellpadding="4" cellspacing="0" data-dcnode-id="544"><tbody data-dcnode-id="545"><tr class="tdtop" data-dcnode-id="677"><td data-dcnode-id="687"><strong data-dcnode-id="688"><span data-dcnode-id="689" instrument_node="">No.</span></strong></td><td class="tdwidth" data-dcnode-id="683"><strong data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">Exodus 20:2-17</span></strong></td><td class="tdwidth" data-dcnode-id="679"><strong data-dcnode-id="680"><span data-dcnode-id="681" instrument_node="">Ten Commandments For Kids</span></strong></td></tr><tr data-dcnode-id="664"><td class="center" data-dcnode-id="672"><strong data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">1</span></strong></td><td class="justify" data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">2 I am the LORD your God, which have brought you out of the land of Egypt, out of the house of bondage. 3 You shall have no other gods before me.</span></td><td class="green" data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">Put God first.</span></td></tr><tr data-dcnode-id="651"><td class="center" data-dcnode-id="659"><strong data-dcnode-id="660"><span data-dcnode-id="661" instrument_node="">2</span></strong></td><td class="justify" data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">4 You shall not make unto you any graven image, or any likeness of any thing that is in heaven above, or that is in the earth beneath, or that is in the water under the earth: 5 You shall not bow down thyself to them, nor serve them: for I the LORD your God am a jealous God, visiting the iniquity of the fathers upon the children unto the third and fourth generation of them that hate me; 6 And showing mercy unto thousands of them that love me, and keep my Commandments.</span></td><td class="green" data-dcnode-id="653"><span data-dcnode-id="654" instrument_node="">Worship God only.</span></td></tr><tr data-dcnode-id="638"><td class="center" data-dcnode-id="646"><strong data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">3</span></strong></td><td class="justify" data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">7 You shall not take the name of the LORD your God in vain; for the LORD will not hold him guiltless that taketh his name in vain.</span></td><td class="green" data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">Use God's name with respect.</span></td></tr><tr data-dcnode-id="625"><td class="center" data-dcnode-id="633"><strong data-dcnode-id="634"><span data-dcnode-id="635" instrument_node="">4</span></strong></td><td class="justify" data-dcnode-id="630"><span data-dcnode-id="631" instrument_node="">8 Remember the sabbath day, to keep it holy. 9 Six days shall you labour, and do all your work: 10 But the seventh day is the sabbath of the LORD your God: in it you shall not do any work, you, nor your son, nor your daughter, your manservant, nor your maidservant, nor your cattle, nor your stranger that is within your gates: 11 For in six days the LORD made heaven and earth, the sea, and all that in them is, and rested the seventh day: wherefore the LORD blessed the sabbath day, and hallowed it.</span></td><td class="green" data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">Remember God's Sabbath.</span></td></tr><tr data-dcnode-id="612"><td class="center" data-dcnode-id="620"><strong data-dcnode-id="621"><span data-dcnode-id="622" instrument_node="">5</span></strong></td><td class="justify" data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">12 Honour your father and your mother: that your days may be long upon the land which the LORD your God giveth you.</span></td><td class="green" data-dcnode-id="614"><span data-dcnode-id="615" instrument_node="">Respect your parents.</span></td></tr><tr data-dcnode-id="599"><td class="center" data-dcnode-id="607"><strong data-dcnode-id="608"><span data-dcnode-id="609" instrument_node="">6</span></strong></td><td data-dcnode-id="604"><span data-dcnode-id="605" instrument_node="">13 You shall not kill.</span></td><td class="green" data-dcnode-id="601"><span data-dcnode-id="602" instrument_node="">Do not hurt other people.</span></td></tr><tr data-dcnode-id="586"><td class="center" data-dcnode-id="594"><strong data-dcnode-id="595"><span data-dcnode-id="596" instrument_node="">7</span></strong></td><td data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">14 You shall not commit adultery.</span></td><td class="green" data-dcnode-id="588"><span data-dcnode-id="589" instrument_node="">Be faithful in marriage.</span></td></tr><tr data-dcnode-id="573"><td class="center" data-dcnode-id="581"><strong data-dcnode-id="582"><span data-dcnode-id="583" instrument_node="">8</span></strong></td><td data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">15 You shall not steal.</span></td><td class="green" data-dcnode-id="575"><span data-dcnode-id="576" instrument_node="">Do not steal.</span></td></tr><tr data-dcnode-id="560"><td class="center" data-dcnode-id="568"><strong data-dcnode-id="569"><span data-dcnode-id="570" instrument_node="">9</span></strong></td><td class="justify" data-dcnode-id="565"><span data-dcnode-id="566" instrument_node="">16 You shall not bear false witness against your neighbour.</span></td><td class="green" data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">Do not lie.</span></td></tr><tr data-dcnode-id="547"><td class="center" data-dcnode-id="555"><strong data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">10</span></strong></td><td class="justify" data-dcnode-id="552"><span data-dcnode-id="553" instrument_node="">17 You shall not covet your neighbour's house, you shall not covet your neighbour's wife, nor his manservant, nor his maidservant, nor his ox, nor his ass, nor any thing that is your neighbour's.</span></td><td class="green" data-dcnode-id="549"><span data-dcnode-id="550" instrument_node="">Do not be envious of others.</span></td></tr></tbody></table><span data-dcnode-id="543" instrument_node="">
</span><div class="block" data-dcnode-id="427"><span data-dcnode-id="542" instrument_node="">
</span><p data-dcnode-id="537"><span data-dcnode-id="541" instrument_node="">Sometimes God's Ten Commandments are divided into two </span><strong data-dcnode-id="539"><span data-dcnode-id="540" instrument_node="">BIG</span></strong><span data-dcnode-id="538" instrument_node=""> rules.</span></p><span data-dcnode-id="536" instrument_node="">
</span><p data-dcnode-id="528"><strong data-dcnode-id="534"><span data-dcnode-id="535" instrument_node="">RULE ONE:</span></strong><span data-dcnode-id="533" instrument_node=""> Love God with all your heart, soul and might.</span><br data-dcnode-id="532"><span data-dcnode-id="531" instrument_node="">
</span><em data-dcnode-id="529"><span data-dcnode-id="530" instrument_node="">(Matthew 22:36-38 Deuteronomy 6:5)</span></em></p><span data-dcnode-id="527" instrument_node="">
</span><p data-dcnode-id="519"><strong data-dcnode-id="525"><span data-dcnode-id="526" instrument_node="">RULE TWO:</span></strong><span data-dcnode-id="524" instrument_node=""> Love others as much as you love yourself.</span><br data-dcnode-id="523"><span data-dcnode-id="522" instrument_node="">
</span><em data-dcnode-id="520"><span data-dcnode-id="521" instrument_node="">(Matthew 22:39; Leviticus 19:18; James 2:8)</span></em></p><span data-dcnode-id="518" instrument_node="">
</span><p data-dcnode-id="503"><span data-dcnode-id="517" instrument_node="">Both these two </span><strong data-dcnode-id="515"><span data-dcnode-id="516" instrument_node="">BIG</span></strong><span data-dcnode-id="514" instrument_node=""> rules are commands to </span><strong data-dcnode-id="512"><span data-dcnode-id="513" instrument_node="">LOVE</span></strong><span data-dcnode-id="511" instrument_node=""> because God </span><strong data-dcnode-id="509"><span data-dcnode-id="510" instrument_node="">IS</span></strong><span data-dcnode-id="508" instrument_node=""> love.</span><br data-dcnode-id="507"><span data-dcnode-id="506" instrument_node="">
</span><em data-dcnode-id="504"><span data-dcnode-id="505" instrument_node="">(I John 4:8, 16; I John 5:3)</span></em></p><span data-dcnode-id="502" instrument_node="">
</span><p data-dcnode-id="496"><span data-dcnode-id="501" instrument_node="">God wants us to keep the Ten Commandments because He loves us and wants us to live happy lives.</span><br data-dcnode-id="500"><span data-dcnode-id="499" instrument_node="">
</span><em data-dcnode-id="497"><span data-dcnode-id="498" instrument_node="">(Proverbs 29:18)</span></em></p><span data-dcnode-id="495" instrument_node="">
</span><p data-dcnode-id="486"><span data-dcnode-id="494" instrument_node="">A study of the Ten Commandments will teach us </span><strong data-dcnode-id="492"><span data-dcnode-id="493" instrument_node="">HOW</span></strong><span data-dcnode-id="491" instrument_node=""> to love God and our neighbour (mankind).</span><br data-dcnode-id="490"><span data-dcnode-id="489" instrument_node="">
</span><em data-dcnode-id="487"><span data-dcnode-id="488" instrument_node="">(Romans 7:7)</span></em></p><span data-dcnode-id="485" instrument_node="">
</span><p data-dcnode-id="483"><span data-dcnode-id="484" instrument_node="">You see, the Ten Commandments are like a mirror. They show us how bad we are and how we need to be clean before the Day of Judgment. That is the Day God will punish people who have broken the Ten Commandments. They will be sent to a place called “Hell” which is a place where God doesn't want people to go.</span></p><span data-dcnode-id="482" instrument_node="">
</span><p data-dcnode-id="480"><span data-dcnode-id="481" instrument_node="">God doesn't want you to be punished. He so loves you that He made a way for you to be clean before Judgment Day.</span></p><span data-dcnode-id="479" instrument_node="">
</span><p data-dcnode-id="477"><span data-dcnode-id="478" instrument_node="">To show you what a wonderful thing God did, listen to this short story.</span></p><span data-dcnode-id="476" instrument_node="">
</span><p data-dcnode-id="471"><span data-dcnode-id="475" instrument_node="">A man had a son who was </span><strong data-dcnode-id="473"><span data-dcnode-id="474" instrument_node="">really</span></strong><span data-dcnode-id="472" instrument_node=""> bad. He did many bad things, including lying and stealing and found himself in trouble with the police. They said he had to pay a $10,000 fine or go to prison. The son didn't have any money and was about to go to prison.</span></p><span data-dcnode-id="470" instrument_node="">
</span><p data-dcnode-id="465"><span data-dcnode-id="469" instrument_node="">We are like that son. But God came down to earth and paid our fine by dying on the Cross. Jesus took our punishment on Himself. Then He rose from the dead. That means that we don't have to be punished by God. </span><strong data-dcnode-id="467"><span data-dcnode-id="468" instrument_node="">We can live with Him forever!</span></strong><span data-dcnode-id="466" instrument_node=""> This also shows us how much God loves us.</span></p><span data-dcnode-id="464" instrument_node="">
</span><p data-dcnode-id="457"><span data-dcnode-id="463" instrument_node="">So what should you do? Ask God to forgive you for any of the Ten Commandments you have broken (this is called “</span><strong data-dcnode-id="461"><span data-dcnode-id="462" instrument_node="">sin</span></strong><span data-dcnode-id="460" instrument_node="">”) and then give your life to Jesus. Read Psalm 51 and make it your own prayer. When you do that, you will have God's promise that you are forgiven and will live forever. Then read your Bible every day (it's full of fantastic stories. Start with the Gospel of John) and obey what you read. </span><strong data-dcnode-id="458"><span data-dcnode-id="459" instrument_node="">God will never leave you!</span></strong></p><span data-dcnode-id="456" instrument_node="">
</span><p class="tdtop" data-dcnode-id="453"><strong data-dcnode-id="454"><span data-dcnode-id="455" instrument_node="">How well do you kids know the Ten Commandments? Read the sad statistics below.</span></strong></p><span data-dcnode-id="452" instrument_node="">
</span><ul data-dcnode-id="429"><span data-dcnode-id="451" instrument_node="">
</span><li data-dcnode-id="449"><span data-dcnode-id="450" instrument_node="">14% of Americans can accurately name all Ten Commandments</span></li><span data-dcnode-id="448" instrument_node="">
</span><li data-dcnode-id="446"><span data-dcnode-id="447" instrument_node="">25% could name all seven ingredients of a well known hamburger.</span></li><span data-dcnode-id="445" instrument_node="">
</span><li data-dcnode-id="443"><span data-dcnode-id="444" instrument_node="">“Thou shalt not kill,” was known to fewer than six in ten Americans.</span></li><span data-dcnode-id="442" instrument_node="">
</span><li data-dcnode-id="440"><span data-dcnode-id="441" instrument_node="">Less than half (45%) can recall the Commandment to “Honour thy father and mother.”</span></li><span data-dcnode-id="439" instrument_node="">
</span><li data-dcnode-id="437"><span data-dcnode-id="438" instrument_node="">Seven of the Ten Commandments are familiar to less than half of Americans, including the more commonly recited, “Honour thy father and thy mother” and “Remember the Sabbath.”</span></li><span data-dcnode-id="436" instrument_node="">
</span><li data-dcnode-id="434"><span data-dcnode-id="435" instrument_node="">Two of the least recalled names from a very well known family TV show (43%), were more familiar to Americans than the least recalled Commandments, “Remember the Sabbath” (34%) and “Do not make any false idols” (29%).</span></li><span data-dcnode-id="433" instrument_node="">
</span><li data-dcnode-id="431"><span data-dcnode-id="432" instrument_node="">Even those who attend a place of worship at least once a week have trouble naming all Ten Commandments. “Thou shalt not kill” (70%) and “Thou shalt not steal” (69%).</span></li><span data-dcnode-id="430" instrument_node="">
</span></ul><span data-dcnode-id="428" instrument_node="">
</span></div><span data-dcnode-id="426" instrument_node="">
</span><h2 data-dcnode-id="424"><span data-dcnode-id="425" instrument_node="">The Ten Commandments Quiz for Kids – Can you Name The Ten Commandments?</span></h2><span data-dcnode-id="423" instrument_node="">
</span><div class="block" data-dcnode-id="408"><span data-dcnode-id="422" instrument_node="">
</span><p data-dcnode-id="420"><span data-dcnode-id="421" instrument_node="">To play the quiz, drag the blank stone or the words attached to the blank stone over the stone with the correct number that matches the Commandment number from the Ten Commandments. Too many wrong answers will result in the golden calf picture being fully drawn and the game will be over and lost.</span></p><span data-dcnode-id="419" instrument_node="">
