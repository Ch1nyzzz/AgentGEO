</span><h1 data-dcnode-id="1535" style="text-align: center"><span data-dcnode-id="1536" style="color: rgb(163, 0, 0);"><span data-dcnode-id="1537" instrument_node="">Ten Commandments For Children</span></span></h1><span data-dcnode-id="1534" instrument_node="">
</span><h3 data-dcnode-id="1532" style="text-align: center"><span data-dcnode-id="1533" instrument_node="">Bible Study Lesson 5.16</span></h3><span data-dcnode-id="1531" instrument_node="">
</span><span data-dcnode-id="1529" instrument_node="">
</span><span data-dcnode-id="1527" instrument_node="">
</span><span data-dcnode-id="1524" instrument_node="">
</span><br data-dcnode-id="1522"><br data-dcnode-id="1521"><span data-dcnode-id="1520" instrument_node="">
</span><p data-dcnode-id="1505" style="text-align: justify;"><span data-dcnode-id="1517" style="font-size: 15.75px;"><b data-dcnode-id="1518"><span data-dcnode-id="1519" instrument_node="">Ten Commandments For Children Bible Verses:</span></b></span><br data-dcnode-id="1516"><span data-dcnode-id="1515" instrument_node="">Jesus said to him, </span><em data-dcnode-id="1513"><span data-dcnode-id="1514" instrument_node="">"You shall love the Lord your God with all your heart, with all your soul, and with all your mind.</span></em><span data-dcnode-id="1512" instrument_node=""> </span><em data-dcnode-id="1510"><span data-dcnode-id="1511" instrument_node="">This is the great and first commandment. A second is like it, You shall love your neighbor as yourself."</span></em><span data-dcnode-id="1509" instrument_node=""> </span><a class="rtBibleRef" data-dcnode-id="1507" data-purpose="bible-reference" data-reference="Matt 22.37-39" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bible.faithlife.com/bible/esv/Matt%252022.37-39" rel="noopener" target="_blank"><span data-dcnode-id="1508" instrument_node="">Matthew 22:37-39</span></a><span data-dcnode-id="1506" instrument_node=""> NHEB.</span></p><span data-dcnode-id="1504" instrument_node="">
</span><span data-dcnode-id="1502" instrument_node="">
</span><div data-dcnode-id="1497" style="float:left;padding: 0 22px 0 0;"><span data-dcnode-id="1499" instrument_node=""> </span></div><span data-dcnode-id="1496" instrument_node="">
</span><span data-dcnode-id="1494" instrument_node="">
</span><p data-dcnode-id="1447" style="text-align: justify;"><span data-dcnode-id="1493" instrument_node="">You're invited to learn more about the (click) </span><a data-dcnode-id="1491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.graspinggod.com/list-of-the-ten-commandments.html" target="_blank"><span data-dcnode-id="1492" instrument_node="">Laws of Christ</span></a><span data-dcnode-id="1490" instrument_node="">.</span><br data-dcnode-id="1489"><br data-dcnode-id="1488"><span data-dcnode-id="1485" style="font-size: 15.75px;"><b data-dcnode-id="1486"><span data-dcnode-id="1487" instrument_node="">Preliminary Bible Study Questions:</span></b></span><br data-dcnode-id="1484"><span data-dcnode-id="1483" instrument_node="">1) Why do people have to obey God?</span><br data-dcnode-id="1482"><span data-dcnode-id="1481" instrument_node="">2) To whom did God give the 10 Commandments?</span><br data-dcnode-id="1480"><span data-dcnode-id="1479" instrument_node="">3) How do kids keep the Ten Commandments?</span><br data-dcnode-id="1478"><br data-dcnode-id="1477"><span data-dcnode-id="1476" instrument_node="">Kids are so very special. God loves them all.</span><br data-dcnode-id="1475"><br data-dcnode-id="1474"><span data-dcnode-id="1473" instrument_node="">God yearns for kids to come to him for a good life on earth and eternal life in heaven. Jesus said, </span><em data-dcnode-id="1471"><span data-dcnode-id="1472" instrument_node="">"In the same way, it is not my heavenly Father's will that even one of these little ones should perish"</span></em><span data-dcnode-id="1470" instrument_node=""> (</span><a class="rtBibleRef" data-dcnode-id="1468" data-purpose="bible-reference" data-reference="Matt 18.14" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bible.faithlife.com/bible/esv/Matt%252018.14" rel="noopener" target="_blank"><span data-dcnode-id="1469" instrument_node="">Matthew 18:14</span></a><span data-dcnode-id="1467" instrument_node="">).</span><br data-dcnode-id="1466"><br data-dcnode-id="1465"><span data-dcnode-id="1464" instrument_node="">God loves creating kids (</span><a class="rtBibleRef" data-dcnode-id="1462" data-purpose="bible-reference" data-reference="Ps 139.13-16" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bible.faithlife.com/bible/esv/Ps%2520139.13-16" rel="noopener" target="_blank"><span data-dcnode-id="1463" instrument_node="">Psalm 139:13-16</span></a><span data-dcnode-id="1461" instrument_node="">) and He loves creating a new heart in them by his Holy Spirit (</span><a class="rtBibleRef" data-dcnode-id="1459" data-purpose="bible-reference" data-reference="Phil 1.6" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bible.faithlife.com/bible/esv/Phil%25201.6" rel="noopener" target="_blank"><span data-dcnode-id="1460" instrument_node="">Philippians 1:6</span></a><span data-dcnode-id="1458" instrument_node="">).</span><br data-dcnode-id="1457"><br data-dcnode-id="1456"><span data-dcnode-id="1455" instrument_node="">Nothing makes God more pleased than when his love and power changes a person from the inside out (</span><a class="rtBibleRef" data-dcnode-id="1453" data-purpose="bible-reference" data-reference="2 Cor 15.7" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bible.faithlife.com/bible/esv/2%2520Cor%252015.7" rel="noopener" target="_blank"><span data-dcnode-id="1454" instrument_node="">2 Corinthians 15:7</span></a><span data-dcnode-id="1452" instrument_node="">). </span><br data-dcnode-id="1451"><br data-dcnode-id="1450"><span data-dcnode-id="1449" instrument_node="">Today's lesson will teach children the keys to understanding their relationship with God. </span><br data-dcnode-id="1448"></p><span data-dcnode-id="1446" instrument_node="">
</span><h3 data-dcnode-id="1444"><span data-dcnode-id="1445" instrument_node="">Ten Commandments For Children - History</span></h3><span data-dcnode-id="1443" instrument_node="">
</span><div class="ImageBlock ImageBlockRight" data-dcnode-id="1441"><img data-dcnode-id="1442" data-pin-media="http://www.graspinggod.com/images/Girl-Closeup-BW.jpg" height="318" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.graspinggod.com/images/xGirl-Closeup-BW.jpg.pagespeed.ic.4RUMF4eEdT.jpg&amp;raw" style="width: 244px; height: auto; max-width: none;" width="244"></div><span data-dcnode-id="1440" instrument_node="">
</span><p data-dcnode-id="1410" style="text-align: justify;"><span data-dcnode-id="1439" instrument_node="">Let's start with some background information so we can understand the need for the Ten Commandments for children, and adults, too! The story about God and man's relationship is fascinating. We draw all of our information from the words of God found in the Bible.</span><br data-dcnode-id="1438"><br data-dcnode-id="1437"><span data-dcnode-id="1436" instrument_node="">God tells us in his word that He created Adam and Eve in the Garden of Eden and they were good people. They perfectly loved God and each other. They obeyed their Creator, they named His animals, and their lives were good.</span><br data-dcnode-id="1435"><br data-dcnode-id="1434"><span data-dcnode-id="1433" instrument_node="">One day Adam and Eve disobeyed God, who told them to not eat the fruit from a certain special tree. God is always good, and He expects people to be good, like Him. Creatures always must obey their Creator. The two people ate the fruit, unfortunately, so God had to punish Adam and Eve. </span><br data-dcnode-id="1432"><br data-dcnode-id="1431"><span data-dcnode-id="1430" instrument_node="">The worst punishment Adam and Eve received was God removing His constant presence from the Garden of Eden. The warm relationship between God and Adam and Eve was broken. In fact, all people since Adam and Eve also disobey God, including me and you. </span><b data-dcnode-id="1428"><span data-dcnode-id="1429" instrument_node="">Breaking God's Law is called sin. All people are sinners</span></b><span data-dcnode-id="1427" instrument_node=""> (</span><a class="rtBibleRef" data-dcnode-id="1425" data-purpose="bible-reference" data-reference="Rom 3.23" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bible.faithlife.com/bible/esv/Rom%25203.23" rel="noopener" target="_blank"><span data-dcnode-id="1426" instrument_node="">Romans 3:23</span></a><span data-dcnode-id="1424" instrument_node="">). Sin also brought sickness and death. God did not create people to die, but their sin caused both disease and death. </span><br data-dcnode-id="1423"><br data-dcnode-id="1422"><span data-dcnode-id="1421" instrument_node="">Awhile later, people became so bad that God became very angry. He sent a flood to destroy all people and animals. However, because He loves his creation He allowed Noah, Noah's family, and two animals of every type to survive the flood. He told Noah to build an Ark, which later saved them. Because </span><a data-dcnode-id="1419" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.graspinggod.com/noahs-ark.html" target="_blank"><span data-dcnode-id="1420" instrument_node="">God saved Noah</span></a><span data-dcnode-id="1418" instrument_node="">, you and I are alive today!</span><br data-dcnode-id="1417"><br data-dcnode-id="1416"><span data-dcnode-id="1415" instrument_node="">Sometime after the great flood, God called </span><a data-dcnode-id="1413" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.graspinggod.com/abraham-bible.html" target="_blank"><span data-dcnode-id="1414" instrument_node="">a man named Abraham</span></a><span data-dcnode-id="1412" instrument_node=""> to begin a nation of chosen people who would love Him. Abraham and his wife, Sarah, started the Hebrew nation. The Hebrews grew in number, but they became slaves to the Egyptians. But, because they loved God, He blessed them and the nation grew larger while in slavery.</span><br data-dcnode-id="1411"></p><span data-dcnode-id="1409" instrument_node="">
</span><div class="ImageBlock ImageBlockLeft" data-dcnode-id="1407"><img data-dcnode-id="1408" data-pin-media="http://www.graspinggod.com/images/Ten-Commandments-Podium.jpg" height="117" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.graspinggod.com/images/xTen-Commandments-Podium.jpg.pagespeed.ic.0mUfi3LFmw.jpg&amp;raw" style="width: 172px; height: auto; max-width: none;" width="172"></div><span data-dcnode-id="1406" instrument_node="">
</span><p data-dcnode-id="1392" style="text-align: justify;"><span data-dcnode-id="1405" instrument_node="">God chose </span><a data-dcnode-id="1403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.graspinggod.com/life-of-moses.html" target="_blank"><span data-dcnode-id="1404" instrument_node="">a man named Moses</span></a><span data-dcnode-id="1402" instrument_node="">
 to lead his beloved people out of Egypt and into the Promised Land. The
 Promised Land was a beautiful land where God wanted his loved ones to 
settle down. </span><b data-dcnode-id="1400"><span data-dcnode-id="1401" instrument_node="">While in the desert, God wrote and then gave Moses the 10 Commandments on stone tablets.</span></b><span data-dcnode-id="1399" instrument_node=""> </span><br data-dcnode-id="1398"><br data-dcnode-id="1397"><span data-dcnode-id="1396" instrument_node="">God
 expected the people who loved Him to obey the Ten Commandments, and for
 children, that means He wanted them to obey both Him and their parents.
 Unfortunately, things didn't work out so well. </span><br data-dcnode-id="1395"><br data-dcnode-id="1394"><span data-dcnode-id="1393" instrument_node="">Let's now learn about someone who could and would obey God.</span></p><span data-dcnode-id="1391" instrument_node="">
</span><h3 data-dcnode-id="1389"><span data-dcnode-id="1390" instrument_node="">Ten Commandments For Children - Jesus</span></h3><span data-dcnode-id="1388" instrument_node="">
</span><div class="ImageBlock ImageBlockRight" data-dcnode-id="1386"><img data-dcnode-id="1387" data-pin-media="http://www.graspinggod.com/images/12_Palm_Sunday_Jesus_Smiling.jpg" height="189" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.graspinggod.com/images/x12_Palm_Sunday_Jesus_Smiling.jpg.pagespeed.ic.dQN3aJ9xLY.jpg&amp;raw" style="width: 244px; height: auto; max-width: none;" width="244"></div><span data-dcnode-id="1385" instrument_node="">
</span><p data-dcnode-id="1349" style="text-align: justify;"><span data-dcnode-id="1384" instrument_node="">The chosen people, the Hebrews, were always breaking God's Law, the Ten Commandments. Most of the Hebrews didn't love God with all of their heart, and they would choose to sin. This made God sad and angry. </span><b data-dcnode-id="1382"><span data-dcnode-id="1383" instrument_node="">Every time a person sins God is hurt.</span></b><span data-dcnode-id="1381" instrument_node=""> </span><br data-dcnode-id="1380"><br data-dcnode-id="1379"><span data-dcnode-id="1378" instrument_node="">God's wonderful love for his people, though, led Him to do something really neat. God's Son, Jesus, came to earth. He was born to his mother, Mary. Jesus grew up, loving and obeying God his Father his entire life. He lived perfectly, pleasing his Father. Yeh! Finally, somebody was willing and able to obey God.</span><br data-dcnode-id="1377"><br data-dcnode-id="1376"><span data-dcnode-id="1375" instrument_node="">Mean people in the world, sadly, killed Jesus by punishing him and hanging him on a cross. They were really bad people who did a terrible thing (</span><a class="rtBibleRef" data-dcnode-id="1373" data-purpose="bible-reference" data-reference="Acts 7.51-53" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bible.faithlife.com/bible/esv/Acts%25207.51-53" rel="noopener" target="_blank"><span data-dcnode-id="1374" instrument_node="">Acts 7:51-53</span></a><span data-dcnode-id="1372" instrument_node="">).</span><br data-dcnode-id="1371"><br data-dcnode-id="1370"><span data-dcnode-id="1369" instrument_node="">God made something wonderful come of the trajedy. He accepted Jesus' death as a sacrifice for people's sins. He also gave Jesus life again, by raising him from the dead (</span><a class="rtBibleRef" data-dcnode-id="1367" data-purpose="bible-reference" data-reference="1 Cor 15.20" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bible.faithlife.com/bible/esv/1%2520Cor%252015.20" rel="noopener" target="_blank"><span data-dcnode-id="1368" instrument_node="">1 Corinthians 15:20</span></a><span data-dcnode-id="1366" instrument_node="">). God will raise all people who love Him from the dead, including you and me! (</span><a class="rtBibleRef" data-dcnode-id="1364" data-purpose="bible-reference" data-reference="1 Cor 15.23" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bible.faithlife.com/bible/esv/1%2520Cor%252015.23" rel="noopener" target="_blank"><span data-dcnode-id="1365" instrument_node="">1 Corinthians 15:23</span></a><span data-dcnode-id="1363" instrument_node="">).</span><br data-dcnode-id="1362"><br data-dcnode-id="1361"><span data-dcnode-id="1360" instrument_node="">Jesus now sits on his beautiful throne in heaven telling God how much he loves us and wants us to live with them in their beautiful Kingdom of Heaven. </span><br data-dcnode-id="1359"><br data-dcnode-id="1358"><span data-dcnode-id="1357" instrument_node="">When Jesus was on earth he brought a New Commandment for us to obey. He tells us, </span><em data-dcnode-id="1355"><span data-dcnode-id="1356" instrument_node="">"If you love Me, obey my commandments"</span></em><span data-dcnode-id="1354" instrument_node=""> (</span><a class="rtBibleRef" data-dcnode-id="1352" data-purpose="bible-reference" data-reference="John 14.15" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bible.faithlife.com/bible/esv/John%252014.15" rel="noopener" target="_blank"><span data-dcnode-id="1353" instrument_node="">John 14:15</span></a><span data-dcnode-id="1351" instrument_node="">). Let's learn more about Jesus' commandments and how to love him.</span><br data-dcnode-id="1350"></p><span data-dcnode-id="1348" instrument_node="">
</span><h3 data-dcnode-id="1346"><span data-dcnode-id="1347" instrument_node="">Ten Commandments For Children - Faith</span></h3><span data-dcnode-id="1345" instrument_node="">
</span><div class="ImageBlock ImageBlockRight" data-dcnode-id="1343"><img data-dcnode-id="1344" data-pin-media="http://www.graspinggod.com/images/13_Jesus_Teaching_Jerusalem.jpg" height="189" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.graspinggod.com/images/x13_Jesus_Teaching_Jerusalem.jpg.pagespeed.ic.3_Ps25CGuX.jpg&amp;raw" style="width: 244px; height: auto; max-width: none;" width="244"></div><span data-dcnode-id="1342" instrument_node="">
</span><p data-dcnode-id="1286" style="text-align: justify;"><span data-dcnode-id="1341" instrument_node="">The Ten Commandments were "filled out" by Jesus. Jesus' New Testament instructs us what the Ten Commandments for children include. </span><b data-dcnode-id="1339"><span data-dcnode-id="1340" instrument_node="">People who love Jesus must learn the New Testament, so they know the rules of the Creator and Savior, Jesus.</span></b><br data-dcnode-id="1338"><br data-dcnode-id="1337"><span data-dcnode-id="1336" instrument_node="">One day, when Jesus was teaching, he said, </span><em data-dcnode-id="1334"><span data-dcnode-id="1335" instrument_node="">"Truly I tell you, unless you turn from sin, and become as little children, you will in no way enter into the Kingdom of Heaven"</span></em><span data-dcnode-id="1333" instrument_node=""> (</span><a class="rtBibleRef" data-dcnode-id="1331" data-purpose="bible-reference" data-reference="Matt 18.3" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bible.faithlife.com/bible/esv/Matt%252018.3" rel="noopener" target="_blank"><span data-dcnode-id="1332" instrument_node="">Matthew 18:3</span></a><span data-dcnode-id="1330" instrument_node="">). </span><br data-dcnode-id="1329"><br data-dcnode-id="1328"><span data-dcnode-id="1327" instrument_node="">People's hearts became mean (</span><a class="rtBibleRef" data-dcnode-id="1325" data-purpose="bible-reference" data-reference="Matt 15.19-20" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bible.faithlife.com/bible/esv/Matt%252015.19-20" rel="noopener" target="_blank"><span data-dcnode-id="1326" instrument_node="">Matthew 15:19-20</span></a><span data-dcnode-id="1324" instrument_node="">), but God wants to make our hearts clean (</span><a class="rtBibleRef" data-dcnode-id="1322" data-purpose="bible-reference" data-reference="Luke 6.45" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bible.faithlife.com/bible/esv/Luke%25206.45" rel="noopener" target="_blank"><span data-dcnode-id="1323" instrument_node="">Luke 6:45</span></a><span data-dcnode-id="1321" instrument_node="">). So, He tells us to turn away from sin (aka repent) and turn to Him and Jesus (aka faith). </span><em data-dcnode-id="1319"><span data-dcnode-id="1320" instrument_node="">You prove your love to God by loving and learning his Word, which is how he speaks to us</span></em><span data-dcnode-id="1318" instrument_node=""> (</span><a class="rtBibleRef" data-dcnode-id="1316" data-purpose="bible-reference" data-reference="Matt 13.12" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bible.faithlife.com/bible/esv/Matt%252013.12" rel="noopener" target="_blank"><span data-dcnode-id="1317" instrument_node="">Matthew 13:12</span></a><span data-dcnode-id="1315" instrument_node="">).</span><br data-dcnode-id="1314"><br data-dcnode-id="1313"><span data-dcnode-id="1312" instrument_node="">We are told to view the Ten Commandments for children as a Teacher (</span><a class="rtBibleRef" data-dcnode-id="1310" data-purpose="bible-reference" data-reference="Gal 3.23-24" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bible.faithlife.com/bible/esv/Gal%25203.23-24" rel="noopener" target="_blank"><span data-dcnode-id="1311" instrument_node="">Galatians 3:23-24</span></a><span data-dcnode-id="1309" instrument_node="">). The Teacher instructs us that God is holy and we are not, therefore, we need rules (</span><a class="rtBibleRef" data-dcnode-id="1307" data-purpose="bible-reference" data-reference="Gal 3.19" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bible.faithlife.com/bible/esv/Gal%25203.19" rel="noopener" target="_blank"><span data-dcnode-id="1308" instrument_node="">Galatians 3:19</span></a><span data-dcnode-id="1306" instrument_node="">). The Teacher also shows us that no one can be perfect by themselves (</span><a class="rtBibleRef" data-dcnode-id="1304" data-purpose="bible-reference" data-reference="Gal 3.3" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bible.faithlife.com/bible/esv/Gal%25203.3" rel="noopener" target="_blank"><span data-dcnode-id="1305" instrument_node="">Galatians 3:3</span></a><span data-dcnode-id="1303" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="1301" data-purpose="bible-reference" data-reference="1 Cor 2.14" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bible.faithlife.com/bible/esv/1%2520Cor%25202.14" rel="noopener" target="_blank"><span data-dcnode-id="1302" instrument_node="">1 Corinthians 2:14</span></a><span data-dcnode-id="1300" instrument_node="">). The Teacher guides us to seek Jesus as our Savior, because He did obey all of the 10 Commandments (</span><a class="rtBibleRef" data-dcnode-id="1298" data-purpose="bible-reference" data-reference="Gal 3.26" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bible.faithlife.com/bible/esv/Gal%25203.26" rel="noopener" target="_blank"><span data-dcnode-id="1299" instrument_node="">Galatians 3:26</span></a><span data-dcnode-id="1297" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="1295" data-purpose="bible-reference" data-reference="Galatians 3.29" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bible.faithlife.com/bible/esv/Galatians%25203.29" rel="noopener" target="_blank"><span data-dcnode-id="1296" instrument_node="">3:29</span></a><span data-dcnode-id="1294" instrument_node="">).</span><br data-dcnode-id="1293"><br data-dcnode-id="1292"><span data-dcnode-id="1291" instrument_node="">God's Law teaches us to seek forgiveness from God (</span><a class="rtBibleRef" data-dcnode-id="1289" data-purpose="bible-reference" data-reference="Matt 6.14" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bible.faithlife.com/bible/esv/Matt%25206.14" rel="noopener" target="_blank"><span data-dcnode-id="1290" instrument_node="">Matthew 6:14</span></a><span data-dcnode-id="1288" instrument_node="">), so that we can live with him forever and ever. </span><br data-dcnode-id="1287"></p><span data-dcnode-id="1285" instrument_node="">
</span><h3 data-dcnode-id="1283"><span data-dcnode-id="1284" instrument_node="">List of the Ten Commandments For Children</span></h3><span data-dcnode-id="1282" instrument_node="">
</span><p data-dcnode-id="1279" style="text-align: justify;"><span data-dcnode-id="1281" instrument_node="">Here is a short list of the Ten Commandments for children [paraphrased for clarity], and also their location in the New Testament (hover your mouse over the highlighted verses for actual text):</span><br data-dcnode-id="1280"></p><ul data-dcnode-id="1171"><li data-dcnode-id="1266"><a data-dcnode-id="1277" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.graspinggod.com/1st-commandment.html" target="_blank"><span data-dcnode-id="1278" instrument_node="">1st Commandment</span></a><span data-dcnode-id="1276" instrument_node="">: "You shall have no other gods before God the Father and his Son, Jesus Christ." </span><a class="rtBibleRef" data-dcnode-id="1274" data-purpose="bible-reference" data-reference="Exod 20.3" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bible.faithlife.com/bible/esv/Exod%252020.3" rel="noopener" target="_blank"><span data-dcnode-id="1275" instrument_node="">Exodus 20:3</span></a><span data-dcnode-id="1273" instrument_node="">, restated in </span><a class="rtBibleRef" data-dcnode-id="1271" data-purpose="bible-reference" data-reference="Matt 22.37-38" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bible.faithlife.com/bible/esv/Matt%252022.37-38" rel="noopener" target="_blank"><span data-dcnode-id="1272" instrument_node="">Matthew 22:37-38</span></a><span data-dcnode-id="1270" instrument_node=""> and </span><a class="rtBibleRef" data-dcnode-id="1268" data-purpose="bible-reference" data-reference="Acts 14.15" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bible.faithlife.com/bible/esv/Acts%252014.15" rel="noopener" target="_blank"><span data-dcnode-id="1269" instrument_node="">Acts 14:15</span></a><span data-dcnode-id="1267" instrument_node="">.</span></li><li data-dcnode-id="1256"><a data-dcnode-id="1264" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.graspinggod.com/2nd-commandment.html" target="_blank"><span data-dcnode-id="1265" instrument_node="">2nd Commandment</span></a><span data-dcnode-id="1263" instrument_node="">: "You shall not make or worship idols." </span><a class="rtBibleRef" data-dcnode-id="1261" data-purpose="bible-reference" data-reference="Exod 20.4" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bible.faithlife.com/bible/esv/Exod%252020.4" rel="noopener" target="_blank"><span data-dcnode-id="1262" instrument_node="">Exodus 20:4</span></a><span data-dcnode-id="1260" instrument_node="">, restated in </span><a class="rtBibleRef" data-dcnode-id="1258" data-purpose="bible-reference" data-reference="1 John 5.21" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bible.faithlife.com/bible/esv/1%2520John%25205.21" rel="noopener" target="_blank"><span data-dcnode-id="1259" instrument_node="">1 John 5:21</span></a><span data-dcnode-id="1257" instrument_node="">.</span></li><li data-dcnode-id="1246"><a data-dcnode-id="1254" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.graspinggod.com/3rd-commandment.html" target="_blank"><span data-dcnode-id="1255" instrument_node="">3rd Commandment</span></a><span data-dcnode-id="1253" instrument_node="">: "You shall not misuse the name of the Lord your God." </span><a class="rtBibleRef" data-dcnode-id="1251" data-purpose="bible-reference" data-reference="Exod 20.7" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bible.faithlife.com/bible/esv/Exod%252020.7" rel="noopener" target="_blank"><span data-dcnode-id="1252" instrument_node="">Exodus 20:7</span></a><span data-dcnode-id="1250" instrument_node="">, restated in </span><a class="rtBibleRef" data-dcnode-id="1248" data-purpose="bible-reference" data-reference="James 5.12" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bible.faithlife.com/bible/esv/James%25205.12" rel="noopener" target="_blank"><span data-dcnode-id="1249" instrument_node="">James 5:12</span></a><span data-dcnode-id="1247" instrument_node="">.</span></li><li data-dcnode-id="1232"><a data-dcnode-id="1244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.graspinggod.com/4th-commandment.html" target="_blank"><span data-dcnode-id="1245" instrument_node="">4th Commandment</span></a><span data-dcnode-id="1243" instrument_node="">: "Remember to rest in Christ's Spirit, Word, and work." </span><a class="rtBibleRef" data-dcnode-id="1241" data-purpose="bible-reference" data-reference="Exod 20.8-11" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bible.faithlife.com/bible/esv/Exod%252020.8-11" rel="noopener" target="_blank"><span data-dcnode-id="1242" instrument_node="">Exodus 20:8-11</span></a><span data-dcnode-id="1240" instrument_node="">, restated spiritually in </span><a class="rtBibleRef" data-dcnode-id="1238" data-purpose="bible-reference" data-reference="Matt 11.28-30" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bible.faithlife.com/bible/esv/Matt%252011.28-30" rel="noopener" target="_blank"><span data-dcnode-id="1239" instrument_node="">Matthew 11:28-30</span></a><span data-dcnode-id="1237" instrument_node=""> and </span><a class="rtBibleRef" data-dcnode-id="1235" data-purpose="bible-reference" data-reference="Heb 4.9-11" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bible.faithlife.com/bible/esv/Heb%25204.9-11" rel="noopener" target="_blank"><span data-dcnode-id="1236" instrument_node="">Hebrews 4:9-11</span></a><span data-dcnode-id="1234" instrument_node="">. Sabbath means "rest" and the New Covenant calls us to rest in Christ from our efforts to gain salvation. </span><br data-dcnode-id="1233"></li><li data-dcnode-id="1222"><a data-dcnode-id="1230" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.graspinggod.com/5th-commandment.html" target="_blank"><span data-dcnode-id="1231" instrument_node="">5th Commandment</span></a><span data-dcnode-id="1229" instrument_node="">: "Honor your father and your mother." </span><a class="rtBibleRef" data-dcnode-id="1227" data-purpose="bible-reference" data-reference="Exod 20.12" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bible.faithlife.com/bible/esv/Exod%252020.12" rel="noopener" target="_blank"><span data-dcnode-id="1228" instrument_node="">Exodus 20:12</span></a><span data-dcnode-id="1226" instrument_node="">, restated in </span><a class="rtBibleRef" data-dcnode-id="1224" data-purpose="bible-reference" data-reference="Eph 6.1" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bible.faithlife.com/bible/esv/Eph%25206.1" rel="noopener" target="_blank"><span data-dcnode-id="1225" instrument_node="">Ephesians 6:1</span></a><span data-dcnode-id="1223" instrument_node="">.</span></li><li data-dcnode-id="1212"><a data-dcnode-id="1220" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.graspinggod.com/6th-commandment.html" target="_blank"><span data-dcnode-id="1221" instrument_node="">6th Commandment</span></a><span data-dcnode-id="1219" instrument_node="">: "You shall not hate or kill another person." </span><a class="rtBibleRef" data-dcnode-id="1217" data-purpose="bible-reference" data-reference="Exod 20.13" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bible.faithlife.com/bible/esv/Exod%252020.13" rel="noopener" target="_blank"><span data-dcnode-id="1218" instrument_node="">Exodus 20:13</span></a><span data-dcnode-id="1216" instrument_node="">, restated in </span><a class="rtBibleRef" data-dcnode-id="1214" data-purpose="bible-reference" data-reference="1 John 3.15" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bible.faithlife.com/bible/esv/1%2520John%25203.15" rel="noopener" target="_blank"><span data-dcnode-id="1215" instrument_node="">1 John 3:15</span></a><span data-dcnode-id="1213" instrument_node="">.</span></li><li data-dcnode-id="1202"><a data-dcnode-id="1210" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.graspinggod.com/7th-commandment.html" target="_blank"><span data-dcnode-id="1211" instrument_node="">7th Commandment</span></a><span data-dcnode-id="1209" instrument_node="">: "You shall not disrespect another person's body." </span><a class="rtBibleRef" data-dcnode-id="1207" data-purpose="bible-reference" data-reference="Exod 20.14" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bible.faithlife.com/bible/esv/Exod%252020.14" rel="noopener" target="_blank"><span data-dcnode-id="1208" instrument_node="">Exodus 20:14</span></a><span data-dcnode-id="1206" instrument_node="">, restated in </span><a class="rtBibleRef" data-dcnode-id="1204" data-purpose="bible-reference" data-reference="1 Cor 6.9-10" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bible.faithlife.com/bible/esv/1%2520Cor%25206.9-10" rel="noopener" target="_blank"><span data-dcnode-id="1205" instrument_node="">1 Corinthians 6:9-10</span></a><span data-dcnode-id="1203" instrument_node="">.</span></li><li data-dcnode-id="1192"><a data-dcnode-id="1200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.graspinggod.com/8th-commandment.html" target="_blank"><span data-dcnode-id="1201" instrument_node="">8th Commandment</span></a><span data-dcnode-id="1199" instrument_node="">: "You shall not steal anything from anyone." </span><a class="rtBibleRef" data-dcnode-id="1197" data-purpose="bible-reference" data-reference="Exod 20.15" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bible.faithlife.com/bible/esv/Exod%252020.15" rel="noopener" target="_blank"><span data-dcnode-id="1198" instrument_node="">Exodus 20:15</span></a><span data-dcnode-id="1196" instrument_node="">, restated in </span><a class="rtBibleRef" data-dcnode-id="1194" data-purpose="bible-reference" data-reference="Eph 4.28" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bible.faithlife.com/bible/esv/Eph%25204.28" rel="noopener" target="_blank"><span data-dcnode-id="1195" instrument_node="">Ephesians 4:28</span></a><span data-dcnode-id="1193" instrument_node="">.</span></li><li data-dcnode-id="1182"><a data-dcnode-id="1190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.graspinggod.com/9th-commandment.html" target="_blank"><span data-dcnode-id="1191" instrument_node="">9th Commandment</span></a><span data-dcnode-id="1189" instrument_node="">: "You shall not lie about your neighbor." </span><a class="rtBibleRef" data-dcnode-id="1187" data-purpose="bible-reference" data-reference="Exod 20.16" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bible.faithlife.com/bible/esv/Exod%252020.16" rel="noopener" target="_blank"><span data-dcnode-id="1188" instrument_node="">Exodus 20:16</span></a><span data-dcnode-id="1186" instrument_node="">, restated in </span><a class="rtBibleRef" data-dcnode-id="1184" data-purpose="bible-reference" data-reference="Col 3.9-10" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bible.faithlife.com/bible/esv/Col%25203.9-10" rel="noopener" target="_blank"><span data-dcnode-id="1185" instrument_node="">Colossians 3:9-10</span></a><span data-dcnode-id="1183" instrument_node="">.</span></li><li data-dcnode-id="1172"><a data-dcnode-id="1180" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.graspinggod.com/10th-commandment.html" target="_blank"><span data-dcnode-id="1181" instrument_node="">10th Commandment</span></a><span data-dcnode-id="1179" instrument_node="">: "You shall not want other people's things." </span><a class="rtBibleRef" data-dcnode-id="1177" data-purpose="bible-reference" data-reference="Exod 20.17" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bible.faithlife.com/bible/esv/Exod%252020.17" rel="noopener" target="_blank"><span data-dcnode-id="1178" instrument_node="">Exodus 20:17</span></a><span data-dcnode-id="1176" instrument_node="">, restated in </span><a class="rtBibleRef" data-dcnode-id="1174" data-purpose="bible-reference" data-reference="Eph 5.3" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bible.faithlife.com/bible/esv/Eph%25205.3" rel="noopener" target="_blank"><span data-dcnode-id="1175" instrument_node="">Ephesians 5:3</span></a><span data-dcnode-id="1173" instrument_node="">.</span></li></ul><p data-dcnode-id="1168" style="text-align: justify;"><span data-dcnode-id="1170" instrument_node="">This list of the kid's Ten Commandments had been modified to help children grasp the foundational principles of each command. Click the links to deeply study each command.</span><br data-dcnode-id="1169"></p><span data-dcnode-id="1167" instrument_node="">
</span><h3 data-dcnode-id="1165"><span data-dcnode-id="1166" instrument_node="">Ten Commandments For Children - Obedience</span></h3><span data-dcnode-id="1164" instrument_node="">
</span><div class="ImageBlock ImageBlockRight" data-dcnode-id="1162"><img data-dcnode-id="1163" data-pin-media="http://www.graspinggod.com/images/Boy-Closeup.jpg" height="144" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.graspinggod.com/images/xBoy-Closeup.jpg.pagespeed.ic.jLB8vsDo1x.jpg&amp;raw" style="width: 240px; height: auto; max-width: none;" width="240"></div><span data-dcnode-id="1161" instrument_node="">
</span><p data-dcnode-id="1115" style="text-align: justify;"><span data-dcnode-id="1160" instrument_node="">The most important words in this lesson are about to be spoken. Everyone must grasp this truth: </span><b data-dcnode-id="1158"><span data-dcnode-id="1159" instrument_node="">People are not and cannot be good enough to please God and enter heaven</span></b><span data-dcnode-id="1157" instrument_node=""> (</span><a class="rtBibleRef" data-dcnode-id="1155" data-purpose="bible-reference" data-reference="Rom 3.9-12" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bible.faithlife.com/bible/esv/Rom%25203.9-12" rel="noopener" target="_blank"><span data-dcnode-id="1156" instrument_node="">Romans 3:9-12</span></a><span data-dcnode-id="1154" instrument_node="">). No amount of one's obedience will bring forgiveness and allow him or her to be with Jesus forever (</span><a class="rtBibleRef" data-dcnode-id="1152" data-purpose="bible-reference" data-reference="Rom 3.20" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bible.faithlife.com/bible/esv/Rom%25203.20" rel="noopener" target="_blank"><span data-dcnode-id="1153" instrument_node="">Romans 3:20</span></a><span data-dcnode-id="1151" instrument_node="">).</span><br data-dcnode-id="1150"><br data-dcnode-id="1149"><span data-dcnode-id="1148" instrument_node="">Jesus is good enough, however, and has already entered heaven (</span><a class="rtBibleRef" data-dcnode-id="1146" data-purpose="bible-reference" data-reference="Heb 10.12-13" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bible.faithlife.com/bible/esv/Heb%252010.12-13" rel="noopener" target="_blank"><span data-dcnode-id="1147" instrument_node="">Hebrews 10:12-13</span></a><span data-dcnode-id="1145" instrument_node="">). </span><br data-dcnode-id="1144"><br data-dcnode-id="1143"><b data-dcnode-id="1141"><span data-dcnode-id="1142" instrument_node="">The only way to follow Jesus to heaven is to follow him on earth, by FAITH.</span></b><span data-dcnode-id="1140" instrument_node=""> You must become his disciple (</span><a class="rtBibleRef" data-dcnode-id="1138" data-purpose="bible-reference" data-reference="John 15.12-14" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bible.faithlife.com/bible/esv/John%252015.12-14" rel="noopener" target="_blank"><span data-dcnode-id="1139" instrument_node="">John 15:12-14</span></a><span data-dcnode-id="1137" instrument_node="">). </span><b data-dcnode-id="1135"><span data-dcnode-id="1136" instrument_node="">Believing in God, though Jesus, is the key to perfectly obeying the Ten Commandments,</span></b><span data-dcnode-id="1134" instrument_node=""> and here's why.</span><br data-dcnode-id="1133"><br data-dcnode-id="1132"><span data-dcnode-id="1131" instrument_node="">Jesus obeyed God's Law, and God accepted his life to pay for all those people who would seek and find Him, by faith (</span><a class="rtBibleRef" data-dcnode-id="1129" data-purpose="bible-reference" data-reference="Heb 10.10" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bible.faithlife.com/bible/esv/Heb%252010.10" rel="noopener" target="_blank"><span data-dcnode-id="1130" instrument_node="">Hebrews 10:10</span></a><span data-dcnode-id="1128" instrument_node="">).</span><br data-dcnode-id="1127"><br data-dcnode-id="1126"><span data-dcnode-id="1125" instrument_node="">So, when a person trusts in Jesus Christ alone for eternal life, God places Jesus' perfect life upon the life of the person (</span><a class="rtBibleRef" data-dcnode-id="1123" data-purpose="bible-reference" data-reference="1 Cor 1.30" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bible.faithlife.com/bible/esv/1%2520Cor%25201.30" rel="noopener" target="_blank"><span data-dcnode-id="1124" instrument_node="">1 Corinthians 1:30</span></a><span data-dcnode-id="1122" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="1120" data-purpose="bible-reference" data-reference="Phil 3.9" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bible.faithlife.com/bible/esv/Phil%25203.9" rel="noopener" target="_blank"><span data-dcnode-id="1121" instrument_node="">Philippians 3:9</span></a><span data-dcnode-id="1119" instrument_node="">). If a person tries some other way to earn heaven he or she will be flatly denied (</span><a class="rtBibleRef" data-dcnode-id="1117" data-purpose="bible-reference" data-reference="Matt 7.21-23" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bible.faithlife.com/bible/esv/Matt%25207.21-23" rel="noopener" target="_blank"><span data-dcnode-id="1118" instrument_node="">Matthew 7:21-23</span></a><span data-dcnode-id="1116" instrument_node="">).</span></p><p data-dcnode-id="1110" style="text-align: justify;"><span data-dcnode-id="1112" style="font-size: 15.75px;"><b data-dcnode-id="1113"><span data-dcnode-id="1114" instrument_node="">Fruit of the Spirit Response to the Ten Commandments For Children.</span></b></span><span data-dcnode-id="1111" instrument_node=""> </span></p><span data-dcnode-id="1109" instrument_node="">
</span><div class="ImageBlock ImageBlockRight" data-dcnode-id="1107"><img data-dcnode-id="1108" data-pin-media="http://www.graspinggod.com/images/GirlPrayingFlare.jpg" height="128" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.graspinggod.com/images/GirlPrayingFlare.jpg&amp;raw" style="width: 224px; height: auto; max-width: none;" width="224"></div><span data-dcnode-id="1106" instrument_node="">
</span><p data-dcnode-id="1072" style="text-align: justify;"><span data-dcnode-id="1105" instrument_node="">St Paul the Apostle tells us, "So, whether we are here in this body or away from this body, our goal is to please the Lord" (</span><a class="rtBibleRef" data-dcnode-id="1103" data-purpose="bible-reference" data-reference="2 Cor 5.9" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bible.faithlife.com/bible/esv/2%2520Cor%25205.9" rel="noopener" target="_blank"><span data-dcnode-id="1104" instrument_node="">2 Corinthians 5:9</span></a><span data-dcnode-id="1102" instrument_node="">). Jesus tells us, </span><em data-dcnode-id="1100"><span data-dcnode-id="1101" instrument_node="">"Be perfect because your heavenly Father is perfect"</span></em><span data-dcnode-id="1099" instrument_node=""> (</span><a class="rtBibleRef" data-dcnode-id="1097" data-purpose="bible-reference" data-reference="Matt 5.48" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bible.faithlife.com/bible/esv/Matt%25205.48" rel="noopener" target="_blank"><span data-dcnode-id="1098" instrument_node="">Matthew 5:48</span></a><span data-dcnode-id="1096" instrument_node="">).</span><br data-dcnode-id="1095"><br data-dcnode-id="1094"><b data-dcnode-id="1092"><span data-dcnode-id="1093" instrument_node="">Children have a responsibility to seek perfection, and a goal to please the Lord.</span></b><span data-dcnode-id="1091" instrument_node=""> </span><br data-dcnode-id="1090"><br data-dcnode-id="1089"><span data-dcnode-id="1088" instrument_node="">In terms all of us children can understand, a life of faith looks like this: "Love the Lord and his Law, and love all people as much as you love yourself."</span><br data-dcnode-id="1087"><br data-dcnode-id="1086"><span data-dcnode-id="1085" instrument_node="">Paul tells us to, "Think carefully about what is right, and stop sinning. For to your shame I say that some of you don't know God at all" (</span><a class="rtBibleRef" data-dcnode-id="1083" data-purpose="bible-reference" data-reference="1 Cor 15.34" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bible.faithlife.com/bible/esv/1%2520Cor%252015.34" rel="noopener" target="_blank"><span data-dcnode-id="1084" instrument_node="">1 Corinthians 15:34</span></a><span data-dcnode-id="1082" instrument_node="">).&nbsp; </span><br data-dcnode-id="1081"><br data-dcnode-id="1080"><span data-dcnode-id="1079" instrument_node="">All those who learn and live by these spiritual principles, </span><b data-dcnode-id="1077"><span data-dcnode-id="1078" instrument_node="">AFTER trusting in God through Jesus Christ alone</span></b><span data-dcnode-id="1076" instrument_node="">, will live to serve and please God. Jesus will say to them on Judgment Day, </span><em data-dcnode-id="1074"><span data-dcnode-id="1075" instrument_node="">"Well done, my good and faithful servant!"</span></em><br data-dcnode-id="1073"></p><span data-dcnode-id="1071" instrument_node="">
</span><h3 data-dcnode-id="1069"><span data-dcnode-id="1070" instrument_node="">Grasp This! Ten Commandments For Children</span></h3><span data-dcnode-id="1068" instrument_node="">
</span><div class="ImageBlock ImageBlockRight" data-dcnode-id="1066"><img data-dcnode-id="1067" data-pin-media="http://www.graspinggod.com/images/children.jpg" height="124" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.graspinggod.com/images/children.jpg&amp;raw" style="width: 220px; height: auto; max-width: none;" width="220"></div><span data-dcnode-id="1065" instrument_node="">
</span><p data-dcnode-id="1032" style="text-align: justify;"><span data-dcnode-id="1064" instrument_node="">St Paul states the importance of pleasing God through obedience, "For God made Christ, who never sinned, to be the offering for our sin, so that we could be made right with God through Christ" (</span><a class="rtBibleRef" data-dcnode-id="1062" data-purpose="bible-reference" data-reference="2 Cor 5.21" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bible.faithlife.com/bible/esv/2%2520Cor%25205.21" rel="noopener" target="_blank"><span data-dcnode-id="1063" instrument_node="">2 Corinthians 5:21</span></a><span data-dcnode-id="1061" instrument_node="">). </span><br data-dcnode-id="1060"><br data-dcnode-id="1059"><span data-dcnode-id="1058" instrument_node="">Maybe you didn't think I made sense introducing Paul's statement. Let me clarify a confusing issue which trips up millions upon millions of confused souls. </span><br data-dcnode-id="1057"><br data-dcnode-id="1056"><span data-dcnode-id="1055" instrument_node="">To obey God starts right here: Listen to Jesus in </span><a class="rtBibleRef" data-dcnode-id="1053" data-purpose="bible-reference" data-reference="John 6.29" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bible.faithlife.com/bible/esv/John%25206.29" rel="noopener" target="_blank"><span data-dcnode-id="1054" instrument_node="">John 6:29</span></a><span data-dcnode-id="1052" instrument_node="">, </span><em data-dcnode-id="1050"><span data-dcnode-id="1051" instrument_node="">"This is the only work God wants from you: Believe in the one he has sent."</span></em><span data-dcnode-id="1049" instrument_node=""> There it is. Believing in Jesus is the most important way to obey the Ten Commandments for children (of ALL ages!). </span><br data-dcnode-id="1048"><br data-dcnode-id="1047"><span data-dcnode-id="1046" instrument_node="">Know that once a child truly believes in Jesus, (s)he will fall in love with him and love his word, desiring to obey his laws. Faith leads to obedience.</span><br data-dcnode-id="1045"><br data-dcnode-id="1044"><span data-dcnode-id="1043" instrument_node="">Faith in a child's heart spawns a child's obedience to God's Law. Perfection guaranteed (</span><a class="rtBibleRef" data-dcnode-id="1041" data-purpose="bible-reference" data-reference="Eph 1.13" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bible.faithlife.com/bible/esv/Eph%25201.13" rel="noopener" target="_blank"><span data-dcnode-id="1042" instrument_node="">Ephesians 1:13</span></a><span data-dcnode-id="1040" instrument_node="">)! </span><br data-dcnode-id="1039"><br data-dcnode-id="1038"><span data-dcnode-id="1037" instrument_node="">Join our next Bible study lesson: </span><a data-dcnode-id="1035" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.graspinggod.com/rich-young-ruler.html" target="_blank"><span data-dcnode-id="1036" instrument_node="">Jesus and the Rich Young Ruler #5.17</span></a><span data-dcnode-id="1034" instrument_node="">.</span><br data-dcnode-id="1033"></p><span data-dcnode-id="1031" instrument_node="">
</span><p data-dcnode-id="951" style="text-align: justify;"><span data-dcnode-id="1028" style="font-size: 15.75px;"><b data-dcnode-id="1029"><span data-dcnode-id="1030" instrument_node="">Ten Commandments For Children Bible Study Questions:</span></b></span><br data-dcnode-id="1027"><span data-dcnode-id="1026" instrument_node="">1) Why is Adam so very important in understanding the Ten Commandments for children? (see </span><a class="rtBibleRef" data-dcnode-id="1024" data-purpose="bible-reference" data-reference="1 Cor 15.45-49" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bible.faithlife.com/bible/esv/1%2520Cor%252015.45-49" rel="noopener" target="_blank"><span data-dcnode-id="1025" instrument_node="">1 Corinthians 15:45-49</span></a><span data-dcnode-id="1023" instrument_node="">).</span><br data-dcnode-id="1022"><span data-dcnode-id="1021" instrument_node="">2) Kids are expected to honor their Dad &amp; Mom, but who else should they honor? Discuss depth of the 5th Commandment.</span><br data-dcnode-id="1020"><span data-dcnode-id="1019" instrument_node="">3) Does obedience to God's law do a non-Christian any good? (see </span><a class="rtBibleRef" data-dcnode-id="1017" data-purpose="bible-reference" data-reference="1 Tim 1.8-11" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bible.faithlife.com/bible/esv/1%2520Tim%25201.8-11" rel="noopener" target="_blank"><span data-dcnode-id="1018" instrument_node="">1 Timothy 1:8-11</span></a><span data-dcnode-id="1016" instrument_node="">). Discuss reasons why.</span><br data-dcnode-id="1015"><br data-dcnode-id="1014"><span data-dcnode-id="1011" style="font-size: 15.75px;"><b data-dcnode-id="1012"><span data-dcnode-id="1013" instrument_node="">Ten Commandments For Children Bible Verses:</span></b></span><br data-dcnode-id="1010"><span data-dcnode-id="1009" instrument_node="">Behold, I was brought forth in iniquity. In sin my mother conceived me. </span><a class="rtBibleRef" data-dcnode-id="1007" data-purpose="bible-reference" data-reference="Ps 51.5" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bible.faithlife.com/bible/esv/Ps%252051.5" rel="noopener" target="_blank"><span data-dcnode-id="1008" instrument_node="">Psalm 51:5</span></a><span data-dcnode-id="1006" instrument_node=""> NHEB.</span><br data-dcnode-id="1005"><br data-dcnode-id="1004"><span data-dcnode-id="1003" instrument_node="">Jesus says, </span><em data-dcnode-id="1001"><span data-dcnode-id="1002" instrument_node="">"Anyone who belongs to God listens gladly to the words of God. But you don't listen because you don't belong to God."</span></em><span data-dcnode-id="1000" instrument_node=""> </span><a class="rtBibleRef" data-dcnode-id="998" data-purpose="bible-reference" data-reference="John 8.47" data-version="nlt" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bible.faithlife.com/bible/nlt/John%25208.47" rel="noopener" target="_blank"><span data-dcnode-id="999" instrument_node="">John 8:47 NLT</span></a><span data-dcnode-id="997" instrument_node="">. </span><br data-dcnode-id="996"><br data-dcnode-id="995"><span data-dcnode-id="994" instrument_node="">Create in me a clean heart, O God. Renew a right spirit within me. Do not throw me from your presence, and do not take your holy Spirit from me. Restore to me the joy of your salvation. Uphold me with a willing spirit. </span><a class="rtBibleRef" data-dcnode-id="992" data-purpose="bible-reference" data-reference="Ps 51.10-12" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bible.faithlife.com/bible/esv/Ps%252051.10-12" rel="noopener" target="_blank"><span data-dcnode-id="993" instrument_node="">Psalm 51:10-12</span></a><span data-dcnode-id="991" instrument_node=""> NHEB.</span><br data-dcnode-id="990"><br data-dcnode-id="989"><span data-dcnode-id="988" instrument_node="">Jesus says, </span><em data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">"The Holy Spirit alone gives eternal life. Human effort accomplishes nothing. And the very words I have spoken to you are spirit and life. But some of you do not believe me."</span></em><span data-dcnode-id="985" instrument_node=""> (</span><a class="rtBibleRef" data-dcnode-id="983" data-purpose="bible-reference" data-reference="John 6.63-64" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bible.faithlife.com/bible/esv/John%25206.63-64" rel="noopener" target="_blank"><span data-dcnode-id="984" instrument_node="">John 6:63-64</span></a><span data-dcnode-id="982" instrument_node="">). </span><br data-dcnode-id="981"><br data-dcnode-id="980"><span data-dcnode-id="977" style="font-size: 15.75px;"><b data-dcnode-id="978"><span data-dcnode-id="979" instrument_node="">Ten Commandments For Children Prayer:</span></b></span><br data-dcnode-id="976"><span data-dcnode-id="975" instrument_node="">Dear Father,</span><br data-dcnode-id="974"><span data-dcnode-id="973" instrument_node="">I love you so much. Thank you for loving me. Thank you for making me and sending Jesus to pay for my sins. I pray, Jesus, that you send the Holy Spirit into my heart, so that I can be forgiven and meet you someday in heaven. Protect me from the world. Help me to obey your commands. Don't ever let go of my hand, dear Lord. In Jesus' name I pray, Amen. </span><br data-dcnode-id="972"><br data-dcnode-id="971"><b data-dcnode-id="969"><span data-dcnode-id="970" instrument_node="">Share on Facebook below</span></b><span data-dcnode-id="968" instrument_node=""> and click for your Free Printable Bible Study Lesson: </span><a data-dcnode-id="966" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.graspinggod.com/support-files/lesson_5.16.pdf" onclick="return FIX.track(this);"><span data-dcnode-id="967" instrument_node="">Ten Commandments For Children</span></a><span data-dcnode-id="965" instrument_node="">.</span><br data-dcnode-id="964"><br data-dcnode-id="963"><span data-dcnode-id="962" instrument_node="">Click here to download your free printable </span><a data-dcnode-id="960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.graspinggod.com/support-files/list_of_the_ten_commandments.pdf" onclick="return FIX.track(this);" target="_blank"><span data-dcnode-id="961" instrument_node="">list of the Ten Commandments</span></a><span data-dcnode-id="959" instrument_node="">; &amp; click here for a download of the Short </span><a data-dcnode-id="957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.graspinggod.com/support-files/childrens_ten_commandments_list.pdf" onclick="return FIX.track(this);" target="_blank"><span data-dcnode-id="958" instrument_node="">List of the Ten Commandments for Children</span></a><span data-dcnode-id="956" instrument_node="">. </span><br data-dcnode-id="955"><br data-dcnode-id="954"><span data-dcnode-id="953" instrument_node="">Special Note: I'm grateful to Big Book Media &amp; Free Bible Images, stock.xchng, Morgue Files, and Stock Photos For Free for the use of their photos for the Ten Commandments For Children Bible Study Lesson.</span><br data-dcnode-id="952"></p><span data-dcnode-id="950" instrument_node="">
