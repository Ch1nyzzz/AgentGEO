</span><p data-dcnode-id="5018"><a data-dcnode-id="5025" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//erikhare.com/"><span data-dcnode-id="5026" instrument_node="">Home</span></a><span data-dcnode-id="5024" instrument_node=""> » </span><a data-dcnode-id="5022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//erikhare.com/category/nooze/"><span data-dcnode-id="5023" instrument_node="">Nooze</span></a><span data-dcnode-id="5021" instrument_node=""> » </span><span class="current" data-dcnode-id="5019"><span data-dcnode-id="5020" instrument_node="">Evangelicals Are Not&nbsp;Christians</span></span></p><span data-dcnode-id="5017" instrument_node="">

</span><article class="post-8674 post type-post status-publish format-standard has-post-thumbnail hentry category-nooze tag-bible tag-christianity tag-evangelicals tag-war-on-christmas" data-dcnode-id="4530" id="post-8674"><span data-dcnode-id="5013" instrument_node="">
</span><header class="entry-header" data-dcnode-id="4995"><span data-dcnode-id="5012" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="5010"><span data-dcnode-id="5011" instrument_node="">Evangelicals Are Not&nbsp;Christians</span></h1><span data-dcnode-id="5009" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="4998"><span data-dcnode-id="5008" instrument_node="">
						Posted on </span><a data-dcnode-id="5005" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//erikhare.com/2017/12/11/evangelicals-are-not-christians/" rel="bookmark" title="1:20"><time class="entry-date" data-dcnode-id="5006" datetime="2017-12-11T01:20:06+00:00"><span data-dcnode-id="5007" instrument_node="">11 December 2017</span></time></a><span class="byline" data-dcnode-id="5000"><span data-dcnode-id="5004" instrument_node=""> by </span><span class="author vcard" data-dcnode-id="5001"><a class="url fn n" data-dcnode-id="5002" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//erikhare.com/author/wabbitoid/" rel="author" title="View all posts by Erik Hare"><span data-dcnode-id="5003" instrument_node="">Erik Hare</span></a></span></span><span data-dcnode-id="4999" instrument_node=""> </span></div><span data-dcnode-id="4996" instrument_node="">
</span></header><span data-dcnode-id="4993" instrument_node="">
</span><div class="entry-content" data-dcnode-id="4555"><span data-dcnode-id="4992" instrument_node="">
</span><p data-dcnode-id="4990"><span data-dcnode-id="4991" instrument_node="">Evangelical Christianity has been a significant force in American politics for nearly 40 years. It dominates the Republican Party and through that much of the debate on public morality. This is a strange development for many reasons, however.</span></p><span data-dcnode-id="4989" instrument_node="">
</span><p data-dcnode-id="4984"><span data-dcnode-id="4988" instrument_node="">Given that about </span><a data-dcnode-id="4986" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.pewforum.org/religious-landscape-study/" rel="noopener" target="_blank"><span data-dcnode-id="4987" instrument_node="">25% of all Americans</span></a><span data-dcnode-id="4985" instrument_node=""> identify as evangelical protestants, they are far from a majority. They owe their influence to a rigid deference to leadership and a high degree of stubborn political action. For all of this power beyond their numbers, however, the biggest mystery is where their agenda comes from.</span></p><span data-dcnode-id="4983" instrument_node="">
</span><p data-dcnode-id="4981"><span data-dcnode-id="4982" instrument_node="">It’s certainly not the Christian Bible. Very little of the evangelical agenda is justified by the good book, and some is even directly opposed to the words of Jesus. It’s long past time to call out the beliefs of this group and question their agenda because it is, if anything, not generally backed by consistent Christian writings or tradition.</span></p><span data-dcnode-id="4980" instrument_node="">
</span><p data-dcnode-id="4978"><span data-dcnode-id="4979" id="more-8674"></span></p><span data-dcnode-id="4977" instrument_node="">
</span><div class="wp-caption alignleft" data-dcnode-id="4972" data-shortcode="caption" id="attachment_8676" style="width: 179px"><a data-dcnode-id="4975" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//erikhare.files.wordpress.com/2017/12/20171210_125335.jpg"><img alt="" aria-describedby="caption-attachment-8676" class="size-medium wp-image-8676" data-attachment-id="8676" data-comments-opened="1" data-dcnode-id="4976" data-image-caption="<p>The Sermon on the Mount.  You know it’s Jesus ‘cuz it’s in red.</p>
" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;1.9&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;SM-G920P&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;1512910415&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;4.3&quot;,&quot;iso&quot;:&quot;160&quot;,&quot;shutter_speed&quot;:&quot;0.033333333333333&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;1&quot;,&quot;latitude&quot;:&quot;44.943611111111&quot;,&quot;longitude&quot;:&quot;-93.103333333333&quot;}" data-image-title="20171210_125335" data-large-file="https://erikhare.files.wordpress.com/2017/12/20171210_125335.jpg?w=575" data-medium-file="https://erikhare.files.wordpress.com/2017/12/20171210_125335.jpg?w=169" data-orig-file="https://erikhare.files.wordpress.com/2017/12/20171210_125335.jpg" data-orig-size="2984,5312" data-permalink="https://erikhare.com/2017/12/11/evangelicals-are-not-christians/20171210_125335/#main" height="300" loading="lazy" sizes="(max-width: 169px) 100vw, 169px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//erikhare.files.wordpress.com/2017/12/20171210_125335.jpg%3Fw%3D169%26h%3D300&amp;raw" srcset="https://erikhare.files.wordpress.com/2017/12/20171210_125335.jpg?w=169&amp;h=300 169w, https://erikhare.files.wordpress.com/2017/12/20171210_125335.jpg?w=338&amp;h=600 338w, https://erikhare.files.wordpress.com/2017/12/20171210_125335.jpg?w=84&amp;h=150 84w" width="169"></a><p class="wp-caption-text" data-dcnode-id="4973" id="caption-attachment-8676"><span data-dcnode-id="4974" instrument_node="">The Sermon on the Mount. You know it’s Jesus ‘cuz it’s in red.</span></p></div><span data-dcnode-id="4971" instrument_node="">
</span><p data-dcnode-id="4969"><span data-dcnode-id="4970" instrument_node="">I do not want this to be taken as any statement of my faith or indeed as some “contest” to see who is the best Christian. My faith is a highly complicated and personal matter which is constantly being refined by prayer and study and is not the issue here. My favorite version of the Bible is a King James version with the words of Jesus in red. I admit that sometimes I bleep over the black stuff and get right to what I think is the most important part of it.</span></p><span data-dcnode-id="4968" instrument_node="">
</span><p data-dcnode-id="4963"><span data-dcnode-id="4967" instrument_node="">In the course of my studies of Christianity and other faiths I have come to some conclusions which many might find surprising, ut they work for me. My background is grounded in the </span><a data-dcnode-id="4965" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//erikhare.com/2017/10/30/reformation/" rel="noopener" target="_blank"><span data-dcnode-id="4966" instrument_node="">Lutheran</span></a><span data-dcnode-id="4964" instrument_node=""> belief in Grace, or universal love, and reinforced by a very Mennonite desire to get right back to the words of Jesus himself.</span></p><span data-dcnode-id="4962" instrument_node="">
</span><p data-dcnode-id="4960"><span data-dcnode-id="4961" instrument_node="">Judge me however you wish. I am here to present facts which have guided my personal beliefs, not to state my beliefs in their entirety.</span></p><span data-dcnode-id="4959" instrument_node="">
</span><p data-dcnode-id="4956"><strong data-dcnode-id="4957"><span data-dcnode-id="4958" instrument_node="">Abortion</span></strong></p><span data-dcnode-id="4955" instrument_node="">
</span><p data-dcnode-id="4950"><span data-dcnode-id="4954" instrument_node="">The Bible is absolutely silent on the topic of abortion. It simply does not appear anywhere in it, at all. Where this is the single largest driving force in the life of Evangelicals, there is no basis in scripture for their stand. If anything, there is a vague understanding under </span><a data-dcnode-id="4952" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.myjewishlearning.com/article/the-fetus-in-jewish-law/" rel="noopener" target="_blank"><span data-dcnode-id="4953" instrument_node="">Jewish law</span></a><span data-dcnode-id="4951" instrument_node=""> that life begins at birth, but it is not spelled out in any way, positive or negative.</span></p><span data-dcnode-id="4949" instrument_node="">
</span><p data-dcnode-id="4946"><strong data-dcnode-id="4947"><span data-dcnode-id="4948" instrument_node="">Public Prayer (ie, in School)</span></strong></p><span data-dcnode-id="4945" instrument_node="">
</span><p data-dcnode-id="4943"><span data-dcnode-id="4944" instrument_node="">In the Sermon on the Mount, Jesus preached the basics of Christian life and practice. It begins with the famous Beatitudes, worth discussing at length elsewhere – along with their insistence on compassion, empathy, and mercy. But he continues from there and comes to this passage just before introducing The Lord’s Prayer:</span></p><span data-dcnode-id="4942" instrument_node="">
</span><blockquote data-dcnode-id="4936"><p data-dcnode-id="4940"><span data-dcnode-id="4941" instrument_node="">And when you pray, do not be like the hypocrites, for they love to pray standing in the synagogues and on the street corners to be seen by others. Truly I tell you, they have received their reward in full. But when you pray, go into your room, close the door and pray to your Father, who is unseen. Then your Father, who sees what is done in secret, will reward you.</span></p><span data-dcnode-id="4939" instrument_node="">
</span><p data-dcnode-id="4937"><span data-dcnode-id="4938" instrument_node="">Matthew 6:5-6 (NIV)</span></p></blockquote><span data-dcnode-id="4935" instrument_node="">
</span><p data-dcnode-id="4933"><span data-dcnode-id="4934" instrument_node="">Yes, prayer in public is specifically called out by Jesus himself as something for hypocrites.</span></p><span data-dcnode-id="4932" instrument_node="">
</span><p data-dcnode-id="4929"><strong data-dcnode-id="4930"><span data-dcnode-id="4931" instrument_node="">The War on Christmas</span></strong></p><span data-dcnode-id="4928" instrument_node="">
</span><p data-dcnode-id="4917"><span data-dcnode-id="4927" instrument_node="">Much has been made of “The War on Christmas” by those with an agenda to push. The truth is that Christmas has always been problematic for many reasons, especially in the old English tradition of being a </span><a data-dcnode-id="4925" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.historytoday.com/chris-durston/puritan-war-christmas" rel="noopener" target="_blank"><span data-dcnode-id="4926" instrument_node="">drinking holiday</span></a><span data-dcnode-id="4924" instrument_node="">. But the Christian spirit of the holiday has come and gone over the centuries and lately is indeed under attack. The enemy? If you listen to </span><a data-dcnode-id="4922" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//erikhare.com/2017/11/29/charlie-brown-christmas-2/" rel="noopener" target="_blank"><span data-dcnode-id="4923" instrument_node="">fervent believer Charles M. Schultz</span></a><span data-dcnode-id="4921" instrument_node="">, the problem is materialism. Indeed, “Happy Holidays” didn’t start out as a liberal plot but as a </span><a data-dcnode-id="4919" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.snopes.com/politics/christmas/walmart.asp" rel="noopener" target="_blank"><span data-dcnode-id="4920" instrument_node="">retail</span></a><span data-dcnode-id="4918" instrument_node=""> way of inviting everyone to come and spend money.</span></p><span data-dcnode-id="4916" instrument_node="">
</span><p data-dcnode-id="4914"><span data-dcnode-id="4915" instrument_node="">Evangelicals have never called out materialism. Those who preach a “Prosperity Gospel” actually embrace it. But the true enemy of Christmas as a sacred holiday for family and faith has indeed always been the rush to spend and give. Schultz had it right. Where did he get his values from? Jesus, again, in the same sermon:</span></p><span data-dcnode-id="4913" instrument_node="">
</span><blockquote data-dcnode-id="4907"><p data-dcnode-id="4911"><span data-dcnode-id="4912" instrument_node="">No one can serve two masters. Either you will hate the one and love the other, or you will be devoted to the one and despise the other. You cannot serve both God and money.</span></p><span data-dcnode-id="4910" instrument_node="">
</span><p data-dcnode-id="4908"><span data-dcnode-id="4909" instrument_node="">Matthew 6:24 (NIV)</span></p></blockquote><span data-dcnode-id="4906" instrument_node="">
</span><p data-dcnode-id="4904"><span data-dcnode-id="4905" instrument_node="">I have yet to hear Evangelicals call out commercialism or indeed capitalism as a whole, and certainly it has never been an important part of their agenda.</span></p><span data-dcnode-id="4903" instrument_node="">
</span><p data-dcnode-id="4900"><strong data-dcnode-id="4901"><span data-dcnode-id="4902" instrument_node="">Homosexuality</span></strong></p><span data-dcnode-id="4899" instrument_node="">
</span><p data-dcnode-id="4897"><span data-dcnode-id="4898" instrument_node="">This is a more difficult one, because a prohibition against homosexuality does appear in the Bible. It’s part of Leviticus, a series of laws given by God himself to the Jews (more on that later). It’s very harsh.</span></p><span data-dcnode-id="4896" instrument_node="">
</span><blockquote data-dcnode-id="4890"><p data-dcnode-id="4894"><span data-dcnode-id="4895" instrument_node="">“If a man has sexual relations with a man as one does with a woman, both of them have done what is detestable. They are to be put to death; their blood will be on their own heads.</span></p><span data-dcnode-id="4893" instrument_node="">
</span><p data-dcnode-id="4891"><span data-dcnode-id="4892" instrument_node="">Leviticus 20:13 (NIV)</span></p></blockquote><span data-dcnode-id="4889" instrument_node="">
</span><p data-dcnode-id="4887"><span data-dcnode-id="4888" instrument_node="">The problem is where this appears. It’s right after the same prohibition, and punishment, for serving as a medium to the spirits, committing adultery, and disobeying your parents. It’s one chapter after the more general prohibitions against shellfish, mixing meat and milk, tattoos, and mixed fiber clothes.</span></p><span data-dcnode-id="4886" instrument_node="">
</span><p data-dcnode-id="4884"><span data-dcnode-id="4885" instrument_node="">These laws were generally tossed aside by Christian tradition, which is why they are not practiced today. To emphasize one but not the other is to pick and choose, which is in itself rather blasphemous. We should, instead, be asking what Jesus said about homosexuality, and that much is clear – he said nothing at all. Not a word.</span></p><span data-dcnode-id="4883" instrument_node="">
</span><p data-dcnode-id="4881"><span data-dcnode-id="4882" instrument_node="">For his own part, Paul commented further.&nbsp; This is clearest condemnation of homosexuality in the Bible, but it isn’t really all that clear.&nbsp; In his letter to the Romans, Paul saw it as a sin, certainly, but again put the root problem with materialism.&nbsp; It’s hard to condemn one without the other:</span></p><span data-dcnode-id="4880" instrument_node="">
</span><blockquote data-dcnode-id="4874"><p data-dcnode-id="4878"><span data-dcnode-id="4879" instrument_node="">Therefore God gave them over in the sinful desires of their hearts to sexual impurity for the degrading of their bodies with one another. They exchanged the truth about God for a lie, and worshiped and served created things rather than the Creator—who is forever praised. Amen. Because of this, God gave them over to shameful lusts. Even their women exchanged natural sexual relations for unnatural ones. In the same way the men also abandoned natural relations with women and were inflamed with lust for one another. Men committed shameful acts with other men, and received in themselves the due penalty for their error.</span></p><span data-dcnode-id="4877" instrument_node="">
</span><p data-dcnode-id="4875"><span data-dcnode-id="4876" instrument_node="">Romans 1:24-27 (NIV)</span></p></blockquote><span data-dcnode-id="4873" instrument_node="">
</span><p data-dcnode-id="4870"><strong data-dcnode-id="4871"><span data-dcnode-id="4872" instrument_node="">The Ten Commandments</span></strong></p><span data-dcnode-id="4869" instrument_node="">
</span><p data-dcnode-id="4867"><span data-dcnode-id="4868" instrument_node="">Some Evangelicals are very insistent that the Ten Commandments should be put on public display. In fact, doing so with stone tablets in the Alabama Supreme Court was what got Roy Moore kicked off the bench the first time. But there is a big problem with them.</span></p><span data-dcnode-id="4866" instrument_node="">
</span><p data-dcnode-id="4862"><a data-dcnode-id="4864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.myjewishlearning.com/article/maimonides-rambam/" rel="noopener" target="_blank"><span data-dcnode-id="4865" instrument_node="">Rabbi Meniades</span></a><span data-dcnode-id="4863" instrument_node=""> found that there were a total of 613 laws given directly by God, not just the first ten. They are enumerated in Leviticus, as above. Most are ignored by Christians, but not by Orthodox and many Conservative Jews. Many are repeated in the Qu’ran.</span></p><span data-dcnode-id="4861" instrument_node="">
</span><p data-dcnode-id="4859"><span data-dcnode-id="4860" instrument_node="">What about the other 603? Evangelical Christians are silent, except the one they like (as above).</span></p><span data-dcnode-id="4858" instrument_node="">
</span><p data-dcnode-id="4856"><span data-dcnode-id="4857" instrument_node="">But staying with the first Ten, we still have an issue. The wording on them is slightly different in Jewish, Catholic, and Protestant traditions but the Fourth one is pretty clear in all of them: “Remember the Sabbath Day to keep it holy.” The problem is a simple one – the Sabbath is on Saturday. Christians chose to move it to Sunday, the day Jesus rose. Evangelical Christians, excepting Seventh Day Adventists and a few other small groups, violate one of the big ones every single week.</span></p><span data-dcnode-id="4855" instrument_node="">
</span><p data-dcnode-id="4852"><strong data-dcnode-id="4853"><span data-dcnode-id="4854" instrument_node="">Where Does This Leave Us?</span></strong></p><span data-dcnode-id="4851" instrument_node="">
</span><p data-dcnode-id="4849"><span data-dcnode-id="4850" instrument_node="">If you read the words of Jesus himself, it’s all pretty clear. There is a new covenant that cast aside the harsh laws of the past and is based on love. That love is for all of creation, of which we are a part. That’s not to say there won’t be people who say otherwise, but Jesus had a lot to say about those who would misrepresent his word for political gain:</span></p><span data-dcnode-id="4848" instrument_node="">
</span><blockquote data-dcnode-id="4842"><p data-dcnode-id="4846"><span data-dcnode-id="4847" instrument_node="">Watch out for false prophets. They come to you in sheep’s clothing, but inwardly they are ferocious wolves. By their fruit you will recognize them. Do people pick grapes from thornbushes, or figs from thistles? Likewise, every good tree bears good fruit, but a bad tree bears bad fruit. A good tree cannot bear bad fruit, and a bad tree cannot bear good fruit. Every tree that does not bear good fruit is cut down and thrown into the fire. Thus, by their fruit you will recognize them.</span></p><span data-dcnode-id="4845" instrument_node="">
</span><p data-dcnode-id="4843"><span data-dcnode-id="4844" instrument_node="">Matthew 7:15-20</span></p></blockquote><span data-dcnode-id="4841" instrument_node="">
</span><p data-dcnode-id="4839"><span data-dcnode-id="4840" instrument_node="">This particular passage was elaborated on by Paul in his letter to the Galatians, who wanted to know more. Is it really that simple, that we’ll know who is good and bad? Paul said it was:</span></p><span data-dcnode-id="4838" instrument_node="">
</span><blockquote data-dcnode-id="4832"><p data-dcnode-id="4836"><span data-dcnode-id="4837" instrument_node="">The acts of the flesh are obvious: sexual immorality, impurity and debauchery; idolatry and witchcraft; hatred, discord, jealousy, fits of rage, selfish ambition, dissensions, factions and envy; drunkenness, orgies, and the like. I warn you, as I did before, that those who live like this will not inherit the kingdom of God. But the fruit of the Spirit is love, joy, peace, forbearance, kindness, goodness, faithfulness, gentleness and self-control. Against such things there is no law. Those who belong to Christ Jesus have crucified the flesh with its passions and desires. Since we live by the Spirit, let us keep in step with the Spirit. Let us not become conceited, provoking and envying each other.</span></p><span data-dcnode-id="4835" instrument_node="">
</span><p data-dcnode-id="4833"><span data-dcnode-id="4834" instrument_node="">Galatians 5:19-26</span></p></blockquote><span data-dcnode-id="4831" instrument_node="">
</span><p data-dcnode-id="4829"><span data-dcnode-id="4830" instrument_node="">In this outline of what a good person and a good leader is, we are given a handy tool for evaluating who is indeed righteous. They will possess and practice love, joy, peace, forbearance, kindness, goodness, faithfulness, gentleness, and self control. If that doesn’t describe your leaders, either of your political movement or of your nation, there may be something of a problem – that is, if you are indeed a Christian.</span></p><span data-dcnode-id="4828" instrument_node="">

</span><div class="comment-content" data-dcnode-id="3673"><p data-dcnode-id="3684"><span data-dcnode-id="3685" instrument_node="">What exactly do we do at Mass for the first half? We read Scripture. So while nobody may have said specifically for you to read your Bible, you heard it all of the time and it is pretty standard practice for a Catholic to open a Bible and read it, at least that’s how it is supposed to be. The Catechism of the Catholic Church–the other book a Catholic is supposed to own–outlines how the Church understands Scripture as well as how the lay faithful are meant to pray with Scripture. You can’t level the blame entirely on the Church. While I believe the Church suffers from a lot of self-inflicted wounds, we have an obligation to figure out what we are supposed to believe. So if you want to know what the Church actually teaches, then you’re going to have to put the effort in.</span></p><span data-dcnode-id="3683" instrument_node="">
</span><p data-dcnode-id="3681"><span data-dcnode-id="3682" instrument_node="">The Bible is not the ultimate authority for the Catholic Church. How could it be? She compiled it after centuries of oral tradition in the 4th century. Sacred Scripture, Sacred Tradition, and the Magisterial teaching office make up the three pillars for how the Church approaches divine revelation. If you believe that the Bible specifically must mention something by name to be immoral, then you do not understand the Catholic Church. Pick up the Catechism. Not only will it explain the Church, it will explain how we understand Scripture, the moral law, and how the Church in being instituted by Christ preserves and teaches the fullness of truth which has been handed on for 2000 years. </span></p><span data-dcnode-id="3680" instrument_node="">
</span><p data-dcnode-id="3678"><span data-dcnode-id="3679" instrument_node="">If you’re looking for an exact mention of abortion–even though infant sacrifice and abortion are practices repeatedly mentioned in the Old and New Testaments according to Scripture scholars who can interpret Scripture in accordance with Sacred Tradition and the authority of the Church, precisely because these practices offered to Baal, Moloch, were frequent in pagan religions–the ancient Didache of the Early Church discusses it. You have an obligation to study what the Church teaches. Faith is not spoon fed from the pulpit. We have to put in the effort to figure out what the Church teaches beyond press releases that are often distorted about Pope Francis. If, your faith is based on the Pope then you have fallen for an ancient heresy. The actual Jesus Christ, the living God is who Pope Francis worships and he does so in accordance with the teaching and morality of the Church, including the fact that abortion is morally repugnant and gravely evil. That will never change. There are 33,000 denominations to choose from where people pick and choose what they like from Scripture. For the Catholic, we choose to love and accept her teachings or pray for the conversion to do so. That’s what a Catholic is, one who loves Christ AND His Holy Church.</span></p><span data-dcnode-id="3677" instrument_node="">
</span><p data-dcnode-id="3675"><span data-dcnode-id="3676" instrument_node="">As to the author of this piece, since you presume–as do Evangelicals–that you have authority to open the Bible and interpret it as you see fit, then you make the exact same mistake as those who you criticize. Scripture is not the ultimate authority. In fact sola scriptura cannot be found in the Bible anywhere. Rather, the fullness of truth is Sacred Scripture and Sacred Tradition (this came before the Bible, how do you think we got the Bible?!) as is interpreted through the Apostolic successors who are the Bishop and the head is the Pope. Christ instituted a Church. A practicing Jew was not going to do away with religion as a whole. That is a modernist lie and betrays everything we know about the ancient world and God Himself. A person reading their Bible by themselves could not possible come up with all of the proper interpretations for all of the historical, allegorical, symbolic, linguistic, etc. knowledge that is needed to understand what the Bible teaches about salvation history and the moral law given by God. Instead of proving anything other than that ideology is harmful to Christianity, you’ve merely replaced your own ideology with that of Evangelicals.</span></p><span data-dcnode-id="3674" instrument_node="">
</span></div><span data-dcnode-id="3672" instrument_node="">

</span><div class="comment-content" data-dcnode-id="3331"><p data-dcnode-id="3372"><span data-dcnode-id="3373" instrument_node="">Quote&gt;This is a more difficult one, because a prohibition against homosexuality does appear in the Bible. It’s part of Leviticus, a series of laws given by God himself to the Jews (more on that later). It’s very harsh.&gt;End Quote</span></p><span data-dcnode-id="3371" instrument_node="">
</span><p data-dcnode-id="3369"><span data-dcnode-id="3370" instrument_node="">Hi Erik,</span></p><span data-dcnode-id="3368" instrument_node="">
</span><p data-dcnode-id="3366"><span data-dcnode-id="3367" instrument_node="">There appears to be many people who have a problem differentiating between Jews, Christians and Israelites. Especially when studying The Word</span></p><span data-dcnode-id="3365" instrument_node="">
</span><p data-dcnode-id="3363"><span data-dcnode-id="3364" instrument_node="">In your above stated quote you state that God gave his laws to the Jews as written in Leviticus. At that time He actually gave the laws to ALL of the children of Israel – Not only the tribe of Judah.</span></p><span data-dcnode-id="3362" instrument_node="">
</span><p data-dcnode-id="3360"><span data-dcnode-id="3361" instrument_node="">As you are aware, the children of Israel eventually divided. The northern kingdom of Israel did not include Judah(Jews), Benjamin and eventually the priestly tribe of Levi.</span></p><span data-dcnode-id="3359" instrument_node="">
</span><p data-dcnode-id="3357"><span data-dcnode-id="3358" instrument_node="">In fact the first time the word Jew is used in the Bible(KJV) relates to a time when the northern kingdom of Israel was at war with the kingdom of Judah – 2 Kings 16.5-6 </span></p><span data-dcnode-id="3356" instrument_node="">
</span><p data-dcnode-id="3354"><span data-dcnode-id="3355" instrument_node="">The majority of the descendants of Jacob(Israel) are not Jews and never have been.</span></p><span data-dcnode-id="3353" instrument_node="">
</span><p data-dcnode-id="3351"><span data-dcnode-id="3352" instrument_node="">Generally, when the Bible speaks of the house of Israel and the house of Judah it is speaking to us about two entirely different peoples. Many confuse the two. Thus, misunderstandings occur as to what The Word is actually saying to us.                      </span></p><span data-dcnode-id="3350" instrument_node="">
</span><p data-dcnode-id="3348"><span data-dcnode-id="3349" instrument_node="">When the Bible speaks of the children of Israel then it is speaking about ALL of the descendants of Jacob – including Judah.</span></p><span data-dcnode-id="3347" instrument_node="">
</span><p data-dcnode-id="3345"><span data-dcnode-id="3346" instrument_node="">The original converts to Christianity were Jews, however, over time, as so-called Gentile converts became numerous and became increasingly divorced from the original teachings of Christ and the Laws it led to many asemblies going off down the wrong path. As so it has continued upto the present day.</span></p><span data-dcnode-id="3344" instrument_node="">
</span><p data-dcnode-id="3342"><span data-dcnode-id="3343" instrument_node="">The modern nation of Israel would have been better called Judea. In fact it was a discussed topic at the time of the nations resurrection.</span></p><span data-dcnode-id="3341" instrument_node="">
</span><p data-dcnode-id="3339"><span data-dcnode-id="3340" instrument_node="">A little off topic perhaps, but I believe it is important to differentiate between the children of Israel otherwise it is difficult to understand what the Word of God is revealing to us. </span></p><span data-dcnode-id="3338" instrument_node="">
</span><p data-dcnode-id="3336"><span data-dcnode-id="3337" instrument_node="">Regards</span></p><span data-dcnode-id="3335" instrument_node="">
</span><p data-dcnode-id="3333"><span data-dcnode-id="3334" instrument_node="">John</span></p><span data-dcnode-id="3332" instrument_node="">

</span><p data-dcnode-id="2855"><span data-dcnode-id="2856" instrument_node="">Maslow speak of human hierarchy of needs each human has.</span></p><span data-dcnode-id="2854" instrument_node="">
</span><p data-dcnode-id="2836"><span data-dcnode-id="2853" instrument_node="">1990’s adapted Hierarchy of Needs including Transcendence needs</span><br data-dcnode-id="2852"><span data-dcnode-id="2851" instrument_node="">
1. Biological and Physiological needs – air, food, drink, shelter, warmth, sex, sleep, etc.</span><br data-dcnode-id="2850"><span data-dcnode-id="2849" instrument_node="">
2. Safety needs – protection from elements, security, order, law, limits, stability, etc.</span><br data-dcnode-id="2848"><span data-dcnode-id="2847" instrument_node="">
3. Belongingness and Love needs – work group, family, affection, relationships, etc.</span><br data-dcnode-id="2846"><span data-dcnode-id="2845" instrument_node="">
4. Esteem needs – self-esteem, achievement, mastery, independence, status, dominance, prestige, managerial responsibility, etc.</span><br data-dcnode-id="2844"><span data-dcnode-id="2843" instrument_node="">
5. Cognitive needs – knowledge, meaning, etc.</span><br data-dcnode-id="2842"><span data-dcnode-id="2841" instrument_node="">
6. Aesthetic needs – appreciation and search for beauty, balance, form, etc.</span><br data-dcnode-id="2840"><span data-dcnode-id="2839" instrument_node="">
7. Self-Actualisation needs – realising personal potential, self-fulfillment, seeking personal growth and peak experiences.</span><br data-dcnode-id="2838"><span data-dcnode-id="2837" instrument_node="">
8. Transcendence needs – helping others to achieve self actualisation.  </span></p><span data-dcnode-id="2835" instrument_node="">

</span><div class="comment-content" data-dcnode-id="2745"><p data-dcnode-id="2783"><span data-dcnode-id="2784" instrument_node="">I personally don’t call myself an “Evangelical” just for the sake of the fact that I prefer the term Christian (or Nazarene) only, however, doctrinally, I suppose one could say I am indeed Evangelical/Protestant, whichever term you would like to use. </span></p><span data-dcnode-id="2782" instrument_node="">
</span><p data-dcnode-id="2780"><span data-dcnode-id="2781" instrument_node="">Let me begin by saying that reading through this post was hard for me. Not because I was convicted, but because there were so many errors and misunderstandings of even basic Christian doctrines, I don’t even know what to say. </span></p><span data-dcnode-id="2779" instrument_node="">
</span><p data-dcnode-id="2777"><span data-dcnode-id="2778" instrument_node="">“The Bible is absolutely silent on the topic of abortion. It simply does not appear anywhere in it, at all. Where this is the single largest driving force in the life of Evangelicals, there is no basis in scripture for their stand.” </span></p><span data-dcnode-id="2776" instrument_node="">
</span><p data-dcnode-id="2774"><span data-dcnode-id="2775" instrument_node="">How about the dozens of Scriptures that forbid the shedding of innocent blood? How about the Scriptures that clearly and emphatically teach a human life is completely present in the womb? Or how about the fact that God Himself is the one who knits together each human life in the womb for His own purposes, which we have no right to kill. Saying “the Bible doesn’t mention a 21st century practice of killing a fetus” is not only a misleading, it’s embarrassing. </span></p><span data-dcnode-id="2773" instrument_node="">
</span><p data-dcnode-id="2771"><span data-dcnode-id="2772" instrument_node="">“Yes, prayer in public is specifically called out by Jesus himself as something for hypocrites.”</span></p><span data-dcnode-id="2770" instrument_node="">
</span><p data-dcnode-id="2768"><span data-dcnode-id="2769" instrument_node="">Are you serious on this one? The verse is clearly referring to those who pray for the sake of being seen so people would think they were very righteous and devout people. People who make a spectacle out of praying. What does this verse have to do with children in school? Please do tell me.  </span></p><span data-dcnode-id="2767" instrument_node="">
</span><p data-dcnode-id="2765"><span data-dcnode-id="2766" instrument_node="">“These laws were generally tossed aside by Christian tradition, which is why they are not practiced today. ”</span></p><span data-dcnode-id="2764" instrument_node="">
</span><p data-dcnode-id="2762"><span data-dcnode-id="2763" instrument_node="">No, they’re not. The Mosaic covenant was fulfilled in Christ, but there are still universal moral truths which transcend specific covenants. Lying was wrong before Moses, and is still wrong today. Same sex relations are specifically repeated in the New Testament as still wrong. </span></p><span data-dcnode-id="2761" instrument_node="">
</span><p data-dcnode-id="2759"><span data-dcnode-id="2760" instrument_node="">“The problem is a simple one – the Sabbath is on Saturday. Christians chose to move it to Sunday”</span></p><span data-dcnode-id="2758" instrument_node="">
</span><p data-dcnode-id="2756"><span data-dcnode-id="2757" instrument_node="">No, they didn’t. The Sabbath was always Saturday, sunday is an entirely different day having to do with the Christian tradition of meeting on the day Christ rose, it was not a day set apart for rest. </span></p><span data-dcnode-id="2755" instrument_node="">
</span><p data-dcnode-id="2753"><span data-dcnode-id="2754" instrument_node="">Please, before writing a lengthy article attacking a group of people whose teachings you have no desire to understand, do a little bit of studying. </span></p><span data-dcnode-id="2752" instrument_node="">
</span><p data-dcnode-id="2750"><span data-dcnode-id="2751" instrument_node="">Sincerely-</span></p><span data-dcnode-id="2749" instrument_node="">

</span><div class="comment-content" data-dcnode-id="2702"><p data-dcnode-id="2704"><span data-dcnode-id="2705" instrument_node="">I definitely agree with you on many of these points. However, I do understand where Erik is coming from. He bases most of his statements on what Jesus said rather than the rest of the Bible. I think the error here comes in saying that the only important things are what Jesus said. We were given the whole Bible for a reason, and a huge part of that Bible is the Old Testament. While what Jesus said is important, things that God said are important too, and that is easy to forget in an age of feel-good Christianity. Jesus did change a lot of things, but that doesn’t mean that the rest of the Bible is unimportant, and I think that is where the misunderstanding comes in in this post.</span></p><span data-dcnode-id="2703" instrument_node="">

</span><div class="comment-content" data-dcnode-id="2517"><p data-dcnode-id="2519"><span data-dcnode-id="2520" instrument_node="">I think the message of the Bible is that we are all sinners in need of the saving grace of Jesus Christ. In regards to the rest, we all fail repeatedly to do what Christ tells us and we all misunderstand what he wants us to do. While it’s important to discuss these differences and to correct our brothers and sisters in love, cutting off an entire limb of the Church seems more hurtful than helpful. Christ is the head and he decides who is part of the body, not us. Let’s leave that judgment where it belongs and focus on fellowship, love, gentle correction, and especially following Jesus Christ together. After all, someone somewhere probably thinks you or I are not Christians because of something we believe too. </span></p><span data-dcnode-id="2518" instrument_node="">
</span></div><span data-dcnode-id="2516" instrument_node="">

</span><a aria-label="Reply to Erik Hare" class="comment-reply-link" data-belowelement="comment-54213" data-commentid="54213" data-dcnode-id="2487" data-postid="8674" data-replyto="Reply to Erik Hare" data-respondelement="respond" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//erikhare.com/2017/12/11/evangelicals-are-not-christians/%3Freplytocom%3D54213%23respond" rel="nofollow"><span data-dcnode-id="2488" instrument_node="">Reply</span></a><span data-dcnode-id="2486" instrument_node=""> </span></span><span data-dcnode-id="2483" instrument_node="">

</span><div class="comment-content" data-dcnode-id="2471"><p data-dcnode-id="2476"><span data-dcnode-id="2477" instrument_node="">I know for a fact that many people do not consider me to be a Christian.  I have been told this directly.  And I do not begrudge anyone their beliefs, certainly.  But when they say their beliefs came from Jesus and they most certainly did not?  What should we say?  </span></p><span data-dcnode-id="2475" instrument_node="">
</span><p data-dcnode-id="2473"><span data-dcnode-id="2474" instrument_node="">I see nothing wrong with asserting that those who do not follow what Jesus taught are not actually Christian.  This does not condemn them to Hell or anything like that.  It simply means that wherever they got their beliefs it certainly wasn’t from Jesus.  And I think we can easily show that.</span></p><span data-dcnode-id="2472" instrument_node="">

</span><div class="comment-content" data-dcnode-id="2432"><p data-dcnode-id="2434"><span data-dcnode-id="2435" instrument_node="">But being a Christian isn’t about what we do, it’s about who we follow. We can say to them ‘what you’re doing isn’t in keeping with the one whom we follow’. But none of us ever succeeds at that all the time. So when we say someone isn’t a Christian because they’ve failed at following Christ’s commands, we’re just accusing ourselves of the same thing. People are not Christian who do no follow Jesus Christ as their Lord and saviour. Apart from that, we’re in this together. We’re a family called to love and compassion. Is it possible for us to vehemently disagree with one another and still remember our love for each other? Even if that love is out of obligation to our Lord Jesus? </span></p><span data-dcnode-id="2433" instrument_node="">

</span><div class="comment-content" data-dcnode-id="2335"><p data-dcnode-id="2337"><span data-dcnode-id="2338" instrument_node="">Erik thanks for your post.  I do not call myself a Christian but I read the Christian scriptures and I believe in God.  I particularly like the four gospels where Jesus speaks.  For me, Jesus speaks about turning away from the materialistic life and being born again in the living waters of spirit.  Jesus spent 40 days in the desert and then was tempted by Satan by what is in the world – Jesus rejects Satan – it cannot be any clearer to me that Jesus was about this turning away from the material world and a return to spirit.  I find the Evangelical support for Trump to be a clear sign of their infatuation with the world; they seem to have nothing to do with the teaching of Jesus. It seems as if they made Jesus into God – they are followers of a God they named Jesus, violating the first of the 10 commandments.  Jesus was all about the Good above the Truth – as the Pharisees practice their religion to form (the truth) but do not hold the good in their hearts.</span></p><span data-dcnode-id="2336" instrument_node="">

</span><div class="comment-content" data-dcnode-id="2266"><p data-dcnode-id="2283"><span data-dcnode-id="2284" instrument_node="">Having been a Baptist minister (and “born again”) for almost 20 years and now considering myself a follower of “spirituality”, I see many things differently. First, there is the authority of the bible. We give authority to things or people; think that through. Some would like us to believe that the bible is “God’s word”, but that idea is something that some human beings decided to believe. I still believe the bible is very helpful in many ways, but it’s a HUGE assumption to declare it “God’s word” simply because of religious history. </span></p><span data-dcnode-id="2282" instrument_node="">
</span><p data-dcnode-id="2280"><span data-dcnode-id="2281" instrument_node="">Next there is the foundational belief in the Fall/Redemption. It’s important to realize that much of the bible is composed of stories. I now see the beginnings of Genesis as nothing more than human beings’ attempts to explain the “human condition”. Why a “fall”? Why not this is simply the way we are? Matthew Fox’s “Original Blessing” does a wonderful job in explaining this. Of course, this puts the role and purpose of Jesus in a completely different light. Let’s just say that I now believe that Jesus was a the great example and not the great exception. The one who is called the “light of the world” also told us that we are the “light of the world”. Ultimately, it’s about following Jesus, who told us about the kingdom of God within and living by faith vs adherence to a particular belief system and a particular church. It’s about the God inside and not the God out there somewhere. </span></p><span data-dcnode-id="2279" instrument_node="">
</span><p data-dcnode-id="2277"><span data-dcnode-id="2278" instrument_node="">Regarding a “red letter” bible, we have assumed that somehow, through divine inspiration that what we have are actually the words of Jesus; a HUGE assumption. How many of us accurately remember what people said many years or decades earlier? The Gospel narratives were not taped interviews. We have declared that God intervened and gave us essentially exactly what Jesus said. People did not make mistakes in memory? Stories that were told were told absolutely accurately and then passed down again and again accurately? No one had bias and remembered what they wanted to remember and did not change the story a bit like we all do? So, a group of men hundreds of years later, with doctrines and theology already established (of course, there was an East vs West church difference) somehow, under God’s direction gave us exactly (or almost) what God wanted? That’s a belief that is part of a system and not faith. Then, people debate about what it says “in the Greek” when Jesus spoke in Aramaic. We have just a “decent” idea of what Jesus said and was about, but we made it into churches with doctrines and beliefs that must be adhered to for “admission” (i say that with a bit of sarcasm).</span></p><span data-dcnode-id="2276" instrument_node="">
</span><p data-dcnode-id="2274"><span data-dcnode-id="2275" instrument_node="">Yes, we humans are far from perfect, but we are learning more and more about our minds and how we work. Science, which seeks truth and is willing to change “beliefs”, unlike most churches which hold on dearly to the “old, old story” seems much more spiritual. Churches seem to put their faith in their beliefs vs faith in the God who inside. It’s about human responsibility and not so much a belief system. Jesus expected us to be the light of the world and shine so that people would see goodness and there for glorify God. Most would prefer to find “security” in a belief system vs being a responsible follower of the light inside.</span></p><span data-dcnode-id="2273" instrument_node="">
</span><p data-dcnode-id="2271"><span data-dcnode-id="2272" instrument_node="">Hey, if you disagree and love your belief system, fine with me. Even if you declare me “not a christian”, that’s OK too. I’ll respect your beliefs and most importantly, you. </span></p><span data-dcnode-id="2270" instrument_node="">
</span><p data-dcnode-id="2268"><span data-dcnode-id="2269" instrument_node="">Philip Bourdon</span></p><span data-dcnode-id="2267" instrument_node="">
