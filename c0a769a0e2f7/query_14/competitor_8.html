noir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/commentaries/sermon/matthew/5.htm" title="Sermon Bible"><span data-dcnode-id="1179" instrument_node="">Sermon</span></a><span data-dcnode-id="1177" instrument_node=""> • </span><a data-dcnode-id="1175" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/commentaries/sco/matthew/5.htm" title="Scofield Reference Notes"><span data-dcnode-id="1176" instrument_node="">SCO</span></a><span data-dcnode-id="1174" instrument_node=""> • </span><a data-dcnode-id="1172" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/commentaries/ttb/matthew/5.htm" title="Through The Bible"><span data-dcnode-id="1173" instrument_node="">TTB</span></a><span data-dcnode-id="1171" instrument_node=""> • </span><a data-dcnode-id="1169" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/commentaries/vws/matthew/5.htm" title="Vincent's Word Studies"><span data-dcnode-id="1170" instrument_node="">VWS</span></a><span data-dcnode-id="1168" instrument_node=""> • </span><a data-dcnode-id="1166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/commentaries/wes/matthew/5.htm" title="Wesley's Notes"><span data-dcnode-id="1167" instrument_node="">WES</span></a><span data-dcnode-id="1165" instrument_node=""> • </span><a data-dcnode-id="1163" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/anc2.htm%23tsk" title="Treasury of Scripture Knowledge"><span data-dcnode-id="1164" instrument_node="">TSK</span></a></div><div data-dcnode-id="855" id="leftbox"><div class="padleft" data-dcnode-id="856"><div class="comtype" data-dcnode-id="1160"><span data-dcnode-id="1161" instrument_node="">EXPOSITORY (ENGLISH BIBLE)</span></div><div class="vheading2" data-dcnode-id="1157"><a data-dcnode-id="1158" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/commentaries/ellicott/matthew/5.htm"><span data-dcnode-id="1159" instrument_node="">Ellicott's Commentary for English Readers</span></a></div><span data-dcnode-id="1156" instrument_node="">(21) </span><span class="bld" data-dcnode-id="1154"><span data-dcnode-id="1155" instrument_node="">By them of old time.</span></span><span data-dcnode-id="1153" instrument_node="">—There is no reasonable doubt that the marginal reading, </span><span class="ital" data-dcnode-id="1151"><span data-dcnode-id="1152" instrument_node="">to them of old time,</span></span><span data-dcnode-id="1150" instrument_node=""> is right. The construction is identical with that of </span><a data-dcnode-id="1148" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/romans/9-12.htm" title="It was said to her, The elder shall serve the younger."><span data-dcnode-id="1149" instrument_node="">Romans 9:12</span></a><span data-dcnode-id="1147" instrument_node="">; </span><a data-dcnode-id="1145" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/romans/9-26.htm" title="And it shall come to pass, that in the place where it was said to them, You are not my people; there shall they be called the children of the living God."><span data-dcnode-id="1146" instrument_node="">Romans 9:26</span></a><span class="ital" data-dcnode-id="1143"><span data-dcnode-id="1144" instrument_node="">;</span></span><span data-dcnode-id="1142" instrument_node=""> </span><a data-dcnode-id="1140" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/galatians/3-16.htm" title="Now to Abraham and his seed were the promises made. He said not, And to seeds, as of many; but as of one, And to your seed, which is Christ."><span data-dcnode-id="1141" instrument_node="">Galatians 3:16</span></a><span data-dcnode-id="1139" instrument_node="">; </span><a data-dcnode-id="1137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/revelation/6-11.htm" title="And white robes were given to every one of them; and it was said to them, that they should rest yet for a little season, until their fellow servants also and their brothers, that should be killed as they were, should be fulfilled."><span data-dcnode-id="1138" instrument_node="">Revelation 6:11</span></a><span data-dcnode-id="1136" instrument_node="">; </span><a data-dcnode-id="1134" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/revelation/9-4.htm" title="And it was commanded them that they should not hurt the grass of the earth, neither any green thing, neither any tree; but only those men which have not the seal of God in their foreheads."><span data-dcnode-id="1135" instrument_node="">Revelation 9:4</span></a><span data-dcnode-id="1133" instrument_node="">. Two questions present themselves for answer: (1) Who were “they of old time”? (2) Who was the speaker of the words quoted? (1) The words are very general, and, as interpreted by the use of “old time” in </span><a data-dcnode-id="1131" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/acts/15-21.htm" title="For Moses of old time has in every city them that preach him, being read in the synagogues every sabbath day."><span data-dcnode-id="1132" instrument_node="">Acts 15:21</span></a><span data-dcnode-id="1130" instrument_node="">, seem to point to the time when synagogues began to be established, </span><span class="ital" data-dcnode-id="1128"><span data-dcnode-id="1129" instrument_node="">i.e.,</span></span><span data-dcnode-id="1127" instrument_node=""> after the return from Babylon. (2) The impersonal form, the contrast between “it was said,” and “I say unto you,” the tone of authority imposing a new law for that which it supersedes, seem conclusive against referring the words, even when they are found in the Law, to that Law as given by God through Moses. Stress is laid on the words “Ye heard that it was said.” “This was the report of the Law given you by your teachers in school and synagogue. I give you another and truer report. Not what you so heard, but what I now say unto you is the true completion of the Law and the Prophets, and therefore the abiding law of my kingdom.”</span><p data-dcnode-id="1120"><span class="bld" data-dcnode-id="1125"><span data-dcnode-id="1126" instrument_node="">Whosoever shall kill shall be in danger of the judgment.</span></span><span data-dcnode-id="1124" instrument_node="">—The fact that these words are not found in the Old Testament confirms the view that our Lord is speaking of the traditional comments on the Law, and not of the Law itself. The phrase “in danger” had a somewhat more technical sense in A.D. 1611 than it has now, and meant “legally liable to.” The “judgment” spoken of was that of the local courts of </span><a data-dcnode-id="1122" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/deuteronomy/16-18.htm" title="Judges and officers shall you make you in all your gates, which the LORD your God gives you, throughout your tribes: and they shall judge the people with just judgment."><span data-dcnode-id="1123" instrument_node="">Deuteronomy 16:18</span></a><span data-dcnode-id="1121" instrument_node="">. They had the power of capital punishment, but the special form of death by stoning was reserved for the Sanhedrim, or Council.</span></p><p data-dcnode-id="1119"></p><div class="vheading2" data-dcnode-id="1116"><a data-dcnode-id="1117" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/commentaries/benson/matthew/5.htm"><span data-dcnode-id="1118" instrument_node="">Benson Commentary</span></a></div><span class="bld" data-dcnode-id="1113"><a data-dcnode-id="1114" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/context/matthew/5-21.htm" title="You have heard that it was said of them of old time, You shall not kill; and whoever shall kill shall be in danger of the judgment:..."><span data-dcnode-id="1115" instrument_node="">Matthew 5:21-22</span></a></span><span data-dcnode-id="1112" instrument_node="">. </span><span class="ital" data-dcnode-id="1110"><span data-dcnode-id="1111" instrument_node="">Ye have heard </span></span><span data-dcnode-id="1109" instrument_node="">— Namely, from the scribes reciting the law, </span><span class="ital" data-dcnode-id="1107"><span data-dcnode-id="1108" instrument_node="">that it was said by them of old time, </span></span><span data-dcnode-id="1106" instrument_node="">or </span><span class="ital" data-dcnode-id="1104"><span data-dcnode-id="1105" instrument_node="">to the ancients, </span></span><span data-dcnode-id="1103" instrument_node="">as </span><span class="greekheb" data-dcnode-id="1101"><span data-dcnode-id="1102" instrument_node="">ερρεθη τιος αρχαιοις</span></span><span data-dcnode-id="1100" instrument_node="">, might be properly rendered. </span><span class="ital" data-dcnode-id="1098"><span data-dcnode-id="1099" instrument_node="">Thou shalt not kill — </span></span><span data-dcnode-id="1097" instrument_node="">Words which they interpreted barely of the outward act of murder; </span><span class="ital" data-dcnode-id="1095"><span data-dcnode-id="1096" instrument_node="">and whosoever shall kill </span></span><span data-dcnode-id="1094" instrument_node="">— Or be guilty of that act, </span><span class="ital" data-dcnode-id="1092"><span data-dcnode-id="1093" instrument_node="">shall be in danger of, </span></span><span data-dcnode-id="1091" instrument_node="">or, </span><span class="ital" data-dcnode-id="1089"><span data-dcnode-id="1090" instrument_node="">obnoxious to the judgment </span></span><span data-dcnode-id="1088" instrument_node="">— To understand this, it is necessary to observe, that the Jews had, in every city, a common court of twenty-three men, which, before the Roman government was established in Judea, had the power of life and death, so far as its jurisdiction extended, and could punish criminals with </span><span class="ital" data-dcnode-id="1086"><span data-dcnode-id="1087" instrument_node="">strangling </span></span><span data-dcnode-id="1085" instrument_node="">or </span><span class="ital" data-dcnode-id="1083"><span data-dcnode-id="1084" instrument_node="">beheading. </span></span><span data-dcnode-id="1082" instrument_node="">This was called </span><span class="ital" data-dcnode-id="1080"><span data-dcnode-id="1081" instrument_node="">the judgment, </span></span><span data-dcnode-id="1079" instrument_node="">and the meaning of the clause is, that such a criminal should be capitally punished in the common courts of judicature. </span><span class="ital" data-dcnode-id="1077"><span data-dcnode-id="1078" instrument_node="">But I say unto you </span></span><span data-dcnode-id="1076" instrument_node="">— Which of the prophets ever spake thus? Their language was, </span><span class="ital" data-dcnode-id="1074"><span data-dcnode-id="1075" instrument_node="">Thus saith the Lord. </span></span><span data-dcnode-id="1073" instrument_node="">Who hath authority to use this language, but the one Lawgiver who is able to save and to destroy? </span><span class="ital" data-dcnode-id="1071"><span data-dcnode-id="1072" instrument_node="">Whosoever is angry with his brother </span></span><span data-dcnode-id="1070" instrument_node="">— With any child of man, for we are all brethren; </span><span class="ital" data-dcnode-id="1068"><span data-dcnode-id="1069" instrument_node="">without a cause </span></span><span data-dcnode-id="1067" instrument_node="">— Or further than that cause warrants; </span><span class="ital" data-dcnode-id="1065"><span data-dcnode-id="1066" instrument_node="">shall be in danger of the judgment — </span></span><span data-dcnode-id="1064" instrument_node="">Shall be liable to a worse punishment from God than any that your common courts of judicature can inflict. It must be observed, that the word </span><span class="greekheb" data-dcnode-id="1062"><span data-dcnode-id="1063" instrument_node="">εικη</span></span><span data-dcnode-id="1061" instrument_node="">, here rendered </span><span class="ital" data-dcnode-id="1059"><span data-dcnode-id="1060" instrument_node="">without cause, </span></span><span data-dcnode-id="1058" instrument_node="">and which might properly be translated </span><span class="ital" data-dcnode-id="1056"><span data-dcnode-id="1057" instrument_node="">rashly, </span></span><span data-dcnode-id="1055" instrument_node="">or </span><span class="ital" data-dcnode-id="1053"><span data-dcnode-id="1054" instrument_node="">inconsiderately, </span></span><span data-dcnode-id="1052" instrument_node="">is wanting in some old versions and manuscripts, and, it seems, ought not to be inserted, being “utterly foreign to the whole scope and tenor of our Lord’s discourse. For if he had only forbidden the being angry </span><span class="ital" data-dcnode-id="1050"><span data-dcnode-id="1051" instrument_node="">without a cause, </span></span><span data-dcnode-id="1049" instrument_node="">there was no manner of need of that solemn declaration, </span><span class="ital" data-dcnode-id="1047"><span data-dcnode-id="1048" instrument_node="">I say unto you; </span></span><span data-dcnode-id="1046" instrument_node="">for the scribes and Pharisees themselves said as much as this. Even they taught men ought not to be angry </span><span class="ital" data-dcnode-id="1044"><span data-dcnode-id="1045" instrument_node="">without a cause. </span></span><span data-dcnode-id="1043" instrument_node="">So that this righteousness does not exceed theirs. But Christ teaches that we ought not, </span><span class="ital" data-dcnode-id="1041"><span data-dcnode-id="1042" instrument_node="">for any cause, </span></span><span data-dcnode-id="1040" instrument_node="">to be so </span><span class="ital" data-dcnode-id="1038"><span data-dcnode-id="1039" instrument_node="">angry </span></span><span data-dcnode-id="1037" instrument_node="">as to call any man </span><span class="ital" data-dcnode-id="1035"><span data-dcnode-id="1036" instrument_node="">raca, </span></span><span data-dcnode-id="1034" instrument_node="">or </span><span class="ital" data-dcnode-id="1032"><span data-dcnode-id="1033" instrument_node="">fool. </span></span><span data-dcnode-id="1031" instrument_node="">We ought not, for any cause, to be angry at the </span><span class="ital" data-dcnode-id="1029"><span data-dcnode-id="1030" instrument_node="">person </span></span><span data-dcnode-id="1028" instrument_node="">of the sinner, but at his </span><span class="ital" data-dcnode-id="1026"><span data-dcnode-id="1027" instrument_node="">sin </span></span><span data-dcnode-id="1025" instrument_node="">only. Happy world, were this plain and necessary distinction thoroughly understood, remembered, and practised.” — Wesley. </span><span class="ital" data-dcnode-id="1023"><span data-dcnode-id="1024" instrument_node="">Raca, </span></span><span data-dcnode-id="1022" instrument_node="">means a </span><span class="ital" data-dcnode-id="1020"><span data-dcnode-id="1021" instrument_node="">silly man, </span></span><span data-dcnode-id="1019" instrument_node="">or an </span><span class="ital" data-dcnode-id="1017"><span data-dcnode-id="1018" instrument_node="">empty, worthless </span></span><span data-dcnode-id="1016" instrument_node="">fellow. </span><span class="greekheb" data-dcnode-id="1014"><span data-dcnode-id="1015" instrument_node="">Κενε</span></span><span data-dcnode-id="1013" instrument_node="">, </span><span class="ital" data-dcnode-id="1011"><span data-dcnode-id="1012" instrument_node="">vain man, </span></span><span data-dcnode-id="1010" instrument_node="">used </span><a data-dcnode-id="1008" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/james/2-20.htm" title="But will you know, O vain man, that faith without works is dead?"><span data-dcnode-id="1009" instrument_node="">James 2:20</span></a><span data-dcnode-id="1007" instrument_node="">, seems to be a translation of it; for, as Jerome observes, it is derived from the Hebrew, </span><span class="ital" data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">rick, </span></span><span data-dcnode-id="1004" instrument_node="">which signifies </span><span class="ital" data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">vain, </span></span><span data-dcnode-id="1001" instrument_node="">or </span><span class="ital" data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">empty. Shall be in danger of the council </span></span><span data-dcnode-id="998" instrument_node="">— In the Greek, </span><span class="greekheb" data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">συνεδριον</span></span><span data-dcnode-id="995" instrument_node="">; “a word which the Jews adopted into their language, and giving it a Hebrew termination, </span><span class="ital" data-dcnode-id="993"><span data-dcnode-id="994" instrument_node="">sanhedrim, </span></span><span data-dcnode-id="992" instrument_node="">appropriated it to their supreme council, whose business was to judge in the most important affairs; for instance, in all matters relative to religion, as when any person pretended to be a prophet, or attempted to make innovations in the established worship. This court could, while the republic lasted, inflict the heaviest punishments; particularly stoning, or burning, with melted lead poured down the throat of the criminal, after he was half strangled.” — Macknight. </span><span class="ital" data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">Whosoever shall say, Thou fool </span></span><span data-dcnode-id="989" instrument_node="">— Or, </span><span class="ital" data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">Thou graceless, wicked villain: </span></span><span data-dcnode-id="986" instrument_node="">so the word </span><span class="ital" data-dcnode-id="984"><span data-dcnode-id="985" instrument_node="">fool </span></span><span data-dcnode-id="983" instrument_node="">generally signifies in Scripture: for as religion is the highest wisdom, vice must be accounted the extremest </span><span class="ital" data-dcnode-id="981"><span data-dcnode-id="982" instrument_node="">folly: </span></span><span data-dcnode-id="980" instrument_node="">the meaning here is, Whosoever shall break out into open revilings and reproaches against any man, </span><span class="ital" data-dcnode-id="978"><span data-dcnode-id="979" instrument_node="">shall be in danger of hell fire </span></span><span data-dcnode-id="977" instrument_node="">— </span><span class="greekheb" data-dcnode-id="975"><span data-dcnode-id="976" instrument_node="">Ενοχος εσται εις γεενναν του πυρος</span></span><span data-dcnode-id="974" instrument_node="">, shall be obnoxious to a gehenna of fire, that is, by a common figure of speech, “obnoxious to the fire of the valley of Hinnom,” obnoxious to a degree of future punishment, which may fitly be represented by that fire. </span><span class="ital" data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">Of the valley of Hinnom, </span></span><span data-dcnode-id="971" instrument_node="">called also </span><span class="ital" data-dcnode-id="969"><span data-dcnode-id="970" instrument_node="">Tophet, </span></span><span data-dcnode-id="968" instrument_node="">see notes on </span><a data-dcnode-id="966" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/leviticus/18-21.htm" title="And you shall not let any of your seed pass through the fire to Molech, neither shall you profane the name of your God: I am the LORD."><span data-dcnode-id="967" instrument_node="">Leviticus 18:21</span></a><span data-dcnode-id="965" instrument_node="">; </span><a data-dcnode-id="963" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/2_kings/23-10.htm" title="And he defiled Topheth, which is in the valley of the children of Hinnom, that no man might make his son or his daughter to pass through the fire to Molech."><span data-dcnode-id="964" instrument_node="">2 Kings 23:10</span></a><span data-dcnode-id="962" instrument_node="">; </span><a data-dcnode-id="960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/isaiah/30-33.htm" title="For Tophet is ordained of old; yes, for the king it is prepared; he has made it deep and large: the pile thereof is fire and much wood; the breath of the LORD, like a stream of brimstone, does kindle it."><span data-dcnode-id="961" instrument_node="">Isaiah 30:33</span></a><span data-dcnode-id="959" instrument_node="">. It was the scene of the detestable worship of Moloch, that horrid idol of the Ammonites, to which the Israelites burned their children alive as sacrifices. “In later times, continual fires were kept in this valley for burning the unburied carcasses and filth of the city, that, being thus polluted, it might be unfit for the like religious abominations. The Jews, from the perpetuity of these fires, and to express the utmost detestation of the sacrifices which were offered to Moloch in this valley, made use of its name to signify </span><span class="ital" data-dcnode-id="957"><span data-dcnode-id="958" instrument_node="">hell. </span></span><span data-dcnode-id="956" instrument_node="">Hence our translators have given </span><span class="ital" data-dcnode-id="954"><span data-dcnode-id="955" instrument_node="">Tophet, </span></span><span data-dcnode-id="953" instrument_node="">or gehenna, its metaphorical meaning in the present passage, whereas it ought rather to have had its literal signification. For our Lord, intending to show his hearers that the punishment of causeless anger, contemptuous speeches, and abusive names, shall, in the life to come, bear a proportion to the guilt that is in these sins; and finding no name in the language of men by which those different degrees of punishment could properly be expressed, he illustrated them by the punishments which the Jews were acquainted with.”</span><span class="p" data-dcnode-id="950"><br data-dcnode-id="952"><br data-dcnode-id="951"></span><a data-dcnode-id="949" id="mhc" name="mhc"></a><div class="vheading2" data-dcnode-id="946"><a data-dcnode-id="947" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/commentaries/mhc/matthew/5.htm"><span data-dcnode-id="948" instrument_node="">Matthew Henry's Concise Commentary</span></a></div><span data-dcnode-id="945" instrument_node="">5:21-26 The Jewish teachers had taught, that nothing except actual murder was forbidden by the sixth commandment. Thus they explained away its spiritual meaning. Christ showed the full meaning of this commandment; according to which we must be judged hereafter, and therefore ought to be ruled now. All rash anger is heart murder. By our brother, here, we are to understand any person, though ever so much below us, for we are all made of one blood. Raca, is a scornful word, and comes from pride: Thou fool, is a spiteful word, and comes from hatred. Malicious slanders and censures are poison that kills secretly and slowly. Christ told them that how light soever they made of these sins, they would certainly be called into judgment for them. We ought carefully to preserve Christian love and peace with all our brethren; and if at any time there is a quarrel, we should confess our fault, humble ourselves to our brother, making or offering satisfaction for wrong done in word or deed: and we should do this quickly; because, till this is done, we are unfit for communion with God in holy ordinances. And when we are preparing for any religious exercises, it is good for us to make that an occasion of serious reflection and self-examination. What is here said is very applicable to our being reconciled to God through Christ. While we are alive, we are in the way to his judgement-seat; after death, it will be too late. When we consider the importance of the case, and the uncertainty of life, how needful it is to seek peace with God, without delay!</span><a data-dcnode-id="944" id="bar" name="bar"></a><div class="vheading2" data-dcnode-id="941"><a data-dcnode-id="942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/commentaries/barnes/matthew/5.htm"><span data-dcnode-id="943" instrument_node="">Barnes' Notes on the Bible</span></a></div><span data-dcnode-id="940" instrument_node="">Ye have heard - Or, this is the common interpretation among the Jews. Jesus proceeds here to comment on some prevailing opinions among the Jews; to show that the righteousness of the scribes and Pharisees was defective; and that people needed a better righteousness, or they could not be saved. He illustrates what he meant by that better righteousness by showing that the common opinions of the scribes were erroneous.</span><p data-dcnode-id="938"><span data-dcnode-id="939" instrument_node="">By them of old time - This might be translated to the ancients, referring to Moses and the prophets. But it is more probable that Jesus here refers to the interpreters of the law and the prophets. He did not set himself against the law of Moses, but against the false and pernicious interpretations of the law prevalent in his time.</span></p><p data-dcnode-id="933"><span data-dcnode-id="937" instrument_node="">Thou shalt not kill - See </span><a data-dcnode-id="935" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/exodus/20-13.htm"><span data-dcnode-id="936" instrument_node="">Exodus 20:13</span></a><span data-dcnode-id="934" instrument_node="">. This properly denotes taking the life of another with malice, or with an intention to murder him. The Jews understood it as meaning no more. The comment of our Saviour shows that it was spiritual, and was designed to extend to the thoughts and feelings as well as the external act.</span></p><p data-dcnode-id="922"><span data-dcnode-id="932" instrument_node="">Shall be in danger of - Shall be held guilty, and be punished by. The law of Moses declared that the murderer should be put to death, </span><a data-dcnode-id="930" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/leviticus/24-21.htm"><span data-dcnode-id="931" instrument_node="">Leviticus 24:21</span></a><span data-dcnode-id="929" instrument_node="">; </span><a data-dcnode-id="927" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/numbers/35-16.htm"><span data-dcnode-id="928" instrument_node="">Numbers 35:16</span></a><span data-dcnode-id="926" instrument_node="">. It did not say, however, by whom this should be done, and it was left to the Jews to organize courts to have cognizance of such crimes, </span><a data-dcnode-id="924" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/deuteronomy/16-18.htm"><span data-dcnode-id="925" instrument_node="">Deuteronomy 16:18</span></a><span data-dcnode-id="923" instrument_node="">.</span></p><p data-dcnode-id="919"><span data-dcnode-id="921" instrument_node="">The judgment - This was the tribunal that had cognizance of cases of murder, etc. It was a court that sat in each city or town, and consisted commonly of seven members. It was the lowest court among the Jews, and from it an appeal might be taken to the Sanhedrin. </span><a data-dcnode-id="920" id="jfb" name="jfb"></a></p><div class="vheading2" data-dcnode-id="916"><a data-dcnode-id="917" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/commentaries/jfb/matthew/5.htm"><span data-dcnode-id="918" instrument_node="">Jamieson-Fausset-Brown Bible Commentary</span></a></div><span data-dcnode-id="915" instrument_node="">21. Ye have heard that it was said by them of old time—or, as in the Margin, "to them of old time." Which of these translations is the right one has been much controverted. Either of them is grammatically defensible, though the latter—"to the ancients"—is more consistent with New Testament usage (see the Greek of Ro 9:12, 26; Re 6:11; 9:4); and most critics decide in favor of it. But it is not a question of Greek only. Nearly all who would translate "to the ancients" take the speaker of the words quoted to be Moses in the law; "the ancients" to be the people to whom Moses gave the law; and the intention of our Lord here to be to contrast His own teaching, more or less, with that of Moses; either as opposed to it—as some go the length of affirming—or at least as modifying, enlarging, elevating it. But who can reasonably imagine such a thing, just after the most solemn and emphatic proclamation of the perpetuity of the law, and the honor and glory in which it was to be held under the new economy? To us it seems as plain as possible that our Lord's one object is to contrast the traditional perversions of the law with the true sense of it as expounded by Himself. A few of those who assent to this still think that "to the ancients" is the only legitimate translation of the words; understanding that our Lord is reporting what had been said to the ancients, not by Moses, but by the perverters of his law. We do not object to this; but we incline to think (with Beza, and after him with Fritzsche, Olshausen, Stier, and Bloomfield) that "by the ancients" must have been what our Lord meant here, referring to the corrupt teachers rather than the perverted people.</span><p data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">Thou shall not kill:—that is, This being all that the law requires, whosoever has imbrued his hands in his brother's blood, but he only, is guilty of a breach of this commandment.</span></p><p data-dcnode-id="911"><span data-dcnode-id="912" instrument_node="">and whosoever shall kill shall be in danger of the judgment—liable to the judgment; that is, of the sentence of those inferior courts of judicature which were established in all the principal towns, in compliance with De 16:16. Thus was this commandment reduced, from a holy law of the heart-searching God, to a mere criminal statute, taking cognizance only of outward actions, such as that which we read in Ex 21:12; Le 24:17.</span></p><div class="vheading2" data-dcnode-id="908"><a data-dcnode-id="909" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/commentaries/poole/matthew/5.htm"><span data-dcnode-id="910" instrument_node="">Matthew Poole's Commentary</span></a></div><span data-dcnode-id="907" instrument_node=""> </span><span class="bld" data-dcnode-id="902"><span data-dcnode-id="906" instrument_node="">See Poole on "</span><a data-dcnode-id="904" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/matthew/5-22.htm" title="But I say to you, That whoever is angry with his brother without a cause shall be in danger of the judgment: and whoever shall say to his brother, Raca, shall be in danger of the council: but whoever shall say, You fool, shall be in danger of hell fire."><span data-dcnode-id="905" instrument_node="">Matthew 5:22</span></a><span data-dcnode-id="903" instrument_node="">"</span></span><span data-dcnode-id="901" instrument_node="">. </span><span class="p" data-dcnode-id="898"><br data-dcnode-id="900"><br data-dcnode-id="899"></span><a data-dcnode-id="897" id="gil" name="gil"></a><div class="vheading2" data-dcnode-id="894"><a data-dcnode-id="895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/commentaries/gill/matthew/5.htm"><span data-dcnode-id="896" instrument_node="">Gill's Exposition of the Entire Bible</span></a></div><span data-dcnode-id="893" instrument_node="">Ye have heard,.... That is, from the Scriptures being read to them, and the explanations of the ancients, which were called   "hearing", being read in the schools, and heard by the scholars (o); so that to "hear", was along with the recital of the text, to receive by tradition, the sense the elders had given of it: of this kind is the instance produced by Christ. Thus Onkelos, and Jonathan ben Uzziel, render the phrase, "him shall ye hear", in  </span><a data-dcnode-id="891" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/deuteronomy/18-15.htm"><span data-dcnode-id="892" instrument_node="">Deuteronomy 18:15</span></a><span data-dcnode-id="890" instrument_node=""> by , "from him shall ye receive"; so those phrases (p),  , "they learn from hearing", or by report from others; and   "they speak from hearing", or from what they have heard, are often used for receiving and reporting things as they have them by tradition. That "it was said", or "it hath been said"; this is also a Talmudic form of expression; often is this phrase to be met with in the Talmud,  "it has been said" (q); that is, by the ancient doctors, as here, "by them of old time", or "to the ancients", so in Munster's Hebrew Gospel; not to the Israelites in the time of Moses, but to the ancestors of the Jews, since the times of Ezra; by the elders, who were contemporary with them; and who by their false glosses corrupted the law, when they recited any part of it to the people; or "by the ancients", the ancient doctors and commentators, which preceded the times of Christ, whom the Jews often call  "our ancients" (r). Now, upon that law, "thou shalt not kill", they put this gloss, or added this by way of interpretation, </span><p data-dcnode-id="888"><span data-dcnode-id="889" instrument_node="">and whosoever shall kill, shall be in danger of the judgment; which they understood only of actual murder, either committed in their own persons, or by the means of others. Their rules for the judgment of such persons were these; </span></p><p data-dcnode-id="886"><span data-dcnode-id="887" instrument_node="">"everyone that kills his neighbour with his hand; as if he strikes him with a sword, or with a stone that kills him; or strangles him till he die; or burns him in fire; seeing he kills him in any manner, in his own person, lo! such an one must be put to death , "by the house of judgment", or the sanhedrim (s).'' </span></p><p data-dcnode-id="884"><span data-dcnode-id="885" instrument_node="">Not that which consisted of three persons only, but either that which consisted of twenty three, or the supreme one, which was made up of seventy one; which two last had only power of judging capital offences. Again, </span></p><p data-dcnode-id="882"><span data-dcnode-id="883" instrument_node="">"if a man hires a murderer to kill his neighbour, or sends his servants, and they kill him, or binds him, and leaves him before a lion, or the like, and the beast kills him, everyone of these is a shedder of blood; and the sin of slaughter is in his hand; and he is guilty of death by the hand of heaven, i.e. God; but he is not to be put to death by the house of judgment, or the sanhedrim (t).'' </span></p><p data-dcnode-id="880"><span data-dcnode-id="881" instrument_node="">A little after, it is said, "their judgment" is delivered to heaven, i.e. to God; and this seems to be the sense of the word "judgment" here, namely, the judgment of God, or death by the hand of God; since it is manifestly distinguished from the council, or sanhedrim, in the next "verse". The phrase, </span></p><p data-dcnode-id="878"><span data-dcnode-id="879" instrument_node="">in danger of judgment, is the same with (u) , "guilty of judgment", or deserves condemnation. </span></p><p data-dcnode-id="866"><span data-dcnode-id="877" instrument_node="">(o) Vid. Buxtorf. Lex. Rabbin, fol. 2453. (p) Maimon. Hilch. Issure Mizbeach, c. 1. sect. 2, 4, 5, 7, 10. &amp; passim, &amp; T. Bab. Sanhedrim, fol. 88. 1.((q) Vid. Edzardi Not. in Avoda Zara, c. 2. p. 284. (r) Vid. R. Aben Ezra in </span><a data-dcnode-id="875" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//biblehub.com/exodus/21.htm"><span data-dcnode-id="876" instrument_node="">Exodus 21</span></a><span data-dcnode-id="874" instrument_node="">.17. &amp; in </span><a data-dcnode-id="872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//biblehub.com/isaiah/52.htm"><span data-dcnode-id="873" instrument_node="">Isaiah 52</span></a><span data-dcnode-id="871" instrument_node="">.13. &amp; lxvi. 24. (s) Maimon. Hilch. Rotseach, c. 2. sect. 1.((t) Maimon. Hilch. Rotseach, c. 2. sect. 2.((u) In Targ. in </span><a data-dcnode-id="869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//biblehub.com/2_chronicles/19.htm"><span data-dcnode-id="870" instrument_node="">2 Chronicles 19</span></a><span data-dcnode-id="868" instrument_node="">.10. </span><a data-dcnode-id="867" id="gsb" name="gsb"></a></p><div class="vheading2" data-dcnode-id="863"><a data-dcnode-id="864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/commentaries/gsb/matthew/5.htm"><span data-dcnode-id="865" instrument_node="">Geneva Study Bible</span></a></div><span class="cverse2" data-dcnode-id="859"><span class="cverse3" data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">{5}</span></span><span data-dcnode-id="860" instrument_node=""> Ye have heard that it was said by them of old time, Thou shalt not kill; and whosoever shall kill shall be in danger of the judgment:</span></span><p data-dcnode-id="857"><span data-dcnode-id="858" instrument_node="">(5) The true meaning of the first commandment.</span></p></div></div><div data-dcnode-id="175" id="centbox"><div class="padcent" data-dcnode-id="176"><div class="comtype" data-dcnode-id="853"><span data-dcnode-id="854" instrument_node="">EXEGETICAL (ORIGINAL LANGUAGES)</span></div><div class="vheading2" data-dcnode-id="850"><a data-dcnode-id="851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/commentaries/meyer/matthew/5.htm"><span data-dcnode-id="852" instrument_node="">Meyer's NT Commentary</span></a></div><a data-dcnode-id="848" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/matthew/5-21.htm" title="You have heard that it was said of them of old time, You shall not kill; and whoever shall kill shall be in danger of the judgment:"><span data-dcnode-id="849" instrument_node="">Matthew 5:21</span></a><span data-dcnode-id="847" instrument_node="">. There now follow on to the end of the chapter six—neither five (Hilgenfeld) nor seven (Köstlin)—</span><span class="ital" data-dcnode-id="845"><span data-dcnode-id="846" instrument_node="">antithetic examples</span></span><span data-dcnode-id="844" instrument_node=""> of the fulfilling of the law of Jesus, not merely derived from the Decalogue, or from its second table (Keim), but from the Pentateuch generally; not, however, of an antinomian kind, consequently not in opposition to the divine law itself (Chrysostom and many Fathers, Maldonatus, Neander, Bleek, Socinians and Arminians), but opposed, indeed, to all the manifold limitations and one-sided </span><span class="ital" data-dcnode-id="842"><span data-dcnode-id="843" instrument_node="">apprehensions</span></span><span data-dcnode-id="841" instrument_node=""> and </span><span class="ital" data-dcnode-id="839"><span data-dcnode-id="840" instrument_node="">applications</span></span><span data-dcnode-id="838" instrument_node=""> of the same, as it was represented and followed out in life by the common traditional Judaism, and specially by the </span><span class="ital" data-dcnode-id="836"><span data-dcnode-id="837" instrument_node="">Pharisees</span></span><span data-dcnode-id="835" instrument_node="">, without insight into the deeper unity and the purely moral absolute meaning. Comp. also Hofmann, </span><span class="ital" data-dcnode-id="833"><span data-dcnode-id="834" instrument_node="">Schriftbew</span></span><span data-dcnode-id="832" instrument_node="">. I. p. 599 f.; Harless, </span><span class="ital" data-dcnode-id="830"><span data-dcnode-id="831" instrument_node="">d. Ehescheidungsfrage</span></span><span data-dcnode-id="829" instrument_node="">, 1861, p. 7 f.; Weiss, Keim. That use of the law produced a false </span><span class="ital" data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">legalism</span></span><span data-dcnode-id="826" instrument_node="">, without sincerity and virtue, in opposition to which Jesus wishes to develope and assert the true and full righteous </span><span class="ital" data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">morality</span></span><span data-dcnode-id="823" instrument_node=""> out of the divine law.</span><span class="p" data-dcnode-id="820"><br data-dcnode-id="822"><br data-dcnode-id="821"></span><span class="greekheb" data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">ἠκούσατε</span></span><span data-dcnode-id="817" instrument_node="">] from the law which is read before you (</span><a data-dcnode-id="815" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/john/12-34.htm" title="The people answered him, We have heard out of the law that Christ stays for ever: and how say you, The Son of man must be lifted up? who is this Son of man?"><span data-dcnode-id="816" instrument_node="">John 12:34</span></a><span data-dcnode-id="814" instrument_node="">; </span><a data-dcnode-id="812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/romans/2-13.htm" title="(For not the hearers of the law are just before God, but the doers of the law shall be justified."><span data-dcnode-id="813" instrument_node="">Romans 2:13</span></a><span data-dcnode-id="811" instrument_node="">; </span><a data-dcnode-id="809" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/galatians/4-21.htm" title="Tell me, you that desire to be under the law, do you not hear the law?"><span data-dcnode-id="810" instrument_node="">Galatians 4:21</span></a><span data-dcnode-id="808" instrument_node="">; </span><a data-dcnode-id="806" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/acts/15-21.htm" title="For Moses of old time has in every city them that preach him, being read in the synagogues every sabbath day."><span data-dcnode-id="807" instrument_node="">Acts 15:21</span></a><span data-dcnode-id="805" instrument_node="">), and from the instruction which you have received regarding its exposition.</span><span class="p" data-dcnode-id="802"><br data-dcnode-id="804"><br data-dcnode-id="803"></span><span class="greekheb" data-dcnode-id="800"><span data-dcnode-id="801" instrument_node="">τοῖς ἀρχαίοις</span></span><span data-dcnode-id="799" instrument_node="">] may grammatically be taken not only as a </span><span class="ital" data-dcnode-id="797"><span data-dcnode-id="798" instrument_node="">dative</span></span><span data-dcnode-id="796" instrument_node=""> (Chrysostom, Theophylact, Euth. Zigabenus, Luther, Erasmus, Grotius, Wetstein, Bengel, and many others; also Tholuck, Neander, de Wette, Ritschl, Bleek, Weizsäcker), but also as an </span><span class="ital" data-dcnode-id="794"><span data-dcnode-id="795" instrument_node="">ablative: by the ancients</span></span><span data-dcnode-id="793" instrument_node=""> (see Kühner, II. 1, p. 368 f.; Winer, p. 206 [E. T. 277]); so Beza, Piscator, Schoettgen, Raphel, and many; also Paulus, Kuinoel, Fritzsche, Olshausen, Baumgarten, Ewald, Lechler, Keim. On the </span><span class="ital" data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">first</span></span><span data-dcnode-id="790" instrument_node=""> rendering, which most obviously suggests itself (</span><a data-dcnode-id="788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/romans/9-12.htm" title="It was said to her, The elder shall serve the younger."><span data-dcnode-id="789" instrument_node="">Romans 9:12</span></a><span data-dcnode-id="787" instrument_node="">; </span><a data-dcnode-id="785" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/romans/9-26.htm" title="And it shall come to pass, that in the place where it was said to them, You are not my people; there shall they be called the children of the living God."><span data-dcnode-id="786" instrument_node="">Romans 9:26</span></a><span data-dcnode-id="784" instrument_node="">; </span><a data-dcnode-id="782" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/galatians/3-16.htm" title="Now to Abraham and his seed were the promises made. He said not, And to seeds, as of many; but as of one, And to your seed, which is Christ."><span data-dcnode-id="783" instrument_node="">Galatians 3:16</span></a><span data-dcnode-id="781" instrument_node="">; </span><a data-dcnode-id="779" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/revelation/6-11.htm" title="And white robes were given to every one of them; and it was said to them, that they should rest yet for a little season, until their fellow servants also and their brothers, that should be killed as they were, should be fulfilled."><span data-dcnode-id="780" instrument_node="">Revelation 6:11</span></a><span data-dcnode-id="778" instrument_node="">; </span><a data-dcnode-id="776" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/revelation/9-4.htm" title="And it was commanded them that they should not hurt the grass of the earth, neither any green thing, neither any tree; but only those men which have not the seal of God in their foreheads."><span data-dcnode-id="777" instrument_node="">Revelation 9:4</span></a><span data-dcnode-id="775" instrument_node="">), the ancients are </span><span class="ital" data-dcnode-id="773"><span data-dcnode-id="774" instrument_node="">the Jewish generations of earlier times</span></span><span data-dcnode-id="772" instrument_node=""> (before Christ), </span><span class="ital" data-dcnode-id="770"><span data-dcnode-id="771" instrument_node="">to</span></span><span data-dcnode-id="769" instrument_node=""> which Moses and his followers (</span><a data-dcnode-id="767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/matthew/23-2.htm" title="Saying The scribes and the Pharisees sit in Moses' seat:"><span data-dcnode-id="768" instrument_node="">Matthew 23:2</span></a><span data-dcnode-id="766" instrument_node=""> f.), the scribes, spoke (de Wette, Ritschl), not simply the Israelites in the time of Moses, to whom the </span><span class="ital" data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">latter</span></span><span data-dcnode-id="763" instrument_node=""> spoke (Neander, Bleek); on the </span><span class="ital" data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">latter</span></span><span data-dcnode-id="760" instrument_node=""> view it is </span><span class="ital" data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">Moses</span></span><span data-dcnode-id="757" instrument_node=""> (who would not have to be excluded, as Keim maintains), </span><span class="ital" data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">and his ancient expositors learned in the Scripture;</span></span><span data-dcnode-id="754" instrument_node=""> for there follow their sayings, which are partly </span><span class="ital" data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">without</span></span><span data-dcnode-id="751" instrument_node="">, partly accompanied </span><span class="ital" data-dcnode-id="749"><span data-dcnode-id="750" instrument_node="">with</span></span><span data-dcnode-id="748" instrument_node="">, additions proceeding from the scribes. The decision between these two views is given not merely by the constant usage of the N. T., which joins </span><span class="greekheb" data-dcnode-id="746"><span data-dcnode-id="747" instrument_node="">ἐῤῥέθη</span></span><span data-dcnode-id="745" instrument_node=""> with the dative, but also by the antithesis </span><span class="greekheb" data-dcnode-id="743"><span data-dcnode-id="744" instrument_node="">ἐγὼ δὲ λέγω ὑμῖν</span></span><span data-dcnode-id="742" instrument_node="">, in which </span><span class="greekheb" data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">ἐγώ</span></span><span data-dcnode-id="739" instrument_node=""> corresponds to the logical subject of </span><span class="greekheb" data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">ἐῤῥέθη</span></span><span data-dcnode-id="736" instrument_node="">, and </span><span class="greekheb" data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">ὑμῖν</span></span><span data-dcnode-id="733" instrument_node=""> to </span><span class="greekheb" data-dcnode-id="731"><span data-dcnode-id="732" instrument_node="">τοῖς ἀρχαίοις</span></span><span data-dcnode-id="730" instrument_node="">; the latter consequently cannot itself be the subject. Luther therefore rightly renders: </span><span class="ital" data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">that it is said to them of old time</span></span><span data-dcnode-id="727" instrument_node="">.[406] Pointless objections are made by Keim, II. p. 248, who even finds in this view something opposed to the sense; because the people of the present day have not yet heard of that which was enjoined on them of </span><span class="ital" data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">old time</span></span><span data-dcnode-id="724" instrument_node="">, but of what has been enjoined upon themselves. On the other hand, it is to be recollected that it was precisely a peculiarity of the Jewish method of instruction, and still is so, to refer the present generation to those of old time, to inculcate upon the former the </span><span class="greekheb" data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">παράδοσις</span></span><span data-dcnode-id="721" instrument_node=""> which had been common in ancient times, and had been already given to their forefathers. Thus the people of the present time have certainly heard in the synagogues </span><span class="ital" data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">what was said to them of old time</span></span><span data-dcnode-id="718" instrument_node="">. Comp., moreover, Diodorus Siculus xxii. 20 : </span><span class="greekheb" data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">καλῶς εἴρηται τοῖς παλαῖοις</span></span><span data-dcnode-id="715" instrument_node="">, </span><span class="greekheb" data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">ὅτι</span></span><span data-dcnode-id="712" instrument_node="">, </span><span class="greekheb" data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">κ</span></span><span data-dcnode-id="709" instrument_node="">.</span><span class="greekheb" data-dcnode-id="707"><span data-dcnode-id="708" instrument_node="">τ</span></span><span data-dcnode-id="706" instrument_node="">.</span><span class="greekheb" data-dcnode-id="704"><span data-dcnode-id="705" instrument_node="">λ</span></span><span data-dcnode-id="703" instrument_node="">.</span><span class="p" data-dcnode-id="700"><br data-dcnode-id="702"><br data-dcnode-id="701"></span><span class="greekheb" data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">οὐ φονεύσεις</span></span><span data-dcnode-id="697" instrument_node="">] </span><a data-dcnode-id="695" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/exodus/20-12.htm" title="Honor your father and your mother: that your days may be long on the land which the LORD your God gives you."><span data-dcnode-id="696" instrument_node="">Exodus 20:12</span></a><span data-dcnode-id="694" instrument_node="">. The prohibition refers to the </span><span class="ital" data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">act</span></span><span data-dcnode-id="691" instrument_node="">, though not by itself, but as the effect of anger, of hostility, and so on; for there is also a putting to death which is permitted, nay, even commanded. The Pharisaic explanation and application of the legal saying was confined to the literal prohibition of the </span><span class="ital" data-dcnode-id="689"><span data-dcnode-id="690" instrument_node="">act;</span></span><span data-dcnode-id="688" instrument_node=""> the fulfiller of the law lays open the whole </span><span class="ital" data-dcnode-id="686"><span data-dcnode-id="687" instrument_node="">disposition</span></span><span data-dcnode-id="685" instrument_node=""> that deserves punishment, which, as the ethical condition of the act, was aimed at by the prohibition of the latter. The following words contain a </span><span class="ital" data-dcnode-id="683"><span data-dcnode-id="684" instrument_node="">traditional addition</span></span><span data-dcnode-id="682" instrument_node="">, although one not alien to the law, by the scribes, who interpreted that prohibition externally.</span><span class="p" data-dcnode-id="679"><br data-dcnode-id="681"><br data-dcnode-id="680"></span><span class="greekheb" data-dcnode-id="677"><span data-dcnode-id="678" instrument_node="">κρίσις</span></span><span data-dcnode-id="676" instrument_node="">, according to </span><a data-dcnode-id="674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/matthew/5-22.htm" title="But I say to you, That whoever is angry with his brother without a cause shall be in danger of the judgment: and whoever shall say to his brother, Raca, shall be in danger of the council: but whoever shall say, You fool, shall be in danger of hell fire."><span data-dcnode-id="675" instrument_node="">Matthew 5:22</span></a><span data-dcnode-id="673" instrument_node="">, opposed to the Sanhedrin, is the </span><span class="ital" data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">local court</span></span><span data-dcnode-id="670" instrument_node="">, found, according to </span><a data-dcnode-id="668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/deuteronomy/16-18.htm" title="Judges and officers shall you make you in all your gates, which the LORD your God gives you, throughout your tribes: and they shall judge the people with just judgment."><span data-dcnode-id="669" instrument_node="">Deuteronomy 16:18</span></a><span data-dcnode-id="667" instrument_node="">, in every city of Palestine, to which it belonged to take cognizance of and to punish even murder (</span><span class="ital" data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">execution by the sword</span></span><span data-dcnode-id="664" instrument_node="">), </span><a data-dcnode-id="662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/2_chronicles/19-5.htm" title="And he set judges in the land throughout all the fenced cities of Judah, city by city,"><span data-dcnode-id="663" instrument_node="">2 Chronicles 19:5</span></a><span data-dcnode-id="661" instrument_node="">; Josephus, </span><span class="ital" data-dcnode-id="659"><span data-dcnode-id="660" instrument_node="">Antt</span></span><span data-dcnode-id="658" instrument_node="">. iv. 8. 14. According to the Rabbins, it consisted of twenty-three members; according to Josephus, of seven. See generally, Tholuck, Keil, </span><span class="ital" data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">Arch</span></span><span data-dcnode-id="655" instrument_node="">. II. p. 250 ff. To the higher court of justice, the </span><span class="ital" data-dcnode-id="653"><span data-dcnode-id="654" instrument_node="">Sanhedrin</span></span><span data-dcnode-id="652" instrument_node="">, </span><a data-dcnode-id="650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/matthew/5-22.htm" title="But I say to you, That whoever is angry with his brother without a cause shall be in danger of the judgment: and whoever shall say to his brother, Raca, shall be in danger of the council: but whoever shall say, You fool, shall be in danger of hell fire."><span data-dcnode-id="651" instrument_node="">Matthew 5:22</span></a><span data-dcnode-id="649" instrument_node="">, it belonged to take cognizance also of crimes punishable by </span><span class="ital" data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">stoning</span></span><span data-dcnode-id="646" instrument_node="">.</span><span class="p" data-dcnode-id="643"><br data-dcnode-id="645"><br data-dcnode-id="644"></span><span data-dcnode-id="642" instrument_node="">[406] Instead of </span><span class="greekheb" data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">ἐῤῥέθη</span></span><span data-dcnode-id="639" instrument_node="">, Lachmann and Tischendorf have, after B D E K V, the form </span><span class="greekheb" data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">ἐῤῥήθη</span></span><span data-dcnode-id="636" instrument_node="">. Both forms are found in Plato (see Heindorf, </span><span class="ital" data-dcnode-id="634"><span data-dcnode-id="635" instrument_node="">ad Gorg</span></span><span data-dcnode-id="633" instrument_node="">. p. 46), to whom, however, Schneider, </span><span class="ital" data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">ad Pol.</span></span><span data-dcnode-id="630" instrument_node=""> V. p. 450 A, everywhere assigns the latter as the proper one. The first is the more common in the later Greek, and therefore to be preferred in the N. T. See in general, Lobeck, </span><span class="ital" data-dcnode-id="628"><span data-dcnode-id="629" instrument_node="">ad Phryn</span></span><span data-dcnode-id="627" instrument_node="">. p. 447. Comp. on </span><a data-dcnode-id="625" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/romans/9-12.htm" title="It was said to her, The elder shall serve the younger."><span data-dcnode-id="626" instrument_node="">Romans 9:12</span></a><span data-dcnode-id="624" instrument_node="">; </span><a data-dcnode-id="622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/galatians/3-16.htm" title="Now to Abraham and his seed were the promises made. He said not, And to seeds, as of many; but as of one, And to your seed, which is Christ."><span data-dcnode-id="623" instrument_node="">Galatians 3:16</span></a><span data-dcnode-id="621" instrument_node="">.</span><span class="p" data-dcnode-id="618"><br data-dcnode-id="620"><br data-dcnode-id="619"></span><div class="vheading2" data-dcnode-id="615"><a data-dcnode-id="616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/commentaries/egt/matthew/5.htm"><span data-dcnode-id="617" instrument_node="">Expositor's Greek Testament</span></a></div><a data-dcnode-id="613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/context/matthew/5-21.htm" title="You have heard that it was said of them of old time, You shall not kill; and whoever shall kill shall be in danger of the judgment:..."><span data-dcnode-id="614" instrument_node="">Matthew 5:21-26</span></a><span data-dcnode-id="612" instrument_node="">. </span><span class="ital" data-dcnode-id="610"><span data-dcnode-id="611" instrument_node="">First illustration of Christ’s ethical attitude</span></span><span data-dcnode-id="609" instrument_node="">, taken from the Sixth Commandment. In connection with this and the following exemplifications of Christ’s ethical method, the interpreter is embarrassed by the long-continued strifes of the theological schools, which have brought back the spirit of legalism, from which the great Teacher sought to deliver His disciples. It will be best to ignore these strifes and go steadily on our way.</span><span class="p" data-dcnode-id="606"><br data-dcnode-id="608"><br data-dcnode-id="607"></span><div class="vheading2" data-dcnode-id="603"><a data-dcnode-id="604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/commentaries/cambridge/matthew/5.htm"><span data-dcnode-id="605" instrument_node="">Cambridge Bible for Schools and Colleges</span></a></div><span data-dcnode-id="602" instrument_node="">(</span><span class="ital" data-dcnode-id="600"><span data-dcnode-id="601" instrument_node="">a</span></span><span data-dcnode-id="599" instrument_node="">) Instances from the Decalogue, </span><a data-dcnode-id="597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/context/matthew/5-21.htm" title="You have heard that it was said of them of old time, You shall not kill; and whoever shall kill shall be in danger of the judgment:..."><span data-dcnode-id="598" instrument_node="">Matthew 5:21-37</span></a><span data-dcnode-id="596" instrument_node="">. (</span><span class="ital" data-dcnode-id="594"><span data-dcnode-id="595" instrument_node="">a</span></span><span data-dcnode-id="593" instrument_node="">) Murder, </span><a data-dcnode-id="591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/context/matthew/5-21.htm" title="You have heard that it was said of them of old time, You shall not kill; and whoever shall kill shall be in danger of the judgment:..."><span data-dcnode-id="592" instrument_node="">Matthew 5:21-26</span></a><span data-dcnode-id="590" instrument_node="">.</span><span class="p" data-dcnode-id="587"><br data-dcnode-id="589"><br data-dcnode-id="588"></span><span class="bld" data-dcnode-id="585"><span data-dcnode-id="586" instrument_node="">21</span></span><span data-dcnode-id="584" instrument_node="">. </span><span class="ital" data-dcnode-id="582"><span data-dcnode-id="583" instrument_node="">Ye have heard</span></span><span data-dcnode-id="581" instrument_node="">] Rather, </span><span class="bld" data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">ye heard</span></span><span data-dcnode-id="578" instrument_node=""> either in the service of the synagogue or in the teaching of the scribes.</span><span class="p" data-dcnode-id="575"><br data-dcnode-id="577"><br data-dcnode-id="576"></span><span class="ital" data-dcnode-id="573"><span data-dcnode-id="574" instrument_node="">by them of old time</span></span><span data-dcnode-id="572" instrument_node="">] Better, to them of old time.</span><span class="p" data-dcnode-id="569"><br data-dcnode-id="571"><br data-dcnode-id="570"></span><span class="ital" data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">in danger of</span></span><span data-dcnode-id="566" instrument_node="">] Lit. </span><span class="bld" data-dcnode-id="564"><span data-dcnode-id="565" instrument_node="">bound by them, liable, exposed to</span></span><span data-dcnode-id="563" instrument_node="">.</span><span class="p" data-dcnode-id="560"><br data-dcnode-id="562"><br data-dcnode-id="561"></span><div class="vheading2" data-dcnode-id="557"><a data-dcnode-id="558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/commentaries/bengel/matthew/5.htm"><span data-dcnode-id="559" instrument_node="">Bengel's Gnomen</span></a></div><a data-dcnode-id="555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/matthew/5-21.htm" title="You have heard that it was said of them of old time, You shall not kill; and whoever shall kill shall be in danger of the judgment:"><span data-dcnode-id="556" instrument_node="">Matthew 5:21</span></a><span data-dcnode-id="554" instrument_node="">. </span><span class="greekheb" data-dcnode-id="552"><span data-dcnode-id="553" instrument_node="">Ἠκούσατε</span></span><span data-dcnode-id="551" instrument_node="">, </span><span class="ital" data-dcnode-id="549"><span data-dcnode-id="550" instrument_node="">ye have heard</span></span><span data-dcnode-id="548" instrument_node="">) From public readings, to which you have given your assent. In the New Testament the teachers are referred to their reading of the law, the people to their hearing of it. See </span><a data-dcnode-id="546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/john/12-34.htm" title="The people answered him, We have heard out of the law that Christ stays for ever: and how say you, The Son of man must be lifted up? who is this Son of man?"><span data-dcnode-id="547" instrument_node="">John 12:34</span></a><span data-dcnode-id="545" instrument_node="">; </span><a data-dcnode-id="543" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/romans/2-13.htm" title="(For not the hearers of the law are just before God, but the doers of the law shall be justified."><span data-dcnode-id="544" instrument_node="">Romans 2:13</span></a><span data-dcnode-id="542" instrument_node="">; </span><a data-dcnode-id="540" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/romans/2-18.htm" title="And know his will, and approve the things that are more excellent, being instructed out of the law;"><span data-dcnode-id="541" instrument_node="">Romans 2:18</span></a><span data-dcnode-id="539" instrument_node="">.—</span><span class="greekheb" data-dcnode-id="537"><span data-dcnode-id="538" instrument_node="">ὅτι ἐῤῥέθη</span></span><span data-dcnode-id="536" instrument_node="">, </span><span class="ital" data-dcnode-id="534"><span data-dcnode-id="535" instrument_node="">that it has been said</span></span><span data-dcnode-id="533" instrument_node="">) An impersonal form of speech, to which is elegantly opposed, </span><span class="ital" data-dcnode-id="531"><span data-dcnode-id="532" instrument_node="">I say</span></span><span data-dcnode-id="530" instrument_node="">. Moses said it truly; the interpreters of Moses said it with altered meaning: the hearers did not distinguish the meaning of Moses from that of his interpreters. The name of Moses occurs, but with a less forcible contrast, in ch. </span><a data-dcnode-id="528" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/context/matthew/19-8.htm" title="He said to them, Moses because of the hardness of your hearts suffered you to put away your wives: but from the beginning it was not so...."><span data-dcnode-id="529" instrument_node="">Matthew 19:8-9</span></a><span data-dcnode-id="527" instrument_node="">, sc. </span><span class="ital" data-dcnode-id="525"><span data-dcnode-id="526" instrument_node="">Moses permitted, but</span></span><span data-dcnode-id="524" instrument_node=""> [</span><span class="ital" data-dcnode-id="522"><span data-dcnode-id="523" instrument_node="">I</span></span><span data-dcnode-id="521" instrument_node="">] </span><span class="ital" data-dcnode-id="519"><span data-dcnode-id="520" instrument_node="">say unto you</span></span><span data-dcnode-id="518" instrument_node="">, where </span><span class="ital" data-dcnode-id="516"><span data-dcnode-id="517" instrument_node="">I</span></span><span data-dcnode-id="515" instrument_node=""> is not expressed in the original, for there is no contention between Moses and Christ: the Jews had departed from both Moses and Christ. The language of Christ does not exceed the law of Moses (see ch. </span><a data-dcnode-id="513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/matthew/7-12.htm" title="Therefore all things whatever you would that men should do to you, do you even so to them: for this is the law and the prophets."><span data-dcnode-id="514" instrument_node="">Matthew 7:12</span></a><span data-dcnode-id="512" instrument_node="">); for concupiscence, proscribed in </span><a data-dcnode-id="510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/matthew/5-28.htm" title="But I say to you, That whoever looks on a woman to lust after her has committed adultery with her already in his heart."><span data-dcnode-id="511" instrument_node="">Matthew 5:28</span></a><span data-dcnode-id="509" instrument_node="">, is also prohibited by the law: see </span><a data-dcnode-id="507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/romans/7-7.htm" title="What shall we say then? Is the law sin? God forbid. No, I had not known sin, but by the law: for I had not known lust, except the law had said, You shall not covet."><span data-dcnode-id="508" instrument_node="">Romans 7:7</span></a><span data-dcnode-id="506" instrument_node="">. He however restores the truths which the Scribes had taken from the law, and clears away the falsehoods which they had added; see </span><a data-dcnode-id="504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/matthew/5-43.htm" title="You have heard that it has been said, You shall love your neighbor, and hate your enemy."><span data-dcnode-id="505" instrument_node="">Matthew 5:43</span></a><span data-dcnode-id="503" instrument_node="">. The phrase, “</span><span class="ital" data-dcnode-id="501"><span data-dcnode-id="502" instrument_node="">But I say</span></span><span data-dcnode-id="500" instrument_node="">,” is an antithetic formula, by which Christ, as if Moses had never existed (for the servant gives place to his Lord), orders all things simply, not in the guise of a Legislator or Interpreter, but as the Son declaring the will of His Father: see ch. </span><a data-dcnode-id="498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/matthew/7-21.htm" title="Not every one that said to me, Lord, Lord, shall enter into the kingdom of heaven; but he that does the will of my Father which is in heaven."><span data-dcnode-id="499" instrument_node="">Matthew 7:21</span></a><span data-dcnode-id="497" instrument_node="">, and cf. ch. </span><a data-dcnode-id="495" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/matthew/3-17.htm" title="And see a voice from heaven, saying, This is my beloved Son, in whom I am well pleased."><span data-dcnode-id="496" instrument_node="">Matthew 3:17</span></a><span data-dcnode-id="494" instrument_node="">. The law is perfect: whatever the Saviour prohibits or commands in this passage, the law had previously prohibited or commanded: it judges the secrets of the heart (see </span><a data-dcnode-id="492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/romans/7-14.htm" title="For we know that the law is spiritual: but I am carnal, sold under sin."><span data-dcnode-id="493" instrument_node="">Romans 7:14</span></a><span data-dcnode-id="491" instrument_node="">); but on account of the hard heart of the people, it more frequently expresses outward acts. Therefore the Lord says, “</span><span class="ital" data-dcnode-id="489"><span data-dcnode-id="490" instrument_node="">But I say unto you</span></span><span data-dcnode-id="488" instrument_node="">,” not, “</span><span class="ital" data-dcnode-id="486"><span data-dcnode-id="487" instrument_node="">Moses however said unto you</span></span><span data-dcnode-id="485" instrument_node="">.” The Jews were in many things otherwise circumstanced in the time of the Pharisees than in the time of Moses.—</span><span class="greekheb" data-dcnode-id="483"><span data-dcnode-id="484" instrument_node="">τοῖς ἀρχαίοις</span></span><span data-dcnode-id="482" instrument_node="">, </span><span class="ital" data-dcnode-id="480"><span data-dcnode-id="481" instrument_node="">to them of old time</span></span><span data-dcnode-id="479" instrument_node="">[197]) sc. the fathers in the time of Moses. The Scribes wished to appear to be in conformity with the ancient and primitive rule. Antiquity should be maintained, but it should be genuine antiquity.[198]—</span><span class="greekheb" data-dcnode-id="477"><span data-dcnode-id="478" instrument_node="">ὑμῖν</span></span><span data-dcnode-id="476" instrument_node="">, </span><span class="ital" data-dcnode-id="474"><span data-dcnode-id="475" instrument_node="">to you</span></span><span data-dcnode-id="473" instrument_node="">) This word is antithetic[199] to </span><span class="greekheb" data-dcnode-id="471"><span data-dcnode-id="472" instrument_node="">τοῖς ἀρχαιοῖς</span></span><span data-dcnode-id="470" instrument_node="">, from whence it is evident, that </span><span class="greekheb" data-dcnode-id="468"><span data-dcnode-id="469" instrument_node="">τοῖς ἀρχαίοις</span></span><span data-dcnode-id="467" instrument_node=""> (</span><span class="ital" data-dcnode-id="465"><span data-dcnode-id="466" instrument_node="">antiquis</span></span><span data-dcnode-id="464" instrument_node="">) is not in the ablative, but in the dative case; and the construction is more easy if we render the passage thus, “</span><span class="ital" data-dcnode-id="462"><span data-dcnode-id="463" instrument_node="">it was said</span></span><span data-dcnode-id="461" instrument_node=""> TO </span><span class="ital" data-dcnode-id="459"><span data-dcnode-id="460" instrument_node="">them of old time</span></span><span data-dcnode-id="458" instrument_node="">, than thus, “</span><span class="ital" data-dcnode-id="456"><span data-dcnode-id="457" instrument_node="">it was said</span></span><span data-dcnode-id="455" instrument_node=""> BY </span><span class="ital" data-dcnode-id="453"><span data-dcnode-id="454" instrument_node="">them of old time</span></span><span data-dcnode-id="452" instrument_node="">.”—</span><span class="greekheb" data-dcnode-id="450"><span data-dcnode-id="451" instrument_node="">οὐ φονεύσεις</span></span><span data-dcnode-id="449" instrument_node="">, </span><span class="ital" data-dcnode-id="447"><span data-dcnode-id="448" instrument_node="">thou shalt not kill</span></span><span data-dcnode-id="446" instrument_node="">) Our Lord begins with the clearest precept.—</span><span class="greekheb" data-dcnode-id="444"><span data-dcnode-id="445" instrument_node="">τῇ κρίσει</span></span><span data-dcnode-id="443" instrument_node="">, </span><span class="ital" data-dcnode-id="441"><span data-dcnode-id="442" instrument_node="">to the judgment</span></span><span data-dcnode-id="440" instrument_node="">) The Hebrew </span><span class="greekheb" data-dcnode-id="438"><span data-dcnode-id="439" instrument_node="">דִּין</span></span><span data-dcnode-id="437" instrument_node="">, rendered </span><span class="greekheb" data-dcnode-id="435"><span data-dcnode-id="436" instrument_node="">κρίσις</span></span><span data-dcnode-id="434" instrument_node="">, was the inferior tribunal existing in the several towns, and consisted of twenty-three judges, who had the power of life and death. The dative, </span><span class="greekheb" data-dcnode-id="432"><span data-dcnode-id="433" instrument_node="">τῇ κρίσει</span></span><span data-dcnode-id="431" instrument_node="">, signifies, </span><span class="ital" data-dcnode-id="429"><span data-dcnode-id="430" instrument_node="">as far as belongs to</span></span><span data-dcnode-id="428" instrument_node="">[200] </span><span class="ital" data-dcnode-id="426"><span data-dcnode-id="427" instrument_node="">the judgment</span></span><span data-dcnode-id="425" instrument_node="">, or municipal tribunal: in like manner, in the next verse </span><span class="greekheb" data-dcnode-id="423"><span data-dcnode-id="424" instrument_node="">τῷ συνεδρίῳ</span></span><span data-dcnode-id="422" instrument_node=""> signifies </span><span class="ital" data-dcnode-id="420"><span data-dcnode-id="421" instrument_node="">as far as belongs to the Sanhedrim:</span></span><span data-dcnode-id="419" instrument_node=""> for </span><span class="greekheb" data-dcnode-id="417"><span data-dcnode-id="418" instrument_node="">ἔνοχος</span></span><span data-dcnode-id="416" instrument_node="">, </span><span class="ital" data-dcnode-id="414"><span data-dcnode-id="415" instrument_node="">criminal</span></span><span data-dcnode-id="413" instrument_node="">, is here used absolutely.</span><span class="p" data-dcnode-id="410"><br data-dcnode-id="412"><br data-dcnode-id="411"></span><span data-dcnode-id="409" instrument_node="">[197] E. V. </span><span class="ital" data-dcnode-id="407"><span data-dcnode-id="408" instrument_node="">by</span></span><span data-dcnode-id="406" instrument_node=""> them of old time.—(I. B.)</span><span class="p" data-dcnode-id="403"><br data-dcnode-id="405"><br data-dcnode-id="404"></span><span data-dcnode-id="402" instrument_node="">[198] In fact, it was not in the time of Moses, and to the ancients [“to them of old time”], that the rather lax interpretation of the law was set forth, but in the time of the Scribes and Pharisees, and to the men of that age. The Scribes themselves were the persons who crusted over with the plea of antiquity their own innovations, as generally happens in religious controversies, or when morals are being corrupted.—</span><span class="ital" data-dcnode-id="400"><span data-dcnode-id="401" instrument_node="">Vers. Germ</span></span><span data-dcnode-id="399" instrument_node="">.</span><span class="p" data-dcnode-id="396"><br data-dcnode-id="398"><br data-dcnode-id="397"></span><span data-dcnode-id="395" instrument_node="">[199] See Explanation of technical terms in Appendix.—(I. B.)</span><span class="p" data-dcnode-id="392"><br data-dcnode-id="394"><br data-dcnode-id="393"></span><span data-dcnode-id="391" instrument_node="">[200] In the original, “</span><span class="ital" data-dcnode-id="389"><span data-dcnode-id="390" instrument_node="">quod ad judicium attinet</span></span><span data-dcnode-id="388" instrument_node="">,” where in the phrase, “quod </span><span class="ital" data-dcnode-id="386"><span data-dcnode-id="387" instrument_node="">attinet</span></span><span data-dcnode-id="385" instrument_node="">,” generally rendered “</span><span class="ital" data-dcnode-id="383"><span data-dcnode-id="384" instrument_node="">with respect to</span></span><span data-dcnode-id="382" instrument_node="">,” “</span><span class="ital" data-dcnode-id="380"><span data-dcnode-id="381" instrument_node="">as regards</span></span><span data-dcnode-id="379" instrument_node="">,” etc., </span><span class="ital" data-dcnode-id="377"><span data-dcnode-id="378" instrument_node="">attinet</span></span><span data-dcnode-id="376" instrument_node=""> seems to have its own more peculiar and precise force of </span><span class="ital" data-dcnode-id="374"><span data-dcnode-id="375" instrument_node="">pertains;</span></span><span data-dcnode-id="373" instrument_node="">—and to signify, “is the province of,” “comes under the jurisdiction of;”—a meaning which appears to coincide with Bengel’s observations on the next verse.—(I. B.)</span><span class="p" data-dcnode-id="370"><br data-dcnode-id="372"><br data-dcnode-id="371"></span><a data-dcnode-id="369" id="pul" name="pul"></a><div class="vheading2" data-dcnode-id="366"><a data-dcnode-id="367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/commentaries/pulpit/matthew/5.htm"><span data-dcnode-id="368" instrument_node="">Pulpit Commentary</span></a></div><span class="cmt_sub_title" data-dcnode-id=
