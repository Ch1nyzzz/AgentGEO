"364"><span data-dcnode-id="365" instrument_node="">Verses 21-48.</span></span><span data-dcnode-id="363" instrument_node=""> - (</span><span class="accented" data-dcnode-id="361"><span data-dcnode-id="362" instrument_node="">a</span></span><span data-dcnode-id="360" instrument_node="">) Our Lord is still concerned with the relation of himself and his followers to the religion of the day, of which the Old Testament (ver. 17), and more especially the Law (ver. 18), was the accepted standard. But after having spoken of the need of careful attention to (vers. 17,18), and observance of (ver. 19), even the least commands of the Law, he goes on to point out the far-reaching character of these commands, whether they are such as we should call more (vers. 21, 27, 81) or less (vers. 33, 38, 43) impotent. It is essential to notice that our </span><span class="accented" data-dcnode-id="358"><span data-dcnode-id="359" instrument_node="">Lord</span></span><span data-dcnode-id="357" instrument_node=""> refers to these commands, not merely as statements contained in the Law, but as part of the religion of the day, and that he contrasts their true bearing on life and conduct with that false bearing on this which was commonly predicated of them. By this it is not meant that our Lord was only opposing such narrow glosses and interpretations as had arisen at various times during the centuries after the promulgation of the Law (for these were for the most part perfectly natural and legitimate developments of the earliest possible interpretations of it), still less that he was thinking only of the worst of the misrepresentations of its commands, comparatively recently made by the Pharisees; but  that he was now going back, beyond this so far natural and normal development of the earliest interpretations, to the first principles underlying the revelation contained in the Law. While the Jews, not unnaturally, clung to the primary, but temporary, meaning of the Law as a revelation of God's will for them as a nation, our Lord was now about to expound its commands as a revelation of God's permanent will for them and all men as men. Our Lord was now, that is to say, wishing to do more than merely cut off the excrescences that, chiefly through the Pharisaic party, had grown up round the Law, but less than root up the Law itself. He rather cuts down the whole growth that had been, notwithstanding some mere excrescences, the right and proper outcome of the Law in its original environment, in order that, in fresh environment, which corresponded better to its nature, the Law might produce a growth still more right and proper. </span><span class="cmt_sub_title" data-dcnode-id="355"><span data-dcnode-id="356" instrument_node="">Verses 21-26.</span></span><span data-dcnode-id="354" instrument_node=""> - </span><span class="accented" data-dcnode-id="352"><span data-dcnode-id="353" instrument_node="">The sixth commandment.</span></span><span data-dcnode-id="351" instrument_node=""> </span><span class="cmt_sub_title" data-dcnode-id="349"><span data-dcnode-id="350" instrument_node="">Verses 21-24</span></span><span data-dcnode-id="348" instrument_node=""> Matthew only; vers. 25, 26 have parts common to Luke. </span><span class="cmt_sub_title" data-dcnode-id="346"><span data-dcnode-id="347" instrument_node="">Verse 21.</span></span><span data-dcnode-id="345" instrument_node=""> - </span><span class="cmt_word" data-dcnode-id="343"><span data-dcnode-id="344" instrument_node="">Ye have heard</span></span><span data-dcnode-id="342" instrument_node=""> (</span><span class="greek" data-dcnode-id="340"><span data-dcnode-id="341" instrument_node="">ἠκούσατε</span></span><span data-dcnode-id="339" instrument_node="">, frequentative aorist). Our Lord does not say, "ye have read" (cf. </span><a data-dcnode-id="337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/matthew/21-42.htm"><span data-dcnode-id="338" instrument_node="">Matthew 21:42</span></a><span data-dcnode-id="336" instrument_node="">), for he was not now speaking to the learned classes, but to a large audience many of whom were probably unable to read. "Ye have heard," </span><span class="accented" data-dcnode-id="334"><span data-dcnode-id="335" instrument_node="">i.e.</span></span><span data-dcnode-id="333" instrument_node=""> from your teachers whose teaching claims to be the substance of the Law. So, probably, even in </span><a data-dcnode-id="331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/john/12-34.htm"><span data-dcnode-id="332" instrument_node="">John 12:34</span></a><span data-dcnode-id="330" instrument_node="">, where the multitude say that they "have heard out of the Law that the Christ abideth for ever," which, since this is hardly expressed in so many words in the Old Testament, must mean that the instructions they have received on this subject truly represent the substance of its teaching. So here our Lord says, "You have heard from your teachers (cf. </span><a data-dcnode-id="328" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/romans/2-18.htm"><span data-dcnode-id="329" instrument_node="">Romans 2:18</span></a><span data-dcnode-id="327" instrument_node="">) that the substance of the sixth commandment is so-and-so." It is thus quite intelligible that in some of these utterances there should be found added to (vers. 21, 43) or intermingled with (ver. 33) the words of a passage of Scripture, other words which are </span><span class="accented" data-dcnode-id="325"><span data-dcnode-id="326" instrument_node="">either</span></span><span data-dcnode-id="324" instrument_node=""> taken from Scripture, but from another place in it (perhaps ver. 33), or do not occur in Scripture at all, but merely help to form a compendious statement of a definite interpretation (here and ver. 43). It must remain doubtful whether our Lord himself formulated these statements of the popular teaching, or quoted them verbally as current. If the latter, as is perhaps more likely, there remains the at present still more insoluble question whether they were only oral or (cf. the case of the 'Didaehe') had already been committed to writing (cf. in this connexion Bishop Westcott, 'Hebr.,' p. 480). </span><span class="cmt_word" data-dcnode-id="322"><span data-dcnode-id="323" instrument_node="">That it was said by them of old time</span></span><span data-dcnode-id="321" instrument_node=""> (</span><span class="greek" data-dcnode-id="319"><span data-dcnode-id="320" instrument_node="">ὅτι ἐῥῤέθη τοῖς ἀρχαίοις</span></span><span data-dcnode-id="318" instrument_node="">)</span><span class="accented" data-dcnode-id="316"><span data-dcnode-id="317" instrument_node="">. By</span></span><span data-dcnode-id="315" instrument_node="">; Revised Version, to. Similarly ver. 33. Although "by" may be defended (cf. Madvig, § 39 </span><span class="accented" data-dcnode-id="313"><span data-dcnode-id="314" instrument_node="">g</span></span><span data-dcnode-id="312" instrument_node="">), "to" (Wickliffe and Tyndale downwards) is certainly right, because </span><span class="p" data-dcnode-id="309"><br data-dcnode-id="311"><br data-dcnode-id="310"></span><span class="note_emph" data-dcnode-id="307"><span data-dcnode-id="308" instrument_node="">(a)</span></span><span data-dcnode-id="306" instrument_node=""> it is the common usage with a passive verb; </span><span class="p" data-dcnode-id="303"><br data-dcnode-id="305"><br data-dcnode-id="304"></span><span class="note_emph" data-dcnode-id="301"><span data-dcnode-id="302" instrument_node="">(b)</span></span><span data-dcnode-id="300" instrument_node=""> it is the constant usage with </span><span class="greek" data-dcnode-id="298"><span data-dcnode-id="299" instrument_node="">ἐῥῤέθη</span></span><span data-dcnode-id="297" instrument_node=""> in the New Testament (</span><span class="accented" data-dcnode-id="295"><span data-dcnode-id="296" instrument_node="">e.g.</span></span><span data-dcnode-id="294" instrument_node=""> </span><a data-dcnode-id="292" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/romans/9-12.htm"><span data-dcnode-id="293" instrument_node="">Romans 9:12, 26</span></a><span data-dcnode-id="291" instrument_node="">); </span><span class="p" data-dcnode-id="288"><br data-dcnode-id="290"><br data-dcnode-id="289"></span><span class="note_emph" data-dcnode-id="286"><span data-dcnode-id="287" instrument_node="">(c)</span></span><span data-dcnode-id="285" instrument_node=""> the parallelism with </span><span class="greek" data-dcnode-id="283"><span data-dcnode-id="284" instrument_node="">ἐγὼ δέ κ.τ.λ</span></span><span data-dcnode-id="282" instrument_node="">., is more exact; </span><span class="p" data-dcnode-id="279"><br data-dcnode-id="281"><br data-dcnode-id="280"></span><span class="note_emph" data-dcnode-id="277"><span data-dcnode-id="278" instrument_node="">(d)</span></span><span data-dcnode-id="276" instrument_node=""> the popular teaching claimed to be, even in its strictest esoteric form of oral tradition, derived ultimately, not from the words of any human teachers, however primitive, but from the words of God spoken by him to them. In the case before us our Lord accepts the popular teaching of the time as truly representing the Divine utterance in the giving of the Law, so far as that utterance was then intended to be understood. </span><span class="accented" data-dcnode-id="274"><span data-dcnode-id="275" instrument_node="">Them of old time.</span></span><span data-dcnode-id="273" instrument_node=""> This can hardly be limited to "the original founders of the Jewish Commonwealth," to use Trench's curiously unbiblical expression ('Syn.,' § 67.). It probably includes all who lived a generation or more before our Lord's time (cf. Weiss). </span><span class="cmt_word" data-dcnode-id="271"><span data-dcnode-id="272" instrument_node="">Thou shalt not kill; and whosoever shall kill shall be in danger of the judgment.</span></span><span data-dcnode-id="270" instrument_node=""> The substance, according to the popular teaching, of the sixth commandment (</span><a data-dcnode-id="268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/exodus/20-13.htm"><span data-dcnode-id="269" instrument_node="">Exodus 20:13</span></a><span data-dcnode-id="267" instrument_node="">; </span><a data-dcnode-id="265" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/deuteronomy/5-17.htm"><span data-dcnode-id="266" instrument_node="">Deuteronomy 5:17</span></a><span data-dcnode-id="264" instrument_node="">). This the current form of it (based partly on </span><a data-dcnode-id="262" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/leviticus/24-21.htm"><span data-dcnode-id="263" instrument_node="">Leviticus 24:21</span></a><span data-dcnode-id="261" instrument_node="">; </span><a data-dcnode-id="259" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/numbers/35.htm"><span data-dcnode-id="260" instrument_node="">Numbers 35</span></a><span data-dcnode-id="258" instrument_node="">; </span><a data-dcnode-id="256" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/deuteronomy/19-12.htm"><span data-dcnode-id="257" instrument_node="">Deuteronomy 19:12</span></a><span data-dcnode-id="255" instrument_node="">) was that murder was not to be committed, and that if it was committed the murderer was to be brought up for trial. </span><span class="accented" data-dcnode-id="253"><span data-dcnode-id="254" instrument_node="">Shall be in danger of</span></span><span data-dcnode-id="252" instrument_node=""> (</span><span class="greek" data-dcnode-id="250"><span data-dcnode-id="251" instrument_node="">ἔνοχος ἔσται</span></span><span data-dcnode-id="249" instrument_node="">); </span><span class="accented" data-dcnode-id="247"><span data-dcnode-id="248" instrument_node="">i.e.</span></span><span data-dcnode-id="246" instrument_node=""> in legal danger - legally guilty of a charge which involves the judgment (cf. </span><a data-dcnode-id="244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/matthew/26-66.htm"><span data-dcnode-id="245" instrument_node="">Matthew 26:66</span></a><span data-dcnode-id="243" instrument_node="">). </span><span class="accented" data-dcnode-id="241"><span data-dcnode-id="242" instrument_node="">The judgment</span></span><span data-dcnode-id="240" instrument_node="">; </span><span class="accented" data-dcnode-id="238"><span data-dcnode-id="239" instrument_node="">i.e.</span></span><span data-dcnode-id="237" instrument_node=""> the local Sanhedrin (cf. </span><a data-dcnode-id="235" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/matthew/10-17.htm"><span data-dcnode-id="236" instrument_node="">Matthew 10:17</span></a><span data-dcnode-id="234" instrument_node="">), of apparently seven men in a smaller, twenty-three in a larger, town (cf. Schurer, II. 1. pp. 149-154). This answers to "the congregation," or "the elders" of the town to which the murderer belonged, before whom he was to be tried (</span><a data-dcnode-id="232" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/numbers/35-12.htm"><span data-dcnode-id="233" instrument_node="">Numbers 35:12, 16, 24</span></a><span data-dcnode-id="231" instrument_node="">; </span><a data-dcnode-id="229" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/deuteronomy/19-12.htm"><span data-dcnode-id="230" instrument_node="">Deuteronomy 19:12</span></a><span data-dcnode-id="228" instrument_node="">). Matthew 5:21</span><div class="vheading2" data-dcnode-id="226"><span data-dcnode-id="227" instrument_node="">Links</span></div><a data-dcnode-id="224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/interlinear/matthew/5-21.htm"><span data-dcnode-id="225" instrument_node="">Matthew 5:21 Interlinear</span></a><br data-dcnode-id="223"><a data-dcnode-id="221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/texts/matthew/5-21.htm"><span data-dcnode-id="222" instrument_node="">Matthew 5:21 Parallel Texts</span></a><br data-dcnode-id="220"><span class="p" data-dcnode-id="217"><br data-dcnode-id="219"><br data-dcnode-id="218"></span><a data-dcnode-id="215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/niv/matthew/5-21.htm"><span data-dcnode-id="216" instrument_node="">Matthew 5:21 NIV</span></a><br data-dcnode-id="214"><a data-dcnode-id="212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/nlt/matthew/5-21.htm"><span data-dcnode-id="213" instrument_node="">Matthew 5:21 NLT</span></a><br data-dcnode-id="211"><a data-dcnode-id="209" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/esv/matthew/5-21.htm"><span data-dcnode-id="210" instrument_node="">Matthew 5:21 ESV</span></a><br data-dcnode-id="208"><a data-dcnode-id="206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/nasb/matthew/5-21.htm"><span data-dcnode-id="207" instrument_node="">Matthew 5:21 NASB</span></a><br data-dcnode-id="205"><a data-dcnode-id="203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/kjv/matthew/5-21.htm"><span data-dcnode-id="204" instrument_node="">Matthew 5:21 KJV</span></a><span class="p" data-dcnode-id="200"><br data-dcnode-id="202"><br data-dcnode-id="201"></span><a data-dcnode-id="198" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//bibleapps.com/matthew/
