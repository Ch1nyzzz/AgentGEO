</span><p data-dcnode-id="1782"><span data-dcnode-id="1783" instrument_node="">Was the original sin literally eating fruit from a tree? Did you ever wonder why the woman’s punishment for eating a literal fruit was to have increased pain in childbirth? Why does the Bible say there will be enmity between the seed of the serpent and the seed of the woman? Is it possible that the record of the Original Sin is a word picture? This booklet will examine the biblical evidence to reveal the truth.</span></p><span data-dcnode-id="1781" instrument_node="">
</span><p data-dcnode-id="1779"><span data-dcnode-id="1780" instrument_node="">The Bible holds many truths hidden to the eyes of the wise and prudent and revealed to babes. For those who are walking in the Spirit, as little children, the Scripture says, “It is given to you to know the mysteries of the kingdom…” Matthew 13:11.&nbsp; The truth on the Original Sin is a very simple teaching, but the truth of the Original Sin will cause the Bible to open up to you in a whole new way as it did for me.</span></p><span data-dcnode-id="1778" instrument_node="">
</span><p data-dcnode-id="1776"><span data-dcnode-id="1777" instrument_node="">Though the majority of Scripture, especially the book of Genesis, is to be taken literally and believed just as it is written; there are certain phrases in scripture that require other passages of scripture to reveal their hidden meanings.&nbsp; Finding these key phrases can help us understand the doctrine of original sin more clearly.</span></p><span data-dcnode-id="1775" instrument_node="">
</span><p data-dcnode-id="1770"><span data-dcnode-id="1774" instrument_node="">The commonly believed interpretation of the original sin is that Eve and Adam were eating actual fruit from a fruit tree called the tree of knowledge.&nbsp; But based upon the context of Genesis and what is written throughout the Bible, the original sin was a sexual relationship between Eve and the Serpent resulting in the birth of Cain.&nbsp; Reading this may be a surprise to you, but let’s look at some of the key phrases in scriptures, the historical teaching of Judaism and the Church, and the judgments the Lord placed on Man to demonstrate that they point to this interpretation of Original Sin.&nbsp; </span><i data-dcnode-id="1772"><span data-dcnode-id="1773" instrument_node="">Please read to the end of this booklet to understand the full context of what is being taught</span></i><span data-dcnode-id="1771" instrument_node="">.</span></p><span data-dcnode-id="1769" instrument_node="">
</span><h2 data-dcnode-id="1767" style="text-align: center;"><span data-dcnode-id="1768" instrument_node="">&nbsp;The Scriptural Keys to the Truth</span></h2><span data-dcnode-id="1766" instrument_node="">
</span><p data-dcnode-id="1764"><span data-dcnode-id="1765" instrument_node="">Think about these hidden keys that provide context for the Fall.</span></p><span data-dcnode-id="1763" instrument_node="">
</span><ol data-dcnode-id="1734"><span data-dcnode-id="1762" instrument_node="">
</span><li data-dcnode-id="1760"><span data-dcnode-id="1761" instrument_node="">Genesis 3:15 The serpent is said to have a seed.&nbsp; Who was that seed?</span></li><span data-dcnode-id="1759" instrument_node="">
</span><li data-dcnode-id="1757"><span data-dcnode-id="1758" instrument_node="">Genesis 3:7 Instead of covering their mouth they covered their nakedness.&nbsp; Why cover their nakedness if they ate actual fruit?&nbsp; They covered the part of the body that they sinned with.</span></li><span data-dcnode-id="1756" instrument_node="">
</span><li data-dcnode-id="1754"><span data-dcnode-id="1755" instrument_node="">Proverbs 30:20 and Song of Solomon 4:16 speak of the sexual relationship as “eating.”</span></li><span data-dcnode-id="1753" instrument_node="">
</span><li data-dcnode-id="1751"><span data-dcnode-id="1752" instrument_node="">Genesis 4:8 There was enmity between Cain, the serpent’s seed, and Abel, the woman’s seed.</span></li><span data-dcnode-id="1750" instrument_node="">
</span><li data-dcnode-id="1748"><span data-dcnode-id="1749" instrument_node="">Genesis 3:20 Why is Eve called the mother of all living and Adam is not called the father of all living?</span></li><span data-dcnode-id="1747" instrument_node="">
</span><li data-dcnode-id="1745"><span data-dcnode-id="1746" instrument_node="">Genesis 5:1-3 Why is Cain never mentioned in Adam’s genealogy?&nbsp; Yet Genesis keeps the line of Cain distinct from that of Adam.</span></li><span data-dcnode-id="1744" instrument_node="">
</span><li data-dcnode-id="1742"><span data-dcnode-id="1743" instrument_node="">Genesis 5:3 Why does Adam state that Seth and Abel are in his own image, but never Cain?</span></li><span data-dcnode-id="1741" instrument_node="">
</span><li data-dcnode-id="1739"><span data-dcnode-id="1740" instrument_node="">Genesis 3:16 Why is part of the curse having to do with conception and labor if the sin was eating food?&nbsp; Could it be that pain in childbearing indicates a punishment commensurate with its crime?</span></li><span data-dcnode-id="1738" instrument_node="">
</span><li data-dcnode-id="1736"><span data-dcnode-id="1737" instrument_node="">1 John 3:12 states that Cain was “of” the wicked one in the same way that a genealogy would be listed. [in Luke 3:23–38 in the original Greek there is no “son” listed. It simply says of Heli of Matthet of Levi, etc..]</span></li><span data-dcnode-id="1735" instrument_node="">
</span></ol><span data-dcnode-id="1733" instrument_node="">
</span><p data-dcnode-id="1731"><span data-dcnode-id="1732" instrument_node="">10. Paul speaks of the original sin in 2 Corinthians 11:1-3 and compares it to an engaged woman betraying her fiance by having a relationship with another man.</span></p><span data-dcnode-id="1730" instrument_node="">
</span><p data-dcnode-id="1728"><span data-dcnode-id="1729" instrument_node="">11. Matthew 13:24-30 and 36-43 states that the tares that were sown in the field, which is the world, are the children of the wicked one.</span></p><span data-dcnode-id="1727" instrument_node="">
</span><p data-dcnode-id="1725"><span data-dcnode-id="1726" instrument_node="">12. John 8:31-47 When Jesus says that the Pharisees’ “father” was the devil; why was their response we are not been born of fornication?</span></p><span data-dcnode-id="1724" instrument_node="">
</span><p data-dcnode-id="1722"><span data-dcnode-id="1723" instrument_node="">13. Genesis 3:1-5. When the Serpent spoke to Eve she was not surprised because it was normal for her. The Serpent was not a snake or a reptile.&nbsp; The name Serpent signifies he is wise and deceptive.&nbsp; He spoke and walked upright.</span></p><span data-dcnode-id="1721" instrument_node="">
</span><p data-dcnode-id="1719"><span data-dcnode-id="1720" instrument_node="">14. A woman can conceive from two different men on the same day. It is called heteropaternal&nbsp;superfecundation.</span></p><span data-dcnode-id="1718" instrument_node="">
</span><p data-dcnode-id="1716"><span data-dcnode-id="1717" instrument_node="">15. In Genesis 3:15 the woman’s conceptions were multiplied. If she had not conceived yet (by the Serpent and Adam) then there would be nothing to multiply.</span></p><span data-dcnode-id="1715" instrument_node="">
</span><p data-dcnode-id="1713"><span data-dcnode-id="1714" instrument_node="">16. Disclaimer: this doctrine is not a basis for racial discrimination. All the human race came from Noah and his wife. There is no separate genetic race directly tied to the Serpent.</span></p><span data-dcnode-id="1712" instrument_node="">
</span><h2 data-dcnode-id="1710" style="text-align: center;"><span data-dcnode-id="1711" instrument_node="">&nbsp;Historical Doctrine?</span></h2><span data-dcnode-id="1709" instrument_node="">
</span><p data-dcnode-id="1705"><b data-dcnode-id="1706"><i data-dcnode-id="1707"><span data-dcnode-id="1708" instrument_node="">So, the question that usually comes up is this:&nbsp; Is this view of the original sin new or has it been believed in the past?</span></i></b></p><span data-dcnode-id="1704" instrument_node="">
</span><p data-dcnode-id="1702"><span data-dcnode-id="1703" instrument_node="">Amazingly, many Pre-Christian Jewish scholars have espoused the view point of the Serpent having a Seed via adultery with the woman. In Wikipedia we read this:</span></p><span data-dcnode-id="1701" instrument_node="">
</span><p data-dcnode-id="1648"><span data-dcnode-id="1700" instrument_node="">In</span><a data-dcnode-id="1698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/Jewish_tradition"><span data-dcnode-id="1699" instrument_node=""> Jewish tradition</span></a><span data-dcnode-id="1697" instrument_node="">,</span><a data-dcnode-id="1695" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/Philo"><span data-dcnode-id="1696" instrument_node=""> Philo</span></a><span data-dcnode-id="1694" instrument_node="">,</span><a data-dcnode-id="1692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/Pirke_De-Rabbi_Eliezer"><span data-dcnode-id="1693" instrument_node=""> Pirke De-Rabbi Eliezer</span></a><span data-dcnode-id="1691" instrument_node=""> and the</span><a data-dcnode-id="1689" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/Targum_Pseudo-Jonathan"><span data-dcnode-id="1690" instrument_node=""> Targum Pseudo-Jonathan</span></a><span data-dcnode-id="1688" instrument_node=""> asserted that Adam was not the father of Cain. Rather, Eve was subject to adultery having been seduced by either</span><a data-dcnode-id="1686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/Samael"><span data-dcnode-id="1687" instrument_node=""> Sammael</span></a><span data-dcnode-id="1685" instrument_node="">,</span><a data-dcnode-id="1683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/Cain_and_Abel%23cite_note-FOOTNOTEByron201117%3A_.22And_Adam_knew_about_his_wife_Eve_that_she_had_conceived_from_Sammael.22_-_.27.27.5B.5BTargum_Pseudo-Jonathan.7CTg.Ps.-J..5D.5D.27.27%3A_Gen.4%3A1.2C_Trans._by_Byron-35"><span data-dcnode-id="1684" instrument_node="">[35]</span></a><a data-dcnode-id="1681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/Cain_and_Abel%23cite_note-FOOTNOTEByron201117%3A_.22.28Sammael.29_riding_on_the_serpent_came_to_her_and_she_conceived_.5BCain.5D.22_-_.27.27.5B.5BPirke_De-Rabbi_Eliezer.7CPirqe_R._L._21.5D.5D.27.27.2C_Trans._by_Friedlander-36"><span data-dcnode-id="1682" instrument_node="">[36]</span></a><span data-dcnode-id="1680" instrument_node=""> the</span><a data-dcnode-id="1678" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/Serpent_%28Bible%29"><span data-dcnode-id="1679" instrument_node=""> Serpent</span></a><a data-dcnode-id="1676" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/Cain_and_Abel%23cite_note-FOOTNOTEByron201117%3A_.22First_adultery_came_into_being.2C_afterward_murder._And_he_.5BCain.5D_was_begotten_into_adultery.2C_for_he_was_the_child_of_the_serpent..22_-_.27.27.5B.5BPhilo.7CGos.Phil..5D.5D.27.27_61%3A5-10.2C_Trans._by_Isenberg-37"><span data-dcnode-id="1677" instrument_node="">[37]</span></a><span data-dcnode-id="1675" instrument_node=""> (nahash,</span><a data-dcnode-id="1673" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/Hebrew_language"><span data-dcnode-id="1674" instrument_node=""> Hebrew</span></a><span data-dcnode-id="1672" instrument_node="">: ???) in the </span><a data-dcnode-id="1670" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/Garden_of_Eden"><span data-dcnode-id="1671" instrument_node="">Garden of Eden</span></a><span data-dcnode-id="1669" instrument_node="">,</span><a data-dcnode-id="1667" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/Cain_and_Abel%23cite_note-38"><span data-dcnode-id="1668" instrument_node="">[38]</span></a><span data-dcnode-id="1666" instrument_node=""> or the</span><a data-dcnode-id="1664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/Devil%23Judaism"><span data-dcnode-id="1665" instrument_node=""> Devil</span></a><span data-dcnode-id="1663" instrument_node=""> himself.</span><a data-dcnode-id="1661" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/Cain_and_Abel%23cite_note-FOOTNOTELuttikhuizen2003vii-3"><span data-dcnode-id="1662" instrument_node="">[3]</span></a><span data-dcnode-id="1660" instrument_node=""> Christian exegesis of the “evil one” in</span><a data-dcnode-id="1658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.biblegateway.com/bible%3Fpassage%3D1John%25203%253A10-12%3B%26version%3DESV%3B"><span data-dcnode-id="1659" instrument_node=""> 1 John 3:10-12</span></a><span data-dcnode-id="1657" instrument_node=""> have also led some commentators, like</span><a data-dcnode-id="1655" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/Tertullian"><span data-dcnode-id="1656" instrument_node=""> Tertullian</span></a><span data-dcnode-id="1654" instrument_node="">, to agree that Cain was the son of the</span><a data-dcnode-id="1652" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/Devil_in_Christianity"><span data-dcnode-id="1653" instrument_node=""> Devil</span></a><a data-dcnode-id="1650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/Cain_and_Abel%23cite_note-FOOTNOTEByron201117%3A_.22Having_been_made_pregnant_by_the_devil...she_brought_forth_a_son..22_-_.5B.5BTertullian.5D.5D.2C_.27.27Patience.27.27_5%3A15-39"><span data-dcnode-id="1651" instrument_node="">[39]</span></a><span data-dcnode-id="1649" instrument_node="">..</span></p><span data-dcnode-id="1647" instrument_node="">
</span><p data-dcnode-id="1645"><span data-dcnode-id="1646" instrument_node="">This is the translation of the Targum of Jerusalem which is essentially an ancient Hebrew “Living Translation” or similar to “The Message” translation.&nbsp; The Targum looks to the meaning behind the Scripture instead of just looking to the literal words.&nbsp; While we do not endorse this method of translation, the Targum is useful in understanding Jewish interpretation of Scripture.&nbsp; Regarding Original Sin they say,</span></p><span data-dcnode-id="1644" instrument_node="">
</span><p data-dcnode-id="1642"><span data-dcnode-id="1643" instrument_node="">“And Adam knew Hava his wife, who had desired the Angel; and she conceived, and bare Kain; and she said, I have acquired a man, the Angel of the Lord. And she added to bear from her husband Adam his twin, even Habel.”</span></p><span data-dcnode-id="1641" instrument_node="">
</span><p data-dcnode-id="1639"><span data-dcnode-id="1640" instrument_node="">The Angel they speak of is not THE Angel of the Lord as in the personal presence of God himself, rather the fallen Angel of the Lord, Lucifer or Satan. Satan entered the form of the Serpent which was an upright animal that could speak and communicate with Adam and Eve in order to deceive and inject himself into the human race.</span></p><span data-dcnode-id="1638" instrument_node="">
</span><p data-dcnode-id="1634"><b data-dcnode-id="1635"><i data-dcnode-id="1636"><span data-dcnode-id="1637" instrument_node="">And now what about the early church, outside of the inspired epistles of Paul and John that are mentioned?</span></i></b></p><span data-dcnode-id="1633" instrument_node="">
</span><p data-dcnode-id="1631"><span data-dcnode-id="1632" instrument_node="">The early church father, Tertullian, stated in the 3rd Century, “Having been made pregnant by the devil…she brought forth a son.” – From Patience 5:15.</span></p><span data-dcnode-id="1630" instrument_node="">
</span><h2 data-dcnode-id="1628" style="text-align: center;"><span data-dcnode-id="1629" instrument_node="">&nbsp;What About Genesis 4:1?</span></h2><span data-dcnode-id="1627" instrument_node="">
</span><p data-dcnode-id="1625"><span data-dcnode-id="1626" instrument_node="">So let’s examine one of the main objections to this teaching.&nbsp; In Genesis 4:1 it reads, “And Adam knew Eve his wife; and she conceived, and bare Cain, and said, I have gotten a man from the LORD.”</span></p><span data-dcnode-id="1624" instrument_node="">
</span><p data-dcnode-id="1618"><span data-dcnode-id="1623" instrument_node="">In order to explain how this verse relates to serpent’s seed we need to understand Hebrew verb tenses. To do that I will reference </span><a data-dcnode-id="1620" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ancient-hebrew.org/37_lesson03.html"><i data-dcnode-id="1621"><span data-dcnode-id="1622" instrument_node="">Learn Hebrew Verbs ~ Lesson 3 Verb Tenses</span></i></a><span data-dcnode-id="1619" instrument_node=""> by Jeff A. Benner, “Each Hebrew verb also identifies the tense of the verb. In English a verb can have three tenses – past, present or future. Examples of these would be “You cut a tree” (past), “You are cutting a tree” (present) and “You will cut a tree” (future). Biblical Hebrew only has two tenses – perfect and imperfect. While the three verb tenses in English are related to time, Biblical Hebrew verb tenses are related to action. The perfect tense is a completed action while the imperfect tense is an incomplete action.”</span></p><span data-dcnode-id="1617" instrument_node="">
</span><p data-dcnode-id="1609"><span data-dcnode-id="1616" instrument_node="">With this understanding I want to examine Genesis 4:1 more closely. To do that I want to observe what biblical commentator John Gill states, “</span><i data-dcnode-id="1614"><span data-dcnode-id="1615" instrument_node="">And Adam knew Eve his wife</span></i><span data-dcnode-id="1613" instrument_node="">,….Jarchi interprets it, “had known”, even before he sinned, and was drove out of the garden; and so other Jewish writers…” The act of knowing his wife had taken place in the past tense. We will examine that more closely. Let’s look at a </span><a data-dcnode-id="1611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ancient-hebrew.org/bookstore/e-books/mtg.pdf"><span data-dcnode-id="1612" instrument_node="">mechanical translation of the Hebrew</span></a><span data-dcnode-id="1610" instrument_node="">, that does not take into consideration readability in English.</span></p><span data-dcnode-id="1608" instrument_node="">
</span><p data-dcnode-id="1598"><span data-dcnode-id="1607" instrument_node="">-and~ the~ Human he~ </span><b data-dcnode-id="1604"><i data-dcnode-id="1605"><span data-dcnode-id="1606" instrument_node="">had~ Know</span></i></b><span data-dcnode-id="1603" instrument_node=""> At “Hhawah [Living]” Woman~ him and~</span><b data-dcnode-id="1600"><i data-dcnode-id="1601"><span data-dcnode-id="1602" instrument_node="">she~ will~ Conceive and~ she~ will~Bring.forth</span></i></b><span data-dcnode-id="1599" instrument_node=""> At “Qayin [Acquired]” and~ she~ will~ Say i~ did~ Purchase Man At “YHWH [He exists]” -Genesis 4:1 [emphasis mine]</span></p><span data-dcnode-id="1597" instrument_node="">
</span><p data-dcnode-id="1595"><span data-dcnode-id="1596" instrument_node="">The perfect tense in Genesis 4:1 does not directly connect Cain to the serpent, but as a result of the perfect verb tense for “knew” (had known) it distances the act of Adam from the conception of Cain.</span></p><span data-dcnode-id="1594" instrument_node="">
</span><p data-dcnode-id="1592"><span data-dcnode-id="1593" instrument_node="">Since the Hebrew does not have punctuation, two thoughts are often separated by verb tenses. So this could be understood as saying “Adam had known his wife Eve. She conceived and bore a son…” So the action of knowing his wife is distinct from her action of conceiving Cain. Since they sinned in the garden they indeed had “known” each other in the garden after the act between Eve and the Serpent. To further bolster this understanding let’s review Genesis 4:17 and 25.</span></p><span data-dcnode-id="1591" instrument_node="">
</span><p data-dcnode-id="1589"><span data-dcnode-id="1590" instrument_node="">And Cain knew his wife; and she conceived, and bare Enoch: and he builded a city, and called the name of the city, after the name of his son, Enoch. (Genesis 4:17)</span></p><span data-dcnode-id="1588" instrument_node="">
</span><p data-dcnode-id="1586"><span data-dcnode-id="1587" instrument_node="">And Adam knew his wife again; and she bare a son, and called his name Seth: For God, said she, hath appointed me another seed instead of Abel, whom Cain slew. (Genesis 4:25)</span></p><span data-dcnode-id="1585" instrument_node="">
</span><p data-dcnode-id="1580"><span data-dcnode-id="1584" instrument_node="">These are two verses that have the same pattern as Genesis 4:1, but let’s examine them in the </span><a data-dcnode-id="1582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ancient-hebrew.org/bookstore/e-books/mtg.pdf"><span data-dcnode-id="1583" instrument_node="">Hebrew mechanical translation</span></a><span data-dcnode-id="1581" instrument_node="">.</span></p><span data-dcnode-id="1579" instrument_node="">
</span><p data-dcnode-id="1569"><span data-dcnode-id="1578" instrument_node="">and~ </span><b data-dcnode-id="1575"><i data-dcnode-id="1576"><span data-dcnode-id="1577" instrument_node="">he~ will~ Know “Qayin [Acquired]” At Woman</span></i></b><span data-dcnode-id="1574" instrument_node="">~ him and~ </span><b data-dcnode-id="1571"><i data-dcnode-id="1572"><span data-dcnode-id="1573" instrument_node="">she~ will~Conceive</span></i></b><span data-dcnode-id="1570" instrument_node=""> and~she~ will~ Bring.forth At “Hhanokh [Dedicated]” and~ he~ will~Exist Build~ ing(ms) City and~ he~will~ Call.out Title the~ City like~ Title Son~ him “Hhanokh [Dedicated]” Genesis 4:17</span></p><span data-dcnode-id="1568" instrument_node="">
</span><p data-dcnode-id="1558"><span data-dcnode-id="1567" instrument_node="">and~ </span><b data-dcnode-id="1564"><i data-dcnode-id="1565"><span data-dcnode-id="1566" instrument_node="">he~ will~ Know Human Yet.again At Woman</span></i></b><span data-dcnode-id="1563" instrument_node="">~ him and~ </span><b data-dcnode-id="1560"><i data-dcnode-id="1561"><span data-dcnode-id="1562" instrument_node="">she~ will~Bring.forth</span></i></b><span data-dcnode-id="1559" instrument_node=""> Son and~ she~ will~ Call.out At Title~ him “Shet [Buttocks]” Given.that he~ did~ Set.down to~me “Elohiym [Powers]” Seed Other Under “Hevel [Empty]” Given.that he~ did~ Kill~ him “Qayin [Acquired]” Genesis 4:25</span></p><span data-dcnode-id="1557" instrument_node="">
</span><p data-dcnode-id="1555"><span data-dcnode-id="1556" instrument_node="">Both words are in the imperfect tense and are therefore connecting the two actions together. Cain knowing his wife is connected directly to the conception of his son. Adam knowing his wife again is directly connected to the conception of his son as well.</span></p><span data-dcnode-id="1554" instrument_node="">
</span><p data-dcnode-id="1550"><span data-dcnode-id="1553" instrument_node="">To repeat, in Hebrew there are no punctuation marks, so two different actions are separated by two different verb tenses. </span><i data-dcnode-id="1551"><span data-dcnode-id="1552" instrument_node="">Genesis 4:1 has two different verb tenses and therefore the action of Adam knowing Eve is separated from the action of Eve conceiving Cain. Though it does not directly connect that act of conceiving Cain to the Serpent, the verb tenses distance the act of Adam and the conception of Cain. Adam is not connected to the conception of Cain. This bears record with the remaining context of the Bible that we have previously examined.</span></i></p><span data-dcnode-id="1549" instrument_node="">
</span><p data-dcnode-id="1547"><span data-dcnode-id="1548" instrument_node="">Therefore, the objection that Genesis 4:1 is an open and shut case disproving that Cain is the serpent’s seed has been disproven. The comparison of Genesis 4:1 with Genesis 4:17 and 25 reveals that something distinct took place in Genesis 4:1. There is not a direct connection in the verb tenses to the two acts. They are two distinct actions, separated by two distinct verb tenses.</span></p><span data-dcnode-id="1546" instrument_node="">
</span><h2 data-dcnode-id="1544" style="text-align: center;"><span data-dcnode-id="1545" instrument_node="">What was Adam’s sin?</span></h2><span data-dcnode-id="1543" instrument_node="">
</span><p data-dcnode-id="1541"><span data-dcnode-id="1542" instrument_node="">(Genesis 3:17) And unto Adam he said, Because thou hast hearkened unto the voice of thy wife, and hast eaten of the tree, of which I commanded thee, saying, Thou shalt not eat of it: cursed is the ground for thy sake; in sorrow shalt thou eat of it all the days of thy life;</span></p><span data-dcnode-id="1540" instrument_node="">
</span><p data-dcnode-id="1538"><span data-dcnode-id="1539" instrument_node="">In the teaching of serpent’s seed, we understand that the serpent gave Eve to eat of the tree of knowledge (tempting and leading her to sexual sin) and then Eve brought Adam to eat of the tree of knowledge as well. However, Eve was his wife so how can we consider Adam to have sinned. Let’s turn forward to the book of Deuteronomy.</span></p><span data-dcnode-id="1537" instrument_node="">
</span><p data-dcnode-id="1533"><span data-dcnode-id="1536" instrument_node="">When a man hath taken a wife, and married her, and it come to pass that she find no favour in his eyes, because he hath found some uncleanness in her: then let him write her a bill of divorcement, and give it in her hand, and send her out of his house. And when she is departed out of his house, she may go and be another man’s wife. And if the latter husband hate her, and write her a bill of divorcement, and giveth it in her hand, and sendeth her out of his house; or if the latter husband die, which took her to be his wife; Her former husband, which sent her away, may not take her again to be his wife, after that she is defiled; for that is abomination before the LORD: and thou shalt not cause the land to sin, which the LORD thy God giveth thee for an inheritance.</span><br data-dcnode-id="1535"><span data-dcnode-id="1534" instrument_node="">
(Deuteronomy 24:1-4)</span></p><span data-dcnode-id="1532" instrument_node="">
</span><p data-dcnode-id="1530"><span data-dcnode-id="1531" instrument_node="">“Now I know in answering one question another one is apt to come up, and people ask me, “If Eve fell that way, what did Adam do, for God lays the blame on Adam?” That is simple. The Word of God is forever settled in heaven. Before one speck of stardust was made, that Word (God’s law) was there EXACTLY AS IT IS WRITTEN IN OUR BIBLE. Now the Word teaches us that if a woman leaves her husband and goes with another man she is an adulteress and is no longer married and the husband is not to take her back. That Word was true in Eden as it was true when Moses wrote it in the law. The Word can’t change. Adam took her back. He knew exactly what he was doing, but he did it anyway. She was a part of him, and he was willing to take her responsibility upon himself. He would not let her go. So Eve conceived by him. He knew she would. He knew exactly what would happen to the human race, and he sold the human race into sin that he might have Eve, for he loved her.” [An Exposition Of The Seven Church Ages by William Branham, (Ch 3 – The Ephesian Church Age)</span></p><span data-dcnode-id="1529" instrument_node="">
</span><h2 data-dcnode-id="1527" style="text-align: center;"><span data-dcnode-id="1528" instrument_node="">&nbsp;The Woman’s Punishment</span></h2><span data-dcnode-id="1526" instrument_node="">
</span><p data-dcnode-id="1523"><i data-dcnode-id="1524"><span data-dcnode-id="1525" instrument_node="">If you examine the punishment that Eve received in Genesis 3:16 you see within it the conception and birth process.</span></i></p><span data-dcnode-id="1522" instrument_node="">
</span><p data-dcnode-id="1520"><span data-dcnode-id="1521" instrument_node="">To the woman he said, “I will surely multiply your pain in childbearing; in pain you shall bring forth children. Your desire shall be for your husband, and he shall rule over you.” -Genesis 3:16</span></p><span data-dcnode-id="1519" instrument_node="">
</span><p data-dcnode-id="1517"><span data-dcnode-id="1518" instrument_node="">If the original sin was literally eating fruit from a forbidden tree why did God punish the woman with increased pain in childbirth?&nbsp; Secondly, why is the desire for her husband included as a punishment unless she sinned by desiring another?&nbsp; A concept in the Old Testament is that the punishment should be commensurate with its crime (Exodus 21:22-25).&nbsp; Since Eve sinned by allowing her body to be used by the Serpent to produce an offspring, God punished her with increased pain in conception and childbearing. Again, if conception had not yet taken place why was her pain in childbearing to be increased?</span></p><span data-dcnode-id="1516" instrument_node="">
</span><h2 data-dcnode-id="1514" style="text-align: center;"><span data-dcnode-id="1515" instrument_node="">&nbsp;The Serpent’s Punishment</span></h2><span data-dcnode-id="1513" instrument_node="">
</span><p data-dcnode-id="1511"><span data-dcnode-id="1512" instrument_node="">The LORD God said to the serpent, “Because you have done this, cursed are you above all livestock and above all beasts of the field; on your belly you shall go, and dust you shall eat all the days of your life. I will put enmity between you and the woman, and between your offspring and her offspring; he shall bruise your head, and you shall bruise his heel.” Genesis 3:14-15</span></p><span data-dcnode-id="1510" instrument_node="">
</span><p data-dcnode-id="1508"><span data-dcnode-id="1509" instrument_node="">I will allow renowned Bible scholar Adam Clarke to explain the first part of the curse:</span></p><span data-dcnode-id="1507" instrument_node="">
</span><p data-dcnode-id="1505"><span data-dcnode-id="1506" instrument_node="">“The nachash [Serpent], whom I suppose to have been at the head of all the inferior animals, and in a sort of society and intimacy with man, is to be greatly degraded, entirely banished from human society, and deprived of the gift of speech. ‘Cursed art thou above all cattle, and above every beast of the field – thou shalt be considered the most contemptible of animals; upon thy belly shalt thou go – thou shalt no longer walk erect…’”</span></p><span data-dcnode-id="1504" instrument_node="">
</span><p data-dcnode-id="1502"><span data-dcnode-id="1503" instrument_node="">This curse is two-fold, one upon the literal physical serpent, and two upon Satan who used the serpent as his instrument. There was enmity placed between the woman and the serpent and then between their offspring. This, of course, has an immediate impact but also a prophetic impact.&nbsp; Immediately we find the offspring of the woman (through Adam her rightful husband) and the serpent manifesting enmity with the murder of Abel by Cain, and ultimately the enmity finds its fulfillment in the death and resurrection of Jesus Christ.</span></p><span data-dcnode-id="1501" instrument_node="">
</span><h2 data-dcnode-id="1499" style="text-align: center;"><span data-dcnode-id="1500" instrument_node="">&nbsp;Conclusion</span></h2><span data-dcnode-id="1498" instrument_node="">
</span><p data-dcnode-id="1496"><span data-dcnode-id="1497" instrument_node="">The hidden keys in the biblical context, the historical Jewish interpretation, the tenses of the verbs in Genesis 4:1, and the judgments leveled on the first family, all point to the same conclusion, that eating from the tree of knowledge was a metaphor. This is not a coincidence, but it is a revelation of what eating from the tree of knowledge actually was.&nbsp; The Serpent, under the influence of Satan, deceived Eve into a sexual act resulting in the conception of Cain and later that day she had a relationship with Adam resulting in the conception of Abel.</span></p><span data-dcnode-id="1495" instrument_node="">
</span><p data-dcnode-id="1493"><span data-dcnode-id="1494" instrument_node="">Search the Scriptures. The Bible is the final authority and we can rely on it and the Holy Spirit to direct us into all truth. As you consider what is written, I ask that you search this out in the Bible and pray for God to open your understanding.</span></p><span data-dcnode-id="1492" instrument_node="">

</span><div class="nv-comment-content comment nv-content-wrap" data-dcnode-id="474"><span data-dcnode-id="487" instrument_node="">
</span><p data-dcnode-id="485"><span data-dcnode-id="486" instrument_node="">We know from scripture that the planet was repopulated by only eight souls: Noah and his wife, their three sons Japheth, Shem and Ham and their wives (1 Peter 3:20).  So if DNA from Satan was passed on to certain groups after the flood, then they would have bred themselves for it after inheriting it from Noah and his wife.  That is likely, as we now know that Southeast Asians, East Asians, North Asians, Oceanians and Native Americans are Japheth’s progeny, white Caucasoid Europeans and Near Easterners are Shem’s progeny and black Africans are Ham’s progeny.  Those three human family groups are descended from only two people, yet there is a considerable amount of genetic diversity between them, which proves that people bred themselves for certain traits early on and diverged into separate genetic groups as a result.  It is called genetic drift.</span></p><span data-dcnode-id="484" instrument_node="">
</span><p data-dcnode-id="482"><span data-dcnode-id="483" instrument_node="">The bible refers to a tribe of people called Kenites, whose name in Hebrew means a descendant of Cain.  Apparently the Kenites people bred themselves for genetic traits that were distinct to Cain and were thus named Kenites due to their likeness to him.  It would have been possible for early populations of the world to identify those traits among individuals who inherited them following the flood through knowledge of who Cain’s family were from Noah, etc.  </span></p><span data-dcnode-id="481" instrument_node="">
</span><p data-dcnode-id="479"><span data-dcnode-id="480" instrument_node="">There are a number of scripture references that help us to identify who the Kenites were and who their descendants are today.  For starters, in Numbers 24, Balaam’s oracles state that in the latter days the Kenites would be wasted and carried away captive by Asshur (the Assyrians).  Amos 5:25-27 and Luke 21:20-24 confirm Balaam’s oracles: the Kenites are the part of the House of Judah that will be carried away captive beyond Damascus shortly before the second coming of Christ.  In I Chronicles 2:55, the Kenites of the house of Rechab are shown as scribes and in Jeremiah 35:11, the Rechabites relocate to Jerusalem after the House of Judah is carried away captive to Babylon.  It is possible that the House of Judah began intermarrying with the Kenites prior to being carried away captive, and that those intermarriages may have led to their captivity.  It is also possible that they intermarried with them after they returned to Israel.</span></p><span data-dcnode-id="478" instrument_node="">
</span><p data-dcnode-id="476"><span data-dcnode-id="477" instrument_node="">In Matthew 23:33, Jesus Christ referred to the Kenites as a generation of vipers like their serpent father satan.  In Matthew 23:35, he said that the blood of Abel was upon them.  That could only be possible if they were descended from the person killed Abel.  In John 8:39-47, Christ said that the Kenites weren’t Abraham’s children and that they are descended from the serpent through Cain the murderer.  And in Revelation 2:8-10; 3:9, the Kenites are shown to be the synagogue of satan, who say they are Jews and are not, and are the force behind the imprisonment of saints.</span></p><span data-dcnode-id="475" instrument_node="">

</span><div class="nv-comment-content comment nv-content-wrap" data-dcnode-id="434"><span data-dcnode-id="441" instrument_node="">
</span><p data-dcnode-id="439"><span data-dcnode-id="440" instrument_node="">I don’t think that satan took the form of a literal serpent in the garden when he seduced Eve.  I think that the reference to him taking the form of a serpent is as figurative as the fruit was that she partook of, which was obviously sexual in nature.  Revelation 12:3,4 &amp; 9 and Revelation 20:2 show satan to be a great red dragon with seven heads, ten horns and seven crowns upon his heads.  The serpent religion–the religion that satan convinces people to worship literal light in the place of spiritual light through–is astrological sun worship.   We find that the number 666 originated with astrological sun worship.  </span></p><span data-dcnode-id="438" instrument_node="">
</span><p data-dcnode-id="436"><span data-dcnode-id="437" instrument_node="">The zodiac is comprised of twelve houses, one house for each month, with three rooms or decanates per house, making thirty-six rooms in total.  1+2+3+4…all the way to 36=666.  Astrologers believe that a god or goddess rules over each of those rooms.  Deuteronomy 17:2-5 specifically forbids people to worship their dead heroes as gods or goddesses that rule over the constellations. The superstitious mystics of ancient times believed that the serpent power resided in the sun and they worshipped that force in nature as a seven-headed dragon, each one of its heads representing one of the planetary gods: the sun, moon, mars, mercury, Jupiter, venus and Saturn.</span></p><span data-dcnode-id="435" instrument_node="">
