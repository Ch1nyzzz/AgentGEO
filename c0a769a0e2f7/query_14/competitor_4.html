</span><h1 class="txt-large" data-dcnode-id="1144"><span data-dcnode-id="1145" instrument_node="">What Is the Mosaic Law?</span></h1><span data-dcnode-id="1143" instrument_node="">
</span></header><span data-dcnode-id="1141" instrument_node="">
</span><section class="about desktop" data-dcnode-id="1130"><span data-dcnode-id="1140" instrument_node="">
</span><div class="author-info tk-ff-meta-web-pro txt-grey" data-dcnode-id="1132"><span data-dcnode-id="1139" instrument_node="">
</span><address class="txt-strong" data-dcnode-id="1137"><span data-dcnode-id="1138" instrument_node="">Laura M. Sands</span></address><span data-dcnode-id="1136" instrument_node="">
</span><time class="txt-small txt-light" data-dcnode-id="1134" datetime="2022-04-20T03:04:42-07:00"><span data-dcnode-id="1135" instrument_node="">
                                    Last Modified Date: April 20, 2022                                </span></time><span data-dcnode-id="1133" instrument_node="">
</span></div><span data-dcnode-id="1131" instrument_node="">
</span></section><span data-dcnode-id="1129" instrument_node="">
</span><section class="about mobile" data-dcnode-id="1118"><span data-dcnode-id="1128" instrument_node="">
</span><a class="author-info tk-ff-meta-web-pro popup-open-but" data-dcnode-id="1120" href="#authorBox"><span data-dcnode-id="1127" instrument_node="">
</span><address class="txt-strong txt-grey" data-dcnode-id="1125"><span data-dcnode-id="1126" instrument_node="">Laura M. Sands</span></address><span data-dcnode-id="1124" instrument_node="">
</span><time class="txt-small txt-light" data-dcnode-id="1122" datetime="2022-04-20T03:04:42-07:00"><span data-dcnode-id="1123" instrument_node="">

</span><section class="content floating" data-dcnode-id="770"><span data-dcnode-id="1116" instrument_node="">
</span><figure class="fright txt-center" data-dcnode-id="1106"><span data-dcnode-id="1115" instrument_node="">
</span><a class="popup-open-but" data-dcnode-id="1108" data-popup="#slider-image-1" href="#imagePopup"><span data-dcnode-id="1114" instrument_node="">
</span><img alt="Morning prayers at the Western Wall in Jerusalem." data-dcnode-id="1113" sizes="calc(50vw - 30px)" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.mylawquestions.com/slideshow-mobile-small/morning-prayers-at-the-western-wall-in-jerusalem.jpg&amp;raw" srcset="//images.mylawquestions.com/small/morning-prayers-at-the-western-wall-in-jerusalem.jpg 232w, //images.mylawquestions.com/slideshow-mobile-small/morning-prayers-at-the-western-wall-in-jerusalem.jpg 520w"><span data-dcnode-id="1112" instrument_node="">
</span><figcaption class="tk-ff-meta-web-pro txt-small txt-light desktop" data-dcnode-id="1110"><span data-dcnode-id="1111" instrument_node="">
                                        Morning prayers at the Western Wall in Jerusalem.                                    </span></figcaption><span data-dcnode-id="1109" instrument_node="">
</span></a><span data-dcnode-id="1107" instrument_node="">
</span></figure><span data-dcnode-id="1105" instrument_node="">
</span><p data-dcnode-id="1095"><a data-dcnode-id="1103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.homequestionsanswered.com/what-is-mosaic.htm"><span data-dcnode-id="1104" instrument_node="">Mosaic</span></a><span data-dcnode-id="1102" instrument_node=""> law, also referred to as the Law of Moses, is used to describe Jewish law as set forth in the </span><a data-dcnode-id="1100" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.languagehumanities.org/what-is-the-torah.htm"><span data-dcnode-id="1101" instrument_node="">Torah</span></a><span data-dcnode-id="1099" instrument_node="">. According to Jewish tradition, these laws were handwritten by the Hebrew God and given to Moses to pass on to the Israelites. A total of 613 laws are included in the Mosaic law including the 10 laws, or 10 commandments, taught in Christian </span><a data-dcnode-id="1097" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.languagehumanities.org/what-is-theology.htm"><span data-dcnode-id="1098" instrument_node="">theology</span></a><span data-dcnode-id="1096" instrument_node="">.</span></p><span data-dcnode-id="1094" instrument_node="">
</span><div class="ad-block center" data-dcnode-id="1084"><span data-dcnode-id="1092" instrument_node="">
</span><span data-dcnode-id="1090" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-8290526608142878" data-ad-format="auto" data-ad-slot="5480447840" data-dcnode-id="1089" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="1088" instrument_node="">
</span><span data-dcnode-id="1085" instrument_node="">
</span></div><span data-dcnode-id="1083" instrument_node="">
</span><figure class="fright txt-center" data-dcnode-id="1073"><span data-dcnode-id="1082" instrument_node="">
</span><a class="popup-open-but" data-dcnode-id="1075" data-popup="#slider-image-2" href="#imagePopup"><span data-dcnode-id="1081" instrument_node="">
</span><img alt="The Torah sets for Mosaic law." data-dcnode-id="1080" sizes="calc(50vw - 30px)" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.mylawquestions.com/slideshow-mobile-small/hebrew-bible-with-bookmark.jpg&amp;raw" srcset="//images.mylawquestions.com/small/hebrew-bible-with-bookmark.jpg 232w, //images.mylawquestions.com/slideshow-mobile-small/hebrew-bible-with-bookmark.jpg 520w"><span data-dcnode-id="1079" instrument_node="">
</span><figcaption class="tk-ff-meta-web-pro txt-small txt-light desktop" data-dcnode-id="1077"><span data-dcnode-id="1078" instrument_node="">
                                        The Torah sets for Mosaic law.                                    </span></figcaption><span data-dcnode-id="1076" instrument_node="">
</span></a><span data-dcnode-id="1074" instrument_node="">
</span></figure><span data-dcnode-id="1072" instrument_node="">
</span><p data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">Religiously observant Jews are required by the tenets of their faith to abide by the Mosaic law. These laws include observing the Jewish seventh day Sabbath, keeping precise holy days and abstaining from eating pork and other forbidden foods, such as shellfish and other foods coming from animals deemed to be unclean. It is from Mosaic law that kosher dietary guidelines are derived.</span></p><span data-dcnode-id="1069" instrument_node="">
</span><div class="ad-block center" data-dcnode-id="1059"><span data-dcnode-id="1067" instrument_node="">
</span><span data-dcnode-id="1065" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-8290526608142878" data-ad-format="auto" data-ad-slot="9332062945" data-dcnode-id="1064" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="1063" instrument_node="">
</span><span data-dcnode-id="1060" instrument_node="">
</span></div><span data-dcnode-id="1058" instrument_node="">
</span><figure class="fright txt-center" data-dcnode-id="1048"><span data-dcnode-id="1057" instrument_node="">
</span><a class="popup-open-but" data-dcnode-id="1050" data-popup="#slider-image-3" href="#imagePopup"><span data-dcnode-id="1056" instrument_node="">
</span><img alt="The Mosaic law is contained with in the first five books of the Old Testament, also called the Torah." data-dcnode-id="1055" sizes="calc(50vw - 30px)" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.mylawquestions.com/slideshow-mobile-small/oldbiblescroll.jpg&amp;raw" srcset="//images.mylawquestions.com/small/oldbiblescroll.jpg 232w, //images.mylawquestions.com/slideshow-mobile-small/oldbiblescroll.jpg 520w"><span data-dcnode-id="1054" instrument_node="">
</span><figcaption class="tk-ff-meta-web-pro txt-small txt-light desktop" data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">
                                        The Mosaic law is contained with in the first five books of the Old Testament, also called the Torah.                                    </span></figcaption><span data-dcnode-id="1051" instrument_node="">
</span></a><span data-dcnode-id="1049" instrument_node="">
</span></figure><span data-dcnode-id="1047" instrument_node="">
</span><p data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">Traditionally, most Christians do not adhere to all 613 Mosaic laws. Of these laws, however, 10 are considered standard for adherence by Christians. A few of these include honoring one’s parents, refraining from adultery, not murdering another individual and not bearing false witness, or telling lies, against another.</span></p><span data-dcnode-id="1044" instrument_node="">
</span><div class="ad-block center" data-dcnode-id="1034"><span data-dcnode-id="1042" instrument_node="">
</span><span data-dcnode-id="1040" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-8290526608142878" data-ad-format="auto" data-ad-slot="9592110917" data-dcnode-id="1039" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="1038" instrument_node="">
</span><span data-dcnode-id="1035" instrument_node="">
</span></div><span data-dcnode-id="1033" instrument_node=""> </span><div class="ad-block center" data-dcnode-id="1027"><span data-dcnode-id="1031" instrument_node="">
</span><a class="txt-strong" data-dcnode-id="1029" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//capitaloneshopping.sjv.io/meRVZ%3Fsubid%3Darticle-text-link" onclick="fbq('track','Lead');"><span data-dcnode-id="1030" instrument_node="">Is Amazon actually giving you the best price? This little known plugin reveals the answer.</span></a><span data-dcnode-id="1028" instrument_node="">
</span></div><span data-dcnode-id="1026" instrument_node="">
</span><p data-dcnode-id="1024"><span data-dcnode-id="1025" instrument_node="">To many, Mosaic law is known simply as Jewish law. Not only is this due to the history of these laws, but also because most of the religious traditions and observances practiced within various sects of Judaism are based on Mosaic law. The laws are all contained within the first five books of the Bible’s Old Testament, which is what Jews refer to as the Torah. </span></p><span data-dcnode-id="1023" instrument_node="">
</span><div class="ad-block center" data-dcnode-id="1013"><span data-dcnode-id="1021" instrument_node="">
</span><span data-dcnode-id="1019" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-8290526608142878" data-ad-format="auto" data-ad-slot="6965947570" data-dcnode-id="1018" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="1017" instrument_node="">
</span><span data-dcnode-id="1014" instrument_node="">
</span></div><span data-dcnode-id="1012" instrument_node="">
</span><p data-dcnode-id="1004"><span data-dcnode-id="1011" instrument_node="">The </span><a data-dcnode-id="1009" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.languagehumanities.org/what-is-the-difference-between-the-torah-and-the-tanakh.htm"><span data-dcnode-id="1010" instrument_node="">Tanakh</span></a><span data-dcnode-id="1008" instrument_node=""> is also fundamentally based on Mosaic law. Comprised of the Torah, as well as the teachings of the Jewish prophets and the Writings, the Tanakh contains all of the Jewish scriptures. For Christians, the Tanakh is referred to as the Old Testament, or the time before the writings dedicated to the teachings of </span><a data-dcnode-id="1006" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.publicpeople.org/who-is-jesus-christ.htm"><span data-dcnode-id="1007" instrument_node="">Jesus Christ</span></a><span data-dcnode-id="1005" instrument_node="">.</span></p><span data-dcnode-id="1003" instrument_node="">
</span><div class="ad-block center" data-dcnode-id="993"><span data-dcnode-id="1001" instrument_node="">
</span><span data-dcnode-id="999" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-8290526608142878" data-ad-format="auto" data-ad-slot="5652865908" data-dcnode-id="998" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="997" instrument_node="">
</span><span data-dcnode-id="994" instrument_node="">
</span></div><span data-dcnode-id="992" instrument_node="">
</span><p data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">The embodiment of all of the Mosaic law, as well as all of the Jewish rabbinical laws is contained within halakha. Also contained in halakha are all of the customs and traditions assigned to the Jewish people. This collection of laws, traditions and customs is intended to provide direction to the daily lives of religiously observant Jews from the moment an individual awakens in the morning, throughout her or his waking hours, and even provides instructions on where and how an individual is allowed to sleep, as well as with whom a person is allowed to sleep with.</span></p><span data-dcnode-id="989" instrument_node="">
</span><h2 data-dcnode-id="986"><strong data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">Can Anyone Practice Mosaic Law?</span></strong></h2><span data-dcnode-id="985" instrument_node="">
</span><p data-dcnode-id="983"><span data-dcnode-id="984" instrument_node="">The Mosaic law is traditionally and fundamentally upheld by people of Jewish faith and heritage. The 613 directions given to Moses by the Hebrew God became tenants of Judaism. However, portions of the law do transfer over to other religions, primarily Christian.</span></p><span data-dcnode-id="982" instrument_node="">
</span><div class="ad-block center" data-dcnode-id="972"><span data-dcnode-id="980" instrument_node="">
</span><span data-dcnode-id="978" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-8290526608142878" data-ad-format="auto" data-ad-slot="7092912411" data-dcnode-id="977" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="976" instrument_node="">
</span><span data-dcnode-id="973" instrument_node="">
</span></div><span data-dcnode-id="971" instrument_node="">
</span><p data-dcnode-id="969"><span data-dcnode-id="970" instrument_node="">Despite Mosaic law being fundamental to Judaism, many Christian believers feel connected to the law, adopting many portions of it into their lives. As Christians, the Mosaic law is not a required observance — the New Testament makes this abundantly clear — yet many Christians still observe portions, primarily the Ten Commandments, of the Mosaic law.</span></p><span data-dcnode-id="968" instrument_node="">
</span><p data-dcnode-id="966"><span data-dcnode-id="967" instrument_node="">Therefore, anyone can practice or observe Mosaic law. The law dictated 613 rules for a good life. While these rules were meant to reference obedience to the Hebrew God, nothing says that obeying or practicing portions of the law will not create meaning and purpose within some other faiths or even nonbelievers.</span></p><span data-dcnode-id="965" instrument_node="">
</span><div class="ad-block center" data-dcnode-id="955"><span data-dcnode-id="963" instrument_node="">
</span><span data-dcnode-id="961" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-8290526608142878" data-ad-format="auto" data-ad-slot="3751614969" data-dcnode-id="960" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="959" instrument_node="">
</span><span data-dcnode-id="956" instrument_node="">
</span></div><span data-dcnode-id="954" instrument_node="">
</span><p data-dcnode-id="952"><span data-dcnode-id="953" instrument_node="">Following Mosaic law does not make you Jewish, just as attending a mass does not make you a Christian. The tenets of your faith will demand specific things from you, but that does not mean you should deprive yourself of knowledge. Learning is the key to understanding, and many religions and belief systems encourage knowledge in combination with adherence to religion.</span></p><span data-dcnode-id="951" instrument_node="">
</span><p data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">Despite not being a requirement, many Christians still practice Mosaic law, at least to some extent. Those that practice it are not considered any less Christian. Life is a journey of learning, and each person is responsible for their education.</span></p><span data-dcnode-id="948" instrument_node="">
</span><h2 data-dcnode-id="945"><strong data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">Are Christians Under the Mosaic Law?</span></strong></h2><span data-dcnode-id="944" instrument_node="">
</span><p data-dcnode-id="942"><span data-dcnode-id="943" instrument_node="">Christian faiths do not observe the Mosaic law as an authority. The law represented the authority of the Levitical priesthood, but Jesus is from the line of Judah, not Levi, meaning an entirely new Melchizedekian priesthood formed through the power of his resurrection.</span></p><span data-dcnode-id="941" instrument_node="">
</span><p data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">Through the institution of the new line of priests, a new law was formed from the new covenant. The transfer of focus and belief supersedes the Aaronic priesthood and the Mosaic law. Christians were no longer beholden to the old covenant.</span></p><span data-dcnode-id="938" instrument_node="">
</span><p data-dcnode-id="936"><span data-dcnode-id="937" instrument_node="">While the “law of Christ” is the foundation of Christian beliefs and existence, scholars still insist on the authority of the Old Testament. Mosaic law still influences Christian life, but it does not carry the same weight as it did under the old covenant.</span></p><span data-dcnode-id="935" instrument_node="">
</span><p data-dcnode-id="933"><span data-dcnode-id="934" instrument_node="">Primarily, the Mosaic law is a provision of patterns and principles of wisdom, providing guidance on life, depicting the prophecies of Christ, and carrying the authority of Scripture. However, for Christians, Mosaic law no longer holds covenantal force.</span></p><span data-dcnode-id="932" instrument_node="">
</span><p data-dcnode-id="930"><span data-dcnode-id="931" instrument_node="">Therefore, Christians are not necessarily under Mosaic law, they operate under moral law or the testimony of natural law and Christ’s law: love your neighbor as yourself. The New Testament and the new covenant free Christians from the burden and judgment of the law.</span></p><span data-dcnode-id="929" instrument_node="">
</span><p data-dcnode-id="927"><span data-dcnode-id="928" instrument_node="">Despite the lack of obligation to the Mosaic law and its authority, many Christian faiths are built upon its foundation, especially as it is representative of moral or natural law. With free will comes the burden of sin, and Mosaic law helps people define moral boundaries and guide rails.</span></p><span data-dcnode-id="926" instrument_node="">
</span><h2 data-dcnode-id="923"><strong data-dcnode-id="924"><span data-dcnode-id="925" instrument_node="">When Was the Mosaic Law Given</span></strong></h2><span data-dcnode-id="922" instrument_node="">
</span><p data-dcnode-id="920"><span data-dcnode-id="921" instrument_node="">There is no specific date for when Moses delivered or divined the 613 commandments that make up the Mosaic law. Some scholars believe the date of inception to be between the 16th and 13th centuries BCE. However, Rabbinic teachings suggest Moses was given the Oral Torah in 1312 BCE, meaning the 14th century BC.</span></p><span data-dcnode-id="919" instrument_node="">
</span><p data-dcnode-id="917"><span data-dcnode-id="918" instrument_node="">While the date is unclear, most people can agree that Moses received the foundation of the Mosaic law on Mount Sinai. Unfortunately, even knowing the events surrounding Moses’ ascent of Mount Sinai, it is seemingly impossible to specify a year for the creation of the Mosaic law.</span></p><span data-dcnode-id="916" instrument_node="">
</span><p data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">Scholars and religious leaders disagree on a specific timeline. Many religious experts now believe that the Torah, despite the belief it was written solely by Moses, was an interpretation conceived by many authors.</span></p><span data-dcnode-id="913" instrument_node="">
</span><p data-dcnode-id="911"><span data-dcnode-id="912" instrument_node="">The new assumptions and lack of specificity of a date do not eliminate the merit of the law or its fundamental nature in religion and life. All religion stems from somewhere, and the discovery of origination should be a goal of every faith to further understanding and belief.</span></p><span data-dcnode-id="910" instrument_node="">
</span><p data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">However, there will always be fundamentalists. For pure believers, Moses is the tool God used to author the Mosaic law, which occurred in the 14th century BC.</span></p><span data-dcnode-id="907" instrument_node="">
</span><p data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">The Mosaic law is an interesting piece of world and religious history. Regardless of your views, there is likely room to review the moral and ethical underpinnings of the centuries-old law.</span></p><span data-dcnode-id="904" instrument_node="">
</span><h2 data-dcnode-id="901"><strong data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">What Are the 10 Commandments?</span></strong></h2><span data-dcnode-id="900" instrument_node="">
</span><p data-dcnode-id="895"><span data-dcnode-id="899" instrument_node="">In the Hebrew scriptures, the 10 Commandments are foundational laws that God gave to the nation of Israel. According to Exodus 24:12-18, God wrote these 10 laws on two tablets of stone before giving them to the </span><a data-dcnode-id="897" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.languagehumanities.org/what-is-a-prophet.htm"><span data-dcnode-id="898" instrument_node="">prophet</span></a><span data-dcnode-id="896" instrument_node=""> Moses.&nbsp;These are the 10 Commandments in order, cited from the American Standard Version of the Bible.</span></p><span data-dcnode-id="894" instrument_node="">
</span><h3 data-dcnode-id="891"><strong data-dcnode-id="892"><span data-dcnode-id="893" instrument_node="">1. Worship Only One God</span></strong></h3><span data-dcnode-id="890" instrument_node="">
</span><p data-dcnode-id="888"><span data-dcnode-id="889" instrument_node="">“I am Jehovah thy God, who brought thee out of the land of Egypt… Thou shalt have no other gods before me.” – Exodus 20:2</span></p><span data-dcnode-id="887" instrument_node="">
</span><p data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">This commandment requires the Israelites to worship only one god. This was different from Egypt and other nations that practiced polytheism, or belief in many different gods.</span></p><span data-dcnode-id="884" instrument_node="">
</span><h3 data-dcnode-id="881"><strong data-dcnode-id="882"><span data-dcnode-id="883" instrument_node="">2. Do Not Make Idols</span></strong></h3><span data-dcnode-id="880" instrument_node="">
</span><p data-dcnode-id="878"><span data-dcnode-id="879" instrument_node="">“Thou shalt not make unto thee a graven image… Thou shalt not bow down thyself unto them, nor serve them.” – Exodus 20:3-6</span></p><span data-dcnode-id="877" instrument_node="">
</span><p data-dcnode-id="875"><span data-dcnode-id="876" instrument_node="">The mosaic law forbid the nation of Israel from making any kind of idols or statues for worship. This included golden calves and temples to other gods.</span></p><span data-dcnode-id="874" instrument_node="">
</span><h3 data-dcnode-id="871"><strong data-dcnode-id="872"><span data-dcnode-id="873" instrument_node="">3. Do Not Use God’s Name In a Disrespectful Way</span></strong></h3><span data-dcnode-id="870" instrument_node="">
</span><p data-dcnode-id="868"><span data-dcnode-id="869" instrument_node="">“Thou shalt not take the name of Jehovah thy God in vain; for Jehovah will not hold him guiltless that taketh his name in vain.” – Exodus 20:7</span></p><span data-dcnode-id="867" instrument_node="">
</span><p data-dcnode-id="865"><span data-dcnode-id="866" instrument_node="">According to the Bible, the name of the Hebrew God is Jehovah, or Yahve. This name, also known as the tetragrammaton, is represented by four letters, YHVH or JHVH. It appears 6,828 times in the Hebrew bible. The Jews were to treat this name with great respect.</span></p><span data-dcnode-id="864" instrument_node="">
</span><h3 data-dcnode-id="861"><strong data-dcnode-id="862"><span data-dcnode-id="863" instrument_node="">4. Observe the Sabbath Day and Treat It as Sacred</span></strong></h3><span data-dcnode-id="860" instrument_node="">
</span><p data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">“Six days shalt thou labor, and do all thy work; but the seventh day is a sabbath unto Jehovah thy God: in it thou shalt not do any work.” – Exodus 20:8-11</span></p><span data-dcnode-id="857" instrument_node="">
</span><p data-dcnode-id="855"><span data-dcnode-id="856" instrument_node="">For Jews, the Sabbath was a mandated holy day of rest from work. It was a time dedicated to God and the family. The Sabbath began at sundown on Friday and extended to sundown on Saturday.</span></p><span data-dcnode-id="854" instrument_node="">
</span><h3 data-dcnode-id="851"><strong data-dcnode-id="852"><span data-dcnode-id="853" instrument_node="">5. Show Respect for Your Parents</span></strong></h3><span data-dcnode-id="850" instrument_node="">
</span><p data-dcnode-id="848"><span data-dcnode-id="849" instrument_node="">“Honor thy father and thy mother.” – Exodus 20:12</span></p><span data-dcnode-id="847" instrument_node="">
</span><p data-dcnode-id="845"><span data-dcnode-id="846" instrument_node="">This law required Israelites to show respect to their parents. Children were supposed to be obedient, but the law also applied to adults. Every Israelite was to care for older parents.</span></p><span data-dcnode-id="844" instrument_node="">
</span><h3 data-dcnode-id="841"><strong data-dcnode-id="842"><span data-dcnode-id="843" instrument_node="">6. Do Not Murder</span></strong></h3><span data-dcnode-id="840" instrument_node="">
</span><p data-dcnode-id="838"><span data-dcnode-id="839" instrument_node="">“Thou shalt not kill.” – Exodus 20:13</span></p><span data-dcnode-id="837" instrument_node="">
</span><p data-dcnode-id="835"><span data-dcnode-id="836" instrument_node="">Killing someone innocent was a direct violation of the mosaic law. In Hebrew, this law didn’t apply to killing someone in self-defense or to protect other victims. It applied to murder.</span></p><span data-dcnode-id="834" instrument_node="">
</span><h3 data-dcnode-id="831"><strong data-dcnode-id="832"><span data-dcnode-id="833" instrument_node="">7. Do Not Commit Adultery</span></strong></h3><span data-dcnode-id="830" instrument_node="">
</span><p data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">“Thou shalt not commit adultery.” – Exodus 20:14</span></p><span data-dcnode-id="827" instrument_node="">
</span><p data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">Adultery means having sex with a person who is married to someone else. It also includes being unfaithful to your partner. The Israelites were expected to be faithful to their husband or wife.</span></p><span data-dcnode-id="824" instrument_node="">
</span><h3 data-dcnode-id="821"><strong data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">8. Do Not Steal</span></strong></h3><span data-dcnode-id="820" instrument_node="">
</span><p data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">“Thou shalt not steal.” – Exodus 20:15</span></p><span data-dcnode-id="817" instrument_node="">
</span><p data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">Taking what belonged to someone else was against the mosaic law. This included stealing clothing, food, animals, money and other possessions. As time went on, this commandment was also applied to other types of theft, such as cheating people or committing fraud.</span></p><span data-dcnode-id="814" instrument_node="">
</span><h3 data-dcnode-id="811"><strong data-dcnode-id="812"><span data-dcnode-id="813" instrument_node="">9. Do Not Give False Testimony</span></strong></h3><span data-dcnode-id="810" instrument_node="">
</span><p data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">“Thou shalt not bear false witness against thy neighbor.” – Exodus 20:16</span></p><span data-dcnode-id="807" instrument_node="">
</span><p data-dcnode-id="805"><span data-dcnode-id="806" instrument_node="">Lying was condemned in the mosaic law. This was especially true during cases where witnesses were required to testify about what they saw. Intentionally making up lies or offering deceitful answers was a serious offense.</span></p><span data-dcnode-id="804" instrument_node="">
</span><h3 data-dcnode-id="801"><strong data-dcnode-id="802"><span data-dcnode-id="803" instrument_node="">&nbsp;10. Do Not Covet</span></strong></h3><span data-dcnode-id="800" instrument_node="">
</span><p data-dcnode-id="798"><span data-dcnode-id="799" instrument_node="">“Thou shalt not covet thy neighbor’s house, thou shalt not covet thy neighbor’s wife … nor anything that is thy neighbor’s.”</span></p><span data-dcnode-id="797" instrument_node="">
</span><p data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">This law warned the Israelites not to be greedy. They were supposed to avoid envying or craving the things another person had. This included someone else’s wife, house, wealth and possessions.</span></p><span data-dcnode-id="794" instrument_node="">
</span><h2 data-dcnode-id="791"><strong data-dcnode-id="792"><span data-dcnode-id="793" instrument_node="">How Are Mosaic Laws Different From the Ten Commandments?</span></strong></h2><span data-dcnode-id="790" instrument_node="">
</span><p data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">The mosaic law includes the 10 Commandments but also many other laws. The mosaic laws include topics such as proper hygiene, diet, forgiveness, education, spending time as a family, animal sacrifices and worship. Together, they acted as a set of laws for the entire nation.</span></p><span data-dcnode-id="787" instrument_node="">
</span><h2 data-dcnode-id="784"><strong data-dcnode-id="785"><span data-dcnode-id="786" instrument_node="">Does the Mosaic Law Still Apply?</span></strong></h2><span data-dcnode-id="783" instrument_node="">
</span><p data-dcnode-id="778"><span data-dcnode-id="782" instrument_node="">Different religions view the laws given to Moses in distinct ways today. Judaism, Christianity and </span><a data-dcnode-id="780" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.historicalindex.org/what-is-islam.htm"><span data-dcnode-id="781" instrument_node="">Islam</span></a><span data-dcnode-id="779" instrument_node=""> are all connected in some way to these laws.</span></p><span data-dcnode-id="777" instrument_node="">
</span><p data-dcnode-id="775"><span data-dcnode-id="776" instrument_node="">For some believers, elements of the mosaic law still apply, such as sabbath laws. For others, the law represents a valuable resource into the feelings and personality of God, but not a requirement to be followed today.</span></p><span data-dcnode-id="774" instrument_node="">
</span><p data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">For example, orthodox Jews adhere strictly to each part of the mosaic law, including laws regarding animal sacrifices and avoiding certain types of meat. Conservative Jews also follow mosaic laws, but may interpret them in different ways for modern worshippers.</span></p><span data-dcnode-id="771" instrument_node="">
</span></section><span data-dcnode-id="769" instrument_node="">
</span><span data-dcnode-id="768" instrument_node="">
</span><span data-dcnode-id="767" instrument_node="">

</span><h2 class="txt-large" data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">Readers Also Love</span></h2><span data-dcnode-id="763" instrument_node="">
</span><nav class="tk-ff-meta-web-pro flex" data-dcnode-id="721"><span data-dcnode-id="762" instrument_node="">
</span><a data-dcnode-id="758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wisegeek.com/entertainment/26-incredibly-wealthy-hollywood-stars"><span data-dcnode-id="761" instrument_node="">
</span><img alt="26 Incredibly Wealthy Hollywood Stars" data-dcnode-id="760" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.mylawquestions.com/square-pics/89fed015e0d96ef6dc32683990ed53ae.jpg&amp;raw"><span data-dcnode-id="759" instrument_node="">

</span><h2 class="txt-large" data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">
                            Discussion Comments                        </span></h2><span data-dcnode-id="655" instrument_node="">
</span><div class="ad-block center" data-dcnode-id="648"><span data-dcnode-id="653" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-8290526608142878" data-ad-format="fluid" data-ad-layout="in-article" data-ad-slot="1350224705" data-dcnode-id="652" style="display:block; text-align:center;"></ins><span data-dcnode-id="651" instrument_node="">
</span></div><span data-dcnode-id="647" instrument_node="">
</span><article class="tk-ff-meta-web-pro txt-grey" data-dcnode-id="633"><span data-dcnode-id="646" instrument_node="">
</span><address class="txt-small txt-strong txt-ups fleft" data-dcnode-id="644"><span data-dcnode-id="645" instrument_node="">
            Phaedrus        </span></address><span data-dcnode-id="643" instrument_node="">
</span><time class="txt-small txt-strong txt-ups fleft" data-dcnode-id="641" datetime="2014-10-14T04:35:45-07:00"><span data-dcnode-id="642" instrument_node="">
            October 14, 2014        </span></time><span data-dcnode-id="640" instrument_node="">
</span><p data-dcnode-id="638"><span data-dcnode-id="639" instrument_node="">I can understand why the Hebrews wanted to have a set of Mosaic laws to live by instead of living in confusion and chaos. We Americans did the same thing when our founders created the US Constitution. We needed to know where the boundaries were, and what punishment we could expect if we violated those important laws.
</span></p><p data-dcnode-id="636"><span data-dcnode-id="637" instrument_node="">
</span></p><p data-dcnode-id="634"><span data-dcnode-id="635" instrument_node="">However, I think the Mosaic law crumbled under its own weight, even before the arrival of Jesus Christ. Creating laws that protect society in general is a noble goal, but pretty soon it starts turning into disputes over minutiae. Mosaic law started getting weighted down with specific laws that only addressed very minor issues. Very few authority figures could even interpret all of the intentions behind every one of the laws, let alone enforce them.    </span></p></article><span data-dcnode-id="632" instrument_node="">
</span><article class="tk-ff-meta-web-pro txt-grey" data-dcnode-id="618"><span data-dcnode-id="631" instrument_node="">
</span><address class="txt-small txt-strong txt-ups fleft" data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">
            RocketLanch8        </span></address><span data-dcnode-id="628" instrument_node="">
</span><time class="txt-small txt-strong txt-ups fleft" data-dcnode-id="626" datetime="2014-10-13T12:35:45-07:00"><span data-dcnode-id="627" instrument_node="">
            October 13, 2014        </span></time><span data-dcnode-id="625" instrument_node="">
</span><p data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">I've always seen the Ten Commandments as the fewest number of "rules" necessary to hold the Hebrew nation together during the time of Moses. If people were left to their own devices, especially people who had been oppressed all of their lives, they might want to do some things contrary to God's will. The thought of killing their former oppressors comes to mind, for instance. Having a direct Commandment that says "Thou Shalt Not Kill" would let people know revenge killings would not be condoned by God.
</span></p><p data-dcnode-id="621"><span data-dcnode-id="622" instrument_node="">
</span></p><p data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">Being a Christian, I was taught to believe that Jesus' sacrifice on Calvary freed us all from Mosaic law. We now live under a state of grace, not under the law. But we still respect the 10 Commandments, even if we Christians don't feel the need to live under the Mosaic law anymore.    </span></p></article><span data-dcnode-id="617" instrument_node="">
