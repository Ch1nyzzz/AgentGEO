</span><link data-dcnode-id="2156" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="2144"><p data-dcnode-id="2154"><span data-dcnode-id="2155" instrument_node="">the transgression of commandments is also called uncleanliness or defilement. This term is especially used of the chief and principal crimes, which are idolatry, adultery, and murder. ...In reference to adultery we read, "Defile not ye yourselves in any of these things." (Leviticus 18:24) </span></p><div class="templatequotecite" data-dcnode-id="2145"><span data-dcnode-id="2153" instrument_node="">— </span><cite data-dcnode-id="2146"><span data-dcnode-id="2152" instrument_node="">Maimonides, in </span><i data-dcnode-id="2150"><span data-dcnode-id="2151" instrument_node="">The Guide for the Perplexed</span></i><sup class="reference" data-dcnode-id="2147" id="cite_ref-1"><a data-dcnode-id="2148" href="#cite_note-1"><span data-dcnode-id="2149" instrument_node="">[1]</span></a></sup></cite></div></blockquote><span data-dcnode-id="2143" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="2134"><div class="thumbinner" data-dcnode-id="2135" style="width:222px;"><a class="image" data-dcnode-id="2141" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AJewish_wedding_Vienna_Jan_2007_004.jpg"><img alt="" class="thumbimage" data-dcnode-id="2142" data-file-height="1200" data-file-width="1600" decoding="async" height="165" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/a/a4/Jewish_wedding_Vienna_Jan_2007_004.jpg/220px-Jewish_wedding_Vienna_Jan_2007_004.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/a/a4/Jewish_wedding_Vienna_Jan_2007_004.jpg/330px-Jewish_wedding_Vienna_Jan_2007_004.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/a/a4/Jewish_wedding_Vienna_Jan_2007_004.jpg/440px-Jewish_wedding_Vienna_Jan_2007_004.jpg 2x" width="220"></a><span data-dcnode-id="2140" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="2136"><div class="magnify" data-dcnode-id="2138"><a class="internal" data-dcnode-id="2139" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AJewish_wedding_Vienna_Jan_2007_004.jpg" title="Enlarge"></a></div><span data-dcnode-id="2137" instrument_node="">A Jewish wedding in Vienna, Austria, 2007</span></div></div></div><span data-dcnode-id="2133" instrument_node="">
</span><p data-dcnode-id="2128"><span data-dcnode-id="2132" instrument_node="">The </span><a data-dcnode-id="2130" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mitzvah" title="Mitzvah"><span data-dcnode-id="2131" instrument_node="">mitzvah</span></a><span data-dcnode-id="2129" instrument_node=""> against adultery is interpreted to refer to sexual relations between a man and a married woman. The mitzvah are as follows:
</span></p><span data-dcnode-id="2127" instrument_node="">
</span><ul data-dcnode-id="2112"><li data-dcnode-id="2119"><span data-dcnode-id="2126" instrument_node="">Not to have intercourse with another man's wife.</span><sup class="reference" data-dcnode-id="2123" id="cite_ref-2"><a data-dcnode-id="2124" href="#cite_note-2"><span data-dcnode-id="2125" instrument_node="">[2]</span></a></sup><sup class="reference" data-dcnode-id="2120" id="cite_ref-3"><a data-dcnode-id="2121" href="#cite_note-3"><span data-dcnode-id="2122" instrument_node="">[3]</span></a></sup></li><span data-dcnode-id="2118" instrument_node="">
</span><li data-dcnode-id="2113"><span data-dcnode-id="2117" instrument_node="">There shall be no intercourse with a woman, without previous marriage with a deed of marriage and formal declaration of marriage.</span><sup class="reference" data-dcnode-id="2114" id="cite_ref-4"><a data-dcnode-id="2115" href="#cite_note-4"><span data-dcnode-id="2116" instrument_node="">[4]</span></a></sup></li></ul><span data-dcnode-id="2111" instrument_node="">
</span><p data-dcnode-id="2077"><span data-dcnode-id="2110" instrument_node="">In the </span><a data-dcnode-id="2108" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Torah" title="Torah"><span data-dcnode-id="2109" instrument_node="">Torah</span></a><span data-dcnode-id="2107" instrument_node="">, if a husband suspected his wife of adultery, there was </span><a data-dcnode-id="2105" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ordeal_of_the_bitter_water" title="Ordeal of the bitter water"><span data-dcnode-id="2106" instrument_node="">a prescribed ordeal</span></a><span data-dcnode-id="2104" instrument_node=""> she underwent to determine her guilt or innocence.</span><sup class="reference" data-dcnode-id="2101" id="cite_ref-5"><a data-dcnode-id="2102" href="#cite_note-5"><span data-dcnode-id="2103" instrument_node="">[5]</span></a></sup><span data-dcnode-id="2100" instrument_node=""> A separate procedure was to be followed if a newlywed husband became suspicious that his wife had been </span><a data-dcnode-id="2098" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Promiscuity" title="Promiscuity"><span data-dcnode-id="2099" instrument_node="">promiscuous</span></a><span data-dcnode-id="2097" instrument_node=""> before marriage.</span><sup class="reference" data-dcnode-id="2094" id="cite_ref-6"><a data-dcnode-id="2095" href="#cite_note-6"><span data-dcnode-id="2096" instrument_node="">[6]</span></a></sup><span data-dcnode-id="2093" instrument_node=""> Alternatively, to enforce </span><a data-dcnode-id="2091" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Capital_punishment_in_the_Bible" title="Capital punishment in the Bible"><span data-dcnode-id="2092" instrument_node="">capital punishment</span></a><span data-dcnode-id="2090" instrument_node=""> for adultery, at least two witnesses were required, and both the man and woman involved were subject to punishment.</span><sup class="reference" data-dcnode-id="2087" id="cite_ref-7"><a data-dcnode-id="2088" href="#cite_note-7"><span data-dcnode-id="2089" instrument_node="">[7]</span></a></sup><span data-dcnode-id="2086" instrument_node=""> While cases of adultery could thus be difficult to prove, divorce laws added over the years enabled a husband to divorce his wife on circumstantial evidence of adultery without witnesses or additional evidence.</span><sup class="reference" data-dcnode-id="2083" id="cite_ref-8"><a data-dcnode-id="2084" href="#cite_note-8"><span data-dcnode-id="2085" instrument_node="">[8]</span></a></sup><span data-dcnode-id="2082" instrument_node=""> If a woman committed unlawful intercourse against her will, she was not guilty of adultery, because she did not act as a free agent.</span><sup class="reference" data-dcnode-id="2079" id="cite_ref-9"><a data-dcnode-id="2080" href="#cite_note-9"><span data-dcnode-id="2081" instrument_node="">[9]</span></a></sup><span data-dcnode-id="2078" instrument_node=""> Punishment was not inflicted in such cases, and the legal consequences of adultery did not follow.
</span></p><p data-dcnode-id="2048"><span data-dcnode-id="2076" instrument_node="">In the first century, enforcement of the ordeal of the bitter water became less common as additional restrictions were put on prosecution of capital cases of adultery.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="2069" style="white-space:nowrap;"><span data-dcnode-id="2075" instrument_node="">[</span><i data-dcnode-id="2071"><a data-dcnode-id="2072" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="2073" title="This claim needs references to reliable sources. (October 2021)"><span data-dcnode-id="2074" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="2070" instrument_node="">]</span></sup><span data-dcnode-id="2068" instrument_node=""> In the year 40, before the </span><a data-dcnode-id="2066" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Siege_of_Jerusalem_%2870_CE%29" title="Siege of Jerusalem (70 CE)"><span data-dcnode-id="2067" instrument_node="">destruction of the Second Temple</span></a><span data-dcnode-id="2065" instrument_node="">, the Jewish courts relinquished their right to inflict capital punishment (perhaps under Roman pressure). Changes in punishment for adultery were enacted: the adulterer was scourged, and the husband of the adulteress was not allowed to forgive her crime,</span><sup class="reference" data-dcnode-id="2062" id="cite_ref-10"><a data-dcnode-id="2063" href="#cite_note-10"><span data-dcnode-id="2064" instrument_node="">[10]</span></a></sup><span data-dcnode-id="2061" instrument_node=""> but was compelled to divorce her, and she lost all her property rights under her marriage contract.</span><sup class="reference" data-dcnode-id="2058" id="cite_ref-11"><a data-dcnode-id="2059" href="#cite_note-11"><span data-dcnode-id="2060" instrument_node="">[11]</span></a></sup><span data-dcnode-id="2057" instrument_node=""> The adulteress was not allowed to marry the one with whom she had committed adultery;</span><sup class="reference" data-dcnode-id="2054" id="cite_ref-12"><a data-dcnode-id="2055" href="#cite_note-12"><span data-dcnode-id="2056" instrument_node="">[12]</span></a></sup><span data-dcnode-id="2053" instrument_node=""> if she did, they were forced to separate.</span><sup class="reference" data-dcnode-id="2050" id="cite_ref-13"><a data-dcnode-id="2051" href="#cite_note-13"><span data-dcnode-id="2052" instrument_node="">[13]</span></a></sup><span data-dcnode-id="2049" instrument_node="">
</span></p><p data-dcnode-id="2035"><span data-dcnode-id="2047" instrument_node="">Although legal enforcement was inconsistently applied, the mitzvah remained. Adultery is one of three sins (along with idolatry and murder) that are to be resisted to the point of death.</span><sup class="reference" data-dcnode-id="2044" id="cite_ref-14"><a data-dcnode-id="2045" href="#cite_note-14"><span data-dcnode-id="2046" instrument_node="">[14]</span></a></sup><span data-dcnode-id="2043" instrument_node=""> This was the consensus of the rabbis at the meeting at Lydda, during the </span><a data-dcnode-id="2041" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bar_Kokhba_revolt" title="Bar Kokhba revolt"><span data-dcnode-id="2042" instrument_node="">Bar Kokhba revolt</span></a><span data-dcnode-id="2040" instrument_node=""> of 132.</span><sup class="reference" data-dcnode-id="2037" id="cite_ref-15"><a data-dcnode-id="2038" href="#cite_note-15"><span data-dcnode-id="2039" instrument_node="">[15]</span></a></sup><span data-dcnode-id="2036" instrument_node="">
</span></p><p data-dcnode-id="2020"><span data-dcnode-id="2034" instrument_node="">The mitzvoh to practice sexual relations only within marriage is affirmed by many </span><a data-dcnode-id="2032" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Orthodox_Judaism" title="Orthodox Judaism"><span data-dcnode-id="2033" instrument_node="">Orthodox</span></a><span data-dcnode-id="2031" instrument_node="">, </span><a data-dcnode-id="2029" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Conservative_Judaism" title="Conservative Judaism"><span data-dcnode-id="2030" instrument_node="">Conservative</span></a><span data-dcnode-id="2028" instrument_node=""> and </span><a data-dcnode-id="2026" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reform_Judaism" title="Reform Judaism"><span data-dcnode-id="2027" instrument_node="">Reform</span></a><span data-dcnode-id="2025" instrument_node=""> rabbis into modern times.</span><sup class="reference" data-dcnode-id="2022" id="cite_ref-16"><a data-dcnode-id="2023" href="#cite_note-16"><span data-dcnode-id="2024" instrument_node="">[16]</span></a></sup><span data-dcnode-id="2021" instrument_node=""> They point out that sexual relations outside of marriage undermine marriage and even love itself, and also emphasize the positive role of sexual relations in strengthening and promoting love within marriage.
</span></p><span data-dcnode-id="2019" instrument_node="">
</span><h3 data-dcnode-id="2009"><span class="mw-headline" data-dcnode-id="2017" id="Christianity"><span data-dcnode-id="2018" instrument_node="">Christianity</span></span><span class="mw-editsection" data-dcnode-id="2010"><span class="mw-editsection-bracket" data-dcnode-id="2015"><span data-dcnode-id="2016" instrument_node="">[</span></span><a data-dcnode-id="2013" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DThou_shalt_not_commit_adultery%26action%3Dedit%26section%3D4" title="Edit section: Christianity"><span data-dcnode-id="2014" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2011"><span data-dcnode-id="2012" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2008" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="1999"><div class="thumbinner" data-dcnode-id="2000" style="width:222px;"><a class="image" data-dcnode-id="2006" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AViennaGenesisPict31TemptationOfJoseph.jpg"><img alt="" class="thumbimage" data-dcnode-id="2007" data-file-height="1836" data-file-width="1470" decoding="async" height="275" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/c/cb/ViennaGenesisPict31TemptationOfJoseph.jpg/220px-ViennaGenesisPict31TemptationOfJoseph.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/c/cb/ViennaGenesisPict31TemptationOfJoseph.jpg/330px-ViennaGenesisPict31TemptationOfJoseph.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/c/cb/ViennaGenesisPict31TemptationOfJoseph.jpg/440px-ViennaGenesisPict31TemptationOfJoseph.jpg 2x" width="220"></a><span data-dcnode-id="2005" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="2001"><div class="magnify" data-dcnode-id="2003"><a class="internal" data-dcnode-id="2004" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AViennaGenesisPict31TemptationOfJoseph.jpg" title="Enlarge"></a></div><span data-dcnode-id="2002" instrument_node="">In Egypt, Joseph resisted temptation to adultery at great personal cost. Image from the Vienna Bible, 1743</span></div></div></div><span data-dcnode-id="1998" instrument_node="">
</span><h4 data-dcnode-id="1987"><span class="mw-headline" data-dcnode-id="1995" id="In_the_New_Testament"><span data-dcnode-id="1997" instrument_node="">In the New Testament</span><span class="anchor" data-dcnode-id="1996" id="New_Testament"></span></span><span class="mw-editsection" data-dcnode-id="1988"><span class="mw-editsection-bracket" data-dcnode-id="1993"><span data-dcnode-id="1994" instrument_node="">[</span></span><a data-dcnode-id="1991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DThou_shalt_not_commit_adultery%26action%3Dedit%26section%3D5" title="Edit section: In the New Testament"><span data-dcnode-id="1992" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1989"><span data-dcnode-id="1990" instrument_node="">]</span></span></span></h4><span data-dcnode-id="1986" instrument_node="">
</span><p data-dcnode-id="1962"><span data-dcnode-id="1985" instrument_node="">In the </span><a data-dcnode-id="1983" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gospel" title="Gospel"><span data-dcnode-id="1984" instrument_node="">gospels</span></a><span data-dcnode-id="1982" instrument_node="">, Jesus affirmed the commandment against adultery</span><sup class="reference" data-dcnode-id="1979" id="cite_ref-17"><a data-dcnode-id="1980" href="#cite_note-17"><span data-dcnode-id="1981" instrument_node="">[17]</span></a></sup><span data-dcnode-id="1978" instrument_node=""> and seemed to extend it, saying, "But I say to you, anyone who looks on a woman to lust after her has committed adultery with her already in his heart."</span><sup class="reference" data-dcnode-id="1975" id="cite_ref-18"><a data-dcnode-id="1976" href="#cite_note-18"><span data-dcnode-id="1977" instrument_node="">[18]</span></a></sup><span data-dcnode-id="1974" instrument_node=""> He taught his audience that the outward act of adultery does not happen apart from sins of the heart: "From within people, from their hearts, come evil thoughts, unchastity, theft, murder, adultery, greed, malice, deceit, licentiousness, envy, blasphemy, arrogance, folly. All these evils come from within and they defile."</span><sup class="reference" data-dcnode-id="1971" id="cite_ref-19"><a data-dcnode-id="1972" href="#cite_note-19"><span data-dcnode-id="1973" instrument_node="">[19]</span></a></sup><span data-dcnode-id="1970" instrument_node=""> However, some commentators, including </span><a data-dcnode-id="1968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Thomas_Aquinas" title="Thomas Aquinas"><span data-dcnode-id="1969" instrument_node="">Thomas Aquinas</span></a><span data-dcnode-id="1967" instrument_node="">, say that Jesus was making the connection with the commandment, "You shall not covet your neighbor's wife."</span><sup class="reference" data-dcnode-id="1964" id="cite_ref-20"><a data-dcnode-id="1965" href="#cite_note-20"><span data-dcnode-id="1966" instrument_node="">[20]</span></a></sup><span data-dcnode-id="1963" instrument_node="">
</span></p><p data-dcnode-id="1949"><span data-dcnode-id="1961" instrument_node="">According to the gospels, Jesus quoted the book of Genesis regarding the divine origin of the marriage relationship, concluding, "So they are no longer two, but one flesh. Therefore, what God has joined together, no man must separate."</span><sup class="reference" data-dcnode-id="1958" id="cite_ref-21"><a data-dcnode-id="1959" href="#cite_note-21"><span data-dcnode-id="1960" instrument_node="">[21]</span></a></sup><span data-dcnode-id="1957" instrument_node=""> Jesus dismissed expedient provisions allowing for divorce for nearly any reason, and cited sexual immorality (a breaking of the marriage covenant) as the only reason why a person may divorce without committing adultery.</span><sup class="reference" data-dcnode-id="1954" id="cite_ref-22"><a data-dcnode-id="1955" href="#cite_note-22"><span data-dcnode-id="1956" instrument_node="">[22]</span></a></sup><span data-dcnode-id="1953" instrument_node=""> The Apostle Paul similarly taught (commonly called the </span><a data-dcnode-id="1951" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pauline_privilege" title="Pauline privilege"><span data-dcnode-id="1952" instrument_node="">Pauline privilege</span></a><span data-dcnode-id="1950" instrument_node="">):
</span></p><span data-dcnode-id="1948" instrument_node="">
</span><link data-dcnode-id="1947" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="1941"><p data-dcnode-id="1942"><span data-dcnode-id="1946" instrument_node="">To the married I give charge, not I but the Lord, that the wife should not separate from her husband ... and that the husband should not divorce his wife. To the rest I say, not the Lord, ... But if the unbelieving partner desires to separate, let it be so; in such a case the brother or sister is not bound. For God has called us to peace.</span><sup class="reference" data-dcnode-id="1943" id="cite_ref-23"><a data-dcnode-id="1944" href="#cite_note-23"><span data-dcnode-id="1945" instrument_node="">[23]</span></a></sup></p></blockquote><span data-dcnode-id="1940" instrument_node="">
</span><p data-dcnode-id="1919"><span data-dcnode-id="1939" instrument_node="">In the gospel of John is an account of a woman </span><a data-dcnode-id="1937" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jesus_and_the_woman_taken_in_adultery" title="Jesus and the woman taken in adultery"><span data-dcnode-id="1938" instrument_node="">caught in adultery</span></a><span data-dcnode-id="1936" instrument_node="">. Leaders responsible for executing justice brought her to Jesus and asked for his judgment. Jesus clearly identified adultery with sin; however, his statement "Let him who is without sin cast the first stone" did not refer to the precepts of law but to conscience.</span><sup class="reference" data-dcnode-id="1933" id="cite_ref-JPII_24-0"><a data-dcnode-id="1934" href="#cite_note-JPII-24"><span data-dcnode-id="1935" instrument_node="">[24]</span></a></sup><span data-dcnode-id="1932" instrument_node=""> Some commentators point out that if the woman was caught in adultery, there should also have been a man standing trial.</span><sup class="reference" data-dcnode-id="1929" id="cite_ref-25"><a data-dcnode-id="1930" href="#cite_note-25"><span data-dcnode-id="1931" instrument_node="">[25]</span></a></sup><span data-dcnode-id="1928" instrument_node=""> The law clearly stated that both parties were to receive the death penalty.</span><sup class="reference" data-dcnode-id="1925" id="cite_ref-26"><a data-dcnode-id="1926" href="#cite_note-26"><span data-dcnode-id="1927" instrument_node="">[26]</span></a></sup><span data-dcnode-id="1924" instrument_node=""> By not bringing the guilty man to justice, these leaders shared in the guilt and were not fit to carry out the punishment.  Not condoning her adultery, Jesus warns the woman in parting, "Go and sin no more"</span><sup class="reference" data-dcnode-id="1921" id="cite_ref-27"><a data-dcnode-id="1922" href="#cite_note-27"><span data-dcnode-id="1923" instrument_node="">[27]</span></a></sup><span data-dcnode-id="1920" instrument_node="">
</span></p><p data-dcnode-id="1917"><span data-dcnode-id="1918" instrument_node="">The Apostle Paul wrote frankly about the gravity of adultery:
</span></p><span data-dcnode-id="1916" instrument_node="">
</span><link data-dcnode-id="1915" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="1905"><p data-dcnode-id="1913"><span data-dcnode-id="1914" instrument_node=""> Do not be deceived: neither the sexually immoral, nor idolaters, nor adulterers, nor men who practice homosexuality, nor thieves, nor the greedy, nor drunkards, nor revilers, nor swindlers will inherit the kingdom of God. And such were some of you. But you were washed, you were sanctified, you were justified in the name of the Lord Jesus Christ and by the Spirit of our God.  </span></p><div class="templatequotecite" data-dcnode-id="1906"><span data-dcnode-id="1912" instrument_node="">— </span><cite data-dcnode-id="1907"><span data-dcnode-id="1911" instrument_node="">1 Corinthians 6:9–11 (ESV)</span><sup class="reference" data-dcnode-id="1908" id="cite_ref-28"><a data-dcnode-id="1909" href="#cite_note-28"><span data-dcnode-id="1910" instrument_node="">[28]</span></a></sup></cite></div></blockquote><span data-dcnode-id="1904" instrument_node="">
</span><p data-dcnode-id="1894"><span data-dcnode-id="1903" instrument_node="">Within marriage, regular sexual relations are expected and encouraged. "The husband should give to his wife her conjugal rights, and likewise the wife to her husband. For the wife does not have authority over her own body, but the husband does. Likewise the husband does not have authority over his own body, but the wife does."</span><sup class="reference" data-dcnode-id="1900" id="cite_ref-29"><a data-dcnode-id="1901" href="#cite_note-29"><span data-dcnode-id="1902" instrument_node="">[29]</span></a></sup><span data-dcnode-id="1899" instrument_node="">  As "one flesh," the husband and wife share this right and privilege; the New Testament does not portray intimacy as something held in reserve by each spouse to be shared on condition. "Stop depriving one another, except by agreement for a time that you may devote yourselves to prayer, and come together again lest Satan tempt you because of your lack of self-control."</span><sup class="reference" data-dcnode-id="1896" id="cite_ref-30"><a data-dcnode-id="1897" href="#cite_note-30"><span data-dcnode-id="1898" instrument_node="">[30]</span></a></sup><span data-dcnode-id="1895" instrument_node=""> A stated reason for maintaining marital relations is to reduce the temptation to adultery.
</span></p><p data-dcnode-id="1876"><span data-dcnode-id="1893" instrument_node="">Scripture itself states that Paul was unmarried,</span><sup class="reference" data-dcnode-id="1890" id="cite_ref-31"><a data-dcnode-id="1891" href="#cite_note-31"><span data-dcnode-id="1892" instrument_node="">[31]</span></a></sup><span data-dcnode-id="1889" instrument_node=""> but does not clarify whether he never married or was widowed. Nevertheless, they point out he realized the practical advantages of remaining single.</span><sup class="reference" data-dcnode-id="1886" id="cite_ref-32"><a data-dcnode-id="1887" href="#cite_note-32"><span data-dcnode-id="1888" instrument_node="">[32]</span></a></sup><span data-dcnode-id="1885" instrument_node=""> He referred to contentment in celibacy as "a gift,"</span><sup class="reference" data-dcnode-id="1882" id="cite_ref-33"><a data-dcnode-id="1883" href="#cite_note-33"><span data-dcnode-id="1884" instrument_node="">[33]</span></a></sup><span data-dcnode-id="1881" instrument_node=""> and sexual desire as the more common condition of people. For this reason, he recommends that most people are better off married, in order to preclude being tempted beyond what they can bear or going through life "burning with passion."</span><sup class="reference" data-dcnode-id="1878" id="cite_ref-34"><a data-dcnode-id="1879" href="#cite_note-34"><span data-dcnode-id="1880" instrument_node="">[34]</span></a></sup><span data-dcnode-id="1877" instrument_node="">
</span></p><span data-dcnode-id="1875" instrument_node="">
</span><h4 data-dcnode-id="1865"><span class="mw-headline" data-dcnode-id="1873" id="Catholic_Church"><span data-dcnode-id="1874" instrument_node="">Catholic Church</span></span><span class="mw-editsection" data-dcnode-id="1866"><span class="mw-editsection-bracket" data-dcnode-id="1871"><span data-dcnode-id="1872" instrument_node="">[</span></span><a data-dcnode-id="1869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DThou_shalt_not_commit_adultery%26action%3Dedit%26section%3D6" title="Edit section: Catholic Church"><span data-dcnode-id="1870" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1867"><span data-dcnode-id="1868" instrument_node="">]</span></span></span></h4><span data-dcnode-id="1864" instrument_node="">
</span><link data-dcnode-id="1863" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="1854"><p data-dcnode-id="1861"><span data-dcnode-id="1862" instrument_node="">Adultery refers to marital infidelity. When two partners, of whom at least one is married to another party, have sexual relations—even transient ones—they commit adultery. </span></p><div class="templatequotecite" data-dcnode-id="1855"><span data-dcnode-id="1860" instrument_node="">— </span><cite data-dcnode-id="1856"><i data-dcnode-id="1858"><span data-dcnode-id="1859" instrument_node="">Catechism of the Catholic Church</span></i><span data-dcnode-id="1857" instrument_node=""> 2380</span></cite></div></blockquote><span data-dcnode-id="1853" instrument_node="">
</span><p data-dcnode-id="1847"><span data-dcnode-id="1852" instrument_node="">According to the </span><i data-dcnode-id="1849"><a data-dcnode-id="1850" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Catechism_of_the_Catholic_Church" title="Catechism of the Catholic Church"><span data-dcnode-id="1851" instrument_node="">Catechism of the Catholic Church</span></a></i><span data-dcnode-id="1848" instrument_node="">, those who are engaged must refrain from sexual relations until after the marriage ceremony.  This exercise of restraint in order to keep the commandment against adultery is also seen as important practice for fidelity within marriage:
</span></p><span data-dcnode-id="1846" instrument_node="">
</span><link data-dcnode-id="1845" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="1836"><p data-dcnode-id="1843"><span data-dcnode-id="1844" instrument_node=""> Those who are engaged to marry are called to live chastity in continence. They should see in this time of testing a discovery of mutual respect, an apprenticeship in fidelity, and the hope of receiving one another from God. They should reserve for marriage the expressions of affection that belong to married love. They will help each other grow in chastity. </span></p><div class="templatequotecite" data-dcnode-id="1837"><span data-dcnode-id="1842" instrument_node="">— </span><cite data-dcnode-id="1838"><i data-dcnode-id="1840"><span data-dcnode-id="1841" instrument_node="">Catechism of the Catholic Church</span></i><span data-dcnode-id="1839" instrument_node="">  2350</span></cite></div></blockquote><span data-dcnode-id="1835" instrument_node="">
</span><p data-dcnode-id="1825"><span data-dcnode-id="1834" instrument_node="">The tradition of the Catholic Church has understood the commandment against adultery as encompassing the whole of human sexuality</span><sup class="reference" data-dcnode-id="1831" id="cite_ref-35"><a data-dcnode-id="1832" href="#cite_note-35"><span data-dcnode-id="1833" instrument_node="">[35]</span></a></sup><span data-dcnode-id="1830" instrument_node=""> and so pornography</span><sup class="reference" data-dcnode-id="1827" id="cite_ref-36"><a data-dcnode-id="1828" href="#cite_note-36"><span data-dcnode-id="1829" instrument_node="">[36]</span></a></sup><span data-dcnode-id="1826" instrument_node=""> is declared a violation of this commandment.  Several other sexual activities that may or may not involve married persons are also directly addressed and prohibited in the Catechism.
</span></p><p data-dcnode-id="1819"><span data-dcnode-id="1824" instrument_node="">Adultery is viewed not only as a sin between an individual and God but as an injustice that reverberates through society by harming its fundamental unit, the family:</span><sup class="reference" data-dcnode-id="1821" id="cite_ref-37"><a data-dcnode-id="1822" href="#cite_note-37"><span data-dcnode-id="1823" instrument_node="">[37]</span></a></sup><span data-dcnode-id="1820" instrument_node="">
</span></p><span data-dcnode-id="1818" instrument_node="">
</span><link data-dcnode-id="1817" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="1808"><p data-dcnode-id="1815"><span data-dcnode-id="1816" instrument_node="">Adultery is an injustice. He who commits adultery fails in his commitment. He does injury to the sign of the covenant which the marriage bond is, transgresses the rights of the other spouse, and undermines the institution of marriage by breaking the contract on which it is based. He compromises the good of human generation and the welfare of children who need their parents' stable union.  </span></p><div class="templatequotecite" data-dcnode-id="1809"><span data-dcnode-id="1814" instrument_node="">— </span><cite data-dcnode-id="1810"><i data-dcnode-id="1812"><span data-dcnode-id="1813" instrument_node="">Catechism of the Catholic Church</span></i><span data-dcnode-id="1811" instrument_node="">, 2335</span></cite></div></blockquote><span data-dcnode-id="1807" instrument_node="">
</span><p data-dcnode-id="1803"><a class="extiw" data-dcnode-id="1805" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikisource.org/wiki/The_catechism_of_the_Council_of_Trent/Part_3%3A_The_Sixth_Commandment" title="s:The catechism of the Council of Trent/Part 3: The Sixth Commandment"><span data-dcnode-id="1806" instrument_node="">The catechism of the Council of Trent (Part III)</span></a><span data-dcnode-id="1804" instrument_node="">, published in 1566, defined adultery even more strictly than at present, stating "This commandment, then, resolves itself into two heads; the one expressed, which prohibits adultery; the other implied, which inculcates purity of mind and body." Thus linking the commandment against adultery to the sin of lust in general.
</span></p><span data-dcnode-id="1802" instrument_node="">
</span><h4 data-dcnode-id="1792"><span class="mw-headline" data-dcnode-id="1800" id="Reformation_and_post-Reformation_commentary"><span data-dcnode-id="1801" instrument_node="">Reformation and post-Reformation commentary</span></span><span class="mw-editsection" data-dcnode-id="1793"><span class="mw-editsection-bracket" data-dcnode-id="1798"><span data-dcnode-id="1799" instrument_node="">[</span></span><a data-dcnode-id="1796" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DThou_shalt_not_commit_adultery%26action%3Dedit%26section%3D7" title="Edit section: Reformation and post-Reformation commentary"><span data-dcnode-id="1797" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1794"><span data-dcnode-id="1795" instrument_node="">]</span></span></span></h4><span data-dcnode-id="1791" instrument_node="">
</span><p data-dcnode-id="1787"><a data-dcnode-id="1789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Calvin" title="John Calvin"><span data-dcnode-id="1790" instrument_node="">John Calvin</span></a><span data-dcnode-id="1788" instrument_node=""> understood the commandment against adultery to extend to sexual relations outside of marriage:
</span></p><span data-dcnode-id="1786" instrument_node="">
</span><link data-dcnode-id="1785" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="1779"><p data-dcnode-id="1780"><span data-dcnode-id="1784" instrument_node="">Although one kind of impurity is alone referred to, it is sufficiently plain, from the principle laid down, that believers are generally exhorted to chastity; for, if the Law be a perfect rule of holy living, it would be more than absurd to give a license for fornication (sexual relations between persons not married to each other), adultery alone being excepted.</span><sup class="reference" data-dcnode-id="1781" id="cite_ref-38"><a data-dcnode-id="1782" href="#cite_note-38"><span data-dcnode-id="1783" instrument_node="">[38]</span></a></sup></p></blockquote><span data-dcnode-id="1778" instrument_node="">
</span><p data-dcnode-id="1770"><a data-dcnode-id="1776" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Matthew_Henry" title="Matthew Henry"><span data-dcnode-id="1777" instrument_node="">Matthew Henry</span></a><span data-dcnode-id="1775" instrument_node=""> understood the commandment against adultery to prohibit sexual immorality in general, and he acknowledged the difficulty people experience: "This commandment forbids all acts of uncleanness, with all those fleshly lusts which produce those acts and war against the soul."</span><sup class="reference" data-dcnode-id="1772" id="cite_ref-39"><a data-dcnode-id="1773" href="#cite_note-39"><span data-dcnode-id="1774" instrument_node="">[39]</span></a></sup><span data-dcnode-id="1771" instrument_node="">  Henry supports his interpretation with Matthew 5:28, where Jesus warns that whoever looks at a woman lustfully has already committed adultery with her in his heart. 
</span></p><span data-dcnode-id="1769" instrument_node="">
</span><link data-dcnode-id="1768" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="1761"><p data-dcnode-id="1766"><span data-dcnode-id="1767" instrument_node="">Marriage should be honored by all, and the marriage bed kept pure, for God will judge the adulterer and all the sexually immoral. </span></p><div class="templatequotecite" data-dcnode-id="1762"><span data-dcnode-id="1765" instrument_node="">— </span><cite data-dcnode-id="1763"><span data-dcnode-id="1764" instrument_node="">Hebrews 13:4 (NIV)</span></cite></div></blockquote><span data-dcnode-id="1760" instrument_node="">
</span><p data-dcnode-id="1758"><span data-dcnode-id="1759" instrument_node="">Regarding the above passage, Matthew Henry comments:
</span></p><span data-dcnode-id="1757" instrument_node="">
</span><link data-dcnode-id="1756" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="1750"><p data-dcnode-id="1751"><span data-dcnode-id="1755" instrument_node="">Here you have, 1. A recommendation of God's ordinance of marriage, that it is honourable in all, … 2. A dreadful but just censure of impurity and lewdness."</span><sup class="reference" data-dcnode-id="1752" id="cite_ref-40"><a data-dcnode-id="1753" href="#cite_note-40"><span data-dcnode-id="1754" instrument_node="">[40]</span></a></sup></p></blockquote><span data-dcnode-id="1749" instrument_node="">
</span><p data-dcnode-id="1741"><a data-dcnode-id="1747" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Wesley" title="John Wesley"><span data-dcnode-id="1748" instrument_node="">John Wesley</span></a><span data-dcnode-id="1746" instrument_node=""> believed this scripture and the sure judgment of God, even though adulterers "frequently escape the sentence of men."</span><sup class="reference" data-dcnode-id="1743" id="cite_ref-41"><a data-dcnode-id="1744" href="#cite_note-41"><span data-dcnode-id="1745" instrument_node="">[41]</span></a></sup><span data-dcnode-id="1742" instrument_node="">
</span></p><p data-dcnode-id="1737"><a data-dcnode-id="1739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Martin_Luther" title="Martin Luther"><span data-dcnode-id="1740" instrument_node="">Martin Luther</span></a><span data-dcnode-id="1738" instrument_node=""> observed that there were many more people in his day who were unmarried for various reasons than in biblical times, which condition increased both temptation and sexual activities that are displeasing to God:  
</span></p><span data-dcnode-id="1736" instrument_node="">
</span><link data-dcnode-id="1735" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="1723"><p data-dcnode-id="1733"><span data-dcnode-id="1734" instrument_node=""> But because among us there is such a shameful mess and the very dregs of all vice and lewdness, this commandment is directed also against all manner of unchastity, whatever it may be called; ...For flesh and blood remain flesh and blood, and the natural inclination and excitement have their course without let or hindrance, as everybody sees and feels. In order, therefore, that it may be the more easy in some degree to avoid unchastity, God has commanded the estate of matrimony, that every one may have his proper portion and be satisfied therewith … </span></p><div class="templatequotecite" data-dcnode-id="1724"><span data-dcnode-id="1732" instrument_node="">— </span><cite data-dcnode-id="1725"><span data-dcnode-id="1731" instrument_node="">Martin Luther, </span><i data-dcnode-id="1729"><span data-dcnode-id="1730" instrument_node="">The Large Catechism</span></i><sup class="reference" data-dcnode-id="1726" id="cite_ref-read_online_42-0"><a data-dcnode-id="1727" href="#cite_note-read_online-42"><span data-dcnode-id="1728" instrument_node="">[42]</span></a></sup></cite></div></blockquote><span data-dcnode-id="1722" instrument_node="">
</span><p data-dcnode-id="1720"><span data-dcnode-id="1721" instrument_node="">Luther neither condemns nor denies human sexuality, but, like the Apostle Paul, points out that God instituted the marriage relationship to provide for its proper enjoyment. Luther comments that each spouse should intentionally cherish the other, and that this will contribute to love and a desire for chastity, which will make fidelity easier.  
</span></p><span data-dcnode-id="1719" instrument_node="">
</span><link data-dcnode-id="1718" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="1706"><p data-dcnode-id="1716"><span data-dcnode-id="1717" instrument_node="">Let me now say in conclusion that this commandment demands also that every one love and esteem the spouse given him by God. For where conjugal chastity is to be maintained, man and wife must by all means live together in love and harmony, that one may cherish the other from the heart and with entire fidelity. For that is one of the principal points which enkindle love and desire of chastity, so that, where this is found, chastity will follow as a matter of course without any command. Therefore also St. Paul so diligently exhorts husband and wife to love and honor one another. </span></p><div class="templatequotecite" data-dcnode-id="1707"><span data-dcnode-id="1715" instrument_node="">— </span><cite data-dcnode-id="1708"><span data-dcnode-id="1714" instrument_node="">Martin Luther, </span><i data-dcnode-id="1712"><span data-dcnode-id="1713" instrument_node="">The Large Catechism</span></i><sup class="reference" data-dcnode-id="1709" id="cite_ref-read_online_42-1"><a data-dcnode-id="1710" href="#cite_note-read_online-42"><span data-dcnode-id="1711" instrument_node="">[42]</span></a></sup></cite></div></blockquote><span data-dcnode-id="1705" instrument_node="">
</span><p data-dcnode-id="1696"><span data-dcnode-id="1704" instrument_node="">The so-called "</span><a data-dcnode-id="1702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wicked_Bible" title="Wicked Bible"><span data-dcnode-id="1703" instrument_node="">Wicked Bible</span></a><span data-dcnode-id="1701" instrument_node="">", printed in 1631, omits the word "not", reading "Thou shalt commit adultery." Historians are divided as to whether this was a typographical error or the attempt of a competitor to sabotage the print-run.</span><sup class="reference" data-dcnode-id="1698" id="cite_ref-43"><a data-dcnode-id="1699" href="#cite_note-43"><span data-dcnode-id="1700" instrument_node="">[43]</span></a></sup><span data-dcnode-id="1697" instrument_node="">
</span></p><span data-dcnode-id="1695" instrument_node="">
</span><h3 data-dcnode-id="1685"><span class="mw-headline" data-dcnode-id="1693" id="Islam"><span data-dcnode-id="1694" instrument_node="">Islam</span></span><span class="mw-editsection" data-dcnode-id="1686"><span class="mw-editsection-bracket" data-dcnode-id="1691"><span data-dcnode-id="1692" instrument_node="">[</span></span><a data-dcnode-id="1689" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DThou_shalt_not_commit_adultery%26action%3Dedit%26section%3D8" title="Edit section: Islam"><span data-dcnode-id="1690" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1687"><span data-dcnode-id="1688" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1684" instrument_node="">
</span><p data-dcnode-id="1676"><span data-dcnode-id="1683" instrument_node="">Adultery is mentioned in </span><a data-dcnode-id="1681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Al-Isra" title="Al-Isra"><span data-dcnode-id="1682" instrument_node="">Surat Al-Isra'</span></a><span data-dcnode-id="1680" instrument_node=""> of the </span><a data-dcnode-id="1678" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Quran" title="Quran"><span data-dcnode-id="1679" instrument_node="">Quran</span></a><span data-dcnode-id="1677" instrument_node="">:
</span></p><span data-dcnode-id="1675" instrument_node="">
</span><link data-dcnode-id="1674" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="1660"><p data-dcnode-id="1665"><span data-dcnode-id="1673" instrument_node="">And never approach adultery; it has been wrongful and bad pursuit. (</span><span data-dcnode-id="1667" title="Arabic-language text"><span data-dcnode-id="1668" lang="ar"><span data-dcnode-id="1672" instrument_node="">وَلَا تَقْرَبُوا ٱلزِّنَى</span><span class="nowrap" data-dcnode-id="1670"><span data-dcnode-id="1671" instrument_node="">&nbsp;</span></span><span data-dcnode-id="1669" instrument_node="">ۖ إِنَّهُ كَانَ فَاحِشَةً وَسَاءَ سَبِيلًا</span></span></span><span data-dcnode-id="1666" instrument_node="">)</span></p><div class="templatequotecite" data-dcnode-id="1661"><span data-dcnode-id="1664" instrument_node="">— </span><cite data-dcnode-id="1662"><span data-dcnode-id="1663" instrument_node="">Quran 17:32</span></cite></div></blockquote><span data-dcnode-id="1659" instrument_node="">
</span><p data-dcnode-id="1655"><a data-dcnode-id="1657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Muhammad" title="Muhammad"><span data-dcnode-id="1658" instrument_node="">Muhammad</span></a><span data-dcnode-id="1656" instrument_node=""> said that a person is a nonbeliever while he or she is committing adultery.
