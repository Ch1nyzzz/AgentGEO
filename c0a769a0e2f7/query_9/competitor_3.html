id="2785" instrument_node=""> </span><blockquote data-dcnode-id="2783"><span data-dcnode-id="2784" instrument_node=""> Currently, the use of the vaccines is not increasing the number of abortions that are being carried out every year. So the question is merely whether accepting the vaccine would be cooperating with the killing of the child in the 1960s. For a number of reasons, we would argue that is it not. The primary reason being that this situation is morally analogical to the case of the murder victim. For this reason we believe the use of the vaccines is justifiable based on the fact that we cannot change the way the cell cultures were obtained, there are no available alternatives, and the effectiveness of the vaccines as a means of preserving life and preventing suffering is clear.</span></blockquote><span data-dcnode-id="2782" instrument_node=""> </span><blockquote data-dcnode-id="2780"><span data-dcnode-id="2781" instrument_node=""> We certainly respect the opinion of Christians who would disagree with our reasoning on this issue. However, we would add that a parent who refused to have their child vaccinated in order to avoid the connection—however remote—to the cooperation with abortion, is morally responsible for the outcome of that choice. If their child were to get sick and/or die because of the rejection of the vaccine, they would be morally responsible.</span></blockquote><span data-dcnode-id="2779" instrument_node=""> </span><blockquote data-dcnode-id="2777"><span data-dcnode-id="2778" instrument_node=""> Unfortunately, we live in a fallen world where it is almost impossible to do good without some indirect connection to an act of evil. As Christians we should strive to avoid cooperating with evil and prevent it from occurring in the future (e.g., we should oppose the making of new vaccines using the ethically tainted tissue), but we should not risk the lives of our children in order to avoid a remote connection that is tangentially related to an evil act.</span></blockquote><span data-dcnode-id="2776" instrument_node=""> </span><blockquote data-dcnode-id="2771"><span data-dcnode-id="2775" instrument_node=""> There are helpful and strategic ways we can advocate for pro-life issues. Neglecting the use of something so inherently pro-life based on its history is not one of them.</span><sup data-dcnode-id="2772"><a class="forwardref" data-dcnode-id="2773" data-html=" Carter, J. and Smith, J., Explainer: Vaccines and aborted human fetal tissue, erlc.com, 5 Feb 2015." data-offset="-10" data-variation="small wide"><span data-dcnode-id="2774" instrument_node="">83</span></a></sup></blockquote><span data-dcnode-id="2770" instrument_node=""> </span><p data-dcnode-id="2768"><span data-dcnode-id="2769" instrument_node="">In any case, there remains a moral duty to continue to fight and to employ every lawful means in order to make life difficult for the pharmaceutical industries which act unscrupulously and unethically. However, the burden of this important battle cannot and must not fall on innocent children and on the health situation of the population—especially with regard to pregnant women. </span></p><span data-dcnode-id="2767" instrument_node="">
</span><p data-dcnode-id="2762"><span data-dcnode-id="2766" instrument_node=""> An example of an alternative that </span><i data-dcnode-id="2764"><span data-dcnode-id="2765" instrument_node="">does</span></i><span data-dcnode-id="2763" instrument_node=""> exist is the newer and more effective shingles vaccine Shingrix, made by recombinant technology, which is superseding Zostavax, which has residual components of the cell line MRC-5 cells. </span></p><span data-dcnode-id="2761" instrument_node="">
</span><p data-dcnode-id="2759"><span data-dcnode-id="2760" instrument_node=""> And governments require a multitude of tests before any vaccination is released to the public. Of course, conspiracy theorists might argue that the government is somehow complicit, but what for? So, that it can cost the very same government millions of dollars in dealing with increased pandemics like swine flu, for example—a disease that the very same government officials would be likely to catch if they did not take the same flu shots they were advocating. </span></p><span data-dcnode-id="2758" instrument_node="">
</span><a data-dcnode-id="2757" name="walvax"></a><span data-dcnode-id="2756" instrument_node="">
</span><p data-dcnode-id="2754"><span data-dcnode-id="2755" instrument_node=""> There is a relatively new Walvax-2 cell line that dates to 2015, from Wuhan, China. This abortion was obtained very unethically, even by the standards of abortion, by means of the ‘water bag’ method, illegal in the USA, that removes the entire amniotic sac. There would be real problems with supporting vaccines connected to this one, because it is not remote in time like the others. Fortunately, at present there are no vaccines that have been developed from the Walvax-2 cell line. Now is the time to insist that any new vaccines are not made with this line, but with the many ethical alternatives readily available. Walvax-2 might be treated with skepticism in the West anyway, because it comes from the city where SARS-CoV-2 originated. </span></p><span data-dcnode-id="2753" instrument_node="">
</span><br data-dcnode-id="2752"><span data-dcnode-id="2751" instrument_node=""> </span><center data-dcnode-id="2745"><span data-dcnode-id="2750" instrument_node=""> </span><b data-dcnode-id="2747"><a data-dcnode-id="2748" href="#contents"><span data-dcnode-id="2749" instrument_node="">Back to contents</span></a></b><span data-dcnode-id="2746" instrument_node=""> </span></center><span data-dcnode-id="2744" instrument_node=""> </span><a data-dcnode-id="2743" name="covid"></a><span data-dcnode-id="2742" instrument_node=""> </span><h4 data-dcnode-id="2740"><span data-dcnode-id="2741" instrument_node="">COVID-19 update</span></h4><p data-dcnode-id="2732"><span data-dcnode-id="2739" instrument_node=""> As for developments in C19 vaccines, some are being trialled on fetal cell lines. One is the HEK-293 from an unborn baby in the Netherlands from 1972/3 (HEK = human embryonic kidney). Until 1984, abortion was illegal in the Netherlands except genuinely to save the mother’s life. So this cell line might have been from either a life-threatening condition such as a tubal pregnancy or a miscarriage, not from a sinful abortion (see </span><a data-dcnode-id="2737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creation.com/what-about-abortion-to-save-the-mothers-life"><span data-dcnode-id="2738" instrument_node=""> What about abortion to save the mother’s life?</span></a><span data-dcnode-id="2736" instrument_node="">). But either way, the baby was well enough developed to extract specific kidney cells. There is also the PER.C6 from a baby (wrongly) aborted in 1985. There are also those which are not connected to any cell lines: John Paul II Medical Research Institute, Bharat Biotech/Indian Council of Medical Research,, Sinofarm, Laboratorio Avi-Mex, and Israel Institute for Biological Research (IIBR). Novovax, COVAXX / United Biomedical, Medicago, Rega Institute, Clover Biopharmaceuticals, Sanofi/GlaxoSmithKline (GSK), and Institut Pasteur and Themis and Merck, used fetal cells lines in some tests but not others.</span><sup data-dcnode-id="2733"><a class="forwardref" data-dcnode-id="2734" data-html=" Abbamonte, J., Which COVID-19 vaccines are being developed with fetal cell linesderived from aborted babies? Moral guidance on using COVID-19 vaccines developed with human fetal cell lines, <i>Population Research Institute,</i> pop.org, 4 Jun 2020. The PRI is a pro-life group devoted to exposing the myth of overpopulation. See also Prentice, D., Update: COVID-19 Vaccine Candidates and Abortion-Derived Cell Lines, Charlotte Lozier Institute, lozierinstitute.org/, Updated 2 Jun 2021." data-offset="-10" data-variation="small wide"><span data-dcnode-id="2735" instrument_node="">84</span></a></sup></p><span data-dcnode-id="2731" instrument_node="">
</span><p data-dcnode-id="2720"><span data-dcnode-id="2730" instrument_node=""> There is also the </span><a data-dcnode-id="2728" href="#recombinant"><span data-dcnode-id="2729" instrument_node="">recombinant</span></a><span data-dcnode-id="2727" instrument_node=""> protein vaccine project (UQ-CSL V451) of the University of Queensland in partnership with Australian biotech company CSL. This manufactures the spike proteins of the SARS-CoV-2 so the immune system can be trained on it. In the virus, the spikes are coiled, but when they meet the target cell, they uncoil and infect it. The tendency to uncoil would affect the recombinant vaccine as well, but the UQ has developed a molecular clamp to keep the spike proteins coiled. This way, the immune system can be trained to attack the virus before the spike can uncoil and infect. The proposed vaccine will also contain the long-used </span><a data-dcnode-id="2725" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creation.com/squalene"><span data-dcnode-id="2726" instrument_node="">MF59 adjuvant</span></a><span data-dcnode-id="2724" instrument_node="">.</span><sup data-dcnode-id="2721"><a class="forwardref" data-dcnode-id="2722" data-html=" CSL to manufacture and supply University of Queensland and Oxford University vaccine candidates for Australia, csl.com, 6 Sep 2020." data-offset="-10" data-variation="small wide"><span data-dcnode-id="2723" instrument_node="">85</span></a></sup></p><span data-dcnode-id="2719" instrument_node="">
</span><a data-dcnode-id="2718" name="hek-test"></a><span data-dcnode-id="2717" instrument_node="">
</span><h5 data-dcnode-id="2715"><span data-dcnode-id="2716" instrument_node="">RNA vaccines and HEK-293 testing</span></h5><span data-dcnode-id="2714" instrument_node=""> </span><p data-dcnode-id="2709"><span data-dcnode-id="2713" instrument_node=""> RNA vaccines </span><a data-dcnode-id="2711" href="#RNA"><span data-dcnode-id="2712" instrument_node="">discussed above</span></a><span data-dcnode-id="2710" instrument_node=""> have yet another advantage in not using fetal cell lines for culturing the vaccines. Such vaccines are less ethically tainted. The two main C19 vaccines in the USA are Pfizer and Moderna, which are RNA vaccines. </span></p><span data-dcnode-id="2708" instrument_node="">
</span><p data-dcnode-id="2700"><span data-dcnode-id="2707" instrument_node=""> However, they did use the HEK-293 for </span><em data-dcnode-id="2705"><span data-dcnode-id="2706" instrument_node="">testing</span></em><span data-dcnode-id="2704" instrument_node=""> early on as proof of concept. But if we were to oppose the vaccines because they were tested on cell lines descended from an unborn baby, then we would have to abandon just about every medicine on the market. For example.</span><sup data-dcnode-id="2701"><a class="forwardref" data-dcnode-id="2702" data-html=" Catholic priest Matthew Schneider LC has analyzed these isssues in articles in <i>Through Catholic Lenses,</i> patheos.com: Schneider, M.P., If any drug tested on HEK-293 is immoral, then goodbye modern medicine, 28 Jan 2021; 12 things less-remote cooperation in evil than Covid vaccines, 18 Dec 2020." data-offset="-10" data-variation="small wide"><span data-dcnode-id="2703" instrument_node="">86</span></a></sup></p><span data-dcnode-id="2699" instrument_node="">
</span><ul data-dcnode-id="2665"><span data-dcnode-id="2698" instrument_node="">
</span><li data-dcnode-id="2696"><span data-dcnode-id="2697" instrument_node=""> Over-the-counter pain relief: Panadol/Tylenol (paracetamol/acetaminophen), Aspirin (acetylsalicylic acid), Advil/Motrin (ibuprofen), Aleve (naproxen), Lidocaine</span></li><span data-dcnode-id="2695" instrument_node="">
</span><li data-dcnode-id="2693"><span data-dcnode-id="2694" instrument_node=""> Over-the-counter cold/flu relief: Mucinex (guaifenesin mucus thinner), dextromethorphan (cough suppressant), and the decongestants pseudoephedrine and phenylephrine</span></li><span data-dcnode-id="2692" instrument_node="">
</span><li data-dcnode-id="2690"><span data-dcnode-id="2691" instrument_node=""> Over-the-counter allergy relief: Benadryl (dephenhydramine), Claritin (loratidine)</span></li><span data-dcnode-id="2689" instrument_node="">
</span><li data-dcnode-id="2687"><span data-dcnode-id="2688" instrument_node=""> Over-the-counter stomach/intestinal relief: Tums, Pepto-Bismol (bismuth subsalicylate)</span></li><span data-dcnode-id="2686" instrument_node="">
</span><li data-dcnode-id="2684"><span data-dcnode-id="2685" instrument_node=""> Prescription cholesterol meds: Lipitor (atorvostatin), Simvastatin, Pravastatin</span></li><span data-dcnode-id="2683" instrument_node="">
</span><li data-dcnode-id="2681"><span data-dcnode-id="2682" instrument_node=""> Prescription asthma relief/bronchodilator: Albuterol/Ventolin (salbutamol)</span></li><span data-dcnode-id="2680" instrument_node="">
</span><li data-dcnode-id="2678"><span data-dcnode-id="2679" instrument_node="">Prescription diabetic medication: Glucophage (metformin)</span></li><span data-dcnode-id="2677" instrument_node="">
</span><li data-dcnode-id="2675"><span data-dcnode-id="2676" instrument_node=""> Prescription blood pressure lowering: Lisinopril, Losartan, Metoprolol, Valsartan</span></li><span data-dcnode-id="2674" instrument_node="">
</span><li data-dcnode-id="2672"><span data-dcnode-id="2673" instrument_node="">Prescription acid reflux relief: Omeprazole</span></li><span data-dcnode-id="2671" instrument_node="">
</span><li data-dcnode-id="2667"><span data-dcnode-id="2670" instrument_node=""> </span><em data-dcnode-id="2668"><span data-dcnode-id="2669" instrument_node=""> AND ironically, several of the drugs touted as miracle cures for C19 although the evidence is equivocal: Remdesivir, hydroxychloroquine, ivermectin, azithromycin </span></em></li><span data-dcnode-id="2666" instrument_node="">
</span></ul><span data-dcnode-id="2664" instrument_node="">
</span><p data-dcnode-id="2662"><span data-dcnode-id="2663" instrument_node=""> While we would prefer an ethically untainted vaccine (and for that matter, ethically untainted drugs), what happens if the only vaccine available is one the comes from either of these two fetal cell lines? I would concur with Australian Catholic priest and ethicist Rev. Kevin McGovern: </span></p><span data-dcnode-id="2661" instrument_node="">
</span><blockquote data-dcnode-id="2656"><span data-dcnode-id="2660" instrument_node=""> ChAdOx1 may be an ethically compromised vaccine. It is grown in a cell line called HEK293, which is widely believed to have been developed from cells from a human foetus which was electively aborted in 1973. However, even this is not certain. Professor Frank Graham who developed this cell line has said that, to the best of his knowledge, the origin of these cells is unclear, for they could have come either from an elective abortion or a spontaneous miscarriage [as above, because abortion was illegal in the Netherlands at the time, it was likely from a tubal pregnancy].</span><sup data-dcnode-id="2657"><a class="forwardref" data-dcnode-id="2658" data-html=" Austriaco, N.P.G., Moral guidance on using COVID-19 vaccines developed with human fetal cell lines, thepublicdiscourse.com, 26 May 2020." data-offset="-10" data-variation="small wide"><span data-dcnode-id="2659" instrument_node="">87</span></a></sup></blockquote><span data-dcnode-id="2655" instrument_node=""> </span><blockquote data-dcnode-id="2653"><span data-dcnode-id="2654" instrument_node=""> It should be stressed that the cells which are being used now to grow this vaccine are cells which are descended from the cells originally sourced from the foetus. Thus, while their lineage can be traced back to the foetus, the cells in use today are not the cells from the foetus. Further, the vaccine itself does not contain cells or DNA pieces which are recognisably human. The cells are killed when the virus grows in them, and the process of vaccine purification removes cell debris as well as any growth reagents.</span></blockquote><span data-dcnode-id="2652" instrument_node=""> </span><blockquote data-dcnode-id="2650"><span data-dcnode-id="2651" instrument_node=""> If ChAdOx1 is ethically compromised, what should be done by religious leaders and other people like myself who are concerned about this?</span></blockquote><span data-dcnode-id="2649" instrument_node=""> </span><blockquote data-dcnode-id="2643"><span data-dcnode-id="2648" instrument_node=""> First of all, we should make known our moral objection to ethically compromised vaccines, and lobby governments, researchers, and healthcare systems to prepare and make available vaccines which are not ethically compromised. At the time of writing, the World Health Organisation has identified 169 candidate vaccines, 30 of which are already undergoing clinical trials.</span><sup data-dcnode-id="2645"><a class="forwardref" data-dcnode-id="2646" data-html=" WHO, Draft landscape of COVID-19 candidate vaccines, who.int, accessed 3 Sep 2020." data-offset="-10" data-variation="small wide"><span data-dcnode-id="2647" instrument_node="">88</span></a></sup><span data-dcnode-id="2644" instrument_node=""> Could the Australian government sign a letter of intent with another research team, so an ethically uncompromised vaccine could also be produced in Australia?</span></blockquote><span data-dcnode-id="2642" instrument_node=""> </span><blockquote data-dcnode-id="2640"><span data-dcnode-id="2641" instrument_node=""> Second, religious leaders and people like myself also have an educative role to play—that is, a role in forming consciences about this issue. Part of this role is educating about the existence of, and problems with, ethically compromised vaccines.</span></blockquote><span data-dcnode-id="2639" instrument_node=""> </span><blockquote data-dcnode-id="2637"><span data-dcnode-id="2638" instrument_node=""> Another part of this role is helping people to decide what to do if only an ethically compromised COVID-19 vaccine is available. Using this vaccine would involve what Catholic ethics calls very remote mediate material cooperation with the original elective abortion. Our educative role helps people to see that this very remote cooperation does not involve condoning abortion, and also does not potentially encourage further abortions. Our educative role also involves helping people to recognise the possibly very serious consequences of not being vaccinated against COVID-19. For if we are not vaccinated, we could catch the virus, infect others, and possibly cause their deaths. All up, our educative role helps people to see that if only an ethically compromised COVID-19 vaccine exists, the only truly pro-life decision is to receive the vaccine so as to save lives.</span></blockquote><span data-dcnode-id="2636" instrument_node=""> </span><blockquote data-dcnode-id="2624"><span data-dcnode-id="2635" instrument_node=""> Finally, there is one thing which religious leaders and people like myself must </span><i data-dcnode-id="2633"><span data-dcnode-id="2634" instrument_node="">not</span></i><span data-dcnode-id="2632" instrument_node=""> do. If only an ethically compromised COVID-19 vaccine exists, we must not in any way encourage or support people to refuse to be vaccinated. On this matter, I note that on social media, Archbishop Anthony Fisher, the Catholic Archbishop of Sydney, recently stated,</span><sup data-dcnode-id="2629"><a class="forwardref" data-dcnode-id="2630" data-html=" WHO, Fisher, A.; cited in: McCulloch, D., Religious leaders sound vaccine warning, youngwitness.com.au, 25 Aug 2020." data-offset="-10" data-variation="small wide"><span data-dcnode-id="2631" instrument_node="">89</span></a></sup><span data-dcnode-id="2628" instrument_node=""> “I have not, nor would I, call for Catholics to boycott the vaccine if it became available.”</span><sup data-dcnode-id="2625"><a class="forwardref" data-dcnode-id="2626" data-html=" McGovern, K., Catholic ethics and the problem of an ethically compromised COVID-19 vaccine, abc.net.au, 25 Aug 2020." data-offset="-10" data-variation="small wide"><span data-dcnode-id="2627" instrument_node="">90</span></a></sup></blockquote><span data-dcnode-id="2623" instrument_node=""> </span><p data-dcnode-id="2615"><span data-dcnode-id="2622" instrument_node="">While vaccines stimulate the body’s own immune system (active immunity), another possibility is using antibodies already made by immune systems of those who have recovered from the virus (passive immunity). The two products under development are called </span><i data-dcnode-id="2620"><span data-dcnode-id="2621" instrument_node="">convalescent plasma</span></i><span data-dcnode-id="2619" instrument_node=""> and </span><i data-dcnode-id="2617"><span data-dcnode-id="2618" instrument_node="">hyperimmune globulin.</span></i><span data-dcnode-id="2616" instrument_node=""> Such passive immunity treatments have been used for the other nasty virus that came from a benign bat virus, Ebola. One advantage of passive immunity is its immediate effect, while active immunity takes a week or two to develop. But passive immunity is really a stop-gap measure to save lives in the absence of a vaccine. We really don’t want an ongoing supply of people recovering from the disease; we would like people to avoid getting the disease in the first place! </span></p><span data-dcnode-id="2614" instrument_node="">
</span><p data-dcnode-id="2612"><span data-dcnode-id="2613" instrument_node=""> A more recent Catholic Note on the morality of using some anti-Covid-19 vaccines from the Offices of the Congregation for the Doctrine of the Faith makes much the same points. For those still objecting on moral grounds, it points out that they have responsibilities not to endanger other people: </span></p><span data-dcnode-id="2611" instrument_node="">
</span><blockquote data-dcnode-id="2603"><span data-dcnode-id="2610" instrument_node=""> At the same time, practical reason makes evident that vaccination is not, as a rule, a moral obligation and that, therefore, it must be voluntary. In any case, from the ethical point of view, </span><i data-dcnode-id="2608"><span data-dcnode-id="2609" instrument_node=""> the morality of vaccination depends not only on the duty to protect one’s own health, but also on the duty to pursue the common good. </span></i><span data-dcnode-id="2607" instrument_node=""> In the absence of other means to stop or even prevent the epidemic, the common good may recommend vaccination, especially to protect the weakest and most exposed. Those who, however, for reasons of conscience, refuse vaccines produced with cell lines from aborted fetuses, must do their utmost to avoid, by other prophylactic means and appropriate behavior, becoming vehicles for the transmission of the infectious agent. In particular, they must avoid any risk to the health of those who cannot be vaccinated for medical or other reasons, and who are the most vulnerable.</span><sup data-dcnode-id="2604"><a class="forwardref" data-dcnode-id="2605" data-html=" Luis F. Card. Ladaria, S.I. (Prefect) and S.E. Mons. Giacomo Morandi (Titular Archbishop of Cerveteri, Secretary, <i>Note on the morality of using some anti–Covid-19 vaccines,</i> Offices of the Congregation for the Doctrine of the Faith, Rome, 20 Dec 2020; vatican.va; emphasis in original. This is official Catholic policy, because Pope Francis examined this note on 17 Dec 2020 and ordered its publication." data-offset="-10" data-variation="small wide"><span data-dcnode-id="2606" instrument_node="">91</span></a></sup></blockquote><span data-dcnode-id="2602" instrument_node=""> </span><p data-dcnode-id="2597"><span data-dcnode-id="2601" instrument_node="">I think the way forward is to use somatic (‘adult’) stem cells for testing, and for culturing where needed. Adult stem cells are ethically derived (no destruction of any embryo), and have produced dozens of cures. By contrast, the unethically derived embryonic stem cells, derived from destruction of human embryos, have produced no cures. (For more information on stem cells and the documented cures from adult stem cells, see </span><a data-dcnode-id="2599" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creation.com/stem-cells-and-genesis"><span data-dcnode-id="2600" instrument_node="">Stem cells and Genesis</span></a><span data-dcnode-id="2598" instrument_node="">.) The stem-cell requirements for vaccine testing should be less stringent than for growing new tissues or organs. Some organizations are already working on using adult stem cells in C19 vaccine research, such as the John Paul II Medical Research Institute.</span></p><span data-dcnode-id="2596" instrument_node="">
</span><p data-dcnode-id="2588"><span data-dcnode-id="2595" instrument_node="">Overall, there is far closer cooperation with abortion in doing business with companies that donate to the abortion and </span><a data-dcnode-id="2593" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creation.com/planned-parenthood-selling-baby-parts"><span data-dcnode-id="2594" instrument_node="">baby-part trafficking</span></a><span data-dcnode-id="2592" instrument_node=""> business </span><a data-dcnode-id="2590" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creation.com/margaret-sanger-christianity-today"><span data-dcnode-id="2591" instrument_node="">Planned Parenthood</span></a><span data-dcnode-id="2589" instrument_node=""> than from getting any vaccines. We are not telling anyone what companies they should buy from, but some consistency would be good.</span></p><span data-dcnode-id="2587" instrument_node="">
</span><center data-dcnode-id="2581"><span data-dcnode-id="2586" instrument_node=""> </span><b data-dcnode-id="2583"><a data-dcnode-id="2584" href="#contents"><span data-dcnode-id="2585" instrument_node="">Back to contents</span></a></b><span data-dcnode-id="2582" instrument_node=""> </span></center><span data-dcnode-id="2580" instrument_node=""> </span><a data-dcnode-id="2579" name="gates"></a><span data-dcnode-id="2578" instrument_node="">
</span><h3 data-dcnode-id="2576"><span data-dcnode-id="2577" instrument_node=""> “Bill Gates supports vaccination to reduce population growth” </span></h3><span data-dcnode-id="2575" instrument_node="">
</span><p data-dcnode-id="2567"><span data-dcnode-id="2574" instrument_node=""> This is a very misleading half truth. One can disagree with Gates that the world is overpopulated—and </span><a data-dcnode-id="2572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creation.com/melbourne-atheist-the-exterminator"><span data-dcnode-id="2573" instrument_node="">I do</span></a><span data-dcnode-id="2571" instrument_node="">. But it doesn’t mean that bearing false witness is acceptable. Here is the reality. Gates wants to reduce population growth (true). Gates supports vaccination as a means to this end (true). BUT Gates has repeatedly and clearly stated that vaccines </span><i data-dcnode-id="2569"><span data-dcnode-id="2570" instrument_node="">save</span></i><span data-dcnode-id="2568" instrument_node=""> children’s lives. How can all these statements be true? Actually, they can be reconciled, and Gates has explained this repeatedly. One doesn’t need to agree with his reasoning, but one should not misrepresent it. He has repeatedly given the following argument (given in schematic form): </span></p><span data-dcnode-id="2566" instrument_node="">
</span><ol data-dcnode-id="2531"><span data-dcnode-id="2565" instrument_node="">
</span><li data-dcnode-id="2563"><span data-dcnode-id="2564" instrument_node="">Overpopulation is a problem (false)</span></li><span data-dcnode-id="2562" instrument_node="">
</span><li data-dcnode-id="2560"><span data-dcnode-id="2561" instrument_node=""> Poor people in poor countries have children partly to support them in old age (arguable)</span></li><span data-dcnode-id="2559" instrument_node="">
</span><li data-dcnode-id="2557"><span data-dcnode-id="2558" instrument_node="">Child mortality is high (true for most of human history)</span></li><span data-dcnode-id="2556" instrument_node="">
</span><li data-dcnode-id="2554"><span data-dcnode-id="2555" instrument_node=""> So parents have lots of children to make sure that at least some survive to adulthood (possible)</span></li><span data-dcnode-id="2553" instrument_node="">
</span><li data-dcnode-id="2545"><span data-dcnode-id="2552" instrument_node=""> Vaccination </span><i data-dcnode-id="2550"><span data-dcnode-id="2551" instrument_node="">lowers</span></i><span data-dcnode-id="2549" instrument_node=""> child mortality (true, and </span><i data-dcnode-id="2547"><span data-dcnode-id="2548" instrument_node="">Bill Gates says this over and over</span></i><span data-dcnode-id="2546" instrument_node="">)</span></li><span data-dcnode-id="2544" instrument_node="">
</span><li data-dcnode-id="2542"><span data-dcnode-id="2543" instrument_node=""> Therefore parents will not need to have so many children, since vaccinated kids will survive (this is his argument, again stated many times).</span></li><span data-dcnode-id="2541" instrument_node="">
</span><li data-dcnode-id="2533"><span data-dcnode-id="2540" instrument_node=""> Therefore Gates supports vaccination as a way </span><i data-dcnode-id="2538"><span data-dcnode-id="2539" instrument_node="">both</span></i><span data-dcnode-id="2537" instrument_node=""> to reduce child mortality </span><i data-dcnode-id="2535"><span data-dcnode-id="2536" instrument_node="">and</span></i><span data-dcnode-id="2534" instrument_node=""> to reduce population growth, and the above explains how they are not contradictory.</span></li><span data-dcnode-id="2532" instrument_node="">
</span></ol><span data-dcnode-id="2530" instrument_node="">
</span><br data-dcnode-id="2529"><span data-dcnode-id="2528" instrument_node=""> </span><center data-dcnode-id="2522"><span data-dcnode-id="2527" instrument_node=""> </span><b data-dcnode-id="2524"><a data-dcnode-id="2525" href="#contents"><span data-dcnode-id="2526" instrument_node="">Back to contents</span></a></b><span data-dcnode-id="2523" instrument_node=""> </span></center><span data-dcnode-id="2521" instrument_node=""> </span><a data-dcnode-id="2520" name="HPV"></a><span data-dcnode-id="2519" instrument_node="">
</span><h3 data-dcnode-id="2517"><span data-dcnode-id="2518" instrument_node="">“The HPV vaccine encourages sexual immorality”</span></h3><span data-dcnode-id="2516" instrument_node="">
</span><p data-dcnode-id="2503"><span data-dcnode-id="2515" instrument_node=""> Cervical cancer is the fourth most common cause of cancer deaths among women. Infection with the human papillomavirus (HPV) causes nearly all cases. “The causal role of human papillomavirus infections in cervical cancer has been documented beyond reasonable doubt.”</span><sup data-dcnode-id="2512"><a class="forwardref" data-dcnode-id="2513" data-html=" Bosch, F.X. and 4 others, The causal relation between human papillomavirus and cervical cancer, <i>J. clinical Pathology</i> <b>55</b> (4):244–265, Apr 2002 | doi:10.1136/jcp.55.4.244." data-offset="-10" data-variation="small wide"><span data-dcnode-id="2514" instrument_node="">92</span></a></sup><span data-dcnode-id="2511" instrument_node=""> And a study led by Dr Jiayao Lei, Ph.D. of the Karolinska Institute in Stockholm of almost 1.7 million women,</span><sup data-dcnode-id="2508"><a class="forwardref" data-dcnode-id="2509" data-html="Lei, J. and 8 others, HPV vaccination and the risk of invasive cervical cancer, <i>New England J. Medicine</i> <b>383</b>(14):1340–1348, 1 Oct 2020 | doi:10.1056/NEJMoa1917338." data-offset="-10" data-variation="small wide"><span data-dcnode-id="2510" instrument_node="">93</span></a></sup><span data-dcnode-id="2507" instrument_node=""> showed that those vaccinated before age 17 had a 90% reduction in cervical cancer in the 11-year study period (2006–2017) compared to women who had not received the vaccine.</span><sup data-dcnode-id="2504"><a class="forwardref" data-dcnode-id="2505" data-html=" National Cancer Institute, Large study confirms that HPV vaccine prevents cervical cancer, cancer.gov, 14 Oct 2020." data-offset="-10" data-variation="small wide"><span data-dcnode-id="2506" instrument_node="">94</span></a></sup></p><span data-dcnode-id="2502" instrument_node="">
</span><p data-dcnode-id="2496"><span data-dcnode-id="2501" instrument_node=""> It is also likely that HPV has a role for prostate cancer, although the researchers say this is merely “highly likely” rather than “conclusive” as with cervical cancer.</span><sup data-dcnode-id="2498"><a class="forwardref" data-dcnode-id="2499" data-html=" Lawson, J.S., Glenn, W.K. Evidence for a causal role by human papillomaviruses in prostate cancer—a systematic review, <i>Infectious Agents and Cancer</i> : <strong>15</strong>: Article 41, 14 Jul 2020." data-offset="-10" data-variation="small wide"><span data-dcnode-id="2500" instrument_node="">95</span></a></sup><span data-dcnode-id="2497" instrument_node=""> Thus an HPV vaccine that targets the strains of HPV involved in genital warts should drastically lower cancer deaths: </span></p><span data-dcnode-id="2495" instrument_node="">
</span><blockquote data-dcnode-id="2490"><span data-dcnode-id="2494" instrument_node=""> Like all vaccines, these HPV vaccines are not foolproof. They do not protect against all of the 100-plus types of HPV. But both vaccines are nearly 100% effective in preventing disease caused by high-risk strains of HPV—HPV 16 and 18—which together account for 70% of all cervical cancers, as well as many cancers of the vagina and vulva.</span><sup data-dcnode-id="2491"><a class="forwardref" data-dcnode-id="2492" data-html=" HPV Vaccines, WebMD.com, accessed 31 July 2020." data-offset="-10" data-variation="small wide"><span data-dcnode-id="2493" instrument_node="">96</span></a></sup></blockquote><span data-dcnode-id="2489" instrument_node=""> </span><p data-dcnode-id="2487"><span data-dcnode-id="2488" instrument_node="">The HPV vaccine is one of a number of vaccines that provides much stronger immunity than catching the disease. E.g. warts are also caused by human papillomaviruses, and it’s well known that they can recur. But the HPV vaccine is very effective against the strains that cause genital warts: </span></p><span data-dcnode-id="2486" instrument_node="">
</span><blockquote data-dcnode-id="2481"><span data-dcnode-id="2485" instrument_node=""> And while natural infections with HPV generate a minimal immune response—some people don’t produce any detectable antibodies—the vaccine can protect people for up to nine years. This ingenious technology is made from the protein that normally coats the virus, which self-assembles into particles that resemble it—known as virus-like particles—as it’s being manufactured. The protein is more concentrated in the vaccine than the virus, which is thought to help increase the potency of the immune response.</span><sup data-dcnode-id="2482"><a class="forwardref" data-dcnode-id="2483" data-html=" Gorvett, Z., Why you really don’t want to catch Covid-19, bbc.com, 23 Nov 2020." data-offset="-10" data-variation="small wide"><span data-dcnode-id="2484" instrument_node="">97</span></a></sup></blockquote><span data-dcnode-id="2480" instrument_node=""> </span><p data-dcnode-id="2471"><span data-dcnode-id="2479" instrument_node="">The HPV can be spread through sexual contact. So one objection to the vaccine is that it encourages sexual immorality. However, it does no such thing. It might lower the risk of one of the physical consequences, but that is hardly the same as encouraging it. For comparison, seatbelts will protect drivers to some extent in a crash, but it doesn’t mean that seatbelts encourage reckless driving, therefore we should not install them. Also, HPV </span><em data-dcnode-id="2477"><span data-dcnode-id="2478" instrument_node="">can</span></em><span data-dcnode-id="2476" instrument_node=""> affect virgins.</span><sup data-dcnode-id="2473"><a class="forwardref" data-dcnode-id="2474" data-html=" Questioning whether to get your child the HPV vaccine? Read this, shotofprevention.com, 21 Jan 2016." data-offset="-10" data-variation="small wide"><span data-dcnode-id="2475" instrument_node="">98</span></a></sup><span data-dcnode-id="2472" instrument_node=""> Also, even though it’s a terrible thing to think about, what if your child were raped by someone HPV-positive? Even the moral hazard argument is unsound—we don’t want our kids to have sex before marriage, but if they make a mistake, do we want them punished with HPV or cervical cancer? And, since one does not need to have intercourse to get HPV, shouldn’t we do everything to protect them, regardless? </span></p><span data-dcnode-id="2470" instrument_node="">
</span><a data-dcnode-id="2469" name="government"></a><span data-dcnode-id="2468" instrument_node="">
</span><h3 data-dcnode-id="2466"><span data-dcnode-id="2467" instrument_node=""> “The government should not force people to be vaccinated” </span></h3><span data-dcnode-id="2465" instrument_node="">
</span><p data-dcnode-id="2463"><span data-dcnode-id="2464" instrument_node="">This argument confuses two separate questions:</span></p><span data-dcnode-id="2462" instrument_node="">
</span><ol data-dcnode-id="2454"><span data-dcnode-id="2461" instrument_node="">
</span><li data-dcnode-id="2459"><span data-dcnode-id="2460" instrument_node="">Is something good (or bad)?</span></li><span data-dcnode-id="2458" instrument_node="">
</span><li data-dcnode-id="2456"><span data-dcnode-id="2457" instrument_node="">Should the government mandate (or prohibit) it?</span></li><span data-dcnode-id="2455" instrument_node="">
</span></ol><span data-dcnode-id="2453" instrument_node="">
</span><p data-dcnode-id="2451"><span data-dcnode-id="2452" instrument_node=""> I.e. one can argue that something is good, without saying that the government should make it compulsory, whether vaccines, seatbelts, bicycle helmets, etc. And one can argue that tobacco, alcohol, recreational drugs are harmful, without arguing that the government should punish people for taking them. </span></p><span data-dcnode-id="2450" instrument_node="">
</span><p data-dcnode-id="2448"><span data-dcnode-id="2449" instrument_node=""> For this article, I am not making an argument for the role of the government. Rather, I am noting that there is a logical distinction between “vaccines are good” and “vaccines should be compulsory”—the first does not entail the second. </span></p><span data-dcnode-id="2447" instrument_node="">
</span><a data-dcnode-id="2446" name="love"></a><span data-dcnode-id="2445" instrument_node="">
</span><h4 data-dcnode-id="2443"><span data-dcnode-id="2444" instrument_node="">“Love thy neighbour”</span></h4><span data-dcnode-id="2442" instrument_node="">
</span><p data-dcnode-id="2426"><span data-dcnode-id="2441" instrument_node="">Another separate issue from government force is whether Christians should </span><i data-dcnode-id="2439"><span data-dcnode-id="2440" instrument_node="">voluntarily</span></i><span data-dcnode-id="2438" instrument_node=""> get vaccinated regardless. There is a strong case that it is the best protection for the individual, by preventing disease. Also, because vaccination reduces the spread of illness (see </span><a data-dcnode-id="2436" name="#transmission"><span data-dcnode-id="2437" instrument_node="">Reduced transmission</span></a><span data-dcnode-id="2435" instrument_node="">, above), it protects </span><i data-dcnode-id="2433"><span data-dcnode-id="2434" instrument_node="">other people</span></i><span data-dcnode-id="2432" instrument_node=""> from the disease. This protection includes people too young or old to be vaccinated, immunocompromised people whose immune systems are less trainable by vaccines, or breakthrough cases. Such people are best protected by a ‘wall’ of vaccinated people that prevents the germs from reaching them. This walll is called </span><i data-dcnode-id="2430"><span data-dcnode-id="2431" instrument_node="">herd immunity</span></i><span data-dcnode-id="2429" instrument_node=""> or </span><i data-dcnode-id="2427"><span data-dcnode-id="2428" instrument_node="">community immunity.</span></i></p><span data-dcnode-id="2425" instrument_node="">
</span><p data-dcnode-id="2417"><span data-dcnode-id="2424" instrument_node="">Therefore, another good reason for getting vaccinated is caring for other people. This caring is explicitly expressed in Jesus’ Second Great Commandment, “Love thy neighbour as thyself” (</span><a class="rtBibleRef" data-dcnode-id="2422" data-purpose="bible-reference" data-reference="Matt 22.39" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Matt%252022.39" rel="noopener" target="_blank"><span data-dcnode-id="2423" instrument_node="">Matthew 22:39, KJV</span></a><span data-dcnode-id="2421" instrument_node="">), and Paul’s teaching “in humility count others more significant than yourselves” (</span><a class="rtBibleRef" data-dcnode-id="2419" data-purpose="bible-reference" data-reference="Phil 2.3" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/esv/Phil%25202.3" rel="noopener" target="_blank"><span data-dcnode-id="2420" instrument_node="">Philippians 2:3, ESV</span></a><span data-dcnode-id="2418" instrument_node="">). [H/T Dr Tony Dowden, educator/social scientist.]</span></p><span data-dcnode-id="2416" instrument_node="">
</span><p data-dcnode-id="2402"><span data-dcnode-id="2415" instrument_node="">This is hardly “communist”—it is </span><i data-dcnode-id="2413"><span data-dcnode-id="2414" instrument_node="">biblical!</span></i><span data-dcnode-id="2412" instrument_node=""> The essence of of communism is </span><i data-dcnode-id="2410"><span data-dcnode-id="2411" instrument_node="">not</span></i><span data-dcnode-id="2409" instrument_node=""> generosity with one's </span><i data-dcnode-id="2407"><span data-dcnode-id="2408" instrument_node="">own</span></i><span data-dcnode-id="2406" instrument_node=""> wealth (or comfort, time, etc.), but generosity with </span><i data-dcnode-id="2404"><span data-dcnode-id="2405" instrument_node="">other people’s</span></i><span data-dcnode-id="2403" instrument_node=""> wealth, taken by government force. Hence one can both oppose government mandates and support voluntary vaccination as the right thing to do.</span></p><span data-dcnode-id="2401" instrument_node="">
</span><br data-dcnode-id="2400"><span data-dcnode-id="2399" instrument_node=""> </span><center data-dcnode-id="2393"><span data-dcnode-id="2398" instrument_node=""> </span><b data-dcnode-id="2395"><a data-dcnode-id="2396" href="#contents"><span data-dcnode-id="2397" instrument_node="">Back to contents</span></a></b><span data-dcnode-id="2394" instrument_node=""> </span></center><span data-dcnode-id="2392" instrument_node=""> </span><a data-dcnode-id="2391" name="hcq"></a><span data-dcnode-id="2390" instrument_node="">
</span><h2 data-dcnode-id="2388"><span data-dcnode-id="2389" instrument_node="">What about hydroxychloroquine or ivermectin instead of Covid vaccines?</span></h2><span data-dcnode-id="2387" instrument_node="">
</span><p data-dcnode-id="2385"><span data-dcnode-id="2386" instrument_node="">There has been many claims that these medicines are practically cures for C19. If I had caught the disease, I probably would have wanted to try them. These medicines have been around for decades so doctors know the safe doses and contra-indications. So I think this should be between patient and doctor, not politicians or bureaucrats.</span></p><span data-dcnode-id="2384" instrument_node="">
</span><p data-dcnode-id="2375"><span data-dcnode-id="2383" instrument_node="">However, the evidence is equivocal. Some of the studies have been severely criticized or even withdrawn for faulty methods or drawing unwarranted conclusions.</span><sup data-dcnode-id="2380"><a class="forwardref" data-dcnode-id="2381" data-html=" Christian Ph.D. geneticist Dr Kristen Panthagani, who is in her last year of training as a medical doctor, has a helpful blog on Covid questions, youcanknowthings.com/covid-vaccine-faqs/. This includes articles linked as, “Can we use ivermectin instead?” (24 Jul 2021) and “Can we use hydroxychloroquine instead?” (31 Jul 2021)." data-offset="-10" data-variation="small wide"><span data-dcnode-id="2382" instrument_node="">99</span></a></sup><span data-dcnode-id="2379" instrument_node=""> Furthermore, even if we accept the most favorable claims of these drugs </span><i data-dcnode-id="2377"><span data-dcnode-id="2378" instrument_node="">arguendo</span></i><span data-dcnode-id="2376" instrument_node="">, they still show that vaccination is many times safer than getting the disease and treating it.</span></p><span data-dcnode-id="2374" instrument_node="">
</span><p data-dcnode-id="2364"><span data-dcnode-id="2373" instrument_node="">One touted cure is hydroxychloroquine, which has been prescribed for six decades against malaria, and also has anti-inflammatory effects that help lupus and rheumatoid arthritis. But can it help against C19? One outspoken advocate of hydroxychloroquine, who is equally outspoken against C19 vaccines, is Dr Vladimir Zelenko.</span><sup data-dcnode-id="2370"><a class="forwardref" data-dcnode-id="2371" data-html="Derwand, R. Scholz, M., and Zelenko, V., COVID-19 outpatients: early risk-stratified treatment with zinc plus low-dose hydroxychloroquine and azithromycin: a retrospective case series study, <i>International J. Antimicrobial Agents</i> <b>56</b>(6):106214, Dec 2020 | doi:j.ijantimicag.2020.106214." data-offset="-10" data-variation="small wide"><span data-dcnode-id="2372" instrument_node="">100</span></a></sup><span data-dcnode-id="2369" instrument_node=""> His study claimed that his treatment protocol of HCQ, zinc, and the antibiotic azythromycin reduced mortality rate to 0.7%. In a debate with me,</span><sup data-dcnode-id="2366"><a class="forwardref" data-dcnode-id="2367" data-html="Anti-Vax vs. Pro-Vax, Dr Zev Zelenko and Dr Jonathan Sarfati discuss, <i>Just the Truth with constitutional law expert Jenna Ellis</i>, americasvoice.news/playlists/just-the-truth, recorded 29 Jul 2021, aired 2 Aug 2021." data-offset="-10" data-variation="small wide"><span data-dcnode-id="2368" instrument_node="">101</span></a></sup><span data-dcnode-id="2365" instrument_node=""> he claimed 0.5%, so we will take the best figure. In the same debate, he made the preposterous claim that 200,000 people had died from the vaccine. So let’s take the absolute best case for HCQ and absolute worst case for the vaccine: Dr Zelenko’s own figures. 200,000 deaths from about 165M vaccinated people mean 0.12% mortality. So even his own figures show that vaccination is four times safer than getting the disease and treating it with his protocol! And in most cases, if you are vaccinated, you won’t get sick in the first place. For comparison, you might be able to treat a headache with paracetamol (= acetaminophen), but it would surely better not to have the headache at all.</span></p><span data-dcnode-id="2363" instrument_node="">
</span><p data-dcnode-id="2361"><span data-dcnode-id="2362" instrument_node="">It’s the same story with ivermectin. Ivermectin is an extremely important medicine to fight nematodes (roundworms), such as those that cause river blindness. It is also helpful against other parasites such as lice and scabies. But does this mean that it helps against coronaviruses?</span></p><span data-dcnode-id="2360" instrument_node="">
</span><p data-dcnode-id="2350"><span data-dcnode-id="2359" instrument_node="">Unfortunately, many studies have been marred by poor quality and even fakery. But not all. One study claimed that it reduced average disease duration from about 13 days to 8.</span><sup data-dcnode-id="2356"><a class="forwardref" data-dcnode-id="2357" data-html="Aref, Z.F. and 6 others, Clinical, biochemical and molecular evaluations of ivermectin mucoadhesive nanosuspension nasal spray in reducing upper respiratory symptoms of mild COVID-19, <i>Dovepress</i> <b>2021</b>:4063–4072, 15 Jun 2021 | doi:10.2147/IJN.S313093." data-offset="-10" data-variation="small wide"><span data-dcnode-id="2358" instrument_node="">102</span></a></sup><span data-dcnode-id="2355" instrument_node=""> But why be sick even 8 days when you can get a shot, and in the vast majority of cases, be over any side effects in a day or two, and with no cough or loss of sense of smell or taste. One of the most favorable studies showed that it still had a mortality rate of 1.4–3.9%, depending on the trial.</span><sup data-dcnode-id="2352"><a class="forwardref" data-dcnode-id="2353" data-html="Lawrie, T.A., Ivermectin reduces the risk of death from COVID-19 -a rapid review and meta-analysis in support of the recommendation of the Front Line COVID-19 Critical Care Alliance, Technical Report, <i>ResearchGate,</i> Jan 2021." data-offset="-10" data-variation="small wide"><span data-dcnode-id="2354" instrument_node="">103</span></a></sup><span data-dcnode-id="2351" instrument_node=""> This is 12 times safer even than Zelenko’s made-up and preposterous figures for C19-vaccine deaths.</span></p><span data-dcnode-id="2349" instrument_node="">
</span><p data-dcnode-id="2344"><span data-dcnode-id="2348" instrument_node="">However, the largest clinical trial to date, of 1,348 high-risk Covid-positive adults in Brazil, led by Dr Edward Mills, Professor of Health Sciences at Canada’s McMaster University in Hamilton, Ontario, where half were given IVM and half a placebo, found no difference.</span><sup data-dcnode-id="2345"><a class="forwardref" data-dcnode-id="2346" data-html="Toy, S., Ivermectin didn’t reduce Covid-19 hospitalizations in largest trial to date: Patients who got the antiparasitic drug didn’t fare better than those who received a placebo, wsj.com, 18 Mar 2022." data-offset="-10" data-variation="small wide"><span data-dcnode-id="2347" instrument_node="">104</span></a></sup></p><span data-dcnode-id="2343" instrument_node="">
</span><p data-dcnode-id="2330"><span data-dcnode-id="2342" instrument_node="">Another problem with some of the better studies goes back to what Ivermectin is undoubtedly very good for: killing nematodes. Some of the studies showed a benefit for Covid-patients in regions with high incidence of Strongyloidiasis, an intestinal disease caused by the nematode </span><i data-dcnode-id="2340"><span data-dcnode-id="2341" instrument_node="">Strongyloides</span></i><span data-dcnode-id="2339" instrument_node="">. But these benefits were not seen in regions with low incidence. The explanation is as follows: patients with severe Covid who need extra oxygen are given steroids like dexamethasone to reduce immune over-reaction (see below). But in patients with undiagnosed Strongyloidiasis, the reduction of the immune response allowed the nematode infection to get out of control. Not surprisingly, those patients given IVM showed health improvements. But this was not because IVM treated the coronavirus infection, but because it knocked back the </span><i data-dcnode-id="2337"><span data-dcnode-id="2338" instrument_node="">Strongyloides</span></i><span data-dcnode-id="2336" instrument_node=""> infestation! So </span><i data-dcnode-id="2334"><span data-dcnode-id="2335" instrument_node="">IVM has no relevance to Covid patients without Strongyloidiasis or other nematode diseases.</span></i><sup data-dcnode-id="2331"><a class="forwardref" data-dcnode-id="2332" data-html="Bitterman, A. and 3 others, Comparison of trials using Ivermectin for COVID-19 between regions with high and low prevalence of Strongyloidiasis: A meta-analysis, <i>JAMA Netw Open.</i> <b>5</b>(3):e223079, 21 Mar 2022 | doi:10.1001/jamanetworkopen.2022.3079." data-offset="-10" data-variation="small wide"><span data-dcnode-id="2333" instrument_node="">105</span></a></sup></p><span data-dcnode-id="2329" instrument_node="">
</span><a data-dcnode-id="2328" name="c19-treat"></a><span data-dcnode-id="2327" instrument_node="">
</span><h3 data-dcnode-id="2325"><span data-dcnode-id="2326" instrument_node="">Some promising Covid treatments, backed by clinical trials</span></h3><span data-dcnode-id="2324" instrument_node="">
</span><p data-dcnode-id="2311"><span data-dcnode-id="2323" instrument_node="">Some have accused Big Pharma of opposing treatments with HCQ and IVM because these are cheap drugs that would make them little money. However, there are other cheap drugs approved precisely because proper clinical trials show that they help. Dexamethasone is a cheap glucocorticoid (type of steroid) that reduces death rate by 36% in patients needing extra oxygen,</span><sup data-dcnode-id="2320"><a class="forwardref" data-dcnode-id="2321" data-html="Sterne, J.A.C. <i>et al.</i>, Association between administration of systemic corticosteroids and mortality among critically ill patients with COVID-19: A Meta-analysis, <i>JAMA</i> <b>324</b>(13):1330–1341, 6 Oct 2020 | doi:10.1001/jama.2020.17023." data-offset="-10" data-variation="small wide"><span data-dcnode-id="2322" instrument_node="">106</span></a></sup><span data-dcnode-id="2319" instrument_node=""> because glucocorticoids reduce lung damage from cytokine storms.</span><sup data-dcnode-id="2316"><a class="forwardref" data-dcnode-id="2317" data-html="Prescott, H.C. and Rice, T.W., Corticosteroids in COVID-19 ARDS: Evidence and hope during the pandemic, <i>JAMA</i> <b>324</b>(13):1292–1295, 6 Oct 2020 | doi:10.1001/jama.2020.16747." data-offset="-10" data-variation="small wide"><span data-dcnode-id="2318" instrument_node="">107</span></a></sup><span data-dcnode-id="2315" instrument_node=""> The cheap antidepressant fluvoxamine (Luvox) also reduces rick of severe disease by 32%, probably by calming down the cytokine storms.</span><sup data-dcnode-id="2312"><a class="forwardref" data-dcnode-id="2313" data-html="Reis, G. <i>et al.</i>, Effect of early treatment with fluvoxamine on risk of emergency care and hospitalisation among patients with COVID-19: the TOGETHER randomised, platform clinical trial, <i>Lancet, </i> 27 Oct 2021 | doi:https://doi.org/10.1016/S2214-109X(21)00448-4." data-offset="-10" data-variation="small wide"><span data-dcnode-id="2314" instrument_node="">108</span></a></sup></p><span data-dcnode-id="2310" instrument_node="">
</span><p data-dcnode-id="2304"><span data-dcnode-id="2309" instrument_node="">Another promising treatment is the broad-spectrum antiviral drug molnupiravir. It has already been tested during Liberia’s Ebola 2016–2017 outbreak, and it has the advantage of being a pill.</span><sup data-dcnode-id="2306"><a class="forwardref" data-dcnode-id="2307" data-html="Molnupiravir: The Game-Changing Antiviral Pill for COVID-19?, <i>Johns Hopkins Bloomberg School of Public Health,</i> 18 Oct 2021; publichealth.jhu.edu." data-offset="-10" data-variation="small wide"><span data-dcnode-id="2308" instrument_node="">109</span></a></sup><span data-dcnode-id="2305" instrument_node=""> It will probably cost several hundred dollars per course.</span></p><span data-dcnode-id="2303" instrument_node="">
</span><p data-dcnode-id="2297"><span data-dcnode-id="2302" instrument_node="">In early November 2021, Pfizer announced that the antiviral Paxlovid pill causes 89% reduction in hospitalization and death in trial subjects with mild or moderate 19, as long as they took it within three days of diagnosis. Paxlovid works by inhibiting the SARS-CoV-2-3CL protease needed for replication.</span><sup data-dcnode-id="2299"><a class="forwardref" data-dcnode-id="2300" data-html="Pfizer’s oral antiviral therapy reduces mortality risk in Covid-19 trial, clinicaltrialsarena.com, 5 Nov 2021." data-offset="-10" data-variation="small wide"><span data-dcnode-id="2301" instrument_node="">110</span></a></sup><span data-dcnode-id="2298" instrument_node=""> </span></p><p data-dcnode-id="2295"><span data-dcnode-id="2296" instrument_node="">
</span></p><p data-dcnode-id="2289"><span data-dcnode-id="2294" instrument_node="">Monoclonal antibodies are also effective, that is, laboratory mass-produced antibodies for a specific antigen, derived from a cloned single B-cell.</span><sup data-dcnode-id="2291"><a class="forwardref" data-dcnode-id="2292" data-html="Nelson, P.N. and 5 others, Demystified … Monoclonal antibodies, <i>Molecular Pathology</i> <b>53</b>(3):111–117, Jun 2000 | doi:10.1136/mp.53.3.111." data-offset="-10" data-variation="small wide"><span data-dcnode-id="2293" instrument_node="">111</span></a></sup><span data-dcnode-id="2290" instrument_node=""> Monoclonal antibodies are given via intravenous (IV) infusion. However, they are expensive and hard to make, so cost about $2,000 per course. Monoclonal antibodies made to target cancer cell antigens are used in cancer therapy.</span></p><span data-dcnode-id="2288" instrument_node="">
</span><p data-dcnode-id="2281"><span data-dcnode-id="2287" instrument_node="">Decoy receptor. Cyrus Biotechnology has developed a modified version of the ACE2 receptor, by which the virus binds to cells. The modified version is called ACE2.v2.4, and is soluble and </span><a class="externalUrl" data-dcnode-id="2285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.businesswire.com/news/home/20211227005034/en/Cyrus-Biotechnology%25E2%2580%2599s-COVID-therapeutic-lead-ACE2.v2.4-strongly-binds-and-neutralizes-SARS-CoV-2-omicron-variant-potentially-providing-long-term-protection" rel="nofollow"><span data-dcnode-id="2286" instrument_node="">binds more strongly to the virus, including Omicron, than the natural receptor</span></a><span data-dcnode-id="2284" instrument_node="">. Once so bound, the spike can’t infect a cell. ACE2.v2.4 also has anti-inflammatory/lung-protective enzymatic activity.
</span><a data-dcnode-id="2283" name="summary"></a><span data-dcnode-id="2282" instrument_node="">
</span></p><h2 data-dcnode-id="2279"><span data-dcnode-id="2280" instrument_node="">Summing up</span></h2><span data-dcnode-id="2278" instrument_node="">
</span><ul data-dcnode-id="2246"><span data-dcnode-id="2277" instrument_node="">
</span><li data-dcnode-id="2275"><span data-dcnode-id="2276" instrument_node=""> Vaccination is one of the most important advances that God has allowed us to discover to alleviate the effects of the Curse.</span></li><span data-dcnode-id="2274" instrument_node="">
</span><li data-dcnode-id="2272"><span data-dcnode-id="2273" instrument_node=""> Vaccines train our immune system (which was designed by God to function in such a way) with dead or weakened germs, so it is ready to destroy invading live germs.</span></li><span data-dcnode-id="2271" instrument_node="">
</span><li data-dcnode-id="2269"><span data-dcnode-id="2270" instrument_node=""> Many diseases have been eliminated or drastically reduced by vaccines. There is no plausible alternative explanation for why particular diseases decreased so drastically at different times that correlate to when the particular vaccines became widespread. Further, the same diseases flare up in places with low vaccination rates. And such results are totally expected given what we know of how immunity works.</span></li><span data-dcnode-id="2268" instrument_node="">
</span><li data-dcnode-id="2266"><span data-dcnode-id="2267" instrument_node=""> Nothing is 100% safe. However, the safety of vaccination should not be compared with an impossible perfection, but with the (un)safety of non-vaccination. For example, the Covid-19 vaccines are about 1,000 times safer than the Covid-19 virus!</span></li><span data-dcnode-id="2265" instrument_node="">
</span><li data-dcnode-id="2263"><span data-dcnode-id="2264" instrument_node=""> Vaccines are accused of containing dangerous poisons. But whether anything is poisonous depends on the amount. The ‘toxic substances’ in vaccines are many times lower than the toxic dose. Some of the ‘toxins’ exist naturally in the body in far greater amounts than the vaccines. Others occur in much higher amounts in well known foods.</span></li><span data-dcnode-id="2262" instrument_node="">
</span><li data-dcnode-id="2257"><span data-dcnode-id="2261" instrument_node=""> Vaccines cannot cause the disease, since they are made from non-infectious biological entities. Some people get sick with the illness being vaccinated against just after vaccination, but before their immune system has been trained, so falsely think that the vaccination caused the illness. This is the </span><em data-dcnode-id="2259"><span data-dcnode-id="2260" instrument_node="">post hoc ergo proper hoc</span></em><span data-dcnode-id="2258" instrument_node=""> fallacy. In other cases it is because it is a different illness (common cold rather than influenza, e.g.).</span></li><span data-dcnode-id="2256" instrument_node="">
</span><li data-dcnode-id="2254"><span data-dcnode-id="2255" instrument_node=""> There is no statistically significant evidence that vaccines cause autism, and much evidence to indicate that they do not.</span></li><span data-dcnode-id="2253" instrument_node="">
</span><li data-dcnode-id="2251"><span data-dcnode-id="2252" instrument_node=""> A claim that “We should trust God to heal us” fails for two reasons. First, such claimants would generally bandage wounds and wear seatbelts, rather than trust God to protect them from harm regardless. Second, given the doctrine of the Sovereignty of God, He is healing us through the wisdom He gave to the vaccine’s discoverers and prescribers.</span></li><span data-dcnode-id="2250" instrument_node="">
</span><li data-dcnode-id="2248"><span data-dcnode-id="2249" instrument_node=""> Vaccines do not have parts of aborted babies. True, some vaccines against viral diseases are cultured on cell lines from two babies aborted over 40 years ago, but no babies are being aborted today to make vaccines. Morally, it would be better to use an alternative, if it is available, but if not, it would be no different from using the organs of a person killed by sinful means—as long as the beneficiary played no part in the killing.</span></li><span data-dcnode-id="2247" instrument_node="">
</span></ul><span data-dcnode-id="2245" instrument_node="">
</span><br data-dcnode-id="2244"><span data-dcnode-id="2243" instrument_node=""> </span><center data-dcnode-id="2237"><span data-dcnode-id="2242" instrument_node=""> </span><b data-dcnode-id="2239"><a data-dcnode-id="2240" href="#contents"><span data-dcnode-id="2241" instrument_node="">Back to contents</span></a></b><span data-dcnode-id="2238" instrument_node=""> </span></center><span data-dcnode-id="2236" instrument_node=""> </span><a data-dcnode-id="2235" name="cmi-summary"></a><span data-dcnode-id="2234" instrument_node="">
</span><h2 data-dcnode-id="2232"><span data-dcnode-id="2233" instrument_node=""> Overall summary statement (representing the position of CMI ministries generally) </span></h2><span data-dcnode-id="2231" instrument_node="">
</span><p data-dcnode-id="2229"><span data-dcnode-id="2230" instrument_node=""> Vaccination of minors, in most jurisdictions, remains a parent’s choice. Vaccination of adults remains their own choice. While there are real and immediate risks associated with vaccination, these are small overall, and the long-term risks of non-vaccination are much greater. In general, history has shown that vaccinations are safe and effective at preventing serious illness and death. We urge people to consult their own doctors regarding any decision involving their own or their family’s health; none of this article should be construed as individual-specific medical advice.</span></p><span data-dcnode-id="2228" instrument_node="">

</span><li data-dcnode-id="2109"><span data-dcnode-id="2127" instrument_node=""> This undesirable outcome arises from the perverse incentives involved. If something is not banned and it can be even remotely connected to harmful effects, the bureaucrats can be hauled before Congress and character-assassinated by the media. But if they ban this product that might have saved many lives, very few will link the lost lives to the absence of this product. When they do finally approve something while bragging it will save 100,000 lives per year, no one bothers to ask about the 1 million lives that must have been lost, by definition, while they held this product up for 10 years. So bureaucracies always tend towards delays and even banning over approval (Milton Friedman, [FDA =] “Frustrating Drug Advancement”, </span><em data-dcnode-id="2125"><span data-dcnode-id="2126" instrument_node="">Newsweek,</span></em><span data-dcnode-id="2124" instrument_node=""> 8 Jan 1973, p. 49). </span><br data-dcnode-id="2123"><span data-dcnode-id="2122" instrument_node=""> </span><br data-dcnode-id="2121"><span data-dcnode-id="2120" instrument_node=""> A good example is some beta blockers that were very effective at preventing a second heart attack. Scientists estimated that they could save 10,000 lives per year in the USA. But while some were approved in Europe for this purpose, the FDA bureaucrats held up the same drugs in the USA for years. This means that many tens of thousands of lives were lost by the delay (Theory, evidence and examples of FDA harm, </span><i data-dcnode-id="2118"><span data-dcnode-id="2119" instrument_node="">Independent Institute,</span></i><span data-dcnode-id="2117" instrument_node=""> fdareview.org, accessed 3 Dec 2020). Now we see the same red tape holding up a potentially life-saving new vaccine (Makary, M., FDA career staff are delaying the vaccine as thousands of Americans die: We’ve gone from ‘Operation Warp Speed’ to develop a vaccine to ‘Operation Turtle Speed’ to review it, thedispatch.com, 4 Dec 2020). </span><br data-dcnode-id="2116"><span data-dcnode-id="2115" instrument_node=""> </span><br data-dcnode-id="2114"><span data-dcnode-id="2113" instrument_node=""> Wading through red tape also costs much money, and the drug company must recoup this in sales to stay in business. This is a major reason new drugs can be so expensive (Gardner, J., New estimate puts cost to develop a new drug at $1B, adding to long-running debate, biopharmadive.com, 3 Mar 2020). </span><a class="return-to-text" data-dcnode-id="2111"><span data-dcnode-id="2112" instrument_node="">Return to text</span></a><span data-dcnode-id="2110" instrument_node="">.</span></li><span data-dcnode-id="2108" instrument_node="">
