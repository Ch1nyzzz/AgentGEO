</span><blockquote data-dcnode-id="4241"><span data-dcnode-id="4242" instrument_node="">In 2000, when we started our Vaccine Education Center, we made a video actually of sort of me talking to parents and just having them ask their questions about what they were worried about with regard vaccines. We hired a company in the city of Philadelphia named Shooters, which is kind of an odd name, but. So the cameraman who was shooting that, he told us a story about how his sister had taken her son to a chicken pox party. Because it’s true that if you get chickenpox as an adult, you’re about 10 times more likely to develop pneumonia, 10 times more likely to be hospitalized. So it’s actually better to get chickenpox as a child. And so the child went to a chicken pox party, got chicken pox, and died of hemorrhagic chickenpox. Now this was 2000. This was five years after the development of a chicken pox vaccine. The goal of the vaccine is to induce the immunity that you get from natural infection without paying the price of natural infection, and that’s what this child paid. And we actually asked this cameraman whether he would be willing to ask his sister whether she’d be willing to tell that story on camera, but not surprising, she wasn’t, and who could blame her? I mean, it’s just such a hard.</span></blockquote><span data-dcnode-id="4240" instrument_node="">
</span><p data-dcnode-id="4238"><span data-dcnode-id="4239" instrument_node=""> In general, there is no case to be made for any type of pox (or measles, or flu) party. Vaccines produce the same benefits without the nasty side effects of the diseases.</span></p><span data-dcnode-id="4237" instrument_node="">
</span><p data-dcnode-id="4229"><span data-dcnode-id="4236" instrument_node=""> (This is also relevant to the debate over wearing masks to prevent transmission of SARS-CoV-2 that causes COVID-19. Even if they are not 100% effective, they reduce the inoculum, and likely the seriousness of the disease. Indeed, the masks might function analogously to </span><i data-dcnode-id="4234"><span data-dcnode-id="4235" instrument_node="">variolation,</span></i><span data-dcnode-id="4233" instrument_node=""> the pre-vaccination method of immunizing against the worst forms of smallpox. Variolation exposed the immune system to a lower dose of smallpox virus through the skin rather than the lungs. Just as variolation was replaced by the much safer vaccination, the new C19 vaccines have proven to be much safer than any sort of live virus. For more, see </span><a data-dcnode-id="4231" href="#masks"><span data-dcnode-id="4232" instrument_node="">The science of masks</span></a><span data-dcnode-id="4230" instrument_node="">.)</span></p><span data-dcnode-id="4228" instrument_node="">
</span></li><span data-dcnode-id="4226" instrument_node="">
</span></ul><span data-dcnode-id="4224" instrument_node="">
</span></li><span data-dcnode-id="4222" instrument_node="">
</span><br data-dcnode-id="4221"><span data-dcnode-id="4220" instrument_node=""> </span><center data-dcnode-id="4214"><span data-dcnode-id="4219" instrument_node=""> </span><b data-dcnode-id="4216"><a data-dcnode-id="4217" href="#contents"><span data-dcnode-id="4218" instrument_node="">Back to contents</span></a></b><span data-dcnode-id="4215" instrument_node=""> </span></center><span data-dcnode-id="4213" instrument_node=""> </span><a data-dcnode-id="4212" name="pertussis"></a><span data-dcnode-id="4211" instrument_node="">
</span><li data-dcnode-id="4206"><span data-dcnode-id="4210" instrument_node=""> </span><strong data-dcnode-id="4208"><span data-dcnode-id="4209" instrument_node="">Whooping cough or pertussis.</span></strong><span data-dcnode-id="4207" instrument_node=""> This is not just a bad cough, but can have severe complications of pneumonia, brain damage, and the coughing fits are often so severe as to cause cracked ribs and turn children blue from oxygen deprivation. It was known as the 100-day cough. It used to kill 8,000 babies per year.</span></li><span data-dcnode-id="4205" instrument_node="">
</span><figure class="right" data-dcnode-id="4201" style="max-width: 212px"><img alt="boy-measles" data-dcnode-id="4204" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dl0.creation.com/articles/p124/c12495/boy-measles.jpg&amp;raw"><figcaption data-dcnode-id="4202"><span data-dcnode-id="4203" instrument_node="">CDC/Barbara Rice</span></figcaption></figure><span data-dcnode-id="4200" instrument_node=""> </span><a data-dcnode-id="4199" name="measles"></a><span data-dcnode-id="4198" instrument_node="">
</span><li data-dcnode-id="4148"><p data-dcnode-id="4193"><span data-dcnode-id="4197" instrument_node=""> </span><strong data-dcnode-id="4195"><span data-dcnode-id="4196" instrument_node="">Measles.</span></strong><span data-dcnode-id="4194" instrument_node=""> At best, it’s a nasty, itchy pox accompanied by high fever, cough, runny nose, and inflamed red eyes. Worse:</span></p><span data-dcnode-id="4192" instrument_node="">
</span><ul data-dcnode-id="4150"><span data-dcnode-id="4191" instrument_node="">
</span><li data-dcnode-id="4189"><span data-dcnode-id="4190" instrument_node=""> Ear infections occur in about one out of every 10 children with measles and can result in permanent hearing loss.</span></li><span data-dcnode-id="4188" instrument_node="">
</span><li data-dcnode-id="4186"><span data-dcnode-id="4187" instrument_node=""> As many as one out of every 20 children with measles gets pneumonia, the most common cause of death from measles in young children.</span></li><span data-dcnode-id="4185" instrument_node="">
</span><li data-dcnode-id="4183"><span data-dcnode-id="4184" instrument_node=""> About one child out of every 1,000 who get measles will develop encephalitis (swelling of the brain) that can lead to convulsions and can leave the child deaf or mentally retarded. 1 in 10,000 children will get Subacute Sclerosing Pan-Encephalitis (SSPE), a progressive brain-eroding condition that inevitably leads to a slow, distressing death.</span></li><span data-dcnode-id="4182" instrument_node="">
</span><li data-dcnode-id="4177"><span data-dcnode-id="4181" instrument_node=""> For every 1,000 children who get measles, one or two will die from it.</span><sup data-dcnode-id="4178"><a class="forwardref" data-dcnode-id="4179" data-html=" Complications of Measles, cdc.gov/measles/about/complications.html." data-offset="-10" data-variation="small wide"><span data-dcnode-id="4180" instrument_node="">28</span></a></sup></li><span data-dcnode-id="4176" instrument_node="">
</span><li data-dcnode-id="4155"><span data-dcnode-id="4175" instrument_node=""> In Samoa, there was a measles outbreak last year. </span><em data-dcnode-id="4173"><span data-dcnode-id="4174" instrument_node="">Lancet</span></em><span data-dcnode-id="4172" instrument_node=""> reported:</span><blockquote data-dcnode-id="4164"><span data-dcnode-id="4171" instrument_node=""> As of Jan 22, 2020, 5707 measles cases and 83 measles-related deaths (estimated attack rate of approximately 285 cases per 10 000 population) have been reported.</span><sup data-dcnode-id="4169"><span data-dcnode-id="4170" instrument_node="">2</span></sup><span data-dcnode-id="4168" instrument_node=""> 87% of deaths have been reported as children younger than 5 years, a mortality rate of approximately 25 deaths per 10 000 people in this age group.</span><sup data-dcnode-id="4165"><a class="forwardref" data-dcnode-id="4166" data-html=" Craig, A.T., Heywood, A.E., Worth, H., Measles epidemic in Samoa and other Pacific islands, <i>Lancet</i> <b>20</b> (3):273–275, 1 Mar 2020." data-offset="-10" data-variation="small wide"><span data-dcnode-id="4167" instrument_node="">29</span></a></sup></blockquote><span data-dcnode-id="4163" instrument_node=""> For comparison, NY, the state worst hit by far in the COVID-19 outbreak, has 196 cases per 10 000 pop, and 15.46 deaths per 10 000 pop (as at 3 Jun 2020). The eruption of measles has been attributed to low vaccination rate—it can’t be anything to do with nutrition or sanitation. And speaking of COVID-19, one paper suggests that the Rubella part of the MMR and MRCV vaccines may protect against the coronavirus, which could explain the much lower number of serious cases and deaths in people under 40.</span><sup data-dcnode-id="4160"><a class="forwardref" data-dcnode-id="4161" data-html=" Gold, G.E., MMR vaccine appears to confer strong protection from COVID-19: Few deaths from SARS-CoV-2 in highly vaccinated populations, researchgate.net, last updated 10 May 2020." data-offset="-10" data-variation="small wide"><span data-dcnode-id="4162" instrument_node="">30</span></a></sup><span data-dcnode-id="4159" instrument_node=""> This is not the only case where a vaccine can improve responses to other diseases; the measles vaccine and the BCG vaccine against tuberculosis have protective effects beyond the specific diseases.</span><sup data-dcnode-id="4156"><a class="forwardref" data-dcnode-id="4157" data-html=" Gorvett, Z., The mystery of why some vaccines are doubly beneficial, bbc.com, 16 Sep 2020. This aligns with the research of Danish immunologist Christine Stabell Benn, whose research suggests that vaccines with live attenuated pathogens confer wider immunity than just against those pathogens. See Benn, C.S. and 3 others, Revaccination with live attenuated vaccines confer additional beneficial nonspecific effects on overall survival: A review, <i>EBioMedicine</i> <b>10</b> :312–317, 15 Jul 2016." data-offset="-10" data-variation="small wide"><span data-dcnode-id="4158" instrument_node="">31</span></a></sup></li><span data-dcnode-id="4154" instrument_node="">
</span><li data-dcnode-id="4152"><span data-dcnode-id="4153" instrument_node=""> Measles causes long-term damage to the immune system in two ways.</span></li><span data-dcnode-id="4151" instrument_node="">
</span></ul><span data-dcnode-id="4149" instrument_node="">
</span></li><span data-dcnode-id="4147" instrument_node="">
</span></ul><span data-dcnode-id="4145" instrument_node="">
</span><blockquote data-dcnode-id="4126"><blockquote data-dcnode-id="4128"><blockquote data-dcnode-id="4130"><blockquote data-dcnode-id="4132"><ol data-dcnode-id="4137"><span data-dcnode-id="4144" instrument_node="">
</span><li data-dcnode-id="4142"><span data-dcnode-id="4143" instrument_node=""> The immune system first circulates a wide diversity of ‘naïve cells’ that have many different receptors that can latch on to different pathogens. But measles sharply reduces this diversity of naïve immune cells, meaning the immune system is less able to deal with future infectious diseases.</span></li><span data-dcnode-id="4141" instrument_node="">
</span><li data-dcnode-id="4139"><span data-dcnode-id="4140" instrument_node=""> Then after responding to diseases or vaccination, the immune system is ‘trained’ by producing long-lived ‘memory cells’. These circulate in the blood and are ready to quickly combat the disease organisms concerned before they can multiply much. But measles attacks these memory cells, so the patient is no longer immune to those diseases. They may even need to be re-vaccinated.</span></li><span data-dcnode-id="4138" instrument_node="">
</span></ol><span data-dcnode-id="4136" instrument_node="">
But the MMR vaccine didn’t attack the immune system, so people get the benefits of protection against those diseases without the symptoms of the diseases, including immune suppression.</span><sup data-dcnode-id="4133"><a class="forwardref" data-dcnode-id="4134" data-html=" Devlin, H., Measles wipes out immune system’s memory, study finds: Scientists say threat posed by measles is ‘much greater than we previously imagined’, <i>Guardian</i>, 31 Oct 2019; citing 1. Petrova, V.N. and 13 others, Incomplete genetic reconstitution of B cell pools contributes to prolonged immunosuppression after measles, <i>Science Immunology</i> <b>4</b> (41):eaay6125, 1 Nov 2019 | doi:10.1126/sciimmunol.aay6125, 2. Mina, M.J. and 14 others, Measles virus infection diminishes preexisting antibodies that offer protection from other pathogens, <i>Science</i> <b>366</b> (6465):599–606, 1 Nov 2019 | doi:10.1126/science.aay6485." data-offset="-10" data-variation="small wide"><span data-dcnode-id="4135" instrument_node="">32</span></a></sup></blockquote><span data-dcnode-id="4131" instrument_node=""> </span></blockquote><span data-dcnode-id="4129" instrument_node=""> </span></blockquote><span data-dcnode-id="4127" instrument_node=""> </span></blockquote><span data-dcnode-id="4125" instrument_node=""> </span><p data-dcnode-id="4120"><span data-dcnode-id="4124" instrument_node=""> Overall, if vaccination were so unsafe, then it’s hard to explain why sharp increases in vaccination correlate so strongly with increases in general health as well as sharp drops in child mortality.</span><sup data-dcnode-id="4121"><a class="forwardref" data-dcnode-id="4122" data-html=" Wile, J.L., Vaccines are very safe, drwile.com/lnkpages/render.asp?vac_safe#r1, 2009," data-offset="-10" data-variation="small wide"><span data-dcnode-id="4123" instrument_node="">33</span></a></sup></p><span data-dcnode-id="4119" instrument_node="">
</span><p data-dcnode-id="4106"><span data-dcnode-id="4118" instrument_node=""> For another example of such trade-offs, 350 people die annually in the USA taking baths,</span><sup data-dcnode-id="4115"><a class="forwardref" data-dcnode-id="4116" data-html=" Budnick, L.D. and Ross, D.A., Bathtub-related drownings in the United States, 1979–1981, <em>American J. Public Health</em> 75:630–633, 1985." data-offset="-10" data-variation="small wide"><span data-dcnode-id="4117" instrument_node="">34</span></a></sup><span data-dcnode-id="4114" instrument_node=""> but this would not justify refusing to wash, because that would increase the risk of acquiring diseases. Similarly, most wouldn’t refuse to wear seatbelts just because in rare freak situations, being thrown out of a vehicle could enhance the chance of survival.</span><sup data-dcnode-id="4111"><a class="forwardref" data-dcnode-id="4112" data-html=" When Western governments first began to introduce seatbelt legislation, some ‘anti’ campaigners pointed to situations in which people had even been trapped inside a burning vehicle from a malfunctioning belt. But the risk-reward tradeoff was and is overwhelmingly in favour of seat belt usage, i.e. while seat belts will kill/injure some people, they will save far more lives than that. The analogy to vaccination is clear. Airbags have also been known to injure some people in certain circumstances, but on the evidence one would much rather have them than not." data-offset="-10" data-variation="small wide"><span data-dcnode-id="4113" instrument_node="">35</span></a></sup><span data-dcnode-id="4110" instrument_node=""> This is because they realize that overall, the chances of being killed or injured by </span><em data-dcnode-id="4108"><span data-dcnode-id="4109" instrument_node="">not</span></em><span data-dcnode-id="4107" instrument_node=""> being restrained are far greater. </span></p><span data-dcnode-id="4105" instrument_node="">
</span><p data-dcnode-id="4090"><span data-dcnode-id="4104" instrument_node=""> The impossible demand for 100% safety is similar to the claim that vaccination violates the faux-Hippocratic maxim </span><em data-dcnode-id="4102"><span data-dcnode-id="4103" instrument_node="">Primum non nocere</span></em><span data-dcnode-id="4101" instrument_node=""> (“First do no harm”).</span><sup data-dcnode-id="4098"><a class="forwardref" data-dcnode-id="4099" data-html=" It is actually a mid-19th–century invention. Cedric M. Smith, Origin and Uses of <em>Primum Non Nocere</em> — Above All, Do No Harm! <em>J. Clinical Pharmacology</em> <b>45</b> (4): 371–377, Apr 2005 | doi:10.1177/0091270004273680." data-offset="-10" data-variation="small wide"><span data-dcnode-id="4100" instrument_node="">36</span></a></sup><span data-dcnode-id="4097" instrument_node=""> But it should be clear that </span><em data-dcnode-id="4095"><span data-dcnode-id="4096" instrument_node="">withholding</span></em><span data-dcnode-id="4094" instrument_node=""> such a life-saving measure is inflicting considerable </span><em data-dcnode-id="4092"><span data-dcnode-id="4093" instrument_node="">harm by omission</span></em><span data-dcnode-id="4091" instrument_node=""> . </span></p><span data-dcnode-id="4089" instrument_node="">
</span><p data-dcnode-id="4080"><span data-dcnode-id="4088" instrument_node=""> </span><em data-dcnode-id="4082"><span data-dcnode-id="4087" instrument_node=""> Bottom line: anti-vaxers often make the two contradictory claims about our immune system: apparently our immune system is so strong that it can fight off legions of rapidly multiplying live germs, but it is simultaneously so fragile that a few fragments of dead germs will overwhelm it.</span><sup data-dcnode-id="4084"><a class="forwardref" data-dcnode-id="4085" data-html=" Compare the self-contradictory arguments that atheopaths have used against Christianity and biblical creation, Sarfati, J., <a href=&quot;/anti-creationism-illogic-editorial&quot;>The illogic of anti-creationism</a>, <em>Creation</em> <strong>35</strong>(4):6, 2013; creation.com/anti-creationism-illogic." data-offset="-10" data-variation="small wide"><span data-dcnode-id="4086" instrument_node="">37</span></a></sup><span data-dcnode-id="4083" instrument_node=""> </span></em><span data-dcnode-id="4081" instrument_node=""> </span></p><span data-dcnode-id="4079" instrument_node="">
</span><p data-dcnode-id="4074"><span data-dcnode-id="4078" instrument_node=""> Of course, if someone has been harmed by vaccination, however rare (see Vaccine Injuries, </span><a data-dcnode-id="4076" href="#vaccine_injuries"><span data-dcnode-id="4077" instrument_node="">below</span></a><span data-dcnode-id="4075" instrument_node="">), great compassion is in order; one can scarcely expect a parent to be consoled by the statistical fact that the child’s chance of being harmed by the disease was far greater. (From the parent’s perspective, the child, if unvaccinated, may have survived the illness with no lasting harm.) This is part of what makes it such an emotive issue. </span></p><span data-dcnode-id="4073" instrument_node="">
</span><p data-dcnode-id="4071"><span data-dcnode-id="4072" instrument_node=""> For example, say that a parent chose to vaccinate for a particular illness where the chance of serious complications from the vaccine was 1 in 1,000,000, and the chance of serious complications from being unvaccinated and getting the disease was 1 in 1,000. And the child suffered complications from the vaccine. Without the benefit of foresight, as only God has, one can still say that at the time the decision was made, the parent’s decision to vaccinate was the wisest and most responsible one in discharging their duties as a parent—even though in hindsight the picture looks different. </span></p><span data-dcnode-id="4070" instrument_node="">
</span><br data-dcnode-id="4069"><span data-dcnode-id="4068" instrument_node=""> </span><center data-dcnode-id="4062"><span data-dcnode-id="4067" instrument_node=""> </span><b data-dcnode-id="4064"><a data-dcnode-id="4065" href="#contents"><span data-dcnode-id="4066" instrument_node="">Back to contents</span></a></b><span data-dcnode-id="4063" instrument_node=""> </span></center><span data-dcnode-id="4061" instrument_node=""> </span><a data-dcnode-id="4060" name="objections"></a><span data-dcnode-id="4059" instrument_node="">
</span><h2 data-dcnode-id="4057"><span data-dcnode-id="4058" instrument_node="">Objections</span></h2><span data-dcnode-id="4056" instrument_node="">
</span><a data-dcnode-id="4055" name="poisons"></a><span data-dcnode-id="4054" instrument_node="">
</span><h3 data-dcnode-id="4052"><span data-dcnode-id="4053" instrument_node="">Vaccines contain deadly poisons</span></h3><span data-dcnode-id="4051" instrument_node="">
</span><aside class="pullquote right" data-dcnode-id="4049" style="width: 200px;"><span data-dcnode-id="4050" instrument_node=""> The first rule of toxicology is: ‘the dose makes the toxin’. There are chemicals in perfectly safe food and even in our bodies, as well as vaccines, that would be toxic in a thousand times the amounts. Conversely, even ‘good’ things like oxygen and water can act as poisons in large amounts. </span></aside><span data-dcnode-id="4048" instrument_node=""> </span><p data-dcnode-id="4040"><span data-dcnode-id="4047" instrument_node=""> This is a meaningless claim, because the first rule of toxicology is: ‘the dose </span><em data-dcnode-id="4045"><span data-dcnode-id="4046" instrument_node="">makes</span></em><span data-dcnode-id="4044" instrument_node=""> the toxin’. For example, there are chemicals in perfectly safe food and even in our bodies, as well as vaccines, that would be toxic in a thousand times the amounts. Conversely, even ‘good’ things like oxygen and water can act as poisons in large amounts.</span><sup data-dcnode-id="4041"><a class="forwardref" data-dcnode-id="4042" data-html=" Bergman, J., <a href=&quot;/understanding-poisons-from-a-creationist-perspective&quot;>Understanding poisons from a creationist perspective</a>, <em>J. Creation</em> 11(3):353–360, 1997; creation.com/poison." data-offset="-10" data-variation="small wide"><span data-dcnode-id="4043" instrument_node="">38</span></a></sup></p><span data-dcnode-id="4039" instrument_node="">
</span><p data-dcnode-id="4029"><span data-dcnode-id="4038" instrument_node=""> Many poisons have benefits in small amounts; e.g. the potent digitalis toxin in foxglove plants in tiny amounts can benefit heart arrhythmias and congestive cardiac failure. The ‘deadliest poison’ known, botulinum toxin, have an LD₅₀ (median lethal dose),</span><sup data-dcnode-id="4035"><a class="forwardref" data-dcnode-id="4036" data-html=" The dose required to kill half the members of a tested population in a given duration." data-offset="-10" data-variation="small wide"><span data-dcnode-id="4037" instrument_node="">39</span></a></sup><span data-dcnode-id="4034" instrument_node=""> of around a nanogram per kilogram (ng/kg) of body weight.</span><sup data-dcnode-id="4031"><a class="forwardref" data-dcnode-id="4032" data-html=" Environmental Health &amp;amp; Safety, Safety In The Workplace, University of Florida, ehs.ufl.edu/programs/bio/toxins/toxin-table." data-offset="-10" data-variation="small wide"><span data-dcnode-id="4033" instrument_node="">40</span></a></sup><span data-dcnode-id="4030" instrument_node=""> Yet it is used to control squinting and wrinkles in minuscule doses (commonly given as ‘botox’ injections). The class of anti-hypertension medicines called ACE inhibitors were developed after analysing a component of a pit viper venom. </span></p><span data-dcnode-id="4028" instrument_node="">
</span><p data-dcnode-id="4026"><span data-dcnode-id="4027" instrument_node=""> Another important issue is that poison molecules cannot reproduce; disease germs are so dangerous precisely because they can make many more of themselves. And these germs usually produce far more toxins than vaccines contain. </span></p><span data-dcnode-id="4025" instrument_node="">
</span><a data-dcnode-id="4024" name="mercury"></a><span data-dcnode-id="4023" instrument_node=""> </span><h4 data-dcnode-id="4021"><span data-dcnode-id="4022" instrument_node="">Mercury</span></h4><p data-dcnode-id="3997"><span data-dcnode-id="4020" instrument_node=""> For many decades, many vaccines have included a strong preservative, a compound of mercury with an ethyl and thiosalicylate</span><sup data-dcnode-id="4017"><a class="forwardref" data-dcnode-id="4018" data-html=" ‘Thio’ means that a sulphur atom has been substituted for an oxygen." data-offset="-10" data-variation="small wide"><span data-dcnode-id="4019" instrument_node="">41</span></a></sup><span data-dcnode-id="4016" instrument_node=""> group called </span><em data-dcnode-id="4014"><span data-dcnode-id="4015" instrument_node="">thiomersal</span></em><span data-dcnode-id="4013" instrument_node=""> (from ethyl </span><strong data-dcnode-id="4011"><span data-dcnode-id="4012" instrument_node="">mer</span></strong><span data-dcnode-id="4010" instrument_node=""> cury </span><strong data-dcnode-id="4008"><span data-dcnode-id="4009" instrument_node="">thiosal</span></strong><span data-dcnode-id="4007" instrument_node=""> icylate) or </span><em data-dcnode-id="4005"><span data-dcnode-id="4006" instrument_node="">merthiolate</span></em><span data-dcnode-id="4004" instrument_node=""> or </span><em data-dcnode-id="4002"><span data-dcnode-id="4003" instrument_node="">thimerosal</span></em><span data-dcnode-id="4001" instrument_node="">.</span><sup data-dcnode-id="3998"><a class="forwardref" data-dcnode-id="3999" data-html=" The mainly-USA term ‘thimerosal’ is the result of <em>metathesis</em> or switching of sounds in the word: the ‘o’ and ‘mer’." data-offset="-10" data-variation="small wide"><span data-dcnode-id="4000" instrument_node="">42</span></a></sup></p><span data-dcnode-id="3996" instrument_node="">
</span><figure class="left" data-dcnode-id="3992" style="max-width: 328px"><small data-dcnode-id="3994"><span data-dcnode-id="3995" instrument_node="">wikipedia.org</span></small><img alt="Tuna-assortment" data-dcnode-id="3993" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dl0.creation.com/articles/p124/c12495/Tuna-assortment.jpg&amp;raw"></figure><span data-dcnode-id="3991" instrument_node=""> </span><p data-dcnode-id="3970"><span data-dcnode-id="3990" instrument_node=""> Back in 1931, it was shown that thiomersal is 40–50 times more effective against </span><em data-dcnode-id="3988"><span data-dcnode-id="3989" instrument_node="">Staphylococcus aureus</span></em><span data-dcnode-id="3987" instrument_node=""> (golden staph) than phenol (carbolic acid), the classic antiseptic used by the pioneer Joseph Lister (1827–1912). Indeed, a concentration of only 1 part in 10,000 (0.01%) would stop bacterial growth in vaccines.</span><sup data-dcnode-id="3984"><a class="forwardref" data-dcnode-id="3985" data-html=" Hence the term <em>oligodynamic effect</em>, from Greek <em>oligos</em> = few. It seems to be common among chalcophile metals like mercury, silver and copper, i.e. with an affinity for sulfur, so they disrupt vital sulfur-containing bacterial enzymes." data-offset="-10" data-variation="small wide"><span data-dcnode-id="3986" instrument_node="">43</span></a></sup><span data-dcnode-id="3983" instrument_node=""> but not destroy the vaccine itself as phenol does.</span><sup data-dcnode-id="3980"><a class="forwardref" data-dcnode-id="3981" data-html=" Jamieson W.A. and Powell, H.M., Merthiolate as a preservative for biological products, <em>American J. Hygiene</em> <strong>14</strong> :218–224, 1931." data-offset="-10" data-variation="small wide"><span data-dcnode-id="3982" instrument_node="">44</span></a></sup><span data-dcnode-id="3979" instrument_node=""> Since this concentration was used as a vaccine preservative, this amounts to 50 µg (µg = microgram = one millionth of a gram) of thiomersal in a 0.5 mL dose, or 25 µg of mercury.</span><sup data-dcnode-id="3976"><a class="forwardref" data-dcnode-id="3977" data-html=" Thiomersal (C₉H₉HgNaO₂S) has a relative molecular mass of 404.81, and mercury’s relative atomic mass is 200.592 or about 50%." data-offset="-10" data-variation="small wide"><span data-dcnode-id="3978" instrument_node="">45</span></a></sup><span data-dcnode-id="3975" instrument_node=""> To put this into perspective, a typical serving of tuna would have an average of 30 µg of mercury.</span><sup data-dcnode-id="3972"><a class="forwardref" data-dcnode-id="3973" data-html=" This assumes a 2.5 ounce (71 gram) serving, and tuna has an average of 0.427 parts per million of mercury. Mercury in canned tuna still a concern: New tests reinforce a need for some people to limit consumption, Consumer Reports, January 2011; consumerreports.org/cro/magazine-archive/2011/january/food/mercury-in-tuna/overview/index.htm" data-offset="-10" data-variation="small wide"><span data-dcnode-id="3974" instrument_node="">46</span></a></sup><span data-dcnode-id="3971" instrument_node=""> Vaccinations are a single dose—people frequently eat tuna. </span></p><span data-dcnode-id="3969" instrument_node="">
</span><p data-dcnode-id="3956"><span data-dcnode-id="3968" instrument_node=""> However, quite large amounts didn’t harm test animals: “up to 20 mg per kg body weight in rabbits and still higher in rats—without apparent injury.”</span><sup data-dcnode-id="3962"><a class="forwardref" data-dcnode-id="3966" data-html=" Note in original: Powell H.M. and Jamieson, W.A., Merthiolate as a germicide, <em>American Journal of Hygiene</em> <strong>13</strong> :296–310, 1931." data-offset="-10" data-variation="small wide"><span data-dcnode-id="3967" instrument_node="">47</span></a><span data-dcnode-id="3965" instrument_node="">,</span><a class="forwardref" data-dcnode-id="3963" data-html=" Baker, J.P., Mercury, Vaccines, and Autism: One Controversy, Three Histories, <em>American Journal of Public Health</em> <strong>98</strong> (2):244–53, 2008 | doi:10.2105/AJPH.2007.113159." data-offset="-10" data-variation="small wide"><span data-dcnode-id="3964" instrument_node="">48</span></a></sup><span data-dcnode-id="3961" instrument_node=""> For humans, it seems to require 3 to a few hundred mg/kg of thiomersal to produce acute mercury toxicity. So if we take the most cautious figure of 3 mg/kg, a 50-kg person would need to receive over a thousand thiomersal-containing vaccinations to receive a toxic dose. So not surprisingly, one review revealed no evidence of harm caused by doses of thimerosal in vaccines, except for local hypersensitivity reactions,</span><sup data-dcnode-id="3958"><a class="forwardref" data-dcnode-id="3959" data-html=" Ball, L.K., Ball, R., and Pratt, R.D., An assessment of thimerosal use in childhood vaccines, <em>Pediatrics</em> 107(5):1147–54, May 2001." data-offset="-10" data-variation="small wide"><span data-dcnode-id="3960" instrument_node="">49</span></a></sup><span data-dcnode-id="3957" instrument_node=""> although it was used for many decades. </span></p><span data-dcnode-id="3955" instrument_node="">
</span><aside class="pullquote left" data-dcnode-id="3953" style="width: 200px;"><span data-dcnode-id="3954" instrument_node=""> A 50-kg person would need to receive over a thousand thiomersal-containing vaccinations to receive a toxic dose of ethylmercury. </span></aside><span data-dcnode-id="3952" instrument_node=""> </span><p data-dcnode-id="3947"><span data-dcnode-id="3951" instrument_node=""> However, from the 1960s to the 1990s, mercury-containing effluent poured into the sea was shown to have highly toxic effects. And it accumulated in the food chain, so it became concentrated in fish. Several thousand people in the fishing community of Minamata Bay, Japan, had serious mercury poisoning with often fatal results. In particular, bacteria converted the inorganic mercury into </span><em data-dcnode-id="3949"><span data-dcnode-id="3950" instrument_node="">methylmercury</span></em><span data-dcnode-id="3948" instrument_node=""> CH₃Hg⁺.</span></p><span data-dcnode-id="3946" instrument_node="">
</span><p data-dcnode-id="3929"><span data-dcnode-id="3945" instrument_node=""> However, there is an important difference between this and thiomersal—the latter is metabolized into </span><em data-dcnode-id="3943"><span data-dcnode-id="3944" instrument_node="">ethylmercury</span></em><span data-dcnode-id="3942" instrument_node=""> CH₃CH₂Hg⁺. Even though there is only a CH₂ group difference, this makes </span><em data-dcnode-id="3940"><span data-dcnode-id="3941" instrument_node="">all</span></em><span data-dcnode-id="3939" instrument_node=""> the difference—compare ethanol or ethyl alcohol (CH₃CH₂OH) that makes you “merry” (</span><a class="rtBibleRef" data-dcnode-id="3937" data-purpose="bible-reference" data-reference="Eccles 10.19" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/esv/Eccles%252010.19" rel="noopener" target="_blank"><span data-dcnode-id="3938" instrument_node="">Ecclesiastes 10:19</span></a><span data-dcnode-id="3936" instrument_node="">) with methanol/methyl alcohol (CH₃OH) that makes you blind or dead. Ethyl mercury does </span><em data-dcnode-id="3934"><span data-dcnode-id="3935" instrument_node="">not</span></em><span data-dcnode-id="3933" instrument_node=""> accumulate. Rather, it is removed quite quickly from the blood and excreted via feces. Indeed, even giving thiomersal-containing vaccines to infants did not raise their blood mercury level above safe levels, and the half-life of mercury in the blood was about a week.</span><sup data-dcnode-id="3930"><a class="forwardref" data-dcnode-id="3931" data-html=" Pichichero M.E. <em>et al.</em>, Mercury concentrations and metabolism in infants receiving vaccines containing thiomersal: a descriptive study, <em>Lancet</em> <strong>360</strong> (937):1737–1741, 30 Nov 2002 | doi:10.1016/S0140-6736(02)11682-5." data-offset="-10" data-variation="small wide"><span data-dcnode-id="3932" instrument_node="">50</span></a></sup></p><span data-dcnode-id="3928" instrument_node="">
</span><p data-dcnode-id="3926"><span data-dcnode-id="3927" instrument_node=""> Unfortunately, in a typical panic-reaction by bureaucracies, on 9 July 1999, the Centers for Disease Control and Prevention (CDC) and the American Academy of Pediatrics (AAP) asked the vaccine makers to remove thiomersal from their vaccines. The absurd double-speak of the AAP press release just confused matters: </span></p><span data-dcnode-id="3925" instrument_node="">
</span><blockquote data-dcnode-id="3923"><span data-dcnode-id="3924" instrument_node=""> Parents should not worry about the safety of vaccines. The current levels of thimerosal will not hurt children, but reducing those levels will make safe vaccines even safer. While our current immunization strategies are safe, we have an opportunity to increase the margin of safety.</span></blockquote><span data-dcnode-id="3922" instrument_node=""> </span><p data-dcnode-id="3920"><span data-dcnode-id="3921" instrument_node="">Of course, if the amounts are safe already, then how could the safety be improved by removing it? And it sent the mixed message to parents: “if they are removing thiomersal, it must really have been harmful after all—and they must have been hiding this in the past.” </span></p><span data-dcnode-id="3919" instrument_node="">
</span><p data-dcnode-id="3910"><span data-dcnode-id="3918" instrument_node=""> This caused immediate harm: after about 10% of hospitals suspended their hepatitis B vaccines that contained thiomersal, a 3-month–old baby born to a mother infected with the disease died of this. And the ban enabled concerned parents and associated ambulance-chasers to blame thiomersal for their children’s autism (see </span><a data-dcnode-id="3916" href="#vaccines_cause_autism"><span data-dcnode-id="3917" instrument_node="">below</span></a><span data-dcnode-id="3915" instrument_node="">).</span><sup data-dcnode-id="3912"><a class="forwardref" data-dcnode-id="3913" data-html=" Offit, P.A., Thimerosal and Vaccines — A Cautionary Tale, <em>New England Journal of Medicine</em> <strong>357</strong> :1278–1279, 27 Sep 2007 | doi:10.1056/NEJMp078187." data-offset="-10" data-variation="small wide"><span data-dcnode-id="3914" instrument_node="">51</span></a></sup><span data-dcnode-id="3911" instrument_node=""> It has also increased the costs of vaccination, because they must be in single-dose vials without a preservative. </span></p><span data-dcnode-id="3909" instrument_node="">
</span><p data-dcnode-id="3901"><span data-dcnode-id="3908" instrument_node=""> However, now, this issue is a red herring, because so few vaccines still contain thiomersal. In the USA, only some influenza, tetanus, and meningococcal vaccines have as much as 25 µg of mercury; the vast majority have </span><em data-dcnode-id="3906"><span data-dcnode-id="3907" instrument_node="">none</span></em><span data-dcnode-id="3905" instrument_node="">.</span><sup data-dcnode-id="3902"><a class="forwardref" data-dcnode-id="3903" data-html=" Thimerosal in Vaccines, <em>FDA: U.S. Food and Drug Administration</em>, fda.gov/BiologicsBloodVaccines/SafetyAvailability/VaccineSafety/ucm096228#t1, 18 Jun 2014." data-offset="-10" data-variation="small wide"><span data-dcnode-id="3904" instrument_node="">52</span></a></sup></p><span data-dcnode-id="3900" instrument_node="">
</span><a data-dcnode-id="3899" name="formaldehyde"></a><span data-dcnode-id="3898" instrument_node=""> </span><h4 data-dcnode-id="3896"><span data-dcnode-id="3897" instrument_node="">Formaldehyde</span></h4><p data-dcnode-id="3891"><span data-dcnode-id="3895" instrument_node=""> Formaldehyde or methanal (HCHO) is the simplest aldehyde (RCHO), and has the ability to cross-link proteins. This makes it toxic to microbes, so it is used as a preservative. For vaccines, it is important to have dead microbes, so formaldehyde is used to inactivate viruses. It also denatures the deadly toxin proteins of the tetanus and diphtheria bacteria, so they can no longer do their damage (so are now toxoids), but can still provoke the desired immune response.</span><sup data-dcnode-id="3892"><a class="forwardref" data-dcnode-id="3893" data-html=" Description of how diphtheria and tetanus toxoids are prepared, fda.gov/downloads/BiologicsBloodVaccines/Vaccines/ApprovedProducts/UCM142732.pdf" data-offset="-10" data-variation="small wide"><span data-dcnode-id="3894" instrument_node="">53</span></a></sup></p><span data-dcnode-id="3890" instrument_node="">
</span><aside class="pullquote left" data-dcnode-id="3888" style="width: 200px;"><span data-dcnode-id="3889" instrument_node=""> A 200-g pear would have 12,000 µg of formaldehyde, 100 times as much as the total infant vaccination schedule. </span></aside><span data-dcnode-id="3887" instrument_node=""> </span><p data-dcnode-id="3877"><span data-dcnode-id="3886" instrument_node=""> So how much formaldehyde is in vaccines? Some vaccines have about 100 µg per dose, as per this table.</span><sup data-dcnode-id="3883"><a class="forwardref" data-dcnode-id="3884" data-html=" Do vaccines contain formaldehyde? Vaccine Information Center, <em>The Children’s Hospital of Philadelphia</em>, vec.chop.edu/service/vaccine-education-center/vaccine-safety/vaccine-ingredients/formaldehyde.html, Apr 2013." data-offset="-10" data-variation="small wide"><span data-dcnode-id="3885" instrument_node="">54</span></a></sup><span data-dcnode-id="3882" instrument_node=""> Note that the table lists different versions of the same vaccine, whereas a patient would receive only one of these. This means that the typical vaccination schedule for infants would result in about 120 µg.</span><sup data-dcnode-id="3879"><a class="forwardref" data-dcnode-id="3880" data-html=" The Toxin Gambit Part 1: Formaldehyde, <em>Just the Vax Blog,</em> justthevax.blogspot.com.au/2009/05/toxin-gambit-part-1-formaldehyde.html, 11 May 2009." data-offset="-10" data-variation="small wide"><span data-dcnode-id="3881" instrument_node="">55</span></a></sup><span data-dcnode-id="3878" instrument_node=""> So let’s put that into proper perspective. </span></p><span data-dcnode-id="3876" instrument_node="">
</span><p data-dcnode-id="3870"><span data-dcnode-id="3875" instrument_node=""> Actually, our bodies produce formaldehyde in small amounts. Metabolism of some amino acids produces formaldehyde as a by-product. And it is even essential as a metabolic intermediate in manufacturing purines (essential components of DNA and RNA) and some amino acids. So the naturally occurring concentration of formaldehyde in our blood is 2–3 µg/.</span><sup data-dcnode-id="3872"><a class="forwardref" data-dcnode-id="3873" data-html=" Report on Carcinogens, Thirteenth Edition: Formaldehyde, National Toxicology Program, <em>U.S. Department of Health and Human Services,</em>" data-offset="-10" data-variation="small wide"><span data-dcnode-id="3874" instrument_node="">56</span></a></sup><span data-dcnode-id="3871" instrument_node=""> or about 2–3 mg/L. So even a 2-month–old infant with half a litre of blood would have 1–1.5 mg in the whole bloodstream. It means that the total recommended vaccination schedule would add about a tenth to the infant’s natural level, which is below the natural variability.</span></p><span data-dcnode-id="3869" instrument_node="">
</span><figure class="right" data-dcnode-id="3867" style="max-width: 300px"><img alt="pear" data-dcnode-id="3868" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dl0.creation.com/articles/p124/c12495/pear.jpg&amp;raw"></figure><span data-dcnode-id="3866" instrument_node=""> </span><p data-dcnode-id="3860"><span data-dcnode-id="3865" instrument_node=""> We can’t escape formaldehyde from outside, because it is contained in many foods, especially pears, which have about 60 µg/g (mg/kg), and cod, apples, and pork have about 20 µg/g.</span><sup data-dcnode-id="3862"><a class="forwardref" data-dcnode-id="3863" data-html=" Formaldehyde, International Programme on Chemical Safety, <em>World Health Orgnization</em>, inchem.org/documents/ehc/ehc/ehc89.htm#SubSectionNumber:5.1.4 1989." data-offset="-10" data-variation="small wide"><span data-dcnode-id="3864" instrument_node="">57</span></a></sup><span data-dcnode-id="3861" instrument_node=""> Thus a 200-g pear would have 12,000 µg, 100 times as much as the total infant vaccination schedule. </span></p><span data-dcnode-id="3859" instrument_node="">
</span><a data-dcnode-id="3858" name="aluminium"></a><span data-dcnode-id="3857" instrument_node=""> </span><h4 data-dcnode-id="3855"><span data-dcnode-id="3856" instrument_node="">Aluminium</span></h4><p data-dcnode-id="3850"><span data-dcnode-id="3854" instrument_node=""> Aluminium is an adjuvant, that is, it enhances the immune response, so that less of the deactivated infectious agent is needed. Aluminium is in any case abundant in nature, e.g. clay minerals are aluminosilicate sheets (called </span><em data-dcnode-id="3852"><span data-dcnode-id="3853" instrument_node="">phyllosilicates</span></em><span data-dcnode-id="3851" instrument_node="">). Once again, the amount in vaccines is incredibly tiny by comparison. </span></p><span data-dcnode-id="3849" instrument_node="">
</span><p data-dcnode-id="3847"><span data-dcnode-id="3848" instrument_node=""> To be specific, vaccines have no more than 0.85 mg/dose of aluminium. We eat about 10 times that amount every day in our food. Any aluminium that reaches the blood stream is excreted quickly, with a half life of about a day. </span></p><span data-dcnode-id="3846" instrument_node="">
</span><a data-dcnode-id="3845" name="egg"></a><span data-dcnode-id="3844" instrument_node=""> </span><h4 data-dcnode-id="3842"><span data-dcnode-id="3843" instrument_node="">Egg protein</span></h4><p data-dcnode-id="3840"><span data-dcnode-id="3841" instrument_node=""> Albumin, the protein from eggs, is used as a vaccine stabilizer. This is what’s responsible for many of the reported allergic reactions to vaccines. This is a non-issue for those who can eat eggs or egg products. </span></p><span data-dcnode-id="3839" instrument_node="">
</span><a data-dcnode-id="3838" name="squalene"></a><span data-dcnode-id="3837" instrument_node=""> </span><h4 data-dcnode-id="3835"><span data-dcnode-id="3836" instrument_node="">Squalene</span></h4><p data-dcnode-id="3830"><span data-dcnode-id="3834" instrument_node=""> The adjuvant MF59 is an emulsion of squalene oil in water. It has safely been used in influenza vaccines for over 20 years. Squalene is a triterpene found in all plants and animals, including humans. Our bodies use this as an biochemical intermediate to produce cholesterol and steroid hormones. It is also a product of our sebaceous glands, helping to lubricate and protect our skin. Squalene was historically extracted from shark liver oil, hence the name, derived from </span><i data-dcnode-id="3832"><span data-dcnode-id="3833" instrument_node="">Squalus</span></i><span data-dcnode-id="3831" instrument_node="">, the spurdog genus of dogfish sharks.</span></p><span data-dcnode-id="3829" instrument_node="">
</span><a data-dcnode-id="3828" name="peg"></a><span data-dcnode-id="3827" instrument_node=""> </span><h4 data-dcnode-id="3825"><span data-dcnode-id="3826" instrument_node="">Polyethylene glycol (PEG)</span></h4><p data-dcnode-id="3823"><span data-dcnode-id="3824" instrument_node=""> PEG is one of the lipid components in the mRNA vaccines against COVID-19. It is also the active ingredient in my over-the-counter eye drops that use several times daily for dry eyes. </span></p><span data-dcnode-id="3822" instrument_node="">
</span><a data-dcnode-id="3821" name="bloodstream"></a><span data-dcnode-id="3820" instrument_node=""> </span><h4 data-dcnode-id="3818"><span data-dcnode-id="3819" instrument_node="">Bloodstream vs. ingestion?</span></h4><p data-dcnode-id="3816"><span data-dcnode-id="3817" instrument_node=""> Some antivaxers try to get around the information above by claiming that there is a difference between ingesting as food or drink and injecting into the bloodstream. A few problems with that: </span></p><span data-dcnode-id="3815" instrument_node="">
</span><ul data-dcnode-id="3798"><span data-dcnode-id="3814" instrument_node="">
</span><li data-dcnode-id="3812"><span data-dcnode-id="3813" instrument_node=""> Vaccines are not injected into the bloodstream! Rather, most are intramuscular. This is necessary to bypass the anatomical barriers of the innate immune system so that the adaptive immune system can be trained by the vaccine.</span></li><span data-dcnode-id="3811" instrument_node="">
</span><li data-dcnode-id="3809"><span data-dcnode-id="3810" instrument_node=""> Formaldehyde is already circulating in the bloodstream in much higher amounts than in vaccines.</span></li><span data-dcnode-id="3808" instrument_node="">
</span><li data-dcnode-id="3806"><span data-dcnode-id="3807" instrument_node=""> These so-called poisons are readily absorbed by ingestion. How do they think fish high up on the food chain accumulate mercury?</span></li><span data-dcnode-id="3805" instrument_node="">
</span><li data-dcnode-id="3800"><span data-dcnode-id="3804" instrument_node=""> Some have argued that the synergistic effects of the ‘toxins’ in vaccine are far worse than the effect of each on its own. But then, the same argument would apply to our diets. We would hardly be able to eat anything, because perfectly safe food has some of the so-called toxins that worry vaccine opponents, and they would likewise have a synergistic effect. E.g. eat a serving of tuna and you have as much mercury as in a flu shot, then drink tomato juice with methanol which is oxidized to formaldehyde, eat a pear with far more formaldehyde than any vaccine, and cook something in an aluminium saucepan, and you have some of the chemicals that concern vaccine-opponents, with synergistic effects. The solution is to realize that the </span><em data-dcnode-id="3802"><span data-dcnode-id="3803" instrument_node="">amounts</span></em><span data-dcnode-id="3801" instrument_node=""> in vaccines (and foods) are way too small, as shown above.</span></li><span data-dcnode-id="3799" instrument_node="">
</span></ul><span data-dcnode-id="3797" instrument_node="">
</span><a data-dcnode-id="3796" name="perspective"></a><span data-dcnode-id="3795" instrument_node=""> </span><h4 data-dcnode-id="3793"><span data-dcnode-id="3794" instrument_node="">Toxins in perspective</span></h4><p data-dcnode-id="3788"><span data-dcnode-id="3792" instrument_node=""> As with everything else, people have far more to fear from the diseases than vaccines. The second and fourth most deadly known toxins are those from the tetanus- and diphtheria-causing bacteria! (the first and third most deadly are the botulinum toxin and shiga toxin (from </span><i data-dcnode-id="3790"><span data-dcnode-id="3791" instrument_node="">Shigella dysenteriae</span></i><span data-dcnode-id="3789" instrument_node="">)). Getting vaccinated against these diseases prevents these extremely dangerous toxins from reaching the bloodstream.</span></p><span data-dcnode-id="3787" instrument_node="">
</span><br data-dcnode-id="3786"><span data-dcnode-id="3785" instrument_node=""> </span><center data-dcnode-id="3779"><span data-dcnode-id="3784" instrument_node=""> </span><b data-dcnode-id="3781"><a data-dcnode-id="3782" href="#contents"><span data-dcnode-id="3783" instrument_node="">Back to contents</span></a></b><span data-dcnode-id="3780" instrument_node=""> </span></center><span data-dcnode-id="3778" instrument_node=""> </span><a data-dcnode-id="3777" name="got_influenza"></a><span data-dcnode-id="3776" instrument_node="">
</span><h3 data-dcnode-id="3774"><span data-dcnode-id="3775" instrument_node="">“I got influenza from the flu shot”</span></h3><span data-dcnode-id="3773" instrument_node="">
</span><p data-dcnode-id="3765"><span data-dcnode-id="3772" instrument_node=""> No, you didn’t. Dead viruses simply can’t cause infection. The impression is a good example of the fallacy, unfortunately widely used by anti-vaxers, of </span><em data-dcnode-id="3770"><span data-dcnode-id="3771" instrument_node="">post hoc ergo propter hoc</span></em><span data-dcnode-id="3769" instrument_node=""> (“after this therefore because of this”). That is, some people became ill after a flu shot, so think that the flu shot caused the disease. In reality, it takes about two weeks for the body’s immune system to respond fully, and these unfortunates caught the live flu virus (if in fact the illness was influenza) before the immune system was fully protective. Also, again, too many people call a bad cold ‘the flu’, and an influenza shot won’t protect against non-influenza illnesses.</span><sup data-dcnode-id="3766"><a class="forwardref" data-dcnode-id="3767" data-html=" What about people who get a seasonal flu vaccine and still get sick with flu-like symptoms? in: Misconceptions about Seasonal Flu and Flu Vaccines, cdc.gov/flu/about/qa/misconceptions.htm." data-offset="-10" data-variation="small wide"><span data-dcnode-id="3768" instrument_node="">58</span></a></sup></p><span data-dcnode-id="3764" instrument_node="">
</span><p data-dcnode-id="3762"><span data-dcnode-id="3763" instrument_node=""> Also, no system is totally effective, and sometimes the vaccine doesn’t contain the right match for the live virus in the current ‘flu season’. The lower effectiveness of the flu shot is due to the same reason that you can catch the flu and get it again: the virus mutates quickly. So the manufacturers of the flu vaccine make the best guess on the currently circulating strain.</span></p><span data-dcnode-id="3761" instrument_node="">
</span><p data-dcnode-id="3751"><span data-dcnode-id="3760" instrument_node=""> However, there is good news here. Even if they don’t guess quite right, they guess near enough in most cases that even if a person catches influenza, it is not usually severe enough to need hospitalization.</span><sup data-dcnode-id="3757"><a class="forwardref" data-dcnode-id="3758" data-html=" Haelle, T., The truth about the flu shot: It may not always prevent illness, but it will reduce risk of death: Why get a flu vaccination that doesn’t always prevent the flu? A lot of reasons, as it turns out, nbcnews.com, 7 Mar 2018." data-offset="-10" data-variation="small wide"><span data-dcnode-id="3759" instrument_node="">59</span></a></sup><span data-dcnode-id="3756" instrument_node=""> And even if it is, the death rate is sharply reduced in vaccinated patients—a CDC study showed, “an unvaccinated hospitalized flu patient was 2 to 5 times more likely to die than someone who had been vaccinated.”</span><sup data-dcnode-id="3753"><a class="forwardref" data-dcnode-id="3754" data-html=" New CDC study shows flu vaccine reduces severe outcomes in hospitalized patients, cdc.gov, 25 May 2017." data-offset="-10" data-variation="small wide"><span data-dcnode-id="3755" instrument_node="">60</span></a></sup><span data-dcnode-id="3752" instrument_node=""> That is, even in the worst case, the flu shot is good at preventing an influenza attack, very good at preventing one severe enough to need hospitalization, and excellent at preventing a fatal attack. </span></p><span data-dcnode-id="3750" instrument_node="">
</span><p data-dcnode-id="3748"><span data-dcnode-id="3749" instrument_node=""> Another reason the flu shot is less effective than most other vaccines is that the virus mutates in the chicken egg cells (“egg-adapted changes”). This means that the virus to which our immune system is exposed is not quite the same as the virus naturally circulating, so the immune response is not always totally effective. But this problem is likely solved in the new “cell-derived” quadrivalent flu vaccines for the 2020/21 USA flu season. These are cultured on Madin–Darby Canine Kidney (MDCK) cells, a cell line descended from epithelial cells from kidney tubule of a female adult Cocker Spaniel. The original cells were extracted by the eponymous S.H. Madin and N.B. Darby in 1958. The cell-derived vaccines have another advantage: there is no egg component that occasionally produces and allergic reaction. </span></p><span data-dcnode-id="3747" instrument_node="">
</span><a data-dcnode-id="3746" name="guillain"></a><span data-dcnode-id="3745" instrument_node=""> </span><h4 data-dcnode-id="3743"><span data-dcnode-id="3744" instrument_node="">Guillain–Barré syndrome (GBS)</span></h4><p data-dcnode-id="3732"><span data-dcnode-id="3742" instrument_node=""> GBS is a rare disease with muscle weakness, tingling, numbness and sometimes pain. It is an auto-immune condition: the immune system attacks the peripheral nervous system. Medical science doesn’t really understand the cause. Some have been concerned that GBS could be triggered by the flu shot. In reality, some diseases can also cause GBS, </span><i data-dcnode-id="3740"><span data-dcnode-id="3741" instrument_node="">including influenza.</span></i><span data-dcnode-id="3739" instrument_node=""> In fact, the </span><i data-dcnode-id="3737"><span data-dcnode-id="3738" instrument_node=""> influenza virus is about 17 times more likely than the influenza vaccine to cause GBS. </span></i><span data-dcnode-id="3736" instrument_node=""> So a good way to </span><i data-dcnode-id="3734"><span data-dcnode-id="3735" instrument_node="">reduce</span></i><span data-dcnode-id="3733" instrument_node=""> your chance of being afflicted with GBS is to get the flu shot! </span></p><span data-dcnode-id="3731" instrument_node="">
</span><br data-dcnode-id="3730"><span data-dcnode-id="3729" instrument_node=""> </span><center data-dcnode-id="3723"><span data-dcnode-id="3728" instrument_node=""> </span><b data-dcnode-id="3725"><a data-dcnode-id="3726" href="#contents"><span data-dcnode-id="3727" instrument_node="">Back to contents</span></a></b><span data-dcnode-id="3724" instrument_node=""> </span></center><span data-dcnode-id="3722" instrument_node=""> </span><a data-dcnode-id="3721" name="vaccines_cause_autism"></a><span data-dcnode-id="3720" instrument_node="">
</span><h3 data-dcnode-id="3718"><span data-dcnode-id="3719" instrument_node="">“Vaccines cause autism”</span></h3><span data-dcnode-id="3717" instrument_node="">
</span><p data-dcnode-id="3705"><span data-dcnode-id="3716" instrument_node=""> This is a very common claim, infamously promulgated by former Playboy model Jenny McCarthy, who claimed that her son became autistic after being vaccinated. It also gained some credibility with a study published in </span><em data-dcnode-id="3714"><span data-dcnode-id="3715" instrument_node="">Lancet</span></em><span data-dcnode-id="3713" instrument_node=""> by British doctor Andrew Wakefield. Later, he was “held guilty of ethical violations (they had conducted invasive investigations on the children without obtaining the necessary ethical clearances) and scientific misrepresentation (they reported that their sampling was consecutive when, in fact, it was selective).”</span><sup data-dcnode-id="3710"><a class="forwardref" data-dcnode-id="3711" data-html=" Sathyanarayana Rao, T.E., Andrade, C., The MMR vaccine and autism: Sensation, refutation, retraction, and fraud, <em>Indian J Psychiatry</em> <strong>53</strong> (2):95–96, April–June 2011 | doi:10.4103/0019-5545.82529." data-offset="-10" data-variation="small wide"><span data-dcnode-id="3712" instrument_node="">61</span></a></sup><span data-dcnode-id="3709" instrument_node=""> </span><em data-dcnode-id="3707"><span data-dcnode-id="3708" instrument_node="">Lancet</span></em><span data-dcnode-id="3706" instrument_node=""> retracted the study in February 2010. </span></p><span data-dcnode-id="3704" instrument_node="">
</span><p data-dcnode-id="3702"><span data-dcnode-id="3703" instrument_node=""> In contrast to Wakefield, study after study has shown no link between vaccination and autism. The U.S. National Academy of Science’s (NAS) Institute of Medicine published a study in 2004 which summarized: </span></p><span data-dcnode-id="3701" instrument_node="">
</span><blockquote data-dcnode-id="3696"><span data-dcnode-id="3700" instrument_node=""> Thus, based on this body of evidence, the committee concludes that the evidence favors rejection of a causal relationship between thimerosal-containing vaccines and autism.</span><sup data-dcnode-id="3697"><a class="forwardref" data-dcnode-id="3698" data-html=" Immunization Safety Review: Vaccines and Autism, Institute of Medicine of the National Academies, 14 May 2004; iom.edu/Reports/2004/Immunization-Safety-Review-Vaccines-and-Autism.aspx" data-offset="-10" data-variation="small wide"><span data-dcnode-id="3699" instrument_node="">62</span></a></sup></blockquote><span data-dcnode-id="3695" instrument_node=""> </span><p data-dcnode-id="3693"><span data-dcnode-id="3694" instrument_node="">And in 2014, a huge meta-study was published, involving over a million children, concluding: </span></p><span data-dcnode-id="3692" instrument_node="">
</span><blockquote data-dcnode-id="3687"><span data-dcnode-id="3691" instrument_node=""> Five cohort studies involving 1,256,407 children, and five case-control studies involving 9,920 children were included in this analysis. The cohort data revealed no relationship between vaccination and autism …, nor was there a relationship between autism and MMR …, or thimerosal …, … Findings of this meta-analysis suggest that vaccinations are not associated with the development of autism or autism spectrum disorder. Furthermore, the components of the vaccines (thimerosal or mercury) or multiple vaccines (MMR) are not associated with the development of autism or autism spectrum disorder.</span><sup data-dcnode-id="3688"><a class="forwardref" data-dcnode-id="3689" data-html=" Taylor, L.E., Swerdfeger, A.L., and Eslick, G.D., Vaccines are not associated with autism: An evidence-based meta-analysis of case-control and cohort studies, <em>Vaccine</em> <strong>32</strong> :3623–3629, 2014 | doi:10.1016/j.vaccine.2014.04.085." data-offset="-10" data-variation="small wide"><span data-dcnode-id="3690" instrument_node="">63</span></a></sup></blockquote><span data-dcnode-id="3686" instrument_node=""> </span><p data-dcnode-id="3684"><span data-dcnode-id="3685" instrument_node="">Even autism advocacy organizations reject a link between vaccination and autism: </span></p><span data-dcnode-id="3683" instrument_node="">
</span><blockquote data-dcnode-id="3668"><span data-dcnode-id="3682" instrument_node=""> </span><a data-dcnode-id="3681" name="blame"></a><span data-dcnode-id="3680" instrument_node=""> </span><h4 data-dcnode-id="3678"><span data-dcnode-id="3679" instrument_node="">Are Vaccines to Blame?</span></h4><aside class="pullquote right" data-dcnode-id="3676" style="width: 200px;"><span data-dcnode-id="3677" instrument_node=""> Over the last two decades, extensive research has asked whether there is any link between childhood vaccinations and autism. The results of this research are clear: Vaccines do not cause autism. We urge that all children be fully vaccinated.—autismspeaks.org </span></aside><span data-dcnode-id="3675" instrument_node=""> </span><p data-dcnode-id="3670"><span data-dcnode-id="3674" instrument_node=""> Over the last two decades, extensive research has asked whether there is any link between childhood vaccinations and autism. The results of this research are clear: Vaccines do not cause autism. We urge that all children be fully vaccinated.</span><sup data-dcnode-id="3671"><a class="forwardref" data-dcnode-id="3672" data-html=" autismspeaks.org/what-autism/faq, accessed 21 Mar 2018." data-offset="-10" data-variation="small wide"><span data-dcnode-id="3673" instrument_node="">64</span></a></sup></p><span data-dcnode-id="3669" instrument_node="">
</span></blockquote><span data-dcnode-id="3667" instrument_node=""> </span><p data-dcnode-id="3661"><span data-dcnode-id="3666" instrument_node="">But like the whack-a-mole game, this charge keeps raising its head after being refuted repeatedly. In particular, the originator of the claim, Andrew Wakefield, has been thoroughly discredited for fraudulent research</span><sup data-dcnode-id="3663"><a class="forwardref" data-dcnode-id="3664" data-html=" Godlee, F., Smith, J., Marcovitch, H., ‘Wakefield’s article linking MMR vaccine and autism was fraudulent’, <em>British Medical Journal</em> <strong>342</strong> :c7452, 2011 | doi:10.1136/bmj.c7452." data-offset="-10" data-variation="small wide"><span data-dcnode-id="3665" instrument_node="">65</span></a></sup><span data-dcnode-id="3662" instrument_node=""> and was stripped of his medical licence in 2010 for showing “callous disregard” for children’s welfare. A 2019 review documented many studies showing no link between MMR vaccine and autism, and explained more how Wakefield’s shifting hypotheses are without foundation. The abstract explains how the “vaccination causes autism” claim is both wrong and dangerous: </span></p><span data-dcnode-id="3660" instrument_node="">
</span><blockquote data-dcnode-id="3655"><span data-dcnode-id="3659" instrument_node=""> Autism is a developmental disability that can cause significant social, communication, and behavioral challenges. A report published in 1998, but subsequently retracted by the journal, suggested that measles, mumps, and rubella (MMR) vaccine causes autism. However, autism is a neurodevelopmental condition that has a strong genetic component with genesis before one year of age, when MMR vaccine is typically administered. Several epidemiologic studies have not found an association between MMR vaccination and autism, including a study that found that MMR vaccine was not associated with an increased risk of autism even among high-risk children whose older siblings had autism. Despite strong evidence of its safety, some parents are still hesitant to accept MMR vaccination of their children. Decreasing acceptance of MMR vaccination has led to outbreaks or resurgence of measles. Health-care providers have a vital role in maintaining confidence in vaccination and preventing suffering, disability, and death from measles and other vaccine-preventable diseases.</span><sup data-dcnode-id="3656"><a class="forwardref" data-dcnode-id="3657" data-html=" DeStefano, F. and Shimabukuro, T.T., The MMR Vaccine and Autism, <em>Annual Review of Virology</em> <strong>6</strong> :585-600, Sep 2019 | doi:10.1146/annurev-virology-092818-015515." data-offset="-10" data-variation="small wide"><span data-dcnode-id="3658" instrument_node="">66</span></a></sup></blockquote><span data-dcnode-id="3654" instrument_node=""> </span><p data-dcnode-id="3652"><span data-dcnode-id="3653" instrument_node="">Also, and very importantly, if the autism really were due to thiomersal in vaccines, then removal of that from most vaccines should have caused reduction in autism rates. But they are rising instead. </span></p><span data-dcnode-id="3651" instrument_node="">
</span><section class="sidenote right" data-dcnode-id="3466" style="width: 400px"><span data-dcnode-id="3650" instrument_node=""> </span><a data-dcnode-id="3649" name="masks"></a><span data-dcnode-id="3648" instrument_node="">
</span><h2 data-dcnode-id="3646"><span data-dcnode-id="3647" instrument_node="">The science of masks</span></h2><span data-dcnode-id="3645" instrument_node="">
</span><p data-dcnode-id="3643"><span data-dcnode-id="3644" instrument_node=""> Normally this topic would be peripheral to the topic of vaccines. But during the 2020 C19 epidemic, many who oppose vaccination have also come out opposing masks. The reasoning in both cases relies on a lot of misunderstanding. </span></p><span data-dcnode-id="3642" instrument_node="">
</span><p data-dcnode-id="3634"><span data-dcnode-id="3641" instrument_node=""> People’s distrust of masks was hardly assuaged when the USA Surgeon General and the WHO first scoffed at masks. At </span><i data-dcnode-id="3639"><span data-dcnode-id="3640" instrument_node="">that</span></i><span data-dcnode-id="3638" instrument_node=""> time, the rejection of masks made no sense to me. After all, staff in operating theatres have worn masks for decades. On a more mundane level, we cover our mouths when we cough or sneeze (at least, we </span><i data-dcnode-id="3636"><span data-dcnode-id="3637" instrument_node="">should</span></i><span data-dcnode-id="3635" instrument_node="">). It is common sense that we should put some sort of barrier between our mouths and others. However, masks are still attacked with a number of false claims.</span></p><span data-dcnode-id="3633" instrument_node="">
</span><ul data-dcnode-id="3606"><span data-dcnode-id="3632" instrument_node="">
</span><li data-dcnode-id="3630"><span data-dcnode-id="3631" instrument_node=""> “Viruses are smaller than the holes in the mask, so masks can’t work.” However, viruses are carried in water droplets, carried on air currents. Many droplets are larger than mask holes, so they really are stopped by the mask. The fact that the mask gets moist is evidence that they are working as designed! Masks also reduce the forward air flow, so any droplets that get through are not carried as far.</span></li><span data-dcnode-id="3629" instrument_node="">
</span><li data-dcnode-id="3622"><span data-dcnode-id="3628" instrument_node=""> “There is no evidence that masks work.” As above, we have long known that it makes sense to put a barrier against airborne viruses. But we can also observe how masks hinder airflow. Slower air → lower distance that droplets can travel. This is good operational science!</span><a data-dcnode-id="3627" name="note-i"></a><span data-dcnode-id="3626" instrument_node=""> </span><sup data-dcnode-id="3623"><a data-dcnode-id="3624" href="#i"><span data-dcnode-id="3625" instrument_node="">i</span></a></sup></li><span data-dcnode-id="3621" instrument_node="">
</span><li data-dcnode-id="3619"><span data-dcnode-id="3620" instrument_node=""> “Masks deprive wearers of oxygen.” There is no evidence for this. I own a pulse oximeter, so tested myself with and without a mask. The mask had no effect on my blood oxygen saturation (O₂ sat) levels. A sample of one, I realize, but does anyone have evidence to the contrary? Also, mask critics can’t have it both ways: they can’t sensibly claim that masks can’t stop viruses because they are much smaller than mask holes, but these same holes hinder O₂ molecules, which are much, much smaller than viruses!</span></li><span data-dcnode-id="3618" instrument_node="">
</span><li data-dcnode-id="3608"><span data-dcnode-id="3617" instrument_node=""> “Masks are not 100% effective at stopping viruses.” The fallacy here is </span><i data-dcnode-id="3615"><span data-dcnode-id="3616" instrument_node="">making the perfect the enemy of the good.</span></i><span data-dcnode-id="3614" instrument_node=""> There are very few other areas of life where we decide that if we can’t have everything, we should have nothing. For example, covering your mouth when coughing or sneezing doesn’t stop all pathogens. Does this mean that we shouldn’t cover our mouths and stop most or even some of the germs? But infectious diseases specialist Dr Monica Gandhi found that ordinary masks stop about 80% of the droplets. The specialist N95 masks can stop 95%.</span><sup data-dcnode-id="3611"><a data-dcnode-id="3612" href="#ii"><span data-dcnode-id="3613" instrument_node="">ii</span></a></sup><a data-dcnode-id="3610" name="note-ii"></a><span data-dcnode-id="3609" instrument_node=""> Furthermore, there are at least two likely benefits from masks reducing virus transmission, even if they don’t quite eliminate it:</span></li><span data-dcnode-id="3607" instrument_node="">
</span></ul><span data-dcnode-id="3605" instrument_node="">
</span><blockquote data-dcnode-id="3571"><ol data-dcnode-id="3573"><span data-dcnode-id="3604" instrument_node="">
</span><li data-dcnode-id="3591"><span data-dcnode-id="3603" instrument_node=""> Even if masks are not 100% effective, reducing the infectious dose </span><i data-dcnode-id="3601"><span data-dcnode-id="3602" instrument_node="">(inoculum)</span></i><span data-dcnode-id="3600" instrument_node=""> of viruses would lower the </span><i data-dcnode-id="3598"><span data-dcnode-id="3599" instrument_node="">severity</span></i><span data-dcnode-id="3597" instrument_node=""> of disease. With a lower load to start with, by the time the immune system learns to attack the viruses, the number hasn’t got too large. With a larger starting load, the virus can become more numerous before immune system can defeat it. In the bad old days before chickenpox vaccines, it was well known that the first child who brings the pox home could have a mild illness, while the siblings could become much sicker. The reason is that the first child picked up a relatively low inoculum from brief contact with an infected classmates, but the siblings picked up a much higher dose from close and repeated contact with the first child.</span><sup data-dcnode-id="3594"><a data-dcnode-id="3595" href="#iii"><span data-dcnode-id="3596" instrument_node="">iii</span></a></sup><a data-dcnode-id="3593" name="note-iii"></a><span data-dcnode-id="3592" instrument_node="">
</span></li><span data-dcnode-id="3590" instrument_node="">
</span><li data-dcnode-id="3575"><span data-dcnode-id="3589" instrument_node=""> A reduced load could also stimulate the immune system without causing such a severe disease. This has been compared to </span><i data-dcnode-id="3587"><span data-dcnode-id="3588" instrument_node="">variolation</span></i><span data-dcnode-id="3586" instrument_node="">, the pre-vaccination way of immunization against full-blown smallpox.</span><sup data-dcnode-id="3583"><a data-dcnode-id="3584" href="#iii"><span data-dcnode-id="3585" instrument_node="">iv</span></a></sup><a data-dcnode-id="3582" name="note-iv"></a><span data-dcnode-id="3581" instrument_node=""> Variolation used a hopefully weakened form of the smallpox infectious agent to cause a milder skin infection. Variolation had about 10% of the mortality rate of full-blown smallpox, but was made obsolete by the far safer process of vaccination, which eventually wiped out smallpox.</span><sup data-dcnode-id="3578"><a data-dcnode-id="3579" href="#iv"><span data-dcnode-id="3580" instrument_node="">v</span></a></sup><a data-dcnode-id="3577" name="note-v"></a><span data-dcnode-id="3576" instrument_node="">
</span></li><span data-dcnode-id="3574" instrument_node="">
</span></ol><span data-dcnode-id="3572" instrument_node="">
</span></blockquote><span data-dcnode-id="3570" instrument_node=""> </span><ul data-dcnode-id="3557"><span data-dcnode-id="3569" instrument_node="">
</span><li data-dcnode-id="3559"><span data-dcnode-id="3568" instrument_node=""> There is further </span><i data-dcnode-id="3566"><span data-dcnode-id="3567" instrument_node="">prima facie</span></i><span data-dcnode-id="3565" instrument_node=""> evidence that masks really do hinder transmission of airborne viruses (which are really borne on water droplets) such as SARS-CoV-2. We have a sort of control, in another seasonal airborne virus, the one that causes influenza. In the Southern Hemisphere winter season of 2020, there were hardly any flu cases.</span><sup data-dcnode-id="3562"><a data-dcnode-id="3563" href="#vi"><span data-dcnode-id="3564" instrument_node="">vi/a&gt;</span></a></sup><a data-dcnode-id="3561" name="note-vi"></a><span data-dcnode-id="3560" instrument_node=""> It stands to reason that methods to control one specific airborne virus will have unintended benefits in controlling others. This is not just masks, but also social distancing and more frequent handwashing.</span></li><span data-dcnode-id="3558" instrument_node="">
</span></ul><span data-dcnode-id="3556" instrument_node="">
</span><p data-dcnode-id="3539"><span data-dcnode-id="3555" instrument_node=""> In general, CMI is </span><i data-dcnode-id="3553"><span data-dcnode-id="3554" instrument_node="">pro-Bible,</span></i><span data-dcnode-id="3552" instrument_node=""> not anti-establishment for its own sake. Our differences are not with operational science claims about the </span><i data-dcnode-id="3550"><span data-dcnode-id="3551" instrument_node="">present</span></i><span data-dcnode-id="3549" instrument_node="">, but mainly with their false histories about the </span><i data-dcnode-id="3547"><span data-dcnode-id="3548" instrument_node="">past</span></i><span data-dcnode-id="3546" instrument_node="">, and to a lesser extent, dubious modelling about the </span><i data-dcnode-id="3544"><span data-dcnode-id="3545" instrument_node="">future</span></i><span data-dcnode-id="3543" instrument_node="">, such as </span><a data-dcnode-id="3541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creation.com/climate-change"><span data-dcnode-id="3542" instrument_node="">global warming alarmism</span></a><span data-dcnode-id="3540" instrument_node="">. Indeed, the fact that we are young-earth creationists and alarmism-skeptics shows that we dont blindly trust claims. For example, as above, I was skeptical of the original scoffing at masks. </span></p><span data-dcnode-id="3538" instrument_node="">
</span><p data-dcnode-id="3530"><span data-dcnode-id="3537" instrument_node=""> None of the above means that we necessarily agree with all decisions made by politicians and bureaucrats. Many of them have only themselves to blame for the distrust many people have. E.g. the original scoffing at masks has made many skeptical, despite all their rationalizations for their original stand. People also wonder why large crowds at church services are super-spreader events, but large crowds at protests, casinos, marijuana and alcohol stores are safe. Similarly, apparently ‘elective’ surgeries or heart ablations must be delayed, while abortion is an ‘essential’ medical procedure—yet we were always told that it was ‘choice‘ which by definition is </span><i data-dcnode-id="3535"><span data-dcnode-id="3536" instrument_node="">elective.</span></i><span data-dcnode-id="3534" instrument_node=""> The Christian satire site </span><i data-dcnode-id="3532"><span data-dcnode-id="3533" instrument_node="">The Babylon Bee</span></i><span data-dcnode-id="3531" instrument_node=""> even published articles satirizing the hypocrisy, e.g. “WHO scientists confirm coronavirus only spreads at conservative protests” and “In show of solidarity, COVID-19 vows not to infect anyone protesting inequality”. </span></p><span data-dcnode-id="3529" instrument_node="">
</span><p data-dcnode-id="3527"><span data-dcnode-id="3528" instrument_node=""> But the bottom line is that the real operational science about masks is independent of what bad-faith politicians and bureaucrats claim. </span></p><span data-dcnode-id="3526" instrument_node="">
</span><h3 data-dcnode-id="3524"><span data-dcnode-id="3525" instrument_node="">References and notes</span></h3><span data-dcnode-id="3523" instrument_node="">

</span><li data-dcnode-id="3503"><span data-dcnode-id="3508" instrument_node=""> </span><a data-dcnode-id="3507" name="iii"></a><span data-dcnode-id="3506" instrument_node="">Lally, M., How catching chickenpox from a sibling makes it worse: Rosie got it from her big sister and ended up on a drip in hospital, dailymail.co.uk, 21 Jul 2015. </span><a data-dcnode-id="3504" href="#note-iii"><span data-dcnode-id="3505" instrument_node="">Return to text.</span></a></li><span data-dcnode-id="3502" instrument_node="">
</span><li data-dcnode-id="3490"><span data-dcnode-id="3501" instrument_node=""> </span><a data-dcnode-id="3500" name="iv"></a><span data-dcnode-id="3499" instrument_node="">Gandhi, M. and Rutherford, G.W., Facial masking for Covid-19 — Potential for “variolation” as we await a vaccine, </span><i data-dcnode-id="3497"><span data-dcnode-id="3498" instrument_node="">New England J. Medicine</span></i><span data-dcnode-id="3496" instrument_node=""> </span><b data-dcnode-id="3494"><span data-dcnode-id="3495" instrument_node="">383</span></b><span data-dcnode-id="3493" instrument_node=""> :e101, 29 Oct 2020. </span><a data-dcnode-id="3491" href="#note-iv"><span data-dcnode-id="3492" instrument_node="">Return to text.</span></a></li><span data-dcnode-id="3489" instrument_node="">
</span><li data-dcnode-id="3477"><span data-dcnode-id="3488" instrument_node=""> </span><a data-dcnode-id="3487" name="v"></a><span data-dcnode-id="3486" instrument_node="">Cosner, L., Smallpox: Medical victory over a devastating plague, </span><i data-dcnode-id="3484"><span data-dcnode-id="3485" instrument_node="">Creation</span></i><span data-dcnode-id="3483" instrument_node=""> </span><b data-dcnode-id="3481"><span data-dcnode-id="3482" instrument_node="">42</span></b><span data-dcnode-id="3480" instrument_node=""> (4):48–50, 2020. </span><a data-dcnode-id="3478" href="#note-v"><span data-dcnode-id="3479" instrument_node="">Return to text.</span></a></li><span data-dcnode-id="3476" instrument_node="">
</span><li data-dcnode-id="3470"><span data-dcnode-id="3475" instrument_node=""> </span><a data-dcnode-id="3474" name="vi"></a><span data-dcnode-id="3473" instrument_node="">Peek, K., Flu season never came to the Southern Hemisphere: Mask wearing and social distancing for COVID-19 may have cut influenza cases south of the equator, scientificamerican.com, 30 Sep 2020. </span><a data-dcnode-id="3471" href="#note-vi"><span data-dcnode-id="3472" instrument_node="">Return to text.</span></a></li><span data-dcnode-id="3469" instrument_node="">
</span></ol><span data-dcnode-id="3467" instrument_node="">
