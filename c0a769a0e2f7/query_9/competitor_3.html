</span></section><span data-dcnode-id="5949" instrument_node=""> </span><h5 data-dcnode-id="5948"></h5><span data-dcnode-id="5947" instrument_node=""> </span><figure class="right" data-dcnode-id="5941" style="max-width: 300px"><small data-dcnode-id="5945"><span data-dcnode-id="5946" instrument_node="">Wikipedia.org</span></small><img alt="Edward-Jenner" data-dcnode-id="5944" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dl0.creation.com/articles/p124/c12495/Edward-Jenner.jpg&amp;raw"><figcaption data-dcnode-id="5942"><span data-dcnode-id="5943" instrument_node="">Edward Jenner, inventor of vaccination</span></figcaption></figure><span data-dcnode-id="5940" instrument_node=""> </span><p data-dcnode-id="5934"><b data-dcnode-id="5935"><span data-dcnode-id="5939" instrument_node="">This article has become quite long (about 80 printed pages), so readers can skip directly to the </span><a data-dcnode-id="5937" href="#summary"><span data-dcnode-id="5938" instrument_node="">summary of the main points</span></a><span data-dcnode-id="5936" instrument_node="">. But the main text has much deeper explanations and supporting sources.</span></b></p><span data-dcnode-id="5933" instrument_node="">
</span><a data-dcnode-id="5932" name="introduction"></a><span data-dcnode-id="5931" instrument_node="">
</span><h2 data-dcnode-id="5929"><span data-dcnode-id="5930" instrument_node="">In­tro­duc­tion</span></h2><span data-dcnode-id="5928" instrument_node="">
</span><p data-dcnode-id="5926"><span data-dcnode-id="5927" instrument_node=""> As a biblical, scientific or­ga­ni­za­tion, we often get asked by inquirers about our position on a range of related issues. One such issue is vaccinations. We realize that for some this is a highly charged issue that can engender strong emotions. Unfortunately, there is much confusion and even emotion, even in Christian circles, as a result of misinformation that is proliferated on the Internet. Often, with Christians, much of the thinking is driven by well-meaning, but misapplied biblical statements and, in some cases, even conspiratorial (anti-government or anti-establishment) constructs—an area outside of CMI’s purview. </span></p><span data-dcnode-id="5925" instrument_node="">
</span><aside class="pullquote left" data-dcnode-id="5923" style="width: 200px;"><span data-dcnode-id="5924" instrument_node=""> If sanitation and nutrition were the main causes of infectious disease reduction, then we would have seen these diseases disappear almost simultaneously. But the contrary is true: the diseases disappeared at different times, which correlated strongly with the introduction of specific vaccines for these diseases </span></aside><span data-dcnode-id="5922" instrument_node=""> </span><p data-dcnode-id="5911"><span data-dcnode-id="5921" instrument_node=""> CMI takes a generally pro-vaccination position, as the best trade-off in this fallen world, because the benefits overall greatly outweigh the harms. This is consistent with a Christian ministry, because disease and suffering are the results of the Curse at the Fall. Biblical writers praise God for healing, i.e. alleviating effects of the Curse, in </span><a class="rtBibleRef" data-dcnode-id="5919" data-purpose="bible-reference" data-reference="Hos 6.1" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/esv/Hos%25206.1" rel="noopener" target="_blank"><span data-dcnode-id="5920" instrument_node="">Hosea 6:1</span></a><span data-dcnode-id="5918" instrument_node="">, </span><a class="rtBibleRef" data-dcnode-id="5916" data-purpose="bible-reference" data-reference="Job 5.18" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/esv/Job%25205.18" rel="noopener" target="_blank"><span data-dcnode-id="5917" instrument_node="">Job 5:18</span></a><span data-dcnode-id="5915" instrument_node="">, and </span><a class="rtBibleRef" data-dcnode-id="5913" data-purpose="bible-reference" data-reference="Ps 147.3" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/esv/Ps%2520147.3" rel="noopener" target="_blank"><span data-dcnode-id="5914" instrument_node="">Psalm 147:3</span></a><span data-dcnode-id="5912" instrument_node="">; Jesus exemplified this in His earthly ministry. </span></p><span data-dcnode-id="5910" instrument_node="">
</span><p data-dcnode-id="5908"><span data-dcnode-id="5909" instrument_node=""> It is a scientific and historical fact that vaccines have saved millions of lives. Thus, as a part of our duty of care for our staff and supporters, we should support medical treatments with a proven record of high safety and effectiveness. </span></p><span data-dcnode-id="5907" instrument_node="">
</span><p data-dcnode-id="5899"><span data-dcnode-id="5906" instrument_node=""> And at my suggestion, the CMI-US office, following the biblical principle of proper care for workers (</span><a class="rtBibleRef" data-dcnode-id="5904" data-purpose="bible-reference" data-reference="Col 4.1" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/esv/Col%25204.1" rel="noopener" target="_blank"><span data-dcnode-id="5905" instrument_node="">Colossians 4:1</span></a><span data-dcnode-id="5903" instrument_node="">, </span><a class="rtBibleRef" data-dcnode-id="5901" data-purpose="bible-reference" data-reference="Eph 6.9" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/esv/Eph%25206.9" rel="noopener" target="_blank"><span data-dcnode-id="5902" instrument_node="">Ephesians 6:9</span></a><span data-dcnode-id="5900" instrument_node="">), pays for influenza (‘flu’) shots for all employees and their dependent family members, if they choose to obtain them. The CMI-AU office has followed suit. </span></p><span data-dcnode-id="5898" instrument_node="">
</span><p data-dcnode-id="5896"><span data-dcnode-id="5897" instrument_node=""> We think we have a duty-of-care to protect our families and also not to bring the ’flu back to the office to the rest of the staff, etc. Actually, even apart from the principle of care, it has a sound economic basis: just one or two employees off work for a week would cost the ministry (and thus its supporters) many times more than the cost of flu shots for all. Indeed, our speakers when on ministry are at greater risk than otherwise through shaking dozens of hands of well-wishers at ministry events. </span></p><span data-dcnode-id="5895" instrument_node="">
</span><p data-dcnode-id="5893"><span data-dcnode-id="5894" instrument_node=""> Note that the influenza virus kills tens of thousands of people in the US alone every year, and statistics show that most of these victims are unvaccinated. It is not just a bad cold, even though sometimes a bad cold is misnamed ‘the flu’. As will be shown, the disease now called Covid-19 is about 30 times deadlier than the flu. </span></p><span data-dcnode-id="5892" instrument_node="">
</span><br data-dcnode-id="5891"><span data-dcnode-id="5890" instrument_node=""> </span><center data-dcnode-id="5884"><span data-dcnode-id="5889" instrument_node=""> </span><b data-dcnode-id="5886"><a data-dcnode-id="5887" href="#contents"><span data-dcnode-id="5888" instrument_node="">Back to contents</span></a></b><span data-dcnode-id="5885" instrument_node=""> </span></center><span data-dcnode-id="5883" instrument_node=""> </span><a data-dcnode-id="5882" name="preamble"></a><span data-dcnode-id="5881" instrument_node="">
</span><h2 data-dcnode-id="5879"><span data-dcnode-id="5880" instrument_node="">Theological and philosophical preamble</span></h2><span data-dcnode-id="5878" instrument_node="">
</span><p data-dcnode-id="5876"><span data-dcnode-id="5877" instrument_node=""> Because of Adam’s sin, God cursed the entire creation. This is why humans and animals are now afflicted with death and disease. This curse is still in effect, as shown by the obvious fact that Christians still die. While we also believe that God can heal the sick, this curse that has affected the whole of creation won’t be completely undone until the final resurrection bodies, as per the closing chapters of Revelation with their Edenic allusions. </span></p><span data-dcnode-id="5875" instrument_node="">
</span><p data-dcnode-id="5870"><span data-dcnode-id="5874" instrument_node=""> It is also clear that God doesn’t always heal the sick supernaturally. Millions of devout people have died of infectious diseases throughout history. So, using modern medicine is no more a lack of faith than putting a seatbelt on you and your children, and hoping God will heal them </span><em data-dcnode-id="5872"><span data-dcnode-id="5873" instrument_node="">after</span></em><span data-dcnode-id="5871" instrument_node=""> an accident. Indeed, the Bible also teaches, especially by the example of Christ, that ameliorating the effects of the Curse is a blessing—He healed many diseases and disabilities and we would endorse praying for healing at all times. Any medical advance, backed by rigorous scientific testing, that can prevent or cure infectious diseases though, is thus following the example of Christ. </span></p><span data-dcnode-id="5869" instrument_node="">
</span><p data-dcnode-id="5858"><span data-dcnode-id="5868" instrument_node=""> As explained later, God’s sovereignty means that even natural (which God made anyway) or man-made medicines (within the boundaries of the </span><a class="rtBibleRef" data-dcnode-id="5866" data-purpose="bible-reference" data-reference="Gen 1.28" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/esv/Gen%25201.28" rel="noopener" target="_blank"><span data-dcnode-id="5867" instrument_node="">Genesis 1:28</span></a><span data-dcnode-id="5865" instrument_node=""> Dominion Mandate) are also His means of healing. As CMI has often explained, what we call ‘natural laws’ are really our descriptions of God’s normal, regular, repeatable way of upholding His creation; miracles are God’s extraordinary non-repeatable way of upholding His creation, or an </span><em data-dcnode-id="5863"><span data-dcnode-id="5864" instrument_node="">addition</span></em><span data-dcnode-id="5862" instrument_node=""> to the ordinary ‘natural law’ way He normally acts.</span><sup data-dcnode-id="5859"><a class="forwardref" data-dcnode-id="5860" data-html=" Sarfati, J., <a href=&quot;/miracles-and-science&quot;>Miracles and science</a>, creation.com/miracles, 1 Sep 2006." data-offset="-10" data-variation="small wide"><span data-dcnode-id="5861" instrument_node="">1</span></a></sup></p><span data-dcnode-id="5857" instrument_node="">
</span><p data-dcnode-id="5838"><span data-dcnode-id="5856" instrument_node=""> CMI is also </span><em data-dcnode-id="5854"><span data-dcnode-id="5855" instrument_node="">not</span></em><span data-dcnode-id="5853" instrument_node=""> anti-establishment, anti-government or anti-majority for its own sake, but </span><em data-dcnode-id="5851"><span data-dcnode-id="5852" instrument_node="">pro-Bible.</span></em><span data-dcnode-id="5850" instrument_node=""> We would oppose the establishment or the majority view of scientists only when it conflicts with the Bible (as we do with evolution theory), and </span><a data-dcnode-id="5848" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creation.com/cmi-rejects-conspiracy-theory"><span data-dcnode-id="5849" instrument_node="">reject conspiratorial theorizing</span></a><span data-dcnode-id="5847" instrument_node="">.</span><sup data-dcnode-id="5844"><a class="forwardref" data-dcnode-id="5845" data-html=" Carter, R. and Sarfati, J., <a href=&quot;/cmi-rejects-conspiracy-theory&quot;>Why CMI rejects ‘conspiracy’ theorizing</a> creation.com/conspiracy, 13 Apr 2017." data-offset="-10" data-variation="small wide"><span data-dcnode-id="5846" instrument_node="">2</span></a></sup><span data-dcnode-id="5843" instrument_node=""> To do otherwise would, for one thing, involve needlessly trying to fight a battle on multiple fronts. Thus, for example, CMI does not oppose the majority view of physicists in favour of relativity and quantum mechanics, since neither of these views conflicts with Scripture. Most creationist physicists support these well-established theories, too.</span><sup data-dcnode-id="5840"><a class="forwardref" data-dcnode-id="5841" data-html=" Sarfati, J., <a href=&quot;/creationists-quantum-mechanics&quot;>Should creationists accept quantum mechanics?</a> <em>J. Creation</em> 26(1):116–123, 2012." data-offset="-10" data-variation="small wide"><span data-dcnode-id="5842" instrument_node="">3</span></a></sup><span data-dcnode-id="5839" instrument_node=""> The same goes with vaccination, supported by the vast majority of medical doctors and scientists—including creationists in those fields. </span></p><span data-dcnode-id="5837" instrument_node="">
</span><br data-dcnode-id="5836"><span data-dcnode-id="5835" instrument_node=""> </span><center data-dcnode-id="5829"><span data-dcnode-id="5834" instrument_node=""> </span><b data-dcnode-id="5831"><a data-dcnode-id="5832" href="#contents"><span data-dcnode-id="5833" instrument_node="">Back to contents</span></a></b><span data-dcnode-id="5830" instrument_node=""> </span></center><span data-dcnode-id="5828" instrument_node=""> </span><a data-dcnode-id="5827" name="immune-system"></a><span data-dcnode-id="5826" instrument_node="">
</span><h2 data-dcnode-id="5824"><span data-dcnode-id="5825" instrument_node="">Our God-given trainable immune system</span></h2><span data-dcnode-id="5823" instrument_node="">
</span><p data-dcnode-id="5821"><span data-dcnode-id="5822" instrument_node=""> God has given us an immune system. This would have had a pre-Fall role in differentiating self and non-self, but in this fallen world, it also fights against invading microbes. However, because we are fallen creatures, this system doesn’t work perfectly, as shown by the millions of deaths from infectious diseases throughout history (the 1918 Spanish flu epidemic is thought to have killed up to 100 million people or 3% of the world’s population at the time—including great numbers of Christians). </span></p><span data-dcnode-id="5820" instrument_node="">
</span><p data-dcnode-id="5809"><span data-dcnode-id="5819" instrument_node=""> The immune system comprises two parts: the </span><em data-dcnode-id="5817"><span data-dcnode-id="5818" instrument_node="">innate</span></em><span data-dcnode-id="5816" instrument_node=""> immune system and the </span><em data-dcnode-id="5814"><span data-dcnode-id="5815" instrument_node="">adaptive</span></em><span data-dcnode-id="5813" instrument_node=""> immune system (also called specific or acquired immune system). The innate immune system includes anatomical barriers, the inflammation reaction, and many of the white blood cells. The adaptive immune system responds to specific pathogens. (For much more information, see </span><a data-dcnode-id="5811" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creation.com/immune-system"><span data-dcnode-id="5812" instrument_node=""> Your ingenious immune system: Cleverly configured to devour, deactivate, and destroy</span></a><span data-dcnode-id="5810" instrument_node="">. </span></p><span data-dcnode-id="5808" instrument_node="">
</span><p data-dcnode-id="5800"><span data-dcnode-id="5807" instrument_node=""> The adaptive immune system is demonstrably ‘trainable’ (a great example of intelligent design)—in many cases, survivors of a disease become immune to further attacks of this disease. This had been observed for centuries before the physiology and cell biology of the immune system were discovered. For example, although smallpox had a </span><a data-dcnode-id="5805" href="#mortality"><span data-dcnode-id="5806" instrument_node="">mortality rate</span></a><span data-dcnode-id="5804" instrument_node=""> of about a third, survivors never got it again. From this, many researched ways of acquiring this immunity without the dreadful ‘side-effect’ of the full-blown disease. First, this was via crude inoculations of powdered smallpox scabs, with much weakened but still live smallpox germs. This was called </span><i data-dcnode-id="5802"><span data-dcnode-id="5803" instrument_node="">variolation</span></i><span data-dcnode-id="5801" instrument_node="">, and had about 10% of the mortality rate than full-blown smallpox, but still the famous American theologian and preacher Jonathan Edwards (1703–1758), a strong advocate of variolation, died from it. </span></p><span data-dcnode-id="5799" instrument_node="">
</span><p data-dcnode-id="5794"><span data-dcnode-id="5798" instrument_node="">However, General George Washington ordered the whole continental Army to be variolated. At the time, smallpox was killing more of his army than the British troops were. So Washington thought that variolation was an acceptable relative risk (~10%). His actions probably won the War of Independence. Modern vacinations have a </span><i data-dcnode-id="5796"><span data-dcnode-id="5797" instrument_node="">far</span></i><span data-dcnode-id="5795" instrument_node=""> lower relative risk, under 0.1%.</span></p><span data-dcnode-id="5793" instrument_node="">
</span><a data-dcnode-id="5792" name="definition"></a><span data-dcnode-id="5791" instrument_node="">
</span><h2 data-dcnode-id="5789"><span data-dcnode-id="5790" instrument_node="">What is vaccination?</span></h2><span data-dcnode-id="5788" instrument_node="">
</span><figure class="left" data-dcnode-id="5784" style="max-width: 300px"><img alt="Louis-Pasteur" data-dcnode-id="5787" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dl0.creation.com/articles/p124/c12495/Louis-Pasteur.jpg&amp;raw"><figcaption data-dcnode-id="5785"><span data-dcnode-id="5786" instrument_node="">Louis Pasteur, inventor of rabies vaccines</span></figcaption></figure><span data-dcnode-id="5783" instrument_node=""> </span><p data-dcnode-id="5781"><span data-dcnode-id="5782" instrument_node=""> Smallpox prevention was much improved when doctors observed that maids who suffered from the mild disease cowpox were likewise immune to smallpox. So, Edward Jenner (1749–1823) in 1798 used material from cowpox blisters to inoculate patients successfully against smallpox. </span></p><span data-dcnode-id="5780" instrument_node="">
</span><p data-dcnode-id="5775"><span data-dcnode-id="5779" instrument_node=""> With the development of the germ theory of disease, and the rejection of spontaneous generation, by creationist Louis Pasteur (1822–1895), the methods could be further improved by using </span><em data-dcnode-id="5777"><span data-dcnode-id="5778" instrument_node="">dead</span></em><span data-dcnode-id="5776" instrument_node=""> microbes, which cause no disease at all. He demonstrated this by showing that rabies vaccine would prevent the development of this almost always fatal disease—he gave it to Joseph Meister, a 9-year-old boy bitten severely by a rabid dog (1876–1940). No amount of nutritional measures or hygiene had ever prevented the development of rabies in people who had been mauled by rabid dogs. </span></p><span data-dcnode-id="5774" instrument_node="">
</span><p data-dcnode-id="5769"><span data-dcnode-id="5773" instrument_node=""> </span><strong data-dcnode-id="5771"><span data-dcnode-id="5772" instrument_node="">Thus, a vaccine can be defined as any biological entity that can train the adaptive immune system to give it ‘target practice’. As a result, if it encounters the live pathogen, it is ready for it. </span></strong><span data-dcnode-id="5770" instrument_node=""> Because the germ has little chance to multiply to dangerous levels, a vaccinated person usually doesn’t develop an illness at all or gets it much less severely. </span></p><span data-dcnode-id="5768" instrument_node="">
</span><p data-dcnode-id="5766"><span data-dcnode-id="5767" instrument_node=""> So, vaccination has saved millions of lives, and prevented severe injuries in millions more. One of our own senior staff was a practising medical doctor for many years and has seen firsthand the baneful effects and damage caused by people contracting such preventable diseases, including brain damage, in unvaccinated children. </span></p><span data-dcnode-id="5765" instrument_node="">
</span><p data-dcnode-id="5754"><span data-dcnode-id="5764" instrument_node=""> A vaccine can take many forms. The original one was material from a cowpox sore. The most common vaccines use dead or highly weakened (</span><em data-dcnode-id="5762"><span data-dcnode-id="5763" instrument_node="">attenuated</span></em><span data-dcnode-id="5761" instrument_node="">) germs. Some use parts of germs, such as the aP in TDaP that stands for </span><i data-dcnode-id="5759"><span data-dcnode-id="5760" instrument_node="">aceullar Pertussis.</span></i><span data-dcnode-id="5758" instrument_node=""> With some diseases, it’s not so much the germ that kills but an extremely potent toxin, lethal in smaller doses than needed to stimulate the immune system. So vaccines against these diseases are based </span><i data-dcnode-id="5756"><span data-dcnode-id="5757" instrument_node="">toxoids,</span></i><span data-dcnode-id="5755" instrument_node=""> i.e. deactivated toxins. These include the tetanus and diphtheria vaccines, which train the immune system to attack the toxins quickly. </span></p><span data-dcnode-id="5753" instrument_node="">
</span><p data-dcnode-id="5748"><span data-dcnode-id="5752" instrument_node=""> Scientists have developed other types of vaccines, as will be shown in the next subsection. Despite what some critics claim, they </span><b data-dcnode-id="5750"><span data-dcnode-id="5751" instrument_node="">are</span></b><span data-dcnode-id="5749" instrument_node=""> vaccines according to the standard definition above. </span></p><span data-dcnode-id="5747" instrument_node="">
</span><a data-dcnode-id="5746" name="recombinant"></a><span data-dcnode-id="5745" instrument_node="">
</span><h3 data-dcnode-id="5743"><span data-dcnode-id="5744" instrument_node="">Recombinant (subunit) vaccines</span></h3><span data-dcnode-id="5742" instrument_node="">
</span><p data-dcnode-id="5737"><span data-dcnode-id="5741" instrument_node=""> A newer type, </span><i data-dcnode-id="5739"><span data-dcnode-id="5740" instrument_node="">recombinant vaccines,</span></i><span data-dcnode-id="5738" instrument_node=""> uses genetic engineering to make a protein subunit fromthe outside of the germ that the immune system targets. This combines the gene for this protein into another virus, lets that multiply, say in insect cells, then the protein is harvested, and used to make the vaccine that contains no virus genetic material, live or dead. One type of influenza vaccine is recombinant, and can be used for people allergic to eggs, and the Hepatitis B and HVP vaccines are also recombinant, as is the newer and much more effective shingles vaccine Shingrix. </span></p><span data-dcnode-id="5736" instrument_node="">
</span><p data-dcnode-id="5728"><span data-dcnode-id="5735" instrument_node=""> The new and effective </span><a data-dcnode-id="5733" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creation.com/ebola-fall"><span data-dcnode-id="5734" instrument_node="">Ebola</span></a><span data-dcnode-id="5732" instrument_node=""> vaccine with the brand name Ervebo is a recombinant vaccine. Its technical name is Recombinant vesicular stomatitis virus–Zaire Ebola virus (rVSV-ZEBOV). It is </span><a data-dcnode-id="5730" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creation.com/ebola-fall%23update"><span data-dcnode-id="5731" instrument_node="">95–100% effective</span></a><span data-dcnode-id="5729" instrument_node="">. </span></p><span data-dcnode-id="5727" instrument_node="">
</span><p data-dcnode-id="5722"><span data-dcnode-id="5726" instrument_node=""> Conjugate vaccines are made in a similar way, but use recombinant technology to combine two or more pieces from the coat (carbohydrate pluys carrier protein) of a disease-causing bacterium, such as </span><i data-dcnode-id="5724"><span data-dcnode-id="5725" instrument_node="">Pneumococcus</span></i><span data-dcnode-id="5723" instrument_node="">, which train the immune system without needing whole bacterial cells. </span></p><span data-dcnode-id="5721" instrument_node="">
</span><br data-dcnode-id="5720"><span data-dcnode-id="5719" instrument_node=""> </span><center data-dcnode-id="5713"><span data-dcnode-id="5718" instrument_node=""> </span><b data-dcnode-id="5715"><a data-dcnode-id="5716" href="#contents"><span data-dcnode-id="5717" instrument_node="">Back to contents</span></a></b><span data-dcnode-id="5714" instrument_node=""> </span></center><span data-dcnode-id="5712" instrument_node=""> </span><a data-dcnode-id="5711" name="aav"></a><span data-dcnode-id="5710" instrument_node="">
</span><h3 data-dcnode-id="5708"><span data-dcnode-id="5709" instrument_node="">Adeno-associated viral (AAV) vector vaccines</span></h3><span data-dcnode-id="5707" instrument_node="">
</span><p data-dcnode-id="5705"><span data-dcnode-id="5706" instrument_node=""> Adeno-associated viruses (AAV) infect some primates, but are not known to cause any disease. However, they can be used to insert genes and specific parts of specific chromosomes. They have already been used, and approved by the FDA, to cure hereditary types of blindness called Leber’s Congenital Amaurosis (LCA) and Retinitis Pigmentosa (RP). The AAVs are used to replace the mutant LCA or RP gene with a healthy gene, so that the cell can detect light again. This is morally acceptable, in line with the biblical principle of alleviating the effects of the curse. This treatment restores the eye to its original created function from its fallen condition of blindness. There is no difference in principle between this and with replacing a defective heart valve with one from a pig. </span></p><span data-dcnode-id="5704" instrument_node="">
</span><p data-dcnode-id="5693"><span data-dcnode-id="5703" instrument_node=""> The AstraZeneca/Oxford vaccine trials and Janssen Pharmaceuticals (owned by Johnson &amp; Johnson) are using the same proven, approved, and safe technology to make a vaccine against SARS-CoV-2, the coronavirus that causes COVID-19. In this case, instead of delivering a healthy copy of a human gene, it inserts the genetic instructions for ‘spike’ protein on the SARS-CoV-2 into special cells of the immune system called </span><i data-dcnode-id="5701"><span data-dcnode-id="5702" instrument_node="">dendritic cells.</span></i><span data-dcnode-id="5700" instrument_node="">. The spike protein is the part of the virus that enables it to infect the cell (and despite the name, it is rather flat-topped rather than pointy). Dendritic cells process anitgens and present them on the cell surface for the T-cells to process and train. Then the immune system will respond to that spike protein that comes without a dangerous virus. </span><i data-dcnode-id="5698"><span data-dcnode-id="5699" instrument_node="">Note that the person’s genome and reproductive cells will not be modified.</span></i><span data-dcnode-id="5697" instrument_node=""> All that happens is that the immune system will be trained to recognize that spike as an enemy. So when the spike is attached to SARS-CoV-2, the immune system will be ready to destroy the invading virus. (See </span><a class="externalUrl" data-dcnode-id="5695" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3D2NDc9Q_m-W0" rel="nofollow"><span data-dcnode-id="5696" instrument_node="">How COVID-19 Viral Vector Vaccines Work</span></a><span data-dcnode-id="5694" instrument_node=""> by Vaccine Makers Project.)</span></p><span data-dcnode-id="5692" instrument_node="">
</span><p data-dcnode-id="5681"><span data-dcnode-id="5691" instrument_node="">An especially good point about using the spike protein as an antigen is that the immune system will make mainly </span><i data-dcnode-id="5689"><span data-dcnode-id="5690" instrument_node="">neutralizing antibodies</span></i><span data-dcnode-id="5688" instrument_node="">. These are a type of antibody that neutralizes the pathogen, i.e. stops it from being infectious all by itself. By binding to the viral spike protein, the neutralizing antibody stops the virus from infecting the cells. Thus this type of immunity is called </span><i data-dcnode-id="5686"><span data-dcnode-id="5687" instrument_node="">sterilizing immunity</span></i><span data-dcnode-id="5685" instrument_node="">—the germ can’t infect, and it’s just a matter of time before the immune system destroys it. Non-neutralizing or binding antibodies are still useful, because they tag the pathogen for destruction by immune cells, but don’t by themselves stop the germ from being infectious. This is probably why the Chinese vaccines, made by the traditional method of using dead viruses, are less effective—</span><a class="externalUrl" data-dcnode-id="5683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/d41586-021-02796-w" rel="nofollow"><span data-dcnode-id="5684" instrument_node="">CoronaVac was 51% and Sinopharm 79% effective at preventing symptomatic disease</span></a><span data-dcnode-id="5682" instrument_node="">.</span></p><span data-dcnode-id="5680" instrument_node="">
</span><p data-dcnode-id="5678"><span data-dcnode-id="5679" instrument_node=""> Johnson &amp; Johnson announced on 29 Jan 2021 that its Ad26.COV2.S or JNJ-78436735 AAV vaccine was 66% effective in a one-dose regimen. But it’s even better than that number suggests. Around the world it had 85% efficacy in preventing hospitalization and death in the vaccinated trial group of the trial after 28 days, and after 49 days, there were no cases of hospitalization or death among the vaccinated. This has several advantages over the mRNA vaccines: it is more stable, and it needs only one dose. It also has fewer side-effects. The vaccinated group in the trial had fewer fevers than those in the placebo group. </span></p><span data-dcnode-id="5677" instrument_node="">
</span><p data-dcnode-id="5672"><span data-dcnode-id="5676" instrument_node=""> One of the approved vaccines for </span><a data-dcnode-id="5674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creation.com/ebola-fall"><span data-dcnode-id="5675" instrument_node="">Ebola</span></a><span data-dcnode-id="5673" instrument_node=""> is a two-dose regimen, comprising the AAV-developed vaccine Ad26.ZEBOV first, followed by Modified Vaccinia Virus Ankara – Bavarian Nordic (MVA-BN) Filo-vector. The vector viruses are modified so they are unable to cause diseases or even reproduce. </span></p><span data-dcnode-id="5671" instrument_node="">
</span><br data-dcnode-id="5670"><span data-dcnode-id="5669" instrument_node=""> </span><center data-dcnode-id="5663"><span data-dcnode-id="5668" instrument_node=""> </span><b data-dcnode-id="5665"><a data-dcnode-id="5666" href="#contents"><span data-dcnode-id="5667" instrument_node="">Back to contents</span></a></b><span data-dcnode-id="5664" instrument_node=""> </span></center><span data-dcnode-id="5662" instrument_node=""> </span><a data-dcnode-id="5661" name="RNA"></a><span data-dcnode-id="5660" instrument_node="">
</span><h3 data-dcnode-id="5658"><span data-dcnode-id="5659" instrument_node="">RNA vaccines</span></h3><span data-dcnode-id="5657" instrument_node="">
</span><p data-dcnode-id="5649"><span data-dcnode-id="5656" instrument_node=""> The newest type is probably </span><i data-dcnode-id="5654"><span data-dcnode-id="5655" instrument_node="">RNA vaccines,</span></i><span data-dcnode-id="5653" instrument_node=""> also called </span><i data-dcnode-id="5651"><span data-dcnode-id="5652" instrument_node="">mRNA vaccines</span></i><span data-dcnode-id="5650" instrument_node=""> because messenger RNA is used. In the USA, the most commonly administered vaccines against SARS-CoV-2, Moderna and Pfizer, are RNA vaccines. </span></p><span data-dcnode-id="5648" instrument_node="">
</span><p data-dcnode-id="5640"><span data-dcnode-id="5647" instrument_node=""> The principle is that RNA is temporarily protected inside a fat globule, and taken up by dentritic cells. The </span><a data-dcnode-id="5645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creation.com/media-center/youtube/protein-synthesis-dna-translation-m-rna-transcription"><span data-dcnode-id="5646" instrument_node=""> RNA is then translated to make the spike protein</span></a><span data-dcnode-id="5644" instrument_node=""> on the cell surface which is identical to the SARS-CoV-2 spike protein. The immune system then attacks the cells with the spike protein, and learns to recognize it. Just like other vaccines, the immune system is now trained to respond to the pathogen that has this antigen. In this way, the result is similar to the AAV vector vaccine (above). (See </span><a class="externalUrl" data-dcnode-id="5642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3D8nD6Q9X0SFw" rel="nofollow"><span data-dcnode-id="5643" instrument_node="">How COVID-19 mRNA Vaccines Work</span></a><span data-dcnode-id="5641" instrument_node=""> by Vaccine Makers Project.)</span></p><span data-dcnode-id="5639" instrument_node="">
</span><p data-dcnode-id="5637"><span data-dcnode-id="5638" instrument_node=""> Specifically, the Moderna and Pfizer RNA vaccines, claimed to be &gt;90% effective, are made by the following steps: </span></p><span data-dcnode-id="5636" instrument_node="">
</span><ol data-dcnode-id="5595"><span data-dcnode-id="5635" instrument_node="">
</span><li data-dcnode-id="5627"><span data-dcnode-id="5634" instrument_node=""> They insert a DNA plasmid that </span><a data-dcnode-id="5632" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creation.com/dna-marvellous-messages-or-mostly-mess"><span data-dcnode-id="5633" instrument_node="">codes</span></a><span data-dcnode-id="5631" instrument_node=""> for the viral spike protein into </span><i data-dcnode-id="5629"><span data-dcnode-id="5630" instrument_node="">E. coli,</span></i><span data-dcnode-id="5628" instrument_node=""> then allow the bacteria to make many copies of it.</span></li><span data-dcnode-id="5626" instrument_node="">
</span><li data-dcnode-id="5621"><span data-dcnode-id="5625" instrument_node=""> This DNA is harvested and then </span><a data-dcnode-id="5623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creation.com/more-marvellous-machinery-dna-scrunching"><span data-dcnode-id="5624" instrument_node="">transcribed into RNA</span></a><span data-dcnode-id="5622" instrument_node=""> in a test tube using bacterial enzymes.</span></li><span data-dcnode-id="5620" instrument_node="">
</span><li data-dcnode-id="5612"><span data-dcnode-id="5619" instrument_node=""> The RNA is then wrapped up in a lipid (fat) coating and stored at –80°C, with dry ice (frozen carbon dioxide). Such cryogenic storage is necessary because </span><a data-dcnode-id="5617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creation.com/cairns-smith-detailed-criticisms-of-the-rna-world-hypothesis"><span data-dcnode-id="5618" instrument_node=""> RNA</span></a><span data-dcnode-id="5616" instrument_node=""> is about 100 times less stable than DNA, and </span><a data-dcnode-id="5614" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creation.com/dna-best-information-storage"><span data-dcnode-id="5615" instrument_node="">that’s saying something</span></a><span data-dcnode-id="5613" instrument_node="">!</span></li><span data-dcnode-id="5611" instrument_node="">
</span><li data-dcnode-id="5609"><span data-dcnode-id="5610" instrument_node=""> When injected into muscle tissue, the cells ingest the tiny fat droplets, thus bringing in the RNA as well.</span></li><span data-dcnode-id="5608" instrument_node="">
</span><li data-dcnode-id="5603"><span data-dcnode-id="5607" instrument_node=""> If the cell detects foreign RNA, it commits suicide, signalling a T cell to come and kill it via </span><a data-dcnode-id="5605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creation.com/apoptosis-cell-death-reveals-creation"><span data-dcnode-id="5606" instrument_node="">apoptosis</span></a><span data-dcnode-id="5604" instrument_node="">.</span></li><span data-dcnode-id="5602" instrument_node="">
</span><li data-dcnode-id="5600"><span data-dcnode-id="5601" instrument_node=""> If the RNA escapes cellular detection, it will be translated into the viral spike protein.</span></li><span data-dcnode-id="5599" instrument_node="">
</span><li data-dcnode-id="5597"><span data-dcnode-id="5598" instrument_node=""> Some of the protein should make its way to the outer cell membrane, where it will trigger an immune response, the production of antibodies, and the death of the cell via ingestion by a macrophage (white blood cell).</span></li><span data-dcnode-id="5596" instrument_node="">
</span></ol><span data-dcnode-id="5594" instrument_node="">
</span><p data-dcnode-id="5586"><span data-dcnode-id="5593" instrument_node=""> This process has many advantages—lower costs and delays that hold up many other new vaccines, and sometimes no need for long needles. Instead, a microneedle patch can be used in some cases. Also, an mRNA sequence can be quickly tweaked to adjust to a new viral variant, unlike the traditional vaccines where the new variant itself must be cultured. (Although in the case of the Covid-19 vaccines, this will probably not be necessary because the memory B-cells produce antibodies matched to the invading strain—see </span><i data-dcnode-id="5591"><span data-dcnode-id="5592" instrument_node="">Does a requirement of booster shots mean the vaccine is ineffective?</span></i><span data-dcnode-id="5590" instrument_node=""> </span><a data-dcnode-id="5588" href="#booster"><span data-dcnode-id="5589" instrument_node="">below</span></a><span data-dcnode-id="5587" instrument_node="">).</span></p><span data-dcnode-id="5585" instrument_node="">
</span><p data-dcnode-id="5580"><span data-dcnode-id="5584" instrument_node=""> The concerns about “genetically modified humans’ or “gene therapy’ are simply nonsense. The RNA doesn’t even get into the cell nucleus, because translation occurs outside it. So reject misinformed pronouncements like “this is not a vaccine but gene therapy,” because it doesn’t touch our genes! Also, the cell that has been injected is destroyed by the immune system. Finally, we are not </span><a data-dcnode-id="5582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creation.com/epigenetics-and-darwin"><span data-dcnode-id="5583" instrument_node=""> Lamarckians: acquired characteristics are NOT passed on</span></a><span data-dcnode-id="5581" instrument_node="">. The RNA vaccine is nowhere near the reproductive cells. </span></p><span data-dcnode-id="5579" instrument_node="">
</span><p data-dcnode-id="5550"><span data-dcnode-id="5578" instrument_node=""> When it comes to AAV vector and RNA vaccines, a person has far more foreign human DNA and RNA in his system if he has received an organ transplant, or even a ‘probiotic’ live culture yogurt. Also, any pathogenic virus hijacks our cell machinery to produce more viruses with </span><i data-dcnode-id="5576"><span data-dcnode-id="5577" instrument_node="">lots</span></i><span data-dcnode-id="5575" instrument_node=""> more foreign DNA or RNA! </span><i data-dcnode-id="5573"><span data-dcnode-id="5574" instrument_node="">Every</span></i><span data-dcnode-id="5572" instrument_node=""> cell infected with the coronavirus will produce not just a spike protein, but around 10³ whole new virus particles (the </span><a data-dcnode-id="5569" href="#burst"><i data-dcnode-id="5570"><span data-dcnode-id="5571" instrument_node="">viral burst size</span></i></a><span data-dcnode-id="5568" instrument_node="">). So </span><i data-dcnode-id="5560"><span data-dcnode-id="5567" instrument_node=""> please reject </span><a data-dcnode-id="5565" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creation.com/cmi-rejects-conspiracy-theory"><span data-dcnode-id="5566" instrument_node="">conspiratorial nonsense</span></a><span data-dcnode-id="5564" instrument_node=""> about generating </span><a data-dcnode-id="5562" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creation.com/transhumanism-mankinds-next-step-forward"><span data-dcnode-id="5563" instrument_node="">transhumans</span></a><span data-dcnode-id="5561" instrument_node=""> </span></i><span data-dcnode-id="5559" instrument_node=""> especially alarmist claims that they would no longer be Adam’s descendants (so presumably could not be saved by the </span><a data-dcnode-id="5557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creation.com/just-preach-gospel"><span data-dcnode-id="5558" instrument_node="">Last Adam</span></a><span data-dcnode-id="5556" instrument_node=""> and </span><a data-dcnode-id="5554" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creation.com/incarnation-why-god-became-man"><span data-dcnode-id="5555" instrument_node="">Kinsman-Redeemer</span></a><span data-dcnode-id="5553" instrument_node="">. Jesus Christ). </span><a data-dcnode-id="5552" name="infertility"></a><span data-dcnode-id="5551" instrument_node=""> </span></p><span data-dcnode-id="5549" instrument_node="">
</span><p data-dcnode-id="5538"><span data-dcnode-id="5548" instrument_node=""> The same goes for outrageous claims that an mRNA vaccine could cause female infertility—if so, then we should have seen strong evidence for reduced fertility in women who have caught the disease, so </span><i data-dcnode-id="5546"><span data-dcnode-id="5547" instrument_node="">where is this evidence?</span></i><span data-dcnode-id="5545" instrument_node=""> After all, if an RNA vaccine can impact fertility, then </span><i data-dcnode-id="5543"><span data-dcnode-id="5544" instrument_node="">a fortiori,</span></i><span data-dcnode-id="5542" instrument_node=""> an RNA virus should impact it many times worse. But in reality, a study shows that the vaccine is safe and effective for pregnant women and their babies.</span><sup data-dcnode-id="5539"><a class="forwardref" data-dcnode-id="5540" data-html=" Weintraub, K., Pregnant women “didn’t have the data”—until now: COVID-19 vaccines are safe and effective, even for babies, study shows, <i>USA Today,</i> 28 Mar 2021." data-offset="-10" data-variation="small wide"><span data-dcnode-id="5541" instrument_node="">4</span></a></sup></p><span data-dcnode-id="5537" instrument_node="">
</span><blockquote data-dcnode-id="5532"><span data-dcnode-id="5536" instrument_node=""> COVID-19 mRNA vaccines generated robust humoral immunity in pregnant and lactating women, with immunogenicity and reactogenicity similar to that observed in non-pregnant women. Vaccine-induced immune responses were significantly greater than the response to natural infection. Immune transfer to neonates occurred via placenta and breastmilk.</span><sup data-dcnode-id="5533"><a class="forwardref" data-dcnode-id="5534" data-html=" Gray, K.J. and 20 others, COVID-19 vaccine response in pregnant and lactating women: a cohort study, <i>American J. Obstetrics and Gynecology (AJOG),</i> 25 Mar 2021." data-offset="-10" data-variation="small wide"><span data-dcnode-id="5535" instrument_node="">5</span></a></sup></blockquote><span data-dcnode-id="5531" instrument_node=""> </span><p data-dcnode-id="5526"><span data-dcnode-id="5530" instrument_node="">For much more information on this new type of vaccine, see </span><a data-dcnode-id="5528" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creation.com/rna-vaccines"><span data-dcnode-id="5529" instrument_node=""> RNA Vaccines: Harnessing God’s design to help prevent sickness, but will the new vaccine technology alter our DNA?</span></a><span data-dcnode-id="5527" instrument_node=""> </span></p><span data-dcnode-id="5525" instrument_node="">
</span><p data-dcnode-id="5511"><span data-dcnode-id="5524" instrument_node=""> Note also, while spike proteins can be quite damaging by themselves, the ones induced by the vaccine </span><i data-dcnode-id="5522"><span data-dcnode-id="5523" instrument_node="">stay attached to the cell</span></i><span data-dcnode-id="5521" instrument_node=""> thanks to the transmembrane anchor. They are not floating around in the bloodstream. Furthermore, the vaccine code for the spike has been mutated slightly so that it stays in its pre-infection state, i.e. </span><i data-dcnode-id="5519"><span data-dcnode-id="5520" instrument_node="">it can’t change shape to bind with another cell’s ACE2 receptor.</span></i><span data-dcnode-id="5518" instrument_node=""> This should make it even less likely to cause damage (this applies to the Moderna, Pfizer RNA vaccines, as well as to the J&amp;J and Novavax vaccines, but not to the AZ). Also, the cells concerned are mainly stuck in the thick deltoid muscle of the shoulder, away from the larger blood vessels. Some of the cells will reach the lymphatic system, but this is a good thing! This is a major part of developing an immune response. In reality, you should be </span><i data-dcnode-id="5516"><span data-dcnode-id="5517" instrument_node="">far</span></i><span data-dcnode-id="5515" instrument_node=""> more concerned about spike proteins on the fast-multiplying viruses which usually infect the lungs first. From there, the spike proteins can damage lung tissue and blood vessels. The best way to </span><i data-dcnode-id="5513"><span data-dcnode-id="5514" instrument_node="">stop</span></i><span data-dcnode-id="5512" instrument_node=""> this is to train the adaptive immune system to destroy anything bearing a spike protein—i.e. get one of the vaccines! </span></p><span data-dcnode-id="5510" instrument_node="">
</span><a data-dcnode-id="5509" name="c19-vaccines"></a><span data-dcnode-id="5508" instrument_node="">
</span><h3 data-dcnode-id="5506"><span data-dcnode-id="5507" instrument_node="">More Covid-19 vaccines</span></h3><span data-dcnode-id="5505" instrument_node="">
</span><p data-dcnode-id="5503"><span data-dcnode-id="5504" instrument_node="">There are a number of new vaccines being developed which should be out soon, i.e. before the end of the year (thanks to Joel Tay for much of this information).</span></p><span data-dcnode-id="5502" instrument_node="">
</span><ol data-dcnode-id="5473"><span data-dcnode-id="5501" instrument_node="">
</span><li data-dcnode-id="5496"><span data-dcnode-id="5500" instrument_node="">Novavax’s vaccine involves inserting genes for the spike protein into a baculovirus, an insect virus. Then this virus is made to infect moth cells, which then make lots of spike proteins, which are then purified. It also uses a soapbark tree (</span><i data-dcnode-id="5498"><span data-dcnode-id="5499" instrument_node="">Quillaja saponaria</span></i><span data-dcnode-id="5497" instrument_node="">) bark extract as an adjuvant to increase immune response so less of the spike protein is needed.</span></li><span data-dcnode-id="5495" instrument_node="">
</span><li data-dcnode-id="5493"><span data-dcnode-id="5494" instrument_node="">Medicago is currently working on a vaccine using tobacco plants to produce a modified viral-like protein.</span></li><span data-dcnode-id="5492" instrument_node="">
</span><li data-dcnode-id="5490"><span data-dcnode-id="5491" instrument_node="">Sanofi is yet another one that may be out soon. Sanofi has two covid vaccines in development. The first is a partnership with GSK to produce a recombinant protein vaccine. This has been in phase 3 since May and should be out soon. They also have another mRNA vaccine in development (in partnership with Translate Bio) that is in phase 1/2 trials.</span></li><span data-dcnode-id="5489" instrument_node="">
</span><li data-dcnode-id="5487"><span data-dcnode-id="5488" instrument_node="">Inovio is also developing a DNA plasmid-based vaccine using electroporation. They are working on a device that will deliver the treatment intramuscularly (phase 3) and are working on another device to deliver it intradermally. This is done using a handheld device. The device delivers an electrical pulse which allows the cells to ‘open up’ temporarily to take in the plasmids. Inf-4800 is the vaccine they are working on now for Covid.</span></li><span data-dcnode-id="5486" instrument_node="">
</span><li data-dcnode-id="5484"><span data-dcnode-id="5485" instrument_node="">Arcturus is also working on another vaccine. This is the one that uses self-amplifying RNA (saRNA). In theory, this would allow for a single-shot vaccine that has a 40-fold smaller dose. (Vaccine name: ARCT-021)—no need for ultra-low temperature, lower cost, potentially fewer side effects, higher production of vaccines.</span></li><span data-dcnode-id="5483" instrument_node="">
</span><li data-dcnode-id="5478"><span data-dcnode-id="5482" instrument_node="">Walter Reed Army Institute of Research announced a universal C19 vaccine that could handle all strains, including Delta and Omicron. The new technology is called </span><a class="externalUrl" data-dcnode-id="5480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.defenseone.com/technology/2021/12/us-army-creates-single-vaccine-effective-against-all-covid-sars-variants/360089/" rel="nofollow"><span data-dcnode-id="5481" instrument_node="">Spike Ferritin Nanoparticle (SpFN) COVID-19 vaccine</span></a><span data-dcnode-id="5479" instrument_node="">. Ferritin is a soccerball-shaped protein that stores and releases iron, and is found in all branches of living organisms. The protein has 24 faces, and scientists attached spikes from different strains on different faces, so the adaptive immune system could make antibodies and T-cells tuned to each one. So far, this vaccine has undergone only Phase 1 trials, not Phase 2 or 3. The delays are due to the rarity of people who have neither been exposed to C19 nor been vaccinated.</span></li><span data-dcnode-id="5477" instrument_node="">
</span><li data-dcnode-id="5475"><span data-dcnode-id="5476" instrument_node="">Corbevax is a protein subuint vaccine, comprising the receptor binding domain (RBD) of the SARS‑CoV‑2 spike protein plus adjuvants. It was developed by a team from Texas Children's Hospital Center for Vaccine Development and Baylor College of Medicine in Houston, Texas and Dynavax technologies based in Emeryville California, led by Dr Peter Hotez and Maria Elena Bottazzi. Clinical trials in India with 3,000 volunteers showed that it was 90% effective against the original strain and 80%-efective against Delta. It is still being tested on Omicron. The developers intend for this vaccine to be made cheaply and be readily available to poorer countrries which still have a low vaccination rate. A disadvantage is that it can't be tweaked as readilty as RNA vaccines can, but so far, no tweaked RNA vaccine is available yet either.</span></li><span data-dcnode-id="5474" instrument_node="">
</span></ol><span data-dcnode-id="5472" instrument_node="">
</span><br data-dcnode-id="5471"><span data-dcnode-id="5470" instrument_node=""> </span><center data-dcnode-id="5464"><span data-dcnode-id="5469" instrument_node=""> </span><b data-dcnode-id="5466"><a data-dcnode-id="5467" href="#contents"><span data-dcnode-id="5468" instrument_node="">Back to contents</span></a></b><span data-dcnode-id="5465" instrument_node=""> </span></center><span data-dcnode-id="5463" instrument_node=""> </span><a data-dcnode-id="5462" name="effective"></a><span data-dcnode-id="5461" instrument_node="">
</span><h2 data-dcnode-id="5459"><span data-dcnode-id="5460" instrument_node="">Vaccines are very effective</span></h2><span data-dcnode-id="5458" instrument_node="">
</span><figure class="right" data-dcnode-id="5454" style="max-width: 400px"><img alt="Polio-iron-lung-ward" data-dcnode-id="5457" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dl0.creation.com/articles/p124/c12495/Polio-iron-lung-ward.jpg&amp;raw"><figcaption data-dcnode-id="5455"><span data-dcnode-id="5456" instrument_node="">Polio iron lung ward</span></figcaption></figure><span data-dcnode-id="5453" instrument_node=""> </span><p data-dcnode-id="5451"><span data-dcnode-id="5452" instrument_node=""> There is no doubt that we have far lower rates of many nasty diseases today. Smallpox has been completely eradicated, iron lung wards of hospitals that kept polio victims alive have largely disappeared, and rabies and tetanus are completely preventable. Also, debilitating diseases of childhood like measles, mumps, rubella, and whooping cough are no longer unpleasant rites of passage for most children. It’s notable that most anti-vaxers and even lots of doctors today are not old enough to remember when these diseases were widespread. Because they are not common, many often see no need to be vaccinated. </span></p><span data-dcnode-id="5450" instrument_node="">
</span><section class="sidenote right" data-dcnode-id="4805" style="width: 400px"><span data-dcnode-id="5449" instrument_node=""> </span><a data-dcnode-id="5448" name="basic"></a><span data-dcnode-id="5447" instrument_node="">
</span><h2 data-dcnode-id="5445"><span data-dcnode-id="5446" instrument_node="">Basic concepts and terms</span></h2><span data-dcnode-id="5444" instrument_node="">
</span><h3 data-dcnode-id="5442"><span data-dcnode-id="5443" instrument_node="">Bacteria (singular: bacterium)</span></h3><span data-dcnode-id="5441" instrument_node="">
</span><p data-dcnode-id="5421"><span data-dcnode-id="5440" instrument_node=""> Single-celled organisms that were created beneficial, but after the Fall, some became pathogenic, and even deadly. Yet even now, most bacteria are beneficial. We have about the same number of bacterial cells as human cells. E.g. a 70-kg man has about 3.8×10¹³ bacterial cells (called the </span><i data-dcnode-id="5438"><span data-dcnode-id="5439" instrument_node="">microbiome,</span></i><span data-dcnode-id="5437" instrument_node=""> mainly in the large intestine), and 3.0×10¹³ human cells.</span><sup data-dcnode-id="5434"><a data-dcnode-id="5435" href="#a"><span data-dcnode-id="5436" instrument_node="">a</span></a></sup><a data-dcnode-id="5433" name="note-a"></a><span data-dcnode-id="5432" instrument_node=""> Bacterial cells are are about 0.2–10 microns in diameter, while animal cells are 10–100 microns.</span><sup data-dcnode-id="5429"><a data-dcnode-id="5430" href="#b"><span data-dcnode-id="5431" instrument_node="">b</span></a></sup><a data-dcnode-id="5428" name="note-b"></a><span data-dcnode-id="5427" instrument_node=""> Since volume and mass are proportional to the diameter cubed, the total mass of bacteria in a 70-kg man is only about 0.2 kg.</span><sup data-dcnode-id="5424"><a data-dcnode-id="5425" href="#a"><span data-dcnode-id="5426" instrument_node="">a</span></a></sup><a data-dcnode-id="5423" name="note-a"></a><span data-dcnode-id="5422" instrument_node=""> </span></p><span data-dcnode-id="5420" instrument_node="">
</span><h3 data-dcnode-id="5418"><span data-dcnode-id="5419" instrument_node="">Virus</span></h3><span data-dcnode-id="5417" instrument_node="">
</span><p data-dcnode-id="5400"><span data-dcnode-id="5416" instrument_node=""> Almost all viruses are far smaller than even a bacterium. Their typical size of 20 and 300 nm is below the wavelength of visible light, so they can’t be seen under a light microscope. An electron microscope is necessary to see them. The exception are giant viruses (aka giruses) of the phylum Nucleocytoviricota, about 500 nm in diameter. Viruses are not technically living creatures, because they can’t reproduce on their own. So while we often talk about live viruses, they are more precisely called </span><i data-dcnode-id="5414"><span data-dcnode-id="5415" instrument_node="">active</span></i><span data-dcnode-id="5413" instrument_node=""> viruses. And although people frequently talk about ‘killing’ viruses, it would be more technically precise to use the terms </span><i data-dcnode-id="5411"><span data-dcnode-id="5412" instrument_node="">deactivating</span></i><span data-dcnode-id="5410" instrument_node=""> or </span><i data-dcnode-id="5408"><span data-dcnode-id="5409" instrument_node="">destroying</span></i><span data-dcnode-id="5407" instrument_node=""> them. The term </span><i data-dcnode-id="5405"><span data-dcnode-id="5406" instrument_node="">virion</span></i><span data-dcnode-id="5404" instrument_node=""> means a complete, infectious form of a virus particle outside a cell, with nucleic acid enclosed by a protective protein shell called a </span><i data-dcnode-id="5402"><span data-dcnode-id="5403" instrument_node="">capsid.</span></i><span data-dcnode-id="5401" instrument_node=""> </span></p><span data-dcnode-id="5399" instrument_node="">
</span><p data-dcnode-id="5373"><span data-dcnode-id="5398" instrument_node=""> Viruses must hijack the reproductive machinery of a true living cell to reproduce. This machinery is forced to make many copies of that virus. Then a ‘burst’ of all those viruses is released from the infected cell, which is destroyed in the process. The number of virions released per infected cell is called the </span><a data-dcnode-id="5397" name="burst"></a><span data-dcnode-id="5396" instrument_node=""> </span><i data-dcnode-id="5394"><span data-dcnode-id="5395" instrument_node="">burst size</span></i><span data-dcnode-id="5393" instrument_node="">, which varies with the type of virus and cell. For the SARS-COV-2 that causes COVID-19, the burst size is about 10</span><sup data-dcnode-id="5391"><span data-dcnode-id="5392" instrument_node="">3</span></sup><span data-dcnode-id="5390" instrument_node="">.</span><sup data-dcnode-id="5387"><a data-dcnode-id="5388" href="#c"><span data-dcnode-id="5389" instrument_node="">c</span></a></sup><a data-dcnode-id="5386" name="note-c"></a><span data-dcnode-id="5385" instrument_node=""> At peak infection, a patient has 10⁹–10¹¹ coronavirions with a total mass of 1–100 μg.</span><sup data-dcnode-id="5382"><a data-dcnode-id="5383" href="#d"><span data-dcnode-id="5384" instrument_node="">d</span></a></sup><span data-dcnode-id="5381" instrument_node="">&nbsp;</span><a data-dcnode-id="5380" name="note-d"></a><span data-dcnode-id="5379" instrument_node=""> Influenza viruses infecting human cells have an average burst size of 6,000.</span><sup data-dcnode-id="5376"><a data-dcnode-id="5377" href="#d"><span data-dcnode-id="5378" instrument_node="">e</span></a></sup><a data-dcnode-id="5375" name="note-e"></a><span data-dcnode-id="5374" instrument_node=""> Each of these new viruses is ready to infect another cell, and repeat the process. </span></p><span data-dcnode-id="5372" instrument_node="">
</span><p data-dcnode-id="5355"><span data-dcnode-id="5371" instrument_node=""> God originally created viruses to be beneficial. One function is to regulate the microbiome. This means that there are probably about 10 times more viral cells than either human or bacterial cells in a healthy human body.</span><sup data-dcnode-id="5368"><a data-dcnode-id="5369" href="#f"><span data-dcnode-id="5370" instrument_node="">f</span></a></sup><a data-dcnode-id="5367" name="note-f"></a><span data-dcnode-id="5366" instrument_node=""> Viruses are the most numerous biological entity—about 10³¹, or 100 million times the number of stars in the observable universe.</span><sup data-dcnode-id="5363"><a data-dcnode-id="5364" href="#g"><span data-dcnode-id="5365" instrument_node="">g</span></a></sup><a data-dcnode-id="5362" name="note-g"></a><span data-dcnode-id="5361" instrument_node=""> The total mass of viruses on earth (after removing water) is 0.2 gigatons of carbon (Gt C), about three times the total human biomass of only 0.06 Gt C. (The total biomass on Earth is 550 Gt C. Plants comprise about 80% at 450 Gt C, and bacteria are a distant second at 15% or 70 Gt C).</span><sup data-dcnode-id="5358"><a data-dcnode-id="5359" href="#h"><span data-dcnode-id="5360" instrument_node="">h</span></a></sup><a data-dcnode-id="5357" name="note-h"></a><span data-dcnode-id="5356" instrument_node=""> </span></p><span data-dcnode-id="5354" instrument_node="">
</span><p data-dcnode-id="5352"><span data-dcnode-id="5353" instrument_node=""> Some diseases are caused by an interplay between bacteria and viruses. E.g. the diphthereia and cholera bacteria produce their deadly disease-casuing toxins only when infected by certain bacteriophage viruses that carry the toxin genes and integrate it into the bacterial DNA. More commonly, a viral infection can weaken the body and make it more susceptible to a secondary bacterial infection. </span></p><span data-dcnode-id="5351" instrument_node="">
</span><h4 data-dcnode-id="5349"><span data-dcnode-id="5350" instrument_node="">SARS-CoV-2 and COVID-19</span></h4><p data-dcnode-id="5305"><span data-dcnode-id="5348" instrument_node=""> </span><i data-dcnode-id="5346"><span data-dcnode-id="5347" instrument_node="">SARS-CoV-2</span></i><span data-dcnode-id="5345" instrument_node=""> stands for </span><b data-dcnode-id="5343"><span data-dcnode-id="5344" instrument_node="">S</span></b><span data-dcnode-id="5342" instrument_node=""> evere </span><b data-dcnode-id="5340"><span data-dcnode-id="5341" instrument_node="">A</span></b><span data-dcnode-id="5339" instrument_node=""> cute </span><b data-dcnode-id="5337"><span data-dcnode-id="5338" instrument_node="">R</span></b><span data-dcnode-id="5336" instrument_node=""> espiratory </span><b data-dcnode-id="5334"><span data-dcnode-id="5335" instrument_node="">S</span></b><span data-dcnode-id="5333" instrument_node=""> yndrome </span><b data-dcnode-id="5331"><span data-dcnode-id="5332" instrument_node="">Co</span></b><span data-dcnode-id="5330" instrument_node=""> rona </span><b data-dcnode-id="5328"><span data-dcnode-id="5329" instrument_node="">V</span></b><span data-dcnode-id="5327" instrument_node=""> irus </span><b data-dcnode-id="5325"><span data-dcnode-id="5326" instrument_node="">2</span></b><span data-dcnode-id="5324" instrument_node="">, and is the official name of the coronavirus originating in Wuhan, China. The disease it can cause is officially called </span><i data-dcnode-id="5322"><span data-dcnode-id="5323" instrument_node="">COVID-19,</span></i><span data-dcnode-id="5321" instrument_node=""> from </span><b data-dcnode-id="5319"><span data-dcnode-id="5320" instrument_node="">CO</span></b><span data-dcnode-id="5318" instrument_node=""> rona </span><b data-dcnode-id="5316"><span data-dcnode-id="5317" instrument_node="">VI</span></b><span data-dcnode-id="5315" instrument_node=""> rus </span><b data-dcnode-id="5313"><span data-dcnode-id="5314" instrument_node="">D</span></b><span data-dcnode-id="5312" instrument_node=""> isease. Sometimes the virus or the disease is informally abbreviated to the </span><i data-dcnode-id="5310"><span data-dcnode-id="5311" instrument_node="">Rona</span></i><span data-dcnode-id="5309" instrument_node=""> or </span><i data-dcnode-id="5307"><span data-dcnode-id="5308" instrument_node="">C19</span></i><span data-dcnode-id="5306" instrument_node="">.</span></p><span data-dcnode-id="5304" instrument_node="">
</span><h3 data-dcnode-id="5302"><span data-dcnode-id="5303" instrument_node="">Some standard definitions concerning infectious diseases</span></h3><span data-dcnode-id="5301" instrument_node="">
</span><p data-dcnode-id="5296"><span data-dcnode-id="5300" instrument_node=""> </span><b data-dcnode-id="5298"><span data-dcnode-id="5299" instrument_node="">Endemic:</span></b><span data-dcnode-id="5297" instrument_node=""> a disease is always in the population at a steady percentage rate. This rate may not be desirable and we might seek to reduce it to zero. E.g. measles, mumps, and chickenpox were endemic before vaccines were available. Malaria is not endemic to the USA, even though there might be some cases in people who contracted it overseas.</span></p><span data-dcnode-id="5295" instrument_node="">
</span><p data-dcnode-id="5287"><span data-dcnode-id="5294" instrument_node="">Many infectious diseases experts argue that Covid-19 cannot be completely eradicated as smallpox has. Covid-19 has animal reservoirs, lacks distinctive symptoms, and is readily transmitted by asymptomatic or presymptomatic patients. So a </span><a class="externalUrl" data-dcnode-id="5292" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.indiaspend.com/indiaspend-interviews/covid-19-could-become-like-measles-never-gone-but-controlled-777785" rel="nofollow"><span data-dcnode-id="5293" instrument_node="">realistic goal is for a low endemicity from widespread immunity</span></a><span data-dcnode-id="5291" instrument_node="">, preferably from vaccination rather than from disease. And finally </span><a data-dcnode-id="5289" href="#hcq"><span data-dcnode-id="5290" instrument_node="">some drugs are proving to be quite effective cures</span></a><span data-dcnode-id="5288" instrument_node="">, although still not nearly as good as prevention with vaccination. So even if the virus breaks out, its ability to cause serious illness is much weakened.</span></p><span data-dcnode-id="5286" instrument_node="">
</span><p data-dcnode-id="5281"><span data-dcnode-id="5285" instrument_node=""> </span><b data-dcnode-id="5283"><span data-dcnode-id="5284" instrument_node="">Epidemic:</span></b><span data-dcnode-id="5282" instrument_node=""> sudden large increase in a disease in an area. It is a large outbreak. In 2019, Samoa had an outbreak of measles which became an epidemic. </span></p><span data-dcnode-id="5280" instrument_node="">
</span><p data-dcnode-id="5275"><span data-dcnode-id="5279" instrument_node=""> </span><b data-dcnode-id="5277"><span data-dcnode-id="5278" instrument_node="">Pandemic:</span></b><span data-dcnode-id="5276" instrument_node=""> sudden large increase of a disease in lots of places around the world. Since C19 has infected many countries in different continents around the world, it is a pandemic. The ‘Spanish Flu’ strain of H1N1 was also a pandemic. </span></p><span data-dcnode-id="5274" instrument_node="">
</span><p data-dcnode-id="5269"><span data-dcnode-id="5273" instrument_node=""> </span><b data-dcnode-id="5271"><span data-dcnode-id="5272" instrument_node="">Syndemic:</span></b><span data-dcnode-id="5270" instrument_node=""> An epidemic or pandemic of more than one disease at the same time, or one after the other. E.g. if people don’t get their flu shots, we could have a syndemic of flu and C19. Sometimes the informal term “twindemic” is used.</span></p><span data-dcnode-id="5268" instrument_node="">
</span><p data-dcnode-id="5266"><span data-dcnode-id="5267" instrument_node=""> Note than none of these terms is related to the severity of the disease. We should stick to the standard meanings of terms so we can communicate accurately. </span></p><span data-dcnode-id="5265" instrument_node="">
</span><a data-dcnode-id="5264" name="mortality"></a><span data-dcnode-id="5263" instrument_node="">
</span><h3 data-dcnode-id="5261"><span data-dcnode-id="5262" instrument_node="">Mortality rate</span></h3><span data-dcnode-id="5260" instrument_node="">
</span><p data-dcnode-id="5255"><span data-dcnode-id="5259" instrument_node=""> The mortality rate can be calculated by dividing number of deaths by number of cases, strictly called the </span><i data-dcnode-id="5257"><span data-dcnode-id="5258" instrument_node="">case fatality rate</span></i><span data-dcnode-id="5256" instrument_node=""> (CFR). (There is another measure called infection fatality rate (IFR), which includes asymptomatic infections. IFR requires testing antibodies to see if someone has been exposed even without showing symptoms.) If this is a percentage, then survivability rate = 100% – mortality rate. </span></p><span data-dcnode-id="5254" instrument_node="">
</span><p data-dcnode-id="5246"><span data-dcnode-id="5253" instrument_node=""> For example, for influenza, in the 2019–20 (winter) season, there were probably around 38 million symptomatic cases, 18 million medical visits, 400,000 hospitalizations, and 22,000 deaths.</span><sup data-dcnode-id="5250"><a data-dcnode-id="5251" href="#i"><span data-dcnode-id="5252" instrument_node="">i</span></a></sup><span data-dcnode-id="5249" instrument_node="">&nbsp;</span><a data-dcnode-id="5248" name="note-i"></a><span data-dcnode-id="5247" instrument_node=""> This means there is a hospitalization rate of ~1% and a death rate of 0.06%. </span></p><span data-dcnode-id="5245" instrument_node="">
</span><p data-dcnode-id="5221"><span data-dcnode-id="5244" instrument_node=""> At time of the most recent updated of this article, the USA had 80,476,479 confirmed cases of COVID-19 and 986,123 confirmed deaths</span><sup data-dcnode-id="5241"><a data-dcnode-id="5242" href="#j"><span data-dcnode-id="5243" instrument_node="">j</span></a></sup><a data-dcnode-id="5240" name="note-j"></a><span data-dcnode-id="5239" instrument_node=""> ). This means that it has a 1.227% death rate, or a 98.775% survivability rate (it was even worse in September 2020, around 3% case fatality rate, as documented by </span><a data-dcnode-id="5237" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creation.com/dr-robert-carter-cv"><span data-dcnode-id="5238" instrument_node="">Dr Robert Carter</span></a><span data-dcnode-id="5236" instrument_node=""> in his video </span><a class="externalUrl" data-dcnode-id="5234" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblicalgenetics.com/how-covid-19-testing-works/" rel="nofollow"><span data-dcnode-id="5235" instrument_node=""> How COVID-19 Testing Works</span></a><span data-dcnode-id="5233" instrument_node="">, at 15:44, 10 Sep 2020. For most of the time I have been tracking the mortality rate for this article, it was around 1.8%. We have learned much about how to treat this disease.). Furthermore, total deaths in America were hovering around 2.8 million people annually, but in 2020, there were about 3.36 million deaths, about 500,000 </span><i data-dcnode-id="5231"><span data-dcnode-id="5232" instrument_node="">excess deaths</span></i><span data-dcnode-id="5230" instrument_node="">, i.e. more than would be expected from previous years’ trend. And when the deaths are plotted monthly, the excess deaths track the number of C19 cases. </span><i data-dcnode-id="5228"><span data-dcnode-id="5229" instrument_node="">Why would surges of excess deaths track surges of C19 cases unless there was a causal connection?</span></i><span data-dcnode-id="5227" instrument_node=""> Note also, there is no surge of deaths that matches any surge of vaccination! (See also </span><a data-dcnode-id="5223" href="#updated-deaths"><span data-dcnode-id="5226" instrument_node="">Update: Covid-19 cases likely severely </span><em data-dcnode-id="5224"><span data-dcnode-id="5225" instrument_node="">understated.</span></em></a><span data-dcnode-id="5222" instrument_node="">)</span></p><span data-dcnode-id="5220" instrument_node="">
</span><p data-dcnode-id="5204"><span data-dcnode-id="5219" instrument_node="">Worldwide, it’s about the same (505,018,754 cases, 6,224,353 deaths, so 1.232% mortality). So, COVID-19 is </span><i data-dcnode-id="5217"><span data-dcnode-id="5218" instrument_node="">not</span></i><span data-dcnode-id="5216" instrument_node=""> “no worse than influenza”, but about 30 times worse! (Even using estimated IFR, C19 is about 10× worse than flu.</span><sup data-dcnode-id="5213"><a data-dcnode-id="5214" href="#k"><span data-dcnode-id="5215" instrument_node="">k</span></a></sup><a data-dcnode-id="5212" name="note-k"></a><span data-dcnode-id="5211" instrument_node=""> ) Furthermore, C19 affects far more people than the flu, so even if the mortality </span><i data-dcnode-id="5209"><span data-dcnode-id="5210" instrument_node="">rates</span></i><span data-dcnode-id="5208" instrument_node=""> were the same, C19 would still cause more </span><i data-dcnode-id="5206"><span data-dcnode-id="5207" instrument_node="">absolute</span></i><span data-dcnode-id="5205" instrument_node=""> mortality. </span></p><span data-dcnode-id="5203" instrument_node="">
</span><p data-dcnode-id="5196"><span data-dcnode-id="5202" instrument_node=""> COVID-19 is especially deadly for older people, but all age groups except maybe under-12 have a higher rate of both severe illness and death from COVID-19 than influenza. For those seriously ill enough to be hospitalized, a French study showed that more patients under 5 needed intensive care for C19 than flu. Furthermore, the mortality rate for adolescents aged 11–17 was 10 times higher.</span><sup data-dcnode-id="5199"><a data-dcnode-id="5200" href="#l"><span data-dcnode-id="5201" instrument_node="">l</span></a></sup><a data-dcnode-id="5198" name="note-l"></a><span data-dcnode-id="5197" instrument_node=""> </span></p><span data-dcnode-id="5195" instrument_node="">
</span><p data-dcnode-id="5193"><span data-dcnode-id="5194" instrument_node="">And a reminder that death is not the only problem, many more people have had disease seriously enough to need hospitalization. Even the supposedly mild Omicron strain has resulted in many US hospitals being overwhelmed. But not a single hospital has wards for vaccine side effects. In the USA, 4,592,164 people have been hospitalized with C19, over 10 times the typical annual numbers for flu. The hospitalization rate (number of people hospitalized/number of confirmed cases) is 5.747%.</span></p><span data-dcnode-id="5192" instrument_node="">
</span><p data-dcnode-id="5187"><span data-dcnode-id="5191" instrument_node=""> (Note: some unreliable sources claim that there are many false positives for the C19 test, and the disease is not as dangerous as claimed. But they can’t have it both ways. If there are lots of false positives, then that would reduce the number of cases, which would </span><i data-dcnode-id="5189"><span data-dcnode-id="5190" instrument_node="">increase</span></i><span data-dcnode-id="5188" instrument_node=""> the case fatality rate! Also, if there were even a tiny percentage of false positives, contact tracing would be impossible. However, this has been very effective at finding infectors, isolating them, and eradicating the virus from the general population, e.g. in Taiwan, Australia, New Zealand, and Singapore.) </span></p><span data-dcnode-id="5186" instrument_node="">
</span><p data-dcnode-id="5184"><span data-dcnode-id="5185" instrument_node=""> Some people who should know better have claimed that only 6% of these deaths were caused by the SARS-CoV-2 alone, while 94% had other causes. Two points: </span></p><span data-dcnode-id="5183" instrument_node="">
</span><ol data-dcnode-id="5168"><span data-dcnode-id="5182" instrument_node="">
</span><li data-dcnode-id="5178"><p data-dcnode-id="5180"><span data-dcnode-id="5181" instrument_node=""> The death certificate may well list other co-morbidities such as diabetes, obesity, hypertension, or heart disease. There are over 70 co-factors listed as contributing causes. However, were it not for the virus, such patients would still be alive today. Most were managing those conditions and had a reasonably long life-expectancy. The coronavirus was the straw that broke the patient’s back. Many would have lived for decades. </span></p><span data-dcnode-id="5179" instrument_node="">
</span></li><span data-dcnode-id="5177" instrument_node="">
</span><li data-dcnode-id="5170"><p data-dcnode-id="5175"><span data-dcnode-id="5176" instrument_node=""> There might be other conditions listed, such as secondary bacterial pneumonia, heart failure, lung failure, or a ‘cytokine storm’. However, these were conditions caused by the virus! If COVID-19 had not infected them, they would not have had these other conditions. </span></p><span data-dcnode-id="5174" instrument_node="">
</span><p data-dcnode-id="5172"><span data-dcnode-id="5173" instrument_node=""> For comparison, one could equally claim that falling out of an airplane is not dangerous. Every death certificate lists as a co-morbidity a collision with the ground at enormous speeds. But we would agree that they wouldn’t have collided with the ground if they hadn’t fallen out. E.g. in the cases cited above, pneumonia, etc. did not really kill the person. </span></p><span data-dcnode-id="5171" instrument_node="">
</span></li><span data-dcnode-id="5169" instrument_node="">
</span></ol><span data-dcnode-id="5167" instrument_node="">
</span><a data-dcnode-id="5166" name="long-haul"></a><span data-dcnode-id="5165" instrument_node="">
</span><figure class="center" data-dcnode-id="5158" style="max-width:full"><img alt="Lung damage in long-haul Covid patients, ¹²⁹Xenon MRI scans" data-dcnode-id="5164" data-old-image-path="/im_ages/articles/long_covid_lung_damage_xenon_mri.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dl0.creation.com/articles/p124/c12495/long_covid_lung_damage_xenon_mri.jpg&amp;raw"><figcaption data-dcnode-id="5159"><span data-dcnode-id="5163" instrument_node="">Hyperpolarized xenon-129 MRI scans show larger areas of darkness on lungs of long-haul Covid-19 patients, probably representing lung abnormalities. From Mundasad, S., </span><a class="externalUrl" data-dcnode-id="5161" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbc.com/news/health-60154398" rel="nofollow"><span data-dcnode-id="5162" instrument_node="">Long Covid: Hidden lung damage spotted on scans</span></a><span data-dcnode-id="5160" instrument_node="">, bbc.com, 29 Jan 2022.</span></figcaption></figure><span data-dcnode-id="5157" instrument_node="">
</span><p data-dcnode-id="5145"><span data-dcnode-id="5156" instrument_node=""> As a further reminder, death is not the only casualty of disease. It can cause long term damage too, often called called “long-haul”. About a third of survivors suffer from “long-COVID”, prolonged illness and weakness for months, e.g. fatigue, loss of smell or taste, lung damage (see image, above), and “brain fog”. Such people have a higher mortality rate than the general population. Studies in America</span><sup data-dcnode-id="5153"><a data-dcnode-id="5154" href="#m"><span data-dcnode-id="5155" instrument_node="">m</span></a></sup><a data-dcnode-id="5152" name="note-m"></a><span data-dcnode-id="5151" instrument_node=""> and Australia</span><sup data-dcnode-id="5148"><a data-dcnode-id="5149" href="#n"><span data-dcnode-id="5150" instrument_node="">n</span></a></sup><a data-dcnode-id="5147" name="note-n"></a><span data-dcnode-id="5146" instrument_node=""> show long-term heart damage in many Covid survivors. The Mayo Clinic points out: </span></p><span data-dcnode-id="5144" instrument_node="">
