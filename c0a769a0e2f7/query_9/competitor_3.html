</span><blockquote data-dcnode-id="5137"><span data-dcnode-id="5143" instrument_node=""> COVID-19 symptoms can sometimes persist for months. The virus can damage the lungs, heart, and brain, which increases the risk of long-term health problems. … COVID-19 can also weaken blood vessels and cause them to leak, which contributes to potentially long-lasting problems with the liver and kidneys.</span><sup data-dcnode-id="5140"><a data-dcnode-id="5141" href="#o"><span data-dcnode-id="5142" instrument_node="">o</span></a></sup><a data-dcnode-id="5139" name="note-o"></a><span data-dcnode-id="5138" instrument_node="">
</span></blockquote><span data-dcnode-id="5136" instrument_node=""> </span><p data-dcnode-id="5134"><span data-dcnode-id="5135" instrument_node="">Aside from the physical problems, a third of survivors were found to have mental problems as well: </span></p><span data-dcnode-id="5133" instrument_node="">
</span><blockquote data-dcnode-id="5112"><p data-dcnode-id="5131"><span data-dcnode-id="5132" instrument_node=""> One in three COVID-19 survivors in a study of more than 230,000 mostly American patients were diagnosed with a brain or psychiatric disorder within six months, suggesting the pandemic could lead to a wave of mental and neurological problems, scientists said on Tuesday.Researchers who conducted the analysis said it was not clear how the virus was linked to psychiatric conditions such as anxiety and depression, but that these were the most common diagnoses among the 14 disorders they looked at. </span></p><span data-dcnode-id="5130" instrument_node="">
</span><p data-dcnode-id="5128"><span data-dcnode-id="5129" instrument_node=""> Post-COVID cases of stroke, dementia and other neurological disorders were rarer, the researchers said, but were still significant, especially in those who had severe COVID-19. … </span></p><span data-dcnode-id="5127" instrument_node="">
</span><p data-dcnode-id="5122"><span data-dcnode-id="5126" instrument_node=""> The new findings, published in the </span><i data-dcnode-id="5124"><span data-dcnode-id="5125" instrument_node="">Lancet Psychiatry</span></i><span data-dcnode-id="5123" instrument_node=""> journal, analysed health records of 236,379 COVID-19 patients, mostly from the United States, and found 34% had been diagnosed with neurological or psychiatric illnesses within six months. </span></p><span data-dcnode-id="5121" instrument_node="">
</span><p data-dcnode-id="5114"><span data-dcnode-id="5120" instrument_node=""> The disorders were significantly more common in COVID-19 patients than in comparison groups of people who recovered from flu or other respiratory infections over the same time period, the scientists said, suggesting COVID-19 had a specific impact.</span><sup data-dcnode-id="5117"><a data-dcnode-id="5118" href="#p"><span data-dcnode-id="5119" instrument_node="">p</span></a></sup><a data-dcnode-id="5116" name="note-p"></a><span data-dcnode-id="5115" instrument_node=""> </span></p><span data-dcnode-id="5113" instrument_node="">
</span></blockquote><span data-dcnode-id="5111" instrument_node=""> </span><p data-dcnode-id="5109"><span data-dcnode-id="5110" instrument_node="">The neurological symptoms were puzzling, until scientists showed that the coronavirus infects both the nerve cells themselves (neurons) and supporting cells (astrocytes). Ricardo Costa, PhD, a postdoctoral fellow at the Louisiana State University (LSU) Health Shreveport, explained: </span></p><span data-dcnode-id="5108" instrument_node="">
</span><blockquote data-dcnode-id="5101"><span data-dcnode-id="5107" instrument_node=""> Our findings suggest that astrocytes are a pathway through which COVID-19 causes neurological damage. This could explain many of the neurologic symptoms we see in COVID-19 patients, which include loss of sense of smell and taste, disorientation, psychosis, and stroke.</span><sup data-dcnode-id="5104"><a data-dcnode-id="5105" href="#q"><span data-dcnode-id="5106" instrument_node="">q</span></a></sup><a data-dcnode-id="5103" name="note-q"></a><span data-dcnode-id="5102" instrument_node="">
</span></blockquote><span data-dcnode-id="5100" instrument_node="">
</span><p data-dcnode-id="5093"><span data-dcnode-id="5099" instrument_node="">In general, if a person contracts Covid-19 badly enough to need hospitalization, even after recovery, there is a high chance of dying within a year.</span><sup data-dcnode-id="5096"><a data-dcnode-id="5097" href="#r"><span data-dcnode-id="5098" instrument_node="">r</span></a></sup><a data-dcnode-id="5095" name="note-r"></a><span data-dcnode-id="5094" instrument_node=""> So minimize the chance of needing hospitalization by getting vaccinated!</span></p><span data-dcnode-id="5092" instrument_node="">
</span><p data-dcnode-id="5090"><span data-dcnode-id="5091" instrument_node="">Still another complication of C19 is severe health risks for pregnant women. An Oxford University study of 2,100 pregnant women from 43 maternity hospitals in 18 low-, middle- and high-income countries worldwide showed that women: </span></p><span data-dcnode-id="5089" instrument_node="">
</span><blockquote data-dcnode-id="5082"><span data-dcnode-id="5088" instrument_node=""> who were infected with COVID-19 during pregnancy were at increased risk of premature birth, pre-eclampsia, infections, admission to intensive care and even death. While the number of maternal deaths remained low overall, the risk of dying during pregnancy and in the postnatal period was 22 times higher in people with COVID-19 than in non-infected pregnant [women].</span><sup data-dcnode-id="5085"><a data-dcnode-id="5086" href="#s"><span data-dcnode-id="5087" instrument_node="">s</span></a></sup><a data-dcnode-id="5084" name="note-s"></a><span data-dcnode-id="5083" instrument_node="">
</span></blockquote><span data-dcnode-id="5081" instrument_node=""> </span><p data-dcnode-id="5079"><span data-dcnode-id="5080" instrument_node="">There are some dishonest memes circulating on the lines of: “Why take a vaccine that’s 95% effective against a disease that 99.5% survive?” Two of the responses are above: about 98% survive, not 99.5%, about a third of those who survive have long term health problems, and there is a severe danger to pregnant women and their babies. (Note also, 0.5% mortality if all of the USA’s 330 million people get the disease means 1.65 million die. Not much consolation to them or their loved ones.) </span></p><span data-dcnode-id="5078" instrument_node="">
</span><p data-dcnode-id="5076"><span data-dcnode-id="5077" instrument_node=""> Further, a “95%-effective” vaccine means reducing both the number of cases and number of deaths by a factor of 20 (5% = ⅟₂₀). For example (using round figures): suppose 1 million people would get C19 without a vaccination. About 2% would die, i.e. 20,000. A 95%-effective vaccine would reduce the number of cases to 5% of the original, i.e. 50,000. Of these, there would still be a 2% mortality rate, so 1,000 would die, i.e. ⅟₂₀ of the original death toll.</span></p><span data-dcnode-id="5075" instrument_node="">
</span><a data-dcnode-id="5074" name="updated-deaths"></a><span data-dcnode-id="5073" instrument_node="">
</span><p data-dcnode-id="5067"><b data-dcnode-id="5069"><span data-dcnode-id="5072" instrument_node="">Update: Covid-19 cases likely severely </span><em data-dcnode-id="5070"><span data-dcnode-id="5071" instrument_node="">understated.</span></em></b><span data-dcnode-id="5068" instrument_node=""> Writing on 13 Sep 2021, Dr Jennifer Beam Dowd, Associate Professor of Demography and Population Health at the University of Oxford, wrote:
</span></p><blockquote data-dcnode-id="5061"><span data-dcnode-id="5066" instrument_node=""> While the official global death toll from Covid-19 is now 4.6 million, the actual toll is estimated to be close to 15.4 MILLION people.</span><sup data-dcnode-id="5063"><a data-dcnode-id="5064" href="#t"><span data-dcnode-id="5065" instrument_node="">t</span></a></sup><a data-dcnode-id="5062" name="note-t"></a></blockquote><span data-dcnode-id="5060" instrument_node="">
It turns out that the official death numbers hugely understated the death toll of C19 by a factor of about 3. Modelling excess death numbers in countries badly affected by the pandemic shows that the death doll is much worse. Dr Dowd provides the following:
</span><blockquote data-dcnode-id="5045"><span data-dcnode-id="5059" instrument_node="">➡️ In the US, current estimates are around 800,000-870,000 excess deaths—this is 30% HIGHER than the official COVID-19 death count, and 24% more deaths than would have been expected over this period of time.</span><br data-dcnode-id="5058"><span data-dcnode-id="5057" instrument_node="">
➡️ In the UK, excess deaths are estimated at 120,000, almost 20% higher than the average deaths in previous years.
</span><br data-dcnode-id="5056"><span data-dcnode-id="5055" instrument_node="">
Other extremely hard-hit countries include:
</span><br data-dcnode-id="5054"><span data-dcnode-id="5053" instrument_node="">
➡️ Peru: 200K excess deaths; 159% higher than normal.</span><br data-dcnode-id="5052"><span data-dcnode-id="5051" instrument_node="">
➡️ Mexico: 480K excess deaths; 63% higher than normal.</span><br data-dcnode-id="5050"><span data-dcnode-id="5049" instrument_node="">
➡️ Brazil: 620K excess deaths; 45% higher than normal.</span><br data-dcnode-id="5048"><span data-dcnode-id="5047" instrument_node="">
➡️ South Africa: 230K excess deaths; 45% higher than normal.</span><br data-dcnode-id="5046"></blockquote><span data-dcnode-id="5044" instrument_node="">
</span><a data-dcnode-id="5043" name="lifespan"></a><span data-dcnode-id="5042" instrument_node="">
</span><p data-dcnode-id="5023"><b data-dcnode-id="5040"><span data-dcnode-id="5041" instrument_node="">Life expectancy drop from C19:</span></b><span data-dcnode-id="5039" instrument_node=""> America suffered the highest life expectancy drop since WW2 from Covid-19: 1.8 years, from 78.8 in 2019 down to 77.0 in 2020 before vaccines were readily available.</span><sup data-dcnode-id="5036"><a data-dcnode-id="5037" href="#u"><span data-dcnode-id="5038" instrument_node="">u</span></a></sup><a data-dcnode-id="5035" name="note-u"></a><span data-dcnode-id="5034" instrument_node=""> Furthermore, spikes in deaths correlate with surges of Covid-19, not with surges of vaccination.</span><sup data-dcnode-id="5031"><a data-dcnode-id="5032" href="#v"><span data-dcnode-id="5033" instrument_node="">v</span></a></sup><a data-dcnode-id="5030" name="note-v"></a><span data-dcnode-id="5029" instrument_node=""> Life expectancies have also dropped in the UK and many other countries. Note, Life expectancy in this context means “the average age a newborn would live to if current death rates continued for their whole life.”</span><sup data-dcnode-id="5026"><a data-dcnode-id="5027" href="#w"><span data-dcnode-id="5028" instrument_node="">w</span></a></sup><a data-dcnode-id="5025" name="note-w"></a><span data-dcnode-id="5024" instrument_node="">

</span></section><span data-dcnode-id="4804" instrument_node=""> </span><a data-dcnode-id="4803" name="nutrition"></a><span data-dcnode-id="4802" instrument_node="">
</span><h3 data-dcnode-id="4800"><span data-dcnode-id="4801" instrument_node="">Did nutrition and hygiene eliminate these diseases?</span></h3><span data-dcnode-id="4799" instrument_node="">
</span><p data-dcnode-id="4786"><span data-dcnode-id="4798" instrument_node=""> Many anti-vaxers claim that these diseases were eradicated not by vaccination but by improvements in hygiene and nutrition. No one doubts their important roles. But the argument fails to differentiate the two types of immune system. Nutrition and sanitation can help the innate immune system, but not the adaptive immune system. Furthermore, if they were the main causes of infectious disease reduction, then we would have seen these diseases disappear almost simultaneously. But the contrary is true: the diseases disappeared at different times, which correlated strongly with the introduction of specific vaccines for these diseases in both the USA</span><sup data-dcnode-id="4792"><a class="forwardref" data-dcnode-id="4796" data-html=" See the graphs by YEC nuclear chemist Dr Jay Wile, For some diseases, it was vaccination, not sanitation, blog.drwile.com/?p=12101, 3 Feb 2014." data-offset="-10" data-variation="small wide"><span data-dcnode-id="4797" instrument_node="">6</span></a><span data-dcnode-id="4795" instrument_node="">,</span><a class="forwardref" data-dcnode-id="4793" data-html=" Wile, J.L. and Sommerville, E.A., Vaccines are incredibly effective at preventing disease, drwile.com/lnkpages/render.asp?vac_effective, 2009." data-offset="-10" data-variation="small wide"><span data-dcnode-id="4794" instrument_node="">7</span></a></sup><span data-dcnode-id="4791" instrument_node=""> and Australia.</span><sup data-dcnode-id="4788"><a class="forwardref" data-dcnode-id="4789" data-html=" Dunlop, R., 9 vaccination myths busted. With science! mamamia.com.au/news/vaccination-myths-busted-by-science-cheat-sheet-on-immunisation, 12 November 2011. See also the very thorough article answering many medical and theological arguments against vaccination: Herrell, H., Should I Vaccinate My Child? howardisms.com, 5 May 2018." data-offset="-10" data-variation="small wide"><span data-dcnode-id="4790" instrument_node="">8</span></a></sup><span data-dcnode-id="4787" instrument_node="">—many in modern times where there was negligible further improvement in hygiene and nutrition. </span></p><span data-dcnode-id="4785" instrument_node="">
</span><p data-dcnode-id="4780"><span data-dcnode-id="4784" instrument_node=""> Some anti-vax websites show graphs of deaths from the diseases, claiming to show that vaccines had no effect. I first note the inconsistency of some anti-vaxers claiming both that deaths from childhood diseases diminished and that the diseases are just harmless childhood illnesses. Also, the important measure is disease </span><i data-dcnode-id="4782"><span data-dcnode-id="4783" instrument_node="">incidence</span></i><span data-dcnode-id="4781" instrument_node="">, i.e. number of cases. Vaccines are not a cure for the disease, but a preventive against getting the disease in the first place. </span></p><span data-dcnode-id="4779" instrument_node="">
</span><p data-dcnode-id="4774"><span data-dcnode-id="4778" instrument_node=""> This is further supported by modern outbreaks of infectious diseases in the western world which correlate with areas of widespread vaccination refusal. This has often been linked with wealthier communities where there would obviously be no drop in sanitation or nutrition, in the USA and Japan.</span><sup data-dcnode-id="4775"><a class="forwardref" data-dcnode-id="4776" data-html=" Offit, P.A., The Anti-Vaccination Epidemic: Whooping cough, mumps and measles are making an alarming comeback, thanks to seriously misguided parents, online.wsj.com/articles/paul-a-offit-the-anti-vaccination-epidemic-1411598408,24 Sep 2014. Dr Offit is a top paediatrician and vaccine expert." data-offset="-10" data-variation="small wide"><span data-dcnode-id="4777" instrument_node="">9</span></a></sup></p><span data-dcnode-id="4773" instrument_node="">
</span><p data-dcnode-id="4765"><span data-dcnode-id="4772" instrument_node=""> Furthermore, the hygiene explanation fails particularly badly in the case of polio. There were still outbreaks in the hygienic 1950s, because sanitation actually made the disease </span><em data-dcnode-id="4770"><span data-dcnode-id="4771" instrument_node="">more</span></em><span data-dcnode-id="4769" instrument_node=""> prevalent, because it reduced contact with the disease germ in the environment that sometimes conferred natural immunity—so the dirty environment was acting like a crude vaccine! So, polio mainly hit the prosperous and clean places.</span><sup data-dcnode-id="4766"><a class="forwardref" data-dcnode-id="4767" data-html=" Cockburn, P., Polio: The deadly summer of 1956, <em>The Independent</em>, 1999, republished as independent.co.uk/life-style/health-and-families/features/polio-the-deadly-summer-of-1956-2117253.html, 27 Oct 2010." data-offset="-10" data-variation="small wide"><span data-dcnode-id="4768" instrument_node="">10</span></a></sup></p><span data-dcnode-id="4764" instrument_node="">
</span><p data-dcnode-id="4762"><span data-dcnode-id="4763" instrument_node=""> In general, the hygiene explanation doesn’t affect diseases spread through the air, such as measles, influenza, and COVID-19. Conversely, the diseases spread through bad hygiene, e.g. cholera, really have been eliminated in hygienic areas. So we no longer need vaccines for them. The exception is if we wish to travel to unsanitary areas. E.g., as a teenager, I received polio and cholera vaccines before travelling to Bangladesh for the Asian Junior Chess Championship. </span></p><span data-dcnode-id="4761" instrument_node="">
</span><p data-dcnode-id="4756"><span data-dcnode-id="4760" instrument_node=""> Anti-vaxers might point out ‘correlation does not equal causation’ (although they don’t apply this to claims such “I got flu after the flu shot”, as </span><a data-dcnode-id="4758" href="#got_influenza"><span data-dcnode-id="4759" instrument_node="">below</span></a><span data-dcnode-id="4757" instrument_node="">), but this correlation is combined with a known mechanism for vaccines to work, and controls of the other plausible variables. </span></p><span data-dcnode-id="4755" instrument_node="">
</span><p data-dcnode-id="4750"><span data-dcnode-id="4754" instrument_node=""> </span><em data-dcnode-id="4752"><span data-dcnode-id="4753" instrument_node=""> Bottom line: if vaccination is not effective, then our immune system is not trainable! </span></em><span data-dcnode-id="4751" instrument_node=""> </span></p><span data-dcnode-id="4749" instrument_node="">
</span><a data-dcnode-id="4748" name="natural"></a><span data-dcnode-id="4747" instrument_node="">
</span><h3 data-dcnode-id="4745"><span data-dcnode-id="4746" instrument_node="">Isn’t ‘natural immunity’ better?</span></h3><span data-dcnode-id="4744" instrument_node="">
</span><p data-dcnode-id="4742"><span data-dcnode-id="4743" instrument_node=""> Some argue that it’s better to catch the disease to get ‘natural immunity’. But surely the point of immunity is to avoid catching the disease! Catching a disease to avoid catching a disease is illogical. Also, vaccination and catching the disease produces the same immune response; the former avoids the side effects of the disease. In any case, in this fallen world, natural is not always good. Botulism is perfectly natural. The deadliest toxins are natural.</span></p><span data-dcnode-id="4741" instrument_node="">
</span><p data-dcnode-id="4730"><span data-dcnode-id="4740" instrument_node="">The term is misleading as well, because </span><em data-dcnode-id="4738"><span data-dcnode-id="4739" instrument_node="">all</span></em><span data-dcnode-id="4737" instrument_node=""> immunity is natural. The right contrast is </span><em data-dcnode-id="4735"><span data-dcnode-id="4736" instrument_node="">disease-induced natural immunity</span></em><span data-dcnode-id="4734" instrument_node=""> vs. </span><em data-dcnode-id="4732"><span data-dcnode-id="4733" instrument_node="">vaccine-induced natural immunity.</span></em><span data-dcnode-id="4731" instrument_node=""> But henceforth, I will use the term ‘natural immunity’ as a shorthand for disease-induced natural immunity.</span></p><span data-dcnode-id="4729" instrument_node="">
</span><p data-dcnode-id="4727"><span data-dcnode-id="4728" instrument_node=""> One type of natural immunity is fine. This is when a mother passes on antibodies against a disease on to her baby. But the antibodies, being foreign, are not going to last forever in the baby’s bloodstream. Eventually, the child needs vaccination to train his own immune system to produce its own antibodies. </span></p><span data-dcnode-id="4726" instrument_node="">
</span><p data-dcnode-id="4715"><span data-dcnode-id="4725" instrument_node=""> Further, there are many diseases where vaccination produces much </span><em data-dcnode-id="4723"><span data-dcnode-id="4724" instrument_node="">stronger</span></em><span data-dcnode-id="4722" instrument_node=""> immunity than the disease. A good example is tetanus. The often-deadly symptoms are not caused by the bacterium </span><em data-dcnode-id="4720"><span data-dcnode-id="4721" instrument_node="">per se,</span></em><span data-dcnode-id="4719" instrument_node=""> but from the tetanospasmin neurotoxin that causes extreme muscle spasms. Tetanospasmin is the second most deadly known toxin (after botulinum toxin), with a mean lethal dose of 2.5–3 ng/kg. The problem is that even a near-fatal dose doesn’t have enough of the toxin to produce an adequate immune response. Other vaccines that produce a stronger immune response than the disease are The Hib vaccine (against </span><i data-dcnode-id="4717"><span data-dcnode-id="4718" instrument_node="">Haemophilus influenzae</span></i><span data-dcnode-id="4716" instrument_node=""> type b bacterium) and HPV vaccine.</span></p><span data-dcnode-id="4714" instrument_node="">
</span><p data-dcnode-id="4712"><span data-dcnode-id="4713" instrument_node=""> Still another disadvantage of natural immunity is that the pathogen may not be destroyed, but can remain dormant for many years. A good example is the varicella zoster virus (VZV) that causes chickenpox. After recovery, the VZV can still remain in nerve tissue. Most of the time, the immune system stops the virus getting out, but sometimes it fails, and the virus can activate in adulthood and cause the painful condition of shingles. A chickenpox vaccine prevents the virus from becoming established in the body, so it won’t cause shingles later. Other viruses that can remain in the body are HSV-2, which causes genital herpes, and HIV, which causes AIDS.</span></p><span data-dcnode-id="4711" instrument_node="">
</span><a data-dcnode-id="4710" name="c19-survivors"></a><span data-dcnode-id="4709" instrument_node="">
</span><h4 data-dcnode-id="4707"><span data-dcnode-id="4708" instrument_node="">Should C19 survivors get vaccinated?</span></h4><span data-dcnode-id="4706" instrument_node="">
</span><p data-dcnode-id="4698"><span data-dcnode-id="4705" instrument_node="">There have been claims based on one dubious study that so-called natural immunity for C19 is better, but this study relied on voluntary reporting. This means it had </span><a class="externalUrl" data-dcnode-id="4703" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dearpandemic.org/infection-vs-vaccine-immunity/" rel="nofollow"><span data-dcnode-id="4704" instrument_node="">survivor bias</span></a><span data-dcnode-id="4702" instrument_node="">: those killed or very sick from the infection didn’t report! Also, immunity from an infection is variable, both in strength and duration. It is possible, albeit uncommon, to </span><a class="externalUrl" data-dcnode-id="4700" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.science.org/content/article/more-people-are-getting-covid-19-twice-suggesting-immunity-wanes-quickly-some" rel="nofollow"><span data-dcnode-id="4701" instrument_node="">catch C19 more than once</span></a><span data-dcnode-id="4699" instrument_node="">.</span></p><span data-dcnode-id="4697" instrument_node="">
</span><p data-dcnode-id="4685"><span data-dcnode-id="4696" instrument_node="">However, it is also a mistake to deny natural immunity completely. Hybrid immunity can be very strong, whether from being vaccinated with different types of vaccine, or infection plus vaccine. A vaccine after infection will </span><em data-dcnode-id="4694"><span data-dcnode-id="4695" instrument_node="">strengthen,</span></em><span data-dcnode-id="4693" instrument_node=""> not weaken, your immune system. Infectious diseases expert Dr Gandhi argues that </span><a class="externalUrl" data-dcnode-id="4687" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.usatoday.com/story/news/health/2021/10/19/natural-infection-vaccination-which-protects-better-against-covid/6034141001/" rel="nofollow"><em data-dcnode-id="4688"><span data-dcnode-id="4692" instrument_node="">those who have recovered from C19 should get </span><strong data-dcnode-id="4690"><span data-dcnode-id="4691" instrument_node="">one</span></strong><span data-dcnode-id="4689" instrument_node=""> dose</span></em></a><span data-dcnode-id="4686" instrument_node="">, and there is little benefit for them in getting a second dose.</span></p><span data-dcnode-id="4684" instrument_node="">
</span><p data-dcnode-id="4676"><span data-dcnode-id="4683" instrument_node="">The reverse is also true: </span><a class="externalUrl" data-dcnode-id="4678" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dearpandemic.org/infection-after-vaccination/" rel="nofollow"><span data-dcnode-id="4682" instrument_node="">infection </span><em data-dcnode-id="4680"><span data-dcnode-id="4681" instrument_node="">after</span></em><span data-dcnode-id="4679" instrument_node=""> vaccination has also been shown to induce an enhanced immune response</span></a><span data-dcnode-id="4677" instrument_node=""> (and that’s after the vaccine protected against severe disease).</span></p><span data-dcnode-id="4675" instrument_node="">
</span><br data-dcnode-id="4674"><span data-dcnode-id="4673" instrument_node=""> </span><center data-dcnode-id="4667"><span data-dcnode-id="4672" instrument_node=""> </span><b data-dcnode-id="4669"><a data-dcnode-id="4670" href="#contents"><span data-dcnode-id="4671" instrument_node="">Back to contents</span></a></b><span data-dcnode-id="4668" instrument_node=""> </span></center><span data-dcnode-id="4666" instrument_node=""> </span><a data-dcnode-id="4665" name="safe"></a><span data-dcnode-id="4664" instrument_node="">
</span><h2 data-dcnode-id="4662"><span data-dcnode-id="4663" instrument_node="">Vaccines are very safe</span></h2><span data-dcnode-id="4661" instrument_node="">
</span><aside class="pullquote left" data-dcnode-id="4659" style="width: 200px;"><span data-dcnode-id="4660" instrument_node=""> If you think your child’s immune system is strong enough to fight off vaccine-preventable diseases, then it’s strong enough to fight off the tiny amounts of dead or weakened pathogens (or mRNA strands) present in any of the vaccines.—Amy Parker </span></aside><span data-dcnode-id="4658" instrument_node=""> </span><p data-dcnode-id="4650"><span data-dcnode-id="4657" instrument_node=""> It is true that vaccination is not 100% safe, even with dead bacteria or inactivated viruses (viruses are not really living, so can’t be killed, just inactivated). But then, nothing is 100% safe! That includes activities we regularly choose to undertake, judging their benefits to be worth the risks, such as driving a car. In a fallen world, there are </span><em data-dcnode-id="4655"><span data-dcnode-id="4656" instrument_node="">no</span></em><span data-dcnode-id="4654" instrument_node=""> perfect solutions, only trade-offs. So, it is folly to compare vaccination safety with a perfect standard that doesn’t exist; rather, it should be compared with the safety of </span><em data-dcnode-id="4652"><span data-dcnode-id="4653" instrument_node="">non</span></em><span data-dcnode-id="4651" instrument_node=""> -vaccination (a.k.a. ‘relative risk assessment’). The latter (non-vaccination) is manifestly unsafe. Even on the face of it, the logic seems obvious: </span></p><span data-dcnode-id="4649" instrument_node="">
</span><p data-dcnode-id="4644"><span data-dcnode-id="4648" instrument_node=""> If you think your child’s immune system is strong enough to fight off vaccine-preventable diseases, then it’s strong enough to fight off the tiny amounts of dead or weakened pathogens present in any of the vaccines.</span><sup data-dcnode-id="4645"><a class="forwardref" data-dcnode-id="4646" data-html=" Parker, A., Growing Up Unvaccinated: I had the healthiest childhood imaginable. And yet I was sick all the time. slate.com/human-interest/2014/01/growing-up-unvaccinated-a-healthy-lifestyle-couldnt-prevent-many-childhood-illnesses.html, 6 Jan 2014." data-offset="-10" data-variation="small wide"><span data-dcnode-id="4647" instrument_node="">11</span></a></sup></p><span data-dcnode-id="4643" instrument_node="">
</span><a data-dcnode-id="4642" name="c19-rushed"></a><span data-dcnode-id="4641" instrument_node="">
</span><h3 data-dcnode-id="4639"><span data-dcnode-id="4640" instrument_node="">COVID-19 update: was the vaccine too rushed?</span></h3><span data-dcnode-id="4638" instrument_node="">
</span><p data-dcnode-id="4633"><span data-dcnode-id="4637" instrument_node=""> This current </span><a data-dcnode-id="4635" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creation.com/coronavirus-flat-earth"><span data-dcnode-id="4636" instrument_node="">pandemic</span></a><span data-dcnode-id="4634" instrument_node=""> has understandably caused much concern about a C19 vaccine being offered without proper safety tests over many years. Will such a vaccine lack the proven safety record? </span></p><span data-dcnode-id="4632" instrument_node="">
</span><p data-dcnode-id="4627"><span data-dcnode-id="4631" instrument_node=""> However, it’s important to note that the main purpose of trials is to determine the most effective dosage levels required to train the immune system effectively. But trials also track safety. Another point is that many of the proposed C19 vaccines won’t be totally new technology, but will be made by the extensively tested technology used to make other safe and effective vaccines. For instance, we already know the safe doses of the ingredients of other vaccines (see below, </span><a data-dcnode-id="4629" href="#poisons"><span data-dcnode-id="4630" instrument_node="">addressing the claim of poisons in vaccines</span></a><span data-dcnode-id="4628" instrument_node="">). The exception would be the RNA vaccines, but these should be even safer than other types. </span></p><span data-dcnode-id="4626" instrument_node="">
</span><p data-dcnode-id="4624"><span data-dcnode-id="4625" instrument_node=""> The C19 vaccine trials are an ethical form of the “double blind, placebo controlled” method, which is the most rigorous, also called double-blind randomized clinical trials (RCTs). Some people get the full vaccine. Some get the vaccine with the adjuvant (something that stimulates the immune system) but without the antigen (a protein that antibodies target). Some get the vaccine without either. This latter is not a ‘saline’ injection, but the idea is similar. Randomized, placebo-controlled experiments were also used with the recombinant vaccine, Shingrix, very effective at preventing shingles. Such trials are becoming standard in the industry. </span></p><span data-dcnode-id="4623" instrument_node="">
</span><p data-dcnode-id="4621"><span data-dcnode-id="4622" instrument_node=""> Some vaccine skeptics are concerned that childhood vaccines haven’t undergone the same sorts of “double blind, placebo controlled” trials. But think of the immoral and cold ethics if a doctor had to say: “Sorry that your child died of measles / is paralyzed from polio. Fortunately this was no fault of the vaccine, because your child received one of the placebos.” Not only would RCTs necessarily leave some children vulnerable to infection, but they would also be skewed by anti-vaccination parents not wanting their children to be part of the random sample that was vaccinated, and by parents who refuse to see doctors at all. Anyway, the proof of overall great safety of vaccination is the millions of healthy children who have received all the vaccines in the schedule. </span></p><span data-dcnode-id="4620" instrument_node="">
</span><p data-dcnode-id="4612"><span data-dcnode-id="4619" instrument_node=""> Also, the question presupposes that the norm should be many years. Much of that time is jumping through numerous expensive and time-consuming bureaucratic hoops. submitting and resubmitting funding requests, and recruiting volunteers. Now it typically costs about $1 billion and many years to bring each new drug to market. It is just as dangerous to hold up life-saving drugs for years as it is to allow a possibly dangerous drug to be approved too early. Without a vaccine, C19 would probably kill hundreds of thousands every year it is held up. Many are happy that much red tape was slashed so the C19 vaccines could be available much more quickly.</span><sup data-dcnode-id="4613"><a class="forwardref" data-dcnode-id="4617" data-html=" This undesirable outcome arises from the perverse incentives involved. If something is not banned and it can be even remotely connected to harmful effects, the bureaucrats can be hauled before Congress and character-assassinated by the media. But if they ban this product that might have saved many lives, very few will link the lost lives to the absence of this product. When they do finally approve something while bragging it will save 100,000 lives per year, no one bothers to ask about the 1 million lives that must have been lost, by definition, while they held this product up for 10 years. So bureaucracies always tend towards delays and even banning over approval (Milton Friedman, [FDA =] “Frustrating Drug Advancement”, <em>Newsweek,</em> 8 Jan 1973, p. 49). <br> <br> A good example is some beta blockers that were very effective at preventing a second heart attack. Scientists estimated that they could save 10,000 lives per year in the USA. But while some were approved in Europe for this purpose, the FDA bureaucrats held up the same drugs in the USA for years. This means that many tens of thousands of lives were lost by the delay (Theory, evidence and examples of FDA harm, <i>Independent Institute,</i> fdareview.org, accessed 3 Dec 2020). Now we see the same red tape holding up a potentially life-saving new vaccine (Makary, M., FDA career staff are delaying the vaccine as thousands of Americans die: We’ve gone from ‘Operation Warp Speed’ to develop a vaccine to ‘Operation Turtle Speed’ to review it, thedispatch.com, 4 Dec 2020). <br> <br> Wading through red tape also costs much money, and the drug company must recoup this in sales to stay in business. This is a major reason new drugs can be so expensive (Gardner, J., New estimate puts cost to develop a new drug at $1B, adding to long-running debate, biopharmadive.com, 3 Mar 2020)." data-offset="-10" data-variation="small wide"><span data-dcnode-id="4618" instrument_node="">12</span></a><span data-dcnode-id="4616" instrument_node="">,</span><a class="forwardref" data-dcnode-id="4614" data-html=" ‘Firing the rascals’ will make no difference, because the same incentives will apply. Expecting a change in outcomes without changes in incentives is like expecting a cat to bark. The only way to change things is to make it profitable for even the wrong people to do the right things. See Milton Friedman, Barking Cats, <em>Newsweek</em>, p. 70, 19 Feb 1973; Klein, D.B., Economists against the FDA: The quack platitudes that drive public policy are deadly, <i>Foundation for Economic Education,</i> 1 Sep 2020; fee.org." data-offset="-10" data-variation="small wide"><span data-dcnode-id="4615" instrument_node="">13</span></a></sup></p><span data-dcnode-id="4611" instrument_node="">
</span><p data-dcnode-id="4609"><span data-dcnode-id="4610" instrument_node=""> Another cause of delays is simply finding enough volunteers, if the disease is relatively obscure. But the C19 pandemic is anything but obscure, and thousands of people volunteered for the trials. E.g. the Pfizer trials had 43,548 volunteers, while the Moderna trials had 30,420; half of each group were given the vaccine and half the placebo. It has now been about 18 months since the first doses.</span></p><span data-dcnode-id="4608" instrument_node="">
</span><a data-dcnode-id="4607" name="c19-safe"></a><span data-dcnode-id="4606" instrument_node=""> </span><h4 data-dcnode-id="4604"><span data-dcnode-id="4605" instrument_node="">Billions of doses administered safely</span></h4><p data-dcnode-id="4602"><span data-dcnode-id="4603" instrument_node=""> Now we have had the mass rollout of the vaccine itself to the public around the world. At time of writing, 11.47 billion doses have been administered around the world (11.07 million doses administered daily)—including many of the developers of the vaccine, who are thus ‘taking their own medicine’. Overall, 65.00% of the world’s population has received at least one dose (5.12B), and 58.65% is fully vaccinated (4.62B). So we have an enormous sample size.</span></p><span data-dcnode-id="4601" instrument_node="">
</span><p data-dcnode-id="4596"><span data-dcnode-id="4600" instrument_node="">The world figures include 569,642,898 doses administered in the USA, comprising 256,814,643 people who have received at least one dose of a C19 vaccine (77.4% of the population; 82.2% of the population ≥ 5 years old); 218,937,361 (65.9% of the population; 70.1% of the population ≥ 5) are considered fully vaccinated, i.e. two doses of the mRNA vacccine or one dose of J&amp;J, (including my CMI-US colleagues), and 99,505,898 (45.4% of fully vaccinated) have received a booster dose (including me (J.S.) and my wife—three Moderna mRNA vaccine shots—and some of my CMI-US colleagues). Numbers of people vaccinated in other countries (and number of fully vaccinated people): 1.28B people vaccinated in China (1.24B fully vaccinated; 3,271B doses administered), 997.04M in India (841.68M), 80.29M in Russia (73.18M), 52.98M in UK (49.59M), 33.09M in Canada (31.24M), 22.25M in Australia (21.44M), 21.13M in South Africa (18.15M), 19.58M in Taiwan (18.46M), 15.77M in Ukraine (15.15M), 6.71M in Israel (6.13M), 5.01M in Singapore (4.97M), and 4.29M in New Zealand (4.08M).</span><sup data-dcnode-id="4597"><a class="forwardref" data-dcnode-id="4598" data-html=" COVID-19 vaccine doses administered, ourworldindata.org; Tracking coronavirus vaccinations around the world, nytimes.com." data-offset="-10" data-variation="small wide"><span data-dcnode-id="4599" instrument_node="">14</span></a></sup></p><span data-dcnode-id="4595" instrument_node="">
</span><p data-dcnode-id="4585"><span data-dcnode-id="4594" instrument_node="">After both doses of the Pfizer mRNA vaccine, people are 94% less likely to have C19 symptoms and have a 92% reduction in severe C19 illness.</span><sup data-dcnode-id="4591"><a class="forwardref" data-dcnode-id="4592" data-html=" Arias, M., Study on Pfizer vaccine shows 94% drop in symptomatic COVID-19 cases, axios.com, 14 Feb 2021." data-offset="-10" data-variation="small wide"><span data-dcnode-id="4593" instrument_node="">15</span></a></sup><span data-dcnode-id="4590" instrument_node=""> In the USA, the numbers after widespread double-dose vaccines look far more promising still. Some have been concerned with a CDC report in mid-April 2021 that more than 5,800 out of 75M fully vaccinated people in the U.S. have caught C19 anyway. These are called “breakthrough cases”. Of these, 396 were hospitalized and 74 people died. But let’s work out the effectiveness. For a 95%-effective vaccine, we would expect 5% of the 75M to catch it, i.e. 3.75M. But only 5,800 caught it, i.e. only 0.0075%. And the death toll for fully vaccinated people is only one in a million, compared to ~20,000 deaths per million C19 cases. To put it another way, if you are one of the 0.0075% people unfortunate enough to catch C19 even after being fully vaccinated, your case fatality rate is almost halved to 1.28%. This suggests that the vaccine is extremely effective at preventing all forms of the disease, and lowering its severity to those few who still catch it.</span><sup data-dcnode-id="4587"><a class="forwardref" data-dcnode-id="4588" data-html=" Tayag, Y., The really surprising thing about fully vaccinated people who get COVID-19: The number of so-called “breakthrough” cases we’re seeing is even lower than expected, slate.com, 22 Apr 2021." data-offset="-10" data-variation="small wide"><span data-dcnode-id="4589" instrument_node="">16</span></a></sup><span data-dcnode-id="4586" instrument_node=""> As of August 2021, 97% of new C19 hospital patients are unvaccinated, as are 99.5% of new C19 deaths.</span></p><span data-dcnode-id="4584" instrument_node="">
</span><a data-dcnode-id="4583" name="transmission"></a><span data-dcnode-id="4582" instrument_node=""> </span><h4 data-dcnode-id="4580"><span data-dcnode-id="4581" instrument_node="">Reduced transmission</span></h4><span data-dcnode-id="4579" instrument_node="">
</span><p data-dcnode-id="4567"><span data-dcnode-id="4578" instrument_node=""> Furthermore, in the USA a study showed that the vaccine sharply reduces transmission by asymptomatic (no symptoms) and pre-symptomatic (no symptoms </span><em data-dcnode-id="4576"><span data-dcnode-id="4577" instrument_node="">yet</span></em><span data-dcnode-id="4575" instrument_node="">) people.</span><sup data-dcnode-id="4572"><a class="forwardref" data-dcnode-id="4573" data-html=" Porterfield, C., CDC: Pfizer and Moderna vaccines could significantly cut down on Coronavirus transmission, forbes.com, 29 Mar 2021." data-offset="-10" data-variation="small wide"><span data-dcnode-id="4574" instrument_node="">17</span></a></sup><span data-dcnode-id="4571" instrument_node=""> This should further accelerate the end of the pandemic, because people are most contagious “just before and for a few days after symptoms begin.”</span><sup data-dcnode-id="4568"><a class="forwardref" data-dcnode-id="4569" data-html=" Rasmussen, A.L. and Popescu, S.V., SARS-CoV-2 transmission without symptoms, <i>Science</i> <b>371</b> (6535):1206–1207, 19 Mar 2021." data-offset="-10" data-variation="small wide"><span data-dcnode-id="4570" instrument_node="">18</span></a></sup></p><span data-dcnode-id="4566" instrument_node="">
</span><p data-dcnode-id="4552"><span data-dcnode-id="4565" instrument_node="">One study claimed that vaccinated people contain as many coronaviruses in their noses as unvaccinated people. However, the PCR test kit merely counted viral particles; </span><a class="externalUrl" data-dcnode-id="4563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.yahoo.com/now/breakthrough-covid-infections-long-vaccinated-094519817.html" rel="nofollow"><span data-dcnode-id="4564" instrument_node="">Dr Gandhi points out</span></a><span data-dcnode-id="4562" instrument_node="">: “A PCR just amplifies the sequence of virus but in no way tells if it’s alive or healthy and can go from one person to the next.” And as expected, the viruses in noses of vaccinated people are often been weakened by their vaccine-trained adaptive immune systems so are less infectious, as shown by a </span><a class="externalUrl" data-dcnode-id="4560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medrxiv.org/content/10.1101/2021.08.20.21262158v1" rel="nofollow"><span data-dcnode-id="4561" instrument_node=""> study in the Netherlands</span></a><span data-dcnode-id="4559" instrument_node="">. Also, studies from </span><a class="externalUrl" data-dcnode-id="4557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medrxiv.org/content/10.1101/2021.07.28.21261295v1" rel="nofollow"><span data-dcnode-id="4558" instrument_node="">Singapore</span></a><span data-dcnode-id="4556" instrument_node=""> and </span><a class="externalUrl" data-dcnode-id="4554" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medrxiv.org/content/10.1101/2021.02.16.21251535v3.full.pdf" rel="nofollow"><span data-dcnode-id="4555" instrument_node="">Harvard</span></a><span data-dcnode-id="4553" instrument_node=""> show that vaccinated people clear the viruses more quickly.</span></p><span data-dcnode-id="4551" instrument_node="">
</span><p data-dcnode-id="4549"><span data-dcnode-id="4550" instrument_node="">In any case, because those who don’t get the disease are less likely to spread it, vaccines also help to prevent other people from catching the disease. Even if the vaccine doesn’t totally prevent disease, and instead produces a milder form of the disease, reducing coughing, nose-running, and sneezing will lower the spread of aerosolized droplets or liquids that carry the germs.</span></p><span data-dcnode-id="4548" instrument_node="">
</span><a data-dcnode-id="4547" name="side-effects"></a><span data-dcnode-id="4546" instrument_node=""> </span><h4 data-dcnode-id="4544"><span data-dcnode-id="4545" instrument_node="">Side-effects</span></h4><p data-dcnode-id="4542"><span data-dcnode-id="4543" instrument_node="">
</span></p><p data-dcnode-id="4537"><span data-dcnode-id="4541" instrument_node=""> There are some </span><i data-dcnode-id="4539"><span data-dcnode-id="4540" instrument_node="">temporary</span></i><span data-dcnode-id="4538" instrument_node=""> side-effects lasting a day or so, which are the result of the immune system reacting strongly as intended. These include pain at the injection site, and chills and fever. (A fever is the immune system trying to kill a pathogen by raising the body temperature to more than it can tolerate. This means setting the body’s thermostat higher. When the thermostat is first raised, the body perceives that it’s colder than it should be, hence the initial ‘chills’.) But most report a quick and total recovery, as opposed to the long illness caused by the virus.</span></p><span data-dcnode-id="4536" instrument_node="">
</span><p data-dcnode-id="4527"><span data-dcnode-id="4535" instrument_node=""> The serious side-effect of anaphylaxis has been reported in only a few out of a million doses.</span><sup data-dcnode-id="4532"><a class="forwardref" data-dcnode-id="4533" data-html=" Remmel, A., COVID vaccines and safety: what the research says, nature.com, 16 Feb 2021." data-offset="-10" data-variation="small wide"><span data-dcnode-id="4534" instrument_node="">19</span></a></sup><span data-dcnode-id="4531" instrument_node=""> Anaphylaxis occurs very quickly if at all, which is why vaccine recipients are asked to stay for 15 minutes after the injection, so they can be helped by an epinephrine/adrenalin injection on the spot. The very rare and curable serious side-effects in a few cases out of millions is far better than the ~18,000 deaths (and ~300,000 long-haul cases) per million from C19 (see </span><a data-dcnode-id="4529" href="#mortality"><span data-dcnode-id="4530" instrument_node="">Mortality rate</span></a><span data-dcnode-id="4528" instrument_node="">)! If the vaccine were even a thousandth as deadly as the virus, we should have been seeing thousands of people dying from it by now.</span></p><span data-dcnode-id="4526" instrument_node="">
</span><p data-dcnode-id="4506"><span data-dcnode-id="4525" instrument_node=""> Some people are concerned about long-term side-effects of the vaccines. First, the </span><em data-dcnode-id="4523"><span data-dcnode-id="4524" instrument_node="">known</span></em><span data-dcnode-id="4522" instrument_node=""> side-effects of the virus should be feared a thousand times more than </span><em data-dcnode-id="4520"><span data-dcnode-id="4521" instrument_node="">unknown</span></em><span data-dcnode-id="4519" instrument_node=""> side-effects of the vaccine. Second, long-term effects of medication are an issue only for long-term </span><em data-dcnode-id="4517"><span data-dcnode-id="4518" instrument_node="">usage</span></em><span data-dcnode-id="4516" instrument_node=""> of drugs taken </span><em data-dcnode-id="4514"><span data-dcnode-id="4515" instrument_node="">daily.</span></em><span data-dcnode-id="4513" instrument_node=""> For example, the body can develop tolerance, become dependent, or the tiny side-effects can accumulate. But this is not the case for vaccines, which are a single or sometimes a double dose. After a month or two, there is nothing left of the vaccine in the body except antibodies and immune memory. Hence no vaccine is known with new side-effects that show up years after it was administered. Conversely, a virus can linger, e.g. chickenpox virus flaring up as shingles decades later. Other viruses known to have bad effects many years after the initial infection include: hepatitis B, hepatitis C, HIV, HPV (e.g. cervical cancer), Epstein–Barr virus aka </span><i data-dcnode-id="4511"><span data-dcnode-id="4512" instrument_node="">Human gammaherpesvirus 4</span></i><span data-dcnode-id="4510" instrument_node=""> (Burkitt lymphoma, likely </span><a class="externalUrl" data-dcnode-id="4508" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hsph.harvard.edu/news/press-releases/epstein-barr-virus-may-be-leading-cause-of-multiple-sclerosis/" rel="nofollow"><span data-dcnode-id="4509" instrument_node="">multiple sclerosis according to 2022 research</span></a><span data-dcnode-id="4507" instrument_node="">), CMV, HHV8, and HTLV1. I suspect that we haven’t seen the last of the C19 virus side effects.</span></p><span data-dcnode-id="4505" instrument_node="">
</span><a data-dcnode-id="4504" name="burden"></a><span data-dcnode-id="4503" instrument_node=""> </span><h4 data-dcnode-id="4501"><span data-dcnode-id="4502" instrument_node="">Burden of proof</span></h4><span data-dcnode-id="4500" instrument_node="">
</span><p data-dcnode-id="4498"><span data-dcnode-id="4499" instrument_node="">It is up to vaccine-opponents to explain how a non-multiplying RNA vax in the shoulder, away from major blood vessels, can be more dangerous than a fast-multiplying RNA virus in the lungs, near heart and major blood vessels. Vaccine proponents don’t need to explain why the vax is safer, given the above. The onus is on the anti-vaxers.</span></p><span data-dcnode-id="4497" instrument_node="">
</span><p data-dcnode-id="4483"><span data-dcnode-id="4496" instrument_node="">Therefore, it should not be surprising that everything they complain that the vax can do, the virus can do both far more often and far more severely, whether </span><a class="externalUrl" data-dcnode-id="4494" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cnbc.com/2021/08/27/covid-not-vaccinations-presents-biggest-blood-clot-risk-study.html" rel="nofollow"><span data-dcnode-id="4495" instrument_node="">blood clots</span></a><span data-dcnode-id="4493" instrument_node="">, </span><a class="externalUrl" data-dcnode-id="4491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newscientist.com/article/mg25133462-800-myocarditis-is-more-common-after-covid-19-infection-than-vaccination/" rel="nofollow"><span data-dcnode-id="4492" instrument_node="">myocarditis</span></a><span data-dcnode-id="4490" instrument_node="">, </span><a class="externalUrl" data-dcnode-id="4488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.plos.org/plosone/article%3Fid%3D10.1371/journal.pone.0256744" rel="nofollow"><span data-dcnode-id="4489" instrument_node="">D-dimer elevation</span></a><span data-dcnode-id="4487" instrument_node="">, </span><a class="externalUrl" data-dcnode-id="4485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factcheck.org/2021/07/scicheck-covid-19-vaccine-generated-spike-protein-is-safe-contrary-to-viral-claims/" rel="nofollow"><span data-dcnode-id="4486" instrument_node="">spike protein toxicity</span></a><span data-dcnode-id="4484" instrument_node="">, or whatever the latest claim is. </span></p><span data-dcnode-id="4482" instrument_node="">
</span><a data-dcnode-id="4481" name="bossche"></a><span data-dcnode-id="4480" instrument_node="">
</span><h4 data-dcnode-id="4478"><span data-dcnode-id="4479" instrument_node="">Fallacies of Geert Vanden&nbsp;Bossche</span></h4><p data-dcnode-id="4476"><span data-dcnode-id="4477" instrument_node=""> We wouldn’t normally comment on someone by name, because Dr v.d. Bossche is hardly the worst offender. But many people are touting his videos against the C19 vaccines. Geert Vanden&nbsp;Bossche&nbsp;is a Belgian veterinarian and virologist touted as a vaccine expert although he hasn’t published in that area. He makes outlandish claims that the Rona vax will allow dangerous mutants.</span></p><span data-dcnode-id="4475" instrument_node="">
</span><p data-dcnode-id="4469"><span data-dcnode-id="4474" instrument_node="">But CMI scientists know more about mutation and selection than he does—it goes with the territory. The best way to prevent mutations, i.e. copying errors, is to prevent reproduction in the first place. We do that best by getting vaccines into as many shoulders as possible, training the adaptive immune system to destroy the virus before it can reproduce or mutate!&nbsp;Dr v.d. Bossche&nbsp;would have us hold off a proven preventive measure and allow a disease to continue killing 2% of all cases and leaving 33% of survivors with “long haul” (see </span><a data-dcnode-id="4471" href="#mortality"><i data-dcnode-id="4472"><span data-dcnode-id="4473" instrument_node="">Mortality rate</span></i></a><span data-dcnode-id="4470" instrument_node="">)—despite his claims that it’s a harmless virus.</span></p><span data-dcnode-id="4468" instrument_node="">
</span><p data-dcnode-id="4457"><span data-dcnode-id="4467" instrument_node="">Conversely, natural selection is often called survival of the fittest, but it doesn't explain </span><i data-dcnode-id="4465"><span data-dcnode-id="4466" instrument_node="">arrival</span></i><span data-dcnode-id="4464" instrument_node=""> of the fittest. It is also really elimination of the unfit from being able to pass on their genes. </span><i data-dcnode-id="4462"><span data-dcnode-id="4463" instrument_node="">Natural selection is a culling force, not a creative force.</span></i><span data-dcnode-id="4461" instrument_node=""> So strong selective pressure will not create variants. They must first arise, and can only do so when there is a chance for reproduction. Geert Vanden Bossche is basically reviving discredited Lamarckian evolution, or inheritance of acquired characteristics. (See also this off-site article </span><a class="externalUrl" data-dcnode-id="4459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.deplatformdisease.com/blog/addressing-geert-vanden-bossches-claims" rel="nofollow"><span data-dcnode-id="4460" instrument_node="">Addressing Geert Vanden Bossche’s Claims</span></a><span data-dcnode-id="4458" instrument_node="">, by Edward Nirenberg.)</span></p><span data-dcnode-id="4456" instrument_node="">
</span><a data-dcnode-id="4455" name="variants"></a><span data-dcnode-id="4454" instrument_node=""> </span><h4 data-dcnode-id="4452"><span data-dcnode-id="4453" instrument_node="">Will the vaccine help produce variants?</span></h4><p data-dcnode-id="4444"><span data-dcnode-id="4451" instrument_node="">The new Delta variant is being now blamed on the vaccines, using the same reasoning as Geert Vanden&nbsp;Bossche above. But once again, variants arise by mutations. (In fact, way back in 1943, this was proven (at least in bacteria) by the Luria–Delbrück experiment. This showed that mutations arose without selection pressure, rather than being caused by it. Salvador Luria and Max Delbrück shared the 1969 Nobel Prize in Physiology or Medicine largely for this important demonstration.) Mutations by definition are copying errors. So the best way to stop mutations and variants is to prevent the virus from reproducing. The safest way by far is to vaccinate, to train the adaptive immune system to destroy the virus before it has a chance to reproduce much. Less reproduction means less chance for mutations, including those that produce variants. And indeed, the theory has matched what is found in practice: </span><a class="externalUrl" data-dcnode-id="4449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medrxiv.org/content/10.1101/2021.07.01.21259833v1" rel="nofollow"><span data-dcnode-id="4450" instrument_node="">COVID-19 vaccines dampen genomic diversity of SARS-CoV-2: Unvaccinated patients exhibit more antigenic mutational variance</span></a><span data-dcnode-id="4448" instrument_node=""> and </span><a class="externalUrl" data-dcnode-id="4446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medrxiv.org/content/10.1101/2021.08.08.21261768v1" rel="nofollow"><span data-dcnode-id="4447" instrument_node="">Full vaccination suppresses SARS-CoV-2 delta variant mutation frequency</span></a><span data-dcnode-id="4445" instrument_node="">.</span></p><span data-dcnode-id="4443" instrument_node="">
</span><p data-dcnode-id="4435"><span data-dcnode-id="4442" instrument_node="">But if bacteria can evolve resistance to antibiotics, why can’t viruses evolve resistance to vaccines? First, as readers of this site should be aware, </span><a data-dcnode-id="4437" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creation.com/antibiotic-resistance-not-evolution-in-action"><span data-dcnode-id="4441" instrument_node="">antibiotic resistance is </span><i data-dcnode-id="4439"><span data-dcnode-id="4440" instrument_node="">not</span></i><span data-dcnode-id="4438" instrument_node=""> an example of goo-to-you evolution</span></a><span data-dcnode-id="4436" instrument_node="">. Second, antibiotic resistance often arises when not enough of the antibiotic is used, e.g. when a patient doesn’t finish the prescribed course, and instead stops when the symptoms ease. The reason is that resistance is not usually absolute, but partial, and there can be a gradation in the population. So the antibiotic kills some bacteria, but not all. E.g. if say the toughest 10% of germs have 50% resistance, and the rest have none to speak of, then the antibiotic will reduce the numbers to 5%. Even at that level, they could multiply faster than the immune system can stop them. If the antibiotic is stopped too soon, then the population could become entirely 50% resistant germs. By then, a safe dose of the antibiotic may no longer be enough to kill enough of them. So it is very important to finish the antibiotic course so the anitbiotic can keep killing the germs while the population is low. Then the immune system can mop up the remnants.</span></p><span data-dcnode-id="4434" instrument_node="">
</span><p data-dcnode-id="4423"><span data-dcnode-id="4433" instrument_node="">But vaccines are very different from antibiotics. First, vaccines are prophylactic, while antibiotics are usually therapeutic. That is, the vaccines train the adaptive immune system to prevent the germs from reproducing in the first place. Antibiotics are mainly prescribed to treat an infection that has already arisen. Second, antibiotics normally have a single target, while vaccines induce antibodies and T-cells (a type of lymphocyte, in turn a type of white blood cell) against multiple targets of the pathogen. E.g. the beta-lactam antibiotics (e.g. penicillin) target cell walls, streptomycin binds the </span><a data-dcnode-id="4431" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creation.com/ribosomes-and-design"><span data-dcnode-id="4432" instrument_node="">ribosome</span></a><span data-dcnode-id="4430" instrument_node="">, oligomycin binds the part of the </span><a data-dcnode-id="4428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creation.com/atp-synthase"><span data-dcnode-id="4429" instrument_node="">ATP synthase motor</span></a><span data-dcnode-id="4427" instrument_node=""> named Fₒ for oligomycin-binding fraction, fluoroquinolones target </span><a data-dcnode-id="4425" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creation.com/dna-detangling-motors-topoisomerase"><span data-dcnode-id="4426" instrument_node="">topoisomerase II enzymes</span></a><span data-dcnode-id="4424" instrument_node="">, tetracyclines inhibit&nbsp;the binding of&nbsp;aminoacyl-tRNA&nbsp;to the&nbsp;mRNA-ribosome&nbsp;complex, and macrolides stop protein growing in the ribosome.</span></p><span data-dcnode-id="4422" instrument_node="">
</span><p data-dcnode-id="4417"><span data-dcnode-id="4421" instrument_node="">Conversely, pathogens have lots of potential targets for antibodies. For example, the SARS-CoV-2 spike protein comprises 1,273 amino acids, and vaccine-induced antibodies can target a lot of different short amino acid sequences. And the T-cells have about 100 targets on the spike protein; the Delta variant has about 13 differences, so that still leaves over 80 targets. So many mutations would be needed for the virus to become resistant to vaccines; and too many mutations on the spike protein would render it non-infective. This is why vaccine resistance has been a non-issue for most vaccines in history. A second dose of the RNA vaccine induces a high number of killer T-cells (aka cytotoxic or CD8⁺ T-cells), the heavy artillery of the immune system, which detects and destroys virus-infected cells. A double dose of the </span><a class="externalUrl" data-dcnode-id="4419" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nejm.org/doi/full/10.1056/NEJMoa2108891" rel="nofollow"><span data-dcnode-id="4420" instrument_node="">Pfizer RNA vaccine is 88.0% effective against Delta</span></a><span data-dcnode-id="4418" instrument_node=""> (and 93.7% effective against Alpha).</span></p><span data-dcnode-id="4416" instrument_node="">
</span><p data-dcnode-id="4405"><span data-dcnode-id="4415" instrument_node="">The Omicron strain, which originated in Africa in November 2021, has about 32 mutations. Yet the vaccines, all based on the original Wuhan strain, are about </span><a class="externalUrl" data-dcnode-id="4413" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cbsnews.com/news/covid-vaccine-omicron-variant-pfizer-hospitalization-effectiveness/" rel="nofollow"><span data-dcnode-id="4414" instrument_node="">70–75% effective against hospitalization by Omicron</span></a><span data-dcnode-id="4412" instrument_node="">. So although the RNA vaccines could be much more quickly tweaked to the new strains, this may not be necessary. But a booster greatly increases the number of omicron-fighting antibodies—</span><a class="externalUrl" data-dcnode-id="4410" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cbsnews.com/news/moderna-booster-shot-covid-vaccine-antibodies-omicron/" rel="nofollow"><span data-dcnode-id="4411" instrument_node="">Pfizer about 25× and Moderna 37×</span></a><span data-dcnode-id="4409" instrument_node="">—resulting in even stronger protection. So it </span><a class="externalUrl" data-dcnode-id="4407" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.businessinsider.com/omicron-chart-protection-2-3-vaccine-booster-effectiveness-hospitalization-symptomatic-2022-1" rel="nofollow"><span data-dcnode-id="4408" instrument_node="">increases protection against hospitalization by Omicron to 88%</span></a><span data-dcnode-id="4406" instrument_node="">.</span></p><span data-dcnode-id="4404" instrument_node="">
</span><p data-dcnode-id="4390"><span data-dcnode-id="4403" instrument_node="">Also, the problem with the Delta variant is that it reproduces faster, </span><i data-dcnode-id="4401"><span data-dcnode-id="4402" instrument_node="">not</span></i><span data-dcnode-id="4400" instrument_node=""> that is more resistant to vaccine-induced antibodies. Finally, the Delta variant first arose in India in October 2020, three months </span><i data-dcnode-id="4398"><span data-dcnode-id="4399" instrument_node="">before</span></i><span data-dcnode-id="4397" instrument_node=""> vaccination began in India. This is just what we would expect: the variant arose in an </span><i data-dcnode-id="4395"><span data-dcnode-id="4396" instrument_node="">unvaccinated</span></i><span data-dcnode-id="4394" instrument_node=""> person whose adaptive immune system was </span><i data-dcnode-id="4392"><span data-dcnode-id="4393" instrument_node="">not</span></i><span data-dcnode-id="4391" instrument_node=""> trained to prevent the virus from multiplying. Omicron also arose in a low-vaccination area. It spreads more quickly but produces milder disease.</span></p><span data-dcnode-id="4389" instrument_node="">
</span><p data-dcnode-id="4384"><span data-dcnode-id="4388" instrument_node="">(Indeed, because too many mutations would disable this virus, which is why it has a </span><a class="externalUrl" data-dcnode-id="4386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cell.com/molecular-cell/fulltext/S1097-2765%2820%2930518-9" rel="nofollow"><span data-dcnode-id="4387" instrument_node="">proofreading RNA-dependent RNA polymerase that reduces the mutation rate 20-fold</span></a><span data-dcnode-id="4385" instrument_node="">. Conversely, many antiviral drugs work by increasing mutation rate so much that the virus is disabled, including the new Paxlovid to treat Covid-19.)</span></p><span data-dcnode-id="4383" instrument_node="">
</span><p data-dcnode-id="4376"><span data-dcnode-id="4382" instrument_node="">There is also a glaring inconsistency. If vaccine-induced immunity would select for vaccine-resistant variants (</span><i data-dcnode-id="4380"><span data-dcnode-id="4381" instrument_node="">arguendo</span></i><span data-dcnode-id="4379" instrument_node="">), then why wouldn’t so-called natural immunity (disease-induced immunity) do the same?
</span><a data-dcnode-id="4378" name="booster"></a><span data-dcnode-id="4377" instrument_node="">
</span></p><h4 data-dcnode-id="4374"><span data-dcnode-id="4375" instrument_node="">Does a requirement of booster shots mean the vaccine is ineffective?</span></h4><span data-dcnode-id="4373" instrument_node="">
</span><p data-dcnode-id="4365"><span data-dcnode-id="4372" instrument_node="">It is normal for antibody count to wane after a while. We just could not keep antibodies for every antigen we have ever face circulating in our blood, or else it would be as thick as honey. But what is retained is the immune system memory. In particular, that of the B-cells that generate antibodies. In particular, </span><a class="externalUrl" data-dcnode-id="4370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//leaps.org/how-long-do-covid-antibodies-last/immunity-is-more-than-antibodies" rel="nofollow"><span data-dcnode-id="4371" instrument_node="">Dr Monica Gandhi has documented</span></a><span data-dcnode-id="4369" instrument_node=""> that the B-cell retain their memory for decades, some including in many very old people 90 years after surviving the 1918 Spanish Flu pandemic. Such B-cells were found to produce neutralizing antibodies against the same H1N1 viruses and protect mice from illness. When it comes to C19, the B-cells will even produce antibodies that better match whatever strain attacks the body. Also, Dr Gandhi points out that the T-cell response carpet bombs the spike protein in about 100 places, so even the variants can’t escape. At most, there are about 13 mutations in variant spike proteins, but that still leaves 87 spots for neutralization. Also, “</span><a class="externalUrl" data-dcnode-id="4367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/d41586-022-00214-3" rel="nofollow"><span data-dcnode-id="4368" instrument_node="">T cells in one individual recognize different parts of the virus than do T cells in another individual</span></a><span data-dcnode-id="4366" instrument_node="">”, so even if a virus escapes one person’s T-cell immunity, it won't excape another’s.</span></p><span data-dcnode-id="4364" instrument_node="">
</span><p data-dcnode-id="4356"><span data-dcnode-id="4363" instrument_node=""> But antibody production is not instant, so a booster shot to induce antibody protection can be worthwhile, especially in the most vulnerable. </span><a class="externalUrl" data-dcnode-id="4361" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//leaps.org/booster-shot/" rel="nofollow"><span data-dcnode-id="4362" instrument_node="">Dr Gandhi argues</span></a><span data-dcnode-id="4360" instrument_node=""> that a higher priority than a third booster shot is to get </span><i data-dcnode-id="4358"><span data-dcnode-id="4359" instrument_node="">first</span></i><span data-dcnode-id="4357" instrument_node=""> shots into as many people, both in the USA and the world, i.e. vaccinate the unvaccinated. Either way, better a booster shot to boost vaccine-immunity than a booster infection to boost so-called natural immunity.</span></p><span data-dcnode-id="4355" instrument_node="">
</span><br data-dcnode-id="4354"><span data-dcnode-id="4353" instrument_node=""> </span><center data-dcnode-id="4347"><span data-dcnode-id="4352" instrument_node=""> </span><b data-dcnode-id="4349"><a data-dcnode-id="4350" href="#contents"><span data-dcnode-id="4351" instrument_node="">Back to contents</span></a></b><span data-dcnode-id="4348" instrument_node=""> </span></center><span data-dcnode-id="4346" instrument_node=""> </span><a data-dcnode-id="4345" name="non-vax"></a><span data-dcnode-id="4344" instrument_node="">
</span><h2 data-dcnode-id="4342"><span data-dcnode-id="4343" instrument_node="">Non-vaccination is very unsafe</span></h2><span data-dcnode-id="4341" instrument_node="">
</span><p data-dcnode-id="4336"><span data-dcnode-id="4340" instrument_node=""> The blatant </span><strong data-dcnode-id="4338"><span data-dcnode-id="4339" instrument_node="">un</span></strong><span data-dcnode-id="4337" instrument_node=""> safety of non-vaccination should be obvious with well-known killers like smallpox and tetanus, but even ‘childhood illnesses’ are badly underestimated. For example: </span></p><span data-dcnode-id="4335" instrument_node="">
</span><ul data-dcnode-id="4146"><span data-dcnode-id="4334" instrument_node="">
</span><a data-dcnode-id="4333" name="flu"></a><span data-dcnode-id="4332" instrument_node="">
</span><li data-dcnode-id="4293"><p data-dcnode-id="4327"><span data-dcnode-id="4331" instrument_node=""> </span><strong data-dcnode-id="4329"><span data-dcnode-id="4330" instrument_node="">Influenza.</span></strong><span data-dcnode-id="4328" instrument_node=""> Too many people refer to a bad cold as ‘the flu’, but actual influenza is much worse. Thousands die in the USA every year from influenza complications: </span></p><span data-dcnode-id="4326" instrument_node="">
</span><ul data-dcnode-id="4295"><span data-dcnode-id="4325" instrument_node="">
</span><li data-dcnode-id="4320"><span data-dcnode-id="4324" instrument_node=""> Centers for Disease Control (CDC) estimate an average of 23,607 deaths per year from 1976 to 2007.</span><sup data-dcnode-id="4321"><a class="forwardref" data-dcnode-id="4322" data-html=" This was variable: low of 3,349 deaths during the 1986-87 flu season to a high of 48,614 in 2003-04, Estimates of deaths associated with seasonal influenza—United States, 1976–2007, cdc.gov, 27 August 2010." data-offset="-10" data-variation="small wide"><span data-dcnode-id="4323" instrument_node="">20</span></a></sup></li><span data-dcnode-id="4319" instrument_node="">
</span><li data-dcnode-id="4314"><span data-dcnode-id="4318" instrument_node=""> The figures are more certain about the number of children who die from flu, because it has been a nationally notifiable condition since 2004: from the 2003–4 to the 2013–14 seasons, the average is about 113 pediatric flu deaths per season.</span><sup data-dcnode-id="4315"><a class="forwardref" data-dcnode-id="4316" data-html=" Ianelli, V., Deaths from flu, 2013–2014 flu season, pediatrics.about.com, 14 Oct 2014." data-offset="-10" data-variation="small wide"><span data-dcnode-id="4317" instrument_node="">21</span></a></sup></li><span data-dcnode-id="4313" instrument_node="">
</span><li data-dcnode-id="4311"><span data-dcnode-id="4312" instrument_node=""> The CDC estimated that 90% of the children who died from influenza last season were not vaccinated. Further, about 40% of the deaths were in previously healthy children.</span></li><span data-dcnode-id="4310" instrument_node="">
</span><li data-dcnode-id="4297"><span data-dcnode-id="4309" instrument_node=""> Pregnant women who receive the influenza vaccination are much less likely to deliver premature, underweight.</span><sup data-dcnode-id="4306"><a class="forwardref" data-dcnode-id="4307" data-html=" Legge, A. <em>et al.</em>, Rates and determinants of seasonal influenza vaccination in pregnancy and association with neonatal outcomes, <em>Canadian Medical Association Journal</em>, 6 Jan 2014, doi:10.1503/cmaj.130499." data-offset="-10" data-variation="small wide"><span data-dcnode-id="4308" instrument_node="">22</span></a></sup><span data-dcnode-id="4305" instrument_node=""> or stillbor.</span><sup data-dcnode-id="4302"><a class="forwardref" data-dcnode-id="4303" data-html=" Fell, D.B. <em>et al.</em>, H1N1 Influenza Vaccination During Pregnancy and Fetal and Neonatal Outcomes, <em>American Journal of Public Health</em> <strong>102</strong> (6):e33-e40, 2012, doi:10.2105/AJPH.2011.300606." data-offset="-10" data-variation="small wide"><span data-dcnode-id="4304" instrument_node="">23</span></a></sup><span data-dcnode-id="4301" instrument_node=""> babies. This means that influenza is dangerous to unborn babies, so vaccination is a very pro-life policy.</span><sup data-dcnode-id="4298"><a class="forwardref" data-dcnode-id="4299" data-html=" Wile, J.L., Flu shot during pregnancy produces unexpected benefits, blog.drwile.com/?p=12645, 3 Jul 2014." data-offset="-10" data-variation="small wide"><span data-dcnode-id="4300" instrument_node="">24</span></a></sup></li><span data-dcnode-id="4296" instrument_node="">
</span></ul><span data-dcnode-id="4294" instrument_node="">
</span></li><span data-dcnode-id="4292" instrument_node="">
</span><a data-dcnode-id="4291" name="chickenpox"></a><span data-dcnode-id="4290" instrument_node="">
</span><li data-dcnode-id="4223"><p data-dcnode-id="4285"><span data-dcnode-id="4289" instrument_node=""> </span><strong data-dcnode-id="4287"><span data-dcnode-id="4288" instrument_node="">Chickenpox.</span></strong><span data-dcnode-id="4286" instrument_node=""> At best, it’s still a nasty disease with itchy blisters that often leave scars, plus a high fever and headache, resulting in a week missed from school. Further: </span></p><span data-dcnode-id="4284" instrument_node="">
</span><ul data-dcnode-id="4225"><span data-dcnode-id="4283" instrument_node="">
</span><li data-dcnode-id="4277"><span data-dcnode-id="4282" instrument_node=""> A person who has had chickenpox can get a painful and scarring rash called shingles years later, because the virus lies dormant in nerve cell bodies for years, but for some reason is re-activated and travels down the nerves to infect the skin near the nerve endings. In some people, it can lead to lifelong chronic pain.</span><sup data-dcnode-id="4279"><a class="forwardref" data-dcnode-id="4280" data-html=" Known as post-herpetic neuralgia, more common in older patients." data-offset="-10" data-variation="small wide"><span data-dcnode-id="4281" instrument_node="">25</span></a></sup><span data-dcnode-id="4278" instrument_node=""> It’s even worse when it affects nerves of the ear or eye.</span></li><span data-dcnode-id="4276" instrument_node="">
</span><li data-dcnode-id="4274"><span data-dcnode-id="4275" instrument_node=""> Before the vaccine, about 11,000 people were hospitalized for chickenpox each year in the United States. A serious complication is hemorrhagic chickenpox.</span></li><span data-dcnode-id="4273" instrument_node="">
</span><li data-dcnode-id="4264"><span data-dcnode-id="4272" instrument_node=""> Before the vaccine, about 100 people died each year as a result of chickenpox in the United States.</span><sup data-dcnode-id="4269"><a class="forwardref" data-dcnode-id="4270" data-html=" Vaccine Information Statements: Chickenpox, cdc.gov/vaccines/hcp/vis/vis-statements/varicella.html." data-offset="-10" data-variation="small wide"><span data-dcnode-id="4271" instrument_node="">26</span></a></sup><span data-dcnode-id="4268" instrument_node=""> They were usually healthy before contracting the disease.</span><sup data-dcnode-id="4265"><a class="forwardref" data-dcnode-id="4266" data-html=" Chickenpox (Varicella) Vaccine, WebMD, webmd.com/children/vaccines/chickenpox-varicella-vaccine." data-offset="-10" data-variation="small wide"><span data-dcnode-id="4267" instrument_node="">27</span></a></sup></li><span data-dcnode-id="4263" instrument_node="">
</span><a data-dcnode-id="4262" name="pox-parties"></a><span data-dcnode-id="4261" instrument_node="">
</span><li data-dcnode-id="4227"><p data-dcnode-id="4256"><span data-dcnode-id="4260" instrument_node=""> </span><strong data-dcnode-id="4258"><span data-dcnode-id="4259" instrument_node="">Pox parties?</span></strong><span data-dcnode-id="4257" instrument_node=""> Before the vaccine was developed, some people organized ‘pox’ parties when one child in a family or neighbourhood caught chickenpox. There are very big ethical question marks about deliberately giving a child an infectious disease. The idea was that it was better to get the disease as a child than as an adult. Indeed, adults can be affected very badly, so, the thinking went, better to get the disease as a child and become immune.</span></p><span data-dcnode-id="4255" instrument_node="">
</span><p data-dcnode-id="4250"><span data-dcnode-id="4254" instrument_node=""> However, there are risks to children as well, as shown above. Another problem is the infectious dose of virus (</span><i data-dcnode-id="4252"><span data-dcnode-id="4253" instrument_node="">inoculum</span></i><span data-dcnode-id="4251" instrument_node="">). It was well known that the first child in a family to pick up chickenpox would often get a relatively mild case, while the siblings became much sicker. This is because the first child picked up a smaller dose by casual contact with an infected classmate. But once this first child gets sick, he passes on a much higher dose to his siblings because of the closer and repeated contacts. The first child’s immune system has a chance to train to battle the virus before it multiplies to very serious levels. But the sibling’s immune system must fight against a higher load, so the viruses have a chance for much more multiplication, therefore more severe illness, before the immune system can fight it off.</span></p><span data-dcnode-id="4249" instrument_node="">
</span><p data-dcnode-id="4244"><span data-dcnode-id="4248" instrument_node="">Vaccine expert </span><a class="externalUrl" data-dcnode-id="4246" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//zdoggmd.com/paul-offit-8/" rel="nofollow"><span data-dcnode-id="4247" instrument_node="">Dr Paul Offit told the following tragic story</span></a><span data-dcnode-id="4245" instrument_node="">:</span></p><span data-dcnode-id="4243" instrument_node="">
