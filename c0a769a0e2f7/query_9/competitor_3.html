</span></section><span data-dcnode-id="3465" instrument_node=""> </span><a data-dcnode-id="3464" name="real-reason"></a><span data-dcnode-id="3463" instrument_node=""> </span><h4 data-dcnode-id="3461"><span data-dcnode-id="3462" instrument_node="">The real reason for the perceived increase in autism</span></h4><p data-dcnode-id="3459"><span data-dcnode-id="3460" instrument_node=""> When it comes to some diseases, the increase in numbers can actually be attributed to the increase in average lifespan. That is, people now live longer, so have more chance to contract these diseases, instead of dying young of the infectious diseases now limited by vaccination. For example, since the average lifespan used to be in the 40s, there were fewer cases of cancer than an increased population who now have the average lifespan in the later 70s. We are living longer, but are also having more time to develop those diseases. </span></p><span data-dcnode-id="3458" instrument_node="">
</span><p data-dcnode-id="3456"><span data-dcnode-id="3457" instrument_node=""> Therefore, in one sense there is a correlation between increase in vaccination and increase in some diseases: but not in the way anti-vaxers claim—rather, it’s because vaccines are allowing us to live long and healthy enough, so we don’t die before catching them! </span></p><span data-dcnode-id="3455" instrument_node="">
</span><p data-dcnode-id="3453"><span data-dcnode-id="3454" instrument_node=""> In the case of autism in particular, the reason for the perceived increase is much more straightforward. There was a medical reclassification of many diseases under the ‘umbrella’ diagnosis of Autism Spectrum Disorder, or ASD. This means there is now one diagnosis, with degrees, instead of many different diagnoses. For example, my youngest brother, for example, is no longer diagnosed ‘Aspergers’, but instead ‘highly functioning ASD’. He is still the same person, but reclassified, as many others have been, making the number with ‘Autism’ look much larger without actually adding new people. To clarify, if there were 10 cases of A, 5 cases of B, and 15 cases of C, reorganizing them into 30 cases of ABC, one label, does not mean there was any increase in actual number. </span></p><span data-dcnode-id="3452" instrument_node="">
</span><p data-dcnode-id="3450"><span data-dcnode-id="3451" instrument_node=""> Additionally, medicine is getting better at diagnosis, so people who used to be dismissed as ‘off’, ‘eccentric’, or sometimes even ‘insane’, are receiving proper diagnosis in recent times, increasing the numbers statistically, but not for any increase in affected people. For example, ‘weird Uncle Harry’ might not be seen as ‘weird’ if diagnosed in recent times, but instead properly diagnosed as ASD. </span></p><span data-dcnode-id="3449" instrument_node="">
</span><p data-dcnode-id="3447"><span data-dcnode-id="3448" instrument_node=""> One can’t help but comment on the gross inconsistency in common anti-vax claims. On the one hand, they reject the strong, repeated correlation between introduction of a vaccine for a disease and decrease in incidence of that disease (and between rise of anti-vax practices and rise of those diseases). But on the other, they accept a correlation between vaccines and autism that’s so weak as to be non-existent. </span></p><span data-dcnode-id="3446" instrument_node="">
</span><br data-dcnode-id="3445"><span data-dcnode-id="3444" instrument_node=""> </span><center data-dcnode-id="3438"><span data-dcnode-id="3443" instrument_node=""> </span><b data-dcnode-id="3440"><a data-dcnode-id="3441" href="#contents"><span data-dcnode-id="3442" instrument_node="">Back to contents</span></a></b><span data-dcnode-id="3439" instrument_node=""> </span></center><span data-dcnode-id="3437" instrument_node=""> </span><a data-dcnode-id="3436" name="comparison"></a><span data-dcnode-id="3435" instrument_node="">
</span><h3 data-dcnode-id="3433"><span data-dcnode-id="3434" instrument_node=""> “More vaccinated kids become sick than unvaccinated kids” </span></h3><span data-dcnode-id="3432" instrument_node="">
</span><p data-dcnode-id="3424"><span data-dcnode-id="3431" instrument_node=""> This claim is a clear demonstration of the misunderstanding/misuse of statistics, called the </span><i data-dcnode-id="3429"><span data-dcnode-id="3430" instrument_node="">base-rate fallacy.</span></i><span data-dcnode-id="3428" instrument_node=""> To illustrate: suppose a study shows that 20% of car accidents are caused by drunk drivers. </span><a class="rtBibleRef" data-dcnode-id="3426" data-purpose="bible-reference" data-reference="Song 80" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/esv/Song%252080" rel="noopener" target="_blank"><span data-dcnode-id="3427" instrument_node="">So 80</span></a><span data-dcnode-id="3425" instrument_node="">% of accidents are caused by sober drivers.</span></p><span data-dcnode-id="3423" instrument_node="">
</span><p data-dcnode-id="3421"><span data-dcnode-id="3422" instrument_node="">Falling for the base-rate fallacy: therefore driving drunk is four times safer than driving sober.</span></p><span data-dcnode-id="3420" instrument_node="">
</span><p data-dcnode-id="3418"><span data-dcnode-id="3419" instrument_node="">The flaw is of course the far lower base rate of drunk drivers. So the percentage of drunk drivers causing accidents is far higher than the percentage of sober drivers causing accidents.</span></p><span data-dcnode-id="3417" instrument_node="">
</span><p data-dcnode-id="3408"><span data-dcnode-id="3416" instrument_node="">When applied to vaccination, the important thing is the </span><i data-dcnode-id="3414"><span data-dcnode-id="3415" instrument_node="">percentages</span></i><span data-dcnode-id="3413" instrument_node=""> of sicknesses in the vaccinated and unvaccinated kids, not the absolute numbers, simply because (fortunately) many more kids are vaccinated. That is, we must compare (# vaxed cases / # vaxed people) with (# unvaxed cases / # unvaxed people). One anti-vaxer claimed, “We have mumps outbreaks in the UK where 92% of the affected were fully vaccinated .…”</span><sup data-dcnode-id="3410"><a class="forwardref" data-dcnode-id="3411" data-html=" Andrew B., comment on Jonathan Sarfati, <a href=&quot;/ebola-fall&quot;>Ebola disease: the result of the Fall</a>, creation.com/ebola-fall, 25 Oct 2014." data-offset="-10" data-variation="small wide"><span data-dcnode-id="3412" instrument_node="">67</span></a></sup><span data-dcnode-id="3409" instrument_node=""> Now I have learned not to trust unsourced claims from anti-vaxers (and this is so for even most sourced claims because of their propensity to misrepresent the sources), but even if we take this claim as factual, this is insufficient.</span></p><span data-dcnode-id="3407" instrument_node="">
</span><p data-dcnode-id="3396"><span data-dcnode-id="3406" instrument_node=""> To illustrate: suppose that in an outbreak, there were 100 cases of mumps, and 92 of them were vaccinated and 8 were not, to match the claimed figures. But what was not said was, say, this was from a sample of 10,000, of whom 98% were vaccinated, i.e. 9800 people were vaccinated and 200 were not. So in reality, the </span><em data-dcnode-id="3404"><span data-dcnode-id="3405" instrument_node="">properly weighted</span></em><span data-dcnode-id="3403" instrument_node=""> percentages were 92/9800 = 0.94% incidence of mumps in the vaccinated people, and 8/200 = 4% in non-vaccinated people. Therefore, these statistics, </span><em data-dcnode-id="3401"><span data-dcnode-id="3402" instrument_node="">when properly understood</span></em><span data-dcnode-id="3400" instrument_node="">, show that there is </span><em data-dcnode-id="3398"><span data-dcnode-id="3399" instrument_node="">over four times the likelihood of getting mumps</span></em><span data-dcnode-id="3397" instrument_node=""> when non-vaccinated. </span></p><span data-dcnode-id="3395" instrument_node="">
</span><p data-dcnode-id="3390"><span data-dcnode-id="3394" instrument_node=""> However, real-world stats show that the chance is far higher than that. E.g. with measles, “[vaccine] exemptors were 35 times more likely to contract measles than were vaccinated persons (95% confidence interval …)”.</span><sup data-dcnode-id="3391"><a class="forwardref" data-dcnode-id="3392" data-html=" Salmon, D.A., Health consequences of religious and philosophical exemptions from immunization laws: individual and societal risk of measles, <em>Journal of the American Medical Association</em> 282(1):47–53, 7 Jul 1999. The base-rate fallacy has come up more recently with claims that Israel is showing that C19 vaccination doesn’t work. In reality, applying the proper base rate shows that it does. Epidemiologist Dr Katrine Wallace explains the <em>base-rate fallacy</em> in COVID-19 vaccines work—misreading the data can make you think otherwise, thehill.com, 27 Aug 2021. For <em>Simpson’s paradox</em>, see how Morris, J., Israeli data: How can efficacy vs. severe disease be strong when 60% of hospitalized are vaccinated? covid-datascience.com, 17 Aug 2021, or the one-minute video, Tan, M., Simpson’s Paradox in Vaccination data, youtube.com, 21 Aug 2021." data-offset="-10" data-variation="small wide"><span data-dcnode-id="3393" instrument_node="">68</span></a></sup></p><span data-dcnode-id="3389" instrument_node="">
</span><a data-dcnode-id="3388" name="simpson"></a><span data-dcnode-id="3387" instrument_node="">
</span><p data-dcnode-id="3376"><span data-dcnode-id="3386" instrument_node="">Another common fallacy is called </span><i data-dcnode-id="3384"><span data-dcnode-id="3385" instrument_node="">Simpson’s paradox.</span></i><span data-dcnode-id="3383" instrument_node=""> Sometimes an aggregation of data can produce a misleading impression when grouped according to only one variable, When there is another variable that makes a huge difference, such as age, it is right to separate the data into different groups. E.g. in Israel and UK, a combination of all age groups can make it seem like vaccination is not very effective. But older people are both more susceptible and more often vaccinated. This can skew the overall data. But when the data are separated into age groups, </span><em data-dcnode-id="3381"><span data-dcnode-id="3382" instrument_node="">every</span></em><span data-dcnode-id="3380" instrument_node=""> age group shows that vaccination is </span><em data-dcnode-id="3378"><span data-dcnode-id="3379" instrument_node="">very</span></em><span data-dcnode-id="3377" instrument_node=""> good at preventing C19.</span></p><span data-dcnode-id="3375" instrument_node="">
</span><p data-dcnode-id="3373"><span data-dcnode-id="3374" instrument_node="">When each group shows one consistent trend while the aggregate seems to support a different trend, this is called Simpson's Paradox.</span></p><span data-dcnode-id="3372" instrument_node="">
</span><br data-dcnode-id="3371"><span data-dcnode-id="3370" instrument_node=""> </span><center data-dcnode-id="3364"><span data-dcnode-id="3369" instrument_node=""> </span><b data-dcnode-id="3366"><a data-dcnode-id="3367" href="#contents"><span data-dcnode-id="3368" instrument_node="">Back to contents</span></a></b><span data-dcnode-id="3365" instrument_node=""> </span></center><span data-dcnode-id="3363" instrument_node=""> </span><a data-dcnode-id="3362" name="too-many"></a><span data-dcnode-id="3361" instrument_node="">
</span><h3 data-dcnode-id="3359"><span data-dcnode-id="3360" instrument_node="">“Babies get too many vaccines at once”</span></h3><span data-dcnode-id="3358" instrument_node="">
</span><p data-dcnode-id="3356"><span data-dcnode-id="3357" instrument_node=""> No, they don’t. This is another argument that seriously underestimates how good a working immune system is. In reality, even a thousand vaccines at once would use only about 1% of the adaptive immune system. This is because a child’s immune system must fight several thousand ‘new’ antigens every day from the environment, including from perfectly safe food, and even more with every cut or graze. </span></p><span data-dcnode-id="3355" instrument_node="">
</span><p data-dcnode-id="3350"><span data-dcnode-id="3354" instrument_node=""> Indeed, this starts when a baby is born, transferring from the sterile environment in the womb to being exposed to trillions of bacteria in the outside world. The colon especially starts to be populated by all the ‘good’ bacteria (‘probiotics’) that we need for good health (this bacterial population is called the </span><em data-dcnode-id="3352"><span data-dcnode-id="3353" instrument_node="">microbiome,</span></em><span data-dcnode-id="3351" instrument_node=""> and the number of bacterial cells in a healthy body can outnumber the human cells). The immune system must adapt and make sure that the bacteria can’t invade the bloodstream, i.e. septicaemia, which could cause fatal sepsis. There are thousands of bacterial species involved, each with its own set of antigens. And even after that, every cut and graze exposes the immune system to still more antigens. </span></p><span data-dcnode-id="3349" instrument_node="">
</span><p data-dcnode-id="3344"><span data-dcnode-id="3348" instrument_node=""> This should put the vaccination schedule into perspective. All the vaccines together comprise only about 150 antigens. This is a fraction of a percent of the antigen load a healthy child faces every day. And even aside from this, although now we protect children against more diseases than decades ago, the number of antigens in the schedule has decreased about 20-fold.</span><sup data-dcnode-id="3345"><a class="forwardref" data-dcnode-id="3346" data-html=" Too many vaccines? What you should know. <em>Children’s Hospital of Philadephia</em>, Volume <strong>4</strong>, Winter 2018; media.chop.edu." data-offset="-10" data-variation="small wide"><span data-dcnode-id="3347" instrument_node="">69</span></a></sup></p><span data-dcnode-id="3343" instrument_node="">
</span><br data-dcnode-id="3342"><span data-dcnode-id="3341" instrument_node=""> </span><center data-dcnode-id="3335"><span data-dcnode-id="3340" instrument_node=""> </span><b data-dcnode-id="3337"><a data-dcnode-id="3338" href="#contents"><span data-dcnode-id="3339" instrument_node="">Back to contents</span></a></b><span data-dcnode-id="3336" instrument_node=""> </span></center><span data-dcnode-id="3334" instrument_node=""> </span><a data-dcnode-id="3333" name="ade"></a><span data-dcnode-id="3332" instrument_node="">
</span><h3 data-dcnode-id="3330"><span data-dcnode-id="3331" instrument_node="">Antibody-dependent Enhancement (ADE)</span></h3><span data-dcnode-id="3329" instrument_node="">
</span><p data-dcnode-id="3321"><span data-dcnode-id="3328" instrument_node="">ADE is an issue when </span><i data-dcnode-id="3326"><span data-dcnode-id="3327" instrument_node="">binding</span></i><span data-dcnode-id="3325" instrument_node=""> (non-neutralizing) antibodies help a virus invade a cell. Binding antibodies place a target on invaders, marking them for destruction by immune cells, but not preventing them from being infective in the mean time. However, sometimes, the viruses are not destroyed, and the viruses can use the antibodies like a Trojan horse to invade macrophages, a type of white blood cell that is meant to destroy the virus. But instead, the virus replicates inside the macrophage. This is an issue for some viral&nbsp;diseases,&nbsp;most infamously Dengue fever,&nbsp;where a second different strain exploits the binding antibodies induced by the first infecting strain. However, </span><a class="externalUrl" data-dcnode-id="3323" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pnas.org/content/117/15/8218" rel="nofollow"><span data-dcnode-id="3324" instrument_node="">SARS-CoV-2 doesn’t seem to infect macrophages</span></a><span data-dcnode-id="3322" instrument_node="">, because macrophages don’t have the same receptors (ACE2) that the viral spike protein uses to infect respiratory epithelial cells. So ADE seems intrinsically unlikely.</span></p><span data-dcnode-id="3320" instrument_node="">
</span><p data-dcnode-id="3312"><span data-dcnode-id="3319" instrument_node="">And with Dengue fever, ADE is a harmful condition that is far worse from the virus than from the vaccine. Also, the new mRNA vaccines make ADE even less likely, because they induce a narrower response to the viral spike protein, by which the virus infects cells. So the antibodies are </span><i data-dcnode-id="3317"><span data-dcnode-id="3318" instrument_node="">neutralizing</span></i><span data-dcnode-id="3316" instrument_node=""> antibodies, i.e. those that stop the virus infecting cells without needing immune cells. And if the virus is unable to infect, then it cannot infect macrophages and produce ADE! So if ADE really were a concern, the RNA vaccines are least likely to be a problem, traditional vaccines more of a problem because they induce non-neutralizing antibodies, and the virus most of all! And if ADE were occurring, then we would expect more severe disease in vaccinated people. But the worldwide experience is that vaccinated people who catch C19 have </span><em data-dcnode-id="3314"><span data-dcnode-id="3315" instrument_node="">less</span></em><span data-dcnode-id="3313" instrument_node=""> severe disease.</span></p><span data-dcnode-id="3311" instrument_node="">
</span><br data-dcnode-id="3310"><span data-dcnode-id="3309" instrument_node=""> </span><center data-dcnode-id="3303"><span data-dcnode-id="3308" instrument_node=""> </span><b data-dcnode-id="3305"><a data-dcnode-id="3306" href="#contents"><span data-dcnode-id="3307" instrument_node="">Back to contents</span></a></b><span data-dcnode-id="3304" instrument_node=""> </span></center><span data-dcnode-id="3302" instrument_node=""> </span><a data-dcnode-id="3301" name="package"></a><span data-dcnode-id="3300" instrument_node="">
</span><h3 data-dcnode-id="3298"><span data-dcnode-id="3299" instrument_node=""> “Look at all the dangerous things listed in the package insert!” </span></h3><span data-dcnode-id="3297" instrument_node="">
</span><p data-dcnode-id="3292"><span data-dcnode-id="3296" instrument_node=""> Much of this type of argument is addressed in the above section about poisons. Also, we note that these inserts are written by the same ‘Big Pharma’ that is often vilified (see </span><a data-dcnode-id="3294" href="#Vaccination_supporters_are"><span data-dcnode-id="3295" instrument_node="">below</span></a><span data-dcnode-id="3293" instrument_node="">), and usually approved by government departments such as the FDA in the USA. They are legal documents, not medical ones, and apply to all prescription medicines as well. </span></p><span data-dcnode-id="3291" instrument_node="">
</span><p data-dcnode-id="3289"><span data-dcnode-id="3290" instrument_node=""> One thing that anti-vaxers pick up on are the reported side effects that the inserts are required to list, even without any proof of causation. And often, there are articles on junk websites with mendacious clickbait titles. One that has been doing the rounds is a heading, usually in the obligatory all-capitals: </span></p><span data-dcnode-id="3288" instrument_node="">
</span><blockquote data-dcnode-id="3281"><p data-dcnode-id="3286"><span data-dcnode-id="3287" instrument_node="">FDA announced that vaccines are causing autism:</span></p><span data-dcnode-id="3285" instrument_node="">
</span><p data-dcnode-id="3283"><span data-dcnode-id="3284" instrument_node=""> The FDA has published conclusive proof on their website that the dtap vaccine can cause autism. </span></p><span data-dcnode-id="3282" instrument_node="">
</span></blockquote><span data-dcnode-id="3280" instrument_node=""> </span><p data-dcnode-id="3278"><span data-dcnode-id="3279" instrument_node="">Then usually something about the FDA ‘admitting’ a causal link. </span></p><span data-dcnode-id="3277" instrument_node="">
</span><p data-dcnode-id="3275"><span data-dcnode-id="3276" instrument_node=""> But the highlighted paragraph which they hope people will not read carefully is: </span></p><span data-dcnode-id="3274" instrument_node="">
</span><blockquote data-dcnode-id="3263"><span data-dcnode-id="3273" instrument_node=""> Adverse events </span><em data-dcnode-id="3271"><span data-dcnode-id="3272" instrument_node="">reported</span></em><span data-dcnode-id="3270" instrument_node=""> during post-approval use of Tripedia vaccine include idiopathic thrombocytopenic purpura, SIDS, anaphylactic reaction, cellulitis, autism, convulsion/grand mal convulsion, encephalopathy, hypotonia, neuropathy, somnolence and apnea. Events were included in this list because of the seriousness or frequency of reporting. Because these events are </span><em data-dcnode-id="3268"><span data-dcnode-id="3269" instrument_node="">reported voluntarily</span></em><span data-dcnode-id="3267" instrument_node=""> from a population of uncertain size, it is </span><em data-dcnode-id="3265"><span data-dcnode-id="3266" instrument_node=""> not always possible to reliably estimate their frequencies or to establish a causal relationship </span></em><span data-dcnode-id="3264" instrument_node=""> to components of Tripedia vaccine.</span></blockquote><span data-dcnode-id="3262" instrument_node=""> </span><p data-dcnode-id="3254"><span data-dcnode-id="3261" instrument_node="">I have italicized some key words above, which should make it clear that these are </span><em data-dcnode-id="3259"><span data-dcnode-id="3260" instrument_node="">voluntarily reported</span></em><span data-dcnode-id="3258" instrument_node=""> claims. There is no endorsement of whether the reports are accurate. Indeed, they make it clear that </span><em data-dcnode-id="3256"><span data-dcnode-id="3257" instrument_node=""> there is no proof that the vaccine actually caused these problems. </span></em><span data-dcnode-id="3255" instrument_node=""> </span></p><span data-dcnode-id="3253" instrument_node="">
</span><br data-dcnode-id="3252"><span data-dcnode-id="3251" instrument_node=""> </span><center data-dcnode-id="3245"><span data-dcnode-id="3250" instrument_node=""> </span><b data-dcnode-id="3247"><a data-dcnode-id="3248" href="#contents"><span data-dcnode-id="3249" instrument_node="">Back to contents</span></a></b><span data-dcnode-id="3246" instrument_node=""> </span></center><span data-dcnode-id="3244" instrument_node=""> </span><a data-dcnode-id="3243" name="vaccine_injuries"></a><span data-dcnode-id="3242" instrument_node="">
</span><h3 data-dcnode-id="3240"><span data-dcnode-id="3241" instrument_node="">Vaccine injuries</span></h3><span data-dcnode-id="3239" instrument_node="">
</span><aside class="pullquote right" data-dcnode-id="3237" style="width: 200px;"><span data-dcnode-id="3238" instrument_node=""> Vaccines keep us healthy. They eradicate disease. If I had children, I would get them vaccinated.—Leah Durant, vaccine injury lawyer. </span></aside><span data-dcnode-id="3236" instrument_node=""> </span><p data-dcnode-id="3234"><span data-dcnode-id="3235" instrument_node=""> Vaccine injury stories are not what they seem. E.g the USA government maintains the VAERS – the Vaccine Adverse Event Reporting System, and Australia has TGA Database of Adverse Event Notifications. Anti-vaxers point to these as evidence for widespread problems. But in reality, these are collections of unverified reports, even saying so up-front: </span></p><span data-dcnode-id="3233" instrument_node="">
</span><blockquote data-dcnode-id="3229"><p data-dcnode-id="3231"><span data-dcnode-id="3232" instrument_node=""> In accessing the database we encourage consumers to understand that a report of an adverse event does not necessarily indicate there is a causal link between a medicine and an adverse outcome. </span></p><span data-dcnode-id="3230" instrument_node="">
</span></blockquote><span data-dcnode-id="3228" instrument_node=""> </span><p data-dcnode-id="3226"><span data-dcnode-id="3227" instrument_node="">VAERS also has the following:</span></p><span data-dcnode-id="3225" instrument_node="">
</span><blockquote data-dcnode-id="3222"><strong data-dcnode-id="3223"><span data-dcnode-id="3224" instrument_node="">Disclaimer</span></strong></blockquote><span data-dcnode-id="3221" instrument_node=""> </span><blockquote data-dcnode-id="3219"><span data-dcnode-id="3220" instrument_node=""> VAERS accepts reports of adverse events and reactions that occur following vaccination. Healthcare providers, vaccine manufacturers, and the public can submit reports to the system. While very important in monitoring vaccine safety, VAERS reports alone cannot be used to determine if a vaccine caused or contributed to an adverse event or illness. The reports may contain information that is incomplete, inaccurate, coincidental, or unverifiable. In large part, reports to VAERS are voluntary, which means they are subject to biases. This creates specific limitations on how the data can be used scientifically. Data from VAERS reports should always be interpreted with these limitations in mind.</span></blockquote><span data-dcnode-id="3218" instrument_node=""> </span><p data-dcnode-id="3209"><span data-dcnode-id="3217" instrument_node="">Some of these reports that made it into the database were demonstrably false claims that vaccines cause Shaken Baby Syndrome, and even absurd ones such as one claiming that vaccines turned into the Incredible Hulk. In fact, under 3% of the cases in the VAERS database were definitely caused by vaccines—and most of this small fraction were minor injuries like low-grade fever or soreness at the injection site.</span><sup data-dcnode-id="3214"><a class="forwardref" data-dcnode-id="3215" data-html=" Loughlin, A.M. <em>et al.</em>, Causality assessment of adverse events reported to the Vaccine Adverse Event Reporting System (VAERS), <em>Vaccine</em> <strong>30</strong> (50):7253–9, 26 Nov 2012 | doi:10.1016/j.vaccine.2012.09.074." data-offset="-10" data-variation="small wide"><span data-dcnode-id="3216" instrument_node="">70</span></a></sup><span data-dcnode-id="3213" instrument_node=""> “When you do the real numbers, the risk of serious vaccine injury is orders of magnitude less than 1%.”</span><sup data-dcnode-id="3210"><a class="forwardref" data-dcnode-id="3211" data-html=" McGrath, K., Vaccine injury stories: the sacred cows of the Internet? voicesforvaccines.org." data-offset="-10" data-variation="small wide"><span data-dcnode-id="3212" instrument_node="">71</span></a></sup></p><span data-dcnode-id="3208" instrument_node="">
</span><p data-dcnode-id="3203"><span data-dcnode-id="3207" instrument_node=""> In fact, although the National Vaccine Injury Compensation Program (VICP) in the USA has an even lower standard of proof than even a civil case (preponderance of evidence), it has awarded comparatively very few payouts. From 2006 to 2014, 1,876 of those received compensation, which sounds like a lot, until it is compared with about 2.5 billion doses of vaccines were administered in those years. This means under one chance in a million risk of harm serious enough to warrant a payout.</span><sup data-dcnode-id="3204"><a class="forwardref" data-dcnode-id="3205" data-html=" Kluger, J., Here’s how the anti-vaxxers’ strongest argument falls apart, <i>Time,</i> 19 Aug 2015; time.com." data-offset="-10" data-variation="small wide"><span data-dcnode-id="3206" instrument_node="">72</span></a></sup></p><span data-dcnode-id="3202" instrument_node="">
</span><a data-dcnode-id="3201" name="vaers-c19"></a><span data-dcnode-id="3200" instrument_node=""> </span><h4 data-dcnode-id="3198"><span data-dcnode-id="3199" instrument_node="">Covid update</span></h4><p data-dcnode-id="3193"><span data-dcnode-id="3197" instrument_node="">The old discredited </span><i data-dcnode-id="3195"><span data-dcnode-id="3196" instrument_node="">argumentum ad VAERSum</span></i><span data-dcnode-id="3194" instrument_node=""> fallacy has received a new life because of the far greater number reporting on the C19 vaccines, which is hardly surpriing with a highly publicized mass-vaccination campaign. For instance, when I received my shots, I was encouraged to sign up for V-safe on my Smartphone so I could report adverse effects. Every day, then every week, I received texts asking me to report symptoms, big and small. With so many more people reporting, it should not be surprising that there are many more adverse reports than for other vaccines. It certainly seems odd that if there were a conspiracy to hide ill effects of the vaccine, the CDC would go out of its way to encourage reporting them! It is thus unfair to cite a 2009 Harvard study claiming that only 1% of vaccine adverse reactions are reported. That is irrelevant for today, and in any case, this applies to all adverse reactions from the very minor pain in the injection site to severe. The severe reactions were reported more often; minor ones, not so much. I never bothered to report any.</span></p><span data-dcnode-id="3192" instrument_node="">
</span><p data-dcnode-id="3178"><span data-dcnode-id="3191" instrument_node="">But to put it in perspective, whatever the numbers of VAERS-reported (not verified!) vaccine-caused deaths, they are a minuscule percentage of the total number of people vaccinated. Suppose (</span><i data-dcnode-id="3189"><span data-dcnode-id="3190" instrument_node="">arguendo</span></i><span data-dcnode-id="3188" instrument_node="">) that it’s the highest number so far, </span><a class="externalUrl" data-dcnode-id="3186" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nebraskamed.com/COVID/does-vaers-list-deaths-caused-by-covid-19-vaccines" rel="nofollow"><span data-dcnode-id="3187" instrument_node="">14,506 (as of 2 Nov 2021)</span></a><span data-dcnode-id="3185" instrument_node="">. That is 0.0065% of the 223M people fully vaccinated at the time. Remember, as </span><a data-dcnode-id="3183" href="#mortality"><span data-dcnode-id="3184" instrument_node="">documented above</span></a><span data-dcnode-id="3182" instrument_node="">, the case fatality rate of the disease is about 1.6%, so the vaccine is about 250× safer. Even the proponents of hydroxychloroquine have said that it reduces the mortality rate of corona patients to 0.7% or perhaps 0.5% (</span><a data-dcnode-id="3180" href="#hcq"><span data-dcnode-id="3181" instrument_node="">see below</span></a><span data-dcnode-id="3179" instrument_node="">). So taking the most pessimistic vax death figure and the most optimistic HCQ figure, the vax is still about 40× safer than catching the Rona and treating with HCQ, or ivermectin for that matter.</span></p><span data-dcnode-id="3177" instrument_node="">
</span><p data-dcnode-id="3167"><a class="externalUrl" data-dcnode-id="3175" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdc.gov/coronavirus/2019-ncov/vaccines/safety/adverse-events.html" rel="nofollow"><span data-dcnode-id="3176" instrument_node="">In reality</span></a><span data-dcnode-id="3174" instrument_node="">, even </span><i data-dcnode-id="3172"><span data-dcnode-id="3173" instrument_node="">offically</span></i><span data-dcnode-id="3171" instrument_node=""> reported deaths are an even lower percentage out of the hundreds of millions of vaccinated people, and </span><i data-dcnode-id="3169"><span data-dcnode-id="3170" instrument_node="">confirmed</span></i><span data-dcnode-id="3168" instrument_node=""> deaths far lower still—they can be counted on your fingers:</span></p><span data-dcnode-id="3166" instrument_node="">
</span><blockquote data-dcnode-id="3164"><span data-dcnode-id="3165" instrument_node="">Reports of death after COVID-19 vaccination are rare. More than 459 million doses of COVID-19 vaccines were administered in the United States from December 14, 2020, through November 29, 2021. During this time, VAERS received 10,128 reports of death (0.0022%) among people who received a COVID-19 vaccine. FDA requires healthcare providers to report any death after COVID-19 vaccination to VAERS, even if it’s unclear whether the vaccine was the cause. Reports of adverse events to VAERS following vaccination, including deaths, do not necessarily mean that a vaccine caused a health problem. CDC clinicians review reports of death to VAERS including death certificates, autopsy, and medical records. A review of reports indicates a causal relationship between the J&amp;J/Janssen COVID-19 Vaccine and TTS, a rare and serious adverse event—that causes blood clots with low platelets—which has caused or directly contributed to six confirmed deaths.</span></blockquote><span data-dcnode-id="3163" instrument_node="">
</span><a data-dcnode-id="3162" name="lawsuits"></a><span data-dcnode-id="3161" instrument_node=""> </span><h4 data-dcnode-id="3159"><span data-dcnode-id="3160" instrument_node="">Vaccine manufacturers are protected from lawsuits</span></h4><p data-dcnode-id="3157"><span data-dcnode-id="3158" instrument_node=""> The above vaccine injury court provides protection for the one in a million who are injured by vaccines. This is a better system than relying on the lawsuit lottery. This can result in payouts for clients with the most persuasive lawyers. Also, it can mean that even if a company wins, the legal fees are still like a loss in countries without a ‘loser pays’ system. It could mean that companies would need large lawsuit insurance—and pass on the cost to consumers—or shy off making these life-saving vaccines altogether. Fears of vexatious litigation already makes other products and services more expensive, and has prevented us from having other nice things altogether. </span></p><span data-dcnode-id="3156" instrument_node="">
</span><p data-dcnode-id="3151"><span data-dcnode-id="3155" instrument_node=""> Also, as explained in the section on </span><a data-dcnode-id="3153" href="#big-pharma"><span data-dcnode-id="3154" instrument_node="">Big Pharma</span></a><span data-dcnode-id="3152" instrument_node="">, a company that makes a life-saving product will earn lots ot money. A company with a reputation for dodgy product will lose lots of money, or even be criminally prosecuted. A dead customer will not buy any more products, and neither will family or friends. </span></p><span data-dcnode-id="3150" instrument_node="">
</span><a data-dcnode-id="3149" name="lawyer"></a><span data-dcnode-id="3148" instrument_node=""> </span><h4 data-dcnode-id="3146"><span data-dcnode-id="3147" instrument_node="">Vaccine injury lawyer supports vaccination!</span></h4><figure class="right" data-dcnode-id="3144" style="max-width: 400px"><img alt="vaccine-needle" data-dcnode-id="3145" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dl0.creation.com/articles/p124/c12495/vaccine-needle.jpg&amp;raw"></figure><span data-dcnode-id="3143" instrument_node=""> </span><p data-dcnode-id="3141"><span data-dcnode-id="3142" instrument_node=""> In fact, the commonest vaccine injuries have nothing to do with the components of the vaccine, but are shoulder injuries from an improperly used needle. One specialist vaccine injury lawyer, Leah Durant, suffered such an injury. But far from being an anti-vaxer, she is a strong supporter: </span></p><span data-dcnode-id="3140" instrument_node="">
</span><blockquote data-dcnode-id="3135"><span data-dcnode-id="3139" instrument_node=""> Vaccines keep us healthy. They eradicate disease. If I had children, I would get them vaccinated.</span><sup data-dcnode-id="3136"><a class="forwardref" data-dcnode-id="3137" data-html=" Wadman, M., Vaccines on trial: U.S. court separates fact from fiction, sciencemag.org, 27 Apr 2017 | doi:10.1126/science.aal1109." data-offset="-10" data-variation="small wide"><span data-dcnode-id="3138" instrument_node="">73</span></a></sup></blockquote><span data-dcnode-id="3134" instrument_node=""> </span><p data-dcnode-id="3132"><span data-dcnode-id="3133" instrument_node="">And when parents ask for her help to try to evade a vaccination requirement for a school, she refuses. Instead, she says: </span></p><span data-dcnode-id="3131" instrument_node="">
</span><blockquote data-dcnode-id="3129"><span data-dcnode-id="3130" instrument_node=""> I talk to them about my personal view about vaccinations and the fact that I feel vaccines are safe.</span></blockquote><span data-dcnode-id="3128" instrument_node=""> </span><a data-dcnode-id="3127" name="moral"></a><span data-dcnode-id="3126" instrument_node=""> </span><br data-dcnode-id="3125"><span data-dcnode-id="3124" instrument_node=""> </span><center data-dcnode-id="3118"><span data-dcnode-id="3123" instrument_node=""> </span><b data-dcnode-id="3120"><a data-dcnode-id="3121" href="#contents"><span data-dcnode-id="3122" instrument_node="">Back to contents</span></a></b><span data-dcnode-id="3119" instrument_node=""> </span></center><h2 data-dcnode-id="3116"><span data-dcnode-id="3117" instrument_node="">Theological/moral objections</span></h2><span data-dcnode-id="3115" instrument_node="">
</span><a data-dcnode-id="3114" name="immune"></a><span data-dcnode-id="3113" instrument_node="">
</span><h3 data-dcnode-id="3111"><span data-dcnode-id="3112" instrument_node=""> “God made a perfect immune system and doesn’t need our help” </span></h3><span data-dcnode-id="3110" instrument_node="">
</span><p data-dcnode-id="3108"><span data-dcnode-id="3109" instrument_node=""> Yes, He did, but we are now in a fallen world. The present curse-affected immune system demonstrably doesn’t protect us from every disease, as shown by the millions who have died from such diseases over history. The same applies to those who think ‘natural is good’, a form of the naturalistic fallacy, since nature is cursed (plagues are also ‘natural’). In a fallen world, there have also been many mutations of bacteria and viruses, which now cause diseases that were not there in an originally created very good world. </span></p><span data-dcnode-id="3107" instrument_node="">
</span><p data-dcnode-id="3102"><span data-dcnode-id="3106" instrument_node=""> We should also note that if people were consistent with such claims, then they wouldn’t take care of any broken skin, because why does God need our help to wash and dress wounds given that the immune system He designed can manage without our help? Nor should we apply plasters or stitches to bleeding wounds, because God created Adam with a perfect blood-clotting system that doesn’t need our clever help. (But see Jesus’ reaction when Satan made a similar suggestion to Him—</span><a class="rtBibleRef" data-dcnode-id="3104" data-purpose="bible-reference" data-reference="Matt 4.6–7" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/esv/Matt%25204.6%25E2%2580%25937" rel="noopener" target="_blank"><span data-dcnode-id="3105" instrument_node="">Matthew 4:6–7</span></a><span data-dcnode-id="3103" instrument_node="">.) </span></p><span data-dcnode-id="3101" instrument_node="">
</span><p data-dcnode-id="3099"><span data-dcnode-id="3100" instrument_node=""> Also, since God gave Adam perfect eyesight, then we shouldn’t wear glasses, since why does God need our help with His (now broken) design of the eyes with our ‘clever’ refractive aids? </span></p><span data-dcnode-id="3098" instrument_node="">
</span><p data-dcnode-id="3096"><span data-dcnode-id="3097" instrument_node=""> Such a claim is also an affront to God’s sovereignty. God not only ordains the ends, but the means. If God chooses to bless someone with freedom from diseases, the means by which He bestows this blessing could certainly include vaccination. I’m reminded of this old tale: </span></p><span data-dcnode-id="3095" instrument_node="">
</span><blockquote data-dcnode-id="3070"><p data-dcnode-id="3093"><span data-dcnode-id="3094" instrument_node=""> A very religious man was once caught in rising floodwaters. He climbed onto the roof of his house and trusted God to rescue him. A neighbour came by in a canoe and said, “The waters will soon be above your house. Hop in and we’ll paddle to safety.” </span></p><span data-dcnode-id="3092" instrument_node="">
</span><p data-dcnode-id="3090"><span data-dcnode-id="3091" instrument_node=""> “No thanks,” replied the religious man. “I’ve prayed to God and I’m sure he will save me.” </span></p><span data-dcnode-id="3089" instrument_node="">
</span><p data-dcnode-id="3087"><span data-dcnode-id="3088" instrument_node=""> A short time later the police came by in a boat. “The waters will soon be above your house. Hop in and we’ll take you to safety.” </span></p><span data-dcnode-id="3086" instrument_node="">
</span><p data-dcnode-id="3084"><span data-dcnode-id="3085" instrument_node=""> “No thanks,” replied the religious man. “I’ve prayed to God and I’m sure he will save me.” </span></p><span data-dcnode-id="3083" instrument_node="">
</span><p data-dcnode-id="3081"><span data-dcnode-id="3082" instrument_node=""> A little time later a rescue services helicopter hovered overhead, let down a rope ladder and said. “The waters will soon be above your house. Climb the ladder and we’ll fly you to safety.” </span></p><span data-dcnode-id="3080" instrument_node="">
</span><p data-dcnode-id="3078"><span data-dcnode-id="3079" instrument_node=""> “No thanks,” replied the religious man. “I’ve prayed to God and I’m sure he will save me.” </span></p><span data-dcnode-id="3077" instrument_node="">
</span><p data-dcnode-id="3075"><span data-dcnode-id="3076" instrument_node=""> All this time the floodwaters continued to rise, until soon they reached above the roof and the religious man drowned. When he arrived at heaven he demanded an audience with God. Ushered into God’s throne room he said, “Lord, why am I here in heaven? I prayed for you to save me, I trusted you to save me from that flood.” </span></p><span data-dcnode-id="3074" instrument_node="">
</span><p data-dcnode-id="3072"><span data-dcnode-id="3073" instrument_node=""> “Yes, you did my child,” replied the Lord. “And I sent you a canoe, a boat and a helicopter. But you never got in.” </span></p><span data-dcnode-id="3071" instrument_node="">
</span></blockquote><span data-dcnode-id="3069" instrument_node=""> </span><p data-dcnode-id="3067"><span data-dcnode-id="3068" instrument_node="">Of course, God could have rescued him supernaturally, and it is biblical to seek healing first from Him. The point is that unless one believes that God is no longer the sovereign of even this fallen world, He is also worthy of praise for the development of such things as surgical advances, antibiotics, and vaccines, and in particular, ones that take advantage of His designed immune system. If, as seems likely, an effective vaccine is developed for the Ebola that is currently wiping out many thousands (written in January 2015), such outbreaks amid fears of worldwide epidemics will be consigned to history books. We will then have a right to also see this as part of His divine blessing—just as when He supernaturally heals without any mediate cause. </span></p><span data-dcnode-id="3066" instrument_node="">
</span><a data-dcnode-id="3065" name="luther"></a><span data-dcnode-id="3064" instrument_node="">
</span><p data-dcnode-id="3056"><span data-dcnode-id="3063" instrument_node="">Furthermore, </span><a data-dcnode-id="3061" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creation.com/martin-luther-shook-world"><span data-dcnode-id="3062" instrument_node="">Martin Luther</span></a><span data-dcnode-id="3060" instrument_node=""> wrote in a letter, “</span><a class="externalUrl" data-dcnode-id="3058" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//reporter.lcms.org/wp-content/uploads/2020/03/Plague-blogLW.pdf" rel="nofollow"><span data-dcnode-id="3059" instrument_node="">Whether One May Flee From A Deadly Plague</span></a><span data-dcnode-id="3057" instrument_node="">”, in response to Reverend Doctor Johann Hess, pastor at Breslau, and his congregation:</span></p><span data-dcnode-id="3055" instrument_node="">
</span><blockquote data-dcnode-id="3032"><p data-dcnode-id="3053"><span data-dcnode-id="3054" instrument_node="">Others sin on the right hand. They are much too rash and reckless, tempting God and disregarding everything which might counteract death and the plague. They disdain the use of medicines; they do not avoid places and persons infected by the plague, but lightheartedly make sport of it and wish to prove how independent they are. They say that it is God’s
punishment; if he wants to protect them he can do so without medicines or our carefulness. This is not trusting God but tempting him. God has created medicines and provided us with intelligence to guard and take good care of the body so that we can live in good health.</span></p><span data-dcnode-id="3052" instrument_node="">
</span><p data-dcnode-id="3050"><span data-dcnode-id="3051" instrument_node="">If one makes no use of intelligence or medicine when he could do so without detriment to his neighbor, such a person injures his body and must beware lest he become a suicide in God’s eyes. By the same reasoning a person might forego eating and drinking, clothing and shelter, and boldly proclaim his faith that if God wanted to preserve him from starvation
and cold, he could do so without food and clothing. Actually that would be suicide. It is even more shameful for a person to pay no heed to his own body and to fail to protect
it against the plague the best he is able, and then to infect and poison others who might have remained alive if he had taken care of his body as he should have. He is thus responsible before God for his neighbor’s death and is a murderer many times over. Indeed, such people behave as though a house were burning in the city and nobody were trying to
put the fire out. Instead they give leeway to the flames so that the whole city is consumed, saying that if God so willed, he could save the city without water to quench the fire.</span></p><p data-dcnode-id="3048"><span data-dcnode-id="3049" instrument_node="">
</span></p><p data-dcnode-id="3046"><span data-dcnode-id="3047" instrument_node="">No, my dear friends, that is no good. Use medicine; take potions which can help you; fumigate house, yard, and street; shun persons and places wherever your neighbor does
not need your presence or has recovered, and act like a man who wants to help put out the burning city. What else is the epidemic but a fire which instead of consuming wood and
straw devours life and body? You ought to think this way:</span></p><p data-dcnode-id="3044"><span data-dcnode-id="3045" instrument_node="">
</span></p><blockquote data-dcnode-id="3042"><span data-dcnode-id="3043" instrument_node="">Very well, by God’s decree the enemy has sent us poison and deadly offal. Therefore I shall ask God mercifully to protect us. Then I shall fumigate, help purify the air, administer medicine, and take it. I shall avoid places and persons where my presence is not needed in order not to become contaminated and thus perchance infect and pollute others, and so cause their death as a result of my negligence. If God should wish to take me, he will surely find me and I have done what he has expected of me and so I am not responsible for either
my own death or the death of others. If my neighbor needs me, however, I shall not avoid place or person but will go freely, as stated above.</span></blockquote><span data-dcnode-id="3041" instrument_node="">
</span><p data-dcnode-id="3039"><span data-dcnode-id="3040" instrument_node="">See, this is such a God-fearing faith because it is neither brash nor foolhardy and does not tempt God.</span></p><span data-dcnode-id="3038" instrument_node="">
</span><p data-dcnode-id="3033"><span data-dcnode-id="3037" instrument_node="">Moreover, he who has contracted the disease and recovered should keep away from others and not admit them into his presence unless it be necessary. Though one should aid
him in his time of need, as previously pointed out, he in turn should, after his recovery, so act toward others that no one becomes unnecessarily endangered on his account and so cause another’s death. “Whoever loves danger,” says the wise man, “will perish by it” [</span><a class="rtBibleRef" data-dcnode-id="3035" data-purpose="bible-reference" data-reference="Sirach. 3.26" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/esv/Sirach.%25203.26" rel="noopener" target="_blank"><span data-dcnode-id="3036" instrument_node="">Ecclus. 3:26</span></a><span data-dcnode-id="3034" instrument_node="">]. If the people in a city were to show themselves bold in their faith when a neighbor’s need so demands, and cautious when no emergency exists, and if everyone would help ward off contagion as best he can, then the death toll would indeed be moderate. But
if some are too panicky and desert their neighbors in their plight, and if some are so foolish as not to take precautions but aggravate the contagion, then the devil has a heyday and many will die. On both counts this is a grievous offense to God and to man—here it is tempting God; there it is bringing man into despair. Then the one who flees, the devil will pursue; the one who stays behind, the devil will hold captive so that no one escapes him.</span></p></blockquote><span data-dcnode-id="3031" instrument_node="">
</span><br data-dcnode-id="3030"><span data-dcnode-id="3029" instrument_node=""> </span><center data-dcnode-id="3023"><span data-dcnode-id="3028" instrument_node=""> </span><b data-dcnode-id="3025"><a data-dcnode-id="3026" href="#contents"><span data-dcnode-id="3027" instrument_node="">Back to contents</span></a></b><span data-dcnode-id="3024" instrument_node=""> </span></center><span data-dcnode-id="3022" instrument_node=""> </span><a data-dcnode-id="3021" name="big-pharma"></a><span data-dcnode-id="3020" instrument_node="">
</span><h3 data-dcnode-id="3018"><span data-dcnode-id="3019" instrument_node="">“Vaccination supporters are Big Pharma shills”</span></h3><span data-dcnode-id="3017" instrument_node="">
</span><p data-dcnode-id="3012"><span data-dcnode-id="3016" instrument_node=""> Of course, this is an ‘abusive </span><em data-dcnode-id="3014"><span data-dcnode-id="3015" instrument_node="">ad hominem</span></em><span data-dcnode-id="3013" instrument_node=""> ’ argument that’s far too common among anti-vaxers. A similar argument that is at least not a personal attack is to complain about the large profits of pharmaceutical companies. </span></p><span data-dcnode-id="3011" instrument_node="">
</span><figure class="left" data-dcnode-id="3007" style="max-width: 300px"><img alt="Jonas-Salk" data-dcnode-id="3010" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dl0.creation.com/articles/p124/c12495/Jonas-Salk.jpg&amp;raw"><figcaption data-dcnode-id="3008"><span data-dcnode-id="3009" instrument_node="">Jonas Salk, inventor of polio vaccine</span></figcaption></figure><span data-dcnode-id="3006" instrument_node=""> </span><p data-dcnode-id="3001"><span data-dcnode-id="3005" instrument_node=""> I </span><em data-dcnode-id="3003"><span data-dcnode-id="3004" instrument_node="">prefer</span></em><span data-dcnode-id="3002" instrument_node=""> vaccines to be made from profit-oriented companies, because they will earn profits only if buyers are confident that they will work. And probably even more importantly, they will suffer bad losses if they make something that hurts someone. Conversely, non-profit also means non-loss, and I can see little worse than decisions made by people who don’t stand to lose if they hurt people. As Adam Smith, actually a moral philosopher before he turned to economics, said about 200 years ago, “It is not from the benevolence of the butcher, the brewer, or the baker that we expect our dinner, but from their regard to their own interest.” In this fallen world, selfishness is a ubiquitous human condition. </span></p><span data-dcnode-id="3000" instrument_node="">
</span><p data-dcnode-id="2998"><span data-dcnode-id="2999" instrument_node=""> Also, the polio vaccine pioneer Jonas Salk famously refused to profit from his work, which probably could have made him $7 billion if he had patented it. Another thing, the flu shot is under $30, while there would be much more pharmaceutical profit if a person had to be hospitalized from influenza, or in days gone by, be maintained in an iron lung from polio. </span></p><span data-dcnode-id="2997" instrument_node="">
</span><p data-dcnode-id="2965"><span data-dcnode-id="2996" instrument_node=""> Sometimes this argument is accompanied by claims that ‘Pharma’ must mean ‘sorcery’, because it comes from </span><em data-dcnode-id="2994"><span data-dcnode-id="2995" instrument_node="">pharmakeia</span></em><span data-dcnode-id="2993" instrument_node="">, which is translated that way in the New Testament. However, such claims display ignorance of the difference between Classical Greek and the </span><em data-dcnode-id="2991"><span data-dcnode-id="2992" instrument_node="">Koinē</span></em><span data-dcnode-id="2990" instrument_node=""> Greek of the NT. Like most Greek-derived terms in English, the </span><em data-dcnode-id="2988"><span data-dcnode-id="2989" instrument_node="">Classical Greek</span></em><span data-dcnode-id="2987" instrument_node=""> meaning was used. In particular, ‘pharmacy’ was derived via Old French </span><em data-dcnode-id="2985"><span data-dcnode-id="2986" instrument_node="">farmacie</span></em><span data-dcnode-id="2984" instrument_node="">, in turn derived from the Medieval Latin </span><em data-dcnode-id="2982"><span data-dcnode-id="2983" instrument_node="">pharmacia</span></em><span data-dcnode-id="2981" instrument_node="">, in turn from from the </span><em data-dcnode-id="2979"><span data-dcnode-id="2980" instrument_node="">Classical Greek</span></em><span data-dcnode-id="2978" instrument_node=""> meaning of </span><em data-dcnode-id="2976"><span data-dcnode-id="2977" instrument_node="">pharmakeia</span></em><span data-dcnode-id="2975" instrument_node=""> (</span><span class="greektext" data-dcnode-id="2973"><span data-dcnode-id="2974" instrument_node="">φαρμακεία</span></span><span data-dcnode-id="2972" instrument_node="">), meaning medicine. In turn, this was related to </span><em data-dcnode-id="2970"><span data-dcnode-id="2971" instrument_node="">pharmakon</span></em><span data-dcnode-id="2969" instrument_node=""> (</span><span class="greektext" data-dcnode-id="2967"><span data-dcnode-id="2968" instrument_node="">φάρμακον</span></span><span data-dcnode-id="2966" instrument_node="">) i.e. a drug, whether a cure or a poison. </span></p><span data-dcnode-id="2964" instrument_node="">
</span><p data-dcnode-id="2962"><span data-dcnode-id="2963" instrument_node=""> Finally, many of the anti-vax sites complaining about pharmaceutical profits have huge web stores for their own products. It’s not clear from biblical, or even economic, principles why ‘Big Pharma’ is evil while the multibillion dollar ‘Big Alterna’, ‘Big Essentia’, ‘Big Herba’, ‘Big Natura’, ‘Big Organica’, and ‘Big Supplementia’ (or ‘Big Placebo’) are good. </span></p><span data-dcnode-id="2961" instrument_node="">
</span><p data-dcnode-id="2959"><span data-dcnode-id="2960" instrument_node=""> Every supermarket has rows of shelves full of natural supplements, and many of these supplements contain heavy metals such as iron, copper, and so on. But because these are apparently a natural cure, they are ok, but dangerous when minute doses are put into life-saving vaccines. </span></p><span data-dcnode-id="2958" instrument_node="">
</span><br data-dcnode-id="2957"><span data-dcnode-id="2956" instrument_node=""> </span><center data-dcnode-id="2950"><span data-dcnode-id="2955" instrument_node=""> </span><b data-dcnode-id="2952"><a data-dcnode-id="2953" href="#contents"><span data-dcnode-id="2954" instrument_node="">Back to contents</span></a></b><span data-dcnode-id="2951" instrument_node=""> </span></center><span data-dcnode-id="2949" instrument_node=""> </span><a data-dcnode-id="2948" name="aborted"></a><span data-dcnode-id="2947" instrument_node="">
</span><h3 data-dcnode-id="2945"><span data-dcnode-id="2946" instrument_node="">“Vaccines contain parts of aborted babies”</span></h3><span data-dcnode-id="2944" instrument_node="">
</span><p data-dcnode-id="2942"><span data-dcnode-id="2943" instrument_node=""> As it stands, this claim is false. There are no baby parts in vaccines. There are not even fetal cells. There is a most tenuous connection between abortion and vaccines, as follows: </span></p><span data-dcnode-id="2941" instrument_node="">
</span><p data-dcnode-id="2935"><span data-dcnode-id="2940" instrument_node=""> Bacteria are genuinely living organisms, so can be cultured on nutrients. Viruses are not living,</span><sup data-dcnode-id="2937"><a class="forwardref" data-dcnode-id="2938" data-html=" See also Bergman, J., <a href=&quot;/did-god-make-pathogenic-viruses&quot;>Did God make pathogenic viruses?</a> <em>J. Creation</em> <strong>13</strong> (1):115–125, 1999; creation.com/viruses." data-offset="-10" data-variation="small wide"><span data-dcnode-id="2939" instrument_node="">74</span></a></sup><span data-dcnode-id="2936" instrument_node=""> so require some living cells to be cultured on. Pasteur’s pioneering vaccination against rabies, caused by lyssaviruses, was obtained from the nerves of rabbits that had died from the disease. Pasteur weakened the virus by drying the nerve tissue for 5–10 days. Now most rabies is cultured on embryonic eggs—but those of chickens (‘RabAvert’), not humans. </span></p><span data-dcnode-id="2934" instrument_node="">
</span><p data-dcnode-id="2926"><span data-dcnode-id="2933" instrument_node=""> Unfortunately, some vaccines have been cultured on cell lines that came </span><em data-dcnode-id="2931"><span data-dcnode-id="2932" instrument_node="">originally</span></em><span data-dcnode-id="2930" instrument_node=""> from aborted babies: one (MRC-5) from an abortion that was performed in September 1966 and one (WI-38) that was performed in July 1962. There is no question that these original abortions were sinful. (For the HEK-293 dating to 1972/3, see </span><a data-dcnode-id="2928" href="#covid"><span data-dcnode-id="2929" instrument_node="">COVID-19 update</span></a><span data-dcnode-id="2927" instrument_node="">.) </span></p><span data-dcnode-id="2925" instrument_node="">
</span><p data-dcnode-id="2914"><span data-dcnode-id="2924" instrument_node=""> CMI takes a strongly pro-life position, that the human individual life begins at conception/fertilization, thus abortion is totally wrong, even for rape and incest (do children of rapists deserve the death penalty?). But note: cell </span><i data-dcnode-id="2922"><span data-dcnode-id="2923" instrument_node="">lines</span></i><span data-dcnode-id="2921" instrument_node=""> . This means descendants of descendants of descendants of </span><i data-dcnode-id="2919"><span data-dcnode-id="2920" instrument_node="">one</span></i><span data-dcnode-id="2918" instrument_node=""> cell from each of these babies. And when a virus reproduces inside a cell, the cell is destroyed. So there are neither fetal cells nor fetal body parts.</span><sup data-dcnode-id="2915"><a class="forwardref" data-dcnode-id="2916" data-html=" ‘The Vaccine Mom’, Descendants of human fetal cells in the making of vaccines, thevaccinemom.com, 7 Feb 2015. The author is Taryn (Harvey-)Chapman, a medical molecular biologist who works as the immunologist for a team of biomedical engineers focusing on creating new vaccine technology. She started ‘The Vaccine Mom’ after her own children were born, and of course then vaccinated, so she could communicate up-to-date vaccine research in a way that most concerned parents can understand." data-offset="-10" data-variation="small wide"><span data-dcnode-id="2917" instrument_node="">75</span></a></sup></p><span data-dcnode-id="2913" instrument_node="">
</span><p data-dcnode-id="2895"><span data-dcnode-id="2912" instrument_node=""> The above is the tenuous connection between vaccines and abortion. However, no new embryos are being generated for the purpose of culturing vaccines—this would be immoral. Rather, these vaccines use the cell lines from a baby </span><em data-dcnode-id="2910"><span data-dcnode-id="2911" instrument_node="">already killed</span></em><span data-dcnode-id="2909" instrument_node=""> decades ago, and that not for the purpose of creating vaccines. Any cultures from these original lines are likely to be now removed by tens of thousands of generations. That deed was unfortunately done, and </span><em data-dcnode-id="2907"><span data-dcnode-id="2908" instrument_node="">cannot be undone</span></em><span data-dcnode-id="2906" instrument_node="">. There is also no evidence of any ‘moral hazard’</span><sup data-dcnode-id="2903"><a class="forwardref" data-dcnode-id="2904" data-html=" Economists use the term ‘moral hazard’ when a particular policy provides an incentive for wrong or counter-productive behaviour. For example, if welfare policies mean that a woman is better off financially being a single mother than marrying the working father of her child, then they will incentivize single motherhood and discourage the biblical ideal of a family with a married mother and father. Economists Thomas Sowell (1930–) and Walter Williams (1936–), themselves ‘African-American’, argue that such policies have done what slavery, overt racism, Jim Crow laws, and segregation could not: destroy the black family in America." data-offset="-10" data-variation="small wide"><span data-dcnode-id="2905" instrument_node="">76</span></a></sup><span data-dcnode-id="2902" instrument_node=""> —that it would lead to more abortions. It would be a different matter when it comes to proposals to abort babies </span><em data-dcnode-id="2900"><span data-dcnode-id="2901" instrument_node="">now</span></em><span data-dcnode-id="2899" instrument_node="">, </span><em data-dcnode-id="2897"><span data-dcnode-id="2898" instrument_node="">specifically</span></em><span data-dcnode-id="2896" instrument_node=""> to make vaccines, then my colleagues and I agree that we should refuse such vaccines and insist on ethical manufacture, such as the new recombinant technology. </span></p><span data-dcnode-id="2894" instrument_node="">
</span><p data-dcnode-id="2877"><span data-dcnode-id="2893" instrument_node=""> Again, as bacteria don’t need to be cultured on live cells, </span><em data-dcnode-id="2888"><span data-dcnode-id="2892" instrument_node=""> this objection cannot be used to oppose </span><strong data-dcnode-id="2890"><span data-dcnode-id="2891" instrument_node="">any</span></strong><span data-dcnode-id="2889" instrument_node=""> vaccines against bacterial diseases! </span></em><span data-dcnode-id="2887" instrument_node=""> Also, although influenza is a viral disease, </span><em data-dcnode-id="2882"><span data-dcnode-id="2886" instrument_node=""> </span><strong data-dcnode-id="2884"><span data-dcnode-id="2885" instrument_node="">none</span></strong><span data-dcnode-id="2883" instrument_node=""> of the influenza vaccines have any connection with these babies. </span></em><span data-dcnode-id="2881" instrument_node=""> Rather, the most widely used flu shot was cultured in fertilzed chicken eggs, which is not surprising because influenza was originally a benign bird virus. The newer cell-based flu vaccines are cultured on Madin–Darby Canine Kidney (MDCK) cells. Both are allowable under the Dominion Mandate of </span><a class="rtBibleRef" data-dcnode-id="2879" data-purpose="bible-reference" data-reference="Gen 1.28" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/esv/Gen%25201.28" rel="noopener" target="_blank"><span data-dcnode-id="2880" instrument_node="">Genesis 1:28</span></a><span data-dcnode-id="2878" instrument_node="">. </span></p><span data-dcnode-id="2876" instrument_node="">
</span><p data-dcnode-id="2871"><span data-dcnode-id="2875" instrument_node=""> A similar comparison would be organ donation. Would we refuse a life-saving organ that was from a victim of a drunk driver for example who listed “Organ Donor” on the driver’s license, because he was killed in a sinful way? Accepting this organ is in no way condoning drunk driving. Another example: it would be totally immoral to murder someone to harvest his organs, even if it would save another person’s life. However, if someone you loved was murdered during an armed robbery, would it be immoral to consent to organ donation, so that even though a terrible sin had been committed, something good came from it, one silver lining on a very dark cloud? And would acceptance of such an organ mean condoning the murder? Similarly, should we refuse a life-saving treatment that is the one good thing that came from the abomination of murdering those two babies?</span><sup data-dcnode-id="2872"><a class="forwardref" data-dcnode-id="2873" data-html=" Sarfati, J., <a href=&quot;/abortion-vaccines&quot;>Vaccines and abortion?</a> creation.com/abortion-vaccine, 24 Mar 2012." data-offset="-10" data-variation="small wide"><span data-dcnode-id="2874" instrument_node="">77</span></a></sup></p><span data-dcnode-id="2870" instrument_node="">
</span><p data-dcnode-id="2865"><span data-dcnode-id="2869" instrument_node=""> Yet another comparison is with Nazi Germany. The </span><a data-dcnode-id="2867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creation.com/apollo-moon-landing-50th-anniversary"><span data-dcnode-id="2868" instrument_node="">Apollo moon landings</span></a><span data-dcnode-id="2866" instrument_node=""> were made with rocket technology that had begun in WW2 under Wernher von Braun, who made the V2 rockets that bombarded England. A BBC article, “Is it right to use Nazi research if it can save lives?” pointed out: </span></p><span data-dcnode-id="2864" instrument_node="">
</span><blockquote data-dcnode-id="2862"><span data-dcnode-id="2863" instrument_node=""> Von Braun’s presence on the Apollo programme was no outlier. More than 120 German scientists and engineers joined him there, including fellow SS officer Kurt Debus (who became director of Nasa’s Launch Operations Center) and Bernhard Tessmann (designer of the colossal Vertical Assembly Building at what is now Kennedy Space Center).</span></blockquote><span data-dcnode-id="2861" instrument_node=""> </span><blockquote data-dcnode-id="2859"><span data-dcnode-id="2860" instrument_node=""> They were among 1,600 scientists recruited by spies as part of Operation Paperclip at the end of World War Two – all shielded from prosecution, given safe passage to the US, and allowed to continue their work.</span></blockquote><span data-dcnode-id="2858" instrument_node=""> </span><blockquote data-dcnode-id="2856"><span data-dcnode-id="2857" instrument_node=""> Allied forces also snapped up other Nazi innovations. Nerve agents such as Tabun and Sarin (which would fuel the development of new insecticides as well as weapons of mass destruction), the antimalarial chloroquine, methadone and methamphetamines, as well as medical research into hypothermia, hypoxia, dehydration and more, were all generated on the back of human experiments in concentration camps.</span></blockquote><span data-dcnode-id="2855" instrument_node=""> </span><blockquote data-dcnode-id="2850"><span data-dcnode-id="2854" instrument_node=""> Particleboard, forms of synthetic rubber and the soft drink Fanta were also developed by the Germans under Nazi rule.</span><sup data-dcnode-id="2851"><a class="forwardref" data-dcnode-id="2852" data-html=" Swain, F., Is it right to use Nazi research if it can save lives? bbc.com, 23 July 2019." data-offset="-10" data-variation="small wide"><span data-dcnode-id="2853" instrument_node="">78</span></a></sup></blockquote><span data-dcnode-id="2849" instrument_node=""> </span><p data-dcnode-id="2844"><span data-dcnode-id="2848" instrument_node="">Note especially chloroquine, which is often promoted as a COVID cure along with the very similar hydroxychoroquine (HCQ). But chloroquine has its origins in Nazi Germany, including unethical medical experiments on Dachau concentration camp inmates forcibly infected with malaria from 1942–1945. Some of the doctors involved were hanged as war criminals after the post-WW2 Doctors’ Trial. In particular, chloroquine was made by the notorious chemical cartel IG Farben, which also made the life-saving sulfanilimide antibacterial Protonsil, as well as synthetic fuel and polyurethane. But its notoriety was due to its manufacture of the genocidal Zyklon B cyanide tablets used to exterminate millions of Jews at Auschwitz–Birkenau and Majdanek during the </span><a data-dcnode-id="2846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creation.com/the-holocaust-and-evolution"><span data-dcnode-id="2847" instrument_node="">Holocaust</span></a><span data-dcnode-id="2845" instrument_node="">. </span></p><span data-dcnode-id="2843" instrument_node="">
</span><p data-dcnode-id="2825"><span data-dcnode-id="2842" instrument_node=""> The general principle here is that </span><em data-dcnode-id="2840"><span data-dcnode-id="2841" instrument_node=""> the beneficiary of the organ must not have been complicit in the crime in the slightest </span></em><span data-dcnode-id="2839" instrument_node=""> (called ‘formal cooperation in evil’). Actually the biblical ethical principles were deduced centuries ago. First, there is the </span><em data-dcnode-id="2837"><span data-dcnode-id="2838" instrument_node="">Principle of Double Effect.</span></em><span data-dcnode-id="2836" instrument_node=""> That is, if a contemplated action has both good and bad effects, then it is permissible only if it is not wrong in itself and if it does not require that one </span><em data-dcnode-id="2834"><span data-dcnode-id="2835" instrument_node="">directly intend</span></em><span data-dcnode-id="2833" instrument_node=""> the bad result. Second, there is “remote mediate material cooperation”, meaning that the moral object of the co-operator (in this case, the one being vaccinated) and that of the wrong-doer (the abortionist who aimed for a dead baby) are distinct. Under this principle, vaccination can be allowed if necessary to prevent severe illness and death (which it does), and if we also clearly condemn both the two abortions from which cell lines were derived and any future abortion to create more cell lines (which incidentally was not the purpose of the two abortions in question).</span><sup data-dcnode-id="2826"><a class="forwardref" data-dcnode-id="2831" data-html=" Jay Wile makes a similar argument in his article Vaccines DO NOT Contain Fetal Tissue, drwile.com/lnkpages/render.asp?vac_abortion, 2009, which independently came to the same conclusions as mine." data-offset="-10" data-variation="small wide"><span data-dcnode-id="2832" instrument_node="">79</span></a><span data-dcnode-id="2830" instrument_node="">,</span><a class="forwardref" data-dcnode-id="2828" data-html=" Grabenstein, J.D., Moral considerations with certain viral vaccines, <em>Christianity and Pharmacy</em> <strong>2</strong> (2):3–6, 1999; immunizationinfo.org/files/nnii/files/Moral_Considerations_With_Certain_Viral_Vaccines.pdf." data-offset="-10" data-variation="small wide"><span data-dcnode-id="2829" instrument_node="">80</span></a><span data-dcnode-id="2827" instrument_node=""> </span></sup></p><span data-dcnode-id="2824" instrument_node="">
</span><p data-dcnode-id="2822"><span data-dcnode-id="2823" instrument_node=""> An official statement from the Roman Catholic Church, which for all its flaws, has been among the staunchest defenders of the unborn, is notable here. The Pontifical Academy for Life, the Vatican’s official voice in the area of abortion/right-to-life, wrote a considered statement on this issue, at the request of the then Cardinal Joseph Ratzinger, the future (and now former) Pope Benedict XVI, in response to Debi Vinnedge of Children of God for Life. </span></p><span data-dcnode-id="2821" instrument_node="">
</span><p data-dcnode-id="2816"><span data-dcnode-id="2820" instrument_node=""> This statement would certainly prefer that no vaccines were made on cell lines from aborted babies. It further strongly urges its flock to demand alternatives without any ethical taint. E.g. the FDA has approved a cell line that originates in human tumour tissue, and another from a non-human tumour, neither of which didn’t require human beings to be killed. Also, some promising measles and rubella vaccines have been made by recombinant technology, but it might take a while for the bureaucrats to approve them. But </span><em data-dcnode-id="2818"><span data-dcnode-id="2819" instrument_node="">until these alternatives exist,</span></em><span data-dcnode-id="2817" instrument_node=""> the statement states that it is permissible to use these vaccines. Indeed, if we did not, we would allow the further evil of endangering one’s own children and the whole community: </span></p><span data-dcnode-id="2815" instrument_node="">
</span><blockquote data-dcnode-id="2801"><span data-dcnode-id="2814" instrument_node=""> As regards the diseases against which there are no alternative vaccines which are available and ethically acceptable, it is right to abstain from using these vaccines if it can be done without causing children, and indirectly the population as a whole, to undergo significant risks to their health. However, if the latter are exposed to considerable dangers to their health, vaccines with moral problems pertaining to them may also be used on a temporary basis. The moral reason is that the duty to avoid </span><em data-dcnode-id="2812"><span data-dcnode-id="2813" instrument_node="">passive material cooperation</span></em><span data-dcnode-id="2811" instrument_node=""> is not obligatory if there is grave inconvenience. Moreover, we find, in such a case, a </span><em data-dcnode-id="2809"><span data-dcnode-id="2810" instrument_node="">proportional reason</span></em><span data-dcnode-id="2808" instrument_node="">, in order to accept the use of these vaccines in the presence of the danger of favouring the spread of the pathological agent, due to the lack of vaccination of children. This is particularly true in the case of vaccination against German measles.</span><sup data-dcnode-id="2802"><a class="forwardref" data-dcnode-id="2806" data-html=" Note in original: “This is particularly true in the case of vaccination against German measles, because of the danger of Congenital Rubella Syndrome. This could occur, causing grave congenital malformations in the foetus, when a pregnant woman enters into contact, even if it is brief, with children who have not been immunized and are carriers of the virus. In this case, the parents who did not accept the vaccination of their own children become responsible for the malformations in question, and for the subsequent abortion of foetuses, when they have been discovered to be malformed.”" data-offset="-10" data-variation="small wide"><span data-dcnode-id="2807" instrument_node="">81</span></a><span data-dcnode-id="2805" instrument_node="">,</span><a class="forwardref" data-dcnode-id="2803" data-html=" Moral reflections on vaccines prepared from cells derived from aborted human foetuses, <em>Pontifical Academy for Life</em>, for the Congregation for the Doctrine of Faith, 9 Jun 2005; immunize.org/concerns/vaticandocument.htm; italics in original." data-offset="-10" data-variation="small wide"><span data-dcnode-id="2804" instrument_node="">82</span></a></sup></blockquote><span data-dcnode-id="2800" instrument_node=""> </span><p data-dcnode-id="2798"><span data-dcnode-id="2799" instrument_node="">CMI is an Evangelical Protestant organization, but we cited the well thought-out-response from the Vatican precisely because the Roman Catholic Church is well known for being the archetypical pro-life organization. It is a sad fact that it took Evangelical organizations quite a long time to catch up. In the 1960s and 70s, some of the best known Evangelical groups were not opposed to legalization of abortion. But here is a recent statement from the The Ethics &amp; Religious Liberty Commission of the Southern Baptist Convention: </span></p><span data-dcnode-id="2797" instrument_node="">
</span><blockquote data-dcnode-id="2795"><span data-dcnode-id="2796" instrument_node=""> Clearly, the process by which these vaccines are made is not ethically ideal.</span></blockquote><span data-dcnode-id="2794" instrument_node=""> </span><blockquote data-dcnode-id="2792"><span data-dcnode-id="2793" instrument_node=""> Therefore, we should continue to advocate for use of alternatives when available and for the development of future vaccines to be carried out by other means.</span></blockquote><span data-dcnode-id="2791" instrument_node=""> </span><blockquote data-dcnode-id="2789"><span data-dcnode-id="2790" instrument_node=""> The key consideration in whether using currently available vaccines is licit or immoral is whether there is material cooperation with the evil act of abortion. If the abortion was conducted in order to harvest tissues that were to be used for the vaccine, then it would clearly be immoral. But in the case of the vaccines listed above, the abortion was carried out for other reasons and the tissue was acquired post-mortem for the purpose medical research.</span></blockquote><span data-dcnode-id="2788" instrument_node=""> </span><blockquote data-dcnode-id="2786"><span data-dcnode-id="2787" instrument_node=""> To determine the morality of using the tissue, it is helpful to compare it to another situation: the use of organs from a person who has been murdered. If a doctor were to offer to transplant a kidney or heart from the murder victim into a Christian, we would likely not have any objection. The primary concern would be whether the victim consented to organ donation prior to their death. But no one would say the Christian who received the organ was morally responsible in any way for the murder. Nor should we be overly concerned with the “slippery slope”of people being murdered in order to expand the number of organ donations. (If we saw evidence of that happening, however, we should change our objection.)</span></blockquote><span data-dcnode-
