</span><p data-dcnode-id="10241"><span data-dcnode-id="10252" instrument_node="">By Nito Gnoci,&nbsp;</span><span data-dcnode-id="10247" style="font-size:11.0pt;font-family:calibri;font-family:'times new roman';"><span data-dcnode-id="10248" style="font-size:12.0pt;font-family:'times new roman'"><a data-dcnode-id="10250" href="mailto:nitognoci@yahoo.com" onclick="return FIX.track(this);"><span data-dcnode-id="10251" instrument_node="">nitognoci@yahoo.com</span></a><span data-dcnode-id="10249" instrument_node="">,&nbsp;November 18, 2017</span></span></span><br data-dcnode-id="10246"><span data-dcnode-id="10243" style="font-size:12.0pt;font-family:arial;font-family:'times new roman';"><a data-dcnode-id="10244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.catholicamericanthinker.com/Anti-Christians-Part-1.html"><span data-dcnode-id="10245" instrument_node="">https://www.CatholicAmericanThinker.com/</span></a></span><br data-dcnode-id="10242"></p><span data-dcnode-id="10240" instrument_node="">
</span><p data-dcnode-id="10238"><span data-dcnode-id="10239" instrument_node="">Anti-Christians have devoted substantial time and industry to not believing in Christ and they have distinguished themselves as able propagandists.&nbsp; Amplified by the corporate media, they have portrayed Christians as intolerant and warlike and irrational – a mob of tattooed savages howling in the dark.&nbsp; Maybe secular anti-Christians’ greatest feat has been making their multiple misdeeds disappear. Let us consider some of these vanished crimes.&nbsp;</span></p><span data-dcnode-id="10237" instrument_node="">
</span><p data-dcnode-id="10234" style="text-align: center;"><u data-dcnode-id="10235"><span data-dcnode-id="10236" instrument_node="">Part I</span></u></p><p data-dcnode-id="10232" style="text-align: center;"><span data-dcnode-id="10233" instrument_node="">Location: centered in France</span></p><p data-dcnode-id="10230" style="text-align: center;"><span data-dcnode-id="10231" instrument_node="">Time: 1700s and early 1800s</span></p><span data-dcnode-id="10229" instrument_node="">
</span><p data-dcnode-id="10214"><span data-dcnode-id="10215" style="font-family: verdana, geneva, sans-serif;"><span data-dcnode-id="10228" instrument_node="">The famous anti-Christian Voltaire championed free speech – at least when he wasn’t singing the praises of war-mongering autocrats like Frederick II of Prussia and Catherine I of Russia.&nbsp;</span><span data-dcnode-id="10224" style="font-size: 13px;"><span data-dcnode-id="10227" instrument_node="">&nbsp;</span><a data-dcnode-id="10225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spectator.co.uk/2015/10/frederick-the-great-king-of-prussia-is-a-great-read/" onclick="return FIX.track(this);" rel="noopener" target="_blank"><span data-dcnode-id="10226" instrument_node="">Frederick</span></a></span><span data-dcnode-id="10222" style="font-size: 12px;"><span data-dcnode-id="10223" instrument_node="">, who was also an anti-Christian, initiated a series of horrific wars which rearranged Europe. He inspired shovelfuls of flattery from Voltaire.&nbsp; Voltaire, who lived in Prussia from 1750-1752, wrote of his bloodthirsty BFF: “He thinks like Marcus Aurelius and writes like Cicero.” Voltaire compared the king to Vergil, Augustus, and even Apollo.&nbsp; Anticipating a meeting with Frederick, Voltaire declared he was “faint from joy”. What did Voltaire gain from all this fawning? He wallowed in “all those little delights which the lord of a castle who is a king can procure for his very obedient humble servants and guests.” Voltaire also produced piles of the grossest flattery to ingratiate himself with Catherine. Voltaire called Catherine, who personally owned 500,000 serfs and massacred peasants who refused to submit to her brilliant enlightened rule, the “Star of the North” and the “Semiramis of the North” (Semiramis was a semi-legendary queen of Assyria admired by Voltaire).&nbsp;</span></span><span data-dcnode-id="10216" style="font-size: 13px;"><a data-dcnode-id="10220" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/world/2006/jun/02/russia.books" onclick="return FIX.track(this);" rel="noopener" target="_blank"><span data-dcnode-id="10221" instrument_node="">The
philosopher even praised her military campaigns.</span></a><span data-dcnode-id="10218" style="color: windowtext;"><span data-dcnode-id="10219" instrument_node="">&nbsp;</span></span><span data-dcnode-id="10217" instrument_node="">.&nbsp;</span></span></span></p><span data-dcnode-id="10213" instrument_node="">
</span><div class="ImageBlock ImageBlockCenter" data-dcnode-id="10209"><img class="ss-lazy error" data-dcnode-id="10212" data-pin-media="https://www.catholicamericanthinker.com/images/FrederickAndVoltaireAtThePalaceOfSansSouci.jpg" data-src="https://www.catholicamericanthinker.com/images/FrederickAndVoltaireAtThePalaceOfSansSouci.jpg" data-was-processed="true" height="413" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.catholicamericanthinker.com/images/FrederickAndVoltaireAtThePalaceOfSansSouci.jpg&amp;raw" style="width: 620px; height: auto" width="620"><span class="Caption CaptionCenter" data-dcnode-id="10210" style="max-width:620px"><span data-dcnode-id="10211" instrument_node="">Frederick and Voltaire at the palace of Sans-Souci</span></span></div><span data-dcnode-id="10208" instrument_node="">
</span><p data-dcnode-id="10204"><a data-dcnode-id="10206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nytimes.com/1990/09/30/books/l-voltaire-and-the-jews-590990.html" onclick="return FIX.track(this);" rel="noopener" target="_blank"><span data-dcnode-id="10207" instrument_node="">Voltaire</span></a><span data-dcnode-id="10205" instrument_node=""> was not the only enlightened celebrity to serve tyrants.&nbsp; Diderot glorified Queen Catherine. Other philosophers like Helvétius and La Mettrie could be found creeping around royal apartments.&nbsp;&nbsp;</span></p><span data-dcnode-id="10203" instrument_node="">
</span><p data-dcnode-id="10201"><span data-dcnode-id="10202" instrument_node="">Voltaire rejected the Biblical idea that mankind is descended from a common ancestor and is therefore one. Here are Voltaire’s thoughts regarding black people: “And they are not men, except in their stature, with the faculty of speech and thought at a degree far distant to ours. Such are the ones that I have seen and examined.” Also: “And it is a big question whether among them they are descendants of monkeys, or if monkeys come from them. Our wise men have said that man is the image of God: behold a pleasant image of the eternal Being with a flat black nose, with little or no intelligence!”</span></p><span data-dcnode-id="10200" instrument_node="">
</span><p data-dcnode-id="10198"><span data-dcnode-id="10199" instrument_node="">The French Revolution at its height was led by anti-Christians.&nbsp; During the Revolution church property was seized, statues of saints were smashed, and crosses were forbidden. In one incident in Auxerre a man was attacked with a saber because he refused to spit on the cross. The calendar was changed – Year 1 became the birth of the Revolution instead of the birth of Christ. Priests who refused to accept the supremacy of the state over the church were killed on sight. Nuns were massacred.&nbsp; Approximately 40,000 were executed by the revolutionaries – many fell victim to the guillotine, the “national razor”. Those executed came from all classes, but the majority were peasants and workers. The Hébertists, founded by Jacques Hébert, were a devoutly atheist faction within the ruling elite during the Reign of Terror. They transformed many churches into “Temples of Reason”. On November 10, 1793 the great cathedral of Notre Dame de Paris was set up as such a Temple of Reason.&nbsp; Hébert and many of his followers were guillotined when a new faction run by Robespierre and Saint-Just took over.&nbsp; Later Robespierre and Saint-Just in turn would be guillotined.&nbsp; &nbsp;</span></p><span data-dcnode-id="10197" instrument_node="">
</span><div class="ImageBlock ImageBlockCenter" data-dcnode-id="10193"><img class="ss-lazy error" data-dcnode-id="10196" data-pin-media="https://www.catholicamericanthinker.com/images/MartyrsOfCompeigne.jpg" data-src="https://www.catholicamericanthinker.com/images/MartyrsOfCompeigne.jpg" data-was-processed="true" height="555" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.catholicamericanthinker.com/images/MartyrsOfCompeigne.jpg&amp;raw" style="width: 651px; height: auto" width="651"><span class="Caption CaptionCenter" data-dcnode-id="10194" style="max-width:651px"><span data-dcnode-id="10195" instrument_node="">The Martyrs of Compeigne</span></span></div><span data-dcnode-id="10192" instrument_node="">
</span><div class="ImageBlock ImageBlockCenter" data-dcnode-id="10188"><img class="ss-lazy error" data-dcnode-id="10191" data-pin-media="https://www.catholicamericanthinker.com/images/TempleOfReason.jpg" data-src="https://www.catholicamericanthinker.com/images/TempleOfReason.jpg" data-was-processed="true" height="720" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.catholicamericanthinker.com/images/TempleOfReason.jpg&amp;raw" style="width: 545px; height: auto" width="545"><span class="Caption CaptionCenter" data-dcnode-id="10189" style="max-width:545px"><span data-dcnode-id="10190" instrument_node="">Notre Dame becomes a "Temple Of Reason"</span></span></div><span data-dcnode-id="10187" instrument_node="">
</span><p data-dcnode-id="10182"><span data-dcnode-id="10186" instrument_node="">An excerpt from </span><a data-dcnode-id="10184" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.worldfuturefund.org/wffmaster/Reading/Communism/ROBESPIERRE%2527S%2520SPEECH.htm" onclick="return FIX.track(this);" rel="noopener" target="_blank"><span data-dcnode-id="10185" instrument_node="">Robespierre’s speech to the Convention in 1794</span></a><span data-dcnode-id="10183" instrument_node="">: “If the mainspring of popular government in peacetime is virtue, amid revolution it is at the same time [both] virtue and terror: virtue, without which terror is fatal; terror, without which virtue is impotent. Terror is nothing but prompt, severe, inflexible justice; it is therefore an emanation of virtue.”</span></p><span data-dcnode-id="10181" instrument_node="">
</span><p data-dcnode-id="10176"><span data-dcnode-id="10180" instrument_node="">From 1793 to 1796 fanatical anti-Christian Republicans sent forces to attack the rebellious Vendee region in west-central France.&nbsp; Republican commander Jean-Baptiste Carrier tied thousands of naked men, women, and children together in boats which were then towed out to the middle of the Loire River and sunk. Another commander, Louis-Marie Turreau, turned twelve “infernal columns” loose on the people. His men torched villages and massacred thousands – again children were among the victims.&nbsp; A third commander, Francois Joseph Westermann wrote to the Committee of Public Safety: "There is no more Vendée... According to the orders that you gave me, I crushed the children under the feet of the horses, massacred the women who, at least for these, will not give birth to any more brigands. I do not have a prisoner to reproach me. I have exterminated all." In all about 175,000 were killed in what historians like </span><a data-dcnode-id="10178" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.newoxfordreview.org/reviews.jsp%3Fdid%3D0504-gardiner" onclick="return FIX.track(this);" rel="noopener" target="_blank"><span data-dcnode-id="10179" instrument_node="">Reynald Secher</span></a><span data-dcnode-id="10177" instrument_node=""> consider genocide.</span></p><span data-dcnode-id="10175" instrument_node="">
</span><div class="ImageBlock ImageBlockCenter" data-dcnode-id="10171"><img class="ss-lazy error" data-dcnode-id="10174" data-pin-media="https://www.catholicamericanthinker.com/images/MassacreByBTurreausInfernalColumn.jpg" data-src="https://www.catholicamericanthinker.com/images/MassacreByBTurreausInfernalColumn.jpg" data-was-processed="true" height="240" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.catholicamericanthinker.com/images/MassacreByBTurreausInfernalColumn.jpg&amp;raw" style="width: 300px; height: auto" width="300"><span class="Caption CaptionCenter" data-dcnode-id="10172" style="max-width:300px"><span data-dcnode-id="10173" instrument_node="">Massacre by Turreau's Infernal Collumns</span></span></div><span data-dcnode-id="10170" instrument_node="">
</span><p data-dcnode-id="10165"><span data-dcnode-id="10169" instrument_node="">Napoleon, like many tyrants before and since, was an unbeliever who tried to render the church subservient to state authority. Napoleon shut down monasteries, stole church property, and even imprisoned two popes: Pius VI and Pius VII. Millions were slaughtered in Napoleon’s numerous wars (fought in Egypt, Germany, Italy, Spain, Haiti, Russia, Belgium, etc.) In Spain the people rose up against Napoleon’s soldiers.&nbsp; The Emperor eventually placed his brother Joseph on the Spanish throne, prompting more acts of rebellion.&nbsp; In Russia the people drove out Napoleon’s massive Grande Armée in 1812.&nbsp; The Emperor’s epic defeat inspired Russian artists like Tchaikovsky and Tolstoy (who memorably portrayed Napoleon as a pudgy narcissist in War and Peace).&nbsp; </span><a data-dcnode-id="10167" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.dailymail.co.uk/news/article-1038453/The-French-Fuhrer-Genocidal-Napoleon-barbaric-Hitler-historian-claims.html" onclick="return FIX.track(this);" rel="noopener" target="_blank"><span data-dcnode-id="10168" instrument_node="">Napoleon tried to re-impose slavery in Haiti</span></a><span data-dcnode-id="10166" instrument_node="">. He proclaimed "My decision to destroy the authority of the blacks in Saint Domingue (Haiti) is not so much based on considerations of commerce and money, as on the need to block for ever the march of the blacks in the world."&nbsp; The Haitians led by Toussaint L’Ouverture and others defeated Napoleon’s forces.</span></p><span data-dcnode-id="10164" instrument_node="">
</span><div class="ImageBlock ImageBlockCenter" data-dcnode-id="10160"><img class="ss-lazy error" data-dcnode-id="10163" data-pin-media="https://www.catholicamericanthinker.com/images/thirdofmaycopy1.jpg" data-src="https://www.catholicamericanthinker.com/images/thirdofmaycopy1.jpg" data-was-processed="true" height="794" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.catholicamericanthinker.com/images/thirdofmaycopy1.jpg&amp;raw" style="width: 1048px; height: auto" width="1048"><span class="Caption CaptionCenter" data-dcnode-id="10161" style="max-width:1048px"><span data-dcnode-id="10162" instrument_node="">The Third of May by Goya</span></span></div><span data-dcnode-id="10159" instrument_node="">

</span><b data-dcnode-id="9646"><span data-dcnode-id="9647" instrument_node="">From:</span></b><span data-dcnode-id="9645" instrument_node=""> &nbsp;Vic Biorseth</span><br data-dcnode-id="9644"><span data-dcnode-id="9643" instrument_node="">
</span><b data-dcnode-id="9641"><span data-dcnode-id="9642" instrument_node="">Comment:</span></b><span data-dcnode-id="9640" instrument_node=""> &nbsp;</span></p><p data-dcnode-id="9637"><span data-dcnode-id="9638" instrument_node="">Annemarie:</span></p><p data-dcnode-id="9635"><span data-dcnode-id="9636" instrument_node="">The author of the submitted article is Nito Gnoci; perhaps he will reply.&nbsp;</span></p><p data-dcnode-id="9631"><span data-dcnode-id="9634" instrument_node="">Les&nbsp;</span><span data-dcnode-id="9632" style="font-size: 13.008px;"><span data-dcnode-id="9633" instrument_node="">Miserables was a novel.&nbsp;</span></span></p><p data-dcnode-id="9607"><span data-dcnode-id="9629" style="font-size: 13px;"><span data-dcnode-id="9630" instrument_node="">I have touched only lightly on the horrors of the French Revolution herein. Some places that come to mind are </span></span><a data-dcnode-id="9626" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.catholicamericanthinker.com/world-revolution-returns.html" style="font-size: 0.813em;"><span data-dcnode-id="9627" style="font-size: 13px;"><span data-dcnode-id="9628" instrument_node="">World Revolution Returns</span></span></a><span data-dcnode-id="9624" style="font-size: 13px;"><span data-dcnode-id="9625" instrument_node="">; </span></span><a data-dcnode-id="9621" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.catholicamericanthinker.com/American-Founding-Principles.html" style="font-size: 0.813em;"><span data-dcnode-id="9622" style="font-size: 13px;"><span data-dcnode-id="9623" instrument_node="">American Founding Principles</span></span></a><span data-dcnode-id="9619" style="font-size: 13px;"><span data-dcnode-id="9620" instrument_node="">, </span></span><a data-dcnode-id="9616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.catholicamericanthinker.com/Apolitical-Lord.html" style="font-size: 0.813em;"><span data-dcnode-id="9617" style="font-size: 13px;"><span data-dcnode-id="9618" instrument_node="">Apolitical Lord</span></span></a><span data-dcnode-id="9608" style="font-size: 13px;"><span data-dcnode-id="9615" instrument_node="">, </span><a data-dcnode-id="9613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.catholicamericanthinker.com/Global-Delusions.html"><span data-dcnode-id="9614" instrument_node="">Global Delusions</span></a><span data-dcnode-id="9612" instrument_node="">, </span><a data-dcnode-id="9610" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.catholicamericanthinker.com/Democratization.html"><span data-dcnode-id="9611" instrument_node="">Democratization</span></a><span data-dcnode-id="9609" instrument_node="">; I'm sure there are others.&nbsp;</span></span></p><p data-dcnode-id="9604"><span data-dcnode-id="9605" style="font-size: 13px;"><span data-dcnode-id="9606" instrument_node="">The French Revolution resulted in the annihilation of probably as many ordained Priests and consecrated religious as it did members of the nobility and the aristocracy. It was profoundly anti-Christian.&nbsp;</span></span></p><p data-dcnode-id="9595"><span data-dcnode-id="9596" style="font-size: 13px;"><span data-dcnode-id="9603" instrument_node="">In my opinion, the lead-off to all of that was Luther's revolt, celebrated as "The Reformation", written about here in the </span><a data-dcnode-id="9601" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.catholicamericanthinker.com/Fracturing-of-Christianity.html"><span data-dcnode-id="9602" instrument_node="">Fracturing of Christianity</span></a><span data-dcnode-id="9600" instrument_node="">. Once Luther enlisted the nobles to his cause, it turned into a greed-fest, with nobles "converting" to one denomination or another as an excuse to claim and plunder convents, monasteries, cathedrals, lands and fiefdoms from the domains of other nobles. That was truly Western Civilization' first </span><em data-dcnode-id="9598"><span data-dcnode-id="9599" instrument_node="">World War</span></em><span data-dcnode-id="9597" instrument_node="">. It was truly a mixing of Politics with Religion, to the point of making them inseparable. </span></span></p><p data-dcnode-id="9589"><span data-dcnode-id="9590" style="font-size: 13px;"><span data-dcnode-id="9594" instrument_node="">Look up the character Thomas Munzer, who lead the Peasant's Revolt after Luther started the whole mess going. Munzer is today recognized by all Lefties as a "father" of Communism, because of his </span><em data-dcnode-id="9592"><span data-dcnode-id="9593" instrument_node="">common-property</span></em><span data-dcnode-id="9591" instrument_node=""> sentiments, forcibly put into practice hundreds of years before the Communist Manifesto was written.&nbsp;</span></span></p><p data-dcnode-id="9586"><span data-dcnode-id="9587" style="font-size: 13px;"><span data-dcnode-id="9588" instrument_node="">I see the whole Reformation as anti-Christian.&nbsp;</span></span></p><span data-dcnode-id="9585" instrument_node="">
</span><p data-dcnode-id="9583"><span data-dcnode-id="9584" instrument_node="">Regards,</span></p><span data-dcnode-id="9582" instrument_node="">
</span><p data-dcnode-id="9580"><span data-dcnode-id="9581" instrument_node="">Vic</span></p><span data-dcnode-id="9579" instrument_node="">
