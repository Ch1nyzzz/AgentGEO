instrument_node="">The Magic of Bill Watterson's Calvin and Hobbes (in English or French) (S) ◊</span></a><div class="description" data-dcnode-id="1928" style="display: none;"><span data-dcnode-id="1929" instrument_node="">The comic series Calvin and Hobbes provides an escape, “out of the box" to its readers. This presentation takes a close look at some strips and the devices used by the author to poetically invite the reader to a magic world. Is this "low art"? The presentation ends with the audience sharing their favorite Calvin and Hobbes stories.</span></div></td><td data-dcnode-id="1925"><span data-dcnode-id="1926" instrument_node="">Cazes, Dr. Hélène</span></td><td data-dcnode-id="1923"><span data-dcnode-id="1924" instrument_node="">Professor</span></td><td data-dcnode-id="1921"><span data-dcnode-id="1922" instrument_node="">Department of French</span></td></tr><tr class="Personal-Interests Department-of-French S Virtual" data-dcnode-id="1906" role="row"><td data-dcnode-id="1918"><span data-dcnode-id="1919" instrument_node="">Personal Interests</span></td><td class="more-info" data-dcnode-id="1913"><a data-dcnode-id="1916" href="#"><span data-dcnode-id="1917" instrument_node="">De-confining Our Memories: Archiving Our Experiences of the Pandemic (in English or French) (S) ◊</span></a><div class="description" data-dcnode-id="1914" style="display: none;"><span data-dcnode-id="1915" instrument_node="">For everyone, the Covid-19 has changed ways in which we socialize: in BC, to be mindful of others has meant, since March 2020, to keep at distance or at home, in isolated “bubbles”. Humankind is a “social species” though, and contact with others is crucial to self-identity, well-being and development. How do we make “contact” at distance? How do we take part in community exchanges, how are we “citizens” in bubbles? And how does this experience change our sense of collectivity? The community project Mémoires de la traversée (https://memoirecovid19.ca/ ) collects memories, testimonies, poems, works of art, thoughts about the isolation. A debate and a writing workshop will follow a brief lecture on “Memories for times of resilience”.</span></div></td><td data-dcnode-id="1911"><span data-dcnode-id="1912" instrument_node="">Cazes, Dr. Hélène</span></td><td data-dcnode-id="1909"><span data-dcnode-id="1910" instrument_node="">Professor</span></td><td data-dcnode-id="1907"><span data-dcnode-id="1908" instrument_node="">Department of French</span></td></tr><tr class="Personal-Interests Department-of-History Virtual altrow" data-dcnode-id="1892" role="row"><td data-dcnode-id="1904"><span data-dcnode-id="1905" instrument_node="">Personal Interests</span></td><td class="more-info" data-dcnode-id="1899"><a data-dcnode-id="1902" href="#"><span data-dcnode-id="1903" instrument_node="">Speaking the Unspeakable: The Unwritable Life of Norman Douglas NEW ◊</span></a><div class="description" data-dcnode-id="1900" style="display: none;"><span data-dcnode-id="1901" instrument_node="">Speaking the Unspeakable: The Unwritable Life of Norman Douglas is a challenging talk about the history of pederasty, or intergenerational sex. Based on my new biography of the writer Norman Douglas, released in 2020, this talk explores the subject of taboos and their impact on our understanding of the history of sexuality.</span></div></td><td data-dcnode-id="1897"><span data-dcnode-id="1898" instrument_node="">Cleves, Dr. Rachel Hope</span></td><td data-dcnode-id="1895"><span data-dcnode-id="1896" instrument_node="">Professor</span></td><td data-dcnode-id="1893"><span data-dcnode-id="1894" instrument_node="">Department of History</span></td></tr><tr class="Personal-Interests Department-of-Sociology Virtual" data-dcnode-id="1878" role="row"><td data-dcnode-id="1890"><span data-dcnode-id="1891" instrument_node="">Personal Interests</span></td><td class="more-info" data-dcnode-id="1885"><a data-dcnode-id="1888" href="#"><span data-dcnode-id="1889" instrument_node="">Music as Medium for Social Critique: One Sociologist's Story NEW ◊</span></a><div class="description" data-dcnode-id="1886" style="display: none;"><span data-dcnode-id="1887" instrument_node="">Since 2004 I have created a series of music videos that convey insights sociology offers about social inequities, power relations and ecological degradation to general audiences. These productions can open conversations while challenging some of our unexamined assumptions and prejudices. They function as a kind of 'public sociology'. This presentation will feature some of the socio-poetic music-videos I have posted to the internet, accompanied by my own explanation of how they took shape, and to what end.</span></div></td><td data-dcnode-id="1883"><span data-dcnode-id="1884" instrument_node="">Carroll, Prof. William</span></td><td data-dcnode-id="1881"><span data-dcnode-id="1882" instrument_node="">Professor</span></td><td data-dcnode-id="1879"><span data-dcnode-id="1880" instrument_node="">Department of Sociology</span></td></tr><tr class="Personal-Interests Island-Medical-Program S Not-Virtual altrow" data-dcnode-id="1864" role="row"><td data-dcnode-id="1876"><span data-dcnode-id="1877" instrument_node="">Personal Interests</span></td><td class="more-info" data-dcnode-id="1871"><a data-dcnode-id="1874" href="#"><span data-dcnode-id="1875" instrument_node="">Santiago de Compostela and the Cult of St. James (in English or Spanish) (S) </span></a><div class="description" data-dcnode-id="1872" style="display: none;"><span data-dcnode-id="1873" instrument_node="">This talk explores the legend of the discovery of the tomb of St. James. The audience will be introduced to the medieval city of Santiago de Compostela, medieval pilgrims, the pilgrim’s way in the XXI century, the contemporary city of Santiago and its university.</span></div></td><td data-dcnode-id="1869"><span data-dcnode-id="1870" instrument_node="">Caruncho, Prof. Hector</span></td><td data-dcnode-id="1867"><span data-dcnode-id="1868" instrument_node="">Professor</span></td><td data-dcnode-id="1865"><span data-dcnode-id="1866" instrument_node="">Island Medical Program</span></td></tr><tr class="Personal-Interests Department-of-Curriculum--Instruction Not-Virtual" data-dcnode-id="1850" role="row"><td data-dcnode-id="1862"><span data-dcnode-id="1863" instrument_node="">Personal Interests</span></td><td class="more-info" data-dcnode-id="1857"><a data-dcnode-id="1860" href="#"><span data-dcnode-id="1861" instrument_node="">Travelling Lightly and Safely: Tips for Women Travellers</span></a><div class="description" data-dcnode-id="1858" style="display: none;"><span data-dcnode-id="1859" instrument_node="">This session gives ideas and tips for women travellers to make travel easier and safer while maximizing the travel experience, including what to take and how to pack. Handouts with suggestions are included.</span></div></td><td data-dcnode-id="1855"><span data-dcnode-id="1856" instrument_node="">Mayfield, Dr. Margie</span></td><td data-dcnode-id="1853"><span data-dcnode-id="1854" instrument_node="">Professor Emerita</span></td><td data-dcnode-id="1851"><span data-dcnode-id="1852" instrument_node="">Department of Curriculum &amp; Instruction</span></td></tr><tr class="Personal-Interests Department-of-Social-Work Virtual altrow" data-dcnode-id="1836" role="row"><td data-dcnode-id="1848"><span data-dcnode-id="1849" instrument_node="">Personal Interests</span></td><td class="more-info" data-dcnode-id="1843"><a data-dcnode-id="1846" href="#"><span data-dcnode-id="1847" instrument_node="">Co-housing: What Is It and Is It For You? ◊</span></a><div class="description" data-dcnode-id="1844" style="display: none;"><span data-dcnode-id="1845" instrument_node="">Co-housing began in Denmark and the idea has migrated to Canada with 13 co-housing communities completed, most of those in BC. This presentation looks at the phenomenon, in which a community is designed and maintained collectively using consensus decision-making with all households participating. Each household is owned privately (strata-titled) yet has the best of a village life. Some are&nbsp;senior-focused, while others are multigenerational, but all share a commitment to living lightly on the planet. Those who have experienced co-housing speak of its affordability and warmth. There are communities in the formation stage on the Saanich Peninsula and in Sooke, with completed co-housing villages in Sooke, Nanaimo and the Comox Valley.</span></div></td><td data-dcnode-id="1841"><span data-dcnode-id="1842" instrument_node="">Whittington, Dr. Barbara</span></td><td data-dcnode-id="1839"><span data-dcnode-id="1840" instrument_node="">Professor Emerita</span></td><td data-dcnode-id="1837"><span data-dcnode-id="1838" instrument_node="">Department of Social Work</span></td></tr><tr class="Personal-Interests Department-of-Social-Work Virtual" data-dcnode-id="1822" role="row"><td data-dcnode-id="1834"><span data-dcnode-id="1835" instrument_node="">Personal Interests</span></td><td class="more-info" data-dcnode-id="1829"><a data-dcnode-id="1832" href="#"><span data-dcnode-id="1833" instrument_node="">Community Disasters: Preparation, Response and Reality ◊</span></a><div class="description" data-dcnode-id="1830" style="display: none;"><span data-dcnode-id="1831" instrument_node="">This 1.5 hour interactive and practical presentation will help your community organization to be more prepared to respond to the unexpected. It’s themes of preparation, response and reality are drawn from a 35 year counselling practice and more recent experience-working individually, as part of emergency response teams and with communities to prepare and respond to disasters, from floods to murders and suicides to fires, earthquakes and now plagues and climate change. (No locusts here, aside from the pine beetle, but perhaps in the future.)</span></div></td><td data-dcnode-id="1827"><span data-dcnode-id="1828" instrument_node="">Whittington, Dr. Barbara</span></td><td data-dcnode-id="1825"><span data-dcnode-id="1826" instrument_node="">Professor Emerita</span></td><td data-dcnode-id="1823"><span data-dcnode-id="1824" instrument_node="">Department of Social Work</span></td></tr><tr class="Personal-Interests Department-of-Linguistics S Not-Virtual altrow" data-dcnode-id="1809" role="row"><td data-dcnode-id="1820"><span data-dcnode-id="1821" instrument_node="">Personal Interests</span></td><td class="more-info" data-dcnode-id="1816"><a data-dcnode-id="1818" href="#"><span data-dcnode-id="1819" instrument_node="">Beekeeping (S)</span></a><div class="description" data-dcnode-id="1817" style="display: none;"></div></td><td data-dcnode-id="1814"><span data-dcnode-id="1815" instrument_node="">Esling, Dr. John H.</span></td><td data-dcnode-id="1812"><span data-dcnode-id="1813" instrument_node="">Professor Emeritus</span></td><td data-dcnode-id="1810"><span data-dcnode-id="1811" instrument_node="">Department of Linguistics</span></td></tr><tr class="Personal-Interests Department-of-Pacific--Asian-Studies- Virtual" data-dcnode-id="1796" role="row"><td data-dcnode-id="1807"><span data-dcnode-id="1808" instrument_node="">Personal Interests</span></td><td class="more-info" data-dcnode-id="1803"><a data-dcnode-id="1805" href="#"><span data-dcnode-id="1806" instrument_node="">Hiking in Japan: The Old Roads of Kumano (in English or Japanese) ◊</span></a><div class="description" data-dcnode-id="1804" style="display: none;"></div></td><td data-dcnode-id="1801"><span data-dcnode-id="1802" instrument_node="">Poulton, Dr. Cody</span></td><td data-dcnode-id="1799"><span data-dcnode-id="1800" instrument_node="">Professor Emeritus</span></td><td data-dcnode-id="1797"><span data-dcnode-id="1798" instrument_node="">Department of Pacific &amp; Asian Studies </span></td></tr><tr class="Personal-Interests School-of-Exercise-Science-Physical--Health-Education Virtual altrow" data-dcnode-id="1782" role="row"><td data-dcnode-id="1794"><span data-dcnode-id="1795" instrument_node="">Personal Interests</span></td><td class="more-info" data-dcnode-id="1789"><a data-dcnode-id="1792" href="#"><span data-dcnode-id="1793" instrument_node="">How Vaccines Work NEW ◊</span></a><div class="description" data-dcnode-id="1790" style="display: none;"><span data-dcnode-id="1791" instrument_node="">There has been enormous interest in and speculation about the vaccines developed to combat COVID-19. This presentation takes a look at the two types of vaccines currently being used, how they differ, and how they work to combat future infections due to the corona virus.This talk is based on a presentation developed on the immune system for an audience of elders and retirees, and reflects personal interest in presenting a wide range of audiences with sound health guidance.</span></div></td><td data-dcnode-id="1787"><span data-dcnode-id="1788" instrument_node="">Docherty, Dr. David</span></td><td data-dcnode-id="1785"><span data-dcnode-id="1786" instrument_node="">Professor Emeritus</span></td><td data-dcnode-id="1783"><span data-dcnode-id="1784" instrument_node="">School of Exercise Science, Physical &amp; Health Education</span></td></tr><tr class="Personal-Interests Department-of-Computer-Science Virtual" data-dcnode-id="1768" role="row"><td data-dcnode-id="1780"><span data-dcnode-id="1781" instrument_node="">Personal Interests</span></td><td class="more-info" data-dcnode-id="1775"><a data-dcnode-id="1778" href="#"><span data-dcnode-id="1779" instrument_node="">1798: The Battle of the Nile and the Age of Fighting Sail ◊</span></a><div class="description" data-dcnode-id="1776" style="display: none;"><span data-dcnode-id="1777" instrument_node="">This talk is based on my novel, The Second Gate Readings, and anecdotal tales of what it was like to be a sailor on board a 74-gun ship at the Battle of the Nile, between Nelson won and Napoleon's admiral. The book (and talk) also explores alternative history.</span></div></td><td data-dcnode-id="1773"><span data-dcnode-id="1774" instrument_node="">Wyvill, Prof. Brian</span></td><td data-dcnode-id="1771"><span data-dcnode-id="1772" instrument_node="">Professor Emeritus/Adjunct Professor</span></td><td data-dcnode-id="1769"><span data-dcnode-id="1770" instrument_node="">Department of Computer Science</span></td></tr><tr class="Personal-Interests UVic-Retirees-Association S Not-Virtual altrow" data-dcnode-id="1754" role="row"><td data-dcnode-id="1766"><span data-dcnode-id="1767" instrument_node="">Personal Interests</span></td><td class="more-info" data-dcnode-id="1761"><a data-dcnode-id="1764" href="#"><span data-dcnode-id="1765" instrument_node="">A First World War Field Engineer's Experience in the Trenches (S)</span></a><div class="description" data-dcnode-id="1762" style="display: none;"><span data-dcnode-id="1763" instrument_node="">Captain (Retired) Don Lovell, CD, PPCLI reads selections from his maternal grandfather's first-hand accounts from WWI as an engineer sapper at Passchendaele, Vimy Ridge and other bloodied fields. Memorabilia and maps are displayed.</span></div></td><td data-dcnode-id="1759"><span data-dcnode-id="1760" instrument_node="">Lovell, Mr. Don</span></td><td data-dcnode-id="1757"><span data-dcnode-id="1758" instrument_node="">Retiree</span></td><td data-dcnode-id="1755"><span data-dcnode-id="1756" instrument_node="">UVic Retirees Association</span></td></tr><tr class="Personal-Interests UVic-Retirees-Association S Not-Virtual" data-dcnode-id="1740" role="row"><td data-dcnode-id="1752"><span data-dcnode-id="1753" instrument_node="">Personal Interests</span></td><td class="more-info" data-dcnode-id="1747"><a data-dcnode-id="1750" href="#"><span data-dcnode-id="1751" instrument_node="">UVic’s Gordon Head Campus Development, 1990-1999 (S) </span></a><div class="description" data-dcnode-id="1748" style="display: none;"><span data-dcnode-id="1749" instrument_node="">From 1990-1999 over 1,000,000 square feet of building was added to the Gordon Head Campus. The largest increase in 10 years that UVic has experienced. Events such as the Commonwealth Games that were held in 1994 are discussed.</span></div></td><td data-dcnode-id="1745"><span data-dcnode-id="1746" instrument_node="">Lovell, Mr. Don</span></td><td data-dcnode-id="1743"><span data-dcnode-id="1744" instrument_node="">Retiree</span></td><td data-dcnode-id="1741"><span data-dcnode-id="1742" instrument_node="">UVic Retirees Association</span></td></tr><tr class="Personal-Interests UVic-Retirees-Association S Not-Virtual altrow" data-dcnode-id="1726" role="row"><td data-dcnode-id="1738"><span data-dcnode-id="1739" instrument_node="">Personal Interests</span></td><td class="more-info" data-dcnode-id="1733"><a data-dcnode-id="1736" href="#"><span data-dcnode-id="1737" instrument_node="">How to Construct a Graphic Memoir (S) NEW</span></a><div class="description" data-dcnode-id="1734" style="display: none;"><span data-dcnode-id="1735" instrument_node="">Prior to his 70th birthday, retired architect Don Lovell wanted to leave his four adult children and five Grandchildren a gift of family and personal history. This 40-minute presentation will focus on the steps involved in creating and self-publishing your own memoir. </span></div></td><td data-dcnode-id="1731"><span data-dcnode-id="1732" instrument_node="">Lovell, Mr. Don</span></td><td data-dcnode-id="1729"><span data-dcnode-id="1730" instrument_node="">Retiree</span></td><td data-dcnode-id="1727"><span data-dcnode-id="1728" instrument_node="">UVic Retirees Association</span></td></tr><tr class="Personal-Interests Department-of-Civil-Engineering S Virtual" data-dcnode-id="1712" role="row"><td data-dcnode-id="1724"><span data-dcnode-id="1725" instrument_node="">Personal Interests</span></td><td class="more-info" data-dcnode-id="1719"><a data-dcnode-id="1722" href="#"><span data-dcnode-id="1723" instrument_node="">How Can Your Business Function like an Ecosystem? (S) (Jan-April) NEW ◊</span></a><div class="description" data-dcnode-id="1720" style="display: none;"><span data-dcnode-id="1721" instrument_node="">This talk will help you apply nature’s deep design patterns to recalibrate your approach to nature’s.&nbsp;Explore questions like&nbsp;why&nbsp;your company exists,&nbsp;what&nbsp;it produces into the world,&nbsp;how&nbsp;it does its work,&nbsp;who&nbsp;it serves and&nbsp;its relationship with place.&nbsp;When we borrow nature’s ideas and use them in our human world, we create companies, products, services and built environments that are in sync with nature.&nbsp;Let her secrets guide your strategy to better results and higher performance. &nbsp;</span></div></td><td data-dcnode-id="1717"><span data-dcnode-id="1718" instrument_node="">Daniel, Ms. Anne-Marie</span></td><td data-dcnode-id="1715"><span data-dcnode-id="1716" instrument_node="">Sessional Lecturer</span></td><td data-dcnode-id="1713"><span data-dcnode-id="1714" instrument_node="">Department of Civil Engineering</span></td></tr><tr class="Personal-Interests Department-of-Hispanic--Italian-Studies M S Virtual altrow" data-dcnode-id="1698" role="row"><td data-dcnode-id="1710"><span data-dcnode-id="1711" instrument_node="">Personal Interests</span></td><td class="more-info" data-dcnode-id="1705"><a data-dcnode-id="1708" href="#"><span data-dcnode-id="1709" instrument_node="">Crossing Cuba from Havana to Santiago (M S) ◊</span></a><div class="description" data-dcnode-id="1706" style="display: none;"><span data-dcnode-id="1707" instrument_node="">On this adventure we began in Havana and travelled by bus across&nbsp;bumpy roads stopping at the famous "Bay of Pigs", Cienfuegos, Trinidad, Camaguey, Santiago&nbsp;and several other places before returning to Havana again.</span></div></td><td data-dcnode-id="1703"><span data-dcnode-id="1704" instrument_node="">Stewart, Prof. Rosa</span></td><td data-dcnode-id="1701"><span data-dcnode-id="1702" instrument_node="">Teaching Professor</span></td><td data-dcnode-id="1699"><span data-dcnode-id="1700" instrument_node="">Department of Hispanic &amp; Italian Studies</span></td></tr><tr class="Personal-Interests Department-of-Hispanic--Italian-Studies M S Virtual" data-dcnode-id="1684" role="row"><td data-dcnode-id="1696"><span data-dcnode-id="1697" instrument_node="">Personal Interests</span></td><td class="more-info" data-dcnode-id="1691"><a data-dcnode-id="1694" href="#"><span data-dcnode-id="1695" instrument_node="">Highlights of Spain (M S) NEW ◊</span></a><div class="description" data-dcnode-id="1692" style="display: none;"><span data-dcnode-id="1693" instrument_node="">This slide show takes you on a tour of some of the outstanding cities in Spain, with a stop in Gibraltar as well. The tour begins in Madrid, followed by stops in Cordoba, Seville, Malaga, Granada, Valencia and ends in Barcelona.</span></div></td><td data-dcnode-id="1689"><span data-dcnode-id="1690" instrument_node="">Stewart, Prof. Rosa</span></td><td data-dcnode-id="1687"><span data-dcnode-id="1688" instrument_node="">Teaching Professor</span></td><td data-dcnode-id="1685"><span data-dcnode-id="1686" instrument_node="">Department of Hispanic &amp; Italian Studies</span></td></tr><tr class="Politics Faculty-of-Law S Virtual altrow" data-dcnode-id="1670" role="row"><td data-dcnode-id="1682"><span data-dcnode-id="1683" instrument_node="">Politics</span></td><td class="more-info" data-dcnode-id="1677"><a data-dcnode-id="1680" href="#"><span data-dcnode-id="1681" instrument_node="">Voting: Why is it Compulsory in Australia but Voluntary in Canada? (S) NEW ◊</span></a><div class="description" data-dcnode-id="1678" style="display: none;"><span data-dcnode-id="1679" instrument_node="">The presentation will examine the historical and political factors that help explain why two very similar settler societies (Australia and Canada) that both adopted English law and British political traditions built radically different voting systems when it came to the question of compulsory or voluntary participation.</span></div></td><td data-dcnode-id="1675"><span data-dcnode-id="1676" instrument_node="">Buck, Dr. Andrew</span></td><td data-dcnode-id="1673"><span data-dcnode-id="1674" instrument_node="">Adjunct Professor</span></td><td data-dcnode-id="1671"><span data-dcnode-id="1672" instrument_node="">Faculty of Law</span></td></tr><tr class="Politics Department-of-Economics M S Virtual" data-dcnode-id="1656" role="row"><td data-dcnode-id="1668"><span data-dcnode-id="1669" instrument_node="">Politics</span></td><td class="more-info" data-dcnode-id="1663"><a data-dcnode-id="1666" href="#"><span data-dcnode-id="1667" instrument_node="">Policy in Practice: An Economist's Perspective from within Government and Opposition (M S) ◊</span></a><div class="description" data-dcnode-id="1664" style="display: none;"><span data-dcnode-id="1665" instrument_node="">In this talk, I discuss how policy gets made within the Canadian political process.</span></div></td><td data-dcnode-id="1661"><span data-dcnode-id="1662" instrument_node="">Gillezeau, Dr. Rob</span></td><td data-dcnode-id="1659"><span data-dcnode-id="1660" instrument_node="">Assistant Professor</span></td><td data-dcnode-id="1657"><span data-dcnode-id="1658" instrument_node="">Department of Economics</span></td></tr><tr class="Politics Department-of-Economics M S Virtual altrow" data-dcnode-id="1642" role="row"><td data-dcnode-id="1654"><span data-dcnode-id="1655" instrument_node="">Politics</span></td><td class="more-info" data-dcnode-id="1649"><a data-dcnode-id="1652" href="#"><span data-dcnode-id="1653" instrument_node="">Indigenous Policy-making in Government-Reflections from an Academic and Staffer (M S) ◊</span></a><div class="description" data-dcnode-id="1650" style="display: none;"><span data-dcnode-id="1651" instrument_node="">In this talk, I discuss Indigenous policy-making at the provincial and federal level and how to best incorporate cutting edge research in the area. </span></div></td><td data-dcnode-id="1647"><span data-dcnode-id="1648" instrument_node="">Gillezeau, Dr. Rob</span></td><td data-dcnode-id="1645"><span data-dcnode-id="1646" instrument_node="">Assistant Professor</span></td><td data-dcnode-id="1643"><span data-dcnode-id="1644" instrument_node="">Department of Economics</span></td></tr><tr class="Politics Peter-B-Gustavson-School-of-Business S Virtual" data-dcnode-id="1628" role="row"><td data-dcnode-id="1640"><span data-dcnode-id="1641" instrument_node="">Politics</span></td><td class="more-info" data-dcnode-id="1635"><a data-dcnode-id="1638" href="#"><span data-dcnode-id="1639" instrument_node="">Reinvigorating Our Democracy through the Use of Civic Lotteries (S) NEW ◊</span></a><div class="description" data-dcnode-id="1636" style="display: none;"><span data-dcnode-id="1637" instrument_node="">There is a growing recognition that the way we practice democracy in our communities and associations is not living up to its ideals. A lack of confidence in the conduct of our representatives is often coupled with apathy and limited engagement on the part of citizens. Yet, there is hope on the horizon as a growing body of research and practice has explored the potential of using civic lotteries (random selection) as a means of selecting our representatives instead of consistently relying on elections. This presentation explored how civic lotteries can serve as a promising alternative or complement to the use of elections when selecting our representatives in contexts including our communities, unions, cooperatives and associations. </span></div></td><td data-dcnode-id="1633"><span data-dcnode-id="1634" instrument_node="">Pek, Dr. Simon</span></td><td data-dcnode-id="1631"><span data-dcnode-id="1632" instrument_node="">Assistant Professor</span></td><td data-dcnode-id="1629"><span data-dcnode-id="1630" instrument_node="">Peter B. Gustavson School of Business</span></td></tr><tr class="Politics School-of-Public-Health--Social-Policy S Virtual altrow" data-dcnode-id="1615" role="row"><td data-dcnode-id="1626"><span data-dcnode-id="1627" instrument_node="">Politics</span></td><td class="more-info" data-dcnode-id="1622"><a data-dcnode-id="1624" href="#"><span data-dcnode-id="1625" instrument_node="">Canadian Politics, Government and Elections (S) ◊</span></a><div class="description" data-dcnode-id="1623" style="display: none;"></div></td><td data-dcnode-id="1620"><span data-dcnode-id="1621" instrument_node="">Prince, Dr. Michael J.</span></td><td data-dcnode-id="1618"><span data-dcnode-id="1619" instrument_node="">Lansdowne Professor of Social Policy</span></td><td data-dcnode-id="1616"><span data-dcnode-id="1617" instrument_node="">School of Public Health &amp; Social Policy</span></td></tr><tr class="Politics Department-of-English S Virtual" data-dcnode-id="1601" role="row"><td data-dcnode-id="1613"><span data-dcnode-id="1614" instrument_node="">Politics</span></td><td class="more-info" data-dcnode-id="1608"><a data-dcnode-id="1611" href="#"><span data-dcnode-id="1612" instrument_node="">Why White Evangelical Christians Support Donald Trump (S) ◊</span></a><div class="description" data-dcnode-id="1609" style="display: none;"><span data-dcnode-id="1610" instrument_node="">Eighty-one per cent of white evangelical Christians voted for US President Donald Trump in the 2016 American election. That statistic might strike many people as strange, given Trump’s seemingly unchristian behavior. But English professor Chris Douglas’s research into evangelical literature, history and uses of the Bible suggests we shouldn’t be surprised that President Trump will be able to count on this demographic’s support in the 2020 election.</span></div></td><td data-dcnode-id="1606"><span data-dcnode-id="1607" instrument_node="">Douglas, Dr. Christopher</span></td><td data-dcnode-id="1604"><span data-dcnode-id="1605" instrument_node="">Professor</span></td><td data-dcnode-id="1602"><span data-dcnode-id="1603" instrument_node="">Department of English</span></td></tr><tr class="Politics Department-of-Political-Science Virtual altrow" data-dcnode-id="1587" role="row"><td data-dcnode-id="1599"><span data-dcnode-id="1600" instrument_node="">Politics</span></td><td class="more-info" data-dcnode-id="1594"><a data-dcnode-id="1597" href="#"><span data-dcnode-id="1598" instrument_node="">Comparative Federalism, Multicultural Federalism ◊ </span></a><div class="description" data-dcnode-id="1595" style="display: none;"><span data-dcnode-id="1596" instrument_node="">How to design a constitution in a pluralistic society with the goals of combining single citizenship with collective rights in response to identity based demands.</span></div></td><td data-dcnode-id="1592"><span data-dcnode-id="1593" instrument_node="">Tremblay, Dr. Reeta</span></td><td data-dcnode-id="1590"><span data-dcnode-id="1591" instrument_node="">Professor</span></td><td data-dcnode-id="1588"><span data-dcnode-id="1589" instrument_node="">Department of Political Science</span></td></tr><tr class="Politics Peter-B-Gustavson-School-of-Business Virtual" data-dcnode-id="1574" role="row"><td data-dcnode-id="1585"><span data-dcnode-id="1586" instrument_node="">Politics</span></td><td class="more-info" data-dcnode-id="1581"><a data-dcnode-id="1583" href="#"><span data-dcnode-id="1584" instrument_node="">Canadian Charter of Rights and Freedoms ◊</span></a><div class="description" data-dcnode-id="1582" style="display: none;"></div></td><td data-dcnode-id="1579"><span data-dcnode-id="1580" instrument_node="">Thornicroft, Dr. Kenneth</span></td><td data-dcnode-id="1577"><span data-dcnode-id="1578" instrument_node="">Professor</span></td><td data-dcnode-id="1575"><span data-dcnode-id="1576" instrument_node="">Peter B. Gustavson School of Business</span></td></tr><tr class="Psychology Department-of-Educational-Psychology--Leadership-Studies S Virtual altrow" data-dcnode-id="1560" role="row"><td data-dcnode-id="1572"><span data-dcnode-id="1573" instrument_node="">Psychology</span></td><td class="more-info" data-dcnode-id="1567"><a data-dcnode-id="1570" href="#"><span data-dcnode-id="1571" instrument_node="">Men's Mental Health and Career-Life Transitions (S) ǂ NEW ◊ </span></a><div class="description" data-dcnode-id="1568" style="display: none;"><span data-dcnode-id="1569" instrument_node="">This presentation contains themes of suicide prevention and grief and loss; however the primary focus is from a career-development perspective.</span></div></td><td data-dcnode-id="1565"><span data-dcnode-id="1566" instrument_node="">Karwandy, Ms. Lois</span></td><td data-dcnode-id="1563"><span data-dcnode-id="1564" instrument_node="">Graduate Student</span></td><td data-dcnode-id="1561"><span data-dcnode-id="1562" instrument_node="">Department of Educational Psychology &amp; Leadership Studies</span></td></tr><tr class="Psychology Island-Medical-Program S Not-Virtual" data-dcnode-id="1547" role="row"><td data-dcnode-id="1558"><span data-dcnode-id="1559" instrument_node="">Psychology</span></td><td class="more-info" data-dcnode-id="1554"><a data-dcnode-id="1556" href="#"><span data-dcnode-id="1557" instrument_node="">What is Schizophrenia? (S) </span></a><div class="description" data-dcnode-id="1555" style="display: none;"></div></td><td data-dcnode-id="1552"><span data-dcnode-id="1553" instrument_node="">Williams, Dr. Richard</span></td><td data-dcnode-id="1550"><span data-dcnode-id="1551" instrument_node="">Affiliate Professor</span></td><td data-dcnode-id="1548"><span data-dcnode-id="1549" instrument_node="">Island Medical Program</span></td></tr><tr class="Psychology Island-Medical-Program S Not-Virtual altrow" data-dcnode-id="1534" role="row"><td data-dcnode-id="1545"><span data-dcnode-id="1546" instrument_node="">Psychology</span></td><td class="more-info" data-dcnode-id="1541"><a data-dcnode-id="1543" href="#"><span data-dcnode-id="1544" instrument_node="">Treatment of Schizophrenia (S) </span></a><div class="description" data-dcnode-id="1542" style="display: none;"></div></td><td data-dcnode-id="1539"><span data-dcnode-id="1540" instrument_node="">Williams, Dr. Richard</span></td><td data-dcnode-id="1537"><span data-dcnode-id="1538" instrument_node="">Affiliate Professor</span></td><td data-dcnode-id="1535"><span data-dcnode-id="1536" instrument_node="">Island Medical Program</span></td></tr><tr class="Psychology Department-of-Psychology S Virtual" data-dcnode-id="1520" role="row"><td data-dcnode-id="1532"><span data-dcnode-id="1533" instrument_node="">Psychology</span></td><td class="more-info" data-dcnode-id="1527"><a data-dcnode-id="1530" href="#"><span data-dcnode-id="1531" instrument_node="">Memory and Development ǂ (S) ◊</span></a><div class="description" data-dcnode-id="1528" style="display: none;"><span data-dcnode-id="1529" instrument_node="">This presentation covers how memory works and develops through life, from birth to what happens to memory as we age. Basic information such as anatomy of memory will be covered, theories surrounding memory development, as well as memory loss and decline in late life.</span></div></td><td data-dcnode-id="1525"><span data-dcnode-id="1526" instrument_node="">Knight, Ms. Jamie</span></td><td data-dcnode-id="1523"><span data-dcnode-id="1524" instrument_node="">Graduate Student</span></td><td data-dcnode-id="1521"><span data-dcnode-id="1522" instrument_node="">Department of Psychology</span></td></tr><tr class="Psychology Department-of-Psychology M S Virtual altrow" data-dcnode-id="1506" role="row"><td data-dcnode-id="1518"><span data-dcnode-id="1519" instrument_node="">Psychology</span></td><td class="more-info" data-dcnode-id="1513"><a data-dcnode-id="1516" href="#"><span data-dcnode-id="1517" instrument_node="">Risky Behaviours: Who, What and Why? ǂ (M S) ◊</span></a><div class="description" data-dcnode-id="1514" style="display: none;"><span data-dcnode-id="1515" instrument_node="">This talk focuses on when and why adolescents/young adults engage in various risky behaviours such as disordered eating, non suicidal self-injury, and suicidal ideation. The discussion will include prevalence rates of one or more of the behaviours, predictors of these behaviours, when and why they tend to occur, how to recognize normative versus problematic behaviours, and how to seek help. This talk would be especially suitable for students that are nearing a transition to a post-secondary education context, or for parents who want to learn more about engagement in risky behaviours within their adolescent/young adult. </span></div></td><td data-dcnode-id="1511"><span data-dcnode-id="1512" instrument_node="">Legg, Ms. Nicole</span></td><td data-dcnode-id="1509"><span data-dcnode-id="1510" instrument_node="">Graduate Student</span></td><td data-dcnode-id="1507"><span data-dcnode-id="1508" instrument_node="">Department of Psychology</span></td></tr><tr class="Psychology Department-of-Psychology M S Virtual" data-dcnode-id="1492" role="row"><td data-dcnode-id="1504"><span data-dcnode-id="1505" instrument_node="">Psychology</span></td><td class="more-info" data-dcnode-id="1499"><a data-dcnode-id="1502" href="#"><span data-dcnode-id="1503" instrument_node="">Disordered Eating in the Age of Health and Fitness ǂ (M S) ◊</span></a><div class="description" data-dcnode-id="1500" style="display: none;"><span data-dcnode-id="1501" instrument_node="">This talk covers basic information about what disordered eating is, how it differs from eating disorders, and how a hyper-focus on health and nutrition can proliferate into disordered eating. This talk will address how social media and the ‘new age’ of health and fitness has created new risk factors, triggers and types of disordered eating-consequently starting the body-positive movement. The specific topics covered can be adapted to the needs of the audience.</span></div></td><td data-dcnode-id="1497"><span data-dcnode-id="1498" instrument_node="">Legg, Ms. Nicole</span></td><td data-dcnode-id="1495"><span data-dcnode-id="1496" instrument_node="">Graduate Student</span></td><td data-dcnode-id="1493"><span data-dcnode-id="1494" instrument_node="">Department of Psychology</span></td></tr><tr class="Psychology Department-of-Psychology M S Virtual altrow" data-dcnode-id="1478" role="row"><td data-dcnode-id="1490"><span data-dcnode-id="1491" instrument_node="">Psychology</span></td><td class="more-info" data-dcnode-id="1485"><a data-dcnode-id="1488" href="#"><span data-dcnode-id="1489" instrument_node="">Mental Health and Well-being ǂ (M S) ◊</span></a><div class="description" data-dcnode-id="1486" style="display: none;"><span data-dcnode-id="1487" instrument_node="">This discussion will include general information about what mental health, self-care and well-being are, prevalence rates of mental health concerns and disorders, how to recognize when to seek help and how to get it, how to recognize mental health concerns in others and how to support others that are struggling. This broad talk is meant to provide a general overview of mental health and relevant information. The specific information or topics covered can be adapted to the needs of the audience (e.g., a focus on supporting others in crisis, mindfulness, explanations of various disorders).</span></div></td><td data-dcnode-id="1483"><span data-dcnode-id="1484" instrument_node="">Legg, Ms. Nicole</span></td><td data-dcnode-id="1481"><span data-dcnode-id="1482" instrument_node="">Graduate Student</span></td><td data-dcnode-id="1479"><span data-dcnode-id="1480" instrument_node="">Department of Psychology</span></td></tr><tr class="Psychology Department-of-Psychology Virtual" data-dcnode-id="1464" role="row"><td data-dcnode-id="1476"><span data-dcnode-id="1477" instrument_node="">Psychology</span></td><td class="more-info" data-dcnode-id="1471"><a data-dcnode-id="1474" href="#"><span data-dcnode-id="1475" instrument_node="">Understanding and Responding: Nonsuicidal Self-injury and Suicide Among Youth ǂ ◊</span></a><div class="description" data-dcnode-id="1472" style="display: none;"><span data-dcnode-id="1473" instrument_node="">This presentation will discuss: (1) the definition and prevalence of nonsuicidal self-injury (NSSI); (2) theoretical models that explain when and why some young people engage in NSSI; (3) the importance of using non-stigmatizing language when discussing NSSI; and (4) recommendations for talking to a young person who may be engaging in NSSI. The specific information covered can be adapted to the needs of the audience.</span></div></td><td data-dcnode-id="1469"><span data-dcnode-id="1470" instrument_node="">Robillard, Ms. Christina</span></td><td data-dcnode-id="1467"><span data-dcnode-id="1468" instrument_node="">Graduate Student</span></td><td data-dcnode-id="1465"><span data-dcnode-id="1466" instrument_node="">Department of Psychology</span></td></tr><tr class="Psychology Department-of-Psychology M S Virtual altrow" data-dcnode-id="1450" role="row"><td data-dcnode-id="1462"><span data-dcnode-id="1463" instrument_node="">Psychology</span></td><td class="more-info" data-dcnode-id="1457"><a data-dcnode-id="1460" href="#"><span data-dcnode-id="1461" instrument_node="">Using Psychology to Better Understand Environmental Challenges ǂ (M S) NEW ◊</span></a><div class="description" data-dcnode-id="1458" style="display: none;"><span data-dcnode-id="1459" instrument_node="">As many environmental problems are indisputably caused by human behaviour, addressing them requires the inclusion of social sciences. Individual-level processes at the scale of psychological analysis influence the success or failure of any policy, program or intervention. Psychology offers a unique approach to many social issues, providing empirical analysis of social phenomena. Some researchers focus on human processes in relation to issues such as environmental degradation and climate change. This interactive presentation provides an overview of some prominent psychological approaches and insights regarding environmental issues.</span></div></td><td data-dcnode-id="1455"><span data-dcnode-id="1456" instrument_node="">Williams, Ms. Elizabeth (Liz)</span></td><td data-dcnode-id="1453"><span data-dcnode-id="1454" instrument_node="">Graduate Student</span></td><td data-dcnode-id="1451"><span data-dcnode-id="1452" instrument_node="">Department of Psychology</span></td></tr><tr class="Psychology Department-of-Psychology M S Virtual" data-dcnode-id="1436" role="row"><td data-dcnode-id="1448"><span data-dcnode-id="1449" instrument_node="">Psychology</span></td><td class="more-info" data-dcnode-id="1443"><a data-dcnode-id="1446" href="#"><span data-dcnode-id="1447" instrument_node="">Social Perceptions of Environmentalists ǂ (M S) NEW ◊</span></a><div class="description" data-dcnode-id="1444" style="display: none;"><span data-dcnode-id="1445" instrument_node="">What are public perceptions of environmentalists? Stereotypes are widely understood within a culture, even amongst individuals who do not believe them to be representative of the group in question. Research suggests that stereotypes of environmentalists are primarily negative and may impede environmental participation. At the same time, many activists report feelings of flourishing and satisfaction from their activities. A better understanding of environmentalist stereotypes may contribute to psychology research on inter-group relations and may offer insight into resistance to environmental initiatives. This interactive presentation is potentially valuable for anyone seeking to improve public engagement in environmental issues.</span></div></td><td data-dcnode-id="1441"><span data-dcnode-id="1442" instrument_node="">Williams, Ms. Elizabeth (Liz)</span></td><td data-dcnode-id="1439"><span data-dcnode-id="1440" instrument_node="">Graduate Student</span></td><td data-dcnode-id="1437"><span data-dcnode-id="1438" instrument_node="">Department of Psychology</span></td></tr><tr class="Psychology Department-of-Psychology M S Virtual altrow" data-dcnode-id="1422" role="row"><td data-dcnode-id="1434"><span data-dcnode-id="1435" instrument_node="">Psychology</span></td><td class="more-info" data-dcnode-id="1429"><a data-dcnode-id="1432" href="#"><span data-dcnode-id="1433" instrument_node="">Psychology of Human–Animal Relations: a Look at Speciesism and Pet Companions ǂ (M S) NEW ◊</span></a><div class="description" data-dcnode-id="1430" style="display: none;"><span data-dcnode-id="1431" instrument_node="">From 1970 to 2014, global wildlife populations declined by an average of 60 per cent. Amidst climate change concerns, changes are expected in migration and survival needs across human and non-human species, putting additional pressure on resources and ecosystems. Further, humans have countless relationships with other animals, in research, entertainment and tourism, as companions, and as clothing and food. In the USA alone, approximately nine billion animals are consumed each year. Despite the extensive relationships between humans and other species, there has been very little scholarly attention given to these relationships. Broadly, these interactive presentations explore psychological perspectives on the relationships humans have with other species, in thought and action. This presentation provides the opportunity to deeply consider the billions of other animals with whom we interact, as more than just a largely invisible segment of human experience, but as social groups and individuals in relationship.</span></div></td><td data-dcnode-id="1427"><span data-dcnode-id="1428" instrument_node="">Williams, Ms. Elizabeth (Liz)</span></td><td data-dcnode-id="1425"><span data-dcnode-id="1426" instrument_node="">Graduate Student</span></td><td data-dcnode-id="1423"><span data-dcnode-id="1424" instrument_node="">Department of Psychology</span></td></tr><tr class="Psychology Department-of-Psychology Virtual" data-dcnode-id="1408" role="row"><td data-dcnode-id="1420"><span data-dcnode-id="1421" instrument_node="">Psychology</span></td><td class="more-info" data-dcnode-id="1415"><a data-dcnode-id="1418" href="#"><span data-dcnode-id="1419" instrument_node="">Modern Views of Personality ◊</span></a><div class="description" data-dcnode-id="1416" style="display: none;"><span data-dcnode-id="1417" instrument_node="">It’s not all about Sigmund Freud and Carl Jung. What developments in understanding personality have occurred in the last half century?</span></div></td><td data-dcnode-id="1413"><span data-dcnode-id="1414" instrument_node="">Gifford, Dr. Robert</span></td><td data-dcnode-id="1411"><span data-dcnode-id="1412" instrument_node="">Professor</span></td><td data-dcnode-id="1409"><span data-dcnode-id="1410" instrument_node="">Department of Psychology</span></td></tr><tr class="Psychology Department-of-Psychology S Virtual altrow" data-dcnode-id="1394" role="row"><td data-dcnode-id="1406"><span data-dcnode-id="1407" instrument_node="">Psychology</span></td><td class="more-info" data-dcnode-id="1401"><a data-dcnode-id="1404" href="#"><span data-dcnode-id="1405" instrument_node="">The Psychology of Eyewitness Identification Evidence (S) ◊</span></a><div class="description" data-dcnode-id="1402" style="display: none;"><span data-dcnode-id="1403" instrument_node="">Hundreds of North Americans who had served lengthy prison sentences have been exonerated based on DNA evidence. In most cases, faulty eyewitness identification evidence played a role in the miscarriage of justice. This talk reports on research aimed at developing better ways of collecting and assessing identification evidence.</span></div></td><td data-dcnode-id="1399"><span data-dcnode-id="1400" instrument_node="">Lindsay, Dr. Stephen</span></td><td data-dcnode-id="1397"><span data-dcnode-id="1398" instrument_node="">Professor</span></td><td data-dcnode-id="1395"><span data-dcnode-id="1396" instrument_node="">Department of Psychology</span></td></tr><tr class="Psychology Department-of-Psychology S Virtual" data-dcnode-id="1380" role="row"><td data-dcnode-id="1392"><span data-dcnode-id="1393" instrument_node="">Psychology</span></td><td class="more-info" data-dcnode-id="1387"><a data-dcnode-id="1390" href="#"><span data-dcnode-id="1391" instrument_node="">False Memories and Distorted Beliefs (S) ◊</span></a><div class="description" data-dcnode-id="1388" style="display: none;"><span data-dcnode-id="1389" instrument_node="">For the past 30 years the speaker has been studying basic mechanisms of memory that usually serve us well but sometimes lead us to remember events that never happened or to believe things that aren’t true. This talk summarizes some of that research.</span></div></td><td data-dcnode-id="1385"><span data-dcnode-id="1386" instrument_node="">Lindsay, Dr. Stephen</span></td><td data-dcnode-id="1383"><span data-dcnode-id="1384" instrument_node="">Professor</span></td><td data-dcnode-id="1381"><span data-dcnode-id="1382" instrument_node="">Department of Psychology</span></td></tr><tr class="Psychology Department-of-Counselling-Services S Virtual altrow" data-dcnode-id="1366" role="row"><td data-dcnode-id="1378"><span data-dcnode-id="1379" instrument_node="">Psychology</span></td><td class="more-info" data-dcnode-id="1373"><a data-dcnode-id="1376" href="#"><span data-dcnode-id="1377" instrument_node="">Living in the Moment (S) ◊</span></a><div class="description" data-dcnode-id="1374" style="display: none;"><span data-dcnode-id="1375" instrument_node="">Time is an illusion; time stands still and yet time flies. Often people live in the past remembering or regretting, and people plan for the future or are afraid of what the future will bring. This talk discusses how being in the “now” moment enables us to create a memorable past and a hopeful future.</span></div></td><td data-dcnode-id="1371"><span data-dcnode-id="1372" instrument_node="">Lum, Ms. Wendy</span></td><td data-dcnode-id="1369"><span data-dcnode-id="1370" instrument_node="">Registered Clinical Counsellor</span></td><td data-dcnode-id="1367"><span data-dcnode-id="1368" instrument_node="">Department of Counselling Services</span></td></tr><tr class="Psychology Department-of-Psychology S Virtual" data-dcnode-id="1352" role="row"><td data-dcnode-id="1364"><span data-dcnode-id="1365" instrument_node="">Psychology</span></td><td class="more-info" data-dcnode-id="1359"><a data-dcnode-id="1362" href="#"><span data-dcnode-id="1363" instrument_node="">Misinformation and Eyewitness Memory ǂ (S) NEW ◊</span></a><div class="description" data-dcnode-id="1360" style="display: none;"><span data-dcnode-id="1361" instrument_node="">Although our memories are generally accurate, they can be influenced by a number of factors, and can occasionally be wrong. This is particularly important when it comes to eyewitness memory, where a witness to a crime must remember details about the event or person that they saw. For instance, witnesses who talk to one another about an event can introduce misinformation (incorrect information) to one another, which can result in erroneous reports. In our lab, we have conducted several experiments showing this effect, where participant pairs watch slightly different versions of events, discuss the events, and then take a memory test. I will discuss these experiments and the general literature on misinformation and eyewitness memory.</span></div></td><td data-dcnode-id="1357"><span data-dcnode-id="1358" instrument_node="">Mah, Mr. Eric</span></td><td data-dcnode-id="1355"><span data-dcnode-id="1356" instrument_node="">Graduate Student</span></td><td data-dcnode-id="1353"><span data-dcnode-id="1354" instrument_node="">Department of Psychology</span></td></tr><tr class="Psychology Department-of-Psychology S Virtual altrow" data-dcnode-id="1338" role="row"><td data-dcnode-id="1350"><span data-dcnode-id="1351" instrument_node="">Psychology</span></td><td class="more-info" data-dcnode-id="1345"><a data-dcnode-id="1348" href="#"><span data-dcnode-id="1349" instrument_node="">Open Science ǂ (S) NEW ◊</span></a><div class="description" data-dcnode-id="1346" style="display: none;"><span data-dcnode-id="1347" instrument_node="">In the last 10 years, psychological scientists have become increasingly aware of a “replication crisis” in the field. This crisis arose mainly due to the inability of researchers to replicate a number of influential psychological studies, calling into question the methods of those studies as well as the reality of the psychological effects being studied. As a result of this crisis, researchers have highlighted problems with research methods (such as small sample sizes) and research culture (including questionable research practices, selective publication) that contribute to non-replicability of research findings. Thankfully, researchers have proposed several ways to improve methods and practices, both to address the replication crisis and to make science more rigorous, transparent, and open. I will discuss the replication crisis and suggestions from the open science movement for improving science.</span></div></td><td data-dcnode-id="1343"><span data-dcnode-id="1344" instrument_node="">Mah, Mr. Eric</span></td><td data-dcnode-id="1341"><span data-dcnode-id="1342" instrument_node="">Graduate Student</span></td><td data-dcnode-id="1339"><span data-dcnode-id="1340" instrument_node="">Department of Psychology</span></td></tr><tr class="Science Department-of-Biology S Virtual" data-dcnode-id="1324" role="row"><td data-dcnode-id="1336"><span data-dcnode-id="1337" instrument_node="">Science</span></td><td class="more-info" data-dcnode-id="1331"><a data-dcnode-id="1334" href="#"><span data-dcnode-id="1335" instrument_node="">Insulin: 100 Years and Counting (S) NEW ◊</span></a><div class="description" data-dcnode-id="1332" style="display: none;"><span data-dcnode-id="1333" instrument_node="">This talk will provide an overview of the discovery of the hormone insulin, a hugely significant Canadian medical discovery. We’ll begin with an introduction into the physiology behind diabetes and insulin, and some insights into more recent research showing how insulin also affects reproduction and aging. </span></div></td><td data-dcnode-id="1329"><span data-dcnode-id="1330" instrument_node="">Templeman, Dr. Nicole</span></td><td data-dcnode-id="1327"><span data-dcnode-id="1328" instrument_node="">Assistant Professor</span></td><td data-dcnode-id="1325"><span data-dcnode-id="1326" instrument_node="">Department of Biology</span></td></tr><tr class="Science Department-of-Mechanical-Engineering M S Virtual altrow" data-dcnode-id="1310" role="row"><td data-dcnode-id="1322"><span data-dcnode-id="1323" instrument_node="">Science</span></td><td class="more-info" data-dcnode-id="1317"><a data-dcnode-id="1320" href="#"><span data-dcnode-id="1321" instrument_node="">Materials Science: Unraveling Atomic Mysteries (M S) NEW ◊</span></a><div class="description" data-dcnode-id="1318" style="display: none;"><span data-dcnode-id="1319" instrument_node="">This talk examines why some plastics are transparent, and others cloudy. Why are metals mostly shiny and gray? Much depends on how light interacts with atoms. </span></div></td><td data-dcnode-id="1315"><span data-dcnode-id="1316" instrument_node="">Valente, Dr. Karolina Papera</span></td><td data-dcnode-id="1313"><span data-dcnode-id="1314" instrument_node="">Assistant Teaching Professor</span></td><td data-dcnode-id="1311"><span data-dcnode-id="1312" instrument_node="">Department of Mechanical Engineering</span></td></tr><tr class="Science Department-of-Physics--Astronomy M S Virtual" data-dcnode-id="1296" role="row"><td data-dcnode-id="1308"><span data-dcnode-id="1309" instrument_node="">Science</span></td><td class="more-info" data-dcnode-id="1303"><a data-dcnode-id="1306" href="#"><span data-dcnode-id="1307" instrument_node="">Toward Nature’s Heart of Darkness: New Technologies for Precision Astrophysics and Cosmology (M S) ◊</span></a><div class="description" data-dcnode-id="1304" style="display: none;"><span data-dcnode-id="1305" instrument_node="">Only 5% of our observed universe is composed of atoms, molecules, and other components of which we largely understand (such as photons that carry electromagnetic energy, neutrinos, and black holes).  The remaining 95% of our universe is composed of dark matter and dark energy, which are two very different components which are largely not understood at present. I will discuss emerging technologies that will be starting to allow us to reduce our present uncertainties on the properties of dark energy and of dark matter.</span></div></td><td data-dcnode-id="1301"><span data-dcnode-id="1302" instrument_node="">Albert, Dr. Justin</span></td><td data-dcnode-id="1299"><span data-dcnode-id="1300" instrument_node="">Associate Professor</span></td><td data-dcnode-id="1297"><span data-dcnode-id="1298" instrument_node="">Department of Physics &amp; Astronomy</span></td></tr><tr class="Science Department-of-Physics--Astronomy M S Virtual altrow" data-dcnode-id="1282" role="row"><td data-dcnode-id="1294"><span data-dcnode-id="1295" instrument_node="">Science</span></td><td class="more-info" data-dcnode-id="1289"><a data-dcnode-id="1292" href="#"><span data-dcnode-id="1293" instrument_node="">ALTAIR: Precision Astrophysics and Cosmology (M S) ◊</span></a><div class="description" data-dcnode-id="1290" style="display: none;"><span data-dcnode-id="1291" instrument_node="">ALTAIR (Airborne Laser for Telescopic Atmospheric Interference Reduction, http://projectaltair.org) is a new device for providing calibration for astronomy and for atmospheric physics using small, precisely-calibrated light sources carried aloft into the stratosphere using small, low-cost weather balloons. I will discuss the motivation for ALTAIR, our results and progress, and additionally how ALTAIR technology could revolutionize telecommunication in large remote areas such as Canada's Arctic North.</span></div></td><td data-dcnode-id="1287"><span data-dcnode-id="1288" instrument_node="">Albert, Dr. Justin</span></td><td data-dcnode-id="1285"><span data-dcnode-id="1286" instrument_node="">Associate Professor</span></td><td data-dcnode-id="1283"><span data-dcnode-id="1284" instrument_node="">Department of Physics &amp; Astronomy</span></td></tr><tr class="Science Department-of-Physics--Astronomy M S Virtual" data-dcnode-id="1268" role="row"><td data-dcnode-id="1280"><span data-dcnode-id="1281" instrument_node="">Science</span></td><td class="more-info" data-dcnode-id="1275"><a data-dcnode-id="1278" href="#"><span data-dcnode-id="1279" instrument_node="">How Understanding Fundamental Particle Interactions Helps Us Understand the Universe (M S) ◊</span></a><div class="description" data-dcnode-id="1276" style="display: none;"><span data-dcnode-id="1277" instrument_node="">Particle physics allows us to understand nature at its most fundamental level, whereas astrophysics allows us to understand nature at its very largest scales. How do these two fields overlap? What has astrophysics learned from particle physics, and vice-versa? And what are some present-day contentions and open questions, at the boundaries of these two fields? I will discuss these questions, with a focus on some of the big open problems, with examples being the natures of dark matter and of dark energy, at the boundary of the two fields.</span></div></td><td data-dcnode-id="1273"><span data-dcnode-id="1274" instrument_node="">Albert, Dr. Justin</span></td><td data-dcnode-id="1271"><span data-dcnode-id="1272" instrument_node="">Associate Professor</span></td><td data-dcnode-id="1269"><span data-dcnode-id="1270" instrument_node="">Department of Physics &amp; Astronomy</span></td></tr><tr class="Science Department-of-Physics--Astronomy M S Virtual altrow" data-dcnode-id="1254" role="row"><td data-dcnode-id="1266"><span data-dcnode-id="1267" instrument_node="">Science</span></td><td class="more-info" data-dcnode-id="1261"><a data-dcnode-id="1264" href="#"><span data-dcnode-id="1265" instrument_node="">The Search for Life in the Universe (M S) ◊</span></a><div class="description" data-dcnode-id="1262" style="display: none;"><span data-dcnode-id="1263" instrument_node="">Do aliens exist? Where might we find them? How will we recognize them? This talk presents the science of astrobiology-the scientific search for alien life. Take an astrobiological tour of our solar system and the newly discovered planets of our Milky Way galaxy in the quest for contact.</span></div></td><td data-dcnode-id="1259"><span data-dcnode-id="1260" instrument_node="">Willis, Dr. Jon</span></td><td data-dcnode-id="1257"><span data-dcnode-id="1258" instrument_node="">Associate Professor</span></td><td data-dcnode-id="1255"><span data-dcnode-id="1256" instrument_node="">Department of Physics &amp; Astronomy</span></td></tr><tr class="Science Department-of-Physics--Astronomy M S Virtual" data-dcnode-id="1240" role="row"><td data-dcnode-id="1252"><span data-dcnode-id="1253" instrument_node="">Science</span></td><td class="more-info" data-dcnode-id="1247"><a data-dcnode-id="1250" href="#"><span data-dcnode-id="1251" instrument_node="">Everything You’ve Ever Wanted to Know About the Big Bang but Were Afraid to Ask (M S) ◊</span></a><div class="description" data-dcnode-id="1248" style="display: none;"><span data-dcnode-id="1249" instrument_node="">How big is the universe? How old is it? What happened before the Big Bang? What exactly are we expanding into? The universe we live in is as big as anything gets, with big questions to match. That doesn't mean the answers have to be complicated though. Get straightforward answers to all of the above-plus bring some of your own!</span></div></td><td data-dcnode-id="1245"><span data-dcnode-id="1246" instrument_node="">Willis, Dr. Jon</span></td><td data-dcnode-id="1243"><span data-dcnode-id="1244" instrument_node="">Associate Professor</span></td><td data-dcnode-id="1241"><span data-dcnode-id="1242" instrument_node="">Department of Physics &amp; Astronomy</span></td></tr><tr class="Science Department-of-Physics--Astronomy M S Virtual altrow" data-dcnode-id="1226" role="row"><td data-dcnode-id="1238"><span data-dcnode-id="1239" instrument_node="">Science</span></td><td class="more-info" data-dcnode-id="1233"><a data-dcnode-id="1236" href="#"><span data-dcnode-id="1237" instrument_node="">Exploring the Oceans, on Earth and Across our Solar System (M S) ◊</span></a><div class="description" data-dcnode-id="1234" style="display: none;"><span data-dcnode-id="1235" instrument_node="">What is it like to be an ocean explorer? Can you imagine exploring oceans on worlds beyond Earth? We will learn about the exploration of Earth's oceans and the discovery of habitats and life forms so weird that they seem almost alien. Our story will take us from undersea volcanoes off the coast of Vancouver Island to the icy wastes of Antarctica. We will talk about the ships and submersibles used to explore Earth's oceans and we will touch rocks recovered from the abyss. Beyond this, we will journey aboard robotic space probes to the moons of the giant planets Jupiter and Saturn and share in the startling discovery that some host oceans that dwarf our own. What technology might we use to one day explore within these oceans and what might we expect to find?</span></div></td><td data-dcnode-id="1231"><span data-dcnode-id="1232" instrument_node="">Willis, Dr. Jon</span></td><td data-dcnode-id="1229"><span data-dcnode-id="1230" instrument_node="">Associate Professor</span></td><td data-dcnode-id="1227"><span data-dcnode-id="1228" instrument_node="">Department of Physics &amp; Astronomy</span></td></tr><tr class="Science School-of-Earth--Ocean-Sciences M S Virtual" data-dcnode-id="1212" role="row"><td data-dcnode-id="1224"><span data-dcnode-id="1225" instrument_node="">Science</span></td><td class="more-info" data-dcnode-id="1219"><a data-dcnode-id="1222" href="#"><span data-dcnode-id="1223" instrument_node="">Learning about Conspiracy Theories: Why Do People Choose to Reject Science? (M S) ◊</span></a><div class="description" data-dcnode-id="1220" style="display: none;"><span data-dcnode-id="1221" instrument_node="">The triple disaster of the earthquake, tsunami and nuclear reactor meltdowns that struck Japan in March 2011 led to the release of massive amounts of radioactive isotopes into the environment. Despite the high local levels in Japan, and global reach of contamination from Fukushima, the international scientific community has determined that the short and long-term impacts on environmental and human health will be difficult to detect. While most public response to the speaker’s work on the Fukushima disaster has been positive, he has faced attacks on his professional and personal integrity. This lecture explores how and why individuals choose to reject science and expertise, and what the consequences of such a mindset are for public policy on complicated and/or controversial matters.</span></div></td><td data-dcnode-id="1217"><span data-dcnode-id="1218" instrument_node="">Cullen, Dr. Jay</span></td><td data-dcnode-id="1215"><span data-dcnode-id="1216" instrument_node="">Associate Professor</span></td><td data-dcnode-id="1213"><span data-dcnode-id="1214" instrument_node="">School of Earth &amp; Ocean Sciences</span></td></tr><tr class="Science Office-of-the-Dean Virtual altrow" data-dcnode-id="1198" role="row"><td data-dcnode-id="1210"><span data-dcnode-id="1211" instrument_node="">Science</span></td><td class="more-info" data-dcnode-id="1205"><a data-dcnode-id="1208" href="#"><span data-dcnode-id="1209" instrument_node="">Fiber-optic Sensors: From Earthquake Monitoring to Optical Guitar Pickups ◊</span></a><div class="description" data-dcnode-id="1206" style="display: none;"><span data-dcnode-id="1207" instrument_node="">Fiber-optics have revolutionized telecommunications, allowing for speed-of-light transmission of vast amounts of information. A lesser known application of fiber optics lies in remote sensing capabilities of fiber optic components. In this presentation I will give a brief overview of the applications of fiber-optic sensors and then describe work of our group and others at UVic, including the development of a all-optical guitar pickup.</span></div></td><td data-dcnode-id="1203"><span data-dcnode-id="1204" instrument_node="">Loock, Prof. Peter</span></td><td data-dcnode-id="1201"><span data-dcnode-id="1202" instrument_node="">Dean</span></td><td data-dcnode-id="1199"><span data-dcnode-id="1200" instrument_node="">Office of the Dean</span></td></tr><tr class="Science Department-of-Biochemistry--Microbiology S Not-Virtual" data-dcnode-id="1184" role="row"><td data-dcnode-id="1196"><span data-dcnode-id="1197" instrument_node="">Science</span></td><td class="more-info" data-dcnode-id="1191"><a data-dcnode-id="1194" href="#"><span data-dcnode-id="1195" instrument_node="">Rett Syndrome and the MeCP2 gene (in English or Spanish) (S)</span></a><div class="description" data-dcnode-id="1192" style="display: none;"><span data-dcnode-id="1193" instrument_node="">Discussion of the role of the methyl CpG binding protein 2 (MeCP2) gene in humans-and the development of Rett Syndrome. </span></div></td><td data-dcnode-id="1189"><span data-dcnode-id="1190" instrument_node="">Ausió, Dr. Juan</span></td><td data-dcnode-id="1187"><span data-dcnode-id="1188" instrument_node="">Professor</span></td><td data-dcnode-id="1185"><span data-dcnode-id="1186" instrument_node="">Department of Biochemistry &amp; Microbiology</span></td></tr><tr class="Science Department-of-Biochemistry--Microbiology S Not-Virtual altrow" data-dcnode-id="1170" role="row"><td data-dcnode-id="1182"><span data-dcnode-id="1183" instrument_node="">Science</span></td><td class="more-info" data-dcnode-id="1177"><a data-dcnode-id="1180" href="#"><span data-dcnode-id="1181" instrument_node="">Epigenetics (in English or Spanish) (S) </span></a><div class="description" data-dcnode-id="1178" style="display: none;"><span data-dcnode-id="1179" instrument_node="">Epigenetics is the study of the effects of environment and life style on our genes. This talk focuses on histone-histone interactions, and on histone-DNA interactions at the nucleosome level and at the higher order structure of chromatin in prostate cancer and Rett’s Syndrome. Special attention is being paid to the influence on these interactions of biologically significant chemical modifications, both at the histone and at the DNA level (acetylation, phosphorylation, methylation) and their epigenetic contribution.</span></div></td><td data-dcnode-id="1175"><span data-dcnode-id="1176" instrument_node="">Ausió, Dr. Juan</span></td><td data-dcnode-id="1173"><span data-dcnode-id="1174" instrument_node="">Professor</span></td><td data-dcnode-id="1171"><span data-dcnode-id="1172" instrument_node="">Department of Biochemistry &amp; Microbiology</span></td></tr><tr class="Science Department-of-Physics--Astronomy M S Virtual" data-dcnode-id="1156" role="row"><td data-dcnode-id="1168"><span data-dcnode-id="1169" instrument_node="">Science</span></td><td class="more-info" data-dcnode-id="1163"><a data-dcnode-id="1166" href="#"><span data-dcnode-id="1167" instrument_node="">Is there Order or Chaos Inside Stars? Answers from Experiments with the Largest Supercomputers (M S) ◊</span></a><div class="description" data-dcnode-id="1164" style="display: none;"><span data-dcnode-id="1165" instrument_node="">Inside the stars, fluid matter can be layered and almost motionless like in an ocean during a calm, or the fluids can be swirling in raging torrents like in a hurricane, tsunami or massive wild fire. In this talk we will look at simulations of the interior of stars made with the fastest supercomputers in the world, that show us how this happens-and why.</span></div></td><td data-dcnode-id="1161"><span data-dcnode-id="1162" instrument_node="">Herwig, Dr. Falk</span></td><td data-dcnode-id="1159"><span data-dcnode-id="1160" instrument_node="">Professor</span></td><td data-dcnode-id="1157"><span data-dcnode-id="1158" instrument_node="">Department of Physics &amp; Astronomy</span></td></tr><tr class="Science Department-of-Psychology S Virtual altrow" data-dcnode-id="1142" role="row"><td data-dcnode-id="1154"><span data-dcnode-id="1155" instrument_node="">Science</span></td><td class="more-info" data-dcnode-id="1149"><a data-dcnode-id="1152" href="#"><span data-dcnode-id="1153" instrument_node="">The "Replication Crisis" in Psychology and Other Sciences (S) ◊</span></a><div class="description" data-dcnode-id="1150" style="display: none;"><span data-dcnode-id="1151" instrument_node="">Psychology, biology, medicine, and even physics have been shaken by recent evidence that discoveries published in prestigious journals often fail to be reproduced when other researchers attempt to replicate the original experiments. This talk explains flaws in widely used&nbsp;research procedures that contribute to high rates of non-replicability.</span></div></td><td data-dcnode-id="1147"><span data-dcnode-id="1148" instrument_node="">Lindsay, Dr. Stephen</span></td><td data-dcnode-id="1145"><span data-dcnode-id="1146" instrument_node="">Professor</span></td><td data-dcnode-id="1143"><span data-dcnode-id="1144" instrument_node="">Department of Psychology</span></td></tr><tr class="Science Department-of-Biochemistry--Microbiology E M S Virtual" data-dcnode-id="1128" role="row"><td data-dcnode-id="1140"><span data-dcnode-id="1141" instrument_node="">Science</span></td><td class="more-info" data-dcnode-id="1135"><a data-dcnode-id="1138" href="#"><span data-dcnode-id="1139" instrument_node="">Genetically Modified Organisms: Frankenfood or Cornucopia? (E M S) ◊</span></a><div class="description" data-dcnode-id="1136" style="display: none;"><span data-dcnode-id="1137" instrument_node="">The introduction of genetically modified organisms (GMOs) has resulted in an unprecedented level of controversy and debate. GMOs, on one hand, come with promises of improvements in characteristics that are unattainable by traditional plant or animal breeding. On the other hand, GMOs bring spectres of new human health problems, environmental disasters, and economic issues. This presentation focuses on positive and negative issues surrounding GMOs with illustrations and scientific data. </span></div></td><td data-dcnode-id="1133"><span data-dcnode-id="1134" instrument_node="">Ishiguro, Dr. Edward E.</span></td><td data-dcnode-id="1131"><span data-dcnode-id="1132" instrument_node="">Professor Emeritus</span></td><td data-dcnode-id="1129"><span data-dcnode-id="1130" instrument_node="">Department of Biochemistry &amp; Microbiology</span></td></tr><tr class="Science Department-of-Biochemistry--Microbiology Virtual altrow" data-dcnode-id="1114" role="row"><td data-dcnode-id="1126"><span data-dcnode-id="1127" instrument_node="">Science</span></td><td class="more-info" data-dcnode-id="1121"><a data-dcnode-id="1124" href="#"><span data-dcnode-id="1125" instrument_node="">Involvement of Gut Bacteria in Gut–Brain Communication ◊</span></a><div class="description" data-dcnode-id="1122" style="display: none;"><span data-dcnode-id="1123" instrument_node="">This presentation focuses on the involvement of gut bacteria in certain aspects of the bidirectional communication between the brain and the gut. The disruption of this communication may contribute to the pathogenesis of a variety of disorders ranging from neurodegenerative diseases like Parkinson’s disease to behavioral disorders.</span></div></td><td data-dcnode-id="1119"><span data-dcnode-id="1120" instrument_node="">Ishiguro, Dr. Edward E.</span></td><td data-dcnode-id="1117"><span data-dcnode-id="1118" instrument_node="">Professor Emeritus</span></td><td data-dcnode-id="1115"><span data-dcnode-id="1116" instrument_node="">Department of Biochemistry &amp; Microbiology</span></td></tr><tr class="Science Department-of-Biochemistry--Microbiology Virtual" data-dcnode-id="1100" role="row"><td data-dcnode-id="1112"><span data-dcnode-id="1113" instrument_node="">Science</span></td><td class="more-info" data-dcnode-id="1107"><a data-dcnode-id="1110" href="#"><span data-dcnode-id="1111" instrument_node="">Cellular Senescence: Promising Target for New Anti-aging Drugs ◊</span></a><div class="description" data-dcnode-id="1108" style="display: none;"><span data-dcnode-id="1109" instrument_node="">Cells that have permanently lost the ability to proliferate (senescence) accumulate in tissues during aging and aging-related disorders. Drugs under development that target senescence may improve healthy aging.</span></div></td><td data-dcnode-id="1105"><span data-dcnode-id="1106" instrument_node="">Ishiguro, Dr. Edward E.</span></td><td data-dcnode-id="1103"><span data-dcnode-id="1104" instrument_node="">Professor Emeritus</span></td><td data-dcnode-id="1101"><span data-dcnode-id="1102" instrument_node="">Department of Biochemistry &amp; Microbiology</span></td></tr><tr class="Science Department-of-Biochemistry--Microbiology E M S Virtual altrow" data-dcnode-id="1086" role="row"><td data-dcnode-id="1098"><span data-dcnode-id="1099" instrument_node="">Science</span></td><td class="more-info" data-dcnode-id="1093"><a data-dcnode-id="1096" href="#"><span data-dcnode-id="1097" instrument_node="">Our Gut Bacteria, their Interaction with our Diet, and their Influence on our Health (E M S) NEW ◊</span></a><div class="description" data-dcnode-id="1094" style="display: none;"><span data-dcnode-id="1095" instrument_node="">This presentation focuses on the interactions of our gut bacteria with our diet, and how their activities contribute to our overall health. It’s a great way to find out why you are what you eat.</span></div></td><td data-dcnode-id="1091"><span data-dcnode-id="1092" instrument_node="">Ishiguro, Dr. Edward E.</span></td><td data-dcnode-id="1089"><span data-dcnode-id="1090" instrument_node="">Professor Emeritus</span></td><td data-dcnode-id="1087"><span data-dcnode-id="1088" instrument_node="">Department of Biochemistry &amp; Microbiology</span></td></tr><tr class="Science Department-of-Biochemistry--Microbiology E M S Virtual" data-dcnode-id="1072" role="row"><td data-dcnode-id="1084"><span data-dcnode-id="1085" instrument_node="">Science</span></td><td class="more-info" data-dcnode-id="1079"><a data-dcnode-id="1082" href="#"><span data-dcnode-id="1083" instrument_node="">How the Immune System Works (E M S) ◊</span></a><div class="description" data-dcnode-id="1080" style="display: none;"><span data-dcnode-id="1081" instrument_node="">This is a general introduction to how our immune system protects us from harmful substances in our environment, such as infectious agents. The level of detail can be adjusted to suit the audience, i.e., any level ranging from novice to proficient.</span></div></td><td data-dcnode-id="1077"><span data-dcnode-id="1078" instrument_node="">Ishiguro, Dr. Edward E.</span></td><td data-dcnode-id="1075"><span data-dcnode-id="1076" instrument_node="">Professor Emeritus</span></td><td data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node="">Department of Biochemistry &amp; Microbiology</span></td></tr><tr class="Science Department-of-Biochemistry--Microbiology Virtual altrow" data-dcnode-id="1058" role="row"><td data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">Science</span></td><td class="more-info" data-dcnode-id="1065"><a data-dcnode-id="1068" href="#"><span data-dcnode-id="1069" instrument_node="">The Gut Immune System Over the Lifespan ◊</span></a><div class="description" data-dcnode-id="1066" style="display: none;"><span data-dcnode-id="1067" instrument_node="">Our digestive tract is one of the most vulnerable sites in our body to infection and, not surprisingly, and contains the largest and most active tissue in our immune system. The development and function of gut immunity over the lifespan will be described with a particular focus on the role of the gut bacteria in these processes.</span></div></td><td data-dcnode-id="1063"><span data-dcnode-id="1064" instrument_node="">Ishiguro, Dr. Edward E.</span></td><td data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">Professor Emeritus</span></td><td data-dcnode-id="1059"><span data-dcnode-id="1060" instrument_node="">Department of Biochemistry &amp; Microbiology</span></td></tr><tr class="Science Department-of-Biochemistry--Microbiology Virtual" data-dcnode-id="1044" role="row"><td data-dcnode-id="1056"><span data-dcnode-id="1057" instrument_node="">Science</span></td><td class="more-info" data-dcnode-id="1051"><a data-dcnode-id="1054" href="#"><span data-dcnode-id="1055" instrument_node="">An Introduction to Stem Cells ◊</span></a><div class="description" data-dcnode-id="1052" style="display: none;"><span data-dcnode-id="1053" instrument_node="">This presentation examines the different classes of stem cells, their unique properties, and their potential therapeutic applications as well as current limitations. Current stem cell clinics will be critically evaluated.</span></div></td><td data-dcnode-id="1049"><span data-dcnode-id="1050" instrument_node="">Ishiguro, Dr. Edward E.</span></td><td data-dcnode-id="1047"><span data-dcnode-id="1048" instrument_node="">Professor Emeritus</span></td><td data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">Department of Biochemistry &amp; Microbiology</span></td></tr><tr class="Science Department-of-Physics--Astronomy E M S Not-Virtual altrow" data-dcnode-id="1030" role="row"><td data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">Science</span></td><td class="more-info" data-dcnode-id="1037"><a data-dcnode-id="1040" href="#"><span data-dcnode-id="1041" instrument_node="">Tour of the Astronomical Observatory at UVic (E M S)</span></a><div class="description" data-dcnode-id="1038" style="display: none;"><span data-dcnode-id="1039" instrument_node="">This tour is intended as an introduction to astronomy, and is accessible for students and general public of all ages. Due to space restrictions, we can accommodate&nbsp;groups of up to 20 only. During the tour, approximately 20 minutes are spent in the astronomy lab answering questions, then as sky conditions permit,&nbsp;20 minutes observing the Sun with a specialized solar telescope, and 20 minutes in the telescope&nbsp;dome observing any interesting astronomical objects in the sky which are accessible.</span></div></td><td data-dcnode-id="1035"><span data-dcnode-id="1036" instrument_node="">Thanjavur, Dr. Karun</span></td><td data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node="">Senior Lab Instructor</span></td><td data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">Department of Physics &amp; Astronomy</span></td></tr><tr class="Science Department-of-Physics--Astronomy M S Virtual" data-dcnode-id="1016" role="row"><td data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">Science</span></td><td class="more-info" data-dcnode-id="1023"><a data-dcnode-id="1026" href="#"><span data-dcnode-id="1027" instrument_node="">UVic's Contributions to the Discovery of the Higgs Boson at the ATLAS Experiment (M S) ◊</span></a><div class="description" data-dcnode-id="1024" style="display: none;"><span data-dcnode-id="1025" instrument_node="">UVic is a founding institutional member of the ATLAS Collaboration, one of two large general-purpose particle detector experiments at the Large Hadron Collider (LHC) at the CERN Laboratory (located near Geneva,Switzerland) that discovered the Higgs Boson in 2012.  Some parts of the ATLAS detector were constructed right here at UVic (and we are also presently constructing some upgrades to the ATLAS detector); and we at UVic m
