ter detail of the methods and techniques brought to bear on these materials with consideration for their preparation, analysis and applications for answering scientific questions. </span></div></td><td data-dcnode-id="7181"><span data-dcnode-id="7182" instrument_node="">McLachlan, Mr. Sandy</span></td><td data-dcnode-id="7179"><span data-dcnode-id="7180" instrument_node="">Graduate Student</span></td><td data-dcnode-id="7177"><span data-dcnode-id="7178" instrument_node="">School of Earth &amp; Ocean Sciences</span></td></tr><tr class="Earth--Oceans School-of-Earth--Ocean-Sciences S Virtual" data-dcnode-id="7162" role="row"><td data-dcnode-id="7174"><span data-dcnode-id="7175" instrument_node="">Earth &amp; Oceans</span></td><td class="more-info" data-dcnode-id="7169"><a data-dcnode-id="7172" href="#"><span data-dcnode-id="7173" instrument_node="">Microfossils: Diversity and Utility ǂ (S) NEW ◊</span></a><div class="description" data-dcnode-id="7170" style="display: none;"><span data-dcnode-id="7171" instrument_node="">This talk explores fossil diversity, with a focus on the new frontier of microfossils of the region and their use in furthering our understanding of evolutionary biology, Earth history and paleoenvrionments. This talk would offer greater detail of the methods and techniques brought to bear on these materials with consideration for their preparation, analysis and applications for answering scientific questions.</span></div></td><td data-dcnode-id="7167"><span data-dcnode-id="7168" instrument_node="">McLachlan, Mr. Sandy</span></td><td data-dcnode-id="7165"><span data-dcnode-id="7166" instrument_node="">Graduate Student</span></td><td data-dcnode-id="7163"><span data-dcnode-id="7164" instrument_node="">School of Earth &amp; Ocean Sciences</span></td></tr><tr class="Earth--Oceans School-of-Earth--Ocean-Sciences M S Virtual altrow" data-dcnode-id="7148" role="row"><td data-dcnode-id="7160"><span data-dcnode-id="7161" instrument_node="">Earth &amp; Oceans</span></td><td class="more-info" data-dcnode-id="7155"><a data-dcnode-id="7158" href="#"><span data-dcnode-id="7159" instrument_node="">Hydrothermal Vents: Life in the Absence of Sunlight (M S) ǂ NEW ◊</span></a><div class="description" data-dcnode-id="7156" style="display: none;"><span data-dcnode-id="7157" instrument_node="">The discovery of ecosystems at deep-sea hydrothermal vents in 1977 altered the global perspective concerning the boundaries of biological systems. Thousands of meters below the ocean surface, in complete darkness, dense communities of species were found not only existing but thriving. In this talk the audience is presented with an overview of these fascinating systems, their role in global systems, resources they contain that have the potential to contribute to human advancement, and the importance of effectively regulating resource extraction. Vent systems off the West Coast of Vancouver Island are a particular focus.</span></div></td><td data-dcnode-id="7153"><span data-dcnode-id="7154" instrument_node="">Harris, Ms. Moronke</span></td><td data-dcnode-id="7151"><span data-dcnode-id="7152" instrument_node="">Graduate Student</span></td><td data-dcnode-id="7149"><span data-dcnode-id="7150" instrument_node="">School of Earth &amp; Ocean Sciences</span></td></tr><tr class="Earth--Oceans School-of-Earth--Ocean-Sciences M S Virtual" data-dcnode-id="7134" role="row"><td data-dcnode-id="7146"><span data-dcnode-id="7147" instrument_node="">Earth &amp; Oceans</span></td><td class="more-info" data-dcnode-id="7141"><a data-dcnode-id="7144" href="#"><span data-dcnode-id="7145" instrument_node="">An Intervention Strategy for Coral Survival in a Warming Ocean (M S) ǂ NEW ◊</span></a><div class="description" data-dcnode-id="7142" style="display: none;"><span data-dcnode-id="7143" instrument_node="">Coral bleaching, caused by rising ocean temperatures, is one of the most severe threats to tropical coral reefs globally. Artificial upwelling (AU) is an experimental technology that drives the flow of deep, cold, nutrient rich water towards the ocean surface through large underwater pumps. In this talk the audience is presented with a brief overview of the possible effectiveness of AU in preventing coral bleaching that often leads to mortality during periods of ocean warming.</span></div></td><td data-dcnode-id="7139"><span data-dcnode-id="7140" instrument_node="">Harris, Ms. Moronke</span></td><td data-dcnode-id="7137"><span data-dcnode-id="7138" instrument_node="">Graduate Student</span></td><td data-dcnode-id="7135"><span data-dcnode-id="7136" instrument_node="">School of Earth &amp; Ocean Sciences</span></td></tr><tr class="Earth--Oceans School-of-Earth--Ocean-Sciences E M Virtual altrow" data-dcnode-id="7120" role="row"><td data-dcnode-id="7132"><span data-dcnode-id="7133" instrument_node="">Earth &amp; Oceans</span></td><td class="more-info" data-dcnode-id="7127"><a data-dcnode-id="7130" href="#"><span data-dcnode-id="7131" instrument_node="">What Can We Learn from the Dirt?-Demonstration of Tsunami Deposits ǂ (E M) ◊</span></a><div class="description" data-dcnode-id="7128" style="display: none;"><span data-dcnode-id="7129" instrument_node="">This activity demonstrates how layers in the earth record tsunami events, what do tsunami deposits look like, and how can we know there has been an earthquake in the past. There will be activities for students to make their own tsunami deposits using soil, sand, stick, paper, double-sided tape. Then, I will show photos of real tsunami deposits to compare with what the students just made, and how geologists work in the field to obtain the information of tsunami layers. </span></div></td><td data-dcnode-id="7125"><span data-dcnode-id="7126" instrument_node="">Sethanant, Ms. Israporn (Grace)</span></td><td data-dcnode-id="7123"><span data-dcnode-id="7124" instrument_node="">Graduate Student</span></td><td data-dcnode-id="7121"><span data-dcnode-id="7122" instrument_node="">School of Earth &amp; Ocean Sciences</span></td></tr><tr class="Earth--Oceans School-of-Earth--Ocean-Sciences E M Virtual" data-dcnode-id="7106" role="row"><td data-dcnode-id="7118"><span data-dcnode-id="7119" instrument_node="">Earth &amp; Oceans</span></td><td class="more-info" data-dcnode-id="7113"><a data-dcnode-id="7116" href="#"><span data-dcnode-id="7117" instrument_node="">Shake It, Shake It!-Liquefaction in a Cup ǂ (E M) ◊</span></a><div class="description" data-dcnode-id="7114" style="display: none;"><span data-dcnode-id="7115" instrument_node="">This presentation and activity will cover the definition and causes of earthquake liquefaction, including where or which type of ground/soil liquefaction could occur. The students will experience the affects of earthquake shaking on different types of ground material through plastic cups and sand activity. The activity will demonstrate how building structures respond to earthquake shaking and liquefaction. </span></div></td><td data-dcnode-id="7111"><span data-dcnode-id="7112" instrument_node="">Sethanant, Ms. Israporn (Grace)</span></td><td data-dcnode-id="7109"><span data-dcnode-id="7110" instrument_node="">Graduate Student</span></td><td data-dcnode-id="7107"><span data-dcnode-id="7108" instrument_node="">School of Earth &amp; Ocean Sciences</span></td></tr><tr class="Earth--Oceans School-of-Earth--Ocean-Sciences E M Virtual altrow" data-dcnode-id="7092" role="row"><td data-dcnode-id="7104"><span data-dcnode-id="7105" instrument_node="">Earth &amp; Oceans</span></td><td class="more-info" data-dcnode-id="7099"><a data-dcnode-id="7102" href="#"><span data-dcnode-id="7103" instrument_node="">Plate Tectonics and Hazards of Vancouver Island ǂ (E M) ◊</span></a><div class="description" data-dcnode-id="7100" style="display: none;"><span data-dcnode-id="7101" instrument_node="">This topic presents about the three main movements of plate tectonics and how earthquakes, mountain buildings, and volcanos are related to those plate tectonic boundaries. (I might be able to borrow some foam material from the department to do a demonstration.) I will explain the main tectonics that is happening on Vancouver Island. I will also include how we should act in different scenarios when exposed to earthquake hazards. </span></div></td><td data-dcnode-id="7097"><span data-dcnode-id="7098" instrument_node="">Sethanant, Ms. Israporn (Grace)</span></td><td data-dcnode-id="7095"><span data-dcnode-id="7096" instrument_node="">Graduate Student</span></td><td data-dcnode-id="7093"><span data-dcnode-id="7094" instrument_node="">School of Earth &amp; Ocean Sciences</span></td></tr><tr class="Earth--Oceans School-of-Earth--Ocean-Sciences S Virtual" data-dcnode-id="7078" role="row"><td data-dcnode-id="7090"><span data-dcnode-id="7091" instrument_node="">Earth &amp; Oceans</span></td><td class="more-info" data-dcnode-id="7085"><a data-dcnode-id="7088" href="#"><span data-dcnode-id="7089" instrument_node="">What is a Paleoseismologist? ǂ (S) NEW ◊</span></a><div class="description" data-dcnode-id="7086" style="display: none;"><span data-dcnode-id="7087" instrument_node="">This school-oriented presentation leads students in making layers of sediments that record faulting and earthquake events. The students will learn what each layer tells about events in the past. They are playing a role of a paleoseismologist-a geologist who studies earthquakes in the past using records of sediments, rocks and minerals. I will then show two examples of paleoseismologists in the field: (a) trenching in Myanmar, and (b) tsunami deposits in Seattle. </span></div></td><td data-dcnode-id="7083"><span data-dcnode-id="7084" instrument_node="">Sethanant, Ms. Israporn (Grace)</span></td><td data-dcnode-id="7081"><span data-dcnode-id="7082" instrument_node="">Graduate Student</span></td><td data-dcnode-id="7079"><span data-dcnode-id="7080" instrument_node="">School of Earth &amp; Ocean Sciences</span></td></tr><tr class="Earth--Oceans School-of-Environmental-Studies S Virtual altrow" data-dcnode-id="7064" role="row"><td data-dcnode-id="7076"><span data-dcnode-id="7077" instrument_node="">Earth &amp; Oceans</span></td><td class="more-info" data-dcnode-id="7071"><a data-dcnode-id="7074" href="#"><span data-dcnode-id="7075" instrument_node="">Where (and Why) are Ghosts Fishing in the Salish Sea? (S) ǂ NEW ◊</span></a><div class="description" data-dcnode-id="7072" style="display: none;"><span data-dcnode-id="7073" instrument_node="">Ghost fishing gear-meaning any lost, discarded or otherwise abandoned fishing gear-is an under-studied problem in our oceans. It causes habitat degradation, kills marine life, and negatively affects commercial fishery stocks worldwide. Since 2018, Canada has been focusing on mitigating these negative effects of ghost gear by funding ghost gear retrieval and responsible disposal programs around the country. However, a lack of research on this topic in British Columbia has produced a large knowledge gap, where the province is missing vital baseline information regarding why and where commercial fishing gear is lost. My study aims to address this knowledge gap by investigating why and where commercial fishing gear is lost in the Canadian side of the Salish Sea (CSS), building off previous predictive mapping work and NGO-led workshops. I will be creating predictive hot-spot maps informed by local commercial fishers and statistical models to identify reasons for commercial gear loss relevant to the CSS and highlight potential high-risk areas. This work will not only provide the most robust and descriptive model of ghost gear in the CSS to date, but it will also increase efficiency in locating and retrieving derelict gear, ultimately benefitting both commercial fishery stocks and the marine environment.</span></div></td><td data-dcnode-id="7069"><span data-dcnode-id="7070" instrument_node="">Frenkel, Ms. Caitlin</span></td><td data-dcnode-id="7067"><span data-dcnode-id="7068" instrument_node="">Graduate Student</span></td><td data-dcnode-id="7065"><span data-dcnode-id="7066" instrument_node="">School of Environmental Studies</span></td></tr><tr class="Earth--Oceans Ocean-Networks-Canada E M S Virtual" data-dcnode-id="7050" role="row"><td data-dcnode-id="7062"><span data-dcnode-id="7063" instrument_node="">Earth &amp; Oceans</span></td><td class="more-info" data-dcnode-id="7057"><a data-dcnode-id="7060" href="#"><span data-dcnode-id="7061" instrument_node="">#knowtheocean with Ocean Networks Canada (E M S) ◊</span></a><div class="description" data-dcnode-id="7058" style="display: none;"><span data-dcnode-id="7059" instrument_node="">Life is complicated, but ocean science doesn’t have to be! Dive into the data and Indigenous knowledge that helps us #knowtheocean. Join Lauren from the Ocean Networks Canada's (ONC) Learning and Community Engagement team to explore ONC’s hands-on activities and explore materials that highlight ocean knowledge and stewardship.</span></div></td><td data-dcnode-id="7055"><span data-dcnode-id="7056" instrument_node="">Hudson, Mrs. Lauren</span></td><td data-dcnode-id="7053"><span data-dcnode-id="7054" instrument_node="">K-12 Education Coordinator </span></td><td data-dcnode-id="7051"><span data-dcnode-id="7052" instrument_node="">Ocean Networks Canada</span></td></tr><tr class="Earth--Oceans Ocean-Networks-Canada E M S Virtual altrow" data-dcnode-id="7036" role="row"><td data-dcnode-id="7048"><span data-dcnode-id="7049" instrument_node="">Earth &amp; Oceans</span></td><td class="more-info" data-dcnode-id="7043"><a data-dcnode-id="7046" href="#"><span data-dcnode-id="7047" instrument_node="">Exploring the Big Blue with Remotely Operated Vehicles (E M S) NEW ◊</span></a><div class="description" data-dcnode-id="7044" style="display: none;"><span data-dcnode-id="7045" instrument_node="">Explore Ocean Networks Canada’s hands-on activities and explore materials that highlight ocean knowledge and stewardship.</span></div></td><td data-dcnode-id="7041"><span data-dcnode-id="7042" instrument_node="">Hudson, Mrs. Lauren</span></td><td data-dcnode-id="7039"><span data-dcnode-id="7040" instrument_node="">K-12 Education Coordinator </span></td><td data-dcnode-id="7037"><span data-dcnode-id="7038" instrument_node="">Ocean Networks Canada</span></td></tr><tr class="Earth--Oceans Department-of-Civil-Engineering S Virtual" data-dcnode-id="7022" role="row"><td data-dcnode-id="7034"><span data-dcnode-id="7035" instrument_node="">Earth &amp; Oceans</span></td><td class="more-info" data-dcnode-id="7029"><a data-dcnode-id="7032" href="#"><span data-dcnode-id="7033" instrument_node="">Why is the Soil the Key to having a Healthy Atmosphere in Our Cities?&nbsp;(Jan-April) (S) NEW ◊</span></a><div class="description" data-dcnode-id="7030" style="display: none;"><span data-dcnode-id="7031" instrument_node="">What is the answer to clean air?&nbsp;Harmful pollutants in the atmosphere like volatile organic compounds (VOCs) can mix with nitrous oxide (NOx) gas from traffic and industry to create ozone events that threaten the lives of all species in an area including humans. Explore research about how a focus on the soils in the urban environment could create more climate resilience.&nbsp;</span></div></td><td data-dcnode-id="7027"><span data-dcnode-id="7028" instrument_node="">Daniel, Ms. Anne-Marie</span></td><td data-dcnode-id="7025"><span data-dcnode-id="7026" instrument_node="">Sessional Lecturer</span></td><td data-dcnode-id="7023"><span data-dcnode-id="7024" instrument_node="">Department of Civil Engineering</span></td></tr><tr class="Earth--Oceans Ocean-Networks-Canada E M S Virtual altrow" data-dcnode-id="7008" role="row"><td data-dcnode-id="7020"><span data-dcnode-id="7021" instrument_node="">Earth &amp; Oceans</span></td><td class="more-info" data-dcnode-id="7015"><a data-dcnode-id="7018" href="#"><span data-dcnode-id="7019" instrument_node="">Protecting Mother Ocean (in English or Mandarin) (E M S) ◊</span></a><div class="description" data-dcnode-id="7016" style="display: none;"><span data-dcnode-id="7017" instrument_node="">Marine biodiversity is amazingly diverse and complex. But many marine ecosystems are threatened and need our protection. The UN Sustainable Development Goals aim to protect the planet, end poverty and ensure that all people enjoy peace and prosperity. Goal 14, Life Below Water, strives to sustainably manage and protect marine and coastal ecosystems from pollution, as well as address the impacts of ocean acidification. This talk introduces the goal and how we can all help achieve it.</span></div></td><td data-dcnode-id="7013"><span data-dcnode-id="7014" instrument_node="">Owens, Mr. Dwight</span></td><td data-dcnode-id="7011"><span data-dcnode-id="7012" instrument_node="">User Engagement Officer</span></td><td data-dcnode-id="7009"><span data-dcnode-id="7010" instrument_node="">Ocean Networks Canada</span></td></tr><tr class="Earth--Oceans Ocean-Networks-Canada E M S Virtual" data-dcnode-id="6994" role="row"><td data-dcnode-id="7006"><span data-dcnode-id="7007" instrument_node="">Earth &amp; Oceans</span></td><td class="more-info" data-dcnode-id="7001"><a data-dcnode-id="7004" href="#"><span data-dcnode-id="7005" instrument_node="">Changing Climate, Changing Ocean (in English or Mandarin) (E M S) ◊</span></a><div class="description" data-dcnode-id="7002" style="display: none;"><span data-dcnode-id="7003" instrument_node="">The world’s oceans-their temperature, chemistry, currents and life-make the Earth habitable for humankind. How we manage this vital resource is essential for humanity as a whole. But the global ocean is under stress from warming, acidification and oxygen declines. Why are these changes happening and what impacts can we expect? This talk outlines these three interrelated stressors, examining impacts and actions we can take to counteract them.</span></div></td><td data-dcnode-id="6999"><span data-dcnode-id="7000" instrument_node="">Owens, Mr. Dwight</span></td><td data-dcnode-id="6997"><span data-dcnode-id="6998" instrument_node="">User Engagement Officer</span></td><td data-dcnode-id="6995"><span data-dcnode-id="6996" instrument_node="">Ocean Networks Canada</span></td></tr><tr class="Earth--Oceans Ocean-Networks-Canada E M S Virtual altrow" data-dcnode-id="6980" role="row"><td data-dcnode-id="6992"><span data-dcnode-id="6993" instrument_node="">Earth &amp; Oceans</span></td><td class="more-info" data-dcnode-id="6987"><a data-dcnode-id="6990" href="#"><span data-dcnode-id="6991" instrument_node="">Sour Seas: Ocean Acidification Explained  (in English or Mandarin) (E M S) ◊</span></a><div class="description" data-dcnode-id="6988" style="display: none;"><span data-dcnode-id="6989" instrument_node="">Why are our oceans becoming more acidic? As acidification increases, what impacts can we expect? What can be done to address this dramatic change in the chemistry of our seas? This talk examines these questions and suggests adaptation strategies and individual actions citizens can take to counteract the souring of our seas.</span></div></td><td data-dcnode-id="6985"><span data-dcnode-id="6986" instrument_node="">Owens, Mr. Dwight</span></td><td data-dcnode-id="6983"><span data-dcnode-id="6984" instrument_node="">User Engagement Officer</span></td><td data-dcnode-id="6981"><span data-dcnode-id="6982" instrument_node="">Ocean Networks Canada</span></td></tr><tr class="Earth--Oceans Ocean-Networks-Canada E M S Virtual" data-dcnode-id="6966" role="row"><td data-dcnode-id="6978"><span data-dcnode-id="6979" instrument_node="">Earth &amp; Oceans</span></td><td class="more-info" data-dcnode-id="6973"><a data-dcnode-id="6976" href="#"><span data-dcnode-id="6977" instrument_node="">Sea of Plastic: Trash in our Oceans (in English or Mandarin) (E M S) ◊</span></a><div class="description" data-dcnode-id="6974" style="display: none;"><span data-dcnode-id="6975" instrument_node="">From urban shorelines, to isolated atolls, to the deepest recesses of the abyss, discarded plastics and trash can now be found throughout our oceans. This talk outlines the extent of this problem and explores what can be done to clean up our mess.</span></div></td><td data-dcnode-id="6971"><span data-dcnode-id="6972" instrument_node="">Owens, Mr. Dwight</span></td><td data-dcnode-id="6969"><span data-dcnode-id="6970" instrument_node="">User Engagement Officer</span></td><td data-dcnode-id="6967"><span data-dcnode-id="6968" instrument_node="">Ocean Networks Canada</span></td></tr><tr class="Earth--Oceans Ocean-Networks-Canada E M S Virtual altrow" data-dcnode-id="6952" role="row"><td data-dcnode-id="6964"><span data-dcnode-id="6965" instrument_node="">Earth &amp; Oceans</span></td><td class="more-info" data-dcnode-id="6959"><a data-dcnode-id="6962" href="#"><span data-dcnode-id="6963" instrument_node="">Ocean Science, Ocean Art (in English or Mandarin) (E M S) NEW ◊</span></a><div class="description" data-dcnode-id="6960" style="display: none;"><span data-dcnode-id="6961" instrument_node="">As we embark on the UN Decade of Ocean Science for Sustainable Development, interest in the oceans is on the rise. One of the core UN outcomes is to foster “an inspiring and engaging ocean where society understands and values the ocean in relation to human well-being and sustainable development.” In support of this goal, Ocean Networks Canada has collaborated with several artists, each working in very different media and formats, to produce inspiring works of art. This session will share these works and engage the audience in exploration of art and science for the oceans.</span></div></td><td data-dcnode-id="6957"><span data-dcnode-id="6958" instrument_node="">Owens, Mr. Dwight</span></td><td data-dcnode-id="6955"><span data-dcnode-id="6956" instrument_node="">User Engagement Officer</span></td><td data-dcnode-id="6953"><span data-dcnode-id="6954" instrument_node="">Ocean Networks Canada</span></td></tr><tr class="Earth--Oceans School-of-Earth--Ocean-Sciences M S Virtual" data-dcnode-id="6938" role="row"><td data-dcnode-id="6950"><span data-dcnode-id="6951" instrument_node="">Earth &amp; Oceans</span></td><td class="more-info" data-dcnode-id="6945"><a data-dcnode-id="6948" href="#"><span data-dcnode-id="6949" instrument_node="">Climate Change Impacts on Fish Embryos (M S) ǂ NEW ◊</span></a><div class="description" data-dcnode-id="6946" style="display: none;"><span data-dcnode-id="6947" instrument_node="">My graduate research focuses on looking at how climate change stressors impact fish embryo physiology. Climate change stressors that I have looked at include warming ocean temperatures and ocean acidification. I have specifically looked at how these environmental variables affect fish embryo heart rates and respiration rates. All of the work that I do is conducted in a laboratory setting. To assess heart rates, I video recorded the embryos underneath a camera-mounted microscope and counted their heartbeats over a one-minute period at different temperatures. To measure respiration rates, embryos were placed in sealed wells with oxygen sensors on the bottom of each well to measure how the oxygen content changes over time. To date, I have looked at Arctic cod and Sablefish embryos. Arctic cod are culturally important for coastal Indigenous communities and sablefish are a commercially valuable species here on the Pacific coast.</span></div></td><td data-dcnode-id="6943"><span data-dcnode-id="6944" instrument_node="">Schellenberg, Ms. Chrissy</span></td><td data-dcnode-id="6941"><span data-dcnode-id="6942" instrument_node="">Graduate Student</span></td><td data-dcnode-id="6939"><span data-dcnode-id="6940" instrument_node="">School of Earth &amp; Ocean Sciences</span></td></tr><tr class="Education-in-the-Schools Indigenous-Education E M S Virtual altrow" data-dcnode-id="6924" role="row"><td data-dcnode-id="6936"><span data-dcnode-id="6937" instrument_node="">Education in the Schools</span></td><td class="more-info" data-dcnode-id="6931"><a data-dcnode-id="6934" href="#"><span data-dcnode-id="6935" instrument_node="">Indigenous Arts in the Classroom: A Hands-On Presentation (in English or Spanish) (E M S) ◊</span></a><div class="description" data-dcnode-id="6932" style="display: none;"><span data-dcnode-id="6933" instrument_node="">This is a hands-on presentation using diverse art forms.</span></div></td><td data-dcnode-id="6929"><span data-dcnode-id="6930" instrument_node="">Rodriguez de France, Dr. Carmen</span></td><td data-dcnode-id="6927"><span data-dcnode-id="6928" instrument_node="">Assistant Professor</span></td><td data-dcnode-id="6925"><span data-dcnode-id="6926" instrument_node="">Indigenous Education</span></td></tr><tr class="Education-in-the-Schools Department-of-English S Virtual" data-dcnode-id="6910" role="row"><td data-dcnode-id="6922"><span data-dcnode-id="6923" instrument_node="">Education in the Schools</span></td><td class="more-info" data-dcnode-id="6917"><a data-dcnode-id="6920" href="#"><span data-dcnode-id="6921" instrument_node="">How to Survive and Thrive in First-year University (S) ◊</span></a><div class="description" data-dcnode-id="6918" style="display: none;"><span data-dcnode-id="6919" instrument_node="">What are the top five factors that predict retention at university? What are the top five behaviours that predict success? How can you learn from this research in order to thrive at university (or, if you are a parent, support your adult child to do so)?  </span></div></td><td data-dcnode-id="6915"><span data-dcnode-id="6916" instrument_node="">Surridge, Dr. Lisa</span></td><td data-dcnode-id="6913"><span data-dcnode-id="6914" instrument_node="">Associate Dean and Professor</span></td><td data-dcnode-id="6911"><span data-dcnode-id="6912" instrument_node="">Department of English</span></td></tr><tr class="Education-in-the-Schools Department-of-Curriculum--Instruction S Virtual altrow" data-dcnode-id="6896" role="row"><td data-dcnode-id="6908"><span data-dcnode-id="6909" instrument_node="">Education in the Schools</span></td><td class="more-info" data-dcnode-id="6903"><a data-dcnode-id="6906" href="#"><span data-dcnode-id="6907" instrument_node="">Web of Performance: How Performance Literacy Empowers 21st-Century Youth (S) ◊</span></a><div class="description" data-dcnode-id="6904" style="display: none;"><span data-dcnode-id="6905" instrument_node="">Performance studies offers young people opportunities to develop their performance literacy through the investigation of performance as a form of play, ritual, healing, education, identity, power and everyday life. Based on a recent nationally-funded grant, this talk introduces a new curriculum in performance studies for youth 16-20.</span></div></td><td data-dcnode-id="6901"><span data-dcnode-id="6902" instrument_node="">Prendergast, Dr. Monica</span></td><td data-dcnode-id="6899"><span data-dcnode-id="6900" instrument_node="">Associate Professor</span></td><td data-dcnode-id="6897"><span data-dcnode-id="6898" instrument_node="">Department of Curriculum &amp; Instruction</span></td></tr><tr class="Education-in-the-Schools Department-of-Curriculum--Instruction S Virtual" data-dcnode-id="6882" role="row"><td data-dcnode-id="6894"><span data-dcnode-id="6895" instrument_node="">Education in the Schools</span></td><td class="more-info" data-dcnode-id="6889"><a data-dcnode-id="6892" href="#"><span data-dcnode-id="6893" instrument_node="">Staging the Not-Yet: How Dramatic Ensembles are Enacting Micro-utopian Visions (S) ◊</span></a><div class="description" data-dcnode-id="6890" style="display: none;"><span data-dcnode-id="6891" instrument_node="">Utopian philosophy offers new ways to think about what can happen in a dramatic ensemble. This can be a creative and collaborative space in which young people and their teachers can experience fleeting glimpses of more hopeful ways of being and doing through collective performance creation.</span></div></td><td data-dcnode-id="6887"><span data-dcnode-id="6888" instrument_node="">Prendergast, Dr. Monica</span></td><td data-dcnode-id="6885"><span data-dcnode-id="6886" instrument_node="">Associate Professor</span></td><td data-dcnode-id="6883"><span data-dcnode-id="6884" instrument_node="">Department of Curriculum &amp; Instruction</span></td></tr><tr class="Education-in-the-Schools Department-of-Linguistics Virtual altrow" data-dcnode-id="6868" role="row"><td data-dcnode-id="6880"><span data-dcnode-id="6881" instrument_node="">Education in the Schools</span></td><td class="more-info" data-dcnode-id="6875"><a data-dcnode-id="6878" href="#"><span data-dcnode-id="6879" instrument_node="">Practical Strategies for Supporting English-as-an-Additional-Language&nbsp;Students ◊</span></a><div class="description" data-dcnode-id="6876" style="display: none;"><span data-dcnode-id="6877" instrument_node="">This session will consider pedagogical challenges&nbsp;from the perspective of students of English-as-an-additional-language (EAL). In&nbsp;particular, it will illustrate the salient linguistic features of a chosen&nbsp;source language, in this case Chinese, as an example of the&nbsp;potential&nbsp;communication challenges faced by students in order to help raise&nbsp;attendees’ awareness about students’ own communication preferences.&nbsp;It will then explore practical strategies as informed by&nbsp;teaching, research, and practice for supporting international EAL students&nbsp;with the goal of&nbsp;dispelling commonly held misperceptions that&nbsp;may undermine learning and outcomes.</span></div></td><td data-dcnode-id="6873"><span data-dcnode-id="6874" instrument_node="">Huang, Dr. Li-Shih</span></td><td data-dcnode-id="6871"><span data-dcnode-id="6872" instrument_node="">Associate Professor</span></td><td data-dcnode-id="6869"><span data-dcnode-id="6870" instrument_node="">Department of Linguistics</span></td></tr><tr class="Education-in-the-Schools Libraries-Digital-Scholarship-Commons M S Virtual" data-dcnode-id="6854" role="row"><td data-dcnode-id="6866"><span data-dcnode-id="6867" instrument_node="">Education in the Schools</span></td><td class="more-info" data-dcnode-id="6861"><a data-dcnode-id="6864" href="#"><span data-dcnode-id="6865" instrument_node="">Flipping the Classroom: A Powerful Teaching Tool, But Not a Panacea (M S) ◊</span></a><div class="description" data-dcnode-id="6862" style="display: none;"><span data-dcnode-id="6863" instrument_node="">Adopting a flipped classroom approach can free up valuable in-class time by using videos and exercises that students watch and complete as homework, or “pre-work." This allows teachers to more easily differentiate their instruction and lets students learn at their own pace. This talk includes an overview of the flipped learning model,&nbsp;a demonstration of one approach to flipping a classroom, and discussion of where flipped learning does and doesn’t work well-along with equity issues to keep in mind when implementing.</span></div></td><td data-dcnode-id="6859"><span data-dcnode-id="6860" instrument_node="">McCue, Mr. Rich</span></td><td data-dcnode-id="6857"><span data-dcnode-id="6858" instrument_node="">Manager</span></td><td data-dcnode-id="6855"><span data-dcnode-id="6856" instrument_node="">Libraries, Digital Scholarship Commons</span></td></tr><tr class="Education-in-the-Schools Libraries-Digital-Scholarship-Commons M S Virtual altrow" data-dcnode-id="6840" role="row"><td data-dcnode-id="6852"><span data-dcnode-id="6853" instrument_node="">Education in the Schools</span></td><td class="more-info" data-dcnode-id="6847"><a data-dcnode-id="6850" href="#"><span data-dcnode-id="6851" instrument_node="">Is Educational Technology Worth the Investment? (M S) ◊</span></a><div class="description" data-dcnode-id="6848" style="display: none;"><span data-dcnode-id="6849" instrument_node="">Are new educational technologies more effective in helping students achieve learning objectives than the old technologies they replace? This interactive talk explores the intersection of educational technology and teaching methods, looking at the relative effectiveness of educational technology tools such as: MOOC’s, digital textbooks, clickers, flipped classrooms, streaming video lectures, PowerPoint, mobile learning, Google Drive, virtual labs, and learning management systems (LMS). Participants leave with a better understanding of how to assess the value of educational technology and teaching method pairings.</span></div></td><td data-dcnode-id="6845"><span data-dcnode-id="6846" instrument_node="">McCue, Mr. Rich</span></td><td data-dcnode-id="6843"><span data-dcnode-id="6844" instrument_node="">Manager</span></td><td data-dcnode-id="6841"><span data-dcnode-id="6842" instrument_node="">Libraries, Digital Scholarship Commons</span></td></tr><tr class="Education—General Department-of-French S Virtual" data-dcnode-id="6826" role="row"><td data-dcnode-id="6838"><span data-dcnode-id="6839" instrument_node="">Education—General</span></td><td class="more-info" data-dcnode-id="6833"><a data-dcnode-id="6836" href="#"><span data-dcnode-id="6837" instrument_node="">The Concept of Experience ǂin the Humanities and the Sciences (in English or French) (S) ◊</span></a><div class="description" data-dcnode-id="6834" style="display: none;"><span data-dcnode-id="6835" instrument_node="">This presentation looks at an alternate way of understanding the difference between the humanities and the other sciences.</span></div></td><td data-dcnode-id="6831"><span data-dcnode-id="6832" instrument_node="">Fromet de Rosnay, Dr. Emile</span></td><td data-dcnode-id="6829"><span data-dcnode-id="6830" instrument_node="">Assistant Professor</span></td><td data-dcnode-id="6827"><span data-dcnode-id="6828" instrument_node="">Department of French</span></td></tr><tr class="Education—General Department-of-Music M S Virtual altrow" data-dcnode-id="6812" role="row"><td data-dcnode-id="6824"><span data-dcnode-id="6825" instrument_node="">Education—General</span></td><td class="more-info" data-dcnode-id="6819"><a data-dcnode-id="6822" href="#"><span data-dcnode-id="6823" instrument_node="">Developing Excellence: Tips and Tools for Mastering any Skill at a High Level (in English or French) (M S) ◊</span></a><div class="description" data-dcnode-id="6820" style="display: none;"><span data-dcnode-id="6821" instrument_node="">How do some people develop extraordinary talent in a given area? Why do certain centres seem to produce a high number of successful people in a given area? Explore the foundational concepts that one can transfer to any variety of specific skills, which include understanding how it works, building consistency, and the mental training that is an essential component.</span></div></td><td data-dcnode-id="6817"><span data-dcnode-id="6818" instrument_node="">Klazek, Dr. Merrie</span></td><td data-dcnode-id="6815"><span data-dcnode-id="6816" instrument_node="">Assistant Professor</span></td><td data-dcnode-id="6813"><span data-dcnode-id="6814" instrument_node="">Department of Music</span></td></tr><tr class="Education—General Indigenous-Education E M S Virtual" data-dcnode-id="6798" role="row"><td data-dcnode-id="6810"><span data-dcnode-id="6811" instrument_node="">Education—General</span></td><td class="more-info" data-dcnode-id="6805"><a data-dcnode-id="6808" href="#"><span data-dcnode-id="6809" instrument_node="">Indigenous Ways of Being through Photography (in English or Spanish) (E M S) ◊</span></a><div class="description" data-dcnode-id="6806" style="display: none;"><span data-dcnode-id="6807" instrument_node="">This session offers hands-on “discovery” of Indigenous ways of being through the lens of a camera, paying attention to immediate surroundings such as land, imagery, cultural representations, language, etc.</span></div></td><td data-dcnode-id="6803"><span data-dcnode-id="6804" instrument_node="">Rodriguez de France, Dr. Carmen</span></td><td data-dcnode-id="6801"><span data-dcnode-id="6802" instrument_node="">Assistant Professor</span></td><td data-dcnode-id="6799"><span data-dcnode-id="6800" instrument_node="">Indigenous Education</span></td></tr><tr class="Education—General Indigenous-Education E M S Virtual altrow" data-dcnode-id="6784" role="row"><td data-dcnode-id="6796"><span data-dcnode-id="6797" instrument_node="">Education—General</span></td><td class="more-info" data-dcnode-id="6791"><a data-dcnode-id="6794" href="#"><span data-dcnode-id="6795" instrument_node="">Indigenous Education: What Have We Learned in 50 Years? (in English or Spanish) (E M S) ◊</span></a><div class="description" data-dcnode-id="6792" style="display: none;"><span data-dcnode-id="6793" instrument_node="">Explore the history of Indigenous education in BC through policy and curriculum.</span></div></td><td data-dcnode-id="6789"><span data-dcnode-id="6790" instrument_node="">Rodriguez de France, Dr. Carmen</span></td><td data-dcnode-id="6787"><span data-dcnode-id="6788" instrument_node="">Assistant Professor</span></td><td data-dcnode-id="6785"><span data-dcnode-id="6786" instrument_node="">Indigenous Education</span></td></tr><tr class="Education—General Indigenous-Education E M S Virtual" data-dcnode-id="6770" role="row"><td data-dcnode-id="6782"><span data-dcnode-id="6783" instrument_node="">Education—General</span></td><td class="more-info" data-dcnode-id="6777"><a data-dcnode-id="6780" href="#"><span data-dcnode-id="6781" instrument_node="">Once Upon a Time: Indigenous Ways of Knowing and Being through Story (in English or Spanish) (E M S) ◊</span></a><div class="description" data-dcnode-id="6778" style="display: none;"><span data-dcnode-id="6779" instrument_node="">The presentation entails looking at stories through&nbsp;diverse media to explore Indigenous worldview.</span></div></td><td data-dcnode-id="6775"><span data-dcnode-id="6776" instrument_node="">Rodriguez de France, Dr. Carmen</span></td><td data-dcnode-id="6773"><span data-dcnode-id="6774" instrument_node="">Assistant Professor</span></td><td data-dcnode-id="6771"><span data-dcnode-id="6772" instrument_node="">Indigenous Education</span></td></tr><tr class="Education—General History--Gender-Studies M S Virtual altrow" data-dcnode-id="6757" role="row"><td data-dcnode-id="6768"><span data-dcnode-id="6769" instrument_node="">Education—General</span></td><td class="more-info" data-dcnode-id="6764"><a data-dcnode-id="6766" href="#"><span data-dcnode-id="6767" instrument_node="">Children and Youth in Activism-When did Children Become Students? (M S) NEW ◊</span></a><div class="description" data-dcnode-id="6765" style="display: none;"></div></td><td data-dcnode-id="6762"><span data-dcnode-id="6763" instrument_node="">Sitara, Dr. Georgia</span></td><td data-dcnode-id="6760"><span data-dcnode-id="6761" instrument_node="">Assistant Teaching Professor</span></td><td data-dcnode-id="6758"><span data-dcnode-id="6759" instrument_node="">History &amp; Gender Studies</span></td></tr><tr class="Education—General Electronic-Textual-Cultures-Lab- Virtual" data-dcnode-id="6743" role="row"><td data-dcnode-id="6755"><span data-dcnode-id="6756" instrument_node="">Education—General</span></td><td class="more-info" data-dcnode-id="6750"><a data-dcnode-id="6753" href="#"><span data-dcnode-id="6754" instrument_node="">Opening Up Access to Research ◊</span></a><div class="description" data-dcnode-id="6751" style="display: none;"><span data-dcnode-id="6752" instrument_node="">Today, a substantial amount of publicly funded academic research is locked behind paywalls. The academic publishing system is surprisingly lucrative for commercial publishers, who report profit margins of 30 to 40 per cent. I provide an overview of academic publishing and introduce the Open Access movement, an international effort toward making research open and free for everyone. </span></div></td><td data-dcnode-id="6748"><span data-dcnode-id="6749" instrument_node="">Arbuckle, Ms. Alyssa</span></td><td data-dcnode-id="6746"><span data-dcnode-id="6747" instrument_node="">Associate Director</span></td><td data-dcnode-id="6744"><span data-dcnode-id="6745" instrument_node="">Electronic Textual Cultures Lab </span></td></tr><tr class="Education—General Department-of-Curriculum--Instruction E M S Virtual altrow" data-dcnode-id="6729" role="row"><td data-dcnode-id="6741"><span data-dcnode-id="6742" instrument_node="">Education—General</span></td><td class="more-info" data-dcnode-id="6736"><a data-dcnode-id="6739" href="#"><span data-dcnode-id="6740" instrument_node="">Education and the Revolution: Climate Change and the Curriculum of Life (E M S) ◊</span></a><div class="description" data-dcnode-id="6737" style="display: none;"><span data-dcnode-id="6738" instrument_node="">An exploration of the promise and&nbsp;possibilities for an&nbsp;education grounded in a curriculum of life and love of life and all life forms&nbsp;to meet the existential challenges&nbsp;of climate change, pandemic, and nuclear proliferation.&nbsp;</span></div></td><td data-dcnode-id="6734"><span data-dcnode-id="6735" instrument_node="">Price, Dr. Jason M.C.</span></td><td data-dcnode-id="6732"><span data-dcnode-id="6733" instrument_node="">Associate Professor</span></td><td data-dcnode-id="6730"><span data-dcnode-id="6731" instrument_node="">Department of Curriculum &amp; Instruction</span></td></tr><tr class="Education—General Department-of-Curriculum--Instruction E M S Virtual" data-dcnode-id="6716" role="row"><td data-dcnode-id="6727"><span data-dcnode-id="6728" instrument_node="">Education—General</span></td><td class="more-info" data-dcnode-id="6723"><a data-dcnode-id="6725" href="#"><span data-dcnode-id="6726" instrument_node="">Education for Social Justice and Reconstruction (E M S) ◊</span></a><div class="description" data-dcnode-id="6724" style="display: none;"></div></td><td data-dcnode-id="6721"><span data-dcnode-id="6722" instrument_node="">Price, Dr. Jason M.C.</span></td><td data-dcnode-id="6719"><span data-dcnode-id="6720" instrument_node="">Associate Professor</span></td><td data-dcnode-id="6717"><span data-dcnode-id="6718" instrument_node="">Department of Curriculum &amp; Instruction</span></td></tr><tr class="Education—General Department-of-Curriculum--Instruction E M S Virtual altrow" data-dcnode-id="6703" role="row"><td data-dcnode-id="6714"><span data-dcnode-id="6715" instrument_node="">Education—General</span></td><td class="more-info" data-dcnode-id="6710"><a data-dcnode-id="6712" href="#"><span data-dcnode-id="6713" instrument_node="">Boards of Education: Governance and Vision in BC Education (E M S) ◊</span></a><div class="description" data-dcnode-id="6711" style="display: none;"></div></td><td data-dcnode-id="6708"><span data-dcnode-id="6709" instrument_node="">Price, Dr. Jason M.C.</span></td><td data-dcnode-id="6706"><span data-dcnode-id="6707" instrument_node="">Associate Professor</span></td><td data-dcnode-id="6704"><span data-dcnode-id="6705" instrument_node="">Department of Curriculum &amp; Instruction</span></td></tr><tr class="Education—General Department-of-Linguistics Virtual" data-dcnode-id="6689" role="row"><td data-dcnode-id="6701"><span data-dcnode-id="6702" instrument_node="">Education—General</span></td><td class="more-info" data-dcnode-id="6696"><a data-dcnode-id="6699" href="#"><span data-dcnode-id="6700" instrument_node="">Breaking Down Barriers: Students’ Use of their Own Language ◊</span></a><div class="description" data-dcnode-id="6697" style="display: none;"><span data-dcnode-id="6698" instrument_node="">There’s a growing recognition of the role played by learners’ first languages/own-languages in learning an additional language. This session draws on insights from recent literature and the presenter’s own scholarly and professional work on learners’ use of their own languages to give instructors practical suggestions on how to incorporate them into teaching.</span></div></td><td data-dcnode-id="6694"><span data-dcnode-id="6695" instrument_node="">Huang, Dr. Li-Shih</span></td><td data-dcnode-id="6692"><span data-dcnode-id="6693" instrument_node="">Associate Professor</span></td><td data-dcnode-id="6690"><span data-dcnode-id="6691" instrument_node="">Department of Linguistics</span></td></tr><tr class="Education—General Department-of-Linguistics Virtual altrow" data-dcnode-id="6675" role="row"><td data-dcnode-id="6687"><span data-dcnode-id="6688" instrument_node="">Education—General</span></td><td class="more-info" data-dcnode-id="6682"><a data-dcnode-id="6685" href="#"><span data-dcnode-id="6686" instrument_node="">Building Teachers' Research Toolkit and Implementing Practitioner Research ◊</span></a><div class="description" data-dcnode-id="6683" style="display: none;"><span data-dcnode-id="6684" instrument_node="">This interactive workshop is designed to address the concerns of educators who have contemplated engaging in practitioner research to&nbsp;inform their practices. This workshop&nbsp;describes what practitioner research is, and discusses how to problem-solve challenges commonly encountered in the practitioner-research process. Bring your practitioner&nbsp;research questions and ideas with you! This workshop will help you make informed decisions and get you excited about embarking on your own practitioner-research&nbsp;journey.</span></div></td><td data-dcnode-id="6680"><span data-dcnode-id="6681" instrument_node="">Huang, Dr. Li-Shih</span></td><td data-dcnode-id="6678"><span data-dcnode-id="6679" instrument_node="">Associate Professor</span></td><td data-dcnode-id="6676"><span data-dcnode-id="6677" instrument_node="">Department of Linguistics</span></td></tr><tr class="Education—General Department-of-Linguistics Virtual" data-dcnode-id="6661" role="row"><td data-dcnode-id="6673"><span data-dcnode-id="6674" instrument_node="">Education—General</span></td><td class="more-info" data-dcnode-id="6668"><a data-dcnode-id="6671" href="#"><span data-dcnode-id="6672" instrument_node="">The Power of Reflection: Field-tested Tips on Implementing Critical Learner Reflection ◊</span></a><div class="description" data-dcnode-id="6669" style="display: none;"><span data-dcnode-id="6670" instrument_node="">At one point or another in our learning journeys, we have probably all been asked to reflect on our learning experiences. As a teaching professional, you may also have asked your&nbsp;students to engage in reflection. Although educators across disciplines have long recognized its importance and applicability across a wide variety of educational settings, reflection&nbsp;remains a challenging concept for educators across disciplines to firmly grasp in practice. In this session, the presenter will explore (a)&nbsp;what learner reflection entails, (b) why learner reflection is critically important, according to up-to-date theory and research, and (c) how to implement reflection in ways that will&nbsp;help learners reap its benefits.</span></div></td><td data-dcnode-id="6666"><span data-dcnode-id="6667" instrument_node="">Huang, Dr. Li-Shih</span></td><td data-dcnode-id="6664"><span data-dcnode-id="6665" instrument_node="">Associate Professor</span></td><td data-dcnode-id="6662"><span data-dcnode-id="6663" instrument_node="">Department of Linguistics</span></td></tr><tr class="Education—General Division-of-Learning-and-Teaching-Support-and-Innovation M S Virtual altrow" data-dcnode-id="6648" role="row"><td data-dcnode-id="6659"><span data-dcnode-id="6660" instrument_node="">Education—General</span></td><td class="more-info" data-dcnode-id="6655"><a data-dcnode-id="6657" href="#"><span data-dcnode-id="6658" instrument_node="">Reflective Practice in Experiential Learning(in English or Spanish) (M S) NEW ◊</span></a><div class="description" data-dcnode-id="6656" style="display: none;"></div></td><td data-dcnode-id="6653"><span data-dcnode-id="6654" instrument_node="">Nagel, Mrs. Rhianna</span></td><td data-dcnode-id="6651"><span data-dcnode-id="6652" instrument_node="">Community Engaged Learning Coordinator</span></td><td data-dcnode-id="6649"><span data-dcnode-id="6650" instrument_node="">Division of Learning and Teaching Support and Innovation</span></td></tr><tr class="Education—General Division-of-Learning-and-Teaching-Support-and-Innovation M S Virtual" data-dcnode-id="6635" role="row"><td data-dcnode-id="6646"><span data-dcnode-id="6647" instrument_node="">Education—General</span></td><td class="more-info" data-dcnode-id="6642"><a data-dcnode-id="6644" href="#"><span data-dcnode-id="6645" instrument_node="">Laddering Experiential Learning (in English or Spanish) (M S) NEW ◊</span></a><div class="description" data-dcnode-id="6643" style="display: none;"></div></td><td data-dcnode-id="6640"><span data-dcnode-id="6641" instrument_node="">Nagel, Mrs. Rhianna</span></td><td data-dcnode-id="6638"><span data-dcnode-id="6639" instrument_node="">Community Engaged Learning Coordinator</span></td><td data-dcnode-id="6636"><span data-dcnode-id="6637" instrument_node="">Division of Learning and Teaching Support and Innovation</span></td></tr><tr class="Education—General Division-of-Learning-and-Teaching-Support-and-Innovation M S Virtual altrow" data-dcnode-id="6622" role="row"><td data-dcnode-id="6633"><span data-dcnode-id="6634" instrument_node="">Education—General</span></td><td class="more-info" data-dcnode-id="6629"><a data-dcnode-id="6631" href="#"><span data-dcnode-id="6632" instrument_node="">Connecting Learning and Civic Engagement through Community-engaged Learning (in English or Spanish) (M S) NEW ◊</span></a><div class="description" data-dcnode-id="6630" style="display: none;"></div></td><td data-dcnode-id="6627"><span data-dcnode-id="6628" instrument_node="">Nagel, Mrs. Rhianna</span></td><td data-dcnode-id="6625"><span data-dcnode-id="6626" instrument_node="">Community Engaged Learning Coordinator</span></td><td data-dcnode-id="6623"><span data-dcnode-id="6624" instrument_node="">Division of Learning and Teaching Support and Innovation</span></td></tr><tr class="Education—General Faculty-of-Law S Virtual" data-dcnode-id="6608" role="row"><td data-dcnode-id="6620"><span data-dcnode-id="6621" instrument_node="">Education—General</span></td><td class="more-info" data-dcnode-id="6615"><a data-dcnode-id="6618" href="#"><span data-dcnode-id="6619" instrument_node="">The Power of Education ǂ (S) NEW ◊</span></a><div class="description" data-dcnode-id="6616" style="display: none;"><span data-dcnode-id="6617" instrument_node="">This talk focuses on the positive implications of education, with the hope of encouraging students to reach their full academic potential. We will explore how to choose a career. The talk also serves as a one-hour mentorship to students.&nbsp;</span></div></td><td data-dcnode-id="6613"><span data-dcnode-id="6614" instrument_node="">Okibe, Ms. Summer S.</span></td><td data-dcnode-id="6611"><span data-dcnode-id="6612" instrument_node="">Graduate Student</span></td><td data-dcnode-id="6609"><span data-dcnode-id="6610" instrument_node="">Faculty of Law</span></td></tr><tr class="Education—General School-of-Public-Administration S Virtual altrow" data-dcnode-id="6594" role="row"><td data-dcnode-id="6606"><span data-dcnode-id="6607" instrument_node="">Education—General</span></td><td class="more-info" data-dcnode-id="6601"><a data-dcnode-id="6604" href="#"><span data-dcnode-id="6605" instrument_node="">Community-University Engagement (S) ◊</span></a><div class="description" data-dcnode-id="6602" style="display: none;"><span data-dcnode-id="6603" instrument_node="">Budd Hall is a Professor Emeritus at UVic who has had a career in adult education, community-development and participatory research. He is the Co-Chair of the UNESCO Chair in Community-Based Research and Social Responsibility in Higher Education. His current focus is on training young people for doing locally based participatory research and supporting the strengthening of community-university research partnerships. He is also a poet and part of the Victoria Social Movement Poets Collective.</span></div></td><td data-dcnode-id="6599"><span data-dcnode-id="6600" instrument_node="">Hall, Prof. Budd</span></td><td data-dcnode-id="6597"><span data-dcnode-id="6598" instrument_node="">Professor Emeritus </span></td><td data-dcnode-id="6595"><span data-dcnode-id="6596" instrument_node="">School of Public Administration</span></td></tr><tr class="Education—General Graduate-Programs--Research S Virtual" data-dcnode-id="6580" role="row"><td data-dcnode-id="6592"><span data-dcnode-id="6593" instrument_node="">Education—General</span></td><td class="more-info" data-dcnode-id="6587"><a data-dcnode-id="6590" href="#"><span data-dcnode-id="6591" instrument_node="">Leaders as Indigenous Allies: Working for Positive Change in Schools (S) ◊ </span></a><div class="description" data-dcnode-id="6588" style="display: none;"><span data-dcnode-id="6589" instrument_node="">Allyship is a critical leadership tool that non-Aboriginal leaders can use in their work with Indigenous communities to support the creation of inclusive learning spaces. The Aboriginal Enhancement Schools Network (AESN) was founded five years ago and has built a network of teachers and teacher-leaders who put Aboriginal student success at the centre of their work. This presentation draws from a recently completed study of this network, showcasing key strategies for successful inclusion that make a difference for all learners.</span></div></td><td data-dcnode-id="6585"><span data-dcnode-id="6586" instrument_node="">McGregor, Dr. Catherine</span></td><td data-dcnode-id="6583"><span data-dcnode-id="6584" instrument_node="">Associate Dean</span></td><td data-dcnode-id="6581"><span data-dcnode-id="6582" instrument_node="">Graduate Programs &amp; Research</span></td></tr><tr class="Education—General Graduate-Programs--Research S Virtual altrow" data-dcnode-id="6566" role="row"><td data-dcnode-id="6578"><span data-dcnode-id="6579" instrument_node="">Education—General</span></td><td class="more-info" data-dcnode-id="6573"><a data-dcnode-id="6576" href="#"><span data-dcnode-id="6577" instrument_node="">Supporting Indigenous Learner Transitions: School and Program Strategies for Success (S) ◊ </span></a><div class="description" data-dcnode-id="6574" style="display: none;"><span data-dcnode-id="6575" instrument_node="">In this talk, Dr. Catherine McGregor will share the findings of her three year study of 10 Aboriginal Enhancement School Network (AESN) school teams involved in developing strategies to support their Indigenous learners at transition points in their school experience. Principles of effective inquiry practice and strategies for addressing the range and scope of Indigenous learners needs will be explored. Implications for school leaders will also be canvassed. </span></div></td><td data-dcnode-id="6571"><span data-dcnode-id="6572" instrument_node="">McGregor, Dr. Catherine</span></td><td data-dcnode-id="6569"><span data-dcnode-id="6570" instrument_node="">Associate Dean</span></td><td data-dcnode-id="6567"><span data-dcnode-id="6568" instrument_node="">Graduate Programs &amp; Research</span></td></tr><tr class="Education—General Department-of-Linguistics S Virtual" data-dcnode-id="6552" role="row"><td data-dcnode-id="6564"><span data-dcnode-id="6565" instrument_node="">Education—General</span></td><td class="more-info" data-dcnode-id="6559"><a data-dcnode-id="6562" href="#"><span data-dcnode-id="6563" instrument_node="">Poking and Prying with a Purpose: How High School Students can Prepare for University-level Research (S) NEW ◊</span></a><div class="description" data-dcnode-id="6560" style="display: none;"><span data-dcnode-id="6561" instrument_node="">This talk, by an Associate Dean in Humanities, is aimed at high school students who are thinking about going to college or university. The primary themes are exploration, risk, courage, and curiosity and how they help prepare students for the exciting world of university research. Students will get an inside view of research and learn about cutting-edge projects that dive into the very essence of being human. </span></div></td><td data-dcnode-id="6557"><span data-dcnode-id="6558" instrument_node="">D’Arcy, Dr. Alexandra</span></td><td data-dcnode-id="6555"><span data-dcnode-id="6556" instrument_node="">Professor &amp; Associate Dean Research</span></td><td data-dcnode-id="6553"><span data-dcnode-id="6554" instrument_node="">Department of Linguistics</span></td></tr><tr class="Education—General Peter-B-Gustavson-School-of-Business S Virtual altrow" data-dcnode-id="6538" role="row"><td data-dcnode-id="6550"><span data-dcnode-id="6551" instrument_node="">Education—General</span></td><td class="more-info" data-dcnode-id="6545"><a data-dcnode-id="6548" href="#"><span data-dcnode-id="6549" instrument_node="">Emotional Intelligence and Academic Success (S) ◊</span></a><div class="description" data-dcnode-id="6546" style="display: none;"><span data-dcnode-id="6547" instrument_node="">This presentation is designed for students (high school/university) to gain a greater understanding of EQ and how it impacts their social and academic lives.   </span></div></td><td data-dcnode-id="6543"><span data-dcnode-id="6544" instrument_node="">Leacock, Prof. Brian</span></td><td data-dcnode-id="6541"><span data-dcnode-id="6542" instrument_node="">Associate Director, International Programs</span></td><td data-dcnode-id="6539"><span data-dcnode-id="6540" instrument_node="">Peter B. Gustavson School of Business</span></td></tr><tr class="Environment--Sustainability School-of-Public-Administration S Virtual" data-dcnode-id="6524" role="row"><td data-dcnode-id="6536"><span data-dcnode-id="6537" instrument_node="">Environment &amp; Sustainability</span></td><td class="more-info" data-dcnode-id="6531"><a data-dcnode-id="6534" href="#"><span data-dcnode-id="6535" instrument_node="">Sustainable Livelihoods: Local Practices in Agriculture (in English or Hindi) (S) NEW ◊</span></a><div class="description" data-dcnode-id="6532" style="display: none;"><span data-dcnode-id="6533" instrument_node="">Dr. Rajesh Tandon is founder-president of PRIA, a global research and training centre of participatory research, based in India. He shares the UNESCO Chair on Social Responsibility of Higher Education with Dr. Budd Hall. His practice of community-based research is a methodology for empowerment and inclusion of community voices and choices.</span></div></td><td data-dcnode-id="6529"><span data-dcnode-id="6530" instrument_node="">Tandon, Dr. Rajesh</span></td><td data-dcnode-id="6527"><span data-dcnode-id="6528" instrument_node="">Adjunct Assistant Professor</span></td><td data-dcnode-id="6525"><span data-dcnode-id="6526" instrument_node="">School of Public Administration</span></td></tr><tr class="Environment--Sustainability Department-of-Civil-Engineering M S Virtual altrow" data-dcnode-id="6510" role="row"><td data-dcnode-id="6522"><span data-dcnode-id="6523" instrument_node="">Environment &amp; Sustainability</span></td><td class="more-info" data-dcnode-id="6517"><a data-dcnode-id="6520" href="#"><span data-dcnode-id="6521" instrument_node="">Green Water Monitoring through Real-time Analysis: Reducing Lifecycle Impacts, Empowering Community Decision-making (M S) ◊</span></a><div class="description" data-dcnode-id="6518" style="display: none;"><span data-dcnode-id="6519" instrument_node="">Detection of trace contaminants in drinking water in real-time and at low costs has profound socioeconomic and environmental implications. Typical water monitoring in low-resource contexts and in remote communities involves intermittent sampling, resource-intensive sample transportation, and expensive analysis in centralized facilities. The results of this process are huge barriers to reporting analytical data to affected communities in a timely manner, which in turn precludes these communities from taking action to protect their health and environment. This can lead either to lack of water treatment and poor health outcomes in already vulnerable populations, or in overtreatment or inappropriate treatment that results in unnecessary discharge of disinfection byproducts, salts, or other contaminants into watersheds. Current field-testing methods for fluoride, arsenic, etc. are complex to use, have limited accuracy, and often generate hazardous waste. Our research develops low-cost sensors for trace inorganic contaminants in drinking water, with the goal of providing real-time feedback on water safety for low-resource communities and empowering decision making that improves human and environmental health by informing choice of appropriate drinking water treatment strategies with the minimum necessary impact.</span></div></td><td data-dcnode-id="6515"><span data-dcnode-id="6516" instrument_node="">Buckley, Dr. Heather</span></td><td data-dcnode-id="6513"><span data-dcnode-id="6514" instrument_node="">Assistant Professor</span></td><td data-dcnode-id="6511"><span data-dcnode-id="6512" instrument_node="">Department of Civil Engineering</span></td></tr><tr class="Environment--Sustainability Department-of-Civil-Engineering M S Virtual" data-dcnode-id="6496" role="row"><td data-dcnode-id="6508"><span data-dcnode-id="6509" instrument_node="">Environment &amp; Sustainability</span></td><td class="more-info" data-dcnode-id="6503"><a data-dcnode-id="6506" href="#"><span data-dcnode-id="6507" instrument_node="">What's in My Water? (M S) ◊</span></a><div class="description" data-dcnode-id="6504" style="display: none;"><span data-dcnode-id="6505" instrument_node="">In Victoria, we are lucky to be able turn on a tap and know that safe drinking water will come out. Prof. Heather Buckley talks about how we "zoom in" to see what is in our water, and projects at UVic designing new sensors for hard-to-spot molecules, helping people around the globe monitor and protect their drinking water.</span></div></td><td data-dcnode-id="6501"><span data-dcnode-id="6502" instrument_node="">Buckley, Dr. Heather</span></td><td data-dcnode-id="6499"><span data-dcnode-id="6500" instrument_node="">Assistant Professor</span></td><td data-dcnode-id="6497"><span data-dcnode-id="6498" instrument_node="">Department of Civil Engineering</span></td></tr><tr class="Environment--Sustainability Department-of-Civil-Engineering M S Virtual altrow" data-dcnode-id="6482" role="row"><td data-dcnode-id="6494"><span data-dcnode-id="6495" instrument_node="">Environment &amp; Sustainability</span></td><td class="more-info" data-dcnode-id="6489"><a data-dcnode-id="6492" href="#"><span data-dcnode-id="6493" instrument_node="">Green Materials for Safe, Affordable Drinking Water (M S) ◊</span></a><div class="description" data-dcnode-id="6490" style="display: none;"><span data-dcnode-id="6491" instrument_node="">The design of safer, better materials and systems for drinking water requires that we consider human health and environmental impacts as performance criteria from the outset. The impacts of chemistry-based design choices are particularly striking when considering impacts on drinking water. From upstream chemical use in waterproofing and product preservation, to chemicals intentionally added in water treatment, greater intentionality is needed to provide clean, safe drinking water to communities, and to empower these communities to measure the safety of their own water and make informed decisions. This approach is beyond what can be accomplished by a single chemist or engineer, and requires engagement of researchers and community leaders across a range of disciplines including public health, green chemistry, toxicology, microbiology, process design, and civil and environmental engineering. This talk will highlight the role of green chemistry in a scalable process for developing greener solutions to important global challenges in drinking water and beyond.</span></div></td><td data-dcnode-id="6487"><span data-dcnode-id="6488" instrument_node="">Buckley, Dr. Heather</span></td><td data-dcnode-id="6485"><span data-dcnode-id="6486" instrument_node="">Assistant Professor</span></td><td data-dcnode-id="6483"><span data-dcnode-id="6484" instrument_node="">Department of Civil Engineering</span></td></tr><tr class="Environment--Sustainability Department-of-Geography E M S Virtual" data-dcnode-id="6468" role="row"><td data-dcnode-id="6480"><span data-dcnode-id="6481" instrument_node="">Environment &amp; Sustainability</span></td><td class="more-info" data-dcnode-id="6475"><a data-dcnode-id="6478" href="#"><span data-dcnode-id="6479" instrument_node="">Sustainability of Chocolate: Where Does My Chocolate Come from and Why Does it Matter? (in English or French) (E M S) ◊</span></a><div class="description" data-dcnode-id="6476" style="display: none;"><span data-dcnode-id="6477" instrument_node="">The cocoa bean, the primary ingredient in chocolate, is grown in tropical ecosystems in the Global South, while chocolate is consumed predominantly in industrialized economies in the Global North. Due to cocoa’s disparate geographies of production and consumption, any forest loss (and associated social and environmental impacts) occurs far from the immediate purview of consumers. Despite growing media attention about these issues, the average chocolate consumer remains in the dark about the exact social and environmental impacts of their purchases. The chocolate industry is addressing these issues at this very moment, and this presentation will explain the challenges and opportunities in doing so. </span></div></td><td data-dcnode-id="6473"><span data-dcnode-id="6474" instrument_node="">Carodenuto, Dr. Sophia</span></td><td data-dcnode-id="6471"><span data-dcnode-id="6472" instrument_node="">Assistant Professor</span></td><td data-dcnode-id="6469"><span data-dcnode-id="6470" instrument_node="">Department of Geography</span></td></tr><tr class="Environment--Sustainability Department-of-Civil-Engineering S Virtual altrow" data-dcnode-id="6454" role="row"><td data-dcnode-id="6466"><span data-dcnode-id="6467" instrument_node="">Environment &amp; Sustainability</span></td><td class="more-info" data-dcnode-id="6461"><a data-dcnode-id="6464" href="#"><span data-dcnode-id="6465" instrument_node="">Expected and Actual Performance of Green Buildings: Lessons Learned (S) ◊</span></a><div class="description" data-dcnode-id="6462" style="display: none;"><span data-dcnode-id="6463" instrument_node="">This presentation will introduce the concept of Green and Sustainable Buildings, and results from an investigation which critically analyzed the designed and actual performance of Green Buildings in British Columbia (Victoria and Vancouver).</span></div></td><td data-dcnode-id="6459"><span data-dcnode-id="6460" instrument_node="">Mukhopadhyaya, Dr. Phalguni </span></td><td data-dcnode-id="6457"><span data-dcnode-id="6458" instrument_node="">Associate Professor</span></td><td data-dcnode-id="6455"><span data-dcnode-id="6456" instrument_node="">Department of Civil Engineering</span></td></tr><tr class="Environment--Sustainability Department-of-Civil-Engineering S Virtual" data-dcnode-id="6440" role="row"><td data-dcnode-id="6452"><span data-dcnode-id="6453" instrument_node="">Environment &amp; Sustainability</span></td><td class="more-info" data-dcnode-id="6447"><a data-dcnode-id="6450" href="#"><span data-dcnode-id="6451" instrument_node="">How Resource Consumption is Related to Our Happiness (S) ◊</span></a><div class="description" data-dcnode-id="6448" style="display: none;"><span data-dcnode-id="6449" instrument_node="">This presentation will explore the relationship between resource consumption, economic growth and personal happiness. </span></div></td><td data-dcnode-id="6445"><span data-dcnode-id="6446" instrument_node="">Mukhopadhyaya, Dr. Phalguni </span></td><td data-dcnode-id="6443"><span data-dcnode-id="6444" instrument_node="">Associate Professor</span></td><td data-dcnode-id="6441"><span data-dcnode-id="6442" instrument_node="">Department of Civil Engineering</span></td></tr><tr class="Environment--Sustainability Department-of-Political-Science M S Virtual altrow" data-dcnode-id="6426" role="row"><td data-dcnode-id="6438"><span data-dcnode-id="6439" instrument_node="">Environment &amp; Sustainability</span></td><td class="more-info" data-dcnode-id="6433"><a data-dcnode-id="6436" href="#"><span data-dcnode-id="6437" instrument_node="">Sweatshops, Workers and the Environment: Problems with Fast Fashion (M S) NEW ◊ </span></a><div class="description" data-dcnode-id="6434" style="display: none;"><span data-dcnode-id="6435" instrument_node="">My work explores the politics of the contemporary clothing industry to investigate the complexities of one of the largest and most global industries. I trace both historic and contemporary exploitation in the industry with an emphasis on sweatshops, and how work, production and consumption have been increasingly driven by large retailers and buyers. Depending on the presentation, I examine the environmental and workplace problems associated with the industry. </span></div></td><td data-dcnode-id="6431"><span data-dcnode-id="6432" instrument_node="">Clarke, Dr. Marlea</span></td><td data-dcnode-id="6429"><span data-dcnode-id="6430" instrument_node="">Associate Professor</span></td><td data-dcnode-id="6427"><span data-dcnode-id="6428" instrument_node="">Department of Political Science</span></td></tr><tr class="Environment--Sustainability Department-of-Political-Science M S Virtual" data-dcnode-id="6412" role="row"><td data-dcnode-id="6424"><span data-dcnode-id="6425" instrument_node="">Environment &amp; Sustainability</span></td><td class="more-info" data-dcnode-id="6419"><a data-dcnode-id="6422" href="#"><span data-dcnode-id="6423" instrument_node="">Chocolate, Cotton, Coffee and Computers: is Ethical Consumption Possible? (M S) NEW ◊ </span></a><div class="description" data-dcnode-id="6420" style="display: none;"><span data-dcnode-id="6421" instrument_node="">What are the ethical challenges linked to coffee, chocolate and computer consumption? Topics include: workers’ rights and resistance, regulation of supply chains, trade agreements, retailers, ethical consumption, economic benefits for global south countries, and environmental impacts of production.</span></div></td><td data-dcnode-id="6417"><span data-dcnode-id="6418" instrument_node="">Clarke, Dr. Marlea</span></td><td data-dcnode-id="6415"><span data-dcnode-id="6416" instrument_node="">Associate Professor</span></td><td data-dcnode-id="6413"><span data-dcnode-id="6414" instrument_node="">Department of Political Science</span></td></tr><tr class="Environment--Sustainability Department-of-History M S Virtual altrow" data-dcnode-id="6398" role="row"><td data-dcnode-id="6410"><span data-dcnode-id="6411" instrument_node="">Environment &amp; Sustainability</span></td><td class="more-info" data-dcnode-id="6405"><a data-dcnode-id="6408" href="#"><span data-dcnode-id="6409" instrument_node="">Four Stories About Food (M S) ◊</span></a><div class="description" data-dcnode-id="6406" style="display: none;"><span data-dcnode-id="6407" instrument_node="">This highly illustrated presentation explores community initiatives for food security in four challenging contexts: Indigenous Canada, Indigenous Colombia, refugee communities in Jordan, and urban and rural South Africa. </span></div></td><td data-dcnode-id="6403"><span data-dcnode-id="6404" instrument_node="">Vibert, Dr. Elizabeth</span></td><td data-dcnode-id="6401"><span data-dcnode-id="6402" instrument_node="">Associate Professor</span></td><td data-dcnode-id="6399"><span data-dcnode-id="6400" instrument_node="">Department of History</span></td></tr><tr class="Environment--Sustainability Department-of-History M S Virtual" data-dcnode-id="6384" role="row"><td data-dcnode-id="6396"><span data-dcnode-id="6397" instrument_node="">Environment &amp; Sustainability</span></td><td class="more-info" data-dcnode-id="6391"><a data-dcnode-id="6394" href="#"><span data-dcnode-id="6395" instrument_node="">Climate Change, Food Insecurity, and Farmers’ Action in the Global South (M S) NEW ◊</span></a><div class="description" data-dcnode-id="6392" style="display: none;"><span data-dcnode-id="6393" instrument_node="">This highly illustrated presentation looks at the broad consequences of climate change for food systems, and the ways farmers and communities in the Global South- particularly Southern Africa-are adapting and responding to challenges they did not create.</span></div></td><td data-dcnode-id="6389"><span data-dcnode-id="6390" instrument_node="">Vibert, Dr. Elizabeth</span></td><td data-dcnode-id="6387"><span data-dcnode-id="6388" instrument_node="">Associate Professor</span></td><td data-dcnode-id="6385"><span data-dcnode-id="6386" instrument_node="">Department of History</span></td></tr><tr class="Environment--Sustainability Centre-for-Global-Studies-POLIS-Water-Sustainability-Project- Virtual altrow" data-dcnode-id="6370" role="row"><td data-dcnode-id="6382"><span data-dcnode-id="6383" instrument_node="">Environment &amp; Sustainability</span></td><td class="more-info" data-dcnode-id="6377"><a data-dcnode-id="6380" href="#"><span data-dcnode-id="6381" instrument_node="">Toward Shared Authority and&nbsp;Co-governance for BC’s Water ◊ </span></a><div class="description" data-dcnode-id="6378" style="display: none;"><span data-dcnode-id="6379" instrument_node="">Co-governance with Indigenous nations is a growing priority in light of BC's commitments to implement the United Nations Declaration on the Rights of Indigenous Peoples and passage of the&nbsp;Declaration of the Rights of Indigenous Peoples Act in 2019. This presentation introduces the concept of co-governance&nbsp;as a pathway to building respectful, shared decision-making processes between Indigenous and non-Indigenous governments, highlighting the opportunities to adopt these approaches in freshwater decision-making in BC, and profiling examples of emerging co-governance initiatives&nbsp;in the province.&nbsp;</span></div></td><td data-dcnode-id="6375"><span data-dcnode-id="6376" instrument_node="">Brandes/Simms, Mr./Ms. Oliver/Rosie</span></td><td data-dcnode-id="6373"><span data-dcnode-id="6374" instrument_node="">Co Director/Researcher &amp; Coordinator</span></td><td data-dcnode-id="6371"><span data-dcnode-id="6372" instrument_node="">Centre for Global Studies, POLIS Water Sustainability Project </span></td></tr><tr class="Environment--Sustainability Centre-for-Global-Studies-POLIS-Water-Sustainability-Project- Virtual" data-dcnode-id="6356" role="row"><td data-dcnode-id="6368"><span data-dcnode-id="6369" instrument_node="">Environment &amp; Sustainability</span></td><td class="more-info" data-dcnode-id="6363"><a data-dcnode-id="6366" href="#"><span data-dcnode-id="6367" instrument_node="">A Watershed Security Agenda for BC NEW ◊</span></a><div class="description" data-dcnode-id="6364" style="display: none;"><span data-dcnode-id="6365" instrument_node="">This presentation will outline a set of key actions needed to achieve watershed security in BC. It will highlight the interconnections between watershed security and other key priorities in the province-reconciliation, economic recovery, climate adaptation, wild salmon protection/revitalization-and point to specific actions by the provincial government to create a lasting legacy of watershed security for all British Columbians.&nbsp;</span></div></td><td data-dcnode-id="6361"><span data-dcnode-id="6362" instrument_node="">Brandes/Simms, Mr./Ms. Oliver/Rosie</span></td><td data-dcnode-id="6359"><span data-dcnode-id="6360" instrument_node="">Co Director/Researcher &amp; Coordinator</span></td><td data-dcnode-id="6357"><span data-dcnode-id="6358" instrument_node="">Centre for Global Studies, POLIS Water Sustainability Project </span></td></tr><tr class="Environment--Sustainability Centre-for-Global-Studies-POLIS-Water-Sustainability-Project- Virtual altrow" data-dcnode-id="6342" role="row"><td data-dcnode-id="6354"><span data-dcnode-id="6355" instrument_node="">Environment &amp; Sustainability</span></td><td class="more-info" data-dcnode-id="6349"><a data-dcnode-id="6352" href="#"><span data-dcnode-id="6353" instrument_node="">The Future of Water Law and Policy ◊</span></a><div class="description" data-dcnode-id="6350" style="display: none;"><span data-dcnode-id="6351" instrument_node="">This presentation explores the elements and attributes of modern water law and focuses on the emerging model for watershed governance in BC. It also addresses the successful conditions for watershed governance, and explores how a watershed governance regime can build resilience in dealing with an increasingly uncertain world and the priority of water sustainability.&nbsp;&nbsp;&nbsp;&nbsp; </span></div></td><td data-dcnode-id="6347"><span data-dcnode-id="6348" instrument_node="">Brandes/Simms, Mr./Ms. Oliver/Rosie</span></td><td data-dcnode-id="6345"><span data-dcnode-id="6346" instrument_node="">Co-Director/Researcher &amp; Coordinator</span></td><td data-dcnode-id="6343"><span data-dcnode-id="6344" instrument_node="">Centre for Global Studies, POLIS Water Sustainability Project </span></td></tr><tr class="Environment--Sustainability Centre-for-Global-Studies-POLIS-Water-Sustainability-Project- Virtual" data-dcnode-id="6328" role="row"><td data-dcnode-id="6340"><span data-dcnode-id="6341" instrument_node="">Environment &amp; Sustainability</span></td><td class="more-info" data-dcnode-id="6335"><a data-dcnode-id="6338" href="#"><span data-dcnode-id="6339" instrument_node="">Putting the "Sustainable" in BC's New Water Law ◊</span></a><div class="description" data-dcnode-id="6336" style="display: none;"><span data-dcnode-id="6337" instrument_node="">With the passing of the Water Sustainability&nbsp;Act in 2016, BC has a once-in-a-lifetime opportunity to become a global leader in freshwater protection. This presentation highlights the critical legal components needed to put the "sustainable" in the Water Sustainability Act, including protection of groundwater and flows for nature, and improved planning and governance.</span></div></td><td data-dcnode-id="6333"><span data-dcnode-id="6334" instrument_node="">Brandes/Simms, Mr./Ms. Oliver/Rosie</span></td><td data-dcnode-id="6331"><span data-dcnode-id="6332" instrument_node="">Co-Director/Researcher &amp; Coordinator</span></td><td data-dcnode-id="6329"><span data-dcnode-id="6330" instrument_node="">Centre for Global Studies, POLIS Water Sustainability Project </span></td></tr><tr class="Environment--Sustainability Department-of-Biology S Virtual altrow" data-dcnode-id="6314" role="row"><td data-dcnode-id="6326"><span data-dcnode-id="6327" instrument_node="">Environment &amp; Sustainability</span></td><td class="more-info" data-dcnode-id="6321"><a data-dcnode-id="6324" href="#"><span data-dcnode-id="6325" instrument_node="">Promoting Positive Thinking and Meaningful Action During the Climate Crisis ǂ (S) ◊</span></a><div class="description" data-dcnode-id="6322" style="display: none;"><span data-dcnode-id="6323" instrument_node="">This workshop brings people together to participate in a discussion on the challenges of working and teaching while living under the everyday threat of climate change. With a focus on resiliency and optimism for the future, we will share ideas and approaches for thriving during this crisis and how to transform our anxiety, apathy, fear and stress into a state of positivity while moving beyond simply having climate awareness to taking meaningful climate action. Please note that the online version of this presentation shares some aspects of the Exploring Climate Solutions for a Sustainable Future workshop.</span></div></td><td data-dcnode
