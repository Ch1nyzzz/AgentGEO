-id="6319"><span data-dcnode-id="6320" instrument_node="">Wyatt, Mr. Shea</span></td><td data-dcnode-id="6317"><span data-dcnode-id="6318" instrument_node="">Graduate Student</span></td><td data-dcnode-id="6315"><span data-dcnode-id="6316" instrument_node="">Department of Biology</span></td></tr><tr class="Environment--Sustainability Department-of-Biology S Virtual" data-dcnode-id="6300" role="row"><td data-dcnode-id="6312"><span data-dcnode-id="6313" instrument_node="">Environment &amp; Sustainability</span></td><td class="more-info" data-dcnode-id="6307"><a data-dcnode-id="6310" href="#"><span data-dcnode-id="6311" instrument_node="">Exploring Climate Solutions for a Sustainable Future ǂ (S) ◊</span></a><div class="description" data-dcnode-id="6308" style="display: none;"><span data-dcnode-id="6309" instrument_node="">Participants will take part in a facilitated workshop designed to explore the likely consequences of energy, economic growth, land use, and other policies and uncertainties on the global climate. The goal is to improve the understanding of climate change and inspire meaningful climate action at a personal or community level. The workshop helps build support for strategies to address climate change via interactive testing of the cutting-edge simulation model&nbsp;En-ROADS. Participants will propose climate solutions such as energy efficiency, carbon pricing, reducing deforestation, and carbon dioxide removal, and the effects on climate, sea-level rise, pollution, and many other systems will be observed in real-time. The resulting experience is hopeful, scientifically-grounded, action-oriented, and eye-opening. This activity is best suited to high-school or adult participants, however it can be adapted to younger students. </span></div></td><td data-dcnode-id="6305"><span data-dcnode-id="6306" instrument_node="">Wyatt, Mr. Shea</span></td><td data-dcnode-id="6303"><span data-dcnode-id="6304" instrument_node="">Graduate Student</span></td><td data-dcnode-id="6301"><span data-dcnode-id="6302" instrument_node="">Department of Biology</span></td></tr><tr class="Environment--Sustainability Department-of-Civil-Engineering Virtual altrow" data-dcnode-id="6286" role="row"><td data-dcnode-id="6298"><span data-dcnode-id="6299" instrument_node="">Environment &amp; Sustainability</span></td><td class="more-info" data-dcnode-id="6293"><a data-dcnode-id="6296" href="#"><span data-dcnode-id="6297" instrument_node="">Decentralized (On-Site) Sanitation Bio-degradation Mechanisms ǂ NEW ◊</span></a><div class="description" data-dcnode-id="6294" style="display: none;"><span data-dcnode-id="6295" instrument_node="">Development and evaluation of field and lab-appropriate faecal sludge quality analytical methods. Activities&nbsp;focused on quantifying functional ecology characterization of biological&nbsp;treatment systems for safeguarding human and environmental health.&nbsp;</span></div></td><td data-dcnode-id="6291"><span data-dcnode-id="6292" instrument_node="">Shaw, Ms. Kelsey</span></td><td data-dcnode-id="6289"><span data-dcnode-id="6290" instrument_node="">Graduate Student</span></td><td data-dcnode-id="6287"><span data-dcnode-id="6288" instrument_node="">Department of Civil Engineering</span></td></tr><tr class="Environment--Sustainability Department-of-Civil-Engineering E M S Virtual" data-dcnode-id="6272" role="row"><td data-dcnode-id="6284"><span data-dcnode-id="6285" instrument_node="">Environment &amp; Sustainability</span></td><td class="more-info" data-dcnode-id="6279"><a data-dcnode-id="6282" href="#"><span data-dcnode-id="6283" instrument_node="">Sanitation Science at Work in Your Local Community (E M S) ǂ NEW ◊</span></a><div class="description" data-dcnode-id="6280" style="display: none;"><span data-dcnode-id="6281" instrument_node="">This talk showcases field and laboratory work based on Vancouver island in the rural sanitation sector-including septic tanks, composting toilets and wastewater treatment&nbsp;plants-as well as interesting and unique laboratory techniques used to ultimately improve local sanitation systems, as told from a current UVic engineering master’s student.&nbsp;</span></div></td><td data-dcnode-id="6277"><span data-dcnode-id="6278" instrument_node="">Shaw, Ms. Kelsey</span></td><td data-dcnode-id="6275"><span data-dcnode-id="6276" instrument_node="">Graduate Student</span></td><td data-dcnode-id="6273"><span data-dcnode-id="6274" instrument_node="">Department of Civil Engineering</span></td></tr><tr class="Environment--Sustainability School-of-Earth--Ocean-Sciences M S Virtual altrow" data-dcnode-id="6258" role="row"><td data-dcnode-id="6270"><span data-dcnode-id="6271" instrument_node="">Environment &amp; Sustainability</span></td><td class="more-info" data-dcnode-id="6265"><a data-dcnode-id="6268" href="#"><span data-dcnode-id="6269" instrument_node="">Careers in Sustainability ǂ (M S) ◊</span></a><div class="description" data-dcnode-id="6266" style="display: none;"><span data-dcnode-id="6267" instrument_node="">Sustainability jobs cover a range of different disciplines addressing environmental, economic and social needs. This discussion includes information about different career paths in the field of sustainability; covering current emerging careers in energy, agriculture, and finance. Information and advice on pursuing a post-secondary education; obtaining valuable skills sets for industry and public service sustainability careers. </span></div></td><td data-dcnode-id="6263"><span data-dcnode-id="6264" instrument_node="">Duke, Mr. Patrick</span></td><td data-dcnode-id="6261"><span data-dcnode-id="6262" instrument_node="">Graduate Student</span></td><td data-dcnode-id="6259"><span data-dcnode-id="6260" instrument_node="">School of Earth &amp; Ocean Sciences</span></td></tr><tr class="Environment--Sustainability School-of-Earth--Ocean-Sciences M S Virtual" data-dcnode-id="6244" role="row"><td data-dcnode-id="6256"><span data-dcnode-id="6257" instrument_node="">Environment &amp; Sustainability</span></td><td class="more-info" data-dcnode-id="6251"><a data-dcnode-id="6254" href="#"><span data-dcnode-id="6255" instrument_node="">Community Climate Action Project Planning ǂ (M S) ◊</span></a><div class="description" data-dcnode-id="6252" style="display: none;"><span data-dcnode-id="6253" instrument_node="">What can you do to take climate action? This workshop introduces climate action project ideas, how to engage community stakeholders, how to share the “what” and “why” of your project, and where to look for project funding. Climate action is needed at every level from international cooperation to local community projects. This workshop is a great way to jump start your own climate action project. The specific workshop content and delivery methods can be adapted to the needs of the audience. </span></div></td><td data-dcnode-id="6249"><span data-dcnode-id="6250" instrument_node="">Duke, Mr. Patrick</span></td><td data-dcnode-id="6247"><span data-dcnode-id="6248" instrument_node="">Graduate Student</span></td><td data-dcnode-id="6245"><span data-dcnode-id="6246" instrument_node="">School of Earth &amp; Ocean Sciences</span></td></tr><tr class="Environment--Sustainability School-of-Earth--Ocean-Sciences M S Virtual altrow" data-dcnode-id="6230" role="row"><td data-dcnode-id="6242"><span data-dcnode-id="6243" instrument_node="">Environment &amp; Sustainability</span></td><td class="more-info" data-dcnode-id="6237"><a data-dcnode-id="6240" href="#"><span data-dcnode-id="6241" instrument_node="">Climate Change in Canada ǂ (M S) ◊</span></a><div class="description" data-dcnode-id="6238" style="display: none;"><span data-dcnode-id="6239" instrument_node="">How is Canada contributing to climate change and being impacted by it? This discussion details Canada’s emission pathways, as well as current and projected climate impacts on various Canadian regions including the prairies, the Arctic, and Canada’s coasts. Current and proposed policy in place across Canada addressing climate change will also be discussed. </span></div></td><td data-dcnode-id="6235"><span data-dcnode-id="6236" instrument_node="">Duke, Mr. Patrick</span></td><td data-dcnode-id="6233"><span data-dcnode-id="6234" instrument_node="">Graduate Student</span></td><td data-dcnode-id="6231"><span data-dcnode-id="6232" instrument_node="">School of Earth &amp; Ocean Sciences</span></td></tr><tr class="Environment--Sustainability School-of-Environmental-Studies S Virtual" data-dcnode-id="6216" role="row"><td data-dcnode-id="6228"><span data-dcnode-id="6229" instrument_node="">Environment &amp; Sustainability</span></td><td class="more-info" data-dcnode-id="6223"><a data-dcnode-id="6226" href="#"><span data-dcnode-id="6227" instrument_node="">Fighting Fire with Fire: Controlled Burning in the American West (S) ǂ NEW ◊</span></a><div class="description" data-dcnode-id="6224" style="display: none;"><span data-dcnode-id="6225" instrument_node="">This presentation begins with a history of wildfire and forest management in the western United States, describing factors leading to the uncontrollable wildfires we see today. It discusses the ecological benefit of “good fire” on the landscape, the use of prescribed fire as a management strategy, and a case study of cultural burning by Indigenous firelighters in California. This presentation focuses mainly on the social and political challenges of wildfire prevention.</span></div></td><td data-dcnode-id="6221"><span data-dcnode-id="6222" instrument_node="">Burton, Ms. Lauren</span></td><td data-dcnode-id="6219"><span data-dcnode-id="6220" instrument_node="">Graduate Student</span></td><td data-dcnode-id="6217"><span data-dcnode-id="6218" instrument_node="">School of Environmental Studies</span></td></tr><tr class="Environment--Sustainability School-of-Environmental-Studies S Virtual altrow" data-dcnode-id="6202" role="row"><td data-dcnode-id="6214"><span data-dcnode-id="6215" instrument_node="">Environment &amp; Sustainability</span></td><td class="more-info" data-dcnode-id="6209"><a data-dcnode-id="6212" href="#"><span data-dcnode-id="6213" instrument_node="">Behavior Change for Conservation (S) ǂ NEW ◊</span></a><div class="description" data-dcnode-id="6210" style="display: none;"><span data-dcnode-id="6211" instrument_node="">This presentation introduces conservation psychology, exploring the ways that people think about nature and their actions that impact the environment. It highlights ways that conservation groups have used emotional appeals, peer pressure, and creative strategies to promote sustainable behavior, using examples from around the world.</span></div></td><td data-dcnode-id="6207"><span data-dcnode-id="6208" instrument_node="">Burton, Ms. Lauren</span></td><td data-dcnode-id="6205"><span data-dcnode-id="6206" instrument_node="">Graduate Student</span></td><td data-dcnode-id="6203"><span data-dcnode-id="6204" instrument_node="">School of Environmental Studies</span></td></tr><tr class="Environment--Sustainability School-of-Environmental-Studies M S Virtual" data-dcnode-id="6188" role="row"><td data-dcnode-id="6200"><span data-dcnode-id="6201" instrument_node="">Environment &amp; Sustainability</span></td><td class="more-info" data-dcnode-id="6195"><a data-dcnode-id="6198" href="#"><span data-dcnode-id="6199" instrument_node="">The Use of Repeat Photography in Ecological Restoration ǂ (Jan-April) (M S) ◊</span></a><div class="description" data-dcnode-id="6196" style="display: none;"><span data-dcnode-id="6197" instrument_node="">This lecture will address the field of repeat photography and its use as a research method for assessing landscape change and monitoring in ecological restoration projects. The presentation will cover: 1) the history of repeat photography, 2) it’s different goals, 3) examples of projects which used repeat photography to assess change (i.e. Mark Klett's Rephotographic Survey Project, the Mountain Legacy Project), and 4) using repeat photos to monitor plant communities for ecological restoration projects. This lecture is better suited for an older audience; however it can be simplified to suit the needs of a younger audience.</span></div></td><td data-dcnode-id="6193"><span data-dcnode-id="6194" instrument_node="">Voicescu, Ms. Sonia</span></td><td data-dcnode-id="6191"><span data-dcnode-id="6192" instrument_node="">Graduate Student</span></td><td data-dcnode-id="6189"><span data-dcnode-id="6190" instrument_node="">School of Environmental Studies</span></td></tr><tr class="Environment--Sustainability Libraries-Digital-Scholarship-Commons M S Virtual altrow" data-dcnode-id="6174" role="row"><td data-dcnode-id="6186"><span data-dcnode-id="6187" instrument_node="">Environment &amp; Sustainability</span></td><td class="more-info" data-dcnode-id="6181"><a data-dcnode-id="6184" href="#"><span data-dcnode-id="6185" instrument_node="">Conserving Energy One Cubicle (or Home) at a Time (M S) ◊</span></a><div class="description" data-dcnode-id="6182" style="display: none;"><span data-dcnode-id="6183" instrument_node="">Do you know how much electricity you use in your personal office, cubicle or home?  Do you know how much energy your desktop computer or laptop uses? Will you save more electricity by turning off your computer at night or shortening your daily shower by five minutes? Discover some counter-intuitive facts about saving energy, money and the environment.</span></div></td><td data-dcnode-id="6179"><span data-dcnode-id="6180" instrument_node="">McCue, Mr. Rich</span></td><td data-dcnode-id="6177"><span data-dcnode-id="6178" instrument_node="">Manager</span></td><td data-dcnode-id="6175"><span data-dcnode-id="6176" instrument_node="">Libraries, Digital Scholarship Commons</span></td></tr><tr class="Environment--Sustainability Department-of-Psychology Virtual" data-dcnode-id="6160" role="row"><td data-dcnode-id="6172"><span data-dcnode-id="6173" instrument_node="">Environment &amp; Sustainability</span></td><td class="more-info" data-dcnode-id="6167"><a data-dcnode-id="6170" href="#"><span data-dcnode-id="6171" instrument_node="">The Dragons of Inaction: Why We Don't Do What We Should ◊</span></a><div class="description" data-dcnode-id="6168" style="display: none;"><span data-dcnode-id="6169" instrument_node="">We all have intentions to improve ourselves and the world, but we don't always act on those intentions. Why not? This talk gathers together the many "dragons of inaction" that hold us back, and suggests some ways to "slay" them. The focus is on climate change and sustainability actions, but the dragons might also apply to diet, exercise and other good works.</span></div></td><td data-dcnode-id="6165"><span data-dcnode-id="6166" instrument_node="">Gifford, Dr. Robert</span></td><td data-dcnode-id="6163"><span data-dcnode-id="6164" instrument_node="">Professor</span></td><td data-dcnode-id="6161"><span data-dcnode-id="6162" instrument_node="">Department of Psychology</span></td></tr><tr class="Environment--Sustainability Department-of-Sociology Virtual altrow" data-dcnode-id="6146" role="row"><td data-dcnode-id="6158"><span data-dcnode-id="6159" instrument_node="">Environment &amp; Sustainability</span></td><td class="more-info" data-dcnode-id="6153"><a data-dcnode-id="6156" href="#"><span data-dcnode-id="6157" instrument_node="">Are Large Corporations Responsible for Climate Breakdown? NEW ◊</span></a><div class="description" data-dcnode-id="6154" style="display: none;"><span data-dcnode-id="6155" instrument_node="">Carbon and corporations power our economy. But at what cost to vulnerable populations, to future generations, and to the Earth? This presentation examines the close relationship between business-as-usual and the deepening climate crisis, and the ways in which corporate power blocks socially just and ecologically sane alternatives.</span></div></td><td data-dcnode-id="6151"><span data-dcnode-id="6152" instrument_node="">Carroll, Prof. William</span></td><td data-dcnode-id="6149"><span data-dcnode-id="6150" instrument_node="">Professor</span></td><td data-dcnode-id="6147"><span data-dcnode-id="6148" instrument_node="">Department of Sociology</span></td></tr><tr class="Environment--Sustainability Department-of-Sociology Virtual" data-dcnode-id="6132" role="row"><td data-dcnode-id="6144"><span data-dcnode-id="6145" instrument_node="">Environment &amp; Sustainability</span></td><td class="more-info" data-dcnode-id="6139"><a data-dcnode-id="6142" href="#"><span data-dcnode-id="6143" instrument_node="">Climate Change or System Change: Prospects for a Post-carbon Future NEW ◊</span></a><div class="description" data-dcnode-id="6140" style="display: none;"><span data-dcnode-id="6141" instrument_node="">The climate crisis has reached a point at which denialism is no longer a credible option. But what are the real options? This presentation surveys a number of proposed solutions, from pricing carbon and improving technology to transforming economic relations in ways that break from capitalism's logic of endless growth and escalating inequities. The emphasis will be on the need for a 3-d solution: decarbonization, democratization and decolonization.</span></div></td><td data-dcnode-id="6137"><span data-dcnode-id="6138" instrument_node="">Carroll, Prof. William</span></td><td data-dcnode-id="6135"><span data-dcnode-id="6136" instrument_node="">Professor</span></td><td data-dcnode-id="6133"><span data-dcnode-id="6134" instrument_node="">Department of Sociology</span></td></tr><tr class="Environment--Sustainability School-of-Public-Administration Virtual altrow" data-dcnode-id="6118" role="row"><td data-dcnode-id="6130"><span data-dcnode-id="6131" instrument_node="">Environment &amp; Sustainability</span></td><td class="more-info" data-dcnode-id="6125"><a data-dcnode-id="6128" href="#"><span data-dcnode-id="6129" instrument_node="">Ecological Transition: How to Make Our Societies More Just and More Sustainable (in English or French) NEW ◊</span></a><div class="description" data-dcnode-id="6126" style="display: none;"><span data-dcnode-id="6127" instrument_node="">How can we make our societies more just and more sustainable? What solutions exist?</span></div></td><td data-dcnode-id="6123"><span data-dcnode-id="6124" instrument_node="">Brousselle, Dr. Astrid</span></td><td data-dcnode-id="6121"><span data-dcnode-id="6122" instrument_node="">Professor &amp; Director</span></td><td data-dcnode-id="6119"><span data-dcnode-id="6120" instrument_node="">School of Public Administration</span></td></tr><tr class="Environment--Sustainability School-of-Public-Administration Virtual" data-dcnode-id="6104" role="row"><td data-dcnode-id="6116"><span data-dcnode-id="6117" instrument_node="">Environment &amp; Sustainability</span></td><td class="more-info" data-dcnode-id="6111"><a data-dcnode-id="6114" href="#"><span data-dcnode-id="6115" instrument_node="">Planetary Health (in English or French) NEW ◊</span></a><div class="description" data-dcnode-id="6112" style="display: none;"><span data-dcnode-id="6113" instrument_node="">How can we reconcile human and natural systems? How to design projects,&nbsp;programs,&nbsp;policies for planetary Health? </span></div></td><td data-dcnode-id="6109"><span data-dcnode-id="6110" instrument_node="">Brousselle, Dr. Astrid</span></td><td data-dcnode-id="6107"><span data-dcnode-id="6108" instrument_node="">Professor &amp; Director</span></td><td data-dcnode-id="6105"><span data-dcnode-id="6106" instrument_node="">School of Public Administration</span></td></tr><tr class="Environment--Sustainability School-of-Public-Health--Social-Policy Virtual altrow" data-dcnode-id="6090" role="row"><td data-dcnode-id="6102"><span data-dcnode-id="6103" instrument_node="">Environment &amp; Sustainability</span></td><td class="more-info" data-dcnode-id="6097"><a data-dcnode-id="6100" href="#"><span data-dcnode-id="6101" instrument_node="">Healthy Communities 2.0: Towards a One-Planet Region ◊</span></a><div class="description" data-dcnode-id="6098" style="display: none;"><span data-dcnode-id="6099" instrument_node="">Ultimately our health depends upon the Earth’s natural systems, which provide us with oxygen, water, food, materials, fuels and other basic requirements for life and health. But in Canada we have an ecological footprint equivalent to almost five planets worth of biocapacity-and in the Greater Victoria Region it is between 3 and 4 planets worth. Since we only have one planet, we face the challenge of reducing our footprint about 70-80 per cent, while at the same time ensuring good health and a good quality of life for all who live here-including other species. This talk also describes the work of Conversations for a One Planet region, a new NGO I have established to help us come to grips with this challenge. </span></div></td><td data-dcnode-id="6095"><span data-dcnode-id="6096" instrument_node="">Hancock, Dr. Trevor</span></td><td data-dcnode-id="6093"><span data-dcnode-id="6094" instrument_node="">Professor Emeritus</span></td><td data-dcnode-id="6091"><span data-dcnode-id="6092" instrument_node="">School of Public Health &amp; Social Policy</span></td></tr><tr class="Environment--Sustainability School-of-Environmental-Studies M S Virtual" data-dcnode-id="6076" role="row"><td data-dcnode-id="6088"><span data-dcnode-id="6089" instrument_node="">Environment &amp; Sustainability</span></td><td class="more-info" data-dcnode-id="6083"><a data-dcnode-id="6086" href="#"><span data-dcnode-id="6087" instrument_node="">From Trees to Bluebirds: The Communication of Conservation on Vancouver Island (M S) ◊</span></a><div class="description" data-dcnode-id="6084" style="display: none;"><span data-dcnode-id="6085" instrument_node="">This presentation looks at how we talk about science and conservation, and what the barriers are to uptake and engagement among target audiences.</span></div></td><td data-dcnode-id="6081"><span data-dcnode-id="6082" instrument_node="">Fisher, Mrs. Alina</span></td><td data-dcnode-id="6079"><span data-dcnode-id="6080" instrument_node="">Research Manager</span></td><td data-dcnode-id="6077"><span data-dcnode-id="6078" instrument_node="">School of Environmental Studies</span></td></tr><tr class="Environment--Sustainability School-of-Environmental-Studies M S Virtual altrow" data-dcnode-id="6062" role="row"><td data-dcnode-id="6074"><span data-dcnode-id="6075" instrument_node="">Environment &amp; Sustainability</span></td><td class="more-info" data-dcnode-id="6069"><a data-dcnode-id="6072" href="#"><span data-dcnode-id="6073" instrument_node="">Where the Wildlife Are (M S) ◊</span></a><div class="description" data-dcnode-id="6070" style="display: none;"><span data-dcnode-id="6071" instrument_node="">Changes in land use have made human-wildlife interactions more frequent, both in the wilderness and within our cities- with media representation shaping our perception of those interactions. As land use intensifies and climate changes, issues of coexistence with wildlife becomes an interesting issue.</span></div></td><td data-dcnode-id="6067"><span data-dcnode-id="6068" instrument_node="">Fisher, Mrs. Alina</span></td><td data-dcnode-id="6065"><span data-dcnode-id="6066" instrument_node="">Research Manager</span></td><td data-dcnode-id="6063"><span data-dcnode-id="6064" instrument_node="">School of Environmental Studies</span></td></tr><tr class="Environment--Sustainability Department-of-Civil-Engineering S Virtual" data-dcnode-id="6048" role="row"><td data-dcnode-id="6060"><span data-dcnode-id="6061" instrument_node="">Environment &amp; Sustainability</span></td><td class="more-info" data-dcnode-id="6055"><a data-dcnode-id="6058" href="#"><span data-dcnode-id="6059" instrument_node="">How Would Nature Solve Your Problem? (S) (Jan-April) NEW ◊</span></a><div class="description" data-dcnode-id="6056" style="display: none;"><span data-dcnode-id="6057" instrument_node="">Biomimicry is the practice of finding solutions to design problems by looking for strategies in Nature. Learn about how businesses are using this practice to gain a competitive edge. Discover how designing like nature can have a huge payback to nature. This introduction to the tools, design process and ways to play will have you enjoying your time outside in a whole new way. Let the inventor in you explore, with nature as your guide.</span></div></td><td data-dcnode-id="6053"><span data-dcnode-id="6054" instrument_node="">Daniel, Ms. Anne-Marie</span></td><td data-dcnode-id="6051"><span data-dcnode-id="6052" instrument_node="">Sessional Lecturer</span></td><td data-dcnode-id="6049"><span data-dcnode-id="6050" instrument_node="">Department of Civil Engineering</span></td></tr><tr class="Environment--Sustainability Department-of-Civil-Engineering-Industrial-Ecology S Virtual altrow" data-dcnode-id="6034" role="row"><td data-dcnode-id="6046"><span data-dcnode-id="6047" instrument_node="">Environment &amp; Sustainability</span></td><td class="more-info" data-dcnode-id="6041"><a data-dcnode-id="6044" href="#"><span data-dcnode-id="6045" instrument_node="">Urban Vitality, Inspired by Nature (Jan-April) (S) NEW ◊</span></a><div class="description" data-dcnode-id="6042" style="display: none;"><span data-dcnode-id="6043" instrument_node="">Explore nature-designed solutions to challenges like: stormwater management, temperature regulation, water and air filtration, carbon sequestration, and creating community.&nbsp;How can we integrate and recognize the value of natural spaces for the infrastructure and sense of well-being they provide?&nbsp;</span></div></td><td data-dcnode-id="6039"><span data-dcnode-id="6040" instrument_node="">Daniel, Ms. Anne-Marie</span></td><td data-dcnode-id="6037"><span data-dcnode-id="6038" instrument_node="">Sessional Lecturer</span></td><td data-dcnode-id="6035"><span data-dcnode-id="6036" instrument_node="">Department of Civil Engineering, Industrial Ecology</span></td></tr><tr class="Environment--Sustainability Department-of-Civil-Engineering S Virtual" data-dcnode-id="6020" role="row"><td data-dcnode-id="6032"><span data-dcnode-id="6033" instrument_node="">Environment &amp; Sustainability</span></td><td class="more-info" data-dcnode-id="6027"><a data-dcnode-id="6030" href="#"><span data-dcnode-id="6031" instrument_node="">How Schools can Learn from Nature to Design Solutions to Today’s Problems&nbsp;(S) (Jan-April) NEW ◊</span></a><div class="description" data-dcnode-id="6028" style="display: none;"><span data-dcnode-id="6029" instrument_node="">Unleash the creative spirit&nbsp;guided by nature.&nbsp;Integrate resources and tools&nbsp;into the curriculum and&nbsp;ethos of your school.&nbsp;Enhance your school philosophy, culture and STEAM curriculum with nature's wisdom. Learn and apply nature-inspired design thinking to problem solving in all aspects of school life.&nbsp;</span></div></td><td data-dcnode-id="6025"><span data-dcnode-id="6026" instrument_node="">Daniel, Ms. Anne-Marie</span></td><td data-dcnode-id="6023"><span data-dcnode-id="6024" instrument_node="">Sessional Lecturer</span></td><td data-dcnode-id="6021"><span data-dcnode-id="6022" instrument_node="">Department of Civil Engineering</span></td></tr><tr class="Environment--Sustainability Department-of-Civil-Engineering-Industrial-Ecology S Virtual altrow" data-dcnode-id="6006" role="row"><td data-dcnode-id="6018"><span data-dcnode-id="6019" instrument_node="">Environment &amp; Sustainability</span></td><td class="more-info" data-dcnode-id="6013"><a data-dcnode-id="6016" href="#"><span data-dcnode-id="6017" instrument_node="">What We Can Learn from Nature's Packaging? (Jan-April) (S) NEW ◊ </span></a><div class="description" data-dcnode-id="6014" style="display: none;"><span data-dcnode-id="6015" instrument_node="">Get inspired by how nature designs packaging. Nature’s packaging keeps things fresh in all kinds of weather, is single use, and completely compostable at the perfect time. How does she keep things fresh in all kinds of weather? What are nature’s go-to materials and tried-and-true recipes? How does nature make things biodegrade at the perfect time?</span></div></td><td data-dcnode-id="6011"><span data-dcnode-id="6012" instrument_node="">Daniel, Ms. Anne-Marie</span></td><td data-dcnode-id="6009"><span data-dcnode-id="6010" instrument_node="">Sessional Lecturer</span></td><td data-dcnode-id="6007"><span data-dcnode-id="6008" instrument_node="">Department of Civil Engineering, Industrial Ecology</span></td></tr><tr class="Ethics--Philosophy Department-of-French S Virtual" data-dcnode-id="5992" role="row"><td data-dcnode-id="6004"><span data-dcnode-id="6005" instrument_node="">Ethics &amp; Philosophy</span></td><td class="more-info" data-dcnode-id="5999"><a data-dcnode-id="6002" href="#"><span data-dcnode-id="6003" instrument_node="">The Philosophy of Giorgio Agamben (in English or French) (S) ◊</span></a><div class="description" data-dcnode-id="6000" style="display: none;"><span data-dcnode-id="6001" instrument_node="">This talk focuses on this important philosopher, known for his approach to theories of biopolitics/biopower and potentiality.</span></div></td><td data-dcnode-id="5997"><span data-dcnode-id="5998" instrument_node="">Fromet de Rosnay, Dr. Emile</span></td><td data-dcnode-id="5995"><span data-dcnode-id="5996" instrument_node="">Assistant Professor</span></td><td data-dcnode-id="5993"><span data-dcnode-id="5994" instrument_node="">Department of French</span></td></tr><tr class="Ethics--Philosophy Department-of-Philosophy S Not-Virtual altrow" data-dcnode-id="5978" role="row"><td data-dcnode-id="5990"><span data-dcnode-id="5991" instrument_node="">Ethics &amp; Philosophy</span></td><td class="more-info" data-dcnode-id="5985"><a data-dcnode-id="5988" href="#"><span data-dcnode-id="5989" instrument_node="">Philosophy and the Personal (S)</span></a><div class="description" data-dcnode-id="5986" style="display: none;"><span data-dcnode-id="5987" instrument_node="">Philosophy is often viewed as a dispassionate, objective search for truth on the deepest and broadest questions we’re capable of posing, such as: why is there anything at all? This description, while accurate, masks the fact that philosophers who pursue these grand questions frequently, and of necessity, also perceive themselves to have "skin in the game.” This talk takes a historical look at this side of the discipline.</span></div></td><td data-dcnode-id="5983"><span data-dcnode-id="5984" instrument_node="">Scott, Dr. David</span></td><td data-dcnode-id="5981"><span data-dcnode-id="5982" instrument_node="">Associate Professor</span></td><td data-dcnode-id="5979"><span data-dcnode-id="5980" instrument_node="">Department of Philosophy</span></td></tr><tr class="Ethics--Philosophy Department-of-Philosophy S Virtual" data-dcnode-id="5964" role="row"><td data-dcnode-id="5976"><span data-dcnode-id="5977" instrument_node="">Ethics &amp; Philosophy</span></td><td class="more-info" data-dcnode-id="5971"><a data-dcnode-id="5974" href="#"><span data-dcnode-id="5975" instrument_node="">Physicians and the Pharmaceutical Industry (S) NEW ◊</span></a><div class="description" data-dcnode-id="5972" style="display: none;"><span data-dcnode-id="5973" instrument_node="">It is a common complaint that the pharmaceutical industry’s behaviour in providing product-biased information to physicians, patient-directed advertising and the use of clinical evaluation packages is ethically objectionable, and that a majority of ethical failings in the interaction between physicians and the pharmaceutical industry are the direct result of the industry’s actions. This presentation considers the distinct ethical obligations of the two parties and suggests that while moral (and legal) infelicities in the relationship between physicians and the industry do occur, it should never be forgotten that “it takes two to tango.”</span></div></td><td data-dcnode-id="5969"><span data-dcnode-id="5970" instrument_node="">Kluge, Dr. Eike</span></td><td data-dcnode-id="5967"><span data-dcnode-id="5968" instrument_node="">Professor</span></td><td data-dcnode-id="5965"><span data-dcnode-id="5966" instrument_node="">Department of Philosophy</span></td></tr><tr class="Ethics--Philosophy Department-of-Philosophy S Virtual altrow" data-dcnode-id="5950" role="row"><td data-dcnode-id="5962"><span data-dcnode-id="5963" instrument_node="">Ethics &amp; Philosophy</span></td><td class="more-info" data-dcnode-id="5957"><a data-dcnode-id="5960" href="#"><span data-dcnode-id="5961" instrument_node="">Patenting Genes (S) NEW ◊</span></a><div class="description" data-dcnode-id="5958" style="display: none;"><span data-dcnode-id="5959" instrument_node="">Approximately 20 per cent of the human genome has been patented. This in itself raises ethical questions, but the matter of gene patenting itself is not without ethical issues. This presentation begins with a closer look at the requirements for having a patent, applies this to the patenting of genomes and genetic sequences, and then takes a closer look at the ethical issues that are presented by patenting human genes.</span></div></td><td data-dcnode-id="5955"><span data-dcnode-id="5956" instrument_node="">Kluge, Dr. Eike</span></td><td data-dcnode-id="5953"><span data-dcnode-id="5954" instrument_node="">Professor</span></td><td data-dcnode-id="5951"><span data-dcnode-id="5952" instrument_node="">Department of Philosophy</span></td></tr><tr class="Ethics--Philosophy Department-of-Philosophy S Virtual" data-dcnode-id="5936" role="row"><td data-dcnode-id="5948"><span data-dcnode-id="5949" instrument_node="">Ethics &amp; Philosophy</span></td><td class="more-info" data-dcnode-id="5943"><a data-dcnode-id="5946" href="#"><span data-dcnode-id="5947" instrument_node="">Abortion (S) ◊</span></a><div class="description" data-dcnode-id="5944" style="display: none;"><span data-dcnode-id="5945" instrument_node="">Abortion is defined by the Canadian Medical Association as the active termination of a pregnancy before fetal viability. This presentation considers the ethics of abortion. It begins with a brief historical look at abortion, includes the position of major Christian figures on the status of the human fetus, and deals with the so-called Doctrine of Double Effect.</span></div></td><td data-dcnode-id="5941"><span data-dcnode-id="5942" instrument_node="">Kluge, Dr. Eike</span></td><td data-dcnode-id="5939"><span data-dcnode-id="5940" instrument_node="">Professor</span></td><td data-dcnode-id="5937"><span data-dcnode-id="5938" instrument_node="">Department of Philosophy</span></td></tr><tr class="Ethics--Philosophy Department-of-Philosophy S Virtual altrow" data-dcnode-id="5922" role="row"><td data-dcnode-id="5934"><span data-dcnode-id="5935" instrument_node="">Ethics &amp; Philosophy</span></td><td class="more-info" data-dcnode-id="5929"><a data-dcnode-id="5932" href="#"><span data-dcnode-id="5933" instrument_node="">Medical Assistance in Dying (S) ◊</span></a><div class="description" data-dcnode-id="5930" style="display: none;"><span data-dcnode-id="5931" instrument_node="">After over twenty years of administrative, legal, religious and ethical debate, the Medical Assistance in Dying (MAiD) Act came into force in 2016, and it is now legal in Canada for physicians and nurse practitioners to provide an incurably ill competent patient suffering from an irremediable condition whose death is reasonably foreseeable in a short period of time with assisted death. This presentations considers the ethics of MAiD as it concerns health care professionals and patients.</span></div></td><td data-dcnode-id="5927"><span data-dcnode-id="5928" instrument_node="">Kluge, Dr. Eike</span></td><td data-dcnode-id="5925"><span data-dcnode-id="5926" instrument_node="">Professor</span></td><td data-dcnode-id="5923"><span data-dcnode-id="5924" instrument_node="">Department of Philosophy</span></td></tr><tr class="Ethics--Philosophy Department-of-Philosophy S Virtual" data-dcnode-id="5908" role="row"><td data-dcnode-id="5920"><span data-dcnode-id="5921" instrument_node="">Ethics &amp; Philosophy</span></td><td class="more-info" data-dcnode-id="5915"><a data-dcnode-id="5918" href="#"><span data-dcnode-id="5919" instrument_node="">Ethical Issues in Police Conduct (S) ◊</span></a><div class="description" data-dcnode-id="5916" style="display: none;"><span data-dcnode-id="5917" instrument_node="">Police officers are social servants with special rights and duties. This presentation examines the ethical issues that surround the conduct of police officers in the exercise of their duties. The presentation is based on the experience of the presenter as ethics consultant to the Office of the BC Police Complaint Commissioner.</span></div></td><td data-dcnode-id="5913"><span data-dcnode-id="5914" instrument_node="">Kluge, Dr. Eike</span></td><td data-dcnode-id="5911"><span data-dcnode-id="5912" instrument_node="">Professor</span></td><td data-dcnode-id="5909"><span data-dcnode-id="5910" instrument_node="">Department of Philosophy</span></td></tr><tr class="Ethics--Philosophy Department-of-Philosophy S Virtual altrow" data-dcnode-id="5894" role="row"><td data-dcnode-id="5906"><span data-dcnode-id="5907" instrument_node="">Ethics &amp; Philosophy</span></td><td class="more-info" data-dcnode-id="5901"><a data-dcnode-id="5904" href="#"><span data-dcnode-id="5905" instrument_node="">The History and Ethics of a Deliberate Death (S) ◊</span></a><div class="description" data-dcnode-id="5902" style="display: none;"><span data-dcnode-id="5903" instrument_node="">It has sometimes been argued that deliberate death-euthanasia, assisted suicide and providing assistance in dying-violates fundamental ethical principles. This presentation examines the historical and ethical validity of that claim.</span></div></td><td data-dcnode-id="5899"><span data-dcnode-id="5900" instrument_node="">Kluge, Dr. Eike</span></td><td data-dcnode-id="5897"><span data-dcnode-id="5898" instrument_node="">Professor</span></td><td data-dcnode-id="5895"><span data-dcnode-id="5896" instrument_node="">Department of Philosophy</span></td></tr><tr class="Ethics--Philosophy Department-of-Sociology M S Virtual" data-dcnode-id="5880" role="row"><td data-dcnode-id="5892"><span data-dcnode-id="5893" instrument_node="">Ethics &amp; Philosophy</span></td><td class="more-info" data-dcnode-id="5887"><a data-dcnode-id="5890" href="#"><span data-dcnode-id="5891" instrument_node="">Political Correctness, Inclusivity and Freedom of Speech (M S) ◊</span></a><div class="description" data-dcnode-id="5888" style="display: none;"><span data-dcnode-id="5889" instrument_node="">This talk explores research and debates on the origins of “political correctness.” The focus is on PC as a description of measures to reform language and practices to reduce social injustice, notably discrimination by race, gender, sexual orientation, disability etc.; and as an ideological tool used by those who oppose such measures.</span></div></td><td data-dcnode-id="5885"><span data-dcnode-id="5886" instrument_node="">Warburton, Dr. Rennie</span></td><td data-dcnode-id="5883"><span data-dcnode-id="5884" instrument_node="">Professor Emeritus</span></td><td data-dcnode-id="5881"><span data-dcnode-id="5882" instrument_node="">Department of Sociology</span></td></tr><tr class="Ethics--Philosophy School-of-Public-Administration S Virtual altrow" data-dcnode-id="5866" role="row"><td data-dcnode-id="5878"><span data-dcnode-id="5879" instrument_node="">Ethics &amp; Philosophy</span></td><td class="more-info" data-dcnode-id="5873"><a data-dcnode-id="5876" href="#"><span data-dcnode-id="5877" instrument_node="">Knowledge Democracy and Decolonization of Knowledge (S) ◊</span></a><div class="description" data-dcnode-id="5874" style="display: none;"><span data-dcnode-id="5875" instrument_node="">Budd Hall is a Professor Emeritus at UVic who has had a career in adult education, community-development and participatory research. He is the Co-Chair of the UNESCO Chair in Community-Based Research and Social Responsibility in Higher Education. His current focus is on training young people for doing locally based participatory research and supporting the strengthening of community-university research partnerships. He is also a poet and part of the Victoria Social Movement Poets Collective.</span></div></td><td data-dcnode-id="5871"><span data-dcnode-id="5872" instrument_node="">Hall, Prof. Budd</span></td><td data-dcnode-id="5869"><span data-dcnode-id="5870" instrument_node="">Professor Emeritus </span></td><td data-dcnode-id="5867"><span data-dcnode-id="5868" instrument_node="">School of Public Administration</span></td></tr><tr class="Fitness-Athletics--Healthy-Lifestyles School-of-Exercise-Science-Physical--Health-Education- Virtual" data-dcnode-id="5852" role="row"><td data-dcnode-id="5864"><span data-dcnode-id="5865" instrument_node="">Fitness, Athletics &amp; Healthy Lifestyles</span></td><td class="more-info" data-dcnode-id="5859"><a data-dcnode-id="5862" href="#"><span data-dcnode-id="5863" instrument_node="">The Whole Day Matters: Move More, Reduce Sedentary Time and Sleep Well NEW ◊</span></a><div class="description" data-dcnode-id="5860" style="display: none;"><span data-dcnode-id="5861" instrument_node="">The evidence is in-Canadians need to move more, reduce sedentary time and sleep well to receive optimal health benefits. But what is the evidence, and how do you safely get started? This presentation will highlight the newly released Canadian 24-Hour Movement Guidelines, the health benefits of doing a variety of types and intensities of physical activity, and will include general guidance to get started.</span></div></td><td data-dcnode-id="5857"><span data-dcnode-id="5858" instrument_node="">Lane, Dr. Kirstin</span></td><td data-dcnode-id="5855"><span data-dcnode-id="5856" instrument_node="">Assistant Teaching Professor</span></td><td data-dcnode-id="5853"><span data-dcnode-id="5854" instrument_node="">School of Exercise Science, Physical &amp; Health Education </span></td></tr><tr class="Fitness-Athletics--Healthy-Lifestyles School-of-Exercise-Science-Physical--Health-Education- Virtual altrow" data-dcnode-id="5838" role="row"><td data-dcnode-id="5850"><span data-dcnode-id="5851" instrument_node="">Fitness, Athletics &amp; Healthy Lifestyles</span></td><td class="more-info" data-dcnode-id="5845"><a data-dcnode-id="5848" href="#"><span data-dcnode-id="5849" instrument_node="">The Importance of Moving More and Reducing Sedentary Time after a Cancer Diagnosis NEW ◊</span></a><div class="description" data-dcnode-id="5846" style="display: none;"><span data-dcnode-id="5847" instrument_node="">The evidence is in: there are significant health benefits associated with moving more and reducing sedentary time even after a cancer diagnosis. But what is the evidence, and how do you safely get started when you are undergoing cancer treatment? This presentation will highlight recent research showing the health benefits of increasing physical activity levels and reducing sedentary time, and will include general guidance on how to get started.</span></div></td><td data-dcnode-id="5843"><span data-dcnode-id="5844" instrument_node="">Lane, Dr. Kirstin</span></td><td data-dcnode-id="5841"><span data-dcnode-id="5842" instrument_node="">Assistant Teaching Professor</span></td><td data-dcnode-id="5839"><span data-dcnode-id="5840" instrument_node="">School of Exercise Science, Physical &amp; Health Education </span></td></tr><tr class="Fitness-Athletics--Healthy-Lifestyles School-of-Exercise-Science-Physical--Health-Education Virtual" data-dcnode-id="5824" role="row"><td data-dcnode-id="5836"><span data-dcnode-id="5837" instrument_node="">Fitness, Athletics &amp; Healthy Lifestyles</span></td><td class="more-info" data-dcnode-id="5831"><a data-dcnode-id="5834" href="#"><span data-dcnode-id="5835" instrument_node="">Is Your Leisure Portfolio Ready for Retirement? ◊</span></a><div class="description" data-dcnode-id="5832" style="display: none;"><span data-dcnode-id="5833" instrument_node="">Many of us focus on our financial portfolio to prepare to retire but how many of us consider our leisure portfolio?  Retirement brings opportunities to learn new things, build grow our networks and help our communities. Learn how to be ready to grow your leisure portfolio!</span></div></td><td data-dcnode-id="5829"><span data-dcnode-id="5830" instrument_node="">Meldrum, Dr. John</span></td><td data-dcnode-id="5827"><span data-dcnode-id="5828" instrument_node="">Director and Assistant Professor</span></td><td data-dcnode-id="5825"><span data-dcnode-id="5826" instrument_node="">School of Exercise Science, Physical &amp; Health Education</span></td></tr><tr class="Fitness-Athletics--Healthy-Lifestyles School-of-Exercise-Science-Physical--Health-Education S Virtual altrow" data-dcnode-id="5810" role="row"><td data-dcnode-id="5822"><span data-dcnode-id="5823" instrument_node="">Fitness, Athletics &amp; Healthy Lifestyles</span></td><td class="more-info" data-dcnode-id="5817"><a data-dcnode-id="5820" href="#"><span data-dcnode-id="5821" instrument_node="">Understanding and Developing Your Physical Literacy: Health and Well-being (S) ǂ NEW ◊</span></a><div class="description" data-dcnode-id="5818" style="display: none;"><span data-dcnode-id="5819" instrument_node="">A sedentary lifestyle is associated with a number of undesirable changes in body composition. However, all persons maintain their ability to make improvements in strength and functional ability throughout their lives. Both aerobic and resistance exercise are beneficial for all persons as they age. Physical literacy is more than just these two areas of physical fitness. Per Whitehead, “As an aspect of human potential integral to a fully realised human existence and influencing much of life as habitually experienced, the achievement and exercise of physical literacy plays a very significant part in the development of self-realisation, self-confidence and positive self-esteem.”</span></div></td><td data-dcnode-id="5815"><span data-dcnode-id="5816" instrument_node="">Buxcey, Mr. John</span></td><td data-dcnode-id="5813"><span data-dcnode-id="5814" instrument_node="">Graduate Student</span></td><td data-dcnode-id="5811"><span data-dcnode-id="5812" instrument_node="">School of Exercise Science, Physical &amp; Health Education</span></td></tr><tr class="Fitness-Athletics--Healthy-Lifestyles School-of-Exercise-Science-Physical--Health-Education S Virtual" data-dcnode-id="5796" role="row"><td data-dcnode-id="5808"><span data-dcnode-id="5809" instrument_node="">Fitness, Athletics &amp; Healthy Lifestyles</span></td><td class="more-info" data-dcnode-id="5803"><a data-dcnode-id="5806" href="#"><span data-dcnode-id="5807" instrument_node="">Personal Health, Wellness and Potential (S) ǂ NEW ◊</span></a><div class="description" data-dcnode-id="5804" style="display: none;"><span data-dcnode-id="5805" instrument_node="">This talk explores lifestyle behaviours which have the power to enhance or diminish your personal potential. We cannot eliminate the stresses of everyday life, but we can make an effort to choose intelligent lifestyle choices that help cultivate a culture of personal wellness. Current wellness models and motivational theories will be reviewed and applied to personal wellness planning. Common health myths are discussed and debunked using factual, well-documented evidence. In this presentation, wellness is seen as a process of becoming aware of and learning to make healthy choices that lead toward a longer and more fulfilling life.</span></div></td><td data-dcnode-id="5801"><span data-dcnode-id="5802" instrument_node="">Buxcey, Mr. John</span></td><td data-dcnode-id="5799"><span data-dcnode-id="5800" instrument_node="">Graduate Student</span></td><td data-dcnode-id="5797"><span data-dcnode-id="5798" instrument_node="">School of Exercise Science, Physical &amp; Health Education</span></td></tr><tr class="Fitness-Athletics--Healthy-Lifestyles School-of-Exercise-Science-Physical--Health-Education E M S Virtual altrow" data-dcnode-id="5782" role="row"><td data-dcnode-id="5794"><span data-dcnode-id="5795" instrument_node="">Fitness, Athletics &amp; Healthy Lifestyles</span></td><td class="more-info" data-dcnode-id="5789"><a data-dcnode-id="5792" href="#"><span data-dcnode-id="5793" instrument_node="">Exercise is Medicine (E M S) ◊</span></a><div class="description" data-dcnode-id="5790" style="display: none;"><span data-dcnode-id="5791" instrument_node="">Physical inactivity is among the top four modifiable risk factors related to non-communicable disease. This talk discusses how exercise and physical activity is effective across all ages (children to seniors) in enhancing health and treating, managing and preventing a large number of chronic diseases.</span></div></td><td data-dcnode-id="5787"><span data-dcnode-id="5788" instrument_node="">Gaul, Dr. Kathy</span></td><td data-dcnode-id="5785"><span data-dcnode-id="5786" instrument_node="">Professor</span></td><td data-dcnode-id="5783"><span data-dcnode-id="5784" instrument_node="">School of Exercise Science, Physical &amp; Health Education</span></td></tr><tr class="Fitness-Athletics--Healthy-Lifestyles School-of-Exercise-Science-Physical--Health-Education E M S Virtual" data-dcnode-id="5768" role="row"><td data-dcnode-id="5780"><span data-dcnode-id="5781" instrument_node="">Fitness, Athletics &amp; Healthy Lifestyles</span></td><td class="more-info" data-dcnode-id="5775"><a data-dcnode-id="5778" href="#"><span data-dcnode-id="5779" instrument_node="">Exercise for Children and Youth (E M S) ◊</span></a><div class="description" data-dcnode-id="5776" style="display: none;"><span data-dcnode-id="5777" instrument_node="">This set of presentations considers the impact regular exercise has on certain aspects of health and life. That might be growth and development of children and youth, regaining or maintaining health in older years, or exercise as a means of counteracting disease (be that prevention or rehabilitation). An underlying theme is that exercise, physical activity and movement are very much like a good medicine that can be taken anytime, anywhere, with a little understanding of its benefits.  </span></div></td><td data-dcnode-id="5773"><span data-dcnode-id="5774" instrument_node="">Gaul, Dr. Kathy</span></td><td data-dcnode-id="5771"><span data-dcnode-id="5772" instrument_node="">Professor</span></td><td data-dcnode-id="5769"><span data-dcnode-id="5770" instrument_node="">School of Exercise Science, Physical &amp; Health Education</span></td></tr><tr class="Fitness-Athletics--Healthy-Lifestyles School-of-Exercise-Science-Physical--Health-Education E M S Virtual altrow" data-dcnode-id="5754" role="row"><td data-dcnode-id="5766"><span data-dcnode-id="5767" instrument_node="">Fitness, Athletics &amp; Healthy Lifestyles</span></td><td class="more-info" data-dcnode-id="5761"><a data-dcnode-id="5764" href="#"><span data-dcnode-id="5765" instrument_node="">Women and Exercise (E M S) ◊</span></a><div class="description" data-dcnode-id="5762" style="display: none;"><span data-dcnode-id="5763" instrument_node="">This presentation considers the impact regular exercise has on certain aspects of health and life. That might be growth and development of children and youth, regaining or maintaining health in older years, exercise as a means of counteracting disease (be that prevention or rehabilitation). An underlying theme is that exercise, physical activity and movement are very much like a good medicine that can be taken anytime, anywhere with a little understanding of its benefits.  </span></div></td><td data-dcnode-id="5759"><span data-dcnode-id="5760" instrument_node="">Gaul, Dr. Kathy</span></td><td data-dcnode-id="5757"><span data-dcnode-id="5758" instrument_node="">Professor</span></td><td data-dcnode-id="5755"><span data-dcnode-id="5756" instrument_node="">School of Exercise Science, Physical &amp; Health Education</span></td></tr><tr class="Fitness-Athletics--Healthy-Lifestyles School-of-Exercise-Science-Physical--Health-Education E M S Virtual" data-dcnode-id="5740" role="row"><td data-dcnode-id="5752"><span data-dcnode-id="5753" instrument_node="">Fitness, Athletics &amp; Healthy Lifestyles</span></td><td class="more-info" data-dcnode-id="5747"><a data-dcnode-id="5750" href="#"><span data-dcnode-id="5751" instrument_node="">Cardiovascular Health (E M S) ◊</span></a><div class="description" data-dcnode-id="5748" style="display: none;"><span data-dcnode-id="5749" instrument_node="">This presentation considers the impact regular exercise has on certain aspects of health and life. That might be growth and development of children and youth, regaining or maintaining health in older years, exercise as a means of counteracting disease (be that prevention or rehabilitation). An underlying theme is that exercise, physical activity and movement are very much like a good medicine that can be taken anytime, anywhere with a little understanding of its benefits.  </span></div></td><td data-dcnode-id="5745"><span data-dcnode-id="5746" instrument_node="">Gaul, Dr. Kathy</span></td><td data-dcnode-id="5743"><span data-dcnode-id="5744" instrument_node="">Professor</span></td><td data-dcnode-id="5741"><span data-dcnode-id="5742" instrument_node="">School of Exercise Science, Physical &amp; Health Education</span></td></tr><tr class="Fitness-Athletics--Healthy-Lifestyles School-of-Exercise-Science-Physical--Health-Education E M S Virtual altrow" data-dcnode-id="5726" role="row"><td data-dcnode-id="5738"><span data-dcnode-id="5739" instrument_node="">Fitness, Athletics &amp; Healthy Lifestyles</span></td><td class="more-info" data-dcnode-id="5733"><a data-dcnode-id="5736" href="#"><span data-dcnode-id="5737" instrument_node="">Exercise is Medicine for People with Chronic Disease (E M S) ◊</span></a><div class="description" data-dcnode-id="5734" style="display: none;"><span data-dcnode-id="5735" instrument_node="">Physical inactivity is among the top four modifiable risk factors related to non-communicable disease. This talk discusses how exercise and physical activity is effective across all ages (children to seniors) in enhancing health and treating, managing and preventing a large number of chronic diseases.</span></div></td><td data-dcnode-id="5731"><span data-dcnode-id="5732" instrument_node="">Gaul, Dr. Kathy</span></td><td data-dcnode-id="5729"><span data-dcnode-id="5730" instrument_node="">Professor</span></td><td data-dcnode-id="5727"><span data-dcnode-id="5728" instrument_node="">School of Exercise Science, Physical &amp; Health Education</span></td></tr><tr class="Fitness-Athletics--Healthy-Lifestyles Department-of-Biochemistry--Microbiology Virtual" data-dcnode-id="5712" role="row"><td data-dcnode-id="5724"><span data-dcnode-id="5725" instrument_node="">Fitness, Athletics &amp; Healthy Lifestyles</span></td><td class="more-info" data-dcnode-id="5719"><a data-dcnode-id="5722" href="#"><span data-dcnode-id="5723" instrument_node="">A Critical Evaluation of Probiotics as Health Supplements ◊</span></a><div class="description" data-dcnode-id="5720" style="display: none;"><span data-dcnode-id="5721" instrument_node="">Claims that live bacterial cultures, known as probiotics, are beneficial to human health date back over 100 years. The health claims associated with these products have ranged from improved digestive function to bolstered immune systems, and the scientific validity for these claims will be critically examined. This presentation will focus mainly on how recent research findings could lead to the development of more effective probiotics.</span></div></td><td data-dcnode-id="5717"><span data-dcnode-id="5718" instrument_node="">Ishiguro, Dr. Edward E.</span></td><td data-dcnode-id="5715"><span data-dcnode-id="5716" instrument_node="">Professor Emeritus</span></td><td data-dcnode-id="5713"><span data-dcnode-id="5714" instrument_node="">Department of Biochemistry &amp; Microbiology</span></td></tr><tr class="Fitness-Athletics--Healthy-Lifestyles School-of-Exercise-Science-Physical--Health-Education S Virtual altrow" data-dcnode-id="5698" role="row"><td data-dcnode-id="5710"><span data-dcnode-id="5711" instrument_node="">Fitness, Athletics &amp; Healthy Lifestyles</span></td><td class="more-info" data-dcnode-id="5705"><a data-dcnode-id="5708" href="#"><span data-dcnode-id="5709" instrument_node="">For the WELLth of It (S) ◊</span></a><div class="description" data-dcnode-id="5706" style="display: none;"><span data-dcnode-id="5707" instrument_node="">Wellness is a special kind of lifestyle. It is something you shape for yourself. This session looks at a number of current wellness models that incorporate Physical Activity, Nutrition, Stress Management, Environmental and Self-Responsibility dimensions. This session is valuable for anyone who finds themselves better at taking care of others than taking care of themselves.</span></div></td><td data-dcnode-id="5703"><span data-dcnode-id="5704" instrument_node="">Lauzon, Dr. Lara</span></td><td data-dcnode-id="5701"><span data-dcnode-id="5702" instrument_node="">Associate Professor</span></td><td data-dcnode-id="5699"><span data-dcnode-id="5700" instrument_node="">School of Exercise Science, Physical &amp; Health Education</span></td></tr><tr class="Fitness-Athletics--Healthy-Lifestyles School-of-Exercise-Science-Physical--Health-Education Virtual" data-dcnode-id="5684" role="row"><td data-dcnode-id="5696"><span data-dcnode-id="5697" instrument_node="">Fitness, Athletics &amp; Healthy Lifestyles</span></td><td class="more-info" data-dcnode-id="5691"><a data-dcnode-id="5694" href="#"><span data-dcnode-id="5695" instrument_node="">Health and Staying Physically Active as One Grows Older ◊</span></a><div class="description" data-dcnode-id="5692" style="display: none;"><span data-dcnode-id="5693" instrument_node="">This presentation addresses the importance of staying active as we grow older dealing with some important health issues in a light hearted way! The presentation will cover the many aspects of health that are improved through a commitment to regular physical activity, including some of the recent research showing the value to cognitive functioning. Simple suggestions for staying active and improving strength will be addressed with time to address specific questions. </span></div></td><td data-dcnode-id="5689"><span data-dcnode-id="5690" instrument_node="">Docherty, Dr. David</span></td><td data-dcnode-id="5687"><span data-dcnode-id="5688" instrument_node="">Professor Emeritus</span></td><td data-dcnode-id="5685"><span data-dcnode-id="5686" instrument_node="">School of Exercise Science, Physical &amp; Health Education</span></td></tr><tr class="Fitness-Athletics--Healthy-Lifestyles School-of-Exercise-Science-Physical--Health-Education Virtual altrow" data-dcnode-id="5670" role="row"><td data-dcnode-id="5682"><span data-dcnode-id="5683" instrument_node="">Fitness, Athletics &amp; Healthy Lifestyles</span></td><td class="more-info" data-dcnode-id="5677"><a data-dcnode-id="5680" href="#"><span data-dcnode-id="5681" instrument_node="">Fun, Fitness and Fatness ◊</span></a><div class="description" data-dcnode-id="5678" style="display: none;"><span data-dcnode-id="5679" instrument_node="">This presentation on fun, fitness and fatness asks the question are you eating right and getting enough physical activity to have health benefits as well as discussing the merits of different types of physical activity. The presentation examines some serious health issues in a light hearted way (no pun intended!).</span></div></td><td data-dcnode-id="5675"><span data-dcnode-id="5676" instrument_node="">Docherty, Dr. David</span></td><td data-dcnode-id="5673"><span data-dcnode-id="5674" instrument_node="">Professor Emeritus</span></td><td data-dcnode-id="5671"><span data-dcnode-id="5672" instrument_node="">School of Exercise Science, Physical &amp; Health Education</span></td></tr><tr class="Fitness-Athletics--Healthy-Lifestyles School-of-Exercise-Science-Physical--Health-Education Virtual" data-dcnode-id="5656" role="row"><td data-dcnode-id="5668"><span data-dcnode-id="5669" instrument_node="">Fitness, Athletics &amp; Healthy Lifestyles</span></td><td class="more-info" data-dcnode-id="5663"><a data-dcnode-id="5666" href="#"><span data-dcnode-id="5667" instrument_node="">Weight Reduction Using Diet and Exercise ◊</span></a><div class="description" data-dcnode-id="5664" style="display: none;"><span data-dcnode-id="5665" instrument_node="">This presentation examines why diets work for the short term but not for the long term and the importance of including exercise in any effort to lose weight. It also addresses some of the challenges that face people trying to lose weight using diets and exercise. </span></div></td><td data-dcnode-id="5661"><span data-dcnode-id="5662" instrument_node="">Docherty, Dr. David</span></td><td data-dcnode-id="5659"><span data-dcnode-id="5660" instrument_node="">Professor Emeritus</span></td><td data-dcnode-id="5657"><span data-dcnode-id="5658" instrument_node="">School of Exercise Science, Physical &amp; Health Education</span></td></tr><tr class="Fitness-Athletics--Healthy-Lifestyles School-of-Exercise-Science-Physical--Health-Education Virtual altrow" data-dcnode-id="5642" role="row"><td data-dcnode-id="5654"><span data-dcnode-id="5655" instrument_node="">Fitness, Athletics &amp; Healthy Lifestyles</span></td><td class="more-info" data-dcnode-id="5649"><a data-dcnode-id="5652" href="#"><span data-dcnode-id="5653" instrument_node="">Back Health for Sport and Daily Living ◊</span></a><div class="description" data-dcnode-id="5650" style="display: none;"><span data-dcnode-id="5651" instrument_node="">Developing the “core” has become very popular for athletes, but also those people who suffer from low back pain or are just interested in having a healthy back. This presentation starts with a quick look at the structure of the back and why it tends to cause problems with one out of every two people. Approaches to exercise are presented that show simple ways to improve stability of the back or spine and how these approaches should be integrated into our daily lives. </span></div></td><td data-dcnode-id="5647"><span data-dcnode-id="5648" instrument_node="">Docherty, Dr. David</span></td><td data-dcnode-id="5645"><span data-dcnode-id="5646" instrument_node="">Professor Emeritus</span></td><td data-dcnode-id="5643"><span data-dcnode-id="5644" instrument_node="">School of Exercise Science, Physical &amp; Health Education</span></td></tr><tr class="Fitness-Athletics--Healthy-Lifestyles School-of-Exercise-Science-Physical--Health-Education Virtual" data-dcnode-id="5628" role="row"><td data-dcnode-id="5640"><span data-dcnode-id="5641" instrument_node="">Fitness, Athletics &amp; Healthy Lifestyles</span></td><td class="more-info" data-dcnode-id="5635"><a data-dcnode-id="5638" href="#"><span data-dcnode-id="5639" instrument_node="">Stepping into Fitness ◊</span></a><div class="description" data-dcnode-id="5636" style="display: none;"><span data-dcnode-id="5637" instrument_node="">This presentation looks at the many benefits of walking and the use of the pedometer in reaching and maintaining goals for physical activity. The use of Nordic poles to assist or complement walking is included as well as a demonstration on how to use them. It also looks at the relationship between stepping and caloric intake and expenditure. </span></div></td><td data-dcnode-id="5633"><span data-dcnode-id="5634" instrument_node="">Docherty, Dr. David</span></td><td data-dcnode-id="5631"><span data-dcnode-id="5632" instrument_node="">Professor Emeritus</span></td><td data-dcnode-id="5629"><span data-dcnode-id="5630" instrument_node="">School of Exercise Science, Physical &amp; Health Education</span></td></tr><tr class="Fitness-Athletics--Healthy-Lifestyles School-of-Exercise-Science-Physical--Health-Education Virtual altrow" data-dcnode-id="5614" role="row"><td data-dcnode-id="5626"><span data-dcnode-id="5627" instrument_node="">Fitness, Athletics &amp; Healthy Lifestyles</span></td><td class="more-info" data-dcnode-id="5621"><a data-dcnode-id="5624" href="#"><span data-dcnode-id="5625" instrument_node="">Boosting or Maintaining Brain Power as You Grow Older ◊</span></a><div class="description" data-dcnode-id="5622" style="display: none;"><span data-dcnode-id="5623" instrument_node="">This presentation looks at ways to maintain or boost brain power through lifestyle choices, especially the role of physical activity which is the number one way to preserve memory and other cognitive functions. </span></div></td><td data-dcnode-id="5619"><span data-dcnode-id="5620" instrument_node="">Docherty, Dr. David</span></td><td data-dcnode-id="5617"><span data-dcnode-id="5618" instrument_node="">Professor Emeritus</span></td><td data-dcnode-id="5615"><span data-dcnode-id="5616" instrument_node="">School of Exercise Science, Physical &amp; Health Education</span></td></tr><tr class="Fitness-Athletics--Healthy-Lifestyles School-of-Exercise-Science-Physical--Health-Education Virtual" data-dcnode-id="5600" role="row"><td data-dcnode-id="5612"><span data-dcnode-id="5613" instrument_node="">Fitness, Athletics &amp; Healthy Lifestyles</span></td><td class="more-info" data-dcnode-id="5607"><a data-dcnode-id="5610" href="#"><span data-dcnode-id="5611" instrument_node="">Exercise as Medicine ◊</span></a><div class="description" data-dcnode-id="5608" style="display: none;"><span data-dcnode-id="5609" instrument_node="">Regular exercise and physical activity has been found to reduce the risk of various health problems an effective way to treat a lot of conditions, especially those associated with getting older. However, there are many immediate benefits from engaging in just one bout of physical activity or exercise. This presentation explores some of the immediate and daily benefits such as controlling blood sugar levels, blood pressure or hypertension, offsetting some aspects of depression and anxiety, as well as decreasing joint and muscle pain. </span></div></td><td data-dcnode-id="5605"><span data-dcnode-id="5606" instrument_node="">Docherty, Dr. David</span></td><td data-dcnode-id="5603"><span data-dcnode-id="5604" instrument_node="">Professor Emeritus</span></td><td data-dcnode-id="5601"><span data-dcnode-id="5602" instrument_node="">School of Exercise Science, Physical &amp; Health Education</span></td></tr><tr class="Fitness-Athletics--Healthy-Lifestyles School-of-Exercise-Science-Physical--Health-Education E M Virtual altrow" data-dcnode-id="5586" role="row"><td data-dcnode-id="5598"><span data-dcnode-id="5599" instrument_node="">Fitness, Athletics &amp; Healthy Lifestyles</span></td><td class="more-info" data-dcnode-id="5593"><a data-dcnode-id="5596" href="#"><span data-dcnode-id="5597" instrument_node="">Your Amazing Brain: A Look at How It Works and What It Does (E M) ◊</span></a><div class="description" data-dcnode-id="5594" style="display: none;"><span data-dcnode-id="5595" instrument_node="">This is an interactive session with lots of Q and A’s and some hands-on learning for younger children.</span></div></td><td data-dcnode-id="5591"><span data-dcnode-id="5592" instrument_node="">Docherty, Dr. David</span></td><td data-dcnode-id="5589"><span data-dcnode-id="5590" instrument_node="">Professor Emeritus</span></td><td data-dcnode-id="5587"><span data-dcnode-id="5588" instrument_node="">School of Exercise Science, Physical &amp; Health Education</span></td></tr><tr class="Fitness-Athletics--Healthy-Lifestyles School-of-Exercise-Science-Physical--Health-Education Virtual" data-dcnode-id="5572" role="row"><td data-dcnode-id="5584"><span data-dcnode-id="5585" instrument_node="">Fitness, Athletics &amp; Healthy Lifestyles</span></td><td class="more-info" data-dcnode-id="5579"><a data-dcnode-id="5582" href="#"><span data-dcnode-id="5583" instrument_node="">The Benefits of High Intensity Interval Training (HIIT) for Adult and Older Populations ◊</span></a><div class="description" data-dcnode-id="5580" style="display: none;"><span data-dcnode-id="5581" instrument_node="">High intensity interval training (HIIT) has become increasingly popular in the last few years. This presentation looks into the research that supports this type of training and how it has been used by different populations from athletes to older demographics. Examples will be provided of the different work and active recovery ratios that are supported by the research as well as the type of activities that have been used.</span></div></td><td data-dcnode-id="5577"><span data-dcnode-id="5578" instrument_node="">Docherty, Dr. David</span></td><td data-dcnode-id="5575"><span data-dcnode-id="5576" instrument_node="">Professor Emeritus</span></td><td data-dcnode-id="5573"><span data-dcnode-id="5574" instrument_node="">School of Exercise Science, Physical &amp; Health Education</span></td></tr><tr class="Fitness-Athletics--Healthy-Lifestyles School-of-Exercise-Science-Physical--Health-Education Virtual altrow" data-dcnode-id="5558" role="row"><td data-dcnode-id="5570"><span data-dcnode-id="5571" instrument_node="">Fitness, Athletics &amp; Healthy Lifestyles</span></td><td class="more-info" data-dcnode-id="5565"><a data-dcnode-id="5568" href="#"><span data-dcnode-id="5569" instrument_node="">Getting Stronger: You’re Never Too Old ◊</span></a><div class="description" data-dcnode-id="5566" style="display: none;"><span data-dcnode-id="5567" instrument_node="">Strength training is important for all age groups, including the elderly. This presentation looks at the many benefits that can be derived from a strength training routine and provides sample programs using theraband exercises designed for older groups as well as simple exercises to help balance. This presentation includes the opportunity to try some of the strength exercises for the upper body and legs. </span></div></td><td data-dcnode-id="5563"><span data-dcnode-id="5564" instrument_node="">Docherty, Dr. David</span></td><td data-dcnode-id="5561"><span data-dcnode-id="5562" instrument_node="">Professor Emeritus</span></td><td data-dcnode-id="5559"><span data-dcnode-id="5560" instrument_node="">School of Exercise Science, Physical &amp; Health Education</span></td></tr><tr class="Fitness-Athletics--Healthy-Lifestyles School-of-Exercise-Science-Physical--Health-Education E M S Virtual" data-dcnode-id="5544" role="row"><td data-dcnode-id="5556"><span data-dcnode-id="5557" instrument_node="">Fitness, Athletics &amp; Healthy Lifestyles</span></td><td class="more-info" data-dcnode-id="5551"><a data-dcnode-id="5554" href="#"><span data-dcnode-id="5555" instrument_node="">Cardiovascular Health ǂ (E M S) NEW ◊</span></a><div class="description" data-dcnode-id="5552" style="display: none;"><span data-dcnode-id="5553" instrument_node="">Keeping our hearts and blood vessels healthy is essential for our overall health, well-being and quality of life. This talk examines how different types of exercise can be beneficial for our cardiovascular system. We will discuss the importance of keeping our bodies moving and discuss tips of how we can incorporate movement into our daily routines.
</span></div></td><td data-dcnode-id="5549"><span data-dcnode-id="5550" instrument_node="">Craig, Ms. Tabitha</span></td><td data-dcnode-id="5547"><span data-dcnode-id="5548" instrument_node="">Graduate Student</span></td><td data-dcnode-id="5545"><span data-dcnode-id="5546" instrument_node="">School of Exercise Science, Physical &amp; Health Education</span></td></tr><tr class="Global-Affairs Department-of-Political-Science M S Virtual altrow" data-dcnode-id="5530" role="row"><td data-dcnode-id="5542"><span data-dcnode-id="5543" instrument_node="">Global Affairs</span></td><td class="more-info" data-dcnode-id="5537"><a data-dcnode-id="5540" href="#"><span data-dcnode-id="5541" instrument_node="">Made in Africa: Will Garment Production Create Good Jobs in Africa? (M S) NEW ◊ </span></a><div class="description" data-dcnode-id="5538" style="display: none;"><span data-dcnode-id="5539" instrument_node="">My work explores the politics of the contemporary clothing industry to investigate the complexities of one of the largest and most global industries. I trace both historic and contemporary exploitation in the industry with an emphasis on sweatshops, and how work, production and consumption have been increasingly driven by large retailers and buyers. Depending on the presentation, I examine the environmental and workplace problems associated with the industry. </span></div></td><td data-dcnode-id="5535"><span data-dcnode-id="5536" instrument_node="">Clarke, Dr. Marlea</span></td><td data-dcnode-id="5533"><span data-dcnode-id="5534" instrument_node="">Associate Professor</span></td><td data-dcnode-id="5531"><span data-dcnode-id="5532" instrument_node="">Department of Political Science</span></td></tr><tr class="Global-Affairs Department-of-Political-Science M S Virtual" data-dcnode-id="5516" role="row"><td data-dcnode-id="5528"><span data-dcnode-id="5529" instrument_node="">Global Affairs</span></td><td class="more-info" data-dcnode-id="5523"><a data-dcnode-id="5526" href="#"><span data-dcnode-id="5527" instrument_node="">Students, Youth and International Development: Opportunities for Engagement (M S) NEW ◊ </span></a><div class="description" data-dcnode-id="5524" style="display: none;"><span data-dcnode-id="5525" instrument_node="">"</span></div></td><td data-dcnode-id="5521"><span data-dcnode-id="5522" instrument_node="">Clarke, Dr. Marlea</span></td><td data-dcnode-id="5519"><span data-dcnode-id="5520" instrument_node="">Associate Professor</span></td><td data-dcnode-id="5517"><span data-dcnode-id="5518" instrument_node="">Department of Political Science</span></td></tr><tr class="Global-Affairs Peter-B-Gustavson-School-of-Business S Virtual altrow" data-dcnode-id="5502" role="row"><td data-dcnode-id="5514"><span data-dcnode-id="5515" instrument_node="">Global Affairs</span></td><td class="more-info" data-dcnode-id="5509"><a data-dcnode-id="5512" href="#"><span data-dcnode-id="5513" instrument_node="">How Does Immigration Impact Communities? (in English or Hindi) (S) ◊</span></a><div class="description" data-dcnode-id="5510" style="display: none;"><span data-dcnode-id="5511" instrument_node="">This talk looks at current research on how partnerships between locals and immigrants are structured in Canada and their impact on communities. Given the fairly ambitious immigration targets set by the government and the possible concerns around immigration, it would potentially help everyone concerned to unpack these issues; and lead to a more objective view about immigration into Canada.  </span></div></td><td data-dcnode-id="5507"><span data-dcnode-id="5508" instrument_node="">Nair, Dr. Sudhir</span></td><td data-dcnode-id="5505"><span data-dcnode-id="5506" instrument_node="">Associate Professor</span></td><td data-dcnode-id="5503"><span data-dcnode-id="5504" instrument_node="">Peter B. Gustavson School of Business</span></td></tr><tr class="Global-Affairs Centre-for-Asia-Pacific-Initiatives S Virtual" data-dcnode-id="5488" role="row"><td data-dcnode-id="5500"><span data-dcnode-id="5501" instrument_node="">Global Affairs</span></td><td class="more-info" data-dcnode-id="5495"><a data-dcnode-id="5498" href="#"><span data-dcnode-id="5499" instrument_node="">Intercultural Education (S) ◊</span></a><div class="description" data-dcnode-id="5496" style="display: none;"><span data-dcnode-id="5497" instrument_node="">Young Canadians need knowledge, skills and experience to succeed in today’s complex and competitive world. Cross-cultural and international relationships with emerging countries and people from other parts of the world are becoming increasingly important to Canada’s continued success. The current generation of young Canadians will need to be comfortable working with people from different backgrounds. They will need self-awareness and self-confidence, a willingness to take smart risks, and knowledge of the world and other societies.</span></div></td><td data-dcnode-id="5493"><span data-dcnode-id="5494" instrument_node="">Fila, Ms. Robyn</span></td><td data-dcnode-id="5491"><span data-dcnode-id="5492" instrument_node="">International Internship Program Manager</span></td><td data-dcnode-id="5489"><span data-dcnode-id="5490" instrument_node="">Centre for Asia-Pacific Initiatives</span></td></tr><tr class="Global-Affairs Centre-for-Asia-Pacific-Initiatives S Virtual altrow" data-dcnode-id="5474" role="row"><td data-dcnode-id="5486"><span data-dcnode-id="5487" instrument_node="">Global Affairs</span></td><td class="more-info" data-dcnode-id="5481"><a data-dcnode-id="5484" href="#"><span data-dcnode-id="5485" instrument_node="">Global Education (S) ◊ </span></a><div class="description" data-dcnode-id="5482" style="display: none;"><span data-dcnode-id="5483" instrument_node="">Young Canadians need knowledge, skills and experience to succeed in today’s complex and competitive world. Cross-cultural and international relationships with emerging countries and people from other parts of the world are becoming increasingly important to Canada’s continued success. The current generation of young Canadians will need to be comfortable working with people from different backgrounds. They will need self-awareness and self-confidence, a willingness to take smart risks, and knowledge of the world and other societies.</span></div></td><td data-dcnode-id="5479"><span data-dcnode-id="5480" instrument_node="">Fila, Ms. Robyn</span></td><td data-dcnode-id="5477"><span data-dcnode-id="5478" instrument_node="">International Internship Program Manager</span></td><td data-dcnode-id="5475"><span data-dcnode-id="5476" instrument_node="">Centre for Asia-Pacific Initiatives</span></td></tr><tr class="Global-Affairs Centre-for-Asia-Pacific-Initiatives S Virtual" data-dcnode-id="5460" role="row"><td data-dcnode-id="5472"><span data-dcnode-id="5473" instrument_node="">Global Affairs</span></td><td class="more-info" data-dcnode-id="5467"><a data-dcnode-id="5470" href="#"><span data-dcnode-id="5471" instrument_node="">International Experiential Learning (S) ◊</span></a><div class="description" data-dcnode-id="5468" style="display: none;"><span data-dcnode-id="5469" instrument_node="">Young Canadians need knowledge, skills and experience to succeed in today’s complex and competitive world. Cross-cultural and international relationships with emerging countries and people from other parts of the world are becoming increasingly important to Canada’s continued success. The current generation of young Canadians will need to be comfortable working with people from different backgrounds. They will need self-awareness and self-confidence, a willingness to take smart risks, and knowledge of the world and other societies.</span></div></td><td data-dcnode-id="5465"><span data-dcnode-id="5466" instrument_node="">Fila, Ms. Robyn</span></td><td data-dcnode-id="5463"><span data-dcnode-id="5464" instrument_node="">International Internship Program Manager</span></td><td data-dcnode-id="5461"><span data-dcnode
