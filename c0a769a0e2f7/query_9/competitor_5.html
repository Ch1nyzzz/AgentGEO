-id="5462" instrument_node="">Centre for Asia-Pacific Initiatives</span></td></tr><tr class="Global-Affairs Centre-for-Asia-Pacific-Initiatives S Virtual altrow" data-dcnode-id="5446" role="row"><td data-dcnode-id="5458"><span data-dcnode-id="5459" instrument_node="">Global Affairs</span></td><td class="more-info" data-dcnode-id="5453"><a data-dcnode-id="5456" href="#"><span data-dcnode-id="5457" instrument_node="">International Internships (S) ◊</span></a><div class="description" data-dcnode-id="5454" style="display: none;"><span data-dcnode-id="5455" instrument_node="">Young Canadians need knowledge, skills and experience to succeed in today’s complex and competitive world. Cross-cultural and international relationships with emerging countries and people from other parts of the world are becoming increasingly important to Canada’s continued success. The current generation of young Canadians will need to be comfortable working with people from different backgrounds. They will need self-awareness and self-confidence, a willingness to take smart risks, and knowledge of the world and other societies.</span></div></td><td data-dcnode-id="5451"><span data-dcnode-id="5452" instrument_node="">Fila, Ms. Robyn</span></td><td data-dcnode-id="5449"><span data-dcnode-id="5450" instrument_node="">International Internship Program Manager</span></td><td data-dcnode-id="5447"><span data-dcnode-id="5448" instrument_node="">Centre for Asia-Pacific Initiatives</span></td></tr><tr class="Global-Affairs Centre-for-Asia-Pacific-Initiatives S Virtual" data-dcnode-id="5432" role="row"><td data-dcnode-id="5444"><span data-dcnode-id="5445" instrument_node="">Global Affairs</span></td><td class="more-info" data-dcnode-id="5439"><a data-dcnode-id="5442" href="#"><span data-dcnode-id="5443" instrument_node="">Civil Society in the Global South (S) ◊</span></a><div class="description" data-dcnode-id="5440" style="display: none;"><span data-dcnode-id="5441" instrument_node="">Young Canadians need knowledge, skills and experience to succeed in today’s complex and competitive world. Cross-cultural and international relationships with emerging countries and people from other parts of the world are becoming increasingly important to Canada’s continued success. The current generation of young Canadians will need to be comfortable working with people from different backgrounds. They will need self-awareness and self-confidence, a willingness to take smart risks, and knowledge of the world and other societies.</span></div></td><td data-dcnode-id="5437"><span data-dcnode-id="5438" instrument_node="">Fila, Ms. Robyn</span></td><td data-dcnode-id="5435"><span data-dcnode-id="5436" instrument_node="">International Internship Program Manager</span></td><td data-dcnode-id="5433"><span data-dcnode-id="5434" instrument_node="">Centre for Asia-Pacific Initiatives</span></td></tr><tr class="Global-Affairs Department-of-Political-Science Virtual altrow" data-dcnode-id="5418" role="row"><td data-dcnode-id="5430"><span data-dcnode-id="5431" instrument_node="">Global Affairs</span></td><td class="more-info" data-dcnode-id="5425"><a data-dcnode-id="5428" href="#"><span data-dcnode-id="5429" instrument_node="">India and the Kashmir Issue ◊</span></a><div class="description" data-dcnode-id="5426" style="display: none;"><span data-dcnode-id="5427" instrument_node="">By revoking the special constitutional status of Jammu and Kashmir state (Article 371), the Indian government has shrunk the space for minorities, particularly Muslims. Kashmiri Muslims have, for more than seven decades, been proactive in seeking to guard their special status and their collective identity. The consequences of all this cannot be anything but the increasing alienation of the valley’s Muslims. &nbsp;</span></div></td><td data-dcnode-id="5423"><span data-dcnode-id="5424" instrument_node="">Tremblay, Dr. Reeta</span></td><td data-dcnode-id="5421"><span data-dcnode-id="5422" instrument_node="">Professor</span></td><td data-dcnode-id="5419"><span data-dcnode-id="5420" instrument_node="">Department of Political Science</span></td></tr><tr class="Global-Affairs Department-of-Political-Science Virtual" data-dcnode-id="5404" role="row"><td data-dcnode-id="5416"><span data-dcnode-id="5417" instrument_node="">Global Affairs</span></td><td class="more-info" data-dcnode-id="5411"><a data-dcnode-id="5414" href="#"><span data-dcnode-id="5415" instrument_node="">Multiculturalism in South Asia-a Comparative Perspective ◊</span></a><div class="description" data-dcnode-id="5412" style="display: none;"><span data-dcnode-id="5413" instrument_node="">Design of a political, constitutional framework in a religiously, linguistically divided society and the rise of Hindu fundamentalism.</span></div></td><td data-dcnode-id="5409"><span data-dcnode-id="5410" instrument_node="">Tremblay, Dr. Reeta</span></td><td data-dcnode-id="5407"><span data-dcnode-id="5408" instrument_node="">Professor</span></td><td data-dcnode-id="5405"><span data-dcnode-id="5406" instrument_node="">Department of Political Science</span></td></tr><tr class="Global-Affairs Department-of-Political-Science Virtual altrow" data-dcnode-id="5390" role="row"><td data-dcnode-id="5402"><span data-dcnode-id="5403" instrument_node="">Global Affairs</span></td><td class="more-info" data-dcnode-id="5397"><a data-dcnode-id="5400" href="#"><span data-dcnode-id="5401" instrument_node="">Regional Security and Peace in South Asia ◊</span></a><div class="description" data-dcnode-id="5398" style="display: none;"><span data-dcnode-id="5399" instrument_node="">Enduring rivalry between India and Pakistan and the prospects of peace in Afghanistan - Pakistan and the Taliban.</span></div></td><td data-dcnode-id="5395"><span data-dcnode-id="5396" instrument_node="">Tremblay, Dr. Reeta</span></td><td data-dcnode-id="5393"><span data-dcnode-id="5394" instrument_node="">Professor</span></td><td data-dcnode-id="5391"><span data-dcnode-id="5392" instrument_node="">Department of Political Science</span></td></tr><tr class="Global-Affairs Department-of-Political-Science Virtual" data-dcnode-id="5376" role="row"><td data-dcnode-id="5388"><span data-dcnode-id="5389" instrument_node="">Global Affairs</span></td><td class="more-info" data-dcnode-id="5383"><a data-dcnode-id="5386" href="#"><span data-dcnode-id="5387" instrument_node="">COVID-19 in India NEW ◊ </span></a><div class="description" data-dcnode-id="5384" style="display: none;"><span data-dcnode-id="5385" instrument_node="">Explains the surge in COVID infections and deaths in India and exploring ‘what went wrong’.</span></div></td><td data-dcnode-id="5381"><span data-dcnode-id="5382" instrument_node="">Tremblay, Dr. Reeta</span></td><td data-dcnode-id="5379"><span data-dcnode-id="5380" instrument_node="">Professor</span></td><td data-dcnode-id="5377"><span data-dcnode-id="5378" instrument_node="">Department of Political Science</span></td></tr><tr class="Global-Affairs Department-of-Political-Science M S Virtual altrow" data-dcnode-id="5362" role="row"><td data-dcnode-id="5374"><span data-dcnode-id="5375" instrument_node="">Global Affairs</span></td><td class="more-info" data-dcnode-id="5369"><a data-dcnode-id="5372" href="#"><span data-dcnode-id="5373" instrument_node="">Dealing with the COVID-19 Pandemic in European Union (in English or Dutch) (M S) NEW ◊</span></a><div class="description" data-dcnode-id="5370" style="display: none;"><span data-dcnode-id="5371" instrument_node="">The European Union (EU) was among the first to be severely affected by the global COVID pandemic. This is complex, because health is a decentralized responsibility in the EU. The pandemic demanded a rethink of those responsibilities and questions around solidarity and financial support. A large budget was approved. How should we understand that, and what will be the future?</span></div></td><td data-dcnode-id="5367"><span data-dcnode-id="5368" instrument_node="">Verdun, Dr. Amy</span></td><td data-dcnode-id="5365"><span data-dcnode-id="5366" instrument_node="">Professor</span></td><td data-dcnode-id="5363"><span data-dcnode-id="5364" instrument_node="">Department of Political Science</span></td></tr><tr class="Global-Affairs Department-of-Political-Science M S Virtual" data-dcnode-id="5348" role="row"><td data-dcnode-id="5360"><span data-dcnode-id="5361" instrument_node="">Global Affairs</span></td><td class="more-info" data-dcnode-id="5355"><a data-dcnode-id="5358" href="#"><span data-dcnode-id="5359" instrument_node="">The Past, Present and Future of the Single European Currency (in English or Dutch) (M S) NEW ◊</span></a><div class="description" data-dcnode-id="5356" style="display: none;"><span data-dcnode-id="5357" instrument_node="">The European single currency-the Euro-has been around for two decades. During the years 2012-15, some thought the Euro area would collapse. So how stable is the Euro? Will the Euro at some point disappear, will other countries leave the Euro area, or will we more likely see others adopt it? </span></div></td><td data-dcnode-id="5353"><span data-dcnode-id="5354" instrument_node="">Verdun, Dr. Amy</span></td><td data-dcnode-id="5351"><span data-dcnode-id="5352" instrument_node="">Professor</span></td><td data-dcnode-id="5349"><span data-dcnode-id="5350" instrument_node="">Department of Political Science</span></td></tr><tr class="Global-Affairs Department-of-Political-Science M S Virtual altrow" data-dcnode-id="5334" role="row"><td data-dcnode-id="5346"><span data-dcnode-id="5347" instrument_node="">Global Affairs</span></td><td class="more-info" data-dcnode-id="5341"><a data-dcnode-id="5344" href="#"><span data-dcnode-id="5345" instrument_node="">Towards a Federal Europe: Democracy in the 21st Century (in English or Dutch) (M S) NEW ◊</span></a><div class="description" data-dcnode-id="5342" style="display: none;"><span data-dcnode-id="5343" instrument_node="">The European Union (EU) is neither a federal state nor an international organization-it is something in between. What do we make of this entity? Should we expect the EU to develop into a proper state or remain a collection of nation states? How do its citizens relate to it?</span></div></td><td data-dcnode-id="5339"><span data-dcnode-id="5340" instrument_node="">Verdun, Dr. Amy</span></td><td data-dcnode-id="5337"><span data-dcnode-id="5338" instrument_node="">Professor</span></td><td data-dcnode-id="5335"><span data-dcnode-id="5336" instrument_node="">Department of Political Science</span></td></tr><tr class="Global-Affairs School-of-Public-Administration Virtual" data-dcnode-id="5320" role="row"><td data-dcnode-id="5332"><span data-dcnode-id="5333" instrument_node="">Global Affairs</span></td><td class="more-info" data-dcnode-id="5327"><a data-dcnode-id="5330" href="#"><span data-dcnode-id="5331" instrument_node="">Brexit: The British Exit and the Future of the European Union (in English or French) NEW ◊</span></a><div class="description" data-dcnode-id="5328" style="display: none;"><span data-dcnode-id="5329" instrument_node="">In 2020, Britain and the European Union signed a treaty to implement their separation. This treaty is a very complex set of rules and regulations, as well as institutions, that maintain their relationship. This talk discusses this burgeoning relationship and its futures.</span></div></td><td data-dcnode-id="5325"><span data-dcnode-id="5326" instrument_node="">Brunet-Jailly, Dr. Emmanuel</span></td><td data-dcnode-id="5323"><span data-dcnode-id="5324" instrument_node="">Professor and Jean Monnet Chair</span></td><td data-dcnode-id="5321"><span data-dcnode-id="5322" instrument_node="">School of Public Administration</span></td></tr><tr class="Global-Affairs School-of-Public-Administration Virtual altrow" data-dcnode-id="5306" role="row"><td data-dcnode-id="5318"><span data-dcnode-id="5319" instrument_node="">Global Affairs</span></td><td class="more-info" data-dcnode-id="5313"><a data-dcnode-id="5316" href="#"><span data-dcnode-id="5317" instrument_node="">Europe's Borders and Migration Issues (in English or French) NEW ◊</span></a><div class="description" data-dcnode-id="5314" style="display: none;"><span data-dcnode-id="5315" instrument_node="">In 2014-15, the European Union was the site of new massive mobility in which approximately 1.2 million people entered the Union. This talk presents the history of this situation and impact on the 27 EU member states, as well as their peripheries-Central Europe, the Middle East and Maghreb. </span></div></td><td data-dcnode-id="5311"><span data-dcnode-id="5312" instrument_node="">Brunet-Jailly, Dr. Emmanuel</span></td><td data-dcnode-id="5309"><span data-dcnode-id="5310" instrument_node="">Professor and Jean Monnet Chair</span></td><td data-dcnode-id="5307"><span data-dcnode-id="5308" instrument_node="">School of Public Administration</span></td></tr><tr class="Global-Affairs School-of-Public-Administration Virtual" data-dcnode-id="5292" role="row"><td data-dcnode-id="5304"><span data-dcnode-id="5305" instrument_node="">Global Affairs</span></td><td class="more-info" data-dcnode-id="5299"><a data-dcnode-id="5302" href="#"><span data-dcnode-id="5303" instrument_node="">Canada’s Relationship with the European Union (in English or French) NEW ◊</span></a><div class="description" data-dcnode-id="5300" style="display: none;"><span data-dcnode-id="5301" instrument_node="">Canada and the European Union signed the Comprehensive Economic and Trade Agreement in 2016. This treaty changes Canada’s relationship with the Union in many areas of trade. This talk presents and analyses the CETA. </span></div></td><td data-dcnode-id="5297"><span data-dcnode-id="5298" instrument_node="">Brunet-Jailly, Dr. Emmanuel</span></td><td data-dcnode-id="5295"><span data-dcnode-id="5296" instrument_node="">Professor and Jean Monnet Chair</span></td><td data-dcnode-id="5293"><span data-dcnode-id="5294" instrument_node="">School of Public Administration</span></td></tr><tr class="Global-Affairs School-of-Public-Administration Virtual altrow" data-dcnode-id="5278" role="row"><td data-dcnode-id="5290"><span data-dcnode-id="5291" instrument_node="">Global Affairs</span></td><td class="more-info" data-dcnode-id="5285"><a data-dcnode-id="5288" href="#"><span data-dcnode-id="5289" instrument_node="">Border and Mobility Issues Straddling Canada and the United States (in English or French) NEW ◊</span></a><div class="description" data-dcnode-id="5286" style="display: none;"><span data-dcnode-id="5287" instrument_node="">Is the longest undefended border dividing Canada and the United States still really ‘undefended’? This talk presents and discusses the various policies implemented in borderlands straddling the international boundary line which organize both trade and mobility.</span></div></td><td data-dcnode-id="5283"><span data-dcnode-id="5284" instrument_node="">Brunet-Jailly, Dr. Emmanuel</span></td><td data-dcnode-id="5281"><span data-dcnode-id="5282" instrument_node="">Professor and Jean Monnet Chair</span></td><td data-dcnode-id="5279"><span data-dcnode-id="5280" instrument_node="">School of Public Administration</span></td></tr><tr class="Global-Affairs School-of-Public-Administration Virtual" data-dcnode-id="5264" role="row"><td data-dcnode-id="5276"><span data-dcnode-id="5277" instrument_node="">Global Affairs</span></td><td class="more-info" data-dcnode-id="5271"><a data-dcnode-id="5274" href="#"><span data-dcnode-id="5275" instrument_node="">Borders and Mobility in the Pacific Northwest-the Cascadia Region (in English or French) NEW ◊</span></a><div class="description" data-dcnode-id="5272" style="display: none;"><span data-dcnode-id="5273" instrument_node="">The Pacific Northwest, also known as the Cascadia region, is both divided by an international boundary line as well as intensely crossed by trade and mobility activities. This talk is both documenting and discussing those.</span></div></td><td data-dcnode-id="5269"><span data-dcnode-id="5270" instrument_node="">Brunet-Jailly, Dr. Emmanuel</span></td><td data-dcnode-id="5267"><span data-dcnode-id="5268" instrument_node="">Professor and Jean Monnet Chair</span></td><td data-dcnode-id="5265"><span data-dcnode-id="5266" instrument_node="">School of Public Administration</span></td></tr><tr class="Global-Affairs School-of-Public-Administration Virtual altrow" data-dcnode-id="5250" role="row"><td data-dcnode-id="5262"><span data-dcnode-id="5263" instrument_node="">Global Affairs</span></td><td class="more-info" data-dcnode-id="5257"><a data-dcnode-id="5260" href="#"><span data-dcnode-id="5261" instrument_node="">European Union in the 21st Century (in English or French) NEW ◊</span></a><div class="description" data-dcnode-id="5258" style="display: none;"><span data-dcnode-id="5259" instrument_node="">At the beginning of the 21st century, the European Union and its 27 member states, are a rising international power that is progressively speaking in one voice to the rest of the world.  This presentation details how this has happened over the last 50 years. </span></div></td><td data-dcnode-id="5255"><span data-dcnode-id="5256" instrument_node="">Brunet-Jailly, Dr. Emmanuel</span></td><td data-dcnode-id="5253"><span data-dcnode-id="5254" instrument_node="">Professor and Jean Monnet Chair</span></td><td data-dcnode-id="5251"><span data-dcnode-id="5252" instrument_node="">School of Public Administration</span></td></tr><tr class="Global-Affairs Department-of-Social-Work Virtual" data-dcnode-id="5236" role="row"><td data-dcnode-id="5248"><span data-dcnode-id="5249" instrument_node="">Global Affairs</span></td><td class="more-info" data-dcnode-id="5243"><a data-dcnode-id="5246" href="#"><span data-dcnode-id="5247" instrument_node="">Ethiopia: UVic Partnerships in Human Rights and Social Work Education ◊</span></a><div class="description" data-dcnode-id="5244" style="display: none;"><span data-dcnode-id="5245" instrument_node="">In the last 10 years UVic and Addis Ababa University have forged many creative and useful links. Educators from Ethiopia have traveled to Victoria and interned with various professors and human rights educators. UVic faculty have traveled to Ethiopia and had the opportunity to learn and teach there. Dealing with conflict in the context of culture, the development of teaching capacity and exchanging knowledge and life experience have enriched educators here and hopefully in Ethiopia.</span></div></td><td data-dcnode-id="5241"><span data-dcnode-id="5242" instrument_node="">Whittington, Dr. Barbara</span></td><td data-dcnode-id="5239"><span data-dcnode-id="5240" instrument_node="">Professor Emerita</span></td><td data-dcnode-id="5237"><span data-dcnode-id="5238" instrument_node="">Department of Social Work</span></td></tr><tr class="Global-Affairs School-of-Public-Administration S Virtual altrow" data-dcnode-id="5222" role="row"><td data-dcnode-id="5234"><span data-dcnode-id="5235" instrument_node="">Global Affairs</span></td><td class="more-info" data-dcnode-id="5229"><a data-dcnode-id="5232" href="#"><span data-dcnode-id="5233" instrument_node="">International Perspectives on Social Responsibility and Higher Education (S) ◊</span></a><div class="description" data-dcnode-id="5230" style="display: none;"><span data-dcnode-id="5231" instrument_node="">Budd Hall is a Professor Emeritus at UVic who has had a career in adult education, community-development and participatory research. He is the Co-Chair of the UNESCO Chair in Community-Based Research and Social Responsibility in Higher Education. His current focus is on training young people for doing locally based participatory research and supporting the strengthening of community-university research partnerships. He is also a poet and part of the Victoria Social Movement Poets Collective.</span></div></td><td data-dcnode-id="5227"><span data-dcnode-id="5228" instrument_node="">Hall, Prof. Budd</span></td><td data-dcnode-id="5225"><span data-dcnode-id="5226" instrument_node="">Professor Emeritus </span></td><td data-dcnode-id="5223"><span data-dcnode-id="5224" instrument_node="">School of Public Administration</span></td></tr><tr class="Global-Affairs UVic-Retirees-Association S Virtual" data-dcnode-id="5208" role="row"><td data-dcnode-id="5220"><span data-dcnode-id="5221" instrument_node="">Global Affairs</span></td><td class="more-info" data-dcnode-id="5215"><a data-dcnode-id="5218" href="#"><span data-dcnode-id="5219" instrument_node="">A Just Global Order (S) NEW ◊</span></a><div class="description" data-dcnode-id="5216" style="display: none;"><span data-dcnode-id="5217" instrument_node="">Global issues demand global solutions, but the structure of the United Nations is not adequate for the scale of challenges we face today. The movement to reform or replace the UN is exciting and inspiring because changes are already happening.</span></div></td><td data-dcnode-id="5213"><span data-dcnode-id="5214" instrument_node="">Ashford, Dr. Mary-Wynne</span></td><td data-dcnode-id="5211"><span data-dcnode-id="5212" instrument_node="">Retiree</span></td><td data-dcnode-id="5209"><span data-dcnode-id="5210" instrument_node="">UVic Retirees Association</span></td></tr><tr class="Health-Care--Medicine Department-of-Educational-Psychology--Leadership-Studies Virtual altrow" data-dcnode-id="5194" role="row"><td data-dcnode-id="5206"><span data-dcnode-id="5207" instrument_node="">Health Care &amp; Medicine</span></td><td class="more-info" data-dcnode-id="5201"><a data-dcnode-id="5204" href="#"><span data-dcnode-id="5205" instrument_node="">Organizational Resilience and Compassionate Leadership: Transforming Healthcare Organizations During COVID-19 and Beyond ǂ NEW ◊</span></a><div class="description" data-dcnode-id="5202" style="display: none;"><span data-dcnode-id="5203" instrument_node="">Healthcare workers (HCWs) have shown extraordinary courage through the COVID-19 pandemic, risking their lives and the lives of loved ones, while watching fellow human beings become seriously ill or die. There are anticipated long-term mental health impacts due to the COVID-19 pandemic, particularly for those working on the front lines. As helping professionals, there are significant physical and emotional demands placed on HCWs, more than on the general public. A review of the literature indicates there is a dire need for healthcare organizations (HCOs) to support HCWs’ well-being. Organizational resilience is a systemic approach to alleviating suffering within HCOs. I propose a group-based program, Leaders Transforming HCOs, to engage leaders in cultivating compassion and resilience in the workplace. Potential outcomes for HCOs include enhancing psychological safety, staff retention, and improving the quality of care for patients. The upcoming mental health crisis among HCWs will take an additional toll on our fragile public healthcare system. By creating resilient HCOs, positive adaptation to crises becomes the new normal.&nbsp;</span></div></td><td data-dcnode-id="5199"><span data-dcnode-id="5200" instrument_node="">Karwandy, Ms. Lois</span></td><td data-dcnode-id="5197"><span data-dcnode-id="5198" instrument_node="">Graduate Student</span></td><td data-dcnode-id="5195"><span data-dcnode-id="5196" instrument_node="">Department of Educational Psychology &amp; Leadership Studies</span></td></tr><tr class="Health-Care--Medicine Island-Medical-Program S Virtual" data-dcnode-id="5180" role="row"><td data-dcnode-id="5192"><span data-dcnode-id="5193" instrument_node="">Health Care &amp; Medicine</span></td><td class="more-info" data-dcnode-id="5187"><a data-dcnode-id="5190" href="#"><span data-dcnode-id="5191" instrument_node="">COVID-19: Updates on the Management of Critically Ill Patients with COVID-19 (S) NEW ◊</span></a><div class="description" data-dcnode-id="5188" style="display: none;"><span data-dcnode-id="5189" instrument_node="">This talk describes the intensive care unit (ICU) experience of patients with COVID-19, and how deadly is can be. </span></div></td><td data-dcnode-id="5185"><span data-dcnode-id="5186" instrument_node="">Ovakim, Dr. Daniel</span></td><td data-dcnode-id="5183"><span data-dcnode-id="5184" instrument_node="">Adjunct Assistant Professor</span></td><td data-dcnode-id="5181"><span data-dcnode-id="5182" instrument_node="">Island Medical Program</span></td></tr><tr class="Health-Care--Medicine School-of-Nursing S Virtual altrow" data-dcnode-id="5166" role="row"><td data-dcnode-id="5178"><span data-dcnode-id="5179" instrument_node="">Health Care &amp; Medicine</span></td><td class="more-info" data-dcnode-id="5173"><a data-dcnode-id="5176" href="#"><span data-dcnode-id="5177" instrument_node="">Integration of Advanced Practice Nurses into the Canadian Health Care System (S) ◊</span></a><div class="description" data-dcnode-id="5174" style="display: none;"><span data-dcnode-id="5175" instrument_node="">The speaker’s professional research areas include health promotion, informatics, health policy, political action and advocacy, especially as it relates to the role of advanced practice nurse integration and utilization in the Canadian healthcare system.</span></div></td><td data-dcnode-id="5171"><span data-dcnode-id="5172" instrument_node="">Marchuk, Dr. Stan</span></td><td data-dcnode-id="5169"><span data-dcnode-id="5170" instrument_node="">Adjunct Associate Professor</span></td><td data-dcnode-id="5167"><span data-dcnode-id="5168" instrument_node="">School of Nursing</span></td></tr><tr class="Health-Care--Medicine School-of-Nursing S Virtual" data-dcnode-id="5152" role="row"><td data-dcnode-id="5164"><span data-dcnode-id="5165" instrument_node="">Health Care &amp; Medicine</span></td><td class="more-info" data-dcnode-id="5159"><a data-dcnode-id="5162" href="#"><span data-dcnode-id="5163" instrument_node="">Peripheral Arterial Disease in the End-stage Kidney Disease Population-an Opportunity for Early Detection (S) ◊</span></a><div class="description" data-dcnode-id="5160" style="display: none;"><span data-dcnode-id="5161" instrument_node="">The speaker’s professional research areas include health promotion, informatics, health policy, political action and advocacy, especially as it relates to the role of advanced practice nurse integration and utilization in the Canadian healthcare system.</span></div></td><td data-dcnode-id="5157"><span data-dcnode-id="5158" instrument_node="">Marchuk, Dr. Stan</span></td><td data-dcnode-id="5155"><span data-dcnode-id="5156" instrument_node="">Adjunct Associate Professor</span></td><td data-dcnode-id="5153"><span data-dcnode-id="5154" instrument_node="">School of Nursing</span></td></tr><tr class="Health-Care--Medicine School-of-Nursing S Virtual altrow" data-dcnode-id="5138" role="row"><td data-dcnode-id="5150"><span data-dcnode-id="5151" instrument_node="">Health Care &amp; Medicine</span></td><td class="more-info" data-dcnode-id="5145"><a data-dcnode-id="5148" href="#"><span data-dcnode-id="5149" instrument_node="">Health Policy and the Maximization of Health Care Providers/Clinicians Scope of Practice (S) ◊</span></a><div class="description" data-dcnode-id="5146" style="display: none;"><span data-dcnode-id="5147" instrument_node="">The speaker’s professional research areas include health promotion, informatics, health policy, political action and advocacy, especially as it relates to the role of advanced practice nurse integration and utilization in the Canadian healthcare system.</span></div></td><td data-dcnode-id="5143"><span data-dcnode-id="5144" instrument_node="">Marchuk, Dr. Stan</span></td><td data-dcnode-id="5141"><span data-dcnode-id="5142" instrument_node="">Adjunct Associate Professor</span></td><td data-dcnode-id="5139"><span data-dcnode-id="5140" instrument_node="">School of Nursing</span></td></tr><tr class="Health-Care--Medicine Department-of-Sociology Virtual" data-dcnode-id="5124" role="row"><td data-dcnode-id="5136"><span data-dcnode-id="5137" instrument_node="">Health Care &amp; Medicine</span></td><td class="more-info" data-dcnode-id="5131"><a data-dcnode-id="5134" href="#"><span data-dcnode-id="5135" instrument_node="">Care Labour and Care Migration ◊</span></a><div class="description" data-dcnode-id="5132" style="display: none;"><span data-dcnode-id="5133" instrument_node="">Care, caregiving and care-providing is essential work in societies, both paid and unpaid. At present, people are brought in or migrate to Canada and other countries to provide care to young, old and disabled people. My research in this area reveals many of the contours, challenges and dimensions of care labour and care migration.</span></div></td><td data-dcnode-id="5129"><span data-dcnode-id="5130" instrument_node="">McDaniel, Prof. Susan A.</span></td><td data-dcnode-id="5127"><span data-dcnode-id="5128" instrument_node="">Adjunct Professor</span></td><td data-dcnode-id="5125"><span data-dcnode-id="5126" instrument_node="">Department of Sociology</span></td></tr><tr class="Health-Care--Medicine Department-of-Sociology Virtual altrow" data-dcnode-id="5110" role="row"><td data-dcnode-id="5122"><span data-dcnode-id="5123" instrument_node="">Health Care &amp; Medicine</span></td><td class="more-info" data-dcnode-id="5117"><a data-dcnode-id="5120" href="#"><span data-dcnode-id="5121" instrument_node="">Population Aging and Social Policy/Health Care: Women and Aging ◊</span></a><div class="description" data-dcnode-id="5118" style="display: none;"><span data-dcnode-id="5119" instrument_node="">There is a lot of speculation-not all of it evidence-based-on the policy consequences of population aging in Canada and other countries. My research on this has found that policies may not be threatened by population aging.</span></div></td><td data-dcnode-id="5115"><span data-dcnode-id="5116" instrument_node="">McDaniel, Prof. Susan A.</span></td><td data-dcnode-id="5113"><span data-dcnode-id="5114" instrument_node="">Adjunct Professor</span></td><td data-dcnode-id="5111"><span data-dcnode-id="5112" instrument_node="">Department of Sociology</span></td></tr><tr class="Health-Care--Medicine Department-of-Biology M S Virtual" data-dcnode-id="5096" role="row"><td data-dcnode-id="5108"><span data-dcnode-id="5109" instrument_node="">Health Care &amp; Medicine</span></td><td class="more-info" data-dcnode-id="5103"><a data-dcnode-id="5106" href="#"><span data-dcnode-id="5107" instrument_node="">A Look into the Eye: How the Retina Works, and Advances in Treating Retinal Disease (M S) ◊</span></a><div class="description" data-dcnode-id="5104" style="display: none;"><span data-dcnode-id="5105" instrument_node="">This talk is an introduction to the anatomy of the eye and the retina, explaining how the retina works, and the diseases that affect it. The role of basic research, and what kinds of therapies are being developed to treat retinal diseases, are also addressed.</span></div></td><td data-dcnode-id="5101"><span data-dcnode-id="5102" instrument_node="">Chow, Dr. Bob</span></td><td data-dcnode-id="5099"><span data-dcnode-id="5100" instrument_node="">Assistant Professor</span></td><td data-dcnode-id="5097"><span data-dcnode-id="5098" instrument_node="">Department of Biology</span></td></tr><tr class="Health-Care--Medicine Department-of-Mathematics--Statistics S Virtual altrow" data-dcnode-id="5082" role="row"><td data-dcnode-id="5094"><span data-dcnode-id="5095" instrument_node="">Health Care &amp; Medicine</span></td><td class="more-info" data-dcnode-id="5089"><a data-dcnode-id="5092" href="#"><span data-dcnode-id="5093" instrument_node="">How Mathematicians Model Epidemics (S) ◊</span></a><div class="description" data-dcnode-id="5090" style="display: none;"><span data-dcnode-id="5091" instrument_node="">We can use mathematics to model the spread of epidemics. This lets us make predictions for the future and decide what policies we should adopt as a society. In this talk we will study a particular model called the Susceptible-Infectious-Recovered model for the spread of epidemics. </span></div></td><td data-dcnode-id="5087"><span data-dcnode-id="5088" instrument_node="">Bazett, Dr. Trefor</span></td><td data-dcnode-id="5085"><span data-dcnode-id="5086" instrument_node="">Assistant Professor</span></td><td data-dcnode-id="5083"><span data-dcnode-id="5084" instrument_node="">Department of Mathematics &amp; Statistics</span></td></tr><tr class="Health-Care--Medicine Department-of-Mechanical-Engineering M S Virtual" data-dcnode-id="5068" role="row"><td data-dcnode-id="5080"><span data-dcnode-id="5081" instrument_node="">Health Care &amp; Medicine</span></td><td class="more-info" data-dcnode-id="5075"><a data-dcnode-id="5078" href="#"><span data-dcnode-id="5079" instrument_node="">Let’s Get Personal: Shifting the Paradigm in Orthopaedic Surgery (M S) ◊</span></a><div class="description" data-dcnode-id="5076" style="display: none;"><span data-dcnode-id="5077" instrument_node="">My talks both relate to the use of engineering to improve the outcomes of orthopaedic surgery and musculoskeletal rehabilitation.</span></div></td><td data-dcnode-id="5073"><span data-dcnode-id="5074" instrument_node="">Giles, Dr. Joshua</span></td><td data-dcnode-id="5071"><span data-dcnode-id="5072" instrument_node="">Assistant Professor</span></td><td data-dcnode-id="5069"><span data-dcnode-id="5070" instrument_node="">Department of Mechanical Engineering</span></td></tr><tr class="Health-Care--Medicine Department-of-Mechanical-Engineering M S Virtual altrow" data-dcnode-id="5054" role="row"><td data-dcnode-id="5066"><span data-dcnode-id="5067" instrument_node="">Health Care &amp; Medicine</span></td><td class="more-info" data-dcnode-id="5061"><a data-dcnode-id="5064" href="#"><span data-dcnode-id="5065" instrument_node="">Improving Orthopaedic Outcomes through the Integration of Biomechanical Research and Emerging Technologies (M S) ◊</span></a><div class="description" data-dcnode-id="5062" style="display: none;"><span data-dcnode-id="5063" instrument_node="">This talk addresses the work of UVic’s Orthopaedic Technologies and Biomechanics Lab. This lab has two main foci: 1) improving our understanding of fundamental musculoskeletal biomechanics as well as the biomechanics of injuries and clinical treatments, and 2) developing novel technologies that can improve orthopaedic diagnosis, clinician training, surgical planning, and rehabilitation. These two areas can involve projects that are independent of each other, but the lab also focuses on the integration of these areas to yield improved clinical impact. </span></div></td><td data-dcnode-id="5059"><span data-dcnode-id="5060" instrument_node="">Giles, Dr. Joshua</span></td><td data-dcnode-id="5057"><span data-dcnode-id="5058" instrument_node="">Assistant Professor</span></td><td data-dcnode-id="5055"><span data-dcnode-id="5056" instrument_node="">Department of Mechanical Engineering</span></td></tr><tr class="Health-Care--Medicine Island-Medical-Program M S Virtual" data-dcnode-id="5040" role="row"><td data-dcnode-id="5052"><span data-dcnode-id="5053" instrument_node="">Health Care &amp; Medicine</span></td><td class="more-info" data-dcnode-id="5047"><a data-dcnode-id="5050" href="#"><span data-dcnode-id="5051" instrument_node="">Understanding the Mysteries of the Brain in Health and Disease (M S) NEW ◊</span></a><div class="description" data-dcnode-id="5048" style="display: none;"><span data-dcnode-id="5049" instrument_node="">This presentation provides participants with a basic understanding of the brain and nervous system, as well as a brief insight into the speaker’s research program, which seeks to understand how&nbsp;brain cells change during development, disease and aging.</span></div></td><td data-dcnode-id="5045"><span data-dcnode-id="5046" instrument_node="">Swayne, Dr. Leigh Anne</span></td><td data-dcnode-id="5043"><span data-dcnode-id="5044" instrument_node="">Assistant Professor</span></td><td data-dcnode-id="5041"><span data-dcnode-id="5042" instrument_node="">Island Medical Program</span></td></tr><tr class="Health-Care--Medicine Department-of-Mechanical-Engineering M S Virtual altrow" data-dcnode-id="5026" role="row"><td data-dcnode-id="5038"><span data-dcnode-id="5039" instrument_node="">Health Care &amp; Medicine</span></td><td class="more-info" data-dcnode-id="5033"><a data-dcnode-id="5036" href="#"><span data-dcnode-id="5037" instrument_node="">Human Tissue Models: When 3D Bioprinting Meets Pharmaceutical Companies (M S) NEW ◊</span></a><div class="description" data-dcnode-id="5034" style="display: none;"><span data-dcnode-id="5035" instrument_node="">How bioprinting and 3D printing can help pharmaceutical companies to test new drugs.</span></div></td><td data-dcnode-id="5031"><span data-dcnode-id="5032" instrument_node="">Valente, Dr. Karolina Papera</span></td><td data-dcnode-id="5029"><span data-dcnode-id="5030" instrument_node="">Assistant Teaching Professor</span></td><td data-dcnode-id="5027"><span data-dcnode-id="5028" instrument_node="">Department of Mechanical Engineering</span></td></tr><tr class="Health-Care--Medicine Department-of-Mechanical-Engineering M S Virtual" data-dcnode-id="5012" role="row"><td data-dcnode-id="5024"><span data-dcnode-id="5025" instrument_node="">Health Care &amp; Medicine</span></td><td class="more-info" data-dcnode-id="5019"><a data-dcnode-id="5022" href="#"><span data-dcnode-id="5023" instrument_node="">Breast Cancer: the Tumor Environment (M S) NEW ◊</span></a><div class="description" data-dcnode-id="5020" style="display: none;"><span data-dcnode-id="5021" instrument_node="">Explaining properties of the cancer environment: Why is the tumor area more acidic? Why are the blood vessels disorganized? </span></div></td><td data-dcnode-id="5017"><span data-dcnode-id="5018" instrument_node="">Valente, Dr. Karolina Papera</span></td><td data-dcnode-id="5015"><span data-dcnode-id="5016" instrument_node="">Assistant Teaching Professor</span></td><td data-dcnode-id="5013"><span data-dcnode-id="5014" instrument_node="">Department of Mechanical Engineering</span></td></tr><tr class="Health-Care--Medicine School-of-Health-Information-Science S Virtual altrow" data-dcnode-id="4998" role="row"><td data-dcnode-id="5010"><span data-dcnode-id="5011" instrument_node="">Health Care &amp; Medicine</span></td><td class="more-info" data-dcnode-id="5005"><a data-dcnode-id="5008" href="#"><span data-dcnode-id="5009" instrument_node="">Importance of Health Informatics on Systems in Health Care (in English or Swedish) (S) NEW ◊</span></a><div class="description" data-dcnode-id="5006" style="display: none;"><span data-dcnode-id="5007" instrument_node="">Health informatics can predict the success or failure of usability for electronic health records (EHR) towards improved clinical workflows for patient care using integrated information technologies across the health care system. Health informatics determines the meaningfulness of data science and artificial intelligence  towards establishing knowledge of variations in patient data with big data analytics, and machine learning of modeling patient care delivery, with the usability of an EHR. Health informatics can provide evidence for the appropriateness of using components of health information system. There’s also relevance for natural language processing, via algorithms in an artificial intelligence application for better understanding of health information systems in health care.</span></div></td><td data-dcnode-id="5003"><span data-dcnode-id="5004" instrument_node="">Chrimes, Dr. Dillon</span></td><td data-dcnode-id="5001"><span data-dcnode-id="5002" instrument_node="">Assistant Teaching Professor</span></td><td data-dcnode-id="4999"><span data-dcnode-id="5000" instrument_node="">School of Health Information Science</span></td></tr><tr class="Health-Care--Medicine School-of-Health-Information-Science E M S Virtu y for electronic health records (EHR) towards improved clinical workflows for patient care using integrated information technologies across the health care system. Health informatics determines the meaningfulness of data science and artificial intelligence  towards establishing knowledge of variations in patient data with big data analytics, and machine learning of modeling patient care delivery, with the usability of an EHR. Health informatics can provide evidence for the appropriateness of using components of health information system. There’s also relevance for natural language processing, via algorithms in an artificial intelligence application for better understanding of health information systems in health care.</span></div></td><td data-dcnode-id="4961"><span data-dcnode-id="4962" instrument_node="">Chrimes, Dr. Dillon</span></td><td data-dcnode-id="4959"><span data-dcnode-id="4960" instrument_node="">Assistant Teaching Professor</span></td><td data-dcnode-id="4957"><span data-dcnode-id="4958" instrument_node="">School of Health Information Science</span></td></tr><tr class="Health-Care--Medicine Department-of-Physics--Astronomy S Virtual altrow" data-dcnode-id="4942" role="row"><td data-dcnode-id="4954"><span data-dcnode-id="4955" instrument_node="">Health Care &amp; Medicine</span></td><td class="more-info" data-dcnode-id="4949"><a data-dcnode-id="4952" href="#"><span data-dcnode-id="4953" instrument_node="">The Potential of Nanotechnology in Medicine (S) NEW ◊ </span></a><div class="description" data-dcnode-id="4950" style="display: none;"><span data-dcnode-id="4951" instrument_node="">Nanotechnology involves materials of size between 1 and 100 nanometres. The proteins we eat and viruses we get sick from are in this range. We can make smart nanomaterials of the same size as these proteins and viruses to deliver drugs or enhance the radiation dose in cancer therapy. I will talk about how we can do this using gold nanoparticles as a sample nanoparticle system.</span></div></td><td data-dcnode-id="4947"><span data-dcnode-id="4948" instrument_node="">Chithrani, Prof. Devika</span></td><td data-dcnode-id="4945"><span data-dcnode-id="4946" instrument_node="">Associate Professor</span></td><td data-dcnode-id="4943"><span data-dcnode-id="4944" instrument_node="">Department of Physics &amp; Astronomy</span></td></tr><tr class="Health-Care--Medicine Department-of-Biochemistry--Microbiology S Virtual" data-dcnode-id="4928" role="row"><td data-dcnode-id="4940"><span data-dcnode-id="4941" instrument_node="">Health Care &amp; Medicine</span></td><td class="more-info" data-dcnode-id="4935"><a data-dcnode-id="4938" href="#"><span data-dcnode-id="4939" instrument_node="">Cancer: Novel Approaches to Personalized Cancer Therapy (S) ◊</span></a><div class="description" data-dcnode-id="4936" style="display: none;"><span data-dcnode-id="4937" instrument_node="">This presentation will cover molecular targeted therapy for cancer as well as a novel strategy being developed at UVic. </span></div></td><td data-dcnode-id="4933"><span data-dcnode-id="4934" instrument_node="">Howard, Dr. Perry</span></td><td data-dcnode-id="4931"><span data-dcnode-id="4932" instrument_node="">Chair &amp; Associate Professor</span></td><td data-dcnode-id="4929"><span data-dcnode-id="4930" instrument_node="">Department of Biochemistry &amp; Microbiology</span></td></tr><tr class="Health-Care--Medicine Department-of-Psychology S Virtual altrow" data-dcnode-id="4914" role="row"><td data-dcnode-id="4926"><span data-dcnode-id="4927" instrument_node="">Health Care &amp; Medicine</span></td><td class="more-info" data-dcnode-id="4921"><a data-dcnode-id="4924" href="#"><span data-dcnode-id="4925" instrument_node="">Dementia and Alzheimer's: Current Research ǂ (S) ◊</span></a><div class="description" data-dcnode-id="4922" style="display: none;"><span data-dcnode-id="4923" instrument_node="">Dementia is not a natural part of aging. It is an umbrella term that encompasses over one hundred neurodegenerative diseases that affect memory, judgment, and cognitive skills severely enough to interfere with daily life. Alzheimer’s disease is the most common form of dementia and comprises nearly seventy percent of cases. To date there is no cure and there are no disease-modifying treatments available. Find out what the research history has looked at regarding this topic and what the latest researchers are doing to solve the issue of dementia.</span></div></td><td data-dcnode-id="4919"><span data-dcnode-id="4920" instrument_node="">Knight, Ms. Jamie</span></td><td data-dcnode-id="4917"><span data-dcnode-id="4918" instrument_node="">Graduate Student</span></td><td data-dcnode-id="4915"><span data-dcnode-id="4916" instrument_node="">Department of Psychology</span></td></tr><tr class="Health-Care--Medicine Department-of-Psychology S Virtual" data-dcnode-id="4900" role="row"><td data-dcnode-id="4912"><span data-dcnode-id="4913" instrument_node="">Health Care &amp; Medicine</span></td><td class="more-info" data-dcnode-id="4907"><a data-dcnode-id="4910" href="#"><span data-dcnode-id="4911" instrument_node="">Olfactory Health: Smell and Its Relationship to Disease and Memory ǂ (S) NEW ◊</span></a><div class="description" data-dcnode-id="4908" style="display: none;"><span data-dcnode-id="4909" instrument_node="">Humans can smell better than you think. In fact, the idea that humans can’t smell as well as other mammals is a 19th-century myth. In this talk find out how your sense of smell (olfaction) works and how it is involved in diagnosing several diseases such as Alzheimer’s and Parkinson’s disease.</span></div></td><td data-dcnode-id="4905"><span data-dcnode-id="4906" instrument_node="">Knight, Ms. Jamie</span></td><td data-dcnode-id="4903"><span data-dcnode-id="4904" instrument_node="">Graduate Student</span></td><td data-dcnode-id="4901"><span data-dcnode-id="4902" instrument_node="">Department of Psychology</span></td></tr><tr class="Health-Care--Medicine Department-of-Psychology S Virtual altrow" data-dcnode-id="4886" role="row"><td data-dcnode-id="4898"><span data-dcnode-id="4899" instrument_node="">Health Care &amp; Medicine</span></td><td class="more-info" data-dcnode-id="4893"><a data-dcnode-id="4896" href="#"><span data-dcnode-id="4897" instrument_node="">Detecting Dementia Early: What do We Know? ǂ (S) ◊</span></a><div class="description" data-dcnode-id="4894" style="display: none;"><span data-dcnode-id="4895" instrument_node="">Current research on non-invasive early detection methods for dementia.</span></div></td><td data-dcnode-id="4891"><span data-dcnode-id="4892" instrument_node="">Knight, Ms. Jamie</span></td><td data-dcnode-id="4889"><span data-dcnode-id="4890" instrument_node="">Graduate Student</span></td><td data-dcnode-id="4887"><span data-dcnode-id="4888" instrument_node="">Department of Psychology</span></td></tr><tr class="Health-Care--Medicine Department-of-Philosophy S Virtual" data-dcnode-id="4872" role="row"><td data-dcnode-id="4884"><span data-dcnode-id="4885" instrument_node="">Health Care &amp; Medicine</span></td><td class="more-info" data-dcnode-id="4879"><a data-dcnode-id="4882" href="#"><span data-dcnode-id="4883" instrument_node="">Privacy and Confidentiality of Electronic Health Records (S) ◊</span></a><div class="description" data-dcnode-id="4880" style="display: none;"><span data-dcnode-id="4881" instrument_node="">This presentation deals with the ownership of and access to patient health records, with particular emphasis on electronic health records which are becoming increasingly important in modern health care delivery and telehealth and telemedicine. National and international standards are considered from an ethical perspective.</span></div></td><td data-dcnode-id="4877"><span data-dcnode-id="4878" instrument_node="">Kluge, Dr. Eike</span></td><td data-dcnode-id="4875"><span data-dcnode-id="4876" instrument_node="">Professor</span></td><td data-dcnode-id="4873"><span data-dcnode-id="4874" instrument_node="">Department of Philosophy</span></td></tr><tr class="Health-Care--Medicine Department-of-Philosophy S Virtual altrow" data-dcnode-id="4859" role="row"><td data-dcnode-id="4870"><span data-dcnode-id="4871" instrument_node="">Health Care &amp; Medicine</span></td><td class="more-info" data-dcnode-id="4866"><a data-dcnode-id="4868" href="#"><span data-dcnode-id="4869" instrument_node="">The Right to Health Care: Socialized vs. Privatized Approaches (S) ◊</span></a><div class="description" data-dcnode-id="4867" style="display: none;"></div></td><td data-dcnode-id="4864"><span data-dcnode-id="4865" instrument_node="">Kluge, Dr. Eike</span></td><td data-dcnode-id="4862"><span data-dcnode-id="4863" instrument_node="">Professor</span></td><td data-dcnode-id="4860"><span data-dcnode-id="4861" instrument_node="">Department of Philosophy</span></td></tr><tr class="Health-Care--Medicine Island-Medical-Program Virtual" data-dcnode-id="4845" role="row"><td data-dcnode-id="4857"><span data-dcnode-id="4858" instrument_node="">Health Care &amp; Medicine</span></td><td class="more-info" data-dcnode-id="4852"><a data-dcnode-id="4855" href="#"><span data-dcnode-id="4856" instrument_node="">Drinking with Mary Jane: How Consuming Cannabis and/or Alcohol During Pregnancy Can Affect the Developing Brain NEW ◊</span></a><div class="description" data-dcnode-id="4853" style="display: none;"><span data-dcnode-id="4854" instrument_node="">This talk discusses how commonly used legal drugs, such as alcohol and marijuana, can affect the development of a baby’s brain and lead to behavioural problems later on in life. The talk will also examine new therapies that currently being examined to help mitigate the damage these teratogens can cause. </span></div></td><td data-dcnode-id="4850"><span data-dcnode-id="4851" instrument_node="">Christie, Dr. Brian</span></td><td data-dcnode-id="4848"><span data-dcnode-id="4849" instrument_node="">Professor</span></td><td data-dcnode-id="4846"><span data-dcnode-id="4847" instrument_node="">Island Medical Program</span></td></tr><tr class="Health-Care--Medicine Island-Medical-Program S Not-Virtual altrow" data-dcnode-id="4831" role="row"><td data-dcnode-id="4843"><span data-dcnode-id="4844" instrument_node="">Health Care &amp; Medicine</span></td><td class="more-info" data-dcnode-id="4838"><a data-dcnode-id="4841" href="#"><span data-dcnode-id="4842" instrument_node="">Depression and its Outcomes (in English or Spanish) (S) </span></a><div class="description" data-dcnode-id="4839" style="display: none;"><span data-dcnode-id="4840" instrument_node="">What is major depression? How is it diagnosed and treated? What are the consequences of depression, non-pharmacological treatments, and how to cope? This talk addresses these questions.</span></div></td><td data-dcnode-id="4836"><span data-dcnode-id="4837" instrument_node="">Caruncho, Prof. Hector J.</span></td><td data-dcnode-id="4834"><span data-dcnode-id="4835" instrument_node="">Professor</span></td><td data-dcnode-id="4832"><span data-dcnode-id="4833" instrument_node="">Island Medical Program</span></td></tr><tr class="Health-Care--Medicine Island-Medical-Program Virtual" data-dcnode-id="4817" role="row"><td data-dcnode-id="4829"><span data-dcnode-id="4830" instrument_node="">Health Care &amp; Medicine</span></td><td class="more-info" data-dcnode-id="4824"><a data-dcnode-id="4827" href="#"><span data-dcnode-id="4828" instrument_node="">Concussions and Mild Traumatic Brain Injury ◊</span></a><div class="description" data-dcnode-id="4825" style="display: none;"><span data-dcnode-id="4826" instrument_node="">This talk presents some of the issues around diagnosis of concussions and discuss new research on the topic. The speaker can also talk about potential new therapies for speeding up recovery from concussion.</span></div></td><td data-dcnode-id="4822"><span data-dcnode-id="4823" instrument_node="">Christie, Dr. Brian</span></td><td data-dcnode-id="4820"><span data-dcnode-id="4821" instrument_node="">Professor</span></td><td data-dcnode-id="4818"><span data-dcnode-id="4819" instrument_node="">Island Medical Program</span></td></tr><tr class="Health-Care--Medicine Island-Medical-Program Virtual altrow" data-dcnode-id="4803" role="row"><td data-dcnode-id="4815"><span data-dcnode-id="4816" instrument_node="">Health Care &amp; Medicine</span></td><td class="more-info" data-dcnode-id="4810"><a data-dcnode-id="4813" href="#"><span data-dcnode-id="4814" instrument_node="">The Benefits of Exercise for Your Brain ◊</span></a><div class="description" data-dcnode-id="4811" style="display: none;"><span data-dcnode-id="4812" instrument_node="">This talk discusses the benefits of exercise and how it impacts the structure and function of the brain. Learn about recent research findings in a way that will engage audiences of all ages and backgrounds.</span></div></td><td data-dcnode-id="4808"><span data-dcnode-id="4809" instrument_node="">Christie, Dr. Brian</span></td><td data-dcnode-id="4806"><span data-dcnode-id="4807" instrument_node="">Professor</span></td><td data-dcnode-id="4804"><span data-dcnode-id="4805" instrument_node="">Island Medical Program</span></td></tr><tr class="Health-Care--Medicine Island-Medical-Program S Not-Virtual" data-dcnode-id="4789" role="row"><td data-dcnode-id="4801"><span data-dcnode-id="4802" instrument_node="">Health Care &amp; Medicine</span></td><td class="more-info" data-dcnode-id="4796"><a data-dcnode-id="4799" href="#"><span data-dcnode-id="4800" instrument_node="">Schizophrenia and Society (in English or Spanish) (S) </span></a><div class="description" data-dcnode-id="4797" style="display: none;"><span data-dcnode-id="4798" instrument_node="">What is schizophrenia? How is it defined and diagnosed?This talk will address treatments; what is going on in the brain in schizophrenia; schizophrenia and violence; and schizophrenia and stigma.</span></div></td><td data-dcnode-id="4794"><span data-dcnode-id="4795" instrument_node="">Caruncho, Prof. Hector</span></td><td data-dcnode-id="4792"><span data-dcnode-id="4793" instrument_node="">Professor</span></td><td data-dcnode-id="4790"><span data-dcnode-id="4791" instrument_node="">Island Medical Program</span></td></tr><tr class="Health-Care--Medicine Island-Medical-Program S Not-Virtual altrow" data-dcnode-id="4775" role="row"><td data-dcnode-id="4787"><span data-dcnode-id="4788" instrument_node="">Health Care &amp; Medicine</span></td><td class="more-info" data-dcnode-id="4782"><a data-dcnode-id="4785" href="#"><span data-dcnode-id="4786" instrument_node="">Mental Illness in the 21st Century (in English or Spanish) (S) </span></a><div class="description" data-dcnode-id="4783" style="display: none;"><span data-dcnode-id="4784" instrument_node="">General overview of the major categories of mental illnesses. This includes how they are treated, what the outcomes are, what the general burdens of mental illness are, and mental illness and stigma.</span></div></td><td data-dcnode-id="4780"><span data-dcnode-id="4781" instrument_node="">Caruncho, Prof. Hector</span></td><td data-dcnode-id="4778"><span data-dcnode-id="4779" instrument_node="">Professor</span></td><td data-dcnode-id="4776"><span data-dcnode-id="4777" instrument_node="">Island Medical Program</span></td></tr><tr class="Health-Care--Medicine School-of-Nursing S Virtual" data-dcnode-id="4761" role="row"><td data-dcnode-id="4773"><span data-dcnode-id="4774" instrument_node="">Health Care &amp; Medicine</span></td><td class="more-info" data-dcnode-id="4768"><a data-dcnode-id="4771" href="#"><span data-dcnode-id="4772" instrument_node="">Living Well Until You Die (S) ◊</span></a><div class="description" data-dcnode-id="4769" style="display: none;"><span data-dcnode-id="4770" instrument_node="">My research focuses the development of health/social support services in palliative and end-of-life care including various aspects of care for the dying, family caregiving, and health and social policy issues related to chronically ill and vulnerable populations-including marginalized and vulnerable populations across diverse settings. </span></div></td><td data-dcnode-id="4766"><span data-dcnode-id="4767" instrument_node="">Stajduhar, Dr. Kelli</span></td><td data-dcnode-id="4764"><span data-dcnode-id="4765" instrument_node="">Professor</span></td><td data-dcnode-id="4762"><span data-dcnode-id="4763" instrument_node="">School of Nursing</span></td></tr><tr class="Health-Care--Medicine School-of-Nursing S Virtual altrow" data-dcnode-id="4747" role="row"><td data-dcnode-id="4759"><span data-dcnode-id="4760" instrument_node="">Health Care &amp; Medicine</span></td><td class="more-info" data-dcnode-id="4754"><a data-dcnode-id="4757" href="#"><span data-dcnode-id="4758" instrument_node="">Equity-informed Palliative Care (S) ◊</span></a><div class="description" data-dcnode-id="4755" style="display: none;"><span data-dcnode-id="4756" instrument_node="">My research focuses the development of health/social support services in palliative and end-of-life care including various aspects of care for the dying, family caregiving, and health and social policy issues related to chronically ill and vulnerable populations-including marginalized and vulnerable populations across diverse settings. </span></div></td><td data-dcnode-id="4752"><span data-dcnode-id="4753" instrument_node="">Stajduhar, Dr. Kelli</span></td><td data-dcnode-id="4750"><span data-dcnode-id="4751" instrument_node="">Professor</span></td><td data-dcnode-id="4748"><span data-dcnode-id="4749" instrument_node="">School of Nursing</span></td></tr><tr class="Health-Care--Medicine School-of-Nursing S Virtual" data-dcnode-id="4733" role="row"><td data-dcnode-id="4745"><span data-dcnode-id="4746" instrument_node="">Health Care &amp; Medicine</span></td><td class="more-info" data-dcnode-id="4740"><a data-dcnode-id="4743" href="#"><span data-dcnode-id="4744" instrument_node= <span data-dcnode-id="4723" instrument_node="">Professor</span></td><td data-dcnode-id="4720"><span data-dcnode-id="4721" instrument_node="">School of Nursing</span></td></tr><tr class="Health-Care--Medicine School-of-Public-Administration Virtual" data-dcnode-id="4705" role="row"><td data-dcnode-id="4717"><span data-dcnode-id="4718" instrument_node="">Health Care &amp; Medicine</span></td><td class="more-info" data-dcnode-id="4712"><a data-dcnode-id="4715" href="#"><span data-dcnode-id="4716" instrument_node="">Health and Public Health Systems (in English or French) NEW ◊</span></a><div class="description" data-dcnode-id="4713" style="display: none;"><span data-dcnode-id="4714" instrument_node="">What’s the role of public health and health systems? Why do they matter?</span></div></td><td data-dcnode-id="4710"><span data-dcnode-id="4711" instrument_node="">Brousselle, Dr. Astrid</span></td><td data-dcnode-id="4708"><span data-dcnode-id="4709" instrument_node="">Professor &amp; Director</span></td><td data-dcnode-id="4706"><span data-dcnode-id="4707" instrument_node="">School of Public Administration</span></td></tr><tr class="Health-Care--Medicine Department-of-Biochemistry--Microbiology E M S Virtual altrow" data-dcnode-id="4691" role="row"><td data-dcnode-id="4703"><span data-dcnode-id="4704" instrument_node="">Health Care &amp; Medicine</span></td><td class="more-info" data-dcnode-id="4698"><a data-dcnode-id="4701" href="#"><span data-dcnode-id="4702" instrument_node="">What We’ve Learned from the Human Genome (E M S) ◊</span></a><div class="description" data-dcnode-id="4699" style="display: none;"><span data-dcnode-id="4700" instrument_node="">The decoding of the human genome, completed two decades ago, heralded the beginning of a new era in biomedical research. This presentation explores selected aspects of what our genome has since taught us about ourselves and our place in the biological world. </span></div></td><td data-dcnode-id="4696"><span data-dcnode-id="4697" instrument_node="">Ishiguro, Dr. Edward</span></td><td data-dcnode-id="4694"><span data-dcnode-id="4695" instrument_node="">Professor Emeritus</span></td><td data-dcnode-id="4692"><span data-dcnode-id="4693" instrument_node="">Department of Biochemistry &amp; Microbiology</span></td></tr><tr class="Health-Care--Medicine Department-of-Biochemistry--Microbiology E M S Virtual" data-dcnode-id="4677" role="row"><td data-dcnode-id="4689"><span data-dcnode-id="4690" instrument_node="">Health Care &amp; Medicine</span></td><td class="more-info" data-dcnode-id="4684"><a data-dcnode-id="4687" href="#"><span data-dcnode-id="4688" instrument_node="">Allergies: Dysfunction in the Immune System (E M S) ◊</span></a><div class="description" data-dcnode-id="4685" style="display: none;"><span data-dcnode-id="4686" instrument_node="">The role of the immune system in the allergic response, and recent advances in treatment. </span></div></td><td data-dcnode-id="4682"><span data-dcnode-id="4683" instrument_node="">Ishiguro, Dr. Edward E.</span></td><td data-dcnode-id="4680"><span data-dcnode-id="4681" instrument_node="">Professor Emeritus</span></td><td data-dcnode-id="4678"><span data-dcnode-id="4679" instrument_node="">Department of Biochemistry &amp; Microbiology</span></td></tr><tr class="Health-Care--Medicine Department-of-Biochemistry--Microbiology Virtual altrow" data-dcnode-id="4663" role="row"><td data-dcnode-id="4675"><span data-dcnode-id="4676" instrument_node="">Health Care &amp; Medicine</span></td><td class="more-info" data-dcnode-id="4670"><a data-dcnode-id="4673" href="#"><span data-dcnode-id="4674" instrument_node="">New Emerging Human Infectious Diseases in a Changing World ◊</span></a><div class="description" data-dcnode-id="4671" style="display: none;"><span data-dcnode-id="4672" instrument_node="">New human infectious diseases previously unknown to science-such as SARS, MERS, Ebola, and now, COVID-19-have appeared at an unprecedented rate in recent years. This talk focuses on what is apparently causing their emergence at this time.</span></div></td><td data-dcnode-id="4668"><span data-dcnode-id="4669" instrument_node="">Ishiguro, Dr. Edward E.</span></td><td data-dcnode-id="4666"><span data-dcnode-id="4667" instrument_node="">Professor Emeritus</span></td><td data-dcnode-id="4664"><span data-dcnode-id="4665" instrument_node="">Department of Biochemistry &amp; Microbiology</span></td></tr><tr class="Health-Care--Medicine Department-of-Biochemistry--Microbiology E M S Virtual" data-dcnode-id="4649" role="row"><td data-dcnode-id="4661"><span data-dcnode-id="4662" instrument_node="">Health Care &amp; Medicine</span></td><td class="more-info" data-dcnode-id="4656"><a data-dcnode-id="4659" href="#"><span data-dcnode-id="4660" instrument_node="">What Everyone Should Know about Listeria, Salmonella, E. Coli and Other Food-borne Pathogens (E M S) ◊</span></a><div class="description" data-dcnode-id="4657" style="display: none;"><span data-dcnode-id="4658" instrument_node="">An estimated 1.6 million Canadians are affected by food-borne infections every year. The most common causes of food-borne illnesses are pathogens that have emerged only within the last 50 years, such as Listeria, Salmonella, and E. coli. This presentation focuses on what is causing the recent rise of food infections and the challenges in preventing them.</span></div></td><td data-dcnode-id="4654"><span data-dcnode-id="4655" instrument_node="">Ishiguro, Dr. Edward E.</span></td><td data-dcnode-id="4652"><span data-dcnode-id="4653" instrument_node="">Professor Emeritus</span></td><td data-dcnode-id="4650"><span data-dcnode-id="4651" instrument_node="">Department of Biochemistry &amp; Microbiology</span></td></tr><tr class="Health-Care--Medicine Department-of-Biochemistry--Microbiology Virtual altrow" data-dcnode-id="4635" role="row"><td data-dcnode-id="4647"><span data-dcnode-id="4648" instrument_node="">Health Care &amp; Medicine</span></td><td class="more-info" data-dcnode-id="4642"><a data-dcnode-id="4645" href="#"><span data-dcnode-id="4646" instrument_node="">The Biology of Aging ◊</span></a><div class="description" data-dcnode-id="4643" style="display: none;"><span data-dcnode-id="4644" instrument_node="">This presentation summarizes recent advances in our understanding of aging, and how this information has led to new strategies for slowing down the process. </span></div></td><td data-dcnode-id="4640"><span data-dcnode-id="4641" instrument_node="">Ishiguro, Dr. Edward E.</span></td><td data-dcnode-id="4638"><span data-dcnode-id="4639" instrument_node="">Professor Emeritus</span></td><td data-dcnode-id="4636"><span data-dcnode-id="4637" instrument_node="">Department of Biochemistry &amp; Microbiology</span></td></tr><tr class="Health-Care--Medicine Department-of-Biochemistry--Microbiology E M S Virtual" data-dcnode-id="4621" role="row"><td data-dcnode-id="4633"><span data-dcnode-id="4634" instrument_node="">Health Care &amp; Medicine</span></td><td class="more-info" data-dcnode-id="4628"><a data-dcnode-id="4631" href="#"><span data-dcnode-id="4632" instrument_node="">The Rise of Superbugs: The Alarming Spread of Bacterial Drug Resistance, its Underlying Causes and the Quest for Solutions (E M S) ◊</span></a><div class="description" data-dcnode-id="4629" style="display: none;"><span data-dcnode-id="4630" instrument_node="">Superbugs are bacteria that have developed resistance to multiple antibiotics. This global problem is the most serious challenge to the treatment of infectious diseases. This presentation focuses on the underlying causes of bacterial drug resistance and the current state of the quest for solutions.</span></div></td><td data-dcnode-id="4626"><span data-dcnode-id="4627" instrument_node="">Ishiguro, Dr. Edward E.</span></td><td data-dcnode-id="4624"><span data-dcnode-id="4625" instrument_node="">Professor Emeritus</span></td><td data-dcnode-id="4622"><span data-dcnode-id="4623" instrument_node="">Department of Biochemistry &amp; Microbiology</span></td></tr><tr class="Health-Care--Medicine Department-of-Biochemistry--Microbiology Virtual altrow" data-dcnode-id="4607" role="row"><td data-dcnode-id="4619"><span data-dcnode-id="4620" instrument_node="">Health Care &amp; Medicine</span></td><td class="more-info" data-dcnode-id="4614"><a data-dcnode-id="4617" href="#"><span data-dcnode-id="4618" instrument_node="">The Next-generation Vaccines: More than Just a Poke in the Arm ◊</span></a><div class="description" data-dcnode-id="4615" style="display: none;"><span data-dcnode-id="4616" instrument_node="">The traditional vaccines that have been in use for over a century are designed to prevent infectious diseases. In this presentation, they are compared to new innovations that have been referred to next-generation vaccines.</span></div></td><td data-dcnode-id="4612"><span data-dcnode-id="4613" instrument_node="">Ishiguro, Dr. Edward E.</span></td><td data-dcnode-id="4610"><span data-dcnode-id="4611" instrument_node="">Professor Emeritus</span></td><td data-dcnode-id="4608"><span data-dcnode-id="4609" instrument_node="">Department of Biochemistry &amp; Microbiology</span></td></tr><tr class="Health-Care--Medicine Department-of-Biochemistry--Microbiology E M S Virtual" data-dcnode-id="4593" role="row"><td data-dcnode-id="4605"><span data-dcnode-id="4606" instrument_node="">Health Care &amp; Medicine</span></td><td class="more-info" data-dcnode-id="4600"><a data-dcnode-id="4603" href="#"><span data-dcnode-id="4604" instrument_node="">What’s Wrong (and What’s Right) About the Flu Vaccine? (E M S) ◊</span></a><div class="description" data-dcnode-id="4601" style="display: none;"><span data-dcnode-id="4602" instrument_node="">This presentation explains the composition of the influenza vaccine, how it’s supposed to work, why it’s never fully effective, and why you should get vaccinated anyway. A major focus is placed on current research on the development of a more effective flu vaccine.</span></div></td><td data-dcnode-id="4598"><span data-dcnode-id="4599" instrument_node="">Ishiguro, Dr. Edward E.</span></td><td data-dcnode-id="4596"><span data-dcnode-id="4597" instrument_node="">Professor Emeritus</span></td><td data-dcnode-id="4594"><span data-dcnode-id="4595" instrument_node="">Department of Biochemistry &amp; Microbiology</span></td></tr><tr class="Health-Care--Medicine Department-of-Biochemistry--Microbiology Virtual altrow" data-dcnode-id="4579" role="row"><td data-dcnode-id="4591"><span data-dcnode-id="4592" instrument_node="">Health Care &amp; Medicine</span></td><td class="more-info" data-dcnode-id="4586"><a data-dcnode-id="4589" href="#"><span data-dcnode-id="4590" instrument_node="">Not as Advertised But Perfectly Legal: Some Health Products to be Aware of ◊</span></a><div class="description" data-dcnode-id="4587" style="display: none;"><span data-dcnode-id="4588" instrument_node="">This presentation focuses on common merchandise with health-related applications that come with unproven claims. These include well over 100,000 products ranging from personal care products to “health foods” and supplements. Learn what the law says regarding claims made on labels for such products and some hints on the types of claims to watch out for.</span></div></td><td data-dcnode-id="4584"><span data-dcnode-id="4585" instrument_node="">Ishiguro, Dr. Edward E.</span></td><td data-dcnode-id="4582"><span data-dcnode-id="4583" instrument_node="">Professor Emeritus</span></td><td data-dcnode-id="4580"><span data-dcnode-id="4581" instrument_node="">Department of Biochemistry &amp; Microbiology</span></td></tr><tr class="Health-Care--Medicine Department-of-Biochemistry--Microbiology Virtual" data-dcnode-id="4565" role="row"><td data-dcnode-id="4577"><span data-dcnode-id="4578" instrument_node="">Health Care &amp; Medicine</span></td><td class="more-info" data-dcnode-id="4572"><a data-dcnode-id="4575" href="#"><span data-dcnode-id="4576" instrument_node="">Three Decades of Novel Coronaviruses: Lessons Learned and Future Challenges ◊</span></a><div class="description" data-dcnode-id="4573" style="display: none;"><span data-dcnode-id="4574" instrument_node="">A summary of what has been learned from SARS (2002), MERS (2012), and now COVID-19 and what challenges lie ahead.</span></div></td><td data-dcnode-id="4570"><span data-dcnode-id="4571" instrument_node="">Ishiguro, Dr. Edward E.</span></td><td data-dcnode-id="4568"><span data-dcnode-id="4569" instrument_node="">Professor Emeritus</span></td><td data-dcnode-id="4566"><span data-dcnode-id="4567" instrument_node="">Department of Biochemistry &amp; Microbiology</span></td></tr><tr class="Health-Care--Medicine Institute-on-Aging--Lifelong-Health- Virtual altrow" data-dcnode-id="4551" role="row"><td data-dcnode-id="4563"><span data-dcnode-id="4564" instrument_node="">Health Care &amp; Medicine</span></td><td class="more-info" data-dcnode-id="4558"><a data-dcnode-id="4561" href="#"><span data-dcnode-id="4562" instrument_node="">Equity-informed Palliative Care: Research and Practice ◊</span></a><div class="description" data-dcnode-id="4559" style="display: none;"><span data-dcnode-id="4560" instrument_node="">Equity in Palliative Approaches to Care (ePAC) is a community collaborative informed by a research program led out of the University of Victoria. Members of the collaborative work together to conduct research with local, national and international partners, and develop resources and tools, programs, and services aimed at improving access to quality care for people facing the end-of-life and who also face inequities like homelessness, poverty, isolation, racism, and stigma. This presentation will cover an overview of what equity-informed palliative care is and our work to advance to health and well-being of people experiencing inequities at the end-of-life.</span></div></td><td data-dcnode-id="4556"><span data-dcnode-id="4557" instrument_node="">Mollison, Ms. Ashley</span></td><td data-dcnode-id="4554"><span data-dcnode-id="4555" instrument_node="">Project Coordinator</span></td><td data-dcnode-id="4552"><span data-dcnode-id="4553" instrument_node="">Institute on Aging &amp; Lifelong Health </span></td></tr><tr class="Health-Care--Medicine Department-of-Biochemistry--Microbiology S Virtual" data-dcnode-id="4537" role="row"><td data-dcnode-id="4549"><span data-dcnode-id="4550" instrument_node="">Health Care &amp; Medicine</span></td><td class="more-info" data-dcnode-id="4544"><a data-dcnode-id="4547" href="#"><span data-dcnode-id="4548" instrument_node="">Immune System, Nutrition and Metabolism: A New Way to Treat Cancer? (S) ◊</span></a><div class="description" data-dcnode-id="4545" style="display: none;"><span data-dcnode-id="4546" instrument_node="">This talk covers health, immunology, cancer, immunotherapy and metabolomics.</span></div></td><td data-dcnode-id="4542"><span data-dcnode-id="4543" instrument_node="">Lum, Dr. Julian</span></td><td data-dcnode-id="4540"><span data-dcnode-id="4541" instrument_node="">Associate Professor Limited Term</span></td><td data-dcnode-id="4538"><span data-dcnode-id="4539" instrument_node="">Department of Biochemistry &amp; Microbiology</span></td></tr><tr class="Health-Care--Medicine Department-of-Biochemistry--Microbiology S Virtual altrow" data-dcnode-id="4523" role="row"><td data-dcnode-id="4535"><span data-dcnode-id="4536" instrument_node="">Health Care &amp; Medicine</span></td><td class="more-info" data-dcnode-id="4530"><a data-dcnode-id="4533" href="#"><span data-dcnode-id="4534" instrument_node="">Cancer: Novel Approaches to Personalized Cancer Therapy (S) ◊</span></a><div class="description" data-dcnode-id="4531" style="display: none;"><span data-dcnode-id="4532" instrument_node="">What is your immune system? How do you keep your immune health through nutrition? How are nutrition, cancer, metabolism and immunotherapy linked?</span></div></td><td data-dcnode-id="4528"><span data-dcnode-id="4529" instrument_node="">Lum, Dr. Julian</span></td><td data-dcnode-id="4526"><span data-dcnode-id="4527" instrument_node="">Associate Professor Limited Term</span></td><td data-dcnode-id="4524"><span data-dcnode-id="4525" instrument_node="">Department of Biochemistry &amp; Microbiology</span></td></tr><tr class="Health-Care--Medicine Department-of-Biochemistry--Microbiology S Virtual" data-dcnode-id="4509" role="row"><td data-dcnode-id="4521"><span data-dcnode-id="4522" instrument_node="">Health Care &amp; Medicine</span></td><td class="more-info" data-dcnode-id="4516"><a data-dcnode-id="4519" href="#"><span data-dcnode-id="4520" instrument_node="">Diabetes: How Studying Rare Eye Disease May Lead to Novel Treatments for Diabetes (S) ◊</span></a><div class="description" data-dcnode-id="4517" style="display: none;"><span data-dcnode-id="4518" instrument_node="">This presentation will cover how studying rare genetic forms of diabetes can provide insight and targeted therapy for the general population.</span></div></td><td data-dcnode-id="4514"><span data-dcnode-id="4515" instrument_node="">Howard, Dr. Perry</span></td><td data-dcnode-id="4512"><span data-dcnode-id="4513" instrument_node="">Chair &amp; Associate Professor</span></td><td data-dcnode-id="4510"><span data-dcnode-id="4511" instrument_node="">Department of Biochemistry &amp; Microbiology</span></td></tr><tr class="Health-Care--Medicine Department-of-Visual-Arts M S Virtual altrow" data-dcnode-id="4495" role="row"><td data-dcnode-id="4507"><span data-dcnode-id="4508" instrument_node="">Health Care &amp; Medicine</span></td><td class="more-info" data-dcnode-id="4502"><a data-dcnode-id="4505" href="#"><span data-dcnode-id="4506" instrument_node="">Improving Cancer Treatment in Developing Countries ǂ (M S) NEW </span></a><div class="description" data-dcnode-id="4503" style="display: none;"><span data-dcnode-id="4504" instrument_node="">Jericho O’Connell is a PhD Student at UVic developing ways of delivering cancer treatment to people in the world who do not have access to treatment. Here he talks about his research into low-cost treatment options that could prove life saving for the 7.5 million cancer patients diagnosed this year who will not have access to treatment.</span></div></td><td data-dcnode-id="4500"><span data-dcnode-id="4501" instrument_node="">O'Connell, Mr. Jericho</span></td><td data-dcnode-id="4498"><span data-dcnode-id="4499" instrument_node="">Graduate Student</span></td><td data-dcnode-id="4496"><span data-dcnode-id="4497" instrument_node="">Department of Visual Arts</span></td></tr><tr class="History—General Department-of-Economics M S Virtual" data-dcnode-id="4481" role="row"><td data-dcnode-id="4493"><span data-dcnode-id="4494" instrument_node="">History—General</span></td><td class="more-info" data-dcnode-id="4488"><a data-dcnode-id="4491" href="#"><span data-dcnode-id="4492" instrument_node="">The Slaughter of the Bison and Reversal of Fortunes on the Great Plains (M S) ◊</span></a><div class="description" data-dcnode-id="4489" style="display: none;"><span data-dcnode-id="4490" instrument_node="">In this talk, I discuss the historical shock that drove the Indigenous peoples of the Great Plains from being potentially the richest in the world to being amongst the poorest Indigenous peoples in North America. </span></div></td><td data-dcnode-id="4486"><span data-dcnode-id="4487" instrument_node="">Gillezeau, Dr. Rob</span></td><td data-dcnode-id="4484"><span data-dcnode-id="4485" instrument_node="">Assistant Professor</span></td><td data-dcnode-id="4482"><span data-dcnode-id="4483" instrument_node="">Department of Economics</span></td></tr><tr class="History—General Department-of-French S Virtual altrow" data-dcnode-id="4467" role="row"><td data-dcnode-id="4479"><span data-dcnode-id="4480" instrument_node="">History—General</span></td><td class="more-info" data-dcnode-id="4474"><a data-dcnode-id="4477" href="#"><span data-dcnode-id="4478" 29" instrument_node="">Nazi Germany was frequently on the minds of Canadians in the 1940s when they talked about the internment of Japanese Canadians. What meaning did they make from such comparisons and what can they teach us today?</span></div></td><td data-dcnode-id="4325"><span data-dcnode-id="4326" instrument_node="">Stanger-Ross, Dr. Jordan</span></td><td data-dcnode-id="4323"><span data-dcnode-id="4324" instrument_node="">Associate Professor</span></td><td data-dcnode-id="4321"><span data-dcnode-id="4322" instrument_node="">Department of History</span></td></tr><tr class="History—General Department-of-History M S Virtual altrow" data-dcnode-id="4306" role="row"><td data-dcnode-id="4318"><span data-dcnode-id="4319" instrument_node="">History—General</span></td><td class="more-info" data-dcnode-id="4313"><a data-dcnode-id="4316" href="#"><span data-dcnode-id="4317" instrument_node="">Remembering Loss: How Japanese Canadians Remember their Dispossession in the 1940s (M S) ◊</span></a><div class="description" data-dcnode-id="4314" style="display: none;"><span data-dcnode-id="4315" instrument_node="">A team of researchers asked Japanese Canadians what they lost in the 1940s. Their answers surprised us.</span></div></td><td data-dcnode-id="4311"><span data-dcnode-id="4312" instrument_node="">Stanger-Ross, Dr. Jordan</span></td><td data-dcnode-id="4309"><span data-dcnode-id="4310" instrument_node="">Associate Professor</span></td><td data-dcnode-id="4307"><span data-dcnode-id="4308" instrument_node="">Department of History</span></td></tr><tr class="History—General Department-of-History M S Virtual" data-dcnode-id="4292" role="row"><td data-dcnode-id="4304"><span data-dcnode-id="4305" instrument_node="">History—General</span></td><td class="more-info" data-dcnode-id="4299"><a data-dcnode-id="4302" href="#"><span data-dcnode-id="4303" instrument_node="">How “Race” is Made Historically (M S) ◊</span></a><div class="description" data-dcnode-id="4300" style="display: no
