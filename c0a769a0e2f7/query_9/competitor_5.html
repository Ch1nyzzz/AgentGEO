ated to planning for incompetence-including the law, and how that law has been interpreted in British Columbia.</span></div></td><td data-dcnode-id="3352"><span data-dcnode-id="3353" instrument_node="">Rivers, Prof. Deanna</span></td><td data-dcnode-id="3350"><span data-dcnode-id="3351" instrument_node="">Adjunct Professor</span></td><td data-dcnode-id="3348"><span data-dcnode-id="3349" instrument_node="">Faculty of Law</span></td></tr><tr class="Law--Justice-Issues Faculty-of-Law M S Virtual altrow" data-dcnode-id="3333" role="row"><td data-dcnode-id="3345"><span data-dcnode-id="3346" instrument_node="">Law &amp; Justice Issues</span></td><td class="more-info" data-dcnode-id="3340"><a data-dcnode-id="3343" href="#"><span data-dcnode-id="3344" instrument_node="">The Long Silence of the Vancouver Island (or 'Douglas') Treaties of 1850 to 1854 (M S) ◊</span></a><div class="description" data-dcnode-id="3341" style="display: none;"><span data-dcnode-id="3342" instrument_node="">I describe the formation of the Vancouver Island Treaties between First Nations and James Douglas as agent of the Crown, highlighting the earliest First Nation accounts, downplaying the colonial version of events, and tracing subsequent attempts by settlers and government officials to trivialize or even deny the treaties.</span></div></td><td data-dcnode-id="3338"><span data-dcnode-id="3339" instrument_node="">Vallance, Dr. Neil</span></td><td data-dcnode-id="3336"><span data-dcnode-id="3337" instrument_node="">Adjunct Professor</span></td><td data-dcnode-id="3334"><span data-dcnode-id="3335" instrument_node="">Faculty of Law</span></td></tr><tr class="Law--Justice-Issues Department-of-Economics M S Virtual" data-dcnode-id="3319" role="row"><td data-dcnode-id="3331"><span data-dcnode-id="3332" instrument_node="">Law &amp; Justice Issues</span></td><td class="more-info" data-dcnode-id="3326"><a data-dcnode-id="3329" href="#"><span data-dcnode-id="3330" instrument_node="">The Impacts of Historical Treaty Making in Canada (M S) ◊</span></a><div class="description" data-dcnode-id="3327" style="display: none;"><span data-dcnode-id="3328" instrument_node="">In this talk, I discuss the evolution of treaty-making in Canada from the Peace and Friendship through the Comprehensive treaties and the impacts on long-run economic development for First Nations.</span></div></td><td data-dcnode-id="3324"><span data-dcnode-id="3325" instrument_node="">Gillezeau, Dr. Rob</span></td><td data-dcnode-id="3322"><span data-dcnode-id="3323" instrument_node="">Assistant Professor</span></td><td data-dcnode-id="3320"><span data-dcnode-id="3321" instrument_node="">Department of Economics</span></td></tr><tr class="Law--Justice-Issues Faculty-of-Law Virtual altrow" data-dcnode-id="3305" role="row"><td data-dcnode-id="3317"><span data-dcnode-id="3318" instrument_node="">Law &amp; Justice Issues</span></td><td class="more-info" data-dcnode-id="3312"><a data-dcnode-id="3315" href="#"><span data-dcnode-id="3316" instrument_node="">Machine Listening, Improvisation and Access to Justice in Family Law ◊</span></a><div class="description" data-dcnode-id="3313" style="display: none;"><span data-dcnode-id="3314" instrument_node="">Particularly in the area of Family Law, Artificial Intelligence (AI) and/or Online Dispute Resolution (ODR) is often aligned with Access to Justice (A2J) as a means of making legal decision-making cheaper, faster and more accessible to the general public. But this approach calls the question: can machines ever truly listen deeply and attentively to the singularity and uniqueness of the situation before them, thereby dispensing justice in the family law realm? Or, contrary to widespread urgings in favour of technology as a facilitator of access to justice for litigants, is “machine listening” inherently unjust? This talk looks to research undertaken by both critical improvisational and legal scholars to examine whether it is possible, or even desirable, to utilize machine listening in the family law context with a view to enabling more just decision-making, or dispelling what is now being called Digital Family Justice.</span></div></td><td data-dcnode-id="3310"><span data-dcnode-id="3311" instrument_node="">Ramshaw, Dr. Sara</span></td><td data-dcnode-id="3308"><span data-dcnode-id="3309" instrument_node="">Associate Professor</span></td><td data-dcnode-id="3306"><span data-dcnode-id="3307" instrument_node="">Faculty of Law</span></td></tr><tr class="Law--Justice-Issues Faculty-of-Law M S Virtual" data-dcnode-id="3291" role="row"><td data-dcnode-id="3303"><span data-dcnode-id="3304" instrument_node="">Law &amp; Justice Issues</span></td><td class="more-info" data-dcnode-id="3298"><a data-dcnode-id="3301" href="#"><span data-dcnode-id="3302" instrument_node="">Justice by Design: Changing Legal and Justice Systems to Meet Community Needs (M S) NEW ◊</span></a><div class="description" data-dcnode-id="3299" style="display: none;"><span data-dcnode-id="3300" instrument_node="">This presentation is based on challenges individuals and communities have in getting access to the legal and justice systems, and obtaining just and sustainable outcomes through those systems. It looks at how these systems have created barriers to access, and how communities can design solutions that overcome these barriers and meet their needs. </span></div></td><td data-dcnode-id="3296"><span data-dcnode-id="3297" instrument_node="">Lapper, QC, Prof. Robert</span></td><td data-dcnode-id="3294"><span data-dcnode-id="3295" instrument_node="">David &amp; Dorothy Lam Chair in  Law and Public Policy</span></td><td data-dcnode-id="3292"><span data-dcnode-id="3293" instrument_node="">Faculty of Law</span></td></tr><tr class="Law--Justice-Issues Faculty-of-Law M S Virtual altrow" data-dcnode-id="3277" role="row"><td data-dcnode-id="3289"><span data-dcnode-id="3290" instrument_node="">Law &amp; Justice Issues</span></td><td class="more-info" data-dcnode-id="3284"><a data-dcnode-id="3287" href="#"><span data-dcnode-id="3288" instrument_node="">Justice System Reform: Community Engagement with the Justice System (M S) NEW ◊</span></a><div class="description" data-dcnode-id="3285" style="display: none;"><span data-dcnode-id="3286" instrument_node="">This presentation is based on challenges individuals and communities have in getting access to the legal and justice systems, and obtaining just and sustainable outcomes through those systems. It looks at how these systems have created barriers to access, and how communities can design solutions that overcome these barriers and meet their needs. </span></div></td><td data-dcnode-id="3282"><span data-dcnode-id="3283" instrument_node="">Lapper, QC, Prof. Robert</span></td><td data-dcnode-id="3280"><span data-dcnode-id="3281" instrument_node="">David &amp; Dorothy Lam Chair in Law and Public Policy</span></td><td data-dcnode-id="3278"><span data-dcnode-id="3279" instrument_node="">Faculty of Law</span></td></tr><tr class="Law--Justice-Issues Faculty-of-Law S Not-Virtual" data-dcnode-id="3263" role="row"><td data-dcnode-id="3275"><span data-dcnode-id="3276" instrument_node="">Law &amp; Justice Issues</span></td><td class="more-info" data-dcnode-id="3270"><a data-dcnode-id="3273" href="#"><span data-dcnode-id="3274" instrument_node="">Global Corruption: An Issue We Should No Longer Ignore (Sept-Dec) (S)</span></a><div class="description" data-dcnode-id="3271" style="display: none;"><span data-dcnode-id="3272" instrument_node="">This talk identifies the extent of global corruption and the devastating impact that it has on poverty, gender inequality, economic development, and political and legal stability. The talk also identifies steps that must be taken to combat corruption and bribery.</span></div></td><td data-dcnode-id="3268"><span data-dcnode-id="3269" instrument_node="">Ferguson, Prof. Gerry</span></td><td data-dcnode-id="3266"><span data-dcnode-id="3267" instrument_node="">Distinguished P e="">Faculty of Law</span></td></tr><tr class="Law--Justice-Issues Faculty-of-Law E M S Virtual altrow" data-dcnode-id="3167" role="row"><td data-dcnode-id="3179"><span data-dcnode-id="3180" instrument_node="">Law &amp; Justice Issues</span></td><td class="more-info" data-dcnode-id="3174"><a data-dcnode-id="3177" href="#"><span data-dcnode-id="3178" instrument_node="">Veganism, Dairy and Decolonization (E M S) NEW ◊</span></a><div class="description" data-dcnode-id="3175" style="display: none;"><span data-dcnode-id="3176" instrument_node="">This talk challenges stereotypical representations of veganism and animal rights as culturally imperialist, and shows the substantial alignment between ethical veganism and decolonization through the example of the dairy industry.</span></div></td><td data-dcnode-id="3172"><span data-dcnode-id="3173" instrument_node="">Deckha, Prof. Maneesha</span></td><td data-dcnode-id="3170"><span data-dcnode-id="3171" instrument_node="">Professor and Lansdowne Chair</span></td><td data-dcnode-id="3168"><span data-dcnode-id="3169" instrument_node="">Faculty of Law</span></td></tr><tr class="Law--Justice-Issues Faculty-of-Law E M S Virtual" data-dcnode-id="3153" role="row"><td data-dcnode-id="3165"><span data-dcnode-id="3166" instrument_node="">Law &amp; Justice Issues</span></td><td class="more-info" data-dcnode-id="3160"><a data-dcnode-id="3163" href="#"><span data-dcnode-id="3164" instrument_node="">Animals as Legal Beings: Contesting Anthropocentric Legal Orders (E M S) NEW ◊</span></a><div class="description" data-dcnode-id="3161" style="display: none;"><span data-dcnode-id="3162" instrument_node="">Introduces the main idea behind my book, which calls for a new legal status for animals, and explains what this status is.</span></div></td><td data-dcnode-id="3158"><span data-dcnode-id="3159" instrument_node="">Deckha, Prof. Maneesha</span></td><td data-dcnode-id="3156"><span data-dcnode-id="3157" instrument_node="">Professor and Lansdowne Chair</span></td><td data-dcnode-id="3154"><span data-dcnode-id="3155" instrument_node="">Faculty of Law</span></td></tr><tr class="Law--Justice-Issues Department-of-Social-Work Virtual altrow" data-dcnode-id="3139" role="row"><td data-dcnode-id="3151"><span data-dcnode-id="3152" instrument_node="">Law &amp; Justice Issues</span></td><td class="more-info" data-dcnode-id="3146"><a data-dcnode-id="3149" href="#"><span data-dcnode-id="3150" instrument_node="">Harassment and Human Rights: Problem, Response and Remedy ◊</span></a><div class="description" data-dcnode-id="3147" style="display: none;"><span data-dcnode-id="3148" instrument_node="">For the last 25 years the speaker has worked nationally and internationally on campuses and communities, with organizations, groups and individuals to address the complicated issue of sexual harassment and to develop workable responses in policy and practice. There are many shades of grey in this work and it’s important that the policy responses that organizations develop don't also become part of the problem.</span></div></td><td data-dcnode-id="3144"><span data-dcnode-id="3145" instrument_node="">Whittington, Dr. Barbara</span></td><td data-dcnode-id="3142"><span data-dcnode-id="3143" instrument_node="">Professor Emerita</span></td><td data-dcnode-id="3140"><span data-dcnode-id="3141" instrument_node="">Department of Social Work</span></td></tr><tr class="Law--Justice-Issues Department-of-Social-Work Virtual" data-dcnode-id="3125" role="row"><td data-dcnode-id="3137"><span data-dcnode-id="3138" instrument_node="">Law &amp; Justice Issues</span></td><td class="more-info" data-dcnode-id="3132"><a data-dcnode-id="3135" href="#"><span data-dcnode-id="3136" instrument_node="">Restorative Justice in the Community: Accountability to Victims Works for All ◊</span></a><div class="description" data-dcnode-id="3133" style="display: none;"><span data-dcnode-id="3134" instrument_node="">As part of a community group, Peninsula Crossroads Community Justice, we work with situations that would normally or previously have been ignored or would have wound their way through a lengthy court process. The police and the schools refer youth and adult cases to our community group. Restorative justice brings the victim(s), those harmed, and the harm-doers together whenever possible to determine what happened and how amends can be made. The process is both powerful and productive. This presentation gives examples of situations from the police or schools that have been dealt with in this potentially transformational way, followed by a discussion.</span></div></td><td data-dcnode-id="3130"><span data-dcnode-id="3131" instrument_node="">Whittington, Dr. Barbara</span></td><td data-dcnode-id="3128"><span data-dcnode-id="3129" instrument_node="">Professor Emerita</span></td><td data-dcnode-id="3126"><span data-dcnode-id="3127" instrument_node="">Department of Social Work</span></td></tr><tr class="Literature Medieval-Studies-Program S Virtual altrow" data-dcnode-id="3111" role="row"><td data-dcnode-id="3123"><span data-dcnode-id="3124" instrument_node="">Literature</span></td><td class="more-info" data-dcnode-id="3118"><a data-dcnode-id="3121" href="#"><span data-dcnode-id="3122" instrument_node="">Valkyries and Vikings and Mermaids-Oh My! (S) ◊</span></a><div class="description" data-dcnode-id="3119" style="display: none;"><span data-dcnode-id="3120" instrument_node="">Did Vikings believe in mermaids? The question arises from Louis Moe’s illustrations for Ragnarok (1929) and Valkyrien (1941) and also from Johann Gerht’s illustration for Thridrek’s Saga (1901). I will examine the cultural history of mermaids in illustrated texts from classical antiquity, the Christian Middle Ages and Old Norse mythology.</span></div></td><td data-dcnode-id="3116"><span data-dcnode-id="3117" instrument_node="">Baer, Dr. Trish</span></td><td data-dcnode-id="3114"><span data-dcnode-id="3115" instrument_node="">Adjunct Professor</span></td><td data-dcnode-id="3112"><span data-dcnode-id="3113" instrument_node="">Medieval Studies Program</span></td></tr><tr class="Literature Medieval-Studies-Program S Virtual" data-dcnode-id="3097" role="row"><td data-dcnode-id="3109"><span data-dcnode-id="3110" instrument_node="">Literature</span></td><td class="more-info" data-dcnode-id="3104"><a data-dcnode-id="3107" href="#"><span data-dcnode-id="3108" instrument_node="">A Viking Voyage: Trading, Raiding or Emigrating? (S) ◊</span></a><div class="description" data-dcnode-id="3105" style="display: none;"><span data-dcnode-id="3106" instrument_node="">This presentation looks at Viking voyages in terms of material culture. I will begin with the observation that before going on a voyage it was necessary to select the type of ship best suited for the journey, e.g., not all Viking ships were warships. I will discuss the different types of ships and the materials necessary to build them along with the tasks involved in spinning, weaving and waterproofing the woolen sails. I will also discuss what is known about navigation methods; the necessities to pack onboard for the voyage; and the types of shelter used on the voyage and on land,&nbsp;e.g., tents or turf houses.&nbsp;</span></div></td><td data-dcnode-id="3102"><span data-dcnode-id="3103" instrument_node="">Baer, Dr. Trish</span></td><td data-dcnode-id="3100"><span data-dcnode-id="3101" instrument_node="">Adjunct Professor</span></td><td data-dcnode-id="3098"><span data-dcnode-id="3099" instrument_node="">Medieval Studies Program</span></td></tr><tr class="Literature Medieval-Studies-Program M S Virtual altrow" data-dcnode-id="3083" role="row"><td data-dcnode-id="3095"><span data-dcnode-id="3096" instrument_node="">Literature</span></td><td class="more-info" data-dcnode-id="3090"><a data-dcnode-id="3093" href="#"><span data-dcnode-id="3094" instrument_node="">The Victorian Retellings of Viking Mythology: A Mythological Makeover (M S) NEW ◊</span></a><div class="description" data-dcnode-id="3091" style="display: none;"><span data-dcnode-id="3092" instrument_node="">In the hands of Victorian/Edwardian storytellers and illustrators, the Old Norse myths were bowdlerized, moralized, Christianized and merged with folk and fairy tales. My presentation will focus on the illustrations of Thor´s hammer Mjöllnir and the myths concerning him. Distorted or diminished, Mjöllnir loses aspects of its fundamental cultural, iconographical, and mythological significance in the retelling.</span></div></td><td data-dcnode-id="3088"><span data-dcnode-id="3089" instrument_node="">Baer, Dr. Trish</span></td><td data-dcnode-id="3086"><span data-dcnode-id="3087" instrument_node="">Adjunct Professor</span></td><td data-dcnode-id="3084"><span data-dcnode-id="3085" instrument_node="">Medieval Studies Program</span></td></tr><tr class="Literature Department-of-French S Virtual" data-dcnode-id="3069" role="row"><td data-dcnode-id="3081"><span data-dcnode-id="3082" instrument_node="">Literature</span></td><td class="more-info" data-dcnode-id="3076"><a data-dcnode-id="3079" href="#"><span data-dcnode-id="3080" instrument_node="">19th-Century French Literature and Culture (in English or French) (S) ◊</span></a><div class="description" data-dcnode-id="3077" style="display: none;"><span data-dcnode-id="3078" instrument_node="">This talk discusses 19th-century French literature and culture: the role of science, industry and politics in literary production.</span></div></td><td data-dcnode-id="3074"><span data-dcnode-id="3075" instrument_node="">Fromet de Rosnay, Dr. Emile</span></td><td data-dcnode-id="3072"><span data-dcnode-id="3073" instrument_node="">Assistant Professor</span></td><td data-dcnode-id="3070"><span data-dcnode-id="3071" instrument_node="">Department of French</span></td></tr><tr class="Literature Department-of-French S Virtual altrow" data-dcnode-id="3055" role="row"><td data-dcnode-id="3067"><span data-dcnode-id="3068" instrument_node="">Literature</span></td><td class="more-info" data-dcnode-id="3062"><a data-dcnode-id="3065" href="#"><span data-dcnode-id="3066" instrument_node="">French Literature Since 1800 (in English or French) (S) ◊</span></a><div class="description" data-dcnode-id="3063" style="display: none;"><span data-dcnode-id="3064" instrument_node="">This presentation can discuss any topic in literature from the Enlightenment onward, from Voltaire to the present. It can also include topics such as the Enlightenment novel, romantic and modernist poetry, and postmodern culture.</span></div></td><td data-dcnode-id="3060"><span data-dcnode-id="3061" instrument_node="">Fromet de Rosnay, Dr. Emile</span></td><td data-dcnode-id="3058"><span data-dcnode-id="3059" instrument_node="">Assistant Professor</span></td><td data-dcnode-id="3056"><span data-dcnode-id="3057" instrument_node="">Department of French</span></td></tr><tr class="Literature Department-of-French S Virtual" data-dcnode-id="3041" role="row"><td data-dcnode-id="3053"><span data-dcnode-id="3054" instrument_node="">Literature</span></td><td class="more-info" data-dcnode-id="3048"><a data-dcnode-id="3051" href="#"><span data-dcnode-id="3052" instrument_node="">Introduction to the Indigenous Literatures of Québec (S) (in English or French) NEW ◊</span></a><div class="description" data-dcnode-id="3049" style="display: none;"><span data-dcnode-id="3050" instrument_node="">Introduction to the First Nations and Inuit communities of the territory known as Québec. Overview of the history of Indigenous literature practices, from colonialism to today.</span></div></td><td data-dcnode-id="3046"><span data-dcnode-id="3047" instrument_node="">Landry, Dr. Pierre-Luc</span></td><td data-dcnode-id="3044"><span data-dcnode-id="3045" instrument_node="">Assistant Professor</span></td><td data-dcnode-id="3042"><span data-dcnode-id="3043" instrument_node="">Department of French</span></td></tr><tr class="Literature Department-of-French S Virtual altrow" data-dcnode-id="3027" role="row"><td data-dcnode-id="3039"><span data-dcnode-id="3040" instrument_node="">Literature</span></td><td class="more-info" data-dcnode-id="3034"><a data-dcnode-id="3037" href="#"><span data-dcnode-id="3038" instrument_node="">Settler Colonialism in Québec Literature, and the Erasure of Indigenous Sovereignty (S) (in English or French) ◊</span></a><div class="description" data-dcnode-id="3035" style="display: none;"><span data-dcnode-id="3036" instrument_node="">An overview of how narrative strategies in Québec literature tend to erase the presence, contemporaneity and sovereignty of Indigenous peoples, and of how Indigenous literature resist these harmful narratives.</span></div></td><td data-dcnode-id="3032"><span data-dcnode-id="3033" instrument_node="">Landry, Dr. Pierre-Luc</span></td><td data-dcnode-id="3030"><span data-dcnode-id="3031" instrument_node="">Assistant Professor</span></td><td data-dcnode-id="3028"><span data-dcnode-id="3029" instrument_node="">Department of French</span></td></tr><tr class="Literature Department-of-French S Virtual" data-dcnode-id="3013" role="row"><td data-dcnode-id="3025"><span data-dcnode-id="3026" instrument_node="">Literature</span></td><td class="more-info" data-dcnode-id="3020"><a data-dcnode-id="3023" href="#"><span data-dcnode-id="3024" instrument_node="">LGBTQIA2S+ Cultures and the Literatures of Québec: a QuébeQueer Introduction (in English or French) (S) NEW ◊</span></a><div class="description" data-dcnode-id="3021" style="display: none;"><span data-dcnode-id="3022" instrument_node="">Introduction to issues of sex and gender (the gender unicorn, LGBTQ+ terminology, etc.), and an overview of a few queer cultural productions (in literature, cinema, music, visual arts, etc.) from contemporary Québec.</span></div></td><td data-dcnode-id="3018"><span data-dcnode-id="3019" instrument_node="">Landry, Dr. Pierre-Luc</span></td><td data-dcnode-id="3016"><span data-dcnode-id="3017" instrument_node="">Assistant Professor</span></td><td data-dcnode-id="3014"><span data-dcnode-id="3015" instrument_node="">Department of French</span></td></tr><tr class="Literature Department-of-French S Virtual altrow" data-dcnode-id="2999" role="row"><td data-dcnode-id="3011"><span data-dcnode-id="3012" instrument_node="">Literature</span></td><td class="more-info" data-dcnode-id="3006"><a data-dcnode-id="3009" href="#"><span data-dcnode-id="3010" instrument_node="">Inclusive, Non-binary and Epicene Writing in French (S) (in English or French) NEW ◊</span></a><div class="description" data-dcnode-id="3007" style="display: none;"><span data-dcnode-id="3008" instrument_node="">An overview of different strategies to write in an inclusive and anti-sexist way in French. Strategies to avoid or pervert the grammatical rule stating that "the masculine form takes precedence over the feminine form".</span></div></td><td data-dcnode-id="3004"><span data-dcnode-id="3005" instrument_node="">Landry, Dr. Pierre-Luc</span></td><td data-dcnode-id="3002"><span data-dcnode-id="3003" instrument_node="">Assistant Professor</span></td><td data-dcnode-id="3000"><span data-dcnode-id="3001" instrument_node="">Department of French</span></td></tr><tr class="Literature Department-of-French S Virtual" data-dcnode-id="2985" role="row"><td data-dcnode-id="2997"><span data-dcnode-id="2998" instrument_node="">Literature</span></td><td class="more-info" data-dcnode-id="2992"><a data-dcnode-id="2995" href="#"><span data-dcnode-id="2996" instrument_node="">How to Write Everywhere All of the Time (in English or French) (S) NEW ◊</span></a><div class="description" data-dcnode-id="2993" style="display: none;"><span data-dcnode-id="2994" instrument_node="">A creative writing workshop facilitating the appropriation of language in order to foster creativity and self-reflection in different circumstances. While this workshop is not based on art therapy, it explores creative writing as a self-discovery tool.</span></div></td><td data-dcnode-id="2990"><span data-dcnode-id="2991" instrument_node="">Landry, Dr. Pierre-Luc</span></td><td data-dcnode-id="2988"><span data-dcnode-id="2989" instrument_node="">Assistant Professor</span></td><td data-dcnode-id="2986"><span data-dcnode-id="2987" instrument_node="">Department of French</span></td></tr><tr class="Literature Department-of-Germanic--Slavic-Studies Virtual altrow" data-dcnode-id="2971" role="row"><td data-dcnode-id="2983"><span data-dcnode-id="2984" instrument_node="">Literature</span></td><td class="more-info" data-dcnode-id="2978"><a data-dcnode-id="2981" href="#"><span data-dcnode-id="2982" instrument_node="">Into the Woods with German Myths and Fairy Tales ◊</span></a><div class="description" data-dcnode-id="2979" style="display: none;"><span data-dcnode-id="2980" instrument_node="">This presentation is about the enduring relevance of fairy tales and addresses the following questions: Why do we need fairy tales? What is a hero? What is a quest? Why do fairy tales often take place in a forest environment? What is the cultural significance of wolves and ogres?</span></div></td><td data-dcnode-id="2976"><span data-dcnode-id="2977" instrument_node="">Pnevmonidou, Dr. Elena</span></td><td data-dcnode-id="2974"><span data-dcnode-id="2975" instrument_node="">Assistant Professor</span></td><td data-dcnode-id="2972"><span data-dcnode-id="2973" instrument_node="">Department of Germanic &amp; Slavic Studies</span></td></tr><tr class="Literature Department-of-Hispanic--Italian-Studies S Virtual" data-dcnode-id="2958" role="row"><td data-dcnode-id="2969"><span data-dcnode-id="2970" instrument_node="">Literature</span></td><td class="more-info" data-dcnode-id="2965"><a data-dcnode-id="2967" href="#"><span data-dcnode-id="2968" instrument_node="">Modern Latin American Literature (in English or Spanish) (S) ◊</span></a><div class="description" data-dcnode-id="2966" style="display: none;"></div></td><td data-dcnode-id="2963"><span data-dcnode-id="2964" instrument_node="">Russek, Dr. Dan</span></td><td data-dcnode-id="2961"><span data-dcnode-id="2962" instrument_node="">Associate Professor</span></td><td data-dcnode-id="2959"><span data-dcnode-id="2960" instrument_node="">Department of Hispanic &amp; Italian Studies</span></td></tr><tr class="Literature Department-of-Hispanic--Italian-Studies S Virtual altrow" data-dcnode-id="2945" role="row"><td data-dcnode-id="2956"><span data-dcnode-id="2957" instrument_node="">Literature</span></td><td class="more-info" data-dcnode-id="2952"><a data-dcnode-id="2954" href="#"><span data-dcnode-id="2955" instrument_node="">Modern Latin American Literature and Visual Arts (in English or Spanish) (S) ◊</span></a><div class="description" data-dcnode-id="2953" style="display: none;"></div></td><td data-dcnode-id="2950"><span data-dcnode-id="2951" instrument_node="">Russek, Dr. Dan</span></td><td data-dcnode-id="2948"><span data-dcnode-id="2949" instrument_node="">Associate Professor</span></td><td data-dcnode-id="2946"><span data-dcnode-id="2947" instrument_node="">Department of Hispanic &amp; Italian Studies</span></td></tr><tr class="Literature Department-of-Hispanic--Italian-Studies S Virtual" data-dcnode-id="2932" role="row"><td data-dcnode-id="2943"><span data-dcnode-id="2944" instrument_node="">Literature</span></td><td class="more-info" data-dcnode-id="2939"><a data-dcnode-id="2941" href="#"><span data-dcnode-id="2942" instrument_node="">Modern Latin American Culture (in English or Spanish) (S) ◊</span></a><div class="description" data-dcnode-id="2940" style="display: none;"></div></td><td data-dcnode-id="2937"><span data-dcnode-id="2938" instrument_node="">Russek, Dr. Dan</span></td><td data-dcnode-id="2935"><span data-dcnode-id="2936" instrument_node="">Associate Professor</span></td><td data-dcnode-id="2933"><span data-dcnode-id="2934" instrument_node="">Department of Hispanic &amp; Italian Studies</span></td></tr><tr class="Literature Department-of-History M S Virtual altrow" data-dcnode-id="2918" role="row"><td data-dcnode-id="2930"><span data-dcnode-id="2931" instrument_node="">Literature</span></td><td class="more-info" data-dcnode-id="2925"><a data-dcnode-id="2928" href="#"><span data-dcnode-id="2929" instrument_node="">The Golden Age of the English Detective Novel (M S) ◊</span></a><div class="description" data-dcnode-id="2926" style="display: none;"><span data-dcnode-id="2927" instrument_node="">The years between the First and Second World Wars are universally seen as the “golden age” of English detective fiction. This talk suggests why this was the case through the examples of Agatha Christie, Dorothy Sayers and G.K. Chesterton-and, of course, their forebear Sir Arthur Conan Doyle.</span></div></td><td data-dcnode-id="2923"><span data-dcnode-id="2924" instrument_node="">Devereaux, Dr. Simon</span></td><td data-dcnode-id="2921"><span data-dcnode-id="2922" instrument_node="">Associate Professor</span></td><td data-dcnode-id="2919"><span data-dcnode-id="2920" instrument_node="">Department of History</span></td></tr><tr class="Literature Department-of-English S Virtual" data-dcnode-id="2904" role="row"><td data-dcnode-id="2916"><span data-dcnode-id="2917" instrument_node="">Literature</span></td><td class="more-info" data-dcnode-id="2911"><a data-dcnode-id="2914" href="#"><span data-dcnode-id="2915" instrument_node="">American Literature and the Christian Right (S) ◊</span></a><div class="description" data-dcnode-id="2912" style="display: none;"><span data-dcnode-id="2913" instrument_node="">This talk discusses the surprising re-emergence of conservative Christianity as a powerful political and social force since the 1960s, and the consequences of that emergence for mainstream American literature. For more information: http://religiondispatches.org/who-are-we-and-how-should-we-live-american-literature-and-the-god-gap/. </span></div></td><td data-dcnode-id="2909"><span data-dcnode-id="2910" instrument_node="">Douglas, Dr. Christopher</span></td><td data-dcnode-id="2907"><span data-dcnode-id="2908" instrument_node="">Professor</span></td><td data-dcnode-id="2905"><span data-dcnode-id="2906" instrument_node="">Department of English</span></td></tr><tr class="Literature Department-of-English S Virtual altrow" data-dcnode-id="2890" role="row"><td data-dcnode-id="2902"><span data-dcnode-id="2903" instrument_node="">Literature</span></td><td class="more-info" data-dcnode-id="2897"><a data-dcnode-id="2900" href="#"><span data-dcnode-id="2901" instrument_node="">Fundamentalism and Literature (S) ◊</span></a><div class="description" data-dcnode-id="2898" style="display: none;"><span data-dcnode-id="2899" instrument_node="">This talk is an introduction to the theology and politics of Christian fundamentalist fiction. Includes famous novels such as Left Behind, The Shack, and This Present Darkness.</span></div></td><td data-dcnode-id="2895"><span data-dcnode-id="2896" instrument_node="">Douglas, Dr. Christopher</span></td><td data-dcnode-id="2893"><span data-dcnode-id="2894" instrument_node="">Professor</span></td><td data-dcnode-id="2891"><span data-dcnode-id="2892" instrument_node="">Department of English</span></td></tr><tr class="Literature Department-of-English Virtual" data-dcnode-id="2876" role="row"><td data-dcnode-id="2888"><span data-dcnode-id="2889" instrument_node="">Literature</span></td><td class="more-info" data-dcnode-id="2883"><a data-dcnode-id="2886" href="#"><span data-dcnode-id="2887" instrument_node="">The Bible’s Many Gods ◊</span></a><div class="description" data-dcnode-id="2884" style="display: none;"><span data-dcnode-id="2885" instrument_node="">An introduction to some of the historical-critical Bible scholarship that examines the development of monotheism out of an earlier polytheistic cultural matrix. Includes a discussion of the lingering traces of polytheism in the Hebrew Bible (Old Testament) and New Testament.</span></div></td><td data-dcnode-id="2881"><span data-dcnode-id="2882" instrument_node="">Douglas, Dr. Christopher</span></td><td data-dcnode-id="2879"><span data-dcnode-id="2880" instrument_node="">Professor</span></td><td data-dcnode-id="2877"><span data-dcnode-id="2878" instrument_node="">Department of English</span></td></tr><tr class="Literature Department-of-English S Virtual altrow" data-dcnode-id="2862" role="row"><td data-dcnode-id="2874"><span data-dcnode-id="2875" instrument_node="">Literature</span></td><td class="more-info" data-dcnode-id="2869"><a data-dcnode-id="2872" href="#"><span data-dcnode-id="2873" instrument_node="">Did Shakespeare Invent Love? (S) ◊</span></a><div class="description" data-dcnode-id="2870" style="display: none;"><span data-dcnode-id="2871" instrument_node="">Prior to the publication of Shakespeare's Sonnets in 1609, the dominant way of expressing romantic love in verse involved comparing the beloved to a preexisting ideal. By reversing this practice, Shakespeare bequeathed a tradition in which the lover praises the beloved for their individual, even idiosyncratic, qualities. We now take this practice so much for granted that we think it 'natural'. Yet it is an historical inheritance, traceable, in large part, to Shakespeare's Sonnets.</span></div></td><td data-dcnode-id="2867"><span data-dcnode-id="2868" instrument_node="">Kuchar, Dr. Gary</span></td><td data-dcnode-id="2865"><span data-dcnode-id="2866" instrument_node="">Professor</span></td><td data-dcnode-id="2863"><span data-dcnode-id="2864" instrument_node="">Department of English</span></td></tr><tr class="Literature Department-of-English E M S Virtual" data-dcnode-id="2848" role="row"><td data-dcnode-id="2860"><span data-dcnode-id="2861" instrument_node="">Literature</span></td><td class="more-info" data-dcnode-id="2855"><a data-dcnode-id="2858" href="#"><span data-dcnode-id="2859" instrument_node="">How Ghost Stories Work-and Why (in English or French) (E M S) ◊</span></a><div class="description" data-dcnode-id="2856" style="display: none;"><span data-dcnode-id="2857" instrument_node="">We examine the rhetoric and technique of ghost stories to see how they produce their scary, uncanny effects on readers. Then we practice writing some of our own. </span></div></td><td data-dcnode-id="2853"><span data-dcnode-id="2854" instrument_node="">Ross, Dr. Stephen</span></td><td data-dcnode-id="2851"><span data-dcnode-id="2852" instrument_node="">Professor</span></td><td data-dcnode-id="2849"><span data-dcnode-id="2850" instrument_node="">Department of English</span></td></tr><tr class="Literature Department-of-French S Virtual altrow" data-dcnode-id="2834" role="row"><td data-dcnode-id="2846"><span data-dcnode-id="2847" instrument_node="">Literature</span></td><td class="more-info" data-dcnode-id="2841"><a data-dcnode-id="2844" href="#"><span data-dcnode-id="2845" instrument_node="">Christine of Pizan: A Life of Her Own (in English or French) (S) ◊</span></a><div class="description" data-dcnode-id="2842" style="display: none;"><span data-dcnode-id="2843" instrument_node="">Christine de Pizan (1364–c. 1430) became one of the most important French authors when (and because) she was widowed. An exceptional writer and fighter for women's rights, she wrote poetry and prose on the burning topics of her time and of her life: love, equality of men and women, royal justice, good government, and Joan of Arc, among other subjects. She was forgotten for a long time before the relatively recent rediscovery of her works.</span></div></td><td data-dcnode-id="2839"><span data-dcnode-id="2840" instrument_node="">Cazes, Dr. Hélène</span></td><td data-dcnode-id="2837"><span data-dcnode-id="2838" instrument_node="">Professor</span></td><td data-dcnode-id="2835"><span data-dcnode-id="2836" instrument_node="">Department of French</span></td></tr><tr class="Literature Department-of-Pacific--Asian-Studies- Virtual" data-dcnode-id="2821" role="row"><td data-dcnode-id="2832"><span data-dcnode-id="2833" instrument_node="">Literature</span></td><td class="more-info" data-dcnode-id="2828"><a data-dcnode-id="2830" href="#"><span data-dcnode-id="2831" instrument_node="">The Tale of Genji: The World's Oldest Novel (in English or Japanese) ◊</span></a><div class="description" data-dcnode-id="2829" style="display: none;"></div></td><td data-dcnode-id="2826"><span data-dcnode-id="2827" instrument_node="">Poulton, Dr. Cody</span></td><td data-dcnode-id="2824"><span data-dcnode-id="2825" instrument_node="">Professor Emeritus</span></td><td data-dcnode-id="2822"><span data-dcnode-id="2823" instrument_node="">Department of Pacific &amp; Asian Studies </span></td></tr><tr class="Literature Department-of-Pacific--Asian-Studies- Virtual altrow" data-dcnode-id="2808" role="row"><td data-dcnode-id="2819"><span data-dcnode-id="2820" instrument_node="">Literature</span></td><td class="more-info" data-dcnode-id="2815"><a data-dcnode-id="2817" href="#"><span data-dcnode-id="2818" instrument_node="">Japan's Iliad: The Tale of the Heike (in English or Japanese) ◊</span></a><div class="description" data-dcnode-id="2816" style="display: none;"></div></td><td data-dcnode-id="2813"><span data-dcnode-id="2814" instrument_node="">Poulton, Dr. Cody</span></td><td data-dcnode-id="2811"><span data-dcnode-id="2812" instrument_node="">Professor Emeritus</span></td><td data-dcnode-id="2809"><span data-dcnode-id="2810" instrument_node="">Department of Pacific &amp; Asian Studies </span></td></tr><tr class="Literature School-of-Public-Administration S Virtual" data-dcnode-id="2794" role="row"><td data-dcnode-id="2806"><span data-dcnode-id="2807" instrument_node="">Literature</span></td><td class="more-info" data-dcnode-id="2801"><a data-dcnode-id="2804" href="#"><span data-dcnode-id="2805" instrument_node="">Poetry and Social Movements (S) ◊</span></a><div class="description" data-dcnode-id="2802" style="display: none;"><span data-dcnode-id="2803" instrument_node="">Budd Hall is a Professor Emeritus at UVic who has had a career in adult education, community-development and participatory research. He is the Co-Chair of the UNESCO Chair in Community-Based Research and Social Responsibility in Higher Education. His current focus is on training young people for doing locally based participatory research and supporting the strengthening of community-university research partnerships. He is also a poet and part of the Victoria Social Movement Poets Collective.</span></div></td><td data-dcnode-id="2799"><span data-dcnode-id="2800" instrument_node="">Hall, Prof. Budd</span></td><td data-dcnode-id="2797"><span data-dcnode-id="2798" instrument_node="">Professor Emeritus</span></td><td data-dcnode-id="2795"><span data-dcnode-id="2796" instrument_node="">School of Public Administration</span></td></tr><tr class="Literature Department-of-Anthropology S Virtual altrow" data-dcnode-id="2780" role="row"><td data-dcnode-id="2792"><span data-dcnode-id="2793" instrument_node="">Literature</span></td><td class="more-info" data-dcnode-id="2787"><a data-dcnode-id="2790" href="#"><span data-dcnode-id="2791" instrument_node="">The Conscious Art of Storytelling and Mythmaking ǂ (S) NEW ◊</span></a><div class="description" data-dcnode-id="2788" style="display: none;"><span data-dcnode-id="2789" instrument_node="">I will talk about the creative process within comics, art-making and writing as a storyteller and academic. I am able to engage creatively and provide the talk as a workshop.</span></div></td><td data-dcnode-id="2785"><span data-dcnode-id="2786" instrument_node="">Kernan, Mr. Luke</span></td><td data-dcnode-id="2783"><span data-dcnode-id="2784" instrument_node="">Graduate Student</span></td><td data-dcnode-id="2781"><span data-dcnode-id="2782" instrument_node="">Department of Anthropology</span></td></tr><tr class="Literature Department-of-Anthropology S Virtual" data-dcnode-id="2766" role="row"><td data-dcnode-id="2778"><span data-dcnode-id="2779" instrument_node="">Literature</span></td><td class="more-info" data-dcnode-id="2773"><a data-dcnode-id="2776" href="#"><span data-dcnode-id="2777" instrument_node="">What We Can Learn from Peoples’ Lived Experiences of Madness ǂ (S) NEW ◊</span></a><div class="description" data-dcnode-id="2774" style="display: none;"><span data-dcnode-id="2775" instrument_node="">I have extensive knowledge of states of mind, consciousness and mental health topics from my research as a Ph.D. candidate focusing on creative methods and lived experiences of psychosis. My fieldwork aims to be a form of activism and compassionate outreach.</span></div></td><td data-dcnode-id="2771"><span data-dcnode-id="2772" instrument_node="">Kernan, Mr. Luke</span></td><td data-dcnode-id="2769"><span data-dcnode-id="2770" instrument_node="">Graduate Student</span></td><td data-dcnode-id="2767"><span data-dcnode-id="2768" instrument_node="">Department of Anthropology</span></td></tr><tr class="Music-Art-Film--Theatre Department-of-French S Virtual altrow" data-dcnode-id="2752" role="row"><td data-dcnode-id="2764"><span data-dcnode-id="2765" instrument_node="">Music, Art, Film &amp; Theatre</span></td><td class="more-info" data-dcnode-id="2759"><a data-dcnode-id="2762" href="#"><span data-dcnode-id="2763" instrument_node="">French Cinema (in English or French) (S) ◊</span></a><div class="description" data-dcnode-id="2760" style="display: none;"><span data-dcnode-id="2761" instrument_node="">This talk examines 19th-century French literature and culture: the role of science, industry and politics in literary production.</span></div></td><td data-dcnode-id="2757"><span data-dcnode-id="2758" instrument_node="">Fromet de Rosnay, Dr. Emile</span></td><td data-dcnode-id="2755"><span data-dcnode-id="2756" instrument_node="">Assistant Professor</span></td><td data-dcnode-id="2753"><span data-dcnode-id="2754" instrument_node="">Department of French</span></td></tr><tr class="Music-Art-Film--Theatre Department-of-Music M S Virtual" data-dcnode-id="2738" role="row"><td data-dcnode-id="2750"><span data-dcnode-id="2751" instrument_node="">Music, Art, Film &amp; Theatre</span></td><td class="more-info" data-dcnode-id="2745"><a data-dcnode-id="2748" href="#"><span data-dcnode-id="2749" instrument_node="">Building Community through Live Music-Exploring the Roles of Artist, Presenter and Public (in English or French) (M S) ◊</span></a><div class="description" data-dcnode-id="2746" style="display: none;"><span data-dcnode-id="2747" instrument_node="">Why is live music important? What are the various roles that people play and how does this translate into stronger communities and vibrant cities? Explore the connections between mental health, physical health and the various levels at which one can participate in the arts as either spectator, presenter or artist.</span></div></td><td data-dcnode-id="2743"><span data-dcnode-id="2744" instrument_node="">Klazek, Dr. Merrie</span></td><td data-dcnode-id="2741"><span data-dcnode-id="2742" instrument_node="">Assistant Professor</span></td><td data-dcnode-id="2739"><span data-dcnode-id="2740" instrument_node="">Department of Music</span></td></tr><tr class="Music-Art-Film--Theatre Department-of-Music M S Virtual altrow" data-dcnode-id="2724" role="row"><td data-dcnode-id="2736"><span data-dcnode-id="2737" instrument_node="">Music, Art, Film &amp; Theatre</span></td><td class="more-info" data-dcnode-id="2731"><a data-dcnode-id="2734" href="#"><span data-dcnode-id="2735" instrument_node="">The Job of a Professional Orchestral Musician: On Stage and Behind the Scenes (in English or French) (M S) ◊</span></a><div class="description" data-dcnode-id="2732" style="display: none;"><span data-dcnode-id="2733" instrument_node="">A concert is a final product in a long, unseen process. Discover the fine nuances of training and levels of expertise developed by individuals who succeed in the world or being an orchestral musician. What are the challenges, what are the rewards and motivations? Interpersonal skills, dedication, committees, relationships with public, administration and artistic direction are all things we will explore.</span></div></td><td data-dcnode-id="2729"><span data-dcnode-id="2730" instrument_node="">Klazek, Dr. Merrie</span></td><td data-dcnode-id="2727"><span data-dcnode-id="2728" instrument_node="">Assistant Professor</span></td><td data-dcnode-id="2725"><span data-dcnode-id="2726" instrument_node="">Department of Music</span></td></tr><tr class="Music-Art-Film--Theatre Department-of-Theatre E M S Virtual" data-dcnode-id="2710" role="row"><td data-dcnode-id="2722"><span data-dcnode-id="2723" instrument_node="">Music, Art, Film &amp; Theatre</span></td><td class="more-info" data-dcnode-id="2717"><a data-dcnode-id="2720" href="#"><span data-dcnode-id="2721" instrument_node="">A History of Performance in British Columbia (E M S) NEW ◊</span></a><div class="description" data-dcnode-id="2718" style="display: none;"><span data-dcnode-id="2719" instrument_node="">This presentation offers an overview of the rich traditions of performance in the BC region, with a specific focus on the function of theatre for community building and cultural identity formation. </span></div></td><td data-dcnode-id="2715"><span data-dcnode-id="2716" instrument_node="">Kovacs, Dr. Alexandra (Sasha)</span></td><td data-dcnode-id="2713"><span data-dcnode-id="2714" instrument_node="">Assistant Professor</span></td><td data-dcnode-id="2711"><span data-dcnode-id="2712" instrument_node="">Department of Theatre</span></td></tr><tr class="Music-Art-Film--Theatre Department-of-Theatre S Virtual altrow" data-dcnode-id="2696" role="row"><td data-dcnode-id="2708"><span data-dcnode-id="2709" instrument_node="">Music, Art, Film &amp; Theatre</span></td><td class="more-info" data-dcnode-id="2703"><a data-dcnode-id="2706" href="#"><span data-dcnode-id="2707" instrument_node="">Theatre in War and (Post) Conflict Zones: The Importance of Laughter, Time and Place (in English or Dutch) (S) ◊</span></a><div class="description" data-dcnode-id="2704" style="display: none;"><span data-dcnode-id="2705" instrument_node="">These presentations offer an exploration of theatre in (post)-conflict zones and development contexts supported by an analysis of the value of applied theatre practitioners working in these settings. By describing the ethics and techniques on cultural awareness and by showing selected examples of theatre companies globally, these presentations offer a firm foundation in the basic theories, contexts and vocabularies used in the field. </span></div></td><td data-dcnode-id="2701"><span data-dcnode-id="2702" instrument_node="">Sadeghi Yekta, Dr. Kirsten</span></td><td data-dcnode-id="2699"><span data-dcnode-id="2700" instrument_node="">Assistant Professor</span></td><td data-dcnode-id="2697"><span data-dcnode-id="2698" instrument_node="">Department of Theatre</span></td></tr><tr class="Music-Art-Film--Theatre Department-of-Theatre S Virtual" data-dcnode-id="2682" role="row"><td data-dcnode-id="2694"><span data-dcnode-id="2695" instrument_node="">Music, Art, Film &amp; Theatre</span></td><td class="more-info" data-dcnode-id="2689"><a data-dcnode-id="2692" href="#"><span data-dcnode-id="2693" instrument_node="">Theatre and Human Rights: What Kind of Theatre Takes Place in an Unwanted Space? (in English or Dutch) (S) ◊</span></a><div class="description" data-dcnode-id="2690" style="display: none;"><span data-dcnode-id="2691" instrument_node="">These presentations offer an exploration of theatre in (post)-conflict zones and development contexts supported by an analysis of the value of applied theatre practitioners working in these settings. By describing the ethics and techniques on cultural awareness and by showing selected examples of theatre companies globally, these presentations offer a firm foundation in the basic theories, contexts and vocabularies used in the field. </span></div></td><td data-dcnode-id="2687"><span data-dcnode-id="2688" instrument_node="">Sadeghi Yekta, Dr. Kirsten</span></td><td data-dcnode-id="2685"><span data-dcnode-id="2686" instrument_node="">Assistant Professor</span></td><td data-dcnode-id="2683"><span data-dcnode-id="2684" instrument_node="">Department of Theatre</span></td></tr><tr class="Music-Art-Film--Theatre Department-of-Theatre S Virtual altrow" data-dcnode-id="2668" role="row"><td data-dcnode-id="2680"><span data-dcnode-id="2681" instrument_node="">Music, Art, Film &amp; Theatre</span></td><td class="more-info" data-dcnode-id="2675"><a data-dcnode-id="2678" href="#"><span data-dcnode-id="2679" instrument_node="">Indigenous Performance and Language Revitalization (in English or Dutch) (S) ◊</span></a><div class="description" data-dcnode-id="2676" style="display: none;"><span data-dcnode-id="2677" instrument_node="">"</span></div></td><td data-dcnode-id="2673"><span data-dcnode-id="2674" instrument_node="">Sadeghi Yekta, Dr. Kirsten</span></td><td data-dcnode-id="2671"><span data-dcnode-id="2672" instrument_node="">Assistant Professor</span></td><td data-dcnode-id="2669"><span data-dcnode-id="2670" instrument_node="">Department of Theatre</span></td></tr><tr class="Music-Art-Film--Theatre History--Gender-Studies M S Virtual" data-dcnode-id="2655" role="row"><td data-dcnode-id="2666"><span data-dcnode-id="2667" instrument_node="">Music, Art, Film &amp; Theatre</span></td><td class="more-info" data-dcnode-id="2662"><a data-dcnode-id="2664" href="#"><span data-dcnode-id="2665" instrument_node="">What Film Adaptations of 19th Century Women's Novels Teach us about Women's Lives, Past and Present (M S) NEW ◊</span></a><div class="description" data-dcnode-id="2663" style="display: none;"></div></td><td data-dcnode-id="2660"><span data-dcnode-id="2661" instrument_node="">Sitara, Dr. Georgia</span></td><td data-dcnode-id="2658"><span data-dcnode-id="2659" instrument_node="">Assistant Teaching Professor</span></td><td data-dcnode-id="2656"><span data-dcnode-id="2657" instrument_node="">History & 16"><span data-dcnode-id="2517" instrument_node="">Music, Art, Film &amp; Theatre</span></td><td class="more-info" data-dcnode-id="2511"><a data-dcnode-id="2514" href="#"><span data-dcnode-id="2515" instrument_node="">Art and Society: Arguments For and Against Social Engagement</span></a><div class="description" data-dcnode-id="2512" style="display: none;"><span data-dcnode-id="2513" instrument_node="">This talk examines the different approaches to works of art: all are social, but the approaches to the social can be radically opposed.</span></div></td><td data-dcnode-id="2509"><span data-dcnode-id="2510" instrument_node="">Laskarin, Prof. Daniel</span></td><td data-dcnode-id="2507"><span data-dcnode-id="2508" instrument_node="">Associate Professor</span></td><td data-dcnode-id="2505"><span data-dcnode-id="2506" instrument_node="">Department of Visual Arts</span></td></tr><tr class="Music-Art-Film--Theatre Department-of-Art-History--Visual-Studies E M S Virtual" data-dcnode-id="2490" role="row"><td data-dcnode-id="2502"><span data-dcnode-id="2503" instrument_node="">Music, Art, Film &amp; Theatre</span></td><td class="more-info" data-dcnode-id="2497"><a data-dcnode-id="2500" href="#"><span data-dcnode-id="2501" instrument_node="">Life Stories: Art and the Stages of Life (E M S) ◊</span></a><div class="description" data-dcnode-id="2498" style="display: none;"><span data-dcnode-id="2499" instrument_node="">Art shapes our experiences of growing up and growing older. This presentation uses artworks to explore the impact of photographs, paintings, textiles and furnishings on our life stories.</span></div></td><td data-dcnode-id="2495"><span data-dcnode-id="2496" instrument_node="">Campbell, Prof. Erin</span></td><td data-dcnode-id="2493"><span data-dcnode-id="2494" instrument_node="">Professor</span></td><td data-dcnode-id="2491"><span data-dcnode-id="2492" instrument_node="">Department of Art History &amp; Visual Studies</span></td></tr><tr class="Music-Art-Film--Theatre Department-of-Visual-Arts M S Virtual altrow" data-dcnode-id="2476" role="row"><td data-dcnode-id="2488"><span data-dcnode-id="2489" instrument_node="">Music, Art, Film &amp; Theatre</span></td><td class="more-info" data-dcnode-id="2483"><a data-dcnode-id="2486" href="#"><span data-dcnode-id="2487" instrument_node="">The Role of Abstraction in the Digital Era ǂ (M S) NEW ◊</span></a><div class="description" data-dcnode-id="2484" style="display: none;"><span data-dcnode-id="2485" instrument_node="">In our present digital age, when content and commentary are so accessible and abundant, it can be hard to form our own opinions or draw independent meanings from what we experience. Visual art, particularly abstract art, suggests alternatives to our predisposed conceptions of experience by bringing awareness to the process of perception. My practice is placed in the gap between experience and meaning. I will present both the shortcomings and strengths of abstract art in exercising ambiguity and developing nuance. Elaborating on my process in digital abstract photography, I will speak of the relationship of the physical and digital world, and the role of images in our world perception.</span></div></td><td data-dcnode-id="2481"><span data-dcnode-id="2482" instrument_node="">Movahedi, Mr. Kosar</span></td><td data-dcnode-id="2479"><span data-dcnode-id="2480" instrument_node="">Graduate Student</span></td><td data-dcnode-id="2477"><span data-dcnode-id="2478" instrument_node="">Department of Visual Arts</span></td></tr><tr class="Music-Art-Film--Theatre Department-of-Visual-Arts M S Virtual" data-dcnode-id="2462" role="row"><td data-dcnode-id="2474"><span data-dcnode-id="2475" instrument_node="">Music, Art, Film &amp; Theatre</span></td><td class="more-info" data-dcnode-id="2469"><a data-dcnode-id="2472" href="#"><span data-dcnode-id="2473" instrument_node="">Introduction to Digital Photography:Composition and Colour ǂ (M S) NEW ◊</span></a><div class="description" data-dcnode-id="2470" style="display: none;"><span data-dcnode-id="2471" instrument_node="">How to position subjects and compose for the frame. Basics of colour theory and what to look for when capturing photos. This educational talk does not need any prior knowledge or sophisticated camera equipment. </span></div></td><td data-dcnode-id="2467"><span data-dcnode-id="2468" instrument_node="">Movahedi, Mr. Kosar</span></td><td data-dcnode-id="2465"><span data-dcnode-id="2466" instrument_node="">Graduate Student</span></td><td data-dcnode-id="2463"><span data-dcnode-id="2464" instrument_node="">Department of Visual Arts</span></td></tr><tr class="Music-Art-Film--Theatre Department-of-Visual-Arts M S Virtual altrow" data-dcnode-id="2448" role="row"><td data-dcnode-id="2460"><span data-dcnode-id="2461" instrument_node="">Music, Art, Film &amp; Theatre</span></td><td class="more-info" data-dcnode-id="2455"><a data-dcnode-id="2458" href="#"><span data-dcnode-id="2459" instrument_node="">Introduction to Black and White Photography: Texture, Pattern and Form ǂ (M S) NEW ◊</span></a><div class="description" data-dcnode-id="2456" style="display: none;"><span data-dcnode-id="2457" instrument_node="">How and when to use black and photography, elaborating on the strengths of this timeless medium in representing form, pattern, texture, contrast and abstraction. This educational talk does not need any prior knowledge or sophisticated camera equipment. </span></div></td><td data-dcnode-id="2453"><span data-dcnode-id="2454" instrument_node="">Movahedi, Mr. Kosar</span></td><td data-dcnode-id="2451"><span data-dcnode-id="2452" instrument_node="">Graduate Student</span></td><td data-dcnode-id="2449"><span data-dcnode-id="2450" instrument_node="">Department of Visual Arts</span></td></tr><tr class="Music-Art-Film--Theatre Department-of-Visual-Arts M S Virtual" data-dcnode-id="2434" role="row"><td data-dcnode-id="2446"><span data-dcnode-id="2447" instrument_node="">Music, Art, Film &amp; Theatre</span></td><td class="more-info" data-dcnode-id="2441"><a data-dcnode-id="2444" href="#"><span data-dcnode-id="2445" instrument_node="">Photography and Architectural Space ǂ (M S) NEW ◊</span></a><div class="description" data-dcnode-id="2442" style="display: none;"><span data-dcnode-id="2443" instrument_node="">Images act as interpretations of phenomena and are themselves experienced, thus twice removed from the original source of perception. But a photographic image is only a shadow of the experience it represents. I will expand on how my practice in abstract architectural photography subverts the common conception that photography is a documentational medium and brings awareness to how perceive spatial realities. My knowledge in this topic is informed by my BSc in architecture and filtered through my professional practice in visual arts.</span></div></td><td data-dcnode-id="2439"><span data-dcnode-id="2440" instrument_node="">Movahedi, Mr. Kosar</span></td><td data-dcnode-id="2437"><span data-dcnode-id="2438" instrument_node="">Graduate Student</span></td><td data-dcnode-id="2435"><span data-dcnode-id="2436" instrument_node="">Department of Visual Arts</span></td></tr><tr class="Personal-Interests Department-of-Educational-Psychology--Leadership-Studies S Virtual altrow" data-dcnode-id="2420" role="row"><td data-dcnode-id="2432"><span data-dcnode-id="2433" instrument_node="">Personal Interests</span></td><td class="more-info" data-dcnode-id="2427"><a data-dcnode-id="2430" href="#"><span data-dcnode-id="2431" instrument_node="">Touring the Yukon and Alaska (S) ◊</span></a><div class="description" data-dcnode-id="2428" style="display: none;"><span data-dcnode-id="2429" instrument_node="">This presentation uses a Powerpoint slide show to take you on an unforgettable tour of these northern frontiers.</span></div></td><td data-dcnode-id="2425"><span data-dcnode-id="2426" instrument_node="">Cameron, Dr. Ian</span></td><td data-dcnode-id="2423"><span data-dcnode-id="2424 or</span></td><td data-dcnode-id="2184"><span data-dcnode-id="2185" instrument_node="">History &amp; Gender Studies</span></td></tr><tr class="Personal-Interests Literature M S Virtual altrow" data-dcnode-id="2170" role="row"><td data-dcnode-id="2181"><span data-dcnode-id="2182" instrument_node="">Personal Interests</span></td><td class="more-info" data-dcnode-id="2177"><a data-dcnode-id="2179" href="#"><span data-dcnode-id="2180" instrument_node="">Feminism in Jane Austen's Novels-the Feminist Heterosexual Romance (M S) NEW ◊</span></a><div class="description" data-dcnode-id="2178" style="display: none;"></div></td><td data-dcnode-id="2175"><span data-dcnode-id="2176" instrument_node="">Sitara, Dr. Georgia</span></td><td data-dcnode-id="2173"><span data-dcnode-id="2174" instrument_node="">Assistant Teaching Professor</span></td><td data-dcnode-id="2171"><span data-dcnode-id="2172" instrument_node="">Literature</span></td></tr><tr class="Personal-Interests Department-of-Electrical--Computer-Engineering M S Virtual" data-dcnode-id="2156" role="row"><td data-dcnode-id="2168"><span data-dcnode-id="2169" instrument_node="">Personal Interests</span></td><td class="more-info" data-dcnode-id="2163"><a data-dcnode-id="2166" href="#"><span data-dcnode-id="2167" instrument_node="">South Indian Cuisine: Your Gateway to Gluten Free Foods (in English or Tamil) (M S) ◊</span></a><div class="description" data-dcnode-id="2164" style="display: none;"><span data-dcnode-id="2165" instrument_node="">In this presentation, participants will be exposed to various gluten-free foods that can be easily prepared at home on a day-to-day basis. Participants will also get a glance at South Indian cuisine, which has evolved over several hundreds of centuries.  </span></div></td><td data-dcnode-id="2161"><span data-dcnode-id="2162" instrument_node="">Chelvan, Dr. Ilamparithi T.</span></td><td data-dcnode-id="2159"><span data-dcnode-id="2160" instrument_node="">Assistant Teaching Professor</span></td><td data-dcnode-id="2157"><span data-dcnode-id="2158" instrument_node="">Department of Electrical &amp; Computer Engineering</span></td></tr><tr class="Personal-Interests Department-of-Electrical--Computer-Engineering M S Virtual altrow" data-dcnode-id="2142" role="row"><td data-dcnode-id="2154"><span data-dcnode-id="2155" instrument_node="">Personal Interests</span></td><td class="more-info" data-dcnode-id="2149"><a data-dcnode-id="2152" href="#"><span data-dcnode-id="2153" instrument_node="">Diversity: Thy Name is India (in English or Tamil) (M S) ◊</span></a><div class="description" data-dcnode-id="2150" style="display: none;"><span data-dcnode-id="2151" instrument_node="">In this talk, we will explore India’s diversity through the following themes: language, cuisine, arts and music, climate and culture.</span></div></td><td data-dcnode-id="2147"><span data-dcnode-id="2148" instrument_node="">Chelvan, Dr. Ilamparithi T.</span></td><td data-dcnode-id="2145"><span data-dcnode-id="2146" instrument_node="">Assistant Teaching Professor</span></td><td data-dcnode-id="2143"><span data-dcnode-id="2144" instrument_node="">Department of Electrical &amp; Computer Engineering</span></td></tr><tr class="Personal-Interests Department-of-Educational-Psychology--Leadership-Studies Virtual" data-dcnode-id="2128" role="row"><td data-dcnode-id="2140"><span data-dcnode-id="2141" instrument_node="">Personal Interests</span></td><td class="more-info" data-dcnode-id="2135"><a data-dcnode-id="2138" href="#"><span data-dcnode-id="2139" instrument_node="">Savvy Self-Management for Caregivers ◊</span></a><div class="description" data-dcnode-id="2136" style="display: none;"><span data-dcnode-id="2137" instrument_node="">This presentation encourages us to explore the topic of care- giving with dignity and self-respect. We need to ask ourselves: what tools do we need to deal with the demands placed on us?</span></div></td><td data-dcnode-id="2133"><span data-dcnode-id="2134" instrument_node="">Boyer, Dr. Wanda</span></td><td data-dcnode-id="2131"><span data-dcnode-id="2132" instrument_node="">Associate Professor</span></td><td data-dcnode-id="2129"><span data-dcnode-id="2130" instrument_node="">Department of Educational Psychology &amp; Leadership Studies</span></td></tr><tr class="Personal-Interests Department-of-History Virtual altrow" data-dcnode-id="2114" role="row"><td data-dcnode-id="2126"><span data-dcnode-id="2127" instrument_node="">Personal Interests</span></td><td class="more-info" data-dcnode-id="2121"><a data-dcnode-id="2124" href="#"><span data-dcnode-id="2125" instrument_node="">The Mystery of the Lost Norse Colony of Greenland (in English or French) ◊</span></a><div class="description" data-dcnode-id="2122" style="display: none;"><span data-dcnode-id="2123" instrument_node="">During the warm period known as the “medieval climatic optimum”, from c. 800-1250, Norse raiders (“Vikings”) dramatically expanded their range, exploring, conquering and settling territories over a vast area -- from the Mediterranean to Russia, the coasts of France to the Hebrides, Shetlands, Faroe Islands and Iceland, even establishing a brief foothold in “Vinland”, an area widely believed to be in modern Newfoundland. The Norse colony in Greenland was  established by Eric the Red around 1000. During the “High Middle Ages” (c.1050-1300), Norse Greenland boasted a population of about 2000, numerous religious houses and even a bishopric, a flourishing trade in walrus and narwhale tusks (“unicorn” horns), live gyrfalcons and polar bears. After about 1300, in the wake of economic downturn, political disruptions and cooling weather, the colony declined and communication became more sporadic and disquieting, with rumours of attacks by pirates and Skraelings (the Thule Inuit). The last verified report was brought back by an Icelandic ship in 1408: after this there was only silence, as pack ice cut off the colony from the rest of Europe. Early eighteenth-century Scandinavian missionaries found only the ruins of the settlement, and tantalizing fragments gleaned from the oral traditions of the Greenland Inuit. Had the Norse Greenlanders been violently replaced or assimilated by the ancestors of the Inuit? Had they emigrated en masse, or succumbed to plague or some sudden disaster? Or they slowly starved to death, the victims of overgrazing, “the Little Ice Age” (1300-1800) and their own stubborn inability to abandon European customs and practices? This talk will explore these and other theories about this unsolved mystery, and propose some tentative conclusions.</span></div></td><td data-dcnode-id="2119"><span data-dcnode-id="2120" instrument_node="">McKenzie, Dr. Andrea</span></td><td data-dcnode-id="2117"><span data-dcnode-id="2118" instrument_node="">Associate Professor</span></td><td data-dcnode-id="2115"><span data-dcnode-id="2116" instrument_node="">Department of History</span></td></tr><tr class="Personal-Interests Department-of-Linguistics M S Virtual" data-dcnode-id="2100" role="row"><td data-dcnode-id="2112"><span data-dcnode-id="2113" instrument_node="">Personal Interests</span></td><td class="more-info" data-dcnode-id="2107"><a data-dcnode-id="2110" href="#"><span data-dcnode-id="2111" instrument_node="">Wilderness Adventures with Kids (in English or French) (M S) ◊</span></a><div class="description" data-dcnode-id="2108" style="display: none;"><span data-dcnode-id="2109" instrument_node="">Our family has been going on extended wilderness adventures -mostly canoeing-since our children were infants. In this presentation, I present some of the joys, as well as trials and tribulations, of wilderness travel with kids. The visuals included in the presentation are of the incredible places we have visited over the last 10+ years, including many spots up and down the beautiful coastline of Vancouver Island.</span></div></td><td data-dcnode-id="2105"><span data-dcnode-id="2106" instrument_node="">Bird, Dr. Sonya</span></td><td data-dcnode-id="2103"><span data-dcnode-id="2104" instrument_node="">Associate Professor</span></td><td data-dcnode-id="2101"><span data-dcnode-id="2102" instrument_node="">Department of Linguistics</span></td></tr><tr class="Personal-Interests Department-of-Philosophy S Not-Virtual altrow" data-dcnode-id="2086" role="row"><td data-dcnode-id="2098"><span data-dcnode-id="2099" instrument_node="">Personal Interests</span></td><td class="more-info" data-dcnode-id="2093"><a data-dcnode-id="2096" href="#"><span data-dcnode-id="2097" instrument_node="">Why Bother with Philosophy? (S)</span></a><div class="description" data-dcnode-id="2094" style="display: none;"><span data-dcnode-id="2095" instrument_node="">Many people – particularly those who have never studied philosophy – wonder about its usefulness or utility. In this talk I defend and expand on one of the most well-known accounts of the usefulness of philosophy, namely the account provided by Aristotle, for whom philosophy is one of the most fulfilling of human activities.</span></div></td><td data-dcnode-id="2091"><span data-dcnode-id="2092" instrument_node="">Scott, Dr. David</span></td><td data-dcnode-id="2089"><span data-dcnode-id="2090" instrument_node="">Associate Professor</span></td><td data-dcnode-id="2087"><span data-dcnode-id="2088" instrument_node="">Department of Philosophy</span></td></tr><tr class="Personal-Interests Department-of-Physics--Astronomy S Not-Virtual" data-dcnode-id="2072" role="row"><td data-dcnode-id="2084"><span data-dcnode-id="2085" instrument_node="">Personal Interests</span></td><td class="more-info" data-dcnode-id="2079"><a data-dcnode-id="2082" href="#"><span data-dcnode-id="2083" instrument_node="">Use of Nanotechnology to Improve Outcomes of Cancer Therapy (S) NEW</span></a><div class="description" data-dcnode-id="2080" style="display: none;"><span data-dcnode-id="2081" instrument_node="">Nanotechnology involves materials of size between 1 and 100 nanometres. The proteins we eat and viruses we get sick from are in this range. We can make smart nanomaterials of the same size as these proteins and viruses to deliver drugs or enhance the radiation dose in cancer therapy. I will talk about how we can do this using gold nanoparticles as a sample nanoparticle system.</span></div></td><td data-dcnode-id="2077"><span data-dcnode-id="2078" instrument_node="">Chithrani, Prof. Devika</span></td><td data-dcnode-id="2075"><span data-dcnode-id="2076" instrument_node="">Associate Professor</span></td><td data-dcnode-id="2073"><span data-dcnode-id="2074" instrument_node="">Department of Physics &amp; Astronomy</span></td></tr><tr class="Personal-Interests Peter-B-Gustavson-School-of-Business S Virtual altrow" data-dcnode-id="2058" role="row"><td data-dcnode-id="2070"><span data-dcnode-id="2071" instrument_node="">Personal Interests</span></td><td class="more-info" data-dcnode-id="2065"><a data-dcnode-id="2068" href="#"><span data-dcnode-id="2069" instrument_node="">Private Sponsorship of Refugees to Canada (in English or Hindi) (S) ◊</span></a><div class="description" data-dcnode-id="2066" style="display: none;"><span data-dcnode-id="2067" instrument_node="">"</span></div></td><td data-dcnode-id="2063"><span data-dcnode-id="2064" instrument_node="">Nair, Dr. Sudhir</span></td><td data-dcnode-id="2061"><span data-dcnode-id="2062" instrument_node="">Associate Professor</span></td><td data-dcnode-id="2059"><span data-dcnode-id="2060" instrument_node="">Peter B. Gustavson School of Business</span></td></tr><tr class="Personal-Interests School-of-Earth--Ocean-Sciences M S Virtual" data-dcnode-id="2044" role="row"><td data-dcnode-id="2056"><span data-dcnode-id="2057" instrument_node="">Personal Interests</span></td><td class="more-info" data-dcnode-id="2051"><a data-dcnode-id="2054" href="#"><span data-dcnode-id="2055" instrument_node="">What Does It Take to Be Canada’s Next Astronaut? The 2016 Astronaut Recruitment Campaign (M S) ◊</span></a><div class="description" data-dcnode-id="2052" style="display: none;"><span data-dcnode-id="2053" instrument_node="">In June 2016, the Canadian Space Agency issued the fourth call in its history to recruit two new astronauts. There have been only 12 astronauts in the history of the agency, eight of whom have flown in space. Canadian astronauts must be resourceful, experienced in a technical profession and display integrity and the best judgment. The selection process is difficult, both physically and mentally, and competition is fierce to earn one of the spots. This presentation chronicles the speaker’s own journey and experiences in the competition, from one of almost 4,000 applicants to the shortlist of 72 candidates and beyond.</span></div></td><td data-dcnode-id="2049"><span data-dcnode-id="2050" instrument_node="">Cullen, Dr. Jay</span></td><td data-dcnode-id="2047"><span data-dcnode-id="2048" instrument_node="">Associate Professor</span></td><td data-dcnode-id="2045"><span data-dcnode-id="2046" instrument_node="">School of Earth &amp; Ocean Sciences</span></td></tr><tr class="Personal-Interests School-of-Exercise-Science-Physical--Health-Education S Virtual altrow" data-dcnode-id="2030" role="row"><td data-dcnode-id="2042"><span data-dcnode-id="2043" instrument_node="">Personal Interests</span></td><td class="more-info" data-dcnode-id="2037"><a data-dcnode-id="2040" href="#"><span data-dcnode-id="2041" instrument_node="">Wise Women Speak: Changes Along the Path (S) ◊</span></a><div class="description" data-dcnode-id="2038" style="display: none;"><span data-dcnode-id="2039" instrument_node="">Have you ever found yourself thrown off the path you know only to discover you are now traveling down a new path, one that has uncharted territory? This session, based on a chapter I have written in a book for the Wise Women series, is about personal and professional challenges and the opportunity to reflect on the many changes along your path. In celebration of women, let’s talk about growing wiser, pursuing dreams, and overcoming loss and fear.</span></div></td><td data-dcnode-id="2035"><span data-dcnode-id="2036" instrument_node="">Lauzon, Dr. Lara</span></td><td data-dcnode-id="2033"><span data-dcnode-id="2034" instrument_node="">Associate Professor</span></td><td data-dcnode-id="2031"><span data-dcnode-id="2032" instrument_node="">School of Exercise Science, Physical &amp; Health Education</span></td></tr><tr class="Personal-Interests Department-of-Vice-President-Research Virtual" data-dcnode-id="2016" role="row"><td data-dcnode-id="2028"><span data-dcnode-id="2029" instrument_node="">Personal Interests</span></td><td class="more-info" data-dcnode-id="2023"><a data-dcnode-id="2026" href="#"><span data-dcnode-id="2027" instrument_node="">Collaborative Creativity ◊</span></a><div class="description" data-dcnode-id="2024" style="display: none;"><span data-dcnode-id="2025" instrument_node="">Two English grads, a biochemistry alum, and a paleontologist walked into a bar…and created a series of linked novellas. Each author writes alone, but all of the tales have to work together-just like this team. The tactics can work for any creative collaboration: a quilting bee, a potluck party, or a theatre production. In Collaborative Creativity, we talk about the process from brainstorming through assessing risks, from setting deadlines to dealing with fallout if they get missed, and most importantly, how to keep it fun.</span></div></td><td data-dcnode-id="2021"><span data-dcnode-id="2022" instrument_node="">Goldsworthy, Ms. Rachel</span></td><td data-dcnode-id="2019"><span data-dcnode-id="2020" instrument_node="">Awards Facilitator</span></td><td data-dcnode-id="2017"><span data-dcnode-id="2018" instrument_node="">Department of Vice President Research</span></td></tr><tr class="Personal-Interests Office-of-the-Dean Not-Virtual altrow" data-dcnode-id="2003" role="row"><td data-dcnode-id="2014"><span data-dcnode-id="2015" instrument_node="">Personal Interests</span></td><td class="more-info" data-dcnode-id="2010"><a data-dcnode-id="2012" href="#"><span data-dcnode-id="2013" instrument_node="">Scientific Knowledge in a Post-truth Era: the Fallacies of "Common Sense" </span></a><div class="description" data-dcnode-id="2011" style="display: none;"></div></td><td data-dcnode-id="2008"><span data-dcnode-id="2009" instrument_node="">Loock, Prof. Peter</span></td><td data-dcnode-id="2006"><span data-dcnode-id="2007" instrument_node="">Dean</span></td><td data-dcnode-id="2004"><span data-dcnode-id="2005" instrument_node="">Office of the Dean</span></td></tr><tr class="Personal-Interests Department-of-Chemistry E M S Virtual" data-dcnode-id="1989" role="row"><td data-dcnode-id="2001"><span data-dcnode-id="2002" instrument_node="">Personal Interests</span></td><td class="more-info" data-dcnode-id="1996"><a data-dcnode-id="1999" href="#"><span data-dcnode-id="2000" instrument_node="">Yoga Psychology (E M S) ◊</span></a><div class="description" data-dcnode-id="1997" style="display: none;"><span data-dcnode-id="1998" instrument_node="">This talk discusses how yoga psychology harnesses the powers of awareness, attunement and embodied learning to foster an inquiry into the foundation of self-awareness, health and wellness.</span></div></td><td data-dcnode-id="1994"><span data-dcnode-id="1995" instrument_node="">Hosalli, Ms. Shubha</span></td><td data-dcnode-id="1992"><span data-dcnode-id="1993" instrument_node="">Electronic Technician</span></td><td data-dcnode-id="1990"><span data-dcnode-id="1991" instrument_node="">Department of Chemistry</span></td></tr><tr class="Personal-Interests Department-of-Chemistry E M S Virtual altrow" data-dcnode-id="1975" role="row"><td data-dcnode-id="1987"><span data-dcnode-id="1988" instrument_node="">Personal Interests</span></td><td class="more-info" data-dcnode-id="1982"><a data-dcnode-id="1985" href="#"><span data-dcnode-id="1986" instrument_node="">Yogic Living (E M S) ◊</span></a><div class="description" data-dcnode-id="1983" style="display: none;"><span data-dcnode-id="1984" instrument_node="">Many people practice yoga-but yoga is not only a soothing workout. It is also a lifestyle, helping people embrace states of well-being. In this session, learn more about yogic living.</span></div></td><td data-dcnode-id="1980"><span data-dcnode-id="1981" instrument_node="">Hosalli, Ms. Shubha</span></td><td data-dcnode-id="1978"><span data-dcnode-id="1979" instrument_node="">Electronic Technician</span></td><td data-dcnode-id="1976"><span data-dcnode-id="1977" instrument_node="">Department of Chemistry</span></td></tr><tr class="Personal-Interests Studies-in-Policy--Practice Virtual" data-dcnode-id="1962" role="row"><td data-dcnode-id="1973"><span data-dcnode-id="1974" instrument_node="">Personal Interests</span></td><td class="more-info" data-dcnode-id="1969"><a data-dcnode-id="1971" href="#"><span data-dcnode-id="1972" instrument_node="">Heritage in Oak Bay ◊</span></a><div class="description" data-dcnode-id="1970" style="display: none;"></div></td><td data-dcnode-id="1967"><span data-dcnode-id="1968" instrument_node="">Prince, Dr. Michael J.</span></td><td data-dcnode-id="1965"><span data-dcnode-id="1966" instrument_node="">Lansdowne Professor of Social Policy</span></td><td data-dcnode-id="1963"><span data-dcnode-id="1964" instrument_node="">Studies in Policy &amp; Practice</span></td></tr><tr class="Personal-Interests William-C-Mearns-Centre-for-Learning E M S Not-Virtual altrow" data-dcnode-id="1948" role="row"><td data-dcnode-id="1960"><span data-dcnode-id="1961" instrument_node="">Personal Interests</span></td><td class="more-info" data-dcnode-id="1955"><a data-dcnode-id="1958" href="#"><span data-dcnode-id="1959" instrument_node="">Bookbinding for Beginners (E M S)</span></a><div class="description" data-dcnode-id="1956" style="display: none;"><span data-dcnode-id="1957" instrument_node="">Learn to bind a book with no previous experience. With a very few elementary bookbinding skills, people of all ages can gain new perspective on books, literacy, and the power of this ancient and enduring technology.</span></div></td><td data-dcnode-id="1953"><span data-dcnode-id="1954" instrument_node="">Lines, Mr. Michael</span></td><td data-dcnode-id="1951"><span data-dcnode-id="1952" instrument_node="">Learning and Research Librarian</span></td><td data-dcnode-id="1949"><span data-dcnode-id="1950" instrument_node="">William C. Mearns Centre for Learning</span></td></tr><tr class="Personal-Interests Department-of-French M S Virtual" data-dcnode-id="1934" role="row"><td data-dcnode-id="1946"><span data-dcnode-id="1947" instrument_node="">Personal Interests</span></td><td class="more-info" data-dcnode-id="1941"><a data-dcnode-id="1944" href="#"><span data-dcnode-id="1945" instrument_node="">At Sea with Young Children: Cruising the Caribbean Islands on a Sailboat (in English or French) (M S) NEW ◊</span></a><div class="description" data-dcnode-id="1942" style="display: none;"><span data-dcnode-id="1943" instrument_node="">Between 2000 and 2001, our family took a year off to cruise the Intracoastal waterway (USA), the Bahamas and the Caribbean Islands, ending our voyage in Trinidad and Tobago. In this talk, I will narrate this adventures and discuss the challenges and opportunities of cruising with small children.</span></div></td><td data-dcnode-id="1939"><span data-dcnode-id="1940" instrument_node="">Caws, Dr. Catherine</span></td><td data-dcnode-id="1937"><span data-dcnode-id="1938" instrument_node="">Professor</span></td><td data-dcnode-id="1935"><span data-dcnode-id="1936" instrument_node="">Department of French</span></td></tr><tr class="Personal-Interests Department-of-French S Virtual altrow" data-dcnode-id="1920" role="row"><td data-dcnode-id="1932"><span data-dcnode-id="1933" instrument_node="">Personal Interests</span></td><td class="more-info" data-dcnode-id="1927"><a data-dcnode-id="1930" href="#"><span data-dcnode-id="1931"
