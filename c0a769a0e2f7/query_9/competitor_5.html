aintain our local ATLAS group consisting of seven UVic professors and approximately 40 graduate students, staff, and summer undergraduate students all doing cutting-edge data analysis to measure Higgs properties and search for new physics using ATLAS data.  In this talk, I'll discuss how UVic's work helped the full ATLAS Collaboration to discover the Higgs and how we continue to search for new physics at ATLAS.</span></div></td><td data-dcnode-id="1021"><span data-dcnode-id="1022" instrument_node="">Albert, Dr. Justin</span></td><td data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node="">Associate Professor</span></td><td data-dcnode-id="1017"><span data-dcnode-id="1018" instrument_node="">Department of Physics &amp; Astronomy</span></td></tr><tr class="Science Department-of-Visual-Arts M S Virtual altrow" data-dcnode-id="1002" role="row"><td data-dcnode-id="1014"><span data-dcnode-id="1015" instrument_node="">Science</span></td><td class="more-info" data-dcnode-id="1009"><a data-dcnode-id="1012" href="#"><span data-dcnode-id="1013" instrument_node="">Physics of Wildfire Fighting ǂ (M S) NEW</span></a><div class="description" data-dcnode-id="1010" style="display: none;"><span data-dcnode-id="1011" instrument_node="">Jericho O’Connell is a physics PhD student at UVic and was also a wildfire fighter who worked on some of BC’s largest and most aggressive fires. In this talk, Jericho shares his experience with wildfires from the perspective of a physicist, telling wildfire anecdotes with a physics principle attached.</span></div></td><td data-dcnode-id="1007"><span data-dcnode-id="1008" instrument_node="">O'Connell, Mr. Jericho</span></td><td data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">Graduate Student</span></td><td data-dcnode-id="1003"><span data-dcnode-id="1004" instrument_node="">Department of Visual Arts</span></td></tr><tr class="Social-Health--Wellness Department-of-Sociology Virtual" data-dcnode-id="988" role="row"><td data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node="">Social Health &amp; Wellness</span></td><td class="more-info" data-dcnode-id="995"><a data-dcnode-id="998" href="#"><span data-dcnode-id="999" instrument_node="">Women and Aging ◊</span></a><div class="description" data-dcnode-id="996" style="display: none;"><span data-dcnode-id="997" instrument_node="">Women tend to outlive men for reasons that are not known. That means that women outnumber men at the older ages in all societies. They also have different health and social needs than men. My research in this area has looked at how this plays out and why it is important to understand.</span></div></td><td data-dcnode-id="993"><span data-dcnode-id="994" instrument_node="">McDaniel, Prof. Susan A.</span></td><td data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">Adjunct Professor</span></td><td data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">Department of Sociology</span></td></tr><tr class="Social-Health--Wellness School-of-Child--Youth-Care S Not-Virtual altrow" data-dcnode-id="974" role="row"><td data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">Social Health &amp; Wellness</span></td><td class="more-info" data-dcnode-id="981"><a data-dcnode-id="984" href="#"><span data-dcnode-id="985" instrument_node="">Cultural Hybridity: A Reality of Our Times (S)</span></a><div class="description" data-dcnode-id="982" style="display: none;"><span data-dcnode-id="983" instrument_node="">This talk addresses acculturation and assimilation over generations- a bedrock feature of immigration and generational evolution of cultural change.</span></div></td><td data-dcnode-id="979"><span data-dcnode-id="980" instrument_node="">Guzder, Dr. Jaswant</span></td><td data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">Adjunct Professor</span></td><td data-dcnode-id="975"><span data-dcnode-id="976" instrument_node="">School of Child &amp; Youth Care</span></td></tr><tr class="Social-Health--Wellness Department-of-Educational-Psychology--Leadership-Studies Virtual" data-dcnode-id="960" role="row"><td data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">Social Health &amp; Wellness</span></td><td class="more-info" data-dcnode-id="967"><a data-dcnode-id="970" href="#"><span data-dcnode-id="971" instrument_node="">Promoting Optimism for Healthy Kids and Healthy Communities ◊</span></a><div class="description" data-dcnode-id="968" style="display: none;"><span data-dcnode-id="969" instrument_node="">In our fast-paced world, success and happiness are equated with what you look like, what possessions you own, and how much money you have. There are perils and pitfalls with these ways of thinking. This presentation examines the concerns parents and children face in this world, the skills that we need to be the best human beings possible, the way that optimism can really “make you happy” and how we can acquire the tool of optimism and pass it on to our children. </span></div></td><td data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">Boyer, Dr. Wanda</span></td><td data-dcnode-id="963"><span data-dcnode-id="964" instrument_node="">Associate Professor</span></td><td data-dcnode-id="961"><span data-dcnode-id="962" instrument_node="">Department of Educational Psychology &amp; Leadership Studies</span></td></tr><tr class="Social-Health--Wellness School-of-Exercise-Science-Physical--Health-Education S Virtual altrow" data-dcnode-id="946" role="row"><td data-dcnode-id="958"><span data-dcnode-id="959" instrument_node="">Social Health &amp; Wellness</span></td><td class="more-info" data-dcnode-id="953"><a data-dcnode-id="956" href="#"><span data-dcnode-id="957" instrument_node="">Work-Life Balance and Work-Life Integration (S) ◊</span></a><div class="description" data-dcnode-id="954" style="display: none;"><span data-dcnode-id="955" instrument_node="">Working and living ‘Well’ helps us realize our personal potential. This session introduces the concepts of integrating work responsibilities and balancing work and life.  A move to working from home due to the COVID pandemic has made many of us re-think and adopt new strategies for successful working and life conditions. </span></div></td><td data-dcnode-id="951"><span data-dcnode-id="952" instrument_node="">Lauzon, Dr. Lara</span></td><td data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">Associate Professor</span></td><td data-dcnode-id="947"><span data-dcnode-id="948" instrument_node="">School of Exercise Science, Physical &amp; Health Education</span></td></tr><tr class="Social-Health--Wellness School-of-Exercise-Science-Physical--Health-Education S Virtual" data-dcnode-id="932" role="row"><td data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">Social Health &amp; Wellness</span></td><td class="more-info" data-dcnode-id="939"><a data-dcnode-id="942" href="#"><span data-dcnode-id="943" instrument_node="">Taking Risks and Embracing Change (S) ◊</span></a><div class="description" data-dcnode-id="940" style="display: none;"><span data-dcnode-id="941" instrument_node="">This session deals with personal and career change and outlines steps on how you can respond to change you initiate – or change you have little or no control over.  Life is a balancing act between forces for and against change and personal wellness is affected by how you adapt and embrace change. This session can help you evaluate or re-evaluate what changes might be needed in your life or what risks you are willing to take to “be well”.</span></div></td><td data-dcnode-id="937"><span data-dcnode-id="938" instrument_node="">Lauzon, Dr. Lara</span></td><td data-dcnode-id="935"><span data-dcnode-id="936" instrument_node="">Associate Professor</span></td><td data-dcnode-id="933"><span data-dcnode-id="934" instrument_node="">School of Exercise Science, Physical &amp; Health Education</span></td></tr><tr class="Social-Health--Wellness Office-of-the-Dean M S Virtual altrow" data-dcnode-id="918" role="row"><td data-dcnode-id="930"><span data-dcnode-id="931" instrument_node="">Social Health &amp; Wellness</span></td><td class="more-info" data-dcnode-id="925"><a data-dcnode-id="928" href="#"><span data-dcnode-id="929" instrument_node="">Community Engagement–Learning to Connect in a New World (M S) ◊</span></a><div class="description" data-dcnode-id="926" style="display: none;"><span data-dcnode-id="927" instrument_node="">This adaptable interactive presentation speaks to how an extroverted person in a community relations role is learning how to engage and connect in 2020. The presentation focuses on empathy, relationality, collaboration and innovation as tools to help build, connect and engage with community, while balancing our mental health.</span></div></td><td data-dcnode-id="923"><span data-dcnode-id="924" instrument_node="">Baldwin, Ms. Cortney</span></td><td data-dcnode-id="921"><span data-dcnode-id="922" instrument_node="">Community Relations Coordinator</span></td><td data-dcnode-id="919"><span data-dcnode-id="920" instrument_node="">Office of the Dean</span></td></tr><tr class="Social-Health--Wellness Department-of-Civil-Engineering Virtual" data-dcnode-id="904" role="row"><td data-dcnode-id="916"><span data-dcnode-id="917" instrument_node="">Social Health &amp; Wellness</span></td><td class="more-info" data-dcnode-id="911"><a data-dcnode-id="914" href="#"><span data-dcnode-id="915" instrument_node="">Sanitation in Low-resource Contexts ǂ NEW ◊</span></a><div class="description" data-dcnode-id="912" style="display: none;"><span data-dcnode-id="913" instrument_node="">This talk showcases how areas of public health and environmental engineering can overlap. This includes the development and evaluation of sanitation technologies&nbsp;appropriate for a range of development contexts such as rural municipalities&nbsp;and emergency and humanitarian relief&nbsp;situations.&nbsp;</span></div></td><td data-dcnode-id="909"><span data-dcnode-id="910" instrument_node="">Shaw, Ms. Kelsey</span></td><td data-dcnode-id="907"><span data-dcnode-id="908" instrument_node="">Graduate Student</span></td><td data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">Department of Civil Engineering</span></td></tr><tr class="Social-Health--Wellness Institute-on-Aging--Lifelong-Health S Virtual altrow" data-dcnode-id="891" role="row"><td data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">Social Health &amp; Wellness</span></td><td class="more-info" data-dcnode-id="898"><a data-dcnode-id="900" href="#"><span data-dcnode-id="901" instrument_node="">Aging Gracefully? Reflections on Aging, Place and Lifelong Health (S) ◊</span></a><div class="description" data-dcnode-id="899" style="display: none;"></div></td><td data-dcnode-id="896"><span data-dcnode-id="897" instrument_node="">Cloutier, Dr. Denise</span></td><td data-dcnode-id="894"><span data-dcnode-id="895" instrument_node="">Professor</span></td><td data-dcnode-id="892"><span data-dcnode-id="893" instrument_node="">Institute on Aging &amp; Lifelong Health</span></td></tr><tr class="Social-Health--Wellness Institute-on-Aging--Lifelong-Health S Virtual" data-dcnode-id="878" role="row"><td data-dcnode-id="889"><span data-dcnode-id="890" instrument_node="">Social Health &amp; Wellness</span></td><td class="more-info" data-dcnode-id="885"><a data-dcnode-id="887" href="#"><span data-dcnode-id="888" instrument_node="">Geographies of Aging and Well-being: What do We Know about Places that are Good for Us (S) ◊</span></a><div class="description" data-dcnode-id="886" style="display: none;"></div></td><td data-dcnode-id="883"><span data-dcnode-id="884" instrument_node="">Cloutier, Dr. Denise</span></td><td data-dcnode-id="881"><span data-dcnode-id="882" instrument_node="">Professor</span></td><td data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">Institute on Aging &amp; Lifelong Health</span></td></tr><tr class="Social-Health--Wellness School-of-Nursing S Virtual altrow" data-dcnode-id="864" role="row"><td data-dcnode-id="876"><span data-dcnode-id="877" instrument_node="">Social Health &amp; Wellness</span></td><td class="more-info" data-dcnode-id="871"><a data-dcnode-id="874" href="#"><span data-dcnode-id="875" instrument_node="">Equitable Access to Care (S) ◊</span></a><div class="description" data-dcnode-id="872" style="display: none;"><span data-dcnode-id="873" instrument_node="">My research focuses the development of health/social support services in palliative and end-of-life care including various aspects of care for the dying, family caregiving, and health and social policy issues related to chronically ill and vulnerable populations-including marginalized and vulnerable populations across diverse settings. </span></div></td><td data-dcnode-id="869"><span data-dcnode-id="870" instrument_node="">Stajduhar, Dr. Kelli</span></td><td data-dcnode-id="867"><span data-dcnode-id="868" instrument_node="">Professor</span></td><td data-dcnode-id="865"><span data-dcnode-id="866" instrument_node="">School of Nursing</span></td></tr><tr class="Social-Health--Wellness School-of-Nursing S Virtual" data-dcnode-id="850" role="row"><td data-dcnode-id="862"><span data-dcnode-id="863" instrument_node="">Social Health &amp; Wellness</span></td><td class="more-info" data-dcnode-id="857"><a data-dcnode-id="860" href="#"><span data-dcnode-id="861" instrument_node="">Promoting Equity-informed Palliative Care for People Experiencing Structural Vulnerability (S) ◊</span></a><div class="description" data-dcnode-id="858" style="display: none;"><span data-dcnode-id="859" instrument_node="">My research focuses the development of health/social support services in palliative and end-of-life care including various aspects of care for the dying, family caregiving, and health and social policy issues related to chronically ill and vulnerable populations-including marginalized and vulnerable populations across diverse settings. </span></div></td><td data-dcnode-id="855"><span data-dcnode-id="856" instrument_node="">Stajduhar, Dr. Kelli</span></td><td data-dcnode-id="853"><span data-dcnode-id="854" instrument_node="">Professor</span></td><td data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">School of Nursing</span></td></tr><tr class="Social-Health--Wellness School-of-Public-Health--Social-Policy Virtual altrow" data-dcnode-id="836" role="row"><td data-dcnode-id="848"><span data-dcnode-id="849" instrument_node="">Social Health &amp; Wellness</span></td><td class="more-info" data-dcnode-id="843"><a data-dcnode-id="846" href="#"><span data-dcnode-id="847" instrument_node="">Creating Healthy Communities ◊</span></a><div class="description" data-dcnode-id="844" style="display: none;"><span data-dcnode-id="845" instrument_node="">What is a healthy community, and how do we get one? This presentation addresses the ways in which the natural, built, social and economic environments affect the health of people in communities and what people can do to create a healthier community.</span></div></td><td data-dcnode-id="841"><span data-dcnode-id="842" instrument_node="">Hancock, Dr. Trevor</span></td><td data-dcnode-id="839"><span data-dcnode-id="840" instrument_node="">Professor Emeritus</span></td><td data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">School of Public Health &amp; Social Policy</span></td></tr><tr class="Social-Health--Wellness School-of-Public-Health--Social-Policy Virtual" data-dcnode-id="822" role="row"><td data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">Social Health &amp; Wellness</span></td><td class="more-info" data-dcnode-id="829"><a data-dcnode-id="832" href="#"><span data-dcnode-id="833" instrument_node="">Public Health in the Anthropocene: Addressing the Ecological Determinants of Health ◊</span></a><div class="description" data-dcnode-id="830" style="display: none;"><span data-dcnode-id="831" instrument_node="">We’re entering a new geological epoch: the Anthropocene. Many of our global ecological systems are in crisis and are declining due to human population growth, affluence and our powerful technologies. This has profound implications for our health. How can we navigate this decline with a minimum of harm, and how can we create a healthier, more hopeful future? This presentation explores these issues and the implications for our communities and public policy.</span></div></td><td data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">Hancock, Dr. Trevor</span></td><td data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">Professor Emeritus</span></td><td data-dcnode-id="823"><span data-dcnode-id="824" instrument_node="">School of Public Health &amp; Social Policy</span></td></tr><tr class="Social-Health--Wellness School-of-Public-Health--Social-Policy Virtual altrow" data-dcnode-id="808" role="row"><td data-dcnode-id="820"><span data-dcnode-id="821" instrument_node="">Social Health &amp; Wellness</span></td><td class="more-info" data-dcnode-id="815"><a data-dcnode-id="818" href="#"><span data-dcnode-id="819" instrument_node="">Making Prevention a Priority ◊</span></a><div class="description" data-dcnode-id="816" style="display: none;"><span data-dcnode-id="817" instrument_node="">Despite the rhetoric of successive governments throughout Canada, disease and injury prevention continues to be underfunded and is not a priority. Perhaps the most important way to increase the fiscal sustainability of the health care system is to reduce the overall burden of disease and injury. This presentation discusses what a proper prevention strategy would look like and what it will take to implement it.</span></div></td><td data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">Hancock, Dr. Trevor</span></td><td data-dcnode-id="811"><span data-dcnode-id="812" instrument_node="">Professor Emeritus</span></td><td data-dcnode-id="809"><span data-dcnode-id="810" instrument_node="">School of Public Health &amp; Social Policy</span></td></tr><tr class="Social-Issues Island-Medical-Program S Virtual" data-dcnode-id="794" role="row"><td data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">Social Issues</span></td><td class="more-info" data-dcnode-id="801"><a data-dcnode-id="804" href="#"><span data-dcnode-id="805" instrument_node="">Cannabis: The Risks in the Era of Legalization (S) ◊ </span></a><div class="description" data-dcnode-id="802" style="display: none;"><span data-dcnode-id="803" instrument_node="">I can present talks on the risks inherent to the legalization of cannabis in Canada. As well, as outline the risks in the street drugs circulating in BC/Canada now and why it's more dangerous. </span></div></td><td data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">Ovakim, Dr. Daniel</span></td><td data-dcnode-id="797"><span data-dcnode-id="798" instrument_node="">Adjunct Assistant Professor</span></td><td data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">Island Medical Program</span></td></tr><tr class="Social-Issues School-of-Public-Administration S Virtual altrow" data-dcnode-id="780" role="row"><td data-dcnode-id="792"><span data-dcnode-id="793" instrument_node="">Social Issues</span></td><td class="more-info" data-dcnode-id="787"><a data-dcnode-id="790" href="#"><span data-dcnode-id="791" instrument_node="">Community Engagement: Conducting Research with-and for-the Community (in English or Hindi) (S) NEW ◊</span></a><div class="description" data-dcnode-id="788" style="display: none;"><span data-dcnode-id="789" instrument_node=""> is founder-president of PRIA, global research and training centre of participatory research, based in India. He shares UNESCO Chair on Social Responsibility of Higher Education with Dr. Budd Hall. His practice of community-based research is a methodology for empowerment and inclusion of community voices and choices.</span></div></td><td data-dcnode-id="785"><span data-dcnode-id="786" instrument_node="">Tandon, Dr. Rajesh</span></td><td data-dcnode-id="783"><span data-dcnode-id="784" instrument_node="">Adjunct Assistant Professor</span></td><td data-dcnode-id="781"><span data-dcnode-id="782" instrument_node="">School of Public Administration</span></td></tr><tr class="Social-Issues Indigenous-Education E M S Virtual" data-dcnode-id="766" role="row"><td data-dcnode-id="778"><span data-dcnode-id="779" instrument_node="">Social Issues</span></td><td class="more-info" data-dcnode-id="773"><a data-dcnode-id="776" href="#"><span data-dcnode-id="777" instrument_node="">Histories and Stories: Residential Schools Through&nbsp;History and Literature (in English or Spanish) (E M S) ◊</span></a><div class="description" data-dcnode-id="774" style="display: none;"><span data-dcnode-id="775" instrument_node="">This session presents historical, political, socio-cultural facts related to residential schools, and explores implications and connections with current social issues.</span></div></td><td data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">Rodriguez de France, Dr. Carmen</span></td><td data-dcnode-id="769"><span data-dcnode-id="770" instrument_node="">Assistant Professor</span></td><td data-dcnode-id="767"><span data-dcnode-id="768" instrument_node="">Indigenous Education</span></td></tr><tr class="Social-Issues History--Gender-Studies M S Virtual altrow" data-dcnode-id="753" role="row"><td data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">Social Issues</span></td><td class="more-info" data-dcnode-id="760"><a data-dcnode-id="762" href="#"><span data-dcnode-id="763" instrument_node="">Anti-racism: Theories and Practice (M S) NEW ◊</span></a><div class="description" data-dcnode-id="761" style="display: none;"></div></td><td data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">Sitara, Dr. Georgia</span></td><td data-dcnode-id="756"><span data-dcnode-id="757" instrument_node="">Assistant Teaching Professor</span></td><td data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">History &amp; Gender Studies</span></td></tr><tr class="Social-Issues History--Gender-Studies M S Virtual" data-dcnode-id="740" role="row"><td data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">Social Issues</span></td><td class="more-info" data-dcnode-id="747"><a data-dcnode-id="749" href="#"><span data-dcnode-id="750" instrument_node="">Gender: The Role of Gender in Society (M S) NEW ◊</span></a><div class="description" data-dcnode-id="748" style="display: none;"></div></td><td data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">Sitara, Dr. Georgia</span></td><td data-dcnode-id="743"><span data-dcnode-id="744" instrument_node="">Assistant Teaching Professor</span></td><td data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">History &amp; Gender Studies</span></td></tr><tr class="Social-Issues Department-of-Civil-Engineering E M S Not-Virtual altrow" data-dcnode-id="726" role="row"><td data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">Social Issues</span></td><td class="more-info" data-dcnode-id="733"><a data-dcnode-id="736" href="#"><span data-dcnode-id="737" instrument_node="">The Challenges of Universal Access of Clean Water and Sanitation: Health, Equity and Sustainability (in English or French) (E M S) </span></a><div class="description" data-dcnode-id="734" style="display: none;"><span data-dcnode-id="735" instrument_node="">This talk describes the current gaps (technology, sustainability, equity, etc.) and other cross-cutting issues (gender, health, environment, etc.) regarding universal access to clean water and sanitation (both human rights) in both low and middle income countries as well as high income countries. </span></div></td><td data-dcnode-id="731"><span data-dcnode-id="732" instrument_node="">Dorea, Prof. Caetano</span></td><td data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">Associate Professor</span></td><td data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">Department of Civil Engineering</span></td></tr><tr class="Social-Issues Office-of-the-Dean M S Virtual" data-dcnode-id="712" role="row"><td data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">Social Issues</span></td><td class="more-info" data-dcnode-id="719"><a data-dcnode-id="722" href="#"><span data-dcnode-id="723" instrument_node="">Courageous Conversations: Talking about Decolonization (M S) ◊</span></a><div class="description" data-dcnode-id="720" style="display: none;"><span data-dcnode-id="721" instrument_node="">This adaptable interactive presentation talks about decolonization from the perspective of a non-Indigenous Canadian and is modified based on the age and background of participants. This conversation can use activities and discussion to speak to what decolonization is, how we can deprogram ourselves, and actions we can take to move us towards a decolonized society.</span></div></td><td data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">Baldwin, Ms. Cortney</span></td><td data-dcnode-id="715"><span data-dcnode-id="716" instrument_node="">Community Relations Coordinator</span></td><td data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">Office of the Dean</span></td></tr><tr class="Social-Issues Office-of-the-Dean M S Virtual altrow" data-dcnode-id="698" role="row"><td data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">Social Issues</span></td><td class="more-info" data-dcnode-id="705"><a data-dcnode-id="708" href="#"><span data-dcnode-id="709" instrument_node="">Understanding Ourselves: Privileged and Oppressed Identities (M S) ◊</span></a><div class="description" data-dcnode-id="706" style="display: none;"><span data-dcnode-id="707" instrument_node="">This adaptable interactive presentation explores the various identities we have, as individuals, and how those identities can be privileged or oppressed. The activities and discussion focuses on how these different identities interact, specifically how privileged identities can be invisible to those who have them, and how through understanding privileged and oppressed identities within ourselves we can be more inclusive. This talk uses decolonizing methodologies.</span></div></td><td data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">Baldwin, Ms. Cortney</span></td><td data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">Community Relations Coordinator</span></td><td data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">Office of the Dean</span></td></tr><tr class="Social-Issues Department-of-English S Virtual" data-dcnode-id="684" role="row"><td data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">Social Issues</span></td><td class="more-info" data-dcnode-id="691"><a data-dcnode-id="694" href="#"><span data-dcnode-id="695" instrument_node="">Religion, Fake News and Alternative Facts (S) ◊</span></a><div class="description" data-dcnode-id="692" style="display: none;"><span data-dcnode-id="693" instrument_node="">This talk details how our fake news world has one important source in the Christian fundamentalism of the early 20th century. For more information: http://religiondispatches.org/the-religious-origins-of-fake-news-and-alternative-facts/</span></div></td><td data-dcnode-id="689"><span data-dcnode-id="690" instrument_node="">Douglas, Dr. Christopher</span></td><td data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">Professor</span></td><td data-dcnode-id="685"><span data-dcnode-id="686" instrument_node="">Department of English</span></td></tr><tr class="Social-Issues Department-of-English S Virtual altrow" data-dcnode-id="670" role="row"><td data-dcnode-id="682"><span data-dcnode-id="683" instrument_node="">Social Issues</span></td><td class="more-info" data-dcnode-id="677"><a data-dcnode-id="680" href="#"><span data-dcnode-id="681" instrument_node="">The Rise of the Christian Right (S) ◊</span></a><div class="description" data-dcnode-id="678" style="display: none;"><span data-dcnode-id="679" instrument_node="">This historical talk covers the causes, demographics, politics and effects of the rise of the religious right since the 1960s, from the backlashes to the sexual revolution and the Civil Rights movement to the Donald Trump presidency.</span></div></td><td data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">Douglas, Dr. Christopher</span></td><td data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">Professor</span></td><td data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">Department of English</span></td></tr><tr class="Social-Issues Department-of-Social-Work Virtual" data-dcnode-id="656" role="row"><td data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">Social Issues</span></td><td class="more-info" data-dcnode-id="663"><a data-dcnode-id="666" href="#"><span data-dcnode-id="667" instrument_node="">Grandparents Raising Grandchildren: What Happens for the Families? ◊</span></a><div class="description" data-dcnode-id="664" style="display: none;"><span data-dcnode-id="665" instrument_node="">Grandparents raising grandchildren is a growing phenomenon in Canada. This presentation is based on 10 years of research and community work with families who are raising the children of relatives. The complex issues for the families, the supports available and the resources needed are discussed. Surprisingly too many, there are more BC children in the care of grandparents than there are children in foster care. Often these children arrive in traumatic and unexpected ways and the impacts are complicated and touching.</span></div></td><td data-dcnode-id="661"><span data-dcnode-id="662" instrument_node="">Whittington, Dr. Barbara</span></td><td data-dcnode-id="659"><span data-dcnode-id="660" instrument_node="">Professor Emerita</span></td><td data-dcnode-id="657"><span data-dcnode-id="658" instrument_node="">Department of Social Work</span></td></tr><tr class="Social-Issues Department-of-Sociology M S Virtual altrow" data-dcnode-id="642" role="row"><td data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">Social Issues</span></td><td class="more-info" data-dcnode-id="649"><a data-dcnode-id="652" href="#"><span data-dcnode-id="653" instrument_node="">The Many Faces of Racism and Why it’s So Difficult to Eradicate (M S) ◊</span></a><div class="description" data-dcnode-id="650" style="display: none;"><span data-dcnode-id="651" instrument_node="">This talk presents examples and research findings on different kinds of racism, including white racism, racism among racialized minorities, overt/covert racism, and racism that intersects with class, gender and other types of discrimination. This diversity makes racism complex and difficult to explain without considering the historical contexts in which it occurs. </span></div></td><td data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">Warburton, Dr. Rennie</span></td><td data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">Professor Emeritus</span></td><td data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">Department of Sociology</span></td></tr><tr class="Social-Issues Department-of-Sociology M S Virtual" data-dcnode-id="628" role="row"><td data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">Social Issues</span></td><td class="more-info" data-dcnode-id="635"><a data-dcnode-id="638" href="#"><span data-dcnode-id="639" instrument_node="">Reconciliation, Restitution and Resurgence: Indigenous Politics after the TRC Report (M S) ◊</span></a><div class="description" data-dcnode-id="636" style="display: none;"><span data-dcnode-id="637" instrument_node="">Drawing on the work of Indigenous scholars Taiaiake Alfred, John Borrows, Leanne Simpson and others, and non-Indigenous political theorist James Tully, this presentation considers what it would take for Indigenous Canadians to become fully fledged partners with non-Indigenous people in a more just, more democratic, decolonized Canada. </span></div></td><td data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">Warburton, Dr. Rennie</span></td><td data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">Professor Emeritus</span></td><td data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">Department of Sociology</span></td></tr><tr class="Social-Issues School-of-Public-Health--Social-Policy Virtual altrow" data-dcnode-id="614" role="row"><td data-dcnode-id="626"><span data-dcnode-id="627" instrument_node="">Social Issues</span></td><td class="more-info" data-dcnode-id="621"><a data-dcnode-id="624" href="#"><span data-dcnode-id="625" instrument_node="">Reducing Inequalities in Health ◊</span></a><div class="description" data-dcnode-id="622" style="display: none;"><span data-dcnode-id="623" instrument_node="">There are unacceptably large inequalities in health in BC, Canada and around the world. These inequalities are not only unfair and unjust, they’re also to a large extent avoidable. They result in a large additional burden of disease and costs to the health care system, and a range of other social and economic costs, as well as a massive loss of human potential. In fact, poverty may be so expensive that we cannot afford it! This presentation discusses this issue and what it will take to address it. </span></div></td><td data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">Hancock, Dr. Trevor</span></td><td data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">Professor Emeritus</span></td><td data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">School of Public Health &amp; Social Policy</span></td></tr><tr class="Social-Issues School-of-Public-Administration S Virtual" data-dcnode-id="600" role="row"><td data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">Social Issues</span></td><td class="more-info" data-dcnode-id="607"><a data-dcnode-id="610" href="#"><span data-dcnode-id="611" instrument_node="">Community-Based Research (S) ◊</span></a><div class="description" data-dcnode-id="608" style="display: none;"><span data-dcnode-id="609" instrument_node="">Budd Hall is a Professor Emeritus at UVic who has had a career in adult education, community-development and participatory research. He is the Co-Chair of the UNESCO Chair in Community-Based Research and Social Responsibility in Higher Education. His current focus is on training young people for doing locally based participatory research and supporting the strengthening of community-university research partnerships. He is also a poet and part of the Victoria Social Movement Poets Collective.</span></div></td><td data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">Hall, Prof. Budd</span></td><td data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">Professor Emeritus </span></td><td data-dcnode-id="601"><span data-dcnode-id="602" instrument_node="">School of Public Administration</span></td></tr><tr data-dcnode-id="597" id="nodata" role="row" style="display:none;"><td data-dcnode-id="598" style="with:100%;"><span data-dcnode-id="599" instrument_node="">There are no results for your search</span></td></tr><tr class="Work--Employment School-of-Public-Administration Virtual altrow" data-dcnode-id="583" role="row"><td data-dcnode-id="595"><span data-dcnode-id="596" instrument_node="">Work &amp; Employment</span></td><td class="more-info" data-dcnode-id="590"><a data-dcnode-id="593" href="#"><span data-dcnode-id="594" instrument_node="">Overcoming Challenges: the Governance of Nonprofit and Voluntary Organizations During Times of Severe Crisis ◊</span></a><div class="description" data-dcnode-id="591" style="display: none;"><span data-dcnode-id="592" instrument_node="">Many nonprofit organizations are experiencing extreme challenges due to the economic and social impact of the COVID-19 pandemic. The governance of these organizations by their volunteer boards of directors becomes extremely difficult during times of sudden and severe crisis such as this. This short talk will overview what boards can and should do to help their organizations survive these difficult times.</span></div></td><td data-dcnode-id="588"><span data-dcnode-id="589" instrument_node="">Murray, Prof. Vic</span></td><td data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">Adjunct Professor</span></td><td data-dcnode-id="584"><span data-dcnode-id="585" instrument_node="">School of Public Administration</span></td></tr><tr class="Work--Employment Department-of-Music M S Virtual" data-dcnode-id="569" role="row"><td data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">Work &amp; Employment</span></td><td class="more-info" data-dcnode-id="576"><a data-dcnode-id="579" href="#"><span data-dcnode-id="580" instrument_node="">Career Options and Learning Outcomes with a Degree in Music (in English or French) (M S) ◊</span></a><div class="description" data-dcnode-id="577" style="display: none;"><span data-dcnode-id="578" instrument_node="">What are the various streams of learning available to someone interested in pursuing music in higher education, and what are the foundational building blocks common to all streams? What are the career options related to these streams and how can a music degree be of benefit to a variety of fields? Expectations surrounding personal and group commitment, community contribution and responsibility, and some examples of rhythm and ear training basics will be explored.</span></div></td><td data-dcnode-id="574"><span data-dcnode-id="575" instrument_node="">Klazek, Dr. Merrie</span></td><td data-dcnode-id="572"><span data-dcnode-id="573" instrument_node="">Assistant Professor</span></td><td data-dcnode-id="570"><span data-dcnode-id="571" instrument_node="">Department of Music</span></td></tr><tr class="Work--Employment Peter-B-Gustavson-School-of-Business S Virtual altrow" data-dcnode-id="555" role="row"><td data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">Work &amp; Employment</span></td><td class="more-info" data-dcnode-id="562"><a data-dcnode-id="565" href="#"><span data-dcnode-id="566" instrument_node="">Interacting Effectively with People Who are Different than You (in English or Spanish) (S) ◊</span></a><div class="description" data-dcnode-id="563" style="display: none;"><span data-dcnode-id="564" instrument_node="">We live and work in a world full of people with whom we sometimes feel we share little (in terms of language, background, culture, religion, etc.). This might be perceived as an insurmountable challenge for many of us. This session explores a variety of ways we can start interacting more effectively with others and, along the way, create new relationships that can transform each of us and build community connections.</span></div></td><td data-dcnode-id="560"><span data-dcnode-id="561" instrument_node="">Flores, Dr. Ricardo</span></td><td data-dcnode-id="558"><span data-dcnode-id="559" instrument_node="">Assistant Professor</span></td><td data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">Peter B. Gustavson School of Business</span></td></tr><tr class="Work--Employment Peter-B-Gustavson-School-of-Business S Virtual" data-dcnode-id="541" role="row"><td data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">Work &amp; Employment</span></td><td class="more-info" data-dcnode-id="548"><a data-dcnode-id="551" href="#"><span data-dcnode-id="552" instrument_node="">Leading Others-and Yourself (in English or Spanish) (S) ◊</span></a><div class="description" data-dcnode-id="549" style="display: none;"><span data-dcnode-id="550" instrument_node="">Leaders and leadership ideas are all around us-from politics to school or work, or even church. This omnipresence of leadership rhetoric can be overwhelming for some, and at the extreme, can turn some people into cynics about the real impact of leaders. This session seeks to clarify what leadership really is (and what it is not). Additionally, participants will engage in discussions about who can be leaders (and who cannot). The session will also give concrete and practical guidance of how participants can deal with the all-encompassing leadership rhetoric and become effective (and positive) leaders in their different life-spheres.</span></div></td><td data-dcnode-id="546"><span data-dcnode-id="547" instrument_node="">Flores, Dr. Ricardo</span></td><td data-dcnode-id="544"><span data-dcnode-id="545" instrument_node="">Assistant Professor</span></td><td data-dcnode-id="542"><span data-dcnode-id="543" instrument_node="">Peter B. Gustavson School of Business</span></td></tr><tr class="Work--Employment Graduate-Programs--Research S Virtual altrow" data-dcnode-id="527" role="row"><td data-dcnode-id="539"><span data-dcnode-id="540" instrument_node="">Work &amp; Employment</span></td><td class="more-info" data-dcnode-id="534"><a data-dcnode-id="537" href="#"><span data-dcnode-id="538" instrument_node="">Embracing Diversity and Inclusion: Driving Change, Empowering Action (S) ◊ </span></a><div class="description" data-dcnode-id="535" style="display: none;"><span data-dcnode-id="536" instrument_node="">In this talk, the Associate Dean of Education explores why leadership for diversity matters, and discusses ways to create safe, welcoming and inclusive environments for diverse communities. Key topics include: developing an equity lens, understanding discrimination and micro-aggressions, setting goals and priorities focused on action, providing opportunities for diverse voices and perspectives, and&nbsp;the power of recognizing diverse forms of leadership. </span></div></td><td data-dcnode-id="532"><span data-dcnode-id="533" instrument_node="">McGregor, Dr. Catherine</span></td><td data-dcnode-id="530"><span data-dcnode-id="531" instrument_node="">Associate Dean</span></td><td data-dcnode-id="528"><span data-dcnode-id="529" instrument_node="">Graduate Programs &amp; Research</span></td></tr><tr class="Work--Employment Peter-B-Gustavson-School-of-Business S Virtual" data-dcnode-id="513" role="row"><td data-dcnode-id="525"><span data-dcnode-id="526" instrument_node="">Work &amp; Employment</span></td><td class="more-info" data-dcnode-id="520"><a data-dcnode-id="523" href="#"><span data-dcnode-id="524" instrument_node="">Emotional Intelligence and Cultural Diversity (S) ◊</span></a><div class="description" data-dcnode-id="521" style="display: none;"><span data-dcnode-id="522" instrument_node="">This presentation is designed for organizations (profit/non-profit) to enhance their understanding of EQ (within leadership and management) and how to embrace cultural diversity using emotional intelligence.</span></div></td><td data-dcnode-id="518"><span data-dcnode-id="519" instrument_node="">Leacock, Prof. Brian</span></td><td data-dcnode-id="516"><span data-dcnode-id="517" instrument_node="">Associate Director, International Programs</span></td><td data-dcnode-id="514"><span data-dcnode-id="515" instrument_node="">Peter B. Gustavson School of Business</span></td></tr><tr class="Work--Employment Department-of-Psychology M S Virtual altrow" data-dcnode-id="499" role="row"><td data-dcnode-id="511"><span data-dcnode-id="512" instrument_node="">Work &amp; Employment</span></td><td class="more-info" data-dcnode-id="506"><a data-dcnode-id="509" href="#"><span data-dcnode-id="510" instrument_node="">Careers in Psychology ǂ (M S) ◊</span></a><div class="description" data-dcnode-id="507" style="display: none;"><span data-dcnode-id="508" instrument_node="">This talk focuses in various opportunities for a career in psychology. Specifically, the talk provides information about different career paths in the field of psychology, differences in schooling and job responsibilities between counsellors, psychologists, and psychiatrists, pursuing an undergraduate or graduate degree in psychology, the application process for graduate school, maintaining work/life balance as a student, student self-care, burnout and stress management. </span></div></td><td data-dcnode-id="504"><span data-dcnode-id="505" instrument_node="">Legg, Ms. Nicole</span></td><td data-dcnode-id="502"><span data-dcnode-id="503" instrument_node="">Graduate Student</span></td><td data-dcnode-id="500"><span data-dcnode-id="501" instrument_node="">Department of Psychology</span></td></tr><tr class="Work--Employment Equity-and-Human-Rights-Office M S Virtual" data-dcnode-id="486" role="row"><td data-dcnode-id="497"><span data-dcnode-id="498" instrument_node="">Work &amp; Employment</span></td><td class="more-info" data-dcnode-id="493"><a data-dcnode-id="495" href="#"><span data-dcnode-id="496" instrument_node="">Beyond Diversity and Human Rights: How to Create Inclusive Spaces for Social Change (in English or French) (M S) ◊</span></a><div class="description" data-dcnode-id="494" style="display: none;"></div></td><td data-dcnode-id="491"><span data-dcnode-id="492" instrument_node="">Magassa, Mr. Moussa</span></td><td data-dcnode-id="489"><span data-dcnode-id="490" instrument_node="">Human Rights Advisor - Education</span></td><td data-dcnode-id="487"><span data-dcnode-id="488" instrument_node="">Equity and Human Rights Office</span></td></tr><tr class="Work--Employment Equity-and-Human-Rights-Office M S Virtual altrow" data-dcnode-id="473" role="row"><td data-dcnode-id="484"><span data-dcnode-id="485" instrument_node="">Work &amp; Employment</span></td><td class="more-info" data-dcnode-id="480"><a data-dcnode-id="482" href="#"><span data-dcnode-id="483" instrument_node="">Intercultural Conflict Resolution (in English or French) (M S) ◊</span></a><div class="description" data-dcnode-id="481" style="display: none;"></div></ ata-dcnode-id="448" instrument_node="">UVic Retirees Association</span></td></tr><tr class="Work--Employment UVic-Retirees-Association M S Not-Virtual" data-dcnode-id="432" role="row"><td data-dcnode-id="444"><span data-dcnode-id="445" instrument_node="">Work &amp; Employment</span></td><td class="more-info" data-dcnode-id="439"><a data-dcnode-id="442" href="#"><span data-dcnode-id="443" instrument_node="">Resume and Cover Letter Preparation (M S) </span></a><div class="description" data-dcnode-id="440" style="display: none;"><span data-dcnode-id="441" instrument_node="">Resume and Cover Letter Preparation covers content and presentation employers are looking for in cover letters and resumes and techniques to increase the probability of being asked for an interview. </span></div></td><td data-dcnode-id="437"><span data-dcnode-id="438" instrument_node="">Stevens, Ms. Beverly</span></td><td data-dcnode-id="435"><span data-dcnode-id="436" instrument_node="">Retiree</span></td><td data-dcnode-id="433"><span data-dcnode-id="434" instrument_node="">UVic Retirees Association</span></td></tr><tr class="Work--Employment UVic-Retirees-Association M S Not-Virtual altrow" data-dcnode-id="418" role="row"><td data-dcnode-id="430"><span data-dcnode-id="431" instrument_node="">Work &amp; Employment</span></td><td class="more-info" data-dcnode-id="425"><a data-dcnode-id="428" href="#"><span data-dcnode-id="429" instrument_node="">Interview Skills (M S)</span></a><div class="description" data-dcnode-id="426" style="display: none;"><span data-dcnode-id="427" instrument_node="">Strategies to ensure a successful interview and increase the chances of receiving a job offer.</span></div></td><td data-dcnode-id="423"><span data-dcnode-id="424" instrument_node="">Stevens, Ms. Beverly</span></td><td data-dcnode-id="421"><span data-dcnode-id="422" instrument_node="">Retiree</span></td><td data-dcnode-id="419"><span data-dcnode-id="420" instrument_node="">UVic Retirees Association</span></td></tr><tr class="Work--Employment Peter-B-Gustavson-School-of-Business Virtual" data-dcnode-id="404" role="row"><td data-dcnode-id="416"><span data-dcnode-id="417" instrument_node="">Work &amp; Employment</span></td><td class="more-info" data-dcnode-id="411"><a data-dcnode-id="414" href="#"><span data-dcnode-id="415" instrument_node="">Cultural Intelligence: What it is and Why it’s Important ◊</span></a><div class="description" data-dcnode-id="412" style="display: none;"><span data-dcnode-id="413" instrument_node="">Globalization has created a dramatic increase in the permeability of traditional boundaries-not just those around organizations, but around countries, economies, industries and people. Our environment is increasingly filled with people from different cultural backgrounds. Managing this multiculturalism requires that all of us develop a new way of thinking called cultural intelligence. </span></div></td><td data-dcnode-id="409"><span data-dcnode-id="410" instrument_node="">Thomas, Dr. David C.</span></td><td data-dcnode-id="407"><span data-dcnode-id="408" instrument_node="">Professor</span></td><td data-dcnode-id="405"><span data-dcnode-id="406" instrument_node="">Peter B. Gustavson School of Business</span></td></tr><tr class="Work--Employment Division-of-Continuing-Studies Virtual altrow" data-dcnode-id="390" role="row"><td data-dcnode-id="402"><span data-dcnode-id="403" instrument_node="">Work &amp; Employment</span></td><td class="more-info" data-dcnode-id="397"><a data-dcnode-id="400" href="#"><span data-dcnode-id="401" instrument_node="">Strategic Planning ◊</span></a><div class="description" data-dcnode-id="398" style="display: none;"><span data-dcnode-id="399" instrument_node="">This lecture/workshop is designed to help organizations evaluate and and enhance their strategic planning efforts.</span></div></td><td data-dcnode-id="395"><span data-dcnode-id="396" instrument_node="">Wikkramatileke, Dr. Rhordon</span></td><td data-dcnode-id="393"><span data-dcnode-id="394" instrument_node="">Instructor and Curriculum Developer</span></td><td data-dcnode-id="391"><span data-dcnode-id="392" instrument_node="">Division of Continuing Studies</span></td></tr><tr class="Work--Employment Division-of-Continuing-Studies Virtual" data-dcnode-id="376" role="row"><td data-dcnode-id="388"><span data-dcnode-id="389" instrument_node="">Work &amp; Employment</span></td><td class="more-info" data-dcnode-id="383"><a data-dcnode-id="386" href="#"><span data-dcnode-id="387" instrument_node="">Strategy Execution ◊</span></a><div class="description" data-dcnode-id="384" style="display: none;"><span data-dcnode-id="385" instrument_node="">This topic is delivered in an interactive workshop style presentation and will be of interest to organizations and management teams interested in enhancing the performance of the enterprise.</span></div></td><td data-dcnode-id="381"><span data-dcnode-id="382" instrument_node="">Wikkramatileke, Dr. Rhordon</span></td><td data-dcnode-id="379"><span data-dcnode-id="380" instrument_node="">Instructor and Curriculum Developer</span></td><td data-dcnode-id="377"><span data-dcnode-id="378" instrument_node="">Division of Continuing Studies</span></td></tr><tr class="Work--Employment Peter-B-Gustavson-School-of-Business S Virtual altrow" data-dcnode-id="362" role="row"><td data-dcnode-id="374"><span data-dcnode-id="375" instrument_node="">Work &amp; Employment</span></td><td class="more-info" data-dcnode-id="369"><a data-dcnode-id="372" href="#"><span data-dcnode-id="373" instrument_node="">Understanding Unconscious Bias in Cultural Contexts (S) ◊</span></a><div class="description" data-dcnode-id="370" style="display: none;"><span data-dcnode-id="371" instrument_node="">Workshop session designed to help individuals identify their unconscious biases and to provide practical strategies for using that understanding to improve performance when working across cultures.</span></div></td><td data-dcnode-id="367"><span data-dcnode-id="368" instrument_node="">Leacock, Prof. Brian</span></td><td data-dcnode-id="365"><span data-dcnode-id="366" instrument_node="">Associate Director, International Programs</span></td><td data-dcnode-id="363"><span data-dcnode-id="364" instrument_node="">Peter B. Gustavson School of Business</span></td></tr><tr class="Work--Employment School-of-Exercise-Science-Physical--Health-Education S Virtual" data-dcnode-id="348" role="row"><td data-dcnode-id="360"><span data-dcnode-id="361" instrument_node="">Work &amp; Employment</span></td><td class="more-info" data-dcnode-id="355"><a data-dcnode-id="358" href="#"><span data-dcnode-id="359" instrument_node="">Reframing Your Organization: Are You Working Well? (S) ◊</span></a><div class="description" data-dcnode-id="356" style="display: none;"><span data-dcnode-id="357" instrument_node="">Multi-frame thinking and decision making can help managers, administrators, supervisors, and employees discover how they view their organization and assist them in taking steps toward a strategic planning process when an organization is ready for change. This workshop is of value for anyone who has a vision or plan for renewal within their organization – a plan to help their organization, department or section to “work well”.</span></div></td><td data-dcnode-id="353"><span data-dcnode-id="354" instrument_node="">Lauzon, Dr. Lara</span></td><td data-dcnode-id="351"><span data-dcnode-id="352" instrument_node="">Associate Professor</span></td><td data-dcnode-id="349"><span data-dcnode-id="350" instrument_node="">School of Exercise Science, Physical &amp; Health Education</span></td></tr></tbody></table><span data-dcnode-id="343" instrument_node="">
