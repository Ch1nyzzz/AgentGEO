s unexpectedly, in the passing of centuries. This is a series of three talks (which can be enjoyed independently) on Medieval Paris, Modern Paris (19th Century) and Paris as inspiration in songs (1920-1970)</span></div></td><td data-dcnode-id="4255"><span data-dcnode-id="4256" instrument_node="">Cazes, Dr. Hélène</span></td><td data-dcnode-id="4253"><span data-dcnode-id="4254" instrument_node="">Professor</span></td><td data-dcnode-id="4251"><span data-dcnode-id="4252" instrument_node="">Department of French</span></td></tr><tr class="History—General Department-of-French S Virtual" data-dcnode-id="4236" role="row"><td data-dcnode-id="4248"><span data-dcnode-id="4249" instrument_node="">History—General</span></td><td class="more-info" data-dcnode-id="4243"><a data-dcnode-id="4246" href="#"><span data-dcnode-id="4247" instrument_node="">Notre-Dame de Paris: The 2019 Fire that Destroyed the Cathedral Roof (in English or French) (S) ◊</span></a><div class="description" data-dcnode-id="4244" style="display: none;"><span data-dcnode-id="4245" instrument_node="">Notre-Dame de Paris: The recent (2019) fire that destroyed the roof of Notre-Dame de Paris was met with sorrow, generosity and passion in France and abroad. Hundreds of millions were raised in days for a speedy reconstruction, messages of despair, support, hope and love were exchanged, published, all over the world. For a few days, political life was suspended in France while all news were devoted to the fire, its extent, its causes… How to understand this emotion? What does the Parisian Cathedral represent?</span></div></td><td data-dcnode-id="4241"><span data-dcnode-id="4242" instrument_node="">Cazes, Dr. Hélène</span></td><td data-dcnode-id="4239"><span data-dcnode-id="4240" instrument_node="">Professor</span></td><td data-dcnode-id="4237"><span data-dcnode-id="4238" instrument_node="">Department of French</span></td></tr><tr class="History—General Department-of-French S Virtual altrow" data-dcnode-id="4223" role="row"><td data-dcnode-id="4234"><span data-dcnode-id="4235" instrument_node="">History—General</span></td><td class="more-info" data-dcnode-id="4230"><a data-dcnode-id="4232" href="#"><span data-dcnode-id="4233" instrument_node="">Is Notre-Dame Burning? (in English or French) (S) ◊</span></a><div class="description" data-dcnode-id="4231" style="display: none;"></div></td><td data-dcnode-id="4228"><span data-dcnode-id="4229" instrument_node="">Cazes, Dr. Hélène</span></td><td data-dcnode-id="4226"><span data-dcnode-id="4227" instrument_node="">Professor</span></td><td data-dcnode-id="4224"><span data-dcnode-id="4225" instrument_node="">Department of French</span></td></tr><tr class="History—General Department-of-History M S Not-Virtual" data-dcnode-id="4210" role="row"><td data-dcnode-id="4221"><span data-dcnode-id="4222" instrument_node="">History—General</span></td><td class="more-info" data-dcnode-id="4217"><a data-dcnode-id="4219" href="#"><span data-dcnode-id="4220" instrument_node="">Sir Edward Grey and the Balkan Wars, 1912-1914 (M S) </span></a><div class="description" data-dcnode-id="4218" style="display: none;"></div></td><td data-dcnode-id="4215"><span data-dcnode-id="4216" instrument_node="">McKercher, Prof. Brian</span></td><td data-dcnode-id="4213"><span data-dcnode-id="4214" instrument_node="">Professor</span></td><td data-dcnode-id="4211"><span data-dcnode-id="4212" instrument_node="">Department of History</span></td></tr><tr class="History—General Department-of-History M S Not-Virtual altrow" data-dcnode-id="4196" role="row"><td data-dcnode-id="4208"><span data-dcnode-id="4209" instrument_node="">History—General</span></td><td class="more-info" data-dcnode-id="4203"><a data-dcnode-id="4206" href="#"><span data-dcnode-id="4207" instrument_node="">The Limitations of the Politician-Historian: Winston Churchill and Appeasement (M S) </span></a><div class="description" data-dcnode-id="4204" style="display: none;"><span data-dcnode-id="4205" instrument_node="">"</span></div></td><td data-dcnode-id="4201"><span data-dcnode-id="4202" instrument_node="">McKercher, Prof. Brian</span></td><td data-dcnode-id="4199"><span data-dcnode-id="4200" instrument_node="">Professor</span></td><td data-dcnode-id="4197"><span data-dcnode-id="4198" instrument_node="">Department of History</span></td></tr><tr class="History—General Department-of-History M S Not-Virtual" data-dcnode-id="4182" role="row"><td data-dcnode-id="4194"><span data-dcnode-id="4195" instrument_node="">History—General</span></td><td class="more-info" data-dcnode-id="4189"><a data-dcnode-id="4192" href="#"><span data-dcnode-id="4193" instrument_node="">Issues Relating to the Origins of War in the Modern Period (M S) </span></a><div class="description" data-dcnode-id="4190" style="display: none;"><span data-dcnode-id="4191" instrument_node="">Learn about the origins of wars in the modern period since 1815- they’re complex, involving a mixture of nationalism, imperialism, national security, and a quest to protect or expand a country's national interests abroad. The notion underlining this complexity is the view that the international system is an “anarchy” of competing national interests.</span></div></td><td data-dcnode-id="4187"><span data-dcnode-id="4188" instrument_node="">McKercher, Prof. Brian</span></td><td data-dcnode-id="4185"><span data-dcnode-id="4186" instrument_node="">Professor</span></td><td data-dcnode-id="4183"><span data-dcnode-id="4184" instrument_node="">Department of History</span></td></tr><tr class="History—General Department-of-History M S Not-Virtual altrow" data-dcnode-id="4168" role="row"><td data-dcnode-id="4180"><span data-dcnode-id="4181" instrument_node="">History—General</span></td><td class="more-info" data-dcnode-id="4175"><a data-dcnode-id="4178" href="#"><span data-dcnode-id="4179" instrument_node="">Nations and Their Strategies Since 1945 (M S) </span></a><div class="description" data-dcnode-id="4176" style="display: none;"><span data-dcnode-id="4177" instrument_node="">During and since the Cold War period, understanding differing national strategies is important for explaining how and why international relations evolved.  This presentation explores how the Cold War saw the advent of a bipolar world dominated by the US and Soviet Russia. There were neutral powers-chiefly in the Third World-but Soviet-American rivalry affected all international politics. Since the end of the Cold War, a multi-polar world has emerged, making international politics more like pre-1939.</span></div></td><td data-dcnode-id="4173"><span data-dcnode-id="4174" instrument_node="">McKercher, Prof. Brian</span></td><td data-dcnode-id="4171"><span data-dcnode-id="4172" instrument_node="">Professor</span></td><td data-dcnode-id="4169"><span data-dcnode-id="4170" instrument_node="">Department of History</span></td></tr><tr class="History—General Department-of-History M S Not-Virtual" data-dcnode-id="4154" role="row"><td data-dcnode-id="4166"><span data-dcnode-id="4167" instrument_node="">History—General</span></td><td class="more-info" data-dcnode-id="4161"><a data-dcnode-id="4164" href="#"><span data-dcnode-id="4165" instrument_node="">The Origins and Course of the First World War (M S) </span></a><div class="description" data-dcnode-id="4162" style="display: none;"><span data-dcnode-id="4163" instrument_node="">This talk explores the complex origins of the First World War, which involved a mixture of nationalism, imperialism, national security, and the quest by great powers to protect or expand their national interests abroad. The war itself was devastating, seeing the collapse of four great powers-Germany, Austria-Hungary, Russia and Turkey-and the problems of fighting an unexpected war of attrition.</span></div></td><td data-dcnode-id="4159"><span data-dcnode-id="4160" instrument_node="">McKercher, Prof. Brian</span></td><td data-dcnode-id="4157"><span data-dcnode-id="4158" instrument_node="">Professor</span></td><td data-dcnode-id="4155"><span data-dcnode-id="4156" instrument_node="">Department of History</span></td></tr><tr class="History—General Department-of-History M S Not-Virtual altrow" data-dcnode-id="4140" role="row"><td data-dcnode-id="4152"><span data-dcnode-id="4153" instrument_node="">History—General</span></td><td class="more-info" data-dcnode-id="4147"><a data-dcnode-id="4150" href="#"><span data-dcnode-id="4151" instrument_node="">The Origins and Course of the Second World War (M S) </span></a><div class="description" data-dcnode-id="4148" style="display: none;"><span data-dcnode-id="4149" instrument_node="">The origins of the Second World War are less complex than other modern wars. At this presentation find out how WWII stemmed from the aggrandising and racial policies of Adolf Hitler, and how there were ultimately five wars fought within the rubric of the Second World War: an Anglo-French war against Germany (1939-1940); Britain fighting alone against the Axis (1940-1941); a Soviet-German war (1941-1942); an Anglo-American war against the Axis (1941-1945); and an American war against the Japanese (1941-1945).</span></div></td><td data-dcnode-id="4145"><span data-dcnode-id="4146" instrument_node="">McKercher, Prof. Brian</span></td><td data-dcnode-id="4143"><span data-dcnode-id="4144" instrument_node="">Professor</span></td><td data-dcnode-id="4141"><span data-dcnode-id="4142" instrument_node="">Department of History</span></td></tr><tr class="History—General Department-of-History M S Not-Virtual" data-dcnode-id="4126" role="row"><td data-dcnode-id="4138"><span data-dcnode-id="4139" instrument_node="">History—General</span></td><td class="more-info" data-dcnode-id="4133"><a data-dcnode-id="4136" href="#"><span data-dcnode-id="4137" instrument_node="">The Cold War: Cause and Course (M S) </span></a><div class="description" data-dcnode-id="4134" style="display: none;"><span data-dcnode-id="4135" instrument_node="">The Cold War was a unique period in international history. While the superpowers never fought “hot” wars against one another, they supported proxies to do their fighting or fought themselves against smaller powers. In this presentation, find out how this era was defined as much by an intense diplomatic struggle between two power-blocs of propaganda, and building armed forces to deter one another. Whether neutral or not, all countries of the world were affected.</span></div></td><td data-dcnode-id="4131"><span data-dcnode-id="4132" instrument_node="">McKercher, Prof. Brian</span></td><td data-dcnode-id="4129"><span data-dcnode-id="4130" instrument_node="">Professor</span></td><td data-dcnode-id="4127"><span data-dcnode-id="4128" instrument_node="">Department of History</span></td></tr><tr class="History—General Department-of-History M S Not-Virtual altrow" data-dcnode-id="4112" role="row"><td data-dcnode-id="4124"><span data-dcnode-id="4125" instrument_node="">History—General</span></td><td class="more-info" data-dcnode-id="4119"><a data-dcnode-id="4122" href="#"><span data-dcnode-id="4123" instrument_node="">Canadian Society and War Since 1867 (M S) </span></a><div class="description" data-dcnode-id="4120" style="display: none;"><span data-dcnode-id="4121" instrument_node="">Canada has been divided over issues of war and peace since its creation in 1867. From the Nile expedition of 1885 to modern peace-keeping under UN or NATO leadership today, the use of military power and the place of the Canadian armed forces as an expression of national strength has been the subject of great debate. In this presentation, learn how it’s not just the division between English Canada and Quebec that’s important-so too are the beliefs of pro-military Canadians and others than can be broadly categorized as pacifists.</span></div></td><td data-dcnode-id="4117"><span data-dcnode-id="4118" instrument_node="">McKercher, Prof. Brian</span></td><td data-dcnode-id="4115"><span data-dcnode-id="4116" instrument_node="">Professor</span></td><td data-dcnode-id="4113"><span data-dcnode-id="4114" instrument_node="">Department of History</span></td></tr><tr class="History—General Department-of-History M S Not-Virtual" data-dcnode-id="4098" role="row"><td data-dcnode-id="4110"><span data-dcnode-id="4111" instrument_node="">History—General</span></td><td class="more-info" data-dcnode-id="4105"><a data-dcnode-id="4108" href="#"><span data-dcnode-id="4109" instrument_node="">The Anglo-American Special Relationship Since 1941 (M S)</span></a><div class="description" data-dcnode-id="4106" style="display: none;"><span data-dcnode-id="4107" instrument_node="">"</span></div></td><td data-dcnode-id="4103"><span data-dcnode-id="4104" instrument_node="">McKercher, Prof. Brian</span></td><td data-dcnode-id="4101"><span data-dcnode-id="4102" instrument_node="">Professor</span></td><td data-dcnode-id="4099"><span data-dcnode-id="4100" instrument_node="">Department of History</span></td></tr><tr class="History—General Department-of-History M S Not-Virtual altrow" data-dcnode-id="4084" role="row"><td data-dcnode-id="4096"><span data-dcnode-id="4097" instrument_node="">History—General</span></td><td class="more-info" data-dcnode-id="4091"><a data-dcnode-id="4094" href="#"><span data-dcnode-id="4095" instrument_node="">Winston Churchill’s Criticism of Appeasement in the 1930s (M S) </span></a><div class="description" data-dcnode-id="4092" style="display: none;"><span data-dcnode-id="4093" instrument_node="">"</span></div></td><td data-dcnode-id="4089"><span data-dcnode-id="4090" instrument_node="">McKercher, Prof. Brian</span></td><td data-dcnode-id="4087"><span data-dcnode-id="4088" instrument_node="">Professor</span></td><td data-dcnode-id="4085"><span data-dcnode-id="4086" instrument_node="">Department of History</span></td></tr><tr class="History—General Department-of-Curriculum--Instruction Not-Virtual" data-dcnode-id="4070" role="row"><td data-dcnode-id="4082"><span data-dcnode-id="4083" instrument_node="">History—General</span></td><td class="more-info" data-dcnode-id="4077"><a data-dcnode-id="4080" href="#"><span data-dcnode-id="4081" instrument_node="">Women Travellers Throughout the Ages</span></a><div class="description" data-dcnode-id="4078" style="display: none;"><span data-dcnode-id="4079" instrument_node="">This session presents the lives and experiences of nine exceptional, interesting and enthusiastic women travellers from the 4th to the 21st century who wrote about adventure. Reading list included. </span></div></td><td data-dcnode-id="4075"><span data-dcnode-id="4076" instrument_node="">Mayfield, Dr. Margie</span></td><td data-dcnode-id="4073"><span data-dcnode-id="4074" instrument_node="">Professor Emerita</span></td><td data-dcnode-id="4071"><span data-dcnode-id="4072" instrument_node="">Department of Curriculum &amp; Instruction</span></td></tr><tr class="History—General Department-of-History S Not-Virtual altrow" data-dcnode-id="4056" role="row"><td data-dcnode-id="4068"><span data-dcnode-id="4069" instrument_node="">History—General</span></td><td class="more-info" data-dcnode-id="4063"><a data-dcnode-id="4066" href="#"><span data-dcnode-id="4067" instrument_node="">A History of the Palestinian-Israeli Conflict (S)</span></a><div class="description" data-dcnode-id="4064" style="display: none;"><span data-dcnode-id="4065" instrument_node="">The conflict between Palestine and Israel is one of the most highly publicized and bitter struggles of modern times. This talk examines not only the historical basis of the conflict, but also looks at how and why a resolution to the conflict has been so difficult. </span></div></td><td data-dcnode-id="4061"><span data-dcnode-id="4062" instrument_node="">Bunton, Dr. Martin</span></td><td data-dcnode-id="4059"><span data-dcnode-id="4060" instrument_node="">Associate Professor</span></td><td data-dcnode-id="4057"><span data-dcnode-id="4058" instrument_node="">Department of History</span></td></tr><tr class="History—General Department-of-History M S Virtual" data-dcnode-id="4042" role="row"><td data-dcnode-id="4054"><span data-dcnode-id="4055" instrument_node="">History—General</span></td><td class="more-info" data-dcnode-id="4049"><a data-dcnode-id="4052" href="#"><span data-dcnode-id="4053" instrument_node="">The British Monarchy: Why Does the Royal Family Travel So Much? (M S) ◊</span></a><div class="description" data-dcnode-id="4050" style="display: none;"><span data-dcnode-id="4051" instrument_node="">Royal tours – in Britain and throughout the world – are perhaps the most striking feature of the modern British monarchy. This talk locates the origins of this practice in the mobile royal courts of the Middle Ages, discusses its near-disappearance in the 1600s and 1700s, and explains its revival in the modern era in the context of modern technological and cultural developments.</span></div></td><td data-dcnode-id="4047"><span data-dcnode-id="4048" instrument_node="">Devereaux, Dr. Simon</span></td><td data-dcnode-id="4045"><span data-dcnode-id="4046" instrument_node="">Associate Professor</span></td><td data-dcnode-id="4043"><span data-dcnode-id="4044" instrument_node="">Department of History</span></td></tr><tr class="History—General Department-of-History M S Virtual altrow" data-dcnode-id="4028" role="row"><td data-dcnode-id="4040"><span data-dcnode-id="4041" instrument_node="">History—General</span></td><td class="more-info" data-dcnode-id="4035"><a data-dcnode-id="4038" href="#"><span data-dcnode-id="4039" instrument_node="">The War of the Windsors: Charles and Diana, 1981-1997 (M S) ◊</span></a><div class="description" data-dcnode-id="4036" style="display: none;"><span data-dcnode-id="4037" instrument_node="">The marriage of Charles Prince of Wales to Lady Diana Spencer in July 1981 was a global media event. Within a decade, however, their marriage ended in a mutual acrimony that was relentlessly detailed in that same media which once had celebrated this fairy-tale romance. This talk reviews the story from start to finish and considers how it nearly inspired the British entirely to abandon one of their most cherished national institutions.</span></div></td><td data-dcnode-id="4033"><span data-dcnode-id="4034" instrument_node="">Devereaux, Dr. Simon</span></td><td data-dcnode-id="4031"><span data-dcnode-id="4032" instrument_node="">Associate Professor</span></td><td data-dcnode-id="4029"><span data-dcnode-id="4030" instrument_node="">Department of History</span></td></tr><tr class="History—General Department-of-History M S Virtual" data-dcnode-id="4014" role="row"><td data-dcnode-id="4026"><span data-dcnode-id="4027" instrument_node="">History—General</span></td><td class="more-info" data-dcnode-id="4021"><a data-dcnode-id="4024" href="#"><span data-dcnode-id="4025" instrument_node="">Conspiracy Thinking: A Rational Guide to Thinking Irrationally (M S) ◊</span></a><div class="description" data-dcnode-id="4022" style="display: none;"><span data-dcnode-id="4023" instrument_node="">This talk introduces the major human needs that animate conspiracy thinking in the modern world: the need for big explanations for large-scale disasters; the need to believe that order prevails over chaos; and the superior appeal of complexity by comparison with simple answers. </span></div></td><td data-dcnode-id="4019"><span data-dcnode-id="4020" instrument_node="">Devereaux, Dr. Simon</span></td><td data-dcnode-id="4017"><span data-dcnode-id="4018" instrument_node="">Associate Professor</span></td><td data-dcnode-id="4015"><span data-dcnode-id="4016" instrument_node="">Department of History</span></td></tr><tr class="History—General Department-of-History M S Virtual altrow" data-dcnode-id="4000" role="row"><td data-dcnode-id="4012"><span data-dcnode-id="4013" instrument_node="">History—General</span></td><td class="more-info" data-dcnode-id="4007"><a data-dcnode-id="4010" href="#"><span data-dcnode-id="4011" instrument_node="">The Road Hill Murder of 1860: A Great Victorian Mystery (M S) ◊</span></a><div class="description" data-dcnode-id="4008" style="display: none;"><span data-dcnode-id="4009" instrument_node="">In June 1860 a four-year-old boy was savagely murdered in a comfortable upper middle-class home Wiltshire. The career of a famed police detective was shattered when he attempted to charge the boy’s 16-year-old half-sister, Constance Kent, with the crime – only for her to confess her guilt five years later. This talk revisits this case, one of the most sensational of the age.</span></div></td><td data-dcnode-id="4005"><span data-dcnode-id="4006" instrument_node="">Devereaux, Dr. Simon</span></td><td data-dcnode-id="4003"><span data-dcnode-id="4004" instrument_node="">Associate Professor</span></td><td data-dcnode-id="4001"><span data-dcnode-id="4002" instrument_node="">Department of History</span></td></tr><tr class="History—General Department-of-History M S Virtual" data-dcnode-id="3986" role="row"><td data-dcnode-id="3998"><span data-dcnode-id="3999" instrument_node="">History—General</span></td><td class="more-info" data-dcnode-id="3993"><a data-dcnode-id="3996" href="#"><span data-dcnode-id="3997" instrument_node="">Jack the Ripper and the Royal Family: Murder and Myth (M S) ◊</span></a><div class="description" data-dcnode-id="3994" style="display: none;"><span data-dcnode-id="3995" instrument_node="">This talk reviews the many different theories which, since 1970, have suggested that Jack the Ripper – the most famous killer in history – was either a member of the royal family or someone acting on its behalf.</span></div></td><td data-dcnode-id="3991"><span data-dcnode-id="3992" instrument_node="">Devereaux, Dr. Simon</span></td><td data-dcnode-id="3989"><span data-dcnode-id="3990" instrument_node="">Associate Professor</span></td><td data-dcnode-id="3987"><span data-dcnode-id="3988" instrument_node="">Department of History</span></td></tr><tr class="History—General Department-of-History M S Virtual altrow" data-dcnode-id="3972" role="row"><td data-dcnode-id="3984"><span data-dcnode-id="3985" instrument_node="">History—General</span></td><td class="more-info" data-dcnode-id="3979"><a data-dcnode-id="3982" href="#"><span data-dcnode-id="3983" instrument_node="">Bad Kings: Edward VIII and the Abdication Crisis (1936) (M S) ◊</span></a><div class="description" data-dcnode-id="3980" style="display: none;"><span data-dcnode-id="3981" instrument_node="">More than eighty years after, King Edward VIII’s abdication of the British throne still haunts the royal family. This talk locates the Abdication Crisis in the king’s own character and reviews some of the controversies which surround the Crisis and its outcome to this day. </span></div></td><td data-dcnode-id="3977"><span data-dcnode-id="3978" instrument_node="">Devereaux, Dr. Simon</span></td><td data-dcnode-id="3975"><span data-dcnode-id="3976" instrument_node="">Associate Professor</span></td><td data-dcnode-id="3973"><span data-dcnode-id="3974" instrument_node="">Department of History</span></td></tr><tr class="History—General Department-of-History M S Virtual" data-dcnode-id="3958" role="row"><td data-dcnode-id="3970"><span data-dcnode-id="3971" instrument_node="">History—General</span></td><td class="more-info" data-dcnode-id="3965"><a data-dcnode-id="3968" href="#"><span data-dcnode-id="3969" instrument_node="">Bad Kings: George IV and William IV of England, 1820-1837 (M S) ◊ </span></a><div class="description" data-dcnode-id="3966" style="display: none;"><span data-dcnode-id="3967" instrument_node="">Most people believe that widespread contempt for the monarchy is only a recent development. In fact, as this talk reveals, the reigns of two of George III’s sons-men of extraordinary personal and fiscal dissolution-brought the institution to a historical low-point in the years just before the accession of their niece Victoria would restore its lustre.</span></div></td><td data-dcnode-id="3963"><span data-dcnode-id="3964" instrument_node="">Devereaux, Dr. Simon</span></td><td data-dcnode-id="3961"><span data-dcnode-id="3962" instrument_node="">Associate Professor</span></td><td data-dcnode-id="3959"><span data-dcnode-id="3960" instrument_node="">Department of History</span></td></tr><tr class="History—General Department-of-History M S Virtual altrow" data-dcnode-id="3944" role="row"><td data-dcnode-id="3956"><span data-dcnode-id="3957" instrument_node="">History—General</span></td><td class="more-info" data-dcnode-id="3951"><a data-dcnode-id="3954" href="#"><span data-dcnode-id="3955" instrument_node="">Murder, Bodysnatching and Anatomization in England, 1752-1832 (M S) ◊</span></a><div class="description" data-dcnode-id="3952" style="display: none;"><span data-dcnode-id="3953" instrument_node="">This talk reveals the relationship between public execution, anatomical education and grave robbing in late Georgian England.</span></div></td><td data-dcnode-id="3949"><span data-dcnode-id="3950" instrument_node="">Devereaux, Dr. Simon</span></td><td data-dcnode-id="3947"><span data-dcnode-id="3948" instrument_node="">Associate Professor</span></td><td data-dcnode-id="3945"><span data-dcnode-id="3946" instrument_node="">Department of History</span></td></tr><tr class="History—General Department-of-History S Virtual" data-dcnode-id="3930" role="row"><td data-dcnode-id="3942"><span data-dcnode-id="3943" instrument_node="">History—General</span></td><td class="more-info" data-dcnode-id="3937"><a data-dcnode-id="3940" href="#"><span data-dcnode-id="3941" instrument_node="">Dr. Crippen: Sex, Murder and Science in Early 20th-Century England (S) ◊</span></a><div class="description" data-dcnode-id="3938" style="display: none;"><span data-dcnode-id="3939" instrument_node="">In 1910 a seemingly meek London doctor murdered his wife and fled England with his young mistress. Through a combination of “cutting-edge” forensics and determined detective work, Dr. Crippen was pursued, arrested and brought to the gallows. This talk revisits this particularly famous criminal justice sensation.</span></div></td><td data-dcnode-id="3935"><span data-dcnode-id="3936" instrument_node="">Devereaux, Dr. Simon</span></td><td data-dcnode-id="3933"><span data-dcnode-id="3934" instrument_node="">Associate Professor</span></td><td data-dcnode-id="3931"><span data-dcnode-id="3932" instrument_node="">Department of History</span></td></tr><tr class="History—General Department-of-History M S Virtual altrow" data-dcnode-id="3916" role="row"><td data-dcnode-id="3928"><span data-dcnode-id="3929" instrument_node="">History—General</span></td><td class="more-info" data-dcnode-id="3923"><a data-dcnode-id="3926" href="#"><span data-dcnode-id="3927" instrument_node="">Conspiracy Thinking: Communism and McCarthyism in 20th-Century America (M S) ◊</span></a><div class="description" data-dcnode-id="3924" style="display: none;"><span data-dcnode-id="3925" instrument_node="">This talk revisits and explains the gap between the perception and the reality of the danger of Communism in the years after World War II.</span></div></td><td data-dcnode-id="3921"><span data-dcnode-id="3922" instrument_node="">Devereaux, Dr. Simon</span></td><td data-dcnode-id="3919"><span data-dcnode-id="3920" instrument_node="">Associate Professor</span></td><td data-dcnode-id="3917"><span data-dcnode-id="3918" instrument_node="">Department of History</span></td></tr><tr class="History—General Department-of-History M S Virtual" data-dcnode-id="3902" role="row"><td data-dcnode-id="3914"><span data-dcnode-id="3915" instrument_node="">History—General</span></td><td class="more-info" data-dcnode-id="3909"><a data-dcnode-id="3912" href="#"><span data-dcnode-id="3913" instrument_node="">Conspiracy Thinking: UFOs Over America, 1947-69 (M S) ◊</span></a><div class="description" data-dcnode-id="3910" style="display: none;"><span data-dcnode-id="3911" instrument_node="">This talk examines the nature and investigation of Unidentified Flying Objects (or flying saucers) in America during the first two decades after World War II.</span></div></td><td data-dcnode-id="3907"><span data-dcnode-id="3908" instrument_node="">Devereaux, Dr. Simon</span></td><td data-dcnode-id="3905"><span data-dcnode-id="3906" instrument_node="">Associate Professor</span></td><td data-dcnode-id="3903"><span data-dcnode-id="3904" instrument_node="">Department of History</span></td></tr><tr class="History—General Department-of-History M S Virtual altrow" data-dcnode-id="3888" role="row"><td data-dcnode-id="3900"><span data-dcnode-id="3901" instrument_node="">History—General</span></td><td class="more-info" data-dcnode-id="3895"><a data-dcnode-id="3898" href="#"><span data-dcnode-id="3899" instrument_node="">Why was Capital Punishment Abolished in Postwar Britain? (M S) ◊</span></a><div class="description" data-dcnode-id="3896" style="display: none;"><span data-dcnode-id="3897" instrument_node="">In 1945 the abolition of execution for murder seemed unimaginable to most English people. 20 years later it took place. This talk briefly reviews the issues and cases which led to this most striking of criminal justice reforms.</span></div></td><td data-dcnode-id="3893"><span data-dcnode-id="3894" instrument_node="">Devereaux, Dr. Simon</span></td><td data-dcnode-id="3891"><span data-dcnode-id="3892" instrument_node="">Associate Professor</span></td><td data-dcnode-id="3889"><span data-dcnode-id="3890" instrument_node="">Department of History</span></td></tr><tr class="History—General Department-of-History M S Virtual" data-dcnode-id="3874" role="row"><td data-dcnode-id="3886"><span data-dcnode-id="3887" instrument_node="">History—General</span></td><td class="more-info" data-dcnode-id="3881"><a data-dcnode-id="3884" href="#"><span data-dcnode-id="3885" instrument_node="">Execution, Transportation and the Founding of Australia, 1775-1789 (M S) ◊</span></a><div class="description" data-dcnode-id="3882" style="display: none;"><span data-dcnode-id="3883" instrument_node="">In the popular imagination, all forms of punishment in pre-modern England were brutal. This talk shows how transportation was an indispensable alternative to hanging large numbers of people and explores how the absence of that alternative during the 1780s led to executions on an almost unprecedented scale.</span></div></td><td data-dcnode-id="3879"><span data-dcnode-id="3880" instrument_node="">Devereaux, Dr. Simon</span></td><td data-dcnode-id="3877"><span data-dcnode-id="3878" instrument_node="">Associate Professor</span></td><td data-dcnode-id="3875"><span data-dcnode-id="3876" instrument_node="">Department of History</span></td></tr><tr class="History—General Department-of-History M S Virtual altrow" data-dcnode-id="3860" role="row"><td data-dcnode-id="3872"><span data-dcnode-id="3873" instrument_node="">History—General</span></td><td class="more-info" data-dcnode-id="3867"><a data-dcnode-id="3870" href="#"><span data-dcnode-id="3871" instrument_node="">Bad Kings: The Madness of George III, 1760-1820 (M S) ◊</span></a><div class="description" data-dcnode-id="3868" style="display: none;"><span data-dcnode-id="3869" instrument_node="">George III’s insanity is now probably the most widely-known fact of his long reign. This talk revisits the nature and significance of the madness of King George.</span></div></td><td data-dcnode-id="3865"><span data-dcnode-id="3866" instrument_node="">Devereaux, Dr. Simon</span></td><td data-dcnode-id="3863"><span data-dcnode-id="3864" instrument_node="">Associate Professor</span></td><td data-dcnode-id="3861"><span data-dcnode-id="3862" instrument_node="">Department of History</span></td></tr><tr class="History—General Department-of-History M S Virtual" data-dcnode-id="3846" role="row"><td data-dcnode-id="3858"><span data-dcnode-id="3859" instrument_node="">History—General</span></td><td class="more-info" data-dcnode-id="3853"><a data-dcnode-id="3856" href="#"><span data-dcnode-id="3857" instrument_node="">Conspiracy Thinking: Extraterrestrials in America since 1966 (M S) ◊</span></a><div class="description" data-dcnode-id="3854" style="display: none;"><span data-dcnode-id="3855" instrument_node="">This talk offers some explanations for the abiding belief that beings from another world have contacted human beings and are engaged with them in both positive and sinister ways.</span></div></td><td data-dcnode-id="3851"><span data-dcnode-id="3852" instrument_node="">Devereaux, Dr. Simon</span></td><td data-dcnode-id="3849"><span data-dcnode-id="3850" instrument_node="">Associate Professor</span></td><td data-dcnode-id="3847"><span data-dcnode-id="3848" instrument_node="">Department of History</span></td></tr><tr class="History—General Department-of-History M S Virtual altrow" data-dcnode-id="3832" role="row"><td data-dcnode-id="3844"><span data-dcnode-id="3845" instrument_node="">History—General</span></td><td class="more-info" data-dcnode-id="3839"><a data-dcnode-id="3842" href="#"><span data-dcnode-id="3843" instrument_node="">Conspiracy Thinking: The Unending Mysteries of the JFK Assassination (M S) ◊</span></a><div class="description" data-dcnode-id="3840" style="display: none;"><span data-dcnode-id="3841" instrument_node="">This talk considers how decisions made in the immediate aftermath of the assassination of Pres. John Kennedy-perhaps the greatest public trauma of the postwar era-gave rise to our abiding belief that the crime was the work of various sinister forces in American society.</span></div></td><td data-dcnode-id="3837"><span data-dcnode-id="3838" instrument_node="">Devereaux, Dr. Simon</span></td><td data-dcnode-id="3835"><span data-dcnode-id="3836" instrument_node="">Associate Professor</span></td><td data-dcnode-id="3833"><span data-dcnode-id="3834" instrument_node="">Department of History</span></td></tr><tr class="History—General Department-of-History M S Virtual" data-dcnode-id="3818" role="row"><td data-dcnode-id="3830"><span data-dcnode-id="3831" instrument_node="">History—General</span></td><td class="more-info" data-dcnode-id="3825"><a data-dcnode-id="3828" href="#"><span data-dcnode-id="3829" instrument_node="">Murder and the Media in Victorian England (M S) ◊</span></a><div class="description" data-dcnode-id="3826" style="display: none;"><span data-dcnode-id="3827" instrument_node="">The newspapers of the Victorian age were obsessed with murder. This talk reveals the origins of this fascination in the rise of the modern newspaper press and a growing fascination with the cultural divide between towns and the countryside.</span></div></td><td data-dcnode-id="3823"><span data-dcnode-id="3824" instrument_node="">Devereaux, Dr. Simon</span></td><td data-dcnode-id="3821"><span data-dcnode-id="3822" instrument_node="">Associate Professor</span></td><td data-dcnode-id="3819"><span data-dcnode-id="3820" instrument_node="">Department of History</span></td></tr><tr class="History—General Department-of-History Virtual altrow" data-dcnode-id="3804" role="row"><td data-dcnode-id="3816"><span data-dcnode-id="3817" instrument_node="">History—General</span></td><td class="more-info" data-dcnode-id="3811"><a data-dcnode-id="3814" href="#"><span data-dcnode-id="3815" instrument_node="">Petty Traitors and Domestic Tyrants: Spouse Murder in England, 1660-1800 (in English or French) ◊</span></a><div class="description" data-dcnode-id="3812" style="display: none;"><span data-dcnode-id="3813" instrument_node="">In 17th and 18th-century England, the murder of a husband by a wife was classified as a species of “petty treason,” punishable by the horrific aggravated sentence of being burnt alive at the stake. Lurid contemporary pamphlets represented murderous wives as monsters of depravity whose crimes struck at the heart of the social and gender hierarchy. This talk will explore the real incidence of, and trials for, petty treason in Britain’s largest criminal jurisdiction, the Old Bailey courthouse. We will see that most cases of husband-murder were pedestrian affairs, and-in contrast to a handful of cases sensationalized in the press-many defendants received surprisingly lenient treatment. In practice if not in theory, 17th and 18th-century London courts prosecuted petty treason like any other homicide, with attenuating factors such as provocation and good character taken into account and often leading to manslaughter verdicts or acquittal. This article aims to shed light on the experience of women accused of spouse murder by placing them in a larger context, comparing their trials to those of men accused of murdering wives or common-law partners, and exploring the relationship between gender, class and credibility, verdicts and ultimate punishments.</span></div></td><td data-dcnode-id="3809"><span data-dcnode-id="3810" instrument_node="">McKenzie, Dr. Andrea</span></td><td data-dcnode-id="3807"><span data-dcnode-id="3808" instrument_node="">Associate Professor</span></td><td data-dcnode-id="3805"><span data-dcnode-id="3806" instrument_node="">Department of History</span></td></tr><tr class="History—General Department-of-History Virtual" data-dcnode-id="3790" role="row"><td data-dcnode-id="3802"><span data-dcnode-id="3803" instrument_node="">History—General</span></td><td class="more-info" data-dcnode-id="3797"><a data-dcnode-id="3800" href="#"><span data-dcnode-id="3801" instrument_node="">The Bloody Code: Criminal Trial in 17th and 18th Century England (in English or French) ◊</span></a><div class="description" data-dcnode-id="3798" style="display: none;"><span data-dcnode-id="3799" instrument_node="">The English criminal law of the 17th and 18th century was notoriously harsh, with around two hundred separately defined offences punishable by death, the vast majority of which were property crimes, many of them non-violent and trivial by modern standards. This was a period in which the public hanging formed a regular feature of urban life, and in which aggravated capital sentences (burning at the stake, drawing and quartering) and gory posthumous punishments (gibbetting, dissection, the display of the heads and limbs of executed traitors) were familiar sights. Later legal and social reformers would condemn the so-called “Bloody Code” as not only harsh and barbaric but also arbitrary and irrational, with many legal loopholes and strange anomalies. For instance, until the early nineteenth century, kidnapping a child was only a misdemeanour -- subject to whipping or a fine -- while stealing the shoes from that same child was a capital offence, if they were valued at over a shilling. This talk will provide a larger context for the “Bloody Code”, exploring and explaining some of its striking features and contradictions and focusing on the many ways in which its harsh capital provisions could be, and often were, ameliorated by the discretion of judges, juries, prosecutors and other courtroom actors. </span></div></td><td data-dcnode-id="3795"><span data-dcnode-id="3796" instrument_node="">McKenzie, Dr. Andrea</span></td><td data-dcnode-id="3793"><span data-dcnode-id="3794" instrument_node="">Associate Professor</span></td><td data-dcnode-id="3791"><span data-dcnode-id="3792" instrument_node="">Department of History</span></td></tr><tr class="History—General Department-of-History Virtual altrow" data-dcnode-id="3776" role="row"><td data-dcnode-id="3788"><span data-dcnode-id="3789" instrument_node="">History—General</span></td><td class="more-info" data-dcnode-id="3783"><a data-dcnode-id="3786" href="#"><span data-dcnode-id="3787" instrument_node="">The Great Fire of London 1666 (in English or French) ◊</span></a><div class="description" data-dcnode-id="3784" style="display: none;"><span data-dcnode-id="3785" instrument_node="">The Great Fire of London, which broke out in a bakery in the heart of the city after a long dry summer, was a spectacular and devastating event. The fire raged uncontrolled for three days and nights, creating a firestorm of such intensity that the stone walls and windows of the medieval Gothic cathedral of Saint Paul’s melted, literally creating a river of molten lead and glass; fiery sparks burned the clothes of those huddled in boats on the Thames, attempting to escape the flames. The Fire destroyed most of the city within the medieval walls, London Bridge, hundreds of churches and tens of thousands of houses, leaving 100,000 people homeless. Although methods of firefighting were rudimentary and fire was a common occurrence in early modern London, where buildings were made of highly flammable materials, contemporaries preferred to see the disaster as having supernatural or human, rather than natural, causes: a divine visitation upon London (the new Babylon) for its sins, or – even more likely – a sinister arson plot. The “usual suspects” included radical republicans, the Dutch, the French and, especially, Catholics – viewed at least since the 1605 Gunpowder Plot as potential traitors with divided loyalties. This talk will explore the way in which the Great Fire of London transformed both the literal and the mental landscape of London, spawning conspiracy theories that would shape the memory politics of England for centuries to come.</span></div></td><td data-dcnode-id="3781"><span data-dcnode-id="3782" instrument_node="">McKenzie, Dr. Andrea</span></td><td data-dcnode-id="3779"><span data-dcnode-id="3780" instrument_node="">Associate Professor</span></td><td data-dcnode-id="3777"><span data-dcnode-id="3778" instrument_node="">Department of History</span></td></tr><tr class="History—General Department-of-History Virtual" data-dcnode-id="3762" role="row"><td data-dcnode-id="3774"><span data-dcnode-id="3775" instrument_node="">History—General</span></td><td class="more-info" data-dcnode-id="3769"><a data-dcnode-id="3772" href="#"><span data-dcnode-id="3773" instrument_node="">Remember, Remember the Fifth of November: the 1605 Gunpowder Plot (in English or French) ◊</span></a><div class="description" data-dcnode-id="3770" style="display: none;"><span data-dcnode-id="3771" instrument_node="">The 1605 Gunpowder plot to blow up both Houses of Parliament, and James VI &amp; I of Scotland and England and the Prince of Wales, would have been the most devastating terrorist act in British history, eliminating most of the ruling class and the royal family in one fell stroke. But the conspiracy-the work of a handful of disgruntled English Catholics-was famously foiled after an anonymous letter raised suspicions and led to the discovery of Guy Fawkes in a cellar under the House of Lords, as he was about to detonate 30 barrels of gunpowder. This non-event has left an indelible mark on the English psyche: to this day bonfires and celebrations commemorate “Guy Fawkes Day” on 5 November, originally an anti-Catholic holiday but now become an opportunity to burn in effigy unpopular political figures of all denominations. The Gunpowder Plot remains controversial and has given rise to many conspiracy theories. To this day there are claims that it was an “inside job” intended to frame innocent Catholics. This talk will explore the pre-history, context and afterlife of this formative event, which ensured that harsh penal laws relegating Catholics to the status of second-class citizens in their own country remained in place until the early nineteenth century.</span></div></td><td data-dcnode-id="3767"><span data-dcnode-id="3768" instrument_node="">McKenzie, Dr. Andrea</span></td><td data-dcnode-id="3765"><span data-dcnode-id="3766" instrument_node="">Associate Professor</span></td><td data-dcnode-id="3763"><span data-dcnode-id="3764" instrument_node="">Department of History</span></td></tr><tr class="History—General Department-of-History Virtual altrow" data-dcnode-id="3748" role="row"><td data-dcnode-id="3760"><span data-dcnode-id="3761" instrument_node="">History—General</span></td><td class="more-info" data-dcnode-id="3755"><a data-dcnode-id="3758" href="#"><span data-dcnode-id="3759" instrument_node="">Who Killed Sir Edmund Berry Godfrey? Revisiting the Most Famous Murder Mystery of the 17th Century (in English or French) ◊</span></a><div class="description" data-dcnode-id="3756" style="display: none;"><span data-dcnode-id="3757" instrument_node="">The death of the middle-aged justice of the peace, Sir Edmund Berry Godfrey, in October 1678, is one of the most famous unsolved mysteries in English history. Shortly after taking the depositions of the unscrupulous perjurer Titus Oates, who claimed to have infiltrated several Jesuit seminaries in order to uncover an elaborate “Popish Plot” against the government, Godfrey   went out for a walk and never returned. His body – apparently beaten, strangled and then posthumously run through with his own sword – turned up several days later in a ditch in Primrose Hill, several miles from his home in Charing Cross. Godfrey’s death, and the conviction that he had been murdered by the “papists” (Catholics), sparked a sustained moral panic and set in motion a prosecution of innocent Catholics that constitutes one of the darkest chapters in English history. From the autumn of 1678 to the spring of 1681, hundreds of Catholic Jesuits, priests, laymen and Jesuits were arrested for their involvement in what would prove to be a wholly fictitious plot to assassinate King Charles II and to reinstate Catholicism in England: twenty-four were convicted of treason and executed; many others died in prison. The political repercussions of the “Plot” were dramatic, leading to the Exclusion Crisis and the formation of modern political parties (the “Whigs” and the “Tories”). This talk will explore some of the many theories about Godfrey’s mysterious death, and introduce some new evidence.</span></div></td><td data-dcnode-id="3753"><span data-dcnode-id="3754" instrument_node="">McKenzie, Dr. Andrea</span></td><td data-dcnode-id="3751"><span data-dcnode-id="3752" instrument_node="">Associate Professor</span></td><td data-dcnode-id="3749"><span data-dcnode-id="3750" instrument_node="">Department of History</span></td></tr><tr class="History—General Department-of-History Virtual" data-dcnode-id="3734" role="row"><td data-dcnode-id="3746"><span data-dcnode-id="3747" instrument_node="">History—General</span></td><td class="more-info" data-dcnode-id="3741"><a data-dcnode-id="3744" href="#"><span data-dcnode-id="3745" instrument_node="">The Strange Origins of the First Modern Political Party: the Whigs, Anti-Catholicism and Conspiracy Theories in 17th-Century England (in English or French) ◊</span></a><div class="description" data-dcnode-id="3742" style="display: none;"><span data-dcnode-id="3743" instrument_node="">The “Whig Theory of History” popularised by such 19th-century British historians as T.B. Macaulay (a “Whig”, or Liberal, MP) celebrated the gradual evolution of uniquely English legal traditions and institutions as a grand narrative of progress-the triumph of parliamentary government over the arbitrary powers of the crown. This talk will tell a different and darker story about the 17th-century origins of both this self-congratulatory view of English history and the “Whigs,” precursors to the Liberal party. As we shall see, the widespread belief in a Catholic conspiracy to subvert the English constitution and the Protestant religion was a central component in the rise of parliamentary opposition and the beginnings of modern party politics. Moral panics about real and imagined “popish” plots and assassinations not only resulted in the persecution of hundreds of Catholic priests and lay people, but played a pivotal role in the major political events of the seventeenth century: the outbreak of Civil War in 1642, the execution of Charles I in 1649, the Exclusion Crisis of 1679-81 and the deposition of the last Catholic monarch, James II, in 1688-the so-called “Glorious Revolution”.&nbsp;</span></div></td><td data-dcnode-id="3739"><span data-dcnode-id="3740" instrument_node="">McKenzie, Dr. Andrea</span></td><td data-dcnode-id="3737"><span data-dcnode-id="3738" instrument_node="">Associate Professor</span></td><td data-dcnode-id="3735"><span data-dcnode-id="3736" instrument_node="">Department of History</span></td></tr><tr class="History—General Department-of-History Virtual altrow" data-dcnode-id="3720" role="row"><td data-dcnode-id="3732"><span data-dcnode-id="3733" instrument_node="">History—General</span></td><td class="more-info" data-dcnode-id="3727"><a data-dcnode-id="3730" href="#"><span data-dcnode-id="3731" instrument_node="">Royal Martyr or “Man of Blood”? Spinning the Execution of Charles I, 1649 (in English or French) ◊</span></a><div class="description" data-dcnode-id="3728" style="display: none;"><span data-dcnode-id="3729" instrument_node="">The execution of Charles I on 30 January 1649 was one of the most dramatic, and divisive, events in British history. The decision of the Army and Rump Parliament to publicly try and, subsequently, execute the king for treason set an important precedent in terms of separating the person of the monarch from the state and was aimed at legitimating the new Cromwellian Puritan regime. Anti-royalist propaganda not only sought to portray the king as an ordinary man (“Charles Stuart”), but a man whose hands were stained with the blood of his own people and whose defeat in the Civil War could be read as a divine judgement against him. However, as scholars have noted, the decision to allow the press to report on the king’s trial and execution was a grave miscalculation on the part of the fledgling republic. This was largely due to the publication of the Eikon Basilike: the Portraiture of His Sacred Majesty in His Solitudes and Sufferings, a collection of personal reflections, meditations and prayers supposedly written by Charles I while awaiting judgement and death. The “King’s Book” was a runaway bestseller and a propaganda coup, successfully rewriting the warmongering “man of Blood” of Puritan critics as a charitable Christ-like figure who solemnly absolved his subjects of the guilt of his death.  Yet, by the later seventeenth century, the royalist propaganda machine sputtered and began to backfire: growing rumours that that the Eikon had been ghostwritten posed a fundamental threat not only to the cult of the Royal Martyr, but even to the sanctity of the monarchy itself.</span></div></td><td data-dcnode-id="3725"><span data-dcnode-id="3726" instrument_node="">McKenzie, Dr. Andrea</span></td><td data-dcnode-id="3723"><span data-dcnode-id="3724" instrument_node="">Associate Professor</span></td><td data-dcnode-id="3721"><span data-dcnode-id="3722" instrument_node="">Department of History</span></td></tr><tr class="History—General Department-of-History M S Virtual" data-dcnode-id="3706" role="row"><td data-dcnode-id="3718"><span data-dcnode-id="3719" instrument_node="">History—General</span></td><td class="more-info" data-dcnode-id="3713"><a data-dcnode-id="3716" href="#"><span data-dcnode-id="3717" instrument_node="">The First Treaties: The Roots of Indigenous–Settler Relations in Canada (in English or French) (M S) ◊</span></a><div class="description" data-dcnode-id="3714" style="display: none;"><span data-dcnode-id="3715" instrument_node="">This talk explores the 500-year history of alliances and treaties involving the Indigenous peoples of what is now Canada and settlers who arrived from Europe and elsewhere after 1500. Its focus is on the lesser-known treaties negotiated before Confederation in 1867, including the Vancouver Island treaties of 1850-54.</span></div></td><td data-dcnode-id="3711"><span data-dcnode-id="3712" instrument_node="">Cook, Dr. Peter</span></td><td data-dcnode-id="3709"><span data-dcnode-id="3710" instrument_node="">Associate Professor</span></td><td data-dcnode-id="3707"><span data-dcnode-id="3708" instrument_node="">Department of History</span></td></tr><tr class="History—General Department-of-History Virtual altrow" data-dcnode-id="3692" role="row"><td data-dcnode-id="3704"><span data-dcnode-id="3705" instrument_node="">History—General</span></td><td class="more-info" data-dcnode-id="3699"><a data-dcnode-id="3702" href="#"><span data-dcnode-id="3703" instrument_node="">A Sinner's Guide to Food and Sex in Time NEW ◊</span></a><div class="description" data-dcnode-id="3700" style="display: none;"><span data-dcnode-id="3701" instrument_node="">A Sinner's Guide to Food and Sex in Time offers a historical guided tour of six sites in history associated with food and sex, beginning with a "stew" or bathhouse in medieval London and ending with a men's grille in 1960s New Orleans. The talk traces how the linkage between food and sex has changed over time. This is a fun talk.</span></div></td><td data-dcnode-id="3697"><span data-dcnode-id="3698" instrument_node="">Cleves, Dr. Rachel Hope</span></td><td data-dcnode-id="3695"><span data-dcnode-id="3696" instrument_node="">Professor</span></td><td data-dcnode-id="3693"><span data-dcnode-id="3694" instrument_node="">Department of History</span></td></tr><tr class="History—Victoria--BC UVic-Legacy-Galleries E M S Virtual" data-dcnode-id="3678" role="row"><td data-dcnode-id="3690"><span data-dcnode-id="3691" instrument_node="">History—Victoria &amp; BC</span></td><td class="more-info" data-dcnode-id="3685"><a data-dcnode-id="3688" href="#"><span data-dcnode-id="3689" instrument_node="">To Fish As Formerly: A Story of Straits Salish Resurgence (E M S) NEW ◊</span></a><div class="description" data-dcnode-id="3686" style="display: none;"><span data-dcnode-id="3687" instrument_node="">To Fish as Formerly tells the story of the SXǂOLE (the Reef Net Fishery) through contemporary art, traditional knowledge and historical documentation. The presentation shares the story of the efforts of generations of WǂSÁNEÆ people who are revitalizing the belief systems, spirituality, knowledge and practices inherent to the SXǂOLE.</span></div></td><td data-dcnode-id="3683"><span data-dcnode-id="3684" instrument_node="">Booth, Ms. Gillian</span></td><td data-dcnode-id="3681"><span data-dcnode-id="3682" instrument_node="">Academic &amp; Community Programs Coordinator</span></td><td data-dcnode-id="3679"><span data-dcnode-id="3680" instrument_node="">UVic Legacy Galleries</span></td></tr><tr class="History—Victoria--BC Department-of-History S Virtual altrow" data-dcnode-id="3664" role="row"><td data-dcnode-id="3676"><span data-dcnode-id="3677" instrument_node="">History—Victoria &amp; BC</span></td><td class="more-info" data-dcnode-id="3671"><a data-dcnode-id="3674" href="#"><span data-dcnode-id="3675" instrument_node="">James Teit: Indigenous Rights Activist, 1900-1922 (S) ◊</span></a><div class="description" data-dcnode-id="3672" style="display: none;"><span data-dcnode-id="3673" instrument_node="">This talk covers the role that James Teit  played in assisting the Indigenous leaders of British Columbia with their efforts to resolve their issues concerning the  "BC Indian Land Question," Conscription and the Potlatch Ban during the first two decades of the 20th Century.</span></div></td><td data-dcnode-id="3669"><span data-dcnode-id="3670" instrument_node="">Wickwire, Dr. Wendy</span></td><td data-dcnode-id="3667"><span data-dcnode-id="3668" instrument_node="">Associate Professor Emerita</span></td><td data-dcnode-id="3665"><span data-dcnode-id="3666" instrument_node="">Department of History</span></td></tr><tr class="History—Victoria--BC Libraries-Reference-Services S Virtual" data-dcnode-id="3650" role="row"><td data-dcnode-id="3662"><span data-dcnode-id="3663" instrument_node="">History—Victoria &amp; BC</span></td><td class="more-info" data-dcnode-id="3657"><a data-dcnode-id="3660" href="#"><span data-dcnode-id="3661" instrument_node="">Voices Not Normally Heard: A Digital Exhibition of Two Chinese Canadian Community Newspapers (in English or Chinese) (S) NEW ◊</span></a><div class="description" data-dcnode-id="3658" style="display: none;"><span data-dcnode-id="3659" instrument_node="">The presentation is about a digital exhibition [https://exhibits.library.uvic.ca/spotlight/chinese-newspapers] of selected articles from two Chinese Canadian community newspapers in BC, and includes relevant interviews and historical documents related to the newspaper history and the evolution of local Chinese immigrant community. All articles are full-text searchable in both English and Chinese.</span></div></td><td data-dcnode-id="3655"><span data-dcnode-id="3656" instrument_node="">Liu, Ms. Ying</span></td><td data-dcnode-id="3653"><span data-dcnode-id="3654" instrument_node="">Librarian</span></td><td data-dcnode-id="3651"><span data-dcnode-id="3652" instrument_node="">Libraries, Reference Services</span></td></tr><tr class="History—Victoria--BC Department-of-History S Not-Virtual altrow" data-dcnode-id="3636" role="row"><td data-dcnode-id="3648"><span data-dcnode-id="3649" instrument_node="">History—Victoria &amp; BC</span></td><td class="more-info" data-dcnode-id="3643"><a data-dcnode-id="3646" href="#"><span data-dcnode-id="3647" instrument_node="">British Columbia’s Ambiguous Relations with the Rest of Canada (S)</span></a><div class="description" data-dcnode-id="3644" style="display: none;"><span data-dcnode-id="3645" instrument_node="">From the time that British Columbians first considered joining Canada, their relationship with the rest of the country has been ambiguous.  They are proud of their province and of being Canadians, but they frequently felt that the rest of the country failed to appreciate them and exploits them.  Editorial comments illustrate the talk.</span></div></td><td data-dcnode-id="3641"><span data-dcnode-id="3642" instrument_node="">Roy, Dr. Patricia</span></td><td data-dcnode-id="3639"><span data-dcnode-id="3640" instrument_node="">Professor Emerita</span></td><td data-dcnode-id="3637"><span data-dcnode-id="3638" instrument_node="">Department of History</span></td></tr><tr class="History—Victoria--BC Department-of-History S Not-Virtual" data-dcnode-id="3622" role="row"><td data-dcnode-id="3634"><span data-dcnode-id="3635" instrument_node="">History—Victoria &amp; BC</span></td><td class="more-info" data-dcnode-id="3629"><a data-dcnode-id="3632" href="#"><span data-dcnode-id="3633" instrument_node="">Boundless Optimism: Richard McBride's British Columbia (S)</span></a><div class="description" data-dcnode-id="3630" style="display: none;"><span data-dcnode-id="3631" instrument_node="">Richard McBride was premier, 1903-1915, an era of unprecedented growth. A native of the province he became premier at age 32, brought some order to provincial politics, promoted the development of railways, encouraged British investment and immigration, and played a role on the national and imperial stage.</span></div></td><td data-dcnode-id="3627"><span data-dcnode-id="3628" instrument_node="">Roy, Dr. Patricia</span></td><td data-dcnode-id="3625"><span data-dcnode-id="3626" instrument_node="">Professor Emerita</span></td><td data-dcnode-id="3623"><span data-dcnode-id="3624" instrument_node="">Department of History</span></td></tr><tr class="History—Victoria--BC Department-of-History Not-Virtual altrow" data-dcnode-id="3608" role="row"><td data-dcnode-id="3620"><span data-dcnode-id="3621" instrument_node="">History—Victoria &amp; BC</span></td><td class="more-info" data-dcnode-id="3615"><a data-dcnode-id="3618" href="#"><span data-dcnode-id="3619" instrument_node="">Cartoonists at Sea: British Columbia Ferries and Their Predecessors</span></a><div class="description" data-dcnode-id="3616" style="display: none;"><span data-dcnode-id="3617" instrument_node="">Transportation  between Vancouver Island and the Mainland has often amused local cartoonists. With cartoons going back to the early years of the 20th century and carrying through to today, this presentation examines the political issues around ferries as well as imaginative suggestions for travel and perennial complaints about the service.</span></div></td><td data-dcnode-id="3613"><span data-dcnode-id="3614" instrument_node="">Roy, Dr. Patricia</span></td><td data-dcnode-id="3611"><span data-dcnode-id="3612" instrument_node="">Professor Emerita</span></td><td data-dcnode-id="3609"><span data-dcnode-id="3610" instrument_node="">Department of History</span></td></tr><tr class="History—Victoria--BC Department-of-History Not-Virtual" data-dcnode-id="3594" role="row"><td data-dcnode-id="3606"><span data-dcnode-id="3607" instrument_node="">History—Victoria &amp; BC</span></td><td class="more-info" data-dcnode-id="3601"><a data-dcnode-id="3604" href="#"><span data-dcnode-id="3605" instrument_node="">Fannin and Fauna: The Early Days of the Provincial Museum </span></a><div class="description" data-dcnode-id="3602" style="display: none;"><span data-dcnode-id="3603" instrument_node="">John Fannin was the curator of the Provincial Museum from its founding in 1886 until his retirement in 1904. This illustrated account is a story of wilderness adventures, the collection of natural history specimens, and the establishment of the  Museum as a tourist attraction.</span></div></td><td data-dcnode-id="3599"><span data-dcnode-id="3600" instrument_node="">Roy, Dr. Patricia</span></td><td data-dcnode-id="3597"><span data-dcnode-id="3598" instrument_node="">Professor Emerita</span></td><td data-dcnode-id="3595"><span data-dcnode-id="3596" instrument_node="">Department of History</span></td></tr><tr class="History—Victoria--BC Department-of-History S Not-Virtual altrow" data-dcnode-id="3580" role="row"><td data-dcnode-id="3592"><span data-dcnode-id="3593" instrument_node="">History—Victoria &amp; BC</span></td><td class="more-info" data-dcnode-id="3587"><a data-dcnode-id="3590" href="#"><span data-dcnode-id="3591" instrument_node="">A Humorous History of British Columbia's Highways (S)</span></a><div class="description" data-dcnode-id="3588" style="display: none;"><span data-dcnode-id="3589" instrument_node="">Transportation has been a key to the development of BC. Using cartoons from  the early 20th century to the present, this talk is a light-hearted approach to the history of the province's highways and the politics around them.</span></div></td><td data-dcnode-id="3585"><span data-dcnode-id="3586" instrument_node="">Roy, Dr. Patricia</span></td><td data-dcnode-id="3583"><span data-dcnode-id="3584" instrument_node="">Professor Emerita</span></td><td data-dcnode-id="3581"><span data-dcnode-id="3582" instrument_node="">Department of History</span></td></tr><tr class="Languages--Linguistics Department-of-French S Virtual" data-dcnode-id="3566" role="row"><td data-dcnode-id="3578"><span data-dcnode-id="3579" instrument_node="">Languages &amp; Linguistics</span></td><td class="more-info" data-dcnode-id="3573"><a data-dcnode-id="3576" href="#"><span data-dcnode-id="3577" instrument_node="">Discovering Varieties of French in Canada: Pronunciations, Words and Grammatical Features (in English or French) (S) NEW ◊</span></a><div class="description" data-dcnode-id="3574" style="display: none;"><span data-dcnode-id="3575" instrument_node="">A survey of Francophone communities in Canada (Acadian, Québécois, Franco-Ontarian, Fransaskois, etc.), highlighting key social, historical, and cultural aspects. This talk will also introduce pronunciations, words, and grammatical characteristics of different French vernaculars in Canada and the attitudes linked to them-some features having been stigmatized, others being seen as valuable. </span></div></td><td data-dcnode-id="3571"><span data-dcnode-id="3572" instrument_node="">Léger, Dr. Catherine</span></td><td data-dcnode-id="3569"><span data-dcnode-id="3570" instrument_node="">Associate Professor</span></td><td data-dcnode-id="3567"><span data-dcnode-id="3568" instrument_node="">Department of French</span></td></tr><tr class="Languages--Linguistics Department-of-French S Virtual altrow" data-dcnode-id="3552" role="row"><td data-dcnode-id="3564"><span data-dcnode-id="3565" instrument_node="">Languages &amp; Linguistics</span></td><td class="more-info" data-dcnode-id="3559"><a data-dcnode-id="3562" href="#"><span data-dcnode-id="3563" instrument_node="">Some Popular Myths about Language Debunked (in English or French) (S) NEW ◊</span></a><div class="description" data-dcnode-id="3560" style="display: none;"><span data-dcnode-id="3561" instrument_node="">There is a wide array of misconceptions about language. We can often hear in everyday conversations as well as in the media statements such as “some languages do not have grammar”, “some languages are harder than others to learn”, … which are simply false. Let’s set the record straight.</span></div></td><td data-dcnode-id="3557"><span data-dcnode-id="3558" instrument_node="">Léger, Dr. Catherine</span></td><td data-dcnode-id="3555"><span data-dcnode-id="3556" instrument_node="">Associate Professor</span></td><td data-dcnode-id="3553"><span data-dcnode-id="3554" instrument_node="">Department of French</span></td></tr><tr class="Languages--Linguistics Department-of-Linguistics Virtual" data-dcnode-id="3538" role="row"><td data-dcnode-id="3550"><span data-dcnode-id="3551" instrument_node="">Languages &amp; Linguistics</span></td><td class="more-info" data-dcnode-id="3545"><a data-dcnode-id="3548" href="#"><span data-dcnode-id="3549" instrument_node="">Research-informed&nbsp;Strategies for Supporting Language Learners with Refugee Experience NEW ◊</span></a><div class="description" data-dcnode-id="3546" style="display: none;"><span data-dcnode-id="3547" instrument_node="">This session explores&nbsp;non-linguistic and linguistic issues, and discusses the pedagogical implications&nbsp;associated with supporting Syrian learners with refugee experience. The session&nbsp;draws on the most up-to-date&nbsp;research in the Canadian context as an example that&nbsp;may offer applicable strategies for supporting learners with a refugee&nbsp;background.&nbsp;</span></div></td><td data-dcnode-id="3543"><span data-dcnode-id="3544" instrument_node="">Huang, Dr. Li-Shih</span></td><td data-dcnode-id="3541"><span data-dcnode-id="3542" instrument_node="">Associate Professor</span></td><td data-dcnode-id="3539"><span data-dcnode-id="3540" instrument_node="">Department of Linguistics</span></td></tr><tr class="Languages--Linguistics Department-of-Linguistics M S Virtual altrow" data-dcnode-id="3524" role="row"><td data-dcnode-id="3536"><span data-dcnode-id="3537" instrument_node="">Languages &amp; Linguistics</span></td><td class="more-info" data-dcnode-id="3531"><a data-dcnode-id="3534" href="#"><span data-dcnode-id="3535" instrument_node="">Using Technology to Assist in Learning Pronunciation (in English or French) (M S) ◊</span></a><div class="description" data-dcnode-id="3532" style="display: none;"><span data-dcnode-id="3533" instrument_node="">In this interactive presentation, I introduce different speech visualization tools for learning pronunciation, including ultrasound imaging for seeing the tongue articulate sounds in real time, and Praat speech analysis software for "seeing" the acoustic signal associated with speech.</span></div></td><td data-dcnode-id="3529"><span data-dcnode-id="3530" instrument_node="">Bird, Dr. Sonya</span></td><td data-dcnode-id="3527"><span data-dcnode-id="3528" instrument_node="">Associate Professor</span></td><td data-dcnode-id="3525"><span data-dcnode-id="3526" instrument_node="">Department of Linguistics</span></td></tr><tr class="Languages--Linguistics Department-of-Linguistics M S Virtual" data-dcnode-id="3510" role="row"><td data-dcnode-id="3522"><span data-dcnode-id="3523" instrument_node="">Languages &amp; Linguistics</span></td><td class="more-info" data-dcnode-id="3517"><a data-dcnode-id="3520" href="#"><span data-dcnode-id="3521" instrument_node="">The Sounds of Coast Salish Languages (in English or French) (M S) ◊</span></a><div class="description" data-dcnode-id="3518" style="display: none;"><span data-dcnode-id="3519" instrument_node="">In this presentation, I introduce the sounds that are found in the Coast Salish languages spoken in these territories, including ones in local words like PKOLS (Mount Douglas) and sxǂeǂxǂǂǂ tǂǂǂxǂ (the new James Bay library branch). I describe how they are pronounced and (depending on interest) lead an interactive session on learning to pronounce some key words (as a sound expert, not as a mother-tongue speaker). I also spend some time discussing the role of authentic pronunciation in the context of Salish language revitalization. </span></div></td><td data-dcnode-id="3515"><span data-dcnode-id="3516" instrument_node="">Bird, Dr. Sonya</span></td><td data-dcnode-id="3513"><span data-dcnode-id="3514" instrument_node="">Associate Professor</span></td><td data-dcnode-id="3511"><span data-dcnode-id="3512" instrument_node="">Department of Linguistics</span></td></tr><tr class="Languages--Linguistics Department-of-French M S Virtual altrow" data-dcnode-id="3496" role="row"><td data-dcnode-id="3508"><span data-dcnode-id="3509" instrument_node="">Languages &amp; Linguistics</span></td><td class="more-info" data-dcnode-id="3503"><a data-dcnode-id="3506" href="#"><span data-dcnode-id="3507" instrument_node="">Learning Languages in the Cloud: Using Social Media to Engage and Communicate in Another Language (in English or French) (M S) NEW ◊</span></a><div class="description" data-dcnode-id="3504" style="display: none;"><span data-dcnode-id="3505" instrument_node="">Language learning in our time can be supported and facilitated by integrating  social media tools. These tools can enhance the way language learners communicate in their new language and can motivate them by providing authentic places of engaging with speakers of the language. In this talk we will focus on strategies for learners and strategies for language teachers who would want to add social media technologies to their classes.</span></div></td><td data-dcnode-id="3501"><span data-dcnode-id="3502" instrument_node="">Caws, Dr. Catherine</span></td><td data-dcnode-id="3499"><span data-dcnode-id="3500" instrument_node="">Professor</span></td><td data-dcnode-id="3497"><span data-dcnode-id="3498" instrument_node="">Department of French</span></td></tr><tr class="Languages--Linguistics Department-of-Linguistics M S Virtual" data-dcnode-id="3482" role="row"><td data-dcnode-id="3494"><span data-dcnode-id="3495" instrument_node="">Languages &amp; Linguistics</span></td><td class="more-info" data-dcnode-id="3489"><a data-dcnode-id="3492" href="#"><span data-dcnode-id="3493" instrument_node="">The Evolution of Human Language (M S) ◊</span></a><div class="description" data-dcnode-id="3490" style="display: none;"><span data-dcnode-id="3491" instrument_node="">Language makes us human. Why did it evolve in our species but not others? Adaptation or mutation? From genomics to fossil remains, explore the linguistics of this most human mystery.</span></div></td><td data-dcnode-id="3487"><span data-dcnode-id="3488" instrument_node="">Archibald, Dr. John</span></td><td data-dcnode-id="3485"><span data-dcnode-id="3486" instrument_node="">Professor</span></td><td data-dcnode-id="3483"><span data-dcnode-id="3484" instrument_node="">Department of Linguistics</span></td></tr><tr class="Languages--Linguistics Department-of-Linguistics S Virtual altrow" data-dcnode-id="3468" role="row"><td data-dcnode-id="3480"><span data-dcnode-id="3481" instrument_node="">Languages &amp; Linguistics</span></td><td class="more-info" data-dcnode-id="3475"><a data-dcnode-id="3478" href="#"><span data-dcnode-id="3479" instrument_node="">The Edge of Innovation: Language Change is Constant (S) ◊</span></a><div class="description" data-dcnode-id="3476" style="display: none;"><span data-dcnode-id="3477" instrument_node="">Living languages are in a constant state of change. This talk reviews common myths on the language of youth and discusses the critical role they play in the ongoing evolution of individual languages, focusing in particular on English.</span></div></td><td data-dcnode-id="3473"><span data-dcnode-id="3474" instrument_node="">D’Arcy, Dr. Alexandra</span></td><td data-dcnode-id="3471"><span data-dcnode-id="3472" instrument_node="">Professor &amp; Associate Dean Research</span></td><td data-dcnode-id="3469"><span data-dcnode-id="3470" instrument_node="">Department of Linguistics</span></td></tr><tr class="Languages--Linguistics Department-of-Linguistics S Not-Virtual" data-dcnode-id="3455" role="row"><td data-dcnode-id="3466"><span data-dcnode-id="3467" instrument_node="">Languages &amp; Linguistics</span></td><td class="more-info" data-dcnode-id="3462"><a data-dcnode-id="3464" href="#"><span data-dcnode-id="3465" instrument_node="">Laryngeal Function in Voice Production&nbsp;(S)</span></a><div class="description" data-dcnode-id="3463" style="display: none;"></div></td><td data-dcnode-id="3460"><span data-dcnode-id="3461" instrument_node="">Esling, Dr. John H.</span></td><td data-dcnode-id="3458"><span data-dcnode-id="3459" instrument_node="">Professor Emeritus</span></td><td data-dcnode-id="3456"><span data-dcnode-id="3457" instrument_node="">Department of Linguistics</span></td></tr><tr class="Languages--Linguistics Department-of-Linguistics S Not-Virtual altrow" data-dcnode-id="3442" role="row"><td data-dcnode-id="3453"><span data-dcnode-id="3454" instrument_node="">Languages &amp; Linguistics</span></td><td class="more-info" data-dcnode-id="3449"><a data-dcnode-id="3451" href="#"><span data-dcnode-id="3452" instrument_node="">Accents, Dialects and Voice Qualities (S)</span></a><div class="description" data-dcnode-id="3450" style="display: none;"></div></td><td data-dcnode-id="3447"><span data-dcnode-id="3448" instrument_node="">Esling, Dr. John H.</span></td><td data-dcnode-id="3445"><span data-dcnode-id="3446" instrument_node="">Professor Emeritus</span></td><td data-dcnode-id="3443"><span data-dcnode-id=
