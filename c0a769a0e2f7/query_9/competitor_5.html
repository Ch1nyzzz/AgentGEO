ent_node="">K-12</span></label><select class="filter-select" data-dcnode-id="8104" id="k-12" name="k-12"><option data-dcnode-id="8111" data-filter="all">All</option><option data-dcnode-id="8109" data-filter="E">Elementary</option><option data-dcnode-id="8107" data-filter="M">Middle school</option><option data-dcnode-id="8105" data-filter="S">High school</option></select></div><div class="row" data-dcnode-id="8093"><label data-dcnode-id="8101"><span data-dcnode-id="8102" instrument_node="">Virtual</span></label><select class="filter-select" data-dcnode-id="8094" id="virtual" name="virtual"><option data-dcnode-id="8099" data-filter="all">All</option><option data-dcnode-id="8097" data-filter="Virtual">Virtual Only</option><option data-dcnode-id="8095" data-filter="Not-Virtual">Not Virtual Only</option></select></div><div class="row" data-dcnode-id="8089"><label data-dcnode-id="8091" for="filter-keyword-search"><span data-dcnode-id="8092" instrument_node="">Keyword search</span></label><input class="" data-dcnode-id="8090" id="filter-keyword-search" max-length="30" placeholder="Enter keyword to find in list" type="search" value=""></div></fieldset></form><table class="tablesorter filter-table tablesorter-default" data-dcnode-id="346" id="filter-items" role="grid" style="table-layout: fixed"><thead data-dcnode-id="8070"><tr class="tablesorter-headerRow" data-dcnode-id="8071" role="row"><th aria-controls="filter-items" aria-disabled="false" aria-label="Area: Ascending sort applied, activate to apply a descending sort" aria-sort="ascending" class="header tablesorter-header tablesorter-headerAsc" data-column="0" data-dcnode-id="8084" role="columnheader" scope="col" style="user-select: none;" tabindex="0" unselectable="on"><div class="tablesorter-header-inner" data-dcnode-id="8085"><span data-dcnode-id="8086" instrument_node="">Area</span></div></th><th aria-controls="filter-items" aria-disabled="false" aria-label="Topic: No sort applied, activate to apply an ascending sort" aria-sort="none" class="header tablesorter-header tablesorter-headerUnSorted" data-column="1" data-dcnode-id="8081" role="columnheader" scope="col" style="user-select: none;" tabindex="0" unselectable="on"><div class="tablesorter-header-inner" data-dcnode-id="8082"><span data-dcnode-id="8083" instrument_node="">Topic</span></div></th><th aria-controls="filter-items" aria-disabled="false" aria-label="Presenter: No sort applied, activate to apply an ascending sort" aria-sort="none" class="header tablesorter-header tablesorter-headerUnSorted" data-column="2" data-dcnode-id="8078" role="columnheader" scope="col" style="user-select: none;" tabindex="0" unselectable="on"><div class="tablesorter-header-inner" data-dcnode-id="8079"><span data-dcnode-id="8080" instrument_node="">Presenter</span></div></th><th aria-controls="filter-items" aria-disabled="false" aria-label="Role: No sort applied, activate to apply an ascending sort" aria-sort="none" class="header tablesorter-header tablesorter-headerUnSorted" data-column="3" data-dcnode-id="8075" role="columnheader" scope="col" style="user-select: none;" tabindex="0" unselectable="on"><div class="tablesorter-header-inner" data-dcnode-id="8076"><span data-dcnode-id="8077" instrument_node="">Role</span></div></th><th aria-controls="filter-items" aria-disabled="false" aria-label="Department: No sort applied, activate to apply an ascending sort" aria-sort="none" class="header tablesorter-header tablesorter-headerUnSorted" data-column="4" data-dcnode-id="8072" role="columnheader" scope="col" style="user-select: none;" tabindex="0" unselectable="on"><div class="tablesorter-header-inner" data-dcnode-id="8073"><span data-dcnode-id="8074" instrument_node="">Department</span></div></th></tr></thead><tbody aria-live="polite" aria-relevant="all" data-dcnode-id="347"><tr class="Animal--Plants School-of-Environmental-Studies M S Virtual" data-dcnode-id="8056" role="row"><td data-dcnode-id="8068"><span data-dcnode-id="8069" instrument_node="">Animal &amp; Plants</span></td><td class="more-info" data-dcnode-id="8063"><a data-dcnode-id="8066" href="#"><span data-dcnode-id="8067" instrument_node="">Butterflies of Southern Vancouver Island ǂ (M S) (Jan-April) ◊</span></a><div class="description" data-dcnode-id="8064" style="display: none;"><span data-dcnode-id="8065" instrument_node="">This presentation will discuss: 1) butterfly diversity on Vancouver Island and BC, 2) butterfly morphology, life cycle, and adaptations 3) habitat and food plants requirements, 4) current threats to butterflies, 5) butterfly gardening and ecological restoration of butterfly meadows, 6) opportunities for citizen science and butterfly conservation. I will provide pictures and examples from a real case study which examined the habitat restoration of a local and critically imperilled butterfly species (the Vancouver Island Ringlet). Although this lecture is better suited for an older audience, I can also adapt it and make it engaging for younger students (middle school and high school).</span></div></td><td data-dcnode-id="8061"><span data-dcnode-id="8062" instrument_node="">Voicescu, Ms. Sonia</span></td><td data-dcnode-id="8059"><span data-dcnode-id="8060" instrument_node="">Graduate Student</span></td><td data-dcnode-id="8057"><span data-dcnode-id="8058" instrument_node="">School of Environmental Studies</span></td></tr><tr class="Business--Economics Department-of-Sociology Virtual altrow" data-dcnode-id="8042" role="row"><td data-dcnode-id="8054"><span data-dcnode-id="8055" instrument_node="">Business &amp; Economics</span></td><td class="more-info" data-dcnode-id="8049"><a data-dcnode-id="8052" href="#"><span data-dcnode-id="8053" instrument_node="">Canada and the US in the Wake of the Great Recession ◊</span></a><div class="description" data-dcnode-id="8050" style="display: none;"><span data-dcnode-id="8051" instrument_node="">Comparative research shows differences in Canada and the US over life courses as the Great Recession of 2008 affected-and still affects-individuals, societies and economies.</span></div></td><td data-dcnode-id="8047"><span data-dcnode-id="8048" instrument_node="">McDaniel, Prof. Susan A.</span></td><td data-dcnode-id="8045"><span data-dcnode-id="8046" instrument_node="">Adjunct Professor</span></td><td data-dcnode-id="8043"><span data-dcnode-id="8044" instrument_node="">Department of Sociology</span></td></tr><tr class="Business--Economics Department-of-Economics M S Virtual" data-dcnode-id="8028" role="row"><td data-dcnode-id="8040"><span data-dcnode-id="8041" instrument_node="">Business &amp; Economics</span></td><td class="more-info" data-dcnode-id="8035"><a data-dcnode-id="8038" href="#"><span data-dcnode-id="8039" instrument_node="">Illuminating Indigenous Economic Development (M S) ◊</span></a><div class="description" data-dcnode-id="8036" style="display: none;"><span data-dcnode-id="8037" instrument_node="">In this talk, I discuss Indigenous economic development over time and why most of our conventional estimates have been incorrect, excluding large numbers of Indigenous communities.</span></div></td><td data-dcnode-id="8033"><span data-dcnode-id="8034" instrument_node="">Gillezeau, Dr. Rob</span></td><td data-dcnode-id="8031"><span data-dcnode-id="8032" instrument_node="">Assistant Professor</span></td><td data-dcnode-id="8029"><span data-dcnode-id="8030" instrument_node="">Department of Economics</span></td></tr><tr class="Business--Economics Peter-B-Gustavson-School-of-Business S Virtual altrow" data-dcnode-id="8014" role="row"><td data-dcnode-id="8026"><span data-dcnode-id="8027" instrument_node="">Business &amp; Economics</span></td><td class="more-info" data-dcnode-id="8021"><a data-dcnode-id="8024" href="#"><span data-dcnode-id="8025" instrument_node="">Organizational Culture Management: How Organizations Can Create, Maintain, Change and Diagnose their Organizations' Cultures (S) ◊</span></a><div class="description" data-dcnode-id="8022" style="display: none;"><span data-dcnode-id="8023" instrument_node="">There is a widespread interest in managing organizational cultures. This presentation introduces participants to the the essential dynamics of organizational culture, discussing how organizational cultures are (and can be) created, maintained, changed and diagnosed. Its aim is to equip leaders to be able to influence these dynamics to drive change within their organizations.</span></div></td><td data-dcnode-id="8019"><span data-dcnode-id="8020" instrument_node="">Pek, Dr. Simon</span></td><td data-dcnode-id="8017"><span data-dcnode-id="8018" instrument_node="">Assistant Professor</span></td><td data-dcnode-id="8015"><span data-dcnode-id="8016" instrument_node="">Peter B. Gustavson School of Business</span></td></tr><tr class="Business--Economics Peter-B-Gustavson-School-of-Business S Virtual" data-dcnode-id="8000" role="row"><td data-dcnode-id="8012"><span data-dcnode-id="8013" instrument_node="">Business &amp; Economics</span></td><td class="more-info" data-dcnode-id="8007"><a data-dcnode-id="8010" href="#"><span data-dcnode-id="8011" instrument_node="">Intercultural Competence for Work and Life (in English or Spanish) (S) ◊</span></a><div class="description" data-dcnode-id="8008" style="display: none;"><span data-dcnode-id="8009" instrument_node="">We live and work in a world full of people with whom we sometimes feel we share little (in terms of language, background, culture, religion, etc.). This might be perceived as an insurmountable challenge for many of us. This session explores a variety of ways we can start interacting more effectively with others and, along the way, create new relationships that can transform each of us and build community connections.</span></div></td><td data-dcnode-id="8005"><span data-dcnode-id="8006" instrument_node="">Flores, Dr. Ricardo</span></td><td data-dcnode-id="8003"><span data-dcnode-id="8004" instrument_node="">Assistant Professor</span></td><td data-dcnode-id="8001"><span data-dcnode-id="8002" instrument_node="">Peter B. Gustavson School of Business</span></td></tr><tr class="Business--Economics Peter-B-Gustavson-School-of-Business S Virtual altrow" data-dcnode-id="7986" role="row"><td data-dcnode-id="7998"><span data-dcnode-id="7999" instrument_node="">Business &amp; Economics</span></td><td class="more-info" data-dcnode-id="7993"><a data-dcnode-id="7996" href="#"><span data-dcnode-id="7997" instrument_node="">Institutional Leadership: Promoting Your Values and Improving Your Community (in English or Spanish) (S) ◊</span></a><div class="description" data-dcnode-id="7994" style="display: none;"><span data-dcnode-id="7995" instrument_node="">Leaders are expected to play multiple roles (and excel at all of them). Most leadership training focuses on technical aspects of leadership (motivation, decision-making, and communication). More advanced leadership discussions bring to the table the importance of reaching the souls of followers and colleagues. These approaches prioritize the “plumber” and “poet” roles required from many leaders. However, this is not the end of the story. This session highlights the need for another important role that leaders need to play: that of promoter and protector of community values and ideals. Participants in this session will gain new insights on the challenges and potentialities afforded by this type of approach to leadership.</span></div></td><td data-dcnode-id="7991"><span data-dcnode-id="7992" instrument_node="">Flores, Dr. Ricardo</span></td><td data-dcnode-id="7989"><span data-dcnode-id="7990" instrument_node="">Assistant Professor</span></td><td data-dcnode-id="7987"><span data-dcnode-id="7988" instrument_node="">Peter B. Gustavson School of Business</span></td></tr><tr class="Business--Economics Peter-B-Gustavson-School-of-Business S Virtual" data-dcnode-id="7972" role="row"><td data-dcnode-id="7984"><span data-dcnode-id="7985" instrument_node="">Business &amp; Economics</span></td><td class="more-info" data-dcnode-id="7979"><a data-dcnode-id="7982" href="#"><span data-dcnode-id="7983" instrument_node="">Globalization and You (in English or Spanish) (S) ◊</span></a><div class="description" data-dcnode-id="7980" style="display: none;"><span data-dcnode-id="7981" instrument_node="">Most of us have heard that we live in a global village, that the world is (metaphorically) flat, or that we are living at the end of history. This session seeks to clarify how worldwide process that societies around the world have experienced in the last 50 years have evolved-and how they might continue to evolve in the years to come. More importantly, the session makes a concerted effort to look at how these world-changing processes relate to each of us-in our careers, and to our lives.</span></div></td><td data-dcnode-id="7977"><span data-dcnode-id="7978" instrument_node="">Flores, Dr. Ricardo</span></td><td data-dcnode-id="7975"><span data-dcnode-id="7976" instrument_node="">Assistant Professor</span></td><td data-dcnode-id="7973"><span data-dcnode-id="7974" instrument_node="">Peter B. Gustavson School of Business</span></td></tr><tr class="Business--Economics Department-of-Political-Science M S Virtual altrow" data-dcnode-id="7958" role="row"><td data-dcnode-id="7970"><span data-dcnode-id="7971" instrument_node="">Business &amp; Economics</span></td><td class="more-info" data-dcnode-id="7965"><a data-dcnode-id="7968" href="#"><span data-dcnode-id="7969" instrument_node="">The Dirty Side of the Clothing Industry: Is Fast Fashion Sustainable? (M S) NEW ◊ </span></a><div class="description" data-dcnode-id="7966" style="display: none;"><span data-dcnode-id="7967" instrument_node="">My work explores the politics of the contemporary clothing industry to investigate the complexities of one of the largest and most global industries. I trace both historic and contemporary exploitation in the industry with an emphasis on sweatshops, and how work, production and consumption have been increasingly driven by large retailers and buyers. Depending on the presentation, I examine the environmental and workplace problems associated with the industry. </span></div></td><td data-dcnode-id="7963"><span data-dcnode-id="7964" instrument_node="">Clarke, Dr. Marlea</span></td><td data-dcnode-id="7961"><span data-dcnode-id="7962" instrument_node="">Associate Professor</span></td><td data-dcnode-id="7959"><span data-dcnode-id="7960" instrument_node="">Department of Political Science</span></td></tr><tr class="Business--Economics Peter-B-Gustavson-School-of-Business M S Virtual" data-dcnode-id="7944" role="row"><td data-dcnode-id="7956"><span data-dcnode-id="7957" instrument_node="">Business &amp; Economics</span></td><td class="more-info" data-dcnode-id="7951"><a data-dcnode-id="7954" href="#"><span data-dcnode-id="7955" instrument_node="">Sustainable and Resilient Supply Chains with Applications in Health and Agri-food (in English or French) (M S) NEW ◊</span></a><div class="description" data-dcnode-id="7952" style="display: none;"><span data-dcnode-id="7953" instrument_node="">Globalization, the advancement of transportation modes, rapid development of communication and information technologies, and the advent of Industry 4.0 have fostered fine slicing and stretching of production networks to multiple production-actors across multiple regions of the world. Supply chains are no longer straightforward chains but often complex networks with many actors involved in the production, processing, transportation, retailing and waste management through products’ lifecycles. The COVID-19 pandemic has revealed that all countries and most businesses are hugely reliant on production and supplies from around the world. Moreover, over the recent years an increasing number of businesses-from local, small ones to large multinationals-have moved to greater sustainability and social responsibility. As companies seek to strengthen their resilience and robustness, these companies are forced to rethink their supply chain operations and decision-making along co-production networks.</span></div></td><td data-dcnode-id="7949"><span data-dcnode-id="7950" instrument_node="">Guitouni, Prof. Adel</span></td><td data-dcnode-id="7947"><span data-dcnode-id="7948" instrument_node="">Associate Professor</span></td><td data-dcnode-id="7945"><span data-dcnode-id="7946" instrument_node="">Peter B. Gustavson School of Business</span></td></tr><tr class="Business--Economics Peter-B-Gustavson-School-of-Business M S Virtual altrow" data-dcnode-id="7930" role="row"><td data-dcnode-id="7942"><span data-dcnode-id="7943" instrument_node="">Business &amp; Economics</span></td><td class="more-info" data-dcnode-id="7937"><a data-dcnode-id="7940" href="#"><span data-dcnode-id="7941" instrument_node="">Responsible Decision-making (in English or French) (M S) NEW ◊</span></a><div class="description" data-dcnode-id="7938" style="display: none;"><span data-dcnode-id="7939" instrument_node="">I intend to explain distributed and responsible decision- making in distributed settings such as sustainable and global supply chains. In particular, I will use healthcare and agrifood supply chains in BC to illustrate the different concepts.</span></div></td><td data-dcnode-id="7935"><span data-dcnode-id="7936" instrument_node="">Guitouni, Prof. Adel</span></td><td data-dcnode-id="7933"><span data-dcnode-id="7934" instrument_node="">Associate Professor</span></td><td data-dcnode-id="7931"><span data-dcnode-id="7932" instrument_node="">Peter B. Gustavson School of Business</span></td></tr><tr class="Business--Economics Peter-B-Gustavson-School-of-Business S Virtual" data-dcnode-id="7916" role="row"><td data-dcnode-id="7928"><span data-dcnode-id="7929" instrument_node="">Business &amp; Economics</span></td><td class="more-info" data-dcnode-id="7923"><a data-dcnode-id="7926" href="#"><span data-dcnode-id="7927" instrument_node="">Cross-cultural Management: Managing Diversity (in English or Korean) (S) ◊</span></a><div class="description" data-dcnode-id="7924" style="display: none;"><span data-dcnode-id="7925" instrument_node="">This presentation discusses how to manage cultural diversity: culture clash, cross-cultural communication and negotiation, culture shock and living and working overseas.</span></div></td><td data-dcnode-id="7921"><span data-dcnode-id="7922" instrument_node="">Nam, Dr. Sang H.</span></td><td data-dcnode-id="7919"><span data-dcnode-id="7920" instrument_node="">Associate Professor</span></td><td data-dcnode-id="7917"><span data-dcnode-id="7918" instrument_node="">Peter B. Gustavson School of Business</span></td></tr><tr class="Business--Economics Peter-B-Gustavson-School-of-Business S Virtual altrow" data-dcnode-id="7902" role="row"><td data-dcnode-id="7914"><span data-dcnode-id="7915" instrument_node="">Business &amp; Economics</span></td><td class="more-info" data-dcnode-id="7909"><a data-dcnode-id="7912" href="#"><span data-dcnode-id="7913" instrument_node="">Organizational Behaviour: How to Manage People (in English or Korean) (S) ◊</span></a><div class="description" data-dcnode-id="7910" style="display: none;"><span data-dcnode-id="7911" instrument_node="">This presentation discusses how to manage people effectively within an organization: motivation, leadership, teamwork, and conflict management.</span></div></td><td data-dcnode-id="7907"><span data-dcnode-id="7908" instrument_node="">Nam, Dr. Sang H.</span></td><td data-dcnode-id="7905"><span data-dcnode-id="7906" instrument_node="">Associate Professor</span></td><td data-dcnode-id="7903"><span data-dcnode-id="7904" instrument_node="">Peter B. Gustavson School of Business</span></td></tr><tr class="Business--Economics School-of-Public-Administration Virtual" data-dcnode-id="7888" role="row"><td data-dcnode-id="7900"><span data-dcnode-id="7901" instrument_node="">Business &amp; Economics</span></td><td class="more-info" data-dcnode-id="7895"><a data-dcnode-id="7898" href="#"><span data-dcnode-id="7899" instrument_node="">Rural Economic Development: Opportunities, Challenges and Policy Implications NEW ◊</span></a><div class="description" data-dcnode-id="7896" style="display: none;"><span data-dcnode-id="7897" instrument_node="">My research area is focused on rural economic development, the opportunities and challenges faced by rural and remote businesses and communities, and the role that government policy plays to support this development.</span></div></td><td data-dcnode-id="7893"><span data-dcnode-id="7894" instrument_node="">Siemens, Dr. Lynne</span></td><td data-dcnode-id="7891"><span data-dcnode-id="7892" instrument_node="">Associate Professor</span></td><td data-dcnode-id="7889"><span data-dcnode-id="7890" instrument_node="">School of Public Administration</span></td></tr><tr class="Business--Economics School-of-Public-Administration Virtual altrow" data-dcnode-id="7874" role="row"><td data-dcnode-id="7886"><span data-dcnode-id="7887" instrument_node="">Business &amp; Economics</span></td><td class="more-info" data-dcnode-id="7881"><a data-dcnode-id="7884" href="#"><span data-dcnode-id="7885" instrument_node="">Rural Communities: Opportunities, Challenges and Government Policy ◊</span></a><div class="description" data-dcnode-id="7882" style="display: none;"><span data-dcnode-id="7883" instrument_node="">The presentation will examine the challenges associated with rural entrepreneurship in British Columbia, and explore government's policy response to encourage rural small business to survive and thrive.</span></div></td><td data-dcnode-id="7879"><span data-dcnode-id="7880" instrument_node="">Siemens, Dr. Lynne</span></td><td data-dcnode-id="7877"><span data-dcnode-id="7878" instrument_node="">Associate Professor</span></td><td data-dcnode-id="7875"><span data-dcnode-id="7876" instrument_node="">School of Public Administration</span></td></tr><tr class="Business--Economics Peter-B-Gustavson-School-of-Business Virtual" data-dcnode-id="7860" role="row"><td data-dcnode-id="7872"><span data-dcnode-id="7873" instrument_node="">Business &amp; Economics</span></td><td class="more-info" data-dcnode-id="7867"><a data-dcnode-id="7870" href="#"><span data-dcnode-id="7871" instrument_node="">Climate Finance: Integrating Climate Change into Investment Decisions (in English or French) NEW ◊</span></a><div class="description" data-dcnode-id="7868" style="display: none;"><span data-dcnode-id="7869" instrument_node="">Finance has a critical role in supporting the transition to a resilient, net-zero emissions future. Barriers to unlocking this potential include a lack of access to expertise, data and research tools for integrating climate change modelling into investment decisions. This research project will develop tools and frameworks for integrating climate change risk and opportunities into investment portfolios. </span></div></td><td data-dcnode-id="7865"><span data-dcnode-id="7866" instrument_node="">King, Dr. Michael</span></td><td data-dcnode-id="7863"><span data-dcnode-id="7864" instrument_node="">Associate Professor &amp; Lansdowne Chair in Finance</span></td><td data-dcnode-id="7861"><span data-dcnode-id="7862" instrument_node="">Peter B. Gustavson School of Business</span></td></tr><tr class="Business--Economics Department-of-Alumni--Development Virtual altrow" data-dcnode-id="7846" role="row"><td data-dcnode-id="7858"><span data-dcnode-id="7859" instrument_node="">Business &amp; Economics</span></td><td class="more-info" data-dcnode-id="7853"><a data-dcnode-id="7856" href="#"><span data-dcnode-id="7857" instrument_node="">Building Your Fundraising Toolkit ◊</span></a><div class="description" data-dcnode-id="7854" style="display: none;"><span data-dcnode-id="7855" instrument_node="">Whether you’re a professional fundraiser or a volunteer, this talk will provide an overview of the key components that should go into your philanthropic fundraising plan before you make your first ask-from the case for support through to stewardship procedures and evaluating your program.  </span></div></td><td data-dcnode-id="7851"><span data-dcnode-id="7852" instrument_node="">Hebb, Ms. Cheryl</span></td><td data-dcnode-id="7849"><span data-dcnode-id="7850" instrument_node="">Director of University Development</span></td><td data-dcnode-id="7847"><span data-dcnode-id="7848" instrument_node="">Department of Alumni &amp; Development</span></td></tr><tr class="Business--Economics Division-of-Continuing-Studies Virtual" data-dcnode-id="7832" role="row"><td data-dcnode-id="7844"><span data-dcnode-id="7845" instrument_node="">Business &amp; Economics</span></td><td class="more-info" data-dcnode-id="7839"><a data-dcnode-id="7842" href="#"><span data-dcnode-id="7843" instrument_node="">Goal-setting and Performance Management ◊</span></a><div class="description" data-dcnode-id="7840" style="display: none;"><span data-dcnode-id="7841" instrument_node="">This lecture/workshop is designed to help organizations integrate goal setting with leadership and management techniques to enhance the motivation and performance of their members.</span></div></td><td data-dcnode-id="7837"><span data-dcnode-id="7838" instrument_node="">Wikkramatileke, Dr. Rhordon</span></td><td data-dcnode-id="7835"><span data-dcnode-id="7836" instrument_node="">Instructor and Curriculum Developer</span></td><td data-dcnode-id="7833"><span data-dcnode-id="7834" instrument_node="">Division of Continuing Studies</span></td></tr><tr class="Business--Economics Division-of-Continuing-Studies Virtual altrow" data-dcnode-id="7818" role="row"><td data-dcnode-id="7830"><span data-dcnode-id="7831" instrument_node="">Business &amp; Economics</span></td><td class="more-info" data-dcnode-id="7825"><a data-dcnode-id="7828" href="#"><span data-dcnode-id="7829" instrument_node="">Professional Sales ◊</span></a><div class="description" data-dcnode-id="7826" style="display: none;"><span data-dcnode-id="7827" instrument_node="">This lecture/workshop discusses the competencies associated with professional sales in this day and age.</span></div></td><td data-dcnode-id="7823"><span data-dcnode-id="7824" instrument_node="">Wikkramatileke, Dr. Rhordon</span></td><td data-dcnode-id="7821"><span data-dcnode-id="7822" instrument_node="">Instructor and Curriculum Developer</span></td><td data-dcnode-id="7819"><span data-dcnode-id="7820" instrument_node="">Division of Continuing Studies</span></td></tr><tr class="Business--Economics Department-of-Anthropology S Not-Virtual" data-dcnode-id="7804" role="row"><td data-dcnode-id="7816"><span data-dcnode-id="7817" instrument_node="">Business &amp; Economics</span></td><td class="more-info" data-dcnode-id="7811"><a data-dcnode-id="7814" href="#"><span data-dcnode-id="7815" instrument_node="">The History and Mystery of Money (S) NEW</span></a><div class="description" data-dcnode-id="7812" style="display: none;"><span data-dcnode-id="7813" instrument_node="">We use money so frequently that without it, life seems almost unimaginable. Yet, we almost never stop to think about what money is or how it works. So how and why does it work? How is it possible to walk into a shop and exchange some shiny, stamped metal objects or coloured pieces of paper for a cup of coffee, or better yet, food? This talk will illuminate what money is, how it came to be, and how it might change in the future.</span></div></td><td data-dcnode-id="7809"><span data-dcnode-id="7810" instrument_node="">Rudnyckyj, Prof. Daromir</span></td><td data-dcnode-id="7807"><span data-dcnode-id="7808" instrument_node="">Professor</span></td><td data-dcnode-id="7805"><span data-dcnode-id="7806" instrument_node="">Department of Anthropology</span></td></tr><tr class="Business--Economics Peter-B-Gustavson-School-of-Business Virtual altrow" data-dcnode-id="7791" role="row"><td data-dcnode-id="7802"><span data-dcnode-id="7803" instrument_node="">Business &amp; Economics</span></td><td class="more-info" data-dcnode-id="7798"><a data-dcnode-id="7800" href="#"><span data-dcnode-id="7801" instrument_node="">Labour Relations in Canada ◊</span></a><div class="description" data-dcnode-id="7799" style="display: none;"></div></td><td data-dcnode-id="7796"><span data-dcnode-id="7797" instrument_node="">Thornicroft, Dr. Kenneth</span></td><td data-dcnode-id="7794"><span data-dcnode-id="7795" instrument_node="">Professor</span></td><td data-dcnode-id="7792"><span data-dcnode-id="7793" instrument_node="">Peter B. Gustavson School of Business</span></td></tr><tr class="Child--Teen-Development Indigenous-Education E M S Virtual" data-dcnode-id="7777" role="row"><td data-dcnode-id="7789"><span data-dcnode-id="7790" instrument_node="">Child &amp; Teen Development</span></td><td class="more-info" data-dcnode-id="7784"><a data-dcnode-id="7787" href="#"><span data-dcnode-id="7788" instrument_node="">Indigenous Literature for Young Readers (in English or Spanish) (E M S) ◊</span></a><div class="description" data-dcnode-id="7785" style="display: none;"><span data-dcnode-id="7786" instrument_node="">This presentation offers examples of resources that can be used with young readers to introduce them to Indigenous worldviews, spirituality, beliefs, and ways of being.</span></div></td><td data-dcnode-id="7782"><span data-dcnode-id="7783" instrument_node="">Rodriguez de France, Dr. Carmen</span></td><td data-dcnode-id="7780"><span data-dcnode-id="7781" instrument_node="">Assistant Professor</span></td><td data-dcnode-id="7778"><span data-dcnode-id="7779" instrument_node="">Indigenous Education</span></td></tr><tr class="Child--Teen-Development Department-of-Curriculum--Instruction E M S Virtual altrow" data-dcnode-id="7763" role="row"><td data-dcnode-id="7775"><span data-dcnode-id="7776" instrument_node="">Child &amp; Teen Development</span></td><td class="more-info" data-dcnode-id="7770"><a data-dcnode-id="7773" href="#"><span data-dcnode-id="7774" instrument_node="">The UN Convention on the Rights of the Child: Possibilities and Promise (E M S) ◊</span></a><div class="description" data-dcnode-id="7771" style="display: none;"><span data-dcnode-id="7772" instrument_node="">This session explores the power and potential of the UN Convention on the Rights of the Child for changing schooling.</span></div></td><td data-dcnode-id="7768"><span data-dcnode-id="7769" instrument_node="">Price, Dr. Jason M.C.</span></td><td data-dcnode-id="7766"><span data-dcnode-id="7767" instrument_node="">Associate Professor</span></td><td data-dcnode-id="7764"><span data-dcnode-id="7765" instrument_node="">Department of Curriculum &amp; Instruction</span></td></tr><tr class="Child--Teen-Development Department-of-Educational-Psychology--Leadership-Studies Virtual" data-dcnode-id="7749" role="row"><td data-dcnode-id="7761"><span data-dcnode-id="7762" instrument_node="">Child &amp; Teen Development</span></td><td class="more-info" data-dcnode-id="7756"><a data-dcnode-id="7759" href="#"><span data-dcnode-id="7760" instrument_node="">Promoting Healthy Living for Children through Self-regulation and Emotion Regulation ◊ </span></a><div class="description" data-dcnode-id="7757" style="display: none;"><span data-dcnode-id="7758" instrument_node="">“Father pleads for the arrest of uncontrollable son,” “Public pressure grows to try teenager as adult in brutal attack on senior,” “Child threatens father with knife.” These news headlines illustrate the increasing challenges faced by parents and educators in supporting the ability of children to self-regulate their emotions. What do parents and pre-school educators say? This presentation examines how 150 parents and 15 pre-school educators defined self-regulation and emotion regulation, explained how self-regulation and emotion regulation are acquired, and explored their roles as caregivers in this process. They also identified how self-regulation and emotion regulation in the pre-school years can support the transition from pre-school to the primary years.</span></div></td><td data-dcnode-id="7754"><span data-dcnode-id="7755" instrument_node="">Boyer, Dr. Wanda</span></td><td data-dcnode-id="7752"><span data-dcnode-id="7753" instrument_node="">Associate Professor</span></td><td data-dcnode-id="7750"><span data-dcnode-id="7751" instrument_node="">Department of Educational Psychology &amp; Leadership Studies</span></td></tr><tr class="Child--Teen-Development Department-of-Educational-Psychology--Leadership-Studies E M Not-Virtual altrow" data-dcnode-id="7735" role="row"><td data-dcnode-id="7747"><span data-dcnode-id="7748" instrument_node="">Child &amp; Teen Development</span></td><td class="more-info" data-dcnode-id="7742"><a data-dcnode-id="7745" href="#"><span data-dcnode-id="7746" instrument_node="">Childhood Stress (E M)</span></a><div class="description" data-dcnode-id="7743" style="display: none;"><span data-dcnode-id="7744" instrument_node="">This talk looks at types and sources of childhood stress and suggests ways that parents and teachers can help reduce this stress.</span></div></td><td data-dcnode-id="7740"><span data-dcnode-id="7741" instrument_node="">Dyson, Dr. Lily</span></td><td data-dcnode-id="7738"><span data-dcnode-id="7739" instrument_node="">Professor Emerita</span></td><td data-dcnode-id="7736"><span data-dcnode-id="7737" instrument_node="">Department of Educational Psychology &amp; Leadership Studies</span></td></tr><tr class="Child--Teen-Development Department-of-Educational-Psychology--Leadership-Studies E M Not-Virtual" data-dcnode-id="7721" role="row"><td data-dcnode-id="7733"><span data-dcnode-id="7734" instrument_node="">Child &amp; Teen Development</span></td><td class="more-info" data-dcnode-id="7728"><a data-dcnode-id="7731" href="#"><span data-dcnode-id="7732" instrument_node="">Parenting Young Children: Preschool and Early Elementary School Age (E M)</span></a><div class="description" data-dcnode-id="7729" style="display: none;"><span data-dcnode-id="7730" instrument_node="">This presentation talks about the needs of young children and how parents, teachers and child care professionals can help promote their social development.</span></div></td><td data-dcnode-id="7726"><span data-dcnode-id="7727" instrument_node="">Dyson, Dr. Lily</span></td><td data-dcnode-id="7724"><span data-dcnode-id="7725" instrument_node="">Professor Emerita</span></td><td data-dcnode-id="7722"><span data-dcnode-id="7723" instrument_node="">Department of Educational Psychology &amp; Leadership Studies</span></td></tr><tr class="Child--Teen-Development School-of-Exercise-Science-Physical--Health-Education E M S Virtual altrow" data-dcnode-id="7707" role="row"><td data-dcnode-id="7719"><span data-dcnode-id="7720" instrument_node="">Child &amp; Teen Development</span></td><td class="more-info" data-dcnode-id="7714"><a data-dcnode-id="7717" href="#"><span data-dcnode-id="7718" instrument_node="">Physical Literacy Powered by the Environment (E M S) ◊</span></a><div class="description" data-dcnode-id="7715" style="display: none;"><span data-dcnode-id="7716" instrument_node="">This presentation provides an overview of physical literacy and how the environment (both physical and social) can be used to intentionally invite children in to physically active play that develops their physical literacy.</span></div></td><td data-dcnode-id="7712"><span data-dcnode-id="7713" instrument_node="">Naylor, Dr. Patti-Jean</span></td><td data-dcnode-id="7710"><span data-dcnode-id="7711" instrument_node="">Professor Emerita</span></td><td data-dcnode-id="7708"><span data-dcnode-id="7709" instrument_node="">School of Exercise Science, Physical &amp; Health Education</span></td></tr><tr class="Computers-Engineering--Technology Department-of-Computer-Science Virtual" data-dcnode-id="7693" role="row"><td data-dcnode-id="7705"><span data-dcnode-id="7706" instrument_node="">Computers, Engineering &amp; Technology</span></td><td class="more-info" data-dcnode-id="7700"><a data-dcnode-id="7703" href="#"><span data-dcnode-id="7704" instrument_node="">Modelling Paradigms for Computer Animation ◊</span></a><div class="description" data-dcnode-id="7701" style="display: none;"><span data-dcnode-id="7702" instrument_node="">In computer graphics, implicit modelling is a way of representing objects using something akin to 3D contours. The applications to modern computer animation make this a very effective way of describing both smooth shapes and sharp edges. Contact between models is efficient to find facilitating deformations such as skinning for animation.</span></div></td><td data-dcnode-id="7698"><span data-dcnode-id="7699" instrument_node="">Wyvill, Prof. Brian</span></td><td data-dcnode-id="7696"><span data-dcnode-id="7697" instrument_node="">Adjunct Professor</span></td><td data-dcnode-id="7694"><span data-dcnode-id="7695" instrument_node="">Department of Computer Science</span></td></tr><tr class="Computers-Engineering--Technology Department-of-Computer-Science E M S Virtual altrow" data-dcnode-id="7679" role="row"><td data-dcnode-id="7691"><span data-dcnode-id="7692" instrument_node="">Computers, Engineering &amp; Technology</span></td><td class="more-info" data-dcnode-id="7686"><a data-dcnode-id="7689" href="#"><span data-dcnode-id="7690" instrument_node="">Why Did the Computer Do That? Explaining Software in a Probabilistic World (E M S) ◊</span></a><div class="description" data-dcnode-id="7687" style="display: none;"><span data-dcnode-id="7688" instrument_node="">I talk about the role software plays in every system that touches our lives. This covers social network software like Facebook, but also software that is making decisions about driving cars, prescribing medicine and recommending hires.</span></div></td><td data-dcnode-id="7684"><span data-dcnode-id="7685" instrument_node="">Ernst, Dr. Neil</span></td><td data-dcnode-id="7682"><span data-dcnode-id="7683" instrument_node="">Assistant Professor</span></td><td data-dcnode-id="7680"><span data-dcnode-id="7681" instrument_node="">Department of Computer Science</span></td></tr><tr class="Computers-Engineering--Technology Department-of-Computer-Science E M S Virtual" data-dcnode-id="7665" role="row"><td data-dcnode-id="7677"><span data-dcnode-id="7678" instrument_node="">Computers, Engineering &amp; Technology</span></td><td class="more-info" data-dcnode-id="7672"><a data-dcnode-id="7675" href="#"><span data-dcnode-id="7676" instrument_node="">Notebook-based Data Science with Jupyter Notebooks (E M S) ◊</span></a><div class="description" data-dcnode-id="7673" style="display: none;"><span data-dcnode-id="7674" instrument_node="">This presentation focuses on using modern lab notebooks to do data science and analysis, specifically using Jupyter notebooks. </span></div></td><td data-dcnode-id="7670"><span data-dcnode-id="7671" instrument_node="">Ernst, Dr. Neil</span></td><td data-dcnode-id="7668"><span data-dcnode-id="7669" instrument_node="">Assistant Professor</span></td><td data-dcnode-id="7666"><span data-dcnode-id="7667" instrument_node="">Department of Computer Science</span></td></tr><tr class="Computers-Engineering--Technology Department-of-Mechanical-Engineering M S Virtual altrow" data-dcnode-id="7651" role="row"><td data-dcnode-id="7663"><span data-dcnode-id="7664" instrument_node="">Computers, Engineering &amp; Technology</span></td><td class="more-info" data-dcnode-id="7658"><a data-dcnode-id="7661" href="#"><span data-dcnode-id="7662" instrument_node="">Gold Nanoparticles: Radiation Therapy Enhancers (M S) NEW ◊</span></a><div class="description" data-dcnode-id="7659" style="display: none;"><span data-dcnode-id="7660" instrument_node="">A science-driven look at how incredibly tiny gold particles can be used in the treatment of cancer.</span></div></td><td data-dcnode-id="7656"><span data-dcnode-id="7657" instrument_node="">Valente, Dr. Karolina Papera</span></td><td data-dcnode-id="7654"><span data-dcnode-id="7655" instrument_node="">Assistant Teaching Professor</span></td><td data-dcnode-id="7652"><span data-dcnode-id="7653" instrument_node="">Department of Mechanical Engineering</span></td></tr><tr class="Computers-Engineering--Technology Department-of-Electrical--Computer-Engineering M S Virtual" data-dcnode-id="7637" role="row"><td data-dcnode-id="7649"><span data-dcnode-id="7650" instrument_node="">Computers, Engineering &amp; Technology</span></td><td class="more-info" data-dcnode-id="7644"><a data-dcnode-id="7647" href="#"><span data-dcnode-id="7648" instrument_node="">Artificial-intelligence-based Electric Vehicle Motor Health Monitoring (in English or Tamil) (M S) ◊</span></a><div class="description" data-dcnode-id="7645" style="display: none;"><span data-dcnode-id="7646" instrument_node="">By attending this presentation, participants will be able to: (a) value the need for electric vehicle motor health monitoring, (b) appreciate the benefits of electric vehicle motor condition monitoring, (c) realize the challenges associated with real time motor health monitoring, and (d) learn about one specific technique that could be used for non-invasive condition monitoring.   </span></div></td><td data-dcnode-id="7642"><span data-dcnode-id="7643" instrument_node="">Chelvan, Dr. Ilamparithi T.</span></td><td data-dcnode-id="7640"><span data-dcnode-id="7641" instrument_node="">Assistant Teaching Professor </span></td><td data-dcnode-id="7638"><span data-dcnode-id="7639" instrument_node="">Department of Electrical &amp; Computer Engineering</span></td></tr><tr class="Computers-Engineering--Technology Department-of-Electrical--Computer-Engineering M S Virtual altrow" data-dcnode-id="7623" role="row"><td data-dcnode-id="7635"><span data-dcnode-id="7636" instrument_node="">Computers, Engineering &amp; Technology</span></td><td class="more-info" data-dcnode-id="7630"><a data-dcnode-id="7633" href="#"><span data-dcnode-id="7634" instrument_node="">Benefits of Distributed Electrical Generation for the Community (in English or Tamil) (M S) ◊</span></a><div class="description" data-dcnode-id="7631" style="display: none;"><span data-dcnode-id="7632" instrument_node="">By attending this presentation, participants will: (a) learn what distributed generation is, (b) understand how distributed generation works, (c) be aware of the benefits of distributed generation, and (d) learn about ways to be a part of distributed generation.</span></div></td><td data-dcnode-id="7628"><span data-dcnode-id="7629" instrument_node="">Chelvan, Dr. Ilamparithi T. </span></td><td data-dcnode-id="7626"><span data-dcnode-id="7627" instrument_node="">Assistant Teaching Professor</span></td><td data-dcnode-id="7624"><span data-dcnode-id="7625" instrument_node="">Department of Electrical &amp; Computer Engineering</span></td></tr><tr class="Computers-Engineering--Technology Department-of-Civil-Engineering M Virtual" data-dcnode-id="7609" role="row"><td data-dcnode-id="7621"><span data-dcnode-id="7622" instrument_node="">Computers, Engineering &amp; Technology</span></td><td class="more-info" data-dcnode-id="7616"><a data-dcnode-id="7619" href="#"><span data-dcnode-id="7620" instrument_node="">Sustainable Construction Materials and Technologies (in English or Hindi) (M) ◊</span></a><div class="description" data-dcnode-id="7617" style="display: none;"><span data-dcnode-id="7618" instrument_node="">This speaker’s current research is focused on developing sustainable construction materials and construction technologies. His areas of interest include condition assessment of infrastructure using structural health monitoring and non-destructive techniques such as use of drones. </span></div></td><td data-dcnode-id="7614"><span data-dcnode-id="7615" instrument_node="">Gupta, Dr. Rishi</span></td><td data-dcnode-id="7612"><span data-dcnode-id="7613" instrument_node="">Associate Professor</span></td><td data-dcnode-id="7610"><span data-dcnode-id="7611" instrument_node="">Department of Civil Engineering</span></td></tr><tr class="Computers-Engineering--Technology Department-of-Computer-Science S Virtual altrow" data-dcnode-id="7595" role="row"><td data-dcnode-id="7607"><span data-dcnode-id="7608" instrument_node="">Computers, Engineering &amp; Technology</span></td><td class="more-info" data-dcnode-id="7602"><a data-dcnode-id="7605" href="#"><span data-dcnode-id="7606" instrument_node="">The Augmented Human: How Computers can Make Us Smarter (and Dumber) (in English or Spanish) (S) ◊</span></a><div class="description" data-dcnode-id="7603" style="display: none;"><span data-dcnode-id="7604" instrument_node="">This talk is an overview of how computers have already made humans smarter, what are the main ways in which they do, and what problems this can create for people and society as we face a future with much smarter machines. </span></div></td><td data-dcnode-id="7600"><span data-dcnode-id="7601" instrument_node="">Nacenta, Dr. Miguel</span></td><td data-dcnode-id="7598"><span data-dcnode-id="7599" instrument_node="">Associate Professor</span></td><td data-dcnode-id="7596"><span data-dcnode-id="7597" instrument_node="">Department of Computer Science</span></td></tr><tr class="Computers-Engineering--Technology Department-of-Physics--Astronomy S Virtual" data-dcnode-id="7581" role="row"><td data-dcnode-id="7593"><span data-dcnode-id="7594" instrument_node="">Computers, Engineering &amp; Technology</span></td><td class="more-info" data-dcnode-id="7588"><a data-dcnode-id="7591" href="#"><span data-dcnode-id="7592" instrument_node="">From Quantum Mechanics to Quantum Computers (in English or Portuguese) (S) NEW ◊</span></a><div class="description" data-dcnode-id="7589" style="display: none;"><span data-dcnode-id="7590" instrument_node="">Quantum behavior can be exploited to create a computer that works with superpositions and entangled states of zeros and ones. This so called quantum computer is exponentially faster than conventional computers for certain problems, most notably the ones requiring linear algebra (e.g. matrix diagonalization and solution of linear systems) and simulation of quantum systems (e.g. drug design).</span></div></td><td data-dcnode-id="7586"><span data-dcnode-id="7587" instrument_node="">de Sousa, Prof. Rogério</span></td><td data-dcnode-id="7584"><span data-dcnode-id="7585" instrument_node="">Associate Professor</span></td><td data-dcnode-id="7582"><span data-dcnode-id="7583" instrument_node="">Department of Physics &amp; Astronomy</span></td></tr><tr class="Computers-Engineering--Technology Department-of-Physics--Astronomy S Virtual altrow" data-dcnode-id="7567" role="row"><td data-dcnode-id="7579"><span data-dcnode-id="7580" instrument_node="">Computers, Engineering &amp; Technology</span></td><td class="more-info" data-dcnode-id="7574"><a data-dcnode-id="7577" href="#"><span data-dcnode-id="7578" instrument_node="">Materials for Quantum Computing (in English or Portuguese) (S) NEW ◊</span></a><div class="description" data-dcnode-id="7575" style="display: none;"><span data-dcnode-id="7576" instrument_node="">I will give an informal overview on how quantum computers can be made,. using isolated atoms or superconducting chips. I will also discuss the problems we are working on in our research group, which are related to finding the optimal materials for noise reduction in quantum hardware.</span></div></td><td data-dcnode-id="7572"><span data-dcnode-id="7573" instrument_node="">de Sousa, Prof. Rogério</span></td><td data-dcnode-id="7570"><span data-dcnode-id="7571" instrument_node="">Associate Professor</span></td><td data-dcnode-id="7568"><span data-dcnode-id="7569" instrument_node="">Department of Physics &amp; Astronomy</span></td></tr><tr class="Computers-Engineering--Technology Libraries-Digital-Scholarship-Commons M S Virtual" data-dcnode-id="7553" role="row"><td data-dcnode-id="7565"><span data-dcnode-id="7566" instrument_node="">Computers, Engineering &amp; Technology</span></td><td class="more-info" data-dcnode-id="7560"><a data-dcnode-id="7563" href="#"><span data-dcnode-id="7564" instrument_node="">Smartphones and Tablets: Educational Distractions or Homework Tools &amp; Bicycles for the Mind? (M S) ◊</span></a><div class="description" data-dcnode-id="7561" style="display: none;"><span data-dcnode-id="7562" instrument_node="">Can smartphones and tablets be more than distractions and actually help with homework and be more productive? This session will look at different strategies to reduce social media distractions, and at apps that can help turn smartphones into serious productivity, research, and homework tools. The talk is aimed at non-technical users.</span></div></td><td data-dcnode-id="7558"><span data-dcnode-id="7559" instrument_node="">McCue, Mr. Rich</span></td><td data-dcnode-id="7556"><span data-dcnode-id="7557" instrument_node="">Manager</span></td><td data-dcnode-id="7554"><span data-dcnode-id="7555" instrument_node="">Libraries, Digital Scholarship Commons</span></td></tr><tr class="Cultures-Around-the-World School-of-Public-Administration S Virtual altrow" data-dcnode-id="7539" role="row"><td data-dcnode-id="7551"><span data-dcnode-id="7552" instrument_node="">Cultures Around the World</span></td><td class="more-info" data-dcnode-id="7546"><a data-dcnode-id="7549" href="#"><span data-dcnode-id="7550" instrument_node="">Indigenous Knowledge: Oral Traditions from Asia (in English or Hindi) (S) NEW ◊</span></a><div class="description" data-dcnode-id="7547" style="display: none;"><span data-dcnode-id="7548" instrument_node="">Dr. Rajesh Tandon is founder-president of PRIA, global research and training centre of participatory research, based in India. He shares UNESCO Chair on Social Responsibility of Higher Education with Dr. Budd Hall. His practice of community-based research is a methodology for empowerment and inclusion of community voices and choices.</span></div></td><td data-dcnode-id="7544"><span data-dcnode-id="7545" instrument_node="">Tandon, Dr. Rajesh</span></td><td data-dcnode-id="7542"><span data-dcnode-id="7543" instrument_node="">Adjunct Assistant Professor</span></td><td data-dcnode-id="7540"><span data-dcnode-id="7541" instrument_node="">School of Public Administration</span></td></tr><tr class="Cultures-Around-the-World Department-of-French S Virtual" data-dcnode-id="7525" role="row"><td data-dcnode-id="7537"><span data-dcnode-id="7538" instrument_node="">Cultures Around the World</span></td><td class="more-info" data-dcnode-id="7532"><a data-dcnode-id="7535" href="#"><span data-dcnode-id="7536" instrument_node="">Sports as Cultural Practice: Taking an Anthropological Approach (in English or French) (S) ◊</span></a><div class="description" data-dcnode-id="7533" style="display: none;"><span data-dcnode-id="7534" instrument_node="">While sport increasingly participates in the process of globalization, it nonetheless has a history and culturally specific differences which contradict universalizing conceptions of human behaviour such as those of game theory. Anthropology has shown a different way of understanding this behaviour, and sports is an ideal ground to examine such questions.</span></div></td><td data-dcnode-id="7530"><span data-dcnode-id="7531" instrument_node="">Fromet de Rosnay, Dr. Emile</span></td><td data-dcnode-id="7528"><span data-dcnode-id="7529" instrument_node="">Assistant Professor</span></td><td data-dcnode-id="7526"><span data-dcnode-id="7527" instrument_node="">Department of French</span></td></tr><tr class="Cultures-Around-the-World Department-of-Hispanic--Italian-Studies E M S Virtual altrow" data-dcnode-id="7511" role="row"><td data-dcnode-id="7523"><span data-dcnode-id="7524" instrument_node="">Cultures Around the World</span></td><td class="more-info" data-dcnode-id="7518"><a data-dcnode-id="7521" href="#"><span data-dcnode-id="7522" instrument_node="">Indigenous Latin America (in English, Spanish,  or German) (E M S) ◊ </span></a><div class="description" data-dcnode-id="7519" style="display: none;"><span data-dcnode-id="7520" instrument_node="">Introduction to Indigenous Peoples in Latin America, ethnic groups, geography, languages, and current globally relevant issues. Depending on the audience’s wishes we can focus on certain countries (Bolivia, Guatemala, Mexico, Peru, etc.) or specific topics (e.g. decolonization, education, social movements and justice, the environment). </span></div></td><td data-dcnode-id="7516"><span data-dcnode-id="7517" instrument_node="">McBee, Dr. Gabriela</span></td><td data-dcnode-id="7514"><span data-dcnode-id="7515" instrument_node="">Assistant Teaching Professor</span></td><td data-dcnode-id="7512"><span data-dcnode-id="7513" instrument_node="">Department of Hispanic &amp; Italian Studies</span></td></tr><tr class="Cultures-Around-the-World Co-op--Career-Services S Virtual" data-dcnode-id="7497" role="row"><td data-dcnode-id="7509"><span data-dcnode-id="7510" instrument_node="">Cultures Around the World</span></td><td class="more-info" data-dcnode-id="7504"><a data-dcnode-id="7507" href="#"><span data-dcnode-id="7508" instrument_node="">Cultural Intelligence: Engaging Effectively in Diverse Cultural Contexts (S) ◊</span></a><div class="description" data-dcnode-id="7505" style="display: none;"><span data-dcnode-id="7506" instrument_node="">Cultural Intelligence, or CQ, is one’s ability to work and relate effectively in diverse cultural settings. This interactive session will develop your understanding of cultural intelligence and how you can develop your own capability for success in diverse cultural contexts. </span></div></td><td data-dcnode-id="7502"><span data-dcnode-id="7503" instrument_node="">Ramji, Ms. Karima</span></td><td data-dcnode-id="7500"><span data-dcnode-id="7501" instrument_node="">Associate Director, International, Indigenous &amp; Strategic Initiatives</span></td><td data-dcnode-id="7498"><span data-dcnode-id="7499" instrument_node="">Co-op &amp; Career Services</span></td></tr><tr class="Cultures-Around-the-World Department-of-History M S Virtual altrow" data-dcnode-id="7483" role="row"><td data-dcnode-id="7495"><span data-dcnode-id="7496" instrument_node="">Cultures Around the World</span></td><td class="more-info" data-dcnode-id="7490"><a data-dcnode-id="7493" href="#"><span data-dcnode-id="7494" instrument_node="">The Story of an African Women's Farm (M S) ◊</span></a><div class="description" data-dcnode-id="7491" style="display: none;"><span data-dcnode-id="7492" instrument_node="">This highly illustrated talk tells the story of an inspiring farm set up during a food crisis in the early 1990s and its ongoing contributions to women's lives and their community in South Africa.</span></div></td><td data-dcnode-id="7488"><span data-dcnode-id="7489" instrument_node="">Vibert, Dr. Elizabeth</span></td><td data-dcnode-id="7486"><span data-dcnode-id="7487" instrument_node="">Associate Professor</span></td><td data-dcnode-id="7484"><span data-dcnode-id="7485" instrument_node="">Department of History</span></td></tr><tr class="Cultures-Around-the-World Department-of-History M S Virtual" data-dcnode-id="7469" role="row"><td data-dcnode-id="7481"><span data-dcnode-id="7482" instrument_node="">Cultures Around the World</span></td><td class="more-info" data-dcnode-id="7476"><a data-dcnode-id="7479" href="#"><span data-dcnode-id="7480" instrument_node="">Food Sovereignty and Sustainability (M S) ◊</span></a><div class="description" data-dcnode-id="7477" style="display: none;"><span data-dcnode-id="7478" instrument_node="">Food Sovereignty and Sustainability discusses these concepts in global perspective, and then uses food production activities in the Global South as examples of how local, small-scale food production can change lives and communities.</span></div></td><td data-dcnode-id="7474"><span data-dcnode-id="7475" instrument_node="">Vibert, Dr. Elizabeth</span></td><td data-dcnode-id="7472"><span data-dcnode-id="7473" instrument_node="">Associate Professor</span></td><td data-dcnode-id="7470"><span data-dcnode-id="7471" instrument_node="">Department of History</span></td></tr><tr class="Cultures-Around-the-World Department-of-History M S Virtual altrow" data-dcnode-id="7455" role="row"><td data-dcnode-id="7467"><span data-dcnode-id="7468" instrument_node="">Cultures Around the World</span></td><td class="more-info" data-dcnode-id="7462"><a data-dcnode-id="7465" href="#"><span data-dcnode-id="7466" instrument_node="">Micro-managing: Household Economies in the Global South (M S) ◊</span></a><div class="description" data-dcnode-id="7463" style="display: none;"><span data-dcnode-id="7464" instrument_node="">‘Micro-managing’ examines how 'the poorest of the poor' carefully manage and amplify scarce resources and diversify activities to support themselves and their families. Households in rural South Africa serve as case studies.</span></div></td><td data-dcnode-id="7460"><span data-dcnode-id="7461" instrument_node="">Vibert, Dr. Elizabeth</span></td><td data-dcnode-id="7458"><span data-dcnode-id="7459" instrument_node="">Associate Professor</span></td><td data-dcnode-id="7456"><span data-dcnode-id="7457" instrument_node="">Department of History</span></td></tr><tr class="Cultures-Around-the-World Department-of-History M S Virtual" data-dcnode-id="7441" role="row"><td data-dcnode-id="7453"><span data-dcnode-id="7454" instrument_node="">Cultures Around the World</span></td><td class="more-info" data-dcnode-id="7448"><a data-dcnode-id="7451" href="#"><span data-dcnode-id="7452" instrument_node="">The Thinking Garden: A Film About an Inspiring South African Women's Farm (M S) ◊</span></a><div class="description" data-dcnode-id="7449" style="display: none;"><span data-dcnode-id="7450" instrument_node="">The Thinking Garden. The writer-producer presents this award-winning, inspiring documentary about a South African women's cooperative farm, 35 minutes [2017]. Note: the film is in the xiTsonga language with English subtitles. </span></div></td><td data-dcnode-id="7446"><span data-dcnode-id="7447" instrument_node="">Vibert, Dr. Elizabeth</span></td><td data-dcnode-id="7444"><span data-dcnode-id="7445" instrument_node="">Associate Professor</span></td><td data-dcnode-id="7442"><span data-dcnode-id="7443" instrument_node="">Department of History</span></td></tr><tr class="Cultures-Around-the-World Department-of-History M S Virtual altrow" data-dcnode-id="7427" role="row"><td data-dcnode-id="7439"><span data-dcnode-id="7440" instrument_node="">Cultures Around the World</span></td><td class="more-info" data-dcnode-id="7434"><a data-dcnode-id="7437" href="#"><span data-dcnode-id="7438" instrument_node="">Why is Africa Poor and Food-insecure (and is it)? (M S) ◊</span></a><div class="description" data-dcnode-id="7435" style="display: none;"><span data-dcnode-id="7436" instrument_node="">This highly illustrated talk looks at historical and contemporary factors shaping the ongoing challenges of sub-Saharan Africa, queries standard narratives, and considers some little-discussed success stories. </span></div></td><td data-dcnode-id="7432"><span data-dcnode-id="7433" instrument_node="">Vibert, Dr. Elizabeth</span></td><td data-dcnode-id="7430"><span data-dcnode-id="7431" instrument_node="">Associate Professor</span></td><td data-dcnode-id="7428"><span data-dcnode-id="7429" instrument_node="">Department of History</span></td></tr><tr class="Cultures-Around-the-World Department-of-Pacific--Asian-Studies- Virtual" data-dcnode-id="7414" role="row"><td data-dcnode-id="7425"><span data-dcnode-id="7426" instrument_node="">Cultures Around the World</span></td><td class="more-info" data-dcnode-id="7421"><a data-dcnode-id="7423" href="#"><span data-dcnode-id="7424" instrument_node="">Washoku: Japanese Food Culture (in English or Japanese) ◊</span></a><div class="description" data-dcnode-id="7422" style="display: none;"></div></td><td data-dcnode-id="7419"><span data-dcnode-id="7420" instrument_node="">Poulton, Dr. Cody</span></td><td data-dcnode-id="7417"><span data-dcnode-id="7418" instrument_node="">Professor Emeritus</span></td><td data-dcnode-id="7415"><span data-dcnode-id="7416" instrument_node="">Department of Pacific &amp; Asian Studies </span></td></tr><tr class="Cultures-Around-the-World Department-of-Hispanic--Italian-Studies M S Virtual altrow" data-dcnode-id="7400" role="row"><td data-dcnode-id="7412"><span data-dcnode-id="7413" instrument_node="">Cultures Around the World</span></td><td class="more-info" data-dcnode-id="7407"><a data-dcnode-id="7410" href="#"><span data-dcnode-id="7411" instrument_node="">Mexico’s Day of the Dead (M S) ◊</span></a><div class="description" data-dcnode-id="7408" style="display: none;"><span data-dcnode-id="7409" instrument_node="">The fascinating celebration of the “Day of the Dead” is explored in this talk. Includes slides of preparations and the beautiful altars that are created to remember those who have passed away.</span></div></td><td data-dcnode-id="7405"><span data-dcnode-id="7406" instrument_node="">Stewart, Prof. Rosa</span></td><td data-dcnode-id="7403"><span data-dcnode-id="7404" instrument_node="">Teaching Professor</span></td><td data-dcnode-id="7401"><span data-dcnode-id="7402" instrument_node="">Department of Hispanic &amp; Italian Studies</span></td></tr><tr class="Earth--Oceans School-of-Earth--Ocean-Sciences S Virtual" data-dcnode-id="7386" role="row"><td data-dcnode-id="7398"><span data-dcnode-id="7399" instrument_node="">Earth &amp; Oceans</span></td><td class="more-info" data-dcnode-id="7393"><a data-dcnode-id="7396" href="#"><span data-dcnode-id="7397" instrument_node="">Groundwater: Our Hidden Treasure (S) NEW ◊</span></a><div class="description" data-dcnode-id="7394" style="display: none;"><span data-dcnode-id="7395" instrument_node="">This talk will look at how local communities can better understand, manage and protect their groundwater resources.</span></div></td><td data-dcnode-id="7391"><span data-dcnode-id="7392" instrument_node="">Wei, Mr. Mike</span></td><td data-dcnode-id="7389"><span data-dcnode-id="7390" instrument_node="">Adjunct Professor</span></td><td data-dcnode-id="7387"><span data-dcnode-id="7388" instrument_node="">School of Earth &amp; Ocean Sciences</span></td></tr><tr class="Earth--Oceans Department-of-Geography Virtual altrow" data-dcnode-id="7372" role="row"><td data-dcnode-id="7384"><span data-dcnode-id="7385" instrument_node="">Earth &amp; Oceans</span></td><td class="more-info" data-dcnode-id="7379"><a data-dcnode-id="7382" href="#"><span data-dcnode-id="7383" instrument_node="">Pacific Storm Types and Tracks ◊</span></a><div class="description" data-dcnode-id="7380" style="display: none;"><span data-dcnode-id="7381" instrument_node="">What are the types of Pacific storms? Where do they form, where do they travel, and why do they move as they do? Why do we have more storms in winter than in summer? How do El Niño/La Niña affect them?</span></div></td><td data-dcnode-id="7377"><span data-dcnode-id="7378" instrument_node="">Atkinson, Dr. David</span></td><td data-dcnode-id="7375"><span data-dcnode-id="7376" instrument_node="">Assistant Professor</span></td><td data-dcnode-id="7373"><span data-dcnode-id="7374" instrument_node="">Department of Geography</span></td></tr><tr class="Earth--Oceans Department-of-Geography Virtual" data-dcnode-id="7358" role="row"><td data-dcnode-id="7370"><span data-dcnode-id="7371" instrument_node="">Earth &amp; Oceans</span></td><td class="more-info" data-dcnode-id="7365"><a data-dcnode-id="7368" href="#"><span data-dcnode-id="7369" instrument_node="">How Storms Impact the Coasts ◊</span></a><div class="description" data-dcnode-id="7366" style="display: none;"><span data-dcnode-id="7367" instrument_node="">How do storms affect the ocean and impact the coast? How does the nature of the coast-water depth, type of beach material, coast shape-affect how a storm can cause impact? How do features like sandbars and rip-currents work? Why there are bigger waves in winter? </span></div></td><td data-dcnode-id="7363"><span data-dcnode-id="7364" instrument_node="">Atkinson, Dr. David</span></td><td data-dcnode-id="7361"><span data-dcnode-id="7362" instrument_node="">Assistant Professor</span></td><td data-dcnode-id="7359"><span data-dcnode-id="7360" instrument_node="">Department of Geography</span></td></tr><tr class="Earth--Oceans Department-of-Geography Virtual altrow" data-dcnode-id="7344" role="row"><td data-dcnode-id="7356"><span data-dcnode-id="7357" instrument_node="">Earth &amp; Oceans</span></td><td class="more-info" data-dcnode-id="7351"><a data-dcnode-id="7354" href="#"><span data-dcnode-id="7355" instrument_node="">Field Research in the Arctic ◊</span></a><div class="description" data-dcnode-id="7352" style="display: none;"><span data-dcnode-id="7353" instrument_node="">The Canadian high Arctic is a place most people have never seen. In this photo tour, you’ll see what the it looks like-landforms, animals and some of the research taking place there.</span></div></td><td data-dcnode-id="7349"><span data-dcnode-id="7350" instrument_node="">Atkinson, Dr. David</span></td><td data-dcnode-id="7347"><span data-dcnode-id="7348" instrument_node="">Assistant Professor</span></td><td data-dcnode-id="7345"><span data-dcnode-id="7346" instrument_node="">Department of Geography</span></td></tr><tr class="Earth--Oceans Department-of-Geography Virtual" data-dcnode-id="7330" role="row"><td data-dcnode-id="7342"><span data-dcnode-id="7343" instrument_node="">Earth &amp; Oceans</span></td><td class="more-info" data-dcnode-id="7337"><a data-dcnode-id="7340" href="#"><span data-dcnode-id="7341" instrument_node="">The Coastal Regions of Alaska and the Arctic ◊</span></a><div class="description" data-dcnode-id="7338" style="display: none;"><span data-dcnode-id="7339" instrument_node="">This presentation gives an overview of the Alaskan and Arctic coastal regions, including who lives there, what the land/coast is like, how important sea ice is, how climate change is manifesting itself in these areas and new threats/opportunities from oil/gas development and the Northwest Passage opening. </span></div></td><td data-dcnode-id="7335"><span data-dcnode-id="7336" instrument_node="">Atkinson, Dr. David</span></td><td data-dcnode-id="7333"><span data-dcnode-id="7334" instrument_node="">Assistant Professor</span></td><td data-dcnode-id="7331"><span data-dcnode-id="7332" instrument_node="">Department of Geography</span></td></tr><tr class="Earth--Oceans Department-of-Geography Virtual altrow" data-dcnode-id="7316" role="row"><td data-dcnode-id="7328"><span data-dcnode-id="7329" instrument_node="">Earth &amp; Oceans</span></td><td class="more-info" data-dcnode-id="7323"><a data-dcnode-id="7326" href="#"><span data-dcnode-id="7327" instrument_node="">Weather Stations in the Icefields of the Rockies ◊</span></a><div class="description" data-dcnode-id="7324" style="display: none;"><span data-dcnode-id="7325" instrument_node="">This presentation includes an overview of how 10-metre weather towers were installed on the Columbia Icefield near Jasper and Banff, and an Icefield in Nahanni National Park Reserve in the NWT. See examples of data and photos sent back from the stations and learn about some of the problems with this sort of science.</span></div></td><td data-dcnode-id="7321"><span data-dcnode-id="7322" instrument_node="">Atkinson, Dr. David</span></td><td data-dcnode-id="7319"><span data-dcnode-id="7320" instrument_node="">Assistant Professor</span></td><td data-dcnode-id="7317"><span data-dcnode-id="7318" instrument_node="">Department of Geography</span></td></tr><tr class="Earth--Oceans Ocean-Networks-Canada M S Virtual" data-dcnode-id="7302" role="row"><td data-dcnode-id="7314"><span data-dcnode-id="7315" instrument_node="">Earth &amp; Oceans</span></td><td class="more-info" data-dcnode-id="7309"><a data-dcnode-id="7312" href="#"><span data-dcnode-id="7313" instrument_node="">Ocean Networks Canada: Operating the World’s Leading Ocean Observatories (M S) ◊</span></a><div class="description" data-dcnode-id="7310" style="display: none;"><span data-dcnode-id="7311" instrument_node="">Starting with the installation of VENUS in the Salish Sea in 2006, NEPTUNE in the northeast Pacific in 2009, and the Cambridge Bay Observatory in the Arctic in 2012, UVic’s Ocean Networks Canada is the world leader in the design, operations and innovation associated with advanced ocean observatory systems. Observing sensors are installed across a wide range of marine environments, from near the Fraser River out to the Endeavour Hot Vents in the open ocean. The presentation provides a broad overview of the observatories and the pure and applied science they support.</span></div></td><td data-dcnode-id="7307"><span data-dcnode-id="7308" instrument_node="">Dewey, Dr. Richard</span></td><td data-dcnode-id="7305"><span data-dcnode-id="7306" instrument_node="">Associate Director, Science Services</span></td><td data-dcnode-id="7303"><span data-dcnode-id="7304" instrument_node="">Ocean Networks Canada</span></td></tr><tr class="Earth--Oceans School-of-Earth--Ocean-Sciences M S Virtual altrow" data-dcnode-id="7288" role="row"><td data-dcnode-id="7300"><span data-dcnode-id="7301" instrument_node="">Earth &amp; Oceans</span></td><td class="more-info" data-dcnode-id="7295"><a data-dcnode-id="7298" href="#"><span data-dcnode-id="7299" instrument_node="">The Fukushima Disaster and Radiation in the Pacific Ocean: What Does It Mean for BC? (M S) ◊</span></a><div class="description" data-dcnode-id="7296" style="display: none;"><span data-dcnode-id="7297" instrument_node="">The mega-thrust earthquake in March 2011 off the coast of Japan and the subsequent tsunami led to globally significant releases of radioactive elements from the Fukushima Dai-ichi Nuclear Power Plant. In this presentation, the radioactive releases, transport from Fukushima and expected maximum concentrations on the west coast of North America are discussed in light of naturally occurring radioactivity and historic releases of radioactive elements from human activities. Ongoing monitoring efforts and likely impacts on environmental and public health are also discussed.</span></div></td><td data-dcnode-id="7293"><span data-dcnode-id="7294" instrument_node="">Cullen, Dr. Jay</span></td><td data-dcnode-id="7291"><span data-dcnode-id="7292" instrument_node="">Associate Professor</span></td><td data-dcnode-id="7289"><span data-dcnode-id="7290" instrument_node="">School of Earth &amp; Ocean Sciences</span></td></tr><tr class="Earth--Oceans School-of-Earth--Ocean-Sciences M S Virtual" data-dcnode-id="7274" role="row"><td data-dcnode-id="7286"><span data-dcnode-id="7287" instrument_node="">Earth &amp; Oceans</span></td><td class="more-info" data-dcnode-id="7281"><a data-dcnode-id="7284" href="#"><span data-dcnode-id="7285" instrument_node="">Illuminating Earthquakes with Satellites, Drones and iPhones (M S) ◊</span></a><div class="description" data-dcnode-id="7282" style="display: none;"><span data-dcnode-id="7283" instrument_node="">Overview of how remote sensing platforms can be used to "see" earthquakes.</span></div></td><td data-dcnode-id="7279"><span data-dcnode-id="7280" instrument_node="">Nissen, Dr. Edwin</span></td><td data-dcnode-id="7277"><span data-dcnode-id="7278" instrument_node="">Associate Professor</span></td><td data-dcnode-id="7275"><span data-dcnode-id="7276" instrument_node="">School of Earth &amp; Ocean Sciences</span></td></tr><tr class="Earth--Oceans School-of-Earth--Ocean-Sciences M S Virtual altrow" data-dcnode-id="7260" role="row"><td data-dcnode-id="7272"><span data-dcnode-id="7273" instrument_node="">Earth &amp; Oceans</span></td><td class="more-info" data-dcnode-id="7267"><a data-dcnode-id="7270" href="#"><span data-dcnode-id="7271" instrument_node="">Know Your Faults: Earthquake and Tsunami Hazards of Coastal BC (M S) ◊</span></a><div class="description" data-dcnode-id="7268" style="display: none;"><span data-dcnode-id="7269" instrument_node="">Overview of seismic and tsunami hazards in British Columbia, including the three "types" of earthquake we should be aware of.</span></div></td><td data-dcnode-id="7265"><span data-dcnode-id="7266" instrument_node="">Nissen, Dr. Edwin</span></td><td data-dcnode-id="7263"><span data-dcnode-id="7264" instrument_node="">Associate Professor</span></td><td data-dcnode-id="7261"><span data-dcnode-id="7262" instrument_node="">School of Earth &amp; Ocean Sciences</span></td></tr><tr class="Earth--Oceans School-of-Earth--Ocean-Sciences M S Virtual" data-dcnode-id="7246" role="row"><td data-dcnode-id="7258"><span data-dcnode-id="7259" instrument_node="">Earth &amp; Oceans</span></td><td class="more-info" data-dcnode-id="7253"><a data-dcnode-id="7256" href="#"><span data-dcnode-id="7257" instrument_node="">Fatal Attraction: How Humans are Drawn to Earthquakes in the Middle East (M S) ◊</span></a><div class="description" data-dcnode-id="7254" style="display: none;"><span data-dcnode-id="7255" instrument_node="">Overview of earthquake hazards in the Middle East, with a discussion of why humans are drawn to living along active faults.</span></div></td><td data-dcnode-id="7251"><span data-dcnode-id="7252" instrument_node="">Nissen, Dr. Edwin</span></td><td data-dcnode-id="7249"><span data-dcnode-id="7250" instrument_node="">Associate Professor</span></td><td data-dcnode-id="7247"><span data-dcnode-id="7248" instrument_node="">School of Earth &amp; Ocean Sciences</span></td></tr><tr class="Earth--Oceans Department-of-Biology S Virtual altrow" data-dcnode-id="7232" role="row"><td data-dcnode-id="7244"><span data-dcnode-id="7245" instrument_node="">Earth &amp; Oceans</span></td><td class="more-info" data-dcnode-id="7239"><a data-dcnode-id="7242" href="#"><span data-dcnode-id="7243" instrument_node="">The Microbiology of Ocean Surfaces and its Role in the World’s Carbon Cycle ǂ (S) ◊</span></a><div class="description" data-dcnode-id="7240" style="display: none;"><span data-dcnode-id="7241" instrument_node="">Tiny microscopic algae, known as phytoplankton, fix carbon dioxide through photosynthesis and incorporate it into their cells in the surface layers of the ocean. Eventually, phytoplankton cells sink through the water column to the bottom of the ocean, and take the carbon dioxide they have fixed in their cells with them. This effectively removes carbon dioxide from our atmosphere and sequesters it at the bottom of the ocean for thousands of years. This process (known as the biological carbon pump) has intrigued scientists for many years, however, it has recently drawn greater attention in light of a changing climate and warming ocean.</span></div></td><td data-dcnode-id="7237"><span data-dcnode-id="7238" instrument_node="">Livingston, Mr. Michael</span></td><td data-dcnode-id="7235"><span data-dcnode-id="7236" instrument_node="">Graduate Student</span></td><td data-dcnode-id="7233"><span data-dcnode-id="7234" instrument_node="">Department of Biology</span></td></tr><tr class="Earth--Oceans Department-of-Biology E M S Virtual" data-dcnode-id="7218" role="row"><td data-dcnode-id="7230"><span data-dcnode-id="7231" instrument_node="">Earth &amp; Oceans</span></td><td class="more-info" data-dcnode-id="7225"><a data-dcnode-id="7228" href="#"><span data-dcnode-id="7229" instrument_node="">Marine Phytoplankton: Diversity, Ecology and Ecosystem Services in Changing Oceans ǂ (E M S) ◊</span></a><div class="description" data-dcnode-id="7226" style="display: none;"><span data-dcnode-id="7227" instrument_node="">Marine phytoplankton are ubiquitous, microscopic organisms that are the base of marine food webs, capture climate-warming carbon dioxide gas, and are responsible for producing 50% of the oxygen we breath. One particular group of phytoplankton, the diatoms, are especially common on the West coast of British Columbia, and their importance in ecosystems and to the planet cannot be understated. This presentation will introduce some of the different types of phytoplankton, their diversity and examples of unique features, roles in local and global systems, and how climate change is affecting these organisms.</span></div></td><td data-dcnode-id="7223"><span data-dcnode-id="7224" instrument_node="">Wyatt, Mr. Shea</span></td><td data-dcnode-id="7221"><span data-dcnode-id="7222" instrument_node="">Graduate Student</span></td><td data-dcnode-id="7219"><span data-dcnode-id="7220" instrument_node="">Department of Biology</span></td></tr><tr class="Earth--Oceans School-of-Earth--Ocean-Sciences E M S Virtual altrow" data-dcnode-id="7204" role="row"><td data-dcnode-id="7216"><span data-dcnode-id="7217" instrument_node="">Earth &amp; Oceans</span></td><td class="more-info" data-dcnode-id="7211"><a data-dcnode-id="7214" href="#"><span data-dcnode-id="7215" instrument_node="">The Waves We Walk On: Groundwater and Aquifers(E M S) ǂ NEW ◊</span></a><div class="description" data-dcnode-id="7212" style="display: none;"><span data-dcnode-id="7213" instrument_node="">This presentation introduces students to the invisible water beneath our feet. Often overlooked or misunderstood in the water budget, groundwater plays a significant role in the Earth’s water cycle that in human time scales of the last hundred years or so is only beginning to be understood. We will explore the storage and movements of groundwater, what groundwater actually “looks like” and how it interacts with other components in the water cycle. Examples will be given locally in BC, as well as larger global groundwater regions and issues. </span></div></td><td data-dcnode-id="7209"><span data-dcnode-id="7210" instrument_node="">Disney, Ms. Kristina</span></td><td data-dcnode-id="7207"><span data-dcnode-id="7208" instrument_node="">Graduate Student</span></td><td data-dcnode-id="7205"><span data-dcnode-id="7206" instrument_node="">School of Earth &amp; Ocean Sciences</span></td></tr><tr class="Earth--Oceans School-of-Earth--Ocean-Sciences S Virtual" data-dcnode-id="7190" role="row"><td data-dcnode-id="7202"><span data-dcnode-id="7203" instrument_node="">Earth &amp; Oceans</span></td><td class="more-info" data-dcnode-id="7197"><a data-dcnode-id="7200" href="#"><span data-dcnode-id="7201" instrument_node="">British Columbia Paleontology ǂ (S) NEW ◊</span></a><div class="description" data-dcnode-id="7198" style="display: none;"><span data-dcnode-id="7199" instrument_node="">This talk provides an overview of British Columbia’s paleontology with emphasis on the Vancouver Island and Gulf Islands region. Beyond an exploration of fossil diversity and utility through deep time, the rarely examined cultural history and ethics of fossil collecting in the province will be addressed along with the importance of paleontological heritage resource management. </span></div></td><td data-dcnode-id="7195"><span data-dcnode-id="7196" instrument_node="">McLachlan, Mr. Sandy</span></td><td data-dcnode-id="7193"><span data-dcnode-id="7194" instrument_node="">Graduate Student</span></td><td data-dcnode-id="7191"><span data-dcnode-id="7192" instrument_node="">School of Earth &amp; Ocean Sciences</span></td></tr><tr class="Earth--Oceans School-of-Earth--Ocean-Sciences S Virtual altrow" data-dcnode-id="7176" role="row"><td data-dcnode-id="7188"><span data-dcnode-id="7189" instrument_node="">Earth &amp; Oceans</span></td><td class="more-info" data-dcnode-id="7183"><a data-dcnode-id="7186" href="#"><span data-dcnode-id="7187" instrument_node="">Macrofossils: Diversity and Utility ǂ (S) NEW ◊</span></a><div class="description" data-dcnode-id="7184" style="display: none;"><span data-dcnode-id="7185" instrument_node="">This talk explores fossil diversity, with a focus on the macrofossils of the region and their use in furthering our understanding of evolutionary biology, Earth history and paleoenvrionments. This talk would offer grea
