 data-dcnode-id="532" instrument_node="">FAQ Vs</span></a><span data-dcnode-id="530" instrument_node=""> </span><a class="almclass" data-dcnode-id="528" href="#" rel="almcontact"><span data-dcnode-id="529" instrument_node="">Contact</span></a><span data-dcnode-id="527" instrument_node=""> </span><a data-dcnode-id="525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.the-ten-commandments.org/support.html" rel="nofollow"><span data-dcnode-id="526" instrument_node="">Support</span></a><span data-dcnode-id="524" instrument_node=""> </span><a data-dcnode-id="522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.the-ten-commandments.org/the-ten-commandments-links.html" rel="nofollow"><span data-dcnode-id="523" instrument_node="">Resources</span></a><span data-dcnode-id="521" instrument_node=""> </span></ul><span data-dcnode-id="519" instrument_node=""> </span></div></div><span data-dcnode-id="516" instrument_node="">
</span><div data-dcnode-id="406" id="content"><span data-dcnode-id="515" instrument_node="">
</span><h1 data-dcnode-id="513"><span data-dcnode-id="514" instrument_node="">About Us</span></h1><span data-dcnode-id="512" instrument_node="">
</span><div class="block" data-dcnode-id="408"><span data-dcnode-id="511" instrument_node="">
</span><p data-dcnode-id="509"><span data-dcnode-id="510" instrument_node="">We are a self funded ministry dedicated to spreading the truth of God’s Word. We believe and teach the same things that were taught by Jesus, as well as what Paul and the Apostles taught to the early Church. We wholly believe in the Bible as our only source of doctrine and recognize that all scripture is totally inspired by God and so fully trustworthy, including the acknowledgement that there was a literal six day creation plus one extra day for rest and Holy use giving us the seven day week we have today. We have also discovered that once you know the keys to unlock the prophecies of the Bible, they actually can be understood and without private interpretation. Jesus said blessed is he that reads and understands them. (Revelation 1:1-3)</span></p><span data-dcnode-id="508" instrument_node="">
</span><p data-dcnode-id="500"><span data-dcnode-id="507" instrument_node="">The Bible informs us in 2 Timothy 4:3-4 “</span><em data-dcnode-id="505"><span data-dcnode-id="506" instrument_node="">the time will come when they will not endure sound doctrine; but after their own lusts shall they heap to themselves teachers, having itching ears; and they shall turn away their ears from the truth, and shall be turned unto fables.</span></em><span data-dcnode-id="504" instrument_node="">” We are also warned that God’s people will perish for a lack of knowledge because they would reject knowledge and Jesus himself warns us again and again not to be deceived and that if it were possible even the elect will be deceived. Revelation says that in the end, the world will be deceived by the miracles that the enemy gives power to the beast to do. We therefore realise that one should never underestimate the deceptions of Satan and know that he always attacks truth and especially what affects our salvation. When God brought His chosen people out of the land of Egypt, He performed many miracles like turning Aaron’s rod into a serpent, changing rivers to blood and bringing up frogs to cover the land. The pharaoh’s magicians through the power of Satan were also able to perform all these same miracles. (Exodus 7:10-11; 7:20-22; 8:6-7). We therefore recognise that the enemy can also perform counterfeit miracles such as </span><a data-dcnode-id="502" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.speaking-in-tongues.net/"><span data-dcnode-id="503" instrument_node="">speaking in tongues</span></a><span data-dcnode-id="501" instrument_node=""> and so we know we need to check and recheck everything thoroughly against the Word of God and that what the majority believe today is not always Biblically correct.</span></p><span data-dcnode-id="499" instrument_node="">
</span><p data-dcnode-id="494"><span data-dcnode-id="498" instrument_node="">Today there are a substantial number of Christians who are unaware that some of the beliefs in Christian Churches have originated from manmade traditions and paganism. The current day of worship is a good example of this as it originated from </span><a data-dcnode-id="496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.sabbathtosundaychange.com/"><span data-dcnode-id="497" instrument_node="">sun worship</span></a><span data-dcnode-id="495" instrument_node=""> which is why we have the pagan name SUN-day. It was not changed in honour of the resurrection as some claim and history confirms that all Christians worshipped on Saturday until at least 120 AD, when persecution for Judaism caused some to change days in fear of their lives. Millions also died through the dark ages for refusing to worship on Sunday that was made law in the fourth century and is why all except around five hundred denominations now worship on Sunday. These are facts unbeknown to most Christians today.</span></p><span data-dcnode-id="493" instrument_node="">
</span><p data-dcnode-id="479"><span data-dcnode-id="492" instrument_node="">We also trust the example of Jesus and Paul who always kept the Sabbath. Paul was a Pharisee and hence a Jew and followed the Jewish ways to the strictest letter. Acts 26:4-5 “</span><em data-dcnode-id="490"><span data-dcnode-id="491" instrument_node="">The Jews all know the way I have lived ever since I was a child, from the beginning of my life in my own country, and also in Jerusalem. They have known me for a long time and can testify, if they are willing, that according to the strictest sect of our religion, I lived as a Pharisee.</span></em><span data-dcnode-id="489" instrument_node="">” Notice in the following verse that this is a Jewish synagogue and that Jews have all through history, without change, worshipped on Saturday as they still do today. Acts 17:2 “</span><em data-dcnode-id="487"><span data-dcnode-id="488" instrument_node="">…they came to Thessalonica, where there was a Jewish synagogue. As his CUSTOM was, Paul went into the synagogue, and on three Sabbath days he reasoned with them from the Scriptures.</span></em><span data-dcnode-id="486" instrument_node="">” Since it was the </span><em data-dcnode-id="484"><span data-dcnode-id="485" instrument_node="">custom</span></em><span data-dcnode-id="483" instrument_node=""> of Jesus, (Luke 4:16) Paul and the early Church, and Jesus assured us not one stroke of the law is going to pass, then we also follow their example and enjoy the promised blessings of God’s Holy </span><a data-dcnode-id="481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.sabbath-day.net/"><span data-dcnode-id="482" instrument_node="">Sabbath day</span></a><span data-dcnode-id="480" instrument_node="">. Most of the misunderstanding in this area comes from confusion between the Mosaic Law (ended) and the Ten Commandment law.</span></p><span data-dcnode-id="478" instrument_node="">
</span><p data-dcnode-id="473"><span data-dcnode-id="477" instrument_node="">We believe that there is only one way to establish truth, and it is not by taking for granted what we tell you or what your most trusted friend tells you or even what your Pastor teaches. God’s children need to be like the Berean Christians who “</span><em data-dcnode-id="475"><span data-dcnode-id="476" instrument_node="">received the message with great eagerness and examined the Scriptures every day to see if what Paul said was true</span></em><span data-dcnode-id="474" instrument_node="">” Acts 17:11. This is the only way to get back to the Biblically based belief system of the early Church and put aside the traditions that have become accepted doctrines over the centuries, and obscured the original teachings and examples of Jesus and the Apostles.</span></p><span data-dcnode-id="472" instrument_node="">
</span><p data-dcnode-id="470"><span data-dcnode-id="471" instrument_node="">Our certainty is that we have been saved through Grace, by the death and resurrection of Jesus Christ and that He has saved us from the penalty that our sins deserved. We recognize that because He has saved us from the consequences of the law, it does not mean that we no longer have to obey God’s law of love, but to the contrary it amplifies our desire to follow God’s Commandments to the best of our ability, because we know what an enormous price Christ paid on our behalf.</span></p><span data-dcnode-id="469" instrument_node="">
</span><p data-dcnode-id="461"><span data-dcnode-id="468" instrument_node="">We conscientiously follow the teachings of Jesus who demonstrated that not every Christian that called Jesus Lord would make it into the kingdom. Jesus spoke of those who said, “</span><em data-dcnode-id="466"><span data-dcnode-id="467" instrument_node="">Lord, Lord,</span></em><span data-dcnode-id="465" instrument_node="">” but did not do the will of the Father. Then He described many who would seek entrance into the kingdom claiming to be workers of miracles in the name of Jesus Christ. But He would have to sorrowfully say “</span><em data-dcnode-id="463"><span data-dcnode-id="464" instrument_node="">…I never knew you: depart from me, you who practice lawlessness!</span></em><span data-dcnode-id="462" instrument_node="">” Matthew 7:23. This demonstrates that God’s grace does not cover deliberate disobedience, because this means that there is no genuine repentance of our sinful act because had there been, we would not have kept on doing it.</span></p><span data-dcnode-id="460" instrument_node="">
</span><p data-dcnode-id="455"><span data-dcnode-id="459" instrument_node="">By God’s Grace and faith in Jesus our fleshly failures are forgiven through genuine repentance but what about deliberate wilful sin? Hebrews 10:26-29 “</span><em data-dcnode-id="457"><span data-dcnode-id="458" instrument_node="">For if we sin WILFULLY after that we have received the knowledge of the truth, there remaineth NO MORE sacrifice for sins … He that despised Moses' law died without mercy under two or three witnesses: Of how much sorer punishment, suppose you, shall he be thought worthy, who has trodden under foot the Son of God, and has counted the blood of the covenant, wherewith he was sanctified, an unholy thing, and has done despite unto the Spirit of GRACE?</span></em><span data-dcnode-id="456" instrument_node="">”</span></p><span data-dcnode-id="454" instrument_node="">
</span><p data-dcnode-id="443"><span data-dcnode-id="453" instrument_node="">We also believe in teaching </span><a data-dcnode-id="451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.the-ten-commandments.org/"><span data-dcnode-id="452" instrument_node="">the Ten Commandments</span></a><span data-dcnode-id="450" instrument_node=""> as Jesus informed us that He did not come to destroy the law and that we are not only to obey it but to TEACH it also. In Matthew Chapter 5 Jesus assures us that not even a stroke of the pen would pass from the law, let alone an entire Commandment. Matthew 5:17-19 “</span><em data-dcnode-id="448"><span data-dcnode-id="449" instrument_node="">Think not that I am come to destroy the law, or the prophets: I am not come to destroy, but to fulfil. For verily I say unto you, Till heaven and earth pass, one jot or one tittle shall in no wise pass from the law, till all be fulfilled. Whosoever therefore shall break one of these least commandments, and shall teach men so, he shall be called the least in the kingdom of heaven: but whosoever shall do and teach them, the same shall be called great in the kingdom of heaven.</span></em><span data-dcnode-id="447" instrument_node="">” We find in the remainder of Chapter 5 that Jesus not only did not come to destroy the law but instead fulfils prophecy by magnifying the law as it was prophesied that He would in Isaiah 42:21, “</span><em data-dcnode-id="445"><span data-dcnode-id="446" instrument_node="">The LORD is well pleased for his righteousness' sake; he will MAGNIFY the law, and make it honourable</span></em><span data-dcnode-id="444" instrument_node="">.”</span></p><span data-dcnode-id="442" instrument_node="">
</span><p data-dcnode-id="431"><span data-dcnode-id="441" instrument_node="">When you truly know and love Jesus as your Lord and Saviour, it is a natural progression to seek to follow and obey Him, as love and obedience are inseparable in the true Christian’s life. The beloved John summed it up in these words, 1 John 5:3 “</span><em data-dcnode-id="439"><span data-dcnode-id="440" instrument_node="">For this is the love of God, that we keep his Commandments: and his Commandments are not grievous</span></em><span data-dcnode-id="438" instrument_node="">.” Jesus expressed it plainly and simply using these words found in John 14:15 which He quotes from the Second Commandment, “</span><em data-dcnode-id="436"><span data-dcnode-id="437" instrument_node="">If you love me, keep my Commandments.</span></em><span data-dcnode-id="435" instrument_node="">” And finally, there can be no misunderstanding the meaning and blessing of these words. Revelation 22:14 “</span><em data-dcnode-id="433"><span data-dcnode-id="434" instrument_node="">Blessed are they that do his Commandments, that they may have right to the tree of life, and may enter in through the gates into the city.</span></em><span data-dcnode-id="432" instrument_node="">”</span></p><span data-dcnode-id="430" instrument_node="">
</span><p data-dcnode-id="422"><span data-dcnode-id="429" instrument_node="">It was never God’s intention for His Church to be divided into multiple denominations and sadly, we have found through experience that many choose to judge what they read based on one’s denomination. We also discovered that the more truth a Church has, the more lies the enemy has coming against it to keep people from finding truth. See </span><a data-dcnode-id="427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.remnant-church.net/"><span data-dcnode-id="428" instrument_node="">who is the remnant Church</span></a><span data-dcnode-id="426" instrument_node=""> for more information. After our first few thousand hours of study, it rapidly became more and more apparent that what is truth is not always popular and what is popular is not always truth. Mark Twain once said, “</span><em data-dcnode-id="424"><span data-dcnode-id="425" instrument_node="">A lie can travel halfway around the world, while truth puts on its shoes.</span></em><span data-dcnode-id="423" instrument_node="">”</span></p><span data-dcnode-id="421" instrument_node="">
</span><p data-dcnode-id="410"><span data-dcnode-id="420" instrument_node="">Since having a denominational name gives Satan something to attack and many Christians have the tendency to judge truth by denomination rather than the Word of God, we have chosen not to reveal denomination. This decision was made with much prayer and ultimately so this ministry could be more effective in spreading truth to the world. The following scriptures inform us of what truth is and how it should be established and it is not by one’s denomination. John 14:6 “</span><em data-dcnode-id="418"><span data-dcnode-id="419" instrument_node="">Jesus saith unto him, I am the way and the TRUTH…</span></em><span data-dcnode-id="417" instrument_node="">” John 17:17 “</span><em data-dcnode-id="415"><span data-dcnode-id="416" instrument_node="">Sanctify them through your Truth: your WORD is TRUTH.</span></em><span data-dcnode-id="414" instrument_node="">” 1 Thessalonians 2:13 “</span><em data-dcnode-id="412"><span data-dcnode-id="413" instrument_node="">…when you received the Word of God which you heard of us, you received it not as the word of men, but as it is in TRUTH, the Word of God, which effectually worketh also in you that believe.</span></em><span data-dcnode-id="411" instrument_node="">”</span></p><span data-dcnode-id="409" instrument_node="">
</span></div><span data-dcnode-id="407" instrument_node="">
</span></div><span data-dcnode-id="405" instrument_node="">

</span><li data-dcnode-id="395"><a data-dcnode-id="396" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.the-ten-commandments.org/index.html" rel="nofollow" target=""><span data-dcnode-id="397" instrument_node="">Home Page</span></a></li><span data-dcnode-id="394" instrument_node="">
</span><li data-dcnode-id="391"><a data-dcnode-id="392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.the-ten-commandments.org/the-ten-commandments_page2.html" rel="nofollow" target=""><span data-dcnode-id="393" instrument_node="">Do we Have to Obey</span></a></li><span data-dcnode-id="390" instrument_node="">
</span><li data-dcnode-id="387"><a data-dcnode-id="388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.the-ten-commandments.org/the-ten-commandments_page3.html" rel="nofollow" target=""><span data-dcnode-id="389" instrument_node="">Saved by Grace Alone</span></a></li><span data-dcnode-id="386" instrument_node="">
