</span><span data-dcnode-id="3741" id="freeText6691251079930759314" style="display:none"><span data-dcnode-id="3745" instrument_node="">I found Joy Davidman's review of the Ten Commandments thought provoking and convicting. Unlike many modern Christian authors who mince words trying to "soften" the truth, Davidman doesn't quibble. She is straight forward in writing about the truth. She includes herself in the need to understand and act on truth, which is encouraging to a reader. I most liked the parts she wrote on materialism. Her discussion is so apropos for American Christianity today. So many Christians implore God to save their economic capitalism as if that is what most concerns God. Her critique of this position was spot on.</span><br data-dcnode-id="3744"><br data-dcnode-id="3743"><span data-dcnode-id="3742" instrument_node="">I wasn't distracted by the dated examples, referencing communism and Marx. Her examples may not be modern, but her points are still valid. So valid, I would recommend this book to any Christian today. She has a lot to say to us today that rings true and if we would listen to her, we would become more Christlike Christians.</span></span><span data-dcnode-id="3740" instrument_node="">

        </span><span class="staticStars notranslate" data-dcnode-id="3672" title="it was amazing"><span class="staticStar p10" data-dcnode-id="3677" size="15x15"><span data-dcnode-id="3678" instrument_node="">it was amazing</span></span><span class="staticStar p10" data-dcnode-id="3676" size="15x15"></span><span class="staticStar p10" data-dcnode-id="3675" size="15x15"></span><span class="staticStar p10" data-dcnode-id="3674" size="15x15"></span><span class="staticStar p10" data-dcnode-id="3673" size="15x15"></span></span><span data-dcnode-id="3671" instrument_node="">

</span><span data-dcnode-id="3664" id="freeTextContainer10850238398767649562"><br data-dcnode-id="3666"><span data-dcnode-id="3665" instrument_node="">Joy Davidman’s Smoke on the Mountain is a journey to the summit with Moses to flesh out the meaning of the words inscribed in tablets of stone millenia ago. To read this booklet is to recognize the presence of God burning in [your] mind as Moses recognized him in the burning bush.” In a culture whose highest ambition is to be safe, Davidman defines the sin of fear as “a rejection of the present and a desperate attempt to play God by getting control of the future.” And the antidote to fear is “Co</span></span><span data-dcnode-id="3663" instrument_node="">
</span><span data-dcnode-id="3635" id="freeText10850238398767649562" style="display:none"><br data-dcnode-id="3662"><span data-dcnode-id="3661" instrument_node="">Joy Davidman’s Smoke on the Mountain is a journey to the summit with Moses to flesh out the meaning of the words inscribed in tablets of stone millenia ago. To read this booklet is to recognize the presence of God burning in [your] mind as Moses recognized him in the burning bush.” In a culture whose highest ambition is to be safe, Davidman defines the sin of fear as “a rejection of the present and a desperate attempt to play God by getting control of the future.” And the antidote to fear is “Courage himself, God the Lion, stands beside us to help us live by it. Whatever we desire, whatever we love, whatever we find worth suffering for, will be Dead Sea fruit in our mouths unless we remember that God came first.” </span><br data-dcnode-id="3660"><br data-dcnode-id="3659"><span data-dcnode-id="3658" instrument_node="">Davidman defines, “An idol is only an inanimate object that can do no harm...So is a gun. But a man can do great harm with it...If we are to be saved, it will not be by wood, however well carved and polished; nor by machines, however efficient; nor by social planning, however ingenious. If we are to be saved, it must be by the one power that is built into a man at his beginning and that he does not have to make with his hands--the power of the Holy Spirit, which is God.” </span><br data-dcnode-id="3657"><br data-dcnode-id="3656"><span data-dcnode-id="3655" instrument_node="">She describes the Sabbath as a weekly return to Eden. “How do you make a day holy? By seeing that it is holy already; and behaving accordingly...Every man wants God in his heart far more than he can ever want anything else; that is, every man wants peace and love, answers to his questions, and the keys of heaven. When a church gives these, its doors overflow.” </span><br data-dcnode-id="3654"><br data-dcnode-id="3653"><span data-dcnode-id="3652" instrument_node="">I was particularly struck by Davidman’s reinterpretation of the fifth commandment. “To clan society, therefore, a man is not so much himself as the son of his father...at the climax of history, he is Jesus who calls himself the Son of Man.” I am no longer Jennifer Erickson--patricarchically related to my white, European, Swedish clansmen; in the family of our Heavenly Father, all are “members of yourself in the eternal body of mankind.”</span><br data-dcnode-id="3651"><br data-dcnode-id="3650"><span data-dcnode-id="3649" instrument_node="">I was also convicted by Davidman’s redefinition of the eighth commandment. “The thief is not only he who steals my purse, but also he who steals my trade; and he who underpays me, and he who overcharges me; and he who taxes me for his own advantage instead of mine; and he who sells me trash instead of honest goods...We men are all thieves who have stolen the self which was meant as a part of God and tried to keep it for ourselves alone.”</span><br data-dcnode-id="3648"><br data-dcnode-id="3647"><span data-dcnode-id="3646" instrument_node="">“If we start confessing our habitual lies, shall we ever be done? There are the lies of gossip, public and private, which make haters out of us; the lies of advertising and salesmanship, which make money out of us; the lies of politicians, who make power out of us. And the lies of the sort of journalist who manufactures a daily omniscience out of the teletype machine and the Encyclopaedia Britannica! And the lies of a professional patriot who assures us that our cause is so just that it doesn’t matter what injustice we commit in its name!” However, “the most fundamental of lies – that we lie to ourselves about ourselves… The Christian is the only man who does not go around all the time feeling guilty. For him, sin is a burden he can lay down...It is the unfortunate creature who denies the existence of sin in general, and his own in particular, who must go on carrying it forever.”</span><br data-dcnode-id="3645"><br data-dcnode-id="3644"><span data-dcnode-id="3643" instrument_node="">Davidman asserts, “The Tenth Commandment is unique; its predecessors deal with specific actions, but this alone forbids a state of mind.” How many times do I “ask the Lord, not for heaven, but for a way of keeping the automobiles and the television sets?...Seeing God face-to-face is our goal; the pleasures of life, and even life itself, are the means to it. Therefore the milk and honey and corn and wine and soft chairs and fine houses and swift automobiles – all those pleasant things! – exist primarily as a kind of currency of love; a means whereby men can exchange love with one another and thus become capable of the love of God” we can give away.</span><br data-dcnode-id="3642"><br data-dcnode-id="3641"><span data-dcnode-id="3640" instrument_node="">“What, then, must we pray for? Nothing that we have not been told over and over again; nothing but ‘Thy will be done’ even if his will is that we lose all…Our best wisdom may indeed ask God to save our way of life, but his wisdom might conceivably conclude that our way of life is too rich for our blood, what we need is a purge. At the moment we are still often seeking God not for himself but so that we can hire him as a night watchman to mammon.” In the end the antidote to covetousness “is to want God so much that we can’t be bothered with inordinate wants for anything else.”</span><br data-dcnode-id="3639"><br data-dcnode-id="3638"><span data-dcnode-id="3637" instrument_node="">How often do we slight the value of Christianity “as the passport to heaven in favor of its usefulness as a blueprint for remodeling earth...Only the Almighty can untangle the snarl of this world...The world itself, seen clearly, exists primarily… as a hothouse to nurse our growing spirits along until they’re strong enough for the unimaginable outdoors we call heaven.”</span><br data-dcnode-id="3636"></span><span data-dcnode-id="3634" instrument_node="">

        </span><span class="staticStars notranslate" data-dcnode-id="3566" title="did not like it"><span class="staticStar p10" data-dcnode-id="3571" size="15x15"><span data-dcnode-id="3572" instrument_node="">did not like it</span></span><span class="staticStar p0" data-dcnode-id="3570" size="15x15"></span><span class="staticStar p0" data-dcnode-id="3569" size="15x15"></span><span class="staticStar p0" data-dcnode-id="3568" size="15x15"></span><span class="staticStar p0" data-dcnode-id="3567" size="15x15"></span></span><span data-dcnode-id="3565" instrument_node="">

              </span><a class="actionLinkLite" data-dcnode-id="3562" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/review/list/38036772-annie%3Fshelf%3Dtheology"><span data-dcnode-id="3563" instrument_node="">theology</span></a><span data-dcnode-id="3561" instrument_node="">

</span><div class="reviewText stacked" data-dcnode-id="3362"><span data-dcnode-id="3556" instrument_node="">
</span><span class="readable" data-dcnode-id="3364" id="reviewTextContainer2620717435"><span data-dcnode-id="3555" instrument_node="">
</span><span data-dcnode-id="3544" id="freeTextContainer363254213799116928"><span data-dcnode-id="3554" instrument_node="">After reading her famous husband CS Lewis’s </span><a data-dcnode-id="3552" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/review/show/2569497038%3Fbook_show_action%3Dfalse%26from_review_page%3D1" rel="nofollow noopener"><span data-dcnode-id="3553" instrument_node="">horrifyingly vivid but beautiful account of his grief</span></a><span data-dcnode-id="3551" instrument_node=""> after her death, I was intrigued by Davidman and read </span><a data-dcnode-id="3549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/review/show/2620716348%3Fbook_show_action%3Dfalse%26from_review_page%3D1" rel="nofollow noopener"><span data-dcnode-id="3550" instrument_node="">her book of poetry</span></a><span data-dcnode-id="3548" instrument_node="">. It was pretty good, so here I am reading what’s arguably her most famous book, which is essentially an analysis of the Ten Commandments aka the Decalogue. </span><br data-dcnode-id="3547"><br data-dcnode-id="3546"><span data-dcnode-id="3545" instrument_node="">Disclaimer: I was raised Catholic, then settled into agnosticism, and these days I’m some weird hybrid of a lot of things, but would probably describe myself as a strict non</span></span><span data-dcnode-id="3543" instrument_node="">
</span><span data-dcnode-id="3369" id="freeText363254213799116928" style="display:none"><span data-dcnode-id="3542" instrument_node="">After reading her famous husband CS Lewis’s </span><a data-dcnode-id="3540" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/review/show/2569497038%3Fbook_show_action%3Dfalse%26from_review_page%3D1" rel="nofollow noopener"><span data-dcnode-id="3541" instrument_node="">horrifyingly vivid but beautiful account of his grief</span></a><span data-dcnode-id="3539" instrument_node=""> after her death, I was intrigued by Davidman and read </span><a data-dcnode-id="3537" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/review/show/2620716348%3Fbook_show_action%3Dfalse%26from_review_page%3D1" rel="nofollow noopener"><span data-dcnode-id="3538" instrument_node="">her book of poetry</span></a><span data-dcnode-id="3536" instrument_node="">. It was pretty good, so here I am reading what’s arguably her most famous book, which is essentially an analysis of the Ten Commandments aka the Decalogue. </span><br data-dcnode-id="3535"><br data-dcnode-id="3534"><span data-dcnode-id="3533" instrument_node="">Disclaimer: I was raised Catholic, then settled into agnosticism, and these days I’m some weird hybrid of a lot of things, but would probably describe myself as a strict non-scripturist with distinct Reform Jewish leanings. So in short, I’m kind of the exact opposite of Joy Davidman, a Jewish girl who converted to Catholicism and really, </span><i data-dcnode-id="3531"><span data-dcnode-id="3532" instrument_node="">really</span></i><span data-dcnode-id="3530" instrument_node=""> loves the Bible. Like. </span><i data-dcnode-id="3528"><span data-dcnode-id="3529" instrument_node="">Really.</span></i><span data-dcnode-id="3527" instrument_node=""> It’s kind of alarming. </span><br data-dcnode-id="3526"><br data-dcnode-id="3525"><span data-dcnode-id="3524" instrument_node="">To quote every reality show ever, Joy Davidman is not here to make friends. She’s here to beat you into submission, and by God, she wants you to LIKE IT.</span><br data-dcnode-id="3523"><br data-dcnode-id="3522"><span data-dcnode-id="3521" instrument_node="">Christianity, Davidman acknowledges, looks like old-people stuffiness to young people. “Get off my lawn!” “Don’t do this and don’t do that.” Where is the joy in that, Davidman wonders? God is the source of all joy, </span><i data-dcnode-id="3519"><span data-dcnode-id="3520" instrument_node="">“of fun and light and laughter, and we are meant to enjoy him.”</span></i><span data-dcnode-id="3518" instrument_node=""> But it’s hard to see that, sometimes, especially when you think about the Ten Commandments, which is a grumpy little list of “shoulds” and “should nots.” </span><br data-dcnode-id="3517"><br data-dcnode-id="3516"><span data-dcnode-id="3515" instrument_node="">And for that reason, lots of Christian pastors are/were trying to “bring God up to date”—make him hip. I don’t know what this meant in 1953, but in 2019, it means things like painfully bad Christian rock music in churches and bumper stickers that say things like “high on Jesus.”</span><br data-dcnode-id="3514"><br data-dcnode-id="3513"><span data-dcnode-id="3512" instrument_node="">Davidman thinks this is all a load of bull. </span><i data-dcnode-id="3510"><span data-dcnode-id="3511" instrument_node="">“When your child swallows poison, you don’t sit around thinking of ways to adapt his constitution to a poisonous diet. You give him an emetic.”</span></i><span data-dcnode-id="3509" instrument_node=""> Yes, the Ten Commandments are pretty severe, Davidman agrees. But so is getting crucified, so we should suck it up. Nay—we should find </span><i data-dcnode-id="3507"><span data-dcnode-id="3508" instrument_node="">joy</span></i><span data-dcnode-id="3506" instrument_node=""> in the severity.</span><br data-dcnode-id="3505"><br data-dcnode-id="3504"><span data-dcnode-id="3503" instrument_node="">Davidman, obviously, is a lot of fun at parties. </span><br data-dcnode-id="3502"><br data-dcnode-id="3501"><b data-dcnode-id="3499"><span data-dcnode-id="3500" instrument_node="">————THE COMMANDMENTS————</span></b><br data-dcnode-id="3498"><br data-dcnode-id="3497"><b data-dcnode-id="3492"><span data-dcnode-id="3496" instrument_node="">
</span><u data-dcnode-id="3494"><span data-dcnode-id="3495" instrument_node="">1, 2, &amp; 3. I’m God, no other gods please, I’m the best one, I know words, I have the best words.</span></u><span data-dcnode-id="3493" instrument_node="">
</span></b><span data-dcnode-id="3491" instrument_node=""> </span><br data-dcnode-id="3490"><br data-dcnode-id="3489"><span data-dcnode-id="3488" instrument_node="">Davidman thinks that today, it’s no longer pagan gods vs. Judeo-Christian God; it’s God vs. ourselves. Our political beliefs, like feminism and atheism and pacifism and communism, are our new gods. Well-intentioned at first, they replace our religion with their zeal. </span><br data-dcnode-id="3487"><br data-dcnode-id="3486"><i data-dcnode-id="3484"><span data-dcnode-id="3485" instrument_node="">“The greatest false gods: sex, the state, science, and society.”</span></i><span data-dcnode-id="3483" instrument_node=""> Wow, yeah, she really went there. Allllrighty then. </span><br data-dcnode-id="3482"><br data-dcnode-id="3481"><b data-dcnode-id="3476"><span data-dcnode-id="3480" instrument_node="">
</span><u data-dcnode-id="3478"><span data-dcnode-id="3479" instrument_node="">4) Sunday = Funday.</span></u><span data-dcnode-id="3477" instrument_node="">
</span></b><br data-dcnode-id="3475"><br data-dcnode-id="3474"><span data-dcnode-id="3473" instrument_node="">Davidman thinks the joy of devotion has been replaced by a “dull sense of duty”—people don’t work on the sabbath, but they can’t really be said to “keep it holy” either—they aren’t joyous in their celebration. It’s the memory of being forced to go to church on Sundays, Davidman says, that creates so many atheists (</span><i data-dcnode-id="3471"><span data-dcnode-id="3472" instrument_node="">“modern infidels”</span></i><span data-dcnode-id="3470" instrument_node=""> is a real phrase she uses). </span><br data-dcnode-id="3469"><br data-dcnode-id="3468"><b data-dcnode-id="3463"><span data-dcnode-id="3467" instrument_node="">
</span><u data-dcnode-id="3465"><span data-dcnode-id="3466" instrument_node="">5) Be nice to your parents.</span></u><span data-dcnode-id="3464" instrument_node="">
</span></b><span data-dcnode-id="3462" instrument_node=""> </span><br data-dcnode-id="3461"><br data-dcnode-id="3460"><span data-dcnode-id="3459" instrument_node="">Davidman laments the fact that the elderly are no longer cared for in the home, that mothers have to take jobs and outsource child care, that it’s normal to hate your in-laws, that teenagers are expected to be hostile to their parents.</span><br data-dcnode-id="3458"><br data-dcnode-id="3457"><span data-dcnode-id="3456" instrument_node="">Post-Industrial Revolution, </span><i data-dcnode-id="3451"><span data-dcnode-id="3455" instrument_node="">“we no longer </span><b data-dcnode-id="3453"><span data-dcnode-id="3454" instrument_node="">need</span></b><span data-dcnode-id="3452" instrument_node=""> our families— we are therefore free to love them with complete unselfishness,”</span></i><span data-dcnode-id="3450" instrument_node=""> Davidman points out (in one of her few good points)—but we squander this golden opportunity to show ourselves at our most decent.</span><br data-dcnode-id="3449"><br data-dcnode-id="3448"><span data-dcnode-id="3447" instrument_node="">On the other hand, Davidman points out, the same is true for the parents; if we want our children to honor us, we should act with honor, give them something to honor and to love freely. </span><br data-dcnode-id="3446"><br data-dcnode-id="3445"><b data-dcnode-id="3440"><span data-dcnode-id="3444" instrument_node="">
</span><u data-dcnode-id="3442"><span data-dcnode-id="3443" instrument_node="">6. Don’t murder anyone.</span></u><span data-dcnode-id="3441" instrument_node="">
</span></b><br data-dcnode-id="3439"><br data-dcnode-id="3438"><span data-dcnode-id="3437" instrument_node="">Davidman’s actually pretty flexible on this point. She’s definitely not a pacifist, and doesn’t want you to think Jesus was one, either. She’s very into the whole smiting-of-the-wicked concept. Fire and brimstone get this lady wet. </span><br data-dcnode-id="3436"><br data-dcnode-id="3435"><span data-dcnode-id="3434" instrument_node="">So don't worry, we can kill people, Davidman assures us, as long as it’s the infidels; we just have to feel a little bad about it afterwards. But mostly good. They needed smiting, after all. </span><br data-dcnode-id="3433"><br data-dcnode-id="3432"><b data-dcnode-id="3427"><span data-dcnode-id="3431" instrument_node="">
</span><u data-dcnode-id="3429"><span data-dcnode-id="3430" instrument_node="">7. Keep it in your pants.</span></u><span data-dcnode-id="3428" instrument_node="">
</span></b><br data-dcnode-id="3426"><br data-dcnode-id="3425"><span data-dcnode-id="3424" instrument_node="">Davidman uses this space to prattle on about how terrible it is that marriage has become secularized and that there’s even a legal (rather than religious) concept of marriage. Next. </span><br data-dcnode-id="3423"><br data-dcnode-id="3422"><b data-dcnode-id="3417"><span data-dcnode-id="3421" instrument_node="">
</span><u data-dcnode-id="3419"><span data-dcnode-id="3420" instrument_node="">8. Love your neighbor.</span></u><span data-dcnode-id="3418" instrument_node="">
</span></b><br data-dcnode-id="3416"><br data-dcnode-id="3415"><span data-dcnode-id="3414" instrument_node="">This was probably the most bizarre section. Davidman very doggedly insists that loving other people is purely a means to an end. </span><br data-dcnode-id="3413"><br data-dcnode-id="3412"><span data-dcnode-id="3411" instrument_node="">People today, she laments, have it reversed: they love God as means to the end—the end being loving other people—which opens them to “attack” by atheists, who ask, “Why not bypass God altogether and love our fellow men directly?” (Why, indeed?). Davidman’s response: idealists who try to love other people directly soon making the shocking discovery that people are not as lovable as God is. If you try to love them without God’s help, you’ll fail (will you though? I can't help but feel bad for CS Lewis here. Did he know his wife only loved him as a means to an end?). </span><br data-dcnode-id="3410"><br data-dcnode-id="3409"><b data-dcnode-id="3404"><span data-dcnode-id="3408" instrument_node="">
</span><u data-dcnode-id="3406"><span data-dcnode-id="3407" instrument_node="">9 &amp; 10. But don’t love your neighbor too much.</span></u><span data-dcnode-id="3405" instrument_node="">
</span></b><br data-dcnode-id="3403"><br data-dcnode-id="3402"><span data-dcnode-id="3401" instrument_node="">We’ve always been bad people, we are bad people now, we will always be bad people. This is more or less Davidman’s theory of everything. </span><i data-dcnode-id="3399"><span data-dcnode-id="3400" instrument_node=""> “An evil and adulterous generation, no doubt. But then, was there ever any other kind?”</span></i><br data-dcnode-id="3398"><br data-dcnode-id="3397"><span data-dcnode-id="3396" instrument_node="">That’s cheerful. </span><i data-dcnode-id="3394"><span data-dcnode-id="3395" instrument_node="">Joy</span></i><span data-dcnode-id="3393" instrument_node=""> Davidman has the most inapt name of all time. </span><br data-dcnode-id="3392"><br data-dcnode-id="3391"><br data-dcnode-id="3390"><b data-dcnode-id="3388"><span data-dcnode-id="3389" instrument_node="">————CONCLUSIONS————</span></b><br data-dcnode-id="3387"><br data-dcnode-id="3386"><span data-dcnode-id="3385" instrument_node="">Davidman is incredibly well-educated. The wit, the sharpness, the swiftly casual references to obscurities of ancient history—it’s impressive. I won’t pretend it’s not.</span><br data-dcnode-id="3384"><br data-dcnode-id="3383"><span data-dcnode-id="3382" instrument_node="">She’s also fanatical, anti-science, self-hating, and has a very bizarre concept of compassion. </span><br data-dcnode-id="3381"><br data-dcnode-id="3380"><span data-dcnode-id="3379" instrument_node="">She self-contradicts a lot (for instance, she hates communists, but also seems to hate capitalism—</span><i data-dcnode-id="3377"><span data-dcnode-id="3378" instrument_node="">“our society, in some aspects, is a vast confidence game”</span></i><span data-dcnode-id="3376" instrument_node="">). </span><br data-dcnode-id="3375"><br data-dcnode-id="3374"><span data-dcnode-id="3373" instrument_node="">And, honestly, she just has the most unpleasant opinions. Remind me why I read this again?</span><br data-dcnode-id="3372"><br data-dcnode-id="3371"><span data-dcnode-id="3370" instrument_node="">Oh yeah. That pleasant book of poetry. I feel so misled.</span></span><span data-dcnode-id="3368" instrument_node="">
</span><a data-dcnode-id="3366" data-text-id="363254213799116928" href="#" onclick="swapContent($(this));; return false;"><span data-dcnode-id="3367" instrument_node="">...more</span></a><span data-dcnode-id="3365" instrument_node="">

</span><span data-dcnode-id="3274" id="freeText1470694673279446792" style="display:none"><span data-dcnode-id="3287" instrument_node="">ENGLISH: Interesting. I liked more Joy's book about the Ten Commandments than C.S.Lewis's introduction, as he is one of my favorite authors. By the way, the information in Goodreads about this book is wrong, C.S.Lewis was not the author's husband when he wrote this introduction. Two years later they were married nominally, before the Administration, and four years later really, before God. This is a quotable quote from this book that I have selected as a sample. It is from chapter 11:</span><br data-dcnode-id="3286"><br data-dcnode-id="3285"><i data-dcnode-id="3283"><span data-dcnode-id="3284" instrument_node="">The good news out of Nazareth was never reassuring news by this world's standards; reassuring news has a way of coming from the devil. </span></i><br data-dcnode-id="3282"><br data-dcnode-id="3281"><span data-dcnode-id="3280" instrument_node="">SPANISH: Es curioso que me gustara más el libro de Joy sobre los Diez Mandamientos que la introducción de C.S.Lewis, que es uno de mis autores favoritos. Por cierto, la información que tiene Goodreads sobre este libro está equivocada, porque C.S.Lewis no era el marido de la autora cuando escribió esta introducción. Dos años más tarde se casaron nominalmente, ante la Administración Pública, y cuatro años más tarde se casaron de verdad, ante Dios. Adjunto una cita de este libro que he seleccionado como muestra. Es del capítulo 11:</span><br data-dcnode-id="3279"><br data-dcnode-id="3278"><i data-dcnode-id="3276"><span data-dcnode-id="3277" instrument_node="">La buena noticia de Nazareth nunca fue una noticia tranquilizadora según los estándares de este mundo; las noticias tranquilizadoras suelen venir del diablo. </span></i><br data-dcnode-id="3275"></span><span data-dcnode-id="3273" instrument_node="">

</span><a class="reviewDate createdAt right" data-dcnode-id="3134" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/review/show/190101841%3Fbook_show_action%3Dtrue"><span data-dcnode-id="3135" instrument_node="">Jul 26, 2011</span></a><span data-dcnode-id="3133" instrument_node="">

        rated it
        </span><span class="staticStars notranslate" data-dcnode-id="3120" title="it was amazing"><span class="staticStar p10" data-dcnode-id="3125" size="15x15"><span data-dcnode-id="3126" instrument_node="">it was amazing</span></span><span class="staticStar p10" data-dcnode-id="3124" size="15x15"></span><span class="staticStar p10" data-dcnode-id="3123" size="15x15"></span><span class="staticStar p10" data-dcnode-id="3122" size="15x15"></span><span class="staticStar p10" data-dcnode-id="3121" size="15x15"></span></span><span data-dcnode-id="3119" instrument_node="">

</span><span class="readable" data-dcnode-id="3045" id="reviewTextContainer190101841"><span data-dcnode-id="3115" instrument_node="">
</span><span data-dcnode-id="3110" id="freeTextContainer10014834932221833651"><span data-dcnode-id="3114" instrument_node="">Romans and the Psalms are pretty important. The Gospels, Major Prophets, a few Epistles, maybe a dozen more books from the Hebrew Bible, all deeply valuable. After that, what is the next book a Christian should read? With all due respect for the whole of Scripture, I’m taking </span><i data-dcnode-id="3112"><span data-dcnode-id="3113" instrument_node="">Smoke on the Mountain</span></i><span data-dcnode-id="3111" instrument_node=""> over Jude and Philemon! Quite simply, Joy Davidman has written such a clear description of Biblical guidance for discipleship and a defense of the very relevance of the Bible for modern living, that an</span></span><span data-dcnode-id="3109" instrument_node="">
</span><span data-dcnode-id="3050" id="freeText10014834932221833651" style="display:none"><span data-dcnode-id="3108" instrument_node="">Romans and the Psalms are pretty important. The Gospels, Major Prophets, a few Epistles, maybe a dozen more books from the Hebrew Bible, all deeply valuable. After that, what is the next book a Christian should read? With all due respect for the whole of Scripture, I’m taking </span><i data-dcnode-id="3106"><span data-dcnode-id="3107" instrument_node="">Smoke on the Mountain</span></i><span data-dcnode-id="3105" instrument_node=""> over Jude and Philemon! Quite simply, Joy Davidman has written such a clear description of Biblical guidance for discipleship and a defense of the very relevance of the Bible for modern living, that anyone interested in faith—-any religion, any commitment, any complaints—-must read this classic. </span><br data-dcnode-id="3104"><br data-dcnode-id="3103"><span data-dcnode-id="3102" instrument_node="">Few passages of Scripture are more famous, or infamous, than the Ten Commandments. Their content and purpose, however, are so often distorted, misunderstood or ignored, that they can seem little more than a relic of Christendom, some awkward artifact that may have mattered in some society, somewhere, but not today. Coveting? Sabbath? Seriously! From believers overwhelmed by contemporary culture, or the good intentions of finger-wagging preachers, and even from secular critics of pietistic religion, the Commandments have become a cultural parody, a shallow and outmoded list, and no more than a </span><i data-dcnode-id="3100"><span data-dcnode-id="3101" instrument_node="">list</span></i><span data-dcnode-id="3099" instrument_node="">, of God’s arbitrary rules. Then comes this interpretation… </span><br data-dcnode-id="3098"><br data-dcnode-id="3097"><span data-dcnode-id="3096" instrument_node="">With near perfect writing—-sharp, scholarly, but not pedantic—-and stunning theological insight, </span><i data-dcnode-id="3094"><span data-dcnode-id="3095" instrument_node="">Smoke</span></i><span data-dcnode-id="3093" instrument_node=""> reveals the Law as God’s holy gift rather than dour demands. Davidman uses clever stories, biting social criticism, and the lens of Jesus’ Sermon on the Mount to turn the Commandments back from our “dull denial” to its original, positive “thrilling affirmation.” (15) And how thrilling it is! This is the sort of book that can compel one reader to devour it in one sitting, and another to pause and to reflect at nearly every page (excepting some saccharine moments in the last chapter). Her analysis is packed with truth, the sort of truth that we know so deeply in our hearts that we never can or do put words to it. Every chapter is an ‘Aha!’ moment, one surprising application of the Bible to modern life after another, after another, for ten fascinating Commandments. </span><br data-dcnode-id="3092"><br data-dcnode-id="3091"><span data-dcnode-id="3090" instrument_node="">Perhaps the most surprising aspect of </span><i data-dcnode-id="3088"><span data-dcnode-id="3089" instrument_node="">Smoke</span></i><span data-dcnode-id="3087" instrument_node=""> is how modern it is at all. Though published in 1953, the social ills that Davidman address, especially materialistic greed, seem nearly identical to today’s problems. Change “Negro” to “homosexual”, and maybe strengthen her soft feminism, and the book will speak as well to college students now, as it did to her and her husband’s students back in the mis-perceived golden age of Western Christianity. (She married CS Lewis in 1957.) And yet, this is no post-modern or sneaky contemporary manipulation of Scripture. As Davidman explains, “Mustn’t the churches adapt Christianity to suit the ideas of our time? No, they must not. Our ideas are killing us spiritually.” (20)</span><br data-dcnode-id="3086"><br data-dcnode-id="3085"><span data-dcnode-id="3084" instrument_node="">This analysis of the Commandments uses close enough textual and exegetical care. Davidman’s real skill, however, is placing each Commandment in simultaneous contexts of the ancient Hebrew world, 1st century Palestine, and our own day. Often enough our situation demands a special interpretation, but usually our shared human nature receives the same message. For instance, “The frightened men of Christ’s day, groaning under the intolerable social security of the Roman peace, turned to their law and found only a tangle of gobbledygook. Like us, they could obey it blindly or reject it blindly; but they could not possibly make sense of it.” (16) So, how did Christ, and how should we, make sense of the ‘gobbledygook’ that grew up around ten simple commands? To review Davidman’s answer, let us use her voice as often as possible. It is just too good for me to summarize!</span><br data-dcnode-id="3083"><br data-dcnode-id="3082"><span data-dcnode-id="3081" instrument_node="">1)	The polytheistic contexts of the Ancient Hebrew people and 1st century Palestine are not quite the same as our secularized world: “With some of us, the question is not One against many, but One against none.” (23) But we do have false gods, those of sex, state, technology, culture and even ethics. We obey our desires and beliefs, addictions, influences and values with barely a second thought. Even worse, we sanctify our sides, calling down God’s blessing before ever acknowledging God’s place before the issue at hand. So, let us remember, “Today the Commandment, ‘Thou shalt have no other gods before me’ must include, ‘Thou shalt have me’.” (23)</span><br data-dcnode-id="3080"><br data-dcnode-id="3079"><span data-dcnode-id="3078" instrument_node="">2)	 “What shape is your idol?” (31) Lexus-shaped, or organic-shaped, or self-shaped? At some point long ago people worshiped impotent objects, rationalizing, “if Mumbo Jumbo is so hard to please, what a very great Mumbo Jumbo he must be!” (34) Jesus’ contemporaries understood that “The rigid Hebrew rule kept you from ornamenting your furniture, but it never kept you from worshiping your furniture.” (34) Plenty of us have can follow this for furniture or luxury, but rarely do preachers go the full measure to condemn the American dream that so destroys souls. Perhaps Davidman’s central interpretation of the Ten Commandments for today is this: “Idolatry’s other name is materialism.” (35) An attack like this against capitalism was dangerous for Davidman, a former member of the Communist Party writing amidst McCarthyism. For us, resisting hyper-capitalism might be safer but seems just as foreign. The problem is not just that the quality of Western living selfishly steals resources from other people (that’s a matter for #8), but that the whole basis of our comfortable livelihood has become almost sanctified beyond reproach. Almost. “An idol is only an inanimate object that can do no harm… So is a gun… Idolatry lies not in the idol but in the worshiper. It is a psychological attitude that governs his whole life, and a very murderous attitude… If we are to be saved, it will not be by wood, however well carved or polished; nor by machines, however efficient; nor by social planning, however ingenious. If we are to be saved, it must be by the one power that is built into a man at his beginning and that he does not have to make with his hands-—the power of the Holy Spirit, which is God.” (39)</span><br data-dcnode-id="3077"><br data-dcnode-id="3076"><span data-dcnode-id="3075" instrument_node="">3)	In the past believers mistook the power of God for the name of God, and feared misusing or abusing that power through that name. Some Jews won’t write the name, and a few of us still cringe to hear it profaned. More importantly for Davidman, “Today, with two thousand years of additional practice, we have invented many new ways of breaking the Third Commandment. We still misuse God’s power and we still despise it; we call upon God to justify our sins; we commit the ultimate blasphemy of not calling upon God at all.” (44) Mainly, we abuse God’s powerful name in “the sin of believing in one’s righteousness.” (46) Thus, we must take our own care to understand the ironic message of this ‘Shall Not’ command: “Thou shalt take the name of the Lord thy God in earnest!” (48)</span><br data-dcnode-id="3074"><br data-dcnode-id="3073"><span data-dcnode-id="3072" instrument_node="">4)	Many theologians interpret the Fourth Commandment as more about rest than worship. For her part, Davidman points out: “Question a dozen modern infidels about their childhood, and half of them will trace their atheism to endless, dull, bleak Sundays in a negatively ‘Christian’ household which made a child’s life seem hardly worth living.” (53) And so, with the notable exception of a growth of non-Sunday worship opportunities, we Westerners continue to give up on church. “Sunday is still a holiday to all of us, but for many it has long since ceased to be a holy day.” (51) How do we return to rest and worship for “the sheer fun of it”? (58)</span><br data-dcnode-id="3071"><br data-dcnode-id="3070"><span data-dcnode-id="3069" instrument_node="">5)	In the Hebrew worldview, people valued family and tribe far more than individuality. Today, with American families more and more dysfunctional and expendable, we can wonder, “Were it really true that sons and fathers are natural enemies, how could mankind ever have dreamed of such a thing as the Fatherhood of God?” (65) Why has our whole society turned such a cold shoulder to family, and such a warm reception to individualism? “No gain in social efficiency can save a community that offends against the little ones. And let us be honest about it: our modern cities have created a society in which children are in the way.” (66) Interestingly, this is the one place Smoke does not offer any clear advice to interpret the command for modern life. Davidman is almost hopeless, that we can do any more than offer more leisure—-today we call it quality time, and we all know how hard that is to find—and remind us that the best things in life are relationships. </span><br data-dcnode-id="3068"><br data-dcnode-id="3067"><span data-dcnode-id="3066" instrument_node="">6)	One of Jesus’ shocking ideas was to abandon the logic of ‘eye-for-an-eye’, and recognize how spiritually harmful violence is, how easily it spirals physically and emotionally. Davidman is careful (too careful?) to not make him out as a pacifist, but still as a broad interpreter of the Sixth Commandment. For today we must come clean that, “Anyone who studies our poisonous drugs, our de-natured food, our deathtrap automobiles and houses, our lung-rotting cities, must conclude that we accept a good deal of murder as inevitable simply because it is done to make or save money.” (78) We must find a better way. Defending one war or protesting one type of health care decision, be it abortion or Obamacare, is not the issue. At the root, “We are aware… that we often do things for mammon’s sake and pretend we are doing them for God.” (81) </span><br data-dcnode-id="3065"><br data-dcnode-id="3064"><span data-dcnode-id="3063" instrument_node="">7)	In ancient times, “The adultery forbidden in the Seventh Commandment originally meant any infringement of the man’s rights-—and, possibly, nothing more.” (87) How refreshing, then, that “Every statement our Lord made about sexuality works to protect women and to awaken men to their own responsibilities.” (89) So, a faithful reading will greatly expand to cover our approach any sexual politics. This by no means weakens the fact that “the command is there and is perfectly clear as far as it goes.” (88) Can the Church teach better and provide better examples of marriage? Or, would CS Lewis’ suggestion be helpful, to organize civil unions alongside church-sanctioned marriage (93), for hetero- Christians, mind you? </span><br data-dcnode-id="3062"><br data-dcnode-id="3061"><span data-dcnode-id="3060" instrument_node="">8)	Most folks think the Eighth Commandment is one of the clear ones. Instead, Davidman points out that changing attitudes of ownership and property have confused our understanding of ‘stealing’. Consider the current issue with downloading/stealing digital content. Or more generally, “Our society tends to denounce force, particularly when used by the poor, and extenuate fraud, particularly when employed by the rich.” (98) Need or greed? Christians should read their Bible: “the Old Testament, in The Psalms and The Proverbs and the Prophets, condemns the dishonest rich far more strongly than the desperate poor.” (99) So, what is stealing all about? Davidman’s interpretation is that, “property is neither sin nor inalienable right, but a loan, a trust from God.” (99) And yet the Church is so slow to follow this sort of attitude. Whether from naughty pastors, the evil proponents of the current wealth divide, or all of us who slide into the lap of sanctified comfort, no Commandment has been more systematically broken, and defended, than simple #8.</span><br data-dcnode-id="3059"><br data-dcnode-id="3058"><span data-dcnode-id="3057" instrument_node="">9)	Perhaps the most straightforward command can still be generalized. We do not witness merely by not lying, or telling the whole truth, not even by evangelizing well. True witness encompasses our whole being. “The Hebrews began to feel that there was something a little smelly about all tampering with the truth. And when Christ came, his fiercest wrath was for the hypocrite… Let us make note of the hypocrite; we shall meet him again, every last one of us, any time we care to look into the mirror.” (108) All of us slip into false living, and “No doubt we often bewilder ourselves successfully about our motives… For the only way to get rid of a sin is to admit it.” (112-113)</span><br data-dcnode-id="3056"><br data-dcnode-id="3055"><span data-dcnode-id="3054" instrument_node="">10)	Less true now than even five years ago, Davidman is still correct that, “To some extent we have realized the dream” (117) of riches and opportunity. “Yet there is one indispensible condition of paradise lacking. We are not happy in the place. Nor, for that matter, can we honestly maintain that we are completely just and peaceful and loving it.” (118) Raping our planet and fighting our neighbor for every dollar seems vital for happiness, but who is really happy with the Rat Race? “In the nineteenth century, some pious money-makers argued that wealth was God’s reward of their virtue, and that therefore a poor man had no right to be angry. But today our materialist reformers seem to argue that wealth is virtue”. (123-124) Instead, we are called to trust God, and to pray that ‘Thy will be done’. To that goal, Christians, we are in a sorry state. To hold out hope, however, “It is a poor sort of faith that imagines Christ defeated by anything men can do. Make no mistake: he has already survived everything we can do to him.” (135) Then again, to grace, our call is repentance. “The good news out of Nazareth was never reassuring news by this world’s standards; reassuring news has a way of coming from the devil. For a long time we have been trying to make the best of both worlds, to accept Christianity as an ideal and materialism as a practice, and in consequence we have reached a spiritual bankruptcy”. (139) </span><br data-dcnode-id="3053"><br data-dcnode-id="3052"><span data-dcnode-id="3051" instrument_node="">Moses gave the Ten Commandments to a landless group of runaway slaves. Somehow, in God’s wisdom, those words reach across the centuries and cultures to apply sharply to our over-stuffed context. Davidman concludes: “Christianity, if we ever embrace it not for our own worldly advantage but through surrender to God, will not only enable us to obey the Ten Commandments but enable us to enjoy it; not only save this transitory world for the few perplexed years we spend in it, but bring us out of this noise and darkness and helplessness and terror that we call the world into the full Light: Light we remember from our childhood dreams, and from glimpses through music and art and the ecstasy of first love; Light we have known through a brief glow in our few moments of really selfless charity; Light which, in our secret hearts, we desire more than money and sex and power and the pride of self. We men are all thieves who have stolen the self which was meant as a part of God and tried to keep it for ourselves alone. But if we give it up again, we might hear the words he spoke to a penitent thief once: Today shalt thou be with me in paradise.’” (139)</span></span><span data-dcnode-id="3049" instrument_node="">

</span><span data-dcnode-id="2956" id="freeTextContainer8396054573414529197"><span data-dcnode-id="2960" instrument_node="">Smoke on the Mountain, An Interpretation of the Ten Commandments. Joy Davidman. Westminster Press, Phil. 1953, 139 pp.</span><br data-dcnode-id="2959"><br data-dcnode-id="2958"><span data-dcnode-id="2957" instrument_node="">I found this to be an extraordinary book. The author’s insights into the commandments are full of the sharp bite and paradox of the Christian writers of C.S. Lewis’ generation. The chapters towards the end struck me very hard as being contemporary! Ch. VIII (she follows the Protestant numbering of the commandments), “You Can’t Cheat an Honest Man” hits marvelously on social justi</span></span><span data-dcnode-id="2955" instrument_node="">
</span><span data-dcnode-id="2892" id="freeText8396054573414529197" style="display:none"><span data-dcnode-id="2954" instrument_node="">Smoke on the Mountain, An Interpretation of the Ten Commandments. Joy Davidman. Westminster Press, Phil. 1953, 139 pp.</span><br data-dcnode-id="2953"><br data-dcnode-id="2952"><span data-dcnode-id="2951" instrument_node="">I found this to be an extraordinary book. The author’s insights into the commandments are full of the sharp bite and paradox of the Christian writers of C.S. Lewis’ generation. The chapters towards the end struck me very hard as being contemporary! Ch. VIII (she follows the Protestant numbering of the commandments), “You Can’t Cheat an Honest Man” hits marvelously on social justice. See p. 99 which is a perfect analog to Trump as Cyrus. Ch. IX, “Jesting Pilate,” wittily goes from her English background on the propaganda misuse of Titus Oates to the normal calumnies of piety, pp. 107 and 109. Much deeper is the notion that truth does not exist, which is the background for habitual lying. P. 111. And finally, Ch. X, “The Moth and the Rust.” The author hits well at the assumption that modernity in its industrial might will satisfy us.</span><br data-dcnode-id="2950"><br data-dcnode-id="2949"><span data-dcnode-id="2948" instrument_node="">She is thought-provoking…</span><br data-dcnode-id="2947"><br data-dcnode-id="2946"><span data-dcnode-id="2945" instrument_node="">7	Forward by CS Lewis. Joy Davidman is one who comes to us from the second generation of unbelief; her parents, Jewish in blood, “rationalists” by conviction. This makes her approach extremely interesting to the reclaimed apostates of my own generation; the daring paradoxes of our youth were the stale platitudes of hers. “Life is only an electrochemical reaction. Love, art, and altruism are only sex. The universe is only matter. Matter is only energy. I forget what I said energy is only”; thus she describes the philosophy with which she started life.</span><br data-dcnode-id="2944"><br data-dcnode-id="2943"><span data-dcnode-id="2942" instrument_node="">15	We are in danger of forgetting that God is not only a comfort but a joy. He is the source of all pleasures; he is fun and /16 light and laughter, and we are meant to enjoy him. Otherwise our Christianity is no better than the cannibal’s [negatives]. We shall try to be negatively good, and make a virtue of misery; plume ourselves on the rejection of delights for which we are too weak, measure our piety by the number of pleasures we prohibit. And others will react against us by rejecting religion altogether, probably announcing with pride that they are choosing “life” instead. Saint Augustine phrased the Christian law as: ”Have charity and do what you like.” The modern materialist often makes it simply: “Do what you like,” and then rushes off to ask his psychoanalyst why he no longer seems to like anything. Whereas he Pharisee, alas, tends to invert Augustine into: “Neither do what you like nor have charity.”</span><br data-dcnode-id="2941"><br data-dcnode-id="2940"><span data-dcnode-id="2939" instrument_node="">20	“Thou shalt not” is the beginning of wisdom. But the end of wisdom, the new law, is “Thou shalt.” To be Christian is to be old? Not a bit of it. To be Christian is to be reborn, and free, and unafraid, and immortally young.</span><br data-dcnode-id="2938"><br data-dcnode-id="2937"><span data-dcnode-id="2936" instrument_node="">I GOD COMES FIRST</span><br data-dcnode-id="2935"><br data-dcnode-id="2934"><span data-dcnode-id="2933" instrument_node="">24 Then, too, we are really not bad enough for undisguised self-worship. We have inherited two thousand years of Cristian tradition; we have inherited, also, that innate moral sense of all mankind which makes even the most corrupt of us yearn vaguely for something better than himself to serve. And so we disguise the beast in the heart as a worthy cause; we borrow some shining virtue from heaven to robe in in, and make it into a false gd. We proclaim that man will find salvation in art or science or education, in ending poverty or ending prejudice, in world government or in no government at all – everywhere but in the knowledge of the One.</span><br data-dcnode-id="2932"><br data-dcnode-id="2931"><span data-dcnode-id="2930" instrument_node="">They are hybrid creatures, our beast gods. Their strength comes from the true God, their weakness from disguised self-worship. … the really dangerous beasts are those cast in nobler shapes, with benevolent human masks on their faces. We call them by such names as human dignity, world peace, and freedom from want. And we revere them so deeply that we scream with horror when some iconoclast points out that at best they are means, not ends.</span><br data-dcnode-id="2929"><br data-dcnode-id="2928"><span data-dcnode-id="2927" instrument_node="">For of course such causes are good things – if we see them as angels, messengers of God, means by which we may come 25/ to know him, they are strong angels indeed. But if we make them our sole ends, they may easily become strong fiends. …</span><br data-dcnode-id="2926"><br data-dcnode-id="2925"><span data-dcnode-id="2924" instrument_node="">Almost all of us, nowadays, are placing one or more of these false gods before God. The atheist gives himself wholly to his worthy cause, often achieving a burning singleness of purpose that makes him seem more religious than the religious; witness the whole-souled devotion for which the churches often envy the Communists. For the churchman is not capable of this evil simplicity. His heart is divided; he wants to worship both God and the beast. He speaks of God and country, God and prosperity, God and peace; forgetting, in the conscious nobility of his goal, that no man can serve two masters; forgetting, “Thou shalt have no other gods before me, or in addition to me.”</span><br data-dcnode-id="2923"><br data-dcnode-id="2922"><span data-dcnode-id="2921" instrument_node="">II GODS MADE WITH HANDS</span><br data-dcnode-id="2920"><br data-dcnode-id="2919"><span data-dcnode-id="2918" instrument_node="">36	Unlike Buddhists and Hindus, Christians have usually held that the good things of this life are good indeed, that all enjoyment is a foreshadowing of our ultimate enjoyment of God. Our earthly loves and joys are meant to lead us to Christ, and we may certainly ask the Christ in whom we believe to preserve them for us. Yet this is very different from using Christ without believing in him—from making Christian doctrine into a propaganda weapon, a pep talk to hearten us to go out and fight for good old materialism. We must return to Chris-/37 anity in order to preserve the things we value—but we cannot return to Christianity at all unless the thing we value above all else is Christ. If we are reviving religion only in order to defend our own works, from the American Constitution down to the famous American blueberry [pie, we are in effect asking Christ to save our idols for us.</span><br data-dcnode-id="2917"><br data-dcnode-id="2916"><span data-dcnode-id="2915" instrument_node="">VIII YOU CAN’T CHEAT AN HONEST MAN</span><br data-dcnode-id="2914"><br data-dcnode-id="2913"><span data-dcnode-id="2912" instrument_node="">99	While in the camp of mammon we find such enthusiasts for capitalism as the current publication Christian economics, which proclaims, “We stand for free competitive enterprise,” “Profit is essential and Christian,” and even, “The only sure way to make money that I know of is to follow the teachings of Jesus.” And these too find texts to support them. Perhaps the ultimate depth in this view of Jesus as chief executive assistant to mammon was reached by Bruce Barton’s incredible The Man Nobody Knows, which justified its portrayal of our Lord as an American big business leader by quoting on the title page, “Wist ye not that I must be about my Father’s business?”</span><br data-dcnode-id="2911"><br data-dcnode-id="2910"><span data-dcnode-id="2909" instrument_node="">102 Nowadays some reactionaries talk as if Christ had invented capitalism, and some progressives talk as if modern science had invented Government regulation, and both are talking nonsense. Government regulation of the use and tenure of property is exactly as old as government; indeed, we may question whether, without it, any government could exist at all “traditional” laissez-faire capitalism on th other hand is a novelty of the last two centuries and a profoundly revolutionary one, somewhat in the spirit of that revolution by which hell hopes to conquer heaven. The problem that most concerns us, however, is not whether a given system is radical/ 103 or reactionary, but whether it is honest and workable. And perhaps the two adjectives are really one; perhaps a society must be honest in order to be workable.</span><br data-dcnode-id="2908"><br data-dcnode-id="2907"><span data-dcnode-id="2906" instrument_node="">IX JESTING PILATE</span><br data-dcnode-id="2905"><br data-dcnode-id="2904"><span data-dcnode-id="2903" instrument_node="">111	“’What is truth? Said jesting Pilate; and would not stay for an answer.” … perhaps what unsettles the modern mind most is its despair of ever knowing truth amid the conflicting and untrustworthy and very dusty answers we get in our daily life. There are people who believe that not only are there no truths, but there are not even facts—all is a matter of “subjective values.” Whatever the merits of this as philosophy, its practical use is often as a method of evasion and rationalization, a means to the loss of faith and the loss of honor. We have all heard the arguer who, driven into a corner by relentless proof, slips away with an easy, “Oh, well, it’s all in how you think of it, isn’t it?”</span><br data-dcnode-id="2902"><br data-dcnode-id="2901"><span data-dcnode-id="2900" instrument_node="">X THE MOTH AND THE RUST</span><br data-dcnode-id="2899"><br data-dcnode-id="2898"><span data-dcnode-id="2897" instrument_node="">119	We have planned for the more abundant life; we have exalted free competition, i.e., the desire to get more of the world’s rewards than our neighbor; we have declared (to quote D.R. Davies’ provocative The Sn of Our Age)that “the consumption of things … The dogma of the new religion is happiness from an insatiable appetite which, no matter how it stuffs its belly, is still psychologically like Oliver Twist in the poorhouse, holding up an empty bowl and begging, “I want some more”? Isn’t it possible that our dram of the good society contained, form the beginning, a hidden violation of the Tenth Commandment—“Thou shalt not covet thy neighbor’s goods”?</span><br data-dcnode-id="2896"><br data-dcnode-id="2895"><span data-dcnode-id="2894" instrument_node="">126	What, then, must we pray for? Nothing that we have not been told over and over again; nothing but “thy will be done,” even if his will is that we lose al that the last two hundred years have given us. We must pray to face our fear honestly. There is no use pretending that our elaborate technology can’t be destroyed; like all other civilizations, it can.</span><br data-dcnode-id="2893"></span><span data-dcnode-id="2891" instrument_node="">

</span><span data-dcnode-id="2810" id="freeTextContainer2366410712659040219"><span data-dcnode-id="2817" instrument_node="">Although many know her primarily as the wife of C.S. Lewis--and therefore the subject of his grief in "A Grief Observed"--Joy Davidman was an accomplished writer in her own right, even to the point of winning multiple awards for her writing.</span><br data-dcnode-id="2816"><br data-dcnode-id="2815"><span data-dcnode-id="2814" instrument_node="">Among her works are two novels, two volumes of poetry, and "Smoke on the Mountain."</span><br data-dcnode-id="2813"><br data-dcnode-id="2812"><span data-dcnode-id="2811" instrument_node="">Smoke on the Mountain is a concise but thoughtful meditation on the Ten Commandments. Joy came from a Jewish background but became a committed Communist in her youth (her first</span></span><span data-dcnode-id="2809" instrument_node="">
</span><span data-dcnode-id="2776" id="freeText2366410712659040219" style="display:none"><span data-dcnode-id="2808" instrument_node="">Although many know her primarily as the wife of C.S. Lewis--and therefore the subject of his grief in "A Grief Observed"--Joy Davidman was an accomplished writer in her own right, even to the point of winning multiple awards for her writing.</span><br data-dcnode-id="2807"><br data-dcnode-id="2806"><span data-dcnode-id="2805" instrument_node="">Among her works are two novels, two volumes of poetry, and "Smoke on the Mountain."</span><br data-dcnode-id="2804"><br data-dcnode-id="2803"><span data-dcnode-id="2802" instrument_node="">Smoke on the Mountain is a concise but thoughtful meditation on the Ten Commandments. Joy came from a Jewish background but became a committed Communist in her youth (her first volume of poetry was titled "Letter to a Comrade") before converting to Christianity . . . after she discovered the writings of C.S. Lewis. So needless to say, she brings a well-rounded perspective with her.</span><br data-dcnode-id="2801"><br data-dcnode-id="2800"><span data-dcnode-id="2799" instrument_node="">(Lewis writes the foreword to Smoke on the Mountain and confesses to being a bit embarrassed that she quotes him so much in her text -- I counted about half a dozen quotations, mostly from Mere Christianity)</span><br data-dcnode-id="2798"><br data-dcnode-id="2797"><span data-dcnode-id="2796" instrument_node="">If one of the measures of a great book is how well it speaks across the years, even to a time distant from the one in which it was written, then Smoke on the Mountain certainly passes the test.</span><br data-dcnode-id="2795"><br data-dcnode-id="2794"><span data-dcnode-id="2793" instrument_node="">"So rapidly does 'the common good,' without God behind it, sink into a mere blown-up projection of each man's private desire! So readily does 'the welfare of society' become a cloak for the seizure of power by an individual or a clique! The religion of Society has in our time become a well-organized worship [ . . . ] And in all this we have the best intentions, as did the Spanish Inquisition. The 'common good,' may become a moloch to which countless individuals are sacrificed, if we forget that all good is in the love of God, and that God comes first."</span><br data-dcnode-id="2792"><span data-dcnode-id="2791" instrument_node="">~Ch. 1, p. 28</span><br data-dcnode-id="2790"><br data-dcnode-id="2789"><span data-dcnode-id="2788" instrument_node="">I fear her warning about the dangers of cloaking very bad ideas behind very good intentions are no less relevant than they were when she wrote this in 1953.</span><br data-dcnode-id="2787"><br data-dcnode-id="2786"><span data-dcnode-id="2785" instrument_node="">Joy makes several intriguing points about each of the Ten Commandments that are worth thinking about, but in the end, perhaps the most important thing she does is to bring her argument back to what Jesus said are the two greatest commandments of all: to love God with everything in you and to love your neighbor as yourself. Unless those two priorities are in order, nothing will work like it should.</span><br data-dcnode-id="2784"><br data-dcnode-id="2783"><span data-dcnode-id="2782" instrument_node="">"It is a poor sort of faith that imagines Christ defeated by anything men can do. Make no mistake: he has already survived everything we can do to him. And as for saving the world, we ought to remember that he has done that too by his method, not ours--the method of opening the door to the Kingdom of Heaven. Of course, God wants us to set our social house in order and to solve our economic problems. But not because he cares about house cleaning and problem-solving; because he cares about us."</span><br data-dcnode-id="2781"><span data-dcnode-id="2780" instrument_node="">~Ch. 11, p. 135</span><br data-dcnode-id="2779"><br data-dcnode-id="2778"><span data-dcnode-id="2777" instrument_node="">In a time where it is all too easy to despair about anything and everything, there are few reminders more needed than the reminder that all good (whether personal good or the good of society) begins with God . . . and that until we realize this, we will continue to see the same problems happening in our lives and in our world, over and over again.</span></span><span data-dcnode-id="2775" instrument_node="">

</span><span data-dcnode-id="2590" id="freeText12990179319392397271" style="display:none"><span data-dcnode-id="2598" instrument_node="">A sweet friend at church loaned me this book, written by Joy Davidman who was to become Joy Lewis, wife of C.S. Lewis. </span><br data-dcnode-id="2597"><br data-dcnode-id="2596"><span data-dcnode-id="2595" instrument_node="">*********************</span><br data-dcnode-id="2594"><span data-dcnode-id="2593" instrument_node="">An interesting book to read, knowing who Joy would become (Mrs. Lewis). The book is dedicated to C.S. Lewis and she discussed some of the sections she was writing with him via letters. Since her background was as a strident atheist Jew who became a strident atheist Communist, it is no wonder that Joy's writing is very acerbic and sometimes smacks you up the side of the head. I found it hard to pay attention sometimes to her point because I was reeling from the "point" she had just made with some significant force. Her mind is quick and her discussions are well crafted, but it just not the gentlest book that I've ever read. I am on her side of the argument, but I'm not sure that if I weren't already there that she would convince me of changing. In the "speaking the truth in love", she's got the "speaking the truth" down well, but the "in love" portion is lacking. </span><br data-dcnode-id="2592"><span data-dcnode-id="2591" instrument_node=""> </span></span><span data-dcnode-id="2589" instrument_node="">

</span><span data-dcnode-id="2284" id="freeText3553810507270646443" style="display:none"><span data-dcnode-id="2315" instrument_node="">I thoroughly enjoyed this book. Highly recommended. I'll definitely be revisiting this one in the future. It is a refreshing examination of the Ten Commandments. Following are some quotes that might pique your interest, from the author.</span><br data-dcnode-id="2314"><br data-dcnode-id="2313"><span data-dcnode-id="2312" instrument_node="">“We are in danger of forgetting that God is not only a comfort but a joy. He is the source of all pleasures; he is fun and light and laughter, and we are meant to enjoy him." </span><br data-dcnode-id="2311"><br data-dcnode-id="2310"><span data-dcnode-id="2309" instrument_node="">"Thou shalt not" is the beginning of wisdom. But the end of wisdom, the new law, is "Thou shalt." ...To be Christian is to be reborn, and free, and unafraid, and immortally young." </span><br data-dcnode-id="2308"><br data-dcnode-id="2307"><span data-dcnode-id="2306" instrument_node="">"Most ordinary people who lose their faith are not overthrown by philosophical argument; they lose faith because they are disillusioned by the church men they meet. One sanctimonious hypocrite makes a hundred unbelievers." </span><br data-dcnode-id="2305"><br data-dcnode-id="2304"><span data-dcnode-id="2303" instrument_node="">"A society that destroys the family destroys itself." </span><br data-dcnode-id="2302"><br data-dcnode-id="2301"><span data-dcnode-id="2300" instrument_node="">"No gain in social efficiency can save a community that offends against the little ones. And let's be honest about it: our modern cities have created a society in which children are in the way." </span><br data-dcnode-id="2299"><br data-dcnode-id="2298"><span data-dcnode-id="2297" instrument_node="">"Begetting and rearing a family are far more real and rewarding than making in spending money." </span><br data-dcnode-id="2296"><br data-dcnode-id="2295"><span data-dcnode-id="2294" instrument_node="">"We sometimes come to God, not because we love him best, but because we love our possessions best; we ask Christ to 'save Western civilization' without asking ourselves whether it is entirely a civilization that a Christian could want to save. We pray, too often, not to do God’s will, but to enlist God’s assistance in maintaining our 'continually increasing consumption.' And yet, though Christ promised that God would feed us, he never promised that God would stuff us to bursting." </span><br data-dcnode-id="2293"><br data-dcnode-id="2292"><span data-dcnode-id="2291" instrument_node="">"There is, in the last analysis, only one way to stop covetousness and the destruction of body and soul that spring from covetousness, and that is to want God so much that we can't be bothered with inordinate wants for anything else." </span><br data-dcnode-id="2290"><br data-dcnode-id="2289"><span data-dcnode-id="2288" instrument_node="">"For the self is asphixating and killing us, the only air we are designed to breathe is God." </span><br data-dcnode-id="2287"><br data-dcnode-id="2286"><span data-dcnode-id="2285" instrument_node="">"Is it shocking to think of God as a pursuing lover? Then Christianity is shocking</span></span><span data-dcnode-id="2283" instrument_node="">

</span><span data-dcnode-id="2199" id="freeText11147597884322978513" style="display:none"><span data-dcnode-id="2204" instrument_node="">Davidman's insightful look at the Ten Commandments provides a fresh way of looking at the Bible's guide to behavior. Even 50 years later, her commentary hits home. While she certainly makes you evaluate your own behavior and get down off your moral high horse, her main thesis is that the Commandments are meant to be more freeing than limiting. That is, rather than looking at them as a negative set of requirements, we should see the Ten Commandments as a guide for living the joyful life that our loving God has set out for us.</span><br data-dcnode-id="2203"><span data-dcnode-id="2202" instrument_node="">Of course, some of Davidman's references and language are a bit dated, but her points remain relevant.</span><br data-dcnode-id="2201"><span data-dcnode-id="2200" instrument_node="">There is so much here to reflect upon, this is a book to be read, re-read, and digested alone and in conversation.</span></span><span data-dcnode-id="2198" instrument_node="">

        </span><span class="staticStars notranslate" data-dcnode-id="1291" title="it was amazing"><span class="staticStar p10" data-dcnode-id="1296" size="15x15"><span data-dcnode-id="1297" instrument_node="">it was amazing</span></span><span class="staticStar p10" data-dcnode-id="1295" size="15x15"></span><span class="staticStar p10" data-dcnode-id="1294" size="15x15"></span><span class="staticStar p10" data-dcnode-id="1293" size="15x15"></span><span class="staticStar p10" data-dcnode-id="1292" size="15x15"></span></span><span data-dcnode-id="1290" instrument_node="">

</span><span class="readable" data-dcnode-id="1215" id="reviewTextContainer1543439012"><span data-dcnode-id="1286" instrument_node="">
</span><span data-dcnode-id="1277" id="freeTextContainer5672853894411744250"><b data-dcnode-id="1284"><span data-dcnode-id="1285" instrument_node="">The Ten Suggestions?</span></b><br data-dcnode-id="1283"><br data-dcnode-id="1282"><span data-dcnode-id="1281" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span><i data-dcnode-id="1279"><span data-dcnode-id="1280" instrument_node="">Smoke on the Mountain</span></i><span data-dcnode-id="1278" instrument_node=""> presents an appraisal of the state of western moral and cultural values, ca. 1950, in the light of the Ten Commandments, as interpreted by a Christian thinker. Full of sharp insight into the thinking of her time, it also reveals the author's broad and timeless perspective on the eternal issues raised by human nature in opposition to God's great statement of His intent for His people. It concludes with a consideration of Jesus' formulation of the gre</span></span><span data-dcnode-id="1276" instrument_node="">
</span><span data-dcnode-id="1220" id="freeText5672853894411744250" style="display:none"><b data-dcnode-id="1274"><span data-dcnode-id="1275" instrument_node="">The Ten Suggestions?</span></b><br data-dcnode-id="1273"><br data-dcnode-id="1272"><span data-dcnode-id="1271" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span><i data-dcnode-id="1269"><span data-dcnode-id="1270" instrument_node="">Smoke on the Mountain</span></i><span data-dcnode-id="1268" instrument_node=""> presents an appraisal of the state of western moral and cultural values, ca. 1950, in the light of the Ten Commandments, as interpreted by a Christian thinker. Full of sharp insight into the thinking of her time, it also reveals the author's broad and timeless perspective on the eternal issues raised by human nature in opposition to God's great statement of His intent for His people. It concludes with a consideration of Jesus' formulation of the greatest commandments summarizing the Law and the prophets.</span><br data-dcnode-id="1267"><span data-dcnode-id="1266" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;For those who recognize the name of the author as being the wife of C. S. Lewis, I should point out that, even though </span><i data-dcnode-id="1264"><span data-dcnode-id="1265" instrument_node="">Smoke on the Mountain</span></i><span data-dcnode-id="1263" instrument_node=""> is dedicated to C. S. Lewis, it was written before she married him. I am not sure, but I believe that it was finished before they met. That said, it is no mystery why the two of them found strong mutual interests: Joy Davidman was a brilliant writer by any standard, and her wit and insight are in full bloom in this book.</span><br data-dcnode-id="1262"><span data-dcnode-id="1261" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Many epiphanies came to me in the course of reading </span><i data-dcnode-id="1259"><span data-dcnode-id="1260" instrument_node="">Smoke on the Mountain</span></i><span data-dcnode-id="1258" instrument_node="">, not the least of which is that so many of the things Davidman predicts as logical outcomes of tendencies at her time have in fact emerged in our time. The world has become "more so" in the intervening years, and part of the revelation is that the author shows why this must be so.</span><br data-dcnode-id="1257"><span data-dcnode-id="1256" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;The structure of the book hangs on the Ten Commandments, and it centers on the way that the commandments indict our society, its values, and its pursuits. For much of the world, the Ten Commandments might as well have been written in disappearing ink. But for Western, supposedly Christian, society, the Commandments have met with a worse fate. They have been watered down, turned into rules, avoided, replaced with euphemisms, even though their implicit morality is in fact pervasive, e.g., we must not use the Lord's name in vain; so, we do not use the Lord's name at all!</span><br data-dcnode-id="1255"><span data-dcnode-id="1254" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;One aspect of the Law that Davidman brought out to me is its moral force. Its ramifications are everywhere in our society. Jesus added to that moral force in the Sermon on the Mount. Davidman writes,</span><br data-dcnode-id="1253"><span data-dcnode-id="1252" instrument_node=""> </span><blockquote data-dcnode-id="1247"><br data-dcnode-id="1251"><span data-dcnode-id="1250" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;"Remember that the distinction between act and intention, letter and spirit, hardly existed at all before Christ made it for us; nor can it be preserved without the constant guidance of Christ..." chapter 4 (on the fourth commandment)</span><br data-dcnode-id="1249"><span data-dcnode-id="1248" instrument_node=""> </span></blockquote><br data-dcnode-id="1246"><span data-dcnode-id="1245" instrument_node="">a reference to the discussion about the Sabbath that Jesus ends by asking whether the Sabbath made for man or man made for the Sabbath.</span><br data-dcnode-id="1244"><span data-dcnode-id="1243" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Again, in the discussion of the second commandment, Davidman brings out a point that few would think of:</span><br data-dcnode-id="1242"><span data-dcnode-id="1241" instrument_node=""> </span><blockquote data-dcnode-id="1236"><br data-dcnode-id="1240"><span data-dcnode-id="1239" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;"Idolatry lies not in the idol but in the worshiper." chapter 2 (on the second commandment)</span><br data-dcnode-id="1238"><span data-dcnode-id="1237" instrument_node=""> </span></blockquote><br data-dcnode-id="1235"><span data-dcnode-id="1234" instrument_node="">The author then uses this principle to develop the insight that there is in fact a lot of idolatry in our society. In each case, for each commandment, once she fashions the analytical tool, she applies it rigorously to our times, often with devastating results.</span><br data-dcnode-id="1233"><span data-dcnode-id="1232" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;I read </span><i data-dcnode-id="1230"><span data-dcnode-id="1231" instrument_node="">Smoke on the Mountain</span></i><span data-dcnode-id="1229" instrument_node=""> over a long weekend. This is an excellent read, entertaining, disturbing, enlightening, thought-provoking. If you can find it in the public library, I recommend checking it out.</span><br data-dcnode-id="1228"><span data-dcnode-id="1227" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;I have had occasion to quote </span><i data-dcnode-id="1225"><span data-dcnode-id="1226" instrument_node="">Smoke on the Mountain</span></i><span data-dcnode-id="1224" instrument_node=""> several times in The Christian Quotation of the Day (</span><a data-dcnode-id="1222" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//cqod.com/" rel="noopener nofollow" target="_blank"><span data-dcnode-id="1223" instrument_node="">http://cqod.com/</span></a><span data-dcnode-id="1221" instrument_node="">). It has evoked many responses from CQOD subscribers, sometimes harsh ones. It would be too judgmental to say that it struck home. Nevertheless, there is still a good deal of the Pharisee around, in even people who outwardly seem completely free of it, not excluding myself. </span></span><span data-dcnode-id="1219" instrument_node="">

</span><span data-dcnode-id="1113" id="freeText12356299843019847986" style="display:none"><span data-dcnode-id="1131" instrument_node=""> Smoke is a product of it's time, just remember to consider that it was written in 1953 and Joy Davidman was converted from Marxism. Expect lots of references to communists, though she doesn't treat them like the "Red Menace", interestingly enough she lumps them in with materialists. </span><br data-dcnode-id="1130"><br data-dcnode-id="1129"><span data-dcnode-id="1128" instrument_node=""> Her treatment of Old Testament Israel made me laugh more than once. The lack of awe for her ancestors definitely swept the children's sermon version of them out of my mind forever. </span><br data-dcnode-id="1127"><br data-dcnode-id="1126"><span data-dcnode-id="1125" instrument_node=""> More than a kind of commentary on the Ten Commandments this book is a dissection of American thought. Joy uses the Ten Commandments to section off our culture and chastise us throughly in each segment. She does it with love, humour and intelligence, so somehow you end up enjoying it. </span><br data-dcnode-id="1124"><br data-dcnode-id="1123"><span data-dcnode-id="1122" instrument_node=""> It's not hard to figure out how C.S. Lewis fell in love with this women. </span><br data-dcnode-id="1121"><br data-dcnode-id="1120"><br data-dcnode-id="1119"><br data-dcnode-id="1118"><span data-dcnode-id="1117" instrument_node=""> </span><br data-dcnode-id="1116"><br data-dcnode-id="1115"><span data-dcnode-id="1114" instrument_node=""> </span></span><span data-dcnode-id="1112" instrument_node="">

</span><span data-dcnode-id="351" id="freeText16477878528145280722" style="display:none"><span data-dcnode-id="367" instrument_node="">Joy Davidman (born Helen Joy Davidman; 18 April 1915 – 13 July 1960) was an American poet and writer. Often referred to as a child prodigy, she earned a master's degree from Columbia University in English literature in 1935. For her book of poems, Letter to a Comrade, she won the Yale Series of Younger Poets Competition in 1938 and the Russell Loines Award for Poetry in 1939. She was the author of several books, including two novels.</span><br data-dcnode-id="366"><br data-dcnode-id="365"><span data-dcnode-id="364" instrument_node="">While an atheist and after becoming a member of the American Communist Party, she met and married her first husband and father of her two sons, </span><a data-dcnode-id="362" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/author/show/97110.William_Lindsay_Gresham" rel="nofollow noopener" title="William Lindsay Gresham"><span data-dcnode-id="363" instrument_node="">William Lindsay Gresham</span></a><span data-dcnode-id="361" instrument_node="">, in 1942. After a troubled marriage, and following her conversion to Christianity, they divorced and she left America to travel to England with her sons.</span><br data-dcnode-id="360"><br data-dcnode-id="359"><span data-dcnode-id="358" instrument_node="">Davidman published her best known work, Smoke on the Mountain: An Interpretation of the Ten Commandments in 1954 with a preface by </span><a data-dcnode-id="356" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/author/show/1069006.C_S__Lewis" rel="nofollow noopener" title="C.S. Lewis"><span data-dcnode-id="357" instrument_node="">C.S. Lewis</span></a><span data-dcnode-id="355" instrument_node="">. Lewis had been an influence on her work and conversion and became her second husband after her permanent relocation to England in 1956. She died from secondary bone cancer in 1960.</span><br data-dcnode-id="354"><br data-dcnode-id="353"><span data-dcnode-id="352" instrument_node="">The relationship that developed between Davidman and Lewis has been featured in a television BBC film, a stage play and a cinema film named Shadowlands. Lewis published A Grief Observed under a pseudonym in 1961, from notebooks he kept after his wife's death revealing his immense grief and a period of questioning God.</span></span><span data-dcnode-id="350" instrument_node="">
