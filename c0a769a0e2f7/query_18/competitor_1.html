</span><img align="right" class="i6" data-dcnode-id="610" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//manna.amazingfacts.org/amazingfacts/website/tencommandmentfacts/images/america-and-the-ten-commandments.jpg&amp;raw"><h1 class="t9 dv37 dv38" data-dcnode-id="608"><span data-dcnode-id="609" instrument_node="">America &amp; the Ten Commandments</span></h1><br data-dcnode-id="607"><br data-dcnode-id="606"><span class="t10" data-dcnode-id="284"><span data-dcnode-id="605" instrument_node="">By Anthony Lester</span><br data-dcnode-id="604"><br data-dcnode-id="603"><b data-dcnode-id="601"><span data-dcnode-id="602" instrument_node="">Introduction</span></b><br data-dcnode-id="600"><span data-dcnode-id="599" instrument_node="">In July 2001, Alabama Supreme Court Justice Roy Moore, in the cover of night, placed in the middle of a public courthouse foyer a two-ton granite display that ignited a firestorm consuming American politics and the national media for months. Lawsuits were filed, protests on both sides were organized, and the battle over this country’s destiny began.</span><br data-dcnode-id="598"><br data-dcnode-id="597"><span data-dcnode-id="596" instrument_node="">What could cause such an ill-tempered debate on the future of religion in American politics? The 10 Commandments of course! Actually, it’s hard to believe that God’s law, delivered to His people on their freedom tour of the Middle East, could cause such an outrage. Designed specifically to give humans a guide to peace and harmony on earth, it was turned into a smoking platform of anger and self-righteousness. Perhaps not since the Scopes trial of the early 20th century has America experienced such rancor over the state-church controversy.</span><br data-dcnode-id="595"><br data-dcnode-id="594"><span data-dcnode-id="593" instrument_node="">By the time the granite dust settled, the 10 Commandments had been removed from the court by the order of a higher justice; furthermore, Chief Justice Roy Moore was removed from office for unrepentantly defying the law of the land. Yet on the day of his expulsion, the passionate judge gave a warning to those who challenged his attempt to acknowledge God from his chair—he’d be back! And what he planned would change the course of American politics.</span><br data-dcnode-id="592"><br data-dcnode-id="591"><span data-dcnode-id="590" instrument_node="">A foreboding claim, indeed, in what might appear to be the first real thrust by Christian-backed political forces to challenge the deepening secularization of the United States. Of course, this particular skirmish is only a preview of a greater conflict to come that will be like nothing we have ever experienced in this nation.</span><br data-dcnode-id="589"><br data-dcnode-id="588"><span data-dcnode-id="587" instrument_node="">Perhaps not surprisingly, the Bible predicts who in America is going to win this war over religion and government. But before you begin figuring that out, you should ask yourself two questions: What side do you stand for on this issue? And are you sure that God is standing behind you?</span><br data-dcnode-id="586"><br data-dcnode-id="585"><br data-dcnode-id="584"><b data-dcnode-id="582"><span data-dcnode-id="583" instrument_node="">Faithful Paradox</span></b><br data-dcnode-id="581"><span data-dcnode-id="580" instrument_node="">For me, the controversy raging over the display of the 10 Commandments is not really about legality or the constitution. No. It really seems to be all about irony.</span><br data-dcnode-id="579"><br data-dcnode-id="578"><span data-dcnode-id="577" instrument_node="">As the news reported daily of this battle, I soon began to wonder if anyone else was finding the whole thing paradoxical. As this huge outcry for for the 10 Commandments to be displayed in schools, courthouses, and in other public places reached a feverish pitch in Internet chat rooms, on talk-radio shows, and in newsmagazines, I understood that most Christian churches in the country still teach that all or a part of them were nailed to the cross. (A belief that teaches the Commandments and/or their penalties are no longer in force for Christians.)</span><br data-dcnode-id="576"><br data-dcnode-id="575"><span data-dcnode-id="574" instrument_node="">Proponents of that stance say that America should have them on display because they are a part of our Judeo-Christian heritage, even as they also say that Christ did away with the Commandments when He died. In fact, some also say He left just two new commandments with which believers should concern themselves.</span><br data-dcnode-id="573"><br data-dcnode-id="572"><span data-dcnode-id="571" instrument_node="">Yet this is confusing: If the Commandments are no longer in effect, why are they, as Christians and Americans, trying to force them on every other citizen by displaying them as a government-sanctioned artifact? Also, if Jesus did away with them, can they really be part of a common Judeo-Christian heritage? Wouldn’t the most correct course of action be to post the two new covenant commandments of Jesus for a Christian nation?</span><br data-dcnode-id="570"><br data-dcnode-id="569"><span data-dcnode-id="568" instrument_node="">On the other hand, if the 10 Commandments were so important to this nation’s Founding Fathers, why should we not be compelled to obey them implicitly—every one of them, with or without the benefits of grace—if America is to return to its glorious roots? If the Founding Fathers established this nation on the pillar of the 10 Commandments, might they have reasonably expected them to be followed to the letter by likeminded Christian citizens?</span><br data-dcnode-id="567"><br data-dcnode-id="566"><br data-dcnode-id="565"><b data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">America’s Purpose</span></b><br data-dcnode-id="562"><span data-dcnode-id="561" instrument_node="">Some might label me unpatriotic because I feel it necessary to point out a fundamental flaw in the reasoning of the many Christians who want to see the 10 Commandments displayed in government institutions. Although my purpose is not to argue the details of why this nation was founded, I do believe that the United States plays a pivotal and wonderful role in God’s plan of salvation. As such, I love this nation as the gift from God that it is. My heart always soars with joy when I hear our national anthem.</span><br data-dcnode-id="560"><br data-dcnode-id="559"><span data-dcnode-id="558" instrument_node="">Yet whether or not “Christian” leaders established this country as a “Christian” nation is not the issue. Of course, the ideals of Christianity and Judaism should be the moral compass that guides the hearts of our leaders. Christianity offers freedom to every human being, just as the United States has a strong record of fighting for freedom throughout the world.</span><br data-dcnode-id="557"><br data-dcnode-id="556"><span data-dcnode-id="555" instrument_node="">However, I don’t think America is responsible for spreading God’s end-time message to the world. Rather, America is here to protect His church, so she can take the gospel to every people and nation. I believe this is why America has acquired such undisputable power, unprecedented in the history of the world. Its economical and political influence protects God’s last-day church from tyrant governments and unwanted political intervention, enabling it to freely spread the good news to people all around the world. God would surely bless such a nation.</span><br data-dcnode-id="554"><br data-dcnode-id="553"><span data-dcnode-id="552" instrument_node="">Some Christians boldly claim that they want the Commandments displayed as a way to get God back into America, in addition to prayer in schools and in Congress. But is that really safe? Is the government the right power to tell us what is right and wrong morally? Surely we are blessed that our laws reflect the basic principles of God’s Commandments; that’s a very real comfort to even non-Christians. But by separating church and state, we are assured that no religious power will have the authority to override the conscience of those who might believe otherwise, suppressing the religious beliefs of another church. Yet well-meaning but misguided Christians who want to smash the wall of separation of church and state will turn the blessings of this country on their head and lead America into a terrible disaster.</span><br data-dcnode-id="551"><br data-dcnode-id="550"><br data-dcnode-id="549"><b data-dcnode-id="547"><span data-dcnode-id="548" instrument_node="">The Heart of the Matter</span></b><br data-dcnode-id="546"><span data-dcnode-id="545" instrument_node="">Frankly, this nation hasn’t lost its way because the government or strident humanists seek separation of church and state, forbidding the government display of Commandments; it’s lost its way because more and more of her people’s hearts are seeking separation from God in their everyday living. It’s not secular government that’s sending this nation down the sewer of moral decay; it’s secularized hearts!</span><br data-dcnode-id="544"><br data-dcnode-id="543"><span data-dcnode-id="542" instrument_node="">Make no mistake; everything about the 10 Commandments speaks of religion. It just cannot be displayed as mere history, because any person who sees it, Christian or heathen, will understand its towering religious significance. It is so powerful that an atheist will feel its influence in a chamber of justice on the other side of the building and truly believe he has no fair shot because of his or her beliefs. And Christians need to understand this about God’s law: It is not just a statue to display in public, like a costume from a famous movie. It affects everybody’s lives, even the unbelievers’, whether they want it to or not.</span><br data-dcnode-id="541"><br data-dcnode-id="540"><span data-dcnode-id="539" instrument_node="">Likewise, every Christian acknowledges that the Commandments come directly from the hand of God. “And he gave unto Moses … two tables of testimony, tables of stone, written with the finger of God” (Exodus 31:18). They are religious laws, period. The government of man has no real power or mandate to enforce them—they are enforced solely by God’s omnipresence, universal power, and wisdom. And yet far too many Christians are secularizing their own hearts to God’s Commandments, believing the government plays a part in the task He has given to each individual. We should not attempt to use the government to spread God’s message—we should be using our own voices and the example of our lives. What example? Reflecting the spirit of the 10 Commandments.</span><br data-dcnode-id="538"><br data-dcnode-id="537"><span data-dcnode-id="536" instrument_node="">So as some clamor about the separation of church and state, they still yet deny with their hearts and mouths the ultimate authority of God’s law. They lift up the Commandments without any intention of honoring them completely—the very definition of a form of godliness without power.</span><br data-dcnode-id="535"><br data-dcnode-id="534"><span data-dcnode-id="533" instrument_node="">Shouldn’t Christians in this country be more concerned about obeying those Commandments than making them a historical display on the walls in our halls of justice? Shouldn’t we stop treating God’s law as an idol of government, but instead as the living, fulfilled testimony of Jesus Christ?</span><br data-dcnode-id="532"><br data-dcnode-id="531"><span data-dcnode-id="530" instrument_node="">The answer to these questions is yes, yes, yes! And here is why.</span><br data-dcnode-id="529"><br data-dcnode-id="528"><br data-dcnode-id="527"><b data-dcnode-id="525"><span data-dcnode-id="526" instrument_node="">Indisputable Facts About the 10 Commandments</span></b><br data-dcnode-id="524"><span data-dcnode-id="523" instrument_node="">Any healthy debate among Christians about God’s law must begin with how God Himself defines the terms. Without this step, it’s impossible to find a biblical consensus. Yet by letting God define our terms in this discussion, it won’t take long to realize that the evidence compelling us to obey His Commandments today, in the new covenant faith, is overwhelming.</span><br data-dcnode-id="522"><br data-dcnode-id="521"><span data-dcnode-id="520" instrument_node="">Here are 10 indisputable facts, or definitions, about the 10 Commandments from the Old and New Testaments—two witnesses, or dictionaries, of God’s message to humanity.</span><br data-dcnode-id="519"><br data-dcnode-id="518"><span data-dcnode-id="517" instrument_node="">God wrote the 10 Commandments. “And the tables were the work of God, and the writing was the writing of God, graven upon the tables” (Exodus 32:16).</span><br data-dcnode-id="516"><span data-dcnode-id="515" instrument_node="">They are eternal, meaning they will not change or be erased. “All his commandments are sure. They stand fast forever and ever” (Psalm 89:34).</span><br data-dcnode-id="514"><span data-dcnode-id="513" instrument_node="">They are perfect as they are. “The law of the Lord is perfect” (Psalm 19). If they were perfect, would their function or purpose need to change?</span><br data-dcnode-id="512"><span data-dcnode-id="511" instrument_node="">We’ll die if we break them. “He poured out his life unto death … [bearing] the sin of many.” (Isaiah 13:9). Satan was first to convince a human otherwise.</span><br data-dcnode-id="510"><span data-dcnode-id="509" instrument_node="">It is our job to obey them. “Fear God, and keep his commandments: for this is the whole duty of man” (Ecclesiastes 12:13).</span><br data-dcnode-id="508"><br data-dcnode-id="507"><span data-dcnode-id="506" instrument_node="">These first five points are taken from the Old Testament. Many of those who want to display the Commandments argue that the laws are an old covenant relic meant for the Jews, and Christians aren’t subject to them because they are outmoded in our relationship with Jesus. Although points 2 and 3 each seem to shatter this argument, we’ll see later from the New Testament that Jesus also denied the claim that the Commandments have been nullified.</span><br data-dcnode-id="505"><br data-dcnode-id="504"><span data-dcnode-id="503" instrument_node="">But first, this viewpoint contradicts one major reason given to showcase the Commandments in schools and other government-run institutions; that being, we have a government established on Judeo-Christian principles and displaying them is simply honoring that. If we live in contradiction to the Commandments, merely displaying them as a testimony of past government, it is hollow praise at best. We shouldn’t treat God’s law with such diminished value!</span><br data-dcnode-id="502"><br data-dcnode-id="501"><span data-dcnode-id="500" instrument_node="">At worst, it is hypocrisy. For if we tell non-believers we want to honor our Judeo heritage, and then claim that actually following its principles is no longer important in a saving relationship with God, what other message could that send? It seems logical to conclude that to honor our Jewish heritage, we would honor the 10 Commandments in our lives and hearts. (In addition, displaying a religious icon to honor our past is in fact a sincere endorsement of those principles—something God has asked us to do, not an earthly government.)</span><br data-dcnode-id="499"><br data-dcnode-id="498"><span data-dcnode-id="497" instrument_node="">But the New Testament, even after Jesus’ death, doesn’t regard the law itself any differently than the Old Testament. In fact, it is easy to conclude that the New Testament also affirms that God’s law is forever and ever.</span><br data-dcnode-id="496"><br data-dcnode-id="495"><span data-dcnode-id="494" instrument_node="">Breaking them is still wrong. “Sin is the transgression of the law” (1 John 3:4).</span><br data-dcnode-id="493"><span data-dcnode-id="492" instrument_node="">Humanity still needs them. “I had not known sin, but by the law: for I had not known lust, except the law said, Thou shall not covet” (Romans 7:7).</span><br data-dcnode-id="491"><span data-dcnode-id="490" instrument_node="">Obeying them is still a sign of loyalty. “If ye love me, keep my commandments” (John 14:15).</span><br data-dcnode-id="489"><span data-dcnode-id="488" instrument_node="">They are still eternal. “It is easier for heaven and earth to pass, than one tittle of the law to fail” (Luke 16:17). Jesus exalted them! God established the law with His own voice; might it need Jesus’ voice to do away with them? Yet He never does, before or after His death!</span><br data-dcnode-id="487"><span data-dcnode-id="486" instrument_node="">They are still perfect. “Think not that I come to destroy the law … but to fulfill” (Matthew 5:17, 18). Jesus did not change any part of them.</span><br data-dcnode-id="485"><br data-dcnode-id="484"><span data-dcnode-id="483" instrument_node="">It’s clear that Jesus wants us to keep the laws of God—the 10 Commandments—and I believe He is dismayed at the hollow gesture of displaying them in our government halls and not in our outward lives. Jesus continued to call the Commandments “laws,” and He never defined them differently. So this next verse is a clear message: “Whoever shall keep the whole law, and yet offend in one point, he is guilty of all” (James 2:10).</span><br data-dcnode-id="482"><br data-dcnode-id="481"><span data-dcnode-id="480" instrument_node="">Of course, Jesus also obeyed them exactly the way they were intended, so Christians surely cannot conclude that they are not meant to follow them as Jesus followed them. Isn’t that what Christians are—a reflection of Christ?</span><br data-dcnode-id="479"><br data-dcnode-id="478"><br data-dcnode-id="477"><b data-dcnode-id="475"><span data-dcnode-id="476" instrument_node="">Why the 10 Commandments Came First</span></b><br data-dcnode-id="474"><span data-dcnode-id="473" instrument_node="">Most if not all highways in the country have speed limits posted to warn drivers of the laws governing traffic in their jurisdiction. These speed limit signs tend to be very specific. Drivers are repeatedly warned that exceeding 70 mph on the highway is a violation of the law, and if caught, they will be subject to fees and other penalties.</span><br data-dcnode-id="472"><br data-dcnode-id="471"><span data-dcnode-id="470" instrument_node="">Now imagine if after several years, even as new drivers are getting licenses, the government begins to take down these very specific signs and replace them with “Drive Safely” signs.</span><br data-dcnode-id="469"><br data-dcnode-id="468"><span data-dcnode-id="467" instrument_node="">Here’s how it could happen: Drivers have been complaining for years that traffic laws are too confusing to understand and too restrictive to obey, though they are truly inspired when a new governor issues a proclamation saying, “Very specific traffic laws are a reflection of an even greater traffic law: drive safely.”</span><br data-dcnode-id="466"><br data-dcnode-id="465"><span data-dcnode-id="464" instrument_node="">Years later, a new government decides the governor really meant that imposing specific speed limits is impossible for the average citizen today to reasonably obey while trying to get to work, get their kids to soccer games, and other everyday realities. (Even advanced safety features in cars seemed to make those laws archaic.) So they replace 70 mph speed limits with the “Drive Safely” signs and remove the penalties for exceeding them. Right below the new sign, they post, “Suggest 70 mph,” because most traffic engineers agree that 70 mph is the safest limit.</span><br data-dcnode-id="463"><br data-dcnode-id="462"><span data-dcnode-id="461" instrument_node="">What happens? Some drivers believe 70 mph is in fact the safest, but others think safety is reasonably possible at 85 mph. Still others think that getting there faster is more important, and without having to worry about fees, they travel at speeds of 100 mph or faster! (Perhaps worse yet, some believe 20 mph is safest—as much as keeping in the left lane at all times.) In short, chaos rules the highways! More people actually die, and everyone fears for their lives.</span><br data-dcnode-id="460"><br data-dcnode-id="459"><span data-dcnode-id="458" instrument_node="">That might be silly to imagine, but that is how Christians today are treating the 10 Commandments, a very specific set of rules based on two greater laws. Jesus said, “ ‘You shall love the LORD your God with all your heart, with all your soul, and with all your mind.’ This is the first and great commandment. And the second is like it: ‘Love your neighbor as yourself’ ” (Matthew 22:37–39).</span><br data-dcnode-id="457"><br data-dcnode-id="456"><span data-dcnode-id="455" instrument_node="">If He had stopped there, I would understand a little more how someone could believe the Commandments were no longer an issue. But He didn’t stop there, and I think He added His next statement to ensure no one would deny the laws’ eternal purpose. He says, “All the Law and the Prophets hang on these two commandments.”</span><br data-dcnode-id="454"><br data-dcnode-id="453"><span data-dcnode-id="452" instrument_node="">The specific speed limits hang on the greater commandment of drive safely, and without them a “Drive Safely” law would be useless to govern people. Anarchy would prevail! Why? Because humans can’t be trusted to figure out right and wrong in our selfish conditions. To paraphrase one modern-day philosopher, “Why are people who go faster than us dangerous and those who go slower than us annoying?” Right would always be what we wanted, and wrong would always be what we did not want. “There is a way that seems right to a man, but the ends are the ways of death” (Proverbs 14:12).</span><br data-dcnode-id="451"><br data-dcnode-id="450"><span data-dcnode-id="449" instrument_node="">Let’s reverse the scenario. What would have happened if God instead issued the two great commandments to Moses on the mountain without offering the 10 Commandments? The Bible tells us: “He that trusts in his own heart is a fool” (Proverbs 28:26). The world, influenced by sinful hearts and the deceptions of Satan, would quickly crumble. Sadly, much of the problem would be genuine believers foolishly thinking they could determine right and wrong without God’s explicit direction. In essence, it’s the same outcome if the 10 Commandments were ditched entirely for the two greater commandments.</span><br data-dcnode-id="448"><br data-dcnode-id="447"><span data-dcnode-id="446" instrument_node="">There is only one way to unify a group of believers from all different backgrounds and beliefs—one common creed. That creed is God’s plan for the universe, His Word, and that emphatically includes His 10 Commandments.</span><br data-dcnode-id="445"><br data-dcnode-id="444"><span data-dcnode-id="443" instrument_node="">Some well-meaning Christians also argue that the 10 Commandments should be displayed as “helpful suggestions,” and not laws that require penalty if broken. However, the problem is exactly the same! Without the danger of lawbreaking, and therefore the threat of a penalty, most people would freely violate the greater law. As mere guidelines, they are useless to create order—which is why the government will never remove specific speed limits. It is also why God has not done away with the 10 Commandments either. They still have a very legal and compelling interest in our lives.</span><br data-dcnode-id="442"><br data-dcnode-id="441"><span data-dcnode-id="440" instrument_node="">You can also look at it this way: If you break the law that forbids lying, you have broken both of the greatest commandments. How? By lying, you cheat another human being. And you also show you have little faith that God can handle your crisis with truth.</span><br data-dcnode-id="439"><br data-dcnode-id="438"><span data-dcnode-id="437" instrument_node="">Can it be any clearer? Break a 10 Commandment and you automatically break the greater commandments! This shows we are still under the obligation to keep the 10 Commandments, which are the two greater commandments in detail. (It also should be no surprise that Jesus in fact hung more details on the 10 Commandments, calling lust adultery and hate murder!)</span><br data-dcnode-id="436"><br data-dcnode-id="435"><span data-dcnode-id="434" instrument_node="">Many Christians utterly forsake God’s 10 Commandments but cleverly veil their disobedience behind these two great commandments. As such, men and women on their own define what it really means to commit adultery, what it really means to steal, what it really means to bear false witness, what it really means to honor the Sabbath, and what it really means to murder. Without the 10 very specific Commandments, it is much easier for “God’s people” to do terrible things in His name. It’s a slippery slope that can only be avoided by committing ourselves to His Commandments as recorded in the Holy Bible.</span><br data-dcnode-id="433"><br data-dcnode-id="432"><span data-dcnode-id="431" instrument_node="">Some Americans are concerned about the real threat of moral relativism—the notion that there are no moral absolutes—infecting the nation today. For example, euthanasia, legalizing illicit drugs, homosexual marriage, and abortion are the results of a people who have lost sight of God’s eternal principles. But by doing away with either the Commandments or the penalty surrounding them, they are far down the road to moral relativism, because they rely on humans feelings, and not God’s written law, to ensure morality.</span><br data-dcnode-id="430"><br data-dcnode-id="429"><span data-dcnode-id="428" instrument_node="">God wrote His Commandments, which are called eternal, for a reason: that there would be no doubt in our minds and hearts what it meant to obey Him.</span><br data-dcnode-id="427"><br data-dcnode-id="426"><br data-dcnode-id="425"><b data-dcnode-id="423"><span data-dcnode-id="424" instrument_node="">The Danger of Grace: Disobedience</span></b><br data-dcnode-id="422"><span data-dcnode-id="421" instrument_node="">Now imagine if a country wants to export several varieties of their tasty fruit into the United States, yet for reasons of public safety, our government decides that poor health conditions in that country are too dangerous to permit it.</span><br data-dcnode-id="420"><br data-dcnode-id="419"><span data-dcnode-id="418" instrument_node="">So unable to legally transport their fruits into a willing-to-buy U.S. market, they begin to smuggle in their goods, and before long, their amazingly tasty food becomes a sensation.</span><br data-dcnode-id="417"><br data-dcnode-id="416"><span data-dcnode-id="415" instrument_node="">Unfortunately, the government’s refusal to legalize the imports shows real wisdom. Soon people start to get strange illnesses traced to the fruit, and some even begin to die. What’s worse, the fruit begins to infect genes and harm unborn babies.</span><br data-dcnode-id="414"><br data-dcnode-id="413"><span data-dcnode-id="412" instrument_node="">But strangely, the desire for the fruit continues to soar—people eat it ravenously despite the laws against it and the health effects. The government decides to take decisive action, and soon creates an amazing serum from a very rare blood type that sustains the lives of people who eat the fruit as long as they continue to inject the serum.</span><br data-dcnode-id="411"><br data-dcnode-id="410"><span data-dcnode-id="409" instrument_node="">To spread the word, the government offers the serum free of charge to anyone willing to take it. The only catch is that serum receivers are asked to evangelize about the dangers of this poisonous fruit. Even though the law still considers it illegal to buy, sell, or consume the fruit, they give a blind eye to those who spread the word.</span><br data-dcnode-id="408"><br data-dcnode-id="407"><span data-dcnode-id="406" instrument_node="">Sounds suspect, right? Who in their right mind would willingly continue to eat the fruit knowing that it destroys their body and their children’s lives? And most Americans who respect our laws would be outraged by such willing defiance and would not tolerate it.</span><br data-dcnode-id="405"><br data-dcnode-id="404"><span data-dcnode-id="403" instrument_node="">Unfortunately, these Americans treat God’s law the same way. Is it right to willingly eat the fruit even with the serum? Of course not, but some Christians think that because we have a serum, called “grace,” our sins are covered in even willful disobedience. Does it really make sense to continue to sin because we have His grace? God wants to blot out sins not only in our lives, but also from the universe—might we consider cooperating by committing to obedience?</span><br data-dcnode-id="402"><br data-dcnode-id="401"><span data-dcnode-id="400" instrument_node="">We must remember that there is a very fine line between admitting that we cannot overcome sin on our own and willful disobedience. Someday, the former will lead to the latter if we do not trust our Lord’s promises that He can help us obey God’s law (Revelation 3:21). The amazing thing is that the Bible says if we cling to Jesus, we will have victory. So I think the real question should not be, “Why are the Commandments so hard to obey,” but rather “Why am I finding it so hard to trust God’s promise?” Too often the phrase, “We can’t keep them,” really means, “God will forgive me anyhow.” That is presumption, and it is a dangerous game to play with the Almighty.</span><br data-dcnode-id="399"><br data-dcnode-id="398"><span data-dcnode-id="397" instrument_node="">That’s why one of the most passionate arguments fired against “Commandment keepers” is the same argument that convinces me that obeying them is really a matter of loyalty to Jesus. It’s been said that all we can do is believe, for we as sinful beings are unable to obey the law anyway.</span><br data-dcnode-id="396"><br data-dcnode-id="395"><span data-dcnode-id="394" instrument_node="">But this is really a chilling argument when you unfold its ultimate conclusion. It’s as if they are saying that all of those Bible verses about relying wholly on Jesus for salvation are actually saying we must instead be puppets possessed by Jesus. He must either overlook our sins with His blood or actually take over our bodies, choosing for us. But puppets don’t love Jesus, nor do puppets care or choose. Why should they? If we are puppets, why care about the law at all—or even Jesus—who is the Commandments, the Word, in flesh?</span><br data-dcnode-id="393"><br data-dcnode-id="392"><span data-dcnode-id="391" instrument_node="">Of course, the argument about simple belief is countered in the Bible. “You believe that there is one God. You do well. Even the demons believe—and tremble!” (James 2:19, emphasis added). Even the devil believes in the saving power of Jesus, but the Bible says he will not be saved. Which means it must require something that the devil and the demons don’t do!</span><br data-dcnode-id="390"><br data-dcnode-id="389"><span data-dcnode-id="388" instrument_node="">What could that be? It’s acknowledging God by choosing to live the pure lives He meant for us. He wants His people to be active participants in His plan for their lives. This surely begins with belief, a crucial step. But it must not end there. What does faith really mean without commitment? “Faith without works is dead” (James 2:26)!</span><br data-dcnode-id="387"><br data-dcnode-id="386"><span data-dcnode-id="385" instrument_node="">Should we treat something He came to die for so carelessly? Some say, “Even if I don’t want to sin, but do, it is covered under God’s blood.” Should we be so dispassionate and neglectful? I think the heartfelt plea is, “I will commit my heart to God’s Commandments as a testimony of His grace in my life. Should I stumble, He will lift me up.” But if we don’t do our best, should we expect Jesus to continue paying the price?</span><br data-dcnode-id="384"><br data-dcnode-id="383"><span data-dcnode-id="382" instrument_node="">The Word of God sums it up best as always: “Little children, let no man deceive you: he that does righteousness is righteous, even as he is righteous. He that continues in sin is of the devil; for the devil sins from the beginning. For this purpose the Son of God was manifested, that he might destroy the works of the devil. Whosoever is born of God does not continue in sin; for his seed remains in him: and he cannot sin, because he is born of God” (1 John 3:7–9).</span><br data-dcnode-id="381"><br data-dcnode-id="380"><br data-dcnode-id="379"><b data-dcnode-id="377"><span data-dcnode-id="378" instrument_node="">The Sabbath Conundrum</span></b><br data-dcnode-id="376"><span data-dcnode-id="375" instrument_node="">There are some supporters for posting the 10 Commandments who do agree that obeying them is indeed a part of the Christian experience. But for many, this leads to another irony.</span><br data-dcnode-id="374"><br data-dcnode-id="373"><span data-dcnode-id="372" instrument_node="">If the government summons you to court at a certain time, it expects you to be there—not three days earlier or a day after. If it asks you to testify at a trial, it expects you to answer questions and not read a sports magazine. Neither does it want you to show up late or leave early. It also considers you in contempt of court, a lawbreaker, if you ignore the judge while he or she is trying to speak with you.</span><br data-dcnode-id="371"><br data-dcnode-id="370"><span data-dcnode-id="369" instrument_node="">I have no doubt that most sincere Christians citizens would be angered by such disrespect for the institution for justice, yet these same Christians do not respect God’s government regarding time with Him in His chamber. They don’t show up when asked, and if they do, it’s often on another day and they don’t do the things asked of them.</span><br data-dcnode-id="368"><br data-dcnode-id="367"><span data-dcnode-id="366" instrument_node="">Many Christians exclude the fourth Commandment from the other nine as a law meant only for the Jews. Others say that it is still a Commandment to obey, but one that Christians should practice on the first day of the week instead of the last day. Others still argue that it doesn’t matter what day, as long as time is given to God. Yet can you ever imagine finding a judge who orders a trial on Wednesday to accept: “I showed up on Thursday! As long as I show up, does it really matter?” Of course, God will accept praise any day and time, and He will bless you for it. But this Commandment asks for your presence at a particular place and time!</span><br data-dcnode-id="365"><br data-dcnode-id="364"><span data-dcnode-id="363" instrument_node="">Why is it then that when a judge tells us to show up, we know we are breaking the law when we don’t and will suffer the penalty—but if the Judge of the universe asks us to show on a certain day, it’s really just our call? By ignoring or altering the fourth Commandment, it is no longer a relevant part of the 10 Commandments as written in the Bible—the inspired Word of God. Indeed, if it can change on the whims of a person, why not the others? But Jesus Himself emphatically said this would never be the case. “Think not that I come to destroy the law … but to fulfill” (Matthew 5:17,18). He also said not one part of it would change, not even if the earth and its people passed into history. It’s for all time and for all creation! In addition, He said the wording of the law would never change (Luke 16:17), which is what exactly has to happen if we are to accept that the first day is the Sabbath. Can you imagine changing a court summons date and passing it off as lawful?</span><br data-dcnode-id="362"><br data-dcnode-id="361"><span data-dcnode-id="360" instrument_node="">Many are surprised to hear that neither Jesus nor the New Testament writers ever tell Jewish converts to worship on the first day of the week. You might guess that many Jews would be put off by such a statement—after all, the Commandments are an essential part of their lives (their ancestors were stoned for not following it!) and they had heard with their own ears Jesus tell them to keep the Commandments. Public defenders would be outraged if a judge told them one day to be ready for trial on Thursday, then suddenly moved it to Wednesday to appease the prosecutors without telling the defense! Yet we hear about no such controversy regarding the Sabbath in the Bible.</span><br data-dcnode-id="359"><br data-dcnode-id="358"><span data-dcnode-id="357" instrument_node="">This becomes even more problematic when Paul puts a stop to the practice of circumcision, replacing the commitment, or altering it, with baptism (Colossians 2:11). His act of transforming the circumcision ceremony created a deep division in the church, yet we are to believe the transformation of the Sabbath did not? Many claim the fact that Jesus doesn’t vocally reinforce the Sabbath in the New Testament proves, from silence, that He must have not considered it important. But since He did observe the Sabbath, and because we see no Jewish outcry, the argument from silence works best the other way around. Indeed, Jesus often mentions a Commandment to add more meaning to it. It isvery possible that the light on the Sabbath in the Bible is sufficient, so He saw no reason to mention it. Of course, Jesus does mention the Sabbath while defending it from legalists (Matthew 12:1–12), and He honored the Sabbath by going to the synagogue, as “was his custom” (Luke 4:16).</span><br data-dcnode-id="356"><br data-dcnode-id="355"><span data-dcnode-id="354" instrument_node="">Would you consider yourself loyal to the government if you didn’t show up to a trial where your testimony could convict a terrorist? Why then would you consider yourself loyal to God if you failed to show up on a day He specifically asks of you?</span><br data-dcnode-id="353"><br data-dcnode-id="352"><br data-dcnode-id="351"><b data-dcnode-id="349"><span data-dcnode-id="350" instrument_node="">Legalism: The Real Danger</span></b><br data-dcnode-id="348"><span data-dcnode-id="347" instrument_node="">You wouldn’t call a police officer a legalist if he or she gave a motorist a ticket for going the posted speed limit in a blizzard. Some traffic laws might even seem strange, yet we know deep down there is a reason for them: public safety. Somehow, somewhere, somebody died or was injured, and the law was put in place. (Likewise, the details of the fourth Commandment might seem strange, we might not understand them completely, but it is a law from God.)</span><br data-dcnode-id="346"><br data-dcnode-id="345"><span data-dcnode-id="344" instrument_node="">Yet Christians who proclaim the importance of obeying all of the Commandments are often called legalists. And even before the discussion about grace can begin, they are said not to understand grace and are labeled Pharisees. The debate ends, and the confusing rhetoric provides more heat than light.</span><br data-dcnode-id="343"><br data-dcnode-id="342"><span data-dcnode-id="341" instrument_node="">Still, this is an important concern, because the Pharisees treated God’s law in such a way that changed its nature, and Jesus rebuked them for it. They added religious pomp and circumstance to not only gain favor or merit with God (in fact, they really seemed to merit favor with people), but also to control the religion itself and His people (Matthew 23:15).</span><br data-dcnode-id="340"><br data-dcnode-id="339"><span data-dcnode-id="338" instrument_node="">But the Jews, or even Jesus, never questioned the Pharisees’ zeal for the 10 Commandments themselves, only that they had altered their purpose; loyalty to God’s law was a must for any Jew. In fact, Jesus told His followers that the standards set by the Pharisees was in fact too low to enable human access to heaven (Matthew 5:20).</span><br data-dcnode-id="337"><br data-dcnode-id="336"><span data-dcnode-id="335" instrument_node="">He told the Pharisees that their outward obedience to the Commandments did not hide the sins in their hearts. Our outward show of obedience to the Commandments cannot disguise from God the filthy rags we wear beneath our legalistic robes—God sees the filthy rags of lust, deceit, and murder in our hearts. Jesus said that how the Pharisees behaved was altogether different from their hearts, but that their outward behavior was, in fact, appropriate. In this sense they followed the letter of the law, but forsook its spirit (Matthew 23:27).</span><br data-dcnode-id="334"><br data-dcnode-id="333"><span data-dcnode-id="332" instrument_node="">The Pharisees changed God’s law from a measuring stick to show us our need of God’s empowering grace into works that could get us into heaven. But this is not a real representation of what God meant for the Jews, who were always to be saved by grace in Jesus Christ. The New Testament tells us that it wasn’t works that made Abraham righteous; it was his faith in God’s promises. If he didn’t believe that God would do as He promised, his obedience would have been for nothing. Yet his works are considered a sign of his faith. Had he no works, no obedience, would he be remembered as the “father of the faithful”?</span><br data-dcnode-id="331"><br data-dcnode-id="330"><span data-dcnode-id="329" instrument_node="">Was the New Testament calling Abraham a legalist? (James 2:21–22). No. It was calling him a Christian—an early version, perhaps, but still a trusting, obedient Christian.</span><br data-dcnode-id="328"><br data-dcnode-id="327"><br data-dcnode-id="326"><b data-dcnode-id="324"><span data-dcnode-id="325" instrument_node="">The Real Power of Grace</span></b><br data-dcnode-id="323"><span data-dcnode-id="322" instrument_node="">God has given His people the power to rebuke immorality with His law, but we should place this charge in perspective. We should not force His law on anyone—nor should any government power. Our first cause is to convince others of their personal need of Jesus, and in doing so, teach them the judgment is coming quickly.</span><br data-dcnode-id="321"><br data-dcnode-id="320"><span data-dcnode-id="319" instrument_node="">Some believe that our relationship with God’s law changed with Jesus. But He came to cleanse us of our sins and give us the power to overcome them—not give us a free pass to sin more. Grace has always been God’s powerful gift, from Adam to the end of time. We should not take it for granted so easily, so cheaply.</span><br data-dcnode-id="318"><br data-dcnode-id="317"><span data-dcnode-id="316" instrument_node="">What sense would it be for Jesus to come and explain the purpose of the law, to keep it, to die because humans broke them, only to say that the laws were no longer in effect after His death? The equation is simple: If there is no law, there is no sin. If there is no sin, there is no judgment needed. The final judgment, which all Christians believe in to some degree, makes it logically necessary to have a law! If Jesus did away with the law, at the very least those living today would not be sinners. But the Bible says we are sinners (Romans 3:23). We are all judged by a common standard; the righteous and the lost will be weighed by it. The difference: the righteous are thus because Jesus made them that way by His empowering grace.</span><br data-dcnode-id="315"><br data-dcnode-id="314"><span data-dcnode-id="313" instrument_node="">Sometimes I am told that I don’t understand grace because I choose to obey the Commandments as they are written. But my testimony is a life utterly transformed by God’s grace, which has in turn made me recognize the astounding beauty and necessity of God’s moral law. How could the Holy Spirit convict me of my desperate need to repent and accept God’s grace without His rules spelled out in detail? It’s not a long-gone artifact of faith, but an eternal testament to God’s righteousness!</span><br data-dcnode-id="312"><br data-dcnode-id="311"><span data-dcnode-id="310" instrument_node="">Realizing that my sins had been washed away, my love for God blossomed (1 John 4:19). Yet the more I studied His Word, the more I saw that sin devastated God’s heart. It was an unavoidable conclusion. I didn’t want to hurt Him any longer, or treat His law so lackadaisically. Grace has not only made me clean before the Father, it has enabled me to honor His Commandments so long as I cling to Jesus and His promises.</span><br data-dcnode-id="309"><br data-dcnode-id="308"><span data-dcnode-id="307" instrument_node="">When we show God our real desire to stop sinning, real change begins. We experience true character-building—a real goal to reach for—a real purpose for living; something that grace without real responsibility won’t give us. (If you give a jobless person a job and a living wage, you will see real passion! But what happens when all you do is give money and walk away?) And that is why I am so passionate for God. His law, His government, has given me purpose to live, to work, and to die for.</span><br data-dcnode-id="306"><br data-dcnode-id="305"><span data-dcnode-id="304" instrument_node="">God loves us. God has mercy. I count on that love and have faith in that mercy. I am aware of my sinful condition, but I have assurance that He is willing to forgive and that He will complete His work in me (Philippians 1:6). But I also believe He has a big problem with those who willfully defy His Commandments and pick and choose the details they will acknowledge. Can God allow someone into heaven who continues to recklessly defy Him? I think God would never want us to conclude that we love Him so much that we won’t worry about keeping His Commandments.</span><br data-dcnode-id="303"><br data-dcnode-id="302"><span data-dcnode-id="301" instrument_node="">“So speak ye, and so do, as they that shall be judged by the law of liberty” (James 2:12).</span><br data-dcnode-id="300"><br data-dcnode-id="299"><br data-dcnode-id="298"><b data-dcnode-id="296"><span data-dcnode-id="297" instrument_node="">Conclusion</span></b><br data-dcnode-id="295"><span data-dcnode-id="294" instrument_node="">Thus, God-fearing Americans don’t need the government to enforce the 10 Commandments, or have schools with prayer time. For all their days, the Jews had posted His moral law everywhere, and yet they still disobeyed and their nation crumbled. They were lost because their hearts rejected His laws, not because they didn’t display them. That should tell us something: A plaque in a government hall doesn’t honor God; that method was tried, and it failed.</span><br data-dcnode-id="293"><br data-dcnode-id="292"><span data-dcnode-id="291" instrument_node="">Of course, there is a big difference between that and forbidding biblical teaching in the public domain; this is the real issue Christians should fight for. Ensuring religious liberty does not mean forbidding expressing our faith; sharing our faith is a Christian duty! Yet nor does religious liberty mean forcing the faith on someone who doesn’t want to hear it. It is a sad fact that God’s influence is dying in the land, but the government can’t fix that. Only God can through the agency of His church.</span><br data-dcnode-id="290"><br data-dcnode-id="289"><span data-dcnode-id="288" instrument_node="">Most Americans appreciate the safety and freedom afforded to a people living under the rule of law. By obeying the laws of our government, we contribute to the public peace. The laws of our government are a lot of “thou shall nots,” but very few people, only anarchists, grumble that they are restrictions. Why then do Christians, good Americans, treat God’s government as if it is currently void of the rule of law—as if He doesn’t expect future citizens of His kingdom to keep them? Why do we grumble about keeping them, as if they were terrible? If we keep them, to us they are a “law of liberty!”</span><br data-dcnode-id="287"><br data-dcnode-id="286"><span data-dcnode-id="285" instrument_node="">Instead of a Christian-governed nation, I believe there is an even a better way to promote peace, love, and Jesus in our country. Instead of raising an alarm when they are removed from government buildings, I believe we should hang the 10 Commandments in our own homes and on our hearts. If we honored them by our actions, it wouldn’t matter what the government did, because the hearts of unbelievers would be touched dramatically. Think of the stories of Joseph, Daniel, and of course our perfect example, God’s Commandment Keeper, Jesus. His life of love, grace, and perfection changed the course of history—no earthly government required.</span></span><span data-dcnode-id="283" instrument_node="">
</span><span data-dcnode-id="280" instrument_node="">
