 data-dcnode-id="809" instrument_node="">FAQ Vs</span></a><span data-dcnode-id="807" instrument_node=""> </span><a class="almclass" data-dcnode-id="805" href="#" rel="almcontact"><span data-dcnode-id="806" instrument_node="">Contact</span></a><span data-dcnode-id="804" instrument_node=""> </span><a data-dcnode-id="802" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.the-ten-commandments.org/support.html" rel="nofollow"><span data-dcnode-id="803" instrument_node="">Support</span></a><span data-dcnode-id="801" instrument_node=""> </span><a data-dcnode-id="799" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.the-ten-commandments.org/the-ten-commandments-links.html" rel="nofollow"><span data-dcnode-id="800" instrument_node="">Resources</span></a><span data-dcnode-id="798" instrument_node=""> </span></ul><span data-dcnode-id="796" instrument_node=""> </span></div></div><span data-dcnode-id="793" instrument_node="">
</span><div data-dcnode-id="408" id="content"><span data-dcnode-id="792" instrument_node="">
</span><h1 data-dcnode-id="790"><span data-dcnode-id="791" instrument_node="">Adam Clarke's Commentary on the Ten Commandments</span></h1><span data-dcnode-id="789" instrument_node="">
</span><div class="block" data-dcnode-id="738"><span data-dcnode-id="788" instrument_node="">
</span><p data-dcnode-id="783"><span data-dcnode-id="787" instrument_node="">The following page is a Bible Commentary on each of the Ten Commandments from Exodus 20 using Adam Clarke's Commentary on the Bible. Adam Clarke, LL.D., F.S.A., (1715-1832). See also the </span><a data-dcnode-id="785" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.the-ten-commandments.org/ten_commandments-purpose_meaning.html"><span data-dcnode-id="786" instrument_node="">purpose and meaning of the Ten Commandments</span></a><span data-dcnode-id="784" instrument_node="">.</span></p><span data-dcnode-id="782" instrument_node="">
</span><ol data-dcnode-id="740"><span data-dcnode-id="781" instrument_node="">
</span><li data-dcnode-id="778"><a data-dcnode-id="779" href="#First"><span data-dcnode-id="780" instrument_node="">First of the Ten Commandments</span></a></li><span data-dcnode-id="777" instrument_node="">
</span><li data-dcnode-id="774"><a data-dcnode-id="775" href="#Second"><span data-dcnode-id="776" instrument_node="">Second of the Ten Commandments</span></a></li><span data-dcnode-id="773" instrument_node="">
</span><li data-dcnode-id="770"><a data-dcnode-id="771" href="#Third"><span data-dcnode-id="772" instrument_node="">Third of the Ten Commandments</span></a></li><span data-dcnode-id="769" instrument_node="">
</span><li data-dcnode-id="766"><a data-dcnode-id="767" href="#Fourth"><span data-dcnode-id="768" instrument_node="">Fourth of the Ten Commandments</span></a></li><span data-dcnode-id="765" instrument_node="">
</span><li data-dcnode-id="762"><a data-dcnode-id="763" href="#Fifth"><span data-dcnode-id="764" instrument_node="">Fifth of the Ten Commandments</span></a></li><span data-dcnode-id="761" instrument_node="">
</span><li data-dcnode-id="758"><a data-dcnode-id="759" href="#Sixth"><span data-dcnode-id="760" instrument_node="">Sixth of the Ten Commandments</span></a></li><span data-dcnode-id="757" instrument_node="">
</span><li data-dcnode-id="754"><a data-dcnode-id="755" href="#Seventh"><span data-dcnode-id="756" instrument_node="">Seventh of the Ten Commandments</span></a></li><span data-dcnode-id="753" instrument_node="">
</span><li data-dcnode-id="750"><a data-dcnode-id="751" href="#Eight"><span data-dcnode-id="752" instrument_node="">Eighth of the Ten Commandments</span></a></li><span data-dcnode-id="749" instrument_node="">
</span><li data-dcnode-id="746"><a data-dcnode-id="747" href="#Ninth"><span data-dcnode-id="748" instrument_node="">Ninth of the Ten Commandments</span></a></li><span data-dcnode-id="745" instrument_node="">
</span><li data-dcnode-id="742"><a data-dcnode-id="743" href="#Tenth"><span data-dcnode-id="744" instrument_node="">Tenth of the Ten Commandments</span></a></li><span data-dcnode-id="741" instrument_node="">
</span></ol><span data-dcnode-id="739" instrument_node="">
</span></div><span data-dcnode-id="737" instrument_node="">
</span><div class="block" data-dcnode-id="690"><span data-dcnode-id="736" instrument_node="">
</span><p data-dcnode-id="729"><strong data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">Exodus 20:1 All these words -</span></strong><span data-dcnode-id="733" instrument_node=""> Houbigant supposes, and with great plausibility of reason, that the clause </span><span class="blue" data-dcnode-id="731"><span data-dcnode-id="732" instrument_node="">את כל הדברים האלה</span></span><span data-dcnode-id="730" instrument_node=""> eth col haddebarim haelleh, “all these words,” belong to the latter part of the concluding verse of Exodus 19, which he thinks should be read thus: And Moses went down unto the people, and spake unto them All These Words; i.e., delivered the solemn charge relative to their not attempting to come up to that part of the mountain on which God manifested himself in his glorious majesty, lest he should break forth upon them and consume them. For how could Divine justice and purity suffer a people so defiled to stand in his immediate presence? When Moses, therefore, had gone down and spoken all these words, and he and Aaron had re-ascended the mount, then the Divine Being, as supreme legislator, is majestically introduced thus: And God spake, saying. This gives a dignity to the commencement of this chapter of which the clause above mentioned, if not referred to the speech of Moses, deprives it. The Anglo-Saxon favors this emendation: God spoke Thus, which is the whole of the first verse as it stands in that version.</span></p><span data-dcnode-id="728" instrument_node="">
</span><p data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">Some learned men are of opinion that the Ten Commandments were delivered on May 30, being then the day of pentecost.</span></p><span data-dcnode-id="725" instrument_node="">
</span><p data-dcnode-id="708"><span data-dcnode-id="724" instrument_node="">The laws delivered on Mount Sinai have been variously named. In Deu_4:13, they are called </span><span class="blue" data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">עשרת הדברים</span></span><span data-dcnode-id="721" instrument_node=""> asereth haddebarim, The Ten Words. In the preceding chapter, Exo_19:5, God calls them </span><span class="blue" data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">את בריתי</span></span><span data-dcnode-id="718" instrument_node=""> eth berithi, my Covenant, i.e., the agreement he entered into with the people of Israel to take them for his peculiar people, if they took him for their God and portion. If ye will obey my voice indeed, and Keep my Covenant, Then shall ye be a peculiar treasure unto me. And the word covenant here evidently refers to the laws given in this chapter, as is evident from Deu_4:13 : And he declared unto you his Covenant, which he commanded you to perform, even Ten Commandments. They have been also termed the moral law, because they contain and lay down rules for the regulation of the manners or conduct of men. Sometimes they have been termed the Law, </span><span class="blue" data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">התורה</span></span><span data-dcnode-id="715" instrument_node=""> hattorah, by way of eminence, as containing the grand system of spiritual instruction, direction, guidance, etc. See on the word Law, Exo_12:49 (note). And frequently the Decalogue, </span><span class="blue" data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">Δεκαλογος</span></span><span data-dcnode-id="712" instrument_node="">, which is a literal translation into Greek of the </span><span class="blue" data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">עשרת הדברים</span></span><span data-dcnode-id="709" instrument_node=""> asereth haddebarim, or Ten Words, of Moses.</span></p><span data-dcnode-id="707" instrument_node="">
</span><p data-dcnode-id="700"><span data-dcnode-id="706" instrument_node="">Among divines they are generally divided into what they term the first and second tables. The First table containing the first, second, third, and fourth commandments, and comprehending the whole system of theology, the true notions we should form of the Divine nature, the reverence we owe and the religious service we should render to him. The Second, containing the six last commandments, and comprehending a complete system of ethics, or moral duties, which man owes to his fellows, and on the due performance of which the order, peace and happiness of society depend. By this division, the First table contains our duty to God; the Second our duty to our Neighbor. This division, which is natural enough, refers us to the grand principle, love to God and love to man, through which both tables are observed.</span><br data-dcnode-id="705"><br data-dcnode-id="704"><span data-dcnode-id="703" instrument_node="">
		1.	Thou shalt love the Lord thy God with all thy heart, soul, mind, and strength.</span><br data-dcnode-id="702"><span data-dcnode-id="701" instrument_node="">
		2.	Thou shalt love thy neighbor as thyself.</span></p><span data-dcnode-id="699" instrument_node="">
</span><p data-dcnode-id="692"><strong data-dcnode-id="697"><span data-dcnode-id="698" instrument_node="">Exodus 20:2 I am the Lord thy God -</span></strong><span data-dcnode-id="696" instrument_node=""> </span><span class="blue" data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">יהוה אלהיך</span></span><span data-dcnode-id="693" instrument_node=""> Yehovah eloheycha. On the word Jehovah, which we here translate Lord, see Clarke's note on Gen_2:4, and see Clarke's note on Exo_6:3. And on the word Elohim, here translated God, see Clarke's note on Gen_1:1. It is worthy of remark that each individual is addressed here, and not the people collectively, though they are all necessarily included; that each might feel that he was bound for himself to hear and do all these words. Moses labored to impress this personal interest on the people's minds, when he said, Deu_5:3, Deu_5:4 : “The Lord made this covenant with us, even us, who are all of us here alive this day.” Brought thee out of the land of Egypt, etc. - And by this very thing have proved myself to be superior to all gods, unlimited in power, and most gracious as well as fearful in operation. This is the preface or introduction, but should not be separated from the commandment. Therefore, -</span></p><span data-dcnode-id="691" instrument_node="">
</span></div><span data-dcnode-id="689" instrument_node="">
</span><h2 data-dcnode-id="686"><a data-dcnode-id="688" id="First" name="First"></a><span data-dcnode-id="687" instrument_node="">First of the Ten Commandments</span></h2><span data-dcnode-id="685" instrument_node="">
</span><div class="block" data-dcnode-id="669"><span data-dcnode-id="684" instrument_node="">
</span><p data-dcnode-id="674"><strong data-dcnode-id="682"><span data-dcnode-id="683" instrument_node="">Exodus 20:3 Thou shalt have no other gods before me -</span></strong><span data-dcnode-id="681" instrument_node=""> </span><span class="blue" data-dcnode-id="679"><span data-dcnode-id="680" instrument_node="">אלהים אחרים</span></span><span data-dcnode-id="678" instrument_node=""> elohim acherim, no strange gods - none that thou art not acquainted with, none who has not given thee such proofs of his power and godhead as I have done in delivering thee from the Egyptians, dividing the Red Sea, bringing water out of the rock, quails into the desert, manna from heaven to feed thee, and the pillar of cloud to direct, enlighten, and shield thee. By these miracles God had rendered himself familiar to them, they were intimately acquainted with the operation of his hands; and therefore with great propriety he says, Thou shalt have no strange gods before me; </span><span class="blue" data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">על פני</span></span><span data-dcnode-id="675" instrument_node=""> al panai, before or in the place of those manifestations which I have made of myself.</span></p><span data-dcnode-id="673" instrument_node="">
</span><p data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">This commandment prohibits every species of mental idolatry, and all inordinate attachment to earthly and sensible things. As God is the fountain of happiness, and no intelligent creature can be happy but through him, whoever seeks happiness in the creature is necessarily an idolater; as he puts the creature in the place of the Creator, expecting that from the gratification of his passions, in the use or abuse of earthly things, which is to be found in God alone. The very first commandment of the whole series is divinely calculated to prevent man's misery and promote his happiness, by taking him off from all false dependence, and leading him to God himself, the fountain of all good.</span></p><span data-dcnode-id="670" instrument_node="">
</span></div><span data-dcnode-id="668" instrument_node="">
</span><h2 data-dcnode-id="665"><a data-dcnode-id="667" id="Second" name="Second"></a><span data-dcnode-id="666" instrument_node="">Second of the Ten Commandments</span></h2><span data-dcnode-id="664" instrument_node="">
</span><div class="block" data-dcnode-id="589"><span data-dcnode-id="663" instrument_node="">
</span><p data-dcnode-id="653"><strong data-dcnode-id="661"><span data-dcnode-id="662" instrument_node="">Exodus 20:4 Thou shalt not make unto thee any graven image -</span></strong><span data-dcnode-id="660" instrument_node=""> As the word </span><span class="blue" data-dcnode-id="658"><span data-dcnode-id="659" instrument_node="">פסל</span></span><span data-dcnode-id="657" instrument_node=""> pasal signifies to hew, carve, grave, etc., </span><span class="blue" data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">פסל</span></span><span data-dcnode-id="654" instrument_node=""> pesel may here signify any kind of image, either of wood, stone, or metal, on which the axe, the chisel, or the graving tool has been employed. This commandment includes in its prohibitions every species of idolatry known to have been practiced among the Egyptians. The reader will see this the more plainly by consulting the notes on the ten plagues, particularly those on Exodus 12.</span></p><span data-dcnode-id="652" instrument_node="">
</span><p data-dcnode-id="648"><strong data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">Or any likeness, etc. -</span></strong><span data-dcnode-id="649" instrument_node=""> To know the full spirit and extent of this commandment, this place must be collated with Deu_4:15, etc.: Take ye therefore good heed unto yourselves - lest ye corrupt yourselves - and make you a graven image, the similitude of any figure, the likeness of Male or Female. All who have even the slightest acquaintance with the ancient history of Egypt, know that Osiris and his wife Isis were supreme divinities among that people.</span></p><span data-dcnode-id="647" instrument_node="">
</span><p data-dcnode-id="640"><strong data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">The likeness of any Beast -</span></strong><span data-dcnode-id="644" instrument_node=""> </span><span class="blue" data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">בהמה</span></span><span data-dcnode-id="641" instrument_node=""> behemah, such as the ox and the heifer. Among the Egyptians the ox was not only sacred but adored, because they supposed that in one of these animals Osiris took up his residence: hence they always had a living ox, which they supposed to be the habitation of this deity; and they imagined that on the death of one he entered into the body of another, and so on successively. This famous ox-god they called Apis and Mnevis.</span></p><span data-dcnode-id="639" instrument_node="">
</span><p data-dcnode-id="635"><strong data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">The likeness of any winged Fowl -</span></strong><span data-dcnode-id="636" instrument_node=""> The ibis, or stork, or crane, and hawk, may be here intended, for all these were objects of Egyptian idolatry.</span></p><span data-dcnode-id="634" instrument_node="">
</span><p data-dcnode-id="630"><strong data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">The likeness of any thing that Creepeth -</span></strong><span data-dcnode-id="631" instrument_node=""> The crocodile, serpents, the scarabeus or beetle, were all objects of their adoration; and Mr. Bryant has rendered it very probable that even the frog itself was a sacred animal, as from its inflation it was emblematic of the prophetic influence, for they supposed that the god inflated or distended the body of the person by whom he gave oracular answers.</span></p><span data-dcnode-id="629" instrument_node="">
</span><p data-dcnode-id="625"><strong data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">The likeness of any Fish -</span></strong><span data-dcnode-id="626" instrument_node=""> All fish were esteemed sacred animals among the Egyptians. One called Oxurunchus had, according to Strabo, lib. xvii., a temple, and divine honors paid to it. Another fish, called Phagrus, was worshipped at Syene, according to Clemens Alexandrinus in his Cohortatio. And the Lepidotus and eel were objects of their adoration, as we find from Herodotus, lib. ii., cap. 72. In short, oxen, heifers, sheep, goats, lions, dogs, monkeys, and cats; the ibis, the crane, and the hawk; the crocodile, serpents, frogs, flies, and the scarabeus or beetle; the Nile and its fish; the sun, moon, planets, and stars; fire, light, air, darkness, and night, were all objects of Egyptian idolatry, and all included in this very circumstantial prohibition as detailed in Deuteronomy, and very forcibly in the general terms of the text: Thou shalt not make unto thee any graven image, or any likeness of any thing that is in the Heavens above, or that is in the Earth beneath, or that is in the Water under the earth. And the reason of this becomes self-evident, when the various objects of Egyptian idolatry are considered.</span></p><span data-dcnode-id="624" instrument_node="">
</span><p data-dcnode-id="622"><span data-dcnode-id="623" instrument_node="">To countenance its image worship, the Roman Catholic Church has left the whole of this second commandment out of the decalogue, and thus lost one whole commandment out of the ten; but to keep up the number they have divided the tenth into two. This is totally contrary to the faith of God's elect and to the acknowledgment of that truth which is according to godliness. The verse is found in every MS. of the Hebrew Pentateuch that has ever yet been discovered. It is in all the ancient versions, Samaritan, Chaldee, Syriac, Septuagint, Vulgate, Coptic, and Arabic; also in the Persian, and in all modern versions. There is not one word of the whole verse wanting in the many hundreds of MSS. collected by Kennicott and De Rossi. This corruption of the word of God by the Roman Catholic Church stamps it, as a false and heretical Church, with the deepest brand of ever-during infamy! This commandment also prohibits every species of external idolatry, as the first does all idolatry that may be called internal or mental. All false worship may be considered of this kind, together with all image worship, and all other superstitious rites and ceremonies. See Clarke's note on Exo_20:23.</span></p><span data-dcnode-id="621" instrument_node="">
</span><p data-dcnode-id="617"><strong data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">Exodus 20:5 Jealous God -</span></strong><span data-dcnode-id="618" instrument_node=""> This shows in a most expressive manner the love of God to this people. He felt for them as the most affectionate husband could do for his spouse; and was jealous for their fidelity, because he willed their invariable happiness.</span></p><span data-dcnode-id="616" instrument_node="">
</span><p data-dcnode-id="612"><strong data-dcnode-id="614"><span data-dcnode-id="615" instrument_node="">Visiting the iniquity of the fathers upon the children -</span></strong><span data-dcnode-id="613" instrument_node=""> This necessarily implies - if the children walk in the steps of their fathers; for no man can be condemned by Divine justice for a crime of which he was never guilty; see Ezekiel 18. Idolatry is however particularly intended, and visiting sins of this kind refers principally to national judgments. By withdrawing the Divine protection the idolatrous Israelites were delivered up into the hands of their enemies, from whom the gods in whom they had trusted could not deliver them. This God did to the third and fourth generations, i.e., successively; as may be seen in every part of the Jewish history, and particularly in the book of Judges. And this, at last, became the grand and the only effectual and lasting means in his hand of their final deliverance from idolatry; for it is well known that after the Babylonish captivity the Israelites were so completely saved from idolatry, as never more to have disgraced themselves by it as they had formerly done. These national judgments, thus continued from generation to generation, appear to be what are designed by the words in the text, Visiting the sins of the fathers upon the children, etc.</span></p><span data-dcnode-id="611" instrument_node="">
</span><p data-dcnode-id="607"><strong data-dcnode-id="609"><span data-dcnode-id="610" instrument_node="">Exodus 20:6 And showing mercy unto thousands -</span></strong><span data-dcnode-id="608" instrument_node=""> Mark; even those who love God and keep his commandments merit nothing from him, and therefore the salvation and blessedness which these enjoy come from the mercy of God: Showing mercy, etc. What a disproportion between the works of justice and mercy! Justice works to the third or fourth, mercy to thousands of generations! The heathen had maxims like these. Theocritus also teaches that the children of the good shall be blessed because of their parents' piety, and that evil shall come upon the offspring of the wicked: -</span></p><span data-dcnode-id="606" instrument_node="">
</span><p data-dcnode-id="599"><span class="blue" data-dcnode-id="604"><span data-dcnode-id="605" instrument_node="">Ευσεβεων παιδεσσι τα λωΐα, δυσσεβεων δ' ου</span></span><span data-dcnode-id="603" instrument_node="">.</span><br data-dcnode-id="602"><em data-dcnode-id="600"><span data-dcnode-id="601" instrument_node="">Idyll. 26, v. 32.</span></em></p><span data-dcnode-id="598" instrument_node="">
</span><p data-dcnode-id="594"><span data-dcnode-id="597" instrument_node="">Upon the children of the righteous fall</span><br data-dcnode-id="596"><span data-dcnode-id="595" instrument_node="">
			The choicest blessings; on the wicked, wo.</span></p><span data-dcnode-id="593" instrument_node="">
</span><p data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">That love me, and keep my commandments - It was this that caused Christ to comprise the fulfillment of the whole law in love to God and man; see Clarke's note on Exo_20:1. And as love is the grand principle of obedience, and the only incentive to it, so there can be no obedience without it. It would be more easy even in Egyptian bondage to make brick without straw, than to do the will of God unless his love be shed abroad in the heart of the Holy Spirit. Love, says the apostle, is the fulfilling of the law; Rom_13:10.</span></p><span data-dcnode-id="590" instrument_node="">
</span></div><span data-dcnode-id="588" instrument_node="">
</span><h2 data-dcnode-id="585"><a data-dcnode-id="587" id="Third" name="Third"></a><span data-dcnode-id="586" instrument_node="">Third of the Ten Commandments</span></h2><span data-dcnode-id="584" instrument_node="">
</span><div class="block" data-dcnode-id="566"><span data-dcnode-id="583" instrument_node="">
</span><p data-dcnode-id="573"><strong data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">Exodus 20:7 Thou shalt not take the name of the Lord thy God in vain -</span></strong><span data-dcnode-id="580" instrument_node=""> This precept not only forbids all false oaths, but all common swearing where the name of God is used, or where he is appealed to as a witness of the truth. It also necessarily forbids all light and irreverent mention of God, or any of his attributes; and this the original word </span><span class="blue" data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">לשוא</span></span><span data-dcnode-id="577" instrument_node=""> lashshav particularly imports: and we may safely add to all these, that every prayer, ejaculation, etc., that is not accompanied with deep reverence and the genuine spirit of piety, is here condemned also. In how many thousands of instances is this commandment broken in the prayers, whether read or extempore, of inconsiderate, bold, and presumptuous worshippers! And how few are there who do not break it, both in their public and private devotions! How low is piety when we are obliged in order to escape damnation, to pray to God to “pardon the sins of our holy things!” Even heathens thought that the names of their gods should be treated with reverence. </span><span class="blue" data-dcnode-id="575"><span data-dcnode-id="576" instrument_node="">Παντως μεν δη καλον επι ηδευμα, θεων ονοματα μη χραινειν ῥᾳδιως, εχοντα ὡς εχουσιν ἡμων ἑκαστοτε τα πολλα οἱ πλειστοι καθαροτητος τε και ἁγνειας τα περι τους θεους</span></span><span data-dcnode-id="574" instrument_node="">. “It is most undoubtedly right not easily to pollute the names of the gods, using them as we do common names; but to watch with purity and holiness all things belonging to the gods.”</span></p><span data-dcnode-id="572" instrument_node="">
</span><p data-dcnode-id="568"><strong data-dcnode-id="570"><span data-dcnode-id="571" instrument_node="">The Lord will not hold him guiltless, etc. -</span></strong><span data-dcnode-id="569" instrument_node=""> Whatever the person himself may think or hope, however he may plead in his own behalf, and say he intends no evil, etc.; if he in any of the above ways, or in any other way, takes the name of God in vain, God will not hold him guiltless - he will account him guilty and punish him for it. Is it necessary to say to any truly spiritual mind, that all such interjections as O God! my God! good God! good Heavens! etc., etc., are formal positive breaches of this law? How many who pass for Christians are highly criminal here!</span></p><span data-dcnode-id="567" instrument_node="">
</span></div><span data-dcnode-id="565" instrument_node="">
</span><h2 data-dcnode-id="562"><a data-dcnode-id="564" id="Fourth" name="Fourth"></a><span data-dcnode-id="563" instrument_node="">Fourth of the Ten Commandments</span></h2><span data-dcnode-id="561" instrument_node="">
</span><div class="block" data-dcnode-id="546"><span data-dcnode-id="560" instrument_node="">
</span><p data-dcnode-id="553"><strong data-dcnode-id="558"><span data-dcnode-id="559" instrument_node="">Exodus 20:8 Remember the Sabbath day, to keep it holy -</span></strong><span data-dcnode-id="557" instrument_node=""> See what has been already said on this precept, Gen_2:2, and elsewhere. See Clarke's note on Gen_2:2. As this was the most ancient institution, God calls them to remember it; as if he had said, Do not forget that when I had finished my creation I instituted the Sabbath, and remember why I did so, and for what purposes. The word </span><span class="blue" data-dcnode-id="555"><span data-dcnode-id="556" instrument_node="">שבת</span></span><span data-dcnode-id="554" instrument_node=""> shabbath signifies rest or cessation from labor; and the sanctification of the seventh day is commanded, as having something representative in it; and so indeed it has, for it typifies the rest which remains for the people of God, and in this light it evidently appears to have been understood by the apostle, Hebrews 4. Because this commandment has not been particularly mentioned in the New Testament as a moral precept binding on all, therefore some have presumptuously inferred that there is no Sabbath under the Christian dispensation. The truth is, the Sabbath is considered as a type: all types are of full force till the thing signified by them takes place; but the thing signified by the Sabbath is that rest in glory which remains for the people of God, therefore the moral obligation of the Sabbath must continue till time be swallowed up in eternity.</span></p><span data-dcnode-id="552" instrument_node="">
</span><p data-dcnode-id="548"><strong data-dcnode-id="550"><span data-dcnode-id="551" instrument_node="">Exodus 20:9 Six days shalt thou labor -</span></strong><span data-dcnode-id="549" instrument_node=""> Therefore he who idles away time on any of the six days, is as guilty before God as he who works on the Sabbath. No work should be done on the Sabbath that can be done on the preceding days, or can be deferred to the succeeding ones. Works of absolute necessity and mercy are alone excepted. He who works by his servants or cattle is equally guilty as if he worked himself. Hiring out horses, etc., for pleasure or business, going on journeys, paying worldly visits, or taking jaunts on the Lord's day, are breaches of this law. The whole of it should be devoted to the rest of the body and the improvement of the mind. God says he has hallowed it - he has made it sacred and set it apart for the above purposes. It is therefore the most proper day for public religious worship.</span></p><span data-dcnode-id="547" instrument_node="">
</span></div><span data-dcnode-id="545" instrument_node="">
</span><h2 data-dcnode-id="542"><a data-dcnode-id="544" id="Fifth" name="Fifth"></a><span data-dcnode-id="543" instrument_node="">Fifth of the Ten Commandments</span></h2><span data-dcnode-id="541" instrument_node="">
</span><div class="block" data-dcnode-id="518"><span data-dcnode-id="540" instrument_node="">
</span><p data-dcnode-id="536"><strong data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">Exodus 20:12 Honor thy father and thy mother -</span></strong><span data-dcnode-id="537" instrument_node=""> There is a degree of affectionate respect which is owing to parents, that no person else can properly claim. For a considerable time parents stand as it were in the place of God to their children, and therefore rebellion against their lawful commands has been considered as rebellion against God. This precept therefore prohibits, not only all injurious acts, irreverent and unkind speeches to parents, but enjoins all necessary acts of kindness, filial respect, and obedience. We can scarcely suppose that a man honors his parents who, when they fall weak, blind, or sick, does not exert himself to the uttermost in their support. In such cases God as truly requires the children to provide for their parents, as he required the parents to feed, nourish, support, instruct, and defend the children when they were in the lowest state of helpless in fancy. See Clarke's note on Gen_48:12. The rabbins say, Honor the Lord with thy substance, Pro_3:9; and, Honor thy father and mother. The Lord is to be honored thus if thou have it; thy father and mother, whether thou have it or not; for if thou have nothing, thou art bound to beg for them. See Ainsworth.</span></p><span data-dcnode-id="535" instrument_node="">
</span><p data-dcnode-id="531"><strong data-dcnode-id="533"><span data-dcnode-id="534" instrument_node="">That thy days may be long -</span></strong><span data-dcnode-id="532" instrument_node=""> This, as the apostle observes, Eph_6:2, is the first commandment to which God has annexed a promise; and therefore we may learn in some measure how important the duty is in the sight of God. In Deu_5:16 it is said, And that it may go well with thee; we may therefore conclude that it will go ill with the disobedient; and there is no doubt that the untimely deaths of many young persons are the judicial consequence of their disobedience to their parents. Most who come to an untimely end are obliged to confess that this, with the breach of the Sabbath, was the principal cause of their ruin. Reader, art thou guilty? Humble thyself therefore before God, and repent. 1. As children are bound to succor their parents, so parents are bound to educate and instruct their children in all useful and necessary knowledge, and not to bring them up either in ignorance or idleness. 2. They should teach their children the fear and knowledge of God, for how can they expect affection or dutiful respect from those who have not the fear of God before their eyes? Those who are best educated are generally the most dutiful. Heathens also inculcated respect to parents.</span></p><span data-dcnode-id="530" instrument_node="">
</span><p data-dcnode-id="523"><span class="blue" data-dcnode-id="528"><span data-dcnode-id="529" instrument_node="">Ουδεν προς θεων τιμιωτερον αγαλμα αν κτησαιμεθα πατρος και προπατορος παρειμενων γηρᾳ, και μητερων την αυτην δυναμιν εχουσων· οὑς ὁυταν αγαλλῃ τις, τιμαις γεγηθεν ὁ θεος. - Πας δη νουν εχων φοβειται και τιμᾳ, γονενων ευχας ειδως πολλοις και πολλακις επιτελεις γενομενας</span></span><span data-dcnode-id="527" instrument_node="">.</span><br data-dcnode-id="526"><em data-dcnode-id="524"><span data-dcnode-id="525" instrument_node="">Plato de Leg., lib. xi., vol. ix, p. 160. Ed. Bipont.</span></em></p><span data-dcnode-id="522" instrument_node="">
</span><p data-dcnode-id="520"><span data-dcnode-id="521" instrument_node="">“We can obtain no more honorable possession from the gods than fathers and forefathers worn down with age, and mothers who have undergone the same change, whom when we delight, God is pleased with the honor; and every one that is governed by right understanding fears and reverences them, well knowing that the prayers of parents oftentimes, and in many particulars, have received full accomplishment.”</span></p><span data-dcnode-id="519" instrument_node="">
</span></div><span data-dcnode-id="517" instrument_node="">
</span><h2 data-dcnode-id="514"><a data-dcnode-id="516" id="Sixth" name="Sixth"></a><span data-dcnode-id="515" instrument_node="">Sixth of the Ten Commandments</span></h2><span data-dcnode-id="513" instrument_node="">
</span><div class="block" data-dcnode-id="494"><span data-dcnode-id="512" instrument_node="">
</span><p data-dcnode-id="496"><strong data-dcnode-id="510"><span data-dcnode-id="511" instrument_node="">Exodus 20:13 Thou shalt not kill -</span></strong><span data-dcnode-id="509" instrument_node=""> This commandment, which is general, prohibits murder of every kind.</span><br data-dcnode-id="508"><span data-dcnode-id="507" instrument_node="">
			1.&nbsp;&nbsp; All actions by which the lives of our fellow creatures may be abridged.</span><br data-dcnode-id="506"><span data-dcnode-id="505" instrument_node="">
			2.&nbsp;&nbsp; All wars for extending empire, commerce, etc.</span><br data-dcnode-id="504"><span data-dcnode-id="503" instrument_node="">
			3.&nbsp;&nbsp; All sanguinary laws, by the operation of which the lives of men may be taken away for offenses of comparatively trifling demerit.</span><br data-dcnode-id="502"><span data-dcnode-id="501" instrument_node="">
			4.&nbsp;&nbsp; All bad dispositions which lead men to wish evil to, or meditate mischief against, one another; for, says the Scripture, He that hateth his brother in his heart is a murderer.</span><br data-dcnode-id="500"><span data-dcnode-id="499" instrument_node="">
			5.&nbsp;&nbsp; All want of charity to the helpless and distressed; for he who has it in his power to save the life of another by a timely application of succor, food, raiment, etc., and does not do it, and the life of the person either falls or is abridged on this account, is in the sight of God a murderer. He who neglects to save life is, according to an incontrovertible maxim in law, the same as he who takes it away.</span><br data-dcnode-id="498"><span data-dcnode-id="497" instrument_node="">
			6.&nbsp;&nbsp; All riot and excess, all drunkenness and gluttony, all inactivity and slothfulness, and all superstitious mortifications and self-denials, by which life may be destroyed or shortened; all these are point-blank sins against the sixth commandment.</span></p><span data-dcnode-id="495" instrument_node="">
</span></div><span data-dcnode-id="493" instrument_node="">
</span><h2 data-dcnode-id="490"><a data-dcnode-id="492" id="Seventh" name="Seventh"></a><span data-dcnode-id="491" instrument_node="">Seventh of the Ten Commandments</span></h2><span data-dcnode-id="489" instrument_node="">
</span><div class="block" data-dcnode-id="465"><span data-dcnode-id="488" instrument_node="">
</span><p data-dcnode-id="479"><strong data-dcnode-id="486"><span data-dcnode-id="487" instrument_node="">Exodus 20:14 Thou shalt not commit adultery -</span></strong><span data-dcnode-id="485" instrument_node=""> Adultery, as defined by our laws, is of two kinds; double, when between two married persons; single, when one of the parties is married, the other single. One principal part of the criminality of adultery consists in its injustice.</span><br data-dcnode-id="484"><br data-dcnode-id="483"><span data-dcnode-id="482" instrument_node="">
			1.&nbsp;&nbsp; It robs a man of his right by taking from him the affection of his wife.</span><br data-dcnode-id="481"><span data-dcnode-id="480" instrument_node="">
			2.&nbsp;&nbsp; It does him a wrong by fathering on him and obliging him to maintain as his own a spurious offspring - a child which is not his. The act itself, and every thing leading to the act, is prohibited by this commandment; for our Lord says, Even he who looks on a woman to lust after her, has already committed adultery with her in his heart. And not only adultery (the unlawful commerce between two married persons) is forbidden here, but also fornication and all kinds of mental and sensual uncleanness. All impure books, songs, paintings, etc., which tend to inflame and debauch the mind, are against this law, as well as another species of impurity, for the account of which the reader is referred to; See Clarke's note on Gen_38:30.</span></p><span data-dcnode-id="478" instrument_node="">
</span><p data-dcnode-id="467"><span data-dcnode-id="477" instrument_node="">That fornication was included under this command we may gather from St. Matthew, Mat_15:19, where our Savior expresses the sense of the different commandments by a word for each, and mentions them in the order in which they stand; but when he comes to the seventh he uses two words, </span><span class="blue" data-dcnode-id="475"><span data-dcnode-id="476" instrument_node="">μοιχειαι πορνειαι</span></span><span data-dcnode-id="474" instrument_node="">, to express its meaning, and then goes on to the eighth, etc.; thus evidently showing that fornication was understood to be comprehended under the command, “Thou shalt not commit adultery.” As to the word adultery, </span><em data-dcnode-id="472"><span data-dcnode-id="473" instrument_node="">adulterium</span></em><span data-dcnode-id="471" instrument_node="">, it has probably been derived from the words </span><em data-dcnode-id="469"><span data-dcnode-id="470" instrument_node="">ad alterius torum</span></em><span data-dcnode-id="468" instrument_node="">, to another's bed; for it is going to the bed of another man that constitutes the act and the crime. Adultery often means idolatry in the worship of God.</span></p><span data-dcnode-id="466" instrument_node="">
</span></div><span data-dcnode-id="464" instrument_node="">
</span><h2 data-dcnode-id="461"><a data-dcnode-id="463" id="Eight" name="Eight"></a><span data-dcnode-id="462" instrument_node="">Eight of the Ten Commandments</span></h2><span data-dcnode-id="460" instrument_node="">
</span><div class="block" data-dcnode-id="437"><span data-dcnode-id="459" instrument_node="">
</span><p data-dcnode-id="455"><strong data-dcnode-id="457"><span data-dcnode-id="458" instrument_node="">Exodus 20:15 Thou shalt not steal -</span></strong><span data-dcnode-id="456" instrument_node=""> All rapine and theft are forbidden by this precept; as well national and commercial wrongs as petty larceny, highway robberies, and private stealing: even the taking advantage of a seller's or buyer's ignorance, to give the one less and make the other pay more for a commodity than its worth, is a breach of this sacred law. All withholding of rights and doing of wrongs are against the spirit of it. But the word is principally applicable to clandestine stealing, though it may undoubtedly include all political injustice and private wrongs. And consequently all kidnapping, crimping, and slave-dealing are prohibited here, whether practiced by individuals or by the state. Crimes are not lessened in their demerit by the number, or political importance of those who commit them. A state that enacts bad laws is as criminal before God as the individual who breaks good ones.</span></p><span data-dcnode-id="454" instrument_node="">
</span><p data-dcnode-id="452"><span data-dcnode-id="453" instrument_node="">It has been supposed that under the eighth commandment, injuries done to character, the depriving a man of his reputation or good name, are included, hence those words of one of our poets: -</span></p><span data-dcnode-id="451" instrument_node="">
</span><p data-dcnode-id="439"><span data-dcnode-id="450" instrument_node="">Good name in man or woman</span><br data-dcnode-id="449"><span data-dcnode-id="448" instrument_node="">
			Is the immediate jewel of their souls.</span><br data-dcnode-id="447"><span data-dcnode-id="446" instrument_node="">
			Who steals my purse steals trash, -</span><br data-dcnode-id="445"><span data-dcnode-id="444" instrument_node="">
			But he that filches from me my good name,</span><br data-dcnode-id="443"><span data-dcnode-id="442" instrument_node="">
			Robs me of that which not enriches him,</span><br data-dcnode-id="441"><span data-dcnode-id="440" instrument_node="">
			And makes me poor indeed.</span></p><span data-dcnode-id="438" instrument_node="">
</span></div><span data-dcnode-id="436" instrument_node="">
</span><h2 data-dcnode-id="433"><a data-dcnode-id="435" id="Ninth" name="Ninth"></a><span data-dcnode-id="434" instrument_node="">Ninth of the Ten Commandments</span></h2><span data-dcnode-id="432" instrument_node="">
</span><div class="block" data-dcnode-id="425"><span data-dcnode-id="431" instrument_node="">
</span><p data-dcnode-id="427"><strong data-dcnode-id="429"><span data-dcnode-id="430" instrument_node="">Exodus 20:16 Thou shalt not bear false witness, etc. -</span></strong><span data-dcnode-id="428" instrument_node=""> Not only false oaths, to deprive a man of his life or of his right, are here prohibited, but all whispering, tale-bearing, slander, and calumny; in a word, whatever is deposed as a truth, which is false in fact, and tends to injure another in his goods, person, or character, is against the spirit and letter of this law. Suppressing the truth when known, by which a person may be defrauded of his property or his good name, or lie under injuries or disabilities which a discovery of the truth would have prevented, is also a crime against this law. He who bears a false testimony against or belies even the devil himself, comes under the curse of this law, because his testimony is false. By the term neighbor any human being is intended, whether he rank among our enemies or friends.</span></p><span data-dcnode-id="426" instrument_node="">
</span></div><span data-dcnode-id="424" instrument_node="">
</span><h2 data-dcnode-id="421"><a data-dcnode-id="423" id="Tenth" name="Tenth"></a><span data-dcnode-id="422" instrument_node="">Tenth of the Ten Commandments</span></h2><span data-dcnode-id="420" instrument_node="">
</span><div class="block" data-dcnode-id="410"><span data-dcnode-id="419" instrument_node="">
</span><p data-dcnode-id="415"><strong data-dcnode-id="417"><span data-dcnode-id="418" instrument_node="">Exodus 20:17 Thou shalt not covet thy neighbor's house - wife, etc. -</span></strong><span data-dcnode-id="416" instrument_node=""> Covet signifies to desire or long after, in order to enjoy as a property the person or thing coveted. He breaks this command who by any means endeavors to deprive a man of his house or farm by taking them over his head, as it is expressed in some countries; who lusts after his neighbor's wife, and endeavors to ingratiate himself into her affections, and to lessen her husband in her esteem; and who endeavors to possess himself of the servants, cattle, etc., of another in any clandestine or unjustifiable manner.</span></p><span data-dcnode-id="414" instrument_node="">
</span><p data-dcnode-id="412"><span data-dcnode-id="413" instrument_node="">“This is a most excellent moral precept, the observance of which will prevent all public crimes; for he who feels the force of the law that prohibits the inordinate desire of any thing that is the property of another, can never make a breach in the peace of society by an act of wrong to any of even its feeblest members.”</span></p><span data-dcnode-id="411" instrument_node="">
</span></div><span data-dcnode-id="409" instrument_node="">
