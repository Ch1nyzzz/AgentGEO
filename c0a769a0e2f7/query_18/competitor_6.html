</span></p><p data-dcnode-id="8348"><span data-dcnode-id="8370" instrument_node="">In printed </span><a data-dcnode-id="8368" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chumash_%28Judaism%29" title="Chumash (Judaism)"><span data-dcnode-id="8369" instrument_node="">Chumashim</span></a><span data-dcnode-id="8367" instrument_node="">, as well as in those in manuscript form, the Ten Commandments carry two sets of </span><a data-dcnode-id="8365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hebrew_cantillation" title="Hebrew cantillation"><span data-dcnode-id="8366" instrument_node="">cantillation</span></a><span data-dcnode-id="8364" instrument_node=""> marks. The </span><i data-dcnode-id="8362"><span data-dcnode-id="8363" instrument_node="">ta'am 'elyon</span></i><span data-dcnode-id="8361" instrument_node=""> (upper accentuation), which makes each Commandment into a separate verse, is used for public Torah reading, while the </span><i data-dcnode-id="8359"><span data-dcnode-id="8360" instrument_node="">ta'am tachton</span></i><span data-dcnode-id="8358" instrument_node=""> (lower accentuation), which divides the text into verses of more even length, is used for private reading or study. The verse numbering in Jewish Bibles follows the </span><i data-dcnode-id="8356"><span data-dcnode-id="8357" instrument_node="">ta'am tachton</span></i><span data-dcnode-id="8355" instrument_node="">. In Jewish Bibles the references to the Ten Commandments are therefore </span><a class="external text" data-dcnode-id="8353" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bible.oremus.org/%3Fpassage%3DExodus%252020%3A2%25E2%2580%259314%26version%3Dnrsv" rel="nofollow"><span data-dcnode-id="8354" instrument_node="">Exodus 20:2–14</span></a><span data-dcnode-id="8352" instrument_node=""> and </span><a class="external text" data-dcnode-id="8350" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bible.oremus.org/%3Fpassage%3DDeuteronomy%25205%3A6%25E2%2580%259318%26version%3Dnrsv" rel="nofollow"><span data-dcnode-id="8351" instrument_node="">Deuteronomy 5:6–18</span></a><span data-dcnode-id="8349" instrument_node="">.
</span></p><span data-dcnode-id="8347" instrument_node="">
</span><h4 data-dcnode-id="8337"><span class="mw-headline" data-dcnode-id="8345" id="Samaritan"><span data-dcnode-id="8346" instrument_node="">Samaritan</span></span><span class="mw-editsection" data-dcnode-id="8338"><span class="mw-editsection-bracket" data-dcnode-id="8343"><span data-dcnode-id="8344" instrument_node="">[</span></span><a data-dcnode-id="8341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTen_Commandments%26action%3Dedit%26section%3D8" title="Edit section: Samaritan"><span data-dcnode-id="8342" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8339"><span data-dcnode-id="8340" instrument_node="">]</span></span></span></h4><span data-dcnode-id="8336" instrument_node="">
</span><p data-dcnode-id="8328"><span data-dcnode-id="8335" instrument_node="">The </span><a data-dcnode-id="8333" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Samaritan_Pentateuch" title="Samaritan Pentateuch"><span data-dcnode-id="8334" instrument_node="">Samaritan Pentateuch</span></a><span data-dcnode-id="8332" instrument_node=""> varies in the Ten Commandments passages, both in that the Samaritan Deuteronomical version of the passage is much closer to that in Exodus, and in that Samaritans count as nine commandments what others count as ten. The Samaritan tenth commandment is on the sanctity of </span><a data-dcnode-id="8330" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mount_Gerizim" title="Mount Gerizim"><span data-dcnode-id="8331" instrument_node="">Mount Gerizim</span></a><span data-dcnode-id="8329" instrument_node="">.
</span></p><p data-dcnode-id="8322"><span data-dcnode-id="8327" instrument_node="">The text of the Samaritan tenth commandment follows:</span><sup class="reference" data-dcnode-id="8324" id="cite_ref-75"><a data-dcnode-id="8325" href="#cite_note-75"><span data-dcnode-id="8326" instrument_node="">[75]</span></a></sup><span data-dcnode-id="8323" instrument_node="">
</span></p><span data-dcnode-id="8321" instrument_node="">
</span><link data-dcnode-id="8320" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="8314"><p data-dcnode-id="8315"><span data-dcnode-id="8319" instrument_node="">And it shall come to pass when the Lord thy God will bring thee into the land of the Canaanites whither thou goest to take possession of it, thou shalt erect unto thee large stones, and thou shalt cover them with lime, and thou shalt write upon the stones all the words of this Law, and it shall come to pass when ye cross the Jordan, ye shall erect these stones which I command thee upon </span><i data-dcnode-id="8317"><span data-dcnode-id="8318" instrument_node="">Mount Gerizim</span></i><span data-dcnode-id="8316" instrument_node="">, and thou shalt build there an altar unto the Lord thy God, an altar of stones, and thou shalt not lift upon them iron, of perfect stones shalt thou build thine altar, and thou shalt bring upon it burnt offerings to the Lord thy God, and thou shalt sacrifice peace offerings, and thou shalt eat there and rejoice before the Lord thy God. That mountain is on the other side of the Jordan at the end of the road towards the going down of the sun in the land of the Canaanites who dwell in the Arabah facing Gilgal close by Elon Moreh facing Shechem.</span></p></blockquote><span data-dcnode-id="8313" instrument_node="">
</span><h3 data-dcnode-id="8303"><span class="mw-headline" data-dcnode-id="8311" id="Christianity"><span data-dcnode-id="8312" instrument_node="">Christianity</span></span><span class="mw-editsection" data-dcnode-id="8304"><span class="mw-editsection-bracket" data-dcnode-id="8309"><span data-dcnode-id="8310" instrument_node="">[</span></span><a data-dcnode-id="8307" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTen_Commandments%26action%3Dedit%26section%3D9" title="Edit section: Christianity"><span data-dcnode-id="8308" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8305"><span data-dcnode-id="8306" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8302" instrument_node="">
</span><link data-dcnode-id="8301" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="8297" role="note"><span data-dcnode-id="8300" instrument_node="">See also: </span><a data-dcnode-id="8298" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Christian_views_on_the_Old_Covenant" title="Christian views on the Old Covenant"><span data-dcnode-id="8299" instrument_node="">Christian views on the Old Covenant</span></a></div><span data-dcnode-id="8296" instrument_node="">
</span><p data-dcnode-id="8276"><span data-dcnode-id="8295" instrument_node="">Most traditions of Christianity hold that the Ten Commandments have divine authority and continue to be valid, though they have different interpretations and uses of them.</span><sup class="reference" data-dcnode-id="8292" id="cite_ref-76"><a data-dcnode-id="8293" href="#cite_note-76"><span data-dcnode-id="8294" instrument_node="">[76]</span></a></sup><span data-dcnode-id="8291" instrument_node=""> The </span><a data-dcnode-id="8289" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Apostolic_Constitutions" title="Apostolic Constitutions"><span data-dcnode-id="8290" instrument_node="">Apostolic Constitutions</span></a><span data-dcnode-id="8288" instrument_node="">, which implore believers to "always remember the ten commands of God," reveal the importance of the Decalogue in the </span><a class="mw-redirect" data-dcnode-id="8286" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Early_Church" title="Early Church"><span data-dcnode-id="8287" instrument_node="">early Church</span></a><span data-dcnode-id="8285" instrument_node="">.</span><sup class="reference" data-dcnode-id="8282" id="cite_ref-Roberts2007_77-0"><a data-dcnode-id="8283" href="#cite_note-Roberts2007-77"><span data-dcnode-id="8284" instrument_node="">[77]</span></a></sup><span data-dcnode-id="8281" instrument_node=""> Through most of Christian history the decalogue was considered a summary of God's law and standard of behaviour, central to Christian life, piety, and worship.</span><sup class="reference" data-dcnode-id="8278" id="cite_ref-78"><a data-dcnode-id="8279" href="#cite_note-78"><span data-dcnode-id="8280" instrument_node="">[78]</span></a></sup><span data-dcnode-id="8277" instrument_node="">
</span></p><p data-dcnode-id="8261"><span data-dcnode-id="8275" instrument_node="">Distinctions in the order and importance of said order continues to be a theological debate,</span><sup class="reference" data-dcnode-id="8272" id="cite_ref-79"><a data-dcnode-id="8273" href="#cite_note-79"><span data-dcnode-id="8274" instrument_node="">[79]</span></a></sup><span data-dcnode-id="8271" instrument_node=""> with texts within the New Testament </span><a class="external text" data-dcnode-id="8269" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bible.oremus.org/%3Fpassage%3DRomans%252013%3A9%26version%3Dnrsv" rel="nofollow"><span data-dcnode-id="8270" instrument_node="">Romans 13:9</span></a><span data-dcnode-id="8268" instrument_node=""> confirming the more traditional ordering, which follows the </span><a data-dcnode-id="8266" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Septuagint" title="Septuagint"><span data-dcnode-id="8267" instrument_node="">Septuagint</span></a><span data-dcnode-id="8265" instrument_node=""> of adultery, murder and theft; as opposed to the currently held order of the </span><a class="mw-redirect" data-dcnode-id="8263" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Masoretic" title="Masoretic"><span data-dcnode-id="8264" instrument_node="">Masoretic</span></a><span data-dcnode-id="8262" instrument_node=""> of murder, adultery, theft.
</span></p><span data-dcnode-id="8260" instrument_node="">
</span><h4 data-dcnode-id="8250"><span class="mw-headline" data-dcnode-id="8258" id="References_in_the_New_Testament"><span data-dcnode-id="8259" instrument_node="">References in the New Testament</span></span><span class="mw-editsection" data-dcnode-id="8251"><span class="mw-editsection-bracket" data-dcnode-id="8256"><span data-dcnode-id="8257" instrument_node="">[</span></span><a data-dcnode-id="8254" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTen_Commandments%26action%3Dedit%26section%3D10" title="Edit section: References in the New Testament"><span data-dcnode-id="8255" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8252"><span data-dcnode-id="8253" instrument_node="">]</span></span></span></h4><span data-dcnode-id="8249" instrument_node="">
</span><link data-dcnode-id="8248" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="8244" role="note"><span data-dcnode-id="8247" instrument_node="">See also: </span><a data-dcnode-id="8245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Matthew_5%23Antitheses" title="Matthew 5"><span data-dcnode-id="8246" instrument_node="">Matthew 5 §&nbsp;Antitheses</span></a></div><span data-dcnode-id="8243" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="8232"><div class="thumbinner" data-dcnode-id="8233" style="width:292px;"><a class="image" data-dcnode-id="8241" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMoses_and_Aaron_with_the_10_Commandments_1674.jpg"><img alt="" class="thumbimage" data-dcnode-id="8242" data-file-height="1669" data-file-width="2488" decoding="async" height="195" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/9/93/Moses_and_Aaron_with_the_10_Commandments_1674.jpg/290px-Moses_and_Aaron_with_the_10_Commandments_1674.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/9/93/Moses_and_Aaron_with_the_10_Commandments_1674.jpg/435px-Moses_and_Aaron_with_the_10_Commandments_1674.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/9/93/Moses_and_Aaron_with_the_10_Commandments_1674.jpg/580px-Moses_and_Aaron_with_the_10_Commandments_1674.jpg 2x" width="290"></a><span data-dcnode-id="8240" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="8234"><div class="magnify" data-dcnode-id="8238"><a class="internal" data-dcnode-id="8239" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMoses_and_Aaron_with_the_10_Commandments_1674.jpg" title="Enlarge"></a></div><i data-dcnode-id="8236"><span data-dcnode-id="8237" instrument_node="">Moses and Aaron with the Ten Commandments</span></i><span data-dcnode-id="8235" instrument_node=""> (painting circa 1675 by Aron de Chavez)</span></div></div></div><span data-dcnode-id="8231" instrument_node="">
</span><p data-dcnode-id="8214"><span data-dcnode-id="8230" instrument_node="">During his </span><a data-dcnode-id="8228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sermon_on_the_Mount" title="Sermon on the Mount"><span data-dcnode-id="8229" instrument_node="">Sermon on the Mount</span></a><span data-dcnode-id="8227" instrument_node="">, Jesus explicitly referenced the prohibitions against murder and adultery. In </span><a class="external text" data-dcnode-id="8225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bible.oremus.org/%3Fpassage%3DMatthew%252019%3A16%25E2%2580%259319%26version%3Dnrsv" rel="nofollow"><span data-dcnode-id="8226" instrument_node="">Matthew 19:16–19</span></a><span data-dcnode-id="8224" instrument_node=""> </span><a data-dcnode-id="8222" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jesus" title="Jesus"><span data-dcnode-id="8223" instrument_node="">Jesus</span></a><span data-dcnode-id="8221" instrument_node=""> repeated five of the Ten Commandments, followed by that commandment called "the second" (</span><a class="external text" data-dcnode-id="8219" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bible.oremus.org/%3Fpassage%3DMatthew%252022%3A34%25E2%2580%259340%26version%3Dnrsv" rel="nofollow"><span data-dcnode-id="8220" instrument_node="">Matthew 22:34–40</span></a><span data-dcnode-id="8218" instrument_node="">) after the </span><a data-dcnode-id="8216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Great_Commandment" title="Great Commandment"><span data-dcnode-id="8217" instrument_node="">first and great commandment</span></a><span data-dcnode-id="8215" instrument_node="">.
</span></p><span data-dcnode-id="8213" instrument_node="">
</span><link data-dcnode-id="8212" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="8204"><p data-dcnode-id="8210"><span data-dcnode-id="8211" instrument_node="">And, behold, one came and said unto him, Good Master, what good thing shall I do, that I may have eternal life? And he said unto him, Why callest thou me good? There is none good but one, that is, God: but if thou wilt enter into life, keep the commandments.
He saith unto him, Which? Jesus said, Thou shalt do no murder, Thou shalt not commit adultery, Thou shalt not steal, Thou shalt not bear false witness, Honour thy father and thy mother: and, Thou shalt love thy neighbour as thyself.</span></p><div class="templatequotecite" data-dcnode-id="8205"><span data-dcnode-id="8209" instrument_node="">— </span><cite data-dcnode-id="8206"><a class="extiw" data-dcnode-id="8207" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikisource.org/wiki/Bible_%28King_James%29/Matthew%2319%3A16" title="s:Bible (King James)/Matthew"><span data-dcnode-id="8208" instrument_node="">Matthew 19:16–19</span></a></cite></div></blockquote><span data-dcnode-id="8203" instrument_node="">
</span><p data-dcnode-id="8195"><span data-dcnode-id="8202" instrument_node="">In his </span><a data-dcnode-id="8200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Epistle_to_the_Romans" title="Epistle to the Romans"><span data-dcnode-id="8201" instrument_node="">Epistle to the Romans</span></a><span data-dcnode-id="8199" instrument_node="">, </span><a data-dcnode-id="8197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paul_the_Apostle" title="Paul the Apostle"><span data-dcnode-id="8198" instrument_node="">Paul the Apostle</span></a><span data-dcnode-id="8196" instrument_node=""> also mentioned five of the Ten Commandments and associated them with the neighbourly love commandment.
</span></p><span data-dcnode-id="8194" instrument_node="">
</span><link data-dcnode-id="8193" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="8181"><div class="poem" data-dcnode-id="8188"><span data-dcnode-id="8192" instrument_node="">
</span><p data-dcnode-id="8190"><span data-dcnode-id="8191" instrument_node="">Owe no man any thing, but to love one another: for he that loveth another hath fulfilled the law. For this, Thou shalt not commit adultery, Thou shalt not kill, Thou shalt not steal, Thou shalt not bear false witness, Thou shalt not covet; and if there be any other commandment, it is briefly comprehended in this saying, namely, Thou shalt love thy neighbour as thyself. Love worketh no ill to his neighbour: therefore love is the fulfilling of the law.
</span></p><span data-dcnode-id="8189" instrument_node="">
</span></div><div class="templatequotecite" data-dcnode-id="8182"><span data-dcnode-id="8187" instrument_node="">— </span><cite data-dcnode-id="8183"><a class="extiw" data-dcnode-id="8185" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikisource.org/wiki/Bible_%28King_James%29/Romans%2313%3A8" title="s:Bible (King James)/Romans"><span data-dcnode-id="8186" instrument_node="">Romans 13:8–10</span></a><span data-dcnode-id="8184" instrument_node=""> KJV</span></cite></div></blockquote><span data-dcnode-id="8180" instrument_node="">
</span><h4 data-dcnode-id="8170"><span class="mw-headline" data-dcnode-id="8178" id="Catholicism"><span data-dcnode-id="8179" instrument_node="">Catholicism</span></span><span class="mw-editsection" data-dcnode-id="8171"><span class="mw-editsection-bracket" data-dcnode-id="8176"><span data-dcnode-id="8177" instrument_node="">[</span></span><a data-dcnode-id="8174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTen_Commandments%26action%3Dedit%26section%3D11" title="Edit section: Catholicism"><span data-dcnode-id="8175" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8172"><span data-dcnode-id="8173" instrument_node="">]</span></span></span></h4><span data-dcnode-id="8169" instrument_node="">
</span><link data-dcnode-id="8168" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="8164" role="note"><span data-dcnode-id="8167" instrument_node="">Main article: </span><a data-dcnode-id="8165" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ten_Commandments_in_Catholic_theology" title="Ten Commandments in Catholic theology"><span data-dcnode-id="8166" instrument_node="">Ten Commandments in Catholic theology</span></a></div><span data-dcnode-id="8163" instrument_node="">
</span><p data-dcnode-id="8150"><span data-dcnode-id="8162" instrument_node="">In Catholicism, Jesus freed Christians from the rest of </span><a data-dcnode-id="8160" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Halakha" title="Halakha"><span data-dcnode-id="8161" instrument_node="">Jewish religious law</span></a><span data-dcnode-id="8159" instrument_node="">, but not from their obligation to keep the Ten Commandments.</span><sup class="reference" data-dcnode-id="8156" id="cite_ref-Kreeft_80-0"><a data-dcnode-id="8157" href="#cite_note-Kreeft-80"><span data-dcnode-id="8158" instrument_node="">[80]</span></a></sup><span data-dcnode-id="8155" instrument_node=""> It has been said that they are to the moral order what the creation story is to the natural order.</span><sup class="reference" data-dcnode-id="8152" id="cite_ref-Kreeft_80-1"><a data-dcnode-id="8153" href="#cite_note-Kreeft-80"><span data-dcnode-id="8154" instrument_node="">[80]</span></a></sup><span data-dcnode-id="8151" instrument_node="">
</span></p><p data-dcnode-id="8094"><span data-dcnode-id="8149" instrument_node="">According to the </span><i data-dcnode-id="8146"><a data-dcnode-id="8147" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Catechism_of_the_Catholic_Church" title="Catechism of the Catholic Church"><span data-dcnode-id="8148" instrument_node="">Catechism of the Catholic Church</span></a></i><span data-dcnode-id="8145" instrument_node="">—the official exposition of the </span><a data-dcnode-id="8143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Catholic_Church" title="Catholic Church"><span data-dcnode-id="8144" instrument_node="">Catholic Church</span></a><span data-dcnode-id="8142" instrument_node="">'s Christian beliefs—the Commandments are considered essential for spiritual good health and growth,</span><sup class="reference" data-dcnode-id="8139" id="cite_ref-Kreeft201_81-0"><a data-dcnode-id="8140" href="#cite_note-Kreeft201-81"><span data-dcnode-id="8141" instrument_node="">[81]</span></a></sup><span data-dcnode-id="8138" instrument_node=""> and serve as the basis for </span><a data-dcnode-id="8136" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Catholic_social_teaching" title="Catholic social teaching"><span data-dcnode-id="8137" instrument_node="">social justice</span></a><span data-dcnode-id="8135" instrument_node="">.</span><sup class="reference" data-dcnode-id="8132" id="cite_ref-Carmody_82-0"><a data-dcnode-id="8133" href="#cite_note-Carmody-82"><span data-dcnode-id="8134" instrument_node="">[82]</span></a></sup><span data-dcnode-id="8131" instrument_node=""> Church teaching of the Commandments is largely based on the </span><a data-dcnode-id="8129" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Old_Testament" title="Old Testament"><span data-dcnode-id="8130" instrument_node="">Old</span></a><span data-dcnode-id="8128" instrument_node=""> and </span><a data-dcnode-id="8126" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_Testament" title="New Testament"><span data-dcnode-id="8127" instrument_node="">New Testaments</span></a><span data-dcnode-id="8125" instrument_node=""> and the writings of the early </span><a data-dcnode-id="8123" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Church_Fathers" title="Church Fathers"><span data-dcnode-id="8124" instrument_node="">Church Fathers</span></a><span data-dcnode-id="8122" instrument_node="">.</span><sup class="reference" data-dcnode-id="8119" id="cite_ref-Cat_83-0"><a data-dcnode-id="8120" href="#cite_note-Cat-83"><span data-dcnode-id="8121" instrument_node="">[83]</span></a></sup><span data-dcnode-id="8118" instrument_node=""> In the New Testament, Jesus </span><a data-dcnode-id="8116" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sermon_on_the_Mount" title="Sermon on the Mount"><span data-dcnode-id="8117" instrument_node="">acknowledged their validity</span></a><span data-dcnode-id="8115" instrument_node=""> and instructed his </span><a data-dcnode-id="8113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Disciple_%28Christianity%29" title="Disciple (Christianity)"><span data-dcnode-id="8114" instrument_node="">disciples</span></a><span data-dcnode-id="8112" instrument_node=""> to go further, demanding a righteousness exceeding that of the </span><a class="mw-redirect" data-dcnode-id="8110" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Scribes" title="Scribes"><span data-dcnode-id="8111" instrument_node="">scribes</span></a><span data-dcnode-id="8109" instrument_node=""> and </span><a data-dcnode-id="8107" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pharisees" title="Pharisees"><span data-dcnode-id="8108" instrument_node="">Pharisees</span></a><span data-dcnode-id="8106" instrument_node="">.</span><sup class="reference" data-dcnode-id="8103" id="cite_ref-Kreeft202_84-0"><a data-dcnode-id="8104" href="#cite_note-Kreeft202-84"><span data-dcnode-id="8105" instrument_node="">[84]</span></a></sup><span data-dcnode-id="8102" instrument_node=""> Summarized by Jesus into two "</span><a data-dcnode-id="8100" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Great_Commandment" title="Great Commandment"><span data-dcnode-id="8101" instrument_node="">great commandments</span></a><span data-dcnode-id="8099" instrument_node="">" that teach the love of God and love of neighbour,</span><sup class="reference" data-dcnode-id="8096" id="cite_ref-Schreck303_85-0"><a data-dcnode-id="8097" href="#cite_note-Schreck303-85"><span data-dcnode-id="8098" instrument_node="">[85]</span></a></sup><span data-dcnode-id="8095" instrument_node=""> they instruct individuals on their relationships with both.
</span></p><p data-dcnode-id="8072"><span data-dcnode-id="8093" instrument_node="">The </span><a data-dcnode-id="8091" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Great_Commandment" title="Great Commandment"><span data-dcnode-id="8092" instrument_node="">great commandments</span></a><span data-dcnode-id="8090" instrument_node=""> contain the Law of the Gospel, summed up in the </span><a data-dcnode-id="8088" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Golden_Rule" title="Golden Rule"><span data-dcnode-id="8089" instrument_node="">Golden Rule</span></a><span data-dcnode-id="8087" instrument_node="">. The Law of the Gospel is expressed particularly in the </span><a data-dcnode-id="8085" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sermon_on_the_Mount" title="Sermon on the Mount"><span data-dcnode-id="8086" instrument_node="">Sermon on the Mount</span></a><span data-dcnode-id="8084" instrument_node="">.</span><sup class="reference" data-dcnode-id="8081" id="cite_ref-Catechism_1_86-0"><a data-dcnode-id="8082" href="#cite_note-Catechism_1-86"><span data-dcnode-id="8083" instrument_node="">[86]</span></a></sup><span data-dcnode-id="8080" instrument_node=""> The </span><i data-dcnode-id="8078"><span data-dcnode-id="8079" instrument_node="">Catechism of the Catholic Church</span></i><span data-dcnode-id="8077" instrument_node=""> explains that, "the Law of the Gospel fulfills the commandments of the Law. The Lord’s Sermon on the Mount, far from abolishing or devaluing the moral prescriptions of the Old Law, releases their hidden potential and has new demands arise from them: it reveals their entire devine and human truth. It does not add new external precepts, but proceeds to reform the heart, the root of human acts, where man chooses between the pure and the impure, where faith, hope, and charity are formed and with them the other virtues." The New Law "fulfills, refines, surpasses, and leads the Old Law to its perfection."</span><sup class="reference" data-dcnode-id="8074" id="cite_ref-Catechism_87-0"><a data-dcnode-id="8075" href="#cite_note-Catechism-87"><span data-dcnode-id="8076" instrument_node="">[87]</span></a></sup><span data-dcnode-id="8073" instrument_node="">
</span></p><span data-dcnode-id="8071" instrument_node="">
</span><h4 data-dcnode-id="8061"><span class="mw-headline" data-dcnode-id="8069" id="Orthodox"><span data-dcnode-id="8070" instrument_node="">Orthodox</span></span><span class="mw-editsection" data-dcnode-id="8062"><span class="mw-editsection-bracket" data-dcnode-id="8067"><span data-dcnode-id="8068" instrument_node="">[</span></span><a data-dcnode-id="8065" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTen_Commandments%26action%3Dedit%26section%3D12" title="Edit section: Orthodox"><span data-dcnode-id="8066" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8063"><span data-dcnode-id="8064" instrument_node="">]</span></span></span></h4><span data-dcnode-id="8060" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="8051"><div class="thumbinner" data-dcnode-id="8052" style="width:222px;"><a class="image" data-dcnode-id="8058" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ATen_Commandments_in_India.jpg"><img alt="" class="thumbimage" data-dcnode-id="8059" data-file-height="2204" data-file-width="3920" decoding="async" height="124" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/2/23/Ten_Commandments_in_India.jpg/220px-Ten_Commandments_in_India.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/2/23/Ten_Commandments_in_India.jpg/330px-Ten_Commandments_in_India.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/2/23/Ten_Commandments_in_India.jpg/440px-Ten_Commandments_in_India.jpg 2x" width="220"></a><span data-dcnode-id="8057" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="8053"><div class="magnify" data-dcnode-id="8055"><a class="internal" data-dcnode-id="8056" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ATen_Commandments_in_India.jpg" title="Enlarge"></a></div><span data-dcnode-id="8054" instrument_node="">A Christian school in India displays the Ten Commandments.</span></div></div></div><span data-dcnode-id="8050" instrument_node="">
</span><p data-dcnode-id="8037"><span data-dcnode-id="8049" instrument_node="">The Eastern Orthodox Church holds its moral truths to be chiefly contained in the Ten Commandments.</span><sup class="reference" data-dcnode-id="8046" id="cite_ref-Dabovich_88-0"><a data-dcnode-id="8047" href="#cite_note-Dabovich-88"><span data-dcnode-id="8048" instrument_node="">[88]</span></a></sup><span data-dcnode-id="8045" instrument_node=""> A </span><a data-dcnode-id="8043" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Confession_%28religion%29" title="Confession (religion)"><span data-dcnode-id="8044" instrument_node="">confession</span></a><span data-dcnode-id="8042" instrument_node=""> begins with the Confessor reciting the Ten Commandments and asking the penitent which of them he has broken.</span><sup class="reference" data-dcnode-id="8039" id="cite_ref-Hore36_89-0"><a data-dcnode-id="8040" href="#cite_note-Hore36-89"><span data-dcnode-id="8041" instrument_node="">[89]</span></a></sup><span data-dcnode-id="8038" instrument_node="">
</span></p><span data-dcnode-id="8036" instrument_node="">
</span><h4 data-dcnode-id="8026"><span class="mw-headline" data-dcnode-id="8034" id="Protestantism"><span data-dcnode-id="8035" instrument_node="">Protestantism</span></span><span class="mw-editsection" data-dcnode-id="8027"><span class="mw-editsection-bracket" data-dcnode-id="8032"><span data-dcnode-id="8033" instrument_node="">[</span></span><a data-dcnode-id="8030" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTen_Commandments%26action%3Dedit%26section%3D13" title="Edit section: Protestantism"><span data-dcnode-id="8031" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8028"><span data-dcnode-id="8029" instrument_node="">]</span></span></span></h4><span data-dcnode-id="8025" instrument_node="">
</span><link data-dcnode-id="8024" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="8020" role="note"><span data-dcnode-id="8023" instrument_node="">See also: </span><a data-dcnode-id="8021" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Law_and_Gospel" title="Law and Gospel"><span data-dcnode-id="8022" instrument_node="">Law and Gospel</span></a></div><span data-dcnode-id="8019" instrument_node="">
</span><p data-dcnode-id="8000"><span data-dcnode-id="8018" instrument_node="">After rejecting the moral theology of Roman Catholicism, giving </span><a data-dcnode-id="8016" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Law_and_Gospel" title="Law and Gospel"><span data-dcnode-id="8017" instrument_node="">more importance to biblical law</span></a><span data-dcnode-id="8015" instrument_node=""> and </span><a data-dcnode-id="8013" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_gospel" title="The gospel"><span data-dcnode-id="8014" instrument_node="">the gospel</span></a><span data-dcnode-id="8012" instrument_node="">, early Protestant theologians continued to take the Ten Commandments as the starting point of Christian moral life.</span><sup class="reference" data-dcnode-id="8009" id="cite_ref-Sedgwick_90-0"><a data-dcnode-id="8010" href="#cite_note-Sedgwick-90"><span data-dcnode-id="8011" instrument_node="">[90]</span></a></sup><span data-dcnode-id="8008" instrument_node=""> Different versions of Christianity have varied in how they have translated the bare principles into the specifics that make up a full </span><a class="mw-redirect" data-dcnode-id="8006" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Christian_ethic" title="Christian ethic"><span data-dcnode-id="8007" instrument_node="">Christian ethic</span></a><span data-dcnode-id="8005" instrument_node="">.</span><sup class="reference" data-dcnode-id="8002" id="cite_ref-Sedgwick_90-1"><a data-dcnode-id="8003" href="#cite_note-Sedgwick-90"><span data-dcnode-id="8004" instrument_node="">[90]</span></a></sup><span data-dcnode-id="8001" instrument_node="">
</span></p><span data-dcnode-id="7999" instrument_node="">
</span><h5 data-dcnode-id="7989"><span class="mw-headline" data-dcnode-id="7997" id="Lutheranism"><span data-dcnode-id="7998" instrument_node="">Lutheranism</span></span><span class="mw-editsection" data-dcnode-id="7990"><span class="mw-editsection-bracket" data-dcnode-id="7995"><span data-dcnode-id="7996" instrument_node="">[</span></span><a data-dcnode-id="7993" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTen_Commandments%26action%3Dedit%26section%3D14" title="Edit section: Lutheranism"><span data-dcnode-id="7994" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7991"><span data-dcnode-id="7992" instrument_node="">]</span></span></span></h5><span data-dcnode-id="7988" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="7976"><div class="thumbinner" data-dcnode-id="7977" style="width:222px;"><a class="image" data-dcnode-id="7986" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASchnorr_von_Carolsfeld_Bibel_in_Bildern_1860_054.png"><img alt="" class="thumbimage" data-dcnode-id="7987" data-file-height="911" data-file-width="1095" decoding="async" height="183" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/4/42/Schnorr_von_Carolsfeld_Bibel_in_Bildern_1860_054.png/220px-Schnorr_von_Carolsfeld_Bibel_in_Bildern_1860_054.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/4/42/Schnorr_von_Carolsfeld_Bibel_in_Bildern_1860_054.png/330px-Schnorr_von_Carolsfeld_Bibel_in_Bildern_1860_054.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/4/42/Schnorr_von_Carolsfeld_Bibel_in_Bildern_1860_054.png/440px-Schnorr_von_Carolsfeld_Bibel_in_Bildern_1860_054.png 2x" width="220"></a><span data-dcnode-id="7985" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7978"><div class="magnify" data-dcnode-id="7983"><a class="internal" data-dcnode-id="7984" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASchnorr_von_Carolsfeld_Bibel_in_Bildern_1860_054.png" title="Enlarge"></a></div><span data-dcnode-id="7982" instrument_node="">Moses receives the Ten Commandments in this 1860 woodcut by </span><a data-dcnode-id="7980" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Julius_Schnorr_von_Carolsfeld" title="Julius Schnorr von Carolsfeld"><span data-dcnode-id="7981" instrument_node="">Julius Schnorr von Carolsfeld</span></a><span data-dcnode-id="7979" instrument_node="">, a Lutheran.</span></div></div></div><span data-dcnode-id="7975" instrument_node="">
</span><p data-dcnode-id="7962"><span data-dcnode-id="7974" instrument_node="">The Lutheran division of the commandments follows the one established by </span><a data-dcnode-id="7972" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Augustine_of_Hippo" title="Augustine of Hippo"><span data-dcnode-id="7973" instrument_node="">St. Augustine</span></a><span data-dcnode-id="7971" instrument_node="">, following the then current synagogue scribal division. The first three commandments govern the relationship between God and humans, the fourth through eighth govern public relationships between people, and the last two govern private thoughts. See Luther's Small Catechism</span><sup class="reference" data-dcnode-id="7968" id="cite_ref-91"><a data-dcnode-id="7969" href="#cite_note-91"><span data-dcnode-id="7970" instrument_node="">[91]</span></a></sup><span data-dcnode-id="7967" instrument_node=""> and Large Catechism.</span><sup class="reference" data-dcnode-id="7964" id="cite_ref-LC_54-1"><a data-dcnode-id="7965" href="#cite_note-LC-54"><span data-dcnode-id="7966" instrument_node="">[54]</span></a></sup><span data-dcnode-id="7963" instrument_node="">
</span></p><span data-dcnode-id="7961" instrument_node="">
</span><h5 data-dcnode-id="7951"><span class="mw-headline" data-dcnode-id="7959" id="Reformed"><span data-dcnode-id="7960" instrument_node="">Reformed</span></span><span class="mw-editsection" data-dcnode-id="7952"><span class="mw-editsection-bracket" data-dcnode-id="7957"><span data-dcnode-id="7958" instrument_node="">[</span></span><a data-dcnode-id="7955" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTen_Commandments%26action%3Dedit%26section%3D15" title="Edit section: Reformed"><span data-dcnode-id="7956" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7953"><span data-dcnode-id="7954" instrument_node="">]</span></span></span></h5><span data-dcnode-id="7950" instrument_node="">
</span><p data-dcnode-id="7926"><span data-dcnode-id="7949" instrument_node="">The </span><i data-dcnode-id="7942"><a data-dcnode-id="7947" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Thirty-nine_Articles" title="Thirty-nine Articles"><span data-dcnode-id="7948" instrument_node="">Articles of the Church of England</span></a><span data-dcnode-id="7946" instrument_node="">, Revised and altered by the </span><a data-dcnode-id="7944" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Westminster_Assembly" title="Westminster Assembly"><span data-dcnode-id="7945" instrument_node="">Assembly of Divines, at Westminster</span></a><span data-dcnode-id="7943" instrument_node="">, in the year 1643</span></i><span data-dcnode-id="7941" instrument_node=""> state that "no Christian man whatsoever is free from the obedience of the commandments which are called moral. By the moral law, we understand all the Ten Commandments taken in their full extent."</span><sup class="reference" data-dcnode-id="7938" id="cite_ref-Neal1843_92-0"><a data-dcnode-id="7939" href="#cite_note-Neal1843-92"><span data-dcnode-id="7940" instrument_node="">[92]</span></a></sup><span data-dcnode-id="7937" instrument_node=""> The </span><a class="mw-redirect" data-dcnode-id="7935" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Westminster_Confession" title="Westminster Confession"><span data-dcnode-id="7936" instrument_node="">Westminster Confession</span></a><span data-dcnode-id="7934" instrument_node="">, held by </span><a class="mw-redirect" data-dcnode-id="7932" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Presbyterian_Church" title="Presbyterian Church"><span data-dcnode-id="7933" instrument_node="">Presbyterian Churches</span></a><span data-dcnode-id="7931" instrument_node="">, holds that the moral law contained in the Ten Commandments "does forever bind all, as well justified persons as others, to the obedience thereof".</span><sup class="reference" data-dcnode-id="7928" id="cite_ref-93"><a data-dcnode-id="7929" href="#cite_note-93"><span data-dcnode-id="7930" instrument_node="">[93]</span></a></sup><span data-dcnode-id="7927" instrument_node="">
</span></p><span data-dcnode-id="7925" instrument_node="">
</span><h5 data-dcnode-id="7915"><span class="mw-headline" data-dcnode-id="7923" id="Methodist"><span data-dcnode-id="7924" instrument_node="">Methodist</span></span><span class="mw-editsection" data-dcnode-id="7916"><span class="mw-editsection-bracket" data-dcnode-id="7921"><span data-dcnode-id="7922" instrument_node="">[</span></span><a data-dcnode-id="7919" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTen_Commandments%26action%3Dedit%26section%3D16" title="Edit section: Methodist"><span data-dcnode-id="7920" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7917"><span data-dcnode-id="7918" instrument_node="">]</span></span></span></h5><span data-dcnode-id="7914" instrument_node="">
</span><p data-dcnode-id="7894"><span data-dcnode-id="7913" instrument_node="">The moral law contained in the Ten Commandments, according to the founder of the </span><a class="mw-redirect" data-dcnode-id="7911" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Methodist" title="Methodist"><span data-dcnode-id="7912" instrument_node="">Methodist</span></a><span data-dcnode-id="7910" instrument_node=""> movement </span><a data-dcnode-id="7908" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Wesley" title="John Wesley"><span data-dcnode-id="7909" instrument_node="">John Wesley</span></a><span data-dcnode-id="7907" instrument_node="">, was instituted from the beginning of the world and is written on the hearts of all people.</span><sup class="reference" data-dcnode-id="7904" id="cite_ref-Rodes2014_94-0"><a data-dcnode-id="7905" href="#cite_note-Rodes2014-94"><span data-dcnode-id="7906" instrument_node="">[94]</span></a></sup><span data-dcnode-id="7903" instrument_node="">
As with the Reformed view,</span><sup class="reference" data-dcnode-id="7900" id="cite_ref-Campbell2011_95-0"><a data-dcnode-id="7901" href="#cite_note-Campbell2011-95"><span data-dcnode-id="7902" instrument_node="">[95]</span></a></sup><span data-dcnode-id="7899" instrument_node=""> Wesley held that the moral law, which is contained in the Ten Commandments, stands today:</span><sup class="reference" data-dcnode-id="7896" id="cite_ref-Utter1913_96-0"><a data-dcnode-id="7897" href="#cite_note-Utter1913-96"><span data-dcnode-id="7898" instrument_node="">[96]</span></a></sup><span data-dcnode-id="7895" instrument_node="">
</span></p><span data-dcnode-id="7893" instrument_node="">
</span><link data-dcnode-id="7892" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="7883"><p data-dcnode-id="7884"><span data-dcnode-id="7891" instrument_node="">Every part of this law must remain in force upon all mankind in all ages, as not depending either on time or place, nor on any other circumstances liable to change; but on the nature of God and the nature of man, and their unchangeable relation to each other" (Wesley's </span><i data-dcnode-id="7889"><span data-dcnode-id="7890" instrument_node="">Sermons</span></i><span data-dcnode-id="7888" instrument_node="">, Vol. I, Sermon 25).</span><sup class="reference" data-dcnode-id="7885" id="cite_ref-Utter1913_96-1"><a data-dcnode-id="7886" href="#cite_note-Utter1913-96"><span data-dcnode-id="7887" instrument_node="">[96]</span></a></sup></p></blockquote><span data-dcnode-id="7882" instrument_node="">
</span><p data-dcnode-id="7866"><span data-dcnode-id="7881" instrument_node="">In keeping with </span><a class="mw-redirect" data-dcnode-id="7879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wesleyan_covenant_theology" title="Wesleyan covenant theology"><span data-dcnode-id="7880" instrument_node="">Wesleyan covenant theology</span></a><span data-dcnode-id="7878" instrument_node="">, "while the ceremonial law was abolished in Christ and the whole Mosaic dispensation itself was concluded upon the appearance of Christ, the moral law remains a vital component of the covenant of grace, having Christ as its perfecting end."</span><sup class="reference" data-dcnode-id="7875" id="cite_ref-Rodes2014_94-1"><a data-dcnode-id="7876" href="#cite_note-Rodes2014-94"><span data-dcnode-id="7877" instrument_node="">[94]</span></a></sup><span data-dcnode-id="7874" instrument_node=""> As such, in Methodism, an "important aspect of the pursuit of </span><a data-dcnode-id="7872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sanctification" title="Sanctification"><span data-dcnode-id="7873" instrument_node="">sanctification</span></a><span data-dcnode-id="7871" instrument_node=""> is the careful following" of the Ten Commandments.</span><sup class="reference" data-dcnode-id="7868" id="cite_ref-Campbell2011_95-1"><a data-dcnode-id="7869" href="#cite_note-Campbell2011-95"><span data-dcnode-id="7870" instrument_node="">[95]</span></a></sup><span data-dcnode-id="7867" instrument_node="">
</span></p><span data-dcnode-id="7865" instrument_node="">
</span><h5 data-dcnode-id="7855"><span class="mw-headline" data-dcnode-id="7863" id="Baptist"><span data-dcnode-id="7864" instrument_node="">Baptist</span></span><span class="mw-editsection" data-dcnode-id="7856"><span class="mw-editsection-bracket" data-dcnode-id="7861"><span data-dcnode-id="7862" instrument_node="">[</span></span><a data-dcnode-id="7859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTen_Commandments%26action%3Dedit%26section%3D17" title="Edit section: Baptist"><span data-dcnode-id="7860" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7857"><span data-dcnode-id="7858" instrument_node="">]</span></span></span></h5><span data-dcnode-id="7854" instrument_node="">
</span><p data-dcnode-id="7840"><span data-dcnode-id="7853" instrument_node="">The Ten Commandments are a summary of the requirements of a works covenant (called the "Old Covenant"), given on Mount Sinai to the nascent nation of Israel.</span><sup class="reference" data-dcnode-id="7850" id="cite_ref-97"><a data-dcnode-id="7851" href="#cite_note-97"><span data-dcnode-id="7852" instrument_node="">[97]</span></a></sup><span data-dcnode-id="7849" instrument_node=""> The Old Covenant is fulfilled by Christ at the cross. Unbelievers are still under the Law.  The law reveals man's sin and need for the salvation that is Jeshua.  Repentance from sin and faith in Christ for salvation is the point of the entire Bible.</span><sup class="reference" data-dcnode-id="7846" id="cite_ref-98"><a data-dcnode-id="7847" href="#cite_note-98"><span data-dcnode-id="7848" instrument_node="">[98]</span></a></sup><span data-dcnode-id="7845" instrument_node=""> They do reflect the eternal character of God, and serve as a paragon of morality.</span><sup class="reference" data-dcnode-id="7842" id="cite_ref-99"><a data-dcnode-id="7843" href="#cite_note-99"><span data-dcnode-id="7844" instrument_node="">[99]</span></a></sup><span data-dcnode-id="7841" instrument_node="">
</span></p><span data-dcnode-id="7839" instrument_node="">
</span><h4 data-dcnode-id="7829"><span class="mw-headline" data-dcnode-id="7837" id="The_Church_of_Jesus_Christ_of_Latter-day_Saints"><span data-dcnode-id="7838" instrument_node="">The Church of Jesus Christ of Latter-day Saints</span></span><span class="mw-editsection" data-dcnode-id="7830"><span class="mw-editsection-bracket" data-dcnode-id="7835"><span data-dcnode-id="7836" instrument_node="">[</span></span><a data-dcnode-id="7833" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTen_Commandments%26action%3Dedit%26section%3D18" title="Edit section: The Church of Jesus Christ of Latter-day Saints"><span data-dcnode-id="7834" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7831"><span data-dcnode-id="7832" instrument_node="">]</span></span></span></h4><span data-dcnode-id="7828" instrument_node="">
</span><p data-dcnode-id="7770"><span data-dcnode-id="7827" instrument_node="">According to the doctrine of </span><a data-dcnode-id="7825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Church_of_Jesus_Christ_of_Latter-day_Saints" title="The Church of Jesus Christ of Latter-day Saints"><span data-dcnode-id="7826" instrument_node="">The Church of Jesus Christ of Latter-day Saints</span></a><span data-dcnode-id="7824" instrument_node="">, Jesus completed rather than rejected the Mosaic law.</span><sup class="reference" data-dcnode-id="7821" id="cite_ref-100"><a data-dcnode-id="7822" href="#cite_note-100"><span data-dcnode-id="7823" instrument_node="">[100]</span></a></sup><span data-dcnode-id="7820" instrument_node=""> The Ten Commandments are considered eternal gospel principles necessary for </span><a class="mw-redirect" data-dcnode-id="7818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Exaltation_%28Latter_Day_Saints%29" title="Exaltation (Latter Day Saints)"><span data-dcnode-id="7819" instrument_node="">exaltation</span></a><span data-dcnode-id="7817" instrument_node="">.</span><sup class="reference" data-dcnode-id="7814" id="cite_ref-mormon_101-0"><a data-dcnode-id="7815" href="#cite_note-mormon-101"><span data-dcnode-id="7816" instrument_node="">[101]</span></a></sup><span data-dcnode-id="7813" instrument_node=""> They appear in the </span><a data-dcnode-id="7811" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Book_of_Mosiah" title="Book of Mosiah"><span data-dcnode-id="7812" instrument_node="">Book of Mosiah</span></a><span data-dcnode-id="7810" instrument_node=""> 12:34–36,</span><sup class="reference" data-dcnode-id="7807" id="cite_ref-102"><a data-dcnode-id="7808" href="#cite_note-102"><span data-dcnode-id="7809" instrument_node="">[102]</span></a></sup><span data-dcnode-id="7806" instrument_node=""> 13:15–16,</span><sup class="reference" data-dcnode-id="7803" id="cite_ref-103"><a data-dcnode-id="7804" href="#cite_note-103"><span data-dcnode-id="7805" instrument_node="">[103]</span></a></sup><span data-dcnode-id="7802" instrument_node=""> 13:21–24</span><sup class="reference" data-dcnode-id="7799" id="cite_ref-104"><a data-dcnode-id="7800" href="#cite_note-104"><span data-dcnode-id="7801" instrument_node="">[104]</span></a></sup><span data-dcnode-id="7798" instrument_node=""> and </span><a data-dcnode-id="7796" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Doctrine_and_Covenants" title="Doctrine and Covenants"><span data-dcnode-id="7797" instrument_node="">Doctrine and Covenants</span></a><span data-dcnode-id="7795" instrument_node="">.</span><sup class="reference" data-dcnode-id="7792" id="cite_ref-mormon_101-1"><a data-dcnode-id="7793" href="#cite_note-mormon-101"><span data-dcnode-id="7794" instrument_node="">[101]</span></a></sup><span data-dcnode-id="7791" instrument_node=""> According to the Book of Mosiah, a prophet named </span><a data-dcnode-id="7789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Abinadi" title="Abinadi"><span data-dcnode-id="7790" instrument_node="">Abinadi</span></a><span data-dcnode-id="7788" instrument_node=""> taught the Ten Commandments in the court of </span><a data-dcnode-id="7786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/King_Noah" title="King Noah"><span data-dcnode-id="7787" instrument_node="">King Noah</span></a><span data-dcnode-id="7785" instrument_node=""> and was martyred for his righteousness.</span><sup class="reference" data-dcnode-id="7782" id="cite_ref-encmorm_105-0"><a data-dcnode-id="7783" href="#cite_note-encmorm-105"><span data-dcnode-id="7784" instrument_node="">[105]</span></a></sup><span data-dcnode-id="7781" instrument_node=""> </span><a data-dcnode-id="7779" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Abinadi" title="Abinadi"><span data-dcnode-id="7780" instrument_node="">Abinadi</span></a><span data-dcnode-id="7778" instrument_node=""> knew the Ten Commandments from the </span><a class="mw-redirect" data-dcnode-id="7776" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Brass_plates" title="Brass plates"><span data-dcnode-id="7777" instrument_node="">brass plates</span></a><span data-dcnode-id="7775" instrument_node="">.</span><sup class="reference" data-dcnode-id="7772" id="cite_ref-106"><a data-dcnode-id="7773" href="#cite_note-106"><span data-dcnode-id="7774" instrument_node="">[106]</span></a></sup><span data-dcnode-id="7771" instrument_node="">
</span></p><p data-dcnode-id="7754"><span data-dcnode-id="7769" instrument_node="">In an October 2011 address, the Church president and prophet </span><a data-dcnode-id="7767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Thomas_S._Monson" title="Thomas S. Monson"><span data-dcnode-id="7768" instrument_node="">Thomas S. Monson</span></a><span data-dcnode-id="7766" instrument_node=""> taught "The Ten Commandments are just that—commandments. They are not suggestions."</span><sup class="reference" data-dcnode-id="7763" id="cite_ref-107"><a data-dcnode-id="7764" href="#cite_note-107"><span data-dcnode-id="7765" instrument_node="">[107]</span></a></sup><span data-dcnode-id="7762" instrument_node=""> In that same talk he used small quotations listing the numbering and selection of the commandments. This and other sources</span><sup class="reference" data-dcnode-id="7759" id="cite_ref-108"><a data-dcnode-id="7760" href="#cite_note-108"><span data-dcnode-id="7761" instrument_node="">[108]</span></a></sup><span data-dcnode-id="7758" instrument_node=""> don't include the prologue, making it most consistent with the </span><a data-dcnode-id="7756" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Septuagint" title="Septuagint"><span data-dcnode-id="7757" instrument_node="">Septuagint</span></a><span data-dcnode-id="7755" instrument_node=""> numbering.
</span></p><p data-dcnode-id="7732"><span data-dcnode-id="7753" instrument_node="">A splinter group of the Church called the "</span><a data-dcnode-id="7751" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Church_of_Jesus_Christ_of_Latter_Day_Saints_%28Strangite%29" title="Church of Jesus Christ of Latter Day Saints (Strangite)"><span data-dcnode-id="7752" instrument_node="">Church of Jesus Christ of Latter Day Saints (Strangite)</span></a><span data-dcnode-id="7750" instrument_node="">" have a belief similar to the Samaritans where they have the entire Ten Commandments in their scripture where others only have nine. The Strangite fourth Commandment is "Thou shalt love thy neighbor as thyself."</span><sup class="reference" data-dcnode-id="7747" id="cite_ref-109"><a data-dcnode-id="7748" href="#cite_note-109"><span data-dcnode-id="7749" instrument_node="">[109]</span></a></sup><span data-dcnode-id="7746" instrument_node=""> The Strangite's founder and namesake </span><a data-dcnode-id="7744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/James_Strang" title="James Strang"><span data-dcnode-id="7745" instrument_node="">James Strang</span></a><span data-dcnode-id="7743" instrument_node=""> wrote in  "Note on the Decalogue" as part of the </span><a data-dcnode-id="7741" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Book_of_the_Law_of_the_Lord" title="Book of the Law of the Lord"><span data-dcnode-id="7742" instrument_node="">Book of the Law of the Lord</span></a><span data-dcnode-id="7740" instrument_node=""> (a Strangite holy book) that no other version of the Decalogue contains more than nine commandments and speculated that his fourth Commandment was omitted from other works perhaps as early as </span><a data-dcnode-id="7738" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Josephus" title="Josephus"><span data-dcnode-id="7739" instrument_node="">Josephus</span></a><span data-dcnode-id="7737" instrument_node="">' time (circa 37-100 AD).</span><sup class="reference" data-dcnode-id="7734" id="cite_ref-110"><a data-dcnode-id="7735" href="#cite_note-110"><span data-dcnode-id="7736" instrument_node="">[110]</span></a></sup><span data-dcnode-id="7733" instrument_node="">
</span></p><span data-dcnode-id="7731" instrument_node="">
</span><h3 data-dcnode-id="7721"><span class="mw-headline" data-dcnode-id="7729" id="Islam"><span data-dcnode-id="7730" instrument_node="">Islam</span></span><span class="mw-editsection" data-dcnode-id="7722"><span class="mw-editsection-bracket" data-dcnode-id="7727"><span data-dcnode-id="7728" instrument_node="">[</span></span><a data-dcnode-id="7725" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTen_Commandments%26action%3Dedit%26section%3D19" title="Edit section: Islam"><span data-dcnode-id="7726" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7723"><span data-dcnode-id="7724" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7720" instrument_node="">
</span><link data-dcnode-id="7719" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7712" role="note"><span data-dcnode-id="7718" instrument_node="">See also: </span><a data-dcnode-id="7716" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Torah_in_Islam" title="Torah in Islam"><span data-dcnode-id="7717" instrument_node="">Torah in Islam</span></a><span data-dcnode-id="7715" instrument_node=""> and </span><a data-dcnode-id="7713" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Moses_in_Islam" title="Moses in Islam"><span data-dcnode-id="7714" instrument_node="">Moses in Islam</span></a></div><span data-dcnode-id="7711" instrument_node="">
</span><h4 data-dcnode-id="7701"><span class="mw-headline" data-dcnode-id="7709" id="Moses_and_the_Tablets"><span data-dcnode-id="7710" instrument_node="">Moses and the Tablets</span></span><span class="mw-editsection" data-dcnode-id="7702"><span class="mw-editsection-bracket" data-dcnode-id="7707"><span data-dcnode-id="7708" instrument_node="">[</span></span><a data-dcnode-id="7705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTen_Commandments%26action%3Dedit%26section%3D20" title="Edit section: Moses and the Tablets"><span data-dcnode-id="7706" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7703"><span data-dcnode-id="7704" instrument_node="">]</span></span></span></h4><span data-dcnode-id="7700" instrument_node="">
</span><link data-dcnode-id="7699" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7695" role="note"><span data-dcnode-id="7698" instrument_node="">Main article: </span><a data-dcnode-id="7696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tablets_of_Stone%23In_the_Quran" title="Tablets of Stone"><span data-dcnode-id="7697" instrument_node="">Tablets of Stone §&nbsp;In the Quran</span></a></div><span data-dcnode-id="7694" instrument_node="">
</span><p data-dcnode-id="7682"><span data-dcnode-id="7693" instrument_node="">The receiving of the Ten Commandments by Prophet </span><a data-dcnode-id="7691" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Moses_in_Islam" title="Moses in Islam"><span data-dcnode-id="7692" instrument_node="">Musa</span></a><span data-dcnode-id="7690" instrument_node=""> (Moses) is dealt with in much detail in Islamic tradition</span><sup class="reference" data-dcnode-id="7687" id="cite_ref-111"><a data-dcnode-id="7688" href="#cite_note-111"><span data-dcnode-id="7689" instrument_node="">[111]</span></a></sup><span data-dcnode-id="7686" instrument_node=""> with the meeting of Moses with God on Mount Sinai described in Surah </span><a class="mw-redirect" data-dcnode-id="7684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/A%2527raf" title="A'raf"><span data-dcnode-id="7685" instrument_node="">A'raf</span></a><span data-dcnode-id="7683" instrument_node=""> (7:142-145). The Revealing of the Tablets on which were the Commandments of God is described in the following verse:
</span></p><span data-dcnode-id="7681" instrument_node="">
</span><link data-dcnode-id="7680" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="7671"><p data-dcnode-id="7672"><span data-dcnode-id="7679" instrument_node="">And We wrote for him (Moses) on the Tablets the lesson to be drawn from all things and the explanation of all things (and said): Hold unto these with firmness, and enjoin your people to take the better therein. I shall show you the home of </span><i data-dcnode-id="7677"><span data-dcnode-id="7678" instrument_node="">Al-Fasiqun</span></i><span data-dcnode-id="7676" instrument_node=""> (the rebellious, disobedient to Allah).</span><sup class="reference" data-dcnode-id="7673" id="cite_ref-112"><a data-dcnode-id="7674" href="#cite_note-112"><span data-dcnode-id="7675" instrument_node="">[112]</span></a></sup></p></blockquote><span data-dcnode-id="7670" instrument_node="">
</span><p data-dcnode-id="7668"><span data-dcnode-id="7669" instrument_node="">The Tablets are further alluded to in verses 7:150, when Moses threw the Tablets down in anger at seeing the Israelites' worshipping of the golden calf, and in 7:154 when he picked up the Tablets having recovered from his anger:
</span></p><span data-dcnode-id="7667" instrument_node="">
</span><link data-dcnode-id="7666" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="7660"><p data-dcnode-id="7661"><span data-dcnode-id="7665" instrument_node="">And when the anger of Musa (Moses) was appeased, he took up the Tablets, and in their inscription was guidance and mercy for those who fear their Lord.</span><sup class="reference" data-dcnode-id="7662" id="cite_ref-113"><a data-dcnode-id="7663" href="#cite_note-113"><span data-dcnode-id="7664" instrument_node="">[113]</span></a></sup></p></blockquote><span data-dcnode-id="7659" instrument_node="">
</span><p data-dcnode-id="7649"><span data-dcnode-id="7658" instrument_node="">Quranic reference to the ten commandments can be found in chapter 2 verses 83 and 84 "And [recall] when We took the covenant from the Children of Israel, [enjoining upon them], "Do not worship except Allah (1); and to parents do good (2) and to relatives (3), orphans (4), and the needy (5). And speak to people good words (6) and establish prayer (7) and give Zakat (8)." Then you turned away, except a few of you, and you were refusing." "And [recall] when We took your covenant, [saying], "Do not shed each other's blood (9) or evict one another from your homes (10)." Then you acknowledged [this] while you were witnessing"</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="7651" style="white-space:nowrap;"><span data-dcnode-id="7657" instrument_node="">[</span><i data-dcnode-id="7653"><a data-dcnode-id="7654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="7655" title="This claim needs references to reliable sources. (July 2020)"><span data-dcnode-id="7656" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="7652" instrument_node="">]</span></sup><span data-dcnode-id="7650" instrument_node="">
</span></p><span data-dcnode-id="7648" instrument_node="">
</span><h4 data-dcnode-id="7638"><span class="mw-headline" data-dcnode-id="7646" id="Classical_views"><span data-dcnode-id="7647" instrument_node="">Classical views</span></span><span class="mw-editsection" data-dcnode-id="7639"><span class="mw-editsection-bracket" data-dcnode-id="7644"><span data-dcnode-id="7645" instrument_node="">[</span></span><a data-dcnode-id="7642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTen_Commandments%26action%3Dedit%26section%3D21" title="Edit section: Classical views"><span data-dcnode-id="7643" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7640"><span data-dcnode-id="7641" instrument_node="">]</span></span></span></h4><span data-dcnode-id="7637" instrument_node="">
</span><p data-dcnode-id="7615"><span data-dcnode-id="7636" instrument_node="">Three verses of Surah </span><a class="mw-redirect" data-dcnode-id="7634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/An%2527am" title="An'am"><span data-dcnode-id="7635" instrument_node="">An'am</span></a><span data-dcnode-id="7633" instrument_node=""> (6:151–153) are widely taken to be a reinstatement (or revised version) of the Ten Commandments</span><sup class="reference" data-dcnode-id="7630" id="cite_ref-114"><a data-dcnode-id="7631" href="#cite_note-114"><span data-dcnode-id="7632" instrument_node="">[114]</span></a></sup><sup class="reference" data-dcnode-id="7627" id="cite_ref-115"><a data-dcnode-id="7628" href="#cite_note-115"><span data-dcnode-id="7629" instrument_node="">[115]</span></a></sup><sup class="reference" data-dcnode-id="7624" id="cite_ref-116"><a data-dcnode-id="7625" href="#cite_note-116"><span data-dcnode-id="7626" instrument_node="">[116]</span></a></sup><span data-dcnode-id="7623" instrument_node=""> either as revealed to Moses </span><a data-dcnode-id="7621" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tahrif" title="Tahrif"><span data-dcnode-id="7622" instrument_node="">originally</span></a><span data-dcnode-id="7620" instrument_node=""> or as they are to be taken by Muslims now:</span><sup class="reference" data-dcnode-id="7617" id="cite_ref-117"><a data-dcnode-id="7618" href="#cite_note-117"><span data-dcnode-id="7619" instrument_node="">[117]</span></a></sup><span data-dcnode-id="7616" instrument_node="">
</span></p><span data-dcnode-id="7614" instrument_node="">
</span><link data-dcnode-id="7613" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="7560"><p data-dcnode-id="7591"><b data-dcnode-id="7611"><span data-dcnode-id="7612" instrument_node="">151.</span></b><span data-dcnode-id="7610" instrument_node=""> Say: "Come, I will recite what your Lord has prohibited you from: </span><sup data-dcnode-id="7608"><span data-dcnode-id="7609" instrument_node="">1</span></sup><span data-dcnode-id="7607" instrument_node="">Join not anything in worship with Him; </span><sup data-dcnode-id="7605"><span data-dcnode-id="7606" instrument_node="">2</span></sup><span data-dcnode-id="7604" instrument_node="">And be good (and dutiful) to your parents; </span><sup data-dcnode-id="7602"><span data-dcnode-id="7603" instrument_node="">3</span></sup><span data-dcnode-id="7601" instrument_node="">And kill not your children because of poverty – We provide sustenance for you and for them; </span><sup data-dcnode-id="7599"><span data-dcnode-id="7600" instrument_node="">4</span></sup><span data-dcnode-id="7598" instrument_node="">And come not near to </span><i data-dcnode-id="7596"><span data-dcnode-id="7597" instrument_node="">Al-Fawahish</span></i><span data-dcnode-id="7595" instrument_node=""> (shameful sins, illegal sexual intercourse, adultery etc.) whether committed openly or secretly, </span><sup data-dcnode-id="7593"><span data-dcnode-id="7594" instrument_node="">5</span></sup><span data-dcnode-id="7592" instrument_node="">And kill not anyone whom Allah has forbidden, except for a just cause (according to the Law). This He has commanded you that you may understand.
</span></p><p data-dcnode-id="7575"><b data-dcnode-id="7589"><span data-dcnode-id="7590" instrument_node="">152.</span></b><span data-dcnode-id="7588" instrument_node=""> "</span><sup data-dcnode-id="7586"><span data-dcnode-id="7587" instrument_node="">6</span></sup><span data-dcnode-id="7585" instrument_node="">And come not near to the orphan's property, except to improve it, until he (or she) attains the age of full strength; </span><sup data-dcnode-id="7583"><span data-dcnode-id="7584" instrument_node="">7</span></sup><span data-dcnode-id="7582" instrument_node="">And give full measure and full weight with justice. We burden not any person, but that which he can bear. </span><sup data-dcnode-id="7580"><span data-dcnode-id="7581" instrument_node="">8</span></sup><span data-dcnode-id="7579" instrument_node="">And whenever you give your word (i.e. judge between men or give evidence, etc.), say the truth even if a near relative is concerned, </span><sup data-dcnode-id="7577"><span data-dcnode-id="7578" instrument_node="">9</span></sup><span data-dcnode-id="7576" instrument_node="">And fulfill the Covenant of Allah. This He commands you, that you may remember.
</span></p><span data-dcnode-id="7574" instrument_node="">
</span><p data-dcnode-id="7561"><b data-dcnode-id="7572"><span data-dcnode-id="7573" instrument_node="">153.</span></b><span data-dcnode-id="7571" instrument_node=""> "</span><sup data-dcnode-id="7569"><span data-dcnode-id="7570" instrument_node="">10</span></sup><span data-dcnode-id="7568" instrument_node="">And verily, this (the Commandments mentioned in the above Verses) is my Straight Path, so follow it, and follow not (other) paths, for they will separate you away from His Path. This He has ordained for you that you may become </span><i data-dcnode-id="7566"><span data-dcnode-id="7567" instrument_node="">Al-Muttaqun</span></i><span data-dcnode-id="7565" instrument_node=""> (the pious)."</span><sup class="reference" data-dcnode-id="7562" id="cite_ref-118"><a data-dcnode-id="7563" href="#cite_note-118"><span data-dcnode-id="7564" instrument_node="">[118]</span></a></sup></p></blockquote><span data-dcnode-id="7559" instrument_node="">
</span><p data-dcnode-id="7557"><span data-dcnode-id="7558" instrument_node="">Evidence for these verses having some relation to Moses and the Ten Commandments is from the verse which immediately follows them:
</span></p><span data-dcnode-id="7556" instrument_node="">
</span><link data-dcnode-id="7555" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="7549"><p data-dcnode-id="7550"><span data-dcnode-id="7554" instrument_node="">Then, We gave Musa (Moses) the Book, to complete (Our Favour) upon those who would do right, and explaining all things in detail and a guidance and a mercy that they might believe in the meeting with their Lord.</span><sup class="reference" data-dcnode-id="7551" id="cite_ref-119"><a data-dcnode-id="7552" href="#cite_note-119"><span data-dcnode-id="7553" instrument_node="">[119]</span></a></sup></p></blockquote><span data-dcnode-id="7548" instrument_node="">
</span><p data-dcnode-id="7533"><span data-dcnode-id="7547" instrument_node="">According to a narration in </span><a class="mw-redirect" data-dcnode-id="7545" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mustadrak_Hakim" title="Mustadrak Hakim"><span data-dcnode-id="7546" instrument_node="">Mustadrak Hakim</span></a><span data-dcnode-id="7544" instrument_node="">, </span><a data-dcnode-id="7542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ibn_Abbas" title="Ibn Abbas"><span data-dcnode-id="7543" instrument_node="">Ibn Abbas</span></a><span data-dcnode-id="7541" instrument_node="">, a prominent narrator of </span><a class="mw-redirect" data-dcnode-id="7539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Israiliyat" title="Israiliyat"><span data-dcnode-id="7540" instrument_node="">Israiliyat</span></a><span data-dcnode-id="7538" instrument_node=""> traditions said, "In Surah Al-An`am, there are clear Ayat, and they are the Mother of the Book (the Qur'an)." He then recited the above verses.</span><sup class="reference" data-dcnode-id="7535" id="cite_ref-Tafsir_ibn_Kathir_120-0"><a data-dcnode-id="7536" href="#cite_note-Tafsir_ibn_Kathir-120"><span data-dcnode-id="7537" instrument_node="">[120]</span></a></sup><span data-dcnode-id="7534" instrument_node="">
</span></p><p data-dcnode-id="7528"><span data-dcnode-id="7532" instrument_node="">Also in Mustadrak Hakim is the narration of </span><a class="mw-redirect" data-dcnode-id="7530" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ubada_ibn_as-Samit" title="Ubada ibn as-Samit"><span data-dcnode-id="7531" instrument_node="">Ubada ibn as-Samit</span></a><span data-dcnode-id="7529" instrument_node="">:
</span></p><span data-dcnode-id="7527" instrument_node="">

</span><h4 data-dcnode-id="7277"><span class="mw-headline" data-dcnode-id="7285" id="Sabbath_day"><span data-dcnode-id="7286" instrument_node="">Sabbath day</span></span><span class="mw-editsection" data-dcnode-id="7278"><span class="mw-editsection-bracket" data-dcnode-id="7283"><span data-dcnode-id="7284" instrument_node="">[</span></span><a data-dcnode-id="7281" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTen_Commandments%26action%3Dedit%26section%3D24" title="Edit section: Sabbath day"><span data-dcnode-id="7282" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7279"><span data-dcnode-id="7280" instrument_node="">]</span></span></span></h4><span data-dcnode-id="7276" instrument_node="">
</span><link data-dcnode-id="7275" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7262" role="note"><span data-dcnode-id="7274" instrument_node="">See also: </span><a data-dcnode-id="7272" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Remember_the_sabbath_day%2C_to_keep_it_holy" title="Remember the sabbath day, to keep it holy"><span data-dcnode-id="7273" instrument_node="">Remember the sabbath day, to keep it holy</span></a><span data-dcnode-id="7271" instrument_node="">; </span><a data-dcnode-id="7269" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Biblical_Sabbath" title="Biblical Sabbath"><span data-dcnode-id="7270" instrument_node="">Biblical Sabbath</span></a><span data-dcnode-id="7268" instrument_node="">; </span><a data-dcnode-id="7266" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shabbat" title="Shabbat"><span data-dcnode-id="7267" instrument_node="">Shabbat</span></a><span data-dcnode-id="7265" instrument_node="">; and </span><a data-dcnode-id="7263" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Judaizers" title="Judaizers"><span data-dcnode-id="7264" instrument_node="">Judaizers</span></a></div><span data-dcnode-id="7261" instrument_node="">
