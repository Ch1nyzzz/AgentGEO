</span><p data-dcnode-id="10356"><span data-dcnode-id="10402" instrument_node="">The </span><b data-dcnode-id="10400"><span data-dcnode-id="10401" instrument_node="">Ten Commandments</span></b><span data-dcnode-id="10399" instrument_node=""> (</span><a data-dcnode-id="10397" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hebrew_language" title="Hebrew language"><span data-dcnode-id="10398" instrument_node="">Hebrew</span></a><span data-dcnode-id="10396" instrument_node="">: </span><span data-dcnode-id="10394" dir="rtl" lang="he"><span data-dcnode-id="10395" instrument_node="">עֲשֶׂרֶת הַדִּבְּרוֹת</span></span><span data-dcnode-id="10393" instrument_node="">, </span><i data-dcnode-id="10391"><span data-dcnode-id="10392" instrument_node="">Aseret ha'Dibrot</span></i><span data-dcnode-id="10390" instrument_node="">), also known as the </span><b data-dcnode-id="10388"><span data-dcnode-id="10389" instrument_node="">Decalogue</span></b><span data-dcnode-id="10387" instrument_node="">, are a set of </span><a data-dcnode-id="10385" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bible" title="Bible"><span data-dcnode-id="10386" instrument_node="">biblical</span></a><span data-dcnode-id="10384" instrument_node=""> principles relating to </span><a data-dcnode-id="10382" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ethics" title="Ethics"><span data-dcnode-id="10383" instrument_node="">ethics</span></a><span data-dcnode-id="10381" instrument_node=""> and </span><a data-dcnode-id="10379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Worship" title="Worship"><span data-dcnode-id="10380" instrument_node="">worship</span></a><span data-dcnode-id="10378" instrument_node=""> that play a fundamental role in </span><a data-dcnode-id="10376" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Judaism" title="Judaism"><span data-dcnode-id="10377" instrument_node="">Judaism</span></a><span data-dcnode-id="10375" instrument_node=""> and </span><a data-dcnode-id="10373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Christianity" title="Christianity"><span data-dcnode-id="10374" instrument_node="">Christianity</span></a><span data-dcnode-id="10372" instrument_node="">. The text of the Ten Commandments appears twice in the </span><a data-dcnode-id="10370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hebrew_Bible" title="Hebrew Bible"><span data-dcnode-id="10371" instrument_node="">Hebrew Bible</span></a><span data-dcnode-id="10369" instrument_node="">: at </span><a data-dcnode-id="10367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Book_of_Exodus" title="Book of Exodus"><span data-dcnode-id="10368" instrument_node="">Exodus</span></a><span data-dcnode-id="10366" instrument_node=""> </span><a class="external text" data-dcnode-id="10364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mechon-mamre.org/p/pt/pt0220.htm%232" rel="nofollow"><span data-dcnode-id="10365" instrument_node="">20:2–17</span></a><span data-dcnode-id="10363" instrument_node=""> and </span><a data-dcnode-id="10361" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Book_of_Deuteronomy" title="Book of Deuteronomy"><span data-dcnode-id="10362" instrument_node="">Deuteronomy</span></a><span data-dcnode-id="10360" instrument_node=""> </span><a class="external text" data-dcnode-id="10358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mechon-mamre.org/p/pt/pt0505.htm%236" rel="nofollow"><span data-dcnode-id="10359" instrument_node="">5:6–21</span></a><span data-dcnode-id="10357" instrument_node="">.
</span></p><p data-dcnode-id="10332"><span data-dcnode-id="10355" instrument_node="">According to the book of Exodus in the </span><a data-dcnode-id="10353" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Torah" title="Torah"><span data-dcnode-id="10354" instrument_node="">Torah</span></a><span data-dcnode-id="10352" instrument_node="">, the Ten Commandments were revealed to </span><a data-dcnode-id="10350" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Moses" title="Moses"><span data-dcnode-id="10351" instrument_node="">Moses</span></a><span data-dcnode-id="10349" instrument_node=""> at </span><a data-dcnode-id="10347" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mount_Sinai_%28Bible%29" title="Mount Sinai (Bible)"><span data-dcnode-id="10348" instrument_node="">Mount Sinai</span></a><span data-dcnode-id="10346" instrument_node=""> and inscribed by the </span><a data-dcnode-id="10344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Finger_of_God" title="Finger of God"><span data-dcnode-id="10345" instrument_node="">finger of God</span></a><span data-dcnode-id="10343" instrument_node=""> on two </span><a data-dcnode-id="10341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tablets_of_Stone" title="Tablets of Stone"><span data-dcnode-id="10342" instrument_node="">tablets of stone</span></a><span data-dcnode-id="10340" instrument_node=""> kept in the </span><a data-dcnode-id="10338" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ark_of_the_Covenant" title="Ark of the Covenant"><span data-dcnode-id="10339" instrument_node="">Ark of the Covenant</span></a><span data-dcnode-id="10337" instrument_node="">.</span><sup class="reference" data-dcnode-id="10334" id="cite_ref-1"><a data-dcnode-id="10335" href="#cite_note-1"><span data-dcnode-id="10336" instrument_node="">[1]</span></a></sup><span data-dcnode-id="10333" instrument_node="">
</span></p><p data-dcnode-id="10324"><span data-dcnode-id="10331" instrument_node="">Scholars disagree about when the Ten Commandments were written and by whom, with some modern scholars suggesting that they were likely modeled on </span><a data-dcnode-id="10329" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hittites" title="Hittites"><span data-dcnode-id="10330" instrument_node="">Hittite</span></a><span data-dcnode-id="10328" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="10326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mesopotamian" title="Mesopotamian"><span data-dcnode-id="10327" instrument_node="">Mesopotamian</span></a><span data-dcnode-id="10325" instrument_node=""> laws and treaties.

d="9936" instrument_node="">
</span><p data-dcnode-id="9886"><span data-dcnode-id="9935" instrument_node="">In </span><a data-dcnode-id="9933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Biblical_Hebrew" title="Biblical Hebrew"><span data-dcnode-id="9934" instrument_node="">Biblical Hebrew</span></a><span data-dcnode-id="9932" instrument_node="">, the Ten Commandments, called </span><span class="script-hebrew" data-dcnode-id="9928" dir="rtl" style="font-size: 115%;"><span data-dcnode-id="9929" instrument_node="">עשרת הדיברות</span></span><span data-dcnode-id="9927" instrument_node="">‎ (</span><a data-dcnode-id="9925" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Romanization_of_Hebrew" title="Romanization of Hebrew"><span data-dcnode-id="9926" instrument_node="">transliterated</span></a><span data-dcnode-id="9924" instrument_node=""> </span><span data-dcnode-id="9921" title="Hebrew-language text"><i data-dcnode-id="9922" lang="he-Latn"><span data-dcnode-id="9923" instrument_node="">aseret ha-dibrot</span></i></span><span data-dcnode-id="9920" instrument_node="">), are mentioned at </span><a data-dcnode-id="9918" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Book_of_Exodus" title="Book of Exodus"><span data-dcnode-id="9919" instrument_node="">Exodus</span></a><span data-dcnode-id="9917" instrument_node=""> </span><a class="external text" data-dcnode-id="9915" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mechon-mamre.org/p/pt/pt0234.htm%2328" rel="nofollow"><span data-dcnode-id="9916" instrument_node="">34:28</span></a><span data-dcnode-id="9914" instrument_node="">,</span><sup class="reference" data-dcnode-id="9911" id="cite_ref-ex34-28_2-0"><a data-dcnode-id="9912" href="#cite_note-ex34-28-2"><span data-dcnode-id="9913" instrument_node="">[2]</span></a></sup><span data-dcnode-id="9910" instrument_node=""> </span><a data-dcnode-id="9908" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Book_of_Deuteronomy" title="Book of Deuteronomy"><span data-dcnode-id="9909" instrument_node="">Deuteronomy</span></a><span data-dcnode-id="9907" instrument_node=""> </span><a class="external text" data-dcnode-id="9905" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mechon-mamre.org/p/pt/pt0504.htm%2313" rel="nofollow"><span data-dcnode-id="9906" instrument_node="">4:13</span></a><sup class="reference" data-dcnode-id="9902" id="cite_ref-3"><a data-dcnode-id="9903" href="#cite_note-3"><span data-dcnode-id="9904" instrument_node="">[3]</span></a></sup><span data-dcnode-id="9901" instrument_node=""> and </span><a data-dcnode-id="9899" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Book_of_Deuteronomy" title="Book of Deuteronomy"><span data-dcnode-id="9900" instrument_node="">Deuteronomy</span></a><span data-dcnode-id="9898" instrument_node=""> </span><a class="external text" data-dcnode-id="9896" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mechon-mamre.org/p/pt/pt0510.htm%234" rel="nofollow"><span data-dcnode-id="9897" instrument_node="">10:4</span></a><span data-dcnode-id="9895" instrument_node="">.</span><sup class="reference" data-dcnode-id="9892" id="cite_ref-4"><a data-dcnode-id="9893" href="#cite_note-4"><span data-dcnode-id="9894" instrument_node="">[4]</span></a></sup><span data-dcnode-id="9891" instrument_node=""> In all sources, the terms are translatable as "the ten words", "the ten sayings", or "the ten matters".</span><sup class="reference" data-dcnode-id="9888" id="cite_ref-5"><a data-dcnode-id="9889" href="#cite_note-5"><span data-dcnode-id="9890" instrument_node="">[5]</span></a></sup><span data-dcnode-id="9887" instrument_node="">
</span></p><p data-dcnode-id="9831"><span data-dcnode-id="9885" instrument_node="">In the </span><a data-dcnode-id="9883" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Septuagint" title="Septuagint"><span data-dcnode-id="9884" instrument_node="">Septuagint</span></a><span data-dcnode-id="9882" instrument_node=""> (or LXX), the  "ten words" was translated as "Decalogue", which is derived from </span><a data-dcnode-id="9880" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ancient_Greek" title="Ancient Greek"><span data-dcnode-id="9881" instrument_node="">Greek</span></a><span data-dcnode-id="9879" instrument_node=""> </span><span data-dcnode-id="9876" title="Ancient Greek (to 1453)-language text"><span data-dcnode-id="9877" lang="grc"><span data-dcnode-id="9878" instrument_node="">δεκάλογος</span></span></span><span data-dcnode-id="9875" instrument_node="">, </span><i data-dcnode-id="9873"><span data-dcnode-id="9874" instrument_node="">dekalogos</span></i><span data-dcnode-id="9872" instrument_node="">, the latter meaning and referring</span><sup class="reference" data-dcnode-id="9869" id="cite_ref-LSJ_Dekalogos_6-0"><a data-dcnode-id="9870" href="#cite_note-LSJ_Dekalogos-6"><span data-dcnode-id="9871" instrument_node="">[6]</span></a></sup><span data-dcnode-id="9868" instrument_node=""> to the </span><a data-dcnode-id="9866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ancient_Greek" title="Ancient Greek"><span data-dcnode-id="9867" instrument_node="">Greek</span></a><span data-dcnode-id="9865" instrument_node=""> translation (in </span><a data-dcnode-id="9863" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Accusative_case" title="Accusative case"><span data-dcnode-id="9864" instrument_node="">accusative</span></a><span data-dcnode-id="9862" instrument_node="">) </span><span data-dcnode-id="9859" title="Ancient Greek (to 1453)-language text"><span data-dcnode-id="9860" lang="grc"><span data-dcnode-id="9861" instrument_node="">δέκα λόγους</span></span></span><span data-dcnode-id="9858" instrument_node="">, </span><span data-dcnode-id="9855" title="Ancient Greek (to 1453)-language text"><i data-dcnode-id="9856" lang="grc-Latn"><span data-dcnode-id="9857" instrument_node="">deka logous</span></i></span><span data-dcnode-id="9854" instrument_node="">. This term is also sometimes used in English, in addition to Ten Commandments. The </span><a data-dcnode-id="9852" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tyndale_Bible" title="Tyndale Bible"><span data-dcnode-id="9853" instrument_node="">Tyndale</span></a><span data-dcnode-id="9851" instrument_node=""> and </span><a data-dcnode-id="9849" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Coverdale_Bible" title="Coverdale Bible"><span data-dcnode-id="9850" instrument_node="">Coverdale</span></a><span data-dcnode-id="9848" instrument_node=""> English biblical translations used "nine verses". The </span><a data-dcnode-id="9846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Geneva_Bible" title="Geneva Bible"><span data-dcnode-id="9847" instrument_node="">Geneva Bible</span></a><span data-dcnode-id="9845" instrument_node=""> used "ten commandments", which was followed by the </span><a data-dcnode-id="9843" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bishops%2527_Bible" title="Bishops' Bible"><span data-dcnode-id="9844" instrument_node="">Bishops' Bible</span></a><span data-dcnode-id="9842" instrument_node=""> and the </span><a class="mw-redirect" data-dcnode-id="9840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Authorized_King_James_Version" title="Authorized King James Version"><span data-dcnode-id="9841" instrument_node="">Authorized Version</span></a><span data-dcnode-id="9839" instrument_node=""> (the </span><a data-dcnode-id="9837" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/King_James_Version" title="King James Version"><span data-dcnode-id="9838" instrument_node="">"King James" version</span></a><span data-dcnode-id="9836" instrument_node="">) as "ten commandments". Most major English versions use the word "commandments".</span><sup class="reference" data-dcnode-id="9833" id="cite_ref-ex34-28_2-1"><a data-dcnode-id="9834" href="#cite_note-ex34-28-2"><span data-dcnode-id="9835" instrument_node="">[2]</span></a></sup><span data-dcnode-id="9832" instrument_node="">
</span></p><p data-dcnode-id="9819"><span data-dcnode-id="9830" instrument_node="">The stone tablets, as opposed to the ten commandments inscribed on them, are called </span><link data-dcnode-id="9829" href="mw-data:TemplateStyles:r1020748213" rel="mw-deduplicated-inline-style"><span class="script-hebrew" data-dcnode-id="9827" dir="rtl" style="font-size: 115%;"><span data-dcnode-id="9828" instrument_node="">לוחות הברית</span></span><span data-dcnode-id="9826" instrument_node="">‎, </span><i data-dcnode-id="9824"><span data-dcnode-id="9825" instrument_node="">Lukhot HaBrit</span></i><span data-dcnode-id="9823" instrument_node="">, meaning "the tablets of the </span><a data-dcnode-id="9821" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Covenant_%28biblical%29" title="Covenant (biblical)"><span data-dcnode-id="9822" instrument_node="">covenant</span></a><span data-dcnode-id="9820" instrument_node="">".
</span></p><span data-dcnode-id="9818" instrument_node="">
</span><h2 data-dcnode-id="9808"><span class="mw-headline" data-dcnode-id="9816" id="Biblical_narrative"><span data-dcnode-id="9817" instrument_node="">Biblical narrative</span></span><span class="mw-editsection" data-dcnode-id="9809"><span class="mw-editsection-bracket" data-dcnode-id="9814"><span data-dcnode-id="9815" instrument_node="">[</span></span><a data-dcnode-id="9812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTen_Commandments%26action%3Dedit%26section%3D2" title="Edit section: Biblical narrative"><span data-dcnode-id="9813" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="9810"><span data-dcnode-id="9811" instrument_node="">]</span></span></span></h2><span data-dcnode-id="9807" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="9798"><div class="thumbinner" data-dcnode-id="9799" style="width:222px;"><a class="image" data-dcnode-id="9805" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AThe_Giving_of_the_Law.jpg"><img alt="" class="thumbimage" data-dcnode-id="9806" data-file-height="2066" data-file-width="1477" decoding="async" height="308" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/4/42/The_Giving_of_the_Law.jpg/220px-The_Giving_of_the_Law.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/4/42/The_Giving_of_the_Law.jpg/330px-The_Giving_of_the_Law.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/4/42/The_Giving_of_the_Law.jpg/440px-The_Giving_of_the_Law.jpg 2x" width="220"></a><span data-dcnode-id="9804" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="9800"><div class="magnify" data-dcnode-id="9802"><a class="internal" data-dcnode-id="9803" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AThe_Giving_of_the_Law.jpg" title="Enlarge"></a></div><span data-dcnode-id="9801" instrument_node="">1896 illustration depicting Moses receiving the commandments</span></div></div></div><span data-dcnode-id="9797" instrument_node="">
</span><p data-dcnode-id="9763"><span data-dcnode-id="9796" instrument_node="">The biblical narrative of the revelation at Sinai begins in </span><a class="external text" data-dcnode-id="9794" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bible.oremus.org/%3Fpassage%3DExodus%252019%26version%3Dnrsv" rel="nofollow"><span data-dcnode-id="9795" instrument_node="">Exodus 19</span></a><span data-dcnode-id="9793" instrument_node=""> after the arrival of the children of Israel at </span><a class="mw-redirect" data-dcnode-id="9791" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Biblical_Mount_Sinai" title="Biblical Mount Sinai"><span data-dcnode-id="9792" instrument_node="">Mount Sinai</span></a><span data-dcnode-id="9790" instrument_node=""> (also called </span><a data-dcnode-id="9788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mount_Horeb" title="Mount Horeb"><span data-dcnode-id="9789" instrument_node="">Horeb</span></a><span data-dcnode-id="9787" instrument_node="">). On the morning of the third day of their encampment, "there were thunders and lightnings, and a thick cloud upon the mount, and the voice of the trumpet exceeding loud", and the people assembled at the base of the mount. After "the L</span><span class="smallcaps" data-dcnode-id="9785" style="font-size:83%"><span data-dcnode-id="9786" instrument_node="">ORD</span></span><sup class="reference" data-dcnode-id="9782" id="cite_ref-7"><a data-dcnode-id="9783" href="#cite_note-7"><span data-dcnode-id="9784" instrument_node="">[7]</span></a></sup><span data-dcnode-id="9781" instrument_node=""> came down upon mount Sinai", </span><a data-dcnode-id="9779" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Moses" title="Moses"><span data-dcnode-id="9780" instrument_node="">Moses</span></a><span data-dcnode-id="9778" instrument_node=""> went up briefly and returned to prepare the people, and then in </span><a class="external text" data-dcnode-id="9776" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bible.oremus.org/%3Fpassage%3DExodus%252020%26version%3Dnrsv" rel="nofollow"><span data-dcnode-id="9777" instrument_node="">Exodus 20</span></a><span data-dcnode-id="9775" instrument_node=""> "God spoke" to all the people the words of the covenant, that is, the "ten commandments"</span><sup class="reference" data-dcnode-id="9772" id="cite_ref-8"><a data-dcnode-id="9773" href="#cite_note-8"><span data-dcnode-id="9774" instrument_node="">[8]</span></a></sup><span data-dcnode-id="9771" instrument_node=""> as it is written.  Modern biblical scholarship differs as to whether </span><a class="external text" data-dcnode-id="9769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bible.oremus.org/%3Fpassage%3DExodus%252019%25E2%2580%259320%26version%3Dnrsv" rel="nofollow"><span data-dcnode-id="9770" instrument_node="">Exodus 19–20</span></a><span data-dcnode-id="9768" instrument_node=""> describes the people of Israel as having directly heard all or some of the decalogue, or whether the laws are only passed to them through Moses.</span><sup class="reference" data-dcnode-id="9765" id="cite_ref-9"><a data-dcnode-id="9766" href="#cite_note-9"><span data-dcnode-id="9767" instrument_node="">[9]</span></a></sup><span data-dcnode-id="9764" instrument_node="">
</span></p><p data-dcnode-id="9725"><span data-dcnode-id="9762" instrument_node="">The people were afraid to hear more and moved "afar off", and Moses responded with "Fear not." Nevertheless, he drew near the "thick darkness" where "the presence of the Lord" was</span><sup class="reference" data-dcnode-id="9759" id="cite_ref-10"><a data-dcnode-id="9760" href="#cite_note-10"><span data-dcnode-id="9761" instrument_node="">[10]</span></a></sup><span data-dcnode-id="9758" instrument_node=""> to hear the additional statutes and "judgments",</span><sup class="reference" data-dcnode-id="9755" id="cite_ref-11"><a data-dcnode-id="9756" href="#cite_note-11"><span data-dcnode-id="9757" instrument_node="">[11]</span></a></sup><span data-dcnode-id="9754" instrument_node=""> all which he "wrote"</span><sup class="reference" data-dcnode-id="9751" id="cite_ref-12"><a data-dcnode-id="9752" href="#cite_note-12"><span data-dcnode-id="9753" instrument_node="">[12]</span></a></sup><span data-dcnode-id="9750" instrument_node=""> in the "</span><a data-dcnode-id="9748" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Covenant_Code" title="Covenant Code"><span data-dcnode-id="9749" instrument_node="">book of the covenant</span></a><span data-dcnode-id="9747" instrument_node="">"</span><sup class="reference" data-dcnode-id="9744" id="cite_ref-13"><a data-dcnode-id="9745" href="#cite_note-13"><span data-dcnode-id="9746" instrument_node="">[13]</span></a></sup><span data-dcnode-id="9743" instrument_node=""> which he read to the people the next morning, and they agreed to be obedient and do all that the L</span><span class="smallcaps" data-dcnode-id="9741" style="font-size:83%"><span data-dcnode-id="9742" instrument_node="">ORD</span></span><span data-dcnode-id="9740" instrument_node=""> had said. Moses escorted a select group consisting of </span><a data-dcnode-id="9738" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aaron" title="Aaron"><span data-dcnode-id="9739" instrument_node="">Aaron</span></a><span data-dcnode-id="9737" instrument_node="">, </span><a data-dcnode-id="9735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nadab_and_Abihu" title="Nadab and Abihu"><span data-dcnode-id="9736" instrument_node="">Nadab and Abihu</span></a><span data-dcnode-id="9734" instrument_node="">, and "seventy of the elders of Israel" to a location on the mount where they worshipped "afar off"</span><sup class="reference" data-dcnode-id="9731" id="cite_ref-14"><a data-dcnode-id="9732" href="#cite_note-14"><span data-dcnode-id="9733" instrument_node="">[14]</span></a></sup><span data-dcnode-id="9730" instrument_node=""> and they "saw the God of Israel" above a "paved work" like clear sapphire stone.</span><sup class="reference" data-dcnode-id="9727" id="cite_ref-15"><a data-dcnode-id="9728" href="#cite_note-15"><span data-dcnode-id="9729" instrument_node="">[15]</span></a></sup><span data-dcnode-id="9726" instrument_node="">
</span></p><span data-dcnode-id="9724" instrument_node="">
</span><blockquote class="templatequote" data-dcnode-id="9706"><p data-dcnode-id="9714"><span data-dcnode-id="9721" instrument_node="">And the L</span><span class="smallcaps" data-dcnode-id="9719" style="font-size:83%"><span data-dcnode-id="9720" instrument_node="">ORD</span></span><span data-dcnode-id="9718" instrument_node=""> said unto Moses, Come up to me into the mount, and be there: and I will give thee tablets of stone, and a law, and commandments which I have written; that thou mayest teach them. </span><sup data-dcnode-id="9716"><span data-dcnode-id="9717" instrument_node="">13</span></sup><span data-dcnode-id="9715" instrument_node=""> And Moses rose up, and his minister Joshua: and Moses went up into the mount of God.</span></p><div class="templatequotecite" data-dcnode-id="9707"><span data-dcnode-id="9713" instrument_node="">— </span><cite data-dcnode-id="9708"><span data-dcnode-id="9712" instrument_node="">First mention of the tablets in </span><span class="nourlexpansion nowrap" data-dcnode-id="9709"><a class="external text" data-dcnode-id="9710" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biblegateway.com/passage/%3Fsearch%3DExodus%2B24%3A12%25E2%2580%259313%26version%3DNRSV" rel="nofollow"><span data-dcnode-id="9711" instrument_node="">Exodus 24:12–13</span></a></span></cite></div></blockquote><span data-dcnode-id="9705" instrument_node="">
</span><p data-dcnode-id="9672"><span data-dcnode-id="9704" instrument_node="">The mount was covered by the cloud for six days, and on the seventh day Moses went into the midst of the cloud and was "in the mount </span><a class="mw-redirect" data-dcnode-id="9702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Forty_days_and_forty_nights" title="Forty days and forty nights"><span data-dcnode-id="9703" instrument_node="">forty days and forty nights</span></a><span data-dcnode-id="9701" instrument_node="">."</span><sup class="reference" data-dcnode-id="9698" id="cite_ref-16"><a data-dcnode-id="9699" href="#cite_note-16"><span data-dcnode-id="9700" instrument_node="">[16]</span></a></sup><span data-dcnode-id="9697" instrument_node=""> And Moses said, "the L</span><span class="smallcaps" data-dcnode-id="9695" style="font-size:83%"><span data-dcnode-id="9696" instrument_node="">ORD</span></span><span data-dcnode-id="9694" instrument_node=""> delivered unto me two tablets of stone written with the </span><a data-dcnode-id="9692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Finger_of_God" title="Finger of God"><span data-dcnode-id="9693" instrument_node="">finger of God</span></a><span data-dcnode-id="9691" instrument_node="">; and on them was written according to all the words, which the L</span><span class="smallcaps" data-dcnode-id="9689" style="font-size:83%"><span data-dcnode-id="9690" instrument_node="">ORD</span></span><span data-dcnode-id="9688" instrument_node=""> spake with you in the mount out of the midst of the fire in the day of the assembly."</span><sup class="reference" data-dcnode-id="9685" id="cite_ref-17"><a data-dcnode-id="9686" href="#cite_note-17"><span data-dcnode-id="9687" instrument_node="">[17]</span></a></sup><span data-dcnode-id="9684" instrument_node=""> Before the full forty days expired, the children of Israel collectively decided that something had happened to Moses, and compelled Aaron to fashion a </span><a data-dcnode-id="9682" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Golden_calf" title="Golden calf"><span data-dcnode-id="9683" instrument_node="">golden calf</span></a><span data-dcnode-id="9681" instrument_node="">, and he "built an altar before it"</span><sup class="reference" data-dcnode-id="9678" id="cite_ref-18"><a data-dcnode-id="9679" href="#cite_note-18"><span data-dcnode-id="9680" instrument_node="">[18]</span></a></sup><span data-dcnode-id="9677" instrument_node=""> and the people "worshipped" the calf.</span><sup class="reference" data-dcnode-id="9674" id="cite_ref-19"><a data-dcnode-id="9675" href="#cite_note-19"><span data-dcnode-id="9676" instrument_node="">[19]</span></a></sup><span data-dcnode-id="9673" instrument_node="">
</span></p><span data-dcnode-id="9671" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="9657"><div class="thumbinner" data-dcnode-id="9658" style="width:222px;"><a class="image" data-dcnode-id="9669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ARembrandt_-_Moses_with_the_Ten_Commandments_-_Google_Art_Project.jpg"><img alt="This is an image of an oil on canvas picture by Rembrandt (1659) of a bearded man representing Moses with two tablets of stone of the ten commandments held high in both hands." class="thumbimage" data-dcnode-id="9670" data-file-height="4990" data-file-width="4000" decoding="async" height="274" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/3/3d/Rembrandt_-_Moses_with_the_Ten_Commandments_-_Google_Art_Project.jpg/220px-Rembrandt_-_Moses_with_the_Ten_Commandments_-_Google_Art_Project.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/3/3d/Rembrandt_-_Moses_with_the_Ten_Commandments_-_Google_Art_Project.jpg/330px-Rembrandt_-_Moses_with_the_Ten_Commandments_-_Google_Art_Project.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/3/3d/Rembrandt_-_Moses_with_the_Ten_Commandments_-_Google_Art_Project.jpg/440px-Rembrandt_-_Moses_with_the_Ten_Commandments_-_Google_Art_Project.jpg 2x" width="220"></a><span data-dcnode-id="9668" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="9659"><div class="magnify" data-dcnode-id="9666"><a class="internal" data-dcnode-id="9667" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ARembrandt_-_Moses_with_the_Ten_Commandments_-_Google_Art_Project.jpg" title="Enlarge"></a></div><i data-dcnode-id="9663"><a data-dcnode-id="9664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Moses_Breaking_the_Tablets_of_the_Law" title="Moses Breaking the Tablets of the Law"><span data-dcnode-id="9665" instrument_node="">Moses Breaking the Tablets of the Law</span></a></i><span data-dcnode-id="9662" instrument_node=""> (1659) by </span><a data-dcnode-id="9660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rembrandt" title="Rembrandt"><span data-dcnode-id="9661" instrument_node="">Rembrandt</span></a></div></div></div><span data-dcnode-id="9656" instrument_node="">
</span><p data-dcnode-id="9623"><span data-dcnode-id="9655" instrument_node="">After the full forty days, Moses and Joshua came down from the mountain with the </span><a data-dcnode-id="9653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tablets_of_Stone" title="Tablets of Stone"><span data-dcnode-id="9654" instrument_node="">tablets of stone</span></a><span data-dcnode-id="9652" instrument_node="">: "And it came to pass, as soon as he came nigh unto the camp, that he saw the calf, and the dancing: and Moses' anger waxed hot, and he cast the tablets out of his hands, and brake them beneath the mount."</span><sup class="reference" data-dcnode-id="9649" id="cite_ref-20"><a data-dcnode-id="9650" href="#cite_note-20"><span data-dcnode-id="9651" instrument_node="">[20]</span></a></sup><span data-dcnode-id="9648" instrument_node=""> After the events in chapters 32 and 33, the L</span><span class="smallcaps" data-dcnode-id="9646" style="font-size:83%"><span data-dcnode-id="9647" instrument_node="">ORD</span></span><span data-dcnode-id="9645" instrument_node=""> told Moses, "Hew thee two tablets of stone like unto the first: and I will write upon these tablets the words that were in the first tablets, which thou brakest."</span><sup class="reference" data-dcnode-id="9642" id="cite_ref-21"><a data-dcnode-id="9643" href="#cite_note-21"><span data-dcnode-id="9644" instrument_node="">[21]</span></a></sup><span data-dcnode-id="9641" instrument_node=""> "And he wrote on the tablets, according to the first writing, the ten commandments, which the L</span><span class="smallcaps" data-dcnode-id="9639" style="font-size:83%"><span data-dcnode-id="9640" instrument_node="">ORD</span></span><span data-dcnode-id="9638" instrument_node=""> spake unto you in the mount out of the midst of the fire in the day of the assembly: and the L</span><span class="smallcaps" data-dcnode-id="9636" style="font-size:83%"><span data-dcnode-id="9637" instrument_node="">ORD</span></span><span data-dcnode-id="9635" instrument_node=""> gave them unto me."</span><sup class="reference" data-dcnode-id="9632" id="cite_ref-22"><a data-dcnode-id="9633" href="#cite_note-22"><span data-dcnode-id="9634" instrument_node="">[22]</span></a></sup><span data-dcnode-id="9631" instrument_node=""> These tablets were later placed in the </span><a class="mw-redirect" data-dcnode-id="9629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ark_of_the_covenant" title="Ark of the covenant"><span data-dcnode-id="9630" instrument_node="">ark of the covenant</span></a><span data-dcnode-id="9628" instrument_node="">.</span><sup class="reference" data-dcnode-id="9625" id="cite_ref-23"><a data-dcnode-id="9626" href="#cite_note-23"><span data-dcnode-id="9627" instrument_node="">[23]</span></a></sup><span data-dcnode-id="9624" instrument_node="">
</span></p><span data-dcnode-id="9622" instrument_node="">
</span><h2 data-dcnode-id="9611"><span class="mw-headline" data-dcnode-id="9619" id="Numbering"><span data-dcnode-id="9621" instrument_node="">Numbering</span><span class="anchor" data-dcnode-id="9620" id="Numbering_schemes"></span></span><span class="mw-editsection" data-dcnode-id="9612"><span class="mw-editsection-bracket" data-dcnode-id="9617"><span data-dcnode-id="9618" instrument_node="">[</span></span><a data-dcnode-id="9615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTen_Commandments%26action%3Dedit%26section%3D3" title="Edit section: Numbering"><span data-dcnode-id="9616" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="9613"><span data-dcnode-id="9614" instrument_node="">]</span></span></span></h2><span data-dcnode-id="9610" instrument_node="">
</span><p data-dcnode-id="9592"><span data-dcnode-id="9609" instrument_node="">Although both the </span><a data-dcnode-id="9607" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Masoretic_Text" title="Masoretic Text"><span data-dcnode-id="9608" instrument_node="">Masoretic Text</span></a><span data-dcnode-id="9606" instrument_node=""> and the </span><a data-dcnode-id="9604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dead_Sea_Scrolls" title="Dead Sea Scrolls"><span data-dcnode-id="9605" instrument_node="">Dead Sea Scrolls</span></a><span data-dcnode-id="9603" instrument_node=""> show the passages of Exodus 20 and Deuteronomy 5 divided into ten specific commandments with spaces between them,</span><sup class="reference" data-dcnode-id="9600" id="cite_ref-24"><a data-dcnode-id="9601" href="#cite_note-24"><span data-dcnode-id="9602" instrument_node="">[24]</span></a></sup><sup class="reference" data-dcnode-id="9597" id="cite_ref-25"><a data-dcnode-id="9598" href="#cite_note-25"><span data-dcnode-id="9599" instrument_node="">[25]</span></a></sup><span data-dcnode-id="9596" instrument_node=""> many </span><a data-dcnode-id="9594" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Modern_English_Bible_translations" title="Modern English Bible translations"><span data-dcnode-id="9595" instrument_node="">Modern English Bible translations</span></a><span data-dcnode-id="9593" instrument_node=""> give the appearance of more than ten imperative statements in each passage.
</span></p><p data-dcnode-id="9577"><span data-dcnode-id="9591" instrument_node="">Different religious traditions divide the seventeen verses of </span><a class="external text" data-dcnode-id="9589" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bible.oremus.org/%3Fpassage%3DExodus%252020%3A1%25E2%2580%259317%26version%3Dnrsv" rel="nofollow"><span data-dcnode-id="9590" instrument_node="">Exodus 20:1–17</span></a><span data-dcnode-id="9588" instrument_node=""> and their parallels in </span><a class="external text" data-dcnode-id="9586" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bible.oremus.org/%3Fpassage%3DDeuteronomy%25205%3A4%25E2%2580%259321%26version%3Dnrsv" rel="nofollow"><span data-dcnode-id="9587" instrument_node="">Deuteronomy 5:4–21</span></a><span data-dcnode-id="9585" instrument_node=""> into ten commandments in different ways, shown in the table below. Some suggest that the number ten is a choice to aid memorization rather than a matter of theology.</span><sup class="reference" data-dcnode-id="9582" id="cite_ref-26"><a data-dcnode-id="9583" href="#cite_note-26"><span data-dcnode-id="9584" instrument_node="">[26]</span></a></sup><sup class="reference" data-dcnode-id="9579" id="cite_ref-Block_27-0"><a data-dcnode-id="9580" href="#cite_note-Block-27"><span data-dcnode-id="9581" instrument_node="">[27]</span></a></sup><span data-dcnode-id="9578" instrument_node="">

</span><p data-dcnode-id="8808"><span data-dcnode-id="8809" instrument_node="">Roughly, there are two major approaches towards the divisions of the commandments. One approach distinguishes the prohibition against other gods (verse 3) from the prohibition against images (verses 4–6):
</span></p><span data-dcnode-id="8807" instrument_node="">
</span><ul data-dcnode-id="8760"><li data-dcnode-id="8797"><b data-dcnode-id="8805"><span data-dcnode-id="8806" instrument_node="">LXX</span></b><span data-dcnode-id="8804" instrument_node="">: </span><a data-dcnode-id="8802" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Septuagint" title="Septuagint"><span data-dcnode-id="8803" instrument_node="">Septuagint</span></a><span data-dcnode-id="8801" instrument_node=""> (3rd century BC), generally followed by </span><a data-dcnode-id="8799" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eastern_Orthodox_Church" title="Eastern Orthodox Church"><span data-dcnode-id="8800" instrument_node="">Eastern Orthodox Christians</span></a><span data-dcnode-id="8798" instrument_node="">.</span></li><span data-dcnode-id="8796" instrument_node="">
</span><li data-dcnode-id="8786"><b data-dcnode-id="8794"><span data-dcnode-id="8795" instrument_node="">P</span></b><span data-dcnode-id="8793" instrument_node="">: </span><a data-dcnode-id="8791" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Philo" title="Philo"><span data-dcnode-id="8792" instrument_node="">Philo</span></a><span data-dcnode-id="8790" instrument_node=""> (1st century), has an extensive homily on why the order is so important, with the prohibition on adultery "the greatest of the commands dealing with persons", followed by the prohibitions against stealing and then killing last.</span><sup class="reference" data-dcnode-id="8787" id="cite_ref-52"><a data-dcnode-id="8788" href="#cite_note-52"><span data-dcnode-id="8789" instrument_node="">[52]</span></a></sup></li><span data-dcnode-id="8785" instrument_node="">
</span><li data-dcnode-id="8761"><b data-dcnode-id="8783"><span data-dcnode-id="8784" instrument_node="">R</span></b><span data-dcnode-id="8782" instrument_node="">: </span><a class="mw-redirect" data-dcnode-id="8780" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reformed_Christian" title="Reformed Christian"><span data-dcnode-id="8781" instrument_node="">Reformed Christians</span></a><span data-dcnode-id="8779" instrument_node=""> follow </span><a data-dcnode-id="8777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Calvin" title="John Calvin"><span data-dcnode-id="8778" instrument_node="">Calvin</span></a><span data-dcnode-id="8776" instrument_node="">'s </span><i data-dcnode-id="8773"><a data-dcnode-id="8774" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Institutes_of_the_Christian_Religion" title="Institutes of the Christian Religion"><span data-dcnode-id="8775" instrument_node="">Institutes</span></a></i><span data-dcnode-id="8772" instrument_node=""> (1536), which follows the Septuagint; this system is also used in the </span><a class="mw-redirect" data-dcnode-id="8770" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anglican" title="Anglican"><span data-dcnode-id="8771" instrument_node="">Anglican</span></a><span data-dcnode-id="8769" instrument_node=""> </span><i data-dcnode-id="8766"><a data-dcnode-id="8767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Book_of_Common_Prayer" title="Book of Common Prayer"><span data-dcnode-id="8768" instrument_node="">Book of Common Prayer</span></a></i><span data-dcnode-id="8765" instrument_node="">.</span><sup class="reference" data-dcnode-id="8762" id="cite_ref-53"><a data-dcnode-id="8763" href="#cite_note-53"><span data-dcnode-id="8764" instrument_node="">[53]</span></a></sup></li></ul><span data-dcnode-id="8759" instrument_node="">
</span><p data-dcnode-id="8757"><span data-dcnode-id="8758" instrument_node="">Another approach holds as a single command verses 3–6, the prohibition against images and the prohibition against other gods, while still maintaining ten commandments. Samaritan and Jewish traditions include another commandment, whereas Christian traditions will divide coveting the neighbor's wife and house.
</span></p><span data-dcnode-id="8756" instrument_node="">
</span><ul data-dcnode-id="8692"><li data-dcnode-id="8741"><b data-dcnode-id="8754"><span data-dcnode-id="8755" instrument_node="">S</span></b><span data-dcnode-id="8753" instrument_node="">: </span><a data-dcnode-id="8751" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Samaritan_Pentateuch" title="Samaritan Pentateuch"><span data-dcnode-id="8752" instrument_node="">Samaritan Pentateuch</span></a><span data-dcnode-id="8750" instrument_node=""> (</span><abbr data-dcnode-id="8748" title="circa"><span data-dcnode-id="8749" instrument_node="">c.</span></abbr><span data-dcnode-id="8746" style="white-space:nowrap;"><span data-dcnode-id="8747" instrument_node=""> 120 BCE</span></span><span data-dcnode-id="8745" instrument_node="">), contains additional text about </span><a data-dcnode-id="8743" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mount_Gerizim" title="Mount Gerizim"><span data-dcnode-id="8744" instrument_node="">Mount Gerizim</span></a><span data-dcnode-id="8742" instrument_node="">, makes this the 10th commandment.</span></li><span data-dcnode-id="8740" instrument_node="">
</span><li data-dcnode-id="8728"><b data-dcnode-id="8738"><span data-dcnode-id="8739" instrument_node="">T</span></b><span data-dcnode-id="8737" instrument_node="">: Jewish </span><a data-dcnode-id="8735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Talmud" title="Talmud"><span data-dcnode-id="8736" instrument_node="">Talmud</span></a><span data-dcnode-id="8734" instrument_node=""> (</span><abbr data-dcnode-id="8732" title="circa"><span data-dcnode-id="8733" instrument_node="">c.</span></abbr><span data-dcnode-id="8730" style="white-space:nowrap;"><span data-dcnode-id="8731" instrument_node=""> 200 CE</span></span><span data-dcnode-id="8729" instrument_node="">), makes the "prologue" the first "saying" or "matter."</span></li><span data-dcnode-id="8727" instrument_node="">
</span><li data-dcnode-id="8720"><b data-dcnode-id="8725"><span data-dcnode-id="8726" instrument_node="">A</span></b><span data-dcnode-id="8724" instrument_node="">: </span><a class="mw-redirect" data-dcnode-id="8722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Augustine" title="Augustine"><span data-dcnode-id="8723" instrument_node="">Augustine</span></a><span data-dcnode-id="8721" instrument_node=""> (4th century), follows the Talmud in combining verses 3–6, but omits the prologue as a commandment and divides the prohibition on coveting in two and following the word order of Deuteronomy 5:21 rather than Exodus 20:17.</span></li><span data-dcnode-id="8719" instrument_node="">
</span><li data-dcnode-id="8708"><b data-dcnode-id="8717"><span data-dcnode-id="8718" instrument_node="">C</span></b><span data-dcnode-id="8716" instrument_node="">: </span><a data-dcnode-id="8714" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Catholic_Church" title="Catholic Church"><span data-dcnode-id="8715" instrument_node="">Roman Catholicism</span></a><span data-dcnode-id="8713" instrument_node=""> largely follows Augustine, which was reiterated in the </span><i data-dcnode-id="8710"><a data-dcnode-id="8711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Catechism_of_the_Catholic_Church" title="Catechism of the Catholic Church"><span data-dcnode-id="8712" instrument_node="">Catechism of the Catholic Church</span></a></i><span data-dcnode-id="8709" instrument_node=""> (1992). Changes "the sabbath" into "the lord's day".  Divides Exodus 20:17, prohibiting covetousness, into two commandments.</span></li><span data-dcnode-id="8707" instrument_node="">
</span><li data-dcnode-id="8693"><b data-dcnode-id="8705"><span data-dcnode-id="8706" instrument_node="">L</span></b><span data-dcnode-id="8704" instrument_node="">: </span><a class="mw-redirect" data-dcnode-id="8702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lutherans" title="Lutherans"><span data-dcnode-id="8703" instrument_node="">Lutherans</span></a><span data-dcnode-id="8701" instrument_node=""> follow </span><a data-dcnode-id="8699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Luther%2527s_Large_Catechism" title="Luther's Large Catechism"><span data-dcnode-id="8700" instrument_node="">Luther's Large Catechism</span></a><span data-dcnode-id="8698" instrument_node=""> (1529), which follows Augustine and Roman Catholic tradition but subordinates the prohibition of images to the sovereignty of God in the First Commandment</span><sup class="reference" data-dcnode-id="8695" id="cite_ref-LC_54-0"><a data-dcnode-id="8696" href="#cite_note-LC-54"><span data-dcnode-id="8697" instrument_node="">[54]</span></a></sup><span data-dcnode-id="8694" instrument_node=""> and uses the word order of Exodus 20:17 rather than Deuteronomy 5:21 for the ninth and tenth commandments.</span></li></ul><span data-dcnode-id="8691" instrument_node="">
</span><h2 data-dcnode-id="8681"><span class="mw-headline" data-dcnode-id="8689" id="Religious_interpretations"><span data-dcnode-id="8690" instrument_node="">Religious interpretations</span></span><span class="mw-editsection" data-dcnode-id="8682"><span class="mw-editsection-bracket" data-dcnode-id="8687"><span data-dcnode-id="8688" instrument_node="">[</span></span><a data-dcnode-id="8685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTen_Commandments%26action%3Dedit%26section%3D4" title="Edit section: Religious interpretations"><span data-dcnode-id="8686" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8683"><span data-dcnode-id="8684" instrument_node="">]</span></span></span></h2><span data-dcnode-id="8680" instrument_node="">
</span><p data-dcnode-id="8674"><span data-dcnode-id="8679" instrument_node="">The Ten Commandments concern matters of fundamental importance in Judaism and Christianity: the greatest obligation (to worship only God), the greatest injury to a person (murder), the greatest injury to family bonds (adultery), the greatest injury to commerce and law (bearing false witness), the greatest inter-generational obligation (honour to parents), the greatest obligation to community (truthfulness), the greatest injury to movable property (theft).</span><sup class="reference" data-dcnode-id="8676" id="cite_ref-Huffmon_55-0"><a data-dcnode-id="8677" href="#cite_note-Huffmon-55"><span data-dcnode-id="8678" instrument_node="">[55]</span></a></sup><span data-dcnode-id="8675" instrument_node="">
</span></p><p data-dcnode-id="8647"><span data-dcnode-id="8673" instrument_node="">The Ten Commandments are written with room for varying interpretation, reflecting their role as a summary of fundamental principles.</span><sup class="reference" data-dcnode-id="8670" id="cite_ref-Block_27-1"><a data-dcnode-id="8671" href="#cite_note-Block-27"><span data-dcnode-id="8672" instrument_node="">[27]</span></a></sup><sup class="reference" data-dcnode-id="8667" id="cite_ref-Huffmon_55-1"><a data-dcnode-id="8668" href="#cite_note-Huffmon-55"><span data-dcnode-id="8669" instrument_node="">[55]</span></a></sup><sup class="reference" data-dcnode-id="8664" id="cite_ref-Miller_56-0"><a data-dcnode-id="8665" href="#cite_note-Miller-56"><span data-dcnode-id="8666" instrument_node="">[56]</span></a></sup><sup class="reference" data-dcnode-id="8661" id="cite_ref-Milgrom_57-0"><a data-dcnode-id="8662" href="#cite_note-Milgrom-57"><span data-dcnode-id="8663" instrument_node="">[57]</span></a></sup><span data-dcnode-id="8660" instrument_node=""> They are not as explicit</span><sup class="reference" data-dcnode-id="8657" id="cite_ref-Huffmon_55-2"><a data-dcnode-id="8658" href="#cite_note-Huffmon-55"><span data-dcnode-id="8659" instrument_node="">[55]</span></a></sup><span data-dcnode-id="8656" instrument_node=""> or as detailed as rules</span><sup class="reference" data-dcnode-id="8653" id="cite_ref-Barclay_58-0"><a data-dcnode-id="8654" href="#cite_note-Barclay-58"><span data-dcnode-id="8655" instrument_node="">[58]</span></a></sup><span data-dcnode-id="8652" instrument_node=""> or as many other biblical laws and commandments, because they provide guiding principles that apply universally, across changing circumstances. They do not specify punishments for their violation. Their precise import must be worked out in each separate situation.</span><sup class="reference" data-dcnode-id="8649" id="cite_ref-Barclay_58-1"><a data-dcnode-id="8650" href="#cite_note-Barclay-58"><span data-dcnode-id="8651" instrument_node="">[58]</span></a></sup><span data-dcnode-id="8648" instrument_node="">
</span></p><p data-dcnode-id="8642"><span data-dcnode-id="8646" instrument_node="">The Bible indicates the special status of the Ten Commandments among all other </span><a data-dcnode-id="8644" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Torah" title="Torah"><span data-dcnode-id="8645" instrument_node="">Torah</span></a><span data-dcnode-id="8643" instrument_node=""> laws in several ways:
</span></p><span data-dcnode-id="8641" instrument_node="">
</span><ul data-dcnode-id="8610"><li data-dcnode-id="8636"><span data-dcnode-id="8640" instrument_node="">They have a uniquely terse style.</span><sup class="reference" data-dcnode-id="8637" id="cite_ref-ODay_59-0"><a data-dcnode-id="8638" href="#cite_note-ODay-59"><span data-dcnode-id="8639" instrument_node="">[59]</span></a></sup></li><span data-dcnode-id="8635" instrument_node="">
</span><li data-dcnode-id="8626"><span data-dcnode-id="8634" instrument_node="">Of all the biblical laws and commandments, the Ten Commandments alone</span><sup class="reference" data-dcnode-id="8631" id="cite_ref-ODay_59-1"><a data-dcnode-id="8632" href="#cite_note-ODay-59"><span data-dcnode-id="8633" instrument_node="">[59]</span></a></sup><span data-dcnode-id="8630" instrument_node=""> are said to have been "written with the finger of God" (</span><a class="external text" data-dcnode-id="8628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bible.oremus.org/%3Fpassage%3DExodus%252031%3A18%26version%3Dnrsv" rel="nofollow"><span data-dcnode-id="8629" instrument_node="">Exodus 31:18</span></a><span data-dcnode-id="8627" instrument_node="">).</span></li><span data-dcnode-id="8625" instrument_node="">
</span><li data-dcnode-id="8611"><span data-dcnode-id="8624" instrument_node="">The stone tablets were placed in the </span><a data-dcnode-id="8622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ark_of_the_Covenant" title="Ark of the Covenant"><span data-dcnode-id="8623" instrument_node="">Ark of the Covenant</span></a><span data-dcnode-id="8621" instrument_node=""> (</span><a class="external text" data-dcnode-id="8619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bible.oremus.org/%3Fpassage%3DExodus%252025%3A21%26version%3Dnrsv" rel="nofollow"><span data-dcnode-id="8620" instrument_node="">Exodus 25:21</span></a><span data-dcnode-id="8618" instrument_node="">, </span><a class="external text" data-dcnode-id="8616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bible.oremus.org/%3Fpassage%3DDeuteronomy%252010%3A2%26version%3Dnrsv" rel="nofollow"><span data-dcnode-id="8617" instrument_node="">Deuteronomy 10:2,5</span></a><span data-dcnode-id="8615" instrument_node="">).</span><sup class="reference" data-dcnode-id="8612" id="cite_ref-ODay_59-2"><a data-dcnode-id="8613" href="#cite_note-ODay-59"><span data-dcnode-id="8614" instrument_node="">[59]</span></a></sup></li></ul><span data-dcnode-id="8609" instrument_node="">
</span><h3 data-dcnode-id="8599"><span class="mw-headline" data-dcnode-id="8607" id="Judaism"><span data-dcnode-id="8608" instrument_node="">Judaism</span></span><span class="mw-editsection" data-dcnode-id="8600"><span class="mw-editsection-bracket" data-dcnode-id="8605"><span data-dcnode-id="8606" instrument_node="">[</span></span><a data-dcnode-id="8603" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTen_Commandments%26action%3Dedit%26section%3D5" title="Edit section: Judaism"><span data-dcnode-id="8604" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8601"><span data-dcnode-id="8602" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8598" instrument_node="">
</span><link data-dcnode-id="8597" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="8593" role="note"><span data-dcnode-id="8596" instrument_node="">Further information: </span><a data-dcnode-id="8594" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Law_given_to_Moses_at_Sinai" title="Law given to Moses at Sinai"><span data-dcnode-id="8595" instrument_node="">Law given to Moses at Sinai</span></a></div><span data-dcnode-id="8592" instrument_node="">
</span><p data-dcnode-id="8546"><span data-dcnode-id="8591" instrument_node="">The Ten Commandments form the basis of </span><a data-dcnode-id="8589" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Halakha" title="Halakha"><span data-dcnode-id="8590" instrument_node="">Jewish law</span></a><span data-dcnode-id="8588" instrument_node="">,</span><sup class="reference" data-dcnode-id="8585" id="cite_ref-solomon_60-0"><a data-dcnode-id="8586" href="#cite_note-solomon-60"><span data-dcnode-id="8587" instrument_node="">[60]</span></a></sup><span data-dcnode-id="8584" instrument_node=""> stating God's universal and timeless standard of right and wrong – unlike the rest of the </span><a data-dcnode-id="8582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/613_commandments" title="613 commandments"><span data-dcnode-id="8583" instrument_node="">613 commandments</span></a><span data-dcnode-id="8581" instrument_node=""> in the Torah, which include, for example, various duties and ceremonies such as the </span><a data-dcnode-id="8579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kashrut" title="Kashrut"><span data-dcnode-id="8580" instrument_node="">kashrut</span></a><span data-dcnode-id="8578" instrument_node=""> dietary laws, and the rituals to be performed by priests in the </span><a class="mw-redirect" data-dcnode-id="8576" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Holy_Temple" title="Holy Temple"><span data-dcnode-id="8577" instrument_node="">Holy Temple</span></a><span data-dcnode-id="8575" instrument_node="">.</span><sup class="reference" data-dcnode-id="8572" id="cite_ref-dosick_61-0"><a data-dcnode-id="8573" href="#cite_note-dosick-61"><span data-dcnode-id="8574" instrument_node="">[61]</span></a></sup><span data-dcnode-id="8571" instrument_node=""> Jewish tradition considers the Ten Commandments the theological basis for the rest of the commandments. </span><a data-dcnode-id="8569" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Philo" title="Philo"><span data-dcnode-id="8570" instrument_node="">Philo</span></a><span data-dcnode-id="8568" instrument_node="">, in his four-book work </span><i data-dcnode-id="8566"><span data-dcnode-id="8567" instrument_node="">The Special Laws</span></i><span data-dcnode-id="8565" instrument_node="">, treated the Ten Commandments as headings under which he discussed other related commandments.</span><sup class="reference" data-dcnode-id="8562" id="cite_ref-62"><a data-dcnode-id="8563" href="#cite_note-62"><span data-dcnode-id="8564" instrument_node="">[62]</span></a></sup><span data-dcnode-id="8561" instrument_node=""> Similarly, in </span><i data-dcnode-id="8559"><span data-dcnode-id="8560" instrument_node="">The Decalogue</span></i><span data-dcnode-id="8558" instrument_node=""> he stated that "under [the "commandment… against adulterers"] many other commands are conveyed by implication, such as that against seducers, that against practisers of unnatural crimes, that against all who live in debauchery, that against all men who indulge in illicit and incontinent connections."</span><sup class="reference" data-dcnode-id="8555" id="cite_ref-63"><a data-dcnode-id="8556" href="#cite_note-63"><span data-dcnode-id="8557" instrument_node="">[63]</span></a></sup><span data-dcnode-id="8554" instrument_node=""> Others, such as Rabbi </span><a data-dcnode-id="8552" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Saadia_Gaon" title="Saadia Gaon"><span data-dcnode-id="8553" instrument_node="">Saadia Gaon</span></a><span data-dcnode-id="8551" instrument_node="">, have also made groupings of the commandments according to their links with the Ten Commandments.</span><sup class="reference" data-dcnode-id="8548" id="cite_ref-64"><a data-dcnode-id="8549" href="#cite_note-64"><span data-dcnode-id="8550" instrument_node="">[64]</span></a></sup><span data-dcnode-id="8547" instrument_node="">
</span></p><p data-dcnode-id="8534"><span data-dcnode-id="8545" instrument_node="">According to </span><a data-dcnode-id="8543" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Conservative_Judaism" title="Conservative Judaism"><span data-dcnode-id="8544" instrument_node="">Conservative</span></a><span data-dcnode-id="8542" instrument_node=""> Rabbi </span><a data-dcnode-id="8540" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Louis_Ginzberg" title="Louis Ginzberg"><span data-dcnode-id="8541" instrument_node="">Louis Ginzberg</span></a><span data-dcnode-id="8539" instrument_node="">, Ten Commandments are virtually entwined, in that the breaking of one leads to the breaking of another. Echoing an earlier rabbinic comment found in the commentary of Rashi to the Songs of Songs (4:5) Ginzberg explained—there is also a great bond of union between the first five commandments and the last five. The first commandment: "I am the Lord, thy God," corresponds to the sixth: "Thou shalt not kill," for the murderer slays the image of God. The second: "Thou shalt have no strange gods before me," corresponds to the seventh: "Thou shalt not commit adultery," for conjugal faithlessness is as grave a sin as idolatry, which is faithlessness to God. The third commandment: "Thou shalt not take the name of the Lord in vain," corresponds to the eighth: "Thou shalt not steal," for stealing results in a false oath in God's name. The fourth: "Remember the Sabbath day, to keep it holy," corresponds to the ninth: "Thou shalt not bear false witness against thy neighbor," for he who bears false witness against his neighbor commits as grave a sin as if he had borne false witness against God, saying that He had not created the world in six days and rested on the seventh day (the holy Sabbath). The fifth commandment: "Honor thy father and thy mother," corresponds to the tenth: "Covet not thy neighbor's wife," for one who indulges this lust produces children who will not honor their true father, but will consider a stranger their father.</span><sup class="reference" data-dcnode-id="8536" id="cite_ref-65"><a data-dcnode-id="8537" href="#cite_note-65"><span data-dcnode-id="8538" instrument_node="">[65]</span></a></sup><span data-dcnode-id="8535" instrument_node="">
</span></p><p data-dcnode-id="8513"><span data-dcnode-id="8533" instrument_node="">The traditional Rabbinical Jewish belief is that the observance of these commandments and the other </span><i data-dcnode-id="8531"><span data-dcnode-id="8532" instrument_node="">mitzvot</span></i><span data-dcnode-id="8530" instrument_node=""> are required solely of the Jewish people and that the laws incumbent on humanity in general are outlined in the seven </span><a class="mw-redirect" data-dcnode-id="8528" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Noahide_laws" title="Noahide laws"><span data-dcnode-id="8529" instrument_node="">Noahide laws</span></a><span data-dcnode-id="8527" instrument_node="">, several of which overlap with the Ten Commandments. In the era of the </span><a data-dcnode-id="8525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sanhedrin" title="Sanhedrin"><span data-dcnode-id="8526" instrument_node="">Sanhedrin</span></a><span data-dcnode-id="8524" instrument_node=""> transgressing any one of six of the Ten Commandments theoretically carried the </span><a class="mw-redirect" data-dcnode-id="8522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Death_penalty" title="Death penalty"><span data-dcnode-id="8523" instrument_node="">death penalty</span></a><span data-dcnode-id="8521" instrument_node="">, the exceptions being the First Commandment, honouring your father and mother, saying God's name in vain, and coveting, though this was rarely enforced due to a large number of stringent evidentiary requirements imposed by the </span><a data-dcnode-id="8519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Oral_Torah" title="Oral Torah"><span data-dcnode-id="8520" instrument_node="">oral law</span></a><span data-dcnode-id="8518" instrument_node="">.</span><sup class="reference" data-dcnode-id="8515" id="cite_ref-66"><a data-dcnode-id="8516" href="#cite_note-66"><span data-dcnode-id="8517" instrument_node="">[66]</span></a></sup><span data-dcnode-id="8514" instrument_node="">
</span></p><span data-dcnode-id="8512" instrument_node="">
</span><h4 data-dcnode-id="8502"><span class="mw-headline" data-dcnode-id="8510" id="Two_tablets"><span data-dcnode-id="8511" instrument_node="">Two tablets</span></span><span class="mw-editsection" data-dcnode-id="8503"><span class="mw-editsection-bracket" data-dcnode-id="8508"><span data-dcnode-id="8509" instrument_node="">[</span></span><a data-dcnode-id="8506" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTen_Commandments%26action%3Dedit%26section%3D6" title="Edit section: Two tablets"><span data-dcnode-id="8507" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8504"><span data-dcnode-id="8505" instrument_node="">]</span></span></span></h4><span data-dcnode-id="8501" instrument_node="">
</span><link data-dcnode-id="8500" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="8496" role="note"><span data-dcnode-id="8499" instrument_node="">Main article: </span><a data-dcnode-id="8497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tablets_of_Stone" title="Tablets of Stone"><span data-dcnode-id="8498" instrument_node="">Tablets of Stone</span></a></div><span data-dcnode-id="8495" instrument_node="">
</span><p data-dcnode-id="8485"><span data-dcnode-id="8494" instrument_node="">The arrangement of the commandments on the two tablets is interpreted in different ways in the classical Jewish tradition. Rabbi Hanina ben Gamaliel says that each tablet contained five commandments, "but the Sages say ten on one tablet and ten on the other", that is, that the tablets were duplicates.</span><sup class="reference" data-dcnode-id="8491" id="cite_ref-67"><a data-dcnode-id="8492" href="#cite_note-67"><span data-dcnode-id="8493" instrument_node="">[67]</span></a></sup><span data-dcnode-id="8490" instrument_node=""> This can be compared to diplomatic treaties of the ancient Near East, in which a copy was made for each party.</span><sup class="reference" data-dcnode-id="8487" id="cite_ref-68"><a data-dcnode-id="8488" href="#cite_note-68"><span data-dcnode-id="8489" instrument_node="">[68]</span></a></sup><span data-dcnode-id="8486" instrument_node="">
</span></p><p data-dcnode-id="8469"><span data-dcnode-id="8484" instrument_node="">According to the </span><a data-dcnode-id="8482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Talmud" title="Talmud"><span data-dcnode-id="8483" instrument_node="">Talmud</span></a><span data-dcnode-id="8481" instrument_node="">, the compendium of traditional </span><a class="mw-redirect" data-dcnode-id="8479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rabbinic_Jewish" title="Rabbinic Jewish"><span data-dcnode-id="8480" instrument_node="">Rabbinic Jewish</span></a><span data-dcnode-id="8478" instrument_node=""> law, tradition, and interpretation, one interpretation of the biblical verse "the tablets were written on both their sides",</span><sup class="reference" data-dcnode-id="8475" id="cite_ref-69"><a data-dcnode-id="8476" href="#cite_note-69"><span data-dcnode-id="8477" instrument_node="">[69]</span></a></sup><span data-dcnode-id="8474" instrument_node=""> is that the carving went through the full thickness of the tablets, yet was miraculously legible from both sides.</span><sup class="reference" data-dcnode-id="8471" id="cite_ref-70"><a data-dcnode-id="8472" href="#cite_note-70"><span data-dcnode-id="8473" instrument_node="">[70]</span></a></sup><span data-dcnode-id="8470" instrument_node="">
</span></p><span data-dcnode-id="8468" instrument_node="">
</span><h4 data-dcnode-id="8458"><span class="mw-headline" data-dcnode-id="8466" id="Use_in_Jewish_ritual"><span data-dcnode-id="8467" instrument_node="">Use in Jewish ritual</span></span><span class="mw-editsection" data-dcnode-id="8459"><span class="mw-editsection-bracket" data-dcnode-id="8464"><span data-dcnode-id="8465" instrument_node="">[</span></span><a data-dcnode-id="8462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTen_Commandments%26action%3Dedit%26section%3D7" title="Edit section: Use in Jewish ritual"><span data-dcnode-id="8463" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8460"><span data-dcnode-id="8461" instrument_node="">]</span></span></span></h4><span data-dcnode-id="8457" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="8448"><div class="thumbinner" data-dcnode-id="8449" style="width:222px;"><a class="image" data-dcnode-id="8455" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A5493_-_Venezia_-_Ghetto_Nuovo_-_Negozio_ebraico_-_Foto_Giovanni_Dall%2527Orto%2C_1-Aug-2008.jpg"><img alt="" class="thumbimage" data-dcnode-id="8456" data-file-height="1221" data-file-width="1164" decoding="async" height="231" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/2/2c/5493_-_Venezia_-_Ghetto_Nuovo_-_Negozio_ebraico_-_Foto_Giovanni_Dall%2527Orto%252C_1-Aug-2008.jpg/220px-5493_-_Venezia_-_Ghetto_Nuovo_-_Negozio_ebraico_-_Foto_Giovanni_Dall%2527Orto%252C_1-Aug-2008.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/2/2c/5493_-_Venezia_-_Ghetto_Nuovo_-_Negozio_ebraico_-_Foto_Giovanni_Dall%27Orto%2C_1-Aug-2008.jpg/330px-5493_-_Venezia_-_Ghetto_Nuovo_-_Negozio_ebraico_-_Foto_Giovanni_Dall%27Orto%2C_1-Aug-2008.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/2/2c/5493_-_Venezia_-_Ghetto_Nuovo_-_Negozio_ebraico_-_Foto_Giovanni_Dall%27Orto%2C_1-Aug-2008.jpg/440px-5493_-_Venezia_-_Ghetto_Nuovo_-_Negozio_ebraico_-_Foto_Giovanni_Dall%27Orto%2C_1-Aug-2008.jpg 2x" width="220"></a><span data-dcnode-id="8454" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="8450"><div class="magnify" data-dcnode-id="8452"><a class="internal" data-dcnode-id="8453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A5493_-_Venezia_-_Ghetto_Nuovo_-_Negozio_ebraico_-_Foto_Giovanni_Dall%2527Orto%2C_1-Aug-2008.jpg" title="Enlarge"></a></div><span data-dcnode-id="8451" instrument_node="">The Ten Commandments on a glass plate</span></div></div></div><span data-dcnode-id="8447" instrument_node="">
</span><p data-dcnode-id="8415"><span data-dcnode-id="8446" instrument_node="">The </span><a class="mw-redirect" data-dcnode-id="8444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mishna" title="Mishna"><span data-dcnode-id="8445" instrument_node="">Mishna</span></a><span data-dcnode-id="8443" instrument_node=""> records that during the period of the </span><a data-dcnode-id="8441" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Second_Temple" title="Second Temple"><span data-dcnode-id="8442" instrument_node="">Second Temple</span></a><span data-dcnode-id="8440" instrument_node="">, the Ten Commandments were recited daily,</span><sup class="reference" data-dcnode-id="8437" id="cite_ref-Glustrom_71-0"><a data-dcnode-id="8438" href="#cite_note-Glustrom-71"><span data-dcnode-id="8439" instrument_node="">[71]</span></a></sup><span data-dcnode-id="8436" instrument_node=""> before the reading of the </span><a data-dcnode-id="8434" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shema_Yisrael" title="Shema Yisrael"><span data-dcnode-id="8435" instrument_node="">Shema Yisrael</span></a><span data-dcnode-id="8433" instrument_node=""> (as preserved, for example, in the </span><a data-dcnode-id="8431" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nash_Papyrus" title="Nash Papyrus"><span data-dcnode-id="8432" instrument_node="">Nash Papyrus</span></a><span data-dcnode-id="8430" instrument_node="">, a Hebrew manuscript fragment from 150 to 100 BC found in Egypt, containing a version of the ten commandments and the beginning of the Shema); but that this practice was abolished in the synagogues so as not to give ammunition to heretics who claimed that they were the only important part of Jewish law,</span><sup class="reference" data-dcnode-id="8427" id="cite_ref-72"><a data-dcnode-id="8428" href="#cite_note-72"><span data-dcnode-id="8429" instrument_node="">[72]</span></a></sup><sup class="reference" data-dcnode-id="8424" id="cite_ref-73"><a data-dcnode-id="8425" href="#cite_note-73"><span data-dcnode-id="8426" instrument_node="">[73]</span></a></sup><span data-dcnode-id="8423" instrument_node=""> or to dispel a claim by early Christians that </span><i data-dcnode-id="8421"><span data-dcnode-id="8422" instrument_node="">only</span></i><span data-dcnode-id="8420" instrument_node=""> the Ten Commandments were handed down at Mount Sinai rather than the whole Torah.</span><sup class="reference" data-dcnode-id="8417" id="cite_ref-Glustrom_71-1"><a data-dcnode-id="8418" href="#cite_note-Glustrom-71"><span data-dcnode-id="8419" instrument_node="">[71]</span></a></sup><span data-dcnode-id="8416" instrument_node="">
</span></p><p data-dcnode-id="8406"><span data-dcnode-id="8414" instrument_node="">In later centuries rabbis continued to omit the Ten Commandments from daily liturgy in order to prevent confusion among Jews that they are </span><i data-dcnode-id="8412"><span data-dcnode-id="8413" instrument_node="">only</span></i><span data-dcnode-id="8411" instrument_node=""> bound by the Ten Commandments, and not also by many other biblical and Talmudic laws, such as the requirement to observe holy days other than the sabbath.</span><sup class="reference" data-dcnode-id="8408" id="cite_ref-Glustrom_71-2"><a data-dcnode-id="8409" href="#cite_note-Glustrom-71"><span data-dcnode-id="8410" instrument_node="">[71]</span></a></sup><span data-dcnode-id="8407" instrument_node="">
</span></p><p data-dcnode-id="8371"><span data-dcnode-id="8405" instrument_node="">Today, the Ten Commandments are heard in the synagogue three times a year: as they come up during the readings of Exodus and Deuteronomy, and during the festival of </span><a data-dcnode-id="8403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shavuot" title="Shavuot"><span data-dcnode-id="8404" instrument_node="">Shavuot</span></a><span data-dcnode-id="8402" instrument_node="">.</span><sup class="reference" data-dcnode-id="8399" id="cite_ref-Glustrom_71-3"><a data-dcnode-id="8400" href="#cite_note-Glustrom-71"><span data-dcnode-id="8401" instrument_node="">[71]</span></a></sup><span data-dcnode-id="8398" instrument_node=""> The Exodus version is read in </span><i data-dcnode-id="8392"><a class="mw-redirect" data-dcnode-id="8396" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Parasha" title="Parasha"><span data-dcnode-id="8397" instrument_node="">parashat</span></a><span data-dcnode-id="8395" instrument_node=""> </span><a data-dcnode-id="8393" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yitro" title="Yitro"><span data-dcnode-id="8394" instrument_node="">Yitro</span></a></i><span data-dcnode-id="8391" instrument_node=""> around late January–February, and on the festival of Shavuot, and the Deuteronomy version in </span><i data-dcnode-id="8387"><span data-dcnode-id="8390" instrument_node="">parashat </span><a data-dcnode-id="8388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Va%2527etchanan" title="Va'etchanan"><span data-dcnode-id="8389" instrument_node="">Va'etchanan</span></a></i><span data-dcnode-id="8386" instrument_node=""> in August–September. In some traditions, worshipers rise for the reading of the Ten Commandments to highlight their special significance</span><sup class="reference" data-dcnode-id="8383" id="cite_ref-Glustrom_71-4"><a data-dcnode-id="8384" href="#cite_note-Glustrom-71"><span data-dcnode-id="8385" instrument_node="">[71]</span></a></sup><span data-dcnode-id="8382" instrument_node=""> though many rabbis, including </span><a data-dcnode-id="8380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Maimonides" title="Maimonides"><span data-dcnode-id="8381" instrument_node="">Maimonides</span></a><span data-dcnode-id="8379" instrument_node="">, have opposed this custom since one may come to think that the Ten Commandments are more important than the rest of the </span><a class="mw-redirect" data-dcnode-id="8377" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mitzvot" title="Mitzvot"><span data-dcnode-id="8378" instrument_node="">Mitzvot</span></a><span data-dcnode-id="8376" instrument_node="">.</span><sup class="reference" data-dcnode-id="8373" id="cite_ref-74"><a data-dcnode-id="8374" href="#cite_note-74"><span data-dcnode-id="8375" instrument_node="">[74]</span></a></sup><span data-dcnode-id="8372" instrument_node="">
