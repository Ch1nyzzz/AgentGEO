</span></p><p data-dcnode-id="6437"><span data-dcnode-id="6466" instrument_node="">By the beginning of the twenty-first century in the U.S., however, Decalogue monuments and plaques in government spaces had become a legal battleground between religious as well as political liberals and conservatives. Organizations such as the </span><a data-dcnode-id="6464" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/American_Civil_Liberties_Union" title="American Civil Liberties Union"><span data-dcnode-id="6465" instrument_node="">American Civil Liberties Union</span></a><span data-dcnode-id="6463" instrument_node=""> (ACLU) and </span><a data-dcnode-id="6461" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Americans_United_for_Separation_of_Church_and_State" title="Americans United for Separation of Church and State"><span data-dcnode-id="6462" instrument_node="">Americans United for Separation of Church and State</span></a><span data-dcnode-id="6460" instrument_node=""> launched lawsuits challenging the posting of the ten commandments in public buildings. The ACLU has been supported by a number of religious groups (such as the </span><a class="mw-redirect" data-dcnode-id="6458" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Presbyterian_Church_%28U.S.A.%29" title="Presbyterian Church (U.S.A.)"><span data-dcnode-id="6459" instrument_node="">Presbyterian Church (U.S.A.)</span></a><span data-dcnode-id="6457" instrument_node="">,</span><sup class="reference" data-dcnode-id="6454" id="cite_ref-172"><a data-dcnode-id="6455" href="#cite_note-172"><span data-dcnode-id="6456" instrument_node="">[172]</span></a></sup><span data-dcnode-id="6453" instrument_node=""> and the </span><a data-dcnode-id="6451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/American_Jewish_Congress" title="American Jewish Congress"><span data-dcnode-id="6452" instrument_node="">American Jewish Congress</span></a><sup class="reference" data-dcnode-id="6448" id="cite_ref-173"><a data-dcnode-id="6449" href="#cite_note-173"><span data-dcnode-id="6450" instrument_node="">[173]</span></a></sup><span data-dcnode-id="6447" instrument_node="">), both because they do not want government to be issuing religious doctrine and because they feel strongly that the commandments are inherently religious. Many commentators see this issue as part of a wider </span><a data-dcnode-id="6445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Culture_war" title="Culture war"><span data-dcnode-id="6446" instrument_node="">culture war</span></a><span data-dcnode-id="6444" instrument_node=""> between liberal and conservative elements in American society. In response to the perceived attacks on traditional society, other legal organizations, such as the </span><a data-dcnode-id="6442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Liberty_Counsel" title="Liberty Counsel"><span data-dcnode-id="6443" instrument_node="">Liberty Counsel</span></a><span data-dcnode-id="6441" instrument_node="">, have risen to advocate the conservative interpretation. Many Christian conservatives have taken the banning of officially sanctioned prayer from public schools by the </span><a class="mw-redirect" data-dcnode-id="6439" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/U.S._Supreme_Court" title="U.S. Supreme Court"><span data-dcnode-id="6440" instrument_node="">U.S. Supreme Court</span></a><span data-dcnode-id="6438" instrument_node=""> as a threat to the expression of religion in public life. In response, they have successfully lobbied many state and local governments to display the ten commandments in public buildings.
</span></p><p data-dcnode-id="6429"><span data-dcnode-id="6436" instrument_node="">Those who oppose the posting of the ten commandments on public property argue that it violates the </span><a class="mw-redirect" data-dcnode-id="6434" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Establishment_Clause_of_the_First_Amendment" title="Establishment Clause of the First Amendment"><span data-dcnode-id="6435" instrument_node="">establishment clause</span></a><span data-dcnode-id="6433" instrument_node=""> of the </span><a data-dcnode-id="6431" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/First_Amendment_to_the_United_States_Constitution" title="First Amendment to the United States Constitution"><span data-dcnode-id="6432" instrument_node="">First Amendment to the Constitution of the United States</span></a><span data-dcnode-id="6430" instrument_node="">. In contrast, groups like the Fraternal Order of Eagles who support the public display of the ten commandments claim that the commandments are not necessarily religious but represent the moral and legal foundation of society, and are appropriate to be displayed as a historical source of present-day legal codes.
</span></p><span data-dcnode-id="6428" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="6411"><div class="thumbinner" data-dcnode-id="6412" style="width:222px;"><a class="image" data-dcnode-id="6426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A1_Gebot_%28Lucas_Cranach_d_A%29.jpg"><img alt="" class="thumbimage" data-dcnode-id="6427" data-file-height="625" data-file-width="540" decoding="async" height="255" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/a/a4/1_Gebot_%2528Lucas_Cranach_d_A%2529.jpg/220px-1_Gebot_%2528Lucas_Cranach_d_A%2529.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/a/a4/1_Gebot_%28Lucas_Cranach_d_A%29.jpg/330px-1_Gebot_%28Lucas_Cranach_d_A%29.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/a/a4/1_Gebot_%28Lucas_Cranach_d_A%29.jpg/440px-1_Gebot_%28Lucas_Cranach_d_A%29.jpg 2x" width="220"></a><span data-dcnode-id="6425" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6413"><div class="magnify" data-dcnode-id="6423"><a class="internal" data-dcnode-id="6424" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A1_Gebot_%28Lucas_Cranach_d_A%29.jpg" title="Enlarge"></a></div><i data-dcnode-id="6421"><span data-dcnode-id="6422" instrument_node="">The Ten Commandments</span></i><span data-dcnode-id="6420" instrument_node=""> by </span><a data-dcnode-id="6418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lucas_Cranach_the_Elder" title="Lucas Cranach the Elder"><span data-dcnode-id="6419" instrument_node="">Lucas Cranach the Elder</span></a><span data-dcnode-id="6417" instrument_node=""> in the townhall of </span><a data-dcnode-id="6415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wittenberg" title="Wittenberg"><span data-dcnode-id="6416" instrument_node="">Wittenberg</span></a><span data-dcnode-id="6414" instrument_node=""> (detail)</span></div></div></div><span data-dcnode-id="6410" instrument_node="">
</span><p data-dcnode-id="6399"><span data-dcnode-id="6409" instrument_node="">U.S. courts have often ruled against displays of the Ten Commandments on government property. They conclude that the ten commandments are derived from </span><a data-dcnode-id="6407" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Judeo-Christian" title="Judeo-Christian"><span data-dcnode-id="6408" instrument_node="">Judeo-Christian</span></a><span data-dcnode-id="6406" instrument_node=""> religions, to the exclusion of others: the statement "Thou shalt have no other gods before me" excludes non-monotheistic religions like </span><a data-dcnode-id="6404" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hinduism" title="Hinduism"><span data-dcnode-id="6405" instrument_node="">Hinduism</span></a><span data-dcnode-id="6403" instrument_node="">, for example. Whether the Constitution prohibits the posting of the commandments or not, there are additional political and civil rights issues regarding the posting of what is construed as religious doctrine. Excluding religions that have not accepted the ten commandments creates the </span><a data-dcnode-id="6401" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Appearance_of_impropriety" title="Appearance of impropriety"><span data-dcnode-id="6402" instrument_node="">appearance of impropriety</span></a><span data-dcnode-id="6400" instrument_node="">. The courts have been more accepting, however, of displays that place the Ten Commandments in a broader historical context of the development of law.
</span></p><p data-dcnode-id="6370"><span data-dcnode-id="6398" instrument_node="">One result of these legal cases has been that proponents of displaying the Ten Commandments have sometimes surrounded them with other historical texts to portray them as historical, rather than religious. Another result has been that other religious organizations have tried to put monuments to their laws on public lands. For example, an organization called </span><a data-dcnode-id="6396" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Summum" title="Summum"><span data-dcnode-id="6397" instrument_node="">Summum</span></a><span data-dcnode-id="6395" instrument_node=""> has won court cases against municipalities in </span><a data-dcnode-id="6393" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Utah" title="Utah"><span data-dcnode-id="6394" instrument_node="">Utah</span></a><span data-dcnode-id="6392" instrument_node=""> for refusing to allow the group to erect a monument of Summum </span><a class="mw-redirect" data-dcnode-id="6390" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aphorisms" title="Aphorisms"><span data-dcnode-id="6391" instrument_node="">aphorisms</span></a><span data-dcnode-id="6389" instrument_node=""> next to the Ten Commandments. The Summum aphorisms are officially known as the "Seven Aphorisms".</span><sup class="reference" data-dcnode-id="6386" id="cite_ref-174"><a data-dcnode-id="6387" href="#cite_note-174"><span data-dcnode-id="6388" instrument_node="">[174]</span></a></sup><span data-dcnode-id="6385" instrument_node=""> Summum believes that when Moses came down from Mount Sinai the first time, he had the "Seven Aphorisms" on the Tablets of Stone but the undeveloped condition of the Israelites prevented them from understanding the Aphorisms and when Moses came down the second time, he brought down the Ten Commandments instead which were much easier for the Israelites to understand. Moses then shared the "Seven Aphorisms" with the few that could understand it which was then revealed by Summum.</span><sup class="reference" data-dcnode-id="6382" id="cite_ref-175"><a data-dcnode-id="6383" href="#cite_note-175"><span data-dcnode-id="6384" instrument_node="">[175]</span></a></sup><span data-dcnode-id="6381" instrument_node=""> The cases were won on the grounds that Summum's right to </span><a data-dcnode-id="6379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Freedom_of_speech" title="Freedom of speech"><span data-dcnode-id="6380" instrument_node="">freedom of speech</span></a><span data-dcnode-id="6378" instrument_node=""> was denied and the governments had engaged in </span><a data-dcnode-id="6376" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Discrimination" title="Discrimination"><span data-dcnode-id="6377" instrument_node="">discrimination</span></a><span data-dcnode-id="6375" instrument_node="">. Instead of allowing Summum to erect its monument, the local governments chose to remove their Ten Commandments.</span><sup class="reference" data-dcnode-id="6372" id="cite_ref-176"><a data-dcnode-id="6373" href="#cite_note-176"><span data-dcnode-id="6374" instrument_node="">[176]</span></a></sup><span data-dcnode-id="6371" instrument_node="">
</span></p><span data-dcnode-id="6369" instrument_node="">
</span><h2 data-dcnode-id="6359"><span class="mw-headline" data-dcnode-id="6367" id="Cultural_references"><span data-dcnode-id="6368" instrument_node="">Cultural references</span></span><span class="mw-editsection" data-dcnode-id="6360"><span class="mw-editsection-bracket" data-dcnode-id="6365"><span data-dcnode-id="6366" instrument_node="">[</span></span><a data-dcnode-id="6363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTen_Commandments%26action%3Dedit%26section%3D36" title="Edit section: Cultural references"><span data-dcnode-id="6364" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6361"><span data-dcnode-id="6362" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6358" instrument_node="">
</span><p data-dcnode-id="6338"><span data-dcnode-id="6357" instrument_node="">Two famous films with this name were directed by </span><a data-dcnode-id="6355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cecil_B._DeMille" title="Cecil B. DeMille"><span data-dcnode-id="6356" instrument_node="">Cecil B. DeMille</span></a><span data-dcnode-id="6354" instrument_node="">: a </span><a data-dcnode-id="6352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Ten_Commandments_%281923_film%29" title="The Ten Commandments (1923 film)"><span data-dcnode-id="6353" instrument_node="">1923 silent film</span></a><span data-dcnode-id="6351" instrument_node=""> which stars </span><a data-dcnode-id="6349" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Theodore_Roberts" title="Theodore Roberts"><span data-dcnode-id="6350" instrument_node="">Theodore Roberts</span></a><span data-dcnode-id="6348" instrument_node=""> as Moses, and a </span><a data-dcnode-id="6346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Ten_Commandments_%281956_film%29" title="The Ten Commandments (1956 film)"><span data-dcnode-id="6347" instrument_node="">1956 version</span></a><span data-dcnode-id="6345" instrument_node=""> filmed in </span><a data-dcnode-id="6343" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/VistaVision" title="VistaVision"><span data-dcnode-id="6344" instrument_node="">VistaVision</span></a><span data-dcnode-id="6342" instrument_node=""> starring </span><a data-dcnode-id="6340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Charlton_Heston" title="Charlton Heston"><span data-dcnode-id="6341" instrument_node="">Charlton Heston</span></a><span data-dcnode-id="6339" instrument_node=""> as Moses.
</span></p><p data-dcnode-id="6321"><span data-dcnode-id="6337" instrument_node="">Both </span><i data-dcnode-id="6334"><a data-dcnode-id="6335" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dekalog" title="Dekalog"><span data-dcnode-id="6336" instrument_node="">Dekalog</span></a></i><span data-dcnode-id="6333" instrument_node="">, a 1989 Polish film series directed by </span><a data-dcnode-id="6331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Krzysztof_Kie%25C5%259Blowski" title="Krzysztof Kieślowski"><span data-dcnode-id="6332" instrument_node="">Krzysztof Kieślowski</span></a><span data-dcnode-id="6330" instrument_node="">, and </span><i data-dcnode-id="6327"><a data-dcnode-id="6328" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Ten" title="The Ten"><span data-dcnode-id="6329" instrument_node="">The Ten</span></a></i><span data-dcnode-id="6326" instrument_node="">, a 2007 American film, use the ten commandments as a structure for 10 smaller stories.</span><sup class="reference" data-dcnode-id="6323" id="cite_ref-177"><a data-dcnode-id="6324" href="#cite_note-177"><span data-dcnode-id="6325" instrument_node="">[177]</span></a></sup><span data-dcnode-id="6322" instrument_node="">
</span></p><p data-dcnode-id="6302"><span data-dcnode-id="6320" instrument_node="">The receipt of the Ten Commandments by Moses was satirized in </span><a data-dcnode-id="6318" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mel_Brooks" title="Mel Brooks"><span data-dcnode-id="6319" instrument_node="">Mel Brooks</span></a><span data-dcnode-id="6317" instrument_node="">'s 1981 movie </span><i data-dcnode-id="6314"><a class="mw-redirect" data-dcnode-id="6315" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/History_of_the_World_Part_I" title="History of the World Part I"><span data-dcnode-id="6316" instrument_node="">History of the World Part I</span></a></i><span data-dcnode-id="6313" instrument_node="">, which shows Moses (played by Brooks, in a similar costume to </span><a data-dcnode-id="6311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Charlton_Heston" title="Charlton Heston"><span data-dcnode-id="6312" instrument_node="">Charlton Heston</span></a><span data-dcnode-id="6310" instrument_node="">'s Moses in the </span><a data-dcnode-id="6308" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Ten_Commandments_%281956_film%29" title="The Ten Commandments (1956 film)"><span data-dcnode-id="6309" instrument_node="">1956 film</span></a><span data-dcnode-id="6307" instrument_node="">), receiving three tablets containing fifteen commandments, but before he can present them to his people, he stumbles and drops one of the tablets, shattering it. He then presents the remaining tablets, proclaiming Ten Commandments.</span><sup class="reference" data-dcnode-id="6304" id="cite_ref-178"><a data-dcnode-id="6305" href="#cite_note-178"><span data-dcnode-id="6306" instrument_node="">[178]</span></a></sup><span data-dcnode-id="6303" instrument_node="">
</span></p><span data-dcnode-id="6301" instrument_node="">

fo%3Asid%2Fen.wikipedia.org%3ATen+Commandments"></span></span><span data-dcnode-id="6065" instrument_node="">

</span><li data-dcnode-id="6007" id="cite_note-5"><span class="mw-cite-backlink" data-dcnode-id="6059"><b data-dcnode-id="6060"><a aria-label="Jump up" data-dcnode-id="6061" href="#cite_ref-5" title="Jump up"><span data-dcnode-id="6062" instrument_node="">^</span></a></b></span><span data-dcnode-id="6058" instrument_node=""> </span><span class="reference-text" data-dcnode-id="6009"><link data-dcnode-id="6057" href="mw-data:TemplateStyles:r1067248974" rel="mw-deduplicated-inline-style"><cite class="citation book cs1" data-dcnode-id="6011" id="CITEREFRooker2010"><span data-dcnode-id="6056" instrument_node="">Rooker, Mark (2010). </span><a class="external text" data-dcnode-id="6053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//books.google.com/books%3Fid%3D1WUzUAdWRVUC%26pg%3DPA3" rel="nofollow"><i data-dcnode-id="6054"><span data-dcnode-id="6055" instrument_node="">The Ten Commandments: Ethics for the Twenty-First Century</span></i></a><span data-dcnode-id="6052" instrument_node="">. Nashville, Tennessee: B&amp;H Publishing Group. p.&nbsp;3. </span><a class="mw-redirect" data-dcnode-id="6050" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/ISBN_%28identifier%29" title="ISBN (identifier)"><span data-dcnode-id="6051" instrument_node="">ISBN</span></a><span data-dcnode-id="6049" instrument_node="">&nbsp;</span><a data-dcnode-id="6046" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Special%3ABookSources/978-0-8054-4716-3" title="Special:BookSources/978-0-8054-4716-3"><bdi data-dcnode-id="6047"><span data-dcnode-id="6048" instrument_node="">978-0-8054-4716-3</span></bdi></a><span class="reference-accessdate" data-dcnode-id="6041"><span data-dcnode-id="6045" instrument_node="">. Retrieved </span><span class="nowrap" data-dcnode-id="6043"><span data-dcnode-id="6044" instrument_node="">2 October</span></span><span data-dcnode-id="6042" instrument_node=""> 2011</span></span><span data-dcnode-id="6040" instrument_node="">. </span><q data-dcnode-id="6012"><span data-dcnode-id="6039" instrument_node="">The Ten Commandments are literally the 'Ten Words' (</span><i data-dcnode-id="6037"><span data-dcnode-id="6038" instrument_node="">ăśeret hadděbārîm</span></i><span data-dcnode-id="6036" instrument_node="">) in Hebrew. In </span><a class="mw-redirect" data-dcnode-id="6034" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mishnaic_Hebrew_language" title="Mishnaic Hebrew language"><span data-dcnode-id="6035" instrument_node="">Mishnaic Hebrew</span></a><span data-dcnode-id="6033" instrument_node="">, they are called </span><link data-dcnode-id="6032" href="mw-data:TemplateStyles:r1020748213" rel="mw-deduplicated-inline-style"><span class="script-hebrew" data-dcnode-id="6030" dir="rtl" style="font-size: 115%;"><span data-dcnode-id="6031" instrument_node="">עשרת הדברות</span></span><span data-dcnode-id="6029" instrument_node="">‎ (transliterated </span><span data-dcnode-id="6026" title="Hebrew-language text"><i data-dcnode-id="6027" lang="he-Latn"><span data-dcnode-id="6028" instrument_node="">aseret ha-dibrot</span></i></span><span data-dcnode-id="6025" instrument_node="">). The use of the term </span><i data-dcnode-id="6023"><span data-dcnode-id="6024" instrument_node="">dābār</span></i><span data-dcnode-id="6022" instrument_node="">, 'word,' in this phrase distinguishes these laws from the rest of the commandments (</span><i data-dcnode-id="6020"><span data-dcnode-id="6021" instrument_node="">mişwâ</span></i><span data-dcnode-id="6019" instrument_node="">), statutes (</span><i data-dcnode-id="6017"><span data-dcnode-id="6018" instrument_node="">hōq</span></i><span data-dcnode-id="6016" instrument_node="">), and regulations (</span><i data-dcnode-id="6014"><span data-dcnode-id="6015" instrument_node="">mišpāţ</span></i><span data-dcnode-id="6013" instrument_node="">) in the Old Testament.</span></q></cite><span class="Z3988" data-dcnode-id="6010" title="ctx_ver=Z39.88-2004&amp;rft_val_fmt=info%3Aofi%2Ffmt%3Akev%3Amtx%3Abook&amp;rft.genre=book&amp;rft.btitle=The+Ten+Commandments%3A+Ethics+for+the+Twenty-First+Century&amp;rft.place=Nashville%2C+Tennessee&amp;rft.pages=3&amp;rft.pub=B%26H+Publishing+Group&amp;rft.date=2010&amp;rft.isbn=978-0-8054-4716-3&amp;rft.aulast=Rooker&amp;rft.aufirst=Mark&amp;rft_id=https%3A%2F%2Fbooks.google.com%2Fbooks%3Fid%3D1WUzUAdWRVUC%26pg%3DPA3&amp;rfr_id=info%3Asid%2Fen.wikipedia.org%3ATen+Commandments"></span></span><span data-dcnode-id="6008" instrument_node="">

.org/wiki/ISBN_%28identifier%29" title="ISBN (identifier)"><span data-dcnode-id="5960" instrument_node="">ISBN</span></a><span data-dcnode-id="5958" instrument_node="">&nbsp;</span><a data-dcnode-id="5955" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Special%3ABookSources/978-1-4335-3087-6" title="Special:BookSources/978-1-4335-3087-6"><bdi data-dcnode-id="5956"><span data-dcnode-id="5957" instrument_node="">978-1-4335-3087-6</span></bdi></a><span data-dcnode-id="5954" instrument_node="">, </span><a class="external text" data-dcnode-id="5952" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//web.archive.org/web/20130612030255/http%3A//books.google.com/books%3Fid%3Dco2PZwEACAAJ" rel="nofollow"><span data-dcnode-id="5953" instrument_node="">archived</span></a><span data-dcnode-id="5951" instrument_node=""> from the original on 12 June 2013</span><span class="reference-accessdate" data-dcnode-id="5946"><span data-dcnode-id="5950" instrument_node="">, retrieved </span><span class="nowrap" data-dcnode-id="5948"><span data-dcnode-id="5949" instrument_node="">19 November</span></span><span data-dcnode-id="5947" instrument_node=""> 2012</span></span></cite><span class="Z3988" data-dcnode-id="5944" title="ctx_ver=Z39.88-2004&amp;rft_val_fmt=info%3Aofi%2Ffmt%3Akev%3Amtx%3Abook&amp;rft.genre=bookitem&amp;rft.atitle=Preface&amp;rft.btitle=Holy+Bible%3A+English+Standard+Version&amp;rft.place=Wheaton&amp;rft.pages=IX&amp;rft.pub=Crossway&amp;rft.date=2011-12-28&amp;rft.isbn=978-1-4335-3087-6&amp;rft.au=Crossway+Bibles&amp;rft_id=https%3A%2F%2Fbooks.google.com%2Fbooks%3Fid%3Dco2PZwEACAAJ&amp;rfr_id=info%3Asid%2Fen.wikipedia.org%3ATen+Commandments"></span></span><span data-dcnode-id="5942" instrument_node="">
