</span><p data-dcnode-id="7228"><span data-dcnode-id="7260" instrument_node="">The Abrahamic religions observe the Sabbath in various ways. In Judaism it is observed on Saturday (reckoned from dusk to dusk). In </span><a data-dcnode-id="7258" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sabbath_in_Christianity" title="Sabbath in Christianity"><span data-dcnode-id="7259" instrument_node="">Christianity</span></a><span data-dcnode-id="7257" instrument_node="">, it is sometimes </span><a data-dcnode-id="7255" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sabbath_in_seventh-day_churches" title="Sabbath in seventh-day churches"><span data-dcnode-id="7256" instrument_node="">observed on Saturday</span></a><span data-dcnode-id="7254" instrument_node="">, sometimes on Sunday, and sometimes not at all (</span><a class="mw-redirect" data-dcnode-id="7252" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Non-Sabbatarianism" title="Non-Sabbatarianism"><span data-dcnode-id="7253" instrument_node="">non-Sabbatarianism</span></a><span data-dcnode-id="7251" instrument_node="">). Observing the Sabbath on Sunday, the day of resurrection, gradually became the dominant Christian practice from the </span><a class="mw-redirect" data-dcnode-id="7249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jewish-Roman_wars" title="Jewish-Roman wars"><span data-dcnode-id="7250" instrument_node="">Jewish-Roman wars</span></a><span data-dcnode-id="7248" instrument_node=""> onward.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="7241" style="white-space:nowrap;"><span data-dcnode-id="7247" instrument_node="">[</span><i data-dcnode-id="7243"><a data-dcnode-id="7244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="7245" title="This claim needs references to reliable sources. (March 2016)"><span data-dcnode-id="7246" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="7242" instrument_node="">]</span></sup><span data-dcnode-id="7240" instrument_node=""> The Church's general repudiation of Jewish practices during this period is apparent in the </span><a data-dcnode-id="7238" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Council_of_Laodicea" title="Council of Laodicea"><span data-dcnode-id="7239" instrument_node="">Council of Laodicea</span></a><span data-dcnode-id="7237" instrument_node=""> (4th century AD) where Canons 37–38 state: "It is not lawful to receive portions sent from the feasts of Jews or heretics, nor to feast together with them" and "It is not lawful to receive unleavened bread from the Jews, nor to be partakers of their impiety".</span><sup class="reference" data-dcnode-id="7234" id="cite_ref-newadvent.org_122-0"><a data-dcnode-id="7235" href="#cite_note-newadvent.org-122"><span data-dcnode-id="7236" instrument_node="">[122]</span></a></sup><span data-dcnode-id="7233" instrument_node=""> Canon 29 of the Laodicean council specifically refers to the sabbath: "Christians must not judaize by resting on the [Jewish] Sabbath, but must work on that day, rather honouring the Lord's Day; and, if they can, resting then as Christians. But if any shall be found to be judaizers, let them be anathema from Christ."</span><sup class="reference" data-dcnode-id="7230" id="cite_ref-newadvent.org_122-1"><a data-dcnode-id="7231" href="#cite_note-newadvent.org-122"><span data-dcnode-id="7232" instrument_node="">[122]</span></a></sup><span data-dcnode-id="7229" instrument_node="">
</span></p><span data-dcnode-id="7227" instrument_node="">
</span><h4 data-dcnode-id="7217"><span class="mw-headline" data-dcnode-id="7225" id="Killing_or_murder"><span data-dcnode-id="7226" instrument_node="">Killing or murder</span></span><span class="mw-editsection" data-dcnode-id="7218"><span class="mw-editsection-bracket" data-dcnode-id="7223"><span data-dcnode-id="7224" instrument_node="">[</span></span><a data-dcnode-id="7221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTen_Commandments%26action%3Dedit%26section%3D25" title="Edit section: Killing or murder"><span data-dcnode-id="7222" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7219"><span data-dcnode-id="7220" instrument_node="">]</span></span></span></h4><span data-dcnode-id="7216" instrument_node="">
</span><link data-dcnode-id="7215" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7211" role="note"><span data-dcnode-id="7214" instrument_node="">Main article: </span><a data-dcnode-id="7212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Thou_shalt_not_kill" title="Thou shalt not kill"><span data-dcnode-id="7213" instrument_node="">Thou shalt not kill</span></a></div><span data-dcnode-id="7210" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="7192"><div class="thumbinner" data-dcnode-id="7193" style="width:222px;"><a class="image" data-dcnode-id="7208" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASixth_Commandment_%28Temple_Church%2C_London%29.jpg"><img alt="" class="thumbimage" data-dcnode-id="7209" data-file-height="213" data-file-width="827" decoding="async" height="57" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/a/a3/Sixth_Commandment_%2528Temple_Church%252C_London%2529.jpg/220px-Sixth_Commandment_%2528Temple_Church%252C_London%2529.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/a/a3/Sixth_Commandment_%28Temple_Church%2C_London%29.jpg/330px-Sixth_Commandment_%28Temple_Church%2C_London%29.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/a/a3/Sixth_Commandment_%28Temple_Church%2C_London%29.jpg/440px-Sixth_Commandment_%28Temple_Church%2C_London%29.jpg 2x" width="220"></a><span data-dcnode-id="7207" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7194"><div class="magnify" data-dcnode-id="7205"><a class="internal" data-dcnode-id="7206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASixth_Commandment_%28Temple_Church%2C_London%29.jpg" title="Enlarge"></a></div><span data-dcnode-id="7204" instrument_node="">The Sixth Commandment, as translated by the </span><i data-dcnode-id="7201"><a data-dcnode-id="7202" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Book_of_Common_Prayer" title="Book of Common Prayer"><span data-dcnode-id="7203" instrument_node="">Book of Common Prayer</span></a></i><span data-dcnode-id="7200" instrument_node=""> (1549).</span><br data-dcnode-id="7199"><span data-dcnode-id="7198" instrument_node="">The image is from the altar screen of the </span><a data-dcnode-id="7196" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Temple_Church" title="Temple Church"><span data-dcnode-id="7197" instrument_node="">Temple Church</span></a><span data-dcnode-id="7195" instrument_node=""> near the Law Courts in London.</span></div></div></div><span data-dcnode-id="7191" instrument_node="">
</span><p data-dcnode-id="7178"><span data-dcnode-id="7190" instrument_node="">Multiple translations exist of the fifth/sixth commandment; the Hebrew words </span><link data-dcnode-id="7189" href="mw-data:TemplateStyles:r1020748213" rel="mw-deduplicated-inline-style"><span class="script-hebrew" data-dcnode-id="7187" dir="rtl" style="font-size: 115%;"><span data-dcnode-id="7188" instrument_node="">לא תרצח</span></span><span data-dcnode-id="7186" instrument_node="">‎ (</span><i data-dcnode-id="7184"><span data-dcnode-id="7185" instrument_node="">lo tirtzach</span></i><span data-dcnode-id="7183" instrument_node="">) are variously translated as "thou shalt not kill" or "thou shalt not murder".</span><sup class="reference" data-dcnode-id="7180" id="cite_ref-123"><a data-dcnode-id="7181" href="#cite_note-123"><span data-dcnode-id="7182" instrument_node="">[123]</span></a></sup><span data-dcnode-id="7179" instrument_node="">
</span></p><p data-dcnode-id="7143"><span data-dcnode-id="7177" instrument_node="">The imperative is against unlawful killing resulting in </span><a class="mw-redirect" data-dcnode-id="7175" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bloodguilt_in_the_Hebrew_Bible" title="Bloodguilt in the Hebrew Bible"><span data-dcnode-id="7176" instrument_node="">bloodguilt</span></a><span data-dcnode-id="7174" instrument_node="">.</span><sup class="reference" data-dcnode-id="7171" id="cite_ref-124"><a data-dcnode-id="7172" href="#cite_note-124"><span data-dcnode-id="7173" instrument_node="">[124]</span></a></sup><span data-dcnode-id="7170" instrument_node=""> The Hebrew Bible contains numerous prohibitions against unlawful killing, but does not prohibit killing in the context of </span><a class="mw-redirect" data-dcnode-id="7168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Warfare" title="Warfare"><span data-dcnode-id="7169" instrument_node="">warfare</span></a><span data-dcnode-id="7167" instrument_node=""> (</span><a class="external text" data-dcnode-id="7165" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bible.oremus.org/%3Fpassage%3D1%2520Kings%25202%3A5%25E2%2580%25936%26version%3Dnrsv" rel="nofollow"><span data-dcnode-id="7166" instrument_node="">1Kings 2:5–6</span></a><span data-dcnode-id="7164" instrument_node="">), </span><a data-dcnode-id="7162" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Capital_punishment" title="Capital punishment"><span data-dcnode-id="7163" instrument_node="">capital punishment</span></a><span data-dcnode-id="7161" instrument_node=""> (</span><a class="external text" data-dcnode-id="7159" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bible.oremus.org/%3Fpassage%3DLeviticus%252020%3A9%25E2%2580%259316%26version%3Dnrsv" rel="nofollow"><span data-dcnode-id="7160" instrument_node="">Leviticus 20:9–16</span></a><span data-dcnode-id="7158" instrument_node="">) or a </span><a data-dcnode-id="7156" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Thou_shalt_not_kill%23Justified_killing%3A_intruder_in_the_home_at_night" title="Thou shalt not kill"><span data-dcnode-id="7157" instrument_node="">home invasion during the night</span></a><span data-dcnode-id="7155" instrument_node=""> (</span><a class="external text" data-dcnode-id="7153" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bible.oremus.org/%3Fpassage%3DExodus%252022%3A2%25E2%2580%25933%26version%3Dnrsv" rel="nofollow"><span data-dcnode-id="7154" instrument_node="">Exodus 22:2–3</span></a><span data-dcnode-id="7152" instrument_node="">), which are considered justified. The New Testament is in agreement that murder is a grave moral evil,</span><sup class="reference" data-dcnode-id="7149" id="cite_ref-125"><a data-dcnode-id="7150" href="#cite_note-125"><span data-dcnode-id="7151" instrument_node="">[125]</span></a></sup><span data-dcnode-id="7148" instrument_node=""> and references the Old Testament view of bloodguilt.</span><sup class="reference" data-dcnode-id="7145" id="cite_ref-126"><a data-dcnode-id="7146" href="#cite_note-126"><span data-dcnode-id="7147" instrument_node="">[126]</span></a></sup><span data-dcnode-id="7144" instrument_node="">
</span></p><span data-dcnode-id="7142" instrument_node="">
</span><h4 data-dcnode-id="7132"><span class="mw-headline" data-dcnode-id="7140" id="Theft"><span data-dcnode-id="7141" instrument_node="">Theft</span></span><span class="mw-editsection" data-dcnode-id="7133"><span class="mw-editsection-bracket" data-dcnode-id="7138"><span data-dcnode-id="7139" instrument_node="">[</span></span><a data-dcnode-id="7136" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTen_Commandments%26action%3Dedit%26section%3D26" title="Edit section: Theft"><span data-dcnode-id="7137" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7134"><span data-dcnode-id="7135" instrument_node="">]</span></span></span></h4><span data-dcnode-id="7131" instrument_node="">
</span><link data-dcnode-id="7130" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7126" role="note"><span data-dcnode-id="7129" instrument_node="">Main article: </span><a data-dcnode-id="7127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Thou_shalt_not_steal" title="Thou shalt not steal"><span data-dcnode-id="7128" instrument_node="">Thou shalt not steal</span></a></div><span data-dcnode-id="7125" instrument_node="">
</span><p data-dcnode-id="7117"><span data-dcnode-id="7124" instrument_node="">German Old Testament scholar </span><a data-dcnode-id="7122" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Albrecht_Alt" title="Albrecht Alt"><span data-dcnode-id="7123" instrument_node="">Albrecht Alt</span></a><span data-dcnode-id="7121" instrument_node="">: </span><i data-dcnode-id="7119"><span data-dcnode-id="7120" instrument_node="">Das Verbot des Diebstahls im Dekalog</span></i><span data-dcnode-id="7118" instrument_node=""> (1953), suggested that the commandment translated as "thou shalt not steal" was originally intended against stealing people—against abductions and slavery, in agreement with the Talmudic interpretation of the statement as "thou shalt not kidnap" (Sanhedrin 86a).
</span></p><span data-dcnode-id="7116" instrument_node="">
</span><h4 data-dcnode-id="7106"><span class="mw-headline" data-dcnode-id="7114" id="Idolatry"><span data-dcnode-id="7115" instrument_node="">Idolatry</span></span><span class="mw-editsection" data-dcnode-id="7107"><span class="mw-editsection-bracket" data-dcnode-id="7112"><span data-dcnode-id="7113" instrument_node="">[</span></span><a data-dcnode-id="7110" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTen_Commandments%26action%3Dedit%26section%3D27" title="Edit section: Idolatry"><span data-dcnode-id="7111" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7108"><span data-dcnode-id="7109" instrument_node="">]</span></span></span></h4><span data-dcnode-id="7105" instrument_node="">
</span><link data-dcnode-id="7104" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7094" role="note"><span data-dcnode-id="7103" instrument_node="">Main articles: </span><a data-dcnode-id="7101" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Idolatry" title="Idolatry"><span data-dcnode-id="7102" instrument_node="">Idolatry</span></a><span data-dcnode-id="7100" instrument_node="">, </span><a data-dcnode-id="7098" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Idolatry_in_Judaism" title="Idolatry in Judaism"><span data-dcnode-id="7099" instrument_node="">Idolatry in Judaism</span></a><span data-dcnode-id="7097" instrument_node="">, and </span><a class="mw-redirect" data-dcnode-id="7095" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Idolatry_in_Christianity" title="Idolatry in Christianity"><span data-dcnode-id="7096" instrument_node="">Idolatry in Christianity</span></a></div><span data-dcnode-id="7093" instrument_node="">
</span><p data-dcnode-id="7091"><span data-dcnode-id="7092" instrument_node="">In Judaism there is a prohibition against making or worshipping an idol or a representation of God, but there is no restriction on art or simple depictions unrelated to God. Islam has a stronger prohibition, banning not just representations of God, but also in some cases of Muhammad, humans and, in some interpretations, any living creature.
</span></p><p data-dcnode-id="7072"><span data-dcnode-id="7090" instrument_node="">In the non-canonical </span><a data-dcnode-id="7088" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gospel_of_Barnabas" title="Gospel of Barnabas"><span data-dcnode-id="7089" instrument_node="">Gospel of Barnabas</span></a><span data-dcnode-id="7087" instrument_node="">, it is claimed that Jesus stated that idolatry is the greatest sin as it divests a man fully of faith, and hence of God.</span><sup class="reference" data-dcnode-id="7084" id="cite_ref-127"><a data-dcnode-id="7085" href="#cite_note-127"><span data-dcnode-id="7086" instrument_node="">[127]</span></a></sup><span data-dcnode-id="7083" instrument_node=""> The words attributed to Jesus prohibit not only worshipping statues of wood or stone; but also statues of flesh. </span><i data-dcnode-id="7081"><span data-dcnode-id="7082" instrument_node="">"...all which a man loves, for which he leaves everything else but that, is his god, thus the glutton and drunkard has for his idol his own flesh, the fornicator has for his idol the harlot and the greedy has for his idol silver and gold, and so the same for every other sinner."</span></i><sup class="reference" data-dcnode-id="7078" id="cite_ref-128"><a data-dcnode-id="7079" href="#cite_note-128"><span data-dcnode-id="7080" instrument_node="">[128]</span></a></sup><span data-dcnode-id="7077" instrument_node=""> Idolatory was thus the basic sin, which manifested in various acts or thoughts, which displace the primacy of God.  However, the Gospel of Barnabas does not form part of the Christian bible.  It is known only from 16th- and 17th-century manuscripts, and frequently reflects Islamic rather than Christian understandings,</span><sup class="reference" data-dcnode-id="7074" id="cite_ref-129"><a data-dcnode-id="7075" href="#cite_note-129"><span data-dcnode-id="7076" instrument_node="">[129]</span></a></sup><span data-dcnode-id="7073" instrument_node=""> so it cannot be taken as authoritative on Christian views.
</span></p><p data-dcnode-id="7056"><span data-dcnode-id="7071" instrument_node="">In Christianity's earliest centuries, some Christians had informally adorned their homes and places of worship with images of Christ and the saints, which others thought inappropriate. No church council had ruled on whether such practices constituted idolatry. The controversy reached crisis level in the 8th century, during the period of </span><a data-dcnode-id="7069" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Iconoclasm" title="Iconoclasm"><span data-dcnode-id="7070" instrument_node="">iconoclasm</span></a><span data-dcnode-id="7068" instrument_node="">: the smashing of icons,</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="7061" style="white-space:nowrap;"><span data-dcnode-id="7067" instrument_node="">[</span><i data-dcnode-id="7063"><a data-dcnode-id="7064" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="7065" title="This claim needs references to reliable sources. (February 2020)"><span data-dcnode-id="7066" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="7062" instrument_node="">]</span></sup><span data-dcnode-id="7060" instrument_node=""> and again in the Middle Ages, becoming a critical point of contention in the </span><a class="mw-redirect" data-dcnode-id="7058" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Protestant_Reformation" title="Protestant Reformation"><span data-dcnode-id="7059" instrument_node="">Protestant Reformation</span></a><span data-dcnode-id="7057" instrument_node="">.
</span></p><p data-dcnode-id="7015"><span data-dcnode-id="7055" instrument_node="">In 726 </span><a data-dcnode-id="7053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Leo_III_the_Isaurian" title="Leo III the Isaurian"><span data-dcnode-id="7054" instrument_node="">Emperor Leo III</span></a><span data-dcnode-id="7052" instrument_node=""> ordered all images removed from all churches; in 730 a council forbade veneration of images, citing the Second Commandment; in 787 the </span><a class="mw-redirect" data-dcnode-id="7050" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Seventh_Ecumenical_Council" title="Seventh Ecumenical Council"><span data-dcnode-id="7051" instrument_node="">Seventh Ecumenical Council</span></a><span data-dcnode-id="7049" instrument_node=""> reversed the preceding rulings, condemning iconoclasm and sanctioning the veneration of images; in 815 </span><a data-dcnode-id="7047" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Leo_V_the_Armenian" title="Leo V the Armenian"><span data-dcnode-id="7048" instrument_node="">Leo V</span></a><span data-dcnode-id="7046" instrument_node=""> called yet another council, which reinstated iconoclasm; in 843 </span><a class="mw-redirect" data-dcnode-id="7044" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Theodora_%28wife_of_Theophilos%29" title="Theodora (wife of Theophilos)"><span data-dcnode-id="7045" instrument_node="">Empress Theodora</span></a><span data-dcnode-id="7043" instrument_node=""> again reinstated veneration of icons.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="7036" style="white-space:nowrap;"><span data-dcnode-id="7042" instrument_node="">[</span><i data-dcnode-id="7038"><a data-dcnode-id="7039" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="7040" title="This claim needs references to reliable sources. (February 2020)"><span data-dcnode-id="7041" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="7037" instrument_node="">]</span></sup><span data-dcnode-id="7035" instrument_node=""> This mostly settled the matter until the Reformation, when </span><a data-dcnode-id="7033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Calvin" title="John Calvin"><span data-dcnode-id="7034" instrument_node="">John Calvin</span></a><span data-dcnode-id="7032" instrument_node=""> declared that the ruling of the Seventh Ecumenical Council "emanated from Satan".</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="7025" style="white-space:nowrap;"><span data-dcnode-id="7031" instrument_node="">[</span><i data-dcnode-id="7027"><a data-dcnode-id="7028" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="7029" title="This claim needs references to reliable sources. (February 2020)"><span data-dcnode-id="7030" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="7026" instrument_node="">]</span></sup><span data-dcnode-id="7024" instrument_node=""> Protestant iconoclasts at this time destroyed statues, pictures, stained glass, and artistic masterpieces.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="7017" style="white-space:nowrap;"><span data-dcnode-id="7023" instrument_node="">[</span><i data-dcnode-id="7019"><a data-dcnode-id="7020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="7021" title="This claim needs references to reliable sources. (February 2020)"><span data-dcnode-id="7022" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="7018" instrument_node="">]</span></sup><span data-dcnode-id="7016" instrument_node="">
</span></p><p data-dcnode-id="6983"><span data-dcnode-id="7014" instrument_node="">The </span><a data-dcnode-id="7012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eastern_Orthodox_Church" title="Eastern Orthodox Church"><span data-dcnode-id="7013" instrument_node="">Eastern Orthodox Church</span></a><span data-dcnode-id="7011" instrument_node=""> celebrates Theodora's restoration of the icons every year on the First Sunday of </span><a data-dcnode-id="7009" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Great_Lent" title="Great Lent"><span data-dcnode-id="7010" instrument_node="">Great Lent</span></a><span data-dcnode-id="7008" instrument_node="">.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="7001" style="white-space:nowrap;"><span data-dcnode-id="7007" instrument_node="">[</span><i data-dcnode-id="7003"><a data-dcnode-id="7004" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="7005" title="This claim needs references to reliable sources. (February 2020)"><span data-dcnode-id="7006" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="7002" instrument_node="">]</span></sup><span data-dcnode-id="7000" instrument_node=""> Eastern Orthodox tradition teaches that while images of God, the Father, remain prohibited, depictions of Jesus as the incarnation of God as a visible human are permissible. To emphasize the theological importance of the incarnation, the Orthodox Church encourages the use of icons in church and private devotions, but prefers a two-dimensional depiction</span><sup class="reference" data-dcnode-id="6997" id="cite_ref-Hore_130-0"><a data-dcnode-id="6998" href="#cite_note-Hore-130"><span data-dcnode-id="6999" instrument_node="">[130]</span></a></sup><span data-dcnode-id="6996" instrument_node=""> as a reminder of this theological aspect. Icons depict the spiritual dimension of their subject rather than attempting a naturalistic portrayal.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="6989" style="white-space:nowrap;"><span data-dcnode-id="6995" instrument_node="">[</span><i data-dcnode-id="6991"><a data-dcnode-id="6992" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="6993" title="This claim needs references to reliable sources. (February 2020)"><span data-dcnode-id="6994" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="6990" instrument_node="">]</span></sup><span data-dcnode-id="6988" instrument_node=""> In modern use (usually as a result of Roman Catholic influence), more naturalistic images and images of the Father, however, also appear occasionally in Orthodox churches, but statues, i.e. three-dimensional depictions, continue to be banned.</span><sup class="reference" data-dcnode-id="6985" id="cite_ref-Hore_130-1"><a data-dcnode-id="6986" href="#cite_note-Hore-130"><span data-dcnode-id="6987" instrument_node="">[130]</span></a></sup><span data-dcnode-id="6984" instrument_node="">
</span></p><span data-dcnode-id="6982" instrument_node="">
</span><h4 data-dcnode-id="6972"><span class="mw-headline" data-dcnode-id="6980" id="Adultery"><span data-dcnode-id="6981" instrument_node="">Adultery</span></span><span class="mw-editsection" data-dcnode-id="6973"><span class="mw-editsection-bracket" data-dcnode-id="6978"><span data-dcnode-id="6979" instrument_node="">[</span></span><a data-dcnode-id="6976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTen_Commandments%26action%3Dedit%26section%3D28" title="Edit section: Adultery"><span data-dcnode-id="6977" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6974"><span data-dcnode-id="6975" instrument_node="">]</span></span></span></h4><span data-dcnode-id="6971" instrument_node="">
</span><p data-dcnode-id="6958"><span data-dcnode-id="6970" instrument_node="">Originally this commandment forbade male Israelites from having sexual intercourse with the wife of another Israelite; the prohibition did not extend to their own slaves. Sexual intercourse between an Israelite man, married or not, and a woman who was neither married nor </span><a data-dcnode-id="6968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Engagement" title="Engagement"><span data-dcnode-id="6969" instrument_node="">betrothed</span></a><span data-dcnode-id="6967" instrument_node=""> was not considered adultery.</span><sup class="reference" data-dcnode-id="6964" id="cite_ref-131"><a data-dcnode-id="6965" href="#cite_note-131"><span data-dcnode-id="6966" instrument_node="">[131]</span></a></sup><span data-dcnode-id="6963" instrument_node=""> This concept of adultery stems from the economic aspect of Israelite marriage whereby the husband has an exclusive right to his wife, whereas the wife, as the husband's possession, did not have an exclusive right to her husband.</span><sup class="reference" data-dcnode-id="6960" id="cite_ref-132"><a data-dcnode-id="6961" href="#cite_note-132"><span data-dcnode-id="6962" instrument_node="">[132]</span></a></sup><span data-dcnode-id="6959" instrument_node="">
</span></p><p data-dcnode-id="6949"><span data-dcnode-id="6957" instrument_node="">Louis Ginzberg argued that the tenth commandment (</span><i data-dcnode-id="6955"><span data-dcnode-id="6956" instrument_node="">Covet not thy neighbor's wife</span></i><span data-dcnode-id="6954" instrument_node="">) is directed against a sin which may lead to a trespassing of all Ten Commandments.</span><sup class="reference" data-dcnode-id="6951" id="cite_ref-133"><a data-dcnode-id="6952" href="#cite_note-133"><span data-dcnode-id="6953" instrument_node="">[133]</span></a></sup><span data-dcnode-id="6950" instrument_node="">
</span></p><span data-dcnode-id="6948" instrument_node="">
</span><h2 data-dcnode-id="6938"><span class="mw-headline" data-dcnode-id="6946" id="Critical_historical_analysis"><span data-dcnode-id="6947" instrument_node="">Critical historical analysis</span></span><span class="mw-editsection" data-dcnode-id="6939"><span class="mw-editsection-bracket" data-dcnode-id="6944"><span data-dcnode-id="6945" instrument_node="">[</span></span><a data-dcnode-id="6942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTen_Commandments%26action%3Dedit%26section%3D29" title="Edit section: Critical historical analysis"><span data-dcnode-id="6943" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6940"><span data-dcnode-id="6941" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6937" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="6925"><div class="thumbinner" data-dcnode-id="6926" style="width:222px;"><a class="image" data-dcnode-id="6935" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMonheim_Town_Hall_5.jpg"><img alt="" class="thumbimage" data-dcnode-id="6936" data-file-height="1536" data-file-width="1152" decoding="async" height="293" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/a/a3/Monheim_Town_Hall_5.jpg/220px-Monheim_Town_Hall_5.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/a/a3/Monheim_Town_Hall_5.jpg/330px-Monheim_Town_Hall_5.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/a/a3/Monheim_Town_Hall_5.jpg/440px-Monheim_Town_Hall_5.jpg 2x" width="220"></a><span data-dcnode-id="6934" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6927"><div class="magnify" data-dcnode-id="6932"><a class="internal" data-dcnode-id="6933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMonheim_Town_Hall_5.jpg" title="Enlarge"></a></div><span data-dcnode-id="6931" instrument_node="">18th-century depiction of Moses receiving the tablets (</span><a data-dcnode-id="6929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Monheim_Town_Hall" title="Monheim Town Hall"><span data-dcnode-id="6930" instrument_node="">Monheim Town Hall</span></a><span data-dcnode-id="6928" instrument_node="">)</span></div></div></div><span data-dcnode-id="6924" instrument_node="">
</span><h3 data-dcnode-id="6914"><span class="mw-headline" data-dcnode-id="6922" id="Early_theories"><span data-dcnode-id="6923" instrument_node="">Early theories</span></span><span class="mw-editsection" data-dcnode-id="6915"><span class="mw-editsection-bracket" data-dcnode-id="6920"><span data-dcnode-id="6921" instrument_node="">[</span></span><a data-dcnode-id="6918" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTen_Commandments%26action%3Dedit%26section%3D30" title="Edit section: Early theories"><span data-dcnode-id="6919" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6916"><span data-dcnode-id="6917" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6913" instrument_node="">
</span><p data-dcnode-id="6911"><span data-dcnode-id="6912" instrument_node="">Critical scholarship is divided over its interpretation of the ten commandment texts.
</span></p><p data-dcnode-id="6900"><a data-dcnode-id="6909" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Julius_Wellhausen" title="Julius Wellhausen"><span data-dcnode-id="6910" instrument_node="">Julius Wellhausen</span></a><span data-dcnode-id="6908" instrument_node="">'s </span><a data-dcnode-id="6906" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Documentary_hypothesis" title="Documentary hypothesis"><span data-dcnode-id="6907" instrument_node="">documentary hypothesis</span></a><span data-dcnode-id="6905" instrument_node=""> suggests that Exodus 20–23 and 34 "might be regarded as the document which formed the starting point of the religious history of Israel."</span><sup class="reference" data-dcnode-id="6902" id="cite_ref-134"><a data-dcnode-id="6903" href="#cite_note-134"><span data-dcnode-id="6904" instrument_node="">[134]</span></a></sup><span data-dcnode-id="6901" instrument_node=""> Deuteronomy 5 then reflects King Josiah's attempt to link the document produced by his court to the older Mosaic tradition.
</span></p><p data-dcnode-id="6873"><span data-dcnode-id="6899" instrument_node="">In a 2002 analysis of the history of this position, </span><a data-dcnode-id="6897" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bernard_M._Levinson" title="Bernard M. Levinson"><span data-dcnode-id="6898" instrument_node="">Bernard M. Levinson</span></a><span data-dcnode-id="6896" instrument_node=""> argued that this reconstruction assumes a Christian perspective, and dates back to </span><a data-dcnode-id="6894" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Johann_Wolfgang_von_Goethe" title="Johann Wolfgang von Goethe"><span data-dcnode-id="6895" instrument_node="">Johann Wolfgang von Goethe</span></a><span data-dcnode-id="6893" instrument_node="">'s polemic against Judaism, which asserted that religions evolve from the more </span><a data-dcnode-id="6891" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ritual" title="Ritual"><span data-dcnode-id="6892" instrument_node="">ritualistic</span></a><span data-dcnode-id="6890" instrument_node=""> to the more </span><a class="mw-redirect" data-dcnode-id="6888" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ethic" title="Ethic"><span data-dcnode-id="6889" instrument_node="">ethical</span></a><span data-dcnode-id="6887" instrument_node="">. Goethe thus argued that the Ten Commandments revealed to Moses at </span><a data-dcnode-id="6885" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mount_Sinai" title="Mount Sinai"><span data-dcnode-id="6886" instrument_node="">Mount Sinai</span></a><span data-dcnode-id="6884" instrument_node=""> would have emphasized rituals, and that the "ethical" Decalogue Christians recite in their own churches was composed at a later date, when Israelite prophets had begun to prophesy the coming of the </span><a data-dcnode-id="6882" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Messiah" title="Messiah"><span data-dcnode-id="6883" instrument_node="">messiah</span></a><span data-dcnode-id="6881" instrument_node="">. Levinson points out that there is no evidence, internal to the Hebrew Bible or in external sources, to support this conjecture. He concludes that its vogue among later critical historians represents the persistence of the idea that the </span><a class="mw-redirect" data-dcnode-id="6879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Supersession" title="Supersession"><span data-dcnode-id="6880" instrument_node="">supersession</span></a><span data-dcnode-id="6878" instrument_node=""> of Judaism by Christianity is part of a longer history of progress from the ritualistic to the ethical.</span><sup class="reference" data-dcnode-id="6875" id="cite_ref-135"><a data-dcnode-id="6876" href="#cite_note-135"><span data-dcnode-id="6877" instrument_node="">[135]</span></a></sup><span data-dcnode-id="6874" instrument_node="">
</span></p><p data-dcnode-id="6853"><span data-dcnode-id="6872" instrument_node="">By the 1930s, historians who accepted the basic premises of multiple authorship had come to reject the idea of an orderly evolution of Israelite religion. Critics instead began to suppose that law and ritual could be of equal importance, while taking different form, at different times. This means that there is no longer any </span><i data-dcnode-id="6870"><span data-dcnode-id="6871" instrument_node="">a priori</span></i><span data-dcnode-id="6869" instrument_node=""> reason to believe that Exodus 20:2–17 and Exodus 34:10–28 were composed during different stages of Israelite history. For example, critical historian </span><a data-dcnode-id="6867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Bright_%28biblical_scholar%29" title="John Bright (biblical scholar)"><span data-dcnode-id="6868" instrument_node="">John Bright</span></a><span data-dcnode-id="6866" instrument_node=""> also dates the Jahwist texts to the tenth century BC, but believes that they express a theology that "had already been normalized in the period of the Judges" (i.e., of the tribal alliance).</span><sup class="reference" data-dcnode-id="6863" id="cite_ref-136"><a data-dcnode-id="6864" href="#cite_note-136"><span data-dcnode-id="6865" instrument_node="">[136]</span></a></sup><span data-dcnode-id="6862" instrument_node=""> He concurs about the importance of the decalogue as "a central feature in the covenant that brought together Israel into being as a people"</span><sup class="reference" data-dcnode-id="6859" id="cite_ref-137"><a data-dcnode-id="6860" href="#cite_note-137"><span data-dcnode-id="6861" instrument_node="">[137]</span></a></sup><span data-dcnode-id="6858" instrument_node=""> but views the parallels between Exodus 20 and Deuteronomy 5, along with other evidence, as reason to believe that it is relatively close to its original form and Mosaic in origin.</span><sup class="reference" data-dcnode-id="6855" id="cite_ref-138"><a data-dcnode-id="6856" href="#cite_note-138"><span data-dcnode-id="6857" instrument_node="">[138]</span></a></sup><span data-dcnode-id="6854" instrument_node="">
</span></p><span data-dcnode-id="6852" instrument_node="">
</span><h3 data-dcnode-id="6842"><span class="mw-headline" data-dcnode-id="6850" id="Hittite_treaties"><span data-dcnode-id="6851" instrument_node="">Hittite treaties</span></span><span class="mw-editsection" data-dcnode-id="6843"><span class="mw-editsection-bracket" data-dcnode-id="6848"><span data-dcnode-id="6849" instrument_node="">[</span></span><a data-dcnode-id="6846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTen_Commandments%26action%3Dedit%26section%3D31" title="Edit section: Hittite treaties"><span data-dcnode-id="6847" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6844"><span data-dcnode-id="6845" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6841" instrument_node="">
</span><p data-dcnode-id="6832"><span data-dcnode-id="6840" instrument_node="">According to John Bright, however, there is an important distinction between the Decalogue and the "book of the covenant" (Exodus 21–23 and 34:10–24). The Decalogue, he argues, was modelled on the suzerainty treaties of the </span><a data-dcnode-id="6838" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hittites" title="Hittites"><span data-dcnode-id="6839" instrument_node="">Hittites</span></a><span data-dcnode-id="6837" instrument_node=""> (and other Mesopotamian Empires), that is, represents the relationship between God and Israel as a relationship between king and vassal, and enacts that bond.</span><sup class="reference" data-dcnode-id="6834" id="cite_ref-139"><a data-dcnode-id="6835" href="#cite_note-139"><span data-dcnode-id="6836" instrument_node="">[139]</span></a></sup><span data-dcnode-id="6833" instrument_node="">
</span></p><p data-dcnode-id="6819"><span data-dcnode-id="6831" instrument_node="">"The prologue of the Hittite treaty reminds his vassals of his benevolent acts.. (compare with Exodus 20:2 "I am the L</span><span class="smallcaps" data-dcnode-id="6829" style="font-size:83%"><span data-dcnode-id="6830" instrument_node="">ORD</span></span><span data-dcnode-id="6828" instrument_node=""> your God, who brought you out of the land of Egypt, out of the house of slavery"). The Hittite treaty also stipulated the obligations imposed by the ruler on his vassals, which included a prohibition of relations with peoples outside the empire, or enmity between those within."</span><sup class="reference" data-dcnode-id="6825" id="cite_ref-140"><a data-dcnode-id="6826" href="#cite_note-140"><span data-dcnode-id="6827" instrument_node="">[140]</span></a></sup><span data-dcnode-id="6824" instrument_node=""> (Exodus 20:3: "You shall have no other gods before Me"). Viewed as a treaty rather than a law code, its purpose is not so much to regulate human affairs as to define the scope of the king's power.</span><sup class="reference" data-dcnode-id="6821" id="cite_ref-141"><a data-dcnode-id="6822" href="#cite_note-141"><span data-dcnode-id="6823" instrument_node="">[141]</span></a></sup><span data-dcnode-id="6820" instrument_node="">
</span></p><p data-dcnode-id="6799"><span data-dcnode-id="6818" instrument_node="">Julius Morgenstern argued that Exodus 34 is distinct from the Jahwist document, identifying it with king Asa's reforms in 899 BC.</span><sup class="reference" data-dcnode-id="6815" id="cite_ref-ReferenceA_142-0"><a data-dcnode-id="6816" href="#cite_note-ReferenceA-142"><span data-dcnode-id="6817" instrument_node="">[142]</span></a></sup><span data-dcnode-id="6814" instrument_node=""> Bright, however, believes that like the Decalogue this text has its origins in the time of the tribal alliance. The book of the covenant, he notes, bears a greater similarity to Mesopotamian law codes (e.g. the </span><a data-dcnode-id="6812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Code_of_Hammurabi" title="Code of Hammurabi"><span data-dcnode-id="6813" instrument_node="">Code of Hammurabi</span></a><span data-dcnode-id="6811" instrument_node=""> which was inscribed on a stone </span><a data-dcnode-id="6809" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stele" title="Stele"><span data-dcnode-id="6810" instrument_node="">stele</span></a><span data-dcnode-id="6808" instrument_node="">). He argues that the function of this "book" is to move from the realm of treaty to the realm of law: "The Book of the Covenant (Ex., chs. 21 to 23; cf. ch. 34), which is no official state law, but a description of normative Israelite judicial procedure in the days of the Judges, is the best example of this process."</span><sup class="reference" data-dcnode-id="6805" id="cite_ref-143"><a data-dcnode-id="6806" href="#cite_note-143"><span data-dcnode-id="6807" instrument_node="">[143]</span></a></sup><span data-dcnode-id="6804" instrument_node=""> According to Bright, then, this body of law too predates the monarchy.</span><sup class="reference" data-dcnode-id="6801" id="cite_ref-144"><a data-dcnode-id="6802" href="#cite_note-144"><span data-dcnode-id="6803" instrument_node="">[144]</span></a></sup><span data-dcnode-id="6800" instrument_node="">
</span></p><span data-dcnode-id="6798" instrument_node="">
</span><h3 data-dcnode-id="6788"><span class="mw-headline" data-dcnode-id="6796" id="Dating"><span data-dcnode-id="6797" instrument_node="">Dating</span></span><span class="mw-editsection" data-dcnode-id="6789"><span class="mw-editsection-bracket" data-dcnode-id="6794"><span data-dcnode-id="6795" instrument_node="">[</span></span><a data-dcnode-id="6792" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTen_Commandments%26action%3Dedit%26section%3D32" title="Edit section: Dating"><span data-dcnode-id="6793" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6790"><span data-dcnode-id="6791" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6787" instrument_node="">
</span><p data-dcnode-id="6771"><span data-dcnode-id="6786" instrument_node="">Archaeologists </span><a data-dcnode-id="6784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Israel_Finkelstein" title="Israel Finkelstein"><span data-dcnode-id="6785" instrument_node="">Israel Finkelstein</span></a><span data-dcnode-id="6783" instrument_node=""> and </span><a data-dcnode-id="6781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Neil_Asher_Silberman" title="Neil Asher Silberman"><span data-dcnode-id="6782" instrument_node="">Neil Asher Silberman</span></a><span data-dcnode-id="6780" instrument_node=""> argue that "the astonishing composition came together… in the seventh century BC".</span><sup class="reference" data-dcnode-id="6777" id="cite_ref-145"><a data-dcnode-id="6778" href="#cite_note-145"><span data-dcnode-id="6779" instrument_node="">[145]</span></a></sup><span data-dcnode-id="6776" instrument_node=""> An even later date (after 586 BC) is suggested by David H. Aaron.</span><sup class="reference" data-dcnode-id="6773" id="cite_ref-146"><a data-dcnode-id="6774" href="#cite_note-146"><span data-dcnode-id="6775" instrument_node="">[146]</span></a></sup><span data-dcnode-id="6772" instrument_node="">
</span></p><span data-dcnode-id="6770" instrument_node="">
</span><h3 data-dcnode-id="6760"><span class="mw-headline" data-dcnode-id="6768" id="The_Ritual_Decalogue"><span data-dcnode-id="6769" instrument_node="">The Ritual Decalogue</span></span><span class="mw-editsection" data-dcnode-id="6761"><span class="mw-editsection-bracket" data-dcnode-id="6766"><span data-dcnode-id="6767" instrument_node="">[</span></span><a data-dcnode-id="6764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTen_Commandments%26action%3Dedit%26section%3D33" title="Edit section: The Ritual Decalogue"><span data-dcnode-id="6765" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6762"><span data-dcnode-id="6763" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6759" instrument_node="">
</span><link data-dcnode-id="6758" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="6754" role="note"><span data-dcnode-id="6757" instrument_node="">Main article: </span><a data-dcnode-id="6755" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Documentary_hypothesis" title="Documentary hypothesis"><span data-dcnode-id="6756" instrument_node="">Documentary hypothesis</span></a></div><span data-dcnode-id="6753" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="6744"><div class="thumbinner" data-dcnode-id="6745" style="width:222px;"><a class="image" data-dcnode-id="6751" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMozes_toont_de_Tien_Geboden.jpg"><img alt="" class="thumbimage" data-dcnode-id="6752" data-file-height="3999" data-file-width="2803" decoding="async" height="314" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/e/eb/Mozes_toont_de_Tien_Geboden.jpg/220px-Mozes_toont_de_Tien_Geboden.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/e/eb/Mozes_toont_de_Tien_Geboden.jpg/330px-Mozes_toont_de_Tien_Geboden.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/e/eb/Mozes_toont_de_Tien_Geboden.jpg/440px-Mozes_toont_de_Tien_Geboden.jpg 2x" width="220"></a><span data-dcnode-id="6750" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6746"><div class="magnify" data-dcnode-id="6748"><a class="internal" data-dcnode-id="6749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMozes_toont_de_Tien_Geboden.jpg" title="Enlarge"></a></div><span data-dcnode-id="6747" instrument_node="">Print of Moses showing the Ten Commandments. Made at the end of the sixteenth century</span></div></div></div><span data-dcnode-id="6743" instrument_node="">
</span><p data-dcnode-id="6714"><span data-dcnode-id="6742" instrument_node="">Exodus 34:28</span><sup class="reference" data-dcnode-id="6739" id="cite_ref-147"><a data-dcnode-id="6740" href="#cite_note-147"><span data-dcnode-id="6741" instrument_node="">[147]</span></a></sup><span data-dcnode-id="6738" instrument_node=""> identifies a different list, that of Exodus 34:11–27,</span><sup class="reference" data-dcnode-id="6735" id="cite_ref-148"><a data-dcnode-id="6736" href="#cite_note-148"><span data-dcnode-id="6737" instrument_node="">[148]</span></a></sup><span data-dcnode-id="6734" instrument_node=""> as the Ten Commandments. Since this passage does not prohibit murder, adultery, theft, etc., but instead deals with the proper worship of </span><a data-dcnode-id="6732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yahweh" title="Yahweh"><span data-dcnode-id="6733" instrument_node="">Yahweh</span></a><span data-dcnode-id="6731" instrument_node="">, some scholars call it the "</span><a data-dcnode-id="6729" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ritual_Decalogue" title="Ritual Decalogue"><span data-dcnode-id="6730" instrument_node="">Ritual Decalogue</span></a><span data-dcnode-id="6728" instrument_node="">", and disambiguate the Ten Commandments of traditional understanding as the "Ethical Decalogue".</span><sup class="reference" data-dcnode-id="6725" id="cite_ref-149"><a data-dcnode-id="6726" href="#cite_note-149"><span data-dcnode-id="6727" instrument_node="">[149]</span></a></sup><sup class="reference" data-dcnode-id="6722" id="cite_ref-150"><a data-dcnode-id="6723" href="#cite_note-150"><span data-dcnode-id="6724" instrument_node="">[150]</span></a></sup><sup class="reference" data-dcnode-id="6719" id="cite_ref-151"><a data-dcnode-id="6720" href="#cite_note-151"><span data-dcnode-id="6721" instrument_node="">[151]</span></a></sup><sup class="reference" data-dcnode-id="6716" id="cite_ref-152"><a data-dcnode-id="6717" href="#cite_note-152"><span data-dcnode-id="6718" instrument_node="">[152]</span></a></sup><span data-dcnode-id="6715" instrument_node="">
</span></p><p data-dcnode-id="6693"><a data-dcnode-id="6712" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Richard_Elliott_Friedman" title="Richard Elliott Friedman"><span data-dcnode-id="6713" instrument_node="">Richard Elliott Friedman</span></a><span data-dcnode-id="6711" instrument_node=""> argues that the Ten Commandments at Exodus 20:1–17 "does not appear to belong to any of the major sources. It is likely to be an independent document, which was inserted here by the Redactor."</span><sup class="reference" data-dcnode-id="6708" id="cite_ref-153"><a data-dcnode-id="6709" href="#cite_note-153"><span data-dcnode-id="6710" instrument_node="">[153]</span></a></sup><span data-dcnode-id="6707" instrument_node=""> In his view, the </span><a data-dcnode-id="6705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Covenant_Code" title="Covenant Code"><span data-dcnode-id="6706" instrument_node="">Covenant Code</span></a><span data-dcnode-id="6704" instrument_node=""> follows that version of the Ten Commandments in the northern Israel </span><a data-dcnode-id="6702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Elohist" title="Elohist"><span data-dcnode-id="6703" instrument_node="">E narrative</span></a><span data-dcnode-id="6701" instrument_node="">. In the </span><a class="mw-redirect" data-dcnode-id="6699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yahwist" title="Yahwist"><span data-dcnode-id="6700" instrument_node="">J narrative</span></a><span data-dcnode-id="6698" instrument_node=""> in Exodus 34 the editor of the combined story known as the Redactor (or RJE), adds in an explanation that these are a replacement for the earlier tablets which were shattered. "In the combined JE text, it would be awkward to picture God just commanding Moses to make some tablets, as if there were no history to this matter, so RJE adds the explanation that these are a replacement for the earlier tablets that were shattered."</span><sup class="reference" data-dcnode-id="6695" id="cite_ref-154"><a data-dcnode-id="6696" href="#cite_note-154"><span data-dcnode-id="6697" instrument_node="">[154]</span></a></sup><span data-dcnode-id="6694" instrument_node="">
</span></p><p data-dcnode-id="6683"><span data-dcnode-id="6692" instrument_node="">He writes that Exodus 34:14–26 is the J text of the Ten Commandments: "The first two commandments and the sabbath commandment have parallels in the other versions of the Ten Commandments. (Exodus 20 and Deuteronomy 5). … The other seven commandments here are completely different."</span><sup class="reference" data-dcnode-id="6689" id="cite_ref-155"><a data-dcnode-id="6690" href="#cite_note-155"><span data-dcnode-id="6691" instrument_node="">[155]</span></a></sup><span data-dcnode-id="6688" instrument_node=""> He suggests that differences in the J and E versions of the Ten Commandments story are a result of power struggles in the priesthood. The writer has Moses smash the tablets "because this raised doubts about the Judah's central religious shrine".</span><sup class="reference" data-dcnode-id="6685" id="cite_ref-156"><a data-dcnode-id="6686" href="#cite_note-156"><span data-dcnode-id="6687" instrument_node="">[156]</span></a></sup><span data-dcnode-id="6684" instrument_node="">
</span></p><p data-dcnode-id="6674"><span data-dcnode-id="6682" instrument_node="">According to Kaufmann, the Decalogue and the book of the covenant represent two ways of manifesting God's presence in Israel: the Ten Commandments taking the archaic and material form of stone tablets kept in the </span><a class="mw-redirect" data-dcnode-id="6680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ark_of_the_covenant" title="Ark of the covenant"><span data-dcnode-id="6681" instrument_node="">ark of the covenant</span></a><span data-dcnode-id="6679" instrument_node="">, while the book of the covenant took oral form to be recited to the people.</span><sup class="reference" data-dcnode-id="6676" id="cite_ref-Kaufmann1960_157-0"><a data-dcnode-id="6677" href="#cite_note-Kaufmann1960-157"><span data-dcnode-id="6678" instrument_node="">[157]</span></a></sup><span data-dcnode-id="6675" instrument_node="">
</span></p><span data-dcnode-id="6673" instrument_node="">
</span><h2 data-dcnode-id="6663"><span class="mw-headline" data-dcnode-id="6671" id="Political_importance"><span data-dcnode-id="6672" instrument_node="">Political importance</span></span><span class="mw-editsection" data-dcnode-id="6664"><span class="mw-editsection-bracket" data-dcnode-id="6669"><span data-dcnode-id="6670" instrument_node="">[</span></span><a data-dcnode-id="6667" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTen_Commandments%26action%3Dedit%26section%3D34" title="Edit section: Political importance"><span data-dcnode-id="6668" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6665"><span data-dcnode-id="6666" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6662" instrument_node="">
</span><p data-dcnode-id="6640"><span data-dcnode-id="6661" instrument_node="">Several interpretations of the Commandments seem to have problems for modern people living in free societies,</span><sup class="reference" data-dcnode-id="6658" id="cite_ref-Hitchens_2003_158-0"><a data-dcnode-id="6659" href="#cite_note-Hitchens_2003-158"><span data-dcnode-id="6660" instrument_node="">[158]</span></a></sup><span data-dcnode-id="6657" instrument_node=""> like capital punishment for blasphemy, idolatry, adultery, cursing one own's parents, and Sabbath-breaking.</span><sup class="reference" data-dcnode-id="6654" id="cite_ref-Malina_2003_p._159-0"><a data-dcnode-id="6655" href="#cite_note-Malina_2003_p.-159"><span data-dcnode-id="6656" instrument_node="">[159]</span></a></sup><sup class="reference" data-dcnode-id="6651" id="cite_ref-Abel_2018_p._19_160-0"><a data-dcnode-id="6652" href="#cite_note-Abel_2018_p._19-160"><span data-dcnode-id="6653" instrument_node="">[160]</span></a></sup><sup class="reference" data-dcnode-id="6648" id="cite_ref-Wright_2019_p._180_161-0"><a data-dcnode-id="6649" href="#cite_note-Wright_2019_p._180-161"><span data-dcnode-id="6650" instrument_node="">[161]</span></a></sup><sup class="reference" data-dcnode-id="6645" id="cite_ref-Green_Lapsley_Miles_Verhey_2011_p._119_162-0"><a data-dcnode-id="6646" href="#cite_note-Green_Lapsley_Miles_Verhey_2011_p._119-162"><span data-dcnode-id="6647" instrument_node="">[162]</span></a></sup><sup class="reference" data-dcnode-id="6642" id="cite_ref-Hobson_2011_p._14_163-0"><a data-dcnode-id="6643" href="#cite_note-Hobson_2011_p._14-163"><span data-dcnode-id="6644" instrument_node="">[163]</span></a></sup><span data-dcnode-id="6641" instrument_node="">
</span></p><p data-dcnode-id="6578"><span data-dcnode-id="6639" instrument_node="">During an </span><a data-dcnode-id="6637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1846" title="1846"><span data-dcnode-id="6638" instrument_node="">1846</span></a><span data-dcnode-id="6636" instrument_node=""> uprising, now known as the </span><a data-dcnode-id="6634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Galician_slaughter" title="Galician slaughter"><span data-dcnode-id="6635" instrument_node="">Galician slaughter</span></a><span data-dcnode-id="6633" instrument_node="">, by </span><a data-dcnode-id="6631" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Poverty_in_Austrian_Galicia" title="Poverty in Austrian Galicia"><span data-dcnode-id="6632" instrument_node="">impoverished</span></a><span data-dcnode-id="6630" instrument_node=""> and </span><a data-dcnode-id="6628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Famines_in_Austrian_Galicia" title="Famines in Austrian Galicia"><span data-dcnode-id="6629" instrument_node="">famished</span></a><span data-dcnode-id="6627" instrument_node=""> </span><a data-dcnode-id="6625" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Galicia_%28Eastern_Europe%29" title="Galicia (Eastern Europe)"><span data-dcnode-id="6626" instrument_node="">Galician</span></a><span data-dcnode-id="6624" instrument_node=""> Eastern European </span><a class="mw-redirect" data-dcnode-id="6622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peasants" title="Peasants"><span data-dcnode-id="6623" instrument_node="">peasants</span></a><span data-dcnode-id="6621" instrument_node=""> (</span><a data-dcnode-id="6619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Serfdom" title="Serfdom"><span data-dcnode-id="6620" instrument_node="">serfs</span></a><span data-dcnode-id="6618" instrument_node="">) directed against </span><a data-dcnode-id="6616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Szlachta" title="Szlachta"><span data-dcnode-id="6617" instrument_node="">szlachta</span></a><span data-dcnode-id="6615" instrument_node=""> (</span><a data-dcnode-id="6613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Poland" title="Poland"><span data-dcnode-id="6614" instrument_node="">Polish</span></a><span data-dcnode-id="6612" instrument_node=""> nobles) because of their oppression (for example, manorial prisons), a popular rumor had it that the </span><a data-dcnode-id="6610" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Austrian_Empire" title="Austrian Empire"><span data-dcnode-id="6611" instrument_node="">Austrian</span></a><span data-dcnode-id="6609" instrument_node=""> </span><a data-dcnode-id="6607" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Emperor_of_Austria" title="Emperor of Austria"><span data-dcnode-id="6608" instrument_node="">Emperor</span></a><span data-dcnode-id="6606" instrument_node=""> had abolished the Ten Commandants, which the peasants took as permission and religious justification to massacre the szlachta</span><sup class="reference" data-dcnode-id="6603" id="cite_ref-164"><a data-dcnode-id="6604" href="#cite_note-164"><span data-dcnode-id="6605" instrument_node="">[164]</span></a></sup><span data-dcnode-id="6602" instrument_node=""> – the prime representatives and beneficiaries of the crown in </span><a class="mw-redirect" data-dcnode-id="6600" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Austrian_Galicia" title="Austrian Galicia"><span data-dcnode-id="6601" instrument_node="">Austrian Galicia</span></a><span data-dcnode-id="6599" instrument_node="">.</span><sup class="reference" data-dcnode-id="6596" id="cite_ref-Nance2008_165-0"><a data-dcnode-id="6597" href="#cite_note-Nance2008-165"><span data-dcnode-id="6598" instrument_node="">[165]</span></a></sup><span data-dcnode-id="6595" instrument_node=""> This uprising is credited with helping to bring on the demise, in </span><a data-dcnode-id="6593" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1848" title="1848"><span data-dcnode-id="6594" instrument_node="">1848</span></a><span data-dcnode-id="6592" instrument_node="">, of </span><a data-dcnode-id="6590" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Serfdom" title="Serfdom"><span data-dcnode-id="6591" instrument_node="">serfdom</span></a><span data-dcnode-id="6589" instrument_node=""> with </span><a data-dcnode-id="6587" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Corv%25C3%25A9e" title="Corvée"><span data-dcnode-id="6588" instrument_node="">corvée</span></a><span data-dcnode-id="6586" instrument_node=""> labor in Galicia.</span><sup class="reference" data-dcnode-id="6583" id="cite_ref-WHITEMurphy2001-170_166-0"><a data-dcnode-id="6584" href="#cite_note-WHITEMurphy2001-170-166"><span data-dcnode-id="6585" instrument_node="">[166]</span></a></sup><sup class="reference" data-dcnode-id="6580" id="cite_ref-167"><a data-dcnode-id="6581" href="#cite_note-167"><span data-dcnode-id="6582" instrument_node="">[167]</span></a></sup><span data-dcnode-id="6579" instrument_node="">
</span></p><span data-dcnode-id="6577" instrument_node="">
</span><h2 data-dcnode-id="6567"><span class="mw-headline" data-dcnode-id="6575" id="United_States_debate_over_display_on_public_property"><span data-dcnode-id="6576" instrument_node="">United States debate over display on public property</span></span><span class="mw-editsection" data-dcnode-id="6568"><span class="mw-editsection-bracket" data-dcnode-id="6573"><span data-dcnode-id="6574" instrument_node="">[</span></span><a data-dcnode-id="6571" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTen_Commandments%26action%3Dedit%26section%3D35" title="Edit section: United States debate over display on public property"><span data-dcnode-id="6572" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6569"><span data-dcnode-id="6570" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6566" instrument_node="">
</span><link data-dcnode-id="6565" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="6561" role="note"><span data-dcnode-id="6564" instrument_node="">Further information: </span><a data-dcnode-id="6562" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Accommodationism" title="Accommodationism"><span data-dcnode-id="6563" instrument_node="">Accommodationism</span></a></div><span data-dcnode-id="6560" instrument_node="">
</span><link data-dcnode-id="6559" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="6549" role="note"><span data-dcnode-id="6558" instrument_node="">See also: </span><a data-dcnode-id="6556" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Roy_Moore" title="Roy Moore"><span data-dcnode-id="6557" instrument_node="">Roy Moore</span></a><span data-dcnode-id="6555" instrument_node="">, </span><a data-dcnode-id="6553" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Van_Orden_v._Perry" title="Van Orden v. Perry"><span data-dcnode-id="6554" instrument_node="">Van Orden v. Perry</span></a><span data-dcnode-id="6552" instrument_node="">, and </span><a data-dcnode-id="6550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Separation_of_church_and_state_in_the_United_States" title="Separation of church and state in the United States"><span data-dcnode-id="6551" instrument_node="">Separation of church and state in the United States</span></a></div><span data-dcnode-id="6548" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="6534"><div class="thumbinner" data-dcnode-id="6535" style="width:222px;"><a class="image" data-dcnode-id="6546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ATenCommandmentsAustinStateCapitol.jpg"><img alt="Picture of a large stone monument displaying the ten commandments with the Texas State Capitol in Austin in the background. The picture was part of a news release Wednesday, March second, 2005, by then Attorney General Abbott." class="thumbimage" data-dcnode-id="6547" data-file-height="504" data-file-width="803" decoding="async" height="138" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/d/d1/TenCommandmentsAustinStateCapitol.jpg/220px-TenCommandmentsAustinStateCapitol.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/d/d1/TenCommandmentsAustinStateCapitol.jpg/330px-TenCommandmentsAustinStateCapitol.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/d/d1/TenCommandmentsAustinStateCapitol.jpg/440px-TenCommandmentsAustinStateCapitol.jpg 2x" width="220"></a><span data-dcnode-id="6545" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6536"><div class="magnify" data-dcnode-id="6543"><a class="internal" data-dcnode-id="6544" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ATenCommandmentsAustinStateCapitol.jpg" title="Enlarge"></a></div><span data-dcnode-id="6542" instrument_node="">Ten Commandments display at the </span><a data-dcnode-id="6540" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Texas_State_Capitol" title="Texas State Capitol"><span data-dcnode-id="6541" instrument_node="">Texas State Capitol</span></a><span data-dcnode-id="6539" instrument_node=""> in </span><a data-dcnode-id="6537" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Austin%2C_Texas" title="Austin, Texas"><span data-dcnode-id="6538" instrument_node="">Austin</span></a></div></div></div><span data-dcnode-id="6533" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="6520"><div class="thumbinner" data-dcnode-id="6521" style="width:222px;"><a class="image" data-dcnode-id="6531" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A21-16-020-commandments.jpg"><img alt="" class="thumbimage" data-dcnode-id="6532" data-file-height="2048" data-file-width="1501" decoding="async" height="300" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/4/49/21-16-020-commandments.jpg/220px-21-16-020-commandments.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/4/49/21-16-020-commandments.jpg/330px-21-16-020-commandments.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/4/49/21-16-020-commandments.jpg/440px-21-16-020-commandments.jpg 2x" width="220"></a><span data-dcnode-id="6530" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6522"><div class="magnify" data-dcnode-id="6528"><a class="internal" data-dcnode-id="6529" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A21-16-020-commandments.jpg" title="Enlarge"></a></div><a data-dcnode-id="6526" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ten_Commandments_Monument_%28Little_Rock%2C_Arkansas%29" title="Ten Commandments Monument (Little Rock, Arkansas)"><span data-dcnode-id="6527" instrument_node="">Ten Commandments Monument</span></a><span data-dcnode-id="6525" instrument_node=""> at the </span><a data-dcnode-id="6523" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arkansas_State_Capitol" title="Arkansas State Capitol"><span data-dcnode-id="6524" instrument_node="">Arkansas State Capitol</span></a></div></div></div><span data-dcnode-id="6519" instrument_node="">
</span><p data-dcnode-id="6506"><span data-dcnode-id="6518" instrument_node="">European Protestants replaced some visual art in their churches with plaques of the Ten Commandments after the Reformation. In England, such "Decalogue boards" also represented the English monarch's emphasis on rule of royal law within the churches. The United States Constitution forbids establishment of religion by law; however images of Moses holding the tablets of the Decalogue, along other religious figures including Solomon, Confucius, and Muhammad holding the Quran, are sculpted on the north and south friezes of the </span><a data-dcnode-id="6516" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Supreme_Court_Building" title="United States Supreme Court Building"><span data-dcnode-id="6517" instrument_node="">pediment of the Supreme Court building in Washington</span></a><span data-dcnode-id="6515" instrument_node="">.</span><sup class="reference" data-dcnode-id="6512" id="cite_ref-168"><a data-dcnode-id="6513" href="#cite_note-168"><span data-dcnode-id="6514" instrument_node="">[168]</span></a></sup><span data-dcnode-id="6511" instrument_node=""> Images of the Ten Commandments have long been contested symbols for the relationship of religion to national law.</span><sup class="reference" data-dcnode-id="6508" id="cite_ref-moses.creighton.edu_169-0"><a data-dcnode-id="6509" href="#cite_note-moses.creighton.edu-169"><span data-dcnode-id="6510" instrument_node="">[169]</span></a></sup><span data-dcnode-id="6507" instrument_node="">
</span></p><p data-dcnode-id="6467"><span data-dcnode-id="6505" instrument_node="">In the 1950s and 1960s the </span><a data-dcnode-id="6503" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fraternal_Order_of_Eagles" title="Fraternal Order of Eagles"><span data-dcnode-id="6504" instrument_node="">Fraternal Order of Eagles</span></a><span data-dcnode-id="6502" instrument_node=""> placed possibly thousands of Ten Commandments displays in courthouses and school rooms, including many stone monuments on courthouse property.</span><sup class="reference" data-dcnode-id="6499" id="cite_ref-170"><a data-dcnode-id="6500" href="#cite_note-170"><span data-dcnode-id="6501" instrument_node="">[170]</span></a></sup><span data-dcnode-id="6498" instrument_node=""> Because displaying the commandments can reflect a sectarian position if they are numbered, the Eagles developed an ecumenical version that omitted the numbers, as on the monument at the Texas capitol. Hundreds of monuments were also placed by </span><a data-dcnode-id="6496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Film_director" title="Film director"><span data-dcnode-id="6497" instrument_node="">director</span></a><span data-dcnode-id="6495" instrument_node=""> </span><a data-dcnode-id="6493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cecil_B._DeMille" title="Cecil B. DeMille"><span data-dcnode-id="6494" instrument_node="">Cecil B. DeMille</span></a><span data-dcnode-id="6492" instrument_node=""> as a </span><a data-dcnode-id="6490" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Publicity_stunt" title="Publicity stunt"><span data-dcnode-id="6491" instrument_node="">publicity stunt</span></a><span data-dcnode-id="6489" instrument_node=""> to promote his 1956 </span><a data-dcnode-id="6487" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Film" title="Film"><span data-dcnode-id="6488" instrument_node="">film</span></a><span data-dcnode-id="6486" instrument_node=""> </span><i data-dcnode-id="6483"><a data-dcnode-id="6484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Ten_Commandments_%281956_film%29" title="The Ten Commandments (1956 film)"><span data-dcnode-id="6485" instrument_node="">The Ten Commandments</span></a></i><span data-dcnode-id="6482" instrument_node="">.</span><sup class="reference" data-dcnode-id="6479" id="cite_ref-171"><a data-dcnode-id="6480" href="#cite_note-171"><span data-dcnode-id="6481" instrument_node="">[171]</span></a></sup><span data-dcnode-id="6478" instrument_node=""> Placing the plaques and monuments to the Ten Commandments in and around government buildings was another expression of mid-twentieth-century U.S. </span><a data-dcnode-id="6476" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Civil_religion" title="Civil religion"><span data-dcnode-id="6477" instrument_node="">civil religion</span></a><span data-dcnode-id="6475" instrument_node="">, along with adding the phrase "under God" to the </span><a class="mw-redirect" data-dcnode-id="6473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pledge_of_Allegiance_%28United_States%29" title="Pledge of Allegiance (United States)"><span data-dcnode-id="6474" instrument_node="">Pledge of Allegiance</span></a><span data-dcnode-id="6472" instrument_node="">.</span><sup class="reference" data-dcnode-id="6469" id="cite_ref-moses.creighton.edu_169-1"><a data-dcnode-id="6470" href="#cite_note-moses.creighton.edu-169"><span data-dcnode-id="6471" instrument_node="">[169]</span></a></sup><span data-dcnode-id="6468" instrument_node="">
