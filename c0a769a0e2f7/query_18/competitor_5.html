</span><div class="text show-more__control clickable" data-dcnode-id="3121"><span data-dcnode-id="3128" instrument_node="">It's interesting just to watch DeMille's first, silent film version of "The Ten Commandments", and the picture itself is pretty interesting too. It is also occasionally impressive, sometimes with the kind of DeMille flourishes that one expects, sometimes with a satisfying dramatic turn. It's quite different in its conception from the more familiar 1950's version, and so direct comparisons are not always possible, yet it holds up well by itself anyway.</span><br data-dcnode-id="3127"><br data-dcnode-id="3126"><span data-dcnode-id="3125" instrument_node="">Rather than concentrating on the biblical story, as in the remake, here DeMille first tells an abbreviated version of the Moses/Exodus narrative, and then uses it as the thematic basis for a modern morality tale. There are many parallels between the two stories, and while the parallels are occasionally forced, they often work surprisingly well. The modern-day story is similar to many other films of the 1910's and 1920's, but it is interesting and it is told well.</span><br data-dcnode-id="3124"><br data-dcnode-id="3123"><span data-dcnode-id="3122" instrument_node="">Although DeMille is known for his lavish spectacles, he also knew how to create some more subtle effects when he wanted to. In the modern story, some of the developments are a bit contrived, but the characters generally ring true, and the story itself is worthwhile as well. While the lavish remake with color and sound is probably going to remain more well-known, this earlier version is well worth seeing, too.</span></div><span data-dcnode-id="3120" instrument_node="">

</span></a><span data-dcnode-id="3048" instrument_node=""> </span><div class="display-name-date" data-dcnode-id="3040"><span data-dcnode-id="3047" instrument_node="">
</span><span class="display-name-link" data-dcnode-id="3044"><a data-dcnode-id="3045" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/user/ur2483625/"><span data-dcnode-id="3046" instrument_node="">bkoganbing</span></a></span><span class="review-date" data-dcnode-id="3042"><span data-dcnode-id="3043" instrument_node="">16 July 2010</span></span><span data-dcnode-id="3041" instrument_node="">
</span></div><span data-dcnode-id="3039" instrument_node="">
</span><div class="content" data-dcnode-id="3009"><span data-dcnode-id="3038" instrument_node="">
</span><div class="text show-more__control clickable" data-dcnode-id="3012"><span data-dcnode-id="3037" instrument_node="">Going on 90 years since it was first released, the original The Ten Commandments can still overawe you with the spectacle of both the biblical prologue and the modern story. Modern in the sense that it was set during the Jazz Age Roaring Twenties, the 1923 when Paramount released what would become that studio's biggest moneymaker up to that time.</span><br data-dcnode-id="3036"><br data-dcnode-id="3035"><span data-dcnode-id="3034" instrument_node="">You'll recognize the biblical prologue if you've seen the 1956 remake, it is almost a 45 minute scene for scene remake of the time that Charlton Heston and John Carradine arrive at the Egyptian court until the destruction of the Golden calf. They weren't giving Oscars back in 1923, but the parting of the Red Sea was incredible for its time and would have given Cecil B. DeMille yet another Oscar for the same event.</span><br data-dcnode-id="3033"><br data-dcnode-id="3032"><span data-dcnode-id="3031" instrument_node="">You won't recognize a lot of the biblical prologue cast, but they were part and parcel of a DeMille stock company that he developed during silent era and continued to a lesser degree after the coming of sound. Best known probably was Estelle Taylor who was married to Jack Dempsey at the time as Miriam, the sister of Moses. </span><br data-dcnode-id="3030"><br data-dcnode-id="3029"><span data-dcnode-id="3028" instrument_node="">The bulk of the film is the modern story which has the theme break the Ten Commandments and they'll break you. The stars are Richard Dix and Rod LaRocque a pair of brothers, one good and one bad, sons of a most pious mother Edythe Chapman. Dix is a good, honest, and steady carpenter by trade and LaRocque through his ruthlessness and who winds up breaking all the Commandments becomes the richest contractor in the state. </span><br data-dcnode-id="3027"><br data-dcnode-id="3026"><span data-dcnode-id="3025" instrument_node="">LaRocque is pretty ruthless in his private affairs, he breaks the Commandments regarding those as well. He marries Leatrice Joy who Dix likes as well, but then gets a fetching Eurasian mistress in Nita Naldi. Nita is in the slinky and sexy tradition of all DeMille's bad girls. </span><br data-dcnode-id="3024"><br data-dcnode-id="3023"><span data-dcnode-id="3022" instrument_node="">It all ends really bad for LaRocque as his sins catch up with him. </span><br data-dcnode-id="3021"><br data-dcnode-id="3020"><span data-dcnode-id="3019" instrument_node="">During the modern story DeMille hand with spectacle is a good one in the scene of the church collapse and later on during the climatic escape LaRocque is attempting to make with a speedboat on a stormy night at sea.</span><br data-dcnode-id="3018"><br data-dcnode-id="3017"><span data-dcnode-id="3016" instrument_node="">The influence of DeMille's educator father Henry and his friend David Belasco are strong here as they are in all DeMille work. The modern story is the kind of morality play that Belasco would produce and write for the stage for years. It's from the Victorian era, but the Roaring Twenties audience wanted something that reflected traditional values occasionally as if nervously waiting for its excesses to catch up. It's partly the reason why they could find comfort in a Congregationalist president of the USA in Calvin Coolidge. </span><br data-dcnode-id="3015"><br data-dcnode-id="3014"><span data-dcnode-id="3013" instrument_node="">Though the story is unbelievably dated, DeMille's cinematic techniques are hardly that. The original Ten Commandments in many ways will tell you about its creator warts and all.</span></div><span data-dcnode-id="3011" instrument_node="">

</span></a><span data-dcnode-id="2939" instrument_node=""> </span><div class="display-name-date" data-dcnode-id="2931"><span data-dcnode-id="2938" instrument_node="">
</span><span class="display-name-link" data-dcnode-id="2935"><a data-dcnode-id="2936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/user/ur0059151/"><span data-dcnode-id="2937" instrument_node="">blue-7</span></a></span><span class="review-date" data-dcnode-id="2933"><span data-dcnode-id="2934" instrument_node="">27 March 2006</span></span><span data-dcnode-id="2932" instrument_node="">
</span></div><span data-dcnode-id="2930" instrument_node="">
</span><div class="content" data-dcnode-id="2924"><span data-dcnode-id="2929" instrument_node="">
</span><div class="text show-more__control clickable" data-dcnode-id="2927"><span data-dcnode-id="2928" instrument_node="">The exciting feature of the 50th Anniversary Editon of DeMille's THE TEN COMMANDMENTS is to be able to see the original 1923 version in a pristine print along with Katherine Orrison's illuminating commentary track. Previously only available on VHS tape with the poorly surviving colorized footage of the Exodus and Parting of the Red Sea (provided as a separate Extra on the DVD)used, it was difficult to realize just how beautifully done the silent epic was. Paramount has cleaned up the print and used only the better surviving black &amp; white elements for this release. The beauty of the photography comes through with great clarity. Orrison's commentary is full of interesting insights as well as being enjoyable due to her enthusiasm about so many details. And Gaylord Carter's Wurlitzer Pipe Organ score is very impressive (as well as being a marvelous record of an organ score done by one who actually performed during the silent era)on this digital stereo recording. The 1956 remake looks and sounds great, as are the all of the special features for it, but this is exactly the same as the previous second edition of this title. I bought the new edition in order to see what they had done with the 1923 version -- and I certainly am impressed. Also, I love the packaging for this edition. Well worth updating as it is available at a very decent price.</span></div><span data-dcnode-id="2926" instrument_node="">

</span><div class="content" data-dcnode-id="2830"><span data-dcnode-id="2844" instrument_node="">
</span><div class="text show-more__control clickable" data-dcnode-id="2833"><span data-dcnode-id="2843" instrument_node="">Director: Cecil B. Demille, Script: Jeaine Macpherson, Cast: Theodore Roberts (Moses), Charles de Rochfort (Rameses), Estelle Taylor (Miriam,sister of Moses), Julia Faye (wife of pharaoh), James Neill (Aaron), Edythe Chapman (Mrs. Martha Mc Tavish), Richard Dix (John,son), Rod La Rosque (Dan,son), Nita Naldi (Sally Lung,Eurasian)</span><br data-dcnode-id="2842"><br data-dcnode-id="2841"><span data-dcnode-id="2840" instrument_node="">Most people today have probably never seen this film. It is now available on the 50th anniversary set with the 1956 version. The 1956 version was an amazing movie but in many ways I prefer this one, Cecil B Demille's 1923 original. Many people will be surprised upon first viewing of this film. Demille uses a different approach thin in his 1956 remake. This film has two parts. The first part is set during the time of the exodus in the old testament. The Hebrew nation is enslaved by the Egyptians under the ruthless rule of the pharaoh Rameses. Moses as the chosen leader of the Jews frees his people from the Egyptians. God gives him the power to inflict plagues upon the Egyptians. He then leads his people on the great exodus across the desert to the Red Sea. God gives him the power to part the sea so the Jewish people can cross. Phaorah orders his army to go after the Jews across the parted Red Sea but God had the sea 'return to normal' so the army drowns.</span><br data-dcnode-id="2839"><br data-dcnode-id="2838"><span data-dcnode-id="2837" instrument_node="">Make no mistake, this film was a major production in its day and very high budget for its time. Demille uses very elaborate sets for this production. The exterior wall of the great Egyptian city is just like the one used in the 1956 version. Many extras were used in the making of this film. During the great exodus, there appears to be people for as far as the eye can see. You can see this great line of people spread out across the desert. Camels were seen during the exodus but as it turns out, camels were not in the middle east during that time period. The parting of the Red Sea in the 1956 version was considered an amazing special effect for its time. I was very curious as to how they would be able to pull this off in 1923! I was quite amazed!! The special effects used for the parting of the sea is just as good as the 56 perhaps better. One thing I really like about the special effects of this film is the wall of fire that Moses creates to keep the Egyptian army at bay. In the 56 version animation was used for the fire. In this version real fire was used using a double exposure technique that I thought was more impressive. Mr Demille was very loyal to his actors. He would use many of the same actors in a number of his films. The women who plays the part of pharaoh's wife and the boy that played his son are both involved in the 56 version as well as the film editor.</span><br data-dcnode-id="2836"><br data-dcnode-id="2835"><span data-dcnode-id="2834" instrument_node="">The film switches gears totally for the second half. We are now in modern times. It starts with a mother reading passages from the book of Exodus to her two sons. All the drama from the first half was simply her reading being acted out. The rest of the film is a morality tale between two sons. The mother and one son are deeply religious while the other son is a nonbeliever. He makes fun of his brother's silly beliefs so the mother kicks him out of the house for being a heathen. The believing son lives a modest life while the unbelieving son becomes very wealthy. He even gets the women they both like! He becomes a wealthy contractor employing his brother as a worker. However, the unbelieving brother's life will be filed with misfortune eventually leading to his death. The twist in the second half of the film makes for a interesting viewing experience. I like the contrast between ancient and modern times. Katherine Orrison in her commentary states that the modern sequence will probably seem more dated to the average viewer. I tend to agree. It is interesting to see how people lived and dressed during those times. The modern sequence is filmed mostly on location in San Francisco. It is cool to see how San Fran looked back then. The generation gap between the mother and her sons is very evident. This was the roaring 20's! Katherine Orrison gives an insightful commentary on both films but see seems to have a special fondness for this one. I can understand why.</span></div><span data-dcnode-id="2832" instrument_node="">

</span></a><span data-dcnode-id="2780" instrument_node=""> </span><div class="display-name-date" data-dcnode-id="2772"><span data-dcnode-id="2779" instrument_node="">

</span><div class="content" data-dcnode-id="2749"><span data-dcnode-id="2770" instrument_node="">
</span><div class="text show-more__control" data-dcnode-id="2765"><span data-dcnode-id="2769" instrument_node="">Whenever anybody says THE TEN COMMANDMENTS, we think of the fun, uplifting 1956 epic made by DeMille and starring Charleton Heston, Yul Brynner, etc. etc.  Not too many people know that film is a remake of DeMille's own 1923 film of the same name. The 1923 version has so much zip to it, mainly because in it's 90 minute plus time, DeMille has to tell TWO stories.  The first is the story of Moses.  He has to lead the exodus from Egypt, part the Red Sea (an awesome scene done in early two-tone Technicolor) and slap some sense in his followers who wrongly decide to worship the Golden Calf.  All that in 45 minutes.  That means it spools out really, really fast. The rest of the film takes place in modern day San Francisco, where two brothers, one a hard working carpenter, the other, a wealthy but scheming architect battle.  We know their grey haired mom is a good Christian, because she constantly carries around a Bible as big as a cinderblock!  </span><br data-dcnode-id="2768"><br data-dcnode-id="2767"><span data-dcnode-id="2766" instrument_node="">      Beautifully restored, witha  great piano and organ score.  This is an energetic silent well worth catching.</span></div><span data-dcnode-id="2764" instrument_node="">

</span><a class="title" data-dcnode-id="2713" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/review/rw1673477/"><span data-dcnode-id="2714" instrument_node=""> Thou shalt remember Cecil B.De Mille...
</span></a><span data-dcnode-id="2712" instrument_node=""> </span><div class="display-name-date" data-dcnode-id="2704"><span data-dcnode-id="2711" instrument_node="">
</span><span class="display-name-link" data-dcnode-id="2708"><a data-dcnode-id="2709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/user/ur1219578/"><span data-dcnode-id="2710" instrument_node="">dbdumonteil</span></a></span><span class="review-date" data-dcnode-id="2706"><span data-dcnode-id="2707" instrument_node="">13 June 2007</span></span><span data-dcnode-id="2705" instrument_node="">

</span><div class="content" data-dcnode-id="2688"><span data-dcnode-id="2702" instrument_node="">
</span><div class="text show-more__control clickable" data-dcnode-id="2691"><span data-dcnode-id="2701" instrument_node="">Today,all his epics ("ten commandments" 1 and 2,"sign of the cross" "Samson and Delilah" ...° have worn remarkably well.</span><br data-dcnode-id="2700"><br data-dcnode-id="2699"><span data-dcnode-id="2698" instrument_node="">Like many people ,I saw the 1956 version well before the silent one.The prologue (which is very long for a prologue) has a plot similar to the 1956 version from the plagues to the golden calf orgy.Even the Parting of the Red Sea (and it's quite impressive for 1923!) and the writing of the Holy Tablets are here (it looks more like some kind of mystic firework here).As for the orgy,it's simply better than the color version.That said I like that latter version best,because the gap between the biblical tale and the modern one makes that the two parts do not hang very well,in spite of a brilliant transition : Moses and his people saga suddenly segues into a mother reading the Bible to her sons.</span><br data-dcnode-id="2697"><br data-dcnode-id="2696"><span data-dcnode-id="2695" instrument_node="">The second part will deal with the story of two brothers,one of whom trying to break these "fusty" commandments and not be broken by them. There are interesting parallels: the workers on the building site and the slaves working for pharaoh on the pyramids,the hero who ,like "pharaoh's tribe ,is drowned in the tide" .Little by little,the film becomes slowly but inexorably overtly Christian: the momma hints to carpenters,nice carpenters,there's a short return to biblical times but depicting a scene of Jesus' s life and unlike the bad woman who became a leper in the prologue,salvation is around the corner for the evil millionaire's wife.Lines from St Matthew ("he gained the world but lost his soul") add to this feeling a redemption.</span><br data-dcnode-id="2694"><br data-dcnode-id="2693"><span data-dcnode-id="2692" instrument_node="">Despite the reservations expressed above,De Mille was a storyteller extraordinaire,who equaled D.W .Griffith .Thou shalt not overlook him.</span></div><span data-dcnode-id="2690" instrument_node="">

</span></a><span data-dcnode-id="2618" instrument_node=""> </span><div class="display-name-date" data-dcnode-id="2610"><span data-dcnode-id="2617" instrument_node="">
</span><span class="display-name-link" data-dcnode-id="2614"><a data-dcnode-id="2615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/user/ur15896852/"><span data-dcnode-id="2616" instrument_node="">wes-connors</span></a></span><span class="review-date" data-dcnode-id="2612"><span data-dcnode-id="2613" instrument_node="">8 February 2009</span></span><span data-dcnode-id="2611" instrument_node="">
</span></div><span data-dcnode-id="2609" instrument_node="">
</span><div class="content" data-dcnode-id="2588"><span data-dcnode-id="2608" instrument_node="">
</span><div class="text show-more__control clickable" data-dcnode-id="2591"><span data-dcnode-id="2607" instrument_node="">Cecil B. DeMille's Paramount EPIC "The Ten Commandments" tells the Old Testament's "Moses" story during its first hour. The "special effects" highlights are: Theodore Roberts (as Moses) parting the Red Sea, and the Biblical patriarch's thunderous receiving of God's commandments. The production is first rate throughout. After about fifty minutes of spectacle, the film switches to a "Modern Story" - wherein Mr. DeMille seeks to tell a morality story involving "The Ten Commandments".</span><br data-dcnode-id="2606"><br data-dcnode-id="2605"><span data-dcnode-id="2604" instrument_node="">For the main story (the more memorable Moses segments were a mere "prologue"), DeMille introduces the McTavish brothers - saintly carpenter Richard Dix (as John), and partying atheist Rod La Rocque (as Dan). While Mr. Dix stays home to read The Bible, with dear mother Edythe Chapman (as Martha McTavish), Mr. La Rocque breaks Commandments, with lovely Leatrice Joy (as Mary Leigh). Of course, Dix falls in love with Ms. Joy, after she becomes his brother's wife </span><br data-dcnode-id="2603"><br data-dcnode-id="2602"><span data-dcnode-id="2601" instrument_node="">DeMille's morality tale is extremely heavy-handed, but nevertheless enticing, and expertly directed. </span><br data-dcnode-id="2600"><br data-dcnode-id="2599"><span data-dcnode-id="2598" instrument_node="">The "Biblical" and "Modern" story format recalls D.W. Griffith's superior "Intolerance" (1916). The all-star cast (it's 1923, remember) performs exceptionally, with La Rocque being seen in one of his finest performances. As any actor will tell you, La Rocque was halfway there, upon receiving the "bad brother" role, over Dix - and, La Rocque runs away with the film. His is a "Best Actor"-worthy performance. Nefarious Nita Naldi (as Sally Lung) leads a strong supporting cast.</span><br data-dcnode-id="2597"><br data-dcnode-id="2596"><span data-dcnode-id="2595" instrument_node="">All things considered, this one's a lot more fun than the 1956 re-make.</span><br data-dcnode-id="2594"><br data-dcnode-id="2593"><span data-dcnode-id="2592" instrument_node="">********* The Ten Commandments (11/23/23) Cecil B. DeMille ~ Rod La Rocque, Richard Dix, Leatrice Joy, Theodore Roberts</span></div><span data-dcnode-id="2590" instrument_node="">
</span><span data-dcnode-id="2589" instrument_node="">

</span><div class="lister-item-content" data-dcnode-id="2512"><span data-dcnode-id="2541" instrument_node="">
</span><a class="title" data-dcnode-id="2539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/review/rw0003169/"><span data-dcnode-id="2540" instrument_node=""> Thou shalt not give a stupid review.
</span></a><span data-dcnode-id="2538" instrument_node=""> </span><div class="display-name-date" data-dcnode-id="2530"><span data-dcnode-id="2537" instrument_node="">
</span><span class="display-name-link" data-dcnode-id="2534"><a data-dcnode-id="2535" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/user/ur0513674/"><span data-dcnode-id="2536" instrument_node="">sadie_thompson</span></a></span><span class="review-date" data-dcnode-id="2532"><span data-dcnode-id="2533" instrument_node="">22 October 2003</span></span><span data-dcnode-id="2531" instrument_node="">
</span></div><span data-dcnode-id="2529" instrument_node="">
</span><div class="content" data-dcnode-id="2514"><span data-dcnode-id="2528" instrument_node="">
</span><div class="text show-more__control clickable" data-dcnode-id="2517"><span data-dcnode-id="2527" instrument_node="">Oops, broke that one.  All joking aside, this film is incredible. Astonishing effects for the early 20s, where you couldn't twist any digital domain to your whims.  The parting of the Red Sea is pretty convincing, even if was Jello.  (Can you imagine wading through Jello?  Ick.) </span><br data-dcnode-id="2526"><br data-dcnode-id="2525"><span data-dcnode-id="2524" instrument_node="">
This film is told in two parts, as we get to see Moses receiving the Ten Commandments from God in what looks like a Fourth of July celebration.  One with good fireworks.  Most people know that story--Moses goes to deliver the Commandments, only to find everyone involved in a massive orgy.  Here de Mille is in his element.  He did so many massive orgies that he should have copyrighted them.  We see people making out (not having sex--that would be wrong), men licking wine off women's feet (that is wrong, by gum), and a huge number of people trying to climb up what looks like a curtain.  Why they're doing this only de Mille knows.  All we need is Gloria Swanson being pawed by a tiger to make everything perfect.  As some viewers may not know, de Mille can show whatever sin and debauchery he wants, because the sinners are going to get it in the end.  They're gonna get it bad.  From the giddy Israelites and their golden calf we're transported to the modern day (1923), where a woman reads the Bible.  She can't be the sinner.  A son stands nearby, looking very noble and content.  Can't be him.  Then, we see the other son.  He looks bored and disbelieving.  We have a sinner!  Oh, and he's a bad one.  He dances on Sunday, he steals women from their intendeds, he's involved in dozens of dirty dealings, and he's dating an Oriental leper.   Beg pardon?  I guess she's just thrown in for fun.</span><br data-dcnode-id="2523"><br data-dcnode-id="2522"><span data-dcnode-id="2521" instrument_node="">Of course, all's well that ends well, and everything turns out okay.  This movie is silent, so the acting is a bit in-your-face, and the characters are extreme, but hey.  It's necessary--literacy wasn't rampant back then, so filmmakers had to make everything painfully obvious.  Some people weren't able to read the title cards, and they'd be lost without the silent films' distinctive pantomime.</span><br data-dcnode-id="2520"><br data-dcnode-id="2519"><span data-dcnode-id="2518" instrument_node="">Side benefit--the version I have on video features a nifty soundtrack by that powerhouse of the movie palace, the Wurlitzer organ.</span></div><span data-dcnode-id="2516" instrument_node="">

</span><div class="text show-more__control" data-dcnode-id="2402"><span data-dcnode-id="2403" instrument_node="">THE TEN COMMANDMENTS is one of Cecil B. DeMille's silent epics, although he would surpass its quality when he went on to remake it with Charlton Heston in the 1950s. This is still a very good film from its era and sufficiently epic to impress to this day - those sets! This lengthy production is divided into two very different halves, the first a straight Genesis re-telling with some great early special effects work used to depict the parting of the Red Sea. The second is a contemporary family drama in which the Old Testament plays a very important role in the modern day. Engaging stuff.</span></div><span data-dcnode-id="2401" instrument_node="">

</span><a class="title" data-dcnode-id="2385" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/review/rw0003166/"><span data-dcnode-id="2386" instrument_node=""> Triumphant film-making
</span></a><span data-dcnode-id="2384" instrument_node=""> </span><div class="display-name-date" data-dcnode-id="2376"><span data-dcnode-id="2383" instrument_node="">
</span><span class="display-name-link" data-dcnode-id="2380"><a data-dcnode-id="2381" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/user/ur2398062/"><span data-dcnode-id="2382" instrument_node="">Kieran_Kenney</span></a></span><span class="review-date" data-dcnode-id="2378"><span data-dcnode-id="2379" instrument_node="">12 August 2003</span></span><span data-dcnode-id="2377" instrument_node="">
</span></div><span data-dcnode-id="2375" instrument_node="">
</span><div class="content" data-dcnode-id="2353"><span data-dcnode-id="2374" instrument_node="">
</span><div class="text show-more__control" data-dcnode-id="2369"><span data-dcnode-id="2373" instrument_node="">In the early twenties, it was perfectly alright to show sinners revelling extravagantly and unashamedly in the sins of the flesh.  All you had to do was either punish or purify them in the end, and everything would turn out just fine.  This is the lesson we learn from watching the second half of Cecil B DeMille's gargantuan epic or 1923.  And it is the prologue of the movie that teaches us that deMille had more money to spend on his own films than the old man upstairs.</span><br data-dcnode-id="2372"><br data-dcnode-id="2371"><span data-dcnode-id="2370" instrument_node=""> As a lavish production, TTC is probably one of CBdM's greatest achievements, surpassing in quality and size the 1950s remake, Cleopatra (1934) and all billion-or-so versions of The Squaw Man, all of which deMille would directed.  His handling of his actors, his  attention to detail and unbridled imagination call to mind a time when you could spend whatever amount of money you wanted on a film without being Jerry Bruckheimer.</span></div><span data-dcnode-id="2368" instrument_node="">

</span><div class="text show-more__control" data-dcnode-id="2239"><span data-dcnode-id="2255" instrument_node="">Cecil B. DeMille's original silent version of the Ten Commandments is mostly a heavy-handed morality play set in 1923. The prologue, which runs just over 40 minutes, shows an abbreviated version of the Biblical story of the Exodus. Most of the dialogue is taken from the Bible. Despite the technical limitations of the era, it succeeds as a fast-paced spectacular. The parting of the Red Sea is just as awe-inspiring in its own way as in the remake, and it's always interesting to see how silent actors compensated for the lack of sound with facial expressions and exaggerated gestures. The musical score is fantastic and everything clips along at a nice pace. As with the remake, it's never subtle, but it's never boring, either.</span><br data-dcnode-id="2254"><br data-dcnode-id="2253"><span data-dcnode-id="2252" instrument_node="">I wish I could say the same about the main part of the feature. After Moses punishes the Hebrews for worshipping the golden calf, the film moves to the present day (1920s). A mother reads to her grown sons from the Bible. The two brothers are basically Goofus and Gallant. From here, everything is completely predictable.</span><br data-dcnode-id="2251"><br data-dcnode-id="2250"><span data-dcnode-id="2249" instrument_node="">It's well done so that one can overlook the lack of subtlety. DeMille has a very explicit religious message, and he's not above bludgeoning the viewer over the head with it. That was the style of the day, and the limitations of the silent film force a certain amount of overstatement.</span><br data-dcnode-id="2248"><br data-dcnode-id="2247"><span data-dcnode-id="2246" instrument_node="">However, unlike most films of this period, this one goes on far too long. It's about ninety minutes but seems far longer. The bad son goes out into the world, declaring that he's going to break all 10 Commandments! Naturally, he becomes a successful businessman... while his humble older brother (a carpenter, naturally) tries not to envy him or covet his wife. There's never any doubt about how it's all going to end: DeMille's message is that "the wages of sin is death", but he takes far too long to get there.</span><br data-dcnode-id="2245"><br data-dcnode-id="2244"><span data-dcnode-id="2243" instrument_node="">The complete film is about 135 minutes, which must have been an epic length for that era. I would have enjoyed it more if the modern story had been trimmed by about 15 minutes.</span><br data-dcnode-id="2242"><br data-dcnode-id="2241"><span data-dcnode-id="2240" instrument_node="">In his way, DeMille was the forerunner of Mel Gibson. Both are gifted filmmakers with devout religious beliefs --- short on subtlety, heavy on the bloodshed and headlong action. The 1956 remake of Ten Commandments is a spectacular example of epic film-making, and as this 1923 silent original is now included as an extra disc in the DVD, it's worth checking out. I can't imagine wanting to sit through the modern story again, though; I'll probably shut it off once Moses segues off screen.</span></div><span data-dcnode-id="2238" instrument_node="">

</span><div class="text show-more__control" data-dcnode-id="2161"><span data-dcnode-id="2180" instrument_node="">The 50th anniversary DVD of the 1956 'The Ten Commandments' includes Cecil B. DeMille's original 1923 version. The restored print of this history making silent film is simply amazing, so sharp and crystal clear with zero flickering. Furthermore, this version is the same, the reverse and also different from the 1956 version.</span><br data-dcnode-id="2179"><br data-dcnode-id="2178"><span data-dcnode-id="2177" instrument_node="">It's the same in that De Mille rebuilt the same set of Ramses' city -- larger than the towers built for D. W. Griffith's 'Intolerance' (1916)-- for the '56 version, used much of the same script, camera angles and other sets. It's the reverse, because as Katherine Orrison notes on the commentary track, if a shot was done from the right side in the '23 version, it was filmed from the left in the '56 version, and vice versa. She kids us not! She's written three books about "C.B." </span><br data-dcnode-id="2176"><br data-dcnode-id="2175"><span data-dcnode-id="2174" instrument_node="">It is different from the '56 version in two major ways. First, the story of Moses begins with him giving the ninth plague (killing the first born), and ends with him hurling the 10 Commandments down at the revellers worshipping the Golden Calf below Mount Sinai. Second, the movie then becomes a second story (the Biblical scenes are called "The Prologue"), taking place in San Francisco.</span><br data-dcnode-id="2173"><br data-dcnode-id="2172"><span data-dcnode-id="2171" instrument_node="">"The Modern Story" is about the brothers John, a carpenter (Richard Dix) and Danny, an architect (Rod La Roque) and their struggles with morality. Danny vows to break all ten commandments, and by the end of the movie, he has. Like Ramses drowned in the Red Sea, Danny, escaping to Mexico in his speed boat 'Defiance' also drowns smashed on a large rock that looks suspiciously like Mount Sinai. Note: Before Richard Dix went on to fame and success in sound movies (mostly for RKO), he starred in many other silent films-- check out his great performance in 'The Vanishing American' (1925) as an Indian.</span><br data-dcnode-id="2170"><br data-dcnode-id="2169"><span data-dcnode-id="2168" instrument_node="">Visually interesting throughout, the film even takes place on the construction site of the Catholic cathedral in Washington Square in San Francisco as it was being built. Actually shot in the outside construction elevator on the roof, you get to see a lot of the vista of 1923 San Francisco! Let's all meet at Washington Square for the 100th anniversary of this film! </span><br data-dcnode-id="2167"><br data-dcnode-id="2166"><span data-dcnode-id="2165" instrument_node="">Plus the whole movie really works. What sets and costumes! The parting of the Red Sea in this version is even better than the 1956 one! </span><br data-dcnode-id="2164"><br data-dcnode-id="2163"><span data-dcnode-id="2162" instrument_node="">I give it an 8.</span></div><span data-dcnode-id="2160" instrument_node="">

</span><div class="text show-more__control" data-dcnode-id="2075"><span data-dcnode-id="2082" instrument_node="">Sunday January 8, 4:00pm The Paramount Theater, Seattle</span><br data-dcnode-id="2081"><br data-dcnode-id="2080"><span data-dcnode-id="2079" instrument_node="">Countless slaves pull a gleaming white sphinx, inch-by-inch, across the desert sands. Brutalized by their cruel Egyptian masters, The Children of Israel toil before the monumental city gates of Pharaoh Rameses II. The opening scenes of Cecil B. DeMille's 1923 epic "The Ten Commandments" represent the historical spectacle of Hollywood's silent era at its grandest and most expressive. DeMille blended the intensely dramatic performance of his actors with the spectacular architecture of his sets in a way that seemed to bring the past to life for the movie going audience. His exhaustive research and striving for authenticity was limited only by his personal satisfaction. Of the roughly 2500 extras used one tenth were orthodox Jews from Los Angeles, many, recent immigrants who felt they were living the history of their ancestors. The flight from Egypt includes the added surprise of two-color Technicolor while the scenes of decadence as the Golden Calf is worshiped by an undulating mob are as vibrantly electric as any ever filmed. To be fair, it bears pointing out that the forty-five minute Ancient Egypt portion of "The Ten Commandments" is only a prologue to the modern story, which today seems dated and irrelevant. Two brothers, one good and one evil, alternately respect and defy the ancient laws of Moses and live with the consequences. The San Francisco setting may be of interest to anyone with ties to "the city by the bay", specifically the 1920's North Beach neighborhood, Saints Peter and Paul Church and Washington Square Park which are all prominently featured. Sexy Nita Naldi is also delightfully vampish as the heavy-lidded other woman draped in furs. The Jeanie Macpherson screenplay attempts to draw parallels between the story of Exodus and modern life, much more successfully accomplished in Michael Curtiz 1928 epic masterpiece "Noah's Ark", but the jazz age story can't hold a candle to the grandeur of the ancient world. DeMille's original does succeed if compared to the bloated, boringly over-detailed story and hammy acting of his 1956 remake. The 1923 prologue is concise, well paced and beautifully executed. The ancient Babylon of D. W. Griffith's 1916 spectacular "Intolerance" appears staged and remote when compared to a genuine sense of seeing and feeling the "hear and now" conjured up by DeMille's City of the Pharaoh. Hollywood produced progressively greater and more fantastic historical epics as the era drew to a close, including the MGM spectacle "Ben Hur" in 1925 and DeMille's "King of Kings" in 1927.</span><br data-dcnode-id="2078"><br data-dcnode-id="2077"><span data-dcnode-id="2076" instrument_node="">"  the spirit of the spectacle, and the joy taken in its own magic, was unique to the silent film." - William K. Everson</span></div><span data-dcnode-id="2074" instrument_node="">
</span><span data-dcnode-id="2073" instrument_node="">

</span><div class="lister-item mode-detail imdb-user-review collapsable" data-dcnode-id="1993" data-initialized="true" data-review-id="rw2020009" data-vote-url="/title/tt0014532/review/rw2020009/vote/interesting"><span data-dcnode-id="2062" instrument_node="">
</span><div class="review-container" data-dcnode-id="2030" style="max-height: 300px;"><span data-dcnode-id="2061" instrument_node="">
</span><div class="lister-item-content" data-dcnode-id="2034"><span data-dcnode-id="2060" instrument_node="">
</span><a class="title" data-dcnode-id="2058" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/review/rw2020009/"><span data-dcnode-id="2059" instrument_node=""> Impressive
</span></a><span data-dcnode-id="2057" instrument_node=""> </span><div class="display-name-date" data-dcnode-id="2049"><span data-dcnode-id="2056" instrument_node="">
</span><span class="display-name-link" data-dcnode-id="2053"><a data-dcnode-id="2054" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/user/ur13134536/"><span data-dcnode-id="2055" instrument_node="">Michael_Elliott</span></a></span><span class="review-date" data-dcnode-id="2051"><span data-dcnode-id="2052" instrument_node="">8 February 2009</span></span><span data-dcnode-id="2050" instrument_node="">
</span></div><span data-dcnode-id="2048" instrument_node="">
</span><div class="content" data-dcnode-id="2036"><span data-dcnode-id="2047" instrument_node="">
</span><div class="text show-more__control clickable" data-dcnode-id="2039"><span data-dcnode-id="2046" instrument_node="">Ten Commandments, The (1923) </span><br data-dcnode-id="2045"><br data-dcnode-id="2044"><span data-dcnode-id="2043" instrument_node="">*** (out of 4) </span><br data-dcnode-id="2042"><br data-dcnode-id="2041"><span data-dcnode-id="2040" instrument_node="">DeMille's first attempt at this story tells two different stories. The opening prologue, running just under and hour, sees Moses (Theodore Roberts) freeing the slaves, parting the Red Sea and eventually correcting those who wish to worship the Golden Calf. The second half of the story centers on two brothers; one good (Richard Dix), the other bad (Rod La Rocque) and both in love with the same woman (Leatrice Joy). The bad brother ends up marrying the girl and becoming quite rich by breaking the law in his building contractor position but all of his sins are eventually going to catch up with him. This is certainly a strange mixture of a film because I was a little surprised to see DeMille spend most of its 136-minute running time with the two brothers. The beginning stuff with Moses is pretty much just a prologue but it's a rather interesting one needless to say. While the special effects can't hold a candle to the eventual remake what we have here is still a treat for the eyes. The parting of the Red Sea certainly sticks out and while it's somewhat obvious how it was done the effect still holds up and manages to impress. The chariot crashes, which were apparently real, also stand out as does the large number of extras to carry out the Pharaoh scenes. Roberts, a DeMille regular, is pretty good in the role of Moses even though he comes off a tad bit too passionate. The second half of the film is rather hit and miss but for the most part I enjoyed it as well. The real standout here is the performance by Richard Dix who would of course go on to have an impressive career in film. He steals the film as the more timid brother who puts God before everything and his passion, a deep one, comes across very well with Dix hitting all the right notes. La Rocque is also devilishly good in his role and very believable as well. Joy makes for a good "woman in the middle" as well. Edythe Chapman, another DeMille regular, plays the boys mother but doesn't fair as good. Her character is so poorly written and over the top in her religious beliefs and demands that you can't help but start to hate her when she's suppose to be the one holding the family together. I wasn't impressed with the performance either but I'm going to guess much of this is more to do with the screenplay than anything else. The biggest problem with the film is that the second half is pretty common for the type of melodrama of the day. While it's told very well by DeMille it still comes off rather predictable and straight forward. With that said, this 1923 silent still holds up quite well on all levels and folks should certainly check it out to see what DeMille would later remake. The director would fair better several years later with The King of Kings.</span></div><span data-dcnode-id="2038" instrument_node="">

</span><span class="display-name-link" data-dcnode-id="1962"><a data-dcnode-id="1963" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/user/ur1399158/"><span data-dcnode-id="1964" instrument_node="">Bunuel1976</span></a></span><span class="review-date" data-dcnode-id="1960"><span data-dcnode-id="1961" instrument_node="">17 April 2009</span></span><span data-dcnode-id="1959" instrument_node="">
</span></div><span data-dcnode-id="1957" instrument_node="">
</span><div class="content" data-dcnode-id="1951"><span data-dcnode-id="1956" instrument_node="">
</span><div class="text show-more__control clickable" data-dcnode-id="1954"><span data-dcnode-id="1955" instrument_node="">This was another Biblical epic from the Silent era which I had long wanted to check out; even so, I had owned the DVD (accompanying the more popular 1956 version of the same events, from the same showman director no less, and which has received countless viewings from yours truly) for some time before I finally got to it. As with the later NOAH'S ARK (1928), virtually watched simultaneously, it seems that film-makers of the time were unsure of the appeal of such religious epics, so that they had to present them within the context of a modern story; still, De Mille's THE KING OF KINGS (a milestone in itself for being the first and, for a time, only picture to show Jesus' face) preceded that Michael Curtiz work by a year and it was set exclusively in the time of Christ. In this case, only the first 50 minutes or so are dedicated to the familiar tale involving Moses (needless to say, the dull Theodore Roberts is no match for the stoic Charlton Heston in the remake): the exodus, the parting of the Red Sea, the writing of the tablets and the Golden Calf; these are clearly heavily streamlined in comparison with the almost 4-hour long 1956 THE TEN COMMANDMENTS and, in spite of their obvious care, gargantuan scale and excellent special effects, can feel unsatisfying in that respect...especially when the parallel story is so hokey, unnecessarily inflated and, at the end of the day, somewhat ordinary! The latter sees a Bible-thumping matriarch (which she proudly holds even when posing for a portrait), her two sons and the girl who comes between them: one of the boys (played by Richard Dix) is righteous – and, as his mother claims, engaged in a skill (carpentry) which has produced some notable exponents (alluding naturally to Christ himself) – while the other mocks religion and vows to become somebody by his own merits. Eventually, we find him as a top contractor and, perhaps to make amends, takes it upon himself to build a church; however, to cut costs, he reduces the amount of cement required to make the concrete, with the result that the walls are weak and liable to collapse at any time (coincidentally, the very previous day I watched a film in which a character had faced a similar dilemma – GIVE US THIS DAY aka Christ IN CONCRETE [1949]): this ruse is discovered by Dix, appointed "boss-carpenter" on the project, and he confronts his brotherbut, before anything can be done about it, the whole edifice falls on top of the mother who picks just that moment to visit the premises! The morally-corrupt sibling even forsakes his wife (the destitute girl they had taken in and whom Dix relinquished on his account) for an Asian temptress, whom he eventually kills (the only commandment, according to his spouse, not yet broken by him); in the end, the boy gets his come-uppance and Dix can reclaim his lady. While the two sections may seem to jell better than those in NOAH'S ARK, the overall achievement is a lesser one – and not just to it, but THE KING OF KINGS (by the way, Christ makes a 'cameo' appearance here towards the end!) and, most importantly, the later versionif still quite worthwhile in itself.</span></div><span data-dcnode-id="1953" instrument_node="">

</span><div class="text show-more__control" data-dcnode-id="1745"><span data-dcnode-id="1752" instrument_node="">The first version of 'The Ten Commandments' is two films in one, really, and within its two hour running time you can see hints and ideas which were taken forward by other filmmakers in later years; not just DeMille referencing himself with the parting of the Red Sea in his 1950s remake, but in The Fountainhead (referencing the shot with the lift going up the side of the cathedral), Psycho (Nina Naldi pulling the curtain off the rail as she falls), and Sunset Boulevard (Naldi again, hands like claws as she extracts herself from the sack of jute in which she smuggled herself).</span><br data-dcnode-id="1751"><br data-dcnode-id="1750"><span data-dcnode-id="1749" instrument_node="">The story is fairly simple - most of the first hour is the standard Moses and let my people go tale from Exodus in the Old Testament, well developed and shot with some great special effects (the aforementioned parting of the sea). The rest of the film is modern moral - Edythe Chapman, a god-fearing old lady, has two sons - Danny (Rod La Rocque)and John (Richard Dix). Danny doesn't believe in the Ten Commandments and considers them outmoded and a barrier to success. When Mary (Leatrice Joy) comes into their lives, she causes problems between the brothers and unwittingly sets Danny on a path which leads him to slowly break one Commandments after another.</span><br data-dcnode-id="1748"><br data-dcnode-id="1747"><span data-dcnode-id="1746" instrument_node="">As this is a moral story, it does get a little preachy in places, but in the context of the time it was made that was probably expected. It is a spectacle and an epic of sorts, although not as much as its remake - it is actually a simple but effective film, which although a little creaky and not boasting the most subtle performances, still stands up to viewing today, and makes a fascinating comparison to Charlton Heston's Moses years later.</span></div><span data-dcnode-id="1744" instrument_node="">

</span><a class="title" data-dcnode-id="1708" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/review/rw4130565/"><span data-dcnode-id="1709" instrument_node=""> Sermon on Tablets
</span></a><span data-dcnode-id="1707" instrument_node=""> </span><div class="display-name-date" data-dcnode-id="1699"><span data-dcnode-id="1706" instrument_node="">
</span><span class="display-name-link" data-dcnode-id="1703"><a data-dcnode-id="1704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/user/ur0853359/"><span data-dcnode-id="1705" instrument_node="">lugonian</span></a></span><span class="review-date" data-dcnode-id="1701"><span data-dcnode-id="1702" instrument_node="">15 April 2018</span></span><span data-dcnode-id="1700" instrument_node="">
</span></div><span data-dcnode-id="1698" instrument_node="">
</span><div class="content" data-dcnode-id="1674"><span data-dcnode-id="1697" instrument_node="">
</span><div class="text show-more__control clickable" data-dcnode-id="1677"><span data-dcnode-id="1696" instrument_node="">THE TEN COMMANDMENTS (Paramount, 1923), a super special production directed by Cecil B. DeMille, is the director's attempt in religious spectacle. Although DeMille already directed a story on Joan of Arc in JOAN THE WOMAN (1917), this is his attempt on doing something a little bit different from his previous efforts. As with the earlier silent classic of D.W. Griffith's INTOLERANCE (1916), consisting of four separate stories in no particular order, this edition to THE TEN COMMANDMENTS, unlike DeMille's most famous super four-hour 1956 edition starring Charlton Heston, this earlier 136 minute production combines Old Testament story according to Exodus followed by another story set in modern times. The Biblical portion, clocked at 50 minutes, as opposed to the modern-day story taking up much of the proceedings at 85 minutes, could have been a separate movie at best. With two movies for the price of one, THE TEN COMMANDMENTS simply shows God's Law being as relevant today as it was centuries ago.</span><br data-dcnode-id="1695"><br data-dcnode-id="1694"><span data-dcnode-id="1693" instrument_node="">Opening Title: "Our modern world defined God as a "religious complex" and laughed at The Ten Commandments as OLD-FASHIONED. Then through the laughter came the shattering thunder of the World War. And now a blood drenched, bitter world - no longer laughing - cries for a way out. There is but one way out. It existed before it was engraved upon tablets of stone. It will exist when stone has crumbled. The Ten Commandments are not rules to obey as a personal favor to God. They are the fundamental principles without which mankind cannot live together. They are not laws they are the LAW."</span><br data-dcnode-id="1692"><br data-dcnode-id="1691"><span data-dcnode-id="1690" instrument_node="">Prologue: Egypt, centuries ago, where slaves are seen pulling the wheels carrying a gigantic statue, with those getting whipped as they tire of such strenuous work. Ramesus, the Magnificent (Charles DeRoche) rules with no compassion while his sister, Miriam (Estelle Taylor) offers water to the abused slaves. Moses, the Lawgiver (Theodore Roberts), through the guidance of God's voice, leads His Children of Israel from bondage to the Promised Land. As Moses goes to Mount Sinai to speak to God in prayer, God answers him by posting on two tablets through volts of lightning his law he labels The Ten Commandments. In the meantime, his people are forsaking their God in favor of worshipping the Golden Calf. </span><br data-dcnode-id="1689"><br data-dcnode-id="1688"><span data-dcnode-id="1687" instrument_node="">Modern Story: Widow Martha McTavish (Edythe Chapman) is an overly religious woman with two grown sons, John (Richard Dix), a carpenter, and Dan (Rod LaRocque), an atheist who fails to see his mother's logic in her beliefs. While eating at Dugan's Lunch Wagon, Dan encounters Mary Leigh (Leatrice Joy), a homeless young girl accompanied by her dog, out in the rain, stealing his food. Rather than having her arrested, Dan invites her to her home for dinner with the company of his suspicious mother and brother. Through the passage of time, John has fallen in love with Mary, but loses her to Dan. Dan doesn't prove himself a good husband as he practically breaks the Ten Commandments by having a mistress in Sally Lung (Nita Naldi) from Molokai Leper Island, and being the one responsible for one of his crooked deals by using bad concrete on a Cathedral he is constructing, and much more. </span><br data-dcnode-id="1686"><br data-dcnode-id="1685"><span data-dcnode-id="1684" instrument_node="">For anyone expecting a near scene-by-scene original edition to DeMille's 1956 remake would be totally disappointed. The Biblical portion of the story shows great promise with lavish scale and costumes which makes one wish the entire story remained that way for about or under two hours. Theodore Roberts plays the white-bearded Moses to perfection, possibly his most famous movie role of his entire career. Special effects including the parting of the Red Sea is top notch, as is the visual style of the Ten Commandments flashing across the screen in full force. Though THE TEN COMMANDMENTS did prove successful in its standard form, the sudden change to modern theme seems out of place. For The Ten Commandments, it's the same then as it is today, which is what DeMille proposes to his movie audience of 1923. </span><br data-dcnode-id="1683"><br data-dcnode-id="1682"><span data-dcnode-id="1681" instrument_node="">Those witnessing Edythe Chapman's performance as an overly religious and domineering mother could possibly relate to her character who has been raised in similar circumstance, with her forceful meaning turning away children from God rather than becoming closer. Rod LaRocque, who resembles that of actor Rudolph Valentino, convincingly plays the one who gets turned off by religion. Richard Dix, early in his career before his success in talkies and beyond, and he being the best known actor in the entire cast, should gather the most attention from movie buffs. And that's Agnes Ayres in a cameo playing an outcast for the modern story.</span><br data-dcnode-id="1680"><br data-dcnode-id="1679"><span data-dcnode-id="1678" instrument_node="">Formerly presented on cable television's American Movie Classics (1993-1998), THE TEN COMMANDMENTS was also available on video cassette around the same time, accompanied by excellent organ score by Gaylord Carter. DVD with same scoring with crisp picture print condition features an added bonus of a commentary spoken by author, Katherine Orrison, whose historical accounts regarding this movie is most informative for those unfamiliar with THE TEN COMMANDMENTS according to DeMille. (***)</span></div><span data-dcnode-id="1676" instrument_node="">

</span><path d="M10.197 0L6 4.304 1.803 0 0 1.85 6 8l6-6.15" data-dcnode-id="1574" fill="#2572B3" fill-rule="evenodd"></path><span data-dcnode-id="1573" instrument_node="">

</span><div class="content" data-dcnode-id="1550"><span data-dcnode-id="1564" instrument_node="">
</span><div class="text show-more__control" data-dcnode-id="1553"><span data-dcnode-id="1563" instrument_node="">DeMille's first attempt at the story of Moses has more in common with such other silent films contrasting the ancient past to stories of today, than it does to his later epic retelling of the story. Griffith's "Intolerance" 7 years earlier had intercut several stories of sin and violence to show that the more man changes, the more he stays the same; Fritz Lang's "Destiny" and Carl Dreyer's "Leaves from Satan's Book" (both 1921) also worked out biblical themes in both ancient and modern contexts. All four directors were at one point or another quite serious Christians, though DeMille seems to have been the most obsessive in his faith, and certainly his many films on Biblical themes are often more obvious and blunt in their attempts at pedagogy.</span><br data-dcnode-id="1562"><br data-dcnode-id="1561"><span data-dcnode-id="1560" instrument_node="">Which is not to say that "The Ten Commandments" is just a lesson in "thou shalt nots"; but it is throughout informed of a very deep, and perhaps naive faith that the stories of the past are alive and exactly transferable to the lives we have today. In this case, we see a man break essentially every commandment in his quest for personal greatness, destroying in the process his own life and those of many around him, including his own mother. DeMille doesn't intercut multiple story lines like his predecessors, but rather uses the Biblical story as a 50-minute "prologue" to one feature-length story taking place in modern-day Los Angeles.</span><br data-dcnode-id="1559"><br data-dcnode-id="1558"><span data-dcnode-id="1557" instrument_node="">It's fascinating to watch the film if you've just watched the later version, as I did; the prologue is almost exactly the same as the last 50 minutes of the '56 version, picking up in the middle of the plagues that Moses has set upon Egypt. Like the later film, only the killing of the first-born is given significant play, and the majority of this section is given over to the flight from Egypt, the parting of the Red Sea (jello!) and destruction of the pursuing Egyptians, and the creation of the Ten Commandments and Moses' fury at the idolators. It's all very well done, in many respects more thrilling and powerful than in the later film, with many scenes that DeMille obviously liked enough to re-do almost shot-for-shot - the flight of the Israelites from the Egyptian city, and in particular the shot of Moses standing in front of them exhorting them to flee are good examples. Theodore Roberts was 62 when the film was made and looks a bit crazy and obsessive - he certainly feels more like the older Moses to me than Charlton Heston, though Charles de Rochefort doesn't leave a huge impression as Rameses. All in all, it's quite a spectacle and segues nicely into...</span><br data-dcnode-id="1556"><br data-dcnode-id="1555"><span data-dcnode-id="1554" instrument_node="">The modern-day story, of two carpenter/architect brothers, one ambitious and unscrupulous and the other honest and devoted to their saintly, Bible-reading mother, and how they vie for the love of a vagrant girl who comes to their doorstep, is obviously freighted with the weight of the prologue: the two brothers quarrel over God, there is honoring and not honoring of the parent, coveting of the neighbor's (or brother's) wife, stealing, etc. The central theme couldn't be more obviously stated as they build a cathedral, which ultimately collapses due to the bad brother's cheap materials, killing someone dear. Every commandment gets tested and broken at one point or another, but what's fascinating is how seamlessly they're all woven into a relatively simple story and how DeMille refuses to cast the "bad" brother as completely evil, or the "good" brother as entirely strong and virtuous. Only the mother comes across as something of a caricature. Nicely lit and shot throughout - the rain sequence where the girl first comes to the home of the family is very real and moving, and only the scenes involving the unscrupulous brother's mistress seem at all overwrought. This is overall a more graceful and disciplined film than the later version, or any of DeMille's work that I've seen so far.</span></div><span data-dcnode-id="1552" instrument_node="">

</span><span class="display-name-link" data-dcnode-id="1511"><a data-dcnode-id="1512" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/user/ur35683824/"><span data-dcnode-id="1513" instrument_node="">frankde-jong</span></a></span><span class="review-date" data-dcnode-id="1509"><span data-dcnode-id="1510" instrument_node="">10 April 2020</span></span><span data-dcnode-id="1508" instrument_node="">

</span><div class="content" data-dcnode-id="1491"><span data-dcnode-id="1505" instrument_node="">
</span><div class="text show-more__control clickable" data-dcnode-id="1494"><span data-dcnode-id="1504" instrument_node="">Up till now I only knew Cecil B. DeMille from his guest appearance in "Sunset Boulevard" (1950, Billy Wilder). He played there a director of epic dramas and after watching "The ten commandments" (1923) I knew how wel casted he was. DeMille made two films about the ten commandments, one in 1923 and one in 1956. This made me think of Yasujiro Ozu who also filmed the same story (the story of floating weeds) two times in his career (once in 1934 and a second time in 1959).</span><br data-dcnode-id="1503"><br data-dcnode-id="1502"><span data-dcnode-id="1501" instrument_node="">"The ten commandments" tells the story of the Old Testament (Mozes). It is noteworthy that both films that DeMille made about the Old Testament were followed within a few years by an adaptation of "Ben Hur", a story in which the character of Jesus Christ and thus the New Testament plays en important part. I am talking about the films of 1925 (Fred Niblo) and 1959 (William Wyler).</span><br data-dcnode-id="1500"><br data-dcnode-id="1499"><span data-dcnode-id="1498" instrument_node="">"The ten commandments" (1923) tells two story's: one situated in the time of Mozes and one situated in the present day (that is 1923). In this respect the film resembles "Intolerance" (1916, D.W. Griffith). In the present day story there are also two brothers. John is the righteous one (Mozes) and Dan the opportunstic one (Aaron). Doing business in a deceptive way is the modern variation of dancing around the golden calf.</span><br data-dcnode-id="1497"><br data-dcnode-id="1496"><span data-dcnode-id="1495" instrument_node="">In general the Biblical story is seen as more spectacular than the modern day story. I am of a different opinion. Through modern eyes the Biblical story is very bombastic. The set pieces of ancient Egypt may be impressive, but that is not true for the way the splitting of the Red Sea is captured. For this effect gelantine was used, and you can see it. On the other hand the scene on the contruction site in the modern story, and the way that the director makes use of the effect of height is very good. I don't want to say that it is on par with the way in which Alfred Hitchcock used height in "Vertigo", but it is remarkable still the same.</span></div><span data-dcnode-id="1493" instrument_node="">

</span></a><span data-dcnode-id="1421" instrument_node=""> </span><div class="display-name-date" data-dcnode-id="1413"><span data-dcnode-id="1420" instrument_node="">
</span><span class="display-name-link" data-dcnode-id="1417"><a data-dcnode-id="1418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/user/ur2467618/"><span data-dcnode-id="1419" instrument_node="">planktonrules</span></a></span><span class="review-date" data-dcnode-id="1415"><span data-dcnode-id="1416" instrument_node="">8 July 2010</span></span><span data-dcnode-id="1414" instrument_node="">
</span></div><span data-dcnode-id="1412" instrument_node="">
</span><div class="content" data-dcnode-id="1397"><span data-dcnode-id="1411" instrument_node="">
</span><div class="text show-more__control clickable" data-dcnode-id="1400"><span data-dcnode-id="1410" instrument_node="">When I reviewed "The Ten Commandments" (1956), I received a lot of 'Not Helpful' ratings. I assume this is because, unlike the average review, I did NOT particularly like the film and said so. Once again, I buck the crowd as I definitely did NOT like this previous version as well. In the case of both films, I seriously wonder whether or not the movies actually were a boon to atheists because the films were so incredibly bad--even with the incredible Egyptian sets.</span><br data-dcnode-id="1409"><br data-dcnode-id="1408"><span data-dcnode-id="1407" instrument_node="">Unlike the more famous 1956 version, only the first 56 minutes of the film are about the Jews and the creation of the Commandments. The biggest differences you'll notice is that Moses is a very superficial character--and has very little to do in most of the film. In addition, the Children of Israel actually leave Egypt about 20-25 minutes into the film--and it's a 136 minute film. The rest of the film is actually set in the present day (1923) and is a very, very heavy-handed morality tale with absolutely no hint of subtlety--none. It comes on so strong and heavy-handed that I am sure many will laugh at its histrionics and silly plot.</span><br data-dcnode-id="1406"><br data-dcnode-id="1405"><span data-dcnode-id="1404" instrument_node="">So what is to like about this film. Well, first and foremost, the DVD copy is perhaps the most pristine I have ever seen in a silent film--it's very, very crisp and clean. And, the Egyptian sets (as I mentioned above) are very nice. Apart from that, the rest is just pretty silly. The famed parting of the red sea looked like melty jello. And, imagine my surprise when I later read on IMDb that's really all it was!!! And, as for the story it was bad in two serious ways. First, the creation of the Commandments section was just too superficial and dispassionate--like the folks are acting out some half-baked passion play--where they really aren't too concerned with quality--just getting the stupid thing done! Second, the modern portion is much worse with it's message that comes across with all the subtlety of a 2x4 upside your skull!! As a result, unless you are a die-hard silent film fan or an atheist who hates God, don't bother with this silly film. Why Cecil B. DeMille has somehow been considered a genius for his (anti-) religious epics, I have no idea! </span><br data-dcnode-id="1403"><br data-dcnode-id="1402"><span data-dcnode-id="1401" instrument_node="">By the way a few final thoughts. First, despite both of DeMille's films saying to the contrary, archaeological evidence AND written accounts of the day indicate the Jews did NOT build the pyramids but professional builders. Second, why did the Godly mother die in the film?! Didn't this seem to reinforce the notion that God is not real?! Talk about an illogically constructed religious message!! Though, now that I think about it, illogic was DeMille's forte--with nudity and bestiality in his other 'religious' epic "Sign of the Cross"!! And, though it was NOT a DeMille film, think about the original "Ben Hur"--as in the end, Jesus STAYED DEAD!!! What a whacked out message! All very Pre-Code in their sensibilities and all CLAIMING to be family religious entertainment!</span></div><span data-dcnode-id="1399" instrument_node="">

</span><a class="title" data-dcnode-id="1328" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/review/rw7679210/"><span data-dcnode-id="1329" instrument_node=""> The DeMille Legend Begins Here
</span></a><span data-dcnode-id="1327" instrument_node=""> </span><div class="display-name-date" data-dcnode-id="1319"><span data-dcnode-id="1326" instrument_node="">
</span><span class="display-name-link" data-dcnode-id="1323"><a data-dcnode-id="1324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/user/ur86498639/"><span data-dcnode-id="1325" instrument_node="">springfieldrental</span></a></span><span class="review-date" data-dcnode-id="1321"><span data-dcnode-id="1322" instrument_node="">24 December 2021</span></span><span data-dcnode-id="1320" instrument_node="">
</span></div><span data-dcnode-id="1318" instrument_node="">
</span><div class="content" data-dcnode-id="1288"><span data-dcnode-id="1317" instrument_node="">
</span><div class="text show-more__control clickable" data-dcnode-id="1291"><span data-dcnode-id="1316" instrument_node="">Today's casual movie fans know director Cecil B. DeMille for his sweeping epics, especially focused on Biblical stories. In his earlier marriage comedies he inserted brief sequences which were highly elaborate set pieces complimenting the plots. But it was in December 1923's "The Ten Commandments" DeMille began producing big-budgeted movies based on stories from the Bible.</span><br data-dcnode-id="1315"><br data-dcnode-id="1314"><span data-dcnode-id="1313" instrument_node="">DeMille was getting tired of directing bedroom farces of manners that were not attracting the number of viewers to the theaters as they had been in the past. He solicited ideas for his next film in early 1923 by holding a contest for his loyal fans to offer their opinions on what his next movie should be about. One suggestion from a Lansing, Michigan, respondent hit a cord straight to the director's heart: "You cannot break the 'Ten Commandments-they will break you." Voila, thought DeMille, that's it. He immediately teamed up with his favorite screenwriter, Jeanie MacPherson, to compose a treatment, divided into two parts.</span><br data-dcnode-id="1312"><br data-dcnode-id="1311"><span data-dcnode-id="1310" instrument_node="">'The Prologue' follows the Bible, specifically Exodus, where Moses engineers through God a way to liberate the Hebrew slaves from their Egyptian masters and lead them to the 'Promised Land.' The second part, 'The Story,' relates the Ten Commandments to two brothers in present-day life who differ in their beliefs, led by a pious mother. One brother, Dan McTavish (Rod La Rocque), is an atheist who breaks every commandment, with dire consequences. The other, John (Richard Dix), follows the Bible to a tee.</span><br data-dcnode-id="1309"><br data-dcnode-id="1308"><span data-dcnode-id="1307" instrument_node="">DeMille set out to film the Biblical episodes larger in scope than even D. W. Griffith's 1916 Babylonian sequences in his 'Intolerance.' Reconstructing a massive ancient Egyptian setting, complete with large buildings and sphinx-like statues in the Guadalupe-Nipomo Dunes north of Los Angeles, DeMille oversaw an army of 1,600 designers and construction workers. For three months the almost 2,500 member production crew, including extras, cooks and support staff, were spent in the desert-like surroundings filming the Prologue.</span><br data-dcnode-id="1306"><br data-dcnode-id="1305"><span data-dcnode-id="1304" instrument_node="">The expenses were escalating so fast that it's studio, Paramount Pictures and president Adolph Zukor cabled DeMille demanding he pull up stakes and return to Hollywood The director responded, "I cannot and will not make pictures with a yardstick. What do you want me to do? Stop now and release it as The Five Commandments?"</span><br data-dcnode-id="1303"><br data-dcnode-id="1302"><span data-dcnode-id="1301" instrument_node="">As the studio's financial backers began to get queasy and withdraw further finances, DeMille was able to get a personal loan from one of the founders of Bank of America to invest $500,000 to complete the movie. The investment proved to be a good one since the $1.4 million budgeted movie garnered over $4 million at the box office, an astronomical return, becoming Paramount's highest grossing film for the studio's next 25 years.</span><br data-dcnode-id="1300"><br data-dcnode-id="1299"><span data-dcnode-id="1298" instrument_node="">Once filming wrapped up in the dunes, DeMille, short on money and not wanting other directors to use his elaborate sets to compare their work with his, decided to blow up some of the larger structures while bulldozing the entire place under sand. Archeologists in 1983 found the site buried underneath the dunes. Because the western snowy plover nests in the area, it's virtually impossible to conduct an archeological dig for any length of time. Some items, including one of the sphinx statues, have been recovered, but the oldest film set still in existence remains under tons of sand.</span><br data-dcnode-id="1297"><br data-dcnode-id="1296"><span data-dcnode-id="1295" instrument_node="">DeMille was one of the earliest proponents of the two-strip Technicolor look and used the company's film for some of the scenes. Unfortunately, the preserved prints, including the one DeMille himself had personally kept, do not retain the color sequences. One stretch of color footage was of the parting of the Red Sea. DeMille's special effects technicians were able to realistically show how the waters were separated by lining up blocks of blue gelatin and heating them up until they melted. Slowly turning to liquid, the gelatin footage was reversed with ocean waves superimposed next to the blocks. The effect created the illusion of the sea parting while the dry ocean bed allowed the thousands of refugees to walk to the Red Sea's other side.</span><br data-dcnode-id="1294"><br data-dcnode-id="1293"><span data-dcnode-id="1292" instrument_node="">"The Ten Commandments" became the first of what film historians consider DeMille's Biblical trilogy, 1927 'King of Kings,' and 1932 'The Sign of the Cross.' DeMille would later remake "The Ten Commandments" in 1956, dropping the modern day story to concentrate solely on Moses. Several of the sequences in the updated version duplicate almost shot-for-shot the 1923 edition, showing how much DeMille admired his younger work.</span></div><span data-dcnode-id="1290" instrument_node="">
