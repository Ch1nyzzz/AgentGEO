</span><a class="title" data-dcnode-id="1219" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/review/rw1940759/"><span data-dcnode-id="1220" instrument_node=""> "Thou provokedst thy god to wrath!"
</span></a><span data-dcnode-id="1218" instrument_node=""> </span><div class="display-name-date" data-dcnode-id="1210"><span data-dcnode-id="1217" instrument_node="">
</span><span class="display-name-link" data-dcnode-id="1214"><a data-dcnode-id="1215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/user/ur3063013/"><span data-dcnode-id="1216" instrument_node="">Steffi_P</span></a></span><span class="review-date" data-dcnode-id="1212"><span data-dcnode-id="1213" instrument_node="">4 September 2008</span></span><span data-dcnode-id="1211" instrument_node="">
</span></div><span data-dcnode-id="1209" instrument_node="">
</span><div class="content" data-dcnode-id="1188"><span data-dcnode-id="1208" instrument_node="">
</span><div class="text show-more__control clickable" data-dcnode-id="1191"><span data-dcnode-id="1207" instrument_node="">The Ten Commandments marks the beginning of the second wave of the Hollywood epic. Modelled on the contemporary/ancient parallel storytelling of Intolerance  the crowning achievement of the first wave  and its subject matter decided by a poll of cinema-goers, this is among the most significant and typically DeMillean of DeMille's pictures.</span><br data-dcnode-id="1206"><br data-dcnode-id="1205"><span data-dcnode-id="1204" instrument_node="">DeMille had first coupled a historical tale with a modern day framing story in 1916's Joan the Woman, and even during the years when the historical feature was out of fashion (approximately 1918  1921) he several times added a little metaphorical foray into the past to his contemporary dramas, such as Male and Female and Manslaughter. Here, it is still the modern day narrative which makes up the bulk of the picture's 130-odd minutes, and yet it is the spectacular biblical prologue that everyone remembers.</span><br data-dcnode-id="1203"><br data-dcnode-id="1202"><span data-dcnode-id="1201" instrument_node="">DeMille had always had a talent for directing crowd scenes, giving inspiring pep talks to the mass whilst giving specific directions to the individuals. Here he works with the biggest group of extras he had ever handled, and yet he has lost none of his touch. He gives character to the multitude by focusing on a number of individuals within it, and yet when he pulls back to show the whole crowd you can still see the attention to detail, with a hundred different things going on. The stupendous sets also make an impact in themselves, but DeMille is shrewd enough to reveal them gradually, and places them squarely in the context of being symbolic of evil. The pharaoh's palace may be impressive, but DeMille ensures that the works of God  the pillar of fire, the parting of the red sea, the lightning on Sinai  are more so. Oddly, he could be accused of doing the opposite in his 1956 remake, in which the Egyptian city is absolutely awe-inspiring, whereas the special effects representing acts of God are somewhat pathetic even for the day, and certainly less effective than those in 1923. But DeMille had changed a lot by that time.</span><br data-dcnode-id="1200"><br data-dcnode-id="1199"><span data-dcnode-id="1198" instrument_node="">In contrast to the prologue, the contemporary story is somewhat lacklustre. It has much in common with other DeMille dramas from around this period, although it is pretty mediocre by that standard. Particularly jarring is the overuse of intertitles. Five years earlier DeMille had been a master of purely visual narrative, and the titles were only there when absolutely necessary. As time went by however, as DeMille had become more pious and his screenwriter Jeanie Macpherson had become more pretentious, so had the photoplays become more wordy. All the better for preaching with, as far as self-appointed messenger-of-God DeMille was concerned, but his pictures began to lack the grace and smoothness they had once had.</span><br data-dcnode-id="1197"><br data-dcnode-id="1196"><span data-dcnode-id="1195" instrument_node="">With scenes fragmented into smaller pieces, and characters unable to open their mouths without a superfluous title spelling their words out to the audience, the acting also suffers. Richard Dix, Rod La Rocque, Leatrice Joy and Nita Naldi are all adequate performers, but none of them really gets time or space to emote as much as they ought to for the story. Nevertheless, DeMille was still a master of the powerful, iconic image, and there are enough memorable shots here to keep things interesting. Among the standouts are Nita Naldi's hands emerging from a tear in a sack, the straight-up shot in the lift as Leatrice Joy ascends and Naldi ripping the curtain off its hooks, nearly forty years before the almost identical shot in Hitchcock's Psycho. It is images like this which reign supreme in DeMille's cinema, and it is from around this point on that they become more important than the credibility of the story or the actors.</span><br data-dcnode-id="1194"><br data-dcnode-id="1193"><span data-dcnode-id="1192" instrument_node="">DeMille's Ten Commandments proved to be highly influential. Other studios got to work on their own superproductions, the western would become epic with The Iron Horse, and even Douglas Fairbanks next picture, The Thief of Bagdad, was steeped in DeMillean grandeur. Further afield, UFA studios in Germany and Abel Gance in France were also working on the principle that big is beautiful. Ten Commandments indicated the future for DeMille himself as well. Not only was it the first of the pictures that would secure his legacy as the ultimate biblical filmmaker, but the fact that the prologue is absolutely breathtaking and the contemporary drama lacks bite, hints towards his eventually becoming a director purely of epics. It's also rather telling that he loved the Old Testament God of plagues and smiting, because that is probably more or less how DeMille saw himself. He hammered home his messages with the spectacular and the incredible. A shock-and-awe filmmaker preaching the word of a shock-and-awe God.</span></div><span data-dcnode-id="1190" instrument_node="">

</span></a><span data-dcnode-id="1118" instrument_node=""> </span><div class="display-name-date" data-dcnode-id="1110"><span data-dcnode-id="1117" instrument_node="">
</span><span class="display-name-link" data-dcnode-id="1114"><a data-dcnode-id="1115" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/user/ur66601046/"><span data-dcnode-id="1116" instrument_node="">ericstevenson</span></a></span><span class="review-date" data-dcnode-id="1112"><span data-dcnode-id="1113" instrument_node="">1 March 2017</span></span><span data-dcnode-id="1111" instrument_node="">
</span></div><span data-dcnode-id="1109" instrument_node="">
</span><div class="content" data-dcnode-id="1100"><span data-dcnode-id="1108" instrument_node="">
</span><div class="text show-more__control clickable" data-dcnode-id="1103"><span data-dcnode-id="1107" instrument_node="">I was interested in seeing this movie because it was one of the earliest feature length films based on the Bible. Obviously, I've seen other versions of the Ten Commandments story and wanted to see how this did it. It actually starts with the plagues and immediately goes to Moses getting the ten commandments. I was so confused when the scene suddenly transitioned to modern times with people reading the Bible! Yeah, I thought this movie would be a complete retelling of Moses, but the majority of it actually took place recently! It's weird that I consider something recent when the movie was made in 1923.</span><br data-dcnode-id="1106"><br data-dcnode-id="1105"><span data-dcnode-id="1104" instrument_node="">I really appreciate how unpredictable this was. Most of the movie features these two brothers, one of whom abandons religion and sees how much of a bigger success he can become. It really does raise a lot of great questions as to how religion is still relevant today. How much can a person gain from reading the Bible? The best part might be when because he was using defective concrete, his mother dies. Her dying words are that she apologizes for teaching him that he should fear God and not love God. There's a lot going on here and it really is a profound film. ***1/2</span></div><span data-dcnode-id="1102" instrument_node="">

</span></a><span data-dcnode-id="1050" instrument_node=""> </span><div class="display-name-date" data-dcnode-id="1042"><span data-dcnode-id="1049" instrument_node="">
</span><span class="display-name-link" data-dcnode-id="1046"><a data-dcnode-id="1047" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/user/ur2327211/"><span data-dcnode-id="1048" instrument_node="">DrezenMedia</span></a></span><span class="review-date" data-dcnode-id="1044"><span data-dcnode-id="1045" instrument_node="">12 May 2004</span></span><span data-dcnode-id="1043" instrument_node="">
</span></div><span data-dcnode-id="1041" instrument_node="">
</span><div class="content" data-dcnode-id="1022"><span data-dcnode-id="1040" instrument_node="">
</span><div class="text show-more__control" data-dcnode-id="1038"><span data-dcnode-id="1039" instrument_node="">I hope God doesn't smite me for the line above, but the effect is somewhat obvious. But as obvious as the Jello used for the Red Sea parting is, it cannot take away from how great this film really is. Now don't get me wrong, the 1956 version is unbelievable itself, but while looking at this one you get a sense of DeMille trying to tell us something about ourselves, our way of life, and of course, what we are doing wrong. The prologue itself is extremely quick. That could be because I saw the '56 version prior to this one. The rest of the story drags a little bit, but not too much, don't get me wrong this is a long movie (the package reads 146 minutes, it's really 136), but if you have the time you could make it through in one sitting. I'd recommend renting this movie (only if you can find it though) because it really is worth watching it and seeing how we are today and how we can make ourselves better by doing certain things a certain way. I can't put it in to words though, only this film can. It's an intriguing motion picture experience to behold. 8/10</span></div><span data-dcnode-id="1037" instrument_node="">
