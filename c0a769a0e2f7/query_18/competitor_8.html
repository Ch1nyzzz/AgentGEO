com/browse/judeo-christian" rel="noopener" target="_blank"><span data-dcnode-id="1041" instrument_node="">Judeo-Christian</span></a><span data-dcnode-id="1039" instrument_node=""> religious rules—very influential to both historic and contemporary </span><a data-dcnode-id="1037" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dictionary.com/browse/morality" rel="noopener" target="_blank"><span data-dcnode-id="1038" instrument_node="">morality</span></a><span data-dcnode-id="1036" instrument_node="">, </span><a data-dcnode-id="1034" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dictionary.com/browse/ethics" rel="noopener" target="_blank"><span data-dcnode-id="1035" instrument_node="">ethics</span></a><span data-dcnode-id="1033" instrument_node="">, and </span><a data-dcnode-id="1031" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dictionary.com/browse/worship" rel="noopener" target="_blank"><span data-dcnode-id="1032" instrument_node="">worship</span></a><span data-dcnode-id="1030" instrument_node=""> in the West—believed to be sent directly from God to humanity.</span></p><span data-dcnode-id="1028" instrument_node="">

</span><p data-dcnode-id="989"><span data-dcnode-id="990" style="font-weight: 400;"><span data-dcnode-id="991" instrument_node="">10 Commandments</span></span></p><span data-dcnode-id="988" instrument_node="">
</span><p data-dcnode-id="987"></p></div></div><div class="css-157n90t emmt3bm1" data-accordion="true" data-dcnode-id="807" data-expanded="false"><div class="css-16t89lr emmt3bm0" data-dcnode-id="973"><h2 class="e16ok0li2 css-moprp6" data-dcnode-id="976"><span data-dcnode-id="977"><span data-dcnode-id="983" style="font-weight: 400;"><span data-dcnode-id="984" instrument_node="">Where do the </span></span><i data-dcnode-id="980"><span data-dcnode-id="981" style="font-weight: 400;"><span data-dcnode-id="982" instrument_node="">Ten Commandments</span></span></i><span data-dcnode-id="978" style="font-weight: 400;"><span data-dcnode-id="979" instrument_node=""> come from?</span></span></span></h2><button class="css-16wonnu emmt3bm2" data-accordion-button="true" data-ci-target="editornotes-accordion" data-dcnode-id="974" type="button"><span class="css-5mye9p eij7bpl0" data-dcnode-id="975"></span></button></div><div data-accordion-content="true" data-dcnode-id="808"><p class="css-u2dcbh e12tjd8f0" data-dcnode-id="972" style="font-size:16px;padding-right:24px"></p><p data-dcnode-id="958"><span data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">Also known as the </span></span><a data-dcnode-id="966" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dictionary.com/browse/decalogue" rel="noopener" target="_blank"><i data-dcnode-id="967"><span data-dcnode-id="968"><span data-dcnode-id="969" instrument_node="">Decalogue</span></span></i></a><span data-dcnode-id="964"><span data-dcnode-id="965" instrument_node="">, the </span></span><i data-dcnode-id="961"><span data-dcnode-id="962"><span data-dcnode-id="963" instrument_node="">Ten Commandments</span></span></i><span data-dcnode-id="959"><span data-dcnode-id="960" instrument_node=""> are recorded in the Old Testament of the Bible, where they are revealed to Moses on Mt. Sinai and carved into two stone tablets.&nbsp;</span></span></p><span data-dcnode-id="957" instrument_node="">
</span><p data-dcnode-id="948"><span data-dcnode-id="955" style="font-weight: 400;"><span data-dcnode-id="956" instrument_node="">A </span></span><a data-dcnode-id="951" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dictionary.com/browse/commandment" rel="noopener" target="_blank"><i data-dcnode-id="952"><span data-dcnode-id="953" style="font-weight: 400;"><span data-dcnode-id="954" instrument_node="">commandment</span></span></i></a><span data-dcnode-id="949" style="font-weight: 400;"><span data-dcnode-id="950" instrument_node=""> is a rule or mandate, especially a divine one.</span></span></p><span data-dcnode-id="947" instrument_node="">
</span><p data-dcnode-id="920"><span data-dcnode-id="945" style="font-weight: 400;"><span data-dcnode-id="946" instrument_node="">In many versions of the Bible, the commandments are mentioned as </span></span><i data-dcnode-id="942"><span data-dcnode-id="943" style="font-weight: 400;"><span data-dcnode-id="944" instrument_node="">laws</span></span></i><span data-dcnode-id="940" style="font-weight: 400;"><span data-dcnode-id="941" instrument_node=""> in Exodus 24:12-13 and named as the </span></span><i data-dcnode-id="937"><span data-dcnode-id="938" style="font-weight: 400;"><span data-dcnode-id="939" instrument_node="">Ten Commandments</span></span></i><span data-dcnode-id="935" style="font-weight: 400;"><span data-dcnode-id="936" instrument_node=""> in Exodus 34:28. The phrase appears in English as early as the late 1200s. The influential 1611 King James Version of the Bible renders the commandments in the now familiar and widely quoted </span></span><a data-dcnode-id="931" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dictionary.com/browse/thou" rel="noopener" target="_blank"><i data-dcnode-id="932"><span data-dcnode-id="933" style="font-weight: 400;"><span data-dcnode-id="934" instrument_node="">Thou</span></span></i></a><span data-dcnode-id="930" instrument_node=""> </span><a data-dcnode-id="926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dictionary.com/browse/shalt" rel="noopener" target="_blank"><i data-dcnode-id="927"><span data-dcnode-id="928" style="font-weight: 400;"><span data-dcnode-id="929" instrument_node="">shalt</span></span></i></a><i data-dcnode-id="923"><span data-dcnode-id="924" style="font-weight: 400;"><span data-dcnode-id="925" instrument_node=""> not</span></span></i><span data-dcnode-id="921" style="font-weight: 400;"><span data-dcnode-id="922" instrument_node=""> formula and are summarized as follows:</span></span></p><span data-dcnode-id="919" instrument_node="">
</span><ol data-dcnode-id="872"><span data-dcnode-id="918" instrument_node="">
</span><li data-dcnode-id="915"><span data-dcnode-id="916" style="font-weight: 400;"><span data-dcnode-id="917" instrument_node=""> Thou shalt have no other gods before me.</span></span></li><span data-dcnode-id="914" instrument_node="">
</span><li data-dcnode-id="911"><span data-dcnode-id="912" style="font-weight: 400;"><span data-dcnode-id="913" instrument_node=""> Thou shalt not make unto thee any graven image.</span></span></li><span data-dcnode-id="910" instrument_node="">
</span><li data-dcnode-id="907"><span data-dcnode-id="908" style="font-weight: 400;"><span data-dcnode-id="909" instrument_node=""> Thou shalt not take the name of the Lord thy God in vain.</span></span></li><span data-dcnode-id="906" instrument_node="">
</span><li data-dcnode-id="903"><span data-dcnode-id="904" style="font-weight: 400;"><span data-dcnode-id="905" instrument_node=""> Remember the sabbath day, to keep it holy.</span></span></li><span data-dcnode-id="902" instrument_node="">
</span><li data-dcnode-id="899"><span data-dcnode-id="900" style="font-weight: 400;"><span data-dcnode-id="901" instrument_node=""> Honor thy father and thy mother</span></span></li><span data-dcnode-id="898" instrument_node="">
</span><li data-dcnode-id="895"><span data-dcnode-id="896" style="font-weight: 400;"><span data-dcnode-id="897" instrument_node=""> Thou shalt not kill.</span></span></li><span data-dcnode-id="894" instrument_node="">
</span><li data-dcnode-id="891"><span data-dcnode-id="892" style="font-weight: 400;"><span data-dcnode-id="893" instrument_node=""> Thou shalt not commit adultery.</span></span></li><span data-dcnode-id="890" instrument_node="">
</span><li data-dcnode-id="887"><span data-dcnode-id="888" style="font-weight: 400;"><span data-dcnode-id="889" instrument_node=""> Thou shalt not steal.</span></span></li><span data-dcnode-id="886" instrument_node="">
</span><li data-dcnode-id="883"><span data-dcnode-id="884" style="font-weight: 400;"><span data-dcnode-id="885" instrument_node=""> Thou shalt not bear false witness against thy neighbor.</span></span></li><span data-dcnode-id="882" instrument_node="">
</span><li data-dcnode-id="874"><span data-dcnode-id="880" style="font-weight: 400;"><span data-dcnode-id="881" instrument_node=""> Thou shalt not </span></span><a data-dcnode-id="877" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dictionary.com/browse/covet" rel="noopener" target="_blank"><span data-dcnode-id="878" style="font-weight: 400;"><span data-dcnode-id="879" instrument_node="">covet</span></span></a><span data-dcnode-id="875" style="font-weight: 400;"><span data-dcnode-id="876" instrument_node=""> thy neighbor’s house (wife, servants, and animals).</span></span></li><span data-dcnode-id="873" instrument_node="">
</span></ol><span data-dcnode-id="871" instrument_node="">
</span><p data-dcnode-id="868"><span data-dcnode-id="869" style="font-weight: 400;"><span data-dcnode-id="870" instrument_node="">Note that the phrasing and numbering differ in some religions.</span></span></p><span data-dcnode-id="867" instrument_node="">
</span><p data-dcnode-id="859"><span data-dcnode-id="865" style="font-weight: 400;"><span data-dcnode-id="866" instrument_node="">Forming the basis of Judeo-Christian morality and ethics, the </span></span><i data-dcnode-id="862"><span data-dcnode-id="863" style="font-weight: 400;"><span data-dcnode-id="864" instrument_node="">Ten Commandments </span></span></i><span data-dcnode-id="860" style="font-weight: 400;"><span data-dcnode-id="861" instrument_node="">are widely taught, memorized, cited, and displayed by Jews and Christians, referenced in everything from Sunday School to bumper stickers.</span></span></p><span data-dcnode-id="858" instrument_node="">
</span><p data-dcnode-id="845"><span data-dcnode-id="856" style="font-weight: 400;"><span data-dcnode-id="857" instrument_node="">Their massive influence in Western society has led to their popular depiction in the media. The biblical story of God’s delivery of the</span></span><i data-dcnode-id="853"><span data-dcnode-id="854" style="font-weight: 400;"><span data-dcnode-id="855" instrument_node=""> Ten Commandments</span></span></i><span data-dcnode-id="851" style="font-weight: 400;"><span data-dcnode-id="852" instrument_node=""> has notably been told in film, from a 1923 silent film by Cecil DeMille to Charlton Heston’s 1956 treatment, both called </span></span><i data-dcnode-id="848"><span data-dcnode-id="849" style="font-weight: 400;"><span data-dcnode-id="850" instrument_node="">The Ten Commandments</span></span></i><span data-dcnode-id="846" style="font-weight: 400;"><span data-dcnode-id="847" instrument_node="">. Popular songs have also taken inspiration from them, from Johnny Cash’s 1969 “Ten Commandments” to the Notorious B.I.G.’s 1997 “Ten Crack Commandments.”</span></span></p><span data-dcnode-id="844" instrument_node="">
</span><p data-dcnode-id="811"><span data-dcnode-id="842" style="font-weight: 400;"><span data-dcnode-id="843" instrument_node="">In the U.S., displaying the</span></span><i data-dcnode-id="839"><span data-dcnode-id="840" style="font-weight: 400;"><span data-dcnode-id="841" instrument_node=""> Ten Commandments</span></span></i><span data-dcnode-id="837" style="font-weight: 400;"><span data-dcnode-id="838" instrument_node=""> at courthouses has sparked controversy. Critics argue that, due to the overtly religious nature of the Commandments, featuring them in government buildings violates the principle of </span></span><a data-dcnode-id="834" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dictionary.com/browse/separation-of-church-and-state" rel="noopener" target="_blank"><span data-dcnode-id="835" style="font-weight: 400;"><span data-dcnode-id="836" instrument_node="">separation of church and state</span></span></a><span data-dcnode-id="832" style="font-weight: 400;"><span data-dcnode-id="833" instrument_node=""> implied by the U.S. Constitution. In 2005, the issue went to the Supreme Court over citizen Thomas Van Orden’s lawsuit against the Texas State Capitol for exhibiting a large stone monument bearing the</span></span><i data-dcnode-id="829"><span data-dcnode-id="830" style="font-weight: 400;"><span data-dcnode-id="831" instrument_node=""> Ten Commandments</span></span></i><span data-dcnode-id="827" style="font-weight: 400;"><span data-dcnode-id="828" instrument_node="">. In a 5–4 vote, the Supreme Court ruled that the display was </span></span><a data-dcnode-id="824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dictionary.com/browse/constitutional" rel="noopener" target="_blank"><span data-dcnode-id="825" style="font-weight: 400;"><span data-dcnode-id="826" instrument_node="">constitutional</span></span></a><span data-dcnode-id="822" style="font-weight: 400;"><span data-dcnode-id="823" instrument_node="">, as the</span></span><i data-dcnode-id="819"><span data-dcnode-id="820" style="font-weight: 400;"><span data-dcnode-id="821" instrument_node=""> Ten Commandments</span></span></i><span data-dcnode-id="817" style="font-weight: 400;"><span data-dcnode-id="818" instrument_node=""> represented both religious and </span></span><a data-dcnode-id="814" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dictionary.com/browse/secular" rel="noopener" target="_blank"><span data-dcnode-id="815" style="font-weight: 400;"><span data-dcnode-id="816" instrument_node="">secular</span></span></a><span data-dcnode-id="812" style="font-weight: 400;"><span data-dcnode-id="813" instrument_node=""> moral codes.</span></span></p><span data-dcnode-id="810" instrument_node="">
</span><p data-dcnode-id="809"></p></div></div><div class="css-157n90t emmt3bm1" data-accordion="true" data-dcnode-id="694" data-expanded="false"><div class="css-16t89lr emmt3bm0" data-dcnode-id="795"><h2 class="e16ok0li2 css-moprp6" data-dcnode-id="798"><span data-dcnode-id="799"><span data-dcnode-id="805" style="font-weight: 400;"><span data-dcnode-id="806" instrument_node="">How are the </span></span><i data-dcnode-id="802"><span data-dcnode-id="803" style="font-weight: 400;"><span data-dcnode-id="804" instrument_node="">Ten Commandments</span></span></i><span data-dcnode-id="800" style="font-weight: 400;"><span data-dcnode-id="801" instrument_node=""> used in real life?</span></span></span></h2><button class="css-16wonnu emmt3bm2" data-accordion-button="true" data-ci-target="editornotes-accordion" data-dcnode-id="796" type="button"><span class="css-5mye9p eij7bpl0" data-dcnode-id="797"></span></button></div><div data-accordion-content="true" data-dcnode-id="695"><p class="css-u2dcbh e12tjd8f0" data-dcnode-id="794" style="font-size:16px;padding-right:24px"></p><p data-dcnode-id="771"><span data-dcnode-id="792" style="font-weight: 400;"><span data-dcnode-id="793" instrument_node="">The</span></span><i data-dcnode-id="789"><span data-dcnode-id="790" style="font-weight: 400;"><span data-dcnode-id="791" instrument_node=""> Ten Commandments</span></span></i><span data-dcnode-id="787" style="font-weight: 400;"><span data-dcnode-id="788" instrument_node=""> are widely used in formal contexts, including religious instruction, academic work, and philosophical and ethical considerations. Faithful Jews or Christians may cite the </span></span><i data-dcnode-id="784"><span data-dcnode-id="785" style="font-weight: 400;"><span data-dcnode-id="786" instrument_node="">Ten Commandments</span></span></i><span data-dcnode-id="782" style="font-weight: 400;"><span data-dcnode-id="783" instrument_node=""> as authority. Given their </span></span><a data-dcnode-id="779" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dictionary.com/browse/pervasive" rel="noopener" target="_blank"><span data-dcnode-id="780" style="font-weight: 400;"><span data-dcnode-id="781" instrument_node="">pervasive</span></span></a><span data-dcnode-id="777" style="font-weight: 400;"><span data-dcnode-id="778" instrument_node=""> presence in Western culture, </span></span><i data-dcnode-id="774"><span data-dcnode-id="775" style="font-weight: 400;"><span data-dcnode-id="776" instrument_node="">the Ten Commandments</span></span></i><span data-dcnode-id="772" style="font-weight: 400;"><span data-dcnode-id="773" instrument_node=""> are also referenced in everyday speech and writing and are familiar to secular, non-Western, and non-Judeo-Christian people.</span></span></p><span data-dcnode-id="770" instrument_node="">
</span><p data-dcnode-id="752"><span data-dcnode-id="768" style="font-weight: 400;"><span data-dcnode-id="769" instrument_node="">The </span></span><i data-dcnode-id="765"><span data-dcnode-id="766" style="font-weight: 400;"><span data-dcnode-id="767" instrument_node="">Ten Commandments</span></span></i><span data-dcnode-id="763" style="font-weight: 400;"><span data-dcnode-id="764" instrument_node=""> are so familiar that they provide a common way to frame guidelines and directives in various fields (e.g., </span></span><i data-dcnode-id="760"><span data-dcnode-id="761" style="font-weight: 400;"><span data-dcnode-id="762" instrument_node="">the Ten Commandments of Dating</span></span></i><span data-dcnode-id="758" style="font-weight: 400;"><span data-dcnode-id="759" instrument_node="">, </span></span><i data-dcnode-id="755"><span data-dcnode-id="756" style="font-weight: 400;"><span data-dcnode-id="757" instrument_node="">the Ten Commandments of Business</span></span></i><span data-dcnode-id="753" style="font-weight: 400;"><span data-dcnode-id="754" instrument_node="">).</span></span></p><span data-dcnode-id="751" instrument_node="">
</span><p data-dcnode-id="728"><span data-dcnode-id="749" style="font-weight: 400;"><span data-dcnode-id="750" instrument_node="">The biblical language of the </span></span><i data-dcnode-id="746"><span data-dcnode-id="747" style="font-weight: 400;"><span data-dcnode-id="748" instrument_node="">Ten Commandments</span></span></i><span data-dcnode-id="744" style="font-weight: 400;"><span data-dcnode-id="745" instrument_node=""> has also entered pop culture, especially the King James construction of </span></span><i data-dcnode-id="741"><span data-dcnode-id="742" style="font-weight: 400;"><span data-dcnode-id="743" instrument_node="">Thou shalt not. </span></span></i><span data-dcnode-id="739" style="font-weight: 400;"><span data-dcnode-id="740" instrument_node="">People often use the phrase to allude to the authoritative force of </span></span><i data-dcnode-id="736"><span data-dcnode-id="737" style="font-weight: 400;"><span data-dcnode-id="738" instrument_node="">the Ten Commandments</span></span></i><span data-dcnode-id="734" style="font-weight: 400;"><span data-dcnode-id="735" instrument_node=""> in a humorous fashion (e.g., “Thou shalt not stay up until 2 am” or</span></span><i data-dcnode-id="731"><span data-dcnode-id="732" style="font-weight: 400;"><span data-dcnode-id="733" instrument_node=""> “</span></span></i><span data-dcnode-id="729" style="font-weight: 400;"><span data-dcnode-id="730" instrument_node="">Thou shalt not kiss thy sister’s boyfriend”).</span></span></p><span data-dcnode-id="727" instrument_node="">
</span><p data-dcnode-id="719"><span data-dcnode-id="725" style="font-weight: 400;"><span data-dcnode-id="726" instrument_node="">Be mindful that discussion of the </span></span><i data-dcnode-id="722"><span data-dcnode-id="723" style="font-weight: 400;"><span data-dcnode-id="724" instrument_node="">Ten Commandments</span></span></i><span data-dcnode-id="720" style="font-weight: 400;"><span data-dcnode-id="721" instrument_node=""> in public settings may offend people who are not Jewish, Christian, or religious.</span></span></p><span data-dcnode-id="718" instrument_node="">
</span><p data-dcnode-id="710"><b data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">More examples of the </span></b><b data-dcnode-id="713"><i data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">Ten Commandments</span></i></b><b data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">:</span></b></p><span data-dcnode-id="709" instrument_node="">
</span><p data-dcnode-id="705"><span data-dcnode-id="708" instrument_node="">“”The ten commandments of Gaming: 4. Thou shalt never cheat unless thine game has been beaten before (walkthroughs do not count.)”</span><br data-dcnode-id="707"><span data-dcnode-id="706" instrument_node="">
—@ln2r_, September 10, 2012</span></p><span data-dcnode-id="704" instrument_node="">
</span><p data-dcnode-id="698"><span data-dcnode-id="700" style="font-weight: 400;"><span data-dcnode-id="703" instrument_node="">“A Republican candidate’s careful answer to a debate question about the Ten Commandments on Friday shook up the Alabama governor’s race, as Sen. Bill Hightower began to take criticism from the far right.”</span><br data-dcnode-id="702"><span data-dcnode-id="701" instrument_node="">
</span></span><span data-dcnode-id="699" instrument_node="">—John Sharp, AL.com, April 15, 2018</span></p><span data-dcnode-id="697" instrument_node="">

</span><p data-dcnode-id="682"></p></div></div></section></div><div data-dcnode-id="677" data-wknd-infeed-div="true"></div><div class="css-1avshm7 e16867sm0" data-dcnode-id="491" id="examples-section"><h2 class="css-wkbkqh e1cxe2lc0" data-dcnode-id="671"><span data-dcnode-id="676" instrument_node="">How to use </span><span data-dcnode-id="674" instrument_node="">Ten Commandments</span><span data-dcnode-id="672" instrument_node=""> in a sentence</span></h2><div class="expandable content-hidden css-12x6sdt e1fc5zsj0" data-dcnode-id="492"><div class="default-content" data-dcnode-id="589"><ul class="css-qr8q5p e15kc6du4" data-dcnode-id="590"><li class="css-avpsk8 e15kc6du3" data-dcnode-id="651"><p class="one-click-content css-b5q2lz e15kc6du2" data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">Ten of the callers identified the man as Jason Polanco of the Bronx.</span></p><div class="css-zjik7 e15kc6du5" data-dcnode-id="652"><div class="css-1jv2rgl e15kc6du8" data-dcnode-id="653"><span data-dcnode-id="666"><a class="css-18wyej6 e15kc6du6" data-dcnode-id="667" data-linkid="fboxke" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.thedailybeast.com/articles/2015/01/07/shot-down-during-the-nypd-slowdown.html%3Fsource%3Ddictionary" rel="nofollow"><span data-dcnode-id="668" instrument_node="">Shot Down During the NYPD Slowdown</span></a></span><span class="css-y1f223 e15kc6du1" data-dcnode-id="662"><span class="css-1qjn0sv e15kc6du7" data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">|</span></span><span data-dcnode-id="663" instrument_node="">Michael Daly</span></span><span class="css-y1f223 e15kc6du0" data-dcnode-id="658"><span class="css-1qjn0sv e15kc6du7" data-dcnode-id="660"><span data-dcnode-id="661" instrument_node="">|</span></span><span data-dcnode-id="659" instrument_node="">January 7, 2015</span></span><a class="css-18wyej6 e15kc6du6" data-dcnode-id="654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.thedailybeast.com/articles/2015/01/07/shot-down-during-the-nypd-slowdown.html%3Fsource%3Ddictionary" rel="nofollow"><span class="css-1qjn0sv e15kc6du7" data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">|</span></span><span data-dcnode-id="655" instrument_node="">DAILY BEAST</span></a></div></div></li><li class="css-avpsk8 e15kc6du3" data-dcnode-id="631"><p class="one-click-content css-b5q2lz e15kc6du2" data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">As played by Omundson, King Richard is effeminate, sincere, and ten times funnier than everyone else.</span></p><div class="css-zjik7 e15kc6du5" data-dcnode-id="632"><div class="css-1jv2rgl e15kc6du8" data-dcnode-id="633"><span data-dcnode-id="646"><a class="css-18wyej6 e15kc6du6" data-dcnode-id="647" data-linkid="fboxke" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.thedailybeast.com/articles/2015/01/05/galavant-a-drunken-horny-musical-fairy-tale.html%3Fsource%3Ddictionary" rel="nofollow"><span data-dcnode-id="648" instrument_node="">‘Galavant’: A Drunken, Horny Musical Fairy Tale</span></a></span><span class="css-y1f223 e15kc6du1" data-dcnode-id="642"><span class="css-1qjn0sv e15kc6du7" data-dcnode-id="644"><span data-dcnode-id="645" instrument_node="">|</span></span><span data-dcnode-id="643" instrument_node="">Melissa Leon</span></span><span class="css-y1f223 e15kc6du0" data-dcnode-id="638"><span class="css-1qjn0sv e15kc6du7" data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">|</span></span><span data-dcnode-id="639" instrument_node="">January 5, 2015</span></span><a class="css-18wyej6 e15kc6du6" data-dcnode-id="634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.thedailybeast.com/articles/2015/01/05/galavant-a-drunken-horny-musical-fairy-tale.html%3Fsource%3Ddictionary" rel="nofollow"><span class="css-1qjn0sv e15kc6du7" data-dcnode-id="636"><span data-dcnode-id="637" instrument_node="">|</span></span><span data-dcnode-id="635" instrument_node="">DAILY BEAST</span></a></div></div></li><li class="css-avpsk8 e15kc6du3" data-dcnode-id="611"><p class="one-click-content css-b5q2lz e15kc6du2" data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">“Wait…” Suddenly a huge, graceful black marlin leaps out of the water, sending a shower of water ten feet high.</span></p><div class="css-zjik7 e15kc6du5" data-dcnode-id="612"><div class="css-1jv2rgl e15kc6du8" data-dcnode-id="613"><span data-dcnode-id="626"><a class="css-18wyej6 e15kc6du6" data-dcnode-id="627" data-linkid="fboxke" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.thedailybeast.com/articles/2015/01/03/the-story-behind-lee-marvin-s-liberty-valance-smile.html%3Fsource%3Ddictionary" rel="nofollow"><span data-dcnode-id="628" instrument_node="">The Story Behind Lee Marvin’s Liberty Valance Smile</span></a></span><span class="css-y1f223 e15kc6du1" data-dcnode-id="622"><span class="css-1qjn0sv e15kc6du7" data-dcnode-id="624"><span data-dcnode-id="625" instrument_node="">|</span></span><span data-dcnode-id="623" instrument_node="">Robert Ward</span></span><span class="css-y1f223 e15kc6du0" data-dcnode-id="618"><span class="css-1qjn0sv e15kc6du7" data-dcnode-id="620"><span data-dcnode-id="621" instrument_node="">|</span></span><span data-dcnode-id="619" instrument_node="">January 3, 2015</span></span><a class="css-18wyej6 e15kc6du6" data-dcnode-id="614" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.thedailybeast.com/articles/2015/01/03/the-story-behind-lee-marvin-s-liberty-valance-smile.html%3Fsource%3Ddictionary" rel="nofollow"><span class="css-1qjn0sv e15kc6du7" data-dcnode-id="616"><span data-dcnode-id="617" instrument_node="">|</span></span><span data-dcnode-id="615" instrument_node="">DAILY BEAST</span></a></div></div></li><li class="css-avpsk8 e15kc6du3" data-dcnode-id="591"><p class="one-click-content css-b5q2lz e15kc6du2" data-dcnode-id="609"><span data-dcnode-id="610" instrument_node="">I first saw Marvin when I was ten years old, living with my parents in Arlington, Virginia.</span></p><div class="css-zjik7 e15kc6du5" data-dcnode-id="592"><div class="css-1jv2rgl e15kc6du8" data-dcnode-id="593"><span data-dcnode-id="606"><a class="css-18wyej6 e15kc6du6" data-dcnode-id="607" data-linkid="fboxke" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.thedailybeast.com/articles/2015/01/03/the-story-behind-lee-marvin-s-liberty-valance-smile.html%3Fsource%3Ddictionary" rel="nofollow"><span data-dcnode-id="608" instrument_node="">The Story Behind Lee Marvin’s Liberty Valance Smile</span></a></span><span class="css-y1f223 e15kc6du1" data-dcnode-id="602"><span class="css-1qjn0sv e15kc6du7" data-dcnode-id="604"><span data-dcnode-id="605" instrument_node="">|</span></span><span data-dcnode-id="603" instrument_node="">Robert Ward</span></span><span class="css-y1f223 e15kc6du0" data-dcnode-id="598"><span class="css-1qjn0sv e15kc6du7" data-dcnode-id="600"><span data-dcnode-id="601" instrument_node="">|</span></span><span data-dcnode-id="599" instrument_node="">January 3, 2015</span></span><a class="css-18wyej6 e15kc6du6" data-dcnode-id="594" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.thedailybeast.com/articles/2015/01/03/the-story-behind-lee-marvin-s-liberty-valance-smile.html%3Fsource%3Ddictionary" rel="nofollow"><span class="css-1qjn0sv e15kc6du7" data-dcnode-id="596"><span data-dcnode-id="597" instrument_node="">|</span></span><span data-dcnode-id="595" instrument_node="">DAILY BEAST</span></a></div></div></li></ul></div><div class="expandable-content" data-dcnode-id="507"><ul class="css-qr8q5p e15kc6du4" data-dcnode-id="508"><li class="css-avpsk8 e15kc6du3" data-dcnode-id="569"><p class="one-click-content css-b5q2lz e15kc6du2" data-dcnode-id="587"><span data-dcnode-id="588" instrument_node="">I did a ten minute scene in A//www.dictionary.com/browse/sinai"><span data-dcnode-id="423" instrument_node="">Sinai</span></a><span data-dcnode-id="421" instrument_node="">. These commandments are the heart of the divine law in the </span><a class="luna-xref" data-dcnode-id="419" data-linkid="nn1ov4" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dictionary.com/browse/old-testament"><span data-dcnode-id="420" instrument_node="">Old Testament</span></a><span data-dcnode-id="418" instrument_node="">. The usual enumeration is: (I) I am the Lord thy God; thou shalt have no other gods before me. (II) Thou shalt not make unto thee any graven image. (III) Thou shalt not take the name of the Lord thy God in vain. (IV) Remember the </span><a class="luna-xref" data-dcnode-id="416" data-linkid="nn1ov4" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dictionary.com/browse/sabbath"><span data-dcnode-id="417" instrument_node="">Sabbath</span></a><span data-dcnode-id="415" instrument_node=""> day, to keep it holy. (V) Honor thy father and thy mother. (VI) Thou shalt not kill. (VII) Thou shalt not commit adultery. (VIII) Thou shalt not steal. (IX) Thou shalt not bear false witness against thy neighbor. (X) Thou shalt not covet thy neighbor's house, thou shalt not covet thy neighbor's wife, nor his manservant, nor his maidservant, nor his ox, nor his ass, nor anything that is thy neighbor's.</span></p></section></div><div class="css-k6l28 ejtq9h60" data-dcnode-id="410"><span data-dcnode-id="411" instrument_node="">The New Dictionary of Cultural Literacy, Third Edition
