</span><div class="description" data-bind="visible: code() === '47-MBCOTFA' || code() === '47-MBCNTFA'" data-dcnode-id="3911" style="display: none;"><span data-dcnode-id="4097" instrument_node="">
</span><div data-bind="html: description " data-dcnode-id="3921"><p data-dcnode-id="4095"><span data-dcnode-id="4096" instrument_node="">One of the most common questions I get from Christian parents is about parenting.&nbsp; They want specific and practical advice for rearing their children in the very best way.&nbsp; Couples usually understand their general parental responsibility, but will often speak of the need for help in specifically framing their biblical commitments to optimally shepherd and train their children.</span></p><span data-dcnode-id="4094" instrument_node="">
</span><p data-dcnode-id="4092"><span data-dcnode-id="4093" instrument_node="">Whether you are considering your parental responsibilities with a new child, or even reaffirming these biblical principles with your older children (It’s never too late!), or even as grandparents toward your grandchildren, the following “ten commandments” from God’s Word are sure to benefit you, your family, and your church.</span></p><span data-dcnode-id="4091" instrument_node="">
</span><p data-dcnode-id="4088"><strong data-dcnode-id="4089"><span data-dcnode-id="4090" instrument_node="">1.&nbsp; Pursue Righteousness in Your Marriage</span></strong></p><span data-dcnode-id="4087" instrument_node="">
</span><p data-dcnode-id="4082"><span data-dcnode-id="4086" instrument_node="">Husbands, you need to show your children how a husband loves his wife, even as Christ loved the church (</span><a class="rtBibleRef" data-dcnode-id="4084" data-purpose="bible-reference" data-reference="Eph 5.25" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Eph%25205.25" rel="noopener" target="_blank"><span data-dcnode-id="4085" instrument_node="">Ephesians 5:25</span></a><span data-dcnode-id="4083" instrument_node="">).&nbsp; Do they see you giving yourself up for her?&nbsp; Are they observing how you tenderly and patiently lead her, teach her, and protect her?&nbsp; Your example in the treatment of your wife will teach volumes about Christ’s love for His beloved bride, the church.</span></p><span data-dcnode-id="4081" instrument_node="">
</span><p data-dcnode-id="4076"><span data-dcnode-id="4080" instrument_node="">Wives, to your children you need to model biblical submission as you subject yourself to your husband in everything (</span><a class="rtBibleRef" data-dcnode-id="4078" data-purpose="bible-reference" data-reference="Eph 5.24" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Eph%25205.24" rel="noopener" target="_blank"><span data-dcnode-id="4079" instrument_node="">Ephesians 5:24</span></a><span data-dcnode-id="4077" instrument_node="">).&nbsp; Do your children see how you work out your submission to Christ in respectful submission to your husband?&nbsp; Your marriage is a living, breathing example of the church’s willing submission to her Head, the Lord Jesus Christ.</span></p><span data-dcnode-id="4075" instrument_node="">
</span><p data-dcnode-id="4072"><strong data-dcnode-id="4073" style="mso-bidi-font-weight: normal;"><span data-dcnode-id="4074" instrument_node="">2.&nbsp; Confess Your Sins to One Another</span></strong></p><span data-dcnode-id="4071" instrument_node="">
</span><p data-dcnode-id="4057"><span data-dcnode-id="4070" instrument_node="">You need to confess, when appropriate, your sins to your family (</span><a class="rtBibleRef" data-dcnode-id="4068" data-purpose="bible-reference" data-reference="Prov 28.13" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Prov%252028.13" rel="noopener" target="_blank"><span data-dcnode-id="4069" instrument_node="">Proverbs 28:13</span></a><span data-dcnode-id="4067" instrument_node="">), and seek their forgiveness when necessary (</span><a class="rtBibleRef" data-dcnode-id="4065" data-purpose="bible-reference" data-reference="Matt 6.14-15" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Matt%25206.14-15" rel="noopener" target="_blank"><span data-dcnode-id="4066" instrument_node="">Matthew 6:14-15</span></a><span data-dcnode-id="4064" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="4062" data-purpose="bible-reference" data-reference="Col 3.13" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Col%25203.13" rel="noopener" target="_blank"><span data-dcnode-id="4063" instrument_node="">Colossians 3:13</span></a><span data-dcnode-id="4061" instrument_node="">).&nbsp; As you are quick to confess, you are demonstrating true humility and an ultimate desire to be pleasing to God in all your ways (</span><a class="rtBibleRef" data-dcnode-id="4059" data-purpose="bible-reference" data-reference="2 Cor 5.9" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/2%2520Cor%25205.9" rel="noopener" target="_blank"><span data-dcnode-id="4060" instrument_node="">2 Corinthians 5:9</span></a><span data-dcnode-id="4058" instrument_node="">).</span></p><span data-dcnode-id="4056" instrument_node="">
</span><p data-dcnode-id="4053"><strong data-dcnode-id="4054" style="mso-bidi-font-weight: normal;"><span data-dcnode-id="4055" instrument_node="">3.&nbsp; Pursue Sexual Purity</span></strong></p><span data-dcnode-id="4052" instrument_node="">
</span><p data-dcnode-id="4043"><span data-dcnode-id="4051" instrument_node="">Be very careful to protect your home from the sexual immorality of the world we live in.&nbsp; That means you need to abstain from sexual immorality yourself (</span><a class="rtBibleRef" data-dcnode-id="4049" data-purpose="bible-reference" data-reference="1 Thess 4.3-8" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/1%2520Thess%25204.3-8" rel="noopener" target="_blank"><span data-dcnode-id="4050" instrument_node="">1 Thessalonians 4:3-8</span></a><span data-dcnode-id="4048" instrument_node="">), and otherwise promote sexual purity in your home (Proverbs 5-7</span><span data-dcnode-id="4047" instrument_node="">).&nbsp; The pursuit of sexual purity should govern your entertainment choices, season your speech, and guide you when you’re in public or private, especially when you think no one else is looking or listening.&nbsp; Your own sexual purity will protect you and your children from the heartbreak known well among a depraved generation (</span><a class="rtBibleRef" data-dcnode-id="4045" data-purpose="bible-reference" data-reference="Prov 5.7-14" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Prov%25205.7-14" rel="noopener" target="_blank"><span data-dcnode-id="4046" instrument_node="">Proverbs 5:7-14</span></a><span data-dcnode-id="4044" instrument_node="">).</span></p><span data-dcnode-id="4042" instrument_node="">
</span><p data-dcnode-id="4039"><strong data-dcnode-id="4040" style="mso-bidi-font-weight: normal;"><span data-dcnode-id="4041" instrument_node="">4.&nbsp; Manage Your Resources Wisely</span></strong></p><span data-dcnode-id="4038" instrument_node="">
</span><p data-dcnode-id="4024"><span data-dcnode-id="4037" instrument_node="">Take great pains to manage the Lord’s money and resources with which you are entrusted, and do so with the utmost integrity (</span><a class="rtBibleRef" data-dcnode-id="4035" data-purpose="bible-reference" data-reference="1 Tim 6.5-10" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/1%2520Tim%25206.5-10" rel="noopener" target="_blank"><span data-dcnode-id="4036" instrument_node="">1Timothy 6:5-10</span></a><span data-dcnode-id="4034" instrument_node="">).&nbsp; Continually think of ways to be a better steward of all your time, talent, and treasure (</span><a class="rtBibleRef" data-dcnode-id="4032" data-purpose="bible-reference" data-reference="Prov 31.10-31" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Prov%252031.10-31" rel="noopener" target="_blank"><span data-dcnode-id="4033" instrument_node="">Proverbs 31:10-31</span></a><span data-dcnode-id="4031" instrument_node="">), always looking to God for His provision for all your basic life needs (</span><a class="rtBibleRef" data-dcnode-id="4029" data-purpose="bible-reference" data-reference="Matt 6.31-34" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Matt%25206.31-34" rel="noopener" target="_blank"><span data-dcnode-id="4030" instrument_node="">Matthew 6:31-34</span></a><span data-dcnode-id="4028" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="4026" data-purpose="bible-reference" data-reference="1 Tim 5.8" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/1%2520Tim%25205.8" rel="noopener" target="_blank"><span data-dcnode-id="4027" instrument_node="">1 Timothy 5:8</span></a><span data-dcnode-id="4025" instrument_node="">).&nbsp;</span></p><span data-dcnode-id="4023" instrument_node="">
</span><p data-dcnode-id="4020"><strong data-dcnode-id="4021" style="mso-bidi-font-weight: normal;"><span data-dcnode-id="4022" instrument_node="">5.&nbsp; Evangelize Your Children and Others</span></strong></p><span data-dcnode-id="4019" instrument_node="">
</span><p data-dcnode-id="4011"><span data-dcnode-id="4018" instrument_node="">Because of your great love for your children, endeavor to be a consistent witness to them of your own faith, as well as speaking often to them about the nature of their relationship to the Lord.&nbsp; Live in such a way around your kids that you are fulfilling the spirit of Paul’s command to Timothy: “Do the work of an evangelist” (</span><a class="rtBibleRef" data-dcnode-id="4016" data-purpose="bible-reference" data-reference="2 Tim 4.5" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/2%2520Tim%25204.5" rel="noopener" target="_blank"><span data-dcnode-id="4017" instrument_node="">2 Timothy 4:5</span></a><span data-dcnode-id="4015" instrument_node="">).&nbsp; In addition, as you have opportunity, proclaim the gospel to others with whom you come in contact, thus hopefully instilling in your children the same desire to share this eternal message (</span><a class="rtBibleRef" data-dcnode-id="4013" data-purpose="bible-reference" data-reference="1 Cor 15.1-4" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/1%2520Cor%252015.1-4" rel="noopener" target="_blank"><span data-dcnode-id="4014" instrument_node="">1 Corinthians 15:1-4</span></a><span data-dcnode-id="4012" instrument_node="">).</span></p><span data-dcnode-id="4010" instrument_node="">
</span><p data-dcnode-id="4007"><strong data-dcnode-id="4008" style="mso-bidi-font-weight: normal;"><span data-dcnode-id="4009" instrument_node="">6.&nbsp; Teach Your Children the Word of God</span></strong></p><span data-dcnode-id="4006" instrument_node="">
</span><p data-dcnode-id="3998"><span data-dcnode-id="4005" instrument_node="">Regularly teach your children God’s Word, both by your life (desiring to be models of Christ-likeness to them; </span><a class="rtBibleRef" data-dcnode-id="4003" data-purpose="bible-reference" data-reference="1 John 2.6" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/1%2520John%25202.6" rel="noopener" target="_blank"><span data-dcnode-id="4004" instrument_node="">1 John 2:6</span></a><span data-dcnode-id="4002" instrument_node="">) and by your proactive and consistent commitment to family worship.&nbsp; Especially as fathers (as well as single mothers too), you have the responsibility to impart the truth of Scripture to your children for their great good (</span><a class="rtBibleRef" data-dcnode-id="4000" data-purpose="bible-reference" data-reference="Deut 6.4-9" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Deut%25206.4-9" rel="noopener" target="_blank"><span data-dcnode-id="4001" instrument_node="">Deuteronomy 6:4-9</span></a><span data-dcnode-id="3999" instrument_node="">).&nbsp;</span></p><span data-dcnode-id="3997" instrument_node="">
</span><p data-dcnode-id="3994"><strong data-dcnode-id="3995" style="mso-bidi-font-weight: normal;"><span data-dcnode-id="3996" instrument_node="">7.&nbsp; Discipline Your Children</span></strong></p><span data-dcnode-id="3993" instrument_node="">
</span><p data-dcnode-id="3979"><span data-dcnode-id="3992" instrument_node="">When your children need correction (which, when they are young, may seem to be “ever and always”), discipline them with what the Bible calls the “rod of reproof.”&nbsp; Those parents who truly love their children will desire to do this in a caring, consistent, yet firm manner, attempting to avoid harshness and anger.&nbsp; Scripture says that when you do so, children will cease their foolishness and become wise (</span><a class="rtBibleRef" data-dcnode-id="3990" data-purpose="bible-reference" data-reference="Prov 13.24" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Prov%252013.24" rel="noopener" target="_blank"><span data-dcnode-id="3991" instrument_node="">Proverbs 13:24</span></a><span data-dcnode-id="3989" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="3987" data-purpose="bible-reference" data-reference="Proverbs 19.18" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Proverbs%252019.18" rel="noopener" target="_blank"><span data-dcnode-id="3988" instrument_node="">19:18</span></a><span data-dcnode-id="3986" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="3984" data-purpose="bible-reference" data-reference="Proverbs 22.15" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Proverbs%252022.15" rel="noopener" target="_blank"><span data-dcnode-id="3985" instrument_node="">22:15</span></a><span data-dcnode-id="3983" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="3981" data-purpose="bible-reference" data-reference="Proverbs 23.13-14" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Proverbs%252023.13-14" rel="noopener" target="_blank"><span data-dcnode-id="3982" instrument_node="">23:13-14</span></a><span data-dcnode-id="3980" instrument_node="">).&nbsp;</span></p><span data-dcnode-id="3978" instrument_node="">
</span><p data-dcnode-id="3975"><strong data-dcnode-id="3976" style="mso-bidi-font-weight: normal;"><span data-dcnode-id="3977" instrument_node="">8.&nbsp; Watch Your Words Carefully</span></strong></p><span data-dcnode-id="3974" instrument_node="">
</span><p data-dcnode-id="3954"><span data-dcnode-id="3973" instrument_node="">Words are very powerful tools for good or evil!&nbsp; They can either build up or tear down.&nbsp; Speak to your spouse, your children, and others with godly wisdom so that you may edify and encourage (</span><a class="rtBibleRef" data-dcnode-id="3971" data-purpose="bible-reference" data-reference="Prov 4.24" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Prov%25204.24" rel="noopener" target="_blank"><span data-dcnode-id="3972" instrument_node="">Proverbs 4:24</span></a><span data-dcnode-id="3970" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="3968" data-purpose="bible-reference" data-reference="Proverbs 6.12" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Proverbs%25206.12" rel="noopener" target="_blank"><span data-dcnode-id="3969" instrument_node="">6:12</span></a><span data-dcnode-id="3967" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="3965" data-purpose="bible-reference" data-reference="Proverbs 10.32" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Proverbs%252010.32" rel="noopener" target="_blank"><span data-dcnode-id="3966" instrument_node="">10:32</span></a><span data-dcnode-id="3964" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="3962" data-purpose="bible-reference" data-reference="Proverbs 19.1" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Proverbs%252019.1" rel="noopener" target="_blank"><span data-dcnode-id="3963" instrument_node="">19:1</span></a><span data-dcnode-id="3961" instrument_node="">).&nbsp; Your children are watching you intently, and what you say (including </span><em data-dcnode-id="3959" style="mso-bidi-font-style: normal;"><span data-dcnode-id="3960" instrument_node="">how </span></em><span data-dcnode-id="3958" instrument_node="">you say it), will have deep and lastly effects on them.&nbsp; Train your children not to speak unrighteously (</span><a class="rtBibleRef" data-dcnode-id="3956" data-purpose="bible-reference" data-reference="Eph 4.29-31" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Eph%25204.29-31" rel="noopener" target="_blank"><span data-dcnode-id="3957" instrument_node="">Ephesians 4:29-31</span></a><span data-dcnode-id="3955" instrument_node="">).</span></p><span data-dcnode-id="3953" instrument_node="">
</span><p data-dcnode-id="3950"><strong data-dcnode-id="3951" style="mso-bidi-font-weight: normal;"><span data-dcnode-id="3952" instrument_node="">9.&nbsp; Show Your Children Your Own Love for God and Man</span></strong></p><span data-dcnode-id="3949" instrument_node="">
</span><p data-dcnode-id="3941"><span data-dcnode-id="3948" instrument_node="">Love your God with all your heart, mind, soul, and strength, and love your neighbor as yourself (</span><a class="rtBibleRef" data-dcnode-id="3946" data-purpose="bible-reference" data-reference="Matt 22.37-40" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Matt%252022.37-40" rel="noopener" target="_blank"><span data-dcnode-id="3947" instrument_node="">Matthew 22:37-40</span></a><span data-dcnode-id="3945" instrument_node="">).&nbsp; The greatest gift you can give your kids is to show them your all-consuming love for Jesus Christ!&nbsp; What should flow from this passion is also your love for your neighbors, which certainly includes your immediate family.&nbsp; Extending beyond this circle of influence is your desire to live a pure and undefiled spiritual life, which is demonstrated by visiting orphans and widows in their distress, and keeping yourself unstained by the world (</span><a class="rtBibleRef" data-dcnode-id="3943" data-purpose="bible-reference" data-reference="James 1.27" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/James%25201.27" rel="noopener" target="_blank"><span data-dcnode-id="3944" instrument_node="">James 1:27</span></a><span data-dcnode-id="3942" instrument_node="">).&nbsp; Pray that your example of love will have great impact on on your children.&nbsp;&nbsp;&nbsp;</span></p><span data-dcnode-id="3940" instrument_node="">
</span><p data-dcnode-id="3937"><strong data-dcnode-id="3938" style="mso-bidi-font-weight: normal;"><span data-dcnode-id="3939" instrument_node="">10.&nbsp; Ask God for Grace and Strength in Your Child-Rearing</span></strong></p><span data-dcnode-id="3936" instrument_node="">
</span><p data-dcnode-id="3928"><span data-dcnode-id="3935" instrument_node="">The Bible commands you to rear your children in the discipline and instruction of the Lord (</span><a class="rtBibleRef" data-dcnode-id="3933" data-purpose="bible-reference" data-reference="Eph 6.4" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Eph%25206.4" rel="noopener" target="_blank"><span data-dcnode-id="3934" instrument_node="">Ephesians 6:4</span></a><span data-dcnode-id="3932" instrument_node="">).&nbsp; Thus, child-rearing is not an option.&nbsp; Thus, the remaining question should be: </span><em data-dcnode-id="3930" style="mso-bidi-font-style: normal;"><span data-dcnode-id="3931" instrument_node="">How well are you doing as a parent?</span></em><span data-dcnode-id="3929" instrument_node="">&nbsp; To whatever degree you perceive you are succeeding or failing in the task, and regardless of what will be the initial outcome and ultimate destiny of your children, ask God for much grace and strength to be a parent who glorifies Him.</span></p><span data-dcnode-id="3927" instrument_node="">
</span><p data-dcnode-id="3925"><span data-dcnode-id="3926" instrument_node="">If you’ll follow these “ten commandments” of parenting, the Lord will sanctify you and bless you.&nbsp; Furthermore, your life and doctrine can be useful to the Holy Spirit in demonstrating the saving power of the gospel to your children.&nbsp; The rest we must leave in the hands of a sovereign God.</span></p><span data-dcnode-id="3924" instrument_node="">
</span><p data-dcnode-id="3922"><span data-dcnode-id="3923" instrument_node="">May God continually remind all of us of our solemn parental task to leave a legacy of godly faithfulness to the succeeding generations.&nbsp;</span></p></div><span data-dcnode-id="3920" instrument_node="">

</span><div class="btn-group horizontal" data-dcnode-id="3818"><span data-dcnode-id="3837" instrument_node="">

</span><button class="btn waves-effect" data-bind="click:emailLink " data-dcnode-id="3820" type="button"><i class="fa fa-envelope-o" data-dcnode-id="3824"></i><span data-dcnode-id="3823" instrument_node=""> </span><span data-dcnode-id="3821"><span data-dcnode-id="3822" instrument_node="">Email</span></span></button><span data-dcnode-id="3819" instrument_node="">

</span><div data-dcnode-id="3641" data-swiftype-name="body" data-swiftype-type="text"><p data-dcnode-id="3815"><span data-dcnode-id="3816" instrument_node="">One of the most common questions I get from Christian parents is about parenting.&nbsp; They want specific and practical advice for rearing their children in the very best way.&nbsp; Couples usually understand their general parental responsibility, but will often speak of the need for help in specifically framing their biblical commitments to optimally shepherd and train their children.</span></p><span data-dcnode-id="3814" instrument_node="">
</span><p data-dcnode-id="3812"><span data-dcnode-id="3813" instrument_node="">Whether you are considering your parental responsibilities with a new child, or even reaffirming these biblical principles with your older children (It’s never too late!), or even as grandparents toward your grandchildren, the following “ten commandments” from God’s Word are sure to benefit you, your family, and your church.</span></p><span data-dcnode-id="3811" instrument_node="">
</span><p data-dcnode-id="3808"><strong data-dcnode-id="3809"><span data-dcnode-id="3810" instrument_node="">1.&nbsp; Pursue Righteousness in Your Marriage</span></strong></p><span data-dcnode-id="3807" instrument_node="">
</span><p data-dcnode-id="3802"><span data-dcnode-id="3806" instrument_node="">Husbands, you need to show your children how a husband loves his wife, even as Christ loved the church (</span><a class="rtBibleRef" data-dcnode-id="3804" data-purpose="bible-reference" data-reference="Eph 5.25" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Eph%25205.25" rel="noopener" target="_blank"><span data-dcnode-id="3805" instrument_node="">Ephesians 5:25</span></a><span data-dcnode-id="3803" instrument_node="">).&nbsp; Do they see you giving yourself up for her?&nbsp; Are they observing how you tenderly and patiently lead her, teach her, and protect her?&nbsp; Your example in the treatment of your wife will teach volumes about Christ’s love for His beloved bride, the church.</span></p><span data-dcnode-id="3801" instrument_node="">
</span><p data-dcnode-id="3796"><span data-dcnode-id="3800" instrument_node="">Wives, to your children you need to model biblical submission as you subject yourself to your husband in everything (</span><a class="rtBibleRef" data-dcnode-id="3798" data-purpose="bible-reference" data-reference="Eph 5.24" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Eph%25205.24" rel="noopener" target="_blank"><span data-dcnode-id="3799" instrument_node="">Ephesians 5:24</span></a><span data-dcnode-id="3797" instrument_node="">).&nbsp; Do your children see how you work out your submission to Christ in respectful submission to your husband?&nbsp; Your marriage is a living, breathing example of the church’s willing submission to her Head, the Lord Jesus Christ.</span></p><span data-dcnode-id="3795" instrument_node="">
</span><p data-dcnode-id="3792"><strong data-dcnode-id="3793" style="mso-bidi-font-weight: normal;"><span data-dcnode-id="3794" instrument_node="">2.&nbsp; Confess Your Sins to One Another</span></strong></p><span data-dcnode-id="3791" instrument_node="">
</span><p data-dcnode-id="3777"><span data-dcnode-id="3790" instrument_node="">You need to confess, when appropriate, your sins to your family (</span><a class="rtBibleRef" data-dcnode-id="3788" data-purpose="bible-reference" data-reference="Prov 28.13" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Prov%252028.13" rel="noopener" target="_blank"><span data-dcnode-id="3789" instrument_node="">Proverbs 28:13</span></a><span data-dcnode-id="3787" instrument_node="">), and seek their forgiveness when necessary (</span><a class="rtBibleRef" data-dcnode-id="3785" data-purpose="bible-reference" data-reference="Matt 6.14-15" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Matt%25206.14-15" rel="noopener" target="_blank"><span data-dcnode-id="3786" instrument_node="">Matthew 6:14-15</span></a><span data-dcnode-id="3784" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="3782" data-purpose="bible-reference" data-reference="Col 3.13" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Col%25203.13" rel="noopener" target="_blank"><span data-dcnode-id="3783" instrument_node="">Colossians 3:13</span></a><span data-dcnode-id="3781" instrument_node="">).&nbsp; As you are quick to confess, you are demonstrating true humility and an ultimate desire to be pleasing to God in all your ways (</span><a class="rtBibleRef" data-dcnode-id="3779" data-purpose="bible-reference" data-reference="2 Cor 5.9" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/2%2520Cor%25205.9" rel="noopener" target="_blank"><span data-dcnode-id="3780" instrument_node="">2 Corinthians 5:9</span></a><span data-dcnode-id="3778" instrument_node="">).</span></p><span data-dcnode-id="3776" instrument_node="">
</span><p data-dcnode-id="3773"><strong data-dcnode-id="3774" style="mso-bidi-font-weight: normal;"><span data-dcnode-id="3775" instrument_node="">3.&nbsp; Pursue Sexual Purity</span></strong></p><span data-dcnode-id="3772" instrument_node="">
</span><p data-dcnode-id="3763"><span data-dcnode-id="3771" instrument_node="">Be very careful to protect your home from the sexual immorality of the world we live in.&nbsp; That means you need to abstain from sexual immorality yourself (</span><a class="rtBibleRef" data-dcnode-id="3769" data-purpose="bible-reference" data-reference="1 Thess 4.3-8" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/1%2520Thess%25204.3-8" rel="noopener" target="_blank"><span data-dcnode-id="3770" instrument_node="">1 Thessalonians 4:3-8</span></a><span data-dcnode-id="3768" instrument_node="">), and otherwise promote sexual purity in your home (Proverbs 5-7</span><span data-dcnode-id="3767" instrument_node="">).&nbsp; The pursuit of sexual purity should govern your entertainment choices, season your speech, and guide you when you’re in public or private, especially when you think no one else is looking or listening.&nbsp; Your own sexual purity will protect you and your children from the heartbreak known well among a depraved generation (</span><a class="rtBibleRef" data-dcnode-id="3765" data-purpose="bible-reference" data-reference="Prov 5.7-14" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Prov%25205.7-14" rel="noopener" target="_blank"><span data-dcnode-id="3766" instrument_node="">Proverbs 5:7-14</span></a><span data-dcnode-id="3764" instrument_node="">).</span></p><span data-dcnode-id="3762" instrument_node="">
</span><p data-dcnode-id="3759"><strong data-dcnode-id="3760" style="mso-bidi-font-weight: normal;"><span data-dcnode-id="3761" instrument_node="">4.&nbsp; Manage Your Resources Wisely</span></strong></p><span data-dcnode-id="3758" instrument_node="">
</span><p data-dcnode-id="3744"><span data-dcnode-id="3757" instrument_node="">Take great pains to manage the Lord’s money and resources with which you are entrusted, and do so with the utmost integrity (</span><a class="rtBibleRef" data-dcnode-id="3755" data-purpose="bible-reference" data-reference="1 Tim 6.5-10" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/1%2520Tim%25206.5-10" rel="noopener" target="_blank"><span data-dcnode-id="3756" instrument_node="">1Timothy 6:5-10</span></a><span data-dcnode-id="3754" instrument_node="">).&nbsp; Continually think of ways to be a better steward of all your time, talent, and treasure (</span><a class="rtBibleRef" data-dcnode-id="3752" data-purpose="bible-reference" data-reference="Prov 31.10-31" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Prov%252031.10-31" rel="noopener" target="_blank"><span data-dcnode-id="3753" instrument_node="">Proverbs 31:10-31</span></a><span data-dcnode-id="3751" instrument_node="">), always looking to God for His provision for all your basic life needs (</span><a class="rtBibleRef" data-dcnode-id="3749" data-purpose="bible-reference" data-reference="Matt 6.31-34" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Matt%25206.31-34" rel="noopener" target="_blank"><span data-dcnode-id="3750" instrument_node="">Matthew 6:31-34</span></a><span data-dcnode-id="3748" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="3746" data-purpose="bible-reference" data-reference="1 Tim 5.8" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/1%2520Tim%25205.8" rel="noopener" target="_blank"><span data-dcnode-id="3747" instrument_node="">1 Timothy 5:8</span></a><span data-dcnode-id="3745" instrument_node="">).&nbsp;</span></p><span data-dcnode-id="3743" instrument_node="">
</span><p data-dcnode-id="3740"><strong data-dcnode-id="3741" style="mso-bidi-font-weight: normal;"><span data-dcnode-id="3742" instrument_node="">5.&nbsp; Evangelize Your Children and Others</span></strong></p><span data-dcnode-id="3739" instrument_node="">
</span><p data-dcnode-id="3731"><span data-dcnode-id="3738" instrument_node="">Because of your great love for your children, endeavor to be a consistent witness to them of your own faith, as well as speaking often to them about the nature of their relationship to the Lord.&nbsp; Live in such a way around your kids that you are fulfilling the spirit of Paul’s command to Timothy: “Do the work of an evangelist” (</span><a class="rtBibleRef" data-dcnode-id="3736" data-purpose="bible-reference" data-reference="2 Tim 4.5" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/2%2520Tim%25204.5" rel="noopener" target="_blank"><span data-dcnode-id="3737" instrument_node="">2 Timothy 4:5</span></a><span data-dcnode-id="3735" instrument_node="">).&nbsp; In addition, as you have opportunity, proclaim the gospel to others with whom you come in contact, thus hopefully instilling in your children the same desire to share this eternal message (</span><a class="rtBibleRef" data-dcnode-id="3733" data-purpose="bible-reference" data-reference="1 Cor 15.1-4" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/1%2520Cor%252015.1-4" rel="noopener" target="_blank"><span data-dcnode-id="3734" instrument_node="">1 Corinthians 15:1-4</span></a><span data-dcnode-id="3732" instrument_node="">).</span></p><span data-dcnode-id="3730" instrument_node="">
</span><p data-dcnode-id="3727"><strong data-dcnode-id="3728" style="mso-bidi-font-weight: normal;"><span data-dcnode-id="3729" instrument_node="">6.&nbsp; Teach Your Children the Word of God</span></strong></p><span data-dcnode-id="3726" instrument_node="">
</span><p data-dcnode-id="3718"><span data-dcnode-id="3725" instrument_node="">Regularly teach your children God’s Word, both by your life (desiring to be models of Christ-likeness to them; </span><a class="rtBibleRef" data-dcnode-id="3723" data-purpose="bible-reference" data-reference="1 John 2.6" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/1%2520John%25202.6" rel="noopener" target="_blank"><span data-dcnode-id="3724" instrument_node="">1 John 2:6</span></a><span data-dcnode-id="3722" instrument_node="">) and by your proactive and consistent commitment to family worship.&nbsp; Especially as fathers (as well as single mothers too), you have the responsibility to impart the truth of Scripture to your children for their great good (</span><a class="rtBibleRef" data-dcnode-id="3720" data-purpose="bible-reference" data-reference="Deut 6.4-9" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Deut%25206.4-9" rel="noopener" target="_blank"><span data-dcnode-id="3721" instrument_node="">Deuteronomy 6:4-9</span></a><span data-dcnode-id="3719" instrument_node="">).&nbsp;</span></p><span data-dcnode-id="3717" instrument_node="">
</span><p data-dcnode-id="3714"><strong data-dcnode-id="3715" style="mso-bidi-font-weight: normal;"><span data-dcnode-id="3716" instrument_node="">7.&nbsp; Discipline Your Children</span></strong></p><span data-dcnode-id="3713" instrument_node="">
</span><p data-dcnode-id="3699"><span data-dcnode-id="3712" instrument_node="">When your children need correction (which, when they are young, may seem to be “ever and always”), discipline them with what the Bible calls the “rod of reproof.”&nbsp; Those parents who truly love their children will desire to do this in a caring, consistent, yet firm manner, attempting to avoid harshness and anger.&nbsp; Scripture says that when you do so, children will cease their foolishness and become wise (</span><a class="rtBibleRef" data-dcnode-id="3710" data-purpose="bible-reference" data-reference="Prov 13.24" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Prov%252013.24" rel="noopener" target="_blank"><span data-dcnode-id="3711" instrument_node="">Proverbs 13:24</span></a><span data-dcnode-id="3709" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="3707" data-purpose="bible-reference" data-reference="Proverbs 19.18" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Proverbs%252019.18" rel="noopener" target="_blank"><span data-dcnode-id="3708" instrument_node="">19:18</span></a><span data-dcnode-id="3706" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="3704" data-purpose="bible-reference" data-reference="Proverbs 22.15" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Proverbs%252022.15" rel="noopener" target="_blank"><span data-dcnode-id="3705" instrument_node="">22:15</span></a><span data-dcnode-id="3703" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="3701" data-purpose="bible-reference" data-reference="Proverbs 23.13-14" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Proverbs%252023.13-14" rel="noopener" target="_blank"><span data-dcnode-id="3702" instrument_node="">23:13-14</span></a><span data-dcnode-id="3700" instrument_node="">).&nbsp;</span></p><span data-dcnode-id="3698" instrument_node="">
</span><p data-dcnode-id="3695"><strong data-dcnode-id="3696" style="mso-bidi-font-weight: normal;"><span data-dcnode-id="3697" instrument_node="">8.&nbsp; Watch Your Words Carefully</span></strong></p><span data-dcnode-id="3694" instrument_node="">
</span><p data-dcnode-id="3674"><span data-dcnode-id="3693" instrument_node="">Words are very powerful tools for good or evil!&nbsp; They can either build up or tear down.&nbsp; Speak to your spouse, your children, and others with godly wisdom so that you may edify and encourage (</span><a class="rtBibleRef" data-dcnode-id="3691" data-purpose="bible-reference" data-reference="Prov 4.24" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Prov%25204.24" rel="noopener" target="_blank"><span data-dcnode-id="3692" instrument_node="">Proverbs 4:24</span></a><span data-dcnode-id="3690" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="3688" data-purpose="bible-reference" data-reference="Proverbs 6.12" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Proverbs%25206.12" rel="noopener" target="_blank"><span data-dcnode-id="3689" instrument_node="">6:12</span></a><span data-dcnode-id="3687" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="3685" data-purpose="bible-reference" data-reference="Proverbs 10.32" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Proverbs%252010.32" rel="noopener" target="_blank"><span data-dcnode-id="3686" instrument_node="">10:32</span></a><span data-dcnode-id="3684" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="3682" data-purpose="bible-reference" data-reference="Proverbs 19.1" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Proverbs%252019.1" rel="noopener" target="_blank"><span data-dcnode-id="3683" instrument_node="">19:1</span></a><span data-dcnode-id="3681" instrument_node="">).&nbsp; Your children are watching you intently, and what you say (including </span><em data-dcnode-id="3679" style="mso-bidi-font-style: normal;"><span data-dcnode-id="3680" instrument_node="">how </span></em><span data-dcnode-id="3678" instrument_node="">you say it), will have deep and lastly effects on them.&nbsp; Train your children not to speak unrighteously (</span><a class="rtBibleRef" data-dcnode-id="3676" data-purpose="bible-reference" data-reference="Eph 4.29-31" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Eph%25204.29-31" rel="noopener" target="_blank"><span data-dcnode-id="3677" instrument_node="">Ephesians 4:29-31</span></a><span data-dcnode-id="3675" instrument_node="">).</span></p><span data-dcnode-id="3673" instrument_node="">
</span><p data-dcnode-id="3670"><strong data-dcnode-id="3671" style="mso-bidi-font-weight: normal;"><span data-dcnode-id="3672" instrument_node="">9.&nbsp; Show Your Children Your Own Love for God and Man</span></strong></p><span data-dcnode-id="3669" instrument_node="">
</span><p data-dcnode-id="3661"><span data-dcnode-id="3668" instrument_node="">Love your God with all your heart, mind, soul, and strength, and love your neighbor as yourself (</span><a class="rtBibleRef" data-dcnode-id="3666" data-purpose="bible-reference" data-reference="Matt 22.37-40" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Matt%252022.37-40" rel="noopener" target="_blank"><span data-dcnode-id="3667" instrument_node="">Matthew 22:37-40</span></a><span data-dcnode-id="3665" instrument_node="">).&nbsp; The greatest gift you can give your kids is to show them your all-consuming love for Jesus Christ!&nbsp; What should flow from this passion is also your love for your neighbors, which certainly includes your immediate family.&nbsp; Extending beyond this circle of influence is your desire to live a pure and undefiled spiritual life, which is demonstrated by visiting orphans and widows in their distress, and keeping yourself unstained by the world (</span><a class="rtBibleRef" data-dcnode-id="3663" data-purpose="bible-reference" data-reference="James 1.27" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/James%25201.27" rel="noopener" target="_blank"><span data-dcnode-id="3664" instrument_node="">James 1:27</span></a><span data-dcnode-id="3662" instrument_node="">).&nbsp; Pray that your example of love will have great impact on on your children.&nbsp;&nbsp;&nbsp;</span></p><span data-dcnode-id="3660" instrument_node="">
</span><p data-dcnode-id="3657"><strong data-dcnode-id="3658" style="mso-bidi-font-weight: normal;"><span data-dcnode-id="3659" instrument_node="">10.&nbsp; Ask God for Grace and Strength in Your Child-Rearing</span></strong></p><span data-dcnode-id="3656" instrument_node="">
</span><p data-dcnode-id="3648"><span data-dcnode-id="3655" instrument_node="">The Bible commands you to rear your children in the discipline and instruction of the Lord (</span><a class="rtBibleRef" data-dcnode-id="3653" data-purpose="bible-reference" data-reference="Eph 6.4" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Eph%25206.4" rel="noopener" target="_blank"><span data-dcnode-id="3654" instrument_node="">Ephesians 6:4</span></a><span data-dcnode-id="3652" instrument_node="">).&nbsp; Thus, child-rearing is not an option.&nbsp; Thus, the remaining question should be: </span><em data-dcnode-id="3650" style="mso-bidi-font-style: normal;"><span data-dcnode-id="3651" instrument_node="">How well are you doing as a parent?</span></em><span data-dcnode-id="3649" instrument_node="">&nbsp; To whatever degree you perceive you are succeeding or failing in the task, and regardless of what will be the initial outcome and ultimate destiny of your children, ask God for much grace and strength to be a parent who glorifies Him.</span></p><span data-dcnode-id="3647" instrument_node="">
</span><p data-dcnode-id="3645"><span data-dcnode-id="3646" instrument_node="">If you’ll follow these “ten commandments” of parenting, the Lord will sanctify you and bless you.&nbsp; Furthermore, your life and doctrine can be useful to the Holy Spirit in demonstrating the saving power of the gospel to your children.&nbsp; The rest we must leave in the hands of a sovereign God.</span></p><span data-dcnode-id="3644" instrument_node="">
</span><p data-dcnode-id="3642"><span data-dcnode-id="3643" instrument_node="">May God continually remind all of us of our solemn parental task to leave a legacy of godly faithfulness to the succeeding generations.&nbsp;</span></p></div><span data-dcnode-id="3640" instrument_node="">

</span><div class="btn-group horizontal" data-dcnode-id="3511"><span data-dcnode-id="3530" instrument_node="">
</span><button class="btn waves-effect" data-bind="click:clickPrint " data-dcnode-id="3525" type="button"><i class="mdi-action-print" data-dcnode-id="3529"></i><span data-dcnode-id="3528" instrument_node=""> </span><span data-dcnode-id="3526"><span data-dcnode-id="3527" instrument_node="">Print</span></span></button><span data-dcnode-id="3524" instrument_node="">
</span><button class="btn waves-effect" data-bind="click:clickPdf" data-dcnode-id="3519" type="button"><i class="fa fa-file-pdf-o" data-dcnode-id="3523"></i><span data-dcnode-id="3522" instrument_node=""> </span><span data-dcnode-id="3520"><span data-dcnode-id="3521" instrument_node="">PDF</span></span></button><span data-dcnode-id="3518" instrument_node="">
</span><button class="btn waves-effect" data-bind="click:emailLink " data-dcnode-id="3513" type="button"><i class="fa fa-envelope-o" data-dcnode-id="3517"></i><span data-dcnode-id="3516" instrument_node=""> </span><span data-dcnode-id="3514"><span data-dcnode-id="3515" instrument_node="">Email</span></span></button><span data-dcnode-id="3512" instrument_node="">
</span></div><span data-dcnode-id="3510" instrument_node="">
</span><div data-bind="html:description" data-dcnode-id="3334"><p data-dcnode-id="3508"><span data-dcnode-id="3509" instrument_node="">One of the most common questions I get from Christian parents is about parenting.&nbsp; They want specific and practical advice for rearing their children in the very best way.&nbsp; Couples usually understand their general parental responsibility, but will often speak of the need for help in specifically framing their biblical commitments to optimally shepherd and train their children.</span></p><span data-dcnode-id="3507" instrument_node="">
</span><p data-dcnode-id="3505"><span data-dcnode-id="3506" instrument_node="">Whether you are considering your parental responsibilities with a new child, or even reaffirming these biblical principles with your older children (It’s never too late!), or even as grandparents toward your grandchildren, the following “ten commandments” from God’s Word are sure to benefit you, your family, and your church.</span></p><span data-dcnode-id="3504" instrument_node="">
</span><p data-dcnode-id="3501"><strong data-dcnode-id="3502"><span data-dcnode-id="3503" instrument_node="">1.&nbsp; Pursue Righteousness in Your Marriage</span></strong></p><span data-dcnode-id="3500" instrument_node="">
</span><p data-dcnode-id="3495"><span data-dcnode-id="3499" instrument_node="">Husbands, you need to show your children how a husband loves his wife, even as Christ loved the church (</span><a class="rtBibleRef" data-dcnode-id="3497" data-purpose="bible-reference" data-reference="Eph 5.25" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Eph%25205.25" rel="noopener" target="_blank"><span data-dcnode-id="3498" instrument_node="">Ephesians 5:25</span></a><span data-dcnode-id="3496" instrument_node="">).&nbsp; Do they see you giving yourself up for her?&nbsp; Are they observing how you tenderly and patiently lead her, teach her, and protect her?&nbsp; Your example in the treatment of your wife will teach volumes about Christ’s love for His beloved bride, the church.</span></p><span data-dcnode-id="3494" instrument_node="">
</span><p data-dcnode-id="3489"><span data-dcnode-id="3493" instrument_node="">Wives, to your children you need to model biblical submission as you subject yourself to your husband in everything (</span><a class="rtBibleRef" data-dcnode-id="3491" data-purpose="bible-reference" data-reference="Eph 5.24" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Eph%25205.24" rel="noopener" target="_blank"><span data-dcnode-id="3492" instrument_node="">Ephesians 5:24</span></a><span data-dcnode-id="3490" instrument_node="">).&nbsp; Do your children see how you work out your submission to Christ in respectful submission to your husband?&nbsp; Your marriage is a living, breathing example of the church’s willing submission to her Head, the Lord Jesus Christ.</span></p><span data-dcnode-id="3488" instrument_node="">
</span><p data-dcnode-id="3485"><strong data-dcnode-id="3486" style="mso-bidi-font-weight: normal;"><span data-dcnode-id="3487" instrument_node="">2.&nbsp; Confess Your Sins to One Another</span></strong></p><span data-dcnode-id="3484" instrument_node="">
</span><p data-dcnode-id="3470"><span data-dcnode-id="3483" instrument_node="">You need to confess, when appropriate, your sins to your family (</span><a class="rtBibleRef" data-dcnode-id="3481" data-purpose="bible-reference" data-reference="Prov 28.13" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Prov%252028.13" rel="noopener" target="_blank"><span data-dcnode-id="3482" instrument_node="">Proverbs 28:13</span></a><span data-dcnode-id="3480" instrument_node="">), and seek their forgiveness when necessary (</span><a class="rtBibleRef" data-dcnode-id="3478" data-purpose="bible-reference" data-reference="Matt 6.14-15" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Matt%25206.14-15" rel="noopener" target="_blank"><span data-dcnode-id="3479" instrument_node="">Matthew 6:14-15</span></a><span data-dcnode-id="3477" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="3475" data-purpose="bible-reference" data-reference="Col 3.13" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Col%25203.13" rel="noopener" target="_blank"><span data-dcnode-id="3476" instrument_node="">Colossians 3:13</span></a><span data-dcnode-id="3474" instrument_node="">).&nbsp; As you are quick to confess, you are demonstrating true humility and an ultimate desire to be pleasing to God in all your ways (</span><a class="rtBibleRef" data-dcnode-id="3472" data-purpose="bible-reference" data-reference="2 Cor 5.9" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/2%2520Cor%25205.9" rel="noopener" target="_blank"><span data-dcnode-id="3473" instrument_node="">2 Corinthians 5:9</span></a><span data-dcnode-id="3471" instrument_node="">).</span></p><span data-dcnode-id="3469" instrument_node="">
</span><p data-dcnode-id="3466"><strong data-dcnode-id="3467" style="mso-bidi-font-weight: normal;"><span data-dcnode-id="3468" instrument_node="">3.&nbsp; Pursue Sexual Purity</span></strong></p><span data-dcnode-id="3465" instrument_node="">
</span><p data-dcnode-id="3456"><span data-dcnode-id="3464" instrument_node="">Be very careful to protect your home from the sexual immorality of the world we live in.&nbsp; That means you need to abstain from sexual immorality yourself (</span><a class="rtBibleRef" data-dcnode-id="3462" data-purpose="bible-reference" data-reference="1 Thess 4.3-8" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/1%2520Thess%25204.3-8" rel="noopener" target="_blank"><span data-dcnode-id="3463" instrument_node="">1 Thessalonians 4:3-8</span></a><span data-dcnode-id="3461" instrument_node="">), and otherwise promote sexual purity in your home (Proverbs 5-7</span><span data-dcnode-id="3460" instrument_node="">).&nbsp; The pursuit of sexual purity should govern your entertainment choices, season your speech, and guide you when you’re in public or private, especially when you think no one else is looking or listening.&nbsp; Your own sexual purity will protect you and your children from the heartbreak known well among a depraved generation (</span><a class="rtBibleRef" data-dcnode-id="3458" data-purpose="bible-reference" data-reference="Prov 5.7-14" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Prov%25205.7-14" rel="noopener" target="_blank"><span data-dcnode-id="3459" instrument_node="">Proverbs 5:7-14</span></a><span data-dcnode-id="3457" instrument_node="">).</span></p><span data-dcnode-id="3455" instrument_node="">
</span><p data-dcnode-id="3452"><strong data-dcnode-id="3453" style="mso-bidi-font-weight: normal;"><span data-dcnode-id="3454" instrument_node="">4.&nbsp; Manage Your Resources Wisely</span></strong></p><span data-dcnode-id="3451" instrument_node="">
</span><p data-dcnode-id="3437"><span data-dcnode-id="3450" instrument_node="">Take great pains to manage the Lord’s money and resources with which you are entrusted, and do so with the utmost integrity (</span><a class="rtBibleRef" data-dcnode-id="3448" data-purpose="bible-reference" data-reference="1 Tim 6.5-10" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/1%2520Tim%25206.5-10" rel="noopener" target="_blank"><span data-dcnode-id="3449" instrument_node="">1Timothy 6:5-10</span></a><span data-dcnode-id="3447" instrument_node="">).&nbsp; Continually think of ways to be a better steward of all your time, talent, and treasure (</span><a class="rtBibleRef" data-dcnode-id="3445" data-purpose="bible-reference" data-reference="Prov 31.10-31" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Prov%252031.10-31" rel="noopener" target="_blank"><span data-dcnode-id="3446" instrument_node="">Proverbs 31:10-31</span></a><span data-dcnode-id="3444" instrument_node="">), always looking to God for His provision for all your basic life needs (</span><a class="rtBibleRef" data-dcnode-id="3442" data-purpose="bible-reference" data-reference="Matt 6.31-34" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Matt%25206.31-34" rel="noopener" target="_blank"><span data-dcnode-id="3443" instrument_node="">Matthew 6:31-34</span></a><span data-dcnode-id="3441" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="3439" data-purpose="bible-reference" data-reference="1 Tim 5.8" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/1%2520Tim%25205.8" rel="noopener" target="_blank"><span data-dcnode-id="3440" instrument_node="">1 Timothy 5:8</span></a><span data-dcnode-id="3438" instrument_node="">).&nbsp;</span></p><span data-dcnode-id="3436" instrument_node="">
</span><p data-dcnode-id="3433"><strong data-dcnode-id="3434" style="mso-bidi-font-weight: normal;"><span data-dcnode-id="3435" instrument_node="">5.&nbsp; Evangelize Your Children and Others</span></strong></p><span data-dcnode-id="3432" instrument_node="">
</span><p data-dcnode-id="3424"><span data-dcnode-id="3431" instrument_node="">Because of your great love for your children, endeavor to be a consistent witness to them of your own faith, as well as speaking often to them about the nature of their relationship to the Lord.&nbsp; Live in such a way around your kids that you are fulfilling the spirit of Paul’s command to Timothy: “Do the work of an evangelist” (</span><a class="rtBibleRef" data-dcnode-id="3429" data-purpose="bible-reference" data-reference="2 Tim 4.5" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/2%2520Tim%25204.5" rel="noopener" target="_blank"><span data-dcnode-id="3430" instrument_node="">2 Timothy 4:5</span></a><span data-dcnode-id="3428" instrument_node="">).&nbsp; In addition, as you have opportunity, proclaim the gospel to others with whom you come in contact, thus hopefully instilling in your children the same desire to share this eternal message (</span><a class="rtBibleRef" data-dcnode-id="3426" data-purpose="bible-reference" data-reference="1 Cor 15.1-4" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/1%2520Cor%252015.1-4" rel="noopener" target="_blank"><span data-dcnode-id="3427" instrument_node="">1 Corinthians 15:1-4</span></a><span data-dcnode-id="3425" instrument_node="">).</span></p><span data-dcnode-id="3423" instrument_node="">
</span><p data-dcnode-id="3420"><strong data-dcnode-id="3421" style="mso-bidi-font-weight: normal;"><span data-dcnode-id="3422" instrument_node="">6.&nbsp; Teach Your Children the Word of God</span></strong></p><span data-dcnode-id="3419" instrument_node="">
</span><p data-dcnode-id="3411"><span data-dcnode-id="3418" instrument_node="">Regularly teach your children God’s Word, both by your life (desiring to be models of Christ-likeness to them; </span><a class="rtBibleRef" data-dcnode-id="3416" data-purpose="bible-reference" data-reference="1 John 2.6" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/1%2520John%25202.6" rel="noopener" target="_blank"><span data-dcnode-id="3417" instrument_node="">1 John 2:6</span></a><span data-dcnode-id="3415" instrument_node="">) and by your proactive and consistent commitment to family worship.&nbsp; Especially as fathers (as well as single mothers too), you have the responsibility to impart the truth of Scripture to your children for their great good (</span><a class="rtBibleRef" data-dcnode-id="3413" data-purpose="bible-reference" data-reference="Deut 6.4-9" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Deut%25206.4-9" rel="noopener" target="_blank"><span data-dcnode-id="3414" instrument_node="">Deuteronomy 6:4-9</span></a><span data-dcnode-id="3412" instrument_node="">).&nbsp;</span></p><span data-dcnode-id="3410" instrument_node="">
</span><p data-dcnode-id="3407"><strong data-dcnode-id="3408" style="mso-bidi-font-weight: normal;"><span data-dcnode-id="3409" instrument_node="">7.&nbsp; Discipline Your Children</span></strong></p><span data-dcnode-id="3406" instrument_node="">
</span><p data-dcnode-id="3392"><span data-dcnode-id="3405" instrument_node="">When your children need correction (which, when they are young, may seem to be “ever and always”), discipline them with what the Bible calls the “rod of reproof.”&nbsp; Those parents who truly love their children will desire to do this in a caring, consistent, yet firm manner, attempting to avoid harshness and anger.&nbsp; Scripture says that when you do so, children will cease their foolishness and become wise (</span><a class="rtBibleRef" data-dcnode-id="3403" data-purpose="bible-reference" data-reference="Prov 13.24" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Prov%252013.24" rel="noopener" target="_blank"><span data-dcnode-id="3404" instrument_node="">Proverbs 13:24</span></a><span data-dcnode-id="3402" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="3400" data-purpose="bible-reference" data-reference="Proverbs 19.18" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Proverbs%252019.18" rel="noopener" target="_blank"><span data-dcnode-id="3401" instrument_node="">19:18</span></a><span data-dcnode-id="3399" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="3397" data-purpose="bible-reference" data-reference="Proverbs 22.15" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Proverbs%252022.15" rel="noopener" target="_blank"><span data-dcnode-id="3398" instrument_node="">22:15</span></a><span data-dcnode-id="3396" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="3394" data-purpose="bible-reference" data-reference="Proverbs 23.13-14" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Proverbs%252023.13-14" rel="noopener" target="_blank"><span data-dcnode-id="3395" instrument_node="">23:13-14</span></a><span data-dcnode-id="3393" instrument_node="">).&nbsp;</span></p><span data-dcnode-id="3391" instrument_node="">
</span><p data-dcnode-id="3388"><strong data-dcnode-id="3389" style="mso-bidi-font-weight: normal;"><span data-dcnode-id="3390" instrument_node="">8.&nbsp; Watch Your Words Carefully</span></strong></p><span data-dcnode-id="3387" instrument_node="">
</span><p data-dcnode-id="3367"><span data-dcnode-id="3386" instrument_node="">Words are very powerful tools for good or evil!&nbsp; They can either build up or tear down.&nbsp; Speak to your spouse, your children, and others with godly wisdom so that you may edify and encourage (</span><a class="rtBibleRef" data-dcnode-id="3384" data-purpose="bible-reference" data-reference="Prov 4.24" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Prov%25204.24" rel="noopener" target="_blank"><span data-dcnode-id="3385" instrument_node="">Proverbs 4:24</span></a><span data-dcnode-id="3383" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="3381" data-purpose="bible-reference" data-reference="Proverbs 6.12" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Proverbs%25206.12" rel="noopener" target="_blank"><span data-dcnode-id="3382" instrument_node="">6:12</span></a><span data-dcnode-id="3380" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="3378" data-purpose="bible-reference" data-reference="Proverbs 10.32" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Proverbs%252010.32" rel="noopener" target="_blank"><span data-dcnode-id="3379" instrument_node="">10:32</span></a><span data-dcnode-id="3377" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="3375" data-purpose="bible-reference" data-reference="Proverbs 19.1" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Proverbs%252019.1" rel="noopener" target="_blank"><span data-dcnode-id="3376" instrument_node="">19:1</span></a><span data-dcnode-id="3374" instrument_node="">).&nbsp; Your children are watching you intently, and what you say (including </span><em data-dcnode-id="3372" style="mso-bidi-font-style: normal;"><span data-dcnode-id="3373" instrument_node="">how </span></em><span data-dcnode-id="3371" instrument_node="">you say it), will have deep and lastly effects on them.&nbsp; Train your children not to speak unrighteously (</span><a class="rtBibleRef" data-dcnode-id="3369" data-purpose="bible-reference" data-reference="Eph 4.29-31" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Eph%25204.29-31" rel="noopener" target="_blank"><span data-dcnode-id="3370" instrument_node="">Ephesians 4:29-31</span></a><span data-dcnode-id="3368" instrument_node="">).</span></p><span data-dcnode-id="3366" instrument_node="">
</span><p data-dcnode-id="3363"><strong data-dcnode-id="3364" style="mso-bidi-font-weight: normal;"><span data-dcnode-id="3365" instrument_node="">9.&nbsp; Show Your Children Your Own Love for God and Man</span></strong></p><span data-dcnode-id="3362" instrument_node="">
</span><p data-dcnode-id="3354"><span data-dcnode-id="3361" instrument_node="">Love your God with all your heart, mind, soul, and strength, and love your neighbor as yourself (</span><a class="rtBibleRef" data-dcnode-id="3359" data-purpose="bible-reference" data-reference="Matt 22.37-40" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Matt%252022.37-40" rel="noopener" target="_blank"><span data-dcnode-id="3360" instrument_node="">Matthew 22:37-40</span></a><span data-dcnode-id="3358" instrument_node="">).&nbsp; The greatest gift you can give your kids is to show them your all-consuming love for Jesus Christ!&nbsp; What should flow from this passion is also your love for your neighbors, which certainly includes your immediate family.&nbsp; Extending beyond this circle of influence is your desire to live a pure and undefiled spiritual life, which is demonstrated by visiting orphans and widows in their distress, and keeping yourself unstained by the world (</span><a class="rtBibleRef" data-dcnode-id="3356" data-purpose="bible-reference" data-reference="James 1.27" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/James%25201.27" rel="noopener" target="_blank"><span data-dcnode-id="3357" instrument_node="">James 1:27</span></a><span data-dcnode-id="3355" instrument_node="">).&nbsp; Pray that your example of love will have great impact on on your children.&nbsp;&nbsp;&nbsp;</span></p><span data-dcnode-id="3353" instrument_node="">
</span><p data-dcnode-id="3350"><strong data-dcnode-id="3351" style="mso-bidi-font-weight: normal;"><span data-dcnode-id="3352" instrument_node="">10.&nbsp; Ask God for Grace and Strength in Your Child-Rearing</span></strong></p><span data-dcnode-id="3349" instrument_node="">
</span><p data-dcnode-id="3341"><span data-dcnode-id="3348" instrument_node="">The Bible commands you to rear your children in the discipline and instruction of the Lord (</span><a class="rtBibleRef" data-dcnode-id="3346" data-purpose="bible-reference" data-reference="Eph 6.4" data-version="nasb95" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nasb95/Eph%25206.4" rel="noopener" target="_blank"><span data-dcnode-id="3347" instrument_node="">Ephesians 6:4</span></a><span data-dcnode-id="3345" instrument_node="">).&nbsp; Thus, child-rearing is not an option.&nbsp; Thus, the remaining question should be: </span><em data-dcnode-id="3343" style="mso-bidi-font-style: normal;"><span data-dcnode-id="3344" instrument_node="">How well are you doing as a parent?</span></em><span data-dcnode-id="3342" instrument_node="">&nbsp; To whatever degree you perceive you are succeeding or failing in the task, and regardless of what will be the initial outcome and ultimate destiny of your children, ask God for much grace and strength to be a parent who glorifies Him.</span></p><span data-dcnode-id="3340" instrument_node="">
</span><p data-dcnode-id="3338"><span data-dcnode-id="3339" instrument_node="">If you’ll follow these “ten commandments” of parenting, the Lord will sanctify you and bless you.&nbsp; Furthermore, your life and doctrine can be useful to the Holy Spirit in demonstrating the saving power of the gospel to your children.&nbsp; The rest we must leave in the hands of a sovereign God.</span></p><span data-dcnode-id="3337" instrument_node="">
</span><p data-dcnode-id="3335"><span data-dcnode-id="3336" instrument_node="">May God continually remind all of us of our solemn parental task to leave a legacy of godly faithfulness to the succeeding generations.&nbsp;</span></p></div><span data-dcnode-id="3333" instrument_node="">
