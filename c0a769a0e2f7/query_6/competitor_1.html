</span><h1 class="page__title" data-dcnode-id="939" id="page-title" itemprop="headline"><span data-dcnode-id="940" instrument_node="">The Exodus Itineraries
</span></h1><span data-dcnode-id="938" instrument_node="">
</span><p class="page__meta" data-dcnode-id="931"><span data-dcnode-id="937" instrument_node="">

          9 minute read

</span><section class="page__content" data-dcnode-id="264" itemprop="text"><span data-dcnode-id="927" instrument_node="">
</span><aside class="sidebar__right sticky" data-dcnode-id="887"><span data-dcnode-id="926" instrument_node="">
</span><nav class="toc" data-dcnode-id="889"><span data-dcnode-id="925" instrument_node="">
</span><header data-dcnode-id="921"><h4 class="nav__title" data-dcnode-id="922"><i class="fas fa-file-alt" data-dcnode-id="924"></i><span data-dcnode-id="923" instrument_node=""> On this page</span></h4></header><span data-dcnode-id="920" instrument_node="">
</span><ul class="toc__menu" data-dcnode-id="891"><li data-dcnode-id="907"><a data-dcnode-id="918" href="#overview-of-the-itineraries"><span data-dcnode-id="919" instrument_node="">Overview of the itineraries</span></a><ul data-dcnode-id="908"><li data-dcnode-id="915"><a data-dcnode-id="916" href="#numbers-33"><span data-dcnode-id="917" instrument_node="">Numbers 33</span></a></li><li data-dcnode-id="912"><a data-dcnode-id="913" href="#exodus--numbers-narratives"><span data-dcnode-id="914" instrument_node="">Exodus &amp; Numbers narratives</span></a></li><li data-dcnode-id="909"><a data-dcnode-id="910" href="#moses-speech-in-deuteronomy"><span data-dcnode-id="911" instrument_node="">Moses’ speech in Deuteronomy</span></a></li></ul></li><li data-dcnode-id="904"><a data-dcnode-id="905" href="#combining-the-itineraries"><span data-dcnode-id="906" instrument_node="">Combining the itineraries</span></a></li><li data-dcnode-id="901"><a data-dcnode-id="902" href="#differences"><span data-dcnode-id="903" instrument_node="">Differences</span></a></li><li data-dcnode-id="898"><a data-dcnode-id="899" href="#a-known-problem"><span data-dcnode-id="900" instrument_node="">A known problem?</span></a></li><li data-dcnode-id="895"><a data-dcnode-id="896" href="#is-there-an-explanation-for-the-differences"><span data-dcnode-id="897" instrument_node="">Is there an explanation for the differences?</span></a></li><li data-dcnode-id="892"><a data-dcnode-id="893" href="#conclusions"><span data-dcnode-id="894" instrument_node="">Conclusions</span></a></li></ul><span data-dcnode-id="890" instrument_node="">
</span></nav><span data-dcnode-id="888" instrument_node="">
</span></aside><span data-dcnode-id="886" instrument_node="">
</span><p data-dcnode-id="881"><span data-dcnode-id="885" instrument_node="">Reading itineraries has a similar effect on the mind as </span><a data-dcnode-id="883" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblicalhistoricalcontext.com/quirks-in-chronicles/ezer-elead-and-exodus/"><span data-dcnode-id="884" instrument_node="">reading genealogies</span></a><span data-dcnode-id="882" instrument_node="">. But, it’s worth ploughing through them for the same reason we should suffer the name lists – there’s often more in there than meets the eye. The Exodus itineraries are no exception.</span></p><span data-dcnode-id="880" instrument_node="">
</span><p data-dcnode-id="878"><span data-dcnode-id="879" instrument_node="">There are three main sources in the Hebrew Bible for the Israelites’ itinerary through the wilderness between Egypt and Canaan:</span></p><span data-dcnode-id="877" instrument_node="">
</span><ol data-dcnode-id="848"><span data-dcnode-id="876" instrument_node="">
</span><li data-dcnode-id="872"><strong data-dcnode-id="874"><span data-dcnode-id="875" instrument_node="">Numbers 33</span></strong><span data-dcnode-id="873" instrument_node=""> – It sticks fairly closely to an itinerary format, i.e. “They set out from X and camped at Y”, making it quite easy to draw up a list of all the places the Israelites passed through.</span></li><span data-dcnode-id="871" instrument_node="">
</span><li data-dcnode-id="861"><strong data-dcnode-id="869"><span data-dcnode-id="870" instrument_node="">The narratives found in Exodus and Numbers</span></strong><span data-dcnode-id="868" instrument_node=""> – This itinerary takes a little more work to extract, but it’s not too much hassle. It begins in Rameses (</span><a class="rtBibleRef" data-dcnode-id="866" data-purpose="bible-reference" data-reference="Exod 12.37" data-version="nrsv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nrsv/Exod%252012.37" rel="noopener" target="_blank"><span data-dcnode-id="867" instrument_node="">Exodus 12:37</span></a><span data-dcnode-id="865" instrument_node="">) and ends on the plain of Moab (</span><a class="rtBibleRef" data-dcnode-id="863" data-purpose="bible-reference" data-reference="Num 22.1" data-version="nrsv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nrsv/Num%252022.1" rel="noopener" target="_blank"><span data-dcnode-id="864" instrument_node="">Numbers 22:1</span></a><span data-dcnode-id="862" instrument_node="">).</span></li><span data-dcnode-id="860" instrument_node="">
</span><li data-dcnode-id="850"><strong data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">Moses’ speech in Deuteronomy 1-3</span></strong><span data-dcnode-id="857" instrument_node=""> – Here the Israelites’ journey begins at Mt Sinai (</span><a class="rtBibleRef" data-dcnode-id="855" data-purpose="bible-reference" data-reference="Deut 1.19" data-version="nrsv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nrsv/Deut%25201.19" rel="noopener" target="_blank"><span data-dcnode-id="856" instrument_node="">Deuteronomy 1:19</span></a><span data-dcnode-id="854" instrument_node="">) and ends in the valley opposite Beth-peor (</span><a class="rtBibleRef" data-dcnode-id="852" data-purpose="bible-reference" data-reference="Deut 3.29" data-version="nrsv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nrsv/Deut%25203.29" rel="noopener" target="_blank"><span data-dcnode-id="853" instrument_node="">Deuteronomy 3:29</span></a><span data-dcnode-id="851" instrument_node="">).</span></li><span data-dcnode-id="849" instrument_node="">
</span></ol><span data-dcnode-id="847" instrument_node="">
</span><figure class="" data-dcnode-id="842"><span data-dcnode-id="846" instrument_node="">
</span><img alt="" data-dcnode-id="845" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblicalhistoricalcontext.com/assets/images/exodus-itineraries/plain_of_moab.png&amp;raw"><figcaption data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">
      The Plain of Moab

    </span></figcaption></figure><span data-dcnode-id="841" instrument_node="">
</span><h2 data-dcnode-id="835" id="overview-of-the-itineraries"><span data-dcnode-id="840" instrument_node="">Overview of the itineraries</span><a class="header-link" data-dcnode-id="836" href="#overview-of-the-itineraries" title="Permalink"><span class="sr-only" data-dcnode-id="838"><span data-dcnode-id="839" instrument_node="">Permalink</span></span><i class="fas fa-link" data-dcnode-id="837"></i></a></h2><span data-dcnode-id="834" instrument_node="">
</span><p data-dcnode-id="828"><span data-dcnode-id="833" instrument_node="">Here’s a short summary of each itinerary. Bear in mind that most of the places mentioned in all three sources have not been firmly identified,</span><sup data-dcnode-id="830" id="fnref:1" role="doc-noteref"><a class="footnote" data-dcnode-id="831" href="#fn:1" rel="footnote"><span data-dcnode-id="832" instrument_node="">1</span></a></sup><span data-dcnode-id="829" instrument_node=""> neither does their location really matter for what we’re dealing with in this post. So we’re sticking with the traditional locations for now.</span></p><span data-dcnode-id="827" instrument_node="">
</span><h3 data-dcnode-id="821" id="numbers-33"><span data-dcnode-id="826" instrument_node="">Numbers 33</span><a class="header-link" data-dcnode-id="822" href="#numbers-33" title="Permalink"><span class="sr-only" data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">Permalink</span></span><i class="fas fa-link" data-dcnode-id="823"></i></a></h3><span data-dcnode-id="820" instrument_node="">
</span><p data-dcnode-id="806"><span data-dcnode-id="819" instrument_node="">The Israelites leave Rameses (</span><a class="rtBibleRef" data-dcnode-id="817" data-purpose="bible-reference" data-reference="Num 33.3" data-version="nrsv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nrsv/Num%252033.3" rel="noopener" target="_blank"><span data-dcnode-id="818" instrument_node="">Nu 33:3</span></a><span data-dcnode-id="816" instrument_node="">), cross the Red Sea (</span><a class="rtBibleRef" data-dcnode-id="814" data-purpose="bible-reference" data-reference="Num 33.8" data-version="nrsv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nrsv/Num%252033.8" rel="noopener" target="_blank"><span data-dcnode-id="815" instrument_node="">Nu 33:8</span></a><span data-dcnode-id="813" instrument_node="">), wander through the wilderness of Sin (</span><a class="rtBibleRef" data-dcnode-id="811" data-purpose="bible-reference" data-reference="Num 33.11" data-version="nrsv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nrsv/Num%252033.11" rel="noopener" target="_blank"><span data-dcnode-id="812" instrument_node="">Nu 33:11</span></a><span data-dcnode-id="810" instrument_node="">), finally arriving at Sinai (</span><a class="rtBibleRef" data-dcnode-id="808" data-purpose="bible-reference" data-reference="Num 33.15" data-version="nrsv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nrsv/Num%252033.15" rel="noopener" target="_blank"><span data-dcnode-id="809" instrument_node="">Nu 33:15</span></a><span data-dcnode-id="807" instrument_node="">).</span></p><span data-dcnode-id="805" instrument_node="">
</span><figure class="" data-dcnode-id="800"><span data-dcnode-id="804" instrument_node="">
</span><img alt="" data-dcnode-id="803" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblicalhistoricalcontext.com/assets/images/exodus-itineraries/red_sea_from_sin.png&amp;raw"><figcaption data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">
      Looking over the Red Sea from Sin toward Egypt

    </span></figcaption></figure><span data-dcnode-id="799" instrument_node="">
</span><p data-dcnode-id="788"><span data-dcnode-id="798" instrument_node="">After leaving Sinai they head through the Sinai desert passing through Hazeroth (</span><a class="rtBibleRef" data-dcnode-id="796" data-purpose="bible-reference" data-reference="Num 33.17" data-version="nrsv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nrsv/Num%252033.17" rel="noopener" target="_blank"><span data-dcnode-id="797" instrument_node="">Nu 33:17</span></a><span data-dcnode-id="795" instrument_node="">) up to Ezion Geber near modern Eilat (</span><a class="rtBibleRef" data-dcnode-id="793" data-purpose="bible-reference" data-reference="Num 33.35" data-version="nrsv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nrsv/Num%252033.35" rel="noopener" target="_blank"><span data-dcnode-id="794" instrument_node="">Nu 33:35</span></a><span data-dcnode-id="792" instrument_node="">) on their way to Kadesh in the wilderness of Zin (</span><a class="rtBibleRef" data-dcnode-id="790" data-purpose="bible-reference" data-reference="Num 33.36" data-version="nrsv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nrsv/Num%252033.36" rel="noopener" target="_blank"><span data-dcnode-id="791" instrument_node="">Nu 33:36</span></a><span data-dcnode-id="789" instrument_node="">).</span></p><span data-dcnode-id="787" instrument_node="">
</span><figure class="" data-dcnode-id="782"><span data-dcnode-id="786" instrument_node="">
</span><img alt="" data-dcnode-id="785" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblicalhistoricalcontext.com/assets/images/exodus-itineraries/zin.png&amp;raw"><figcaption data-dcnode-id="783"><span data-dcnode-id="784" instrument_node="">
      Wadi Zin

    </span></figcaption></figure><span data-dcnode-id="781" instrument_node="">
</span><p data-dcnode-id="770"><span data-dcnode-id="780" instrument_node="">From Kadesh they head east (</span><a class="rtBibleRef" data-dcnode-id="778" data-purpose="bible-reference" data-reference="Num 33.40" data-version="nrsv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nrsv/Num%252033.40" rel="noopener" target="_blank"><span data-dcnode-id="779" instrument_node="">Nu 33:40</span></a><span data-dcnode-id="777" instrument_node="">), through Oboth (</span><a class="rtBibleRef" data-dcnode-id="775" data-purpose="bible-reference" data-reference="Num 33.43" data-version="nrsv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nrsv/Num%252033.43" rel="noopener" target="_blank"><span data-dcnode-id="776" instrument_node="">Nu 33:43</span></a><span data-dcnode-id="774" instrument_node="">) up onto the Transjordanian plateau (</span><a class="rtBibleRef" data-dcnode-id="772" data-purpose="bible-reference" data-reference="Num 33.44" data-version="nrsv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nrsv/Num%252033.44" rel="noopener" target="_blank"><span data-dcnode-id="773" instrument_node="">Nu 33:44</span></a><span data-dcnode-id="771" instrument_node="">).</span></p><span data-dcnode-id="769" instrument_node="">
</span><p data-dcnode-id="764"><span data-dcnode-id="768" instrument_node="">They then head north up the King’s Highway straight through the territory of Moab through Dibon (</span><a class="rtBibleRef" data-dcnode-id="766" data-purpose="bible-reference" data-reference="Num 33.45" data-version="nrsv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nrsv/Num%252033.45" rel="noopener" target="_blank"><span data-dcnode-id="767" instrument_node="">Nu 33:45</span></a><span data-dcnode-id="765" instrument_node="">).</span></p><span data-dcnode-id="763" instrument_node="">
</span><figure class="" data-dcnode-id="758"><span data-dcnode-id="762" instrument_node="">
</span><img alt="" data-dcnode-id="761" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblicalhistoricalcontext.com/assets/images/exodus-itineraries/kings_highway.png&amp;raw"><figcaption data-dcnode-id="759"><span data-dcnode-id="760" instrument_node="">
      The King’s Highway

    </span></figcaption></figure><span data-dcnode-id="757" instrument_node="">
</span><p data-dcnode-id="752"><span data-dcnode-id="756" instrument_node="">From there they continue up through Moab to Nebo, then west down into the Plain of Moab opposite Jericho (</span><a class="rtBibleRef" data-dcnode-id="754" data-purpose="bible-reference" data-reference="Num 33.48" data-version="nrsv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nrsv/Num%252033.48" rel="noopener" target="_blank"><span data-dcnode-id="755" instrument_node="">Nu 33:48</span></a><span data-dcnode-id="753" instrument_node="">).</span></p><span data-dcnode-id="751" instrument_node="">
</span><p data-dcnode-id="749"><span data-dcnode-id="750" instrument_node="">Here’s what it looks like on a map:</span></p><span data-dcnode-id="748" instrument_node="">
</span><figure class="" data-dcnode-id="742"><span data-dcnode-id="747" instrument_node="">
</span><img alt="" data-dcnode-id="746" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblicalhistoricalcontext.com/assets/images/exodus-itineraries/map_nu33.png&amp;raw"><figcaption data-dcnode-id="743"><span data-dcnode-id="745" instrument_node="">
      Map of the Numbers 33</span><span data-dcnode-id="744" instrument_node=""> itinerary

    </span></figcaption></figure><span data-dcnode-id="741" instrument_node="">
</span><h3 data-dcnode-id="735" id="exodus--numbers-narratives"><span data-dcnode-id="740" instrument_node="">Exodus &amp; Numbers narratives</span><a class="header-link" data-dcnode-id="736" href="#exodus--numbers-narratives" title="Permalink"><span class="sr-only" data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">Permalink</span></span><i class="fas fa-link" data-dcnode-id="737"></i></a></h3><span data-dcnode-id="734" instrument_node="">
</span><p data-dcnode-id="714"><span data-dcnode-id="733" instrument_node="">From Rameses (</span><a class="rtBibleRef" data-dcnode-id="731" data-purpose="bible-reference" data-reference="Exod 12.37" data-version="nrsv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nrsv/Exod%252012.37" rel="noopener" target="_blank"><span data-dcnode-id="732" instrument_node="">Ex 12:37</span></a><span data-dcnode-id="730" instrument_node="">) the Israelites travel to the point opposite Migdol (</span><a class="rtBibleRef" data-dcnode-id="728" data-purpose="bible-reference" data-reference="Exod 14.2" data-version="nrsv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nrsv/Exod%252014.2" rel="noopener" target="_blank"><span data-dcnode-id="729" instrument_node="">Ex 14:2</span></a><span data-dcnode-id="727" instrument_node="">), and cross the Red Sea (</span><a class="rtBibleRef" data-dcnode-id="725" data-purpose="bible-reference" data-reference="Exod 14.22" data-version="nrsv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nrsv/Exod%252014.22" rel="noopener" target="_blank"><span data-dcnode-id="726" instrument_node="">Ex 14:22</span></a><span data-dcnode-id="724" instrument_node="">). They then head via the wilderness of Sin (</span><a class="rtBibleRef" data-dcnode-id="722" data-purpose="bible-reference" data-reference="Exod 16.1" data-version="nrsv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nrsv/Exod%252016.1" rel="noopener" target="_blank"><span data-dcnode-id="723" instrument_node="">Ex 16:1</span></a><span data-dcnode-id="721" instrument_node="">) and Rephidim (</span><a class="rtBibleRef" data-dcnode-id="719" data-purpose="bible-reference" data-reference="Exod 17.1" data-version="nrsv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nrsv/Exod%252017.1" rel="noopener" target="_blank"><span data-dcnode-id="720" instrument_node="">Ex 17:1</span></a><span data-dcnode-id="718" instrument_node="">) to Sinai (</span><a class="rtBibleRef" data-dcnode-id="716" data-purpose="bible-reference" data-reference="Exod 19.1-3" data-version="nrsv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nrsv/Exod%252019.1-3" rel="noopener" target="_blank"><span data-dcnode-id="717" instrument_node="">Ex 19:1-3</span></a><span data-dcnode-id="715" instrument_node="">).</span></p><span data-dcnode-id="713" instrument_node="">
</span><figure class="" data-dcnode-id="708"><span data-dcnode-id="712" instrument_node="">
</span><img alt="" data-dcnode-id="711" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblicalhistoricalcontext.com/assets/images/exodus-itineraries/sinai.png&amp;raw"><figcaption data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">
      At the top of the traditional site of Mt Sinai

    </span></figcaption></figure><span data-dcnode-id="707" instrument_node="">
</span><p data-dcnode-id="699"><span data-dcnode-id="706" instrument_node="">After receiving the law they head north via Hazeroth (</span><a class="rtBibleRef" data-dcnode-id="704" data-purpose="bible-reference" data-reference="Num 11.35" data-version="nrsv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nrsv/Num%252011.35" rel="noopener" target="_blank"><span data-dcnode-id="705" instrument_node="">Nu 11:35</span></a><span data-dcnode-id="703" instrument_node="">) to Kadesh (</span><a class="rtBibleRef" data-dcnode-id="701" data-purpose="bible-reference" data-reference="Num 13.26" data-version="nrsv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nrsv/Num%252013.26" rel="noopener" target="_blank"><span data-dcnode-id="702" instrument_node="">Nu 13:26</span></a><span data-dcnode-id="700" instrument_node="">) from where the 12 spies are sent out.</span></p><span data-dcnode-id="698" instrument_node="">
</span><p data-dcnode-id="690"><span data-dcnode-id="697" instrument_node="">As a result of the faithless report brought back by the spies the Israelites are condemned to wander in the wilderness for forty years (</span><a class="rtBibleRef" data-dcnode-id="695" data-purpose="bible-reference" data-reference="Num 14.33-35" data-version="nrsv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nrsv/Num%252014.33-35" rel="noopener" target="_blank"><span data-dcnode-id="696" instrument_node="">Nu 14:33-35</span></a><span data-dcnode-id="694" instrument_node="">) in the region of the Aravah (</span><a class="rtBibleRef" data-dcnode-id="692" data-purpose="bible-reference" data-reference="Num 14.25" data-version="nrsv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nrsv/Num%252014.25" rel="noopener" target="_blank"><span data-dcnode-id="693" instrument_node="">Nu 14:25</span></a><span data-dcnode-id="691" instrument_node="">).</span></p><span data-dcnode-id="689" instrument_node="">
</span><p data-dcnode-id="672"><span data-dcnode-id="688" instrument_node="">After many years they come back to Kadesh (</span><a class="rtBibleRef" data-dcnode-id="686" data-purpose="bible-reference" data-reference="Num 20.1" data-version="nrsv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nrsv/Num%252020.1" rel="noopener" target="_blank"><span data-dcnode-id="687" instrument_node="">Nu 20:1</span></a><span data-dcnode-id="685" instrument_node="">) where Miriam dies. Next they go to Mt Hor, where Aaron dies (</span><a class="rtBibleRef" data-dcnode-id="683" data-purpose="bible-reference" data-reference="Num 20.22-29" data-version="nrsv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nrsv/Num%252020.22-29" rel="noopener" target="_blank"><span data-dcnode-id="684" instrument_node="">Nu 20:22-29</span></a><span data-dcnode-id="682" instrument_node="">). From there they head east to the Aravah – the Jordan Valley south of the Dead Sea – and travel on the Way to the Red Sea (</span><a class="rtBibleRef" data-dcnode-id="680" data-purpose="bible-reference" data-reference="Num 21.4" data-version="nrsv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nrsv/Num%252021.4" rel="noopener" target="_blank"><span data-dcnode-id="681" instrument_node="">Nu 21:4</span></a><span data-dcnode-id="679" instrument_node="">). Going through Oboth (</span><a class="rtBibleRef" data-dcnode-id="677" data-purpose="bible-reference" data-reference="Num 21.10" data-version="nrsv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nrsv/Num%252021.10" rel="noopener" target="_blank"><span data-dcnode-id="678" instrument_node="">Nu 21:10</span></a><span data-dcnode-id="676" instrument_node="">) they climb onto the Transjordanian plateau (</span><a class="rtBibleRef" data-dcnode-id="674" data-purpose="bible-reference" data-reference="Num 21.11" data-version="nrsv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nrsv/Num%252021.11" rel="noopener" target="_blank"><span data-dcnode-id="675" instrument_node="">Nu 21:11</span></a><span data-dcnode-id="673" instrument_node="">)</span></p><span data-dcnode-id="671" instrument_node="">
</span><figure class="" data-dcnode-id="666"><span data-dcnode-id="670" instrument_node="">
</span><img alt="" data-dcnode-id="669" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblicalhistoricalcontext.com/assets/images/exodus-itineraries/transjordan_over_aravah_from_zin.png&amp;raw"><figcaption data-dcnode-id="667"><span data-dcnode-id="668" instrument_node="">
      Looking down into the Aravah from Zin; Transjordan in the background

    </span></figcaption></figure><span data-dcnode-id="665" instrument_node="">
</span><p data-dcnode-id="648"><span data-dcnode-id="664" instrument_node="">The Israelites then head north to the river Zered (</span><a class="rtBibleRef" data-dcnode-id="662" data-purpose="bible-reference" data-reference="Num 21.12" data-version="nrsv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nrsv/Num%252021.12" rel="noopener" target="_blank"><span data-dcnode-id="663" instrument_node="">Nu 21:12</span></a><span data-dcnode-id="661" instrument_node="">) and continue on to the river Arnon (</span><a class="rtBibleRef" data-dcnode-id="659" data-purpose="bible-reference" data-reference="Num 21.13" data-version="nrsv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nrsv/Num%252021.13" rel="noopener" target="_blank"><span data-dcnode-id="660" instrument_node="">Nu 21:13</span></a><span data-dcnode-id="658" instrument_node="">). Still moving north they travel through Moab until they get to the top of Pisgah (</span><a class="rtBibleRef" data-dcnode-id="656" data-purpose="bible-reference" data-reference="Num 21.20" data-version="nrsv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nrsv/Num%252021.20" rel="noopener" target="_blank"><span data-dcnode-id="657" instrument_node="">Nu 21:20</span></a><span data-dcnode-id="655" instrument_node="">). After conquering the Transjordan (</span><a class="rtBibleRef" data-dcnode-id="653" data-purpose="bible-reference" data-reference="Num 21.21–35" data-version="nrsv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nrsv/Num%252021.21%25E2%2580%259335" rel="noopener" target="_blank"><span data-dcnode-id="654" instrument_node="">Nu 21:21–35</span></a><span data-dcnode-id="652" instrument_node="">) the Israelites head west down onto the Plain of Moab opposite Jericho (</span><a class="rtBibleRef" data-dcnode-id="650" data-purpose="bible-reference" data-reference="Num 22.1" data-version="nrsv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nrsv/Num%252022.1" rel="noopener" target="_blank"><span data-dcnode-id="651" instrument_node="">Nu 22:1</span></a><span data-dcnode-id="649" instrument_node="">).</span></p><span data-dcnode-id="647" instrument_node="">
</span><figure class="" data-dcnode-id="642"><span data-dcnode-id="646" instrument_node="">
</span><img alt="" data-dcnode-id="645" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblicalhistoricalcontext.com/assets/images/exodus-itineraries/zered.png&amp;raw"><figcaption data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">
      The River Zered

    </span></figcaption></figure><span data-dcnode-id="641" instrument_node="">
</span><p data-dcnode-id="639"><span data-dcnode-id="640" instrument_node="">And now in map form:</span></p><span data-dcnode-id="638" instrument_node="">
</span><figure class="" data-dcnode-id="633"><span data-dcnode-id="637" instrument_node="">
</span><img alt="" data-dcnode-id="636" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblicalhistoricalcontext.com/assets/images/exodus-itineraries/map_ExNuNarratives.png&amp;raw"><figcaption data-dcnode-id="634"><span data-dcnode-id="635" instrument_node="">
      Map of the itinerary found in the Exodus and Numbers narratives

    </span></figcaption></figure><span data-dcnode-id="632" instrument_node="">
</span><h3 data-dcnode-id="626" id="moses-speech-in-deuteronomy"><span data-dcnode-id="631" instrument_node="">Moses’ speech in Deuteronomy</span><a class="header-link" data-dcnode-id="627" href="#moses-speech-in-deuteronomy" title="Permalink"><span class="sr-only" data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">Permalink</span></span><i class="fas fa-link" data-dcnode-id="628"></i></a></h3><span data-dcnode-id="625" instrument_node="">
</span><p data-dcnode-id="620"><span data-dcnode-id="624" instrument_node="">Slightly unconventionally, this itinerary begins with the Israelites at Mt Sinai. From there they speed through to Kadesh (</span><a class="rtBibleRef" data-dcnode-id="622" data-purpose="bible-reference" data-reference="Deut 1.19" data-version="nrsv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nrsv/Deut%25201.19" rel="noopener" target="_blank"><span data-dcnode-id="623" instrument_node="">Dt 1:19</span></a><span data-dcnode-id="621" instrument_node="">) from where the spies are sent out (1:22–39).</span></p><span data-dcnode-id="619" instrument_node="">
</span><p data-dcnode-id="608"><span data-dcnode-id="618" instrument_node="">The Israelites are then told to head back into the wilderness toward the Red Sea (</span><a class="rtBibleRef" data-dcnode-id="616" data-purpose="bible-reference" data-reference="Deut 2.1" data-version="nrsv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nrsv/Deut%25202.1" rel="noopener" target="_blank"><span data-dcnode-id="617" instrument_node="">Dt 2:1</span></a><span data-dcnode-id="615" instrument_node="">) and “skirt Mount Seir for many days” (</span><a class="rtBibleRef" data-dcnode-id="613" data-purpose="bible-reference" data-reference="Deut 2.1" data-version="nrsv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nrsv/Deut%25202.1" rel="noopener" target="_blank"><span data-dcnode-id="614" instrument_node="">Dt 2:1</span></a><span data-dcnode-id="612" instrument_node="">) – Mount Seir is the name for the range of hills to the east of the Aravah north of Eilat.</span><sup data-dcnode-id="609" id="fnref:2" role="doc-noteref"><a class="footnote" data-dcnode-id="610" href="#fn:2" rel="footnote"><span data-dcnode-id="611" instrument_node="">2</span></a></sup></p><span data-dcnode-id="607" instrument_node="">
</span><figure class="" data-dcnode-id="602"><span data-dcnode-id="606" instrument_node="">
</span><img alt="" data-dcnode-id="605" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblicalhistoricalcontext.com/assets/images/exodus-itineraries/timna.png&amp;raw"><figcaption data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">
      Timna, not far north of Eilat

    </span></figcaption></figure><span data-dcnode-id="601" instrument_node="">
</span><p data-dcnode-id="593"><span data-dcnode-id="600" instrument_node="">They wander in this area (described as being the area of the Aravah, Eilat, and Ezion Geber) for a long time (</span><a class="rtBibleRef" data-dcnode-id="598" data-purpose="bible-reference" data-reference="Deut 2.3" data-version="nrsv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nrsv/Deut%25202.3" rel="noopener" target="_blank"><span data-dcnode-id="599" instrument_node="">Dt 2:3</span></a><span data-dcnode-id="597" instrument_node="">) and then head into Mt Seir (</span><a class="rtBibleRef" data-dcnode-id="595" data-purpose="bible-reference" data-reference="Deut 2.8" data-version="nrsv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nrsv/Deut%25202.8" rel="noopener" target="_blank"><span data-dcnode-id="596" instrument_node="">Dt 2:8</span></a><span data-dcnode-id="594" instrument_node="">) – following the modern route from Aqaba to Wadi Rum in the direction of Moab.</span></p><span data-dcnode-id="592" instrument_node="">
</span><figure class="" data-dcnode-id="587"><span data-dcnode-id="591" instrument_node="">
</span><img alt="" data-dcnode-id="590" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblicalhistoricalcontext.com/assets/images/exodus-itineraries/mt_seir.png&amp;raw"><figcaption data-dcnode-id="588"><span data-dcnode-id="589" instrument_node="">
      Looking out toward the Aravah from part of ‘Mount Seir’

    </span></figcaption></figure><span data-dcnode-id="586" instrument_node="">
</span><p data-dcnode-id="578"><span data-dcnode-id="585" instrument_node="">Along the way the Israelites cross the River Zered (</span><a class="rtBibleRef" data-dcnode-id="583" data-purpose="bible-reference" data-reference="Deut 2.13" data-version="nrsv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nrsv/Deut%25202.13" rel="noopener" target="_blank"><span data-dcnode-id="584" instrument_node="">Dt 2:13</span></a><span data-dcnode-id="582" instrument_node="">) where the last of the Israelites who left Egypt die off (</span><a class="rtBibleRef" data-dcnode-id="580" data-purpose="bible-reference" data-reference="Deut 2.14-15" data-version="nrsv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nrsv/Deut%25202.14-15" rel="noopener" target="_blank"><span data-dcnode-id="581" instrument_node="">Dt 2:14-15</span></a><span data-dcnode-id="579" instrument_node="">).</span></p><span data-dcnode-id="577" instrument_node="">
</span><p data-dcnode-id="569"><span data-dcnode-id="576" instrument_node="">Having been told not to engage the Moabites in warfare (</span><a class="rtBibleRef" data-dcnode-id="574" data-purpose="bible-reference" data-reference="Deut 2.9" data-version="nrsv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nrsv/Deut%25202.9" rel="noopener" target="_blank"><span data-dcnode-id="575" instrument_node="">Dt 2:9</span></a><span data-dcnode-id="573" instrument_node="">) who were located at this time between the Zered and the Arnon they head north peacefully to the River Arnon (</span><a class="rtBibleRef" data-dcnode-id="571" data-purpose="bible-reference" data-reference="Deut 2.24" data-version="nrsv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nrsv/Deut%25202.24" rel="noopener" target="_blank"><span data-dcnode-id="572" instrument_node="">Dt 2:24</span></a><span data-dcnode-id="570" instrument_node="">).</span></p><span data-dcnode-id="568" instrument_node="">
</span><figure class="" data-dcnode-id="563"><span data-dcnode-id="567" instrument_node="">
</span><img alt="" data-dcnode-id="566" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblicalhistoricalcontext.com/assets/images/exodus-itineraries/arnon.png&amp;raw"><figcaption data-dcnode-id="564"><span data-dcnode-id="565" instrument_node="">
      The River Arnon

    </span></figcaption></figure><span data-dcnode-id="562" instrument_node="">
</span><p data-dcnode-id="554"><span data-dcnode-id="561" instrument_node="">Once across the Arnon the Israelites take all the cities from there (Aroer being nestled on the northern edge of the Arnon), up to Gilead (</span><a class="rtBibleRef" data-dcnode-id="559" data-purpose="bible-reference" data-reference="Deut 2.36" data-version="nrsv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nrsv/Deut%25202.36" rel="noopener" target="_blank"><span data-dcnode-id="560" instrument_node="">Dt 2:36</span></a><span data-dcnode-id="558" instrument_node="">) in a thin strip to the east of the Kingdom of the Ammonites (</span><a class="rtBibleRef" data-dcnode-id="556" data-purpose="bible-reference" data-reference="Deut 2.37" data-version="nrsv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nrsv/Deut%25202.37" rel="noopener" target="_blank"><span data-dcnode-id="557" instrument_node="">Dt 2:37</span></a><span data-dcnode-id="555" instrument_node="">).</span></p><span data-dcnode-id="553" instrument_node="">
</span><p data-dcnode-id="542"><span data-dcnode-id="552" instrument_node="">After fighting Og king of Bashan (</span><a class="rtBibleRef" data-dcnode-id="550" data-purpose="bible-reference" data-reference="Deut 3.1-7" data-version="nrsv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nrsv/Deut%25203.1-7" rel="noopener" target="_blank"><span data-dcnode-id="551" instrument_node="">Dt 3:1-7</span></a><span data-dcnode-id="549" instrument_node="">) and dividing up the territory they’d captured (</span><a class="rtBibleRef" data-dcnode-id="547" data-purpose="bible-reference" data-reference="Deut 3.8-17" data-version="nrsv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nrsv/Deut%25203.8-17" rel="noopener" target="_blank"><span data-dcnode-id="548" instrument_node="">Dt 3:8-17</span></a><span data-dcnode-id="546" instrument_node="">) we find the Israelites camped in the valley opposite Beth-peor (</span><a class="rtBibleRef" data-dcnode-id="544" data-purpose="bible-reference" data-reference="Deut 3.29" data-version="nrsv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nrsv/Deut%25203.29" rel="noopener" target="_blank"><span data-dcnode-id="545" instrument_node="">Dt 3:29</span></a><span data-dcnode-id="543" instrument_node="">).</span></p><span data-dcnode-id="541" instrument_node="">
</span><p data-dcnode-id="539"><span data-dcnode-id="540" instrument_node="">And, on a map:</span></p><span data-dcnode-id="538" instrument_node="">
</span><figure class="" data-dcnode-id="533"><span data-dcnode-id="537" instrument_node="">
</span><img alt="" data-dcnode-id="536" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblicalhistoricalcontext.com/assets/images/exodus-itineraries/map_deut1-3.png&amp;raw"><figcaption data-dcnode-id="534"><span data-dcnode-id="535" instrument_node="">
      Map of the Deuteronomy itinerary

    </span></figcaption></figure><span data-dcnode-id="532" instrument_node="">
</span><p data-dcnode-id="530"><span data-dcnode-id="531" instrument_node="">If it’s not clear yet, we’re dealing with quite different itineraries.</span></p><span data-dcnode-id="529" instrument_node="">
</span><h2 data-dcnode-id="523" id="combining-the-itineraries"><span data-dcnode-id="528" instrument_node="">Combining the itineraries</span><a class="header-link" data-dcnode-id="524" href="#combining-the-itineraries" title="Permalink"><span class="sr-only" data-dcnode-id="526"><span data-dcnode-id="527" instrument_node="">Permalink</span></span><i class="fas fa-link" data-dcnode-id="525"></i></a></h2><span data-dcnode-id="522" instrument_node="">
</span><p data-dcnode-id="520"><span data-dcnode-id="521" instrument_node="">If we place all three itineraries on the same map we get the following:</span></p><span data-dcnode-id="519" instrument_node="">
</span><figure class="" data-dcnode-id="514"><span data-dcnode-id="518" instrument_node="">
</span><img alt="" data-dcnode-id="517" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblicalhistoricalcontext.com/assets/images/exodus-itineraries/map_combination.png&amp;raw"><figcaption data-dcnode-id="515"><span data-dcnode-id="516" instrument_node="">
      Map with combined Exodus itineraries

    </span></figcaption></figure><span data-dcnode-id="513" instrument_node="">
</span><p data-dcnode-id="511"><span data-dcnode-id="512" instrument_node="">See? Itineraries are interesting.</span></p><span data-dcnode-id="510" instrument_node="">
</span><h2 data-dcnode-id="504" id="differences"><span data-dcnode-id="509" instrument_node="">Differences</span><a class="header-link" data-dcnode-id="505" href="#differences" title="Permalink"><span class="sr-only" data-dcnode-id="507"><span data-dcnode-id="508" instrument_node="">Permalink</span></span><i class="fas fa-link" data-dcnode-id="506"></i></a></h2><span data-dcnode-id="503" instrument_node="">
</span><p data-dcnode-id="501"><span data-dcnode-id="502" instrument_node="">Let’s highlight a couple of differences between the itineraries:</span></p><span data-dcnode-id="500" instrument_node="">
</span><ol data-dcnode-id="489"><span data-dcnode-id="499" instrument_node="">
</span><li data-dcnode-id="496"><span data-dcnode-id="498" instrument_node="">The Exodus and Numbers narratives place the decades of wilderness wandering between the two visits to Kadesh. The first time they visit the spies are sent out; the second time they visit Miriam dies. Numbers 33</span><span data-dcnode-id="497" instrument_node=""> on the other hand has only one visit to Kadesh. Moses’ speech in Deuteronomy also has only one visit. The Deuteronomy itinerary does mention the wilderness wandering, but it is explicit in that when they’re finished wandering the Israelites head into Mt Seir; not Kadesh which would be in almost the opposite direction.</span></li><span data-dcnode-id="495" instrument_node="">
</span><li data-dcnode-id="491"><span data-dcnode-id="494" instrument_node="">In Numbers 33</span><span data-dcnode-id="493" instrument_node=""> and the Exodus and Numbers itineraries the journey from Kadesh (the only time in Numbers 33</span><span data-dcnode-id="492" instrument_node=""> and second visit in the Exodus and Numbers itinerary) to the Transjordanian plateau goes due east through Zin, across the Aravah and through Oboth before walking through the ravines up onto the Transjordanian plateau. In Deuteronomy on the other hand the Israelites head from Kadesh (their only visit) south-east towards Eilat, and from there they head through the Wadi Rum area and then head north.</span></li><span data-dcnode-id="490" instrument_node="">
</span></ol><span data-dcnode-id="488" instrument_node="">
</span><p data-dcnode-id="474"><span data-dcnode-id="487" instrument_node="">These differences between the itineraries cannot be reconciled. You cannot visit Kadesh </span><em data-dcnode-id="485"><span data-dcnode-id="486" instrument_node="">both</span></em><span data-dcnode-id="484" instrument_node=""> only once </span><em data-dcnode-id="482"><span data-dcnode-id="483" instrument_node="">and</span></em><span data-dcnode-id="481" instrument_node=""> twice. You cannot travel from Kadesh </span><em data-dcnode-id="479"><span data-dcnode-id="480" instrument_node="">both</span></em><span data-dcnode-id="478" instrument_node=""> due east across the Aravah into Transjordan </span><em data-dcnode-id="476"><span data-dcnode-id="477" instrument_node="">and</span></em><span data-dcnode-id="475" instrument_node=""> south to Eilat and up into the Edomite hills in the direction of Wadi Rum.</span></p><span data-dcnode-id="473" instrument_node="">
</span><h2 data-dcnode-id="467" id="a-known-problem"><span data-dcnode-id="472" instrument_node="">A known problem?</span><a class="header-link" data-dcnode-id="468" href="#a-known-problem" title="Permalink"><span class="sr-only" data-dcnode-id="470"><span data-dcnode-id="471" instrument_node="">Permalink</span></span><i class="fas fa-link" data-dcnode-id="469"></i></a></h2><span data-dcnode-id="466" instrument_node="">
</span><p data-dcnode-id="464"><span data-dcnode-id="465" instrument_node="">We are not the first to stumble across these differences, so let’s see what others have written on the matter.</span></p><span data-dcnode-id="463" instrument_node="">
</span><p data-dcnode-id="461"><span data-dcnode-id="462" instrument_node="">First up is Aharoni, a towering figure in the archaeology of Israel. Discussing the Kadesh-to-Plain-of-Moab itinerary of Deuteronomy vs. that found in the Numbers narrative he writes:</span></p><span data-dcnode-id="460" instrument_node="">
</span><blockquote data-dcnode-id="452"><span data-dcnode-id="459" instrument_node="">
</span><p data-dcnode-id="454"><span data-dcnode-id="458" instrument_node="">It would seem, therefore, that there are preserved here memories of two different journeys, the first in the fourteenth century to the plains of Moab before the various kingdoms in this area became organised, and the second in the thirteenth century which led around Edom and Moab along the fringe of the desert and which ended in the conquest of Heshbon. These different routes constitute one of the conclusive evidences that the Israelite conquest was not carried out in one campaign or at one time but rather continued in several waves which were blended together in the tradition to a single campaign of conquest.</span><sup data-dcnode-id="455" id="fnref:3" role="doc-noteref"><a class="footnote" data-dcnode-id="456" href="#fn:3" rel="footnote"><span data-dcnode-id="457" instrument_node="">3</span></a></sup></p><span data-dcnode-id="453" instrument_node="">
</span></blockquote><span data-dcnode-id="451" instrument_node="">
</span><p data-dcnode-id="449"><span data-dcnode-id="450" instrument_node="">Brown in his Expositional Bible Commentary provides no explanation for the differences, but he does note that they exist:</span></p><span data-dcnode-id="448" instrument_node="">
</span><blockquote data-dcnode-id="440"><span data-dcnode-id="447" instrument_node="">
</span><p data-dcnode-id="442"><span data-dcnode-id="446" instrument_node="">Moses recounts the way in which God brought the people to the border of Canaan by a different route and to a different place from the first occasion.</span><sup data-dcnode-id="443" id="fnref:4" role="doc-noteref"><a class="footnote" data-dcnode-id="444" href="#fn:4" rel="footnote"><span data-dcnode-id="445" instrument_node="">4</span></a></sup></p><span data-dcnode-id="441" instrument_node="">
</span></blockquote><span data-dcnode-id="439" instrument_node="">
</span><p data-dcnode-id="437"><span data-dcnode-id="438" instrument_node="">And before launching into an excellent treatment of the problem Tigay in the JPS Torah Commentary on Deuteronomy wryly notes:</span></p><span data-dcnode-id="436" instrument_node="">
</span><blockquote data-dcnode-id="428"><span data-dcnode-id="435" instrument_node="">
</span><p data-dcnode-id="430"><span data-dcnode-id="434" instrument_node="">There are several apparent discrepancies between these descriptions of the Israelites’ route.</span><sup data-dcnode-id="431" id="fnref:5" role="doc-noteref"><a class="footnote" data-dcnode-id="432" href="#fn:5" rel="footnote"><span data-dcnode-id="433" instrument_node="">5</span></a></sup></p><span data-dcnode-id="429" instrument_node="">
</span></blockquote><span data-dcnode-id="427" instrument_node="">
</span><p data-dcnode-id="422"><span data-dcnode-id="426" instrument_node="">So, we’re dealing with a known problem. The itineraries </span><em data-dcnode-id="424"><span data-dcnode-id="425" instrument_node="">are</span></em><span data-dcnode-id="423" instrument_node=""> different.</span></p><span data-dcnode-id="421" instrument_node="">
</span><h2 data-dcnode-id="415" id="is-there-an-explanation-for-the-differences"><span data-dcnode-id="420" instrument_node="">Is there an explanation for the differences?</span><a class="header-link" data-dcnode-id="416" href="#is-there-an-explanation-for-the-differences" title="Permalink"><span class="sr-only" data-dcnode-id="418"><span data-dcnode-id="419" instrument_node="">Permalink</span></span><i class="fas fa-link" data-dcnode-id="417"></i></a></h2><span data-dcnode-id="414" instrument_node="">
</span><p data-dcnode-id="412"><span data-dcnode-id="413" instrument_node="">In Aharoni’s writings we see one attempt to explain the problem: the different itineraries are attributed to different Exoduses. One itinerary was followed by one group at one point in time, another itinerary was followed by a different group at a different point in time.</span></p><span data-dcnode-id="411" instrument_node="">
</span><p data-dcnode-id="395"><span data-dcnode-id="410" instrument_node="">Others have attempted to “fix” the itineraries, e.g. finding a second Kadesh in the Numbers 33</span><span data-dcnode-id="409" instrument_node=""> itinerary – they claim that </span><a class="rtBibleRef" data-dcnode-id="407" data-purpose="bible-reference" data-reference="Num 33.16" data-version="nrsv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nrsv/Num%252033.16" rel="noopener" target="_blank"><span data-dcnode-id="408" instrument_node="">Nu 33:16</span></a><span data-dcnode-id="406" instrument_node="">’s Kibroth Hattaavah is another name for Kadesh.</span><sup data-dcnode-id="403" id="fnref:6" role="doc-noteref"><a class="footnote" data-dcnode-id="404" href="#fn:6" rel="footnote"><span data-dcnode-id="405" instrument_node="">6</span></a></sup><span data-dcnode-id="402" instrument_node=""> This however doesn’t work – Kibroth Hattaavah is somewhere that the Israelites visit on their way to Kadesh (cf. </span><a class="rtBibleRef" data-dcnode-id="400" data-purpose="bible-reference" data-reference="Num 11.34" data-version="nrsv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nrsv/Num%252011.34" rel="noopener" target="_blank"><span data-dcnode-id="401" instrument_node="">Nu 11:34</span></a><span data-dcnode-id="399" instrument_node=""> &amp; </span><a class="rtBibleRef" data-dcnode-id="397" data-purpose="bible-reference" data-reference="Nu 13.26" data-version="nrsv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/nrsv/Nu%252013.26" rel="noopener" target="_blank"><span data-dcnode-id="398" instrument_node="">13:26</span></a><span data-dcnode-id="396" instrument_node="">).</span></p><span data-dcnode-id="394" instrument_node="">
</span><p data-dcnode-id="388"><span data-dcnode-id="393" instrument_node="">Others claim that the Exodus and Numbers narratives along with the Numbers 33</span><span data-dcnode-id="392" instrument_node=""> itineraries simply miss out the portion of the journey that took them down to Eilat and up into the mountains of southern Jordan, thus reconciling the Deuteronomy itinerary with the others.</span><sup data-dcnode-id="389" id="fnref:7" role="doc-noteref"><a class="footnote" data-dcnode-id="390" href="#fn:7" rel="footnote"><span data-dcnode-id="391" instrument_node="">7</span></a></sup></p><span data-dcnode-id="387" instrument_node="">
</span><p data-dcnode-id="382"><span data-dcnode-id="386" instrument_node="">Finally, in the view of those following critical approaches, the inconsistencies between the itineraries are the result of a late editor weaving together ancient sacred documents, not feeling like they could change or cut out sections which made the final product contradictory.</span><sup data-dcnode-id="383" id="fnref:8" role="doc-noteref"><a class="footnote" data-dcnode-id="384" href="#fn:8" rel="footnote"><span data-dcnode-id="385" instrument_node="">8</span></a></sup></p><span data-dcnode-id="381" instrument_node="">
</span><h2 data-dcnode-id="375" id="conclusions"><span data-dcnode-id="380" instrument_node="">Conclusions</span><a class="header-link" data-dcnode-id="376" href="#conclusions" title="Permalink"><span class="sr-only" data-dcnode-id="378"><span data-dcnode-id="379" instrument_node="">Permalink</span></span><i class="fas fa-link" data-dcnode-id="377"></i></a></h2><span data-dcnode-id="374" instrument_node="">
</span><p data-dcnode-id="372"><span data-dcnode-id="373" instrument_node="">What can be learned from this?</span></p><span data-dcnode-id="371" instrument_node="">
</span><p data-dcnode-id="369"><span data-dcnode-id="370" instrument_node="">Robustly made and pious sounding claims of internal consistency within the biblical text are nothing but bluster and wishful thinking. Any such claims don’t match the evidence – discrepancies exist, as the various Exodus itineraries demonstrate.</span></p><span data-dcnode-id="368" instrument_node="">
</span><p data-dcnode-id="366"><span data-dcnode-id="367" instrument_node="">If discrepancies in the Bible make us uncomfortable that only tells us that our understanding of the nature of the text needs adjusting.</span></p><span data-dcnode-id="365" instrument_node="">
</span><p data-dcnode-id="363"><span data-dcnode-id="364" instrument_node="">Finally, instead of making untrue – and therefore disrespectful – claims about the nature of the text, we should base our understanding of it on what we find in it, and we should do so in a humble and inquiring manner.</span></p><span data-dcnode-id="362" instrument_node="">
</span><p data-dcnode-id="360"><span data-dcnode-id="361" instrument_node="">So, let’s work with what the text says, not try to pretend it says something else.</span></p><span data-dcnode-id="359" instrument_node="">
</span><hr data-dcnode-id="358"><span data-dcnode-id="357" instrument_node="">
</span><p data-dcnode-id="354"><strong data-dcnode-id="355"><span data-dcnode-id="356" instrument_node="">Further reading</span></strong></p><span data-dcnode-id="353" instrument_node="">
</span><ul data-dcnode-id="348"><span data-dcnode-id="352" instrument_node="">
</span><li data-dcnode-id="350"><span data-dcnode-id="351" instrument_node="">An excellent introduction to the discrepancies between the various Exodus itineraries can be found in “Excursus 2: The Chronology and Route of the Wanderings from Kadesh to Transjordan” in Jeffrey H. Tigay, Deuteronomy (The JPS Torah Commentary; Philadelphia: Jewish Publication Society, 1996), 425–429.</span></li><span data-dcnode-id="349" instrument_node="">
</span></ul><span data-dcnode-id="347" instrument_node="">
</span><p data-dcnode-id="344"><strong data-dcnode-id="345"><span data-dcnode-id="346" instrument_node="">Featured image</span></strong></p><span data-dcnode-id="343" instrument_node="">
</span><p data-dcnode-id="341"><span data-dcnode-id="342" instrument_node="">A photo I took on the way down from the top of Jebel Musa, the traditional site of Mt Sinai.</span></p><span data-dcnode-id="340" instrument_node="">
