</span><h1 data-dcnode-id="694"><span data-dcnode-id="701" instrument_node="">
</span><a data-dcnode-id="699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailyverse.knowing-jesus.com/exodus-12-13" style="font-size:.8em"><span data-dcnode-id="700" instrument_node="">◄ </span></a><span data-dcnode-id="698" instrument_node="">What Does Exodus 14:13 Mean?</span><a data-dcnode-id="696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailyverse.knowing-jesus.com/exodus-14-14" style="font-size:.8em"><span data-dcnode-id="697" instrument_node=""> ►</span></a><span data-dcnode-id="695" instrument_node=""> </span></h1><span data-dcnode-id="693" instrument_node="">
</span><div class="q-text" data-dcnode-id="447"><span data-dcnode-id="692" instrument_node="">
</span><blockquote class="h-center" data-dcnode-id="684"><span data-dcnode-id="691" instrument_node="">
</span><p data-dcnode-id="689"><span data-dcnode-id="690" instrument_node="">But Moses said to the people, "Do not fear! Stand by and see the salvation of the LORD which He will accomplish for you today; for the Egyptians whom you have seen today, you will never see them again forever.</span></p><span data-dcnode-id="688" instrument_node="">
</span><div class="verse-num" data-dcnode-id="686"><span data-dcnode-id="687" instrument_node="">Exodus 14:13(NASB)            </span></div><span data-dcnode-id="685" instrument_node="">
</span></blockquote><span data-dcnode-id="683" instrument_node="">
</span><div class="picture-wrap" data-dcnode-id="677"><a data-dcnode-id="678" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.knowing-jesus.com/i/stand-still-devotional-exodus-14-13-6931"><div data-dcnode-id="679" style="position: relative;width: 100%;padding-top: 75%;"><picture data-dcnode-id="680"><source data-dcnode-id="682" srcset="https://dailyverse.knowing-jesus.com/webp/dv_700/dailyverse-images/fd/Exodus+14-13+Stand+Still+And+See+The+Salvation+Of+God+gold.webp" type="image/webp"><img alt="" class="cls_img" data-dcnode-id="681" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailyverse.knowing-jesus.com/w/dv_700/dailyverse-images/fd/Exodus%252014-13%2520Stand%2520Still%2520And%2520See%2520The%2520Salvation%2520Of%2520God%2520gold.jpg&amp;raw" style="aspect-ratio: 1.333;position: absolute;top: 0;left:0;width: 100%;"></picture></div></a></div><div class="text-center" data-dcnode-id="673"><span data-dcnode-id="676" instrument_node="">
</span><span data-dcnode-id="674" instrument_node="">
</span></div><span data-dcnode-id="672" instrument_node="">
</span><h2 data-dcnode-id="670"><span data-dcnode-id="671" instrument_node="">Verse Thoughts</span></h2><div class="text-center" data-dcnode-id="666"><span data-dcnode-id="669" instrument_node="">
</span><span data-dcnode-id="667" instrument_node="">
</span></div><span data-dcnode-id="665" instrument_node="">
</span><div data-dcnode-id="656"><p data-dcnode-id="663" style="text-align:justify;"><span data-dcnode-id="664" instrument_node="">The Children of Israel joyfully marched out of Egypt because they had trusted God. They had been covered by the atoning blood of the Passover Lamb and escaped the angel of death through believing His word - they had been set free from the bondage of slavery, by grace through faith.</span></p><span data-dcnode-id="662" instrument_node="">
</span><p data-dcnode-id="660" style="text-align:justify;"><span data-dcnode-id="661" instrument_node="">But having made their exodus from Egyptian oppression, the children of Israel suddenly found themselves hemmed in on every side. Their fearsome enemy was closing in from the rear, the impenetrable mountainous heights towered to the right and to the left and the deep waters of the Red Sea abruptly halted their forward march to freedom.</span></p><span data-dcnode-id="659" instrument_node="">
</span><p data-dcnode-id="657" style="text-align:justify;"><span data-dcnode-id="658" instrument_node="">The reaction of the people was acute fear accompanied with an avalanche of bitter complaints, which were fired at their leader and their God. And although they cried out to the Lord in panic, their prayers were saturated with unbelief and a lack of confidence in their God for deliverance. The great salvation they had recently experienced.. evaporated in an avalanche of murmuring accusations against the Lord, Who had redeemed them from their enemies.</span></p></div><div class="text-center" data-dcnode-id="650"><span data-dcnode-id="655" instrument_node="">
</span><span data-dcnode-id="653" instrument_node="">
</span><div class="adthrive-custom-player" data-dcnode-id="652"></div><span data-dcnode-id="651" instrument_node="">
</span></div><span data-dcnode-id="649" instrument_node="">
</span><div data-dcnode-id="625"><span data-dcnode-id="648" instrument_node="">
</span><p data-dcnode-id="640" style="text-align:justify;"><span data-dcnode-id="647" instrument_node="">How similar our reactions are today when having been redeemed by the blood of the Lamb, we discover an abundance of problems barring our walk through life - and how easy it is to forget the glorious liberty&nbsp;we have in our God and the many precious promises, which are '</span><em data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">Yes'</span></em><span data-dcnode-id="644" instrument_node=""> and '</span><em data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">Amen'</span></em><span data-dcnode-id="641" instrument_node=""> in Christ Jesus - as&nbsp;we look at the difficulties that surround us instead of trusting His Word in all things.</span></p><span data-dcnode-id="639" instrument_node="">
</span><p data-dcnode-id="635" style="text-align:justify;"><span data-dcnode-id="638" instrument_node="">How easy it is to blame our Saviour and allow fear to flood our hearts, instead of depending on His sufficient strength - for His strength is made perfect in our weakness. But we read that Moses said to the people, </span><em data-dcnode-id="636"><span data-dcnode-id="637" instrument_node="">Do not fear! Stand by and see the salvation of the LORD which He will accomplish for you today; for the Egyptians whom you have seen today, you will never see them again forever. </span></em></p><span data-dcnode-id="634" instrument_node="">
</span><p data-dcnode-id="632" style="text-align:justify;"><span data-dcnode-id="633" instrument_node="">What a great lesson to learn that no matter what enemies are pursuing us - the Lord is mighty to save. What a wonderful truth to discover, that no matter what difficult circumstance we may be facing, God is our strength and stay.. a very present help in time of trouble.. and He has promised to be with us no matter what trials and temptations may confront us.</span></p><span data-dcnode-id="631" instrument_node="">
</span><p data-dcnode-id="629" style="text-align:justify;"><span data-dcnode-id="630" instrument_node="">Oh what peace we often forfeit and needless pain we bear when we leave God out of the equation and try to address the issues of life by ourselves instead of depending entirely on the promises of God.</span></p><span data-dcnode-id="628" instrument_node="">
</span><p data-dcnode-id="626" style="text-align:justify;"><span data-dcnode-id="627" instrument_node="">Let us not fear, though the earth be moved and all that is familiar to us has been swept away by the tide of time - but rather let us stand still, rest in His promises, abide in His love and trust His Word - for greater is He that is in you than he that is in the world.</span></p></div><h2 data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">My Prayer</span></h2><div data-dcnode-id="619"><p data-dcnode-id="621" style="text-align:justify;"><span data-dcnode-id="622" instrument_node="">Heavenly Father, when the storms of life are raging.. when my enemies seem to multiply with every passing day and there seems to be no way to turn.. help me to be still, knowing that You are God. Help me to stand in quiet&nbsp;dependence upon&nbsp;You. Help me to keep my eyes fixed on Jesus; to abide in His love and to trust His Word, knowing that Your grace is sufficient for every occasion and that You have promised never to leave me not forsake me. Help me to stand still and see the salvation of my God today - in Jesus name I pray, AMEN.</span></p><span data-dcnode-id="620" instrument_node="">
</span></div><div class="text-center" data-dcnode-id="615"><span data-dcnode-id="618" instrument_node="">
</span><span data-dcnode-id="616" instrument_node="">
</span></div><span data-dcnode-id="614" instrument_node="">
</span><div class="picture-wrap" data-dcnode-id="608"><a data-dcnode-id="609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.knowing-jesus.com/i/exodus-14-13-stand-still-and-see-the-salvation-of-god-blue"><div data-dcnode-id="610" style="position: relative;width: 100%;padding-top: 75%;"><picture data-dcnode-id="611"><source data-dcnode-id="613" srcset="https://dailyverse.knowing-jesus.com/webp/dv_700/dailyverse-images/a8/Exodus+14-13+Stand+Still+And+See+The+Salvation+Of+God+blue.webp" type="image/webp"><img alt="" class="cls_img" data-dcnode-id="612" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailyverse.knowing-jesus.com/w/dv_700/dailyverse-images/a8/Exodus%252014-13%2520Stand%2520Still%2520And%2520See%2520The%2520Salvation%2520Of%2520God%2520blue.jpg&amp;raw" style="aspect-ratio: 1.333;position: absolute;top: 0;left:0;width: 100%;"></picture></div></a></div><span data-dcnode-id="607" instrument_node=""> </span><div class="row" data-dcnode-id="593" style="padding-bottom: 25px;padding-top: 0;"><span data-dcnode-id="606" instrument_node="">

</span><a data-dcnode-id="603" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailyverse.knowing-jesus.com/exodus-12-13" style="font-size:1.2em"><span data-dcnode-id="604" instrument_node="">◄ Previous: Exodus 12:13</span></a><span data-dcnode-id="602" instrument_node=""> </span></div><span data-dcnode-id="600" instrument_node="">

</span><a data-dcnode-id="597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailyverse.knowing-jesus.com/exodus-14-14" style="font-size:1.2em"><span data-dcnode-id="598" instrument_node="">Next: Exodus 14:14 ►</span></a><span data-dcnode-id="596" instrument_node=""> </span></div><span data-dcnode-id="594" instrument_node="">
