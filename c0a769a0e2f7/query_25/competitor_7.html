</span><h1 data-dcnode-id="678"><span data-dcnode-id="685" instrument_node="">
</span><a data-dcnode-id="683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailyverse.knowing-jesus.com/exodus-30-6" style="font-size:.8em"><span data-dcnode-id="684" instrument_node="">◄ </span></a><span data-dcnode-id="682" instrument_node="">What Does Exodus 31:13 Mean?</span><a data-dcnode-id="680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailyverse.knowing-jesus.com/exodus-33-14" style="font-size:.8em"><span data-dcnode-id="681" instrument_node=""> ►</span></a><span data-dcnode-id="679" instrument_node=""> </span></h1><span data-dcnode-id="677" instrument_node="">
</span><div class="q-text" data-dcnode-id="444"><span data-dcnode-id="676" instrument_node="">
</span><blockquote class="h-center" data-dcnode-id="668"><span data-dcnode-id="675" instrument_node="">
</span><p data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">Speak thou also unto the children of Israel, saying, Verily ye shall keep my sabbaths: for it is a sign between me and you throughout your generations; that ye may know that I am Jehovah who sanctifieth you.</span></p><span data-dcnode-id="672" instrument_node="">
</span><div class="verse-num" data-dcnode-id="670"><span data-dcnode-id="671" instrument_node="">Exodus 31:13(ASV)            </span></div><span data-dcnode-id="669" instrument_node="">
</span></blockquote><span data-dcnode-id="667" instrument_node="">
</span><div class="picture-wrap" data-dcnode-id="661"><a data-dcnode-id="662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.knowing-jesus.com/i/exodus-31-13-the-lord-who-sanctifies-you-blue-4554"><div data-dcnode-id="663" style="position: relative;width: 100%;padding-top: 75%;"><picture data-dcnode-id="664"><source data-dcnode-id="666" srcset="https://dailyverse.knowing-jesus.com/webp/dv_700/dailyverse-images/3f/Exodus+31-13+The+Lord+Who+Sanctifies+You+blue.webp" type="image/webp"><img alt="" class="cls_img" data-dcnode-id="665" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailyverse.knowing-jesus.com/w/dv_700/dailyverse-images/3f/Exodus%252031-13%2520The%2520Lord%2520Who%2520Sanctifies%2520You%2520blue.jpg&amp;raw" style="aspect-ratio: 1.333;position: absolute;top: 0;left:0;width: 100%;"></picture></div></a></div><div class="text-center" data-dcnode-id="657"><span data-dcnode-id="660" instrument_node="">
</span><span data-dcnode-id="658" instrument_node="">
</span></div><span data-dcnode-id="656" instrument_node="">
</span><h2 data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">Verse Thoughts</span></h2><div class="text-center" data-dcnode-id="650"><span data-dcnode-id="653" instrument_node="">
</span><span data-dcnode-id="651" instrument_node="">
</span></div><span data-dcnode-id="649" instrument_node="">
</span><div data-dcnode-id="634"><p data-dcnode-id="644" style="text-align:justify;"><span data-dcnode-id="648" instrument_node="">On the sixth day of creation God finished His work, and on the seventh day He rested from all that He had done. God ordained that the man, created in His own image and likeness, was to be His representative on earth, and the Lord gave dominion of the whole earth into his hands - but man sinned and God began to work&nbsp;once more - a work of redemption began - a plan that He had purposed before the world&nbsp;was created.</span><br data-dcnode-id="647"><br data-dcnode-id="646"><span data-dcnode-id="645" instrument_node="">But many years later, God used the example of His seventh day of rest as a distinctive sign between Himself and the nation of Israel. He had chosen this people out of all the nations of the world. They were to be His special witness on earth. They were to tell the pagan nations of God's promise of salvation. They were to bring the lost into the sheep-fold of Israel so that God would be their Shepherd and their Deliverer.</span></p><span data-dcnode-id="643" instrument_node="">
</span><p data-dcnode-id="641" style="text-align:justify;"><span data-dcnode-id="642" instrument_node="">God told Moses to speak to the people of Israel and to use the Sabbath Day as an exclusive sign and unique witness&nbsp;between&nbsp;Himself and His people – for He is the Lord Who called them and sanctifies them. While&nbsp;circumcision was given through Abraham as a sign in their flesh of God's covenant promise, the Sabbath day was also to stand as a witness of the covenant He gave through Moses - from one generation to the next.</span></p><span data-dcnode-id="640" instrument_node="">
</span><p data-dcnode-id="635" style="text-align:justify;"><span data-dcnode-id="639" instrument_node="">At the beginning of their nationhood, God gave Israel the Sabbath Day as a special sign between Himself and them. Israel's Sabbath Day was to be a reminder to the nation, that they were&nbsp;to&nbsp;be a consecrated&nbsp;people who&nbsp;were set&nbsp;apart unto God. Their Sabbath was a witness of&nbsp;their special relationship with Jehovah Maccaddeshem&nbsp;– the LORD Who Sanctifies.</span><br data-dcnode-id="638"><br data-dcnode-id="637"><span data-dcnode-id="636" instrument_node="">The Sabbath Day was a sign pointing back to that first sanctified day when God rested from all His work. God's Sabbath rest happened before man fell and sin entered the world, and so Israel's Sabbath was also to be a sign that pointed forward to a future rest - a promised rest for the people of God. Israel’s Sabbath was to remind them of a future sanctified day when God's anointed Messiah would right all wrongs and set up His eternal kingdom on earth.</span></p></div><div class="text-center" data-dcnode-id="628"><span data-dcnode-id="633" instrument_node="">
</span><span data-dcnode-id="631" instrument_node="">
</span><div class="adthrive-custom-player" data-dcnode-id="630"></div><span data-dcnode-id="629" instrument_node="">
</span></div><span data-dcnode-id="627" instrument_node="">
</span><div data-dcnode-id="595"><span data-dcnode-id="626" instrument_node="">
</span><p data-dcnode-id="616" style="text-align:justify;"><span data-dcnode-id="625" instrument_node="">But although that day will&nbsp;be translated into the Millennial rule of Christ and the eternal ages to come, as with all God’s signs to Israel, the true meaning of God’s rest was to be personified in the Person of the Lord Jesus Christ. </span><em data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">"Come to me, all who labour and are heavy laden, and I will give you rest."</span></em><span data-dcnode-id="622" instrument_node=""> is Christ's promise to all: </span><em data-dcnode-id="620"><span data-dcnode-id="621" instrument_node="">"Take my yoke upon you, and learn from me, for I am gentle and lowly in heart, and you will find rest for your souls - for my yoke is easy, and my burden is light."</span></em><br data-dcnode-id="619"><br data-dcnode-id="618"><span data-dcnode-id="617" instrument_node="">Israel’s Sabbath rest, just like their Law, their Tabernacle, their Priesthood, and their sacrifices, was to be a sign that pointed to Jesus. He is not only to rule as King of kings and Lord of Lords, but He gives rest for the soul. Rest is only found&nbsp;in Jesus for He is our living Rest - our promised Rest - our eternal Rest - our Sabbath Rest.</span></p><span data-dcnode-id="615" instrument_node="">
</span><p data-dcnode-id="605" style="text-align:justify;"><span data-dcnode-id="614" instrument_node="">The Sabbath was to be the special sign that set Israel apart from the nations; a sign that they were a sanctified people – a sign that was endorsed by God Himself Who thundered: </span><em data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">"I AM Jehovah Maccaddeshem </span></em><em data-dcnode-id="610"><span data-dcnode-id="611" instrument_node="">– the Lord Who Sanctifies you."</span></em><span data-dcnode-id="609" instrument_node="">&nbsp;A sanctified vessel is set apart from all other vessels for a special purpose and the sanctified nation of Israel was&nbsp;also&nbsp;different and distinct&nbsp;from all other peoples of the world.</span><br data-dcnode-id="608"><br data-dcnode-id="607"><span data-dcnode-id="606" instrument_node="">Israel’s Sabbaths and Israel’s Feasts, Israel’s Oracles, and Israel’s Scriptures all point to Israel’s coming Messiah, and all find their full and final fulfilment in the person and work of the Lord Jesus Christ. But because they rejected their Messiah at His first coming, Israel had to be set aside for a season so that God could call out a people for His name from among the Gentiles who would become His sanctified people – for a season.</span></p><span data-dcnode-id="604" instrument_node="">
</span><p data-dcnode-id="596" style="text-align:justify;"><span data-dcnode-id="603" instrument_node="">We are that sanctified people. Christians are the ones who are called to tell the world of God’s goodness and grace. For a season,&nbsp;Israel has&nbsp;been set aside&nbsp;and the Church, which is the Body of Christ, has&nbsp;been called to be God’s witness to the world. And as we come to Him, we discover that&nbsp;it was for the Church that Jesus prayed when He said, </span><em data-dcnode-id="601"><span data-dcnode-id="602" instrument_node="">"For their sakes, I sanctify Myself, that they themselves also may be sanctified&nbsp;in truth."</span></em><span data-dcnode-id="600" instrument_node=""> It is JESUS Who was, and is, and is to be the ultimate Sabbath Rest for ALL the people of God.</span><br data-dcnode-id="599"><br data-dcnode-id="598"><span data-dcnode-id="597" instrument_node="">Praise God that our Sabbath Rest is found in Jesus and not in the keeping of the Law. Praise God that the day is coming when Israel will recognise the Lord Jesus as their own Sabbath Rest. Praise God that Jesus is both sanctified by God and the Sanctifier of our souls. Praise God that Jesus is both Son of God and Son of Man, to Whom all authority in heaven and on earth has been given&nbsp;and Who is the only One Who&nbsp;can&nbsp;truly&nbsp;say, I AM Jehovah&nbsp;Maccaddeshem – the Lord Who sanctifies you.</span></p></div><h2 data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">My Prayer</span></h2><div data-dcnode-id="590"><p data-dcnode-id="591" style="text-align:justify;"><span data-dcnode-id="592" instrument_node="">Dear Heavenly Father, thank You that You have sanctified me and set me apart as a special vessel of Yours. Thank You that&nbsp;I was called, chosen, sanctified, and glorified, from before the foundation of the world. Your wisdom is unsurpassed and the picture of the Lord Jesus as my beautiful Sabbath rest rejoices my heart. Bless Your people, Israel, and bring them at last into their promised rest. In Jesus' name I pray, AMEN.</span></p></div><div class="text-center" data-dcnode-id="586"><span data-dcnode-id="589" instrument_node="">
</span><span data-dcnode-id="587" instrument_node="">
</span></div><span data-dcnode-id="585" instrument_node="">
</span><div class="picture-wrap" data-dcnode-id="579"><a data-dcnode-id="580" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.knowing-jesus.com/i/exodus-31-13-the-lord-who-sanctifies-you-13393"><div data-dcnode-id="581" style="position: relative;width: 100%;padding-top: 74.41558%;"><picture data-dcnode-id="582"><source data-dcnode-id="584" srcset="https://dailyverse.knowing-jesus.com/webp/dv_700/dailyverse-images/f0/Exodus+31-13+The+Lord+Who+Sanctifies+You+aqua.webp" type="image/webp"><img alt="" class="cls_img" data-dcnode-id="583" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailyverse.knowing-jesus.com/w/dv_700/dailyverse-images/f0/Exodus%252031-13%2520The%2520Lord%2520Who%2520Sanctifies%2520You%2520aqua.jpg&amp;raw" style="aspect-ratio: 1.344;position: absolute;top: 0;left:0;width: 100%;"></picture></div></a></div><span data-dcnode-id="578" instrument_node=""> </span><div class="row" data-dcnode-id="564" style="padding-bottom: 25px;padding-top: 0;"><span data-dcnode-id="577" instrument_node="">
</span><div class="col-xs-6" data-dcnode-id="572"><span data-dcnode-id="576" instrument_node="">
</span><a data-dcnode-id="574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailyverse.knowing-jesus.com/exodus-30-6" style="font-size:1.2em"><span data-dcnode-id="575" instrument_node="">◄ Previous: Exodus 30:6</span></a><span data-dcnode-id="573" instrument_node=""> </span></div><span data-dcnode-id="571" instrument_node="">
</span><div class="col-xs-6 text-right" data-dcnode-id="566"><span data-dcnode-id="570" instrument_node="">
</span><a data-dcnode-id="568" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailyverse.knowing-jesus.com/exodus-33-14" style="font-size:1.2em"><span data-dcnode-id="569" instrument_node="">Next: Exodus 33:14 ►</span></a><span data-dcnode-id="567" instrument_node=""> </span></div><span data-dcnode-id="565" instrument_node="">

</span><h2 data-dcnode-id="561"><span data-dcnode-id="562" instrument_node="">Choose a Verse from Exodus 31</span></h2><span data-dcnode-id="560" instrument_node=""> </span><div class="block block-block content-block-wrapper main-page" data-dcnode-id="512" id="block-block-7" style="padding-top: 15px;padding-bottom:0;margin-bottom: 0px"><span data-dcnode-id="559" instrument_node="">
</span><ul class="full-listing" data-dcnode-id="514"><span data-dcnode-id="558" instrument_node="">
