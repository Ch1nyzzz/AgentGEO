</span><h1 data-dcnode-id="702"><span data-dcnode-id="709" instrument_node="">
</span><a data-dcnode-id="707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailyverse.knowing-jesus.com/exodus-20-4" style="font-size:.8em"><span data-dcnode-id="708" instrument_node="">◄ </span></a><span data-dcnode-id="706" instrument_node="">What Does Exodus 20:12 Mean?</span><a data-dcnode-id="704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailyverse.knowing-jesus.com/exodus-20-13" style="font-size:.8em"><span data-dcnode-id="705" instrument_node=""> ►</span></a><span data-dcnode-id="703" instrument_node=""> </span></h1><span data-dcnode-id="701" instrument_node="">
</span><div class="q-text" data-dcnode-id="443"><span data-dcnode-id="700" instrument_node="">
</span><blockquote class="h-center" data-dcnode-id="692"><span data-dcnode-id="699" instrument_node="">
</span><p data-dcnode-id="697"><span data-dcnode-id="698" instrument_node="">"Honor your father and your mother, that your days may be prolonged in the land which the LORD your God gives you.</span></p><span data-dcnode-id="696" instrument_node="">
</span><div class="verse-num" data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">Exodus 20:12(NASB)            </span></div><span data-dcnode-id="693" instrument_node="">
</span></blockquote><span data-dcnode-id="691" instrument_node="">
</span><div class="picture-wrap" data-dcnode-id="685"><a data-dcnode-id="686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.knowing-jesus.com/i/exodus-20-12-honour-your-father-and-mother-sage-7674"><div data-dcnode-id="687" style="position: relative;width: 100%;padding-top: 75%;"><picture data-dcnode-id="688"><source data-dcnode-id="690" srcset="https://dailyverse.knowing-jesus.com/webp/dv_700/dailyverse-images/37/Exodus+20-12+Honour+Your+Father+And+Mother+sage.webp" type="image/webp"><img alt="" class="cls_img" data-dcnode-id="689" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailyverse.knowing-jesus.com/w/dv_700/dailyverse-images/37/Exodus%252020-12%2520Honour%2520Your%2520Father%2520And%2520Mother%2520sage.jpg&amp;raw" style="aspect-ratio: 1.333;position: absolute;top: 0;left:0;width: 100%;"></picture></div></a></div><div class="text-center" data-dcnode-id="681"><span data-dcnode-id="684" instrument_node="">
</span><span data-dcnode-id="682" instrument_node="">
</span></div><span data-dcnode-id="680" instrument_node="">
</span><h2 data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">Verse Thoughts</span></h2><div class="text-center" data-dcnode-id="674"><span data-dcnode-id="677" instrument_node="">
</span><span data-dcnode-id="675" instrument_node="">
</span></div><span data-dcnode-id="673" instrument_node="">
</span><div data-dcnode-id="658"><p data-dcnode-id="665" style="text-align:justify;"><span data-dcnode-id="672" instrument_node="">Honouring one's father and mother is being obedient to them, listening to their advice, and complying with their instructions and wishes. This Old Testament command, to honour your father and mother, is not only repeated by the Lord Jesus in His pre-Cross ministry to Israel, but is also reiterated to the Church by Paul, in both Ephesians and Colossians:&nbsp;</span><em data-dcnode-id="670"><span data-dcnode-id="671" instrument_node="">"</span></em><em data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">Children, be obedient to your parents.. in the Lord, </span></em><em data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">for this is right and well-pleasing to the Lord."</span></em></p><span data-dcnode-id="664" instrument_node="">
</span><p data-dcnode-id="662" style="text-align:justify;"><span data-dcnode-id="663" instrument_node="">Parents are a child's introduction to all types&nbsp;of authority and they help to form&nbsp;their attitude towards the rule of law. The Lord has charged parents to&nbsp;train up a child in the way that they should go, and help to shape appropriate&nbsp;behaviours and attitudes towards&nbsp;other people and their understanding of God, and His plan of salvation.</span></p><span data-dcnode-id="661" instrument_node="">
</span><p data-dcnode-id="659" style="text-align:justify;"><span data-dcnode-id="660" instrument_node="">Obedience to one's father and mother teaches children to have a reverence for God and respect for those in authority. It places the responsibility for the moral upbringing of children and their instruction in righteous living, firmly on the shoulders of the father and mother.</span></p></div><div class="text-center" data-dcnode-id="652"><span data-dcnode-id="657" instrument_node="">
</span><span data-dcnode-id="655" instrument_node="">
</span><div class="adthrive-custom-player" data-dcnode-id="654"></div><span data-dcnode-id="653" instrument_node="">
</span></div><span data-dcnode-id="651" instrument_node="">
</span><div data-dcnode-id="610"><span data-dcnode-id="650" instrument_node="">
</span><p data-dcnode-id="644" style="text-align:justify;"><span data-dcnode-id="649" instrument_node="">When the commandment to honour one's parents was first given to Israel on Mount Sinai, it not only instructed a child towards obedience, but explained the positive outcome of honouring one's parents:&nbsp;</span><em data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">"T</span></em><em data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">hat your days may be prolonged in the land which the LORD your God gives you."</span></em></p><span data-dcnode-id="643" instrument_node="">
</span><p data-dcnode-id="641" style="text-align:justify;"><span data-dcnode-id="642" instrument_node="">This is the fifth commandment that was given by Moses to the people of Israel and is the first command that comes with a promise. The promise of a long life that accompanies the honouring of one's parents, may not only refer to longevity of life in this age, but may also refer to the promises that God gave to Abraham, Isaac, David, and the nation of Israel.</span></p><span data-dcnode-id="640" instrument_node="">
</span><p data-dcnode-id="626" style="text-align:justify;"><span data-dcnode-id="639" instrument_node="">We read in Isaiah:&nbsp;</span><em data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">"T</span></em><em data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">hy dead shall live, and</span></em><em data-dcnode-id="633"><span data-dcnode-id="634" instrument_node=""> my dead body shall arise, awake and sing,"&nbsp;</span></em><span data-dcnode-id="632" instrument_node="">while we read in Daniel:&nbsp;</span><em data-dcnode-id="630"><span data-dcnode-id="631" instrument_node="">"A</span></em><em data-dcnode-id="628"><span data-dcnode-id="629" instrument_node="">nd many of them that sleep in the dust of the earth shall awake, some to everlasting life, and some to reproaches and everlasting abhorrence</span></em><span data-dcnode-id="627" instrument_node="">." The Bible teaches that the land that was promised by God to the nation of Israel, will one day be fulfilled - when Christ returns to rule and reign as King of kings - and it is possible that His promise to prolong the days of those that honour their parents may be referring to this future time of peace and prosperity.</span></p><span data-dcnode-id="625" instrument_node="">
</span><p data-dcnode-id="623" style="text-align:justify;"><span data-dcnode-id="624" instrument_node="">However, it is the responsibility of all parents to teach their children the fear and nurture of the Lord, and it is the duty of all children to take this important instruction to heart... for those that reverence God by obeying His command to honour father and mother have the assurance that they will live long in the land which the Lord their God has given them.</span></p><span data-dcnode-id="622" instrument_node="">
</span><p data-dcnode-id="620" style="text-align:justify;"><span data-dcnode-id="621" instrument_node="">Not all fathers are God-fearing and not all mothers treat their children kindly, but being the child of bad or uncaring parents does not negate this commandment. We are not instructed to honour good parents but&nbsp;to dishonour bad ones. We are not directed to obey our parents if they are virtuous and deal responsibly with us, but&nbsp;disobey those who negate their God-given responsibility!</span></p><span data-dcnode-id="619" instrument_node="">
</span><p data-dcnode-id="617" style="text-align:justify;"><span data-dcnode-id="618" instrument_node="">Giving honour and respect to&nbsp;our father and mother is a command that should be obeyed&nbsp;irrespective of a parent's spiritual status - for this is right and well-pleasing to the Lord. Indeed, as Christians, we are not only required to honour our parents and submit to them, but to behave righteously with whomsoever we come in contact.</span></p><span data-dcnode-id="616" instrument_node="">
</span><p data-dcnode-id="614" style="text-align:justify;"><span data-dcnode-id="615" instrument_node="">When our vertical relationship is right with God, we discover that our horizontal relationship with parents and with others is also right - and vice versa.</span></p><span data-dcnode-id="613" instrument_node="">
</span><p data-dcnode-id="611" style="text-align:justify;"><span data-dcnode-id="612" instrument_node="">By God's perfect design we were placed in families. May we honour the father and mother who brought us into this world and those that influenced us in our lives for good. May we strive to&nbsp;walk in spirit and truth all the days of our life - and ensure that every day is lived in right relationship with our Heavenly Father - Who loves us so much that He sent His dearly loved Son to die on the Cross so that we might live in Him - by faith.</span></p></div><h2 data-dcnode-id="608"><span data-dcnode-id="609" instrument_node="">My Prayer</span></h2><div data-dcnode-id="605"><p data-dcnode-id="606" style="text-align:justify;"><span data-dcnode-id="607" instrument_node="">Heavenly Father, thank You for my parents and for giving me life. Thank You for the lessons I have learned and the good times we have shared&nbsp;together. Forgive me for the times when I have not honoured my father and mother as I ought - for I am aware that this is dishonouring to You. From this day forward, I pray that&nbsp;I may honour You in all my interactions with my family and friends, and may my life be honouring to You. This I pray in Jesus' name, AMEN.</span></p></div><div class="text-center" data-dcnode-id="601"><span data-dcnode-id="604" instrument_node="">
</span><span data-dcnode-id="602" instrument_node="">
</span></div><span data-dcnode-id="600" instrument_node="">
</span><div class="picture-wrap" data-dcnode-id="594"><a data-dcnode-id="595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.knowing-jesus.com/i/exodus-20-12-honour-your-father-and-mother-beige-7673"><div data-dcnode-id="596" style="position: relative;width: 100%;padding-top: 75%;"><picture data-dcnode-id="597"><source data-dcnode-id="599" srcset="https://dailyverse.knowing-jesus.com/webp/dv_700/dailyverse-images/92/Exodus+20-12+Honour+Your+Father+And+Mother+beige.webp" type="image/webp"><img alt="" class="cls_img" data-dcnode-id="598" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailyverse.knowing-jesus.com/w/dv_700/dailyverse-images/92/Exodus%252020-12%2520Honour%2520Your%2520Father%2520And%2520Mother%2520beige.jpg&amp;raw" style="aspect-ratio: 1.333;position: absolute;top: 0;left:0;width: 100%;"></picture></div></a></div><span data-dcnode-id="593" instrument_node=""> </span><div class="row" data-dcnode-id="579" style="padding-bottom: 25px;padding-top: 0;"><span data-dcnode-id="592" instrument_node="">
</span><div class="col-xs-6" data-dcnode-id="587"><span data-dcnode-id="591" instrument_node="">
</span><a data-dcnode-id="589" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailyverse.knowing-jesus.com/exodus-20-4" style="font-size:1.2em"><span data-dcnode-id="590" instrument_node="">◄ Previous: Exodus 20:4</span></a><span data-dcnode-id="588" instrument_node=""> </span></div><span data-dcnode-id="586" instrument_node="">
</span><div class="col-xs-6 text-right" data-dcnode-id="581"><span data-dcnode-id="585" instrument_node="">
</span><a data-dcnode-id="583" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailyverse.knowing-jesus.com/exodus-20-13" style="font-size:1.2em"><span data-dcnode-id="584" instrument_node="">Next: Exodus 20:13 ►</span></a><span data-dcnode-id="582" instrument_node=""> </span></div><span data-dcnode-id="580" instrument_node="">
</span></div><span data-dcnode-id="578" instrument_node="">
</span><h2 data-dcnode-id="576"><span data-dcnode-id="577" instrument_node="">Choose a Verse from Exodus 20</span></h2><span data-dcnode-id="575" instrument_node=""> </span><div class="block block-block content-block-wrapper main-page" data-dcnode-id="511" id="block-block-7" style="padding-top: 15px;padding-bottom:0;margin-bottom: 0px"><span data-dcnode-id="574" instrument_node="">
</span><ul class="full-listing" data-dcnode-id="513"><span data-dcnode-id="573" instrument_node="">
