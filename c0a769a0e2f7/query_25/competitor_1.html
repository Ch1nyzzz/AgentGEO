</span><h1 data-dcnode-id="707"><span data-dcnode-id="714" instrument_node="">
</span><a data-dcnode-id="712" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailyverse.knowing-jesus.com/exodus-20-12" style="font-size:.8em"><span data-dcnode-id="713" instrument_node="">◄ </span></a><span data-dcnode-id="711" instrument_node="">What Does Exodus 20:13 Mean?</span><a data-dcnode-id="709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailyverse.knowing-jesus.com/exodus-21-6" style="font-size:.8em"><span data-dcnode-id="710" instrument_node=""> ►</span></a><span data-dcnode-id="708" instrument_node=""> </span></h1><span data-dcnode-id="706" instrument_node="">
</span><div class="q-text" data-dcnode-id="443"><span data-dcnode-id="705" instrument_node="">
</span><blockquote class="h-center" data-dcnode-id="697"><span data-dcnode-id="704" instrument_node="">
</span><p data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">"You shall not murder.</span></p><span data-dcnode-id="701" instrument_node="">
</span><div class="verse-num" data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">Exodus 20:13(NASB)            </span></div><span data-dcnode-id="698" instrument_node="">
</span></blockquote><span data-dcnode-id="696" instrument_node="">
</span><div class="picture-wrap" data-dcnode-id="690"><a data-dcnode-id="691" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.knowing-jesus.com/i/exodus-20-13-you-not-kill-red-8653"><div data-dcnode-id="692" style="position: relative;width: 100%;padding-top: 75%;"><picture data-dcnode-id="693"><source data-dcnode-id="695" srcset="https://dailyverse.knowing-jesus.com/webp/dv_700/dailyverse-images/89/Exodus+20-13+Thou+Shalt+Not+Kill+red.webp" type="image/webp"><img alt="" class="cls_img" data-dcnode-id="694" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailyverse.knowing-jesus.com/w/dv_700/dailyverse-images/89/Exodus%252020-13%2520Thou%2520Shalt%2520Not%2520Kill%2520red.jpg&amp;raw" style="aspect-ratio: 1.333;position: absolute;top: 0;left:0;width: 100%;"></picture></div></a></div><div class="text-center" data-dcnode-id="686"><span data-dcnode-id="689" instrument_node="">
</span><span data-dcnode-id="687" instrument_node="">
</span></div><span data-dcnode-id="685" instrument_node="">
</span><h2 data-dcnode-id="683"><span data-dcnode-id="684" instrument_node="">Verse Thoughts</span></h2><div class="text-center" data-dcnode-id="679"><span data-dcnode-id="682" instrument_node="">
</span><span data-dcnode-id="680" instrument_node="">
</span></div><span data-dcnode-id="678" instrument_node="">
</span><div data-dcnode-id="669"><p data-dcnode-id="676" style="text-align:justify;"><span data-dcnode-id="677" instrument_node="">The Law of Moses which consists of 613 individual laws, begins with the Decalogue, otherwise called the 10 Commandments or more literally translated 'the Ten Words'.</span></p><span data-dcnode-id="675" instrument_node="">
</span><p data-dcnode-id="673" style="text-align:justify;"><span data-dcnode-id="674" instrument_node="">These 10 commandments underpin both the religious and civil law of Israel and can be divided into two very distinct groups. The first four relate&nbsp;to man's relationship with God, while the last ones pertain to man's relationship with his&nbsp;fellow man.</span></p><span data-dcnode-id="672" instrument_node="">
</span><p data-dcnode-id="670" style="text-align:justify;"><span data-dcnode-id="671" instrument_node="">Jesus condensed this down into a simple, universally agreed concept 1) love for God and 2) love for one's neighbour - and although these commands were specifically given to Israel as part of God's covenant with His chosen people, there is much that is supremely relevant to the Christian Church today and much that lines up with the Law of the Spirit of life in Christ Jesus which was given to the Church today, and we do well to examine them closely.</span></p></div><div class="text-center" data-dcnode-id="663"><span data-dcnode-id="668" instrument_node="">
</span><span data-dcnode-id="666" instrument_node="">
</span><div class="adthrive-custom-player" data-dcnode-id="665"></div><span data-dcnode-id="664" instrument_node="">
</span></div><span data-dcnode-id="662" instrument_node="">
</span><div data-dcnode-id="610"><span data-dcnode-id="661" instrument_node="">
</span><p data-dcnode-id="659" style="text-align:justify;"><span data-dcnode-id="660" instrument_node="">Every commandment, with the exception of the command relating to the Sabbath day, were instructions given to the Church in the New Testament epistles in connection with living a holy and godly Christian life in Christ Jesus which is honouring to the Lord. And all God's commands to Israel, clearly outline what behaviour God expects from all His blood-bought children, for love is the fulfilment of the law.</span></p><span data-dcnode-id="658" instrument_node="">
</span><p data-dcnode-id="653" style="text-align:justify;"><span data-dcnode-id="657" instrument_node="">However, the&nbsp;important thing to remember is that righteousness can never be met by keeping the Law, for we are fallen sinners who deserve death. Indeed, a righteous standing with the Lord </span><em data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">(i.e. justification)</span></em><span data-dcnode-id="654" instrument_node=""> can only be given by faith. The Law was given to the redeemed nation of Israel, to expose sin and teach them how to be a holy people -&nbsp;sanctified unto&nbsp;the Lord.</span></p><span data-dcnode-id="652" instrument_node="">
</span><p data-dcnode-id="650" style="text-align:justify;"><span data-dcnode-id="651" instrument_node="">The pre-Cross Law of Moses given to Israel and the post Cross 'law of life', given to the Church, tells believers how to remain in fellowship with the Lord and lays bare overt and covert sin, in the lives of redeemed people. And the Law always points to Christ Who is the only One Who can save by grace through faith in His death, burial, and Resurrection.</span></p><span data-dcnode-id="649" instrument_node="">
</span><p data-dcnode-id="642" style="text-align:justify;"><span data-dcnode-id="648" instrument_node="">One of the 10 Commandments given to Israel in Exodus and reiterated to the Church is: </span><em data-dcnode-id="646"><span data-dcnode-id="647" instrument_node="">"</span></em><em data-dcnode-id="644"><span data-dcnode-id="645" instrument_node="">Thou shalt not kill. You shall not commit murder. You shall not slay another person." </span></em><span data-dcnode-id="643" instrument_node="">Man was made in the image and likeness of God and the wilful taking of a man's life, or as Christ pointed out, an attitude of hatred in one's own heart for another person is a sin and considered by God as murder.</span></p><span data-dcnode-id="641" instrument_node="">
</span><p data-dcnode-id="639" style="text-align:justify;"><span data-dcnode-id="640" instrument_node="">The literal meaning of the word 'kill' in this context is 'to slay' but this does not include capital punishment, for referring to capital punishment as murder would contradict other aspects of God's law for both pre-Cross and post-Cross believers.</span></p><span data-dcnode-id="638" instrument_node="">
</span><p data-dcnode-id="636" style="text-align:justify;"><span data-dcnode-id="637" instrument_node="">The Word of God teaches us to have deep respect for human life and behind this important command is God's programme for the preservation of society - for every member of the human race is imputed with a sin nature.</span></p><span data-dcnode-id="635" instrument_node="">
</span><p data-dcnode-id="633" style="text-align:justify;"><span data-dcnode-id="634" instrument_node="">Satan was a murderer from the beginning, and in Genesis we read how murder was one of the first sins to be committed by Cain. The apostle John explains how pride and envy is the root cause for this terrible sin. Paul, James, and John all make reference to murder in their various writings, and there are many examples in the book of Proverbs that expose the sinful precursors to the slaughter of another person.</span></p><span data-dcnode-id="632" instrument_node="">
</span><p data-dcnode-id="621" style="text-align:justify;"><span data-dcnode-id="631" instrument_node="">Jesus explained, </span><em data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">"</span></em><em data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">that out of people's hearts, come evil thoughts," </span></em><span data-dcnode-id="626" instrument_node="">which includes murder, while James cries out, </span><em data-dcnode-id="624"><span data-dcnode-id="625" instrument_node="">"you</span></em><em data-dcnode-id="622"><span data-dcnode-id="623" instrument_node="">&nbsp;people desire something and yet do not have it, so you murder to get it. You are envious of what someone has and yet are not able to obtain it, so you fight and quarrel over it."</span></em></p><span data-dcnode-id="620" instrument_node="">
</span><p data-dcnode-id="614" style="text-align:justify;"><span data-dcnode-id="619" instrument_node="">The Bible makes it clear, in both Old and New Testaments, that the taking of another person's life through murder is unacceptable to the Lord - and that the blood of the murdered one cries out to the Lord and so we read in the Decalogue and also in the epistles: </span><em data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">"</span></em><em data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">Thou shalt not kill - You shall not commit murder - Do not slay another person."</span></em></p><span data-dcnode-id="613" instrument_node="">
</span><p data-dcnode-id="611" style="text-align:justify;"><span data-dcnode-id="612" instrument_node="">And we, who have the Holy Spirit dwelling within by faith, should ensure that, day by day, our hearts are examined for any evil intent or murderous thought... and cleanse our hearts from all ungodly thoughts which in certain cases translates into murder.</span></p></div><h2 data-dcnode-id="608"><span data-dcnode-id="609" instrument_node="">My Prayer</span></h2><div data-dcnode-id="605"><p data-dcnode-id="606" style="text-align:justify;"><span data-dcnode-id="607" instrument_node="">Heavenly Father, Your Laws are gracious and good and expose the dark thoughts of the heart that leads to the ungodly works of the devil. Satan was a murderer from the beginning and we understand how the thoughts of the heart can translate into murder - as brutal as an assassin's blade or the terrorist's murderous bomb. Keep my mind pure and focused on the Lord and I pray that my heart may reflect the grace and love of God for my fellow men and that many may come to faith as I testify of Your goodness and love. In Jesus' name I pray, AMEN.</span></p></div><div class="text-center" data-dcnode-id="601"><span data-dcnode-id="604" instrument_node="">
</span><span data-dcnode-id="602" instrument_node="">
</span></div><span data-dcnode-id="600" instrument_node="">
</span><div class="picture-wrap" data-dcnode-id="594"><a data-dcnode-id="595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.knowing-jesus.com/i/exodus-20-13-you-shall-not-murder-red-8654"><div data-dcnode-id="596" style="position: relative;width: 100%;padding-top: 75%;"><picture data-dcnode-id="597"><source data-dcnode-id="599" srcset="https://dailyverse.knowing-jesus.com/webp/dv_700/dailyverse-images/9f/Exodus+20-13+You+Shall+Not+Comit+Murder+maroon.webp" type="image/webp"><img alt="" class="cls_img" data-dcnode-id="598" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailyverse.knowing-jesus.com/w/dv_700/dailyverse-images/9f/Exodus%252020-13%2520You%2520Shall%2520Not%2520Comit%2520Murder%2520maroon.jpg&amp;raw" style="aspect-ratio: 1.333;position: absolute;top: 0;left:0;width: 100%;"></picture></div></a></div><span data-dcnode-id="593" instrument_node=""> </span><div class="row" data-dcnode-id="579" style="padding-bottom: 25px;padding-top: 0;"><span data-dcnode-id="592" instrument_node="">
</span><div class="col-xs-6" data-dcnode-id="587"><span data-dcnode-id="591" instrument_node="">
</span><a data-dcnode-id="589" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailyverse.knowing-jesus.com/exodus-20-12" style="font-size:1.2em"><span data-dcnode-id="590" instrument_node="">◄ Previous: Exodus 20:12</span></a><span data-dcnode-id="588" instrument_node=""> </span></div><span data-dcnode-id="586" instrument_node="">
</span><div class="col-xs-6 text-right" data-dcnode-id="581"><span data-dcnode-id="585" instrument_node="">
</span><a data-dcnode-id="583" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailyverse.knowing-jesus.com/exodus-21-6" style="font-size:1.2em"><span data-dcnode-id="584" instrument_node="">Next: Exodus 21:6 ►</span></a><span data-dcnode-id="582" instrument_node=""> </span></div><span data-dcnode-id="580" instrument_node="">
</span></div><span data-dcnode-id="578" instrument_node="">
</span><h2 data-dcnode-id="576"><span data-dcnode-id="577" instrument_node="">Choose a Verse from Exodus 20</span></h2><span data-dcnode-id="575" instrument_node=""> </span><div class="block block-block content-block-wrapper main-page" data-dcnode-id="511" id="block-block-7" style="padding-top: 15px;padding-bottom:0;margin-bottom: 0px"><span data-dcnode-id="574" instrument_node="">
</span><ul class="full-listing" data-dcnode-id="513"><span data-dcnode-id="573" instrument_node="">
