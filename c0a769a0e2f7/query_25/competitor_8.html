</span><h1 data-dcnode-id="679"><span data-dcnode-id="686" instrument_node="">
</span><a data-dcnode-id="684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailyverse.knowing-jesus.com/exodus-20-2" style="font-size:.8em"><span data-dcnode-id="685" instrument_node="">◄ </span></a><span data-dcnode-id="683" instrument_node="">What Does Exodus 20:3 Mean?</span><a data-dcnode-id="681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailyverse.knowing-jesus.com/exodus-20-4" style="font-size:.8em"><span data-dcnode-id="682" instrument_node=""> ►</span></a><span data-dcnode-id="680" instrument_node=""> </span></h1><span data-dcnode-id="678" instrument_node="">
</span><div class="q-text" data-dcnode-id="443"><span data-dcnode-id="677" instrument_node="">
</span><blockquote class="h-center" data-dcnode-id="669"><span data-dcnode-id="676" instrument_node="">
</span><p data-dcnode-id="674"><span data-dcnode-id="675" instrument_node="">"You shall have no other gods before Me.</span></p><span data-dcnode-id="673" instrument_node="">
</span><div class="verse-num" data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">Exodus 20:3(NASB)            </span></div><span data-dcnode-id="670" instrument_node="">
</span></blockquote><span data-dcnode-id="668" instrument_node="">
</span><div class="picture-wrap" data-dcnode-id="662"><a data-dcnode-id="663" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.knowing-jesus.com/i/exodus-20-3-no-other-gods-but-me-aqua-5083"><div data-dcnode-id="664" style="position: relative;width: 100%;padding-top: 75%;"><picture data-dcnode-id="665"><source data-dcnode-id="667" srcset="https://dailyverse.knowing-jesus.com/webp/dv_700/dailyverse-images/08/Exodus+20-3+No+Other+Gods+But+Me+aqua.webp" type="image/webp"><img alt="" class="cls_img" data-dcnode-id="666" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailyverse.knowing-jesus.com/w/dv_700/dailyverse-images/08/Exodus%252020-3%2520No%2520Other%2520Gods%2520But%2520Me%2520aqua.jpg&amp;raw" style="aspect-ratio: 1.333;position: absolute;top: 0;left:0;width: 100%;"></picture></div></a></div><div class="text-center" data-dcnode-id="658"><span data-dcnode-id="661" instrument_node="">
</span><span data-dcnode-id="659" instrument_node="">
</span></div><span data-dcnode-id="657" instrument_node="">
</span><h2 data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">Verse Thoughts</span></h2><div class="text-center" data-dcnode-id="651"><span data-dcnode-id="654" instrument_node="">
</span><span data-dcnode-id="652" instrument_node="">
</span></div><span data-dcnode-id="650" instrument_node="">
</span><div data-dcnode-id="639"><p data-dcnode-id="648" style="text-align:justify;"><span data-dcnode-id="649" instrument_node="">The giving of the Law to the nation of Israel was one of the most important events in the history of mankind's redemption, and an important step in the chronicles of the covenant nation of Israel - through Whom God's anointed Saviour was to be born.</span></p><span data-dcnode-id="647" instrument_node="">
</span><p data-dcnode-id="645" style="text-align:justify;"><span data-dcnode-id="646" instrument_node="">The Lord had rescued the nation of Israel from Egyptian slavery and carried them on eagles wings into the Sinai desert where they were to be given an exalted position among all the nations of the earth and become God's treasured possession.. if they would only separate themselves from worldly impurities and fully consecrate themselves to Jehovah. Israel was the only nation with whom God has ever made such a covenant, making them both unique and blessed among the many gentile nations of the world.</span></p><span data-dcnode-id="644" instrument_node="">
</span><p data-dcnode-id="640" style="text-align:justify;"><span data-dcnode-id="643" instrument_node="">The Decalogue, or 10 Commandments was one small section of the indivisible Mosaic Law that Israel received from the Lord Himself. The complete Law covered a wide range of moral; civil, religious and ceremonial ordinances. If the nation remained faithful to the Lord, He promised them unimaginable blessings, while disobedience would necessitate punishment - and the first command that God presented to the nation was: </span><em data-dcnode-id="641"><span data-dcnode-id="642" instrument_node="">You shall have no other gods before Me. </span></em></p></div><div class="text-center" data-dcnode-id="633"><span data-dcnode-id="638" instrument_node="">
</span><span data-dcnode-id="636" instrument_node="">
</span><div class="adthrive-custom-player" data-dcnode-id="635"></div><span data-dcnode-id="634" instrument_node="">
</span></div><span data-dcnode-id="632" instrument_node="">
</span><div data-dcnode-id="611"><span data-dcnode-id="631" instrument_node="">
</span><p data-dcnode-id="629" style="text-align:justify;"><span data-dcnode-id="630" instrument_node="">The first four commands of the civil section of the Mosaic Law directly related to Israel's relationship to the Lord. They were to teach God's covenant nation the importance of loving the Lord their God with all their heart and soul and mind and strength. They were to have no other gods but Him and were not to carve or construct any images of God nor were they to fashion or form any sort of idols or icons. They were not to take the name of the Lord their God in vain and were to remember to keep the Sabbath day holy unto the Lord.</span></p><span data-dcnode-id="628" instrument_node="">
</span><p data-dcnode-id="621" style="text-align:justify;"><span data-dcnode-id="627" instrument_node="">Before God began to systematically lay out His covenantal conditions before His people Israel.. He&nbsp;reminded them of all that He had done for them already with the following words: </span><em data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">I am the Lord Your God Who brought You out of the land of Egypt.. </span></em><span data-dcnode-id="624" instrument_node=""> but heading up all the moral; civil, religion and ceremonial ordinances was the first and great commandment: </span><em data-dcnode-id="622"><span data-dcnode-id="623" instrument_node="">you shall have not others gods before Me. </span></em></p><span data-dcnode-id="620" instrument_node="">
</span><p data-dcnode-id="618" style="text-align:justify;"><span data-dcnode-id="619" instrument_node="">Although in its entirety the Mosaic Law was given to God's covenant people, and although the Decalogue is profitable for for teaching, for reproof, for correction, and for training in righteousness, we must never forget that Jesus Himself instituted a new covenant - a&nbsp;better covenant through His own blood.</span></p><span data-dcnode-id="617" instrument_node="">
</span><p data-dcnode-id="615" style="text-align:justify;"><span data-dcnode-id="616" instrument_node="">All scripture is given by inspiration of God and is profitable for us in many ways.. but we must never forget that the Word of God must be read in its historical context.. for not all scripture is directed towards us. The commands that God gave to Israel were for Israel, and although they are instructive for all people and cover many of the principles and instructions&nbsp;of Christian living which are laid out in the New Testament in this age of grace .. for the Church- we must always recognise that these commands, were first and foremost given to Israel in a specific, historical context.. and for a specific purpose. And although many of the commands that were give to the nation of Israel are repeated in the New Testament by God's holy apostles and prophets for the Church, not all continue to be in force during this Christian dispensation.</span></p><span data-dcnode-id="614" instrument_node="">
</span><p data-dcnode-id="612" style="text-align:justify;"><span data-dcnode-id="613" instrument_node="">The giving of the Law to the nation of Israel was one of the most important events in the history of man's redemption, and an important step in the chronicles of the covenant nation of Israel - through Whom God's anointed Son&nbsp;was born. But the main function of the Law is to point us to Christ for He is not only the fulfillment of the Law and the prophets, but He is the One Who has fulfilled the Law on behalf of all who would believe on His name.</span></p></div><h2 data-dcnode-id="609"><span data-dcnode-id="610" instrument_node="">My Prayer</span></h2><div data-dcnode-id="605"><p data-dcnode-id="607" style="text-align:justify;"><span data-dcnode-id="608" instrument_node="">Heavenly Father, thank You for Your word and that truths that it contains. Thank You for Your faithfulness to Your people Israel and thank You that in Your grace the Lord Jesus&nbsp;came to fulfil the Law and the prophets and to die on the cross so that that a new and better covenant might be implemented - so that whosever believes on Him would not perish but have everlasting life. Thank You in Jesus name. AMEN</span></p><span data-dcnode-id="606" instrument_node="">
</span></div><div class="text-center" data-dcnode-id="601"><span data-dcnode-id="604" instrument_node="">
</span><span data-dcnode-id="602" instrument_node="">
</span></div><span data-dcnode-id="600" instrument_node="">
</span><div class="picture-wrap" data-dcnode-id="594"><a data-dcnode-id="595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.knowing-jesus.com/i/exodus-20-3-no-other-gods-but-me-blue-5084"><div data-dcnode-id="596" style="position: relative;width: 100%;padding-top: 133.31169%;"><picture data-dcnode-id="597"><source data-dcnode-id="599" srcset="https://dailyverse.knowing-jesus.com/webp/dv_700/dailyverse-images/45/Exodus+20-3+No+Other+Gods+But+Me+blue.webp" type="image/webp"><img alt="" class="cls_img" data-dcnode-id="598" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailyverse.knowing-jesus.com/w/dv_700/dailyverse-images/45/Exodus%252020-3%2520No%2520Other%2520Gods%2520But%2520Me%2520blue.jpg&amp;raw" style="aspect-ratio: 0.75;position: absolute;top: 0;left:0;width: 100%;"></picture></div></a></div><span data-dcnode-id="593" instrument_node=""> </span><div class="row" data-dcnode-id="579" style="padding-bottom: 25px;padding-top: 0;"><span data-dcnode-id="592" instrument_node="">
</span><div class="col-xs-6" data-dcnode-id="587"><span data-dcnode-id="591" instrument_node="">
</span><a data-dcnode-id="589" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailyverse.knowing-jesus.com/exodus-20-2" style="font-size:1.2em"><span data-dcnode-id="590" instrument_node="">◄ Previous: Exodus 20:2</span></a><span data-dcnode-id="588" instrument_node=""> </span></div><span data-dcnode-id="586" instrument_node="">
</span><div class="col-xs-6 text-right" data-dcnode-id="581"><span data-dcnode-id="585" instrument_node="">
</span><a data-dcnode-id="583" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailyverse.knowing-jesus.com/exodus-20-4" style="font-size:1.2em"><span data-dcnode-id="584" instrument_node="">Next: Exodus 20:4 ►</span></a><span data-dcnode-id="582" instrument_node=""> </span></div><span data-dcnode-id="580" instrument_node="">
