</span><h1 data-dcnode-id="696"><span data-dcnode-id="703" instrument_node="">
</span><a data-dcnode-id="701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailyverse.knowing-jesus.com/exodus-20-3" style="font-size:.8em"><span data-dcnode-id="702" instrument_node="">◄ </span></a><span data-dcnode-id="700" instrument_node="">What Does Exodus 20:4 Mean?</span><a data-dcnode-id="698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailyverse.knowing-jesus.com/exodus-20-12" style="font-size:.8em"><span data-dcnode-id="699" instrument_node=""> ►</span></a><span data-dcnode-id="697" instrument_node=""> </span></h1><span data-dcnode-id="695" instrument_node="">
</span><div class="q-text" data-dcnode-id="443"><span data-dcnode-id="694" instrument_node="">
</span><blockquote class="h-center" data-dcnode-id="686"><span data-dcnode-id="693" instrument_node="">
</span><p data-dcnode-id="691"><span data-dcnode-id="692" instrument_node="">"You shall not make for yourself an idol, or any likeness of what is in heaven above or on the earth beneath or in the water under the earth.</span></p><span data-dcnode-id="690" instrument_node="">
</span><div class="verse-num" data-dcnode-id="688"><span data-dcnode-id="689" instrument_node="">Exodus 20:4(NASB)            </span></div><span data-dcnode-id="687" instrument_node="">
</span></blockquote><span data-dcnode-id="685" instrument_node="">
</span><div class="picture-wrap" data-dcnode-id="679"><a data-dcnode-id="680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.knowing-jesus.com/i/exodus-20-4-you-shall-not-make-idols-red-8023"><div data-dcnode-id="681" style="position: relative;width: 100%;padding-top: 75%;"><picture data-dcnode-id="682"><source data-dcnode-id="684" srcset="https://dailyverse.knowing-jesus.com/webp/dv_700/dailyverse-images/0d/Exodus+20-4+You+Shall+Not+Make+Idols+red.webp" type="image/webp"><img alt="" class="cls_img" data-dcnode-id="683" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailyverse.knowing-jesus.com/w/dv_700/dailyverse-images/0d/Exodus%252020-4%2520You%2520Shall%2520Not%2520Make%2520Idols%2520red.jpg&amp;raw" style="aspect-ratio: 1.333;position: absolute;top: 0;left:0;width: 100%;"></picture></div></a></div><div class="picture-courtesy" data-dcnode-id="675"><span data-dcnode-id="678" instrument_node="">Picture courtesy of </span><a data-dcnode-id="676" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.freebibleimages.org/illustrations/moody-moses-commandments/"><span data-dcnode-id="677" instrument_node="">Moody Publishers/FreeBibleimages.org</span></a></div><div class="text-center" data-dcnode-id="671"><span data-dcnode-id="674" instrument_node="">
</span><span data-dcnode-id="672" instrument_node="">
</span></div><span data-dcnode-id="670" instrument_node="">
</span><h2 data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">Verse Thoughts</span></h2><div class="text-center" data-dcnode-id="664"><span data-dcnode-id="667" instrument_node="">
</span><span data-dcnode-id="665" instrument_node="">
</span></div><span data-dcnode-id="663" instrument_node="">
</span><div data-dcnode-id="654"><p data-dcnode-id="661" style="text-align:justify;"><span data-dcnode-id="662" instrument_node="">There is nothing more obnoxious to the Lord than the worship of graven images and idolatry surrounding false gods. When God presented Himself to the people of Israel in the wilderness and made His covenant with them, the very first matter the Lord brought up was this issue of idolatry, where something or someone, visible or invisible, was placed before Him.</span></p><span data-dcnode-id="660" instrument_node="">
</span><p data-dcnode-id="658" style="text-align:justify;"><span data-dcnode-id="659" instrument_node="">From the beginning, men started to worship the creation instead of the Creator. The flood was a judgement on the continuously increasing wickedness and idolatry that covered the antediluvian world. And the ongoing deification of man following the flood, was the reason for the destruction of the tower of Babel and the confusion of&nbsp;languages.</span></p><span data-dcnode-id="657" instrument_node="">
</span><p data-dcnode-id="655" style="text-align:justify;"><span data-dcnode-id="656" instrument_node="">Idolatry was the reason that God called Abraham out of the idol-worshipping city of Ur and determined to use him and his&nbsp;chosen descendants to circumvent Satan's nefarious plans to corrupt and enslave mankind&nbsp;by saturating the earth with alternative deities, disgusting demigods, and a satanic worldview.</span></p></div><div class="text-center" data-dcnode-id="648"><span data-dcnode-id="653" instrument_node="">
</span><span data-dcnode-id="651" instrument_node="">
</span><div class="adthrive-custom-player" data-dcnode-id="650"></div><span data-dcnode-id="649" instrument_node="">
</span></div><span data-dcnode-id="647" instrument_node="">
</span><div data-dcnode-id="614"><span data-dcnode-id="646" instrument_node="">
</span><p data-dcnode-id="644" style="text-align:justify;"><span data-dcnode-id="645" instrument_node="">The devious desire of the devil is to ascend to heaven, raise his throne above the stars of God, sit on the mount of assembly in the recesses of the north, and make himself like the Most High God by ascending above the heights of the clouds!</span></p><span data-dcnode-id="643" instrument_node="">
</span><p data-dcnode-id="633" style="text-align:justify;"><em data-dcnode-id="641"><span data-dcnode-id="642" instrument_node="">"I</span></em><em data-dcnode-id="639"><span data-dcnode-id="640" instrument_node=""> am the LORD your God, Who brought you out of the land of Egypt, out of the house of slavery," </span></em><span data-dcnode-id="638" instrument_node="">are the majestic words of the Lord, spoken to His chosen nation when He made His covenant with them: </span><em data-dcnode-id="636"><span data-dcnode-id="637" instrument_node="">"</span></em><em data-dcnode-id="634"><span data-dcnode-id="635" instrument_node="">You shall have no other gods before Me. You shall not make for yourself an idol, or any likeness of what is in heaven above or on the earth beneath or in the water under the earth. You shall not worship them nor serve them; for I, the LORD your God, am a jealous God."</span></em></p><span data-dcnode-id="632" instrument_node="">
</span><p data-dcnode-id="630" style="text-align:justify;"><span data-dcnode-id="631" instrument_node="">The first two commands that Israel received were clearly&nbsp;in connection with the unique status and supremacy of God,&nbsp;when Israel was given the unquestionable command to never entertain any other deities by participating in idolatry or placing graven images and idols before the true and living God.</span></p><span data-dcnode-id="629" instrument_node="">
</span><p data-dcnode-id="627" style="text-align:justify;"><span data-dcnode-id="628" instrument_node="">The entire Bible, both the Old and New Testament, gives witness to this abominable question of idolatry which is a fundamental tool of the enemy to dethrone God and dehumanise mankind. Although this command was originally given to Israel as part of their covenant with the Lord, the disgusting practice of idolatry must be shunned by every child of God.</span></p><span data-dcnode-id="626" instrument_node="">
</span><p data-dcnode-id="624" style="text-align:justify;"><span data-dcnode-id="625" instrument_node="">We are to consider the members of our earthly body as dead to immorality, impurity, passion, evil desire, and greed - ALL of which, Paul reminds us, amount to idolatry. We are to worship the Lord our God in spirit and in truth,&nbsp;for our Heavenly Father seeks worshippers who live by faith, walk in spirit, trust His Word, and worship only Him.</span></p><span data-dcnode-id="623" instrument_node="">
</span><p data-dcnode-id="621" style="text-align:justify;"><span data-dcnode-id="622" instrument_node="">We are to remember that God will never share His glory with another and no holy angel nor angelic messenger of the Lord, has ever accepted worship from men, as we are reminded by John in his Revelation of Jesus Christ - for He is the incarnate God Who alone is worthy of all worship and praise and honour and glory.</span></p><span data-dcnode-id="620" instrument_node="">
</span><p data-dcnode-id="618" style="text-align:justify;"><span data-dcnode-id="619" instrument_node="">Let us shun every aspect of idolatry whenever it raises its ugly head in our own lives, and remember the apostle's warning that no immoral, impure, or greedy person - i.e. no IDOLATER has any inheritance in the kingdom of Christ and of God... for the unrighteous and those engaged in idolatry will not inherit the kingdom of God.</span></p><span data-dcnode-id="617" instrument_node="">
</span><p data-dcnode-id="615" style="text-align:justify;"><span data-dcnode-id="616" instrument_node="">Before being born again, most, if not all believers engaged in some form of idolatry - either the elevation of self or the veneration of some other little created deity. Let us shun any form of idolatry and every idolatrous behaviour... and let us keep our eyes fixed on the true and living God - Jesus Christ, our God and Saviour in Whom are the words of eternal life.</span></p></div><h2 data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">My Prayer</span></h2><div data-dcnode-id="609"><p data-dcnode-id="610" style="text-align:justify;"><span data-dcnode-id="611" instrument_node="">Heavenly Father, I realise, more and more, how despicable and obnoxious is the practice of idolatry, when someone or something is seated on the throne of my life instead of Jesus Christ, the true and living God. Keep me from any form of idolatry. Protect me from the wiles of the devil, and help me to&nbsp;keep the eyes of my heart on Jesus, the Author and Finisher of my faith. Knowing that I died with Christ and have been raised up in Him into newness of life, I pray that king self may be kept in the place of death and that I will not be hoodwinked into giving honour to anything, except my God and Saviour, Jesus Christ, in Whose name I pray, AMEN.</span></p></div><div class="text-center" data-dcnode-id="605"><span data-dcnode-id="608" instrument_node="">
</span><span data-dcnode-id="606" instrument_node="">
</span></div><span data-dcnode-id="604" instrument_node="">
</span><div class="picture-wrap" data-dcnode-id="598"><a data-dcnode-id="599" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.knowing-jesus.com/i/exodus-20-4-you-shall-not-make-idols-pink-8022"><div data-dcnode-id="600" style="position: relative;width: 100%;padding-top: 133.31169%;"><picture data-dcnode-id="601"><source data-dcnode-id="603" srcset="https://dailyverse.knowing-jesus.com/webp/dv_700/dailyverse-images/d2/Exodus+20-4+You+Shall+Not+Make+Idols+pink.webp" type="image/webp"><img alt="" class="cls_img" data-dcnode-id="602" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailyverse.knowing-jesus.com/w/dv_700/dailyverse-images/d2/Exodus%252020-4%2520You%2520Shall%2520Not%2520Make%2520Idols%2520pink.jpg&amp;raw" style="aspect-ratio: 0.75;position: absolute;top: 0;left:0;width: 100%;"></picture></div></a></div><div class="picture-courtesy" data-dcnode-id="594"><span data-dcnode-id="597" instrument_node="">Picture courtesy of </span><a data-dcnode-id="595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.freebibleimages.org/illustrations/moody-moses-commandments/"><span data-dcnode-id="596" instrument_node="">Moody Publishers/FreeBibleimages.org</span></a></div><span data-dcnode-id="593" instrument_node=""> </span><div class="row" data-dcnode-id="579" style="padding-bottom: 25px;padding-top: 0;"><span data-dcnode-id="592" instrument_node="">
</span><div class="col-xs-6" data-dcnode-id="587"><span data-dcnode-id="591" instrument_node="">
</span><a data-dcnode-id="589" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailyverse.knowing-jesus.com/exodus-20-3" style="font-size:1.2em"><span data-dcnode-id="590" instrument_node="">◄ Previous: Exodus 20:3</span></a><span data-dcnode-id="588" instrument_node=""> </span></div><span data-dcnode-id="586" instrument_node="">
</span><div class="col-xs-6 text-right" data-dcnode-id="581"><span data-dcnode-id="585" instrument_node="">
</span><a data-dcnode-id="583" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailyverse.knowing-jesus.com/exodus-20-12" style="font-size:1.2em"><span data-dcnode-id="584" instrument_node="">Next: Exodus 20:12 ►</span></a><span data-dcnode-id="582" instrument_node=""> </span></div><span data-dcnode-id="580" instrument_node="">

</span><h2 data-dcnode-id="576"><span data-dcnode-id="577" instrument_node="">Choose a Verse from Exodus 20</span></h2><span data-dcnode-id="575" instrument_node=""> </span><div class="block block-block content-block-wrapper main-page" data-dcnode-id="511" id="block-block-7" style="padding-top: 15px;padding-bottom:0;margin-bottom: 0px"><span data-dcnode-id="574" instrument_node="">
</span><ul class="full-listing" data-dcnode-id="513"><span data-dcnode-id="573" instrument_node="">
