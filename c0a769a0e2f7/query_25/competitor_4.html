</span><h1 data-dcnode-id="740"><span data-dcnode-id="747" instrument_node="">
</span><a data-dcnode-id="745" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailyverse.knowing-jesus.com/exodus-9-20" style="font-size:.8em"><span data-dcnode-id="746" instrument_node="">◄ </span></a><span data-dcnode-id="744" instrument_node="">What Does Exodus 12:13 Mean?</span><a data-dcnode-id="742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailyverse.knowing-jesus.com/exodus-14-13" style="font-size:.8em"><span data-dcnode-id="743" instrument_node=""> ►</span></a><span data-dcnode-id="741" instrument_node=""> </span></h1><span data-dcnode-id="739" instrument_node="">
</span><div class="q-text" data-dcnode-id="447"><span data-dcnode-id="738" instrument_node="">
</span><blockquote class="h-center" data-dcnode-id="730"><span data-dcnode-id="737" instrument_node="">
</span><p data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">'The blood shall be a sign for you on the houses where you live; and when I see the blood I will pass over you, and no plague will befall you to destroy you when I strike the land of Egypt.</span></p><span data-dcnode-id="734" instrument_node="">
</span><div class="verse-num" data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">Exodus 12:13(NASB)            </span></div><span data-dcnode-id="731" instrument_node="">
</span></blockquote><span data-dcnode-id="729" instrument_node="">
</span><div class="picture-wrap" data-dcnode-id="723"><a data-dcnode-id="724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.knowing-jesus.com/i/exodus-12-13-i-will-pass-over-you-brown-13507"><div data-dcnode-id="725" style="position: relative;width: 100%;padding-top: 74.41558%;"><picture data-dcnode-id="726"><source data-dcnode-id="728" srcset="https://dailyverse.knowing-jesus.com/webp/dv_700/dailyverse-images/00/Exodus+12-13+I+Will+Pass+Over+You+brown.webp" type="image/webp"><img alt="" class="cls_img" data-dcnode-id="727" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailyverse.knowing-jesus.com/w/dv_700/dailyverse-images/00/Exodus%252012-13%2520I%2520Will%2520Pass%2520Over%2520You%2520brown.jpg&amp;raw" style="aspect-ratio: 1.344;position: absolute;top: 0;left:0;width: 100%;"></picture></div></a></div><div class="text-center" data-dcnode-id="719"><span data-dcnode-id="722" instrument_node="">
</span><span data-dcnode-id="720" instrument_node="">
</span></div><span data-dcnode-id="718" instrument_node="">
</span><h2 data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">Verse Thoughts</span></h2><div class="text-center" data-dcnode-id="712"><span data-dcnode-id="715" instrument_node="">
</span><span data-dcnode-id="713" instrument_node="">
</span></div><span data-dcnode-id="711" instrument_node="">
</span><div data-dcnode-id="699"><p data-dcnode-id="709" style="text-align:justify;"><span data-dcnode-id="710" instrument_node="">For 400 years Israel had been enslaved in Egypt, but at the right time, God sent a deliverer to bring His chosen people out of bondage. Moses was sent, with his brother Aaron, to demand that Pharoah let God's people go, but even a succession of nine terrible plagues was insufficient to cause him to release the Israelites and time and again, Pharoah hardened his heart against the Lord.&nbsp;</span></p><span data-dcnode-id="708" instrument_node="">
</span><p data-dcnode-id="703" style="text-align:justify;"><span data-dcnode-id="707" instrument_node="">Finally, the day came when God instructed Moses to warn Pharoah that the Lord would inflict one final devastating blow on Egypt if he failed to obey the Lord's command to let God's people go. So Moses said, </span><em data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">"Thus says the LORD: 'About midnight I will go out into the midst of Egypt; and all the firstborn in the land of Egypt shall die, from the firstborn of Pharaoh who sits on his throne, even to the firstborn of the female servant who is behind the hand-mill, and all the firstborn of the animals.'"</span></em><span data-dcnode-id="704" instrument_node=""> He warned that there would be a great cry throughout all the land of Egypt such as was not like it before, nor shall be like it again.</span></p><span data-dcnode-id="702" instrument_node="">
</span><p data-dcnode-id="700" style="text-align:justify;"><span data-dcnode-id="701" instrument_node="">With each successive plague, Pharoah had hardened his heart and refused to obey the Word of the Lord until... when confronted with this final challenge, his heart had become so desensitised to God's Word that Pharoah ordered Moses to get out of his sight and never to return&nbsp;again. Little did Pharoah realise that his stubborn resistance to the Lord would not only result in the death of his own, firstborn son, but he and his army would soon be utterly destroyed.</span></p></div><div class="text-center" data-dcnode-id="693"><span data-dcnode-id="698" instrument_node="">
</span><span data-dcnode-id="696" instrument_node="">
</span><div class="adthrive-custom-player" data-dcnode-id="695"></div><span data-dcnode-id="694" instrument_node="">
</span></div><span data-dcnode-id="692" instrument_node="">
</span><div data-dcnode-id="664"><span data-dcnode-id="691" instrument_node="">
</span><p data-dcnode-id="689" style="text-align:justify;"><span data-dcnode-id="690" instrument_node="">Once the stage had been set for the most devastating plague to strike Egypt, the Lord instituted the Passover, when the angel of death would pass over the land of Egypt and strike all their firstborn - dead. The Lord had prepared a way for the firstborn of all who believe in Him to be saved from the icy grip of the angel of death. God established a festival called the Passover so that those who believed God's Word would be&nbsp;redeemed from Egyptian slavery. The angel of death would not come near the firstborn of those who believed but would 'Pass-Over' them. In place of the life of their firstborn sons, a lamb would be selected and slain in their place, and the shed blood of the innocent animal was to be smeared on the lintels of the doorposts on their home as a sign of their faith in God. The angel of death would not enter that home but would Pass-Over.</span></p><span data-dcnode-id="688" instrument_node="">
</span><p data-dcnode-id="684" style="text-align:justify;"><span data-dcnode-id="687" instrument_node="">God gave detailed&nbsp;instructions on how to select, slaughter, and prepare the lambs for the Passover meal. The people also received instructions on how they were to eat it and what garments they were to wear as they partook of the Passover meal. He also gave instructions on what they needed to do after they had finished this important meal. The Lord explained to His people, </span><em data-dcnode-id="685"><span data-dcnode-id="686" instrument_node="">"The blood shall be a sign for you on the houses where you live; and when I see the blood, I will pass over you, and no plague will befall you to destroy you when I strike the land of Egypt."</span></em></p><span data-dcnode-id="683" instrument_node="">
</span><p data-dcnode-id="681" style="text-align:justify;"><span data-dcnode-id="682" instrument_node="">Little did the people realise that&nbsp;this Passover was to be the first of many. It was to be an illustration of the great and final Passover that would be celebrated centuries later, when the Lamb of God would come to earth and shed His lifeblood as God's perfect, human Passover sacrifice. Jesus is the one to Whom every Passover lamb points - for just as these Passover&nbsp;lambs&nbsp;were slain their firstborn sons, so Jesus came to die&nbsp;in the place of sinful man.&nbsp;He&nbsp;was sent to redeem His people from their slavery to sin so that by faith in Him, they would LIVE.</span></p><span data-dcnode-id="680" instrument_node="">
</span><p data-dcnode-id="678" style="text-align:justify;"><span data-dcnode-id="679" instrument_node="">The shed blood of the little lambs was to become a permanent reminder to the people of Israel that the Lord was their Lord and Saviour - their God and Redeemer. It was to remind them that&nbsp;He alone could redeem them from the slave market of sin. He alone could rescue His people from Satan, sin, death, and hell. The Passover was to become the first of a series of feast days that were to be given to Israel as a sign that God would send a Saviour from among His chosen nation.</span></p><span data-dcnode-id="677" instrument_node="">
</span><p data-dcnode-id="675" style="text-align:justify;"><span data-dcnode-id="676" instrument_node="">Abraham was told that the Lord would provide HIMSELF a Lamb and by God's grace, Israel took part in that first Passover meal four hundred years later, in preparation for its final fulfilment on God's final and perfect Passover - at Calvary's Cross. We know that&nbsp;JESUS was to be the perfect Passover Lamb. And just as Israel were to partake of the flesh of the slain lambs, so we are to partake of HIM. Christ is our Passover and we are to eat of Him, just as the Israelites ate the flesh of the Passover lamb on their final night of slavery in Egypt. Jesus is our spiritual food and we who partake of His body and blood by faith, will LIVE.</span></p><span data-dcnode-id="674" instrument_node="">
</span><p data-dcnode-id="668" style="text-align:justify;"><span data-dcnode-id="673" instrument_node="">Israel's Passover lamb was to be the visual representation of the true Passover Lamb. It was to be a picture of the perfect Passover Lamb Who would come to earth as man's Kinsman-Redeemer to take away the sin of the world and become the sacrifice for our sin. Paul pointed us to JESUS as our Passover when he wrote: </span><em data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">"Christ our Passover is sacrificed</span></em><em data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">&nbsp;for us, therefore let us celebrate the feast, not with old leaven, nor with the leaven of malice and wickedness, but with the unleavened bread of sincerity and truth."</span></em></p><span data-dcnode-id="667" instrument_node="">
</span><p data-dcnode-id="665" style="text-align:justify;"><span data-dcnode-id="666" instrument_node="">Just as the blood on the doorposts of the Israelites in Egypt was a physical sign of their faith in God's Word, so a heart that has been sprinkled with the shed blood of Christ by faith in His sacrificial death on the Cross, is the spiritual sign that we have passed from death to life - from slavery to the freedom that is in Christ Jesus.</span></p></div><h2 data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">My Prayer</span></h2><div data-dcnode-id="659"><p data-dcnode-id="660" style="text-align:justify;"><span data-dcnode-id="661" instrument_node="">Heavenly Father, what a terrifying time this must have been for the Israelites and Egyptians alike, as the first Passover took place and the Angel of Death either killed the first-born son of a family, or passed over if the house inhabitants had put the blood of the lamb on their doorposts. What a wonderful picture of the fact we are not saved by our nationality, wealth, or accomplishments, but by the blood of the Lamb of God. May many more people, Jew and Gentile alike, believe on Jesus, His death, and Resurrection, and have their sins forgiven by His redeeming blood. In Jesus' name, AMEN.</span></p></div><div class="text-center" data-dcnode-id="655"><span data-dcnode-id="658" instrument_node="">
</span><span data-dcnode-id="656" instrument_node="">
</span></div><span data-dcnode-id="654" instrument_node="">
</span><div class="picture-wrap" data-dcnode-id="648"><a data-dcnode-id="649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.knowing-jesus.com/i/exodus-12-13-i-will-pass-over-you-orange-13508"><div data-dcnode-id="650" style="position: relative;width: 100%;padding-top: 74.41558%;"><picture data-dcnode-id="651"><source data-dcnode-id="653" srcset="https://dailyverse.knowing-jesus.com/webp/dv_700/dailyverse-images/bd/Exodus+12-13+I+Will+Pass+Over+You+orange.webp" type="image/webp"><img alt="" class="cls_img" data-dcnode-id="652" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailyverse.knowing-jesus.com/w/dv_700/dailyverse-images/bd/Exodus%252012-13%2520I%2520Will%2520Pass%2520Over%2520You%2520orange.jpg&amp;raw" style="aspect-ratio: 1.344;position: absolute;top: 0;left:0;width: 100%;"></picture></div></a></div><span data-dcnode-id="647" instrument_node=""> </span><div class="row" data-dcnode-id="633" style="padding-bottom: 25px;padding-top: 0;"><span data-dcnode-id="646" instrument_node="">
</span><div class="col-xs-6" data-dcnode-id="641"><span data-dcnode-id="645" instrument_node="">
</span><a data-dcnode-id="643" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailyverse.knowing-jesus.com/exodus-9-20" style="font-size:1.2em"><span data-dcnode-id="644" instrument_node="">◄ Previous: Exodus 9:20</span></a><span data-dcnode-id="642" instrument_node=""> </span></div><span data-dcnode-id="640" instrument_node="">
</span><div class="col-xs-6 text-right" data-dcnode-id="635"><span data-dcnode-id="639" instrument_node="">
</span><a data-dcnode-id="637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailyverse.knowing-jesus.com/exodus-14-13" style="font-size:1.2em"><span data-dcnode-id="638" instrument_node="">Next: Exodus 14:13 ►</span></a><span data-dcnode-id="636" instrument_node=""> </span></div><span data-dcnode-id="634" instrument_node="">
</span></div><span data-dcnode-id="632" instrument_node="">
</span><h2 data-dcnode-id="630"><span data-dcnode-id="631" instrument_node="">Choose a Verse from Exodus 12</span></h2><span data-dcnode-id="629" instrument_node=""> </span><div class="block block-block content-block-wrapper main-page" data-dcnode-id="515" id="block-block-7" style="padding-top: 15px;padding-bottom:0;margin-bottom: 0px"><span data-dcnode-id="628" instrument_node="">
</span><ul class="full-listing" data-dcnode-id="517"><span data-dcnode-id="627" instrument_node="">
