</span><h1 data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">Exodus chapter 13</span></h1><span data-dcnode-id="741" instrument_node="">
</span></span><div class="niv box" data-dcnode-id="662"><b data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">New International Version</span></b><br data-dcnode-id="737"><br data-dcnode-id="736"><div class="bottomPadding" data-dcnode-id="729"><a class="versenumber" data-dcnode-id="734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-1.html"><span data-dcnode-id="735" instrument_node="">1</span></a><span data-dcnode-id="733" instrument_node=""> The LORD said to Moses, </span><a class="versenumber" data-dcnode-id="731" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-2.html"><span data-dcnode-id="732" instrument_node="">2</span></a><span data-dcnode-id="730" instrument_node=""> Consecrate to me every firstborn male. The first offspring of every womb among the Israelites belongs to me, whether human or animal.' </span></div><div class="bottomPadding" data-dcnode-id="704"><a class="versenumber" data-dcnode-id="727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-3.html"><span data-dcnode-id="728" instrument_node="">3</span></a><span data-dcnode-id="726" instrument_node=""> Then Moses said to the people, 'Commemorate this day, the day you came out of Egypt, out of the land of slavery, because the LORD brought you out of it with a mighty hand. Eat nothing containing yeast. </span><a class="versenumber" data-dcnode-id="724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-4.html"><span data-dcnode-id="725" instrument_node="">4</span></a><span data-dcnode-id="723" instrument_node=""> Today, in the month of Aviv, you are leaving. </span><a class="versenumber" data-dcnode-id="721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-5.html"><span data-dcnode-id="722" instrument_node="">5</span></a><span data-dcnode-id="720" instrument_node=""> When the LORD brings you into the land of the Canaanites, Hittites, Amorites, Hivites and Jebusites--the land he swore to your ancestors to give you, a land flowing with milk and honey--you are to observe this ceremony in this month: </span><a class="versenumber" data-dcnode-id="718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-6.html"><span data-dcnode-id="719" instrument_node="">6</span></a><span data-dcnode-id="717" instrument_node=""> For seven days eat bread made without yeast and on the seventh day hold a festival to the LORD. </span><a class="versenumber" data-dcnode-id="715" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-7.html"><span data-dcnode-id="716" instrument_node="">7</span></a><span data-dcnode-id="714" instrument_node=""> Eat unleavened bread during those seven days; nothing with yeast in it is to be seen among you, nor shall any yeast be seen anywhere within your borders. </span><a class="versenumber" data-dcnode-id="712" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-8.html"><span data-dcnode-id="713" instrument_node="">8</span></a><span data-dcnode-id="711" instrument_node=""> On that day tell your son, 'I do this because of what the LORD did for me when I came out of Egypt.' </span><a class="versenumber" data-dcnode-id="709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-9.html"><span data-dcnode-id="710" instrument_node="">9</span></a><span data-dcnode-id="708" instrument_node=""> This observance will be for you like a sign on your hand and a reminder on your forehead that this law of the LORD is to be on your lips. For the LORD brought you out of Egypt with his mighty hand. </span><a class="versenumber" data-dcnode-id="706" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-10.html"><span data-dcnode-id="707" instrument_node="">10</span></a><span data-dcnode-id="705" instrument_node=""> You must keep this ordinance at the appointed time year after year. </span></div><div class="bottomPadding" data-dcnode-id="694"><a class="versenumber" data-dcnode-id="702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-11.html"><span data-dcnode-id="703" instrument_node="">11</span></a><span data-dcnode-id="701" instrument_node=""> After the LORD brings you into the land of the Canaanites and gives it to you, as he promised on oath to you and your ancestors, </span><a class="versenumber" data-dcnode-id="699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-12.html"><span data-dcnode-id="700" instrument_node="">12</span></a><span data-dcnode-id="698" instrument_node=""> you are to give over to the LORD the first offspring of every womb. All the firstborn males of your livestock belong to the LORD. </span><a class="versenumber" data-dcnode-id="696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-13.html"><span data-dcnode-id="697" instrument_node="">13</span></a><span data-dcnode-id="695" instrument_node=""> Redeem with a lamb every firstborn donkey, but if you do not redeem it, break its neck. Redeem every firstborn among your sons. </span></div><div class="bottomPadding" data-dcnode-id="684"><a class="versenumber" data-dcnode-id="692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-14.html"><span data-dcnode-id="693" instrument_node="">14</span></a><span data-dcnode-id="691" instrument_node=""> In days to come, when your son asks you, 'What does this mean?' say to him, 'With a mighty hand the LORD brought us out of Egypt, out of the land of slavery. </span><a class="versenumber" data-dcnode-id="689" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-15.html"><span data-dcnode-id="690" instrument_node="">15</span></a><span data-dcnode-id="688" instrument_node=""> When Pharaoh stubbornly refused to let us go, the LORD killed the firstborn of both people and animals in Egypt. This is why I sacrifice to the LORD the first male offspring of every womb and redeem each of my firstborn sons.' </span><a class="versenumber" data-dcnode-id="686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-16.html"><span data-dcnode-id="687" instrument_node="">16</span></a><span data-dcnode-id="685" instrument_node=""> And it will be like a sign on your hand and a symbol on your forehead that the LORD brought us out of Egypt with his mighty hand.' </span></div><div class="bottomPadding" data-dcnode-id="677"><a class="versenumber" data-dcnode-id="682" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-17.html"><span data-dcnode-id="683" instrument_node="">17</span></a><span data-dcnode-id="681" instrument_node=""> When Pharaoh let the people go, God did not lead them on the road through the Philistine country, though that was shorter. For God said, 'If they face war, they might change their minds and return to Egypt.' </span><a class="versenumber" data-dcnode-id="679" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-18.html"><span data-dcnode-id="680" instrument_node="">18</span></a><span data-dcnode-id="678" instrument_node=""> So God led the people around by the desert road toward the Red Sea. The Israelites went up out of Egypt ready for battle. </span></div><div class="bottomPadding" data-dcnode-id="673"><a class="versenumber" data-dcnode-id="675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-19.html"><span data-dcnode-id="676" instrument_node="">19</span></a><span data-dcnode-id="674" instrument_node=""> Moses took the bones of Joseph with him because Joseph had made the Israelites swear an oath. He had said, 'God will surely come to your aid, and then you must carry my bones up with you from this place.' </span></div><div class="bottomPadding" data-dcnode-id="663"><a class="versenumber" data-dcnode-id="671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-20.html"><span data-dcnode-id="672" instrument_node="">20</span></a><span data-dcnode-id="670" instrument_node=""> After leaving Sukkoth they camped at Etham on the edge of the desert. </span><a class="versenumber" data-dcnode-id="668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-21.html"><span data-dcnode-id="669" instrument_node="">21</span></a><span data-dcnode-id="667" instrument_node=""> By day the LORD went ahead of them in a pillar of cloud to guide them on their way and by night in a pillar of fire to give them light, so that they could travel by day or night. </span><a class="versenumber" data-dcnode-id="665" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-22.html"><span data-dcnode-id="666" instrument_node="">22</span></a><span data-dcnode-id="664" instrument_node=""> Neither the pillar of cloud by day nor the pillar of fire by night left its place in front of the people. </span></div></div><div class="esv box" data-dcnode-id="587" style="display: none;"><b data-dcnode-id="660"><span data-dcnode-id="661" instrument_node="">English Standard Version</span></b><br data-dcnode-id="659"><br data-dcnode-id="658"><div class="bottomPadding" data-dcnode-id="651"><a class="versenumber" data-dcnode-id="656" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-1.html"><span data-dcnode-id="657" instrument_node="">1</span></a><span data-dcnode-id="655" instrument_node=""> The LORD said to Moses, </span><a class="versenumber" data-dcnode-id="653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-2.html"><span data-dcnode-id="654" instrument_node="">2</span></a><span data-dcnode-id="652" instrument_node=""> “Consecrate to me all the firstborn. Whatever is the first to open the womb among the people of Israel, both of man and of beast, is mine.” </span></div><div class="bottomPadding" data-dcnode-id="626"><a class="versenumber" data-dcnode-id="649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-3.html"><span data-dcnode-id="650" instrument_node="">3</span></a><span data-dcnode-id="648" instrument_node=""> Then Moses said to the people, “Remember this day in which you came out from Egypt, out of the house of slavery, for by a strong hand the LORD brought you out from this place. No leavened bread shall be eaten. </span><a class="versenumber" data-dcnode-id="646" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-4.html"><span data-dcnode-id="647" instrument_node="">4</span></a><span data-dcnode-id="645" instrument_node=""> Today, in the month of Abib, you are going out. </span><a class="versenumber" data-dcnode-id="643" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-5.html"><span data-dcnode-id="644" instrument_node="">5</span></a><span data-dcnode-id="642" instrument_node=""> And when the LORD brings you into the land of the Canaanites, the Hittites, the Amorites, the Hivites, and the Jebusites, which he swore to your fathers to give you, a land flowing with milk and honey, you shall keep this service in this month. </span><a class="versenumber" data-dcnode-id="640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-6.html"><span data-dcnode-id="641" instrument_node="">6</span></a><span data-dcnode-id="639" instrument_node=""> Seven days you shall eat unleavened bread, and on the seventh day there shall be a feast to the LORD. </span><a class="versenumber" data-dcnode-id="637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-7.html"><span data-dcnode-id="638" instrument_node="">7</span></a><span data-dcnode-id="636" instrument_node=""> Unleavened bread shall be eaten for seven days; no leavened bread shall be seen with you, and no leaven shall be seen with you in all your territory. </span><a class="versenumber" data-dcnode-id="634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-8.html"><span data-dcnode-id="635" instrument_node="">8</span></a><span data-dcnode-id="633" instrument_node=""> You shall tell your son on that day, ‘It is because of what the LORD did for me when I came out of Egypt.’ </span><a class="versenumber" data-dcnode-id="631" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-9.html"><span data-dcnode-id="632" instrument_node="">9</span></a><span data-dcnode-id="630" instrument_node=""> And it shall be to you as a sign on your hand and as a memorial between your eyes, that the law of the LORD may be in your mouth. For with a strong hand the LORD has brought you out of Egypt. </span><a class="versenumber" data-dcnode-id="628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-10.html"><span data-dcnode-id="629" instrument_node="">10</span></a><span data-dcnode-id="627" instrument_node=""> You shall therefore keep this statute at its appointed time from year to year. </span></div><div class="bottomPadding" data-dcnode-id="607"><a class="versenumber" data-dcnode-id="624" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-11.html"><span data-dcnode-id="625" instrument_node="">11</span></a><span data-dcnode-id="623" instrument_node=""> “When the LORD brings you into the land of the Canaanites, as he swore to you and your fathers, and shall give it to you, </span><a class="versenumber" data-dcnode-id="621" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-12.html"><span data-dcnode-id="622" instrument_node="">12</span></a><span data-dcnode-id="620" instrument_node=""> you shall set apart to the LORD all that first opens the womb. All the firstborn of your animals that are males shall be the LORD’s. </span><a class="versenumber" data-dcnode-id="618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-13.html"><span data-dcnode-id="619" instrument_node="">13</span></a><span data-dcnode-id="617" instrument_node=""> Every firstborn of a donkey you shall redeem with a lamb, or if you will not redeem it you shall break its neck. Every firstborn of man among your sons you shall redeem. </span><a class="versenumber" data-dcnode-id="615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-14.html"><span data-dcnode-id="616" instrument_node="">14</span></a><span data-dcnode-id="614" instrument_node=""> And when in time to come your son asks you, ‘What does this mean?’ you shall say to him, ‘By a strong hand the LORD brought us out of Egypt, from the house of slavery. </span><a class="versenumber" data-dcnode-id="612" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-15.html"><span data-dcnode-id="613" instrument_node="">15</span></a><span data-dcnode-id="611" instrument_node=""> For when Pharaoh stubbornly refused to let us go, the LORD killed all the firstborn in the land of Egypt, both the firstborn of man and the firstborn of animals. Therefore I sacrifice to the LORD all the males that first open the womb, but all the firstborn of my sons I redeem.’ </span><a class="versenumber" data-dcnode-id="609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-16.html"><span data-dcnode-id="610" instrument_node="">16</span></a><span data-dcnode-id="608" instrument_node=""> It shall be as a mark on your hand or frontlets between your eyes, for by a strong hand the LORD brought us out of Egypt.” </span></div><div class="bottomPadding" data-dcnode-id="588"><a class="versenumber" data-dcnode-id="605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-17.html"><span data-dcnode-id="606" instrument_node="">17</span></a><span data-dcnode-id="604" instrument_node=""> When Pharaoh let the people go, God did not lead them by way of the land of the Philistines, although that was near. For God said, “Lest the people change their minds when they see war and return to Egypt.” </span><a class="versenumber" data-dcnode-id="602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-18.html"><span data-dcnode-id="603" instrument_node="">18</span></a><span data-dcnode-id="601" instrument_node=""> But God led the people around by the way of the wilderness toward the Red Sea. And the people of Israel went up out of the land of Egypt equipped for battle. </span><a class="versenumber" data-dcnode-id="599" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-19.html"><span data-dcnode-id="600" instrument_node="">19</span></a><span data-dcnode-id="598" instrument_node=""> Moses took the bones of Joseph with him, for Joseph had made the sons of Israel solemnly swear, saying, “God will surely visit you, and you shall carry up my bones with you from here.” </span><a class="versenumber" data-dcnode-id="596" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-20.html"><span data-dcnode-id="597" instrument_node="">20</span></a><span data-dcnode-id="595" instrument_node=""> And they moved on from Succoth and encamped at Etham, on the edge of the wilderness. </span><a class="versenumber" data-dcnode-id="593" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-21.html"><span data-dcnode-id="594" instrument_node="">21</span></a><span data-dcnode-id="592" instrument_node=""> And the LORD went before them by day in a pillar of cloud to lead them along the way, and by night in a pillar of fire to give them light, that they might travel by day and by night. </span><a class="versenumber" data-dcnode-id="590" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-22.html"><span data-dcnode-id="591" instrument_node="">22</span></a><span data-dcnode-id="589" instrument_node=""> The pillar of cloud by day and the pillar of fire by night did not depart from before the people. </span></div></div><div class="kjv box" data-dcnode-id="477" style="display: none;"><b data-dcnode-id="585"><span data-dcnode-id="586" instrument_node="">King James Version</span></b><br data-dcnode-id="584"><br data-dcnode-id="583"><div class="bottomPadding" data-dcnode-id="534"><a class="versenumber" data-dcnode-id="581" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-1.html"><span data-dcnode-id="582" instrument_node="">1</span></a><span data-dcnode-id="580" instrument_node=""> And the LORD spake unto Moses, saying, </span><a class="versenumber" data-dcnode-id="578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-2.html"><span data-dcnode-id="579" instrument_node="">2</span></a><span data-dcnode-id="577" instrument_node=""> Sanctify unto me all the firstborn, whatsoever openeth the womb among the children of Israel, </span><i data-dcnode-id="575"><span data-dcnode-id="576" instrument_node="">both</span></i><span data-dcnode-id="574" instrument_node=""> of man and of beast: it </span><i data-dcnode-id="572"><span data-dcnode-id="573" instrument_node="">is</span></i><span data-dcnode-id="571" instrument_node=""> mine. </span><a class="versenumber" data-dcnode-id="569" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-3.html"><span data-dcnode-id="570" instrument_node="">3</span></a><span data-dcnode-id="568" instrument_node=""> And Moses said unto the people, Remember this day, in which ye came out from Egypt, out of the house of bondage; for by strength of hand the LORD brought you out from this </span><i data-dcnode-id="566"><span data-dcnode-id="567" instrument_node="">place</span></i><span data-dcnode-id="565" instrument_node="">: there shall no leavened bread be eaten. </span><a class="versenumber" data-dcnode-id="563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-4.html"><span data-dcnode-id="564" instrument_node="">4</span></a><span data-dcnode-id="562" instrument_node=""> This day came ye out in the month Abib. </span><a class="versenumber" data-dcnode-id="560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-5.html"><span data-dcnode-id="561" instrument_node="">5</span></a><span data-dcnode-id="559" instrument_node=""> And it shall be when the LORD shall bring thee into the land of the Canaanites, and the Hittites, and the Amorites, and the Hivites, and the Jebusites, which he sware unto thy fathers to give thee, a land flowing with milk and honey, that thou shalt keep this service in this month. </span><a class="versenumber" data-dcnode-id="557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-6.html"><span data-dcnode-id="558" instrument_node="">6</span></a><span data-dcnode-id="556" instrument_node=""> Seven days thou shalt eat unleavened bread, and in the seventh day </span><i data-dcnode-id="554"><span data-dcnode-id="555" instrument_node="">shall be</span></i><span data-dcnode-id="553" instrument_node=""> a feast to the LORD. </span><a class="versenumber" data-dcnode-id="551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-7.html"><span data-dcnode-id="552" instrument_node="">7</span></a><span data-dcnode-id="550" instrument_node=""> Unleavened bread shall be eaten seven days; and there shall no leavened bread be seen with thee, neither shall there be leaven seen with thee in all thy quarters. </span><a class="versenumber" data-dcnode-id="548" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-8.html"><span data-dcnode-id="549" instrument_node="">8</span></a><span data-dcnode-id="547" instrument_node=""> And thou shalt shew thy son in that day, saying, </span><i data-dcnode-id="545"><span data-dcnode-id="546" instrument_node="">This is done</span></i><span data-dcnode-id="544" instrument_node=""> because of that </span><i data-dcnode-id="542"><span data-dcnode-id="543" instrument_node="">which</span></i><span data-dcnode-id="541" instrument_node=""> the LORD did unto me when I came forth out of Egypt. </span><a class="versenumber" data-dcnode-id="539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-9.html"><span data-dcnode-id="540" instrument_node="">9</span></a><span data-dcnode-id="538" instrument_node=""> And it shall be for a sign unto thee upon thine hand, and for a memorial between thine eyes, that the LORD'S law may be in thy mouth: for with a strong hand hath the LORD brought thee out of Egypt. </span><a class="versenumber" data-dcnode-id="536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-10.html"><span data-dcnode-id="537" instrument_node="">10</span></a><span data-dcnode-id="535" instrument_node=""> Thou shalt therefore keep this ordinance in his season from year to year. </span></div><div class="bottomPadding" data-dcnode-id="509"><a class="versenumber" data-dcnode-id="532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-11.html"><span data-dcnode-id="533" instrument_node="">11</span></a><span data-dcnode-id="531" instrument_node=""> And it shall be when the LORD shall bring thee into the land of the Canaanites, as he sware unto thee and to thy fathers, and shall give it thee, </span><a class="versenumber" data-dcnode-id="529" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-12.html"><span data-dcnode-id="530" instrument_node="">12</span></a><span data-dcnode-id="528" instrument_node=""> That thou shalt set apart unto the LORD all that openeth the matrix, and every firstling that cometh of a beast which thou hast; the males </span><i data-dcnode-id="526"><span data-dcnode-id="527" instrument_node="">shall be</span></i><span data-dcnode-id="525" instrument_node=""> the LORD'S. </span><a class="versenumber" data-dcnode-id="523" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-13.html"><span data-dcnode-id="524" instrument_node="">13</span></a><span data-dcnode-id="522" instrument_node=""> And every firstling of an ass thou shalt redeem with a lamb; and if thou wilt not redeem it, then thou shalt break his neck: and all the firstborn of man among thy children shalt thou redeem. </span><a class="versenumber" data-dcnode-id="520" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-14.html"><span data-dcnode-id="521" instrument_node="">14</span></a><span data-dcnode-id="519" instrument_node=""> And it shall be when thy son asketh thee in time to come, saying, What </span><i data-dcnode-id="517"><span data-dcnode-id="518" instrument_node="">is</span></i><span data-dcnode-id="516" instrument_node=""> this? that thou shalt say unto him, By strength of hand the LORD brought us out from Egypt, from the house of bondage: </span><a class="versenumber" data-dcnode-id="514" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-15.html"><span data-dcnode-id="515" instrument_node="">15</span></a><span data-dcnode-id="513" instrument_node=""> And it came to pass, when Pharaoh would hardly let us go, that the LORD slew all the firstborn in the land of Egypt, both the firstborn of man, and the firstborn of beast: therefore I sacrifice to the LORD all that openeth the matrix, being males; but all the firstborn of my children I redeem. </span><a class="versenumber" data-dcnode-id="511" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-16.html"><span data-dcnode-id="512" instrument_node="">16</span></a><span data-dcnode-id="510" instrument_node=""> And it shall be for a token upon thine hand, and for frontlets between thine eyes: for by strength of hand the LORD brought us forth out of Egypt. </span></div><div class="bottomPadding" data-dcnode-id="478"><a class="versenumber" data-dcnode-id="507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-17.html"><span data-dcnode-id="508" instrument_node="">17</span></a><span data-dcnode-id="506" instrument_node=""> And it came to pass, when Pharaoh had let the people go, that God led them not </span><i data-dcnode-id="504"><span data-dcnode-id="505" instrument_node="">through</span></i><span data-dcnode-id="503" instrument_node=""> the way of the land of the Philistines, although that </span><i data-dcnode-id="501"><span data-dcnode-id="502" instrument_node="">was</span></i><span data-dcnode-id="500" instrument_node=""> near; for God said, Lest peradventure the people repent when they see war, and they return to Egypt: </span><a class="versenumber" data-dcnode-id="498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-18.html"><span data-dcnode-id="499" instrument_node="">18</span></a><span data-dcnode-id="497" instrument_node=""> But God led the people about, </span><i data-dcnode-id="495"><span data-dcnode-id="496" instrument_node="">through</span></i><span data-dcnode-id="494" instrument_node=""> the way of the wilderness of the Red sea: and the children of Israel went up harnessed out of the land of Egypt. </span><a class="versenumber" data-dcnode-id="492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-19.html"><span data-dcnode-id="493" instrument_node="">19</span></a><span data-dcnode-id="491" instrument_node=""> And Moses took the bones of Joseph with him: for he had straitly sworn the children of Israel, saying, God will surely visit you; and ye shall carry up my bones away hence with you. </span><a class="versenumber" data-dcnode-id="489" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-20.html"><span data-dcnode-id="490" instrument_node="">20</span></a><span data-dcnode-id="488" instrument_node=""> And they took their journey from Succoth, and encamped in Etham, in the edge of the wilderness. </span><a class="versenumber" data-dcnode-id="486" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-21.html"><span data-dcnode-id="487" instrument_node="">21</span></a><span data-dcnode-id="485" instrument_node=""> And the LORD went before them by day in a pillar of a cloud, to lead them the way; and by night in a pillar of fire, to give them light; to go by day and night: </span><a class="versenumber" data-dcnode-id="483" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-22.html"><span data-dcnode-id="484" instrument_node="">22</span></a><span data-dcnode-id="482" instrument_node=""> He took not away the pillar of the cloud by day, nor the pillar of fire by night, </span><i data-dcnode-id="480"><span data-dcnode-id="481" instrument_node="">from</span></i><span data-dcnode-id="479" instrument_node=""> before the people. </span></div></div><div class="nasb box" data-dcnode-id="390" style="display: none;"><b data-dcnode-id="475"><span data-dcnode-id="476" instrument_node="">New American Standard Bible</span></b><br data-dcnode-id="474"><br data-dcnode-id="473"><div class="bottomPadding" data-dcnode-id="463"><a class="versenumber" data-dcnode-id="471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-1.html"><span data-dcnode-id="472" instrument_node="">1</span></a><span data-dcnode-id="470" instrument_node=""> Then the LORD spoke to Moses, saying, </span><a class="versenumber" data-dcnode-id="468" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-2.html"><span data-dcnode-id="469" instrument_node="">2</span></a><span data-dcnode-id="467" instrument_node=""> 'Sanctify to Me every firstborn, the firstborn of every womb among the sons of Israel, among people and animals </span><i data-dcnode-id="465"><span data-dcnode-id="466" instrument_node="">alike;</span></i><span data-dcnode-id="464" instrument_node=""> it belongs to Me.' </span></div><div class="bottomPadding" data-dcnode-id="432"><a class="versenumber" data-dcnode-id="461" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-3.html"><span data-dcnode-id="462" instrument_node="">3</span></a><span data-dcnode-id="460" instrument_node=""> And Moses said to the people, 'Remember this day in which you departed from Egypt, from the house of slavery; for by a powerful hand the LORD brought you out from this place. And nothing with yeast shall be eaten. </span><a class="versenumber" data-dcnode-id="458" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-4.html"><span data-dcnode-id="459" instrument_node="">4</span></a><span data-dcnode-id="457" instrument_node=""> On this day in the month of Abib, you are about to go out </span><i data-dcnode-id="455"><span data-dcnode-id="456" instrument_node="">from here.</span></i><span data-dcnode-id="454" instrument_node=""> </span><a class="versenumber" data-dcnode-id="452" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-5.html"><span data-dcnode-id="453" instrument_node="">5</span></a><span data-dcnode-id="451" instrument_node=""> And it shall be when the LORD brings you to the land of the Canaanite, the Hittite, the Amorite, the Hivite, and the Jebusite, which He swore to your fathers to give you, a land flowing with milk and honey, that you shall perform this rite in this month. </span><a class="versenumber" data-dcnode-id="449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-6.html"><span data-dcnode-id="450" instrument_node="">6</span></a><span data-dcnode-id="448" instrument_node=""> For seven days you shall eat unleavened bread, and on the seventh day there shall be a feast to the LORD. </span><a class="versenumber" data-dcnode-id="446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-7.html"><span data-dcnode-id="447" instrument_node="">7</span></a><span data-dcnode-id="445" instrument_node=""> Unleavened bread shall be eaten throughout the seven days; and nothing with yeast shall be seen among you, nor shall any dough with yeast be seen among you in all your borders. </span><a class="versenumber" data-dcnode-id="443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-8.html"><span data-dcnode-id="444" instrument_node="">8</span></a><span data-dcnode-id="442" instrument_node=""> And you shall tell your son on that day, saying, ‘</span><i data-dcnode-id="440"><span data-dcnode-id="441" instrument_node="">It is</span></i><span data-dcnode-id="439" instrument_node=""> because of what the LORD did for me when I came out of Egypt.’ </span><a class="versenumber" data-dcnode-id="437" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-9.html"><span data-dcnode-id="438" instrument_node="">9</span></a><span data-dcnode-id="436" instrument_node=""> And it shall serve as a sign to you on your hand, and as a reminder on your forehead, that the law of the LORD may be in your mouth; for with a powerful hand the LORD brought you out of Egypt. </span><a class="versenumber" data-dcnode-id="434" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-10.html"><span data-dcnode-id="435" instrument_node="">10</span></a><span data-dcnode-id="433" instrument_node=""> Therefore, you shall keep this ordinance at its appointed time from year to year. </span></div><div class="bottomPadding" data-dcnode-id="410"><a class="versenumber" data-dcnode-id="430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-11.html"><span data-dcnode-id="431" instrument_node="">11</span></a><span data-dcnode-id="429" instrument_node=""> 'Now when the LORD brings you to the land of the Canaanite, as He swore to you and to your fathers, and gives it to you, </span><a class="versenumber" data-dcnode-id="427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-12.html"><span data-dcnode-id="428" instrument_node="">12</span></a><span data-dcnode-id="426" instrument_node=""> you shall devote to the LORD every firstborn of a womb, and every firstborn offspring of an animal that you own; the males belong to the LORD. </span><a class="versenumber" data-dcnode-id="424" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-13.html"><span data-dcnode-id="425" instrument_node="">13</span></a><span data-dcnode-id="423" instrument_node=""> But every firstborn of a donkey you shall redeem with a lamb, but if you do not redeem </span><i data-dcnode-id="421"><span data-dcnode-id="422" instrument_node="">it,</span></i><span data-dcnode-id="420" instrument_node=""> then you shall break its neck; and every firstborn among your sons you shall redeem. </span><a class="versenumber" data-dcnode-id="418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-14.html"><span data-dcnode-id="419" instrument_node="">14</span></a><span data-dcnode-id="417" instrument_node=""> And it shall be when your son asks you in time to come, saying, ‘What is this?’ then you shall say to him, ‘With a powerful hand the LORD brought us out of Egypt, from the house of slavery. </span><a class="versenumber" data-dcnode-id="415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-15.html"><span data-dcnode-id="416" instrument_node="">15</span></a><span data-dcnode-id="414" instrument_node=""> And it came about, when Pharaoh was stubborn about letting us go, that the LORD put to death every firstborn in the land of Egypt, from human firstborns to animal firstborns. Therefore, I sacrifice to the LORD the males, every firstborn of a womb, but every firstborn of my sons I redeem.’ </span><a class="versenumber" data-dcnode-id="412" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-16.html"><span data-dcnode-id="413" instrument_node="">16</span></a><span data-dcnode-id="411" instrument_node=""> So it shall serve as a sign on your hand and as phylacteries on your forehead, for with a powerful hand the LORD brought us out of Egypt.' </span></div><div class="bottomPadding" data-dcnode-id="391"><a class="versenumber" data-dcnode-id="408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-17.html"><span data-dcnode-id="409" instrument_node="">17</span></a><span data-dcnode-id="407" instrument_node=""> Now when Pharaoh had let the people go, God did not lead them by the way of the land of the Philistines, even though it was near; for God said, 'The people might change their minds when they see war, and return to Egypt.' </span><a class="versenumber" data-dcnode-id="405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-18.html"><span data-dcnode-id="406" instrument_node="">18</span></a><span data-dcnode-id="404" instrument_node=""> Therefore God led the people around by way of the wilderness to the Red Sea; and the sons of Israel went up in battle formation from the land of Egypt. </span><a class="versenumber" data-dcnode-id="402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-19.html"><span data-dcnode-id="403" instrument_node="">19</span></a><span data-dcnode-id="401" instrument_node=""> And Moses took the bones of Joseph with him, for he had made the sons of Israel solemnly swear, saying, 'God will certainly take care of you, and you shall carry my bones from here with you.' </span><a class="versenumber" data-dcnode-id="399" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-20.html"><span data-dcnode-id="400" instrument_node="">20</span></a><span data-dcnode-id="398" instrument_node=""> Then they set out from Succoth and camped in Etham, on the edge of the wilderness. </span><a class="versenumber" data-dcnode-id="396" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-21.html"><span data-dcnode-id="397" instrument_node="">21</span></a><span data-dcnode-id="395" instrument_node=""> And the LORD was going before them in a pillar of cloud by day to lead them on the way, and in a pillar of fire by night to give them light, so that they might travel by day and by night. </span><a class="versenumber" data-dcnode-id="393" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-22.html"><span data-dcnode-id="394" instrument_node="">22</span></a><span data-dcnode-id="392" instrument_node=""> He did not take away the pillar of cloud by day, nor the pillar of fire by night, from the presence of the people. </span></div></div><div class="nlt box" data-dcnode-id="311" style="display: none;"><b data-dcnode-id="388"><span data-dcnode-id="389" instrument_node="">New Living Translation</span></b><br data-dcnode-id="387"><br data-dcnode-id="386"><div class="bottomPadding" data-dcnode-id="379"><a class="versenumber" data-dcnode-id="384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-1.html"><span data-dcnode-id="385" instrument_node="">1</span></a><span data-dcnode-id="383" instrument_node=""> Then the LORD said to Moses, </span><a class="versenumber" data-dcnode-id="381" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-2.html"><span data-dcnode-id="382" instrument_node="">2</span></a><span data-dcnode-id="380" instrument_node=""> 'Dedicate to me every firstborn among the Israelites. The first offspring to be born, of both humans and animals, belongs to me.' </span></div><div class="bottomPadding" data-dcnode-id="363"><a class="versenumber" data-dcnode-id="377" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-3.html"><span data-dcnode-id="378" instrument_node="">3</span></a><span data-dcnode-id="376" instrument_node=""> So Moses said to the people, 'This is a day to remember forever--the day you left Egypt, the place of your slavery. Today the LORD has brought you out by the power of his mighty hand. (Remember, eat no food containing yeast.) </span><a class="versenumber" data-dcnode-id="374" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-4.html"><span data-dcnode-id="375" instrument_node="">4</span></a><span data-dcnode-id="373" instrument_node=""> On this day in early spring, in the month of Abib, you have been set free. </span><a class="versenumber" data-dcnode-id="371" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-5.html"><span data-dcnode-id="372" instrument_node="">5</span></a><span data-dcnode-id="370" instrument_node=""> You must celebrate this event in this month each year after the LORD brings you into the land of the Canaanites, Hittites, Amorites, Hivites, and Jebusites. (He swore to your ancestors that he would give you this land--a land flowing with milk and honey.) </span><a class="versenumber" data-dcnode-id="368" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-6.html"><span data-dcnode-id="369" instrument_node="">6</span></a><span data-dcnode-id="367" instrument_node=""> For seven days the bread you eat must be made without yeast. Then on the seventh day, celebrate a feast to the LORD. </span><a class="versenumber" data-dcnode-id="365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-7.html"><span data-dcnode-id="366" instrument_node="">7</span></a><span data-dcnode-id="364" instrument_node=""> Eat bread without yeast during those seven days. In fact, there must be no yeast bread or any yeast at all found within the borders of your land during this time. </span></div><div class="bottomPadding" data-dcnode-id="353"><a class="versenumber" data-dcnode-id="361" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-8.html"><span data-dcnode-id="362" instrument_node="">8</span></a><span data-dcnode-id="360" instrument_node=""> 'On the seventh day you must explain to your children, 'I am celebrating what the LORD did for me when I left Egypt.' </span><a class="versenumber" data-dcnode-id="358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-9.html"><span data-dcnode-id="359" instrument_node="">9</span></a><span data-dcnode-id="357" instrument_node=""> This annual festival will be a visible sign to you, like a mark branded on your hand or your forehead. Let it remind you always to recite this teaching of the LORD: 'With a strong hand, the LORD rescued you from Egypt.' </span><a class="versenumber" data-dcnode-id="355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-10.html"><span data-dcnode-id="356" instrument_node="">10</span></a><span data-dcnode-id="354" instrument_node=""> So observe the decree of this festival at the appointed time each year. </span></div><div class="bottomPadding" data-dcnode-id="343"><a class="versenumber" data-dcnode-id="351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-11.html"><span data-dcnode-id="352" instrument_node="">11</span></a><span data-dcnode-id="350" instrument_node=""> 'This is what you must do when the LORD fulfills the promise he swore to you and to your ancestors. When he gives you the land where the Canaanites now live, </span><a class="versenumber" data-dcnode-id="348" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-12.html"><span data-dcnode-id="349" instrument_node="">12</span></a><span data-dcnode-id="347" instrument_node=""> you must present all firstborn sons and firstborn male animals to the LORD, for they belong to him. </span><a class="versenumber" data-dcnode-id="345" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-13.html"><span data-dcnode-id="346" instrument_node="">13</span></a><span data-dcnode-id="344" instrument_node=""> A firstborn donkey may be bought back from the LORD by presenting a lamb or young goat in its place. But if you do not buy it back, you must break its neck. However, you must buy back every firstborn son. </span></div><div class="bottomPadding" data-dcnode-id="333"><a class="versenumber" data-dcnode-id="341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-14.html"><span data-dcnode-id="342" instrument_node="">14</span></a><span data-dcnode-id="340" instrument_node=""> 'And in the future, your children will ask you, 'What does all this mean?' Then you will tell them, 'With the power of his mighty hand, the LORD brought us out of Egypt, the place of our slavery. </span><a class="versenumber" data-dcnode-id="338" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-15.html"><span data-dcnode-id="339" instrument_node="">15</span></a><span data-dcnode-id="337" instrument_node=""> Pharaoh stubbornly refused to let us go, so the LORD killed all the firstborn males throughout the land of Egypt, both people and animals. That is why I now sacrifice all the firstborn males to the LORD--except that the firstborn sons are always bought back.' </span><a class="versenumber" data-dcnode-id="335" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-16.html"><span data-dcnode-id="336" instrument_node="">16</span></a><span data-dcnode-id="334" instrument_node=""> This ceremony will be like a mark branded on your hand or your forehead. It is a reminder that the power of the LORD's mighty hand brought us out of Egypt.' </span></div><div class="bottomPadding" data-dcnode-id="326"><a class="versenumber" data-dcnode-id="331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-17.html"><span data-dcnode-id="332" instrument_node="">17</span></a><span data-dcnode-id="330" instrument_node=""> When Pharaoh finally let the people go, God did not lead them along the main road that runs through Philistine territory, even though that was the shortest route to the Promised Land. God said, 'If the people are faced with a battle, they might change their minds and return to Egypt.' </span><a class="versenumber" data-dcnode-id="328" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-18.html"><span data-dcnode-id="329" instrument_node="">18</span></a><span data-dcnode-id="327" instrument_node=""> So God led them in a roundabout way through the wilderness toward the Red Sea. Thus the Israelites left Egypt like an army ready for battle. </span></div><div class="bottomPadding" data-dcnode-id="322"><a class="versenumber" data-dcnode-id="324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-19.html"><span data-dcnode-id="325" instrument_node="">19</span></a><span data-dcnode-id="323" instrument_node=""> Moses took the bones of Joseph with him, for Joseph had made the sons of Israel swear to do this. He said, 'God will certainly come to help you. When he does, you must take my bones with you from this place.' </span></div><div class="bottomPadding" data-dcnode-id="312"><a class="versenumber" data-dcnode-id="320" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-20.html"><span data-dcnode-id="321" instrument_node="">20</span></a><span data-dcnode-id="319" instrument_node=""> The Israelites left Succoth and camped at Etham on the edge of the wilderness. </span><a class="versenumber" data-dcnode-id="317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-21.html"><span data-dcnode-id="318" instrument_node="">21</span></a><span data-dcnode-id="316" instrument_node=""> The LORD went ahead of them. He guided them during the day with a pillar of cloud, and he provided light at night with a pillar of fire. This allowed them to travel by day or by night. </span><a class="versenumber" data-dcnode-id="314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-22.html"><span data-dcnode-id="315" instrument_node="">22</span></a><span data-dcnode-id="313" instrument_node=""> And the LORD did not remove the pillar of cloud or pillar of fire from its place in front of the people. </span></div></div><div class="csb box" data-dcnode-id="233" style="display: none;"><b data-dcnode-id="309"><span data-dcnode-id="310" instrument_node="">Christian Standard Bible</span></b><br data-dcnode-id="308"><br data-dcnode-id="307"><div class="bottomPadding" data-dcnode-id="300"><a class="versenumber" data-dcnode-id="305" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-1.html"><span data-dcnode-id="306" instrument_node="">1</span></a><span data-dcnode-id="304" instrument_node=""> The Lord spoke to Moses: </span><a class="versenumber" data-dcnode-id="302" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-2.html"><span data-dcnode-id="303" instrument_node="">2</span></a><span data-dcnode-id="301" instrument_node=""> "Consecrate every firstborn male to me, the firstborn from every womb among the Israelites, both man and domestic animal; it is mine." </span></div><div class="bottomPadding" data-dcnode-id="275"><a class="versenumber" data-dcnode-id="298" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-3.html"><span data-dcnode-id="299" instrument_node="">3</span></a><span data-dcnode-id="297" instrument_node=""> Then Moses said to the people, "Remember this day when you came out of Egypt, out of the place of slavery, for the Lord brought you out of here by the strength of his hand. Nothing leavened may be eaten. </span><a class="versenumber" data-dcnode-id="295" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-4.html"><span data-dcnode-id="296" instrument_node="">4</span></a><span data-dcnode-id="294" instrument_node=""> Today, in the month of Abib, you are going out. </span><a class="versenumber" data-dcnode-id="292" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-5.html"><span data-dcnode-id="293" instrument_node="">5</span></a><span data-dcnode-id="291" instrument_node=""> When the Lord brings you into the land of the Canaanites, Hethites, Amorites, Hivites, and Jebusites, which he swore to your ancestors that he would give you, a land flowing with milk and honey, you must carry out this ceremony in this month. </span><a class="versenumber" data-dcnode-id="289" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-6.html"><span data-dcnode-id="290" instrument_node="">6</span></a><span data-dcnode-id="288" instrument_node=""> For seven days you must eat unleavened bread, and on the seventh day there is to be a festival to the Lord. </span><a class="versenumber" data-dcnode-id="286" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-7.html"><span data-dcnode-id="287" instrument_node="">7</span></a><span data-dcnode-id="285" instrument_node=""> Unleavened bread is to be eaten for those seven days. Nothing leavened may be found among you, and no yeast may be found among you in all your territory. </span><a class="versenumber" data-dcnode-id="283" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-8.html"><span data-dcnode-id="284" instrument_node="">8</span></a><span data-dcnode-id="282" instrument_node=""> On that day explain to your son, 'This is because of what the Lord did for me when I came out of Egypt.' </span><a class="versenumber" data-dcnode-id="280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-9.html"><span data-dcnode-id="281" instrument_node="">9</span></a><span data-dcnode-id="279" instrument_node=""> Let it serve as a sign for you on your hand and as a reminder on your forehead, so that the Lord's instruction may be in your mouth; for the Lord brought you out of Egypt with a strong hand. </span><a class="versenumber" data-dcnode-id="277" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-10.html"><span data-dcnode-id="278" instrument_node="">10</span></a><span data-dcnode-id="276" instrument_node=""> Keep this statute at its appointed time from year to year. </span></div><div class="bottomPadding" data-dcnode-id="265"><a class="versenumber" data-dcnode-id="273" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-11.html"><span data-dcnode-id="274" instrument_node="">11</span></a><span data-dcnode-id="272" instrument_node=""> "When the Lord brings you into the land of the Canaanites, as he swore to you and your ancestors, and gives it to you, </span><a class="versenumber" data-dcnode-id="270" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-12.html"><span data-dcnode-id="271" instrument_node="">12</span></a><span data-dcnode-id="269" instrument_node=""> you are to present to the Lord every firstborn male of the womb. All firstborn offspring of the livestock you own that are males will be the Lord's. </span><a class="versenumber" data-dcnode-id="267" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-13.html"><span data-dcnode-id="268" instrument_node="">13</span></a><span data-dcnode-id="266" instrument_node=""> You must redeem every firstborn of a donkey with a flock animal, but if you do not redeem it, break its neck. However, you must redeem every firstborn among your sons. </span></div><div class="bottomPadding" data-dcnode-id="255"><a class="versenumber" data-dcnode-id="263" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-14.html"><span data-dcnode-id="264" instrument_node="">14</span></a><span data-dcnode-id="262" instrument_node=""> "In the future, when your son asks you, 'What does this mean? ' say to him, 'By the strength of his hand the Lord brought us out of Egypt, out of the place of slavery. </span><a class="versenumber" data-dcnode-id="260" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-15.html"><span data-dcnode-id="261" instrument_node="">15</span></a><span data-dcnode-id="259" instrument_node=""> When Pharaoh stubbornly refused to let us go, the Lord killed every firstborn male in the land of Egypt, both the firstborn of humans and the firstborn of livestock. That is why I sacrifice to the Lord all the firstborn of the womb that are males, but I redeem all the firstborn of my sons.' </span><a class="versenumber" data-dcnode-id="257" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-16.html"><span data-dcnode-id="258" instrument_node="">16</span></a><span data-dcnode-id="256" instrument_node=""> So let it be a sign on your hand and a symbol on your forehead, for the Lord brought us out of Egypt by the strength of his hand." </span></div><div class="bottomPadding" data-dcnode-id="248"><a class="versenumber" data-dcnode-id="253" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-17.html"><span data-dcnode-id="254" instrument_node="">17</span></a><span data-dcnode-id="252" instrument_node=""> When Pharaoh let the people go, God did not lead them along the road to the land of the Philistines, even though it was nearby; for God said, "The people will change their minds and return to Egypt if they face war." </span><a class="versenumber" data-dcnode-id="250" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-18.html"><span data-dcnode-id="251" instrument_node="">18</span></a><span data-dcnode-id="249" instrument_node=""> So he led the people around toward the Red Sea along the road of the wilderness. And the Israelites left the land of Egypt in battle formation. </span></div><div class="bottomPadding" data-dcnode-id="244"><a class="versenumber" data-dcnode-id="246" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-19.html"><span data-dcnode-id="247" instrument_node="">19</span></a><span data-dcnode-id="245" instrument_node=""> Moses took the bones of Joseph with him, because Joseph had made the Israelites swear a solemn oath, saying, "God will certainly come to your aid; then you must take my bones with you from this place." </span></div><div class="bottomPadding" data-dcnode-id="234"><a class="versenumber" data-dcnode-id="242" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-20.html"><span data-dcnode-id="243" instrument_node="">20</span></a><span data-dcnode-id="241" instrument_node=""> They set out from Succoth and camped at Etham on the edge of the wilderness. </span><a class="versenumber" data-dcnode-id="239" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-21.html"><span data-dcnode-id="240" instrument_node="">21</span></a><span data-dcnode-id="238" instrument_node=""> The Lord went ahead of them in a pillar of cloud to lead them on their way during the day and in a pillar of fire to give them light at night, so that they could travel day or night. </span><a class="versenumber" data-dcnode-id="236" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bibleref.com/Exodus/13/Exodus-13-22.html"><span data-dcnode-id="237" instrument_node="">22</span></a><span data-dcnode-id="235" instrument_node=""> The pillar of cloud by day and the pillar of fire by night never left its place in front of the people. </span></div></div></div><span data-dcnode-id="231" instrument_node="">
</span><div class="rightrail desktop-show" data-dcnode-id="224"><span data-dcnode-id="230" instrument_node="">
</span><div class="adManager-placeholder" data-dcnode-id="226" style="height: 600px"><div class="adManager-content adManager-content-image" data-dcnode-id="227"><a data-dcnode-id="228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gotquestions.net/admin/BackendSubmit/AdClick%3FLID%3D1%26ADID%3D3" onclick="gtag('event', 'click', {'event_category':'engagement', 'event_label':'advertisement'});" target="_blank"><img data-dcnode-id="229" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gotquestions.org/img/ads/DTS-LYF-160x600.jpg&amp;raw"></a></div></div><span data-dcnode-id="225" instrument_node="">
</span></div><span data-dcnode-id="223" instrument_node="">
