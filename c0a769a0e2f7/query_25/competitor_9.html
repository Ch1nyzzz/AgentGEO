</span><h1 data-dcnode-id="716"><span data-dcnode-id="723" instrument_node="">
</span><a data-dcnode-id="721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailyverse.knowing-jesus.com/exodus-20-1" style="font-size:.8em"><span data-dcnode-id="722" instrument_node="">◄ </span></a><span data-dcnode-id="720" instrument_node="">What Does Exodus 20:2 Mean?</span><a data-dcnode-id="718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailyverse.knowing-jesus.com/exodus-20-3" style="font-size:.8em"><span data-dcnode-id="719" instrument_node=""> ►</span></a><span data-dcnode-id="717" instrument_node=""> </span></h1><span data-dcnode-id="715" instrument_node="">
</span><div class="q-text" data-dcnode-id="443"><span data-dcnode-id="714" instrument_node="">
</span><blockquote class="h-center" data-dcnode-id="706"><span data-dcnode-id="713" instrument_node="">
</span><p data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">"I am the LORD your God, who brought you out of the land of Egypt, out of the house of slavery.</span></p><span data-dcnode-id="710" instrument_node="">
</span><div class="verse-num" data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">Exodus 20:2(NASB)            </span></div><span data-dcnode-id="707" instrument_node="">
</span></blockquote><span data-dcnode-id="705" instrument_node="">
</span><div class="picture-wrap" data-dcnode-id="699"><a data-dcnode-id="700" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.knowing-jesus.com/i/exodus-20-2-the-lord-your-god--out-of-egypt-aqua-5594"><div data-dcnode-id="701" style="position: relative;width: 100%;padding-top: 75%;"><picture data-dcnode-id="702"><source data-dcnode-id="704" srcset="https://dailyverse.knowing-jesus.com/webp/dv_700/dailyverse-images/81/Exodus+20-2+The+Lord+Your+God++Out+Of+Egypt+aqua.webp" type="image/webp"><img alt="" class="cls_img" data-dcnode-id="703" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailyverse.knowing-jesus.com/w/dv_700/dailyverse-images/81/Exodus%252020-2%2520The%2520Lord%2520Your%2520God%2520%2520Out%2520Of%2520Egypt%2520aqua.jpg&amp;raw" style="aspect-ratio: 1.333;position: absolute;top: 0;left:0;width: 100%;"></picture></div></a></div><div class="picture-courtesy" data-dcnode-id="695"><span data-dcnode-id="698" instrument_node="">Picture courtesy of </span><a data-dcnode-id="696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3A1867_Edward_Poynter_-_Israel_in_Egypt.jpg"><span data-dcnode-id="697" instrument_node="">Wikemedia</span></a></div><div class="text-center" data-dcnode-id="691"><span data-dcnode-id="694" instrument_node="">
</span><span data-dcnode-id="692" instrument_node="">
</span></div><span data-dcnode-id="690" instrument_node="">
</span><h2 data-dcnode-id="688"><span data-dcnode-id="689" instrument_node="">Verse Thoughts</span></h2><div class="text-center" data-dcnode-id="684"><span data-dcnode-id="687" instrument_node="">
</span><span data-dcnode-id="685" instrument_node="">
</span></div><span data-dcnode-id="683" instrument_node="">
</span><div data-dcnode-id="666"><p data-dcnode-id="675" style="text-align:justify;"><span data-dcnode-id="682" instrument_node="">Israel&nbsp;were given&nbsp;a total of&nbsp;613 commandments, and the first 10&nbsp;are generally referred to as 'The Moral Law' or 'The Ten Commandments'. However, before God started to&nbsp;lay out the conditions of His covenant with Israel and list the righteous requirements of the Law, He reminded His chosen people, </span><em data-dcnode-id="680"><span data-dcnode-id="681" instrument_node="">"I am the Lord your God, Who brought you out of the land of Egypt. </span></em><em data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">I am the Lord your God, Who brought you</span></em><em data-dcnode-id="676"><span data-dcnode-id="677" instrument_node=""> out of the house of slavery."</span></em></p><span data-dcnode-id="674" instrument_node="">
</span><p data-dcnode-id="672" style="text-align:justify;"><span data-dcnode-id="673" instrument_node="">The Lord reminded Israel that He had selected them out of the sea of humanity to be His&nbsp;chosen people, and in His introductory statement, He reminded them of the privileged position they had among the nations. He reminded them that&nbsp;HE had redeemed them from four hundred years of Egyptian enslavement. He was the Lord their God, and they were to have no other god before Him for THEY were His chosen people.</span></p><span data-dcnode-id="671" instrument_node="">
</span><p data-dcnode-id="667" style="text-align:justify;"><span data-dcnode-id="670" instrument_node="">Because Israel believed God's Word and obeyed His instructions on that first Passover night in the land of Egypt, God brought them out of bondage to be His special people, and clearly laid out the conditions of His covenant, which began with 10 moral laws. In Chapter 24, we read that Moses took the Book of the Covenant, with all its rules and regulations, and read it aloud to the people... and they said with one accord, </span><em data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">"Everything that the Lord has said we will do, and we will be obedient."</span></em></p></div><div class="text-center" data-dcnode-id="660"><span data-dcnode-id="665" instrument_node="">
</span><span data-dcnode-id="663" instrument_node="">
</span><div class="adthrive-custom-player" data-dcnode-id="662"></div><span data-dcnode-id="661" instrument_node="">
</span></div><span data-dcnode-id="659" instrument_node="">
</span><div data-dcnode-id="614"><span data-dcnode-id="658" instrument_node="">
</span><p data-dcnode-id="656" style="text-align:justify;"><span data-dcnode-id="657" instrument_node="">God wanted His people to know that HE alone is the almighty God and that HE alone created the heavens, the earth, and all that is in it. He wanted His people to draw close to HIM. They were never to forget what HE had done for them, by bringing them out of the land of Egypt and releasing them from their yoke of slavery and oppression. God wanted His people to know HIM, to love Him, to trust Him, and to obey Him, because God had a unique plan and a special purpose for them.</span></p><span data-dcnode-id="655" instrument_node="">
</span><p data-dcnode-id="653" style="text-align:justify;"><span data-dcnode-id="654" instrument_node="">God wanted to teach Israel some important concepts of Who He is, before He presented them with His covenant. He wanted Israel to learn about His essential nature, His righteous character, and His never-failing faithfulness. He wanted them to know Him as a personal God Who cares for them, protects them, rescues them, and provides for their needs. He wanted them to understand that He alone is the Holy One of Israel Who is full of goodness and grace. They needed to know that the Lord was&nbsp;very different from the false gods their pagan neighbours worshipped - gods that neither see, nor hear, nor understand.</span></p><span data-dcnode-id="652" instrument_node="">
</span><p data-dcnode-id="642" style="text-align:justify;"><span data-dcnode-id="651" instrument_node="">The Lord had a very special plan for Israel - a unique purpose. They were to be the nation through whom the Saviour of the world would be born. They were to be 'the people of God' who would be His witnesses throughout the world. They were to be a light to lighten the Gentiles. They were to be a principled people with godly values and exemplary behaviour. They were to teach their pagan neighbours about the God of their fathers and bring them into the camp of Israel so they could also worship the Lord. They were to be used to circumnavigate Satan's evil plan by proclaiming the gospel of God, which is why He opened His address with this important reminder, </span><em data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">"</span></em><em data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">I am the Lord your God, Who brought you out of the land of Egypt. </span></em><em data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">I am the Lord your God, Who brought you</span></em><em data-dcnode-id="643"><span data-dcnode-id="644" instrument_node=""> out of the house of slavery."</span></em></p><span data-dcnode-id="641" instrument_node="">
</span><p data-dcnode-id="639" style="text-align:justify;"><span data-dcnode-id="640" instrument_node="">Today, in this Church age, there is a tendency to intermingle sections of the Mosaic Law, which were given uniquely to Israel, with the law of the spirit of life in Christ Jesus, which was given specifically to the Church. While there are some overlapping principles and practices, it is clear that&nbsp;God's purpose for Israel is very&nbsp;different from His plans for the Church. The instructions God gave to Israel are not the same as those given to Christians. Sadly, there are some that refuse to see the distinction between God's principles, practices, purposes, and plans for Israel and those He has for the Church.&nbsp;</span></p><span data-dcnode-id="638" instrument_node="">
</span><p data-dcnode-id="636" style="text-align:justify;"><span data-dcnode-id="637" instrument_node="">God's covenant with Israel is not transferable from Israel to the Church. Israel were told that if they kept the terms of their covenant, they would gain His blessings. They had to obey specific regulations and rites and take part in certain sacrifices and rituals to be blessed by God. If Israel, as a nation, kept their covenant, walked in His ways, and obeyed His commands, they would be His people and He would be their God Who would fight for them, provide for them, protect them, and bless them. However, they were warned that if Israel, as a nation, disobeyed God's Law, they would be severely punished.</span></p><span data-dcnode-id="635" instrument_node="">
</span><p data-dcnode-id="633" style="text-align:justify;"><span data-dcnode-id="634" instrument_node="">The people of Israel were saved in exactly the same way that Christians are saved today - by grace, through faith in God's Word. We are all saved by believing God's Word - by trusting in His promised Messiah. However, keeping the Law could not save Israel. Like you and me, they were redeemed through faith. Righteousness&nbsp;was reckoned to them because of their FAITH, not through a strict adherence to the Law. Both Israel and the Church&nbsp;are saved through faith - not by keeping the Law. The Law was designed, by God, to teach Israel that they were sinners in need of a Saviour. The Law was a schoolmaster to point them to Christ. The Law was to expose their sin so that&nbsp;they would believe God's Word and look for their promised Messiah and coming King.</span></p><span data-dcnode-id="632" instrument_node="">
</span><p data-dcnode-id="624" style="text-align:justify;"><span data-dcnode-id="631" instrument_node="">If Israel were to be&nbsp;</span><strong data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">blessed</span></strong><span data-dcnode-id="628" instrument_node="">&nbsp;by God, they were to keep His Law. But like Abraham, Isaac, and Jacob, they&nbsp;were&nbsp;</span><strong data-dcnode-id="626"><span data-dcnode-id="627" instrument_node="">justified</span></strong><span data-dcnode-id="625" instrument_node=""> by believing God's Word. Abraham believed God's Word,&nbsp;and it&nbsp;was credited to him as righteousness, and the people of Israel&nbsp;were also credited with righteousness when they believed God's Word.</span></p><span data-dcnode-id="623" instrument_node="">
</span><p data-dcnode-id="618" style="text-align:justify;"><span data-dcnode-id="622" instrument_node="">Israel was to be a NATION under God. They were to be a NATION who trusted God. They were to be a NATION who walked in His ways and kept His commandments as an example to the surrounding Gentile nations. And the Lord knew that the best way for Israel to walk in His ways and keep His commands, was to witness to the world of His goodness and His grace. If Israel told the world of the promised Messiah it would help them to&nbsp;REMEMBER WHO God is and NEVER FORGET WHAT He has done for them. </span><em data-dcnode-id="619"><span data-dcnode-id="621" instrument_node="">"I am the LORD your God, who brought you out of the land of Egypt, out of the house of slavery."</span><br data-dcnode-id="620"></em></p><span data-dcnode-id="617" instrument_node="">
</span><p data-dcnode-id="615" style="text-align:justify;"><span data-dcnode-id="616" instrument_node="">Christians, in this dispensation of grace, should learn whatever lessons God has to teach us from Israel's experience. We should learn what God wants to teach us we should be careful not to repeat Israel's mistakes. We should REMEMBER WHO God is. We should NEVER FORGET WHAT He has done for us. We should heed His Word and be ready to tell others of the hope that we have in Him.</span></p></div><h2 data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">My Prayer</span></h2><div data-dcnode-id="609"><p data-dcnode-id="610" style="text-align:justify;"><span data-dcnode-id="611" instrument_node="">Heavenly Father, thank You for Your Word and the truths and encouragement that it contains. I see that You were faithful to Israel, despite their many failings, and rejoice to know that You will remain faithful to all who are called by Your name in this Church dispensation. I pray that You would use me in these dark and difficult times, when the world seems to be spiralling out of control, and may I never forget that You are a faithful God Who keeps His promises to a thousand generations. Thank You in Jesus' name, AMEN.</span></p></div><div class="text-center" data-dcnode-id="605"><span data-dcnode-id="608" instrument_node="">
