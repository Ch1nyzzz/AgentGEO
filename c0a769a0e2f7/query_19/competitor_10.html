</span><div class="label gradient-to-tr" data-dcnode-id="333" style="--color-start: #96445a; --color-end: #6f637e;"><span data-dcnode-id="334" instrument_node="">Question</span></div><span data-dcnode-id="332" instrument_node="">
</span><div class="sponsor-sidebar" data-dcnode-id="327"><div align="center" class="desktop-show" data-dcnode-id="328"><div class="adManager-placeholder" data-dcnode-id="329"><div class="adManager-content adManager-content-iframe" data-dcnode-id="330"><iframe data-dcnode-id="331" frameborder="0" height="600" id="adManagerIframe" marginheight="0" marginwidth="0" scrolling="no" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//banners.compassion.com/banners/birthday-search/frame-160x600V2.php%3Freferer%3D633526%26utm_source%3Dgotquestions%26utm_medium%3Daffiliate&amp;raw" style="border: 0px; vertical-align: bottom;" title="3rd party ad content" width="160"></iframe></div></div></div></div><span data-dcnode-id="326" instrument_node="">
</span><h1 data-dcnode-id="323"><span data-dcnode-id="324" itemprop="name headline" property="og:title"><span data-dcnode-id="325" instrument_node="">What is the difference between the ceremonial law, the moral law, and the judicial law in the Old Testament?</span></span></h1><span data-dcnode-id="322" instrument_node="">
</span><div class="actions-wrap" data-dcnode-id="314"><div class="actions" data-dcnode-id="315"><a data-dcnode-id="320" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//printer.gotquestions.net/GeneratePF%3FarticleId%3D2763" onclick="gtag('event', 'click', {'event_category':'engagement', 'event_label':'print'});" rel="noopener" target="_blank"><img alt="ceremonial law" class="questionInteract" data-dcnode-id="321" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gotquestions.org/img/print.svg&amp;raw"></a><span class="audio-icon" data-dcnode-id="316"><img alt="audio" class="questionInteract" data-dcnode-id="319" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gotquestions.org/img/volume.svg&amp;raw"><audio controls="" data-dcnode-id="317" preload="none" style="width:300px;height:25px"><source data-dcnode-id="318" src="https://www.gotquestions.org/audio/ceremonial-law.mp3" type="audio/mpeg"></audio></span></div></div><span data-dcnode-id="313" instrument_node="">
</span><div data-dcnode-id="213" itemprop="articleBody"><span data-dcnode-id="312" instrument_node="">
</span><div class="label gradient-to-tr" data-dcnode-id="310" style="--color-start: #29a699; --color-end: #749c5a;"><span data-dcnode-id="311" instrument_node="">Answer</span></div><br data-dcnode-id="309"><br data-dcnode-id="308"><span data-dcnode-id="307" instrument_node="">
The law of God given to Moses is a comprehensive set of guidelines to ensure that the Israelites' behavior reflected their status as God’s chosen people. It encompasses moral behavior, their position as a godly example to other nations, and systematic procedures for acknowledging God’s holiness and mankind’s sinfulness. In an attempt to better understand the purpose of these laws, Jews and Christians categorize them. This has led to the distinction between moral law, ceremonial law, and judicial law.</span><br data-dcnode-id="306"><br data-dcnode-id="305"><span data-dcnode-id="304" instrument_node="">
</span><b data-dcnode-id="302"><span data-dcnode-id="303" instrument_node="">Moral Law</span></b><br data-dcnode-id="301"><span data-dcnode-id="300" instrument_node="">
The moral laws, or </span><i data-dcnode-id="298"><span data-dcnode-id="299" instrument_node="">mishpatim</span></i><span data-dcnode-id="297" instrument_node="">, relate to justice and judgment and are often translated as "ordinances." </span><i data-dcnode-id="295"><span data-dcnode-id="296" instrument_node="">Mishpatim</span></i><span data-dcnode-id="294" instrument_node=""> are said to be based on God’s holy nature. As such, the ordinances are holy, just, and unchanging. Their purpose is to promote the welfare of those who obey. The value of the laws is considered obvious by reason and common sense. The moral law encompasses regulations on justice, respect, and sexual conduct, and includes the Ten Commandments. It also includes penalties for failure to obey the ordinances. Moral law does not point people to Christ; it merely illuminates the fallen state of all mankind.</span><br data-dcnode-id="293"><br data-dcnode-id="292"><span data-dcnode-id="291" instrument_node="">
Modern Protestants are divided over the applicability of </span><i data-dcnode-id="289"><span data-dcnode-id="290" instrument_node="">mishpatim</span></i><span data-dcnode-id="288" instrument_node=""> in the church age. Some believe that Jesus’ assertion that the law will remain in effect until the earth passes away (</span><a class="rtBibleRef" data-dcnode-id="286" data-purpose="bible-reference" data-reference="Matt 5.18" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/esv/Matt%25205.18" rel="noopener" target="_blank"><span data-dcnode-id="287" instrument_node="">Matthew 5:18</span></a><span data-dcnode-id="285" instrument_node="">) means that believers are still bound to it. Others, however, understand that Jesus fulfilled this requirement (</span><a class="rtBibleRef" data-dcnode-id="283" data-purpose="bible-reference" data-reference="Matt 5.17" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/esv/Matt%25205.17" rel="noopener" target="_blank"><span data-dcnode-id="284" instrument_node="">Matthew 5:17</span></a><span data-dcnode-id="282" instrument_node="">), and that we are instead under the law of Christ (</span><a class="rtBibleRef" data-dcnode-id="280" data-purpose="bible-reference" data-reference="Gal 6.2" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/esv/Gal%25206.2" rel="noopener" target="_blank"><span data-dcnode-id="281" instrument_node="">Galatians 6:2</span></a><span data-dcnode-id="279" instrument_node="">), which is thought to be "love God and love others" (</span><a class="rtBibleRef" data-dcnode-id="277" data-purpose="bible-reference" data-reference="Matt 22.36-40" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/esv/Matt%252022.36-40" rel="noopener" target="_blank"><span data-dcnode-id="278" instrument_node="">Matthew 22:36-40</span></a><span data-dcnode-id="276" instrument_node="">). Although many of the moral laws in the Old Testament give excellent examples as to how to love God and love others, and freedom from the law is not license to sin (</span><a class="rtBibleRef" data-dcnode-id="274" data-purpose="bible-reference" data-reference="Rom 6.15" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/esv/Rom%25206.15" rel="noopener" target="_blank"><span data-dcnode-id="275" instrument_node="">Romans 6:15</span></a><span data-dcnode-id="273" instrument_node="">), we are not specifically bound by </span><i data-dcnode-id="271"><span data-dcnode-id="272" instrument_node="">mishpatim</span></i><span data-dcnode-id="270" instrument_node="">.</span><br data-dcnode-id="269"><br data-dcnode-id="268"><span data-dcnode-id="267" instrument_node="">
</span><b data-dcnode-id="265"><span data-dcnode-id="266" instrument_node="">Ceremonial Law</span></b><br data-dcnode-id="264"><span data-dcnode-id="263" instrument_node="">
The ceremonial laws are called </span><i data-dcnode-id="261"><span data-dcnode-id="262" instrument_node="">hukkim</span></i><span data-dcnode-id="260" instrument_node=""> or </span><i data-dcnode-id="258"><span data-dcnode-id="259" instrument_node="">chuqqah</span></i><span data-dcnode-id="257" instrument_node=""> in Hebrew, which literally means “custom of the nation”; the words are often translated as “statutes.” These laws seem to focus the adherent’s attention on God. They include instructions on regaining right standing with God (e.g., sacrifices and other ceremonies regarding “uncleanness”), remembrances of God’s work in Israel (e.g., feasts and festivals), specific regulations meant to distinguish Israelites from their pagan neighbors (e.g., dietary and clothing restrictions), and signs that point to the coming Messiah (e.g., the Sabbath, circumcision, Passover, and the redemption of the firstborn). Some Jews believe that the ceremonial law is not fixed. They hold that, as societies evolve, so do God’s expectations of how His followers should relate to Him. This view is not indicated in the Bible.</span><br data-dcnode-id="256"><br data-dcnode-id="255"><span data-dcnode-id="254" instrument_node="">
Christians are not bound by ceremonial law. Since the church is not the nation of Israel, memorial festivals, such as the Feast of Weeks and Passover, do not apply. </span><a class="rtBibleRef" data-dcnode-id="252" data-purpose="bible-reference" data-reference="Gal 3.23-25" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/esv/Gal%25203.23-25" rel="noopener" target="_blank"><span data-dcnode-id="253" instrument_node="">Galatians 3:23-25</span></a><span data-dcnode-id="251" instrument_node=""> explains that since Jesus has come, Christians are not required to sacrifice or circumcise. There is still debate in Protestant churches over the applicability of the Sabbath. Some say that its inclusion in the Ten Commandments gives it the weight of moral law. Others quote </span><a class="rtBibleRef" data-dcnode-id="249" data-purpose="bible-reference" data-reference="Col 2.16-17" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/esv/Col%25202.16-17" rel="noopener" target="_blank"><span data-dcnode-id="250" instrument_node="">Colossians 2:16-17</span></a><span data-dcnode-id="248" instrument_node=""> and </span><a class="rtBibleRef" data-dcnode-id="246" data-purpose="bible-reference" data-reference="Rom 14.5" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/esv/Rom%252014.5" rel="noopener" target="_blank"><span data-dcnode-id="247" instrument_node="">Romans 14:5</span></a><span data-dcnode-id="245" instrument_node=""> to explain that Jesus has fulfilled the Sabbath and become our Sabbath rest. As </span><a class="rtBibleRef" data-dcnode-id="243" data-purpose="bible-reference" data-reference="Rom 14.5" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/esv/Rom%252014.5" rel="noopener" target="_blank"><span data-dcnode-id="244" instrument_node="">Romans 14:5</span></a><span data-dcnode-id="242" instrument_node=""> says, "Each one should be fully convinced in his own mind." The applicability of the Old Testament law in the life of a Christian has always related to its usefulness in loving God and others. If someone feels observing the Sabbath aids him in this, he is free to observe it.</span><br data-dcnode-id="241"><br data-dcnode-id="240"><span data-dcnode-id="239" instrument_node="">
</span><b data-dcnode-id="237"><span data-dcnode-id="238" instrument_node="">Judicial/Civil Law</span></b><br data-dcnode-id="236"><span data-dcnode-id="235" instrument_node="">
The Westminster Confession adds the category of judicial or civil law. These laws were specifically given for the culture and place of the Israelites and encompass all of the moral law except the Ten Commandments. This includes everything from murder to restitution for a man gored by an ox and the responsibility of the man who dug a pit to rescue his neighbor’s trapped donkey (</span><a class="rtBibleRef" data-dcnode-id="233" data-purpose="bible-reference" data-reference="Exod 21.12-36" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/esv/Exod%252021.12-36" rel="noopener" target="_blank"><span data-dcnode-id="234" instrument_node="">Exodus 21:12-36</span></a><span data-dcnode-id="232" instrument_node="">). Since the Jews saw no difference between their God-ordained morality and their cultural responsibilities, this category is used by Christians far more than by Jewish scholars.</span><br data-dcnode-id="231"><br data-dcnode-id="230"><span data-dcnode-id="229" instrument_node="">
The division of the Jewish law into different categories is a human construct designed to better understand the nature of God and define which laws church-age Christians are still required to follow. Many believe the ceremonial law is not applicable, but we are bound by the Ten Commandments. </span><i data-dcnode-id="227"><span data-dcnode-id="228" instrument_node="">All</span></i><span data-dcnode-id="226" instrument_node=""> the law is useful for instruction (</span><a class="rtBibleRef" data-dcnode-id="224" data-purpose="bible-reference" data-reference="2 Tim 3.16" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/esv/2%2520Tim%25203.16" rel="noopener" target="_blank"><span data-dcnode-id="225" instrument_node="">2 Timothy 3:16</span></a><span data-dcnode-id="223" instrument_node="">), and nothing in the Bible indicates that God intended a distinction of categories. Christians are not under the law (</span><a class="rtBibleRef" data-dcnode-id="221" data-purpose="bible-reference" data-reference="Rom 10.4" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/esv/Rom%252010.4" rel="noopener" target="_blank"><span data-dcnode-id="222" instrument_node="">Romans 10:4</span></a><span data-dcnode-id="220" instrument_node="">). Jesus fulfilled the law, thus abolishing the difference between Jew and Gentile "so that in Himself He might make the two into one new man, thus establishing peace, and might reconcile them both in one body to God through the cross…" (</span><a class="rtBibleRef" data-dcnode-id="218" data-purpose="bible-reference" data-reference="Eph 2.15-16" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/esv/Eph%25202.15-16" rel="noopener" target="_blank"><span data-dcnode-id="219" instrument_node="">Ephesians 2:15-16</span></a><span data-dcnode-id="217" instrument_node="">).</span><br data-dcnode-id="216"><br data-dcnode-id="215"><span data-dcnode-id="214" instrument_node="">
</span></div><span data-dcnode-id="212" instrument_node="">
