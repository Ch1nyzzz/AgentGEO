</span><div class="sponsor-sidebar" data-dcnode-id="330"><div align="center" class="desktop-show" data-dcnode-id="331"><div class="adManager-placeholder" data-dcnode-id="332"><div class="adManager-content adManager-content-iframe" data-dcnode-id="333"><iframe data-dcnode-id="334" frameborder="0" height="600" id="adManagerIframe" marginheight="0" marginwidth="0" scrolling="no" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//banners.compassion.com/banners/birthday-search/frame-160x600V1.php%3Freferer%3D637671%26utm_source%3Dgotquestions%26utm_medium%3Daffiliate&amp;raw" style="border: 0px; vertical-align: bottom;" title="3rd party ad content" width="160"></iframe></div></div></div></div><span data-dcnode-id="329" instrument_node="">
</span><h1 data-dcnode-id="326"><span data-dcnode-id="327" itemprop="name headline" property="og:title"><span data-dcnode-id="328" instrument_node="">What is the difference between laws, commands, commandments, decrees, and statutes?</span></span></h1><span data-dcnode-id="325" instrument_node="">
</span><div class="actions-wrap" data-dcnode-id="317"><div class="actions" data-dcnode-id="318"><a data-dcnode-id="323" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//printer.gotquestions.net/GeneratePF%3FarticleId%3D6150" onclick="gtag('event', 'click', {'event_category':'engagement', 'event_label':'print'});" rel="noopener" target="_blank"><img alt="laws, commands, decrees, statutes" class="questionInteract" data-dcnode-id="324" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gotquestions.org/img/print.svg&amp;raw"></a><span class="audio-icon" data-dcnode-id="319"><img alt="audio" class="questionInteract" data-dcnode-id="322" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gotquestions.org/img/volume.svg&amp;raw"><audio controls="" data-dcnode-id="320" preload="none" style="width:300px;height:25px"><source data-dcnode-id="321" src="https://www.gotquestions.org/audio/laws-commands-decrees-statutes.mp3" type="audio/mpeg"></audio></span></div></div><span data-dcnode-id="316" instrument_node="">
</span><div data-dcnode-id="213" itemprop="articleBody"><span data-dcnode-id="315" instrument_node="">
</span><div class="label gradient-to-tr" data-dcnode-id="313" style="--color-start: #29a699; --color-end: #749c5a;"><span data-dcnode-id="314" instrument_node="">Answer</span></div><br data-dcnode-id="312"><br data-dcnode-id="311"><span data-dcnode-id="310" instrument_node="">
In </span><a class="rtBibleRef" data-dcnode-id="308" data-purpose="bible-reference" data-reference="Deut 6.1" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/esv/Deut%25206.1" rel="noopener" target="_blank"><span data-dcnode-id="309" instrument_node="">Deuteronomy 6:1</span></a><span data-dcnode-id="307" instrument_node="">-–3 we read of laws, commands, commandments, decrees, and statutes: “Now this is the </span><b data-dcnode-id="305"><span data-dcnode-id="306" instrument_node="">commandment</span></b><span data-dcnode-id="304" instrument_node="">—the </span><b data-dcnode-id="302"><span data-dcnode-id="303" instrument_node="">statutes</span></b><span data-dcnode-id="301" instrument_node=""> and the </span><b data-dcnode-id="299"><span data-dcnode-id="300" instrument_node="">rules</span></b><span data-dcnode-id="298" instrument_node="">—that the LORD your God commanded me to teach you” (HCSB, verse 1, emphasis added). Other translations use words like </span><i data-dcnode-id="296"><span data-dcnode-id="297" instrument_node="">decrees</span></i><span data-dcnode-id="295" instrument_node=""> or </span><i data-dcnode-id="293"><span data-dcnode-id="294" instrument_node="">laws</span></i><span data-dcnode-id="292" instrument_node="">. All these are part of God’s Law, with some slight distinctions.</span><br data-dcnode-id="291"><br data-dcnode-id="290"><span data-dcnode-id="289" instrument_node="">
A look at the various Hebrew words used helps highlight some of the differences:</span><br data-dcnode-id="288"><br data-dcnode-id="287"><span data-dcnode-id="286" instrument_node="">
</span><b data-dcnode-id="284"><span data-dcnode-id="285" instrument_node="">“Commandments”</span></b><span data-dcnode-id="283" instrument_node=""> in verses 1 and 2 (</span><i data-dcnode-id="281"><span data-dcnode-id="282" instrument_node="">mitzvah</span></i><span data-dcnode-id="280" instrument_node="">): This is the general Hebrew term for “commandment” and usually refers to the comprehensive list of laws or body of laws given by the Lord in the Books of Moses. This is also the Hebrew term often used when the Lord spoke directly in the Old Testament.</span><br data-dcnode-id="279"><br data-dcnode-id="278"><span data-dcnode-id="277" instrument_node="">
</span><b data-dcnode-id="275"><span data-dcnode-id="276" instrument_node="">“Statutes”</span></b><span data-dcnode-id="274" instrument_node=""> (</span><i data-dcnode-id="272"><span data-dcnode-id="273" instrument_node="">choq</span></i><span data-dcnode-id="271" instrument_node="">): According to </span><i data-dcnode-id="269"><span data-dcnode-id="270" instrument_node="">Vine’s Expository Dictionary</span></i><span data-dcnode-id="268" instrument_node="">, this word means “statute, prescription, rule, law, regulation” and can refer to laws of nature (</span><a class="rtBibleRef" data-dcnode-id="266" data-purpose="bible-reference" data-reference="Job 28.26" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/esv/Job%252028.26" rel="noopener" target="_blank"><span data-dcnode-id="267" instrument_node="">Job 28:26</span></a><span data-dcnode-id="265" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="263" data-purpose="bible-reference" data-reference="Jer 5.22" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/esv/Jer%25205.22" rel="noopener" target="_blank"><span data-dcnode-id="264" instrument_node="">Jeremiah 5:22</span></a><span data-dcnode-id="262" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="260" data-purpose="bible-reference" data-reference="Jeremiah 31.35–36" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/esv/Jeremiah%252031.35%25E2%2580%259336" rel="noopener" target="_blank"><span data-dcnode-id="261" instrument_node="">31:35–36</span></a><span data-dcnode-id="259" instrument_node="">) or what is allocated, rationed, or apportioned to someone (</span><a class="rtBibleRef" data-dcnode-id="257" data-purpose="bible-reference" data-reference="Gen 47.22" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/esv/Gen%252047.22" rel="noopener" target="_blank"><span data-dcnode-id="258" instrument_node="">Genesis 47:22</span></a><span data-dcnode-id="256" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="254" data-purpose="bible-reference" data-reference="Exod 29.28" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/esv/Exod%252029.28" rel="noopener" target="_blank"><span data-dcnode-id="255" instrument_node="">Exodus 29:28</span></a><span data-dcnode-id="253" instrument_node="">).</span><br data-dcnode-id="252"><br data-dcnode-id="251"><span data-dcnode-id="250" instrument_node="">
</span><b data-dcnode-id="248"><span data-dcnode-id="249" instrument_node="">“Rules”</span></b><span data-dcnode-id="247" instrument_node=""> (</span><i data-dcnode-id="245"><span data-dcnode-id="246" instrument_node="">mishpat</span></i><span data-dcnode-id="244" instrument_node="">): A judicial verdict or formal decree. In the Law of Moses, some of the legal types of rules would fall under this category.</span><br data-dcnode-id="243"><br data-dcnode-id="242"><span data-dcnode-id="241" instrument_node="">
</span><b data-dcnode-id="239"><span data-dcnode-id="240" instrument_node="">“Statutes/Commands”</span></b><span data-dcnode-id="238" instrument_node=""> in verse 2 (</span><i data-dcnode-id="236"><span data-dcnode-id="237" instrument_node="">chuqqah</span></i><span data-dcnode-id="235" instrument_node="">): </span><i data-dcnode-id="233"><span data-dcnode-id="234" instrument_node="">Chuqqah</span></i><span data-dcnode-id="232" instrument_node=""> has a more specific meaning than </span><i data-dcnode-id="230"><span data-dcnode-id="231" instrument_node="">choq</span></i><span data-dcnode-id="229" instrument_node="">, according to Vine’s dictionary. It refers to a particular law related to a festival or ritual, such as Passover (</span><a class="rtBibleRef" data-dcnode-id="227" data-purpose="bible-reference" data-reference="Exod 12.14" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/esv/Exod%252012.14" rel="noopener" target="_blank"><span data-dcnode-id="228" instrument_node="">Exodus 12:14</span></a><span data-dcnode-id="226" instrument_node="">), the Days of Unleavened Bread (</span><a class="rtBibleRef" data-dcnode-id="224" data-purpose="bible-reference" data-reference="Exod 12.17" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/esv/Exod%252012.17" rel="noopener" target="_blank"><span data-dcnode-id="225" instrument_node="">Exodus 12:17</span></a><span data-dcnode-id="223" instrument_node="">), or the Feast of Tabernacles (</span><a class="rtBibleRef" data-dcnode-id="221" data-purpose="bible-reference" data-reference="Lev 23.41" data-version="esv" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/esv/Lev%252023.41" rel="noopener" target="_blank"><span data-dcnode-id="222" instrument_node="">Leviticus 23:41</span></a><span data-dcnode-id="220" instrument_node="">).</span><br data-dcnode-id="219"><br data-dcnode-id="218"><span data-dcnode-id="217" instrument_node="">
All four of these Hebrew words are used throughout the writings of Moses to refer to commands from God to be obeyed by God’s people. Distinctions are sometimes made regarding one word from the other, yet the overall principle is one of obedience to all that the Lord commands, whether it’s a general command, a prescribed law, a legal verdict, or a religious festival or ritual.</span><br data-dcnode-id="216"><br data-dcnode-id="215"><span data-dcnode-id="214" instrument_node="">
</span></div><span data-dcnode-id="212" instrument_node="">
