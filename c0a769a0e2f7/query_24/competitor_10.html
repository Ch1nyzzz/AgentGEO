</span><div class="ImageBlock ImageBlockCenter" data-dcnode-id="1179"><a data-dcnode-id="1180" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.saintanneshelper.com/order.html" title="Go to Baltimore Catechism Catholic Digital Downloads: BOGO: ❤️ 2for1 CDs"><img alt="Learn the Catholic Ten Commandments" class="ss-lazy loaded" data-dcnode-id="1183" data-pin-media="https://www.saintanneshelper.com/images/catholic_ten_commandments.png" data-src="https://www.saintanneshelper.com/images/catholic_ten_commandments.png" data-was-processed="true" height="174" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.saintanneshelper.com/images/catholic_ten_commandments.png&amp;raw" style="width: 169px; height: auto; border-color: #cc9900; border-width: 1px 1px 1px 1px; border-style: solid" width="169"><span class="Caption CaptionCenter" data-dcnode-id="1181" style="max-width:169px"><span data-dcnode-id="1182" instrument_node="">Moses and the Ten Commandments</span></span></a></div><span data-dcnode-id="1178" instrument_node="">
</span><p data-dcnode-id="1173"><span data-dcnode-id="1177" instrument_node="">The </span><b data-dcnode-id="1175"><span data-dcnode-id="1176" instrument_node="">Catholic Ten Commandments</span></b><span data-dcnode-id="1174" instrument_node=""> are:</span></p><p data-dcnode-id="1170"><b data-dcnode-id="1171"><span data-dcnode-id="1172" instrument_node="">1. I am the Lord thy God; thou shalt not have strange gods before me.</span></b></p><p data-dcnode-id="1167"><b data-dcnode-id="1168"><span data-dcnode-id="1169" instrument_node="">2. Thou shalt not take the name of the Lord thy God in vain.</span></b></p><p data-dcnode-id="1164"><b data-dcnode-id="1165"><span data-dcnode-id="1166" instrument_node="">3. Remember thou keep holy the Lord's Day.</span></b></p><p data-dcnode-id="1161"><b data-dcnode-id="1162"><span data-dcnode-id="1163" instrument_node="">4. Honor thy father and thy mother.</span></b></p><p data-dcnode-id="1158"><b data-dcnode-id="1159"><span data-dcnode-id="1160" instrument_node="">5. Thou shall not kill.</span></b></p><p data-dcnode-id="1155"><b data-dcnode-id="1156"><span data-dcnode-id="1157" instrument_node="">6. Thou shalt not commit adultery.</span></b></p><p data-dcnode-id="1152"><b data-dcnode-id="1153"><span data-dcnode-id="1154" instrument_node="">7. Thou shalt not steal.</span></b></p><p data-dcnode-id="1149"><b data-dcnode-id="1150"><span data-dcnode-id="1151" instrument_node="">8. Thou shalt not bear false witness against thy neighbor.</span></b></p><p data-dcnode-id="1146"><b data-dcnode-id="1147"><span data-dcnode-id="1148" instrument_node="">9. Thou shalt not covet thy neighbor's wife.</span></b></p><p data-dcnode-id="1143"><b data-dcnode-id="1144"><span data-dcnode-id="1145" instrument_node="">10. Thou shalt not covet thy neighbor's goods.</span></b></p><span data-dcnode-id="1142" instrument_node="">

</span><p data-dcnode-id="974"><span data-dcnode-id="975" instrument_node="">Learning the Ten Commandments is important for being able to make a good confession. Usually, one learns the Ten Commandments before his First Confession while he is preparing for First Holy Communion. Another time to review or memorize the Commandments is in preparation for Confirmation. </span></p><p data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">This 24 Catholic Songs CD and the matching coloring book have a sweet Ten Commandments Song. The coloring book has the words printed on a sheet in the back. Our children have enjoyed this immensely and they have been very helpful remembering several lists as with the Corporal and Spiritual Works of Mercy.</span></p><p data-dcnode-id="962"><span data-dcnode-id="971" instrument_node="">Learn the&nbsp;</span><a data-dcnode-id="966" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.olvs.org/store/lepanto/lp-music/24-catholic-songs-for-children-cd/" rel="noopener nofollow" target="_blank"><em data-dcnode-id="968"><strong data-dcnode-id="969"><span data-dcnode-id="970" instrument_node="">Ten Commandments Song</span></strong></em><span data-dcnode-id="967" instrument_node="">&nbsp;using this CD at Amazon</span></a><span data-dcnode-id="965" instrument_node="">.&nbsp;</span><span data-dcnode-id="963" style="background-color: transparent;"><span data-dcnode-id="964" instrument_node="">Our children learned several Catholic lists from this CD, like the Works of Mercy, etc.</span></span></p><p data-dcnode-id="952"><span data-dcnode-id="960" style="background-color: transparent;"><span data-dcnode-id="961" instrument_node="">The&nbsp;</span></span><a data-dcnode-id="955" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.olvs.org/store/lepanto/lp-coloring-books/24-catholic-songs-coloring-book/" rel="noopener nofollow" target="_blank"><b data-dcnode-id="957"><em data-dcnode-id="958"><span data-dcnode-id="959" instrument_node="">24 Catholic Songs For Children</span></em></b><span data-dcnode-id="956" instrument_node="">&nbsp;coloring book at Our Lady of Victory School</span></a><span data-dcnode-id="953" style="background-color: transparent;"><span data-dcnode-id="954" instrument_node="">&nbsp;has the words printed in the back.&nbsp;</span></span></p><p data-dcnode-id="949"><span data-dcnode-id="950" style="background-color: transparent;"><span data-dcnode-id="951" instrument_node="">The better disposed you are to receive the sacraments, the better you will persevere in the Faith. </span></span></p><p data-dcnode-id="945"><span data-dcnode-id="946" style="background-color: transparent;"><span data-dcnode-id="948" instrument_node="">Frequently this means that the better you study or know the Roman Catholic beliefs the easier it is to keep the Faith. The Catholic Ten Commandments are your short cut. :-)</span><br data-dcnode-id="947"></span></p><span data-dcnode-id="944" instrument_node="">
</span><h2 data-dcnode-id="942" id="4"><span data-dcnode-id="943" instrument_node="">4. The Catholic Church Ten Commandments List</span></h2><span data-dcnode-id="941" instrument_node="">
</span><p data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">The Roman Catholic Church defined which commands made the list. </span></p><p data-dcnode-id="937"><span data-dcnode-id="938" instrument_node="">Actually, there are many more than the ten "Thou shalt nots" in the book of Exodus XX. </span></p><p data-dcnode-id="932"><span data-dcnode-id="936" instrument_node="">The Decalogue as seen in the&nbsp;</span><a data-dcnode-id="934" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.saintanneshelper.com/baltimore-catechism.html"><span data-dcnode-id="935" instrument_node="">Baltimore Catechism</span></a><span data-dcnode-id="933" instrument_node="">&nbsp;is extracted from Exodus 20 in a concise way so as to convey the meaning in an easy to memorize way. </span></p><p data-dcnode-id="930"><span data-dcnode-id="931" instrument_node="">Also, remember that the&nbsp;Douay-Rheims Bible&nbsp;Old Testament says "Sabbath", yet many Baltimore Catechisms&nbsp;use the term "Lord's Day" since the Lord's day of rest became Sunday, not Saturday, in honor of Easter, the Resurrection, and Pentecost. </span></p><p data-dcnode-id="925"><span data-dcnode-id="929" instrument_node="">Whenever there is a difference in&nbsp;</span><a data-dcnode-id="927" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.saintanneshelper.com/catholic-answers.html"><span data-dcnode-id="928" instrument_node="">Catholic answers</span></a><span data-dcnode-id="926" instrument_node="">&nbsp;the morally safer course is to use the more precise terms, especially those in use for over one hundred years.</span></p><p data-dcnode-id="921"><a data-dcnode-id="923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.saintanneshelper.com/order.html"><span data-dcnode-id="924" instrument_node="">St. Anne's Audio Catechism CDs</span></a><span data-dcnode-id="922" instrument_node="">&nbsp;also use the term "Lord's Day" in the habit of using specific terms. The verbatim text is also printable and reprintable from the very same enhanced CD!</span></p><p data-dcnode-id="913"><b data-dcnode-id="919"><span data-dcnode-id="920" instrument_node="">NOTE:</span></b><span data-dcnode-id="918" instrument_node="">&nbsp;See more at the </span><em data-dcnode-id="915"><a data-dcnode-id="916" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.saintanneshelper.com/council-of-trent.html"><span data-dcnode-id="917" instrument_node="">Catechism of the Council of Trent</span></a></em><span data-dcnode-id="914" instrument_node=""> about the Sabbath.</span></p><span data-dcnode-id="912" instrument_node="">
</span><h2 data-dcnode-id="910" id="5"><span data-dcnode-id="911" instrument_node="">5. Protestant vs. Catholic Ten Commandments</span></h2><span data-dcnode-id="909" instrument_node="">
</span><p data-dcnode-id="907"><span data-dcnode-id="908" instrument_node="">A visitor asks:</span></p><p data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">"Why are the Catholic Ten Commandments different from those in Exodus 20:1-17? Even Catholic Bibles have the same commandments as protestant Bibles, but you have omitted the Second Commandment ("You shall not make for yourself an idol", NRSVCE) and divided the Tenth Commandment ("You shall not covet your neighbor’s house; you shall not covet your neighbor’s wife, or male or female slave, or ox, or donkey, or anything that belongs to your neighbor") into two. </span></p><p data-dcnode-id="903"><span data-dcnode-id="904" instrument_node="">This is unBiblical. Why do you do this?"</span></p><p data-dcnode-id="901"><span data-dcnode-id="902" instrument_node="">The short answer is that Catholics call these the Ten Commandments because the Catholic Church does, and has done so throughout the centuries. </span></p><p data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">Sections 6 through 11 below give more answers that explain what the Catholic Church teaches. Thank you for asking, as it was fun finding these answers.</span></p><span data-dcnode-id="898" instrument_node="">

</span><h2 data-dcnode-id="845" id="6"><span data-dcnode-id="846" instrument_node="">6. Ten Commandments In The Catholic Bible:&nbsp;Exodus 20:1-17</span></h2><span data-dcnode-id="844" instrument_node="">
</span><p data-dcnode-id="839"><span data-dcnode-id="843" instrument_node="">Here is what the classic Catholic Bible, the Douay-Rheims Bible, says in </span><a data-dcnode-id="841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//web.archive.org/web/20170627192631/http%3A//haydock1859.tripod.com/id398.html"><span data-dcnode-id="842" instrument_node="">Exodus chapter 20, verses 1-17</span></a><span data-dcnode-id="840" instrument_node="">&nbsp;as per the old TAN Books version:</span></p><ol data-dcnode-id="802"><li data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">And the Lord spoke all these words:</span></li><li data-dcnode-id="835"><span data-dcnode-id="836" instrument_node="">I am the Lord thy God, who brought thee out of the land of Egypt, out of the house of bondage.</span></li><li data-dcnode-id="833"><span data-dcnode-id="834" instrument_node="">Thou shalt not have strange gods before me.</span></li><li data-dcnode-id="831"><span data-dcnode-id="832" instrument_node="">Thou shalt not make to thyself a graven thing, nor the likeness of any thing that is in heaven above, or in the earth beneath, nor of those things that are in the waters under the earth.</span></li><li data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">Thou shalt not adore them, nor serve them: I am the Lord thy God, mighty, jealous, visiting the iniquity of the fathers upon the children, unto the third and fourth generation of them that hate me:	</span></li><li data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">And shewing mercy unto thousands to them that love me, and keep my commandments.</span></li><li data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">Thou shalt not take the name of the Lord thy God in vain: for the Lord will not hold him guiltless that shall take the name of the Lord his God in vain.</span></li><li data-dcnode-id="823"><span data-dcnode-id="824" instrument_node="">Remember that thou keep holy the sabbath day.</span></li><li data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">Six days shalt thou labour, and shalt do all thy works.</span></li><li data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">But on the seventh day is the sabbath of the Lord thy God: thou shalt do no work on it, thou nor thy son, nor thy daughter, nor thy manservant, nor thy maidservant, nor thy beast, nor the stranger that is within thy gates.</span></li><li data-dcnode-id="817"><span data-dcnode-id="818" instrument_node="">For in six days the Lord made heaven and earth, and the sea, and all things that are in them, and rested on the seventh day: therefore the Lord blessed the seventh day, and sanctified it.	</span></li><li data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">Honour thy father and thy mother, that thou mayest be longlived upon the land which the Lord thy God will give thee.	</span></li><li data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">Thou shalt not kill.</span></li><li data-dcnode-id="811"><span data-dcnode-id="812" instrument_node="">Thou shalt not commit adultery.</span></li><li data-dcnode-id="809"><span data-dcnode-id="810" instrument_node="">Thou shalt not steal.</span></li><li data-dcnode-id="807"><span data-dcnode-id="808" instrument_node="">Thou shalt not bear false witness against thy neighbour.</span></li><li data-dcnode-id="803"><span data-dcnode-id="806" instrument_node="">Thou shalt not covet thy neighbour's house: neither shalt thou desire his wife, nor his servant, nor his handmaid, nor his ox, nor his ass, nor any thing that is his." -- Catholic Ten Commandments, </span><em data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">Douay-Rheims Bible</span></em></li></ol><span data-dcnode-id="801" instrument_node="">
</span><span data-dcnode-id="799" instrument_node="">

</span><h2 data-dcnode-id="783" id="7"><em data-dcnode-id="787"><span data-dcnode-id="789" style="font-style: normal;"><span data-dcnode-id="790" instrument_node="">7. </span></span><span data-dcnode-id="788" instrument_node="">The Catechism of the Council of Trent</span></em><span data-dcnode-id="786" instrument_node=""> </span><br data-dcnode-id="785"><span data-dcnode-id="784" instrument_node="">Quotes St. Augustine</span></h2><span data-dcnode-id="782" instrument_node="">
</span><p data-dcnode-id="778"><em data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">The Catechism of the Council of Trent</span></em><span data-dcnode-id="779" instrument_node=""> (CCT) quotes St. Augustine in saying that the:</span></p><ul data-dcnode-id="775"><li data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">Decalogue is the summary and epitome of all laws: 'Although the Lord had spoken many things, He gave to Moses only two stone tablets, called "tables of testimony," to be placed in the Ark. For if carefully examined and well understood, whatever else is commanded by God will be found to depend on the Ten Commandments which were engraved on those two tables, just as these Ten Commandments, in turn, are reducible to two, the love of God and of our neighbor, on which "depend the whole law and the prophets."</span></li></ul><p data-dcnode-id="770"><span data-dcnode-id="774" instrument_node="">In this last quote, St. Augustine is repeating the words of Jesus Himself. </span><br data-dcnode-id="773"><br data-dcnode-id="772"><span data-dcnode-id="771" instrument_node="">Whichever way the Commandments are divided; they can be combined into two laws, to love God and thy neighbor as thyself.</span></p><p data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">See how comprehensive the Commandments are in Section 10 below.</span></p><span data-dcnode-id="767" instrument_node="">
</span><h2 data-dcnode-id="765" id="8"><span data-dcnode-id="766" instrument_node="">8. Christian Decalogue vs. the Bible's Jewish Decalogue</span></h2><span data-dcnode-id="764" instrument_node="">
</span><p data-dcnode-id="758"><span data-dcnode-id="763" instrument_node="">The best explanation of the difference between the Catholic Ten Commandments and the Protestant Commandments is in </span><em data-dcnode-id="760"><a data-dcnode-id="761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Catechism-Explained-Exhaustive-Explanation-Catholic/dp/0895554976/ref%3Das_li_ss_tl%3Fs%3Dbooks%26ie%3DUTF8%26qid%3D1462045250%26sr%3D1-1%26keywords%3Dthe%2Bcatechism%2Bexplained%2Ban%2Bexhaustive%2Bexplanation%2Bof%2Bthe%2Bcatholic%2Breligion%26linkCode%3Dll1%26tag%3Dhttpwwwazwork-20%26linkId%3D1bbb1e4ce5c130f1faf202b06acb18fe%26language%3Den_US" rel="noopener nofollow" target="_blank"><span data-dcnode-id="762" instrument_node="">The Catechism Explained</span></a></em><span data-dcnode-id="759" instrument_node=""> on page 307:</span></p><p data-dcnode-id="750"><span data-dcnode-id="757" instrument_node="">"We must here remark that the Catholic Church, acting under the guidance of the Holy Spirit, has slightly altered the Decalogue in a Christian Sense. The Jewish Decalogue, given on Mount Sinai, consists of these precepts: (1). The command to worship no God but the true God. (2). The Prohibition against the worship of images. (3). The prohibition against taking God's name in vain. (4). The command to keep holy the Sabbath. (5). The command to honor one's parents. (6). The prohibition against murder. (7). False witness. (8). Theft. (9). False witness. (10). Coveting other men's goods (Exod. XX. 1-17). The Catholic Church has joined the Second Commandment, forbidding the worship of images, to the first, and divided the tenth into two separate commands, </span><b data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">in order that the Christian wife may be duly respected</span></b><span data-dcnode-id="754" instrument_node=""> (vide Ninth Commandment)." –</span><em data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">The Catechism Explained, An Exhaustive Exposition of the Catholic Religion</span></em><span data-dcnode-id="751" instrument_node="">; by Rev. Francis Spirago, edited by Rev. Richard F. Clark, S.J.</span></p><p data-dcnode-id="745"><em data-dcnode-id="747"><a data-dcnode-id="748" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/s/ref%3Das_li_ss_tl%3Furl%3Dsearch-alias%3Daps%26field-keywords%3Dcatechism%2Bof%2Bthe%2Bcouncil%2Bof%2Btrent%26linkCode%3Dll2%26tag%3Dhttpwwwazwork-20%26linkId%3D02cd2a76070f961d9f3989971b2133cd%26language%3Den_US" rel="noopener nofollow" target="_blank"><span data-dcnode-id="749" instrument_node="">The Catechism of the Council of Trent</span></a></em><span data-dcnode-id="746" instrument_node=""> says on page 373 that:&nbsp;</span></p><p data-dcnode-id="743"><span data-dcnode-id="744" instrument_node="">"Some, supposing these words which come next in order to constitute a distinct precept, reduce the ninth and tenth Commandments to one. St. Augustine, on the contrary, considering the last two to be distinct Commandments, makes the words just quoted a part of the first Commandment. His division is much approved in the Church, and hence we willingly adopt it. Furthermore a very good reason for this arrangement at once suggests itself. It was fitting that to the first Commandment should be added the rewards or punishments entailed by each one of the Commandments."</span></p><span data-dcnode-id="742" instrument_node="">
</span><span data-dcnode-id="740" instrument_node="">
</span><div class="ImageBlock ImageBlockCenter" data-dcnode-id="735"><a data-dcnode-id="736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.saintanneshelper.com/order.html" title="Go to Baltimore Catechism Catholic Digital Downloads: BOGO: ❤️ 2for1 CDs"><img alt="Audio Baltimore Catechism CDs and digital downloads." class="ss-lazy" data-dcnode-id="739" data-pin-media="https://www.saintanneshelper.com/images/600-saintanneshelper-lt-blue-90.jpg" data-src="https://www.saintanneshelper.com/images/600-saintanneshelper-lt-blue-90.jpg" height="90.6" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20604%2090.6'%3E%3C/svg%3E" style="width: 604px; height: auto; border-color: #33bbff; border-width: 2px 2px 2px 2px; border-style: solid" width="604"><span class="Caption CaptionCenter" data-dcnode-id="737" style="max-width:604px"><span data-dcnode-id="738" instrument_node="">Digital Baltimore Catechism Communion and Confirmation ebooks, worksheets, and coloring downloads.</span></span></a></div><span data-dcnode-id="734" instrument_node="">
</span><span data-dcnode-id="732" instrument_node="">
</span><h2 data-dcnode-id="730" id="9"><span data-dcnode-id="731" instrument_node="">9. The Second Commandment is Separate</span></h2><span data-dcnode-id="729" instrument_node="">
</span><p data-dcnode-id="721"><span data-dcnode-id="728" instrument_node="">The </span><b data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">Second Commandment</span></b><span data-dcnode-id="725" instrument_node=""> is separate in the Catholic Ten Commandments and is explained in </span><em data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">The Catechism of the Council of Trent</span></em><span data-dcnode-id="722" instrument_node=""> on page 382:</span></p><p data-dcnode-id="716"><span data-dcnode-id="720" instrument_node="">"</span><em data-dcnode-id="718"><span data-dcnode-id="719" instrument_node="">on account of the importance of the obligation, God wished to make the law, which commands His own divine and most holy name to be honored, a distinct Commandment, expressed in the clearest and simplest terms.</span></em><span data-dcnode-id="717" instrument_node="">"</span></p><span data-dcnode-id="715" instrument_node="">
</span><h3 data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">Why Sunday is the Lord's Day</span></h3><span data-dcnode-id="712" instrument_node="">
</span><p data-dcnode-id="705"><b data-dcnode-id="707"><span data-dcnode-id="711" instrument_node="">Msgr. Paul Glenn says in his </span><em data-dcnode-id="708"><a data-dcnode-id="709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Tour-Summa-Paul-J-Glenn/dp/0895550814/ref%3Das_li_ss_tl%3Fkeywords%3Dpaul%2Bglenn%26qid%3D1574223410%26sr%3D8-2%26linkCode%3Dll1%26tag%3Dhttpwwwazwork-20%26linkId%3D2bfe1f0874459f2205589fabf4e85416%26language%3Den_US" rel="noopener nofollow" target="_blank"><span data-dcnode-id="710" instrument_node="">Tour of the Summa</span></a></em></b><span data-dcnode-id="706" instrument_node="">&nbsp;(excellent book for 11th and 12th grade and adult RelEd) that the obligation to keep the Sabbath was ended at the Old Testament and was fulfilled when Jesus died on the Cross.</span></p><p data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">Many denominations have chosen to go back to the Jewish Decalogue, yet they might ought to wonder at this since the Christian holy day is Sunday. Where does this originate?</span></p><p data-dcnode-id="696"><b data-dcnode-id="698"><span data-dcnode-id="702" instrument_node="">Turn to </span><em data-dcnode-id="699"><a data-dcnode-id="700" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Catechism-Explained-Exhaustive-Explanation-Catholic/dp/0895554976/ref%3Das_li_ss_tl%3Fs%3Dbooks%26ie%3DUTF8%26qid%3D1462045250%26sr%3D1-1%26keywords%3Dthe%2Bcatechism%2Bexplained%2Ban%2Bexhaustive%2Bexplanation%2Bof%2Bthe%2Bcatholic%2Breligion%26linkCode%3Dll1%26tag%3Dhttpwwwazwork-20%26linkId%3D1bbb1e4ce5c130f1faf202b06acb18fe%26language%3Den_US" rel="noopener nofollow" target="_blank"><span data-dcnode-id="701" instrument_node="">The Catechism Explained</span></a></em></b><span data-dcnode-id="697" instrument_node=""> which says further on the same page that the Lord's Day is Sunday. This is the reason that Christians worship the Lord on Sunday not Saturday which had been the Jewish Sabbath:</span></p><p data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">"The command to keep holy the Sabbath is changed into the precept to sanctify Sundays and holydays."&nbsp;</span></p><p data-dcnode-id="688"><b data-dcnode-id="689"><span data-dcnode-id="693" instrument_node="">On page 398 the </span><em data-dcnode-id="691"><span data-dcnode-id="692" instrument_node="">Catechism of the Council of Trent</span></em><span data-dcnode-id="690" instrument_node=""> says:</span></b></p><p data-dcnode-id="686"><span data-dcnode-id="687" instrument_node="">"The observance of the Sabbath was to be abrogated at the same time as the other Hebrew rites and ceremonies, that is, at the death of Christ."</span></p><p data-dcnode-id="683"><b data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">Further down the same page the CCT says:</span></b></p><p data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">"The Apostles therefore resolved to consecrate the first day of the week to the divine worship, and called it the Lord's day. St. John in the Apocalypse makes mention of the Lord's day; and the Apostle commands collections to be made on the first day of the week, that is, according to the interpretation of St. Chrysostom, on the Lord's day. From all this we learn that even then the Lord's day was kept holy in the Church."&nbsp;</span></p><p data-dcnode-id="679"><span data-dcnode-id="680" instrument_node="">There is more in this chapter on the term Sabbath that makes for interesting reading, too.</span></p><span data-dcnode-id="678" instrument_node="">
</span><span data-dcnode-id="676" instrument_node="">
</span><div class="ImageBlock ImageBlockCenter" data-dcnode-id="671"><a data-dcnode-id="672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.saintanneshelper.com/order.html" title="Go to Baltimore Catechism Catholic Digital Downloads: BOGO: ❤️ 2for1 CDs"><img alt="Audio Baltimore Catechism CDs and digital downloads." class="ss-lazy" data-dcnode-id="675" data-pin-media="https://www.saintanneshelper.com/images/600-saintanneshelper-lt-blue-90.jpg" data-src="https://www.saintanneshelper.com/images/600-saintanneshelper-lt-blue-90.jpg" height="90.6" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20604%2090.6'%3E%3C/svg%3E" style="width: 604px; height: auto; border-color: #33bbff; border-width: 2px 2px 2px 2px; border-style: solid" width="604"><span class="Caption CaptionCenter" data-dcnode-id="673" style="max-width:604px"><span data-dcnode-id="674" instrument_node="">Digital Baltimore Catechism Communion and Confirmation ebooks, worksheets, and coloring downloads.</span></span></a></div><span data-dcnode-id="670" instrument_node="">
</span><span data-dcnode-id="668" instrument_node="">
</span><h2 data-dcnode-id="666" id="10"><span data-dcnode-id="667" instrument_node="">10. Politics, Ethics, And The Commandments</span></h2><span data-dcnode-id="665" instrument_node="">
</span><h3 data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">The Study Of Politics Requires The Study Of Ethics</span></h3><span data-dcnode-id="662" instrument_node="">
</span><p data-dcnode-id="660"><span data-dcnode-id="661" instrument_node="">From years of teaching catechism, homeschooling, and thereby reading many good Catholic books, I have learned that politics are actually quite simple.</span></p><p data-dcnode-id="658"><span data-dcnode-id="659" instrument_node="">Politics is a subset of ethics.</span></p><p data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">Ethics is a subset of the Ten Commandments.</span></p><p data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">The Commandments apply to every moral question.</span></p><span data-dcnode-id="653" instrument_node="">
</span><h3 data-dcnode-id="651"><span data-dcnode-id="652" instrument_node="">Which Commandments Are Most Important?</span></h3><span data-dcnode-id="650" instrument_node="">
</span><p data-dcnode-id="647"><span data-dcnode-id="648" style="background-color: transparent;"><span data-dcnode-id="649" instrument_node="">The Ten Commandments are hierarchical. </span></span></p><ul data-dcnode-id="640"><li data-dcnode-id="644"><span data-dcnode-id="645" style="background-color: transparent;"><span data-dcnode-id="646" instrument_node="">The first three Commandments are most important as they relate to God Himself.&nbsp;</span></span></li><li data-dcnode-id="641"><span data-dcnode-id="642" style="background-color: transparent;"><span data-dcnode-id="643" instrument_node="">The last seven are also hierarchical one to the other with the 4th and the 5th being higher than the others.&nbsp;</span></span></li></ul><p data-dcnode-id="638"><span data-dcnode-id="639" instrument_node="">As a nation and throughout the world, we cannot agree politically on the first three because there are so many religions. </span></p><p data-dcnode-id="636"><span data-dcnode-id="637" instrument_node="">The Fourth is undermined by divorce laws, "education", and such. The first Commandment that most of us can agree on is the Fifth.&nbsp;</span></p><p data-dcnode-id="634"><span data-dcnode-id="635" instrument_node="">THIS is why the right to life is the most important political issue upon which most people can work together politically.</span></p><p data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">May God spare us all. Our Lady of Fatima, pray for us!</span></p><span data-dcnode-id="631" instrument_node="">
</span><h2 data-dcnode-id="629" id="11"><span data-dcnode-id="630" instrument_node="">11. Keeping The Catholic Ten Commandments</span></h2><span data-dcnode-id="628" instrument_node="">
</span><h3 data-dcnode-id="626"><span data-dcnode-id="627" instrument_node="">Catholic Beliefs</span></h3><span data-dcnode-id="625" instrument_node="">
</span><p data-dcnode-id="610"><span data-dcnode-id="624" instrument_node="">Simply put, the Catholic Church teaches what the&nbsp;</span><a data-dcnode-id="622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.saintanneshelper.com/apostles-creed.html"><span data-dcnode-id="623" instrument_node="">Apostles' Creed</span></a><span data-dcnode-id="621" instrument_node="">, Catholic Ten Commandments, and the&nbsp;</span><a data-dcnode-id="619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.saintanneshelper.com/catholic-bible.html"><span data-dcnode-id="620" instrument_node="">Catholic Bible</span></a><span data-dcnode-id="618" instrument_node="">&nbsp;teach.&nbsp;</span><span data-dcnode-id="616" style="background-color: transparent;"><span data-dcnode-id="617" instrument_node="">See more about the&nbsp;</span></span><a data-dcnode-id="614" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.saintanneshelper.com/catholic-beliefs.html" style="background-color: transparent;"><span data-dcnode-id="615" instrument_node="">basic Catholic beliefs here</span></a><span data-dcnode-id="612" style="background-color: transparent;"><span data-dcnode-id="613" instrument_node="">.</span></span><br data-dcnode-id="611"></p><span data-dcnode-id="609" instrument_node="">
</span><h3 data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">Catholic Saints</span></h3><span data-dcnode-id="606" instrument_node="">
</span><p data-dcnode-id="601"><a data-dcnode-id="604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.saintanneshelper.com/catholic-saints.html" style="background-color: transparent;"><span data-dcnode-id="605" instrument_node="">Catholic saints</span></a><span data-dcnode-id="602" style="background-color: transparent;"><span data-dcnode-id="603" instrument_node="">&nbsp;are the ones who heroically did what the Church has always taught. Read about them to learn how to live the Faith.</span></span></p><span data-dcnode-id="600" instrument_node="">

</span><p data-dcnode-id="593"><span data-dcnode-id="595" style="background-color: transparent;"><span data-dcnode-id="596" instrument_node="">Once you know the basics of Catholicism you can better judge what the truth is.</span></span><br data-dcnode-id="594"></p><ul data-dcnode-id="576"><li data-dcnode-id="588"><span data-dcnode-id="592" instrument_node="">Mass?&nbsp;</span><a data-dcnode-id="590" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.saintanneshelper.com/first-communion.html"><span data-dcnode-id="591" instrument_node="">Holy Eucharist</span></a><span data-dcnode-id="589" instrument_node="">?&nbsp;First Commandment.</span></li><li data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">Abortion? Fifth Commandment.</span></li><li data-dcnode-id="584"><span data-dcnode-id="585" instrument_node="">Divorce? Sixth and Ninth Commandments.</span></li><li data-dcnode-id="579"><span data-dcnode-id="583" instrument_node="">Evolution? Creation? First Chapter in the&nbsp;</span><a data-dcnode-id="581" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.saintanneshelper.com/catholic-bible.html"><span data-dcnode-id="582" instrument_node="">Bible</span></a><span data-dcnode-id="580" instrument_node="">, Genesis 1:1-31.</span></li><li data-dcnode-id="577"><span data-dcnode-id="578" instrument_node="">Economy? Ecology? Environment? Climate? First chapter in the&nbsp;Bible&nbsp;and the Seventh Commandment.</span></li></ul><p data-dcnode-id="574"><span data-dcnode-id="575" instrument_node="">Genesis 1:28-30&nbsp;"And God blessed them, saying: Increase and multiply, and fill the earth, and subdue it, and rule over the fishes of the sea, and the fowls of the air, and all living creatures that move upon the earth. And God said: Behold I have given you every herb bearing seed upon the earth, and all trees that have in themselves seed of their own kind, to be your meat: And to all beasts of the earth, and to every fowl of the air, and to all that move upon the earth, and wherein there is life, that they may have to feed upon. And it was so done."</span></p><p data-dcnode-id="572"><span data-dcnode-id="573" instrument_node="">Living a good life is easier once you know the principles as God formed them in the Catholic Ten Commandments. The Commandments are the main Roman Catholic beliefs.</span></p><span data-dcnode-id="571" instrument_node="">
