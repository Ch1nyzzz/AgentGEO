</span><div class="boxed-layout-header page-header header-small" data-dcnode-id="987" data-parallax="active" id="primary"><div class="container" data-dcnode-id="989" style="padding-top: 220px;"><div class="row" data-dcnode-id="990"><div class="col-md-10 col-md-offset-1 text-center" data-dcnode-id="991"><h1 class="hestia-title entry-title" data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">Main Differences between Catholics and Protestants</span></h1><h4 class="author" data-dcnode-id="992"><span data-dcnode-id="1001" instrument_node="">Published by </span><a class="vcard author" data-dcnode-id="998" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stpeter.us/author/friedecj/"><strong class="fn" data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">webmaster</span></strong></a><span data-dcnode-id="997" instrument_node=""> on </span><time class="entry-date published" content="2019-11-16" data-dcnode-id="995" datetime="2019-11-16T19:01:01+00:00"><span data-dcnode-id="996" instrument_node="">November 16, 2019</span></time><time class="updated hestia-hidden" data-dcnode-id="993" datetime="2019-11-16T19:01:29+00:00"><span data-dcnode-id="994" instrument_node="">November 16, 2019</span></time></h4></div></div></div><div class="header-filter" data-dcnode-id="988" style="background-image: url(https://stpeter.us/wp-content/uploads/2016/04/cropped-ChurchAlter.jpg);"></div></div><span data-dcnode-id="986" instrument_node="">
</span><div class="main main-raised" data-dcnode-id="330"><span data-dcnode-id="985" instrument_node="">
</span><div class="blog-post blog-post-wrapper" data-dcnode-id="332"><span data-dcnode-id="984" instrument_node="">
</span><div class="container" data-dcnode-id="334"><span data-dcnode-id="983" instrument_node="">
</span><article class="section section-text" data-dcnode-id="336" id="post-2657"><span data-dcnode-id="982" instrument_node="">
</span><div class="row" data-dcnode-id="338"><span data-dcnode-id="981" instrument_node="">
</span><div class="col-md-8 single-post-container" data-dcnode-id="786" data-layout="sidebar-right"><span data-dcnode-id="980" instrument_node="">
</span><div class="single-post-wrap entry-content" data-dcnode-id="930"><p data-dcnode-id="975"><span data-dcnode-id="979" instrument_node="">Luther started the Reformation in the 16</span><sup data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">th</span></sup><span data-dcnode-id="976" instrument_node=""> century. But many of the aspects that were reformed by Luther created division between the Catholic and the Protestant Churches and still continues to create division among the Protestant Churches. Here are the main aspects of differences:</span></p><span data-dcnode-id="974" instrument_node="">
</span><p data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">&nbsp;</span></p><span data-dcnode-id="971" instrument_node="">
</span><p data-dcnode-id="967"><strong data-dcnode-id="969"><span data-dcnode-id="970" instrument_node="">Understanding of the Bible</span></strong><span data-dcnode-id="968" instrument_node="">:</span></p><span data-dcnode-id="966" instrument_node="">
</span><p data-dcnode-id="961"><span data-dcnode-id="965" instrument_node="">The Catholic Church and the Protestant denominations (Churches) have different views on the meaning and the authority of the Bible. The Protestants, as initiated by Luther, accept the principle of “</span><em data-dcnode-id="963"><span data-dcnode-id="964" instrument_node="">sola Skritura</span></em><span data-dcnode-id="962" instrument_node="">” (Scripture only). Accordingly, they believe that God has revealed Himself to the people only through the Bible.</span></p><span data-dcnode-id="960" instrument_node="">
</span><p data-dcnode-id="958"><span data-dcnode-id="959" instrument_node="">But the Catholics hold the belief that God has revealed Himself and His Plan of Salvation not only from what is written in the Bible but also through the oral tradition. Catholics strongly believe that what remains written in the Bible was selected and chosen by the human authors depending on their scope and the direct recipients, to whom they wrote. Hence, Bible and Tradition, for the Catholics, are the two pillars of faith, which contain the entire revelation.</span></p><span data-dcnode-id="957" instrument_node="">
</span><p data-dcnode-id="955"><span data-dcnode-id="956" instrument_node="">&nbsp;</span></p><span data-dcnode-id="954" instrument_node="">
</span><p data-dcnode-id="950"><strong data-dcnode-id="952"><span data-dcnode-id="953" instrument_node="">Understanding of the Church</span></strong><span data-dcnode-id="951" instrument_node="">:</span></p><span data-dcnode-id="949" instrument_node="">
</span><p data-dcnode-id="947"><span data-dcnode-id="948" instrument_node="">The Protestant Churches, which are also called “Evangelical” (which means, based on the Gospels), do not have one united Church. There are thousands of different denominations, which do not agree with one another. The main reason for such divisions among them is the individual interpretation of the Bible, as comprehended by the founder of each Church.</span></p><span data-dcnode-id="946" instrument_node="">
</span><p data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">Whereas the Catholics have one apostolic Church under the leadership of the Pope. The word “Catholic” means universal or all-embracing and it is the only true Church because it maintains the apostolic Tradition. Jesus appointed Peter as the first head of the Church and Starting from Peter till today, there is the continuation of the apostolic tradition preserved only in the Catholic Church.</span></p><span data-dcnode-id="943" instrument_node="">
</span><p data-dcnode-id="941"><span data-dcnode-id="942" instrument_node="">I will continue sharing other aspects of difference in the next weeks to come.</span></p><span data-dcnode-id="940" instrument_node="">
</span><p data-dcnode-id="938"><span data-dcnode-id="939" instrument_node="">&nbsp;</span></p><span data-dcnode-id="937" instrument_node="">
</span><p data-dcnode-id="935"><span data-dcnode-id="936" instrument_node="">God bless you</span></p><span data-dcnode-id="934" instrument_node="">
</span><p data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">Fr. Arul Joseph V.</span></p><span data-dcnode-id="931" instrument_node="">
</span></div><span data-dcnode-id="929" instrument_node="">
