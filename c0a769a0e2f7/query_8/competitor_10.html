</span><div class="article-content retro-folders" data-dcnode-id="988" id="main-article"><span data-dcnode-id="3161" instrument_node="">
</span><p data-dcnode-id="3160"></p><div class="indent" data-dcnode-id="3145"><em data-dcnode-id="3156"><span data-dcnode-id="3159" instrument_node="">"Judge Claude Frollo longed to purge the world of vice and sin </span><br data-dcnode-id="3158"><span data-dcnode-id="3157" instrument_node="">And he saw corruption everywhere — except within."</span></em><span data-dcnode-id="3155" instrument_node="">
</span><div class="indent" data-dcnode-id="3146"><span data-dcnode-id="3154" instrument_node="">— </span><strong data-dcnode-id="3152"><span data-dcnode-id="3153" instrument_node="">Clopin</span></strong><span data-dcnode-id="3151" instrument_node="">, </span><em data-dcnode-id="3148"><a class="twikilink" data-dcnode-id="3149" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WesternAnimation/TheHunchbackOfNotreDameDisney" title="/pmwiki/pmwiki.php/WesternAnimation/TheHunchbackOfNotreDameDisney"><span data-dcnode-id="3150" instrument_node="">The Hunchback of Notre Dame</span></a></em><span data-dcnode-id="3147" instrument_node="">
</span></div></div><p data-dcnode-id="3116"><span data-dcnode-id="3144" instrument_node="">If your work features a religion of some sort, the chances are high that the only character associated with that religion—aside from the saintly </span><a class="twikilink" data-dcnode-id="3142" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AllLovingHero" title="/pmwiki/pmwiki.php/Main/AllLovingHero"><span data-dcnode-id="3143" instrument_node="">All-Loving Hero</span></a><span data-dcnode-id="3141" instrument_node=""> and devoted </span><a class="twikilink" data-dcnode-id="3139" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GoodShepherd" title="/pmwiki/pmwiki.php/Main/GoodShepherd"><span data-dcnode-id="3140" instrument_node="">Good Shepherd</span></a><span data-dcnode-id="3138" instrument_node="">—will be an arrogant blowhard who thinks they are better than "non-believers". Whether the crude and self-righteous </span><a class="twikilink" data-dcnode-id="3136" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/KnightTemplar" title="/pmwiki/pmwiki.php/Main/KnightTemplar"><span data-dcnode-id="3137" instrument_node="">Knight Templar</span></a><span data-dcnode-id="3135" instrument_node=""> or the outright bastard </span><a class="twikilink" data-dcnode-id="3133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HidingBehindReligion" title="/pmwiki/pmwiki.php/Main/HidingBehindReligion"><span data-dcnode-id="3134" instrument_node="">whose piety is nothing but a front</span></a><span data-dcnode-id="3132" instrument_node="">, this character will not hesitate to remind you at every opportunity how much more moral they are, and how you are just a "heathen" and "sinner" who is going to </span><a class="twikilink" data-dcnode-id="3130" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Hell" title="/pmwiki/pmwiki.php/Main/Hell"><span data-dcnode-id="3131" instrument_node="">Hell</span></a><span data-dcnode-id="3129" instrument_node=""> for not believing in their god. At the same time, they are likely to </span><a class="twikilink" data-dcnode-id="3127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PoliticallyIncorrectVillain" title="/pmwiki/pmwiki.php/Main/PoliticallyIncorrectVillain"><span data-dcnode-id="3128" instrument_node="">make bigoted insults</span></a><span data-dcnode-id="3126" instrument_node=""> and </span><a class="twikilink" data-dcnode-id="3124" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Hypocrite" title="/pmwiki/pmwiki.php/Main/Hypocrite"><span data-dcnode-id="3125" instrument_node="">engage in sins of their own</span></a><span data-dcnode-id="3123" instrument_node=""> — expect them to brush them off or have a </span><a class="twikilink" data-dcnode-id="3121" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NeverMyFault" title="/pmwiki/pmwiki.php/Main/NeverMyFault"><span data-dcnode-id="3122" instrument_node="">Never My Fault</span></a><span data-dcnode-id="3120" instrument_node=""> attitude about it. This is especially true if the cast is a bunch of </span><a class="twikilink" data-dcnode-id="3118" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Jerkass" title="/pmwiki/pmwiki.php/Main/Jerkass"><span data-dcnode-id="3119" instrument_node="">jerkasses</span></a><span data-dcnode-id="3117" instrument_node=""> anyway.
</span></p><div class="proper-ad-unit mobile-ad square_ad" data-dcnode-id="3110"><span class="ad-caption" data-dcnode-id="3114"><span data-dcnode-id="3115" instrument_node="">Advertisement:</span></span><div data-dcnode-id="3111" id="proper-ad-tvtropes_mobile_ad_1"></div></div><p data-dcnode-id="3096"><span data-dcnode-id="3109" instrument_node="">This one is so pervasive that finding an overtly religious character in media </span><em data-dcnode-id="3107"><span data-dcnode-id="3108" instrument_node="">and</span></em><span data-dcnode-id="3106" instrument_node=""> making him or her likable without promoting an </span><a class="twikilink" data-dcnode-id="3104" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Anvilicious" title="/pmwiki/pmwiki.php/Main/Anvilicious"><span data-dcnode-id="3105" instrument_node="">anvilicious</span></a><span data-dcnode-id="3103" instrument_node=""> agenda is difficult. This is especially so if the character is genuine clergy, although you might get lucky with a kind priest or monk of some sort. If you see one of these people in a slasher or horror movie, don't get too attached as they are often the first to </span><a class="twikilink" data-dcnode-id="3101" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SortingAlgorithmOfMortality" title="/pmwiki/pmwiki.php/Main/SortingAlgorithmOfMortality"><span data-dcnode-id="3102" instrument_node="">get killed</span></a><span data-dcnode-id="3100" instrument_node=""> in rather </span><a class="twikilink" data-dcnode-id="3098" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/JustForFun/HowToKillACharacter" title="/pmwiki/pmwiki.php/JustForFun/HowToKillACharacter"><span data-dcnode-id="3099" instrument_node="">nasty fashion</span></a><span data-dcnode-id="3097" instrument_node="">.
</span></p><p data-dcnode-id="3076"><span data-dcnode-id="3095" instrument_node="">If there are multiple clerical characters and some sort of </span><a class="twikilink" data-dcnode-id="3093" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ChristianityIsCatholic" title="/pmwiki/pmwiki.php/Main/ChristianityIsCatholic"><span data-dcnode-id="3094" instrument_node="">ranked hierarchy</span></a><span data-dcnode-id="3092" instrument_node="">, the higher ranking members </span><a class="twikilink" data-dcnode-id="3090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AristocratsAreEvil" title="/pmwiki/pmwiki.php/Main/AristocratsAreEvil"><span data-dcnode-id="3091" instrument_node="">are much more likely to be evil or corrupt</span></a><span data-dcnode-id="3089" instrument_node=""> and possibly so </span><em data-dcnode-id="3087"><span data-dcnode-id="3088" instrument_node="">because</span></em><span data-dcnode-id="3086" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3084" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AmbitionIsEvil" title="/pmwiki/pmwiki.php/Main/AmbitionIsEvil"><span data-dcnode-id="3085" instrument_node="">of their high rank</span></a><span data-dcnode-id="3083" instrument_node="">. This trope taken to its logical conclusion gets you the </span><a class="twikilink" data-dcnode-id="3081" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CorruptChurch" title="/pmwiki/pmwiki.php/Main/CorruptChurch"><span data-dcnode-id="3082" instrument_node="">Corrupt Church</span></a><span data-dcnode-id="3080" instrument_node=""> that thinks of itself as a </span><a class="twikilink" data-dcnode-id="3078" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SaintlyChurch" title="/pmwiki/pmwiki.php/Main/SaintlyChurch"><span data-dcnode-id="3079" instrument_node="">Saintly Church</span></a><span data-dcnode-id="3077" instrument_node="">.
</span></p><p data-dcnode-id="3068"><span data-dcnode-id="3075" instrument_node="">If news coverage emphasizes stories with a </span><a class="twikilink" data-dcnode-id="3073" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PedophilePriest" title="/pmwiki/pmwiki.php/Main/PedophilePriest"><span data-dcnode-id="3074" instrument_node="">priest molesting a child</span></a><span data-dcnode-id="3072" instrument_node=""> more as opposed to, say, </span><a class="twikilink" data-dcnode-id="3070" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TeacherStudentRomance" title="/pmwiki/pmwiki.php/Main/TeacherStudentRomance"><span data-dcnode-id="3071" instrument_node="">a teacher</span></a><span data-dcnode-id="3069" instrument_node="">, one reason is because though both hold positions of authority, priests are the ones (usually, but not always) who claim a moral superiority at the same time.
</span></p><div class="proper-ad-unit mobile-ad square_ad" data-dcnode-id="3062"><span class="ad-caption" data-dcnode-id="3066"><span data-dcnode-id="3067" instrument_node="">Advertisement:</span></span><div data-dcnode-id="3063" id="proper-ad-tvtropes_mobile_ad_2"></div></div><p data-dcnode-id="3060"><span data-dcnode-id="3061" instrument_node="">Note: Despite the above text, this trope is not limited to religious people, as it refers to anyone, both religious or non-religious, who considers themselves morally superior to others and this trait has been seen in people (in fiction and real-life) of any and all ideologies.
</span></p><p data-dcnode-id="3055"><span data-dcnode-id="3059" instrument_node="">The exact words "holier than thou" are found in the King James Version of Isaiah 65, though there in an example referring specifically to </span><em data-dcnode-id="3057"><span data-dcnode-id="3058" instrument_node="">insincere</span></em><span data-dcnode-id="3056" instrument_node=""> priests, who take part in unholy rituals and yet think themselves better than the common people:
</span></p><div class="indent" data-dcnode-id="3035"><span data-dcnode-id="3054" instrument_node="">2 I have spread out my hands all day to a rebellious people, which walketh in a way </span><em data-dcnode-id="3052"><span data-dcnode-id="3053" instrument_node="">that was</span></em><span data-dcnode-id="3051" instrument_node=""> not good, after their own thoughts; </span><br data-dcnode-id="3050"><span data-dcnode-id="3049" instrument_node="">3 A people that provoketh me to anger continually to my face; that sacrificeth in gardens, and burneth incense upon altars of brick; </span><br data-dcnode-id="3048"><span data-dcnode-id="3047" instrument_node="">4 Which remain among the graves, and lodge in the monuments, which eat swine's flesh, and broth of abominable </span><em data-dcnode-id="3045"><span data-dcnode-id="3046" instrument_node="">things is in</span></em><span data-dcnode-id="3044" instrument_node=""> their vessels; </span><br data-dcnode-id="3043"><span data-dcnode-id="3042" instrument_node="">5 Which say, Stand by thyself, come not near to me; for I am </span><strong data-dcnode-id="3040"><span data-dcnode-id="3041" instrument_node="">holier than thou</span></strong><span data-dcnode-id="3039" instrument_node="">. These </span><em data-dcnode-id="3037"><span data-dcnode-id="3038" instrument_node="">are</span></em><span data-dcnode-id="3036" instrument_node=""> a smoke in my nose, a fire that burneth all the day.
</span></div><div class="proper-ad-unit mobile-ad square_ad" data-dcnode-id="3029"><span class="ad-caption" data-dcnode-id="3033"><span data-dcnode-id="3034" instrument_node="">Advertisement:</span></span><div data-dcnode-id="3030" id="proper-ad-tvtropes_mobile_ad_3"></div></div><p data-dcnode-id="2988"><span data-dcnode-id="3028" instrument_node="">Subtrope of </span><a class="twikilink" data-dcnode-id="3026" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Pride" title="/pmwiki/pmwiki.php/Main/Pride"><span data-dcnode-id="3027" instrument_node="">Pride</span></a><span data-dcnode-id="3025" instrument_node="">. Contrast </span><a class="twikilink" data-dcnode-id="3023" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EvilerThanThou" title="/pmwiki/pmwiki.php/Main/EvilerThanThou"><span data-dcnode-id="3024" instrument_node="">Eviler Than Thou</span></a><span data-dcnode-id="3022" instrument_node="">, </span><a class="twikilink" data-dcnode-id="3020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MoreHeroThanThou" title="/pmwiki/pmwiki.php/Main/MoreHeroThanThou"><span data-dcnode-id="3021" instrument_node="">More Hero Than Thou</span></a><span data-dcnode-id="3019" instrument_node="">, </span><a class="twikilink" data-dcnode-id="3017" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GoodShepherd" title="/pmwiki/pmwiki.php/Main/GoodShepherd"><span data-dcnode-id="3018" instrument_node="">Good Shepherd</span></a><span data-dcnode-id="3016" instrument_node="">, and </span><a class="twikilink" data-dcnode-id="3014" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RealMenLoveJesus" title="/pmwiki/pmwiki.php/Main/RealMenLoveJesus"><span data-dcnode-id="3015" instrument_node="">Real Men Love Jesus</span></a><span data-dcnode-id="3013" instrument_node="">. Compare </span><a class="twikilink" data-dcnode-id="3011" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BlasphemousBoast" title="/pmwiki/pmwiki.php/Main/BlasphemousBoast"><span data-dcnode-id="3012" instrument_node="">Blasphemous Boast</span></a><span data-dcnode-id="3010" instrument_node=""> (in which "thou" is a god) </span><a class="twikilink" data-dcnode-id="3008" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EgocentricallyReligious" title="/pmwiki/pmwiki.php/Main/EgocentricallyReligious"><span data-dcnode-id="3009" instrument_node="">Egocentrically Religious</span></a><span data-dcnode-id="3007" instrument_node="">, </span><a class="twikilink" data-dcnode-id="3005" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheFundamentalist" title="/pmwiki/pmwiki.php/Main/TheFundamentalist"><span data-dcnode-id="3006" instrument_node="">The Fundamentalist</span></a><span data-dcnode-id="3004" instrument_node="">, </span><a class="twikilink" data-dcnode-id="3002" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HollywoodAtheist" title="/pmwiki/pmwiki.php/Main/HollywoodAtheist"><span data-dcnode-id="3003" instrument_node="">Hollywood Atheist</span></a><span data-dcnode-id="3001" instrument_node="">, and </span><a class="twikilink" data-dcnode-id="2999" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ReflexiveRemarkOfReverence" title="/pmwiki/pmwiki.php/Main/ReflexiveRemarkOfReverence"><span data-dcnode-id="3000" instrument_node="">Reflexive Remark of Reverence</span></a><span data-dcnode-id="2998" instrument_node="">. See also </span><a class="twikilink" data-dcnode-id="2996" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AcceptableTargets" title="/pmwiki/pmwiki.php/Main/AcceptableTargets"><span data-dcnode-id="2997" instrument_node="">Acceptable Targets</span></a><span data-dcnode-id="2995" instrument_node="">, </span><a class="twikilink" data-dcnode-id="2993" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/StrawHypocrite" title="/pmwiki/pmwiki.php/Main/StrawHypocrite"><span data-dcnode-id="2994" instrument_node="">Straw Hypocrite</span></a><span data-dcnode-id="2992" instrument_node="">. See also </span><a class="twikilink" data-dcnode-id="2990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RightlySelfRighteous" title="/pmwiki/pmwiki.php/Main/RightlySelfRighteous"><span data-dcnode-id="2991" instrument_node="">Rightly Self-Righteous</span></a><span data-dcnode-id="2989" instrument_node=""> if the character sees themselves as righteous because they truly are.
</span></p><p data-dcnode-id="2981"><a class="twikilink" data-dcnode-id="2986" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Administrivia/NoRealLifeExamplesPlease" title="/pmwiki/pmwiki.php/Administrivia/NoRealLifeExamplesPlease"><span data-dcnode-id="2987" instrument_node="">No Real Life Examples, Please!</span></a><span data-dcnode-id="2985" instrument_node="">. Nearly everyone in real-life, religious and non-religious, is like this at some point and who is displaying this behavior is often subjective; for example, it has seen much overuse as a </span><a class="twikilink" data-dcnode-id="2983" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AssociationFallacy" title="/pmwiki/pmwiki.php/Main/AssociationFallacy"><span data-dcnode-id="2984" instrument_node="">blanket accusation</span></a><span data-dcnode-id="2982" instrument_node=""> against religious people.
</span></p><hr data-dcnode-id="2980"><h2 data-dcnode-id="2978"><span data-dcnode-id="2979" instrument_node="">Examples:</span></h2><span data-dcnode-id="2977" instrument_node="">
</span><p data-dcnode-id="2976"></p><div class="folderlabel toggle-all-folders-button" data-dcnode-id="2974" onclick="toggleAllFolders();"><span data-dcnode-id="2975" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;open/close all folders&nbsp; </span></div><span data-dcnode-id="2973" instrument_node="">
</span><p data-dcnode-id="2972"></p><div class="folderlabel" data-dcnode-id="2970" onclick="togglefolder('folder0');"><span data-dcnode-id="2971" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Anime and Manga&nbsp;</span></div><div class="folder" data-dcnode-id="2865" id="folder0" isfolder="true" style="display:block;"><span data-dcnode-id="2969" instrument_node="">
</span><ul data-dcnode-id="2866"><li data-dcnode-id="2957"><span data-dcnode-id="2968" instrument_node=""> The majority of the Roman Catholic leadership and God's Right Seat from the magic side of </span><em data-dcnode-id="2965"><a class="twikilink" data-dcnode-id="2966" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/LightNovel/ACertainMagicalIndex" title="/pmwiki/pmwiki.php/LightNovel/ACertainMagicalIndex"><span data-dcnode-id="2967" instrument_node="">A Certain Magical Index</span></a></em><span data-dcnode-id="2964" instrument_node=""> are filled with this. To the point they don't see any issues with killing off the "unbelievers" and making "necessary sacrifices" out of the truly faithful. Ironically though, the head-honcho, the Pope, </span><a class="twikilink" data-dcnode-id="2962" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GoodRunningEvil" title="/pmwiki/pmwiki.php/Main/GoodRunningEvil"><span data-dcnode-id="2963" instrument_node="">is actually a pretty swell guy</span></a><span data-dcnode-id="2961" instrument_node=""> and </span><em data-dcnode-id="2959"><span data-dcnode-id="2960" instrument_node="">really</span></em><span data-dcnode-id="2958" instrument_node=""> sick of this attitude, noting the irony on how the common people put him on a pedestal compared to say, Archbishop Laura Stuart. Really, at least the Anglicans and the Japanese Catholics were pretty honest when they talk to Touma.
</span></li><li data-dcnode-id="2951"><span data-dcnode-id="2956" instrument_node=""> </span><em data-dcnode-id="2953"><a class="twikilink" data-dcnode-id="2954" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Manga/BlueExorcist" title="/pmwiki/pmwiki.php/Manga/BlueExorcist"><span data-dcnode-id="2955" instrument_node="">Blue Exorcist</span></a></em><span data-dcnode-id="2952" instrument_node="">: Paladin Arthur Auguste Angel makes sure that everyone knows how great he is.
</span></li><li data-dcnode-id="2942"><span data-dcnode-id="2950" instrument_node=""> The con artist Father Cornello from </span><em data-dcnode-id="2947"><a class="twikilink" data-dcnode-id="2948" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Manga/FullmetalAlchemist" title="/pmwiki/pmwiki.php/Manga/FullmetalAlchemist"><span data-dcnode-id="2949" instrument_node="">Fullmetal Alchemist</span></a></em><span data-dcnode-id="2946" instrument_node=""> puts on a </span><a class="twikilink" data-dcnode-id="2944" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GoodShepherd" title="/pmwiki/pmwiki.php/Main/GoodShepherd"><span data-dcnode-id="2945" instrument_node="">Good Shepherd</span></a><span data-dcnode-id="2943" instrument_node=""> front but he shows himself a self-righteous prick to Edward.
</span></li><li data-dcnode-id="2933"><span data-dcnode-id="2941" instrument_node=""> </span><em data-dcnode-id="2938"><a class="twikilink" data-dcnode-id="2939" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Manga/DeathNote" title="/pmwiki/pmwiki.php/Manga/DeathNote"><span data-dcnode-id="2940" instrument_node="">Death Note</span></a></em><span data-dcnode-id="2937" instrument_node=""> has Light argue that his morals and upbringing is enough to excuse his killing spree throughout the series. </span><span class="spoiler" data-dcnode-id="2935" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2936" instrument_node="">Near denies this once he proves Light is Kira and calls him a murderer.</span></span><span data-dcnode-id="2934" instrument_node="">
</span></li><li data-dcnode-id="2921"><span data-dcnode-id="2932" instrument_node=""> </span><em data-dcnode-id="2929"><a class="twikilink" data-dcnode-id="2930" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Anime/DragonBallSuper" title="/pmwiki/pmwiki.php/Anime/DragonBallSuper"><span data-dcnode-id="2931" instrument_node="">Dragon Ball Super</span></a></em><span data-dcnode-id="2928" instrument_node="">: Zamasu believes that he's more right than his fellow gods since he's willing to do something about the mortals who misuse the knowledge of the gods while they </span><a class="twikilink" data-dcnode-id="2926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheGodsMustBeLazy" title="/pmwiki/pmwiki.php/Main/TheGodsMustBeLazy"><span data-dcnode-id="2927" instrument_node="">sit back and do nothing</span></a><span data-dcnode-id="2925" instrument_node="">. This includes </span><span class="spoiler" data-dcnode-id="2923" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2924" instrument_node=""> murdering his fellow gods since they wouldn't agree with his ideals and would try to stop him</span></span><span data-dcnode-id="2922" instrument_node="">.
</span></li><li data-dcnode-id="2899"><span data-dcnode-id="2920" instrument_node=""> </span><em data-dcnode-id="2917"><a class="twikilink" data-dcnode-id="2918" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Manga/Hellsing" title="/pmwiki/pmwiki.php/Manga/Hellsing"><span data-dcnode-id="2919" instrument_node="">Hellsing</span></a></em><span data-dcnode-id="2916" instrument_node=""> has a couple of religious characters which are all Christian. The Hellsing organization is made up of Protestants and mostly not that holy (sans Integra) but the Catholic Iscariot Unit is </span><em data-dcnode-id="2913"><strong data-dcnode-id="2914"><span data-dcnode-id="2915" instrument_node="">really</span></strong></em><span data-dcnode-id="2912" instrument_node=""> into God and even if their badass mascot is rather likable his superior is anything but a </span><a class="twikilink" data-dcnode-id="2910" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NiceGuy" title="/pmwiki/pmwiki.php/Main/NiceGuy"><span data-dcnode-id="2911" instrument_node="">Nice Guy</span></a><span data-dcnode-id="2909" instrument_node="">.
</span><ul data-dcnode-id="2900"><li data-dcnode-id="2901"><span data-dcnode-id="2908" instrument_node=""> Rather unusually for this trope, they're a card-carrying version: as one of the Unit's goals is </span><a class="twikilink" data-dcnode-id="2906" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HellSeeker" title="/pmwiki/pmwiki.php/Main/HellSeeker"><span data-dcnode-id="2907" instrument_node="">personal damnation</span></a><span data-dcnode-id="2905" instrument_node=""> for its members they take pride in the </span><em data-dcnode-id="2903"><span data-dcnode-id="2904" instrument_node="">un</span></em><span data-dcnode-id="2902" instrument_node="">holiness of their acts in God's name.
</span></li></ul></li><li data-dcnode-id="2890"><span data-dcnode-id="2898" instrument_node=""> Michael from </span><em data-dcnode-id="2895"><a class="twikilink" data-dcnode-id="2896" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Manga/InnocentsShounenJuujigun" title="/pmwiki/pmwiki.php/Manga/InnocentsShounenJuujigun"><span data-dcnode-id="2897" instrument_node="">Innocents Shounen Juujigun</span></a></em><span data-dcnode-id="2894" instrument_node=""> is convinced that he's the paragon of Godly behavior, and that his rules are as good as law. . . . and that anyone who rejects the standards his church sets deserves to die. He also believes that </span><em data-dcnode-id="2892"><span data-dcnode-id="2893" instrument_node="">he</span></em><span data-dcnode-id="2891" instrument_node=""> is the true chosen child of God, not Etienne, and that the latter is nothing more than a heretic for even assuming he can take that role.
</span></li><li data-dcnode-id="2884"><span data-dcnode-id="2889" instrument_node=""> In </span><em data-dcnode-id="2886"><a class="twikilink" data-dcnode-id="2887" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/AudioPlay/SaintBeast" title="/pmwiki/pmwiki.php/AudioPlay/SaintBeast"><span data-dcnode-id="2888" instrument_node="">Saint Beast</span></a></em><span data-dcnode-id="2885" instrument_node="">, being a god and all Zeus considers himself above criticism despite being the most morally bankrupt occupant of heaven and no more holy by nature than any other race.
</span></li><li data-dcnode-id="2867"><span data-dcnode-id="2883" instrument_node=""> The </span><a class="twikilink" data-dcnode-id="2881" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OurDragonsAreDifferent" title="/pmwiki/pmwiki.php/Main/OurDragonsAreDifferent"><span data-dcnode-id="2882" instrument_node="">Golden Dragon</span></a><span data-dcnode-id="2880" instrument_node=""> Filia from the </span><em data-dcnode-id="2877"><a class="twikilink" data-dcnode-id="2878" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Anime/Slayers" title="/pmwiki/pmwiki.php/Anime/Slayers"><span data-dcnode-id="2879" instrument_node="">Slayers</span></a></em><span data-dcnode-id="2876" instrument_node=""> anime. She was sheltered for most of her life, but even after exposure to the outside world she acts like a snotty brat. </span><span class="spoiler" data-dcnode-id="2869" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2875" instrument_node=""> When realizes the truth, </span><a class="twikilink" data-dcnode-id="2873" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BreakTheCutie" title="/pmwiki/pmwiki.php/Main/BreakTheCutie"><span data-dcnode-id="2874" instrument_node="">her mind splinters</span></a><span data-dcnode-id="2872" instrument_node=""> but she comes out of the experience a kinder and humbler person and so closer to the </span><a class="twikilink" data-dcnode-id="2870" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GoodShepherd" title="/pmwiki/pmwiki.php/Main/GoodShepherd"><span data-dcnode-id="2871" instrument_node="">Good Shepherd</span></a></span><span data-dcnode-id="2868" instrument_node="">.
</span></li></ul></div><span data-dcnode-id="2864" instrument_node="">

</span><ul data-dcnode-id="2722"><li data-dcnode-id="2852"><span data-dcnode-id="2859" instrument_node=""> Another comic-book Catholic exception: Doctor Mid-Nite from the </span><a class="twikilink" data-dcnode-id="2857" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/ComicBook/JusticeSocietyOfAmerica" title="/pmwiki/pmwiki.php/ComicBook/JusticeSocietyOfAmerica"><span data-dcnode-id="2858" instrument_node="">Justice Society of America</span></a><span data-dcnode-id="2856" instrument_node="">, who saves lives all day every day, attends church regularly, </span><em data-dcnode-id="2854"><span data-dcnode-id="2855" instrument_node="">and</span></em><span data-dcnode-id="2853" instrument_node=""> is BFFs with staunch atheist Mister Terrific.
</span></li><li data-dcnode-id="2847"><span data-dcnode-id="2851" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2849" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/WilhelmBusch" title="/pmwiki/pmwiki.php/Creator/WilhelmBusch"><span data-dcnode-id="2850" instrument_node="">Wilhelm Busch</span></a><span data-dcnode-id="2848" instrument_node=""> criticized the Catholic church several times in his stories for this. (Busch had witnessed how the pilgrims to a famous Bavarian monastery wouldn't be above having fun in the bushes around it.)
</span></li><li data-dcnode-id="2821"><span data-dcnode-id="2846" instrument_node=""> Implied in </span><em data-dcnode-id="2842"><a class="twikilink" data-dcnode-id="2844" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/ComicBook/Fables" title="/pmwiki/pmwiki.php/ComicBook/Fables"><span data-dcnode-id="2845" instrument_node="">Fables</span></a><span data-dcnode-id="2843" instrument_node="">: Legends In Exile</span></em><span data-dcnode-id="2841" instrument_node=""> when describing "The kingdom of the Great Lion fell, and again we did nothing, because we always found the old lion to be a bit too pompous and holier-than-thou for our tastes." This is a </span><a class="twikilink" data-dcnode-id="2839" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ShoutOut" title="/pmwiki/pmwiki.php/Main/ShoutOut"><span data-dcnode-id="2840" instrument_node="">Shout-Out</span></a><span data-dcnode-id="2838" instrument_node=""> (or a </span><a class="twikilink" data-dcnode-id="2836" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TakeThat" title="/pmwiki/pmwiki.php/Main/TakeThat"><span data-dcnode-id="2837" instrument_node="">Take That!</span></a><span data-dcnode-id="2835" instrument_node="">) to </span><em data-dcnode-id="2832"><a class="twikilink" data-dcnode-id="2833" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/TheChroniclesOfNarnia" title="/pmwiki/pmwiki.php/Literature/TheChroniclesOfNarnia"><span data-dcnode-id="2834" instrument_node="">Narnia</span></a></em><span data-dcnode-id="2831" instrument_node="">.
</span><ul data-dcnode-id="2822"><li data-dcnode-id="2823"><span data-dcnode-id="2830" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WordOfGod" title="/pmwiki/pmwiki.php/Main/WordOfGod"><span data-dcnode-id="2829" instrument_node="">Word of God</span></a><span data-dcnode-id="2827" instrument_node=""> from series writer Bill Willingham is that many readers, both the "Hey, he's hatin' on Narnia!" and "Yeah, you show that stupid Narnia!" crowd didn't pick up the importance of the context this description was given in. Like the "Oddness" of Oz, the "Holier Than Thou" derogatory remarks were the excuse the other Fable Homelands used to justify ignoring the fall of these worlds. He's on the record as stating that he loves the Narnia books and characters. The later arc </span><em data-dcnode-id="2825"><span data-dcnode-id="2826" instrument_node="">The Good Prince</span></em><span data-dcnode-id="2824" instrument_node=""> includes a much more positive cameo by Aslan, and he's on the record as hoping that the rights to use the characters might clear up one day.
</span></li></ul></li><li data-dcnode-id="2815"><span data-dcnode-id="2820" instrument_node=""> </span><em data-dcnode-id="2817"><a class="twikilink" data-dcnode-id="2818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/ComicBook/Galactus" title="/pmwiki/pmwiki.php/ComicBook/Galactus"><span data-dcnode-id="2819" instrument_node="">Galactus</span></a></em><span data-dcnode-id="2816" instrument_node=""> is occasionally written like this in regards to his rightfullness in eating planets. He's also a rare justified example, as Galactus is destined to one day use the energy from the planets he destroyed to ensure that the universe gets reincarnated, and is imperial to keep the balance between Eternity and Death.
</span></li><li data-dcnode-id="2806"><span data-dcnode-id="2814" instrument_node=""> Cardinal Roark of the </span><em data-dcnode-id="2811"><a class="twikilink" data-dcnode-id="2812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/ComicBook/SinCity" title="/pmwiki/pmwiki.php/ComicBook/SinCity"><span data-dcnode-id="2813" instrument_node="">Sin City</span></a></em><span data-dcnode-id="2810" instrument_node=""> story "The Hard Goodbye," who used the mob, a police death squad, and a silent and deadly farm boy cannibal whose proclivities he shared in order to do his dirty work. Too bad he was also </span><a class="twikilink" data-dcnode-id="2808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheManBehindTheCurtain" title="/pmwiki/pmwiki.php/Main/TheManBehindTheCurtain"><span data-dcnode-id="2809" instrument_node="">The Man Behind the Curtain</span></a><span data-dcnode-id="2807" instrument_node="">. However, Marv is shown to be a practicing Catholic as well, and he wears a cross around his neck.
</span></li><li data-dcnode-id="2783"><span data-dcnode-id="2805" instrument_node=""> Averted by the </span><em data-dcnode-id="2802"><a class="twikilink" data-dcnode-id="2803" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Comicbook/XMen" title="/pmwiki/pmwiki.php/Comicbook/XMen"><span data-dcnode-id="2804" instrument_node="">X-Men</span></a></em><span data-dcnode-id="2801" instrument_node="">'s Nightcrawler, a charming and playful character who's also a devout Catholic. Though given how many writers' hands he's been through, somebody might have used him to play this trope straight at some point or another.
</span><ul data-dcnode-id="2784"><li data-dcnode-id="2790"><span data-dcnode-id="2800" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/ComicBook/UltimateXMen" title="/pmwiki/pmwiki.php/ComicBook/UltimateXMen"><span data-dcnode-id="2799" instrument_node="">Ultimate Universe</span></a><span data-dcnode-id="2797" instrument_node=""> Nightcrawler declares his friend Colossus an "abomination" or some such when he finds out the poor guy is gay. Then again, </span><em data-dcnode-id="2795"><span data-dcnode-id="2796" instrument_node="">everyone</span></em><span data-dcnode-id="2794" instrument_node=""> is a </span><a class="twikilink" data-dcnode-id="2792" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Superdickery" title="/pmwiki/pmwiki.php/Main/Superdickery"><span data-dcnode-id="2793" instrument_node="">dick</span></a><span data-dcnode-id="2791" instrument_node=""> in the Ultiverse and this version of him isn't particularly religious.
</span></li><li data-dcnode-id="2785"><span data-dcnode-id="2789" instrument_node=""> Rev. William Stryker is a more straight example of this trope in the </span><a class="twikilink" data-dcnode-id="2787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/ComicBook/XMen" title="/pmwiki/pmwiki.php/ComicBook/XMen"><span data-dcnode-id="2788" instrument_node="">X-Men</span></a><span data-dcnode-id="2786" instrument_node=""> universe, who is a televangelist and a "devoted Christian" who was willing to murder his own son and wife.
</span></li></ul></li><li data-dcnode-id="2734"><span data-dcnode-id="2782" instrument_node=""> Joked about in </span><em data-dcnode-id="2779"><a class="twikilink" data-dcnode-id="2780" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/ComicBook/TheCartoonHistoryOfTheUniverse" title="/pmwiki/pmwiki.php/ComicBook/TheCartoonHistoryOfTheUniverse"><span data-dcnode-id="2781" instrument_node="">The Cartoon History of the Universe</span></a></em><span data-dcnode-id="2778" instrument_node=""> during the introduction to Indian religion: Two men standing in the Ganges during the </span><a class="urllink" data-dcnode-id="2775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/Kumbh_Mela"><span data-dcnode-id="2777" instrument_node="">Kumbh Mela</span><img data-dcnode-id="2776" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="2774" instrument_node="">:
</span><div class="indent" data-dcnode-id="2735"><strong data-dcnode-id="2772"><span data-dcnode-id="2773" instrument_node="">Man with giant beard:</span></strong><span data-dcnode-id="2771" instrument_node=""> </span><em data-dcnode-id="2769"><span data-dcnode-id="2770" instrument_node="">I</span></em><span data-dcnode-id="2768" instrument_node=""> am </span><em data-dcnode-id="2766"><span data-dcnode-id="2767" instrument_node="">holier</span></em><span data-dcnode-id="2765" instrument_node=""> than </span><em data-dcnode-id="2763"><span data-dcnode-id="2764" instrument_node="">thou</span></em><span data-dcnode-id="2762" instrument_node="">! </span><br data-dcnode-id="2761"><strong data-dcnode-id="2759"><span data-dcnode-id="2760" instrument_node="">Man with smaller beard:</span></strong><span data-dcnode-id="2758" instrument_node=""> (</span><em data-dcnode-id="2754"><span data-dcnode-id="2757" instrument_node="">enraged, </span><a class="twikilink" data-dcnode-id="2755" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GivingSomeoneThePointerFinger" title="/pmwiki/pmwiki.php/Main/GivingSomeoneThePointerFinger"><span data-dcnode-id="2756" instrument_node="">pointing</span></a></em><span data-dcnode-id="2753" instrument_node="">) </span><em data-dcnode-id="2751"><span data-dcnode-id="2752" instrument_node="">What was that?!</span></em><span data-dcnode-id="2750" instrument_node=""> </span><br data-dcnode-id="2749"><strong data-dcnode-id="2747"><span data-dcnode-id="2748" instrument_node="">Man with giant beard:</span></strong><span data-dcnode-id="2746" instrument_node=""> I </span><em data-dcnode-id="2744"><span data-dcnode-id="2745" instrument_node="">said</span></em><span data-dcnode-id="2743" instrument_node="">, "I am holier than thou!" </span><br data-dcnode-id="2742"><strong data-dcnode-id="2740"><span data-dcnode-id="2741" instrument_node="">Man with smaller beard:</span></strong><span data-dcnode-id="2739" instrument_node=""> (</span><em data-dcnode-id="2737"><span data-dcnode-id="2738" instrument_node="">smiling</span></em><span data-dcnode-id="2736" instrument_node="">) Oh, never mind then. I thought you said, "I am holier than a cow."
</span></div></li><li data-dcnode-id="2723"><span data-dcnode-id="2733" instrument_node=""> </span><em data-dcnode-id="2730"><a class="twikilink" data-dcnode-id="2731" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/ComicBook/TarotWitchOfTheBlackRose" title="/pmwiki/pmwiki.php/ComicBook/TarotWitchOfTheBlackRose"><span data-dcnode-id="2732" instrument_node="">Tarot: Witch of the Black Rose</span></a></em><span data-dcnode-id="2729" instrument_node="">:
</span><ul data-dcnode-id="2724"><li data-dcnode-id="2727"><span data-dcnode-id="2728" instrument_node=""> Raven Hex frequently harbors delusions of being the greatest proponent that witchcraft has ever seen. This was proven wrong when she tried to rally all of the many covens together, and most of the other witches refused to listen to her bullshit.
</span></li><li data-dcnode-id="2725"><span data-dcnode-id="2726" instrument_node=""> Played straight and subverted respectively with a Christian woman and a priest Tarot runs into during one her many "they hate me cause I'm a witch" angsts: the woman castigates Tarot as a sinner and harlot before the priest dresses said woman down for failing to "judge not." The priest then apologizes to Tarot, and holds a brief friendly conversation with her.
</span></li></ul></li></ul><ul data-dcnode-id="2702"><li data-dcnode-id="2715"><span data-dcnode-id="2720" instrument_node=""> The Commonwealth in </span><em data-dcnode-id="2717"><a class="twikilink" data-dcnode-id="2718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/ComicBook/BatmanHolyTerror" title="/pmwiki/pmwiki.php/ComicBook/BatmanHolyTerror"><span data-dcnode-id="2719" instrument_node="">Batman: Holy Terror</span></a></em><span data-dcnode-id="2716" instrument_node=""> is a theocratic empire that took over the United States and sees its brand of Puritanism as real Christianity, as they spread it by dominating Catholic nations in the Western Hemisphere such as Brazil and Peru.
</span></li><li data-dcnode-id="2703"><span data-dcnode-id="2714" instrument_node=""> </span><em data-dcnode-id="2711"><a class="twikilink" data-dcnode-id="2712" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/ComicBook/WonderWoman" title="/pmwiki/pmwiki.php/ComicBook/WonderWoman"><span data-dcnode-id="2713" instrument_node="">Wonder Woman</span></a></em><span data-dcnode-id="2710" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2708" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/ComicBook/WonderWoman2006" title="/pmwiki/pmwiki.php/ComicBook/WonderWoman2006"><span data-dcnode-id="2709" instrument_node="">Vol 3</span></a><span data-dcnode-id="2707" instrument_node="">: Zeus thinks himself morally upright especially in comparison to Ares, when in honesty he's decidedly </span><em data-dcnode-id="2705"><span data-dcnode-id="2706" instrument_node="">worse</span></em><span data-dcnode-id="2704" instrument_node=""> than Ares. They're both unrepentant manipulative mass murderers but at least Ares isn't a misogynistic serial rapist who has committed multiple genocides and is upfront about the fact that he's a backstabber while Zeus refuses to admit he has any shortcomings of his own and is homicidally offended any time anyone insinuates he might be in the wrong.
</span></li></ul></div><span data-dcnode-id="2700" instrument_node="">
</span><p data-dcnode-id="2699"></p><div class="folderlabel" data-dcnode-id="2697" onclick="togglefolder('folder2');"><span data-dcnode-id="2698" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Fan Works&nbsp;</span></div><div class="folder" data-dcnode-id="2652" id="folder2" isfolder="true" style="display:block;"><span data-dcnode-id="2696" instrument_node="">
</span><ul data-dcnode-id="2653"><li data-dcnode-id="2690"><span data-dcnode-id="2695" instrument_node=""> In the </span><em data-dcnode-id="2692"><a class="twikilink" data-dcnode-id="2693" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Fanfic/EmpathTheLuckiestSmurf" title="/pmwiki/pmwiki.php/Fanfic/EmpathTheLuckiestSmurf"><span data-dcnode-id="2694" instrument_node="">Empath: The Luckiest Smurf</span></a></em><span data-dcnode-id="2691" instrument_node=""> story "I Dream Of Smurfette", Tapper is accused of being "smurfier-than-thou" by Hefty when the two of them along with Handy and Greedy are standing together watching Smurfette go off on her business. Tapper, who is a Christian that is far from the type who would exemplify this trope, simply comments on why looking at Smurfette is more important than their going about their own business.
</span></li><li data-dcnode-id="2675"><span data-dcnode-id="2689" instrument_node=""> In the </span><em data-dcnode-id="2685"><a class="urllink" data-dcnode-id="2686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//parahumans.wordpress.com/"><span data-dcnode-id="2688" instrument_node="">Worm</span><img data-dcnode-id="2687" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a></em><span data-dcnode-id="2684" instrument_node=""> fanfic </span><em data-dcnode-id="2680"><a class="urllink" data-dcnode-id="2681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fanfiction.net/s/10286919/1/Recoil"><span data-dcnode-id="2683" instrument_node="">Recoil</span><img data-dcnode-id="2682" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a></em><span data-dcnode-id="2679" instrument_node="">, Taylor Hebert travels back twenty-two years and gets to know her paternal grandmother rather better than she had originally. This sweet old lady is fervently Christian, and equally fervently </span><a class="twikilink" data-dcnode-id="2677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MoralGuardian" title="/pmwiki/pmwiki.php/Main/MoralGuardian"><span data-dcnode-id="2678" instrument_node="">anti-gay</span></a><span data-dcnode-id="2676" instrument_node="">. The latter causes a few problems later on ...
</span></li><li data-dcnode-id="2654"><span data-dcnode-id="2674" instrument_node=""> </span><em data-dcnode-id="2671"><a class="twikilink" data-dcnode-id="2672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/FanFic/RosarioVampireBrightestDarkness" title="/pmwiki/pmwiki.php/FanFic/RosarioVampireBrightestDarkness"><span data-dcnode-id="2673" instrument_node="">Rosario Vampire: Brightest Darkness</span></a></em><span data-dcnode-id="2670" instrument_node="">: Jenner Rythmore, the </span><a class="twikilink" data-dcnode-id="2668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Jerkass" title="/pmwiki/pmwiki.php/Main/Jerkass"><span data-dcnode-id="2669" instrument_node="">Jerkass</span></a><span data-dcnode-id="2667" instrument_node=""> head of the </span><a class="twikilink" data-dcnode-id="2665" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CreatureHunterOrganization" title="/pmwiki/pmwiki.php/Main/CreatureHunterOrganization"><span data-dcnode-id="2666" instrument_node="">HDA</span></a><span data-dcnode-id="2664" instrument_node="">, is firmly convinced that monsters are </span><a class="twikilink" data-dcnode-id="2662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AlwaysChaoticEvil" title="/pmwiki/pmwiki.php/Main/AlwaysChaoticEvil"><span data-dcnode-id="2663" instrument_node="">Always Chaotic Evil</span></a><span data-dcnode-id="2661" instrument_node=""> and declares open war on them at the first opportunity. Ceal sums him up as such in Act VI; Jenner rants about how monsters are all the same and do nothing but lie and kill, to which Ceal retorts that </span><a class="twikilink" data-dcnode-id="2659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HumansAreTheRealMonsters" title="/pmwiki/pmwiki.php/Main/HumansAreTheRealMonsters"><span data-dcnode-id="2660" instrument_node="">humans are hardly any different</span></a><span data-dcnode-id="2658" instrument_node="">, that Jenner speaks as if humans are all universally good and pure, and declares that for all his talk about wanting to protect humanity, all Jenner </span><em data-dcnode-id="2656"><span data-dcnode-id="2657" instrument_node="">really</span></em><span data-dcnode-id="2655" instrument_node=""> is is a human who thinks he's above monsters just because he's human.
</span></li></ul></div><span data-dcnode-id="2651" instrument_node="">
</span><p data-dcnode-id="2650"></p><div class="folderlabel" data-dcnode-id="2648" onclick="togglefolder('folder3');"><span data-dcnode-id="2649" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Films — Animation&nbsp;</span></div><div class="folder" data-dcnode-id="2624" id="folder3" isfolder="true" style="display:block;"><span data-dcnode-id="2647" instrument_node="">
</span><ul data-dcnode-id="2625"><li data-dcnode-id="2632"><span data-dcnode-id="2646" instrument_node=""> </span><em data-dcnode-id="2643"><a class="twikilink" data-dcnode-id="2644" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WesternAnimation/TheHunchbackOfNotreDameDisney" title="/pmwiki/pmwiki.php/WesternAnimation/TheHunchbackOfNotreDameDisney"><span data-dcnode-id="2645" instrument_node="">The Hunchback of Notre Dame</span></a></em><span data-dcnode-id="2642" instrument_node="">: Frollo's main defining trait throughout the movie. He thinks that he's better than the rest of Paris' citizens - even though the Archdeacon has to stop him from committing infanticide in the first </span><em data-dcnode-id="2640"><span data-dcnode-id="2641" instrument_node="">ten minutes</span></em><span data-dcnode-id="2639" instrument_node="">. He even starts his </span><em data-dcnode-id="2637"><span data-dcnode-id="2638" instrument_node="">prayers</span></em><span data-dcnode-id="2636" instrument_node=""> by mentioning how proud of himself he is, </span><a class="twikilink" data-dcnode-id="2634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PrideBeforeAFall" title="/pmwiki/pmwiki.php/Main/PrideBeforeAFall"><span data-dcnode-id="2635" instrument_node="">without ever noticing the irony.</span></a><span data-dcnode-id="2633" instrument_node="">
</span></li><li data-dcnode-id="2626"><span data-dcnode-id="2631" instrument_node=""> In </span><em data-dcnode-id="2628"><a class="twikilink" data-dcnode-id="2629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WesternAnimation/LovingVincent" title="/pmwiki/pmwiki.php/WesternAnimation/LovingVincent"><span data-dcnode-id="2630" instrument_node="">Loving Vincent</span></a></em><span data-dcnode-id="2627" instrument_node="">, Louise Chevalier is a churchgoing Christian, and also incredibly judgmental towards Vincent and the unruly youths of Auvers.
</span></li></ul></div><span data-dcnode-id="2623" instrument_node="">

</span><ul data-dcnode-id="2514"><li data-dcnode-id="2613"><span data-dcnode-id="2618" instrument_node=""> In </span><em data-dcnode-id="2615"><a class="twikilink" data-dcnode-id="2616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/TheBakersWife" title="/pmwiki/pmwiki.php/Film/TheBakersWife"><span data-dcnode-id="2617" instrument_node="">The Baker's Wife</span></a></em><span data-dcnode-id="2614" instrument_node="">, the vicar gets on everybody's nerves with his condescending air of superiority.
</span></li><li data-dcnode-id="2607"><span data-dcnode-id="2612" instrument_node=""> The Inquisitor Pucci from the 2005 version of </span><em data-dcnode-id="2609"><a class="twikilink" data-dcnode-id="2610" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/Casanova" title="/pmwiki/pmwiki.php/Film/Casanova"><span data-dcnode-id="2611" instrument_node="">Casanova</span></a></em><span data-dcnode-id="2608" instrument_node="">, played by Jeremy Irons. Rather than speaking about forgiveness, redemption, or any attempt to save the souls of those ostensibly under his care as a member of the Church, Pucci's goals all seem to revolve around control. There also appears to be an entire order of nuns willing to add another notch to Casanova's bedpost. When admonished for risking (or perhaps earning, in the eyes of the inquisitor) eternal damnation for a single night with Casanova, the response is "seems fair."
</span></li><li data-dcnode-id="2601"><span data-dcnode-id="2606" instrument_node=""> In </span><em data-dcnode-id="2603"><a class="createlink" data-dcnode-id="2604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/DaddysDyinWhosGotTheWill" title="/pmwiki/pmwiki.php/Film/DaddysDyinWhosGotTheWill"><span data-dcnode-id="2605" instrument_node="">Daddys Dyin Whos Got The Will</span></a></em><span data-dcnode-id="2602" instrument_node="">, Lurlene Turnover is a minister's wife who uses her supposed devotion to her faith to make herself feel better about the fact that she and her husband are nearly broke after years of poor financial decisions.
</span></li><li data-dcnode-id="2595"><span data-dcnode-id="2600" instrument_node=""> In </span><em data-dcnode-id="2597"><a class="twikilink" data-dcnode-id="2598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/TheDirtyDozen" title="/pmwiki/pmwiki.php/Film/TheDirtyDozen"><span data-dcnode-id="2599" instrument_node="">The Dirty Dozen</span></a></em><span data-dcnode-id="2596" instrument_node="">, Maggott tries to justify his murder and alleged rape of women through his special interpretation of Holy Scripture. He's still the most evil character in the entire movie. And in a movie of Nazis vs. criminals, that's really saying something.
</span></li><li data-dcnode-id="2582"><span data-dcnode-id="2594" instrument_node=""> Marianne and her Christian group in </span><em data-dcnode-id="2591"><a class="twikilink" data-dcnode-id="2592" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/EasyA" title="/pmwiki/pmwiki.php/Film/EasyA"><span data-dcnode-id="2593" instrument_node="">Easy A</span></a></em><span data-dcnode-id="2590" instrument_node=""> who protest everything they can think of, such as changing the school mascot from a Blue Devil to a Woodchuck and getting Olive (who accidentally starts and maintains a rumor about being a slut) expelled before "saving" her. It's especially frustrating since </span><span class="spoiler" data-dcnode-id="2588" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2589" instrument_node="">her boyfriend is actually sleeping with the guidance councilor, who gives him chlamydia</span></span><span data-dcnode-id="2587" instrument_node="">. The movie makes a point to equate their views to the views of the townsfolk in </span><em data-dcnode-id="2584"><a class="twikilink" data-dcnode-id="2585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/TheScarletLetter" title="/pmwiki/pmwiki.php/Literature/TheScarletLetter"><span data-dcnode-id="2586" instrument_node="">The Scarlet Letter</span></a></em><span data-dcnode-id="2583" instrument_node=""> (unsurprisingly, since the film is loosely based on the book).
</span></li><li data-dcnode-id="2570"><span data-dcnode-id="2581" instrument_node=""> </span><em data-dcnode-id="2578"><a class="twikilink" data-dcnode-id="2579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/GodzillaKingOfTheMonsters" title="/pmwiki/pmwiki.php/Film/GodzillaKingOfTheMonsters"><span data-dcnode-id="2580" instrument_node="">Godzilla: King of the Monsters</span></a></em><span data-dcnode-id="2577" instrument_node="">: </span><a class="twikilink" data-dcnode-id="2575" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Characters/MonsterVerseHumans" title="/pmwiki/pmwiki.php/Characters/MonsterVerseHumans"><span data-dcnode-id="2576" instrument_node="">Mark Russell</span></a><span data-dcnode-id="2574" instrument_node=""> is the non-religious type. It's subtle but his attitude when chastising his colleagues for not agreeing with his biased views on killing the Titans or recreating the ORCA are definitively high-and-mighty. Notably, he has the gall to talk as if he has the moral highground over everyone around him during both his </span><a class="twikilink" data-dcnode-id="2572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Hypocrite" title="/pmwiki/pmwiki.php/Main/Hypocrite"><span data-dcnode-id="2573" instrument_node="">Hypocrite</span></a><span data-dcnode-id="2571" instrument_node=""> moments. That being said, he's not immune to recognizing he's wrong when someone actually calls him out on his bullshit or when he sees the negative results.
</span></li><li data-dcnode-id="2554"><span data-dcnode-id="2569" instrument_node=""> The 1991 Kevin Costner </span><em data-dcnode-id="2566"><a class="twikilink" data-dcnode-id="2567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/RobinHoodPrinceOfThieves" title="/pmwiki/pmwiki.php/Film/RobinHoodPrinceOfThieves"><span data-dcnode-id="2568" instrument_node="">Robin Hood</span></a></em><span data-dcnode-id="2565" instrument_node=""> movie plays it both straight and subverted. The bishop is firmly pro-sheriff, to the point of embracing the sheriff's devil-worshiping religion and even helps marry him to Marian at the sheriff's Satanic altar (despite the latter flatly refusing), and tries to flee with gold when Locksley storms the castle. On the other hand, Friar Tuck, the down-to-earth churchman, is not only wise, sympathetic and friendly, but can drink sacramental wine and beer with the best of them. What's more, he gets so incensed at the bishop's greed and corruption he </span><a class="twikilink" data-dcnode-id="2563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DestinationDefenestration" title="/pmwiki/pmwiki.php/Main/DestinationDefenestration"><span data-dcnode-id="2564" instrument_node="">defenestrates the bishop from a tower</span></a><span data-dcnode-id="2562" instrument_node=""> with enough gold and "</span><a class="twikilink" data-dcnode-id="2560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BiblicalBadGuy" title="/pmwiki/pmwiki.php/Main/BiblicalBadGuy"><span data-dcnode-id="2561" instrument_node="">thirty pieces of silver</span></a><span data-dcnode-id="2559" instrument_node=""> to pay the Devil on </span><em data-dcnode-id="2556"><strong data-dcnode-id="2557"><span data-dcnode-id="2558" instrument_node="">your way to Hell!</span></strong></em><span data-dcnode-id="2555" instrument_node="">"
</span></li><li data-dcnode-id="2548"><span data-dcnode-id="2553" instrument_node=""> Ridley Scott's </span><em data-dcnode-id="2550"><a class="twikilink" data-dcnode-id="2551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/RobinHood2010" title="/pmwiki/pmwiki.php/Film/RobinHood2010"><span data-dcnode-id="2552" instrument_node="">Robin Hood (2010)</span></a></em><span data-dcnode-id="2549" instrument_node=""> features a subplot in which the Church is taxing the peasants unfairly. Initially, Friar Tuck is reluctant to help out of fear of persecution, but eventually ends up helping Robin to begin robbing their wagons and stealing the grain back.
</span></li><li data-dcnode-id="2542"><span data-dcnode-id="2547" instrument_node=""> Father in </span><em data-dcnode-id="2544"><a class="twikilink" data-dcnode-id="2545" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/TheSacrament" title="/pmwiki/pmwiki.php/Film/TheSacrament"><span data-dcnode-id="2546" instrument_node="">The Sacrament</span></a></em><span data-dcnode-id="2543" instrument_node=""> claims to be this. At the end of the film, we see him snorting coke and it's implied he's having sex with Caroline.
</span></li><li data-dcnode-id="2515"><span data-dcnode-id="2541" instrument_node=""> </span><em data-dcnode-id="2538"><a class="twikilink" data-dcnode-id="2539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/Saved" title="/pmwiki/pmwiki.php/Film/Saved"><span data-dcnode-id="2540" instrument_node="">Saved!</span></a></em><span data-dcnode-id="2537" instrument_node="">:
</span><ul data-dcnode-id="2516"><li data-dcnode-id="2535"><span data-dcnode-id="2536" instrument_node=""> Many of the religious characters are cheating, lying hypocrites who are only concerned with their own image. The decent people are hated and ostracized by the religious ones. Incidentally, the movie is set in the modern-day Midwestern United States.
</span></li><li data-dcnode-id="2530"><span data-dcnode-id="2534" instrument_node=""> The movie ends, however, with the lead character, a formerly evangelical Christian who was ostracized by her school's Christian </span><a class="twikilink" data-dcnode-id="2532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GirlPosse" title="/pmwiki/pmwiki.php/Main/GirlPosse"><span data-dcnode-id="2533" instrument_node="">Girl Posse</span></a><span data-dcnode-id="2531" instrument_node=""> for getting pregnant, realizing that faith is not exclusively the province of these harsh fundamentalists, and seeking a more open and accepting form of Christianity which embraces others instead of judging them.
</span></li><li data-dcnode-id="2525"><span data-dcnode-id="2529" instrument_node=""> The protagonist's gay childhood friend and her </span><a class="twikilink" data-dcnode-id="2527" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LoveInterest" title="/pmwiki/pmwiki.php/Main/LoveInterest"><span data-dcnode-id="2528" instrument_node="">Love Interest</span></a><span data-dcnode-id="2526" instrument_node=""> avert this. Also, her mother, while not 100% on top of things, is still very sympathetic and religious.
</span></li><li data-dcnode-id="2517"><span data-dcnode-id="2524" instrument_node=""> Most characters in this movie could be considered religious people. And while some of them use it to justify truly </span><a class="twikilink" data-dcnode-id="2522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Jerkass" title="/pmwiki/pmwiki.php/Main/Jerkass"><span data-dcnode-id="2523" instrument_node="">jerkass</span></a><span data-dcnode-id="2521" instrument_node=""> behavior (or rather, rationalize the jerkass thing they want to do with a religious excuse), most of them are shown struggling with their faith at one point or another, even the </span><a class="twikilink" data-dcnode-id="2519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AlphaBitch" title="/pmwiki/pmwiki.php/Main/AlphaBitch"><span data-dcnode-id="2520" instrument_node="">Alpha Bitch</span></a><span data-dcnode-id="2518" instrument_node="">.
</span></li></ul></li></ul></div><span data-dcnode-id="2512" instrument_node="">
</span><p data-dcnode-id="2511"></p><div class="folderlabel" data-dcnode-id="2509" onclick="togglefolder('folder5');"><span data-dcnode-id="2510" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Literature&nbsp;</span></div><div class="folder" data-dcnode-id="2057" id="folder5" isfolder="true" style="display:block;"><span data-dcnode-id="2508" instrument_node="">
</span><ul data-dcnode-id="2273"><li data-dcnode-id="2466"><span data-dcnode-id="2507" instrument_node=""> There is an interesting portrayal of this in </span><a class="twikilink" data-dcnode-id="2505" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/JaneAusten" title="/pmwiki/pmwiki.php/Creator/JaneAusten"><span data-dcnode-id="2506" instrument_node="">Jane Austen</span></a><span data-dcnode-id="2504" instrument_node="">'s </span><em data-dcnode-id="2501"><a class="twikilink" data-dcnode-id="2502" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/MansfieldPark" title="/pmwiki/pmwiki.php/Literature/MansfieldPark"><span data-dcnode-id="2503" instrument_node="">Mansfield Park</span></a></em><span data-dcnode-id="2500" instrument_node="">. On one hand, it is </span><a class="twikilink" data-dcnode-id="2498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PlayedStraight" title="/pmwiki/pmwiki.php/Main/PlayedStraight"><span data-dcnode-id="2499" instrument_node="">Played Straight</span></a><span data-dcnode-id="2497" instrument_node=""> with Sir Thomas Bertram, who remains an innocent with </span><a class="twikilink" data-dcnode-id="2495" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/IncorruptiblePurePureness" title="/pmwiki/pmwiki.php/Main/IncorruptiblePurePureness"><span data-dcnode-id="2496" instrument_node="">Incorruptible Pure Pureness</span></a><span data-dcnode-id="2494" instrument_node="">. On the other hand, he despises anyone he sees as inferior, doesn't try to hear their justifications, and ends up an </span><a class="twikilink" data-dcnode-id="2492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AccompliceByInaction" title="/pmwiki/pmwiki.php/Main/AccompliceByInaction"><span data-dcnode-id="2493" instrument_node="">Accomplice by Inaction</span></a><span data-dcnode-id="2491" instrument_node=""> to his daughters' selfish antics and to his sons' self-destructive behaviors because he doesn't want to accept that, maybe, there might be a problem he didn't consider. Meanwhile, he forces his niece Fanny to obey him, because he will never listen to a poor girl with no instruction </span><em data-dcnode-id="2489"><span data-dcnode-id="2490" instrument_node="">who dares to have self-esteem</span></em><span data-dcnode-id="2488" instrument_node="">.
</span><ul data-dcnode-id="2467"><li data-dcnode-id="2468"><span data-dcnode-id="2487" instrument_node=""> His niece herself is also a </span><a class="twikilink" data-dcnode-id="2485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/StopHavingFunGuy" title="/pmwiki/pmwiki.php/Main/StopHavingFunGuy"><span data-dcnode-id="2486" instrument_node="">Stop Having Fun Guy</span></a><span data-dcnode-id="2484" instrument_node=""> who sometimes feels superior, but she genuinely loves everyone and listens to their pleas, and </span><a class="twikilink" data-dcnode-id="2482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheReliableOne" title="/pmwiki/pmwiki.php/Main/TheReliableOne"><span data-dcnode-id="2483" instrument_node="">Fanny is the only one really trying to control the damage</span></a><span data-dcnode-id="2481" instrument_node="">, the only one to see others' </span><a class="twikilink" data-dcnode-id="2479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HiddenDepths" title="/pmwiki/pmwiki.php/Main/HiddenDepths"><span data-dcnode-id="2480" instrument_node="">Hidden Depths</span></a><span data-dcnode-id="2478" instrument_node=""> and </span><a class="twikilink" data-dcnode-id="2476" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TurnTheOtherCheek" title="/pmwiki/pmwiki.php/Main/TurnTheOtherCheek"><span data-dcnode-id="2477" instrument_node="">the only one to always forgive</span></a><span data-dcnode-id="2475" instrument_node="">, </span><a class="twikilink" data-dcnode-id="2473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/StoicWoobie" title="/pmwiki/pmwiki.php/Main/StoicWoobie"><span data-dcnode-id="2474" instrument_node="">never lash out</span></a><span data-dcnode-id="2472" instrument_node="">, </span><a class="twikilink" data-dcnode-id="2470" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/IWantMyBelovedToBeHappy" title="/pmwiki/pmwiki.php/Main/IWantMyBelovedToBeHappy"><span data-dcnode-id="2471" instrument_node="">and wish for her beloved to be happy despite her own prospects</span></a><span data-dcnode-id="2469" instrument_node="">. Despite all that, she still has crippling self-esteem issues because she's not sure that she is right, just sure that all the depraved people she has to deal with are not.
</span></li></ul></li><li data-dcnode-id="2445"><span data-dcnode-id="2465" instrument_node=""> </span><em data-dcnode-id="2463"><span data-dcnode-id="2464" instrument_node="">Only a Woman Can Take This Sort of Abuse</span></em><span data-dcnode-id="2462" instrument_node=""> (</span><a class="twikilink" data-dcnode-id="2460" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/ForgottenRealms" title="/pmwiki/pmwiki.php/Literature/ForgottenRealms"><span data-dcnode-id="2461" instrument_node="">Forgotten Realms</span></a><span data-dcnode-id="2459" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2457" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SideStoryBonusArt" title="/pmwiki/pmwiki.php/Main/SideStoryBonusArt"><span data-dcnode-id="2458" instrument_node="">Spin-a-Yarn story</span></a><span data-dcnode-id="2456" instrument_node="">) used this straight and then doubled back: a paladin shrank back from a </span><a class="twikilink" data-dcnode-id="2454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AlwaysChaoticEvil" title="/pmwiki/pmwiki.php/Main/AlwaysChaoticEvil"><span data-dcnode-id="2455" instrument_node="">drow</span></a><span data-dcnode-id="2453" instrument_node=""> and...
</span><div class="indent" data-dcnode-id="2446"><strong data-dcnode-id="2451"><span data-dcnode-id="2452" instrument_node="">Laeral</span></strong><span data-dcnode-id="2450" instrument_node="">: ...And you needn't recoil from Qilué. She's personally consecrated to </span><em data-dcnode-id="2448"><span data-dcnode-id="2449" instrument_node="">two</span></em><span data-dcnode-id="2447" instrument_node=""> goddesses and is more holy than you can ever hope to be.
</span></div></li><li data-dcnode-id="2421"><span data-dcnode-id="2444" instrument_node=""> The spinster Emily Brent from </span><em data-dcnode-id="2441"><a class="twikilink" data-dcnode-id="2442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/AndThenThereWereNone" title="/pmwiki/pmwiki.php/Literature/AndThenThereWereNone"><span data-dcnode-id="2443" instrument_node="">And Then There Were None</span></a></em><span data-dcnode-id="2440" instrument_node=""> disowns her maid when she gets pregnant, claiming it's because the girl doesn't fit in her household anymore for not following the Word of God. Said maid is </span><a class="twikilink" data-dcnode-id="2438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DrivenToSuicide" title="/pmwiki/pmwiki.php/Main/DrivenToSuicide"><span data-dcnode-id="2439" instrument_node="">Driven to Suicide</span></a><span data-dcnode-id="2437" instrument_node=""> and Emily shows no remorse (though she has some disturbing visions in the course of the story). </span><span class="spoiler" data-dcnode-id="2435" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2436" instrument_node=""> Judge Wargrave</span></span><span data-dcnode-id="2434" instrument_node=""> finds out, though, and in the mysterious island where action takes place he poisons her as punishment </span><span class="spoiler" data-dcnode-id="2429" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2433" instrument_node=""> and a part of his </span><a class="twikilink" data-dcnode-id="2431" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EvilPlan" title="/pmwiki/pmwiki.php/Main/EvilPlan"><span data-dcnode-id="2432" instrument_node="">Evil Plan</span></a><span data-dcnode-id="2430" instrument_node=""> to kill everyone</span></span><span data-dcnode-id="2428" instrument_node="">.
</span><ul data-dcnode-id="2422"><li data-dcnode-id="2423"><span data-dcnode-id="2427" instrument_node=""> </span><span class="spoiler" data-dcnode-id="2425" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2426" instrument_node=""> Not too surprisingly, the video game chose Emily Brent as its new "surprise" killer.</span></span><span data-dcnode-id="2424" instrument_node="">
</span></li></ul></li><li data-dcnode-id="2409"><span data-dcnode-id="2420" instrument_node=""> Mostly averted in </span><a class="twikilink" data-dcnode-id="2418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/EllisPeters" title="/pmwiki/pmwiki.php/Creator/EllisPeters"><span data-dcnode-id="2419" instrument_node="">Ellis Peters</span></a><span data-dcnode-id="2417" instrument_node="">' </span><em data-dcnode-id="2414"><a class="twikilink" data-dcnode-id="2415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/BrotherCadfael" title="/pmwiki/pmwiki.php/Literature/BrotherCadfael"><span data-dcnode-id="2416" instrument_node="">Brother Cadfael</span></a></em><span data-dcnode-id="2413" instrument_node=""> mysteries, where devout Brother Cadfael and his fellow Benedictine monks are credibly well-meaning and conscious of their own moral imperfections. Prior Roberts, though arrogant and annoying, also has his good points, and the toadying Jerome </span><span class="spoiler" data-dcnode-id="2411" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2412" instrument_node="">is so remorseful as to suffer a nervous breakdown after striking someone down out of anger</span></span><span data-dcnode-id="2410" instrument_node="">. Villains occasionally do fall under this trope, but their hypocrisy and/or intolerance is soundly refuted by more moderate clergymen, often using genuine scripture to back up their arguments.
</span></li><li data-dcnode-id="2400"><span data-dcnode-id="2408" instrument_node=""> In </span><em data-dcnode-id="2405"><a class="twikilink" data-dcnode-id="2406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/Bumped" title="/pmwiki/pmwiki.php/Literature/Bumped"><span data-dcnode-id="2407" instrument_node="">Bumped</span></a></em><span data-dcnode-id="2404" instrument_node="">, Harmony is like this, being from the Amish-like cult Goodside. She is convinced that she must convert her long lost twin sister Melody to Christianity and stop her from being a surrogate for a family at age 16. It is revealed, however, that </span><span class="spoiler" data-dcnode-id="2402" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2403" instrument_node=""> she ran away from her husband a few days after marrying him because she was unsure about women's role in Goodside as (basically) baby makers.</span></span><span data-dcnode-id="2401" instrument_node="">
