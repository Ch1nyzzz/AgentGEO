</span></li><li data-dcnode-id="2342"><span data-dcnode-id="2399" instrument_node=""> Both averted and used straight in </span><em data-dcnode-id="2396"><a class="twikilink" data-dcnode-id="2397" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/Discworld" title="/pmwiki/pmwiki.php/Literature/Discworld"><span data-dcnode-id="2398" instrument_node="">Discworld</span></a></em><span data-dcnode-id="2395" instrument_node=""> books, as everything else. </span><em data-dcnode-id="2392"><a class="twikilink" data-dcnode-id="2393" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/SmallGods" title="/pmwiki/pmwiki.php/Literature/SmallGods"><span data-dcnode-id="2394" instrument_node="">Small Gods</span></a></em><span data-dcnode-id="2391" instrument_node=""> centers around the religious country of Omnia, so while most priests are good-naturedly idiotic or afraid, some are genuinely good, and the head of the Quisition is bone-tremblingly evil - but Brutha, the protagonist, is the only person who genuinely believes in Om any more. On the other hand, several decades later, in </span><em data-dcnode-id="2388"><a class="twikilink" data-dcnode-id="2389" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/CarpeJugulum" title="/pmwiki/pmwiki.php/Literature/CarpeJugulum"><span data-dcnode-id="2390" instrument_node="">Carpe Jugulum</span></a></em><span data-dcnode-id="2387" instrument_node="">, Mightily Oats is presented as a literally conflicted priest who certainly </span><em data-dcnode-id="2385"><span data-dcnode-id="2386" instrument_node="">wants</span></em><span data-dcnode-id="2384" instrument_node=""> what's good but can't always decide what that is.
</span><ul data-dcnode-id="2343"><li data-dcnode-id="2344"><span data-dcnode-id="2383" instrument_node=""> Mightily Oats is an interesting example, though: unlike Brutha, who is quietly, staunchly religious all the way through </span><em data-dcnode-id="2380"><a class="twikilink" data-dcnode-id="2381" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/SmallGods" title="/pmwiki/pmwiki.php/Literature/SmallGods"><span data-dcnode-id="2382" instrument_node="">Small Gods</span></a></em><span data-dcnode-id="2379" instrument_node="">, Oats starts out a pretty wishy-washy missionary - </span><span class="spoiler" data-dcnode-id="2364" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2378" instrument_node="">until the vampires get to Granny Weatherwax, crippling her, and Oats is forced to flee the monsters through the dark forest in a downpour while this nasty, godless old... </span><em data-dcnode-id="2375"><a class="twikilink" data-dcnode-id="2376" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GoshDarnItToHeck" title="/pmwiki/pmwiki.php/Main/GoshDarnItToHeck"><span data-dcnode-id="2377" instrument_node="">biddy</span></a></em><span data-dcnode-id="2374" instrument_node=""> needles him incessantly about his faith. He finally snaps at her, and she replies that if </span><em data-dcnode-id="2372"><span data-dcnode-id="2373" instrument_node="">she</span></em><span data-dcnode-id="2371" instrument_node=""> had a god who she thought was genuinely good and gave a damn about humanity, </span><a class="twikilink" data-dcnode-id="2369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ChurchMilitant" title="/pmwiki/pmwiki.php/Main/ChurchMilitant"><span data-dcnode-id="2370" instrument_node="">her faith would be so fierce it burned, and no argument could make her doubt it</span></a><span data-dcnode-id="2368" instrument_node="">. From then on, Oats undergoes a sort of transformation, realizing religion is more than his holy books (which he burns for a very necessary fire) or his turtle pendant (which he shouldn't have hung on such a cheap chain), and culminating in his faith becoming </span><a class="twikilink" data-dcnode-id="2366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BadassPreacher" title="/pmwiki/pmwiki.php/Main/BadassPreacher"><span data-dcnode-id="2367" instrument_node="">pretty damn fierce indeed</span></a><span data-dcnode-id="2365" instrument_node="">.</span></span><span data-dcnode-id="2363" instrument_node="">
</span><ul data-dcnode-id="2345"><li data-dcnode-id="2346"><span data-dcnode-id="2362" instrument_node=""> A brief mention in one of the later novels suggests he's become something of a </span><a class="twikilink" data-dcnode-id="2360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BadassPreacher" title="/pmwiki/pmwiki.php/Main/BadassPreacher"><span data-dcnode-id="2361" instrument_node="">Badass Preacher</span></a><span data-dcnode-id="2359" instrument_node=""> who </span><a class="twikilink" data-dcnode-id="2357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AnAxeToGrind" title="/pmwiki/pmwiki.php/Main/AnAxeToGrind"><span data-dcnode-id="2358" instrument_node="">walks with</span></a><span data-dcnode-id="2356" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ICallItVera" title="/pmwiki/pmwiki.php/Main/ICallItVera"><span data-dcnode-id="2355" instrument_node="">Forgiveness on his back</span></a><span data-dcnode-id="2353" instrument_node=""> against </span><a class="twikilink" data-dcnode-id="2351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Uberwald" title="/pmwiki/pmwiki.php/Main/Uberwald"><span data-dcnode-id="2352" instrument_node="">Überwald</span></a><span data-dcnode-id="2350" instrument_node="">'s darker creatures. And "Forgiveness" is an axe. A </span><em data-dcnode-id="2348"><span data-dcnode-id="2349" instrument_node="">big</span></em><span data-dcnode-id="2347" instrument_node=""> axe.
</span></li></ul></li></ul></li><li data-dcnode-id="2336"><span data-dcnode-id="2341" instrument_node=""> The Brontës liked this trope; the schoolmaster, Mr. Brocklehurst, in </span><em data-dcnode-id="2338"><a class="twikilink" data-dcnode-id="2339" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/JaneEyre" title="/pmwiki/pmwiki.php/Literature/JaneEyre"><span data-dcnode-id="2340" instrument_node="">Jane Eyre</span></a></em><span data-dcnode-id="2337" instrument_node=""> is a hypocritical clergyman who forces the girls under his charge to live in deprivation and, eventually, disease under the excuse that it is God's will that they be cured of their sins through Christian austerity, whilst simultaneously fleecing the joint and ensuring that he and his family live in obscene luxury.
</span></li><li data-dcnode-id="2316"><span data-dcnode-id="2335" instrument_node=""> In </span><a class="twikilink" data-dcnode-id="2333" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/MysteriousWaysADivineComedy" title="/pmwiki/pmwiki.php/Literature/MysteriousWaysADivineComedy"><span data-dcnode-id="2334" instrument_node="">Mysterious Ways: A Divine Comedy</span></a><span data-dcnode-id="2332" instrument_node="">, this is played for laughs. Almost the entire angel race fits this trope. Despite being an entirely mortal genus of birds, they claim to be of divine origin, descended directly from the Judeo-Christian God.
</span><ul data-dcnode-id="2317"><li data-dcnode-id="2330"><span data-dcnode-id="2331" instrument_node=""> Every angel is given a choice between training to be a "divine servant", or having their wings cut off and their magic stripped away. This is rationalized by the belief that angels are created specifically to act as divine servants, and if they're not going to do that, they don't really need wings or magic.
</span></li><li data-dcnode-id="2325"><span data-dcnode-id="2329" instrument_node=""> Angels also have their own branch of Christianity, characterized by a refusal to allow any non-angels to serve as priests, because they "don't want to hear about God from one of His rejects." To be fair, several of the regular Christian churches have banned angels from even </span><em data-dcnode-id="2327"><span data-dcnode-id="2328" instrument_node="">attending</span></em><span data-dcnode-id="2326" instrument_node=""> mass. (Again, to be fair, it's because of all the incidents of angels accusing the priest of not having proper authority to speak for God.)
</span></li><li data-dcnode-id="2320"><span data-dcnode-id="2324" instrument_node=""> To be fair, they </span><em data-dcnode-id="2322"><span data-dcnode-id="2323" instrument_node="">are</span></em><span data-dcnode-id="2321" instrument_node=""> better at divine magic that other creatures like humans, and they make an effort to lend a hand to those in need. Well, except for non-Christians. Or 'cubi. Or homosexuals. Or anyone that has had recreational sex.
</span></li><li data-dcnode-id="2318"><span data-dcnode-id="2319" instrument_node=""> They also insist that angels only have sex while possessed by the Holy Spirit, so that they can claim God is the father, and they are thus the only true "Children of God".
</span></li></ul></li><li data-dcnode-id="2307"><span data-dcnode-id="2315" instrument_node=""> </span><em data-dcnode-id="2312"><a class="twikilink" data-dcnode-id="2313" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/TheHost2008" title="/pmwiki/pmwiki.php/Literature/TheHost2008"><span data-dcnode-id="2314" instrument_node="">The Host (2008)</span></a></em><span data-dcnode-id="2311" instrument_node=""> has the souls. They see themselves as better than most species, especially humans, as they are peace-loving, refuse to use violence (unless a soul has the job of a Seeker, which includes hunting and finding new host bodies, with violence if necessary) and repeatedly say that they have 'improved' Earth and other planets they have taken over before. </span><a class="twikilink" data-dcnode-id="2309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Hypocrite" title="/pmwiki/pmwiki.php/Main/Hypocrite"><span data-dcnode-id="2310" instrument_node="">The fact that they are blatantly killing off species on the planets never occurs to them as violent or evil</span></a><span data-dcnode-id="2308" instrument_node="">.
</span></li><li data-dcnode-id="2280"><span data-dcnode-id="2306" instrument_node=""> In Octavia Butler's </span><em data-dcnode-id="2303"><a class="twikilink" data-dcnode-id="2304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/ParableOfTheSower" title="/pmwiki/pmwiki.php/Literature/ParableOfTheSower"><span data-dcnode-id="2305" instrument_node="">Parable of the Talents</span></a></em><span data-dcnode-id="2302" instrument_node="">, this seems to be the </span><a class="twikilink" data-dcnode-id="2300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PlanetOfHats" title="/pmwiki/pmwiki.php/Main/PlanetOfHats"><span data-dcnode-id="2301" instrument_node="">hat</span></a><span data-dcnode-id="2299" instrument_node=""> of the Church of Christian America. Notable examples:
</span><ul data-dcnode-id="2281"><li data-dcnode-id="2297"><span data-dcnode-id="2298" instrument_node=""> Early in the book, Marcus Duran is rescued by his sister, who is in the process of founding a new religion. He decides to try to convert her followers to Christianity by convincing them that Earthseed is nonsense — without bothering to find out what Earthseed actually teaches. He then leaves, graciously forgiving his sister for the fact that her followers pointed out his mistakes.
</span></li><li data-dcnode-id="2292"><span data-dcnode-id="2296" instrument_node=""> The guards at the Camp Christian reeducation facility are devoted to teaching their prisoners to be good, hardworking Christians. They consider themselves (of course) to be better people than their prisoners — despite making the prisoners do </span><em data-dcnode-id="2294"><span data-dcnode-id="2295" instrument_node="">all</span></em><span data-dcnode-id="2293" instrument_node=""> of the work, and letting several of them die of overwork and lack of medical attention.
</span></li><li data-dcnode-id="2290"><span data-dcnode-id="2291" instrument_node=""> Reverend Chandler Benton likes to preach sermons on the evils of every form of sexual behavior he does not indulge in. His sermons mention, for example, homosexuality. They do not mention rape.
</span></li><li data-dcnode-id="2282"><span data-dcnode-id="2289" instrument_node=""> Later in the book, Marcus Duran, now a minister of Christian America, </span><span class="spoiler" data-dcnode-id="2284" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2288" instrument_node=""> tries to tell his sister — who was enslaved and tortured, and had her daughter Larkin kidnapped, by members of Christian America — that she should join the church to find her daughter. She doesn't. When he later finds Larkin, he </span><em data-dcnode-id="2286"><span data-dcnode-id="2287" instrument_node="">doesn't tell his sister where she is</span></em><span data-dcnode-id="2285" instrument_node="">, because he thinks she's better off being raised by emotionally abusive Christian Americans than by her non-Christian mother</span></span><span data-dcnode-id="2283" instrument_node="">.
</span></li></ul></li><li data-dcnode-id="2274"><span data-dcnode-id="2279" instrument_node=""> </span><em data-dcnode-id="2276"><a class="twikilink" data-dcnode-id="2277" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/ThePower" title="/pmwiki/pmwiki.php/Literature/ThePower"><span data-dcnode-id="2278" instrument_node="">The Power</span></a></em><span data-dcnode-id="2275" instrument_node="">: Allie's foster parents make a big deal about them being good, upstanding Christians, her mother even congratulating herself over their charitable act of taking her in. Yet although they both believe they're better than other people, they're also horribly abusive to Allie, and use their religious beliefs to justify this for themselves.
</span></li></ul><ul data-dcnode-id="2253"><li data-dcnode-id="2263"><span data-dcnode-id="2271" instrument_node=""> </span><em data-dcnode-id="2268"><a class="twikilink" data-dcnode-id="2269" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/SongAtDawn" title="/pmwiki/pmwiki.php/Literature/SongAtDawn"><span data-dcnode-id="2270" instrument_node="">Song at Dawn</span></a></em><span data-dcnode-id="2267" instrument_node="">: This attitude can be found in Marcabu who uses his ballads to scold everyone about how they're failing to live up to God's expectations with their </span><a class="twikilink" data-dcnode-id="2265" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CourtlyLove" title="/pmwiki/pmwiki.php/Main/CourtlyLove"><span data-dcnode-id="2266" instrument_node="">Courtly Love</span></a><span data-dcnode-id="2264" instrument_node=""> and excess and inability to reclaim the Holy Land.
</span></li><li data-dcnode-id="2254"><span data-dcnode-id="2262" instrument_node=""> </span><em data-dcnode-id="2259"><a class="twikilink" data-dcnode-id="2260" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/SpecialCircumstances" title="/pmwiki/pmwiki.php/Literature/SpecialCircumstances"><span data-dcnode-id="2261" instrument_node="">Special Circumstances</span></a></em><span data-dcnode-id="2258" instrument_node="">: </span><a class="twikilink" data-dcnode-id="2256" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AvertedTrope" title="/pmwiki/pmwiki.php/Main/AvertedTrope"><span data-dcnode-id="2257" instrument_node="">Soundly thrashed</span></a><span data-dcnode-id="2255" instrument_node=""> by Barbara. She goes out of her way to avoid such types, detesting the type.
</span></li></ul><ul data-dcnode-id="2201"><li data-dcnode-id="2233"><span data-dcnode-id="2250" instrument_node=""> Downright defied in </span><em data-dcnode-id="2247"><a class="twikilink" data-dcnode-id="2248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/TheDresdenFiles" title="/pmwiki/pmwiki.php/Literature/TheDresdenFiles"><span data-dcnode-id="2249" instrument_node="">The Dresden Files</span></a></em><span data-dcnode-id="2246" instrument_node=""> by Michael Carpenter, one of the Knights of the Cross. He's strongly religious and unafraid to show it, but is also a genuinely nice guy unless you're a demon or a similarly irredeemably evil being. And even then he's usually at least polite. Harry specifically lampshades that Michael is </span><em data-dcnode-id="2244"><span data-dcnode-id="2245" instrument_node="">righteous</span></em><span data-dcnode-id="2243" instrument_node="">, not </span><em data-dcnode-id="2241"><span data-dcnode-id="2242" instrument_node="">self-righteous</span></em><span data-dcnode-id="2240" instrument_node="">, and notes there's a </span><em data-dcnode-id="2238"><span data-dcnode-id="2239" instrument_node="">big</span></em><span data-dcnode-id="2237" instrument_node=""> difference between the two.
</span><ul data-dcnode-id="2234"><li data-dcnode-id="2235"><span data-dcnode-id="2236" instrument_node=""> He even tries to offers Nicodemus, a 2000-year-old guy who shares a body with a demon and has killed countless people, a chance to turn back from his evil ways over the phone. Granted, Nicodemus just laughed at him, but he still tried.
</span></li></ul></li><li data-dcnode-id="2211"><span data-dcnode-id="2232" instrument_node=""> Most of the high-up churchmen in David Eddings' </span><em data-dcnode-id="2230"><span data-dcnode-id="2231" instrument_node="">The Elenium/Tamuli</span></em><span data-dcnode-id="2229" instrument_node=""> series avert this, but one Cordz of Nelan appears for a few pages in </span><em data-dcnode-id="2227"><span data-dcnode-id="2228" instrument_node="">The Tamuli</span></em><span data-dcnode-id="2226" instrument_node="">. Cordz has concluded that he is "the perfect man" because he follows the Scriptures, leading him to spy on his neighbors for things to denounce at church, and if he can't see in, he just dreams up something imperfect he </span><em data-dcnode-id="2224"><span data-dcnode-id="2225" instrument_node="">thinks</span></em><span data-dcnode-id="2223" instrument_node=""> they might be doing, and denounces them for that. As Eddings put it:
</span><div class="indent" data-dcnode-id="2219"><a class="twikilink" data-dcnode-id="2221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LemonyNarrator" title="/pmwiki/pmwiki.php/Main/LemonyNarrator"><span data-dcnode-id="2222" instrument_node="">He probably irritated the Devil. God knows he irritated his neighbours</span></a><span data-dcnode-id="2220" instrument_node="">.
</span></div><ul data-dcnode-id="2212"><li data-dcnode-id="2213"><span data-dcnode-id="2218" instrument_node=""> In </span><em data-dcnode-id="2215"><a class="twikilink" data-dcnode-id="2216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/TheBelgariad" title="/pmwiki/pmwiki.php/Literature/TheBelgariad"><span data-dcnode-id="2217" instrument_node="">The Belgariad</span></a></em><span data-dcnode-id="2214" instrument_node=""> Relg, an Ulgo with the ability to pass through stone, aggravates his companions with his incredible self-righteousness. After he's confronted with his own hypocrisy he turns self-hating for a while, but eventually mellows out.
</span></li></ul></li><li data-dcnode-id="2202"><span data-dcnode-id="2210" instrument_node=""> Claude Frollo, in both the original </span><em data-dcnode-id="2207"><a class="twikilink" data-dcnode-id="2208" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/TheHunchbackOfNotreDame" title="/pmwiki/pmwiki.php/Literature/TheHunchbackOfNotreDame"><span data-dcnode-id="2209" instrument_node="">The Hunchback of Notre Dame</span></a></em><span data-dcnode-id="2206" instrument_node=""> and the Disney movie. </span><a class="twikilink" data-dcnode-id="2204" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Disneyfication" title="/pmwiki/pmwiki.php/Main/Disneyfication"><span data-dcnode-id="2205" instrument_node="">Disneyfication</span></a><span data-dcnode-id="2203" instrument_node=""> tempers the trope a little by demoting Frollo from Archdeacon of the Cathedral to a judge, and giving the job of Archdeacon to a much nicer fellow.
</span></li></ul><ul data-dcnode-id="2193"><li data-dcnode-id="2194"><span data-dcnode-id="2199" instrument_node=""> This is how Ambrosio in </span><em data-dcnode-id="2196"><a class="twikilink" data-dcnode-id="2197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/TheMonk" title="/pmwiki/pmwiki.php/Literature/TheMonk"><span data-dcnode-id="2198" instrument_node="">The Monk</span></a></em><span data-dcnode-id="2195" instrument_node=""> justifies having sex with Matilda even after he exposed a young nun for having a lover. He's convinced he's just that awesome.
</span></li></ul><ul data-dcnode-id="2058"><li data-dcnode-id="2186"><span data-dcnode-id="2191" instrument_node=""> Both averted and played straight in Ken Follet's </span><em data-dcnode-id="2188"><a class="twikilink" data-dcnode-id="2189" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/ThePillarsOfTheEarth" title="/pmwiki/pmwiki.php/Literature/ThePillarsOfTheEarth"><span data-dcnode-id="2190" instrument_node="">The Pillars of the Earth</span></a></em><span data-dcnode-id="2187" instrument_node="">. Bishop Waleran is a scheming, manipulative, selfish jerk who exploits his office for personal and political gain. The protagonist, Prior Philip, is a humble, genuinely devout man who seemingly has no limit to his compassion. The strongest example is near the end, where after Waleran's schemes come crashing down, depriving him of everything and leaving him a penniless beggar, Prior Philip forgives him and takes him into the Monastery. This is despite Waleran being personally responsible for most of Philip's troubles for over a decade, including the death of several of Philip's friends.
</span></li><li data-dcnode-id="2174"><span data-dcnode-id="2185" instrument_node=""> In </span><em data-dcnode-id="2182"><a class="twikilink" data-dcnode-id="2183" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/TheWheelOfTime" title="/pmwiki/pmwiki.php/Literature/TheWheelOfTime"><span data-dcnode-id="2184" instrument_node="">The Wheel of Time</span></a></em><span data-dcnode-id="2181" instrument_node="">: The Children of the Light, and many of the Aes Sedai (especially those of the Red Ajah). The Children of the Light were a mixed bunch. Eamon Valda was a nasty piece of work, and the Questioners were deep in </span><a class="twikilink" data-dcnode-id="2179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/KnightTemplar" title="/pmwiki/pmwiki.php/Main/KnightTemplar"><span data-dcnode-id="2180" instrument_node="">Knight Templar</span></a><span data-dcnode-id="2178" instrument_node=""> territory, but Pedron Niall seemed genuine, if a tad cynically pragmatic, and later </span><span class="spoiler" data-dcnode-id="2176" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2177" instrument_node="">Galad</span></span><span data-dcnode-id="2175" instrument_node=""> definitely had his heart in the right place.
</span></li><li data-dcnode-id="2168"><span data-dcnode-id="2173" instrument_node=""> Joseph in </span><em data-dcnode-id="2170"><a class="twikilink" data-dcnode-id="2171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/WutheringHeights" title="/pmwiki/pmwiki.php/Literature/WutheringHeights"><span data-dcnode-id="2172" instrument_node="">Wuthering Heights</span></a></em><span data-dcnode-id="2169" instrument_node=""> is a bullying, work-shy and snide man nevertheless full of pious sermons for anyone who crosses his path.
</span></li><li data-dcnode-id="2159"><span data-dcnode-id="2167" instrument_node=""> The saintly Bishop Myriel in </span><em data-dcnode-id="2164"><a class="twikilink" data-dcnode-id="2165" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/LesMiserables" title="/pmwiki/pmwiki.php/Literature/LesMiserables"><span data-dcnode-id="2166" instrument_node="">Les Misérables</span></a></em><span data-dcnode-id="2163" instrument_node=""> is one of the biggest aversions of this trope out there. He donates most of his salary to the poor, lives in humble surroundings so the fancy house designated for him can be used as a hospital for the sick. When he gives paroled convict Jean Valjean a meal and a place to sleep, Valjean </span><a class="twikilink" data-dcnode-id="2161" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/UngratefulBastard" title="/pmwiki/pmwiki.php/Main/UngratefulBastard"><span data-dcnode-id="2162" instrument_node="">repays him by stealing the church's silverware</span></a><span data-dcnode-id="2160" instrument_node="">. When the police capture Valjean and bring him back, Myriel lies to them and supports Valjean's claim that Myriel gave him the silver as a gift. When the police let him go, Myriel tells Valjean to sell the silver and use the proceeds to live an honest life. It inspires Valjean to do just that, and help other people.
</span></li><li data-dcnode-id="2147"><span data-dcnode-id="2158" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2156" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BigBad" title="/pmwiki/pmwiki.php/Main/BigBad"><span data-dcnode-id="2157" instrument_node="">Big Bad</span></a><span data-dcnode-id="2155" instrument_node=""> Dr. Fritz Emmenberger in </span><em data-dcnode-id="2152"><a class="twikilink" data-dcnode-id="2153" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/Suspicion" title="/pmwiki/pmwiki.php/Literature/Suspicion"><span data-dcnode-id="2154" instrument_node="">Suspicion</span></a></em><span data-dcnode-id="2151" instrument_node=""> by Swiss author </span><em data-dcnode-id="2149"><span data-dcnode-id="2150" instrument_node="">Friedrich Dürrenmatt</span></em><span data-dcnode-id="2148" instrument_node=""> believes his morality to be superior and is disgusted with the lack of faith in anything he sees in his fellow human beings.
</span></li><li data-dcnode-id="2142"><span data-dcnode-id="2146" instrument_node=""> The father of the title character in Colby Rodowsky's </span><em data-dcnode-id="2144"><span data-dcnode-id="2145" instrument_node="">Lucy Peale</span></em><span data-dcnode-id="2143" instrument_node="">, who regularly gives soapbox speeches about sin in the local town and kicks Lucy out of his house because she won't stand up at one of his revival meetings and denounce her unborn illegitimate child.
</span></li><li data-dcnode-id="2122"><span data-dcnode-id="2141" instrument_node=""> </span><em data-dcnode-id="2138"><a class="twikilink" data-dcnode-id="2139" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/TheHouseOfNight" title="/pmwiki/pmwiki.php/Literature/TheHouseOfNight"><span data-dcnode-id="2140" instrument_node="">The House of Night</span></a></em><span data-dcnode-id="2137" instrument_node="">:
</span><ul data-dcnode-id="2123"><li data-dcnode-id="2126"><span data-dcnode-id="2136" instrument_node=""> A recurring theme is that any male character who </span><em data-dcnode-id="2134"><span data-dcnode-id="2135" instrument_node="">doesn't</span></em><span data-dcnode-id="2133" instrument_node=""> worship Nyx is inevitably a misogynistic, bible-toting hypocrite. In particular, the </span><a class="twikilink" data-dcnode-id="2131" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BigBad" title="/pmwiki/pmwiki.php/Main/BigBad"><span data-dcnode-id="2132" instrument_node="">Big Bad</span></a><span data-dcnode-id="2130" instrument_node=""> of </span><em data-dcnode-id="2128"><span data-dcnode-id="2129" instrument_node="">Lenobia's Vow</span></em><span data-dcnode-id="2127" instrument_node=""> is a Catholic bishop who believes his status makes it okay for him to rape and kidnap a bastard girl (and to use his pyrokinetic abilities to incinerate anyone who objects).
</span></li><li data-dcnode-id="2124"><span data-dcnode-id="2125" instrument_node=""> Female characters usually subvert this trope, being compassionate and even-handed toward other faiths.
</span></li></ul></li><li data-dcnode-id="2107"><span data-dcnode-id="2121" instrument_node=""> </span><em data-dcnode-id="2118"><a class="twikilink" data-dcnode-id="2119" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/AnnalsOfTheWesternShore" title="/pmwiki/pmwiki.php/Literature/AnnalsOfTheWesternShore"><span data-dcnode-id="2120" instrument_node="">Annals of the Western Shore</span></a></em><span data-dcnode-id="2117" instrument_node="">: Iddor, son of Gand Ioratth, is </span><em data-dcnode-id="2115"><span data-dcnode-id="2116" instrument_node="">really</span></em><span data-dcnode-id="2114" instrument_node=""> into the holy-war aspects of occupying Ansul. Since his father is an </span><a class="twikilink" data-dcnode-id="2112" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OldSoldier" title="/pmwiki/pmwiki.php/Main/OldSoldier"><span data-dcnode-id="2113" instrument_node="">Old Soldier</span></a><span data-dcnode-id="2111" instrument_node=""> who sees the whole venture as a waste of time he nevertheless has to carry out, Iddor takes every opportunity he can to prove he's a better Ald—he insults and snubs Orrec, who's there as a guest, and stages all sorts of loud, showy religious ceremonies to make his father look bad for being irritated. In fact, the whole reason the Ansul </span><a class="twikilink" data-dcnode-id="2109" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RebelLeader" title="/pmwiki/pmwiki.php/Main/RebelLeader"><span data-dcnode-id="2110" instrument_node="">Rebel Leader</span></a><span data-dcnode-id="2108" instrument_node="">'s plan fails is because Iddor rescheduled a sacrifice solely to piss off his dad.
</span></li><li data-dcnode-id="2074"><span data-dcnode-id="2106" instrument_node=""> Played more or less straight in </span><em data-dcnode-id="2103"><a class="twikilink" data-dcnode-id="2104" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/Victoria" title="/pmwiki/pmwiki.php/Literature/Victoria"><span data-dcnode-id="2105" instrument_node="">Victoria</span></a></em><span data-dcnode-id="2102" instrument_node="">. Anyone affiliated with a church or religion strongly tends to be written as either </span><a class="twikilink" data-dcnode-id="2100" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/IncorruptiblePurePureness" title="/pmwiki/pmwiki.php/Main/IncorruptiblePurePureness"><span data-dcnode-id="2101" instrument_node="">completely incorruptible</span></a><span data-dcnode-id="2099" instrument_node=""> (e.g., </span><a class="twikilink" data-dcnode-id="2097" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheParagon" title="/pmwiki/pmwiki.php/Main/TheParagon"><span data-dcnode-id="2098" instrument_node="">John Rumford</span></a><span data-dcnode-id="2096" instrument_node="">, </span><a class="twikilink" data-dcnode-id="2094" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PoliticallyActivePrincess" title="/pmwiki/pmwiki.php/Main/PoliticallyActivePrincess"><span data-dcnode-id="2095" instrument_node="">Maria de Alva</span></a><span data-dcnode-id="2093" instrument_node="">, </span><a class="twikilink" data-dcnode-id="2091" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SergeantRock" title="/pmwiki/pmwiki.php/Main/SergeantRock"><span data-dcnode-id="2092" instrument_node="">Gunny Matthews</span></a><span data-dcnode-id="2090" instrument_node="">), </span><em data-dcnode-id="2088"><span data-dcnode-id="2089" instrument_node="">or</span></em><span data-dcnode-id="2087" instrument_node=""> a completely over-the-top villain (e.g., </span><a class="twikilink" data-dcnode-id="2085" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheFundamentalist" title="/pmwiki/pmwiki.php/Main/TheFundamentalist"><span data-dcnode-id="2086" instrument_node="">Ayatollah Ghorbag</span></a><span data-dcnode-id="2084" instrument_node="">, </span><a class="twikilink" data-dcnode-id="2082" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/StrawHypocrite" title="/pmwiki/pmwiki.php/Main/StrawHypocrite"><span data-dcnode-id="2083" instrument_node="">Bishop Devlin</span></a><span data-dcnode-id="2081" instrument_node="">, the Cascadian </span><a class="twikilink" data-dcnode-id="2079" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GodEmperor" title="/pmwiki/pmwiki.php/Main/GodEmperor"><span data-dcnode-id="2080" instrument_node="">goddess</span></a><span data-dcnode-id="2078" instrument_node="">). Note, however, that </span><a class="twikilink" data-dcnode-id="2076" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GoodIsNotSoft" title="/pmwiki/pmwiki.php/Main/GoodIsNotSoft"><span data-dcnode-id="2077" instrument_node="">Good Is Not Soft</span></a><span data-dcnode-id="2075" instrument_node=""> is in full effect, so "incorruptible" means anything but "pacifistic" in many cases.
</span></li><li data-dcnode-id="2068"><span data-dcnode-id="2073" instrument_node=""> </span><em data-dcnode-id="2070"><a class="twikilink" data-dcnode-id="2071" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/TheDarkswordTrilogy" title="/pmwiki/pmwiki.php/Literature/TheDarkswordTrilogy"><span data-dcnode-id="2072" instrument_node="">The Darksword Trilogy</span></a></em><span data-dcnode-id="2069" instrument_node="">: Bishop Vanya, Head of the Church of the Almin and leader of the faith on Thimhallen is absolutely convinced of the righteousness of any action he takes he cannot even fathom that those who oppose him might be wrong. His character bio even states that he views his relationship with the Almin (essentially God) as less that of Master and Servant and more equal business partners. Even more galling is the fact that, by the end of the series, he has faced no comeuppance for the crimes he committed in the name of his own power, and even dies offscreen between the third and fourth books.
</span></li><li data-dcnode-id="2059"><span data-dcnode-id="2067" instrument_node=""> Igrain Crest in </span><em data-dcnode-id="2064"><a class="twikilink" data-dcnode-id="2065" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/ThePrioryOfTheOrangeTree" title="/pmwiki/pmwiki.php/Literature/ThePrioryOfTheOrangeTree"><span data-dcnode-id="2066" instrument_node="">The Priory of the Orange Tree</span></a></em><span data-dcnode-id="2063" instrument_node=""> considers herself the most virtuous person in Virtudom. Although she keeps the extent of it under wraps, she is the serving Knight of Justice (one of the Six Virtues) and her granddaughter Roslain is less subtle in this attitude. </span><span class="spoiler" data-dcnode-id="2061" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2062" instrument_node="">Igrain takes it to villainous levels, though. It transpires that she is the mysterious "Cupbearer" who helped Sigoso murder Queen Rosarian, which she did because Rosarian had an affair. Igrain later has Queen Sabran's chosen husband killed because he wasn't the prince Igrain wanted her to marry, and she imprisons Sabran and tries to force her to abdicate when Sabran loses her pregnancy; when she's finally  imprisoned (with Roslain's help), Igrain shows no remorse because she was just trying to prevent Inys from falling into sin.</span></span><span data-dcnode-id="2060" instrument_node="">
</span></li></ul></div><span data-dcnode-id="2056" instrument_node="">
</span><p data-dcnode-id="2055"></p><div class="folderlabel" data-dcnode-id="2053" onclick="togglefolder('folder6');"><span data-dcnode-id="2054" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Live-Action TV&nbsp;</span></div><div class="folder" data-dcnode-id="1722" id="folder6" isfolder="true" style="display:block;"><span data-dcnode-id="2052" instrument_node="">
</span><ul data-dcnode-id="2028"><li data-dcnode-id="2029"><span data-dcnode-id="2051" instrument_node=""> </span><em data-dcnode-id="2048"><a class="twikilink" data-dcnode-id="2049" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/BabylonFive" title="/pmwiki/pmwiki.php/Series/BabylonFive"><span data-dcnode-id="2050" instrument_node="">Babylon 5</span></a></em><span data-dcnode-id="2047" instrument_node="">:
</span><ul data-dcnode-id="2030"><li data-dcnode-id="2045"><span data-dcnode-id="2046" instrument_node=""> Aversions are notable in how systematic they are. No priest—be it Brother Theo, Ivanova's rabbi, or any of the other priests or priest-equivalents passing through B5—is shown to be anything other than a good person following their tenets.
</span></li><li data-dcnode-id="2040"><span data-dcnode-id="2044" instrument_node=""> Delenn is a particularly notable aversion. She is quite religious and is even a nominal priestess. She is also very much a </span><a class="twikilink" data-dcnode-id="2042" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MessianicArchetype" title="/pmwiki/pmwiki.php/Main/MessianicArchetype"><span data-dcnode-id="2043" instrument_node="">Messianic Archetype</span></a><span data-dcnode-id="2041" instrument_node="">. However she expresses her messiahship as a stateswoman, not as a religious figure, has a few dark secrets in her past, and so on. She is seldom particularly self-righteous, for instance she was the one who suggested giving Londo an invitation to the rebirth ceremony.
</span></li><li data-dcnode-id="2038"><span data-dcnode-id="2039" instrument_node=""> On the other hand, it's played straight with some of the more uptight members of the Minbari religious caste.
</span></li><li data-dcnode-id="2033"><span data-dcnode-id="2037" instrument_node=""> An alien couple in "Believers" were willing to let their ill son die rather then submit him to surgery, which was against their beliefs. Dr. Franklin operates on him anyway. </span><span class="spoiler" data-dcnode-id="2035" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2036" instrument_node=""> It didn't occur to him that the parents would destroy what they now believe to be a soulless zombie of their son.</span></span><span data-dcnode-id="2034" instrument_node="">
</span></li><li data-dcnode-id="2031"><span data-dcnode-id="2032" instrument_node=""> In a tragic rather then malicious example, the Markab race died out of plague mostly because they believed that the malady was a divine punishment for debauchery and concealed all facts of contraction out of fear of embarrassment. When the news of the plague spread across the Babylon 5 and the resident Markabs began falling victims both to the disease and angered neighbors, their priest convinced all his kindred to lock themselves in a separate section where they would be untouched by the general corruption and protected by their purity. Naturally, a horde of people susceptible to a respiratory infection gathered closely together in an air-tight space worked out just as well as you'd think. In the end the entire race except for a few isolated colonies died off in a matter of days.
</span></li></ul></li></ul><ul data-dcnode-id="1723"><li data-dcnode-id="2012"><span data-dcnode-id="2026" instrument_node=""> </span><em data-dcnode-id="2023"><a class="twikilink" data-dcnode-id="2024" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/BoardwalkEmpire" title="/pmwiki/pmwiki.php/Series/BoardwalkEmpire"><span data-dcnode-id="2025" instrument_node="">Boardwalk Empire</span></a></em><span data-dcnode-id="2022" instrument_node=""> has Nelson Van Alden, an incredibly messed-up Protestant </span><a class="twikilink" data-dcnode-id="2020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheFundamentalist" title="/pmwiki/pmwiki.php/Main/TheFundamentalist"><span data-dcnode-id="2021" instrument_node="">fundamentalist</span></a><span data-dcnode-id="2019" instrument_node=""> and Prohibition agent; possibly Father Brennan, a Catholic priest with shady deals with corrupt politician Nucky Thompson (and whose influence turns Margaret Schroeder into a </span><a class="twikilink" data-dcnode-id="2017" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Hypocrite" title="/pmwiki/pmwiki.php/Main/Hypocrite"><span data-dcnode-id="2018" instrument_node="">Hypocrite</span></a><span data-dcnode-id="2016" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2014" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HidingBehindReligion" title="/pmwiki/pmwiki.php/Main/HidingBehindReligion"><span data-dcnode-id="2015" instrument_node="">Hiding Behind Religion</span></a><span data-dcnode-id="2013" instrument_node=""> as well); and a rare Jewish example in Manny the Kosher butcher, who kills people with the same facility he offers rabbinical wisdom.
</span></li><li data-dcnode-id="1994"><span data-dcnode-id="2011" instrument_node=""> Caleb, the </span><a class="twikilink" data-dcnode-id="2009" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheDragon" title="/pmwiki/pmwiki.php/Main/TheDragon"><span data-dcnode-id="2010" instrument_node="">Dragon</span></a><span data-dcnode-id="2008" instrument_node=""> to the First Evil in the last televised season of </span><em data-dcnode-id="2005"><a class="twikilink" data-dcnode-id="2006" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/BuffyTheVampireSlayer" title="/pmwiki/pmwiki.php/Series/BuffyTheVampireSlayer"><span data-dcnode-id="2007" instrument_node="">Buffy the Vampire Slayer</span></a></em><span data-dcnode-id="2004" instrument_node=""> is an utterly psychotic, misogynistic defrocked priest.
</span><ul data-dcnode-id="1995"><li data-dcnode-id="1996"><span data-dcnode-id="2003" instrument_node=""> Genevieve Holt from the episode, "</span><a class="twikilink" data-dcnode-id="2001" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Recap/BuffyTheVampireSlayerS4E18WhereTheWildThingsAre" title="/pmwiki/pmwiki.php/Recap/BuffyTheVampireSlayerS4E18WhereTheWildThingsAre"><span data-dcnode-id="2002" instrument_node="">Where The Wild Things Are</span></a><span data-dcnode-id="2000" instrument_node="">". She cuts the girls' hair if they are bad and punishes them by "baptizing" them (putting the young orphans' heads in the bathtub) if they are "unclean". Now a manifestation that manifests as a </span><a class="twikilink" data-dcnode-id="1998" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Poltergeist" title="/pmwiki/pmwiki.php/Main/Poltergeist"><span data-dcnode-id="1999" instrument_node="">poltergeist-like</span></a><span data-dcnode-id="1997" instrument_node=""> apparition that was born out of the raw emotions and sexual energy of the orphans brings those who were attending a party at the Lowell house the same treatment Holt did to the orphans.
</span></li></ul></li><li data-dcnode-id="1982"><span data-dcnode-id="1993" instrument_node=""> Shirley in </span><em data-dcnode-id="1990"><a class="twikilink" data-dcnode-id="1991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/Community" title="/pmwiki/pmwiki.php/Series/Community"><span data-dcnode-id="1992" instrument_node="">Community</span></a></em><span data-dcnode-id="1989" instrument_node=""> both parodies and plays this straight; she's the most openly and passionately religious of the study group members, and while, for the most part, she's a likable and friendly person, her beliefs can lead her to get </span><em data-dcnode-id="1987"><span data-dcnode-id="1988" instrument_node="">very</span></em><span data-dcnode-id="1986" instrument_node=""> obnoxiously self-righteous </span><em data-dcnode-id="1984"><span data-dcnode-id="1985" instrument_node="">very</span></em><span data-dcnode-id="1983" instrument_node=""> quickly.
</span></li><li data-dcnode-id="1970"><span data-dcnode-id="1981" instrument_node=""> Robbie's wife's parents from </span><em data-dcnode-id="1978"><a class="twikilink" data-dcnode-id="1979" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/EverybodyLovesRaymond" title="/pmwiki/pmwiki.php/Series/EverybodyLovesRaymond"><span data-dcnode-id="1980" instrument_node="">Everybody Loves Raymond</span></a></em><span data-dcnode-id="1977" instrument_node="">. Also, Frank has his </span><em data-dcnode-id="1975"><span data-dcnode-id="1976" instrument_node="">few</span></em><span data-dcnode-id="1974" instrument_node=""> moments and Marie her </span><em data-dcnode-id="1972"><span data-dcnode-id="1973" instrument_node="">many</span></em><span data-dcnode-id="1971" instrument_node=""> moments.
</span></li><li data-dcnode-id="1952"><span data-dcnode-id="1969" instrument_node=""> Played with a little in </span><em data-dcnode-id="1966"><a class="twikilink" data-dcnode-id="1967" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/FatherTed" title="/pmwiki/pmwiki.php/Series/FatherTed"><span data-dcnode-id="1968" instrument_node="">Father Ted</span></a></em><span data-dcnode-id="1965" instrument_node="">. While Jack is a drunken lech and Dougal a </span><a class="twikilink" data-dcnode-id="1963" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheDitz" title="/pmwiki/pmwiki.php/Main/TheDitz"><span data-dcnode-id="1964" instrument_node="">ditz</span></a><span data-dcnode-id="1962" instrument_node="">, Ted himself is a bit more complex. Clearly he is interested in fame and money but many occasions show that he at least has </span><em data-dcnode-id="1960"><span data-dcnode-id="1961" instrument_node="">faith</span></em><span data-dcnode-id="1959" instrument_node=""> and often means well; he just is a bit too inclined to follow his baser desires. There is an interview with the creators where they discuss their </span><em data-dcnode-id="1957"><span data-dcnode-id="1958" instrument_node="">real</span></em><span data-dcnode-id="1956" instrument_node=""> feelings on religion. If people haven't watched this, they may assume that </span><em data-dcnode-id="1954"><span data-dcnode-id="1955" instrument_node="">Father Ted</span></em><span data-dcnode-id="1953" instrument_node=""> was an affectionate, if sharp tongued parody.
</span></li><li data-dcnode-id="1937"><span data-dcnode-id="1951" instrument_node=""> Downplayed with the character Book from </span><em data-dcnode-id="1948"><a class="twikilink" data-dcnode-id="1949" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/Firefly" title="/pmwiki/pmwiki.php/Series/Firefly"><span data-dcnode-id="1950" instrument_node="">Firefly</span></a></em><span data-dcnode-id="1947" instrument_node="">. He does have some elements of this trope, such as giving the other characters spiritual advice (and he manages to do so in a way that is not at all preachy) and sticking to </span><a class="twikilink" data-dcnode-id="1945" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ThouShaltNotKill" title="/pmwiki/pmwiki.php/Main/ThouShaltNotKill"><span data-dcnode-id="1946" instrument_node="">Thou Shalt Not Kill</span></a><span data-dcnode-id="1944" instrument_node=""> even in rather life-threatening situations. Also, unlike most examples of Holier Than Thou, Book manages to make more than a few jokes about religiosity and Holier Than Thou itself: at one point, </span><a class="twikilink" data-dcnode-id="1942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HookerWithAHeartOfGold" title="/pmwiki/pmwiki.php/Main/HookerWithAHeartOfGold"><span data-dcnode-id="1943" instrument_node="">Inara</span></a><span data-dcnode-id="1941" instrument_node=""> asks if he's going to preach about the error of her ways, and Book replies: "I just brought you some dinner, but if you'd </span><em data-dcnode-id="1939"><span data-dcnode-id="1940" instrument_node="">prefer</span></em><span data-dcnode-id="1938" instrument_node=""> a lecture, I have a few catchy ones prepped. Sin and hellfire—one has lepers."
</span></li><li data-dcnode-id="1916"><span data-dcnode-id="1936" instrument_node=""> Used occasionally in the </span><em data-dcnode-id="1933"><a class="twikilink" data-dcnode-id="1934" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/Highlander" title="/pmwiki/pmwiki.php/Franchise/Highlander"><span data-dcnode-id="1935" instrument_node="">Highlander</span></a></em><span data-dcnode-id="1932" instrument_node=""> franchise, especially since the various Immortals are either so old they predate current religions, or are vilified and hunted as being witches or abominations. In the fifth movie, </span><em data-dcnode-id="1929"><a class="twikilink" data-dcnode-id="1930" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/HighlanderTheSource" title="/pmwiki/pmwiki.php/Film/HighlanderTheSource"><span data-dcnode-id="1931" instrument_node="">Highlander: The Source</span></a></em><span data-dcnode-id="1928" instrument_node="">, one of the protagonists is a Cardinal in the Catholic Church, and is portrayed as a total </span><a class="twikilink" data-dcnode-id="1926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Jerkass" title="/pmwiki/pmwiki.php/Main/Jerkass"><span data-dcnode-id="1927" instrument_node="">jerkass</span></a><span data-dcnode-id="1925" instrument_node="">. One character calls him out on this, saying something to the effect of, "I </span><em data-dcnode-id="1923"><span data-dcnode-id="1924" instrument_node="">met</span></em><span data-dcnode-id="1922" instrument_node=""> Jesus. He wouldn't like you very much."
</span><ul data-dcnode-id="1917"><li data-dcnode-id="1920"><span data-dcnode-id="1921" instrument_node=""> More powerfully averted though, by the character of Darius, the priest of a small church in Paris. It is implied that he himself is not actually a Christian (being more than 2000 years old and born a barbarian raider he wouldn't have run into Christianity until many, many years after he first became Immortal), but he strictly follows both the rule and the intent of the church laws, knowing how important it is to his mortal followers.
</span></li><li data-dcnode-id="1918"><span data-dcnode-id="1919" instrument_node=""> Darius was extremely popular with the audience, and was intended to be a long-term character in the series, but the actor's death at the end of the first season forced them to change direction.
</span></li></ul></li><li data-dcnode-id="1874"><span data-dcnode-id="1915" instrument_node=""> Kai Winn Adami, the manipulative, power-grabbing (and </span><strong data-dcnode-id="1912"><a class="twikilink" data-dcnode-id="1913" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SmugSnake" title="/pmwiki/pmwiki.php/Main/SmugSnake"><span data-dcnode-id="1914" instrument_node="">smug</span></a></strong><span data-dcnode-id="1911" instrument_node="">, can't forget smug) spiritual leader of Bajor in </span><em data-dcnode-id="1908"><a class="twikilink" data-dcnode-id="1909" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/StarTrekDeepSpaceNine" title="/pmwiki/pmwiki.php/Series/StarTrekDeepSpaceNine"><span data-dcnode-id="1910" instrument_node="">Star Trek: Deep Space Nine</span></a></em><span data-dcnode-id="1907" instrument_node="">. Her primary clash with Emissary Benjamin Sisko (besides from the fact he, a non-Bajoran, was given a title and prestige in their holy order that trumps hers), was that his faith and respect for the Bajoran religion was far stronger and more pure than hers was. And let's not forget what she did to her rival for the role of Kai, Vedek Bareil, and </span><span class="spoiler" data-dcnode-id="1903" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1906" instrument_node=""> her </span><em data-dcnode-id="1904"><span data-dcnode-id="1905" instrument_node="">eventual defection to her religion's "devils" the Pah-Wraiths</span></em></span><span data-dcnode-id="1902" instrument_node="">...
</span><ul data-dcnode-id="1875"><li data-dcnode-id="1894"><span data-dcnode-id="1901" instrument_node=""> She was also </span><em data-dcnode-id="1899"><span data-dcnode-id="1900" instrument_node="">deeply</span></em><span data-dcnode-id="1898" instrument_node=""> envious that the Prophets would communicate directly with Sisko, while she was never granted such visions despite a lifelong devotion to the Prophets. A good portion of the events in the final season of the show could have been avoided if the Prophets had simply </span><em data-dcnode-id="1896"><span data-dcnode-id="1897" instrument_node="">spoken</span></em><span data-dcnode-id="1895" instrument_node=""> to her.
</span></li><li data-dcnode-id="1892"><span data-dcnode-id="1893" instrument_node=""> However much a smug, self-righteous, passive-aggressive manipulative bitch she seemed to be before, one got the feeling that she sincerely was devoted to the Prophets and to the good of Bajor; that made her defection to the Pah-Wraiths all the more shocking.
</span></li><li data-dcnode-id="1890"><span data-dcnode-id="1891" instrument_node=""> On the other hand, many worshipers of the Bajoran gods tended to subvert this, most notably Major Kira.
</span></li><li data-dcnode-id="1885"><span data-dcnode-id="1889" instrument_node=""> Even more notably, the </span><em data-dcnode-id="1887"><span data-dcnode-id="1888" instrument_node="">previous</span></em><span data-dcnode-id="1886" instrument_node=""> Kai was a saintly woman who willingly remained behind on a hellish world to help its constantly warring natives achieve peace. Not that she had much choice, really, but she accepted it gracefully.
</span></li><li data-dcnode-id="1876"><span data-dcnode-id="1884" instrument_node=""> The Expanded Universe novels include a species of alien that worship an offshoot of the Prophets, murdering anyone who worshiped either the normal Prophets or the Pah-Wraiths as heretics and false believers. Also in the </span><em data-dcnode-id="1881"><a class="twikilink" data-dcnode-id="1882" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/StarTrekDeepSpaceNineRelaunch" title="/pmwiki/pmwiki.php/Literature/StarTrekDeepSpaceNineRelaunch"><span data-dcnode-id="1883" instrument_node="">Star Trek: Deep Space Nine Relaunch</span></a></em><span data-dcnode-id="1880" instrument_node="">, we have Vedek Yevir, who has ambitions to be kai. At first he looks like a retread of Kai Winn in some regards (tensions with Kira included). However...he gets better later on, particularly in </span><em data-dcnode-id="1878"><span data-dcnode-id="1879" instrument_node="">Worlds of Deep Space Nine: Cardassia</span></em><span data-dcnode-id="1877" instrument_node="">. He talks a 14-year old would-be suicide bomber into standing down.
</span></li></ul></li><li data-dcnode-id="1862"><span data-dcnode-id="1873" instrument_node=""> Justified in </span><em data-dcnode-id="1870"><a class="twikilink" data-dcnode-id="1871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/JoanOfArcadia" title="/pmwiki/pmwiki.php/Series/JoanOfArcadia"><span data-dcnode-id="1872" instrument_node="">Joan of Arcadia</span></a></em><span data-dcnode-id="1869" instrument_node="">, as </span><a class="twikilink" data-dcnode-id="1867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/God" title="/pmwiki/pmwiki.php/Main/God"><span data-dcnode-id="1868" instrument_node="">God</span></a><span data-dcnode-id="1866" instrument_node=""> is Holier Than Thou, and whatever he told Joan to do was ultimately right, even when it seemed wrong. Most other religious characters are a subversion, offering their interpretations of God in a non-demeaning manner. There was one character in one episode as a </span><a class="twikilink" data-dcnode-id="1864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RippedFromTheHeadlines" title="/pmwiki/pmwiki.php/Main/RippedFromTheHeadlines"><span data-dcnode-id="1865" instrument_node="">response to the priest sex abuse scandal</span></a><span data-dcnode-id="1863" instrument_node="">, but he was a short-lived exception.
</span></li><li data-dcnode-id="1856"><span data-dcnode-id="1861" instrument_node=""> Played with in the BBC </span><em data-dcnode-id="1858"><a class="twikilink" data-dcnode-id="1859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/RobinHood" title="/pmwiki/pmwiki.php/Series/RobinHood"><span data-dcnode-id="1860" instrument_node="">Robin Hood</span></a></em><span data-dcnode-id="1857" instrument_node=""> series. A Catholic bishop publicly accuses Robin and his outlaws of being heretics, as well as anyone helping them. While it seems that he's on the Sheriff's side, it turns out that the Sheriff is blackmailing him. Apparently, the bishop is secretly translating the Bible into English to allow people to read the book themselves without an intermediary providing his own interpretation. Of course, if the truth gets out, the bishop will be excommunicated (or worse). Brother Tuck convinces the bishop to stand up to the Sheriff, who throws the translation into the fire. The end of the episode shows the bishop starting anew.
</span></li><li data-dcnode-id="1847"><span data-dcnode-id="1855" instrument_node=""> In one episode of </span><em data-dcnode-id="1852"><a class="twikilink" data-dcnode-id="1853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/Seinfeld" title="/pmwiki/pmwiki.php/Series/Seinfeld"><span data-dcnode-id="1854" instrument_node="">Seinfeld</span></a></em><span data-dcnode-id="1851" instrument_node="">, Elaine's boyfriend Puddy is revealed to be a Christian. When she asks him if it bothers him that she's not religious, he tells her he doesn't care because he's not the one going to Hell. He's very unhappy after they're told by a priest that, as a result of their extramarital sex, </span><em data-dcnode-id="1849"><span data-dcnode-id="1850" instrument_node="">both</span></em><span data-dcnode-id="1848" instrument_node=""> are going to Hell (a sign of his self-righteous ignorance itself).
</span></li><li data-dcnode-id="1806"><span data-dcnode-id="1846" instrument_node=""> In </span><em data-dcnode-id="1843"><a class="twikilink" data-dcnode-id="1844" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/StargateSG1" title="/pmwiki/pmwiki.php/Series/StargateSG1"><span data-dcnode-id="1845" instrument_node="">Stargate SG-1</span></a></em><span data-dcnode-id="1842" instrument_node="">, given that the "</span><a class="twikilink" data-dcnode-id="1840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SufficientlyAdvancedAlien" title="/pmwiki/pmwiki.php/Main/SufficientlyAdvancedAlien"><span data-dcnode-id="1841" instrument_node="">gods</span></a><span data-dcnode-id="1839" instrument_node="">" are usually evil, anyone who's particularly devout toward them is probably evil as well, both in the case of the Goa'uld and the Ori.
</span><ul data-dcnode-id="1807"><li data-dcnode-id="1831"><span data-dcnode-id="1838" instrument_node=""> This is averted occasionally, whenever a handful of </span><a class="twikilink" data-dcnode-id="1836" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Mooks" title="/pmwiki/pmwiki.php/Main/Mooks"><span data-dcnode-id="1837" instrument_node="">mooks</span></a><span data-dcnode-id="1835" instrument_node=""> realizes their gods are shams and switch sides. This is </span><em data-dcnode-id="1833"><span data-dcnode-id="1834" instrument_node="">especially</span></em><span data-dcnode-id="1832" instrument_node=""> true of Tomin, a humble villager-turned-general, who gives a priest an epic verbal reaming over how they're corrupting the Ori religion to oppress and destroy. He was, indeed, holier than thou.
</span></li><li data-dcnode-id="1823"><span data-dcnode-id="1830" instrument_node=""> Also averted in the character of Sam Carter, whom </span><a class="twikilink" data-dcnode-id="1828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WordOfGod" title="/pmwiki/pmwiki.php/Main/WordOfGod"><span data-dcnode-id="1829" instrument_node="">Word of God</span></a><span data-dcnode-id="1827" instrument_node=""> (i.e., the actress) says is a practicing Catholic and can occasionally be seen quietly praying before the shit </span><em data-dcnode-id="1825"><span data-dcnode-id="1826" instrument_node="">really</span></em><span data-dcnode-id="1824" instrument_node=""> hits the fan.
</span></li><li data-dcnode-id="1810"><span data-dcnode-id="1822" instrument_node=""> Played straight and averted in Episode 52, "Demons". The Canon is a self-righteous (and self-worshiping) witch-hunt leader; Simon is the devout, who stands up both to the corrupt Canon and "the Devil" (actually a Goa'uld-possessed Unas) at the episode's climax.
</span><div class="indent" data-dcnode-id="1818"><strong data-dcnode-id="1820"><span data-dcnode-id="1821" instrument_node="">Unas/Devil:</span></strong><span data-dcnode-id="1819" instrument_node=""> Your God has abandoned you!
</span></div><div class="indent" data-dcnode-id="1811"><strong data-dcnode-id="1816"><span data-dcnode-id="1817" instrument_node="">Simon:</span></strong><span data-dcnode-id="1815" instrument_node=""> My God is with me always. </span><em data-dcnode-id="1813"><span data-dcnode-id="1814" instrument_node="">[butt-kicking ensues]</span></em><span data-dcnode-id="1812" instrument_node="">
</span></div></li><li data-dcnode-id="1808"><span data-dcnode-id="1809" instrument_node=""> Senator Kinsey, who loves to tell people how he's doing God's work, even if he has to get in bed with the Devil, said Devil being a shady government agency stealing alien tech and pissing off humanity's only allies.
</span></li></ul></li><li data-dcnode-id="1797"><span data-dcnode-id="1805" instrument_node=""> The Weaver Family from Season 8 of </span><em data-dcnode-id="1802"><a class="twikilink" data-dcnode-id="1803" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/TheAmazingRace" title="/pmwiki/pmwiki.php/Series/TheAmazingRace"><span data-dcnode-id="1804" instrument_node="">The Amazing Race</span></a></em><span data-dcnode-id="1801" instrument_node="">. They constantly trumpeted how they were the only team who deserved to win, because they were the only good people on the Race, yet they were that season's least popular team, and were hated by all the other teams because of the way they acted and their general attitudes.
</span><ul data-dcnode-id="1798"><li data-dcnode-id="1799"><span data-dcnode-id="1800" instrument_node=""> Charla and Mirna (Seasons 5 and 11) were a less severe case of this, but that still didn't stop them from condemning the other teams for being untrustworthy and back-stabbing them. Season 5 even saw Mirna rant that all the other teams were jealous of them.
</span></li></ul></li><li data-dcnode-id="1791"><span data-dcnode-id="1796" instrument_node=""> Averted in </span><em data-dcnode-id="1793"><a class="twikilink" data-dcnode-id="1794" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/TheWestWing" title="/pmwiki/pmwiki.php/Series/TheWestWing"><span data-dcnode-id="1795" instrument_node="">The West Wing</span></a></em><span data-dcnode-id="1792" instrument_node=""> with devoutly Catholic President Jed Bartlet and Chief of Staff Leo McGarry and devoutly Jewish Communications Director Toby Ziegler, none of whom are holier than thou (well, Toby might be, but for different reasons). Played straight with some other characters, though, such as the evangelicals from the first episode. In some episodes, however, Josh Lyman, a fellow Jew (if a seemingly less-devout one) does note that Toby has a tendency to treat Josh as somehow being a lesser Jew, partly because Toby comes from New York and Josh from Connecticut.
</span></li><li data-dcnode-id="1782"><span data-dcnode-id="1790" instrument_node=""> Averted in the short-lived </span><em data-dcnode-id="1787"><a class="twikilink" data-dcnode-id="1788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/Threshold" title="/pmwiki/pmwiki.php/Series/Threshold"><span data-dcnode-id="1789" instrument_node="">Threshold</span></a></em><span data-dcnode-id="1786" instrument_node=""> where astrophysicist Lucas Pegg was established as a deeply religious person... but a very quiet, private one who looked to his faith for reassurance in the face of adversity (the coming of hostile aliens) and didn't care to push it.
</span><ul data-dcnode-id="1783"><li data-dcnode-id="1784"><span data-dcnode-id="1785" instrument_node=""> In an episode where one of the alien-infected humans used a church as a front to work and expose people to the alien virus, the faithful were largely reasonable people, and the reverend was not evil but, instead, greatly confused by the return of a former member who had been reported dead.
</span></li></ul></li><li data-dcnode-id="1776"><span data-dcnode-id="1781" instrument_node=""> The religious Detective Rey Curtis in </span><em data-dcnode-id="1778"><a class="twikilink" data-dcnode-id="1779" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/LawAndOrder" title="/pmwiki/pmwiki.php/Series/LawAndOrder"><span data-dcnode-id="1780" instrument_node="">Law &amp; Order</span></a></em><span data-dcnode-id="1777" instrument_node=""> frequently got very self-righteous and judgmental regarding the people around him and the criminals he investigated. After an extramarital one-night-stand that almost destroyed his marriage, however, he gradually became a lot more humble.
</span></li><li data-dcnode-id="1759"><span data-dcnode-id="1775" instrument_node=""> Col. Sam Flagg on </span><em data-dcnode-id="1772"><a class="twikilink" data-dcnode-id="1773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/MASH" title="/pmwiki/pmwiki.php/Series/MASH"><span data-dcnode-id="1774" instrument_node="">M*A*S*H</span></a></em><span data-dcnode-id="1771" instrument_node=""> has been described by Hawkeye as "gung-holier than thou." Mix in a little </span><a class="twikilink" data-dcnode-id="1769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CloudCuckoolander" title="/pmwiki/pmwiki.php/Main/CloudCuckoolander"><span data-dcnode-id="1770" instrument_node="">Cloud Cuckoolander</span></a><span data-dcnode-id="1768" instrument_node=""> and that's Col. Flagg from head to toe.
</span><ul data-dcnode-id="1760"><li data-dcnode-id="1766"><span data-dcnode-id="1767" instrument_node=""> Major Frank Burns, when he wasn't being a sniveling weasel or an incompetent doctor, would behave as though he was the greatest American soldier besides MacArthur. Hawkeye, Trapper and Hunnicutt all enjoyed knocking him down several pegs.
</span></li><li data-dcnode-id="1761"><span data-dcnode-id="1765" instrument_node=""> Burns' successor, Major Charles Winchester, subverted the trope. While at first he sneered at the surgical records of his camp mates, it turned out he really </span><em data-dcnode-id="1763"><span data-dcnode-id="1764" instrument_node="">was</span></em><span data-dcnode-id="1762" instrument_node=""> as good as he said, only needing a brief adjustment to the fast paced "meatball surgery" of the camp before he was stitching wounded and yanking shrapnel with the best of them.
</span></li></ul></li><li data-dcnode-id="1754"><span data-dcnode-id="1758" instrument_node=""> Carlene Cockburn of the short-lived </span><em data-dcnode-id="1756"><span data-dcnode-id="1757" instrument_node="">Series/GCB</span></em><span data-dcnode-id="1755" instrument_node=""> weaponized this trope.
</span></li><li data-dcnode-id="1745"><span data-dcnode-id="1753" instrument_node=""> More than one villain of the 2010s </span><em data-dcnode-id="1750"><a class="twikilink" data-dcnode-id="1751" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/FatherBrown" title="/pmwiki/pmwiki.php/Series/FatherBrown"><span data-dcnode-id="1752" instrument_node="">Father Brown</span></a></em><span data-dcnode-id="1749" instrument_node=""> series has been this, although a similar number have been </span><a class="twikilink" data-dcnode-id="1747" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/StrawNihilist" title="/pmwiki/pmwiki.php/Main/StrawNihilist"><span data-dcnode-id="1748" instrument_node="">StrawNihilists</span></a><span data-dcnode-id="1746" instrument_node="">.
</span></li><li data-dcnode-id="1724"><span data-dcnode-id="1744" instrument_node=""> </span><em data-dcnode-id="1741"><a class="twikilink" data-dcnode-id="1742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/Oz" title="/pmwiki/pmwiki.php/Series/Oz"><span data-dcnode-id="1743" instrument_node="">Oz</span></a></em><span data-dcnode-id="1740" instrument_node="">:
</span><ul data-dcnode-id="1725"><li data-dcnode-id="1735"><span data-dcnode-id="1739" instrument_node=""> Kareem Saïd is judgmental and arrogant, frequently moralizing and playing himself up as a righteous figure to feed his own ego. He gets better about this as time goes on, </span><a class="twikilink" data-dcnode-id="1737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ReformedButNotTamed" title="/pmwiki/pmwiki.php/Main/ReformedButNotTamed"><span data-dcnode-id="1738" instrument_node="">though his ego never goes away entirely.</span></a><span data-dcnode-id="1736" instrument_node="">
</span></li><li data-dcnode-id="1726"><span data-dcnode-id="1734" instrument_node=""> Recurring character William Cudney is an obnoxiously self-righteous and hypocritical Christian inmate who constantly tries to boycott </span><em data-dcnode-id="1731"><a class="twikilink" data-dcnode-id="1732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ShowWithinAShow" title="/pmwiki/pmwiki.php/Main/ShowWithinAShow"><span data-dcnode-id="1733" instrument_node="">Mrs. Sally's Schoolyard</span></a></em><span data-dcnode-id="1730" instrument_node="">, the inmates' favorite show, because they only watch it for </span><a class="twikilink" data-dcnode-id="1728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MsFanservice" title="/pmwiki/pmwiki.php/Main/MsFanservice"><span data-dcnode-id="1729" instrument_node="">the host</span></a><span data-dcnode-id="1727" instrument_node="">, which he decried as "sinful lust".
</span></li></ul></li></ul></div><span data-dcnode-id="1721" instrument_node="">
</span><p data-dcnode-id="1720"></p><div class="folderlabel" data-dcnode-id="1718" onclick="togglefolder('folder7');"><span data-dcnode-id="1719" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Music&nbsp;</span></div><div class="folder" data-dcnode-id="1671" id="folder7" isfolder="true" style="display:block;"><span data-dcnode-id="1717" instrument_node="">
</span><ul data-dcnode-id="1672"><li data-dcnode-id="1700"><span data-dcnode-id="1716" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1714" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Music/Metallica" title="/pmwiki/pmwiki.php/Music/Metallica"><span data-dcnode-id="1715" instrument_node="">Metallica</span></a><span data-dcnode-id="1713" instrument_node=""> had a song on </span><em data-dcnode-id="1711"><span data-dcnode-id="1712" instrument_node="">Metallica</span></em><span data-dcnode-id="1710" instrument_node=""> (better known as </span><em data-dcnode-id="1708"><span data-dcnode-id="1709" instrument_node="">The Black Album</span></em><span data-dcnode-id="1707" instrument_node="">) titled "Holier Than Thou". The narrator is accusing the person he's talking to of being this. Lyrics include the lines:
</span><div class="indent" data-dcnode-id="1705"><span data-dcnode-id="1706" instrument_node="">"You lie so much you believe yourself/Judge not lest ye be judged yourself"
</span></div><div class="indent" data-dcnode-id="1703"><span data-dcnode-id="1704" instrument_node="">"Holier than thou/You are/You/Know not"
</span></div><div class="indent" data-dcnode-id="1701"><span data-dcnode-id="1702" instrument_node="">"Point the finger, slow to understand/Arrogance and ignorance go hand in hand"
</span></div></li><li data-dcnode-id="1692"><span data-dcnode-id="1699" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Music/IronMaiden" title="/pmwiki/pmwiki.php/Music/IronMaiden"><span data-dcnode-id="1698" instrument_node="">Iron Maiden</span></a><span data-dcnode-id="1696" instrument_node="">'s "Holy Smoke", a </span><a class="twikilink" data-dcnode-id="1694" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ProtestSong" title="/pmwiki/pmwiki.php/Main/ProtestSong"><span data-dcnode-id="1695" instrument_node="">Protest Song</span></a><span data-dcnode-id="1693" instrument_node=""> about televangelists, depicts them as this, complete with the line "I've lived in filth, I've lived in sin, and I still smell cleaner than the shit you're in!"
</span></li><li data-dcnode-id="1685"><span data-dcnode-id="1691" instrument_node=""> "Witness" by </span><a class="twikilink" data-dcnode-id="1689" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Music/MindlessSelfIndulgence" title="/pmwiki/pmwiki.php/Music/MindlessSelfIndulgence"><span data-dcnode-id="1690" instrument_node="">Mindless Self Indulgence</span></a><span data-dcnode-id="1688" instrument_node="">:
</span><div class="indent" data-dcnode-id="1686"><span data-dcnode-id="1687" instrument_node="">"Son of a bitch! God likes me! I am the best! Fuck every. Body. Else."
</span></div></li><li data-dcnode-id="1678"><span data-dcnode-id="1684" instrument_node=""> Parodied in the </span><a class="twikilink" data-dcnode-id="1682" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Music/WeirdAlYankovic" title="/pmwiki/pmwiki.php/Music/WeirdAlYankovic"><span data-dcnode-id="1683" instrument_node="">"Weird Al" Yankovic</span></a><span data-dcnode-id="1681" instrument_node=""> song "Amish Paradise"
</span><div class="indent" data-dcnode-id="1679"><span data-dcnode-id="1680" instrument_node="">"Think you're really righteous? Think you're pure of heart? Well I know I'm a million times as humble as thou art!"
