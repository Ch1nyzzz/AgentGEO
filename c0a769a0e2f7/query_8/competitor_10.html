</span></div></li><li data-dcnode-id="1673"><span data-dcnode-id="1677" instrument_node=""> "The Mississippi Squirrel Revival" by </span><a class="twikilink" data-dcnode-id="1675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Music/RayStevens" title="/pmwiki/pmwiki.php/Music/RayStevens"><span data-dcnode-id="1676" instrument_node="">Ray Stevens</span></a><span data-dcnode-id="1674" instrument_node=""> is about a small-town church (the First Self-Righteous Church of Pascagoula) full of people like Sister Bertha Better-Than-You, and how they get straightened out by a frightened squirrel.
</span></li></ul></div><span data-dcnode-id="1670" instrument_node="">
</span><p data-dcnode-id="1669"></p><div class="folderlabel" data-dcnode-id="1667" onclick="togglefolder('folder8');"><span data-dcnode-id="1668" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Myths and Religion&nbsp;</span></div><div class="folder" data-dcnode-id="1645" id="folder8" isfolder="true" style="display:block;"><span data-dcnode-id="1666" instrument_node="">
</span><ul data-dcnode-id="1646"><li data-dcnode-id="1655"><span data-dcnode-id="1665" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1663" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/TheBible" title="/pmwiki/pmwiki.php/Literature/TheBible"><span data-dcnode-id="1664" instrument_node="">The Bible</span></a><span data-dcnode-id="1662" instrument_node="">:
</span><ul data-dcnode-id="1656"><li data-dcnode-id="1657"><span data-dcnode-id="1661" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/Jesus" title="/pmwiki/pmwiki.php/UsefulNotes/Jesus"><span data-dcnode-id="1660" instrument_node="">Jesus</span></a><span data-dcnode-id="1658" instrument_node=""> Himself was particularly harsh on holier-than-thou types, calling them hypocrites who "are like a tomb whitewashed and beautiful but full of old bones and dead people". He tended to emphasize the importance of humility and self-awareness of one's own shortcomings, and often said that those who proudly perform "good deeds" in front of an audience so that everyone knows how good they are will receive no reward in Heaven, having already received all the reward they deserve. The Good Samaritan is particularly famous, where he shows both a priest and Levite (who performed the music in the Jewish Temple) passing by the injured man who lies on the road after being robbed, rather than help him, since it could ritually defile them if he's dead. Only the titular Samaritan (from a group despised traditionally by Jews) helps him, thus the "good" part. Naturally, there's a lot in here-not letting the Law of the Jews stop you from helping others or showing prejudice toward other peoples as well are often inferred.
</span></li></ul></li><li data-dcnode-id="1647"><span data-dcnode-id="1654" instrument_node=""> According to the Orthodox Christian doctrine, the true Christian (saint) is an </span><strong data-dcnode-id="1652"><span data-dcnode-id="1653" instrument_node="">inversion</span></strong><span data-dcnode-id="1651" instrument_node=""> of it. He/she should come through learning about your sins and leaving by God's commandments and come to the conclusion that you are a sinner, and </span><em data-dcnode-id="1649"><span data-dcnode-id="1650" instrument_node="">the worst of them.</span></em><span data-dcnode-id="1648" instrument_node=""> It's the true (and the first) sign that you do right. They say that is the ideal that we should all be following, if we really want to saved by God. Otherwise, your soul is in GREAT peril......or at least that's what they say, because on the other hand...(see below)
</span></li></ul></div><span data-dcnode-id="1644" instrument_node="">
</span><p data-dcnode-id="1643"></p><div class="folderlabel" data-dcnode-id="1641" onclick="togglefolder('folder9');"><span data-dcnode-id="1642" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Pro Wrestling&nbsp;</span></div><div class="folder" data-dcnode-id="1595" id="folder9" isfolder="true" style="display:block;"><span data-dcnode-id="1640" instrument_node="">
</span><ul data-dcnode-id="1596"><li data-dcnode-id="1620"><span data-dcnode-id="1639" instrument_node=""> Chances are, whenever you see a deeply religious </span><a class="twikilink" data-dcnode-id="1637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheGimmick" title="/pmwiki/pmwiki.php/Main/TheGimmick"><span data-dcnode-id="1638" instrument_node="">gimmick</span></a><span data-dcnode-id="1636" instrument_node=""> in </span><a class="twikilink" data-dcnode-id="1634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ProfessionalWrestling" title="/pmwiki/pmwiki.php/Main/ProfessionalWrestling"><span data-dcnode-id="1635" instrument_node="">Professional Wrestling</span></a><span data-dcnode-id="1633" instrument_node="">, it'll be of this type(</span><a class="twikilink" data-dcnode-id="1631" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Wrestling/TheDudleyBoys" title="/pmwiki/pmwiki.php/Wrestling/TheDudleyBoys"><span data-dcnode-id="1632" instrument_node="">Reverend D'Von</span></a><span data-dcnode-id="1630" instrument_node="">, </span><a class="twikilink" data-dcnode-id="1628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Wrestling/Goldust" title="/pmwiki/pmwiki.php/Wrestling/Goldust"><span data-dcnode-id="1629" instrument_node="">Dustin Runnels</span></a><span data-dcnode-id="1627" instrument_node="">, etc.). And it's going to </span><em data-dcnode-id="1625"><span data-dcnode-id="1626" instrument_node="">suck</span></em><span data-dcnode-id="1624" instrument_node="">. This has led some wrestling fans (for example, R.D. Reynolds of </span><a class="twikilink" data-dcnode-id="1622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Website/WrestleCrap" title="/pmwiki/pmwiki.php/Website/WrestleCrap"><span data-dcnode-id="1623" instrument_node="">WrestleCrap</span></a><span data-dcnode-id="1621" instrument_node="">) to argue for strict "separation of church and ring."
</span></li><li data-dcnode-id="1603"><span data-dcnode-id="1619" instrument_node=""> Averted and subverted with </span><a class="twikilink" data-dcnode-id="1617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Wrestling/ShawnMichaels" title="/pmwiki/pmwiki.php/Wrestling/ShawnMichaels"><span data-dcnode-id="1618" instrument_node="">Shawn Michaels</span></a><span data-dcnode-id="1616" instrument_node=""> post-comeback. While known both in real life and his ring persona as a born-again Christian, he never considered himself a role model, instead becoming a </span><a class="twikilink" data-dcnode-id="1614" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GuileHero" title="/pmwiki/pmwiki.php/Main/GuileHero"><span data-dcnode-id="1615" instrument_node="">Guile Hero</span></a><span data-dcnode-id="1613" instrument_node=""> who prayed before matches. Didn't stop he and </span><a class="twikilink" data-dcnode-id="1611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Wrestling/TripleH" title="/pmwiki/pmwiki.php/Wrestling/TripleH"><span data-dcnode-id="1612" instrument_node="">Triple H</span></a><span data-dcnode-id="1610" instrument_node=""> from dumping actual shit on the heads of </span><a class="twikilink" data-dcnode-id="1608" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Wrestling/VinceMcMahon" title="/pmwiki/pmwiki.php/Wrestling/VinceMcMahon"><span data-dcnode-id="1609" instrument_node="">the</span></a><span data-dcnode-id="1607" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Wrestling/ShaneMcMahon" title="/pmwiki/pmwiki.php/Wrestling/ShaneMcMahon"><span data-dcnode-id="1606" instrument_node="">McMahons</span></a><span data-dcnode-id="1604" instrument_node=""> and the Spirit Squad in 2006, though.
</span></li><li data-dcnode-id="1601"><span data-dcnode-id="1602" instrument_node=""> As you grovel and ask to be absolved of your sins The Apostle Judah Mathew will strike down great vengeance and furious anger and on that day all of his followers will know that he is lord of the ring! In the name of the father, in the name of the son, in the name of the holy spirit and in the name of the apostle, amen.
</span></li><li data-dcnode-id="1599"><span data-dcnode-id="1600" instrument_node=""> "Top Shelf" Troy Nelson uses both philosophical and religious points to argue his case, at times reading directly from the Bible. He doesn't need to be "right" or "holy" to convince himself of his own superiority, they're more like hobbies.
</span></li><li data-dcnode-id="1597"><span data-dcnode-id="1598" instrument_node=""> Miro became this after winning the TNT Championship, praising God for making him better than his competition and declaring himself "God's Favorite Champion".
</span></li></ul></div><span data-dcnode-id="1594" instrument_node="">

</span><ul data-dcnode-id="1304"><li data-dcnode-id="1563"><span data-dcnode-id="1589" instrument_node=""> </span><em data-dcnode-id="1586"><a class="twikilink" data-dcnode-id="1587" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/KingdomHearts" title="/pmwiki/pmwiki.php/Franchise/KingdomHearts"><span data-dcnode-id="1588" instrument_node="">Kingdom Hearts</span></a></em><span data-dcnode-id="1585" instrument_node=""> has Master Xehanort, who seeks </span><a class="twikilink" data-dcnode-id="1583" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BalanceBetweenGoodAndEvil" title="/pmwiki/pmwiki.php/Main/BalanceBetweenGoodAndEvil"><span data-dcnode-id="1584" instrument_node="">Balance Between Light and Darkness</span></a><span data-dcnode-id="1582" instrument_node="">... but is ultimately the worst </span><a class="twikilink" data-dcnode-id="1580" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DarkIsEvil" title="/pmwiki/pmwiki.php/Main/DarkIsEvil"><span data-dcnode-id="1581" instrument_node="">Dark Is Evil</span></a><span data-dcnode-id="1579" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1577" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Sociopath" title="/pmwiki/pmwiki.php/Main/Sociopath"><span data-dcnode-id="1578" instrument_node="">Sociopath</span></a><span data-dcnode-id="1576" instrument_node=""> in the series, ruining many lives </span><span class="spoiler" data-dcnode-id="1574" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1575" instrument_node="">(even his own brother figure's and his pupils')</span></span><span data-dcnode-id="1573" instrument_node=""> on his trek and just invoking </span><a class="twikilink" data-dcnode-id="1571" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BecauseDestinySaysSo" title="/pmwiki/pmwiki.php/Main/BecauseDestinySaysSo"><span data-dcnode-id="1572" instrument_node="">Because Destiny Says So</span></a><span data-dcnode-id="1570" instrument_node=""> whenever given a </span><a class="twikilink" data-dcnode-id="1568" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/KirkSummation" title="/pmwiki/pmwiki.php/Main/KirkSummation"><span data-dcnode-id="1569" instrument_node="">Kirk Summation</span></a><span data-dcnode-id="1567" instrument_node="">. Hypocritically, he himself sees anyone Light-heavy as this, even if they're </span><a class="twikilink" data-dcnode-id="1565" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ProperlyParanoid" title="/pmwiki/pmwiki.php/Main/ProperlyParanoid"><span data-dcnode-id="1566" instrument_node="">Properly Paranoid</span></a><span data-dcnode-id="1564" instrument_node=""> toward Darkness (which he hasn't helped).
</span></li><li data-dcnode-id="1551"><span data-dcnode-id="1562" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BadassPreacher" title="/pmwiki/pmwiki.php/Main/BadassPreacher"><span data-dcnode-id="1561" instrument_node="">Reverend Ray</span></a><span data-dcnode-id="1559" instrument_node=""> from </span><em data-dcnode-id="1556"><a class="twikilink" data-dcnode-id="1557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/CallOfJuarez" title="/pmwiki/pmwiki.php/VideoGame/CallOfJuarez"><span data-dcnode-id="1558" instrument_node="">Call of Juarez</span></a></em><span data-dcnode-id="1555" instrument_node=""> </span><span class="spoiler" data-dcnode-id="1553" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1554" instrument_node=""> at the end he realizes his holier than thou attitude is the sin of pride and repents</span></span><span data-dcnode-id="1552" instrument_node="">.
</span></li><li data-dcnode-id="1545"><span data-dcnode-id="1550" instrument_node=""> In </span><em data-dcnode-id="1547"><a class="twikilink" data-dcnode-id="1548" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/FinalFantasyTactics" title="/pmwiki/pmwiki.php/VideoGame/FinalFantasyTactics"><span data-dcnode-id="1549" instrument_node="">Final Fantasy Tactics</span></a></em><span data-dcnode-id="1546" instrument_node="">, if the Faith stat of your party members get too high, they will leave your party for religious reasons and may say they are too pure or such to be with a group that commits sinful acts.
</span></li><li data-dcnode-id="1505"><span data-dcnode-id="1544" instrument_node=""> In </span><em data-dcnode-id="1541"><a class="twikilink" data-dcnode-id="1542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/FinalFantasyX" title="/pmwiki/pmwiki.php/VideoGame/FinalFantasyX"><span data-dcnode-id="1543" instrument_node="">Final Fantasy X</span></a></em><span data-dcnode-id="1540" instrument_node="">, several of the leaders of Yevon as a whole fall into this in two ways. First, </span><span class="spoiler" data-dcnode-id="1535" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1539" instrument_node=""> they are complicit to some degree in the church being a </span><a class="twikilink" data-dcnode-id="1537" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PathOfInspiration" title="/pmwiki/pmwiki.php/Main/PathOfInspiration"><span data-dcnode-id="1538" instrument_node="">Path of Inspiration</span></a><span data-dcnode-id="1536" instrument_node=""> working for Yu Yevon</span></span><span data-dcnode-id="1534" instrument_node="">. Second, </span><span class="spoiler" data-dcnode-id="1529" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1533" instrument_node=""> they believe the protagonists to be naive children, and are holier than thou about the nature of the </span><a class="twikilink" data-dcnode-id="1531" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PathOfInspiration" title="/pmwiki/pmwiki.php/Main/PathOfInspiration"><span data-dcnode-id="1532" instrument_node="">Path of Inspiration</span></a><span data-dcnode-id="1530" instrument_node="">.</span></span><span data-dcnode-id="1528" instrument_node="">
</span><ul data-dcnode-id="1506"><li data-dcnode-id="1520"><span data-dcnode-id="1527" instrument_node=""> Wakka starts this way. Though he's more or less a good guy who has no problems explaining how his religion works to </span><a class="twikilink" data-dcnode-id="1525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FishOutOfWater" title="/pmwiki/pmwiki.php/Main/FishOutOfWater"><span data-dcnode-id="1526" instrument_node="">Tidus</span></a><span data-dcnode-id="1524" instrument_node=""> he hates Al Bhed and reacts very bad to them, saying all the bad things that happen to them are deserved for not obeying Yevon's teachings (though it also has to do with his brother dying while using Al Bhed weapons). Half way through the game he changes his view after he learns more about them and </span><span class="spoiler" data-dcnode-id="1522" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1523" instrument_node=""> the military force of Yevon attacks their Home, which has to be destroyed by Cid. Also seeing how hypocrite the leaders of Yevon truly are helps.</span></span><span data-dcnode-id="1521" instrument_node="">
</span></li><li data-dcnode-id="1509"><span data-dcnode-id="1519" instrument_node=""> Yuna is another aversion: extremely devoted to Yevon (at least </span><span class="spoiler" data-dcnode-id="1517" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1518" instrument_node=""> until she learns the Final Summoning can never defeat Sin</span></span><span data-dcnode-id="1516" instrument_node="">), but she also cares for others to an astonishing degree, and is </span><a class="twikilink" data-dcnode-id="1514" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HeroicSelfDeprecation" title="/pmwiki/pmwiki.php/Main/HeroicSelfDeprecation"><span data-dcnode-id="1515" instrument_node="">painfully humble and self-effacing</span></a><span data-dcnode-id="1513" instrument_node=""> despite receiving the adoration of the entire country </span><span class="spoiler" data-dcnode-id="1511" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1512" instrument_node=""> because she is going to sacrifice herself so people can live peacefully</span></span><span data-dcnode-id="1510" instrument_node="">.
</span></li><li data-dcnode-id="1507"><span data-dcnode-id="1508" instrument_node=""> In fact nearly all the lower level members of the clergy are aversions of this trope.
</span></li></ul></li><li data-dcnode-id="1496"><span data-dcnode-id="1504" instrument_node=""> </span><em data-dcnode-id="1501"><a class="twikilink" data-dcnode-id="1502" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/GrandiaII" title="/pmwiki/pmwiki.php/VideoGame/GrandiaII"><span data-dcnode-id="1503" instrument_node="">Grandia II</span></a></em><span data-dcnode-id="1500" instrument_node=""> has High Priestess Selene (</span><span class="spoiler" data-dcnode-id="1498" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1499" instrument_node=""> or at least, she gives a good performance as this trope, at first</span></span><span data-dcnode-id="1497" instrument_node="">). The first time you meet her, she's considering having an entire village burnt down because a blind child can suddenly see.
</span></li><li data-dcnode-id="1445"><span data-dcnode-id="1495" instrument_node=""> Bastila in </span><em data-dcnode-id="1492"><a class="twikilink" data-dcnode-id="1493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Videogame/KnightsOfTheOldRepublic" title="/pmwiki/pmwiki.php/Videogame/KnightsOfTheOldRepublic"><span data-dcnode-id="1494" instrument_node="">Knights of the Old Republic</span></a></em><span data-dcnode-id="1491" instrument_node=""> makes a point of being a more perfect adherent to the letter of the Code of the Jedi than everyone else, though by the end of the game </span><a class="twikilink" data-dcnode-id="1489" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CharacterDevelopment" title="/pmwiki/pmwiki.php/Main/CharacterDevelopment"><span data-dcnode-id="1490" instrument_node="">Character Development</span></a><span data-dcnode-id="1488" instrument_node=""> sets in and she becomes a lot nicer. </span><span class="spoiler" data-dcnode-id="1483" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1487" instrument_node=""> This pride is the very thing that makes it so easy for the </span><a class="twikilink" data-dcnode-id="1485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BigBad" title="/pmwiki/pmwiki.php/Main/BigBad"><span data-dcnode-id="1486" instrument_node="">Big Bad</span></a><span data-dcnode-id="1484" instrument_node=""> to turn her to the Dark Side.</span></span><span data-dcnode-id="1482" instrument_node="">
</span><ul data-dcnode-id="1446"><li data-dcnode-id="1468"><span data-dcnode-id="1481" instrument_node=""> Atris in </span><a class="twikilink" data-dcnode-id="1479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/KnightsOfTheOldRepublicIITheSithLords" title="/pmwiki/pmwiki.php/VideoGame/KnightsOfTheOldRepublicIITheSithLords"><span data-dcnode-id="1480" instrument_node="">the second game</span></a><span data-dcnode-id="1478" instrument_node=""> refers to herself as the "Last of the Jedi", since </span><a class="twikilink" data-dcnode-id="1476" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SelectiveObliviousness" title="/pmwiki/pmwiki.php/Main/SelectiveObliviousness"><span data-dcnode-id="1477" instrument_node="">in her mind, the Jedi Exile does not count.</span></a><span data-dcnode-id="1475" instrument_node=""> She also completely fails to realize </span><span class="spoiler" data-dcnode-id="1470" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1474" instrument_node=""> she has slowly turned to the </span><a class="twikilink" data-dcnode-id="1472" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DarkSide" title="/pmwiki/pmwiki.php/Main/DarkSide"><span data-dcnode-id="1473" instrument_node="">Dark Side</span></a><span data-dcnode-id="1471" instrument_node="">, while the Light-Sided Exile is closer to a true Jedi.</span></span><span data-dcnode-id="1469" instrument_node="">
</span></li><li data-dcnode-id="1447"><span data-dcnode-id="1467" instrument_node=""> In </span><em data-dcnode-id="1464"><a class="twikilink" data-dcnode-id="1465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Videogame/StarWarsTheOldRepublic" title="/pmwiki/pmwiki.php/Videogame/StarWarsTheOldRepublic"><span data-dcnode-id="1466" instrument_node="">Star Wars: The Old Republic</span></a></em><span data-dcnode-id="1463" instrument_node="">, antagonistic Jedi faced by Imperial classes tend to be pompous hypocrites who are full of themselves and are always willing to brag about their moral superiority regardless of their own actions or how you've been playing your character. If the player character </span><a class="twikilink" data-dcnode-id="1461" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DarkIsNotEvil" title="/pmwiki/pmwiki.php/Main/DarkIsNotEvil"><span data-dcnode-id="1462" instrument_node="">is closer to light-side</span></a><span data-dcnode-id="1460" instrument_node=""> they get some particularly frustrated responses and get to deliver a </span><a class="twikilink" data-dcnode-id="1458" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheReasonYouSuckSpeech" title="/pmwiki/pmwiki.php/Main/TheReasonYouSuckSpeech"><span data-dcnode-id="1459" instrument_node="">"The Reason You Suck" Speech</span></a><span data-dcnode-id="1457" instrument_node=""> to these Jedi. In the case of the Sith Warrior's first </span><a class="twikilink" data-dcnode-id="1455" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ArcVillain" title="/pmwiki/pmwiki.php/Main/ArcVillain"><span data-dcnode-id="1456" instrument_node="">Arc Villain</span></a><span data-dcnode-id="1454" instrument_node="">, a Light-side leaning Warrior can make him fall to the Dark Side by point by point </span><em data-dcnode-id="1452"><span data-dcnode-id="1453" instrument_node="">proving</span></em><span data-dcnode-id="1451" instrument_node=""> how much of a better person they are (after said Jedi had become a </span><a class="twikilink" data-dcnode-id="1449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WellIntentionedExtremist" title="/pmwiki/pmwiki.php/Main/WellIntentionedExtremist"><span data-dcnode-id="1450" instrument_node="">Well-Intentioned Extremist</span></a><span data-dcnode-id="1448" instrument_node=""> to deal with the Warrior), to the point they start quoting the Jedi code at him, which fits the Warrior more than their nemesis at that point and makes him fall even harder.
</span></li></ul></li><li data-dcnode-id="1429"><span data-dcnode-id="1444" instrument_node=""> In </span><em data-dcnode-id="1440"><a class="twikilink" data-dcnode-id="1442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/Penumbra" title="/pmwiki/pmwiki.php/VideoGame/Penumbra"><span data-dcnode-id="1443" instrument_node="">Penumbra</span></a><span data-dcnode-id="1441" instrument_node="">: Black Plague</span></em><span data-dcnode-id="1439" instrument_node="">, </span><span class="spoiler" data-dcnode-id="1434" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1438" instrument_node=""> the Tuurngait are an example of this, trying to explain how they're so much better than humanity - after having spent the entirety of the game trying to </span><a class="twikilink" data-dcnode-id="1436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/KillAllHumans" title="/pmwiki/pmwiki.php/Main/KillAllHumans"><span data-dcnode-id="1437" instrument_node="">Kill All Humans</span></a><span data-dcnode-id="1435" instrument_node="">.</span></span><span data-dcnode-id="1433" instrument_node=""> Not a particularly </span><em data-dcnode-id="1431"><span data-dcnode-id="1432" instrument_node="">religious</span></em><span data-dcnode-id="1430" instrument_node=""> example, but a good fit, nonetheless.

</span></li><li data-dcnode-id="1398"><span data-dcnode-id="1419" instrument_node=""> Seen prominently in </span><em data-dcnode-id="1416"><a class="twikilink" data-dcnode-id="1417" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/ShinMegamiTenseiI" title="/pmwiki/pmwiki.php/VideoGame/ShinMegamiTenseiI"><span data-dcnode-id="1418" instrument_node="">Shin Megami Tensei I</span></a></em><span data-dcnode-id="1415" instrument_node=""> and </span><em data-dcnode-id="1412"><a class="twikilink" data-dcnode-id="1413" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/ShinMegamiTenseiII" title="/pmwiki/pmwiki.php/VideoGame/ShinMegamiTenseiII"><span data-dcnode-id="1414" instrument_node="">Shin Megami Tensei II</span></a></em><span data-dcnode-id="1411" instrument_node="">. Although the other side's guys are </span><a class="twikilink" data-dcnode-id="1409" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Jerkass" title="/pmwiki/pmwiki.php/Main/Jerkass"><span data-dcnode-id="1410" instrument_node="">jerkasses</span></a><span data-dcnode-id="1408" instrument_node="">, too. The Messians were just </span><a class="twikilink" data-dcnode-id="1406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Jerkass" title="/pmwiki/pmwiki.php/Main/Jerkass"><span data-dcnode-id="1407" instrument_node="">jerkasses</span></a><span data-dcnode-id="1405" instrument_node=""> first.
</span><ul data-dcnode-id="1399"><li data-dcnode-id="1400"><span data-dcnode-id="1404" instrument_node=""> In general, Law is almost invariably this while Chaos is "</span><a class="twikilink" data-dcnode-id="1402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ScrewTheRulesIHaveSupernaturalPowers" title="/pmwiki/pmwiki.php/Main/ScrewTheRulesIHaveSupernaturalPowers"><span data-dcnode-id="1403" instrument_node="">Screw The Rules, We've Got Demonic Powers</span></a><span data-dcnode-id="1401" instrument_node="">".
</span></li></ul></li><li data-dcnode-id="1386"><span data-dcnode-id="1397" instrument_node=""> </span><em data-dcnode-id="1394"><a class="twikilink" data-dcnode-id="1395" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/StopHavingFunGuys" title="/pmwiki/pmwiki.php/Main/StopHavingFunGuys"><span data-dcnode-id="1396" instrument_node="">"Stop Having Fun" Guys</span></a></em><span data-dcnode-id="1393" instrument_node=""> and </span><a class="twikilink" data-dcnode-id="1391" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Scrub" title="/pmwiki/pmwiki.php/Main/Scrub"><span data-dcnode-id="1392" instrument_node="">Scrubs</span></a><span data-dcnode-id="1390" instrument_node=""> are incredibly venomous towards those who do not play certain video games exactly the way they do, with the former preferring </span><a class="twikilink" data-dcnode-id="1388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SeriousBusiness" title="/pmwiki/pmwiki.php/Main/SeriousBusiness"><span data-dcnode-id="1389" instrument_node="">Serious Business</span></a><span data-dcnode-id="1387" instrument_node=""> tournament-style matches where only top-tier is allowed (as well as any and all glitches and exploits turned into "advanced techniques"), and the latter preferring to use the exact opposite settings and ban everything previously mentioned because they are unable to deal with it. Both sides are incredibly high and mighty about the way they play and view anyone not playing exactly like them as a member of the other group, treating you like the worthless primordial slime you are.
</span></li><li data-dcnode-id="1372"><span data-dcnode-id="1385" instrument_node=""> The Paranids in the </span><em data-dcnode-id="1382"><a class="twikilink" data-dcnode-id="1383" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/X" title="/pmwiki/pmwiki.php/VideoGame/X"><span data-dcnode-id="1384" instrument_node="">X-Universe</span></a></em><span data-dcnode-id="1381" instrument_node=""> play this to the hilt. They are a theocracy and consider every other life form in the known universe unholy to the point of not allowing any non-Paranid to live on their planets</span><span class="notelabel" data-dcnode-id="1378" onclick="togglenote('note0t02a');" style="cursor: pointer;"><sup data-dcnode-id="1379"><span data-dcnode-id="1380" instrument_node="">note&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="1374" id="note0t02a" isnote="true" onclick="togglenote('note0t02a');" style="display: none; cursor: pointer;"><span data-dcnode-id="1377" instrument_node="">though the other races wouldn't really want to live on them anyway because they </span><a class="twikilink" data-dcnode-id="1375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SingleBiomePlanet" title="/pmwiki/pmwiki.php/Main/SingleBiomePlanet"><span data-dcnode-id="1376" instrument_node="">can't tolerate the climate</span></a></span><span data-dcnode-id="1373" instrument_node="">, although not to the point of trying to wipe them all out.
</span></li><li data-dcnode-id="1356"><span data-dcnode-id="1371" instrument_node=""> Angelic characters in </span><em data-dcnode-id="1368"><a class="twikilink" data-dcnode-id="1369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/NexusWar" title="/pmwiki/pmwiki.php/VideoGame/NexusWar"><span data-dcnode-id="1370" instrument_node="">Nexus War</span></a></em><span data-dcnode-id="1367" instrument_node=""> games have the option of becoming </span><a class="twikilink" data-dcnode-id="1365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OurAngelsAreDifferent" title="/pmwiki/pmwiki.php/Main/OurAngelsAreDifferent"><span data-dcnode-id="1366" instrument_node="">Zealot Angels</span></a><span data-dcnode-id="1364" instrument_node="">, who have the power to kill those with gray marks on the </span><a class="twikilink" data-dcnode-id="1362" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/KarmaMeter" title="/pmwiki/pmwiki.php/Main/KarmaMeter"><span data-dcnode-id="1363" instrument_node="">Karma Meter</span></a><span data-dcnode-id="1361" instrument_node=""> without any stain on their own personal morality. Since this clashes with the more tolerant interpretation of Angels portrayed by most players, Zealots tend to be roleplayed as this trope. A few Zealots can learn an additional power, named (appropriately enough) "Holier Than Thou", which allows them to freely attack anyone with lower Morality than themselves - including </span><em data-dcnode-id="1358"><a class="twikilink" data-dcnode-id="1359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HunterOfHisOwnKind" title="/pmwiki/pmwiki.php/Main/HunterOfHisOwnKind"><span data-dcnode-id="1360" instrument_node="">other angels</span></a></em><span data-dcnode-id="1357" instrument_node="">.
</span></li><li data-dcnode-id="1341"><span data-dcnode-id="1355" instrument_node=""> Juroung from </span><em data-dcnode-id="1352"><a class="twikilink" data-dcnode-id="1353" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/Strider2014" title="/pmwiki/pmwiki.php/VideoGame/Strider2014"><span data-dcnode-id="1354" instrument_node="">Strider (2014)</span></a></em><span data-dcnode-id="1351" instrument_node=""> styles himself as the "true disciple" of </span><a class="twikilink" data-dcnode-id="1349" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BigBad" title="/pmwiki/pmwiki.php/Main/BigBad"><span data-dcnode-id="1350" instrument_node="">Big Bad</span></a><span data-dcnode-id="1348" instrument_node=""> Grandmaster Meio, worshiping him as a deity to the point of </span><a class="twikilink" data-dcnode-id="1346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/UndyingLoyalty" title="/pmwiki/pmwiki.php/Main/UndyingLoyalty"><span data-dcnode-id="1347" instrument_node="">Undying Loyalty</span></a><span data-dcnode-id="1345" instrument_node="">. As such, he enforces his will among those who </span><em data-dcnode-id="1343"><span data-dcnode-id="1344" instrument_node="">escaped</span></em><span data-dcnode-id="1342" instrument_node=""> his dystopian rule, sees himself superior to others because his belief is stronger, and believes Meio's "will" guides him to victory.
</span></li><li data-dcnode-id="1326"><span data-dcnode-id="1340" instrument_node=""> Most higher-ups in the </span><a class="twikilink" data-dcnode-id="1338" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PathOfInspiration" title="/pmwiki/pmwiki.php/Main/PathOfInspiration"><span data-dcnode-id="1339" instrument_node="">Church of St.Eva</span></a><span data-dcnode-id="1337" instrument_node=""> from </span><em data-dcnode-id="1334"><a class="twikilink" data-dcnode-id="1335" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/BreathOfFireII" title="/pmwiki/pmwiki.php/VideoGame/BreathOfFireII"><span data-dcnode-id="1336" instrument_node="">Breath of Fire II</span></a></em><span data-dcnode-id="1333" instrument_node=""> are this, preaching about their all-loving god and forcing others to convert, even if it takes some </span><em data-dcnode-id="1331"><span data-dcnode-id="1332" instrument_node="">weeks of incarceration</span></em><span data-dcnode-id="1330" instrument_node=""> until they start praying to Eva out of desperation or, more often, insanity. Its founder Habaruku, goes the extra mile and directly states anyone not in their ranks to be </span><em data-dcnode-id="1328"><span data-dcnode-id="1329" instrument_node="">possessed by the devil</span></em><span data-dcnode-id="1327" instrument_node="">.
</span></li><li data-dcnode-id="1305"><span data-dcnode-id="1325" instrument_node=""> </span><em data-dcnode-id="1322"><a class="twikilink" data-dcnode-id="1323" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/DragonAge" title="/pmwiki/pmwiki.php/Franchise/DragonAge"><span data-dcnode-id="1324" instrument_node="">Dragon Age</span></a></em><span data-dcnode-id="1321" instrument_node="">:
</span><ul data-dcnode-id="1306"><li data-dcnode-id="1316"><span data-dcnode-id="1320" instrument_node=""> The Chantry has an unfortunate tendency to produce this mindset, as it's implicit in their belief system that theirs is the only </span><em data-dcnode-id="1318"><span data-dcnode-id="1319" instrument_node="">true</span></em><span data-dcnode-id="1317" instrument_node=""> religion. The worst elements of the Templars, the Chantry's military arm, feel that it's their divine right to treat mages however they want - and to execute anyone, mage or civilian, who disagrees.
</span></li><li data-dcnode-id="1307"><span data-dcnode-id="1315" instrument_node=""> Anders can be like this in </span><em data-dcnode-id="1312"><a class="twikilink" data-dcnode-id="1313" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/DragonAgeII" title="/pmwiki/pmwiki.php/VideoGame/DragonAgeII"><span data-dcnode-id="1314" instrument_node="">Dragon Age II</span></a></em><span data-dcnode-id="1311" instrument_node="">: he sometimes acts as if he understands the mage conflict and how spirits work better than anyone, down to berating Merrill for using </span><a class="twikilink" data-dcnode-id="1309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BloodMagic" title="/pmwiki/pmwiki.php/Main/BloodMagic"><span data-dcnode-id="1310" instrument_node="">Blood Magic</span></a><span data-dcnode-id="1308" instrument_node=""> even though he himself is possessed.
</span></li></ul></li></ul></div><span data-dcnode-id="1302" instrument_node="">
</span><p data-dcnode-id="1301"></p><div class="folderlabel" data-dcnode-id="1299" onclick="togglefolder('folder11');"><span data-dcnode-id="1300" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Web Animation&nbsp;</span></div><div class="folder" data-dcnode-id="1278" id="folder11" isfolder="true" style="display:block;"><span data-dcnode-id="1298" instrument_node="">
</span><ul data-dcnode-id="1279"><li data-dcnode-id="1289"><span data-dcnode-id="1297" instrument_node=""> In </span><em data-dcnode-id="1294"><a class="twikilink" data-dcnode-id="1295" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WebAnimation/IfTheEmperorHadATextToSpeechDevice" title="/pmwiki/pmwiki.php/WebAnimation/IfTheEmperorHadATextToSpeechDevice"><span data-dcnode-id="1296" instrument_node="">If the Emperor Had a Text-to-Speech Device</span></a></em><span data-dcnode-id="1293" instrument_node="">, the first season's </span><a class="twikilink" data-dcnode-id="1291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BigBad" title="/pmwiki/pmwiki.php/Main/BigBad"><span data-dcnode-id="1292" instrument_node="">Big Bad</span></a><span data-dcnode-id="1290" instrument_node="">, Karamazov, seems to believe he's much holier than everyone else, so all he does is justified, despite the fact the Ecclesiarch and the Custodes, the Emperor's personal servants, call him out on his actions. This only fuels his conviction that he is truly the most holy.
</span></li><li data-dcnode-id="1280"><span data-dcnode-id="1288" instrument_node=""> In </span><em data-dcnode-id="1285"><a class="twikilink" data-dcnode-id="1286" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WebAnimation/RWBY" title="/pmwiki/pmwiki.php/WebAnimation/RWBY"><span data-dcnode-id="1287" instrument_node="">RWBY</span></a></em><span data-dcnode-id="1284" instrument_node="">, this is what drives a significant part of the conflict between </span><a class="twikilink" data-dcnode-id="1282" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GeneralFailure" title="/pmwiki/pmwiki.php/Main/GeneralFailure"><span data-dcnode-id="1283" instrument_node="">General Ironwood</span></a><span data-dcnode-id="1281" instrument_node=""> and any would-be allies. Ironwood wants to stop Salem and repeatedly justifies his actions by claiming they're for the "greater good", but he's firmly convinced that only he knows what the "greater good" is. His refusal to consider any other alternatives, combined with his callous disregard for anyone he deems unimportant, results in his policies and methods harming the people he should be protecting while enabling Salem's Divide and Conquer methods.
</span></li></ul></div><span data-dcnode-id="1277" instrument_node="">
</span><p data-dcnode-id="1276"></p><div class="folderlabel" data-dcnode-id="1274" onclick="togglefolder('folder12');"><span data-dcnode-id="1275" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Web Comics&nbsp;</span></div><div class="folder" data-dcnode-id="1161" id="folder12" isfolder="true" style="display:block;"><span data-dcnode-id="1273" instrument_node="">
</span><ul data-dcnode-id="1162"><li data-dcnode-id="1267"><span data-dcnode-id="1272" instrument_node=""> Kankri in </span><em data-dcnode-id="1269"><a class="twikilink" data-dcnode-id="1270" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Webcomic/Homestuck" title="/pmwiki/pmwiki.php/Webcomic/Homestuck"><span data-dcnode-id="1271" instrument_node="">Homestuck</span></a></em><span data-dcnode-id="1268" instrument_node=""> is a weird example. He's not devoted to a religion, but to social worker-style psychobabble. As such, he would insist that the tries to be totally non-judgemental, and avoids "trigger words" that might lead others to think, however incorrectly, that he might see them as less than himself in any way. This is a load of crap; he judges everyone, all the time, and is totally oblivious to how irritating they find him.
</span></li><li data-dcnode-id="1248"><span data-dcnode-id="1266" instrument_node=""> Sam from the webcomic </span><em data-dcnode-id="1263"><a class="twikilink" data-dcnode-id="1264" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Webcomic/MenInHats" title="/pmwiki/pmwiki.php/Webcomic/MenInHats"><span data-dcnode-id="1265" instrument_node="">Men in Hats</span></a></em><span data-dcnode-id="1262" instrument_node="">.
</span><div class="indent" data-dcnode-id="1249"><strong data-dcnode-id="1260"><span data-dcnode-id="1261" instrument_node="">Gamal:</span></strong><span data-dcnode-id="1259" instrument_node=""> I've been thinking a lot lately about my beliefs, and I'm finding it hard not to wish that I had some faith in God, or religion, or anything, really. Maybe I just want life to be more like when I was a child, back when everything was magical and the world was still mysterious and amazing. But I had to grow up and realize that, although I still know essentially nothing, everything </span><em data-dcnode-id="1257"><span data-dcnode-id="1258" instrument_node="">has</span></em><span data-dcnode-id="1256" instrument_node=""> a logical and sensible explanation, even if I can't grasp it. But with religion you never lose that sense of wonder. The world is always full of magic: There's always something beyond what is seen and understood... Sometimes I wish I could have that. </span><br data-dcnode-id="1255"><span data-dcnode-id="1254" instrument_node="">...And then Sam comes along. </span><br data-dcnode-id="1253"><strong data-dcnode-id="1251"><span data-dcnode-id="1252" instrument_node="">Sam:</span></strong><span data-dcnode-id="1250" instrument_node=""> BURN THE CRIPPLES!
</span></div></li><li data-dcnode-id="1236"><span data-dcnode-id="1247" instrument_node=""> Seymore of </span><em data-dcnode-id="1244"><a class="twikilink" data-dcnode-id="1245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Webcomic/Sinfest" title="/pmwiki/pmwiki.php/Webcomic/Sinfest"><span data-dcnode-id="1246" instrument_node="">Sinfest</span></a></em><span data-dcnode-id="1243" instrument_node=""> is relatively tame as far as most examples are concerned. He's actually a good man at heart, his biggest problem is that his </span><a class="twikilink" data-dcnode-id="1241" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GoodIsDumb" title="/pmwiki/pmwiki.php/Main/GoodIsDumb"><span data-dcnode-id="1242" instrument_node="">ignorance</span></a><span data-dcnode-id="1240" instrument_node=""> and </span><a class="twikilink" data-dcnode-id="1238" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheFundamentalist" title="/pmwiki/pmwiki.php/Main/TheFundamentalist"><span data-dcnode-id="1239" instrument_node="">fanaticism</span></a><span data-dcnode-id="1237" instrument_node=""> greatly overshadow his better qualities.
</span></li><li data-dcnode-id="1218"><span data-dcnode-id="1235" instrument_node=""> The proprietors of the "Hell House" in a Halloween sequence in </span><em data-dcnode-id="1232"><a class="twikilink" data-dcnode-id="1233" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Webcomic/SomethingPositive" title="/pmwiki/pmwiki.php/Webcomic/SomethingPositive"><span data-dcnode-id="1234" instrument_node="">Something*Positive</span></a></em><span data-dcnode-id="1231" instrument_node=""> are </span><a class="twikilink" data-dcnode-id="1229" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheFundamentalist" title="/pmwiki/pmwiki.php/Main/TheFundamentalist"><span data-dcnode-id="1230" instrument_node="">fundamentalist Christians</span></a><span data-dcnode-id="1228" instrument_node=""> who lead visitors through a haunted house that's supposed to show them the horrors of promiscuity, homosexuality, secularism, and other bogeymen of the religious right, then refuse to let them leave unless they profess Jesus Christ as their lord and savior. However, the set-up is subverted in that the character who calls them out on their attitude is himself a devout Christian who is disgusted at what he sees as a perversion of his faith. To prove his point, he decides to </span><a class="twikilink" data-dcnode-id="1226" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TakeAThirdOption" title="/pmwiki/pmwiki.php/Main/TakeAThirdOption"><span data-dcnode-id="1227" instrument_node="">Take a Third Option</span></a><span data-dcnode-id="1225" instrument_node=""> and sits down, refusing to leave until they let him walk out without saying a thing. When they still won't let him leave, he calls the cops.</span><span class="notelabel" data-dcnode-id="1222" onclick="togglenote('note119fu');" style="cursor: pointer;"><sup data-dcnode-id="1223"><span data-dcnode-id="1224" instrument_node="">note&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="1220" id="note119fu" isnote="true" onclick="togglenote('note119fu');" style="display: none; cursor: pointer;"><span data-dcnode-id="1221" instrument_node="">These "hell houses" are a real thing, but they typically let people leave with a tract or two in hand; they don't kidnap people.</span></span><span data-dcnode-id="1219" instrument_node="">
</span></li><li data-dcnode-id="1200"><span data-dcnode-id="1217" instrument_node=""> Miko Miyazaki from </span><em data-dcnode-id="1214"><a class="twikilink" data-dcnode-id="1215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Webcomic/TheOrderOfTheStick" title="/pmwiki/pmwiki.php/Webcomic/TheOrderOfTheStick"><span data-dcnode-id="1216" instrument_node="">The Order of the Stick</span></a></em><span data-dcnode-id="1213" instrument_node=""> believes the gods command her to follow every law to the letter, making her </span><a class="twikilink" data-dcnode-id="1211" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LawfulStupid" title="/pmwiki/pmwiki.php/Main/LawfulStupid"><span data-dcnode-id="1212" instrument_node="">act in such a way that perverts the law</span></a><span data-dcnode-id="1210" instrument_node="">, even to other paladins. Even after the gods strip Miko of her magic for crossing the </span><a class="twikilink" data-dcnode-id="1208" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MoralEventHorizon" title="/pmwiki/pmwiki.php/Main/MoralEventHorizon"><span data-dcnode-id="1209" instrument_node="">Moral Event Horizon</span></a><span data-dcnode-id="1207" instrument_node=""> in their eyes, Miko believes it's all some sort of grand conspiracy, and that </span><a class="twikilink" data-dcnode-id="1205" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NeverMyFault" title="/pmwiki/pmwiki.php/Main/NeverMyFault"><span data-dcnode-id="1206" instrument_node="">she isn't at fault for any of the things she's done</span></a><span data-dcnode-id="1204" instrument_node="">. Other paladins and the party cleric are shown in a much more sympathetic light. though.</span><span data-dcnode-id="1202" style="display:none"><span data-dcnode-id="1203" instrument_node="">invoked</span></span><span data-dcnode-id="1201" instrument_node="">
</span></li><li data-dcnode-id="1179"><span data-dcnode-id="1199" instrument_node=""> Kore from </span><em data-dcnode-id="1196"><a class="twikilink" data-dcnode-id="1197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Webcomic/Goblins" title="/pmwiki/pmwiki.php/Webcomic/Goblins"><span data-dcnode-id="1198" instrument_node="">Goblins</span></a></em><span data-dcnode-id="1195" instrument_node="">. Despite being a Paladin (last of the Gray Paladins in fact) he is by far the most </span><em data-dcnode-id="1193"><span data-dcnode-id="1194" instrument_node="">evil</span></em><span data-dcnode-id="1192" instrument_node=""> thing in the entire series. He attacks peaceful Orcs, Goblins, and other 'unclean' races, without even doing a 'Detect Evil' scan and mercilessly kills and tortures them (including poor Chief). When he found a dwarf child who had been raised by a kindly Orc? He </span><em data-dcnode-id="1190"><span data-dcnode-id="1191" instrument_node="">kills</span></em><span data-dcnode-id="1189" instrument_node=""> said child since he had been 'tainted'. </span><span class="spoiler" data-dcnode-id="1181" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1188" instrument_node=""> Immediately when Forgath and Minmax show up he begins attacking </span><em data-dcnode-id="1186"><span data-dcnode-id="1187" instrument_node="">them</span></em><span data-dcnode-id="1185" instrument_node=""> even though, due to a misunderstanding, they were attacking the Goblin Adventuring Party just like he was. Forgath decides he has to </span><a class="twikilink" data-dcnode-id="1183" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HoldTheLine" title="/pmwiki/pmwiki.php/Main/HoldTheLine"><span data-dcnode-id="1184" instrument_node="">Hold the Line</span></a><span data-dcnode-id="1182" instrument_node=""> against Kore so Minmax and the Goblins can escape into a dungeon...</span></span><span data-dcnode-id="1180" instrument_node="">
</span></li><li data-dcnode-id="1173"><span data-dcnode-id="1178" instrument_node=""> Averted in </span><em data-dcnode-id="1175"><a class="twikilink" data-dcnode-id="1176" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Webcomic/Thunderstruck" title="/pmwiki/pmwiki.php/Webcomic/Thunderstruck"><span data-dcnode-id="1177" instrument_node="">Thunderstruck</span></a></em><span data-dcnode-id="1174" instrument_node="">, where the two leads are atheist and Christian sisters. Due to the story's heavy emphasis on how well they complement each other, it's actually necessary for the author to balance their views, and people applaud him for it. Even the religious "good" guys in the series are treated as just as flawed as their secular counterparts.
</span></li><li data-dcnode-id="1163"><span data-dcnode-id="1172" instrument_node=""> Mary from </span><em data-dcnode-id="1169"><a class="twikilink" data-dcnode-id="1170" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Webcomic/RoomiesItsWalkyJoyceAndWalky" title="/pmwiki/pmwiki.php/Webcomic/RoomiesItsWalkyJoyceAndWalky"><span data-dcnode-id="1171" instrument_node="">Roomies!</span></a></em><span data-dcnode-id="1168" instrument_node=""> very quickly develops into this, frequently lecturing everyone around her, even her best friend, for minor things while hiding the fact that she's a total hypocrite. Her rebooted version from </span><em data-dcnode-id="1165"><a class="twikilink" data-dcnode-id="1166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Webcomic/DumbingOfAge" title="/pmwiki/pmwiki.php/Webcomic/DumbingOfAge"><span data-dcnode-id="1167" instrument_node="">Dumbing of Age</span></a></em><span data-dcnode-id="1164" instrument_node=""> manages to be even worse.
</span></li></ul></div><span data-dcnode-id="1160" instrument_node="">
</span><p data-dcnode-id="1159"></p><div class="folderlabel" data-dcnode-id="1157" onclick="togglefolder('folder13');"><span data-dcnode-id="1158" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Web Original&nbsp;</span></div><div class="folder" data-dcnode-id="1121" id="folder13" isfolder="true" style="display:block;"><span data-dcnode-id="1156" instrument_node="">
</span><ul data-dcnode-id="1122"><li data-dcnode-id="1144"><span data-dcnode-id="1155" instrument_node=""> Pharisee in </span><em data-dcnode-id="1152"><a class="twikilink" data-dcnode-id="1153" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Roleplay/DinoAttackRPG" title="/pmwiki/pmwiki.php/Roleplay/DinoAttackRPG"><span data-dcnode-id="1154" instrument_node="">Dino Attack RPG</span></a></em><span data-dcnode-id="1151" instrument_node=""> is depicted as a ruthless </span><a class="twikilink" data-dcnode-id="1149" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/InspectorJavert" title="/pmwiki/pmwiki.php/Main/InspectorJavert"><span data-dcnode-id="1150" instrument_node="">Inspector Javert</span></a><span data-dcnode-id="1148" instrument_node="">-style lawman who believes he has a divine right to impart justice on others. Interestingly, he believes he has crossed his </span><a class="twikilink" data-dcnode-id="1146" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MoralEventHorizon" title="/pmwiki/pmwiki.php/Main/MoralEventHorizon"><span data-dcnode-id="1147" instrument_node="">Moral Event Horizon</span></a><span data-dcnode-id="1145" instrument_node=""> and uses this as his justification for brutally treating violent criminals since he believes that his fate will be the same either way. Averted by Dr. Noomi Shaw, who was written as a sympathetic character specifically to avoid falling into this trope.
</span></li><li data-dcnode-id="1123"><span data-dcnode-id="1143" instrument_node=""> Shockingly, this is Gohan's attitude in </span><em data-dcnode-id="1140"><a class="twikilink" data-dcnode-id="1141" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WebVideo/DragonBallZAbridged" title="/pmwiki/pmwiki.php/WebVideo/DragonBallZAbridged"><span data-dcnode-id="1142" instrument_node="">Dragon Ball Z Abridged</span></a></em><span data-dcnode-id="1139" instrument_node="">. </span><span class="spoiler" data-dcnode-id="1125" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1138" instrument_node="">As Perfect Cell and Android 16 point out, Gohan thinks he's better than everyone else because, unlike his father, the Z-Warriors and the villains they face, he's a pacifist who doesn't want to fight. He also grows incredibly annoyed by Goku because he isn't as intelligent as he is as well as the amount of </span><a class="twikilink" data-dcnode-id="1136" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ParentalNeglect" title="/pmwiki/pmwiki.php/Main/ParentalNeglect"><span data-dcnode-id="1137" instrument_node="">Parental Neglect</span></a><span data-dcnode-id="1135" instrument_node=""> from either being off training or dead. This attitude is </span><a class="twikilink" data-dcnode-id="1133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DeconstructedTrope" title="/pmwiki/pmwiki.php/Main/DeconstructedTrope"><span data-dcnode-id="1134" instrument_node="">deconstructed</span></a><span data-dcnode-id="1132" instrument_node=""> when Perfect Cell and Android 16 call him out for this, calling him a </span><a class="twikilink" data-dcnode-id="1130" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DirtyCoward" title="/pmwiki/pmwiki.php/Main/DirtyCoward"><span data-dcnode-id="1131" instrument_node="">Dirty Coward</span></a><span data-dcnode-id="1129" instrument_node=""> who'd rather </span><a class="twikilink" data-dcnode-id="1127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SuicidalPacifism" title="/pmwiki/pmwiki.php/Main/SuicidalPacifism"><span data-dcnode-id="1128" instrument_node="">let the world die than let go of his morals</span></a><span data-dcnode-id="1126" instrument_node="">.</span></span><span data-dcnode-id="1124" instrument_node="">
</span></li></ul></div><span data-dcnode-id="1120" instrument_node="">
</span><p data-dcnode-id="1119"></p><div class="folderlabel" data-dcnode-id="1117" onclick="togglefolder('folder14');"><span data-dcnode-id="1118" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Western Animation&nbsp;</span></div><div class="folder" data-dcnode-id="992" id="folder14" isfolder="true" style="display:block;"><span data-dcnode-id="1116" instrument_node="">
</span><ul data-dcnode-id="993"><li data-dcnode-id="1104"><span data-dcnode-id="1115" instrument_node=""> </span><em data-dcnode-id="1112"><a class="twikilink" data-dcnode-id="1113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WesternAnimation/Gargoyles" title="/pmwiki/pmwiki.php/WesternAnimation/Gargoyles"><span data-dcnode-id="1114" instrument_node="">Gargoyles</span></a></em><span data-dcnode-id="1111" instrument_node="">: Demona, like Frollo, attempts to purge the world of evil and sees corruption in every human (and quite a few gargoyles, too, like Goliath). This is more a delusional justification as it is nothing more than </span><a class="twikilink" data-dcnode-id="1109" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FantasticRacism" title="/pmwiki/pmwiki.php/Main/FantasticRacism"><span data-dcnode-id="1110" instrument_node="">Fantastic Racism</span></a><span data-dcnode-id="1108" instrument_node=""> and </span><a class="twikilink" data-dcnode-id="1106" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EvilIsPetty" title="/pmwiki/pmwiki.php/Main/EvilIsPetty"><span data-dcnode-id="1107" instrument_node="">extreme pettiness</span></a><span data-dcnode-id="1105" instrument_node="">, refusing to see the hypocrisy in her actions.
</span></li><li data-dcnode-id="1063"><span data-dcnode-id="1103" instrument_node=""> </span><em data-dcnode-id="1100"><a class="twikilink" data-dcnode-id="1101" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WesternAnimation/MoralOrel" title="/pmwiki/pmwiki.php/WesternAnimation/MoralOrel"><span data-dcnode-id="1102" instrument_node="">Moral Orel</span></a></em><span data-dcnode-id="1099" instrument_node="">:
</span><ul data-dcnode-id="1064"><li data-dcnode-id="1094"><span data-dcnode-id="1098" instrument_node=""> Most of the characters fall under the "piety as a front" version of this trope. They're all really much more concerned with </span><a class="twikilink" data-dcnode-id="1096" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/StepfordSuburbia" title="/pmwiki/pmwiki.php/Main/StepfordSuburbia"><span data-dcnode-id="1097" instrument_node="">enforcing social norms</span></a><span data-dcnode-id="1095" instrument_node=""> than any genuine faith, with the (apparently exclusive) exception of Orel himself.
</span></li><li data-dcnode-id="1089"><span data-dcnode-id="1093" instrument_node=""> Rev. Putty seems to be a subversion too, especially as you get closer to the end of the series. He really seems to want to inspire hope and steer people towards a righteous life, but is very understanding of alternate lifestyles and quick to admit he's human. That he has flaws and is just another guy with a job. Putty's </span><a class="twikilink" data-dcnode-id="1091" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CharacterDevelopment" title="/pmwiki/pmwiki.php/Main/CharacterDevelopment"><span data-dcnode-id="1092" instrument_node="">Character Development</span></a><span data-dcnode-id="1090" instrument_node=""> and renewal of faith certainly helps.
</span></li><li data-dcnode-id="1065"><span data-dcnode-id="1088" instrument_node=""> The biggest offender is </span><a class="twikilink" data-dcnode-id="1086" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MeaningfulName" title="/pmwiki/pmwiki.php/Main/MeaningfulName"><span data-dcnode-id="1087" instrument_node="">Miss Censordoll</span></a><span data-dcnode-id="1085" instrument_node="">, who believes she </span><a class="twikilink" data-dcnode-id="1083" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AGodAmI" title="/pmwiki/pmwiki.php/Main/AGodAmI"><span data-dcnode-id="1084" instrument_node="">she is a god</span></a><span data-dcnode-id="1082" instrument_node=""> thanks to </span><span class="spoiler" data-dcnode-id="1080" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1081" instrument_node="">her sexual organs being removed in infancy</span></span><span data-dcnode-id="1079" instrument_node=""> and in fact says this verbatim.
</span><div class="indent" data-dcnode-id="1066"><strong data-dcnode-id="1077"><span data-dcnode-id="1078" instrument_node="">Censordoll:</span></strong><span data-dcnode-id="1076" instrument_node=""> I am </span><em data-dcnode-id="1074"><span data-dcnode-id="1075" instrument_node="">not</span></em><span data-dcnode-id="1073" instrument_node=""> "holier than thou", mother... but I </span><em data-dcnode-id="1071"><span data-dcnode-id="1072" instrument_node="">am</span></em><span data-dcnode-id="1070" instrument_node=""> holier than </span><em data-dcnode-id="1068"><span data-dcnode-id="1069" instrument_node="">you</span></em><span data-dcnode-id="1067" instrument_node="">.
</span></div></li></ul></li><li data-dcnode-id="1025"><span data-dcnode-id="1062" instrument_node=""> </span><em data-dcnode-id="1059"><a class="twikilink" data-dcnode-id="1060" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WesternAnimation/TheSimpsons" title="/pmwiki/pmwiki.php/WesternAnimation/TheSimpsons"><span data-dcnode-id="1061" instrument_node="">The Simpsons</span></a></em><span data-dcnode-id="1058" instrument_node="">:
</span><ul data-dcnode-id="1026"><li data-dcnode-id="1041"><span data-dcnode-id="1057" instrument_node=""> Despite naming </span><a class="twikilink" data-dcnode-id="1055" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Flanderization" title="/pmwiki/pmwiki.php/Main/Flanderization"><span data-dcnode-id="1056" instrument_node="">Flanderization</span></a><span data-dcnode-id="1054" instrument_node=""> and having a bunch of cringe-worthy moral-guardian moments (such as the time he claimed he's so fit and well-built because he constantly runs for the cure... </span><a class="twikilink" data-dcnode-id="1052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CureYourGays" title="/pmwiki/pmwiki.php/Main/CureYourGays"><span data-dcnode-id="1053" instrument_node="">for homosexuality</span></a><span data-dcnode-id="1051" instrument_node="">...), Ned Flanders usually averts this trope. He's incredibly nice and compassionate, even to someone like Homer who constantly abuses him, and his faith is shown to be a source of his friendly nature. He's also shown undergoing at least one realistically-portrayed crisis of faith, but still doesn't lose his religion. That said, even his kids are disturbed when he spends untold hours staring at recordings of daily TV shows in search for corruption and anti-Christianity in order to complain about them on the Internet (sadly, some people really do this in </span><a class="twikilink" data-dcnode-id="1049" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RealLife" title="/pmwiki/pmwiki.php/Main/RealLife"><span data-dcnode-id="1050" instrument_node="">Real Life</span></a><span data-dcnode-id="1048" instrument_node="">). "Daddy, we think </span><a class="twikilink" data-dcnode-id="1046" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/YouNeedToGetLaid" title="/pmwiki/pmwiki.php/Main/YouNeedToGetLaid"><span data-dcnode-id="1047" instrument_node="">you need a new Mommy</span></a><span data-dcnode-id="1045" instrument_node="">..." With that in mind, Flanders DID get more fundamentalist when Maude died, making it a possible example of clinging to Religon in an extreme fashion to get past the trauma and pain of losing his wife. The more time he had to cope, however, the more tolerant he got, even to the point of marrying </span><a class="twikilink" data-dcnode-id="1043" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ReallyGetsAround" title="/pmwiki/pmwiki.php/Main/ReallyGetsAround"><span data-dcnode-id="1044" instrument_node="">Edna Krabbappel</span></a><span data-dcnode-id="1042" instrument_node="">.
</span></li><li data-dcnode-id="1027"><span data-dcnode-id="1040" instrument_node=""> Lisa is an even more notorious example, even more so than Ned. Over the past twenty years, she's become a </span><a class="twikilink" data-dcnode-id="1038" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GranolaGirl" title="/pmwiki/pmwiki.php/Main/GranolaGirl"><span data-dcnode-id="1039" instrument_node="">Granola Girl</span></a><span data-dcnode-id="1037" instrument_node="">, a straw-buddhist, and even a feminist. All of this came from her point of view of everyone else being morons in her eyes. However, she comes off as such a hypocrite that it gets painful to watch sometimes. The episode where she turns into a </span><a class="twikilink" data-dcnode-id="1035" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GranolaGirl" title="/pmwiki/pmwiki.php/Main/GranolaGirl"><span data-dcnode-id="1036" instrument_node="">Granola Girl</span></a><span data-dcnode-id="1034" instrument_node="">? It was a life lesson Aesop to teach her to not force beliefs on others. It aired on 1995, and not only did the lesson </span><a class="twikilink" data-dcnode-id="1032" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AesopAmnesia" title="/pmwiki/pmwiki.php/Main/AesopAmnesia"><span data-dcnode-id="1033" instrument_node="">not stick</span></a><span data-dcnode-id="1031" instrument_node="">, she's only become </span><em data-dcnode-id="1029"><span data-dcnode-id="1030" instrument_node="">worse</span></em><span data-dcnode-id="1028" instrument_node=""> as time went on.
</span></li></ul></li><li data-dcnode-id="1009"><span data-dcnode-id="1024" instrument_node=""> </span><em data-dcnode-id="1021"><a class="twikilink" data-dcnode-id="1022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WesternAnimation/EdEddNEddy" title="/pmwiki/pmwiki.php/WesternAnimation/EdEddNEddy"><span data-dcnode-id="1023" instrument_node="">Ed, Edd n Eddy</span></a></em><span data-dcnode-id="1020" instrument_node="">: Edd/</span><a class="twikilink" data-dcnode-id="1018" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/InSeriesNickname" title="/pmwiki/pmwiki.php/Main/InSeriesNickname"><span data-dcnode-id="1019" instrument_node="">Double D</span></a><span data-dcnode-id="1017" instrument_node=""> is the smartest of the three title characters and feels he has the most morals out of all of them due to clearly knowing right from wrong and often feeling ashamed for any wrong doings he and his friends cause. He also is quick to brag about his "higher morals" than his friends and rub it in their faces when they don't listen to him and end up getting in trouble because of it. This has actually led to him </span><a class="twikilink" data-dcnode-id="1015" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ChronicBackStabbingDisorder" title="/pmwiki/pmwiki.php/Main/ChronicBackStabbingDisorder"><span data-dcnode-id="1016" instrument_node="">betraying his friends</span></a><span data-dcnode-id="1014" instrument_node=""> a few times due to believing it will teach them a lesson, like voting for Plank over Eddy as King of The Cul-de-sac, delivering Ed and Eddy's report cards to their parents himself under orders from the principal, and aiding Kevin in getting revenge on Eddy for a prank. Eddy eventually calls him out on this in </span><em data-dcnode-id="1011"><a class="twikilink" data-dcnode-id="1012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WesternAnimation/EdEddNEddysBigPictureShow" title="/pmwiki/pmwiki.php/WesternAnimation/EdEddNEddysBigPictureShow"><span data-dcnode-id="1013" instrument_node="">The Big Picture Show</span></a></em><span data-dcnode-id="1010" instrument_node="">, when Double D blames him and all his scams for their problems, stating that Double D isn't as innocent as he always claims to be by willingly participating and building many of their scams, including the one that went horribly wrong in the movie.
</span></li><li data-dcnode-id="994"><span data-dcnode-id="1008" instrument_node=""> Unalaq, the Chief of the Northern Water Tribe and the </span><a class="twikilink" data-dcnode-id="1006" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BigBad" title="/pmwiki/pmwiki.php/Main/BigBad"><span data-dcnode-id="1007" instrument_node="">Big Bad</span></a><span data-dcnode-id="1005" instrument_node=""> of Season 2 of </span><em data-dcnode-id="1002"><a class="twikilink" data-dcnode-id="1003" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WesternAnimation/TheLegendOfKorra" title="/pmwiki/pmwiki.php/WesternAnimation/TheLegendOfKorra"><span data-dcnode-id="1004" instrument_node="">The Legend of Korra</span></a></em><span data-dcnode-id="1001" instrument_node="">, appears to be this, as he's a well known spiritual ascetic who is more than happy to chide others for not properly following the traditions and spiritual practices of their ancestors. However, this is actually a cover for Unalaq's desire to become something </span><a class="twikilink" data-dcnode-id="999" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheAntichrist" title="/pmwiki/pmwiki.php/Main/TheAntichrist"><span data-dcnode-id="1000" instrument_node="">much</span></a><span data-dcnode-id="998" instrument_node=""> </span><a class="twikilink" data-dcnode-id="996" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GodOfEvil" title="/pmwiki/pmwiki.php/Main/GodOfEvil"><span data-dcnode-id="997" instrument_node="">worse</span></a><span data-dcnode-id="995" instrument_node="">...
