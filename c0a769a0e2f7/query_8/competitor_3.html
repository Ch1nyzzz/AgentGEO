</span><p data-dcnode-id="2484"><span data-dcnode-id="2538" instrument_node="">"</span><b data-dcnode-id="2536"><span data-dcnode-id="2537" instrument_node="">Thou shalt not covet</span></b><span data-dcnode-id="2535" instrument_node="">" is the most common translation of one (or two, depending on the numbering tradition) of the </span><a data-dcnode-id="2533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ten_Commandments" title="Ten Commandments"><span data-dcnode-id="2534" instrument_node="">Ten Commandments</span></a><span data-dcnode-id="2532" instrument_node=""> or Decalogue,</span><sup class="reference" data-dcnode-id="2529" id="cite_ref-1"><a data-dcnode-id="2530" href="#cite_note-1"><span data-dcnode-id="2531" instrument_node="">[1]</span></a></sup><span data-dcnode-id="2528" instrument_node=""> which are widely understood as </span><a data-dcnode-id="2526" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Moral_imperative" title="Moral imperative"><span data-dcnode-id="2527" instrument_node="">moral imperatives</span></a><span data-dcnode-id="2525" instrument_node=""> by legal scholars, Jewish scholars, Catholic scholars, and Protestant scholars.</span><sup class="reference" data-dcnode-id="2522" id="cite_ref-2"><a data-dcnode-id="2523" href="#cite_note-2"><span data-dcnode-id="2524" instrument_node="">[2]</span></a></sup><sup class="reference" data-dcnode-id="2519" id="cite_ref-3"><a data-dcnode-id="2520" href="#cite_note-3"><span data-dcnode-id="2521" instrument_node="">[3]</span></a></sup><sup class="reference" data-dcnode-id="2516" id="cite_ref-4"><a data-dcnode-id="2517" href="#cite_note-4"><span data-dcnode-id="2518" instrument_node="">[4]</span></a></sup><sup class="reference" data-dcnode-id="2513" id="cite_ref-5"><a data-dcnode-id="2514" href="#cite_note-5"><span data-dcnode-id="2515" instrument_node="">[5]</span></a></sup><span data-dcnode-id="2512" instrument_node=""> The </span><a data-dcnode-id="2510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Book_of_Exodus" title="Book of Exodus"><span data-dcnode-id="2511" instrument_node="">Book of Exodus</span></a><span data-dcnode-id="2509" instrument_node=""> and the </span><a data-dcnode-id="2507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Book_of_Deuteronomy" title="Book of Deuteronomy"><span data-dcnode-id="2508" instrument_node="">Book of Deuteronomy</span></a><span data-dcnode-id="2506" instrument_node=""> both describe the Ten Commandments as having been spoken by </span><a data-dcnode-id="2504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/God" title="God"><span data-dcnode-id="2505" instrument_node="">God</span></a><span data-dcnode-id="2503" instrument_node="">,</span><sup class="reference" data-dcnode-id="2500" id="cite_ref-6"><a data-dcnode-id="2501" href="#cite_note-6"><span data-dcnode-id="2502" instrument_node="">[6]</span></a></sup><span data-dcnode-id="2499" instrument_node=""> inscribed on two stone tablets by the </span><a class="mw-redirect" data-dcnode-id="2497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Finger_of_God_%28Commandments%29" title="Finger of God (Commandments)"><span data-dcnode-id="2498" instrument_node="">finger of God</span></a><span data-dcnode-id="2496" instrument_node="">,</span><sup class="reference" data-dcnode-id="2493" id="cite_ref-7"><a data-dcnode-id="2494" href="#cite_note-7"><span data-dcnode-id="2495" instrument_node="">[7]</span></a></sup><span data-dcnode-id="2492" instrument_node=""> and, after </span><a data-dcnode-id="2490" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Moses" title="Moses"><span data-dcnode-id="2491" instrument_node="">Moses</span></a><span data-dcnode-id="2489" instrument_node=""> broke the original tablets, rewritten by God on replacements.</span><sup class="reference" data-dcnode-id="2486" id="cite_ref-8"><a data-dcnode-id="2487" href="#cite_note-8"><span data-dcnode-id="2488" instrument_node="">[8]</span></a></sup><span data-dcnode-id="2485" instrument_node="">
</span></p><p data-dcnode-id="2482"><span data-dcnode-id="2483" instrument_node="">In traditions that consider the passage a single commandment, the full text reads:
</span></p><span data-dcnode-id="2481" instrument_node="">
</span><blockquote class="templatequote" data-dcnode-id="2470"><p data-dcnode-id="2477"><span data-dcnode-id="2478" instrument_node="">You shall not covet your neighbor’s house. You shall not covet your neighbor’s wife, or his male or female servant, his ox or donkey, or anything that belongs to your neighbor.</span></p><div class="templatequotecite" data-dcnode-id="2471"><span data-dcnode-id="2476" instrument_node="">— </span><cite data-dcnode-id="2472"><span class="nourlexpansion nowrap" data-dcnode-id="2473"><a class="external text" data-dcnode-id="2474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biblegateway.com/passage/%3Fsearch%3DExodus%2B20%253A17%26version%3DNIV" rel="nofollow"><span data-dcnode-id="2475" instrument_node="">Exodus 20:17</span></a></span></cite></div></blockquote><span data-dcnode-id="2469" instrument_node="">
</span><p data-dcnode-id="2452"><span data-dcnode-id="2468" instrument_node="">The </span><i data-dcnode-id="2465"><a data-dcnode-id="2466" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Catechism_of_the_Catholic_Church" title="Catechism of the Catholic Church"><span data-dcnode-id="2467" instrument_node="">Catechism of the Catholic Church</span></a></i><span data-dcnode-id="2464" instrument_node=""> connects the command against coveting with the command to "love your neighbor as yourself."</span><sup class="reference" data-dcnode-id="2461" id="cite_ref-9"><a data-dcnode-id="2462" href="#cite_note-9"><span data-dcnode-id="2463" instrument_node="">[9]</span></a></sup><span data-dcnode-id="2460" instrument_node=""> </span><a data-dcnode-id="2458" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Abraham_ibn_Ezra" title="Abraham ibn Ezra"><span data-dcnode-id="2459" instrument_node="">Ibn Ezra</span></a><span data-dcnode-id="2457" instrument_node=""> on the question of "how can't a person covet a beautiful thing in his heart?" wrote that the main purpose of all the commandments is to straighten the heart.</span><sup class="reference" data-dcnode-id="2454" id="cite_ref-10"><a data-dcnode-id="2455" href="#cite_note-10"><span data-dcnode-id="2456" instrument_node="">[10]</span></a></sup><span data-dcnode-id="2453" instrument_node="">

</span><h2 data-dcnode-id="2337"><span class="mw-headline" data-dcnode-id="2345" id="Ancient_usage"><span data-dcnode-id="2346" instrument_node="">Ancient usage</span></span><span class="mw-editsection" data-dcnode-id="2338"><span class="mw-editsection-bracket" data-dcnode-id="2343"><span data-dcnode-id="2344" instrument_node="">[</span></span><a data-dcnode-id="2341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DThou_shalt_not_covet%26action%3Dedit%26section%3D1" title="Edit section: Ancient usage"><span data-dcnode-id="2342" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2339"><span data-dcnode-id="2340" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2336" instrument_node="">
</span><p data-dcnode-id="2327"><span data-dcnode-id="2335" instrument_node="">The Hebrew word translated "covet" is </span><i data-dcnode-id="2333"><span data-dcnode-id="2334" instrument_node="">chamad</span></i><span data-dcnode-id="2332" instrument_node=""> (חמד) which is commonly translated into English as "covet", "lust", and "strong desire."</span><sup class="reference" data-dcnode-id="2329" id="cite_ref-11"><a data-dcnode-id="2330" href="#cite_note-11"><span data-dcnode-id="2331" instrument_node="">[11]</span></a></sup><span data-dcnode-id="2328" instrument_node=""> The Hebrew Bible contains a number of warnings and examples of negative consequences for lusting or coveting. For example, when God was instructing Israel regarding the false religion of the Canaanites, he warned them not to covet the silver or gold on their idols, because this can lead to bringing detestable things into the home.
</span></p><span data-dcnode-id="2326" instrument_node="">
</span><link data-dcnode-id="2325" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="2313"><p data-dcnode-id="2320"><span data-dcnode-id="2324" instrument_node="">The images of their gods you're to burn in the fire. Don't covet the silver and gold on them, and don't take it for yourselves, or you'll be ensnared by it, for it's detestable to the L</span><span class="smallcaps" data-dcnode-id="2322" style="font-size:83%"><span data-dcnode-id="2323" instrument_node="">ORD</span></span><span data-dcnode-id="2321" instrument_node=""> your God.  Don't bring a detestable thing into your house or you, like it, will be set apart for destruction. Utterly abhor and detest it, for it's set apart for destruction.</span></p><div class="templatequotecite" data-dcnode-id="2314"><span data-dcnode-id="2319" instrument_node="">— </span><cite data-dcnode-id="2315"><span class="nourlexpansion nowrap" data-dcnode-id="2316"><a class="external text" data-dcnode-id="2317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biblegateway.com/passage/%3Fsearch%3DDeuteronomy%2B7%253A25-26%26version%3DNIV" rel="nofollow"><span data-dcnode-id="2318" instrument_node="">Deuteronomy 7:25-26</span></a></span></cite></div></blockquote><span data-dcnode-id="2312" instrument_node="">
</span><p data-dcnode-id="2306"><span data-dcnode-id="2311" instrument_node="">The Book of Joshua contains a narrative in which Achan incurred the wrath of God by coveting prohibited gold and silver that he found in the destruction of Jericho.  This is portrayed as a violation of covenant and a disgraceful thing.</span><sup class="reference" data-dcnode-id="2308" id="cite_ref-12"><a data-dcnode-id="2309" href="#cite_note-12"><span data-dcnode-id="2310" instrument_node="">[12]</span></a></sup><span data-dcnode-id="2307" instrument_node="">
</span></p><p data-dcnode-id="2296"><span data-dcnode-id="2305" instrument_node="">The Book of Proverbs warns against coveting, "Above all else, guard your heart, for it's the wellspring of life."</span><sup class="reference" data-dcnode-id="2302" id="cite_ref-13"><a data-dcnode-id="2303" href="#cite_note-13"><span data-dcnode-id="2304" instrument_node="">[13]</span></a></sup><span data-dcnode-id="2301" instrument_node=""> The prophet Micah condemns the coveting of houses and fields as a warning against lusting after physical possessions.</span><sup class="reference" data-dcnode-id="2298" id="cite_ref-14"><a data-dcnode-id="2299" href="#cite_note-14"><span data-dcnode-id="2300" instrument_node="">[14]</span></a></sup><span data-dcnode-id="2297" instrument_node=""> The Hebrew word for "covet" can also be translated as "lust", and the book of Proverbs warns against coveting in the form of sexual lust.
</span></p><span data-dcnode-id="2295" instrument_node="">
</span><link data-dcnode-id="2294" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="2285"><p data-dcnode-id="2292"><span data-dcnode-id="2293" instrument_node="">Do not lust in your heart after her beauty or let her captivate you with her eyes, for the prostitute reduces you to a loaf of bread, and the adulteress preys upon your very life.</span></p><div class="templatequotecite" data-dcnode-id="2286"><span data-dcnode-id="2291" instrument_node="">— </span><cite data-dcnode-id="2287"><span class="nourlexpansion nowrap" data-dcnode-id="2288"><a class="external text" data-dcnode-id="2289" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biblegateway.com/passage/%3Fsearch%3DProverbs%2B6%253A25-26%26version%3DNIV" rel="nofollow"><span data-dcnode-id="2290" instrument_node="">Proverbs 6:25-26</span></a></span></cite></div></blockquote><span data-dcnode-id="2284" instrument_node="">
</span><h2 data-dcnode-id="2274"><span class="mw-headline" data-dcnode-id="2282" id="Jewish_views"><span data-dcnode-id="2283" instrument_node="">Jewish views</span></span><span class="mw-editsection" data-dcnode-id="2275"><span class="mw-editsection-bracket" data-dcnode-id="2280"><span data-dcnode-id="2281" instrument_node="">[</span></span><a data-dcnode-id="2278" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DThou_shalt_not_covet%26action%3Dedit%26section%3D2" title="Edit section: Jewish views"><span data-dcnode-id="2279" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2276"><span data-dcnode-id="2277" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2273" instrument_node="">
</span><p data-dcnode-id="2260"><span data-dcnode-id="2272" instrument_node="">This commandment is directed against the sin of envy. Man is given the gift of human intelligence in order to be able to sift out the good from the bad, even in his/her own thoughts.</span><sup class="reference" data-dcnode-id="2269" id="cite_ref-15"><a data-dcnode-id="2270" href="#cite_note-15"><span data-dcnode-id="2271" instrument_node="">[15]</span></a></sup><span data-dcnode-id="2268" instrument_node=""> </span><a data-dcnode-id="2266" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bava_Batra" title="Bava Batra"><span data-dcnode-id="2267" instrument_node="">Bava Batra</span></a><span data-dcnode-id="2265" instrument_node=""> teaches that a person can even harm his neighbor with his eyes.  It asserts that damage caused by looking is also regarded as damage that is prohibited. Even if the covetous desire is concealed in the heart, the covetous desire in itself is regarded by the Torah as damaging to the neighbor.</span><sup class="reference" data-dcnode-id="2262" id="cite_ref-16"><a data-dcnode-id="2263" href="#cite_note-16"><span data-dcnode-id="2264" instrument_node="">[16]</span></a></sup><span data-dcnode-id="2261" instrument_node="">
</span></p><span data-dcnode-id="2259" instrument_node="">
</span><p data-dcnode-id="2251"><a class="mw-redirect" data-dcnode-id="2257" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Philo_of_Alexandria" title="Philo of Alexandria"><span data-dcnode-id="2258" instrument_node="">Philo of Alexandria</span></a><span data-dcnode-id="2256" instrument_node=""> describes covetous desire as a kind of insurrection and plotting against others, because the passions of the soul are formidable. He regards desire as the worst kind of passion, but also one over which the individual exercises voluntary control.  Therefore, near the conclusion of his discourse on the Decalogue, Philo exhorts the individual to make use of this commandment to cut off desire, the fountain of all iniquity.</span><sup class="reference" data-dcnode-id="2253" id="cite_ref-17"><a data-dcnode-id="2254" href="#cite_note-17"><span data-dcnode-id="2255" instrument_node="">[17]</span></a></sup><span data-dcnode-id="2252" instrument_node=""> Left unchecked, covetous desire is the source of personal, interpersonal, and international strife: </span></p><blockquote data-dcnode-id="2245"><p data-dcnode-id="2246"><span data-dcnode-id="2250" instrument_node="">"Is the love of money, or of women, or of glory, or of any one of the other efficient causes of pleasure, the origin of slight and ordinary evils? Isn't it owing to this passion that relationships are broken asunder, and change the good will which originates in nature into an irreconcilable enmity? And aren't great countries and populous kingdoms made desolate by domestic seditions, through such causes? And aren't earth and sea continually filled with novel and terrible calamities by naval battles and military expeditions for the same reason?"</span><sup class="reference" data-dcnode-id="2247" id="cite_ref-18"><a data-dcnode-id="2248" href="#cite_note-18"><span data-dcnode-id="2249" instrument_node="">[18]</span></a></sup></p></blockquote><span data-dcnode-id="2244" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="2235"><div class="thumbinner" data-dcnode-id="2236" style="width:302px;"><a class="image" data-dcnode-id="2242" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AExodus_w_commentary_by_Abraham_ibn_Ezra_1488.jpg"><img alt="" class="thumbimage" data-dcnode-id="2243" data-file-height="720" data-file-width="515" decoding="async" height="419" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/5/5c/Exodus_w_commentary_by_Abraham_ibn_Ezra_1488.jpg/300px-Exodus_w_commentary_by_Abraham_ibn_Ezra_1488.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/5/5c/Exodus_w_commentary_by_Abraham_ibn_Ezra_1488.jpg/450px-Exodus_w_commentary_by_Abraham_ibn_Ezra_1488.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/5/5c/Exodus_w_commentary_by_Abraham_ibn_Ezra_1488.jpg 2x" width="300"></a><span data-dcnode-id="2241" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="2237"><div class="magnify" data-dcnode-id="2239"><a class="internal" data-dcnode-id="2240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AExodus_w_commentary_by_Abraham_ibn_Ezra_1488.jpg" title="Enlarge"></a></div><span data-dcnode-id="2238" instrument_node="">The Book Exodus with the commentary of Abraham ibn Ezra, Naples 1488</span></div></div></div><span data-dcnode-id="2234" instrument_node="">
</span><p data-dcnode-id="2230"><a data-dcnode-id="2232" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Abraham_ibn_Ezra" title="Abraham ibn Ezra"><span data-dcnode-id="2233" instrument_node="">Abraham ibn Ezra</span></a><span data-dcnode-id="2231" instrument_node=""> taught that a person can control his desires by training his heart to be content with what God has allotted to him.
</span></p><span data-dcnode-id="2229" instrument_node="">
</span><blockquote data-dcnode-id="2223"><p data-dcnode-id="2224"><span data-dcnode-id="2228" instrument_node="">"When he knows that God has forbidden his neighbor's wife to him, then she's more elevated in his eyes than the princess in the eyes of the peasant. And so he's satisfied with his portion and doesn't allow his heart to covet and desire something that's not his, for he knows that God doesn't wish to give it to him; he cannot take it by force or by his thoughts or schemes. He has faith in his Creator, that He'll provide for him and do what's good in His eyes."</span><sup class="reference" data-dcnode-id="2225" id="cite_ref-19"><a data-dcnode-id="2226" href="#cite_note-19"><span data-dcnode-id="2227" instrument_node="">[19]</span></a></sup></p></blockquote><span data-dcnode-id="2222" instrument_node="">
</span><p data-dcnode-id="2218"><a data-dcnode-id="2220" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Maimonides" title="Maimonides"><span data-dcnode-id="2221" instrument_node="">Maimonides</span></a><span data-dcnode-id="2219" instrument_node=""> (the Rambam) viewed the prohibition of coveting as a fence or boundary intended to keep adherents a safe distance away from the very serious sins of theft, adultery, and murder: </span></p><blockquote data-dcnode-id="2212"><p data-dcnode-id="2213"><span data-dcnode-id="2217" instrument_node="">"Desire leads to coveting, and coveting leads to stealing. For if the owner (of the coveted object) doesn't wish to sell, even though he is offered a good price and is entreated to accept, the person (who covets the object) will come to steal it, as it's written (Mikha 2:2) [Micah 2:2], 'They covet fields and (then) steal them.' And if the owner approaches him with a view to reclaiming his money or preventing the theft, then he'll come to murder. Go and learn from the example of Achav [Ahab] and Navot [Naboth]."</span><sup class="reference" data-dcnode-id="2214" id="cite_ref-20"><a data-dcnode-id="2215" href="#cite_note-20"><span data-dcnode-id="2216" instrument_node="">[20]</span></a></sup></p></blockquote><p data-dcnode-id="2196"><span data-dcnode-id="2211" instrument_node=""> Maimonides' admonition to learn from the example of Ahab and Naboth refers to the narrative in 1 Kings 21 in which King Ahab of Israel tried to convince Naboth the Jezreelite to sell him the vineyard Naboth owned adjacent to the king's palace.  Ahab wanted the land to use as a vegetable garden, but Naboth refused to sell or trade the property to Ahab saying, "The L</span><span class="smallcaps" data-dcnode-id="2209" style="font-size:83%"><span data-dcnode-id="2210" instrument_node="">ORD</span></span><span data-dcnode-id="2208" instrument_node=""> forbid that I should give up to you what I've inherited from my fathers!"</span><sup class="reference" data-dcnode-id="2205" id="cite_ref-21"><a data-dcnode-id="2206" href="#cite_note-21"><span data-dcnode-id="2207" instrument_node="">[21]</span></a></sup><span data-dcnode-id="2204" instrument_node="">  Ahab's wife Jezebel then conspired to obtain the vineyard by writing letters in Ahab's name to the elders and nobles in Naboth's town instructing them to have two scoundrels bear false witness claiming that Naboth has cursed both God and the king.  After Naboth was subsequently stoned to death, Ahab seized possession of Naboth's vineyard.  The text describes the L</span><span class="smallcaps" data-dcnode-id="2202" style="font-size:83%"><span data-dcnode-id="2203" instrument_node="">ORD</span></span><span data-dcnode-id="2201" instrument_node=""> as very angry with Ahab, and the prophet Elijah pronounces judgment on both Ahab and Jezebel.</span><sup class="reference" data-dcnode-id="2198" id="cite_ref-22"><a data-dcnode-id="2199" href="#cite_note-22"><span data-dcnode-id="2200" instrument_node="">[22]</span></a></sup><span data-dcnode-id="2197" instrument_node="">
</span></p><h2 data-dcnode-id="2186"><span class="mw-headline" data-dcnode-id="2194" id="New_Testament_views"><span data-dcnode-id="2195" instrument_node="">New Testament views</span></span><span class="mw-editsection" data-dcnode-id="2187"><span class="mw-editsection-bracket" data-dcnode-id="2192"><span data-dcnode-id="2193" instrument_node="">[</span></span><a data-dcnode-id="2190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DThou_shalt_not_covet%26action%3Dedit%26section%3D3" title="Edit section: New Testament views"><span data-dcnode-id="2191" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2188"><span data-dcnode-id="2189" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2185" instrument_node="">
</span><p data-dcnode-id="2171"><span data-dcnode-id="2184" instrument_node="">The Gospel of Luke describes Jesus' warning to guard one's heart against covetousness. "Take care, and be on your guard against all covetousness, for one's life doesn't consist in the abundance of his possessions."</span><sup class="reference" data-dcnode-id="2181" id="cite_ref-23"><a data-dcnode-id="2182" href="#cite_note-23"><span data-dcnode-id="2183" instrument_node="">[23]</span></a></sup><span data-dcnode-id="2180" instrument_node=""> Jesus also describes the sins that defile a person as sins from coming from untamed desires in the heart.</span><sup class="reference" data-dcnode-id="2177" id="cite_ref-24"><a data-dcnode-id="2178" href="#cite_note-24"><span data-dcnode-id="2179" instrument_node="">[24]</span></a></sup><span data-dcnode-id="2176" instrument_node=""> The Epistle of James portrays covetous desire residing in the heart as being the internal source of temptation and sin.</span><sup class="reference" data-dcnode-id="2173" id="cite_ref-25"><a data-dcnode-id="2174" href="#cite_note-25"><span data-dcnode-id="2175" instrument_node="">[25]</span></a></sup><span data-dcnode-id="2172" instrument_node=""> James goes on to describe how covetous desire leads to fighting and that lack of material possessions is caused by not asking God for them and by asking with wrong motives.
</span></p><span data-dcnode-id="2170" instrument_node="">
</span><link data-dcnode-id="2169" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="2159"><p data-dcnode-id="2167"><span data-dcnode-id="2168" instrument_node="">You covet and can't obtain, so you fight and quarrel. You don't have, because you don't ask. You ask and don't receive, because you ask wrongly, to spend it on your passions. You adulterous people! Don't you know that friendship with the world is enmity with God? Therefore whoever wishes to be a friend of the world makes himself an enemy of God.</span></p><div class="templatequotecite" data-dcnode-id="2160"><span data-dcnode-id="2166" instrument_node="">— </span><cite data-dcnode-id="2161"><span data-dcnode-id="2165" instrument_node="">James 4:2-4</span><sup class="reference" data-dcnode-id="2162" id="cite_ref-26"><a data-dcnode-id="2163" href="#cite_note-26"><span data-dcnode-id="2164" instrument_node="">[26]</span></a></sup></cite></div></blockquote><span data-dcnode-id="2158" instrument_node="">
</span><p data-dcnode-id="2152"><span data-dcnode-id="2157" instrument_node="">The Epistle to the Ephesians and the Epistle to the Colossians regard the sin of covetousness as a kind of idolatry and list this sin along with sexual immorality and impurity which give rise to the wrath of God.</span><sup class="reference" data-dcnode-id="2154" id="cite_ref-27"><a data-dcnode-id="2155" href="#cite_note-27"><span data-dcnode-id="2156" instrument_node="">[27]</span></a></sup><span data-dcnode-id="2153" instrument_node="">
</span></p><span data-dcnode-id="2151" instrument_node="">
</span><link data-dcnode-id="2150" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="2140"><p data-dcnode-id="2148"><span data-dcnode-id="2149" instrument_node="">But sexual immorality and all impurity or covetousness must not even be named among you, as is proper among saints. Let there be no filthiness nor foolish talk nor crude joking, which are out of place, but instead let there be thanksgiving. For you may be sure of this, that everyone who's sexually immoral or impure, or who's covetous (that is, an idolater), has no inheritance in the kingdom of Christ and God. Let no one deceive you with empty words, for because of these things the wrath of God comes upon the sons of disobedience.</span></p><div class="templatequotecite" data-dcnode-id="2141"><span data-dcnode-id="2147" instrument_node="">— </span><cite data-dcnode-id="2142"><span data-dcnode-id="2146" instrument_node="">Ephesians 5:5-6</span><sup class="reference" data-dcnode-id="2143" id="cite_ref-28"><a data-dcnode-id="2144" href="#cite_note-28"><span data-dcnode-id="2145" instrument_node="">[28]</span></a></sup></cite></div></blockquote><span data-dcnode-id="2139" instrument_node="">
</span><p data-dcnode-id="2129"><span data-dcnode-id="2138" instrument_node="">The New Testament stresses thanksgiving and contentment as proper heart attitudes that contrast covetousness. John the Baptist exhorted soldiers to be content with their pay rather than extorting money by threats and false accusations.</span><sup class="reference" data-dcnode-id="2135" id="cite_ref-29"><a data-dcnode-id="2136" href="#cite_note-29"><span data-dcnode-id="2137" instrument_node="">[29]</span></a></sup><span data-dcnode-id="2134" instrument_node="">   The book of Hebrews encourages one to keep his life free from the love of money and "be content with what you have" and depend on the promises and help of God rather than trusting in wealth.</span><sup class="reference" data-dcnode-id="2131" id="cite_ref-30"><a data-dcnode-id="2132" href="#cite_note-30"><span data-dcnode-id="2133" instrument_node="">[30]</span></a></sup><span data-dcnode-id="2130" instrument_node=""> The book of 1 Timothy contains a classic warning against the love of money and stresses that it's great gain to be content with food and clothing.
</span></p><span data-dcnode-id="2128" instrument_node="">
</span><link data-dcnode-id="2127" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="2117"><p data-dcnode-id="2125"><span data-dcnode-id="2126" instrument_node="">Now there's great gain in godliness with contentment, for we brought nothing into the world, and we can't take anything out of the world. But if we have food and clothing, with these we'll be content.  But those who desire to be rich fall into temptation, into a snare, into many senseless and harmful desires that plunge people into ruin and destruction. For the love of money is a root of all kinds of evils. It's through this craving that some have wandered away from the faith and pierced themselves with many pangs.</span></p><div class="templatequotecite" data-dcnode-id="2118"><span data-dcnode-id="2124" instrument_node="">— </span><cite data-dcnode-id="2119"><span data-dcnode-id="2123" instrument_node="">1 Timothy 6:6-10</span><sup class="reference" data-dcnode-id="2120" id="cite_ref-31"><a data-dcnode-id="2121" href="#cite_note-31"><span data-dcnode-id="2122" instrument_node="">[31]</span></a></sup></cite></div></blockquote><span data-dcnode-id="2116" instrument_node="">
</span><h2 data-dcnode-id="2106"><span class="mw-headline" data-dcnode-id="2114" id="Catholic_Church_views"><span data-dcnode-id="2115" instrument_node="">Catholic Church views</span></span><span class="mw-editsection" data-dcnode-id="2107"><span class="mw-editsection-bracket" data-dcnode-id="2112"><span data-dcnode-id="2113" instrument_node="">[</span></span><a data-dcnode-id="2110" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DThou_shalt_not_covet%26action%3Dedit%26section%3D4" title="Edit section: Catholic Church views"><span data-dcnode-id="2111" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2108"><span data-dcnode-id="2109" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2105" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="2087"><div class="thumbinner" data-dcnode-id="2088" style="width:282px;"><a class="image" data-dcnode-id="2103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AJheronimus_Bosch_Table_of_the_Mortal_Sins_%28Luxuria%29.jpg"><img alt="" class="thumbimage" data-dcnode-id="2104" data-file-height="481" data-file-width="534" decoding="async" height="252" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/6/6f/Jheronimus_Bosch_Table_of_the_Mortal_Sins_%2528Luxuria%2529.jpg/280px-Jheronimus_Bosch_Table_of_the_Mortal_Sins_%2528Luxuria%2529.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/6/6f/Jheronimus_Bosch_Table_of_the_Mortal_Sins_%28Luxuria%29.jpg/420px-Jheronimus_Bosch_Table_of_the_Mortal_Sins_%28Luxuria%29.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/6/6f/Jheronimus_Bosch_Table_of_the_Mortal_Sins_%28Luxuria%29.jpg 2x" width="280"></a><span data-dcnode-id="2102" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="2089"><div class="magnify" data-dcnode-id="2100"><a class="internal" data-dcnode-id="2101" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AJheronimus_Bosch_Table_of_the_Mortal_Sins_%28Luxuria%29.jpg" title="Enlarge"></a></div><span data-dcnode-id="2099" instrument_node="">Detail: </span><i data-dcnode-id="2097"><span data-dcnode-id="2098" instrument_node="">Luxuria</span></i><span data-dcnode-id="2096" instrument_node=""> (Lust), in </span><i data-dcnode-id="2093"><a data-dcnode-id="2094" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Seven_Deadly_Sins_and_the_Four_Last_Things" title="The Seven Deadly Sins and the Four Last Things"><span data-dcnode-id="2095" instrument_node="">The Seven Deadly Sins and the Four Last Things</span></a></i><span data-dcnode-id="2092" instrument_node="">, by </span><a data-dcnode-id="2090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hieronymus_Bosch" title="Hieronymus Bosch"><span data-dcnode-id="2091" instrument_node="">Hieronymus Bosch</span></a></div></div></div><span data-dcnode-id="2086" instrument_node="">
</span><p data-dcnode-id="2078"><span data-dcnode-id="2085" instrument_node="">The Catholic Church considers the prohibition on coveting in Deuteronomy 5:21 and Exodus 20:17 to include two commandments, which are numbered the ninth and tenth. In the Catholic view, the ninth commandment is a prohibition on carnal </span><a data-dcnode-id="2083" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Concupiscence" title="Concupiscence"><span data-dcnode-id="2084" instrument_node="">concupiscence</span></a><span data-dcnode-id="2082" instrument_node=""> (or </span><a data-dcnode-id="2080" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lust" title="Lust"><span data-dcnode-id="2081" instrument_node="">lust</span></a><span data-dcnode-id="2079" instrument_node="">), and the tenth commandment prohibits greed and the setting of one's heart on material possessions.
</span></p><span data-dcnode-id="2077" instrument_node="">
</span><h3 data-dcnode-id="2066"><span data-dcnode-id="2076" id="Prohibition_of_carnal_concupiscence_.28lust.29"></span><span class="mw-headline" data-dcnode-id="2074" id="Prohibition_of_carnal_concupiscence_(lust)"><span data-dcnode-id="2075" instrument_node="">Prohibition of carnal concupiscence (lust)</span></span><span class="mw-editsection" data-dcnode-id="2067"><span class="mw-editsection-bracket" data-dcnode-id="2072"><span data-dcnode-id="2073" instrument_node="">[</span></span><a data-dcnode-id="2070" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DThou_shalt_not_covet%26action%3Dedit%26section%3D5" title="Edit section: Prohibition of carnal concupiscence (lust)"><span data-dcnode-id="2071" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2068"><span data-dcnode-id="2069" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2065" instrument_node="">
</span><p data-dcnode-id="2059"><span data-dcnode-id="2064" instrument_node="">The ninth commandment forbids "the interior, mental desire or plan" to do adultery, which is strictly forbidden by the sixth commandment. It's considered sinful when desired or thought lustfully and deliberately with "full knowledge and full consent of the will".</span><sup class="reference" data-dcnode-id="2061" id="cite_ref-32"><a data-dcnode-id="2062" href="#cite_note-32"><span data-dcnode-id="2063" instrument_node="">[32]</span></a></sup><span data-dcnode-id="2060" instrument_node="">
</span></p><p data-dcnode-id="2050"><span data-dcnode-id="2058" instrument_node="">A key point in the Catholic understanding of the ninth commandment is Jesus' statement in the </span><a data-dcnode-id="2056" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sermon_on_the_Mount" title="Sermon on the Mount"><span data-dcnode-id="2057" instrument_node="">Sermon on the Mount</span></a><span data-dcnode-id="2055" instrument_node="">, "Every one who looks at a woman lustfully has already committed adultery with her in his heart."</span><sup class="reference" data-dcnode-id="2052" id="cite_ref-33"><a data-dcnode-id="2053" href="#cite_note-33"><span data-dcnode-id="2054" instrument_node="">[33]</span></a></sup><span data-dcnode-id="2051" instrument_node=""> There is an emphasis on the thoughts and attitudes of the heart as well as the promise that the pure in heart will both see God and be like him.
</span></p><span data-dcnode-id="2049" instrument_node="">
</span><link data-dcnode-id="2048" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="2042"><p data-dcnode-id="2043"><span data-dcnode-id="2047" instrument_node="">The sixth beatitude proclaims, "Blessed are the pure in heart, for they shall see God." "Pure in heart" refers to those who have attuned their intellects and wills to the demands of God's holiness, chiefly in three areas: charity; chastity or sexual rectitude; love of truth and orthodoxy of faith. …The "pure in heart" are promised that they will see God face to face and be like him.( 1 Corinthians 13:12; 1 John 3:2) Purity of heart is the precondition of the vision of God. Even now it enables us to see according to God, to accept others as "neighbors"; it lets us perceive the human body - ours and our neighbor's - as a temple of the Holy Spirit, a manifestation of divine beauty.</span><sup class="reference" data-dcnode-id="2044" id="cite_ref-34"><a data-dcnode-id="2045" href="#cite_note-34"><span data-dcnode-id="2046" instrument_node="">[34]</span></a></sup></p></blockquote><span data-dcnode-id="2041" instrument_node="">
</span><p data-dcnode-id="2035"><span data-dcnode-id="2040" instrument_node="">While baptism confers upon the Christian the grace of purification from sins, the baptized must continue to struggle against disordered desires and the lust of the flesh. By God's grace he can prevail 1) by virtue of the gift of chastity which empowers love with an undivided and upright heart 2) by purity of intention which seeks to find and fulfill the will of God in everything 3) by purity of vision which disciplines the feelings and imagination and refuses complicity with impure thoughts, and  4) by prayer which looks to God for help against temptation and casts one's cares upon God.</span><sup class="reference" data-dcnode-id="2037" id="cite_ref-35"><a data-dcnode-id="2038" href="#cite_note-35"><span data-dcnode-id="2039" instrument_node="">[35]</span></a></sup><span data-dcnode-id="2036" instrument_node="">
</span></p><p data-dcnode-id="2029"><span data-dcnode-id="2034" instrument_node="">Adherence to the ninth commandment's requirement of purity requires modesty, which "protects the intimate center of the person". Modesty refuses to uncover "what should remain hidden". Modesty is a servant of chastity and guides how one looks at others and behaves toward them in protective conformity with the dignity of the human person.  Modesty encourages patience and moderation in loving relationships, requiring that the conditions for the definitive giving and commitment of man and woman be fulfilled to one another. It's a decency that inspires one's clothing. Modesty is discreet and avoids harmful curiosity.</span><sup class="reference" data-dcnode-id="2031" id="cite_ref-36"><a data-dcnode-id="2032" href="#cite_note-36"><span data-dcnode-id="2033" instrument_node="">[36]</span></a></sup><span data-dcnode-id="2030" instrument_node="">
</span></p><span data-dcnode-id="2028" instrument_node="">
</span><link data-dcnode-id="2027" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="2016"><p data-dcnode-id="2025"><span data-dcnode-id="2026" instrument_node="">There's a modesty of the feelings as well as of the body. It protests, for example, against the voyeuristic explorations of the human body in certain advertisements, or against the solicitations of certain media that go too far in the exhibition of intimate things. Modesty inspires a way of life which makes it possible to resist the allurements of fashion and the pressures of prevailing ideologies. The forms taken by modesty vary from one culture to another. Everywhere, however, modesty exists as an intuition of the spiritual dignity proper to man. It is born with the awakening consciousness of being a subject. Teaching modesty to children and adolescents means awakening in them respect for the human person. </span></p><div class="templatequotecite" data-dcnode-id="2017"><span data-dcnode-id="2024" instrument_node="">— </span><cite data-dcnode-id="2018"><i data-dcnode-id="2022"><span data-dcnode-id="2023" instrument_node="">Catechism of the Catholic Church</span></i><sup class="reference" data-dcnode-id="2019" id="cite_ref-37"><a data-dcnode-id="2020" href="#cite_note-37"><span data-dcnode-id="2021" instrument_node="">[37]</span></a></sup></cite></div></blockquote><span data-dcnode-id="2015" instrument_node="">
</span><p data-dcnode-id="2009"><span data-dcnode-id="2014" instrument_node="">In addition to personal purity and modesty, the Catholic Church teaches that Christian purity requires a purification of the social climate. Communications media ought to demonstrate respect and restraint in their presentations which should be free from widespread eroticism and the inclination to voyeurism and illusion. Moral permissiveness rests on a wrongheaded understanding of human freedom.  Education in the moral law is necessary for the development of true freedom. Educators should be expected to give young people "instruction respectful of the truth, the qualities of the heart, and the moral and spiritual dignity of man."</span><sup class="reference" data-dcnode-id="2011" id="cite_ref-38"><a data-dcnode-id="2012" href="#cite_note-38"><span data-dcnode-id="2013" instrument_node="">[38]</span></a></sup><span data-dcnode-id="2010" instrument_node="">
</span></p><span data-dcnode-id="2008" instrument_node="">
</span><h3 data-dcnode-id="1998"><span class="mw-headline" data-dcnode-id="2006" id="Prohibition_of_greed_and_envy_of_possessions"><span data-dcnode-id="2007" instrument_node="">Prohibition of greed and envy of possessions</span></span><span class="mw-editsection" data-dcnode-id="1999"><span class="mw-editsection-bracket" data-dcnode-id="2004"><span data-dcnode-id="2005" instrument_node="">[</span></span><a data-dcnode-id="2002" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DThou_shalt_not_covet%26action%3Dedit%26section%3D6" title="Edit section: Prohibition of greed and envy of possessions"><span data-dcnode-id="2003" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2000"><span data-dcnode-id="2001" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1997" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="1976"><div class="thumbinner" data-dcnode-id="1977" style="width:172px;"><a class="image" data-dcnode-id="1995" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AThe_worship_of_Mammon.jpg"><img alt="" class="thumbimage" data-dcnode-id="1996" data-file-height="10441" data-file-width="8601" decoding="async" height="206" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/b/bc/The_worship_of_Mammon.jpg/170px-The_worship_of_Mammon.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/b/bc/The_worship_of_Mammon.jpg/255px-The_worship_of_Mammon.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/b/bc/The_worship_of_Mammon.jpg/340px-The_worship_of_Mammon.jpg 2x" width="170"></a><span data-dcnode-id="1994" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="1978"><div class="magnify" data-dcnode-id="1992"><a class="internal" data-dcnode-id="1993" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AThe_worship_of_Mammon.jpg" title="Enlarge"></a></div><span data-dcnode-id="1991" instrument_node="">1909 painting </span><i data-dcnode-id="1986"><span data-dcnode-id="1990" instrument_node="">The Worship of </span><a data-dcnode-id="1988" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mammon" title="Mammon"><span data-dcnode-id="1989" instrument_node="">Mammon</span></a><span data-dcnode-id="1987" instrument_node="">, </span></i><span data-dcnode-id="1985" instrument_node="">the New Testament representation and personification of material greed</span><i data-dcnode-id="1983"><span data-dcnode-id="1984" instrument_node="">, </span></i><span data-dcnode-id="1982" instrument_node=""> by </span><a data-dcnode-id="1980" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Evelyn_De_Morgan" title="Evelyn De Morgan"><span data-dcnode-id="1981" instrument_node="">Evelyn De Morgan</span></a><span data-dcnode-id="1979" instrument_node="">.</span></div></div></div><span data-dcnode-id="1975" instrument_node="">
</span><p data-dcnode-id="1959"><span data-dcnode-id="1974" instrument_node="">Catholic teaching on the prohibition of </span><a data-dcnode-id="1972" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Greed" title="Greed"><span data-dcnode-id="1973" instrument_node="">greed</span></a><span data-dcnode-id="1971" instrument_node=""> and </span><a data-dcnode-id="1969" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Envy" title="Envy"><span data-dcnode-id="1970" instrument_node="">envy</span></a><span data-dcnode-id="1968" instrument_node=""> center around Christ's admonishments to desire and store up treasure in Heaven rather than on Earth, "For where your treasure is, there'll your heart be also."</span><sup class="reference" data-dcnode-id="1965" id="cite_ref-39"><a data-dcnode-id="1966" href="#cite_note-39"><span data-dcnode-id="1967" instrument_node="">[39]</span></a></sup><span data-dcnode-id="1964" instrument_node=""> The tenth commandment is regarded as completing and unfolding the ninth. The tenth commandment forbids coveting the goods of another, as the root of the stealing and fraud forbidden by the commandment, "You shan't steal."  "Lust of the eyes" leads to the violence and injustice forbidden by the commandment, "You shan't murder." Covetousness, like sexual immorality, originates in the idolatry prohibited by the first three commandments. Along with the ninth commandment, the tenth summarizes the entire Ten Commandments, by focusing on the intentions and desires of the heart.</span><sup class="reference" data-dcnode-id="1961" id="cite_ref-40"><a data-dcnode-id="1962" href="#cite_note-40"><span data-dcnode-id="1963" instrument_node="">[40]</span></a></sup><span data-dcnode-id="1960" instrument_node="">
</span></p><p data-dcnode-id="1931"><span data-dcnode-id="1958" instrument_node="">Covetous desires create disorder because they move beyond satisfying basic human needs and "exceed the limits of reason and drive us to covet unjustly what is not ours and belongs to another or is owed to him."</span><sup class="reference" data-dcnode-id="1955" id="cite_ref-41"><a data-dcnode-id="1956" href="#cite_note-41"><span data-dcnode-id="1957" instrument_node="">[41]</span></a></sup><span data-dcnode-id="1954" instrument_node=""> Greed and the desire to amass earthy goods without limit are forbidden as are </span><a class="mw-redirect" data-dcnode-id="1952" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Avarice" title="Avarice"><span data-dcnode-id="1953" instrument_node="">avarice</span></a><span data-dcnode-id="1951" instrument_node=""> and the passion for riches and power. "You shan't covet" means that we should banish our desires for whatever doesn't belong to us. Never having enough money is regarded as a symptom of the love of money.</span><sup class="reference" data-dcnode-id="1948" id="cite_ref-42"><a data-dcnode-id="1949" href="#cite_note-42"><span data-dcnode-id="1950" instrument_node="">[42]</span></a></sup><span data-dcnode-id="1947" instrument_node=""> Obedience to the tenth commandment requires that envy be banished from the human heart. Envy is a </span><a class="mw-redirect" data-dcnode-id="1945" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Capital_sin" title="Capital sin"><span data-dcnode-id="1946" instrument_node="">capital sin</span></a><span data-dcnode-id="1944" instrument_node=""> that includes sadness at the sight of another's goods and the immoderate desire to acquire them for oneself. The baptized person should resist envy by practicing good will and rejoicing and praising God for material blessings granted to neighbor and brother.</span><sup class="reference" data-dcnode-id="1941" id="cite_ref-43"><a data-dcnode-id="1942" href="#cite_note-43"><span data-dcnode-id="1943" instrument_node="">[43]</span></a></sup><span data-dcnode-id="1940" instrument_node="">
God warns man away from what seems "good for food . . . a delight to the eyes . . . to be desired to make one wise,"</span><sup class="reference" data-dcnode-id="1937" id="cite_ref-44"><a data-dcnode-id="1938" href="#cite_note-44"><span data-dcnode-id="1939" instrument_node="">[44]</span></a></sup><span data-dcnode-id="1936" instrument_node=""> and law and grace turn men's hearts away from avarice and envy and toward the Holy Spirit who satisfies man's heart.</span><sup class="reference" data-dcnode-id="1933" id="cite_ref-45"><a data-dcnode-id="1934" href="#cite_note-45"><span data-dcnode-id="1935" instrument_node="">[45]</span></a></sup><span data-dcnode-id="1932" instrument_node="">
</span></p><span data-dcnode-id="1930" instrument_node="">
</span><link data-dcnode-id="1929" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="1918"><p data-dcnode-id="1927"><span data-dcnode-id="1928" instrument_node="">But now the righteousness of God has been manifested apart from law, although the law and the prophets bear witness to it, the righteousness of God through faith in Jesus Christ for all who believe." (Romans 3:21-22) Henceforth, Christ's faithful "have crucified the flesh with its passions and desires"; they are led by the Spirit and follow the desires of the Spirit."(Galatians 5:24, cf. Romans 8:14, 27) </span></p><div class="templatequotecite" data-dcnode-id="1919"><span data-dcnode-id="1926" instrument_node="">— </span><cite data-dcnode-id="1920"><i data-dcnode-id="1924"><span data-dcnode-id="1925" instrument_node="">Catechism of the Catholic Church</span></i><sup class="reference" data-dcnode-id="1921" id="cite_ref-46"><a data-dcnode-id="1922" href="#cite_note-46"><span data-dcnode-id="1923" instrument_node="">[46]</span></a></sup></cite></div></blockquote><span data-dcnode-id="1917" instrument_node="">
</span><p data-dcnode-id="1883"><span data-dcnode-id="1916" instrument_node="">Catholic teaching reminds that Jesus enjoins his disciples to prefer him to everything and everyone, and bids them "renounce all that [they have]" for his sake and that of the Gospel.</span><sup class="reference" data-dcnode-id="1913" id="cite_ref-47"><a data-dcnode-id="1914" href="#cite_note-47"><span data-dcnode-id="1915" instrument_node="">[47]</span></a></sup><span data-dcnode-id="1912" instrument_node=""> Jesus gave his disciples the example of the poor widow of Jerusalem who gave out of her poverty all that she had to live on.</span><sup class="reference" data-dcnode-id="1909" id="cite_ref-48"><a data-dcnode-id="1910" href="#cite_note-48"><span data-dcnode-id="1911" instrument_node="">[48]</span></a></sup><span data-dcnode-id="1908" instrument_node=""> Detachment from riches is portrayed as obligatory for entrance into the Kingdom of heaven.</span><sup class="reference" data-dcnode-id="1905" id="cite_ref-49"><a data-dcnode-id="1906" href="#cite_note-49"><span data-dcnode-id="1907" instrument_node="">[49]</span></a></sup><span data-dcnode-id="1904" instrument_node=""> "Blessed are the poor in spirit"</span><sup class="reference" data-dcnode-id="1901" id="cite_ref-50"><a data-dcnode-id="1902" href="#cite_note-50"><span data-dcnode-id="1903" instrument_node="">[50]</span></a></sup><span data-dcnode-id="1900" instrument_node=""> illustrates that those who voluntarily don't receive their physical needs are more inclined to seek fulfillment of their spiritual needs through Jesus Christ. "The Lord grieves over the rich, because they find their consolation in the abundance of goods."</span><sup class="reference" data-dcnode-id="1897" id="cite_ref-51"><a data-dcnode-id="1898" href="#cite_note-51"><span data-dcnode-id="1899" instrument_node="">[51]</span></a></sup><span data-dcnode-id="1896" instrument_node=""> 
"I want to see God" expresses the true desire of man. The water of eternal life quenches the thirst for God.</span><sup class="reference" data-dcnode-id="1893" id="cite_ref-52"><a data-dcnode-id="1894" href="#cite_note-52"><span data-dcnode-id="1895" instrument_node="">[52]</span></a></sup><span data-dcnode-id="1892" instrument_node=""> Attachment to the goods of this world are a bondage. The Scriptural remedy is the desire for true happiness that's found in seeking and finding God. Holy people must struggle, with grace from on high, to obtain the good things God promises.  Christ's faithful put to death their cravings and, with the grace of God, prevail over the seductions of pleasure and power.</span><sup class="reference" data-dcnode-id="1889" id="cite_ref-53"><a data-dcnode-id="1890" href="#cite_note-53"><span data-dcnode-id="1891" instrument_node="">[53]</span></a></sup><span data-dcnode-id="1888" instrument_node=""> For what does it profit a man to gain the whole world, yet lose his own soul?</span><sup class="reference" data-dcnode-id="1885" id="cite_ref-54"><a data-dcnode-id="1886" href="#cite_note-54"><span data-dcnode-id="1887" instrument_node="">[54]</span></a></sup><span data-dcnode-id="1884" instrument_node="">
</span></p><span data-dcnode-id="1882" instrument_node="">
</span><h2 data-dcnode-id="1872"><span class="mw-headline" data-dcnode-id="1880" id="Protestant_views"><span data-dcnode-id="1881" instrument_node="">Protestant views</span></span><span class="mw-editsection" data-dcnode-id="1873"><span class="mw-editsection-bracket" data-dcnode-id="1878"><span data-dcnode-id="1879" instrument_node="">[</span></span><a data-dcnode-id="1876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DThou_shalt_not_covet%26action%3Dedit%26section%3D7" title="Edit section: Protestant views"><span data-dcnode-id="1877" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1874"><span data-dcnode-id="1875" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1871" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="1858"><div class="thumbinner" data-dcnode-id="1859" style="width:222px;"><a class="image" data-dcnode-id="1869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ATenth_Commandment_%28Boston_Public_Library%29.jpg"><img alt="" class="thumbimage" data-dcnode-id="1870" data-file-height="1500" data-file-width="1042" decoding="async" height="317" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/6/6b/Tenth_Commandment_%2528Boston_Public_Library%2529.jpg/220px-Tenth_Commandment_%2528Boston_Public_Library%2529.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/6/6b/Tenth_Commandment_%28Boston_Public_Library%29.jpg/330px-Tenth_Commandment_%28Boston_Public_Library%29.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/6/6b/Tenth_Commandment_%28Boston_Public_Library%29.jpg/440px-Tenth_Commandment_%28Boston_Public_Library%29.jpg 2x" width="220"></a><span data-dcnode-id="1868" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="1860"><div class="magnify" data-dcnode-id="1866"><a class="internal" data-dcnode-id="1867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ATenth_Commandment_%28Boston_Public_Library%29.jpg" title="Enlarge"></a></div><span data-dcnode-id="1865" instrument_node="">"Tenth Commandment", </span><i data-dcnode-id="1862"><a class="mw-redirect" data-dcnode-id="1863" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Harpers_Weekly" title="Harpers Weekly"><span data-dcnode-id="1864" instrument_node="">Harpers Weekly</span></a></i><span data-dcnode-id="1861" instrument_node="">, March 12, 1870</span></div></div></div><span data-dcnode-id="1857" instrument_node="">
</span><p data-dcnode-id="1855"><span data-dcnode-id="1856" instrument_node="">Martin Luther views sinful human nature such that no person naturally desires to see others with as much as oneself, each acquiring as much as he can while pretending to be pious.  The human heart, Luther says, is deceitful, knowing how to adorn oneself finely while concealing one's rascality.
</span></p><span data-dcnode-id="1854" instrument_node="">
</span><link data-dcnode-id="1853" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="1843"><p data-dcnode-id="1851"><span data-dcnode-id="1852" instrument_node="">For we're so inclined by nature that no one desires to see another have as much as himself, and each one acquires as much as he can; the other may fare as best he can. And yet we pretend to be godly, know how to adorn ourselves most finely and conceal our rascality, resort to and invent adroit devices and deceitful artifices (such as now are daily most ingeniously contrived) as though they were derived from the law codes; yea, we even dare impertinently to refer to it, and boast of it, and won't have it called rascality, but shrewdness and caution. In this lawyers and jurists assist, who twist and stretch the law to suit it to their cause, stress words and use them for a subterfuge, irrespective of equity or their neighbor's necessity. And, in short, whoever is the most expert and cunning in these affairs finds most help in law, as they themselves say: Vigilantibus iura subveniunt [that is, The laws favor the watchful].</span></p><div class="templatequotecite" data-dcnode-id="1844"><span data-dcnode-id="1850" instrument_node="">— </span><cite data-dcnode-id="1845"><span data-dcnode-id="1849" instrument_node="">Martin Luther, The Large Catechism</span><sup class="reference" data-dcnode-id="1846" id="cite_ref-Luther_55-0"><a data-dcnode-id="1847" href="#cite_note-Luther-55"><span data-dcnode-id="1848" instrument_node="">[55]</span></a></sup></cite></div></blockquote><span data-dcnode-id="1842" instrument_node="">
</span><p data-dcnode-id="1836"><span data-dcnode-id="1841" instrument_node="">Luther further explains that the tenth commandment isn't intended for the rogues of the world, but for the pious, who wish to be praised and considered as honest and upright people, because they haven't broken any of the outward commandments.  Luther sees covetousness in the quarreling and wrangling in court over inheritances and real estate.  He sees covetousness in financiering practiced in a manner to obtain houses, castles, and land through foreclosure.  Likewise, Luther sees the tenth commandment as forbidding contrivances to take another man's wife as one's own and uses the example of King Herod taking his brother's wife while his brother was still living.</span><sup class="reference" data-dcnode-id="1838" id="cite_ref-56"><a data-dcnode-id="1839" href="#cite_note-56"><span data-dcnode-id="1840" instrument_node="">[56]</span></a></sup><span data-dcnode-id="1837" instrument_node="">
</span></p><span data-dcnode-id="1835" instrument_node="">
</span><link data-dcnode-id="1834" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="1824"><p data-dcnode-id="1832"><span data-dcnode-id="1833" instrument_node="">In whatever way such things happen, we must know that God doesn't wish that you deprive your neighbor of anything that belongs to him so that he suffer the loss and you gratify your avarice with it, even if you could keep it honorably before the world; for it's a secret and insidious imposition practised under the hat, as we say, that it may not be observed. For although you go your way as if you'd done no one any wrong, you've nevertheless injured your neighbor; and if it's not called stealing and cheating, yet it's called coveting your neighbor's property, that is, aiming at possession of it, enticing it away from him without his will, and being unwilling to see him enjoy what God has granted him.</span></p><div class="templatequotecite" data-dcnode-id="1825"><span data-dcnode-id="1831" instrument_node="">— </span><cite data-dcnode-id="1826"><span data-dcnode-id="1830" instrument_node="">Martin Luther, The Large Catechism</span><sup class="reference" data-dcnode-id="1827" id="cite_ref-Luther_55-1"><a data-dcnode-id="1828" href="#cite_note-Luther-55"><span data-dcnode-id="1829" instrument_node="">[55]</span></a></sup></cite></div></blockquote><span data-dcnode-id="1823" instrument_node="">
</span><p data-dcnode-id="1817"><span data-dcnode-id="1822" instrument_node="">John Calvin views the tenth commandment as a demand for purity of the heart, above and beyond the outward actions.  Calvin distinguishes between making an explicit design to obtain what belongs to our neighbor and a covetous desire in the heart.  For Calvin, design is a deliberate consent of the will, after passion has taken possession of the mind.  Covetousness may exist without such a deliberate design, when the mind is stimulated and tickled by objects on which we set our affection.</span><sup class="reference" data-dcnode-id="1819" id="cite_ref-Calvin_57-0"><a data-dcnode-id="1820" href="#cite_note-Calvin-57"><span data-dcnode-id="1821" instrument_node="">[57]</span></a></sup><span data-dcnode-id="1818" instrument_node="">
</span></p><span data-dcnode-id="1816" instrument_node="">
</span><link data-dcnode-id="1815" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="1805"><p data-dcnode-id="1813"><span data-dcnode-id="1814" instrument_node="">As, therefore, the Lord previously ordered that charity should regulate our wishes, studies, and actions, so he now orders us to regulate the thoughts of the mind in the same way, that none of them may be depraved and distorted, so as to give the mind a contrary bent. Having forbidden us to turn and incline our mind to wrath, hatred, adultery, theft, and falsehood, he now forbids us to give our thoughts the same direction.</span></p><div class="templatequotecite" data-dcnode-id="1806"><span data-dcnode-id="1812" instrument_node="">— </span><cite data-dcnode-id="1807"><span data-dcnode-id="1811" instrument_node="">John Calvin</span><sup class="reference" data-dcnode-id="1808" id="cite_ref-Calvin_57-1"><a data-dcnode-id="1809" href="#cite_note-Calvin-57"><span data-dcnode-id="1810" instrument_node="">[57]</span></a></sup></cite></div></blockquote><span data-dcnode-id="1804" instrument_node="">
</span><p data-dcnode-id="1798"><span data-dcnode-id="1803" instrument_node="">In explaining the prohibition on covetousness, Calvin views the mind as either being filled with charitable thoughts toward one's brother and neighbor, or being inclined toward covetous desires and designs. The mind wholly imbued with charity has no room for carnal desires. Calvin recognizes that all sorts of fancies rise up in the mind, and he exhorts the individual to exercise choice and discipline to shifting one's thoughts away from fleshly desires and passions.  Calvin asserts that God's intention in the command is to prohibit every kind of perverse desire.</span><sup class="reference" data-dcnode-id="1800" id="cite_ref-58"><a data-dcnode-id="1801" href="#cite_note-58"><span data-dcnode-id="1802" instrument_node="">[58]</span></a></sup><span data-dcnode-id="1799" instrument_node="">
</span></p><p data-dcnode-id="1792"><span data-dcnode-id="1797" instrument_node="">Matthew Henry sees the tenth commandment striking at the root of many sins by forbidding all desire that may yield injury to one's neighbor. The language of discontent and envy are forbidden in the heart and mind. The appetites and desires of the corrupt nature are proscribed, and all are enjoined to see our face in the reflection of this law and to submit our hearts under the government of it.</span><sup class="reference" data-dcnode-id="1794" id="cite_ref-god_59-0"><a data-dcnode-id="1795" href="#cite_note-god-59"><span data-dcnode-id="1796" instrument_node="">[59]</span></a></sup><span data-dcnode-id="1793" instrument_node="">
</span></p><span data-dcnode-id="1791" instrument_node="">
</span><link data-dcnode-id="1790" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="1777"><p data-dcnode-id="1785"><span data-dcnode-id="1789" instrument_node="">The foregoing commands implicitly forbid all desire of doing that which will be an injury to our neighbour; this forbids all inordinate desire of having that which will be a gratification to ourselves. "O that such a man's house were mine! Such a man's wife mine! Such a man's estate mine!</span><i data-dcnode-id="1787"><span data-dcnode-id="1788" instrument_node=""> This is certainly the language of discontent at our own lot, and envy at our neighbour's; and these are the sins principally forbidden here.</span></i><span data-dcnode-id="1786" instrument_node="">
St. Paul, when the grace of God caused the scales to fall from his eyes, perceived that this law, Thou shalt not covet, forbade all those irregular appetites and desires which are the first-born of the corrupt nature, the first risings of the sin that dwelleth in us, and the beginnings of all the sin that' committed by us: this is that lust which, he says, he hadn't known the evil of, if this commandment, when it came to his conscience in the power of it, hadn't shown it to him, Rom. 7:7.</span></p><div class="templatequotecite" data-dcnode-id="1778"><span data-dcnode-id="1784" instrument_node="">— </span><cite data-dcnode-id="1779"><span data-dcnode-id="1783" instrument_node="">Matthew Henry</span><sup class="reference" data-dcnode-id="1780" id="cite_ref-god_59-1"><a data-dcnode-id="1781" href="#cite_note-god-59"><span data-dcnode-id="1782" instrument_node="">[59]</span></a></sup></cite></div></blockquote><span data-dcnode-id="1776" instrument_node="">
</span><h2 data-dcnode-id="1766"><span class="mw-headline" data-dcnode-id="1774" id="See_also"><span data-dcnode-id="1775" instrument_node="">See also</span></span><span class="mw-editsection" data-dcnode-id="1767"><span class="mw-editsection-bracket" data-dcnode-id="1772"><span data-dcnode-id="1773" instrument_node="">[</span></span><a data-dcnode-id="1770" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DThou_shalt_not_covet%26action%3Dedit%26section%3D8" title="Edit section: See also"><span data-dcnode-id="1771" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1768"><span data-dcnode-id="1769" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1765" instrument_node="">
