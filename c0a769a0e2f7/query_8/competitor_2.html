</span><p data-dcnode-id="2510"><span data-dcnode-id="2530" instrument_node="">"</span><b data-dcnode-id="2528"><span data-dcnode-id="2529" instrument_node="">Thou shalt not steal</span></b><span data-dcnode-id="2527" instrument_node="">" is one of the </span><a data-dcnode-id="2525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ten_Commandments" title="Ten Commandments"><span data-dcnode-id="2526" instrument_node="">Ten Commandments</span></a><sup class="reference" data-dcnode-id="2522" id="cite_ref-1"><a data-dcnode-id="2523" href="#cite_note-1"><span data-dcnode-id="2524" instrument_node="">[1]</span></a></sup><span data-dcnode-id="2521" instrument_node=""> of the Jewish </span><a data-dcnode-id="2519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Torah" title="Torah"><span data-dcnode-id="2520" instrument_node="">Torah</span></a><span data-dcnode-id="2518" instrument_node=""> (known to Christians as the first five books of the </span><a data-dcnode-id="2516" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Old_Testament" title="Old Testament"><span data-dcnode-id="2517" instrument_node="">Old Testament</span></a><span data-dcnode-id="2515" instrument_node="">), which are widely understood as moral imperatives by legal scholars, Jewish scholars, Catholic scholars, and Post-Reformation scholars.</span><sup class="reference" data-dcnode-id="2512" id="cite_ref-2"><a data-dcnode-id="2513" href="#cite_note-2"><span data-dcnode-id="2514" instrument_node="">[2]</span></a></sup><span data-dcnode-id="2511" instrument_node="">
</span></p><p data-dcnode-id="2492"><span data-dcnode-id="2509" instrument_node="">"Steal" in this commandment has traditionally been interpreted by </span><a data-dcnode-id="2507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jewish_commentaries_on_the_Bible" title="Jewish commentaries on the Bible"><span data-dcnode-id="2508" instrument_node="">Jewish commentaries</span></a><span data-dcnode-id="2506" instrument_node=""> to refer to the stealing of an actual human being, that is, to </span><a class="mw-redirect" data-dcnode-id="2504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kidnap" title="Kidnap"><span data-dcnode-id="2505" instrument_node="">kidnap</span></a><span data-dcnode-id="2503" instrument_node="">.</span><sup class="reference" data-dcnode-id="2500" id="cite_ref-3"><a data-dcnode-id="2501" href="#cite_note-3"><span data-dcnode-id="2502" instrument_node="">[3]</span></a></sup><span data-dcnode-id="2499" instrument_node=""> With this understanding, a contextual translation of the commandment in Jewish tradition would more accurately be rendered as "</span><b data-dcnode-id="2497"><span data-dcnode-id="2498" instrument_node="">Thou shalt not kidnap</span></b><span data-dcnode-id="2496" instrument_node="">". Kidnapping would then constitute a </span><a data-dcnode-id="2494" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/List_of_capital_crimes_in_the_Torah" title="List of capital crimes in the Torah"><span data-dcnode-id="2495" instrument_node="">capital offence</span></a><span data-dcnode-id="2493" instrument_node=""> and thus merit its inclusion among the Ten Commandments.
</span></p><p data-dcnode-id="2481"><span data-dcnode-id="2491" instrument_node="">Nevertheless, this commandment has come to be interpreted, especially in non-Jewish traditions, as the unauthorized taking of private </span><a data-dcnode-id="2489" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Property" title="Property"><span data-dcnode-id="2490" instrument_node="">property</span></a><span data-dcnode-id="2488" instrument_node=""> (stealing or </span><a data-dcnode-id="2486" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Theft" title="Theft"><span data-dcnode-id="2487" instrument_node="">theft</span></a><span data-dcnode-id="2485" instrument_node="">), which is a wrongful action already prohibited elsewhere in the </span><a data-dcnode-id="2483" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hebrew_Bible" title="Hebrew Bible"><span data-dcnode-id="2484" instrument_node="">Hebrew Bible</span></a><span data-dcnode-id="2482" instrument_node=""> that does not ordinarily incur the death penalty.
</span></p><span data-dcnode-id="2480" instrument_node="">

</span><table class="box-Original_research plainlinks metadata ambox ambox-content ambox-Original_research" data-dcnode-id="2346" role="presentation"><tbody data-dcnode-id="2347"><tr data-dcnode-id="2348"><td class="mbox-image" data-dcnode-id="2382"><div data-dcnode-id="2383" style="width:52px"><img alt="" data-dcnode-id="2384" data-file-height="40" data-file-width="40" decoding="async" height="40" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/en/thumb/b/b4/Ambox_important.svg/40px-Ambox_important.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/en/thumb/b/b4/Ambox_important.svg/60px-Ambox_important.svg.png 1.5x, //upload.wikimedia.org/wikipedia/en/thumb/b/b4/Ambox_important.svg/80px-Ambox_important.svg.png 2x" width="40"></div></td><td class="mbox-text" data-dcnode-id="2349"><div class="mbox-text-span" data-dcnode-id="2350"><span data-dcnode-id="2381" instrument_node="">This section </span><b data-dcnode-id="2377"><span data-dcnode-id="2380" instrument_node="">possibly contains </span><a data-dcnode-id="2378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ANo_original_research" title="Wikipedia:No original research"><span data-dcnode-id="2379" instrument_node="">original research</span></a></b><span data-dcnode-id="2376" instrument_node="">.</span><span class="hide-when-compact" data-dcnode-id="2365"><span data-dcnode-id="2375" instrument_node=""> Please </span><a class="external text" data-dcnode-id="2373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DThou_shalt_not_steal%26action%3Dedit"><span data-dcnode-id="2374" instrument_node="">improve it</span></a><span data-dcnode-id="2372" instrument_node=""> by </span><a data-dcnode-id="2370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AVerifiability" title="Wikipedia:Verifiability"><span data-dcnode-id="2371" instrument_node="">verifying</span></a><span data-dcnode-id="2369" instrument_node=""> the claims made and adding </span><a data-dcnode-id="2367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACiting_sources%23Inline_citations" title="Wikipedia:Citing sources"><span data-dcnode-id="2368" instrument_node="">inline citations</span></a><span data-dcnode-id="2366" instrument_node="">. Statements consisting only of original research should be removed.</span></span><span data-dcnode-id="2364" instrument_node=""> </span><span class="date-container" data-dcnode-id="2358"><i data-dcnode-id="2359"><span data-dcnode-id="2363" instrument_node="">(</span><span class="date" data-dcnode-id="2361"><span data-dcnode-id="2362" instrument_node="">November 2018</span></span><span data-dcnode-id="2360" instrument_node="">)</span></i></span><span class="hide-when-compact" data-dcnode-id="2351"><i data-dcnode-id="2352"><span data-dcnode-id="2357" instrument_node=""> (</span><small data-dcnode-id="2354"><a data-dcnode-id="2355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Help%3AMaintenance_template_removal" title="Help:Maintenance template removal"><span data-dcnode-id="2356" instrument_node="">Learn how and when to remove this template message</span></a></small><span data-dcnode-id="2353" instrument_node="">)</span></i></span></div></td></tr></tbody></table><span data-dcnode-id="2345" instrument_node="">
</span><p data-dcnode-id="2329"><span data-dcnode-id="2344" instrument_node="">Significant voices of academic theologians (such as German Old Testament scholar </span><a data-dcnode-id="2342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Albrecht_Alt" title="Albrecht Alt"><span data-dcnode-id="2343" instrument_node="">A. Alt</span></a><span data-dcnode-id="2341" instrument_node="">: </span><i data-dcnode-id="2339"><span data-dcnode-id="2340" instrument_node="">Das Verbot des Diebstahls im Dekalog</span></i><span data-dcnode-id="2338" instrument_node=""> (1953)) suggest that commandment "you shall not steal" was originally intended against stealing people—against abductions and slavery,</span><sup class="noprint Inline-Template" data-dcnode-id="2331" style="white-space:nowrap;"><span data-dcnode-id="2337" instrument_node="">[</span><i data-dcnode-id="2333"><a data-dcnode-id="2334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACiting_sources%23What_information_to_include" title="Wikipedia:Citing sources"><span data-dcnode-id="2335" title="A complete citation is needed. (November 2018)"><span data-dcnode-id="2336" instrument_node="">full citation needed</span></span></a></i><span data-dcnode-id="2332" instrument_node="">]</span></sup><span data-dcnode-id="2330" instrument_node=""> in agreement with the Talmudic interpretation of the statement as "you shall not kidnap" (Sanhedrin 86a).
</span></p><p data-dcnode-id="2319"><span data-dcnode-id="2328" instrument_node="">The Hebrew word translated “steal” is “gneva”</span><sup class="reference" data-dcnode-id="2325" id="cite_ref-4"><a data-dcnode-id="2326" href="#cite_note-4"><span data-dcnode-id="2327" instrument_node="">[4]</span></a></sup><span data-dcnode-id="2324" instrument_node="">  The Hebrew Bible contains a number of prohibitions of stealing and descriptions of negative consequences for this sin. The Genesis narrative describes Rachel as having stolen household goods from her father Laban when she fled from Laban's household with her husband Jacob and their children.</span><sup class="reference" data-dcnode-id="2321" id="cite_ref-5"><a data-dcnode-id="2322" href="#cite_note-5"><span data-dcnode-id="2323" instrument_node="">[5]</span></a></sup><span data-dcnode-id="2320" instrument_node="">  Laban hotly pursued Jacob to recover his goods, and intended to do him harm, but Rachel hid the stolen items and avoided detection.  Exodus 21:16 and Deuteronomy 24:7 apply the same Hebrew word to kidnapping (stealing a man) and demands the death penalty for such a sin.
</span></p><p data-dcnode-id="2317"><span data-dcnode-id="2318" instrument_node="">The Hebrew word translated “steal” is more commonly applied to material possessions. Restitution may be demanded, but there is no judicial penalty of death. However, a thief may be killed if caught in the act of breaking in at night under circumstances where the occupants may reasonably be in fear of greater harm. The ancient Hebrew understanding honored private property rights and demanded restitution even in cases that might have been accidental, such as livestock grazing in another man's field or vineyard (Exodus 22:1-9 (ESV)).
</span></p><p data-dcnode-id="2311"><span data-dcnode-id="2316" instrument_node="">In the book of Leviticus, the prohibitions of robbing and stealing are repeated in the context of loving one's neighbor as oneself and the prohibition is expanded to include dealing falsely or fraudulently in matters of trade and negotiations.  Wages owed to a hired worker are not to be withheld.  Neighbors must not oppress or rob each other.  Neighbors are to deal frankly with each other, protect the lives of each other, refrain from vengeance and grudges, and stand up for righteousness and justice in matters that go to court.</span><sup class="reference" data-dcnode-id="2313" id="cite_ref-6"><a data-dcnode-id="2314" href="#cite_note-6"><span data-dcnode-id="2315" instrument_node="">[6]</span></a></sup><span data-dcnode-id="2312" instrument_node="">
</span></p><p data-dcnode-id="2298"><span data-dcnode-id="2310" instrument_node="">The law obliged the thief to pay seven times (if the thief steals because he is hungry</span><sup class="reference" data-dcnode-id="2307" id="cite_ref-7"><a data-dcnode-id="2308" href="#cite_note-7"><span data-dcnode-id="2309" instrument_node="">[7]</span></a></sup><span data-dcnode-id="2306" instrument_node="">). If the thief wasn't able to pay compensation for his theft by selling his things, he was sold as a </span><a class="mw-redirect" data-dcnode-id="2304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Slave" title="Slave"><span data-dcnode-id="2305" instrument_node="">slave</span></a><span data-dcnode-id="2303" instrument_node="">.</span><sup class="reference" data-dcnode-id="2300" id="cite_ref-8"><a data-dcnode-id="2301" href="#cite_note-8"><span data-dcnode-id="2302" instrument_node="">[8]</span></a></sup><span data-dcnode-id="2299" instrument_node="">
</span></p><p data-dcnode-id="2274"><span data-dcnode-id="2297" instrument_node="">If the thief </span><a data-dcnode-id="2295" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Confession_%28religion%29" title="Confession (religion)"><span data-dcnode-id="2296" instrument_node="">confessed</span></a><span data-dcnode-id="2294" instrument_node=""> his sin, he was allowed to return the object, adding a fifth of its price and he brought to the </span><a data-dcnode-id="2292" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Priest" title="Priest"><span data-dcnode-id="2293" instrument_node="">priest</span></a><span data-dcnode-id="2291" instrument_node=""> as his compensation to the Lord a </span><a data-dcnode-id="2289" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sheep" title="Sheep"><span data-dcnode-id="2290" instrument_node="">ram</span></a><span data-dcnode-id="2288" instrument_node=""> without blemish out of the flock, or its equivalent, for a </span><a data-dcnode-id="2286" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Guilt_offering" title="Guilt offering"><span data-dcnode-id="2287" instrument_node="">guilt offering</span></a><span data-dcnode-id="2285" instrument_node="">; and the priest  made </span><a data-dcnode-id="2283" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Atonement_in_Judaism" title="Atonement in Judaism"><span data-dcnode-id="2284" instrument_node="">atonement</span></a><span data-dcnode-id="2282" instrument_node=""> for him before the Lord, and he was </span><a data-dcnode-id="2280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Forgiveness" title="Forgiveness"><span data-dcnode-id="2281" instrument_node="">forgiven</span></a><span data-dcnode-id="2279" instrument_node="">.</span><sup class="reference" data-dcnode-id="2276" id="cite_ref-9"><a data-dcnode-id="2277" href="#cite_note-9"><span data-dcnode-id="2278" instrument_node="">[9]</span></a></sup><span data-dcnode-id="2275" instrument_node="">
</span></p><p data-dcnode-id="2250"><span data-dcnode-id="2273" instrument_node="">In Proverbs, the otherwise unknown Agur requests the Lord not make him poor or rich fearing </span><a data-dcnode-id="2271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Poverty" title="Poverty"><span data-dcnode-id="2272" instrument_node="">poverty</span></a><span data-dcnode-id="2270" instrument_node=""> or </span><a data-dcnode-id="2268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Greed" title="Greed"><span data-dcnode-id="2269" instrument_node="">greed</span></a><span data-dcnode-id="2267" instrument_node=""> might tempt him to theft.</span><sup class="reference" data-dcnode-id="2264" id="cite_ref-10"><a data-dcnode-id="2265" href="#cite_note-10"><span data-dcnode-id="2266" instrument_node="">[10]</span></a></sup><span data-dcnode-id="2263" instrument_node=""> In Proverbs 9:16, the idea that stolen things are sweet and the bread (food) eaten in secret is pleasant is rebuked as foolish.</span><sup class="reference" data-dcnode-id="2260" id="cite_ref-11"><a data-dcnode-id="2261" href="#cite_note-11"><span data-dcnode-id="2262" instrument_node="">[11]</span></a></sup><span data-dcnode-id="2259" instrument_node=""> Even to be partner to a thief is described as to hate one's own life – to know of wrong doing but be unable to testify to it.</span><sup class="reference" data-dcnode-id="2256" id="cite_ref-12"><a data-dcnode-id="2257" href="#cite_note-12"><span data-dcnode-id="2258" instrument_node="">[12]</span></a></sup><span data-dcnode-id="2255" instrument_node=""> Likewise in Romans, rulers such as those of Sodom and Gomorrah who lust after bribes are described as detestable, corrupting their entire state.</span><sup class="reference" data-dcnode-id="2252" id="cite_ref-13"><a data-dcnode-id="2253" href="#cite_note-13"><span data-dcnode-id="2254" instrument_node="">[13]</span></a></sup><span data-dcnode-id="2251" instrument_node="">
</span></p><p data-dcnode-id="2236"><span data-dcnode-id="2249" instrument_node="">The book of Proverbs contrasts the response of a victim to a thief who steals to satisfy his hunger with the response of a jealous husband to adultery.  The thief is not despised by his victim, even though the thief must make restitution even if it costs him all the goods of his house.  In contrast, the jealous husband will accept no compensation and will repay the adulterer with wounds and dishonor, not sparing when his fury takes revenge.</span><sup class="reference" data-dcnode-id="2246" id="cite_ref-14"><a data-dcnode-id="2247" href="#cite_note-14"><span data-dcnode-id="2248" instrument_node="">[14]</span></a></sup><span data-dcnode-id="2245" instrument_node="">  The book of Zechariah describes God as cursing the home of the thief and the home of those who swear falsely</span><sup class="reference" data-dcnode-id="2242" id="cite_ref-15"><a data-dcnode-id="2243" href="#cite_note-15"><span data-dcnode-id="2244" instrument_node="">[15]</span></a></sup><span data-dcnode-id="2241" instrument_node="">  and Jeremiah describes thieves as being shamed when they are caught.</span><sup class="reference" data-dcnode-id="2238" id="cite_ref-16"><a data-dcnode-id="2239" href="#cite_note-16"><span data-dcnode-id="2240" instrument_node="">[16]</span></a></sup><span data-dcnode-id="2237" instrument_node="">
</span></p><span data-dcnode-id="2235" instrument_node="">
</span><h2 data-dcnode-id="2225"><span class="mw-headline" data-dcnode-id="2233" id="Jewish_doctrine"><span data-dcnode-id="2234" instrument_node="">Jewish doctrine</span></span><span class="mw-editsection" data-dcnode-id="2226"><span class="mw-editsection-bracket" data-dcnode-id="2231"><span data-dcnode-id="2232" instrument_node="">[</span></span><a data-dcnode-id="2229" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DThou_shalt_not_steal%26action%3Dedit%26section%3D2" title="Edit section: Jewish doctrine"><span data-dcnode-id="2230" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2227"><span data-dcnode-id="2228" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2224" instrument_node="">
</span><p data-dcnode-id="2219"><span data-dcnode-id="2223" instrument_node="">Jewish law enumerates </span><a class="mw-redirect" data-dcnode-id="2221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/613_Mitzvot" title="613 Mitzvot"><span data-dcnode-id="2222" instrument_node="">613 Mitzvot</span></a><span data-dcnode-id="2220" instrument_node=""> or commandments, including prohibition of stealing and a number of other commandments related to the protection of private property and administration of justice in related cases.
</span></p><span data-dcnode-id="2218" instrument_node="">
</span><blockquote class="templatequote" data-dcnode-id="2161"><p data-dcnode-id="2209"><span data-dcnode-id="2215" instrument_node=""> 467. Not to steal money stealthily (</span><a class="mw-redirect" data-dcnode-id="2213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Leviticus" title="Leviticus"><span data-dcnode-id="2214" instrument_node="">Leviticus</span></a><span data-dcnode-id="2212" instrument_node=""> 19:11)</span><br data-dcnode-id="2211"><span data-dcnode-id="2210" instrument_node="">
</span></p><p data-dcnode-id="2172"><span data-dcnode-id="2208" instrument_node="">468. The court must implement punitive measures against the thief (</span><a data-dcnode-id="2206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Book_of_Exodus" title="Book of Exodus"><span data-dcnode-id="2207" instrument_node="">Exodus</span></a><span data-dcnode-id="2205" instrument_node=""> 21:37)</span><br data-dcnode-id="2204"><span data-dcnode-id="2203" instrument_node="">
469. Each individual must ensure that his scales and weights are accurate (Leviticus 19:36)</span><br data-dcnode-id="2202"><span data-dcnode-id="2201" instrument_node="">
470. Not to commit injustice with scales and weights (Leviticus 19:35)</span><br data-dcnode-id="2200"><span data-dcnode-id="2199" instrument_node="">
471. Not to possess inaccurate scales and weights even if they are not for use (</span><a class="mw-redirect" data-dcnode-id="2197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Deuteronomy" title="Deuteronomy"><span data-dcnode-id="2198" instrument_node="">Deuteronomy</span></a><span data-dcnode-id="2196" instrument_node=""> 25:13)</span><br data-dcnode-id="2195"><span data-dcnode-id="2194" instrument_node="">
472. Not to move a boundary marker to steal someone's property (Deuteronomy 19:14)</span><br data-dcnode-id="2193"><span data-dcnode-id="2192" instrument_node="">
473. Not to kidnap (</span><a class="mw-redirect" data-dcnode-id="2190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Exodus_20" title="Exodus 20"><span data-dcnode-id="2191" instrument_node="">Exodus 20</span></a><span data-dcnode-id="2189" instrument_node="">:13)</span><br data-dcnode-id="2188"><span data-dcnode-id="2187" instrument_node="">
474. Not to rob openly (Leviticus 19:13)</span><br data-dcnode-id="2186"><span data-dcnode-id="2185" instrument_node="">
475. Not to withhold wages or fail to repay a debt (Leviticus 19:13)</span><br data-dcnode-id="2184"><span data-dcnode-id="2183" instrument_node="">
476. Not to covet and scheme to acquire another's possession  (Exodus 20:14)</span><br data-dcnode-id="2182"><span data-dcnode-id="2181" instrument_node="">
477. Not to desire another's possession (Deuteronomy 5:18)</span><br data-dcnode-id="2180"><span data-dcnode-id="2179" instrument_node="">
478. Return the robbed object or its value (Leviticus 5:23)</span><br data-dcnode-id="2178"><span data-dcnode-id="2177" instrument_node="">
479. Not to ignore a lost object (Deuteronomy 22:3)</span><br data-dcnode-id="2176"><span data-dcnode-id="2175" instrument_node="">
480. Return the lost object (Deuteronomy 22:1)</span><br data-dcnode-id="2174"><span data-dcnode-id="2173" instrument_node="">
</span></p><p data-dcnode-id="2170"><span data-dcnode-id="2171" instrument_node="">
481. The court must implement laws against the one who assaults another or damages another's property (Exodus 21:8) </span></p><div class="templatequotecite" data-dcnode-id="2162"><span data-dcnode-id="2169" instrument_node="">— </span><cite data-dcnode-id="2163"><a data-dcnode-id="2167" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sefer_Hamitzvot" title="Sefer Hamitzvot"><span data-dcnode-id="2168" instrument_node="">Sefer Hamitzvot</span></a><span data-dcnode-id="2166" instrument_node=""> by </span><a data-dcnode-id="2164" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Maimonides" title="Maimonides"><span data-dcnode-id="2165" instrument_node="">Maimonides</span></a></cite></div></blockquote><span data-dcnode-id="2160" instrument_node="">
</span><p data-dcnode-id="2156"><a data-dcnode-id="2158" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Maimonides" title="Maimonides"><span data-dcnode-id="2159" instrument_node="">Maimonides</span></a><span data-dcnode-id="2157" instrument_node=""> (the Rambam) viewed stealing as one step in the progression from covetous desire to murder.  When the person who owns a coveted item resists its unjust acquisition, the thief resorts to violence and may become guilty of murder.
</span></p><span data-dcnode-id="2155" instrument_node="">
</span><link data-dcnode-id="2154" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="2141"><p data-dcnode-id="2149"><span data-dcnode-id="2153" instrument_node="">Desire leads to coveting, and coveting leads to stealing. For if the owner (of the coveted object) does not wish to sell, even though he is offered a good price and is entreated to accept, the person (who covets the object) will come to steal it, as it is written (</span><a data-dcnode-id="2151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Book_of_Micah" title="Book of Micah"><span data-dcnode-id="2152" instrument_node="">Mikha</span></a><span data-dcnode-id="2150" instrument_node=""> 2:2) [Micah 2:2], 'They covet fields and (then) steal them.' And if the owner approaches him with a view to reclaiming his money or preventing the theft, then he will come to murder. Go and learn from the example of Achav [Ahab] and Navot [Naboth].</span></p><div class="templatequotecite" data-dcnode-id="2142"><span data-dcnode-id="2148" instrument_node="">— </span><cite data-dcnode-id="2143"><span data-dcnode-id="2147" instrument_node="">Maimonides</span><sup class="reference" data-dcnode-id="2144" id="cite_ref-vbm-torah1_17-0"><a data-dcnode-id="2145" href="#cite_note-vbm-torah1-17"><span data-dcnode-id="2146" instrument_node="">[17]</span></a></sup></cite></div></blockquote><span data-dcnode-id="2140" instrument_node="">
</span><p data-dcnode-id="2109"><span data-dcnode-id="2139" instrument_node="">Maimonides’ admonition to learn from the example of </span><a data-dcnode-id="2137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ahab" title="Ahab"><span data-dcnode-id="2138" instrument_node="">Ahab</span></a><span data-dcnode-id="2136" instrument_node=""> and </span><a data-dcnode-id="2134" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Naboth" title="Naboth"><span data-dcnode-id="2135" instrument_node="">Naboth</span></a><span data-dcnode-id="2133" instrument_node=""> refers to the narrative in 1 Kings 21 in which King Ahab of Israel tried to convince Naboth the </span><a class="mw-redirect" data-dcnode-id="2131" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jezreelite" title="Jezreelite"><span data-dcnode-id="2132" instrument_node="">Jezreelite</span></a><span data-dcnode-id="2130" instrument_node=""> to sell him the vineyard Naboth owned adjacent to the king's palace.  Ahab wanted the land to use as a vegetable garden, but Naboth refused to sell or trade the property to Ahab saying, “The L</span><span class="smallcaps" data-dcnode-id="2128" style="font-size:83%"><span data-dcnode-id="2129" instrument_node="">ORD</span></span><span data-dcnode-id="2127" instrument_node=""> forbid that I should give up to you what I have inherited from my fathers!”</span><sup class="reference" data-dcnode-id="2124" id="cite_ref-18"><a data-dcnode-id="2125" href="#cite_note-18"><span data-dcnode-id="2126" instrument_node="">[18]</span></a></sup><span data-dcnode-id="2123" instrument_node="">  Ahab's wife </span><a data-dcnode-id="2121" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jezebel" title="Jezebel"><span data-dcnode-id="2122" instrument_node="">Jezebel</span></a><span data-dcnode-id="2120" instrument_node=""> then conspired to obtain the vineyard by writing letters in Ahab's name to the elders and nobles in Naboth's town instructing them to have two scoundrels bear false witness claiming that Naboth has cursed both God and the king.  After Naboth was subsequently stoned to death, Ahab seized possession of Naboth's vineyard.  The text describes the L</span><span class="smallcaps" data-dcnode-id="2118" style="font-size:83%"><span data-dcnode-id="2119" instrument_node="">ORD</span></span><span data-dcnode-id="2117" instrument_node=""> as very angry with Ahab, and the prophet </span><a data-dcnode-id="2115" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Elijah" title="Elijah"><span data-dcnode-id="2116" instrument_node="">Elijah</span></a><span data-dcnode-id="2114" instrument_node=""> pronounces judgment on both Ahab and Jezebel.</span><sup class="reference" data-dcnode-id="2111" id="cite_ref-19"><a data-dcnode-id="2112" href="#cite_note-19"><span data-dcnode-id="2113" instrument_node="">[19]</span></a></sup><span data-dcnode-id="2110" instrument_node="">
</span></p><span data-dcnode-id="2108" instrument_node="">
</span><h2 data-dcnode-id="2098"><span class="mw-headline" data-dcnode-id="2106" id="New_Testament_doctrine"><span data-dcnode-id="2107" instrument_node="">New Testament doctrine</span></span><span class="mw-editsection" data-dcnode-id="2099"><span class="mw-editsection-bracket" data-dcnode-id="2104"><span data-dcnode-id="2105" instrument_node="">[</span></span><a data-dcnode-id="2102" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DThou_shalt_not_steal%26action%3Dedit%26section%3D3" title="Edit section: New Testament doctrine"><span data-dcnode-id="2103" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2100"><span data-dcnode-id="2101" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2097" instrument_node="">
</span><p data-dcnode-id="2075"><span data-dcnode-id="2096" instrument_node="">The New Testament repeats the commandment not to steal,</span><sup class="reference" data-dcnode-id="2093" id="cite_ref-20"><a data-dcnode-id="2094" href="#cite_note-20"><span data-dcnode-id="2095" instrument_node="">[20]</span></a></sup><span data-dcnode-id="2092" instrument_node=""> contains dire warnings about spiritual consequences of the practice,</span><sup class="reference" data-dcnode-id="2089" id="cite_ref-21"><a data-dcnode-id="2090" href="#cite_note-21"><span data-dcnode-id="2091" instrument_node="">[21]</span></a></sup><span data-dcnode-id="2088" instrument_node=""> and upholds the basic ideas of private property rights and the proper role of governmental authorities in punishing thieves.</span><sup class="reference" data-dcnode-id="2085" id="cite_ref-22"><a data-dcnode-id="2086" href="#cite_note-22"><span data-dcnode-id="2087" instrument_node="">[22]</span></a></sup><span data-dcnode-id="2084" instrument_node="">  Thieves are exhorted to steal no longer, but to work hard with their own hands so that they might have something to share with people in need.</span><sup class="reference" data-dcnode-id="2081" id="cite_ref-23"><a data-dcnode-id="2082" href="#cite_note-23"><span data-dcnode-id="2083" instrument_node="">[23]</span></a></sup><span data-dcnode-id="2080" instrument_node="">  Aquinas identifies five types of theft: by stealth, by violence, in withholding wages, fraud, and by buying positions of preferment.</span><sup class="reference" data-dcnode-id="2077" id="cite_ref-24"><a data-dcnode-id="2078" href="#cite_note-24"><span data-dcnode-id="2079" instrument_node="">[24]</span></a></sup><span data-dcnode-id="2076" instrument_node="">
</span></p><p data-dcnode-id="2044"><span data-dcnode-id="2074" instrument_node="">The </span><a class="mw-redirect" data-dcnode-id="2072" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hypocritical" title="Hypocritical"><span data-dcnode-id="2073" instrument_node="">hypocritical</span></a><span data-dcnode-id="2071" instrument_node=""> thief is personified by </span><a data-dcnode-id="2069" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Judas_Iscariot" title="Judas Iscariot"><span data-dcnode-id="2070" instrument_node="">Judas</span></a><span data-dcnode-id="2068" instrument_node="">, who took secretly his part from the money </span><a data-dcnode-id="2066" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jesus" title="Jesus"><span data-dcnode-id="2067" instrument_node="">Jesus</span></a><span data-dcnode-id="2065" instrument_node=""> and the </span><a data-dcnode-id="2063" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Apostles_in_the_New_Testament" title="Apostles in the New Testament"><span data-dcnode-id="2064" instrument_node="">apostles</span></a><span data-dcnode-id="2062" instrument_node=""> raised for helping the </span><a data-dcnode-id="2060" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Poverty" title="Poverty"><span data-dcnode-id="2061" instrument_node="">poor</span></a><span data-dcnode-id="2059" instrument_node="">; he objected when Mary anointed Jesus with pure </span><a data-dcnode-id="2057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Spikenard" title="Spikenard"><span data-dcnode-id="2058" instrument_node="">nard</span></a><span data-dcnode-id="2056" instrument_node="">, pretending hypocritically it would have been useful if the nard would have been sold and the money given to the poor.</span><sup class="reference" data-dcnode-id="2053" id="cite_ref-25"><a data-dcnode-id="2054" href="#cite_note-25"><span data-dcnode-id="2055" instrument_node="">[25]</span></a></sup><span data-dcnode-id="2052" instrument_node=""> There were some </span><a data-dcnode-id="2050" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pharisees" title="Pharisees"><span data-dcnode-id="2051" instrument_node="">Pharisees</span></a><span data-dcnode-id="2049" instrument_node=""> like Judas: they stole, although preaching not to steal.</span><sup class="reference" data-dcnode-id="2046" id="cite_ref-26"><a data-dcnode-id="2047" href="#cite_note-26"><span data-dcnode-id="2048" instrument_node="">[26]</span></a></sup><span data-dcnode-id="2045" instrument_node="">
</span></p><p data-dcnode-id="2042"><span data-dcnode-id="2043" instrument_node="">While private property rights are affirmed, the overriding theme in the New Testament is that one should trust and hope in God rather than in one's material possessions, and there is an acknowledgement of a struggle in the heart between loving God and loving money. It is said that "the love of money is a root of all kinds of evils" (1 Timothy 6:6-10). And also:
</span></p><span data-dcnode-id="2041" instrument_node="">
</span><link data-dcnode-id="2040" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="2030"><p data-dcnode-id="2038"><span data-dcnode-id="2039" instrument_node="">Do not lay up for yourselves treasures on earth, where moth and rust destroy and where thieves break in and steal, but lay up for yourselves treasures in heaven, where neither moth nor rust destroys and where thieves do not break in and steal. For where your treasure is, there your heart will be also.  ...  No one can serve two masters, for either he will hate the one and love the other, or he will be devoted to the one and despise the other. You cannot serve God and money.</span></p><div class="templatequotecite" data-dcnode-id="2031"><span data-dcnode-id="2037" instrument_node="">— </span><cite data-dcnode-id="2032"><span data-dcnode-id="2036" instrument_node="">Matthew 6:19-24</span><sup class="reference" data-dcnode-id="2033" id="cite_ref-27"><a data-dcnode-id="2034" href="#cite_note-27"><span data-dcnode-id="2035" instrument_node="">[27]</span></a></sup></cite></div></blockquote><span data-dcnode-id="2029" instrument_node="">
</span><p data-dcnode-id="2027"><span data-dcnode-id="2028" instrument_node="">The book of 1 Corinthians asserts that thieves, swindlers, and the greedy will be excluded from the kingdom of God as sure as adulterers, idolaters, and the sexual immoral, but that those who leave these sins behind can be sanctified and justified in the name of the Lord Jesus (1 Corinthians 6:9-11).
</span></p><p data-dcnode-id="2017"><span data-dcnode-id="2026" instrument_node="">The command against stealing is seen as a natural consequence of the command to “love your neighbor as yourself.”</span><sup class="reference" data-dcnode-id="2023" id="cite_ref-vatican1_28-0"><a data-dcnode-id="2024" href="#cite_note-vatican1-28"><span data-dcnode-id="2025" instrument_node="">[28]</span></a></sup><span data-dcnode-id="2022" instrument_node="">  The prohibition against desiring forbidden things is also seen as a moral imperative for the individual to exercise control over the thoughts of his mind and the desires of his heart.</span><sup class="reference" data-dcnode-id="2019" id="cite_ref-vbm-torah1_17-1"><a data-dcnode-id="2020" href="#cite_note-vbm-torah1-17"><span data-dcnode-id="2021" instrument_node="">[17]</span></a></sup><span data-dcnode-id="2018" instrument_node="">
</span></p><p data-dcnode-id="2009"><a data-dcnode-id="2015" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Thomas_Aquinas" title="Thomas Aquinas"><span data-dcnode-id="2016" instrument_node="">Thomas Aquinas</span></a><span data-dcnode-id="2014" instrument_node=""> points out that just as "Thou shalt not kill" forbids one to injure his neighbor in his own person; and "Thou shalt not commit adultery" forbids injury to the person to whom one is bound in marriage; the Commandment, "Thou shalt not steal," forbids one to injure his neighbor in his goods.</span><sup class="reference" data-dcnode-id="2011" id="cite_ref-29"><a data-dcnode-id="2012" href="#cite_note-29"><span data-dcnode-id="2013" instrument_node="">[29]</span></a></sup><span data-dcnode-id="2010" instrument_node="">
</span></p><span data-dcnode-id="2008" instrument_node="">
</span><h2 data-dcnode-id="1998"><span class="mw-headline" data-dcnode-id="2006" id="Roman_Catholic_doctrine"><span data-dcnode-id="2007" instrument_node="">Roman Catholic doctrine</span></span><span class="mw-editsection" data-dcnode-id="1999"><span class="mw-editsection-bracket" data-dcnode-id="2004"><span data-dcnode-id="2005" instrument_node="">[</span></span><a data-dcnode-id="2002" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DThou_shalt_not_steal%26action%3Dedit%26section%3D4" title="Edit section: Roman Catholic doctrine"><span data-dcnode-id="2003" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2000"><span data-dcnode-id="2001" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1997" instrument_node="">
</span><p data-dcnode-id="1987"><span data-dcnode-id="1996" instrument_node="">Catholic teaching regards the commandment “You shall not steal” as an expression of the commandment to love your neighbor as yourself.</span><sup class="reference" data-dcnode-id="1993" id="cite_ref-vatican1_28-1"><a data-dcnode-id="1994" href="#cite_note-vatican1-28"><span data-dcnode-id="1995" instrument_node="">[28]</span></a></sup><span data-dcnode-id="1992" instrument_node="">  The </span><i data-dcnode-id="1989"><a data-dcnode-id="1990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Catechism_of_the_Catholic_Church" title="Catechism of the Catholic Church"><span data-dcnode-id="1991" instrument_node="">Catechism of the Catholic Church</span></a></i><span data-dcnode-id="1988" instrument_node=""> states&nbsp;:
</span></p><span data-dcnode-id="1986" instrument_node="">
</span><link data-dcnode-id="1985" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="1971"><p data-dcnode-id="1980"><span data-dcnode-id="1984" instrument_node=""> The seventh commandment forbids unjustly taking or keeping the goods of one's neighbor and wronging him in any way with respect to his goods. It commands justice and charity in the care of earthly goods and the fruits of men's labor. For the sake of the common good, it requires respect for the </span><a data-dcnode-id="1982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Universal_destination_of_goods" title="Universal destination of goods"><span data-dcnode-id="1983" instrument_node="">universal destination of goods</span></a><span data-dcnode-id="1981" instrument_node=""> and respect for the right to private property.</span></p><div class="templatequotecite" data-dcnode-id="1972"><span data-dcnode-id="1979" instrument_node="">— </span><cite data-dcnode-id="1973"><i data-dcnode-id="1977"><span data-dcnode-id="1978" instrument_node="">Catechism of the Catholic Church</span></i><sup class="reference" data-dcnode-id="1974" id="cite_ref-vatican1_28-2"><a data-dcnode-id="1975" href="#cite_note-vatican1-28"><span data-dcnode-id="1976" instrument_node="">[28]</span></a></sup></cite></div></blockquote><span data-dcnode-id="1970" instrument_node="">
</span><p data-dcnode-id="1948"><span data-dcnode-id="1969" instrument_node="">Catholic teaching states that in economic matters, respect for human dignity requires practicing </span><a data-dcnode-id="1967" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Temperance_%28virtue%29" title="Temperance (virtue)"><span data-dcnode-id="1968" instrument_node="">temperance</span></a><span data-dcnode-id="1966" instrument_node="">, a virtue that moderates attachment to worldly goods; </span><a data-dcnode-id="1964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Justice" title="Justice"><span data-dcnode-id="1965" instrument_node="">justice</span></a><span data-dcnode-id="1963" instrument_node="">, a virtue that preserves our neighbors rights and renders what is due; and </span><a data-dcnode-id="1961" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Solidarity" title="Solidarity"><span data-dcnode-id="1962" instrument_node="">solidarity</span></a><span data-dcnode-id="1960" instrument_node="">, in accordance with the </span><a class="mw-redirect" data-dcnode-id="1958" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Golden_rule" title="Golden rule"><span data-dcnode-id="1959" instrument_node="">golden rule</span></a><span data-dcnode-id="1957" instrument_node="">.</span><sup class="reference" data-dcnode-id="1954" id="cite_ref-vatican1_28-3"><a data-dcnode-id="1955" href="#cite_note-vatican1-28"><span data-dcnode-id="1956" instrument_node="">[28]</span></a></sup><span data-dcnode-id="1953" instrument_node="">  Even if it does not contradict explicit provisions of civil law, any form of unjustly taking and keeping the property of others is against the seventh commandment: thus, deliberate retention of goods lent or of objects lost; business fraud; paying unjust wages; forcing up prices by taking advantage of the ignorance or hardship of another.  The following are also considered morally illicit: speculation by which one contrives to manipulate the price of goods artificially in order to gain an advantage to the detriment of others; corruption in which one influences the judgment of those who must make decisions according to law; appropriation and use for private purposes of the common goods of an enterprise; work poorly done; tax evasion; forgery of checks and invoices; excessive expenses and waste. Willfully damaging private or public property is contrary to the moral law and requires reparation. In addition, Catholic teaching demands that contracts and promises be strictly observed. Injustices require restitution to the owner.</span><sup class="reference" data-dcnode-id="1950" id="cite_ref-vatican1_28-4"><a data-dcnode-id="1951" href="#cite_note-vatican1-28"><span data-dcnode-id="1952" instrument_node="">[28]</span></a></sup><span data-dcnode-id="1949" instrument_node="">
</span></p><p data-dcnode-id="1932"><span data-dcnode-id="1947" instrument_node="">Following </span><a data-dcnode-id="1945" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Thomas_Aquinas" title="Thomas Aquinas"><span data-dcnode-id="1946" instrument_node="">Thomas Aquinas</span></a><span data-dcnode-id="1944" instrument_node="">, Catholic teaching holds that "if the need be so manifest and urgent, that it is evident that the present need must be remedied by whatever means be at hand (for instance when a person is in some imminent danger, and there is no other possible remedy), then it is lawful for a man to succor his own need by means of another's property, by taking it either openly or secretly: nor is this properly speaking theft or robbery".</span><sup class="reference" data-dcnode-id="1941" id="cite_ref-30"><a data-dcnode-id="1942" href="#cite_note-30"><span data-dcnode-id="1943" instrument_node="">[30]</span></a></sup><span data-dcnode-id="1940" instrument_node=""> Catholic teaching also supports the doctrine of </span><a data-dcnode-id="1938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Occult_Compensation" title="Occult Compensation"><span data-dcnode-id="1939" instrument_node="">occult compensation</span></a><span data-dcnode-id="1937" instrument_node="">.</span><sup class="reference" data-dcnode-id="1934" id="cite_ref-31"><a data-dcnode-id="1935" href="#cite_note-31"><span data-dcnode-id="1936" instrument_node="">[31]</span></a></sup><span data-dcnode-id="1933" instrument_node="">
</span></p><p data-dcnode-id="1898"><span data-dcnode-id="1931" instrument_node="">Catholic teaching reminds that Jesus enjoins his disciples to prefer him to everything and everyone, and bids them "renounce all that [they have]" for his sake and that of the Gospel.</span><sup class="reference" data-dcnode-id="1928" id="cite_ref-32"><a data-dcnode-id="1929" href="#cite_note-32"><span data-dcnode-id="1930" instrument_node="">[32]</span></a></sup><span data-dcnode-id="1927" instrument_node=""> Jesus gave his disciples the example of the poor widow of Jerusalem who gave out of her poverty all that she had to live on.</span><sup class="reference" data-dcnode-id="1924" id="cite_ref-33"><a data-dcnode-id="1925" href="#cite_note-33"><span data-dcnode-id="1926" instrument_node="">[33]</span></a></sup><span data-dcnode-id="1923" instrument_node="">  Detachment from riches is portrayed as obligatory for entrance into the Kingdom of heaven.</span><sup class="reference" data-dcnode-id="1920" id="cite_ref-ReferenceA_34-0"><a data-dcnode-id="1921" href="#cite_note-ReferenceA-34"><span data-dcnode-id="1922" instrument_node="">[34]</span></a></sup><span data-dcnode-id="1919" instrument_node="">  "Blessed are the poor in spirit"</span><sup class="reference" data-dcnode-id="1916" id="cite_ref-35"><a data-dcnode-id="1917" href="#cite_note-35"><span data-dcnode-id="1918" instrument_node="">[35]</span></a></sup><span data-dcnode-id="1915" instrument_node="">  represents the expectation that those who do not receive all their physical longings are more inclined to seek fulfillment of their spiritual longings through Jesus Christ.  “The Lord grieves over the rich, because they find their consolation in the abundance of goods.”</span><sup class="reference" data-dcnode-id="1912" id="cite_ref-ReferenceA_34-1"><a data-dcnode-id="1913" href="#cite_note-ReferenceA-34"><span data-dcnode-id="1914" instrument_node="">[34]</span></a></sup><span data-dcnode-id="1911" instrument_node="">
"I want to see God" expresses the true desire of man. The water of eternal life quenches the thirst for God.</span><sup class="reference" data-dcnode-id="1908" id="cite_ref-36"><a data-dcnode-id="1909" href="#cite_note-36"><span data-dcnode-id="1910" instrument_node="">[36]</span></a></sup><span data-dcnode-id="1907" instrument_node="">  Attachment to the goods of this world are a bondage.  The Scriptural remedy is the desire for true happiness that is found in seeking and finding God.  Holy people must struggle, with grace from on high, to obtain the good things God promises.  Faithful Christians put to death their cravings and, with the grace of God, prevail over the seductions of pleasure and power.</span><sup class="reference" data-dcnode-id="1904" id="cite_ref-37"><a data-dcnode-id="1905" href="#cite_note-37"><span data-dcnode-id="1906" instrument_node="">[37]</span></a></sup><span data-dcnode-id="1903" instrument_node="">  For what does it profit a man to gain the whole world, yet lose his own soul?</span><sup class="reference" data-dcnode-id="1900" id="cite_ref-38"><a data-dcnode-id="1901" href="#cite_note-38"><span data-dcnode-id="1902" instrument_node="">[38]</span></a></sup><span data-dcnode-id="1899" instrument_node="">
</span></p><span data-dcnode-id="1897" instrument_node="">
</span><h2 data-dcnode-id="1887"><span class="mw-headline" data-dcnode-id="1895" id="Reformation_and_post-reformation_doctrines"><span data-dcnode-id="1896" instrument_node="">Reformation and post-reformation doctrines</span></span><span class="mw-editsection" data-dcnode-id="1888"><span class="mw-editsection-bracket" data-dcnode-id="1893"><span data-dcnode-id="1894" instrument_node="">[</span></span><a data-dcnode-id="1891" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DThou_shalt_not_steal%26action%3Dedit%26section%3D5" title="Edit section: Reformation and post-reformation doctrines"><span data-dcnode-id="1892" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1889"><span data-dcnode-id="1890" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1886" instrument_node="">
</span><p data-dcnode-id="1878"><a data-dcnode-id="1884" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Martin_Luther" title="Martin Luther"><span data-dcnode-id="1885" instrument_node="">Martin Luther</span></a><span data-dcnode-id="1883" instrument_node=""> ascribes this commandment to God's desire to protect private property rights.  He views this commandment as prohibiting not only the taking of another's property, but all unjust and fraudulent dealing in the marketplace, workplace, or any other place where transactions are conducted.  Luther further describes negligence and dereliction of duty as violations of this commandment if such negligence causes one's employer to suffer loss.  Likewise, laziness and unfaithfulness in one's paid employment are viewed as a fraud that is worse than the petty thefts that can be prevented with locks and bolts.</span><sup class="reference" data-dcnode-id="1880" id="cite_ref-luther565_39-0"><a data-dcnode-id="1881" href="#cite_note-luther565-39"><span data-dcnode-id="1882" instrument_node="">[39]</span></a></sup><span data-dcnode-id="1879" instrument_node="">
</span></p><span data-dcnode-id="1877" instrument_node="">
</span><link data-dcnode-id="1876" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="1864"><p data-dcnode-id="1874"><span data-dcnode-id="1875" instrument_node="">Furthermore, in the market and in common trade likewise, this practice is in full swing and force to the greatest extent, where one openly defrauds another with bad merchandise, false measures, weights, coins, and by nimbleness and queer finances or dexterous tricks takes advantage of him; likewise, when one overcharges a person in a trade and wantonly drives a hard bargain, skins and distresses him. ... Therefore they are also called swivel-chair robbers, land- and highway-robbers, not pick-locks and sneak-thieves who snatch away the ready cash, but who sit on the chair [at home] and are styled great noblemen, and honorable, pious citizens, and yet rob and steal under a good pretext.</span></p><div class="templatequotecite" data-dcnode-id="1865"><span data-dcnode-id="1873" instrument_node="">— </span><cite data-dcnode-id="1866"><span data-dcnode-id="1872" instrument_node="">Martin Luther, </span><i data-dcnode-id="1870"><span data-dcnode-id="1871" instrument_node="">The Large Catechism</span></i><sup class="reference" data-dcnode-id="1867" id="cite_ref-luther565_39-1"><a data-dcnode-id="1868" href="#cite_note-luther565-39"><span data-dcnode-id="1869" instrument_node="">[39]</span></a></sup></cite></div></blockquote><span data-dcnode-id="1863" instrument_node="">
</span><p data-dcnode-id="1857"><span data-dcnode-id="1862" instrument_node="">Martin Luther taught that it is each person's duty, at the risk of God's displeasure, not only to do no injury to his neighbor, nor to deprive him of gain, nor to perpetrate any act of unfaithfulness or malice in any bargain or trade, but faithfully to preserve his property for him, to secure and promote his advantage, especially when one accepts money, wages, and one's livelihood for such service. Those who trespass this commandment may escape the hangman, but he shall not escape the wrath and punishment of God. Luther held that it must be impressed upon the young that they be careful not to follow the old lawless crowd, but keep their eyes fixed upon God's commandment, “lest His wrath and punishment come upon them too.” </span><sup class="reference" data-dcnode-id="1859" id="cite_ref-luther565_39-2"><a data-dcnode-id="1860" href="#cite_note-luther565-39"><span data-dcnode-id="1861" instrument_node="">[39]</span></a></sup><span data-dcnode-id="1858" instrument_node="">
</span></p><p data-dcnode-id="1849"><a data-dcnode-id="1855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Calvin" title="John Calvin"><span data-dcnode-id="1856" instrument_node="">John Calvin</span></a><span data-dcnode-id="1854" instrument_node=""> explains that since injustice is an abomination to God, the intent of the commandment against stealing is that one must render to every man his due. This commandment forbids us to long after other men's goods. Calvin holds that each individual's possessions have not fallen to him by chance, but by the distribution of the sovereign Lord of all.  Therefore, no one can pervert his means to bad purposes without committing a fraud on a divine dispensation.  Calvin asserts that God sees the long train of deception by which the man of craft begins to lay nets for his more simple neighbor. For Calvin, violations of this commandment are not confined to money, or merchandise, or lands, but extend to every kind of right. We defraud our neighbors to their hurt if we decline any of the duties which we are bound to perform towards them. God's wrath is incurred if an agent or an indolent steward wastes the substance of his employer, or does not give due heed to the management of his property; if he unjustly squanders or luxuriously wastes the means entrusted to him; if a servant holds his master in derision, divulges his secrets, or in any way is treacherous to his life or his goods. Likewise, a master incurs God's wrath if he cruelly torments his household, because he is guilty of theft before God; along with all who fail to deliver what he owes to others, keeps back, or makes away with what does not belong to him.</span><sup class="reference" data-dcnode-id="1851" id="cite_ref-spurgeon1_40-0"><a data-dcnode-id="1852" href="#cite_note-spurgeon1-40"><span data-dcnode-id="1853" instrument_node="">[40]</span></a></sup><span data-dcnode-id="1850" instrument_node="">
</span></p><p data-dcnode-id="1843"><span data-dcnode-id="1848" instrument_node="">Calvin further teaches that obedience requires us to be contented with our own lot.  We should desire to acquire nothing but honest and lawful gain.  We should not endeavor to grow rich by injustice, nor to plunder our neighbor of his goods, that our own may thereby be increased.  We must not heap up wealth cruelly wrung from the blood of others.  It should be our constant aim faithfully to lend our counsel and aid to all so as to assist them in retaining their property; or if we have to do with the perfidious or crafty, let us rather be prepared to yield somewhat of our right than to contend with them.  Calvin further asserted that the individual Christian should contribute to the relief of those observed under the pressure of difficulties, assisting their want out of one's own abundance.</span><sup class="reference" data-dcnode-id="1845" id="cite_ref-spurgeon1_40-1"><a data-dcnode-id="1846" href="#cite_note-spurgeon1-40"><span data-dcnode-id="1847" instrument_node="">[40]</span></a></sup><span data-dcnode-id="1844" instrument_node="">  Calvin describes the commandment against stealing as requiring the unwavering delivery of any and all obligations:
</span></p><span data-dcnode-id="1842" instrument_node="">
</span><link data-dcnode-id="1841" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="1831"><p data-dcnode-id="1839"><span data-dcnode-id="1840" instrument_node=""> Let every one, I say, thus consider what in his own place and order he owes to his neighbours, and pay what he owes. Moreover, we must always have a reference to the Lawgiver, and so remember that the law requiring us to promote and defend the interest and convenience of our fellow-men, applies equally to our minds and our hands. </span></p><div class="templatequotecite" data-dcnode-id="1832"><span data-dcnode-id="1838" instrument_node="">— </span><cite data-dcnode-id="1833"><span data-dcnode-id="1837" instrument_node="">John Calvin</span><sup class="reference" data-dcnode-id="1834" id="cite_ref-spurgeon1_40-2"><a data-dcnode-id="1835" href="#cite_note-spurgeon1-40"><span data-dcnode-id="1836" instrument_node="">[40]</span></a></sup></cite></div></blockquote><span data-dcnode-id="1830" instrument_node="">
</span><p data-dcnode-id="1821"><a data-dcnode-id="1828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Matthew_Henry" title="Matthew Henry"><span data-dcnode-id="1829" instrument_node="">Matthew Henry</span></a><span data-dcnode-id="1827" instrument_node=""> sees the prohibition on stealing as applying to the unjust taking, sinful spending, and sinful sparing.  One must not take another's goods or encroach upon the boundaries of his property.  One must restore what is lost.  One must pay what is owed: debts, rents, wages, taxes, and tithes.</span><sup class="reference" data-dcnode-id="1824" id="cite_ref-godstenlaws1_41-0"><a data-dcnode-id="1825" href="#cite_note-godstenlaws1-41"><span data-dcnode-id="1826" instrument_node="">[41]</span></a></sup><span data-dcnode-id="1823" instrument_node=""> </span><link data-dcnode-id="1822" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"></p><blockquote class="templatequote" data-dcnode-id="1811"><p data-dcnode-id="1819"><span data-dcnode-id="1820" instrument_node=""> This command forbids us to rob ourselves of what we have by sinful spending, or of the use and comfort of it by sinful sparing, and to rob others by removing the ancient landmarks, invading our neighbour’s rights, taking his goods from his person, or house, or field, forcibly or clandestinely, over-reaching in bargains, nor restoring what is borrowed or found, withholding just debts, rents, or wages, and (which is worst of all) to rob the public in the coin or revenue, or that which is dedicated to the service of religion. </span></p><div class="templatequotecite" data-dcnode-id="1812"><span data-dcnode-id="1818" instrument_node="">— </span><cite data-dcnode-id="1813"><span data-dcnode-id="1817" instrument_node="">Matthew Henry</span><sup class="reference" data-dcnode-id="1814" id="cite_ref-godstenlaws1_41-1"><a data-dcnode-id="1815" href="#cite_note-godstenlaws1-41"><span data-dcnode-id="1816" instrument_node="">[41]</span></a></sup></cite></div></blockquote><span data-dcnode-id="1810" instrument_node="">
