</span><span class="meta-author-avatar" data-dcnode-id="3203"><span data-dcnode-id="3207" instrument_node="">
</span><a data-dcnode-id="3205" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.staybiblical.com/author/jlauterbach/"><img alt="Photo of Jason Lauterbach" class="avatar avatar-140 photo entered error" data-dcnode-id="3206" data-lazyloaded="1" data-ll-status="error" data-src="https://www.staybiblical.com/wp-content/litespeed/avatar/e35519420c22087914781d1aac170620.jpg?ver=1650252718" data-srcset="https://www.staybiblical.com/wp-content/litespeed/avatar/133d7c315790255b5d4c1a7b210bb5f5.jpg?ver=1650252718 2x" height="140" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.staybiblical.com/wp-content/litespeed/avatar/e35519420c22087914781d1aac170620.jpg%3Fver%3D1650252718&amp;raw" srcset="https://www.staybiblical.com/wp-content/litespeed/avatar/133d7c315790255b5d4c1a7b210bb5f5.jpg?ver=1650252718 2x" width="140"></a><span data-dcnode-id="3204" instrument_node="">
</span></span><span data-dcnode-id="3202" instrument_node="">
</span><span class="meta-author" data-dcnode-id="3199"><a class="author-name tie-icon" data-dcnode-id="3200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.staybiblical.com/author/jlauterbach/" title="Jason Lauterbach"><span data-dcnode-id="3201" instrument_node="">Jason Lauterbach</span></a></span></span></span><span class="date meta-item tie-icon" data-dcnode-id="3195"><span data-dcnode-id="3196" instrument_node="">11. December 2020</span></span></div></div></header><div class="featured-area" data-dcnode-id="3188"><div class="featured-area-inner" data-dcnode-id="3189"><figure class="single-featured-image" data-dcnode-id="3190"><img alt="A huge Bible standing on a field which symbolizes that Jesus is not God" class="attachment-jannah-image-post size-jannah-image-post wp-post-image entered litespeed-loaded" data-dcnode-id="3191" data-lazyloaded="1" data-ll-status="loaded" data-src="https://www.staybiblical.com/wp-content/uploads/2017/11/jesus-ist-nicht-Gott-2-e1607716929135-780x470.jpg" height="470" is_main_img="1" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.staybiblical.com/wp-content/uploads/2017/11/jesus-ist-nicht-Gott-2-e1607716929135-780x470.jpg&amp;raw" width="780"></figure></div></div><div class="entry-content entry clearfix" data-dcnode-id="2975"><p data-dcnode-id="3186"><span data-dcnode-id="3187" instrument_node="">God cannot die. God doesn’t pray to himself. God doesn’t argue with himself. God didn’t anoint himself. God lives in Jesus, but Jesus is not God. The following Bible Verses will prove the fact that Jesus is NOT God.</span></p><p data-dcnode-id="3184"><span data-dcnode-id="3185" instrument_node="">Everything in the Bible has to be understood as it is written. You can’t interpret whatever you like and claim that it is the truth. The word of the Bible doesn’t need to be interpreted! You have to accept it as it is written.</span></p><p class="has-vivid-red-color has-text-color" data-dcnode-id="3181"><em data-dcnode-id="3182"><span data-dcnode-id="3183" instrument_node="">What thing soever I command you, observe to do it: thou shalt not add thereto, nor diminish from it. (Deuteronomy 12:32)</span></em></p><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="3179" style="height: 40px;"><span data-dcnode-id="3180" instrument_node="">&nbsp;</span></div><h2 data-dcnode-id="3177" id="h-god-and-jesus-are-one-because-god-lives-in-jesus"><span data-dcnode-id="3178" instrument_node="">God and Jesus are one, because God lives in Jesus</span></h2><p data-dcnode-id="3175"><span data-dcnode-id="3176" instrument_node="">The most Bible Verses that are used to claim that Jesus is God, are Verses which actually prove that God lives in Jesus. God is spirit and therefore He dwells in his children.</span></p><p class="has-text-color" data-dcnode-id="3172" style="color:#1d7c00"><em data-dcnode-id="3173"><span data-dcnode-id="3174" instrument_node="">Believest thou not that I am in the Father, and the Father in me? the words that I speak unto you I speak not of myself: but the Father that dwelleth in me, he doeth the works. (John 14:10)</span></em></p><p data-dcnode-id="3170"><span data-dcnode-id="3171" instrument_node="">That God lives in Jesus doesn’t mean that Jesus is God. It means that God and Jesus are one. And Jesus taught us that we can become one with God as well! But do we become God then? Of course not!</span></p><p class="has-text-color" data-dcnode-id="3167" style="color:#1d7c00"><em data-dcnode-id="3168"><span data-dcnode-id="3169" instrument_node="">That they all may be one; as thou, Father, art in me, and I in thee, that they also may be one in us: that the world may believe that thou hast sent me. And the glory which thou gavest me I have given them; that they may be one, even as we are one. (John 17:21-22)</span></em></p><p data-dcnode-id="3165"><span data-dcnode-id="3166" instrument_node="">Adam and Eve were one as well. But does this make them one and the same person? Surely not. They still remain two persons, even though they are one. If two people marry each other, will they be one person? Of course not. But still, they will be inseparable in God’s eyes.</span></p><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="3163" style="height: 40px;"><span data-dcnode-id="3164" instrument_node="">&nbsp;</span></div><h2 data-dcnode-id="3161" id="h-the-resurrection-of-the-dead-comes-by-man"><span data-dcnode-id="3162" instrument_node="">The resurrection of the dead comes by man</span></h2><p data-dcnode-id="3159"><span data-dcnode-id="3160" instrument_node="">This Bible Verse is that clear, that there really isn’t much left to explain. It says that because death came by man (Adam and Eve), the resurrection of the dead comes by man, as well. That means that Jesus has to be a human, because the resurrection of the dead came through him. Take a look for yourself:</span></p><p class="has-text-color" data-dcnode-id="3156" style="color:#1d7c00"><em data-dcnode-id="3157"><span data-dcnode-id="3158" instrument_node="">For since by man came death, by man came also the resurrection of the dead. For as in Adam all die, even so in Christ shall all be made alive. But every man in his own order: Christ the firstfruits; afterward they that are Christ’s at his coming. Then cometh the end, when he shall have delivered up the kingdom to God, even the Father; when he shall have put down all rule and all authority and power. For he must reign, till he hath put all enemies under his feet. (1 Corinthians 15:21-25)</span></em></p><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="3154" style="height: 40px;"><span data-dcnode-id="3155" instrument_node="">&nbsp;</span></div><h2 data-dcnode-id="3152" id="h-god-puts-everything-under-jesus-feet"><span data-dcnode-id="3153" instrument_node="">God puts everything under Jesus feet</span></h2><p data-dcnode-id="3150"><span data-dcnode-id="3151" instrument_node="">Why should God put everything under his own feet, if everything already belongs to him? He has created everything, therefore He is also the owner of all things. This Verse can only make sense, if Jesus is actually another person and not God himself:</span></p><p class="has-text-color" data-dcnode-id="3147" style="color:#1d7c00"><em data-dcnode-id="3148"><span data-dcnode-id="3149" instrument_node="">For he hath put all things under his feet. But when he saith all things are put under him, it is manifest that he is excepted, which did put all things under him. (1 Corinthians 15:27)</span></em></p><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="3145" style="height: 40px;"><span data-dcnode-id="3146" instrument_node="">&nbsp;</span></div><h2 data-dcnode-id="3143" id="h-jesus-can-t-do-anything-of-his-own"><span data-dcnode-id="3144" instrument_node="">Jesus can’t do anything of his own</span></h2><p data-dcnode-id="3141"><span data-dcnode-id="3142" instrument_node="">If he says that he can’t do anything of his own, how was he able to do great signs and wonders? Because God did all these things THROUGH him:</span></p><p class="has-text-color" data-dcnode-id="3138" style="color:#1d7c00"><em data-dcnode-id="3139"><span data-dcnode-id="3140" instrument_node="">I can of mine own self do nothing: as I hear, I judge: and my judgment is just; because I seek not mine own will, but the will of the Father which hath sent me. (John 5:30)</span></em></p><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="3136" style="height: 40px;"><span data-dcnode-id="3137" instrument_node="">&nbsp;</span></div><h2 data-dcnode-id="3134" id="h-there-is-one-god-and-one-mediator-jesus-is-not-god"><span data-dcnode-id="3135" instrument_node="">There is one God and one mediator. Jesus is NOT God.</span></h2><p class="has-text-color" data-dcnode-id="3131" style="color:#1d7c00"><em data-dcnode-id="3132"><span data-dcnode-id="3133" instrument_node="">For there is one God, and one mediator between God and men, the man Christ Jesus; Who gave himself a ransom for all, to be testified in due time. (1 Thimothy 2:5-6)</span></em></p><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="3129" style="height: 40px;"><span data-dcnode-id="3130" instrument_node="">&nbsp;</span></div><h2 data-dcnode-id="3127" id="h-jesus-is-not-god-but-jesus-has-a-god"><span data-dcnode-id="3128" instrument_node="">Jesus is not God, but Jesus has a God</span></h2><p class="has-text-color" data-dcnode-id="3124" style="color:#1d7c00"><em data-dcnode-id="3125"><span data-dcnode-id="3126" instrument_node="">Wherefore I also, after I heard of your faith in the Lord Jesus, and love unto all the saints, Cease not to give thanks for you, making mention of you in my prayers; That the God of our Lord Jesus Christ, the Father of glory, may give unto you the spirit of wisdom and revelation in the knowledge of him. (Ephesians 1:15-17)</span></em></p><p class="has-text-color" data-dcnode-id="3121" style="color:#1d7c00"><em data-dcnode-id="3122"><span data-dcnode-id="3123" instrument_node="">Jesus saith unto her, Touch me not; for I am not yet ascended to my Father: but go to my brethren, and say unto them, I ascend unto my Father, and your Father; and to my God, and your God. (John 20:17)</span></em></p><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="3119" style="height: 40px;"><span data-dcnode-id="3120" instrument_node="">&nbsp;</span></div><h2 data-dcnode-id="3117" id="h-jesus-has-only-one-god"><span data-dcnode-id="3118" instrument_node="">Jesus&nbsp;has only one God</span></h2><p data-dcnode-id="3115"><span data-dcnode-id="3116" instrument_node="">Jesus said that there is only one God. If he was God himself, why didn’t he just say that he is God? Wouldn’t that be much easier for everyone?</span></p><p class="has-text-color" data-dcnode-id="3112" style="color:#1d7c00"><em data-dcnode-id="3113"><span data-dcnode-id="3114" instrument_node="">And Jesus answered him, The first of all the commandments is, Hear, O Israel; The Lord our God is one Lord. (Mark 12:29)</span></em></p><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="3110" style="height: 40px;"><span data-dcnode-id="3111" instrument_node="">&nbsp;</span></div><h2 data-dcnode-id="3108" id="h-jesus-is-not-god-because-god-is-not-a-human"><span data-dcnode-id="3109" instrument_node="">Jesus is not God, because God is not a human</span></h2><p class="has-text-color" data-dcnode-id="3105" style="color:#1d7c00"><em data-dcnode-id="3106"><span data-dcnode-id="3107" instrument_node="">For I am God, and not man; the Holy One in the midst of thee. (Hosea 11:9)</span></em></p><p class="has-text-color" data-dcnode-id="3102" style="color:#1d7c00"><em data-dcnode-id="3103"><span data-dcnode-id="3104" instrument_node="">God is not a man … neither the son of man. (Numbers 23:19)</span></em></p><p class="has-text-color" data-dcnode-id="3099" style="color:#1d7c00"><em data-dcnode-id="3100"><span data-dcnode-id="3101" instrument_node="">For he [God] is not a man. (1 Samuel 15:29)</span></em></p><p class="has-text-color" data-dcnode-id="3096" style="color:#1d7c00"><em data-dcnode-id="3097"><span data-dcnode-id="3098" instrument_node="">Hear, O Israel: The Lord our God is one Lord. (Deuternomy 6:4)</span></em></p><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="3094" style="height: 40px;"><span data-dcnode-id="3095" instrument_node="">&nbsp;</span></div><h2 data-dcnode-id="3092" id="h-jesus-died-but-god-can-t-die"><span data-dcnode-id="3093" instrument_node="">Jesus died, but God can’t die</span></h2><p data-dcnode-id="3090"><span data-dcnode-id="3091" instrument_node="">God doesn’t die, because He himself is life. Therefore it was necessary for Him to forsake Jesus on the cross. And that is also the reason why Jesus cried out these words: “God, why have you forsaken me?” (Mark 15:34).</span></p><p class="has-text-color" data-dcnode-id="3087" style="color:#1d7c00"><em data-dcnode-id="3088"><span data-dcnode-id="3089" instrument_node="">And when the sixth hour was come, there was darkness over the whole land until the ninth hour. And at the ninth hour Jesus cried with a loud voice, saying, Eloi, Eloi, lama sabachthani? which is, being interpreted, My God, my God, why hast thou forsaken me? (Mark 15:33-34)</span></em></p><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="3085" style="height: 40px;"><span data-dcnode-id="3086" instrument_node="">&nbsp;</span></div><h2 data-dcnode-id="3083" id="h-jesus-is-not-god-because-jesus-doesn-t-know-what-god-knows"><span data-dcnode-id="3084" instrument_node="">Jesus is not God, because Jesus doesn’t know what God knows</span></h2><p class="has-text-color" data-dcnode-id="3080" style="color:#1d7c00"><em data-dcnode-id="3081"><span data-dcnode-id="3082" instrument_node="">Verily I say unto you, This generation shall not pass, till all these things be fulfilled. Heaven and earth shall pass away, but my words shall not pass away. But of that day and hour knoweth no man, no, not the angels of heaven, but my Father only. (Matthew 24:34-36)</span></em></p><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="3078" style="height: 40px;"><span data-dcnode-id="3079" instrument_node="">&nbsp;</span></div><h2 data-dcnode-id="3076" id="h-jesus-has-a-different-will-than-god-jesus-is-not-god"><span data-dcnode-id="3077" instrument_node="">Jesus has a different will than God. Jesus is not God!</span></h2><p class="has-text-color" data-dcnode-id="3073" style="color:#1d7c00"><em data-dcnode-id="3074"><span data-dcnode-id="3075" instrument_node="">And he went a little farther, and fell on his face, and prayed, saying, O my Father, if it be possible, let this cup pass from me: nevertheless not as I will, but as thou wilt. (Matthew 26:39)</span></em></p><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="3071" style="height: 40px;"><span data-dcnode-id="3072" instrument_node="">&nbsp;</span></div><h2 data-dcnode-id="3069" id="h-jesus-thanks-god-for-hearing-him"><span data-dcnode-id="3070" instrument_node="">Jesus thanks God for hearing him</span></h2><p class="has-text-color" data-dcnode-id="3066" style="color:#1d7c00"><em data-dcnode-id="3067"><span data-dcnode-id="3068" instrument_node="">Then they took away the stone from the place where the dead was laid. And Jesus lifted up his eyes, and said, Father, I thank thee that thou hast heard me. And I knew that thou hearest me always: but because of the people which stand by I said it, that they may believe that thou hast sent me. (John 11:41-42)</span></em></p><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="3064" style="height: 40px;"><span data-dcnode-id="3065" instrument_node="">&nbsp;</span></div><h2 data-dcnode-id="3062" id="h-jesus-says-that-only-god-is-good"><span data-dcnode-id="3063" instrument_node="">Jesus says that only God is good</span></h2><p class="has-text-color" data-dcnode-id="3059" style="color:#1d7c00"><em data-dcnode-id="3060"><span data-dcnode-id="3061" instrument_node="">And a certain ruler asked him, saying, Good Master, what shall I do to inherit eternal life? And Jesus said unto him, Why callest thou me good? none is good, save one, that is, God. (Luke 18:18-19)</span></em></p><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="3057" style="height: 40px;"><span data-dcnode-id="3058" instrument_node="">&nbsp;</span></div><h2 data-dcnode-id="3055" id="h-jesus-own-words"><span data-dcnode-id="3056" instrument_node="">Jesus own words</span></h2><p class="has-text-color" data-dcnode-id="3052" style="color:#1d7c00"><em data-dcnode-id="3053"><span data-dcnode-id="3054" instrument_node="">And this is life eternal, that they might know thee the only true God, and Jesus Christ, whom thou hast sent. (John17:3)</span></em></p><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="3050" style="height: 40px;"><span data-dcnode-id="3051" instrument_node="">&nbsp;</span></div><h2 data-dcnode-id="3048" id="h-jesus-is-not-god-but-the-son-of-god"><span data-dcnode-id="3049" instrument_node="">Jesus is not God, but the son of God</span></h2><p class="has-text-color" data-dcnode-id="3045" style="color:#1d7c00"><em data-dcnode-id="3046"><span data-dcnode-id="3047" instrument_node="">He saith unto them, “But whom say ye that I am?” And Simon Peter answered and said, “Thou art the Christ, the Son of the living God.” And Jesus answered and said unto him, “Blessed art thou, Simon Barjona: for flesh and blood hath not revealed it unto thee, but my Father which is in heaven.” (Matthew 16:15-17)</span></em></p><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="3043" style="height: 40px;"><span data-dcnode-id="3044" instrument_node="">&nbsp;</span></div><h2 data-dcnode-id="3041"><span data-dcnode-id="3042" instrument_node="">Jesus did not anoint himself, but was anointed by God</span></h2><p class="has-text-color" data-dcnode-id="3038" style="color:#1d7c00"><em data-dcnode-id="3039"><span data-dcnode-id="3040" instrument_node="">And no man taketh this honour unto himself, but he that is called of God, as was Aaron. So also Christ glorified not himself to be made an high priest; but he that said unto him, Thou art my Son, to day have I begotten thee. (Hebrews 5:4-5)</span></em></p><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="3036" style="height: 40px;"><span data-dcnode-id="3037" instrument_node="">&nbsp;</span></div><h2 data-dcnode-id="3034" id="h-god-and-jesus-still-remain-two-entities"><span data-dcnode-id="3035" instrument_node="">God and Jesus still remain two entities</span></h2><p class="has-text-color" data-dcnode-id="3031" style="color:#1d7c00"><em data-dcnode-id="3032"><span data-dcnode-id="3033" instrument_node="">But he, being full of the Holy Ghost, looked up stedfastly into heaven, and saw the glory of God, and Jesus standing on the right hand of God, And said, Behold, I see the heavens opened, and the Son of man standing on the right hand of God. (Acts 7:55-56)</span></em></p><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="3029" style="height: 40px;"><span data-dcnode-id="3030" instrument_node="">&nbsp;</span></div><h2 data-dcnode-id="3027"><span data-dcnode-id="3028" instrument_node="">We only have one God, the Father</span></h2><p class="has-text-color" data-dcnode-id="3024" style="color:#1d7c00"><em data-dcnode-id="3025"><span data-dcnode-id="3026" instrument_node="">For though there be that are called gods, whether in heaven or in earth, (as there be gods many, and lords many,) But to us there is but one God, the Father, of whom are all things, and we in him; and one Lord Jesus Christ, by whom are all things, and we by him. (1 Corinthians 8:5-6)</span></em></p><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="3022" style="height: 40px;"><span data-dcnode-id="3023" instrument_node="">&nbsp;</span></div><h2 data-dcnode-id="3020"><span data-dcnode-id="3021" instrument_node="">And we also praise only one God, the Father of Jesus Christ</span></h2><p class="has-text-color" data-dcnode-id="3017" style="color:#1d7c00"><em data-dcnode-id="3018"><span data-dcnode-id="3019" instrument_node="">Blessed be the God and Father of our Lord Jesus Christ, who hath blessed us with all spiritual blessings in heavenly places in Christ. (Ephesians 1:3)</span></em></p><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="3015" style="height: 40px;"><span data-dcnode-id="3016" instrument_node="">&nbsp;</span></div><p data-dcnode-id="3011"><span data-dcnode-id="3014" instrument_node="">For more information on this topic, read this article: </span><a class="rank-math-link" data-dcnode-id="3012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.staybiblical.com/is-the-trinity-biblical/"><span data-dcnode-id="3013" instrument_node="">Is the Trinity biblical?</span></a></p><p data-dcnode-id="3007"><span data-dcnode-id="3010" instrument_node="">Visit the </span><a data-dcnode-id="3008" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/StayBiblicalEN" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3009" instrument_node="">Stay Biblical Facebook Page.</span></a></p><div class="post-bottom-meta post-bottom-tags post-tags-modern" data-dcnode-id="2976"><div class="post-bottom-meta-title" data-dcnode-id="3004"><span aria-hidden="true" class="tie-icon-tags" data-dcnode-id="3006"></span><span data-dcnode-id="3005" instrument_node=""> Tags</span></div><span class="tagcloud" data-dcnode-id="2977"><a data-dcnode-id="3002" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.staybiblical.com/tag/bible/" rel="tag"><span data-dcnode-id="3003" instrument_node="">Bible</span></a><span data-dcnode-id="3001" instrument_node=""> </span><a data-dcnode-id="2999" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.staybiblical.com/tag/bible-verses/" rel="tag"><span data-dcnode-id="3000" instrument_node="">Bible verses</span></a><span data-dcnode-id="2998" instrument_node=""> </span><a data-dcnode-id="2996" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.staybiblical.com/tag/christianity/" rel="tag"><span data-dcnode-id="2997" instrument_node="">Christianity</span></a><span data-dcnode-id="2995" instrument_node=""> </span><a data-dcnode-id="2993" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.staybiblical.com/tag/god/" rel="tag"><span data-dcnode-id="2994" instrument_node="">God</span></a><span data-dcnode-id="2992" instrument_node=""> </span><a data-dcnode-id="2990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.staybiblical.com/tag/god-is-spirit/" rel="tag"><span data-dcnode-id="2991" instrument_node="">God is spirit</span></a><span data-dcno </span><a data-dcnode-id="2103" href="#comment-1006"><time data-dcnode-id="2104" datetime="2021-07-03T19:33:40+02:00"><span data-dcnode-id="2105" instrument_node="">3. July 2021 at 19:33</span></time></a></div></footer><div class="comment-content" data-dcnode-id="2044"><p data-dcnode-id="2097"><span data-dcnode-id="2100" instrument_node="">“In the beginning was the Word, and the Word was with God, and the Word was God.”</span><br data-dcnode-id="2099"><span data-dcnode-id="2098" instrument_node="">
(John 1:1)</span></p><p data-dcnode-id="2093"><span data-dcnode-id="2096" instrument_node="">“No one has seen God at any time; the only begotten God who is in the bosom of the Father, He has explained Him.”</span><br data-dcnode-id="2095"><span data-dcnode-id="2094" instrument_node="">
(John 1:18)</span></p><p data-dcnode-id="2089"><span data-dcnode-id="2092" instrument_node="">“Thomas answered and said to Him [Jesus], “My Lord and my God!”</span><br data-dcnode-id="2091"><span data-dcnode-id="2090" instrument_node="">
(John 20:28)</span></p><p data-dcnode-id="2085"><span data-dcnode-id="2088" instrument_node="">“…the Christ according to the flesh, who is over all, God blessed forever. Amen”</span><br data-dcnode-id="2087"><span data-dcnode-id="2086" instrument_node="">
(Romans 9:5)</span></p><p data-dcnode-id="2081"><span data-dcnode-id="2084" instrument_node="">“…looking for the blessed hope and the appearing of the glory of our great God and Savior, Christ Jesus…”</span><br data-dcnode-id="2083"><span data-dcnode-id="2082" instrument_node="">
(Titus 2:13)</span></p><p data-dcnode-id="2075"><span data-dcnode-id="2080" instrument_node="">“But of the Son He [God] says,</span><br data-dcnode-id="2079"><span data-dcnode-id="2078" instrument_node="">
‘Your throne, O God, is forever and ever…'”</span><br data-dcnode-id="2077"><span data-dcnode-id="2076" instrument_node="">
(Hebrews 1:8)</span></p><p data-dcnode-id="2071"><span data-dcnode-id="2074" instrument_node="">“…by the righteousness of our God and Savior, Jesus Christ…”</span><br data-dcnode-id="2073"><span data-dcnode-id="2072" instrument_node="">
(2 Peter 1:1)</span></p><p data-dcnode-id="2069"><span data-dcnode-id="2070" instrument_node="">There are exactly seven passages in the New Testament that explicitly call Jesus “God.”  I agree with you on one point, that the Bible must be allowed to say exactly what it says.  If Jesus is God, all of the passages cited by the article above still make sense, because Jesus was not only fully God, but fully Man (this is the teaching of Philippians 2:5-11).  On the other hand, if Jesus is not God, the above seven passages cannot be reconciled.  And it seems significant to me that so many of the New Testament writers make the point: the apostle John, the apostle Paul, the writer to the Hebrews (whoever that was), and the apostle Peter.  One of them might have been confused on the issue, but for all four of them to get this wrong seems a little incongruous, especially if we still hold fast to the biblical teaching that the Scriptures are breathed out by God.</span></p><p data-dcnode-id="2067"><span data-dcnode-id="2068" instrument_node="">Further, the New Testament consistently refers to Christ as “Lord.”  The Greek word “kurios,” translated “Lord,” is a bit ambiguous, given that it simply meant one who had authority over another.  But the Old Testament generally accepted at the time of Christ was the Septuagint (a translation into Greek, of the Hebrew Old Testament).  In the Septuagint, the Greek word “kurios” almost exclusively refers to God.  This is one of the reasons why most English translations render the Hebrew proper name “Yhwh” in the Old Testament as “Lord.”  So the New Testament writers connected Jesus Christ to the Divine name, even when they were not explicitly and outright identifying Him that way.</span></p><p data-dcnode-id="2065"><span data-dcnode-id="2066" instrument_node="">One last note: the gospel of John is fairly unambiguous on this point.  Seven times, Jesus uses the phrase, “I Am” of Himself, directly connecting Himself to the divine name.  Beyond that, John quotes Jesus as making several clear statements about His divinity and preexistence.  Some of those statements are even connected to the “I Am” references I just mentioned. For example:</span></p><p data-dcnode-id="2061"><span data-dcnode-id="2064" instrument_node="">“Jesus said to them, ‘Truly, truly, I say to you, before Abraham was born, I am.'”</span><br data-dcnode-id="2063"><span data-dcnode-id="2062" instrument_node="">
(John 8:28)</span></p><p data-dcnode-id="2059"><span data-dcnode-id="2060" instrument_node="">In this case, the Jews to whom He spoke understood very well that He was claiming Deity for Himself.  They rejected that claim, however, and proceeded to attempt to inflict upon Him the Old Testament penalty for blasphemy, which was stoning.</span></p><p data-dcnode-id="2057"><span data-dcnode-id="2058" instrument_node="">And consider also the prayer Christ prayed before His arrest:</span></p><p data-dcnode-id="2053"><span data-dcnode-id="2056" instrument_node="">“Now, Father, glorify Me together with Yourself, with the glory which I had with You before the world was.”</span><br data-dcnode-id="2055"><span data-dcnode-id="2054" instrument_node="">
(John 17:5)</span></p><p data-dcnode-id="2051"><span data-dcnode-id="2052" instrument_node="">These kinds of statements are difficult to reconcile, if Jesus did not believe and understand Himself to be God.</span></p><p data-dcnode-id="2049"><span data-dcnode-id="2050" instrument_node="">So I’ll make a suggestion to you that I think you would all agree is the most important thing:  Examine the whole counsel of God within the written Scriptures, and do so without any agenda as to what we think it should say.  Just let it speak.  I always try to come at it fresh, without assuming in my mind that I already understand it all.  Otherwise, what is the point of reading it?  I will never grow in my understanding, because I am unteachable at the outset!  I might as well not waste my time.</span></p><p data-dcnode-id="2047"><span data-dcnode-id="2048" instrument_node="">I pray the Lord Jesus will show the truth to all of us, in His time and by His great mercy and grace.</span></p><p data-dcnode-id="2045"><span data-dcnode-id="2046" instrument_node="">Be blessed in Him!</span></p></div><div class="reply" data-dcnode-id="2041"><a aria-label="Reply to B. David Truksa" class="comment-reply-link" data-belowelement="div-comment-1006" data-commentid="1006" data-dcnode-id="2042" data-postid="3655" data-replyto="Reply to B. David Truksa" data-respondelement="respond" href="#comment-1006" rel="nofollow"><span data-dcnode-id="2043" instrument_node="">Reply</span></a></div></article><ol class="children" data-dcnode-id="1836"><li class="comment even depth-2 parent has-avatar" data-dcnode-id="1981" id="comment-1105"><article class="comment-body" data-dcnode-id="2014" id="div-comment-1105"><footer class="comment-meta" data-dcnode-id="2025"><div class="comment-author vcard" data-dcnode-id="2031"><span data-dcnode-id="2039" instrument_node="">

</span><img alt="" class="avatar avatar-70 photo" data-dcnode-id="1786" data-lazyloaded="1" data-src="https://www.staybiblical.com/wp-content/litespeed/avatar/77a9c5df88cc4a854cb277e8ff651163.jpg?ver=1650266275" data-srcset="https://www.staybiblical.com/wp-content/litespeed/avatar/f92a3493d3c7a141225c26951f799724.jpg?ver=1650266275 2x" height="70" src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI3MCIgaGVpZ2h0PSI3MCIgdmlld0JveD0iMCAwIDcwIDcwIj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBzdHlsZT0iZmlsbDojY2ZkNGRiO2ZpbGwtb3BhY2l0eTogMC4xOyIvPjwvc3ZnPg==" width="70"><span data-dcnode-id="1785" instrument_node=""> </span><b class="fn" data-dcnode-id="1783"><span data-dcnode-id="1784" instrument_node="">BANE</span></b><span data-dcnode-id="1782" instrument_node=""> </span><span class="says" data-dcnode-id="1780"><span data-dcnode-id="1781" instrument_node="">says:</span></span></div><div class="comment-metadata" data-dcnode-id="1774"><span data-dcnode-id="1778" instrument_node="">
</span><a data-dcnode-id="1775" href="#comment-1176"><time data-dcnode-id="1776" datetime="2021-08-22T20:48:30+02:00"><span data-dcnode-id="1777" instrument_node="">22. August 2021 at 20:48</span></time></a></div></footer><div class="comment-content" data-dcnode-id="1662"><p data-dcnode-id="1771"><span data-dcnode-id="1772" instrument_node="">If Jesus is Almighty God…</span></p><p data-dcnode-id="1769"><span data-dcnode-id="1770" instrument_node="">1. Then why is “God head of Christ just as Christ is head of man”? (1 Cor. 11:3)</span></p><p data-dcnode-id="1767"><span data-dcnode-id="1768" instrument_node="">2. Then why does Scripture consistently phrase Jesus as a separate person from God? (John 20:17; John 14:1; Mark 10:18; John 17:1-3; etc. Also in heaven, 1 Cor. 11:3; Luke 22:69; etc.)</span></p><p data-dcnode-id="1765"><span data-dcnode-id="1766" instrument_node="">3. Then how can Jesus have a God? Could Almighty God have a God? (Mic. 5:4; Ps. 45:6, 7; 89:26; John 20:17; Rom. 15:6; 2 Cor. 1:3; Eph 1:3; Col 1:3; Mark 15:34; John 17:1-3; Also in heaven, Rev. 1:6; 3:2, 12)</span></p><p data-dcnode-id="1763"><span data-dcnode-id="1764" instrument_node="">4. Then why does Scripture say he was born and is part of Creation? (Col. 1:15)</span></p><p data-dcnode-id="1761"><span data-dcnode-id="1762" instrument_node="">5. Then why does Rev. 3:14 say that Jesus is “the beginning of the creation of God”?</span></p><p data-dcnode-id="1759"><span data-dcnode-id="1760" instrument_node="">6. Then why is he subject to GOD, like we’re subject to him? (1 Cor. 15:27, 28; Eph. 1:17)</span></p><p data-dcnode-id="1757"><span data-dcnode-id="1758" instrument_node="">7. Then why does Micah 5:2 say that Jesus’ ORIGIN was “from early times”?</span></p><p data-dcnode-id="1755"><span data-dcnode-id="1756" instrument_node="">8. Then why does Jesus not know what God knows? (Matt. 24:36, Rev.1:1; Luke 8:45)</span></p><p data-dcnode-id="1753"><span data-dcnode-id="1754" instrument_node="">9. Then why is Jesus still subject to God when he is as high as he will ever be? (1 Cor. 15:27, 28)</span></p><p data-dcnode-id="1751"><span data-dcnode-id="1752" instrument_node="">10. Then why does Proverbs 8:22-31 show that the Messiah was CREATED / PRODUCED by God?</span></p><p data-dcnode-id="1749"><span data-dcnode-id="1750" instrument_node="">11. Then why is he not powerful enough to subject things to himself? (1 Cor. 15:27, Eph. 1:17, 22)</span></p><p data-dcnode-id="1747"><span data-dcnode-id="1748" instrument_node="">12. Then why would he have to be given any power and authority? (Mt. 28:18; 11:27; Jn. 5:22; 17:2; 3:35; 2 Pet. 1:17)</span></p><p data-dcnode-id="1745"><span data-dcnode-id="1746" instrument_node="">13. Then why did he have to learn anything? (Heb. 5:8; John 5:19; 8:28)</span></p><p data-dcnode-id="1743"><span data-dcnode-id="1744" instrument_node="">14. Then why is speaking against him not as bad as speaking against the Holy Spirit? (Mt. 12:31,32; Luke 12:10)</span></p><p data-dcnode-id="1741"><span data-dcnode-id="1742" instrument_node="">15. Then why did Jesus call the “Father…the only true God”? (John 17:3)</span></p><p data-dcnode-id="1739"><span data-dcnode-id="1740" instrument_node="">16. Then why did he need to be saved? (Heb. 5:7; John 12:27)</span></p><p data-dcnode-id="1737"><span data-dcnode-id="1738" instrument_node="">17. Then why did he have to be exalted to Leader and Savior? (Acts 5:31)</span></p><p data-dcnode-id="1735"><span data-dcnode-id="1736" instrument_node="">18. Then how could he be exalted and given a higher name than he had? (Phil. 2:9-11; Heb. 1:2-4)</span></p><p data-dcnode-id="1733"><span data-dcnode-id="1734" instrument_node="">19. Then why did he have to be given life in himself? (John 5:25,26)</span></p><p data-dcnode-id="1731"><span data-dcnode-id="1732" instrument_node="">20. Then how can the Father be greater than he? (John 14:28)</span></p><p data-dcnode-id="1729"><span data-dcnode-id="1730" instrument_node="">21. Then how could Jesus be tempted by Satan when God cannot be tempted with evil? (﻿James 1:13﻿)</span></p><p data-dcnode-id="1727"><span data-dcnode-id="1728" instrument_node="">22. Then why did he worship the Father? (John 4:22)</span></p><p data-dcnode-id="1725"><span data-dcnode-id="1726" instrument_node="">23. Then why can he not do anything on his own? (John 5:19; 6:38)</span></p><p data-dcnode-id="1723"><span data-dcnode-id="1724" instrument_node="">24. Then why would he pray to anybody? (Luke 22:44; John 17:1,2; Heb. 5:7)</span></p><p data-dcnode-id="1721"><span data-dcnode-id="1722" instrument_node="">25. Then why do John 1:18 and 1 John 4:9 say that Jesus is God’s “only BEGOTTEN Son”? ASV</span></p><p data-dcnode-id="1719"><span data-dcnode-id="1720" instrument_node="">26. Then how can he be God’s servant? (Acts 4:26,27,30)</span></p><p data-dcnode-id="1717"><span data-dcnode-id="1718" instrument_node="">27. Then how could he receive strength from an angel? (Luke 22:43)</span></p><p data-dcnode-id="1715"><span data-dcnode-id="1716" instrument_node="">28. Then how could he be a mediator between God and man? (1 Tim. 2:5)</span></p><p data-dcnode-id="1713"><span data-dcnode-id="1714" instrument_node="">29. Then how could he be with God (ton theon)? (John 1:1)</span></p><p data-dcnode-id="1711"><span data-dcnode-id="1712" instrument_node="">30. Then how can he be God’s image? (Col. 1:15; Heb. 1:3)</span></p><p data-dcnode-id="1709"><span data-dcnode-id="1710" instrument_node="">31. Then why is he called the agency (dia) of creation and not the Originator (ek)? (1 Cor. 8:6; John 1:1-3; Prov. 8:30; Heb. 2:10; Col. 1:15,16)</span></p><p data-dcnode-id="1707"><span data-dcnode-id="1708" instrument_node="">32. Then why did Jesus say GOD was “good” in a way that Jesus was not? (Mark 10:18)</span></p><p data-dcnode-id="1705"><span data-dcnode-id="1706" instrument_node="">33. Then why does he have an archangel’s voice instead of God’s voice? (1 Thess. 4:16)</span></p><p data-dcnode-id="1703"><span data-dcnode-id="1704" instrument_node="">34. Then why is the only “worship” given to him the same given to humans? (Heb. 1:6, cf. Mt. 18:26; Rev. 3:9 – “Proskuneo”)</span></p><p data-dcnode-id="1701"><span data-dcnode-id="1702" instrument_node="">35. Then why do many who believe this rely on a few selected, so-called ‘proof-texts’ instead of the context of the consistent teaching of the entire Bible?</span></p><p data-dcnode-id="1699"><span data-dcnode-id="1700" instrument_node="">36. Then how could he be commanded to do anything? (John 12:49; Deut. 18:18)</span></p><p data-dcnode-id="1697"><span data-dcnode-id="1698" instrument_node="">37. Then why did Steven see two separate entities, GOD and Jesus, and not just one God or three persons? (Acts 7:55)</span></p><p data-dcnode-id="1695"><span data-dcnode-id="1696" instrument_node="">38. Then how could he be seen at GOD’s right hand? (Luke 22:69; Acts 7:55; Rom. 8:34)</span></p><p data-dcnode-id="1693"><span data-dcnode-id="1694" instrument_node="">39. Then how could Jesus be exalted (not to become God Himself, but) to the position of the “right hand OF God”? (Acts 2:33)</span></p><p data-dcnode-id="1691"><span data-dcnode-id="1692" instrument_node="">40. Then why would he have to receive a revelation from God? (Rev.1:1)</span></p><p data-dcnode-id="1689"><span data-dcnode-id="1690" instrument_node="">41. Then why is he called God’s “begotten” Son before he came to earth? (John 3:16; Gal. 4:4; 1 John 4:9)</span></p><p data-dcnode-id="1687"><span data-dcnode-id="1688" instrument_node="">42. Then how could he have a Father? (John 20:17)</span></p><p data-dcnode-id="1685"><span data-dcnode-id="1686" instrument_node="">43. Then how could he come in flesh? (1 Kings 8:27; Acts 17:24,25)</span></p><p data-dcnode-id="1683"><span data-dcnode-id="1684" instrument_node="">44. Then why did he not come in his own name? (John 5:41-44)</span></p><p data-dcnode-id="1681"><span data-dcnode-id="1682" instrument_node="">45. Then why did Jesus “come down from heaven to do” God’s will and not his own will? (Luke 22:42; John 6:38; John 5:30; John 8:42)</span></p><p data-dcnode-id="1679"><span data-dcnode-id="1680" instrument_node="">46. Then how could he appear before GOD? (Heb. 9:24)</span></p><p data-dcnode-id="1677"><span data-dcnode-id="1678" instrument_node="">47. Then how could he die? Can God die? Can part of God die? (Rom. 5:10; Acts 5:30; 1 Cor. 15:3; Hab.1:12; cf. 1 Tim. 6:16; Num. 23:19; Ps. 90:2; Dan. 6:25-26)</span></p><p data-dcnode-id="1675"><span data-dcnode-id="1676" instrument_node="">48. Then why is it that God resurrected Jesus? (Acts 2:32)</span></p><p data-dcnode-id="1673"><span data-dcnode-id="1674" instrument_node="">49. Then why can we see him if “no man has seen God at any time”? (John 1:18)</span></p><p data-dcnode-id="1671"><span data-dcnode-id="1672" instrument_node="">50. Then why is there not one clear Scripture where Jesus is called “God the Son,” (equal to those declaring “God, the Father)?</span></p><p data-dcnode-id="1669"><span data-dcnode-id="1670" instrument_node="">51. How is it that the Jews rounded up some false witnesses to make up lies to obtain a death sentence for Jesus, but neither the Jewish officials nor even one of these false witnesses made a claim that he was God or equally God? (Matt. 26:59-67)</span></p><p data-dcnode-id="1667"><span data-dcnode-id="1668" instrument_node="">52. John summed up his whole Gospel by saying that it was written that we may believe “that Jesus is the Christ, the Son of God.” Why is there is no mention in that summary of the entire Gospel of what would be the most important thing of all – that Jesus is God? (John 20:31)</span></p><p data-dcnode-id="1665"><span data-dcnode-id="1666" instrument_node="">53. How could Jesus teach in the Jewish synagogues and the temple? This would never happen if any of the authorities believed he claimed to be God (or that his followers believed such a thing). – Matt. 26:55; John 7:14, 28. Matt. 4:23.</span></p><p data-dcnode-id="1663"><span data-dcnode-id="1664" instrument_node="">54. How could Jesus’ followers teach in Jewish synagogues after Jesus’ death and for the remainder of that first century (at least)? Again, this would not have been allowed if there were any suspicion that they believed Jesus to be God. Acts 9:20; 13:5, Acts 13:13-15.</span></p></div><div class="reply" data-dcnode-id="1659"><a aria-label="Reply to BANE" class="comment-reply-link" data-belowelement="div-comment-1176" data-commentid="1176" data-dcnode-id="1660" data-postid="3655" data-replyto="Reply to BANE" data-respondelement="respond" href="#comment-1176" rel="nofollow"><span data-dcnode-id="1661" instrument_node="">Reply</span></a></div></article><ol class="children" data-dcnode-id="1436"><li class="comment even depth-2 parent has-avatar" data-dcnode-id="1495" id="comment-1194"><article class="comment-body" data-dcnode-id="1611" id="div-comment-1194"><footer class="comment-meta" data-dcnode-id="1642"><div class="comment-author vcard" data-dcnode-id="1648"><span data-dcnode-id="1657" instrument_node="">
</span><img alt="" class="avatar avatar-70 photo" data-dcnode-id="1656" data-lazyloaded="1" data-src="https://www.staybiblical.com/wp-content/litespeed/avatar/8b0fa1dbcb9b71b5ace828a1f2dac036.jpg?ver=1650266517" data-srcset="https://www.staybiblical.com/wp-content/litespeed/avatar/f71b49c396fd7c27ed99fae84356cc18.jpg?ver=1650266517 2x" height="70" src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI3MCIgaGVpZ2h0PSI3MCIgdmlld0JveD0iMCAwIDcwIDcwIj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBzdHlsZT0iZmlsbDojY2ZkNGRiO2ZpbGwtb3BhY2l0eTogMC4xOyIvPjwvc3ZnPg==" width="70"><span data-dcnode-id="1655" instrument_node=""> </span><b class="fn" data-dcnode-id="1652"><a class="url" data-dcnode-id="1653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.studentsofthescripture.org/" rel="external nofollow ugc"><span data-dcnode-id="1654" instrument_node="">Benjamin Truksa</span></a></b><span data-dcnode-id="1651" instrument_node=""> </span><span class="says" data-dcnode-id="1649"><span data-dcnode-id="1650" instrument_node="">says:</span></span></div><div class="comment-metadata" data-dcnode-id="1643"><span data-dcnode-id="1647" instrument_node="">
</span><a data-dcnode-id="1644" href="#comment-1194"><time data-dcnode-id="1645" datetime="2021-09-01T05:03:38+02:00"><span data-dcnode-id="1646" instrument_node="">1. September 2021 at 05:03</span></time></a></div></footer><div class="comment-content" data-dcnode-id="1615"><p data-dcnode-id="1639"><span data-dcnode-id="1641" instrument_node="">Hi, Bane.  This reply is directed specifically to you, and I hope you will take time to read it.  I hope, also, that it comes to your ears with the same respect with which it leaves my mouth. </span><img alt="🙏" class="emoji" data-dcnode-id="1640" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/13.1.0/svg/1f64f.svg&amp;raw"></p><p data-dcnode-id="1637"><span data-dcnode-id="1638" instrument_node="">I think your questions are reasonable questions.  All 54 of them.  I don’t think they were probably asked with the intent of having a reasonable conversation, but rather of attempting to intimidate the opponent with a show of overwhelming force.</span></p><p data-dcnode-id="1635"><span data-dcnode-id="1636" instrument_node="">Nevertheless, I’ll respond reasonably, because I believe it honors my Lord to do so, and because it reflects the honor due you, as a person made in the image of God.</span></p><p data-dcnode-id="1633"><span data-dcnode-id="1634" instrument_node="">First, I have no agenda in this.  I want the Scriptures to instruct and inform me, wherever that leads.  I hope and trust you have the same conviction.  If the Scriptures say plainly that Jesus is not God, I will take God’s word on the subject.  If they say plainly that He is God, I’ll accept that as well.  Otherwise, there’s no point in even examining the Scriptures.  I’ve already made up my mind, and I will force the Scriptures into my mold regardless.  Agreed?</span></p><p data-dcnode-id="1631"><span data-dcnode-id="1632" instrument_node="">Second, I note that in all your questions, you still did not address the seven passages, and the several other related passages, which I mentioned.  Rather, you charged those who see the truth in them, as those who refuse to see the teaching of the rest of the Bible. And yet, those seven passages, my “proof-texts,” if you like, have not been addressed clearly by any of the responses here.  They’ve been ignored, as though they don’t exist.  Probably that is because they are so clear that there can be no cogent argument against them; so that if they are accepted at face value, they drive all 54 of your contrary questions into weak and pasty silence.</span></p><p data-dcnode-id="1629"><span data-dcnode-id="1630" instrument_node="">Third, in the interest of teachability, I gave serious and thoughtful consideration to your questions.  Yes, all 54 of them.  I tried to reason through them as though I took your position.  And yet I found clear, biblical answers to all 54 of them.</span></p><p data-dcnode-id="1627"><span data-dcnode-id="1628" instrument_node="">Fourth, it would take more space here than I’m willing to devote to the subject.</span></p><p data-dcnode-id="1625"><span data-dcnode-id="1626" instrument_node="">And, quite frankly (and fifth), I see no need to respond to your specific passages until you have responded to mine.</span></p><p data-dcnode-id="1623"><span data-dcnode-id="1624" instrument_node="">So here is my proposition:</span></p><p data-dcnode-id="1621"><span data-dcnode-id="1622" instrument_node="">If there is another venue through which we can communicate, one where we can take all the time and space this important subject deserves, I would love to reason through your questions in writing, in some depth, contingent on you doing the same with the passages I cited.  It would be a good conversation about a very important issue, and it would be good for both of us to have to go back to the Scriptures with no biases and no agendas.</span></p><p data-dcnode-id="1619"><span data-dcnode-id="1620" instrument_node="">To that end, I’ll give the first offering.  Please feel free to contact me:</span></p><p data-dcnode-id="1616"><a data-dcnode-id="1617" href="mailto:bdavid@studentsofthescripture.org"><span data-dcnode-id="1618" instrument_node="">bdavid@studentsofthescripture.org</span></a></p></div><div class="reply" data-dcnode-id="1612"><a aria-label="Reply to Benjamin Truksa" class="comment-reply-link" data-belowelement="div-comment-1194" data-commentid="1194" data-dcnode-id="1613" data-postid="3655" data-replyto="Reply to Benjamin Truksa" data-respondelement="respond" href="#comment-1194" rel="nofollow"><span data-dcnode-id="1614" instrument_node="">Reply</span></a></div></article><ol class="children" data-dcnode-id="1496"><li class="comment odd alt depth-3 parent has-avatar" data-dcnode-id="1497" id="comment-1216"><article class="comment-body" data-dcnode-id="1547" id="div-comment-1216"><footer class="comment-meta" data-dcnode-id="1596"><div class="comment-author vcard" data-dcnode-id="1602"><span data-dcnode-id="1610" instrument_node="">

</span><a data-dcnode-id="1263" href="#comment-1254"><time data-dcnode-id="1264" datetime="2021-09-21T07:36:25+02:00"><span data-dcnode-id="1265" instrument_node="">21. September 2021 at 07:36</span></time></a></div></footer><div class="comment-content" data-dcnode-id="1241"><p data-dcnode-id="1259"><span data-dcnode-id="1260" instrument_node="">Greetings, non-trinitarian brothers and trinitarian brothers alike.</span></p><p data-dcnode-id="1257"><span data-dcnode-id="1258" instrument_node="">I am sure we all have our convictions as we seek to worship God in truth and honesty, this is good. Many debate, and whilst we should seek unity and love, it does show a comittment to seeking the truth of God’s word.</span></p><p data-dcnode-id="1255"><span data-dcnode-id="1256" instrument_node="">I myself as a non-trinitarian have written and indepth article investigating “Jesus’ godship”, and I compare side by side fairly arguments and scriptures for and against the trinity, whilst I have a conviction against the notion of Jesus being God, if others do not agree, then that is their free choice and is on their conscience.</span></p><p data-dcnode-id="1253"><span data-dcnode-id="1254" instrument_node="">However, I encourage anyone to read my article and see what they make of it, if it convinces you in one way or another way, let it be so. But I merely wanted to share the infomation.</span></p><p data-dcnode-id="1251"><span data-dcnode-id="1252" instrument_node="">I list scriptures in which on plain surface reading are directly “against” the notion of Jesus being YHVH, then I will list the scriptures which appear to be “for” on plain surface reading. Then I discuss “framworking”, as well as Biblical translations and root Hebrew/Greek words. All is discussed within the limits of “Sola Scriptura” (which means “the scriptures only”, refering to no outside philosophy, or other church writings on the matter). I also have a seperate article on the Holy Spirit too.</span></p><p data-dcnode-id="1244"><a data-dcnode-id="1249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//proselytiserofjah.wordpress.com/2021/09/03/examining-the-trinity-jesus-godship/" rel="nofollow ugc"><span data-dcnode-id="1250" instrument_node="">https://proselytiserofjah.wordpress.com/2021/09/03/examining-the-trinity-jesus-godship/</span></a><br data-dcnode-id="1248"><span data-dcnode-id="1247" instrument_node="">

</span><img alt="" class="avatar avatar-70 photo" data-dcnode-id="1176" data-lazyloaded="1" data-src="https://www.staybiblical.com/wp-content/litespeed/avatar/11a0c6b7693250faca6553a250528a6a.jpg?ver=1650266274" data-srcset="https://www.staybiblical.com/wp-content/litespeed/avatar/47914cd780e701822a92e70b31de57fa.jpg?ver=1650266274 2x" height="70" src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI3MCIgaGVpZ2h0PSI3MCIgdmlld0JveD0iMCAwIDcwIDcwIj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBzdHlsZT0iZmlsbDojY2ZkNGRiO2ZpbGwtb3BhY2l0eTogMC4xOyIvPjwvc3ZnPg==" width="70"><span data-dcnode-id="1175" instrument_node=""> </span><b class="fn" data-dcnode-id="1172"><a class="url" data-dcnode-id="1173" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.staybiblical.com/is-jesus-god/" rel="external nofollow ugc"><span data-dcnode-id="1174" instrument_node="">Bern</span></a></b><span data-dcnode-id="1171" instrument_node=""> </span><span class="says" data-dcnode-id="1169"><span data-dcnode-id="1170" instrument_node="">says:</span></span></div><div class="comment-metadata" data-dcnode-id="1163"><span data-dcnode-id="1167" instrument_node="">
</span><a data-dcnode-id="1164" href="#comment-1320"><time data-dcnode-id="1165" datetime="2021-10-18T07:52:41+02:00"><span data-dcnode-id="1166" instrument_node="">18. October 2021 at 07:52</span></time></a></div></footer><div class="comment-content" data-dcnode-id="1055"><p data-dcnode-id="1056"><span data-dcnode-id="1161" instrument_node="">Jesus Is Called “God with Us” His name is to be called Emmanuel, which means “God with us” (Matthew 1:23). “Emmanuel” describes the concept of the incarnation—God becoming man. Jesus being called “God with us” is consistent with John 1, which refers to Jesus as the Word who was with God, and who was God, and who became flesh (John 1:1, 14). Jesus Is Identified with Yahweh John the Baptist fulfills Isaiah 40 as he preaches the kingdom. “The voice of one crying in the wilderness: ‘Prepare the way of the Lord’” (Matthew 3:3). The one who was coming would be God himself. We can deduce that Jesus is Yahweh because John the Baptist, as the forerunner of Jesus, fulfills the Old Testament prediction that he would prepare the way for Yahweh (Isaiah 40:3). Jesus Healed or Performed Other Miracles In the gospels, we see that Jesus healed many people and demonstrated power over nature in other ways. The question is whether Jesus acted as God or simply as a prophet requesting the Father to perform the works. The words of Jesus and the reaction of those impacted by these miracles suggest that Jesus was acting as God and not simply as a prophet. He healed the demon possessed, epileptics, and paralytics (Matthew 4:23–24).The healings had to be accomplished with divine power. A leper came to worship Jesus, saying, “If you will, you can make me clean.” Jesus healed the leper by touching him and saying, “I will; be clean” (Matthew 8:3). Jesus did not refuse the worship of the leper; this means he must either be God or ungodly. His healing of the leper demonstrated that he was not ungodly, and it helped to prove that he is God himself. He healed many more who were sick, and cast out demons with a word (Matthew 8:5–17).</span><br data-dcnode-id="1160"><span data-dcnode-id="1159" instrument_node="">
On a stormy night at sea, Jesus appears walking on the water toward the disciples’ boat. Peter asked Jesus if he could come meet him. Jesus said, “Come.” and Peter walked on the water until he began to be afraid. As he was sinking, he cried, “Lord, save me.” Jesus caught him and rebuked him for doubting (Matthew 14:22–31). Peter had enough faith in Jesus as “Lord” to be empowered to walk on water! When they got into the boat, the wind ceased (Matthew 14:32). The response of the disciples was that they worshipped him, calling him the Son of God (verse 33). They treated him as God because he acted as God. At Gennesaret, the men brought all who were sick, and they begged Jesus that they might only touch the hem of his garment. And as many as touched his garment were made well (Matthew 14:36). Here was divine power exuding from Jesus. When the woman with the issue of blood touched Jesus, he immediately knew “in himself that power had gone out from him” (Mark 5:30). Jesus sensed his divine energy being used, and the woman was healed of her disease. When Jesus healed the great multitude, “power came out from him and healed them all” (Luke 6:19). Jesus can be said to have healed because power went out from him to do the work. Raised the Dead Jesus raised Jairus’ daughter from the dead (Matt. 9:23-26), showing he had divine power over death. He also raised from the dead the son of the widow of Nain (Luke 7:14): another demonstration of his power over death. Showed Uniqueness in Wisdom and Divine Authority Matthew shows how Jesus exercised divine authority (or claims to) in</span><br data-dcnode-id="1158"><span data-dcnode-id="1157" instrument_node="">
Matthew 5, 9, 10, 12, 21, and 22. Jesus taught the beatitudes in Matthew 5. He said that he came not to destroy the law but fulfill it. He taught that murder and adultery begin in the heart. He taught that marriage is sacred and binding. In doing so, he forbade oaths, said to go the second mile and to love your enemies (Matthew 5). Jesus clarified the law, emphasizing that it must be kept in the heart. The divine authority to do this is assumed. He called his disciples and gave them power over unclean spirits, to cast them out, and to heal all kinds of sickness, and all kinds of disease (Matthew 10:1). He had the divine authority to give his disciples power over unclean spirits and disease.</span><br data-dcnode-id="1156"><span data-dcnode-id="1155" instrument_node="">
Jesus went into the temple, driving out the money changers. He said to them, “It is written, ‘My house shall be called a house of prayer’” (Matthew 21:13). He certainly acted with authority here. Was he even suggesting that the temple was his house? Jesus silenced the Sadducees by the way he answered the question about the Resurrection (Matthew 22:23–33). Again we see the unique wisdom and authority of Jesus. No one could answer him, and from that day no one dared to question him anymore (Matthew 22:46). Jesus made a distinct impression on them as the authoritative Son of God. Jesus taught in the synagogue of his own country and the people there were astonished, saying, “Where did this man get this wisdom and these mighty works?” (Matthew 13:54). Jesus was unique in his wisdom and in his miracles. The Pharisees marveled at the way Jesus responded to their question about paying taxes to Caesar (Matthew 22:21). Jesus was unique in his wisdom and authority.</span><br data-dcnode-id="1154"><span data-dcnode-id="1153" instrument_node="">
Accepted Worship Jesus accepted worship, after saying that only God is worthy of worship (Matthew 4:10). If he was a holy man who was not divine, he would have stopped people from worshipping him. Of course, it’s possible for someone to accept worship as a pretender, but Jesus backed up his own claims of deity, as pointed out many times in this article. A ruler came to worship him (Matthew 9:18–26). Since Jesus accepted this, he must have viewed himself as God. After Jesus walked on water, those in the boat came and worshipped him, saying, “Truly You are the Son of God” (Matthew 14:33). Their worship of him as God was an acknowledgement that he was acting as God in his miracles. While the women were on their way to tell the disciples that Jesus had risen from the dead, Jesus himself met them, saying “Greetings!” So they came and took hold of his feet and worshipped him (Matthew 28:9). Jesus was worshipped—as God. There’s no indication here that he tried to stop his worshippers from honoring him as God. Instead, he told them not to be afraid and asked them to go tell the disciples to meet up with him. When the disciples later saw Jesus, they worshipped him (Matthew 28:17). Again, Jesus received worship. In fact, he declared at that point that all authority in heaven and earth had been given to him (vs. 18). Jesus Showed Amazing Knowledge Jesus rebuked the cities in which he had done his mighty works, saying, “Woe to you, Chorazin! Woe to you, Bethsaida! For if the mighty works done in you had been done in Tyre and Sidon, they would have repented long ago in sackcloth and ashes” (Matthew 11:21). Jesus showed that he had access to divine omniscience by knowing how people would have responded under different conditions.</span><br data-dcnode-id="1152"><span data-dcnode-id="1151" instrument_node="">
Jesus knew thoughts (Matthew 12:25), a divine action. Jesus told two of his disciples, “Go into the village in front of you and immediately you will find a donkey tied, and a colt with her. Untie them and bring them to Me.” (Matthew 21:1–3). Jesus knew where the donkeys were. Jesus helped his disciples catch a huge load of fish by telling them to let down their nets for a catch (Luke 5:1–7). Jesus’ supernatural knowledge and power is active here. Jesus told one of the criminals he was crucified beside, “Truly, I say to you, today you will be with Me in Paradise” (Luke 23:43). Jesus was able to understand the heart of the criminal, give him the assurance of his salvation, and predict his future.</span><br data-dcnode-id="1150"><span data-dcnode-id="1149" instrument_node="">
Jesus Predicted the Future Though the ability to accurately predict the future is not by itself proof of Jesus’ deity (God sometimes revealed the future to prophets who were mere humans), this knowledge of the future is what you would expect of someone who claimed to be God and backed it up with his miracles. If he were God, he would be able to predict the future. Jesus predicted to his disciples that he would go to Jerusalem, suffer at the hand of the Jewish leaders, be killed, and rise from the dead the third day (Matthew 16:21). Jesus knew the future. Jesus said that some would not die before they saw the Son of Man coming in his kingdom (Matthew</span><br data-dcnode-id="1148"><span data-dcnode-id="1147" instrument_node="">
16:28). Jesus knew the future and predicted his glorification, or transfiguration. Again Jesus predicted his arrest, beatings, death, and Resurrection (Matthew 20:18). Jesus knew about these events beforehand. Jesus warned about false Christs and false prophets that would come. The true Son of Man would appear again like the lightning comes from the east and flashes to the west (Matthew 24:3–28). Jesus predicted a tribulation after which the Son of Man would come in the clouds of heaven with power and great glory. Jesus said that at that time he would send his angels with the great sound of a trumpet and gather in the elect (Matthew 24:29–31). Not only did Jesus know what is going to happen in the future, but he also had the authority to send his angels and gather in the elect. The only one with that kind of authority would be God. At the Last Supper, Jesus accurately predicted that Judas would betray him (Matthew 26:20–25). Jesus predicted that Peter would deny him three times that night (Matthew 26:30–35). It happened as Jesus had predicted. Jesus predicted the destruction of Jerusalem and the great tribulation (Mark 13:2).\</span><br data-dcnode-id="1146"><span data-dcnode-id="1145" instrument_node="">

According to the above texts, an agent would be sent to prepare the people for the coming of Yahweh God to his own temple. Mark tells us that that agent was the John the Baptist. It’s clear that Jesus isn’t simply an agent who comes for God but that he is Yahweh Lord of Hosts who comes to his temple. The agent in Malachi is already presented in John the Baptist he is the agent who represents Yahweh so that he can come in his glory to his people. Early Writers clearly say this Irenaeus, AH (B.3, Ch.11) “By what God, then, was John, the forerunner, who testifies of the Light, sent [into the world]? Truly it was by Him, of whom Gabriel is the angel, who also announced the glad tidings of his birth: [that God] who also had promised by the prophets that He would send His messenger before the face of His Son, Malachi 3:1 who should prepare His way, that is, that he should bear witness of that Light in the spirit and power of Elias. Luke 1:17 But, again, of what God was Elias the servant and the prophe</span><br data-dcnode-id="1138"><span data-dcnode-id="1137" instrument_node="">

‭‭Matthew‬ ‭27:52-53‬ ‭KJV‬‬</span></p><p data-dcnode-id="657"><span data-dcnode-id="658" instrument_node="">Why is this important?</span></p><p data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">Because, Isaiah told this to Lucifer what will happen, before Jesus was born.</span></p><p data-dcnode-id="653"><span data-dcnode-id="654" instrument_node="">Jesus not only Rose from the dead on the third day, but freed all the saints that was waiting on Jesus Christ to free them.</span></p><p data-dcnode-id="651"><span data-dcnode-id="652" instrument_node="">Look what Isaiah said to Lucifer!</span></p><p data-dcnode-id="647"><span data-dcnode-id="650" instrument_node="">“How art thou fallen from heaven, O Lucifer, son of the morning! how art thou cut down to the ground, which didst weaken the nations! For thou hast said in thine heart, I will ascend into heaven, I will exalt my throne above the stars of God: I will sit also upon the mount of the congregation, in the sides of the north: I will ascend above the heights of the clouds; I will be like the most High. Yet thou shalt be brought down to hell, to the sides of the pit. They that see thee shall narrowly look upon thee, and consider thee, saying, Is this the man that made the earth to tremble, that did shake kingdoms; that made the world as a wilderness, and destroyed the cities thereof; that opened not the house of his prisoners?”</span><br data-dcnode-id="649"><span data-dcnode-id="648" instrument_node="">
‭‭Isaiah‬ ‭14:12-17‬ ‭KJV‬‬</span></p><p data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">Before Jesus laid his life down for his vessels (his chosen ones, before the foundation of this world) when Jesus children died (the sons and daughters of GOD) they did not go to hades, they went into the Paradise of God, awaiting for the coming of Jesus Christ.</span></p><p data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">Therefore, Jesus was born in this planet that we all live in. Jesus had to learn obedient etc. Then Jesus laid his life down and was dead for three days.  Then Jesus returned on the third day.  That’s the second time Jesus returned to this planet and Jesus stayed for another 40 days in the fleshly body, then Jesus returned back to the new heavens, as John describes in revelation.</span></p><p data-dcnode-id="639"><span data-dcnode-id="642" instrument_node="">“And while they looked stedfastly toward heaven as he went up, behold, two men stood by them in white apparel; which also said, Ye men of Galilee, why stand ye gazing up into heaven? this same Jesus, which is taken up from you into heaven, shall so come in like manner as ye have seen him go into heaven.”</span><br data-dcnode-id="641"><span data-dcnode-id="640" instrument_node="">
‭‭Acts‬ ‭1:10-11‬ ‭KJV‬‬</span></p><p data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">I’ll paraphrase: Like manner, what does that mean.  Paul is a perfect example.  Was Paul looking to get saved by Jesus, the answer is no.  Was Paul looking to get baptized and wanted to accept Jesus as his Lord and personal Savior, the answer is no! If Paul caught any man or woman practicing Christianity, Paul would bring them before the synagogue and have them prosecuted to death. Paul was a dangerous man. Although Paul was the chosen vessel before the foundation of this world, imagine that. Jesus is light and satan is darkness. The light stoled Paul out of darkness, that’s why it’s been written that Jesus comes like a thief in the night.</span></p><p data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">My point, no one gets to accept Jesus Chris as Lord and personal savior.  We don’t pick Christ.  He has already chosen his vessels before the foundation of this world.  Jesus picks who he wanted to be part of his kingdom.</span></p><p data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">Since we got all that out of the way.</span></p><p data-dcnode-id="629"><span data-dcnode-id="632" instrument_node="">Let’s talk reality.  Let’s pretend we are all together in church.</span><br data-dcnode-id="631"><span data-dcnode-id="630" instrument_node="">
We all believe Jesus one way or the other.  Things are going great in our life’s.</span></p><p data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">We’ll sing praises that we want to be like Jesus.  We feel safe and secure.</span></p><p data-dcnode-id="623"><span data-dcnode-id="626" instrument_node="">Then suddenly one of us has a disaster that came in our lives.</span><br data-dcnode-id="625"><span data-dcnode-id="624" instrument_node="">
What does most people do in church when this happens, does the people shy away from that individual and his family. Sadly the answer is yes, why do people think this way. Because people think and say that person has sin in his/her life. That’s the short answer, by the way.</span></p><p data-dcnode-id="621"><span data-dcnode-id="622" instrument_node="">People go to church for many different reasons, many in my life has said, the reason they go to church to bring up there children in a better environment and it’s good for business. Many goes to church because they have conviction.  Others goes to church because they really believe Jesus is going to return someday, called the second coming of Christ and people really want to go to a better world.</span></p><p data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">Regardless of the reason why people goes to church, the people sing praises and say the words I want to be like Christ.</span></p><p data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">What does it mean when a person or person male or female has a sudden disaster in their lives.  It’s means that person life is no longer belongs to the darkness.  That person just been born again and that is why that person had the disaster.  Because now they are a born again, child of GOD and the world hates them and they struggle until someone explains what took place in that person life.</span></p><p data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">Paul was dead in Christ until Jesus converted him as a child of GOD, being born again.</span></p><p data-dcnode-id="611"><span data-dcnode-id="614" instrument_node="">Scripture: “Paul, an apostle, (not of men, neither by man, but by Jesus Christ, and God the Father, who raised him from the dead;)”</span><br data-dcnode-id="613"><span data-dcnode-id="612" instrument_node="">
‭‭Galatians‬ ‭1:1‬ ‭KJV‬‬</span></p><p data-dcnode-id="605"><span data-dcnode-id="610" instrument_node="">Scripture: “Paul, an apostle of Jesus Christ by the will of God, and Timotheus our brother,”</span><br data-dcnode-id="609"><span data-dcnode-id="608" instrument_node="">
‭‭Colossians‬ ‭1:1‬ ‭KJV‬‬</span><br data-dcnode-id="607"><span data-dcnode-id="606" instrument_node="">
TAKE NOTICE:  not the will of man!</span></p><p data-dcnode-id="599"><span data-dcnode-id="604" instrument_node="">Scripture: “Paul, a servant of God, and an apostle of Jesus Christ, according to the faith of God’s elect, and the acknowledging of the truth which is after godliness;”</span><br data-dcnode-id="603"><span data-dcnode-id="602" instrument_node="">
‭‭Titus‬ ‭1:1‬ ‭KJV‬‬</span><br data-dcnode-id="601"><span data-dcnode-id="600" instrument_node="">
Notice Paul admits he is a servant.</span></p><p data-dcnode-id="593"><span data-dcnode-id="598" instrument_node="">Scripture: “Paul, a prisoner of Jesus Christ, and Timothy our brother, unto Philemon our dearly beloved, and fellowlabourer,”</span><br data-dcnode-id="597"><span data-dcnode-id="596" instrument_node="">
‭‭Philemon‬ ‭1:1‬ ‭KJV‬‬</span><br data-dcnode-id="595"><span data-dcnode-id="594" instrument_node="">
Notice Paul said he is a prisoner of Jesus Christ. A prisoner means he has been captured by Jesus Christ.</span></p><p data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">James admits he is a servant.</span></p><p data-dcnode-id="587"><span data-dcnode-id="590" instrument_node="">Let’s discuss Marry, her life was doing well, until the Holy Spirit came upon her and told her she was going to have a child of GOD and his name would be Jesus. Now why would anyone think that would be a sudden disaster in Marry life.  Because Marry was engaged to man name Joseph and she had to go back home and not face her soon to be husband but her mom and dad and the Community. In this days if a woman was pregnant out of wedlock, they stone them to death.  So I ask all the men, if your engaged to the love of your life and she came home pregnant and she said I’m going to have GOD baby and his name will be Jesus. What’s your first response, Who are you been screwing and you probably use some profanity and be very angry. That’s the holly spirit came to Joseph to explain things.</span><br data-dcnode-id="589"><span data-dcnode-id="588" instrument_node="">
Joseph had to get her out of there and on the way to Jerusalem over two thousand babies were murdered trying to kill Jesus!  Further, Marry had to watch her actual son she gave birth to hang on the cross.</span></p><p data-dcnode-id="585"><span data-dcnode-id="586" instrument_node="">Paul writes these letters as though, he knows by having for knowledge, the question the children of GOD will have in the future and further gives the answers to many.</span></p><p data-dcnode-id="581"><span data-dcnode-id="584" instrument_node="">“But of the times and the seasons, brethren, ye have no need that I write unto you. For yourselves know perfectly that the day of the Lord so cometh as a thief in the night. For when they shall say, Peace and safety; then sudden destruction cometh upon them, as travail upon a woman with child; and they shall not escape. But ye, brethren, are not in darkness, that that day should overtake you as a thief. Ye are all the children of light, and the children of the day: we are not of the night, nor of darkness. Therefore let us not sleep, as do others; but let us watch and be sober. For they that sleep, sleep in the night; and they that be drunken are drunken in the night. But let us, who are of the day, be sober, putting on the breastplate of faith and love; and for an helmet, the hope of salvation. For God hath not appointed us to wrath, but to obtain salvation by our Lord Jesus Christ, who died for us, that, whether we wake or sleep, we should live together with him. Wherefore comfort yourselves together, and edify one another, even as also ye do.”</span><br data-dcnode-id="583"><span data-dcnode-id="582" instrument_node="">
