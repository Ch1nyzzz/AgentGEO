</span><article class="post-23702 post type-post status-publish format-standard hentry category-ask-the-rabbi tag-exodus-20 tag-killing tag-murder tag-ten-commandments pmpro-level-required pmpro-level-3 pmpro-level-2 pmpro-has-access ast-article-single" data-dcnode-id="1013" id="post-23702" itemscope="itemscope" itemtype="https://schema.org/CreativeWork"><span data-dcnode-id="1264" instrument_node="">
</span><div class="ast-post-format- ast-no-thumb single-layout-1" data-dcnode-id="1015"><span data-dcnode-id="1263" instrument_node="">
</span><header class="entry-header ast-no-thumbnail" data-dcnode-id="1229"><span data-dcnode-id="1262" instrument_node="">
</span><div class="ast-single-post-order" data-dcnode-id="1231"><span data-dcnode-id="1261" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="1259" itemprop="headline"><span data-dcnode-id="1260" instrument_node="">Why doesn’t “Do Not Kill” apply to war and law?</span></h1><div class="entry-meta" data-dcnode-id="1233"><span class="posted-on" data-dcnode-id="1254"><span class="published" data-dcnode-id="1257" itemprop="datePublished"><span data-dcnode-id="1258" instrument_node=""> September 23, 2020</span></span><span class="updated" data-dcnode-id="1255" itemprop="dateModified"><span data-dcnode-id="1256" instrument_node=""> March 30, 2021</span></span></span><span data-dcnode-id="1253" instrument_node=""> / 			</span><span class="comments-link" data-dcnode-id="1248"><span data-dcnode-id="1252" instrument_node="">
</span><a data-dcnode-id="1250" href="#comments"><span data-dcnode-id="1251" instrument_node="">5 Comments</span></a><span data-dcnode-id="1249" instrument_node=""> </span></span><span data-dcnode-id="1247" instrument_node="">

			 / </span><span class="cat-links" data-dcnode-id="1244"><a data-dcnode-id="1245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rabbidaniellapin.com/category/ask-the-rabbi/" rel="category tag"><span data-dcnode-id="1246" instrument_node="">Ask the Rabbi</span></a></span><span data-dcnode-id="1243" instrument_node=""> / By </span><span class="posted-by vcard author" data-dcnode-id="1235" itemprop="author" itemscope="itemscope" itemtype="https://schema.org/Person"><span data-dcnode-id="1242" instrument_node=""> </span><a class="url fn n" data-dcnode-id="1237" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rabbidaniellapin.com/author/rabbi-daniel-and-susan-lapin/" itemprop="url" rel="author" title="View all posts by Rabbi Daniel and Susan Lapin"><span data-dcnode-id="1241" instrument_node="">
</span><span class="author-name" data-dcnode-id="1239" itemprop="name"><span data-dcnode-id="1240" instrument_node="">Rabbi Daniel and Susan Lapin</span></span><span data-dcnode-id="1238" instrument_node="">
</span></a><span data-dcnode-id="1236" instrument_node="">
</span></span><span data-dcnode-id="1234" instrument_node="">
</span></div><span data-dcnode-id="1232" instrument_node=""> </span></div><span data-dcnode-id="1230" instrument_node="">
</span></header><span data-dcnode-id="1227" instrument_node="">
</span><div class="entry-content clear" data-dcnode-id="1018" itemprop="text"><span data-dcnode-id="1226" instrument_node="">
</span><blockquote data-dcnode-id="1201"><span data-dcnode-id="1225" instrument_node="">
</span><p class="p1" data-dcnode-id="1207"><em data-dcnode-id="1208"><span data-dcnode-id="1224" instrument_node="">In the 10 commandments, it says, “Thou shalt not kill.”</span><span class="Apple-converted-space" data-dcnode-id="1222"><span data-dcnode-id="1223" instrument_node="">&nbsp; </span></span><span data-dcnode-id="1221" instrument_node="">So if a police officer shoots a burglar breaking into your home, is God happy or displeased?</span><span class="Apple-converted-space" data-dcnode-id="1219"><span data-dcnode-id="1220" instrument_node="">&nbsp; </span></span><span data-dcnode-id="1218" instrument_node="">What about the military whose job it is to kill people?</span><span class="Apple-converted-space" data-dcnode-id="1216"><span data-dcnode-id="1217" instrument_node="">&nbsp; </span></span><span data-dcnode-id="1215" instrument_node="">Is God happy or angry?</span><span class="Apple-converted-space" data-dcnode-id="1213"><span data-dcnode-id="1214" instrument_node="">&nbsp; </span></span><span data-dcnode-id="1212" instrument_node="">Does it make a difference which army you are in?</span><span class="Apple-converted-space" data-dcnode-id="1210"><span data-dcnode-id="1211" instrument_node="">&nbsp; </span></span><span data-dcnode-id="1209" instrument_node="">Is a German soldier in WW2 treated the same as a soldier in the Israeli army?</span></em></p><span data-dcnode-id="1206" instrument_node="">
</span><p class="p1" data-dcnode-id="1203"><em data-dcnode-id="1204"><span data-dcnode-id="1205" instrument_node="">Peter H.</span></em></p><span data-dcnode-id="1202" instrument_node="">
</span></blockquote><span data-dcnode-id="1200" instrument_node="">
</span><p class="p1" data-dcnode-id="1198"><span data-dcnode-id="1199" instrument_node="">Dear Peter,</span></p><span data-dcnode-id="1197" instrument_node="">
</span><p class="p1" data-dcnode-id="1190"><span data-dcnode-id="1196" instrument_node="">Your question is one that we have received from many people so we are delighted to answer. Actually, though, your question is based on a mistaken premise.</span><span class="Apple-converted-space" data-dcnode-id="1194"><span data-dcnode-id="1195" instrument_node="">&nbsp; </span></span><span data-dcnode-id="1193" instrument_node="">This is because the sixth commandment does not state, “Thou shall not kill.” It says in Hebrew, לא תרצח, for which ‘thou shall not kill’ is a poor translation.</span><span class="Apple-converted-space" data-dcnode-id="1191"><span data-dcnode-id="1192" instrument_node="">&nbsp; &nbsp;</span></span></p><span data-dcnode-id="1189" instrument_node="">
</span><p class="p1" data-dcnode-id="1182"><span data-dcnode-id="1188" instrument_node="">Every legal system differentiates between varied aspects of killing. </span><span class="Apple-converted-space" data-dcnode-id="1186"><span data-dcnode-id="1187" instrument_node="">&nbsp; </span></span><span data-dcnode-id="1185" instrument_node="">These different words for killing carry different connotations and, when appropriate, different legal penalties. There are major differences between execution, killing, murder, manslaughter, assassination, as well as degrees such as 2nd-degree&nbsp;manslaughter. In the Hebrew language and Biblical culture, there are also different ways in which a life can be taken.</span><span class="Apple-converted-space" data-dcnode-id="1183"><span data-dcnode-id="1184" instrument_node="">&nbsp; &nbsp;</span></span></p><span data-dcnode-id="1181" instrument_node="">
</span><p class="p1" data-dcnode-id="1179"><span data-dcnode-id="1180" instrument_node="">God’s law requires that we punish some transgressions with the death penalty handed down and carried out by a legally constituted court. The laws surrounding the court and such a verdict are extremely tightly drawn, but the idea that a person can forfeit his life through certain actions is an important one. War is also part of God’s picture and, once again, while a soldier’s behavior is tightly regulated, killing one’s enemy on the battlefield is a reality.</span></p><span data-dcnode-id="1178" instrument_node="">
</span><p class="p1" data-dcnode-id="1176"><span data-dcnode-id="1177" instrument_node="">When it comes to war, there are extremely complex issues. Is your country asking you to do something in opposition to God’s will? This issue can come up, not only in war but in other ways as well. To our disgrace and dismay, it is not far-fetched to imagine these days that a nurse might be ordered to participate in killing a perfectly viable newborn baby, whether through an action or through neglect. The bottom line is, that while respect for country and civil law is a Biblical value, respect for God’s law trumps that. This isn’t a “do what you want” card; it is a serious commitment of faith for which one is willing to sacrifice one’s own life.</span></p><span data-dcnode-id="1175" instrument_node="">
</span><p class="p1" data-dcnode-id="1173"><span data-dcnode-id="1174" instrument_node="">When it comes to war, once the war itself is moral, there is still behavior within that war that must be followed. However, killing is an inevitable part of war and while we have great admiration for communities like the Quakers who shun violence no matter the cost, ancient Jewish wisdom posits that refusal to use violence will cause more bloodshed and evil in the long term. War and killing are sometimes necessary.</span></p><span data-dcnode-id="1172" instrument_node="">
</span><p class="p1" data-dcnode-id="1170"><span data-dcnode-id="1171" instrument_node="">Similarly, the Bible stresses the need for a safe and stable society and the establishment of law and justice. Police, judges and legislators have an authority that can extend to killing within the parameters of a just legal system. Questions may arise about how the system works but not on whether killing is ever allowed. On that, there is no question.</span></p><span data-dcnode-id="1169" instrument_node="">
</span><p class="p1" data-dcnode-id="1164"><span data-dcnode-id="1168" instrument_node="">You ask about a police officer killing a burglar breaking into your home. It doesn’t have to be a police officer. If you have reason to believe that the burglar might use force against you or your family, you shouldn’t wait for law enforcement to arrive.</span><span class="Apple-converted-space" data-dcnode-id="1166"><span data-dcnode-id="1167" instrument_node="">&nbsp; </span></span><span data-dcnode-id="1165" instrument_node="">We see it as morally correct to prevent the intruder from inflicting bodily harm by whatever means necessary, including killing him.</span></p><span data-dcnode-id="1163" instrument_node="">
</span><p class="p1" data-dcnode-id="1161"><span data-dcnode-id="1162" instrument_node="">A better translation of the sixth commandment would be, “Thou shalt not murder.” (And that is the translation our recommended Bible uses*.) Even so, there is nothing simplistic about this sentence just as there is nothing simplistic about any law or command given in the Five Books of Moses.</span></p><span data-dcnode-id="1160" instrument_node="">
</span><p class="p1" data-dcnode-id="1158"><span data-dcnode-id="1159" instrument_node="">We hope this gives you the beginning of a path to understanding,</span></p><span data-dcnode-id="1157" instrument_node="">
</span><p class="p1" data-dcnode-id="1155"><span data-dcnode-id="1156" instrument_node="">Rabbi Daniel and Susan Lapin</span></p><span data-dcnode-id="1154" instrument_node="">
</span><p class="p1" data-dcnode-id="1152"><span data-dcnode-id="1153" instrument_node="">*In our recommended Bible:</span></p><span data-dcnode-id="1151" instrument_node="">
</span><p class="p1" data-dcnode-id="1130"><span data-dcnode-id="1150" instrument_node="">Page 226, top line, middle two words: </span><span class="s2" data-dcnode-id="1148" style="color: #008000;"><span data-dcnode-id="1149" instrument_node="">Thou</span></span><span data-dcnode-id="1147" instrument_node=""> </span><span class="s3" data-dcnode-id="1143" style="color: #0000ff;"><span data-dcnode-id="1145" style="color: #008000;"><span data-dcnode-id="1146" instrument_node="">Shalt</span></span><span data-dcnode-id="1144" instrument_node=""> Not</span></span><span data-dcnode-id="1142" instrument_node=""> </span><span class="s4" data-dcnode-id="1138" style="color: #ff0000;"><span data-dcnode-id="1141" instrument_node="">Murder </span><span data-dcnode-id="1139" style="color: #000000;"><span data-dcnode-id="1140" instrument_node="">– </span></span></span><span class="s5" data-dcnode-id="1136" style="color: #0000ff;"><span data-dcnode-id="1137" instrument_node="">לא</span></span><span data-dcnode-id="1135" instrument_node=""> </span><span class="s7" data-dcnode-id="1133" style="color: #008000;"><span data-dcnode-id="1134" instrument_node="">ת</span></span><span class="s8" data-dcnode-id="1131" style="color: #ff0000;"><span data-dcnode-id="1132" instrument_node="">רצח </span></span></p><span data-dcnode-id="1129" instrument_node="">

</span><p data-dcnode-id="809"><span data-dcnode-id="810" instrument_node="">An excellent explanation.  Thank you.</span></p><span data-dcnode-id="808" instrument_node="">
</span><p data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">A famous Jewish rabbi once said, “The thief comes ONLY to steal and kill and destroy.”  We often imagine that the thief breaking into a home might be relatively harmless, or even “needy” of your stuff, so maybe we should cut him some slack.  But this is false!  Any human being discovered invading your home becomes instantly and violently defensive and will do almost anything to avoid being captured. In his attempt to escape not even he yet knows the extremes he will go to.  His actions usually result in the destruction of the property, and often physical harm, even death to the victims.  So the words of the rabbi are not a description of the thief’s behavior but rather a pronouncement that a thief is in fact a murderer, and should be perceived and dealt with as such.		</span></p><span data-dcnode-id="805" instrument_node="">
