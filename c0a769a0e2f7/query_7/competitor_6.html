</span><br data-dcnode-id="567"><span data-dcnode-id="566" instrument_node="">
</span></header><span data-dcnode-id="563" instrument_node="">
</span><div class="entry-content" data-dcnode-id="138" itemprop="articleBody"><span data-dcnode-id="562" instrument_node="">
</span><p data-dcnode-id="560"><span data-dcnode-id="561" instrument_node="">The doctrine of mortal sin is a central belief in Roman Catholic theology. It concerns sins that are deemed especially serious and have eternal consequences for baptized members of the Catholic church. Baptists also believe that sin is serious, but do they believe in mortal sin?</span></p><span data-dcnode-id="559" instrument_node="">
</span><p data-dcnode-id="556"><strong data-dcnode-id="557"><span data-dcnode-id="558" instrument_node="">Baptists don’t believe in mortal sin, as the Catholic church defines the doctrine. Baptists don’t use the terms “mortal” and venial” or categorize sin in such ways. However, Baptists have a robust understanding of sin that is based on the Bible, including its nature, expressions, and consequences.</span></strong></p><span data-dcnode-id="555" instrument_node="">
</span><p data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">How exactly does Catholic theology define mortal and venial sin and why don’t Baptists hold to these? Keep reading to learn the answers to these questions and more.</span></p><span data-dcnode-id="552" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="547"><figure class="aligncenter size-large" data-dcnode-id="548"><img alt="" class="wp-image-2075" data-dcnode-id="551" height="475" sizes="(max-width: 765px) 100vw, 765px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christianityfaq.com/wp-content/uploads/2021/01/bible-pulpit.jpg&amp;raw" srcset="https://christianityfaq.com/wp-content/uploads/2021/01/bible-pulpit.jpg 765w, https://christianityfaq.com/wp-content/uploads/2021/01/bible-pulpit-300x186.jpg 300w" width="765"><figcaption data-dcnode-id="549"><span data-dcnode-id="550" instrument_node="">Mortal sin is the most egregious form of rebellion against God in Catholic theology</span></figcaption></figure></div><span data-dcnode-id="546" instrument_node="">
</span><h2 data-dcnode-id="544"><span data-dcnode-id="545" instrument_node="">What is mortal sin and venial sin in Catholic theology?</span></h2><span data-dcnode-id="543" instrument_node="">
</span><p data-dcnode-id="541"><span data-dcnode-id="542" instrument_node="">In Catholic theology, sins are categorized in two ways: mortal sins and venial sins. Although Catholics believe that all sin is rebellion against God, mortal sins have more serious consequences. </span></p><span data-dcnode-id="540" instrument_node="">
</span><figure class="wp-block-table" data-dcnode-id="474"><table data-dcnode-id="475"><thead data-dcnode-id="533"><tr data-dcnode-id="534"><th data-dcnode-id="539"></th><th data-dcnode-id="537"><span data-dcnode-id="538" instrument_node="">Mortal sin</span></th><th data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">Venial sin</span></th></tr></thead><tbody data-dcnode-id="476"><tr data-dcnode-id="525"><td data-dcnode-id="530"><strong data-dcnode-id="531"><span data-dcnode-id="532" instrument_node="">Seriousness</span></strong></td><td data-dcnode-id="528"><span data-dcnode-id="529" instrument_node="">Most serious</span></td><td data-dcnode-id="526"><span data-dcnode-id="527" instrument_node="">Very serious</span></td></tr><tr data-dcnode-id="517"><td data-dcnode-id="522"><strong data-dcnode-id="523"><span data-dcnode-id="524" instrument_node="">Awareness</span></strong></td><td data-dcnode-id="520"><span data-dcnode-id="521" instrument_node="">the sinner is aware their choice is sinful; they are not ignorant that the choice is wrong when committing the act</span></td><td data-dcnode-id="518"><span data-dcnode-id="519" instrument_node="">the sinner may not be aware their choice was sinful; they may be ignorant, but the offense is less egregious</span></td></tr><tr data-dcnode-id="509"><td data-dcnode-id="514"><strong data-dcnode-id="515"><span data-dcnode-id="516" instrument_node="">Consent</span></strong></td><td data-dcnode-id="512"><span data-dcnode-id="513" instrument_node="">the sinner isn’t forced to make the sinful choice, but acts on their own accord using their free will</span></td><td data-dcnode-id="510"><span data-dcnode-id="511" instrument_node="">the sinner may or may not have consented, but the matter is less grave in nature</span></td></tr><tr data-dcnode-id="501"><td data-dcnode-id="506"><strong data-dcnode-id="507"><span data-dcnode-id="508" instrument_node="">Love</span></strong></td><td data-dcnode-id="504"><span data-dcnode-id="505" instrument_node="">mortal sins destroy it</span></td><td data-dcnode-id="502"><span data-dcnode-id="503" instrument_node="">venial sins wound it</span></td></tr><tr data-dcnode-id="493"><td data-dcnode-id="498"><strong data-dcnode-id="499"><span data-dcnode-id="500" instrument_node="">Grace</span></strong></td><td data-dcnode-id="496"><span data-dcnode-id="497" instrument_node="">mortal sin renders it lost</span></td><td data-dcnode-id="494"><span data-dcnode-id="495" instrument_node="">venial sins render it changed, but not lost</span></td></tr><tr data-dcnode-id="485"><td data-dcnode-id="490"><strong data-dcnode-id="491"><span data-dcnode-id="492" instrument_node="">Punishment</span></strong></td><td data-dcnode-id="488"><span data-dcnode-id="489" instrument_node="">If not redeemed, the consequence of mortal sin is eternal death (see more about penance below)</span></td><td data-dcnode-id="486"><span data-dcnode-id="487" instrument_node="">venial sins require purgatory (see more about confession and repentance below)</span></td></tr><tr data-dcnode-id="477"><td data-dcnode-id="482"><strong data-dcnode-id="483"><span data-dcnode-id="484" instrument_node="">Penance</span></strong></td><td data-dcnode-id="480"><span data-dcnode-id="481" instrument_node="">The sacrament of penance is necessary for forgiveness</span></td><td data-dcnode-id="478"><span data-dcnode-id="479" instrument_node="">Confession and repentance are sufficient; the sacrament of penance isn’t necessary</span></td></tr></tbody></table></figure><span data-dcnode-id="473" instrument_node="">
</span><p data-dcnode-id="466"><strong data-dcnode-id="471"><span data-dcnode-id="472" instrument_node="">Baptists don’t subscribe to these categories</span></strong><span data-dcnode-id="470" instrument_node=""> because they don’t see sin described in these ways in the Bible. </span><strong data-dcnode-id="468"><span data-dcnode-id="469" instrument_node="">Mortal and venial sins are descriptions that come from Catholic history and theology</span></strong><span data-dcnode-id="467" instrument_node="">, according to Baptist thinking, and reflect tradition more than Scripture.</span></p><span data-dcnode-id="465" instrument_node="">
</span><p data-dcnode-id="460"><span data-dcnode-id="464" instrument_node="">However, Catholics and Baptist have some overlapping beliefs about sin and those will be described in more detail below. (Also see </span><a data-dcnode-id="462" data-id="2225" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christianityfaq.com/baptists-original-sin/"><span data-dcnode-id="463" instrument_node="">Do Baptists Believe in Original Sin?</span></a><span data-dcnode-id="461" instrument_node=""> to learn more.)</span></p><span data-dcnode-id="459" instrument_node="">
</span><p class="has-background" data-dcnode-id="454" style="background-color:#fffccb"><span data-dcnode-id="458" instrument_node="">Something a lot of people wonder about Christianity is </span><a data-dcnode-id="456" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christianityfaq.com/christian-denominations-go-to-heaven/"><span data-dcnode-id="457" instrument_node="">Do All Denominations Go to Heaven?</span></a><span data-dcnode-id="455" instrument_node=""> Follow the link to learn the answer to this important question.</span></p><span data-dcnode-id="453" instrument_node="">
</span><h2 data-dcnode-id="451"><span data-dcnode-id="452" instrument_node="">Mortal sin: three conditions</span></h2><span data-dcnode-id="450" instrument_node="">
</span><p data-dcnode-id="448"><span data-dcnode-id="449" instrument_node="">In order for a sin to be categorized as mortal, three qualifications must be met [1]:</span></p><span data-dcnode-id="447" instrument_node="">
</span><p data-dcnode-id="444"><strong data-dcnode-id="445"><span data-dcnode-id="446" instrument_node="">The sin must be of grave matter:</span></strong></p><span data-dcnode-id="443" instrument_node="">
</span><ul data-dcnode-id="425"><li data-dcnode-id="438"><span data-dcnode-id="442" instrument_node="">All sin is serious, according to Catholic theology. Mortal sins are the </span><strong data-dcnode-id="440"><span data-dcnode-id="441" instrument_node="">most serious</span></strong><span data-dcnode-id="439" instrument_node="">, but venial sins are still very serious.</span></li><li data-dcnode-id="433"><span data-dcnode-id="437" instrument_node="">Often the gravity of a sin is defined using </span><strong data-dcnode-id="435"><span data-dcnode-id="436" instrument_node="">the 10 Commandments</span></strong><span data-dcnode-id="434" instrument_node="">. If a sin was a clear violation of the 10 Commandments and met the other criteria below, it is considered mortal.</span></li><li data-dcnode-id="426"><a data-dcnode-id="431" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christianityfaq.com/baptists-original-sin/"><span data-dcnode-id="432" instrument_node="">Baptists believe sin</span></a><span data-dcnode-id="430" instrument_node=""> is always serious because it’s nature is </span><strong data-dcnode-id="428"><span data-dcnode-id="429" instrument_node="">rebellion against God</span></strong><span data-dcnode-id="427" instrument_node="">. In fact, sin is so serious that it can lead to eternal death and separation from God (Rom. 6:23).</span></li></ul><span data-dcnode-id="424" instrument_node="">
</span><p data-dcnode-id="421"><strong data-dcnode-id="422"><span data-dcnode-id="423" instrument_node="">The sinner must have full knowledge of the sin: </span></strong></p><span data-dcnode-id="420" instrument_node="">
</span><ul data-dcnode-id="411"><li data-dcnode-id="412"><span data-dcnode-id="419" instrument_node="">The sinner must be aware that the act they are committing, or the words they are speaking, are sinful and against God’s will. Therefore, people who may not meet the criteria include </span><strong data-dcnode-id="417"><span data-dcnode-id="418" instrument_node="">young children</span></strong><span data-dcnode-id="416" instrument_node=""> and the mentally challenged. (Also see </span><a data-dcnode-id="414" data-id="2293" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christianityfaq.com/baptist-baptism-saved/"><span data-dcnode-id="415" instrument_node="">Do Baptists Believe Baptism Is Necessary for Salvation?</span></a><span data-dcnode-id="413" instrument_node="">)</span></li></ul><span data-dcnode-id="410" instrument_node="">
</span><ul data-dcnode-id="405"><li data-dcnode-id="406"><strong data-dcnode-id="408"><span data-dcnode-id="409" instrument_node="">Baptists believe</span></strong><span data-dcnode-id="407" instrument_node=""> that willful disobedience all sin is especially egregious, no matter who is committing it. Like some Catholics, some Baptists hold to the Age of Accountability, which is a belief that God doesn’t hold the mentally underdeveloped to the same standard as other people.</span></li></ul><span data-dcnode-id="404" instrument_node="">
</span><p data-dcnode-id="400"><strong data-dcnode-id="402"><span data-dcnode-id="403" instrument_node="">The sinner must deliberately consent to the sin:</span></strong><span data-dcnode-id="401" instrument_node=""> </span></p><span data-dcnode-id="399" instrument_node="">
</span><ul data-dcnode-id="396"><li data-dcnode-id="397"><span data-dcnode-id="398" instrument_node="">Being forced to participate in a sinful act doesn’t imply guilt. In order to be a mortal sin, an individual must willfully agree to take part in the rebellious act.</span></li></ul><span data-dcnode-id="395" instrument_node="">
</span><ul data-dcnode-id="390"><li data-dcnode-id="391"><strong data-dcnode-id="393"><span data-dcnode-id="394" instrument_node="">Baptist believe</span></strong><span data-dcnode-id="392" instrument_node=""> that those are forced to commit a sinful act (e.g. rape) aren’t guilty of sin (e.g. fornication or adultery).</span></li></ul><span data-dcnode-id="389" instrument_node="">
</span><p data-dcnode-id="382"><strong data-dcnode-id="387"><span data-dcnode-id="388" instrument_node="">What if just one of the three criteria aren’t met?</span></strong><span data-dcnode-id="386" instrument_node=""> If any of the criteria aren’t met, the sin is considered a venial sin, which is still “very serious,” but not “gravely” serious. Some venial sins have the potential to become mortal sins if at some point all the criteria are met. (Also see </span><a data-dcnode-id="384" data-id="23" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christianityfaq.com/lutherans-baptists-comparison/"><span data-dcnode-id="385" instrument_node="">Baptist vs Lutheran: Comparison</span></a><span data-dcnode-id="383" instrument_node="">)</span></p><span data-dcnode-id="381" instrument_node="">
</span><p data-dcnode-id="377"><strong data-dcnode-id="379"><span data-dcnode-id="380" instrument_node="">How is a Catholic forgiven of a mortal sin? </span></strong><span data-dcnode-id="378" instrument_node="">This is a critical question for Catholics because if one dies in a state of having mortal sin not forgiven they have no chance of redemption and heaven. A mortal sin is dealt with through the sacrament of penance [2], which involves the following elements:</span></p><span data-dcnode-id="376" instrument_node="">
</span><p data-dcnode-id="373"><strong data-dcnode-id="374"><span data-dcnode-id="375" instrument_node="">Contrition:</span></strong></p><span data-dcnode-id="372" instrument_node="">
</span><ul data-dcnode-id="363"><li data-dcnode-id="364"><span data-dcnode-id="371" instrument_node="">This aspect of </span><strong data-dcnode-id="369"><span data-dcnode-id="370" instrument_node="">penance</span></strong><span data-dcnode-id="368" instrument_node=""> involves feeling genuine remorse over the sin committed. If the sinner reflects </span><strong data-dcnode-id="366"><span data-dcnode-id="367" instrument_node="">sorrow</span></strong><span data-dcnode-id="365" instrument_node=""> over merely getting caught or makes a multitude of excuses for their ungodly choices, it may be a sign their contrition is disingenuous.</span></li></ul><span data-dcnode-id="362" instrument_node="">
</span><ul data-dcnode-id="354"><li data-dcnode-id="355"><strong data-dcnode-id="360"><span data-dcnode-id="361" instrument_node="">Baptists believe</span></strong><span data-dcnode-id="359" instrument_node=""> that contrition is important when confessing sin. “Going through the motions” of confession is a sign of a still-rebellious heart, like in Catholic thinking. (Also see </span><a data-dcnode-id="357" data-id="2210" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christianityfaq.com/why-dont-baptists-have-crucifixes/"><span data-dcnode-id="358" instrument_node="">Why Don’t Baptists Have Crucifixes?</span></a><span data-dcnode-id="356" instrument_node="">)</span></li></ul><span data-dcnode-id="353" instrument_node="">
</span><p data-dcnode-id="350"><strong data-dcnode-id="351"><span data-dcnode-id="352" instrument_node="">Confession:</span></strong></p><span data-dcnode-id="349" instrument_node="">
</span><ul data-dcnode-id="337"><li data-dcnode-id="338"><span data-dcnode-id="348" instrument_node="">The ministry of a </span><strong data-dcnode-id="346"><span data-dcnode-id="347" instrument_node="">priest</span></strong><span data-dcnode-id="345" instrument_node=""> is an important aspect of </span><strong data-dcnode-id="343"><span data-dcnode-id="344" instrument_node="">penance</span></strong><span data-dcnode-id="342" instrument_node="">. A sinner must communicate their wrongdoing to a priest and ask for his forgiveness as a representative of God. The priest listens to the confession and provides instructions for the next step, satisfaction. (Also see </span><a data-dcnode-id="340" data-id="2437" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christianityfaq.com/baptists-believe-drinking-alcohol/"><span data-dcnode-id="341" instrument_node="">Here’s What Baptists Believe About Drinking Alcohol</span></a><span data-dcnode-id="339" instrument_node="">)</span></li></ul><span data-dcnode-id="336" instrument_node="">
</span><ul data-dcnode-id="328"><li data-dcnode-id="329"><strong data-dcnode-id="334"><span data-dcnode-id="335" instrument_node="">Baptists believe</span></strong><span data-dcnode-id="333" instrument_node=""> that a person should confess their sin to God because God is the one that was rebelled against and this is possible because Jesus Christ is the mediator between God and people, not a priest. Baptists sometimes discuss their sin with a </span><strong data-dcnode-id="331"><span data-dcnode-id="332" instrument_node="">pastor</span></strong><span data-dcnode-id="330" instrument_node="">, minister, or a trusted Christian friend, but that doesn’t replace confession to God.</span></li></ul><span data-dcnode-id="327" instrument_node="">
</span><p data-dcnode-id="324"><strong data-dcnode-id="325"><span data-dcnode-id="326" instrument_node="">Satisfaction:</span></strong></p><span data-dcnode-id="323" instrument_node="">
</span><ul data-dcnode-id="317"><li data-dcnode-id="318"><span data-dcnode-id="322" instrument_node="">This aspect of penance involves sinners making amends for what the wrongdoing and the hurt they caused. Satisfaction often includes spiritual activity like prayer. It also includes practical acts like returning stolen property or paying restitution, for example. (Also see </span><a data-dcnode-id="320" data-id="2427" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christianityfaq.com/baptist-believe-holy-spirit/"><span data-dcnode-id="321" instrument_node="">Do Baptists believe in the Holy Spirit?</span></a><span data-dcnode-id="319" instrument_node="">)</span></li></ul><span data-dcnode-id="316" instrument_node="">
</span><ul data-dcnode-id="308"><li data-dcnode-id="309"><strong data-dcnode-id="314"><span data-dcnode-id="315" instrument_node="">Baptists believe</span></strong><span data-dcnode-id="313" instrument_node=""> making amends is an important aspect of showing contrition for wrongdoing, though it isn’t necessary that a priest prescribe it. This may include simply asking for forgiveness for saying hurtful words or suffering jail time in accordance with the law. (Also see </span><a data-dcnode-id="311" data-id="2057" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christianityfaq.com/baptists-believe-trinity/"><span data-dcnode-id="312" instrument_node="">Do Baptists Believe in the Trinity?</span></a><span data-dcnode-id="310" instrument_node="">)</span></li></ul><span data-dcnode-id="307" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="302"><figure class="aligncenter size-large" data-dcnode-id="303"><img alt="" class="wp-image-2076" data-dcnode-id="306" height="475" loading="lazy" sizes="(max-width: 765px) 100vw, 765px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christianityfaq.com/wp-content/uploads/2021/01/genesis-chapter-three.jpg&amp;raw" srcset="https://christianityfaq.com/wp-content/uploads/2021/01/genesis-chapter-three.jpg 765w, https://christianityfaq.com/wp-content/uploads/2021/01/genesis-chapter-three-300x186.jpg 300w" width="765"><figcaption data-dcnode-id="304"><span data-dcnode-id="305" instrument_node="">Baptist believe all people are born sinners and separate from God</span></figcaption></figure></div><span data-dcnode-id="301" instrument_node="">
</span><h2 data-dcnode-id="299"><span data-dcnode-id="300" instrument_node="">What do Baptists believe about sin?</span></h2><span data-dcnode-id="298" instrument_node="">
</span><p data-dcnode-id="290"><span data-dcnode-id="297" instrument_node="">Although the Baptist tradition has different beliefs about sin than Catholicism, it has historically articulated </span><strong data-dcnode-id="295"><span data-dcnode-id="296" instrument_node="">strong stances</span></strong><span data-dcnode-id="294" instrument_node=""> on the subject. Some progressive Baptist churches are defining sin and its expressions, but many are holding to the traditional biblical teachings of the denomination. (Also see </span><a data-dcnode-id="292" data-id="2229" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christianityfaq.com/baptists-saints/"><span data-dcnode-id="293" instrument_node="">Do Baptists Believe in the Saints?</span></a><span data-dcnode-id="291" instrument_node="">)</span></p><span data-dcnode-id="289" instrument_node="">
</span><p data-dcnode-id="284"><span data-dcnode-id="288" instrument_node="">Baptist beliefs about sin come directly from the </span><strong data-dcnode-id="286"><span data-dcnode-id="287" instrument_node="">Bible</span></strong><span data-dcnode-id="285" instrument_node=""> and the intention of their orthodox theologians is to neither minimize, or add to, what it says.</span></p><span data-dcnode-id="283" instrument_node="">
</span><p data-dcnode-id="279"><strong data-dcnode-id="281"><span data-dcnode-id="282" instrument_node="">What is sin? </span></strong><span data-dcnode-id="280" instrument_node="">One Baptist theologian defines it this way:</span></p><span data-dcnode-id="278" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="270"><p data-dcnode-id="276"><span data-dcnode-id="277" instrument_node="">“Sin is any failure to conform to the moral law of God in act, attitude, or nature.”</span></p><cite data-dcnode-id="271"><span data-dcnode-id="275" instrument_node="">Wayne Grudem, </span><em data-dcnode-id="273"><span data-dcnode-id="274" instrument_node="">Systematic Theology</span></em><span data-dcnode-id="272" instrument_node="">, p. 490</span></cite></blockquote><span data-dcnode-id="269" instrument_node="">
</span><p data-dcnode-id="265"><strong data-dcnode-id="267"><span data-dcnode-id="268" instrument_node="">What is original sin? </span></strong><span data-dcnode-id="266" instrument_node="">Baptists believe that all people are born sinful and as a result are separated from God. All people — no matter their race, gender, social status, or their parents or grandparents Christian beliefs — inherit a sinful nature from Adam and Eve. Psalm 51:5 reflects this: “Surely I was sinful at birth, sinful from the my mother conceived.”</span></p><span data-dcnode-id="264" instrument_node="">
</span><p data-dcnode-id="260"><strong data-dcnode-id="262"><span data-dcnode-id="263" instrument_node="">The unforgivable sin:</span></strong><span data-dcnode-id="261" instrument_node=""> Jesus mentions the unforgivable sin in Matthew, Mark, and Luke (Matthew 12:31-32, Mark 3:28-29, and Luke 12:10).</span></p><span data-dcnode-id="259" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="253"><p data-dcnode-id="254"><span data-dcnode-id="258" instrument_node="">“And so I tell you, every kind of sin and slander can be forgiven, but blasphemy against the Spirit will not be forgiven. 32</span><sup data-dcnode-id="256"><span data-dcnode-id="257" instrument_node="">&nbsp;</span></sup><span data-dcnode-id="255" instrument_node="">Anyone who speaks a word against the Son of Man will be forgiven, but anyone who speaks against the Holy Spirit will not be forgiven, either in this age&nbsp;or in the age to come.” (Matthew 12:31-32)</span></p></blockquote><span data-dcnode-id="252" instrument_node="">
</span><p data-dcnode-id="250"><span data-dcnode-id="251" instrument_node="">Baptist aren’t in agreement about what the nature of “the unforgivable sin” is. There are two common views:</span></p><span data-dcnode-id="249" instrument_node="">
</span><p data-dcnode-id="242"><strong data-dcnode-id="247"><span data-dcnode-id="248" instrument_node="">View #1:</span></strong><span data-dcnode-id="246" instrument_node=""> Some Baptists believe the unforgivable sin is blasphemy against the </span><a data-dcnode-id="244" data-id="2427" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christianityfaq.com/baptist-believe-holy-spirit/"><span data-dcnode-id="245" instrument_node="">Holy Spirit</span></a><span data-dcnode-id="243" instrument_node=""> such as when a person credits a miracle to Satan that is actually done in the power of the Holy Spirit. Paired with this view is the belief that miracles and spiritual gifts such as speaking in tongues existed only during the time of Jesus and the early church. Thus, it is no longer possible for someone to blaspheme against the Holy Spirit.</span></p><span data-dcnode-id="241" instrument_node="">
</span><p data-dcnode-id="234"><strong data-dcnode-id="239"><span data-dcnode-id="240" instrument_node="">View #2: </span></strong><span data-dcnode-id="238" instrument_node="">The other way some Baptists view these verses is to say that blaspheming against the Holy Spirit is ignoring the truth that the Holy Spirit reveals about Jesus Christ. People who hold this view believe that the only sin that cannot be forgiven is to not believe in Jesus at all. [3] (Also see </span><a data-dcnode-id="236" data-id="2432" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christianityfaq.com/baptist-marry-catholic/"><span data-dcnode-id="237" instrument_node="">Can a Baptist Marry a Catholic?</span></a><span data-dcnode-id="235" instrument_node="">)</span></p><span data-dcnode-id="233" instrument_node="">
</span><p data-dcnode-id="226"><strong data-dcnode-id="231"><span data-dcnode-id="232" instrument_node="">Neither of these views are close to the Catholic idea of a mortal sin</span></strong><span data-dcnode-id="230" instrument_node="">, which refers to sins such as murder or adultery that could prevent a Christian from entering heaven after initially trusting in Jesus for their salvation. (Also see </span><a data-dcnode-id="228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christianityfaq.com/what-baptists-believe-about-salvation/"><span data-dcnode-id="229" instrument_node="">This Is What Baptists Believe About Salvation</span></a><span data-dcnode-id="227" instrument_node="">)</span></p><span data-dcnode-id="225" instrument_node="">
</span><h2 data-dcnode-id="223"><span data-dcnode-id="224" instrument_node="">Do Baptist believe in repentance?</span></h2><span data-dcnode-id="222" instrument_node="">
</span><p data-dcnode-id="217"><span data-dcnode-id="221" instrument_node="">Baptists believe in repentance in terms of turning from sin at the time of </span><strong data-dcnode-id="219"><span data-dcnode-id="220" instrument_node="">conversion</span></strong><span data-dcnode-id="218" instrument_node=""> and as an important ongoing discipline throughout a believer’s life.</span></p><span data-dcnode-id="216" instrument_node="">
</span><p data-dcnode-id="208"><span data-dcnode-id="215" instrument_node="">The </span><a data-dcnode-id="213" data-id="2225" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christianityfaq.com/baptists-original-sin/"><span data-dcnode-id="214" instrument_node="">doctrine of original sin</span></a><span data-dcnode-id="212" instrument_node=""> means that before someone </span><strong data-dcnode-id="210"><span data-dcnode-id="211" instrument_node="">becomes a Christian</span></strong><span data-dcnode-id="209" instrument_node=""> they are both predisposed towards evil and under God’s condemnation. </span></p><span data-dcnode-id="207" instrument_node="">
</span><p data-dcnode-id="199"><span data-dcnode-id="206" instrument_node="">Because of this, Baptists believe that a conversion to </span><strong data-dcnode-id="204"><span data-dcnode-id="205" instrument_node="">faith</span></strong><span data-dcnode-id="203" instrument_node=""> includes not only a turning towards Jesus but also a turning away from sin. This change in orientation is only accomplished throughout believing in the saving death of Jesus Christ. (Also see </span><a data-dcnode-id="201" data-id="27" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christianityfaq.com/baptist-godparent/"><span data-dcnode-id="202" instrument_node="">Can a Baptists Be a Godparent?</span></a><span data-dcnode-id="200" instrument_node="">)</span></p><span data-dcnode-id="198" instrument_node="">
</span><p data-dcnode-id="193"><span data-dcnode-id="197" instrument_node="">Additionally, Baptists believe that repentance should also be an ongoing process in a believer’s life. However, unlike Catholics, this repentance is not a return to salvation, it is process that occurs when a Christian discovers that he or she is not living according to the standard of what the Bible teaches. (Also see </span><a data-dcnode-id="195" data-id="2544" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christianityfaq.com/do-baptists-dance/"><span data-dcnode-id="196" instrument_node="">Can Baptists Dance?</span></a><span data-dcnode-id="194" instrument_node="">)</span></p><span data-dcnode-id="192" instrument_node="">
</span><p data-dcnode-id="177"><strong data-dcnode-id="189"><span data-dcnode-id="191" instrument_node="">References:</span><br data-dcnode-id="190"></strong><span data-dcnode-id="188" instrument_node="">[1] </span><a data-dcnode-id="186" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stmaryofthesevendolors.com/prayers-2/list-of-mortal-sins-every-catholic-should-know/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="187" instrument_node="">Source</span></a><br data-dcnode-id="185"><span data-dcnode-id="184" instrument_node="">[2] </span><a data-dcnode-id="182" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ewtn.com/catholicism/library/justification-in-catholic-teaching-1063" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="183" instrument_node="">Source</span></a><br data-dcnode-id="181"><span data-dcnode-id="180" instrument_node="">[3] </span><a data-dcnode-id="178" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thegospelcoalition.org/essay/the-unpardonable-sin/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="179" instrument_node="">Source</span></a></p><span data-dcnode-id="176" instrument_node="">
