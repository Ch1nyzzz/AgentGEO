</span><p data-dcnode-id="774"><span data-dcnode-id="775" instrument_node="">Gluttony is very rarely a mortal sin. Gluttony is in general a venial sin in so far forth as it is an undue indulgence in a thing which is in itself neither good nor bad. … Such a one would be guilty of mortal sin.</span></p><div class="code-block code-block-3" data-dcnode-id="772" style="margin: 8px 0; clear: both;"><span data-dcnode-id="773" instrument_node="">

</span><p data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">They join the long-standing evils of lust, gluttony, avarice, sloth, anger, envy and pride as mortal sins – the gravest kind, which threaten the soul with eternal damnation unless absolved before death through confession or penitence.</span></p><div class="code-block code-block-3" data-dcnode-id="757" style="margin: 8px 0; clear: both;"><span data-dcnode-id="765" instrument_node="">

</span><p data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">Proverbs 13:25 says a righteous man eats until his heart’s content or eats enough to satisfy his appetite. God’s desire is not for us to just eat enough to curb our appetite. He wants us to eat until our heart’s content, until our bellies are satisfied and full.</span></p><div class="code-block code-block-3" data-dcnode-id="749" style="margin: 8px 0; clear: both;"><span data-dcnode-id="750" instrument_node="">

</span><p data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">Gluttony is defined as intemperate eating. The Catholic Church considers it the fifth of the seven cardinal sins. … The pleasures of eating were safe within the bounds of codified, convivial meals.</span></p><div class="code-block code-block-3" data-dcnode-id="717" style="margin: 8px 0; clear: both;"><span data-dcnode-id="718" instrument_node="">

</span><p data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">Gluttony is overindulgence – eating, drinking, and consuming various goods in excess. Overweight is often associated with gluttony, but you can be overweight and not be a glutton, or alternatively you can be a thin glutton that happens to have a fast metabolism. Eating dessert is fine, so long as you don’t overdo it.</span></p><div class="code-block code-block-3" data-dcnode-id="709" style="margin: 8px 0; clear: both;"><span data-dcnode-id="710" instrument_node="">

</span><h2 data-dcnode-id="664" id="what-are-the-3-unforgivable-sins"><span data-dcnode-id="665" instrument_node="">What are the 3 unforgivable sins?</span></h2><span data-dcnode-id="663" instrument_node="">
</span><p data-dcnode-id="661"><span data-dcnode-id="662" instrument_node="">I believe that God can forgive all sins provided the sinner is truly contrite and has repented for his or her offenses. Here’s my list of unforgivable sins: ÇMurder, torture and abuse of any human being, but particularly the murder, torture and abuse of children and animals.</span></p><div class="code-block code-block-3" data-dcnode-id="659" style="margin: 8px 0; clear: both;"><span data-dcnode-id="660" instrument_node="">

</span><div data-dcnode-id="649" style="text-align:center;"><div class="rll-youtube-player" data-dcnode-id="652" data-id="UFBsnr5K7co" data-query="" data-src="https://www.youtube.com/embed/UFBsnr5K7co"><div data-dcnode-id="653" data-id="UFBsnr5K7co" data-query="" data-src="https://www.youtube.com/embed/UFBsnr5K7co"><img alt="" class="lazyloaded" data-dcnode-id="657" data-ll-status="loaded" height="360" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.ytimg.com/vi/UFBsnr5K7co/hqdefault.jpg&amp;raw" width="480"><noscript data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">&lt;img src="https://i.ytimg.com/vi/ID/hqdefault.jpg" alt="" width="480" height="360"&gt;</span></noscript><div class="play" data-dcnode-id="654"></div></div></div><noscript data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">&lt;iframe width="560" height="315" src="https://www.youtube.com/embed/UFBsnr5K7co" frameborder="0" allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture" allowfullscreen&gt;&lt;/iframe&gt;</span></noscript></div><span data-dcnode-id="648" instrument_node="">
</span><h2 data-dcnode-id="646" id="what-are-the-3-mortal-sins"><span data-dcnode-id="647" instrument_node="">What are the 3 mortal sins?</span></h2><span data-dcnode-id="645" instrument_node="">
</span><p data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">Three conditions are necessary for mortal sin to exist:</span></p><span data-dcnode-id="642" instrument_node="">
</span><ul data-dcnode-id="631"><span data-dcnode-id="641" instrument_node="">
</span><li data-dcnode-id="639"><span data-dcnode-id="640" instrument_node="">Grave Matter: The act itself is intrinsically evil and immoral. … </span></li><span data-dcnode-id="638" instrument_node="">
</span><li data-dcnode-id="636"><span data-dcnode-id="637" instrument_node="">Full Knowledge: The person must know that what they’re doing or planning to do is evil and immoral. … </span></li><span data-dcnode-id="635" instrument_node="">
</span><li data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">Deliberate Consent: The person must freely choose to commit the act or plan to do it.</span></li><span data-dcnode-id="632" instrument_node="">
</span></ul><div class="code-block code-block-3" data-dcnode-id="629" style="margin: 8px 0; clear: both;"><span data-dcnode-id="630" instrument_node="">
</span></div><span data-dcnode-id="628" instrument_node="">
</span><div data-dcnode-id="614" style="clear:both; margin-top:0em; margin-bottom:1em;"><a class="u7b7583db3099ec22479662a342b0e5ef" data-dcnode-id="615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//religionandcivilsociety.com/bible/what-sin-did-jericho-commit.html" rel="nofollow" target="_self"><div class="centered-text-area" data-dcnode-id="617"><div class="centered-text" data-dcnode-id="618" style="float: left;"><div class="u7b7583db3099ec22479662a342b0e5ef-content" data-dcnode-id="619"><span class="ctaText" data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">IT IS INTERESTING:</span></span><span data-dcnode-id="622" instrument_node="">&nbsp; </span><span class="postTitle" data-dcnode-id="620"><span data-dcnode-id="621" instrument_node="">What sin did Jericho commit?</span></span></div></div></div><div class="ctaButton" data-dcnode-id="616"></div></a></div><h2 data-dcnode-id="612" id="what-sin-can-god-not-forgive"><span data-dcnode-id="613" instrument_node="">What sin can God not forgive?</span></h2><span data-dcnode-id="611" instrument_node="">
</span><p data-dcnode-id="609"><span data-dcnode-id="610" instrument_node="">New Testament passages</span></p><span data-dcnode-id="608" instrument_node="">
</span><p data-dcnode-id="606"><span data-dcnode-id="607" instrument_node=""> And so I tell you, any sin and blasphemy can be forgiven. But blasphemy against the Spirit will not be forgiven. Anyone who speaks a word against the Son of Man will be forgiven, but anyone who speaks against the Holy Spirit will not be forgiven, either in this age or in the age to come.”</span></p><div class="code-block code-block-3" data-dcnode-id="604" style="margin: 8px 0; clear: both;"><span data-dcnode-id="605" instrument_node="">
</span></div><span data-dcnode-id="603" instrument_node="">
</span><h2 data-dcnode-id="601" id="is-being-lazy-a-sin"><span data-dcnode-id="602" instrument_node="">Is being lazy a sin?</span></h2><span data-dcnode-id="600" instrument_node="">
</span><p data-dcnode-id="598"><span data-dcnode-id="599" instrument_node="">It is a sin to be lazy. Laziness causes people to stop growing. Being lazy is refusing to obey God and refusing to do everything for His glory. It causes people to miss out on relying on the Holy Spirit for rest even in the hardest and craziest of times.</span></p><div class="code-block code-block-3" data-dcnode-id="589" style="margin: 8px 0; clear: both;"><span data-dcnode-id="597" instrument_node="">
</span><span data-dcnode-id="595" instrument_node="">
</span><div data-dcnode-id="591" style="margin: 50px 0px 40px; clear: both;"><span data-dcnode-id="594" instrument_node="">
</span><div class="cnt32_rl_bg_str" data-dcnode-id="593" data-id="251591" data-state="fetching" data-time-fetch="1008.3950000007462" id="cnt_rb_251591"></div><span data-dcnode-id="592" instrument_node="">
</span></div><span data-dcnode-id="590" instrument_node="">
</span></div><span data-dcnode-id="588" instrument_node="">
</span><h2 data-dcnode-id="586" id="what-are-the-7-sins-in-the-bible"><span data-dcnode-id="587" instrument_node="">What are the 7 sins in the Bible?</span></h2><span data-dcnode-id="585" instrument_node="">
</span><p data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">According to the standard list, they are pride, greed, wrath, envy, lust, gluttony and sloth, which are contrary to the seven heavenly virtues.</span></p><div class="code-block code-block-3" data-dcnode-id="581" style="margin: 8px 0; clear: both;"><span data-dcnode-id="582" instrument_node="">
</span></div><span data-dcnode-id="580" instrument_node="">
</span><div data-dcnode-id="571" style="text-align:center;"><div class="rll-youtube-player" data-dcnode-id="574" data-id="WJh8buobbVM" data-query="" data-src="https://www.youtube.com/embed/WJh8buobbVM"><div data-dcnode-id="575" data-id="WJh8buobbVM" data-query="" data-src="https://www.youtube.com/embed/WJh8buobbVM"><img alt="" class="lazyloaded" data-dcnode-id="579" data-ll-status="loaded" height="360" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.ytimg.com/vi/WJh8buobbVM/hqdefault.jpg&amp;raw" width="480"><noscript data-dcnode-id="577"><span data-dcnode-id="578" instrument_node="">&lt;img src="https://i.ytimg.com/vi/ID/hqdefault.jpg" alt="" width="480" height="360"&gt;</span></noscript><div class="play" data-dcnode-id="576"></div></div></div><noscript data-dcnode-id="572"><span data-dcnode-id="573" instrument_node="">&lt;iframe width="560" height="315" src="https://www.youtube.com/embed/WJh8buobbVM" frameborder="0" allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture" allowfullscreen&gt;&lt;/iframe&gt;</span></noscript></div><span data-dcnode-id="570" instrument_node="">
</span><h2 data-dcnode-id="568" id="is-overeating-a-sin-in-christianity"><span data-dcnode-id="569" instrument_node="">Is overeating a sin in Christianity?</span></h2><span data-dcnode-id="567" instrument_node="">
</span><p data-dcnode-id="565"><span data-dcnode-id="566" instrument_node="">Gluttony is a sin that Christians all but ignore. … Put a knife to your throat if you are given to gluttony (Proverbs 23:2). The Bible makes it very clear that overeating is a sin. God says we need to control our appetites rather than allow our appetites to control us.</span></p><div class="code-block code-block-3" data-dcnode-id="563" style="margin: 8px 0; clear: both;"><span data-dcnode-id="564" instrument_node="">
</span></div><span data-dcnode-id="562" instrument_node="">
</span><h2 data-dcnode-id="560" id="what-s-considered-a-mortal-sin"><span data-dcnode-id="561" instrument_node="">What’s considered a mortal sin?</span></h2><span data-dcnode-id="559" instrument_node="">
</span><p data-dcnode-id="557"><span data-dcnode-id="558" instrument_node="">A mortal sin is defined as a grave action that is committed in full knowledge of its gravity and with the full consent of the sinner’s will. Such a sin cuts the sinner off from God’s sanctifying grace until it is repented, usually in confession with a priest. … See also seven deadly sins.</span></p><div class="code-block code-block-3" data-dcnode-id="555" style="margin: 8px 0; clear: both;"><span data-dcnode-id="556" instrument_node="">
</span></div><span data-dcnode-id="554" instrument_node="">

</span><p data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">According to Roman Catholic theology, the seven deadly sins are the seven behaviours or feelings that inspire further sin. They are typically ordered as: pride, greed, lust, envy, gluttony, wrath, and sloth.</span></p><div class="code-block code-block-3" data-dcnode-id="526" style="margin: 8px 0; clear: both;"><span data-dcnode-id="534" instrument_node="">

</span><p data-dcnode-id="520"><span data-dcnode-id="521" instrument_node="">Of the seven deadly sins, theologians and philosophers reserve a special place for pride. Lust, envy, anger, greed, gluttony and sloth are all bad, the sages say, but pride is the deadliest of all, the root of all evil, and the beginning of sin.</span></p><div class="code-block code-block-3" data-dcnode-id="518" style="margin: 8px 0; clear: both;"><span data-dcnode-id="519" instrument_node="">
