></div></div></div><div class="nova-legacy-v-activity-item__entity-list" data-dcnode-id="2787"><div class="nova-legacy-v-activity-item__entity-list-items" data-dcnode-id="2788"><div class="nova-legacy-o-stack nova-legacy-o-stack--gutter-xs nova-legacy-o-stack--spacing-none nova-legacy-o-stack--no-gutter-outside" data-dcnode-id="2789"><div class="nova-legacy-o-stack__item" data-dcnode-id="2790"><div class="nova-legacy-v-activity-item__entity-list-item" data-dcnode-id="2791"><div class="nova-legacy-o-stack nova-legacy-o-stack--gutter-m nova-legacy-o-stack--spacing-none nova-legacy-o-stack--no-gutter-outside" data-dcnode-id="2792"><div class="nova-legacy-o-stack__item" data-dcnode-id="2797"><span data-dcnode-id="2798"><span class="Linkify" data-dcnode-id="2799"><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="2816"><span data-dcnode-id="2817" instrument_node="">Further.</span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="2814"><span data-dcnode-id="2815" instrument_node="">Adultery exists within the unit as a couple unless your definition is legalistic. You seem to insist on one definition and again all other propositions put forward.</span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="2813"></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="2811"><span data-dcnode-id="2812" instrument_node="">Your claim that unless you get the specific answers to questions you consider yourself as asking (in fact you are asking something else) this is all useless directs the question and its energies onto you, insisting indeed that only your perceptions of the issues are either confirmed or denied. The question was specific and concerned the nature of employing sin for any human behaviour. While indeed adultery can be destructive on families, it need not be. Families survive. </span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="2810"></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="2808"><span data-dcnode-id="2809" instrument_node="">You ask me if i am only talking about co-habitation as if its lack of legal connection made the emotions in the unit more superficial. Does it? Is that not your perception?</span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="2807"></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="2803"><i data-dcnode-id="2805"><span data-dcnode-id="2806" instrument_node="">I think you are asking about the nature of emotional pain. </span></i><span data-dcnode-id="2804" instrument_node="">My answers are contained above although the psychoanalytical position of difficult past experiences I believe are consistent with the nature of that pain. Taking it back to the discussion: using sin merely cauterises the pain at best and connects it to public means of cartharsis which itself is destructive. </span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="2802"></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="2800"><span data-dcnode-id="2801" instrument_node="">I have I believe answered everything but if you think not than maybe your questions have a different source.</span></div></span></span></div><div class="nova-legacy-l-flex__item nova-legacy-l-flex nova-legacy-l-flex--gutter-m nova-legacy-l-flex--direction-row@s-up nova-legacy-l-flex--align-items-stretch@s-up nova-legacy-l-flex--justify-content-space-between@s-up nova-legacy-l-flex--wrap-wrap@s-up" data-dcnode-id="2793"><div class="nova-legacy-l-flex__item" data-dcnode-id="2794"><a class="nova-legacy-e-link nova-legacy-e-link--color-blue nova-legacy-e-link--theme-bare post-details__cite-link" data-dcnode-id="2795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/post/Why_is_adultery_considered_a_sin/5fe5b04d32340f02ca345835/citation/download"><span data-dcnode-id="2796" instrument_node="">Cite</span></a></div></div></div></div></div></div></div></div></div></div></div><div class="nova-legacy-o-stack__item" data-dcnode-id="2717"><a data-dcnode-id="2783" name="view=5fe5fc8b877efa7d1330796e"></a><div class="nova-legacy-v-activity-item" data-dcnode-id="2718"><div class="nova-legacy-v-activity-item__body" data-dcnode-id="2719"><div class="nova-legacy-v-activity-item__stack" data-dcnode-id="2761"><div class="nova-legacy-v-activity-item__stack-item" data-dcnode-id="2762"><div class="nova-legacy-l-flex__item nova-legacy-l-flex nova-legacy-l-flex--gutter-none nova-legacy-l-flex--direction-row@s-up nova-legacy-l-flex--align-items-stretch@s-up nova-legacy-l-flex--justify-content-flex-start@s-up nova-legacy-l-flex--wrap-nowrap@s-up nova-legacy-v-activity-item__story" data-dcnode-id="2763"><div class="nova-legacy-l-flex__item nova-legacy-v-activity-item__story-assets" data-dcnode-id="2774"><div class="lite-page-activity-item__asset" data-dcnode-id="2776"><a data-dcnode-id="2777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/profile/Mehrdad-Bidgoli"><picture class="lite-page-avatar lite-page-avatar--size-m lite-page-avatar--radius-full" data-dcnode-id="2778"><source data-dcnode-id="2782" data-srcset="https://i1.rgstatic.net/ii/profile.image/1116228303228928-1643140974154_Q64_WEBP/Mehrdad-Bidgoli.webp" type="image/webp"><source data-dcnode-id="2781" data-srcset="https://i1.rgstatic.net/ii/profile.image/1116228303228928-1643140974154_Q64/Mehrdad-Bidgoli.jpg" type="image/jpeg"><span data-dcnode-id="2780" instrument_node=""> </span><img class="lite-image" data-dcnode-id="2779" data-src="https://i1.rgstatic.net/ii/profile.image/1116228303228928-1643140974154_Q64/Mehrdad-Bidgoli.jpg" data-srcset="https://i1.rgstatic.net/ii/profile.image/1116228303228928-1643140974154_Q64/Mehrdad-Bidgoli.jpg 1x, https://i1.rgstatic.net/ii/profile.image/1116228303228928-1643140974154_Q128/Mehrdad-Bidgoli.jpg 2x" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg=="></picture></a></div><div class="nova-legacy-v-activity-item__story-asset" data-dcnode-id="2775"></div></div><div class="nova-legacy-l-flex__item nova-legacy-l-flex__item--grow nova-legacy-v-activity-item__story-content" data-dcnode-id="2764"><div class="nova-legacy-l-flex__item nova-legacy-l-flex nova-legacy-l-flex--gutter-xs nova-legacy-l-flex--direction-row@s-up nova-legacy-l-flex--align-items-center@s-up nova-legacy-l-flex--justify-content-flex-start@s-up nova-legacy-l-flex--wrap-nowrap@s-up nova-legacy-v-activity-item__context" data-dcnode-id="2770"><div class="nova-legacy-l-flex__item" data-dcnode-id="2771"><div class="nova-legacy-e-text nova-legacy-e-text--size-s nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-v-activity-item__time" data-dcnode-id="2772"><span data-dcnode-id="2773" instrument_node="">25th Dec, 2020</span></div></div></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-v-activity-item__story-subject" data-dcnode-id="2767"><a class="nova-legacy-e-link nova-legacy-e-link--color-blue nova-legacy-e-link--theme-bare gtm-profile-item" data-dcnode-id="2768" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/profile/Mehrdad-Bidgoli"><span data-dcnode-id="2769" instrument_node="">Mehrdad Bidgoli</span></a></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-v-activity-item__story-body" data-dcnode-id="2765"><span data-dcnode-id="2766" instrument_node="">University of Isfahan</span></div></div></div></div></div><div class="nova-legacy-v-activity-item__entity-list" data-dcnode-id="2720"><div class="nova-legacy-v-activity-item__entity-list-items" data-dcnode-id="2721"><div class="nova-legacy-o-stack nova-legacy-o-stack--gutter-xs nova-legacy-o-stack--spacing-none nova-legacy-o-stack--no-gutter-outside" data-dcnode-id="2722"><div class="nova-legacy-o-stack__item" data-dcnode-id="2723"><div class="nova-legacy-v-activity-item__entity-list-item" data-dcnode-id="2724"><div class="nova-legacy-o-stack nova-legacy-o-stack--gutter-m nova-legacy-o-stack--spacing-none nova-legacy-o-stack--no-gutter-outside" data-dcnode-id="2725"><div class="nova-legacy-o-stack__item" data-dcnode-id="2734"><span data-dcnode-id="2735"><span class="Linkify" data-dcnode-id="2736"><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="2759"><span data-dcnode-id="2760" instrument_node="">According to the rules and regulations of any society, certain activities are often labeled as "accepted" and "normal" and activities outside those demarcations are considered unacceptable. Ancient societies were, unlike modern ones, based on systems of beliefs and accepted ways and manners of living commonly known as "religion". And religions usually work -- I think it is at least one aspect of them, an aspect which lead many philosophers to rebel against them, even religious philosophers (Spinoza, Kierkegaard, Nietzsche, etc.) -- on the basis of "fear", that is to say it makes its followers adhere to certain rules set by an all-knowing and all-powerful God, and stresses that perversion from those standards will have ominous and terrible consequences for the perpetrators. This means that followers are warned based on fear of some horrible outcome, often characterized as being burned in fire or hell, or sometimes simply an unknown punishment awaiting those who transgress those divine rules.</span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="2758"></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="2756"><span data-dcnode-id="2757" instrument_node="">If we look at this issue in a religious context, then the notion of "sin" relates to those transgressions and works as a warning of that same horrible outcome. Perversion of any kind of "accepted" and "safe" rules is usually considered as a sin, and sin itself has a psychological aspect which relates to that same basis of "fear" for the person, fear of some horrible consequence.</span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="2755"></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="2753"><span data-dcnode-id="2754" instrument_node="">In a secular line of thought, sins were created by sages of a society who saw the abnormal outcome of some activities -- e.g. marriage with one's sister or brother and its offspring (disabled or any kind of mentally or physically ill infants) -- and labeled them as sinful and abnormal acts. Those rules made up systems of beliefs.</span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="2752"></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="2750"><span data-dcnode-id="2751" instrument_node="">Adultery is one of those notions. It is sexual activity taken place outside an accepted, religiously divine law. It is sinful because it is a perversion of those rules, and has psychological effects for people based on the same mechanism of "fear" of an unknown, horrible punishment, in order to prevent them from giving way to anarchy and problematic activities that unbalance the harmony of a society. </span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="2749"></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="2747"><span data-dcnode-id="2748" instrument_node="">Some more general points: adultery is unacceptable (sin) because:</span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="2746"></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="2744"><span data-dcnode-id="2745" instrument_node="">- It makes problems for those who live according to accepted laws of a harmonious society, such as sexual anarchy or promiscuity, divorces, anger and terror among individuals, etc.</span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="2742"><span data-dcnode-id="2743" instrument_node="">- It can lead to physically or mentally (even both) ill offspring</span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="2740"><span data-dcnode-id="2741" instrument_node="">- It can lead to an offspring who cannot be properly satisfied within the safe and secure space of a family, making them vulnerable to various psychological disorders and criminal acts</span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="2738"><span data-dcnode-id="2739" instrument_node="">- It can even deprive a society of an institution known as "family", which is one of the most significant institutions of human society</span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="2737"></div></span></span></div><div class="nova-legacy-l-flex__item nova-legacy-l-flex nova-legacy-l-flex--gutter-m nova-legacy-l-flex--direction-row@s-up nova-legacy-l-flex--align-items-stretch@s-up nova-legacy-l-flex--justify-content-space-between@s-up nova-legacy-l-flex--wrap-wrap@s-up" data-dcnode-id="2726"><div class="nova-legacy-l-flex__item" data-dcnode-id="2731"><a class="nova-legacy-e-link nova-legacy-e-link--color-blue nova-legacy-e-link--theme-bare post-details__cite-link" data-dcnode-id="2732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/post/Why_is_adultery_considered_a_sin/5fe5fc8b877efa7d1330796e/citation/download"><span data-dcnode-id="2733" instrument_node="">Cite</span></a></div><div class="nova-legacy-l-flex__item" data-dcnode-id="2727"><div class="nova-legacy-o-stack__item" data-dcnode-id="2728"><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-grey-500" data-dcnode-id="2729"><span data-dcnode-id="2730" instrument_node="">2 Recommendations</span></div></div></div></div></div></div></div></div></div></div></div></div></div><div class="nova-legacy-o-stack__item" data-dcnode-id="2672"><a data-dcnode-id="2716" name="view=5fe603d4c3dc93553c4ed8cd"></a><div class="nova-legacy-v-activity-item" data-dcnode-id="2673"><div class="nova-legacy-v-activity-item__body" data-dcnode-id="2674"><div class="nova-legacy-v-activity-item__stack" data-dcnode-id="2694"><div class="nova-legacy-v-activity-item__stack-item" data-dcnode-id="2695"><div class="nova-legacy-l-flex__item nova-legacy-l-flex nova-legacy-l-flex--gutter-none nova-legacy-l-flex--direction-row@s-up nova-legacy-l-flex--align-items-stretch@s-up nova-legacy-l-flex--justify-content-flex-start@s-up nova-legacy-l-fle stack--gutter-m nova-legacy-o-stack--spacing-none nova-legacy-o-stack--no-gutter-outside" data-dcnode-id="2537"><div class="nova-legacy-o-stack__item" data-dcnode-id="2546"><span data-dcnode-id="2547"><span class="Linkify" data-dcnode-id="2548"><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="2560"><span data-dcnode-id="2561" instrument_node=""> </span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="2558"><span data-dcnode-id="2559" instrument_node="">According to biblical theology on marriage, God Himself has established a connection between God's love and fidelity to men and the love and fidelity between spouses in marriage. </span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="2557"></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="2555"><span data-dcnode-id="2556" instrument_node="">Hosea's married life is narrated in chapters 1 (biographical) and 3 (autobiographical). Chapter 2 –although it is oracular-, forms a homogeneous whole with the previous ones, since it uses the image of the conjugal union as a comparison to express the relations –of Covenant- between God and Israel, and the image of adultery and marital infidelity as expression of the. Israel's unfaithfulness to Yahweh. </span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="2553"><span data-dcnode-id="2554" instrument_node=""> </span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="2551"><span data-dcnode-id="2552" instrument_node="">This parallelism can be read bi-directionally. And it theologically explains adultery as sin (offense to God and spouse).</span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="2550"></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="2549"></div></span></span></div><div class="nova-legacy-l-flex__item nova-legacy-l-flex nova-legacy-l-flex--gutter-m nova-legacy-l-flex--direction-row@s-up nova-legacy-l-flex--align-items-stretch@s-up nova-legacy-l-flex--justify-content-space-between@s-up nova-legacy-l-flex--wrap-wrap@s-up" data-dcnode-id="2538"><div class="nova-legacy-l-flex__item" data-dcnode-id="2543"><a class="nova-legacy-e-link nova-legacy-e-link--color-blue nova-legacy-e-link--theme-bare post-details__cite-link" data-dcnode-id="2544" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/post/Why_is_adultery_considered_a_sin/5ff4330c568e6d68ba5cecd1/citation/download"><span data-dcnode-id="2545" instrument_node="">Cite</span></a></div><div class="nova-legacy-l-flex__item" data-dcnode-id="2539"><div class="nova-legacy-o-stack__item" data-dcnode-id="2540"><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-grey-500" data-dcnode-id="2541"><span data-dcnode-id="2542" instrument_node="">1 Recommendation</span></div></div></div></div></div></div> -list-items" data-dcnode-id="2482"><div class="nova-legacy-o-stack nova-legacy-o-stack--gutter-xs nova-legacy-o-stack--spacing-none nova-legacy-o-stack--no-gutter-outside" data-dcnode-id="2483"><div class="nova-legacy-o-stack__item" data-dcnode-id="2484"><div class="nova-legacy-v-activity-item__entity-list-item" data-dcnode-id="2485"><div class="nova-legacy-o-stack nova-legacy-o-stack--gutter-m nova-legacy-o-stack--spacing-none nova-legacy-o-stack--no-gutter-outside" data-dcnode-id="2486"><div class="nova-legacy-o-stack__item" data-dcnode-id="2495"><span data-dcnode-id="2496"><span class="Linkify" data-dcnode-id="2497"><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="2504"><span data-dcnode-id="2505" instrument_node="">P.s. to my previous reply:</span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="2503"></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="2501"><span data-dcnode-id="2502" instrument_node="">I find adultery a kind of "excess", that is to say any kind of excessive behavior, irrespective of religious or scientific evidence, is harmful and a source of evil. The religionist call many such behaviors "sin" and others can simply call them "perversion". </span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="2500"></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="2498"><span data-dcnode-id="2499" instrument_node="">In most simple words, going to the extremes is always harmful, even in loving, even in morality; anything excessive can yield evil outcomes, sooner or later...</span></div></span></span></div><div class="nova-legacy-l-flex__item nova-legacy-l-flex nova-legacy-l-flex--gutter-m nova-legacy-l-flex--direction-row@s-up nova-legacy-l-flex--align-items-stretch@s-up nova-legacy-l-flex--justify-content-space-between@s-up nova-legacy-l-flex--wrap-wrap@s-up" data-dcnode-id="2487"><div class="nova-legacy-l-flex__item" data-dcnode-id="2492"><a class="nova-legacy-e-link nova-legacy-e-link--color-blue nova-legacy-e-link--theme-bare post-details__cite-link" data-dcnode-id="2493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/post/Why_is_adultery_considered_a_sin/5ff450874cdde75b223a7509/citation/download"><span data-dcnode-id="2494" instrument_node="">Cite</span></a></div><div class="nova-legacy-l-flex__item" data-dcnode-id="2488"><div class="nova-legacy-o-stack__item" data-dcnode-id="2489"><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-grey-500" data-dcnode-id="2490"><span data-dcnode-id="2491" instrument_node="">1 Recommendation</span></div></div></div></div></div></div></div></div></div></div></div></div></div><div class="nova-legacy-o-stack__item" data-dcnode-id="2437"><a data-dcnode-id="2477" name="view=5ff460a852524e3d2d5219ba"></a><div class="nova-legacy-v-activity-item" data-dcnode-id="2438"><div class="nova-legacy-v-activity-item__body" data-dcnode-id="2439"><div class="nova-legacy-v-activity-item__stack" data-dcnode-id="2455"><div class="nova-legacy-v-activity-item__stack-item" data-dcnode-id="2456"><div class="nova-legacy-l-flex__item nova-legacy-l-flex nova-legacy-l-flex--gutter-none nova-legacy-l-flex--direction-row@s-up nova-legacy-l-flex--ali gions that tend to find sexuality more repugnant than violence and regard sexual autonomy as perversion and sinful but not violence. It is the hysteria of the celibate or observer to sexual acts. Homosexuality is a sin, amongst a host of others created several thousand years ago by an elite group who glorified in concubinage and other practices. Although adultery can be subject to condemnation it does not pass understanding on it and remember the adultery of men is less reflected upon, and of powerful men hardly at all.</span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="2361"></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="2359"><span data-dcnode-id="2360" instrument_node="">I think a more considered understanding of sin is required outside of medieval tropes and prejudices. </span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="2358"></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="2356"><span data-dcnode-id="2357" instrument_node=""> </span></div></span></span></div><div class="nova-legacy-l-flex__item nova-legacy-l-flex nova-legacy-l-flex--gutter-m nova-legacy-l-flex--direction-row@s-up nova-legacy-l-flex--align-items-stretch@s-up nova-legacy-l-flex--justify-content-space-between@s-up nova-legacy-l-flex--wrap-wrap@s-up" data-dcnode-id="2345"><div class="nova-legacy-l-flex__item" data-dcnode-id="2350"><a class="nova-legacy-e-link nova-legacy-e-link--color-blue nova-legacy-e-link--t acy-e-link--theme-bare gtm-profile-item" data-dcnode-id="2320" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/profile/Mehrdad-Bidgoli"><span data-dcnode-id="2321" instrument_node="">Mehrdad Bidgoli</span></a></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-v-activity-item__story-body" data-dcnode-id="2317"><span data-dcnode-id="2318" instrument_node="">University of Isfahan</span></div></div></div></div></div><div class="nova-legacy-v-activity-item__entity-list" data-dcnode-id="2280"><div class="nova-legacy-v-activity-item__entity-list-items" data-dcnode-id="2281"><div class="nova-legacy-o-stack nova-legacy-o-stack--gutter-xs nova-legacy-o-stack--spacing-none nova-legacy-o-stack--no-gutter-outside" data-dcnode-id="2282"><div class="nova-legacy-o-stack__item" data-dcnode-id="2283"><div class="nova-legacy-v-activity-item__entity-list-item" data-dcnode-id="2284"><div class="nova-legacy-o-stack nova-legacy-o-stack--gutter-m nova-legacy-o-stack--spacing-none nova-legacy-o-stack--no-gutter-outside" data-dcnode-id="2285"><div class="nova-legacy-o-stack__item" data-dcnode-id="2294"><span data-dcnode-id="2295"><span class="Linkify" data-dcnode-id="2296"><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="2311"><span data-dcnode-id="2312" instrument_node="">Dear Mr. Stanley Wilkin,</span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="2310"></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="2308"><span data-dcnode-id="2309" instrument_node="">Thanks for your consideration! I did know from the outset that you were trying to find a "modern" definition and go beyond conventional norms and ideals. This was why my first answer tried to be neutral and explain from both religious and secular camps! I do welcome this attempt of yours, and I think every century must try to do this reconsideration of prevalent and conventional issues and questions. </span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="2307"></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="2305"><span data-dcnode-id="2306" instrument_node="">Yet one thing I don't understand is that if you're going to move beyond classical bounds, then why don't you change the form (or even content) of your question? Believe it or not, everyone who reads your current question on the headline will inevitably think of religion and medieval thought! What's more, atheists and agnostics might not even choose to contribute; these people are very helpful for your inquiry, much more than theologically-minded people who resort to the Scriptures. I think you're trying to go beyond the Scriptural thought, in the hope of a new way of thinking about issues religions label as "sin" for instance...</span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="2304"></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="2302"><span data-dcnode-id="2303" instrument_node="">Thanks again. I do follow this discussion and hope I will grasp some new knowledge!</span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="2301"></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="2299"><span data-dcnode-id="2300" instrument_node="">Sincerely</span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="2297"><span data-dcnode-id="2298" instrument_node="">M. B.</span></div></span></span></div><div class="nova-legacy-l-flex__item nova-legacy-l-flex nova-legacy-l-flex--gutter-m nova-legacy-l-flex--direction-row@s-up nova-legacy-l-flex--align-items-stretch@s-up nova-legacy-l-flex--justify-content-space-between@s-up nova-legacy-l-flex--wrap-wrap@s-up" data-dcnode-id="2286"><div class="nova-legacy-l-flex__item" data-dcnode-id="2291"><a class="nova-legacy-e-link nova-legacy-e-link--color-blue nova-legacy-e-link--theme-bare post-details__cite-link" data-dcnode-id="2292" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/post/Why_is_adultery_considered_a_sin/5ff4763057ac513be7503ac5/citation/download"><span data-dcnode-id="2293" instrument_node="">Cite</span></a></div><div class="nova-legacy-l-flex__item" data-dcnode-id="2287"><div class="nova-legacy-o-stack__item" data-dcnode-id="2288"><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-grey-500" data-dcnode-id="2289"><span data-dcnode-id="2290" instrument_node="">2 Recommendations</span></div></div></div></div> ist-items" data-dcnode-id="2233"><div class="nova-legacy-o-stack nova-legacy-o-stack--gutter-xs nova-legacy-o-stack--spacing-none nova-legacy-o-stack--no-gutter-outside" data-dcnode-id="2234"><div class="nova-legacy-o-stack__item" data-dcnode-id="2235"><div class="nova-legacy-v-activity-item__entity-list-item" data-dcnode-id="2236"><div class="nova-legacy-o-stack nova-legacy-o-stack--gutter-m nova-legacy-o-stack--spacing-none nova-legacy-o-stack--no-gutter-outside" data-dcnode-id="2237"><div class="nova-legacy-o-stack__item" data-dcnode-id="2246"><span data-dcnode-id="2247"><span class="Linkify" data-dcnode-id="2248"><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="2252"><span data-dcnode-id="2253" instrument_node="">Monserrat, although the marraige metaphors referencing the contract between god and Judea/Israel with the latter as the bride is common in the Old Testament references to god as both mother and woman (bride) are also common. The use of the feminine to refer to god (YHWH) may be connected to earlier periods when he was shown with a goddess. </span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="2251"></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="2249"><span data-dcnode-id="2250" instrument_node="">Unfortunately, this has no basis in reality and must simply be viewed as the literary construction that it is. </span></div></span></span></div><div class="nova-legacy-l-flex__item nova-legacy-l-flex nova-legacy-l-flex--gutter-m nova-legacy-l-flex--direction-row@s-up nova-legacy-l-flex--align-items-stretch@s-up nova-legacy-l-flex- ext--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="2154"><a class="nova-legacy-e-link nova-legacy-e-link--color-blue nova-legacy-e-link--theme-bare" data-dcnode-id="2156" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/profile/Mehrdad-Bidgoli"><span data-dcnode-id="2157" instrument_node="">Mehrdad Bidgoli</span></a><span data-dcnode-id="2155" instrument_node=""> </span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="2153"></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="2152"></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="2150"><span data-dcnode-id="2151" instrument_node="">You are right but I am trying to do both, or several things. My apologies for any misunderstandings. </span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="2149"></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="2147"><span data-dcnode-id="2148" instrument_node="">I am attempting also to understand better the idea of sin which elsewhere I have suggested leads to a failure of understanding and even violence. Its allocation does tend to be gender based. I am not sure modern views as against traditional views exist.</span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="2146"></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="2144"><span data-dcnode-id="2145" instrument_node="">In many early cultures open mindedness (whatever that means) was the rule but the growth in political and social institutions moved everyday life into cosmic concerns of good and bad. </span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="2143"></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="2141"><span data-dcnode-id="2142" instrument_node="">Does the disruption and emotional pain that can accompany adultery cause it to be regarded as a sin? Pain is bad, therefore must have a 'bad' source.</span></div></span></span></div><div class="nova-legacy-l-flex__item nova-legacy-l-flex nova-legacy-l-flex--gutter-m nova-legacy-l-flex--direction-row@s-up nova-legacy-l-flex--align-items-stretch@s-up nova-legacy-l-flex--justify-content-space-between@s-up nova-legacy-l-flex--wrap-wrap@s-up" data-dcnode-id="2130"><div class="nova-legacy-l-flex__item" data-dcnode-id="2135"><a class="nova-legacy-e-link nova-legacy-e-link--color-blue nova-legacy-e-link--theme-bare post-details__cite-link" data-dcnode-id="2136" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/post/Why_is_adultery_considered_a_sin/5ff71206c49783563b350f21/citation/download"><span data-dcnode-id="2137" instrument_node="">Cite</span></a></div><div class=" cy-v-activity-item__entity-list-item" data-dcnode-id="2008"><div class="nova-legacy-o-stack nova-legacy-o-stack--gutter-m nova-legacy-o-stack--spacing-none nova-legacy-o-stack--no-gutter-outside" data-dcnode-id="2009"><div class="nova-legacy-o-stack__item" data-dcnode-id="2018"><span data-dcnode-id="2019"><span class="Linkify" data-dcnode-id="2020"><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="2030"><span data-dcnode-id="2031" instrument_node="">The Internet dictionary defines the word "adulteration" as denoting " the action of </span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="2029"></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="2027"><span data-dcnode-id="2028" instrument_node="">making something poorer in quality by the addition of another substance; use in a </span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="2026"></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="2024"><span data-dcnode-id="2025" instrument_node="">sentence, 'we're working on a new diagnostic test to more rapidly monitor food </span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="2023"></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="2021"><span data-dcnode-id="2022" instrument_node="">adulteration'."  The connotations of "adulteration" are numerous but they all suggest impoverishment, diminution in quality, and contamination by the addition of a qualitative element of a lesser value that undermines that which is being adulterated. A painfully contemporary illustration is the novel COVID-19 virus which adulterates the healthy cells in the human body, and scientific research also shows, in the animalia kingdom, including wild bats, hogs, and domesticated pet dogs, cats, birds, and so forth. On a microscopic epidemiological level, adulteration denotes disease, infirmity, abnormality, degradation, and pathogenesis in a healthy organism. In terms of public health, "adulteration" is a force that motivates public health workers and hospitals technicians to scour away germs, microbes, bacteria, fungus, infectious agents, viruses, and other harmful microscopic pathogenic, parasitic, opportunistic infiltrators into the biospherical environment that adulterate it with harmful bugs. Adulterated matter, whether biological, physiological, bestial, human, visible or invisible, suggests sickness, not health; abnormality, not normality; disease, not wellness; death, not life. </span></div></span></span></div><div class="nova-legacy-l-flex__item nova-legacy-l-flex nova-legacy-l-flex--gutter-m nova-legacy-l-flex--direction-row@s-up nova-legacy-l-flex--align-items-stretch@s-up nova-legacy-l-flex--justify-content-space-between@s-up nova-legacy-l-flex--wrap-wrap@s-up" data-dcnode-id="2010"><div class="nova-legacy-l-flex__item" data-dcnode-id="2015"><a class="nova-legacy-e-link nova-legacy-e-link--color-blue nova-legacy-e-link--theme-bare post-details__cite-link" data-dcnode-id="2016" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A// chgate.net/profile/Joost-Daalder"><span data-dcnode-id="1986" instrument_node="">Joost Daalder</span></a></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-v-activity-item__story-body" data-dcnode-id="1982"><span data-dcnode-id="1983" instrument_node="">Flinders University</span></div></div></div></div></div><div class="nova-legacy-v-activity-item__entity-list" data-dcnode-id="1959"><div class="nova-legacy-v-activity-item__entity-list-items" data-dcnode-id="1960"><div class="nova-legacy-o-stack nova-legacy-o-stack--gutter-xs nova-legacy-o-stack--spacing-none nova-legacy-o-stack--no-gutter-outside" data-dcnode-id="1961"><div class="nova-legacy-o-stack__item" data-dcnode-id="1962"><div class="nova-legacy-v-activity-item__entity-list-item" data-dcnode-id="1963"><div class="nova-legacy-o-stack nova-legacy-o-stack--gutter-m nova-legacy-o-stack--spacing-none nova-legacy-o-stack--no-gutter-outside" data-dcnode-id="1964"><div class="nova-legacy-o-stack__item" data-dcnode-id="1973"><span data-dcnode-id="1974"><span class="Linkify" data-dcnode-id="1975"><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="1976"><span data-dcnode-id="1977" instrument_node="">My attitude is in general that it is not up to me - i.e. in any sense my business or right - to concern myself with many matters outside my family and (indeed) often even within my own family. If someone engages in homosexual activity, for example, that is THAT person's business. I add that I see in any case nothing "sinful" in the activity, but even if in my view it were, it is not up to me to criticise or interfere. In the case of damage/unhappiness caused by e.g. sexual assault the matter is different, as someone is likely to be harmed by another person. I am too old to interfere with my own body in such an instance, but would somehow seek to restrain the attacker, call out for help, phone the police, or whatever. That is because sexual assault is widely agreed to be a crime, and for good reason. But homosexuality between consenting partners offers to me no problem of a moral nature. Adultery is something I disapprove of, but for as long as I cannot in justice interfere in a relationship between two other people I do not think that it is up to me to express disapproval to the adulterer. That might depend, however, on my relationship with that person. Many supposedly sinful sexual acts can actually be defended if noone suffers, but if someone suffers at the hands of someone else the matter becomes the same as it is in any other situation in which A does harm to B. It would depend on the situation to what extent one might interfere.</span></div></span></span></div><div class="nova-legacy-l-flex__item nova-legacy-l-flex nova-legacy-l-flex--gutter-m nova-legacy-l-flex--direction-row@s-up nova-legacy-l-flex--align-items-stretch@s-up nova-legacy-l-flex--justify-content-space-between@s-up nova-legacy-l-flex--wrap-wrap@s-up" data-dcnode-id="1965"><div class="nova-legacy-l-flex__item" data-dcnode-id="1970"><a class="nova-legacy-e-link nova-legacy-e-link--color-blue nova-legacy-e-link--theme-bare post-details__cite-link" data-dcnode-id="1971" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/post/Why_is_adultery_considered_a_sin/6017a19c7dac947188367845/citation/download"><span data-dcnode-id="1972" instrument_node="">Cite</span></a></div><div class="nova-legacy-l-flex__item" data-dcnode-id="1966"><div class="nova-legacy-o-stack__item" data-dcnode-id="1967"><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-grey-500" data-dcnode-id="1968"><span data-dcnode-id="1969" instrument_nod -e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="1744"></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="1742"><span data-dcnode-id="1743" instrument_node="">My main interest in offering the question was to discover what people considered sin to be and why they believed the concept was necessary. I have pointed out the historical development of the concept and its absence in most early societies. Although many societies punished adultery it was for the problems that ensued within the community, not through the idea of sin.  An ancient story of the delinquent wife of a pharoah and her lover being caught and thrown to crocodiles did not attempt to understand the event through sin but rather the affects on the dynasty and kingdom. </span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="1741"></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="1739"><span data-dcnode-id="1740" instrument_node="">Sin proposes that a god is concerned with the minutia of human conduct and seeks to restrain and punish. It proposes that individual conduct damages the cosmos, encouraging chaos.</span></div></span></span></div><div class="nova-legacy-l-flex__item nova-legacy-l-flex nova-legacy-l-flex--gutter-m nova-legacy-l-flex--direction-row@s-up nova-legacy-l-flex--align-items-stretch@s-up nova-legacy-l-flex--justify-content-space-between@s-up nova-legacy-l-flex--wrap-wrap@s-up" data-dcnode-id="1728"><div class="nova-legacy-l-flex__item" data-dcnode-id="1733"><a cl s, lands or WHAT WAS, in fact was and is "your son and your blood" also affects this. In Spanish there is a rather crude and eloquent saying about it: "My daughter's children are my grandchildren; but my son's, they are or they are not."</span></div></span></span></div><div class="nova-legacy-l-flex__item nova-legacy-l-flex nova-legacy-l-flex--gutter-m nova-legacy-l-flex--direction-row@s-up nova-legacy-l-flex--align-items-stretch@s-up nova-legacy-l-flex--justify-content-space-between@s-up nova-legacy-l-flex--wrap-wrap@s-up" data-dcnode-id="1683"><div class="nova-legacy-l-flex__item" data-dcnode-id="1688"><a class="nova-legacy-e-link nova-legacy-e-link--color-blue nova-legacy-e-link--theme-bare post-details__cite-link" data-dcnode-id="1689" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/post/Why_is_adultery_considered_a_sin/603a89766842e04505014357/citation/download"><span data-dcnode-id="1690" instrument_node="">Cite</span></a></div><div class="nova-legacy-l-flex__item" data-dcnode-id="1684"><div class="nova-legacy-o-stack__item" data-dcnode-id="1685"><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-grey-500" data-dcnode-id="1686"><span data-dcnode-id="1687" instrument_node="">5 Recommendations</span></div></div></div></div></div></div></div></div></div></div></div></div></div><div class="nova-legacy-o-stack__item" data-dcnode-id="1626"><a data-dcnode-id="1673" name="view=603a9d87adeeb7658d51f02e"></a><div class="nova-legacy-v-activity-item" data-dcnode-id="1627"><div class="nova-legacy-v-activity-item__body" data-dcnode-id="1628"><div class="nova-legacy-v-activity-item__stack" data-dcnode-id="1651"><div class="nova-legacy-v-activity-item__stack-item" data-dcnode-id="1652"><div class="nova-legacy-l-flex__item nova-legacy-l-flex nova-legacy-l-flex--gutter-none nova-legacy-l-flex--direction-row@s-up nova-legacy-l-f fy" data-dcnode-id="1645"><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="1649"><span data-dcnode-id="1650" instrument_node="">Yes, Francisco, I remember from somewhere that the chances of one of your children being from another man is something of of the order of 2/10. That is for every 10 men, etc. </span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="1648"></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="1646"><span data-dcnode-id="1647" instrument_node="">As an avid watcher of nature programmes there seems a clear connnection between animal and human behaviour. A large male baboon heavily chastising one of his harem for slipping away with another male baboon, dragging her back by force. The difference seems is that we create complex invisible pressures to hold wanton women and , less so, adventurous males in place. We use god, sin etc, because of our numbers, blocking off means of escape. </span></div></span></span></div><div class="nova-legacy-l-flex__item nova-legacy-l-flex nova-legacy-l-flex--gutter-m nova-legacy-l-flex--direction-row@s-up nova-legacy-l-flex--align-items-stretch@s-up nova-legacy-l-flex--justify-content-space-between@s-up nova-legacy-l-flex--wrap-wrap@s-up" data-dcnode-id="1635"><div class="nova-legacy-l-flex__item" data-dcnode-id="1640"><a class="nova-legacy-e-link nova-legacy-e-link--color-blue nova-legacy-e-link--theme-bare post-details__cite-link" data-dcnode-id="1641" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/post/Why_is_adultery_considered_a_sin/603a9d87 earchgate.net/profile/Stanley-Wilkin"><span data-dcnode-id="1339" instrument_node="">Stanley Wilkin</span></a></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-v-activity-item__story-body" data-dcnode-id="1335"><span data-dcnode-id="1336" instrument_node="">University of London</span></div></div></div></div></div><div class="nova-legacy-v-activity-item__entity-list" data-dcnode-id="1307"><div class="nova-legacy-v-activity-item__entity-list-items" data-dcnode-id="1308"><div class="nova-legacy-o-stack nova-legacy-o-stack--gutter-xs nova-legacy-o-stack--spacing-none nova-legacy-o-stack--no-gutter-outside" data-dcnode-id="1309"><div class="nova-legacy-o-stack__item" data-dcnode-id="1310"><div class="nova-legacy-v-activity-item__entity-list-item" data-dcnode-id="1311"><div class="nova-legacy-o-stack nova-legacy-o-stack--gutter-m nova-legacy-o-stack--spacing-none nova-legacy-o-stack--no-gutter-outside" data-dcnode-id="1312"><div class="nova-legacy-o-stack__item" data-dcnode-id="1317"><span data-dcnode-id="1318"><span class="Linkify" data-dcnode-id="1319"><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="1329"><span data-dcnode-id="1330" instrument_node="">It is, Zeid. But I was mainly focusing on some of the responses here that seem concerned about women's adultery. I, no doubt, could be wrong. I was, let me add, not saying either that the Qur'an does not provide equality to women-although it is onotological not through practice (that requires consideration as well as there is a public and private cleavage).</span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="1328"></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="1326"><span data-dcnode-id="1327" instrument_node="">Amir's answer above raises pertinent points, as given the Qur'an's stance on divorce, if unhappy in a marriage a woman could get out of it with more ease than in Christian communities until recently. In the past a European woman's chances of a happy relationship might have required cheating, although a man was able to cheat with impunity. </span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="1325"></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="1323"><span data-dcnode-id="1324" instrument_node="">Again, Islam functions on the family, usually the extended family, as the basic unit and therefore its destruction, or seeming destruction, causes concern. Adultery can destroy relationships but only if the relationship is already failing or/and if considered a sin by the community. </span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="1322"></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="1320"><span data-dcnode-id="1321" instrument_node="">As I have already pointed out, selecting an act as a sin involves the use of punishment to absolve that sin.    </span></div></span></span></div><div class="nova-legacy-l-flex__item nova-legacy-l-flex no jpeg"><span data-dcnode-id="994" instrument_node=""> </span><img alt="Mark A Arbing" class="lite-image" data-dcnode-id="993" data-src="https://c5.rgstatic.net/m/4671872220764/images/template/default/profile/profile_default_m.jpg" data-srcset="https://c5.rgstatic.net/m/4671872220764/images/template/default/profile/profile_default_m.jpg 1x, https://c5.rgstatic.net/m/437738464651637/images/template/default/profile/profile_default_l.jpg 2x" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg=="></picture></span><span class="nova-legacy-v-person-inline-item__fullname" data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">Mark A Arbing</span></span></span></li></ul></div><div class="nova-legacy-v-question-item__stack-item" data-dcnode-id="957"><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-v-question-item__description" data-dcnode-id="958"><span data-dcnode-id="959"><span class="Linkify" data-dcnode-id="960"><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="983"><span data-dcnode-id="984" instrument_node="">I'm doing a yeast display experiment and have been sorting yeast cells (S. cerevisiae) with a BioRad cell sorter. </span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="982"></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="980"><span data-dcnode-id="981" instrument_node="">In the later rounds I've started getting contaminants on the plates. Some plates do not have any contaminants at all. In other instances it's quite possible that the contaminant is being passaged along with the sorted cells (although I'm gating a double positive population...)</span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="979"></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">The colonies have a raised margin and in some instances a "button" in the middle. The attached pics have a 200 ul pipette tip for scale; there are also some typical S. cerevisiae colonies visible in the images. </span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="976"></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="974"><span data-dcnode-id="975" instrument_node="">Details: </span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">Plates: synthetic complete - trp, dextrose, pen-strep.  ~2 weeks old and stored at 4C. </span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">Growth: 2 days at 30C. Incubator is also used for E. coli plates.</span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="968"><span data-dcnode-id="969" instrument_node="">Yeast strain: S. cerevisiae BJ5465</span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="966"><span data-dcnode-id="967" instrument_node="">Plasmid: gal promoter so there should be no cell surface display of the DARPin library.</span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="964"><span data-dcnode-id="965" instrument_node="">Cell sorter: BioRad S3. The sorting chamber is not sterile. Only yeast cells have been sorted recently although some Corynebacterium cells were analyzed in the same time frame (different days though) that yeast were sorted. </span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="963"></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="961"><span data-dcnode-id="962" instrument_node="">Thanks for any ideas!</span></div></span></span></div></div></div></div><footer class="nova-legacy-v-question-item__footer" data-dcnode-id="946"><div class="nova-legacy-v-question-item__footer-actions" data-dcnode-id="947"><div class="nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle" data-dcnode-id="948"><div class="nova-legacy-o-pack__item nova-legacy-v-quest
