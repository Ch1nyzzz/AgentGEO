-legacy-e-text--color-inherit js-target-question-section" data-dcnode-id="4905" id="question"><span data-dcnode-id="4906" instrument_node="">Why is adultery considered a sin?</span></h1></div><div class="nova-legacy-o-stack__item" data-dcnode-id="4894"><div class="nova-legacy-o-stack nova-legacy-o-stack--gutter-m nova-legacy-o-stack--spacing-none nova-legacy-o-stack--no-gutter-outside" data-dcnode-id="4895"><div class="nova-legacy-o-stack__item" data-dcnode-id="4896"><span data-dcnode-id="4897"><span class="Linkify" data-dcnode-id="4898"><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="4902"><span data-dcnode-id="4903" instrument_node="">People are entitled surely to express their sexuality as they choose and why thereby should it concern others? Yes, many religions express anger at such behaviour but in each case the religion is over a thousand years old, with ideas developed in traditional societies with limited education and without media intrusion. </span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="4901"></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="4899"><span data-dcnode-id="4900" instrument_node="">Facing the consequences of adultery can be difficult but strengthens character, sensitivity and understanding. Harming women or men who engage in such activity is a far, far greater sin (if you wish to use such an antiquated term), a considerably more heinous moral act.</span></div></span></span></div></div></div><div class="nova-legacy-o-stack__item" data-dcnode-id="4872"><div class="nova-legacy-l-flex__item nova-legacy-l-flex no data-dcnode-id="4708"><span data-dcnode-id="4712" instrument_node="">Suppose the concept of adultery as sin flows in the Christian religion from the commendment - regarding coveting - </span><a class="nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-decorated" data-dcnode-id="4710" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/deref/https%253A//biblehub.com/deuteronomy/5-21.htm" rel="noopener" target="_blank"><span data-dcnode-id="4711" instrument_node="">https://biblehub.com/deuteronomy/5-21.htm</span></a><span data-dcnode-id="4709" instrument_node="">.</span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="4704"><span data-dcnode-id="4707" instrument_node="">Islam similarly finds adultery a sin (except forsex with women as slaves and those taken as captive).  </span><a class="nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-decorated" data-dcnode-id="4705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/deref/https%253A//www.islamweb.net/en/article/186409/fornication-and-adultery-major-sins-in-islam" rel="noopener" target="_blank"><span data-dcnode-id="4706" instrument_node="">https://www.islamweb.net/en/article/186409/fornication-and-adultery-major-sins-in-islam</span></a></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="4702"><span data-dcnode-id="4703" instrument_node="">Both as Zied note, approach the concept  in a patriarchal context.</span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-tex xt--color-inherit redraft-text" data-dcnode-id="4648"><span data-dcnode-id="4649" instrument_node="">making something poorer in quality by the addition of another substance; use in a </span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="4647"></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="4645"><span data-dcnode-id="4646" instrument_node="">sentence, 'we're working on a new diagnostic test to more rapidly monitor food </span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="4644"></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="4642"><span data-dcnode-id="4643" instrument_node="">adulteration'."  The connotations of "adulteration" are numerous but they all suggest impoverishment, diminution in quality, and contamination by the addition of a qualitative element of a lesser value that undermines that which is being adulterated. A painfully contemporary illustration is the novel COVID-19 virus which adulterates the healthy cells in the human body, and scientific research also shows, in the animalia kingdom, including wild bats, hogs, and domesticated pet dogs, cats, birds, and so forth. On a microscopic epidemiological level, adulteration denotes disease, infirmity, abnormality, degradation, and pathogenesis in a healthy organism. In terms of public health, "adulteration" is a force that motivates public health workers and hospitals technicians to scour away germs, microbes, bacteria, fungus, infectious agents, viruses, and other harmful microscopic pathogenic, parasitic, opportunistic infiltrators into the biospherical environment that adulterate it with harmful bugs. Adulterated matter, whether biological, physiological, bestial, human, visible or invisible, suggests sickness, not health; abnormality, not normality; disease, not wellness; death, not life. </span></div></span></span></div><div class="nova-legacy-l-flex__item nova-legacy-l-flex nova-legacy-l-flex--gutter-m nova-legacy-l-flex--direction-row@s-up nova-legacy-l-flex--align-items-stretch@s-up nova-legacy-l-flex--justify-content-space-between@s-up nova-legacy-l-flex--wrap-wrap@s-up" data-dcnode-id="4631"><div class="nova-legacy-l-flex__item" data-dcnode-id="4636"><a class="nova-legacy-e-link nova-legacy-e-link--color-blue nova-legacy-e-link--theme-bare post-details__cite-link" data-dcnode-id="4637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/post/Why_is_adultery_considered_a_sin/600d449c30b47b65291f924e/citation/download"><span data-dcnode-id="4638" instrument_node="">Cite</span></a></div><div class="nova-legacy-l-flex__item" data-dcnode-id="4632"><div class="nova-legacy-o-stack__item" data-dcnode-id="4633"><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-grey-500" data-dcnode-id="4634"><span data-dcnode-id="4635" instrument_node="">7 Recommendations</span></div></div></div></div></div></div></div></div></div></div></div></div></div></div></div></div><div class="nova-legacy-c-card nova-legacy-c-card--spacing-none nova-legacy-c-card--elevation-1-above post-details__answers-list post-details__section" data-dcnode-id="1110"><div class="nova-legacy-c-card__header nova-legacy-c-card__header--show-divider nova-legacy-c-card__header--spacing-m js-target-answers-section" data-dcnode-id="4614" id="answers"><div class="nova-legacy-l-flex__ite link nova-legacy-e-link--color-blue nova-legacy-e-link--theme-bare gtm-profile-item" data-dcnode-id="4455" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/profile/Julien-Ghitescu"><span data-dcnode-id="4456" instrument_node="">Julien Ghitescu</span></a></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-v-activity-item__story-body" data-dcnode-id="4452"><span data-dcnode-id="4453" instrument_node="">Yeditepe University</span></div></div></div></div></div><div class="nova-legacy-v-activity-item__entity-list" data-dcnode-id="4422"><div class="nova-legacy-v-activity-item__entity-list-items" data-dcnode-id="4423"><div class="nova-legacy-o-stack nova-legacy-o-stack--gutter-xs nova-legacy-o-stack--spacing-none nova-legacy-o-stack--no-gutter-outside" data-dcnode-id="4424"><div class="nova-legacy-o-stack__item" data-dcnode-id="4425"><div class="nova-legacy-v-activity-item__entity-list-item" data-dcnode-id="4426"><div class="nova-legacy-o-stack nova-legacy-o-stack--gutter-m nova-legacy-o-stack--spacing-none nova-legacy-o-stack--no-gutter-outside" data-dcnode-id="4427"><div class="nova-legacy-o-stack__item" data-dcnode-id="4436"><span data-dcnode-id="4437"><span class="Linkify" data-dcnode-id="4438"><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="4446"><span data-dcnode-id="4447" instrument_node="">Because of unity principle, the two become one, and separation and division of the "one" leave us with "broken halves". Man and woman, through the marriage act (whatever form it takes) are united holistically at all levels (physical, relational, emotional, intellectual, psychological, spiritual, resources, energetic, sharing life, etc.)  including sexual. Some people may not care about it, but I doubt we can build a family holding adultery as a value and as an open option. The sin word need to be defined. If we go by one traditional root of it in religious sense (for ex. Hamartia = to miss the mark), one angle of sin meaning is that we are missing the perfect original model. Everything that doesn't follow the model of commitment in marriage, also in the sexual area, is in a faulty situation or following a faulty model that brings negative consequences. Somebody can ask, if we are married and avoid adultery does it mean that we are having a perfect situation? Overwhelmingly, from the religious point of view, all of our life areas have been affected by sin (hamartia), so attaining the perfect model is kind of impossible, we have moments or seasons of "perfection".  Then? Why try? Even as faulty as it may be in our try and error life process, valuing and choosing the original creationist model, from the religious point of view, brings way more benefits and happiness than the adultery model. If you don't believe it, just ask your children. Will they prefer you having an affair, or to be loving and faithful to your wife, their mother? Sometimes things are so simple that even children knows it, but we want to complicate it in order to justify our choices and escape guilt. I speak from experience, my parents divorced when I was 3 years old because of the adultery of my father and the alcohol he drank. I grew up in a dysfunctional family, and daily I've seen my mom not being able to recover from such a life trauma. Also, the adultery model consequences put me to experience the trauma of growing up fatherless. Strengthen character? Sensitivity? Understanding? Do we not have more healthier ways to fulfill these goals? Adultery model it is not an option for me and my children.</span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="4444"><span data-dcnode-id="4445" instrument_node="">Now, I agree that harming somebody in any way it is also wrong, not just the adultery, and it is also viewed religiously as a "hamartia". </span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="4442"><span data-dcnode-id="4443" instrument_node="">Pride, judgment, and hypocrisy of religious people should not erase the value of the original model.</span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="4440"><span data-dcnode-id="4441" instrument_node="">Sometimes the model is discardet because people are grossly misrepresent it throng their way of expression and communication, especially the religious people. They consider themselves moral superior, but we are all human. Once a wise teacher pointed that what is inside of peoples hearts is as important as the  outside; that's why often some or more of us come across like hypocrites. Compassion and love is what we need, even we encounter people with opposite values and ideas. Living out your life in a way that is helping you and others is the best way to communicate it, just religious words won't do it, changed heart and life will do.</span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="4439"></div></span></span></div><div class="nova-legacy-l-flex__item nova-legacy-l-flex nova-legacy-l-flex--gutter-m nova-legacy-l-flex--direction-row@s-up nova-legacy-l-flex--align-items-stretch@s-up nova-legacy-l-flex--justify-content-space-between@s-up nova-legacy-l-flex--wrap-wrap@s-up" data-dcnode-id="4428"><d ze-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="4391"><span data-dcnode-id="4392" instrument_node="">you are correct in this but it references one form of marriage only, the union of two people and creating thereby an idealised and ideal situation. The marriage of two people seems to have mainly come from Europe not the Middle East for example where polygamy was more normal. In Hebrew middle class marriages concubinage was normal, expected and excepted. The creation of sacred unions tends to mainly concern social and political factors. </span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="4390"></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="4388"><span data-dcnode-id="4389" instrument_node="">Your idealised version also involves female passivity and the encouragement of the same in males. The sexual promisuity of women always causes deeper and stronger reactions, even when constructed on choice.</span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="4387"></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="4385"><span data-dcnode-id="4386" instrument_node="">Males certainly have tended not to allign themselves with this ideal. </span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redr t.</span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="3776"><span data-dcnode-id="3780" instrument_node="">I will like to learn more from your life experience, I am always fascinated by people and their life story. You can reach me initially by email at: </span><a class="nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-decorated" data-dcnode-id="3778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/deref/mailto%253Ajulien%2540360holisticcoaching.com" rel="noopener" target="_blank"><span data-dcnode-id="3779" instrument_node="">julien@360holisticcoaching.com</span></a><span data-dcnode-id="3777" instrument_node=""> , and we can see which way and time works best for us to connect. </span></div></span></span></div><div class="nova-legacy-l-flex__item nova-legacy-l-flex nova-legacy-l-flex--gutter-m nova-legacy-l-flex--direction-row@s-up nova-legacy-l-flex--align-items-stretch@s-up nova-legacy-l-flex--justify-content-space-between@s-up nova-legacy-l-flex--wrap-wrap@s-up" data-dcnode-id="3765"><div class="nova-legacy-l-flex__item" data-dcnode-id="3770"><a class="nova-legacy-e-link nova-legacy-e-link--color-blue nova-legacy-e-link--theme-bare post-details__cite-link" data-dcnode-id="3771" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/post/Why_is_adultery_considered_a_sin/5fe3cc790ce762163e599b3d/citation/download"><span data-dcnode-id="3772" instrument_node="">Cite</span></a></div><div class="nova-legacy-l-flex__item" data-dcnode-id="3766"><div class="nova-legacy-o-stack__item" data-dcnode-id="3767"><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-grey-500" data-dcnode-id="3768"><span data-dcn ity-list" data-dcnode-id="3705"><div class="nova-legacy-v-activity-item__entity-list-items" data-dcnode-id="3706"><div class="nova-legacy-o-stack nova-legacy-o-stack--gutter-xs nova-legacy-o-stack--spacing-none nova-legacy-o-stack--no-gutter-outside" data-dcnode-id="3707"><div class="nova-legacy-o-stack__item" data-dcnode-id="3708"><div class="nova-legacy-v-activity-item__entity-list-item" data-dcnode-id="3709"><div class="nova-legacy-o-stack nova-legacy-o-stack--gutter-m nova-legacy-o-stack--spacing-none nova-legacy-o-stack--no-gutter-outside" data-dcnode-id="3710"><div class="nova-legacy-o-stack__item" data-dcnode-id="3719"><span data-dcnode-id="3720"><span class="Linkify" data-dcnode-id="3721"><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="3731"><span data-dcnode-id="3732" instrument_node="">Connect on here, Julien. Messages are sent through people's profiles. </span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="3730"></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="3728"><span data-dcnode-id="3729" instrument_node="">The point about use of sin is that its used to control behaviour not to understand it. Nor to understand those who desire to effect control. Already here some contributors seem to believe that chaos, societal and family, will accompany adultery and much else unless rigid controls of people are made. This can be viewed as the tool of the powerful.</span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="3727"></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="3725"><span data-dcnode-id="3726" instrument_node="">Sex is a natural act so therefore why in any of its forms is it made unnatural. I noted similar laws within Hinduism and Islam on these matters, but viewed these alongside contradictions-concubinage and polygamy for example. Agan monogamy seems to be a European trait. Also much of the morality around these matters may come from Roman culture in which marraige was protected as a legal transaction by the state.</span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="3724"></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="3722"><span data-dcnode-id="3723" instrument_node="">But in all the three examples above proscriptions mainly concerned the behaviour of women not men. Also the sacredness of marrage seems connected to the middle class or well to do.   </span></div></span></span></div><div class="nova-legacy-l-flex__item nova-legacy-l-flex nova-legacy-l-flex--gutter-m nova-legacy-l-flex--direction-row@s-up nova-legacy-l-flex--align-items-stretch@s-up nova-legacy-l-flex--justify-content-space-between@s-up nova-legacy-l-flex--wrap-wrap@s-up" data-dcnode-id="3711"><div class="nova-legacy-l-flex__item" data-dcnode-id="3716"><a class="nova-legacy-e-link nova-legacy-e-link--color-blue nova-legacy-e-link--theme-bare post-details__cite-link" data-dcnode-id="3717" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/post/Why_is_adultery_considered_a_sin/5fe3dce2d991ea4dc21db102/citation/download"><span data-dcnode-id="3718" instrument_node="">Cite</span></a></div><div class="nova-legacy-l-flex__item" data-dcnode-id="3712"><div class="nova-legacy-o-stack__item" data-dcnode-id="3713"><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-grey-500" data-dcnode-id="3714"><span data-dcnode-id="3715" instrument_node="">1 Recommendation</span></div></div></div></div></div></div></div></div></div></div></div></div></div><div class="nova-legacy-o-stack__item" data-dcnode-id="3653"><a data-dcnode-id="3701" name="view=5fe4496180e40a2ed86ef8c7"></a><div class="nova-legacy-v-activity-item" data-dcnode-id="3654"><div class="nova-legacy-v-activity-item__body" data-dcnode-id="3655"><div class="nova-legacy-v-activity-item__stack" data-dcnode-id="3679"><div class="nova-legacy-v-activity-item__stack-item" data-dcnode-id="3680"><div class="nova-legacy-l-flex__item nova-legacy-l-flex nova-legacy-l-flex--gutter-none nova-legacy-l-flex--direction-row@s-up nova-legacy-l-flex--align-items-stretch@s-up nova-legacy-l-flex--justify-content-flex-start@s-up nova-legacy-l-flex--wrap-nowrap@s-up nova-legacy-v-activity-item__story" data-dcnode-id="3681"><div class="nova-legacy-l-flex__item nova-legacy-v-activity-item__story-assets" data-dcnode-id="3692"><div class="lite-page-activity-item__asset" data-dcnode-id="3694"><a data-dcnode-id="3695" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/profile/Julien-Ghitescu"><picture class="lite-page-avatar lite-page-avatar--size-m lite-page-avatar--radius-full" data-dcnode-id="3696"><source data-dcnode-id="3700" data-srcset="https://i1.rgstatic.net/ii/profile.image/737214392709120-1552777016524_Q64_WEBP/Julien-Ghitescu.webp" type="image/webp"><source data-dcnode-id="3699" data-srcset="https://i1.rgstatic.net/ii/profile.image/737214392709120-1552777016524_Q64/Julien-Ghitescu.jpg" type="image/jpeg"><span data-dcnode-id="3698" instrument_node=""> </span><img class="lite-image" data-dcnode-id="3697" data-src="https://i1.rgstatic.net/ii/profile.image/737214392709120-1552777016524_Q64/Julien-Ghitescu.jpg" data-srcset="https://i1.rgstatic.net/ii/profile.image/737214392709120-1552777016524_Q64/Julien-Ghitescu.jpg 1x, https://i1.rgstatic.net/ii/profile.image/737214392709120-1552777016524_Q128/Julien-Ghitescu.jpg 2x" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg=="></picture></a></div><div class="nova-legacy-v-activity-item__story-asset" data-dcnode-id="3693"></div></div><div class="nova-legacy-l-flex__item nova-legacy-l-flex__item--grow nova-legacy-v-activity-item__story-content" data-dcnode-id="3682"><div class="nova-legacy-l-flex__item nova-legacy-l-flex nova-legacy-l-flex--gutter-xs nova-legacy-l-flex--direction-row@s-up nova-legacy-l-flex--align-items-center@s-up nova-legacy-l-flex--justify-content-flex-start@s-up nova-legacy-l-flex--wrap-nowrap@s-up nova-legacy-v-activity-item__context" data-dcnode-id="3688"><div class="nova-legacy-l-flex__item" data-dcnode-id="3689"><div class="nova-legacy-e-text nova-legacy-e-text--size-s nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-v-activity-item__time" data-dcnode-id="3690"><span data-dcnode-id="3691" instrument_node="">24th Dec, 2020</span></div></div></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-v-activity-item__story-subject" data-dcnode-id="3685"><a class="nova-legacy-e-link nova-legacy-e-link--color-blue nova-legacy-e-link--theme-bare gtm-profile-item" data-dcnode-id="3686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/profile/Julien-Ghitescu"><span data-dcnode-id="3687" instrument_node="">Julien Ghitescu</span></a></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-v-activity-item__story-body" data-dcnode-id="3683"><span data-dcnode-id="3684" instrument_node="">Yeditepe University</span></div></div></div></div></div><div class="nova-legacy-v-activity-item__entity-list" data-dcnode-id="3656"><div class="nova-legacy-v-activity-item__entity-list-items" data-dcnode-id="3657"><div class="nova-legacy-o-stack nova-legacy-o-stack--gutter-xs nova-legacy-o-stack--spacing-none nova-legacy-o-stack--no-gutter-outside" data-dcnode-id="3658"><div class="nova-legacy-o-stack__item" data-dcnode-id="3659"><div class="nova-legacy-v-activity-item__entity-list-item" data-dcnode-id="3660"><div class="nova-legacy-o-stack nova-legacy-o-stack--gutter-m nova-legacy-o-stack--spacing-none nova-legacy-o-stack--no-gutter-outside" data-dcnode-id="3661"><div class="nova-legacy-o-stack__item" data-dcnode-id="3670"><span data-dcnode-id="3671"><span class="Linkify" data-dcnode-id="3672"><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="3677"><span data-dcnode-id="3678" instrument_node="">Mr. Wilkin,</span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="3675"><span data-dcnode-id="3676" instrument_node="">It seems that your approach consider human beings origins in "raw" evolution, so no wonder immorality or morality are subjective for you. That view leads that the sex is not a gift to enjoy in the secure context of marriage, it is just an "animal" impulse that we can use it like eating food, in any context. But even what food do we eat makes a difference in our health. I consider that the world and people are the masterpiece of a Creator, I can see the intelligent design at every corner in nature and in people. In your view, maybe the negative forces are just the people (scientific view, that has it's limits), in the spiritual view, out there exists free will agents (human, and "angelic", besides the Creator) that can have good, neutral, or evil bended purposes. The Designer knows how the invention works at the best parameters and in the best conditions (even now we live in an imperfect context), that is why spiritual mind people are following guidance in different areas.  I also agree that it can be distorted by people, and it is very confusing and many damages, even crimes, were made by religious people in the name of the Creator, because the people took it and abused with it control. The loving and caring message of the Creator was lost many times, buried under the twists of religion.</span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="3673"><span data-dcnode-id="3674" instrument_node="">Still, are some heavy questions that need to be answered. The invisibility of such wonderful Creator, the felt passivity and distance from own creation, the suffering and inequalities in the created good but now a fallen world. But this does not  interest you in this discussion; is it too "deep"? Or is just because we operate out of the concrete scientific data? Because the set up is based on your personal views, the conclusions will favor your answers from above. :) If you don't believe in the existence of a Creator, then anything else it is the product of people, so why do what other people are saying? Yes, any guidance from religion is just a human invention to control. On this set up I agree with you, you are right. Still, the internal compass of our "hearts" follow a true north always. Ask you heart, is it adultery fair? Does it bring long lasting good to the people involved in it, or just a momentary pleasure that in the end is just deceiving and destroying people's lives? I think we said a lot of words here, interviewing people that experience it, will give us a better image. And yes, I still believe adultery (and other harming spectrum of actions) is a sin, because the definition of sin from the Creator is: sin=harming yourself and others. It is wrong (=sin) to ignore the directions of the Designer. The purpose is to protect, not to control. People took the gift they received and turn it into controlling others. We've been designed with free will, that "design" fights agains any type control. This is why it requires a relationship. </span></div></span></span></div><div class="nova-legacy-l-flex__item nova-legacy-l-flex nova-legacy-l-flex--gutter-m nova-legacy-l-flex--direction-row@s-up nova-legacy-l-flex--align-items-stretch@s-up nova-legacy-l-flex--justify-content-space-between@s-up nova-legacy-l-flex--wrap-wrap@s-up" data-dcnode-id="3662"><div class="nova-legacy-l-flex__item" data-dcnode-id="3667"><a class="nova-legacy-e-link nova-legacy-e-link--color-blue nova-legacy-e-link--theme-bare post-details__cite-link" data-dcnode-id="3668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/post/Why_is_adultery_considered_a_sin/5fe4496180e40a2ed86ef8c7/citation/download"><span data-dcnode-id="3669" instrument_node="">Cite</span></a></div><div class="nova-legacy-l-flex__item" data-dcnode-id="3663"><div class="nova-legacy-o-stack__item" data-dcnode-id="3664"><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-grey-500" data-dcnode-id="3665"><span data-dcnode-id="3666" instrument_node="">1 Recommendation</span></div></div></div></div></div></div></div></div></div></div></div></div></div><div class="nova-legacy-o-stack__item" data-dcnode-id="3598"><a data-dcnode-id="3652" name="view=5fe46e884e0ea0587e50934c"></a><div class="nova-legacy-v-activity-item" data-dcnode-id="3599"><div class="nova-legacy-v-activity-item__body" data-dcnode-id="3600"><div class="nova-legacy-v-activity-item__stack" data-dcnode-id="3630"><div class="nova-legacy-v-activity-item__stack-item" data-dcnode-id="3631"><div class="nova-legacy-l-flex__item nova-legacy-l-flex nova-legacy-l-flex--gutter-none nova-legacy-l-flex--direction-row@s-up nova-legacy-l-flex--align-items-stretch@s-up nova-legacy-l-flex--justify-content-flex-start@s-up nova-legacy-l-flex--wrap-nowrap@s-up nova-legacy-v-activity-item__story" data-dcnode-id="3632"><div class="nova-legacy-l-flex__item nova-legacy-v-activity-item__story-assets" data-dcnode-id="3643"><div class="lite-page-activity-item__asset" data-dcnode-id="3645"><a data-dcnode-id="3646" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/profile/Stanley-Wilkin"><picture class="lite-page-avatar lite-page-avatar--size-m lite-page-avatar--radius-full" data-dcnode-id="3647"><source data-dcnode-id="3651" data-srcset="https://i1.rgstatic.net/ii/profile.image/708945433858049-1546037171097_Q64_WEBP/Stanley-Wilkin.webp" type="image/webp"><source data-dcnode-id="3650" data-srcset="https://i1.rgstatic.net/ii/profile.image/708945433858049-1546037171097_Q64/Stanley-Wilkin.jpg" type="image/jpeg"><span data-dcnode-id="3649" instrument_node=""> </span><img class="lite-image" data-dcnode-id="3648" data-src="https://i1.rgstatic.net/ii/profile.image/708945433858049-1546037171097_Q64/Stanley-Wilkin.jpg" data-srcset="https://i1.rgstatic.net/ii/profile.image/708945433858049-1546037171097_Q64/Stanley-Wilkin.jpg 1x, https://i1.rgstatic.net/ii/profile.image/708945433858049-1546037171097_Q128/Stanley-Wilkin.jpg 2x" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg=="></picture></a></div><div class="nova-legacy-v-activity-item__story-asset" data-dcnode-id="3644"></div></div><div class="nova-legacy-l-flex__item nova-legacy-l-flex__item--grow nova-legacy-v-activity-item__story-content" data-dcnode-id="3633"><div class="nova-legacy-l-flex__item nova-legacy-l-flex nova-legacy-l-flex--gutter-xs nova-legacy-l-flex--direction-row@s-up nova-legacy-l-flex--align-items-center@s-up nova-legacy-l-flex--justify-content-flex-start@s-up nova-legacy-l-flex--wrap-nowrap@s-up nova-legacy-v-activity-item__context" data-dcnode-id="3639"><div class="nova-legacy-l-flex__item" data-dcnode-id="3640"><div class="nova-legacy-e-text nova-legacy-e-text--size-s nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-v-activity-item__time" data-dcnode-id="3641"><span data-dcnode-id="3642" instrument_node="">24th Dec, 2020</span></div></div></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-v-activity-item__story-subject" data-dcnode-id="3636"><a class="nova-legacy-e-link nova-legacy-e-link--color-blue nova-legacy-e-link--theme-bare gtm-profile-item" data-dcnode-id="3637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/profile/Stanley-Wilkin"><span data-dcnode-id="3638" instrument_node="">Stanley Wilkin</span></a></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-v-activity-item__story-body" data-dcnode-id="3634"><span data-dcnode-id="3635" instrument_node="">University of London</span></div></div></div></div></div><div class="nova-legacy-v-activity-item__entity-list" data-dcnode-id="3601"><div class="nova-legacy-v-activity-item__entity-list-items" data-dcnode-id="3602"><div class="nova-legacy-o-stack nova-legacy-o-stack--gutter-xs nova-legacy-o-stack--spacing-none nova-legacy-o-stack--no-gutter-outside" data-dcnode-id="3603"><div class="nova-legacy-o-stack__item" data-dcnode-id="3604"><div class="nova-legacy-v-activity-item__entity-list-item" data-dcnode-id="3605"><div class="nova-legacy-o-stack nova-legacy-o-stack--gutter-m nova-legacy-o-stack--spacing-none nova-legacy-o-stack--no-gutter-outside" data-dcnode-id="3606"><div class="nova-legacy-o-stack__item" data-dcnode-id="3611"><span data-dcnode-id="3612"><span class="Linkify" data-dcnode-id="3613"><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="3628"><span data-dcnode-id="3629" instrument_node="">Julien, you appear to speak for the Creator but it seems odd to me that you wish to impose so much baggage onto what he, she, it creates within ideals of human exceptionality and wonder.</span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="3627"></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="3625"><span data-dcnode-id="3626" instrument_node="">The truth is I am not looking at this from a subjective point as I do not care sufficiently one way or the other and I am not sure what you believe my subjective point to be. If I have a point, it is the contradictions within the evaluation of adultery as a bad thing in line with the cultures determining it is a bad thing. And how a bad thing is distorted into a sin in people's eyes. Religious viewpoints are cultural or historical viewpoints and are therefore one amongst many viewpoints. That adultery harms seems reasonable but again conjectured within a specific absolute outlook based upon conceptions of design-as if humanbeings were adidas trainers.</span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="3624"></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="3622"><span data-dcnode-id="3623" instrument_node="">So far I gather 'god said' is one argument.</span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="3620"><span data-dcnode-id="3621" instrument_node="">You present the idealistic view based on the exceptionality of human beings contstucted  on Catholic assumptions on human nature. A celibate base perhaps?</span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="3618"><span data-dcnode-id="3619" instrument_node="">Others imply chaos will occur or does occur whenever an adulterous act occurs, if an adulterous act affects male privilege.  </span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="3616"><span data-dcnode-id="3617" instrument_node="">As adulerous acts have in the past been severely punished, and even perhaps in the present are, within environmernts of concubinage, male privilege seems the most employed argument.</span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="3614"><span data-dcnode-id="3615" instrument_node="">Sex as an uncontrollable, potentially sinful process another. The arguments by and large are archaic, placing human situations within medieval architectual tropes of human behaviour. </span></div></span></span></div><div class="nova-legacy-l-flex__item nova-legacy-l-flex nova-legacy-l-flex--gutter-m nova-legacy-l-flex--direction-row@s-up nova-legacy-l-flex--align-items-stretch@s-up nova-legacy-l-flex--justify-content-space-between@s-up nova-legacy-l-flex--wrap-wrap@s-up" data-dcnode-id="3607"><div class="nova-legacy-l-flex__item" data-dcnode-id="3608"><a class="nova-legacy-e-link nova-legacy-e-link--color-blue nova-legacy-e-link--theme-bare post-details__cite-link" data-dcnode-id="3609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/post/Why_is_adultery_considered_a_sin/5fe46e884e0ea0587e50934c/citation/download"><span data-dcnode-id="3610" instrument_node="">Cite</span></a></div></div></div></div></div></div></div></div></div></div></div><div class="nova-legacy-o-stack__item" data-dcnode-id="3522"><a data-dcnode-id="3597" name="view=5fe4acb446c3c4709f3b6496"></a><div class="nova-legacy-v-activity-item" data-dcnode-id="3523"><div class="nova-legacy-v-activity-item__body" data-dcnode-id="3524"><div class="nova-legacy-v-activity-item__stack" data-dcnode-id="3575"><div class="nova-legacy-v-activity-item__stack-item" data-dcnode-id="3576"><div class="nova-legacy-l-flex__item nova-legacy-l-flex nova-legacy-l-flex--gutter-none nova-legacy-l-flex--direction-row@s-up nova-legacy-l-flex--align-items-stretch@s-up nova-legacy-l-flex--justify-content-flex-start@s-up nova-legacy-l-flex--wrap-nowrap@s-up nova-legacy-v-activity-item__story" data-dcnode-id="3577"><div class="nova-legacy-l-flex__item nova-legacy-v-activity-item__story-assets" data-dcnode-id="3588"><div class="lite-page-activity-item__asset" data-dcnode-id="3590"><a data-dcnode-i 0</span></div></div></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-v-activity-item__story-subject" data-dcnode-id="3581"><a class="nova-legacy-e-link nova-legacy-e-link--color-blue nova-legacy-e-link--theme-bare gtm-profile-item" data-dcnode-id="3582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/profile/Stanley-Wilkin"><span data-dcnode-id="3583" instrument_node="">Stanley Wilkin</span></a></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-v-activity-item__story-body" data-dcnode-id="3579"><span data-dcnode-id="3580" instrument_node="">University of London</span></div></div></div></div></div><div class="nova-legacy-v-activity-item__entity-list" data-dcnode-id="3525"><div class="nova-legacy-v-activity-item__entity-list-items" data-dcnode-id="3526"><div class="nova-legacy-o-stack nova-legacy-o-stack--gutter-xs nova-legacy-o-stack--spacing-none nova-legacy-o-stack--no-gutter-outside" data-dcnode-id="3527"><div class="nova-legacy-o-stack__item" data-dcnode-id="3528"><div class="nova-legacy-v-activity-item__entity-list-item" data-dcnode-id="3529"><div class="nova-legacy-o-stack nova-legacy-o-stack--gutter-m nova-legacy-o-stack--spacing-none nova-legacy-o-stack--no-gutter-outside" data-dcnode-id="3530"><div class="nova-legacy-o-stack__item" data-dcnode-id="3535"><span data-dcnode-id="3536"><span class="Linkify" data-dcnode-id="3537"><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="3573"><span data-dcnode-id="3574" instrument_node="">Thanks Michael. Interesting stuff. Is it for both sexes. I thought I'd present material from Hinduism, but this could have come from Islam, aspects of Christianity and Judaism. In religious laws patriarchies rule:</span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="3571"><span data-dcnode-id="3572" instrument_node=""> </span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="3570"></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="3567"><i data-dcnode-id="3568"><span data-dcnode-id="3569" instrument_node="">Day and night woman must be kept in dependence by the males (of) their (families), and, if they attach themselves to sensual enjoyments, they must be kept under one's control. - Manusmriti</span></i></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="3564"><i data-dcnode-id="3565"><span data-dcnode-id="3566" instrument_node="">Her father protects her in childhood, her husband protects her in youth, and her sons protect her in old age; a woman is never fit for independence. - Manusmriti</span></i></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="3560"><span data-dcnode-id="3563" instrument_node="">When creating them Manu allotted to women a love of their bed, of their seat and of ornament, impure desires, wrath, dishonesty, malice, and bad conduct. </span><i data-dcnode-id="3561"><span data-dcnode-id="3562" instrument_node="">- Manusmriti (Ancient Hindu Law)</span></i></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="3559"></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="3554"><span data-dcnode-id="3558" instrument_node="">Interesting stuff.</span><i data-dcnode-id="3556"><span data-dcnode-id="3557" instrument_node=""> </span></i><span data-dcnode-id="3555" instrument_node="">Clearly written by a man. </span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="3553"></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="3551"><span data-dcnode-id="3552" instrument_node="">And- </span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="3548"><b data-dcnode-id="3549"><span data-dcnode-id="3550" instrument_node="">The Traditional View</span></b></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="3546"><span data-dcnode-id="3547" instrument_node="">Hindu law books are very severe against adultery, not only for moral reasons but also for social reasons. They consider that it would lead to confusion of castes, degradation of family values and social disorder. In olden days women from upper castes were barred from moving in society freely.</span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="3544"><span data-dcnode-id="3545" instrument_node="">Literary evidence suggests that ancient Hindu society was not free from the problem of adultery. Historically, Hindu women attracted more condemnation and ostracization for adulterous relationships. The punishments were also severe in their case. An adulterous woman was called patita, meaning a fallen or abandoned woman, an outcast or a woman who fell from the grace of her husband (pati). Another epithet was kulata, meaning an unchaste woman or a woman who degraded the good name of the family (kula) and her husband.</span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="3543"></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="3538"><b data-dcnode-id="3539"><span data-dcnode-id="3542" instrument_node="">The focus of adultery was on women as elsewhere the writer discusses male polygamy and if rich practically everything else. These extracts do not of course discuss situations but only the actions of women. </span><a class="nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-decorated" data-dcnode-id="3540" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/deref/https%253A//www.hinduwebsite.com/hinduism/h_extramarital.asp" rel="noopener" target="_blank"><span data-dcnode-id="3541" instrument_node="">https://www.hinduwebsite.com/hinduism/h_extramarital.asp</span></a></b></div></span></span></div><div class="nova-legacy-l-flex__item nova-legacy-l-flex nova-legacy-l-flex--gutter-m nova-legacy-l-flex--direction-row@s-up nova-legacy-l-flex--align-items-stretch@s-up nova-legacy-l-flex--justify-content-space-between@s-up nova-legacy-l-flex--wrap-wrap@s-up" data-dcnode-id="3531"><div class="nova-legacy-l-flex__item" data-dcnode-id="3532"><a class="nova-legacy-e-link nova-legacy-e-link--color-blue nova-legacy-e-link--theme-bare post-details__cite-link" data-dcnode-id="3533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/post/Why_is_adultery_considered_a_sin/5fe4acb446c3c4709f3b6496/citation/download"><span data-dcnode-id="3534" instrument_node="">Cite</span></a></div></div></div></div></div></div></div></div></div></div></div><div class="nova-legacy-o-stack__item" data-dcnode-id="3477"><a data-dcnode-id="3521" name="view=5fe4b3d592f885673840521d"></a><div class="nova-legacy-v-activity-item" data-dcnode-id="3478"><div class="nova-legacy-v-activity-item__body" data-dcnode-id="3479"><div class="nova-legacy-v-activity-item__stack" data-dcnode-id="3499"><div class="nova-legacy-v-activity-item__stack-item" data-dcnode-id="3500"><div class="nova-legacy-l-flex__item nova-legacy-l-flex nova-legacy-l-flex--gutter-none nova-legacy-l-flex--direction-row@s-up nova-legacy-l-flex--align-items-stretch@s-up nova-legacy-l-flex--justify-content-flex-start@s-up nova-legacy-l-flex--wrap-nowrap@s-up nova-legacy-v-activity-item__story" data-dcnode-id="3501"><div class="nova-legacy-l-flex__item nova-legacy-v-activity-item__story-assets" data-dcnode-id="3512"><div class="lite-page-activity-item__asset" data-dcnode-id="3514"><a data-dcnode-id="3515" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/profile/Julien-Ghitescu"><picture class="lite-page-avatar lite-page-avatar--size-m lite-page-avatar--radius-full" data-dcnode-id="3516"><source data-dcnode-id="3520" data-srcset="https://i1.rgstatic.net/ii/profile.image/737214392709120-1552777016524_Q64_WEBP/Julien-Ghitescu.webp" typ family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="3358"><span data-dcnode-id="3359" instrument_node="">Mohammad, do you think? I doubt it.</span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="3357"></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="3355"><span data-dcnode-id="3356" instrument_node="">I do not know what you consider a true society but I suspect I would not like it or think much of it. Quite how can adultery, an act between two people in private, have such wide consequences? Nevertheless, the idea that society is structured upon the family is an eastern one that really bears little scrutiny. It creates stasis and conformity. Is that a bad thing? Well it limits all those who are part of such societies, making them automatons, without flexibility and abstract cognition. Or does it? </span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="3354"></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="3352"><span data-dcnode-id="3353" instrument_node="">Are these patriarchal societies based on conformity? No one stands out except the wealthy? Perhaps.</span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="3351"></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-leg adultery. In each case adultery largely referenced the behaviour of women, not men. In Athens for example some symposiums included prostitutes. </span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="3256"></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="3254"><span data-dcnode-id="3255" instrument_node="">The subject is extensive surely?  </span></div></span></span></div><div class="nova-legacy-l-flex__item nova-legacy-l-flex nova-legacy-l-flex--gutter-m nova-legacy-l-flex--direction-row@s-up nova-legacy-l-flex--align-items-stretch@s-up nova-legacy-l-flex--justify-content-space-between@s-up nova-legacy-l-flex--wrap-wrap@s-up" data-dcnode-id="3247"><div class="nova-legacy-l-flex__item" data-dcnode-id="3248"><a class="nova-legacy-e-link nova-legacy-e-link--color-blue nova-legacy-e-link--theme-bare post-details__cite-link" data-dcnode-id="3249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/post/Why_is_adultery_considered_a_sin/5fe4d9206d1e2c670a786b4e/citation/download"><span data-dcnode-id="3250" instrument_node="">Cite</span></a></div></div></div></div></div></div></div></div></div></div></div><div class="nova-legacy-o-stack__item" data-dcnode-id="3197"><a data-dcnode-id="3237" name="view=5fe4ebc0a03550405e4bea85"></a><div class="nova-legacy-v-activity-item" data-dcnode-id="3198"><div class="nova-legacy-v-activity-item__body" data-dcnode-id="3199"><div class="nova-legacy-v-activity-item__stack" data-dcnode-id="3215"><div class="nova-legacy-v-activity-item__stack-item" data-dcnode-id="3216"><div class="nova-legacy-l-flex__item nova-legacy-l-flex nova-legacy-l-flex--gutter-none nova-legacy-l-flex--direction-row@s-up nova-legacy-l y-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="3119"><span data-dcnode-id="3120" instrument_node="">Mr. Amor, and also Mr. Wilkin</span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="3117"><span data-dcnode-id="3118" instrument_node="">your counter example to me looks like prostitution culturally "legalized".</span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="3115"><span data-dcnode-id="3116" instrument_node="">Generally men, being in power, historically abused the women.</span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="3113"><span data-dcnode-id="3114" instrument_node="">If you ask a women if she wants to have sex with the friends of her future husband before marriage, I doubt that is her desire. Does she have a choice? Adultery it is another category, where the loyalty and love of the husband for a wife (men are probably statistically more involved in adultery than women), or of the wife for the husband doesn't exist anymore, or it is seriously damaged. Another factor can be the low moral values in their lives. </span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="3111"><span data-dcnode-id="3112" instrument_node="">When I grew up I worked for one year in a locomotives repairing garage, being the youngest among other mechanics, mostly all married. They said: "I will be so stupid to not have sex with any women I have chance to.". I doubt they will say that in the face of their wife and agree for their wives to do the same like them. </span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="3109"><span data-dcnode-id="3110" instrument_node="">What do we see here? Even if we don't mention the word sin. </span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="3107"><span data-dcnode-id="3108" instrument_node="">We see lack of love and commitment, injustice and inequality, and a lot of selfishness. That is what adultery promotes. Are you teaching your children boys or girls to marry, and then tell them (like in this discussion group): It is ok my child go ahed and do adultery. Will you teach them that?</span></div></span></span></div><div class="nova-legacy-l-flex__item nova-legacy-l-flex nova-legacy-l-flex--gutter-m nova-legacy-l-flex--direction-row@s-up nova-legacy-l-flex--align-items-stretch@s-up nova-legacy-l-flex--justify-content-space-between@s-up nova-legacy-l-flex--wrap-wrap@s-up" data-dcnode-id="3096"><div class="nova-legacy-l-flex__item" data-dcnode-id="3101"><a class="nova-legacy-e-link nova-legacy-e-link--color-blue nova-legacy-e-link--theme-bare post-details__cite-link" data-dcnode-id="3102" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/post/Why_is_adultery_considered_a_sin/5fe4f455709fdf3a5766ead2/citation/download"><span data-dcnode-id="3103" instrument_node="">Cite</span></a></div><div class="nova-legacy-l-flex__item" data-dcnode-id="3097"><div class="nova-legacy-o-stack__item" data-dcnode-id="3098"><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nov tivity-item__story-content" data-dcnode-id="2932"><div class="nova-legacy-l-flex__item nova-legacy-l-flex nova-legacy-l-flex--gutter-xs nova-legacy-l-flex--direction-row@s-up nova-legacy-l-flex--align-items-center@s-up nova-legacy-l-flex--justify-content-flex-start@s-up nova-legacy-l-flex--wrap-nowrap@s-up nova-legacy-v-activity-item__context" data-dcnode-id="2938"><div class="nova-legacy-l-flex__item" data-dcnode-id="2939"><div class="nova-legacy-e-text nova-legacy-e-text--size-s nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-v-activity-item__time" data-dcnode-id="2940"><span data-dcnode-id="2941" instrument_node="">25th Dec, 2020</span></div></div></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-v-activity-item__story-subject" data-dcnode-id="2935"><a class="nova-legacy-e-link nova-legacy-e-link--color-blue nova-legacy-e-link--theme-bare gtm-profile-item" data-dcnode-id="2936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/profile/Julien-Ghitescu"><span data-dcnode-id="2937" instrument_node="">Julien Ghitescu</span></a></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-v-activity-item__story-body" data-dcnode-id="2933"><span data-dcnode-id="2934" instrument_node="">Yeditepe University</span></div></div></div></div></div><div class="nova-legacy-v-activity-item__entity-list" data-dcnode-id="2894"><div class="nova-legacy-v-activity-item__entity-list-items" data-dcnode-id="2895"><div class="nova-legacy-o-stack nova-legacy-o-stack--gutter-xs nova-legacy-o-stack--spacing-none nova-legacy-o-stack--no-gutter-outside" data-dcnode-id="2896"><div class="nova-legacy-o-stack__item" data-dcnode-id="2897"><div class="nova-legacy-v-activity-item__entity-list-item" data-dcnode-id="2898"><div class="nova-legacy-o-stack nova-legacy-o-stack--gutter-m nova-legacy-o-stack--spacing-none nova-legacy-o-stack--no-gutter-outside" data-dcnode-id="2899"><div class="nova-legacy-o-stack__item" data-dcnode-id="2908"><span data-dcnode-id="2909"><span class="Linkify" data-dcnode-id="2910"><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="2925"><span data-dcnode-id="2928" instrument_node="">Samoa of Margaret Mead it doesn't match the real Samoa's "sexual" culture, she grossly  misrepresent it. </span><a class="nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-decorated" data-dcnode-id="2926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/deref/https%253A//www.youtube.com/watch%253Fv%253DGOCYhmnx6o8" rel="noopener" target="_blank"><span data-dcnode-id="2927" instrument_node="">https://www.youtube.com/watch?v=GOCYhmnx6o8</span></a></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="2923"><span data-dcnode-id="2924" instrument_node="">I am disappointed in this discussion that it have just one way Mr. Wilkin, you don't answer the questions I ask you.</span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="2921"><span data-dcnode-id="2922" instrument_node="">So here it is, if crime is something that is relative and people should have no remorse, restriction, or consequences in choosing it, you lose all the credibility in this discussion, as it is clear that in that kind of society violence and destruction will rise. </span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="2919"><span data-dcnode-id="2920" instrument_node="">If you will answer that crime is not acceptable, and that is the truth that crime is something that damage people, so it is wrong, bad, evil, sin, etc. (any word that fit), I will ask you on what base you state this? Where is your standard coming from? In this case you do follow a "law", a truth, and you cant be relativistic in the matter.</span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="2917"><span data-dcnode-id="2918" instrument_node="">So, if you have a standard of considering crime something unacceptable because of destroying and taking away people's lives, we also can use the same standard to consider adultery as negative (wrong, bad, evil, sin, etc.), a destroying relationships and family action.</span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="2915"><span data-dcnode-id="2916" instrument_node="">By definition adultery is something that involves a person that is married.</span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="2913"><span data-dcnode-id="2914" instrument_node="">In the philosophy that you Mr. Wilkin displayed it is missing your concepts of marriage and what is a family, why form a family?</span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="2911"><span data-dcnode-id="2912" instrument_node="">After you define what a family is, we can discuss finally how adultery affects it. If for you family are just people together in "cohabitation", I can see how adultery (that is a misused word in this case) have a relative place. If you don't want to state out what a family is, the discussion doesn't have a base to build on, we are just losing our time.</span></div></span></span></div><div class="nova-legacy-l-flex__item nova-legacy-l-flex nova-legacy-l-flex--gutter-m nova-legacy-l-flex--direction-row@s-up nova-legacy-l-flex--align-items-stretch@s-up nova-legacy-l-flex--justify-content-space-between@s-up nova-legacy-l-flex--wrap-wrap@s-up" data-dcnode-id="2900"><div class="nova-legacy-l-flex__item" data-dcnode-id="2905"><a class="nova-legacy-e-link nova-legacy-e-link--color-blue nova-legacy-e-link--theme-bare post-details__cite-link" data-dcnode-id="2906" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/post/Why_is_adultery_considered_a_sin/5fe5a3f34654734a25373734/citation/download"><span data-dcnode-id="2907" instrument_node="">Cite</span></a></div><div class="nova-legacy-l-flex__item" data-dcnode-id="2901"><div class="nova-legacy-o-stack__item" data-dcnode-id="2902"><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-grey-500" data-dcnode-id="2903"><span data-dcnode-id="2904" instrument_node="">1 Recommendation</span></div></div></div></div></div></div></div></div></div></div></div></div></div><div class="nova-legacy-o-stack__item" data-dcnode-id="2841"><a data-dcnode-id="2890" name="view=5fe5acfb8089cc587229ad60"></a><div class="nova-legacy-v-activity-item" data-dcnode-id="2842"><div class="nova-legacy-v-activity-item__body" data-dcnode-id="2843"><div class="nova-legacy-v-activity-item__stack" data egacy-l-flex--gutter-xs nova-legacy-l-flex--direction-row@s-up nova-legacy-l-flex--align-items-center@s-up nova-legacy-l-flex--justify-content-flex-start@s-up nova-legacy-l-flex--wrap-nowrap@s-up nova-legacy-v-activity-item__context" data-dcnode-id="2877"><div class="nova-legacy-l-flex__item" data-dcnode-id="2878"><div class="nova-legacy-e-text nova-legacy-e-text--size-s nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-v-activity-item__time" data-dcnode-id="2879"><span data-dcnode-id="2880" instrument_node="">25th Dec, 2020</span></div></div></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-v-activity-item__story-subject" data-dcnode-id="2874"><a class="nova-legacy-e-link nova-legacy-e-link--color-blue nova-legacy-e-link--theme-bare gtm-profile-item" data-dcnode-id="2875" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/profile/Stanley-Wilkin"><span data-dcnode-id="2876" instrument_node="">Stanley Wilkin</span></a></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-v-activity-item__story-body" data-dcnode-id="2872"><span data-dcnode-id="2873" instrument_node="">University of London</span></div></div></div></div></div><div class="nova-legacy-v-activity-item__entity-list" data-dcnode-id="2844"><div class="nova-legacy-v-activity-item__entity-list-items" data-dcnode-id="2845"><div class="nova-legacy-o-stack nova-legacy-o-stack--gutter-xs nova-legacy-o-stack--spacing-none nova-legacy-o-stack--no-gutter-outside" data-dcnode-id="2846"><div class="nova-legacy-o-stack__item" data-dcnode-id="2847"><div class="nova-legacy-v-activity-item__entity-list-item" data-dcnode-id="2848"><div class="nova-legacy-o-stack nova-legacy-o-stack--gutter-m nova-legacy-o-stack--spacing-none nova-legacy-o-stack--no-gutter-outside" data-dcnode-id="2849"><div class="nova-legacy-o-stack__item" data-dcnode-id="2854"><span data-dcnode-id="2855"><span class="Linkify" data-dcnode-id="2856"><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="2866"><span data-dcnode-id="2867" instrument_node="">I defined my position on this. Using absolutes where adultery is concerned is not helpful. Try, please, and avoid involving other forms of behaviour as if all were the same. While I can understand the emotional violence that occurs in adultery it cannot be placed in the same understanding as actual violence. The violence of adultery is dependent on cultural positions and reception, not merely the act or acts alone. </span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="2865"></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="2863"><span data-dcnode-id="2864" instrument_node="">If difficulties are placed within learning paradigms, pain is considerably lessened. If within paradigms of sin the pain is dealt with through punishment that stills discussion, thought and understanding.  You do appear to connect emotional episodes with physical violence, and I wonder why. </span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="2862"></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="2860"><span data-dcnode-id="2861" instrument_node="">The breakup of families can occur upon adultery by one partner or another. Nevertheless cultural understanding permeates the results of these actions and responses are liable to cultural determinants. The acts themselves become symbolic of other acts and invested with greater power.</span></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="2859"></div><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit redraft-text" data-dcnode-id="2857"><span data-dcnode-id="2858" instrument_node="">On here that can be seen as involving a public arena where notions of behaviour are extrapolated back in time, occasion destruction to the polity, culture or religion. These are unrealistic outcomes and tend to serve special interests, usually religion. They do not reflect real relationships, the episodic nature of relationships in general. Destructive acts (as per your definition) do not occur outside of other acts, and do not embrace isolated experiences constructed upon external mythical forces.  </span></div></span></span></div><div class="nova-legacy-l-flex__item nova-legacy-l-flex nova-legacy-l-flex--gutter-m nova-legacy-l-flex--direction-row@s-up nova-legacy-l-flex--align-items-stretch@s-up nova-legacy-l-flex--justify-content-space-between@s-up nova-legacy-l-flex--wrap-wrap@s-up" data-dcnode-id="2850"><div class="nova-legacy-l-flex__item" data-dcnode-id="2851"><a class="nova-legacy-e-link nova-legacy-e-link--color-blue nova-legacy-e-link--theme-bare post-details__cite-link" data-dcnode-id="2852" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/post/Why_is_adultery_considered_a_sin/5fe5acfb8089cc587229ad60/citation/download"><span data-dcnode-id="2853" instrument_node="">Cite</span></a></div></div></div></div></div></div></div></div></div></div></div><div class="nova-legacy-o-stack__item" data-dcnode-id="2784"><a data-dcnode-id="2840" name="view=5fe5b04d32340f02ca345835"></a><div class="nova-legacy-v-activity-item" data-dcnode-id="2785"><div class="nova-legacy-v-activity-item__body" data-dcnode-id="2786"><div class="nova-legacy-v-activity-item__stack" data-dcnode-id="2818"><div class="nova-legacy-v-activity-item__stack-item" data-dcnode-id="2819"><div class="nova-legacy-l-flex__item nova-legacy-l-flex nova-legacy-l-flex--gutter-none nova-legacy-l-flex--direction-row@s-up nova-legacy-l-flex--align-items-stretch@s-up nova-legacy-l-flex--justify-content-flex-start@s-up nova-legacy-l-flex--wrap-nowrap@s-up nova-legacy-v-activity-item__story" data-dcnode-id="2820"><div class="nova-legacy-l-flex__item nova-legacy-v-activity-item__story-assets" data-dcnode-id="2831"><div class="lite-page-activity-item__asset" data-dcnode-id="2833"><a data-dcnode-id="2834" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/profile/Stanley-Wilkin"><picture class="lite-page-avatar lite-page-avatar--size-m lite-page-avatar--radius-full" data-dcnode-id="2835"><source data-dcnode-id="2839" data-srcset="https://i1.rgstatic.net/ii/profile.image/708945433858049-1546037171097_Q64_WEBP/Stanley-Wilkin.webp" type="image/webp"><source data-dcnode-id="2838" data-srcset="https://i1.rgstatic.net/ii/profile.image/708945433858049-1546037171097_Q64/Stanley-Wilkin.jpg" type="image/jpeg"><span data-dcnode-id="2837" instrument_node=""> </span><img class="lite-image" data-dcnode-id="2836" data-src="https://i1.rgstatic.net/ii/profile.image/708945433858049-1546037171097_Q64/Stanley-Wilkin.jpg" data-srcset="https://i1.rgstatic.net/ii/profile.image/708945433858049-1546037171097_Q64/Stanley-Wilkin.jpg 1x, https://i1.rgstatic.
