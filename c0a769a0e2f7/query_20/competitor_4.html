ment_node="">, 2008, 455 pp.</span></li><li data-dcnode-id="6700"><span data-dcnode-id="6704" instrument_node="">SASSÒLI Marco, “The Concept of Security in International Law Relating to Armed Conflicts”, in BAILLIET Cécilia M., </span><em data-dcnode-id="6702"><span data-dcnode-id="6703" instrument_node="">Security: a Multidisciplinary Normative Approach</span></em><span data-dcnode-id="6701" instrument_node="">, Leiden, Boston, M. Nijhoff, 2009, pp. 7-23.</span></li><li data-dcnode-id="6695"><span data-dcnode-id="6699" instrument_node="">VERHOVEN Sten, “A Missed Opportunity to Clarify the Modern Ius ad Bellum: Case Concerning Armed Activity on the Territory of the Congo”, in </span><em data-dcnode-id="6697"><span data-dcnode-id="6698" instrument_node="">Revue de droit militaire et de droit de la guerre</span></em><span data-dcnode-id="6696" instrument_node="">, Vol. 3-4, No 45, 2006, pp. 355-368.</span></li></ul></div><h4 data-dcnode-id="6685"><a class="nohref" data-dcnode-id="6692" id="b_ii_2" name="b_ii_2"></a><span data-dcnode-id="6691" instrument_node="">&nbsp;2. &nbsp; The complete separation between </span><em data-dcnode-id="6689"><span data-dcnode-id="6690" instrument_node="">jus ad bellum</span></em><span data-dcnode-id="6688" instrument_node=""> and </span><em data-dcnode-id="6686"><span data-dcnode-id="6687" instrument_node="">jus in bello</span></em></h4><p data-dcnode-id="6679"><abbr data-dcnode-id="6682" title="Protocol Additional to the Geneva Conventions of 12 August 1949, and Relating to the Protection of Victims of International Armed Conflicts, of 8 June 1977"><a data-dcnode-id="6683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icrc.org/applic/ihl/ihl.nsf/Article.xsp%3Faction%3DopenDocument%26documentId%3D6914DC326D41B1EFC12563CD0051D618"><span data-dcnode-id="6684" instrument_node="">P I</span></a></abbr><a data-dcnode-id="6680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icrc.org/applic/ihl/ihl.nsf/Article.xsp%3Faction%3DopenDocument%26documentId%3D6914DC326D41B1EFC12563CD0051D618"><span data-dcnode-id="6681" instrument_node="">, Preamble, para. 5</span></a></p><blockquote data-dcnode-id="6643"><p data-dcnode-id="6676"><strong data-dcnode-id="6677"><span data-dcnode-id="6678" instrument_node="">Quotation</span></strong></p><p data-dcnode-id="6674"><span data-dcnode-id="6675" instrument_node="">PUBLIC LAW II – International Law</span></p><p data-dcnode-id="6672"><span data-dcnode-id="6673" instrument_node="">Paragraph 53:</span></p><p data-dcnode-id="6667"><span data-dcnode-id="6671" instrument_node="">[...] The public Right of </span><em data-dcnode-id="6669"><span data-dcnode-id="6670" instrument_node="">States</span></em><span data-dcnode-id="6668" instrument_node=""> [...] in their relations to one another, is what we have to consider under the designation of the Right of Nations. Wherever a State, viewed as a Moral Person, acts in relation to another existing in the condition of natural freedom, and consequently in a state of continual war, such Right takes its rise.</span></p><p data-dcnode-id="6656"><span data-dcnode-id="6666" instrument_node="">The Right of Nations in relation to the State of War may be divided into: 1. The Right of </span><em data-dcnode-id="6664"><span data-dcnode-id="6665" instrument_node="">going to War</span></em><span data-dcnode-id="6663" instrument_node="">; 2. Right </span><em data-dcnode-id="6661"><span data-dcnode-id="6662" instrument_node="">during</span></em><span data-dcnode-id="6660" instrument_node=""> War; and 3. Right </span><em data-dcnode-id="6658"><span data-dcnode-id="6659" instrument_node="">after</span></em><span data-dcnode-id="6657" instrument_node=""> War, the object of which is to constrain the nations mutually to pass from this state of war, and to found a common Constitution establishing Perpetual Peace. [...] Paragraph 57:</span></p><p data-dcnode-id="6651"><span data-dcnode-id="6655" instrument_node="">The determination of what constitutes Right in War is the most difficult problem of the Right of Nations and International Law. It is difficult even to form a conception of such a Right, or to think of any Law in this lawless state without falling into a contradiction. </span><em data-dcnode-id="6653"><span data-dcnode-id="6654" instrument_node="">Inter arma</span></em><span data-dcnode-id="6652" instrument_node=""> silent leges. It must then be just the right to carry on War according to such principles as render it always still possible to pass out of that natural condition of states in their external relations to each other, and to enter into a condition of Right.</span></p><span data-dcnode-id="6650" instrument_node="">[</span><strong data-dcnode-id="6648"><span data-dcnode-id="6649" instrument_node="">Source</span></strong><span data-dcnode-id="6647" instrument_node="">: Kant, I., </span><em data-dcnode-id="6645"><span data-dcnode-id="6646" instrument_node="">The Philosophy of Law. An Exposition of the Fundamental Principles of Jurisprudence as the Science of Right</span></em><span data-dcnode-id="6644" instrument_node="">. Translated from the German by W. Hastie BD, Edinburgh, 1887, paras 53 &amp; 57]</span></blockquote><h4 class="casesdocheader" data-dcnode-id="6641"><span data-dcnode-id="6642" instrument_node="">CASES AND DOCUMENTS</span></h4><div class="beigebox" data-dcnode-id="6607"><ul data-dcnode-id="6608"><li data-dcnode-id="6635"><a data-dcnode-id="6636" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/france-accession-protocol-i%23part_b_para_1"><span data-dcnode-id="6640" instrument_node="">France, Accession to </span><abbr data-dcnode-id="6638" title="Protocol Additional to the Geneva Conventions of 12 August 1949, and Relating to the Protection of Victims of International Armed Conflicts, of 8 June 1977"><span data-dcnode-id="6639" instrument_node="">Protocol I</span></abbr><span data-dcnode-id="6637" instrument_node=""> [Part B., para. 1]</span></a></li><li data-dcnode-id="6630"><a data-dcnode-id="6631" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/united-kingdom-and-australia-applicability-protocol-i" title=""><span data-dcnode-id="6634" instrument_node="">United Kingdom and Australia, Applicability of </span><abbr data-dcnode-id="6632" title="Protocol Additional to the Geneva Conventions of 12 August 1949, and Relating to the Protection of Victims of International Armed Conflicts, of 8 June 1977"><span data-dcnode-id="6633" instrument_node="">Protocol I</span></abbr></a></li><li data-dcnode-id="6627"><a data-dcnode-id="6628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/united-states-military-tribunal-nuremberg-united-states-v-wilhelm-list" title=""><span data-dcnode-id="6629" instrument_node="">United States Military Tribunal at Nuremberg, United States v. Wilhelm List [Part B.]</span></a></li><li data-dcnode-id="6624"><a data-dcnode-id="6625" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/inter-american-commission-human-rights-tablada%23para_173"><span data-dcnode-id="6626" instrument_node="">Inter-American Commission on Human Right, Tablada [Para. 173]</span></a></li><li data-dcnode-id="6612"><a data-dcnode-id="6620" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/icj-democratic-republic-congouganda-armed-activities-territory-congo" title=""><abbr data-dcnode-id="6622" title="International Court of Justice "><span data-dcnode-id="6623" instrument_node="">ICJ</span></abbr><span data-dcnode-id="6621" instrument_node="">, Democratic Republic of the Congo/Uganda, Armed Activities on the Territory of the Congo</span></a><span data-dcnode-id="6619" instrument_node=""> [</span><a data-dcnode-id="6617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/icj-democratic-republic-congouganda-armed-activities-territory-congo%23judgement_para_345"><span data-dcnode-id="6618" instrument_node="">Judgement, para. 345(1)</span></a><span data-dcnode-id="6616" instrument_node="">; </span><a data-dcnode-id="6614" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/icj-democratic-republic-congouganda-armed-activities-territory-congo%23separate_para_55"><span data-dcnode-id="6615" instrument_node="">Separate opinion, paras 55-63</span></a><span data-dcnode-id="6613" instrument_node="">]</span></li><li data-dcnode-id="6609"><a data-dcnode-id="6610" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/georgiarussia-independent-international-fact-finding-mission-conflict-south-ossetia%23para_26"><span data-dcnode-id="6611" instrument_node="">Georgia/Russia, Independent International Fact-Finding Mission on the Conflict in South Ossetia [Para. 26]</span></a></li></ul></div><ol data-dcnode-id="6600" type="a"><li data-dcnode-id="6601"><a class="nohref" data-dcnode-id="6606" id="b_ii_2_a" name="b_ii_2_a"></a><strong data-dcnode-id="6604"><span data-dcnode-id="6605" instrument_node="">&nbsp;</span></strong><strong data-dcnode-id="6602"><span data-dcnode-id="6603" instrument_node="">Historical development</span></strong></li></ol><div data-dcnode-id="6584"><p data-dcnode-id="6592"><span data-dcnode-id="6599" instrument_node="">aa) </span><em data-dcnode-id="6597"><span data-dcnode-id="6598" instrument_node="">temperamenta belli</span></em><span data-dcnode-id="6596" instrument_node=""> only for those fighting a </span><em data-dcnode-id="6594"><span data-dcnode-id="6595" instrument_node="">bellum justum</span></em><span data-dcnode-id="6593" instrument_node=""> (just war)</span></p><p data-dcnode-id="6587"><span data-dcnode-id="6591" instrument_node="">bb) war as a fact of international life – </span><em data-dcnode-id="6589"><span data-dcnode-id="6590" instrument_node="">jus durante bello</span></em><span data-dcnode-id="6588" instrument_node=""> (law during war)</span></p><p data-dcnode-id="6585"><span data-dcnode-id="6586" instrument_node="">cc) the prohibition of the use of force</span></p></div><blockquote data-dcnode-id="6569"><strong data-dcnode-id="6582"><span data-dcnode-id="6583" instrument_node="">Quotation</span></strong><span data-dcnode-id="6581" instrument_node="">&nbsp;</span><br data-dcnode-id="6580"><span data-dcnode-id="6579" instrument_node=""> </span><br data-dcnode-id="6578"><span data-dcnode-id="6577" instrument_node=""> Laws of War. 18. The Commission considered whether the laws of war should be selected as a topic for codification. It was suggested that, war having been outlawed, the regulation of its conduct had ceased to be relevant. On the other hand, the opinion was expressed that, although the term “laws of war” ought to be discarded, a study of the rules governing the use of armed force – legitimate or illegitimate – might be useful. The punishment of war crimes, in accordance with the principles of the Charter and Judgment of the Nürnberg Tribunal, would necessitate a clear definition of those crimes and, consequently, the establishment of rules which would provide for the case where armed force was used in a criminal manner. The majority of the Commission declared itself opposed to the study of the problem at the present stage. It was considered that if the Commission, at the very beginning of its work, were to undertake this study, public opinion might interpret its action as showing lack of confidence in the efficiency of the means at the disposal of the United Nations for maintaining peace.</span><br data-dcnode-id="6576"><span data-dcnode-id="6575" instrument_node=""> </span><br data-dcnode-id="6574"><span data-dcnode-id="6573" instrument_node=""> &nbsp;[</span><strong data-dcnode-id="6571"><span data-dcnode-id="6572" instrument_node="">Source:</span></strong><span data-dcnode-id="6570" instrument_node=""> Yearbook of the International Law Commission, New York, UN, 1949, p. 281] dd) peace operations and international police operations: return of temperamenta belli?</span></blockquote><br data-dcnode-id="6568"><h4 class="casesdocheader" data-dcnode-id="6566"><span data-dcnode-id="6567" instrument_node="">CASES AND DOCUMENTS</span></h4><div class="beigebox" data-dcnode-id="6559"><ul data-dcnode-id="6560"><li data-dcnode-id="6561"><a data-dcnode-id="6562" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/un-multinational-force-facilitate-humanitarian-aid" title=""><abbr data-dcnode-id="6564" title="United Nations"><span data-dcnode-id="6565" instrument_node="">UN</span></abbr><span data-dcnode-id="6563" instrument_node="">, A Multinational Force to Facilitate Humanitarian Aid</span></a></li></ul></div><h4 aria-controls="readingsbody11" aria-expanded="false" class="readingsheader" data-dcnode-id="6557" data-toggle="collapse" href="#readingsbody11"><span data-dcnode-id="6558" instrument_node="">Specific bibliography</span></h4><div class="bluebox collapse" data-dcnode-id="6537" id="readingsbody11"><p data-dcnode-id="6554"><strong data-dcnode-id="6555"><span data-dcnode-id="6556" instrument_node="">Suggested reading:</span></strong></p><ul data-dcnode-id="6538"><li data-dcnode-id="6549"><span data-dcnode-id="6553" instrument_node="">DAILLIER Patrick, “Les opérations multinationales consécutives à des conflits armés en vue du rétablissement de la paix”, in </span><em data-dcnode-id="6551"><span data-dcnode-id="6552" instrument_node="">Recueil des cours [de l’] Académie de droit international</span></em><span data-dcnode-id="6550" instrument_node="">, T.&nbsp;314, 2005 pp. 424-431.</span></li><li data-dcnode-id="6544"><span data-dcnode-id="6548" instrument_node="">FLECK Dieter, “Law Enforcement and the Conduct of Hostilities: Two Supplementing or Mutually Excluding Legal Paradigms?”, in </span><em data-dcnode-id="6546"><span data-dcnode-id="6547" instrument_node="">Frieden in Freiheit = Peace in Liberty = Paix en liberté: Festschrift für Michael Bothe zum 70 Geburtstag</span></em><span data-dcnode-id="6545" instrument_node="">, Baden-Baden, Nomos; Zürich, Dike, 2008, pp. 391-407.</span></li><li data-dcnode-id="6539"><span data-dcnode-id="6543" instrument_node="">ZWANENBURG Martin, “Pieces of the Puzzle: Peace Operations, Occupation and the Use of Force”, in </span><em data-dcnode-id="6541"><span data-dcnode-id="6542" instrument_node="">The Military Law and the Law of War Review</span></em><span data-dcnode-id="6540" instrument_node="">, Vol. 1-2, No.&nbsp;45, 2006, pp. 239-248.</span></li></ul></div><ol data-dcnode-id="6530" type="a"><li data-dcnode-id="6531" value="2"><a class="nohref" data-dcnode-id="6536" id="b_ii_2_b" name="b_ii_2_b"></a><strong data-dcnode-id="6534"><span data-dcnode-id="6535" instrument_node="">&nbsp;</span></strong><strong data-dcnode-id="6532"><span data-dcnode-id="6533" instrument_node="">Reasons</span></strong></li></ol><h4 class="casesdocheader" data-dcnode-id="6528"><span data-dcnode-id="6529" instrument_node="">CASES AND DOCUMENTS</span></h4><div class="beigebox" data-dcnode-id="6518"><ul data-dcnode-id="6519"><li data-dcnode-id="6523"><a data-dcnode-id="6524" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/icrc-protection-policy%23para_5_1"><abbr data-dcnode-id="6526" title="International Committee of the Red Cross "><span data-dcnode-id="6527" instrument_node="">ICRC</span></abbr><span data-dcnode-id="6525" instrument_node="">, Protection Policy [Para. 5.1]</span></a></li><li data-dcnode-id="6520"><a data-dcnode-id="6521" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/united-states-military-tribunal-nuremberg-justice-trial" title=""><span data-dcnode-id="6522" instrument_node="">United States Military Tribunal at Nuremberg, The Justice Trial</span></a></li></ul></div><div data-dcnode-id="6496"><p data-dcnode-id="6510"><span data-dcnode-id="6517" instrument_node="">aa) Logical reasons: once the primary rules prohibiting the use of force (i.e. </span><em data-dcnode-id="6515"><span data-dcnode-id="6516" instrument_node="">jus ad bellum</span></em><span data-dcnode-id="6514" instrument_node="">) have been violated, the subsidiary rules of </span><em data-dcnode-id="6512"><span data-dcnode-id="6513" instrument_node="">jus in bello</span></em><span data-dcnode-id="6511" instrument_node=""> must apply, as they are foreseen specifically for situations in which the primary rules have been violated.</span></p><p data-dcnode-id="6505"><span data-dcnode-id="6509" instrument_node="">bb) Humanitarian reasons: war victims are not responsible for the fact that “their” State has violated international law (i.e. </span><em data-dcnode-id="6507"><span data-dcnode-id="6508" instrument_node="">jus ad bellum</span></em><span data-dcnode-id="6506" instrument_node="">) and need the same protection, whether they are on the “right” or on the “wrong” side.</span></p><p data-dcnode-id="6497"><span data-dcnode-id="6504" instrument_node="">cc) Practical reasons: during a conflict, belligerents never agree on which among them has violated </span><em data-dcnode-id="6502"><span data-dcnode-id="6503" instrument_node="">jus ad bellum</span></em><span data-dcnode-id="6501" instrument_node="">, i.e. who is the aggressor; </span><abbr data-dcnode-id="6499" title="International Humanitarian Law "><span data-dcnode-id="6500" instrument_node="">IHL</span></abbr><span data-dcnode-id="6498" instrument_node=""> has to apply during the conflict. It will only be respected if both sides have to apply the same rules.</span></p></div><ol data-dcnode-id="6489" type="a"><li data-dcnode-id="6490" s of 12 August 1949, and Relating to the Protection of Victims of International Armed Conflicts, of 8 June 1977"><span data-dcnode-id="6474" instrument_node="">Protocol I</span></abbr><span data-dcnode-id="6472" instrument_node=""> [Part B.]</span></a></li><li data-dcnode-id="6467"><a data-dcnode-id="6468" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/bosnia-and-herzegovina-constitution-safe-areas" title=""><span data-dcnode-id="6469" instrument_node="">Bosnia and Herzegovina, Constitution of Safe Areas in 1992-1993</span></a></li><li data-dcnode-id="6462"><span data-dcnode-id="6466" instrument_node="">ICRC, International humanitarian law and the challenges of contemporary armed conflicts in 2015 [para. </span><a data-dcnode-id="6464" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/icrc-international-humanitarian-law-and-challenges-contemporary-armed-conflicts-2015%23challenges-2015-para76"><span data-dcnode-id="6465" instrument_node="">76</span></a><span data-dcnode-id="6463" instrument_node="">]</span></li></ul></div><h4 aria-controls="readingsbody12" aria-expanded="false" class="readingsheader" data-dcnode-id="6458" data-toggle="collapse" href="#readingsbody12"><span data-dcnode-id="6459" instrument_node="">Specific bibliography</span></h4><div class="bluebox collapse" data-dcnode-id="6442" id="readingsbody12"><p data-dcnode-id="6455"><strong data-dcnode-id="6456"><span data-dcnode-id="6457" instrument_node="">Suggested reading:</span></strong></p><ul data-dcnode-id="6443"><li data-dcnode-id="6450"><span data-dcnode-id="6454" instrument_node="">MEYROWITZ Henri, </span><em data-dcnode-id="6452"><span data-dcnode-id="6453" instrument_node="">Le principe de l’égalité des belligérants devant le droit de la guerre</span></em><span data-dcnode-id="6451" instrument_node="">, Paris, Pedone, 1970, 418 pp.</span></li><li data-dcnode-id="6444"><span data-dcnod _ii_3" name="b_ii_3"></a><span data-dcnode-id="6214" instrument_node="">&nbsp;3. &nbsp; The distinction in non-international armed conflicts</span></h4><h4 class="casesdocheader" data-dcnode-id="6211"><span data-dcnode-id="6212" instrument_node="">CASES AND DOCUMENTS</span></h4><div class="beigebox" data-dcnode-id="6174"><ul data-dcnode-id="6175"><li data-dcnode-id="6205"><a data-dcnode-id="6206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/belgium-and-brazil-explanations-vote-protocol-ii%23part_b"><span data-dcnode-id="6210" instrument_node="">Belgium and Brazil, Explanations of Vote on </span><abbr data-dcnode-id="6208" title="Protocol Additional to the Geneva Conventions of 12 August 1949, and Relating to the Protection of Victims of Non-International Armed Conflicts, of 8 June 1977"><span data-dcnode-id="6209" instrument_node="">Protocol II</span></abbr><span data-dcnode-id="6207" instrument_node=""> [Part B.]</span></a></li><li data-dcnode-id="6202"><a data-dcnode-id="6203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/united-states-prize-cases" title=""><span data-dcnode-id="6204" instrument_node="">United States, The Prize Cases</span></a></li><li data-dcnode-id="6197"><a data-dcnode-id="6198" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/icj-nicaragua-v-united-states%23para_246"><abbr data-dcnode-id="6200" title="International Court of Justice "><span data-dcnode-id="6201" instrument_node="">ICJ</span></abbr><span data-dcnode-id="6199" instrument_node="">, Nicaragua v. United States [Para. 246]</span></a></li><li data-dcnode-id="6194"><a data-dcnode-id="6195" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/inter-american-commission-human-rights-tablada%23para_174"><span data-dcnode-id="6196" instrument_node="">Inter-American Commission on Human Rights, Tablada [Para. 174]</span></a></li><li data-dcnode-id="6179"><a data-dcnode-id="6190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/colombia-constitutional-conformity-protocol-ii" style="line-height: 1.75;" title=""><span data-dcnode-id="6193" instrument_node="">Colombia, Constitutional Conformity of </span><abbr data-dcnode-id="6191" title="Protocol Additional to the Geneva Conventions of 12 August 1949, and Relating to the Protection of Victims of Non-International Armed Conflicts, of 8 June 1977"><span data-dcnode-id="6192" instrument_node="">Protocol II</span></abbr></a><span data-dcnode-id="6188" style="line-height: 1.75;"><span data-dcnode-id="6189" instrument_node=""> [</span></span><a data-dcnode-id="6186" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/colombia-constitutional-conformity-protocol-ii%23para_20" style="line-height: 1.75;"><span data-dcnode-id="6187" instrument_node="">Para 20</span></a><span data-dcnode-id="6184" style="line-height: 1.75;"><span data-dcnode-id="6185" instrument_node=""> and </span></span><a data-dcnode-id="6182" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/colombia-constitutional-conformity-protocol-ii%23para_21" style="line-height: 1.75;"><span data-dcnode-id="6183" instrument_node="">para 21</span></a><span data-dcnode-id="6180" style="line-height: 1.75;"><span data-dcnode-id="6181" instrument_node="">]</span></span></li><li data-dcnode-id="6176"><a data-dcnode-id="6177" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/us-lethal-operations-against-al-qaida-leaders" style="line-height: 1.75;" title=""><span data-dcnode-id="6178" instrument_node="">U.S., Lethal Operations against Al-Qa’ida Leaders</span></a></li></ul></div><ol data-dcnode-id="6159" type="a"><li data-dcnode-id="6168"><a class="nohref" data-dcnode-id="6173" id="b_ii_3_a" name="b_ii_3_a"></a><strong data-dcnode-id="6171"><span data-dcnode-id="6172" instrument_node="">&nbsp;</span></strong><strong data-dcnode-id="6169"><span data-dcnode-id="6170" instrument_node="">International law does not prohibit non-international armed conflicts; domestic law does.</span></strong></li><li data-dcnode-id="6160"><a class="nohref" data-dcnode-id="6167" id="b_ii_3_b" name="b_ii_3_b"></a><strong data-dcnode-id="6165"><span data-dcnode-id="6166" instrument_node="">&nbsp;</span></strong><strong data-dcnode-id="6161"><abbr data-dcnode-id="6163" title="International Humanitarian Law "><span data-dcnode-id="6164" instrument_node="">IHL</span></abbr><span data-dcnode-id="6162" instrument_node=""> treats parties to a non-international armed conflict equally, but cannot oblige domestic laws to do so.</span></strong></li></ol><h4 aria-controls="readingsbody14" aria-expanded="false" class="readingsheader" data-dcnode-id="6157" data-toggle="collapse" href="#readingsbody14"><span data-dcnode-id="6158" instrument_node="">Specific bibliography</span></h4><div class="bluebox collapse" data-dcnode-id="6140" id="readingsbody14"><p data-dcnode-id="6154"><strong data-dcnode-id="6155"><span data-dcnode-id="6156" instrument_node="">Suggested reading:</span></strong></p><ul data-dcnode-id="6141"><li data-dcnode-id="6142"><span data-dcnode-id="6153" instrument_node="">BUGNION François, “</span><em data-dcnode-id="6151"><span data-dcnode-id="6152" instrument_node="">Jus ad Bellum</span></em><span data-dcnode-id="6150" instrument_node="">, </span><em data-dcnode-id="6148"><span data-dcnode-id="6149" instrument_node="">Jus in Bello</span></em><span data-dcnode-id="6147" instrument_node=""> and Non-International Armed Conflicts”, in </span><em data-dcnode-id="6144"><abbr data-dcnode-id="6145" title="Yearbook of International Humanitarian Law"><span data-dcnode-id="6146" instrument_node="">YIHL</span></abbr></em><span data-dcnode-id="6143" instrument_node="">, Vol. 6 (2003), 2007, pp. 167-198.</span></li></ul></div><span data-dcnode-id="6139" id="toc--iii-international-humanitarian-law-a-branch-of-international-law-governing-the-conduct-of-states-and-individuals"></span><h3 data-dcnode-id="6136"><a class="nohref" data-dcnode-id="6138" id="b_iii" name="b_iii"></a><span data-dcnode-id="6137" instrument_node="">&nbsp;III. International Humanitarian Law: a branch of international law governing the conduct of States and individuals</span></h3><h4 data-dcnode-id="6133"><a class="nohref" data-dcnode-id="6135" id="b_iii_1" name="b_iii_1"></a><span data-dcnode-id="6134" instrument_node="">&nbsp;1. Situations of application</span></h4><p data-dcnode-id="6130"><strong data-dcnode-id="6131"><span data-dcnode-id="6132" instrument_node="">Introductory text</span></strong></p><p data-dcnode-id="6120"><abbr data-dcnode-id="6128" title="International Humanitarian Law "><span data-dcnode-id="6129" instrument_node="">IHL</span></abbr><span data-dcnode-id="6127" instrument_node=""> applies in two very different types of situations: </span><em data-dcnode-id="6125"><span data-dcnode-id="6126" instrument_node="">international armed conflicts and non-international armed conflicts</span></em><span data-dcnode-id="6124" instrument_node="">. Technically, the latter are called “armed conflicts not of an international character”. It has been held, but is not entirely uncontested, that every armed conflict which “does not involve a clash between nations” is not of an international character, and that the latter phrase “bears its literal meaning”.[</span><a data-dcnode-id="6122" href="#_ftn_016" id="_ftnref_016" name="_ftnref_016" title=""><span data-dcnode-id="6123" instrument_node="">16</span></a><span data-dcnode-id="6121" instrument_node="">] All armed conflicts are therefore either international or non-international, and the two categories have to be distinguished according to the parties involved rather than by the territorial scope of the conflict.</span></p><ol data-dcnode-id="6115" type="A"><li data-dcnode-id="6116"><h5 data-dcnode-id="6117"><a class="nohref" data-dcnode-id="6119" id="b_iii_1_A" name="b_iii_1_A"></a><span data-dcnode-id="6118" instrument_node="">&nbsp;International armed conflict</span></h5></li></ol><div data-dcnode-id="6067"><p data-dcnode-id="6107"><span data-dcnode-id="6114" instrument_node="">The </span><abbr data-dcnode-id="6112" title="International Humanitarian Law "><span data-dcnode-id="6113" instrument_node="">IHL</span></abbr><span data-dcnode-id="6111" instrument_node=""> relating to international armed conflicts applies “to all cases of declared war or of any other armed conflict which may arise between two or more of the High Contracting Parties, even if the state of war is not recognized by one of them.”[</span><a data-dcnode-id="6109" href="#_ftn_017" id="_ftnref_017" name="_ftnref_017" title=""><span data-dcnode-id="6110" instrument_node="">17</span></a><span data-dcnode-id="6108" instrument_node="">]</span></p><p data-dcnode-id="6084"><span data-dcnode-id="6106" instrument_node="">The notion of “armed conflict” has, from 1949 onwards, replaced the traditional notion of “war”. According to the Commentary,[</span><a data-dcnode-id="6104" href="#_ftn_018" id="_ftnref_018" name="_ftnref_018" title=""><span data-dcnode-id="6105" instrument_node="">18</span></a><span data-dcnode-id="6103" instrument_node="">] ”[t]he substitution of this much more general expression (‘armed conflict’) for the word ‘war’ was deliberate. One may argue almost endlessly about the legal definition of ‘war’. A State can always pretend, when it commits a hostile act against another State, that it is not making war, but merely engaging in a police action, or acting in legitimate self-defence. The expression ‘armed conflict’ makes such arguments less easy. Any difference arising between two States and leading to the intervention of armed forces is an armed conflict [...] even if one of the Parties denies the existence of a state of war [...].” The </span><abbr data-dcnode-id="6101" title="International Criminal Tribunal for the former Yugoslavia "><span data-dcnode-id="6102" instrument_node="">ICTY</span></abbr><span data-dcnode-id="6100" instrument_node=""> confirmed in the </span><em data-dcnode-id="6098"><span data-dcnode-id="6099" instrument_node="">Tadic</span></em><span data-dcnode-id="6097" instrument_node=""> case that “an armed conflict exists whenever there is a resort to armed force between States […]”.[</span><a data-dcnode-id="6095" href="#_ftn_019" id="_ftnref_019" name="_ftnref_019" title=""><span data-dcnode-id="6096" instrument_node="">19</span></a><span data-dcnode-id="6094" instrument_node="">] This definition has since been used several times by the </span><abbr data-dcnode-id="6092" title="International Criminal Tribunal for the former Yugoslavia "><span data-dcnode-id="6093" instrument_node="">ICTY</span></abbr><span data-dcnode-id="6091" instrument_node="">’s Chambers and by other international bodies.[</span><a data-dcnode-id="6089" href="#_ftn_020" id="_ftnref_020" name="_ftnref_020" title=""><span data-dcnode-id="6090" instrument_node="">20</span></a><span data-dcnode-id="6088" instrument_node="">] When the armed forces of two States are involved, suffice it for one shot to be fired or one person captured (in conformity with government instructions) for </span><abbr data-dcnode-id="6086" title="International Humanitarian Law "><span data-dcnode-id="6087" instrument_node="">IHL</span></abbr><span data-dcnode-id="6085" instrument_node=""> to apply, while in other cases (e.g. a summary execution by a secret agent sent by his government abroad), a higher level of violence is necessary.</span></p><p data-dcnode-id="6073"><span data-dcnode-id="6083" instrument_node="">The same set of provisions also applies “to all cases of partial or total occupation of the territory of a High Contracting Party, even if the said occupation meets with no resistance [...].”[</span><a data-dcnode-id="6081" href="#_ftn_021" id="_ftnref_021" name="_ftnref_021" title=""><span data-dcnode-id="6082" instrument_node="">21</span></a><span data-dcnode-id="6080" instrument_node="">] In application of a standard rule of the law of State responsibility on the attribution of unlawful acts, a conflict between governmental forces and rebel forces within a single country becomes of international character if the rebel forces are de facto agents of a third State. In this event, the latter’s conduct is attributable to the third State[</span><a data-dcnode-id="6078" href="#_ftn_022" id="_ftnref_022" name="_ftnref_022" title=""><span data-dcnode-id="6079" instrument_node="">22</span></a><span data-dcnode-id="6077" instrument_node="">] and governed by the </span><abbr data-dcnode-id="6075" title="International Humanitarian Law "><span data-dcnode-id="6076" instrument_node="">IHL</span></abbr><span data-dcnode-id="6074" instrument_node=""> of international armed conflicts.</span></p><p data-dcnode-id="6068"><span data-dcnode-id="6072" instrument_node="">According to the traditional doctrine, the notion of international armed conflict was thus limited to armed contests between States. During the Diplomatic Conference of 1974-1977, which lead to the adoption of the two Additional Protocols of 1977, this conception was challenged and it was finally recognized that “wars of national liberation”[</span><a data-dcnode-id="6070" href="#_ftn_023" id="_ftnref_023" name="_ftnref_023" title=""><span data-dcnode-id="6071" instrument_node="">23</span></a><span data-dcnode-id="6069" instrument_node="">] should also be considered as international armed conflicts.</span></p></div><ol data-dcnode-id="6062" type="A"><li data-dcnode-id="6063" value="2"><h5 data-dcnode-id="6064"><a class="nohref" data-dcnode-id="6066" id="b_iii_1_B" name="b_iii_1_B"></a><span data-dcnode-id="6065" instrument_node="">&nbsp;Non-international armed conflict</span></h5></li></ol><p data-dcnode-id="6060"><span data-dcnode-id="6061" instrument_node="">Traditionally, non-international armed conflicts (or, to use an outdated term, “civil wars”) were considered as purely internal matters for States, in which no international law provisions applied.</span></p><p data-dcnode-id="6058"><span data-dcnode-id="6059" instrument_node="">This view was radically modified with the adoption of Article 3 common to the four Geneva Conventions of 1949. For the first time the society of States agreed on a set of minimal guarantees to be respected during non-international armed conflicts.</span></p><p data-dcnode-id="6047"><span data-dcnode-id="6057" instrument_node="">Unlike violence between the armed forces of States, not every act of violence within a State (even if directed at security forces) constitutes an armed conflict. The threshold of violence needed for the </span><abbr data-dcnode-id="6055" title="International Humanitarian Law "><span data-dcnode-id="6056" instrument_node="">IHL</span></abbr><span data-dcnode-id="6054" instrument_node=""> of non-international armed conflicts to apply is therefore higher than for international armed conflicts. In spite of the extreme importance of defining this lower threshold below which </span><abbr data-dcnode-id="6052" title="International Humanitarian Law "><span data-dcnode-id="6053" instrument_node="">IHL</span></abbr><span data-dcnode-id="6051" instrument_node=""> does not apply at all, Article 3 does not offer a clear definition of the notion of non-international armed conflict.[</span><a data-dcnode-id="6049" href="#_ftn_024" id="_ftnref_024" name="_ftnref_024" title=""><span data-dcnode-id="6050" instrument_node="">24</span></a><span data-dcnode-id="6048" instrument_node="">]</span></p><p data-dcnode-id="6042"><span data-dcnode-id="6046" instrument_node="">During the Diplomatic Conference, the need for a comprehensive definition of the notion of non-international armed conflict was reaffirmed and dealt with accordingly in Article 1 of Additional </span><abbr data-dcnode-id="6044" title="Protocol Additional to the Geneva Conventions of 12 August 1949, and Relating to the Protection of Victims of Non-International Armed Conflicts, of 8 June 1977"><span data-dcnode-id="6045" instrument_node="">Protocol II</span></abbr><span data-dcnode-id="6043" instrument_node="">.</span></p><p data-dcnode-id="6034"><span data-dcnode-id="6041" instrument_node="">According to that provision, it was agreed that </span><abbr data-dcnode-id="6039" title="Protocol Additional to the Geneva Conventions of 12 August 1949, and Relating to the Protection of Victims of Non-International Armed Conflicts, of 8 June 1977"><span data-dcnode-id="6040" instrument_node="">Protocol II</span></abbr><span data-dcnode-id="6038" instrument_node=""> “[s]hall apply to all armed conflicts not covered by Article 1 [...] of </span><abbr data-dcnode-id="6036" title="Protocol Additional to the Geneva Conventions of 12 August 1949, and Relating to the Protection of Victims of International Armed Conflicts, of 8 June 1977"><span data-dcnode-id="6037" instrument_node="">Protocol I</span></abbr><span data-dcnode-id="6035" instrument_node=""> and which take place in the territory of a High Contracting Party between its armed forces and dissident armed forces or other organized armed groups which, under responsible command, exercise such control over a part of its territory as to enable them to carry out sustained and concerted military operations and to implement this Protocol [...]”.</span></p><p data-dcnode-id="6020"><span data-dcnode-id="6033" instrument_node="">It should be noted that this fairly restrictive definition applies only to </span><abbr data-dcnode-id="6031" title="Protocol Additional to the Geneva Conventions of 12 August 1949, and Relating to the Protection of Victims of Non-International Armed Conflicts, of 8 June 1977"><span data-dcnode-id="6032" instrument_node="">Protocol II</span></abbr><span data-dcnode-id="6030" instrument_node="">. It does not apply to Article 3 common to the four Geneva Conventions.[</span><a data-dcnode-id="6028" href="#_ftn_025" id="_ftnref_025" name="_ftnref_025" title=""><span data-dcnode-id="6029" instrument_node="">25</span></a><span data-dcnode-id="6027" instrument_node="">] Practically, there are thus situations of non-international armed conflict in which only common Article 3 will apply, because the level of organization of the dissident groups is insufficient for </span><abbr data-dcnode-id="6025" title="Protocol Additional to the Geneva Conventions of 12 August 1949, and Relating to the Protection of Victims of Non-International Armed Conflicts, of 8 June 1977"><span data-dcnode-id="6026" instrument_node="">Protocol II</span></abbr><span data-dcnode-id="6024" instrument_node=""> to apply, or the fighting is between non-State armed groups. Conversely, common Article 3 will apply to all situations where </span><abbr data-dcnode-id="6022" title="Protocol Additional to the Geneva Conventions of 12 August 1949, and Relating to the Protection of Victims of Non-International Armed Conflicts, of 8 June 1977"><span data-dcnode-id="6023" instrument_node="">Protocol II</span></abbr><span data-dcnode-id="6021" instrument_node=""> is applicable.</span></p><p data-dcnode-id="6006"><span data-dcnode-id="6019" instrument_node="">Moreover, the </span><abbr data-dcnode-id="6017" title="International Criminal Court "><span data-dcnode-id="6018" instrument_node="">ICC</span></abbr><span data-dcnode-id="6016" instrument_node=""> Statute provides an intermediary threshold of application. It does not require that the conflict be between governmental forces and rebel forces, that the latter control part of the territory, or that there be a responsible command.[</span><a data-dcnode-id="6014" href="#_ftn_026" id="_ftnref_026" name="_ftnref_026" title=""><span data-dcnode-id="6015" instrument_node="">26</span></a><span data-dcnode-id="6013" instrument_node="">] The conflict must, however, be protracted and the armed groups must be organized. The jurisprudence of the </span><abbr data-dcnode-id="6011" title="International Criminal Tribunal for the former Yugoslavia "><span data-dcnode-id="6012" instrument_node="">ICTY</span></abbr><span data-dcnode-id="6010" instrument_node=""> has, in our view correctly, replaced the conflict’s protracted character by a requirement of intensity. It requires a high degree of organization and violence for any situation to be classified as an armed conflict not of an international character.[</span><a data-dcnode-id="6008" href="#_ftn_027" id="_ftnref_027" name="_ftnref_027" title=""><span data-dcnode-id="6009" instrument_node="">27</span></a><span data-dcnode-id="6007" instrument_node="">]</span></p><p data-dcnode-id="5992"><span data-dcnode-id="6005" instrument_node="">Today, there is a general tendency to reduce the difference between </span><abbr data-dcnode-id="6003" title="International Humanitarian Law "><span data-dcnode-id="6004" instrument_node="">IHL</span></abbr><span data-dcnode-id="6002" instrument_node=""> applicable in international and in non-international armed conflicts. The jurisprudence of international criminal tribunals, the influence of human rights and even some treaty rules adopted by States have moved the law of non-international armed conflicts closer to the law of international armed conflicts, and it has even been suggested in some quarters that the difference be eliminated altogether. In the many fields where the treaty rules still differ, this convergence has been rationalized by claiming that under customary international law the differences between the two categories of conflict have gradually disappeared. The </span><abbr data-dcnode-id="6000" title="International Committee of the Red Cross "><span data-dcnode-id="6001" instrument_node="">ICRC</span></abbr><span data-dcnode-id="5999" instrument_node=""> study on customary International Humanitarian Law [</span><a data-dcnode-id="5997" href="#_ftn_028" id="_ftnref_028" name="_ftnref_028" title=""><span data-dcnode-id="5998" instrument_node="">28</span></a><span data-dcnode-id="5996" instrument_node="">] comes, after ten years of research, to the conclusion that 136 (and arguably even 141) out of 161 rules of customary humanitarian law, many of which are based on rules of </span><abbr data-dcnode-id="5994" title="Protocol Additional to the Geneva Conventions of 12 August 1949, and Relating to the Protection of Victims of International Armed Conflicts, of 8 June 1977"><span data-dcnode-id="5995" instrument_node="">Protocol I</span></abbr><span data-dcnode-id="5993" instrument_node=""> applicable as a treaty to international armed conflicts, apply equally to non-international armed conflicts.</span></p><p class="casesdocheader" data-dcnode-id="5990"><span data-dcnode-id="5991" instrument_node="">Cases and documents</span></p><ul class="beigebox" data-dcnode-id="5970"><li data-dcnode-id="5987"><a data-dcnode-id="5988" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/central-african-republic-report-un-independent-expert-july-2016"><span data-dcnode-id="5989" instrument_node="">Central African Republic, Report of the UN Independant Expert, July 2016</span></a></li><li data-dcnode-id="5984"><a data-dcnode-id="5985" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/syria-report-un-commission-inquiry-march-2017"><span data-dcnode-id="5986" instrument_node="">Syria, Report by UN Commission of Inquiry (March 2017)</span></a></li><li data-dcnode-id="5981"><a data-dcnode-id="5982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/syria-battle-aleppo"><span data-dcnode-id="5983" instrument_node="">Syria, the Battle for Aleppo</span></a></li><li data-dcnode-id="5978"><a data-dcnode-id="5979" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/international-criminal-court-trial-judgment-case-prosecutor-v-jean-pierre-bemba-gombo"><span data-dcnode-id="5980" instrument_node="">International Criminal Court, Trial Judgment in the Case of the Prosecutor V. Jean-Pierre Bemba Gombo</span></a></li><li data-dcnode-id="5975"><a data-dcnode-id="5976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/somaliakenya-al-shabab-attacks" title="Somalia/Kenya, Al-Shabab Attacks"><span data-dcnode-id="5977" instrument_node="">Somalia/Kenya, Al-Shabab Attacks</span></a></li><li data-dcnode-id="5971"><span class="field-content" data-dcnode-id="5972"><a data-dcnode-id="5973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/yemen-humanitarian-impact-conflict"><span data-dcnode-id="5974" instrument_node="">Yemen , Humanitarian Impact of the Conflict</span></a></span></li></ul><ol data-dcnode-id="5965" type="A"><li data-dcnode-id="5966" value="3"><h5 data-dcnode-id="5967"><a class="nohref" data-dcnode-id="5969" id="b_iii_1_C" name="b_iii_1_C"></a><span data-dcnode-id="5968" instrument_node="">&nbsp;Other situations</span></h5></li></ol><div data-dcnode-id="5949"><abbr data-dcnode-id="5963" title="International Humanitarian Law "><span data-dcnode-id="5964" instrument_node="">IHL</span></abbr><span data-dcnode-id="5962" instrument_node=""> is not applicable in situations of internal violence and tension which do not meet the threshold of non-international armed conflicts. This point has been clearly made in Article 1(2) of Additional </span><abbr data-dcnode-id="5960" title="Protocol Additional to the Geneva Conventions of 12 August 1949, and Relating to the Protection of Victims of Non-International Armed Conflicts, of 8 June 1977"><span data-dcnode-id="5961" instrument_node="">Protocol II</span></abbr><span data-dcnode-id="5959" instrument_node="">, which states: “This Protocol shall not apply to situations of internal disturbances and tensions, such as riots, isolated and sporadic acts of violence and other acts of a similar nature, as not being armed conflicts [...].”[</span><a data-dcnode-id="5957" href="#_ftn_029" id="_ftnref_029" name="_ftnref_029" title=""><span data-dcnode-id="5958" instrument_node="">29</span></a><span data-dcnode-id="5956" instrument_node="">] The non-applicability of </span><abbr data-dcnode-id="5954" title="International Humanitarian Law "><span data-dcnode-id="5955" instrument_node="">IHL</span></abbr><span data-dcnode-id="5953" instrument_node=""> does not necessarily mean lesser protection for the persons concerned. In such cases, human rights rules and peacetime domestic law would apply; they are more restrictive, for instance, regarding the use of force and detention of enemies, while </span><abbr data-dcnode-id="5951" title="International Humanitarian Law "><span data-dcnode-id="5952" instrument_node="">IHL</span></abbr><span data-dcnode-id="5950" instrument_node=""> gives States greater latitude on these two aspects.</span></div><h4 class="casesdocheader" data-dcnode-id="5947"><span data-dcnode-id="5948" instrument_node="">CASES AND DOCUMENTS</span></h4><div class="beigebox" data-dcnode-id="5851"><ul data-dcnode-id="5852"><li data-dcnode-id="5943"><a data-dcnode-id="5945" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/international-law-commission-articles-state-responsibility%23part_a_art_8"><span data-dcnode-id="5946" instrument_node="">International Law Commission, Articles on State Responsibility&nbsp;[Part A., Art 8 and Commentary</span></a><span data-dcnode-id="5944" instrument_node="">]</span></li><li data-dcnode-id="5940"><a data-dcnode-id="5941" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/united-states-prize-cases" title=""><span data-dcnode-id="5942" instrument_node="">United States, The Prize Cases</span></a></li><li data-dcnode-id="5930"><a data-dcnode-id="5938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/israelgaza-operation-cast-lead" title=""><span data-dcnode-id="5939" instrument_node="">Israel/Gaza, Operation Cast Lead</span></a><span data-dcnode-id="5937" instrument_node=""> [</span><a data-dcnode-id="5935" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/israelgaza-operation-cast-lead%23para_28"><span data-dcnode-id="5936" instrument_node="">Part I, paras 28-67</span></a><span data-dcnode-id="5934" instrument_node="">; </span><a data-dcnode-id="5932" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/israelgaza-operation-cast-lead%23para_273"><span data-dcnode-id="5933" instrument_node="">Part II, paras 273-283</span></a><span data-dcnode-id="5931" instrument_node="">]</span></li><li data-dcnode-id="5927"><a data-dcnode-id="5928" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/israellebanonhezbollah-conflict-2006" title=""><span data-dcnode-id="5929" instrument_node="">Israel/Lebanon/Hezbollah, Conflict in 2006</span></a></li><li data-dcnode-id="5912"><a data-dcnode-id="5923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/icj-nicaragua-v-united-states"><abbr data-dcnode-id="5925" title="International Court of Justice "><span data-dcnode-id="5926" instrument_node="">ICJ</span></abbr><span data-dcnode-id="5924" instrument_node="">, Nicaragua v. United States</span></a><span data-dcnode-id="5922" instrument_node=""> [Paras </span><a data-dcnode-id="5920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/icj-nicaragu <h4 class="casesdocheader" data-dcnode-id="5353"><span data-dcnode-id="5354" instrument_node="">CASES AND DOCUMENTS</span></h4><div class="beigebox" data-dcnode-id="5311"><ul data-dcnode-id="5312"><li data-dcnode-id="5338"><a data-dcnode-id="5349" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/icty-prosecutor-v-tadic"><abbr data-dcnode-id="5351" title="International Criminal Tribunal for the former Yugoslavia "><span data-dcnode-id="5352" instrument_node="">ICTY</span></abbr><span data-dcnode-id="5350" instrument_node="">, The Prosecutor v. Tadic</span></a><span data-dcnode-id="5348" instrument_node=""> [Part A., paras </span><a data-dcnode-id="5346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/icty-prosecutor-v-tadic%23part_a_para_67"><span data-dcnode-id="5347" instrument_node="">67-70</span></a><span data-dcnode-id="5345" instrument_node=""> and </span><a data-dcnode-id="5343" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/icty-prosecutor-v-tadic%23part_a_para_96"><span data-dcnode-id="5344" instrument_node="">96</span></a><span data-dcnode-id="5342" instrument_node="">; </span><a data-dcnode-id="5340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/icty-prosecutor-v-tadic%23part_e_para_37"><span data-dcnode-id="5341" instrument_node="">Part&nbsp;E., paras&nbsp;37-100</span></a><span data-dcnode-id="5339" instrument_node="">]</span></li><li data-dcnode-id="5333"><a data-dcnode-id="5334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/icty-prosecutor-v-boskoski"><abbr data-dcnode-id="5336" title="International Criminal Tribunal for the former Yugoslavia "><span data-dcnode-id="5337" instrument_node="">ICTY</span></abbr><span data-dcnode-id="5335" instrument_node="">, The Prosecutor v. Boskoski</span></a></li><li data-dcnode-id="5330"><a data-dcnode-id="5331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/mali-conduct-hostilities"><span data-dcnode-id="5332" instrument_node="">Mali, Conduct of Hostilities</span></a></li><li data-dcnode-id="5327"><a data-dcnode-id="5328" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/armed-conflict-syria"><span data-dcnode-id="5329" instrument_node="">The armed conflict in Syria</span></a></li><li data-dcnode-id="5324"><a data-dcnode-id="5325" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/united-states-america-death-osama-bin-laden"><span data-dcnode-id="5326" instrument_node="">United States of America, The Death of Osama bin Laden</span></a></li><li data-dcnode-id="5319"><span data-dcnode-id="5323" instrument_node="">ICRC, International humanitarian law and the challenges of contemporary armed conflicts in 2015 [para. </span><a data-dcnode-id="5321" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/icrc-international-humanitarian-law-and-challenges-contemporary-armed-conflicts-2015%23challenges-2015-para42"><span data-dcnode-id="5322" instrument_node="">42</span></a><span data-dcnode-id="5320" instrument_node="">]</span></li><li data-dcnode-id="5316"><a data-dcnode-id="5317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/icty-prosecutor-v-radovan-karadzic"><span data-dcnode-id="5318" instrument_node="">ICTY, The Prosecutor v. Radovan Karadzic</span></a></li><li data-dcnode-id="5313"><a data-dcnode-id="5314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/international-criminal-court-trial-judgment-case-prosecutor-v-jean-pierre-bemba-gombo"><span data-dcnode-id="5315" instrument_node="">International Criminal Court, Trial Judgment in the Case of the Prosecutor V. Jean-Pierre Bemba Gombo</span></a></li></ul></div><ol data-dcnode-id="5304" type="a"><li data-dcnode-id="5305" value="4"><a class="nohref" data-dcnode-id="5310" id="b_iii_1_C_d" name="b_iii_1_c_d"></a><strong data-dcnode-id="5308"><span data-dcnode-id="5309" instrument_node="">&nbsp;</span></strong><strong data-dcnode-id="5306"><span data-dcnode-id="5307" instrument_node="">Acts of terrorism?</span></strong></li></ol><p data-dcnode-id="5301"><strong data-dcnode-id="5302"><span data-dcnode-id="5303" instrument_node="">Introductory text</span></strong></p><p data-dcnode-id="5285"><abbr data-dcnode-id="5299" title="International Humanitarian Law "><span data-dcnode-id="5300" instrument_node="">IHL</span></abbr><span data-dcnode-id="5298" instrument_node=""> only applies to armed conflicts and therefore covers terrorist acts only when they are committed within the framework or as part of an armed conflict. Acts of terrorism committed in situations of internal violence or in time of peace are not covered by </span><abbr data-dcnode-id="5296" title="International Humanitarian Law "><span data-dcnode-id="5297" instrument_node="">IHL</span></abbr><span data-dcnode-id="5295" instrument_node="">. However, acts of terrorism are also prohibited by internal and international criminal law.[</span><a data-dcnode-id="5293" href="#_ftn_030" id="_ftnref_030" name="_ftnref_030" title=""><span data-dcnode-id="5294" instrument_node="">30</span></a><span data-dcnode-id="5292" instrument_node="">] Violence does not constitute an armed conflict simply because it is committed with terrorist means. As shown above, international armed conflicts are characterized by the fact that two States use violence against each other, while non-international armed conflicts are characterized by the degree of violence and organization of the parties. In both cases it does not matter whether lawful or unlawful means are used. Terrorist acts may therefore constitute (and trigger) an international armed conflict (when committed by a State – or its </span><em data-dcnode-id="5290"><span data-dcnode-id="5291" instrument_node="">de jure</span></em><span data-dcnode-id="5289" instrument_node=""> or </span><em data-dcnode-id="5287"><span data-dcnode-id="5288" instrument_node="">de facto</span></em><span data-dcnode-id="5286" instrument_node=""> agents – against another State) or a non-international armed conflict (when committed by an organized armed group fighting a State and its governmental authorities).</span></p><p data-dcnode-id="5265"><span data-dcnode-id="5284" instrument_node="">In both cases (or when terrorist acts are committed during a pre-existing armed conflict), </span><abbr data-dcnode-id="5282" title="International Humanitarian Law "><span data-dcnode-id="5283" instrument_node="">IHL</span></abbr><span data-dcnode-id="5281" instrument_node=""> prohibits the most common and typical acts of terrorism, even if committed for the most legitimate cause: attacks against civilians,[</span><a data-dcnode-id="5279" href="#_ftn_031" id="_ftnref_031" name="_ftnref_031" title=""><span data-dcnode-id="5280" instrument_node="">31</span></a><span data-dcnode-id="5278" instrument_node="">] indiscriminate attacks,[</span><a data-dcnode-id="5276" href="#_ftn_032" id="_ftnref_032" name="_ftnref_032" title=""><span data-dcnode-id="5277" instrument_node="">32</span></a><span data-dcnode-id="5275" instrument_node="">] acts or threats whose main aim is to spread terror among the civilian population[</span><a data-dcnode-id="5273" href="#_ftn_033" id="_ftnref_033" name="_ftnref_033" title=""><span data-dcnode-id="5274" instrument_node="">33</span></a><span data-dcnode-id="5272" instrument_node="">] and acts of “terrorism” aimed against civilians in the power of the enemy.[</span><a data-dcnode-id="5270" href="#_ftn_034" id="_ftnref_034" name="_ftnref_034" title=""><span data-dcnode-id="5271" instrument_node="">34</span></a><span data-dcnode-id="5269" instrument_node="">] In most cases, such acts are considered war crimes that must be universally prosecuted.[</span><a data-dcnode-id="5267" href="#_ftn_035" id="_ftnref_035" name="_ftnref_035" title=""><span data-dcnode-id="5268" instrument_node="">35</span></a><span data-dcnode-id="5266" instrument_node="">]</span></p><p data-dcnode-id="5251"><span data-dcnode-id="5264" instrument_node="">There is, however, no universally recognized definition of an act of terrorism. The two main controversies preventing States from reaching a consensus on this point are related to armed conflicts. On the one hand, some States want to exclude acts committed in national liberation wars and in resistance to foreign occupation from the definition (which conflates, from an </span><abbr data-dcnode-id="5262" title="International Humanitarian Law "><span data-dcnode-id="5263" instrument_node="">IHL</span></abbr><span data-dcnode-id="5261" instrument_node=""> perspective, </span><em data-dcnode-id="5259"><span data-dcnode-id="5260" instrument_node="">jus ad bellum</span></em><span data-dcnode-id="5258" instrument_node=""> and </span><em data-dcnode-id="5256"><span data-dcnode-id="5257" instrument_node="">jus in bello</span></em><span data-dcnode-id="5255" instrument_node="">). On the other hand, it is suggested that the definition should cover not only attacks against civilians and indiscriminate acts, but also attacks on government agents and property the purpose of which is to compel the government to do or to abstain from doing something. As this is the essence of any warfare, this would label as “terrorist” and criminalize acts which are not prohibited in armed conflicts by </span><abbr data-dcnode-id="5253" title="International Humanitarian Law "><span data-dcnode-id="5254" instrument_node="">IHL</span></abbr><span data-dcnode-id="5252" instrument_node=""> (and would therefore not encourage compliance by armed groups).&nbsp;</span></p><p data-dcnode-id="5247"><abbr data-dcnode-id="5249" title="International Humanitarian Law "><span data-dcnode-id="5250" instrument_node="">IHL</span></abbr><span data-dcnode-id="5248" instrument_node=""> applies equally to those who commit acts of terrorism (regular armed forces, national liberation movements, resistance movements, dissident armed forces engaged in an internal armed conflict or groups who, as their main action consists of terrorist acts, can be considered as terrorist groups) and to their opponents. Recourse to armed force against groups considered as terrorist is therefore subject to the same rules as in any other armed conflict.</span></p><h4 class="casesdocheader" data-dcnode-id="5245"><span data-dcnode-id="5246" instrument_node="">CASES AND DOCUMENTS</span></h4><div class="beigebox" data-dcnode-id="5186"><ul data-dcnode-id="5187"><li data-dcnode-id="5240"><a data-dcnode-id="5241" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/icrc-ihl-and-challenges-contemporary-armed-conflicts" title=""><abbr data-dcnode-id="5243" title="International Committee of the Red Cross "><span data-dcnode-id="5244" instrument_node="">ICRC</span></abbr><span data-dcnode-id="5242" instrument_node="">, The Challenges of Contemporary Armed Conflicts</span></a></li><li data-dcnode-id="5234"><a data-dcnode-id="5235" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/france-accession-protocol-i%23part_b_para_4"><span data-dcnode-id="5239" instrument_node="">France, Accession to </span><abbr data-dcnode-id="5237" title="Protocol Additional to the Geneva Conventions of 12 August 1949, and Relating to the Protection of Victims of International Armed Conflicts, of 8 June 1977"><span data-dcnode-id="5238" instrument_node="">Protocol I</span></abbr><span data-dcnode-id="5236" instrument_node=""> [Part B., para. 4]</span></a></li><li data-dcnode-id="5228"><a data-dcnode-id="5229" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/united-kingdom-and-australia-applicability-protocol-i%23part_c_reservation_d"><span data-dcnode-id="5233" instrument_node="">United Kingdom and Australia, Applicability of </span><abbr data-dcnode-id="5231" title="Protocol Additional to the Geneva Conventions of 12 August 1949, and Relating to the Protection of Victims of International Armed Conflicts, of 8 June 1977"><span data-dcnode-id="5232" instrument_node="">Protocol I</span></abbr><span data-dcnode-id="5230" instrument_node=""> [Part C - Reservation (d)],</span></a></li><li data-dcnode-id="5225"><a data-dcnode-id="5226" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/amnesty-international-breach-principle-distinction" title=""><span data-dcnode-id="5227" instrument_node="">Amnesty International, Breach of the Principle of Distinction</span></a></li><li data-dcnode-id="5222"><a data-dcnode-id="5223" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/us-schlesinger-report" title=""><span data-dcnode-id="5224" instrument_node="">United States, The Schlesinger Report</span></a></li><li data-dcnode-id="5217"><a data-dcnode-id="5218" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/icty-prosecutor-v-boskoski%23para_184"><abbr data-dcnode-id="5220" title="International Criminal Tribunal for the former Yugoslavia "><span data-dcnode-id="5221" instrument_node="">ICTY</span></abbr><span data-dcnode-id="5219" instrument_node="">, The Prosecutor v. Boskoski [Paras 184-190]</span></a></li><li data-dcnode-id="5214"><a data-dcnode-id="5215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/united-states-status-and-treatment-detainees-held-guantanamo-naval-base" title=""><span data-dcnode-id="5216" instrument_node="">United States, Status and Treatment of Detainees Held in Guantanamo Naval Base</span></a></li><li data-dcnode-id="5210"><a data-dcnode-id="5212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/united-states-september-11-2001-attacks" title=""><span data-dcnode-id="5213" instrument_node="">United States, The September 11 2001 Attacks</span></a><span data-dcnode-id="5211" instrument_node="">&nbsp;</span></li><li data-dcnode-id="5207"><a data-dcnode-id="5208" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/united-states-use-armed-drones-extraterritorial-targeted-killings"><span data-dcnode-id="5209" instrument_node="">United States, Use of Armed Drones for Extraterritorial Targeted Killings</span></a></li><li data-dcnode-id="5204"><a data-dcnode-id="5205" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/general-assembly-use-drones-counter-terrorism-operations" title=""><span data-dcnode-id="5206" instrument_node="">General Assembly, The use of drones in counter-terrorism operations</span></a></li><li data-dcnode-id="5201"><a data-dcnode-id="5202" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/us-lethal-operations-against-al-qaida-leaders" title=""><span data-dcnode-id="5203" instrument_node="">U.S., Lethal Operations against Al-Qa’ida Leaders</span></a></li><li data-dcnode-id="5198"><a data-dcnode-id="5199" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/united-states-america-death-osama-bin-laden"><span data-dcnode-id="5200" instrument_node="">United States of America, The Death of Osama bin Laden</span></a></li><li data-dcnode-id="5191"><a data-dcnode-id="5196" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc d="5095" instrument_node="">Revue Suisse de Droit International et de Droit Européen</span></em><span data-dcnode-id="5093" instrument_node="">, Vol. 3, 2002, pp. 319-354.</span></li><li data-dcnode-id="5087"><span data-dcnode-id="5091" instrument_node="">SASSÒLI Marco, “Terrorism and War”, in </span><em data-dcnode-id="5089"><span data-dcnode-id="5090" instrument_node="">Journal of International Criminal Justice</span></em><span data-dcnode-id="5088" instrument_node="">, Vol. 4, Issue 5, 2006, pp. 969-981.</span></li><li data-dcnode-id="5082"><span data-dcnode-id="5086" instrument_node="">SASSÒLI Marco, “La définition du terrorisme et le droit international humanitaire”, in </span><em data-dcnode-id="5084"><span data-dcnode-id="5085" instrument_node="">Revue québécoise de droit international</span></em><span data-dcnode-id="5083" instrument_node="">, Vol. 19, hors-série, 2007, pp.&nbsp;29-48.</span></li><li data-dcnode-id="5074"><span data-dcnode-id="5081" instrument_node="">SAUL Ben, </span><em data-dcnode-id="5079"><span data-dcnode-id="5080" instrument_node="">Defining Terrorism in International Law</span></em><span data-dcnode-id="5078" instrument_node="">, Oxford, </span><abbr data-dcnode-id="5076" title="Oxford University Press"><span data-dcnode-id="5077" instrument_node="">OUP</span></abbr><span data-dcnode-id="5075" instrument_node="">, 2006, 373 pp.</span></li><li data-dcnode-id="5069"><span data-dcnode-id="5073" instrument_node="">SVARC Dominika, “The Use of Military Force in the Fight Against Terrorism: International Legal Framework”, in </span><em data-dcnode-id="5071"><span data-dcnode-id="5072" instrument_node="">ISIL Yearbook of International Humanitarian and Refugee Law</span></em><span data-dcnode-id="5070" instrument_node="">, Vol. 6, 2006, pp. 142-168.</span></li><li data-dcnode-id="5064"><span data-dcnode-id="5068" instrument_node="">TRAVALIO Gregory M., “Terrorism, International Law, and the Use of Military Force”, in </span><em data-dcnode-id="5066"><span data-dcnode-id="5067" instrument_node="">Wisconsin International Law Journal</span></em><span data-dcnode-id="5065" instrument_node="">, Vol. 18/1, 2000, pp.&nbsp;145-191.</span></li><li data-dcnode-id="5059"><span data-dcnode-id="5063" instrument_node="">VAREILLES Thierry, </span><em data-dcnode-id="5061"><span data-dcnode-id="5062" instrument_node="">Encyclopédie du Terrorisme International</span></em><span data-dcnode-id="5060" instrument_node="">, Paris, L’Harmattan, 2001, 549&nbsp;pp.</span></li><li data-dcnode-id="5054"><span data-dcnode-id="5058" instrument_node="">WAXMAN Matthew C., “The Structure of Terrorism Threats and the Laws of War”, in </span><em data-dcnode-id="5056"><span data-dcnode-id="5057" instrument_node="">Duke Journal of Comparative and International Law</span></em><span data-dcnode-id="5055" instrument_node="">, Vol. 20, No. 3, 2010, pp. 429-455.&nbsp;</span></li><li data-dcnode-id="5049"><span data-dcnode-id="5053" instrument_node="">WEDGWOOD Ruth, “Responding to Terrorism: the Strikes Against Bin Laden”, in </span><em data-dcnode-id="5051"><span data-dcnode-id="5052" instrument_node="">The Yale Journal of International Law</span></em><span data-dcnode-id="5050" instrument_node="">, Vol. 24/2, 1999, pp.&nbsp;559-576.</span></li><li data-dcnode-id="5041"><span data-dcnode-id="5048" instrument_node="">Inter-American Commission on Human Rights, </span><em data-dcnode-id="5046"><span data-dcnode-id="5047" instrument_node="">Report on Terrorism and Human Rights</span></em><span data-dcnode-id="5045" instrument_node="">, OEA/Ser. L/V/II.116 Doc. 5 rev. 1 corr., 22 October 2002, </span><a data-dcnode-id="5043" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cidh.oas.org/Terrorism/Eng/toc.htm" target="_blank"><span data-dcnode-id="5044" instrument_node="">http://www.cidh.oas.org/Terrorism/Eng/toc.htm</span></a><span data-dcnode-id="5042" instrument_node="">.</span></li></ul></div><ol data-dcnode-id="5032" type="a"><li data-dcnode-id="5033" value="5"><a class="nohref" data-dcnode-id="5038" id="b_iii_1_C_e" name="b_iii_1_C_e"></a><strong data-dcnode-id="5036"><span data-dcnode-id="5037" instrument_node="">&nbsp;</span></strong><strong data-dcnode-id="5034"><span data-dcnode-id="5035" instrument_node="">The global war on terror?</span></strong></li></ol><p data-dcnode-id="5018"><span data-dcnode-id="5031" instrument_node="">Following the attacks of 11 September 2001 against New York and Washington D.C., perpetrated by members of the terrorist group al-Qaeda, the administration of President George W. Bush declared that the United States was engaged in a global “war on terror”,[</span><a data-dcnode-id="5029" href="#_ftn_036" id="_ftnref_036" name="_ftnref_036" title=""><span data-dcnode-id="5030" instrument_node="">36</span></a><span data-dcnode-id="5028" instrument_node="">] an international armed conflict against a non-State actor (al-Qaeda) and its associates. That “war” comprised not only a military campaign against Afghanistan (which harboured al-Qaeda leaders), but also attacks directed at and arrests of suspected members of al-Qaeda or other “terrorists” elsewhere in the world. While the United States claimed in this conflict all the prerogatives that </span><abbr data-dcnode-id="5026" title="International Humanitarian Law "><span data-dcnode-id="5027" instrument_node="">IHL</span></abbr><span data-dcnode-id="5025" instrument_node=""> confers upon a party to an international armed conflict, in particular to attack “unlawful enemy combatants” without necessarily trying to arrest them, and to detain them without benefit of a court decision, it denied these detainees protection by most of </span><abbr data-dcnode-id="5023" title="International Humanitarian Law "><span data-dcnode-id="5024" instrument_node="">IHL</span></abbr><span data-dcnode-id="5022" instrument_node="">, arguing that their detention was governed neither by the rules applying to combatants nor by those applicable to civilians.[</span><a data-dcnode-id="5020" href="#_ftn_037" id="_ftnref_037" name="_ftnref_037" title=""><span data-dcnode-id="5021" instrument_node="">37</span></a><span data-dcnode-id="5019" instrument_node="">]&nbsp;</span></p><p data-dcnode-id="5010"><span data-dcnode-id="5017" instrument_node="">In 2006, the </span><abbr data-dcnode-id="5015" title="United States of America"><span data-dcnode-id="5016" instrument_node="">US</span></abbr><span data-dcnode-id="5014" instrument_node=""> Supreme Court held that every armed conflict which “does not involve a clash between nations” is not of an international character, and that the latter phrase “bears its literal meaning”.[</span><a data-dcnode-id="5012" href="#_ftn_038" id="_ftnref_038" name="_ftnref_038" title=""><span data-dcnode-id="5013" instrument_node="">38</span></a><span data-dcnode-id="5011" instrument_node="">]&nbsp;</span></p><p data-dcnode-id="4999"><span data-dcnode-id="5009" instrument_node="">Under President Barack Obama, the United States has abandoned the terms “war on terror” and “unlawful combatants”. While its position was still under review in 2010, it continued to argue that an armed conflict exists (and that </span><abbr data-dcnode-id="5007" title="International Humanitarian Law "><span data-dcnode-id="5008" instrument_node="">IHL</span></abbr><span data-dcnode-id="5006" instrument_node=""> applies) between the United States, on the one hand, and al-Qaeda, the Taliban and “associated” forces, on the other. While not explicitly classifying this “novel type of armed conflict” as international or non-international, it holds that, at least by analogy, the </span><abbr data-dcnode-id="5004" title="International Humanitarian Law "><span data-dcnode-id="5005" instrument_node="">IHL</span></abbr><span data-dcnode-id="5003" instrument_node=""> of international armed conflicts applies, and that those who provide “substantial support” to the enemy may be attacked and detained under “the laws of war”, just as enemy combatants could under the law of international armed conflicts.[</span><a data-dcnode-id="5001" href="#_ftn_039" id="_ftnref_039" name="_ftnref_039" title=""><span data-dcnode-id="5002" instrument_node="">39</span></a><span data-dcnode-id="5000" instrument_node="">]</span></p><p data-dcnode-id="4988"><span data-dcnode-id="4998" instrument_node="">Critics object that a conflict between a State or a group of States, on the one hand, and a non-State group such as al-Qaeda, on the other, could at best be a non-international armed conflict, if the requirements of intensity of violence and of organization of the non-State armed group are fulfilled.[</span><a data-dcnode-id="4996" href="#_ftn_040" id="_ftnref_040" name="_ftnref_040" title=""><span data-dcnode-id="4997" instrument_node="">40</span></a><span data-dcnode-id="4995" instrument_node="">] The </span><abbr data-dcnode-id="4993" title="International Humanitarian Law "><span data-dcnode-id="4994" instrument_node="">IHL</span></abbr><span data-dcnode-id="4992" instrument_node=""> of non-international armed conflicts, they argue, does not have a worldwide geographical field of application. Non-international armed conflicts with al-Qaeda may exist in Afghanistan and in Pakistan, but not elsewhere. Even if and where the </span><abbr data-dcnode-id="4990" title="International Humanitarian Law "><span data-dcnode-id="4991" instrument_node="">IHL</span></abbr><span data-dcnode-id="4989" instrument_node=""> of non-international armed conflicts applies, its rules on the admissibility of the detention of, and attacks against, enemy fighters are not the same as those applicable in international armed conflicts to enemy combatants.</span></p><h4 class="casesdocheader" data-dcnode-id="4986"><span data-dcnode-id="4987" instrument_node="">CASES AND DOCUMENTS</span></h4><div class="beigebox" data-dcnode-id="4923"><ul data-dcnode-id="4924"><li data-dcnode-id="4981"><a data-dcnode-id="4982" href="htt r Guantanamo Detainees</span></a></li><li data-dcnode-id="4963"><a data-dcnode-id="4964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/united-states-obama-administrations-internment-standards" title=""><span data-dcnode-id="4965" instrument_node="">United States, The Obama Administration’s Internment Standards</span></a></li><li data-dcnode-id="4960"><a data-dcnode-id="4961" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/united-states-closure-guantanamo-detention-facilities" title=""><span data-dcnode-id="4962" instrument_node="">United States, Closure of Guantanamo Detention Facilities</span></a></li><li data-dcnode-id="4957"><a data-dcnode-id="4958" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/united-states-treatment-and-interrogation-detention" title=""><span data-dcnode-id="4959" instrument_node="">United States, Treatment and Interrogation in Detention</span></a></li><li data-dcnode-id="4954"><a data-dcnode-id="4955" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/highlight/cyber-warfare"><span data-dcnode-id="4956" instrument_node="">UN, Statement of a Special Rapporteur on Drone Attacks</span></a></li><li data-dcnode-id="4951"><a data-dcnode-id="4952" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/united-states-use-armed-drones-extraterritorial-targeted-killings"><span data-dcnode-id="4953" instrument_node="">United States, Use of Armed Drones for Extraterritorial Targeted Killings</span></a></li><li data-dcnode-id="4948"><a data-dcnode-id="4949" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icrc.org/casebook/case-study/icrc-international-humanitarian-law-and-challenges-contemporary-armed-conflicts-2011"><span data-dcnode-id="4950" instrument_node="">ICRC, International humanitarian law and the challenges of contemporary armed conflicts in 2011</span></a></li><li data-dcnode-id="4945"><a data-dcnode-id="4946" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/general-assembly-use-drones-counter-terrorism-operations" title=""><span data-dcnode-id="4947" instrument_node="">General Assembly, The use of drones in counter-terrorism operations</span></a></li><li data-dcnode-id="4942"><a data-dcnode-id="4943" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/us-lethal-operations-against-al-qaida-leaders" title=""><span data-dcnode-id="4944" instrument_node="">U.S., Lethal Operations against Al-Qa’ida Leaders</span></a></li><li data-dcnode-id="4939"><a data-dcnode-id="4940" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/united-states-america-death-osama-bin-laden"><span data-dcnode-id="4941" instrument_node="">United States of America, The Death of Osama bin Laden</span></a></li><li data-dcnode-id="4931"><span data-dcnode-id="4938" instrument_node="">ICRC, International humanitarian law and the challenges of contemporary armed conflicts in 2015 [paras </span><a data-dcnode-id="4936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/icrc-international-humanitarian-law-and-challenges-contemporary-armed-conflicts-2015%23challenges-2015-para63"><span data-dcnode-id="4937" instrument_node="">63</span></a><span data-dcnode-id="4935" instrument_node="">, </span><a data-dcnode-id="4933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/icrc-international-humanitarian-law-and-challenges-contemporary-armed-conflicts-2015%23challenges-2015-para80"><span data-dcnode-id="4934" instrument_node="">80-83</span></a><span data-dcnode-id="4932" instrument_node="">]<
