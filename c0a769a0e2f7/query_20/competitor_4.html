ata-dcnode-id="8595" instrument_node="">CAREY John, DUNLAP William &amp; PRITCHARD John (eds), VEUTHEY Michel, LAVOYER Jean-Philippe [</span><em data-dcnode-id="8593"><span data-dcnode-id="8594" instrument_node="">et al.</span></em><span data-dcnode-id="8592" instrument_node="">], </span><em data-dcnode-id="8590"><span data-dcnode-id="8591" instrument_node="">International Humanitarian Law</span></em><span data-dcnode-id="8589" instrument_node="">, Ardsley, New York, Transnational Publishers, 2003-2006, 3 Vol. (338, 367, 387 pp.)</span></p><p data-dcnode-id="8583"><span data-dcnode-id="8587" instrument_node="">DAVID Éric, TULKENS Françoise &amp; VANDERMEERSCH Damien, </span><em data-dcnode-id="8585"><span data-dcnode-id="8586" instrument_node="">Code de droit international humanitaire, textes réunis au 1er janvier 2010</span></em><span data-dcnode-id="8584" instrument_node="">, Brussels, Bruylant, 4th ed., 2010, 972 pp.</span></p><p data-dcnode-id="8578"><span data-dcnode-id="8582" instrument_node="">FORREST MARTIN Francisco, </span><em data-dcnode-id="8580"><span data-dcnode-id="8581" instrument_node="">International Human Rights and Humanitarian Law: Treaties, Cases and Analysis</span></em><span data-dcnode-id="8579" instrument_node="">, Cambridge, CUP, 2006, 990 pp.</span></p><p data-dcnode-id="8573"><span data-dcnode-id="8577" instrument_node="">HAROUEL Véronique, </span><em data-dcnode-id="8575"><span data-dcnode-id="8576" instrument_node="">Grands textes de droit humanitaire</span></em><span data-dcnode-id="8574" instrument_node="">, Paris, PUF, Que Sais-je ?, No. 3604, 2001, 127 pp.</span></p><p data-dcnode-id="8568"><span data-dcnode-id="8572" instrument_node="">O’CONNELL Mary Ellen, </span><em data-dcnode-id="8570"><span data-dcnode-id="8571" instrument_node="">International Law and the Use of Force</span></em><span data-dcnode-id="8569" instrument_node="">, New York, Foundation Press, 2005, 618 pp.</span></p><p data-dcnode-id="8563"><span data-dcnode-id="8567" instrument_node="">PERRAKIS Stelios &amp; MAROUDA Maria-Daniella, </span><em data-dcnode-id="8565"><span data-dcnode-id="8566" instrument_node="">Armed Conflicts and International Humanitarian Law: 150 Years after Solferino: Acquis and Prospects</span></em><span data-dcnode-id="8564" instrument_node="">, Athènes, Sakkoulas; Brussels, Bruylant, European Centre for Research and Training on Human Rights and Humanitarian Action, 2009, 653 pp.</span></p><p data-dcnode-id="8558"><span data-dcnode-id="8562" instrument_node="">ROBERTS Adam &amp; GUELFF Richard, </span><em data-dcnode-id="8560"><span data-dcnode-id="8561" instrument_node="">Documents on the Laws of War</span></em><span data-dcnode-id="8559" instrument_node="">, Oxford, Clarendon Press, 3rd ed., 2000, 765 pp.</span></p><p data-dcnode-id="8550"><span data-dcnode-id="8557" instrument_node="">SCHINDLER Dietrich &amp; TOMAN Jiri (ed.), </span><em data-dcnode-id="8555"><span data-dcnode-id="8556" instrument_node="">The Laws of Armed Conflicts</span></em><span data-dcnode-id="8554" instrument_node="">, </span><em data-dcnode-id="8552"><span data-dcnode-id="8553" instrument_node="">A Collection of Conventions, Resolutions and Other Documents</span></em><span data-dcnode-id="8551" instrument_node="">, Leiden, Boston, M. Nijhoff, 4th ed., 2004, 1493 pp.</span></p><p data-dcnode-id="8547"><strong data-dcnode-id="8548"><span data-dcnode-id="8549" instrument_node="">Bibliographies:</span></strong></p><p data-dcnode-id="8542"><span data-dcnode-id="8546" instrument_node="">“Bibliography 1998-1999: International Humanitarian Law”, in </span><em data-dcnode-id="8544"><span data-dcnode-id="8545" instrument_node="">YIHL</span></em><span data-dcnode-id="8543" instrument_node="">, Vol. 2, 1999, pp. 571-607.</span></p><p data-dcnode-id="8538"><em data-dcnode-id="8540"><span data-dcnode-id="8541" instrument_node="">Bibliography of International Humanitarian Law Applicable in Armed Conflicts [Compiled by Huong Thi Huynh under Jiri Toman’s direction; Foreword by Jean Pictet]</span></em><span data-dcnode-id="8539" instrument_node="">, Geneva, ICRC, Henry-Dunant Institute, 2nd ed., 1987, 604 pp.&nbsp;</span></p><p data-dcnode-id="8534"><em data-dcnode-id="8536"><span data-dcnode-id="8537" instrument_node="">Public International Law: a Current Bibliography of Books and Articles = Völkerrecht: laufende Bibliographie = Droit international public: bibliographie = Derecho internacional público: bibliografía</span></em><span data-dcnode-id="8535" instrument_node="">, semi-annual review published by the Max-Planck-Institut für ausländisches öffentliches Recht und Völkerrecht, Heidelberg.</span></p></div><span data-dcnode-id="8532" id="toc-a-concept-and-purpose-of-international-humanitarian-law"></span><h2 data-dcnode-id="8529"><a class="nohref" data-dcnode-id="8531" id="chapter1"></a><span data-dcnode-id="8530" instrument_node="">A. Concept and Purpose of International Humanitarian Law</span></h2><div class="rxbodyfield" data-dcnode-id="7834"><table data-dcnode-id="8524" width="100%"><tbody data-dcnode-id="8525"><tr data-dcnode-id="8526"><td data-dcnode-id="8527"><span data-dcnode-id="8528" instrument_node="">&nbsp;</span></td></tr></tbody></table><span data-dcnode-id="8523" id="toc--i-philosophy-of-international-humanitarian-law"></span><h3 data-dcnode-id="8520"><a class="nohref" data-dcnode-id="8522" id="a_i" name="a_i"></a><span data-dcnode-id="8521" instrument_node="">&nbsp;I. Philosophy of International Humanitarian Law</span></h3><h4 data-dcnode-id="8518"><span data-dcnode-id="8519" instrument_node="">Introductory text</span></h4><p data-dcnode-id="8513"><span data-dcnode-id="8517" instrument_node="">International Humanitarian Law (</span><abbr data-dcnode-id="8515" title="International Humanitarian Law "><span data-dcnode-id="8516" instrument_node="">IHL</span></abbr><span data-dcnode-id="8514" instrument_node="">) can be defined as the branch of international law limiting the use of violence in armed conflicts by:</span></p><ol data-dcnode-id="8493" type="a"><li data-dcnode-id="8502"><span data-dcnode-id="8512" instrument_node="">sparing those who do not[</span><a data-dcnode-id="8510" href="#_ftn_001"><span data-dcnode-id="8511" instrument_node="">1</span></a><span data-dcnode-id="8509" instrument_node="">] or no longer[</span><a data-dcnode-id="8507" href="#_ftnref_002"><span data-dcnode-id="8508" instrument_node="">2</span></a><span data-dcnode-id="8506" instrument_node="">] directly[</span><a data-dcnode-id="8504" href="#_ftnref_003"><span data-dcnode-id="8505" instrument_node="">3</span></a><span data-dcnode-id="8503" instrument_node="">] participate in hostilities;</span></li><li data-dcnode-id="8494"><span data-dcnode-id="8501" instrument_node="">restricting it to the amount necessary to achieve the aim of the conflict, which – independently of the causes fought for[</span><a data-dcnode-id="8499" href="#_ftnref_004"><span data-dcnode-id="8500" instrument_node="">4</span></a><span data-dcnode-id="8498" instrument_node="">] – can only be to weaken the military potential of the enemy.[</span><a data-dcnode-id="8496" href="#_ftnref_005"><span data-dcnode-id="8497" instrument_node="">5</span></a><span data-dcnode-id="8495" instrument_node="">]</span></li></ol><p data-dcnode-id="8488"><span data-dcnode-id="8492" instrument_node="">It is from this definition that the basic principles of </span><abbr data-dcnode-id="8490" title="International Humanitarian Law "><span data-dcnode-id="8491" instrument_node="">IHL</span></abbr><span data-dcnode-id="8489" instrument_node=""> may already be drawn, namely:</span></p><ul data-dcnode-id="8474"><li data-dcnode-id="8486"><span data-dcnode-id="8487" instrument_node="">the distinction between civilians and combatants,</span></li><li data-dcnode-id="8481"><span data-dcnode-id="8485" instrument_node="">the prohibition to attack those </span><em data-dcnode-id="8483"><span data-dcnode-id="8484" instrument_node="">hors de combat</span></em><span data-dcnode-id="8482" instrument_node="">,</span></li><li data-dcnode-id="8479"><span data-dcnode-id="8480" instrument_node="">the prohibition to inflict unnecessary suffering,</span></li><li data-dcnode-id="8477"><span data-dcnode-id="8478" instrument_node="">the principle of necessity, and</span></li><li data-dcnode-id="8475"><span data-dcnode-id="8476" instrument_node="">the principle of proportionality.</span></li></ul><p data-dcnode-id="8469"><span data-dcnode-id="8473" instrument_node="">This definition nevertheless also reveals the inherent limits of </span><abbr data-dcnode-id="8471" title="International Humanitarian Law "><span data-dcnode-id="8472" instrument_node="">IHL</span></abbr><span data-dcnode-id="8470" instrument_node="">:</span></p><ul data-dcnode-id="8455"><li data-dcnode-id="8467"><span data-dcnode-id="8468" instrument_node="">it does not prohibit the use of violence;</span></li><li data-dcnode-id="8465"><span data-dcnode-id="8466" instrument_node="">it cannot protect all those affected by an armed conflict;</span></li><li data-dcnode-id="8463"><span data-dcnode-id="8464" instrument_node="">it makes no distinction based on the purpose of the conflict;</span></li><li data-dcnode-id="8461"><span data-dcnode-id="8462" instrument_node="">it does not bar a party from overcoming the enemy;</span></li><li data-dcnode-id="8456"><span data-dcnode-id="8460" instrument_node="">it presupposes that the parties to an armed conflict have rational aims and that those aims as such do not contradict </span><abbr data-dcnode-id="8458" title="International Humanitarian Law "><span data-dcnode-id="8459" instrument_node="">IHL</span></abbr><span data-dcnode-id="8457" instrument_node="">.</span></li></ul><blockquote data-dcnode-id="8442"><p data-dcnode-id="8452"><strong data-dcnode-id="8453"><span data-dcnode-id="8454" instrument_node="">Contribution &nbsp; &nbsp;&nbsp;</span></strong></p><p data-dcnode-id="8450"><span data-dcnode-id="8451" instrument_node="">The law of armed conflicts is characterized by both simplicity and complexity – simplicity to the extent that its essence can be encapsulated in a few principles and set out in a few sentences, and complexity to the extent that one and the same act is governed by rules that vary depending on the context, the relevant instruments and the legal issues concerned. [...] The law of armed conflicts – as we have stated repeatedly – is simple law: with a little common sense and a degree of clear-sightedness, anyone can grasp its basic tenets for himself without being a legal expert. To put things as simply as possible, these rules can be summed up in four precepts: do not attack non-combatants, attack combatants only by legal means, treat persons in your power humanely, and protect the victims. [...] At the same time, the law of armed conflicts is complex since it does apply only in certain situations, those situations are not always easily definable in concrete terms and, depending on the situation, one and the same act can be lawful or unlawful, not merely unlawful but a criminal offence, or neither lawful nor unlawful! ...</span></p><span data-dcnode-id="8449" instrument_node="">[</span><strong data-dcnode-id="8447"><span data-dcnode-id="8448" instrument_node="">Source</span></strong><span data-dcnode-id="8446" instrument_node="">: DAVID Éric, </span><em data-dcnode-id="8444"><span data-dcnode-id="8445" instrument_node="">Principes de droit des conflits armés</span></em><span data-dcnode-id="8443" instrument_node="">, Brussels, Bruylant, 3rd ed., 2002, pp. 921-922; original in French, unofficial translation.]</span></blockquote><h4 aria-controls="readingsbody1" aria-expanded="false" class="readingsheader" data-dcnode-id="8440" data-toggle="collapse" href="#readingsbody1"><span data-dcnode-id="8441" instrument_node="">specific bibliography</span></h4><div class="bluebox collapse" data-dcnode-id="8320" id="readingsbody1"><strong data-dcnode-id="8438"><span data-dcnode-id="8439" instrument_node="">Suggested reading:</span></strong><ul data-dcnode-id="8422"><li data-dcnode-id="8433"><span data-dcnode-id="8437" instrument_node="">BEST Geoffrey, “The Restraint of War in Historical and Philosophical Perspective”, in </span><em data-dcnode-id="8435"><span data-dcnode-id="8436" instrument_node="">Humanitarian Law of Armed Conflict – Challenges Ahead, Essays in Honour of Frits Kalshoven</span></em><span data-dcnode-id="8434" instrument_node="">, Dordrecht, M. Nijhoff, 1991, pp. 3-26.</span></li><li data-dcnode-id="8428"><span data-dcnode-id="8432" instrument_node="">HENSEL Howard M. (ed.), </span><em data-dcnode-id="8430"><span data-dcnode-id="8431" instrument_node="">The Legitimate Use of Military Force: the Just War Tradition and the Customary Law of Armed Conflict</span></em><span data-dcnode-id="8429" instrument_node="">, Hampshire, Ashgate, 2008, 300 pp.</span></li><li data-dcnode-id="8423"><span data-dcnode-id="8427" instrument_node="">WALZER Michael, </span><em data-dcnode-id="8425"><span data-dcnode-id="8426" instrument_node="">Just and Unjust Wars, A Moral Argument with Historical Illustrations</span></em><span data-dcnode-id="8424" instrument_node="">, 3rd&nbsp;ed, New York, Basic Books, 2000, 361 pp.</span></li></ul><p data-dcnode-id="8419"><strong data-dcnode-id="8420"><span data-dcnode-id="8421" instrument_node="">Further reading:</span></strong></p><ul data-dcnode-id="8321"><li data-dcnode-id="8414"><span data-dcnode-id="8418" instrument_node="">BELLAMY Alex J., </span><em data-dcnode-id="8416"><span data-dcnode-id="8417" instrument_node="">Just Wars: from Cicero to Iraq</span></em><span data-dcnode-id="8415" instrument_node="">, Cambridge, Malden, Polity, 2006, 280&nbsp;pp.</span></li><li data-dcnode-id="8409"><span data-dcnode-id="8413" instrument_node="">BOUTHOUL Gaston, </span><em data-dcnode-id="8411"><span data-dcnode-id="8412" instrument_node="">Le phénomène guerre: méthode de la polémologie, morphologie des guerres, leurs infrastructures</span></em><span data-dcnode-id="8410" instrument_node="">, Paris, Payot, 1962.</span></li><li data-dcnode-id="8404"><span data-dcnode-id="8408" instrument_node="">DAVID Charles-Philippe, </span><em data-dcnode-id="8406"><span data-dcnode-id="8407" instrument_node="">La guerre et la paix, Approches contemporaines de la sécurité et de la stratégie</span></em><span data-dcnode-id="8405" instrument_node="">, Paris, Presses de la Fondation nationale des Sciences politiques, 2000.</span></li><li data-dcnode-id="8399"><span data-dcnode-id="8403" instrument_node="">DELMAS Philippe, </span><em data-dcnode-id="8401"><span data-dcnode-id="8402" instrument_node="">Le bel avenir de la guerre</span></em><span data-dcnode-id="8400" instrument_node="">, Paris, Gallimard, 1997, 281 pp.</span></li><li data-dcnode-id="8394"><span data-dcnode-id="8398" instrument_node="">EHRENREICH Barbara, </span><em data-dcnode-id="8396"><span data-dcnode-id="8397" instrument_node="">Le sacre de la guerre: essai sur les passions du sang</span></em><span data-dcnode-id="8395" instrument_node="">, Paris, Calmann-Lévy, 1999, 328 pp.</span></li><li data-dcnode-id="8389"><span data-dcnode-id="8393" instrument_node="">FURET Marie-Françoise, MARTINEZ Jean-Claude &amp; DORANDEU Henri, </span><em data-dcnode-id="8391"><span data-dcnode-id="8392" instrument_node="">La guerre et le droit</span></em><span data-dcnode-id="8390" instrument_node="">, Paris, Pedone, 1979, 335 pp.</span></li><li data-dcnode-id="8384"><span data-dcnode-id="8388" instrument_node="">GLUCKSMANN André &amp; WOLTON Thierry, </span><em data-dcnode-id="8386"><span data-dcnode-id="8387" instrument_node="">Silence, on tue</span></em><span data-dcnode-id="8385" instrument_node="">, Paris, Grasset, 1986, 290 pp.</span></li><li data-dcnode-id="8373"><span data-dcnode-id="8383" instrument_node="">HOWARD Michael, “</span><em data-dcnode-id="8381"><span data-dcnode-id="8382" instrument_node="">Temperamenta Belli</span></em><span data-dcnode-id="8380" instrument_node="">: Can War be Controlled?”, in HOWARD Michael, </span><em data-dcnode-id="8378"><span data-dcnode-id="8379" instrument_node="">Restraints on War</span></em><span data-dcnode-id="8377" instrument_node="">, Oxford, </span><abbr data-dcnode-id="8375" title="Oxford University Press"><span data-dcnode-id="8376" instrument_node="">OUP</span></abbr><span data-dcnode-id="8374" instrument_node="">, 1977.</span></li><li data-dcnode-id="8368"><span data-dcnode-id="8372" instrument_node="">IGNATIEFF Michael, </span><em data-dcnode-id="8370"><span data-dcnode-id="8371" instrument_node="">Warrior’s Honour: Ethic War and the Modern Conscience</span></em><span data-dcnode-id="8369" instrument_node="">, New York, Metropolitan Books, 1997, 207 pp.</span></li><li data-dcnode-id="8363"><span data-dcnode-id="8367" instrument_node="">JUNGER Ernst, </span><em data-dcnode-id="8365"><span data-dcnode-id="8366" instrument_node="">La guerre comme expérience intérieure</span></em><span data-dcnode-id="8364" instrument_node="">, Paris, Bourgois, 1997, 164 pp.</span></li><li data-dcnode-id="8358"><span data-dcnode-id="8362" instrument_node="">LÉVY Bernard-Henri, </span><em data-dcnode-id="8360"><span data-dcnode-id="8361" instrument_node="">Réflexions sur la guerre, le mal et la fin de l’histoire (précédé de: Les damnés de la guerre)</span></em><span data-dcnode-id="8359" instrument_node="">, Paris, Grasset, 2001, 408 pp.</span></li><li data-dcnode-id="8348"><span data-dcnode-id="8357" instrument_node="">LUTTWAK Edward N., “Give War a Chance”, in </span><em data-dcnode-id="8355"><span data-dcnode-id="8356" instrument_node="">Foreign Affairs</span></em><span data-dcnode-id="8354" instrument_node="">, July-August 1999, pp. 36-44.</span><br data-dcnode-id="8353"><span data-dcnode-id="8352" instrument_node=""> </span><em data-dcnode-id="8350"><span data-dcnode-id="8351" instrument_node="">Preventing Deadly Conflict: Final Report, Carnegie Commission on Preventing Deadly Conflict</span></em><span data-dcnode-id="8349" instrument_node="">, New York, 1997.</span></li><li data-dcnode-id="8343"><span data-dcnode-id="8347" instrument_node="">RUFIN Jean-Christophe, </span><em data-dcnode-id="8345"><span data-dcnode-id="8346" instrument_node="">L’aventure humanitaire</span></em><span data-dcnode-id="8344" instrument_node="">, Paris, Gallimard, 2001, 176 pp.</span></li><li data-dcnode-id="8337"><span data-dcnode-id="8342" instrument_node="">TANNER Fred, “Conflict Prevention and Conflict Resolution: Limits of Multilateralism”, in </span><em data-dcnode-id="8339"><abbr data-dcnode-id="8340" title="International Review of the Red Cross "><span data-dcnode-id="8341" instrument_node="">IRRC</span></abbr></em><span data-dcnode-id="8338" instrument_node="">, No. 839, September 2000, pp. 541-558.</span></li><li data-dcnode-id="8332"><span data-dcnode-id="8336" instrument_node="">THÜRER Daniel, “International Humanitarian Law: Essence and Perspectives”, in </span><em data-dcnode-id="8334"><span data-dcnode-id="8335" instrument_node="">Revue suisse de droit international et européen</span></em><span data-dcnode-id="8333" instrument_node="">, 2, 2007, pp. 157-164.</span></li><li data-dcnode-id="8327"><span data-dcnode-id="8331" instrument_node="">VAN CREVELD Martin, </span><em data-dcnode-id="8329"><span data-dcnode-id="8330" instrument_node="">On Future War</span></em><span data-dcnode-id="8328" instrument_node="">, London, Brassey’s, 1991, 254 pp.</span></li><li data-dcnode-id="8322"><span data-dcnode-id="8326" instrument_node="">VAN CREVELD Martin, </span><em data-dcnode-id="8324"><span data-dcnode-id="8325" instrument_node="">The Transformation of War</span></em><span data-dcnode-id="8323" instrument_node="">, New York, Free Press, 1991, 254 pp.</span></li></ul></div><span data-dcnode-id="8319" id="toc--ii-can-warfare-be-regulated-by-law-"></span><h3 data-dcnode-id="8316"><a class="nohref" data-dcnode-id="8318" id="a_ii" name="a_ii"></a><span data-dcnode-id="8317" instrument_node="">&nbsp;II. Can warfare be regulated by law?</span></h3><h4 data-dcnode-id="8314"><span data-dcnode-id="8315" instrument_node="">Introductory text</span></h4><p data-dcnode-id="8306"><span data-dcnode-id="8313" instrument_node="">In defending the acts of Milo in an internal armed conflict in Rome, Cicero pleaded, </span><em data-dcnode-id="8311"><span data-dcnode-id="8312" instrument_node="">“...&nbsp;silent enim leges inter arma.”</span></em><span data-dcnode-id="8310" instrument_node="">[</span><a data-dcnode-id="8308" href="#_ftn_006" id="_ftnref_006" name="_ftnref_006" title=""><span data-dcnode-id="8309" instrument_node="">6</span></a><span data-dcnode-id="8307" instrument_node="">] To this day, many question or deny that law can regulate behaviour in such an exceptional, anarchic and violent situation as armed conflict – all the more so as all internal laws prohibit internal armed conflicts and international law has outlawed international armed conflicts. How can legal considerations be expected to restrict human behaviour when individual or collective survival is at stake?</span></p><p data-dcnode-id="8304"><span data-dcnode-id="8305" instrument_node="">Armed conflicts nevertheless remain a reality, one perceived by all those involved as being morally different from a crime committed by one side or a punishment inflicted by the other. There is no conceptual reason why such a social reality – unfortunately one of the most ancient forms of intercourse between organized human groups – should not be governed by law. History has shown that the appearance of any reality in a society – be it highly organized or not – sparks the concomitant appearance of laws applicable to it. The applicability of internal law – penal and disciplinary military law – to behaviour in armed conflict has, moreover, never been questioned. To the contrary, armed conflicts as distinct from anarchic chaos cannot be imagined without a minimum of uniformly respected rules, e.g., that the fighters of one side may kill those of the opposing side but not their own commanders or comrades.</span></p><p data-dcnode-id="8290"><span data-dcnode-id="8303" instrument_node="">In the reality of even contemporary conflicts, the expectations of belligerents, and the arguments (hypocritical or not) invoked by governments, rebels, politicians, diplomats, fighters, and national and international public opinion, are based on standards, not only on when armed violence may (or, rather, may not) be used, but also on how it may be used. When it comes to judging behaviour (and this is what law is all about) </span><abbr data-dcnode-id="8301" title="International Humanitarian Law "><span data-dcnode-id="8302" instrument_node="">IHL</span></abbr><span data-dcnode-id="8300" instrument_node=""> is omnipresent in contemporary conflicts:[</span><a data-dcnode-id="8298" href="#_ftn_007" id="_ftnref_007" name="_ftnref_007" title=""><span data-dcnode-id="8299" instrument_node="">7</span></a><span data-dcnode-id="8297" instrument_node="">] in United Nations Security Council resolutions and on the banners of demonstrators, in politicians’ speeches and in newspaper articles, in opposition movement political pamphlets and in </span><abbr data-dcnode-id="8295" title="Non-Governmental Organisation"><span data-dcnode-id="8296" instrument_node="">NGO</span></abbr><span data-dcnode-id="8294" instrument_node=""> reports, in military manuals and in diplomatic aide-mémoires. People with completely different cultural and intellectual backgrounds, emotions, and political opinions agree that in an armed conflict killing an enemy soldier on the battlefield and killing women and children because they belong to the “enemy” are not equivalent acts.[</span><a data-dcnode-id="8292" href="#_ftn_008" id="_ftnref_008" name="_ftnref_008" title=""><span data-dcnode-id="8293" instrument_node="">8</span></a><span data-dcnode-id="8291" instrument_node="">] Conversely, no criminal justice system confers a different legal qualification on a bank robber who kills a security guard and one who kills a bank customer.</span></p><p data-dcnode-id="8285"><span data-dcnode-id="8289" instrument_node="">It can be objected that this only proves that behaviour even in war is subject to moral strictures, but not that it can be subject to legal regulation. Either this objection reserves the term “law” to rules regularly applied by the centralized compulsory system of adjudication and enforcement that is typical of any domestic legal system – in which case international law, and therefore also </span><abbr data-dcnode-id="8287" title="International Humanitarian Law "><span data-dcnode-id="8288" instrument_node="">IHL</span></abbr><span data-dcnode-id="8286" instrument_node="">, is not law – or it fails to understand that it is precisely during such controversial activity as waging war, where each side has strong moral arguments for its cause, that the function of law to limit the kind of arguments that may be deployed is essential to ensure minimum protection for war victims. As for the reality, every humanitarian worker will confirm that when pleading the victims’ cause with a belligerent, whether a head of State or a soldier at a roadblock, even the most basic moral arguments encounter a vast variety of counterarguments based on collective and individual experience, the culture, religion, political opinions and mood of those addressed, while reference to international law singularly restricts the store of counterarguments and, more importantly, puts all human beings, wherever they are and from wherever they come, on the same level.</span></p><p data-dcnode-id="8283"><span data-dcnode-id="8284" instrument_node="">Regarding the completely distinct question of why such law is, should be, or is not respected in contemporary conflicts, law can only provide a small part of the answer, which is discussed elsewhere in this book under “implementation.” The main part of the answer can by definition not be provided by law. As Frédéric Maurice, an International Committee of the Red Cross delegate wrote a few months before he was killed on 19&nbsp;May 1992 in Sarajevo by those who did not want that assistance be brought through the lines to the civilian population there, as prescribed by International Humanitarian Law:</span></p><p data-dcnode-id="8278"><span data-dcnode-id="8282" instrument_node="">“War anywhere is first and foremost an institutional disaster, the breakdown of legal systems, a circumstance in which rights are secured by force. Everyone who has experienced war, particularly the wars of our times, knows that unleashed violence means the obliteration of standards of behaviour and legal systems. Humanitarian action in a war situation is therefore above all a legal approach which precedes and accompanies the actual provision of relief. Protecting victims means giving them a status, goods and the infrastructure indispensable for survival, and setting up monitoring bodies. In other words the idea is to persuade belligerents to accept an exceptional legal order – the law of war or humanitarian law – specially tailored to such situations. That is precisely why humanitarian action is inconceivable without close and permanent dialogue with the parties to the conflict.”[</span><a data-dcnode-id="8280" href="#_ftn_009" id="_ftnref_009" name="_ftnref_009" title=""><span data-dcnode-id="8281" instrument_node="">9</span></a><span data-dcnode-id="8279" instrument_node="">]</span></p><blockquote data-dcnode-id="8253"><p data-dcnode-id="8272"><a class="nohref" data-dcnode-id="8277" id="A_ii_quote" name="A_ii_quote"></a><strong data-dcnode-id="8275"><span data-dcnode-id="8276" instrument_node="">&nbsp;</span></strong><strong data-dcnode-id="8273"><span data-dcnode-id="8274" instrument_node="">Quotation</span></strong></p><p data-dcnode-id="8270"><span data-dcnode-id="8271" instrument_node="">Thucydides on might and right “The Athenians also made an expedition against the Isle of Melos [...]. The Melians [...] would not submit to the Athenians [...], and at first remained neutral and took no part in the struggle, but afterwards upon the Athenians using violence and plundering their territory, assumed an attitude of open hostility. [...] [The Melians and the Athenians] sent envoys to negotiate. [...]</span></p><p data-dcnode-id="8268"><span data-dcnode-id="8269" instrument_node="">Melians: [...] [Y]our military preparations are too far advanced to agree with what you say, as we see you are come to be judges in your own cause, and that all we can reasonably expect from this negotiation is war, if we prove to have right on our side and refuse to submit, and in the contrary case, slavery. [...]</span></p><p data-dcnode-id="8266"><span data-dcnode-id="8267" instrument_node="">[...]</span></p><p data-dcnode-id="8264"><span data-dcnode-id="8265" instrument_node="">Athenians: For ourselves, we shall not trouble you with specious pretences [...] of how we [...] are now attacking you because of wrong that you have done us – and make a long speech which would not be believed [...] since you know as well as we do that right, as the world goes, is only in question between equals in power, while the strong do what they can and the weak suffer what they must.”</span></p><span data-dcnode-id="8263" instrument_node="">[</span><strong data-dcnode-id="8261"><span data-dcnode-id="8262" instrument_node="">Source</span></strong><span data-dcnode-id="8260" instrument_node="">: Thucydides, </span><em data-dcnode-id="8258"><span data-dcnode-id="8259" instrument_node="">History of the Peloponnesian War</span></em><span data-dcnode-id="8257" instrument_node=""> (translated by Richard Crawley) (London: Everyman, 1993) Online: </span><a data-dcnode-id="8255" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//eserver.org/history/peloponesian-war.txt" target="_blank"><span data-dcnode-id="8256" instrument_node="">http://eserver.org/history/peloponesian-war.txt</span></a><span data-dcnode-id="8254" instrument_node="">]</span></blockquote><p data-dcnode-id="8248"><span data-dcnode-id="8252" instrument_node="">[</span><strong data-dcnode-id="8250"><span data-dcnode-id="8251" instrument_node="">N.B.</span></strong><span data-dcnode-id="8249" instrument_node="">: The Athenians finally lost the war.]</span></p><h4 class="casesdocheader" data-dcnode-id="8246"><span data-dcnode-id="8247" instrument_node="">CASES AND DOCUMENTS</span></h4><div class="beigebox" data-dcnode-id="8239"><ul data-dcnode-id="8240"><li data-dcnode-id="8241"><a data-dcnode-id="8242" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/un-minimum-humanitarian-standards%23part_b_para_14"><abbr data-dcnode-id="8244" title="United Nations"><span data-dcnode-id="8245" instrument_node="">UN</span></abbr><span data-dcnode-id="8243" instrument_node="">, Minimum Humanitarian Standards [Part B., paras 14-16]</span></a></li></ul></div><h4 aria-controls="readingsbody2" aria-expanded="false" class="readingsheader" data-dcnode-id="8237" data-toggle="collapse" href="#readingsbody2"><span data-dcnode-id="8238" instrument_node="">specific bibliography</span></h4><div class="bluebox collapse" data-dcnode-id="8217" id="readingsbody2"><p data-dcnode-id="8234"><strong data-dcnode-id="8235"><span data-dcnode-id="8236" instrument_node="">Suggested reading:</span></strong></p><ul data-dcnode-id="8218"><li data-dcnode-id="8229"><span data-dcnode-id="8233" instrument_node="">IGNATIEFF Michael, </span><em data-dcnode-id="8231"><span data-dcnode-id="8232" instrument_node="">Warrior’s Honour: Ethnic War and the Modern Conscience</span></em><span data-dcnode-id="8230" instrument_node="">, New York, Metropolitan Books, 1997, 207 pp.</span></li><li data-dcnode-id="8219"><span data-dcnode-id="8228" instrument_node="">KENNEDY David, </span><em data-dcnode-id="8226"><span data-dcnode-id="8227" instrument_node="">Of War and Law</span></em><span data-dcnode-id="8225" instrument_node="">, Princeton, Oxford, Princeton University Press, 2006, 191 pp.</span><br data-dcnode-id="8224"><span data-dcnode-id="8223" instrument_node=""> The Hebrew University Faculty of Law, “The Morality and Law of War”, in </span><em data-dcnode-id="8221"><span data-dcnode-id="8222" instrument_node="">Israel Law Review</span></em><span data-dcnode-id="8220" instrument_node="">, vol. 40, No. 3, 2007, pp. 671-851.</span></li></ul></div><span data-dcnode-id="8216" id="toc--iii-international-humanitarian-law-and-cultural-relativism"></span><h3 data-dcnode-id="8213"><a class="nohref" data-dcnode-id="8215" id="a_iii" name="a_iii"></a><span data-dcnode-id="8214" instrument_node="">&nbsp;III. International Humanitarian Law and cultural relativism</span></h3><p data-dcnode-id="8202"><span data-dcnode-id="8212" instrument_node="">[See also </span><strong data-dcnode-id="8210"><span data-dcnode-id="8211" instrument_node="">Introductory Text</span></strong><span data-dcnode-id="8209" instrument_node=""> and </span><strong data-dcnode-id="8207"><span data-dcnode-id="8208" instrument_node="">Quotations</span></strong><span data-dcnode-id="8206" instrument_node=""> under </span><a data-dcnode-id="8204" href="#chapter3"><span data-dcnode-id="8205" instrument_node="">Historical Development of International Humanitarian Law</span></a><span data-dcnode-id="8203" instrument_node=""> ]</span></p><h4 data-dcnode-id="8200"><span data-dcnode-id="8201" instrument_node="">Introductory text</span></h4><p data-dcnode-id="8192"><span data-dcnode-id="8199" instrument_node="">Up until the 1970s, </span><abbr data-dcnode-id="8197" title="International Humanitarian Law "><span data-dcnode-id="8198" instrument_node="">IHL</span></abbr><span data-dcnode-id="8196" instrument_node=""> – or at least its codified norms – was strongly influenced by Western culture and European powers. However, the humanitarian ideas and concepts formalized in humanitarian law treaties are shared by many different schools of thought and cultural traditions.[</span><a data-dcnode-id="8194" href="#_ftn_010" id="_ftnref_010" name="_ftnref_010" title=""><span data-dcnode-id="8195" instrument_node="">10</span></a><span data-dcnode-id="8193" instrument_node="">]</span></p><p data-dcnode-id="8185"><span data-dcnode-id="8191" instrument_node="">These </span><em data-dcnode-id="8187"><span data-dcnode-id="8190" instrument_node="">international dimensions of </span><abbr data-dcnode-id="8188" title="International Humanitarian Law "><span data-dcnode-id="8189" instrument_node="">IHL</span></abbr></em><span data-dcnode-id="8186" instrument_node=""> should never be underestimated or forgotten: very often respect for and implementation of the rules will in fact depend on the establishment of a clear correlation between the applicable treaties and local traditions or customs.</span></p><p data-dcnode-id="8180"><span data-dcnode-id="8184" instrument_node="">Jean Pictet, one of the most famous scholars and practitioners of </span><abbr data-dcnode-id="8182" title="International Humanitarian Law "><span data-dcnode-id="8183" instrument_node="">IHL</span></abbr><span data-dcnode-id="8181" instrument_node="">, tried to explain the cultural universalism of this branch of public international law:</span></p><div data-dcnode-id="8168"><p data-dcnode-id="8176"><span data-dcnode-id="8179" instrument_node="">“[...] The modern world has placed its hopes in internationalism and therein no doubt its future lies. Now, in an international environment, man’s rights can only be on what is universal, on ideas capable of bringing together men of all races. [...] Similarity alone can be the basis for universality and, although men are different, human nature is the same the world over.</span><br data-dcnode-id="8178"><span data-dcnode-id="8177" instrument_node=""> International humanitarian law in particular has this universal vocation, since it applies to all men and countries. In formulating and perfecting this law, [...] the International Committee of the Red Cross has sought precisely this common ground and put forward rules acceptable to all because they are fully consistent with human nature. This is, moreover, what has ensured the strength and durability of these rules.</span></p><p data-dcnode-id="8169"><span data-dcnode-id="8175" instrument_node="">However, today the uniformity of human psychological make-up and the universality of standards governing the behaviours of nations are recognized, and no longer is there belief in the supremacy of any one civilization: indeed the plurality of cultures and the need to take an interest in them and study them in depth is recognized.</span><br data-dcnode-id="8174"><span data-dcnode-id="8173" instrument_node=""> This leads to an awareness that humanitarian principles are common to all human communities wherever they may be. When different customs, ethics and philosophies are gathered for comparison, and when they are melted down, their particularities eliminated and only what is general extracted, one is left with a pure substance which is the heritage of all mankind.”[</span><a data-dcnode-id="8171" href="#_ftn_011" id="_ftnref_011" name="_ftnref_011" title=""><span data-dcnode-id="8172" instrument_node="">11</span></a><span data-dcnode-id="8170" instrument_node="">]</span></p></div><blockquote data-dcnode-id="8143"><p data-dcnode-id="8165"><strong data-dcnode-id="8166"><span data-dcnode-id="8167" instrument_node="">Contribution</span></strong></p><span data-dcnode-id="8164" instrument_node="">&nbsp;</span><p data-dcnode-id="8162"><span data-dcnode-id="8163" instrument_node="">Its relationship with universal values is probably one of the greatest challenges faced by humanity. The law cannot avoid addressing it. Unfortunately, the question of the universal nature of international humanitarian law has prompted little scholarly deliberation, unlike the body of human rights law, whose universal nature has been forcefully called into question – by anthropologists, among others, and particularly since the 1980s.</span></p><p data-dcnode-id="8160"><span data-dcnode-id="8161" instrument_node="">In fact, the debate seems at first glance to have been boxed into a corner, to have reached stalemate. The advocates of universalism and those of relativism have managed to pinpoint the weaknesses of the positions held by the opposite camp. Certainly the Western nature of the major texts of international humanitarian law and human rights law is evident, as is the danger of protection for the victims diminishing as a result of upholding any kind of tradition. Positivist legal experts and specialists in the social sciences also evidently have difficulty in finding a common set of terms.</span></p><p data-dcnode-id="8158"><span data-dcnode-id="8159" instrument_node="">Nonetheless, the great non-Western legal traditions present, both for international humanitarian law and for human rights law, obstacles which at first seem insurmountable, at least in terms of their legitimacy.</span></p><p data-dcnode-id="8156"><span data-dcnode-id="8157" instrument_node="">However, it cannot be denied that respect for human dignity is an eminently universal concept. The foundations of international humanitarian law, or at least their equivalents, are thus found in the major cultural systems on our planet: the right to life, the right to physical integrity, the prohibition of slavery and the right to fair legal treatment. However, a considerable problem is the fact that those principles are not universally applied. In the animist world, for instance, how a prisoner is treated is generally determined by the relationship between opposing clans and other groups.</span></p><p data-dcnode-id="8154"><span data-dcnode-id="8155" instrument_node="">This does not, however, necessarily negate the universal foundations of international humanitarian law. Non-Western cultures cannot escape the steamroller of modern life, and the hybridization of human societies is very real. In a number of African countries, for example, three legal systems operate side by side: a modern system, an Islamic system and a customary system.</span></p><p data-dcnode-id="8152"><span data-dcnode-id="8153" instrument_node="">Moreover, the showing of respect for other cultural systems – a gift to us from anthropology&nbsp;– must not mean that we cast aside the greatest achievement of modern times: the critical faculty. Thus, if we came across a group of human beings who practised the systematic torture of prisoners in the name of tradition or religion, this would not make torture somehow more acceptable. In fact, a mistake has been made – particularly in the West – since the end of the colonial era: the discovery of the wealth of all those cultures previously crushed in the name of progress does not somehow exempt them from critical judgement. Universalism does not require unanimity.</span></p><p data-dcnode-id="8148"><span data-dcnode-id="8151" instrument_node="">Some supporters of radical relativism seem to have forgotten that humanity and culture cannot exist without prohibitions. In any society, individuals are taught from a very early age to control their aggressive and sexual drives. This is a necessary rite of passage from nature to culture. In fact, many lines that may not be crossed are precisely what makes us human. International humanitarian law represents precisely the limits that combatants must never exceed if they are not to sacrifice their humanity and revert to a state of raw nature.</span><br data-dcnode-id="8150"><span data-dcnode-id="8149" instrument_node=""> Is the whole of international humanitarian law universal? The foundations of that law certainly are, since they derive from natural law. The fact that fundamental legal rules exist is based on an intuitive force and can even be said to be a requirement of the human condition, which causes killing, torture, slavery and unfair judgement to arouse repulsion not only among the vast majority of intellectuals but among ordinary people as well. Whether attributed to reason, universal harmony or the divine origin of mankind, sound assertions are made about human nature. International humanitarian law therefore attains a universal dimension by symbolizing common human values.</span></p><span data-dcnode-id="8147" instrument_node="">[</span><strong data-dcnode-id="8145"><span data-dcnode-id="8146" instrument_node="">Contribution</span></strong><span data-dcnode-id="8144" instrument_node=""> by Louis Lafrance, who has masters degrees in psychology from the University of Montreal and in international law from the University of Quebec in Montreal. Mr Lafrance has spent time in many conflict countries, first as a journalist and then as a human rights specialist working for the United Nations. This text is based on his masters dissertation, which deals with the universal nature of international humanitarian law in conflicts in countries in which State structures have broken down. Original in French, unofficial translation]</span></blockquote><h4 class="casesdocheader" data-dcnode-id="8141"><span data-dcnode-id="8142" instrument_node="">CASES AND DOCUMENTS</span></h4><div class="beigebox" data-dcnode-id="8121"><ul data-dcnode-id="8122"><li data-dcnode-id="8138"><a data-dcnode-id="8139" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/israel-cheikh-obeid-et-al-v-ministry-security%23chapter3"><span data-dcnode-id="8140" instrument_node="">Israel, Cheikh Obeid et al. v. Ministry of Security [Opinion of Judge Englard]</span></a></li><li data-dcnode-id="8135"><a data-dcnode-id="8136" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/saudi-arabia-use-red-cross-emblem-united-states-forces" title=""><span data-dcnode-id="8137" instrument_node="">Saudi Arabia, Use of the Red Cross Emblem by United States Forces</span></a></li><li data-dcnode-id="8132"><a data-dcnode-id="8133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/afghanistan-separate-hospital-treatment-men-and-women" title=""><span data-dcnode-id="8134" instrument_node="">Afghanistan, Separate Hospital Treatment for Men and Women</span></a></li><li data-dcnode-id="8129"><a data-dcnode-id="8130" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/afghanistan-code-conduct-mujahideen" title=""><span data-dcnode-id="8131" instrument_node="">Afghanistan, Code of Conduct for the Mujahideen</span></a></li><li data-dcnode-id="8126"><a data-dcnode-id="8127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/somalia-traditional-law-and-ihl"><span data-dcnode-id="8128" instrument_node="">Somalia, Traditional Law and IHL</span></a></li><li data-dcnode-id="8123"><a data-dcnode-id="8124" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/iraq-crimes-militia-groups"><span data-dcnode-id="8125" instrument_node="">Iraq, Crimes by Militia Groups</span></a></li></ul></div><h4 aria-controls="readingsbody3" aria-expanded="false" class="readingsheader" data-dcnode-id="8119" data-toggle="collapse" href="#readingsbody3"><span data-dcnode-id="8120" instrument_node="">specific bibliography</span></h4><div class="bluebox collapse" data-dcnode-id="7899" id="readingsbody3"><strong data-dcnode-id="8117"><span data-dcnode-id="8118" instrument_node="">Suggested reading:</span></strong><ul data-dcnode-id="7980"><li data-dcnode-id="8111"><span data-dcnode-id="8116" instrument_node="">BARNIDGE Robert P., “Islam and International Humanitarian Law: a Question of Compatibility?”, in </span><em data-dcnode-id="8113"><abbr d e="">, Paris, Pedone, 1997, 519&nbsp;pp.</span></li></ul><p data-dcnode-id="7977"><strong data-dcnode-id="7978"><span data-dcnode-id="7979" instrument_node="">Further reading:</span></strong></p><ul data-dcnode-id="7900"><li data-dcnode-id="7969"><span data-dcnode-id="7976" instrument_node="">ADACHI Sumio, “The Asian Concept”, in </span><em data-dcnode-id="7974"><span data-dcnode-id="7975" instrument_node="">International Dimensions of Humanitarian Law</span></em><span data-dcnode-id="7973" instrument_node="">, Geneva, Henry-Dunant Institute/</span><abbr data-dcnode-id="7971" title="United Nations Educational, Scientific and Cultural Organisation"><span data-dcnode-id="7972" instrument_node="">UNESCO</span></abbr><span data-dcnode-id="7970" instrument_node="">, 1988, pp. 13-19.</span></li><li data-dcnode-id="7963"><span data-dcnode-id="7968" instrument_node="">ACHOUR Yadh Ben, “Islam and International Humanitarian Law”, in </span><em data-dcnode-id="7965"><abbr data-dcnode-id="7966" title="International Review of the Red Cross "><span data-dcnode-id="7967" instrument_node="">IRRC</span></abbr></em><span data-dcnode-id="7964" instrument_node="">, No. 215, March-April 1980, pp. 59-69.</span></li><li data-dcnode-id="7958"><span data-dcnode-id="7962" instrument_node="">AN-NA’IM Abdullahi Ahmed, “Problems of Universal Cultural Legitimacy for Human Rights”, in DENG Francis M., </span><em data-dcnode-id="7960"><span data-dcnode-id="7961" instrument_node="">Human Rights in Africa: Cross-Cultural Perspective</span></em><span data-dcnode-id="7959" instrument_node="">, Washington, The Brookings Institute, 1990, 331 pp.</span></li><li data-dcnode-id="7950"><span data-dcnode-id="7957" instrument_node="">HUSSEIN Musa Youssouf (ed.), </span><em data-dcnode-id="7955"><span data-dcnode-id="7956" instrument_node="">Spared from the Spear. Traditional Somali Behaviour in Warfare</span></em><span data-dcnode-id="7954" instrument_node="">, Nairobi, </span><abbr data-dcnode-id="7952" titl
