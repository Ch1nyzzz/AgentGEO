 Laws of War”, in </span><em data-dcnode-id="2942"><span data-dcnode-id="2943" instrument_node="">Chinese Journal of International Politics</span></em><span data-dcnode-id="2941" instrument_node="">, Vol. 2(2), October 2008, pp. 171-203.</span></li><li data-dcnode-id="2934"><span data-dcnode-id="2939" instrument_node="">KOSIRNIK René, “The 1977 Protocols: a Landmark in the Development of International Humanitarian Law”, in </span><em data-dcnode-id="2936"><abbr data-dcnode-id="2937" title="International Review of the Red Cross "><span data-dcnode-id="2938" instrument_node="">IRRC</span></abbr></em><span data-dcnode-id="2935" instrument_node="">, No. 320, September-October 1997, pp. 483-505.</span></li><li data-dcnode-id="2929"><span data-dcnode-id="2933" instrument_node="">NOONE Gregory P., “The History and Evolution of the Law of War Prior to World War II”, in </span><em data-dcnode-id="2931"><span data-dcnode-id="2932" instrument_node="">Naval Law Review</span></em><span data-dcnode-id="2930" instrument_node="">, Vol. 47, 2000, pp. 176-207.</span></li><li data-dcnode-id="2923"><span data-dcnode-id="2928" instrument_node="">ÖGREN Kenneth, “Humanitarian Law in the Articles of War Decreed in 1621 by King Gustavus II Adolphus of Sweden”, in </span><em data-dcnode-id="2925"><abbr data-dcnode-id="2926" title="International Review of the Red Cross "><span data-dcnode-id="2927" instrument_node="">IRRC</span></abbr></em><span data-dcnode-id="2924" instrument_node="">, No. 313, July-August 1996, pp. 438-442.</span></li><li data-dcnode-id="2917"><span data-dcnode-id="2922" instrument_node="">PICTET Jean, “The New Geneva Conventions for the Protection of War Victims”, in </span><em data-dcnode-id="2919"><abbr data-dcnode-id="2920" title="American Journal of International Law"><span data-dcnode-id="2921" instrument_node="">AJIL</span></abbr></em><span data-dcnode-id="2918" instrument_node="">, Vol. 45/3, 1951, pp. 462-475.</span></li><li data-dcnode-id="2912"><span data-dcnode-id="2916" instrument_node="">SARKIN Jeremy, “The Historical Origins, Convergence and Interrelationship of International Human Rights Law, International Humanitarian Law, International Criminal Law and Public International Law and their Application since the Nineteenth Century”, in </span><em data-dcnode-id="2914"><span data-dcnode-id="2915" instrument_node="">Human Rights and International Legal Discourse</span></em><span data-dcnode-id="2913" instrument_node="">, Vol. 1, No.1, 2007, pp. 125-172.</span></li><li data-dcnode-id="2907"><span data-dcnode-id="2911" instrument_node="">SUBEDI Surya P., “The Concept in Hinduism of ‘Just War’”, in </span><em data-dcnode-id="2909"><span data-dcnode-id="2910" instrument_node="">Journal of Conflict and Security Law</span></em><span data-dcnode-id="2908" instrument_node="">, Vol. 8/2, October 2003, pp. 339-361.</span></li><li data-dcnode-id="2901"><span data-dcnode-id="2906" instrument_node="">VALENCIA VILLA Alejandro, “‘Dialogos Militares’ by Diego Garcia de Palacio: the First American Work on the Law of Nations”, in </span><em data-dcnode-id="2903"><abbr data-dcnode-id="2904" title="International Review of the Red Cross "><span data-dcnode-id="2905" instrument_node="">IRRC</span></abbr></em><span data-dcnode-id="2902" instrument_node="">, No. 290, September-October 1992, pp. 446-451.</span></li><li data-dcnode-id="2896"><span data-dcnode-id="2900" instrument_node="">VAN CREVELD Martin, </span><em data-dcnode-id="2898"><span data-dcnode-id="2899" instrument_node="">The Transformation of War</span></em><span data-dcnode-id="2897" instrument_node="">, New York, Free Press, 1991, 254 pp.</span></li></ul></div><blockquote data-dcnode-id="2880"><p data-dcnode-id="2889"><strong data-dcnode-id="2890"><span data-dcnode-id="2892" id="chapter3_quotation1"><span data-dcnode-id="2893" instrument_node="">Quotation 1</span></span><span data-dcnode-id="2891" instrument_node="">&nbsp;&nbsp; &nbsp;&nbsp;&nbsp;</span></strong></p><strong data-dcnode-id="2887"><span data-dcnode-id="2888" instrument_node="">The Torah and love for mankind.</span></strong><span data-dcnode-id="2886" instrument_node=""> “Thou shalt love thy neighbour as thyself: I am the Lord.”</span><br data-dcnode-id="2885"><span data-dcnode-id="2884" instrument_node=""> [</span><strong data-dcnode-id="2882"><span data-dcnode-id="2883" instrument_node="">Source</span></strong><span data-dcnode-id="2881" instrument_node="">: Moses Leviticus XIX, 18]</span></blockquote><div data-dcnode-id="2878"><span data-dcnode-id="2879" instrument_node="">“It is not this (rather) the fact that I will choose? To open the snares of wickedness, to undo the bands of the yoke, and to let the oppressed go free, and that ye should break asunder every yoke? It is not to distribute thy bread to the hungry, and that thou bring the afflicted poor into thy house? When thou seest the naked, that thou clothe him: and that thou hide not thyself from the own flesh?”</span></div><br data-dcnode-id="2877"><blockquote data-dcnode-id="2854"><p data-dcnode-id="2868"><span data-dcnode-id="2876" instrument_node="">[</span><strong data-dcnode-id="2874"><span data-dcnode-id="2875" instrument_node="">Source</span></strong><span data-dcnode-id="2873" instrument_node="">: Isaiah, LVIII, 6-7]</span><br data-dcnode-id="2872"><span data-dcnode-id="2871" instrument_node=""> </span><strong data-dcnode-id="2869"><span data-dcnode-id="2870" instrument_node="">Quotation 2</span></strong></p><p data-dcnode-id="2864"><strong data-dcnode-id="2866"><span data-dcnode-id="2867" instrument_node="">Chinese moderation and Confucian culture.</span></strong><span data-dcnode-id="2865" instrument_node=""> “Zigong (Tzu-Kung) asked: ‘is there a simple word which can be a guide to conduct throughout one’s life?’</span></p><p data-dcnode-id="2862"><span data-dcnode-id="2863" instrument_node="">The master said, ‘It is perhaps the word “Shu”. Do not impose on others what you yourself do not desire.”</span></p><span data-dcnode-id="2861" instrument_node="">[</span><strong data-dcnode-id="2859"><span data-dcnode-id="2860" instrument_node="">Source</span></strong><span data-dcnode-id="2858" instrument_node="">: Confucius (Kong Zi) (551-479 BC), </span><em data-dcnode-id="2856"><span data-dcnode-id="2857" instrument_node="">The Analects</span></em><span data-dcnode-id="2855" instrument_node="">, XV, 2L]</span></blockquote><div data-dcnode-id="2848"><span data-dcnode-id="2853" instrument_node="">“Where the army is, prices are high, when prices rise, the wealth of the people is exhausted.”</span><br data-dcnode-id="2852"><span data-dcnode-id="2851" instrument_node=""> “Treat the captives well, and care for them.”</span><br data-dcnode-id="2850"><span data-dcnode-id="2849" instrument_node=""> “Chang Yu: All the soldiers taken must be cared for with magnanimity and sincerity, so that they may be used by us.”</span></div><blockquote data-dcnode-id="2830"><p data-dcnode-id="2840"><span data-dcnode-id="2847" instrument_node="">[</span><strong data-dcnode-id="2845"><span data-dcnode-id="2846" instrument_node="">Source</span></strong><span data-dcnode-id="2844" instrument_node="">: Sun Zi (Sun Tzu) (Fourth century BC) “The Art of War” II, 12, 19]</span><strong data-dcnode-id="2841"><br data-dcnode-id="2843"><span data-dcnode-id="2842" instrument_node=""> Quotation 3</span></strong></p><span data-dcnode-id="2839" instrument_node="">&nbsp;</span><strong data-dcnode-id="2837"><span data-dcnode-id="2838" instrument_node="">Buddhist India and the condemnation of war.</span></strong><span data-dcnode-id="2836" instrument_node=""> “Thus arose His Sacred Majesty’s remorse for having conquered the Kalingas, because the conquest of a country previously unconquered involves the slaughter, death and carrying away captive of the people. This is a matter of profound sorrow and regret to His Sacred Majesty.”</span><br data-dcnode-id="2835"><span data-dcnode-id="2834" instrument_node=""> [</span><strong data-dcnode-id="2832"><span data-dcnode-id="2833" instrument_node="">Source</span></strong><span data-dcnode-id="2831" instrument_node="">: Asoka (Third Century BC), Girnar inscription, Rock Edict XII, Gujarat Province]</span></blockquote><blockquote data-dcnode-id="2809"><p data-dcnode-id="2819"><strong data-dcnode-id="2824"><span data-dcnode-id="2829" instrument_node="">Quotation 4</span><br data-dcnode-id="2828"><span data-dcnode-id="2827" instrument_node=""> </span><br data-dcnode-id="2826"><span data-dcnode-id="2825" instrument_node=""> </span></strong><strong data-dcnode-id="2822" style="line-height: 1.75;"><span data-dcnode-id="2823" instrument_node="">The Gospel and Christian charity.</span></strong><span data-dcnode-id="2820" style="line-height: 1.75;"><span data-dcnode-id="2821" instrument_node=""> “Then shall the King say unto them on his right hand: Come ye blessed of my Father, inherit the Kingdom prepared for you from the foundation of the world:</span></span></p><p data-dcnode-id="2817"><span data-dcnode-id="2818" instrument_node="">For I was and hungered, and ye gave me meat; I was thirsty, and ye gave me drink; I was a stranger, and ye took me in; Naked, and ye clothed me; I was sick, and ye visited me; I was in prison, and ye came unto me.”</span></p><span data-dcnode-id="2816" instrument_node="">[</span><strong data-dcnode-id="2814"><span data-dcnode-id="2815" instrument_node="">Source</span></strong><span data-dcnode-id="2813" instrument_node="">: “The Gospel according to St. Matthew”, 25:34-36, Biblia, King James version, </span><em data-dcnode-id="2811"><span data-dcnode-id="2812" instrument_node="">The Holy Bible Containing the Old and New Testaments</span></em><span data-dcnode-id="2810" instrument_node="">, Cambridge, University Press, 1234 pp.]</span></blockquote><blockquote data-dcnode-id="2771"><p data-dcnode-id="2798"><strong data-dcnode-id="2803"><span data-dcnode-id="2808" instrument_node="">Quotation 5</span><br data-dcnode-id="2807"><span data-dcnode-id="2806" instrument_node=""> </span><br data-dcnode-id="2805"><span data-dcnode-id="2804" instrument_node=""> </span></strong><strong data-dcnode-id="2801" style="line-height: 1.75;"><span data-dcnode-id="2802" instrument_node="">Allah’s mercy in the Islamic culture.</span></strong><span data-dcnode-id="2799" style="line-height: 1.75;"><span data-dcnode-id="2800" instrument_node=""> “The Prophet said:</span></span></p><p data-dcnode-id="2793"><span data-dcnode-id="2797" instrument_node="">[...], one of the basic rules of the Islamic concept of humanitarian law enjoins the faithful, fighting in the path of God against those waging war against them, never to transgress, let alone exceed, the limits of justice and equity and fall into the ways of tyranny and oppression (Ayats 109 </span><em data-dcnode-id="2795"><span data-dcnode-id="2796" instrument_node="">et seq.</span></em><span data-dcnode-id="2794" instrument_node=""> of the second Sura of the Koran, and the Prophet’s instructions to his troops.)</span></p><span data-dcnode-id="2792" instrument_node="">[</span><strong data-dcnode-id="2790"><span data-dcnode-id="2791" instrument_node="">Source</span></strong><span data-dcnode-id="2789" instrument_node="">: SULTAN Hamed, “The Islamic Concept” in </span><em data-dcnode-id="2787"><span data-dcnode-id="2788" instrument_node="">International Dimensions of Humanitarian Law</span></em><span data-dcnode-id="2786" instrument_node="">, Geneva, Henry Dunant Institute, </span><abbr data-dcnode-id="2784" title="United Nations Educational, Scientific and Cultural Organisation"><span data-dcnode-id="2785" instrument_node="">UNESCO</span></abbr><span data-dcnode-id="2783" instrument_node="">, 1988, p. 32]</span><br data-dcnode-id="2782"><span data-dcnode-id="2781" instrument_node=""> </span><br data-dcnode-id="2780"><span data-dcnode-id="2779" instrument_node=""> “When you fight for the glory of God, behave like men, do not run away, nor let the blood of women or children and old people stain your victory. Do not destroy palm trees, do not burn houses or fields of wheat, never cut down fruit trees and kill cattle only when you need to eat it. When you sign a treaty, make sure you respect its clauses. As you advance, you will meet men of faith living in monasteries and who serve God through prayer; leave them alone, do not kill them and do not destroy their monasteries ...”</span><br data-dcnode-id="2778"><span data-dcnode-id="2777" instrument_node=""> </span><br data-dcnode-id="2776"><span data-dcnode-id="2775" instrument_node=""> [</span><strong data-dcnode-id="2773"><span data-dcnode-id="2774" instrument_node="">Source</span></strong><span data-dcnode-id="2772" instrument_node="">: ABU BAKR, first successor to the Prophet; quoted in BOISARD Marcel A., “De certaines règles islamiques concernant la conduite des hostilités et de la protection des victimes de conflits armés”, in Annales d’études internationales, 1977, vol. 8, Geneva, p. 151; unofficial translation; see also BEN ACHOUR Zagh, “Islam et droit international humanitaire”, in IRRC, vol. 722, March-April 1980, p. 67]</span></blockquote><span data-dcnode-id="2770" id="toc--development-of-international-humanitarian-law"></span><h3 data-dcnode-id="2767"><a class="nohref" data-dcnode-id="2769" id="c_i_1" name="c_i_1"></a><span data-dcnode-id="2768" instrument_node="">&nbsp;Development of International Humanitarian Law</span></h3><table border="0" cellpadding="0" cellspacing="0" data-dcnode-id="2722" width="80%"><tbody data-dcnode-id="2723"><tr data-dcnode-id="2762"><td data-dcnode-id="2765" valign="top" width="10%"><span data-dcnode-id="2766" instrument_node="">3000 BC</span></td><td data-dcnode-id="2763" valign="top" width="90%"><span data-dcnode-id="2764" instrument_node="">Customs, Bilateral treaties, Customary law</span></td></tr><tr data-dcnode-id="2757"><td data-dcnode-id="2760" valign="top"><span data-dcnode-id="2761" instrument_node="">1859</span></td><td data-dcnode-id="2758" valign="top"><span data-dcnode-id="2759" instrument_node="">Henry Dunant assists the wounded on the battlefield of Solferino</span></td></tr><tr data-dcnode-id="2752"><td data-dcnode-id="2755" valign="top"><span data-dcnode-id="2756" instrument_node="">1863&nbsp;</span></td><td data-dcnode-id="2753" valign="top"><span data-dcnode-id="2754" instrument_node="">Lieber Code (Instructions for the Government of Armies of the United States in the Field)</span></td></tr><tr data-dcnode-id="2744"><td data-dcnode-id="2750" valign="top"><span data-dcnode-id="2751" instrument_node="">1863</span></td><td data-dcnode-id="2745" valign="top"><span data-dcnode-id="2749" instrument_node="">Foundation of the </span><abbr data-dcnode-id="2747" title="International Committee of the Red Cross "><span data-dcnode-id="2748" instrument_node="">ICRC</span></abbr><span data-dcnode-id="2746" instrument_node=""> and of the first National Societies</span></td></tr><tr data-dcnode-id="2739"><td data-dcnode-id="2742" valign="top"><span data-dcnode-id="2743" instrument_node="">1864</span></td><td data-dcnode-id="2740" valign="top"><span data-dcnode-id="2741" instrument_node="">First Geneva Convention</span></td></tr><tr data-dcnode-id="2734"><td data-dcnode-id="2737" valign="top"><span data-dcnode-id="2738" instrument_node="">1868</span></td><td data-dcnode-id="2735" valign="top"><span data-dcnode-id="2736" instrument_node="">Saint Petersburg Declaration Renouncing the Use, in Time of War, of Certain Explosive Projectiles</span></td></tr><tr data-dcnode-id="2729"><td data-dcnode-id="2732" valign="top"><span data-dcnode-id="2733" instrument_node="">1880</span></td><td data-dcnode-id="2730" valign="top"><span data-dcnode-id="2731" instrument_node="">Oxford Manual on The Laws of War on Land</span></td></tr><tr data-dcnode-id="2724"><td data-dcnode-id="2727" valign="top"><span data-dcnode-id="2728" instrument_node="">1899/1907</span></td><td data-dcnode-id="2725" valign="top"><sp itional Distinctive Emblem"><span data-dcnode-id="2173" instrument_node="">Protocol III</span></abbr><span data-dcnode-id="2171" instrument_node=""> additional to the Geneva Conventions relating to the Adoption of an Additional Distinctive Emblem</span></td></tr></tbody></table><br data-dcnode-id="2166"><h4 class="casesdocheader" data-dcnode-id="2164"><span data-dcnode-id="2165" instrument_node="">CASES AND DOCUMENTS</span></h4><div class="beigebox" data-dcnode-id="2158"><ul data-dcnode-id="2159"><li data-dcnode-id="2160"><div class="rx_ephox_inlinevariant" data-dcnode-id="2161"><a data-dcnode-id="2162" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.icrc.org/ihl.nsf/FULL/615" onclick="window.open(this.href, 'child'); return false;" onkeypress="window.open(this.href, 'child'); return false;" target="_blank" title="Go to The Third Protocol Additional to the Geneva Conventions"><span data-dcnode-id="2163" instrument_node="">The Third Protocol Additional to the Geneva Conventions</span></a></div></li></ul></div><table border="0" cellpadding="0" cellspacing="0" data-dcnode-id="2151" width="80%"><tbody data-dcnode-id="2152"><tr data-dcnode-id="2153"><td data-dcnode-id="2156" valign="top" width="10%"><span data-dcnode-id="2157" instrument_node="">2008&nbsp;</span></td><td data-dcnode-id="2154" valign="top" width="90%"><span data-dcnode-id="2155" instrument_node="">Convention on Cluster Munitions</span></td></tr></tbody></table><br data-dcnode-id="2150"><h4 class="casesdocheader" data-dcnode-id="2148"><span data-dcnode-id="2149" instrument_node="">CASES AND DOCUMENTS</span></h4><div class="beigebox" data-dcnode-id="2142"><ul data-dcnode-id="2143"><li data-dcnode-id="2144"><div class="rx_ephox_inlinevariant" data-dcnode-id="2145"><a data-dcnode-id="2146" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.icrc.org/ihl.nsf/FULL/620" onclick="window.open(this.href, 'child'); return false;" onkeypress="window.open(this.href, 'child'); return false;" target="_blank" title="Go to Convention on Cluster Munitions"><span data-dcnode-id="2147" instrument_node="">Convention on Cluster Munitions</span></a></div></li></ul></div><h4 class="blueheader" data-dcnode-id="2140"><span data-dcnode-id="2141" instrument_node="">Footnotes</span></h4><div class="bluebox" data-dcnode-id="2095"><ul data-dcnode-id="2096"><li data-dcnode-id="2128"><a data-dcnode-id="2138" href="#_ftnref_055" id="_ftn_055" name="_ftn_055" title=""><span data-dcnode-id="2139" instrument_node="">[55]</span></a><span data-dcnode-id="2137" instrument_node=""> DUNANT Henry, </span><em data-dcnode-id="2133"><span data-dcnode-id="2136" instrument_node="">A Memory of Solferino, </span><abbr data-dcnode-id="2134" title="International Committee of the Red Cross "><span data-dcnode-id="2135" instrument_node="">ICRC</span></abbr></em><span data-dcnode-id="2132" instrument_node="">, Geneva, 1986, 147 pp. (also available online at </span><a data-dcnode-id="2130" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.icrc.org/" target="_blank"><span data-dcnode-id="2131" instrument_node="">http://www.icrc.org</span></a><span data-dcnode-id="2129" instrument_node="">)</span></li><li data-dcnode-id="2115"><a data-dcnode-id="2126" href="#_ftnref_056" id="_ftn_056" name="_ftn_056" title=""><span data-dcnode-id="2127" instrument_node="">[56]</span></a><span data-dcnode-id="2125" instrument_node=""> </span><em data-dcnode-id="2123"><span data-dcnode-id="2124" instrument_node="">See infra</span></em><span data-dcnode-id="2122" instrument_node="">, </span><a data-dcnode-id="2117" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/law/icrc" title=""><span data-dcnode-id="2121" instrument_node="">The International Committee of the Red Cross (</span><abbr data-dcnode-id="2119" title="International Committee of the Red Cross "><span data-dcnode-id="2120" instrument_node="">ICRC</span></abbr><span data-dcnode-id="2118" instrument_node="">)</span></a><span data-dcnode-id="2116" instrument_node="">.</span></li><li data-dcnode-id="2106"><a data-dcnode-id="2113" href="#_ftnref_057" id="_ftn_057" name="_ftn_057" title=""><span data-dcnode-id="2114" instrument_node="">[57]</span></a><span data-dcnode-id="2112" instrument_node=""> </span><em data-dcnode-id="2110"><span data-dcnode-id="2111" instrument_node="">See infra</span></em><span data-dcnode-id="2109" instrument_node="">, </span><a data-dcnode-id="2107" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/law/conduct-hostilities%23iii_2"><span data-dcnode-id="2108" instrument_node="">Conduct of Hostilities, III. Means and methods of warfare, 2. Prohibited or restricted use of weapons</span></a></li><li data-dcnode-id="2097"><a data-dcnode-id="2104" href="#_ftnref_058" id="_ftn_058" name="_ftn_058" title=""><span data-dcnode-id="2105" instrument_node="">[58]</span></a><span data-dcnode-id="2103" instrument_node=""> </span><em data-dcnode-id="2101"><span data-dcnode-id="2102" instrument_node="">See infra</span></em><span data-dcnode-id="2100" instrument_node="">, </span><a data-dcnode-id="2098" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/law/conduct-hostilities%23iii_3"><span data-dcnode-id="2099" instrument_node="">Conduct of Hostilities, III. Means and methods of warfare, 3. Prohibited methods of warfare</span></a></li></ul></div></div></div><div class="field-item odd" data-dcnode-id="398"><span data-dcnode-id="2092" id="toc-d-sources-of-contemporary-international-humanitarian-law"></span><h2 data-dcnode-id="2089"><a class="nohref" data-dcnode-id="2091" id="chapter4"></a><span data-dcnode-id="2090" instrument_node="">D. Sources of Contemporary International Humanitarian Law</span></h2><div class="rxbodyfield" data-dcnode-id="399"><span data-dcnode-id="2088" id="toc--i-treaties"></span><h3 data-dcnode-id="2085"><a class="nohref" data-dcnode-id="2087" id="d_i" name="d_i"></a><span data-dcnode-id="2086" instrument_node="">&nbsp;I. Treaties</span></h3><p data-dcnode-id="2071"><span data-dcnode-id="2084" instrument_node="">(For a more complete list of International Humanitarian Law treaties and reference to Cases and Documents referring specifically to each treaty, </span><em data-dcnode-id="2082"><span data-dcnode-id="2083" instrument_node="">see supra</span></em><span data-dcnode-id="2081" instrument_node="">, </span><a data-dcnode-id="2079" href="#chapter3"><span data-dcnode-id="2080" instrument_node="">Historical Development of International Humanitarian law</span></a><span data-dcnode-id="2078" instrument_node="">. The text of International Humanitarian Law treaties and the current status of participation in those treaties are also available on the </span><abbr data-dcnode-id="2076" title="International Committee of the Red Cross "><span data-dcnode-id="2077" instrument_node="">ICRC</span></abbr><span data-dcnode-id="2075" instrument_node=""> website at </span><a data-dcnode-id="2073" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.icrc.org/" target="_blank"><span data-dcnode-id="2074" instrument_node="">http://www.icrc.org</span></a><span data-dcnode-id="2072" instrument_node="">)</span></p><h4 data-dcnode-id="2069"><span data-dcnode-id="2070" instrument_node="">Introductory text</span></h4><p data-dcnode-id="2055"><span data-dcnode-id="2068" instrument_node="">Historically, the rules of International Humanitarian Law (</span><abbr data-dcnode-id="2066" title="International Humanitarian Law "><span data-dcnode-id="2067" instrument_node="">IHL</span></abbr><span data-dcnode-id="2065" instrument_node="">) (in particular on the treatment and exchange of prisoners and the wounded) have long been laid down in bilateral treaties. The systematic codification and progressive development of </span><abbr data-dcnode-id="2063" title="International Humanitarian Law "><span data-dcnode-id="2064" instrument_node="">IHL</span></abbr><span data-dcnode-id="2062" instrument_node=""> in general multilateral treaties also started relatively early compared with other branches of international law – in the mid-19th century. Most often a new set of treaties supplemented or replaced less detailed, earlier conventions in the wake of major wars, taking into account new technological or military developments. </span><abbr data-dcnode-id="2060" title="International Humanitarian Law "><span data-dcnode-id="2061" instrument_node="">IHL</span></abbr><span data-dcnode-id="2059" instrument_node=""> treaties are therefore sometimes charged with being “one war behind reality”. This is true for all law, however. Only rarely has it been possible to regulate or even to outlaw a new means or method of warfare before it becomes operational.[</span><a data-dcnode-id="2057" href="#_ftn_059" id="_ftnref_059" name="_ftnref_059" title=""><span data-dcnode-id="2058" instrument_node="">59</span></a><span data-dcnode-id="2056" instrument_node="">]</span></p><p data-dcnode-id="2050"><span data-dcnode-id="2054" instrument_node="">Today, </span><abbr data-dcnode-id="2052" title="International Humanitarian Law "><span data-dcnode-id="2053" instrument_node="">IHL</span></abbr><span data-dcnode-id="2051" instrument_node=""> is not only one of the most codified branches of international law, but its relatively few instruments are also well coordinated with each other. Generally the more recent treaty expressly states that it either supplements or replaces the earlier treaty (among the States parties).</span></p><p data-dcnode-id="2046"><abbr data-dcnode-id="2048" title="International Humanitarian Law "><span data-dcnode-id="2049" instrument_node="">IHL</span></abbr><span data-dcnode-id="2047" instrument_node=""> treaties have the great advantage that their rules are relatively beyond doubt and controversy, “in black and white”, ready to be applied by soldiers without first obliging them to conduct extensive research on practice. Furthermore, the majority of “new States” have accepted the rules contained in these treaties as legitimate, because they were given the possibility to express themselves during the drafting process. Often following a voluntarist approach, such States agree more readily to be bound by treaties than by other sources of international law.&nbsp;</span></p><p data-dcnode-id="2032"><span data-dcnode-id="2045" instrument_node="">The disadvantage of </span><abbr data-dcnode-id="2043" title="International Humanitarian Law "><span data-dcnode-id="2044" instrument_node="">IHL</span></abbr><span data-dcnode-id="2042" instrument_node=""> treaties, as of all treaty law, is that they are technically unable to have a general effect – to be automatically binding on all States. Fortunately, most </span><abbr data-dcnode-id="2040" title="International Humanitarian Law "><span data-dcnode-id="2041" instrument_node="">IHL</span></abbr><span data-dcnode-id="2039" instrument_node=""> treaties are today among the most universally accepted and only few States are not bound by them.[</span><a data-dcnode-id="2037" href="#_ftn_060" id="_ftnref_060" name="_ftnref_060" title=""><span data-dcnode-id="2038" instrument_node="">60</span></a><span data-dcnode-id="2036" instrument_node="">] This process of acceptance nevertheless generally takes decades and is usually preceded by years of </span><em data-dcnode-id="2034"><span data-dcnode-id="2035" instrument_node="">“travaux préparatoires”</span></em><span data-dcnode-id="2033" instrument_node="">. This is one of the reasons why the 1977 Additional Protocols, which are so crucial for the protection of victims of contemporary armed conflicts, are still not binding for nearly 30 States – among them, unsurprisingly, a number of major powers frequently involved in armed conflicts.</span></p><p data-dcnode-id="2024"><span data-dcnode-id="2031" instrument_node="">The traditional process of drafting new international treaties, which is based on the rule of consensus between nearly 200 States, ends up conferring a “triple victory” on those who have been described as “digging the grave of International Humanitarian Law”, i.e. those who do not want better protection to exist in a given domain. “They slow the process, they water down the text, and then do not even ratify the treaty once adopted.”[</span><a data-dcnode-id="2029" href="#_ftn_061" id="_ftnref_061" name="_ftnref_061" title=""><span data-dcnode-id="2030" instrument_node="">61</span></a><span data-dcnode-id="2028" instrument_node="">] They thus leave the States parties that had desired a revision of the law with a text that falls short of their original wishes. To avoid this unsatisfactory state of affairs, some States that genuinely want an improvement have resorted to what is referred to as the “Ottawa procedure”, because it was applied for the first time during the deliberations on the Ottawa Convention on the Prohibition of the Use, Stockpiling, Production and Transfer of Anti-personnel Mines and on Their Destruction of 18 September 1997. Only those States that wished to achieve the result indicated in the title of that treaty were involved in negotiating it. Its opponents were then free to agree to the standards that were set by that method or not. The same method was used in the Oslo process leading to the adoption of the Convention on Cluster Munitions.[</span><a data-dcnode-id="2026" href="#_ftn_062" id="_ftnref_062" name="_ftnref_062" title=""><span data-dcnode-id="2027" instrument_node="">62</span></a><span data-dcnode-id="2025" instrument_node="">]</span></p><p data-dcnode-id="1995"><span data-dcnode-id="2023" instrument_node="">However important the treaty rules of </span><abbr data-dcnode-id="2021" title="International Humanitarian Law "><span data-dcnode-id="2022" instrument_node="">IHL</span></abbr><span data-dcnode-id="2020" instrument_node=""> may be – and even though compliance is not subject to reciprocity – as treaty law they are only binding on States party to those treaties and, as far as international armed conflicts are concerned, only in their relations with other States party to those treaties.[</span><a data-dcnode-id="2018" href="#_ftn_063" id="_ftnref_063" name="_ftnref_063" title=""><span data-dcnode-id="2019" instrument_node="">63</span></a><span data-dcnode-id="2017" instrument_node="">] The general law of treaties[</span><a data-dcnode-id="2015" href="#_ftn_064" id="_ftnref_064" name="_ftnref_064" title=""><span data-dcnode-id="2016" instrument_node="">64</span></a><span data-dcnode-id="2014" instrument_node="">] governs the conclusion, entry into force, application, interpretation, amendment and modification of </span><abbr data-dcnode-id="2012" title="International Humanitarian Law "><span data-dcnode-id="2013" instrument_node="">IHL</span></abbr><span data-dcnode-id="2011" instrument_node=""> treaties,[</span><a data-dcnode-id="2009" href="#_ftn_065" id="_ftnref_065" name="_ftnref_065" title=""><span data-dcnode-id="2010" instrument_node="">65</span></a><span data-dcnode-id="2008" instrument_node="">] reservations to them, and even their denunciation; the latter, however, only takes effect after the end of the armed conflict in which the denunciating State is involved.[</span><a data-dcnode-id="2006" href="#_ftn_066" id="_ftnref_066" name="_ftnref_066" title=""><span data-dcnode-id="2007" instrument_node="">66</span></a><span data-dcnode-id="2005" instrument_node="">] The main exception to the general rules of the law of treaties for </span><abbr data-dcnode-id="2003" title="International Humanitarian Law "><span data-dcnode-id="2004" instrument_node="">IHL</span></abbr><span data-dcnode-id="2002" instrument_node=""> treaties is provided by the law of treaties itself: once an </span><abbr data-dcnode-id="2000" title="International Humanitarian Law "><span data-dcnode-id="2001" instrument_node="">IHL</span></abbr><span data-dcnode-id="1999" instrument_node=""> treaty has become binding on a State, not even a substantial breach of its provisions by another State – including by its enemy in an international armed conflict – permits the termination or suspension of the treaty’s application as a consequence of that breach.[</span><a data-dcnode-id="1997" href="#_ftn_067" id="_ftnref_067" name="_ftnref_067" title=""><span data-dcnode-id="1998" instrument_node="">67</span></a><span data-dcnode-id="1996" instrument_node="">]</span></p><h4 data-dcnode-id="1992"><a class="nohref" data-dcnode-id="1994" id="d_i_1" name="d_i_1"></a><span data-dcnode-id="1993" instrument_node="">&nbsp;1. &nbsp; The Hague Conventions of 1907</span></h4><h4 class="casesdocheader" data-dcnode-id="1990"><span data-dcnode-id="1991" instrument_node="">CASES AND DOCUMENTS</span></h4><div class="beigebox" data-dcnode-id="1973"><ul data-dcnode-id="1974"><li data-dcnode-id="1986"><div class="rx_ephox_inlinevariant" data-dcnode-id="1987"><a data-dcnode-id="1988" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.icrc.org/ihl.nsf/FULL/195" onclick="window.open(this.href, 'child'); return false;" onkeypress="window.open(this.href, 'child'); return false;" target="_blank" title="Go to The Hague Regulations"><span data-dcnode-id="1989" instrument_node="">The Hague Regulations</span></a></div></li><li data-dcnode-id="1983"><a data-dcnode-id="1984" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/sweden-report-swedish-international-humanitarian-law-committee%23para_3_2_2"><span data-dcnode-id="1985" instrument_node="">Sweden, Report of the Swedish International Humanitarian Law Committee [Part 3.2.2]</span></a></li><li data-dcnode-id="1978"><a data-dcnode-id="1979" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/icjisrael-separation-wallsecurity-fence-occupied-palestinian-territory%23part_a_para_89"><abbr data-dcnode-id="1981" title="International Court of Justice "><span data-dcnode-id="1982" instrument_node="">ICJ</span></abbr><span data-dcnode-id="1980" instrument_node="">/Israel, Separation Wall/Security Fence in the Occupied Palestinian Territory [Part A., para. 89]</span></a></li><li data-dcnode-id="1975"><a data-dcnode-id="1976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/germany-government-reply-kurdistan-conflict%23para_8"><span data-dcnode-id="1977" instrument_node="">Germany, Government Reply on the Kurdistan Conflict [Para. 8]</span></a></li></ul></div><h4 aria-controls="readingsbody26" aria-expanded="false" class="readingsheader" data-dcnode-id="1971" data-toggle="collapse" href="#readingsbody26"><span data-dcnode-id="1972" instrument_node="">specific bibliography</span></h4><div class="bluebox collapse" data-dcnode-id="1956" id="readingsbody26"><p data-dcnode-id="1968"><strong data-dcnode-id="1969"><span data-dcnode-id="1970" instrument_node="">Suggested reading:</span></strong></p><ul data-dcnode-id="1957"><li data-dcnode-id="1963"><span data-dcnode-id="1967" instrument_node="">EYFFINGER Arthur, “A Highly Critical Moment: Role and Record of the 1907 Hague Peace Conference”, in </span><em data-dcnode-id="1965"><span data-dcnode-id="1966" instrument_node="">Netherlands International Law Review</span></em><span data-dcnode-id="1964" instrument_node="">, Vol. 54, No. 2, 2007, pp. 197-228.</span></li><li data-dcnode-id="1958"><span data-dcnode-id="1962" instrument_node="">SCOTT James Brown, </span><em data-dcnode-id="1960"><span data-dcnode-id="1961" instrument_node="">The Hague Peace Conferences of 1899 and 1907</span></em><span data-dcnode-id="1959" instrument_node="">, Baltimore, The Johns Hopkins Press, 1909, 2 Vol.</span></li></ul></div><h4 data-dcnode-id="1953"><a class="nohref" data-dcnode-id="1955" id="d_i_2" name="d_i_2"></a><span data-dcnode-id="1954" instr ata-dcnode-id="1766"><strong data-dcnode-id="1767"><span data-dcnode-id="1768" instrument_node="">Further reading:</span></strong></p><ul data-dcnode-id="1739"><li data-dcnode-id="1760"><span data-dcnode-id="1765" instrument_node="">DINSTEIN Yoram, “Comments on Protocol I”, in </span><em data-dcnode-id="1762"><abbr data-dcnode-id="1763" title="International Review of the Red Cross "><span data-dcnode-id="1764" instrument_node="">IRRC</span></abbr></em><span data-dcnode-id="1761" instrument_node="">, No. 320, September-October 1997, pp. 515-519.</span></li><li data-dcnode-id="1752"><span data-dcnode-id="1759" instrument_node="">ROBERTS Guy B., “The New Rules for Waging War: The Case Against Ratification of Additional </span><abbr data-dcnode-id="1757" title="Protocol Additional to the Geneva Conventions of 12 August 1949, and Relating to the Protection of Victims of International Armed Conflicts, of 8 June 1977"><span data-dcnode-id="1758" instrument_node="">Protocol I</span></abbr><span data-dcnode-id="1756" instrument_node="">”, in </span><em data-dcnode-id="1754"><span data-dcnode-id="1755" instrument_node="">Virginia Journal of International Law</span></em><span data-dcnode-id="1753" instrument_node="">, Vol. 26, 1985, pp. 109-170.</span></li><li data-dcnode-id="1740"><span data-dcnode-id="1751" instrument_node="">SOFAER Abraham D., “Agora: The </span><abbr data-dcnode-id="1749" title="United States of America"><span data-dcnode-id="1750" instrument_node="">US</span></abbr><span data-dcnode-id="1748" instrument_node=""> Decision not to Ratify </span><abbr data-dcnode-id="1746" title="Protocol Additional to the Geneva Conventions of 12 August 1949, and Relating to the Protection of Victims of International Armed Conflicts, of 8 June 1977"><span data-dcnode-id="1747" instrument_node="">Protocol I</span></abbr><span data-dcnode-id="1745" instrument_node=""> to the Geneva Conventions on the Protection of War Victims, The Rationale for the United States Decision”, in </span><em data-dcnode-id="1742"><abbr data-dcnode-id="1743" title="American Journal of International Law"><span data-dcnode-id="1744" instrument_node="">AJIL</span></abbr></em><span data-dcnode-id="1741" instrument_node="">, Vol. 82, 1988, pp. 784-787.</span></li></ul></div><span data-dcnode-id="1737" id="toc--ii-customary-law"></span><h3 data-dcnode-id="1734"><a class="nohref" data-dcnode-id="1736" id="d_ii" name="d_ii"></a><span data-dcnode-id="1735" instrument_node="">&nbsp;II. Customary Law</span></h3><h4 data-dcnode-id="1732"><span data-dcnode-id="1733" instrument_node="">Introductory text</span></h4><p data-dcnode-id="1724"><span data-dcnode-id="1731" instrument_node="">Those who uphold the traditional theory of customary law and consider that it stems from the actual behaviour of States in conformity with an alleged norm face particular difficulties in the field of </span><abbr data-dcnode-id="1729" title="International Humanitarian Law "><span data-dcnode-id="1730" instrument_node="">IHL</span></abbr><span data-dcnode-id="1728" instrument_node="">. First, for most rules this approach would limit practice to that of belligerents, i.e., a few subjects whose practice it is difficult to qualify as “general” and even more as “accepted as law”.[</span><a data-dcnode-id="1726" href="#_ftn_068" id="_ftnref_068" name="_ftnref_068" title=""><span data-dcnode-id="1727" instrument_node="">68</span></a><span data-dcnode-id="1725" instrument_node="">] Second, the actual practice of belligerents is difficult to identify, particularly as it often consists of omissions. There are also additional difficulties, e.g., war propaganda manipulates truth and secrecy makes it impossible to know which objectives were targeted and whether their destruction was deliberate. Finally, States are responsible for the behaviour of individual soldiers even if the latter did not act in conformity with their instructions, but this does not imply that such behaviour is also State practice constitutive of customary law. It is therefore particularly difficult to determine which acts of soldiers count as State practice.</span></p><p data-dcnode-id="1713"><span data-dcnode-id="1723" instrument_node="">Other factors must therefore also be considered when assessing whether a rule is part of customary law: whether qualified as practice </span><em data-dcnode-id="1721"><span data-dcnode-id="1722" instrument_node="">lato sensu</span></em><span data-dcnode-id="1720" instrument_node=""> or as evidence for </span><em data-dcnode-id="1718"><span data-dcnode-id="1719" instrument_node="">opinio juris</span></em><span data-dcnode-id="1717" instrument_node="">, statements of belligerents, including accusations against the enemy of violations of </span><abbr data-dcnode-id="1715" title="International Humanitarian Law "><span data-dcnode-id="1716" instrument_node="">IHL</span></abbr><span data-dcnode-id="1714" instrument_node=""> and justifications for their own behaviour, should also be taken into account.</span></p><p data-dcnode-id="1708"><span data-dcnode-id="1712" instrument_node="">To identify “general” practice, statements of third States on the behaviour of belligerents and abstract statements on an alleged norm in diplomatic forums also have to be considered. Military manuals are even more important, because they contain instructions by States restraining their soldiers’ actions, which are somehow “statements against interest”. Too few States – and generally only Western States – have sophisticated manuals the contents of which are open to public consultation as evidence for “general” practice in the contemporary international community. Moreover, some of those manuals are said to reflect policy rather than law.[</span><a data-dcnode-id="1710" href="#_ftn_069" id="_ftnref_069" name="_ftnref_069" title=""><span data-dcnode-id="1711" instrument_node="">69</span></a><span data-dcnode-id="1709" instrument_node="">]</span></p><p data-dcnode-id="1682"><span data-dcnode-id="1707" instrument_node="">For all these reasons, particular consideration has to be given in the field of </span><abbr data-dcnode-id="1705" title="International Humanitarian Law "><span data-dcnode-id="1706" instrument_node="">IHL</span></abbr><span data-dcnode-id="1704" instrument_node=""> to treaties as a source of customary international law – in particular to the general multilateral conventions codifying the law and the process leading to their preparation and acceptance. Taking an overall view of all practice, it may, for example, be found that a rule set out in the two 1977 Additional Protocols corresponds today to customary law binding on all States and belligerents, either because it codifies (</span><em data-dcnode-id="1702"><span data-dcnode-id="1703" instrument_node="">stricto sensu</span></em><span data-dcnode-id="1701" instrument_node="">) previously existing general international law,[</span><a data-dcnode-id="1699" href="#_ftn_070" id="_ftnref_070" name="_ftnref_070" title=""><span data-dcnode-id="1700" instrument_node="">70</span></a><span data-dcnode-id="1698" instrument_node="">] because it translates a previously existing practice into a rule, because it combines, interprets or specifies existing principles or rules,[</span><a data-dcnode-id="1696" href="#_ftn_071" id="_ftnref_071" name="_ftnref_071" title=""><span data-dcnode-id="1697" instrument_node="">71</span></a><span data-dcnode-id="1695" instrument_node="">] because it concludes the development of a rule of customary international law or because it was a catalyst for the creation of a rule of customary </span><abbr data-dcnode-id="1693" title="International Humanitarian Law "><span data-dcnode-id="1694" instrument_node="">IHL</span></abbr><span data-dcnode-id="1692" instrument_node=""> through subsequent practice and multiple consent of States to be bound by the treaty. It is therefore generally agreed today that most, but clearly not all, of the rules set out in the Additional Protocols formulate parallel rules of customary international law. Whether such customary rules necessarily also apply in non-international armed conflicts is in our view another issue, one which must be decided on the basis of the practice and </span><em data-dcnode-id="1690"><span data-dcnode-id="1691" instrument_node="">opinio juris</span></em><span data-dcnode-id="1689" instrument_node=""> of States (and, some would add, armed groups) in non-international armed conflicts. Even persistent objectors cannot escape from their obligations under </span><em data-dcnode-id="1687"><span data-dcnode-id="1688" instrument_node="">jus cogens</span></em><span data-dcnode-id="1686" instrument_node="">, i.e. from most obligations under </span><abbr data-dcnode-id="1684" title="International Humanitarian Law "><span data-dcnode-id="1685" instrument_node="">IHL</span></abbr><span data-dcnode-id="1683" instrument_node="">.</span></p><p data-dcnode-id="1677"><span data-dcnode-id="1681" instrument_node="">Although </span><abbr data-dcnode-id="1679" title="International Humanitarian Law "><span data-dcnode-id="1680" instrument_node="">IHL</span></abbr><span data-dcnode-id="1678" instrument_node=""> is widely codified in broadly accepted multilateral conventions, customary rules remain important to protect victims on issues not covered by the treaties, when non-parties to a treaty (or even entities which cannot become parties because they are not universally recognized) are involved in a conflict, where reservations have been made to the treaty rules, because international criminal tribunals prefer – rightly or wrongly – to apply customary rules, and because in some legal systems only customary rules are directly applicable in domestic law.</span></p><p data-dcnode-id="1666"><span data-dcnode-id="1676" instrument_node="">The </span><abbr data-dcnode-id="1674" title="International Committee of the Red Cross "><span data-dcnode-id="1675" instrument_node="">ICRC</span></abbr><span data-dcnode-id="1673" instrument_node="">’s comprehensive study[</span><a data-dcnode-id="1671" href="#_ftn_072" id="_ftnref_072" name="_ftnref_072" title=""><span data-dcnode-id="1672" instrument_node="">72</span></a><span data-dcnode-id="1670" instrument_node="">] has found, after ten years of research on “State practice” (mostly in the form of “official practice”, i.e. declarations rather than actual behaviour), 161 rules of customary International Humanitarian Law. It considers that 136 (and arguably even 141) of those rules, many of which are based on rules of </span><abbr data-dcnode-id="1668" title="Protocol Additional to the Geneva Conventions of 12 August 1949, and Relating to the Protection of Victims of International Armed Conflicts, of 8 June 1977"><span data-dcnode-id="1669" instrument_node="">Protocol I</span></abbr><span data-dcnode-id="1667" instrument_node=""> applicable as a treaty to international armed conflicts, apply equally to non-international armed conflicts. The study in particular leads to the conclusion that most of the rules on the conduct of hostilities – initially designed to apply solely to international armed conflicts – are also applicable as customary rules in non-international conflicts, thus considerably expanding the law applicable in those situations.</span></p><p data-dcnode-id="1664"><span data-dcnode-id="1665" instrument_node="">Given the time-consuming nature and other difficulties of treaty-making in an international society with some 200 members and the rapidly evolving needs of war victims for protection against new technological and other inhumane phenomena, the importance of custom – redefined or not – may even increase in this field in the future.</span></p><p data-dcnode-id="1656"><span data-dcnode-id="1663" instrument_node="">Custom, however, also has very serious disadvantages as a source of </span><abbr data-dcnode-id="1661" title="International Humanitarian Law "><span data-dcnode-id="1662" instrument_node="">IHL</span></abbr><span data-dcnode-id="1660" instrument_node="">. It is very difficult to base uniform application of the law, military instruction and the repression of breaches on custom, which by definition is in constant evolution, is difficult to formulate and is always subject to controversy. The codification of </span><abbr data-dcnode-id="1658" title="International Humanitarian Law "><span data-dcnode-id="1659" instrument_node="">IHL</span></abbr><span data-dcnode-id="1657" instrument_node=""> began 150 years ago precisely because the international community found the actual practice of belligerents unacceptable, and custom is – despite all modern theories – also based on the actual practice of belligerents.</span></p><blockquote data-dcnode-id="1637"><p data-dcnode-id="1653"><strong data-dcnode-id="1654"><span data-dcnode-id="1655" instrument_node="">Quotation 1</span></strong></p><p data-dcnode-id="1648"><span data-dcnode-id="1652" instrument_node="">Perhaps it is time to face squarely the fact that the orthodox tests of custom – practice and </span><em data-dcnode-id="1650"><span data-dcnode-id="1651" instrument_node="">opinio juri</span></em><span data-dcnode-id="1649" instrument_node="">s – are often not only inadequate but even irrelevant for the identification of much new law today. And the reason is not far to seek: much of this new law is not custom at all, and does not even resemble custom. It is recent, it is innovatory, it involves topical policy decisions, and it is often the focus of contention. Anything less like custom in the ordinary meaning of that term it would be difficult to imagine. [...]</span></p><span data-dcnode-id="1647" instrument_node="">[</span><strong data-dcnode-id="1645"><span data-dcnode-id="1646" instrument_node="">Source</span></strong><span data-dcnode-id="1644" instrument_node="">: JENNINGS Robert Y., “What Is International Law and How Do We Tell It When We </span><em data-dcnode-id="1642"><span data-dcnode-id="1643" instrument_node="">See</span></em><span data-dcnode-id="1641" instrument_node=""> It?”, in </span><em data-dcnode-id="1639"><span data-dcnode-id="1640" instrument_node="">Annuaire suisse de droit international</span></em><span data-dcnode-id="1638" instrument_node="">, Vol. 37, 1981, p. 67]</span></blockquote><blockquote data-dcnode-id="1619"><p data-dcnode-id="1631"><strong data-dcnode-id="1635"><span data-dcnode-id="1636" instrument_node="">Quotation 2&nbsp;</span></strong><span data-dcnode-id="1634" instrument_node="">&nbsp; &nbsp;&nbsp;&nbsp;</span><strong data-dcnode-id="1632"><span data-dcnode-id="1633" instrument_node="">PRESCRIPTION.</span></strong></p><p data-dcnode-id="1629"><span data-dcnode-id="1630" instrument_node="">[T]he method of explicit agreement, particularly in the field of management of combat, has never been able to achieve much more in formulation than a general restatement of pre-existing consensus about relatively minor problems. Negotiators, seated about a conference table contemplating future wars and aware of the fluid nature of military technology and technique, imagine too many horrible contingencies, fantastic or realistic, about the security of their respective countries to permit much commitment.</span></p><p data-dcnode-id="1627"><span data-dcnode-id="1628" instrument_node="">Much more effective than explicit agreement in the prescription of the law of war has been the less easily observed, slow, customary shaping and development of general consensus or community expectation. Decision-makers confronted with difficult problems, frequently presented to them in terms of principles as vague and abstract as “the laws of humanity and the dictates of the public conscience” and in terms of concepts and rules admitting of multiple interpretations, quite naturally have had recourse both to the experience of prior decision-makers and to community expectation about required or desired future practice and decision. [...]</span></p><span data-dcnode-id="1626" instrument_node="">[</span><strong data-dcnode-id="1624"><span data-dcnode-id="1625" instrument_node="">Source</span></strong><span data-dcnode-id="1623" instrument_node="">: McDOUGAL Myres S. &amp; FELICIANO Florentino P., </span><em data-dcnode-id="1621"><span data-dcnode-id="1622" instrument_node="">Law And Minimum World Public Order: The Legal Regulation of International Coercion</span></em><span data-dcnode-id="1620" instrument_node="">, New Haven and London, Yale University Press, 1961, p. 50; footnotes omitted.]</span></blockquote><h4 class="casesdocheader" data-dcnode-id="1617"><span data-dcnode-id="1618" instrument_node="">CASES AND DOCUMENTS</span></h4><div class="beigebox" data-dcnode-id="1536"><ul data-dcnode-id="1537"><li data-dcnode-id="1612"><a data-dcnode-id="1613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/icrc-customary-international-humanitarian-law" title=""><abbr data-dcnode-id="1615" title="International Committee of the Red Cross "><span data-dcnode-id="1616" instrument_node="">ICRC</span></abbr><span data-dcnode-id="1614" instrument_node="">, Customary International Humanitarian Law</span></a></li><li data-dcnode-id="1600"><a data-dcnode-id="1608" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/icj-nuclear-weapons-advisory-opinion" title=""><abbr data-dcnode-id="1610" title="International Court of Justice "><span data-dcnode-id="1611" instrument_node="">ICJ</span></abbr><span data-dcnode-id="1609" instrument_node="">, Nuclear Weapons Advisory Opinion</span></a><span data-dcnode-id="1607" instrument_node=""> [Paras </span><a data-dcnode-id="1605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/icj-nuclear-weapons-advisory-opinion%23para_66"><span data-dcnode-id="1606" instrument_node="">66</span></a><span data-dcnode-id="1604" instrument_node="">, </span><a data-dcnode-id="1602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/icj-nuclear-weapons-advisory-opinion%23para_82"><span data-dcnode-id="1603" instrument_node="">82</span></a><span data-dcnode-id="1601" instrument_node="">]</span></li><li data-dcnode-id="1597"><a data-dcnode-id="1598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/sweden-report-swedish-international-humanitarian-law-committee" title=""><span data-dcnode-id="1599" instrument_node="">Sweden, Report of the Swedish International Humanitarian Law Committee</span></a></li><li data-dcnode-id="1592"><a data-dcnode-id="1593" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/united-states-president-rejects-protocol-i" title=""><span data-dcnode-id="1596" instrument_node="">United States, President Rejects </span><abbr data-dcnode-id="1594" title="Protocol Additional to the Geneva Conventions of 12 August 1949, and Relating to the Protection of Victims of International Armed Conflicts, of 8 June 1977"><span data-dcnode-id="1595" instrument_node="">Protocol I</span></abbr></a></li><li data-dcnode-id="1589"><a data-dcnode-id="1590" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/united-states-military-tribunal-nuremberg-united-states-v-wilhelm-list%23para_3_ii"><span data-dcnode-id="1591" instrument_node="">United States Military Tribunal at Nuremberg, United States v. Wilhelm List [Para. 3(ii)]</span></a></li><li data-dcnode-id="1584"><a data-dcnode-id="1585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/icrc-appeals-near-east" title=""><abbr data-dcnode-id="1587" title="International Committee of the Red Cross "><span data-dcnode-id="1588" instrument_node="">ICRC</span></abbr><span data-dcnode-id="1586" instrument_node=""> Appeals on the Near East</span></a></li><li data-dcnode-id="1581"><a data-dcnode-id="1582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/israel-cheikh-obeid-et-al-v-ministry-security" title=""><span data-dcnode-id="1583" instrument_node="">Israel, Cheikh Obeid et al. v. Ministry of Security</span></a></li><li data-dcnode-id="1578"><a data-dcnode-id="1579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/israel-cases-concerning-deportation-orders%23para_4"><span data-dcnode-id="1580" instrument_node="">Israel, Cases Concerning Deportation Orders [Paras 4 to 7]</span></a></li><li data-dcnode-id="1573"><a data-dcnode-id="1574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/icj-nicaragua-v-united-states%23para_186"><abbr data-dcnode-id="1576" title="International Court of Justice "><span data-dcnode-id="1577" instrument_node="">ICJ</span></abbr><span data-dcnode-id="1575" instrument_node="">, Nicaragua v. United States [Para. 186]</span></a></li><li data-dcnode-id="1567"><a data-dcnode-id="1568" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/sudan-report-un-commission-enquiry-darfur%23para_156"><span data-dcnode-id="1572" instrument_node="">Sudan, Report of the </span><abbr data-dcnode-id="1570" title="United Nations"><span data-dcnode-id="1571" instrument_node="">UN</span></abbr><span data-dcnode-id="1569" instrument_node=""> Commission of Enquiry on Darfur [Paras&nbsp;156-165]</span></a></li><li data-dcnode-id="1564"><a data-dcnode-id="1565" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/south-africa-sagarius-and-others" title=""><span data-dcnode-id="1566" instrument_node="">South Africa, Sagarius and Others</span></a></li><li data-dcnode-id="1561"><a data-dcnode-id="1562" href="https://chatnoir-webcont international-humanitarian-law%23chapter5"><span data-dcnode-id="1308" instrument_node="">E.</span></a><span data-dcnode-id="1306" instrument_node="">]</span></li></ul></div><h4 data-dcnode-id="1300"><a class="nohref" data-dcnode-id="1302" id="d_ii_2" name="d_ii_2"></a><span data-dcnode-id="1301" instrument_node="">&nbsp;2.&nbsp;&nbsp; International Humanitarian Law treaties and customary International Humanitarian Law</span></h4><blockquote data-dcnode-id="1287"><p data-dcnode-id="1297"><strong data-dcnode-id="1298"><span data-dcnode-id="1299" instrument_node="">Quotation</span></strong></p><p data-dcnode-id="1295"><span data-dcnode-id="1296" instrument_node="">For the contention that a treaty becomes binding upon all nations when a great majority of the world has expressly accepted it would suggest that a certain point is reached at which the will of non-parties to the treaty is overborne by the expression of a standard or an obligation to which the majority of States subscribe. The untenability of that view is quite clear in the case of treaties establishing the basic law of an international organization or laying down detailed rules concerning such matters as copyrights or customs duties or international commercial arbitration [...] Treaties of an essentially humanitarian character might be thought to be distinguishable by reason of their laying down restraints on conduct that would otherwise be anarchical. In so far as they are directed to the protection of human rights, rather than to the interests of States, they have a wider claim to application than treaties concerned, for example, with the purely political and economic interests of States. The passage of humanitarian treaties into customary international law might further be justified on the ground that each new wave of such treaties builds upon the past conventions, so that each detailed rule of the Geneva Conventions for the Protection of War Victims is nothing more than an implementation of a more general standard already laid down in an earlier convention, such as the Regulations annexed to Convention No. IV of The Hague. These observations, however, are directed to a distinction which might be made but which is not yet reflected in State practice or in other sources of the positive law.</span></p><span data-dcnode-id="1294" instrument_node="">[</span><strong data-dcnode-id="1292"><span data-dcnode-id="1293" instrument_node="">Source</span></strong><span data-dcnode-id="1291" instrument_node="">: BAXTER Richard R., “Multilateral Treaties as Evidence of Customary International Law”, in </span><em data-dcnode-id="1289"><span data-dcnode-id="1290" instrument_node="">The British Year Book of International Law</span></em><span data-dcnode-id="1288" instrument_node="">, 1965-66, pp. 285-286]</span></blockquote><h4 class="casesdocheader" data-dcnode-id="1285"><span data-dcnode-id="1286" instrument_node="">CASES AND DOCUMENTS</span></h4><div class="beigebox" data-dcnode-id="1205"><ul data-dcnode-id="1206"><li data-dcnode-id="1282"><a data-dcnode-id="1283" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/sweden-report-swedish-international-humanitarian-law-committee%23part_3_2_2"><span data-dcnode-id="1284" instrument_node="">Sweden, Report of the Swedish International Humanitarian Law Committee [Part 3.2.2]</span></a></li><li data-dcnode-id="1279"><a data-dcnode-id="1280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/united-states-military-tribunal-nuremberg-united-states-v-wilhelm-von-leeb-et-al" title=""><span data-dcnode-id="1281" instrument_node="">United States Military Tribunal at Nuremberg, United States v. Wilhelm von Leeb et al.</span></a></li><li data-dcnode-id="1274"><a data-dcnode-id="1275" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/icrc-appeals-near-east" title=""><abbr data-dcnode-id="1277" title="International Committee of the Red Cross "><span data-dcnode-id="1278" instrument_node="">ICRC</span></abbr><span data-dcnode-id="1276" instrument_node=""> Appeals on the Near East</span></a></li><li data-dcnode-id="1271"><a data-dcnode-id="1272" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/israel-ayub-v-minister-defence" title=""><span data-dcnode-id="1273" instrument_node="">Israel, Ayub v. Minister of Defence</span></a></li><li data-dcnode-id="1268"><a data-dcnode-id="1269" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/israel-cases-concerning-deportation-orders%23para_4"><span data-dcnode-id="1270" instrument_node="">Israel, Cases Concerning Deportation Orders, [Paras 4-7]</span></a></li><li data-dcnode-id="1250"><a data-dcnode-id="1264" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/icj-nicaragua-v-united-states" title=""><abbr data-dcnode-id="1266" title="International Court of Justice "><span data-dcnode-id="1267" instrument_node="">ICJ</span></abbr><span data-dcnode-id="1265" instrument_node="">, Nicaragua v. United States</span></a><span data-dcnode-id="1263" instrument_node=""> [Paras </span><a data-dcnode-id="1261" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/icj-nicaragua-v-united-states%23para_174"><span data-dcnode-id="1262" instrument_node="">174-178</span></a><span data-dcnode-id="1260" instrument_node="">, </span><a data-dcnode-id="1258" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/icj-nicaragua-v-united-states%23para_181"><span data-dcnode-id="1259" instrument_node="">181</span></a><span data-dcnode-id="1257" instrument_node="">, </span><a data-dcnode-id="1255" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//caseboo tudy/south-africa-s-v-petane" title=""><span data-dcnode-id="1234" instrument_node="">South Africa, S. v. Petane</span></a></li><li data-dcnode-id="1229"><a data-dcnode-id="1230" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/inter-american-commission-human-rights-tablada%23para_177"><span data-dcnode-id="1231" instrument_node="">Inter-American Commission on Human Rights, Tablada [Para. 177]</span></a></li><li data-dcnode-id="1221"><a data-dcnode-id="1222" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/un-statute-icty%23part_a_para_2"><abbr data-dcnode-id="1227" title="United Nations"><span data-dcnode-id="1228" instrument_node="">UN</span></abbr><span data-dcnode-id="1226" instrument_node="">, Statute of the </span><abbr data-dcnode-id="1224" title="International Criminal Tribunal for the former Yugoslavia "><span data-dcnode-id="1225" instrument_node="">ICTY</span></abbr><span data-dcnode-id="1223" instrument_node=""> [Part A., para. 2]</span></a></li><li data-dcnode-id="1216"><a data-dcnode-id="1217" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/icty-prosecutor-v-strugar%23chapter1"><abbr data-dcnode-id="1219" title="International Criminal Tribunal for the former Yugoslavia "><span data-dcnode-id="1220" instrument_node="">ICTY</span></abbr><span data-dcnode-id="1218" instrument_node="">, The Prosecutor v. Strugar [Part A.]</span></a></li><li data-dcnode-id="1211"><a data-dcnode-id="1212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/ictr-prosecutor-v-jean-paul-akayesu%23para_608"><abbr data-dcnode-id="1214" title="International Criminal Tribunal for Rwanda "><span data-dcnode-id="1215" instrument_node="">ICTR</span></abbr><span data-dcnode-id="1213" instrument_node="">, The Prosecutor v. Jean-Paul Akayesu [Paras 608-610]</span></a></li><li data-dcnode-id="1207"><span class="field-content" data-dcnode-id="1208"><a data-dcnode-id="1209" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/united-kingdom-case-serdar-mohammed-court-appeal-and-supreme-court-judgments"><span data-dcnode-id="1210" instrument_node="">United Kingdom, The Case of Serdar Mohammed (Court of Appeal and Supreme Court Judgments)</span></a></span></li></ul></div><h4 aria-controls="readingsbody30" aria-expanded="false" class="readingsheader" data-dcnode-id="1203" data-toggle="collapse" href="#readingsbody30"><span data-dcnode-id="1204" instrument_node="">specific bibliography</span></h4><div class="bluebox collapse" data-dcnode-id="1164" id="readingsbody30"><p data-dcnode-id="1200"><strong data-dcnode-id="1201"><span data-dcnode-id="1202" instrument_node="">Suggested reading:</span></strong></p><ul data-dcnode-id="1179"><li data-dcnode-id="1191"><span data-dcnode-id="1199" instrument_node="">CASSESE Antonio, “The Geneva Protocols of 1977 on the Humanitarian Law of Armed Conflict and Customary International Law”, in </span><em data-dcnode-id="1196"><abbr data-dcnode-id="1197" title="University of California at Los Angeles"><span data-dcnode-id="1198" instrument_node="">UCLA</span></abbr></em><span data-dcnode-id="1195" instrument_node=""> </span><em data-dcnode-id="1193"><span data-dcnode-id="1194" instrument_node="">Pacific Basin Law Journal</span></em><span data-dcnode-id="1192" instrument_node="">, Vol. 3/1-2, 1984, pp. 55-118.</span></li><li data-dcnode-id="1186"><span data-dcnode-id="1190" instrument_node="">GREENWOOD Christopher, “Customary Law Status of the 1977 Geneva Protocols”, in </span><em data-dcnode-id="1188"><span data-dcnode-id="1189" instrument_node="">Humanitarian Law of Armed Conflict – Challenges Ahead, Essays in Honour of Frits Kalshoven</span></em><span data-dcnode-id="1187" instrument_node="">, Dordrecht, M. Nijhoff, 1991, pp. 93-114.</span></li><li data-dcnode-id="1180"><span data-dcnode-id="1185" instrument_node="">MERON Theodor, “The Geneva Conventions as Customary Law”, in </span><em data-dcnode-id="1182"><abbr data-dcnode-id="1183" title="American Journal of International Law"><span data-dcnode-id="1184" instrument_node="">AJIL</span></abbr></em><span data-dcnode-id="1181" instrument_node="">, Vol.&nbsp;81/2, 1987, pp.&nbsp;348-370.</span></li></ul><p data-dcnode-id="1176"><strong data-dcnode-id="1177"><span data-dcnode-id="1178" instrument_node="">Further reading:</span></strong></p><ul data-dcnode-id="1165"><li data-dcnode-id="1171"><span data-dcnode-id="1175" instrument_node="">ABI-SAAB Georges, “The 1977 Additional Protocols and General International Law: Preliminary Reflexions”, in </span><em data-dcnode-id="1173"><span data-dcnode-id="1174" instrument_node="">Humanitarian Law of Armed Conflict Challenges Ahead, Essays in Honour of Frits Kalshoven</span></em><span data-dcnode-id="1172" instrument_node="">, Dordrecht, M. Nijhoff, 1991, pp. 115-126.</span></li><li data-dcnode-id="1166"><span data-dcnode-id="1170" instrument_node="">KASTO Jalil, “Jus Cogens and Humanitarian Law”, in </span><em data-dcnode-id="1168"><span data-dcnode-id="1169" instrument_node="">International Law Series</span></em><span data-dcnode-id="1167" instrument_node="">, Vol. 2, Kingston, Kall Kwik, 1994, 95 pp.</span></li></ul></div><span data-dcnode-id="1163" id="toc--iii-fundamental-principles-of-international-humanitarian-law"></span><h3 data-dcnode-id="1160"><a class="nohref" data-dcnode-id="1162" id="d_iii" name="d_iii"></a><span data-dcnode-id="1161" instrument_node="">&nbsp;III. Fundamental principles of International Humanitarian Law</span></h3><h4 data-dcnode-id="1158"><span data-dcnode-id="1159" instrument_node="">Introductory text</span></h4><p data-dcnode-id="1145"><span data-dcnode-id="1157" instrument_node="">“General principles of law recognized by civilized nations”[</span><a data-dcnode-id="1155" href="#_ftn_073" id="_ftnref_073" name="_ftnref_073" title=""><span data-dcnode-id="1156" instrument_node="">73</span></a><span data-dcnode-id="1154" instrument_node="">] may first be understood as those principles of domestic law which are common to all legal orders. Given the large number of States and the great variety of their legal systems, only very few such principles can be formulated precisely enough to be operational. Such principles, e.g., good faith and proportionality, which have also become customary law and have been codified, nevertheless also apply in armed conflicts and can be useful in supplementing and implementing </span><abbr data-dcnode-id="1152" title="International Humanitarian Law "><span data-dcnode-id="1153" instrument_node="">IHL</span></abbr><span data-dcnode-id="1151" instrument_node="">.</span><br data-dcnode-id="1150"><span data-dcnode-id="1149" instrument_node=""> Other principles may be seen as intrinsic to the idea of law and based on logic rather than a legal rule. Thus if it is prohibited to attack civilians, it is not law but logic which prescribes that an attack directed at a military objective has to be stopped when it becomes apparent that the target is (exclusively) civilian.[</span><a data-dcnode-id="1147" href="#_ftn_074" id="_ftnref_074" name="_ftnref_074" title=""><span data-dcnode-id="1148" instrument_node="">74</span></a><span data-dcnode-id="1146" instrument_node="">]</span></p><p data-dcnode-id="1125"><span data-dcnode-id="1144" instrument_node="">Even more important for </span><abbr data-dcnode-id="1142" title="International Humanitarian Law "><span data-dcnode-id="1143" instrument_node="">IHL</span></abbr><span data-dcnode-id="1141" instrument_node=""> than the foregoing are </span><em data-dcnode-id="1139"><span data-dcnode-id="1140" instrument_node="">its</span></em><span data-dcnode-id="1138" instrument_node=""> general principles, e.g., the principle of </span><strong data-dcnode-id="1136"><span data-dcnode-id="1137" instrument_node="">distinction</span></strong><span data-dcnode-id="1135" instrument_node=""> (between civilians and combatants, civilian objects and military objectives), the principle of </span><strong data-dcnode-id="1133"><span data-dcnode-id="1134" instrument_node="">necessity</span></strong><span data-dcnode-id="1132" instrument_node="">,[</span><a data-dcnode-id="1130" href="#_ftn_075" id="_ftnref_075" name="_ftnref_075" title=""><span data-dcnode-id="1131" instrument_node="">75</span></a><span data-dcnode-id="1129" instrument_node="">] and the </span><strong data-dcnode-id="1127"><span data-dcnode-id="1128" instrument_node="">prohibition on causing unnecessary suffering</span></strong><span data-dcnode-id="1126" instrument_node="">. These principles, however, are not based on a separate source of international law, but on treaties, custom and general principles of law. On the one hand, they can and must often be derived from the existing rules, expressing the rules’ substance and meaning. On the other, they inspire existing rules, support them, make them understandable, and have to be taken into account when interpreting them.</span></p><p data-dcnode-id="1114"><span data-dcnode-id="1124" instrument_node="">Express recognition of the existence and particularly important examples of the general principles of </span><abbr data-dcnode-id="1122" title="International Humanitarian Law "><span data-dcnode-id="1123" instrument_node="">IHL</span></abbr><span data-dcnode-id="1121" instrument_node=""> are the “elementary considerations of humanity”[</span><a data-dcnode-id="1119" href="#_ftn_076" id="_ftnref_076" name="_ftnref_076" title=""><span data-dcnode-id="1120" instrument_node="">76</span></a><span data-dcnode-id="1118" instrument_node="">] and the so-called “Martens clause”, which prescribes that in cases not covered by treaties (and traditional customary international law) “civilians and combatants remain under the protection and authority of the principles of international law derived from established custom, from the principles of humanity and from the dictates of public conscience”.[</span><a data-dcnode-id="1116" href="#_ftn_077" id="_ftnref_077" name="_ftnref_077" title=""><span data-dcnode-id="1117" instrument_node="">77</span></a><span data-dcnode-id="1115" instrument_node="">]</span></p><p data-dcnode-id="1112"><span data-dcnode-id="1113" instrument_node="">It is recognized that this clause itself is part of customary international law. It is very important that both clauses underline that not everything that is not prohibited is lawful in war and that answers to questions relating to the protection of war victims cannot be found exclusively through a purely positivist approach; it is, however, not easy to find precise answers to real problems arising on the battlefield through these clauses. In a world with extremely varied cultural and religious traditions, in which people have diverging interests and different historical perspectives, those clauses can generally no more than indicate in which direction to look for a solution.</span></p><blockquote data-dcnode-id="1089"><p data-dcnode-id="1109"><strong data-dcnode-id="1110"><span data-dcnode-id="1111" instrument_node="">Quotation</span></strong></p><p data-dcnode-id="1107"><span data-dcnode-id="1108" instrument_node="">The International Conventions contain a multitude of rules which specify the obligations of states in very precise terms, but this is not the whole story. Behind these rules are a number of principles which inspire the entire substance of the documents. Sometimes we find them expressly stated in the Conventions, some of them are clearly implied and some derive from customary law.</span></p><p data-dcnode-id="1105"><span data-dcnode-id="1106" instrument_node="">We are acquainted with the famous Martens clause in the preamble to the Hague Regulations, referring to the “principles of the law of nations, as they result from usages established among civilized peoples”. A number of articles in the Geneva Conventions of 1949 also refer to such principles, which are as vitally important in humanitarian law as they are in all other legal domains. They serve in a sense as the bone structure in a living body, providing guidelines in unforeseen cases and constituting a complete summary of the whole, easy to understand and indispensable for the purposes of dissemination.</span></p><p data-dcnode-id="1103"><span data-dcnode-id="1104" instrument_node="">In the legal sector now under consideration, the minimum principles of humanitarian law are valid at all times, in all places and under all circumstances, applying even to states which may not be parties to the Conventions, because they express the usage of peoples, [...].</span></p><p data-dcnode-id="1101"><span data-dcnode-id="1102" instrument_node="">The principles do not in any sense take the place of the rules set forth in the Conventions. It is to these rules that jurists must refer when the detailed application of the Conventions has to be considered.</span></p><p data-dcnode-id="1099"><span data-dcnode-id="1100" instrument_node="">Unfortunately we live in a time when formalism and logorrhea flourish in international conferences, for diplomats have discovered the advantages they can derive from long-winded, complex and obscure texts, in much the same way as military commanders employ smoke screens on battlefields. It is a facile way of concealing the basic problems and creates a danger that the letter will prevail over the spirit. It is therefore more necessary than ever, in this smog of verbosity, to use simple, clear and concise language.</span></p><p data-dcnode-id="1097"><span data-dcnode-id="1098" instrument_node="">In 1966, the principles of humanitarian law were formulated for the first time based in particular on the Geneva Conventions of 1949. [...]</span></p><span data-dcnode-id="1096" instrument_node="">[</span><strong data-dcnode-id="1094"><span data-dcnode-id="1095" instrument_node="">Source</span></strong><span data-dcnode-id="1093" instrument_node="">: PICTET Jean S., </span><em data-dcnode-id="1091"><span data-dcnode-id="1092" instrument_node="">Development and Principles of International Humanitarian Law</span></em><span data-dcnode-id="1090" instrument_node="">, Geneva, M. Nijhoff, 1985, pp. 59-60; footnotes omitted.]</span></blockquote><h4 class="casesdocheader" data-dcnode-id="1087"><span data-dcnode-id="1088" instrument_node="">CASES AND DOCUMENTS</span></h4><div class="beigebox" data-dcnode-id="1058"><ul data-dcnode-id="1059"><li data-dcnode-id="1083"><div class="rx_ephox_inlinevariant" data-dcnode-id="1084"><a data-dcnode-id="1085" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.icrc.org/ihl.nsf/FULL/580" onclick="window.open(this.href, 'child'); return false;" onkeypress="window.open(this.href, 'child'); return false;" target="_blank" title="Go to Convention on the Prohibition of the Use, Stockpiling, Production and Transfer of Anti-Personnel Mines and on their Destruction"><span data-dcnode-id="1086" instrument_node="">Convention on the Prohibition of the Use, Stockpiling, Production and Transfer of Anti-Personnel Mines and on their Destruction</span></a></div></li><li data-dcnode-id="1080"><a data-dcnode-id="1081" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/icj-nuclear-weapons-advisory-opinion%23para_78"><span data-dcnode-id="1082" instrument_node="">Nuclear Weapons Advisory Opinion [Para. 78]</span></a></li><li data-dcnode-id="1068"><a data-dcnode-id="1076" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/icj-nicaragua-v-united-states" title=""><abbr data-dcnode-id="1078" title="International Court of Justice "><span data-dcnode-id="1079" instrument_node="">ICJ</span></abbr><span data-dcnode-id="1077" instrument_node="">, Nicaragua v. United States</span></a><span dat
