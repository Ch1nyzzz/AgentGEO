anitarian Law as Competing Legal Paradigms for Fighting Terror”, in </span><em data-dcnode-id="4776"><span data-dcnode-id="4777" instrument_node="">Hebrew University International Law Research Paper</span></em><span data-dcnode-id="4775" instrument_node="">, No. 23-09, 2009, 27 pp.</span></li><li data-dcnode-id="4768"><span data-dcnode-id="4773" instrument_node="">TIGROUDJA Hélène, “Quel(s) droit(s) applicable(s) à la ‘guerre au terrorisme’ ?”, in </span><em data-dcnode-id="4770"><abbr data-dcnode-id="4771" title="Annuaire Français de Droit International"><span data-dcnode-id="4772" instrument_node="">AFDI</span></abbr></em><span data-dcnode-id="4769" instrument_node="">, Vol. 48, 2002, pp. 81-102.</span></li><li data-dcnode-id="4762"><span data-dcnode-id="4767" instrument_node="">TURNS David, “The Treatment of Detainees and the “Global War on Terror”: Selected Legal Issues”, in </span><em data-dcnode-id="4764"><abbr data-dcnode-id="4765" title="Israel Yearbook on Human Rights "><span data-dcnode-id="4766" instrument_node="">IYHR</span></abbr></em><span data-dcnode-id="4763" instrument_node="">, Vol.&nbsp;38, 2008, pp.&nbsp;145-167.</span></li><li data-dcnode-id="4757"><span data-dcnode-id="4761" instrument_node="">VEUTHEY Michel, “Le droit international humanitaire face à la guerre contre le terrorisme”, in DOUCET Ghislaine (ed.), </span><em data-dcnode-id="4759"><span data-dcnode-id="4760" instrument_node="">Terrorisme, victimes et responsabilité pénale internationale</span></em><span data-dcnode-id="4758" instrument_node="">, Paris, Calmann-Lévy, 2003, pp. 516-529.</span></li><li data-dcnode-id="4752"><span data-dcnode-id="4756" instrument_node="">VIERUCCI Luisa, “Prisoners of War or Protected Persons qua Unlawful Combatants? The Judicial Safeguards to which Guantánamo Bay Detainees are Entitled”, in </span><em data-dcnode-id="4754"><span data-dcnode-id="4755" instrument_node="">Journal of International Criminal Justice</span></em><span data-dcnode-id="4753" instrument_node="">, Vol. 1/2, 2003, pp. 284-314.</span></li><li data-dcnode-id="4747"><span data-dcnode-id="4751" instrument_node="">ZWITTER Andrej, “Humanitarian Action on the Battlefields of Global War on Terror”, in </span><em data-dcnode-id="4749"><span data-dcnode-id="4750" instrument_node="">The Journal of Humanitarian Assistance</span></em><span data-dcnode-id="4748" instrument_node="">, October 2008, pp. 1-23.</span></li></ul></div><ol data-dcnode-id="4738" type="a"><li data-dcnode-id="4739" value="6"><a class="nohref" data-dcnode-id="4744" id="b_iii_1_C_f" name="b_iii_1_C_f"></a><strong data-dcnode-id="4742"><span data-dcnode-id="4743" instrument_node="">&nbsp;</span></strong><strong data-dcnode-id="4740"><span data-dcnode-id="4741" instrument_node="">Other situations</span></strong></li></ol><p data-dcnode-id="4732"><abbr data-dcnode-id="4735" title="Protocol Additional to the Geneva Conventions of 12 August 1949, and Relating to the Protection of Victims of Non-International Armed Conflicts, of 8 June 1977"><a data-dcnode-id="4736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icrc.org/applic/ihl/ihl.nsf/Article.xsp%3Faction%3DopenDocument%26documentId%3D93F022B3010AA404C12563CD0051E738"><span data-dcnode-id="4737" instrument_node="">P II</span></a></abbr><a data-dcnode-id="4733" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icrc.org/applic/ihl/ihl.nsf/Article.xsp%3Faction%3DopenDocument%26documentId%3D93F022B3010AA404C12563CD0051E738"><span data-dcnode-id="4734" instrument_node="">, Art. 1(2)</span></a></p><h4 data-dcnode-id="4729"><a class="nohref" data-dcnode-id="4731" id="b_iii_2" name="b_iii_2"></a><span data-dcnode-id="4730" instrument_node="">&nbsp;2. &nbsp; Personal scope of application</span></h4><p data-dcnode-id="4726"><strong data-dcnode-id="4727"><span data-dcnode-id="4728" instrument_node="">Introductory text</span></strong></p><p data-dcnode-id="4685"><span data-dcnode-id="4725" instrument_node="">As </span><abbr data-dcnode-id="4723" title="International Humanitarian Law "><span data-dcnode-id="4724" instrument_node="">IHL</span></abbr><span data-dcnode-id="4722" instrument_node=""> developed as the law of international armed conflicts covering, in conformity with the traditional function of international law, inter-State relations, it aimed essentially to protect “enemies” in the sense of enemy nationals. </span><abbr data-dcnode-id="4720" title="International Humanitarian Law "><span data-dcnode-id="4721" instrument_node="">IHL</span></abbr><span data-dcnode-id="4719" instrument_node=""> therefore defines a category of “protected persons,” consisting basically of enemy nationals, who enjoy its full protection.[</span><a data-dcnode-id="4717" href="#_ftn_041" id="_ftnref_041" name="_ftnref_041" title=""><span data-dcnode-id="4718" instrument_node="">41</span></a><span data-dcnode-id="4716" instrument_node="">] Nevertheless, the victims of armed conflicts who are not “protected persons” do not completely lack protection. In conformity with and under the influence of international human rights law, they benefit from a growing number of protective rules, which, however, never offer to those who are in the power of the enemy the full protection foreseen for “protected persons”. As far back as 1864, the initial Geneva Convention prescribed that “[w]ounded or sick combatants, to whatever nation they may belong, shall be collected and cared for”.[</span><a data-dcnode-id="4714" href="#_ftn_042" id="_ftnref_042" name="_ftnref_042" title=""><span data-dcnode-id="4715" instrument_node="">42</span></a><span data-dcnode-id="4713" instrument_node="">] The rules on the conduct of hostilities apply equally to all hostilities in international armed conflicts, and all victims benefit equally from them.[</span><a data-dcnode-id="4711" href="#_ftn_043" id="_ftnref_043" name="_ftnref_043" title=""><span data-dcnode-id="4712" instrument_node="">43</span></a><span data-dcnode-id="4710" instrument_node="">] The law of non-international armed conflicts by definition protects persons against their fellow citizens, i.e., it applies equally to all persons equally affected by such a conflict. Finally, a growing number of </span><abbr data-dcnode-id="4708" title="International Humanitarian Law "><span data-dcnode-id="4709" instrument_node="">IHL</span></abbr><span data-dcnode-id="4707" instrument_node=""> rules provide basic, human rights-like guarantees to all those not benefiting from more favourable treatment under </span><abbr data-dcnode-id="4705" title="International Humanitarian Law "><span data-dcnode-id="4706" instrument_node="">IHL</span></abbr><span data-dcnode-id="4704" instrument_node="">.[</span><a data-dcnode-id="4702" href="#_ftn_044" id="_ftnref_044" name="_ftnref_044" title=""><span data-dcnode-id="4703" instrument_node="">44</span></a><span data-dcnode-id="4701" instrument_node="">] A 1999 </span><abbr data-dcnode-id="4699" title="International Criminal Tribunal for the former Yugoslavia "><span data-dcnode-id="4700" instrument_node="">ICTY</span></abbr><span data-dcnode-id="4698" instrument_node=""> judgement suggested adjusting the concept of “protected persons”, beyond the text of </span><abbr data-dcnode-id="4696" title="Geneva Convention (IV) Relative to the Protection of Civilian Persons in Time of War, of 12 August 1949 "><span data-dcnode-id="4697" instrument_node="">Convention IV</span></abbr><span data-dcnode-id="4695" instrument_node="">, to the reality of contemporary conflicts, where allegiance could be determined more by ethnicity than by nationality. The </span><abbr data-dcnode-id="4693" title="International Criminal Tribunal for the former Yugoslavia "><span data-dcnode-id="4694" instrument_node="">ICTY</span></abbr><span data-dcnode-id="4692" instrument_node=""> renounced using the latter as a decisive criteria and replaced it with the criteria of allegiance to the enemy.[</span><a data-dcnode-id="4690" href="#_ftn_045" id="_ftnref_045" name="_ftnref_045" title=""><span data-dcnode-id="4691" instrument_node="">45</span></a><span data-dcnode-id="4689" instrument_node="">] It remains to be seen if this criteria can be applied in actual conflicts, not only </span><em data-dcnode-id="4687"><span data-dcnode-id="4688" instrument_node="">a posteriori</span></em><span data-dcnode-id="4686" instrument_node=""> by a tribunal, but also by the parties to a conflict, by the victims and by the humanitarian actors on the ground.</span></p><h4 class="casesdocheader" data-dcnode-id="4683"><span data-dcnode-id="4684" instrument_node="">CASES AND DOCUMENTS</span></h4><div class="beigebox" data-dcnode-id="4678"><ul data-dcnode-id="4679"><li data-dcnode-id="4680"><a data-dcnode-id="4681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icrc.org/casebook/case-study/georgiarussia-tbilisi-nervously-eyes-russias-border-barricade-south-ossetia"><span data-dcnode-id="4682" instrument_node="">Georgia/Russia: Tbilisi Nervously Eyes Russia’s Border Barricade of South Ossetia</span></a></li></ul></div><ol data-dcnode-id="4671" type="a"><li data-dcnode-id="4672"><a class="nohref" data-dcnode-id="4677" id="b_iii_2_a" name="b_iii_2_a"></a><strong data-dcnode-id="4675"><span data-dcnode-id="4676" instrument_node="">&nbsp;</span></strong><strong data-dcnode-id="4673"><span data-dcnode-id="4674" instrument_node="">passive personal scope of application: who is protected?</span></strong></li></ol><h4 class="casesdocheader" data-dcnode-id="4669"><span data-dcnode-id="4670" instrument_node="">CASES AND DOCUMENTS</span></h4><div class="beigebox" data-dcnode-id="4662"><ul data-dcnode-id="4663"><li data-dcnode-id="4664"><a data-dcnode-id="4665" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/echr-bankovic-and-others-v-belgium-and-16-other-states" title=""><abbr data-dcnode-id="4667" title="European Court of Human Rights / European Convention for the Protection of Human Rights and Fundamental Freedoms, of 4 November 1950"><span data-dcnode-id="4668" instrument_node="">ECHR</span></abbr><span data-dcnode-id="4666" instrument_node="">, Bankovic and Others v. Belgium and 16 Other States</span></a></li></ul></div><div data-dcnode-id="4636"><span data-dcnode-id="4661" instrument_node="">aa) the concept of “protected persons” </span><abbr data-dcnode-id="4658" title="Geneva Convention (I) for the Amelioration of the Condition of the Wounded and Sick in Armed Forces in the Field, of 12 August 1949 "><a data-dcnode-id="4659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icrc.org/applic/ihl/ihl.nsf/Article.xsp%3Faction%3DopenDocument%26documentId%3DCE8A59A191689791C12563CD00519F73"><span data-dcnode-id="4660" instrument_node="">GC I</span></a></abbr><a data-dcnode-id="4656" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icrc.org/applic/ihl/ihl.nsf/Article.xsp%3Faction%3DopenDocument%26documentId%3DCE8A59A191689791C12563CD00519F73"><span data-dcnode-id="4657" instrument_node="">, Art. 13</span></a><span data-dcnode-id="4655" instrument_node="">; </span><abbr data-dcnode-id="4652" title="Geneva Convention (II) for the Amelioration of the Condition of Wounded, Sick and Shipwrecked Members of Armed Forces at Sea, of 12 August 1949"><a data-dcnode-id="4653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icrc.org/applic/ihl/ihl.nsf/Article.xsp%3Faction%3DopenDocument%26documentId%3D6F743996A6E529C2C12563CD0051A5E6"><span data-dcnode-id="4654" instrument_node="">GC II</span></a></abbr><a data-dcnode-id="4650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icrc.org/applic/ihl/ihl.nsf/Article.xsp%3Faction%3DopenDocument%26documentId%3D6F743996A6E529C2C12563CD0051A5E6"><span data-dcnode-id="4651" instrument_node="">, Art. 13</span></a><span data-dcnode-id individual – individual. and Internal Armed Conflict, VIII. Who is bound by the law of non-international armed conflicts?, 2)&nbsp;All those belonging to one party)</span></li></ol><h4 class="casesdocheader" data-dcnode-id="4514"><span data-dcnode-id="4515" instrument_node="">CASES AND DOCUMENTS</span></h4><div class="beigebox" data-dcnode-id="4483"><ul data-dcnode-id="4484"><li data-dcnode-id="4509"><a data-dcnode-id="4510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/icty-prosecutor-v-mrksic-and-sljivancanin%23part_b_para_71"><abbr data-dcnode-id="4512" title="International Criminal Tribunal for the former Yugoslavia "><span data-dcnode-id="4513" instrument_node="">ICTY</span></abbr><span data-dcnode-id="4511" instrument_node="">, The Prosecutor v. Mrksic and Sljivancanin [Part B., paras 71-74]</span></a></li><li data-dcnode-id="4504"><a data-dcnode-id="4505" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/ictr-prosecutor-v-jean-paul-akayesu%23part_b_para_425"><abbr data-dcnode-id="4507" title="International Criminal Tribunal for Rwanda "><span data-dcnode-id="4508" instrument_node="">ICTR</span></abbr><span data-dcnode-id="4506" instrument_node="">, The Prosecutor v. Jean-Paul Akayesu [Part B., paras 425-446]</span></a></li><li data-dcnode-id="4494"><a data-dcnode-id="4502" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/switzerland-niyonteze-case" title=""><span data-dcnode-id="4503" instrument_node="">Switzerland, The Niyonteze Case</span></a><span data-dcnode-id="4501" instrument_node=""> [</span><a data-dcnode-id="4499" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/switzerland-niyonteze-case%23part_a_para_9" title=""><span data-dcnode-id="4500" instrument_node="">Part A., para. 9</span></a><span data-dcnode-id="4498" instrument_node=""> and </span><a data-dcnode-id="4496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/switzerland-niyonteze-case%23part_b_3_d_2"><span data-dcnode-id="4497" instrument_node="">Part B. III., ch. 3.D.2</span></a><span data-dcnode-id="4495" instrument_node="">]</span></li><li data-dcnode-id="4491"><a data-dcnode-id="4492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/syria-code-conduct-free-syrian-army"><span data-dcnode-id="4493" instrument_node="">Syria, Code of Conduct of the Free Syrian Army</span></a></li><li data-dcnode-id="4488"><a data-dcnode-id="4489" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/women-and-sexual-violence"><span data-dcnode-id="4490" instrument_node="">Women and Sexual violence</span></a></li><li data-dcnode-id="4485"><a data-dcnode-id="4486" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/geneva-call-and-chin-national-front"><span data-dcnode-id="4487" instrument_node="">Geneva Call and the Chin National Front</span></a></li></ul></div><h4 data-dcnode-id="4480"><a class="nohref" data-dcnode-id="4482" id="b_iii_3" name="b_iii_3"></a><span data-dcnode-id="4481" instrument_node="">&nbsp;3. Temporal scope of application</span></h4><p data-dcnode-id="4450"><abbr data-dcnode-id="4477" title="Geneva Convention (I) for the Amelioration of the Condition of the Wounded and Sick in Armed Forces in the Field, of 12 August 1949 "><a data-dcnode-id="4478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icrc.org/applic/ihl/ihl.nsf/Article.xsp%3Faction%3DopenDocument%26documentId%3D3B040E24484650ECC12563CD00519EA3"><span data-dcnode-id="4479" instrument_node="">GC I</span></a></abbr><a data-dcnode-id="4475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icrc.org/applic/ihl/ihl.nsf/Article.xsp%3Faction%3DopenDocument%26documentId%3D3B040E24484650ECC12563CD00519EA3"><span data-dcnode-id="4476" instrument_node="">, Art. 5</span></a><span data-dcnode-id="4474" instrument_node="">; </span><abbr data-dcnode-id="4471" title="Geneva Convention (III) Relative to the Treatment of Prisoners of War, of 12 August 1949 "><a data-dcnode-id="4472" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icrc.org/applic/ihl/ihl.nsf/Article.xsp%3Faction%3DopenDocument%26documentId%3DB243E5B9DC2F3C13C12563CD0051AAD7"><span data-dcnode-id="4473" instrument_node="">GC III</span></a></abbr><a data-dcnode-id="4469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icrc.org/applic/ihl/ihl.nsf/Article.xsp%3Faction%3DopenDocument%26documentId%3DB243E5B9DC2F3C13C12563CD0051AAD7"><span data-dcnode-id="4470" instrument_node="">, Art. 5</span></a><span data-dcnode-id="4468" instrument_node="">; </span><abbr data-dcnode-id="4465" title="Geneva Convention (IV) Relative to the Protection of Civilian Persons in Time of War, of 12 August 1949 "><a data-dcnode-id="4466" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icrc.org/applic/ihl/ihl.nsf/Article.xsp%3Faction%3DopenDocument%26documentId%3D46C5654579157937C12563CD0051BA0C"><span data-dcnode-id="4467" instrument_node="">GC IV</span></a></abbr><a data-dcnode-id="4463" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icrc.org/applic/ihl/ihl.nsf/Article.xsp%3Faction%3DopenDocument%26documentId%3D46C5654579157937C12563CD0051BA0C"><span data-dcnode-id="4464" instrument_node="">, Art. 6</span></a><span data-dcnode-id="4462" instrument_node="">; </span><abbr data-dcnode-id="4459" title="Protocol Additional to the Geneva Conventions of 12 August 1949, and Relating to the Protection of Victims of International Armed Conflicts, of 8 June 1977"><a data-dcnode-id="4460" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icrc.org/applic/ihl/ihl.nsf/Article.xsp%3Faction%3DopenDocument%26documentId%3D873D39EE7960A2AEC12563CD0051D67B"><span data-dcnode-id="4461" instrument_node="">P I</span></a></abbr><a data-dcnode-id="4457" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icrc.org/applic/ihl/ihl.nsf/Article.xsp%3Faction%3DopenDocument%26documentId%3D873D39EE7960A2AEC12563CD0051D67B"><span data-dcnode-id="4458" instrument_node="">, Art. 3</span></a><span data-dcnode-id="4456" instrument_node="">; </span><abbr data-dcnode-id="4453" title="Protocol Additional to the Geneva Conventions of 12 August 1949, and Relating to the Protection of Victims of Non-International Armed Conflicts, of 8 June 1977"><a data-dcnode-id="4454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icrc.org/applic/ihl/ihl.nsf/Article.xsp%3Faction%3DopenDocument%26documentId%3DBCB53BC974303D8EC12563CD0051E751"><span data-dcnode-id="4455" instrument_node="">P II</span></a></abbr><a data-dcnode-id="4451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icrc.org/applic/ihl/ihl.nsf/Article.xsp%3Faction%3DopenDocument%26documentId%3DBCB53BC974303D8EC12563CD0051E751"><span data-dcnode-id="4452" instrument_node="">, Art. 2(2)</span></a></p><p data-dcnode-id="4447"><strong data-dcnode-id="4448"><span data-dcnode-id="4449" instrument_node="">Introductory text</span></strong></p><p data-dcnode-id="4439"><span data-dcnode-id="4446" instrument_node="">With the exception of the rules already applicable in peacetime,[</span><a data-dcnode-id="4444" href="#_ftn_046" id="_ftnref_046" name="_ftnref_046" title=""><span data-dcnode-id="4445" instrument_node="">46</span></a><span data-dcnode-id="4443" instrument_node="">] </span><abbr data-dcnode-id="4441" title="International Humanitarian Law "><span data-dcnode-id="4442" instrument_node="">IHL</span></abbr><span data-dcnode-id="4440" instrument_node=""> starts to apply as soon as an armed conflict arises, e.g., in international armed conflicts as soon as the first (protected) person is affected by the conflict, the first segment of territory occupied, the first attack launched, and for non-international armed conflicts as soon as the necessary level of violence and of organization of the parties is reached.</span></p><p data-dcnode-id="4431"><span data-dcnode-id="4438" instrument_node="">When those rules of </span><abbr data-dcnode-id="4436" title="International Humanitarian Law "><span data-dcnode-id="4437" instrument_node="">IHL</span></abbr><span data-dcnode-id="4435" instrument_node=""> cease to apply is much more difficult to define. One difficulty arises in practice, as in an international society where the use of force is outlawed, armed conflicts seldom end with the </span><em data-dcnode-id="4433"><span data-dcnode-id="4434" instrument_node="">debellatio</span></em><span data-dcnode-id="4432" instrument_node=""> (total defeat) of one side or a genuine peace. Most frequently, contemporary armed conflicts result in unstable cease-fires, continue at a lower intensity, or are frozen by an armed intervention by outside forces or by the international community. Hostilities, or at least acts of violence with serious humanitarian consequences, often break out again later. It is difficult for humanitarian actors to plead with parties that have made declarations ending the conflict that the fighting in reality continues.</span></p><p data-dcnode-id="4385"><span data-dcnode-id="4430" instrument_node="">Another difficulty results from the texts, as they use vague terms to define the end of their application, e.g., “general close of military operations”[</span><a data-dcnode-id="4428" href="#_ftn_047" id="_ftnref_047" name="_ftnref_047" title=""><span data-dcnode-id="4429" instrument_node="">47</span></a><span data-dcnode-id="4427" instrument_node="">] for international armed conflicts and “end of the armed conflict”[</span><a data-dcnode-id="4425" href="#_ftn_048" id="_ftnref_048" name="_ftnref_048" title=""><span data-dcnode-id="4426" instrument_node="">48</span></a><span data-dcnode-id="4424" instrument_node="">] for non-international armed conflicts.</span><br data-dcnode-id="4423"><span data-dcnode-id="4422" instrument_node=""> For the latter, the </span><abbr data-dcnode-id="4420" title="International Criminal Tribunal for the former Yugoslavia "><span data-dcnode-id="4421" instrument_node="">ICTY</span></abbr><span data-dcnode-id="4419" instrument_node=""> has held that once the necessary level of violence and of organization of the parties is such that the </span><abbr data-dcnode-id="4417" title="International Humanitarian Law "><span data-dcnode-id="4418" instrument_node="">IHL</span></abbr><span data-dcnode-id="4416" instrument_node=""> of non-international armed conflicts is applicable, that law continues to apply until the end of the conflict, even when those levels are no longer met.[</span><a data-dcnode-id="4414" href="#_ftn_049" id="_ftnref_049" name="_ftnref_049" title=""><span data-dcnode-id="4415" instrument_node="">49</span></a><span data-dcnode-id="4413" instrument_node="">] As for occupied territories, </span><abbr data-dcnode-id="4411" title="Protocol Additional to the Geneva Conventions of 12 August 1949, and Relating to the Protection of Victims of International Armed Conflicts, of 8 June 1977"><span data-dcnode-id="4412" instrument_node="">Protocol I</span></abbr><span data-dcnode-id="4410" instrument_node=""> has extended the applicability of </span><abbr data-dcnode-id="4408" title="International Humanitarian Law "><span data-dcnode-id="4409" instrument_node="">IHL</span></abbr><span data-dcnode-id="4407" instrument_node=""> until the termination of the occupation,[</span><a data-dcnode-id="4405" href="#_ftn_050" id="_ftnref_050" name="_ftnref_050" title=""><span data-dcnode-id="4406" instrument_node="">50</span></a><span data-dcnode-id="4404" instrument_node="">] while under Convention&nbsp;IV it ends one year after the general close of military operations, except for important provisions applicable as long as the occupying power “exercises the functions of government”[</span><a data-dcnode-id="4402" href="#_ftn_051" id="_ftnref_051" name="_ftnref_051" title=""><span data-dcnode-id="4403" instrument_node="">51</span></a><span data-dcnode-id="4401" instrument_node="">]. What limits the inconveniences resulting from such vagueness and the grey areas appearing in practice (e.g. when a new government agrees with the continued presence of the (former) occupying power or the </span><abbr data-dcnode-id="4399" title="United Nations"><span data-dcnode-id="4400" instrument_node="">UN</span></abbr><span data-dcnode-id="4398" instrument_node=""> Security Council authorizes the continued military presence of the (former) occupying power) – and is therefore very important in practice – is that </span><abbr data-dcnode-id="4396" title="International Humanitarian Law "><span data-dcnode-id="4397" instrument_node="">IHL</span></abbr><span data-dcnode-id="4395" instrument_node=""> continues to protect persons whose liberty is restricted[</span><a data-dcnode-id="4393" href="#_ftn_052" id="_ftnref_052" name="_ftnref_052" title=""><span data-dcnode-id="4394" instrument_node="">52</span></a><span data-dcnode-id="4392" instrument_node="">] until they are released, repatriated or, in particular if they are refugees, resettled.[</span><a data-dcnode-id="4390" href="#_ftn_053" id="_ftnref_053" name="_ftnref_053" title=""><span data-dcnode-id="4391" instrument_node="">53</span></a><span data-dcnode-id="4389" instrument_node="">] This does not resolve, however, the regime applying to those who refuse to be repatriated. Furthermore, in the law of international armed conflicts, this extension concerns only persons who were arrested during the conflict, while only the law of non-international armed conflict applies the same to the quite frequent cases of persons arrested after the end of the conflict – but even here only if their arrest is related to the conflict and not if it is related to the post-conflict tension.[</span><a data-dcnode-id="4387" href="#_ftn_054" id="_ftnref_054" name="_ftnref_054" title=""><span data-dcnode-id="4388" instrument_node="">54</span></a><span data-dcnode-id="4386" instrument_node="">]</span></p><h4 class="casesdocheader" data-dcnode-id="4383"><span data-dcnode-id="4384" instrument_node="">CASES AND DOCUMENTS</span></h4><div class="beigebox" data-dcnode-id="4368"><ul data-dcnode-id="4369"><li data-dcnode-id="4373"><a data-dcnode-id="4381" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/icty-prosecutor-v-tadic" title=""><span data-dcnode-id="4382" instrument_node="">The Prosecutor v. Tadic</span></a><span data-dcnode-id="4380" instrument_node=""> [</span><a data-dcnode-id="4378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/icty-prosecutor-v-tadic%23part_a_para_67"><span data-dcnode-id="4379" instrument_node="">Part A., paras 67-6</span></a><span data-dcnode-id="4377" instrument_node="">; </span><a data-dcnode-id="4375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/icty-prosecutor-v-tadic%23part_e_para_100"><span data-dcnode-id="4376" instrument_node="">Part E., para.&nbsp;100</span></a><span data-dcnode-id="4374" instrument_node="">]</span></li><li data-dcnode-id="4370"><a data-dcnode-id="4371" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icrc.org/casebook/case-study/georgiarussia-tbilisi-nervously-eyes-russias-border-barricade-south-ossetia"><span data-dcnode-id="4372" instrument_node="">Georgia/Russia: Tbilisi Nervously Eyes Russia’s Border Barricade of South Ossetia</span></a></li></ul></div><h4 aria-controls="readingsbody20" aria-expanded="false" clas case-study/us-lethal-operations-against-al-qaida-leaders" title=""><span data-dcnode-id="4231" instrument_node="">U.S., Lethal Operations against Al-Qa’ida Leaders</span></a></li><li data-dcnode-id="4226"><a data-dcnode-id="4227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/united-states-america-death-osama-bin-laden"><span data-dcnode-id="4228" instrument_node="">United States of America, The Death of Osama bin Laden</span></a></li><li data-dcnode-id="4223"><a data-dcnode-id="4224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/iraqsyriauk-drone-operations-against-isis"><span data-dcnode-id="4225" instrument_node="">Iraq/Syria/UK,Drone Operations against ISIS</span></a></li><li data-dcnode-id="4218"><span data-dcnode-id="4222" instrument_node="">ICRC, International humanitarian law and the challenges of contemporary armed conflicts in 2015 [</span><a data-dcnode-id="4220" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/icrc-international-humanitarian-law-and-challenges-contemporary-armed-conflicts-2015%23challenges-2015-para26"><span data-dcnode-id="4221" instrument_node="">para.&nbsp;26</span></a><span data-dcnode-id="4219" instrument_node="">]</span></li><li data-dcnode-id="4215"><a data-dcnode-id="4216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/somaliakenya-al-shabab-attacks"><span data-dcnode-id="4217" instrument_node="">Somalia/Kenya, Al-Shabab Attacks</span></a></li></ul></div><h4 data-dcnode-id="4210"><a class="nohref" data-dcnode-id="4212" id="b_iii_5" name="b_iii_5"></a><span data-dcnode-id="4211" instrument_node="">&nbsp;5. &nbsp; Relations governed by International Humanitarian Law</span></h4><p data-dcnode-id="4207"><strong data-dcnode-id="4208"><span data-dcnode-id="4209" instrument_node="">Introductory text</span></strong></p><p data-dcnode-id="4199"><span data-dcnode-id="4206" instrument_node="">International Humanitarian Law (</span><abbr data-dcnode-id="4204" title="International Humanitarian Law "><span data-dcnode-id="4205" instrument_node="">IHL</span></abbr><span data-dcnode-id="4203" instrument_node="">) protects individuals against the (traditionally enemy) State or other belligerent authorities. </span><abbr data-dcnode-id="4201" title="International Humanitarian Law "><span data-dcnode-id="4202" instrument_node="">IHL</span></abbr><span data-dcnode-id="4200" instrument_node=""> of international armed conflicts, however, also corresponds to the traditional structure of international law in that it governs (often by the very same provisions) relations between States. Its treaty rules are therefore regulated, with some exceptions, by the ordinary rules of the law of treaties. In addition, it prescribes rules of behaviour for individuals (who must be punished if they violate them) for the benefit of other individuals.</span></p><h4 class="casesdocheader" data-dcnode-id="4197"><span data-dcnode-id="4198" instrument_node="">CASES AND DOCUMENTS</span></h4><div class="beigebox" data-dcnode-id="4192"><ul data-dcnode-id="4193"><li data-dcnode-id="4194"><a data-dcnode-id="4195" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/hungary-war-crimes-resolution%23part_iv"><span data-dcnode-id="4196" instrument_node="">Hungary, War Crimes Resolution [Part IV.]</span></a></li></ul></div><ol data-dcnode-id="4182" type="a"><li data-dcnode-id="4183"><a class="nohref" data-dcnode-id="4191" id="b_iii_5_a" name="b_iii_5_a"></a><strong data-dcnode-id="4189"><span data-dcnode-id="4190" instrument_node="">&nbsp;</span></strong><strong data-dcnode-id="4187"><span data-dcnode-id="4188" instrument_node="">Individual – State</span></strong><ul data-dcnode-id="4184"><li data-dcnode-id="4185"><span data-dcnode-id="4186" instrument_node="">including his or her own State in international armed conflicts?</span></li></ul></li></ol><h4 class="casesdocheader" data-dcnode-id="4180"><span data-dcnode-id="4181" instrument_node="">CASES AND DOCUMENTS</span></h4><div class="beigebox" data-dcnode-id="4172"><ul data-dcnode-id="4173"><li data-dcnode-id="4177"><a data-dcnode-id="4178" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/united-states-united-states-v-batchelor" title=""><span data-dcnode-id="4179" instrument_node="">United States, United States v. Batchelor</span></a></li><li data-dcnode-id="4174"><a data-dcnode-id="4175" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/democratic-republic-congo-conflict-kivus%23part_iii_para_54"><span data-dcnode-id="4176" instrument_node="">Democratic Republic of the Congo, Conflicts in the Kivus [Part III, paras&nbsp;54-60]</span></a></li></ul></div><h4 aria-controls="readingsbody21" aria-expanded="false" class="readingsheader" data-dcnode-id="4170" data-toggle="collapse" href="#readingsbody21"><span data-dcnode-id="4171" instrument_node="">Specific bibliography</span></h4><div class="bluebox collapse" data-dcnode-id="4160" id="readingsbody21"><p data-dcnode-id="4167"><strong data-dcnode-id="4168"><span data-dcnode-id="4169" instrument_node="">Suggested reading:</span></strong></p><ul data-dcnode-id="4161"><li data-dcnode-id="4162"><span data-dcnode-id="4166" instrument_node="">CLAPHAM Andrew, “Non-State Actors”, in CHETAIL Vincent (ed.), Post-conflict Peacebuilding: a Lexicon, Oxford, </span><abbr data-dcnode-id="4164" title="Oxford University Press"><span data-dcnode-id="4165" instrument_node="">OUP</span></abbr><span data-dcnode-id="4163" instrument_node="">, 2009, pp. 200-213</span></li></ul></div><ol data-dcnode-id="4147" type="a"><li data-dcnode-id="4148" value="2"><a class="nohref" data-dcnode-id="4159" id="b_iii_5_b" name="b_iii_5_b"></a><strong data-dcno 9]</span></a><span data-dcnode-id="3704" instrument_node=""> </span><em data-dcnode-id="3702"><span data-dcnode-id="3703" instrument_node="">See</span></em><span data-dcnode-id="3701" instrument_node=""> </span><a data-dcnode-id="3697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/icty-prosecutor-v-tadic%23part_a_para_70"><abbr data-dcnode-id="3699" title="International Criminal Tribunal for the former Yugoslavia "><span data-dcnode-id="3700" instrument_node="">ICTY</span></abbr><span data-dcnode-id="3698" instrument_node="">, The Prosecutor v. Tadic [Part A., para. 70]</span></a></li><li data-dcnode-id="3679"><a data-dcnode-id="3694" href="#_ftnref_020" id="_ftn_020" name="_ftn_020" title=""><span data-dcnode-id="3695" instrument_node="">[20]</span></a><span data-dcnode-id="3693" instrument_node=""> </span><em data-dcnode-id="3691"><span data-dcnode-id="3692" instrument_node="">See</span></em><span data-dcnode-id="3690" instrument_node=""> for instance </span><a data-dcnode-id="3686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/icty-prosecutor-v-tadic%23part_e_para_37"><abbr data-dcnode-id="3688" title="International Criminal Tribunal for the former Yugoslavia "><span data-dcnode-id="3689" instrument_node="">ICTY</span></abbr><span data-dcnode-id="3687" instrument_node="">, The Prosecutor v. Tadic [Part E., para. 37]</span></a><span data-dcnode-id="3685" instrument_node="">; </span><a data-dcnode-id="3681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/icty-prosecutor-v-boskoski%23para_175"><abbr data-dcnode-id="3683" title="International Criminal Tribunal for the former Yugoslavia "><span data-dcnode-id="3684" instrument_node="">ICTY</span></abbr><span data-dcnode-id="3682" instrument_node="">, The Prosecutor v. Boskoski [Para. 175]</span></a><span data-dcnode-id="3680" instrument_node="">.</span></li><li data-dcnode-id="3670"><a data-dcnode-id="3677" href="#_ftnref_021" id="_ftn_021" name="_ftn_021" title=""><span data-dcnode-id="3678" instrument_node="">[21]</span></a><span data-dcnode-id="3676" instrument_node=""> </span><em data-dcnode-id="3674"><span data-dcnode-id="3675" instrument_node="">See</span></em><span data-dcnode-id="3673" instrument_node=""> </span><a data-dcnode-id="3671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icrc.org/applic/ihl/ihl.nsf/Article.xsp%3Faction%3DopenDocument%26documentId%3D41229BA1D6F7E573C12563CD00519E4A"><span data-dcnode-id="3672" instrument_node="">GC I-IV, Art. 2(2)</span></a></li><li data-dcnode-id="3660"><a data-dcnode-id="3668" href="#_ftnref_022" id="_ftn_022" name="_ftn_022" title=""><span data-dcnode-id="3669" instrument_node="">[22]</span></a><span data-dcnode-id="3667" instrument_node=""> </span><em data-dcnode-id="3665"><span data-dcnode-id="3666" instrument_node="">See</span></em><span data-dcnode-id="3664" instrument_node=""> </span><a data-dcnode-id="3662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/international-law-commission-articles-state-responsibility%23art_8"><span data-dcnode-id="3663" instrument_node="">International Law Commission, Articles on State Responsibility [Art. 8 and Commentary]</span></a><span data-dcnode-id="3661" instrument_node="">.</span></li><li data-dcnode-id="3653"><a data-dcnode-id="3658" href="#_ftnref_023" id="_ftn_023" name="_ftn_023" title=""><span data-dcnode-id="3659" instrument_node="">[23]</span></a><span data-dcnode-id="3657" instrument_node=""> Situations defined, in Article 1(4) of </span><abbr data-dcnode-id="3655" title="Protocol Additional to the Geneva Conventions of 12 August 1949, and Relating to the Protection of Victims of International Armed Conflicts, of 8 June 1977"><span data-dcnode-id="3656" instrument_node="">Protocol I</span></abbr><span data-dcnode-id="3654" instrument_node="">, as “armed conflicts in which peoples are fighting against colonial&nbsp;&nbsp; domination and alien occupation and against racist regimes in the exercise of their right of self-determination [...].”</span></li><li data-dcnode-id="3649"><a data-dcnode-id="3651" href="#_ftnref_024" id="_ftn_024" name="_ftn_024" title=""><span data-dcnode-id="3652" instrument_node="">[24]</span></a><span data-dcnode-id="3650" instrument_node=""> Art. 3 merely states that it is applicable “[i]n the case of armed conflict not of an international character occurring on the territory of one of the High Contracting Parties [...].”</span></li><li data-dcnode-id="3636"><a data-dcnode-id="3647" href="#_ftnref_025" id="_ftn_025" name="_ftn_025" title=""><span data-dcnode-id="3648" instrument_node="">[25]</span></a><span data-dcnode-id="3646" instrument_node=""> </span><em data-dcnode-id="3644"><span data-dcnode-id="3645" instrument_node="">See</span></em><span data-dcnode-id="3643" instrument_node=""> </span><abbr data-dcnode-id="3640" title="Protocol Additional to the Geneva Conventions of 12 August 1949, and Relating to the Protection of Victims of Non-International Armed Conflicts, of 8 June 1977"><a data-dcnode-id="3641" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icrc.org/applic/ihl/ihl.nsf/Article.xsp%3Faction%3DopenDocument%26documentId%3D93F022B3010AA404C12563CD0051E738"><span data-dcnode-id="3642" instrument_node="">P II</span></a></abbr><a data-dcnode-id="3638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icrc.org/applic/ihl/ihl.nsf/Article.xsp%3Faction%3DopenDocument%26documentId%3D93F022B3010AA404C12563CD0051E738"><span data-dcnode-id="3639" instrument_node="">, Art. 1</span></a><span data-dcnode-id="3637" instrument_node="">: “This Protocol, which develops and supplements Article 3 common to the Geneva Conventions [...] without modifying its existing conditions of application [...].”</span></li><li data-dcnode-id="3626"><a data-dcnode-id="3634" href="#_ftnref_026" id="_ftn_026" name="_ftn_026" title=""><span data-dcnode-id="3635" instrument_node="">[26]</span></a><span data-dcnode-id="3633" instrument_node=""> </span><em data-dcnode-id="3631"><span data-dcnode-id="3632" instrument_node="">See</span></em><span data-dcnode-id="3630" instrument_node=""> </span><a data-dcnode-id="3628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/international-criminal-court%23part_a_art_8_2_f"><span data-dcnode-id="3629" instrument_node="">The International Criminal Court [Part A., Art. 8(2)(f)]</span></a><span data-dcnode-id="3627" instrument_node="">.</span></li><li data-dcnode-id="3603"><a data-dcnode-id="3624" href="#_ftnref_027" id="_ftn_027" name="_ftn_027" title=""><span data-dcnode-id="3625" instrument_node="">[27]</span></a><span data-dcnode-id="3623" instrument_node=""> For a relatively high, but probably realistic threshold, see </span><a data-dcnode-id="3619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/icty-prosecutor-v-tadic" title=""><abbr data-dcnode-id="3621" title="International Criminal Tribunal for the former Yugoslavia "><span data-dcnode-id="3622" instrument_node="">ICTY</span></abbr><span data-dcnode-id="3620" instrument_node="">, The Prosecutor v. Tadic</span></a><span data-dcnode-id="3618" instrument_node=""> [Part E., paras </span><a data-dcnode-id="3616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/icty-prosecutor-v-tadic%23part_e_para_49"><span data-dcnode-id="3617" instrument_node="">49</span></a><span data-dcnode-id="3615" instrument_node=""> and </span><a data-dcnode-id="3613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/icty-prosecutor-v-tadic%23part_e_para_60"><span data-dcnode-id="3614" instrument_node="">60</span></a><span data-dcnode-id="3612" instrument_node="">], and for an even more detailed analysis, based upon a vast review of the jurisprudence of the </span><abbr data-dcnode-id="3610" title="International Criminal Tribunal for the former Yugoslavia "><span data-dcnode-id="3611" instrument_node="">ICTY</span></abbr><span data-dcnode-id="3609" instrument_node=""> and of national courts, see </span><a data-dcnode-id="3605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/icty-prosecutor-v-boskoski%23para_177"><abbr data-dcnode-id="3607" title="International Criminal Tribunal for the former Yugoslavia "><span data-dcnode-id="3608" instrument_node="">ICTY</span></abbr><span data-dcnode-id="3606" instrument_node="">, The Prosecutor v. Boskoski [Paras 177-206]</span></a><span data-dcnode-id="3604" instrument_node="">.</span></li><li data-dcnode-id="3591"><a data-dcnode-id="3601" href="#_ftnref_028" id="_ftn_028" name="_ftn_028" title=""><span data-dcnode-id="3602" instrument_node="">[28]</span></a><span data-dcnode-id="3600" instrument_node=""> </span><em data-dcnode-id="3598"><span data-dcnode-id="3599" instrument_node="">See</span></em><span data-dcnode-id="3597" instrument_node=""> </span><a data-dcnode-id="3593" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/icrc-customary-international-humanitarian-law" title=""><abbr data-dcnode-id="3595" title="International Committee of the Red Cross "><span data-dcnode-id="3596" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3594" instrument_node="">, Customary International Humanitarian Law</span></a><span data-dcnode-id="3592" instrument_node="">.</span></li><li data-dcnode-id="3563"><a data-dcnode-id="3589" href="#_ftnref_029" id="_ftn_029" name="_ftn_029" title=""><span data-dcnode-id="3590" instrument_node="">[29]</span></a><span data-dcnode-id="3588" instrument_node=""> The notions of internal disturbances and tensions have not been the object of precise definitions during the 1974-1977 Diplomatic Conference. These notions have been defined by the </span><abbr data-dcnode-id="3586" title="International Committee of the Red Cross "><span data-dcnode-id="3587" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3585" instrument_node=""> as follows:”[Internal disturbances]: “[t]his involve[s] situations in which there is no non-international armed conflict as such, but there exists a confrontation within the country, which is characterized by a certain seriousness or duration and which involves acts of violence. These latter can assume various forms, all the way from the spontaneous generation of acts of revolt to the struggle between more or less organized groups and the authorities in power. In these situations, which do not necessarily degenerate into open struggle, the authorities in power call upon extensive police forces, or even armed forces, to restore internal order. The high number of victims has made necessary the application of a minimum of humanitarian rules.” As regards internal tensions, these could be said to include in particular situations of serious tension (political, religious, racial, social, economic, etc.), but also the sequels of armed conflict or of internal disturbances. Such situations have one or more of the following characteristics, if not all at the same time:</span><ul data-dcnode-id="3564"><li data-dcnode-id="3583"><span data-dcnode-id="3584" instrument_node="">large scale arrests;</span></li><li data-dcnode-id="3565"><span data-dcnode-id="3582" instrument_node="">a large number of “political” prisoners;</span><ul data-dcnode-id="3566"><li data-dcnode-id="3580"><span data-dcnode-id="3581" instrument_node="">the probable existence of ill-treatment or inhumane conditions of detention;</span></li><li data-dcnode-id="3578"><span data-dcnode-id="3579" instrument_node="">the suspension of fundamental judicial guarantees, either as part of the promulgation of a state of emergency or simply as a matter of fact;</span></li><li data-dcnode-id="3567"><span data-dcnode-id="3577" instrument_node="">allegations of disappearances [...].” </span><em data-dcnode-id="3575"><span data-dcnode-id="3576" instrument_node="">See</span></em><span data-dcnode-id="3574" instrument_node=""> Commentary to </span><a data-dcnode-id="3572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icrc.org/applic/ihl/ihl.nsf/Article.xsp%3Faction%3DopenDocument%26documentId%3D93F022B3010AA404C12563CD0051E738"><span data-dcnode-id="3573" instrument_node="">Article 1(2) of Additional </span></a><abbr data-dcnode-id="3569" title="Protocol Additional to the Geneva Conventions of 12 August 1949, and Relating to the Protection of Victims of Non-International Armed Conflicts, of 8 June 1977"><a data-dcnode-id="3570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icrc.org/applic/ihl/ihl.nsf/Article.xsp%3Faction%3DopenDocument%26documentId%3D93F022B3010AA404C12563CD0051E738"><span data-dcnode-id="3571" instrument_node="">Protocol II</span></a></abbr><span data-dcnode-id="3568" instrument_node="">, paras 4475-4476.</span></li></ul></li></ul></li><li data-dcnode-id="3554"><a data-dcnode-id="3561" href="#_ftnref_030" id="_ftn_030" name="_ftn_030" title=""><span data-dcnode-id="3562" instrument_node="">[30]</span></a><span data-dcnode-id="3560" instrument_node=""> For an exhaustive list of international instruments on terrorism, see the Internet site </span><abbr data-dcnode-id="3558" title="United Nations"><span data-dcnode-id="3559" instrument_node="">UN</span></abbr><span data-dcnode-id="3557" instrument_node=""> action against terrorism, </span><a data-dcnode-id="3555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.un.org/terrorism" target="_blank"><span data-dcnode-id="3556" instrument_node="">http://www.un.org/terrorism< an></a><span data-dcnode-id="3233" instrument_node="">; </span><abbr data-dcnode-id="3230" title="Geneva Convention (IV) Relative to the Protection of Civilian Persons in Time of War, of 12 August 1949 "><a data-dcnode-id="3231" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icrc.org/applic/ihl/ihl.nsf/Article.xsp%3Faction%3DopenDocument%26documentId%3D46C5654579157937C12563CD0051BA0C"><span data-dcnode-id="3232" instrument_node="">GC IV</span></a></abbr><a data-dcnode-id="3228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icrc.org/applic/ihl/ihl.nsf/Article.xsp%3Faction%3DopenDocument%26documentId%3D46C5654579157937C12563CD0051BA0C"><span data-dcnode-id="3229" instrument_node="">, Art. 6(3)</span></a><span data-dcnode-id="3227" instrument_node="">; </span><abbr data-dcnode-id="3224" title="Protocol Additional to the Geneva Conventions of 12 August 1949, and Relating to the Protection of Victims of International Armed Conflicts, of 8 June 1977"><a data-dcnode-id="3225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icrc.org/applic/ihl/ihl.nsf/Article.xsp%3Faction%3DopenDocument%26documentId%3D873D39EE7960A2AEC12563CD0051D67B"><span data-dcnode-id="3226" instrument_node="">P I</span></a></abbr><a data-dcnode-id="3222" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icrc.org/applic/ihl/ihl.nsf/Article.xsp%3Faction%3DopenDocument%26documentId%3D873D39EE7960A2AEC12563CD0051D67B"><span data-dcnode-id="3223" instrument_node="">, Art. 3(b)</span></a></li><li data-dcnode-id="3212"><a data-dcnode-id="3219" href="#_ftnref_054" id="_ftn_054" name="_ftn_054" title=""><span data-dcnode-id="3220" instrument_node="">[54]</span></a><span data-dcnode-id="3218" instrument_node=""> </span><em data-dcnode-id="3216"><span data-dcnode-id="3217" instrument_node="">See</span></em><span data-dcnode-id="3215" instrument_node=""> </span><a data-dcnode-id="3213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icrc.org/applic/ihl/ihl.nsf/Article.xsp%3Faction%3DopenDocument%26documentId%3D696C11E357DC2C9AC12563CD0051D659"><span data-dcnode-id="3214" instrument_node="">P I, Art. 2(2)</span></a></li></ul></div></div></div><div class="field-item even" data-dcnode-id="2093"><span data-dcnode-id="3207" id="toc-c-historical-development-of-international-humanitarian-law"></span><h2 data-dcnode-id="3204"><a class="nohref" data-dcnode-id="3206" id="chapter3"></a><span data-dcnode-id="3205" instrument_node="">C. Historical Development of International Humanitarian Law</span></h2><div class="rxbodyfield" data-dcnode-id="2094"><h4 data-dcnode-id="3201"><a class="nohref" data-dcnode-id="3203" id="chapter3_c_historical_development_ihl" name="chapter3_c_historical_development_ihl"></a><span data-dcnode-id="3202" instrument_node="">&nbsp;Introductory text</span></h4><p data-dcnode-id="3196"><span data-dcnode-id="3200" instrument_node="">It is commonly agreed that modern, codified International Humanitarian Law (</span><abbr data-dcnode-id="3198" title="International Humanitarian Law "><span data-dcnode-id="3199" instrument_node="">IHL</span></abbr><span data-dcnode-id="3197" instrument_node="">) was born in 1864, when the initial Geneva Convention was adopted.</span></p><p data-dcnode-id="3194"><span data-dcnode-id="3195" instrument_node="">The Convention’s rules (and those set out in subsequent treaties) were not completely new, however, but derived to a large extent from customary rules and practices.</span></p><p data-dcnode-id="3192"><span data-dcnode-id="3193" instrument_node="">The laws of war are probably as old as war itself. Even in ancient times, there existed interesting – though primitive – customs and agreements containing “humanitarian” elements, and almost everywhere in the world and in most cultures, these customs had very similar patterns and objectives.</span></p><p data-dcnode-id="3190"><span data-dcnode-id="3191" instrument_node="">This global phenomenon proves the existence of two things:</span></p><ul data-dcnode-id="3182"><li data-dcnode-id="3188"><span data-dcnode-id="3189" instrument_node="">a common understanding of the need for regulations of some kind even during wars;</span></li><li data-dcnode-id="3183"><span data-dcnode-id="3187" instrument_node="">the feeling that, in certain circumstances, human beings, </span><em data-dcnode-id="3185"><span data-dcnode-id="3186" instrument_node="">friend or foe</span></em><span data-dcnode-id="3184" instrument_node="">, deserve some protection.</span></li></ul><p data-dcnode-id="3171"><span data-dcnode-id="3181" instrument_node="">As early as 3000 BC, there existed rules protecting certain categories of victims of armed conflicts and regulations limiting or prohibiting the use of certain means and methods of warfare. These ancient rules may not have been adopted for a humanitarian purpose but rather with a purely tactical or economic objective; their </span><em data-dcnode-id="3179"><span data-dcnode-id="3180" instrument_node="">effect</span></em><span data-dcnode-id="3178" instrument_node="">, however, was humanitarian. For instance (to give but two examples), </span><em data-dcnode-id="3176"><span data-dcnode-id="3177" instrument_node="">the prohibition to poison wells</span></em><span data-dcnode-id="3175" instrument_node=""> – very common in African traditional law and reaffirmed in modern treaties – most probably emerged to permit the exploitation of conquered territories rather than to spare the lives of the local inhabitants. Similarly, the main objective of </span><em data-dcnode-id="3173"><span data-dcnode-id="3174" instrument_node="">the prohibition to kill prisoners of war</span></em><span data-dcnode-id="3172" instrument_node=""> was to guarantee the availability of future slaves, rather than to save the lives of former combatants.</span></p><p data-dcnode-id="3166"><span data-dcnode-id="3170" instrument_node="">The existence of such customs, which can be found in cultures, regions and civilizations as diverse as Asia, Africa, pre-Columbian America and Europe, is of fundamental importance. This should always be kept in mind when studying the modern rules of </span><abbr data-dcnode-id="3168" title="International Humanitarian Law "><span data-dcnode-id="3169" instrument_node="">IHL</span></abbr><span data-dcnode-id="3167" instrument_node="">, for it demonstrates that although most of the modern rules are not universal by birth – they have until recently been drafted and adopted mainly by European powers – they are universal by nature, since the principles they codify can be found in most non-European systems of thought.</span></p><p data-dcnode-id="3164"><span data-dcnode-id="3165" instrument_node="">In spite of their humanitarian importance, all these ancient rules and customs suffered serious shortcomings. In most cases, their applicability was restricted to specific regions, traditions, ethnic or religious groups, did not cover those who did not belong to the same religion or group, and were very often limited to a specific war. Additionally, their implementation was the sole responsibility of the belligerents.</span></p><p data-dcnode-id="3159"><span data-dcnode-id="3163" instrument_node="">The inception of modern </span><abbr data-dcnode-id="3161" title="International Humanitarian Law "><span data-dcnode-id="3162" instrument_node="">IHL</span></abbr><span data-dcnode-id="3160" instrument_node=""> dates back to the battle of Solferino, a terrible battle in northern Italy between French, Italian and Austrian forces in 1859.</span></p><p data-dcnode-id="3157"><span data-dcnode-id="3158" instrument_node="">A witness to the carnage, Geneva businessman Henry Dunant was struck, not so much by the violence of the fighting as by the miserable fate of the wounded abandoned on the battlefield. Together with the women of the surrounding villages, he tried to alleviate their suffering.</span></p><p data-dcnode-id="3149"><span data-dcnode-id="3156" instrument_node="">Back in Geneva, Dunant published a short book in 1862, </span><em data-dcnode-id="3154"><span data-dcnode-id="3155" instrument_node="">A Memory of Solferino</span></em><span data-dcnode-id="3153" instrument_node="">,[</span><a data-dcnode-id="3151" href="#_ftn_055" id="_ftnref_055" name="_ftnref_055" title=""><span data-dcnode-id="3152" instrument_node="">55</span></a><span data-dcnode-id="3150" instrument_node="">] in which he vividly evoked the horrors of the battle, but also tried to find remedies to the suffering he had witnessed. Among other proposals, he invited the States “to formulate some international principle, sanctioned by a Convention inviolate in character” and giving legal protection to wounded soldiers in the field.</span></p><p data-dcnode-id="3144"><span data-dcnode-id="3148" instrument_node="">Dunant’s proposals met with enormous success all over Europe. A few months after the publication of his book, a small committee, the precursor of the International Committee of the Red Cross,[</span><a data-dcnode-id="3146" href="#_ftn_056" id="_ftnref_056" name="_ftnref_056" title=""><span data-dcnode-id="3147" instrument_node="">56</span></a><span data-dcnode-id="3145" instrument_node="">] was founded in Geneva. Its main objective was to examine the feasibility of Dunant’s proposals and to identify ways to formalize them. After having consulted military and medical experts in 1863, the Geneva Committee persuaded the Swiss Government to convene a diplomatic conference.</span></p><p data-dcnode-id="3142"><span data-dcnode-id="3143" instrument_node="">This conference was held in Geneva in August 1864 and adopted the Geneva Convention for the Amelioration of the Condition of the Wounded in Armies in the Field.</span></p><p data-dcnode-id="3140"><span data-dcnode-id="3141" instrument_node="">For the first time, States agreed to limit – in an international treaty open to universal ratification – their own power in favour of the individual and, also for the first time, war was subject to written, general law.</span></p><p data-dcnode-id="3135"><span data-dcnode-id="3139" instrument_node="">Modern </span><abbr data-dcnode-id="3137" title="International Humanitarian Law "><span data-dcnode-id="3138" instrument_node="">IHL</span></abbr><span data-dcnode-id="3136" instrument_node=""> was born.</span></p><p data-dcnode-id="3130"><span data-dcnode-id="3134" instrument_node="">The diagram on p. 144 illustrates the spectacular development experienced by </span><abbr data-dcnode-id="3132" title="International Humanitarian Law "><span data-dcnode-id="3133" instrument_node="">IHL</span></abbr><span data-dcnode-id="3131" instrument_node=""> since the adoption of the 1864 Geneva Convention. This development has been marked by three main characteristics, which, without entering into the details, can be described as follows:</span></p><ol data-dcnode-id="3092" type="a"><li data-dcnode-id="3120"><em data-dcnode-id="3128"><span data-dcnode-id="3129" instrument_node="">the categories of war victims protected</span></em><span data-dcnode-id="3127" instrument_node=""> by humanitarian law (military wounded, sick and shipwrecked, prisoners of war, civilians in occupied or “enemy” territories, the whole civilian population) and </span><em data-dcnode-id="3125"><span data-dcnode-id="3126" instrument_node="">of situations in which victims are protected</span></em><span data-dcnode-id="3124" instrument_node=""> (international and non-international armed conflicts) </span><em data-dcnode-id="3122"><span data-dcnode-id="3123" instrument_node="">have been steadily expanded</span></em><span data-dcnode-id="3121" instrument_node="">;</span></li><li data-dcnode-id="3113"><em data-dcnode-id="3118"><span data-dcnode-id="3119" instrument_node="">the treaties have been regularly updated and modernized</span></em><span data-dcnode-id="3117" instrument_node=""> to take account of the realities of recent conflicts; for example, the rules protecting the wounded adopted in 1864 were revised in 1906, 1929, 1949 and 1977 (some critics therefore charge that </span><abbr data-dcnode-id="3115" title="International Humanitarian Law "><span data-dcnode-id="3116" instrument_node="">IHL</span></abbr><span data-dcnode-id="3114" instrument_node=""> is always “one war behind reality”);</span></li><li data-dcnode-id="3093"><div data-dcnode-id="3105" id="c_c"><span data-dcnode-id="3112" instrument_node="">the existence</span><span data-dcnode-id="3110" style="line-height: 1.6;"><span data-dcnode-id="3111" instrument_node="">, </span></span><em data-dcnode-id="3108" style="line-height: 1.6;"><span data-dcnode-id="3109" instrument_node="">up until 1977</span></em><span data-dcnode-id="3106" style="line-height: 1.6;"><span data-dcnode-id="3107" instrument_node="">, of two separate branches of law:</span></span></div><ul data-dcnode-id="3094"><li data-dcnode-id="3103"><span data-dcnode-id="3104" instrument_node="">Geneva Law, which is mainly concerned with the protection of the victims of armed conflicts, i.e., non-combatants and those who no longer take part in the hostilities;</span></li><li data-dcnode-id="3095"><span data-dcnode-id="3102" instrument_node="">Hague Law, the provisions of which relate to limitations or prohibitions of specific means[</span><a data-dcnode-id="3100" href="#_ftn_057" id="_ftnref_057" name="_ftnref_057" title=""><span data-dcnode-id="3101" instrument_node="">57</span></a><span data-dcnode-id="3099" instrument_node="">] and methods[</span><a data-dcnode-id="3097" href="#_ftn_058" id="_ftnref_058" name="_ftnref_058" title=""><span data-dcnode-id="3098" instrument_node="">58</span></a><span data-dcnode-id="3096" instrument_node="">] of warfare.</span></li></ul></li></ol><p data-dcnode-id="3075"><span data-dcnode-id="3091" instrument_node="">These two branches of law were merged with the adoption of Protocols I and II in 1977. Today, some people claim that </span><abbr data-dcnode-id="3089" title="International Humanitarian Law "><span data-dcnode-id="3090" instrument_node="">IHL</span></abbr><span data-dcnode-id="3088" instrument_node=""> is ill-adapted to contemporary conflicts, but no specific suggestions have been made as to which rules should be replaced or modified, or what should be the content of any new rules. These people implicitly request that exceptions be made to the detriment of some persons (such as “terrorists”) and that the existing rules be softened when fighting enemies who systematically violate </span><abbr data-dcnode-id="3086" title="International Humanitarian Law "><span data-dcnode-id="3087" instrument_node="">IHL</span></abbr><span data-dcnode-id="3085" instrument_node="">, in particular those who do not distinguish themselves from the civilian population. Others, however, hold that </span><abbr data-dcnode-id="3083" title="International Humanitarian Law "><span data-dcnode-id="3084" instrument_node="">IHL</span></abbr><span data-dcnode-id="3082" instrument_node=""> is not protective enough: according to them, </span><abbr data-dcnode-id="3080" title="International Humanitarian Law "><span data-dcnode-id="3081" instrument_node="">IHL</span></abbr><span data-dcnode-id="3079" instrument_node=""> rules on the use of force and on detention should be brought closer to those of human rights law and additional categories of weapons should be prohibited. Finally, some people wonder whether it is realistic to expect armed groups to implement the existing rules of the </span><abbr data-dcnode-id="3077" title="International Humanitarian Law "><span data-dcnode-id="3078" instrument_node="">IHL</span></abbr><span data-dcnode-id="3076" instrument_node=""> of non-international armed conflicts. In formal international forums, States nevertheless continue to discuss and adopt protective rules for additional categories of persons and additional prohibitions of means and methods of warfare.</span></p><h4 class="casesdocheader" data-dcnode-id="3073"><span data-dcnode-id="3074" instrument_node="">CASES AND DOCUMENTS</span></h4><div class="beigebox" data-dcnode-id="3060"><ul data-dcnode-id="3061"><li data-dcnode-id="3068"><a data-dcnode-id="3069" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/sixtieth-anniversary-geneva-conventions" title=""><abbr data-dcnode-id="3071" title="International Committee of the Red Cross "><span data-dcnode-id="3072" instrument_node="">ICRC</span></abbr><span data-dcnode-id="3070" instrument_node="">, Sixtieth Anniversary of the Geneva Conventions</span></a></li><li data-dcnode-id="3062"><a data-dcnode-id="3063" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/colombia-constitutional-conformity-protocol-ii%23para_9"><span data-dcnode-id="3067" instrument_node="">Colombia, Constitutional Conformity of </span><abbr data-dcnode-id="3065" title="Protocol Additional to the Geneva Conventions of 12 August 1949, and Relating to the Protection of Victims of Non-International Armed Conflicts, of 8 June 1977"><span data-dcnode-id="3066" instrument_node="">Protocol II</span></abbr><span data-dcnode-id="3064" instrument_node=""> [Para. 9]</span></a></li></ul></div><h4 aria-controls="readingsbody25" aria-expanded="false" class="readingsheader" data-dcnode-id="3058" data-toggle="collapse" href="#readingsbody25"><span data-dcnode-id="3059" instrument_node="">specific bibliography</span></h4><div class="bluebox collapse" data-dcnode-id="2894" id="readingsbody25"><p data-dcnode-id="3055"><strong data-dcnode-id="3056"><span data-dcnode-id="3057" instrument_node="">Suggested reading:</span></strong></p><ul data-dcnode-id="2991"><li data-dcnode-id="3050"><span data-dcnode-id="3054" instrument_node="">BEST Geoffrey, </span><em data-dcnode-id="3052"><span data-dcnode-id="3053" instrument_node="">Humanity in Warfare: The Modern History of the International Law of Armed Conflicts</span></em><span data-dcnode-id="3051" instrument_node="">, London, Weidenfeld and Nicholson, 1980, 400 pp.</span></li><li data-dcnode-id="3042"><span data-dcnode-id="3049" instrument_node="">DRAPER Gerald I.A.D, “The Development of International Humanitarian Law”, in </span><em data-dcnode-id="3047"><span data-dcnode-id="3048" instrument_node="">International Dimensions of Humanitarian Law</span></em><span data-dcnode-id="3046" instrument_node="">, Geneva, Henry-Dunant Institute/</span><abbr data-dcnode-id="3044" title="United Nations Educational, Scientific and Cultural Organisation"><span data-dcnode-id="3045" instrument_node="">UNESCO</span></abbr><span data-dcnode-id="3043" instrument_node="">, 1988, pp. 67-90.</span></li><li data-dcnode-id="3037"><span data-dcnode-id="3041" instrument_node="">DARCY Shane, MAGLIVERAS Konstantinos D. &amp; HANKEL Gerd, “Reforming the Laws of War”, in QUENIVET Noëlle &amp; SHAH-DAVIS Shilan (eds), </span><em data-dcnode-id="3039"><span data-dcnode-id="3040" instrument_node="">International Law and Armed Conflict: Challenges in the 21st Century</span></em><span data-dcnode-id="3038" instrument_node="">, The Hague, T.M.C. Asser Press, 2010, pp. 317-360.</span></li><li data-dcnode-id="3032"><span data-dcnode-id="3036" instrument_node="">GOLDSTONE Richard, “Reflections on the Development of the Law of War”, in </span><em data-dcnode-id="3034"><span data-dcnode-id="3035" instrument_node="">McGill Law Journal</span></em><span data-dcnode-id="3033" instrument_node="">, Vol. 46/1, 2000, pp. 279-290.</span></li><li data-dcnode-id="3026"><span data-dcnode-id="3031" instrument_node="">HAGGENMACHER Peter, “Just War and Regular War in Sixteenth Century Spanish Doctrine”, in </span><em data-dcnode-id="3028"><abbr data-dcnode-id="3029" title="International Review of the Red Cross "><span data-dcnode-id="3030" instrument_node="">IRRC</span></abbr></em><span data-dcnode-id="3
