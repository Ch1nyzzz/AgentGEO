ing to the Protection of Victims of Non-International Armed Conflicts, of 8 June 1977"><a data-dcnode-id="554" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icrc.org/applic/ihl/ihl.nsf/Article.xsp%3Faction%3DopenDocument%26documentId%3DCC9AF613C27EB03AC12563CD0051E98B"><span data-dcnode-id="555" instrument_node="">P II</span></a></abbr><a data-dcnode-id="551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icrc.org/applic/ihl/ihl.nsf/Article.xsp%3Faction%3DopenDocument%26documentId%3DCC9AF613C27EB03AC12563CD0051E98B"><span data-dcnode-id="552" instrument_node="">, Art. 25.</span></a><span data-dcnode-id="550" instrument_node=""> In practice there has never been such a denunciation. The aforementioned articles of the Geneva Conventions explicitly refer to the Martens clause (</span><em data-dcnode-id="548"><span data-dcnode-id="549" instrument_node="">See infra</span></em><span data-dcnode-id="547" instrument_node=""> </span><a data-dcnode-id="545" href="#d_iii_1"><span data-dcnode-id="546" instrument_node="">III. 1. The Martens Clause</span></a><span data-dcnode-id="544" instrument_node="">) to clarify the legal situation after such a denunciation has become effective.</span></li><li data-dcnode-id="533"><a data-dcnode-id="541" href="#_ftnref_067" id="_ftn_067" name="_ftn_067" title=""><span data-dcnode-id="542" instrument_node="">[67]</span></a><span data-dcnode-id="540" instrument_node=""> </span><em data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">See</span></em><span data-dcnode-id="537" instrument_node=""> Vienna Convention on the Law of Treaties, Art. 60(5) (</span><em data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">See infra</span></em><span data-dcnode-id="534" instrument_node="">, , also for the distinct question of the prohibition of reprisals)</span></li><li data-dcnode-id="529"><a data-dcnode-id="531" href="#_ftnref_068" id="_ftn_068" name="_ftn_068" title=""><span data-dcnode-id="532" instrument_node="">[68]</span></a><span data-dcnode-id="530" instrument_node=""> This is however the definition of custom in Art. 38(1)(b) of the Statute of the International Court of Justice.</span></li><li data-dcnode-id="511"><a data-dcnode-id="527" href="#_ftnref_069" id="_ftn_069" name="_ftn_069" title=""><span data-dcnode-id="528" instrument_node="">[69]</span></a><span data-dcnode-id="526" instrument_node=""> </span><em data-dcnode-id="524"><span data-dcnode-id="525" instrument_node="">See</span></em><span data-dcnode-id="523" instrument_node=""> </span><a data-dcnode-id="519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/icrc-customary-international-humanitarian-law%23chapter4"><abbr data-dcnode-id="521" title="International Committee of the Red Cross "><span data-dcnode-id="522" instrument_node="">ICRC</span></abbr><span data-dcnode-id="520" instrument_node="">, Customary International Humanitarian Law [Part D.]</span></a><span data-dcnode-id="518" instrument_node="">, on the </span><abbr data-dcnode-id="516" title="United States of America"><span data-dcnode-id="517" instrument_node="">US</span></abbr><span data-dcnode-id="515" instrument_node=""> response to the </span><abbr data-dcnode-id="513" title="International Committee of the Red Cross "><span data-dcnode-id="514" instrument_node="">ICRC</span></abbr><span data-dcnode-id="512" instrument_node=""> Study.</span></li><li data-dcnode-id="499"><a data-dcnode-id="509" href="#_ftnref_070" id="_ftn_070" name="_ftn_070" title=""><span data-dcnode-id="510" instrument_node="">[70]</span></a><span data-dcnode-id="508" instrument_node=""> </span><em data-dcnode-id="506"><span data-dcnode-id="507" instrument_node="">See</span></em><span data-dcnode-id="505" instrument_node="">, e.g., </span><abbr data-dcnode-id="502" title="Protocol Additional to the Geneva Conventions of 12 August 1949, and Relating to the Protection of m data-dcnode-id="482"><span data-dcnode-id="483" instrument_node="">See</span></em><span data-dcnode-id="481" instrument_node=""> </span><a data-dcnode-id="477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/icrc-customary-international-humanitarian-law" title=""><abbr data-dcnode-id="479" title="International Committee of the Red Cross "><span data-dcnode-id="480" instrument_node="">ICRC</span></abbr><span data-dcnode-id="478" instrument_node="">, Customary International Humanitarian Law</span></a></li><li data-dcnode-id="472"><a data-dcnode-id="474" href="#_ftnref_073" id="_ftn_073" name="_ftn_073" title=""><span data-dcnode-id="475" instrument_node="">[73]</span></a><span data-dcnode-id="473" instrument_node=""> Referred to in Art. 38(1)(c) of the Statute of the International Court of Justice as one of the sources of international law.</span></li><li data-dcnode-id="463"><a data-dcnode-id="470" href="#_ftnref_074" id="_ftn_074" name="_ftn_074" title=""><span data-dcnode-id="471" instrument_node="">[74]</span></a><span data-dcnode-id="469" instrument_node=""> This has now been codified in </span><abbr data-dcnode-id="466" title="Protocol Additional to the Geneva Conventions of 12 August 1949, and Relating to the Protection of Victims of International Armed Conflicts, of 8 June 1977"><a data-dcnode-id="467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icrc.org/applic/ihl/ihl.nsf/Article.xsp%3Faction%3DopenDocument%26documentId%3D50FB5579FB098FAAC12563CD0051DD7C"><span data-dcnode-id="468" instrument_node="">P I</span></a></abbr><a data-dcnode-id="464" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icrc.org/applic/ihl/ihl.nsf/Article.xsp%3Faction%3DopenDocument%26documentId%3D50FB5579FB098FAAC12563CD0051DD7C"><span data-dcnode-id="465" instrument_node="">, Art. 57(2)(b)</span></a></li><li data-dcnode-id="454"><a data-dcnode-id="461" href="#_
