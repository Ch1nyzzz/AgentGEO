-dcnode-id="7916"><span data-dcnode-id="7923" instrument_node="">RUDA José-Maria, “The Latin American Concept”, in </span><em data-dcnode-id="7921"><span data-dcnode-id="7922" instrument_node="">International Dimensions of Humanitarian Law</span></em><span data-dcnode-id="7920" instrument_node="">, Geneva, Henry-Dunant Institute/</span><abbr data-dcnode-id="7918" title="United Nations Educational, Scientific and Cultural Organisation"><span data-dcnode-id="7919" instrument_node="">UNESCO</span></abbr><span data-dcnode-id="7917" instrument_node="">, 1988, pp. 42-58.</span></li><li data-dcnode-id="7911"><span data-dcnode-id="7915" instrument_node="">UNNIKRISHNAN P.V., “Humanitarian Values in India”, in </span><em data-dcnode-id="7913"><span data-dcnode-id="7914" instrument_node="">Refugee Survey Quarterly</span></em><span data-dcnode-id="7912" instrument_node="">, Vol. 21/3, 2002, pp. 150-155.</span></li><li data-dcnode-id="7906"><span data-dcnode-id="7910" instrument_node="">VANHULLEBUSCH Matthias, “General Principles of Islamic Law of War: a Reassessment”, in </span><em data-dcnode-id="7908"><span data-dcnode-id="7909" instrument_node="">Yearbook of Islamic and Middle Eastern Law</span></em><span data-dcnode-id="7907" instrument_node="">, Vol. 13, 2007, pp. 37-56.&nbsp;</span></li><li data-dcnode-id="7901"><span data-dcnode-id="7905" instrument_node="">VEUTHEY Michel, “Humanitarian Law and Spirituality”, in </span><em data-dcnode-id="7903"><span data-dcnode-id="7904" instrument_node="">Refugee Survey Quarterly</span></em><span data-dcnode-id="7902" instrument_node="">, Vol. 21/3, 2002, pp. 45-110.</span></li></ul></div><h4 class="beigeheader" data-dcnode-id="7897"><span data-dcnode-id="7898" instrument_node="">Footnotes</span></h4><div class="beigebox" data-dcnode-id="7835"><ul data-dcnode-id="7836"><li data-dcnode-id="7893"><a data-dcnode-id="7895" href="#_ftnref_001" id="_ftn_001" name="_ftn_001" title=""><span data-dcnode-id="7896" instrument_node="">[1]</span></a><span data-dcnode-id="7894" instrument_node=""> For example, civilians.</span></li><li data-dcnode-id="7889"><a data-dcnode-id="7891" href="#_ftnref_002" id="_ftn_002" name="ftnref_002" title=""><span data-dcnode-id="7892" instrument_node="">[2]</span></a><span data-dcnode-id="7890" instrument_node=""> For example, those who have surrendered (i.e., in international armed conflicts, prisoners of war) or can no longer participate (such as the wounded and sick).</span></li><li data-dcnode-id="7885"><a data-dcnode-id="7887" href="#_ftnref_003" id="_ftn_003" name="_ftn_003" title=""><span data-dcnode-id="7888" instrument_node="">[3]</span></a><span data-dcnode-id="7886" instrument_node=""> If International Humanitarian Law wants to protect anyone, it cannot consider merely any causal contribution to the war effort as participation, but only the contribution implementing the final element in the causality chain, i.e., the application of military violence.</span></li><li data-dcnode-id="7881"><a data-dcnode-id="7883" href="#_ftnref_004" id="_ftn_004" name="_ftn_004" title=""><span data-dcnode-id="7884" instrument_node="">[4]</span></a><span data-dcnode-id="7882" instrument_node=""> The State fighting in self-defence has only to weaken the military potential of the aggressor sufficiently to preserve its independence; the aggressor has only to weaken the military potential of the defender sufficiently to impose its political will; the governmental forces involved in a non-international armed conflict have only to overcome the armed rebellion and dissident fighters have only to overcome the control of the government of the country (or parts of it) they want to control.</span></li><li data-dcnode-id="7877"><a data-dcnode-id="7879" href="#_ftnref_005" id="_ftn_005" name="_ftn_005" title=""><span data-dcnode-id="7880" instrument_node="">[5]</span></a><span data-dcnode-id="7878" instrument_node=""> In order to «win the war» it is not necessary to kill all enemy soldiers; it is sufficient to capture them or to make them otherwise surrender. It is not necessary to harm civilians, only combatants. It is not necessary to destroy the enemy country, but only to occupy it. It is not necessary to destroy civilian infrastructure, but only objects contributing to military resistance.</span></li><li data-dcnode-id="7870"><a data-dcnode-id="7875" href="#_ftnref_006" id="_ftn_006" name="_ftn_006" title=""><span data-dcnode-id="7876" instrument_node="">[6]</span></a><span data-dcnode-id="7874" instrument_node=""> “Laws are silent among [those who use] weapons” (Cited in Cicero, </span><em data-dcnode-id="7872"><span data-dcnode-id="7873" instrument_node="">Pro Milone</span></em><span data-dcnode-id="7871" instrument_node="">, 4.11).</span></li><li data-dcnode-id="7866"><a data-dcnode-id="7868" href="#_ftnref_007" id="_ftn_007" name="_ftn_007" title=""><span data-dcnode-id="7869" instrument_node="">[7]</span></a><span data-dcnode-id="7867" instrument_node=""> He or she who doubts this has a good reason to read this book, which does not consist of opinions of the authors but of a selection of the variety of instances in which International Humanitarian Law was invoked in recent conflicts.</span></li><li data-dcnode-id="7862"><a data-dcnode-id="7864" href="#_ftnref_008" id="_ftn_008" name="_ftn_008" title=""><span data-dcnode-id="7865" instrument_node="">[8]</span></a><span data-dcnode-id="7863" instrument_node=""> Even those who consider all soldiers as murderers in reality want to make an argument against war and not against the individual soldiers</span></li><li data-dcnode-id="7854"><a data-dcnode-id="7860" href="#_ftnref_009" id="_ftn_009" name="_ftn_009" title=""><span data-dcnode-id="7861" instrument_node="">[9]</span></a><span data-dcnode-id="7859" instrument_node=""> MAURICE Frédéric, “Humanitarian ambition”, in </span><em data-dcnode-id="7856"><abbr data-dcnode-id="7857" title="International Review of the Red Cross "><span data-dcnode-id="7858" instrument_node="">IRRC</span></abbr></em><span data-dcnode-id="7855" instrument_node="">, Vol. 289, 1992, p. 371.</span></li><li data-dcnode-id="7844"><a data-dcnode-id="7852" href="#_ftnref_010" id="_ftn_010" name="_ftn_010" title=""><span data-dcnode-id="7853" instrument_node="">[10]</span></a><span data-dcnode-id="7851" instrument_node=""> </span><em data-dcnode-id="7849"><span data-dcnode-id="7850" instrument_node="">See</span></em><span data-dcnode-id="7848" instrument_node=""> infra, </span><a data-dcnode-id="7846" href="#chapter3"><span data-dcnode-id="7847" instrument_node="">Historical Development of International Humanitarian Law</span></a><span data-dcnode-id="7845" instrument_node="">.</span></li><li data-dcnode-id="7837"><a data-dcnode-id="7842" href="#_ftnref_011" id="_ftn_011" name="_ftn_011" title=""><span data-dcnode-id="7843" instrument_node="">[11]</span></a><span data-dcnode-id="7841" instrument_node=""> PICTET Jean, “Humanitarian Ideas Shared by Different Schools of Thought and Cultural Traditions”, in </span><em data-dcnode-id="7839"><span data-dcnode-id="7840" instrument_node="">International Dimensions of Humanitarian Law</span></em><span data-dcnode-id="7838" instrument_node="">, Geneva, Dordrecht, Henry Dunant Institute, M. Nijhoff, 1988, pp. 3-4</span></li></ul></div></div></div><div class="field-item odd" data-dcnode-id="3208"><span data-dcnode-id="7832" id="toc-b-international-humanitarian-law-as-a-branch-of-public-international-law"></span><h2 data-dcnode-id="7829"><a class="nohref" data-dcnode-id="7831" id="chapter2"></a><span data-dcnode-id="7830" instrument_node="">B. International Humanitarian Law as a Branch of Public International Law</span></h2><div class="rxbodyfield" data-dcnode-id="3209"><table data-dcnode-id="7824" width="100%"><tbody data-dcnode-id="7825"><tr data-dcnode-id="7826"><td data-dcnode-id="7827"><span data-dcnode-id="7828" instrument_node="">&nbsp;</span></td></tr></tbody></table><h4 aria-controls="readingsbody4" aria-expanded="false" class="readingsheader" data-dcnode-id="7822" data-toggle="collapse" href="#readingsbody4"><span data-dcnode-id="7823" instrument_node="">specific bibliography</span></h4><div class="bluebox collapse" data-dcnode-id="7810" id="readingsbody4"><strong data-dcnode-id="7820"><span data-dcnode-id="7821" instrument_node="">Suggested reading:</span></strong><ul data-dcnode-id="7811"><li data-dcnode-id="7812"><span data-dcnode-id="7819" instrument_node="">ABI-SAAB Georges, “The Specificities of Humanitarian Law”, in </span><em data-dcnode-id="7817"><span data-dcnode-id="7818" instrument_node="">Studies and Essays on International Humanitarian Law and Red Cross Principles in Honour of Jean Pictet</span></em><span data-dcnode-id="7816" instrument_node="">, Geneva/The Hague, </span><abbr data-dcnode-id="7814" title="International Committee of the Red Cross "><span data-dcnode-id="7815" instrument_node="">ICRC</span></abbr><span data-dcnode-id="7813" instrument_node="">/M. Nijhoff, 1984, pp. 265-280.</span></li></ul></div><span data-dcnode-id="7809" id="toc--i-international-humanitarian-law-at-the-vanishing-point-of-international-law"></span><h3 data-dcnode-id="7806"><a class="nohref" data-dcnode-id="7808" id="b_i" name="b_i"></a><span data-dcnode-id="7807" instrument_node="">&nbsp;I. International Humanitarian Law: at the vanishing point of international law</span></h3><p data-dcnode-id="7803"><strong data-dcnode-id="7804"><span data-dcnode-id="7805" instrument_node="">Introductory text</span></strong></p><p data-dcnode-id="7801"><span data-dcnode-id="7802" instrument_node="">Public international law can be described as composed of two layers: a traditional layer consisting of the law regulating coordination and cooperation between members of the international society – essentially the States and the organizations created by States – and a new layer consisting of the constitutional and administrative law of the international community of 6.5 billion human beings. While this second layer tries to overcome the law’s typical traditional relativity, international law still retains a structure that is fundamentally different from that of any internal legal order, essentially because the society to which it applies and which has created it is, despite all modern tendencies, infinitely less structured and formally organized than any nation-State.</span></p><p data-dcnode-id="7793"><span data-dcnode-id="7800" instrument_node="">To understand </span><abbr data-dcnode-id="7798" title="International Humanitarian Law "><span data-dcnode-id="7799" instrument_node="">IHL</span></abbr><span data-dcnode-id="7797" instrument_node="">, one must start with the concepts and inherent features of the traditional layer: </span><abbr data-dcnode-id="7795" title="International Humanitarian Law "><span data-dcnode-id="7796" instrument_node="">IHL</span></abbr><span data-dcnode-id="7794" instrument_node=""> was conceived as a body of law regulating belligerent inter-State relations. It is to a large extent irrelevant, however, to contemporary humanitarian problems unless understood within the second layer. Indeed, inter-State armed conflicts tend to have disappeared, except in the form of armed conflicts between the members of organized international society or, on the one hand, those who (claim to) represent it and, on the other hand, States outlawed by it – a phenomenon of the second layer.</span></p><p data-dcnode-id="7788"><span data-dcnode-id="7792" instrument_node="">From the perspective of both layers, </span><abbr data-dcnode-id="7790" title="International Humanitarian Law "><span data-dcnode-id="7791" instrument_node="">IHL</span></abbr><span data-dcnode-id="7789" instrument_node=""> is perched at the vanishing point of international law, but is simultaneously a crucial test for international law. From the perspective of the first layer, it is astonishing but essential for our understanding of the nature and reality of international law to see that law governs inter-State relations even when they are belligerent, even when the very existence of a State is at stake, and even when the most important rule of the first layer – the prohibition of the use of force – has been violated or when a government has been unable to impose its monopoly of violence within the territory of the State. In the latter case, which is tantamount to a non-international armed conflict, what is most striking is not so much the fact that international law regulates a situation that transcends the axioms of the first layer, but the fact that its international rules apply not only to the use of force by the government but also directly to all violent human behaviour in the situation. From the perspective of the second layer, it is perhaps even more difficult to conceive – but essential to understand – that international law governs human behaviour, even when violence is used, and even when essential features of the organized structure of the international and national community have fallen apart. No national legal system contains similar rules on how those who violate its primary rules have to behave while violating them.</span></p><p data-dcnode-id="7784"><abbr data-dcnode-id="7786" title="International Humanitarian Law "><span data-dcnode-id="7787" instrument_node="">IHL</span></abbr><span data-dcnode-id="7785" instrument_node=""> exemplifies all the weakness and at the same time the specificity of international law. If the end of all law is the human being, it is critical for our understanding of international law to see how it can protect him or her even, and precisely, in the most inhumane situation, armed conflict.</span></p><p data-dcnode-id="7764"><span data-dcnode-id="7783" instrument_node="">Some have suggested – albeit more implicitly than explicitly – that </span><abbr data-dcnode-id="7781" title="International Humanitarian Law "><span data-dcnode-id="7782" instrument_node="">IHL</span></abbr><span data-dcnode-id="7780" instrument_node=""> is different from the rest of international law, either because they wanted to protect international law against detractors claiming to have an obvious </span><em data-dcnode-id="7778"><span data-dcnode-id="7779" instrument_node="">prima facie</span></em><span data-dcnode-id="7777" instrument_node=""> case proving its inexistence, or because they wanted to protect </span><abbr data-dcnode-id="7775" title="International Humanitarian Law "><span data-dcnode-id="7776" instrument_node="">IHL</span></abbr><span data-dcnode-id="7774" instrument_node=""> from the basic political, conceptual or ideological controversies inevitably arising between States and between human beings holding diverging opinions on the basic notions of international law and its ever changing rules. This suggestion, however, cannot be accepted, as it fails to recognize the inherent inter-relation between </span><abbr data-dcnode-id="7772" title="International Humanitarian Law "><span data-dcnode-id="7773" instrument_node="">IHL</span></abbr><span data-dcnode-id="7771" instrument_node=""> and other branches of international law. </span><abbr data-dcnode-id="7769" title="International Humanitarian Law "><span data-dcnode-id="7770" instrument_node="">IHL</span></abbr><span data-dcnode-id="7768" instrument_node="">, distinct from humanitarian morality or the simple dictates of public conscience, cannot exist except as a branch of international law, and international law must contain rules concerning armed conflict, as an unfortunately traditional form of inter-State relations. Indeed, law has to provide answers to reality, it has to rule over reality; it cannot limit itself to reflecting reality. The latter, the necessarily normative character of law, the inevitable distance between law, on the one hand, and politics and history, on the other, is even more evident for </span><abbr data-dcnode-id="7766" title="International Humanitarian Law "><span data-dcnode-id="7767" instrument_node="">IHL</span></abbr><span data-dcnode-id="7765" instrument_node="">, given the bleak reality of armed conflicts, which cannot possibly be called humanitarian.</span></p><blockquote data-dcnode-id="7748"><p data-dcnode-id="7761"><strong data-dcnode-id="7762"><span data-dcnode-id="7763" instrument_node="">Quotation 1</span></strong></p><span data-dcnode-id="7760" instrument_node="">&nbsp;[I]n the matter of those parts of the law of war which are not covered or which are not wholly covered by the Geneva Conventions, diverse problems will require clarification. These include such questions as to implications of the principle, which has been gaining general recognition, that the law of war is binding not only upon states but also upon individuals i.e. both upon members of the armed forces and upon civilians; the changed character of the duties of the Occupant who is now bound, in addition to ministering to his own interests and those of his armed forces, to assume an active responsibility for the welfare of the population under his control; the consequences, with regard to appropriation of public property of the enemy, of the fact that property hitherto regarded as private and primarily devoted to serving the needs of private persons, is subjected in some countries to complete control by the state; the resulting necessity for changes in the law relating to booty; the emergence of motorized warfare with its resulting effects upon the factual requirements of occupation and the concomitant duties of the inhabitants; the advent of new weapons such as flame-throwers and napalm when used against human beings a problem which may be postponed, but not solved, in manuals of land warfare by the suggestion that it raises a question primarily in the sphere of aerial warfare; the problems raised by the use of aircraft to carry spies and so-called commando troops; the limits, if any, of the subjection of airborne and other commando forces to the rules of warfare, for instance, in relation to the treatment of prisoners of war; the reconciliation of the obviously contradictory principles relating to espionage said to constitute a war crime on the part of spies and a legal right on the part of the belligerent to employ them; the humanization of the law relating to the punishment of spies and of so-called war treason; the prohibition of assassination in relation to so-called unarmed combat; authoritative clarification of the law relating to the punishment of war crimes, in particular with regard to the plea of superior orders and the responsibility of commanders for the war crimes of their subordinates; the regulation, in this connexion, of the question of international criminal jurisdiction; the elucidation of the law, at present obscure and partly contradictory, relating to ruses and stratagems, especially with regard to the wearing of the uniform of the enemy; the effect of the prohibition or limitation of the right of war on the application of rules of war, in particular in hostilities waged collectively for the enforcement of international obligations; and many others. In all these matters the lawyer must do his duty regardless of dialectical doubts – though with a feeling of humility springing from the knowledge that if international law is, in some ways, at the vanishing point of law, the law of war is, perhaps even more conspicuously, at the vanishing point of international law. He must continue to expound and to elucidate the various aspects of the law of war for the use of armed forces, of governments, and of others. He must do so with determination though without complacency and perhaps not always very hopefully – the only firm hope being that a world may arise in which no such calls will claim his zeal.</span><br data-dcnode-id="7759"><span data-dcnode-id="7758" instrument_node=""> </span><br data-dcnode-id="7757"><span data-dcnode-id="7756" instrument_node=""> [</span><strong data-dcnode-id="7754"><span data-dcnode-id="7755" instrument_node="">Source</span></strong><span data-dcnode-id="7753" instrument_node="">: LAUTERPACHT Hersch, “The Problem of the Revision of the Law of War”, in </span><em data-dcnode-id="7750"><abbr data-dcnode-id="7751" title="British Year Book of International Law"><span data-dcnode-id="7752" instrument_node="">BYIL</span></abbr></em><span data-dcnode-id="7749" instrument_node="">, Vol. 29, 1952-53, pp.&nbsp;381-382]</span></blockquote><blockquote data-dcnode-id="7733"><p data-dcnode-id="7745"><strong data-dcnode-id="7746"><span data-dcnode-id="7747" instrument_node="">Quotation 2</span></strong></p><span data-dcnode-id="7744" instrument_node="">&nbsp;[I]t is in particular with regard to the law of war that the charge of a mischievous propensity to unreality has been levelled against the science of international law. The very idea of a legal regulation of a condition of mere force has appeared to many incongruous to the point of absurdity. This view, which is entitled to respect, is controversial – at least so long as the law permitted or even authorized resort of war. And it may be argued that even if war were to be unconditionally renounced and prohibited – which is not as yet the case – juridical logic would have to stop short of the refusal to provide a measure of legal regulation, for obvious considerations of humanity, of hostilities which have broken out in disregard of the fundamental prohibition or recourse to war. The same applies to hostilities and measures of force taking place in the course of collective enforcement of international law or in the course of civil wars.</span><br data-dcnode-id="7743"><span data-dcnode-id="7742" instrument_node=""> </span><br data-dcnode-id="7741"><span data-dcnode-id="7740" instrument_node=""> [</span><strong data-dcnode-id="7738"><span data-dcnode-id="7739" instrument_node="">Source</span></strong><span data-dcnode-id="7737" instrument_node="">: LAUTERPACHT Elihu (ed.), LAUTERPACHT Hersch, </span><em data-dcnode-id="7735"><span data-dcnode-id="7736" instrument_node="">International Law, Collected Papers: The Law of Peace</span></em><span data-dcnode-id="7734" instrument_node="">, Cambridge, Cambridge University Press, Part. 2, 1975, pp. 37-38]</span></blockquote><h4 aria-controls="readingsbody5" aria-expanded="false" class="readingsheader" data-dcnode-id="7731" data-toggle="collapse" href="#readingsbody5"><span data-dcnode-id="7732" instrument_node="">Specific bibliography</span></h4><div class="bluebox collapse" data-dcnode-id="7715" id="readingsbody5"><strong data-dcnode-id="7729"><span data-dcnode-id="7730" instrument_node="">Suggested reading:</span></strong><ul data-dcnode-id="7716"><li data-dcnode-id="7723"><span data-dcnode-id="7728" instrument_node="">LAUTERPACHT Hersch, “The Problems of the Revision of the Law of War”, in </span><em data-dcnode-id="7725"><abbr data-dcnode-id="7726" title="British Year Book of International Law"><span data-dcnode-id="7727" instrument_node="">BYIL</span></abbr></em><span data-dcnode-id="7724" instrument_node="">, Vol. 29, 1952, pp. 360-382.</span></li><li data-dcnode-id="7717"><span data-dcnode-id="7722" instrument_node="">LAUTERPACHT Hersch, “The Limits of the Operation of the Law of War”, in </span><em data-dcnode-id="7719"><abbr data-dcnode-id="7720" title="British Year Book of International Law"><span data-dcnode-id="7721" instrument_node="">BYIL</span></abbr></em><span data-dcnode-id="7718" instrument_node="">, Vol. 30, 1953, pp. 206-243.</span></li></ul></div><h4 data-dcnode-id="7712"><a class="nohref" data-dcnode-id="7714" id="b_i_1" name="b_i_1"></a><span data-dcnode-id="7713" instrument_node="">&nbsp;1. &nbsp; Is international law “law”?</span></h4><blockquote data-dcnode-id="7691"><p data-dcnode-id="7709"><strong data-dcnode-id="7710"><span data-dcnode-id="7711" instrument_node="">Quotation 1</span></strong></p><p data-dcnode-id="7707"><span data-dcnode-id="7708" instrument_node="">As “force” made giant strides, so “law” tried to keep abreast. Single laws have tried to turn aside the sword. Not only has a new world organisation been set up, the United Nations, which its founders hoped would prevent a repetition of the “Great New Fact” (expression Churchill coined in speaking of the atomic bomb). But legal rules have also been devised to help curb the new violence. However, pressure from conflicting economic and military interests and the clash of antagonistic ideologies has prevented this “new” law from shaping the actions of states. Today, “classic” or traditional law, which was realistic (because it faithfully reflected the balance of power among subjects of the international community), has been overlaid by “idealistic” law: a set of rules and institutions that, to a large extent, reflect the need to transform relations as they now stand and proclaim a duty to do more than merely consecrate things as they are. [...]</span></p><p data-dcnode-id="7705"><span data-dcnode-id="7706" instrument_node="">[I]t would be a great mistake to refuse to examine the relations that exist between these two poles [...] on the premise that states, those “cold monsters”, without souls, never listen to the voice of “law” since they are moved only by motivations of “power” and “force”. In my opinion, this premise is false. On closer examination, it is not true that, when their essential military, economic and political interests are at stake, states trifle with the Tables of the Law [...]. Their strategy is more subtle than simply transgressing the legal “commandments”. It consists in preventing their legal crystallisation, or – if the pressure of public opinion makes this impossible – in wording them in terms as ambiguous as possible. By so doing, they can then interpret these legal standards as best they please, adapting them to requirements of the moment and bending them to their contingent interests. If we thumb through the records of the last forty or fifty years, we can easily see that no state, great or small, has ever admitted to breaking the commonly accepted legal canons. (Take, for example, the ban on chemical warfare, or on weapons that cause unnecessary suffering; the ban on indiscriminate attacks on undefended towns, or, on a larger scale, on acts of genocide, and so on.) Whenever they are accused of violating these and other no less important international rules, states immediately make denials, or else they point to the exceptional circumstances which they feel legitimize their course of action; or they say that the international rules prohibit not their own but other forms of behaviour.</span></p><p data-dcnode-id="7703"><span data-dcnode-id="7704" instrument_node="">[...]</span></p><p data-dcnode-id="7701"><span data-dcnode-id="7702" instrument_node="">The role of public opinion has grown over the years. Thus in 1931 the eminent English jurist J.L. Brierly noted that within the state a breach of law can go unnoticed and, in any case, when it is noticed the transgressor is often indifferent to “social stigma”; on the other hand, in the international community it is almost impossible for states to perpetrate grave violations of hallowed standards of conduct and escape public disapproval, and besides, states are necessarily very sensitive to public censure. Today, the growing power of the press and of the mass media generally has greatly increased the importance of public opinion especially in democratic countries. But even states in which the media is manipulated by government authorities cannot ignore the repercussions of their political, military and economic action on the opinion of foreign governments, promptly alerted by the various (often western) channels of information.</span></p><p data-dcnode-id="7699"><span data-dcnode-id="7700" instrument_node="">By relying on these forces, as well as on many non-governmental organizations which are more and more committed and pugnacious, there is hope that something may as yet be achieved. By acting on the “twilight” area in which violations prevail and law seems to dissolve into air, jurists, and all those who are involved in the conduct of state affairs, can be of some use to the voices of dissent and above all, to those who have been, or may in future be, the victims of violence.</span></p><span data-dcnode-id="7698" instrument_node="">[</span><strong data-dcnode-id="7696"><span data-dcnode-id="7697" instrument_node="">Source</span></strong><span data-dcnode-id="7695" instrument_node="">: CASSESE Antonio, </span><em data-dcnode-id="7693"><span data-dcnode-id="7694" instrument_node="">Violence and Law in the Modern Age</span></em><span data-dcnode-id="7692" instrument_node="">, Princeton, Princeton University Press, 1988, p.&nbsp;4-7]</span></blockquote><blockquote data-dcnode-id="7640"><p data-dcnode-id="7688"><strong data-dcnode-id="7689"><span data-dcnode-id="7690" instrument_node="">Quotation 2</span></strong></p><p data-dcnode-id="7686"><span data-dcnode-id="7687" instrument_node="">The Limitations of International Law. [...] To many an observer, governments seem largely free to decide whether to agree to new law, whether to accept another nation’s view of existing law, whether to comply with agreed law. International law, then is voluntary and only hortatory. It must always yield to national interest. Surely, no nation will submit to law any questions involving its security or independence, even its power, prestige, influence. Inevitably, a diplomat holding these views will be reluctant to build policy on law he deems ineffective. He will think it unrealistic and dangerous to enact laws which will not be used, to base his government’s policy on the expectation that other governments will observe law and agreement. Since other nations do not attend to law except when it is in their interest, the diplomat might not see why his government should do so at the sacrifice of important interests. He might be impatient with his lawyers who tell him that the government may not do what he would like to see done.</span></p><p data-dcnode-id="7684"><span data-dcnode-id="7685" instrument_node="">These depreciations of international law challenge much of what the international lawyer does. Indeed, some lawyers seem to despair for international law until there is world government or at least effective international organization. But most international lawyers are not dismayed. Unable to deny the limitations of international law, they insist that these are not critical, and they deny many of the alleged implications of these limitations, if they must admit that the cup of law is half-empty, they stress that it is half-full. They point to similar deficiencies in many domestic legal systems. They reject definitions (commonly associated with the legal philosopher John Austin) that deny the title of law to any but the command of a sovereign, enforceable and enforced as such. They insist that despite inadequacies in legislative method, international law has grown and developed and changed. If international law is difficult to make, yet it is made; if its growth is slow, yet it grows. If there is no judiciary as effective as in some developed national systems, there is an International Court of Justice whose judgements and opinions, while few, are respected. The inadequacies of the judicial system are in some measure supplied by other bodies: international disputes are resolved and law is developed through a network of arbitrations by continuing or ad hoc tribunals. National courts help importantly to determine, clarify, develop international law. Political bodies like the Security Council and the General Assembly of the United Nations also apply law, their actions and resolutions interpret and develop the law, their judgements help to deter violations in some measure. If there is no international executive to enforce international law, the United Nations has some enforcement powers and there is “horizontal enforcement” in the reactions of other nations. The gaps in substantive law are real and many and require continuing effort to fill them, but they do not vitiate the force and effect of the law that exists, in the international society that is.</span></p><p data-dcnode-id="7682"><span data-dcnode-id="7683" instrument_node="">Above all, the lawyer will insist, critics of international law ask and answer the wrong questions. What matters is not whether the international system has legislative, judicial or executive branches, corresponding to those we have become accustomed to seek in a domestic society; what matters is whether international law is reflected in the policies of nations and in relations between nations. The question is not whether there is an effective legislature; it is whether there is law that responds and corresponds to the changing needs of a changing society. The question is not whether there is an effective judiciary, but whether disputes are resolved in an orderly fashion in accordance with international law. Most important, the question is not whether law is enforceable or even effectively enforced; rather, whether law is observed, whether it governs or influences behavior, whether international behavior reflects stability and order. The fact is, lawyers insist, that nations have accepted important limitations on their sovereignty, that they have observed these norms and undertakings, that the result has been substantial order in international relations.</span></p><p data-dcnode-id="7679"><strong data-dcnode-id="7680"><span data-dcnode-id="7681" instrument_node="">Is it Law or Politics?</span></strong></p><p data-dcnode-id="7677"><span data-dcnode-id="7678" instrument_node="">The reasons why nations observe international law, in particular the emphasis I have put on cost and advantage, may only increase skepticism about the reality of the law and its influence in national policy. [...] Nations decide whether to obey law or agreements as they decide questions of national policy not involving legal obligation – whether to recognize a new regime, or to give aid to country X – on the basis of cost and advantage to the national interest. That nations generally decide to act in accordance with law does not change the voluntary character of these decisions. Nations act in conformity with law not from any concern for law but because they consider it in their interest to do so and fear unpleasant consequences if they do not observe it. In fact, law may be largely irrelevant. Nations would probably behave about the same way if there were no law. The victim would respond to actions that adversely affect its interests and the threat of such reaction would be an effective deterrent, even if no law were involved.</span></p><p data-dcnode-id="7675"><span data-dcnode-id="7676" instrument_node="">This skepticism is sometimes supported by contrasting international law with domestic law in a developed, orderly society. Domestic law, it is argued, is binding and domestic society compels compliance with it. No one has a choice whether to obey or violate law, even if one were satisfied that observance was not in one’s interest. In international society, the critics insist, nations decide whether or not they will abide by law. Violations are not punished by representatives of the legal order acting in the name of the society. Any undesirable consequences of violation are political, not legal; they are the actions of other nations vindicating their own interests, akin to extra-legal consequences in domestic society, like “social stigma.” The violator may even be able to prevent or minimize adverse consequences. In any event, he will continue to be a full member of international society, not an outlaw.</span></p><p data-dcnode-id="7673"><span data-dcnode-id="7674" instrument_node="">The arguments I have strung together command consideration. Some of them are mistaken. Others do indeed reflect differences between international and domestic law, the significance of which must be explored.</span></p><p data-dcnode-id="7671"><span data-dcnode-id="7672" instrument_node="">Much of international law resembles the civil law of domestic society (torts, contracts, property); some of it is analogous to “white collar crimes” (violations of antitrust or other regulatory laws, tax evasion) sometimes committed by “respectable” elements. Like such domestic law, international law, too, has authority recognized by all. No nation considers international law as “voluntary.” If the system is ultimately based on consensus, neither the system nor any particular norm or obligation rests on the present agreement of any nation; a nation cannot decide that it will not be subject to international law; it cannot decide that it will not be subject to a particular norm, although it may choose to risk an attempt to have the norm modified; surely, it cannot decide to reject the norm that its international undertakings must be carried out. Like individuals, nations do not claim a right to disregard the law or their obligations, even though – like individuals – they may sometimes exercise the power to do so. International society does not recognize any right to violate the law, although it may not have the power (or desire) to prevent violation from happening, or generally to impose effective communal sanction for the violation after it happens. [...]</span></p><p data-dcnode-id="7669"><span data-dcnode-id="7670" instrument_node="">Much is made of the fact that, in international society, there is no one to compel nations to obey the law. But physical coercion is not the sole or even principal force ensuring compliance with law. Important law is observed by the most powerful, even in domestic societies, although there is no one to compel them. In the United States, the President, Congress, and the mighty armed forces obey orders of a Supreme Court whose single marshal is unarmed.</span></p><p data-dcnode-id="7667"><span data-dcnode-id="7668" instrument_node="">Too much is made of the fact that nations act not out of “respect for law” but from fear of the consequences of breaking it. And too much is made for the fact that the consequences are not “punishment” by “superior,” legally constituted authority, but are the response of the victim and his friends and the unhappy results for friendly relations, prestige, credit, international stability, and other interests which in domestic society would be considered “extra-legal.” The fact is that, in domestic society, individuals observe law principally from fear of consequences, and there are “extra-legal” consequences that are often enough to deter violation, even where official punishment is lacking. (Where law enforcement is deficient, such consequences may be particularly material.) In the mainstreams of domestic society an illegal action tends to bring social opprobrium and other extra-legal “costs” of violation. This merely emphasizes that law often coincides so clearly with the interests of the society that its members react to antisocial behavior in ways additional to those prescribed by law. In international society, law observance must depend more heavily on these extra-legal sanctions, which means that law observance will depend more closely on the law’s current acceptability and on the community’s – especially the victim’s – current interest in vindicating it. It does not mean that law is not law, or that its observance is less law observance.</span></p><p data-dcnode-id="7665"><span data-dcnode-id="7666" instrument_node="">There are several mistakes in the related impression that nations do pursuant to law only what they would do anyhow. In part, the criticism misconceives the purpose of law. Law is generally not designed to keep individuals from doing what they are eager to do. Much of law, and the most successful part, is a codification of existing mores, of how people behave and feel they ought to behave. To that extent law reflects, rather than imposes, existing order. If there were no law against homicide, most individuals in contemporary societies would still refrain from murder. Were that not so, the law could hardly survive and be effective. To say that nations act pursuant to law only as they would act anyhow may indicate not that the law is irrelevant, but rather that it is sound and viable, reflecting the true interests and attitudes of nations, and that it is likely to be maintained. At the same time much law (particularly tort law and “white collar crimes”) is observed because it is law and because its violation would have undesirable consequences. The effective legal system, it should be clear, is not the one which punishes the most violators, but rather that which has few violations to punish because the law deters potential violators. He who does violate is punished principally, to reaffirm the standard of behavior and to deter others. This suggests that the law does not address itself principally to “criminal elements” on the one hand or to “saints” on the other. The “criminal elements” are difficult to deter; the “saint” is not commonly tempted to commit violations, and it is not law or fear of punishment that deters him. The law is aimed principally at the mass in between – at those who, while generally law-abiding, may yet be tempted to some violations by immediate self-interest. In international society, too, law is not effective against the Hitlers, and is not needed for that nation which is content with its lot and has few temptations. International law aims at nations which are in principle law-abiding but which might be tempted to commit a violation if there were no threat of undesirable consequences. In international society, too, the reactions to a violation – as in Korea in 1950 or at Suez in 1956 – reaffirm the law and strengthen its deterrent effect for the future.</span></p><p data-dcnode-id="7663"><span data-dcnode-id="7664" instrument_node="">In many respects, the suggestion that nations would act the same way if there were no law is a superficial impression. The deterrent influence of law is there, though it is not always apparent, even to the actor himself. The criticism overlooks also the educative roles of law, which causes persons and nations to feel that what is unlawful is wrong and should not be done. The government which does not even consider certain actions because they are “not done” or because they are not its “style” may be reflecting attitudes acquired because law has forbidden these actions.</span></p><p data-dcnode-id="7661"><span data-dcnode-id="7662" instrument_node="">In large part, however, the argument that nations do pursuant to law only what they would do anyhow is plain error. The fact that particular behavior is required by law brings into play those ultimate advantages in law observance that suppress temptations and override the apparent immediate advantages from acting otherwise. In many areas, the law at least achieves a common standard or rule and clarity as to what is agreed. The law of the territorial sea established a standard and made it universal. In the absence of law, a foreign vessel would not have thought of observing precisely a twelve-mile territorial sea (assuming that to be the rule), nor would it have respected the territorial sea of weaker nations which had no shore batteries. In regard to treaties, surely, it is not the case that nations act pursuant to agreement as they would have acted if there were none, or if it were not established that agreements shall be observed. Nations do not give tariff concessions, or extradite persons, or give relief from double taxation, except for some quid pro quo pursuant to an agreement which they expect to be kept. Nations may do some things on the basis of tacit understanding or on a conditional, reciprocal basis: If you admit my goods, I will admit yours. But that too is a kind of agreement, and usually nations insist on the confidence and stability that come with an express undertaking. [...]</span></p><p data-dcnode-id="7659"><span data-dcnode-id="7660" instrument_node="">The most common deprecation of international law, finally, insists that no government will observe international law “in the crunch, when it really hurts.” If the implication is that nations observe law only when it does not matter, it is grossly mistaken. Indeed, one might as well urge the very opposite: violations in “small matters” sometimes occur because the actor knows that the victim’s response will be slight; serious violations are avoided because they might bring serious reactions. The most serious violation – the resort to war – generally does not occur, although it is only when their interests are at stake that nations would even be tempted to this violation. On the other hand, if the suggestion is that when it costs too much to observe international law nations will violate it, the charge is no doubt true. But the implications are less devastating than might appear, since a nation’s perception of “when it really hurts” to observe law must take into account its interests in law and in its observance, and the costs of violation. The criticism might as well be levered at domestic law where persons generally law-abiding will violate laws, commit even crimes of violence, when it “really hurts” not to do so. Neither the domestic violations nor the international ones challenge the basic validity of the law or the basic effectiveness of the system.</span></p><p data-dcnode-id="7657"><span data-dcnode-id="7658" instrument_node="">The deficiencies of international law and the respects in which it differs from domestic law do not justify the conclusion that international law is not law, that it is voluntary, that its observance is “only policy.” They may be relevant in judging claims for the law’s success in achieving an orderly society. In many domestic societies, too, the influence of law is not always, everywhere, and in all respects certain and predominant; the special qualities of international society, different perhaps only in degree, may be especially conducive to disorder. Violations of international law, though infrequent, may have significance beyond their numbers: international society is a society of states, and states have power to commit violations that can be seriously disruptive; also, the fact that the units of international society are few may increase the relative significance of each violation. Still, violations of international law are not common enough to destroy the sense of law, of obligation to comply, of the right to ask for compliance and to react to violation. Rarely is even a single norm so widely violated as to lose its quality as law. Agreements are not violated with such frequency that nations cease to enter into them, or to expect performance or redress for violation. Colonialism apart, even political arrangements continue to thrive and to serve their purposes, although they may not run their intended course. Over-all, nations maintain their multivaried relations with rare interruptions. There is, without doubt, order in small, important things.</span></p><p data-dcnode-id="7655"><span data-dcnode-id="7656" instrument_node="">Whether, in the total, there is an effective “international order” is a question of perspective and definition. Order is not measurable, and no purpose is served by attempts to “grade” it in a rough impressionistic way. How much of that order is attributable to law is a question that cannot be answered in theory or in general, only in time and context. Law is one force – an important one among the forces that govern international relations at any time; the deficiencies of international society make law more dependent on other forces to render the advantages of observance high, the costs of violation prohibitive. In our times the influence of law must be seen in the light of the forces that have shaped international relations since the Second World War.</span></p><p data-dcnode-id="7652"><strong data-dcnode-id="7653"><span data-dcnode-id="7654" instrument_node="">The Law’s Supporters and its Critics</span></strong></p><p data-dcnode-id="7650"><span data-dcnode-id="7651" instrument_node="">International law is an assumption, a foundation, a framework of all relations between nations. Concepts of statehood, national territory, nationality of individuals and associations, ownership of property, rights and duties between nations, responsibility for wrong done and damage inflicted, the fact and the terms of international transactions – all reflect legal principles generally accepted and generally observed. The law provides institutions, machinery, and procedures for maintaining relations, for carrying on trade and other intercourse, for resolving disputes, and for promoting common enterprise. All international relations and all foreign policies depend in particular on a legal instrument – the international agreement – and on a legal principle – that agreements must be carried out. Through peace treaties and their political settlements, that principle has also helped to establish and legitimize existing political order as well as its modifications – the identity, territory, security, and independence of states, the creation or termination of dependent relationships. Military alliances and organizations for collective defense also owe their efficacy to the expectation that the undertakings will be carried out. International law supports the numerous contemporary arrangements for cooperation in the promotion of welfare, their institutions and constitutions. Finally, there is the crux of international order in law prohibiting war and other uses of force between nations. The law works. Although there is no one to determine and adjudge the law with authoritative infallibility, there is wide agreement on the content and meaning of law and agreements, even in a world variously divided. Although there is little that is comparable to executive law enforcement in a domestic society, there are effective forces, internal and external, to induce general compliance. Nations recognize that the observance of law is in their interest and that every violation may also bring particular undesirable consequences. It is the unusual case in which policy-makers believe that the advantages of violation outweigh those of law observance, or where domestic pressures compel a government to violation even against the perceived national interest. The important violations are of political law and agreements, where basic interests of national security or independence are involved, engaging passions, prides, and prejudices, and where rational calculation of cost and advantage is less likely to occur and difficult to make. Yet, as we have seen, the most important principle of law today is commonly observed: nations have not been going to war, unilateral uses of force have been only occasional, brief, limited. Even the uncertain law against intervention, seriously breached in several instances, has undoubtedly deterred intervention in many other instances. Where political law has not deterred action it has often postponed or limited action or determined a choice among alternative actions.</span></p><p data-dcnode-id="7648"><span data-dcnode-id="7649" instrument_node="">None of this argument is intended to suggest that attention to law is the paramount or determinant motivation in national behavior, or even that it is always a dominant factor. A norm or obligation brings no guarantee of performance; it does add an important increment of interest in performing the obligation. Because of the requirements of law or of some prior agreement, nations modify their conduct in significant respects and in substantial degrees. It takes an extraordinary and substantially more important interest to persuade a nation to violate its obligations. Foreign policy, we know, is far from free; even the most powerful nations have learned that there are forces within their society and, even more, in the society of nations that limit their freedom of choice. When a contemplated action would violate international law or a treaty, there is additional, substantial limitation on the freedom to act. [...]</span></p><span data-dcnode-id="7647" instrument_node="">[</span><strong data-dcnode-id="7645"><span data-dcnode-id="7646" instrument_node="">Source</span></strong><span data-dcnode-id="7644" instrument_node="">: HENKIN Louis, </span><em data-dcnode-id="7642"><span data-dcnode-id="7643" instrument_node="">How Nations Behave: Law and Foreign Policy</span></em><span data-dcnode-id="7641" instrument_node="">, New-York, Columbia University Press, 2nd&nbsp;ed., 1979, pp. 25-26; 89-90; 92-95, and 320-321; footnotes omitted.]</span></blockquote><blockquote data-dcnode-id="7625"><p data-dcnode-id="7637"><strong data-dcnode-id="7638"><span data-dcnode-id="7639" instrument_node="">Quotation 3</span></strong></p><span data-dcnode-id="7636" instrument_node="">&nbsp;[A] third idea of rules or norms may be emphasized: that of prescriptive statements which exert, in varying amounts, a psychological “pressure” upon national decision-makers to comply with their substantive content. For example, the norms relating to “freedom of the seas” probably exert an effective pressure against all nation-state officials not to attempt to expropriate to their own use the Atlantic Ocean, and not to interfere with numerous foreign shipping or fishing activities on the high seas. The idea of a rule of law as an indicator of a psychological pressure upon the person to whom it is addressed might be illustrated by a hypothetical example of one of the simplest of all possible rules of law – a “stop” sign on a street or highway. Imagine that one of these traffic signs exists in a community where every driver habitually does not bring his motor vehicle to a full “stop” at the particular sign, but rather shifts into low gear or otherwise slows down his motor vehicle when approaching the sign and then passes it. Has the traffic ordinance represented by the sign been violated? Yes, from a technical, as well as a legal, point of view. A policeman could, if he so desired, arrest any or all of the drivers in that community for failing to observe the “stop” sign. But does the violation of the “stop” sign mean that the sign is of no value in that particular community? Here the answer would have to be in the negative, for the sign functions as a kind of “pressure” upon drivers to slow down. If its purpose was to help to prevent traffic accidents, it may have succeeded admirably by getting motor vehicles to slow down and proceed with caution. [...] [O]ne might very well interpret many international rules relating to rights of neutrals, prisoners of war, and so forth, as “pressures” that have some influence in shaping the conduct of war, no matter how many outright violations of those rules occur. [...]</span><br data-dcnode-id="7635"><span data-dcnode-id="7634" instrument_node=""> </span><br data-dcnode-id="7633"><span data-dcnode-id="7632" instrument_node=""> [</span><strong data-dcnode-id="7630"><span data-dcnode-id="7631" instrument_node="">Source</span></strong><span data-dcnode-id="7629" instrument_node="">: D’AMATO Anthony, </span><em data-dcnode-id="7627"><span data-dcnode-id="7628" instrument_node="">The Concept of Custom in International Law</span></em><span data-dcnode-id="7626" instrument_node="">, Ithaca, Cornell University Press, 1971, pp. 31-32]</span></blockquote><h4 data-dcnode-id="7622"><a class="nohref" data-dcnode-id="7624" id="b_i_2" name="b_i_2"></a><span data-dcnode-id="7623" instrument_node="">&nbsp;2. &nbsp; International Humanitarian Law: the crucial test of international law</span></h4><h4 data-dcnode-id="7619"><a class="nohref" data-dcnode-id="7621" id="b_i_3" name="b_i_3"></a><span data-dcnode-id="7620" instrument_node="">&nbsp;3. &nbsp; International Humanitarian Law in an evolving international environ data-dcnode-id="7146" instrument_node="">, 2009, 407 pp.</span></li><li data-dcnode-id="7140"><span data-dcnode-id="7144" instrument_node="">SCHRÖFL Josef, COX Sean Michael &amp; PANKRATZ Thomas (eds), </span><em data-dcnode-id="7142"><span data-dcnode-id="7143" instrument_node="">Winning the Asymmetric War: Political, Social and Military Responses</span></em><span data-dcnode-id="7141" instrument_node="">, Frankfurt am Main, P. Lang, 2009, 366 pp.</span></li><li data-dcnode-id="7135"><span data-dcnode-id="7139" instrument_node="">VAN BAARDA Ted, VERWEIJ Désiree, </span><em data-dcnode-id="7137"><span data-dcnode-id="7138" instrument_node="">The Moral Dimension of Asymmetrical Warfare: Counter-Terrorism, Democratic Values and Military Ethics</span></em><span data-dcnode-id="7136" instrument_node="">, Leiden, Boston, M. Nijhoff, 2009, 529 pp.</span></li></ul></div><span data-dcnode-id="7132" id="toc--ii-fundamental-distinction-between-jus-ad-bellum-on-the-legality-of-the-use-of-force-and-jus-in-bello-on-the-humanitarian-rules-to-be-respected-in-warfare-"></span><h3 data-dcnode-id="7123"><a class="nohref" data-dcnode-id="7131" id="b_ii" name="b_ii"></a><span data-dcnode-id="7130" instrument_node="">&nbsp;II. Fundamental distinction between </span><em data-dcnode-id="7128"><span data-dcnode-id="7129" instrument_node="">jus ad bellum</span></em><span data-dcnode-id="7127" instrument_node=""> (on the legality of the use of force) and </span><em data-dcnode-id="7125"><span data-dcnode-id="7126" instrument_node="">jus in bello</span></em><span data-dcnode-id="7124" instrument_node=""> (on the humanitarian rules to be respected in warfare)</span></h3><p data-dcnode-id="7120"><strong data-dcnode-id="7121"><span data-dcnode-id="7122" instrument_node="">Introductory text</span></strong></p><p data-dcnode-id="7092"><abbr data-dcnode-id="7118" title="International Humanitarian Law "><span data-dcnode-id="7119" instrument_node="">IHL</span></abbr><span data-dcnode-id="7117" instrument_node=""> developed at a time when the use of force was a lawful form of international relations, when States were not prohibited from waging war, when they had the right to make war (i.e., when they had </span><em data-dcnode-id="7115"><span data-dcnode-id="7116" instrument_node="">jus ad bellum</span></em><span data-dcnode-id="7114" instrument_node="">). It did not appear illogical for international law to oblige them to respect certain rules of behaviour in war (</span><em data-dcnode-id="7112"><span data-dcnode-id="7113" instrument_node="">jus in bello</span></em><span data-dcnode-id="7111" instrument_node="">) if they resorted to hostilities. Today, the use of force between States is prohibited by a peremptory rule of international law[</span><a data-dcnode-id="7109" href="#_ftn_012" id="_ftnref_012" name="_ftnref_012" title=""><span data-dcnode-id="7110" instrument_node="">12</span></a><span data-dcnode-id="7108" instrument_node="">] (</span><em data-dcnode-id="7106"><span data-dcnode-id="7107" instrument_node="">jus ad bellum</span></em><span data-dcnode-id="7105" instrument_node=""> has changed into </span><em data-dcnode-id="7103"><span data-dcnode-id="7104" instrument_node="">jus contra bellum</span></em><span data-dcnode-id="7102" instrument_node="">). Exceptions are admitted in the case of individual and collective self-defence,[</span><a data-dcnode-id="7100" href="#_ftn_013" id="_ftnref_013" name="_ftnref_013" title=""><span data-dcnode-id="7101" instrument_node="">13</span></a><span data-dcnode-id="7099" instrument_node="">] based upon Security Council resolutions[</span><a data-dcnode-id="7097" href="#_ftn_014" id="_ftnref_014" name="_ftnref_014" title=""><span data-dcnode-id="7098" instrument_node="">14</span></a><span data-dcnode-id="7096" instrument_node="">] and, arguably, the right of peoples to self-determination[</span><a data-dcnode-id="7094" href="#_ftn_015" id="_ftnref_015" name="_ftnref_015" title=""><span data-dcnode-id="7095" instrument_node="">15</span></a><span data-dcnode-id="7093" instrument_node="">] (national liberation wars).</span></p><p data-dcnode-id="7087"><span data-dcnode-id="7091" instrument_node="">Logically, at least one side of an international armed conflict is therefore violating international law by the sole fact of using force, however respectful it is of </span><abbr data-dcnode-id="7089" title="International Humanitarian Law "><span data-dcnode-id="7090" instrument_node="">IHL</span></abbr><span data-dcnode-id="7088" instrument_node="">. By the same token, all municipal laws anywhere in the world prohibit the use of force against (governmental) law enforcement agencies.</span></p><p data-dcnode-id="7070"><span data-dcnode-id="7086" instrument_node="">Although armed conflicts are prohibited, they happen, and it is today recognized that international law has to address this reality of international life not only by combating the phenomenon, but also by regulating it to ensure a minimum of humanity in this inhumane and illegal situation. For practical, policy and humanitarian reasons, however, </span><abbr data-dcnode-id="7084" title="International Humanitarian Law "><span data-dcnode-id="7085" instrument_node="">IHL</span></abbr><span data-dcnode-id="7083" instrument_node=""> has to be the same for both belligerents: the one resorting lawfully to force and the one resorting unlawfully to force. From a practical point of view, respect for </span><abbr data-dcnode-id="7081" title="International Humanitarian Law "><span data-dcnode-id="7082" instrument_node="">IHL</span></abbr><span data-dcnode-id="7080" instrument_node=""> could otherwise not be obtained, as, at least between the belligerents, which party is resorting to force in conformity with </span><em data-dcnode-id="7078"><span data-dcnode-id="7079" instrument_node="">jus ad bellum</span></em><span data-dcnode-id="7077" instrument_node=""> and which is violating </span><em data-dcnode-id="7075"><span data-dcnode-id="7076" instrument_node="">jus contra bellum</span></em><span data-dcnode-id="7074" instrument_node=""> is always a matter of controversy. In addition, from the humanitarian point of view, the victims of the conflict on both sides need and deserve the same protection, and they are not necessarily responsible for the violation of </span><em data-dcnode-id="7072"><span data-dcnode-id="7073" instrument_node="">jus ad bellum</span></em><span data-dcnode-id="7071" instrument_node=""> committed by “their” party.</span></p><p data-dcnode-id="7057"><abbr data-dcnode-id="7068" title="International Humanitarian Law "><span data-dcnode-id="7069" instrument_node="">IHL</span></abbr><span data-dcnode-id="7067" instrument_node=""> must therefore be respected independently of any argument of, and be completely distinguished from, </span><em data-dcnode-id="7065"><span data-dcnode-id="7066" instrument_node="">jus ad bellum</span></em><span data-dcnode-id="7064" instrument_node="">. Any past, present and future theory of just war only concerns </span><em data-dcnode-id="7062"><span data-dcnode-id="7063" instrument_node="">jus ad bellum</span></em><span data-dcnode-id="7061" instrument_node=""> and cannot justify (but is in fact frequently used to imply) that those fighting a just war have more rights or fewer obligations under </span><abbr data-dcnode-id="7059" title="International Humanitarian Law "><span data-dcnode-id="7060" instrument_node="">IHL</span></abbr><span data-dcnode-id="7058" instrument_node=""> than those fighting an unjust war.</span></p><p data-dcnode-id="7043"><span data-dcnode-id="7056" instrument_node="">The two Latin terms were coined only in the last century, but Emmanuel Kant already distinguished the two ideas. Earlier, when the doctrine of just war prevailed, Grotius’ </span><em data-dcnode-id="7054"><span data-dcnode-id="7055" instrument_node="">temperamenta belli</span></em><span data-dcnode-id="7053" instrument_node=""> (restraints to the waging of war) only addressed those fighting a just war. Later, when war became a simple fact of international relations, there was no need to distinguish between </span><em data-dcnode-id="7051"><span data-dcnode-id="7052" instrument_node="">jus ad bellum</span></em><span data-dcnode-id="7050" instrument_node=""> and </span><em data-dcnode-id="7048"><span data-dcnode-id="7049" instrument_node="">jus in bello</span></em><span data-dcnode-id="7047" instrument_node="">. It is only with the prohibition of the use of force that the separation between the two became essential. It has since been recognized in the preamble to </span><abbr data-dcnode-id="7045" title="Protocol Additional to the Geneva Conventions of 12 August 1949, and Relating to the Protection of Victims of International Armed Conflicts, of 8 June 1977"><span data-dcnode-id="7046" instrument_node="">Protocol I</span></abbr><span data-dcnode-id="7044" instrument_node="">:</span></p><div data-dcnode-id="7030"><p data-dcnode-id="7041"><span data-dcnode-id="7042" instrument_node="">“The High Contracting Parties,</span></p><p data-dcnode-id="7039"><span data-dcnode-id="7040" instrument_node="">Proclaiming their earnest wish to see peace prevail among peoples,</span></p><p data-dcnode-id="7037"><span data-dcnode-id="7038" instrument_node="">Recalling that every State has the duty, in conformity with the Charter of the United Nations, to refrain in its international relations from the threat or use of force against the sovereignty, territorial integrity or political independence of any State, or in any other manner inconsistent with the purposes of the United Nations,</span></p><p data-dcnode-id="7035"><span data-dcnode-id="7036" instrument_node="">Believing it necessary nevertheless to reaffirm and develop the provisions protecting the victims of armed conflicts and to supplement measures intended to reinforce their application,</span></p><p data-dcnode-id="7033"><span data-dcnode-id="7034" instrument_node="">Expressing their conviction that nothing in this Protocol or in the Geneva Conventions of 12 August 1949 can be construed as legitimizing or authorizing any act of aggression or any other use of force inconsistent with the Charter of the United Nations,</span></p><p data-dcnode-id="7031"><span data-dcnode-id="7032" instrument_node="">Reaffirming further that the provisions of the Geneva Conventions of 12 August 1949 and of this Protocol must be fully applied in all circumstances to all persons who are protected by those instruments, without any adverse distinction based on the nature or origin of the armed conflict or on the causes espoused by or attributed to the Parties to the conflict. [...]”</span></p></div><p data-dcnode-id="7007"><span data-dcnode-id="7029" instrument_node="">This complete separation between </span><em data-dcnode-id="7027"><span data-dcnode-id="7028" instrument_node="">jus ad bellum</span></em><span data-dcnode-id="7026" instrument_node=""> and </span><em data-dcnode-id="7024"><span data-dcnode-id="7025" instrument_node="">jus in bello</span></em><span data-dcnode-id="7023" instrument_node=""> implies that </span><abbr data-dcnode-id="7021" title="International Humanitarian Law "><span data-dcnode-id="7022" instrument_node="">IHL</span></abbr><span data-dcnode-id="7020" instrument_node=""> applies whenever there is de facto an armed conflict, no matter how that conflict is qualified under </span><em data-dcnode-id="7018"><span data-dcnode-id="7019" instrument_node="">jus ad bellum</span></em><span data-dcnode-id="7017" instrument_node="">, and that no </span><em data-dcnode-id="7015"><span data-dcnode-id="7016" instrument_node="">jus ad bellum</span></em><span data-dcnode-id="7014" instrument_node=""> arguments may be used to interpret it; it also implies, however, that the rules of </span><abbr data-dcnode-id="7012" title="International Humanitarian Law "><span data-dcnode-id="7013" instrument_node="">IHL</span></abbr><span data-dcnode-id="7011" instrument_node=""> are not to be drafted so as to render </span><em data-dcnode-id="7009"><span data-dcnode-id="7010" instrument_node="">jus ad bellum</span></em><span data-dcnode-id="7008" instrument_node=""> impossible to implement, e.g., render efficient self-defence impossible.</span></p><p data-dcnode-id="6996"><span data-dcnode-id="7006" instrument_node="">Some consider that the growing institutionalization of international relations through the United Nations, concentrating the legal monopoly of the use of force in its hands or a hegemonic international order, will return </span><abbr data-dcnode-id="7004" title="International Humanitarian Law "><span data-dcnode-id="7005" instrument_node="">IHL</span></abbr><span data-dcnode-id="7003" instrument_node=""> to a state of </span><em data-dcnode-id="7001"><span data-dcnode-id="7002" instrument_node="">temperamenta belli</span></em><span data-dcnode-id="7000" instrument_node=""> addressing those who fight for international legality. This would fundamentally modify the philosophy of existing </span><abbr data-dcnode-id="6998" title="International Humanitarian Law "><span data-dcnode-id="6999" instrument_node="">IHL</span></abbr><span data-dcnode-id="6997" instrument_node="">.</span></p><h4 class="casesdocheader" data-dcnode-id="6994"><span data-dcnode-id="6995" instrument_node="">CASES AND DOCUMENTS</span></h4><div class="beigebox" data-dcnode-id="6989"><ul data-dcnode-id="6990"><li data-dcnode-id="6991"><a data-dcnode-id="6992" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//casebook.icrc.org/case-study/us-lethal-operations-against-al-qaida-leaders" title=""><span data-dcnode-id="6993" instrument_node="">U.S., Lethal Operations against Al-Qa’ida Leaders</span></a></li></ul></div><h4 aria-controls="readingsbody9" aria-expanded="false" class="readingsheader" data-dcnode-id="6987" data-toggle="collapse" href="#readingsbody9"><span data-dcnode-id="6988" instrument_node="">Specific bibliography</span></h4><div class="bluebox collapse" data-dcnode-id="6790" id="readingsbody9"><p data-dcnode-id="6984"><strong data-dcnode-id="6985"><span data-dcnode-id="6986" instrument_node="">Suggested reading:</span></strong></p><ul data-dcnode-id="6922"><li data-dcnode-id="6979"><span data-dcnode-id="6983" instrument_node="">BOUVIER Antoine, “Assessing the Relationship Between Ius in Bello and Ius ad Bellum: An “Orthodox” View”, in </span><em data-dcnode-id="6981"><span data-dcnode-id="6982" instrument_node="">Proceedings of the 100th Annual Meeting</span></em><span data-dcnode-id="6980" instrument_node="">, American Society of International Law, 2006, pp. 109-112</span></li><li data-dcnode-id="6973"><span data-dcnode-id="6978" instrument_node="">BUGNION François, “Just War, War of Aggression and International Humanitarian Law”, in </span><em data-dcnode-id="6975"><abbr data-dcnode-id="6976" title="International Review of the Red Cross "><span data-dcnode-id="6977" instrument_node="">IRRC</span></abbr></em><span data-dcnode-id="6974" instrument_node="">, No. 847, September 2002, pp. 523-546.</span></li><li data-dcnode-id="6964"><span data-dcnode-id="6972" instrument_node="">BUGNION François, “Jus ad Bellum, </span><em data-dcnode-id="6970"><span data-dcnode-id="6971" instrument_node="">Jus in Bello</span></em><span data-dcnode-id="6969" instrument_node=""> and Non-International Armed Conflicts”, </span><em data-dcnode-id="6966"><abbr data-dcnode-id="6967" title="Yearbook of International Humanitarian Law"><span data-dcnode-id="6968" instrument_node="">YIHL</span></abbr></em><span data-dcnode-id="6965" instrument_node="">, Vol. 6 (2003), 2007, pp. 167-198.</span></li><li data-dcnode-id="6959"><span data-dcnode-id="6963" instrument_node="">GREENWOOD Christopher, “The Relationship Between Ius ad bellum and Ius in bello”, in </span><em data-dcnode-id="6961"><span data-dcnode-id="6962" instrument_node="">Review of International Studies</span></em><span data-dcnode-id="6960" instrument_node="">, Vol. 9, 1983, pp. 221-234.</span></li><li data-dcnode-id="6953"><span data-dcnode-id="6958" instrument_node="">KOLB Robert, “Origin of the Twin Terms Ius ad bellum – Ius in bello”, in </span><em data-dcnode-id="6955"><abbr data-dcnode-id="6956" title="International Review of the Red Cross "><span data-dcnode-id="6957" instrument_node="">IRRC</span></abbr></em><span data-dcnode-id="6954" instrument_node="">, No.&nbsp;320, October 1997, pp. 553-562.</span></li><li data-dcnode-id="6948"><span data-dcnode-id="6952" instrument_node="">KOOIJMANS Peter, “Is there a Change in the Ius ad bellum and, if so, What Does it Mean for the Ius in bello ?”, in LIJNZAAD Liesbeth, VAN SAMBEEK Johanna &amp; TAHZIB-LIE Bahia (eds), </span><em data-dcnode-id="6950"><span data-dcnode-id="6951" instrument_node="">Making the Voice of Humanity Heard</span></em><span data-dcnode-id="6949" instrument_node="">, Leiden/Boston, M. Nijhoff, 2004, pp. 225-237.</span></li><li data-dcnode-id="6943"><span data-dcnode-id="6947" instrument_node="">MEYROWITZ Henri, </span><em data-dcnode-id="6945"><span data-dcnode-id="6946" instrument_node="">Le principe de l’égalité des belligérants devant le droit de la guerre</span></em><span data-dcnode-id="6944" instrument_node="">, Paris, Pedone, 1970, 418&nbsp;pp.</span></li><li data-dcnode-id="6934"><span data-dcnode-id="6942" instrument_node="">MOUSSA Jasmine, “Can Jus ad Bellum Override </span><em data-dcnode-id="6940"><span data-dcnode-id="6941" instrument_node="">Jus in Bello</span></em><span data-dcnode-id="6939" instrument_node=""> ?: Reaffirming the Separation of the Two Bodies of Law”, in </span><em data-dcnode-id="6936"><abbr data-dcnode-id="6937" title="International Review of the Red Cross "><span data-dcnode-id="6938" instrument_node="">IRRC</span></abbr></em><span data-dcnode-id="6935" instrument_node="">, Vol. 90, No. 872, December 2008, pp. 963-990.</span></li><li data-dcnode-id="6928"><span data-dcnode-id="6933" instrument_node="">ROBERTS Adam, “The Equal Application of the Laws of War: a Principle under Pressure”, in </span><em data-dcnode-id="6930"><abbr data-dcnode-id="6931" title="International Review of the Red Cross "><span data-dcnode-id="6932" instrument_node="">IRRC</span></abbr></em><span data-dcnode-id="6929" instrument_node="">, Vol. 90, No. 872, December 2008, pp.&nbsp;931-962.&nbsp;</span></li><li data-dcnode-id="6923"><span data-dcnode-id="6927" instrument_node="">SASSÒLI Marco, “Ius ad bellum and Ius in Bello – The Separation between the Legality of the Use of Force and Humanitarian Rules to be Respected in Warfare: Crucial or Outdated?”, in SCHMITT Michael &amp; PEJIC Jelena (eds), </span><em data-dcnode-id="6925"><span data-dcnode-id="6926" instrument_node="">International Law and Armed Conflict: Exploring the Faultlines, Essays in Honour of Yoram Dinstein</span></em><span data-dcnode-id="6924" instrument_node="">, M. Nijhoff, Leiden/Boston, 2007, pp. 242-264.</span></li></ul><p data-dcnode-id="6919"><strong data-dcnode-id="6920"><span data-dcnode-id="6921" instrument_node="">Further reading:</span></strong></p><ul data-dcnode-id="6791"><li data-dcnode-id="6914"><span data-dcnode-id="6918" instrument_node="">BELLAMY Alex J., </span><em data-dcnode-id="6916"><span data-dcnode-id="6917" instrument_node="">Just Wars: from Cicero to Iraq</span></em><span data-dcnode-id="6915" instrument_node="">, Cambridge, Malden, Polity, 2006, 280&nbsp;pp.</span></li><li data-dcnode-id="6903"><span data-dcnode-id="6913" instrument_node="">BOTTOMS Jennifer, “When Close Doesn’t Count: an Analysis of Israel’s </span><em data-dcnode-id="6911"><span data-dcnode-id="6912" instrument_node="">Jus ad Bellum</span></em><span data-dcnode-id="6910" instrument_node=""> and </span><em data-dcnode-id="6908"><span data-dcnode-id="6909" instrument_node="">Jus in Bello</span></em><span data-dcnode-id="6907" instrument_node=""> in the 2006 Israel-Lebanon War”, in </span><em data-dcnode-id="6905"><span data-dcnode-id="6
