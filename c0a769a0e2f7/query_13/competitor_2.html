</span><div data-dcnode-id="1632" id="head"><span data-dcnode-id="1638" instrument_node="">
</span><h2 data-dcnode-id="1634" id="top"><a data-dcnode-id="1635" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.godandscience.org/"><span data-dcnode-id="1636"><span data-dcnode-id="1637" instrument_node="">Evidence for God from Science: Christian Apologetics</span></span></a></h2><span data-dcnode-id="1633" instrument_node="">

</span><div data-dcnode-id="742" id="content"><span data-dcnode-id="1630" instrument_node="">
</span><div data-dcnode-id="744" id="contentcontent"><span data-dcnode-id="1629" instrument_node="">
</span><h1 data-dcnode-id="1618"><span data-dcnode-id="1628" instrument_node="">Thou Shall Not Kill: Does God Violate His Own Commandment?</span><br data-dcnode-id="1627"><span data-dcnode-id="1626" instrument_node="">
</span><span class="author" data-dcnode-id="1622"><span data-dcnode-id="1625" instrument_node="">by </span><a data-dcnode-id="1623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.godandscience.org/contact.html"><span data-dcnode-id="1624" instrument_node="">Rich Deem</span></a></span><a data-dcnode-id="1619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//plus.google.com/105440427757499026037/posts%3Fhl%3Den" rel="author"><span data-dcnode-id="1621" instrument_node="">
</span><img data-dcnode-id="1620" height="16" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ssl.gstatic.com/images/icons/gplus-16.png&amp;raw" width="16"></a></h1><span data-dcnode-id="1617" instrument_node="">
</span><h3 class="intro" data-dcnode-id="1614" id="intro"><span data-dcnode-id="1615"><span data-dcnode-id="1616" instrument_node="">Introduction</span></span></h3><span data-dcnode-id="1613" instrument_node="">
</span><p data-dcnode-id="1607"><span data-dcnode-id="1612" instrument_node="">The sixth commandment is "Thou shalt not kill."</span><sup data-dcnode-id="1609"><a data-dcnode-id="1610" href="#n01"><span data-dcnode-id="1611" instrument_node="">1</span></a></sup><span data-dcnode-id="1608" instrument_node=""> Atheists claim that God 
violated His own commandment in ordering the destruction of entire cities, just
to allow the Jews to have a homeland in the Middle East. The Bible confirms that 
God ordered the killing of thousands of people. Isn't this an open and shut case 
for the hypocrisy of the God of the Bible?</span></p><span data-dcnode-id="1606" instrument_node="">
</span><h3 data-dcnode-id="1604" id="same"><span data-dcnode-id="1605" instrument_node="">Is all killing the same?</span></h3><span data-dcnode-id="1603" instrument_node="">
</span><p data-dcnode-id="1601"><span data-dcnode-id="1602" instrument_node="">One thing you have to love about atheists is their extreme appreciation 
	for the King James Version (KJV) translation. The KJV was translated in the 
	early 17th century using an archaic form of modern English. In the last 400 years, 
	the English language has 
	changed significantly. Unfortunately, the vast majority of those who read the 
	KJV (both believers and unbelievers) are unqualified to know what the text means 
	in many instances because of word meaning changes. In attempting to 
	demonstrate the contradiction of God's commands to Israel and the sixth 
	commandment, atheist cite the KJV translation, "Thou shalt not kill."</span></p><span data-dcnode-id="1600" instrument_node="">
</span><p data-dcnode-id="1548"><span data-dcnode-id="1599" instrument_node="">However, like English, Hebrew, the language in which most of the Old
    Testament was written, uses different words for intentional </span><i data-dcnode-id="1597"><span data-dcnode-id="1598" instrument_node="">vs.</span></i><span data-dcnode-id="1596" instrument_node="">
    unintentional killing. The verse translated "Thou shalt not kill"
    in the KJV translation, is translated "You shall not murder"</span><sup data-dcnode-id="1593"><a data-dcnode-id="1594" href="#n02"><span data-dcnode-id="1595" instrument_node="">2</span></a></sup><span data-dcnode-id="1592" instrument_node=""> in
    modern translations - because these translations represents the real meaning
    of the Hebrew text. The Bible in Basic English translates the phrase,
    "Do not put anyone to death without cause."</span><sup data-dcnode-id="1589"><a data-dcnode-id="1590" href="#n02"><span data-dcnode-id="1591" instrument_node="">2</span></a></sup><span data-dcnode-id="1588" instrument_node=""> The Hebrew word used
    here is </span><i data-dcnode-id="1586"><span data-dcnode-id="1587" instrument_node="">ratsach</span></i><span data-dcnode-id="1585" instrument_node="">,</span><sup data-dcnode-id="1582"><a data-dcnode-id="1583" href="#n03"><span data-dcnode-id="1584" instrument_node="">3</span></a></sup><span data-dcnode-id="1581" instrument_node=""> which nearly always
    refers to intentional killing without cause (unless indicated otherwise by
    context). Hebrew law recognized accidental killing as not punishable. In fact, specific
    cities were designated as "cities of refuge," so that an
    unintentional killer could flee to escape retribution.</span><sup data-dcnode-id="1578"><a data-dcnode-id="1579" href="#n04"><span data-dcnode-id="1580" instrument_node="">4</span></a></sup><span data-dcnode-id="1577" instrument_node="">&nbsp;The
    Hebrew word for "kill" in this instance is not </span><i data-dcnode-id="1575"><span data-dcnode-id="1576" instrument_node="">ratsach</span></i><span data-dcnode-id="1574" instrument_node="">, but </span><i data-dcnode-id="1572"><span data-dcnode-id="1573" instrument_node="">nakah</span></i><span data-dcnode-id="1571" instrument_node="">,
    which can refer to either premeditated or unintentional killing, depending
    upon context.</span><sup data-dcnode-id="1568"><a data-dcnode-id="1569" href="#n05"><span data-dcnode-id="1570" instrument_node="">5</span></a></sup><span data-dcnode-id="1567" instrument_node="">
    Other Hebrew words also can refer to killing.</span><sup data-dcnode-id="1561"><a data-dcnode-id="1565" href="#n06"><span data-dcnode-id="1566" instrument_node="">6</span></a><span data-dcnode-id="1564" instrument_node="">-</span><a data-dcnode-id="1562" href="#n08"><span data-dcnode-id="1563" instrument_node="">8</span></a></sup><span data-dcnode-id="1560" instrument_node="">&nbsp;The
    punishment for murder was the death sentence.</span><sup data-dcnode-id="1557"><a data-dcnode-id="1558" href="#n09"><span data-dcnode-id="1559" instrument_node="">9</span></a></sup><span data-dcnode-id="1556" instrument_node="">
    However, to be convicted, there needed to be at least two
    eyewitnesses.</span><sup data-dcnode-id="1553"><a data-dcnode-id="1554" href="#n10"><span data-dcnode-id="1555" instrument_node="">10</span></a></sup><span data-dcnode-id="1552" instrument_node=""> The Bible also prescribes that 
	people have a right to defend themselves against attack and use deadly force 
	if necessary.</span><sup data-dcnode-id="1549"><a data-dcnode-id="1550" href="#n11"><span data-dcnode-id="1551" instrument_node="">11</span></a></sup></p><span data-dcnode-id="1547" instrument_node="">
</span><h3 data-dcnode-id="1545" id="justified"><span data-dcnode-id="1546" instrument_node="">Is God's killing justified? </span></h3><span data-dcnode-id="1544" instrument_node="">
</span><p data-dcnode-id="1542"><span data-dcnode-id="1543" instrument_node="">To answer the question whether God breaks His own commandments, we need to
  determine if God committed murder (i.e., killed people without cause). The
  Bible is quite clear that God has killed people directly (the most prominent
  example being the flood) and indirectly (ordered peoples to be killed).&nbsp;If
God ordered or participated in the killing of innocent people, then He would be
guilty of murder. Let's look at two of the most prominent examples.</span></p><span data-dcnode-id="1541" instrument_node="">
</span><h3 data-dcnode-id="1539" id="flood"><span data-dcnode-id="1540" instrument_node="">The flood</span></h3><span data-dcnode-id="1538" instrument_node="">
</span><p data-dcnode-id="1519"><span data-dcnode-id="1537" instrument_node="">According to the Bible, God killed every human except Noah, his wife, his
sons, and their wives in the flood. Were any of these people killed unjustly? The Bible says
specifically that </span><i data-dcnode-id="1535"><span data-dcnode-id="1536" instrument_node=""> all</span></i><span data-dcnode-id="1534" instrument_node=""> people (except Noah and his family) had become corrupted.</span><sup data-dcnode-id="1531"><a data-dcnode-id="1532" href="#n12"><span data-dcnode-id="1533" instrument_node="">12</span></a></sup><span data-dcnode-id="1530" instrument_node="">&nbsp;Not
only had all people become corrupted, but they were </span><i data-dcnode-id="1528"><span data-dcnode-id="1529" instrument_node="">continually</span></i><span data-dcnode-id="1527" instrument_node=""> plotting
evil!</span><sup data-dcnode-id="1524"><a data-dcnode-id="1525" href="#n13"><span data-dcnode-id="1526" instrument_node="">13</span></a></sup><span data-dcnode-id="1523" instrument_node=""> Is it possible that an entire culture can
become corrupted? You bet! Recent history proves the point rather well. When the
Nazis took over Germany before WWII, opposition was crushed and removed. When
they began their purging of the undesirables (e.g., the Jews), virtually the
entire society went along with the plan. Further examples are given on </span><a data-dcnode-id="1521" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.godandscience.org/apologetics/peoplegood.html"><span data-dcnode-id="1522" instrument_node="">another
page</span></a><span data-dcnode-id="1520" instrument_node="">. So, the Bible indicates that no innocent people were killed in the
flood.</span></p><span data-dcnode-id="1518" instrument_node="">
</span><h3 data-dcnode-id="1516" id="orders"><span data-dcnode-id="1517" instrument_node="">God orders killing</span></h3><span data-dcnode-id="1515" instrument_node="">
</span><p data-dcnode-id="1497"><span data-dcnode-id="1514" instrument_node="">What about when God ordered Joshua and his people to kill every man, woman
and child in Canaan?</span><sup data-dcnode-id="1511"><a data-dcnode-id="1512" href="#n14"><span data-dcnode-id="1513" instrument_node="">14</span></a></sup><span data-dcnode-id="1510" instrument_node=""> What crime could be so great
that entire populations of cities were designated for destruction? God told
Moses that the nations that the Hebrew were replacing were wicked.</span><sup data-dcnode-id="1507"><a data-dcnode-id="1508" href="#n15"><span data-dcnode-id="1509" instrument_node="">15</span></a></sup><span data-dcnode-id="1506" instrument_node="">
How "wicked" were these people? The text tells us that they were
burning their own sons and daughters in sacrifices to their gods.</span><sup data-dcnode-id="1503"><a data-dcnode-id="1504" href="#n16"><span data-dcnode-id="1505" instrument_node="">16</span></a></sup><span data-dcnode-id="1502" instrument_node="">
So we see that these&nbsp;people were not really innocent. For these reasons (and
others</span><a data-dcnode-id="1499" href="#n17"><sup data-dcnode-id="1500"><span data-dcnode-id="1501" instrument_node="">17</span></sup></a><span data-dcnode-id="1498" instrument_node="">), God ordered the destruction of the
peoples whom the Israelites dispossessed.</span></p><span data-dcnode-id="1496" instrument_node="">
</span><h3 data-dcnode-id="1494" id="children"><span data-dcnode-id="1495" instrument_node="">What about the children and other "innocents"</span></h3><span data-dcnode-id="1493" instrument_node="">
</span><p data-dcnode-id="1480"><span data-dcnode-id="1492" instrument_node="">Surely God could have spared the children! People tend to assume that
children are innocent, even if their parents are doing bad things. The
assumption is unfounded. For example, Palestinian Muslim children are officially
taught in grammar school to hate their Jewish neighbors.</span><sup data-dcnode-id="1489"><a data-dcnode-id="1490" href="#n18"><span data-dcnode-id="1491" instrument_node="">18</span></a></sup><span data-dcnode-id="1488" instrument_node=""> They are so well indoctrinated that
some of them give up their lives in suicide bombings </span><i data-dcnode-id="1486"><span data-dcnode-id="1487" instrument_node="">as children</span></i><span data-dcnode-id="1485" instrument_node="">.</span><sup data-dcnode-id="1482"><a data-dcnode-id="1483" href="#n19"><span data-dcnode-id="1484" instrument_node="">19</span></a></sup><span data-dcnode-id="1481" instrument_node=""> 
Corruption literally does breed corruption, which is why God did not want the
Hebrews tainted by the other corrupt cultures of the Middle East.</span></p><span data-dcnode-id="1479" instrument_node="">
</span><p data-dcnode-id="1458"><span data-dcnode-id="1478" instrument_node="">Surely there must have been other innocent adults in those cities who were destroyed with
the wicked! There actually is an example of a time when God was asked if He
would destroy the innocent along with the wicked. Prior to destroying Sodom and
Gomorrah, Abraham asked God if He would destroy the righteous along with the
wicked.</span><a data-dcnode-id="1475" href="#n20"><sup data-dcnode-id="1476"><span data-dcnode-id="1477" instrument_node="">20</span></sup></a><span data-dcnode-id="1474" instrument_node=""> God replied that He would spare the
entire city for 50 righteous people.</span><a data-dcnode-id="1471" href="#n21"><sup data-dcnode-id="1472"><span data-dcnode-id="1473" instrument_node="">21</span></sup></a><span data-dcnode-id="1470" instrument_node=""> Abraham kept
reducing the possible number of righteous people, asking God if He would destroy
the entire city along with those number of righteous people.</span><a data-dcnode-id="1467" href="#n22"><sup data-dcnode-id="1468"><span data-dcnode-id="1469" instrument_node="">22</span></sup></a><span data-dcnode-id="1466" instrument_node="">
God's reply in each case was that He would not destroy the righteous along with
the wicked. The lowest number Abraham asked about was ten righteous people,
although the answer would likely be the same with as few as one righteous
individual. How do we know this? God sent two angels to warn the four righteous
people in Sodom to flee before He destroyed the city.</span><a data-dcnode-id="1463" href="#n23"><sup data-dcnode-id="1464"><span data-dcnode-id="1465" instrument_node="">23</span></sup></a><span data-dcnode-id="1462" instrument_node="">
It is quite convenient that such details are usually left out of atheistic sites
complaining about the "evil" perpetrated by God. In fact, God saved
certain people from being killed in cities such as
Jericho.</span><a data-dcnode-id="1459" href="#n24"><sup data-dcnode-id="1460"><span data-dcnode-id="1461" instrument_node="">24</span></sup></a></p><span data-dcnode-id="1457" instrument_node="">
</span><h3 class="intro" data-dcnode-id="1451" id="conc"><span data-dcnode-id="1455"><span data-dcnode-id="1456" instrument_node="">Conclusion</span></span><span data-dcnode-id="1454" instrument_node=""> </span><a data-dcnode-id="1452" href="#top"><img alt="Top of page" border="0" data-dcnode-id="1453" height="13" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.godandscience.org/images/up1.gif&amp;raw" width="17"></a></h3><span data-dcnode-id="1450" instrument_node="">
</span><p data-dcnode-id="1444"><span data-dcnode-id="1449" instrument_node="">
</span><a data-dcnode-id="1447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amazon.com/gp/product/0801072751/ref%3Das_li_ss_tl%3Fie%3DUTF8%26tag%3Dsavedbygracemini%26linkCode%3Das2%26camp%3D1789%26creative%3D390957%26creativeASIN%3D0801072751"><img alt="Is God a Moral Monster?" data-dcnode-id="1448" height="120" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.godandscience.org/images/books/god_a_moral_monster.gif&amp;raw" style="float: right" width="78"></a><img alt="" border="0" data-dcnode-id="1446" height="1" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.assoc-amazon.com/e/ir%3Ft%3Dsavedbygracemini%26l%3Das2%26o%3D1%26a%3D0801072751&amp;raw" style="border:none; margin:0px;" width="1"><span data-dcnode-id="1445" instrument_node="">The commandment "Thou shalt not kill" is really not as general as
the King James version would indicate. The commandment actually refers to
premeditated, unjustified killing - murder. Although God ordered the
extermination of entire cities, He did so in righteous judgment on a people
whose corruption had led to extreme wickedness, including child sacrifice. Did
God destroy the righteous along with the wicked? In an exchange with Abraham,
God indicated that He would spare the wicked to save the righteous. He
demonstrated this principle by saving righteous people from Sodom and Jericho
prior to their destruction. The charge that God indiscriminately murdered people
does not hold to to critical evaluation of the biblical texts.</span></p><span data-dcnode-id="1443" instrument_node="">
