</span><h1 class="entry-title" data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">Murder in the Bible</span></h1><span data-dcnode-id="759" instrument_node=""> </span></header><span data-dcnode-id="756" instrument_node="">
</span><div class="entry-content" data-dcnode-id="231"><span data-dcnode-id="755" instrument_node="">
</span><p data-dcnode-id="753"><span data-dcnode-id="754" instrument_node="">The act of murder is rampant in the Bible.&nbsp; In much of the Bible, especially the Old Testament, there are laws that command that people be killed for absurd reasons such as working on the Sabbath, being gay, cursing your parents, or not being a virgin on your wedding night.&nbsp; In addition to these crazy and immoral laws, there are plenty of examples of God’s irrationality by his direct killing of many people for reasons that defy any rational explanation such as killing children who make fun of bald people, and the killing of a man who tried to keep the ark of God from falling during transport.&nbsp; There are also countless examples of mass murders commanded by God, including the murder of women, infants, and children.</span></p><span data-dcnode-id="752" instrument_node="">
</span><p data-dcnode-id="750"><span data-dcnode-id="751" instrument_node="">The following passages are a very small percentage of the total passages approving of murder in the Bible.&nbsp; They are divided here into three parts: 1) Capital Punishment Crimes, 2) God’s Murders for Stupid Reasons, 3) Murdering Children, and 4) Miscellaneous Murders.&nbsp; This list is long, but it barely scratches the surface of all the murders approved of in the Bible.</span></p><span data-dcnode-id="749" instrument_node="">
</span><p data-dcnode-id="746"><strong data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">1) Capital Punishment Crimes:</span></strong></p><span data-dcnode-id="745" instrument_node="">
</span><p data-dcnode-id="742"><strong data-dcnode-id="743"><span data-dcnode-id="744" instrument_node="">Kill People Who Don’t Listen to Priests</span></strong></p><span data-dcnode-id="741" instrument_node="">
</span><p data-dcnode-id="737"><em data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">Anyone arrogant enough to reject the verdict of the judge or of the priest who represents the LORD your God must be put to death. &nbsp;Such evil must be purged from Israel. </span></em><span data-dcnode-id="738" instrument_node="">(Deuteronomy 17:12 NLT)</span></p><span data-dcnode-id="736" instrument_node="">
</span><p data-dcnode-id="733"><strong data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">Kill Witches</span></strong></p><span data-dcnode-id="732" instrument_node="">
</span><p data-dcnode-id="728"><em data-dcnode-id="730"><span data-dcnode-id="731" instrument_node="">You should not let a sorceress live. </span></em><span data-dcnode-id="729" instrument_node="">(Exodus 22:17 NAB)</span></p><span data-dcnode-id="727" instrument_node="">
</span><p data-dcnode-id="719"><strong data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">Kill Homosexuals</span></strong><br data-dcnode-id="724"><span data-dcnode-id="723" instrument_node="">
</span><em data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">“If a man lies with a male as with a women, both of them shall be put to death for their abominable deed; they have forfeited their lives.”</span></em><span data-dcnode-id="720" instrument_node=""> (Leviticus 20:13 NAB)</span></p><span data-dcnode-id="718" instrument_node="">
</span><p data-dcnode-id="715"><strong data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">Kill Fortunetellers</span></strong></p><span data-dcnode-id="714" instrument_node="">
</span><p data-dcnode-id="710"><em data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">A man or a woman who acts as a medium or fortuneteller shall be put to death by stoning; they have no one but themselves to blame for their death.</span></em><span data-dcnode-id="711" instrument_node=""> (Leviticus 20:27 NAB)</span></p><span data-dcnode-id="709" instrument_node="">
</span><p data-dcnode-id="706"><strong data-dcnode-id="707"><span data-dcnode-id="708" instrument_node="">Death for Hitting Dad</span></strong></p><span data-dcnode-id="705" instrument_node="">
</span><p data-dcnode-id="701"><em data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">Whoever strikes his father or mother shall be put to death. </span></em><span data-dcnode-id="702" instrument_node=""> (Exodus 21:15 NAB)</span></p><span data-dcnode-id="700" instrument_node="">
</span><p data-dcnode-id="697"><strong data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">Death for Cursing Parents</span></strong></p><span data-dcnode-id="696" instrument_node="">
</span><p data-dcnode-id="691"><span data-dcnode-id="695" instrument_node="">1) </span><em data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">If one curses his father or mother, his lamp will go out at the coming of darkness.</span></em><span data-dcnode-id="692" instrument_node=""> (Proverbs 20:20 NAB)</span></p><span data-dcnode-id="690" instrument_node="">
</span><p data-dcnode-id="685"><span data-dcnode-id="689" instrument_node="">2) </span><em data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">All who curse their father or mother must be put to death.&nbsp; They are guilty of a capital offense.</span></em><span data-dcnode-id="686" instrument_node=""> (Leviticus 20:9 NLT)</span></p><span data-dcnode-id="684" instrument_node="">
</span><p data-dcnode-id="681"><strong data-dcnode-id="682"><span data-dcnode-id="683" instrument_node="">Death for Adultery</span></strong></p><span data-dcnode-id="680" instrument_node="">
</span><p data-dcnode-id="676"><em data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">If a man commits adultery with another man’s wife, both the man and the woman must be put to death.</span></em><span data-dcnode-id="677" instrument_node=""> (Leviticus 20:10 NLT)</span></p><span data-dcnode-id="675" instrument_node="">
</span><p data-dcnode-id="672"><strong data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">Death for Fornication </span></strong></p><span data-dcnode-id="671" instrument_node="">
</span><p data-dcnode-id="667"><em data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">A priest’s daughter who loses her honor by committing fornication and thereby dishonors her father also, shall be burned to death.</span></em><span data-dcnode-id="668" instrument_node=""> (Leviticus 21:9 NAB)</span></p><span data-dcnode-id="666" instrument_node="">
</span><p data-dcnode-id="663"><strong data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">Death to Followers of Other Religions </span></strong></p><span data-dcnode-id="662" instrument_node="">
</span><p data-dcnode-id="658"><em data-dcnode-id="660"><span data-dcnode-id="661" instrument_node=""> Whoever sacrifices to any god, except the Lord alone, shall be doomed. </span></em><span data-dcnode-id="659" instrument_node="">(Exodus 22:19 NAB)</span></p><span data-dcnode-id="657" instrument_node="">
</span><p data-dcnode-id="654"><strong data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">Kill Nonbelievers</span></strong></p><span data-dcnode-id="653" instrument_node="">
</span><p data-dcnode-id="649"><em data-dcnode-id="651"><span data-dcnode-id="652" instrument_node=""> They entered into a covenant to seek the Lord, the God of their fathers, with all their heart and soul; and everyone who would not seek the Lord, the God of Israel, was to be put to death, whether small or great, whether man or woman.</span></em><span data-dcnode-id="650" instrument_node=""> (2 Chronicles 15:12-13 NAB)</span></p><span data-dcnode-id="648" instrument_node="">
</span><p data-dcnode-id="645"><strong data-dcnode-id="646"><span data-dcnode-id="647" instrument_node="">Kill False Prophets</span></strong></p><span data-dcnode-id="644" instrument_node="">
</span><p data-dcnode-id="640"><em data-dcnode-id="642"><span data-dcnode-id="643" instrument_node=""> If a man still prophesies, his parents, father and mother, shall say to him, “You shall not live, because you have spoken a lie in the name of the Lord.”&nbsp; When he prophesies, his parents, father and mother, shall thrust him through. </span></em><span data-dcnode-id="641" instrument_node=""> (Zechariah 13:3 NAB)</span></p><span data-dcnode-id="639" instrument_node="">
</span><p data-dcnode-id="636"><strong data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">Kill the Entire Town if One Person Worships Another God</span></strong></p><span data-dcnode-id="635" instrument_node="">
</span><p data-dcnode-id="631"><em data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">Suppose you hear in one of the towns the LORD your God is giving you that some worthless rabble among you have led their fellow citizens astray by encouraging them to worship foreign gods.&nbsp; In such cases, you must examine the facts carefully.&nbsp; If you find it is true and can prove that such a detestable act has occurred among you, you must attack that town and completely destroy all its inhabitants, as well as all the livestock.&nbsp; Then you must pile all the plunder in the middle of the street and burn it.&nbsp; Put the entire town to the torch as a burnt offering to the LORD your God.&nbsp; That town must remain a ruin forever; it may never be rebuilt.&nbsp; Keep none of the plunder that has been set apart for destruction.&nbsp; Then the LORD will turn from his fierce anger and be merciful to you.&nbsp; He will have compassion on you and make you a great nation, just as he solemnly promised your ancestors.&nbsp; “The LORD your God will be merciful only if you obey him and keep all the commands I am giving you today, doing what is pleasing to him.”</span></em><span data-dcnode-id="632" instrument_node=""> (Deuteronomy 13:13-19 NLT)</span></p><span data-dcnode-id="630" instrument_node="">
</span><p data-dcnode-id="627"><strong data-dcnode-id="628"><span data-dcnode-id="629" instrument_node="">Kill Women Who Are Not Virgins On Their Wedding Night</span></strong></p><span data-dcnode-id="626" instrument_node="">
</span><p data-dcnode-id="619"><em data-dcnode-id="624"><span data-dcnode-id="625" instrument_node="">But if this charge is true </span></em><span data-dcnode-id="623" instrument_node="">(that she wasn’t a virgin on her wedding night)</span><em data-dcnode-id="621"><span data-dcnode-id="622" instrument_node="">, and evidence of the girls virginity is not found, they shall bring the girl to the entrance of her fathers house and there her townsman shall stone her to death, because she committed a crime against Israel by her unchasteness in her father’s house.&nbsp; Thus shall you purge the evil from your midst.</span></em><span data-dcnode-id="620" instrument_node=""> (Deuteronomy&nbsp; 22:20-21 NAB)</span></p><span data-dcnode-id="618" instrument_node="">
</span><p data-dcnode-id="615"><strong data-dcnode-id="616"><span data-dcnode-id="617" instrument_node="">Kill Followers of Other Religions.</span></strong></p><span data-dcnode-id="614" instrument_node="">
</span><p data-dcnode-id="609"><span data-dcnode-id="613" instrument_node="">1)</span><em data-dcnode-id="611"><span data-dcnode-id="612" instrument_node=""> If your own full brother, or your son or daughter, or your beloved wife, or you intimate friend, entices you secretly to serve other gods, whom you and your fathers have not known, gods of any other nations, near at hand or far away, from one end of the earth to the other: do not yield to him or listen to him, nor look with pity upon him, to spare or shield him, but kill him.&nbsp; Your hand shall be the first raised to slay him; the rest of the people shall join in with you.&nbsp; You shall stone him to death, because he sought to lead you astray from the Lord, your God, who brought you out of the land of Egypt, that place of slavery.&nbsp; And all Israel, hearing of this, shall fear and never do such evil as this in your midst.</span></em><span data-dcnode-id="610" instrument_node=""> (Deuteronomy 13:7-12 NAB)</span></p><span data-dcnode-id="608" instrument_node="">
</span><p data-dcnode-id="603"><span data-dcnode-id="607" instrument_node="">2)</span><em data-dcnode-id="605"><span data-dcnode-id="606" instrument_node=""> Suppose a man or woman among you, in one of your towns that the LORD your God is giving you, has done evil in the sight of the LORD your God and has violated the covenant by serving other gods or by worshiping the sun, the moon, or any of the forces of heaven, which I have strictly forbidden.&nbsp; When you hear about it, investigate the matter thoroughly. If it is true that this detestable thing has been done in Israel, then that man or woman must be taken to the gates of the town and stoned to death. </span></em><span data-dcnode-id="604" instrument_node=""> (Deuteronomy 17:2-5 NLT)</span></p><span data-dcnode-id="602" instrument_node="">
</span><p data-dcnode-id="599"><strong data-dcnode-id="600"><span data-dcnode-id="601" instrument_node="">Death for Blasphemy</span></strong></p><span data-dcnode-id="598" instrument_node="">
</span><p data-dcnode-id="594"><em data-dcnode-id="596"><span data-dcnode-id="597" instrument_node="">One day a man who had an Israelite mother and an Egyptian father got into a fight with one of the Israelite men.&nbsp; During the fight, this son of an Israelite woman blasphemed the LORD’s name. &nbsp;So the man was brought to Moses for judgment. &nbsp;His mother’s name was Shelomith. She was the daughter of Dibri of the tribe of Dan.&nbsp; They put the man in custody until the LORD’s will in the matter should become clear. &nbsp;Then the LORD said to Moses, “Take the blasphemer outside the camp, and tell all those who heard him to lay their hands on his head. &nbsp;Then let the entire community stone him to death.&nbsp; Say to the people of Israel: Those who blaspheme God will suffer the consequences of their guilt and be punished.&nbsp; Anyone who blasphemes the LORD’s name must be stoned to death by the whole community of Israel. &nbsp;Any Israelite or foreigner among you who blasphemes the LORD’s name will surely die.</span></em><span data-dcnode-id="595" instrument_node=""> (Leviticus 24:10-16 NLT)</span></p><span data-dcnode-id="593" instrument_node="">
</span><p data-dcnode-id="590"><strong data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">Kill False Prophets</span></strong></p><span data-dcnode-id="589" instrument_node="">
</span><p data-dcnode-id="584"><span data-dcnode-id="588" instrument_node="">1) </span><em data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">Suppose there are prophets among you, or those who have dreams about the future, and they promise you signs or miracles, &nbsp;and the predicted signs or miracles take place. &nbsp;If the prophets then say, ‘Come, let us worship the gods of foreign nations,’ do not listen to them. &nbsp;The LORD your God is testing you to see if you love him with all your heart and soul. &nbsp;Serve only the LORD your God and fear him alone. &nbsp;Obey his commands, listen to his voice, and cling to him. &nbsp;The false prophets or dreamers who try to lead you astray must be put to death, for they encourage rebellion against the LORD your God, who brought you out of slavery in the land of Egypt. &nbsp;Since they try to keep you from following the LORD your God, you must execute them to remove the evil from among you.</span></em><span data-dcnode-id="585" instrument_node=""> (Deuteronomy 13:1-5 NLT)</span></p><span data-dcnode-id="583" instrument_node="">
</span><p data-dcnode-id="578"><span data-dcnode-id="582" instrument_node="">2)</span><em data-dcnode-id="580"><span data-dcnode-id="581" instrument_node=""> But any prophet who claims to give a message from another god or who falsely claims to speak for me must die.’&nbsp; You may wonder, ‘How will we know whether the prophecy is from the LORD or not?’&nbsp; If the prophet predicts something in the LORD’s name and it does not happen, the LORD did not give the message. &nbsp;That prophet has spoken on his own and need not be feared.</span></em><span data-dcnode-id="579" instrument_node=""> (Deuteronomy 18:20-22 NLT)</span></p><span data-dcnode-id="577" instrument_node="">
</span><p data-dcnode-id="574"><strong data-dcnode-id="575"><span data-dcnode-id="576" instrument_node="">Infidels and Gays Should Die</span></strong></p><span data-dcnode-id="573" instrument_node="">
</span><p data-dcnode-id="569"><em data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">So God let them go ahead and do whatever shameful things their hearts desired. &nbsp;As a result, they did vile and degrading things with each other’s bodies.&nbsp; Instead of believing what they knew was the truth about God, they deliberately chose to believe lies. &nbsp;So they worshiped the things God made but not the Creator himself, who is to be praised forever. &nbsp;Amen. &nbsp;That is why God abandoned them to their shameful desires. &nbsp;Even the women turned against the natural way to have sex and instead indulged in sex with each other.&nbsp; And the men, instead of having normal sexual relationships with women, burned with lust for each other. &nbsp;Men did shameful things with other men and, as a result, suffered within themselves the penalty they so richly deserved. &nbsp;When they refused to acknowledge God, he abandoned them to their evil minds and let them do things that should never be done.&nbsp; Their lives became full of every kind of wickedness, sin, greed, hate, envy, murder, fighting, deception, malicious behavior, and gossip.&nbsp; They are backstabbers, haters of God, insolent, proud, and boastful. &nbsp;They are forever inventing new ways of sinning and are disobedient to their parents.&nbsp; They refuse to understand, break their promises, and are heartless and unforgiving.&nbsp; They are fully aware of God’s death penalty for those who do these things, yet they go right ahead and do them anyway. &nbsp;And, worse yet, they encourage others to do them, too.</span></em><span data-dcnode-id="570" instrument_node=""> (Romans 1:24-32 NLT)</span></p><span data-dcnode-id="568" instrument_node="">
</span><p data-dcnode-id="565"><strong data-dcnode-id="566"><span data-dcnode-id="567" instrument_node="">Kill Anyone who Approaches the Tabernacle</span></strong></p><span data-dcnode-id="564" instrument_node="">
</span><p data-dcnode-id="560"><em data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">For the LORD had said to Moses, ‘Exempt the tribe of Levi from the census; do not include them when you count the rest of the Israelites.&nbsp; You must put the Levites in charge of the Tabernacle of the Covenant, along with its furnishings and equipment. &nbsp;They must carry the Tabernacle and its equipment as you travel, and they must care for it and camp around it.&nbsp; Whenever the Tabernacle is moved, the Levites will take it down and set it up again. &nbsp;Anyone else who goes too near the Tabernacle will be executed.’ </span></em><span data-dcnode-id="561" instrument_node=""> (Numbers 1:48-51 NLT)</span></p><span data-dcnode-id="559" instrument_node="">
</span><p data-dcnode-id="556"><strong data-dcnode-id="557"><span data-dcnode-id="558" instrument_node="">Kill People for Working on the Sabbath</span></strong></p><span data-dcnode-id="555" instrument_node="">
</span><p data-dcnode-id="551"><em data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">The LORD then gave these further instructions to Moses: ‘Tell the people of Israel to keep my Sabbath day, for the Sabbath is a sign of the covenant between me and you forever. &nbsp;It helps you to remember that I am the LORD, who makes you holy.&nbsp; Yes, keep the Sabbath day, for it is holy. &nbsp;Anyone who desecrates it must die; anyone who works on that day will be cut off from the community.&nbsp; Work six days only, but the seventh day must be a day of total rest. &nbsp;I repeat: Because the LORD considers it a holy day, anyone who works on the Sabbath must be put to death.’</span></em><span data-dcnode-id="552" instrument_node=""> (Exodus 31:12-15 NLT)</span></p><span data-dcnode-id="550" instrument_node="">
</span><hr data-dcnode-id="549"><span data-dcnode-id="548" instrument_node="">
</span><p data-dcnode-id="546"><span data-dcnode-id="547" instrument_node="">&nbsp;</span></p><span data-dcnode-id="545" instrument_node="">
</span><p data-dcnode-id="542"><strong data-dcnode-id="543"><span data-dcnode-id="544" instrument_node=""> 2) God’s Murders for Stupid Reasons:</span></strong></p><span data-dcnode-id="541" instrument_node="">
</span><p data-dcnode-id="538"><strong data-dcnode-id="539"><span data-dcnode-id="540" instrument_node="">Kill Brats</span></strong></p><span data-dcnode-id="537" instrument_node="">
</span><p data-dcnode-id="533"><em data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">From there Elisha went up to Bethel.&nbsp; While he was on his way, some small boys came out of the city and jeered at him.&nbsp; “Go up baldhead,” they shouted, “go up baldhead!”&nbsp; The prophet turned and saw them, and he cursed them in the name of the Lord.&nbsp; Then two shebears came out of the woods and tore forty two of the children to pieces. </span></em><span data-dcnode-id="534" instrument_node=""> (2 Kings 2:23-24 NAB)</span></p><span data-dcnode-id="532" instrument_node="">
</span><p data-dcnode-id="529"><strong data-dcnode-id="530"><span data-dcnode-id="531" instrument_node="">God Kills the Curious </span></strong></p><span data-dcnode-id="528" instrument_node="">
</span><p data-dcnode-id="524"><em data-dcnode-id="526"><span data-dcnode-id="527" instrument_node="">And he smote of the men of Beth-shemesh, because they had looked into the ark of Jehovah, he smote of the people seventy men, `and’ fifty thousand men; and the people mourned, because Jehovah had smitten the people with a great slaughter.&nbsp; And the men of Beth-shemesh said, Who is able to stand before Jehovah, this holy God? and to whom shall he go up from us? </span></em><span data-dcnode-id="525" instrument_node=""> (1Samuel 6:19-20 ASV)</span></p><span data-dcnode-id="523" instrument_node="">
</span><p data-dcnode-id="520"><strong data-dcnode-id="521"><span data-dcnode-id="522" instrument_node="">Killed by a Lion</span></strong></p><span data-dcnode-id="519" instrument_node="">
</span><p data-dcnode-id="515"><em data-dcnode-id="517"><span data-dcnode-id="518" instrument_node="">Meanwhile, the LORD instructed one of the group of prophets to say to another man, “Strike me!” &nbsp;But the man refused to strike the prophet.&nbsp; Then the prophet told him, “Because you have not obeyed the voice of the LORD, a lion will kill you as soon as you leave me.” &nbsp;And sure enough, when he had gone, a lion attacked and killed him. </span></em><span data-dcnode-id="516" instrument_node=""> (1 Kings 20:35-36 NLT)</span></p><span data-dcnode-id="514" instrument_node="">
</span><p data-dcnode-id="511"><strong data-dcnode-id="512"><span data-dcnode-id="513" instrument_node="">Killing the Good Samaritan</span></strong></p><span data-dcnode-id="510" instrument_node="">
</span><p data-dcnode-id="507"><em data-dcnode-id="508"><span data-dcnode-id="509" instrument_node="">The ark of God was placed on a new cart and taken away from the house of Abinadab on the hill.&nbsp; Uzzah and Ahio, sons of Abinadab guided the cart, with Ahio walking before it, while David and all the Israelites made merry before the Lord with all their strength, with singing and with citharas, harps, tambourines, sistrums, and cymbals.</span></em></p><span data-dcnode-id="506" instrument_node="">
</span><p data-dcnode-id="502"><em data-dcnode-id="504"><span data-dcnode-id="505" instrument_node=""> When they came to the threshing floor of Nodan, Uzzah reached out his hand to the ark of God to steady it, for the oxen were making it tip.&nbsp; But the Lord was angry with Uzzah; God struck him on that spot, and he died there before God.</span></em><span data-dcnode-id="503" instrument_node=""> (2 Samuel 6:3-7 NAB)</span></p><span data-dcnode-id="501" instrument_node="">
</span><hr data-dcnode-id="500"><span data-dcnode-id="499" instrument_node="">
</span><p data-dcnode-id="497"><span data-dcnode-id="498" instrument_node="">&nbsp;</span></p><span data-dcnode-id="496" instrument_node="">
</span><p data-dcnode-id="493"><strong data-dcnode-id="494"><span data-dcnode-id="495" instrument_node="">3) Murdering Children</span></strong></p><span data-dcnode-id="492" instrument_node="">
</span><p data-dcnode-id="489"><strong data-dcnode-id="490"><span data-dcnode-id="491" instrument_node="">Kill Sons of Sinners</span></strong></p><span data-dcnode-id="488" instrument_node="">
</span><p data-dcnode-id="484"><em data-dcnode-id="486"><span data-dcnode-id="487" instrument_node="">Make ready to slaughter his sons for the guilt of their fathers; Lest they rise and posses the earth, and fill the breadth of the world with tyrants.</span></em><span data-dcnode-id="485" instrument_node=""> (Isaiah 14:21 NAB)</span></p><span data-dcnode-id="483" instrument_node="">
</span><p data-dcnode-id="480"><strong data-dcnode-id="481"><span data-dcnode-id="482" instrument_node="">God Will Kill Children</span></strong></p><span data-dcnode-id="479" instrument_node="">
</span><p data-dcnode-id="475"><em data-dcnode-id="477"><span data-dcnode-id="478" instrument_node="">The glory of Israel will fly away like a bird, for your children will die at birth or perish in the womb or never even be conceived.&nbsp; Even if your children do survive to grow up, I will take them from you.&nbsp; It will be a terrible day when I turn away and leave you alone.&nbsp; I have watched Israel become as beautiful and pleasant as Tyre.&nbsp; But now Israel will bring out her children to be slaughtered.”&nbsp; O LORD, what should I request for your people?&nbsp; I will ask for wombs that don’t give birth and breasts that give no milk.&nbsp; The LORD says, “All their wickedness began at Gilgal; there I began to hate them.&nbsp; I will drive them from my land because of their evil actions.&nbsp; I will love them no more because all their leaders are rebels.&nbsp; The people of Israel are stricken.&nbsp; Their roots are dried up; they will bear no more fruit.&nbsp; And if they give birth, I will slaughter their beloved children.”</span></em><span data-dcnode-id="476" instrument_node=""> (Hosea 9:11-16 NLT)</span></p><span data-dcnode-id="474" instrument_node="">
</span><p data-dcnode-id="471"><strong data-dcnode-id="472"><span data-dcnode-id="473" instrument_node="">Kill Men, Women, and Children</span></strong></p><span data-dcnode-id="470" instrument_node="">
</span><p data-dcnode-id="466"><em data-dcnode-id="468"><span data-dcnode-id="469" instrument_node="">“Then I heard the LORD say to the other men, “Follow him through the city and kill everyone whose forehead is not marked. &nbsp;Show no mercy; have no pity!&nbsp; Kill them all – old and young, girls and women and little children. &nbsp;But do not touch anyone with the mark. &nbsp;Begin your task right here at the Temple.” &nbsp;So they began by killing the seventy leaders.&nbsp; “Defile the Temple!” the LORD commanded. &nbsp;“Fill its courtyards with the bodies of those you kill! &nbsp;Go!” &nbsp;So they went throughout the city and did as they were told.” </span></em><span data-dcnode-id="467" instrument_node=""> (Ezekiel 9:5-7 NLT)</span></p><span data-dcnode-id="465" instrument_node="">
</span><p data-dcnode-id="462"><strong data-dcnode-id="463"><span data-dcnode-id="464" instrument_node="">God Kills all the First Born of Egypt</span></strong></p><span data-dcnode-id="461" instrument_node="">
</span><p data-dcnode-id="457"><em data-dcnode-id="459"><span data-dcnode-id="460" instrument_node="">And at midnight the LORD killed all the firstborn sons in the land of Egypt, from the firstborn son of Pharaoh, who sat on the throne, to the firstborn son of the captive in the dungeon. Even the firstborn of their livestock were killed.&nbsp; Pharaoh and his officials and all the people of Egypt woke up during the night, and loud wailing was heard throughout the land of Egypt. There was not a single house where someone had not died. </span></em><span data-dcnode-id="458" instrument_node=""> (Exodus 12:29-30 NLT)</span></p><span data-dcnode-id="456" instrument_node="">
</span><p data-dcnode-id="453"><strong data-dcnode-id="454"><span data-dcnode-id="455" instrument_node="">Kill Old Men and Young Women</span></strong></p><span data-dcnode-id="452" instrument_node="">
</span><p data-dcnode-id="448"><em data-dcnode-id="450"><span data-dcnode-id="451" instrument_node="">“You are my battle-ax and sword,” says the LORD. &nbsp;“With you I will shatter nations and destroy many kingdoms.&nbsp; With you I will shatter armies, destroying the horse and rider, the chariot and charioteer.&nbsp; With you I will shatter men and women, old people and children, young men and maidens.&nbsp; With you I will shatter shepherds and flocks, farmers and oxen, captains and rulers. &nbsp;“As you watch, I will repay Babylon and the people of Babylonia for all the wrong they have done to my people in Jerusalem,” says the LORD.&nbsp; “Look, O mighty mountain, destroyer of the earth! &nbsp;I am your enemy,” says the LORD. &nbsp;“I will raise my fist against you, to roll you down from the heights. &nbsp;When I am finished, you will be nothing but a heap of rubble.&nbsp; You will be desolate forever. &nbsp;Even your stones will never again be used for building. &nbsp;You will be completely wiped out,” says the LORD.</span></em><span data-dcnode-id="449" instrument_node=""> (Jeremiah 51:20-26)</span></p><span data-dcnode-id="447" instrument_node="">
</span><p data-dcnode-id="445"><span data-dcnode-id="446" instrument_node="">(Note that after God promises the Israelites a victory against Babylon, the Israelites actually get their butts kicked by them in the next chapter.&nbsp; So much for an all-knowing and all-powerful God.)</span></p><span data-dcnode-id="444" instrument_node="">
</span><p data-dcnode-id="441"><strong data-dcnode-id="442"><span data-dcnode-id="443" instrument_node="">God Will Kill the Children of Sinners</span></strong></p><span data-dcnode-id="440" instrument_node="">
</span><p data-dcnode-id="436"><em data-dcnode-id="438"><span data-dcnode-id="439" instrument_node="">If even then you remain hostile toward me and refuse to obey, I will inflict you with seven more disasters for your sins.&nbsp; I will release wild animals that will kill your children and destroy your cattle, so your numbers will dwindle and your roads will be deserted. </span></em><span data-dcnode-id="437" instrument_node=""> (Leviticus 26:21-22 NLT)</span></p><span data-dcnode-id="435" instrument_node="">
</span><p data-dcnode-id="432"><strong data-dcnode-id="433"><span data-dcnode-id="434" instrument_node="">More Rape and Baby Killing</span></strong></p><span data-dcnode-id="431" instrument_node="">
</span><p data-dcnode-id="427"><em data-dcnode-id="429"><span data-dcnode-id="430" instrument_node="">Anyone who is captured will be run through with a sword.&nbsp; Their little children will be dashed to death right before their eyes.&nbsp; Their homes will be sacked and their wives raped by the attacking hordes.&nbsp; For I will stir up the Medes against Babylon, and no amount of silver or gold will buy them off.&nbsp; The attacking armies will shoot down the young people with arrows.&nbsp; They will have no mercy on helpless babies and will show no compassion for the children.</span></em><span data-dcnode-id="428" instrument_node=""> (Isaiah 13:15-18 NLT)</span></p><span data-dcnode-id="426" instrument_node="">
</span><hr data-dcnode-id="425"><span data-dcnode-id="424" instrument_node="">
</span><p data-dcnode-id="422"><span data-dcnode-id="423" instrument_node="">&nbsp;</span></p><span data-dcnode-id="421" instrument_node="">
</span><p data-dcnode-id="418"><strong data-dcnode-id="419"><span data-dcnode-id="420" instrument_node="">4) Miscellaneous Murders</span></strong></p><span data-dcnode-id="417" instrument_node="">
</span><p data-dcnode-id="414"><strong data-dcnode-id="415"><span data-dcnode-id="416" instrument_node="">More of Samson’s Murders</span></strong></p><span data-dcnode-id="413" instrument_node="">
</span><p data-dcnode-id="408"><span data-dcnode-id="412" instrument_node="">(The Lord saves Sampson from standing trial for 30 murders and arson by allowing him to kill 1000 more men.)&nbsp; </span><em data-dcnode-id="410"><span data-dcnode-id="411" instrument_node="">When he reached Lehi, and the Philistines came shouting to meet him, the spirit of the Lord came upon him: the ropes around his arms become as flax that is consumed by fire and the bonds melted away from his hands.&nbsp; Near him was the fresh jawbone of an ass; he reached out, grasped it, and with it killed a thousand men. </span></em><span data-dcnode-id="409" instrument_node=""> (Judges 15:14-15 NAB)</span></p><span data-dcnode-id="407" instrument_node="">
</span><p data-dcnode-id="404"><strong data-dcnode-id="405"><span data-dcnode-id="406" instrument_node="">Peter Kills Two People</span></strong></p><span data-dcnode-id="403" instrument_node="">
</span><p data-dcnode-id="399"><em data-dcnode-id="401"><span data-dcnode-id="402" instrument_node="">There was also a man named Ananias who, with his wife, Sapphira, sold some property.&nbsp; He brought part of the money to the apostles, but he claimed it was the full amount.&nbsp; His wife had agreed to this deception.&nbsp; Then Peter said, “Ananias, why has Satan filled your heart?&nbsp; You lied to the Holy Spirit, and you kept some of the money for yourself.&nbsp; The property was yours to sell or not sell, as you wished.&nbsp; And after selling it, the money was yours to give away.&nbsp; How could you do a thing like this?&nbsp; You weren’t lying to us but to God.”&nbsp; As soon as Ananias heard these words, he fell to the floor and died.&nbsp; Everyone who heard about it was terrified.&nbsp; Then some young men wrapped him in a sheet and took him out and buried him.&nbsp; About three hours later his wife came in, not knowing what had happened.&nbsp; Peter asked her, “Was this the price you and your husband received for your land?”&nbsp; “Yes,” she replied, “that was the price.”&nbsp; And Peter said, “How could the two of you even think of doing a thing like this – conspiring together to test the Spirit of the Lord?&nbsp; Just outside that door are the young men who buried your husband, and they will carry you out, too.”&nbsp; Instantly, she fell to the floor and died.&nbsp; When the young men came in and saw that she was dead, they carried her out and buried her beside her husband.&nbsp; Great fear gripped the entire church and all others who heard what had happened. </span></em><span data-dcnode-id="400" instrument_node=""> (Acts 5:1-11 NLT)</span></p><span data-dcnode-id="398" instrument_node="">
</span><p data-dcnode-id="395"><strong data-dcnode-id="396"><span data-dcnode-id="397" instrument_node="">Mass Murder</span></strong></p><span data-dcnode-id="394" instrument_node="">
</span><p data-dcnode-id="390"><em data-dcnode-id="392"><span data-dcnode-id="393" instrument_node="">This is what the Lord of&nbsp; hosts has to say: ‘I will punish what Amalek did to Israel when he barred his way as he was coming up from Egypt.&nbsp; Go, now, attack Amalek, and deal with him and all that he has under the ban.&nbsp; Do not spare him, but kill men and women, children and infants, oxen and sheep, camels and asses.’ </span></em><span data-dcnode-id="391" instrument_node=""> (1 Samuel 15:2-3 NAB)</span></p><span data-dcnode-id="389" instrument_node="">
</span><p data-dcnode-id="386"><strong data-dcnode-id="387"><span data-dcnode-id="388" instrument_node="">You Have to Kill</span></strong></p><span data-dcnode-id="385" instrument_node="">
</span><p data-dcnode-id="381"><em data-dcnode-id="383"><span data-dcnode-id="384" instrument_node="">Cursed be he who does the Lords work remissly, cursed he who holds back his sword from blood. </span></em><span data-dcnode-id="382" instrument_node=""> (Jeremiah 48:10 NAB)</span></p><span data-dcnode-id="380" instrument_node="">
</span><p data-dcnode-id="377"><strong data-dcnode-id="378"><span data-dcnode-id="379" instrument_node="">The Danites Kill the Next Town</span></strong></p><span data-dcnode-id="376" instrument_node="">
</span><p data-dcnode-id="372"><em data-dcnode-id="374"><span data-dcnode-id="375" instrument_node="">But the territory of the Danites was too small for them; so the Danites marched up and attacked Leshem, which they captured and put to the sword.&nbsp; Once they had taken possession of Lesham, they renamed the settlement after their ancestor Dan.</span></em><span data-dcnode-id="373" instrument_node=""> (Joshua 19:47 NAB)</span></p><span data-dcnode-id="371" instrument_node="">
</span><p data-dcnode-id="368"><strong data-dcnode-id="369"><span data-dcnode-id="370" instrument_node="">God Kills Some More </span></strong></p><span data-dcnode-id="367" instrument_node="">
</span><p data-dcnode-id="363"><em data-dcnode-id="365"><span data-dcnode-id="366" instrument_node="">Then the LORD said to me, “Even if Moses and Samuel stood before me pleading for these people, I wouldn’t help them.&nbsp; Away with them!&nbsp; Get them out of my sight!&nbsp; And if they say to you, ‘But where can we go?’ tell them, ‘This is what the LORD says: Those who are destined for death, to death; those who are destined for war, to war; those who are destined for famine, to famine; those who are destined for captivity, to captivity.’&nbsp; “I will send four kinds of destroyers against them,” says the LORD.&nbsp; “I will send the sword to kill, the dogs to drag away, the vultures to devour, and the wild animals to finish up what is left.&nbsp; Because of the wicked things Manasseh son of Hezekiah, king of Judah, did in Jerusalem, I will make my people an object of horror to all the kingdoms of the earth.”</span></em><span data-dcnode-id="364" instrument_node=""> (Jeremiah 15:1-4 NLT)</span></p><span data-dcnode-id="362" instrument_node="">
</span><p data-dcnode-id="359"><strong data-dcnode-id="360"><span data-dcnode-id="361" instrument_node="">God Promises More Killing </span></strong></p><span data-dcnode-id="358" instrument_node="">
</span><p data-dcnode-id="354"><em data-dcnode-id="356"><span data-dcnode-id="357" instrument_node="">I will make Mount Seir utterly desolate, killing off all who try to escape and any who return.&nbsp; I will fill your mountains with the dead. Your hills, your valleys, and your streams will be filled with people slaughtered by the sword.&nbsp; I will make you desolate forever. Your cities will never be rebuilt. Then you will know that I am the LORD.</span></em><span data-dcnode-id="355" instrument_node=""> (Ezekiel 35:7-9 NLT)</span></p><span data-dcnode-id="353" instrument_node="">
</span><p data-dcnode-id="350"><strong data-dcnode-id="351"><span data-dcnode-id="352" instrument_node="">The Angel of Death</span></strong></p><span data-dcnode-id="349" instrument_node="">
</span><p data-dcnode-id="345"><em data-dcnode-id="347"><span data-dcnode-id="348" instrument_node="">My angel will go before you and bring you to the Amorites, Hittites, Perizzites, Canaanites, Hivites, and Jebusites; and I will wipe them out.</span></em><span data-dcnode-id="346" instrument_node=""> (Exodus 23:23 NAB)</span></p><span data-dcnode-id="344" instrument_node="">
</span><p data-dcnode-id="341"><strong data-dcnode-id="342"><span data-dcnode-id="343" instrument_node="">Destruction of Ai</span></strong></p><span data-dcnode-id="340" instrument_node="">
</span><p data-dcnode-id="337"><em data-dcnode-id="338"><span data-dcnode-id="339" instrument_node="">Then the LORD said to Joshua, “Do not be afraid or discouraged.&nbsp; Take the entire army and attack Ai, for I have given to you the king of Ai, his people, his city, and his land.&nbsp; You will destroy them as you destroyed Jericho and its king. But this time you may keep the captured goods and the cattle for yourselves. Set an ambush behind the city.”&nbsp; So Joshua and the army of Israel set out to attack Ai.&nbsp; Joshua chose thirty thousand fighting men and sent them out at night with these orders: “Hide in ambush close behind the city and be ready for action.&nbsp; When our main army attacks, the men of Ai will come out to fight as they did before, and we will run away from them.&nbsp; We will let them chase us until they have all left the city. For they will say, ‘The Israelites are running away from us as they did before.’&nbsp; Then you will jump up from your ambush and take possession of the city, for the LORD your God will give it to you.&nbsp; Set the city on fire, as the LORD has commanded.&nbsp; You have your orders.”&nbsp; So they left that night and lay in ambush between Bethel and the west side of Ai.&nbsp; But Joshua remained among the people in the camp that night. </span></em></p><span data-dcnode-id="336" instrument_node="">
</span><p data-dcnode-id="333"><em data-dcnode-id="334"><span data-dcnode-id="335" instrument_node=""> Early the next morning Joshua roused his men and started toward Ai, accompanied by the leaders of Israel.&nbsp; They camped on the north side of Ai, with a valley between them and the city.&nbsp; That night Joshua sent five thousand men to lie in ambush between Bethel and Ai, on the west side of the city.&nbsp; So they stationed the main army north of the city and the ambush west of the city.&nbsp; Joshua himself spent that night in the valley.&nbsp; When the king of Ai saw the Israelites across the valley, he and all his army hurriedly went out early the next morning and attacked the Israelites at a place overlooking the Jordan Valley.&nbsp; But he didn’t realize there was an ambush behind the city.&nbsp; Joshua and the Israelite army fled toward the wilderness as though they were badly beaten,&nbsp; and all the men in the city were called out to chase after them.&nbsp; In this way, they were lured away from the city.&nbsp; There was not a man left in Ai or Bethel who did not chase after the Israelites, and the city was left wide open. </span></em></p><span data-dcnode-id="332" instrument_node="">
</span><p data-dcnode-id="329"><em data-dcnode-id="330"><span data-dcnode-id="331" instrument_node=""> Then the LORD said to Joshua, “Point your spear toward Ai, for I will give you the city.”&nbsp; Joshua did as he was commanded.&nbsp; As soon as Joshua gave the signal, the men in ambush jumped up and poured into the city.&nbsp; They quickly captured it and set it on fire.&nbsp; When the men of Ai looked behind them, smoke from the city was filling the sky, and they had nowhere to go. For the Israelites who had fled in the direction of the wilderness now turned on their pursuers.&nbsp; When Joshua and the other Israelites saw that the ambush had succeeded and that smoke was rising from the city, they turned and attacked the men of Ai.&nbsp; Then the Israelites who were inside the city came out and started killing the enemy from the rear. So the men of Ai were caught in a trap, and all of them died. Not a single person survived or escaped.&nbsp; Only the king of Ai was taken alive and brought to Joshua.</span></em></p><span data-dcnode-id="328" instrument_node="">
</span><p data-dcnode-id="324"><em data-dcnode-id="326"><span data-dcnode-id="327" instrument_node=""> When the Israelite army finished killing all the men outside the city, they went back and finished off everyone inside.&nbsp; So the entire population of Ai was wiped out that day – twelve thousand in all. &nbsp;For Joshua kept holding out his spear until everyone who had lived in Ai was completely destroyed.&nbsp; Only the cattle and the treasures of the city were not destroyed, for the Israelites kept these for themselves, as the LORD had commanded Joshua.&nbsp; So Ai became a permanent mound of ruins, desolate to this very day.&nbsp; Joshua hung the king of Ai on a tree and left him there until evening. At sunset the Israelites took down the body and threw it in front of the city gate.&nbsp; They piled a great heap of stones over him that can still be seen today.</span></em><span data-dcnode-id="325" instrument_node=""> (Joshua 8:1-29 NLT)</span></p><span data-dcnode-id="323" instrument_node="">
</span><p data-dcnode-id="320"><strong data-dcnode-id="321"><span data-dcnode-id="322" instrument_node="">Killing at Jericho</span></strong></p><span data-dcnode-id="319" instrument_node="">
</span><p data-dcnode-id="315"><em data-dcnode-id="317"><span data-dcnode-id="318" instrument_node="">When the people heard the sound of the horns, they shouted as loud as they could. Suddenly, the walls of Jericho collapsed, and the Israelites charged straight into the city from every side and captured it.&nbsp; They completely destroyed everything in it – men and women, young and old, cattle, sheep, donkeys – everything. </span></em><span data-dcnode-id="316" instrument_node=""> (Joshua 6:20-21 NLT)</span></p><span data-dcnode-id="314" instrument_node="">
</span><p data-dcnode-id="311"><strong data-dcnode-id="312"><span data-dcnode-id="313" instrument_node="">God Kills an Extended Family</span></strong></p><span data-dcnode-id="310" instrument_node="">
</span><p data-dcnode-id="306"><em data-dcnode-id="308"><span data-dcnode-id="309" instrument_node=""> “You have done more evil than all who lived before you.&nbsp; You have made other gods and have made me furious with your gold calves.&nbsp; And since you have turned your back on me, I will bring disaster on your dynasty and kill all your sons, slave or free alike.&nbsp; I will burn up your royal dynasty as one burns up trash until it is all gone.&nbsp; I, the LORD, vow that the members of your family who die in the city will be eaten by dogs, and those who die in the field will be eaten by vultures.'”&nbsp; Then Ahijah said to Jeroboam’s wife, “Go on home, and when you enter the city, the child will die.&nbsp; All Israel will mourn for him and bury him.&nbsp; He is the only member of your family who will have a proper burial, for this child is the only good thing that the LORD, the God of Israel, sees in the entire family of Jeroboam.&nbsp; And the LORD will raise up a king over Israel who will destroy the family of Jeroboam.&nbsp; This will happen today, even now!&nbsp; Then the LORD will shake Israel like a reed whipped about in a stream.&nbsp; He will uproot the people of Israel from this good land that he gave their ancestors and will scatter them beyond the Euphrates River, for they have angered the LORD by worshiping Asherah poles.&nbsp; He will abandon Israel because Jeroboam sinned and made all of Israel sin along with him.” </span></em><span data-dcnode-id="307" instrument_node=""> (1 Kings 14:9-16 NLT)</span></p><span data-dcnode-id="305" instrument_node="">
</span><p data-dcnode-id="302"><strong data-dcnode-id="303"><span data-dcnode-id="304" instrument_node="">Mass Murder</span></strong></p><span data-dcnode-id="301" instrument_node="">
</span><p data-dcnode-id="297"><em data-dcnode-id="299"><span data-dcnode-id="300" instrument_node="">The men of Israel withdrew through the territory of the Benjaminites, putting to the sword the inhabitants of the city, the livestock, and all they chanced upon.&nbsp; Moreover they destroyed by fire all the cities they came upon.</span></em><span data-dcnode-id="298" instrument_node=""> (Judges 20:48 NAB)</span></p><span data-dcnode-id="296" instrument_node="">
</span><p data-dcnode-id="293"><strong data-dcnode-id="294"><span data-dcnode-id="295" instrument_node="">The Angel of Death</span></strong></p><span data-dcnode-id="292" instrument_node="">
</span><p data-dcnode-id="288"><em data-dcnode-id="290"><span data-dcnode-id="291" instrument_node="">That night the angel of the Lord went forth and struck down one hundred and eighty five thousand men in the Assyrian camp.&nbsp; Early the next morning, there they were, all the corpuses of the dead. </span></em><span data-dcnode-id="289" instrument_node=""> (2 Kings 19:35 NAB)</span></p><span data-dcnode-id="287" instrument_node="">
</span><p data-dcnode-id="284"><strong data-dcnode-id="285"><span data-dcnode-id="286" instrument_node="">Kill Your Neighbors </span></strong></p><span data-dcnode-id="283" instrument_node="">
</span><p data-dcnode-id="278"><span data-dcnode-id="282" instrument_node="">(Moses)</span><em data-dcnode-id="280"><span data-dcnode-id="281" instrument_node=""> stood at the entrance to the camp and shouted, “All of you who are on the LORD’s side, come over here and join me.” And all the Levites came. &nbsp;He told them, “This is what the LORD, the God of Israel, says: Strap on your swords! Go back and forth from one end of the camp to the other, killing even your brothers, friends, and neighbors.”&nbsp; The Levites obeyed Moses, and about three thousand people died that day.&nbsp; Then Moses told the Levites, “Today you have been ordained for the service of the LORD, for you obeyed him even though it meant killing your own sons and brothers. Because of this, he will now give you a great blessing.” </span></em><span data-dcnode-id="279" instrument_node=""> (Exodus 32:26-29 NLT)</span></p><span data-dcnode-id="277" instrument_node="">
</span><p data-dcnode-id="274"><strong data-dcnode-id="275"><span data-dcnode-id="276" instrument_node="">Kill the Family of Sinners</span></strong></p><span data-dcnode-id="273" instrument_node="">
</span><p data-dcnode-id="269"><em data-dcnode-id="271"><span data-dcnode-id="272" instrument_node="">And Joshua said to Achan, My son, give, I pray thee, glory to the LORD God of Israel, and make confession to him; and tell me now what thou hast done, hide it not from me.&nbsp; And Achan answered Joshua, and said, Indeed I have sinned against the LORD God of Israel, and thus and thus have I done.&nbsp; When I saw among the spoils a goodly Babylonish garment, and two hundred shekels of silver, and a wedge of gold of fifty shekels weight, then I coveted them, and took them, and behold, they are hid in the earth in the midst of my tent, and the silver under it.”&nbsp; [Note that the sin is not looting, but failing to give the loot to the treasury of the Lord.]&nbsp; “So Joshua sent messengers, and they ran to the tent, and behold, it was hid in his tent, and the silver under it.&nbsp; And they took them from the midst of the tent, and brought them to Joshua, and to all the children of Israel, and laid them out before the LORD.&nbsp; And Joshua, and all Israel with him, took Achan the son of Zerah, and the silver, and the garment, and the wedge of gold, and his sons, and his daughters, and his oxen, and his asses, and his sheep, and his tent, and all that he had: and they brought them to the valley of Achor.&nbsp; And Joshua said, why hast thou troubled us?&nbsp; the LORD shall trouble thee this day.&nbsp; And all Israel stoned him with stones, and burned them with fire, after they had stoned them with stones.&nbsp; And they raised over him a great heap of stones to this day.&nbsp; So the LORD turned from the fierceness of his anger: wherefore the name of that place was called the valley of Achor to this day.</span></em><span data-dcnode-id="270" instrument_node=""> (Joshua 7:19-26 Webster’s Bible)</span></p><span data-dcnode-id="268" instrument_node="">
</span><p data-dcnode-id="265"><strong data-dcnode-id="266"><span data-dcnode-id="267" instrument_node="">Kill Followers of Other Religions</span></strong></p><span data-dcnode-id="264" instrument_node="">
</span><p data-dcnode-id="260"><em data-dcnode-id="262"><span data-dcnode-id="263" instrument_node="">While the Israelites were camped at Acacia, some of the men defiled themselves by sleeping with the local Moabite women.&nbsp; These women invited them to attend sacrifices to their gods, and soon the Israelites were feasting with them and worshiping the gods of Moab.&nbsp; Before long Israel was joining in the worship of Baal of Peor, causing the LORD’s anger to blaze against his people. &nbsp;The LORD issued the following command to Moses: “Seize all the ringleaders and execute them before the LORD in broad daylight, so his fierce anger will turn away from the people of Israel.”&nbsp; So Moses ordered Israel’s judges to execute everyone who had joined in worshiping Baal of Peor. &nbsp;Just then one of the Israelite men brought a Midianite woman into the camp, right before the eyes of Moses and all the people, as they were weeping at the entrance of the Tabernacle.&nbsp; When Phinehas son of Eleazar and grandson of Aaron the priest saw this, he jumped up and left the assembly. &nbsp;Then he took a spear and rushed after the man into his tent. Phinehas thrust the spear all the way through the man’s body and into the woman’s stomach. &nbsp;So the plague against the Israelites was stopped, but not before 24,000 people had died. </span></em><span data-dcnode-id="261" instrument_node=""> (Numbers 25:1-9 NLT)</span></p><span data-dcnode-id="259" instrument_node="">
</span><p data-dcnode-id="256"><strong data-dcnode-id="257"><span data-dcnode-id="258" instrument_node="">Murder</span></strong></p><span data-dcnode-id="255" instrument_node="">
</span><p data-dcnode-id="251"><em data-dcnode-id="253"><span data-dcnode-id="254" instrument_node="">At the customary time for offering the evening sacrifice, Elijah the prophet walked up to the altar and prayed, “O LORD, God of Abraham, Isaac, and Jacob, prove today that you are God in Israel and that I am your servant. Prove that I have done all this at your command.&nbsp; O LORD, answer me! Answer me so these people will know that you, O LORD, are God and that you have brought them back to yourself.” &nbsp;Immediately the fire of the LORD flashed down from heaven and burned up the young bull, the wood, the stones, and the dust. &nbsp;It even licked up all the water in the ditch!&nbsp; And when the people saw it, they fell on their faces and cried out, “The LORD is God!&nbsp; The LORD is God!”&nbsp; Then Elijah commanded, “Seize all the prophets of Baal. &nbsp;Don’t let a single one escape!” &nbsp;So the people seized them all, and Elijah took them down to the Kishon Valley and killed them there. </span></em><span data-dcnode-id="252" instrument_node=""> (1 Kings 18:36-40 NLT)</span></p><span data-dcnode-id="250" instrument_node="">
</span><p data-dcnode-id="247"><strong data-dcnode-id="248"><span data-dcnode-id="249" instrument_node="">Kill All of Babylon</span></strong></p><span data-dcnode-id="246" instrument_node="">
</span><p data-dcnode-id="242"><em data-dcnode-id="244"><span data-dcnode-id="245" instrument_node="">“Go up, my warriors, against the land of Merathaim and against the people of Pekod. Yes, march against Babylon, the land of rebels, a land that I will judge! &nbsp;Pursue, kill, and completely destroy them, as I have commanded you,” says the LORD.&nbsp; “Let the battle cry be heard in the land, a shout of great destruction”. </span></em><span data-dcnode-id="243" instrument_node=""> (Jeremiah 50:21-22 NLT)</span></p><span data-dcnode-id="241" instrument_node="">
</span><p data-dcnode-id="238"><strong data-dcnode-id="239"><span data-dcnode-id="240" instrument_node="">Micah Kills a Whole Town</span></strong></p><span data-dcnode-id="237" instrument_node="">
</span><p data-dcnode-id="233"><em data-dcnode-id="235"><span data-dcnode-id="236" instrument_node="">Then, with Micah’s idols and his priest, the men of Dan came to the town of Laish, whose people were peaceful and secure. &nbsp;They attacked and killed all the people and burned the town to the ground.&nbsp; There was no one to rescue the residents of the town, for they lived a great distance from Sidon and had no allies nearby. &nbsp;This happened in the valley near Beth-rehob.Then the people of the tribe of Dan rebuilt the town and lived there.&nbsp; They renamed the town Dan after their ancestor, Israel’s son, but it had originally been called Laish. </span></em><span data-dcnode-id="234" instrument_node=""> (Judges 18:27-29 NLT) &nbsp;(Note that God approves of this slaughter in verse 6.)</span></p><span data-dcnode-id="232" instrument_node="">
</span></div><span data-dcnode-id="229" instrument_node="">
