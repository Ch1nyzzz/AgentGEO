</span><h1 data-dcnode-id="1239"><span data-dcnode-id="1240" instrument_node="">Killing, Murder, and the Bible</span></h1><span data-dcnode-id="1238" instrument_node="">
</span></div><span data-dcnode-id="1236" instrument_node="">
</span><div class="authors" data-dcnode-id="1217"><span data-dcnode-id="1235" instrument_node="">
</span><a class="author" data-dcnode-id="1219" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//apologeticspress.org/people/kyle-butt-mdiv/"><span data-dcnode-id="1234" instrument_node="">
</span><div class="imgholder" data-dcnode-id="1230"><span data-dcnode-id="1233" instrument_node="">
</span><img alt="" class="lazyautosizes lazyloaded" data-dcnode-id="1232" data-sizes="auto" data-srcset="https://apologeticspress.org/wp-content/uploads/2021/08/kyle-butt.jpg 300w,https://apologeticspress.org/wp-content/uploads/2021/08/kyle-butt.jpg 768w,https://apologeticspress.org/wp-content/uploads/2021/08/kyle-butt.jpg 1024w,  https://apologeticspress.org/wp-content/uploads/2021/08/kyle-butt.jpg 192w" height="256" sizes="233px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//apologeticspress.org/wp-content/uploads/2021/08/kyle-butt.jpg&amp;raw" srcset="https://apologeticspress.org/wp-content/uploads/2021/08/kyle-butt.jpg 300w,https://apologeticspress.org/wp-content/uploads/2021/08/kyle-butt.jpg 768w,https://apologeticspress.org/wp-content/uploads/2021/08/kyle-butt.jpg 1024w,  https://apologeticspress.org/wp-content/uploads/2021/08/kyle-butt.jpg 192w" width="192"><span data-dcnode-id="1231" instrument_node="">
</span></div><span data-dcnode-id="1229" instrument_node="">
</span><div class="person" data-dcnode-id="1221"><span data-dcnode-id="1228" instrument_node="">
</span><span class="name" data-dcnode-id="1226"><span data-dcnode-id="1227" instrument_node="">Kyle Butt, </span></span><span data-dcnode-id="1225" instrument_node="">
</span><span class="suffixes" data-dcnode-id="1223"><span data-dcnode-id="1224" instrument_node="">M.Div.</span></span><span data-dcnode-id="1222" instrument_node="">
</span></div><span data-dcnode-id="1220" instrument_node="">
</span></a><span data-dcnode-id="1218" instrument_node="">
</span></div><span data-dcnode-id="1216" instrument_node="">
</span><div class="classification" data-dcnode-id="1199"><span data-dcnode-id="1215" instrument_node="">
</span><a class="cat sub" data-dcnode-id="1213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//apologeticspress.org/category/doctrinal-matters/difficult-passages/"><span data-dcnode-id="1214" instrument_node="">
                    Difficult Passages
                </span></a><span data-dcnode-id="1212" instrument_node="">
</span><a class="cat sub" data-dcnode-id="1210" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//apologeticspress.org/category/existence-of-god/difficult-passages-existence-of-god/"><span data-dcnode-id="1211" instrument_node="">
                    Difficult Passages
                </span></a><span data-dcnode-id="1209" instrument_node="">
</span><a class="cat sub" data-dcnode-id="1207" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//apologeticspress.org/category/inspiration-of-the-bible/difficult-passages-inspiration-of-the-bible/"><span data-dcnode-id="1208" instrument_node="">
                    Difficult Passages
                </span></a><span data-dcnode-id="1206" instrument_node="">
</span><a class="cat" data-dcnode-id="1204" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//apologeticspress.org/category/doctrinal-matters/"><span data-dcnode-id="1205" instrument_node="">
                    Doctrinal Matters
                </span></a><span data-dcnode-id="1203" instrument_node="">
</span><a class="cat" data-dcnode-id="1201" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//apologeticspress.org/category/inspiration-of-the-bible/"><span data-dcnode-id="1202" instrument_node="">
                    Inspiration of the Bible
                </span></a><span data-dcnode-id="1200" instrument_node="">
</span></div><span data-dcnode-id="1198" instrument_node="">
</span><div class="richtext" data-dcnode-id="1022"><span data-dcnode-id="1197" instrument_node="">
</span><p data-dcnode-id="1195"><span data-dcnode-id="1196" instrument_node="">
	Eight minutes and 18 seconds into his 15-minute opening speech during our February 12, 2009 Darwin Day debate, Dan Barker claimed that the God of the Bible cannot exist because biblical teachings regarding killing are contradictory. He stated:</span></p><span data-dcnode-id="1194" instrument_node="">
</span><blockquote data-dcnode-id="1189"><span data-dcnode-id="1193" instrument_node="">
</span><p data-dcnode-id="1191"><span data-dcnode-id="1192" instrument_node="">
		In Exodus 20:13, in the Ten Commandments: “Thou shalt not kill.” In Leviticus 24:17 a different phrasing of it with a different Hebrew word: “He that killeth any man shall surely be put to death.” However, we find in Exodus 32: “Thus says the Lord God, ‘Put every man his sword by his side, slay every man his brother, his companion and neighbor.” First Samuel 6: “The people lamented because the Lord had smitten many of the people with a great slaughter.” The Bible is filled with examples of the biblical God committing, commanding, and condoning killing. The God of the Bible says “Don’t kill.” The God of the Bible says “Kill.” He does not exist (Butt and Barker, 2009).</span></p><span data-dcnode-id="1190" instrument_node="">
</span></blockquote><span data-dcnode-id="1188" instrument_node="">
</span><p data-dcnode-id="1186"><span data-dcnode-id="1187" instrument_node="">
	Is it true that the biblical position on killing is hopelessly contradictory and can be used as evidence that the God of the Bible cannot exist? Certainly not. The biblical injunctions about killing and murder are in perfect harmony with themselves, and with the principles of justice, and cannot be used as evidence against the God of the Bible.</span></p><span data-dcnode-id="1185" instrument_node="">
</span><p data-dcnode-id="1183"><span data-dcnode-id="1184" instrument_node="">
	First, according to Dan, the command to avoid killing in the Ten Commandments is a blanket statement that includes avoiding every type of killing. Yet, we must consider that just one chapter later, in Exodus 21:12-17, we read several injunctions pertaining to capital punishment in which the death sentence is permitted for those who premeditatively murder another person due to malice, who kidnap a person to sell him, or who curse their father or mother. The original readers understood that the commandment in Exodus 20:13 did not mean that all killing was wrong, including capital punishment. They understood that certain qualifications, as are detailed in the rest of the Law, put limits, restrictions, and allowances on the term “kill.” Barker would have us to believe that whoever wrote the book of Exodus was so ignorant that he did not catch contradictory statements that are separated by less than one chapter. Yet, such an idea is ridiculous in light of the remarkable accuracy and acumen of the Old Testament instructions (see Butt, 2008) that were used by the Jewish community for almost 1,500 years, many of which were the basis for the legal codes of modern nations. The arrogance of the current atheistic community to assume that the original readers of the Old Testament were so dim-witted as to accept contradictory statements less than a chapter apart is astounding. If a statement about killing is made, and then within a few verses, the statement is qualified and expounded upon, the allegation that all killing is being included in the original instruction cannot be maintained.</span></p><span data-dcnode-id="1182" instrument_node="">
</span><p data-dcnode-id="1174"><span data-dcnode-id="1181" instrument_node="">
	Second, Barker frequently uses this alleged contradiction in his writings as well as his debates. In his book, </span><em data-dcnode-id="1179"><span data-dcnode-id="1180" instrument_node="">godless</span></em><span data-dcnode-id="1178" instrument_node="">, he claimed that the commandment in Exodus 20:13 cannot be translated “Thou shalt not murder,” because the Hebrew word </span><em data-dcnode-id="1176"><span data-dcnode-id="1177" instrument_node="">ratsach</span></em><span data-dcnode-id="1175" instrument_node=""> sometimes means something other than murder. To prove his point, he listed the following five Hebrew words most commonly translated as “kill” or “murder”:</span></p><span data-dcnode-id="1173" instrument_node="">
</span><blockquote data-dcnode-id="1141"><span data-dcnode-id="1172" instrument_node="">
</span><p data-dcnode-id="1167"><span data-dcnode-id="1171" instrument_node="">
</span><em data-dcnode-id="1169"><span data-dcnode-id="1170" instrument_node="">muth</span></em><span data-dcnode-id="1168" instrument_node="">: (825) die, slay, put to death, kill</span></p><span data-dcnode-id="1166" instrument_node="">
</span><p data-dcnode-id="1161"><span data-dcnode-id="1165" instrument_node="">
</span><em data-dcnode-id="1163"><span data-dcnode-id="1164" instrument_node="">nakah</span></em><span data-dcnode-id="1162" instrument_node="">: (502) smite, kill, slay, beat, wound, murder</span></p><span data-dcnode-id="1160" instrument_node="">
</span><p data-dcnode-id="1155"><span data-dcnode-id="1159" instrument_node="">
</span><em data-dcnode-id="1157"><span data-dcnode-id="1158" instrument_node="">harag</span></em><span data-dcnode-id="1156" instrument_node="">: (172) slay, kill, murder, destroy</span></p><span data-dcnode-id="1154" instrument_node="">
</span><p data-dcnode-id="1149"><span data-dcnode-id="1153" instrument_node="">
</span><em data-dcnode-id="1151"><span data-dcnode-id="1152" instrument_node="">zabach</span></em><span data-dcnode-id="1150" instrument_node=""> (140) sacrifice, kill</span></p><span data-dcnode-id="1148" instrument_node="">
</span><p data-dcnode-id="1143"><span data-dcnode-id="1147" instrument_node="">
</span><em data-dcnode-id="1145"><span data-dcnode-id="1146" instrument_node="">ratsach</span></em><span data-dcnode-id="1144" instrument_node=""> (47) slay [23], murder [17], kill [6], be put to death [1] (Barker, 2008, p. 204).</span></p><span data-dcnode-id="1142" instrument_node="">
</span></blockquote><span data-dcnode-id="1140" instrument_node="">
</span><p data-dcnode-id="1135"><span data-dcnode-id="1139" instrument_node="">
	To further “prove” his point, he listed several places in the Old Testament in which the term </span><em data-dcnode-id="1137"><span data-dcnode-id="1138" instrument_node="">ratsach</span></em><span data-dcnode-id="1136" instrument_node="">, means something other than murder. He cited Deuteronomy 4:42, a verse that uses the term to refer to involuntary manslaughter. He also noted Numbers 35:30-31, in which the term is used for the justifiable capital punishment inflicted on a murderer. Barker’s contention, then, is that if the term can ever be used to mean something besides murder, then it must be used that way in Exodus 20:13.</span></p><span data-dcnode-id="1134" instrument_node="">
</span><p data-dcnode-id="1108"><span data-dcnode-id="1133" instrument_node="">
	The fatal flaw in Barker’s assertion is that of equivocation. “Equivocation is classified as both a formal and informal fallacy. It is the misleading use of a term with more than one meaning or sense (</span><strong data-dcnode-id="1131"><span data-dcnode-id="1132" instrument_node="">by glossing over which meaning is intended at a particular time</span></strong><span data-dcnode-id="1130" instrument_node="">)” (“Equivocation,” 2009, emp. added). [NOTE: Although Wikipedia is not usually considered a scholarly source, equivocation is a commonly used concept and Wikipedia’s wording was the most concise and clear of the various sources consulted.] Notice how Barker is equivocating in this instance. He is rightly saying that the term </span><em data-dcnode-id="1128"><span data-dcnode-id="1129" instrument_node="">ratsach</span></em><span data-dcnode-id="1127" instrument_node=""> </span><strong data-dcnode-id="1125"><span data-dcnode-id="1126" instrument_node="">might </span></strong><span data-dcnode-id="1124" instrument_node="">be used for justified killing like capital punishment, but he is insisting that this definition </span><strong data-dcnode-id="1122"><span data-dcnode-id="1123" instrument_node="">must</span></strong><span data-dcnode-id="1121" instrument_node=""> be used in Exodus 20:13. Yet, when we see the other definitions, such as murder, for the word </span><em data-dcnode-id="1119"><span data-dcnode-id="1120" instrument_node="">ratsach</span></em><span data-dcnode-id="1118" instrument_node=""> that are available, we realize that the definition of murder fits the context of Exodus 20:13, not the concept of justifiable killing such as capital punishment. By forcing the word </span><em data-dcnode-id="1116"><span data-dcnode-id="1117" instrument_node="">ratsach</span></em><span data-dcnode-id="1115" instrument_node=""> to have the same definition in all places, Dan alleges to have found a contradiction. Dan stated: “Modern preacher must be smarter than Hebrew translators if they claim that </span><em data-dcnode-id="1113"><span data-dcnode-id="1114" instrument_node="">ratsach</span></em><span data-dcnode-id="1112" instrument_node=""> means “murder” exclusively” (1992, pp. 207-208). But the claim is not that the word means murder exclusively, but that in the context of Exodux 20:13 the context shows that the word means murder. In truth, Barker must be smarter than the entire Hebrew nation and all linguists since the time of the Bible’s writing to be able to prove that </span><em data-dcnode-id="1110"><span data-dcnode-id="1111" instrument_node="">ratsach</span></em><span data-dcnode-id="1109" instrument_node=""> cannot mean murder in Exodus 20:13, when both the context and standard meanings of the word allow for such to be the case. His logical fallacy of equivocation, however, is plain to see and is inexcusable for a man who has been studying his Bible and debating for as many years as Dan has.</span></p><span data-dcnode-id="1107" instrument_node="">
</span><p data-dcnode-id="1105"><span data-dcnode-id="1106" instrument_node="">
	The only proper way to determine the meaning of a word with multiple meanings is to look at the context. In the context of Exodus 20:13 and other injunctions to avoid “killing,” the clear meaning is that some types of killing, such as premeditated murder out of malice, are forbidden, while other types of killing, such as that done by the government as punishment for certain wrong doings, are permissible.</span></p><span data-dcnode-id="1104" instrument_node="">
</span><p data-dcnode-id="1102"><span data-dcnode-id="1103" instrument_node="">
	The use of our English word “kill” provides a good example of how words can be used. Suppose we say: “It is wrong to kill your neighbor,” but then we say, “It is not always wrong for a policeman to kill his neighbor.” Are these two statements contradictory? No. Not if in the first instance we use “kill” to mean intentionally, premeditatively killing out of malice, etc., but in the second we mean the policeman may shoot his neighbor if the neighbor was shooting at him, was holding hostages at gunpoint, etc. Biblical statements about killing, murder, and capital punishment are not contradictory.</span></p><span data-dcnode-id="1101" instrument_node="">
</span><p data-dcnode-id="1087"><span data-dcnode-id="1100" instrument_node="">
	Besides this alleged contradiction, Dan and his fellow atheists also contend that it is unfair for God to be in the position to decide when killing is justifiable or not. They contend that humans should have the same prerogative about deciding who lives and dies as God should have. Thus, they say, God cannot be in a position to determine when killing is justified if humans are not in this same position—the same rules must apply to God as to all humans. Barker opined: “Why is God special?” (2008, p. 204). Atheists continually overlook, however, the concept of authorization. Not everyone has the same authority to administer punishment. While it is true that a thief might deserve 10 years in prison, an </span><strong data-dcnode-id="1098"><span data-dcnode-id="1099" instrument_node="">individual</span></strong><span data-dcnode-id="1097" instrument_node=""> cannot capture the thief, lock him in his basement for ten years and be considered moral. Only the government has the right to try the thief, find him guilty, and sentence him to prison. A </span><strong data-dcnode-id="1095"><span data-dcnode-id="1096" instrument_node="">vigilante</span></strong><span data-dcnode-id="1094" instrument_node=""> cannot break into a federal penitentiary and kill all the inmates on death row, even though they are sentenced to death. Why? Because that individual does not have the </span><strong data-dcnode-id="1092"><span data-dcnode-id="1093" instrument_node="">authorization</span></strong><span data-dcnode-id="1091" instrument_node=""> to kill those people. God has authority over life and death because He gives it, and he knows all the thoughts of those committing crimes and all the consequences of the punishment He administers (see </span><a data-dcnode-id="1089" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//apologeticspress.org/apcontent.aspx%3Fcategory%3D12%26article%3D1173"><span data-dcnode-id="1090" instrument_node="">Butt</span></a><span data-dcnode-id="1088" instrument_node="">, 2004). The atheists’ contention that God and humans have the same prerogative over matters of life and death is logically flawed.</span></p><span data-dcnode-id="1086" instrument_node="">
</span><p data-dcnode-id="1084"><span data-dcnode-id="1085" instrument_node="">
	In conclusion, the biblical instructions regarding killing, when viewed in context and not equivocated, are clearly harmonious and without contradiction. Certain types of killing, such as premeditated murder done out of malice, are easily identified from the context as forbidden killing. While capital punishment administered by the proper authority is clearly not under discussion in the biblical statements against “killing.” Alleged Bible contradictions that exhibit such poor scholarship and dishonesty should be viewed by the reasonable observer as evidence against atheism and for the Bible’s accuracy and unity.</span></p><span data-dcnode-id="1083" instrument_node="">
