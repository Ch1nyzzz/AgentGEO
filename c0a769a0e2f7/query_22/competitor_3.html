</span></ul></div></div><div class="sticky_placeholder" data-dcnode-id="1291" style="height: 51px;"></div><div class="main_color av_default_container_wrap container_wrap fullsize" data-dcnode-id="96" id="after_submenu"><div class="container" data-dcnode-id="98"><div class="template-page content av-content-full alpha units" data-dcnode-id="103"><div class="post-entry post-entry-type-page post-entry-361" data-dcnode-id="104"><div class="entry-content-wrapper clearfix" data-dcnode-id="105"><span data-dcnode-id="1290" instrument_node="">
</span><div class="flex_column_table av-equal-height-column-flextable -flextable" data-dcnode-id="418"><div class="flex_column av_three_fourth flex_column_table_cell av-equal-height-column av-align-top av-zero-column-padding first avia-builder-el-3 el_after_av_submenu el_before_av_one_fourth avia-builder-el-first" data-dcnode-id="770" style="border-radius:0px; "><section class="av_textblock_section" data-dcnode-id="771" itemscope="itemscope" itemtype="https://schema.org/CreativeWork"><div class="avia_textblock" data-dcnode-id="772" itemprop="text"><h1 data-dcnode-id="1288" id="Queen-Vashti-deposed" style="text-align: center;"><span data-dcnode-id="1289" instrument_node="">Paintings of Judith in the Bible</span></h1><span data-dcnode-id="1287" instrument_node="">
</span><hr data-dcnode-id="1286"><span data-dcnode-id="1285" instrument_node="">
</span><h2 data-dcnode-id="1283" style="text-align: center;"><span data-dcnode-id="1284" instrument_node="">Hidden meanings in paintings of Judith</span></h2><span data-dcnode-id="1282" instrument_node="">
</span><ul data-dcnode-id="1257"><span data-dcnode-id="1281" instrument_node="">
</span><li data-dcnode-id="1275"><strong data-dcnode-id="1279"><span data-dcnode-id="1280" instrument_node="">Watch for symbolic colors in the paintings: red means sexual passion; white is purity of behaviour or intent; gold is nobility;</span></strong><img alt="Bible Judith Paintings. Caravaggio" class="alignright wp-image-10574" data-dcnode-id="1278" height="213" loading="lazy" sizes="(max-width: 213px) 100vw, 213px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.womeninthebible.net/wp-content/uploads/2016/02/Judith_Bible_263.jpg&amp;raw" srcset="https://womeninthebible.net/wp-content/uploads/2016/02/Judith_Bible_263.jpg 263w, https://womeninthebible.net/wp-content/uploads/2016/02/Judith_Bible_263-80x80.jpg 80w, https://womeninthebible.net/wp-content/uploads/2016/02/Judith_Bible_263-36x36.jpg 36w, https://womeninthebible.net/wp-content/uploads/2016/02/Judith_Bible_263-180x180.jpg 180w, https://womeninthebible.net/wp-content/uploads/2016/02/Judith_Bible_263-120x120.jpg 120w" title="Bible Judith Paintings. Caravaggio" width="213"><strong data-dcnode-id="1276"><span data-dcnode-id="1277" instrument_node=""> black is the color of death.</span></strong></li><span data-dcnode-id="1274" instrument_node="">
</span><li data-dcnode-id="1271"><strong data-dcnode-id="1272"><span data-dcnode-id="1273" instrument_node="">The first paintings of Judith, produced in the Middle Ages, showed virtue overcoming vice.</span></strong></li><span data-dcnode-id="1270" instrument_node="">
</span><li data-dcnode-id="1267"><strong data-dcnode-id="1268"><span data-dcnode-id="1269" instrument_node="">During the Renaissance a different theme emerged: Judith was an example of Man’s misfortunes at the hands of&nbsp;scheming Woman. </span></strong></li><span data-dcnode-id="1266" instrument_node="">
</span><li data-dcnode-id="1263"><strong data-dcnode-id="1264"><span data-dcnode-id="1265" instrument_node="">The decapitation of Holofernes has sexual overtones: a man is robbed of his virility by a beautiful woman. </span></strong></li><span data-dcnode-id="1262" instrument_node="">
</span><li data-dcnode-id="1259"><strong data-dcnode-id="1260"><span data-dcnode-id="1261" instrument_node="">In fact, Judith was a Jewish patriotic heroine and a symbol of the Jews’ struggle against their ancient,&nbsp;more powerful, overlords.</span></strong></li><span data-dcnode-id="1258" instrument_node="">
</span></ul><span data-dcnode-id="1256" instrument_node="">
</span><hr data-dcnode-id="1255"><span data-dcnode-id="1254" instrument_node="">
</span><p data-dcnode-id="1251"><strong data-dcnode-id="1252"><span data-dcnode-id="1253" instrument_node="">‘Judith with the Head of Holofernes’, Lucas Cranach, 1530</span></strong></p><span data-dcnode-id="1250" instrument_node="">
</span><p data-dcnode-id="1248"><img alt="BIBLE PAINTINGS. JUDITH, Lucas Cranach, Judith with the head of Holofernes 1530" class="aligncenter wp-image-2069 size-full" data-dcnode-id="1249" height="670" loading="lazy" sizes="(max-width: 421px) 100vw, 421px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.womeninthebible.net/wp-content/uploads/2016/02/Cranach_JudithWithTheHEadoFHolofernes-1.jpg&amp;raw" srcset="https://womeninthebible.net/wp-content/uploads/2016/02/Cranach_JudithWithTheHEadoFHolofernes-1.jpg 421w, https://womeninthebible.net/wp-content/uploads/2016/02/Cranach_JudithWithTheHEadoFHolofernes-1-189x300.jpg 189w" title="BIBLE PAINTINGS. JUDITH, Lucas Cranach, Judith with the head of Holofernes 1530" width="421"></p><span data-dcnode-id="1247" instrument_node="">
</span><p data-dcnode-id="1245"><span data-dcnode-id="1246" instrument_node="">Judith’s right hand holds the sword, instrument of death. The fingers of her left hand are entwined in Holofernes’ hair, as she toys in an absent-minded way with the lifeless head.</span></p><span data-dcnode-id="1244" instrument_node="">
</span><p data-dcnode-id="1241"><strong data-dcnode-id="1242"><span data-dcnode-id="1243" instrument_node="">If you are looking for subtlety, walk on by. Cranach the Elder is not your man.</span></strong></p><span data-dcnode-id="1240" instrument_node="">
</span><p data-dcnode-id="1238"><span data-dcnode-id="1239" instrument_node="">But if you value a strong, no-nonsense message about God, faith and salvation, you may want to look more carefully at Cranach’s work.</span></p><span data-dcnode-id="1237" instrument_node="">
</span><p data-dcnode-id="1234"><strong data-dcnode-id="1235"><span data-dcnode-id="1236" instrument_node="">Cranach was a close friend of Martin Luther (the famous portrait of Luther is by Cranach), and helped promote his ideas – he was a staunch supporter of the Protestant Reformation.</span></strong></p><span data-dcnode-id="1233" instrument_node="">
</span><p data-dcnode-id="1231"><span data-dcnode-id="1232" instrument_node="">The story of Judith struck a chord with the Protestant reformers, since it described the courage of a small nation resisting a tyrant from outside who sought to impose his own beliefs about God on them.</span></p><span data-dcnode-id="1230" instrument_node="">
</span><p data-dcnode-id="1227"><strong data-dcnode-id="1228"><span data-dcnode-id="1229" instrument_node="">The Protestant states cast themselves as Judith, and Catholicism and the Pope as Holofernes.</span></strong></p><span data-dcnode-id="1226" instrument_node="">
</span><p data-dcnode-id="1224"><span data-dcnode-id="1225" instrument_node="">There was also an attempt at this time to balance the preponderance of male heroes in Christian tradition with biblical heroines who could be role models of particular virtues.</span></p><span data-dcnode-id="1223" instrument_node="">
</span><p data-dcnode-id="1220"><strong data-dcnode-id="1221"><span data-dcnode-id="1222" instrument_node="">Cranach’s paintings are always beautiful (as God is) but&nbsp;evil lurks just beneath the surface.</span></strong></p><span data-dcnode-id="1219" instrument_node="">
</span><p data-dcnode-id="1215"><strong data-dcnode-id="1216"><a data-dcnode-id="1217" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.womeninthebible.net/bible-paintings/judith-and-holofernes/judith_bible_story/"><span data-dcnode-id="1218" instrument_node="">See the Bible text for this story</span></a></strong></p><span data-dcnode-id="1214" instrument_node="">
</span><hr data-dcnode-id="1213"><span data-dcnode-id="1212" instrument_node="">
</span><p data-dcnode-id="1209" style="text-align: center;"><strong data-dcnode-id="1210"><span data-dcnode-id="1211" instrument_node="">‘Judith and Holofernes’, Gustav Klimt, 1901-2</span></strong></p><span data-dcnode-id="1208" instrument_node="">
</span><p data-dcnode-id="1206"><img alt="BIBLE PAINTINGS. JUDITH, Gustav Klimt Judith und Holofernes 1901" class="aligncenter wp-image-2057 size-full" data-dcnode-id="1207" height="1024" loading="lazy" sizes="(max-width: 506px) 100vw, 506px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.womeninthebible.net/wp-content/uploads/2016/02/1.15.Judith.Klimt_1901-1.jpg&amp;raw" srcset="https://womeninthebible.net/wp-content/uploads/2016/02/1.15.Judith.Klimt_1901-1.jpg 506w, https://womeninthebible.net/wp-content/uploads/2016/02/1.15.Judith.Klimt_1901-1-148x300.jpg 148w, https://womeninthebible.net/wp-content/uploads/2016/02/1.15.Judith.Klimt_1901-1-348x705.jpg 348w, https://womeninthebible.net/wp-content/uploads/2016/02/1.15.Judith.Klimt_1901-1-450x911.jpg 450w" title="BIBLE PAINTINGS. JUDITH, Gustav Klimt Judith und Holofernes 1901" width="506"></p><span data-dcnode-id="1205" instrument_node="">
</span><p data-dcnode-id="1202"><strong data-dcnode-id="1203"><span data-dcnode-id="1204" instrument_node="">Judith is dressed in the rich clothing and lavish jewellery she wore when she went to meet Holofernes. She is a woman of gold.</span></strong></p><span data-dcnode-id="1201" instrument_node="">
</span><p data-dcnode-id="1197"><strong data-dcnode-id="1199"><span data-dcnode-id="1200" instrument_node="">Does the oversized golden choker at her neck suggest decapitation?</span></strong><span data-dcnode-id="1198" instrument_node=""> Her clothing is disarrayed, but her look is triumphant as she holds the head of her enemy by her side.</span></p><span data-dcnode-id="1196" instrument_node="">
</span><p data-dcnode-id="1192"><span data-dcnode-id="1195" instrument_node="">There are similarities between this Art Nouveau painting and Byzantine icons: </span><strong data-dcnode-id="1193"><span data-dcnode-id="1194" instrument_node="">both make lavish use of gold leaf, both depict female heroines in elongated form.</span></strong></p><span data-dcnode-id="1191" instrument_node="">
</span><p data-dcnode-id="1189"><span data-dcnode-id="1190" instrument_node="">The gold-leaf landscape behind her, with laden palm trees, is reminiscent of ancient Assyrian wall drawings of the Tree of Life.</span></p><span data-dcnode-id="1188" instrument_node="">
</span><p data-dcnode-id="1186"><span data-dcnode-id="1187" instrument_node="">And is that a Star of David above her left shoulder?</span></p><span data-dcnode-id="1185" instrument_node="">
</span><p data-dcnode-id="1181"><strong data-dcnode-id="1182"><a data-dcnode-id="1183" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.womeninthebible.net/bible-paintings/judith-and-holofernes/judith_bible_story/"><span data-dcnode-id="1184" instrument_node="">See the Bible text for this story</span></a></strong></p><span data-dcnode-id="1180" instrument_node="">
</span><hr data-dcnode-id="1179"><span data-dcnode-id="1178" instrument_node="">
</span><div data-dcnode-id="1177" id="Title-Judith"></div><span data-dcnode-id="1176" instrument_node="">
</span><h2 data-dcnode-id="1174" style="text-align: center;"><span data-dcnode-id="1175" instrument_node="">Beheading Holofernes</span></h2><span data-dcnode-id="1173" instrument_node="">
</span><p data-dcnode-id="1170" style="text-align: center;"><strong data-dcnode-id="1171"><span data-dcnode-id="1172" instrument_node="">‘Judith Beheading Holofernes’, Caravaggio, 1599</span></strong></p><span data-dcnode-id="1169" instrument_node="">
</span><p data-dcnode-id="1167"><img alt="BIBLE PAINTINGS. JUDITH Caravaggio Judith Beheading Holofernes" class="aligncenter wp-image-2058 size-full" data-dcnode-id="1168" height="436" loading="lazy" sizes="(max-width: 596px) 100vw, 596px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.womeninthebible.net/wp-content/uploads/2016/02/1.15.Judith_Beheading_Holofernes_Caravaggio-1.jpg&amp;raw" srcset="https://womeninthebible.net/wp-content/uploads/2016/02/1.15.Judith_Beheading_Holofernes_Caravaggio-1.jpg 596w, https://womeninthebible.net/wp-content/uploads/2016/02/1.15.Judith_Beheading_Holofernes_Caravaggio-1-300x219.jpg 300w, https://womeninthebible.net/wp-content/uploads/2016/02/1.15.Judith_Beheading_Holofernes_Caravaggio-1-450x329.jpg 450w" title="BIBLE PAINTINGS. JUDITH Caravaggio Judith Beheading Holofernes" width="596"></p><span data-dcnode-id="1166" instrument_node="">
</span><p data-dcnode-id="1163"><span data-dcnode-id="1165" instrument_node="">Judith has steeled herself to cut into Holofernes’ neck, using his own sword. </span><img alt="Judith Paintings. Detail of Judith's maid beheading Holofernes, by Caravaggio" class="alignright wp-image-2059 size-full" data-dcnode-id="1164" height="380" loading="lazy" sizes="(max-width: 320px) 100vw, 320px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.womeninthebible.net/wp-content/uploads/2016/02/Maid_Judith-1.jpg&amp;raw" srcset="https://womeninthebible.net/wp-content/uploads/2016/02/Maid_Judith-1.jpg 320w, https://womeninthebible.net/wp-content/uploads/2016/02/Maid_Judith-1-253x300.jpg 253w" title="Judith Paintings. Detail of Judith's maid beheading Holofernes, by Caravaggio" width="320"></p><span data-dcnode-id="1162" instrument_node="">
</span><p data-dcnode-id="1160"><span data-dcnode-id="1161" instrument_node="">The maid Abra stands ready to catch the severed head when it falls away.</span></p><span data-dcnode-id="1159" instrument_node="">
</span><p data-dcnode-id="1156"><strong data-dcnode-id="1157"><span data-dcnode-id="1158" instrument_node="">Abra is one of the most over-looked figures in the Old Testament; she is with Judith every step of the way, and clearly gives her not only a servant’s support, but a large measure of courage as well.</span></strong></p><span data-dcnode-id="1155" instrument_node="">
</span><p data-dcnode-id="1153"><span data-dcnode-id="1154" instrument_node="">Caravaggio has painted a magnificent Holofernes, muscled, strong, powerful. His horrified face is the attention-grabbing focus of this picture.</span></p><span data-dcnode-id="1152" instrument_node="">
</span><p data-dcnode-id="1149"><strong data-dcnode-id="1150"><span data-dcnode-id="1151" instrument_node="">Judith, on the other hand, slices his neck with a look of mild distaste, as if she is carving the Sunday roast.</span></strong></p><span data-dcnode-id="1148" instrument_node="">
</span><p data-dcnode-id="1146"><span data-dcnode-id="1147" instrument_node="">The colors, harmonious composition and shading of the painting are superb, as we would expect from Caravaggio.</span></p><span data-dcnode-id="1145" instrument_node="">
</span><p data-dcnode-id="1142"><strong data-dcnode-id="1143"><span data-dcnode-id="1144" instrument_node="">But magnificent as the painting is, it does not convey the ghastly horror of the event.</span></strong></p><span data-dcnode-id="1141" instrument_node="">
</span><p data-dcnode-id="1137"><strong data-dcnode-id="1138"><a data-dcnode-id="1139" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.womeninthebible.net/bible-paintings/judith-and-holofernes/judith_bible_story/"><span data-dcnode-id="1140" instrument_node="">See the Bible text for this story</span></a></strong></p><span data-dcnode-id="1136" instrument_node="">
</span><hr data-dcnode-id="1135"><span data-dcnode-id="1134" instrument_node="">
</span><p data-dcnode-id="1131" style="text-align: center;"><strong data-dcnode-id="1132"><span data-dcnode-id="1133" instrument_node="">‘Judith and her Maidservant’, Artemisia Gentileschi, 1613-14</span></strong></p><span data-dcnode-id="1130" instrument_node="">
</span><p data-dcnode-id="1128"><img alt="BIBLE PAINTINGS. JUDITH Artemisia Gentileschi Judith and her Maidservant" class="aligncenter wp-image-2060 size-full" data-dcnode-id="1129" height="722" loading="lazy" sizes="(max-width: 592px) 100vw, 592px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.womeninthebible.net/wp-content/uploads/2016/02/artemisia_gentileschi_judith-1.jpg&amp;raw" srcset="https://womeninthebible.net/wp-content/uploads/2016/02/artemisia_gentileschi_judith-1.jpg 592w, https://womeninthebible.net/wp-content/uploads/2016/02/artemisia_gentileschi_judith-1-246x300.jpg 246w, https://womeninthebible.net/wp-content/uploads/2016/02/artemisia_gentileschi_judith-1-578x705.jpg 578w, https://womeninthebible.net/wp-content/uploads/2016/02/artemisia_gentileschi_judith-1-450x549.jpg 450w" title="BIBLE PAINTINGS. JUDITH Artemisia Gentileschi Judith and her Maidservant" width="592"></p><span data-dcnode-id="1127" instrument_node="">
</span><p data-dcnode-id="1125"><span data-dcnode-id="1126" instrument_node="">Judith’s maid Abra has gathered up the head of Holofernes in a basket, and they are preparing to leave his tent when they hear something which makes them stop and listen.</span></p><span data-dcnode-id="1124" instrument_node="">
</span><p data-dcnode-id="1121"><strong data-dcnode-id="1122"><span data-dcnode-id="1123" instrument_node="">The danger of their situation is implied by the position of the sword in Judith’s hand: a few more inches and it will cut into her own white throat.</span></strong></p><span data-dcnode-id="1120" instrument_node="">
</span><p data-dcnode-id="1118"><span data-dcnode-id="1119" instrument_node="">Close-ups of the painting show that the brooch in her hair is a picture of a warrior, perhaps the biblical David who is the male equivalent of Judith.</span></p><span data-dcnode-id="1117" instrument_node="">
</span><p data-dcnode-id="1113"><strong data-dcnode-id="1114"><a data-dcnode-id="1115" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.womeninthebible.net/bible-paintings/judith-and-holofernes/judith_bible_story/"><span data-dcnode-id="1116" instrument_node="">See the Bible text for this story</span></a></strong></p><span data-dcnode-id="1112" instrument_node="">
</span><hr data-dcnode-id="1111"><span data-dcnode-id="1110" instrument_node="">
</span><p data-dcnode-id="1107" style="text-align: center;"><strong data-dcnode-id="1108"><span data-dcnode-id="1109" instrument_node="">‘Judith’, Gustav Klimt, 1909</span></strong></p><span data-dcnode-id="1106" instrument_node="">
</span><p data-dcnode-id="1104"><img alt="BIBLE PAINTINGS. JUDITH, Gustav Klimt, Judith" class="aligncenter wp-image-2061 size-full" data-dcnode-id="1105" height="862" loading="lazy" sizes="(max-width: 400px) 100vw, 400px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.womeninthebible.net/wp-content/uploads/2016/02/1.15.Judith.Klimt_.1909.jpg&amp;raw" srcset="https://womeninthebible.net/wp-content/uploads/2016/02/1.15.Judith.Klimt_.1909.jpg 400w, https://womeninthebible.net/wp-content/uploads/2016/02/1.15.Judith.Klimt_.1909-139x300.jpg 139w, https://womeninthebible.net/wp-content/uploads/2016/02/1.15.Judith.Klimt_.1909-327x705.jpg 327w" title="BIBLE PAINTINGS. JUDITH, Gustav Klimt, Judith" width="400"></p><span data-dcnode-id="1103" instrument_node="">
</span><p data-dcnode-id="1100"><strong data-dcnode-id="1101"><span data-dcnode-id="1102" instrument_node="">Judith stands, her fingers clenched in the hair of Holofernes’ head. Her gorgeous robe has fallen away from her body and her hair is disarranged, but she seems calm, oblivious of her surroundings, almost in shock.</span></strong></p><span data-dcnode-id="1099" instrument_node="">
</span><p data-dcnode-id="1097"><span data-dcnode-id="1098" instrument_node="">This painting has often been labeled ‘Salome’, because it depicts a half-naked woman carrying a man’s severed head. In fact, the woman is Judith, not Salome.</span></p><span data-dcnode-id="1096" instrument_node="">
</span><p data-dcnode-id="1093"><strong data-dcnode-id="1094"><span data-dcnode-id="1095" instrument_node="">Though it is an archetypal Art Nouveau painting, there are many similarities with Old Master images of Judith: a remorseless, half-clothed woman, disguised tension in the rigid hands, the sumptuous dress.</span></strong></p><span data-dcnode-id="1092" instrument_node="">
</span><p data-dcnode-id="1088"><strong data-dcnode-id="1089"><a data-dcnode-id="1090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.womeninthebible.net/bible-paintings/judith-and-holofernes/judith_bible_story/"><span data-dcnode-id="1091" instrument_node="">See the Bible text for this story</span></a></strong></p><span data-dcnode-id="1087" instrument_node="">
</span><hr data-dcnode-id="1086"><span data-dcnode-id="1085" instrument_node="">
</span><div data-dcnode-id="1084" id="Carlo-Saraceni"></div><span data-dcnode-id="1083" instrument_node="">
</span><p data-dcnode-id="1080" style="text-align: center;"><strong data-dcnode-id="1081"><span data-dcnode-id="1082" instrument_node="">‘Judith with the Head of Holofernes’, Carlo Saraceni, 1615-20</span></strong></p><span data-dcnode-id="1079" instrument_node="">
</span><p data-dcnode-id="1077"><img alt="Judith with the Head of Holofernes" class="wp-image-7307 size-full aligncenter" data-dcnode-id="1078" height="480" loading="lazy" sizes="(max-width: 397px) 100vw, 397px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.womeninthebible.net/wp-content/uploads/2016/02/shef_msh_vis_3778_slide.jpg&amp;raw" srcset="https://womeninthebible.net/wp-content/uploads/2016/02/shef_msh_vis_3778_slide.jpg 397w, https://womeninthebible.net/wp-content/uploads/2016/02/shef_msh_vis_3778_slide-248x300.jpg 248w" width="397"></p><span data-dcnode-id="1076" instrument_node="">
</span><p data-dcnode-id="1074"><span data-dcnode-id="1075" instrument_node="">The maid’s anxious face looks up for reassurance to Judith, who despite the horror of the situation appears calm, almost serene. She holds the head of Holofernes in her left hand, ready to drop it in the bag held by her maid.</span></p><span data-dcnode-id="1073" instrument_node="">
</span><p data-dcnode-id="1071"><span data-dcnode-id="1072" instrument_node="">The darkness of the painting suggests the secretive nature of what they are doing, the need for stealth.</span></p><span data-dcnode-id="1070" instrument_node="">
</span><p data-dcnode-id="1067"><strong data-dcnode-id="1068"><span data-dcnode-id="1069" instrument_node="">In reality it is unlikely that Judith was as calm as she appears in this picture, but there is an unexpected touch of realism in the way the maid holds the bag. She grips one point between her teeth and makes an opening by holding two other points with her hands – just the way you would to make an opening for a large round object, be it a cabbage or a human head.</span></strong></p><span data-dcnode-id="1066" instrument_node="">
</span><p data-dcnode-id="1061"><span data-dcnode-id="1065" instrument_node="">There are only subtle indications of the violent murder that has just occurred: the reddened fingers that hold Holofernes’ head, and the spatter of blood on Judith’s right temple. </span><strong data-dcnode-id="1063"><span data-dcnode-id="1064" instrument_node="">Subtle, but terrifying</span></strong><span data-dcnode-id="1062" instrument_node="">.</span></p><span data-dcnode-id="1060" instrument_node="">
</span><p data-dcnode-id="1056"><strong data-dcnode-id="1057"><a data-dcnode-id="1058" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.womeninthebible.net/bible-paintings/judith-and-holofernes/judith_bible_story/"><span data-dcnode-id="1059" instrument_node="">See the Bible text for this story</span></a></strong></p><span data-dcnode-id="1055" instrument_node="">
</span><hr data-dcnode-id="1054"><span data-dcnode-id="1053" instrument_node="">
</span><div data-dcnode-id="1052" id="her-Maidservant"></div><span data-dcnode-id="1051" instrument_node="">
</span><p data-dcnode-id="1044" style="text-align: center;"><strong data-dcnode-id="1049"><span data-dcnode-id="1050" instrument_node="">‘Judith and her Maidservant with the Head of Holofernes’</span></strong><br data-dcnode-id="1048"><span data-dcnode-id="1047" instrument_node="">
</span><strong data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node=""> Orazio Gentileschi, (father of Artemisia), 1610-12</span></strong></p><span data-dcnode-id="1043" instrument_node="">
</span><p data-dcnode-id="1041"><img alt="Judith Paintings. The Bible's Judith and her Maidservant with the Head of Holofernes, Orazio Gentileschi, father of Artemisia" class="aligncenter wp-image-2063 size-full" data-dcnode-id="1042" height="416" loading="lazy" sizes="(max-width: 491px) 100vw, 491px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.womeninthebible.net/wp-content/uploads/2016/02/1.15.Judith.Orazio_Gentileschi_JudithwiththeheadofHolofernes_1610-1.jpg&amp;raw" srcset="https://womeninthebible.net/wp-content/uploads/2016/02/1.15.Judith.Orazio_Gentileschi_JudithwiththeheadofHolofernes_1610-1.jpg 491w, https://womeninthebible.net/wp-content/uploads/2016/02/1.15.Judith.Orazio_Gentileschi_JudithwiththeheadofHolofernes_1610-1-300x254.jpg 300w, https://womeninthebible.net/wp-content/uploads/2016/02/1.15.Judith.Orazio_Gentileschi_JudithwiththeheadofHolofernes_1610-1-450x381.jpg 450w" title="Judith Paintings. The Bible's Judith and her Maidservant with the Head of Holofernes, Orazio Gentileschi, father of Artemisia" width="491"></p><span data-dcnode-id="1040" instrument_node="">
</span><p data-dcnode-id="1038"><span data-dcnode-id="1039" instrument_node="">The deed is done – Judith still holds the sword in her hand. Now the fearful women stop to listen, to see if an alarm has been raised.</span></p><span data-dcnode-id="1037" instrument_node="">
</span><p data-dcnode-id="1035"><span data-dcnode-id="1036" instrument_node="">Orazio Gentileschi seems to have been more interested in the woman themselves than in the violent crime they had committed. These two women are not idealized beauties but real people, both with their own personalities and agendas.</span></p><span data-dcnode-id="1034" instrument_node="">
</span><p data-dcnode-id="1031"><strong data-dcnode-id="1032"><span data-dcnode-id="1033" instrument_node="">This makes the painting sharply different from many of the others completed at that time, and may have something to do with the rape of his daughter Artemisia Gentileschi. </span></strong></p><span data-dcnode-id="1030" instrument_node="">
</span><p data-dcnode-id="1027"><strong data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">Artemisia was a real person to her father, not just an unnamed victim of crime.</span></strong></p><span data-dcnode-id="1026" instrument_node="">
</span><p data-dcnode-id="1022"><strong data-dcnode-id="1023"><a data-dcnode-id="1024" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.womeninthebible.net/bible-paintings/judith-and-holofernes/judith_bible_story/"><span data-dcnode-id="1025" instrument_node="">See the Bible text for this story</span></a></strong></p><span data-dcnode-id="1021" instrument_node="">
</span><hr data-dcnode-id="1020"><span data-dcnode-id="1019" instrument_node="">
</span><div data-dcnode-id="1018" id="the-Tent"></div><span data-dcnode-id="1017" instrument_node="">
</span><p data-dcnode-id="1014" style="text-align: center;"><strong data-dcnode-id="1015"><span data-dcnode-id="1016" instrument_node="">‘Judith in the Tent of Holofernes’, Johann Liss, 1622</span></strong></p><span data-dcnode-id="1013" instrument_node="">
</span><p data-dcnode-id="1011"><img alt="BIBLE PAINTINGS. JUDITH,Johan Liss, Judith in the Tent of Holofernes" class="aligncenter wp-image-2064 size-full" data-dcnode-id="1012" height="498" loading="lazy" sizes="(max-width: 400px) 100vw, 400px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.womeninthebible.net/wp-content/uploads/2016/02/1.15.J2-1.jpg&amp;raw" srcset="https://womeninthebible.net/wp-content/uploads/2016/02/1.15.J2-1.jpg 400w, https://womeninthebible.net/wp-content/uploads/2016/02/1.15.J2-1-241x300.jpg 241w" title="BIBLE PAINTINGS. JUDITH,Johan Liss, Judith in the Tent of Holofernes" width="400"></p><span data-dcnode-id="1010" instrument_node="">
</span><p data-dcnode-id="1008"><span data-dcnode-id="1009" instrument_node="">Judith has cut off the head of Holofernes and looks back over her shoulder, out towards the viewer. Her expression is strange – dazed, almost detached. She and her servant Alba are placing the severed head in a basket.</span></p><span data-dcnode-id="1007" instrument_node="">
</span><p data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">Caravaggio’s influence is clearly evident in Liss’s painting – the sumptuous flesh tones, lavish fabrics and dramatic lighting. The twisted gold fabric draws the eye upward towards Judith’s naked back and the ambiguous glance she casts over her shoulder.</span></p><span data-dcnode-id="1004" instrument_node="">
</span><p data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">Holofernes’ hapless body pushes out into the foreground of the painting.</span></p><span data-dcnode-id="1001" instrument_node="">
</span><p data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">An unusual feature of the painting: Judith’s servant Abra is African, not Jewish as you might expect.</span></p><span data-dcnode-id="998" instrument_node="">
</span><p data-dcnode-id="994"><strong data-dcnode-id="995"><a data-dcnode-id="996" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.womeninthebible.net/bible-paintings/judith-and-holofernes/judith_bible_story/"><span data-dcnode-id="997" instrument_node="">See the Bible text for this story</span></a></strong></p><span data-dcnode-id="993" instrument_node="">
</span><hr data-dcnode-id="992"><span data-dcnode-id="991" instrument_node="">
</span><div data-dcnode-id="990" id="Judith-Beheading-Holofernes"></div><span data-dcnode-id="989" instrument_node="">
</span><p data-dcnode-id="986" style="text-align: center;"><strong data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">‘Judith Beheading Holofernes’, Artemisia Gentileschi, circa1612</span></strong></p><span data-dcnode-id="985" instrument_node="">
</span><p data-dcnode-id="983"><img alt="BIBLE PAINTINGS. JUDITH, Artemisia Gentileschi, Judith Beheading Holofernes" class="aligncenter wp-image-2065 size-full" data-dcnode-id="984" height="724" loading="lazy" sizes="(max-width: 585px) 100vw, 585px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.womeninthebible.net/wp-content/uploads/2016/02/Artemisia_Gentileschi_Judith_Decapitating_Holofernes_c1618-1.jpg&amp;raw" srcset="https://womeninthebible.net/wp-content/uploads/2016/02/Artemisia_Gentileschi_Judith_Decapitating_Holofernes_c1618-1.jpg 585w, https://womeninthebible.net/wp-content/uploads/2016/02/Artemisia_Gentileschi_Judith_Decapitating_Holofernes_c1618-1-242x300.jpg 242w, https://womeninthebible.net/wp-content/uploads/2016/02/Artemisia_Gentileschi_Judith_Decapitating_Holofernes_c1618-1-570x705.jpg 570w, https://womeninthebible.net/wp-content/uploads/2016/02/Artemisia_Gentileschi_Judith_Decapitating_Holofernes_c1618-1-450x557.jpg 450w" title="BIBLE PAINTINGS. JUDITH, Artemisia Gentileschi, Judith Beheading Holofernes" width="585"></p><span data-dcnode-id="982" instrument_node="">
</span><p data-dcnode-id="980"><span data-dcnode-id="981" instrument_node="">This is a rare depiction of something other paintings ignore: the fight that Holofernes may or may not have put up when he was being murdered. Here, in the moment of dying, he presses his right hand up against his assailant, attempting to fight her off.</span></p><span data-dcnode-id="979" instrument_node="">
</span><p data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">Judith’s body seems to flinch away – from Holofernes? or from what she is doing? Both, perhaps.</span></p><span data-dcnode-id="976" instrument_node="">
</span><p data-dcnode-id="972"><strong data-dcnode-id="974"><span data-dcnode-id="975" instrument_node="">This painting was made at about the time that Artemisia Gentileschi was raped by her tutor, the Tuscan painter Agostino Tassi.</span></strong><span data-dcnode-id="973" instrument_node=""> There is obviously a certain amount of personal relish in the painting, with underlying themes of castration and impotency.</span></p><span data-dcnode-id="971" instrument_node="">
</span><p data-dcnode-id="968"><strong data-dcnode-id="969"><span data-dcnode-id="970" instrument_node="">The story of Judith must have appealed to Gentileschi, depicting as it did the triumph of female guile over male force.</span></strong></p><span data-dcnode-id="967" instrument_node="">
</span><p data-dcnode-id="963"><strong data-dcnode-id="964"><a data-dcnode-id="965" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.womeninthebible.net/bible-paintings/judith-and-holofernes/judith_bible_story/"><span data-dcnode-id="966" instrument_node="">See the Bible text for this story</span></a></strong></p><span data-dcnode-id="962" instrument_node="">
</span><hr data-dcnode-id="961"><span data-dcnode-id="960" instrument_node="">
</span><div data-dcnode-id="959" id="Holofernes"></div><span data-dcnode-id="958" instrument_node="">
</span><p data-dcnode-id="955" style="text-align: center;"><strong data-dcnode-id="956"><span data-dcnode-id="957" instrument_node="">‘Judith and the head of Holofernes’, Giovanni Baglione, 1608</span></strong></p><span data-dcnode-id="954" instrument_node="">
</span><p data-dcnode-id="952"><img alt="BIBLE PAINTINGS. JUDITH, Giovanni Baglione, Judith and the head of Holofernes" class="aligncenter wp-image-2066 size-full" data-dcnode-id="953" height="599" loading="lazy" sizes="(max-width: 400px) 100vw, 400px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.womeninthebible.net/wp-content/uploads/2016/02/1.15.Judith.lBaglione_Judith_1608-1.jpg&amp;raw" srcset="https://womeninthebible.net/wp-content/uploads/2016/02/1.15.Judith.lBaglione_Judith_1608-1.jpg 400w, https://womeninthebible.net/wp-content/uploads/2016/02/1.15.Judith.lBaglione_Judith_1608-1-200x300.jpg 200w" title="BIBLE PAINTINGS. JUDITH, Giovanni Baglione, Judith and the head of Holofernes" width="400"></p><span data-dcnode-id="951" instrument_node="">
</span><p data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">The body of Holofernes, now separated from his head, seems to writhe in its death throes. A rather winsome Judith has grasped the head by its hair and is moving away from the couch. Her maid looks back in horror at the body.</span></p><span data-dcnode-id="948" instrument_node="">
</span><p data-dcnode-id="945"><strong data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">Contrast this image with Caravaggio’s (above). Judith seems remarkably tranquil in the circumstances, while her maid registers shock and horror. </span></strong></p><span data-dcnode-id="944" instrument_node="">
</span><p data-dcnode-id="940"><strong data-dcnode-id="942"><span data-dcnode-id="943" instrument_node="">But note in particular the different treatment of Holofernes’ body.</span></strong><span data-dcnode-id="941" instrument_node=""> Here in Baglione’s painting the body itself is almost hidden. What we can see of it is distorted and writhing, the head quite separate from the body – altogether, a figure of horror.</span></p><span data-dcnode-id="939" instrument_node="">
</span><p data-dcnode-id="935"><strong data-dcnode-id="936"><a data-dcnode-id="937" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.womeninthebible.net/bible-paintings/judith-and-holofernes/judith_bible_story/"><span data-dcnode-id="938" instrument_node="">See the Bible text for this story</span></a></strong></p><span data-dcnode-id="934" instrument_node="">
</span><hr data-dcnode-id="933"><span data-dcnode-id="932" instrument_node="">
</span><p data-dcnode-id="925" style="text-align: center;"><strong data-dcnode-id="930"><span data-dcnode-id="931" instrument_node="">‘Judith and her Maidservant With the Head of Holofernes’</span></strong><br data-dcnode-id="929"><span data-dcnode-id="928" instrument_node="">
</span><strong data-dcnode-id="926"><span data-dcnode-id="927" instrument_node=""> Artemisia Gentileschi, circa 1625</span></strong></p><span data-dcnode-id="924" instrument_node="">
</span><p data-dcnode-id="922"><img alt="Bible Paintings: Judith and her Maidservant with the Head of Holofernes, Artemisia Gentileschi: Bible Art, Judith" class="aligncenter wp-image-2067 size-full" data-dcnode-id="923" height="771" loading="lazy" sizes="(max-width: 594px) 100vw, 594px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.womeninthebible.net/wp-content/uploads/2016/02/Judith_Holofernes_Artemisia_Gentileschi-1.jpg&amp;raw" srcset="https://womeninthebible.net/wp-content/uploads/2016/02/Judith_Holofernes_Artemisia_Gentileschi-1.jpg 594w, https://womeninthebible.net/wp-content/uploads/2016/02/Judith_Holofernes_Artemisia_Gentileschi-1-231x300.jpg 231w, https://womeninthebible.net/wp-content/uploads/2016/02/Judith_Holofernes_Artemisia_Gentileschi-1-543x705.jpg 543w, https://womeninthebible.net/wp-content/uploads/2016/02/Judith_Holofernes_Artemisia_Gentileschi-1-450x584.jpg 450w" title="Bible Paintings: Judith and her Maidservant with the Head of Holofernes, Artemisia Gentileschi: Bible Art, Judith" width="594"></p><span data-dcnode-id="921" instrument_node="">
</span><p data-dcnode-id="919"><span data-dcnode-id="920" instrument_node="">Judith has killed Holofernes, and now her maid Abra crams the bloody head into a sack, to carry it back to Bethuliah. But they seem to have heard something, and pause, waiting to see if they have been discovered.</span></p><span data-dcnode-id="918" instrument_node="">
</span><p data-dcnode-id="916"><span data-dcnode-id="917" instrument_node="">If they have, they know they will die too.</span></p><span data-dcnode-id="915" instrument_node="">
</span><p data-dcnode-id="911"><strong data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">The tension of the scene is almost palpable.</span></strong><span data-dcnode-id="912" instrument_node=""> Danger is close as Judith and her maid Abra gather up the severed head of Holofernes, preparing to flee from the enemy camp, back to safety in Bethulia. The light and shadow emphasise the imminent danger as Judith and Abra prepare to flee Holofernes’s tent with his severed head.</span></p><span data-dcnode-id="910" instrument_node="">
</span><p data-dcnode-id="907"><strong data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">We can almost smell and feel their fear.</span></strong></p><span data-dcnode-id="906" instrument_node="">
</span><p data-dcnode-id="902"><strong data-dcnode-id="903"><a data-dcnode-id="904" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.womeninthebible.net/bible-paintings/judith-and-holofernes/judith_bible_story/"><span data-dcnode-id="905" instrument_node="">See the Bible text for this story</span></a></strong></p><span data-dcnode-id="901" instrument_node="">
</span><hr data-dcnode-id="900"><span data-dcnode-id="899" instrument_node="">
</span><div data-dcnode-id="898" id="Cristofano-Allori"></div><span data-dcnode-id="897" instrument_node="">
</span><p data-dcnode-id="894" style="text-align: center;"><strong data-dcnode-id="895"><span data-dcnode-id="896" instrument_node="">‘Judith with the head of Holofernes’, Cristofano Allori, 1613</span></strong></p><span data-dcnode-id="893" instrument_node="">
</span><p data-dcnode-id="891"><img alt="BIBLE PAINTINGS. JUDITH Cristofano Allori 1613, Judith with the head of Holofernes" class="aligncenter wp-image-2068 size-full" data-dcnode-id="892" height="599" loading="lazy" sizes="(max-width: 503px) 100vw, 503px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.womeninthebible.net/wp-content/uploads/2016/02/Judith_with_the_Head_of_Holofernes_1613_Cristofano_Allori-1.jpg&amp;raw" srcset="https://womeninthebible.net/wp-content/uploads/2016/02/Judith_with_the_Head_of_Holofernes_1613_Cristofano_Allori-1.jpg 503w, https://womeninthebible.net/wp-content/uploads/2016/02/Judith_with_the_Head_of_Holofernes_1613_Cristofano_Allori-1-252x300.jpg 252w, https://womeninthebible.net/wp-content/uploads/2016/02/Judith_with_the_Head_of_Holofernes_1613_Cristofano_Allori-1-450x536.jpg 450w" title="BIBLE PAINTINGS. JUDITH Cristofano Allori 1613, Judith with the head of Holofernes" width="503"></p><span data-dcnode-id="890" instrument_node="">
</span><p data-dcnode-id="888"><span data-dcnode-id="889" instrument_node="">Judith has hacked off the head of Holofernes and now puts away the sword she used to do the deed. Her maid Abra&nbsp;leans anxiously towards her, protectively, urging the dazed Judith to move with more speed.</span></p><span data-dcnode-id="887" instrument_node="">
</span><p data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">The head of Holofernes is said to be a portrait of the artist, and the woman in the picture was modeled on his mistress, a famous beauty called Mazzafirra.</span></p><span data-dcnode-id="884" instrument_node="">
</span><p data-dcnode-id="881"><strong data-dcnode-id="882"><span data-dcnode-id="883" instrument_node=""> Perhaps the painting is a comment on the balance of power within their own relationship – she having conquered him and now holding him helpless in her grip. His face is already drained of color, a dramatic contrast to the rich material of her robe.</span></strong></p><span data-dcnode-id="880" instrument_node="">
</span><p data-dcnode-id="876"><strong data-dcnode-id="877"><a data-dcnode-id="878" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.womeninthebible.net/bible-paintings/judith-and-holofernes/judith_bible_story/"><span data-dcnode-id="879" instrument_node="">See the Bible text for this story</span></a></strong></p><span data-dcnode-id="875" instrument_node="">
</span><div data-dcnode-id="874" id="of-Holofernes"></div><span data-dcnode-id="873" instrument_node="">
</span><hr data-dcnode-id="872"><span data-dcnode-id="871" instrument_node="">
</span><p data-dcnode-id="864" style="text-align: center;"><strong data-dcnode-id="869"><span data-dcnode-id="870" instrument_node="">Judith with the head of Holofernes, stained glass window</span></strong><br data-dcnode-id="868"><span data-dcnode-id="867" instrument_node="">
</span><strong data-dcnode-id="865"><span data-dcnode-id="866" instrument_node=""> Diane-Blair Goodpasture, 2010</span></strong></p><span data-dcnode-id="863" instrument_node="">
</span><p data-dcnode-id="861"><img alt="Diane Goodpasture, Judith with the head of Holofernes, stained glass" class="aligncenter wp-image-2070 size-full" data-dcnode-id="862" height="398" loading="lazy" sizes="(max-width: 295px) 100vw, 295px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.womeninthebible.net/wp-content/uploads/2016/02/DianeGoodpastureJudith-1.jpg&amp;raw" srcset="https://womeninthebible.net/wp-content/uploads/2016/02/DianeGoodpastureJudith-1.jpg 295w, https://womeninthebible.net/wp-content/uploads/2016/02/DianeGoodpastureJudith-1-222x300.jpg 222w" title="Diane Goodpasture, Judith with the head of Holofernes, stained glass" width="295"></p><span data-dcnode-id="860" instrument_node="">
</span><p data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">Judith holds the recently severed head of Holofernes by its hair. His sword, which she used to kill him, is smeared with his own blood. Her dress, too, is spattered.</span></p><span data-dcnode-id="857" instrument_node="">
</span><p data-dcnode-id="855"><span data-dcnode-id="856" instrument_node="">An ignoble end for a famous warrior, killed by his own sword.</span></p><span data-dcnode-id="854" instrument_node="">
</span><p data-dcnode-id="850"><span data-dcnode-id="853" instrument_node="">Judith is lavishly dressed, with a jewelled head-dress enclosing her thick hair. </span><strong data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">Compare the two faces: hers blank – with shock? His ghastly in death.</span></strong></p><span data-dcnode-id="849" instrument_node="">
</span><p data-dcnode-id="846"><strong data-dcnode-id="847"><span data-dcnode-id="848" instrument_node="">Behind Judith are two things: the all-seeing eye of God, and the Hebrew letter ‘yod’ which is symbolic of the name of God – Marc Chagall uses this same device in his paintings.</span></strong></p><span data-dcnode-id="845" instrument_node="">
</span><p data-dcnode-id="841"><strong data-dcnode-id="842"><a data-dcnode-id="843" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.womeninthebible.net/bible-paintings/judith-and-holofernes/judith_bible_story/"><span data-dcnode-id="844" instrument_node="">See the Bible text for this story</span></a></strong></p><span data-dcnode-id="840" instrument_node="">
</span><hr data-dcnode-id="839"><span data-dcnode-id="838" instrument_node="">
</span><div data-dcnode-id="837" id="Judith-with-the-head"></div><span data-dcnode-id="836" instrument_node="">
</span><p data-dcnode-id="833" style="text-align: center;"><strong data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">‘Judith with the head of Holofernes’, Titian, circa 1515</span></strong></p><span data-dcnode-id="832" instrument_node="">
</span><p data-dcnode-id="830"><img alt="BIBLE PAINTINGS. JUDITH, Titian. Judith with the head of Holofernes 1515" class="aligncenter wp-image-2071 size-full" data-dcnode-id="831" height="711" loading="lazy" sizes="(max-width: 582px) 100vw, 582px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.womeninthebible.net/wp-content/uploads/2016/02/1.15.Judith.Titian_1515-1.jpg&amp;raw" srcset="https://womeninthebible.net/wp-content/uploads/2016/02/1.15.Judith.Titian_1515-1.jpg 582w, https://womeninthebible.net/wp-content/uploads/2016/02/1.15.Judith.Titian_1515-1-246x300.jpg 246w, https://womeninthebible.net/wp-content/uploads/2016/02/1.15.Judith.Titian_1515-1-577x705.jpg 577w, https://womeninthebible.net/wp-content/uploads/2016/02/1.15.Judith.Titian_1515-1-450x550.jpg 450w" title="BIBLE PAINTINGS. JUDITH, Titian. Judith with the head of Holofernes 1515" width="582"></p><span data-dcnode-id="829" instrument_node="">
</span><p data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">Judith has cut off the head of the enemy general Holofernes, and now prepares to carry it back to the townspeople of Bethuliah.</span></p><span data-dcnode-id="826" instrument_node="">
</span><p data-dcnode-id="823"><strong data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">There has been some argument about the identity of the woman in this painting. The confusion arose because the decapitated head is carried on a silver platter, traditionally the way that John the Baptist is depicted. This would then make the woman Salome.</span></strong></p><span data-dcnode-id="822" instrument_node="">
</span><p data-dcnode-id="820"><span data-dcnode-id="821" instrument_node="">But the adoring expression on the face of the second woman suggests that she is Abla, Judith’s servant, and this seems more likely.</span></p><span data-dcnode-id="819" instrument_node="">
</span><p data-dcnode-id="817"><span data-dcnode-id="818" instrument_node="">It is generally accepted now that this is, in fact, a painting of Judith, done at the beginning of Titian’s career.</span></p><span data-dcnode-id="816" instrument_node="">
</span><p data-dcnode-id="812"><strong data-dcnode-id="813"><a data-dcnode-id="814" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.womeninthebible.net/bible-paintings/judith-and-holofernes/judith_bible_story/"><span data-dcnode-id="815" instrument_node="">See the Bible text for this story</span></a></strong></p><span data-dcnode-id="811" instrument_node="">
</span><hr data-dcnode-id="810"><span data-dcnode-id="809" instrument_node="">
</span><p data-dcnode-id="806" style="text-align: center;"><strong data-dcnode-id="807"><span data-dcnode-id="808" instrument_node="">‘Judith’, Vicenzo Catena, 1520</span></strong></p><span data-dcnode-id="805" instrument_node="">
</span><p data-dcnode-id="803"><img alt="Judith in the Bible, paintings, CATENA, Vincenzo (b. ca. 1480, Venezia, d. 1531, Venezia) Judith 1520-25 Oil on panel, 82 x 65 cm Fondazione Querini Szampalia, Venice The young woman tenacious chastity is defended by a huge sword. --- Keywords: -------------- Author: CATENA, Vincenzo Title: Judith Time-line: 1501-1550 School: Italian " class="aligncenter wp-image-2072 size-full" data-dcnode-id="804" height="692" loading="lazy" sizes="(max-width: 548px) 100vw, 548px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.womeninthebible.net/wp-content/uploads/2016/02/Vicenzo_Catena_Judith-1.jpg&amp;raw" srcset="https://womeninthebible.net/wp-content/uploads/2016/02/Vicenzo_Catena_Judith-1.jpg 548w, https://womeninthebible.net/wp-content/uploads/2016/02/Vicenzo_Catena_Judith-1-238x300.jpg 238w, https://womeninthebible.net/wp-content/uploads/2016/02/Vicenzo_Catena_Judith-1-450x568.jpg 450w" title="Judith in the Bible, paintings, CATENA, Vincenzo (b. ca. 1480, Venezia, d. 1531, Venezia) Judith 1520-25 Oil on panel, 82 x 65 cm Fondazione Querini Szampalia, Venice The young woman tenacious chastity is defended by a huge sword. --- Keywords: -------------- Author: CATENA, Vincenzo Title: Judith Time-line: 1501-1550 School: Italian" width="548"></p><span data-dcnode-id="802" instrument_node="">
</span><p data-dcnode-id="800"><span data-dcnode-id="801" instrument_node="">This painting of Judith is quite different to most others on the subject. She is dressed in white, the color of chastity, and the sword stands firmly between her body and Holofernes’ head.</span></p><span data-dcnode-id="799" instrument_node="">
</span><p data-dcnode-id="797"><span data-dcnode-id="798" instrument_node="">The picture contains a message about her chastity, which the Bible says she retained despite every effort on Holofernes’ part to seduce her.</span></p><span data-dcnode-id="796" instrument_node="">
</span><p data-dcnode-id="793"><strong data-dcnode-id="794"><span data-dcnode-id="795" instrument_node="">This is no seductress, but a determined heroine.</span></strong></p><span data-dcnode-id="792" instrument_node="">
</span><p data-dcnode-id="788"><strong data-dcnode-id="789"><a data-dcnode-id="790" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.womeninthebible.net/bible-paintings/judith-and-holofernes/judith_bible_story/"><span data-dcnode-id="791" instrument_node="">See the Bible text for this story</span></a></strong></p><span data-dcnode-id="787" instrument_node="">
</span><div data-dcnode-id="786" id="reference"></div><span data-dcnode-id="785" instrument_node="">
</span><hr data-dcnode-id="784"><span data-dcnode-id="783" instrument_node="">

</span><section class="av_textblock_section" data-dcnode-id="527" itemscope="itemscope" itemtype="https://schema.org/CreativeWork"><div class="avia_textblock" data-dcnode-id="528" itemprop="text"><p data-dcnode-id="534" style="text-align: center;"><span data-dcnode-id="535" instrument_node="">When Judith came into the tent and lay down on the sheepskins, Holofernes was besotted. He offered her something to drink, but she drank only the wine given to her by her maid – was it watered down so she could stay sober? Holofernes, on the other hand, got down to some serious drinking.’</span></p><span data-dcnode-id="533" instrument_node="">

</span><section class="av_textblock_section" data-dcnode-id="503" itemscope="itemscope" itemtype="https://schema.org/CreativeWork"><div class="avia_textblock" data-dcnode-id="504" itemprop="text"><p data-dcnode-id="511" style="text-align: center;"><span data-dcnode-id="514" instrument_node="">Nebuchadnezzar was the King of Babylon, and ‘Babylon’ became code for depravity, cruelty and paganism.</span><br data-dcnode-id="513"><span data-dcnode-id="512" instrument_node="">
Nebuchadnezzar is mentioned in the Bible because he met and terrified King Jehoiakim of Judah, who paid tribute to him and acknowledged him as Judah’s master. Of course, Jehoiakim had little choice in the matter – Nebuchadnezzar’s resources were immense, and little Judah stood no chance at all against him.</span></p><span data-dcnode-id="510" instrument_node="">
</span><p data-dcnode-id="506" style="text-align: center;"><strong data-dcnode-id="507"><a data-dcnode-id="508" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.womeninthebible.net/10-bad-bible-men/" rel="noopener" target="_blank"><span data-dcnode-id="509" instrument_node="">Bible’s Top Villains</span></a></strong></p><span data-dcnode-id="505" instrument_node="">
</span></div></section><span data-dcnode-id="502" instrument_node="">

</span><section class="av_textblock_section" data-dcnode-id="489" itemscope="itemscope" itemtype="https://schema.org/CreativeWork"><div class="avia_textblock" data-dcnode-id="490" itemprop="text"><p data-dcnode-id="492" style="text-align: center;"><span data-dcnode-id="493" instrument_node="">The Israelites were at a disadvantage because the Philistine overlords did not allow them to have metal-working facilities. This meant they could never have weapons that matched their enemy’s. If they had swords, they were always inferior to the ones wielded by their adversaries, and could only be used as backup weapons.</span></p><span data-dcnode-id="491" instrument_node="">
</span></div></section><span data-dcnode-id="488" instrument_node="">

</span><section class="av_textblock_section" data-dcnode-id="448" itemscope="itemscope" itemtype="https://schema.org/CreativeWork"><div class="avia_textblock" data-dcnode-id="449" itemprop="text"><p data-dcnode-id="459" style="text-align: center;"><strong data-dcnode-id="460"><a data-dcnode-id="461" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.womeninthebible.net/women-bible-old-new-testaments/judith/"><span data-dcnode-id="462" instrument_node="">Judith’s Story</span></a></strong></p><span data-dcnode-id="458" instrument_node="">
</span><p data-dcnode-id="451" style="text-align: center;"><span data-dcnode-id="457" instrument_node="">At great personal risk she went into the enemy camp of Holofernes. He had a fearsome reputation, but she charmed him, holding his sexual advances at bay.</span><br data-dcnode-id="456"><span data-dcnode-id="455" instrument_node="">
</span><strong data-dcnode-id="452"><a data-dcnode-id="453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.womeninthebible.net/women-bible-old-new-testaments/judith/"><span data-dcnode-id="454" instrument_node="">Read more… </span></a></strong></p><span data-dcnode-id="450" instrument_node="">

</span><section class="av_textblock_section" data-dcnode-id="420" itemscope="itemscope" itemtype="https://schema.org/CreativeWork"><div class="avia_textblock" data-dcnode-id="421" itemprop="text"><p data-dcnode-id="432" style="text-align: center;"><strong data-dcnode-id="433"><a data-dcnode-id="434" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.womeninthebible.net/women-bible-old-new-testaments/judith/judith-bible-text/"><span data-dcnode-id="435" instrument_node="">Scripture</span></a></strong></p><span data-dcnode-id="431" instrument_node="">
</span><p data-dcnode-id="423" style="text-align: center;"><span data-dcnode-id="430" instrument_node="">She came close to his bed, took hold of the hair of his head, and said, ‘Give me strength today, O Lord God of Israel!’ Then she struck his neck twice with all her might, and cut off his head.</span><br data-dcnode-id="429"><span data-dcnode-id="428" instrument_node="">
</span><a data-dcnode-id="424" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.womeninthebible.net/women-bible-old-new-testaments/judith/judith-bible-text/"><strong data-dcnode-id="426"><span data-dcnode-id="427" instrument_node="">Read more…</span></strong><span data-dcnode-id="425" instrument_node=""> </span></a></p><span data-dcnode-id="422" instrument_node="">
