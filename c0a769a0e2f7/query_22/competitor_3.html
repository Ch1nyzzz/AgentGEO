</span><div class="flex_column_table av-equal-height-column-flextable -flextable" data-dcnode-id="230"><div class="flex_column av_three_fourth flex_column_table_cell av-equal-height-column av-align-top av-zero-column-padding first avia-builder-el-43 el_after_av_one_fourth el_before_av_three_fourth column-top-margin" data-dcnode-id="231" style="border-radius:0px; "><section class="av_textblock_section" data-dcnode-id="232" itemscope="itemscope" itemtype="https://schema.org/CreativeWork"><div class="avia_textblock" data-dcnode-id="233" itemprop="text"><p data-dcnode-id="413"><strong data-dcnode-id="414"><span data-dcnode-id="415" instrument_node="">‘Judith with the head of Holofernes’, Titian, 1570</span></strong></p><span data-dcnode-id="412" instrument_node="">
</span><p data-dcnode-id="410"><img alt="BIBLE PAINTINGS. JUDITH, Titian, Judith with the head of Holofernes" class="aligncenter wp-image-2074 size-full" data-dcnode-id="411" height="473" loading="lazy" sizes="(max-width: 399px) 100vw, 399px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.womeninthebible.net/wp-content/uploads/2016/02/1.15.Judith_Titian-1.jpg&amp;raw" srcset="https://womeninthebible.net/wp-content/uploads/2016/02/1.15.Judith_Titian-1.jpg 399w, https://womeninthebible.net/wp-content/uploads/2016/02/1.15.Judith_Titian-1-253x300.jpg 253w" title="BIBLE PAINTINGS. JUDITH, Titian, Judith with the head of Holofernes" width="399"></p><span data-dcnode-id="409" instrument_node="">
</span><p data-dcnode-id="407"><span data-dcnode-id="408" instrument_node="">Judith has cut off the head of Holofernes and now picks it up by its hair, to lower into the bag held by her maid Abra.</span></p><span data-dcnode-id="406" instrument_node="">
</span><p data-dcnode-id="404"><span data-dcnode-id="405" instrument_node="">This is a painting made by Titian towards the end of his life. His Judith is a luminous, serene beauty assisted by a black servant woman.</span></p><span data-dcnode-id="403" instrument_node="">
</span><p data-dcnode-id="400"><strong data-dcnode-id="401"><span data-dcnode-id="402" instrument_node="">The head of Holofernes is truly terrifying, a dark and gruesome trophy for the Judean inhabitants of Bethuliah.</span></strong></p><span data-dcnode-id="399" instrument_node="">
</span><p data-dcnode-id="395"><span data-dcnode-id="398" instrument_node="">Bible reference: </span><a data-dcnode-id="396" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.womeninthebible.net/wp-admin/post.php%3Fpost%3D361%26action%3Dedit%23cunning"><span data-dcnode-id="397" instrument_node="">Judith 13:9-10</span></a></p><span data-dcnode-id="394" instrument_node="">
</span><hr data-dcnode-id="393"><span data-dcnode-id="392" instrument_node="">
</span><div data-dcnode-id="391" id="Judith-carries-away-the-head-of-Holofernes"></div><span data-dcnode-id="390" instrument_node="">
</span><h2 data-dcnode-id="388"><span data-dcnode-id="389" instrument_node="">Returning to Bethuliah</span></h2><span data-dcnode-id="387" instrument_node="">
</span><p data-dcnode-id="384"><strong data-dcnode-id="385"><span data-dcnode-id="386" instrument_node="">‘Judith carries away the head of Holofernes’, Michelangelo Buonarroti, 1508-1512</span></strong></p><span data-dcnode-id="383" instrument_node="">
</span><p data-dcnode-id="381"><img alt="BIBLE PAINTINGS. JUDITH carries away the head of Holofernes,Michelangelo Buonarroti" class="aligncenter wp-image-2075 size-full" data-dcnode-id="382" height="469" loading="lazy" sizes="(max-width: 597px) 100vw, 597px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.womeninthebible.net/wp-content/uploads/2016/02/Michelangelo_JandH-1.jpg&amp;raw" srcset="https://womeninthebible.net/wp-content/uploads/2016/02/Michelangelo_JandH-1.jpg 597w, https://womeninthebible.net/wp-content/uploads/2016/02/Michelangelo_JandH-1-300x236.jpg 300w, https://womeninthebible.net/wp-content/uploads/2016/02/Michelangelo_JandH-1-450x354.jpg 450w" title="BIBLE PAINTINGS. JUDITH carries away the head of Holofernes,Michelangelo Buonarroti" width="597"></p><span data-dcnode-id="380" instrument_node="">
</span><p data-dcnode-id="378"><span data-dcnode-id="379" instrument_node="">Below: Detail of Judith and Abra with the head of Holofernes</span></p><span data-dcnode-id="377" instrument_node="">
</span><p data-dcnode-id="375"><img alt="Judith Paintings: 'Judith carries away the head of Holofernes', Michelangelo Buonarroti, 1508-1512, severed head on a platter" class="aligncenter wp-image-2076 size-full" data-dcnode-id="376" height="423" loading="lazy" sizes="(max-width: 593px) 100vw, 593px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.womeninthebible.net/wp-content/uploads/2016/02/Michelangelo_JandH_detail-1.jpg&amp;raw" srcset="https://womeninthebible.net/wp-content/uploads/2016/02/Michelangelo_JandH_detail-1.jpg 593w, https://womeninthebible.net/wp-content/uploads/2016/02/Michelangelo_JandH_detail-1-300x214.jpg 300w, https://womeninthebible.net/wp-content/uploads/2016/02/Michelangelo_JandH_detail-1-260x185.jpg 260w, https://womeninthebible.net/wp-content/uploads/2016/02/Michelangelo_JandH_detail-1-450x321.jpg 450w" title="Judith Paintings: 'Judith carries away the head of Holofernes', Michelangelo Buonarroti, 1508-1512, severed head on a platter" width="593"></p><span data-dcnode-id="374" instrument_node="">
</span><p data-dcnode-id="372"><span data-dcnode-id="373" instrument_node="">Holofernes’ lifeless body lies in the background as Judith and Abra hurry away from the scene of the murder. Abra carries the grisly head on a tray/basket, and Judith tries to cover it from sight.</span></p><span data-dcnode-id="371" instrument_node="">
</span><p data-dcnode-id="369"><span data-dcnode-id="370" instrument_node="">This is part of the painted ceiling in the Sistine Chapel.</span></p><span data-dcnode-id="368" instrument_node="">
</span><p data-dcnode-id="366"><span data-dcnode-id="367" instrument_node="">When he came to choose images for the Chapel, Michelangelo seems to have focused on heroic deeds, or on seminal moments in the story of God’s unfolding plan.</span></p><span data-dcnode-id="365" instrument_node="">
</span><p data-dcnode-id="362"><strong data-dcnode-id="363"><span data-dcnode-id="364" instrument_node="">He saw Judith as one such hero, leaving the obscurity of her life as a widow in a small city to undertake terrifying actions that would ultimately save her people.</span></strong></p><span data-dcnode-id="361" instrument_node="">
</span><p data-dcnode-id="357"><span data-dcnode-id="360" instrument_node="">Bible reference: </span><a data-dcnode-id="358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.womeninthebible.net/wp-admin/post.php%3Fpost%3D361%26action%3Dedit%23cunning"><span data-dcnode-id="359" instrument_node="">Judith 13:9-11</span></a></p><span data-dcnode-id="356" instrument_node="">
</span><hr data-dcnode-id="355"><span data-dcnode-id="354" instrument_node="">
</span><div data-dcnode-id="353" id="Giorgione"></div><span data-dcnode-id="352" instrument_node="">
</span><p data-dcnode-id="349"><strong data-dcnode-id="350"><span data-dcnode-id="351" instrument_node="">‘Judith’, Giorgione, 1504</span></strong></p><span data-dcnode-id="348" instrument_node="">
</span><p data-dcnode-id="346"><img alt="BIBLE PAINTINGS.JUDITH, Giorgione" class="aligncenter wp-image-2077 size-full" data-dcnode-id="347" height="835" loading="lazy" sizes="(max-width: 382px) 100vw, 382px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.womeninthebible.net/wp-content/uploads/2016/02/giorgione_1504_judith-1.jpg&amp;raw" srcset="https://womeninthebible.net/wp-content/uploads/2016/02/giorgione_1504_judith-1.jpg 382w, https://womeninthebible.net/wp-content/uploads/2016/02/giorgione_1504_judith-1-137x300.jpg 137w, https://womeninthebible.net/wp-content/uploads/2016/02/giorgione_1504_judith-1-323x705.jpg 323w" title="BIBLE PAINTINGS.JUDITH, Giorgione" width="382"></p><span data-dcnode-id="345" instrument_node="">
</span><p data-dcnode-id="343"><span data-dcnode-id="344" instrument_node="">Unlike the other paintings of Judith, this one does not show a particular moment in the story.</span></p><span data-dcnode-id="342" instrument_node="">
</span><ul data-dcnode-id="334"><span data-dcnode-id="341" instrument_node="">
</span><li data-dcnode-id="339"><span data-dcnode-id="340" instrument_node="">Holofernes has been killed, but Judith is not in the process of returning to Bethuliah as she subsequently did.</span></li><span data-dcnode-id="338" instrument_node="">
</span><li data-dcnode-id="336"><span data-dcnode-id="337" instrument_node="">The head is not wrapped up, or being displayed on the city walls, but is simply a trophy taken in battle.</span></li><span data-dcnode-id="335" instrument_node="">
</span></ul><span data-dcnode-id="333" instrument_node="">
</span><p data-dcnode-id="325"><strong data-dcnode-id="331"><span data-dcnode-id="332" instrument_node="">The battle of the sexes? The painting is more like a portrait of Judith as a goddess of sexual love – see Giorgione’s ‘Sleeping Venus’ for a similar image of idealized beauty.</span></strong><br data-dcnode-id="330"><span data-dcnode-id="329" instrument_node="">
See also </span><strong data-dcnode-id="326"><a data-dcnode-id="327" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.womeninthebible.net/bible-extras/10-heroines/"><span data-dcnode-id="328" instrument_node="">Bible Heroines: Judith</span></a></strong></p><span data-dcnode-id="324" instrument_node="">
</span><p data-dcnode-id="322"><span data-dcnode-id="323" instrument_node="">Georgione’s image of Judith contrasts dramatically with other paintings of this subject. She is remote, untroubled, serene – a goddess, not a human woman who has just committed violent murder.</span></p><span data-dcnode-id="321" instrument_node="">
</span><p data-dcnode-id="319"><span data-dcnode-id="320" instrument_node="">In the background is a landscape, reminiscent of the country round Castelfranco, which the artist knew as a boy, and loved all his life.</span></p><span data-dcnode-id="318" instrument_node="">
</span><p data-dcnode-id="314"><span data-dcnode-id="317" instrument_node="">Giorgione died young, probably of the plague in Venice, but his works have remarkable maturity and a certain enigmatic quality. </span><strong data-dcnode-id="315"><span data-dcnode-id="316" instrument_node="">Could not this ‘Judith’ be likened to a profane Mona Lisa?</span></strong></p><span data-dcnode-id="313" instrument_node="">
</span><p data-dcnode-id="309"><span data-dcnode-id="312" instrument_node="">Biblical reference: </span><a data-dcnode-id="310" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.womeninthebible.net/wp-admin/post.php%3Fpost%3D361%26action%3Dedit%23cunning"><span data-dcnode-id="311" instrument_node="">Book of Judith</span></a></p><span data-dcnode-id="308" instrument_node="">
</span><hr data-dcnode-id="307"><span data-dcnode-id="306" instrument_node="">
</span><div data-dcnode-id="305" id="with-the"></div><span data-dcnode-id="304" instrument_node="">
</span><p data-dcnode-id="297"><strong data-dcnode-id="302"><span data-dcnode-id="303" instrument_node="">‘Judith with the Head of Holofernes’,</span></strong><br data-dcnode-id="301"><span data-dcnode-id="300" instrument_node="">
</span><strong data-dcnode-id="298"><span data-dcnode-id="299" instrument_node=""> Elisabetta Sirani (1638-1665) circa 1660</span></strong></p><span data-dcnode-id="296" instrument_node="">
</span><p data-dcnode-id="294"><img alt="Paintings of the Bible heroine Judith. 'Judith with the Head of Holofernes', Elizabetta Sirani" class="aligncenter wp-image-2078 size-full" data-dcnode-id="295" height="634" loading="lazy" sizes="(max-width: 485px) 100vw, 485px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.womeninthebible.net/wp-content/uploads/2016/02/1.15.Judith.ElisabettaSirani-1.jpg&amp;raw" srcset="https://womeninthebible.net/wp-content/uploads/2016/02/1.15.Judith.ElisabettaSirani-1.jpg 485w, https://womeninthebible.net/wp-content/uploads/2016/02/1.15.Judith.ElisabettaSirani-1-229x300.jpg 229w, https://womeninthebible.net/wp-content/uploads/2016/02/1.15.Judith.ElisabettaSirani-1-450x588.jpg 450w" title="Paintings of the Bible heroine Judith. 'Judith with the Head of Holofernes', Elizabetta Sirani" width="485"></p><span data-dcnode-id="293" instrument_node="">
</span><p data-dcnode-id="291"><span data-dcnode-id="292" instrument_node="">Judith has returned to Bethuliah, and now draws the head of Holofernes out of the sack her maid has carried. Two attendants run to light her way with torches.</span></p><span data-dcnode-id="290" instrument_node="">
</span><p data-dcnode-id="287"><strong data-dcnode-id="288"><span data-dcnode-id="289" instrument_node="">Now all the townspeople and all the enemy soldiers can see that the much-feared Holofernes is really dead.</span></strong></p><span data-dcnode-id="286" instrument_node="">
</span><p data-dcnode-id="284"><span data-dcnode-id="285" instrument_node="">Elizabeth Sirani came from a prominent family of artists – her father was Giovanni Adrea Sirano, principal assistant of Guido Reni. She died at the early age of 27. She has placed Judith in a medieval setting – note the ramparts of a city wall (Bethulia)&nbsp;in the background.</span></p><span data-dcnode-id="283" instrument_node="">
</span><p data-dcnode-id="279"><span data-dcnode-id="282" instrument_node="">Biblical reference: </span><a data-dcnode-id="280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.womeninthebible.net/wp-admin/post.php%3Fpost%3D361%26action%3Dedit%23cunning"><span data-dcnode-id="281" instrument_node="">Judith 13:15</span></a></p><span data-dcnode-id="278" instrument_node="">
</span><hr data-dcnode-id="277"><span data-dcnode-id="276" instrument_node="">
</span><div data-dcnode-id="275" id="Alessandro-Botticelli"></div><span data-dcnode-id="274" instrument_node="">
</span><p data-dcnode-id="271"><strong data-dcnode-id="272"><span data-dcnode-id="273" instrument_node="">‘Judith’s Return to Bethulia’, Alessandro Botticelli, 1470</span></strong></p><span data-dcnode-id="270" instrument_node="">
</span><p data-dcnode-id="268"><img alt="Paintings of the Bible heroine Judith. Alessandro Botticelli, Judith's Return to Bethulia: Bible Art, Judith" class="aligncenter wp-image-2079 size-full" data-dcnode-id="269" height="798" loading="lazy" sizes="(max-width: 590px) 100vw, 590px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.womeninthebible.net/wp-content/uploads/2016/02/SandroBotticelli-1.jpg&amp;raw" srcset="https://womeninthebible.net/wp-content/uploads/2016/02/SandroBotticelli-1.jpg 590w, https://womeninthebible.net/wp-content/uploads/2016/02/SandroBotticelli-1-222x300.jpg 222w, https://womeninthebible.net/wp-content/uploads/2016/02/SandroBotticelli-1-521x705.jpg 521w, https://womeninthebible.net/wp-content/uploads/2016/02/SandroBotticelli-1-450x609.jpg 450w" title="Paintings of the Bible heroine Judith. Alessandro Botticelli, Judith's Return to Bethulia: Bible Art, Judith" width="590"></p><span data-dcnode-id="267" instrument_node="">
</span><p data-dcnode-id="265"><span data-dcnode-id="266" instrument_node="">Judith has completed her mission and returns to Bethulia, sword in hand. Her maid Abra follows with Holofernes’ head, wrapped up and carried on the woman’s head.</span></p><span data-dcnode-id="264" instrument_node="">
</span><p data-dcnode-id="261"><strong data-dcnode-id="262"><span data-dcnode-id="263" instrument_node="">Judith has the air and demeanor of a goddess, rather than a mortal woman. She strides across an idealized landscape sword in one hand, olive branch in the other. She will live in peace if she can, but is prepared for war if it is forced upon her.</span></strong></p><span data-dcnode-id="260" instrument_node="">
</span><p data-dcnode-id="257"><strong data-dcnode-id="258"><span data-dcnode-id="259" instrument_node="">It is interesting to compare Botticelli’s Judith and Abra with the figures in his more famous ‘Spring’. There is the same sense of detached majesty at the center of the painting.</span></strong></p><span data-dcnode-id="256" instrument_node="">
</span><p data-dcnode-id="254"><span data-dcnode-id="255" instrument_node="">Judith dominates all around her – and reinforces her power by carrying a rather nasty-looking sword. Yet, as in the ‘Spring’ painting, the overall impression is of fluid beauty and movement.</span></p><span data-dcnode-id="253" instrument_node="">
</span><p data-dcnode-id="248"><span data-dcnode-id="252" instrument_node="">For more on the unfortunate Nebuchadnezzar, see </span><strong data-dcnode-id="249"><a data-dcnode-id="250" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.womeninthebible.net/10-bad-bible-men/"><span data-dcnode-id="251" instrument_node="">Bible Villains: Nebuchadnezzar</span></a></strong></p><span data-dcnode-id="247" instrument_node="">
</span><p data-dcnode-id="243"><span data-dcnode-id="246" instrument_node="">Bible reference: </span><a data-dcnode-id="244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.womeninthebible.net/wp-admin/post.php%3Fpost%3D361%26action%3Dedit%23cunning"><span data-dcnode-id="245" instrument_node="">Judith 13:10</span></a></p><span data-dcnode-id="242" instrument_node="">
</span><p data-dcnode-id="239"><span data-dcnode-id="240" style="background: no-repeat 3px 50% #bd081c; font: 11px/20px 'Helvetica Neue', Helvetica, sans-serif; padding: 0px 4px 0px 0px; left: 244px; top: 5183px; width: auto; color: #ffffff; display: none; position: absolute; z-index: 8675309; cursor: pointer; font-size-adjust: none; font-stretch: normal; opacity: 0.85;"><span data-dcnode-id="241" instrument_node="">Save</span></span></p><span data-dcnode-id="238" instrument_node="">
</span><p data-dcnode-id="235"><span data-dcnode-id="236" style="background: no-repeat 3px 50% #bd081c; font: 11px/20px 'Helvetica Neue', Helvetica, sans-serif; padding: 0px 4px 0px 0px; width: auto; color: #ffffff; display: none; position: absolute; z-index: 8675309; cursor: pointer; font-size-adjust: none; font-stretch: normal; opacity: 1;"><span data-dcnode-id="237" instrument_node="">Save</span></span></p><span data-dcnode-id="234" instrument_node="">
</span></div></section></div></div><span data-dcnode-id="228" instrument_node="">
</span><div class="flex_column_table av-equal-height-column-flextable -flextable" data-dcnode-id="157"><div class="flex_column av_three_fourth flex_column_table_cell av-equal-height-column av-align-top av-zero-column-padding first avia-builder-el-45 el_after_av_three_fourth el_before_av_three_fourth column-top-margin" data-dcnode-id="158" style="border-radius:0px; "><section class="av_textblock_section" data-dcnode-id="159" itemscope="itemscope" itemtype="https://schema.org/CreativeWork"><div class="avia_textblock" data-dcnode-id="160" itemprop="text"><div class="mceTemp" data-dcnode-id="222"><span data-dcnode-id="227" instrument_node="">
</span><div class="mceTemp" data-dcnode-id="226"></div><span data-dcnode-id="225" instrument_node="">
</span><div class="mceTemp" data-dcnode-id="224"></div><span data-dcnode-id="223" instrument_node="">
</span></div><span data-dcnode-id="221" instrument_node="">
</span><hr data-dcnode-id="220"><span data-dcnode-id="219" instrument_node="">
</span><h3 data-dcnode-id="217" style="text-align: center;"><span data-dcnode-id="218" instrument_node="">Judith, by Anthony Hecht</span></h3><span data-dcnode-id="216" instrument_node="">
</span><p data-dcnode-id="172" style="text-align: center;"><span data-dcnode-id="215" instrument_node="">It took less valor than I’m reputed for.</span><br data-dcnode-id="214"><span data-dcnode-id="213" instrument_node="">
Since I was a small child I have hated men.</span><br data-dcnode-id="212"><span data-dcnode-id="211" instrument_node="">
Even the feeblest, in their fantasies,</span><br data-dcnode-id="210"><span data-dcnode-id="209" instrument_node="">
Triumph as sexual athletes, putting the shot</span><br data-dcnode-id="208"><span data-dcnode-id="207" instrument_node="">
Squarely between the thighs of some meek woman,</span><br data-dcnode-id="206"><span data-dcnode-id="205" instrument_node="">
While others strut like decathlon champions,</span><br data-dcnode-id="204"><span data-dcnode-id="203" instrument_node="">
Like royal David hankering after his neighbor’s</span><br data-dcnode-id="202"><span data-dcnode-id="201" instrument_node="">
Dutiful wife. For myself, I found a husband</span><br data-dcnode-id="200"><span data-dcnode-id="199" instrument_node="">
Not very prepossessing, but very rich.</span><br data-dcnode-id="198"><span data-dcnode-id="197" instrument_node="">
Neither of us interested in children.</span><br data-dcnode-id="196"><span data-dcnode-id="195" instrument_node="">
In my case, the roving hands, the hot tumescence of an uncle,</span><br data-dcnode-id="194"><span data-dcnode-id="193" instrument_node="">
Weakened my taste for close intimacies.</span><br data-dcnode-id="192"><span data-dcnode-id="191" instrument_node="">
Ironically, heaven had granted me</span><br data-dcnode-id="190"><span data-dcnode-id="189" instrument_node="">
What others took to be attractive features</span><br data-dcnode-id="188"><span data-dcnode-id="187" instrument_node="">
And an alluring body, and which for years</span><br data-dcnode-id="186"><span data-dcnode-id="185" instrument_node="">
Instinctively I looked upon with shame.</span><br data-dcnode-id="184"><span data-dcnode-id="183" instrument_node="">
All men seemed stupid in their lecherous,</span><br data-dcnode-id="182"><span data-dcnode-id="181" instrument_node="">
Self-flattering appetites, which I found repugnant.</span><br data-dcnode-id="180"><span data-dcnode-id="179" instrument_node="">
But at last, as fate would have it, I found a chance</span><br data-dcnode-id="178"><span data-dcnode-id="177" instrument_node="">
To put my curse to practical advantage.</span><br data-dcnode-id="176"><span data-dcnode-id="175" instrument_node="">
It was easy. Holofernes was pretty tight;</span><br data-dcnode-id="174"><span data-dcnode-id="173" instrument_node="">
I had only to show some cleavage and he was done for.</span></p><span data-dcnode-id="171" instrument_node="">
</span><p data-dcnode-id="168"><span data-dcnode-id="169" style="background: no-repeat 3px 50% #bd081c; font: 11px/20px 'Helvetica Neue', Helvetica, sans-serif; padding: 0px 4px 0px 0px; left: 244px; top: 5183px; width: auto; color: #ffffff; display: none; position: absolute; z-index: 8675309; cursor: pointer; font-size-adjust: none; font-stretch: normal; opacity: 0.85;"><span data-dcnode-id="170" instrument_node="">Save</span></span></p><span data-dcnode-id="167" instrument_node="">

</span><div class="mceTemp" data-dcnode-id="154"></div><span data-dcnode-id="153" instrument_node="">

</span></div><span data-dcnode-id="149" instrument_node="">
</span><p data-dcnode-id="146"><span data-dcnode-id="147" style="background: no-repeat 3px 50% #bd081c; font: 11px/20px 'Helvetica Neue', Helvetica, sans-serif; padding: 0px 4px 0px 0px; left: 244px; top: 5183px; width: auto; color: #ffffff; display: none; position: absolute; z-index: 8675309; cursor: pointer; font-size-adjust: none; font-stretch: normal; opacity: 0.85;"><span data-dcnode-id="148" instrument_node="">Save</span></span></p><span data-dcnode-id="145" instrument_node="">
</span><p data-dcnode-id="142"><span data-dcnode-id="143" style="background: no-repeat 3px 50% #bd081c; font: 11px/20px 'Helvetica Neue', Helvetica, sans-serif; padding: 0px 4px 0px 0px; width: auto; color: #ffffff; display: none; position: absolute; z-index: 8675309; cursor: pointer; font-size-adjust: none; font-stretch: normal; opacity: 1;"><span data-dcnode-id="144" instrument_node="">Save</span></span></p><span data-dcnode-id="141" instrument_node="">
</span><h2 data-dcnode-id="139"><span data-dcnode-id="140" instrument_node="">Judith’s story:&nbsp;Off With His Head!!</span></h2><span data-dcnode-id="138" instrument_node="">
</span><p data-dcnode-id="134"><strong data-dcnode-id="136"><span data-dcnode-id="137" instrument_node="">Who was Judith? Judith was a wealthy and beautiful young widow living in a hilltop town called Bethuliah. During a siege of her town, she undertook a daring&nbsp;sexual mission to save her people from annihilation.</span></strong><img alt="lioness-anna-omelchenko" class="alignright wp-image-10398" data-dcnode-id="135" height="194" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.womeninthebible.net/wp-content/uploads/2016/04/lioness-anna-omelchenko.jpg&amp;raw" width="205"></p><span data-dcnode-id="133" instrument_node="">
</span><p data-dcnode-id="131"><span data-dcnode-id="132" instrument_node="">At great personal risk she went into the camp of Holofernes, the Assyrian commander-in-chief of the enemy forces. He had a fearsome reputation, but she charmed him, even managing to hold his sexual advances at bay (maybe…)</span></p><span data-dcnode-id="130" instrument_node="">
</span><p data-dcnode-id="127"><strong data-dcnode-id="128"><span data-dcnode-id="129" instrument_node="">How did she kill Holofernes? Once she had lulled him into a sense of security she tempted him into getting drunk. Then she took his own sword down from where it hung on his bedpost, and hacked off his head as he lay in a stupor.</span></strong></p><span data-dcnode-id="126" instrument_node="">
</span><p data-dcnode-id="124"><span data-dcnode-id="125" instrument_node="">With his head wrapped in the bed curtain, she returned triumphantly to her own people in Bethuliah.</span></p><span data-dcnode-id="123" instrument_node="">
</span><p data-dcnode-id="120"><strong data-dcnode-id="121"><span data-dcnode-id="122" instrument_node="">What did she do with his head? The head of Holofernes, hung on the town ramparts, caused panic among the Assyrians who fled in great disorder.</span></strong></p><span data-dcnode-id="119" instrument_node="">
</span><p data-dcnode-id="116"><em data-dcnode-id="117"><span data-dcnode-id="118" instrument_node="">Her story is similar to the David and Goliath story, where a seemingly weak person overcomes a person of superior strength by calling on God’s help and using cunning and intelligence.</span></em></p><span data-dcnode-id="115" instrument_node="">
</span><hr data-dcnode-id="114"><span data-dcnode-id="113" instrument_node="">
