</span><header class="fl-post-header" data-dcnode-id="1397"><span data-dcnode-id="1436" instrument_node="">
</span><h1 class="fl-post-title" data-dcnode-id="1434" itemprop="headline"><span data-dcnode-id="1435" instrument_node="">
			What are Historical Jewish Teachings on Abortion?					</span></h1><span data-dcnode-id="1433" instrument_node="">
</span><div class="fl-post-meta fl-post-meta-top" data-dcnode-id="1416"><span class="fl-post-author" data-dcnode-id="1428"><span data-dcnode-id="1432" instrument_node="">By </span><a data-dcnode-id="1429" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hli.org/author/bclowes/"><span data-dcnode-id="1430"><span data-dcnode-id="1431" instrument_node="">Brian Clowes, PhD</span></span></a></span><span class="fl-sep" data-dcnode-id="1426"><span data-dcnode-id="1427" instrument_node=""> | </span></span><span class="fl-post-date" data-dcnode-id="1424"><span data-dcnode-id="1425" instrument_node="">May 20, 2020</span></span><span class="fl-sep" data-dcnode-id="1422"><span data-dcnode-id="1423" instrument_node=""> | </span></span><span class="fl-comments-popup-link" data-dcnode-id="1417"><a aria-hidden="true" data-dcnode-id="1418" href="#comments" tabindex="-1"><span aria-label="Comments: 3" data-dcnode-id="1419"><span data-dcnode-id="1421" instrument_node="">3 </span><i aria-hidden="true" class="fas fa-comments" data-dcnode-id="1420"></i></span></a></span></div><meta content="What are Historical Jewish Teachings on Abortion?" data-dcnode-id="1415" itemid="https://www.hli.org/resources/judaism-on-abortion/" itemprop="mainEntityOfPage" itemscope="" itemtype="https://schema.org/WebPage"><meta content="2020-05-20" data-dcnode-id="1414" itemprop="datePublished"><meta content="2022-04-19" data-dcnode-id="1413" itemprop="dateModified"><div data-dcnode-id="1409" itemprop="publisher" itemscope="" itemtype="https://schema.org/Organization"><meta content="Human Life International" data-dcnode-id="1412" itemprop="name"><div data-dcnode-id="1410" itemprop="logo" itemscope="" itemtype="https://schema.org/ImageObject"><meta content="https://www.hli.org/wp-content/uploads/2021/04/human-life-international-defending-logox1-1.png" data-dcnode-id="1411" itemprop="url"></div></div><div data-dcnode-id="1406" itemprop="author" itemscope="" itemtype="https://schema.org/Person"><meta content="https://www.hli.org/author/bclowes/" data-dcnode-id="1408" itemprop="url"><meta content="Brian Clowes, PhD" data-dcnode-id="1407" itemprop="name"></div><div data-dcnode-id="1402" itemprop="image" itemscope="" itemtype="https://schema.org/ImageObject"><meta content="https://www.hli.org/wp-content/uploads/2020/04/judaism-star-of-david-e1587569463994.jpg" data-dcnode-id="1405" itemprop="url"><meta content="1280" data-dcnode-id="1404" itemprop="width"><meta content="809" data-dcnode-id="1403" itemprop="height"></div><div data-dcnode-id="1399" itemprop="interactionStatistic" itemscope="" itemtype="https://schema.org/InteractionCounter"><meta content="https://schema.org/CommentAction" data-dcnode-id="1401" itemprop="interactionType"><meta content="3" data-dcnode-id="1400" itemprop="userInteractionCount"></div><span data-dcnode-id="1398" instrument_node=""> </span></header><span data-dcnode-id="1395" instrument_node="">
</span><div class="fl-post-content clearfix" data-dcnode-id="787" itemprop="text"><span data-dcnode-id="1394" instrument_node="">
</span><p data-dcnode-id="1390"><img alt="judaism star of david" class="aligncenter wp-image-17016 lazyloaded" data-dcnode-id="1393" data-ll-status="loaded" height="505" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hli.org/wp-content/uploads/2020/04/judaism-star-of-david-e1587569317569.jpg&amp;raw" width="812"><noscript data-dcnode-id="1391"><span data-dcnode-id="1392" instrument_node="">&lt;img class="aligncenter wp-image-17016 " src="https://www.hli.org/wp-content/uploads/2020/04/judaism-star-of-david-e1587569317569.jpg" alt="judaism star of david" width="812" height="505" /&gt;</span></noscript></p><span data-dcnode-id="1389" instrument_node="">
</span><p data-dcnode-id="1387"><span data-dcnode-id="1388" instrument_node="">Like modern Christians, Jews take a variety of stands on abortion, primarily because the Jewish faith has suffered the same catastrophic ethical schism that has splintered the Christian church.&nbsp; Denominations representing most of Judaism’s adherents have rejected the inspired Word of God.&nbsp; They are following their faith with less intensity, and they are decreasing in number.&nbsp; Meanwhile, Orthodox Jews are experiencing a kind of “renaissance” as they rapidly increase in numbers.&nbsp; In order to understand this situation and the resulting range of Jewish views on abortion, it is necessary to review the basics of traditional Jewish belief and religious law.</span></p><span data-dcnode-id="1386" instrument_node="">
</span><p data-dcnode-id="1381"><span data-dcnode-id="1385" instrument_node="">North American Jews have historically belonged to one of three movements, which overlap to some degree in practice.</span><sup data-dcnode-id="1383"><span data-dcnode-id="1384" instrument_node="">1</span></sup><span data-dcnode-id="1382" instrument_node="">&nbsp; Orthodox Jews maintain strict adherence to traditional customs.&nbsp; Reform Jews are essentially humanistic, but apply Jewish customs to contemporary life.&nbsp; Conservative Jews try to maintain a strong Jewish identity while combining important elements of both Orthodox and Reform Judaism.&nbsp; A fourth movement, established in 1968, is Reconstructionism, which is essentially naturalistic and nontheistic.</span></p><span data-dcnode-id="1380" instrument_node="">
</span><p data-dcnode-id="1376"><span data-dcnode-id="1379" instrument_node="">The divergence between the religious and secular Jewish movements has become so marked that many Orthodox rabbis believe that Reform and Conservative Judaism are an entirely different religion.&nbsp; Orthodox Rabbi Hersh Ginsberg has said, “We call upon all Jews to discontinue to pray any time in a Conservative or Reform temple and instead pray in an Orthodox synagogue.”</span><sup data-dcnode-id="1377"><span data-dcnode-id="1378" instrument_node="">2</span></sup></p><span data-dcnode-id="1375" instrument_node="">
</span><p data-dcnode-id="1373"><span data-dcnode-id="1374" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1372" instrument_node="">
</span><h2 data-dcnode-id="1370"><span data-dcnode-id="1371" instrument_node="">Historical Judaism on Abortion</span></h2><span data-dcnode-id="1369" instrument_node="">
</span><p data-dcnode-id="1359"><span data-dcnode-id="1368" instrument_node="">The Jewish faith is based upon a body of Commandments that include the seven Noahide Laws and the 613 parochial commandments.&nbsp; These laws are interpreted (but not altered) by a vast body of rabbinic opinions and case law referred to as </span><em data-dcnode-id="1366"><span data-dcnode-id="1367" instrument_node="">Halakhah</span></em><span data-dcnode-id="1365" instrument_node=""> (the </span><em data-dcnode-id="1363"><span data-dcnode-id="1364" instrument_node="">Talmud</span></em><span data-dcnode-id="1362" instrument_node="">).</span><sup data-dcnode-id="1360"><span data-dcnode-id="1361" instrument_node="">3</span></sup></p><span data-dcnode-id="1358" instrument_node="">
</span><p data-dcnode-id="1348"><picture class="aligncenter wp-image-17017 size-full" data-dcnode-id="1352" loading="lazy"><span data-dcnode-id="1357" instrument_node="">
</span><source data-dcnode-id="1356" sizes="(max-width: 910px) 100vw, 910px" srcset="https://www.hli.org/wp-content/uploads/2020/04/man-reading-the-talmud.jpg.webp 910w, https://www.hli.org/wp-content/uploads/2020/04/man-reading-the-talmud-300x200.jpg.webp 300w, https://www.hli.org/wp-content/uploads/2020/04/man-reading-the-talmud-225x150.jpg.webp 225w" type="image/webp"><span data-dcnode-id="1355" instrument_node="">
</span><img alt="man reading the talmud judaism on abortion" class="lazyloaded" data-dcnode-id="1354" data-ll-status="loaded" height="607" loading="lazy" sizes="(max-width: 910px) 100vw, 910px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hli.org/wp-content/uploads/2020/04/man-reading-the-talmud.jpg&amp;raw" srcset="https://www.hli.org/wp-content/uploads/2020/04/man-reading-the-talmud.jpg 910w, https://www.hli.org/wp-content/uploads/2020/04/man-reading-the-talmud-300x200.jpg 300w, https://www.hli.org/wp-content/uploads/2020/04/man-reading-the-talmud-225x150.jpg 225w" width="910"><span data-dcnode-id="1353" instrument_node="">
</span></picture><span data-dcnode-id="1351" instrument_node="">
</span><noscript data-dcnode-id="1349"><span data-dcnode-id="1350" instrument_node="">&lt;picture loading="lazy" class="aligncenter wp-image-17017 size-full"&gt;
&lt;source type="image/webp" srcset="https://www.hli.org/wp-content/uploads/2020/04/man-reading-the-talmud.jpg.webp 910w, https://www.hli.org/wp-content/uploads/2020/04/man-reading-the-talmud-300x200.jpg.webp 300w, https://www.hli.org/wp-content/uploads/2020/04/man-reading-the-talmud-225x150.jpg.webp 225w" sizes="(max-width: 910px) 100vw, 910px"/&gt;
&lt;img loading="lazy" src="https://www.hli.org/wp-content/uploads/2020/04/man-reading-the-talmud.jpg" alt="man reading the talmud judaism on abortion" width="910" height="607" srcset="https://www.hli.org/wp-content/uploads/2020/04/man-reading-the-talmud.jpg 910w, https://www.hli.org/wp-content/uploads/2020/04/man-reading-the-talmud-300x200.jpg 300w, https://www.hli.org/wp-content/uploads/2020/04/man-reading-the-talmud-225x150.jpg 225w" sizes="(max-width: 910px) 100vw, 910px"/&gt;
&lt;/picture&gt;
</span></noscript></p><span data-dcnode-id="1347" instrument_node="">
</span><p data-dcnode-id="1342"><span data-dcnode-id="1346" instrument_node="">The seven Noahide Laws are universal, in that they apply to </span><em data-dcnode-id="1344"><span data-dcnode-id="1345" instrument_node="">everyone</span></em><span data-dcnode-id="1343" instrument_node="">, Jew or Gentile.</span></p><span data-dcnode-id="1341" instrument_node="">
</span><p data-dcnode-id="1334"><em data-dcnode-id="1339"><span data-dcnode-id="1340" instrument_node="">Bereshis</span></em><span data-dcnode-id="1338" instrument_node=""> 9:6 contains the seven commandments of </span><em data-dcnode-id="1336"><span data-dcnode-id="1337" instrument_node="">Bnei Noach</span></em><span data-dcnode-id="1335" instrument_node="">, which are:</span></p><span data-dcnode-id="1333" instrument_node="">
</span><ol data-dcnode-id="1308"><span data-dcnode-id="1332" instrument_node="">
</span><li data-dcnode-id="1330"><span data-dcnode-id="1331" instrument_node="">Thou shalt not engage in idol worship</span></li><span data-dcnode-id="1329" instrument_node="">
</span><li data-dcnode-id="1327"><span data-dcnode-id="1328" instrument_node="">Thou shalt not blaspheme God</span></li><span data-dcnode-id="1326" instrument_node="">
</span><li data-dcnode-id="1324"><span data-dcnode-id="1325" instrument_node="">Thou shalt not kill</span></li><span data-dcnode-id="1323" instrument_node="">
</span><li data-dcnode-id="1321"><span data-dcnode-id="1322" instrument_node="">Thou shalt not engage in incestuous, adulterous, or homosexual relations, nor commit the act of rape</span></li><span data-dcnode-id="1320" instrument_node="">
</span><li data-dcnode-id="1318"><span data-dcnode-id="1319" instrument_node="">Thou shalt not steal</span></li><span data-dcnode-id="1317" instrument_node="">
</span><li data-dcnode-id="1315"><span data-dcnode-id="1316" instrument_node="">Thou shalt establish laws and courts of law to administer these laws</span></li><span data-dcnode-id="1314" instrument_node="">
</span><li data-dcnode-id="1310"><span data-dcnode-id="1313" instrument_node="">Thou shalt not be cruel to animals</span><sup data-dcnode-id="1311"><span data-dcnode-id="1312" instrument_node="">4</span></sup></li><span data-dcnode-id="1309" instrument_node="">
</span></ol><span data-dcnode-id="1307" instrument_node="">
</span><p data-dcnode-id="1302"><span data-dcnode-id="1306" instrument_node="">The primary objective of the parochial commandments in the </span><em data-dcnode-id="1304"><span data-dcnode-id="1305" instrument_node="">Torah</span></em><span data-dcnode-id="1303" instrument_node=""> (the five books of Moses) is to support and preserve the seven Noahide laws.&nbsp; They are therefore not universally binding on all people.&nbsp; Some examples of these parochial commandments are: do not randomly cut down trees (Deuteronomy 20:19); do not randomly castrate animals (Leviticus 22:24); and Jewish men who are sterilized are cast out of the community (Deuteronomy 23:2).</span></p><span data-dcnode-id="1301" instrument_node="">
</span><p data-dcnode-id="1288"><span data-dcnode-id="1300" instrument_node="">The Third Noahide Law contains the admonition, “He who spills the blood of a man in a man, his blood will be spilt.”&nbsp; The </span><em data-dcnode-id="1298"><span data-dcnode-id="1299" instrument_node="">Talmud</span></em><span data-dcnode-id="1297" instrument_node=""> (Sanhedrin 57b) defines “a man in a man” as a preborn baby in his mother’s womb.&nbsp; </span><strong data-dcnode-id="1295"><span data-dcnode-id="1296" instrument_node="">This passage specifically states that abortion is a capital crime</span></strong><span data-dcnode-id="1294" instrument_node="">, a view supported by one of the leading sages of the </span><em data-dcnode-id="1292"><span data-dcnode-id="1293" instrument_node="">Talmud</span></em><span data-dcnode-id="1291" instrument_node="">, Rabbi Yishmael.</span><sup data-dcnode-id="1289"><span data-dcnode-id="1290" instrument_node="">5</span></sup></p><span data-dcnode-id="1287" instrument_node="">
</span><p data-dcnode-id="1282"><span data-dcnode-id="1286" instrument_node="">In his interpretation of the Third Noahide Law, Maimonides, the great twelfth-century interpreter and codifier of Jewish law, writes in his </span><em data-dcnode-id="1284"><span data-dcnode-id="1285" instrument_node="">Mishneh Torah</span></em><span data-dcnode-id="1283" instrument_node=""> that abortion is a capital crime for the Jews: “A descendant of Noah who kills any human being, even a fetus in its mother’s womb, is to be put to death.”</span></p><span data-dcnode-id="1281" instrument_node="">
</span><p data-dcnode-id="1270"><span data-dcnode-id="1280" instrument_node="">Maimonides ruled that abortion is allowable only if the pregnancy definitely </span><em data-dcnode-id="1278"><span data-dcnode-id="1279" instrument_node="">and without question</span></em><span data-dcnode-id="1277" instrument_node=""> endangers the life of the mother (</span><em data-dcnode-id="1275"><span data-dcnode-id="1276" instrument_node="">Hilkhot Rozeah</span></em><span data-dcnode-id="1274" instrument_node=""> 1:9 and </span><em data-dcnode-id="1272"><span data-dcnode-id="1273" instrument_node="">Shulhan Arukh Hoshen Mishpat</span></em><span data-dcnode-id="1271" instrument_node=""> 425:2):</span></p><span data-dcnode-id="1269" instrument_node="">
</span><blockquote data-dcnode-id="1264"><p data-dcnode-id="1265"><span data-dcnode-id="1268" instrument_node="">This also is a negative precept: not to have compassion on the life of a pursuer.&nbsp; Therefore, the Sages’ rules [regarding] a pregnant woman in hard travail that it is permitted to dismember the fetus in her womb, whether by chemical means or by hand, for it [the fetus] is as one pursuing her in order to kill her.</span><sup data-dcnode-id="1266"><span data-dcnode-id="1267" instrument_node="">3</span></sup></p></blockquote><span data-dcnode-id="1263" instrument_node="">
</span><p data-dcnode-id="1261"><span data-dcnode-id="1262" instrument_node="">This passage refers to “hard travail,” which was a delivery complicated by the size or position of the baby, so that a normal birth was impossible.&nbsp; At the time this commentary was written (prior to the development of obstetrical forceps and, later, safe surgical techniques for Cesarean section), this sort of problem would often result in the deaths of both mother and baby.&nbsp; The only way available to remove a baby that was “stuck” was to dismember it.&nbsp; In most cases, the baby would have already died due to anoxia.</span></p><span data-dcnode-id="1260" instrument_node="">
</span><p data-dcnode-id="1249"><span data-dcnode-id="1259" instrument_node="">So the </span><em data-dcnode-id="1257"><span data-dcnode-id="1258" instrument_node="">Talmud</span></em><span data-dcnode-id="1256" instrument_node=""> rules that abortion is permissible only in very extreme cases: specifically when a woman’s “hard travail” places her life in definite danger (</span><em data-dcnode-id="1254"><span data-dcnode-id="1255" instrument_node="">Oholoth</span></em><span data-dcnode-id="1253" instrument_node=""> 7:6).&nbsp; This is a codification of Maimonides’ concept of the </span><em data-dcnode-id="1251"><span data-dcnode-id="1252" instrument_node="">rodef</span></em><span data-dcnode-id="1250" instrument_node="">, or “pursuer.”</span></p><span data-dcnode-id="1248" instrument_node="">
</span><p data-dcnode-id="1243"><span data-dcnode-id="1247" instrument_node="">Therefore, traditional Jewish law holds that the preborn child has a right to life just as strong as the mother’s ― except when he or she poses an </span><em data-dcnode-id="1245"><span data-dcnode-id="1246" instrument_node="">imminent</span></em><span data-dcnode-id="1244" instrument_node=""> danger to her life.</span></p><span data-dcnode-id="1242" instrument_node="">
</span><p data-dcnode-id="1232"><picture class="aligncenter size-full wp-image-17022" data-dcnode-id="1236" loading="lazy"><span data-dcnode-id="1241" instrument_node="">
</span><source data-dcnode-id="1240" sizes="(max-width: 1100px) 100vw, 1100px" srcset="https://www.hli.org/wp-content/uploads/2020/04/PIXNIO-297123-1100x733-1.jpg.webp 1100w, https://www.hli.org/wp-content/uploads/2020/04/PIXNIO-297123-1100x733-1-300x200.jpg.webp 300w, https://www.hli.org/wp-content/uploads/2020/04/PIXNIO-297123-1100x733-1-1024x682.jpg.webp 1024w, https://www.hli.org/wp-content/uploads/2020/04/PIXNIO-297123-1100x733-1-225x150.jpg.webp 225w" type="image/webp"><span data-dcnode-id="1239" instrument_node="">
</span><img alt="newborn baby feet" class="lazyloaded" data-dcnode-id="1238" data-ll-status="loaded" height="733" loading="lazy" sizes="(max-width: 1100px) 100vw, 1100px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hli.org/wp-content/uploads/2020/04/PIXNIO-297123-1100x733-1.jpg&amp;raw" srcset="https://www.hli.org/wp-content/uploads/2020/04/PIXNIO-297123-1100x733-1.jpg 1100w, https://www.hli.org/wp-content/uploads/2020/04/PIXNIO-297123-1100x733-1-300x200.jpg 300w, https://www.hli.org/wp-content/uploads/2020/04/PIXNIO-297123-1100x733-1-1024x682.jpg 1024w, https://www.hli.org/wp-content/uploads/2020/04/PIXNIO-297123-1100x733-1-225x150.jpg 225w" width="1100"><span data-dcnode-id="1237" instrument_node="">
</span></picture><span data-dcnode-id="1235" instrument_node="">
</span><noscript data-dcnode-id="1233"><span data-dcnode-id="1234" instrument_node="">&lt;picture loading="lazy" class="aligncenter size-full wp-image-17022"&gt;

&lt;img loading="lazy" src="https://www.hli.org/wp-content/uploads/2020/04/PIXNIO-297123-1100x733-1.jpg" alt="newborn baby feet" width="1100" height="733" srcset="https://www.hli.org/wp-content/uploads/2020/04/PIXNIO-297123-1100x733-1.jpg 1100w, https://www.hli.org/wp-content/uploads/2020/04/PIXNIO-297123-1100x733-1-300x200.jpg 300w, https://www.hli.org/wp-content/uploads/2020/04/PIXNIO-297123-1100x733-1-1024x682.jpg 1024w, https://www.hli.org/wp-content/uploads/2020/04/PIXNIO-297123-1100x733-1-225x150.jpg 225w" sizes="(max-width: 1100px) 100vw, 1100px"/&gt;
&lt;/picture&gt;
</span></noscript></p><span data-dcnode-id="1231" instrument_node="">
</span><p data-dcnode-id="1229"><span data-dcnode-id="1230" instrument_node="">The former Chief Justice of the Supreme Rabbinical Court of America, Rabbi Marvin S. Antelman, clearly stated the position of Jewish law on abortion when he said:</span></p><span data-dcnode-id="1228" instrument_node="">
</span><blockquote data-dcnode-id="1217"><p data-dcnode-id="1218"><span data-dcnode-id="1227" instrument_node="">All major religions have their parochial and their universal aspects, and the problem of abortion is </span><em data-dcnode-id="1225"><span data-dcnode-id="1226" instrument_node="">not</span></em><span data-dcnode-id="1224" instrument_node=""> a parochial one.&nbsp; It is of universal morality, and it is neither a Catholic problem, nor a Jewish problem, nor a Protestant problem.&nbsp; It involves the killing of a human being, an act forbidden by </span><em data-dcnode-id="1222"><span data-dcnode-id="1223" instrument_node="">universal</span></em><span data-dcnode-id="1221" instrument_node=""> commandment.</span><sup data-dcnode-id="1219"><span data-dcnode-id="1220" instrument_node="">6</span></sup></p></blockquote><span data-dcnode-id="1216" instrument_node="">
</span><p data-dcnode-id="1212"><span data-dcnode-id="1215" instrument_node="">Chief Rabbi Dr. Immanual Jakabovits outlined the foundation of the reasoning behind this statement when he said, “Jewish law sees every human life as having the sanctity of intrinsic and infinite worth.&nbsp; One life has as much value as one hundred or one thousand; you cannot multiply infinity and you cannot divide it.&nbsp; So every human being has an identical worth and is identically worth saving.”</span><sup data-dcnode-id="1213"><span data-dcnode-id="1214" instrument_node="">7</span></sup></p><span data-dcnode-id="1211" instrument_node="">
</span><p data-dcnode-id="1209"><span data-dcnode-id="1210" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1208" instrument_node="">
</span><h2 data-dcnode-id="1206"><span data-dcnode-id="1207" instrument_node="">Modern Judaism on Abortion</span></h2><span data-dcnode-id="1205" instrument_node="">
</span><p data-dcnode-id="1203"><span data-dcnode-id="1204" instrument_node="">It is interesting to compare the attitudes of scholars from the various branches of Judaism regarding permissible exceptions for abortion.</span></p><span data-dcnode-id="1202" instrument_node="">
</span><p data-dcnode-id="1195"><span data-dcnode-id="1201" instrument_node="">Jewish law, while not specifically granting full personhood (</span><em data-dcnode-id="1199"><span data-dcnode-id="1200" instrument_node="">nefesh</span></em><span data-dcnode-id="1198" instrument_node="">) status to the preborn, nevertheless modified strict obligations in order to accommodate pregnant women.&nbsp; The Sanhedrin allowed the Sabbath to be violated for the sake of the preborn child, and no pregnant woman could be tried for a capital offense until she had given birth.</span><sup data-dcnode-id="1196"><span data-dcnode-id="1197" instrument_node="">5</span></sup></p><span data-dcnode-id="1194" instrument_node="">
</span><p data-dcnode-id="1183"><span data-dcnode-id="1193" instrument_node="">The </span><em data-dcnode-id="1191"><span data-dcnode-id="1192" instrument_node="">Talmud</span></em><span data-dcnode-id="1190" instrument_node=""> held that the preborn baby was “one of the living limbs of the mother.”&nbsp; This might sound like support for the pro-abortion “</span><a data-dcnode-id="1188" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hli.org/resources/shouldnt-women-able-control-bodies/"><span data-dcnode-id="1189" instrument_node="">woman’s body, woman’s choice</span></a><span data-dcnode-id="1187" instrument_node="">” slogan, but it must be noted that The </span><em data-dcnode-id="1185"><span data-dcnode-id="1186" instrument_node="">Talmud</span></em><span data-dcnode-id="1184" instrument_node=""> also prohibits any form of self-mutilation.&nbsp; Therefore, protection for the preborn child ― except in the case of “hard travail” ― is absolute.</span></p><span data-dcnode-id="1182" instrument_node="">
</span><p data-dcnode-id="1175"><span data-dcnode-id="1181" instrument_node="">Orthodoxy permits abortion to save the life of the mother only in instances of “grave necessity.”&nbsp; This might include aggravation of a serious heart condition or if the mother’s physical health would deteriorate drastically as the </span><em data-dcnode-id="1179"><span data-dcnode-id="1180" instrument_node="">direct result</span></em><span data-dcnode-id="1178" instrument_node=""> of fetal deformity, a rare occurrence indeed.</span><sup data-dcnode-id="1176"><span data-dcnode-id="1177" instrument_node="">5</span></sup></p><span data-dcnode-id="1174" instrument_node="">
</span><p data-dcnode-id="1163"><span data-dcnode-id="1173" instrument_node="">Relying upon this and related rulings, in certain extraordinary cases, Orthodox rabbis have, for </span><em data-dcnode-id="1171"><span data-dcnode-id="1172" instrument_node="">specific individuals</span></em><span data-dcnode-id="1170" instrument_node=""> and for </span><em data-dcnode-id="1168"><span data-dcnode-id="1169" instrument_node="">extreme circumstances</span></em><span data-dcnode-id="1167" instrument_node="">, allowed abortions in the cases of </span><em data-dcnode-id="1165"><span data-dcnode-id="1166" instrument_node="">documented</span></em><span data-dcnode-id="1164" instrument_node=""> pathologic mental anguish.</span></p><span data-dcnode-id="1162" instrument_node="">
</span><p data-dcnode-id="1160"><span data-dcnode-id="1161" instrument_node="">These few specific exceptions (numbering no more than six) have led pro-abortion propagandists to allege that Jewish law allows abortion for any physical or mental indication whatever.&nbsp; Conservative and Reform scholars require only “severe anguish” to be shown before abortion, which is, of course, no limitation whatsoever on abortion.</span></p><span data-dcnode-id="1159" instrument_node="">
</span><p data-dcnode-id="1145"><span data-dcnode-id="1158" instrument_node="">Conservative and Reform scholars say that the Sinaitic Laws referring specifically to the Jewish people do not treat abortion as a capital crime in Exodus 21:22-23. Exodus 21:12 speaks specifically of capital punishment for killing a man, so many liberal scholars conclude from the sum of the passages in the 21st Chapter of Exodus that capital punishment is meted out for killing a man but not a preborn baby. &nbsp;But the Hebrew word for a miscarried baby in Exodus 21:22 is </span><em data-dcnode-id="1156"><span data-dcnode-id="1157" instrument_node="">y’ladeha</span></em><span data-dcnode-id="1155" instrument_node="">, or “child,” instead of </span><em data-dcnode-id="1153"><span data-dcnode-id="1154" instrument_node="">u’bar</span></em><span data-dcnode-id="1152" instrument_node=""> or </span><em data-dcnode-id="1150"><span data-dcnode-id="1151" instrument_node="">v’lad</span></em><span data-dcnode-id="1149" instrument_node="">, the terms for “embryo” and “fetus.”&nbsp; Therefore, this passage implies that the preborn child has </span><em data-dcnode-id="1147"><span data-dcnode-id="1148" instrument_node="">already</span></em><span data-dcnode-id="1146" instrument_node=""> achieved full humanity, and to deliberately cause its death would therefore be a form of homicide.</span></p><span data-dcnode-id="1144" instrument_node="">
</span><p data-dcnode-id="1134"><picture class="aligncenter wp-image-17020 size-full" data-dcnode-id="1138" loading="lazy"><span data-dcnode-id="1143" instrument_node="">
</span><source data-dcnode-id="1142" data-lazy-srcset="https://www.hli.org/wp-content/uploads/2020/04/AdobeStock_21518823-scaled-e1587579039563.jpeg.webp" srcset="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%202560%201555'%3E%3C/svg%3E" type="image/webp"><span data-dcnode-id="1141" instrument_node="">
</span><img alt="An ultrasound of a human fetus during the 17th week" data-dcnode-id="1140" data-lazy-src="https://www.hli.org/wp-content/uploads/2020/04/AdobeStock_21518823-scaled-e1587579039563.jpeg" height="1555" loading="lazy" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%202560%201555'%3E%3C/svg%3E" width="2560"><span data-dcnode-id="1139" instrument_node="">
</span></picture><span data-dcnode-id="1137" instrument_node="">

&lt;/picture&gt;
</span></noscript></p><span data-dcnode-id="1133" instrument_node="">
</span><h2 data-dcnode-id="1131"><span data-dcnode-id="1132" instrument_node="">Final Thoughts</span></h2><span data-dcnode-id="1130" instrument_node="">
</span><p data-dcnode-id="1116"><span data-dcnode-id="1129" instrument_node="">The Conservative and Reform scholars seem to avoid the fundamental point in all of this.&nbsp; The </span><em data-dcnode-id="1127"><span data-dcnode-id="1128" instrument_node="">Talmud&nbsp;</span></em><span data-dcnode-id="1126" instrument_node="">states in </span><em data-dcnode-id="1124"><span data-dcnode-id="1125" instrument_node="">Nidah</span></em><span data-dcnode-id="1123" instrument_node=""> 31a that there are three partners in the creation of a child:&nbsp; The father, the mother, and </span><em data-dcnode-id="1121"><span data-dcnode-id="1122" instrument_node="">Hashem</span></em><span data-dcnode-id="1120" instrument_node="">.&nbsp; This means that the creation of a child is the direct Will of the Creator Himself.&nbsp; Does it make any sense to deny the will of the Almighty by killing one of His creations to save </span><em data-dcnode-id="1118"><span data-dcnode-id="1119" instrument_node="">another</span></em><span data-dcnode-id="1117" instrument_node=""> of His creations ― a woman in “hard travail?”</span></p><span data-dcnode-id="1115" instrument_node="">
</span><p data-dcnode-id="1113"><span data-dcnode-id="1114" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1112" instrument_node="">
</span><h2 data-dcnode-id="1110"><span data-dcnode-id="1111" instrument_node="">Endnotes</span></h2><span data-dcnode-id="1109" instrument_node="">
</span><p data-dcnode-id="1104"><span data-dcnode-id="1108" instrument_node="">[1] Seymour P. Lachman and Barry A. Kosmin.&nbsp; “What is Happening to American Jewry?”&nbsp; </span><em data-dcnode-id="1106"><span data-dcnode-id="1107" instrument_node="">The New York Times</span></em><span data-dcnode-id="1105" instrument_node="">, June 4, 1990.</span></p><span data-dcnode-id="1103" instrument_node="">
</span><p data-dcnode-id="1095"><span data-dcnode-id="1102" instrument_node="">[2] Laurie Goodstein.&nbsp; “Orthodox Rabbis Condemn Modern Jewish Movements.”&nbsp; </span><em data-dcnode-id="1100"><span data-dcnode-id="1101" instrument_node="">The Washington Post</span></em><span data-dcnode-id="1099" instrument_node="">, April 1, 1997, page A3.&nbsp; The debate over “Who is a Jew?” is growing in intensity.&nbsp; Israel’s </span><em data-dcnode-id="1097"><span data-dcnode-id="1098" instrument_node="">Law of Return</span></em><span data-dcnode-id="1096" instrument_node=""> defines a Jew as anyone whose mother is Jewish, or who has converted to any branch of Judaism from another faith, and who does not have another religious identity.</span></p><span data-dcnode-id="1094" instrument_node="">
</span><p data-dcnode-id="1089"><span data-dcnode-id="1093" instrument_node="">[3] J. David Bleich.&nbsp; “Abortion and Jewish Law.”&nbsp; </span><em data-dcnode-id="1091"><span data-dcnode-id="1092" instrument_node="">New Perspectives on Human Abortion</span></em><span data-dcnode-id="1090" instrument_node="">.&nbsp; Edited by Thomas W. Hilgers, M.D., Dennis J. Horan, and David Mall (Frederick, Maryland: Aletheia Books), 1981, pages 405 to 419.&nbsp; This article is the best available summary of historical Jewish teaching on abortion.&nbsp; The book itself is a superb compilation of essays by the most experienced pro-lifers in the world, dealing with virtually all of the basic issues involved in taking human life.&nbsp; An excellent primer for any pro-life activist.</span></p><span data-dcnode-id="1088" instrument_node="">
</span><p data-dcnode-id="1083"><span data-dcnode-id="1087" instrument_node="">[4]&nbsp; Maimonides stated, “Six commandments were commanded by God to Abraham and the commandment of cruelty to animals was added to Noah….When Abraham came he was commanded to circumcise…and Moses was given the </span><em data-dcnode-id="1085"><span data-dcnode-id="1086" instrument_node="">Torah</span></em><span data-dcnode-id="1084" instrument_node="">”</span></p><span data-dcnode-id="1082" instrument_node="">
</span><p data-dcnode-id="1077"><span data-dcnode-id="1081" instrument_node="">J. David Bleich.&nbsp; “Abortion and Jewish Law.”&nbsp; </span><em data-dcnode-id="1079"><span data-dcnode-id="1080" instrument_node="">New Perspectives on Human Abortion</span></em><span data-dcnode-id="1078" instrument_node="">.&nbsp; Edited by Thomas W. Hilgers, M.D., Dennis J. Horan, and David Mall (Frederick, Maryland: Aletheia Books, 1981, pages 405 to 419.</span></p><span data-dcnode-id="1076" instrument_node="">
</span><p data-dcnode-id="1068"><span data-dcnode-id="1075" instrument_node="">[5] Gabriel Meyer.&nbsp; “Israel and Abortion.”&nbsp; </span><em data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node="">National Catholic Register</span></em><span data-dcnode-id="1072" instrument_node="">, Volume LXIII, Number 47, page 5.&nbsp; Also see Rabbi Aryeh Spero.&nbsp; “Therefore Choose Life:&nbsp; How the Great Faiths View Abortion.”&nbsp; </span><em data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">Policy Review</span></em><span data-dcnode-id="1069" instrument_node="">, Spring 1989, pages 38 to 45.</span></p><span data-dcnode-id="1067" instrument_node="">
</span><p data-dcnode-id="1062"><span data-dcnode-id="1066" instrument_node="">[6] Rabbi Marvin S. Antelman, Chief Justice of the Supreme Rabbinical Court of America.&nbsp; “Why Jews Oppose Abortion.”&nbsp; </span><em data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node="">The Review of the News</span></em><span data-dcnode-id="1063" instrument_node="">, May 1, 1974, pages 1 to 6 (emphasis in the original).</span></p><span data-dcnode-id="1061" instrument_node="">

-id="1004" instrument_node="">Summary of New Articles</span></label></div></div></div></div><div class="v_hm" data-dcnode-id="997"><span class="v_m" data-dcnode-id="998"></span></div></div></div></div></div><div class="v_fr" data-dcnode-id="983"><div class="v_fc v_fc__0" data-dcnode-id="984" style="display: none;"><div class="v_ig v_ig__tx" data-dcnode-id="985"><div class="v_lw" data-dcnode-id="990"><label class="" data-dcnode-id="991" for="e523cbde-d847-4b79-b3aa-eee16951be98"><span data-dcnode-id="992" instrument_node="">Source</span></label></div><div data-dcnode-id="988"><input class="v_i__tx" data-dcnode-id="989" hidden="" id="e523cbde-d847-4b79-b3aa-eee16951be98" name="CustomField" type="text" value="Website"></div><div class="v_hm" data-dcnode-id="986"><span class="v_m" data-dcnode-id="987"></span></div></div></div></div><div class="v_fr" data-dcnode-id="973"><div class="v_fc v_fc__0" data-dcnode-id="974" style="display: none;"><div class="v_ig v_ig__tx" data-dcnode-id="975"><div class="v_lw" data-dcnode-id="980"><label class="" data-dcnode-id="981" for="9a19d3c9-0c01-4dcf-b662-9546c27d6718"><span data-dcnode-id="982" instrument_node="">Campaign Code</span></label></div><div data-dcnode-id="978"><input class="v_i__tx" data-dcnode-id="979" hidden="" id="9a19d3c9-0c01-4dcf-b662-9546c27d6718" name="CustomField" type="text" value="End of Article Form"></div><div class="v_hm" data-dcnode-id="976"><span class="v_m" data-dcnode-id="977"></span></div></div></div></div><div class="v_fr" data-dcnode-id="963"><div class="v_fc v_fc__0" data-dcnode-id="964" style="display: none;"><div class="v_ig v_ig__tx" data-dcnode-id="965"><div class="v_lw" data-dcnode-id="970"><label class="" data-dcnode-id="971" for="1b5bf3b5-587d-481a-9bd1-acbb0fb615f5"><span data-dcnode-id="972" instrument_node="">Lead Magnet Code</span></label></div><div data-dcnode-id="968"><input class="v_i__tx" data-dcnode-id="969" hidden="" id="1b5bf3b5-587d-481a-9bd1-acbb0fb615f5" name="CustomField" type="te </span><p data-dcnode-id="689"><span data-dcnode-id="690" instrument_node="">In Jeremiah 1:5 it is written “God said to him: “Before I formed you in the womb I knew you, and before you were born I consecrated you; I appointed you a prophet to the nations”. The Father was not just talking to Jeremiah, but to ALL of his children. We are ALL prophets to the nations. To murder an unborn baby is to destroy a gift from God, a most sacred gift with a soul.</span></p><span data-dcnode-id="688" instrument_node="">
