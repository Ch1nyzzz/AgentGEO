             I. RECOVERING THE AUTHENTIC TEACHINGS

The Gospels of the New Testament were composed thirty to seventy years after
Yeshua was executed and all but possibly one of his disciples had died. They were
composed by Hellenistic Greek-speaking gentiles whose only historical links with
Yeshua were translations from Aramaic of teachings remembered by his disciples and
sometimes transmitted as collections of isolated sayings and parables. These consisted
of davarim1 or prophetic utterances that were more easily remembered in oral tradition
because they were expressed in idiomatic rabbinic hyperbole and paradox, mashalim2
or kabbalistic allegories, and halakic3 teachings or rules of behavior leading to individual
spiritual rebirth that would gradually transform humanity and bring in the Messianic Age.
The Gospel writers embedded misunderstood and mistranslated Greek versions of
these into their own framework of channeled Holy Spirit teachings, oral legends, and
messianic proof-texts taken out of scriptural context to create a narrative about the birth,
geographically impossible travels, death, and resurrection of the Pauline Lord Jesus.4

Thus little can be known about Yeshua, the pre-Christian Jesus of history. However, it is
possible to recover and reconstruct his teachings from early Christian documents. This
is not just a simple process of organizing all the sayings attributed to him in the
Gospels, as Thomas Jefferson did in his Jefferson Bible.5 He and other Deists of his
day regarded Jesus as a mortal man who was a great moral teacher.

Jefferson described his first attempt to recover the essential teachings of Jesus, which
he entitled The Life and Morals of Jesus of Nazareth, in a letter to Samuel Adams dated
October 13, 1813:

        “We must reduce our volume to the simple evangelists, select, even from them, the very
        words only of Jesus, paring off the amphibologisms6 into which they have been led, by
        forgetting often, or not understanding, what had fallen from him, by giving their own

        an octavo of forty-six pages, of pure and unsophisticated doctrines.”

Since Jefferson’s time, scientific biblical scholarship has revolutionized our
understanding of how, where, when, by whom, using what sources, and for what
purposes both the canonical and non-canonical biblical literature was composed.7 Using
the many tools of peer-reviewed literary-historical biblical criticism available to scholars
today, it is possible to recover and reconstruct the extant Aramaic davarim, mashalim,
and other historical teachings of Yeshua and understand them as they were given and
intended.

But the extant sayings and other teachings of Yeshua imply much more than the moral
philosophy admired by Jefferson. They also comprise far more than the tiny collection of
“most probably authentic” sayings identified by modern scholars of the Jesus Seminar.8
It is necessary to distinguish what Jefferson tried to do, and what the Jesus Seminar
did, from what I have set out to accomplish in this book.

I have tried to recover and restore a coherent body of historical teachings—not to
merely identify probable historical sayings of Yeshua that were memorized or
remembered verbatim by his disciples, as the Jesus Seminar tried to do. After more
than a decade, the Seminar was able to confidently identify only eleven sayings as
historical. I, however, will identify and interpret a much more comprehensive body of
authentic davarim, mashalim, and other teachings using what I consider to be better
criteria.9

In Chapter III I will detail my methodology for recovering the pre-Christian teachings of
Yeshua. But for now I will say that it begins with a critical evaluation of sayings,
parables, and other first- and second-century aspects of the Jesus tradition transmitted
through the redaction and theological bias of all early sources, whether Jewish
Christian, Pauline, proto-orthodox gentile Christian, or Gnostic. There is a great deposit
of early teachings attributed to Jesus not only in the Q material and the Aramaic Core of
the Gospel of Thomas—the basic sources for what was declared authentic by the Jesus
Seminar—but in the special material of Matthew, Mark, Luke-Acts, the Johannine
writings, the Jewish-Christian Book of Revelations, various early New Testament
epistles, and sayings or teachings we find quoted or summarized in the First and
Second Epistles of Clement, the Didache, the Shepherd of Hermas, Papias,10 and
Justin Martyr. I have also found the excellent new reconstruction of the original New
Testament or Evangelion of the second-century Gnostic Bishop Marcion recently
published by Westar Institute11 Fellow Jason DeBuhn to be a useful resource.12 This
earliest New Testament consisted of the shorter early text of the Gospel of Luke and ten
Pauline epistles, including all of the authentic ones but excluding the Pastoral Epistles
and Hebrews.13

Why cast such a wide net? Because in the first and second centuries, written “memoirs”
of the Apostles were still circulating alongside oral traditions handed down through
several generations of church leaders. The earliest forms of the canonical Gospels and
other Christian writings were being composed and copied using both written sources
and oral Jesus tradition. Scribal glosses and other content would be added over the
ensuing centuries.

The extant writings from first and second centuries constitute what we know today as
the earliest versions of Christian Gospels and Epistles, the works of the Apostolic

Fathers, and many other writings that were either preserved in proto-orthodox
collections and other sources, or have been recovered in recent times archeologically
as papyrus fragments or codices. All of these transmit sayings attributed to the Christian
Lord Jesus. We can evaluate them to find which ones might preserve authentic sayings
of Yeshua originally remembered by historical disciples about A.D. 30-50 and still being
transmitted as much as a century later.

The Apostolic Fathers left us writings from about A.D. 80-150 that include the teachings
and words of Jesus that they had received as well as quotations from lost gospels
known to them. All of this later material constitutes a treasure trove for scholars able to
employ historical and literary-critical methods to recover the authentic teachings of
Yeshua, which underlay many of the sayings and other historical clues that
accumulated in the Jesus traditions of the first and second centuries.

           Yeshua delivered his davarim in what is known as the propheticus perfectus or prophetic perfect
           tense in which all Hebrew prophecy of Hebrew Scripture was given—as a vision seen in present
           time. Yeshua’s davarim must be translated with the sense of completion or fulfillment in the
           present time. That is why his teachings stressed the mystical immanence of divine reality rather
           than its eschatological fulfillment in future time as the Greek New Testament presents them.

    Testament mistranslated the Aramaic phrase nasa beaph “take nose,” which meant to
    turn up the nose, or look down the nose, at someone, i.e. to be self-righteous. When the
    Jesus of the New Testament rails against the Judean Pharisees as hypocrites, that

    common people.

Johannine Epistles were written by the Presbyter John, a later-generation Greek-
speaking gentile Johannine church leader or Bishop who took his name from the Jewish
Apostle John. However, the earliest connections of gentile church writers (Apostolic
Fathers) to the Apostle John were Ignatius, Papias, and Polycarp of the late first and
early second century, who were said to have been hearers of the Johannine Jesus
tradition in Asia Minor which differed from that of the Western Jesus traditions.

        According to Irenaeus, Polycarp was a companion of Papias, another "hearer of John"
        as Irenaeus interprets Papias' testimony, and a correspondent of Ignatius of Antioch.
        Ignatius addressed a letter to him, and mentions him in his letters to the Ephesians and
        to the Magnesians. Irenaeus regarded the memory of Polycarp as a link to the apostolic
        past. He relates how and when he became a Christian, and in his letter to Florinus
        stated, that he saw and heard Polycarp personally in lower Asia. In particular, he heard
        the account of Polycarp's discussion with John and with others who had seen Jesus.
        Irenaeus also reports that Polycarp was converted to Christianity by apostles, was
        consecrated a bishop, and communicated with many who had seen Jesus. He
        repeatedly emphasizes the very great age of Polycarp.730

Irenaeus, originally from Syria in Asia Minor, tells of Polycarp’s meeting with Anicetus,
Bishop of Rome, in the mid-second century. In the Western tradition Easter was
celebrated on the Sunday after the first Full Moon (Jewish 14th of Nissan, Passover
Moon) after Spring Equinox. In the Jewish-Christian Johannine tradition of Asia Minor,
Easter was celebrated on the Full Passover Moon of the 14th of Nissan regardless of the
day of the week on which it fell. Anicetus and Polycarp agreed to disagree, and the
Roman Bishop allowed Polycarp to celebrate the Eucharist in his own church—a
gesture of ecumenism between Western and Eastern Christians. But a generation later
Bishop Victor of Rome tried to excommunicate all the bishops of Asia over this
Quartodeciman controversy.731

by second-century Gnostics like Marcion to promote Valentinian gnosis and the

pitcher, basket or plate for bread, and separate glasses for each person seated at the table to

opening prayer. Everyone places right palm over central area of chest at heart level with left palm
