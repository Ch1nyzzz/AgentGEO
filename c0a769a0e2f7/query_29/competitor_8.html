</span><a class="category" data-dcnode-id="11547" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.olivetree.com/blog/category/old-testament-articles/"><span data-dcnode-id="11548" instrument_node="">Old Testament</span></a><span data-dcnode-id="11546" instrument_node="">
</span></span><span data-dcnode-id="11544" instrument_node="">
</span><h1 class="post-title" data-dcnode-id="11542"><span data-dcnode-id="11543" instrument_node="">
			Does the Old Testament Law Still Apply?			
		</span></h1><span data-dcnode-id="11541" instrument_node="">
</span></div><span data-dcnode-id="11539" instrument_node="">
</span><div class="featured" data-dcnode-id="11533"><span data-dcnode-id="11538" instrument_node="">
</span><a class="image-link" data-dcnode-id="11535" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.olivetree.com/blog/wp-content/uploads/2018/04/otlawstillapply-1.jpg"><img alt="Old Testament Law Still Apply" class="attachment-large size-large wp-post-image lazyloaded" data-dcnode-id="11537" data-src="https://www.olivetree.com/blog/wp-content/uploads/2018/04/otlawstillapply-1-1024x451.jpg" data-srcset="https://www.olivetree.com/blog/wp-content/uploads/2018/04/otlawstillapply-1-1024x451.jpg 1024w, https://www.olivetree.com/blog/wp-content/uploads/2018/04/otlawstillapply-1-300x132.jpg 300w, https://www.olivetree.com/blog/wp-content/uploads/2018/04/otlawstillapply-1-768x338.jpg 768w, https://www.olivetree.com/blog/wp-content/uploads/2018/04/otlawstillapply-1.jpg 1170w" height="339" sizes="(max-width: 770px) 100vw, 770px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.olivetree.com/blog/wp-content/uploads/2018/04/otlawstillapply-1-1024x451.jpg&amp;raw" srcset="https://www.olivetree.com/blog/wp-content/uploads/2018/04/otlawstillapply-1-1024x451.jpg 1024w, https://www.olivetree.com/blog/wp-content/uploads/2018/04/otlawstillapply-1-300x132.jpg 300w, https://www.olivetree.com/blog/wp-content/uploads/2018/04/otlawstillapply-1-768x338.jpg 768w, https://www.olivetree.com/blog/wp-content/uploads/2018/04/otlawstillapply-1.jpg 1170w" title="Does the Old Testament Law Still Apply?" width="770"><span data-dcnode-id="11536" instrument_node=""> </span></a><span data-dcnode-id="11534" instrument_node="">
</span></div><span data-dcnode-id="11532" instrument_node="">
</span></header><span data-dcnode-id="11529" instrument_node="">
</span><div class="post-content description cf" data-dcnode-id="11379"><span data-dcnode-id="11528" instrument_node="">
</span><p data-dcnode-id="11523"><span data-dcnode-id="11527" instrument_node="">It’s a question we all ask ourselves at some point: does the Old Testament law still apply? Do Christians follow the Old Testament? Read the passage below along with the notes taken from the </span><a data-dcnode-id="11525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.olivetree.com/store/product.php%3Fproductid%3D25216" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="11526" instrument_node="">Chronological Life Application Study Bible</span></a><span data-dcnode-id="11524" instrument_node=""> to help you explore these questions.</span></p><span data-dcnode-id="11522" instrument_node="">
</span><div class="schema-faq wp-block-yoast-faq-block" data-dcnode-id="11513"><div class="schema-faq-section" data-dcnode-id="11515" id="faq-question-1580397764917"><strong class="schema-faq-question" data-dcnode-id="11520"><span data-dcnode-id="11521" instrument_node="">What is the Old Testament Law?</span></strong><span data-dcnode-id="11519" instrument_node=""> </span><p class="schema-faq-answer" data-dcnode-id="11517"><span data-dcnode-id="11518" instrument_node="">The Old Testament Law is found in Exodus, Leviticus, Numbers, and Deuteronomy. This includes the Ten Commandments. It is often referred to in Scripture as the “Law of Moses” or just “Law”.</span></p><span data-dcnode-id="11516" instrument_node=""> </span></div><span data-dcnode-id="11514" instrument_node=""> </span></div><span data-dcnode-id="11512" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="11504"><p data-dcnode-id="11505"><em data-dcnode-id="11506"><span data-dcnode-id="11511" instrument_node="">“Don’t misunderstand why I have come. I did not come to abolish the law of Moses or the writings of the prophets. No, I came to accomplish their purpose. I tell you the truth, until heaven and earth disappear, not even the smallest detail of God’s law will disappear until its purpose is achieved. So if you ignore the least commandment and teach others to do the same, you will be called the least in the Kingdom of Heaven. But anyone who obeys God’s laws and teaches them will be called great in the Kingdom of Heaven. But I warn you—unless your righteousness is better than the righteousness of the teachers of religious law and the Pharisees, you will never enter the Kingdom of Heaven!”</span><strong data-dcnode-id="11507"><span data-dcnode-id="11510" instrument_node=""> — </span><a data-dcnode-id="11508" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.olivetree.com/bible/%3Fquery%3DMatthew%2B5%253A17-20%26version%3DNIV" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="11509" instrument_node="">MATTHEW 5:17-20</span></a></strong></em></p></blockquote><span data-dcnode-id="11503" instrument_node="">
</span><h2 data-dcnode-id="11500" id="video"><strong data-dcnode-id="11501"><span data-dcnode-id="11502" instrument_node="">DOES THE OLD TESTAMENT LAW STILL APPLY?</span></strong></h2><span data-dcnode-id="11499" instrument_node="">
</span><p data-dcnode-id="11497"><span data-dcnode-id="11498" instrument_node="">If Jesus did not come to abolish the law, does that mean all the Old Testament laws still apply to us today? In the Old Testament, the law has three dimensions: ceremonial, civil, and moral.</span></p><span data-dcnode-id="11496" instrument_node="">
</span><figure class="wp-block-video" data-dcnode-id="11494"><video controls="" data-dcnode-id="11495" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.olivetree.com/blog/wp-content/uploads/2018/04/Three_Types_of_OT_Law.mp4&amp;raw"></video></figure><span data-dcnode-id="11493" instrument_node="">
</span><h3 data-dcnode-id="11490"><strong data-dcnode-id="11491"><span data-dcnode-id="11492" instrument_node="">ONE: Ceremonial Law</span></strong></h3><span data-dcnode-id="11489" instrument_node="">
</span><p data-dcnode-id="11482"><em data-dcnode-id="11487"><span data-dcnode-id="11488" instrument_node="">The ceremonial law</span></em><span data-dcnode-id="11486" instrument_node=""> related specifically to Israel’s worship (see </span><a data-dcnode-id="11484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.olivetree.com/bible/%3Fquery%3DLev%2B1%253A2-3%26version%3DNIV" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="11485" instrument_node="">Lev 1:2-3</span></a><span data-dcnode-id="11483" instrument_node="">, for example). Its primary purpose was to point forward to Jesus Christ; these laws, therefore, were no longer necessary after Jesus’ death and resurrection. While ceremonial law no longer binds us, the principles behind them—to worship and love a holy God—still apply. The Pharisees often accused Jesus of violating ceremonial law.</span></p><span data-dcnode-id="11481" instrument_node="">
</span><h3 data-dcnode-id="11478"><strong data-dcnode-id="11479"><span data-dcnode-id="11480" instrument_node="">TWO: Civil Law</span></strong></h3><span data-dcnode-id="11477" instrument_node="">
</span><p data-dcnode-id="11470"><em data-dcnode-id="11475"><span data-dcnode-id="11476" instrument_node="">The civil law</span></em><span data-dcnode-id="11474" instrument_node=""> applied to daily living in Israel (see </span><a data-dcnode-id="11472" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.olivetree.com/bible/%3Fquery%3DDeut%2B24%253A10-11%26version%3DNIV" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="11473" instrument_node="">Deut 24:10-11</span></a><span data-dcnode-id="11471" instrument_node="">, for example). Because modern society and culture are so radically different from that time and setting, all of these guidelines cannot be followed specifically. But the principles behind the commands are timeless and should guide our conduct. Jesus demonstrated these principles by example.</span></p><span data-dcnode-id="11469" instrument_node="">
</span><h3 data-dcnode-id="11466"><strong data-dcnode-id="11467"><span data-dcnode-id="11468" instrument_node="">THREE: Moral Law</span></strong></h3><span data-dcnode-id="11465" instrument_node="">
</span><p data-dcnode-id="11458"><em data-dcnode-id="11463"><span data-dcnode-id="11464" instrument_node="">The moral law</span></em><span data-dcnode-id="11462" instrument_node=""> (such as the Ten Commandments) is the direct command of God, and it requires strict obedience (see </span><a data-dcnode-id="11460" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.olivetree.com/bible/%3Fquery%3DExod%2B20%253A13%26version%3DNIV" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="11461" instrument_node="">Exod 20:13</span></a><span data-dcnode-id="11459" instrument_node="">, for example). The moral law reveals the nature and will of God, and it still applies today. Jesus obeyed the moral law completely.</span></p><span data-dcnode-id="11457" instrument_node="">
</span><h2 data-dcnode-id="11454"><strong data-dcnode-id="11455"><span data-dcnode-id="11456" instrument_node="">THE ULTIMATE GOAL</span></strong></h2><span data-dcnode-id="11453" instrument_node="">
</span><p data-dcnode-id="11448"><span data-dcnode-id="11452" instrument_node="">God gave His laws to help people love God with all their hearts and minds. Throughout Israel’s history, however, these laws had often been misquoted and misapplied. By Jesus’ time, religious leaders had turned the laws into a confusing mass of rules. When Jesus talked about a new way to understand God’s law, he was actually trying to bring people back to its original purpose. Jesus did not speak against the law itself but against the abuses and excesses to which it had been subjected (see </span><a data-dcnode-id="11450" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.olivetree.com/bible/%3Fquery%3DJohn%2B1%253A17%26version%3DNIV" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="11451" instrument_node="">John 1:17</span></a><span data-dcnode-id="11449" instrument_node="">).</span></p><span data-dcnode-id="11447" instrument_node="">
</span><h2 data-dcnode-id="11444"><strong data-dcnode-id="11445"><span data-dcnode-id="11446" instrument_node="">OBEYING &gt; EXPLAINING</span></strong></h2><span data-dcnode-id="11443" instrument_node="">
</span><p data-dcnode-id="11441"><span data-dcnode-id="11442" instrument_node="">Some of those in the crowd were experts at telling others what to do, but they themselves missed the central point of God’s laws. Jesus made it clear that obeying God’s laws is more important than explaining them. It’s much easier to study God’s laws and tell others to obey them than to put them into practice. How are you doing at obeying God yourself?</span></p><span data-dcnode-id="11440" instrument_node="">
</span><h2 data-dcnode-id="11437"><strong data-dcnode-id="11438"><span data-dcnode-id="11439" instrument_node="">HEART CHANGE &gt; OBEYING</span></strong></h2><span data-dcnode-id="11436" instrument_node="">
</span><p data-dcnode-id="11434"><span data-dcnode-id="11435" instrument_node="">The Pharisees were exacting and scrupulous in their attempts to follow their laws. So how could Jesus reasonably call us to greater righteousness than theirs? The Pharisees’ weakness was that they were content to obey the laws outwardly without allowing God to change their hearts (or attitudes). They looked pious, but they were far from the Kingdom of Heaven. God judges our hearts as well as our deeds, for it is in the heart that our real allegiance lies.</span></p><span data-dcnode-id="11433" instrument_node="">
</span><p data-dcnode-id="11431"><span data-dcnode-id="11432" instrument_node="">Jesus was saying that his listeners needed a different kind of righteousness altogether (out of love for God), not just a more intense version of the Pharisees’ obedience (which was mere legal compliance). Our righteousness must</span></p><span data-dcnode-id="11430" instrument_node="">
</span><p data-dcnode-id="11426"><strong data-dcnode-id="11428"><span data-dcnode-id="11429" instrument_node="">(1)</span></strong><span data-dcnode-id="11427" instrument_node=""> come from what God does in us, not what we can do by ourselves,</span></p><span data-dcnode-id="11425" instrument_node="">
</span><p data-dcnode-id="11421"><strong data-dcnode-id="11423"><span data-dcnode-id="11424" instrument_node="">(2)</span></strong><span data-dcnode-id="11422" instrument_node=""> be God-centered, not self-centered,</span></p><span data-dcnode-id="11420" instrument_node="">
</span><p data-dcnode-id="11416"><strong data-dcnode-id="11418"><span data-dcnode-id="11419" instrument_node="">(3)</span></strong><span data-dcnode-id="11417" instrument_node=""> be based on reverence for God, not approval from people, and</span></p><span data-dcnode-id="11415" instrument_node="">
</span><p data-dcnode-id="11411"><strong data-dcnode-id="11413"><span data-dcnode-id="11414" instrument_node="">(4)</span></strong><span data-dcnode-id="11412" instrument_node=""> go beyond keeping the law to living by the principles behind the law. We should be just as concerned about our attitudes that people don’t see as about our actions that they do see.</span></p><span data-dcnode-id="11410" instrument_node="">
</span><h2 data-dcnode-id="11407"><strong data-dcnode-id="11408"><span data-dcnode-id="11409" instrument_node="">INTERESTED IN LEARNING MORE?</span></strong></h2><span data-dcnode-id="11406" instrument_node="">
</span><figure class="wp-block-image size-large is-style-default" data-dcnode-id="11404"><img alt="Chronological Life Application Study Bible" class="wp-image-47374" data-dcnode-id="11405" height="675" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.olivetree.com/blog/wp-content/uploads/2020/06/CLASBInApp.jpg&amp;raw" width="1200"></figure><span data-dcnode-id="11403" instrument_node="">

</span><div class="comment-text" data-dcnode-id="11064" itemprop="commentText"><p data-dcnode-id="11066"><span data-dcnode-id="11077" instrument_node="">Paul said in Romans 8:7-8</span><br data-dcnode-id="11076"><span data-dcnode-id="11075" instrument_node="">
For the mind that is set on the flesh is hostile to God, for it does not submit to God’s law; indeed</span><br data-dcnode-id="11074"><span data-dcnode-id="11073" instrument_node="">
indeed, it cannot. Those who are in the flesh cannot please God.</span><br data-dcnode-id="11072"><span data-dcnode-id="11071" instrument_node="">
Paul wrote throughout his writings that because of our weal flesh we did not have the power to obey God’s law. And that this fact was the schoolmaster to lead us to our needfor Christ and salvation by grace through faith and not by keeping the Law. The New Covenant is a completely new system that replaces the old system and cannreplace it because Christ did fulfill it,  bringbitvto completion. And so in Ephesians 2:14 -16</span><br data-dcnode-id="11070"><span data-dcnode-id="11069" instrument_node="">
For he himself is our peace, who has made us both one and has broken down in his flesh the dividing wall of hostility by abolishing the law of commandments expressed in ordinances, that he might create in himself one new man in place of the two, so making peace, and might reconcile us both to God in one body through the cross, thereby killing the hostility.</span><br data-dcnode-id="11068"><span data-dcnode-id="11067" instrument_node="">
Paul used the word “”abolish” because it is replaced by the new system of grace, relationship and its new dynamics.</span></p><span data-dcnode-id="11065" instrument_node="">

</span><div class="comment-text" data-dcnode-id="10624" itemprop="commentText"><p data-dcnode-id="10626"><span data-dcnode-id="10627" instrument_node="">After being miss lead for 30 years I finally got most of it figured out. When did the father change forever?  Malichi 3: I change not.! To follow the mainstream churches you are still hooked into the Roman church that changed the sabbath day. Changed all of Gods appointed times to meet with him and replace them with many of the cult systems that they absorbed.  You won’t get close to the father if you don’t keep Friday sunset to Saturday sunset. I found this to be the key to the kingdom. When the apostles talk about the law or in the first covenant this should be changed to the Torah. That’s what it is.. Remember the apostles were men like us. They can’t change the fathers words to fit the customs of today.  If anything doesn’t line up to the Torah then have nothing to do with it. The remnant is few and it’s a lonely walk. I do have a few who are like minded.</span></p><span data-dcnode-id="10625" instrument_node="">

</span><div class="comment-text" data-dcnode-id="10569" itemprop="commentText"><p data-dcnode-id="10571"><span data-dcnode-id="10580" instrument_node="">πληρόω</span><br data-dcnode-id="10579"><span data-dcnode-id="10578" instrument_node="">
plēroō</span><br data-dcnode-id="10577"><span data-dcnode-id="10576" instrument_node="">
play-ro’-o</span><br data-dcnode-id="10575"><span data-dcnode-id="10574" instrument_node="">
From G4134; to make replete, that is, (literally) to cram (a net), level up (a hollow), or (figuratively) to furnish (or imbue, diffuse, influence), satisfy, execute (an office), finish (a period or task), verify (or coincide with a prediction), etc.: – accomplish, X after, (be) complete, end, expire, fill (up), fulfil, (be, make) full (come), fully preach, perfect, supply.</span><br data-dcnode-id="10573"><span data-dcnode-id="10572" instrument_node="">
I would take fulfill to mean finishing, completion, satisfy, execute. When Jesus died he said “It is finished”. What was finished? Was it what he came to do? Why does Paul say that if you keep the law you are living under the curse of it? Galatians 3:13 tells us that Jesus redeemed us from the law, that is to rescue or ransom. Jesus said to love the Lord thy God, and to love thy neighbor as thyself, this encompasses the whole law. That was His commandments. Jesus died a death of love to free you from what you could never obtain by trying to follow the Mosaic Law. If you are to follow the Mosaic Law, you must follow it completely. There are not just 10 commandments there are 613! I suggest you get your life right and start following the whole Law. Or you can accept the gift that Christ died to give you and live a life of freedom. The life Jesus finished the Law for.</span></p><span data-dcnode-id="10570" instrument_node="">

</span><div class="comment-text" data-dcnode-id="9371" itemprop="commentText"><p data-dcnode-id="9373"><span data-dcnode-id="9376" instrument_node="">Paul put it this way: the Law was a schoolmaster to bring us to / see our need for Christ. It revealed to us God’s unattainable standard for righteousness,  which He imputes to us through faith that Christ’s sinless life and death paid the penalty for our unrighteousness – it satisfied the Law. God accepts the substitution of Christ’s righteousness for our sinfulness. We are declared righteous while remaining in a sinning state – in which we are to live befitting a redeemed child of Him who adopted us. Our joy and relief is</span><br data-dcnode-id="9375"><span data-dcnode-id="9374" instrument_node="">
that Christ declared us righteous, giving us the freedom to live pleasing to God, out of love and gratitude, without the cloud of sinless perfection hanging over us.</span></p><span data-dcnode-id="9372" instrument_node="">

</span><div class="comment-text" data-dcnode-id="9194" itemprop="commentText"><p data-dcnode-id="9274"><span data-dcnode-id="9275" instrument_node="">This is true in as far as sinful, unconverted man is. </span></p><span data-dcnode-id="9273" instrument_node="">
</span><p data-dcnode-id="9271"><span data-dcnode-id="9272" instrument_node="">“The carnal mind is enmity against God for it is not subject to the law of God, neither indeed can be.” Romans 8:7.</span></p><span data-dcnode-id="9270" instrument_node="">
</span><p data-dcnode-id="9268"><span data-dcnode-id="9269" instrument_node="">The Law (Moral) convicts us of our sin, that we might realise our guilt and our inability to keep God’s Law. </span></p><span data-dcnode-id="9267" instrument_node="">
</span><p data-dcnode-id="9265"><span data-dcnode-id="9266" instrument_node="">Christ, in coming to fulfill the law does two things. </span></p><span data-dcnode-id="9264" instrument_node="">
</span><p data-dcnode-id="9262"><span data-dcnode-id="9263" instrument_node="">1. He died for our sins, suffering the full penalty of the Law, so that we don’t have to. Thus, offering forgiveness to us.</span></p><span data-dcnode-id="9261" instrument_node="">
</span><p data-dcnode-id="9259"><span data-dcnode-id="9260" instrument_node="">2. He provided grace, through the Holy Spirit, to convict and convert us, so that we no longer walk a life of sin, but rather a life in the Spirit, whereby we fulfill the “righteousness of the law” in our own lives. (Romans 8:4)</span></p><span data-dcnode-id="9258" instrument_node="">
</span><p data-dcnode-id="9256"><span data-dcnode-id="9257" instrument_node="">In other words, we live in obedience to the law only through the grace of Christ. </span></p><span data-dcnode-id="9255" instrument_node="">
</span><p data-dcnode-id="9253"><span data-dcnode-id="9254" instrument_node="">“7 Because the carnal mind [is] enmity against God: for it is not subject to the law of God, neither indeed can be. 8 So then they that are in the flesh cannot please God. 9 But ye are not in the flesh, but in the Spirit, if so be that the Spirit of God dwell in you…” </span></p><span data-dcnode-id="9252" instrument_node="">
</span><p data-dcnode-id="9250"><span data-dcnode-id="9251" instrument_node="">If we are in the Spirit, we will not be walking according to the flesh. Galatians 5:19-21 identifies the works of the flesh – if you look at the list, you’ll see all that is listed is things that are transgressions of the law. “They which do such things shall not inherit the kingdom of God.”</span></p><span data-dcnode-id="9249" instrument_node="">
</span><p data-dcnode-id="9247"><span data-dcnode-id="9248" instrument_node="">Paul makes it clear again in Romans 13:8-10:</span></p><span data-dcnode-id="9246" instrument_node="">
</span><p data-dcnode-id="9244"><span data-dcnode-id="9245" instrument_node="">“8 Owe no man any thing, but to love one another: for he that loveth another hath fulfilled the law. 9 For this, Thou shalt not commit adultery, Thou shalt not kill, Thou shalt not steal, Thou shalt not bear false witness, Thou shalt not covet; and if [there be] any other commandment, it is briefly comprehended in this saying, namely, Thou shalt love thy neighbour as thyself. 10 Love worketh no ill to his neighbour: therefore love [is] the fulfilling of the law. ”</span></p><span data-dcnode-id="9243" instrument_node="">
</span><p data-dcnode-id="9241"><span data-dcnode-id="9242" instrument_node="">So loving your neighbour as yourself is actually fulfilling the law. What Law? The Law that says, don’t kill, steal, lie, covet, etc. That is the Moral law.</span></p><span data-dcnode-id="9240" instrument_node="">
</span><p data-dcnode-id="9238"><span data-dcnode-id="9239" instrument_node="">And this principle of loving your neighbour as yourself was not just a NT phenomenon. It lay at the heart of the OT law as well. </span></p><span data-dcnode-id="9237" instrument_node="">
</span><p data-dcnode-id="9235"><span data-dcnode-id="9236" instrument_node="">“18 …thou shalt love thy neighbour as thyself: I [am] the LORD.” Leviticus 19:18.</span></p><span data-dcnode-id="9234" instrument_node="">
</span><p data-dcnode-id="9232"><span data-dcnode-id="9233" instrument_node="">This fulfills the last 6 commandments. </span></p><span data-dcnode-id="9231" instrument_node="">
</span><p data-dcnode-id="9229"><span data-dcnode-id="9230" instrument_node="">“5 And thou shalt love the LORD thy God with all thine heart, and with all thy soul, and with all thy might.” Deut 6:5. </span></p><span data-dcnode-id="9228" instrument_node="">
</span><p data-dcnode-id="9226"><span data-dcnode-id="9227" instrument_node="">This fulfills the first 4 commandments. </span></p><span data-dcnode-id="9225" instrument_node="">
</span><p data-dcnode-id="9223"><span data-dcnode-id="9224" instrument_node="">Hence, Jesus confirmed the words of the Jewish scribe:</span></p><span data-dcnode-id="9222" instrument_node="">
</span><p data-dcnode-id="9220"><span data-dcnode-id="9221" instrument_node="">“32 And the scribe said unto him, Well, Master, thou hast said the truth: for there is one God; and there is none other but he: 33 And to love him with all the heart, and with all the understanding, and with all the soul, and with all the strength, and to love [his] neighbour as himself, is more than all whole burnt offerings and sacrifices.” </span></p><span data-dcnode-id="9219" instrument_node="">
</span><p data-dcnode-id="9217"><span data-dcnode-id="9218" instrument_node="">Hence Paul’s words in Romans: </span></p><span data-dcnode-id="9216" instrument_node="">
</span><p data-dcnode-id="9214"><span data-dcnode-id="9215" instrument_node="">“Love is the fulfilling of the law”</span></p><span data-dcnode-id="9213" instrument_node="">
</span><p data-dcnode-id="9211"><span data-dcnode-id="9212" instrument_node="">And Jesus himself:</span></p><span data-dcnode-id="9210" instrument_node="">
</span><p data-dcnode-id="9208"><span data-dcnode-id="9209" instrument_node="">“If ye love me, keep my commandments.” </span></p><span data-dcnode-id="9207" instrument_node="">
</span><p data-dcnode-id="9205"><span data-dcnode-id="9206" instrument_node="">It is the Moral law that identifies sin and where we fall short in fulfilling the law of love.  But it is the grace of God, in changing us, that enables us to fulfill the law:</span></p><span data-dcnode-id="9204" instrument_node="">
</span><p data-dcnode-id="9202"><span data-dcnode-id="9203" instrument_node="">The New Covenant promise actually is to have the principles of the law now written in our hearts and minds:</span></p><span data-dcnode-id="9201" instrument_node="">
</span><p data-dcnode-id="9199"><span data-dcnode-id="9200" instrument_node="">“10 For this [is] the covenant that I will make with the house of Israel after those days, saith the Lord; I will put my laws into their mind, and write them in their hearts: and I will be to them a God, and they shall be to me a people” Roman 8:10.</span></p><span data-dcnode-id="9198" instrument_node="">
</span><p data-dcnode-id="9196"><span data-dcnode-id="9197" instrument_node="">The article is spot on.</span></p><span data-dcnode-id="9195" instrument_node="">
</span></div><span data-dcnode-id="9193" instrument_node="">

</span><div class="comment-text" data-dcnode-id="9002" itemprop="commentText"><p data-dcnode-id="9004"><span data-dcnode-id="9005" instrument_node="">Leslee, if that were so, why did God wait thousands of years to give us a solution.  The laws, particularly the Ten Commandments, are the basis for almost every countries law, or they have been up until the last two-hundred years.  God started giving laws almost from the end of the creation process, when He rested and sanctified the seventh day and made it holy.  Then came the law that a man and a woman should unite as one flesh.  The Ten Commandments are divided into two parts, the first four commandments are about our relationship with God, the last six commands are about our relationship with each other.  These commands were given to protect humanity, not given to demonstrate how impossible t was to keep the law.  Jesus, during His earthly ministry obeyed and followed all of His Father’s laws, every one, and He also observed every one of His Father’s ordained feasts, feasts and holy days that are there to remind us how great God is and the great things He has done for us.  Jesus was fully God, but He was also fully human and had the same human weaknesses as we have, He demonstrated how a human could actually obey His Father’s law.</span></p><span data-dcnode-id="9003" instrument_node="">

</span><div class="comment-text" data-dcnode-id="8955" itemprop="commentText"><p data-dcnode-id="8957"><span data-dcnode-id="8958" instrument_node="">It seems many don’t understand the scriptures regarding the Law.  The Law that was abolished was the sacrificial law for sins because the Messiah is our sacrifice for if he didn’t die no will have a chance for life.   The change in the Levitical priesthood isi what Paul was talking  about.  The Levitical priesthood was added 430 years after the exodus because of SIN!  It says God Laws are not hard to keep accept the carnal mind is against cause righteousness.   God’s covenant is forever with Israel.  Besides the gentiles wasn’t given the covenant but the door was always open for the gentiles to be grafted in with the Jews as what Paul Said.</span></p><span data-dcnode-id="8956" instrument_node="">

</span><div class="comment-text" data-dcnode-id="8757" itemprop="commentText"><p data-dcnode-id="8759"><span data-dcnode-id="8760" instrument_node="">The servant is not above His master. Man must take up his own cross and go through the death of self by being obedient to the Holy Spirit unto death. Man must give up his sins out of a true love for God above self. Whosoever refuses to do this is not worthy of Christ. The only way for this to be accomplished is for man to truly repent of his sins and allow God to baptize him with the Holy Spirit with the gift of man’s prayer language. This gift is man’s way to directly communicate with God to know His will. Now man is prepared to go through the Baptism of Fire which is sanctification. Sin cannot enter into the Kingdom of God. It must be removed through the Fiery baptism before man’s death. This is the message of True salvation.</span></p><span data-dcnode-id="8758" instrument_node="">

</span><div class="text" data-dcnode-id="8342"><span data-dcnode-id="8352" instrument_node="">
</span><div class="comment-text" data-dcnode-id="8344" itemprop="commentText"><p data-dcnode-id="8346"><span data-dcnode-id="8351" instrument_node="">When I re-read and study the texts people used to avoid God’s Law, I find huge discrepancies in their interpretations and conclusions. They miss-understood Paul because the English transitions  were slightly but subtly missed Paul’s points. And those who skim-read it missed the correct and accurate meanings of Paul. Take for example, Col.2:14 &amp; Gal.3:13;  In their struggle to find a New Testament scripture that supports their misconception that God’s law is “done away,” antinomians point to Colossians 2:14 to “prove” that Christ nailed the law of God to the cross. Proponents of such a teaching say that the “handwriting of requirements [ordinances, KJV]” refers to the law “that was against us.” They further claim that Christ “took it out of the way” or abolished the law.</span><br data-dcnode-id="8350"><span data-dcnode-id="8349" instrument_node="">
The phrase “handwriting of requirements” is translated from the Greek phrase cheirographon tois dogmasin. Cheirographon means anything written by hand, but can more specifically apply to a legal document, bond, or note of debt. Dogmasin refers to decrees, laws, or ordinances, and in this context means a body of beliefs or practices that have become the guidelines governing a person’s conduct or way of life.</span><br data-dcnode-id="8348"><span data-dcnode-id="8347" instrument_node="">
What Paul is saying is that, by His death, Christ has justified us—brought us into alignment with His Law—and wiped out the note of guilt or debt that we owed as a result of our sins.   And Gal.313,  the context gave it away! See vs. 10, “10 For as many as are of the works of the law are under the curse: for it is written, Cursed is every one that continueth not in all things which are written in the book of the law to do them.” Curse is only pronounced on those who “CONTINUETH NOT” or DISOBEYED the Law of God, not the obedient! But because “all have sinned” Rom. 3:23, the curse came upon all. Therefore, Jesus died (cursed) to redeem us from that curse! NOT TO ERADICATE God’s Righteous Standards .</span></p><span data-dcnode-id="8345" instrument_node="">

</span><img alt="" class="avatar avatar-60 photo" data-dcnode-id="8132" height="60" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/547036e80b6c069761aedccbbfe58f35%3Fs%3D60%26d%3Dblank%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/547036e80b6c069761aedccbbfe58f35?s=120&amp;d=blank&amp;r=g 2x" width="60"><span data-dcnode-id="8131" instrument_node=""> </span></div><span data-dcnode-id="8129" instrument_node="">

</span></a><span data-dcnode-id="8114" instrument_node="">

</span></div><span data-dcnode-id="8108" instrument_node=""> </span><span data-dcnode-id="8106" instrument_node="">
</span><div class="text" data-dcnode-id="8087"><span data-dcnode-id="8105" instrument_node="">
</span><div class="comment-text" data-dcnode-id="8089" itemprop="commentText"><p data-dcnode-id="8103"><span data-dcnode-id="8104" instrument_node="">Michael, Peter’s vision in Acts 11:8 is NOT about us eating clean or unclean animals, it’s about calling the Gentiles unclean because immediately after the vision, three men visit him from Cornelius’ house, and the Spirit told him to go with them, “MAKING NO DISTINCTION.” The point of the vision was not about eating animals clean or unclean but about the fact that God made no distinction between the Jews and Gentiles in regards to hearing the Good News.</span></p><span data-dcnode-id="8102" instrument_node="">
</span><p data-dcnode-id="8100"><span data-dcnode-id="8101" instrument_node="">The vision of the sheet from heaven is usually interpreted to mean that the dietary laws in the Torah have been revoked. But this interpretation is not supported by the text.</span></p><span data-dcnode-id="8099" instrument_node="">
</span><p data-dcnode-id="8097"><span data-dcnode-id="8098" instrument_node="">First, this interpretation contradicts earlier Scripture. If we accept the traditional interpretation (that God intended for His people to disregard the laws of clean and unclean), then we must concede that God has changed His mind and REPEALED His eternal and unchanging Torah. We are left with Holy Scripture that hopelessly contradicts itself. The result of such thinking is that no Scripture is certain, and no mandate of God is definite.</span></p><span data-dcnode-id="8096" instrument_node="">
</span><p data-dcnode-id="8094"><span data-dcnode-id="8095" instrument_node="">A second problem with the “all foods clean” interpretation of Peter’s vision is that it is only a vision. The conventional understanding seems to assume that Peter proceeded to kill and eat the animals in the sheet, enjoying a sumptuous feast of WILD BEASTS, CATS AND LIZARDS….REALLY??!! In fact, Peter does not “kill and eat,” but responds correctly and lawfully, “By no means, Lord!” After this happens two more times, the sheet is withdrawn.</span></p><span data-dcnode-id="8093" instrument_node="">
</span><p data-dcnode-id="8091"><span data-dcnode-id="8092" instrument_node="">Furthermore, the “all foods clean” interpretation is not part of the story. Though there is discussion of eating with Gentiles, there is no mention of eating unclean animals before or after the vision. Neither is that interpretation born out by the remainder of Acts, which continues to paint the believers as a Torah-observant sect of Judaism.</span></p><span data-dcnode-id="8090" instrument_node="">

</span><div class="text" data-dcnode-id="8042"><span data-dcnode-id="8048" instrument_node="">
</span><div class="comment-text" data-dcnode-id="8044" itemprop="commentText"><p data-dcnode-id="8046"><span data-dcnode-id="8047" instrument_node="">The Torah, God’s schoolmaster to lead us to Christ, declared God’s unattainable standard of righteousness, which He imputes to us by faith in Christ’s once-for-all atonement. Paul reproved those who compelled the Gentiles (in Acts and the Epistles) to keep the ceremonial Law. There is no requirement to observe the feasts, say, of the Law but doing so is certainly beneficial to internalize the extent to which our imputed righteousness was attained through Christ’s substitutionary death. If we take his fulfillment – satisfaction before God – of the Law’s requirements, then there is no longer the need for the blood sacrifice and other sacrifices for sin ( stated in Hebrews). If we consider All of the Torah as eternal, unfulfilled and unsatisfied before God, then we should continue with ALL the sacrifices to pay for our sin – and RejecT Christ’s eternal atonement – thus remaining unredeemed. Do you observe all the sacrifices?</span></p><span data-dcnode-id="8045" instrument_node="">

</span><div class="comment-text" data-dcnode-id="7859" itemprop="commentText"><p data-dcnode-id="7880"><span data-dcnode-id="7893" instrument_node="">Then what about Romans 14: 1-6</span><br data-dcnode-id="7892"><span data-dcnode-id="7891" instrument_node="">
1 Receive one who is weak in the faith, but not to disputes over doubtful things.</span><br data-dcnode-id="7890"><span data-dcnode-id="7889" instrument_node="">
2 For one believes he may eat all things, but he who is weak eats only vegetables.</span><br data-dcnode-id="7888"><span data-dcnode-id="7887" instrument_node="">
3 Let not him who eats despise him who does not eat, and let not him who does not eat judge him who eats; for God has received him.</span><br data-dcnode-id="7886"><span data-dcnode-id="7885" instrument_node="">
4 Who are you to judge another’s servant? To his own master he stands or falls. Indeed, he will be made to stand, for God is able to make him stand.</span><br data-dcnode-id="7884"><span data-dcnode-id="7883" instrument_node="">
5 One person esteems one day above another; another esteems every day alike. Let each be fully convinced in his own mind.</span><br data-dcnode-id="7882"><span data-dcnode-id="7881" instrument_node="">
6 He who observes the day, observes it to the Lord; and he who does not observe the day, to the Lord he does not observe it. He who eats, eats to the Lord, for he gives God thanks; and he who does not eat, to the Lord he does not eat, and gives God thanks.</span></p><span data-dcnode-id="7879" instrument_node="">
</span><p data-dcnode-id="7861"><span data-dcnode-id="7878" instrument_node="">and Colossians 2: 16-23</span><br data-dcnode-id="7877"><span data-dcnode-id="7876" instrument_node="">
16 So let no one judge you in food or in drink, or regarding a festival or a new moon or sabbaths,</span><br data-dcnode-id="7875"><span data-dcnode-id="7874" instrument_node="">
17 which are a shadow of things to come, but the substance is of Christ.</span><br data-dcnode-id="7873"><span data-dcnode-id="7872" instrument_node="">
18 Let no one cheat you of your reward, taking delight in false humility and worship of angels, intruding into those things which he has not seen, vainly puffed up by his fleshly mind,</span><br data-dcnode-id="7871"><span data-dcnode-id="7870" instrument_node="">
19 and not holding fast to the Head, from whom all the body, nourished and knit together by joints and ligaments, grows with the increase that is from God.</span><br data-dcnode-id="7869"><span data-dcnode-id="7868" instrument_node="">
20 Therefore, if you died with Christ from the basic principles of the world, why, as though living in the world, do you subject yourselves to regulations–</span><br data-dcnode-id="7867"><span data-dcnode-id="7866" instrument_node="">
21 “Do not touch, do not taste, do not handle,”</span><br data-dcnode-id="7865"><span data-dcnode-id="7864" instrument_node="">
22 which all concern things which perish with the using–according to the commandments and doctrines of men?</span><br data-dcnode-id="7863"><span data-dcnode-id="7862" instrument_node="">
23 These things indeed have an appearance of wisdom in self-imposed religion, false humility, and neglect of the body, but are of no value against the indulgence of the flesh.</span></p><span data-dcnode-id="7860" instrument_node="">

</span><div class="comment-text" data-dcnode-id="7249" itemprop="commentText"><p data-dcnode-id="7260"><span data-dcnode-id="7261" instrument_node="">“11 Now if perfection was through the Levitical priesthood (for on the basis of it the people received the Law), what further need was there for another priest to arise according to the order of Melchizedek, and not be designated according to the order of Aaron? 12 For when the priesthood is changed, of necessity there takes place a change of law also. 13 For the one concerning whom these things are spoken belongs to another tribe, from which no one has officiated at the altar. 14 For it is evident that our Lord was descended from Judah, a tribe with reference to which Moses spoke nothing concerning priests. 15 And this is clearer still, if another priest arises according to the likeness of Melchizedek, 16 who has become such not on the basis of a law of physical requirement, but according to the power of an indestructible life. 17 For it is attested of Him, “YOU ARE A PRIEST FOREVER ACCORDING TO THE ORDER OF MELCHIZEDEK.” 18 For, on the one hand, there is a setting aside of a former commandment because of its weakness and uselessness 19 (for the Law made nothing perfect), and on the other hand there is a bringing in of a better hope, through which we draw near to God.” – Heb 7:11-19 NASB</span></p><span data-dcnode-id="7259" instrument_node="">
</span><p data-dcnode-id="7257"><span data-dcnode-id="7258" instrument_node="">Everyone seems to ignore these verses and in particular verse 12.  Has the priesthood changed?  Obviously it has unless you discount the book of Hebrews.  Christ is the new high priest and he is of the tribe of Judah – a new priesthood,  “For when the priesthood is changed, of necessity there takes place a change of law also.” How has the law then changed?  Christ has greatly simplified the law for us, even simpler than Micah’s do justly, and to love mercy, and to walk humbly with your God.  So now we have the commandments (law) of Jesus to keep.     </span></p><span data-dcnode-id="7256" instrument_node="">
</span><p data-dcnode-id="7254"><span data-dcnode-id="7255" instrument_node="">“29 Jesus answered, “The foremost is, ‘HEAR, O ISRAEL! THE LORD OUR GOD IS ONE LORD; 30 AND YOU SHALL LOVE THE LORD YOUR GOD WITH ALL YOUR HEART, AND WITH ALL YOUR SOUL, AND WITH ALL YOUR MIND, AND WITH ALL YOUR STRENGTH.’ 31 “The second is this, ‘YOU SHALL LOVE YOUR NEIGHBOR AS YOURSELF.’ There is no other commandment greater than these.” 32 The scribe said to Him, “Right, Teacher; You have truly stated that HE IS ONE, AND THERE IS NO ONE ELSE BESIDES HIM; 33 AND TO LOVE HIM WITH ALL THE HEART AND WITH ALL THE UNDERSTANDING AND WITH ALL THE STRENGTH, AND TO LOVE ONE’S NEIGHBOR AS HIMSELF, is much more than all burnt offerings and sacrifices.” 34 When Jesus saw that he had answered intelligently, He said to him, “You are not far from the kingdom of God.” After that, no one would venture to ask Him any more questions.” – Mar 12:29-34 NASB</span></p><span data-dcnode-id="7253" instrument_node="">
</span><p data-dcnode-id="7251"><span data-dcnode-id="7252" instrument_node="">Because of the blood sacrifice of Jesus, do this and you shall live my brothers.</span></p><span data-dcnode-id="7250" instrument_node="">

</span><div class="comment-text" data-dcnode-id="7152" itemprop="commentText"><p data-dcnode-id="7154"><span data-dcnode-id="7157" instrument_node="">I ask ;  To whom did God the Father give all authority in heaven and in earth?  To Jesus or to Paul?</span><br data-dcnode-id="7156"><span data-dcnode-id="7155" instrument_node="">
Christians accept Paul’s authority on the unsubstantiated  belief that Paul was chosen by Jesus to take the gospel throughout the world. Paul’s alleged encounter with Jesus occurred after Jesus had ascended back  to heaven.  In Acts 3: 21 We are told  that once Jesus ascended to heaven;  he then must remain in heaven, until the restitution of all things; speaking of course of the time of his second coming. While the angels confirmed that  Jesus would indeed return to the  earth one day. they also warned that heavenly signs would of necessity accompany this future event. Matthew 24:23 -30  gives us a detailed description of the signs which would accompany his return to this earth.  Jesus warned his disciples  to be highly suspicious  of anyone who would come along claiming  that  he ( Jesus ) had in fact returned -Matthew 24: 23- 26, but who’s return was not accompanied by the necessary prophesied signs and especially if  every living person didn’t  witness the watershed event with their own eyes. Acts 3: 21 tells us that once Jesus ascended to heaven;  he then must remain in heaven, until the restitution of all things; speaking of course of the time of his second coming.  Deut 19:15 and John 8:17;  teach us ; it is only by the testimony of two witnesses that a matter is to be established as truth. This is vitally important, because of  all the men who were allegedly said to have  been with Paul during his miraculous encounter with Jesus;  none of these men share any personal accounts of what they actually seen or heard.  We are not even  given the number,  their names much less their testimony’s.  This is a huge problem for those who claim to trust Paul’s apostolic authority based on his word alone.  Remember, this is the same man who had been persecuting the believers in Christ and was actually on his way to Damascus to round them up for imprisonment.   It’s true that Paul’s companion Luke recorded the details of the historic event, yet we recieve only one persons version of what transpired. That being Paul’s version. Even Ananias was not a “witness” to anything pertaining to the actual event, and while we are given his name, we are not afforded any personal testimony,  in his own words of what he was told to do,  but instead we have only Paul’s account of what Ananias was shown and told to do.  This unsubstantiated evidence would never hold up in any court of Law, especially in God’s court.  We have all been dooped into believing Paul’s epistles came through revelations given to Paul  from Jesus, even though it is Paul’s  epistles that we find doctrines that actually lead us away from following  God’s word – Duet 13:1-3.  Since Jesus hold’s all authority in heaven and earth; I caution everyone reading this post to follow Christ’s words over Paul’s word every time and you will have no need to be afraid when you stand before the throne on Judgement day .  Jesus asked:  Why do you call me Lord, Lord and do not the things that I say.  Who is your Lord?  Paul or Christ.</span></p><span data-dcnode-id="7153" instrument_node="">

</span><div class="comment-text" data-dcnode-id="6599" itemprop="commentText"><p data-dcnode-id="6639"><span data-dcnode-id="6642" instrument_node="">Herb,</span><br data-dcnode-id="6641"><span data-dcnode-id="6640" instrument_node="">
Paul wrote about 7 laws:</span></p><span data-dcnode-id="6638" instrument_node="">
</span><p data-dcnode-id="6636"><span data-dcnode-id="6637" instrument_node="">1. The Law of God. This is simply all the instructions that we have received from our Creator. In Hebrew, this would be referred to as the Torah. </span></p><span data-dcnode-id="6635" instrument_node="">
</span><p data-dcnode-id="6633"><span data-dcnode-id="6634" instrument_node="">2. The Law of Sin. Rom. 7:23-24. The context is that we are all under the law of sin. As Paul says to the Romans, “There is none righteous; there are none who seek after God.”</span></p><span data-dcnode-id="6632" instrument_node="">
</span><p data-dcnode-id="6630"><span data-dcnode-id="6631" instrument_node="">3. The Law of Sin and Death. Rom. 8:2, “For the law of the Spirit of life has set you free in Christ Jesus from the law of sin and death.”</span></p><span data-dcnode-id="6629" instrument_node="">
</span><p data-dcnode-id="6627"><span data-dcnode-id="6628" instrument_node="">4. The Law of the Spirit. Rom. 8:2 (see above). 1 Cor. 2:13 speaks of being taught by the Spirit. </span></p><span data-dcnode-id="6626" instrument_node="">
</span><p data-dcnode-id="6624"><span data-dcnode-id="6625" instrument_node="">5. The Law of Faith. Rom. 3:27–“Then what becomes of our boasting? It is excluded. By what kind of law? By a law of works? No, but by the law of faith.”</span></p><span data-dcnode-id="6623" instrument_node="">
</span><p data-dcnode-id="6617"><span data-dcnode-id="6622" instrument_node="">6. The Law of Righteousness. 1 John 2:29 (ESV)</span><br data-dcnode-id="6621"><span data-dcnode-id="6620" instrument_node="">
29 &nbsp;If you know that he is righteous, you may be sure that everyone who practices righteousness has been born of him.</span><br data-dcnode-id="6619"><span data-dcnode-id="6618" instrument_node="">
Paul taught that as we obeyed the Law of Faith, it produced righteousness in our lives.</span></p><span data-dcnode-id="6616" instrument_node="">
</span><p data-dcnode-id="6612"><span data-dcnode-id="6615" instrument_node="">7. The Law of Christ. 1 Corinthians 9:21 (ESV)</span><br data-dcnode-id="6614"><span data-dcnode-id="6613" instrument_node="">
21 &nbsp;To those outside the law I became as one outside the law (not being outside the law of God but under the law of Christ) that I might win those outside the law. </span></p><span data-dcnode-id="6611" instrument_node="">
</span><p data-dcnode-id="6609"><span data-dcnode-id="6610" instrument_node="">Paul states that he is not outside the Law of God (Romans 3:31; 7:22-25) but under The Law of Christ (1 Cor. 9:21). </span></p><span data-dcnode-id="6608" instrument_node="">
</span><p data-dcnode-id="6606"><span data-dcnode-id="6607" instrument_node="">Paul is saying that he is in the Law of God and The Law of Christ, at the same time. Meaning what? They are the same thing.</span></p><span data-dcnode-id="6605" instrument_node="">
</span><p data-dcnode-id="6601"><span data-dcnode-id="6604" instrument_node="">The Law of God (Instructions/Torah)  =  The Law of Christ (1 Cor. 9:21)</span><br data-dcnode-id="6603"><span data-dcnode-id="6602" instrument_node="">
The instructions that Yeshua gave us are the same as the Law of God. Yeshua ONLY followed the Law of God. To follow the law of Christ is the same as following the Law of God..</span></p><span data-dcnode-id="6600" instrument_node="">
</span></div><span data-dcnode-id="6598" instrument_node="">

</span><div class="comment-text" data-dcnode-id="6380" itemprop="commentText"><p data-dcnode-id="6382"><span data-dcnode-id="6397" instrument_node="">If we have to stringently obey the Ten Commandments then the 7th Day Adventists are correct in saying we still have to have a Saturday Sabbath.</span><br data-dcnode-id="6396"><span data-dcnode-id="6395" instrument_node="">
The 7th Day Adventists claim it was the Roman Catholic Church that changed the Sabbath Day.</span><br data-dcnode-id="6394"><span data-dcnode-id="6393" instrument_node="">
But Paul instructed the Corinthians about their giving in 1 Cor. 16:1-2: Now concerning the collection for the saints: as I directed the churches of Galatia, so you also are to do. On the first day of every week, each of you is to put something aside and store it up, as he may prosper, so that there will be no collecting when I come.</span><br data-dcnode-id="6392"><span data-dcnode-id="6391" instrument_node="">
The Christians in the Apostles time met on Sunday not Saturday.</span><br data-dcnode-id="6390"><span data-dcnode-id="6389" instrument_node="">
Another argument they have is that Paul wentbto the synagogues to discuss the Gospel with the Jews. He had to. That is when the Jews assembled.</span><br data-dcnode-id="6388"><span data-dcnode-id="6387" instrument_node="">
The Spiritual fulfillment of the Saturday Sabbath is Hebrews for that talks about the rest we have in God because we have the Spirit of God living in us.</span><br data-dcnode-id="6386"><span data-dcnode-id="6385" instrument_node="">
Paul, the Apostle, did NOT make any distinction between moral law, ceremonial law or civil law. He said in Ephesians 2:14-15  that Christ broke down the wall 15 “ by abolishing the law of commandments expressed in ordinances.“  His words seems to be all inclusive of laws, commandments and ordinances.</span><br data-dcnode-id="6384"><span data-dcnode-id="6383" instrument_node="">
Under the Old Covenant they were slaves to God’s laws. Under the New Covenant we live by the Holy Spirit guiding us directly and through our conscience. And so now we are slaves to the Spirit which is Christ/God. And manytimes Paul wrote that he was Christ’s doulos-slave.</span></p><span data-dcnode-id="6381" instrument_node="">

</span><div class="comment-text" data-dcnode-id="6320" itemprop="commentText"><p data-dcnode-id="6334"><span data-dcnode-id="6337" instrument_node="">Sorry Gordon, I have to disagree.</span><br data-dcnode-id="6336"><span data-dcnode-id="6335" instrument_node="">
It is not just the Seventh Day Adventists that keep the 4th commandment, but also the many Messianic congregations of Jews and gentiles.  Ex 20:11 records that the Lord made it (the seventh day) holy.</span></p><span data-dcnode-id="6333" instrument_node="">
</span><p data-dcnode-id="6331"><span data-dcnode-id="6332" instrument_node="">I do not see the evidence that the early believers met exclusively on the first day, but rather that they met ‘day by day’.</span></p><span data-dcnode-id="6330" instrument_node="">
</span><p data-dcnode-id="6328"><span data-dcnode-id="6329" instrument_node="">I would suggest that  Paul’s instruction that collections should be  made on the first day (1 Cor 16) is because financial matters would not be allowed on the shabbat.</span></p><span data-dcnode-id="6327" instrument_node="">
</span><p data-dcnode-id="6325"><span data-dcnode-id="6326" instrument_node="">There is much evidence in the writings of the early church fathers that believers met together on the shabbat, and that they met in the synagogues.  The edicts demanding first day services are a feature of the 4th CE.</span></p><span data-dcnode-id="6324" instrument_node="">
</span><p data-dcnode-id="6322"><span data-dcnode-id="6323" instrument_node="">Is there also a strong case for abandoning any of the other commandments?  In this day and age, should we not also abandon honouring parents and allow adultery?</span></p><span data-dcnode-id="6321" instrument_node="">

</span><div class="comment-text" data-dcnode-id="6227" itemprop="commentText"><p data-dcnode-id="6229"><span data-dcnode-id="6230" instrument_node="">Understood. But in keeping with Paul’s dismissal of observing certain days as more important than others – with no exceptions given for the Sabbath Or the Lord’s Day – consider this: the PrinciplE of Sabbath is what’s eternal. The whole intent of Sabbath was to pause in attempts at self-provision in a deliberate remembrance and reliance on God to be our faithful Provider, and we but minor (though required) participants in providing for ourselves. This is more obvious in the stated rationale for observing the seventh and Jubilee years’ rest (Sabbaths) for the land, and by extension, for themselves. His people were to TrusT Him to provide enough beforehand to carry them during those years – and so also to provide enough in 6 days to suffice for 7th. .. There are ways we can observe Sabbaths every day, or week. Whether with a portion of every day, or week – or whenever we catch ourselves frantically working out of anxiety for not having “enough” –  we can decide to take our hands off the plow of self-provision for a period of time, to breathe, to remind ourselves that it is He who provides and not we ourselves, to resolve to rely on Him to do so, and thank Him that He is faithful. This is my Personal way to observe the Sabbath because it observes what I believe God had in mind behind the commandment. Consider it valid or not as you will; I compel no one to do the same.</span></p><span data-dcnode-id="6228" instrument_node="">

</span><div class="comment-text" data-dcnode-id="5879" itemprop="commentText"><p data-dcnode-id="5881"><span data-dcnode-id="5882" instrument_node="">The Sabbath on the seventh day goes back even further than Ex 20:11.  In Gen 2:3 it says “God blessed the seventh day and sanctified it.”  To me that’s a big deal, and I find it hard to accept that Sunday is the now the day many people call the Sabbath.  If you do the research you will find Constantine I changed it in 370 AD.  He worshiped the sun, so thus Sunday.  After that, a pope in the Catholic church accepted it as the day of rest for Christians.  If Sunday was biblical, you would have thought Paul would have wrote about somewhere in the Bible, but he doesn’t.  That would have been a pretty big change for the people, and would have needed some explanation.</span></p><span data-dcnode-id="5880" instrument_node="">

</span><p data-dcnode-id="5722"><span data-dcnode-id="5723" instrument_node="">Notice that he said, “For Moses has been preached in every city from the earliest times and is READ in the SYNAGOGUES on EVERY SABBATH.”  In other words, James was saying that we won’t burden these new Gentile believers with a lot of rules and commandments–just what is necessary for the time being so that they can have fellowship with their Jewish brethren. And, in time, as they hear Moses taught every Sabbath in the synagogue, they’ll LEARN and become obedient to the rest of the Torah.</span></p><span data-dcnode-id="5721" instrument_node="">

</span><div class="comment-text" data-dcnode-id="5573" itemprop="commentText"><p data-dcnode-id="5575"><span data-dcnode-id="5576" instrument_node="">Gordon I will have to affirm the Bible here…it says we are to obey the commandments…and commandments shouldn’t be taken to mean only the ten moral precepts but all that he requires of us. (but let’s focus on the one that so many wants to put aside) If love to God is the greatest commandment as stated by Jesus (God Himself) how can any person seek to change what he established at creation as His day of rest. It seems many forget that the day of rest (Sabbath) was not established with and for the Jewish nation…it was designated in creation week and reaffirmed with the calling of the Jewish nation as His chosen people…reminding them to keep it holy, for two reasons,  He created  and He delivered them from Egypt. There are those who would suggest that with the dawn of the christian church a new Sabbath was designated, but there is certainly no edict in scripture that this should be done, nor does it indicate that because Jesus is our rest that the day of rest is no longer to be observed. There is no doubt in my mind that if God saw it important to set aside and emphasise, (remember) the Sabbath day, if there was to be a change or setting aside for a new day, it would have been equally emphasised and stated.</span></p><span data-dcnode-id="5574" instrument_node="">

</span><div class="comment-text" data-dcnode-id="5524" itemprop="commentText"><p data-dcnode-id="5529"><span data-dcnode-id="5530" instrument_node="">Gerry, here’s the rub–so many who misunderstand the keeping of the TORAH, think we’re talking about keeping it for salvation. We KNOW and FULLY UNDERSTAND that we are SAVED by GRACE through faith in Yeshua, by His blood atonement on the cross. He is our Passover Lamb, sacrificed for our sins so that we might be forgiven and reconciled to God, the Father. </span></p><span data-dcnode-id="5528" instrument_node="">
</span><p data-dcnode-id="5526"><span data-dcnode-id="5527" instrument_node="">So often the Apostle Paul is misunderstood to be railing AGAINST the LAW but what he is attacking is the belief that keeping the LAW would bring salvation. He also at times is referring to the oral commands as laid down by the Pharisees (known as the Talmud) which were the traditions of men.</span></p><span data-dcnode-id="5525" instrument_node="">

</span><div class="comment-text" data-dcnode-id="5005" itemprop="commentText"><p data-dcnode-id="5007"><span data-dcnode-id="5008" instrument_node="">A pretty cursory reading (let alone a serious study!) of Hebrews 8-10 demonstrates beyond doubt that our new covenant in Christ is the covenant God offers to all humanity now. The former things were written for our instruction (Rom. 15:4), but the Sinai covenant was given to Israel, nobody else. The splitting of that Law into “ceremonial, civil and moral” is an attempt to retain what we prefer of that covenant and ignore what we don’t prefer. God doesn’t offer us a covenant on those terms. We can accept the covenant He offers us in Christ, or we can reject it. We are not offered the authority to rewrite it. If church leaders would simply study the change in covenants so clearly stated in Hebrews 8, a great deal of religious confusion would vanish.</span></p><span data-dcnode-id="5006" instrument_node="">

Ezekiel 36:25-27 (NASB)</span><br data-dcnode-id="4957"><span data-dcnode-id="4956" instrument_node="">
25 &nbsp;“Then I will sprinkle clean water on you, and you will be clean; I will cleanse you from all your filthiness and from all your idols.</span><br data-dcnode-id="4955"><span data-dcnode-id="4954" instrument_node="">
26 &nbsp;“Moreover, I will give you a new heart and put a new spirit within you; and I will remove the heart of stone from your flesh and give you a heart of flesh.</span><br data-dcnode-id="4953"><span data-dcnode-id="4952" instrument_node="">
27 &nbsp;“I will put My Spirit within you and cause you to walk in My statutes, and you will be careful to observe My ordinances. </span></p><span data-dcnode-id="4950" instrument_node="">
</span><p data-dcnode-id="4948"><span data-dcnode-id="4949" instrument_node="">God says that along with giving us a new heart and putting his spirit within us, and giving us a heart of flesh, He will CAUSE us to walk in God’s statutes and that we would be CAREFUL to observe His ordinances (the Torah). </span></p><span data-dcnode-id="4947" instrument_node="">
</span><p data-dcnode-id="4939"><span data-dcnode-id="4946" instrument_node="">If we as New Testament believers are NOT supposed to walk in the Torah, why does John say, 1 John 2:4-6 (ESV)</span><br data-dcnode-id="4945"><span data-dcnode-id="4944" instrument_node="">
4  Whoever says “I know him” but does not keep his commandments is a liar, and the truth is not in him,</span><br data-dcnode-id="4943"><span data-dcnode-id="4942" instrument_node="">
5  but whoever keeps his word, in him truly the love of God is perfected. By this we may know that we are in him:</span><br data-dcnode-id="4941"><span data-dcnode-id="4940" instrument_node="">
6  whoever says he abides in him ought to walk in the same way in which he walked. </span></p><span data-dcnode-id="4938" instrument_node="">
</span><p data-dcnode-id="4936"><span data-dcnode-id="4937" instrument_node="">John says that if we say we KNOW Jesus, we should keep his commandments. What commandments? John says that we can know that we KNOW him is we WALK in the same way that Jesus walked. How did Jesus walk? He kept the Torah. He observed the Sabbath and kept it holy.</span></p><span data-dcnode-id="4935" instrument_node="">

</span><div class="comment-text" data-dcnode-id="4828" itemprop="commentText"><p data-dcnode-id="4830"><span data-dcnode-id="4847" instrument_node="">In truth the “New Covenant has not been instituted yet. Jer. 31 :31 says the new covenant will be made with  the house of Israel and with the house of Judah. There is absolutely no mention of  a new  covenant with Gentiles, as the church proclaims.  The new covenant did not begin with the death of Christ on the Cross, nor was it  brought into effect on the day of Pentacost, with the giving of the holy spirit.</span><br data-dcnode-id="4846"><span data-dcnode-id="4845" instrument_node="">
 Israel as a whole had rejected their Messiah and missed the initial opportunity to enter the kingdom of God, however, there will be another opportunity  in the very near future. While it’s already been  2000 years;  God has not given up on Israel;  his covenant  people. It will be  for God’s own glory that he is going to bring about a new covenant and not because of Israel’s faithfulness, because  the truth is …they have been anything but faithful..  Jeramiah chapter 31 speaks of a future time when all the 12 tribes of  Israel will have 1 king (Jesus ) and God will write his law on there hearts, this is a picture of the instituting of the new covenant. Ezekiel 37 :16-17,  and 22-23  speaks of the time when the 2 sticks ( Israel and Judah ) will one day  be reunited as one nation. This is Ezekiel’s prophecy of the dry bones being brought back to life.  While this new covenant will not be made with Gentiles per say, non-the-less  Gentiles have always been invited into the Kingdom of God, but only when they agreed to live by the same covenant laws Israel was under. a perfect example of this is the story of Ruth.  Understanding the fact that we are not yet under a new covenant; brings along with it some logical conclusions; specifically we are still under the Old Covenant, which likewise means we are still obligated to keep God’s laws,  just as Jesus emphatically stated in Matthew 5: 17, and which he also confirmed when the rich young ruler asked which commandments he needed to keep to enter life. – Matt 19 17-21 . Nothing has changed. When speaking  to  Christians on the day of  Judgement  in Matt 7: 22  Jesus says to those men and women who call Jesus” Lord, Lord ”  but failed to  do the Father’s will hear the words…</span><br data-dcnode-id="4844"><span data-dcnode-id="4843" instrument_node="">
” I never knew you; depart from me ye that work anomia (LAW-LESS-NESS.)”</span><br data-dcnode-id="4842"><span data-dcnode-id="4841" instrument_node="">
Keeping the law means keeping all 10 of the commandments, not just 9 of them. The sabbath is God’s sanctified   holy  day and is  to be a day of rest and to be  remembered every 7th day; which begins on Friday at dusk until Saturday at dusk.  Sabbath observance is  the “mark “of a true disciple of Christ.  They are restricted from  buying or selling  on the Sabbath as a means of keeping it holy. Therefore, as Revelation 13: 15  says;  And he ( the beast ) had power to give life unto the image of the beast, that the image of the beast should both speak, and cause that as many as would not worship the image of the beast should be killed.</span><br data-dcnode-id="4840"><span data-dcnode-id="4839" instrument_node="">
16 And he causeth all, both small and great, rich and poor, free and bond, to receive a mark in their right hand, or in their foreheads:</span><br data-dcnode-id="4838"><span data-dcnode-id="4837" instrument_node="">
17 And that no man might buy or sell, save he that had the mark, or the name of the beast, or the number of his name.”</span><br data-dcnode-id="4836"><span data-dcnode-id="4835" instrument_node="">
 This is how those who worship the beast are decieved. He is able to convince them it is no longer necessary to keep God’s law to recieve salvation. It is by this false doctrine that he ” causes” ..not “forces”  all men to recieve the mark of the beast.  The restriction from being able to  buy and sell is in reality associated with faithfulness to God, when law keeping / sabbath keeping men and women refrain from buying and selling on the Sabbath as a means of keeping it holy they will be persecuted and even killed. While those who worship the beast ” non sabbath keepers” have the mark of the beast, and therefore have no such restriction from buying or selling. Therefore,  the mark of the beast is associated with all men throughout the earth who neglect to keep the Sabbath holy . It is these men and women who are buying and selling on the sabbath because they do not  honor God as the creator and Lord of the Sabbath. This is what is meant by Revelation 12:9</span><br data-dcnode-id="4834"><span data-dcnode-id="4833" instrument_node="">
And the great dragon was cast out — that serpent of old called the Devil and Satan, who deceiveth the whole world.</span><br data-dcnode-id="4832"><span data-dcnode-id="4831" instrument_node="">
 The world as a whole has in fact  been decieved. Few find the narrow road which leads to life, while many take the broad road which leads to destruction.  Jesus has all authority in heaven and earth. Listen to his words not man’s word.</span></p><span data-dcnode-id="4829" instrument_node="">

</span><p data-dcnode-id="4651"><span data-dcnode-id="4664" instrument_node="">Ephesians 4:1-6 (ESV)</span><br data-dcnode-id="4663"><span data-dcnode-id="4662" instrument_node="">

</span><p data-dcnode-id="4644"><span data-dcnode-id="4649" instrument_node="">Jesus in Matthew 23:2-3 (ESV)</span><br data-dcnode-id="4648"><span data-dcnode-id="4647" instrument_node="">
	2 &nbsp;“The scribes and the Pharisees sit on Moses’ seat,</span><br data-dcnode-id="4646"><span data-dcnode-id="4645" instrument_node="">
	3 &nbsp;so do and observe whatever they tell you, but not the works they do. For they preach, but do not practice. </span></p><span data-dcnode-id="4643" instrument_node="">
</span><p data-dcnode-id="4641"><span data-dcnode-id="4642" instrument_node="">Jesus aid we are to observe the teaching of the Pharisees, but not do what they do because they don’t practice what they preach. </span></p><span data-dcnode-id="4640" instrument_node="">
</span><p data-dcnode-id="4632"><span data-dcnode-id="4639" instrument_node="">Jesus said in Matthew 5:17-19 (NIV)</span><br data-dcnode-id="4638"><span data-dcnode-id="4637" instrument_node="">

</span><p data-dcnode-id="4629"><span data-dcnode-id="4630" instrument_node="">Donald, Jesus said, “Anyone who breaks one of the least of these commandments and teaches others to do the same will be called LEAST in the kingdom of heaven…..” Who is “anyone”? That includes you and me and everyone else.</span></p><span data-dcnode-id="4628" instrument_node="">

</span><div class="text" data-dcnode-id="4426"><span data-dcnode-id="4465" instrument_node="">
</span><div class="comment-text" data-dcnode-id="4428" itemprop="commentText"><p data-dcnode-id="4463"><span data-dcnode-id="4464" instrument_node="">As a pastor and teacher of the Word for years since being saved at Billy Graham’s L.A. Crusade in 1963, I have recently had my eyes opened to the keeping of the Torah (God’s instruction). All my life in mainstream Christianity, I taught and was told that Jesus came to set us free from the Law, however, Psalm 119:44-45 tells us that God’s law brings freedom. </span></p><span data-dcnode-id="4462" instrument_node="">
</span><p data-dcnode-id="4452"><span data-dcnode-id="4461" instrument_node="">Remember how we always say that we are NOT saved by works, but after we come to faith in Jesus, good works should be in evidence in our lives, produced my the Holy Spirit. Now I have come to realize that the good works that we are to WALK in after coming to Jesus is to walk in obedience to the Torah.</span><br data-dcnode-id="4460"><span data-dcnode-id="4459" instrument_node="">
1 John 2:3-5 (NASB)</span><br data-dcnode-id="4458"><span data-dcnode-id="4457" instrument_node="">
3  By this we know that we have come to know Him, if we keep His commandments.</span><br data-dcnode-id="4456"><span data-dcnode-id="4455" instrument_node="">
4  The one who says, “I have come to know Him,” and does not keep His commandments, is a liar, and the truth is not in him;</span><br data-dcnode-id="4454"><span data-dcnode-id="4453" instrument_node="">
5  but whoever keeps His word, in him the love of God has truly been perfected. </span></p><span data-dcnode-id="4451" instrument_node="">
</span><p data-dcnode-id="4449"><span data-dcnode-id="4450" instrument_node="">The Greek for commandments is the same as used by the Lord when He is giving the Sermon on the Mount and says, Matthew 5:19 (ESV) 19  Therefore whoever relaxes one of the least of these commandments and teaches others to do the same will be called least in the kingdom of heaven, but whoever does them and teaches them will be called great in the kingdom of heaven. </span></p><span data-dcnode-id="4448" instrument_node="">
</span><p data-dcnode-id="4446"><span data-dcnode-id="4447" instrument_node="">Jesus is speaking here of the commandments (the Torah) and He says that whoever does these commandments (the Torah) and teaches them will be called great in the Kingdom of Heaven.</span></p><span data-dcnode-id="4445" instrument_node="">
</span><p data-dcnode-id="4443"><span data-dcnode-id="4444" instrument_node="">Walking in and keeping the Torah begins with keeping the Sabbath Day as holy (set apart). This was my first step in understanding that the Torah is for us today (not as a means of salvation, but to show our love for God for God by keeping His commandments (instructions). Why do we say that we’re supposed to keep the 10 Commandments, yet the 4th commandment is ignored and shunned by the mainstream church. Why are we NOT to keep the 4th commandment, “Remember the Sabbath day to keep it holy.” </span></p><span data-dcnode-id="4442" instrument_node="">
</span><p data-dcnode-id="4438"><span data-dcnode-id="4441" instrument_node="">When did God say that the Church did NOT have to keep the 4th commandment? When did God say that the Lord’s Day (Sunday) superseded the Sabbath? NEVER. There is NO scripture where God says that He switched the day of rest from Saturday (Friday sundown to Saturday at sundown). It was changed by the Catholic Church, and it is a tradition of man, not a command of God. Jesus kept the Sabbath. The Apostle Paul and the other apostles observed the Sabbath and the Torah. Paul says in Romans 7:12 (ESV)</span><br data-dcnode-id="4440"><span data-dcnode-id="4439" instrument_node="">
12  So the law is holy, and the commandment is holy and righteous and good. </span></p><span data-dcnode-id="4437" instrument_node="">
</span><p data-dcnode-id="4435"><span data-dcnode-id="4436" instrument_node="">Rather than saying “I don’t think, or I don’t feel” –you need to search out the Scriptures and rightly divide the Word, not allowing commentators, teachers, or pastors interpret the Word for you–Let Scripture interpret Scripture–then you will come to know the mind and heart of God on any matter. Don’t build your doctrine on one or a few verses–compare the doctrine based on the OT as well as the NT. All scriptural doctrines have their foundation in the Old Testament scriptures. When Paul says to Timothy that the scriptures made him wise unto salvation, he was referring to the Old Testament scriptures (Tenakh). There was NO New Testament when Paul was writing to Timothy.</span></p><span data-dcnode-id="4434" instrument_node="">
</span><p data-dcnode-id="4430"><span data-dcnode-id="4433" instrument_node=""> 2 Timothy 3:15 (NIV)</span><br data-dcnode-id="4432"><span data-dcnode-id="4431" instrument_node="">
15  and how from infancy you have known the holy Scriptures, which are able to make you wise for salvation through faith in Christ Jesus.</span></p><span data-dcnode-id="4429" instrument_node="">

</span><div class="comment-text" data-dcnode-id="4168" itemprop="commentText"><p data-dcnode-id="4179"><span data-dcnode-id="4180" instrument_node="">Hi Cheryl,</span></p><span data-dcnode-id="4178" instrument_node="">
</span><p data-dcnode-id="4176"><span data-dcnode-id="4177" instrument_node="">God is looking for a people who will turn to Him and seek His righteousness. God gave his commands to show people that they are sinners in need of a savior. The commandments were not given to make or keep someone right with God, in fact God says if you will try to be right with Him by following the law, you need to keep the whole law perfectly, never stumbling once, otherwise you are under a curse. (Galatians 3:10, James 2:10) God says there is a way to be right with Him that is acceptable and pleasing, apart from works of the law, by placing our trust in the finished work of the Lord Jesus Christ on the cross by faith. God says those who will turn to the Lord Jesus and what He did for them on the cross are righteous in the law, because Christ is the fulfillment of the law for all who believe in Him and His work on the cross. It is the grace of God that makes us righteous, not our own efforts in our flesh, when you turn to Jesus and away from your own righteousness, Christ has fulfilled all of the commandments in you.</span></p><span data-dcnode-id="4175" instrument_node="">
</span><p data-dcnode-id="4173"><span data-dcnode-id="4174" instrument_node="">Romans 3:20 For by works of the law no human being will be justified in his sight, since through the law comes knowledge of sin.</span></p><span data-dcnode-id="4172" instrument_node="">
</span><p data-dcnode-id="4170"><span data-dcnode-id="4171" instrument_node="">Romans 8:3-4 ESV For God has done what the law, weakened by the flesh, could not do. By sending his own Son in the likeness of sinful flesh and for sin, he condemned sin in the flesh, in order that the righteous requirement of the law might be fulfilled in us, who walk not according to the flesh but according to the Spirit.</span></p><span data-dcnode-id="4169" instrument_node="">

</span><div class="comment-text" data-dcnode-id="4032" itemprop="commentText"><p data-dcnode-id="4064"><span data-dcnode-id="4065" instrument_node="">I would have to disagree to the blog writer based on several verses as indicated below. Our Lord Jesus mentioned the righteousness that EXCEED the righteouness of the Scribes and Pharisees. Its not about ‘keeping’ the law. Its sbout Jesus been the Righteousness that we need to abide in. </span></p><span data-dcnode-id="4063" instrument_node="">
</span><p data-dcnode-id="4057"><span data-dcnode-id="4062" instrument_node="">Romans 10:3-4 (NKJV)</span><br data-dcnode-id="4061"><span data-dcnode-id="4060" instrument_node="">
