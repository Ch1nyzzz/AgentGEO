 4 For Christ is the end of the law for righteousness to everyone who believes.</span></p><span data-dcnode-id="4056" instrument_node="">
</span><p data-dcnode-id="4052"><span data-dcnode-id="4055" instrument_node="">They refers to the Jews people. They seeking to be establish on being close with God based on their “performance” based ( all the laws found on torah ) righteousness.</span><br data-dcnode-id="4054"><span data-dcnode-id="4053" instrument_node="">
They did not submitted to the righteousness that comes from God. And it clearly stated Christ IS the end of the law  for RIGHTEOUSNESS ( been declare in right position ) to everyone who believes. He who believes in Christ as Lord and Saivour has already the Righteousness that exceeds the scribes and Pharisees.</span></p><span data-dcnode-id="4051" instrument_node="">
</span><p data-dcnode-id="4041"><span data-dcnode-id="4050" instrument_node="">Also in Galatians 4:21-31  Paul helps us to understand concerning trying to keep cermonial law ,</span><br data-dcnode-id="4049"><span data-dcnode-id="4048" instrument_node="">
 : Galatians 5:2-4 (NKJV)</span><br data-dcnode-id="4047"><span data-dcnode-id="4046" instrument_node="">
Indeed I, Paul, say to you that if you become circumcised, Christ will PROFIT YOU nothing.</span><br data-dcnode-id="4045"><span data-dcnode-id="4044" instrument_node="">
3 And I testify again to every man who becomes circumcised that he is a debtor to keep the whole law.</span><br data-dcnode-id="4043"><span data-dcnode-id="4042" instrument_node="">
4 You have become estranged from Christ, YOU WHO ATTEMPT to be justified by law; you have FALLEN from grace.</span></p><span data-dcnode-id="4040" instrument_node="">
</span><p data-dcnode-id="4034"><span data-dcnode-id="4039" instrument_node="">Therefore, the end matter is</span><br data-dcnode-id="4038"><span data-dcnode-id="4037" instrument_node="">

</span><div class="comment-text" data-dcnode-id="3925" itemprop="commentText"><p data-dcnode-id="3936"><span data-dcnode-id="3937" instrument_node="">Charlie,</span></p><span data-dcnode-id="3935" instrument_node="">
</span><p data-dcnode-id="3933"><span data-dcnode-id="3934" instrument_node="">God is looking for a people who will turn to Him and seek His righteousness. God gave his commands to show people that they are sinners in need of a savior. The commandments were not given to make or keep someone right with God, in fact God says if you will try to be right with Him by following the law, you need to keep the whole law perfectly, never stumbling once, otherwise you are under a curse. (Galatians 3:10, James 2:10) God says there is a way to be right with Him that is acceptable and pleasing, apart from works of the law, by placing our trust in the finished work of the Lord Jesus Christ on the cross by faith. God says those who will turn to the Lord Jesus and what He did for them on the cross are righteous in the law, because Christ is the fulfillment of the law for all who believe in Him and His work on the cross. It is the grace of God that makes us righteous, not our own efforts in our flesh, when you turn to Jesus and away from your own righteousness, Christ has fulfilled all of the commandments in you.</span></p><span data-dcnode-id="3932" instrument_node="">
</span><p data-dcnode-id="3930"><span data-dcnode-id="3931" instrument_node="">Romans 3:20 For by works of the law no human being will be justified in his sight, since through the law comes knowledge of sin.</span></p><span data-dcnode-id="3929" instrument_node="">
</span><p data-dcnode-id="3927"><span data-dcnode-id="3928" instrument_node="">Romans 8:3-4 ESV For God has done what the law, weakened by the flesh, could not do. By sending his own Son in the likeness of sinful flesh and for sin, he condemned sin in the flesh, in order that the righteous requirement of the law might be fulfilled in us, who walk not according to the flesh but according to the Spirit.</span></p><span data-dcnode-id="3926" instrument_node="">

</span><div class="comment-text" data-dcnode-id="3842" itemprop="commentText"><p data-dcnode-id="3859"><span data-dcnode-id="3868" instrument_node="">Marcus,</span><br data-dcnode-id="3867"><span data-dcnode-id="3866" instrument_node="">
These are Gentile converts that Paul is talking to in Galatians 4:8-20.</span><br data-dcnode-id="3865"><span data-dcnode-id="3864" instrument_node="">
They used to serve other gods. Now they know the true God.</span><br data-dcnode-id="3863"><span data-dcnode-id="3862" instrument_node="">
Even so, they GO BACK to weak and beggarly elements related to the god they used to serve. And thus, they DESIRE AGAIN to go back INTO BONDAGE related to the gods they used to serve.</span><br data-dcnode-id="3861"><span data-dcnode-id="3860" instrument_node="">
What they are TURNING BACK to is observing certain days, months, and years related to the gods they used to serve.	</span></p><span data-dcnode-id="3858" instrument_node="">
</span><p data-dcnode-id="3856"><span data-dcnode-id="3857" instrument_node="">Paul says in Galatians 4:10-11, “You observe days and months and seasons and years. I am afraid for you, lest I have labored for you in vain.</span></p><span data-dcnode-id="3855" instrument_node="">
</span><p data-dcnode-id="3853"><span data-dcnode-id="3854" instrument_node="">The assumption is that the observation of the days, months, and years are God’s Feast days, Sabbaths, etc. found in Leviticus 23 and therein lies the modern bias that is usually injected into this text. It rarely crosses anyone’s minds that the Gentiles worship the days, months and years of their sun-gods before they came into the faith of the One True God. </span></p><span data-dcnode-id="3852" instrument_node="">
</span><p data-dcnode-id="3850"><span data-dcnode-id="3851" instrument_node="">How could we say that God’s appointed feasts are bondage? How can these HOLY days be considered bondage? When is something that God declares HOLY ever something that is “bondage”?</span></p><span data-dcnode-id="3849" instrument_node="">
</span><p data-dcnode-id="3847"><span data-dcnode-id="3848" instrument_node="">How can these Gentile believers GO BACK 	to something that they NEVER used to do?</span></p><span data-dcnode-id="3846" instrument_node="">
</span><p data-dcnode-id="3844"><span data-dcnode-id="3845" instrument_node="">It’s so easy to arrive at false assumptions when you ignore context and introduce a false paradigm.</span></p><span data-dcnode-id="3843" instrument_node="">

</span><div class="comment-text" data-dcnode-id="3686" itemprop="commentText"><p data-dcnode-id="3688"><span data-dcnode-id="3691" instrument_node="">God never changes, He is eternal both in His existence and in His standards and laws, He does not change His mind.  The law was set, not only for an iron-age people but for all mankind for always, as the ideal for life.  Like our civil law today, breaking the law has a penalty, a price to pay; when we break the law, we are under the law, after we pay the fine or serve the sentence we are no longer under the law.  In the same way, if we break God’s law we become subject to the law and the penalty; but Jesus paid our fine for us, so when we confess and repent and ask for forgiveness, God forgives us through Jesus’ sacrifice, and we are no longer under the law.</span><br data-dcnode-id="3690"><span data-dcnode-id="3689" instrument_node="">
If Jesus had abolished the law, there would no longer be any sin, but clearly there is sin, otherwise we would not need a Saviour.  We all sin and fall short, but fortunately Jesus paid the price, so we should try to obey the law out of love for Him.</span></p><span data-dcnode-id="3687" instrument_node="">

</span><p data-dcnode-id="3593"><span data-dcnode-id="3594" instrument_node="">And our flesh, in it’s rebellion to God, does NOT LOVE GOD. If you truly loved God you would keep his commands, ALL OF THEM, never stumbling once. God says those who try to keep his commands by works of the law are under a curse. The law was never given to make or keep someone right with God, it was given to expose sin in a person’s life and point them to their desperate need for a savior. So then what is acceptable to God, how can we stand righteousness before our God? By turning from our sin, and placing our trust in the finished work of the Lord Jesus on the cross by faith! Repent and turn to Jesus my friend.</span></p><span data-dcnode-id="3592" instrument_node="">
</span><p data-dcnode-id="3590"><span data-dcnode-id="3591" instrument_node="">Galatians 3:10 ESV For all who rely on works of the law are under a curse; for it is written, “Cursed be everyone who does not abide by all things written in the Book of the Law, and do them.”</span></p><span data-dcnode-id="3589" instrument_node="">
</span><p data-dcnode-id="3587"><span data-dcnode-id="3588" instrument_node="">James 2:10 ESV For whoever keeps the whole law but fails in one point has become guilty of all of it.</span></p><span data-dcnode-id="3586" instrument_node="">
</span><p data-dcnode-id="3584"><span data-dcnode-id="3585" instrument_node="">Romans 8:3-4 ESV For God has done what the law, weakened by the flesh, could not do. By sending his own Son in the likeness of sinful flesh and for sin, he condemned sin in the flesh, in order that the righteous requirement of the law might be fulfilled in us, who walk not according to the flesh but according to the Spirit.</span></p><span data-dcnode-id="3583" instrument_node="">

</span><a class="comment-time" data-dcnode-id="3537" href="#comment-169808"><span data-dcnode-id="3541" instrument_node="">

</span></a><span data-dcnode-id="3536" instrument_node="">
</span><span class="reply" data-dcnode-id="3534"><span data-dcnode-id="3535" instrument_node="">

</span></div><span data-dcnode-id="3530" instrument_node=""> </span><span data-dcnode-id="3528" instrument_node="">
</span><div class="text" data-dcnode-id="3491"><span data-dcnode-id="3527" instrument_node="">
</span><div class="comment-text" data-dcnode-id="3493" itemprop="commentText"><p data-dcnode-id="3525"><span data-dcnode-id="3526" instrument_node="">Wow!  This whole debate makes me very sad, to see believers arguing over a distinction without a difference.  Instead of debating nuances of the minimum standards for salvation, why not look at what Christ himself said about who is saved?  </span></p><span data-dcnode-id="3524" instrument_node="">
</span><p data-dcnode-id="3522"><span data-dcnode-id="3523" instrument_node="">In Mat. 5,  he told us His followers are saved.  So, who are His followers?  </span></p><span data-dcnode-id="3521" instrument_node="">
</span><p data-dcnode-id="3519"><span data-dcnode-id="3520" instrument_node="">Well, in v3 – 10, you see the character of a Christian.  In v21 – 30, he told us that not only does the law apply, but even more stringently, we are judged by what is in our hearts.  Murder is against the law, but for His followers, hatred is the same as murder, and lust is as bad as adultery.  </span></p><span data-dcnode-id="3518" instrument_node="">
</span><p data-dcnode-id="3516"><span data-dcnode-id="3517" instrument_node="">In Luke 6:31, we were admonished to treat others as we would have them treat us.  The law says to stone an adulterer.  But, wouldn’t all of us want to be treated far better than the minimum standards required by the law?  If we sin one time, wouldn’t we want to be forgiven rather than stoned to death?</span></p><span data-dcnode-id="3515" instrument_node="">
</span><p data-dcnode-id="3513"><span data-dcnode-id="3514" instrument_node="">Jesus raised the standards higher than the law ever required.  The new standard is to be like Him, not even sinning in our hearts.  Those of us who love Him and meet that standard  are his followers and will be with him in Heaven.  But, we know that we all have sinned and fall short of God’s glory (Rom 3:23).    </span></p><span data-dcnode-id="3512" instrument_node="">
</span><p data-dcnode-id="3510"><span data-dcnode-id="3511" instrument_node="">So, we are all condemned by the law of perfection and the sins in our own hearts.  And, under the law, there can be no forgiveness without the shedding of blood Heb 9:22.</span></p><span data-dcnode-id="3509" instrument_node="">
</span><p data-dcnode-id="3507"><span data-dcnode-id="3508" instrument_node="">Fortunately for us, God loves us so much that he shed the blood of the perfect Lamb, his Son, as the atonement required by the law, in order to buy our redemption.  (everyone know where to find this verse?)</span></p><span data-dcnode-id="3506" instrument_node="">
</span><p data-dcnode-id="3504"><span data-dcnode-id="3505" instrument_node="">We commit the crimes against God’s law, and God purchases our freedom with the death of Christ Jesus.  Who among us would do nothing or only the minimum to thank the One who killed His own Son to purchase our freedom for the crimes we committed against Him?  </span></p><span data-dcnode-id="3503" instrument_node="">
</span><p data-dcnode-id="3501"><span data-dcnode-id="3502" instrument_node="">Thus, arguing about the minimum standards we must comply with in order to get into heaven cheapens the gift.  We need to be looking at how much more we can do to follow the laws of the one whom we offended but who paid for our transgressions.</span></p><span data-dcnode-id="3500" instrument_node="">
</span><p data-dcnode-id="3498"><span data-dcnode-id="3499" instrument_node="">We did nothing to earn our freedom.  Thus, we cannot boast about how well we adhere to the law, or which laws apply or don’t apply.  They all apply, and we have broken all of them so we deserve nothing but death.  </span></p><span data-dcnode-id="3497" instrument_node="">
</span><p data-dcnode-id="3495"><span data-dcnode-id="3496" instrument_node="">The only reason we aren’t going to suffer for eternity in Hell is because he paid for those of us who accept His gift of forgiveness.  If we believe, we are contrite and we do not boast  or waste our time arguing about how little we can do to get away with our sins.  We strive for the best, not the minimum.</span></p><span data-dcnode-id="3494" instrument_node="">
</span></div><span data-dcnode-id="3492" instrument_node="">

</span><div class="comment-text" data-dcnode-id="3399" itemprop="commentText"><p data-dcnode-id="3401"><span data-dcnode-id="3402" instrument_node="">Thank you for that, brother. Well said. God has always worked through covenants. It is clear from Heb 8:6-13 that the ‘first covenant’ is now ‘obsolete and outdated’ and, as such, ‘will soon disappear’ (whatever that means). All I know is that I am a partaker of the new covenant, sealed by the blood of Jesus, and so, as God said He would do, He has ‘put [His] laws in [my mind] and write[n] them on [my heart].’ So, yes, read the law to get an idea of God’s demands for righteousness, but under the new covenant, Jesus is now the righteousness of God. I no longer relate to God through the old covenant (trying to keep the whole Mosaic law in my own strength, which is futile), but through the new covenant, where I am learning to relate to God as Paul describes in Rom 7:6: ‘But now, by dying to what once bound us, we have been released from the law so that we serve in the new way of the Spirit, and not in the old way of the written code.’ Halleluyah!</span></p><span data-dcnode-id="3400" instrument_node="">

</span><div class="comment-text" data-dcnode-id="3132" itemprop="commentText"><p data-dcnode-id="3137"><span data-dcnode-id="3138" instrument_node="">Wow…moved to tears by some of the comments here.  I was raised to live by “every word that proceeds from the mouth of God” – seeing others come to an understanding of what that means is very inspiring, especially the comments by Mr. Yancy.  </span></p><span data-dcnode-id="3136" instrument_node="">
</span><p data-dcnode-id="3134"><span data-dcnode-id="3135" instrument_node="">True righteousness is not just doing the physical acts of the law…the Pharisees did that.  True righteousness is GOD’S righteousness…starting with faith.  God lives in you through the Holy Spirit…the law is  written on your heart…and you are God’s son.   You will keep the Law, in the letter and in the spirit, JUST LIKE JESUS DID…not from “mere compliance”, but because God is in you and you are yielding to Him and becoming like Him.  That’s God’s righteousness.</span></p><span data-dcnode-id="3133" instrument_node="">

</span><div class="comment-text" data-dcnode-id="3079" itemprop="commentText"><p data-dcnode-id="3087"><span data-dcnode-id="3088" instrument_node="">I do have one specific criticism of the article, which stated that “Jesus was often accused by the Pharisees of violating ceremonial law.”  This is misleading and implies that Jesus actually broke some ceremonial point of God’s law, in which case He would NOT have been sinless.  The Pharisees either accused Him FALSELY or accused Him of not following the “traditions” of the oral law – for example, the washing of hands referenced in Matthew 15.</span></p><span data-dcnode-id="3086" instrument_node="">
</span><p data-dcnode-id="3084"><span data-dcnode-id="3085" instrument_node="">The big picture point of the article is correct (it IS about the heart and attitude and God living in us!) but the implied conclusion that Christians can simply omit or dispense with aspects of God’s Law they consider unimportant or “ceremonial” is simply incorrect.</span></p><span data-dcnode-id="3083" instrument_node="">
</span><p data-dcnode-id="3081"><span data-dcnode-id="3082" instrument_node="">Tony G is right – we’re trying to live to the highest standard, not the minimum.</span></p><span data-dcnode-id="3080" instrument_node="">

</span><div class="comment-text" data-dcnode-id="2928" itemprop="commentText"><p data-dcnode-id="2939"><span data-dcnode-id="2940" instrument_node="">God says if you are attempting to be right with him by works of the law you are under a curse, you must keep the whole law, never stumbling even once. The finished work of the Lord Jesus on the cross is the fulfillment of the righteous requirements of the law in us. Repent, turn from your self-righteousness and trust in what Jesus did for you alone!</span></p><span data-dcnode-id="2938" instrument_node="">
</span><p data-dcnode-id="2936"><span data-dcnode-id="2937" instrument_node="">Galatians 3:10 ESV For all who rely on works of the law are under a curse; for it is written, “Cursed be everyone who does not abide by all things written in the Book of the Law, and do them.”</span></p><span data-dcnode-id="2935" instrument_node="">
</span><p data-dcnode-id="2933"><span data-dcnode-id="2934" instrument_node="">James 2:10 ESV For whoever keeps the whole law but fails in one point has become guilty of all of it.</span></p><span data-dcnode-id="2932" instrument_node="">
</span><p data-dcnode-id="2930"><span data-dcnode-id="2931" instrument_node="">Romans 8:3-4 ESV For God has done what the law, weakened by the flesh, could not do. By sending his own Son in the likeness of sinful flesh and for sin, he condemned sin in the flesh, in order that the righteous requirement of the law might be fulfilled in us, who walk not according to the flesh but according to the Spirit.</span></p><span data-dcnode-id="2929" instrument_node="">

</span><div class="comment-text" data-dcnode-id="2867" itemprop="commentText"><p data-dcnode-id="2869"><span data-dcnode-id="2872" instrument_node="">This sounds very covanental. Even if the law was split up into those three categories it wouldn’t matter. We are in no way obligated to follow any of the mosaic law. James says.      “For whoever keeps the whole law but fails in one point has become guilty of all of it. For he who said, “Do not commit adultery,” also said, “Do not murder.” If you do not commit adultery but do murder, you have become a transgressor of the law.”  And see there, James puts the whole Law into one category. He does not split it into three.</span><br data-dcnode-id="2871"><span data-dcnode-id="2870" instrument_node="">
So, if we transgressed the “ceremonial” or the “civil” part of the law, we then are guilty of transgressing the “moral” part as well. But since those don’t really exist, God’s law is God’s law and God didn’t put any categories to His law, so we are not obligated to obey Torah. Jesus fulfilled the Law for us so that we wouldn’t have to. That is why He says He didn’t come to abolish but fulfill the Law.</span></p><span data-dcnode-id="2868" instrument_node="">

</span><div class="text" data-dcnode-id="2548"><span data-dcnode-id="2577" instrument_node="">
</span><div class="comment-text" data-dcnode-id="2550" itemprop="commentText"><p data-dcnode-id="2575"><span data-dcnode-id="2576" instrument_node="">The claim that the law was done away with or made unnecessary is similar to one spoken by another group a few years back</span></p><span data-dcnode-id="2574" instrument_node="">
</span><p data-dcnode-id="2570"><span data-dcnode-id="2573" instrument_node="">Act 6:13 — Act 6:14</span><br data-dcnode-id="2572"><span data-dcnode-id="2571" instrument_node="">
They (some scribes and elders) also set up false witnesses who said, “This man does not cease to speak blasphemous words against this holy place and the law; for we have heard him say that this Jesus of Nazareth will destroy this place and change the customs which Moses delivered to us.”</span></p><span data-dcnode-id="2569" instrument_node="">
</span><p data-dcnode-id="2567"><span data-dcnode-id="2568" instrument_node="">Others also said to a group of pretty important guys in Jerusalem</span></p><span data-dcnode-id="2566" instrument_node="">
</span><p data-dcnode-id="2562"><span data-dcnode-id="2565" instrument_node="">Act 21:21 — Act 21:24</span><br data-dcnode-id="2564"><span data-dcnode-id="2563" instrument_node="">
but they have been informed about you that you teach all the Jews who are among the Gentiles to forsake Moses, saying that they ought not to circumcise their children nor to walk according to the customs… …do what we tell you… …that all may know that those things of which they were informed concerning you are nothing, but that you yourself also walk orderly and keep the law.</span></p><span data-dcnode-id="2561" instrument_node="">
</span><p data-dcnode-id="2559"><span data-dcnode-id="2560" instrument_node="">Paul was already aware that pain and suffering awaited him in Jerusalem, yet he was bold enough to go there anyway. He also did not hold back in rebuking Peter when he found him being swayed by those under the law, that is converts to Judaism. Paul was a loyal and bold man both before and after meeting the messiah, if he didn’t agree with the decision to make it known that what was told regarding him was false hearsay, he would  have surely corrected the council. Being the honest man that he was, he didn’t correct them, he filled their decree because the rumours were false.</span></p><span data-dcnode-id="2558" instrument_node="">
</span><p data-dcnode-id="2552"><span data-dcnode-id="2557" instrument_node="">Now back to Stephen, he was martyred for the cause of messiah under false charges provided by “false witnesses”. My (admittedly rhetorical) questions are:</span><br data-dcnode-id="2556"><span data-dcnode-id="2555" instrument_node="">
How on earth did the church come to take the side of the false witnesses, as well as an early Antichrist (Antiochus IV)?</span><br data-dcnode-id="2554"><span data-dcnode-id="2553" instrument_node="">
As those who are grafted into Israel, how did we get turn ourselves so turned around that we’ve come to think of a code of law which foreshadows life in the millennial kingdom, as not only negative, but something to be discouraged if not condemned by believers, Jew or Gentile, male or female, free or bond?</span></p><span data-dcnode-id="2551" instrument_node="">

</span><div class="comment-text" data-dcnode-id="2346" itemprop="commentText"><p data-dcnode-id="2353"><span data-dcnode-id="2354" instrument_node="">Contrary to the opinions expressed regarding Jewish observance of the different laws, how ridged or lax the laws were to be walked out depended on how much a recognised leader bound or loosed commandments for those under their care. Religious leaders had authority to make observance of laws heavier or lighter but lacked the authority to break or nullify the laws. </span></p><span data-dcnode-id="2352" instrument_node="">
</span><p data-dcnode-id="2348"><span data-dcnode-id="2351" instrument_node="">Terry,</span><br data-dcnode-id="2350"><span data-dcnode-id="2349" instrument_node="">
Regarding Yom Shabbat (sabbath day) and its connection with Yom Shevii (the seventh day or more specifically day seven) in the Decalogue accounts shown both in numbers and Deuteronomy, as the exiled community’s temporal paradigm shifted from the Jewish lunar to a Roman solar calendar (based on many social and political factors between Neronian rule and the end of the failed Bar Kochba revolt), the widening gap between the exiled Jewish and gentile communites led to a growing ignorance of the Jewish weekdays which allowed for a loosing of which day constituted the seventh day. Thankfully God meets us in our ignorance, and I believe he will continue to, until messiah returns to set up his kingdom, when he will reinstate the Jewish temporal paradigm along with his kingdom Torah.</span></p><span data-dcnode-id="2347" instrument_node="">

</span><div class="comment-text" data-dcnode-id="1956" itemprop="commentText"><p data-dcnode-id="1958"><span data-dcnode-id="1959" instrument_node="">Whether we are Catholic or Protestant, Evangelical or Baptist, we are still operating under the false belief that our Christian faith is a true faith, unaltered since the time of Jesus.   Not so.  We are told to use Jesus’ life as a role-model for our own lives and the the model for our churches.  Yet at the time Christianity, or ‘The Wat’ as it was then known, was being accepted as the official faith of the Roman Empire, it was changed beyond our recognition.  The Romans really wanted to hold onto all of their demigods, the gods that explained how the things they didn’t understand, happened.  For that reason a system of ‘saints’ was introduced,  the early church fathers all became saints, St. Matthew, St. Paul, St. Peter, an so on, replaced the Parthenon of Roman, Greek, and Egyptian gods.  The Lord’s day was changed from the God-ordained seventh day to Sunday, the day that the Roman’s worshiped the their Sun god.  The whole process was also an antisemitic one as the Jews had hit another low in popularity.  The Roman Emperor  Constantine had a hatred of Jews, who had caused more problems than any other conquered country in the empire.  To replace Passover, Easter, named after a fertility god, was appointed,  Christmas replaced Hanukah, Harvest Festival replaced the Feast of Tabernacles, or Booths, and so on.  These days, even for the most devoted and devout Christian and church, it is impossible to please God by obeying His laws.  It is so fortunate that God helped us by giving us Jesus, Amen?</span></p><span data-dcnode-id="1957" instrument_node="">

</span><div class="comment-text" data-dcnode-id="1897" itemprop="commentText"><p data-dcnode-id="1911"><span data-dcnode-id="1912" instrument_node="">So, after 100 or so comments, has the initial question “does the Old Testament law still apply?” been dealt with? I have been helped dealing with this complex question by Alden Thompson’s biblical “Law Pyramid”.* Its peak consists of the single command, or goal of law: “love God!” (Romans 13:8-10). </span></p><span data-dcnode-id="1910" instrument_node="">
</span><p data-dcnode-id="1908"><span data-dcnode-id="1909" instrument_node="">The pyramid’s wider mid-section begins to explain  just how we “love God”–we do it by honouring Him and at the same time honouring people (as Jesus declared in Matthew 22:35-40).</span></p><span data-dcnode-id="1907" instrument_node="">
</span><p data-dcnode-id="1905"><span data-dcnode-id="1906" instrument_node="">The pyramid further widens at its base to embrace the Ten Commandments–specifying more concretely how we love God and love people. </span></p><span data-dcnode-id="1904" instrument_node="">
</span><p data-dcnode-id="1902"><span data-dcnode-id="1903" instrument_node="">But this “law pyramid” does not float in space; it is firmly grounded, in the Old Testament, on hundreds of very specific, mostly culturally-related and conditioned expressions of love for God and for people–613 of them in Torah alone, according to rabbinic authorities. This very specific cultural “earth” supporting the pyramid may undergo shifts with changing time and circumstances, but the pyramid it supports remains structurally sound and unchanging.</span></p><span data-dcnode-id="1901" instrument_node="">
</span><p data-dcnode-id="1899"><span data-dcnode-id="1900" instrument_node="">*Thompson outlines his “law pyramid” in his book Who’s Afraid of the Old Testament God.</span></p><span data-dcnode-id="1898" instrument_node="">

</span><div class="comment-text" data-dcnode-id="1772" itemprop="commentText"><p data-dcnode-id="1803"><span data-dcnode-id="1806" instrument_node="">WOW!!!!!!!! Biblical Prophecy is inerrant and infallible! Many, according to the responses replied to in this post, have been deceived &amp; made a mockery by the enemy of GOD….satan. Please, in love, allow the HOLY SPIRIT to guide you in understanding, peace, love, &amp; mostly obedience; to THE MOST HIGH! I encourage each and everyone of us to read Scripture in context….CONTEXT. CONTEXT. CONTEXT.</span><br data-dcnode-id="1805"><span data-dcnode-id="1804" instrument_node="">
Many in the world have been hoodwinked, bambozzled, &amp; defrauded by pitting GOD’S Word to align with fallible unauthencity…man! Acts 17:30…..And the times of this ignorance ELOHIM winked at, but now commandeth all men everywhere to repent! See: John 9:41, Acts 3:17, &amp; 1st Timothy 1:13.</span></p><span data-dcnode-id="1802" instrument_node="">
</span><p data-dcnode-id="1800"><span data-dcnode-id="1801" instrument_node="">Romans 5:13, For until the law sin was not in the world, but sin is not  imputed where there is no law! Imputed(Ellogeo—Greek) means to not be charged to our account as sin. Genesis 6:5-7….And GOD saw that the wickedness of man was great in the earth, and every imagination of the thoughts of his heart are evil continually. And it repented GOD that HE made man on the earth, and it grieved HIM at HIS Heart. And GOD said I will destroy man…… There existed no law pre- antediluvian! No Commandments!! Innately, man had/has the ability to distinguish between good and evil….Adam? Eve? The Serpent? The garden? Choices, choices, choices! Man /woman has to decide who to follow. satan to an eternal hell or, GOD, to eternal life.</span></p><span data-dcnode-id="1799" instrument_node="">
</span><p data-dcnode-id="1795"><span data-dcnode-id="1798" instrument_node="">1st Corinthians 10:13, No temptation has overtaken you but such as is common to man; and God is faithful, who will not allow you to be tempted beyond what you are able, but with the temptation will provide the way of escape also, so that you will be able to endure it.</span><br data-dcnode-id="1797"><span data-dcnode-id="1796" instrument_node="">
So, according to this scripture, is GOD saying we cannot stop sinning through the indwelling of the HOLY SPIRIT?  A diabolical and nefarious doctrine has entered into the hearts and minds of men! GOD’S Word today is being compared to what is spewed from the pulpit and from from man’s inability to allow the HOLY SPIRIT to guide and teach in all understanding! The first Church that was born in the Book of Acts details GOD’S plan for humanity; eternal life!</span></p><span data-dcnode-id="1794" instrument_node="">
</span><p data-dcnode-id="1792"><span data-dcnode-id="1793" instrument_node="">1st John 3:7-9; Little children, make sure no one deceives you; the one who practices righteousness is righteous, just as He is righteous; the one who practices sin is of the devil; for the devil has sinned from the beginning. The Son of God appeared for this purpose, to destroy the works of the devil. No one who is born of God practices sin, because His seed abides in him; and he cannot sin, because he is born of God..Please, I encourage each of you to read the entire Book of 1st, 2nd, &amp; 3rd John….This Book of John is located toward the back of the Bible. </span></p><span data-dcnode-id="1791" instrument_node="">
</span><p data-dcnode-id="1789"><span data-dcnode-id="1790" instrument_node="">What else does GOD say about choices with regards to comitting sin? Matthew 5:27-30; “You have heard that it was said, ‘YOU SHALL NOT COMMIT ADULTERY’; but I say to you that everyone who looks at a woman with lust for her has already committed adultery with her in his heart. “If your right eye makes you stumble, tear it out and throw it from you; for it is better for you to lose one of the parts of your body, than for your whole body to be thrown into hell. “If your right hand makes you stumble, cut it off and throw it from you; for it is better for you to lose one of the parts of your body, than for your whole body to go into hell. Are we to literally sever limbs and pluck out organs? It would behoove each of us to allow the SPIRIT, through Scripture, guide us as a lamp unto our feet. Again, we see that we have been given power to overcome sin…if we desire to live a life that is pleasing to THE MOST HIGH!</span></p><span data-dcnode-id="1788" instrument_node="">
</span><p data-dcnode-id="1786"><span data-dcnode-id="1787" instrument_node="">When The MESSIAH was tempted by satan….Matthew 4:3-4; And the tempter came and said to Him, “If You are the Son of God, command that these stones become bread.” But He answered and said, “It is written, ‘MAN SHALL NOT LIVE ON BREAD ALONE, BUT ON EVERY WORD THAT PROCEEDS OUT OF THE MOUTH OF GOD.'” What are our instructions? To live by every word that proceedeth out of the mouth of GOD! JESUS said, 1st John 5:3; But He answered and said, “It is written, ‘MAN SHALL NOT LIVE ON BREAD ALONE, BUT ON EVERY WORD THAT PROCEEDS OUT OF THE MOUTH OF GOD.'” Matthew 19:16-18; And someone came to Him and said, “Teacher, what good thing shall I do that I may obtain eternal life? And He said to him, “Why are you asking Me about what is good? There is only One who is good; but if you wish to enter into life, keep the commandments.” Then he said to Him, “Which ones?” And Jesus said, “YOU SHALL NOT COMMIT MURDER; YOU SHALL NOT COMMIT ADULTERY; YOU SHALL NOT STEAL; YOU SHALL NOT BEAR FALSE WITNESS; What is JESUS saying? Simply and plainly….individual responsibility &amp; acountability to GOD and GOD only? Not fallible or inerrant man! 2nd Timothy 4:3-4; For the time will come when they will not endure sound doctrine; but wanting to have their ears tickled, they will accumulate for themselves teachers in accordance to their own desires, and will turn away their ears from the truth and will turn aside to myths. The same foolishness that is being exhibted through many televangelist and ministres; that desire to keep their members in darkness(evilness) and not into the light of GOD(righteousness).</span></p><span data-dcnode-id="1785" instrument_node="">
</span><p data-dcnode-id="1783"><span data-dcnode-id="1784" instrument_node="">There are Christians who are being spoon fed each and everyday, by so-called annointed leaders of THE MOST HIGH! Sad… It is imperative that we pray to THE MESSIAH, to yield our entire members and our hearts to HIM to walk in righteousness! Yes, we live in this sin sickened world but, we as Disciples of Christ should not be of the world. 1st John 2:15-17; Do not love the world nor the things in the world. If anyone loves the world, the love of the Father is not in him. For all that is in the world, the lust of the flesh and the lust of the eyes and the boastful pride of life, is not from the Father, but is from the world. The world is passing away, and also its lusts; but the one who does the will of God lives forever. Forever=Eternity with CHRIST!</span></p><span data-dcnode-id="1782" instrument_node="">
</span><p data-dcnode-id="1780"><span data-dcnode-id="1781" instrument_node="">Lastly, there may be some or many  ,through erroneous teachings and traditions of man, misunderstand/misapply Romans 3:10; There is none righteous, no, not one? Yes, Scripture doth say this, however, if we continue to read the proceeding verses we will understand the context of this verse. Verse 11 &amp; 12: THERE IS NONE WHO UNDERSTANDS, THERE IS NONE WHO SEEKS FOR GOD; ALL HAVE TURNED ASIDE, TOGETHER THEY HAVE BECOME USELESS; THERE IS NONE WHO DOES GOOD, THERE IS NOT EVEN ONE.” But, what do the following verses, 13-18, reveal? 13. “THEIR THROAT IS AN OPEN GRAVE, WITH THEIR TONGUES THEY KEEP DECEIVING,” “THE POISON OF ASPS IS UNDER THEIR LIPS”; 14. “WHOSE MOUTH IS FULL OF CURSING AND BITTERNESS”; 15. “THEIR FEET ARE SWIFT TO SHED BLOOD .16.  DESTRUCTION AND MISERY ARE IN THEIR PATHS, 17. AND THE PATH OF PEACE THEY HAVE NOT KNOWN.” 18. “THERE IS NO FEAR OF GOD BEFORE THEIR EYES.” As we see friends, these verses, when taken in context, are describing an unbeliever and a believer that lives in sin; which is hostility toward GOD! Now, let’s compare these verses to Proverbs 6:16-19: 16. There are six things which the LORD hates, Yes, seven which are an abomination to Him: 17. Haughty eyes, a lying tongue, And hands that shed innocent blood, 18. A heart that devises wicked plans, Feet that run rapidly to evil, 19. A false witness who utters lies, And one who spreads strife among brothers. Once again, we see personal responsibility and accountability to The MESSIAH and HIM Only. Remember what JESUS told the Pharisees; Luke 5:30-32; 30.The Pharisees and their scribes began grumbling at His disciples, saying, “Why do you eat and drink with the tax collectors and sinners?” 31. And Jesus answered and said to them, “It is not those who are well who need a physician, but those who are sick. 32. I have not come to call the righteous but sinners to repentance.” JESUS was simply and plainly stating that there were righteous people in HIS day…….not many though. Luke 1:5-6; 5.In the days of Herod, king of Judea, there was a priest named Zacharias, of the division of Abijah; and he had a wife from the daughters of Aaron, and her name was Elizabeth. 6. They were both righteous in the sight of God, walking blamelessly in all the commandments and requirements of the Lord. So….. Could Zacharias and his wife Elisabeth be those that that are referred to in Romans 3: 10?</span></p><span data-dcnode-id="1779" instrument_node="">
</span><p data-dcnode-id="1777"><span data-dcnode-id="1778" instrument_node="">Trust JESUS…..not man! Allow the HOLY SCRIPTURE to convict of us sin; to turn from our wicked ways and repent…..Before it is too late…Matthew 25:1-13.</span></p><span data-dcnode-id="1776" instrument_node="">
</span><p data-dcnode-id="1774"><span data-dcnode-id="1775" instrument_node="">Central Theme? Hear, Trust, Believe, Repent, &amp; Obey GOD’S Word!!! The author of this article is spot on!</span></p><span data-dcnode-id="1773" instrument_node="">

</span><div class="comment-text" data-dcnode-id="1721" itemprop="commentText"><p data-dcnode-id="1723"><span data-dcnode-id="1728" instrument_node="">i have a really close friend who is considering our Beliefs(Torah Observance). once she asked me if we believed the way we did because we believed that God truly command us to do so or if we did it just to become closer to God.  i answered her saying that you can only become closer to God if you follow his commandments. many Christians will argue that when Yeshua(Jesus) died the Torah(law) was no longer in the picture. well from what you all have stated above that is so far from the truth. also, the bible says that when Yeshua died he took away the law of sin and death(Romans 8:2). nothing else(i would love for someone to show me where it says anything different). i mean, where does it say that we no longer have to follow the Torah(law)? yes, there are some things we can literally not do(like sacrifice at an alter), but most things we can do. like the Feast(Passover, Sukkot, feast of first fruits, day of atonement). and God commands us to keep his Feast forever(Leviticus 23:26-32, Leviticus 23:23-25 , Leviticus 23:1-44, Exodus 34:22, Exodus 23:16). i read a blog by a man named Rich Robinson. he said that Torah observers only pick and choose what they think they should follow out of the OT. well, one could say the same to Christians. where in the whole bible does it say to celebrate Christmas, Easter, and Halloween? nowhere. Deuteronomy 4:2 “You shall not add to the word that I command you, nor take from it, that you may keep the commandments of the Lord your God that I command you.”</span><br data-dcnode-id="1727"><span data-dcnode-id="1726" instrument_node="">
Deuteronomy 12:32 “Everything that I command you, you shall be careful to do. You shall not add to it or take from it”</span><br data-dcnode-id="1725"><span data-dcnode-id="1724" instrument_node="">
doesn’t that mean that Christians added to the bible when they made Christmas Yeshua’s birthday and Easter his resurrection day? it would be a different story if they just celebrated these things for pure enjoyment, but they do it in Yeshua’s name. that i just can’t stand. Yeshua’s death  gave us salvation from death. that doesn’t mean we can keep on sinning. i mean if a murderer asked God for forgiveness and then went and murdered again and again, would he still go to heaven? i would think not. just because Jesus died doesn’t mean we can just forget Gods commands. Yeshua always talks about how we are to worship His Father and that He is here bring us back to Him. would Yeshua really contradict God? isn’t HE God in a human body? the same friend, when i asked her where in the bible Christmas, and Easter  were she just told me that they were just traditions that her family love. Matthew 15:3 says “He answered them, “And why do you break the commandment of God for the sake of your tradition?” along with, Matthew 15:6 “He need not honor his father.’ So for the sake of your tradition you have made void the word of God.” this is Yeshua speaking. what more do you need? God says to follow his commands and so does His Son Yeshua our Messiah</span></p><span data-dcnode-id="1722" instrument_node="">

</span><div class="comment-text" data-dcnode-id="905" itemprop="commentText"><p data-dcnode-id="907"><span data-dcnode-id="908" instrument_node="">Where does the idea came from “that the Mosaic law are divisible? Jesus said “Think not that I am come to destroy the law, or the prophets: I am not come to destroy, but to fulfil.” Before He died, He said “It is fulfilled”. The demand of the law was satisfied through Jesus’ sacrifce.&nbsp;Which laws are fulfilled? The civil &amp; ceremonials only? Heb 8:13&nbsp; In that he saith, A new covenant, he hath made the first old. Now that which decayeth and waxeth old is ready to vanish away.&nbsp;He has done away the old and made a new one. The writer tells us all those laws in heb 9 and in v.4 4 which had the golden altar of incense and the gold-covered ark of the covenant. This ark contained the gold jar of manna, Aaron’s staff that had budded, and the stone tablets of the covenant. (He included that 10 Cs in the tablet of stones) That is the first covenant and a covenant for Israel only. These are all powerless to mankind to obey perfectly. It only produces sin in you. No wonder the rightful use of the law is to show we sinners (Rom 3:20) and second is to lead us to Christ (Gal 3:24) All the laws given to Israel were under the curse including the moral laws… And 1 out of 10 had a promise of long life. All the curse and the promise were done away. If the 10 Cs are not included then u are still in danger of the curse it brings. From the book of Romans to Jude, the pattern for christian walk are all given.. the laws are not the rule of life neither a part of salvation nor applicable to the age of grace. The law is not of faith (Gal 3:12) So if u are saved by grace thru faith thats it ! the purpose of law is done on you.</span></p><span data-dcnode-id="906" instrument_node="">

</span><div class="comment-text" data-dcnode-id="579" itemprop="commentText"><p data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">Once I became saved, I became dead to the law, if I had ever been under the law, which I hadn’t because I’m not Jewish. No, the law is not for Christians. The Holy Spirit is for Christians. Is the Holy Spirit going to lead us to contradict the 10 commandments?? Yes, every day is holy to me now, not just the sabbath (Saturday). Look, most of the law, not just the 10 commandments, had great worldly scientific backing behind keeping it. But Paul says to those trying to keep the law, that if you offend in one law, you are guilty of all. Can murderers, adulterers, liars and thieves become saved?? Yes they can. Therefore the law is no longer applicable to Christians, because we have died with Christ and are free from the law. Jesus is correct, He did not remove the law, He removed us, or at least saved Jews, from the penalty of the law. So why do we have confusion?? Because the law makes sense. Of course it makes sense, because it was given by God, and is a legitimate road map for living a consequence free life. But if you are saved, you are sealed with His Spirit, and kept in salvation. Does that mean we throw the Old Testament out then. No, certainly not. A function of the Spirit, is to lead us to all truth. Now when we read the Scripture, we aren’t reading it to see what laws we must keep. We are reading it, to learn about the character of God. When you read the Bible, you see everywhere, what God approves of, and what He doesn’t approve of. You’ll see God punishing other people for specific actions. Reading the Bible, including the 10 commandments, allows you to have your life guided daily by the Holy Spirit. When you come across any given situation, your knowledge of the character of God in your life, should allow the Holy Spirit to direct you along the straight and narrow path. Not because we are still under the law, because we have died with Christ, and are now alive in Him, by God’s grace. Does the 10 commandments help people become saved then?? Yes, but it isn’t necessary. People do need to be aware that they have sinned against God, so that they have a need for salvation, no doubt, and the 10 commandments are great for that. But technically, as Paul says in Romans, the law was for the Jews, and unsaved Jews should still be keeping ALL of the law today. Christians should be obeying the Holy Spirit in ALL things today, and we shouldn’t be surprised to find, that the Holy Spirit still doesn’t want us to murder, steal, lie, etc. God hasn’t changed. But God has changed us.</span></p><span data-dcnode-id="580" instrument_node="">

</span><div class="comment-text" data-dcnode-id="461" itemprop="commentText"><p data-dcnode-id="463"><span data-dcnode-id="482" instrument_node="">20210916 A very important matter but one too easily given a superficial knee-jerk reaction. Though I intend to read all of the posts made here over the years and have saved them as a Word docx, that will obviously take some time, so if what I say has been addressed I apologize in advance, but one crucial matter usually not addressed is whether or not law has the definite article, i.e. if it’s</span><br data-dcnode-id="481"><span data-dcnode-id="480" instrument_node="">
1. anarthros nomos law or 2. arthros o nomos the Law.</span><br data-dcnode-id="479"><span data-dcnode-id="478" instrument_node="">
I’m often frustrated by translators being too careless and arrogant in either</span><br data-dcnode-id="477"><span data-dcnode-id="476" instrument_node="">
1. ADDING the article when it’s NOT in the original, making what’s anarthrous in the transmitter original arthrous in the receptor, or</span><br data-dcnode-id="475"><span data-dcnode-id="474" instrument_node="">
2. omitting it when it IS in the original, making the arthrous transmitter original anarthrous in the receptor, a crucial difference too often unrealized and ignored, a fatal mistake for accurate exegesis, too easily making it eisegesis.</span><br data-dcnode-id="473"><span data-dcnode-id="472" instrument_node="">
See Romans 3:21</span><br data-dcnode-id="471"><span data-dcnode-id="470" instrument_node="">
GNT-V νυνι δε χωρις νομου δικαιοσυνη θεου πεφανερωται μαρτυρουμενη υπο του νομου και των προφητων</span><br data-dcnode-id="469"><span data-dcnode-id="468" instrument_node="">
Young’s 1898 Literal Translation&nbsp; And now apart from LAW (rightly sustaining the anarthrous nature of the original) hath the righteousness of God been manifested, testified to by THE LAW and the prophets,</span><br data-dcnode-id="467"><span data-dcnode-id="466" instrument_node="">
ASV&nbsp; 1901 But now apart from THE LAW (wrongly inserting the article, canceling the anarthrous nature of the original) a righteousness of God hath been manifested, being witnessed by THE LAW and the prophets;</span><br data-dcnode-id="465"><span data-dcnode-id="464" instrument_node="">
This is why “literal” translations are so important, more concerned with serving the more important transmitter of the original versus the popularity of the form of the receptor, though even “literal” translations are so inconsistent in this they can’t be trusted entirely.</span></p><span data-dcnode-id="462" instrument_node="">

</span><div class="comment-text" data-dcnode-id="317" itemprop="commentText"><p data-dcnode-id="319"><span data-dcnode-id="374" instrument_node="">Dear Michael:</span><br data-dcnode-id="373"><span data-dcnode-id="372" instrument_node="">
Sorry for the long delay. I had lots on my plate and then it seemed the “write a comment” function was disabled so I thus couldn’t figure out how to reply. Anyway, in reply.</span><br data-dcnode-id="371"><span data-dcnode-id="370" instrument_node="">
As to the simple difference the definite article makes, I would say THE LAW refers to Biblical law, especially that of Moses, whereas LAW is basically the law principle in general, i.e. vs lawlessness. I get this from John Piper somewhere. Also see Strong’s and Thayer’s similar definitions for G3551.</span><br data-dcnode-id="369"><span data-dcnode-id="368" instrument_node="">
If you look in Strong’s definition for νόμος nomos G3551:</span><br data-dcnode-id="367"><span data-dcnode-id="366" instrument_node="">
From a primary word νέμω nemō (to parcel out, especially food or grazing to animals);</span><br data-dcnode-id="365"><span data-dcnode-id="364" instrument_node="">
[bracketed #s are given to align with Thayer’s Definition]</span><br data-dcnode-id="363"><span data-dcnode-id="362" instrument_node="">
[1b] law (through the idea of prescriptive usage), generally (regulation), specifically (of Moses [including the volume]; also of the Gospel),</span><br data-dcnode-id="361"><span data-dcnode-id="360" instrument_node="">
[1a] or figuratively (a principle): – law.</span><br data-dcnode-id="359"><span data-dcnode-id="358" instrument_node="">
Total KJV occurrences: 197</span><br data-dcnode-id="357"><span data-dcnode-id="356" instrument_node="">
Thayer Definition:</span><br data-dcnode-id="355"><span data-dcnode-id="354" instrument_node="">
Part of Speech: noun masculine</span><br data-dcnode-id="353"><span data-dcnode-id="352" instrument_node="">
1) anything established, anything received by usage, a custom, a law, a command</span><br data-dcnode-id="351"><span data-dcnode-id="350" instrument_node="">
1a) of any law whatsoever</span><br data-dcnode-id="349"><span data-dcnode-id="348" instrument_node="">
1a1) a law or rule producing a state approved of God</span><br data-dcnode-id="347"><span data-dcnode-id="346" instrument_node="">
1a1a) by the observance of which is approved of God</span><br data-dcnode-id="345"><span data-dcnode-id="344" instrument_node="">
1a2) a precept or injunction</span><br data-dcnode-id="343"><span data-dcnode-id="342" instrument_node="">
1a3) the rule of action prescribed by reason</span><br data-dcnode-id="341"><span data-dcnode-id="340" instrument_node="">
1b) of the Mosaic law, and referring, acc. to the context. either to the volume of the law or to its contents</span><br data-dcnode-id="339"><span data-dcnode-id="338" instrument_node="">
1c) the Christian religion: the law demanding faith, the moral instruction given by Christ, especially the precept concerning love</span><br data-dcnode-id="337"><span data-dcnode-id="336" instrument_node="">
1d) the name of the more important part (the Pentateuch), is put for the entire collection of the sacred books of the OT</span><br data-dcnode-id="335"><span data-dcnode-id="334" instrument_node="">
I previously mentioned (20210916) the important matter of anarthrous nomos versus arthrous nomos; I’m in the process of listing all the occurrences in the original vs how the translations handle it rightly or wrongly. It’s ironic that though I’m just a janitor with 5 years of Bible college &amp; a few of seminary, God’s given me insight many seminarians lack.</span><br data-dcnode-id="333"><span data-dcnode-id="332" instrument_node="">
But another matter at least as and really far more significant is HEBREWS. The great Puritan John Owen wrote a crucially important large, multi-volume commentary (biblesupport dot com slash e-sword-downloads slash file slash 8984-owen-john-an-exposition-of-the-epistle-to-the-hebrews-7-vols) on it alone more than some commentaries have on the entire NT! As is so common these days of being philosophical vs biblical I sadly saw much largely Scripture-free emotion in various comments but little mention of the crucial book of the OT in the NT of Hebrews and Owen’s crucial work! Heb 7:11-28 clearly says (… 12-14 GNT-V  μετατιθεμενης γαρ της ιερωσυνης εξ αναγκης και νομου μεταθεσις γινεται  13  εφ ον γαρ λεγεται ταυτα φυλης ετερας μετεσχηκεν αφ ης ουδεις προσεσχηκεν τω θυσιαστηριω  14  προδηλον γαρ οτι εξ ιουδα ανατεταλκεν ο κυριος ημων εις ην φυλην TSBουδεν περι Aιερεων TSBιερωσυνης Aουδεν BAμωυσης TSμωσης ελαλησεν</span><br data-dcnode-id="331"><span data-dcnode-id="330" instrument_node="">
Young’s 1898 Literal Translation … 12&nbsp; for the priesthood being CHANGED, of necessity also, of the law a CHANGE doth come, &nbsp;13&nbsp; for he of whom these things are said in another tribe hath had part, of whom no one gave attendance at the altar, &nbsp;14&nbsp; for it is evident that out of Judah [not Levi] hath arisen our Lord, in regard to which tribe Moses spake nothing concerning priesthood. …),</span><br data-dcnode-id="329"><span data-dcnode-id="328" instrument_node="">
i.e. Jesus FULFILLED and thus DID AWAY WITH THE LAW IN HIMSELF since he, being God Almighty, Supreme Law-giver, changed the priesthood from Levi to Judah, a decisive matter nearly all stupidly ignore. When one fulfills a contract or covenant, this fulfilling thus makes it void and of no effect, its terms having been satisfied, what Jesus’s 1 John 2:2 ἱλασμός G2434 (Thayer correct propitiation vs Strong’s erroneous expiation) was and did.</span><br data-dcnode-id="327"><span data-dcnode-id="326" instrument_node="">
(ASV and he is the propitiation [=wrath satisfier] for our sins; and not for ours only, but also for the whole world.)</span><br data-dcnode-id="325"><span data-dcnode-id="324" instrument_node="">
Since this topic is really too large to deal with in the limitations of a mere blog you can also write me at russedav at bex dot net if you wish. I really hope you will read Owen’s incredible Hebrews commentary. Also his profoundly Biblical “Mortification of Sin in the Believer” and “Nature, Power, Deceit, and Prevelancy of the Remainders of Indwelling Sin in Believers” @ ccel.org.</span><br data-dcnode-id="323"><span data-dcnode-id="322" instrument_node="">
God bless you,</span><br data-dcnode-id="321"><span data-dcnode-id="320" instrument_node="">
Russ Davis</span></p><span data-dcnode-id="318" instrument_node="">
