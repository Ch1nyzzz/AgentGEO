</span><div class="comment-content clearfix" data-dcnode-id="2281"><span data-dcnode-id="2303" instrument_node="">
</span><p data-dcnode-id="2301"><span data-dcnode-id="2302" instrument_node="">Well, I never thought I would find the day I would be here writing this since I believe in God, and yet find myself possessed by evil spirits or some kind of malicious entity. It would be such a long story to explain how this happened other than things have been going wrong in my life for quite some time. One night over a year ago, I woke up screaming as if having a nightmare and I couldn’t recall having any dream. It just felt as if something pierced my chest and then I called out to the Lord and went back to sleep. Months went by and then the real nightmares started. </span></p><span data-dcnode-id="2300" instrument_node="">
</span><p data-dcnode-id="2298"><span data-dcnode-id="2299" instrument_node="">I am a fairly solitary person and keep to myself actually and live on my own. I am not a smoker, I have no history of abusing alcohol, I do not use drugs, I have never been in jail, I have no history of mental illness in my family, etc. I even went the route of getting myself checked out with a doctor and a hospital a year ago. Everything said I was physically okay.</span></p><span data-dcnode-id="2297" instrument_node="">
</span><p data-dcnode-id="2295"><span data-dcnode-id="2296" instrument_node="">Over six months ago I started hearing voices around my apartment. These voices have progressed to the point where some days I feel like I am cocooned in something that now speaks to me through my mouth saying things like “I could kill you in an instant!” I mean even though I have seen accounts of people being possessed in some way on TV/YouTube, I was at odds to come to terms with it even though I had prayed for others. I went so far to have a friend meet with me to see if they could hear a voice speaking to me and they were frightened out of their wits, and now I know it is not just me losing it. I believe in the Lord, but I have never been one to attend a church. I recently found a Catholic one in December 2009 a few weeks ago, I slip into quietly at night to just sit there be alone, and beg God for forgiveness and deliverance. </span></p><span data-dcnode-id="2294" instrument_node="">
</span><p data-dcnode-id="2292"><span data-dcnode-id="2293" instrument_node="">Things have progressed now that these voices and this cocoon like feeling that surrounds me can move my arms and legs at times, even change the direction when I am walking by moving my legs. I have to experience this to even come close to truly believe this can happen this way. More recently I am struggling to control my thoughts, and the days when my face contorts. I literally have to keep my mind focused on something having to do with love to stay in control of my body at times. All of this is so nerve shattering I feel a sense of peace in contemplating suicide so the suffering now will end, since I have been on my own dealing with this for most of 2009.</span></p><span data-dcnode-id="2291" instrument_node="">
</span><p data-dcnode-id="2289"><span data-dcnode-id="2290" instrument_node="">What happens now is that I cannot sleep for days, so I recently checked into a hospital to get some medication for sleep. It helped a bit, but when something is literally moving me about in my bed over and over again at night I almost fall asleep and then I am awakened again. Voices are talking to me saying “You cannot live without sleep, and then they laugh!” Other things are said like “You have no idea how many of us showed up for this!” Night after night something grabs my hand or leg or moves it over and over again until I just jump out of bed screaming shouting to just “Leave me the hell alone you are not welcome here or to my life in any way!” </span></p><span data-dcnode-id="2288" instrument_node="">
</span><p data-dcnode-id="2286"><span data-dcnode-id="2287" instrument_node="">A few days ago I asked someone I knew to just let me sleep at their home so I would arrive at their place at night to crash on their sofa and leave first thing in the morning. I was so sorry I did that because, they have a couple of dogs and their dogs would be howling all night until I left their home and they were quite shocked. Right now I am reading the psalms daily especially psalm 91. Many days now I am so tired of being awakened that you pass in and out of sleep. I am not anywhere near being able to work right now and just budgeting out my savings to pay bills/expenses. I am racing right now to get other things in order in my apartment since I do pass out at times dealing with all of this just from shear exhaustion from being awakened so much when trying to sleep, and I wonder if I do pass out again if I will actually wake up anymore. I have a list of things I am doing right now in the event of my death, but as I do believe in God, I can honestly tell you that I really do want to live.</span></p><span data-dcnode-id="2285" instrument_node="">
</span><p data-dcnode-id="2283"><span data-dcnode-id="2284" instrument_node="">All else I can say is please pray for me and I am very grateful for anyone out there who does. Wayne.</span></p><span data-dcnode-id="2282" instrument_node="">

</span><p data-dcnode-id="1833"><span data-dcnode-id="1834" instrument_node="">Charley, If you look at those appointed to wrath, they were quite in tune with the arrangement. Pharoah’s heart was hardened, and he was actively rebelling against God. The fact you have a conflict shows me the Lord’s spirit is present otherwise you would be full bent on doing the works of darkness.</span></p><span data-dcnode-id="1832" instrument_node="">
</span><p data-dcnode-id="1827"><span data-dcnode-id="1831" instrument_node="">It appears to be that God is drawing you to himself, though you are stuck in miry clay. Be patient with God and with yourself. Our parent’s have no right to speak damnation into our lives. Earthly fathers are to represent the heavenly Father’s heart to us, not the heart of the devil who is the god of this world. Scripture tells us God is not willing that any should perish. I’ll see if I can give you a call and pray with you. Pleasant Valley Church as a ministry offers many resources. </span><a data-dcnode-id="1829" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.pleasantvalleychurch.net/Merchant2/merchant.mvc%3FScreen%3DPROD%26Store_Code%3Dpvc%26Product_Code%3DBK2AMEW%26Category_Code%3Dbook%26Product_Count%3D13" rel="nofollow ugc"><span data-dcnode-id="1830" instrument_node="">http://www.pleasantvalleychurch.net/Merchant2/merchant.mvc?Screen=PROD&amp;Store_Code=pvc&amp;Product_Code=BK2AMEW&amp;Category_Code=book&amp;Product_Count=13</span></a><span data-dcnode-id="1828" instrument_node=""> is a link for you to purchase “A More Excellent Way”</span></p><span data-dcnode-id="1826" instrument_node="">
</span><p data-dcnode-id="1822"><span data-dcnode-id="1825" instrument_node="">I also recommend Biblical Foundations of Freedom by Art Mathias of Wellspring Ministries.This book gives many of the same principles and insights as “A More Excellent Way”, but in a clearer format in my opinon. </span><a data-dcnode-id="1823" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//ww3.aitsafe.com/cf/add.cfm%3Fuserid%3D5622422%26product%3DBiblical%2520Foundations%2520of%2520Freedom%3A%2520Destroying%2520Satan%2527s%2520Lies%2520With%2520God%2527s%2520Truth%26price%3D24.95%26units%3D1%26return%3Dwww.akwellspring.com/store%26hash%3Dde6fbaf2bc0e1f5c84f87f15d3e91be4" rel="nofollow ugc"><span data-dcnode-id="1824" instrument_node="">http://ww3.aitsafe.com/cf/add.cfm?userid=5622422&amp;product=Biblical%20Foundations%20of%20Freedom:%20Destroying%20Satan%27s%20Lies%20With%20God%27s%20Truth&amp;price=24.95&amp;units=1&amp;return=www.akwellspring.com/store&amp;hash=de6fbaf2bc0e1f5c84f87f15d3e91be4</span></a></p><span data-dcnode-id="1821" instrument_node="">

</span><span class="fn" data-dcnode-id="1696"><a class="url" data-dcnode-id="1697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//jesuschristiscomingsoon.weebly.com/index.html" rel="external nofollow ugc"><span data-dcnode-id="1698" instrument_node="">kanna</span></a></span><span data-dcnode-id="1695" instrument_node=""> </span><span class="comment_date" data-dcnode-id="1693"><span data-dcnode-id="1694" instrument_node="">

</span><p data-dcnode-id="1686"><span data-dcnode-id="1687" instrument_node="">Dear , </span></p><span data-dcnode-id="1685" instrument_node="">
</span><p data-dcnode-id="1683"><span data-dcnode-id="1684" instrument_node="">When you came to your Lord Yeshua the first time… You were filthy, riddled with the disease of sin in your flesh, your mind and your soul was carnally orientated… </span></p><span data-dcnode-id="1682" instrument_node="">
</span><p data-dcnode-id="1680"><span data-dcnode-id="1681" instrument_node="">When you accepted Him as your Saviour and Master over your Life…you were given a New Spirit…one of Life in our Lord… You became a NEW PERSON, and the OLD person you used to be…died… (Problem is, You know it, G-d knows it…but your old carnal self needs convincing…it still thinks it’s alive and kicking!) </span></p><span data-dcnode-id="1679" instrument_node="">
</span><p data-dcnode-id="1677"><span data-dcnode-id="1678" instrument_node="">You awakened to Him…you became aware of a New Life Force in you…one that seeked Him, and your desires became to Know Him, and have a relationship with Him… You began to find out what His Will is, and your whole life began revolving around obeying His Commandments to show your Love for Him… </span></p><span data-dcnode-id="1676" instrument_node="">
</span><p data-dcnode-id="1674"><span data-dcnode-id="1675" instrument_node="">When you became this new person…when the carnal Old Person died…it’s sins died with it… It was destroyed…and it is only a corpse… Your “flesh” (desires for the things of this world, the carnal things)… is dead…you still have it, but it’s dead… </span></p><span data-dcnode-id="1673" instrument_node="">
</span><p data-dcnode-id="1671"><span data-dcnode-id="1672" instrument_node="">Your basically now have a choice which you never had before… Before, you couldn’t HELP sinning… Your mind was focused on everything to please your flesh… You HAD to have that chocolate….you HAD to see that ‘dubious’ movie…you HAD to wear that Lacoste Shirt…you HAD to have that girl in your bed… and NO ONE could point a finger at you because ‘WHO exactly did they think they were!!! criticizing YOU?!!! </span></p><span data-dcnode-id="1670" instrument_node="">
</span><p data-dcnode-id="1668"><span data-dcnode-id="1669" instrument_node="">All your thoughts, all your desires were centered on yourself…pleasing yourself, satisfying your own needs…and protecting your own image in the eyes of the world.. showing off, it was all about you, you, YOU…. </span></p><span data-dcnode-id="1667" instrument_node="">
</span><p data-dcnode-id="1665"><span data-dcnode-id="1666" instrument_node="">Your Rebirth caused you to become ‘CUT OFF’ from this “persona of self”… Almost as if you split into two people now in one body… Suddenly you awakened to the fact that life DOESN’T revolve around you…and you became aware of this Loving G-d, Yeshua who showed you the way of altruism… Of denying self, and instead using the breath He gave you and the body He gave you to bring Glory to Him… </span></p><span data-dcnode-id="1664" instrument_node="">
</span><p data-dcnode-id="1662"><span data-dcnode-id="1663" instrument_node="">But the Ego…the carnal self which has been unplugged in your system, won’t go quietly… It’s demanding attention..it’s demanding satisfaction, it’s demanding even revenge against this ‘New Spirit Person’ who now shares the same body with it… </span></p><span data-dcnode-id="1661" instrument_node="">
</span><p data-dcnode-id="1659"><span data-dcnode-id="1660" instrument_node="">It was quite happy having this Spirit Person dead and quiet… Because the Carnal self is not spiritual…it’s physical…worldly… Now Yeshua came and plugged you into Spirit again…You became Reborn in Spirit…and suddenly this Spirit of yours, is telling your carnal self to go die some place… REVOLUTION…overthrow of Government happened in your body… and your carnal self ain’t happy… </span></p><span data-dcnode-id="1658" instrument_node="">
</span><p data-dcnode-id="1656"><span data-dcnode-id="1657" instrument_node="">You as the New Spirit, takes control of government in your own body…and carnal self becomes the terrorist…trying to sabotage your new government around every corner… Your Spirit self says…”Body…you have been doing your own thing long enough…now we are doing things Yeshua’s way!” You are now incorporated into His Body…and you are going to have to learn teamwork with all the other bodies who belong to Him. And your carnal self shouts…’FOUL’…I am MY OWN person, I want to do my OWN THING!!! This is not fair…been doing a good job by myself, why this submission all of a sudden? </span></p><span data-dcnode-id="1655" instrument_node="">
</span><p data-dcnode-id="1653"><span data-dcnode-id="1654" instrument_node="">This is now the point where you as a New Creature in Yeshua, Born of Spirit is supposed to tell your ‘flesh’… Be quiet! Dead flesh don’t talk!!! But we dont’ always do that…and we stumble… Now there is a sin between your Spirit self and your Lord Yeshua…A SIN WHICH IS NOT FORGIVEN…YET….. Carnal self won some ground…and makes the body feel so nice…remember how things used to be? </span></p><span data-dcnode-id="1652" instrument_node="">
</span><p data-dcnode-id="1650"><span data-dcnode-id="1651" instrument_node="">If you allow this to continue, you will eventually slip back into carnal mode…and you can actually KILL that New Born Spirit Person you have become!!! You CAN let your light go out!!! Eventually carnal self will convince you through all the ‘feel good’ – “remember how you loved this?” messages to TURN BACK from the Narrow Road you embarked on when you first asked Lord Yeshua to become the Lord of your life, and put you back on the BROAD road which is the Highway to Hell…. </span></p><span data-dcnode-id="1649" instrument_node="">
</span><p data-dcnode-id="1647"><span data-dcnode-id="1648" instrument_node="">However…If you as New Spirit Man in Yeshua refuse to accept this deception and manipulation…you go on your knees…FIND the desire which caused you to fall for the temptation in the first place…. and DESTROY it in the presence of the Lord! Ask Him to forgive you and to let His Holy Spirit make you aware of any other potential desires which can cause you to fall into a temptation. </span></p><span data-dcnode-id="1646" instrument_node="">
</span><p data-dcnode-id="1644"><span data-dcnode-id="1645" instrument_node="">Carnal self has many desires…and you KNOW THEM ALL..deep down inside.. </span></p><span data-dcnode-id="1643" instrument_node="">
</span><p data-dcnode-id="1641"><span data-dcnode-id="1642" instrument_node="">But we sometimes deny their existence…because they are ‘too bad’ for your New Spirit man to be reminded of them… The Holy Spirit however, has no scruples…He will bring them all out one by one…and you will feel TERRIBLE and cut into pieces when His Light shines on them… </span></p><span data-dcnode-id="1640" instrument_node="">
</span><p data-dcnode-id="1638"><span data-dcnode-id="1639" instrument_node="">You will feel ashamed, degraded, humiliated and many times you won’t believe that THIS WAS YOU!!!! before your Salvation… Even Satan will stand there and say…”See, this IS you…do you really think G-d can forgive THIS?” </span></p><span data-dcnode-id="1637" instrument_node="">
</span><p data-dcnode-id="1635"><span data-dcnode-id="1636" instrument_node="">Everytime a desire which can lead you into temptation to sin pops up…this process is going to repeat itself… It’s hard to be broken to pieces by the Altar of G-d…but it’s necessary… The Cleansing Fire of the Holy Spirit burns VERY Hot…and it’s going to hurt many times… But rather this, than kidding yourself that you are ok, and just let it ride until next time…. </span></p><span data-dcnode-id="1634" instrument_node="">
</span><p data-dcnode-id="1632"><span data-dcnode-id="1633" instrument_node="">This is the time you tell Satan: “No G-d cannot forgive this..that’s why my carnal self..my flesh HAD TO DIE!!!!” If your flesh dies, the sin in it dies with it….The New Spirit person will not be held accountable for that sin, provided he TRULY turns away from it!!! You can’t have a life of sin and think whatever you did in the day you can just fix before bed time with a “Please forgive me Lord” prayer…. Repentance means to: a) recognise the sin, b) reject the sin, c) rebuke the desire that caused it, d) ask Yeshua for forgivenes and e) WALK AWAY FROM IT AND NOT DO IT AGAIN!!! </span></p><span data-dcnode-id="1631" instrument_node="">
</span><p data-dcnode-id="1629"><span data-dcnode-id="1630" instrument_node="">I am now DEAD in my flesh, DEAD to sin, and DEAD to your attempts to make me sin…so GET BEHIND ME!!! in the Name of My Lord Yeshua the Messiah! And he will leave… </span></p><span data-dcnode-id="1628" instrument_node="">
</span><p data-dcnode-id="1626"><span data-dcnode-id="1627" instrument_node="">This is now your walk with G-d…and step by step He will (when you ask Him in all humbleness and sincerety) expose every hidden desire you may have… Each one who is a potential portal for Satan to come through and tempt you into sin… and your job is to bring that desire out into the open…confess it to Him, and then rebuke it in His Name…so it can be destroyed… </span></p><span data-dcnode-id="1625" instrument_node="">
</span><p data-dcnode-id="1623"><span data-dcnode-id="1624" instrument_node="">When no desires are left in you…except to Follow Him and obey His Will…you will finally be free to walk with Him, …knowing that there is no desire left, which Satan can use to tempt and tantalize you into sin… Your flesh with it’s sin…will finally be a corpse…and the dead can’t respond to temptations… </span></p><span data-dcnode-id="1622" instrument_node="">
</span><p data-dcnode-id="1620"><span data-dcnode-id="1621" instrument_node="">Remember…at the slightest temptation..REBUKE Satan! If only you know how many times a day I have to say SATAN GET BEHIND ME! To thoughts that pop up in my own mind…and they leave, because they never were from G-d… </span></p><span data-dcnode-id="1619" instrument_node="">
</span><p data-dcnode-id="1617"><span data-dcnode-id="1618" instrument_node="">Know that when a thought first pop up in your mind that is either the DESIRE…or the TEMPTATION…it’s NOT the sin yet… You now have the choice to ‘ENTERTAIN this thought..making it YOURS…and thereby sinning already, even if you didn’t commit it physically yet… OR…to rebuke it immediately with “Satan get behind me!” and it will leave your mind as quickly as it came… </span></p><span data-dcnode-id="1616" instrument_node="">

</span><span class="fn" data-dcnode-id="1588"><a class="url" data-dcnode-id="1589" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//jesuschristiscomingsoon.weebly.com/index.html" rel="external nofollow ugc"><span data-dcnode-id="1590" instrument_node="">kanna</span></a></span><span data-dcnode-id="1587" instrument_node=""> </span><span class="comment_date" data-dcnode-id="1585"><span data-dcnode-id="1586" instrument_node="">

</span><p data-dcnode-id="1578"><span data-dcnode-id="1579" instrument_node="">Dear , </span></p><span data-dcnode-id="1577" instrument_node="">
</span><p data-dcnode-id="1575"><span data-dcnode-id="1576" instrument_node="">When you came to your Lord Yeshua the first time… You were filthy, riddled with the disease of sin in your flesh, your mind and your soul was carnally orientated… </span></p><span data-dcnode-id="1574" instrument_node="">
</span><p data-dcnode-id="1572"><span data-dcnode-id="1573" instrument_node="">When you accepted Him as your Saviour and Master over your Life…you were given a New Spirit…one of Life in our Lord… You became a NEW PERSON, and the OLD person you used to be…died… (Problem is, You know it, G-d knows it…but your old carnal self needs convincing…it still thinks it’s alive and kicking!) </span></p><span data-dcnode-id="1571" instrument_node="">
</span><p data-dcnode-id="1569"><span data-dcnode-id="1570" instrument_node="">You awakened to Him…you became aware of a New Life Force in you…one that seeked Him, and your desires became to Know Him, and have a relationship with Him… You began to find out what His Will is, and your whole life began revolving around obeying His Commandments to show your Love for Him… </span></p><span data-dcnode-id="1568" instrument_node="">
</span><p data-dcnode-id="1566"><span data-dcnode-id="1567" instrument_node="">When you became this new person…when the carnal Old Person died…it’s sins died with it… It was destroyed…and it is only a corpse… Your “flesh” (desires for the things of this world, the carnal things)… is dead…you still have it, but it’s dead… </span></p><span data-dcnode-id="1565" instrument_node="">
</span><p data-dcnode-id="1563"><span data-dcnode-id="1564" instrument_node="">Your basically now have a choice which you never had before… Before, you couldn’t HELP sinning… Your mind was focused on everything to please your flesh… You HAD to have that chocolate….you HAD to see that ‘dubious’ movie…you HAD to wear that Lacoste Shirt…you HAD to have that girl in your bed… and NO ONE could point a finger at you because ‘WHO exactly did they think they were!!! criticizing YOU?!!! </span></p><span data-dcnode-id="1562" instrument_node="">
</span><p data-dcnode-id="1560"><span data-dcnode-id="1561" instrument_node="">All your thoughts, all your desires were centered on yourself…pleasing yourself, satisfying your own needs…and protecting your own image in the eyes of the world.. showing off, it was all about you, you, YOU…. </span></p><span data-dcnode-id="1559" instrument_node="">
</span><p data-dcnode-id="1557"><span data-dcnode-id="1558" instrument_node="">Your Rebirth caused you to become ‘CUT OFF’ from this “persona of self”… Almost as if you split into two people now in one body… Suddenly you awakened to the fact that life DOESN’T revolve around you…and you became aware of this Loving G-d, Yeshua who showed you the way of altruism… Of denying self, and instead using the breath He gave you and the body He gave you to bring Glory to Him… </span></p><span data-dcnode-id="1556" instrument_node="">
</span><p data-dcnode-id="1554"><span data-dcnode-id="1555" instrument_node="">But the Ego…the carnal self which has been unplugged in your system, won’t go quietly… It’s demanding attention..it’s demanding satisfaction, it’s demanding even revenge against this ‘New Spirit Person’ who now shares the same body with it… </span></p><span data-dcnode-id="1553" instrument_node="">
</span><p data-dcnode-id="1551"><span data-dcnode-id="1552" instrument_node="">It was quite happy having this Spirit Person dead and quiet… Because the Carnal self is not spiritual…it’s physical…worldly… Now Yeshua came and plugged you into Spirit again…You became Reborn in Spirit…and suddenly this Spirit of yours, is telling your carnal self to go die some place… REVOLUTION…overthrow of Government happened in your body… and your carnal self ain’t happy… </span></p><span data-dcnode-id="1550" instrument_node="">
</span><p data-dcnode-id="1548"><span data-dcnode-id="1549" instrument_node="">You as the New Spirit, takes control of government in your own body…and carnal self becomes the terrorist…trying to sabotage your new government around every corner… Your Spirit self says…”Body…you have been doing your own thing long enough…now we are doing things Yeshua’s way!” You are now incorporated into His Body…and you are going to have to learn teamwork with all the other bodies who belong to Him. And your carnal self shouts…’FOUL’…I am MY OWN person, I want to do my OWN THING!!! This is not fair…been doing a good job by myself, why this submission all of a sudden? </span></p><span data-dcnode-id="1547" instrument_node="">
</span><p data-dcnode-id="1545"><span data-dcnode-id="1546" instrument_node="">This is now the point where you as a New Creature in Yeshua, Born of Spirit is supposed to tell your ‘flesh’… Be quiet! Dead flesh don’t talk!!! But we dont’ always do that…and we stumble… Now there is a sin between your Spirit self and your Lord Yeshua…A SIN WHICH IS NOT FORGIVEN…YET….. Carnal self won some ground…and makes the body feel so nice…remember how things used to be? </span></p><span data-dcnode-id="1544" instrument_node="">
</span><p data-dcnode-id="1542"><span data-dcnode-id="1543" instrument_node="">If you allow this to continue, you will eventually slip back into carnal mode…and you can actually KILL that New Born Spirit Person you have become!!! You CAN let your light go out!!! Eventually carnal self will convince you through all the ‘feel good’ – “remember how you loved this?” messages to TURN BACK from the Narrow Road you embarked on when you first asked Lord Yeshua to become the Lord of your life, and put you back on the BROAD road which is the Highway to Hell…. </span></p><span data-dcnode-id="1541" instrument_node="">
</span><p data-dcnode-id="1539"><span data-dcnode-id="1540" instrument_node="">However…If you as New Spirit Man in Yeshua refuse to accept this deception and manipulation…you go on your knees…FIND the desire which caused you to fall for the temptation in the first place…. and DESTROY it in the presence of the Lord! Ask Him to forgive you and to let His Holy Spirit make you aware of any other potential desires which can cause you to fall into a temptation. </span></p><span data-dcnode-id="1538" instrument_node="">
</span><p data-dcnode-id="1536"><span data-dcnode-id="1537" instrument_node="">Carnal self has many desires…and you KNOW THEM ALL..deep down inside.. </span></p><span data-dcnode-id="1535" instrument_node="">
</span><p data-dcnode-id="1533"><span data-dcnode-id="1534" instrument_node="">But we sometimes deny their existence…because they are ‘too bad’ for your New Spirit man to be reminded of them… The Holy Spirit however, has no scruples…He will bring them all out one by one…and you will feel TERRIBLE and cut into pieces when His Light shines on them… </span></p><span data-dcnode-id="1532" instrument_node="">
</span><p data-dcnode-id="1530"><span data-dcnode-id="1531" instrument_node="">You will feel ashamed, degraded, humiliated and many times you won’t believe that THIS WAS YOU!!!! before your Salvation… Even Satan will stand there and say…”See, this IS you…do you really think G-d can forgive THIS?” </span></p><span data-dcnode-id="1529" instrument_node="">
</span><p data-dcnode-id="1527"><span data-dcnode-id="1528" instrument_node="">Everytime a desire which can lead you into temptation to sin pops up…this process is going to repeat itself… It’s hard to be broken to pieces by the Altar of G-d…but it’s necessary… The Cleansing Fire of the Holy Spirit burns VERY Hot…and it’s going to hurt many times… But rather this, than kidding yourself that you are ok, and just let it ride until next time…. </span></p><span data-dcnode-id="1526" instrument_node="">
</span><p data-dcnode-id="1524"><span data-dcnode-id="1525" instrument_node="">This is the time you tell Satan: “No G-d cannot forgive this..that’s why my carnal self..my flesh HAD TO DIE!!!!” If your flesh dies, the sin in it dies with it….The New Spirit person will not be held accountable for that sin, provided he TRULY turns away from it!!! You can’t have a life of sin and think whatever you did in the day you can just fix before bed time with a “Please forgive me Lord” prayer…. Repentance means to: a) recognise the sin, b) reject the sin, c) rebuke the desire that caused it, d) ask Yeshua for forgivenes and e) WALK AWAY FROM IT AND NOT DO IT AGAIN!!! </span></p><span data-dcnode-id="1523" instrument_node="">
</span><p data-dcnode-id="1521"><span data-dcnode-id="1522" instrument_node="">I am now DEAD in my flesh, DEAD to sin, and DEAD to your attempts to make me sin…so GET BEHIND ME!!! in the Name of My Lord Yeshua the Messiah! And he will leave… </span></p><span data-dcnode-id="1520" instrument_node="">
</span><p data-dcnode-id="1518"><span data-dcnode-id="1519" instrument_node="">This is now your walk with G-d…and step by step He will (when you ask Him in all humbleness and sincerety) expose every hidden desire you may have… Each one who is a potential portal for Satan to come through and tempt you into sin… and your job is to bring that desire out into the open…confess it to Him, and then rebuke it in His Name…so it can be destroyed… </span></p><span data-dcnode-id="1517" instrument_node="">
</span><p data-dcnode-id="1515"><span data-dcnode-id="1516" instrument_node="">When no desires are left in you…except to Follow Him and obey His Will…you will finally be free to walk with Him, …knowing that there is no desire left, which Satan can use to tempt and tantalize you into sin… Your flesh with it’s sin…will finally be a corpse…and the dead can’t respond to temptations… </span></p><span data-dcnode-id="1514" instrument_node="">
</span><p data-dcnode-id="1512"><span data-dcnode-id="1513" instrument_node="">Remember…at the slightest temptation..REBUKE Satan! If only you know how many times a day I have to say SATAN GET BEHIND ME! To thoughts that pop up in my own mind…and they leave, because they never were from G-d… </span></p><span data-dcnode-id="1511" instrument_node="">
</span><p data-dcnode-id="1509"><span data-dcnode-id="1510" instrument_node="">Know that when a thought first pop up in your mind that is either the DESIRE…or the TEMPTATION…it’s NOT the sin yet… You now have the choice to ‘ENTERTAIN this thought..making it YOURS…and thereby sinning already, even if you didn’t commit it physically yet… OR…to rebuke it immediately with “Satan get behind me!” and it will leave your mind as quickly as it came… </span></p><span data-dcnode-id="1508" instrument_node="">
</span><p data-dcnode-id="1506"><span data-dcnode-id="1507" instrument_node="">Any thought that focusses on you, your image, your desires, your esteem, your wants (not your needs), your ego…is evidence of a desire…which must be rebuked.. </span></p><span data-dcnode-id="1505" instrument_node="">
</span><p data-dcnode-id="1503"><span data-dcnode-id="1504" instrument_node="">G-d bless you friend… </span></p><span data-dcnode-id="1502" instrument_node="">
</span><p data-dcnode-id="1500"><span data-dcnode-id="1501" instrument_node="">Your Bro in Yeshua….</span></p><span data-dcnode-id="1499" instrument_node="">

</span><p data-dcnode-id="1349"><span data-dcnode-id="1350" instrument_node="">My heart goes out to the relatives of those with mental illnesses or addictions because so often we focus all of our compassion and programs on the ill or addicted persons without providing much support to alleviate the heartache being endured by the relatives. Even when loved-ones recover, the relatives can be left with an aching uncertainty that their loved-one might someday relapse. So it is with empathy I pray that the Lord gives you some word of wisdom or ministers to you in a special way, to lighten your load.</span></p><span data-dcnode-id="1348" instrument_node="">
</span><p data-dcnode-id="1346"><span data-dcnode-id="1347" instrument_node="">I hope the following testimony encourages you. A Pastor’s daughter was mentally handicapped. But for many years, he kept speaking about his daughter only with positive, faith-filled words. Over a number of years, she slowly began showing signs of improvement. Eventually, she became just as cognitive as his other children, and if I’m not mistaken, she even graduated with a degree. I guess his attitude was like that of the Shulamite woman who by faith said, “It is well,” even though she needed a miracle to raise her son from the dead.</span></p><span data-dcnode-id="1345" instrument_node="">
</span><p data-dcnode-id="1343"><span data-dcnode-id="1344" instrument_node="">In any case, may God help you to roll your burden onto the Lord – because the burden is His, not ours.</span></p><span data-dcnode-id="1342" instrument_node="">

</span><p data-dcnode-id="1314"><span data-dcnode-id="1315" instrument_node="">Please know that as a mom my heart goes out to you. I do have some word of what I feel are discernment. First let me start by saying it is very hard to distinguish between the true time to give your finances/tithes to God and when you are being “tricked”. I do believe, need to tithe. It is easy to search biblical tithing principals through any serach engine. As far as knowing whoto trust, have always lined up under two Biblical principals. First you know them by the fruit they bear (Matthew 7:16 to 18)The fruit of the Spiritare: love, joy, peace, longsuffering, gentleness, goodness, faith, meekness and temperance(Galatians 5:22-23). When I call out a spirit in the name of God, it is only through the Holy Spirit I can do this. Therfore any on exercising this gift of the manifistation of the Spirit through them will also bear the fruit of the Sirit. The second biblical principal I use to determine if I think a situation is of God is if I have peace about it. Sometime it is hard to tell, but if you listen with your heart instead of your head, you can tell.The reason for this is becuase Christ/God is the prince of Peace so all that is wellwith him or of him will bring you peace {Isa 9:6).</span></p><span data-dcnode-id="1313" instrument_node="">
</span><p data-dcnode-id="1309"><span data-dcnode-id="1312" instrument_node="">Some people feel that all people who believve in the trinity and recieve the Holy Spirit, have the ability to call out spirits (Acts2 &amp; Acts 10. If that is true you do not need to find someone to do it. You could just make sure your life is committed to God through the resurecton, study the bible and keep your son and you in prayer at all timesand strengthen your faith. It is not my faith in me that allows me to call out deamons, it is the Holy Spirit, I am only his vessel. Then as you feel the Holy Spirit well up with in you you could call out deamons in the name of Christ. You must be strong and face them directly. Command them in the name of Christ, Lord Jesus to be gone away from your son and your household. In the name of God they must flee.Remember greater is he who is with in you , if you are lined up right.</span><br data-dcnode-id="1311"><span data-dcnode-id="1310" instrument_node="">
I do have one word of warning. WHy do you feel your son is hearing voices? He told you he was not. Perhaps it is btter to pray for a gift of discernment and let the Holy Spirit reveal to you what you need to know to help your son, rather then assuming anything. I have lifted you inprayer. I hope you will work hard at studying the bible and finding many wonderful gifts in there that God has given you to line up under. One of my favorites is Mathew 11:29 “My yoke is light”. That means if you rest in him your load will be lightened. While exploring the bible read about the armor of God and make sure you work on it being a part of daily routine. </span></p><span data-dcnode-id="1308" instrument_node="">
</span><p data-dcnode-id="1304"><span data-dcnode-id="1307" instrument_node="">Ephesians 6:10</span><br data-dcnode-id="1306"><span data-dcnode-id="1305" instrument_node="">
. 10 Finally, be strong in the Lord and in his mighty power. 11 Put on the full armor of God, so that you can take your stand against the devil’s schemes. 12 For our struggle is not against flesh and blood, but against the rulers, against the authorities, against the powers of this dark world and against the spiritual forces of evil in the heavenly realms. 13 Therefore put on the full armor of God, so that when the day of evil comes, you may be able to stand your ground, and after you have done everything, to stand. 14 Stand firm then, with the belt of truth buckled around your waist, with the breastplate of righteousness in place 15 And with your feet fitted with the readiness that comes from the gospel of peace. 16 In addition to all this, take up the shield of faith, with which you can extinguish all the flaming arrows of the evil one. 17 Take the helmet of salvation and the sword of the Spirit, which is the word of God. 18 And pray in the Spirit on all occasions with all kinds of prayers and requests. With this in mind, be alert and always keep on praying for all the Lord’s people. (NIV) </span></p><span data-dcnode-id="1303" instrument_node="">

</span><img alt="JustAGuy" class="avatar avatar-80 photo avatar-default" data-dcnode-id="1001" height="80" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/%3Fs%3D80%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/?s=160&amp;d=mm&amp;r=g 2x" width="80"><span data-dcnode-id="1000" instrument_node=""> </span></div><span data-dcnode-id="998" instrument_node="">

</span><p data-dcnode-id="981"><span data-dcnode-id="986" instrument_node="">Eph 4:26 </span><strong data-dcnode-id="984"><span data-dcnode-id="985" instrument_node="">Be ye angry</span></strong><br data-dcnode-id="983"><span data-dcnode-id="982" instrument_node="">
We have emotions that crop up from time to time. Paul is speaking on the topic of anger, but there is a spiritual principle we can apply to lust, I believe. “Be ye angry” give us permission to have the initial feeling or emotional response.</span></p><span data-dcnode-id="980" instrument_node="">
</span><p data-dcnode-id="975"><strong data-dcnode-id="978"><span data-dcnode-id="979" instrument_node="">and sin not:</span></strong><br data-dcnode-id="977"><span data-dcnode-id="976" instrument_node="">
The feeling of lust is not sin in itself. </span></p><span data-dcnode-id="974" instrument_node="">
</span><p data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">Reference James 1:13 “Let no man say when he is tempted, I am tempted of God: for God cannot be tempted with evil, neither tempteth he any man: :14 But every man is tempted, when he is drawn away of his own lust, and enticed. :15 Then when lust hath conceived, it bringeth forth sin: and sin, when it is finished, bringeth forth death.” </span></p><span data-dcnode-id="971" instrument_node="">
</span><p data-dcnode-id="969"><span data-dcnode-id="970" instrument_node="">When we dwell on our own lust, we are drawn into temptation. The lust is not temptation at first. It is just a thought. Tie this in with 2Corinthians 10:3 “For though we walk in the flesh, we do not war after the flesh: :4 (For the weapons of our warfare are not carnal, but mighty through God to the pulling down of strong holds;):5 Casting down imaginations, and every high thing that exalteth itself against the knowledge of God, and bringing into captivity every thought to the obedience of Christ;” </span></p><span data-dcnode-id="968" instrument_node="">
</span><p data-dcnode-id="966"><span data-dcnode-id="967" instrument_node="">We either take that initial thought captive, or, it will take us captive as it follows the progression of sin outlined in James 1 and Ephesians 4. How do we take it captive? By exposing it to the Word of God which is the knowledge of God. Lust exalts itself against the knowledge “thou shalt not commit adultery” and also 1Co 6:18 “Flee fornication. Every sin that a man doeth is without the body; but he that committeth fornication sinneth against his own body.” Lust says, “its great and you can get it free.” The knowledge of God says, don’t do it, it will profoundly impact your own flesh. We must choose and note how quickly…</span></p><span data-dcnode-id="965" instrument_node="">
</span><p data-dcnode-id="962"><strong data-dcnode-id="963"><span data-dcnode-id="964" instrument_node="">let not the sun go down upon your wrath:</span></strong></p><span data-dcnode-id="961" instrument_node="">
</span><p data-dcnode-id="959"><span data-dcnode-id="960" instrument_node="">Our choice to subject our impulse and emotion, and neutralize or cast down the thought(s) behind them must take place quickly. No longer than 24 hours is mentioned for us to get our thoughts captive. If we entertain this ‘guest’ in our minds we risk violating verse 27… </span></p><span data-dcnode-id="958" instrument_node="">
</span><p data-dcnode-id="955"><strong data-dcnode-id="956"><span data-dcnode-id="957" instrument_node="">Neither give place to the devil. </span></strong></p><span data-dcnode-id="954" instrument_node="">
</span><p data-dcnode-id="952"><span data-dcnode-id="953" instrument_node="">The devil begins to occupy our God given territory. The birth of a stronghold begins. A fortress is built over time. Brick by brick, stone by stone. But frankly, even Gibralter is vulnerable if there is no one tending it. If we have let this sin take root in our lives over the years, there may be a strongman, a devil, in position to hold that territory until it is overthrown by the person’s will and resistance walking in the Power of God . This brings up the three levels of deliverance as I see them.</span></p><span data-dcnode-id="951" instrument_node="">
</span><p data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">1 – Hearing of the Word. “You shall know the truth and the truth shall set you free.”</span></p><span data-dcnode-id="948" instrument_node="">
</span><p data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">2- Resistance. “Resist the devil and he will flee from you, draw near to God and He will draw near to you.</span></p><span data-dcnode-id="945" instrument_node="">
</span><p data-dcnode-id="943"><span data-dcnode-id="944" instrument_node="">3 – Speak to the mountain.</span></p><span data-dcnode-id="942" instrument_node="">
</span><p data-dcnode-id="928"><span data-dcnode-id="941" instrument_node="">Mat 17:15 Lord, have mercy on my son: for he is lunatick, and sore vexed: for ofttimes he falleth into the fire, and oft into the water.</span><br data-dcnode-id="940"><span data-dcnode-id="939" instrument_node="">
Mat 17:16 And I brought him to thy disciples, and they could not cure him.</span><br data-dcnode-id="938"><span data-dcnode-id="937" instrument_node="">
Mat 17:17 Then Jesus answered and said, O faithless and perverse generation, how long shall I be with you? how long shall I suffer you? bring him hither to me.</span><br data-dcnode-id="936"><span data-dcnode-id="935" instrument_node="">
Mat 17:18 And Jesus rebuked the devil; and he departed out of him: and the child was cured from that very hour.</span><br data-dcnode-id="934"><span data-dcnode-id="933" instrument_node="">
Mat 17:19 Then came the disciples to Jesus apart, and said, Why could not we cast him out?</span><br data-dcnode-id="932"><span data-dcnode-id="931" instrument_node="">
Mat 17:20 And Jesus said unto them, Because of your unbelief: for verily I say unto you, If ye have faith as a grain of mustard seed, ye shall say unto this mountain, Remove hence to yonder place; and it shall remove; and nothing shall be impossible unto you.</span><br data-dcnode-id="930"><span data-dcnode-id="929" instrument_node="">
Mat 17:21 Howbeit this kind goeth not out but by prayer and fasting. </span></p><span data-dcnode-id="927" instrument_node="">
</span><p data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">Kingdoms are prophetically referred to as mountains. Mountains are themselves ideal for strongholds, incidently. Jesus gave us authority to speak to Satan’s kingdom and command it to be removed from a person’s life. This is done when the person, from the heart, has filled their mind with the Word of God against the sin area of their mind. When we confess our sin, he is faithful and just to forgive us our sin and cleanse us from ALL unrighteousness. We then have authority to speak to the strongman of lust and let him know we are taking back our turf. Then we live day by day with God’s Word at the forefront of our thinking in how we view men, or women. They are our brothers, or our sisters. We are here to protect and defend them, not use their bodies and defile them, or ourselves.</span></p><span data-dcnode-id="924" instrument_node="">
</span><p data-dcnode-id="922"><span data-dcnode-id="923" instrument_node="">I hope this helps.</span></p><span data-dcnode-id="921" instrument_node="">
</span><p data-dcnode-id="917"><span data-dcnode-id="920" instrument_node="">Blessings and Peace,</span><br data-dcnode-id="919"><span data-dcnode-id="918" instrument_node="">
Just A Guy</span></p><span data-dcnode-id="916" instrument_node="">

</span><p data-dcnode-id="887"><span data-dcnode-id="888" instrument_node="">At the age of youthwe live in flesh and there some default thoughts and desires in our mind as humans. But some are sin in the eyes of God.. and one of it is sexual desire/lust. In flesh, we are bounded to this desire but as saved christians we should keep on control in so that we do not commit any sinful activities. My question is, what ifthis desire keep on knocking our heads? When we feel weak to control the desire.. and we keep on falling to it, is there is any evil spirits working on in background or it is just us? Im a bit confused as I see many christian fellows (including me) let this desire go on through them. What we should do? Or is it just our age, in youth-hood… it is okey and soon when we are mature-adults we can come in to a control and it is not a big deal as many thinks? Please help me understand and if can,give me tips on how to come into a control of this desire and live a life that is pleasing to God in this issue.Thank you.</span></p><span data-dcnode-id="886" instrument_node="">

</span><p data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">Hi Chris,</span></p><span data-dcnode-id="857" instrument_node="">
</span><p data-dcnode-id="855"><span data-dcnode-id="856" instrument_node="">I feel for you. I can’t promise you an easy escape but I can give you certain necessary conditions.</span></p><span data-dcnode-id="854" instrument_node="">
</span><p data-dcnode-id="852"><span data-dcnode-id="853" instrument_node="">1. You have to mean business with God 100%. You can’t play with sin if you want to get and keep deliverance. Jesus has to be first.</span></p><span data-dcnode-id="851" instrument_node="">
</span><p data-dcnode-id="849"><span data-dcnode-id="850" instrument_node="">2. You should seek out people who amongst other things cast out demons. Of the few equipped Christians even fewer are willing to do this kind of ministry.</span></p><span data-dcnode-id="848" instrument_node="">
</span><p data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">3. You need to seek out places where the presence of God is moving, the Word of God is preached without compromise, and there is love. Hang out at those places.</span></p><span data-dcnode-id="845" instrument_node="">
</span><p data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">4. You need to discipline your mind to meditate on and speak the Word of God. </span></p><span data-dcnode-id="842" instrument_node="">
</span><p data-dcnode-id="840"><span data-dcnode-id="841" instrument_node="">5. You should read up on self-deliverance – for example – “Christian, set yourself free” by Graham Powell.</span></p><span data-dcnode-id="839" instrument_node="">
</span><p data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">Where are you living? I might know some competent people not far from you if I know where you live.</span></p><span data-dcnode-id="836" instrument_node="">

</span><p data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">Keep praying for her and never give up, get down on your knees and beg for the Lord to save her from any harmful demons. Pray from the bottom of your heart. A heartfelt prayer from a loving heart for another, will not go unnoticed by God. Remember to persist at all costs. Pray for the Lord himself to put his hand on your daughter to remove anything that is harmful to her soul and believe. I remember a verse in the bible that backs this up mark 7;24 about the Faith of a Syrophoenician Woman</span></p><span data-dcnode-id="675" instrument_node="">
</span><p data-dcnode-id="673"><span data-dcnode-id="674" instrument_node=""> 24Jesus left that place and went to the vicinity of Tyre.[g] He entered a house and did not want anyone to know it; yet he could not keep his presence secret. 25In fact, as soon as she heard about him, a woman whose little daughter was possessed by an evil[h] spirit came and fell at his feet. 26The woman was a Greek, born in Syrian Phoenicia. She begged Jesus to drive the demon out of her daughter. </span></p><span data-dcnode-id="672" instrument_node="">
</span><p data-dcnode-id="670"><span data-dcnode-id="671" instrument_node="">27″First let the children eat all they want,” he told her, “for it is not right to take the children’s bread and toss it to their dogs.” </span></p><span data-dcnode-id="669" instrument_node="">
</span><p data-dcnode-id="667"><span data-dcnode-id="668" instrument_node=""> 28″Yes, Lord,” she replied, “but even the dogs under the table eat the children’s crumbs.” </span></p><span data-dcnode-id="666" instrument_node="">
</span><p data-dcnode-id="664"><span data-dcnode-id="665" instrument_node=""> 29Then he told her, “For such a reply, you may go; the demon has left your daughter.” </span></p><span data-dcnode-id="663" instrument_node="">
</span><p data-dcnode-id="661"><span data-dcnode-id="662" instrument_node=""> 30She went home and found her child lying on the bed, and the demon gone.</span></p><span data-dcnode-id="660" instrument_node="">
</span><p data-dcnode-id="658"><span data-dcnode-id="659" instrument_node="">I don’t mean to alarm you, it is just demons need to be stopped, they want to intrude in our lives and the lives of our loved ones, They wish for us to trip and fall spiritually, so as to try and get a foot hold. The young and less experienced Christian can at times be vulnerable. It is by the grace of God that we can be rescued by Christ. This passage proves your prayers will be able to help. I have prayed for both yourself and your daughter, and indeed your entire home and those in your environment. That you will be in the Lords safe keeping. Read the article and details on the top of this page also. It will give you important information before you go about this. Ask for the prayers of others also on the prayer request page on this site, it can’t do any harm. Strong faith is key though, remember you can’t take these kinds of prayers on with half belief you need to be rock solid in faith. There is information on this site about spiritual warfare also, which could be helpful. God bless you Dear Sister.</span></p><span data-dcnode-id="657" instrument_node="">
