</span><article class="module single-post-module post-184 post type-post status-publish format-standard has-post-thumbnail hentry category-discipleship category-how-to-break-free category-spiritual-warfare category-how-to-overcome-sin tag-demons tag-deliverance tag-evil-spirits tag-casting-out-demons tag-evil-curses et-doesnt-have-featured_image et-has-post-format-content et_post_format-et-post-format-standard" data-dcnode-id="7039" id="post-184"><span data-dcnode-id="7340" instrument_node="">
</span><div class="post-header" data-dcnode-id="7319"><span data-dcnode-id="7339" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="7337"><span data-dcnode-id="7338" instrument_node="">How to Cast Out Demons</span></h1><span data-dcnode-id="7336" instrument_node="">
</span><div class="post-meta vcard" data-dcnode-id="7321"><span data-dcnode-id="7335" instrument_node="">
</span><p data-dcnode-id="7323"><a data-dcnode-id="7333" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christian-faith.com/discipleship/" rel="tag"><span data-dcnode-id="7334" instrument_node="">Discipleship</span></a><span data-dcnode-id="7332" instrument_node="">, </span><a data-dcnode-id="7330" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christian-faith.com/spiritual-warfare/how-to-break-free/" rel="tag"><span data-dcnode-id="7331" instrument_node="">How to Break Free</span></a><span data-dcnode-id="7329" instrument_node="">, </span><a data-dcnode-id="7327" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christian-faith.com/spiritual-warfare/" rel="tag"><span data-dcnode-id="7328" instrument_node="">Spiritual Warfare</span></a><span data-dcnode-id="7326" instrument_node="">, </span><a data-dcnode-id="7324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//christian-faith.com/articles/how-to-overcome-sin/" rel="tag"><span data-dcnode-id="7325" instrument_node="">How to Overcome Sin</span></a></p><span data-dcnode-id="7322" instrument_node="">
</span></div><span data-dcnode-id="7320" instrument_node="">
</span></div><span data-dcnode-id="7318" instrument_node="">
</span><div class="post-wrap" data-dcnode-id="7059"><span data-dcnode-id="7317" instrument_node="">
</span><div class="post-content entry-content" data-dcnode-id="7061"><span data-dcnode-id="7316" instrument_node="">
</span><p data-dcnode-id="7312"><strong data-dcnode-id="7314"><span data-dcnode-id="7315" instrument_node="">Note:</span></strong><span data-dcnode-id="7313" instrument_node=""> This page is intensely practical. It contains suggestions and principles for the ministry of exorcism, intended for use only by Christians truly devoted to Jesus Christ. The theological principles upon which this ministry is based can be found on this site. Read it before proceeding to read and study the information on this page.</span></p><span data-dcnode-id="7311" instrument_node="">
</span><p data-dcnode-id="7309"><img alt="How to Cast out Demons" class="alignnone size-full wp-image-52360" data-dcnode-id="7310" height="426" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.christian-faith.com/wp-content/uploads/2007/02/How-to-Cast-out-Demons.jpg&amp;raw" width="640"></p><span data-dcnode-id="7308" instrument_node="">
</span><p data-dcnode-id="7305"><strong data-dcnode-id="7306"><span data-dcnode-id="7307" instrument_node="">Legal Disclaimer:</span></strong></p><span data-dcnode-id="7304" instrument_node="">
</span><p data-dcnode-id="7302"><span data-dcnode-id="7303" instrument_node="">By reading further you agree that the author is not legally responsible for anything that happens to you as a result of putting any or all of the suggestions on this page into practice. You do so at your own risk. I do hereby warn you that taking on demonic forces means entering into a spiritual battle – and war is dirty. It can have consequences in every area of your life. You must live right with God and others to do this ministry. By reading on, you agree that you alone are responsible for happens as a result of putting into practice the knowledge gained by reading this page.</span></p><span data-dcnode-id="7301" instrument_node="">
</span><p data-dcnode-id="7299"><span data-dcnode-id="7300" instrument_node="">Read on if you belong to Jesus Christ and you believe He may be calling you to learn how to drive out demons.</span></p><span data-dcnode-id="7298" instrument_node="">
</span><p data-dcnode-id="7293"><span data-dcnode-id="7297" instrument_node="">If you agree to these conditions </span><a data-dcnode-id="7295" href="#agreed"><span data-dcnode-id="7296" instrument_node="">click here</span></a><span data-dcnode-id="7294" instrument_node="">, otherwise back out now!</span></p><span data-dcnode-id="7292" instrument_node="">
</span><p data-dcnode-id="7288"><a data-dcnode-id="7291" name="agreed"></a><strong data-dcnode-id="7289"><span data-dcnode-id="7290" instrument_node="">Practical Suggestions for Deliverance Ministry</span></strong></p><span data-dcnode-id="7287" instrument_node="">
</span><p data-dcnode-id="7284"><strong data-dcnode-id="7285"><span data-dcnode-id="7286" instrument_node="">Be Prepared</span></strong></p><span data-dcnode-id="7283" instrument_node="">
</span><p data-dcnode-id="7281"><span data-dcnode-id="7282" instrument_node="">To be in this ministry you need to be a person of prayer. At the very least, you need to have a strong anointing from God, which you could only have received through previous faithfulness to God in prayer. However, in this ministry, more than others, we are dependent on God the Holy Spirit. Even Jesus did not drive out demons except by the Spirit of God. So keep close to God through prayer. Remember the seven sons of Sceva who were humiliated by the demons because they did not know Christ for themselves. Acts 19:13-16.</span></p><span data-dcnode-id="7280" instrument_node="">
</span><p data-dcnode-id="7277"><strong data-dcnode-id="7278"><span data-dcnode-id="7279" instrument_node="">Work in A Team if at all possible</span></strong></p><span data-dcnode-id="7276" instrument_node="">
</span><p data-dcnode-id="7274"><span data-dcnode-id="7275" instrument_node="">Jesus sent his disciples out two by two to heal the sick and cast out demons. It is better to work with others. In any case, never get into a counselling or deliverance situation alone with a person of the opposite sex. Satan does send people to come for counselling who later accuse ministers of sexual misconduct and other false things. If you were alone with that person and they accuse you, it is your word versus theirs. You can lose your reputation and ministry like this through false accusations.</span></p><span data-dcnode-id="7273" instrument_node="">
</span><p data-dcnode-id="7271"><span data-dcnode-id="7272" instrument_node="">Make sure your team relationships are in good order. Be watchful, practice humility and forgiveness so that Satan cannot gain an advantage over you. Where there is unity between brethren, Christ is present and commands His blessing.</span></p><span data-dcnode-id="7270" instrument_node="">
</span><p data-dcnode-id="7267"><strong data-dcnode-id="7268"><span data-dcnode-id="7269" instrument_node="">Bind The Devil</span></strong></p><span data-dcnode-id="7266" instrument_node="">
</span><p data-dcnode-id="7264"><span data-dcnode-id="7265" instrument_node="">You have effective authority over evil spirits to the extent that you submit to God and resist the devil. To use the name of Jesus Christ you must live under the authority of Jesus Christ. As the spirit leads, you should bind the devil according to Matthew 18:18 with words such as these:</span></p><span data-dcnode-id="7263" instrument_node="">
</span><p data-dcnode-id="7261"><span data-dcnode-id="7262" instrument_node="">“In the name and authority of the Lord Jesus Christ, we renounce all the power of darkness which may exist in this area or in the life of [Counsellee’s name] for any reason. We bind all evil spirits assigned to [Counsellee’s name] and forbid you to operate in any way, in the name of Jesus Christ.”</span></p><span data-dcnode-id="7260" instrument_node="">
</span><p data-dcnode-id="7257"><strong data-dcnode-id="7258"><span data-dcnode-id="7259" instrument_node="">Determine if the counsellee (person needing deliverance) is a born-again Christian.</span></strong></p><span data-dcnode-id="7256" instrument_node="">
</span><p data-dcnode-id="7254"><span data-dcnode-id="7255" instrument_node="">If they are not, its much better to spend time explaining the gospel to them, and leading them to a point of trust and faith in Christ. Without this basis, they cannot be properly set free from demonic influence.</span></p><span data-dcnode-id="7253" instrument_node="">
</span><p data-dcnode-id="7251"><span data-dcnode-id="7252" instrument_node="">Some people are too bound to respond directly to the gospel. There are too approaches you can take here.</span></p><span data-dcnode-id="7250" instrument_node="">
</span><p data-dcnode-id="7248"><span data-dcnode-id="7249" instrument_node="">(a) While others pray and bind the demons, patiently explain that Jesus can set them free, that Jesus can save, that Jesus paid for their sins at the cross and that Jesus rose again and is alive. Make it very simple, since demons will attempt to work overtime to confuse their minds with distractions and irrelevant considerations. Invite them to call upon Jesus for salvation first.</span></p><span data-dcnode-id="7247" instrument_node="">
</span><p data-dcnode-id="7245"><span data-dcnode-id="7246" instrument_node="">(b) If the anointing for faith and power is upon you, ask for permission to lay hands on them [on the head and the back are good places for this], and, then, in the name of Jesus, do so, releasing by faith the anointing and commanding the demons to get off their mind and out of their lives. This will work for long enough to get them to a point of being able to hear and understand the gospel message. You must lead them to Christ at this point before continuing ministry.</span></p><span data-dcnode-id="7244" instrument_node="">
</span><p data-dcnode-id="7241"><strong data-dcnode-id="7242"><span data-dcnode-id="7243" instrument_node="">For Deliverance Ministry Aiming for Thorough Cleansing</span></strong></p><span data-dcnode-id="7240" instrument_node="">
</span><p data-dcnode-id="7238"><span data-dcnode-id="7239" instrument_node="">If possible, create an atmosphere of PRAISE where Jesus Christ is honored.</span></p><span data-dcnode-id="7237" instrument_node="">
</span><p data-dcnode-id="7235"><span data-dcnode-id="7236" instrument_node="">God dwells in the praises of His people (Psalm 22:3). So acknowledge God’s greatness by beginning times of deliverance ministry with songs of praise to God. This builds faith, invites the Holy Spirit to come with his anointing, and weakens the power of Satan in the area. Demons feel uncomfortable with praise directed towards God and will be more willing to leave when they feel bad in a place. Praise silences the voice of the enemy.</span></p><span data-dcnode-id="7234" instrument_node="">
</span><p data-dcnode-id="7232"><span data-dcnode-id="7233" instrument_node="">“Out of the mouth of babes and nursing infants you have ordained strength, because of your enemies, that you may silence the enemy and the avenger.” (Psalm 8:2). In Matthew 21:16 Jesus quoted this Scripture as follows, “Out of the mouth of babes and nursing infants you have perfected praise”. Together, these verses reveal the secret that PRAISE silences the voice of the enemy (demons). We are exhorted to “continually offer to God the sacrifice of praise” (Hebrews 13:15). The more we do this, the less problems we will have with demonic harrassment. Teach people to praise God. A lot of their problems will be solved if they learn to praise God through the difficulties until God’s light starts to shine through. People can only keep deliverance by continuing to praise God.</span></p><span data-dcnode-id="7231" instrument_node="">
</span><p data-dcnode-id="7229"><span data-dcnode-id="7230" instrument_node="">Just before the time for the person to confess their sins and call upon the Lord, it is good to really get into praising God. Music helps here.</span></p><span data-dcnode-id="7228" instrument_node="">
</span><p data-dcnode-id="7225"><strong data-dcnode-id="7226"><span data-dcnode-id="7227" instrument_node="">Be Thorough</span></strong></p><span data-dcnode-id="7224" instrument_node="">
</span><p data-dcnode-id="7222"><span data-dcnode-id="7223" instrument_node="">Identify what areas of demonic influence are in a persons life (a) by listening to them (b) by asking questions (c) by listening to God and the gifts of the Holy Spirit. Some things are obvious, others require revelations from God.</span></p><span data-dcnode-id="7221" instrument_node="">
</span><p data-dcnode-id="7219"><span data-dcnode-id="7220" instrument_node="">Do not depend on the demons themselves for information. Although Jesus once asked the demon what its name was, you generally don’t need to. In any case, Jesus did not ask each of the thousands of demons in that man what its name was.</span></p><span data-dcnode-id="7218" instrument_node="">
</span><p data-dcnode-id="7216"><span data-dcnode-id="7217" instrument_node="">In commanding demons to go out, you don’t need to know their name. They can be identified by what they promote. Thus demons of fear, lust, deception, pride, anger, violence and so on can be commanded to leave using just those names. For example, you can say, “You spirit of fear, come out in Jesus’ name!” or “I command you spirit of infirmity to loose her in Jesus’ name!”</span></p><span data-dcnode-id="7215" instrument_node="">
</span><p data-dcnode-id="7213"><span data-dcnode-id="7214" instrument_node="">It is outside the scope of this article to give a complete list of the demonic problems that may afflict people. You need to keep learning and studying. Read books by authors like Noel Gibson, Graham Powell, Bill Subritzky and others with plenty of practical experience of actually doing it. Learn from the Lord yourself through each experience.</span></p><span data-dcnode-id="7212" instrument_node="">
</span><p data-dcnode-id="7209"><strong data-dcnode-id="7210"><span data-dcnode-id="7211" instrument_node="">Some Questions to Ask the Counsellee</span></strong></p><span data-dcnode-id="7208" instrument_node="">
</span><p data-dcnode-id="7206"><span data-dcnode-id="7207" instrument_node="">Have you truly given your life to Jesus Christ? Would you like to?</span></p><span data-dcnode-id="7205" instrument_node="">
</span><p data-dcnode-id="7203"><span data-dcnode-id="7204" instrument_node="">What do you want freedom from?</span></p><span data-dcnode-id="7202" instrument_node="">
</span><p data-dcnode-id="7200"><span data-dcnode-id="7201" instrument_node="">When is the first time you had this trouble? (Be listening, and seek to discover through what action or event the demons got in in the first place. These doorways need to be closed through renunciation for deliverance to be lasting.)</span></p><span data-dcnode-id="7199" instrument_node="">
</span><p data-dcnode-id="7197"><span data-dcnode-id="7198" instrument_node="">What experience have you had of personal rejection by others?</span></p><span data-dcnode-id="7196" instrument_node="">
</span><p data-dcnode-id="7194"><span data-dcnode-id="7195" instrument_node="">Are there people you find it difficult to forgive? (People must forgive or God hands them over to demonic tormenters – see Matthew 18:34,35).</span></p><span data-dcnode-id="7193" instrument_node="">
</span><p data-dcnode-id="7191"><span data-dcnode-id="7192" instrument_node="">Are you aware of any occult history in your family or your ancestors – e.g. witchcraft, freemasonry, false religions etc? (All these must be renounced).</span></p><span data-dcnode-id="7190" instrument_node="">
</span><p data-dcnode-id="7187"><strong data-dcnode-id="7188"><span data-dcnode-id="7189" instrument_node="">Procedure for Deliverance</span></strong></p><span data-dcnode-id="7186" instrument_node="">
</span><p data-dcnode-id="7183"><strong data-dcnode-id="7184"><span data-dcnode-id="7185" instrument_node="">Practical Instructions </span></strong></p><span data-dcnode-id="7182" instrument_node="">
</span><p data-dcnode-id="7179"><strong data-dcnode-id="7180"><span data-dcnode-id="7181" instrument_node="">Explain the Need for Laying on of hands</span></strong></p><span data-dcnode-id="7178" instrument_node="">
</span><p data-dcnode-id="7176"><span data-dcnode-id="7177" instrument_node="">Some say that we shouldn’t lay hands on those with demons, lest they come into us, but we need not fear if the power of the Holy Spirit is truly upon us. Jesus took Peter’s mother-in-law’s hand, rebuked the fever and it left. Demons hate the power of the Holy Spirit that comes through the laying on of hands and when hands are laid on in Jesus’ name, demons are more likely to leave quickly. It is not an absolute requirement but it can be a point of contact for faith.</span></p><span data-dcnode-id="7175" instrument_node="">
</span><p data-dcnode-id="7173"><span data-dcnode-id="7174" instrument_node="">NEVER lay hands on a person inappropriately. Avoid touching areas which may open the door for lust. (It shouldn’t be necessary to say this but it is better to be clear).</span></p><span data-dcnode-id="7172" instrument_node="">
</span><p data-dcnode-id="7170"><span data-dcnode-id="7171" instrument_node="">Explain how a person may co-operate in the process of expelling demons</span></p><span data-dcnode-id="7169" instrument_node="">
</span><p data-dcnode-id="7167"><span data-dcnode-id="7168" instrument_node="">Tell the person that they should co-operate with their deliverance after prayer by deliberately breathing out, and perhaps coughing. The word for spirit is the same as the word for breath or wind in Greek and Hebrew, and evil spirits can be breathed out by an act of the will and by faith, once the legal conditions are met – see lesson on deliverance which describes what these are.</span></p><span data-dcnode-id="7166" instrument_node="">
</span><p data-dcnode-id="7164"><span data-dcnode-id="7165" instrument_node="">Instruct them during the time of ministry not to pray audibly, to use the name of Jesus, or to pray in tongues. Instead, they should focus their minds on Jesus and breathe out in faith. Demons can’t leave a person while that person is busy praying or has the name of Jesus on their lips. They have to know this in order to let the demons out.</span></p><span data-dcnode-id="7163" instrument_node="">
</span><p data-dcnode-id="7161"><span data-dcnode-id="7162" instrument_node="">Manifestations of demons may occur, but are not a condition of deliverance. These manifestations could include coughing, yawning, tears coming to the eyes, vomiting, spitting etc. A person should not let the demons talk through them. The only manifestations they should permit are those where the demon is leaving.</span></p><span data-dcnode-id="7160" instrument_node="">
</span><p data-dcnode-id="7158"><span data-dcnode-id="7159" instrument_node="">Experience has revealed that demons in the body many times are located around the stomach or chest and during deliverance move up into the throat from where they are expelled. They tend to produce knots of tension in the body in the places where they are. You can command the demons not to link and reinforce. Faith in the power and authority of the name of Jesus combined with the anointing will drive them out.</span></p><span data-dcnode-id="7157" instrument_node="">
</span><p data-dcnode-id="7155"><span data-dcnode-id="7156" instrument_node="">After these things are explained it is easier to do the ministry.</span></p><span data-dcnode-id="7154" instrument_node="">
</span><p data-dcnode-id="7151"><strong data-dcnode-id="7152"><span data-dcnode-id="7153" instrument_node="">Prayer for Deliverance</span></strong></p><span data-dcnode-id="7150" instrument_node="">
</span><p data-dcnode-id="7148"><span data-dcnode-id="7149" instrument_node="">Lead the counsellee in a prayer something like this:</span></p><span data-dcnode-id="7147" instrument_node="">
</span><p data-dcnode-id="7145"><span data-dcnode-id="7146" instrument_node="">“Jesus, I come to you as my deliverer. I believe that You are the Son of God, that You died for me and rose again. I confess You as Lord and renounce all influences of Satan in my life. Lord, you know the demons that oppress me, that harrass me, that entice me, that enslave me. I confess all my sins to you. (You must name them out loud before God). I repent of (turn away from) all my sins. I renounce any form of the occult or idolatry in my life or in the life of my ancestors (Name them to the extent of your knowledge of it). I forgive anyone who has ever hurt me in any way and I let go of any bitterness or resentment. (Name any such people whom you associate with personal pain and forgive them by name).</span></p><span data-dcnode-id="7144" instrument_node="">
</span><p data-dcnode-id="7142"><span data-dcnode-id="7143" instrument_node="">(Repeat for each significant stronghold). In the name of Jesus, I break and cancel the invitations to demons that have come through . The blood of Jesus now annuls any legal right held by the Kingdom of darkness in these areas.</span></p><span data-dcnode-id="7141" instrument_node="">
</span><p data-dcnode-id="7139"><span data-dcnode-id="7140" instrument_node="">In the name of Jesus these doorways are now closed.</span></p><span data-dcnode-id="7138" instrument_node="">
</span><p data-dcnode-id="7136"><span data-dcnode-id="7137" instrument_node="">I believe I am saved by the blood of Jesus and Satan has no further legal rights to my spirit, soul, mind or body. Through the blood of Jesus I am justified, just as if I never sinned. Through the blood of Jesus I am sanctified, set apart to God. Jesus Christ is my Lord. Through the blood of Jesus, I am redeemed out of the hand of the devil.</span></p><span data-dcnode-id="7135" instrument_node="">
</span><p data-dcnode-id="7133"><span data-dcnode-id="7134" instrument_node="">Jesus you said whoever calls upon the name of the Lord SHALL be delivered. I call upon you. Deliver me!</span></p><span data-dcnode-id="7132" instrument_node="">
</span><p data-dcnode-id="7130"><span data-dcnode-id="7131" instrument_node="">Now in the name of Jesus Christ I bind every evil spirit in or around my life. In the name of Jesus I command you to get out and leave me alone. Go in Jesus’ name!”</span></p><span data-dcnode-id="7129" instrument_node="">
</span><p data-dcnode-id="7127"><span data-dcnode-id="7128" instrument_node="">A shorter prayer taken from the writings of Noel Gibson:</span></p><span data-dcnode-id="7126" instrument_node="">
</span><p data-dcnode-id="7124"><span data-dcnode-id="7125" instrument_node="">“I confess Jesus Christ to be my personal Savior. I confess and renounce every iniquity, transgression and sin that I, my parents, or ancestors may have committed and which has brought bondages and dominations to my life, and ask for forgiveness and cleansing. I repent from any action, attitude or habit which does not glorify Jesus Christ. I renounce the devil, and all of his works, influences, bondages, dominations, inflictions and infirmities in my life. I claim the release and freedom promised by Jesus Christ, that He may be the Lord of my whole life. Amen.”</span></p><span data-dcnode-id="7123" instrument_node="">
</span><p data-dcnode-id="7121"><span data-dcnode-id="7122" instrument_node="">Please note though, there is power in the specific renunciation of sin. The more specific and definite we are, the better the results. For this reason I would suggest leading the person to name the sins and bondages they want broken off their lives. Corresponding confession is appropriate.</span></p><span data-dcnode-id="7120" instrument_node="">
</span><p data-dcnode-id="7116"><strong data-dcnode-id="7118"><span data-dcnode-id="7119" instrument_node="">It is important for people using the authority they have in Christ, to verbally CANCEL and BREAK all invitations to the devil/evil spirits they have created through sin or their ancestors have created throuh their sins.</span></strong><span data-dcnode-id="7117" instrument_node="">. Otherwise the demons may leave and then come back at an opportune time. Also, remember that deliverance is for people who want to live in fellowship with God. We need to daily seek that presence of the Holy Spirit and walk submissively to God, enquiring Him about things if we are to stay free.</span></p><span data-dcnode-id="7115" instrument_node="">
</span><p data-dcnode-id="7112"><strong data-dcnode-id="7113"><span data-dcnode-id="7114" instrument_node="">Command the Demons to Leave</span></strong></p><span data-dcnode-id="7111" instrument_node="">
</span><p data-dcnode-id="7109"><span data-dcnode-id="7110" instrument_node="">The actual words to use might be: “In the name of Jesus Christ, I command all evil spirits – get out now! Spirits of …, get out in Jesus’ name! (repeat for each category if necessary).”</span></p><span data-dcnode-id="7108" instrument_node="">
</span><p data-dcnode-id="7105"><strong data-dcnode-id="7106"><span data-dcnode-id="7107" instrument_node="">Follow the Holy Spirit</span></strong></p><span data-dcnode-id="7104" instrument_node="">
</span><p data-dcnode-id="7102"><span data-dcnode-id="7103" instrument_node="">If things seem to block, ask the Holy Spirit what to do next. You may be led to ask the person what is going on in them. Many times the counsellee gets information during deliverance which when shared provides effective keys to their own deliverance. Remember that they are co-operating in their own deliverance and that the Holy Spirit is showing them things too many times. In effect, they are part of the deliverance team also.</span></p><span data-dcnode-id="7101" instrument_node="">
</span><p data-dcnode-id="7098"><strong data-dcnode-id="7099"><span data-dcnode-id="7100" instrument_node="">After Deliverance </span></strong></p><span data-dcnode-id="7097" instrument_node="">
</span><p data-dcnode-id="7095"><span data-dcnode-id="7096" instrument_node="">If you have peace from the Holy Spirit that no more deliverance should happen at that time, the person counsellee should be encouraged to invite the Holy Spirit into all the areas of their lives from which the demons have left. It may be appropriate to have another time of praise and thanksgiving to God.</span></p><span data-dcnode-id="7094" instrument_node="">
</span><p data-dcnode-id="7092"><span data-dcnode-id="7093" instrument_node="">Teach the counsellee the things contained in my lesson on deliverance concerning how to maintain deliverance. The most important thing is that they draw near to God through meditation on the Word, much prayer and through faithful obedience to the Lord. These things are very important, since demons always try to get back in later. People must be full of the Holy Spirit if they want to be sure of staying free.</span></p><span data-dcnode-id="7091" instrument_node="">
</span><p data-dcnode-id="7088"><strong data-dcnode-id="7089"><span data-dcnode-id="7090" instrument_node="">Further Deliverance</span></strong></p><span data-dcnode-id="7087" instrument_node="">
</span><p data-dcnode-id="7085"><span data-dcnode-id="7086" instrument_node="">Sometimes people are not ready to get all the demons out in one session. They need to learn to walk in the freedom they have received until that point, making adjustments in their life. If they are faithful the Lord will soon enable them to go further in the process of deliverance. They may be able to continue their own deliverance by the themselves following the principles in this lesson and the foundational teaching on deliverance.</span></p><span data-dcnode-id="7084" instrument_node="">
</span><p data-dcnode-id="7082"><span data-dcnode-id="7083" instrument_node="">In reality it is rare that all the demons come out in one session, although it is possible. However, the counsellee should be taught how to depend on Jesus and get himself or herself free as soon as possible, rather than creating a situation of perpetual dependence on the counsellor or deliverance minister.</span></p><span data-dcnode-id="7081" instrument_node="">
</span><p data-dcnode-id="7078"><strong data-dcnode-id="7079"><span data-dcnode-id="7080" instrument_node="">Further Principles to be employed in this Ministry</span></strong></p><span data-dcnode-id="7077" instrument_node="">
</span><p data-dcnode-id="7075"><span data-dcnode-id="7076" instrument_node="">Seek the root causes, not just symptons. By dealing with the most powerful demons at the root of the person’s problems, many of the smaller demons will have nothing to cling onto and be forced to leave. However the reverse principle is not true.</span></p><span data-dcnode-id="7074" instrument_node="">
</span><p data-dcnode-id="7072"><span data-dcnode-id="7073" instrument_node="">Study and learn more. Any disobedience to the Word of God which becomes a habit can open the door for demons. Study and meditate on the Word. Build faith in this way and resist demons which seek to bind with unbelief, doubt and fear.</span></p><span data-dcnode-id="7071" instrument_node="">
</span><p data-dcnode-id="7069"><span data-dcnode-id="7070" instrument_node="">Learn to receive the gifts of the Holy Spirit. The Holy Spirit can give us thoughts and images just as demons can, so be open to these revelations from the Holy Spirit which can greatly assist in ministry.</span></p><span data-dcnode-id="7068" instrument_node="">
</span><p data-dcnode-id="7066"><span data-dcnode-id="7067" instrument_node="">Give the glory to God and keep Jesus central. Resist demonic suggestions that you are so great now that you are casting out demons. If they can trap you in pride you will be in for a fall. We must respect all the biblical conditions for our own freedom in Christ before we can effectively minister freedom to others. Remember that it is God’s power not yours that drives the demons out. We didn’t earn this power. Jesus paid for and supplied everything through the cross and by His grace. We are just privileged to be vessels and messengers for God. So we should never seek to take credit for the results.</span></p><span data-dcnode-id="7065" instrument_node="">
</span><p data-dcnode-id="7063"><span data-dcnode-id="7064" instrument_node="">“Freely you have received, freely give” ( Matthew 10:8). Do not stoop to demand monetary payment for delivering the gifts of God to people. Nowhere in the Bible did any servant of God accept money for healing or ministering freedom to a person. Those who do so are on dangerous ground indeed.</span></p><span data-dcnode-id="7062" instrument_node="">
</span></div><span data-dcnode-id="7060" instrument_node="">

</span><p data-dcnode-id="6869"><span data-dcnode-id="6870" instrument_node="">God bless you for your patience to your wife. This must have been very frustrating to cast out demons only to have them come back. I have realised this over many years, that if a demon has the legal right to be in someones life, by legal right I mean because of unforgiveness, unconfessed sin, unrepentant heart, or wrong thinking, then you can cast the demon out, but it has the right to be there, until the person involved decides to do something for themselves. The most powerful and painless form of deliverance, is confession and repentance, when we confess our sins to God and ask for HIS forgiveness, the demon has to leave of it’s own accord because God has forgiven us. But if we lead someone in a prayer of confession and repentance but they do not mean it from their own heart, then the demon will remain. If we confess our sins He is just to forgive us and cleanse us from all unrighteousness.</span></p><span data-dcnode-id="6868" instrument_node="">

</span><p data-dcnode-id="6840"><span data-dcnode-id="6841" instrument_node="">With my first wife, I was married 35 years. She was a badly abused girl as a child which caused her to suffer from rejection, fear, suspicion, anger/rage and so many other negative feelings. She never got fully delivered until she, from the heart, forgave her father. Many times I had dealt with so many demons, but they kept coming back a day or so later. Yes, it was a battle with the “tormentors” which Jesus said would come on those who did not forgive. She was very sick with diabetes when she finally forgave him. She was watching a man of God on TV and followed his anointed prayer of forgiveness. She died 6 months from the effects of diabetes, but she had a clean heart. I hate to think where she would have gone if she had not forgiven. The Word is clear.</span></p><span data-dcnode-id="6839" instrument_node="">

ilent. Suddenly she became consious and started asking what had happened the past six hours since it was around 12. She doesnt even remember anything she was doing. All she remembered was dreaming of my ex whom i now believe she is into witchcraft. Fellow brethren praise be to God and Jesus.</span></p><span data-dcnode-id="6749" instrument_node="">

</span><p data-dcnode-id="5523"><span data-dcnode-id="5524" instrument_node="">The KJV term "possession" is a bad translation and has done an enormous amount of damage to the cause of Christ. It sets up a false dichotomy between those who have no evil spirits in them and those who are totally owned and controlled by them. Both extremes are actually quite rare in reality.</span></p><span data-dcnode-id="5522" instrument_node="">
</span><p data-dcnode-id="5520"><span data-dcnode-id="5521" instrument_node="">As I have said elsewhere, God gives people time to repent – even his own children. One of the reasons for this is that we are sometimes very slow to perceive spiritual truth.&nbsp;</span></p><span data-dcnode-id="5519" instrument_node="">
</span><p data-dcnode-id="5517"><span data-dcnode-id="5518" instrument_node="">A Christian can have areas of sin, ignorance and darkness in their lives which give room for evil spirits to work. The truth has not yet been brought to bear. These spirits were there before the person turned to Christ in most cases, and they are not automatically cast out or dissolved through an act of true faith in Christ concerning salvation. Of course, God CAN do this but it doesn't always happen immediately. Just as divine healing can take time, though it is promised, so with deliverance.</span></p><span data-dcnode-id="5516" instrument_node="">
</span><p data-dcnode-id="5514"><span data-dcnode-id="5515" instrument_node="">A true Christians will suppress the sinful tendencies but its far better to be delivered from them. There will be from time to time assaults on the mind but these are not the same as spirits occupying part of a person's inner life.</span></p><span data-dcnode-id="5513" instrument_node="">
</span><p data-dcnode-id="5511"><span data-dcnode-id="5512" instrument_node="">I know what I am talking about from personal experience. This is not just theory to me. I explain why this picture is consistent with the Biblical picture in other pages on this site. I hope the issues can be addressed on those pages, rather than on this page itself.</span></p><span data-dcnode-id="5510" instrument_node="">

</span><p data-dcnode-id="4781"><span data-dcnode-id="4782" instrument_node="">For each doubt, find a set of scriptures that specifically speaks the truth against them… write them down… post them… repeat them and speak them aloud (under your breath if need be) when the doubts surface in your mind.</span></p><span data-dcnode-id="4780" instrument_node="">
</span><p data-dcnode-id="4778"><span data-dcnode-id="4779" instrument_node="">"Draw near to God and he will draw near to you…. resist the devil and he will flee from you…."</span></p><span data-dcnode-id="4777" instrument_node="">

ces??? We have gone EVERYWHERE seeking helpin and nobody does them even though this is sooo biblical!! Please Christian brothers and sisters help! Those of you with strong discernment please pray on our behalf and ask God to reveal its hold. Bless you for helping us i need!!</span></p><span data-dcnode-id="4536" instrument_node="">

</span><img alt="gideonjr" class="avatar avatar-80 photo avatar-default" data-dcnode-id="4338" height="80" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/%3Fs%3D80%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/?s=160&amp;d=mm&amp;r=g 2x" width="80"><span data-dcnode-id="4337" instrument_node=""> </span></div><span data-dcnode-id="4335" instrument_node="">

</span><span class="fn" data-dcnode-id="4332"><span data-dcnode-id="4333" instrument_node="">gideonjr</span></span><span data-dcnode-id="4331" instrument_node=""> </span><span class="comment_date" data-dcnode-id="4329"><span data-dcnode-id="4330" instrument_node="">
on July 19, 2011 at 4:01 am </span></span><span data-dcnode-id="4328" instrument_node="">

</span><p data-dcnode-id="4320"><span data-dcnode-id="4323" instrument_node="">Hi,</span><br data-dcnode-id="4322"><span data-dcnode-id="4321" instrument_node="">
I’m so glad to have found a great resource about casting out demons and spiritual warfare in general! I want to share my experience and encourage others to seek help. </span></p><span data-dcnode-id="4319" instrument_node="">
</span><p data-dcnode-id="4317"><span data-dcnode-id="4318" instrument_node="">I’m 22 years old and I was tormented by evil spirits for months until I had the courage to talk to my pastor! I was born again in Christ my senior year of college. Before, I lived my life bounded by intellectualism, but always had deep curiosity if there was an afterlife. In my teen years I engaged in the ouija board looking for “proof” or “evidence” of the supernatural. Nothing ever really happened then. My last semester in school, through a very loving campus ministry, I gave my life to Christ and I’ve been humbled and blessed by His everlasting love.</span></p><span data-dcnode-id="4316" instrument_node="">
</span><p data-dcnode-id="4314"><span data-dcnode-id="4315" instrument_node="">I started having nightmares a few months after my water baptism. I would wake up at night and hear whispers. I was a very young believer and I didn’t know anything about spiritual warfare. I started doubting my sanity when I started seeing shadows. One time I remember hearing clearly a voice telling me to hurt people when I was taking the bus. I was so scared! I thought I was going schizophrenic. I was deeply embarrassed to share these experiences for fear of ridicule. These evil spirits started talking to me and telling me so many lies! They presented to me in my dreams and they looked like me! They told me repeatedly that I was not saved, that I was evil, that I should not go to church anymore, that there was no point. I started experiencing depression and missed several services for weeks.</span></p><span data-dcnode-id="4313" instrument_node="">
</span><p data-dcnode-id="4311"><span data-dcnode-id="4312" instrument_node="">One time I was hanging out with a friend and he shared his testimony. He described being attacked by demons. To my surprise, it was so similar to my experience that I decided to tell anyone for the first time what I was going through. One Sunday after church, I talked to my pastor and asked for prayer about this issue because it was really taking a toll on me. Something manifested that afternoon. While my pastor and another leader were praying, I got distracted by a demon who started cursing at my pastor. I could hear it loudly saying the F word. I told my pastor right away and he asked me to pray with him for myself. After that I don’t have a very clear memory of what happened. I fainted in front of the entire prayer team and other people that were still in the church. I vaguely remember feeling like I was drowning and I could hear the prayers of my pastor but I couldn’t control my body at all. I sensed that evil presence. Later people described the situation to me. They saw me groaning and shaking on the floor! My pastor rebuked the demon and cast it out and I regained conscious feeling so relaxed and happy. That same night I had a dream where I saw the demon that had been tormenting me and I was able to see it for how it really looked (grey/yellow pale, sick and malnourished with almost no hair) and I was able to rebuke it in my dreams.</span></p><span data-dcnode-id="4310" instrument_node="">
</span><p data-dcnode-id="4308"><span data-dcnode-id="4309" instrument_node="">Today I know many things I didn’t know back then. I opened a window of opportunity for demons to attack me because, even though I love Jesus with all my heart, there was still unbelief when it came to miraculous healing, or God’s supernatural powers(prophecy, tongues, etc) in general. I just didn’t believe it was real. There is no doubt today for me of God’s supernatural powers. It was easy for me to believe in the demons’ lies because I was not very versed in scripture. I easily fell for Satan’s tricks. Today, I know that nothing can come between Jesus and I. Rom 8:38-39 “For I am convinced that neither death nor life, neither angels nor demons,[a] neither the present nor the future, nor any powers, 39 neither height nor depth, nor anything else in all creation, will be able to separate us from the love of God that is in Christ Jesus our Lord.” </span></p><span data-dcnode-id="4307" instrument_node="">
</span><p data-dcnode-id="4305"><span data-dcnode-id="4306" instrument_node="">After this experience, I believe God has anointed me with His spiritual gifts to serve other people. My heart breaks when I read the comments in this section of people and their relatives hurting because of evil spirits. I have experienced that same depression that many describe here. The first lie that Satan uses is making you believe that God has abandoned you. He will trick you into sin! Since being freed from demons, I’m able to sense the presence of evil spirits and demons strongly.(If you are able to see and hear things, don’t take it as a sign that you are being attacked. It’s likely that you have a gift of discernment of spirits. Just pray and rebuke them) He has also gifted me with the ability to received images and clues about people in spiritual trouble. I would love to pray for the deliverance of anyone who needs help. God wants to heal your heart today!</span></p><span data-dcnode-id="4304" instrument_node="">
</span><p data-dcnode-id="4302"><span data-dcnode-id="4303" instrument_node="">A few things I want to clarify that I read in the comments section:</span></p><span data-dcnode-id="4301" instrument_node="">
</span><p data-dcnode-id="4275"><span data-dcnode-id="4300" instrument_node="">-There is no such thing as friendly spirits. All “familiar” spirits are demons pretending to be relatives/friends. Don’t be deceived, they could drive you towards the occult.</span><br data-dcnode-id="4299"><span data-dcnode-id="4298" instrument_node="">
-There is so much power in the name of Jesus Christ. Demons will tremble! Acts 4 12 “Salvation is found in no one else, for there is no other name under heaven given to mankind by which we must be saved.”</span><br data-dcnode-id="4297"><span data-dcnode-id="4296" instrument_node="">
-Fellowship and confession. If you are experiencing an attack, don’t drive yourself to seclusion. Instead seek fellowship. Seek a personal mentor and confess any recurring sin. Remember that your sin can never be too great for God to deal with. Satan will try to lie and say that your sin cannot be forgiven. He will stop you from seeking help from your brothers and sisters. Ecclesiastes 4 “Two are better than one,</span><br data-dcnode-id="4295"><span data-dcnode-id="4294" instrument_node="">
because they have a good return for their labor:</span><br data-dcnode-id="4293"><span data-dcnode-id="4292" instrument_node="">
10 If either of them falls down,</span><br data-dcnode-id="4291"><span data-dcnode-id="4290" instrument_node="">
one can help the other up.</span><br data-dcnode-id="4289"><span data-dcnode-id="4288" instrument_node="">
But pity anyone who falls</span><br data-dcnode-id="4287"><span data-dcnode-id="4286" instrument_node="">
and has no one to help them up.</span><br data-dcnode-id="4285"><span data-dcnode-id="4284" instrument_node="">
11 Also, if two lie down together, they will keep warm.</span><br data-dcnode-id="4283"><span data-dcnode-id="4282" instrument_node="">
But how can one keep warm alone?</span><br data-dcnode-id="4281"><span data-dcnode-id="4280" instrument_node="">
12 Though one may be overpowered,</span><br data-dcnode-id="4279"><span data-dcnode-id="4278" instrument_node="">
two can defend themselves.</span><br data-dcnode-id="4277"><span data-dcnode-id="4276" instrument_node="">
A cord of three strands is not quickly broken.” </span></p><span data-dcnode-id="4274" instrument_node="">
</span><p data-dcnode-id="4272"><span data-dcnode-id="4273" instrument_node="">Finally, I just want to pray for everyone here looking for help. I pray for God’s Holy Spirit to overflow you with His love and grace. I want to pray that you completely understand the meaning of Christ Jesus dying in the cross for you. He has made a way for us to be with our Father. Our Father is the everlasting God! Nothing in the universe compares to Him. God is so much greater than any sin and no one can interpose between you and God. I want to pray that you will be surrounded by a faithful community that will help you through this experience. I rebuke all evil spirits(unbelief, fear, lust, depression) in the name of Jesus Christ.</span></p><span data-dcnode-id="4271" instrument_node="">
</span><p data-dcnode-id="4269"><span data-dcnode-id="4270" instrument_node="">Blessings,</span></p><span data-dcnode-id="4268" instrument_node="">
</span><p data-dcnode-id="4266"><span data-dcnode-id="4267" instrument_node="">JJ</span></p><span data-dcnode-id="4265" instrument_node="">

</span><p data-dcnode-id="4173"><span data-dcnode-id="4174" instrument_node="">Thank you Michael for a great web site.</span></p><span data-dcnode-id="4172" instrument_node="">
</span><p data-dcnode-id="4170"><span data-dcnode-id="4171" instrument_node="">Everyone revealing their war stories with the enemy is a start to finding peace with God. There has also been some very good responses by our fellow believers in Jesus to help combat the enemy.</span></p><span data-dcnode-id="4169" instrument_node="">
</span><p data-dcnode-id="4167"><span data-dcnode-id="4168" instrument_node="">Evil will always come against what is good and try to destroy it. 1 Peter 5:8. </span></p><span data-dcnode-id="4166" instrument_node="">
</span><p data-dcnode-id="4164"><span data-dcnode-id="4165" instrument_node="">“The Christian life is a Faith life” 1 Peter 5:5-7 – Faith is a gift from God. Romans 10:17. </span></p><span data-dcnode-id="4163" instrument_node="">
</span><p data-dcnode-id="4147"><span data-dcnode-id="4162" instrument_node="">1. We are saved by Faith</span><br data-dcnode-id="4161"><span data-dcnode-id="4160" instrument_node="">
2. Faith helps us to steadfastly resist our adversary the Devil</span><br data-dcnode-id="4159"><span data-dcnode-id="4158" instrument_node="">
3. We live by Faith</span><br data-dcnode-id="4157"><span data-dcnode-id="4156" instrument_node="">
4. We walk by Faith</span><br data-dcnode-id="4155"><span data-dcnode-id="4154" instrument_node="">
5. Faith moves mountains in our lives</span><br data-dcnode-id="4153"><span data-dcnode-id="4152" instrument_node="">
6. Faith builds us up</span><br data-dcnode-id="4151"><span data-dcnode-id="4150" instrument_node="">
7. Faith quenches all the fiery darts of the wicked</span><br data-dcnode-id="4149"><span data-dcnode-id="4148" instrument_node="">
8. Faith helps us overcome the world</span></p><span data-dcnode-id="4146" instrument_node="">
</span><p data-dcnode-id="4144"><span data-dcnode-id="4145" instrument_node="">The Christian Faith is believing that God exists and that he rewards those who diligently seeks him, Hebrews 11:6. Faith keeps a Christian saved by the power of God and ready for Heaven anytime. And that our Faith will be tested many times and in many ways, but is more precious then gold that perishes. 1 Peter 1:5-9. Now Faith is the substance of things hoped for, the evidence of things not seen, Hebrews 11:1. Also, Faith without works is dead. James 2:14-26.</span></p><span data-dcnode-id="4143" instrument_node="">
</span><p data-dcnode-id="4141"><span data-dcnode-id="4142" instrument_node="">Faith in God is a powerful weapon to defeat the Devil and his fallen angels. Like Michael has mentioned, the best way to combat Demons from over powering a loved one is to, seek Jesus and all his glory, and to use the word of God like Jesus did when he was tempted by the Devil for 40 days. “It is written” Jesus spoke to the Devil. I like to remind the Devil of his ultimate eternal outcome and he for sure flees. Singing songs of Trinity praise will also stop a Demon in his tracks. </span></p><span data-dcnode-id="4140" instrument_node="">
</span><p data-dcnode-id="4138"><span data-dcnode-id="4139" instrument_node="">There are levels of power evil spirits possess. There’s a chief Demon and lower Demons, when we stifle the lead Demon with our faith in God, all the rest of the evil spirits will submit to the power of [Jesus Christ] who holds all power over evil spirits, James 2:19. </span></p><span data-dcnode-id="4137" instrument_node="">
</span><p data-dcnode-id="4135"><span data-dcnode-id="4136" instrument_node="">I’m going to pray for everyone in this thread and I hope to bring more of the word of God to lift-up those people who are going through a time of trouble concerning the Kingdom of God. To the people seeking Salvation from Jesus, just pray this prayer out loud: </span></p><span data-dcnode-id="4134" instrument_node="">
</span><p data-dcnode-id="4130"><span data-dcnode-id="4133" instrument_node="">Jesus, I’m a sinner and have made mistakes in my life that I’m sorry for, I ask this second that you come into my heart and be my Lord and Savior. Wash my sins clean Jesus with your shed blood from Calvary’s cross and give me the assurance of salvation in your Holy name I ask and pray, amen.</span><br data-dcnode-id="4132"><span data-dcnode-id="4131" instrument_node="">
—————————————————-</span></p><span data-dcnode-id="4129" instrument_node="">
</span><p data-dcnode-id="4127"><span data-dcnode-id="4128" instrument_node="">My Prayer for the people struggling with God:</span></p><span data-dcnode-id="4126" instrument_node="">
</span><p data-dcnode-id="4124"><span data-dcnode-id="4125" instrument_node="">Dear Heavenly father, I pray that you deliver these lost souls into your hands and save them from their fears of the enemy. Father, give them a sound mind and a measure of Faith to diligently seek you and your Grace, in Jesus name I pray, amen. </span></p><span data-dcnode-id="4123" instrument_node="">
</span><p data-dcnode-id="4121"><span data-dcnode-id="4122" instrument_node="">May God bless you all!</span></p><span data-dcnode-id="4120" instrument_node="">
</span><p data-dcnode-id="4118"><span data-dcnode-id="4119" instrument_node="">Richard C.</span></p><span data-dcnode-id="4117" instrument_node="">

</span><p data-dcnode-id="4089"><span data-dcnode-id="4090" instrument_node="">My comments were geared more to a deliverance ministry and many who would consider it aggresivly…</span></p><span data-dcnode-id="4088" instrument_node="">
</span><p data-dcnode-id="4086"><span data-dcnode-id="4087" instrument_node="">I also speak from a rather personal and devestating experiance in my life where I did go into a situation with good intentions but soon got lost because I felt a covering of Grace was all I needed. Took me quite some time before I could even really pull my life together again.</span></p><span data-dcnode-id="4085" instrument_node="">
</span><p data-dcnode-id="4083"><span data-dcnode-id="4084" instrument_node="">I don’t disagree with you, every active Child of God will encounter supernatural resistance. Yet the greater we grow the more we succumb to the rational that we rely more and more on our Lord and the Holy Spirit.</span></p><span data-dcnode-id="4082" instrument_node="">
</span><p data-dcnode-id="4080"><span data-dcnode-id="4081" instrument_node="">The Disciples who were sent out 2 by 2 also encountered the one that Jesus could only pull free (One who is Fasting and in Prayer).</span></p><span data-dcnode-id="4079" instrument_node="">
</span><p data-dcnode-id="4077"><span data-dcnode-id="4078" instrument_node="">Satan does have Teeth – I have scars. I know Pastors who have no clue how to handle certain situations like these. Too many I’m afraid.</span></p><span data-dcnode-id="4076" instrument_node="">
</span><p data-dcnode-id="4074"><span data-dcnode-id="4075" instrument_node="">But like any other ministry – It’s God who leads us through and into and past. It is indeed a faith walk.</span></p><span data-dcnode-id="4073" instrument_node="">

</span><p data-dcnode-id="4045"><span data-dcnode-id="4046" instrument_node="">
Jesus only ministered for presumably 3 1/2 years. He called his disciples and sent them out to cast out devils while preaching the Kingdom of God. They did not need "a few years of committed faith." They simply needed to believe. The question is, are we believing in ourselves and our 'righteousness' or whatever it is we are proud of, or are we truly believing in the name of Jesus Christ?</span></p><span data-dcnode-id="4044" instrument_node="">
</span><p data-dcnode-id="4042"><span data-dcnode-id="4043" instrument_node="">
I agree, there are many that go about these things the wrong way. I think it is a matter of faith, not time, that gives us authority. If I were pulled over by a police officer for speeding and said, "oh, this is your first day on the job? I'm outta here!" and sped off, I would still have the entirety of the police force standing behind that man or woman to apprehend me.</span></p><span data-dcnode-id="4041" instrument_node="">
</span><p data-dcnode-id="4039"><span data-dcnode-id="4040" instrument_node="">
I address this, because I think it is important that new believers know they are equipped. They may need to operate in it a few years before they mature in how the Lord would ultimately use them, but we start where we are, or we never get where we are going.</span></p><span data-dcnode-id="4038" instrument_node="">

on January 1, 2011 at 2:53 pm </span></span><span data-dcnode-id="3911" instrument_node="">

</span><p data-dcnode-id="3905"><span data-dcnode-id="3906" instrument_node="">My grandmother has recently become extremely ill and we have noticed a significant change in her behavior in regards to her anger and her attitude towards her family. There are times when she is her old self, loving, kind and sweet, however there are other times when she is very mean, and trys to punch, bite, pinch and a host of other things while we are attempting to care for her. She began needing 100% assistance with everything. Around this time she began to see and talk with various dead family members. While I know that many people report seeing these type of spirits before passing, they never seemed to have a calming effect on her like how others describe. She always seemed to be more in an uproar. She began to lose faith in the fact that God is able to heal her and she started to exhibit signs of what I consider depression and would lash out the people who loved her and tried to help her. Telling us that these dead people were the only ones who cared for her and wanted to help her. One night in the wee hours of the morning she informed my aunt that “They just won’t leave me alone” and that “they were over there”. This really alerted us to the possibility of evil spirits harrassing her.</span></p><span data-dcnode-id="3904" instrument_node="">
</span><p data-dcnode-id="3902"><span data-dcnode-id="3903" instrument_node="">As a child I’ve always had dreams and strange events happen to me where I had to battle evil spirits in my sleep. I would always call on God and he would fight these spirits for me and protect me. I would rebuke them and call on the name of Jesus and he would protect me. Well the other night when she had been behaving especially bad, when it was just I and her in the room, I rebuked the evil spirit that I thought may be in her body and I cast them out in the name of Jesus. I noticed that she seemed to become more relaxed and seemed to be at peace. My aunt said that later that night she heard her make a loud grunt, that sounded like she was fighting something or someone. At the exact same time while I laid on the couch by her bedside I had another one of my strange “events” happen to me. A tall male spirit walked up to where I was laying; I believe I was in a state somewhere between sleep and awake. I recognized the spirit as not being a friendly one because he did not give me a good vibe, he gave me the same vibe I felt when I had to battle other spirits. This part within itself is not strange because I have had what I take to be evil spirits stand over me before and I would just begin to call of the name of the Lord and they would have not power over me and be unable to overtake me. However this experience was different in that when I looked past the man I saw a group of similiar looking spirits standing further back. Each giving off the same evil vibes and just looking at me and the 1st spirit. The spirit standing over me said nothing and began to lay on top of my body almost as if he was trying to enter me; this is something else I have never had happen to me. At that moment I began to shake uncontrollably and began to scream. I may have only been screaming in my head because no one in the room heard me. I then went into a place of darkness and I once again began to call on the name of the Lord, and receiting the apostle’s creed over and over again. I don’t recall seeing the spirit leave my body however, I know there was a battle for a little while, while I was continously receited the creed. I later fell into a deep sleep and felt my whole body be exhausted.</span></p><span data-dcnode-id="3901" instrument_node="">
</span><p data-dcnode-id="3899"><span data-dcnode-id="3900" instrument_node="">I believe that these spirits were the spirits inside my grandmother that I casted out trying to get into my body. I don’t believe I have been taken over, however I spent some time in my prayer closet, repenting and crying unto the Lord for protection to ensure that they hadn’t overtaken me. My grandmother had a great day that day. She was back to her normal self and was happy and began to do things we had not seen her do since she became extremely ill. She appeared to be alot better.</span></p><span data-dcnode-id="3898" instrument_node="">
</span><p data-dcnode-id="3896"><span data-dcnode-id="3897" instrument_node="">However, about nightfall I saw a shadow walk past my living room window on the outside and a few minutes later my brother arrived and I opened the door for him to enter. At that time, my grandmother said “Lucille, where have you been”; the most prominent dead person’s name she has been calling. When we informed her that Lucille was no longer here and that she wasn’t welcomed if she was, she got the old angered look on her face and snapped at us and told us she wasn’t there. After that she began to behave as she had prior to me rebuking the spirit. I went back into my prayer closet and began to read, research, and pray. </span></p><span data-dcnode-id="3895" instrument_node="">
</span><p data-dcnode-id="3893"><span data-dcnode-id="3894" instrument_node="">I also prayed over some oil that I later used to wipe across my doorways for protection. We have prayed with her, we had her recite the sinner’s prayer, confessing her sins, we even had communion with her with bread and wine that had been blessed. This all seems to bring her peace and the spirits seem to leave her for a while, but they always seem to come back. My question is how do we pray the demons out and the demons stay gone? They seem to leave but always come back. Also how do we cleanse our home of these spirits so they are unable to dwell there at all? We don’t have any strong prayer warriors in our area, it seems that all of the ones we knew have died. Any assistance you can offer will be greatly appreciated.</span></p><span data-dcnode-id="3892" instrument_node="">

</span><p data-dcnode-id="3861"><span data-dcnode-id="3862" instrument_node="">To often we read and hear about naming spirits and Bindings and Losings, all that stuff… Presumably everyone who claims to be an expert seems to be so off and lost the simplicity of the Word/Scripture and the reliance on the Holy Spirit.</span></p><span data-dcnode-id="3860" instrument_node="">

</span><p data-dcnode-id="2796"><span data-dcnode-id="2797" instrument_node="">I am not much on replying to anyone or chatting in chat rooms, really don’t see the point in anymore wasted time or breath. I am very blunt. I have been through more hell than a human should be aloud to go through in only 5 short years and i am only 32. I am not here to give you my life story but wanted to share a little bit of back ground. i don’t recall the day i was saved, believed in the name Jesus Christ the very first time it hit my ears as a child and have been anointed ever since. Anointed, not sinless lol meaning i knew God but i didn’t understand at that time how He fit in my day to day life. ten years ago, i was married, still nieve, never been to church regular and at that time God started a great work in me. It was then that i walked so easily, blindly faithfuly by his side for nearly two straight years, having burdens for people wanting to help them but just could not relate to them, well, now i can. I was filled with the holy spirit, given the gift of decernment, forgiveness, unconditional love for others and a whole bunch of other things, namely recieving visions and messages for other give to others. i never know when i wil recievce a message to give to someone but when i get one, i scramble to get it out to the person because it consumes me whelling up like a backed up like an overflowing gushing river. I may go a whole year and have no messages but there have been times ive had ten in one week for ten different people not knowing any of them so rest assured, this is not something i have chose, but what god has chosen for me and ive accepted. In your case, God spoke very clearly and yes, can feel your desperation, but there is still hope and Gods message was very clear to me, While reading your story, first i felt a very desperate lonely, almost wait, not almost hopeless but actually hopeless feeling overwhelm me. then came the visions. God immediatly let me know how He felt about some of the messages that replied back to you, He was ANGRY! First, He wants you to know that He has never left you, that He loves you dearly and that YOU ARE HIS and to Quit letting others make you doubt. Read the book of job, it clearly wasn’t his sins that caused all the bad things to happen to him but his obedience and though Job at the time could not get an answer from God and give an answer to his friends because he had no idea why things where suddenly horrible in his life, but he held on to his faith. God immediatly called to my rememberance a few years back i asked him why some prayers went unanswered why others seemed to have a diredt link to heaven, like their own special phone that no one else could use and God seemed to move in every aspect of their lives, God relpied with a vision and very intense emotions to expain the vision. it was a dreary cloudy back drop, as far as i could see, there were people weeping and crying, on their knees, some with prayer beads, some with the bible, some at the foot of an altar, but all were moaning and cryinhg, practicaly begging for whatever it was they were needing. Then God showed me wrists crossed with a roped tieing them together, and i felt a terrible sorrow, though God could hear their prayers and wanted desperatly to help them, he said I CAN’T. I said, lord, i don’t understand. He said, they have tied my hands with disbelief. None of them are praying, believing. But ALL of them are praying in desperation. God said, I do not move on emotions. I move ONLY on faith alone. If there is the smallest doubt, it will show and i cannot help them. I cannot help them just because they feel sad, or they feel scared. They have to believe that i AM and if they truley know that, then they will have the faith and their faith will comfort them knowing i will bring to pass what they ask, You have not because you ask not, not because oh maybe he will hear you! He says, You either believe or you don’t so which is it gonna be? He says you are being tossed to and fro like a kite caught up in the breeze or a boat tossed from wave to wave during a storm. Thou shalt noit be moved!!!!!!!! He says there is no need to doubting enough for you and even his children are not giving you direction out of their own faith, but out of your own word they read. That is what angered him. He wants you to know that He is right there in the battle with you, that you are not alone and that He Loves you so much more than you could imagine. and everyone else that wrote to you. Take this for what its worth please. I am only the messenger. God always puts his stamp or seal on my messages or i would not have the courage to even tread on that ground. its taken me ten years to accept my gift and learn to use it wisely, its up to you whether you use it.. May God lead you in every step of this very lonely scary place but He wants you to know that you already have the power. The only way that satan can stop you from using it is through fear or disbelief. i will keep you in my mind all day and night until you recieve this message, God be with you and may He use your life to save anothers. be strong and have peace. you will see through till the end and beyond! tdbaker</span></p><span data-dcnode-id="2795" instrument_node="">

</span><p data-dcnode-id="2738"><span data-dcnode-id="2739" instrument_node="">You are not alone. Even in your darkest hour God, in the name of Jesus, had been and has been there for you. You need to accept God, thru Jesus, only because you feel in your heart it is the right thing to do, and not because of desperation to cast away demons. </span></p><span data-dcnode-id="2737" instrument_node="">
</span><p data-dcnode-id="2735"><span data-dcnode-id="2736" instrument_node="">a lot of people would go through a lot of religious ceremonies casting out demons, but lacking out one IMPORTANT thing, and that is FAITH. If you truly accepted God through Jesus Christ, you can cast away all demons. </span></p><span data-dcnode-id="2734" instrument_node="">
</span><p data-dcnode-id="2732"><span data-dcnode-id="2733" instrument_node="">Go to a church, and pray. Cry out to God thru Jesus that you want to be a new woman. Ask God to cleanse you. Ask God thru Jesus to reside in your heart. CRY OUT LOUD TO THE LORD, AND TELL GOD WHAT YOU REALLY FEEL. Just cry out to God in the name of Jesus that all demons be cast away forever. Promise God you will not go back to your old sinful life. That you will be His servant until your last breath.</span></p><span data-dcnode-id="2731" instrument_node="">
</span><p data-dcnode-id="2729"><span data-dcnode-id="2730" instrument_node="">HAVE FAITH IN GOD, THROUGH JESUS CHRIST, AND EVERYTHING WILL BE ALRIGHT!</span></p><span data-dcnode-id="2728" instrument_node="">

</span><p data-dcnode-id="2698"><span data-dcnode-id="2701" instrument_node="">In order for delieverance to be effective and the power of the Lord to work, you must first have a repentant heart! Whatever the sins that you did are between God and you, but if you want to have someone pray for you then find a member of the church to whom you can confess you sins and then you begin to move towards deliverance. I responded to this because of the statement you made about feeling the urge to cough? It is true, that demons come out of the body in this manner, through the mouth and by my experiences is been a cough that brings them out. This is because you are either repentant and crying and saying the word, or you are strong in the Lord and know that they have no right to remain when you have repented to God for the sins committed. I find that God will not be mocked, meaning you cant come to him then turn away in the future because you are clean! I did this and I had to deal with the demons all over again. So I suggest that you make it up in your mind to stay with the Lord, and learn how to live you life for him. This is the hard part, because no one can really TELL you how to live, you must learn it for yourself.</span><br data-dcnode-id="2700"><span data-dcnode-id="2699" instrument_node="">
REPENT and be baptized! Peter said this in the Book of Acts. No repentance, no results. And repentance is made evident by your words! As you draw closer to the Lord, the demons are being loosed from your body. First of all, you must pray and see if demons are really inside you. Its not hard to get them, but its not like everyone has them. To get a demon and to expel it only bring glory to God, so for me I believe that I got the demons, but to be delivered of them makes me able to help someone else. So research and pray, and REPENT!</span></p><span data-dcnode-id="2697" instrument_node="">

</span><p data-dcnode-id="2669"><span data-dcnode-id="2670" instrument_node="">Delieverance is something that creates a very vivid spiritual battle between the believer and the demon realm. I have researched and also with my own experiences come to learn that the most effective way to maintain deliverance is for the believer to become empowered with the holy spirit and the power of the Lord, to do it for themselves. This is not a simple task, because it requires alot of faith and a strong mind for what you may come up against. Visions, dreams and voices are not to be discounted because this is what spiritual battles are all about. Since it is a world that generally does not believe in the Lord, and spiritual battles, the person who is under attack will sadly be alone in this matter unless they find some people to whom they can relate. Often alot of people going through a spiritual experience are diagnosed as Schizophrenics or some other medical term, but this should never be something that the true christian puts ther faith in.</span></p><span data-dcnode-id="2668" instrument_node="">
</span><p data-dcnode-id="2666"><span data-dcnode-id="2667" instrument_node="">For self deliverance, one must pray and do research themselves, and they MUST seek to chang their lives! For me, I spent alot of time reading books by reputable authors, listening to bible radio stations and alot of weeping and crying out to God. Now I am a sought after soul because I casted out demons of myself through the power of the Lord! So if you want to be delievered, know that your delieverance is your responsibility! They WILL COME BACK, because they want to have their house back. Their objective is simple; To keep you from the heavenly realm through sin, and to steer you away in any manner possible. May God be with you</span></p><span data-dcnode-id="2665" instrument_node="">

</span><p data-dcnode-id="2453"><span data-dcnode-id="2454" instrument_node="">Thank-you Tim. I do not practice the occult. I have never been involved with any Satanic sect. I consider myself a spiritual person. I do not attend any church regularly over the years, but I like and respect all kinds of churches whether they are Catholic, Pentecostal, Baptist, Evangelical, etc. I cannot tell you how many days and nights I have been contemplating how this could happen to me. The only thing is that I had an ex-girlfriend from over five years ago and the relationship ended. She believed in the church and Christ, but she was raised by only a stepmother who was an emotional torment to her according to what she told me. She did find her relationship with me to be a kind of refuge, but that is just normal when someone is unhappy and then they discover a bit of happiness in a new relationship as far as I am concerned. </span></p><span data-dcnode-id="2452" instrument_node="">
</span><p data-dcnode-id="2450"><span data-dcnode-id="2451" instrument_node="">The stepmother was against her relationship with me in one sense because I promoted her independence away from the stepmother since she was unhappy living with her. I did at one point question her about whether her stepmother dabbled in the occult, because I suffered with some nightmares during my relationship with her, and the nightmares were pretty well about me being repeatedly choked by something. I asked my ex-girlfriend whether her stepmother dabbled in the occult, but neither did she deny it and neither did she get into a discussion with me about it. I did spend time in prayer back then and the nightmares ended completely. I later on ended our relationship and moved on wishing her the best. She did talk to me a year later after our relationship ended and she had moved out on her own, had a good job she liked, and also had a new boyfriend. Her and I never stayed in touch and it has been over four years since I last talked to her. </span></p><span data-dcnode-id="2449" instrument_node="">
</span><p data-dcnode-id="2447"><span data-dcnode-id="2448" instrument_node="">Have other things gone wrong around my life since our relationship ended. I would say yes, but I just looked at such things as their being good and bad times in anyone’s life, not that I have been suffering with, or even being pursued by something evil. Today for me is Sunday about 11:20 am. I am heading down to one church in the afternoon where I discovered they have a prayer request box I have been writing out the requests and dropping them in the box. I literally walked into another church off the street to explain my situation to a priest, but he just wanted to comfort me as if I was just having a bad period in my life, stressed out, but quite skeptical about the idea that people can be possessed. His reaction to me just left me shaking my head in astonishment and I walked out of the church. </span></p><span data-dcnode-id="2446" instrument_node="">
</span><p data-dcnode-id="2444"><span data-dcnode-id="2445" instrument_node="">I am reading various psalms everyday now Tim, praying everyday, and I am also now reading the section here on Spiritual Warfare. I repeatedly command the Voices speaking to and tormenting me cast out in the name of Jesus Christ. Thank-you again Tim for your reply and your prayers. Wayne. </span></p><span data-dcnode-id="2443" instrument_node="">

</span><span class="fn" data-dcnode-id="2311"><span data-dcnode-id="2312" instrument_node="">Wayne77</span></span><span data-dcnode-id="2310" instrument_node=""> </span><span class="comment_date" data-dcnode-id="2308"><span data-dcnode-id="2309" instrument_node="">
