</span><h1 data-dcnode-id="460" data-quickedit="title" id="page-title"><span data-dcnode-id="461" instrument_node="">Desmond Doss - Thou Shalt Not Kill</span></h1><span data-dcnode-id="459" instrument_node="">
</span><h3 class="page-author" data-dcnode-id="451"><span data-dcnode-id="458" instrument_node="">
by </span><span data-dcnode-id="456" data-quickedit="pta4"><span data-dcnode-id="457" instrument_node="">Jenna Vargas</span></span><span data-dcnode-id="455" instrument_node="">
from </span><span data-dcnode-id="453" data-quickedit="pta6"><span data-dcnode-id="454" instrument_node="">San Diego, California in United States</span></span><span data-dcnode-id="452" instrument_node="">
</span></h3><span data-dcnode-id="450" instrument_node="">
</span><div class="page-quotation" data-dcnode-id="442" data-quickedit="pta2"><span data-dcnode-id="449" instrument_node="">
</span><p data-dcnode-id="447"><span data-dcnode-id="448" instrument_node="">" Dear Lord, please let me get just one more..."</span></p><span data-dcnode-id="446" instrument_node="">
</span><p data-dcnode-id="444"><span data-dcnode-id="445" instrument_node="">"I don't know how I'm going to live with myself if I don't stay true to what I believe in.."</span></p><span data-dcnode-id="443" instrument_node="">
</span></div><span data-dcnode-id="441" instrument_node="">
</span><div class="full-description" data-dcnode-id="333" data-quickedit="fulldescription" itemprop="description"><span data-dcnode-id="440" instrument_node="">
</span><p class="" data-dcnode-id="433"><span class="image-wrapper center-align" data-dcnode-id="434" style="width: 34%"><img alt="121077" class="img-responsive" data-dcnode-id="439" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//myhero.com/content/images/thumbs/0121077_desmond-doss-thou-shalt-not-kill.jpeg&amp;raw" style="width: 100%"><span class="caption" data-dcnode-id="437"><span data-dcnode-id="438" instrument_node="">Desmond Doss</span></span><span class="credit" data-dcnode-id="435"><span data-dcnode-id="436" instrument_node="">Newsadvance.com</span></span></span></p><span data-dcnode-id="432" instrument_node="">
</span><p class="" data-dcnode-id="430" dir="ltr"><span data-dcnode-id="431" instrument_node="">On the battlelines of Hacksaw Ridge, in Okinawa, Japan, soldiers were prepared to face the cold, noxious clasp of death. Desmond Doss, one particularly brave soldier, displayed his immense strength by single-handedly saving seventy-five wounded soldiers while under enemy fire. In 1942, Doss had enlisted into the United States Army and spent his time preparing to serve as an army combat medic. Desmond’s life had been a difficult one, to say the least. As a young child, he was subject to severe domestic abuse, which was believed to have been the root to his hatred of artillery. Despite the abuse, Doss had grown up in a very religious household and the Ten Commandments were a constant in his life. The Sixth Commandment always caught his eye: Thou shalt not kill. It depicted the biblical story of Cain and Abel. As he would see the grim photo of Cain killing his brother Abel, young Doss would question how one could commit such a horrific act towards another. From that day onward, Desmond Doss refused to ever lay a hand on a weapon. When enrolled into the army as a conscientious objector, Desmond had believed that he would not need to be carrying a gun due to his status, yet to his surprise, he was immediately sent to an infantry rifle company. Due to his opposition to violence and religious beliefs, he was victim to gruesome abuse from his associates and was even forced to see a psychologist to check his mental stability. Despite their cruelty, Doss was always free of loathing, “Things began turning around when the men discovered that this quiet unassuming medic had a way to heal the blisters on their march-weary feet. And if someone fainted from heat stroke, this medic was at his side, offering his own canteen. Desmond never held a grudge. With kindness and gentle courtesy, he treated those who had mistreated him,” (“Desmond Doss: The Real Story”). There was never a time where he had not followed his golden rule, “...do to others what you would have them do to you...” &nbsp;(Matthew 7:12). Without fear, Doss had put others first and was prepared to sacrifice himself to protect the lives of others. Desmond Doss’ altruistic and courageous ideals prove him to be a hero.</span></p><span data-dcnode-id="429" instrument_node="">
</span><p class="" data-dcnode-id="416"><span class="image-wrapper float-right" data-dcnode-id="423" style="width: 19%"><img alt="121091" class="img-responsive" data-dcnode-id="428" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//myhero.com/content/images/thumbs/0121091_desmond-doss-thou-shalt-not-kill.jpeg&amp;raw" style="width: 100%"><span class="caption" data-dcnode-id="426"><span data-dcnode-id="427" instrument_node="">Desmond Doss</span></span><span class="credit" data-dcnode-id="424"><span data-dcnode-id="425" instrument_node="">br.pinterest.com</span></span></span><span class="image-wrapper float-left" data-dcnode-id="417" style="width: 32%"><img alt="121078" class="img-responsive" data-dcnode-id="422" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//myhero.com/content/images/thumbs/0121078_desmond-doss-thou-shalt-not-kill.jpeg&amp;raw" style="width: 100%"><span class="caption" data-dcnode-id="420"><span data-dcnode-id="421" instrument_node="">Desmond Doss</span></span><span class="credit" data-dcnode-id="418"><span data-dcnode-id="419" instrument_node="">Desmonddoss.com</span></span></span></p><span data-dcnode-id="415" instrument_node="">
</span><p class="" data-dcnode-id="413" dir="ltr"><span data-dcnode-id="414" instrument_node="">Doss had conveyed his altruistic sense through his actions in saving others. When he had offered his support, he had repeatedly done so with a target at his back. He had never once considered his own safety, which many say is foolish. However, his courage had the power to save a multitude of people. “He repeatedly ran into the heat of battle to treat a fallen comrade and carry him back to safety. All this, while enemy bullets whizzed past and mortar shells exploded around him. Several times, while treating a wounded soldier, Desmond was so close to enemy lines, he could hear the whispering of Japanese voices,” (“Desmond Doss: The Real Story”). Doss had enrolled in the military during the crisis of Pearl Harbor. From there, it had branched off to something more intense; the beginning of World War II. America and Japan were at each other's throats, and the power that both sides beheld was suffocating. Yet, despite all the odds, Desmond had looked into the eyes of fear and had shaken his hand. His exclusion to fear had enabled him to defend with great force and expel robust strength. As he rushed into battle, Doss had pinpointed out the injured soldiers and had ran to their aid. Those who had been unthankful, or had doubted his ability, he had too, done them well. He even helped save and protect injured Japanese. Doss never saw an enemy, he never understood the concept, he only saw each person injured in need of his help. They saw him as a liability and had not believed in his capabilities from the beginning. Yet, Desmond had proven them all wrong. After he had treated his fellow warriors, he still had yet to bring them to complete safety. To do so, he had been versatile in his tactics to move fast and quietly. “ After the company had secured the top of the cliff, the Americans were stunned when suddenly enemy forces rushed them in a vicious counterattack...Soldiers rushed to climb back down the steep cliff...Less than one third of the men made it back down. The rest lay wounded, scattered across enemy soil—abandoned and left for dead, if they weren't already. One lone soldier disobeyed orders and charged back into the fire fight to rescue as many of his men as he could, before he either collapsed or died trying. His iron determination and unflagging courage resulted in at least 75 lives saved that day, May 5, 1945, his Sabbath.” (“Desmond Doss: The Real Story”). Doss used pure will power to save those men that glorious day. “Over the span of several hours, Doss treated the injured and, one by one, dragged them to the edge of the cliff and lowered them to safety in a rope sling. After each successful delivery, he reportedly said, ‘Dear God, let me get just one more man.’ By nightfall, he had rescued 75 soldiers, including many of the men who had berated him earlier in his military career,” (“Desmond Doss: The Unlikely Hero Behind ‘Hacksaw Ridge’”). Despite the cruelty he had received, he did not discriminate and thought each inpidual was worth saving. Doss had harnessed his will and the spirit of God to give him the power to save so many; he was a force to be reckoned with.</span></p><span data-dcnode-id="412" instrument_node="">
</span><p class="" data-dcnode-id="399"><span class="image-wrapper float-left" data-dcnode-id="406" style="width: 19%"><img alt="121089" class="img-responsive" data-dcnode-id="411" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//myhero.com/content/images/thumbs/0121089_desmond-doss-thou-shalt-not-kill.jpeg&amp;raw" style="width: 100%"><span class="caption" data-dcnode-id="409"><span data-dcnode-id="410" instrument_node="">Doss in the army</span></span><span class="credit" data-dcnode-id="407"><span data-dcnode-id="408" instrument_node="">Desmonddoss.com</span></span></span><span class="image-wrapper float-right" data-dcnode-id="400" style="width: 36%"><img alt="121084" class="img-responsive" data-dcnode-id="405" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//myhero.com/content/images/thumbs/0121084_desmond-doss-thou-shalt-not-kill.jpeg&amp;raw" style="width: 100%"><span class="caption" data-dcnode-id="403"><span data-dcnode-id="404" instrument_node="">Desmond recovering after getting shot</span></span><span class="credit" data-dcnode-id="401"><span data-dcnode-id="402" instrument_node="">pilotonline.com</span></span></span></p><span data-dcnode-id="398" instrument_node="">
</span><p class="" data-dcnode-id="396" dir="ltr"><span data-dcnode-id="397" instrument_node="">Desmond Doss would have credited his courage from the power of God. His strong faith in God however, had gotten him into a great deal of trouble. “Doss grew up in Lynchburg, Virginia, and was a Seventh Day Adventist, which meant he was a pacifist -- he didn't believe in violence and chose not to bear arms. His beliefs and his job as a defense industry worker provided him draft exemption during the war, but he dismissed that chance to defer. He wanted to serve his country, so he enlisted in the Army Medical Corps as a noncombatant. But because of his conscientious objector status -- including his refusal to handle duties on the Saturday Sabbath -- boot camp wasn't easy for him. He was threatened and harassed. Many of the other recruits threw shoes at him while he prayed, and they tried to have him transferred out of their unit,” (“Desmond Doss: The Unlikely Hero Behind ‘Hacksaw Ridge’”). Despite the harassment he had received from his peers, he persevered and had stayed true to what he had believed in. He did not let anything get in his way of doing what was right. Even when given direct orders to retreat, he knew in his heart that his duty to serve God and his country, was to stay. He had ran back into the flames of fury, denying all odds, he risked his life to save the lives of others. When daybreak had arrived and he had saved all the people he could, Desmond Doss had swung down the 400 foot cliff and was met with the support and utmost respect from his comrades. “His heroics didn't end there, though. Days later, as the Americans continued their slow advance, Doss was seriously wounded in the leg by a grenade. Instead of calling on another medic for help, he treated himself and waited five hours to be rescued. As he was being carried back to an aid station, his unit was attacked again. Doss insisted that another badly injured soldier take his spot on the stretcher. As he continued his trek on foot, Doss was hit by a sniper, shattering his arm...” (“Desmond Doss: The Unlikely Hero Behind ‘Hacksaw Ridge’”). Desmond had willingly given up his spot for treatment to help another. Desmond Doss had shown his heroic attributes by following the word of God, sacrificing himself and protecting others.</span></p><span data-dcnode-id="395" instrument_node="">
</span><p class="" data-dcnode-id="388"><span class="image-wrapper float-left" data-dcnode-id="389" style="width: 29%"><img alt="121079" class="img-responsive" data-dcnode-id="394" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//myhero.com/content/images/thumbs/0121079_desmond-doss-thou-shalt-not-kill.jpeg&amp;raw" style="width: 100%"><span class="caption" data-dcnode-id="392"><span data-dcnode-id="393" instrument_node="">Desmond Doss and his wife</span></span><span class="credit" data-dcnode-id="390"><span data-dcnode-id="391" instrument_node="">findagrave.com</span></span></span></p><span data-dcnode-id="387" instrument_node="">
</span><p class="" data-dcnode-id="385" dir="ltr"><span data-dcnode-id="386" instrument_node="">The selflessness and valiancy of Desmond Doss had shown to be a great gift. Throughout his life, he strove to serve and protect his country, even at the expense of his own life. His goal to safeguard and to assist has contributed to his dauntless actions. Doss has been an inspiration to others by sticking up for what he believed in, and never giving up when chaos had flown his course. Desmond Doss’ actions have proven to be the pinnacle of heroism.</span></p><span data-dcnode-id="384" instrument_node="">
</span><p class="" data-dcnode-id="374"><span class="image-wrapper right-align" data-dcnode-id="378" style="width: 40%"><img alt="121087" class="img-responsive" data-dcnode-id="383" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//myhero.com/content/images/thumbs/0121087_desmond-doss-thou-shalt-not-kill.jpeg&amp;raw" style="width: 100%"><span class="caption" data-dcnode-id="381"><span data-dcnode-id="382" instrument_node="">Desmond Doss, his wife, and his child</span></span><span class="credit" data-dcnode-id="379"><span data-dcnode-id="380" instrument_node="">1940sradio.com</span></span></span><strong data-dcnode-id="375"><br data-dcnode-id="377"><span data-dcnode-id="376" instrument_node=""> </span></strong></p><span data-dcnode-id="373" instrument_node="">
