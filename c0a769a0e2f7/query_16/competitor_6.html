</span><table border="0" cellpadding="0" cellspacing="0" data-dcnode-id="382" width="100%"><tbody data-dcnode-id="383"><tr data-dcnode-id="384"><td align="right" data-dcnode-id="392" valign="middle" width="33%"><a data-dcnode-id="393" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.creationliberty.com/downloads/dl.php%3Ffile%3Dselfdefense.pdf"><img data-dcnode-id="394" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.creationliberty.com/images/BUTTONpdf.png&amp;raw" title="Download PDF"></a></td><td align="center" data-dcnode-id="389" valign="middle" width="33%"></td><td align="left" data-dcnode-id="386" valign="middle" width="33%"></td></tr></tbody></table><span data-dcnode-id="381" instrument_node="">
</span></div><span data-dcnode-id="379" instrument_node="">
</span><br data-dcnode-id="378"><span data-dcnode-id="377" instrument_node="">






Evil men won't just go away because we hide ourselves. Eventually, many of us will find ourselves in conflict with a wicked agressor.
</span><p data-dcnode-id="367" id="scripture"><span data-dcnode-id="376" instrument_node="">
Then said he unto them, But now, he that hath a purse, let him take it, and likewise his scrip: and </span><u data-dcnode-id="374"><span data-dcnode-id="375" instrument_node="">he that hath no sword, let him sell his garment, and buy one</span></u><span data-dcnode-id="373" instrument_node="">. For I say unto you, that this that is written must yet be accomplished in me, And he was reckoned among the transgressors: for the things concerning me have an end. </span><u data-dcnode-id="371"><span data-dcnode-id="372" instrument_node="">And they said, Lord, behold, here are two swords. And he said unto them, It is enough</span></u><span data-dcnode-id="370" instrument_node="">.</span><br data-dcnode-id="369"><span data-dcnode-id="368" instrument_node="">
-Luke 22:36-38
</span></p><span data-dcnode-id="366" instrument_node="">
The Son of God needs no defense, but this is an example to us that we ought to have a way to defend ourselves from wicked men who come after us and our homes. We can't just assume nothing bad will ever come our way, and we should be prepared when the time comes.
</span><br data-dcnode-id="365"><br data-dcnode-id="364"><span data-dcnode-id="363" instrument_node="">
</span><center data-dcnode-id="361"><img data-dcnode-id="362" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.creationliberty.com/images/selfdefense01.jpg&amp;raw"></center><span data-dcnode-id="360" instrument_node="">
</span><br data-dcnode-id="359"><span data-dcnode-id="358" instrument_node="">
</span><p data-dcnode-id="351" id="scripture"><span data-dcnode-id="357" instrument_node="">
Jesus said, </span><u data-dcnode-id="355"><span data-dcnode-id="356" instrument_node="">Thou shalt do no murder</span></u><span data-dcnode-id="354" instrument_node="">, Thou shalt not commit adultery, Thou shalt not steal, Thou shalt not bear false witness,</span><br data-dcnode-id="353"><span data-dcnode-id="352" instrument_node="">
-Matthew 19:18
</span></p><span data-dcnode-id="350" instrument_node="">
</span><p data-dcnode-id="337" id="def"><span data-dcnode-id="349" instrument_node="">
</span><u data-dcnode-id="347"><span data-dcnode-id="348" instrument_node="">murder</span></u><span data-dcnode-id="346" instrument_node=""> (n): act of unlawfully killing a human being with </span><b data-dcnode-id="344"><span data-dcnode-id="345" instrument_node="">premeditated malice</span></b><span data-dcnode-id="343" instrument_node="">, by a person of sound mind. To constitute murder in law, the person killing another must be of sound mind or in possession of his reason, and the act must be done with malice prepense, aforethought or premeditated</span><br data-dcnode-id="342"><span data-dcnode-id="341" instrument_node="">
</span><ref data-dcnode-id="339"><span data-dcnode-id="340" instrument_node="">(See 'murder', Noah Webster's Dicitonary, 1828, retrieved May 28, 2014, [www.1828.mshaffer.com])</span></ref><span data-dcnode-id="338" instrument_node="">
</span></p><span data-dcnode-id="336" instrument_node="">
Murdering someone is done out of an act of rage, or pre-planned hatred, and thus, self-defense is not included in the definition of murder. The problem most Christians in reconciling this issue is the simple commandment in Exodus:
</span><p data-dcnode-id="332" id="scripture"><span data-dcnode-id="335" instrument_node="">
Thou shalt not kill.</span><br data-dcnode-id="334"><span data-dcnode-id="333" instrument_node="">
-Exodus 20:13
</span></p><span data-dcnode-id="331" instrument_node="">
The Bible-hating scoffer typically says: "</span><em data-dcnode-id="329"><span data-dcnode-id="330" instrument_node="">So you wouldn't kill someone if they were threatening your family?</span></em><span data-dcnode-id="328" instrument_node="">" The question is designed as an attempt to embarrass a Christian for having a contradiction in their philosophy, but the Bible-hating scoffer doesn't study the Bible to look for answers, therefore he/she doesn't realize that the Bible makes provision for self-defense, and althought this is not in the New Testament, this is an allowance or exception not a "don't do this" commandment.
</span><p data-dcnode-id="324" id="scripture"><span data-dcnode-id="327" instrument_node="">
If a thief be found breaking up, and be smitten that he die, there shall no blood be shed for him.</span><br data-dcnode-id="326"><span data-dcnode-id="325" instrument_node="">
-Exodus 22:2
</span></p><span data-dcnode-id="323" instrument_node="">
Let's do a little reasoning: If you catch a thief in your house, attack him with a weapon, and he dies from it, the blood shed is talking about making atonement for sin via sacrifice in the temple. Thus, the Lord God is explaining to the Jews that if the owner of the house kills a thief who breaks into his home, the owner has committed no sin, because </span><b data-dcnode-id="321"><span data-dcnode-id="322" instrument_node="">the Lord God does not protect the wicked</span></b><span data-dcnode-id="320" instrument_node="">; He does not bless the works of unrighteousness.
</span><p data-dcnode-id="313" id="scripture"><span data-dcnode-id="319" instrument_node="">
Deliver the poor and needy: </span><u data-dcnode-id="317"><span data-dcnode-id="318" instrument_node="">rid them out of the hand of the wicked</span></u><span data-dcnode-id="316" instrument_node="">.</span><br data-dcnode-id="315"><span data-dcnode-id="314" instrument_node="">
-Psalm 82:4
</span></p><span data-dcnode-id="312" instrument_node="">
When God says "</span><em data-dcnode-id="310"><span data-dcnode-id="311" instrument_node="">Thou shalt not kill</span></em><span data-dcnode-id="309" instrument_node="">," he is giving men a commandment that the life of a man is not in the hands of his neighbor. God judges men, and issues punishments, therefore, He has decreed that if a man defends his home and family against a wicked thief, and the thief dies, it is the equivalent of God's judgement on the thief's life for his sin.
</span><br data-dcnode-id="308"><br data-dcnode-id="307"><span data-dcnode-id="306" instrument_node="">
However, God does not take pleasure in the punishment of the wicked. God punishes because He does what needs to be done as the Judge over mankind, not because he takes pleasure in it.
</span><p data-dcnode-id="291" id="scripture"><span data-dcnode-id="305" instrument_node="">
For </span><u data-dcnode-id="303"><span data-dcnode-id="304" instrument_node="">I have no pleasure in the death of him that dieth, saith the Lord GOD</span></u><span data-dcnode-id="302" instrument_node="">: wherefore turn yourselves, and live ye.</span><br data-dcnode-id="301"><span data-dcnode-id="300" instrument_node="">
-Ezekiel 18:32
</span><br data-dcnode-id="299"><br data-dcnode-id="298"><span data-dcnode-id="297" instrument_node="">
Say unto them, As I live, </span><u data-dcnode-id="295"><span data-dcnode-id="296" instrument_node="">saith the Lord GOD, I have no pleasure in the death of the wicked; but that the wicked turn from his way and live</span></u><span data-dcnode-id="294" instrument_node="">: turn ye, turn ye from your evil ways; for why will ye die, O house of Israel?</span><br data-dcnode-id="293"><span data-dcnode-id="292" instrument_node="">
-Ezekiel 33:11
</span></p><span data-dcnode-id="290" instrument_node="">
The Lord God is long-suffering so that the wicked will repent and believe on the Lord Jesus Christ..
</span><p data-dcnode-id="283" id="scripture"><span data-dcnode-id="289" instrument_node="">
The Lord is not slack concerning his promise, as some men count slackness; but </span><u data-dcnode-id="287"><span data-dcnode-id="288" instrument_node="">is longsuffering to us-ward, not willing that any should perish, but that all should come to repentance</span></u><span data-dcnode-id="286" instrument_node="">.</span><br data-dcnode-id="285"><span data-dcnode-id="284" instrument_node="">
-2 Peter 3:9
</span></p><span data-dcnode-id="282" instrument_node="">
Because of God's longsuffering towards mankind, He laid down specific circumstances through which killing in self-defense is allowed.
</span><p data-dcnode-id="275" id="scripture"><span data-dcnode-id="281" instrument_node="">
</span><u data-dcnode-id="279"><span data-dcnode-id="280" instrument_node="">If the sun be risen upon him</span></u><span data-dcnode-id="278" instrument_node="">, there shall be blood shed for him; for he should make full restitution;</span><br data-dcnode-id="277"><span data-dcnode-id="276" instrument_node="">
-Exodus 22:3
</span></p><span data-dcnode-id="274" instrument_node="">
During the day, if someone breaks into your home, you can see clearly if there is a threat. Not everyone who has broken into a home is automatically a threat. It could be a drunken man who entered the wrong home, or even a teenage child who snuck out of the house and is sneaking back in. However, if it is dark in the house, it is very difficult to determine if someone may be holding a weapon that could injure you or your family. At nighttime, God allows the killing of someone in self-defense, since you can't see if the criminal is a threat to the lives of your household.
</span><center data-dcnode-id="272"><img data-dcnode-id="273" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.creationliberty.com/images/selfdefense02.jpg&amp;raw"></center><span data-dcnode-id="271" instrument_node="">
</span><br data-dcnode-id="270"><span data-dcnode-id="269" instrument_node="">
In broad daylight, it is much easier to stop and assess the situation. You can question the individual, and in the case someone may be breaking in because he/she is hungry, you may  even find an opportunity to be charitable to another.
</span><p data-dcnode-id="262" id="scripture"><span data-dcnode-id="268" instrument_node="">
Men do not despise a thief, </span><u data-dcnode-id="266"><span data-dcnode-id="267" instrument_node="">if he steal to satisfy his soul when he is hungry</span></u><span data-dcnode-id="265" instrument_node="">;</span><br data-dcnode-id="264"><span data-dcnode-id="263" instrument_node="">
-Proverbs 6:30
</span></p><span data-dcnode-id="261" instrument_node="">
If a good man heard rustling downstairs, in broad daylight, and a poor woman was in his kitchen stealing food for her family who was hungry, the good man would not react to her out of anger or in self-defense. A charitable man would give her the food to help her and her family, and a Christ-like man would offer up a place to stay and get cleaned up.
</span><br data-dcnode-id="260"><br data-dcnode-id="259"><span data-dcnode-id="258" instrument_node="">
The Bible does not ever issue the death penalty for thieves because if you kill the thief, then there is no one to pay for the losses of the victim. That's why Exodus 22:3 said "</span><em data-dcnode-id="256"><span data-dcnode-id="257" instrument_node="">he should make full restitution.</span></em><span data-dcnode-id="255" instrument_node="">" God, in his just ways, does not invite punishment on the innocent, but multiplies it on the wicked as a consequence for their actions.
</span><p data-dcnode-id="251" id="scripture"><span data-dcnode-id="254" instrument_node="">
If a man shall steal an ox, or a sheep, and kill it, or sell it; he shall restore five oxen for an ox, and four sheep for a sheep.</span><br data-dcnode-id="253"><span data-dcnode-id="252" instrument_node="">
-Exodus 22:1
</span></p><span data-dcnode-id="250" instrument_node="">
If those caught stealing were forced to work back the money to pay 4-5 times what they stole, it would deter a lot of theft in our country, and teach criminals the value of honest labor. However, we end up ignoring the Bible's standards, sending thieves off to prison where they are given three square meals a day, lodging, clothing, and showers, while the victims are left to deal with insurance companies (assuming they even have insurance), and they often do not get proper justice and restitution for their losses.
</span><br data-dcnode-id="249"><br data-dcnode-id="248"><span data-dcnode-id="247" instrument_node="">
</span><center data-dcnode-id="202"><table border="1" cellpadding="3" cellspacing="2" data-dcnode-id="203" width="96%"><tbody data-dcnode-id="204"><tr data-dcnode-id="205"><td bgcolor="#FFFFEE" data-dcnode-id="206"><span data-dcnode-id="246" instrument_node="">
</span><center data-dcnode-id="242"><font data-dcnode-id="243" size="4"><b data-dcnode-id="244"><span data-dcnode-id="245" instrument_node="">As a Christian, what if a thief gets away with my stuff?</span></b></font></center><span data-dcnode-id="241" instrument_node="">
</span><br data-dcnode-id="240"><span data-dcnode-id="239" instrument_node="">
First, let the authorities know. There is nothing in the Bible that prevents the law of the land from punishing evildoers, but rather, the Bible frequently calls for it.
</span><p data-dcnode-id="232" id="scripture"><span data-dcnode-id="238" instrument_node="">
Or unto </span><u data-dcnode-id="236"><span data-dcnode-id="237" instrument_node="">governors, as unto them that are sent by him for the punishment of evildoers</span></u><span data-dcnode-id="235" instrument_node="">, and for the praise of them that do well.</span><br data-dcnode-id="234"><span data-dcnode-id="233" instrument_node="">
-1 Peter 2:14
</span></p><span data-dcnode-id="231" instrument_node="">
Second, also let your neighbors know, so that they can keep watch.
</span><p data-dcnode-id="224" id="scripture"><span data-dcnode-id="230" instrument_node="">
But know this, that </span><u data-dcnode-id="228"><span data-dcnode-id="229" instrument_node="">if the goodman of the house had known in what watch the thief would come, he would have watched</span></u><span data-dcnode-id="227" instrument_node="">, and would not have suffered his house to be broken up.</span><br data-dcnode-id="226"><span data-dcnode-id="225" instrument_node="">
-Matthew 24:43
</span></p><span data-dcnode-id="223" instrument_node="">
And finally, let it go. It's just stuff. Not everything that happens to a Christian child of God is good, but all those things will work together for good.
</span><p data-dcnode-id="208" id="scripture"><span data-dcnode-id="222" instrument_node="">
And we know that </span><u data-dcnode-id="220"><span data-dcnode-id="221" instrument_node="">all things work together for good to them that love God</span></u><span data-dcnode-id="219" instrument_node="">, to them who are the called according to his purpose.</span><br data-dcnode-id="218"><span data-dcnode-id="217" instrument_node="">
-Romans 8:28
</span><br data-dcnode-id="216"><br data-dcnode-id="215"><span data-dcnode-id="214" instrument_node="">
For </span><u data-dcnode-id="212"><span data-dcnode-id="213" instrument_node="">where your treasure is</span></u><span data-dcnode-id="211" instrument_node="">, there will your heart be also.</span><br data-dcnode-id="210"><span data-dcnode-id="209" instrument_node="">
-Matthew 6:21
</span></p><span data-dcnode-id="207" instrument_node="">
There's nothing wrong with having things, but sometimes we tend to get too attached to this world that will pass away. Is your heart aimed towards the world, or towards heaven? When we are victim of a thief, certainly we have cause to be angry and frustrated, but let's practice focusing on our eternal rewards.
</span></td></tr></tbody></table></center><span data-dcnode-id="201" instrument_node="">
</span><br data-dcnode-id="200"><span data-dcnode-id="199" instrument_node="">
I have heard Bible-hating scoffers make the argument that if a Christian is truly saved, then the Christian should die off so the thief can live on, but anyone who reads their Bible knows that's a ridiculous notion. Again, God does not protect the wicked, and we all must pay the consequences of our actions, whether in this life or the next.
</span><p data-dcnode-id="192" id="scripture"><span data-dcnode-id="198" instrument_node="">
Be not deceived; </span><u data-dcnode-id="196"><span data-dcnode-id="197" instrument_node="">God is not mocked: for whatsoever a man soweth, that shall he also reap</span></u><span data-dcnode-id="195" instrument_node="">.</span><br data-dcnode-id="194"><span data-dcnode-id="193" instrument_node="">
-Galatians 6:7
</span></p><span data-dcnode-id="191" instrument_node="">
The time may come that you must defend your home and your family. As a Christian, we want to be ready to show mercy to others, as the Lord has shown mercy to us, but you should also be ready to do what is necessary to protect yourself and your family from the wicked. You do not need to pour guilt on yourself for defending your home and family.
</span><p data-dcnode-id="184" id="scripture"><span data-dcnode-id="190" instrument_node="">
If ye be reproached for the name of Christ, happy are ye; for the spirit of glory and of God resteth upon you: on their part he is evil spoken of, but on your part he is glorified. But </span><u data-dcnode-id="188"><span data-dcnode-id="189" instrument_node="">let none of you suffer as a murderer, or as a thief, or as an evildoer, or as a busybody in other men's matters</span></u><span data-dcnode-id="187" instrument_node="">.</span><br data-dcnode-id="186"><span data-dcnode-id="185" instrument_node="">
-1 Peter 4:14-15
</span></p><span data-dcnode-id="183" instrument_node="">
I had an angry woman write me after publishing this article who demanded I repent of this doctrine I have taught because Jesus said:
</span><p data-dcnode-id="176" id="scripture"><span data-dcnode-id="182" instrument_node="">
But I say unto you, That </span><u data-dcnode-id="180"><span data-dcnode-id="181" instrument_node="">ye resist not evil: but whosoever shall smite thee on thy right cheek, turn to him the other also</span></u><span data-dcnode-id="179" instrument_node="">.</span><br data-dcnode-id="178"><span data-dcnode-id="177" instrument_node="">
-Matthew 5:39
</span></p><span data-dcnode-id="175" instrument_node="">
Sadly, this woman has probably believed in a doctrine her pastor taught her, rather than looking to the context. The typical new-age pastor teaches (or heavily implies) that if anyone does anything bad to you, you have to ignore it and let them walk all over you.
</span><br data-dcnode-id="174"><br data-dcnode-id="173"><span data-dcnode-id="172" instrument_node="">
To this woman, I would reply: "According to the doctrine you believe, if, God forbid, you are ever raped, when the man is done with you, you need to say, 'Thank you sir, may I have another?'" Of course, she would not do this, which means she doesn't live the way she says she believes (i.e. hypocrisy), so let's go back to verse 38 and get a context with which to undertand what Christ is teaching:
</span><p data-dcnode-id="160" id="scripture"><span data-dcnode-id="171" instrument_node="">
Ye have heard that </span><u data-dcnode-id="169"><span data-dcnode-id="170" instrument_node="">it hath been said, An eye for an eye, and a tooth for a tooth</span></u><span data-dcnode-id="168" instrument_node="">:</span><br data-dcnode-id="167"><span data-dcnode-id="166" instrument_node="">
-Matthew 5:38
</span><br data-dcnode-id="165"><br data-dcnode-id="164"><span data-dcnode-id="163" instrument_node="">
Eye for eye, tooth for tooth, hand for hand, foot for foot, Burning for burning, wound for wound, stripe for stripe.</span><br data-dcnode-id="162"><span data-dcnode-id="161" instrument_node="">
-Exodus 21:24-25
</span></p><span data-dcnode-id="159" instrument_node="">
What most Bible students don't stop to consider is that this is referring to </span><em data-dcnode-id="157"><span data-dcnode-id="158" instrument_node="">PUNISHMENT</span></em><span data-dcnode-id="156" instrument_node=""> for evil; criminals would receive the same punishment they dished out. Notice specifically in Matthew 5 that Christ gives examples, and he never points out suffering thieves, rapists, murderers, etc.
</span><br data-dcnode-id="155"><br data-dcnode-id="154"><span data-dcnode-id="153" instrument_node="">
Let's look at the other examples:
</span><p data-dcnode-id="144" id="scripture"><span data-dcnode-id="152" instrument_node="">
And </span><u data-dcnode-id="148"><span data-dcnode-id="151" instrument_node="">if any man will sue thee at the law, </span><b data-dcnode-id="149"><span data-dcnode-id="150" instrument_node="">and take away thy coat</span></b></u><span data-dcnode-id="147" instrument_node="">, let him have thy cloke also.</span><br data-dcnode-id="146"><span data-dcnode-id="145" instrument_node="">
-Matthew 5:40
</span></p><span data-dcnode-id="143" instrument_node="">
Notice that it does </span><em data-dcnode-id="141"><span data-dcnode-id="142" instrument_node="">NOT</span></em><span data-dcnode-id="140" instrument_node=""> say to give anyone anything they want if they sue you. It says if man sues you </span><em data-dcnode-id="138"><span data-dcnode-id="139" instrument_node="">AND TAKES AWAY THY COAT</span></em><span data-dcnode-id="137" instrument_node="">, meaning that he won the lawsuit and the courts awarded him his claim. False doctrine has turned gullible church-goers into fools because if a man wants money from you, walks onto your property, purposefully trips over a tree root, then blames you for it and sues you, you can Biblically fight against that wicked man in court; you don't need to give him a dime.
</span><p data-dcnode-id="130" id="scripture"><span data-dcnode-id="136" instrument_node="">
And </span><u data-dcnode-id="134"><span data-dcnode-id="135" instrument_node="">whosoever shall compel thee to go a mile, go with him twain. Give to him that asketh thee, and from him that would borrow of thee turn not thou away</span></u><span data-dcnode-id="133" instrument_node="">.</span><br data-dcnode-id="132"><span data-dcnode-id="131" instrument_node="">
-Matthew 5:41-42
</span></p><span data-dcnode-id="129" instrument_node="">
If someone comes to you in need, then give him something if he asks you for it. This is not referring to a thief demanding money for faking an injury because the context shows us someone who wants to borrow something, that is, someone who has a need that you can fill, but to think that the Lord Jesus Christ is protecting and justifying unrighteousness and sin is ludicrous to anyone who studies Scripture.
</span><br data-dcnode-id="128"><br data-dcnode-id="127"><span data-dcnode-id="126" instrument_node="">
Christ is telling us that if a man gets angry at us and strikes us in his fury, striking back is not the answer because it only fuels the hatred. It's kind of like the old saying, "An eye for an eye will eventually make the whole world blind." It does </span><em data-dcnode-id="124"><span data-dcnode-id="125" instrument_node="">NOT</span></em><span data-dcnode-id="123" instrument_node=""> mean if a woman has been raped that she should open herself up and freely offer the man more sex, or that if a man sneaks into your home and murders your daughter that you should offer up your son to the murderer as well, and if you believe something like that, you have a desperate need to study the context of Scripture because you have no understanding.
</span><br data-dcnode-id="122"><br data-dcnode-id="121"><span data-dcnode-id="120" instrument_node="">
