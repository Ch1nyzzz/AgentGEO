</span><h2 data-dcnode-id="3517"><span class="mw-headline" data-dcnode-id="3525" id="Hebrew_Bible"><span data-dcnode-id="3526" instrument_node="">Hebrew Bible</span></span><span class="mw-editsection" data-dcnode-id="3518"><span class="mw-editsection-bracket" data-dcnode-id="3523"><span data-dcnode-id="3524" instrument_node="">[</span></span><a data-dcnode-id="3521" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DThou_shalt_not_kill%26action%3Dedit%26section%3D1" title="Edit section: Hebrew Bible"><span data-dcnode-id="3522" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3519"><span data-dcnode-id="3520" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3516" instrument_node="">
</span><h3 data-dcnode-id="3506"><span class="mw-headline" data-dcnode-id="3514" id="Retzach"><span data-dcnode-id="3515" instrument_node="">Retzach</span></span><span class="mw-editsection" data-dcnode-id="3507"><span class="mw-editsection-bracket" data-dcnode-id="3512"><span data-dcnode-id="3513" instrument_node="">[</span></span><a data-dcnode-id="3510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DThou_shalt_not_kill%26action%3Dedit%26section%3D2" title="Edit section: Retzach"><span data-dcnode-id="3511" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3508"><span data-dcnode-id="3509" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3505" instrument_node="">
</span><p data-dcnode-id="3481"><span data-dcnode-id="3504" instrument_node="">The </span><a data-dcnode-id="3502" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Biblical_Hebrew" title="Biblical Hebrew"><span data-dcnode-id="3503" instrument_node="">Hebrew</span></a><span data-dcnode-id="3501" instrument_node=""> verb </span><link data-dcnode-id="3500" href="mw-data:TemplateStyles:r1020748213" rel="mw-deduplicated-inline-style"><span class="script-hebrew" data-dcnode-id="3497" dir="rtl" style="font-size: 115%;"><a class="extiw" data-dcnode-id="3498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wiktionary.org/wiki/%25D7%25A8%25D7%25A6%25D7%2597" title="wikt:רצח"><span data-dcnode-id="3499" instrument_node="">רצח</span></a></span><span data-dcnode-id="3496" instrument_node="">‎ (</span><i data-dcnode-id="3494"><span data-dcnode-id="3495" instrument_node="">r-ṣ-ḥ</span></i><span data-dcnode-id="3493" instrument_node="">, also transliterated </span><i data-dcnode-id="3491"><span data-dcnode-id="3492" instrument_node="">retzach, ratzákh, ratsakh</span></i><span data-dcnode-id="3490" instrument_node=""> etc.) is the word in the original text that is translated as "murder", but it has a wider range of meanings, generally describing destructive activity, including meanings "to break, to dash to pieces" as well as "to slay, kill, murder".</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="3483" style="white-space:nowrap;"><span data-dcnode-id="3489" instrument_node="">[</span><i data-dcnode-id="3485"><a data-dcnode-id="3486" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="3487" title="This claim needs references to reliable sources. (February 2022)"><span data-dcnode-id="3488" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="3484" instrument_node="">]</span></sup><span data-dcnode-id="3482" instrument_node="">
</span></p><p data-dcnode-id="3459"><span data-dcnode-id="3480" instrument_node="">According to the </span><a data-dcnode-id="3478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Book_of_Numbers" title="Book of Numbers"><span data-dcnode-id="3479" instrument_node="">Book of Numbers</span></a><span data-dcnode-id="3477" instrument_node="">, killing anyone outside the context of war with a weapon, or in unarmed combat, is considered </span><i data-dcnode-id="3475"><span data-dcnode-id="3476" instrument_node="">retzach</span></i><span data-dcnode-id="3474" instrument_node="">.  Even accidental killing, or "thou shalt not kill," is expressly prohibited in </span><a class="external text" data-dcnode-id="3472" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bible.oremus.org/%3Fpassage%3DNumbers%252035%3A33%26version%3Dnrsv" rel="nofollow"><span data-dcnode-id="3473" instrument_node="">Numbers 35:33</span></a><span data-dcnode-id="3471" instrument_node="">.  If the killing is accidental, the accused must flee to one of the cities of refuge—and remain in that city until the high priest dies, or the "revenger of blood" can kill the accused with no legal repercussions. The Bible never uses the word </span><i data-dcnode-id="3469"><span data-dcnode-id="3470" instrument_node="">retzach</span></i><span data-dcnode-id="3468" instrument_node=""> in conjunction with war.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="3461" style="white-space:nowrap;"><span data-dcnode-id="3467" instrument_node="">[</span><i data-dcnode-id="3463"><a data-dcnode-id="3464" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="3465" title="This claim needs references to reliable sources. (February 2022)"><span data-dcnode-id="3466" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="3462" instrument_node="">]</span></sup><span data-dcnode-id="3460" instrument_node="">
</span></p><p data-dcnode-id="3431"><span data-dcnode-id="3458" instrument_node="">The act of slaying itself, regardless of questions of blood guilt, is expressed with the verb </span><i data-dcnode-id="3456"><span data-dcnode-id="3457" instrument_node="">n-k-h</span></i><span data-dcnode-id="3455" instrument_node=""> "to strike, smite, hit, beat, slay, kill". This verb is used of both an Egyptian slaying an Israelite slave and of Moses slaying the Egyptian in retaliation in </span><a class="external text" data-dcnode-id="3453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bible.oremus.org/%3Fpassage%3DExodus%25202%3A11%25E2%2580%259312%26version%3Dnrsv" rel="nofollow"><span data-dcnode-id="3454" instrument_node="">Exodus 2:11–12</span></a><span data-dcnode-id="3452" instrument_node="">. The </span><a data-dcnode-id="3450" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Covenant_Code" title="Covenant Code"><span data-dcnode-id="3451" instrument_node="">Covenant Code</span></a><span data-dcnode-id="3449" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="3447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Holiness_Code" title="Holiness Code"><span data-dcnode-id="3448" instrument_node="">Holiness Code</span></a><span data-dcnode-id="3446" instrument_node=""> both prescribe the </span><a class="mw-redirect" data-dcnode-id="3444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Death_penalty" title="Death penalty"><span data-dcnode-id="3445" instrument_node="">death penalty</span></a><span data-dcnode-id="3443" instrument_node=""> for people that commit </span><i data-dcnode-id="3441"><span data-dcnode-id="3442" instrument_node="">n-k-h</span></i><span data-dcnode-id="3440" instrument_node="">.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="3433" style="white-space:nowrap;"><span data-dcnode-id="3439" instrument_node="">[</span><i data-dcnode-id="3435"><a data-dcnode-id="3436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="3437" title="This claim needs references to reliable sources. (February 2022)"><span data-dcnode-id="3438" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="3434" instrument_node="">]</span></sup><span data-dcnode-id="3432" instrument_node="">
</span></p><p data-dcnode-id="3411"><span data-dcnode-id="3430" instrument_node="">The commandment against murder can be viewed as a legal issue governing human relationships, noting that the first four commandments relate strongly to man's duty to God and that the latter six commandments describe duties toward humans.</span><sup class="reference" data-dcnode-id="3427" id="cite_ref-3"><a data-dcnode-id="3428" href="#cite_note-3"><span data-dcnode-id="3429" instrument_node="">[3]</span></a></sup><sup class="reference" data-dcnode-id="3424" id="cite_ref-4"><a data-dcnode-id="3425" href="#cite_note-4"><span data-dcnode-id="3426" instrument_node="">[4]</span></a></sup><span data-dcnode-id="3423" instrument_node=""> The commandment against murder can also be viewed as based in respect for God himself.</span><sup class="reference" data-dcnode-id="3420" id="cite_ref-5"><a data-dcnode-id="3421" href="#cite_note-5"><span data-dcnode-id="3422" instrument_node="">[5]</span></a></sup><sup class="reference" data-dcnode-id="3417" id="cite_ref-6"><a data-dcnode-id="3418" href="#cite_note-6"><span data-dcnode-id="3419" instrument_node="">[6]</span></a></sup><span data-dcnode-id="3416" instrument_node="">  "The voice of your brother's blood is crying to me from the ground. And now you are cursed from the ground, which has opened its mouth to receive your brother's blood from your hand." </span><span class="nourlexpansion nowrap" data-dcnode-id="3413"><a class="external text" data-dcnode-id="3414" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biblegateway.com/passage/%3Fsearch%3DGenesis%2B4%3A10%25E2%2580%259311%26version%3DESV" rel="nofollow"><span data-dcnode-id="3415" instrument_node="">Genesis 4:10–11</span></a></span><span data-dcnode-id="3412" instrument_node=""> (ESV)
</span></p><p data-dcnode-id="3402"><span data-dcnode-id="3410" instrument_node="">The Genesis narrative also portrays the prohibition of shedding innocent blood as an important aspect of God's covenant with Noah.</span><sup class="reference" data-dcnode-id="3407" id="cite_ref-7"><a data-dcnode-id="3408" href="#cite_note-7"><span data-dcnode-id="3409" instrument_node="">[7]</span></a></sup><sup class="reference" data-dcnode-id="3404" id="cite_ref-8"><a data-dcnode-id="3405" href="#cite_note-8"><span data-dcnode-id="3406" instrument_node="">[8]</span></a></sup><span data-dcnode-id="3403" instrument_node="">
</span></p><span data-dcnode-id="3401" instrument_node="">
</span><blockquote class="templatequote" data-dcnode-id="3389"><p data-dcnode-id="3397"><span data-dcnode-id="3398" instrument_node="">Whoever sheds the blood of man, by man shall his blood be shed, for God made man in his own image. </span></p><div class="templatequotecite" data-dcnode-id="3390"><span data-dcnode-id="3396" instrument_node="">— </span><cite data-dcnode-id="3391"><span class="nourlexpansion nowrap" data-dcnode-id="3393"><a class="external text" data-dcnode-id="3394" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biblegateway.com/passage/%3Fsearch%3DGenesis%2B9%253A6%26version%3DESV" rel="nofollow"><span data-dcnode-id="3395" instrument_node="">Genesis 9:6</span></a></span><span data-dcnode-id="3392" instrument_node=""> (ESV)</span></cite></div></blockquote><span data-dcnode-id="3388" instrument_node="">
</span><p data-dcnode-id="3355"><span data-dcnode-id="3387" instrument_node="">The </span><a data-dcnode-id="3385" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Torah" title="Torah"><span data-dcnode-id="3386" instrument_node="">Torah</span></a><span data-dcnode-id="3384" instrument_node=""> portrays murder as a capital crime and describes a number of details in the moral understanding and legal implementation of consequences.</span><sup class="reference" data-dcnode-id="3381" id="cite_ref-autogenerated52_9-0"><a data-dcnode-id="3382" href="#cite_note-autogenerated52-9"><span data-dcnode-id="3383" instrument_node="">[9]</span></a></sup><sup class="reference" data-dcnode-id="3378" id="cite_ref-10"><a data-dcnode-id="3379" href="#cite_note-10"><span data-dcnode-id="3380" instrument_node="">[10]</span></a></sup><span data-dcnode-id="3377" instrument_node=""> The </span><a data-dcnode-id="3375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Priestly_Code" title="Priestly Code"><span data-dcnode-id="3376" instrument_node="">Priestly Code</span></a><span data-dcnode-id="3374" instrument_node=""> allowed the victim's next of kin (</span><i data-dcnode-id="3371"><a data-dcnode-id="3372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Goel" title="Goel"><span data-dcnode-id="3373" instrument_node="">avenger of blood</span></a></i><span data-dcnode-id="3370" instrument_node="">) to exact retribution on the suspect; but the accused could seek sanctuary in a </span><i data-dcnode-id="3367"><a data-dcnode-id="3368" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cities_of_Refuge" title="Cities of Refuge"><span data-dcnode-id="3369" instrument_node="">city of refuge</span></a></i><span data-dcnode-id="3366" instrument_node="">. The right of the </span><i data-dcnode-id="3364"><span data-dcnode-id="3365" instrument_node="">avenger of blood</span></i><span data-dcnode-id="3363" instrument_node=""> to such revenge ceased, upon the death of the person who was the </span><a class="mw-redirect" data-dcnode-id="3361" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kohen_Gadol" title="Kohen Gadol"><span data-dcnode-id="3362" instrument_node="">Jewish High Priest</span></a><span data-dcnode-id="3360" instrument_node=""> at the time of the crime.</span><sup class="reference" data-dcnode-id="3357" id="cite_ref-Saunders_11-0"><a data-dcnode-id="3358" href="#cite_note-Saunders-11"><span data-dcnode-id="3359" instrument_node="">[11]</span></a></sup><span data-dcnode-id="3356" instrument_node="">
</span></p><p data-dcnode-id="3319"><span data-dcnode-id="3354" instrument_node="">Another verb meaning "to kill, slay, murder, destroy, ruin" is </span><i data-dcnode-id="3352"><span data-dcnode-id="3353" instrument_node="">h-r-g</span></i><span data-dcnode-id="3351" instrument_node="">, used of </span><a data-dcnode-id="3349" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cain_and_Abel" title="Cain and Abel"><span data-dcnode-id="3350" instrument_node="">Cain slaying Abel</span></a><span data-dcnode-id="3348" instrument_node=""> in Genesis 4:8. When Cain is driven into exile, complaining that "every one that findeth me shall slay me" in </span><a class="external text" data-dcnode-id="3346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bible.oremus.org/%3Fpassage%3DGenesis%25204%3A14%26version%3Dnrsv" rel="nofollow"><span data-dcnode-id="3347" instrument_node="">Genesis 4:14</span></a><span data-dcnode-id="3345" instrument_node="">, he again uses this verb (</span><i data-dcnode-id="3343"><span data-dcnode-id="3344" instrument_node="">h-r-g</span></i><span data-dcnode-id="3342" instrument_node="">). Eliezer Segal observes that the </span><a data-dcnode-id="3340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Septuagint" title="Septuagint"><span data-dcnode-id="3341" instrument_node="">Septuagint</span></a><span data-dcnode-id="3339" instrument_node=""> uses the term </span><i data-dcnode-id="3337"><span data-dcnode-id="3338" instrument_node="">harag</span></i><span data-dcnode-id="3336" instrument_node="">, and that </span><a data-dcnode-id="3334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Augustine_of_Hippo" title="Augustine of Hippo"><span data-dcnode-id="3335" instrument_node="">Augustine of Hippo</span></a><span data-dcnode-id="3333" instrument_node=""> recognized that this did not extend to wars or capital punishment. Most subsequent translations follow </span><a data-dcnode-id="3331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jerome" title="Jerome"><span data-dcnode-id="3332" instrument_node="">Jerome</span></a><span data-dcnode-id="3330" instrument_node="">'s </span><a data-dcnode-id="3328" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vulgate" title="Vulgate"><span data-dcnode-id="3329" instrument_node="">Vulgate</span></a><span data-dcnode-id="3327" instrument_node="">. While Jerome had access to Jewish scholars, "even the Jewish translators were not unanimous in maintaining a consistent distinctions between the various Hebrew roots."</span><sup class="reference" data-dcnode-id="3324" id="cite_ref-12"><a data-dcnode-id="3325" href="#cite_note-12"><span data-dcnode-id="3326" instrument_node="">[12]</span></a></sup><span data-dcnode-id="3323" instrument_node=""> Jerome's choice of the word </span><i data-dcnode-id="3321"><span data-dcnode-id="3322" instrument_node="">occidere</span></i><span data-dcnode-id="3320" instrument_node=""> (to kill) reflects the broader range of meanings.
</span></p><p data-dcnode-id="3310"><span data-dcnode-id="3318" instrument_node="">In a more modern analysis, Wilma Ann Bailey also finds a broader application of the word </span><i data-dcnode-id="3316"><span data-dcnode-id="3317" instrument_node="">retzach</span></i><span data-dcnode-id="3315" instrument_node="">.</span><sup class="reference" data-dcnode-id="3312" id="cite_ref-13"><a data-dcnode-id="3313" href="#cite_note-13"><span data-dcnode-id="3314" instrument_node="">[13]</span></a></sup><span data-dcnode-id="3311" instrument_node="">
</span></p><span data-dcnode-id="3309" instrument_node="">
</span><h3 data-dcnode-id="3299"><span class="mw-headline" data-dcnode-id="3307" id="Justified_killing:_due_consequence_for_crime"><span data-dcnode-id="3308" instrument_node="">Justified killing: due consequence for crime</span></span><span class="mw-editsection" data-dcnode-id="3300"><span class="mw-editsection-bracket" data-dcnode-id="3305"><span data-dcnode-id="3306" instrument_node="">[</span></span><a data-dcnode-id="3303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DThou_shalt_not_kill%26action%3Dedit%26section%3D3" title="Edit section: Justified killing: due consequence for crime"><span data-dcnode-id="3304" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3301"><span data-dcnode-id="3302" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3298" instrument_node="">
</span><p data-dcnode-id="3241"><span data-dcnode-id="3297" instrument_node="">The </span><a data-dcnode-id="3295" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Torah" title="Torah"><span data-dcnode-id="3296" instrument_node="">Torah</span></a><span data-dcnode-id="3294" instrument_node=""> and </span><a data-dcnode-id="3292" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hebrew_Bible" title="Hebrew Bible"><span data-dcnode-id="3293" instrument_node="">Hebrew Bible</span></a><span data-dcnode-id="3291" instrument_node=""> made clear distinctions between the shedding of innocent blood versus killing as the due consequence of a crime.  A number of sins were considered to be worthy of the death penalty including murder,</span><sup class="reference" data-dcnode-id="3288" id="cite_ref-14"><a data-dcnode-id="3289" href="#cite_note-14"><span data-dcnode-id="3290" instrument_node="">[14]</span></a></sup><span data-dcnode-id="3287" instrument_node=""> incest,</span><sup class="reference" data-dcnode-id="3284" id="cite_ref-15"><a data-dcnode-id="3285" href="#cite_note-15"><span data-dcnode-id="3286" instrument_node="">[15]</span></a></sup><span data-dcnode-id="3283" instrument_node=""> bearing false witness on a capital charge,</span><sup class="reference" data-dcnode-id="3280" id="cite_ref-16"><a data-dcnode-id="3281" href="#cite_note-16"><span data-dcnode-id="3282" instrument_node="">[16]</span></a></sup><span data-dcnode-id="3279" instrument_node=""> adultery,</span><sup class="reference" data-dcnode-id="3276" id="cite_ref-17"><a data-dcnode-id="3277" href="#cite_note-17"><span data-dcnode-id="3278" instrument_node="">[17]</span></a></sup><span data-dcnode-id="3275" instrument_node=""> </span><a data-dcnode-id="3273" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Idolatry" title="Idolatry"><span data-dcnode-id="3274" instrument_node="">idolatry</span></a><span data-dcnode-id="3272" instrument_node="">,</span><sup class="reference" data-dcnode-id="3269" id="cite_ref-18"><a data-dcnode-id="3270" href="#cite_note-18"><span data-dcnode-id="3271" instrument_node="">[18]</span></a></sup><span data-dcnode-id="3268" instrument_node=""> </span><a class="mw-redirect" data-dcnode-id="3266" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bestiality" title="Bestiality"><span data-dcnode-id="3267" instrument_node="">bestiality</span></a><span data-dcnode-id="3265" instrument_node="">,</span><sup class="reference" data-dcnode-id="3262" id="cite_ref-19"><a data-dcnode-id="3263" href="#cite_note-19"><span data-dcnode-id="3264" instrument_node="">[19]</span></a></sup><span data-dcnode-id="3261" instrument_node=""> child sacrifice to pagan gods,</span><sup class="reference" data-dcnode-id="3258" id="cite_ref-20"><a data-dcnode-id="3259" href="#cite_note-20"><span data-dcnode-id="3260" instrument_node="">[20]</span></a></sup><span data-dcnode-id="3257" instrument_node=""> cursing a parent,</span><sup class="reference" data-dcnode-id="3254" id="cite_ref-21"><a data-dcnode-id="3255" href="#cite_note-21"><span data-dcnode-id="3256" instrument_node="">[21]</span></a></sup><span data-dcnode-id="3253" instrument_node=""> </span><a data-dcnode-id="3251" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fortune-telling" title="Fortune-telling"><span data-dcnode-id="3252" instrument_node="">fortune-telling</span></a><span data-dcnode-id="3250" instrument_node="">,</span><sup class="reference" data-dcnode-id="3247" id="cite_ref-22"><a data-dcnode-id="3248" href="#cite_note-22"><span data-dcnode-id="3249" instrument_node="">[22]</span></a></sup><span data-dcnode-id="3246" instrument_node=""> homosexuality,</span><sup class="reference" data-dcnode-id="3243" id="cite_ref-23"><a data-dcnode-id="3244" href="#cite_note-23"><span data-dcnode-id="3245" instrument_node="">[23]</span></a></sup><span data-dcnode-id="3242" instrument_node=""> and other sins.
</span></p><p data-dcnode-id="3225"><span data-dcnode-id="3240" instrument_node="">For example, the Exodus narrative describes the people as having turned to idolatry with the </span><a data-dcnode-id="3238" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Golden_calf" title="Golden calf"><span data-dcnode-id="3239" instrument_node="">golden calf</span></a><span data-dcnode-id="3237" instrument_node=""> while Moses was on the mountain receiving the law from God. When Moses came down, he commanded the Levites to take up the sword against their brothers and companions and neighbors. The Levites obeyed and killed about three thousand men who had sinned in worship of the golden calf.  As a result, Moses said that the Levites had received a blessing that day at the cost of son and brother.</span><sup class="reference" data-dcnode-id="3234" id="cite_ref-24"><a data-dcnode-id="3235" href="#cite_note-24"><span data-dcnode-id="3236" instrument_node="">[24]</span></a></sup><span data-dcnode-id="3233" instrument_node=""> On a separate occasion, a blasphemer was stoned to death because he blasphemed the name of the Lord (</span><a data-dcnode-id="3231" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yahweh" title="Yahweh"><span data-dcnode-id="3232" instrument_node="">Yahweh</span></a><span data-dcnode-id="3230" instrument_node="">) with a curse.</span><sup class="reference" data-dcnode-id="3227" id="cite_ref-25"><a data-dcnode-id="3228" href="#cite_note-25"><span data-dcnode-id="3229" instrument_node="">[25]</span></a></sup><span data-dcnode-id="3226" instrument_node="">
</span></p><p data-dcnode-id="3212"><span data-dcnode-id="3224" instrument_node="">The Hebrew Bible has many other examples of sinners being put to death as due consequence for crimes. Achan is put to death by Joshua because he caused defeat of Israel's army by taking some of the plunder and hiding it in his tent.</span><sup class="reference" data-dcnode-id="3221" id="cite_ref-26"><a data-dcnode-id="3222" href="#cite_note-26"><span data-dcnode-id="3223" instrument_node="">[26]</span></a></sup><sup class="reference" data-dcnode-id="3218" id="cite_ref-27"><a data-dcnode-id="3219" href="#cite_note-27"><span data-dcnode-id="3220" instrument_node="">[27]</span></a></sup><span data-dcnode-id="3217" instrument_node=""> David ordered that an Amalekite be put to death because he claimed to have killed King Saul.</span><sup class="reference" data-dcnode-id="3214" id="cite_ref-Saunders_11-1"><a data-dcnode-id="3215" href="#cite_note-Saunders-11"><span data-dcnode-id="3216" instrument_node="">[11]</span></a></sup><span data-dcnode-id="3213" instrument_node=""> Following the advice of his father, Solomon ordered that Joab be killed:
</span></p><span data-dcnode-id="3211" instrument_node="">
</span><link data-dcnode-id="3210" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="3203"><p data-dcnode-id="3208"><span data-dcnode-id="3209" instrument_node="">Strike him down and bury him, and so clear me and my father's house of the guilt of the innocent blood that Joab shed. The Lord will repay him for the blood he shed, because without the knowledge of my father David he attacked two men and killed them with the sword. Both of them—Abner son of Ner, commander of Israel's army, and Amasa son of Jether, commander of Judah's army—were better men and more upright than he.  May the guilt of their blood rest on the head of Joab and his descendants forever. But on David and his descendants, his house and his throne, may there be the Lord's peace forever.</span></p><div class="templatequotecite" data-dcnode-id="3204"><span data-dcnode-id="3207" instrument_node="">— </span><cite data-dcnode-id="3205"><span data-dcnode-id="3206" instrument_node="">1 Kings 2:31–33 (NIV)</span></cite></div></blockquote><span data-dcnode-id="3202" instrument_node="">
</span><p data-dcnode-id="3193"><span data-dcnode-id="3201" instrument_node="">The biblical refrain for those justly executed as due punishment for crimes is that "their blood will be on their own heads."</span><sup class="reference" data-dcnode-id="3198" id="cite_ref-28"><a data-dcnode-id="3199" href="#cite_note-28"><span data-dcnode-id="3200" instrument_node="">[28]</span></a></sup><span data-dcnode-id="3197" instrument_node=""> This expresses the idea that those guilty of certain actions have brought the shedding of blood upon themselves, and those carrying out due punishment do not bear </span><a class="extiw" data-dcnode-id="3195" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wiktionary.org/wiki/bloodguilt" title="wikt:bloodguilt"><span data-dcnode-id="3196" instrument_node="">bloodguilt</span></a><span data-dcnode-id="3194" instrument_node="">.
</span></p><span data-dcnode-id="3192" instrument_node="">
</span><h3 data-dcnode-id="3182"><span class="mw-headline" data-dcnode-id="3190" id="Justified_killing:_in_warfare"><span data-dcnode-id="3191" instrument_node="">Justified killing: in warfare</span></span><span class="mw-editsection" data-dcnode-id="3183"><span class="mw-editsection-bracket" data-dcnode-id="3188"><span data-dcnode-id="3189" instrument_node="">[</span></span><a data-dcnode-id="3186" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DThou_shalt_not_kill%26action%3Dedit%26section%3D4" title="Edit section: Justified killing: in warfare"><span data-dcnode-id="3187" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3184"><span data-dcnode-id="3185" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3181" instrument_node="">
</span><div class="hatnote navigation-not-searchable" data-dcnode-id="3175" role="note"><span data-dcnode-id="3178" instrument_node="">Further information: </span><a data-dcnode-id="3176" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Herem_%28war_or_property%29" title="Herem (war or property)"><span data-dcnode-id="3177" instrument_node="">Herem (war or property)</span></a></div><span data-dcnode-id="3174" instrument_node="">
</span><p data-dcnode-id="3146"><span data-dcnode-id="3173" instrument_node="">The ancient Hebrew texts make a distinction between the moral and legal prohibition of shedding of innocent blood and killing in battle.</span><sup class="reference" data-dcnode-id="3170" id="cite_ref-29"><a data-dcnode-id="3171" href="#cite_note-29"><span data-dcnode-id="3172" instrument_node="">[29]</span></a></sup><span data-dcnode-id="3169" instrument_node=""> Rabbi Marc Gellman explains the distinction between "harag" (killing) and "ratzah" (murder) and notes the different moral connotations. "...there is wide moral agreement (not complete agreement) that some forms of killing are morally just, and killing an enemy combatant during wartime is one of them."</span><sup class="reference" data-dcnode-id="3166" id="cite_ref-30"><a data-dcnode-id="3167" href="#cite_note-30"><span data-dcnode-id="3168" instrument_node="">[30]</span></a></sup><span data-dcnode-id="3165" instrument_node=""> For example, the </span><a data-dcnode-id="3163" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Torah" title="Torah"><span data-dcnode-id="3164" instrument_node="">Torah</span></a><span data-dcnode-id="3162" instrument_node=""> prohibits murder, but sanctions killing in legitimate battle.</span><sup class="reference" data-dcnode-id="3159" id="cite_ref-31"><a data-dcnode-id="3160" href="#cite_note-31"><span data-dcnode-id="3161" instrument_node="">[31]</span></a></sup><sup class="reference" data-dcnode-id="3156" id="cite_ref-32"><a data-dcnode-id="3157" href="#cite_note-32"><span data-dcnode-id="3158" instrument_node="">[32]</span></a></sup><span data-dcnode-id="3155" instrument_node=""> The Bible often praises the exploits of soldiers against enemies in legitimate battle.  One of David's mighty men is credited with killing eight hundred men with the spear,</span><sup class="reference" data-dcnode-id="3152" id="cite_ref-33"><a data-dcnode-id="3153" href="#cite_note-33"><span data-dcnode-id="3154" instrument_node="">[33]</span></a></sup><span data-dcnode-id="3151" instrument_node=""> and Abishai is credited with killing three hundred men.</span><sup class="reference" data-dcnode-id="3148" id="cite_ref-34"><a data-dcnode-id="3149" href="#cite_note-34"><span data-dcnode-id="3150" instrument_node="">[34]</span></a></sup><span data-dcnode-id="3147" instrument_node="">
</span></p><p data-dcnode-id="3135"><span data-dcnode-id="3145" instrument_node="">The </span><a class="mw-redirect" data-dcnode-id="3143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/613_Mitzvot" title="613 Mitzvot"><span data-dcnode-id="3144" instrument_node="">613 Mitzvot</span></a><span data-dcnode-id="3142" instrument_node=""> extend the notion of lawful killing to the nations that inhabited the </span><a data-dcnode-id="3140" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Promised_Land" title="Promised Land"><span data-dcnode-id="3141" instrument_node="">Promised Land</span></a><span data-dcnode-id="3139" instrument_node="">, commanding to exterminate them completely.
</span><a class="mw-redirect" data-dcnode-id="3137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Deuteronomy" title="Deuteronomy"><span data-dcnode-id="3138" instrument_node="">Deuteronomy</span></a><span data-dcnode-id="3136" instrument_node=""> 20:10–18 establishes rules on killing civilians in warfare:
</span></p><span data-dcnode-id="3134" instrument_node="">
</span><ul data-dcnode-id="3122"><li data-dcnode-id="3132"><span data-dcnode-id="3133" instrument_node="">the population of cities outside of the Promised Land, if they surrender, should be made tributaries and left alive (20:10–11)</span></li><span data-dcnode-id="3131" instrument_node="">
</span><li data-dcnode-id="3129"><span data-dcnode-id="3130" instrument_node="">those cities outside of the Promised Land that resist should be besieged, and once they fall, the male population should be exterminated, but the women and children should be left alive (20:12–15)</span></li><span data-dcnode-id="3128" instrument_node="">
</span><li data-dcnode-id="3123"><span data-dcnode-id="3127" instrument_node="">of those cities that were within the Promised Land, however, everybody was to be killed.</span><sup class="reference" data-dcnode-id="3124" id="cite_ref-Saunders_11-2"><a data-dcnode-id="3125" href="#cite_note-Saunders-11"><span data-dcnode-id="3126" instrument_node="">[11]</span></a></sup></li></ul><span data-dcnode-id="3121" instrument_node="">
</span><h3 data-dcnode-id="3111"><span class="mw-headline" data-dcnode-id="3119" id="Justified_killing:_intruder_in_the_home_at_night"><span data-dcnode-id="3120" instrument_node="">Justified killing: intruder in the home at night</span></span><span class="mw-editsection" data-dcnode-id="3112"><span class="mw-editsection-bracket" data-dcnode-id="3117"><span data-dcnode-id="3118" instrument_node="">[</span></span><a data-dcnode-id="3115" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DThou_shalt_not_kill%26action%3Dedit%26section%3D5" title="Edit section: Justified killing: intruder in the home at night"><span data-dcnode-id="3116" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3113"><span data-dcnode-id="3114" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3110" instrument_node="">
</span><p data-dcnode-id="3104"><span data-dcnode-id="3109" instrument_node="">As described in the Torah, the ancient understanding of the prohibition of murder made an exception for legitimate self-defense.  A home defender who struck and killed a thief caught in the act of breaking in at night was not guilty of bloodshed.  "If a thief is caught breaking in and is struck so that he dies, the defender is not guilty of bloodshed; but if it happens after sunrise, he is guilty of bloodshed."</span><sup class="reference" data-dcnode-id="3106" id="cite_ref-35"><a data-dcnode-id="3107" href="#cite_note-35"><span data-dcnode-id="3108" instrument_node="">[35]</span></a></sup><span data-dcnode-id="3105" instrument_node="">
</span></p><span data-dcnode-id="3103" instrument_node="">
</span><link data-dcnode-id="3102" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="3095"><p data-dcnode-id="3100"><span data-dcnode-id="3101" instrument_node="">A man's house is his castle, and God's law, as well as man's, sets a guard upon it; he that assaults it does so at his peril.</span></p><div class="templatequotecite" data-dcnode-id="3096"><span data-dcnode-id="3099" instrument_node="">— </span><cite data-dcnode-id="3097"><span data-dcnode-id="3098" instrument_node="">Matthew Henry, Henry, M. "1706. Commentary on the whole Bible, volume I (Genesis to Deuteronomy). Christian Classics Ethereal Library."</span></cite></div></blockquote><span data-dcnode-id="3094" instrument_node="">
</span><h2 data-dcnode-id="3084"><span class="mw-headline" data-dcnode-id="3092" id="Jewish_doctrine"><span data-dcnode-id="3093" instrument_node="">Jewish doctrine</span></span><span class="mw-editsection" data-dcnode-id="3085"><span class="mw-editsection-bracket" data-dcnode-id="3090"><span data-dcnode-id="3091" instrument_node="">[</span></span><a data-dcnode-id="3088" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DThou_shalt_not_kill%26action%3Dedit%26section%3D6" title="Edit section: Jewish doctrine"><span data-dcnode-id="3089" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3086"><span data-dcnode-id="3087" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3083" instrument_node="">
</span><link data-dcnode-id="3082" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="3075" role="note"><span data-dcnode-id="3081" instrument_node="">Further information: </span><a data-dcnode-id="3079" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Judaism_and_violence" title="Judaism and violence"><span data-dcnode-id="3080" instrument_node="">Judaism and violence</span></a><span data-dcnode-id="3078" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="3076" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peace_and_war_in_Judaism" title="Peace and war in Judaism"><span data-dcnode-id="3077" instrument_node="">Peace and war in Judaism</span></a></div><span data-dcnode-id="3074" instrument_node="">
</span><p data-dcnode-id="3062"><span data-dcnode-id="3073" instrument_node="">Jewish law views the shedding of innocent blood very seriously, and lists murder as one of three sins (along with idolatry and sexual immorality) that fall under the category of </span><a class="mw-redirect" data-dcnode-id="3071" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yehareg_ve%2527al_ya%2527avor" title="Yehareg ve'al ya'avor"><span data-dcnode-id="3072" instrument_node="">yehareg ve'al ya'avor</span></a><span data-dcnode-id="3070" instrument_node="">, meaning "One should let himself be killed rather than violate it."</span><sup class="reference" data-dcnode-id="3067" id="cite_ref-36"><a data-dcnode-id="3068" href="#cite_note-36"><span data-dcnode-id="3069" instrument_node="">[36]</span></a></sup><span data-dcnode-id="3066" instrument_node=""> Jewish law enumerates </span><a class="mw-redirect" data-dcnode-id="3064" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/613_Mitzvot" title="613 Mitzvot"><span data-dcnode-id="3065" instrument_node="">613 Mitzvot</span></a><span data-dcnode-id="3063" instrument_node="">, or commandments, including prohibition of murder and a number of other commandments related to the preserving of human life and administration of justice in cases of shedding of innocent blood.
</span></p><span data-dcnode-id="3061" instrument_node="">
</span><link data-dcnode-id="3060" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="3015"><span data-dcnode-id="3059" instrument_node="">
</span><p data-dcnode-id="3025"><span data-dcnode-id="3058" instrument_node="">482. Don't commit murder (Exodus 20:13)</span><br data-dcnode-id="3057"><span data-dcnode-id="3056" instrument_node="">
483. Don't accept ransom for life of the murderer (Numbers 35:31)</span><br data-dcnode-id="3055"><span data-dcnode-id="3054" instrument_node="">
484. Exile an accidental murderer (Numbers 35:25)</span><br data-dcnode-id="3053"><span data-dcnode-id="3052" instrument_node="">
485. Don't accept ransom from him (Numbers 35:32)</span><br data-dcnode-id="3051"><span data-dcnode-id="3050" instrument_node="">
486. Don't kill the murderer before trying him (Numbers 35:12)</span><br data-dcnode-id="3049"><span data-dcnode-id="3048" instrument_node="">
487. Save the pursued at the cost of the life of the pursuer (Deuteronomy 25:12)</span><br data-dcnode-id="3047"><span data-dcnode-id="3046" instrument_node="">
488. Don't show pity for the pursuer (Numbers 35:12)</span><br data-dcnode-id="3045"><span data-dcnode-id="3044" instrument_node="">
489. Don't stand idly by when you can save a life (Leviticus 19:16)</span><br data-dcnode-id="3043"><span data-dcnode-id="3042" instrument_node="">
490. Set aside cities of refuge for those who commit accidental homicide (Deuteronomy 19:3)</span><br data-dcnode-id="3041"><span data-dcnode-id="3040" instrument_node="">
491. Break the neck of the calf by the river (in ritual following unsolved murder) (Deuteronomy 21:4)</span><br data-dcnode-id="3039"><span data-dcnode-id="3038" instrument_node="">
492. Don't till by that river or sow there (Deuteronomy 21:4)</span><br data-dcnode-id="3037"><span data-dcnode-id="3036" instrument_node="">
493. Don't cause loss of human life (through negligence) (Deuteronomy 22:8)</span><br data-dcnode-id="3035"><span data-dcnode-id="3034" instrument_node="">
494. Build a parapet (in roof of house) (Deuteronomy 22:8)</span><br data-dcnode-id="3033"><span data-dcnode-id="3032" instrument_node="">
495. Don't mislead with advice which is a stumbling block (Leviticus 19:14)</span><br data-dcnode-id="3031"><span data-dcnode-id="3030" instrument_node="">
496. Help a man remove the load from his beast which can no longer carry it (Exodus 23:5)</span><br data-dcnode-id="3029"><span data-dcnode-id="3028" instrument_node="">
497. Help him load his beast (Deuteronomy 22:4)</span><br data-dcnode-id="3027"><span data-dcnode-id="3026" instrument_node="">
498. Don't leave him in a state of confusion and go on your way (Deuteronomy 22:4)
</span></p><span data-dcnode-id="3024" instrument_node="">
</span><div class="templatequotecite" data-dcnode-id="3016"><span data-dcnode-id="3023" instrument_node="">— </span><cite data-dcnode-id="3017"><a data-dcnode-id="3021" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sefer_Hamitzvot" title="Sefer Hamitzvot"><span data-dcnode-id="3022" instrument_node="">Sefer Hamitzvot</span></a><span data-dcnode-id="3020" instrument_node=""> by </span><a data-dcnode-id="3018" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Maimonides" title="Maimonides"><span data-dcnode-id="3019" instrument_node="">Maimonides</span></a></cite></div></blockquote><span data-dcnode-id="3014" instrument_node="">
</span><p data-dcnode-id="3005"><span data-dcnode-id="3013" instrument_node="">On the subject of manslaughter ("thou shalt not kill"), the rabbinic authority </span><a data-dcnode-id="3011" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nachmanides" title="Nachmanides"><span data-dcnode-id="3012" instrument_node="">Nachmanides</span></a><span data-dcnode-id="3010" instrument_node=""> was one of the few who enumerated a negative commandment prohibiting this lesser offense.</span><sup class="reference" data-dcnode-id="3007" id="cite_ref-37"><a data-dcnode-id="3008" href="#cite_note-37"><span data-dcnode-id="3009" instrument_node="">[37]</span></a></sup><span data-dcnode-id="3006" instrument_node="">
</span></p><p data-dcnode-id="2990"><span data-dcnode-id="3004" instrument_node="">Life is considered very precious, even sacred by Jewish teaching.  The </span><a data-dcnode-id="3002" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Talmud" title="Talmud"><span data-dcnode-id="3003" instrument_node="">Talmud</span></a><span data-dcnode-id="3001" instrument_node=""> cites the prohibition of shedding innocent blood in Genesis 9:6 as the reason why the death penalty should be carried out against non-Jews as well as Jews, and while faithful Jews are required to obey </span><a class="mw-redirect" data-dcnode-id="2999" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/613_Mitzvot" title="613 Mitzvot"><span data-dcnode-id="3000" instrument_node="">613 Mitzvot</span></a><span data-dcnode-id="2998" instrument_node="">, gentiles are only obliged to obey the seven </span><a class="mw-redirect" data-dcnode-id="2996" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Noahide_laws" title="Noahide laws"><span data-dcnode-id="2997" instrument_node="">Noahide laws</span></a><span data-dcnode-id="2995" instrument_node="">, which include the prohibition of murder and establishment of a justice system to administer law honestly.</span><sup class="reference" data-dcnode-id="2992" id="cite_ref-38"><a data-dcnode-id="2993" href="#cite_note-38"><span data-dcnode-id="2994" instrument_node="">[38]</span></a></sup><span data-dcnode-id="2991" instrument_node=""> Rabbi Dr. Azriel Rosenfeld offers a representative modern summary of Jewish teaching regarding the command not to murder.
</span></p><span data-dcnode-id="2989" instrument_node="">
</span><link data-dcnode-id="2988" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="2974"><p data-dcnode-id="2982"><span data-dcnode-id="2987" instrument_node=""> Chapter 68. Murderer and Protection of Life – Rotze'ach u-Shemiras Nefesh</span><br data-dcnode-id="2986"><span data-dcnode-id="2985" instrument_node="">
It is forbidden to murder, as it says "You shall not murder" (Exodus 20:13, Deuteronomy 5:17).</span><br data-dcnode-id="2984"><span data-dcnode-id="2983" instrument_node=""> A murderer must be put to death, as it says "He shall be avenged" (Exodus 21:20, see Leviticus 24:17,21); it is forbidden to accept compensation from him instead, as it says "You shall not take redemption for the life of a murderer...; and there shall be no atonement for the blood that was spilled... except the blood of him that spilled it" (Numbers 35:31–33). It is forbidden to execute a murderer before he has stood trial, as it says "And the murderer shall not die until he stands before the congregation for judgment" (Numbers 35:12). However, we are commanded to prevent an attempted murder by killing the would-be murderer if necessary, and it is forbidden to refrain from doing so, as it says "And you shall cut off her hand; you shall not be merciful" (Deuteronomy 25:12); and similarly for attempted fornication, as it says "[If the man seizes her and lies with her...] just as a man rises up against his friend and murders him, so is this thing"(Deuteronomy 22:26). It is forbidden to refrain from saving life when it is in one's power to do so, as it says "You shall not stand on your friend's blood"(Leviticus 19:16).</span></p><div class="templatequotecite" data-dcnode-id="2975"><span data-dcnode-id="2981" instrument_node="">— </span><cite data-dcnode-id="2976"><span data-dcnode-id="2980" instrument_node="">Rabbi Dr. Azriel Rosenfeld</span><sup class="reference" data-dcnode-id="2977" id="cite_ref-39"><a data-dcnode-id="2978" href="#cite_note-39"><span data-dcnode-id="2979" instrument_node="">[39]</span></a></sup></cite></div></blockquote><span data-dcnode-id="2973" instrument_node="">
</span><p data-dcnode-id="2967"><span data-dcnode-id="2972" instrument_node="">In the Talmud, Genesis 9:5 is interpreted as a prohibition against killing oneself, and Genesis 9:6 is "cited in support for the prohibition of abortion."</span><sup class="reference" data-dcnode-id="2969" id="cite_ref-40"><a data-dcnode-id="2970" href="#cite_note-40"><span data-dcnode-id="2971" instrument_node="">[40]</span></a></sup><span data-dcnode-id="2968" instrument_node="">
</span></p><p data-dcnode-id="2935"><span data-dcnode-id="2966" instrument_node="">According to the </span><i data-dcnode-id="2963"><a data-dcnode-id="2964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mishnah" title="Mishnah"><span data-dcnode-id="2965" instrument_node="">Mishnah</span></a></i><span data-dcnode-id="2962" instrument_node=""> (older part of the </span><i data-dcnode-id="2960"><span data-dcnode-id="2961" instrument_node="">Talmud</span></i><span data-dcnode-id="2959" instrument_node="">), it is said of </span><a data-dcnode-id="2957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hillel_the_Elder" title="Hillel the Elder"><span data-dcnode-id="2958" instrument_node="">Hillel the Elder</span></a><span data-dcnode-id="2956" instrument_node=""> that he saw a skull that was floating on top of the water and he said (to it): "Since you drowned [others, others] drowned you. And in the end, those that drowned you will be drowned."</span><sup class="reference" data-dcnode-id="2953" id="cite_ref-41"><a data-dcnode-id="2954" href="#cite_note-41"><span data-dcnode-id="2955" instrument_node="">[41]</span></a></sup><span data-dcnode-id="2952" instrument_node=""> From </span><a data-dcnode-id="2950" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rabbi_Tarfon" title="Rabbi Tarfon"><span data-dcnode-id="2951" instrument_node="">Rabbi Tarfon</span></a><span data-dcnode-id="2949" instrument_node=""> and </span><a data-dcnode-id="2947" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rabbi_Akiva" title="Rabbi Akiva"><span data-dcnode-id="2948" instrument_node="">Rabbi Akiva</span></a><span data-dcnode-id="2946" instrument_node=""> it is stated in the </span><i data-dcnode-id="2944"><span data-dcnode-id="2945" instrument_node="">Mishnah</span></i><span data-dcnode-id="2943" instrument_node="">: "If we were on the </span><i data-dcnode-id="2941"><span data-dcnode-id="2942" instrument_node="">Sanhedrin</span></i><span data-dcnode-id="2940" instrument_node="">, nobody would have ever been executed."</span><sup class="reference" data-dcnode-id="2937" id="cite_ref-42"><a data-dcnode-id="2938" href="#cite_note-42"><span data-dcnode-id="2939" instrument_node="">[42]</span></a></sup><span data-dcnode-id="2936" instrument_node="">
</span></p><p data-dcnode-id="2923"><span data-dcnode-id="2934" instrument_node="">According to conservative rabbi </span><a data-dcnode-id="2932" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Louis_Ginzberg" title="Louis Ginzberg"><span data-dcnode-id="2933" instrument_node="">Louis Ginzberg</span></a><span data-dcnode-id="2931" instrument_node="">, every slain man who, because of murdering, died before their time shall stay in outer part of </span><a data-dcnode-id="2929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sheol" title="Sheol"><span data-dcnode-id="2930" instrument_node="">Sheol</span></a><span data-dcnode-id="2928" instrument_node=""> until the course of the time predestined them is run.</span><sup class="reference" data-dcnode-id="2925" id="cite_ref-43"><a data-dcnode-id="2926" href="#cite_note-43"><span data-dcnode-id="2927" instrument_node="">[43]</span></a></sup><span data-dcnode-id="2924" instrument_node="">
</span></p><span data-dcnode-id="2922" instrument_node="">
</span><h2 data-dcnode-id="2912"><span class="mw-headline" data-dcnode-id="2920" id="New_Testament_doctrine"><span data-dcnode-id="2921" instrument_node="">New Testament doctrine</span></span><span class="mw-editsection" data-dcnode-id="2913"><span class="mw-editsection-bracket" data-dcnode-id="2918"><span data-dcnode-id="2919" instrument_node="">[</span></span><a data-dcnode-id="2916" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DThou_shalt_not_kill%26action%3Dedit%26section%3D7" title="Edit section: New Testament doctrine"><span data-dcnode-id="2917" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2914"><span data-dcnode-id="2915" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2911" instrument_node="">
</span><link data-dcnode-id="2910" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="2906" role="note"><span data-dcnode-id="2909" instrument_node="">See also: </span><a class="mw-redirect" data-dcnode-id="2907" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Biblical_law_in_Christianity" title="Biblical law in Christianity"><span data-dcnode-id="2908" instrument_node="">Biblical law in Christianity</span></a></div><span data-dcnode-id="2905" instrument_node="">
</span><table class="box-POV plainlinks metadata ambox ambox-content ambox-POV" data-dcnode-id="2867" role="presentation"><tbody data-dcnode-id="2868"><tr data-dcnode-id="2869"><td class="mbox-image" data-dcnode-id="2902"><div data-dcnode-id="2903" style="width:52px"><img alt="Unbalanced scales.svg" data-dcnode-id="2904" data-file-height="354" data-file-width="400" decoding="async" height="40" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/f/fe/Unbalanced_scales.svg/45px-Unbalanced_scales.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/f/fe/Unbalanced_scales.svg/68px-Unbalanced_scales.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/f/fe/Unbalanced_scales.svg/90px-Unbalanced_scales.svg.png 2x" width="45"></div></td><td class="mbox-text" data-dcnode-id="2870"><div class="mbox-text-span" data-dcnode-id="2871"><span data-dcnode-id="2901" instrument_node="">The </span><b data-dcnode-id="2895"><a data-dcnode-id="2899" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ANeutral_point_of_view" title="Wikipedia:Neutral point of view"><span data-dcnode-id="2900" instrument_node="">neutrality</span></a><span data-dcnode-id="2898" instrument_node=""> of this section is </span><a data-dcnode-id="2896" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ANPOV_dispute" title="Wikipedia:NPOV dispute"><span data-dcnode-id="2897" instrument_node="">disputed</span></a></b><span data-dcnode-id="2894" instrument_node="">.</span><span class="hide-when-compact" data-dcnode-id="2886"><span data-dcnode-id="2893" instrument_node=""> Relevant discussion may be found on the </span><a data-dcnode-id="2891" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Talk%3AThou_shalt_not_kill%23%2523" title="Talk:Thou shalt not kill"><span data-dcnode-id="2892" instrument_node="">talk page</span></a><span data-dcnode-id="2890" instrument_node="">. Please do not remove this message until </span><a data-dcnode-id="2888" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Template%3APOV%23When_to_remove" title="Template:POV"><span data-dcnode-id="2889" instrument_node="">conditions to do so are met</span></a><span data-dcnode-id="2887" instrument_node="">.</span></span><span data-dcnode-id="2885" instrument_node=""> </span><span class="date-container" data-dcnode-id="2879"><i data-dcnode-id="2880"><span data-dcnode-id="2884" instrument_node="">(</span><span class="date" data-dcnode-id="2882"><span data-dcnode-id="2883" instrument_node="">April 2017</span></span><span data-dcnode-id="2881" instrument_node="">)</span></i></span><span class="hide-when-compact" data-dcnode-id="2872"><i data-dcnode-id="2873"><span data-dcnode-id="2878" instrument_node=""> (</span><small data-dcnode-id="2875"><a data-dcnode-id="2876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Help%3AMaintenance_template_removal" title="Help:Maintenance template removal"><span data-dcnode-id="2877" instrument_node="">Learn how and when to remove this template message</span></a></small><span data-dcnode-id="2874" instrument_node="">)</span></i></span></div></td></tr></tbody></table><span data-dcnode-id="2866" instrument_node="">
</span><p data-dcnode-id="2852"><span data-dcnode-id="2865" instrument_node="">The New Testament is in agreement that murder is a grave moral evil,</span><sup class="reference" data-dcnode-id="2862" id="cite_ref-44"><a data-dcnode-id="2863" href="#cite_note-44"><span data-dcnode-id="2864" instrument_node="">[44]</span></a></sup><span data-dcnode-id="2861" instrument_node=""> and maintains the Old Testament view of bloodguilt.</span><sup class="reference" data-dcnode-id="2858" id="cite_ref-45"><a data-dcnode-id="2859" href="#cite_note-45"><span data-dcnode-id="2860" instrument_node="">[45]</span></a></sup><span data-dcnode-id="2857" instrument_node=""> Jesus himself repeats and expands upon the commandment, "Do not murder."</span><sup class="reference" data-dcnode-id="2854" id="cite_ref-46"><a data-dcnode-id="2855" href="#cite_note-46"><span data-dcnode-id="2856" instrument_node="">[46]</span></a></sup><span data-dcnode-id="2853" instrument_node=""> The New Testament depicts Jesus as explaining that murder, as well as other sins, comes from the heart.
</span></p><span data-dcnode-id="2851" instrument_node="">
</span><link data-dcnode-id="2850" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="2843"><p data-dcnode-id="2848"><span data-dcnode-id="2849" instrument_node="">For out of the heart come evil thoughts, murder, adultery, sexual immorality, theft, false testimony, slander.</span></p><div class="templatequotecite" data-dcnode-id="2844"><span data-dcnode-id="2847" instrument_node="">— </span><cite data-dcnode-id="2845"><span data-dcnode-id="2846" instrument_node="">Matthew 15:19 (NIV)</span></cite></div></blockquote><span data-dcnode-id="2842" instrument_node="">
</span><p data-dcnode-id="2816"><span data-dcnode-id="2841" instrument_node="">The New Testament acknowledges the just and proper role of civil government in maintaining justice</span><sup class="reference" data-dcnode-id="2838" id="cite_ref-47"><a data-dcnode-id="2839" href="#cite_note-47"><span data-dcnode-id="2840" instrument_node="">[47]</span></a></sup><span data-dcnode-id="2837" instrument_node=""> and punishing evildoers, even to the point of "bearing the sword."</span><sup class="reference" data-dcnode-id="2834" id="cite_ref-48"><a data-dcnode-id="2835" href="#cite_note-48"><span data-dcnode-id="2836" instrument_node="">[48]</span></a></sup><span data-dcnode-id="2833" instrument_node=""> One criminal on the cross contrasts his death as due punishment with Jesus' death as an innocent man.</span><sup class="reference" data-dcnode-id="2830" id="cite_ref-49"><a data-dcnode-id="2831" href="#cite_note-49"><span data-dcnode-id="2832" instrument_node="">[49]</span></a></sup><span data-dcnode-id="2829" instrument_node=""> When Jesus appeared before Pilate, both Pilate</span><sup class="reference" data-dcnode-id="2826" id="cite_ref-50"><a data-dcnode-id="2827" href="#cite_note-50"><span data-dcnode-id="2828" instrument_node="">[50]</span></a></sup><span data-dcnode-id="2825" instrument_node=""> and the crowd</span><sup class="reference" data-dcnode-id="2822" id="cite_ref-51"><a data-dcnode-id="2823" href="#cite_note-51"><span data-dcnode-id="2824" instrument_node="">[51]</span></a></sup><span data-dcnode-id="2821" instrument_node=""> recognize the principles of bloodguilt.  There is no indication in the New Testament that it is unjust, immoral, or inappropriate for secular civil governments to execute those guilty of shedding innocent blood.</span><sup class="reference" data-dcnode-id="2818" id="cite_ref-52"><a data-dcnode-id="2819" href="#cite_note-52"><span data-dcnode-id="2820" instrument_node="">[52]</span></a></sup><span data-dcnode-id="2817" instrument_node="">
</span></p><p data-dcnode-id="2785"><span data-dcnode-id="2815" instrument_node="">Like the Old Testament, the New Testament seems to depict the lawful use of force by soldiers in legitimate battles as justified.</span><sup class="reference" data-dcnode-id="2812" id="cite_ref-53"><a data-dcnode-id="2813" href="#cite_note-53"><span data-dcnode-id="2814" instrument_node="">[53]</span></a></sup><span data-dcnode-id="2811" instrument_node=""> The profession of soldier is used as a metaphor by </span><a data-dcnode-id="2809" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paul_the_Apostle" title="Paul the Apostle"><span data-dcnode-id="2810" instrument_node="">Paul</span></a><span data-dcnode-id="2808" instrument_node=""> exhorting the </span><a data-dcnode-id="2806" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Epistle_to_the_Ephesians" title="Epistle to the Ephesians"><span data-dcnode-id="2807" instrument_node="">Ephesians</span></a><span data-dcnode-id="2805" instrument_node=""> to "put on the full </span><a data-dcnode-id="2803" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Armor_of_God" title="Armor of God"><span data-dcnode-id="2804" instrument_node="">armor of God</span></a><span data-dcnode-id="2802" instrument_node="">."</span><sup class="reference" data-dcnode-id="2799" id="cite_ref-54"><a data-dcnode-id="2800" href="#cite_note-54"><span data-dcnode-id="2801" instrument_node="">[54]</span></a></sup><span data-dcnode-id="2798" instrument_node=""> Cornelius, the Roman centurion, is portrayed as a righteous and God-fearing man.</span><sup class="reference" data-dcnode-id="2795" id="cite_ref-55"><a data-dcnode-id="2796" href="#cite_note-55"><span data-dcnode-id="2797" instrument_node="">[55]</span></a></sup><span data-dcnode-id="2794" instrument_node=""> Jesus praises the faith of a Roman centurion on the occasion of healing the centurion's servant, and states that he has not found such great faith even in Israel.</span><sup class="reference" data-dcnode-id="2791" id="cite_ref-56"><a data-dcnode-id="2792" href="#cite_note-56"><span data-dcnode-id="2793" instrument_node="">[56]</span></a></sup><span data-dcnode-id="2790" instrument_node=""> When John the Baptist was preaching repentance and baptizing penitent sinners in the Jordan River, soldiers came to John and asked for specific instructions regarding their repentance.  John the Baptist did not demand that the soldiers renounce their profession, instead he exhorted them to be content with their pay.</span><sup class="reference" data-dcnode-id="2787" id="cite_ref-57"><a data-dcnode-id="2788" href="#cite_note-57"><span data-dcnode-id="2789" instrument_node="">[57]</span></a></sup><span data-dcnode-id="2786" instrument_node="">
</span></p><span data-dcnode-id="2784" instrument_node="">
</span><link data-dcnode-id="2783" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="2776"><p data-dcnode-id="2781"><span data-dcnode-id="2782" instrument_node="">Don't extort money and don't accuse people falsely—be content with your pay.</span></p><div class="templatequotecite" data-dcnode-id="2777"><span data-dcnode-id="2780" instrument_node="">— </span><cite data-dcnode-id="2778"><span data-dcnode-id="2779" instrument_node="">Luke 3:14 (NIV)</span></cite></div></blockquote><span data-dcnode-id="2775" instrument_node="">
</span><p data-dcnode-id="2769"><span data-dcnode-id="2774" instrument_node="">Jesus was not condoning violence as the very next verse confirms it was to satisfy the prophecy of Isaiah 53 when he told his disciples to buy a sword if they do not have one, "now if you have a purse, take it, and also a bag; and if you don't have a sword, sell your cloak and buy one."</span><sup class="reference" data-dcnode-id="2771" id="cite_ref-58"><a data-dcnode-id="2772" href="#cite_note-58"><span data-dcnode-id="2773" instrument_node="">[58]</span></a></sup><span data-dcnode-id="2770" instrument_node=""> Jesus was quick to correct his servant for the improper use of the sword in cutting off the ear of the high-priest's servant.
</span></p><span data-dcnode-id="2768" instrument_node="">
</span><link data-dcnode-id="2767" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="2760"><p data-dcnode-id="2765"><span data-dcnode-id="2766" instrument_node="">Then said Jesus unto him, Put up again thy sword into his place: for all they that take the sword shall perish with the sword. Thinkest thou that I cannot now pray to my Father, and he shall presently give me more than twelve legions of angels? </span></p><div class="templatequotecite" data-dcnode-id="2761"><span data-dcnode-id="2764" instrument_node="">— </span><cite data-dcnode-id="2762"><span data-dcnode-id="2763" instrument_node="">Matthew 26:52–53 (KJV)</span></cite></div></blockquote><span data-dcnode-id="2759" instrument_node="">
</span><p data-dcnode-id="2753"><span data-dcnode-id="2758" instrument_node="">In John 8:7 Jesus replied to the question of capital punishment because of adultery to </span><a class="extiw" data-dcnode-id="2755" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wiktionary.org/wiki/let_him_who_is_without_sin_cast_the_first_stone" title="wikt:let him who is without sin cast the first stone"><i data-dcnode-id="2756"><span data-dcnode-id="2757" instrument_node="">let him who is without sin cast the first stone</span></i></a><span data-dcnode-id="2754" instrument_node=""> – and no one did.
</span></p><span data-dcnode-id="2752" instrument_node="">
</span><h2 data-dcnode-id="2742"><span class="mw-headline" data-dcnode-id="2750" id="Catholic_doctrine"><span data-dcnode-id="2751" instrument_node="">Catholic doctrine</span></span><span class="mw-editsection" data-dcnode-id="2743"><span class="mw-editsection-bracket" data-dcnode-id="2748"><span data-dcnode-id="2749" instrument_node="">[</span></span><a data-dcnode-id="2746" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DThou_shalt_not_kill%26action%3Dedit%26section%3D8" title="Edit section: Catholic doctrine"><span data-dcnode-id="2747" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2744"><span data-dcnode-id="2745" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2741" instrument_node="">
</span><p data-dcnode-id="2700"><span data-dcnode-id="2740" instrument_node="">This commandment demands respect for human life and is more accurately translated as "thou shalt not murder." Killing may, under limited circumstances, be justified within Catholicism.</span><sup class="reference" data-dcnode-id="2737" id="cite_ref-59"><a data-dcnode-id="2738" href="#cite_note-59"><span data-dcnode-id="2739" instrument_node="">[59]</span></a></sup><span data-dcnode-id="2736" instrument_node=""> The basis of all Catholic teaching about the fifth commandment is the "</span><a data-dcnode-id="2734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sanctity_of_life" title="Sanctity of life"><span data-dcnode-id="2735" instrument_node="">sanctity of life</span></a><span data-dcnode-id="2733" instrument_node="">", which is often contrasted with the "</span><a class="mw-redirect" data-dcnode-id="2731" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Quality_of_Life_%28Healthcare%29" title="Quality of Life (Healthcare)"><span data-dcnode-id="2732" instrument_node="">quality of life</span></a><span data-dcnode-id="2730" instrument_node="">" to some extent.</span><sup class="reference" data-dcnode-id="2727" id="cite_ref-60"><a data-dcnode-id="2728" href="#cite_note-60"><span data-dcnode-id="2729" instrument_node="">[60]</span></a></sup><sup class="reference" data-dcnode-id="2724" id="cite_ref-61"><a data-dcnode-id="2725" href="#cite_note-61"><span data-dcnode-id="2726" instrument_node="">[61]</span></a></sup><sup class="reference" data-dcnode-id="2721" id="cite_ref-62"><a data-dcnode-id="2722" href="#cite_note-62"><span data-dcnode-id="2723" instrument_node="">[62]</span></a></sup><sup class="reference" data-dcnode-id="2718" id="cite_ref-63"><a data-dcnode-id="2719" href="#cite_note-63"><span data-dcnode-id="2720" instrument_node="">[63]</span></a></sup><span data-dcnode-id="2717" instrument_node=""> The Church is actively involved in the public debates over </span><a data-dcnode-id="2715" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Abortion" title="Abortion"><span data-dcnode-id="2716" instrument_node="">abortion</span></a><span data-dcnode-id="2714" instrument_node="">, </span><a data-dcnode-id="2712" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Capital_punishment" title="Capital punishment"><span data-dcnode-id="2713" instrument_node="">capital punishment</span></a><span data-dcnode-id="2711" instrument_node=""> and </span><a data-dcnode-id="2709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Euthanasia" title="Euthanasia"><span data-dcnode-id="2710" instrument_node="">euthanasia</span></a><span data-dcnode-id="2708" instrument_node="">, and encourages believers to support legislation and politicians it describes as </span><a class="mw-redirect" data-dcnode-id="2706" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pro-life" title="Pro-life"><span data-dcnode-id="2707" instrument_node="">pro-life</span></a><span data-dcnode-id="2705" instrument_node="">.</span><sup class="reference" data-dcnode-id="2702" id="cite_ref-64"><a data-dcnode-id="2703" href="#cite_note-64"><span data-dcnode-id="2704" instrument_node="">[64]</span></a></sup><span data-dcnode-id="2701" instrument_node="">
</span></p><span data-dcnode-id="2699" instrument_node="">
</span><h3 data-dcnode-id="2689"><span class="mw-headline" data-dcnode-id="2697" id="Abortion"><span data-dcnode-id="2698" instrument_node="">Abortion</span></span><span class="mw-editsection" data-dcnode-id="2690"><span class="mw-editsection-bracket" data-dcnode-id="2695"><span data-dcnode-id="2696" instrument_node="">[</span></span><a data-dcnode-id="2693" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DThou_shalt_not_kill%26action%3Dedit%26section%3D9" title="Edit section: Abortion"><span data-dcnode-id="2694" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2691"><span data-dcnode-id="2692" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2688" instrument_node="">
</span><link data-dcnode-id="2687" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="2683" role="note"><span data-dcnode-id="2686" instrument_node="">Main article: </span><a data-dcnode-id="2684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Catholic_Church_and_abortion" title="Catholic Church and abortion"><span data-dcnode-id="2685" instrument_node="">Catholic Church and abortion</span></a></div><span data-dcnode-id="2682" instrument_node="">
</span><p data-dcnode-id="2676"><span data-dcnode-id="2681" instrument_node="">According to the </span><i data-dcnode-id="2678"><a data-dcnode-id="2679" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Catechism_of_the_Catholic_Church" title="Catechism of the Catholic Church"><span data-dcnode-id="2680" instrument_node="">Catechism of the Catholic Church</span></a></i><span data-dcnode-id="2677" instrument_node="">:
</span></p><span data-dcnode-id="2675" instrument_node="">
</span><link data-dcnode-id="2674" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="2662"><p data-dcnode-id="2663"><span data-dcnode-id="2673" instrument_node="">Human life is sacred'’ because from its beginning it involves the creative action of God and it remains for ever in a special relationship with the Creator, who is its sole end. God alone is the Lord of life from its beginning until its end: no one can under any circumstance claim for himself the right directly to destroy an innocent human being… The deliberate murder of an innocent person is gravely contrary to the dignity of the human being, to the golden rule, and to the holiness of the Creator. The law forbidding it is universally valid: it obliges each and everyone, always and everywhere... The fifth commandment forbids </span><a class="mw-redirect" data-dcnode-id="2671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Direct_and_intentional" title="Direct and intentional"><span data-dcnode-id="2672" instrument_node="">direct and intentional</span></a><span data-dcnode-id="2670" instrument_node=""> killing as </span><a data-dcnode-id="2668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mortal_sin" title="Mortal sin"><span data-dcnode-id="2669" instrument_node="">gravely sinful</span></a><span data-dcnode-id="2667" instrument_node="">. The murderer and those who cooperate voluntarily in murder commit a sin that cries out to heaven for vengeance.</span><sup class="reference" data-dcnode-id="2664" id="cite_ref-65"><a data-dcnode-id="2665" href="#cite_note-65"><span data-dcnode-id="2666" instrument_node="">[65]</span></a></sup></p></blockquote><span data-dcnode-id="2661" instrument_node="">
</span><p data-dcnode-id="2649"><span data-dcnode-id="2660" instrument_node="">The </span><i data-dcnode-id="2658"><span data-dcnode-id="2659" instrument_node="">Catechism</span></i><span data-dcnode-id="2657" instrument_node=""> states that </span><a class="mw-redirect" data-dcnode-id="2655" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Abortion_and_the_Catholic_Church" title="Abortion and the Catholic Church"><span data-dcnode-id="2656" instrument_node="">abortion</span></a><span data-dcnode-id="2654" instrument_node=""> is a grave moral evil because the act takes an innocent human life: human life must be respected and protected absolutely from the moment of conception. From the first moment of his existence, "a human being must be recognized as having the rights of a person – among which is the inviolable right of every innocent being to life."</span><sup class="reference" data-dcnode-id="2651" id="cite_ref-vatican2_66-0"><a data-dcnode-id="2652" href="#cite_note-vatican2-66"><span data-dcnode-id="2653" instrument_node="">[66]</span></a></sup><span data-dcnode-id="2650" instrument_node="">
</span></p><span data-dcnode-id="2648" instrument_node="">
</span><h3 data-dcnode-id="2638"><span class="mw-headline" data-dcnode-id="2646" id="Capital_punishment"><span data-dcnode-id="2647" instrument_node="">Capital punishment</span></span><span class="mw-editsection" data-dcnode-id="2639"><span class="mw-editsection-bracket" data-dcnode-id="2644"><span data-dcnode-id="2645" instrument_node="">[</span></span><a data-dcnode-id="2642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DThou_shalt_not_kill%26action%3Dedit%26section%3D10" title="Edit section: Capital punishment"><span data-dcnode-id="2643" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2640"><span data-dcnode-id="2641" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2637" instrument_node="">
</span><link data-dcnode-id="2636" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="2632" role="note"><span data-dcnode-id="2635" instrument_node="">Main article: </span><a data-dcnode-id="2633" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Catholic_Church_and_capital_punishment" title="Catholic Church and capital punishment"><span data-dcnode-id="2634" instrument_node="">Catholic Church and capital punishment</span></a></div><span data-dcnode-id="2631" instrument_node="">
</span><p data-dcnode-id="2625"><span data-dcnode-id="2630" instrument_node="">Legitimate defense is depicted as justifiable, even if the defender deals his aggressor a lethal blow.  However, a person should not use more force than necessary to repel an attack.  The legitimate defense of persons and societies should not be considered as an exception to the prohibition of murdering the innocent: the preservation of innocent life is seen as the intended outcome.  Injury or death to the aggressor is not the intended outcome, it is the unfortunate consequence of using necessary force to repel an imminent threat.</span><sup class="reference" data-dcnode-id="2627" id="cite_ref-67"><a data-dcnode-id="2628" href="#cite_note-67"><span data-dcnode-id="2629" instrument_node="">[67]</span></a></sup><span data-dcnode-id="2626" instrument_node="">
</span></p><p data-dcnode-id="2615"><span data-dcnode-id="2624" instrument_node="">Legitimate defense can be not only a right but a grave duty for one who is responsible for the lives of others.</span><sup class="reference" data-dcnode-id="2621" id="cite_ref-68"><a data-dcnode-id="2622" href="#cite_note-68"><span data-dcnode-id="2623" instrument_node="">[68]</span></a></sup><span data-dcnode-id="2620" instrument_node=""> The Catechism says: "The defense of the common good requires that an unjust aggressor be rendered unable to cause harm. For this reason, those who legitimately hold authority also have the right to use arms to repel aggressors against the civil community entrusted to their responsibility."</span><sup class="reference" data-dcnode-id="2617" id="cite_ref-69"><a data-dcnode-id="2618" href="#cite_note-69"><span data-dcnode-id="2619" instrument_node="">[69]</span></a></sup><span data-dcnode-id="2616" instrument_node="">
