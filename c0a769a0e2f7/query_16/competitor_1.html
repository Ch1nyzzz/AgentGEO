</span></p><p data-dcnode-id="2586"><span data-dcnode-id="2614" instrument_node="">The </span><i data-dcnode-id="2612"><span data-dcnode-id="2613" instrument_node="">Catechism</span></i><span data-dcnode-id="2611" instrument_node=""> teaches that legitimate public authority has the right and duty to punish criminals proportionally to the gravity of the offense to safeguard the public good.  Nonlethal means are preferred, if these are sufficient to defend and protect people's safety. Recourse to the death penalty was not excluded in the past. In August 2018 the </span><a data-dcnode-id="2609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Congregation_for_the_Doctrine_of_the_Faith" title="Congregation for the Doctrine of the Faith"><span data-dcnode-id="2610" instrument_node="">Congregation for the Doctrine of the Faith</span></a><span data-dcnode-id="2608" instrument_node=""> with the approval of Pope Francis changed paragraph 2267 of the </span><a data-dcnode-id="2606" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Catechism_of_the_Catholic_Church" title="Catechism of the Catholic Church"><span data-dcnode-id="2607" instrument_node="">Catechism of the Catholic Church</span></a><span data-dcnode-id="2605" instrument_node=""> and declared that the death penalty is always regarded as inadmissible.</span><sup class="reference" data-dcnode-id="2602" id="cite_ref-70"><a data-dcnode-id="2603" href="#cite_note-70"><span data-dcnode-id="2604" instrument_node="">[70]</span></a></sup><sup class="reference" data-dcnode-id="2599" id="cite_ref-71"><a data-dcnode-id="2600" href="#cite_note-71"><span data-dcnode-id="2601" instrument_node="">[71]</span></a></sup><span data-dcnode-id="2598" instrument_node=""> An </span><a data-dcnode-id="2596" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ohio" title="Ohio"><span data-dcnode-id="2597" instrument_node="">Ohio</span></a><span data-dcnode-id="2595" instrument_node=""> prosecutor publicly declared that he disagrees with that,</span><sup class="reference" data-dcnode-id="2592" id="cite_ref-72"><a data-dcnode-id="2593" href="#cite_note-72"><span data-dcnode-id="2594" instrument_node="">[72]</span></a></sup><span data-dcnode-id="2591" instrument_node=""> while Catholic US scholars drafted an appeal against the change and declared it "scandalous".</span><sup class="reference" data-dcnode-id="2588" id="cite_ref-73"><a data-dcnode-id="2589" href="#cite_note-73"><span data-dcnode-id="2590" instrument_node="">[73]</span></a></sup><span data-dcnode-id="2587" instrument_node="">
</span></p><span data-dcnode-id="2585" instrument_node="">
</span><dl data-dcnode-id="2576"><dd data-dcnode-id="2583"><span data-dcnode-id="2584" instrument_node="">Recourse to the death penalty on the part of legitimate authority, following a fair trial, was long considered an appropriate response to the gravity of certain crimes and an acceptable, albeit extreme, means of safeguarding the common good.</span></dd><span data-dcnode-id="2582" instrument_node="">
</span><dd data-dcnode-id="2577"><span data-dcnode-id="2581" instrument_node="">Today, however, there is an increasing awareness that the dignity of the person is not lost even after the commission of very serious crimes. In addition, a new understanding has emerged of the significance of penal sanctions imposed by the state. Lastly, more effective systems of detention have been developed, which ensure the due protection of citizens but, at the same time, do not definitively deprive the guilty of the possibility of redemption.</span><sup class="reference" data-dcnode-id="2578" id="cite_ref-74"><a data-dcnode-id="2579" href="#cite_note-74"><span data-dcnode-id="2580" instrument_node="">[74]</span></a></sup></dd></dl><span data-dcnode-id="2575" instrument_node="">
</span><p data-dcnode-id="2563"><span data-dcnode-id="2574" instrument_node="">In February 2016 </span><a data-dcnode-id="2572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pope_Francis" title="Pope Francis"><span data-dcnode-id="2573" instrument_node="">Pope Francis</span></a><span data-dcnode-id="2571" instrument_node=""> called for the suspension of the death penalty for the duration of the </span><a data-dcnode-id="2569" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Extraordinary_Jubilee_of_Mercy" title="Extraordinary Jubilee of Mercy"><span data-dcnode-id="2570" instrument_node="">Holy Year</span></a><span data-dcnode-id="2568" instrument_node=""> "because modern means existed to 'efficiently repress crime without definitively denying the person who committed it the possibility of rehabilitating themselves."</span><sup class="reference" data-dcnode-id="2565" id="cite_ref-75"><a data-dcnode-id="2566" href="#cite_note-75"><span data-dcnode-id="2567" instrument_node="">[75]</span></a></sup><span data-dcnode-id="2564" instrument_node="">
</span></p><span data-dcnode-id="2562" instrument_node="">
</span><h3 data-dcnode-id="2551"><span data-dcnode-id="2561" id="Suicide.2C_euthanasia.2C_health.2C_intoxication"></span><span class="mw-headline" data-dcnode-id="2559" id="Suicide,_euthanasia,_health,_intoxication"><span data-dcnode-id="2560" instrument_node="">Suicide, euthanasia, health, intoxication</span></span><span class="mw-editsection" data-dcnode-id="2552"><span class="mw-editsection-bracket" data-dcnode-id="2557"><span data-dcnode-id="2558" instrument_node="">[</span></span><a data-dcnode-id="2555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DThou_shalt_not_kill%26action%3Dedit%26section%3D11" title="Edit section: Suicide, euthanasia, health, intoxication"><span data-dcnode-id="2556" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2553"><span data-dcnode-id="2554" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2550" instrument_node="">
</span><p data-dcnode-id="2530"><span data-dcnode-id="2549" instrument_node="">Catholic teaching strictly prohibits </span><a data-dcnode-id="2547" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Euthanasia" title="Euthanasia"><span data-dcnode-id="2548" instrument_node="">euthanasia</span></a><span data-dcnode-id="2546" instrument_node=""> and </span><a data-dcnode-id="2544" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Suicide" title="Suicide"><span data-dcnode-id="2545" instrument_node="">suicide</span></a><span data-dcnode-id="2543" instrument_node=""> as violations of the commandment, "You shall not kill."</span><sup class="reference" data-dcnode-id="2540" id="cite_ref-76"><a data-dcnode-id="2541" href="#cite_note-76"><span data-dcnode-id="2542" instrument_node="">[76]</span></a></sup><span data-dcnode-id="2539" instrument_node=""> Recognizing life and health as precious gifts from God, adherents are encouraged to avoid excess of food, tobacco, alcohol, and medications.  Endangering others with excess speed or drunkenness on the roadway incurs grave guilt.</span><sup class="reference" data-dcnode-id="2536" id="cite_ref-77"><a data-dcnode-id="2537" href="#cite_note-77"><span data-dcnode-id="2538" instrument_node="">[77]</span></a></sup><span data-dcnode-id="2535" instrument_node=""> The use of drugs, except on strictly therapeutic grounds is a grave offense. Clandestine production and trafficking in drugs constitute "direct co-operation in evil."</span><sup class="reference" data-dcnode-id="2532" id="cite_ref-78"><a data-dcnode-id="2533" href="#cite_note-78"><span data-dcnode-id="2534" instrument_node="">[78]</span></a></sup><span data-dcnode-id="2531" instrument_node="">
</span></p><span data-dcnode-id="2529" instrument_node="">
</span><h3 data-dcnode-id="2519"><span class="mw-headline" data-dcnode-id="2527" id="War_and_self-defense"><span data-dcnode-id="2528" instrument_node="">War and self-defense</span></span><span class="mw-editsection" data-dcnode-id="2520"><span class="mw-editsection-bracket" data-dcnode-id="2525"><span data-dcnode-id="2526" instrument_node="">[</span></span><a data-dcnode-id="2523" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DThou_shalt_not_kill%26action%3Dedit%26section%3D12" title="Edit section: War and self-defense"><span data-dcnode-id="2524" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2521"><span data-dcnode-id="2522" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2518" instrument_node="">
</span><p data-dcnode-id="2506"><span data-dcnode-id="2517" instrument_node="">The Catholic Catechism urges prayer for the avoidance of </span><a data-dcnode-id="2515" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/War" title="War"><span data-dcnode-id="2516" instrument_node="">war</span></a><span data-dcnode-id="2514" instrument_node="">.  All citizens and governments are obliged to work toward the avoidance of war.  However, it recognizes that governments cannot be denied the lawful right to self-defense, once all peace efforts have failed.  The use of legitimate defense by a military force is considered grave and therefore subject to rigorous considerations of moral legitimacy.  Elements of </span><a data-dcnode-id="2512" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Just_war_theory" title="Just war theory"><span data-dcnode-id="2513" instrument_node="">just war theory</span></a><span data-dcnode-id="2511" instrument_node=""> are explicitly enumerated in the Catechism:</span><sup class="reference" data-dcnode-id="2508" id="cite_ref-79"><a data-dcnode-id="2509" href="#cite_note-79"><span data-dcnode-id="2510" instrument_node="">[79]</span></a></sup><span data-dcnode-id="2507" instrument_node="">
</span></p><span data-dcnode-id="2505" instrument_node="">
</span><blockquote data-dcnode-id="2491"><span data-dcnode-id="2504" instrument_node="">
</span><ul data-dcnode-id="2492"><li data-dcnode-id="2502"><span data-dcnode-id="2503" instrument_node="">the damage inflicted by the aggressor on the nation or community of nations must be lasting, grave, and certain;</span></li><span data-dcnode-id="2501" instrument_node="">
</span><li data-dcnode-id="2499"><span data-dcnode-id="2500" instrument_node="">all other means of putting an end to it must have been shown to be impractical or ineffective;</span></li><span data-dcnode-id="2498" instrument_node="">
</span><li data-dcnode-id="2496"><span data-dcnode-id="2497" instrument_node="">there must be serious prospects of success;</span></li><span data-dcnode-id="2495" instrument_node="">
</span><li data-dcnode-id="2493"><span data-dcnode-id="2494" instrument_node="">the use of arms must not produce evils and disorders graver than the evil to be eliminated. The power of modern means of destruction weighs very heavily in evaluating this condition.</span></li></ul></blockquote><span data-dcnode-id="2490" instrument_node="">
</span><h2 data-dcnode-id="2480"><span class="mw-headline" data-dcnode-id="2488" id="Reformation_and_Post-Reformation_doctrines"><span data-dcnode-id="2489" instrument_node="">Reformation and Post-Reformation doctrines</span></span><span class="mw-editsection" data-dcnode-id="2481"><span class="mw-editsection-bracket" data-dcnode-id="2486"><span data-dcnode-id="2487" instrument_node="">[</span></span><a data-dcnode-id="2484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DThou_shalt_not_kill%26action%3Dedit%26section%3D13" title="Edit section: Reformation and Post-Reformation doctrines"><span data-dcnode-id="2485" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2482"><span data-dcnode-id="2483" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2479" instrument_node="">
</span><h3 data-dcnode-id="2469"><span class="mw-headline" data-dcnode-id="2477" id="Lutheranism"><span data-dcnode-id="2478" instrument_node="">Lutheranism</span></span><span class="mw-editsection" data-dcnode-id="2470"><span class="mw-editsection-bracket" data-dcnode-id="2475"><span data-dcnode-id="2476" instrument_node="">[</span></span><a data-dcnode-id="2473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DThou_shalt_not_kill%26action%3Dedit%26section%3D14" title="Edit section: Lutheranism"><span data-dcnode-id="2474" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2471"><span data-dcnode-id="2472" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2468" instrument_node="">
</span><p data-dcnode-id="2464"><a data-dcnode-id="2466" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Martin_Luther" title="Martin Luther"><span data-dcnode-id="2467" instrument_node="">Martin Luther</span></a><span data-dcnode-id="2465" instrument_node=""> summarized the commandment against shedding innocent blood as grounded in the fear and love of God, and as having both positive and negative aspects: negative in that we must neither harm nor hurt our neighbor's body; positive in that we must help our neighbor and care for him when he is ill.
</span></p><span data-dcnode-id="2463" instrument_node="">
</span><link data-dcnode-id="2462" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="2448"><p data-dcnode-id="2460"><span data-dcnode-id="2461" instrument_node=""> You must not murder.(Exodus 20:13)
</span></p><p data-dcnode-id="2456"><span data-dcnode-id="2459" instrument_node="">Q. What does this mean?</span><br data-dcnode-id="2458"><span data-dcnode-id="2457" instrument_node="">
</span></p><p data-dcnode-id="2449"><span data-dcnode-id="2455" instrument_node="">
A. We should fear and love God so that we may not hurt or harm our neighbor in his body, but help and befriend him in every bodily need [in every need and danger of life and body]. Martin Luther, The </span><a class="mw-redirect" data-dcnode-id="2453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Small_Catechism" title="Small Catechism"><span data-dcnode-id="2454" instrument_node="">Small Catechism</span></a><sup class="reference" data-dcnode-id="2450" id="cite_ref-80"><a data-dcnode-id="2451" href="#cite_note-80"><span data-dcnode-id="2452" instrument_node="">[80]</span></a></sup></p></blockquote><span data-dcnode-id="2447" instrument_node="">
</span><p data-dcnode-id="2445"><span data-dcnode-id="2446" instrument_node="">In a more detailed teaching, Martin Luther explains that God and government are not constrained by the commandment not to kill, but that God has delegated his authority in punishing evildoers to the government.  The prohibition of killing is forbidden to the individual in his relation to anyone else, and not to the government.
</span></p><span data-dcnode-id="2444" instrument_node="">
</span><link data-dcnode-id="2443" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="2431"><p data-dcnode-id="2441"><span data-dcnode-id="2442" instrument_node="">We have now completed both the spiritual and the temporal government, that is, the divine and the paternal authority and obedience. But here now we go forth from our house among our neighbors to learn how we should live with one another, every one himself toward his neighbor. Therefore God and government are not included in this commandment nor is the power to kill, which they have taken away. For God has delegated His authority to punish evil-doers to the government instead of parents, who aforetime (as we read in Moses) were required to bring their own children to judgment and sentence them to death. Therefore, what is here forbidden is forbidden to the individual in his relation to any one else, and not to the government.</span></p><div class="templatequotecite" data-dcnode-id="2432"><span data-dcnode-id="2440" instrument_node="">— </span><cite data-dcnode-id="2433"><span data-dcnode-id="2439" instrument_node="">Martin Luther, </span><a class="mw-redirect" data-dcnode-id="2437" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Large_Catechism" title="Large Catechism"><span data-dcnode-id="2438" instrument_node="">Large Catechism</span></a><sup class="reference" data-dcnode-id="2434" id="cite_ref-81"><a data-dcnode-id="2435" href="#cite_note-81"><span data-dcnode-id="2436" instrument_node="">[81]</span></a></sup></cite></div></blockquote><span data-dcnode-id="2430" instrument_node="">
</span><p data-dcnode-id="2421"><span data-dcnode-id="2429" instrument_node="">Today, the </span><a data-dcnode-id="2427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lutheran_Church_of_Australia" title="Lutheran Church of Australia"><span data-dcnode-id="2428" instrument_node="">Lutheran Church of Australia</span></a><span data-dcnode-id="2426" instrument_node=""> recognises conscientious objection to war as biblically legitimate. It has declared, "The church...  accepts the validity of a  person's refusal to engage in military service if he or she is convinced that participation in a  military conflict amounts to the transgression of God's commandment  'You shall not kill'."</span><sup class="reference" data-dcnode-id="2423" id="cite_ref-82"><a data-dcnode-id="2424" href="#cite_note-82"><span data-dcnode-id="2425" instrument_node="">[82]</span></a></sup><span data-dcnode-id="2422" instrument_node="">
</span></p><span data-dcnode-id="2420" instrument_node="">
</span><h3 data-dcnode-id="2410"><span class="mw-headline" data-dcnode-id="2418" id="Calvinism"><span data-dcnode-id="2419" instrument_node="">Calvinism</span></span><span class="mw-editsection" data-dcnode-id="2411"><span class="mw-editsection-bracket" data-dcnode-id="2416"><span data-dcnode-id="2417" instrument_node="">[</span></span><a data-dcnode-id="2414" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DThou_shalt_not_kill%26action%3Dedit%26section%3D15" title="Edit section: Calvinism"><span data-dcnode-id="2415" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2412"><span data-dcnode-id="2413" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2409" instrument_node="">
</span><p data-dcnode-id="2391"><span data-dcnode-id="2408" instrument_node="">In </span><a class="mw-redirect" data-dcnode-id="2406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Institutes_of_the_Christian_Religion" title="The Institutes of the Christian Religion"><span data-dcnode-id="2407" instrument_node="">The Institutes of the Christian Religion</span></a><span data-dcnode-id="2405" instrument_node="">, </span><a data-dcnode-id="2403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Calvin" title="John Calvin"><span data-dcnode-id="2404" instrument_node="">John Calvin</span></a><span data-dcnode-id="2402" instrument_node=""> viewed the purport of this commandment as the safety of all being entrusted to each person.  All violence and injustice, and every kind of harm from which our neighbor's body suffers is thereby prohibited.  Christians are therefore required to faithfully perform that which is within their power to defend the life of their neighbor, be vigilant in warding off harm, and assist in removing danger when it comes. Calvin asserts that the same rule must also be applied in regulating the mind against anger, arguing that since God sees the heart and mind, the commandment against shedding innocent blood also prohibits murder of the heart and requires a sincere desire to preserve our brother's life.  The hand does not commit the murder unless it is conceived by the mind under the influence of wrath and hatred.  According to Calvin, where wrath and hatred dwell, there is an inclination to do mischief, quoting the Bible, "whosoever hateth his brother is a murderer"(</span><a class="mw-redirect" data-dcnode-id="2400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1_John" title="1 John"><span data-dcnode-id="2401" instrument_node="">1 John</span></a><span data-dcnode-id="2399" instrument_node=""> 3:15) and "whosoever is angry with his brother without a cause shall be in danger of the judgement" (</span><a data-dcnode-id="2397" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gospel_of_Matthew" title="Gospel of Matthew"><span data-dcnode-id="2398" instrument_node="">Gospel of Matthew</span></a><span data-dcnode-id="2396" instrument_node=""> 5:22).</span><sup class="reference" data-dcnode-id="2393" id="cite_ref-83"><a data-dcnode-id="2394" href="#cite_note-83"><span data-dcnode-id="2395" instrument_node="">[83]</span></a></sup><span data-dcnode-id="2392" instrument_node="">
</span></p><p data-dcnode-id="2389"><span data-dcnode-id="2390" instrument_node="">John Calvin also makes a case that the command against shedding blood is founded both in the creation of man in the image of God and in the need for a man to cherish his own flesh.
</span></p><span data-dcnode-id="2388" instrument_node="">
</span><link data-dcnode-id="2387" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="2377"><p data-dcnode-id="2385"><span data-dcnode-id="2386" instrument_node="">Scripture notes a twofold equity on which this commandment is founded. Man is both the image of God and our flesh. Wherefore, if we would not violate the image of God, we must hold the person of man sacred—if we would not divest ourselves of humanity we must cherish our own flesh. The practical inference to be drawn from the redemption and gift of Christ will be elsewhere considered. The Lord has been pleased to direct our attention to these two natural considerations as inducements to watch over our neighbour's preservation, viz., to revere the divine image impressed upon him, and embrace our own flesh. To be clear of the crime of murder, it is not enough to refrain from shedding man's blood. If in act you perpetrate, if in endeavour you plot, if in wish and design you conceive what is adverse to another's safety, you have the guilt of murder. On the other hand, if you do not according to your means and opportunity study to defend his safety, by that inhumanity you violate the law. But if the safety of the body is so carefully provided for, we may hence infer how much care and exertion is due to the safety of the soul, which is of immeasurably higher value in the sight of God. </span></p><div class="templatequotecite" data-dcnode-id="2378"><span data-dcnode-id="2384" instrument_node="">— </span><cite data-dcnode-id="2379"><span data-dcnode-id="2383" instrument_node="">John Calvin</span><sup class="reference" data-dcnode-id="2380" id="cite_ref-84"><a data-dcnode-id="2381" href="#cite_note-84"><span data-dcnode-id="2382" instrument_node="">[84]</span></a></sup></cite></div></blockquote><span data-dcnode-id="2376" instrument_node="">
</span><p data-dcnode-id="2367"><span data-dcnode-id="2375" instrument_node="">Matthew Henry considered the commandment against killing to apply to both one's own life as well as the life of one's neighbor and considered it to apply not only to causing of death but also to prohibit any thing unjustly hurtful to or injurious to the health, ease, and life of one's own body or the body of any other person.</span><sup class="reference" data-dcnode-id="2372" id="cite_ref-godstenlaws1_85-0"><a data-dcnode-id="2373" href="#cite_note-godstenlaws1-85"><span data-dcnode-id="2374" instrument_node="">[85]</span></a></sup><span data-dcnode-id="2371" instrument_node=""> He also ties the commandment against bloodshed back to the command to </span><a data-dcnode-id="2369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Noah" title="Noah"><span data-dcnode-id="2370" instrument_node="">Noah</span></a><span data-dcnode-id="2368" instrument_node="">, and he sees it as a command applying to the individual against his neighbor, but not against killing in lawful war, for one's own necessary defense, or against the government instituting due punishments for criminal offenses.  He portrays lying in wait for the blood of the innocent as a grave offense against human dignity as one of the fundamental laws of nature.
</span></p><span data-dcnode-id="2366" instrument_node="">
</span><link data-dcnode-id="2365" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="2355"><p data-dcnode-id="2363"><span data-dcnode-id="2364" instrument_node="">This is one of the laws of nature, and was strongly enforced by the precepts given to Noah and his sons, Gen. 9:5, 6. It does not forbid killing in lawful war, or in our own necessary defence, nor the magistrate’s putting offenders to death, for those things tend to the preserving of life; but it forbids all malice and hatred to the person of any (for he that hateth his brother is a murderer), and all personal revenge arising therefrom; also all rash anger upon sudden provocations, and hurt said or done, or aimed to be done, in passion: of this our Saviour expounds this commandment, Mt. 5:22. And, as that which is worst of all, it forbids persecution, laying wait for the blood of the innocent and excellent ones of the earth.</span></p><div class="templatequotecite" data-dcnode-id="2356"><span data-dcnode-id="2362" instrument_node="">— </span><cite data-dcnode-id="2357"><span data-dcnode-id="2361" instrument_node="">Matthew Henry</span><sup class="reference" data-dcnode-id="2358" id="cite_ref-godstenlaws1_85-1"><a data-dcnode-id="2359" href="#cite_note-godstenlaws1-85"><span data-dcnode-id="2360" instrument_node="">[85]</span></a></sup></cite></div></blockquote><span data-dcnode-id="2354" instrument_node="">
</span><p data-dcnode-id="2344"><a data-dcnode-id="2352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Category%3ACalvinist_pacifists" title="Category:Calvinist pacifists"><span data-dcnode-id="2353" instrument_node="">Many modern Calvinists</span></a><span data-dcnode-id="2351" instrument_node="">, such as </span><a data-dcnode-id="2349" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Andr%25C3%25A9_and_Magda_Trocm%25C3%25A9" title="André and Magda Trocmé"><span data-dcnode-id="2350" instrument_node="">André Trocmé</span></a><span data-dcnode-id="2348" instrument_node=""> and </span><a data-dcnode-id="2346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jacques_Ellul" title="Jacques Ellul"><span data-dcnode-id="2347" instrument_node="">Jacques Ellul</span></a><span data-dcnode-id="2345" instrument_node="">, have been pacifists.
</span></p><p data-dcnode-id="2335"><span data-dcnode-id="2343" instrument_node="">Today, the orthodox position of conservative Calvinists is </span><a data-dcnode-id="2341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Christian_pacifism" title="Christian pacifism"><span data-dcnode-id="2342" instrument_node="">Christian pacifism</span></a><span data-dcnode-id="2340" instrument_node="">.</span><sup class="reference" data-dcnode-id="2337" id="cite_ref-86"><a data-dcnode-id="2338" href="#cite_note-86"><span data-dcnode-id="2339" instrument_node="">[86]</span></a></sup><span data-dcnode-id="2336" instrument_node="">
</span></p><span data-dcnode-id="2334" instrument_node="">
</span><h3 data-dcnode-id="2324"><span class="mw-headline" data-dcnode-id="2332" id="Anglicanism"><span data-dcnode-id="2333" instrument_node="">Anglicanism</span></span><span class="mw-editsection" data-dcnode-id="2325"><span class="mw-editsection-bracket" data-dcnode-id="2330"><span data-dcnode-id="2331" instrument_node="">[</span></span><a data-dcnode-id="2328" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DThou_shalt_not_kill%26action%3Dedit%26section%3D16" title="Edit section: Anglicanism"><span data-dcnode-id="2329" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2326"><span data-dcnode-id="2327" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2323" instrument_node="">
</span><p data-dcnode-id="2310"><span data-dcnode-id="2322" instrument_node="">Lambeth Conference 1930 Resolution 25 declares that, "The Conference affirms that war as a method of settling international disputes is incompatible with the teaching and example of our Lord Jesus Christ."</span><sup class="reference" data-dcnode-id="2319" id="cite_ref-87"><a data-dcnode-id="2320" href="#cite_note-87"><span data-dcnode-id="2321" instrument_node="">[87]</span></a></sup><span data-dcnode-id="2318" instrument_node=""> The 1948, 1958 and 1968 conferences re-ratified this position.</span><sup class="reference" data-dcnode-id="2315" id="cite_ref-88"><a data-dcnode-id="2316" href="#cite_note-88"><span data-dcnode-id="2317" instrument_node="">[88]</span></a></sup><span data-dcnode-id="2314" instrument_node=""> The </span><a data-dcnode-id="2312" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anglican_Pacifist_Fellowship" title="Anglican Pacifist Fellowship"><span data-dcnode-id="2313" instrument_node="">Anglican Pacifist Fellowship</span></a><span data-dcnode-id="2311" instrument_node=""> lobbies the various dioceses of the Anglican Communion to uphold this agreed position.
</span></p><span data-dcnode-id="2309" instrument_node="">
