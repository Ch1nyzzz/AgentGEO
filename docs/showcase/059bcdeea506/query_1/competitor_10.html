&lt;/span&gt;&lt;/ul&gt;&lt;p data-dcnode-id=&quot;365&quot;&gt;&lt;span data-dcnode-id=&quot;366&quot; style=&quot;font-size:14px&quot;&gt;&lt;span data-dcnode-id=&quot;367&quot; instrument_node=&quot;&quot;&gt;Augmented Reality applications can be run on different mobile devices. The most commonly used devices today are tablet computers and smart phones. But also smart glasses or goggles, like the Microsoft Hololens can be used. Studies suggest that with the further development of technology the use of smart glasses or goggles will prevail. The benefit of using goggles or glasses is that both hands are free and the user can work faster and more efficiently.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;364&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;362&quot;&gt;&lt;span data-dcnode-id=&quot;363&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;361&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;354&quot;&gt;&lt;li data-dcnode-id=&quot;356&quot;&gt;&lt;span data-dcnode-id=&quot;360&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;358&quot;&gt;&lt;span data-dcnode-id=&quot;359&quot; instrument_node=&quot;&quot;&gt;What is the difference between Augmented and Virtual reality?&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;357&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;355&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;p data-dcnode-id=&quot;351&quot;&gt;&lt;span data-dcnode-id=&quot;352&quot; style=&quot;font-size:14px&quot;&gt;&lt;span data-dcnode-id=&quot;353&quot; instrument_node=&quot;&quot;&gt;Virtual reality (VR) is a purely computer-generated simulation Whereas Augmented Reality (AR) overlays additional information onto the real world.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;350&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;348&quot;&gt;&lt;span data-dcnode-id=&quot;349&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;347&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;340&quot;&gt;&lt;li data-dcnode-id=&quot;342&quot;&gt;&lt;span data-dcnode-id=&quot;346&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;344&quot;&gt;&lt;span data-dcnode-id=&quot;345&quot; instrument_node=&quot;&quot;&gt;How do you benefit from the use of Augmented Reality?&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;343&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;341&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;p data-dcnode-id=&quot;337&quot;&gt;&lt;span data-dcnode-id=&quot;338&quot; style=&quot;font-size:14px&quot;&gt;&lt;span data-dcnode-id=&quot;339&quot; instrument_node=&quot;&quot;&gt;One benefit is the displaying of useful and complementary information and the resulting saving of time. All information such as for example tools, torque specifications, measurement values, pinouts, etc. can be displayed when and where needed. For Automotive workshops, this offers the possibility of faster, better repairs thanks to simpler instructions with up to 20% less errors.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;336&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;334&quot;&gt;&lt;span data-dcnode-id=&quot;335&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;333&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;330&quot;&gt;&lt;span data-dcnode-id=&quot;331&quot; instrument_node=&quot;&quot;&gt;How to create an Augmented reality app?&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;329&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;327&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;p data-dcnode-id=&quot;318&quot;&gt;&lt;span data-dcnode-id=&quot;319&quot; style=&quot;font-size:14px&quot;&gt;&lt;span data-dcnode-id=&quot;325&quot; instrument_node=&quot;&quot;&gt;There are several ways to create an Augmented Reality application for your business case. With the aid of 3D data various providers can create these apps by programming them for dedicated use-cases and from the scratch.&lt;/span&gt;&lt;br data-dcnode-id=&quot;324&quot;&gt;&lt;span data-dcnode-id=&quot;323&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;308&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;p data-dcnode-id=&quot;301&quot;&gt;&lt;span data-dcnode-id=&quot;302&quot; style=&quot;font-size:14px&quot;&gt;&lt;span data-dcnode-id=&quot;306&quot; instrument_node=&quot;&quot;&gt;The Common Augmented Reality Platform (CAP) by Bosch enables and industrializes automated content creation at large scale. Especially companies of big size can benefit from such a platform. For example car manufacturers deal with a variety of models, versions and locations with a high demand of training or product explication. When creating AR content on their own, companies can import data directly into existing editing systems, such as xmlcompass, and save costs and time. &lt;/span&gt;&lt;a data-dcnode-id=&quot;303&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.boschautomotiveservicesolutions.com/create-own-augmented-reality-app&quot;&gt;&lt;span data-dcnode-id=&quot;304&quot; style=&quot;color:#008ECF&quot;&gt;&lt;span data-dcnode-id=&quot;305&quot; instrument_node=&quot;&quot;&gt;Read how to create an Augmented Reality app with Bosch CAP&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;300&quot; instrument_node=&quot;&quot;&gt;
