&lt;/span&gt;&lt;div data-dcnode-id=&quot;561&quot; style=&quot;text-align: justify;text-justify: inter-word;&quot;&gt;&lt;span data-dcnode-id=&quot;1044&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div data-dcnode-id=&quot;563&quot; itemprop=&quot;mainEntity&quot; itemscope=&quot;itemscope&quot; itemtype=&quot;http://schema.org/ScholarlyArticle&quot;&gt;&lt;span data-dcnode-id=&quot;1043&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;meta content=&quot;22-06-2020&quot; data-dcnode-id=&quot;1042&quot; itemprop=&quot;datePublished&quot; name=&quot;datePublished&quot;&gt;&lt;span data-dcnode-id=&quot;1041&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;meta content=&quot;https://www.ijert.org/images/default_publication_preview_large.png&quot; data-dcnode-id=&quot;1040&quot; itemprop=&quot;image&quot; name=&quot;image&quot;&gt;&lt;span data-dcnode-id=&quot;1039&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;p data-dcnode-id=&quot;1038&quot;&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1037&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 data-dcnode-id=&quot;1035&quot; itemprop=&quot;headline&quot;&gt;&lt;span data-dcnode-id=&quot;1036&quot; instrument_node=&quot;&quot;&gt;Augmented Reality Navigation&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;1034&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1032&quot;&gt;&lt;span data-dcnode-id=&quot;1033&quot; instrument_node=&quot;&quot;&gt;Munesh Kumar Sharma, Satya Chachaundiya, Vishal Department of Computer Science and Engineering Inderprastha Engineering College&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1031&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1029&quot;&gt;&lt;span data-dcnode-id=&quot;1030&quot; instrument_node=&quot;&quot;&gt;Ghaziabad 201010, UP, INDIA&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1028&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1026&quot;&gt;&lt;span data-dcnode-id=&quot;1027&quot; instrument_node=&quot;&quot;&gt;Abstract – With the introduction of the Android system, smart phones are growing faster and more easily with internet access to smart phones, user location information can be quoted any- where at any time with ease. With this growth, many new tech- nologies are introduced and to be very beneficial to the Users as they can be used with the existing technologies/applications in various fields. One of the major technologies introduced is Augmented Reality, this can be used to interact with the real world using virtual objects and videos. Augmented Reality based Technology enables the provision of a variety of infor- mation such as photos and placement of buildings in the travel field. This field can also be used in the Navigation as discussed in this paper. Most of the unconventional virtual programming used for the Visual Trace Way (Marker and Marker less meth- od). For visual tracking, digital tagging and digital information should be provided while the Non- visual Trace Way requires the use of Hardware (G.P.S, sensors etc.). Most navigation re- quests can only show the path from the user's current location to its destination. In this paper, the design and implementation of augmented reality system are discussed. It will use a well- designed smart phone camera and GPS to display user-centric information in real time on a smart phone. The proposed app will combine G.P.S location technology with tracking technology to provide the user with basic information about the building they want or one they are close to.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1025&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1023&quot;&gt;&lt;span data-dcnode-id=&quot;1024&quot; instrument_node=&quot;&quot;&gt;KEYWORDS: Augmented Reality, Navigation Systems, Indoor Tracking, Campus Navigation, Android Navigation.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1022&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ol data-dcnode-id=&quot;863&quot;&gt;&lt;span data-dcnode-id=&quot;1021&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;962&quot;&gt;&lt;span data-dcnode-id=&quot;1020&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1018&quot;&gt;&lt;span data-dcnode-id=&quot;1019&quot; instrument_node=&quot;&quot;&gt;INTRODUCTION&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1017&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1015&quot;&gt;&lt;span data-dcnode-id=&quot;1016&quot; instrument_node=&quot;&quot;&gt;For centuries, people have been trying to find ways to im- prove navigation. Historically our use of maps and com- passes in the time of exploitation or, in modern times, the use of Google Maps to find the fastest way to access their desti- nation. Navigation systems play a major role in our daily lives. Today's systems use satellite navigation technology to position and show the path to users. They usually provide turn-by-turn navigation instructions and occasional 3D ren- dering of the path. However, they run on a special device (usually a smartphone or laptop) and require the user to di- vert their attention to interact with the software. This often causes occasional dissatisfaction with users and accidents.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1014&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1012&quot;&gt;&lt;span data-dcnode-id=&quot;1013&quot; instrument_node=&quot;&quot;&gt;Augmented reality (AR) is a technology that &quot;infuses&quot; physi- cal objects into the real world. AR strives to mix the real&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1011&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1009&quot;&gt;&lt;span data-dcnode-id=&quot;1010&quot; instrument_node=&quot;&quot;&gt;world with the physical world in such a way that both physi- cal and abstract objects are visible to the user in the same space. R. Azuma describes AR as systems – &quot;combine real and virtual information, interact at real time, and are regis- tered in three dimensions&quot;. An augmented reality navigation system is a system that uses augmented reality technology to navigate the to the users. In essence, the system combines explicit navigation information with real-world objects. Such systems can be used in a variety of contexts such as motor- ized navigation, pedestrian navigation, indoor navigation, etc. In all of these cases, the goal is to help the user reach their destination successfully by adding real-world information to navigation. For example, displaying navigation marks on a car line or navigating a video camera from a smartphone with a navigation system, etc.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1008&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ol data-dcnode-id=&quot;970&quot;&gt;&lt;span data-dcnode-id=&quot;1007&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ol data-dcnode-id=&quot;972&quot;&gt;&lt;span data-dcnode-id=&quot;1006&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;998&quot;&gt;&lt;span data-dcnode-id=&quot;1005&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1003&quot;&gt;&lt;span data-dcnode-id=&quot;1004&quot; instrument_node=&quot;&quot;&gt;Goals&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1002&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1000&quot;&gt;&lt;span data-dcnode-id=&quot;1001&quot; instrument_node=&quot;&quot;&gt;The main purpose of this application is to provide a mobile- based, controlled-to-visitor solution as they move around any buildings such as College, Supermarket, Hospital, etc., and, the purpose is to reduce time-consumption, split-group and gain efficiency, accuracy, application friendliness, as well as the speed, of the application for a small area of the building.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;999&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;997&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;989&quot;&gt;&lt;span data-dcnode-id=&quot;996&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;994&quot;&gt;&lt;span data-dcnode-id=&quot;995&quot; instrument_node=&quot;&quot;&gt;Objectives&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;993&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;991&quot;&gt;&lt;span data-dcnode-id=&quot;992&quot; instrument_node=&quot;&quot;&gt;Provide an easy-to-use, mobile-based solution system, which will contain all the necessary information, to ensure conven- ience, accurate navigation and identification of various build- ings, doors and to help guests reach their desired location without difficulty.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;990&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;988&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;980&quot;&gt;&lt;span data-dcnode-id=&quot;987&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;985&quot;&gt;&lt;span data-dcnode-id=&quot;986&quot; instrument_node=&quot;&quot;&gt;Scope&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;984&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;982&quot;&gt;&lt;span data-dcnode-id=&quot;983&quot; instrument_node=&quot;&quot;&gt;The scope of the application is determined by the time alloca- tion, resources and customer demand. The scope of the pro- gram is limited and can grow the way it is done. Users can navigate the building with the advice provided by the AR browser. They can view construction, locations etc. Or they are searching for places.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;981&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;979&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;974&quot;&gt;&lt;span data-dcnode-id=&quot;978&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;976&quot;&gt;&lt;span data-dcnode-id=&quot;977&quot; instrument_node=&quot;&quot;&gt;Overview&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;975&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;973&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ol&gt;&lt;span data-dcnode-id=&quot;971&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ol&gt;&lt;span data-dcnode-id=&quot;969&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;967&quot;&gt;&lt;span data-dcnode-id=&quot;968&quot; instrument_node=&quot;&quot;&gt;In this modern era, successful navigation has become increas- ingly important as cities develop and are set to grow with skyscrapers and large buildings built continuously. Due to this need, for technologies such as the Global Positioning System, GPS was developed to help navigate. However, door-to-door is still a problem because there is no such accu- rate, efficient and risk-free technology to find the need.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;966&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;964&quot;&gt;&lt;span data-dcnode-id=&quot;965&quot; instrument_node=&quot;&quot;&gt;The project aims to use augmented reality to develop the type of advertising that facilitates circulation within the home. An augmented reality is the idea of a real world transmitted by some kind of sensory input to a production such as sound or graphic. This app is designed for smartphones as almost all smartphones today are equipped with the camera and the pro- cessing power of the graphics that provide access to other graphics. This program is developed using the Android SDK and the Vuforia Augme nted Reality SDK.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;963&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;961&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;958&quot;&gt;&lt;span data-dcnode-id=&quot;959&quot; instrument_node=&quot;&quot;&gt;RELATED WORK AND PROBLEMS&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;957&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;955&quot;&gt;&lt;span data-dcnode-id=&quot;956&quot; instrument_node=&quot;&quot;&gt;In this chapter, the existing applications and the problems associated with these applications and the problems with the present Navigation applications will be discussed.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;954&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;944&quot;&gt;&lt;span data-dcnode-id=&quot;945&quot; instrument_node=&quot;&quot;&gt;Arizona Mobile [8]
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;942&quot;&gt;&lt;span data-dcnode-id=&quot;943&quot; instrument_node=&quot;&quot;&gt;Arizona Mobile [8] is the first official app and one-touch experience for all things for University of Arizona including a navigation system. Not only does Arizona Mobile make life easier for current students, but past/ present students around the world can stay up to date with features like event calen- dars and video tours that make every user feel like theyre on campus no matter where they are.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;941&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;939&quot;&gt;&lt;span data-dcnode-id=&quot;940&quot; instrument_node=&quot;&quot;&gt;Features:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;938&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;936&quot;&gt;&lt;span data-dcnode-id=&quot;937&quot; instrument_node=&quot;&quot;&gt;Some of the main features included in this system are Maps, Phonebook and campus directory, Course listings, U-Access Student, UA-news, Event listings, Social Media, Videos, Library, Tours, Photos, Alumni, Emergency contacts.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;935&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;933&quot;&gt;&lt;span data-dcnode-id=&quot;934&quot; instrument_node=&quot;&quot;&gt;Review and Comparison:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;932&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;930&quot;&gt;&lt;span data-dcnode-id=&quot;931&quot; instrument_node=&quot;&quot;&gt;There are few unique features residing with this mobile ap- plication. For example, the users social interaction function is a new addiction. Pupils could be in updated with college news and headlines via this application. But the map is not well working with upper versions of Android mobiles be- cause there are less utility and information given. Would suggest integrating University Access into the app rather than directing to a browser for the mobile site.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;929&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;927&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;890&quot;&gt;&lt;span data-dcnode-id=&quot;926&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;924&quot;&gt;&lt;span data-dcnode-id=&quot;925&quot; instrument_node=&quot;&quot;&gt;Oregon State University Mobile [9]
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;922&quot;&gt;&lt;span data-dcnode-id=&quot;923&quot; instrument_node=&quot;&quot;&gt;The application comes in both iPhone version and Android supportive platforms. The description for the application sys- tem developed by the University of Oregon is as described below.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;921&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;919&quot;&gt;&lt;span data-dcnode-id=&quot;920&quot; instrument_node=&quot;&quot;&gt;Features:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;918&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;892&quot;&gt;&lt;span data-dcnode-id=&quot;917&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;912&quot;&gt;&lt;span data-dcnode-id=&quot;916&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;914&quot;&gt;&lt;span data-dcnode-id=&quot;915&quot; instrument_node=&quot;&quot;&gt;Offers an optimized experience for a variety of web phones and devices.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;913&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;911&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;906&quot;&gt;&lt;span data-dcnode-id=&quot;910&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;908&quot;&gt;&lt;span data-dcnode-id=&quot;909&quot; instrument_node=&quot;&quot;&gt;Can access this site from any mobile web browser, with real-time data.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;907&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;905&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;894&quot;&gt;&lt;span data-dcnode-id=&quot;904&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;902&quot;&gt;&lt;span data-dcnode-id=&quot;903&quot; instrument_node=&quot;&quot;&gt;Can find buildings on campus or track down phone numbers just using your thumb: the auto-populating people finder will even complete user typing, saving time in a crunch.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;901&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;899&quot;&gt;&lt;span data-dcnode-id=&quot;900&quot; instrument_node=&quot;&quot;&gt;Review and Comarison:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;898&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;896&quot;&gt;&lt;span data-dcnode-id=&quot;897&quot; instrument_node=&quot;&quot;&gt;It is more of iOS rather than Android. Still uses outdated iOS UI elements. Quick functionality of finding buildings and phone numbers. Could work on the add contacts. Would add the email to the wrong contact on user phone. If could link towards the online services, this app would be phenomenal.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;895&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;893&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;891&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;889&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ol&gt;&lt;span data-dcnode-id=&quot;887&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;885&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;880&quot;&gt;&lt;span data-dcnode-id=&quot;884&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;882&quot;&gt;&lt;span data-dcnode-id=&quot;883&quot; instrument_node=&quot;&quot;&gt;Problems&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;881&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;879&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ol&gt;&lt;span data-dcnode-id=&quot;877&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ol&gt;&lt;span data-dcnode-id=&quot;875&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;873&quot;&gt;&lt;span data-dcnode-id=&quot;874&quot; instrument_node=&quot;&quot;&gt;Currently, the most popular navigation systems used in the market are smartphone applications or stand-alone systems that use distance-based writing and home-satellite navigation. The navigation system usually displays a map where the nav- igation method is displayed and the user's current configura- tion. As well as this, the app works and inspires the user by providing instruction, either vision or audio, to follow the intended path. Although existing navigation applications solve the problem of navigation, they are not in the best in- terests of users. Typical navigation systems show navigation information in a restricted form that usually shows arrows pointing in the direction or by providing a &quot;bird's eye view&quot; of the map and the intended route. Look for a car navigation system that usually has a screen on the dashboard showing navigation information. The driver should look in the mirror for details. This actually gets the driver's attention out of the way and such distortion is a major problem because it puts the driver's safety at risk. In fact, research shows that distrac- tion from drivers as a result of traffic congestion has led to several accidents. This type of distraction can be prevented by using augmented reality in navigation procedures while convincing the driver to focus on the road.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;872&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;870&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;865&quot;&gt;&lt;span data-dcnode-id=&quot;869&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;867&quot;&gt;&lt;span data-dcnode-id=&quot;868&quot; instrument_node=&quot;&quot;&gt;AUGMENTED REALITY NAVIGATION&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;866&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;864&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ol&gt;&lt;span data-dcnode-id=&quot;862&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;860&quot;&gt;&lt;span data-dcnode-id=&quot;861&quot; instrument_node=&quot;&quot;&gt;In general, augmented reality navigation can work as follows:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;859&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ol data-dcnode-id=&quot;653&quot;&gt;&lt;span data-dcnode-id=&quot;858&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;853&quot;&gt;&lt;span data-dcnode-id=&quot;857&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;855&quot;&gt;&lt;span data-dcnode-id=&quot;856&quot; instrument_node=&quot;&quot;&gt;Get real-world views from the user's perspective.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;854&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;852&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;847&quot;&gt;&lt;span data-dcnode-id=&quot;851&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;849&quot;&gt;&lt;span data-dcnode-id=&quot;850&quot; instrument_node=&quot;&quot;&gt;Get user tracking location information. This information typically links GPS.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;848&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;846&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;841&quot;&gt;&lt;span data-dcnode-id=&quot;845&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;843&quot;&gt;&lt;span data-dcnode-id=&quot;844&quot; instrument_node=&quot;&quot;&gt;Generate visual world information based on real-world views and geographical location.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;842&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;840&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;655&quot;&gt;&lt;span data-dcnode-id=&quot;839&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;837&quot;&gt;&lt;span data-dcnode-id=&quot;838&quot; instrument_node=&quot;&quot;&gt;Register the physical information generated by the real world view and display the user information, thus creating augmented reality.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;836&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;834&quot;&gt;&lt;span data-dcnode-id=&quot;835&quot; instrument_node=&quot;&quot;&gt;Fig. 1: Flow Chart for AR Navigation&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;833&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;831&quot;&gt;&lt;span data-dcnode-id=&quot;832&quot; instrument_node=&quot;&quot;&gt;In the following subsections, we describe the tech- nology considerations for AR navigation systems. Thereafter we introduce different types of state-of-art systems and then list the opportunities and challenges for such systems.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;830&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ol data-dcnode-id=&quot;783&quot;&gt;&lt;span data-dcnode-id=&quot;829&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ol data-dcnode-id=&quot;785&quot;&gt;&lt;span data-dcnode-id=&quot;828&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;787&quot;&gt;&lt;span data-dcnode-id=&quot;827&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;825&quot;&gt;&lt;span data-dcnode-id=&quot;826&quot; instrument_node=&quot;&quot;&gt;Design Considerations&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;824&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;822&quot;&gt;&lt;span data-dcnode-id=&quot;823&quot; instrument_node=&quot;&quot;&gt;The main challenges lie in combining virtual and real worlds, and designing navigation interfaces. There are plenty of dis- play technologies that enable unmatched augmented reality listed in the next section. There are also numerous navigation interfaces that are proposed to get the best user experience.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;821&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ol data-dcnode-id=&quot;789&quot;&gt;&lt;span data-dcnode-id=&quot;820&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;797&quot;&gt;&lt;span data-dcnode-id=&quot;819&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;817&quot;&gt;&lt;span data-dcnode-id=&quot;818&quot; instrument_node=&quot;&quot;&gt;Augmented reality Display&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;816&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;814&quot;&gt;&lt;span data-dcnode-id=&quot;815&quot; instrument_node=&quot;&quot;&gt;How to display augmented information to a user is a constant problem in AR. There are many display options ranging from full-featured display to standard display. In the AR naviga- tion system, the display should not be compatible with the user's navigation. Display technologies that are genuinely augmented like:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;813&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;811&quot;&gt;&lt;span data-dcnode-id=&quot;812&quot; instrument_node=&quot;&quot;&gt;Video display: A complete video display puts a digital screen between the real world and the user. The user sees the real world with augmented details to be added to this screen. The real-world view is captured using a camera that is integrated with augmented information and displayed on the screen,&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;810&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;808&quot;&gt;&lt;span data-dcnode-id=&quot;809&quot; instrument_node=&quot;&quot;&gt;which can be in front of the user's eyes to provide a realistic view or can serve as a separate monitor. An example of that kind of display is a head mounted display with cameras.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;807&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;805&quot;&gt;&lt;span data-dcnode-id=&quot;806&quot; instrument_node=&quot;&quot;&gt;Optical display: The optical display uses a transparent and a reflective screen, also called a connector(integrator), in front of the user's eyes. Details are projected on this connector by the projector. The end result is that the user is able to see the visual information and actual views augmented to the same plane (screen). Note that only the virtual information is pro- jected at the integrator, while the actual view looks exactly like it is since the connector is transparent. Thus, the illusion of an interconnected virtual and real world is created. An example of this is the type of fighter plane of a plane in which the virtual information is projected.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;804&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;802&quot;&gt;&lt;span data-dcnode-id=&quot;803&quot; instrument_node=&quot;&quot;&gt;Projective: In a projective AR demonstration, virtual infor- mation is shown directly to the actual object instead of being digitally displayed or seen on the screen. This type of AR display can cover large areas of the world. However, the quality of the coverage provided may vary depending on the type of range in which the information is projected.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;801&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;799&quot;&gt;&lt;span data-dcnode-id=&quot;800&quot; instrument_node=&quot;&quot;&gt;For navigation purposes, selecting an AR display can be dif- ficult because all of the visual(virtual) references discussed above are possible. Considering the cars navigation, the us- ers need should be for free movement and minimal adoption. However, it is recommended to see where the Windshield of the car works as an integrator. In the case of pedestrian or indoor navigation, a watch video displayed on a smartphone is a great way to use it.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;798&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;796&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;791&quot;&gt;&lt;span data-dcnode-id=&quot;795&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;793&quot;&gt;&lt;span data-dcnode-id=&quot;794&quot; instrument_node=&quot;&quot;&gt;Navigation Interface&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;792&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;790&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ol&gt;&lt;span data-dcnode-id=&quot;788&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;786&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ol&gt;&lt;span data-dcnode-id=&quot;784&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ol&gt;&lt;span data-dcnode-id=&quot;782&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;780&quot;&gt;&lt;span data-dcnode-id=&quot;781&quot; instrument_node=&quot;&quot;&gt;Navigation information can be displayed to the user in many ways. A few examples include, pointing the arrows towards the intended direction or painting the road in bold color.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;779&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;777&quot;&gt;&lt;span data-dcnode-id=&quot;778&quot; instrument_node=&quot;&quot;&gt;It is suggested that the interface should be designed from the perspective of the driver (of the user) i.e. the route to be de- livered should be painted in bold color. This establishes a clear path from the driver's perspective. In addition, the cur- vature and exit that are hidden due to obstructions to view should also be visible by placing the overlaying road in an obstacle course. The same points they hold for the pedestri- an-friendly plan.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;776&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;774&quot;&gt;&lt;span data-dcnode-id=&quot;775&quot; instrument_node=&quot;&quot;&gt;However, the highlighted path can create a confusion when displayed through an object blocking view. To eliminate this, it is proposed to draw a path highlighted in the sky so as not to disturb the intended direction of the user.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;773&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;771&quot;&gt;&lt;span data-dcnode-id=&quot;772&quot; instrument_node=&quot;&quot;&gt;The starting point to be talked about is expanding the naviga- tion interface for audio commands. Therefore, the system should provide means of moving and assisting using sound.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;770&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;768&quot;&gt;&lt;span data-dcnode-id=&quot;769&quot; instrument_node=&quot;&quot;&gt;A global overview of the route on the map is also helpful along with the latest misleading information. This is similar in what is shown in car racing video games like the need for speed. In this case, the driver is more detailed and can decide to drive in advance.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;767&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ol data-dcnode-id=&quot;687&quot;&gt;&lt;span data-dcnode-id=&quot;766&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ol data-dcnode-id=&quot;689&quot;&gt;&lt;span data-dcnode-id=&quot;765&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;697&quot;&gt;&lt;span data-dcnode-id=&quot;764&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;762&quot;&gt;&lt;span data-dcnode-id=&quot;763&quot; instrument_node=&quot;&quot;&gt;Different kinds of AR Navigation&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;761&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;759&quot;&gt;&lt;span data-dcnode-id=&quot;760&quot; instrument_node=&quot;&quot;&gt;This section describes various scenarios in which augmented reality can be exploited for navigation. Traditional navigation systems are commonly used for traffic and pedestrian naviga- tion. Real-life experiences can dramatically increase user experience of these streaming services. Indoor navigation is also a great tool for using AR.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;758&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ol data-dcnode-id=&quot;699&quot;&gt;&lt;span data-dcnode-id=&quot;757&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;743&quot;&gt;&lt;span data-dcnode-id=&quot;756&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;754&quot;&gt;&lt;span data-dcnode-id=&quot;755&quot; instrument_node=&quot;&quot;&gt;Car Navigation&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;753&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;751&quot;&gt;&lt;span data-dcnode-id=&quot;752&quot; instrument_node=&quot;&quot;&gt;The main goal of making practical use of the augmented real- ity inthe navigation system is to keep the driver on the road and solve problems related to traditional navigation as dis- cussed in section 2.2 above. AR Navigation is proposed for car navigation that allows the user to be free from additional AR resources. This is achieved by embedding the operating equipment into the user's environment, that is, the vehicle. This should be followed in order to fulfill the above recom- mendation: A car windscreen on the screen, tracking loca- tions using GPS and other sensors.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;750&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;748&quot;&gt;&lt;span data-dcnode-id=&quot;749&quot; instrument_node=&quot;&quot;&gt;Another Hardware features a video camera to detect the driv- er's viewing behavior. Location information is obtained not only by the GPS sensors in the rear but also by means of a vehicle tracking system that uses wheel sensors when GPS is not available. Therefore, the broadcasting of the camera and location data is provided by the software. The software then uses the camera input, compares it to stored maps and dy- namic road data (construction, accidents, etc.), and creates a 3D image of te road. Based on the navigation system select- ed by the driver, the 3D image is annotated by road lighting. This 3D image is transmitted to an AR provider that registers virtual information in real-world view and displays it to the driver's windshield.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;747&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;745&quot;&gt;&lt;span data-dcnode-id=&quot;746&quot; instrument_node=&quot;&quot;&gt;Fig. 2: AR Navigation for Vehicles&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;744&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;742&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;722&quot;&gt;&lt;span data-dcnode-id=&quot;741&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;739&quot;&gt;&lt;span data-dcnode-id=&quot;740&quot; instrument_node=&quot;&quot;&gt;Pedestrian Navigation&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;738&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;736&quot;&gt;&lt;span data-dcnode-id=&quot;737&quot; instrument_node=&quot;&quot;&gt;The navigation system is not just a vehicular navigation sys- tem but it should be sufficient for pedestrians as well. There are a number of smartphone applications that work both as a pedestrian and a vehicular navigation system. The basic goal of AR navigation for pedestrians is similar to vehicular navi- gation systems.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;735&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;733&quot;&gt;&lt;span data-dcnode-id=&quot;734&quot; instrument_node=&quot;&quot;&gt;A program like the one in Section 3.2.1 was sent to the smartphone as smartphones are the ubiquitous today. The software uses orientation sensors to display AR information as efficiently as a smartphone can be accessed in any way. Location information is collected through GPS sensors. If GPS is temporarily unavailable, the location can be detected by looking at the dead reckoning using the orientation and the accelerometer sensor of the smartphone. A real-world view is available on an existing camera on a smartphone. After that, the navigation details/information created are inte- grated with real world camera streaming and displayed on a smartphone screen. Broad functions such as rendering graphics, route calculations, etc. transferred to a different server. Nowadays, these functions can be deployed on a sepa- rate cloud computer while the smartphone acts as a small client.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;732&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;730&quot;&gt;&lt;span data-dcnode-id=&quot;731&quot; instrument_node=&quot;&quot;&gt;Fig. 3: Google Maps AR Navigation&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;729&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;727&quot;&gt;&lt;span data-dcnode-id=&quot;728&quot; instrument_node=&quot;&quot;&gt;In this system, images of landmarks can be used to perform pedestrian navigation commands. When the user selects a path, the system collects images of landmarks along the way. Subsequently, the images are enhanced with orientation in-&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;726&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;724&quot;&gt;&lt;span data-dcnode-id=&quot;725&quot; instrument_node=&quot;&quot;&gt;formation using arrows pointing correctly. Finally, the user is presented with the details as an image sequencing.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;723&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;721&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;701&quot;&gt;&lt;span data-dcnode-id=&quot;720&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;718&quot;&gt;&lt;span data-dcnode-id=&quot;719&quot; instrument_node=&quot;&quot;&gt;Indoor Navigation&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;717&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;715&quot;&gt;&lt;span data-dcnode-id=&quot;716&quot; instrument_node=&quot;&quot;&gt;Augmented reality can also be applied to internal(indoor) navigation. It is different from other navigation applications in that it detects the user's location. It is known to build struc- tures attenuate GPS Signals. In the absence of GPS-enabled locations, localization can use other techniques such as Wi- Fi, Bluetooth, or fingerprinting. In addition, indoor paths must first be mapped and stored in the database and used as a reference for the user's location adjustment. There are a cou- ple of promising technologies for indoor use: two upgraded ones are iBeacon, from Apple and Indoor-Atlas from a com- pany with the same name. Some technologies use physical references such as QR codes to detect non-progressive loca- tions. Once the location is rediscovered, it can be used along with the camera installation to create the augmented reality information in the navigation system.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;714&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;712&quot;&gt;&lt;span data-dcnode-id=&quot;713&quot; instrument_node=&quot;&quot;&gt;Fig. 4: Indoor AR Navigation&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;711&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;709&quot;&gt;&lt;span data-dcnode-id=&quot;710&quot; instrument_node=&quot;&quot;&gt;The supported indoor navigation system that does not moni- tor the user's location continuously, instead uses information points (interest points) printed on the floor to find the user's location. When the user has chosen a route, the system cre- ates a task that specifies the number of steps and time to be taken. The details of the navigation are registered in 3D on the smartphone by enabling camera streaming. For example, the user first selects the start point by scanning the QR code on the floor/wall and at its destination. After that, the system produces activities. The user's real-time location is calculated by the dead estimate, that is, by counting the number of steps the user has taken from the last location-point. The system shows points of interest round the user when the camera is moved. The points of interest are obtained based on user's location and recorded in the camera stream using data from the compass, gyroscope, and accelerometer sensors. Since dead reckoning suffers a reduced accuracy over time, the user&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;708&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;706&quot;&gt;&lt;span data-dcnode-id=&quot;707&quot; instrument_node=&quot;&quot;&gt;needs to update its location by scanning another way-point when moving.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;705&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;703&quot;&gt;&lt;span data-dcnode-id=&quot;704&quot; instrument_node=&quot;&quot;&gt;Fig. 5: Indoor AR Navigation&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;702&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;700&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ol&gt;&lt;span data-dcnode-id=&quot;698&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;696&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;691&quot;&gt;&lt;span data-dcnode-id=&quot;695&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;693&quot;&gt;&lt;span data-dcnode-id=&quot;694&quot; instrument_node=&quot;&quot;&gt;Opportunities and Challenges&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;692&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;690&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ol&gt;&lt;span data-dcnode-id=&quot;688&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ol&gt;&lt;span data-dcnode-id=&quot;686&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;684&quot;&gt;&lt;span data-dcnode-id=&quot;685&quot; instrument_node=&quot;&quot;&gt;Here are a few of the opportunities for augmented reality navigation systems over traditional navigation systems, in- cluding driver safety in which the driver is notified of details such as hazard zones, crash warnings, route alerts, speed lim- its, zebra crossings, etc. The paper also discusses details of contact issues such as nearby operators, and specific status information, or key locations.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;683&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;681&quot;&gt;&lt;span data-dcnode-id=&quot;682&quot; instrument_node=&quot;&quot;&gt;It is found that an augmented reality system, despite the nec- essary improvements, is better than most current navigation devices. AR navigation significantly reduced navigation er- rors and problems associated with fragmented/divided atten- tion. Augmented reality applications for vehicular, pedestrian or indoor navigation are very interactive and realistic. In ad- dition, combining navigation with some contextual infor- mation enhances men's user experience. Increasingly, consid- er traveling to the mall using the AR navigation system on your smartphone that shows all the discounts available in the store you pass by.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;680&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;678&quot;&gt;&lt;span data-dcnode-id=&quot;679&quot; instrument_node=&quot;&quot;&gt;There is difficulty using the AR navigation system too. The user experience depends on the amount of virtual information augmented with the real world. The details of the navigation should not hide the user's real-world views. This could also lead to security issues where the user's AR view is too intru- sive to allow user to focus on the road. Therefore, the design of the AR navigation display connector is very important. AR navigation can lead to privacy concerns as well. Since appli- cations capture real-world camera input, some users may find that they are surrounded by multiple cameras.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;677&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ol data-dcnode-id=&quot;657&quot;&gt;&lt;span data-dcnode-id=&quot;676&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;665&quot;&gt;&lt;span data-dcnode-id=&quot;675&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;673&quot;&gt;&lt;span data-dcnode-id=&quot;674&quot; instrument_node=&quot;&quot;&gt;CONCLUSION AND FUTURE WORK&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;672&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;670&quot;&gt;&lt;span data-dcnode-id=&quot;671&quot; instrument_node=&quot;&quot;&gt;This paper presented a rigorous literature review of AR navi- gation techniques including design considerations and vari- ous navigation types. It also presents a variety of opportuni- ties and challenges for using AR in navigation.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;669&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;667&quot;&gt;&lt;span data-dcnode-id=&quot;668&quot; instrument_node=&quot;&quot;&gt;Augmented reality is a very powerful way to improve user experience in navigation applications. Apart from the user experience, it extends far beyond driver safety. Examination of research literature suggests that AR significantly increases drivers attention. Although the current technologies are far from a full-fledged AR experience, research is moving fast and several institutions and companies such as BMW, Pio- neer, and Toyota are working on development in navigation. It is important to note that the use of AR in navigation is highly dependent on advances in the field of augmented reali- ty. Also, the acceptance for AR navigation will depend on the better user experience. It will be interesting to see how this technology develops in the future.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;666&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;664&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;659&quot;&gt;&lt;span data-dcnode-id=&quot;663&quot; instrument_node=&quot;&quot;&gt;
