&lt;/span&gt;&lt;div data-dcnode-id=&quot;1076&quot;&gt;&lt;p data-dcnode-id=&quot;1103&quot;&gt;&lt;span data-dcnode-id=&quot;1113&quot; instrument_node=&quot;&quot;&gt;Although extended reality (XR) technologies are&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;1111&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//er.educause.edu/articles/2021/12/educause-quickpoll-results-xr-technology%3Futm_source%3DSelligent%26utm_medium%3Demail%26utm_campaign%3Der_content_alert_newsletter%26utm_content%3D12-15-21%26utm_term%3D_%26m_i%3DImrImWdwaGiSqL0Uj9hC2f9xHGqzXHibCO9PH1d1zwguP5YFc1Ygo9QoqC8rPAkCoG0t1REVnODprNioSdzUMdtei6S7WbIIID%26M_BT%3D43785359182&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot; title=&quot;extended reality (XR) technologies are&amp;nbsp;not yet widely used&amp;nbsp;in higher education&quot;&gt;&lt;span data-dcnode-id=&quot;1112&quot; instrument_node=&quot;&quot;&gt;not yet widely used&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1110&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;in higher education, some universities and colleges have started using XR to teach complex topics in new and exciting ways. The&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;1108&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//umich.edu/&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot; title=&quot;&amp;nbsp;University of Michigan,&quot;&gt;&lt;span data-dcnode-id=&quot;1109&quot; instrument_node=&quot;&quot;&gt;University of Michigan&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1107&quot; instrument_node=&quot;&quot;&gt;, for example, has&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;1105&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//ai.umich.edu/blog/mixr-studios-podcast-creating-an-xr-nuclear-reactor-with-guest-brendan-kochunas/&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot; title=&quot;re-created the decommissioned Ford Nuclear Reactor&amp;nbsp;in virtual reality&quot;&gt;&lt;span data-dcnode-id=&quot;1106&quot; instrument_node=&quot;&quot;&gt;re-created the decommissioned Ford Nuclear Reactor&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1104&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;in virtual reality. Nuclear engineering students can now enter the reactor and operate it as their professor guides them through a lecture.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1102&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1100&quot;&gt;&lt;span data-dcnode-id=&quot;1101&quot; instrument_node=&quot;&quot;&gt;Considering extended reality’s potential to transform student engagement and success, widespread adoption appears likely as XR technology becomes more affordable and available.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1099&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1091&quot;&gt;&lt;span data-dcnode-id=&quot;1098&quot; instrument_node=&quot;&quot;&gt;“XR will transform online learning as we think of it today,” says Maya Georgieva, director of education futures and&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;1096&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//xrcenter.newschool.edu/&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot; title=&quot;&amp;nbsp;the XReality Center&quot;&gt;&lt;span data-dcnode-id=&quot;1097&quot; instrument_node=&quot;&quot;&gt;the XReality Center&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1095&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;at&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;1093&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.newschool.edu/&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot; title=&quot;The New School.&quot;&gt;&lt;span data-dcnode-id=&quot;1094&quot; instrument_node=&quot;&quot;&gt;The New School&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1092&quot; instrument_node=&quot;&quot;&gt;. “It will offer powerful ways for stronger engagement with students and their fields of study.”&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1090&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1088&quot;&gt;&lt;span data-dcnode-id=&quot;1089&quot; instrument_node=&quot;&quot;&gt;Here’s a look at the meaning of extended reality, its use cases in higher education and things for schools to consider before implementation.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1087&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1078&quot;&gt;&lt;b data-dcnode-id=&quot;1083&quot;&gt;&lt;i data-dcnode-id=&quot;1084&quot;&gt;&lt;a data-dcnode-id=&quot;1085&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//edtechmagazine.com/higher/cdw_subscription_v3/register-web%3Fform%3Dinsider&quot; rel=&quot;noopener&quot; rev=&quot;en_rl_none&quot; title=&quot;emerging techs in higher ed&quot;&gt;&lt;span data-dcnode-id=&quot;1086&quot; instrument_node=&quot;&quot;&gt;Click the banner below&lt;/span&gt;&lt;/a&gt;&lt;/i&gt;&lt;/b&gt;&lt;i data-dcnode-id=&quot;1079&quot;&gt;&lt;a data-dcnode-id=&quot;1081&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//edtechmagazine.com/higher/cdw_subscription_v3/register-web%3Fform%3Dinsider&quot; rel=&quot;noopener noopener&quot; rev=&quot;en_rl_none&quot; target=&quot;_blank&quot; title=&quot;emerging techs in higher ed&quot;&gt;&lt;span data-dcnode-id=&quot;1082&quot; instrument_node=&quot;&quot;&gt; to unlock premium content exploring emerging technologies in higher ed.&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1080&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/i&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1077&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;a class=&quot;desktop&quot; data-dcnode-id=&quot;1070&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//edtechmagazine.com/higher/cdw_subscription_v3/register-web%3Fform%3Dinsider&quot; id=&quot;higher-ed-emerging-technologies-insider-sign-up&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1073&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;div data-dcnode-id=&quot;1016&quot;&gt;&lt;h2 data-dcnode-id=&quot;1059&quot;&gt;&lt;span data-dcnode-id=&quot;1060&quot; instrument_node=&quot;&quot;&gt;What Is the Purpose of Extended Reality?&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;1058&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1056&quot;&gt;&lt;span data-dcnode-id=&quot;1057&quot; instrument_node=&quot;&quot;&gt;XR can be used in a variety of disciplines, from teacher education to medical training and foreign language immersion. Medical students can use AR to practice procedures before they feel confident trying them in real life. Foreign language students can gain language learning experiences without having to travel to another country.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1055&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1047&quot;&gt;&lt;span data-dcnode-id=&quot;1054&quot; instrument_node=&quot;&quot;&gt;At the&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;1052&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.ucf.edu/&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot; title=&quot;&amp;nbsp;University of Central Florida&quot;&gt;&lt;span data-dcnode-id=&quot;1053&quot; instrument_node=&quot;&quot;&gt;University of Central Florida&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1051&quot; instrument_node=&quot;&quot;&gt;, aspiring teachers learn through&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;1049&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.ucf.edu/pegasus/kickin-new-school/&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot; title=&quot;TeachLive&quot;&gt;&lt;span data-dcnode-id=&quot;1050&quot; instrument_node=&quot;&quot;&gt;TeachLive, an MR simulation&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1048&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;that helps student teachers practice managing tricky situations before they enter real classrooms.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1046&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1044&quot;&gt;&lt;span data-dcnode-id=&quot;1045&quot; instrument_node=&quot;&quot;&gt;“What’s beautiful about simulation and technology is that the benefits and uses vary,” says Lisa Dieker, professor of exceptional student education at UCF and co-creator of TeachLive. “We have to be careful that the simulator doesn’t perpetuate stereotypes and that it gives a chance for students to have a shared experience.”&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1043&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1041&quot;&gt;&lt;span data-dcnode-id=&quot;1042&quot; instrument_node=&quot;&quot;&gt;XR can also benefit educators by providing a standardized way to teach foundational skills and knowledge, as well as offering a model of a more efficient way to teach. In a virtual world, students can repeat a lesson or task as many times as they need to without holding up the rest of class.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1040&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1034&quot;&gt;&lt;a data-dcnode-id=&quot;1035&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//edtechmagazine.com/higher/article/2021/07/enabling-touchable-wearable-virtual-reality&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot; title=&quot;Enabling a Touchable, Wearable Virtual Reality&quot;&gt;&lt;em data-dcnode-id=&quot;1036&quot;&gt;&lt;strong data-dcnode-id=&quot;1038&quot;&gt;&lt;span data-dcnode-id=&quot;1039&quot; instrument_node=&quot;&quot;&gt;RELATED: &lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1037&quot; instrument_node=&quot;&quot;&gt;A touchable, wearable virtual reality for higher ed.&amp;nbsp;&lt;/span&gt;&lt;/em&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1033&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;1031&quot;&gt;&lt;span data-dcnode-id=&quot;1032&quot; instrument_node=&quot;&quot;&gt;Consider Carefully Before Implementing Extended Reality Technology&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;1030&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1028&quot;&gt;&lt;span data-dcnode-id=&quot;1029&quot; instrument_node=&quot;&quot;&gt;Virtual reality simulators require high-end computers with sufficient computing power to handle large amounts of data. Above all, XR requires a modernized network and high-speed connections.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1027&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1025&quot;&gt;&lt;span data-dcnode-id=&quot;1026&quot; instrument_node=&quot;&quot;&gt;“A high-speed network is critical when students engage with virtual reality, because it’s one thing for a website to buffer and another thing for your headset to buffer. It breaks immersion,” says Georgieva.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1024&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1018&quot;&gt;&lt;i data-dcnode-id=&quot;1019&quot;&gt;&lt;span data-dcnode-id=&quot;1023&quot; instrument_node=&quot;&quot;&gt;Click the banner below to learn&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;1021&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.cdw.com/content/cdw/en/articles/networking/kent-state-university-gets-a-network-upgrade.html&quot; rel=&quot;noopener noopener noopener&quot; rev=&quot;en_rl_none&quot; target=&quot;_blank&quot; title=&quot;how Kent State modernized its network&quot;&gt;&lt;span data-dcnode-id=&quot;1022&quot; instrument_node=&quot;&quot;&gt;how Kent State modernized its network&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1020&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/i&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1017&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;a class=&quot;desktop&quot; data-dcnode-id=&quot;1008&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.cdw.com/content/cdw/en/articles/networking/kent-state-university-gets-a-network-upgrade.html&quot; id=&quot;Kent-State-Case-Study&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1011&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;div class=&quot;paragraph paragraph--type--body-text paragraph--view-mode--paragraph&quot; data-dcnode-id=&quot;947&quot;&gt;&lt;span data-dcnode-id=&quot;999&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div data-dcnode-id=&quot;949&quot;&gt;&lt;p data-dcnode-id=&quot;997&quot;&gt;&lt;span data-dcnode-id=&quot;998&quot; instrument_node=&quot;&quot;&gt;Another key consideration is technology maintenance. “These headsets are like computers. They need to be patched, updated and tested regularly,” explains Jeremy Nelson, director of the XR Initiative at the University of Michigan. “Think of them as another mobile device.”&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;996&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;994&quot;&gt;&lt;span data-dcnode-id=&quot;995&quot; instrument_node=&quot;&quot;&gt;Institutions should invest in systems to help with managing equipment, like tracking headsets rentals and staying on top of maintenance requirements.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;993&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;991&quot;&gt;&lt;span data-dcnode-id=&quot;992&quot; instrument_node=&quot;&quot;&gt;The Ethical and Safety Considerations of XR&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;990&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;976&quot;&gt;&lt;span data-dcnode-id=&quot;989&quot; instrument_node=&quot;&quot;&gt;As with any emerging technology that collects data, institutions that are looking to implement XR should create and regularly assess its privacy, data security, identity and representation, bias perpetuation, and bullying and harassment policies. Nelson says organizations such as&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;987&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//xrsi.org/&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot; title=&quot;XR Safety Initiative&quot;&gt;&lt;span data-dcnode-id=&quot;988&quot; instrument_node=&quot;&quot;&gt;XR Safety Initiative&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;986&quot; instrument_node=&quot;&quot;&gt;,&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;984&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//xraccess.org/&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot; title=&quot;XR Access&quot;&gt;&lt;span data-dcnode-id=&quot;985&quot; instrument_node=&quot;&quot;&gt;XR Access&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;983&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;and&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;981&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//xra.org/&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot; title=&quot;the XR Association&amp;nbsp;&quot;&gt;&lt;span data-dcnode-id=&quot;982&quot; instrument_node=&quot;&quot;&gt;the XR Association&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;980&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;provide helpful guidance on how to create a safe&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;978&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//edtechmagazine.com/higher/article/2021/11/microsofts-metaverse-transform-online-learning&quot; title=&quot;metaverse&quot;&gt;&lt;span data-dcnode-id=&quot;979&quot; instrument_node=&quot;&quot;&gt;metaverse&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;977&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;for users.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;975&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;970&quot;&gt;&lt;span data-dcnode-id=&quot;974&quot; instrument_node=&quot;&quot;&gt;A&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;972&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//stanfordvr.com/pubs/2020/personal-identifiability-of-user-tracking-data-during-observation-of-360-degree-vr-video/&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot; title=&quot;study conducted by Stanford University in 2020&quot;&gt;&lt;span data-dcnode-id=&quot;973&quot; instrument_node=&quot;&quot;&gt;study conducted by Stanford University in 2020&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;971&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;found that just a few minutes of data collected in virtual reality can identify an otherwise anonymous user. The system used in the study accurately identified 95 percent of its 511 participants with less than 5 minutes of data tracking each person.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;969&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;961&quot;&gt;&lt;span data-dcnode-id=&quot;968&quot; instrument_node=&quot;&quot;&gt;As Nelson explains, two million data points are captured within 20 minutes in virtual reality. Considering&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;966&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//edtechmagazine.com/higher/article/2021/10/educause-2021-whats-next-data-privacy-and-security-laws&quot; title=&quot;the growing number of privacy protection laws&quot;&gt;&lt;span data-dcnode-id=&quot;967&quot; instrument_node=&quot;&quot;&gt;the growing number of privacy protection laws&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;965&quot; instrument_node=&quot;&quot;&gt;, like the Family Educational Rights and Privacy Act (FERPA)&lt;/span&gt;&lt;strong data-dcnode-id=&quot;963&quot;&gt;&lt;span data-dcnode-id=&quot;964&quot; instrument_node=&quot;&quot;&gt;,&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;962&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;it is vital for institutions to regularly assess and update data privacy policies.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;960&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;958&quot;&gt;&lt;span data-dcnode-id=&quot;959&quot; instrument_node=&quot;&quot;&gt;“Technology can be a powerful tool for creating empathy, but it can also lead to invasion of privacy and harassment,” Georgieva says. “Institutions need to engage in conversations about the social impact and ethical challenges of using VR.”&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;957&quot; instrument_node=&quot;&quot;&gt;
