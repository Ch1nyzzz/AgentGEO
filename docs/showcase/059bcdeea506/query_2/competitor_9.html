&lt;/span&gt;&lt;a data-dcnode-id=&quot;1954&quot; name=&quot;W&quot;&gt;&lt;/a&gt;&lt;h3 data-dcnode-id=&quot;1952&quot;&gt;&lt;span data-dcnode-id=&quot;1953&quot; instrument_node=&quot;&quot;&gt;WARNINGS&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;1947&quot;&gt;&lt;span data-dcnode-id=&quot;1951&quot; instrument_node=&quot;&quot;&gt;Included as part of the &lt;/span&gt;&lt;b data-dcnode-id=&quot;1949&quot;&gt;&lt;span data-dcnode-id=&quot;1950&quot; instrument_node=&quot;&quot;&gt;PRECAUTIONS&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;1948&quot; instrument_node=&quot;&quot;&gt; section.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1946&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a data-dcnode-id=&quot;1945&quot; name=&quot;P&quot;&gt;&lt;/a&gt;&lt;h3 data-dcnode-id=&quot;1943&quot;&gt;&lt;span data-dcnode-id=&quot;1944&quot; instrument_node=&quot;&quot;&gt;PRECAUTIONS&lt;/span&gt;&lt;/h3&gt;&lt;h4 data-dcnode-id=&quot;1941&quot;&gt;&lt;span data-dcnode-id=&quot;1942&quot; instrument_node=&quot;&quot;&gt;Potential For Abuse And Dependence&lt;/span&gt;&lt;/h4&gt;&lt;p data-dcnode-id=&quot;1933&quot;&gt;&lt;span data-dcnode-id=&quot;1940&quot; instrument_node=&quot;&quot;&gt;CNS stimulants, including DYANAVEL XR, other amphetamine-containing products, and methylphenidate, have a high potential for abuse and dependence. Assess the risk of abuse prior to prescribing, and monitor for signs of abuse and dependence while on therapy [see&lt;/span&gt;&lt;b data-dcnode-id=&quot;1938&quot;&gt;&lt;span data-dcnode-id=&quot;1939&quot; instrument_node=&quot;&quot;&gt; BOXED WARNING&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;1937&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;b data-dcnode-id=&quot;1935&quot;&gt;&lt;span data-dcnode-id=&quot;1936&quot; instrument_node=&quot;&quot;&gt;Drug Abuse And Dependence&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;1934&quot; instrument_node=&quot;&quot;&gt;].&lt;/span&gt;&lt;/p&gt;&lt;h4 data-dcnode-id=&quot;1931&quot;&gt;&lt;span data-dcnode-id=&quot;1932&quot; instrument_node=&quot;&quot;&gt;Serious Cardiovascular Reactions&lt;/span&gt;&lt;/h4&gt;&lt;p data-dcnode-id=&quot;1911&quot;&gt;&lt;span data-dcnode-id=&quot;1930&quot; instrument_node=&quot;&quot;&gt;Sudden death, &lt;/span&gt;&lt;a data-dcnode-id=&quot;1928&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/stroke/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;1929&quot; instrument_node=&quot;&quot;&gt;stroke&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1927&quot; instrument_node=&quot;&quot;&gt; and &lt;/span&gt;&lt;a data-dcnode-id=&quot;1925&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/myocardial_infarction/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;1926&quot; instrument_node=&quot;&quot;&gt;myocardial infarction&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1924&quot; instrument_node=&quot;&quot;&gt; have been reported in adults with CNS stimulant treatment at recommended doses. Sudden death has been reported in pediatric patients with structural cardiac abnormalities and other serious heart problems taking CNS stimulants at recommended doses for ADHD. Avoid use in patients with known structural cardiac abnormalities, &lt;/span&gt;&lt;a data-dcnode-id=&quot;1922&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/cardiomyopathy/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;1923&quot; instrument_node=&quot;&quot;&gt;cardiomyopathy&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1921&quot; instrument_node=&quot;&quot;&gt;, serious heart &lt;/span&gt;&lt;a data-dcnode-id=&quot;1919&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/arrhythmia/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;1920&quot; instrument_node=&quot;&quot;&gt;arrhythmia&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1918&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a data-dcnode-id=&quot;1916&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/coronary_artery_disease/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;1917&quot; instrument_node=&quot;&quot;&gt;coronary artery disease&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1915&quot; instrument_node=&quot;&quot;&gt;, and other serious heart problems. Further evaluate patients who develop exertional chest pain, unexplained &lt;/span&gt;&lt;a data-dcnode-id=&quot;1913&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/syncope/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;1914&quot; instrument_node=&quot;&quot;&gt;syncope&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1912&quot; instrument_node=&quot;&quot;&gt;, or arrhythmias during DYANAVEL XR treatment.&lt;/span&gt;&lt;/p&gt;&lt;h4 data-dcnode-id=&quot;1909&quot;&gt;&lt;span data-dcnode-id=&quot;1910&quot; instrument_node=&quot;&quot;&gt;Blood Pressure And Heart Rate Increases&lt;/span&gt;&lt;/h4&gt;&lt;p data-dcnode-id=&quot;1898&quot;&gt;&lt;span data-dcnode-id=&quot;1908&quot; instrument_node=&quot;&quot;&gt;CNS stimulants cause an increase in blood pressure (mean increase about 2 to 4 mm &lt;/span&gt;&lt;a data-dcnode-id=&quot;1906&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/hg/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;1907&quot; instrument_node=&quot;&quot;&gt;Hg&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1905&quot; instrument_node=&quot;&quot;&gt;) and heart rate (mean increase about 3 to 6 bpm). Monitor all patients for potential &lt;/span&gt;&lt;a data-dcnode-id=&quot;1903&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/tachycardia/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;1904&quot; instrument_node=&quot;&quot;&gt;tachycardia&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1902&quot; instrument_node=&quot;&quot;&gt; and &lt;/span&gt;&lt;a data-dcnode-id=&quot;1900&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/hypertension/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;1901&quot; instrument_node=&quot;&quot;&gt;hypertension&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1899&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;h4 data-dcnode-id=&quot;1896&quot;&gt;&lt;span data-dcnode-id=&quot;1897&quot; instrument_node=&quot;&quot;&gt;Psychiatric Adverse Reactions&lt;/span&gt;&lt;/h4&gt;&lt;h5 data-dcnode-id=&quot;1894&quot;&gt;&lt;span data-dcnode-id=&quot;1895&quot; instrument_node=&quot;&quot;&gt;Exacerbation Of Preexisting Psychosis&lt;/span&gt;&lt;/h5&gt;&lt;p data-dcnode-id=&quot;1892&quot;&gt;&lt;span data-dcnode-id=&quot;1893&quot; instrument_node=&quot;&quot;&gt;CNS stimulants may exacerbate symptoms of behavior disturbance and thought disorder in patients with a preexisting psychotic disorder.&lt;/span&gt;&lt;/p&gt;&lt;h5 data-dcnode-id=&quot;1890&quot;&gt;&lt;span data-dcnode-id=&quot;1891&quot; instrument_node=&quot;&quot;&gt;Induction Of A Manic Episode In Patients With Bipolar Illness&lt;/span&gt;&lt;/h5&gt;&lt;p data-dcnode-id=&quot;1882&quot;&gt;&lt;span data-dcnode-id=&quot;1889&quot; instrument_node=&quot;&quot;&gt;CNS stimulants may induce a mixed or &lt;/span&gt;&lt;a data-dcnode-id=&quot;1887&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/manic/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;1888&quot; instrument_node=&quot;&quot;&gt;manic&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1886&quot; instrument_node=&quot;&quot;&gt; episode in patients with &lt;/span&gt;&lt;a data-dcnode-id=&quot;1884&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/bipolar_disorder/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;1885&quot; instrument_node=&quot;&quot;&gt;bipolar disorder&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1883&quot; instrument_node=&quot;&quot;&gt;. Prior to initiating treatment, screen patients for risk factors for developing a manic episode (e.g., comorbid or history of depressive symptoms or a family history of suicide, bipolar disorder, or depression).&lt;/span&gt;&lt;/p&gt;&lt;h5 data-dcnode-id=&quot;1880&quot;&gt;&lt;span data-dcnode-id=&quot;1881&quot; instrument_node=&quot;&quot;&gt;New Psychotic Or Manic Symptoms&lt;/span&gt;&lt;/h5&gt;&lt;p data-dcnode-id=&quot;1875&quot;&gt;&lt;span data-dcnode-id=&quot;1879&quot; instrument_node=&quot;&quot;&gt;CNS stimulants, at recommended doses, may cause psychotic or manic symptoms, e.g., hallucinations, delusional thinking, or &lt;/span&gt;&lt;a data-dcnode-id=&quot;1877&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/mania/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;1878&quot; instrument_node=&quot;&quot;&gt;mania&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1876&quot; instrument_node=&quot;&quot;&gt; in patients without prior history of psychotic illness or mania. If such symptoms occur, consider discontinuing DYANAVEL XR. In a pooled analysis of multiple short-term, placebo-controlled studies of CNS stimulants, psychotic or manic symptoms occurred in 0.1% of CNS stimulant-treated patients compared to 0% in placebo-treated patients.&lt;/span&gt;&lt;/p&gt;&lt;h4 data-dcnode-id=&quot;1873&quot;&gt;&lt;span data-dcnode-id=&quot;1874&quot; instrument_node=&quot;&quot;&gt;Long-Term Suppression Of Growth&lt;/span&gt;&lt;/h4&gt;&lt;p data-dcnode-id=&quot;1871&quot;&gt;&lt;span data-dcnode-id=&quot;1872&quot; instrument_node=&quot;&quot;&gt;CNS stimulants have been associated with weight loss and slowing of growth rate in pediatric patients. Closely monitor growth (weight and height) in pediatric patients treated with CNS stimulants, including DYANAVEL XR.&lt;/span&gt;&lt;/p&gt;&lt;h4 data-dcnode-id=&quot;1869&quot;&gt;&lt;span data-dcnode-id=&quot;1870&quot; instrument_node=&quot;&quot;&gt;Peripheral Vasculopathy, Including Raynaud's Phenomenon&lt;/span&gt;&lt;/h4&gt;&lt;p data-dcnode-id=&quot;1855&quot;&gt;&lt;span data-dcnode-id=&quot;1868&quot; instrument_node=&quot;&quot;&gt;Stimulants, including DYANAVEL XR, used to treat ADHD are associated with peripheral vasculopathy, including Raynaud's phenomenon. Signs and symptoms are usually intermittent and mild; however, very rare &lt;/span&gt;&lt;a data-dcnode-id=&quot;1866&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/sequelae/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;1867&quot; instrument_node=&quot;&quot;&gt;sequelae&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1865&quot; instrument_node=&quot;&quot;&gt; include digital &lt;/span&gt;&lt;a data-dcnode-id=&quot;1863&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/ulceration/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;1864&quot; instrument_node=&quot;&quot;&gt;ulceration&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1862&quot; instrument_node=&quot;&quot;&gt; and/or soft tissue breakdown. Effects of peripheral vasculopathy, including Raynaud's phenomenon, were observed in postmarketing reports at different times and at therapeutic doses in all age groups throughout the course of treatment. Signs and symptoms generally improve after reduction in dose or discontinuation of drug. Careful observation for digital changes is necessary during treatment with ADHD stimulants. Further clinical evaluation (e.g., &lt;/span&gt;&lt;a data-dcnode-id=&quot;1860&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/rheumatology/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;1861&quot; instrument_node=&quot;&quot;&gt;rheumatology&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1859&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a data-dcnode-id=&quot;1857&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/referral/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;1858&quot; instrument_node=&quot;&quot;&gt;referral&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1856&quot; instrument_node=&quot;&quot;&gt;) may be appropriate for certain patients.&lt;/span&gt;&lt;/p&gt;&lt;h4 data-dcnode-id=&quot;1853&quot;&gt;&lt;span data-dcnode-id=&quot;1854&quot; instrument_node=&quot;&quot;&gt;Serotonin Syndrome&lt;/span&gt;&lt;/h4&gt;&lt;p data-dcnode-id=&quot;1825&quot;&gt;&lt;a data-dcnode-id=&quot;1851&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/serotonin/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;1852&quot; instrument_node=&quot;&quot;&gt;Serotonin&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1850&quot; instrument_node=&quot;&quot;&gt; syndrome, a potentially life-threatening reaction, may occur when amphetamines are used in combination with other drugs that affect the serotonergic &lt;/span&gt;&lt;a data-dcnode-id=&quot;1848&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/neurotransmitter/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;1849&quot; instrument_node=&quot;&quot;&gt;neurotransmitter&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1847&quot; instrument_node=&quot;&quot;&gt; systems such as monoamine oxidase inhibitors (MAOIs), selective serotonin &lt;/span&gt;&lt;a data-dcnode-id=&quot;1845&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/reuptake/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;1846&quot; instrument_node=&quot;&quot;&gt;reuptake&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1844&quot; instrument_node=&quot;&quot;&gt; inhibitors (SSRIs), serotonin norepinephrine reuptake inhibitors (SNRIs), triptans, &lt;/span&gt;&lt;a data-dcnode-id=&quot;1842&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/tricyclic_antidepressants/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;1843&quot; instrument_node=&quot;&quot;&gt;tricyclic antidepressants&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1841&quot; instrument_node=&quot;&quot;&gt;, fentanyl, &lt;/span&gt;&lt;a data-dcnode-id=&quot;1839&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/lithium/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;1840&quot; instrument_node=&quot;&quot;&gt;lithium&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1838&quot; instrument_node=&quot;&quot;&gt;, tramadol, &lt;/span&gt;&lt;a data-dcnode-id=&quot;1836&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/tryptophan/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;1837&quot; instrument_node=&quot;&quot;&gt;tryptophan&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1835&quot; instrument_node=&quot;&quot;&gt;, buspirone, and St. Johnâ€™s Wort [see &lt;/span&gt;&lt;b data-dcnode-id=&quot;1833&quot;&gt;&lt;span data-dcnode-id=&quot;1834&quot; instrument_node=&quot;&quot;&gt;DRUG INTERACTIONS&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;1832&quot; instrument_node=&quot;&quot;&gt;]. Amphetamines and amphetamine derivatives are known to be metabolized, to some degree, by cytochrome P450 2D6 (CYP2D6) [see &lt;/span&gt;&lt;b data-dcnode-id=&quot;1830&quot;&gt;&lt;span data-dcnode-id=&quot;1831&quot; instrument_node=&quot;&quot;&gt;CLINICAL PHARMACOLOGY&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;1829&quot; instrument_node=&quot;&quot;&gt;]. The potential for a pharmacokinetic interaction exists with the co-administration of CYP2D6 inhibitors which may increase the risk of serotonin syndrome with increased exposure to DYANAVEL XR. In these situations, consider an alternative non-serotonergic drug or an alternative drug that does not inhibit CYP2D6 [see &lt;/span&gt;&lt;b data-dcnode-id=&quot;1827&quot;&gt;&lt;span data-dcnode-id=&quot;1828&quot; instrument_node=&quot;&quot;&gt;DRUG INTERACTIONS&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;1826&quot; instrument_node=&quot;&quot;&gt;].&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1802&quot;&gt;&lt;span data-dcnode-id=&quot;1824&quot; instrument_node=&quot;&quot;&gt;Serotonin syndrome symptoms may include mental status changes (e.g., agitation, hallucinations, &lt;/span&gt;&lt;a data-dcnode-id=&quot;1822&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/delirium/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;1823&quot; instrument_node=&quot;&quot;&gt;delirium&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1821&quot; instrument_node=&quot;&quot;&gt;, and coma), autonomic instability (e.g., tachycardia, &lt;/span&gt;&lt;a data-dcnode-id=&quot;1819&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/labile/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;1820&quot; instrument_node=&quot;&quot;&gt;labile&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1818&quot; instrument_node=&quot;&quot;&gt; blood pressure, dizziness, diaphoresis, flushing, &lt;/span&gt;&lt;a data-dcnode-id=&quot;1816&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/hyperthermia/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;1817&quot; instrument_node=&quot;&quot;&gt;hyperthermia&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1815&quot; instrument_node=&quot;&quot;&gt;), &lt;/span&gt;&lt;a data-dcnode-id=&quot;1813&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/neuromuscular/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;1814&quot; instrument_node=&quot;&quot;&gt;neuromuscular&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1812&quot; instrument_node=&quot;&quot;&gt; symptoms (e.g., &lt;/span&gt;&lt;a data-dcnode-id=&quot;1810&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/tremor/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;1811&quot; instrument_node=&quot;&quot;&gt;tremor&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1809&quot; instrument_node=&quot;&quot;&gt;, rigidity, &lt;/span&gt;&lt;a data-dcnode-id=&quot;1807&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/myoclonus/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;1808&quot; instrument_node=&quot;&quot;&gt;myoclonus&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1806&quot; instrument_node=&quot;&quot;&gt;, hyperreflexia, incoordination), seizures, and/or &lt;/span&gt;&lt;a data-dcnode-id=&quot;1804&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/gastrointestinal/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;1805&quot; instrument_node=&quot;&quot;&gt;gastrointestinal&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1803&quot; instrument_node=&quot;&quot;&gt; symptoms (e.g., nausea, vomiting, diarrhea).&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1794&quot;&gt;&lt;span data-dcnode-id=&quot;1801&quot; instrument_node=&quot;&quot;&gt;Concomitant use of DYANAVEL XR with &lt;/span&gt;&lt;a data-dcnode-id=&quot;1799&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/maoi/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;1800&quot; instrument_node=&quot;&quot;&gt;MAOI&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1798&quot; instrument_node=&quot;&quot;&gt; drugs is contraindicated [see &lt;/span&gt;&lt;b data-dcnode-id=&quot;1796&quot;&gt;&lt;span data-dcnode-id=&quot;1797&quot; instrument_node=&quot;&quot;&gt;CONTRAINDICATIONS&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;1795&quot; instrument_node=&quot;&quot;&gt;].&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1789&quot;&gt;&lt;span data-dcnode-id=&quot;1793&quot; instrument_node=&quot;&quot;&gt;Discontinue treatment with DYANAVEL XR and any concomitant serotonergic agents immediately if symptoms of serotonin syndrome occur, and initiate supportive &lt;/span&gt;&lt;a data-dcnode-id=&quot;1791&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/symptomatic_treatment/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;1792&quot; instrument_node=&quot;&quot;&gt;symptomatic treatment&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1790&quot; instrument_node=&quot;&quot;&gt;. If concomitant use of DYANAVEL XR with other serotonergic drugs or CYP2D6 inhibitors is clinically warranted, initiate DYANAVEL XR with lower doses, monitor patients for the emergence of serotonin syndrome during drug initiation or titration, and inform patients of the increased risk for serotonin syndrome.&lt;/span&gt;&lt;/p&gt;&lt;h4 data-dcnode-id=&quot;1787&quot;&gt;&lt;span data-dcnode-id=&quot;1788&quot; instrument_node=&quot;&quot;&gt;Patient Counseling Information&lt;/span&gt;&lt;/h4&gt;&lt;p data-dcnode-id=&quot;1782&quot;&gt;&lt;span data-dcnode-id=&quot;1786&quot; instrument_node=&quot;&quot;&gt;Advise the patient to read the FDA-approved patient labeling (&lt;/span&gt;&lt;b data-dcnode-id=&quot;1784&quot;&gt;&lt;span data-dcnode-id=&quot;1785&quot; instrument_node=&quot;&quot;&gt;Medication Guide and Instructions for Use&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;1783&quot; instrument_node=&quot;&quot;&gt;).&lt;/span&gt;&lt;/p&gt;&lt;h5 data-dcnode-id=&quot;1780&quot;&gt;&lt;span data-dcnode-id=&quot;1781&quot; instrument_node=&quot;&quot;&gt;Controlled Substance Status/Potential For Abuse, Misuse, And Dependence&lt;/span&gt;&lt;/h5&gt;&lt;p data-dcnode-id=&quot;1769&quot;&gt;&lt;span data-dcnode-id=&quot;1779&quot; instrument_node=&quot;&quot;&gt;Advise patients that DYANAVEL XR is a federally controlled substance because it can be abused or lead to dependence. Advise patients to store DYANAVEL XR in a safe place, preferably locked, to prevent abuse. Advise patients to comply with laws and regulations on drug disposal. Advise patients to dispose of remaining, unused, or expired DYANAVEL XR by a medicine takeback program if available [see &lt;/span&gt;&lt;b data-dcnode-id=&quot;1777&quot;&gt;&lt;span data-dcnode-id=&quot;1778&quot; instrument_node=&quot;&quot;&gt;BOXED WARNING&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;1776&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;b data-dcnode-id=&quot;1774&quot;&gt;&lt;span data-dcnode-id=&quot;1775&quot; instrument_node=&quot;&quot;&gt;WARNINGS AND PRECAUTIONS&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;1773&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;b data-dcnode-id=&quot;1771&quot;&gt;&lt;span data-dcnode-id=&quot;1772&quot; instrument_node=&quot;&quot;&gt;Drug Abuse And Dependence&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;1770&quot; instrument_node=&quot;&quot;&gt;].&lt;/span&gt;&lt;/p&gt;&lt;h5 data-dcnode-id=&quot;1767&quot;&gt;&lt;span data-dcnode-id=&quot;1768&quot; instrument_node=&quot;&quot;&gt;Dosage And Administration Instructions&lt;/span&gt;&lt;/h5&gt;&lt;p data-dcnode-id=&quot;1765&quot;&gt;&lt;span data-dcnode-id=&quot;1766&quot; instrument_node=&quot;&quot;&gt;Provide the following instructions on administration to the patient:&lt;/span&gt;&lt;/p&gt;&lt;ul data-dcnode-id=&quot;1750&quot;&gt;&lt;li data-dcnode-id=&quot;1763&quot;&gt;&lt;span data-dcnode-id=&quot;1764&quot; instrument_node=&quot;&quot;&gt;Use with the oral dosing dispenser provided by the pharmacist.&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;1761&quot;&gt;&lt;span data-dcnode-id=&quot;1762&quot; instrument_node=&quot;&quot;&gt;Ensure that the bottle adapter has been firmly inserted into the bottle by the pharmacist. Once the bottle adapter has been inserted into the bottle it should not be removed.&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;1759&quot;&gt;&lt;span data-dcnode-id=&quot;1760&quot; instrument_node=&quot;&quot;&gt;Shake the bottle of DYANAVEL XR before each dose.&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;1757&quot;&gt;&lt;span data-dcnode-id=&quot;1758&quot; instrument_node=&quot;&quot;&gt;Measure the appropriate dose as prescribed by the physician.&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;1755&quot;&gt;&lt;span data-dcnode-id=&quot;1756&quot; instrument_node=&quot;&quot;&gt;Using the filled oral dosing dispenser, dispense DYANAVEL XR directly into mouth.&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;1753&quot;&gt;&lt;span data-dcnode-id=&quot;1754&quot; instrument_node=&quot;&quot;&gt;Replace bottle cap and store bottle as directed.&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;1751&quot;&gt;&lt;span data-dcnode-id=&quot;1752&quot; instrument_node=&quot;&quot;&gt;Wash oral dosing dispenser after each use.&lt;/span&gt;&lt;/li&gt;&lt;/ul&gt;&lt;h5 data-dcnode-id=&quot;1748&quot;&gt;&lt;span data-dcnode-id=&quot;1749&quot; instrument_node=&quot;&quot;&gt;Serious Cardiovascular Risks&lt;/span&gt;&lt;/h5&gt;&lt;p data-dcnode-id=&quot;1737&quot;&gt;&lt;span data-dcnode-id=&quot;1747&quot; instrument_node=&quot;&quot;&gt;Advise patients of serious &lt;/span&gt;&lt;a data-dcnode-id=&quot;1745&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/cardiovascular/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;1746&quot; instrument_node=&quot;&quot;&gt;cardiovascular&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1744&quot; instrument_node=&quot;&quot;&gt; risk (including sudden death, myocardial &lt;/span&gt;&lt;a data-dcnode-id=&quot;1742&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/infarction/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;1743&quot; instrument_node=&quot;&quot;&gt;infarction&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1741&quot; instrument_node=&quot;&quot;&gt;, stroke, and hypertension) with DYANAVEL XR. Instruct patients to contact a healthcare provider immediately if they develop symptoms such as exertional chest pain, unexplained syncope, or other symptoms suggestive of cardiac disease [see &lt;/span&gt;&lt;b data-dcnode-id=&quot;1739&quot;&gt;&lt;span data-dcnode-id=&quot;1740&quot; instrument_node=&quot;&quot;&gt;WARNINGS AND PRECAUTIONS&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;1738&quot; instrument_node=&quot;&quot;&gt;].&lt;/span&gt;&lt;/p&gt;&lt;h5 data-dcnode-id=&quot;1735&quot;&gt;&lt;span data-dcnode-id=&quot;1736&quot; instrument_node=&quot;&quot;&gt;Blood Pressure And Heart Rate Increases&lt;/span&gt;&lt;/h5&gt;&lt;p data-dcnode-id=&quot;1727&quot;&gt;&lt;span data-dcnode-id=&quot;1734&quot; instrument_node=&quot;&quot;&gt;Instruct patients that DYANAVEL XR can cause elevations of their blood pressure and &lt;/span&gt;&lt;a data-dcnode-id=&quot;1732&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/pulse/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;1733&quot; instrument_node=&quot;&quot;&gt;pulse&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1731&quot; instrument_node=&quot;&quot;&gt; rate [see&lt;/span&gt;&lt;b data-dcnode-id=&quot;1729&quot;&gt;&lt;span data-dcnode-id=&quot;1730&quot; instrument_node=&quot;&quot;&gt; WARNINGS AND PRECAUTIONS&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;1728&quot; instrument_node=&quot;&quot;&gt;].&lt;/span&gt;&lt;/p&gt;&lt;h5 data-dcnode-id=&quot;1725&quot;&gt;&lt;span data-dcnode-id=&quot;1726&quot; instrument_node=&quot;&quot;&gt;Psychiatric Risks&lt;/span&gt;&lt;/h5&gt;&lt;p data-dcnode-id=&quot;1720&quot;&gt;&lt;span data-dcnode-id=&quot;1724&quot; instrument_node=&quot;&quot;&gt;Advise patients that DYANAVEL XR, at recommended doses, may cause psychotic or manic symptoms, even in patients without a prior history of psychotic symptoms or mania [see &lt;/span&gt;&lt;b data-dcnode-id=&quot;1722&quot;&gt;&lt;span data-dcnode-id=&quot;1723&quot; instrument_node=&quot;&quot;&gt;WARNINGS AND PRECAUTIONS&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;1721&quot; instrument_node=&quot;&quot;&gt;].&lt;/span&gt;&lt;/p&gt;&lt;h5 data-dcnode-id=&quot;1718&quot;&gt;&lt;span data-dcnode-id=&quot;1719&quot; instrument_node=&quot;&quot;&gt;Long-Term Suppression Of Growth&lt;/span&gt;&lt;/h5&gt;&lt;p data-dcnode-id=&quot;1713&quot;&gt;&lt;span data-dcnode-id=&quot;1717&quot; instrument_node=&quot;&quot;&gt;Advise patients that DYANAVEL XR may cause slowing of growth and weight loss [see&lt;/span&gt;&lt;b data-dcnode-id=&quot;1715&quot;&gt;&lt;span data-dcnode-id=&quot;1716&quot; instrument_node=&quot;&quot;&gt; WARNINGS AND PRECAUTIONS&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;1714&quot; instrument_node=&quot;&quot;&gt;].&lt;/span&gt;&lt;/p&gt;&lt;h5 data-dcnode-id=&quot;1711&quot;&gt;&lt;span data-dcnode-id=&quot;1712&quot; instrument_node=&quot;&quot;&gt;Circulation Problems In Fingers And Toes [Peripheral Vasculopathy, Including Raynaudâ€™s Phenomenon]&lt;/span&gt;&lt;/h5&gt;&lt;p data-dcnode-id=&quot;1709&quot;&gt;&lt;span data-dcnode-id=&quot;1710&quot; instrument_node=&quot;&quot;&gt;Instruct patients beginning treatment with DYANAVEL XR about the risk of peripheral vasculopathy, including Raynaud's phenomenon, and associated signs and symptoms: fingers or toes may feel numb, cool, painful, and/or may change color from pale, to blue, to red.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1707&quot;&gt;&lt;span data-dcnode-id=&quot;1708&quot; instrument_node=&quot;&quot;&gt;Instruct patients to report to their physician any new numbness, pain, skin color change, or sensitivity to temperature in fingers or toes.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1705&quot;&gt;&lt;span data-dcnode-id=&quot;1706&quot; instrument_node=&quot;&quot;&gt;Instruct patients to call their physician immediately with any signs of unexplained wounds appearing on fingers or toes while taking DYANAVEL XR.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1700&quot;&gt;&lt;span data-dcnode-id=&quot;1704&quot; instrument_node=&quot;&quot;&gt;Further clinical evaluation (e.g., rheumatology referral) may be appropriate for certain patients [see &lt;/span&gt;&lt;b data-dcnode-id=&quot;1702&quot;&gt;&lt;span data-dcnode-id=&quot;1703&quot; instrument_node=&quot;&quot;&gt;WARNINGS AND PRECAUTIONS&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;1701&quot; instrument_node=&quot;&quot;&gt;].&lt;/span&gt;&lt;/p&gt;&lt;h5 data-dcnode-id=&quot;1698&quot;&gt;&lt;span data-dcnode-id=&quot;1699&quot; instrument_node=&quot;&quot;&gt;Serotonin Syndrome&lt;/span&gt;&lt;/h5&gt;&lt;p data-dcnode-id=&quot;1681&quot;&gt;&lt;span data-dcnode-id=&quot;1697&quot; instrument_node=&quot;&quot;&gt;Caution patients about the risk of serotonin syndrome with concomitant use of DYANAVEL XR and other serotonergic drugs including SSRIs, SNRIs, triptans, tricyclic &lt;/span&gt;&lt;a data-dcnode-id=&quot;1695&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/antidepressants/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;1696&quot; instrument_node=&quot;&quot;&gt;antidepressants&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1694&quot; instrument_node=&quot;&quot;&gt;, fentanyl, lithium, tramadol, tryptophan, buspirone, St. Johnâ€™s Wort, and with drugs that impair &lt;/span&gt;&lt;a data-dcnode-id=&quot;1692&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/metabolism/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;1693&quot; instrument_node=&quot;&quot;&gt;metabolism&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1691&quot; instrument_node=&quot;&quot;&gt; of serotonin (in particular MAOIs, both those intended to treat psychiatric disorders and also others such as linezolid [see &lt;/span&gt;&lt;b data-dcnode-id=&quot;1689&quot;&gt;&lt;span data-dcnode-id=&quot;1690&quot; instrument_node=&quot;&quot;&gt;CONTRAINDICATIONS&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;1688&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;b data-dcnode-id=&quot;1686&quot;&gt;&lt;span data-dcnode-id=&quot;1687&quot; instrument_node=&quot;&quot;&gt;WARNINGS AND PRECAUTIONS&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;1685&quot; instrument_node=&quot;&quot;&gt; and &lt;/span&gt;&lt;b data-dcnode-id=&quot;1683&quot;&gt;&lt;span data-dcnode-id=&quot;1684&quot; instrument_node=&quot;&quot;&gt;DRUG INTERACTIONS&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;1682&quot; instrument_node=&quot;&quot;&gt;]. Advise patients to contact their healthcare provider or report to the emergency room if they experience signs or symptoms of serotonin syndrome.&lt;/span&gt;&lt;/p&gt;&lt;h5 data-dcnode-id=&quot;1679&quot;&gt;&lt;span data-dcnode-id=&quot;1680&quot; instrument_node=&quot;&quot;&gt;Concomitant Medications&lt;/span&gt;&lt;/h5&gt;&lt;p data-dcnode-id=&quot;1674&quot;&gt;&lt;span data-dcnode-id=&quot;1678&quot; instrument_node=&quot;&quot;&gt;Advise patients to notify their physicians if they are taking, or plan to take, any prescription or over-the-counter drugs because there is a potential for interactions [see &lt;/span&gt;&lt;b data-dcnode-id=&quot;1676&quot;&gt;&lt;span data-dcnode-id=&quot;1677&quot; instrument_node=&quot;&quot;&gt;DRUG INTERACTIONS&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;1675&quot; instrument_node=&quot;&quot;&gt;].&lt;/span&gt;&lt;/p&gt;&lt;h5 data-dcnode-id=&quot;1672&quot;&gt;&lt;span data-dcnode-id=&quot;1673&quot; instrument_node=&quot;&quot;&gt;Pregnancy Registry&lt;/span&gt;&lt;/h5&gt;&lt;p data-dcnode-id=&quot;1667&quot;&gt;&lt;span data-dcnode-id=&quot;1671&quot; instrument_node=&quot;&quot;&gt;Advise patients to notify their healthcare provider if they become pregnant or intend to become pregnant during treatment with DYANAVEL XR. Advise patients of the potential fetal effects from the use of DYANAVEL XR during pregnancy [see&lt;/span&gt;&lt;b data-dcnode-id=&quot;1669&quot;&gt;&lt;span data-dcnode-id=&quot;1670&quot; instrument_node=&quot;&quot;&gt; Use In Specific Populations&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;1668&quot; instrument_node=&quot;&quot;&gt;].&lt;/span&gt;&lt;/p&gt;&lt;h5 data-dcnode-id=&quot;1665&quot;&gt;&lt;span data-dcnode-id=&quot;1666&quot; instrument_node=&quot;&quot;&gt;Pregnancy&lt;/span&gt;&lt;/h5&gt;&lt;p data-dcnode-id=&quot;1660&quot;&gt;&lt;span data-dcnode-id=&quot;1664&quot; instrument_node=&quot;&quot;&gt;Advise patients to notify their healthcare provider if they become pregnant or intend to become pregnant during treatment with DYANAVELXR. Advise patients of the potential fetal effects from the use of DYANAVELXR during pregnancy [see&lt;/span&gt;&lt;b data-dcnode-id=&quot;1662&quot;&gt;&lt;span data-dcnode-id=&quot;1663&quot; instrument_node=&quot;&quot;&gt; Use In Specific Populations&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;1661&quot; instrument_node=&quot;&quot;&gt;].&lt;/span&gt;&lt;/p&gt;&lt;h5 data-dcnode-id=&quot;1658&quot;&gt;&lt;span data-dcnode-id=&quot;1659&quot; instrument_node=&quot;&quot;&gt;Lactation&lt;/span&gt;&lt;/h5&gt;&lt;p data-dcnode-id=&quot;1653&quot;&gt;&lt;span data-dcnode-id=&quot;1657&quot; instrument_node=&quot;&quot;&gt;Advise women not to breastfeed if they are taking DYANAVEL XR [see &lt;/span&gt;&lt;b data-dcnode-id=&quot;1655&quot;&gt;&lt;span data-dcnode-id=&quot;1656&quot; instrument_node=&quot;&quot;&gt;Use In Specific Populations&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;1654&quot; instrument_node=&quot;&quot;&gt;].&lt;/span&gt;&lt;/p&gt;&lt;h5 data-dcnode-id=&quot;1651&quot;&gt;&lt;span data-dcnode-id=&quot;1652&quot; instrument_node=&quot;&quot;&gt;Alcohol&lt;/span&gt;&lt;/h5&gt;&lt;p data-dcnode-id=&quot;1646&quot;&gt;&lt;span data-dcnode-id=&quot;1650&quot; instrument_node=&quot;&quot;&gt;Advise patients to avoid alcohol while taking DYANAVEL XR. Consumption of alcohol while taking DYANAVEL XR may result in a more rapid release of the dose of amphetamine [see &lt;/span&gt;&lt;b data-dcnode-id=&quot;1648&quot;&gt;&lt;span data-dcnode-id=&quot;1649&quot; instrument_node=&quot;&quot;&gt;CLINICAL PHARMACOLOGY&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;1647&quot; instrument_node=&quot;&quot;&gt;].&lt;/span&gt;&lt;/p&gt;&lt;h4 data-dcnode-id=&quot;1644&quot;&gt;&lt;span data-dcnode-id=&quot;1645&quot; instrument_node=&quot;&quot;&gt;Nonclinical Toxicology&lt;/span&gt;&lt;/h4&gt;&lt;h4 data-dcnode-id=&quot;1642&quot;&gt;&lt;span data-dcnode-id=&quot;1643&quot; instrument_node=&quot;&quot;&gt;Carcinogenesis, Mutagenesis, Impairment Of Fertility&lt;/span&gt;&lt;/h4&gt;&lt;h5 data-dcnode-id=&quot;1640&quot;&gt;&lt;span data-dcnode-id=&quot;1641&quot; instrument_node=&quot;&quot;&gt;Carcinogenesis&lt;/span&gt;&lt;/h5&gt;&lt;p data-dcnode-id=&quot;1638&quot;&gt;&lt;span data-dcnode-id=&quot;1639&quot; instrument_node=&quot;&quot;&gt;No evidence of carcinogenicity was found in studies in which d, l-amphetamine (enantiomer ratio of 1:1) was administered to mice and rats in the diet for 2 years at doses of up to 30 mg/kg/day in male mice, 19 mg/kg/day in female mice, and 5 mg/kg/day in male and female rats. These doses are approximately 4, 2, and 1 (equivalent) times, respectively, the maximum recommended human dose of 20 mg/day (as base equivalents) given to children, on a mg/m basis.&lt;/span&gt;&lt;/p&gt;&lt;h5 data-dcnode-id=&quot;1636&quot;&gt;&lt;span data-dcnode-id=&quot;1637&quot; instrument_node=&quot;&quot;&gt;Mutagenesis&lt;/span&gt;&lt;/h5&gt;&lt;p data-dcnode-id=&quot;1625&quot;&gt;&lt;span data-dcnode-id=&quot;1635&quot; instrument_node=&quot;&quot;&gt;Amphetamine, in the enantiomer ratio (d- to l- ratio of - 3:1), was not clastogenic in the mouse &lt;/span&gt;&lt;a data-dcnode-id=&quot;1633&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/bone_marrow/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;1634&quot; instrument_node=&quot;&quot;&gt;bone marrow&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1632&quot; instrument_node=&quot;&quot;&gt; micronucleus test in vivo and was negative when tested in the &lt;/span&gt;&lt;i data-dcnode-id=&quot;1630&quot;&gt;&lt;span data-dcnode-id=&quot;1631&quot; instrument_node=&quot;&quot;&gt;E. coli&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;1629&quot; instrument_node=&quot;&quot;&gt; component of the &lt;/span&gt;&lt;a data-dcnode-id=&quot;1627&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/ames_test/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;1628&quot; instrument_node=&quot;&quot;&gt;Ames test&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1626&quot; instrument_node=&quot;&quot;&gt; in vitro. d, l-Amphetamine (1:1 enantiomer ratio) has been reported to produce a positive response in the mouse bone marrow micronucleus test, an equivocal response in the Ames test, and negative responses in the in vitro sister chromatid exchange and chromosomal aberration assays.&lt;/span&gt;&lt;/p&gt;&lt;h5 data-dcnode-id=&quot;1623&quot;&gt;&lt;span data-dcnode-id=&quot;1624&quot; instrument_node=&quot;&quot;&gt;Impairment Of Fertility&lt;/span&gt;&lt;/h5&gt;&lt;p data-dcnode-id=&quot;1621&quot;&gt;&lt;span data-dcnode-id=&quot;1622&quot; instrument_node=&quot;&quot;&gt;Amphetamine, in the enantiomer ratio (d- to l- ratio of 3:1), did not adversely affect fertility or early embryonic development in the rat at doses of up to 20 mg/kg/day [approximately 8 times the maximum recommended human dose of 20 mg/day (as base equivalents) given to adolescents on a mg/m basis.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1620&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a data-dcnode-id=&quot;1619&quot; name=&quot;USP&quot;&gt;&lt;/a&gt;&lt;h4 data-dcnode-id=&quot;1617&quot;&gt;&lt;span data-dcnode-id=&quot;1618&quot; instrument_node=&quot;&quot;&gt;Use In Specific Populations&lt;/span&gt;&lt;/h4&gt;&lt;h4 data-dcnode-id=&quot;1615&quot;&gt;&lt;span data-dcnode-id=&quot;1616&quot; instrument_node=&quot;&quot;&gt;Pregnancy&lt;/span&gt;&lt;/h4&gt;&lt;h5 data-dcnode-id=&quot;1613&quot;&gt;&lt;span data-dcnode-id=&quot;1614&quot; instrument_node=&quot;&quot;&gt;Pregnancy Exposure Registry&lt;/span&gt;&lt;/h5&gt;&lt;p data-dcnode-id=&quot;1611&quot;&gt;&lt;span data-dcnode-id=&quot;1612&quot; instrument_node=&quot;&quot;&gt;There is a pregnancy exposure registry that monitors pregnancy outcomes in women exposed to DYANAVEL XR during pregnancy. Healthcare providers are encouraged to register patients by calling the National Pregnancy Registry for Psychostimulants at 1-866-961-2388 or visiting online at https://womensmentalhealth.org/clinical-and-researchprograms/ pregnancyregistry/othermedications/.&lt;/span&gt;&lt;/p&gt;&lt;h5 data-dcnode-id=&quot;1609&quot;&gt;&lt;span data-dcnode-id=&quot;1610&quot; instrument_node=&quot;&quot;&gt;Risk Summary&lt;/span&gt;&lt;/h5&gt;&lt;p data-dcnode-id=&quot;1601&quot;&gt;&lt;span data-dcnode-id=&quot;1608&quot; instrument_node=&quot;&quot;&gt;There are limited published data on the use of amphetamines in pregnant women. These data are insufficient to determine a drug-associated risk of major &lt;/span&gt;&lt;a data-dcnode-id=&quot;1606&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/congenital/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;1607&quot; instrument_node=&quot;&quot;&gt;congenital&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1605&quot; instrument_node=&quot;&quot;&gt; malformations or &lt;/span&gt;&lt;a data-dcnode-id=&quot;1603&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/miscarriage/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;1604&quot; instrument_node=&quot;&quot;&gt;miscarriage&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1602&quot; instrument_node=&quot;&quot;&gt;. Adverse pregnancy outcomes, including premature delivery and low birth weight, have been seen in infants born to mothers dependent on amphetamines. No effects on morphological development were observed in embryo-fetal development studies with oral administration of amphetamine to rats and rabbits during organogenesis at doses 2 and 12 times, respectively, the maximum recommended human dose (MRHD) of 20 mg/day (as base equivalents) given to adolescents, on a mg/m² basis. However, long-term neurochemical and behavioral effects have been reported in published animal developmental studies using clinically relevant doses of amphetamine [see Data]. In the U.S. general population, the estimated background risk of major birth defects and miscarriage in clinically recognized pregnancies is 2% to 4% and 15% to 20%, respectively.&lt;/span&gt;&lt;/p&gt;&lt;h5 data-dcnode-id=&quot;1599&quot;&gt;&lt;span data-dcnode-id=&quot;1600&quot; instrument_node=&quot;&quot;&gt;Clinical Considerations&lt;/span&gt;&lt;/h5&gt;&lt;p data-dcnode-id=&quot;1596&quot;&gt;&lt;i data-dcnode-id=&quot;1597&quot;&gt;&lt;span data-dcnode-id=&quot;1598&quot; instrument_node=&quot;&quot;&gt;Fetal/Neonatal Adverse Reactions&lt;/span&gt;&lt;/i&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1588&quot;&gt;&lt;span data-dcnode-id=&quot;1595&quot; instrument_node=&quot;&quot;&gt;Amphetamines, such as DYANAVEL XR, may cause &lt;/span&gt;&lt;a data-dcnode-id=&quot;1593&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/vasoconstriction/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;1594&quot; instrument_node=&quot;&quot;&gt;vasoconstriction&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1592&quot; instrument_node=&quot;&quot;&gt;, including vasoconstriction of placental blood vessels, and may increase the risk for &lt;/span&gt;&lt;a data-dcnode-id=&quot;1590&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/intrauterine_growth_restriction/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;1591&quot; instrument_node=&quot;&quot;&gt;intrauterine growth restriction&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1589&quot; instrument_node=&quot;&quot;&gt;. In addition, amphetamines can stimulate uterine contractions increasing the risk of premature delivery. Premature delivery and low birth weight infants have been reported in amphetamine-dependent mothers.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1586&quot;&gt;&lt;span data-dcnode-id=&quot;1587&quot; instrument_node=&quot;&quot;&gt;Monitor infants born to mothers taking amphetamines for symptoms of withdrawal, such as feeding difficulties, irritability, agitation, and excessive drowsiness.&lt;/span&gt;&lt;/p&gt;&lt;h5 data-dcnode-id=&quot;1584&quot;&gt;&lt;span data-dcnode-id=&quot;1585&quot; instrument_node=&quot;&quot;&gt;Data&lt;/span&gt;&lt;/h5&gt;&lt;p data-dcnode-id=&quot;1581&quot;&gt;&lt;i data-dcnode-id=&quot;1582&quot;&gt;&lt;span data-dcnode-id=&quot;1583&quot; instrument_node=&quot;&quot;&gt;Animal Data&lt;/span&gt;&lt;/i&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1576&quot;&gt;&lt;span data-dcnode-id=&quot;1580&quot; instrument_node=&quot;&quot;&gt;Amphetamine (d- to l- enantiomer ratio of 3:1) had no apparent effects on embryofetal morphological development or survival when orally administered to pregnant rats and rabbits throughout the period of organogenesis at doses of up to 6 and 16 mg/kg/day, respectively. These doses are approximately 2 and 12 times, respectively, the MRHD of 20 mg/day (as base equivalents), given to adolescents, on a mg/m² basis. Fetal malformations and death have been reported in mice following &lt;/span&gt;&lt;a data-dcnode-id=&quot;1578&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/parenteral/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;1579&quot; instrument_node=&quot;&quot;&gt;parenteral&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1577&quot; instrument_node=&quot;&quot;&gt; administration of d-amphetamine doses of 50 mg/kg/day (approximately 10 times the MRHD) given to adolescents on a mg/m² basis or greater to pregnant animals. Administration of these doses was also associated with severe maternal toxicity.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1571&quot;&gt;&lt;span data-dcnode-id=&quot;1575&quot; instrument_node=&quot;&quot;&gt;A number of studies in rodents indicate that &lt;/span&gt;&lt;a data-dcnode-id=&quot;1573&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/prenatal/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;1574&quot; instrument_node=&quot;&quot;&gt;prenatal&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1572&quot; instrument_node=&quot;&quot;&gt; or early postnatal exposure to amphetamine (d- or d, l-), at doses similar to those used clinically, can result in long-term neurochemical and behavioral alterations. Reported behavioral effects include learning and memory deficits, altered locomotor activity, and changes in sexual function.&lt;/span&gt;&lt;/p&gt;&lt;h4 data-dcnode-id=&quot;1569&quot;&gt;&lt;span data-dcnode-id=&quot;1570&quot; instrument_node=&quot;&quot;&gt;Lactation&lt;/span&gt;&lt;/h4&gt;&lt;h5 data-dcnode-id=&quot;1567&quot;&gt;&lt;span data-dcnode-id=&quot;1568&quot; instrument_node=&quot;&quot;&gt;Risk Summary&lt;/span&gt;&lt;/h5&gt;&lt;p data-dcnode-id=&quot;1565&quot;&gt;&lt;span data-dcnode-id=&quot;1566&quot; instrument_node=&quot;&quot;&gt;Based on limited case reports in published literature, amphetamine (d- or d, l-) is present in human milk, at relative infant doses of 2% to 13.8% of the maternal weight-adjusted dosage and a milk/plasma ratio ranging between 1.9 and 7.5. There are no reports of adverse effects on the breastfed infant and no effects on milk production. However, long term neurodevelopmental effects on infants from stimulant exposure are unknown. Because of the potential for serious adverse reactions in a breastfed infant, advise patients that breastfeeding is not recommended during treatment with DYANAVEL XR.&lt;/span&gt;&lt;/p&gt;&lt;h4 data-dcnode-id=&quot;1563&quot;&gt;&lt;span data-dcnode-id=&quot;1564&quot; instrument_node=&quot;&quot;&gt;Pediatric Use&lt;/span&gt;&lt;/h4&gt;&lt;p data-dcnode-id=&quot;1552&quot;&gt;&lt;span data-dcnode-id=&quot;1562&quot; instrument_node=&quot;&quot;&gt;Safety and effectiveness have been established in pediatric patients with ADHD ages 6 to 17 years [see &lt;/span&gt;&lt;b data-dcnode-id=&quot;1560&quot;&gt;&lt;span data-dcnode-id=&quot;1561&quot; instrument_node=&quot;&quot;&gt;ADVERSE REACTIONS&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;1559&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;b data-dcnode-id=&quot;1557&quot;&gt;&lt;span data-dcnode-id=&quot;1558&quot; instrument_node=&quot;&quot;&gt;CLINICAL PHARMACOLOGY&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;1556&quot; instrument_node=&quot;&quot;&gt;, and &lt;/span&gt;&lt;b data-dcnode-id=&quot;1554&quot;&gt;&lt;span data-dcnode-id=&quot;1555&quot; instrument_node=&quot;&quot;&gt;Clinical Studies&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;1553&quot; instrument_node=&quot;&quot;&gt;]. Safety and efficacy in pediatric patients younger than 6 years with ADHD have not been established.&lt;/span&gt;&lt;/p&gt;&lt;h5 data-dcnode-id=&quot;1550&quot;&gt;&lt;span data-dcnode-id=&quot;1551&quot; instrument_node=&quot;&quot;&gt;Long-Term Growth Suppression&lt;/span&gt;&lt;/h5&gt;&lt;p data-dcnode-id=&quot;1545&quot;&gt;&lt;span data-dcnode-id=&quot;1549&quot; instrument_node=&quot;&quot;&gt;Growth should be monitored during treatment with stimulants, including DYANAVEL XR, and children who are not growing or gaining weight as expected may need to have their treatment interrupted [see &lt;/span&gt;&lt;b data-dcnode-id=&quot;1547&quot;&gt;&lt;span data-dcnode-id=&quot;1548&quot; instrument_node=&quot;&quot;&gt;WARNINGS AND PRECAUTIONS&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;1546&quot; instrument_node=&quot;&quot;&gt;].&lt;/span&gt;&lt;/p&gt;&lt;h4 data-dcnode-id=&quot;1543&quot;&gt;&lt;span data-dcnode-id=&quot;1544&quot; instrument_node=&quot;&quot;&gt;Geriatric Use&lt;/span&gt;&lt;/h4&gt;&lt;p data-dcnode-id=&quot;1541&quot;&gt;&lt;span data-dcnode-id=&quot;1542&quot; instrument_node=&quot;&quot;&gt;DYANAVEL XR has not been studied in the geriatric population.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1540&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;a data-dcnode-id=&quot;1514&quot; name=&quot;OD&quot;&gt;&lt;/a&gt;&lt;h3 data-dcnode-id=&quot;1512&quot;&gt;&lt;span data-dcnode-id=&quot;1513&quot; instrument_node=&quot;&quot;&gt;OVERDOSE&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;1510&quot;&gt;&lt;span data-dcnode-id=&quot;1511&quot; instrument_node=&quot;&quot;&gt;Consult with a Certified Poison Control Center (1-800-222-1222) for up-to-date guidance and advice for treatment of overdosage. Individual patient response to amphetamines varies widely. Toxic symptoms may occur idiosyncratically at low doses.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1490&quot;&gt;&lt;span data-dcnode-id=&quot;1509&quot; instrument_node=&quot;&quot;&gt;Manifestations of amphetamine overdose include restlessness, tremor, hyperreflexia, rapid &lt;/span&gt;&lt;a data-dcnode-id=&quot;1507&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/respiration/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;1508&quot; instrument_node=&quot;&quot;&gt;respiration&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1506&quot; instrument_node=&quot;&quot;&gt;, confusion, assaultiveness, hallucinations, panic states, hyperpyrexia, and &lt;/span&gt;&lt;a data-dcnode-id=&quot;1504&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/rhabdomyolysis/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;1505&quot; instrument_node=&quot;&quot;&gt;rhabdomyolysis&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1503&quot; instrument_node=&quot;&quot;&gt;. Fatigue and depression usually follow the &lt;/span&gt;&lt;a data-dcnode-id=&quot;1501&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/central_nervous_system_cns/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;1502&quot; instrument_node=&quot;&quot;&gt;central nervous system&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1500&quot; instrument_node=&quot;&quot;&gt; stimulation. Other reactions include arrhythmias, hypertension or &lt;/span&gt;&lt;a data-dcnode-id=&quot;1498&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/hypotension/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;1499&quot; instrument_node=&quot;&quot;&gt;hypotension&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1497&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a data-dcnode-id=&quot;1495&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/circulatory/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;1496&quot; instrument_node=&quot;&quot;&gt;circulatory&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1494&quot; instrument_node=&quot;&quot;&gt; collapse, nausea, vomiting, diarrhea, and abdominal cramps. Fatal &lt;/span&gt;&lt;a data-dcnode-id=&quot;1492&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/poisoning/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;1493&quot; instrument_node=&quot;&quot;&gt;poisoning&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1491&quot; instrument_node=&quot;&quot;&gt; is usually preceded by convulsions and coma.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1489&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a data-dcnode-id=&quot;1488&quot; name=&quot;CI&quot;&gt;&lt;/a&gt;&lt;h3 data-dcnode-id=&quot;1486&quot;&gt;&lt;span data-dcnode-id=&quot;1487&quot; instrument_node=&quot;&quot;&gt;CONTRAINDICATIONS&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;1484&quot;&gt;&lt;span data-dcnode-id=&quot;1485&quot; instrument_node=&quot;&quot;&gt;DYANAVEL XR is contraindicated:&lt;/span&gt;&lt;/p&gt;&lt;ul data-dcnode-id=&quot;1464&quot;&gt;&lt;li data-dcnode-id=&quot;1476&quot;&gt;&lt;span data-dcnode-id=&quot;1483&quot; instrument_node=&quot;&quot;&gt;In patients known to be hypersensitive to amphetamine, or other components of DYANAVEL XR. Hypersensitivity reactions such as &lt;/span&gt;&lt;a data-dcnode-id=&quot;1481&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/angioedema/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;1482&quot; instrument_node=&quot;&quot;&gt;angioedema&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1480&quot; instrument_node=&quot;&quot;&gt; and anaphylactic reactions have been reported in patients treated with other amphetamine products [see &lt;/span&gt;&lt;b data-dcnode-id=&quot;1478&quot;&gt;&lt;span data-dcnode-id=&quot;1479&quot; instrument_node=&quot;&quot;&gt;ADVERSE REACTIONS&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;1477&quot; instrument_node=&quot;&quot;&gt;].&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;1465&quot;&gt;&lt;span data-dcnode-id=&quot;1475&quot; instrument_node=&quot;&quot;&gt;Patients taking monoamine oxidase inhibitors (MAOIs), or within 14 days of stopping MAOIs (including MAOIs such as linezolid or intravenous methylene blue), because of an increased risk of &lt;/span&gt;&lt;a data-dcnode-id=&quot;1473&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/hypertensive_crisis/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;1474&quot; instrument_node=&quot;&quot;&gt;hypertensive crisis&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1472&quot; instrument_node=&quot;&quot;&gt; [see&lt;/span&gt;&lt;b data-dcnode-id=&quot;1470&quot;&gt;&lt;span data-dcnode-id=&quot;1471&quot; instrument_node=&quot;&quot;&gt; WARNINGS AND PRECAUTIONS&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;1469&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;b data-dcnode-id=&quot;1467&quot;&gt;&lt;span data-dcnode-id=&quot;1468&quot; instrument_node=&quot;&quot;&gt;DRUG INTERACTIONS&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;1466&quot; instrument_node=&quot;&quot;&gt;].&lt;/span&gt;&lt;/li&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;1463&quot; instrument_node=&quot;&quot;&gt;
