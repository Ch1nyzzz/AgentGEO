&lt;/span&gt;&lt;p data-dcnode-id=&quot;2944&quot;&gt;&lt;span data-dcnode-id=&quot;2945&quot; instrument_node=&quot;&quot;&gt;It is not known if Dyanavel XR is safe and effective in children younger than 6 years of age.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2943&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;a data-dcnode-id=&quot;2543&quot; name=&quot;I&quot;&gt;&lt;/a&gt;&lt;h3 data-dcnode-id=&quot;2541&quot;&gt;&lt;span data-dcnode-id=&quot;2542&quot; instrument_node=&quot;&quot;&gt;INDICATIONS&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;2536&quot;&gt;&lt;span data-dcnode-id=&quot;2540&quot; instrument_node=&quot;&quot;&gt;DYANAVEL XR is indicated for the treatment of Attention Deficit Hyperactivity Disorder (ADHD) in patients 6 years and older [see &lt;/span&gt;&lt;b data-dcnode-id=&quot;2538&quot;&gt;&lt;span data-dcnode-id=&quot;2539&quot; instrument_node=&quot;&quot;&gt;Clinical Studies&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;2537&quot; instrument_node=&quot;&quot;&gt;].&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2535&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a data-dcnode-id=&quot;2534&quot; name=&quot;DAA&quot;&gt;&lt;/a&gt;&lt;h3 data-dcnode-id=&quot;2532&quot;&gt;&lt;span data-dcnode-id=&quot;2533&quot; instrument_node=&quot;&quot;&gt;DOSAGE AND ADMINISTRATION&lt;/span&gt;&lt;/h3&gt;&lt;h4 data-dcnode-id=&quot;2530&quot;&gt;&lt;span data-dcnode-id=&quot;2531&quot; instrument_node=&quot;&quot;&gt;Important Information Prior To Initiating Treatment&lt;/span&gt;&lt;/h4&gt;&lt;p data-dcnode-id=&quot;2525&quot;&gt;&lt;span data-dcnode-id=&quot;2529&quot; instrument_node=&quot;&quot;&gt;Prior to initiating treatment with DYANAVEL XR, assess for the presence of cardiac disease (i.e., perform a careful history, family history of sudden death or ventricular arrhythmia, and physical exam) [see &lt;/span&gt;&lt;b data-dcnode-id=&quot;2527&quot;&gt;&lt;span data-dcnode-id=&quot;2528&quot; instrument_node=&quot;&quot;&gt;WARNINGS AND PRECAUTIONS&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;2526&quot; instrument_node=&quot;&quot;&gt;].&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2517&quot;&gt;&lt;span data-dcnode-id=&quot;2524&quot; instrument_node=&quot;&quot;&gt;Assess the risk of abuse prior to prescribing, and monitor for signs of abuse and dependence while on therapy. Maintain careful prescription records, educate patients about abuse, monitor for signs of abuse and overdose, and periodically re-evaluate the need for DYANAVEL XR use [see &lt;/span&gt;&lt;b data-dcnode-id=&quot;2522&quot;&gt;&lt;span data-dcnode-id=&quot;2523&quot; instrument_node=&quot;&quot;&gt;PRECAUTIONS&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;2521&quot; instrument_node=&quot;&quot;&gt;, and &lt;/span&gt;&lt;b data-dcnode-id=&quot;2519&quot;&gt;&lt;span data-dcnode-id=&quot;2520&quot; instrument_node=&quot;&quot;&gt;Drug Abuse And Dependence&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;2518&quot; instrument_node=&quot;&quot;&gt;].&lt;/span&gt;&lt;/p&gt;&lt;h4 data-dcnode-id=&quot;2515&quot;&gt;&lt;span data-dcnode-id=&quot;2516&quot; instrument_node=&quot;&quot;&gt;General Dosing Information&lt;/span&gt;&lt;/h4&gt;&lt;p data-dcnode-id=&quot;2513&quot;&gt;&lt;span data-dcnode-id=&quot;2514&quot; instrument_node=&quot;&quot;&gt;DYANAVELXR should be orally administered once daily in the morning with or without food. The dose should be individualized according to the needs and responses of the patient. Before administering the dose, shake the bottle of DYANAVELXR.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2511&quot;&gt;&lt;span data-dcnode-id=&quot;2512&quot; instrument_node=&quot;&quot;&gt;In patients 6 years of age and older, start with 2.5 mg or 5 mg once daily in the morning. The dose may be increased in increments of 2.5 mg to 10 mg per day every 4 to 7 days up to a maximum dose of 20 mg per day.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2509&quot;&gt;&lt;span data-dcnode-id=&quot;2510&quot; instrument_node=&quot;&quot;&gt;Pharmacological treatment of ADHD may be needed for extended periods. Healthcare providers should periodically re-evaluate the long-term use of DYANAVEL XR, and adjust dosage as needed.&lt;/span&gt;&lt;/p&gt;&lt;h4 data-dcnode-id=&quot;2507&quot;&gt;&lt;span data-dcnode-id=&quot;2508&quot; instrument_node=&quot;&quot;&gt;Switching From Other Amphetamine Products&lt;/span&gt;&lt;/h4&gt;&lt;p data-dcnode-id=&quot;2505&quot;&gt;&lt;span data-dcnode-id=&quot;2506&quot; instrument_node=&quot;&quot;&gt;If switching from other amphetamine products, discontinue that treatment, and titrate with DYANAVEL XR using the above titration schedule.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2497&quot;&gt;&lt;span data-dcnode-id=&quot;2504&quot; instrument_node=&quot;&quot;&gt;Do not substitute for other amphetamine products on a milligram-per-milligram basis, because of different amphetamine salt compositions and differing pharmacokinetic profiles [see &lt;/span&gt;&lt;b data-dcnode-id=&quot;2502&quot;&gt;&lt;span data-dcnode-id=&quot;2503&quot; instrument_node=&quot;&quot;&gt;DESCRIPTION&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;2501&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;b data-dcnode-id=&quot;2499&quot;&gt;&lt;span data-dcnode-id=&quot;2500&quot; instrument_node=&quot;&quot;&gt;CLINICAL PHARMACOLOGY&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;2498&quot; instrument_node=&quot;&quot;&gt;].&lt;/span&gt;&lt;/p&gt;&lt;h4 data-dcnode-id=&quot;2495&quot;&gt;&lt;span data-dcnode-id=&quot;2496&quot; instrument_node=&quot;&quot;&gt;Dosage Modifications Due To Drug Interactions&lt;/span&gt;&lt;/h4&gt;&lt;p data-dcnode-id=&quot;2490&quot;&gt;&lt;span data-dcnode-id=&quot;2494&quot; instrument_node=&quot;&quot;&gt;Agents that alter urinary pH can impact urinary excretion and alter blood levels of amphetamine. Acidifying agents (e.g., ascorbic acid) decrease blood levels, while alkalinizing agents (e.g., sodium bicarbonate) increase blood levels. Adjust DYANAVEL XR dosage accordingly [see&lt;/span&gt;&lt;b data-dcnode-id=&quot;2492&quot;&gt;&lt;span data-dcnode-id=&quot;2493&quot; instrument_node=&quot;&quot;&gt; DRUG INTERACTIONS&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;2491&quot; instrument_node=&quot;&quot;&gt;].&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2489&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a data-dcnode-id=&quot;2488&quot; name=&quot;HS&quot;&gt;&lt;/a&gt;&lt;h3 data-dcnode-id=&quot;2486&quot;&gt;&lt;span data-dcnode-id=&quot;2487&quot; instrument_node=&quot;&quot;&gt;HOW SUPPLIED&lt;/span&gt;&lt;/h3&gt;&lt;h4 data-dcnode-id=&quot;2484&quot;&gt;&lt;span data-dcnode-id=&quot;2485&quot; instrument_node=&quot;&quot;&gt;Dosage Forms And Strengths&lt;/span&gt;&lt;/h4&gt;&lt;p data-dcnode-id=&quot;2482&quot;&gt;&lt;span data-dcnode-id=&quot;2483&quot; instrument_node=&quot;&quot;&gt;Extended-release oral suspension contains 2.5 mg amphetamine base equivalents per mL.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;EmphText&quot; data-dcnode-id=&quot;2475&quot;&gt;&lt;b data-dcnode-id=&quot;2480&quot;&gt;&lt;span data-dcnode-id=&quot;2481&quot; instrument_node=&quot;&quot;&gt;DYANAVEL XR (amphetamine)&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;2479&quot; instrument_node=&quot;&quot;&gt; extended-release oral suspension,the concentration is 2.5 mg/mL amphetamine base equivalents and is supplied as light beige to tan viscous suspension with bubblegum flavor in bottles of 464 mL (&lt;/span&gt;&lt;b data-dcnode-id=&quot;2477&quot;&gt;&lt;span data-dcnode-id=&quot;2478&quot; instrument_node=&quot;&quot;&gt;NDC&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;2476&quot; instrument_node=&quot;&quot;&gt; 27808- 102-01).&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2473&quot;&gt;&lt;span data-dcnode-id=&quot;2474&quot; instrument_node=&quot;&quot;&gt;The product is provided in a carton. Each carton also contains four oral dispensers and four bottle adapters.&lt;/span&gt;&lt;/p&gt;&lt;h4 data-dcnode-id=&quot;2471&quot;&gt;&lt;span data-dcnode-id=&quot;2472&quot; instrument_node=&quot;&quot;&gt;Storage And Handling&lt;/span&gt;&lt;/h4&gt;&lt;p data-dcnode-id=&quot;2469&quot;&gt;&lt;span data-dcnode-id=&quot;2470&quot; instrument_node=&quot;&quot;&gt;Dispense in a tight container with child-resistant closure.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2464&quot;&gt;&lt;span data-dcnode-id=&quot;2468&quot; instrument_node=&quot;&quot;&gt;Store at 20° to 25°C (68° to 77°F); excursions permitted from 15° to 30°C (59° to 86°F) [see &lt;/span&gt;&lt;b data-dcnode-id=&quot;2466&quot;&gt;&lt;span data-dcnode-id=&quot;2467&quot; instrument_node=&quot;&quot;&gt;USP Controlled Room Temperature&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;2465&quot; instrument_node=&quot;&quot;&gt;].&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2462&quot;&gt;&lt;span data-dcnode-id=&quot;2463&quot; instrument_node=&quot;&quot;&gt;The pharmacist should insert the bottle adapter firmly into the neck of the bottle and provide the oral dosing dispenser to the patient when dispensing this product.&lt;/span&gt;&lt;/p&gt;&lt;h4 data-dcnode-id=&quot;2460&quot;&gt;&lt;span data-dcnode-id=&quot;2461&quot; instrument_node=&quot;&quot;&gt;Disposal&lt;/span&gt;&lt;/h4&gt;&lt;p data-dcnode-id=&quot;2458&quot;&gt;&lt;span data-dcnode-id=&quot;2459&quot; instrument_node=&quot;&quot;&gt;Comply with local laws and regulations on drug disposal of CNS stimulants. Dispose of remaining, unused, or expired DYANAVEL XR at authorized collection sites such as retail pharmacies, hospital or clinic pharmacies, and law enforcement locations. If no take-back program or authorized collector is available, mix DYANAVEL XR with an undesirable, nontoxic substance to make it less appealing to children and pets. Place the mixture in a container such as a sealed plastic bag and discard DYANAVEL XR in the household trash.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;credit&quot; data-dcnode-id=&quot;2456&quot;&gt;&lt;span data-dcnode-id=&quot;2457&quot; instrument_node=&quot;&quot;&gt;Manufactured by: Tris Pharma, Inc., Monmouth Junction, NJ 08852. Revised : Feb 2019&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2455&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;a data-dcnode-id=&quot;2413&quot; name=&quot;AR&quot;&gt;&lt;/a&gt;&lt;h3 data-dcnode-id=&quot;2411&quot;&gt;&lt;span data-dcnode-id=&quot;2412&quot; instrument_node=&quot;&quot;&gt;SIDE EFFECTS&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;2409&quot;&gt;&lt;span data-dcnode-id=&quot;2410&quot; instrument_node=&quot;&quot;&gt;The following adverse reactions are discussed in greater detail in other sections of the labeling:&lt;/span&gt;&lt;/p&gt;&lt;ul data-dcnode-id=&quot;2354&quot;&gt;&lt;li data-dcnode-id=&quot;2398&quot;&gt;&lt;span data-dcnode-id=&quot;2408&quot; instrument_node=&quot;&quot;&gt;Drug Dependence [see &lt;/span&gt;&lt;b data-dcnode-id=&quot;2406&quot;&gt;&lt;span data-dcnode-id=&quot;2407&quot; instrument_node=&quot;&quot;&gt;BOXED WARNING&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;2405&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;b data-dcnode-id=&quot;2403&quot;&gt;&lt;span data-dcnode-id=&quot;2404&quot; instrument_node=&quot;&quot;&gt;WARNINGS AND PRECAUTIONS&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;2402&quot; instrument_node=&quot;&quot;&gt;, and &lt;/span&gt;&lt;b data-dcnode-id=&quot;2400&quot;&gt;&lt;span data-dcnode-id=&quot;2401&quot; instrument_node=&quot;&quot;&gt;Drug Abuse And Dependence&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;2399&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;2393&quot;&gt;&lt;span data-dcnode-id=&quot;2397&quot; instrument_node=&quot;&quot;&gt;Hypersensitivity to amphetamine, or other components of DYANAVEL XR [see &lt;/span&gt;&lt;b data-dcnode-id=&quot;2395&quot;&gt;&lt;span data-dcnode-id=&quot;2396&quot; instrument_node=&quot;&quot;&gt;CONTRAINDICATIONS&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;2394&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;2385&quot;&gt;&lt;span data-dcnode-id=&quot;2392&quot; instrument_node=&quot;&quot;&gt;Hypertensive Crisis When Used Concomitantly with Monoamine Oxidase Inhibitors [see &lt;/span&gt;&lt;b data-dcnode-id=&quot;2390&quot;&gt;&lt;span data-dcnode-id=&quot;2391&quot; instrument_node=&quot;&quot;&gt;CONTRAINDICATIONS&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;2389&quot; instrument_node=&quot;&quot;&gt; and &lt;/span&gt;&lt;b data-dcnode-id=&quot;2387&quot;&gt;&lt;span data-dcnode-id=&quot;2388&quot; instrument_node=&quot;&quot;&gt;DRUG INTERACTIONS&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;2386&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;2380&quot;&gt;&lt;span data-dcnode-id=&quot;2384&quot; instrument_node=&quot;&quot;&gt;Serious Cardiovascular Reactions [see&lt;/span&gt;&lt;b data-dcnode-id=&quot;2382&quot;&gt;&lt;span data-dcnode-id=&quot;2383&quot; instrument_node=&quot;&quot;&gt; WARNINGS AND PRECAUTIONS&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;2381&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;2375&quot;&gt;&lt;span data-dcnode-id=&quot;2379&quot; instrument_node=&quot;&quot;&gt;Blood Pressure and Heart Rate Increases [see&lt;/span&gt;&lt;b data-dcnode-id=&quot;2377&quot;&gt;&lt;span data-dcnode-id=&quot;2378&quot; instrument_node=&quot;&quot;&gt; WARNINGS AND PRECAUTIONS&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;2376&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;2370&quot;&gt;&lt;span data-dcnode-id=&quot;2374&quot; instrument_node=&quot;&quot;&gt;Psychiatric Adverse Reactions [see&lt;/span&gt;&lt;b data-dcnode-id=&quot;2372&quot;&gt;&lt;span data-dcnode-id=&quot;2373&quot; instrument_node=&quot;&quot;&gt; WARNINGS AND PRECAUTIONS&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;2371&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;2365&quot;&gt;&lt;span data-dcnode-id=&quot;2369&quot; instrument_node=&quot;&quot;&gt;Long-Term Suppression of Growth [see&lt;/span&gt;&lt;b data-dcnode-id=&quot;2367&quot;&gt;&lt;span data-dcnode-id=&quot;2368&quot; instrument_node=&quot;&quot;&gt; WARNINGS AND PRECAUTIONS&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;2366&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;2360&quot;&gt;&lt;span data-dcnode-id=&quot;2364&quot; instrument_node=&quot;&quot;&gt;Peripheral Vasculopathy, including Raynaud's phenomenon [see&lt;/span&gt;&lt;b data-dcnode-id=&quot;2362&quot;&gt;&lt;span data-dcnode-id=&quot;2363&quot; instrument_node=&quot;&quot;&gt; WARNINGS AND PRECAUTIONS&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;2361&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;2355&quot;&gt;&lt;span data-dcnode-id=&quot;2359&quot; instrument_node=&quot;&quot;&gt;Serotonin Syndrome [see&lt;/span&gt;&lt;b data-dcnode-id=&quot;2357&quot;&gt;&lt;span data-dcnode-id=&quot;2358&quot; instrument_node=&quot;&quot;&gt; WARNINGS AND PRECAUTIONS&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;2356&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/li&gt;&lt;/ul&gt;&lt;h4 data-dcnode-id=&quot;2352&quot;&gt;&lt;span data-dcnode-id=&quot;2353&quot; instrument_node=&quot;&quot;&gt;Clinical Trial Experience&lt;/span&gt;&lt;/h4&gt;&lt;p data-dcnode-id=&quot;2350&quot;&gt;&lt;span data-dcnode-id=&quot;2351&quot; instrument_node=&quot;&quot;&gt;Because clinical trials are conducted under widely varying conditions, adverse reaction rates observed in the clinical trials of a drug cannot be directly compared to rates in the clinical trials of another drug and may not reflect the rates observed in clinical practice.&lt;/span&gt;&lt;/p&gt;&lt;h5 data-dcnode-id=&quot;2348&quot;&gt;&lt;span data-dcnode-id=&quot;2349&quot; instrument_node=&quot;&quot;&gt;Clinical Trials Experience With Other Amphetamine Products In Pediatric Patients And Adults With ADHD&lt;/span&gt;&lt;/h5&gt;&lt;p data-dcnode-id=&quot;2344&quot;&gt;&lt;b data-dcnode-id=&quot;2346&quot;&gt;&lt;span data-dcnode-id=&quot;2347&quot; instrument_node=&quot;&quot;&gt;Cardiovascular: &lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;2345&quot; instrument_node=&quot;&quot;&gt;Palpitations, tachycardia, elevation of blood pressure, sudden death, myocardial infarction. There have been isolated reports of cardiomyopathy associated with chronic amphetamine use.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2340&quot;&gt;&lt;b data-dcnode-id=&quot;2342&quot;&gt;&lt;span data-dcnode-id=&quot;2343&quot; instrument_node=&quot;&quot;&gt;Central Nervous System:&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;2341&quot; instrument_node=&quot;&quot;&gt; Psychotic episodes at recommended doses, overstimulation, restlessness, irritability, euphoria, dyskinesia, dysphoria, depression, tremor, tics, aggression, anger, logorrhea.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2336&quot;&gt;&lt;b data-dcnode-id=&quot;2338&quot;&gt;&lt;span data-dcnode-id=&quot;2339&quot; instrument_node=&quot;&quot;&gt;Eye Disorders:&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;2337&quot; instrument_node=&quot;&quot;&gt; Vision blurred, mydriasis.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2332&quot;&gt;&lt;b data-dcnode-id=&quot;2334&quot;&gt;&lt;span data-dcnode-id=&quot;2335&quot; instrument_node=&quot;&quot;&gt;Gastrointestinal:&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;2333&quot; instrument_node=&quot;&quot;&gt; Dryness of the mouth, unpleasant taste, diarrhea, constipation, other gastrointestinal disturbances. Anorexia and weight loss may occur as undesirable effects.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2328&quot;&gt;&lt;b data-dcnode-id=&quot;2330&quot;&gt;&lt;span data-dcnode-id=&quot;2331&quot; instrument_node=&quot;&quot;&gt;Allergic:&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;2329&quot; instrument_node=&quot;&quot;&gt; Urticaria, rash, hypersensitivity reactions including angioedema and anaphylaxis. Serious skin rashes, including Stevens-Johnson syndrome and toxic epidermal necrolysis have been reported.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2324&quot;&gt;&lt;b data-dcnode-id=&quot;2326&quot;&gt;&lt;span data-dcnode-id=&quot;2327&quot; instrument_node=&quot;&quot;&gt;Endocrine:&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;2325&quot; instrument_node=&quot;&quot;&gt; Impotence, changes in libido.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2320&quot;&gt;&lt;b data-dcnode-id=&quot;2322&quot;&gt;&lt;span data-dcnode-id=&quot;2323&quot; instrument_node=&quot;&quot;&gt;Skin:&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;2321&quot; instrument_node=&quot;&quot;&gt; Alopecia.&lt;/span&gt;&lt;/p&gt;&lt;h5 data-dcnode-id=&quot;2318&quot;&gt;&lt;span data-dcnode-id=&quot;2319&quot; instrument_node=&quot;&quot;&gt;Clinical Trials Experience With DYANAVEL XR In Pediatric Patients With ADHD&lt;/span&gt;&lt;/h5&gt;&lt;p data-dcnode-id=&quot;2316&quot;&gt;&lt;span data-dcnode-id=&quot;2317&quot; instrument_node=&quot;&quot;&gt;There is limited experience with DYANAVEL XR in controlled trials. Based on this limited experience, the adverse reaction profile of DYANAVEL XR appears similar to other amphetamine extended-release products. The most common (≥2% in the DYANAVEL XR group and greater than placebo) adverse reactions reported in the Phase 3 controlled study conducted in 108 patients with ADHD (aged 6 to 12 years) were: epistaxis, allergic rhinitis and upper abdominal pain.&lt;/span&gt;&lt;/p&gt;&lt;p align=&quot;center&quot; data-dcnode-id=&quot;2313&quot;&gt;&lt;b data-dcnode-id=&quot;2314&quot;&gt;&lt;span data-dcnode-id=&quot;2315&quot; instrument_node=&quot;&quot;&gt;Table 1: Common adverse reactions occurring in ≥2% of Subjects on DYANAVEL XR and greater than Placebo during the double blind phase.&lt;/span&gt;&lt;/b&gt;&lt;/p&gt;&lt;center data-dcnode-id=&quot;2270&quot;&gt;&lt;table cellspacing=&quot;0&quot; class=&quot;blacktbl&quot; data-dcnode-id=&quot;2271&quot; width=&quot;450&quot;&gt;&lt;tbody data-dcnode-id=&quot;2272&quot;&gt;&lt;tr data-dcnode-id=&quot;2302&quot;&gt;&lt;td class=&quot;EmphTd&quot; data-dcnode-id=&quot;2311&quot; width=&quot;50%&quot;&gt;&lt;span data-dcnode-id=&quot;2312&quot; instrument_node=&quot;&quot;&gt;Preferred Term&lt;/span&gt;&lt;/td&gt;&lt;td class=&quot;EmphTd&quot; data-dcnode-id=&quot;2307&quot; width=&quot;25%&quot;&gt;&lt;span data-dcnode-id=&quot;2310&quot; instrument_node=&quot;&quot;&gt;DYANAVEL XR&lt;/span&gt;&lt;br data-dcnode-id=&quot;2309&quot;&gt;&lt;span data-dcnode-id=&quot;2308&quot; instrument_node=&quot;&quot;&gt;(N=52)&lt;/span&gt;&lt;/td&gt;&lt;td class=&quot;EmphTd&quot; data-dcnode-id=&quot;2303&quot; width=&quot;25%&quot;&gt;&lt;span data-dcnode-id=&quot;2306&quot; instrument_node=&quot;&quot;&gt;Placebo&lt;/span&gt;&lt;br data-dcnode-id=&quot;2305&quot;&gt;&lt;span data-dcnode-id=&quot;2304&quot; instrument_node=&quot;&quot;&gt;(N=48)&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;2298&quot;&gt;&lt;td colspan=&quot;3&quot; data-dcnode-id=&quot;2299&quot;&gt;&lt;b data-dcnode-id=&quot;2300&quot;&gt;&lt;span data-dcnode-id=&quot;2301&quot; instrument_node=&quot;&quot;&gt;Respiratory, thoracic and mediastinal disorders&lt;/span&gt;&lt;/b&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;2291&quot;&gt;&lt;td data-dcnode-id=&quot;2296&quot;&gt;&lt;span data-dcnode-id=&quot;2297&quot; instrument_node=&quot;&quot;&gt;Epistaxis&lt;/span&gt;&lt;/td&gt;&lt;td align=&quot;center&quot; data-dcnode-id=&quot;2294&quot;&gt;&lt;span data-dcnode-id=&quot;2295&quot; instrument_node=&quot;&quot;&gt;3.8%&lt;/span&gt;&lt;/td&gt;&lt;td align=&quot;center&quot; data-dcnode-id=&quot;2292&quot;&gt;&lt;span data-dcnode-id=&quot;2293&quot; instrument_node=&quot;&quot;&gt;0%&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;2284&quot;&gt;&lt;td data-dcnode-id=&quot;2289&quot;&gt;&lt;span data-dcnode-id=&quot;2290&quot; instrument_node=&quot;&quot;&gt;Rhinitis allergic&lt;/span&gt;&lt;/td&gt;&lt;td align=&quot;center&quot; data-dcnode-id=&quot;2287&quot;&gt;&lt;span data-dcnode-id=&quot;2288&quot; instrument_node=&quot;&quot;&gt;3.8%&lt;/span&gt;&lt;/td&gt;&lt;td align=&quot;center&quot; data-dcnode-id=&quot;2285&quot;&gt;&lt;span data-dcnode-id=&quot;2286&quot; instrument_node=&quot;&quot;&gt;0%&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;2280&quot;&gt;&lt;td colspan=&quot;3&quot; data-dcnode-id=&quot;2281&quot;&gt;&lt;b data-dcnode-id=&quot;2282&quot;&gt;&lt;span data-dcnode-id=&quot;2283&quot; instrument_node=&quot;&quot;&gt;Gastrointestinal disorders&lt;/span&gt;&lt;/b&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;2273&quot;&gt;&lt;td data-dcnode-id=&quot;2278&quot;&gt;&lt;span data-dcnode-id=&quot;2279&quot; instrument_node=&quot;&quot;&gt;Abdominal pain upper&lt;/span&gt;&lt;/td&gt;&lt;td align=&quot;center&quot; data-dcnode-id=&quot;2276&quot;&gt;&lt;span data-dcnode-id=&quot;2277&quot; instrument_node=&quot;&quot;&gt;3.8%&lt;/span&gt;&lt;/td&gt;&lt;td align=&quot;center&quot; data-dcnode-id=&quot;2274&quot;&gt;&lt;span data-dcnode-id=&quot;2275&quot; instrument_node=&quot;&quot;&gt;2.1%&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;/tbody&gt;&lt;/table&gt;&lt;/center&gt;&lt;p data-dcnode-id=&quot;2269&quot;&gt;&lt;/p&gt;&lt;h4 data-dcnode-id=&quot;2267&quot;&gt;&lt;span data-dcnode-id=&quot;2268&quot; instrument_node=&quot;&quot;&gt;Postmarketing Experience&lt;/span&gt;&lt;/h4&gt;&lt;p data-dcnode-id=&quot;2265&quot;&gt;&lt;span data-dcnode-id=&quot;2266&quot; instrument_node=&quot;&quot;&gt;The following adverse reactions have been identified during post approval use of other amphetamine products. Because these reactions are reported voluntarily from a population of uncertain size, it is not possible to reliably estimate their frequency or establish a causal relationship to drug exposure.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2261&quot;&gt;&lt;b data-dcnode-id=&quot;2263&quot;&gt;&lt;span data-dcnode-id=&quot;2264&quot; instrument_node=&quot;&quot;&gt;Allergic:&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;2262&quot; instrument_node=&quot;&quot;&gt; urticaria, rash, hypersensitivity reactions including angioedema and anaphylaxis. Serious skin rashes, including Stevens-Johnson Syndrome and toxic epidermal necrolysis have been reported.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2257&quot;&gt;&lt;b data-dcnode-id=&quot;2259&quot;&gt;&lt;span data-dcnode-id=&quot;2260&quot; instrument_node=&quot;&quot;&gt;Cardiovascular:&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;2258&quot; instrument_node=&quot;&quot;&gt; palpitations, sudden death, myocardial infarction. There have been isolated reports of cardiomyopathy associated with chronic amphetamine use.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2253&quot;&gt;&lt;b data-dcnode-id=&quot;2255&quot;&gt;&lt;span data-dcnode-id=&quot;2256&quot; instrument_node=&quot;&quot;&gt;Central Nervous System:&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;2254&quot; instrument_node=&quot;&quot;&gt; restlessness, irritability, euphoria, dyskinesia, dysphoria, depression, tremor, aggression, anger, logorrhea, and paresthesia (including formication).&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2249&quot;&gt;&lt;b data-dcnode-id=&quot;2251&quot;&gt;&lt;span data-dcnode-id=&quot;2252&quot; instrument_node=&quot;&quot;&gt;Endocrine:&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;2250&quot; instrument_node=&quot;&quot;&gt; impotence, changes in libido, frequent or prolonged erections.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2245&quot;&gt;&lt;b data-dcnode-id=&quot;2247&quot;&gt;&lt;span data-dcnode-id=&quot;2248&quot; instrument_node=&quot;&quot;&gt;Eye Disorders:&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;2246&quot; instrument_node=&quot;&quot;&gt; vision blurred, mydriasis&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2241&quot;&gt;&lt;b data-dcnode-id=&quot;2243&quot;&gt;&lt;span data-dcnode-id=&quot;2244&quot; instrument_node=&quot;&quot;&gt;Gastrointestinal:&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;2242&quot; instrument_node=&quot;&quot;&gt; unpleasant taste, constipation, other gastrointestinal disturbances.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2237&quot;&gt;&lt;b data-dcnode-id=&quot;2239&quot;&gt;&lt;span data-dcnode-id=&quot;2240&quot; instrument_node=&quot;&quot;&gt;Musculoskeletal, Connective Tissue, and Bone Disorders:&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;2238&quot; instrument_node=&quot;&quot;&gt; rhabdomyolysis.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2233&quot;&gt;&lt;b data-dcnode-id=&quot;2235&quot;&gt;&lt;span data-dcnode-id=&quot;2236&quot; instrument_node=&quot;&quot;&gt;Psychiatric Disorders:&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;2234&quot; instrument_node=&quot;&quot;&gt; dermatillomania, bruxism.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2229&quot;&gt;&lt;b data-dcnode-id=&quot;2231&quot;&gt;&lt;span data-dcnode-id=&quot;2232&quot; instrument_node=&quot;&quot;&gt;Skin:&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;2230&quot; instrument_node=&quot;&quot;&gt; alopecia&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2225&quot;&gt;&lt;b data-dcnode-id=&quot;2227&quot;&gt;&lt;span data-dcnode-id=&quot;2228&quot; instrument_node=&quot;&quot;&gt;Vascular Disorders:&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;2226&quot; instrument_node=&quot;&quot;&gt; Raynaud's phenomenon&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2224&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;a data-dcnode-id=&quot;2198&quot; name=&quot;DI&quot;&gt;&lt;/a&gt;&lt;h3 data-dcnode-id=&quot;2196&quot;&gt;&lt;span data-dcnode-id=&quot;2197&quot; instrument_node=&quot;&quot;&gt;DRUG INTERACTIONS&lt;/span&gt;&lt;/h3&gt;&lt;h4 data-dcnode-id=&quot;2194&quot;&gt;&lt;span data-dcnode-id=&quot;2195&quot; instrument_node=&quot;&quot;&gt;Drugs Having Clinically Important Interactions With Amphetamines&lt;/span&gt;&lt;/h4&gt;&lt;p align=&quot;center&quot; data-dcnode-id=&quot;2191&quot;&gt;&lt;b data-dcnode-id=&quot;2192&quot;&gt;&lt;span data-dcnode-id=&quot;2193&quot; instrument_node=&quot;&quot;&gt;Table 2: Drugs having clinically important interactions with amphetamines.&lt;/span&gt;&lt;/b&gt;&lt;/p&gt;&lt;center data-dcnode-id=&quot;2041&quot;&gt;&lt;table cellspacing=&quot;0&quot; class=&quot;blacktbl&quot; data-dcnode-id=&quot;2042&quot; width=&quot;650&quot;&gt;&lt;tbody data-dcnode-id=&quot;2043&quot;&gt;&lt;tr data-dcnode-id=&quot;2187&quot;&gt;&lt;td colspan=&quot;2&quot; data-dcnode-id=&quot;2188&quot;&gt;&lt;b data-dcnode-id=&quot;2189&quot;&gt;&lt;span data-dcnode-id=&quot;2190&quot; instrument_node=&quot;&quot;&gt;MAO Inhibitors (MAOI)&lt;/span&gt;&lt;/b&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;2181&quot;&gt;&lt;td align=&quot;center&quot; data-dcnode-id=&quot;2184&quot; width=&quot;30%&quot;&gt;&lt;i data-dcnode-id=&quot;2185&quot;&gt;&lt;span data-dcnode-id=&quot;2186&quot; instrument_node=&quot;&quot;&gt;Clinical Impact&lt;/span&gt;&lt;/i&gt;&lt;/td&gt;&lt;td data-dcnode-id=&quot;2182&quot; width=&quot;70%&quot;&gt;&lt;span data-dcnode-id=&quot;2183&quot; instrument_node=&quot;&quot;&gt;Concomitant use of MAOIs and CNS stimulants can cause hypertensive crisis. Potential outcomes include death, stroke, myocardial infarction, aortic dissection, ophthalmological complications, eclampsia, pulmonary edema, and renal failure.&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;2169&quot;&gt;&lt;td align=&quot;center&quot; data-dcnode-id=&quot;2178&quot;&gt;&lt;i data-dcnode-id=&quot;2179&quot;&gt;&lt;span data-dcnode-id=&quot;2180&quot; instrument_node=&quot;&quot;&gt;Intervention&lt;/span&gt;&lt;/i&gt;&lt;/td&gt;&lt;td data-dcnode-id=&quot;2170&quot;&gt;&lt;span data-dcnode-id=&quot;2177&quot; instrument_node=&quot;&quot;&gt;Do not administer DYANAVEL XR concomitantly or within 14 days after discontinuing MAOI [see &lt;/span&gt;&lt;b data-dcnode-id=&quot;2175&quot;&gt;&lt;span data-dcnode-id=&quot;2176&quot; instrument_node=&quot;&quot;&gt;CONTRAINDICATIONS&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;2174&quot; instrument_node=&quot;&quot;&gt;] and &lt;/span&gt;&lt;b data-dcnode-id=&quot;2172&quot;&gt;&lt;span data-dcnode-id=&quot;2173&quot; instrument_node=&quot;&quot;&gt;WARNINGS AND PRECAUTIONS&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;2171&quot; instrument_node=&quot;&quot;&gt;].&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;2163&quot;&gt;&lt;td align=&quot;center&quot; data-dcnode-id=&quot;2166&quot;&gt;&lt;i data-dcnode-id=&quot;2167&quot;&gt;&lt;span data-dcnode-id=&quot;2168&quot; instrument_node=&quot;&quot;&gt;Examples&lt;/span&gt;&lt;/i&gt;&lt;/td&gt;&lt;td data-dcnode-id=&quot;2164&quot;&gt;&lt;span data-dcnode-id=&quot;2165&quot; instrument_node=&quot;&quot;&gt;Selegiline, tranylcypromine, isocarboxazid, phenelzine, linezolid, methylene blue&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;2159&quot;&gt;&lt;td colspan=&quot;2&quot; data-dcnode-id=&quot;2160&quot;&gt;&lt;b data-dcnode-id=&quot;2161&quot;&gt;&lt;span data-dcnode-id=&quot;2162&quot; instrument_node=&quot;&quot;&gt;Serotonergic Drugs&lt;/span&gt;&lt;/b&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;2153&quot;&gt;&lt;td align=&quot;center&quot; data-dcnode-id=&quot;2156&quot;&gt;&lt;i data-dcnode-id=&quot;2157&quot;&gt;&lt;span data-dcnode-id=&quot;2158&quot; instrument_node=&quot;&quot;&gt;Clinical Impact&lt;/span&gt;&lt;/i&gt;&lt;/td&gt;&lt;td data-dcnode-id=&quot;2154&quot;&gt;&lt;span data-dcnode-id=&quot;2155&quot; instrument_node=&quot;&quot;&gt;The concomitant use of DYANAVEL XR and serotonergic drugs increases the risk of serotonin syndrome.&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;2144&quot;&gt;&lt;td align=&quot;center&quot; data-dcnode-id=&quot;2150&quot;&gt;&lt;i data-dcnode-id=&quot;2151&quot;&gt;&lt;span data-dcnode-id=&quot;2152&quot; instrument_node=&quot;&quot;&gt;Intervention&lt;/span&gt;&lt;/i&gt;&lt;/td&gt;&lt;td data-dcnode-id=&quot;2145&quot;&gt;&lt;span data-dcnode-id=&quot;2149&quot; instrument_node=&quot;&quot;&gt;Initiate with lower doses and monitor patients for signs and symptoms of serotonin syndrome, particularly during DYANAVEL XR initiation or dosage increase. If serotonin syndrome occurs, discontinue DYANAVEL XR and the concomitant serotonergic drug(s) [see &lt;/span&gt;&lt;b data-dcnode-id=&quot;2147&quot;&gt;&lt;span data-dcnode-id=&quot;2148&quot; instrument_node=&quot;&quot;&gt;WARNINGS AND PRECAUTIONS&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;2146&quot; instrument_node=&quot;&quot;&gt;].&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;2138&quot;&gt;&lt;td align=&quot;center&quot; data-dcnode-id=&quot;2141&quot;&gt;&lt;i data-dcnode-id=&quot;2142&quot;&gt;&lt;span data-dcnode-id=&quot;2143&quot; instrument_node=&quot;&quot;&gt;Examples&lt;/span&gt;&lt;/i&gt;&lt;/td&gt;&lt;td data-dcnode-id=&quot;2139&quot;&gt;&lt;span data-dcnode-id=&quot;2140&quot; instrument_node=&quot;&quot;&gt;Selective serotonin reuptake inhibitors (SSRIs), serotonin norepinephrine reuptake inhibitors (SNRIs), triptans, tricyclic antidepressants, fentanyl, lithium, tramadol, tryptophan, buspirone, St. John’s Wort.&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;2134&quot;&gt;&lt;td colspan=&quot;2&quot; data-dcnode-id=&quot;2135&quot;&gt;&lt;b data-dcnode-id=&quot;2136&quot;&gt;&lt;span data-dcnode-id=&quot;2137&quot; instrument_node=&quot;&quot;&gt;CYP2D6 Inhibitors&lt;/span&gt;&lt;/b&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;2128&quot;&gt;&lt;td align=&quot;center&quot; data-dcnode-id=&quot;2131&quot;&gt;&lt;i data-dcnode-id=&quot;2132&quot;&gt;&lt;span data-dcnode-id=&quot;2133&quot; instrument_node=&quot;&quot;&gt;Clinical Impact&lt;/span&gt;&lt;/i&gt;&lt;/td&gt;&lt;td data-dcnode-id=&quot;2129&quot;&gt;&lt;span data-dcnode-id=&quot;2130&quot; instrument_node=&quot;&quot;&gt;The concomitant use of DYANAVEL XR and CYP2D6 inhibitors may increase the exposure of DYANAVEL XR compared to the use of the drug alone and increase the risk of serotonin syndrome.&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;2116&quot;&gt;&lt;td align=&quot;center&quot; data-dcnode-id=&quot;2125&quot;&gt;&lt;i data-dcnode-id=&quot;2126&quot;&gt;&lt;span data-dcnode-id=&quot;2127&quot; instrument_node=&quot;&quot;&gt;Intervention&lt;/span&gt;&lt;/i&gt;&lt;/td&gt;&lt;td data-dcnode-id=&quot;2117&quot;&gt;&lt;span data-dcnode-id=&quot;2124&quot; instrument_node=&quot;&quot;&gt;Initiate with lower doses and monitor patients for signs and symptoms of serotonin syndrome particularly during DYANAVEL XR initiation and after a dosage increase. If serotonin syndrome occurs, discontinue DYANAVEL XR and the CYP2D6 inhibitor [see &lt;/span&gt;&lt;b data-dcnode-id=&quot;2122&quot;&gt;&lt;span data-dcnode-id=&quot;2123&quot; instrument_node=&quot;&quot;&gt;WARNINGS AND PRECAUTIONS&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;2121&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;b data-dcnode-id=&quot;2119&quot;&gt;&lt;span data-dcnode-id=&quot;2120&quot; instrument_node=&quot;&quot;&gt;OVERDOSAGE&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;2118&quot; instrument_node=&quot;&quot;&gt;].&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;2110&quot;&gt;&lt;td align=&quot;center&quot; data-dcnode-id=&quot;2113&quot;&gt;&lt;i data-dcnode-id=&quot;2114&quot;&gt;&lt;span data-dcnode-id=&quot;2115&quot; instrument_node=&quot;&quot;&gt;Examples&lt;/span&gt;&lt;/i&gt;&lt;/td&gt;&lt;td data-dcnode-id=&quot;2111&quot;&gt;&lt;span data-dcnode-id=&quot;2112&quot; instrument_node=&quot;&quot;&gt;Paroxetine and fluoxetine (also serotonergic drugs), quinidine, ritonavir&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;2106&quot;&gt;&lt;td colspan=&quot;2&quot; data-dcnode-id=&quot;2107&quot;&gt;&lt;b data-dcnode-id=&quot;2108&quot;&gt;&lt;span data-dcnode-id=&quot;2109&quot; instrument_node=&quot;&quot;&gt;Alkalinizing Agents&lt;/span&gt;&lt;/b&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;2100&quot;&gt;&lt;td align=&quot;center&quot; data-dcnode-id=&quot;2103&quot;&gt;&lt;i data-dcnode-id=&quot;2104&quot;&gt;&lt;span data-dcnode-id=&quot;2105&quot; instrument_node=&quot;&quot;&gt;Clinical Impact&lt;/span&gt;&lt;/i&gt;&lt;/td&gt;&lt;td data-dcnode-id=&quot;2101&quot;&gt;&lt;span data-dcnode-id=&quot;2102&quot; instrument_node=&quot;&quot;&gt;Increase blood levels and potentiate the action of amphetamine.&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;2094&quot;&gt;&lt;td align=&quot;center&quot; data-dcnode-id=&quot;2097&quot;&gt;&lt;i data-dcnode-id=&quot;2098&quot;&gt;&lt;span data-dcnode-id=&quot;2099&quot; instrument_node=&quot;&quot;&gt;Intervention&lt;/span&gt;&lt;/i&gt;&lt;/td&gt;&lt;td data-dcnode-id=&quot;2095&quot;&gt;&lt;span data-dcnode-id=&quot;2096&quot; instrument_node=&quot;&quot;&gt;Co-administration of DYANAVEL XR and gastrointestinal alkalinizing agents should be avoided.&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;2088&quot;&gt;&lt;td align=&quot;center&quot; data-dcnode-id=&quot;2091&quot;&gt;&lt;i data-dcnode-id=&quot;2092&quot;&gt;&lt;span data-dcnode-id=&quot;2093&quot; instrument_node=&quot;&quot;&gt;Examples&lt;/span&gt;&lt;/i&gt;&lt;/td&gt;&lt;td data-dcnode-id=&quot;2089&quot;&gt;&lt;span data-dcnode-id=&quot;2090&quot; instrument_node=&quot;&quot;&gt;Gastrointestinal alkalinizing agents (e.g., sodium bicarbonate). Urinary alkalinizing agents (e.g. acetazolamide, some thiazides).&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;2084&quot;&gt;&lt;td colspan=&quot;2&quot; data-dcnode-id=&quot;2085&quot;&gt;&lt;b data-dcnode-id=&quot;2086&quot;&gt;&lt;span data-dcnode-id=&quot;2087&quot; instrument_node=&quot;&quot;&gt;Acidifying Agents&lt;/span&gt;&lt;/b&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;2078&quot;&gt;&lt;td align=&quot;center&quot; data-dcnode-id=&quot;2081&quot;&gt;&lt;i data-dcnode-id=&quot;2082&quot;&gt;&lt;span data-dcnode-id=&quot;2083&quot; instrument_node=&quot;&quot;&gt;Clinical Impact&lt;/span&gt;&lt;/i&gt;&lt;/td&gt;&lt;td data-dcnode-id=&quot;2079&quot;&gt;&lt;span data-dcnode-id=&quot;2080&quot; instrument_node=&quot;&quot;&gt;Lower blood levels and efficacy of amphetamines.&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;2072&quot;&gt;&lt;td align=&quot;center&quot; data-dcnode-id=&quot;2075&quot;&gt;&lt;i data-dcnode-id=&quot;2076&quot;&gt;&lt;span data-dcnode-id=&quot;2077&quot; instrument_node=&quot;&quot;&gt;Intervention&lt;/span&gt;&lt;/i&gt;&lt;/td&gt;&lt;td data-dcnode-id=&quot;2073&quot;&gt;&lt;span data-dcnode-id=&quot;2074&quot; instrument_node=&quot;&quot;&gt;Increase dose based on clinical response.&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;2066&quot;&gt;&lt;td align=&quot;center&quot; data-dcnode-id=&quot;2069&quot;&gt;&lt;i data-dcnode-id=&quot;2070&quot;&gt;&lt;span data-dcnode-id=&quot;2071&quot; instrument_node=&quot;&quot;&gt;Examples&lt;/span&gt;&lt;/i&gt;&lt;/td&gt;&lt;td data-dcnode-id=&quot;2067&quot;&gt;&lt;span data-dcnode-id=&quot;2068&quot; instrument_node=&quot;&quot;&gt;Gastrointestinal acidifying agents (e.g., guanethidine, reserpine, glutamic acid HCl, ascorbic acid). Urinary acidifying agents (e.g., ammonium chloride, sodium acid phosphate, methenamine salts).&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;2062&quot;&gt;&lt;td colspan=&quot;2&quot; data-dcnode-id=&quot;2063&quot;&gt;&lt;b data-dcnode-id=&quot;2064&quot;&gt;&lt;span data-dcnode-id=&quot;2065&quot; instrument_node=&quot;&quot;&gt;Tricyclic Antidepressants&lt;/span&gt;&lt;/b&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;2056&quot;&gt;&lt;td align=&quot;center&quot; data-dcnode-id=&quot;2059&quot;&gt;&lt;i data-dcnode-id=&quot;2060&quot;&gt;&lt;span data-dcnode-id=&quot;2061&quot; instrument_node=&quot;&quot;&gt;Clinical Impact&lt;/span&gt;&lt;/i&gt;&lt;/td&gt;&lt;td data-dcnode-id=&quot;2057&quot;&gt;&lt;span data-dcnode-id=&quot;2058&quot; instrument_node=&quot;&quot;&gt;May enhance the activity of tricyclic or sympathomimetic agents causing striking and sustained increases in the concentration of d-amphetamine in the brain; cardiovascular effects can be potentiated.&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;2050&quot;&gt;&lt;td align=&quot;center&quot; data-dcnode-id=&quot;2053&quot;&gt;&lt;i data-dcnode-id=&quot;2054&quot;&gt;&lt;span data-dcnode-id=&quot;2055&quot; instrument_node=&quot;&quot;&gt;Intervention&lt;/span&gt;&lt;/i&gt;&lt;/td&gt;&lt;td data-dcnode-id=&quot;2051&quot;&gt;&lt;span data-dcnode-id=&quot;2052&quot; instrument_node=&quot;&quot;&gt;Monitor frequently and adjust or use alternative therapy based on clinical response.&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;2044&quot;&gt;&lt;td align=&quot;center&quot; data-dcnode-id=&quot;2047&quot;&gt;&lt;i data-dcnode-id=&quot;2048&quot;&gt;&lt;span data-dcnode-id=&quot;2049&quot; instrument_node=&quot;&quot;&gt;Examples&lt;/span&gt;&lt;/i&gt;&lt;/td&gt;&lt;td data-dcnode-id=&quot;2045&quot;&gt;&lt;span data-dcnode-id=&quot;2046&quot; instrument_node=&quot;&quot;&gt;Desipramine, protriptyline&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;/tbody&gt;&lt;/table&gt;&lt;/center&gt;&lt;p data-dcnode-id=&quot;2040&quot;&gt;&lt;/p&gt;&lt;h4 data-dcnode-id=&quot;2038&quot;&gt;&lt;span data-dcnode-id=&quot;2039&quot; instrument_node=&quot;&quot;&gt;Drug/Laboratory Test Interactions&lt;/span&gt;&lt;/h4&gt;&lt;p data-dcnode-id=&quot;2030&quot;&gt;&lt;span data-dcnode-id=&quot;2037&quot; instrument_node=&quot;&quot;&gt;Amphetamines can cause a significant elevation in plasma &lt;/span&gt;&lt;a data-dcnode-id=&quot;2035&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/corticosteroid/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;2036&quot; instrument_node=&quot;&quot;&gt;corticosteroid&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2034&quot; instrument_node=&quot;&quot;&gt; levels. This increase is greatest in the evening. Amphetamines may interfere with urinary &lt;/span&gt;&lt;a data-dcnode-id=&quot;2032&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/steroid/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;2033&quot; instrument_node=&quot;&quot;&gt;steroid&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2031&quot; instrument_node=&quot;&quot;&gt; determinations.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2029&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a data-dcnode-id=&quot;2028&quot; name=&quot;DA&quot;&gt;&lt;/a&gt;&lt;h4 data-dcnode-id=&quot;2026&quot;&gt;&lt;span data-dcnode-id=&quot;2027&quot; instrument_node=&quot;&quot;&gt;Drug Abuse And Dependence&lt;/span&gt;&lt;/h4&gt;&lt;h5 data-dcnode-id=&quot;2024&quot;&gt;&lt;span data-dcnode-id=&quot;2025&quot; instrument_node=&quot;&quot;&gt;Controlled Substance&lt;/span&gt;&lt;/h5&gt;&lt;p data-dcnode-id=&quot;2022&quot;&gt;&lt;span data-dcnode-id=&quot;2023&quot; instrument_node=&quot;&quot;&gt;DYANAVEL XR contains amphetamine, which is a Schedule II controlled substance in the U.S. Controlled Substance Act (CSA).&lt;/span&gt;&lt;/p&gt;&lt;h5 data-dcnode-id=&quot;2020&quot;&gt;&lt;span data-dcnode-id=&quot;2021&quot; instrument_node=&quot;&quot;&gt;Abuse&lt;/span&gt;&lt;/h5&gt;&lt;p data-dcnode-id=&quot;2018&quot;&gt;&lt;span data-dcnode-id=&quot;2019&quot; instrument_node=&quot;&quot;&gt;DYANAVEL XR, is a CNS stimulant that contains amphetamine which has a high potential for abuse. Abuse is characterized by impaired control over drug use, compulsive use, continued use despite harm, and craving.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2004&quot;&gt;&lt;span data-dcnode-id=&quot;2017&quot; instrument_node=&quot;&quot;&gt;Signs and symptoms of amphetamine abuse may include increased heart rate, &lt;/span&gt;&lt;a data-dcnode-id=&quot;2015&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/respiratory_rate/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;2016&quot; instrument_node=&quot;&quot;&gt;respiratory rate&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2014&quot; instrument_node=&quot;&quot;&gt;, blood pressure, and/or sweating, dilated pupils, &lt;/span&gt;&lt;a data-dcnode-id=&quot;2012&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/hyperactivity/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;2013&quot; instrument_node=&quot;&quot;&gt;hyperactivity&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2011&quot; instrument_node=&quot;&quot;&gt;, restlessness, insomnia, decreased appetite, loss of coordination, tremors, flushed skin, vomiting, and/or abdominal pain. Anxiety, &lt;/span&gt;&lt;a data-dcnode-id=&quot;2009&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/psychosis/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;2010&quot; instrument_node=&quot;&quot;&gt;psychosis&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2008&quot; instrument_node=&quot;&quot;&gt;, hostility, aggression, suicidal or homicidal ideation have also been observed. Abusers of amphetamines may use other unapproved routes of administration which can result in overdose and death [see &lt;/span&gt;&lt;b data-dcnode-id=&quot;2006&quot;&gt;&lt;span data-dcnode-id=&quot;2007&quot; instrument_node=&quot;&quot;&gt;OVERDOSAGE&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;2005&quot; instrument_node=&quot;&quot;&gt;].&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2002&quot;&gt;&lt;span data-dcnode-id=&quot;2003&quot; instrument_node=&quot;&quot;&gt;To reduce the abuse of DYANAVEL XR, assess the risk of abuse prior to prescribing. After prescribing, keep careful prescription records, educate patients and their families about abuse and on proper storage and disposal of CNS stimulants, monitor for signs of abuse while on therapy, and re-evaluate the need for DYANAVEL XR use.&lt;/span&gt;&lt;/p&gt;&lt;h5 data-dcnode-id=&quot;2000&quot;&gt;&lt;span data-dcnode-id=&quot;2001&quot; instrument_node=&quot;&quot;&gt;Dependence&lt;/span&gt;&lt;/h5&gt;&lt;p data-dcnode-id=&quot;1997&quot;&gt;&lt;i data-dcnode-id=&quot;1998&quot;&gt;&lt;span data-dcnode-id=&quot;1999&quot; instrument_node=&quot;&quot;&gt;Tolerance&lt;/span&gt;&lt;/i&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1995&quot;&gt;&lt;span data-dcnode-id=&quot;1996&quot; instrument_node=&quot;&quot;&gt;Tolerance (a state of adaptation in which exposure to a drug results in a reduction of the drug's desired and/or undesired effects over time) may occur during the chronic therapy of CNS stimulants including DYANAVEL XR.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1992&quot;&gt;&lt;i data-dcnode-id=&quot;1993&quot;&gt;&lt;span data-dcnode-id=&quot;1994&quot; instrument_node=&quot;&quot;&gt;Dependence&lt;/span&gt;&lt;/i&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1981&quot;&gt;&lt;span data-dcnode-id=&quot;1991&quot; instrument_node=&quot;&quot;&gt;Physical dependence (which is manifested by a withdrawal syndrome produced by abrupt cessation, rapid dose reduction, or administration of an &lt;/span&gt;&lt;a data-dcnode-id=&quot;1989&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/antagonist/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;1990&quot; instrument_node=&quot;&quot;&gt;antagonist&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1988&quot; instrument_node=&quot;&quot;&gt;) may occur in patients treated with CNS stimulants including DYANAVEL XR. &lt;/span&gt;&lt;a data-dcnode-id=&quot;1986&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/withdrawal_symptoms/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;1987&quot; instrument_node=&quot;&quot;&gt;Withdrawal symptoms&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1985&quot; instrument_node=&quot;&quot;&gt; after abrupt cessation following prolonged high-dosage administration of CNS stimulants include dysphoric mood; fatigue; vivid, unpleasant &lt;/span&gt;&lt;a data-dcnode-id=&quot;1983&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/dreams/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;1984&quot; instrument_node=&quot;&quot;&gt;dreams&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1982&quot; instrument_node=&quot;&quot;&gt;; insomnia or hypersomnia; increased appetite; and psychomotor retardation or agitation.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1980&quot; instrument_node=&quot;&quot;&gt;
