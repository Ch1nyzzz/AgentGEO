&lt;/span&gt;&lt;a data-dcnode-id=&quot;1437&quot; name=&quot;CP&quot;&gt;&lt;/a&gt;&lt;h3 data-dcnode-id=&quot;1435&quot;&gt;&lt;span data-dcnode-id=&quot;1436&quot; instrument_node=&quot;&quot;&gt;CLINICAL PHARMACOLOGY&lt;/span&gt;&lt;/h3&gt;&lt;h4 data-dcnode-id=&quot;1433&quot;&gt;&lt;span data-dcnode-id=&quot;1434&quot; instrument_node=&quot;&quot;&gt;Mechanism Of Action&lt;/span&gt;&lt;/h4&gt;&lt;p data-dcnode-id=&quot;1428&quot;&gt;&lt;span data-dcnode-id=&quot;1432&quot; instrument_node=&quot;&quot;&gt;Amphetamines are non-&lt;/span&gt;&lt;a data-dcnode-id=&quot;1430&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/catecholamine/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;1431&quot; instrument_node=&quot;&quot;&gt;catecholamine&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1429&quot; instrument_node=&quot;&quot;&gt; sympathomimetic amines with CNS stimulant activity. The mode of therapeutic action in ADHD is not known.&lt;/span&gt;&lt;/p&gt;&lt;h4 data-dcnode-id=&quot;1426&quot;&gt;&lt;span data-dcnode-id=&quot;1427&quot; instrument_node=&quot;&quot;&gt;Pharmacodynamics&lt;/span&gt;&lt;/h4&gt;&lt;p data-dcnode-id=&quot;1418&quot;&gt;&lt;span data-dcnode-id=&quot;1425&quot; instrument_node=&quot;&quot;&gt;Amphetamines block the reuptake of norepinephrine and &lt;/span&gt;&lt;a data-dcnode-id=&quot;1423&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/dopamine/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;1424&quot; instrument_node=&quot;&quot;&gt;dopamine&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1422&quot; instrument_node=&quot;&quot;&gt; into the presynaptic &lt;/span&gt;&lt;a data-dcnode-id=&quot;1420&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/neuron/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;1421&quot; instrument_node=&quot;&quot;&gt;neuron&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1419&quot; instrument_node=&quot;&quot;&gt; and increase the release of these monoamines into the extraneuronal space.&lt;/span&gt;&lt;/p&gt;&lt;h4 data-dcnode-id=&quot;1416&quot;&gt;&lt;span data-dcnode-id=&quot;1417&quot; instrument_node=&quot;&quot;&gt;Pharmacokinetics&lt;/span&gt;&lt;/h4&gt;&lt;h5 data-dcnode-id=&quot;1414&quot;&gt;&lt;span data-dcnode-id=&quot;1415&quot; instrument_node=&quot;&quot;&gt;Absorption&lt;/span&gt;&lt;/h5&gt;&lt;p data-dcnode-id=&quot;1409&quot;&gt;&lt;span data-dcnode-id=&quot;1413&quot; instrument_node=&quot;&quot;&gt;Following a single, 18.8 mg oral dose of DYANAVEL XR in 29 healthy adult subjects in a &lt;/span&gt;&lt;a data-dcnode-id=&quot;1411&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/crossover_study/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;1412&quot; instrument_node=&quot;&quot;&gt;crossover study&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1410&quot; instrument_node=&quot;&quot;&gt; under fasting conditions, d- and l-amphetamine, the median (range) time to peak plasma concentrations (Tmax) were 4 (2 â€“ 7) hours after dosing and peak concentration (Cmax) was 102% and 106%, respectively of the C of immediate-release (IR) mixed amphetamine salts (MAS) tablets. The relative bioavailability of DYANAVEL XR compared with an equal dose of IR MAS tablets is 106% of d-amphetamine and 111% for l-amphetamine.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1404&quot;&gt;&lt;span data-dcnode-id=&quot;1408&quot; instrument_node=&quot;&quot;&gt;Following a single, 18.8 mg oral dose of DYANAVEL XR in 28 healthy adult subjects in a crossover study under fasting conditions, the exposures (Cmax and AUC) to d- and l-amphetamine was comparable to that after administration of equal dose of extended release (&lt;/span&gt;&lt;a data-dcnode-id=&quot;1406&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/er/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;1407&quot; instrument_node=&quot;&quot;&gt;ER&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1405&quot; instrument_node=&quot;&quot;&gt;) mixed amphetamine salt (MAS). The median (range) time to peak plasma concentrations (Tmax) was about 4 (2 - 7) hours and 5 (3 - 7) hours for d- and l-amphetamine, respectively. Peak concentration (Cmax) was 93% and 94%, respectively, of the C of ER MAS capsules. The relative bioavailability of DYANAVEL XR compared with an equal dose of ER MAS capsules is 94% for both d- and l-amphetamine.&lt;/span&gt;&lt;/p&gt;&lt;p align=&quot;center&quot; data-dcnode-id=&quot;1401&quot;&gt;&lt;b data-dcnode-id=&quot;1402&quot;&gt;&lt;span data-dcnode-id=&quot;1403&quot; instrument_node=&quot;&quot;&gt;Figure 1: Mean d- and l- amphetamine Plasma Concentration-Time Profile Following Administration of a Single Dose (18.8 mg amphetamine base) of DYANAVEL XR and MAS ER Under Fasting Conditions&lt;/span&gt;&lt;/b&gt;&lt;/p&gt;&lt;center data-dcnode-id=&quot;1395&quot;&gt;&lt;table cellspacing=&quot;0&quot; class=&quot;blackpic&quot; data-dcnode-id=&quot;1396&quot; width=&quot;610&quot;&gt;&lt;tbody data-dcnode-id=&quot;1397&quot;&gt;&lt;tr data-dcnode-id=&quot;1398&quot;&gt;&lt;td data-dcnode-id=&quot;1399&quot;&gt;&lt;img alt=&quot;Mean d- and l- amphetamine
Plasma Concentration-Time Profile Following Administration of a Single Dose (18.8
mg amphetamine base) of DYANAVEL XR and MAS ER Under Fasting Conditions - Illustration&quot; data-dcnode-id=&quot;1400&quot; height=&quot;390&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//images.rxlist.com/images/rxlist/dyanavel-xr2.gif&amp;amp;raw&quot; title=&quot;Mean d- and l- amphetamine
Plasma Concentration-Time Profile Following Administration of a Single Dose (18.8
mg amphetamine base) of DYANAVEL XR and MAS ER Under Fasting Conditions - Illustration&quot; width=&quot;610&quot;&gt;&lt;/td&gt;&lt;/tr&gt;&lt;/tbody&gt;&lt;/table&gt;&lt;/center&gt;&lt;p data-dcnode-id=&quot;1394&quot;&gt;&lt;/p&gt;&lt;h5 data-dcnode-id=&quot;1392&quot;&gt;&lt;span data-dcnode-id=&quot;1393&quot; instrument_node=&quot;&quot;&gt;Metabolism And Excretion&lt;/span&gt;&lt;/h5&gt;&lt;p data-dcnode-id=&quot;1390&quot;&gt;&lt;span data-dcnode-id=&quot;1391&quot; instrument_node=&quot;&quot;&gt;DYANAVEL XR contains d-amphetamine and l-amphetamine in a ratio of 3.2 to 1. Following a single 18.8 mg oral dose of DYANAVEL XR in 29 healthy adult subjects under fasting conditions, the mean (± SD) plasma terminal elimination half-life of d-amphetamine was 12.36 (± 2.95 h) hours and the mean (± SD) plasma terminal half-life for l-amphetamine was 15.12 (± 4.40 h) hours. Amphetamine is reported to be oxidized at the 4 position of the benzene ring to form 4-hydroxyamphetamine, or on the side chain A or B carbons to form alpha-hydroxy-amphetamine or norephedrine, respectively. Norephedrine and 4-hydroxyamphetamine are both active and each is subsequently oxidized to form 4-hydroxy-norephedrine. Alpha-hydroxy-amphetamine undergoes deamination to form phenylacetone, which ultimately forms benzoic acid and its glucuronide and the glycine conjugate hippuric acid. Although the enzymes involved in amphetamine metabolism have not been clearly defined, CYP2D6 is known to be involved with formation of 4-hydroxy-amphetamine. Since CYP2D6 is genetically polymorphic, population variations in amphetamine metabolism are a possibility.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1388&quot;&gt;&lt;span data-dcnode-id=&quot;1389&quot; instrument_node=&quot;&quot;&gt;Amphetamine is known to inhibit monoamine oxidase, whereas the ability of amphetamine and its metabolites to inhibit various P450 isozymes and other enzymes has not been adequately elucidated. In vitro experiments with human microsomes indicate minor inhibition of CYP2D6 by amphetamine and minor inhibition of CYP1A2, 2D6, and 3A4 by one or more metabolites. However, due to the probability of auto-inhibition and the lack of information on the concentration of these metabolites relative to in vivo concentrations, no predications regarding the potential for amphetamine or its metabolites to inhibit the metabolism of other drugs by CYP isozymes in vivo can be made.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1383&quot;&gt;&lt;span data-dcnode-id=&quot;1387&quot; instrument_node=&quot;&quot;&gt;With normal urine pHs approximately half of an administered dose of amphetamine is recoverable in urine as derivatives of alpha-hydroxy-amphetamine and approximately another 30% to 40% of the dose is recoverable in urine as amphetamine itself. Since amphetamine has a pKa of 9.9, urinary recovery of amphetamine is highly dependent on pH and urine flow rates. Alkaline urine pHs result in less ionization and reduced renal elimination, and acidic pHs and high flow rates result in increased renal elimination with clearances greater than glomerular filtration rates, indicating the involvement of active secretion. Urinary recovery of amphetamine has been reported to range from 1% to 75%, depending on urinary pH, with the remaining fraction of the dose hepatically metabolized. Consequently, both hepatic and renal dysfunctions have the potential to inhibit the elimination of amphetamine and result in prolonged exposures. In addition, drugs that affect urinary pH are known to alter the elimination of amphetamine, and any decrease in amphetamineâ€™s metabolism that might occur due to drug interactions or genetic polymorphisms is more likely to be clinically significant when renal elimination is decreased [see &lt;/span&gt;&lt;b data-dcnode-id=&quot;1385&quot;&gt;&lt;span data-dcnode-id=&quot;1386&quot; instrument_node=&quot;&quot;&gt;DRUG INTERACTIONS&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;1384&quot; instrument_node=&quot;&quot;&gt;].&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1380&quot;&gt;&lt;i data-dcnode-id=&quot;1381&quot;&gt;&lt;span data-dcnode-id=&quot;1382&quot; instrument_node=&quot;&quot;&gt;Food Effect&lt;/span&gt;&lt;/i&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1378&quot;&gt;&lt;span data-dcnode-id=&quot;1379&quot; instrument_node=&quot;&quot;&gt;In a study in adult volunteers to investigate the effects of a high-fat meal on the bioavailability of DYANAVEL XR at a dose of 18.8 mg, the presence of food delayed the time to peak concentration of both d- and l-amphetamine by approximately 1 hour (fed: median [range] 5 [3 to 8] hours vs. fasted:4 [2 to 7] hours). Overall, a high-fat meal increased the average Cmax of both isomers of DYANAVEL XR by about 2% and decreased the AUC by 5% to 7% (5.7% decrease for d-amphetamine and 7.4% for l-amphetamine). These changes are not considered clinically significant.&lt;/span&gt;&lt;/p&gt;&lt;h4 data-dcnode-id=&quot;1376&quot;&gt;&lt;span data-dcnode-id=&quot;1377&quot; instrument_node=&quot;&quot;&gt;Specific Populations&lt;/span&gt;&lt;/h4&gt;&lt;h5 data-dcnode-id=&quot;1374&quot;&gt;&lt;span data-dcnode-id=&quot;1375&quot; instrument_node=&quot;&quot;&gt;Pediatric&lt;/span&gt;&lt;/h5&gt;&lt;p data-dcnode-id=&quot;1372&quot;&gt;&lt;span data-dcnode-id=&quot;1373&quot; instrument_node=&quot;&quot;&gt;Following a single 10 mg oral dose of DYANAVEL XR in 12 pediatric subjects with ADHD (aged 6 to 12 years) under fasting conditions, d-amphetamine and l-amphetamine peak plasma concentrations occurred at a median time of 3.9 and 4.5 hours after dosing, respectively. The mean plasma terminal elimination half-life of d-amphetamine was 10.43 (± 2.01 h) hours and the mean plasma terminal half-life for l-amphetamine was 12.14 (± 3.15 h) hours.&lt;/span&gt;&lt;/p&gt;&lt;h5 data-dcnode-id=&quot;1370&quot;&gt;&lt;span data-dcnode-id=&quot;1371&quot; instrument_node=&quot;&quot;&gt;Alcohol Effect&lt;/span&gt;&lt;/h5&gt;&lt;p data-dcnode-id=&quot;1368&quot;&gt;&lt;span data-dcnode-id=&quot;1369&quot; instrument_node=&quot;&quot;&gt;There is no in vivo study conducted for the effect of alcohol on drug exposure. An in vitro dissolution study showed alcoholinduced dose dumping potential in the presence of 40% alcohol. Dose dumping was not observed in the presence of lower alcohol concentrations.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1367&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a data-dcnode-id=&quot;1366&quot; name=&quot;AP&quot;&gt;&lt;/a&gt;&lt;h4 data-dcnode-id=&quot;1364&quot;&gt;&lt;span data-dcnode-id=&quot;1365&quot; instrument_node=&quot;&quot;&gt;Animal Toxicology And/Or Pharmacology&lt;/span&gt;&lt;/h4&gt;&lt;p data-dcnode-id=&quot;1362&quot;&gt;&lt;span data-dcnode-id=&quot;1363&quot; instrument_node=&quot;&quot;&gt;Acute administration of high doses of amphetamine (d- or d, l-) has been shown to produce long-lasting neurotoxic effects, including irreversible nerve fiber damage, in rodents. The significance of these findings to humans is unknown.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1361&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a data-dcnode-id=&quot;1360&quot; name=&quot;CS&quot;&gt;&lt;/a&gt;&lt;h4 data-dcnode-id=&quot;1358&quot;&gt;&lt;span data-dcnode-id=&quot;1359&quot; instrument_node=&quot;&quot;&gt;Clinical Studies&lt;/span&gt;&lt;/h4&gt;&lt;p data-dcnode-id=&quot;1356&quot;&gt;&lt;span data-dcnode-id=&quot;1357&quot; instrument_node=&quot;&quot;&gt;The efficacy of DYANAVEL XR was evaluated in a laboratory classroom study conducted in 108 pediatric patients (aged 6 to 12 years) with ADHD. The study began with an open-label dose optimization period (5 weeks) with an initial DYANAVEL XR dose of 2.5 or 5 mg once daily in the morning. The dose could be titrated weekly in increments of 2.5 to 10 mg until an optimal dose or the maximum dose of 20 mg/day was reached. Subjects then entered a 1-week randomized, double-blind treatment with the individually optimized dose of DYANAVEL XR or placebo. At the end of the week, school teachers and raters evaluated the attention and behavior of the subjects in a laboratory classroom using the Swanson, Kotkin, Agler, M-Flynn, and Pelham (SKAMP) rating scale. SKAMP is a 13-item teacher-rated scale that assesses manifestations of ADHD in a classroom setting. Each item is rated on a 7-point impairment scale.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1354&quot;&gt;&lt;span data-dcnode-id=&quot;1355&quot; instrument_node=&quot;&quot;&gt;The primary efficacy endpoint was change from pre-dose in the SKAMP-Combined score at 4 hours post-dosing. The key secondary efficacy parameters were onset and duration of clinical effect. The change scores from pre-dose SKAMP-Combined scores at post-dose time points (1, 2, 4, 6, 8, 10, 12 and 13 hours) were used to evaluate the key secondary efficacy. Results from the double-blind, placebo-controlled week of the study are summarized in Table 3 and Figure 2.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1352&quot;&gt;&lt;span data-dcnode-id=&quot;1353&quot; instrument_node=&quot;&quot;&gt;SKAMP-Combined change scores from pre-dose demonstrated a statistically significant improvement at all time points (1, 2, 4, 6, 8, 10, 12, 13 hours) post-dosing with DYANAVEL XR compared to placebo.&lt;/span&gt;&lt;/p&gt;&lt;p align=&quot;center&quot; data-dcnode-id=&quot;1349&quot;&gt;&lt;b data-dcnode-id=&quot;1350&quot;&gt;&lt;span data-dcnode-id=&quot;1351&quot; instrument_node=&quot;&quot;&gt;Table 3: Primary efficacy result.&lt;/span&gt;&lt;/b&gt;&lt;/p&gt;&lt;center data-dcnode-id=&quot;1302&quot;&gt;&lt;table cellspacing=&quot;0&quot; class=&quot;blacktbl&quot; data-dcnode-id=&quot;1303&quot; width=&quot;450&quot;&gt;&lt;tbody data-dcnode-id=&quot;1304&quot;&gt;&lt;tr data-dcnode-id=&quot;1342&quot;&gt;&lt;td class=&quot;EmphTd&quot; data-dcnode-id=&quot;1347&quot; rowspan=&quot;2&quot; width=&quot;20%&quot;&gt;&lt;span data-dcnode-id=&quot;1348&quot; instrument_node=&quot;&quot;&gt;Study Number&lt;/span&gt;&lt;/td&gt;&lt;td class=&quot;EmphTd&quot; data-dcnode-id=&quot;1345&quot; rowspan=&quot;2&quot; width=&quot;20%&quot;&gt;&lt;span data-dcnode-id=&quot;1346&quot; instrument_node=&quot;&quot;&gt;Treatment Group&lt;/span&gt;&lt;/td&gt;&lt;td class=&quot;EmphTd&quot; colspan=&quot;3&quot; data-dcnode-id=&quot;1343&quot;&gt;&lt;span data-dcnode-id=&quot;1344&quot; instrument_node=&quot;&quot;&gt;Primary Efficacy Measure: SKAMP-Combined Score&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;1332&quot;&gt;&lt;td class=&quot;EmphTd&quot; data-dcnode-id=&quot;1340&quot; width=&quot;20%&quot;&gt;&lt;span data-dcnode-id=&quot;1341&quot; instrument_node=&quot;&quot;&gt;Mean Pre-dose Score (SD)&lt;/span&gt;&lt;/td&gt;&lt;td class=&quot;EmphTd&quot; data-dcnode-id=&quot;1338&quot; width=&quot;20%&quot;&gt;&lt;span data-dcnode-id=&quot;1339&quot; instrument_node=&quot;&quot;&gt;LS Mean Change from PreDose at 4 Hours Post-Dosing (SE)&lt;/span&gt;&lt;/td&gt;&lt;td class=&quot;EmphTd&quot; data-dcnode-id=&quot;1333&quot; width=&quot;20%&quot;&gt;&lt;span data-dcnode-id=&quot;1337&quot; instrument_node=&quot;&quot;&gt;Placebo-subtracted Difference&lt;/span&gt;&lt;sup data-dcnode-id=&quot;1335&quot;&gt;&lt;span data-dcnode-id=&quot;1336&quot; instrument_node=&quot;&quot;&gt;a&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;1334&quot; instrument_node=&quot;&quot;&gt; (95% CI)&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;1321&quot;&gt;&lt;td data-dcnode-id=&quot;1330&quot; rowspan=&quot;2&quot;&gt;&lt;span data-dcnode-id=&quot;1331&quot; instrument_node=&quot;&quot;&gt;Study 1&lt;/span&gt;&lt;/td&gt;&lt;td data-dcnode-id=&quot;1328&quot;&gt;&lt;span data-dcnode-id=&quot;1329&quot; instrument_node=&quot;&quot;&gt;DYANAVEL XR&lt;/span&gt;&lt;/td&gt;&lt;td align=&quot;center&quot; data-dcnode-id=&quot;1326&quot;&gt;&lt;span data-dcnode-id=&quot;1327&quot; instrument_node=&quot;&quot;&gt;17.3 (8.88)&lt;/span&gt;&lt;/td&gt;&lt;td align=&quot;center&quot; data-dcnode-id=&quot;1324&quot;&gt;&lt;span data-dcnode-id=&quot;1325&quot; instrument_node=&quot;&quot;&gt;-8.8 (1.14)&lt;/span&gt;&lt;/td&gt;&lt;td align=&quot;center&quot; data-dcnode-id=&quot;1322&quot;&gt;&lt;span data-dcnode-id=&quot;1323&quot; instrument_node=&quot;&quot;&gt;-14.8 (-17.9, -11.6)&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;1312&quot;&gt;&lt;td data-dcnode-id=&quot;1319&quot;&gt;&lt;span data-dcnode-id=&quot;1320&quot; instrument_node=&quot;&quot;&gt;Placebo&lt;/span&gt;&lt;/td&gt;&lt;td align=&quot;center&quot; data-dcnode-id=&quot;1317&quot;&gt;&lt;span data-dcnode-id=&quot;1318&quot; instrument_node=&quot;&quot;&gt;15.5 (7.35)&lt;/span&gt;&lt;/td&gt;&lt;td align=&quot;center&quot; data-dcnode-id=&quot;1315&quot;&gt;&lt;span data-dcnode-id=&quot;1316&quot; instrument_node=&quot;&quot;&gt;6.0 (1.19)&lt;/span&gt;&lt;/td&gt;&lt;td align=&quot;center&quot; data-dcnode-id=&quot;1313&quot;&gt;&lt;span data-dcnode-id=&quot;1314&quot; instrument_node=&quot;&quot;&gt;--&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;1305&quot;&gt;&lt;td class=&quot;credit&quot; colspan=&quot;5&quot; data-dcnode-id=&quot;1306&quot;&gt;&lt;span data-dcnode-id=&quot;1311&quot; instrument_node=&quot;&quot;&gt;SD: standard deviation; SE: standard error; LS Mean: least-squares mean; CI: confidence interval.&lt;/span&gt;&lt;br data-dcnode-id=&quot;1310&quot;&gt;&lt;sup data-dcnode-id=&quot;1308&quot;&gt;&lt;span data-dcnode-id=&quot;1309&quot; instrument_node=&quot;&quot;&gt;a&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;1307&quot; instrument_node=&quot;&quot;&gt;Difference (drug minus placebo) in least-squares mean change from pre-dose.&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;/tbody&gt;&lt;/table&gt;&lt;/center&gt;&lt;p data-dcnode-id=&quot;1301&quot;&gt;&lt;/p&gt;&lt;p align=&quot;center&quot; data-dcnode-id=&quot;1298&q &lt;/span&gt;&lt;a data-dcnode-id=&quot;1264&quot; name=&quot;PI&quot;&gt;&lt;/a&gt;&lt;h3 data-dcnode-id=&quot;1262&quot;&gt;&lt;span data-dcnode-id=&quot;1263&quot; instrument_node=&quot;&quot;&gt;PATIENT INFORMATION&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;1255&quot;&gt;&lt;b data-dcnode-id=&quot;1260&quot;&gt;&lt;span data-dcnode-id=&quot;1261&quot; instrument_node=&quot;&quot;&gt;DYANAVEL XR&lt;/span&gt;&lt;/b&gt;&lt;br data-dcnode-id=&quot;1259&quot;&gt;&lt;span data-dcnode-id=&quot;1258&quot; instrument_node=&quot;&quot;&gt;(di-an-uh-vel)&lt;/span&gt;&lt;br data-dcnode-id=&quot;1257&quot;&gt;&lt;span data-dcnode-id=&quot;1256&quot; instrument_node=&quot;&quot;&gt;(amphetamine) extended-release oral suspension&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1252&quot;&gt;&lt;b data-dcnode-id=&quot;1253&quot;&gt;&lt;span data-dcnode-id=&quot;1254&quot; instrument_node=&quot;&quot;&gt;What is the most important information I should know about DYANAVEL XR?&lt;/span&gt;&lt;/b&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1249&quot;&gt;&lt;b data-dcnode-id=&quot;1250&quot;&gt;&lt;span data-dcnode-id=&quot;1251&quot; instrument_node=&quot;&quot;&gt;DYANAVEL XR can cause serious side effects, including:&lt;/span&gt;&lt;/b&gt;&lt;/p&gt;&lt;ul data-dcnode-id=&quot;1226&quot;&gt;&lt;li data-dcnode-id=&quot;1240&quot;&gt;&lt;b data-dcnode-id=&quot;1247&quot;&gt;&lt;span data-dcnode-id=&quot;1248&quot; instrument_node=&quot;&quot;&gt;Abuse and dependence.&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;1246&quot; instrument_node=&quot;&quot;&gt; DYANAVEL XR, other amphetamine containing medicines, and methylphenidate have a high chance for abuse and can cause physical and psychological dependence. Your healthcare provider should check you or your child for signs of abuse and dependence before, and during, treatment with DYANAVEL XR.&lt;/span&gt;&lt;ul data-dcnode-id=&quot;1241&quot;&gt;&lt;li data-dcnode-id=&quot;1244&quot;&gt;&lt;span data-dcnode-id=&quot;1245&quot; instrument_node=&quot;&quot;&gt;Tell your healthcare provider if you or your child have ever abused or been dependent on alcohol, prescription medicines, or street drugs.&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;1242&quot;&gt;&lt;span data-dcnode-id=&quot;1243&quot; instrument_node=&quot;&quot;&gt;Your healthcare provider can tell you more about the differences between physical and psychological dependence and drug addiction.&lt;/span&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;1227&quot;&gt;&lt;b data-dcnode-id=&quot;1238&quot;&gt;&lt;span data-dcnode-id=&quot;1239&quot; instrument_node=&quot;&quot;&gt;Heart-related problems, including:&lt;/span&gt;&lt;/b&gt;&lt;ul data-dcnode-id=&quot;1228&quot;&gt;&lt;li data-dcnode-id=&quot;1233&quot;&gt;&lt;span data-dcnode-id=&quot;1237&quot; instrument_node=&quot;&quot;&gt;sudden death, stroke and &lt;/span&gt;&lt;a data-dcnode-id=&quot;1235&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/heart_attack/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;1236&quot; instrument_node=&quot;&quot;&gt;heart attack&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1234&quot; instrument_node=&quot;&quot;&gt; in adults&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;1231&quot;&gt;&lt;span data-dcnode-id=&quot;1232&quot; instrument_node=&quot;&quot;&gt;sudden death in children 6 to 17 years old, who have heart problems or heart defects&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;1229&quot;&gt;&lt;span data-dcnode-id=&quot;1230&quot; instrument_node=&quot;&quot;&gt;increased blood pressure and heart rate&lt;/span&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/li&gt;&lt;/ul&gt;&lt;p data-dcnode-id=&quot;1221&quot;&gt;&lt;span data-dcnode-id=&quot;1225&quot; instrument_node=&quot;&quot;&gt;Your healthcare provider should check you or your child carefully for heart problems before starting DYANAVEL XR. Tell your healthcare provider if you or your child have any heart problems, heart defects, &lt;/span&gt;&lt;a data-dcnode-id=&quot;1223&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/high_blood_pressure_hypertension_medications/drugs-condition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;rx-art&quot;&gt;&lt;span data-dcnode-id=&quot;1224&quot; instrument_node=&quot;&quot;&gt;high blood pressure&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1222&quot; instrument_node=&quot;&quot;&gt;, or a family history of these problems.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1219&quot;&gt;&lt;span data-dcnode-id=&quot;1220&quot; instrument_node=&quot;&quot;&gt;Your healthcare provider should check your or your childâ€™s blood pressure and heart rate regularly during treatment with DYANAVEL XR.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1216&quot;&gt;&lt;b data-dcnode-id=&quot;1217&quot;&gt;&lt;span data-dcnode-id=&quot;1218&quot; instrument_node=&quot;&quot;&gt;Call your healthcare provider or go to the nearest hospital emergency room right away if you or your child have any signs of heart problems such as chest pain, shortness of breath, or fainting while taking DYANAVEL XR.&lt;/span&gt;&lt;/b&gt;&lt;/p&gt;&lt;ul data-dcnode-id=&quot;1203&quot;&gt;&lt;li data-dcnode-id=&quot;1204&quot;&gt;&lt;b data-dcnode-id=&quot;1214&quot;&gt;&lt;span data-dcnode-id=&quot;1215&quot; instrument_node=&quot;&quot;&gt;Mental (psychiatric) problems, including:&lt;/span&gt;&lt;/b&gt;&lt;ul data-dcnode-id=&quot;1205&quot;&gt;&lt;li data-dcnode-id=&quot;1212&quot;&gt;&lt;span data-dcnode-id=&quot;1213&quot; instrument_node=&quot;&quot;&gt;new or worse behavior and thought problems&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;1210&quot;&gt;&lt;span data-dcnode-id=&quot;1211&quot; instrument_node=&quot;&quot;&gt;new or worse bipolar illness&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;1208&quot;&gt;&lt;span data-dcnode-id=&quot;1209&quot; instrument_node=&quot;&quot;&gt;new psychotic symptoms (such as hearing voices, or seeing or believing things that are not real) or new manic symptoms&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;1206&quot;&gt;&lt;span data-dcnode-id=&quot;1207&quot; instrument_node=&quot;&quot;&gt;Tell your healthcare provider about any mental problems you or your child have, or about a family history of suicide, bipolar illness, or depression.&lt;/span&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/li&gt;&lt;/ul&gt;&lt;p data-dcnode-id=&quot;1200&quot;&gt;&lt;b data-dcnode-id=&quot;1201&quot;&gt;&lt;span data-dcnode-id=&quot;1202&quot; instrument_node=&quot;&quot;&gt;Call your healthcare provider right away if you or your child have any new or worsening mental symptoms or problems while taking DYANAVEL XR, especially hearing voices, seeing or believing things that are not real, or new manic symptoms.&lt;/span&gt;&lt;/b&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1197&quot;&gt;&lt;b data-dcnode-id=&quot;1198&quot;&gt;&lt;span data-dcnode-id=&quot;1199&quot; instrument_node=&quot;&quot;&gt;What is DYANAVEL XR?&lt;/span&gt;&lt;/b&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1195&quot;&gt;&lt;span data-dcnode-id=&quot;1196&quot; instrument_node=&quot;&quot;&gt;DYANAVEL XR is a central nervous system (CNS) stimulant prescription medicine used for the treatment of Attention Deficit Hyperactivity Disorder (ADHD) in people 6 years and older. DYANAVEL XR may help increase attention and decrease impulsiveness and hyperactivity in people with ADHD.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1193&quot;&gt;&lt;span data-dcnode-id=&quot;1194&quot; instrument_node=&quot;&quot;&gt;It is not known if DYANAVEL XR is safe and effective in children under 6 years of age.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1189&quot;&gt;&lt;b data-dcnode-id=&quot;1191&quot;&gt;&lt;span data-dcnode-id=&quot;1192&quot; instrument_node=&quot;&quot;&gt;DYANAVEL XR is a federally controlled substance (CII) because it contains amphetamine that can be a target for people who abuse prescription medicines or street drugs. &lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;1190&quot; instrument_node=&quot;&quot;&gt;Keep DYANAVEL XR in a safe place to protect it from theft. Never give your DYANAVEL XR to anyone else, because it may cause death or harm them. Selling or giving away DYANAVEL XR may harm others and is against the law.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1186&quot;&gt;&lt;b data-dcnode-id=&quot;1187&quot;&gt;&lt;span data-dcnode-id=&quot;1188&quot; instrument_node=&quot;&quot;&gt;Do not take DYANAVEL XR if you or your child are:&lt;/span&gt;&lt;/b&gt;&lt;/p&gt;&lt;ul data-dcnode-id=&quot;1178&quot;&gt;&lt;li data-dcnode-id=&quot;1184&quot;&gt;&lt;span data-dcnode-id=&quot;1185&quot; instrument_node=&quot;&quot;&gt;allergic to amphetamine or any of the ingredients in DYANAVEL XR. See the end of this Medication Guide for a complete list of ingredients in DYANAVEL XR.&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;1179&quot;&gt;&lt;span data-dcnode-id=&quot;1183&quot; instrument_node=&quot;&quot;&gt;taking or have taken within the past 14 days a medicine used to treat depression called a &lt;/span&gt;&lt;a data-dcnode-id=&quot;1181&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/monoamine_oxidase_inhibitor/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;1182&quot; instrument_node=&quot;&quot;&gt;monoamine oxidase inhibitor&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1180&quot; instrument_node=&quot;&quot;&gt; (MAOI).&lt;/span&gt;&lt;/li&gt;&lt;/ul&gt;&lt;p data-dcnode-id=&quot;1175&quot;&gt;&lt;b data-dcnode-id=&quot;1176&quot;&gt;&lt;span data-dcnode-id=&quot;1177&quot; instrument_node=&quot;&quot;&gt;Before taking DYANAVEL XR tell your healthcare provider about all medical conditions, including if you or your child:&lt;/span&gt;&lt;/b&gt;&lt;/p&gt;&lt;ul data-dcnode-id=&quot;1152&quot;&gt;&lt;li data-dcnode-id=&quot;1173&quot;&gt;&lt;span data-dcnode-id=&quot;1174&quot; instrument_node=&quot;&quot;&gt;have heart problems, heart defects, or high blood pressure&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;1171&quot;&gt;&lt;span data-dcnode-id=&quot;1172&quot; instrument_node=&quot;&quot;&gt;have mental problems including psychosis, mania, bipolar illness, or depression&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;1166&quot;&gt;&lt;span data-dcnode-id=&quot;1170&quot; instrument_node=&quot;&quot;&gt;have &lt;/span&gt;&lt;a data-dcnode-id=&quot;1168&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/circulation/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;1169&quot; instrument_node=&quot;&quot;&gt;circulation&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1167&quot; instrument_node=&quot;&quot;&gt; problems in fingers and toes&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;1164&quot;&gt;&lt;span data-dcnode-id=&quot;1165&quot; instrument_node=&quot;&quot;&gt;have kidney problems&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;1159&quot;&gt;&lt;span data-dcnode-id=&quot;1163&quot; instrument_node=&quot;&quot;&gt;are pregnant or plan to become pregnant. It is not known if DYANAVEL XR will harm your unborn baby. Tell your healthcare provider if you become pregnant during treatment with DYANAVEL XR.&lt;/span&gt;&lt;ul data-dcnode-id=&quot;1160&quot;&gt;&lt;li data-dcnode-id=&quot;1161&quot;&gt;&lt;span data-dcnode-id=&quot;1162&quot; instrument_node=&quot;&quot;&gt;There is a pregnancy registry for females who are exposed to DYANAVEL XR during pregnancy. The purpose of the registry is to collect information about the health of females exposed to DYANAVEL XR and their baby. If you or your child becomes pregnant during treatment with DYANAVEL XR, talk to your healthcare provider about registering with the National Pregnancy Registry or Psychostimulants at 1-866-961-2388 or visit https://womensmeantalhealth.org/clinical-and-researchprograms/ pregnancyregistry/othermedications/.&lt;/span&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;1157&quot;&gt;&lt;span data-dcnode-id=&quot;1158&quot; instrument_node=&quot;&quot;&gt;are breastfeeding or plan to breastfeed. DYANAVEL XR passes into breast milk. You should not breastfeed while you are taking DYANAVEL XR.&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;1153&quot;&gt;&lt;b data-dcnode-id=&quot;1155&quot;&gt;&lt;span data-dcnode-id=&quot;1156&quot; instrument_node=&quot;&quot;&gt;Tell your healthcare provider about all of the medicines that you or your child takes, &lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;1154&quot; instrument_node=&quot;&quot;&gt;including prescription and over-the-counter medicines, vitamins, and herbal supplements.&lt;/span&gt;&lt;/li&gt;&lt;/ul&gt;&lt;p data-dcnode-id=&quot;1150&quot;&gt;&lt;span data-dcnode-id=&quot;1151&quot; instrument_node=&quot;&quot;&gt;DYANAVEL XR and some medicines may interact with each other and cause serious side effects. Sometimes the doses of other medicines will need to be adjusted while taking DYANAVEL XR.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1146&quot;&gt;&lt;b data-dcnode-id=&quot;1148&quot;&gt;&lt;span data-dcnode-id=&quot;1149&quot; instrument_node=&quot;&quot;&gt;Especially tell your healthcare provider if you or your child take&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;1147&quot; instrument_node=&quot;&quot;&gt; medicines used to treat depression including MAOIs.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1142&quot;&gt;&lt;span data-dcnode-id=&quot;1145&quot; instrument_node=&quot;&quot;&gt;Your healthcare provider will decide whether DYANAVEL XR can be taken with other medicines. &lt;/span&gt;&lt;b data-dcnode-id=&quot;1143&quot;&gt;&lt;span data-dcnode-id=&quot;1144&quot; instrument_node=&quot;&quot;&gt;Do not start any new medicine while taking DYANAVEL XR without talking to your healthcare provider first.&lt;/span&gt;&lt;/b&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1139&quot;&gt;&lt;b data-dcnode-id=&quot;1140&quot;&gt;&lt;span data-dcnode-id=&quot;1141&quot; instrument_node=&quot;&quot;&gt;How should I take DYANAVEL XR?&lt;/span&gt;&lt;/b&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1136&quot;&gt;&lt;b data-dcnode-id=&quot;1137&quot;&gt;&lt;span data-dcnode-id=&quot;1138&quot; instrument_node=&quot;&quot;&gt;See the detailed “Instructions for Use” for information on how to give a dose of DYANAVEL XR.&lt;/span&gt;&lt;/b&gt;&lt;/p&gt;&lt;ul data-dcnode-id=&quot;1123&quot;&gt;&lt;li data-dcnode-id=&quot;1134&quot;&gt;&lt;span data-dcnode-id=&quot;1135&quot; instrument_node=&quot;&quot;&gt;Take DYANAVEL XR exactly as prescribed by your healthcare provider.&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;1132&quot;&gt;&lt;span data-dcnode-id=&quot;1133&quot; instrument_node=&quot;&quot;&gt;Your healthcare provider may change the dose if needed.&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;1130&quot;&gt;&lt;span data-dcnode-id=&quot;1131&quot; instrument_node=&quot;&quot;&gt;Take DYANAVEL XR 1 time each day in the morning.&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;1128&quot;&gt;&lt;span data-dcnode-id=&quot;1129&quot; instrument_node=&quot;&quot;&gt;DYANAVEL XR can be taken with or without food.&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;1126&quot;&gt;&lt;span data-dcnode-id=&quot;1127&quot; instrument_node=&quot;&quot;&gt;Your healthcare provider may sometimes stop DYANAVEL XR treatment for a while to check ADHD symptoms.&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;1124&quot;&gt;&lt;span data-dcnode-id=&quot;1125&quot; instrument_node=&quot;&quot;&gt;If you or your child take(s) too much DYANAVEL XR, call your healthcare provider or poison control center, or go to the nearest hospital emergency room right away. In case of poisoning call your poison control center at 1-800-222-1222.&lt;/span&gt;&lt;/li&gt;&lt;/ul&gt;&lt;p data-dcnode-id=&quot;1120&quot;&gt;&lt;b data-dcnode-id=&quot;1121&quot;&gt;&lt;span data-dcnode-id=&quot;1122&quot; instrument_node=&quot;&quot;&gt;What should I avoid while taking DYANAVEL XR?&lt;/span&gt;&lt;/b&gt;&lt;/p&gt;&lt;ul data-dcnode-id=&quot;1117&quot;&gt;&lt;li data-dcnode-id=&quot;1118&quot;&gt;&lt;span data-dcnode-id=&quot;1119&quot; instrument_node=&quot;&quot;&gt;drinking alcohol&lt;/span&gt;&lt;/li&gt;&lt;/ul&gt;&lt;p data-dcnode-id=&quot;1114&quot;&gt;&lt;b data-dcnode-id=&quot;1115&quot;&gt;&lt;span data-dcnode-id=&quot;1116&quot; instrument_node=&quot;&quot;&gt;What are possible side effects of DYANAVEL XR?&lt;/span&gt;&lt;/b&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1111&quot;&gt;&lt;b data-dcnode-id=&quot;1112&quot;&gt;&lt;span data-dcnode-id=&quot;1113&quot; instrument_node=&quot;&quot;&gt;DYANAVEL XR can cause serious side effects, including:&lt;/span&gt;&lt;/b&gt;&lt;/p&gt;&lt;ul data-dcnode-id=&quot;1093&quot;&gt;&lt;li data-dcnode-id=&quot;1107&quot;&gt;&lt;span data-dcnode-id=&quot;1110&quot; instrument_node=&quot;&quot;&gt;See &lt;/span&gt;&lt;b data-dcnode-id=&quot;1108&quot;&gt;&lt;span data-dcnode-id=&quot;1109&quot; instrument_node=&quot;&quot;&gt;“What is the most important information I should know about DYANAVEL XR?”&lt;/span&gt;&lt;/b&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;1103&quot;&gt;&lt;b data-dcnode-id=&quot;1105&quot;&gt;&lt;span data-dcnode-id=&quot;1106&quot; instrument_node=&quot;&quot;&gt;Slowing of growth (height and weight) in children.&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;1104&quot; instrument_node=&quot;&quot;&gt; Children should have their height and weight checked often while taking DYANAVEL XR.&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;1094&quot;&gt;&lt;b data-dcnode-id=&quot;1101&quot;&gt;&lt;span data-dcnode-id=&quot;1102&quot; instrument_node=&quot;&quot;&gt;Circulation problems in fingers and toes (peripheral vasculopathy, including Raynaudâ€™s phenomenon). &lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;1100&quot; instrument_node=&quot;&quot;&gt;Signs and symptoms may include:&lt;/span&gt;&lt;ul data-dcnode-id=&quot;1095&quot;&gt;&lt;li data-dcnode-id=&quot;1098&quot;&gt;&lt;span data-dcnode-id=&quot;1099&quot; instrument_node=&quot;&quot;&gt;fingers or toes may feel numb, cool, painful&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;1096&quot;&gt;&lt;span data-dcnode-id=&quot;1097&quot; instrument_node=&quot;&quot;&gt;fingers or toes may change color from pale, to blue, to red&lt;/span&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/li&gt;&lt;/ul&gt;&lt;p data-dcnode-id=&quot;1091&quot;&gt;&lt;span data-dcnode-id=&quot;1092&quot; instrument_node=&quot;&quot;&gt;Tell your healthcare provider if you or your child have numbness, pain, skin color change, or sensitivity to temperature in your fingers or toes.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1088&quot;&gt;&lt;b data-dcnode-id=&quot;1089&quot;&gt;&lt;span data-dcnode-id=&quot;1090&quot; instrument_node=&quot;&quot;&gt;Call your healthcare provider right away if you or your child have any signs of unexplained wounds appearing on fingers or toes while taking DYANAVEL XR.&lt;/span&gt;&lt;/b&gt;&lt;/p&gt;&lt;ul data-dcnode-id=&quot;1042&quot;&gt;&lt;li data-dcnode-id=&quot;1067&quot;&gt;&lt;b data-dcnode-id=&quot;1086&quot;&gt;&lt;span data-dcnode-id=&quot;1087&quot; instrument_node=&quot;&quot;&gt;Serotonin syndrome.&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;1085&quot; instrument_node=&quot;&quot;&gt; This problem may happen when DYANAVEL XR is taken with certain other medicines and may be life-threatening. Stop taking DYANAVEL XR and call your healthcare provider or go to the nearest hospital emergency room if you get symptoms or serotonin syndrome which may include:&lt;/span&gt;&lt;ul data- h&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;1061&quot;&gt;&lt;span data-dcnode-id=&quot;1062&quot; instrument_node=&quot;&quot;&gt;decreased appetite&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;1059&quot;&gt;&lt;span data-dcnode-id=&quot;1060&quot; instrument_node=&quot;&quot;&gt;weight loss&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;1057&quot;&gt;&lt;span data-dcnode-id=&quot;1058&quot; instrument_node=&quot;&quot;&gt;stomach pain&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;1055&quot;&gt;&lt;span data-dcnode-id=&quot;1056&quot; instrument_node=&quot;&quot;&gt;nausea&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;1053&quot;&gt;&lt;span data-dcnode-id=&quot;1054&quot; instrument_node=&quot;&quot;&gt;trouble sleeping&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;1051&quot;&gt;&lt;span data-dcnode-id=&quot;1052&quot; instrument_node=&quot;&quot;&gt;restlessness&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;1049&quot;&gt;&lt;span data-dcnode-id=&quot;1050&quot; instrument_node=&quot;&quot;&gt;extreme mood changes&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;1047&quot;&gt;&lt;span data-dcnode-id=&quot;1048&quot; instrument_node=&quot;&quot;&gt;dizziness&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;1045&quot;&gt;&lt;span data-dcnode-id=&quot;1046&quot; instrument_node=&quot;&quot;&gt;increased heart rate&lt;/span&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/li&gt;&lt;/ul&gt;&lt;p data-dcnode-id=&quot;1040&quot;&gt;&lt;span data-dcnode-id=&quot;1041&quot; instrument_node=&quot;&quot;&gt;These are not all the possible side effects of DYANAVEL XR.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1038&quot;&gt;&lt;span data-dcnode-id=&quot;1039&quot; instrument_node=&quot;&quot;&gt;Call your doctor for medical advice about side effects. You may report side effects to FDA at 1-800-FDA-1088.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1035&quot;&gt;&lt;b data-dcnode-id=&quot;1036&quot;&gt;&lt;span data-dcnode-id=&quot;1037&quot; instrument_node=&quot;&quot;&gt;How should I store DYANAVEL XR?&lt;/span&gt;&lt;/b&gt;&lt;/p&gt;&lt;ul data-dcnode-id=&quot;1028&quot;&gt;&lt;li data-dcnode-id=&quot;1033&quot;&gt;&lt;span data-dcnode-id=&quot;1034&quot; instrument_node=&quot;&quot;&gt;Store DYANAVEL XR at room temperature between 68°F to 77°F (20°C to 25°C).&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;1031&quot;&gt;&lt;span data-dcnode-id=&quot;1032&quot; instrument_node=&quot;&quot;&gt;Store DYANAVEL XR in a safe place, like a locked cabinet.&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;1029&quot;&gt;&lt;span data-dcnode-id=&quot;1030&quot; instrument_node=&quot;&quot;&gt;Dispose of remaining, unused, or expired DYANAVEL XR by a medicine take-back program at authorized collection sites such as retail pharmacies, hospital or clinic pharmacies, and law enforcement locations. If no take-back program or authorized collector is available, mix DYANAVEL XR with an undesirable, nontoxic substance such as dirt, cat litter, or used coffee grounds to make it less appealing to children and pets. Place the mixture in a container such as a sealed plastic bag and throw away DYANAVEL XR in the household trash.&lt;/span&gt;&lt;/li&gt;&lt;/ul&gt;&lt;p data-dcnode-id=&quot;1025&quot;&gt;&lt;b data-dcnode-id=&quot;1026&quot;&gt;&lt;span data-dcnode-id=&quot;1027&quot; instrument_node=&quot;&quot;&gt;Keep DYANAVEL XR and all medicines out of the reach of children.&lt;/span&gt;&lt;/b&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1022&quot;&gt;&lt;b data-dcnode-id=&quot;1023&quot;&gt;&lt;span data-dcnode-id=&quot;1024&quot; instrument_node=&quot;&quot;&gt;General information about the safe and effective use of DYANAVEL XR&lt;/span&gt;&lt;/b&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1020&quot;&gt;&lt;span data-dcnode-id=&quot;1021&quot; instrument_node=&quot;&quot;&gt;Medicines are sometimes prescribed for purposes other than those listed in the Medication Guide. Do not use DYANAVEL XR for a condition for which it has not been prescribed. Do not give DYANAVEL XR to other people, even if they have the same condition. It may harm them and it is against the law. You can ask your healthcare provider or pharmacist for information about DYANAVEL XR that was written for health professionals.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1017&quot;&gt;&lt;b data-dcnode-id=&quot;1018&quot;&gt;&lt;span data-dcnode-id=&quot;1019&quot; instrument_node=&quot;&quot;&gt;What are the ingredients in DYANAVEL XR?&lt;/span&gt;&lt;/b&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1014&quot;&gt;&lt;b data-dcnode-id=&quot;1015&quot;&gt;&lt;span data-dcnode-id=&quot;1016&quot; instrument_node=&quot;&quot;&gt;DYANAVEL XR extended-release oral suspension:&lt;/span&gt;&lt;/b&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1010&quot;&gt;&lt;b data-dcnode-id=&quot;1012&quot;&gt;&lt;span data-dcnode-id=&quot;1013&quot; instrument_node=&quot;&quot;&gt;Active Ingredient:&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;1011&quot; instrument_node=&quot;&quot;&gt; amphetamine&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1006&quot;&gt;&lt;b data-dcnode-id=&quot;1008&quot;&gt;&lt;span data-dcnode-id=&quot;1009&quot; instrument_node=&quot;&quot;&gt;Inactive Ingredients:&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;1007&quot; instrument_node=&quot;&quot;&gt; anhydrous citric acid, bubblegum flavor, glycerin, methylparaben, modified food starch, polysorbate 80, povidone, polyvinyl acetate, propylparaben, sodium lauryl sulfate, sodium polystyrene sulfonate, sucralose, triacetin and xanthan gum&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1003&quot;&gt;&lt;b data-dcnode-id=&quot;1004&quot;&gt;&lt;span data-dcnode-id=&quot;1005&quot; instrument_node=&quot;&quot;&gt;Instructions for Use&lt;/span&gt;&lt;/b&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;996&quot;&gt;&lt;b data-dcnode-id=&quot;1001&quot;&gt;&lt;span data-dcnode-id=&quot;1002&quot; instrument_node=&quot;&quot;&gt;DYANAVEL XR&lt;/span&gt;&lt;/b&gt;&lt;br data
