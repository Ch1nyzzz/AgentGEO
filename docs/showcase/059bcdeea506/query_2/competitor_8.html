&lt;/span&gt;&lt;p data-dcnode-id=&quot;1507&quot;&gt;&lt;span data-dcnode-id=&quot;1541&quot; instrument_node=&quot;&quot;&gt;Immersive reality is bumping us into the deep end, virtually speaking. Colleges and universities &lt;/span&gt;&lt;a data-dcnode-id=&quot;1539&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//realitylab.uw.edu/&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1540&quot; instrument_node=&quot;&quot;&gt;large&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1538&quot; instrument_node=&quot;&quot;&gt; and &lt;/span&gt;&lt;a data-dcnode-id=&quot;1536&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sccsc.edu/uploadedFiles/Resources/PDFs/Publications/Q1-19-PresidentNewsletter.pdf&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1537&quot; instrument_node=&quot;&quot;&gt;small&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1535&quot; instrument_node=&quot;&quot;&gt; are launching new labs and centers dedicated to research on the topics of augmented reality, virtual reality and 360-degree imaging. The first &lt;/span&gt;&lt;a data-dcnode-id=&quot;1533&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//lethbridgecollege.ca/events/merging-realities-2019&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1534&quot; instrument_node=&quot;&quot;&gt;academic conference held completely in virtual reality&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1532&quot; instrument_node=&quot;&quot;&gt; recently returned for its &lt;/span&gt;&lt;a data-dcnode-id=&quot;1530&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.twitch.tv/videos/416161996&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1531&quot; instrument_node=&quot;&quot;&gt;second year&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1529&quot; instrument_node=&quot;&quot;&gt;, hosted on Twitch by &lt;/span&gt;&lt;a data-dcnode-id=&quot;1527&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//lethbridgecollege.ca/index.php/&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1528&quot; instrument_node=&quot;&quot;&gt;Lethbridge College&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1526&quot; instrument_node=&quot;&quot;&gt; in Alberta and &lt;/span&gt;&lt;a data-dcnode-id=&quot;1524&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.centennialcollege.ca/&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1525&quot; instrument_node=&quot;&quot;&gt;Centennial College&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1523&quot; instrument_node=&quot;&quot;&gt; in Toronto. Majors in VR and AR have begun popping up in higher education across the United States, including programs at the &lt;/span&gt;&lt;a data-dcnode-id=&quot;1521&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.scad.edu/academics/programs/immersive-reality/degrees/bfa&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1522&quot; instrument_node=&quot;&quot;&gt;Savannah School of Design&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1520&quot; instrument_node=&quot;&quot;&gt; (GA), &lt;/span&gt;&lt;a data-dcnode-id=&quot;1518&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.su.edu/scil/virtual-reality-design/&quot;&gt;&lt;span data-dcnode-id=&quot;1519&quot; instrument_node=&quot;&quot;&gt;Shenandoah University&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1517&quot; instrument_node=&quot;&quot;&gt; (VA) and &lt;/span&gt;&lt;a data-dcnode-id=&quot;1515&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//drexel.edu/westphal/academics/undergraduate/virtual-reality/&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1516&quot; instrument_node=&quot;&quot;&gt;Drexel University Westphal&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1514&quot; instrument_node=&quot;&quot;&gt; (PA). &lt;/span&gt;&lt;a data-dcnode-id=&quot;1512&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//library.educause.edu/resources/2019/4/2019-horizon-report&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1513&quot; instrument_node=&quot;&quot;&gt;Educause experts&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1511&quot; instrument_node=&quot;&quot;&gt; have most recently positioned the timing for broad adoption of these technologies in education at the two-year to three-year horizon. And &lt;/span&gt;&lt;a data-dcnode-id=&quot;1509&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//blogs.gartner.com/marty-resnick/virtual-reality-vr-in-higher-ed/&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1510&quot; instrument_node=&quot;&quot;&gt;Gartner has predicted&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1508&quot; instrument_node=&quot;&quot;&gt; that by the year 2021, 60 percent of higher education institutions in the United States will &quot;intentionally&quot; be using VR to create simulations and put students into immersive environments.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1506&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1504&quot;&gt;&lt;span data-dcnode-id=&quot;1505&quot; instrument_node=&quot;&quot;&gt;If you haven't already acquired your own headset or applied for a grant from your institution to test out AR or VR for instruction, it's time. We've done a scan of some of the most interesting projects currently taking place in American classrooms to help you imagine the virtual possibilities.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1503&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;1501&quot;&gt;&lt;span data-dcnode-id=&quot;1502&quot; instrument_node=&quot;&quot;&gt;1) Grasping Concepts&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1500&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1493&quot;&gt;&lt;a data-dcnode-id=&quot;1498&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//its.sdsu.edu/&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1499&quot; instrument_node=&quot;&quot;&gt;San Diego State University's Instructional Technology Services&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1497&quot; instrument_node=&quot;&quot;&gt; unit launched a &lt;/span&gt;&lt;a data-dcnode-id=&quot;1495&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//its.sdsu.edu/vital/&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1496&quot; instrument_node=&quot;&quot;&gt;Virtual Immersive Teaching and Learning (VITaL)&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1494&quot; instrument_node=&quot;&quot;&gt; initiative in 2017. Since then, dozens of faculty members have tested the use of AR, VR, mixed reality and 360-degree-video tools for use in numerous disciplines. Instructors can check out gear to immerse their students in new learning environments in their chosen spaces, or take over the VITaL Learning Research Studio to accommodate up to 40 students at four different stations.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1492&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1487&quot;&gt;&lt;span data-dcnode-id=&quot;1491&quot; instrument_node=&quot;&quot;&gt;Among the many types of experimentation, Gur Windmiller, an instructor in the astronomy department, has found VR &quot;a perfect fit&quot; for teaching students about astronomy. Concepts that can be hard to understand with verbal explanations suddenly make sense when students experience them visually, he explained &lt;/span&gt;&lt;a data-dcnode-id=&quot;1489&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//newscenter.sdsu.edu/sdsu_newscenter/news_story.aspx%3Fsid%3D77193&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1490&quot; instrument_node=&quot;&quot;&gt;in a university article&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1488&quot; instrument_node=&quot;&quot;&gt;. &quot;It's a very visual subject,&quot; he said. &quot;You can create these sandbox worlds where students can just play around with astronomical objects and see what happens.&quot;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1486&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;1484&quot;&gt;&lt;span data-dcnode-id=&quot;1485&quot; instrument_node=&quot;&quot;&gt;2) Recreating Past Experiences for New Learners&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1483&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1475&quot;&gt;&lt;span data-dcnode-id=&quot;1482&quot; instrument_node=&quot;&quot;&gt;The issues of truth and media manipulation brought students from Culture &amp;amp; Media, Journalism &amp;amp; Design and Theatre together at &lt;/span&gt;&lt;a data-dcnode-id=&quot;1480&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.newschool.edu/&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1481&quot; instrument_node=&quot;&quot;&gt;The New School&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1479&quot; instrument_node=&quot;&quot;&gt; (NY) in a class co-taught by liberal arts instructor Sara Montague and &lt;/span&gt;&lt;a data-dcnode-id=&quot;1477&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//xrcenter.newschool.edu/&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1478&quot; instrument_node=&quot;&quot;&gt;XReality Center&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1476&quot; instrument_node=&quot;&quot;&gt; head Maya Georgieva. Their task: to study — and recreate — that pioneer of &quot;fake news,&quot; the War of the Worlds radio broadcast, coinciding with its 80th anniversary. Students performed and filmed key scenes from a recreation of the event.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1474&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1463&quot;&gt;&lt;span data-dcnode-id=&quot;1473&quot; instrument_node=&quot;&quot;&gt;The XReality Center, which allows students and faculty to check out XR products and puts on workshops to help them learn how to use the technology, has also been behind initiatives to digitize nearly the entirety of the &lt;/span&gt;&lt;a data-dcnode-id=&quot;1471&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.google.com/maps/%4040.73554%2C-73.9935763%2C2a%2C75y%2C205.44h%2C97.83t/data%3D%213m6%211e1%213m4%211scCrwdOn8YKiUJsv7RswMHw%212e0%217i13312%218i6656&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1472&quot; instrument_node=&quot;&quot;&gt;University Center campus&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1470&quot; instrument_node=&quot;&quot;&gt; in New York City, study &lt;/span&gt;&lt;a data-dcnode-id=&quot;1468&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//xrcenter.newschool.edu/projects/parsons-fashion-study-collection-virtual-reality/&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1469&quot; instrument_node=&quot;&quot;&gt;classic pieces of fashion&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1467&quot; instrument_node=&quot;&quot;&gt; and &lt;/span&gt;&lt;a data-dcnode-id=&quot;1465&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//xrcenter.newschool.edu/projects/testimony-interactive-documentary/&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1466&quot; instrument_node=&quot;&quot;&gt;capture stories&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1464&quot; instrument_node=&quot;&quot;&gt; of survivors of sexual assault and their journeys to healing.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1462&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;1460&quot;&gt;&lt;span data-dcnode-id=&quot;1461&quot; instrument_node=&quot;&quot;&gt;3) Stagecraft for Theater Students&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1459&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1451&quot;&gt;&lt;span data-dcnode-id=&quot;1458&quot; instrument_node=&quot;&quot;&gt;A project at Maine's &lt;/span&gt;&lt;a data-dcnode-id=&quot;1456&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.husson.edu/news/2019/04/husson-university-to-demonstrate-new-augmented-reality-app-for-theatrical-set-designers&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1457&quot; instrument_node=&quot;&quot;&gt;Husson University&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1455&quot; instrument_node=&quot;&quot;&gt; will help theater people visualize stage design for their productions. The university's integrated technology department is developing &lt;/span&gt;&lt;a data-dcnode-id=&quot;1453&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.husson.edu/news/2019/04/husson-university-to-demonstrate-new-augmented-reality-app-for-theatrical-set-designers&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1454&quot; instrument_node=&quot;&quot;&gt;AR Stagecraft&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1452&quot; instrument_node=&quot;&quot;&gt;, an app for iPhones and iPads that provides an immersive experience on an empty stage. Students in Husson's entertainment production program are currently designing theater sets in a computer aided drafting class, which will be imported into the app to provide users the experience of walking through a set on stage before construction begins. This is just the first of many AR and VR projects to come, promised the institution, culminating in construction of an Interactive Experience (IEX) Center, which will be part of a new College of Business building expected to open in 2021.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1450&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;imageCap fullWidth&quot; data-dcnode-id=&quot;1444&quot;&gt;&lt;img alt=&quot;An AR set design app allows Husson University theater students to visualize a set on stage before construction begins.&quot; data-dcnode-id=&quot;1449&quot; height=&quot;429&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//campustechnology.com/-/media/EDU/CampusTechnology/2019-Images/20190515HussonDSC04415.jpg&amp;amp;raw&quot; width=&quot;644&quot;&gt;&lt;span data-dcnode-id=&quot;1448&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1446&quot;&gt;&lt;span data-dcnode-id=&quot;1447&quot; instrument_node=&quot;&quot;&gt;An AR set design app allows Husson University theater students to visualize a set on stage before construction begins. (Photo: Matthew Green-Hamann/Husson University) &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1445&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1443&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;1441&quot;&gt;&lt;span data-dcnode-id=&quot;1442&quot; instrument_node=&quot;&quot;&gt;4) Virtual Reconstruction of History&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1440&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1429&quot;&gt;&lt;span data-dcnode-id=&quot;1439&quot; instrument_node=&quot;&quot;&gt;Since 2005, students and faculty from the &lt;/span&gt;&lt;a data-dcnode-id=&quot;1437&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.du.edu/ahss/anthropology/&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1438&quot; instrument_node=&quot;&quot;&gt;University of Denver (CO) Anthropology Department&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1436&quot; instrument_node=&quot;&quot;&gt; have worked with members of the public to research, interpret and preserve &lt;/span&gt;&lt;a data-dcnode-id=&quot;1434&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//portfolio.du.edu/amache&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1435&quot; instrument_node=&quot;&quot;&gt;Amache&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1433&quot; instrument_node=&quot;&quot;&gt;, a World War II Japanese-American internment camp about four hours south of Denver. While the project has long digitized objects linked to the site to make the work accessible to those who can't visit physically, now a team is using &lt;/span&gt;&lt;a data-dcnode-id=&quot;1431&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//durangoherald.com/articles/275397&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1432&quot; instrument_node=&quot;&quot;&gt;drone image capture&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1430&quot; instrument_node=&quot;&quot;&gt; to produce a 3D reconstruction of the camp. Eventually, a composite of those photos will be used to feed a VR app that will allow viewers to move through the site via a headset, and an AR app that will let users hold up their devices and see what was there during the camp's operation.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1428&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1414&quot;&gt;&lt;span data-dcnode-id=&quot;1427&quot; instrument_node=&quot;&quot;&gt;The Amache project is just one of many university-led projects to bring important sites back to life, particularly those tied to people underrepresented in history. Members of several departments at the &lt;/span&gt;&lt;a data-dcnode-id=&quot;1425&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.uark.edu/&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1426&quot; instrument_node=&quot;&quot;&gt;University of Arkansas&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1424&quot; instrument_node=&quot;&quot;&gt;, including &lt;/span&gt;&lt;a data-dcnode-id=&quot;1422&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//fulbright.uark.edu/departments/anthropology/&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1423&quot; instrument_node=&quot;&quot;&gt;Anthropology&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1421&quot; instrument_node=&quot;&quot;&gt; and &lt;/span&gt;&lt;a data-dcnode-id=&quot;1419&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//fulbright.uark.edu/humanities/index.php&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1420&quot; instrument_node=&quot;&quot;&gt;Humanities&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1418&quot; instrument_node=&quot;&quot;&gt;, are leading a similar project to enable people to experience the &lt;/span&gt;&lt;a data-dcnode-id=&quot;1416&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.okhistory.org/sites/spiromounds&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1417&quot; instrument_node=&quot;&quot;&gt;Spiro Mounds&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1415&quot; instrument_node=&quot;&quot;&gt;, a gathering place for a large community of Spiroans, a prehistoric culture that inhabited the site between AD 900 and 1300.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1413&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1408&quot;&gt;&lt;span data-dcnode-id=&quot;1412&quot; instrument_node=&quot;&quot;&gt;&quot;While much of the Spiro culture is still a mystery, the 3D immersive environment will give participants the chance to see what a ceremony may have been like, in a very immediate and interactive way,&quot; said David Fredrick, director of the &lt;/span&gt;&lt;a data-dcnode-id=&quot;1410&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//tesseract.uark.edu/&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1411&quot; instrument_node=&quot;&quot;&gt;Tesseract Center&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1409&quot; instrument_node=&quot;&quot;&gt;, a game development and visualization studio housed at the university. &quot;Creating this experience allows us to bring the past into the present in a very tangible and meaningful way.&quot;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1407&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1396&quot;&gt;&lt;span data-dcnode-id=&quot;1406&quot; instrument_node=&quot;&quot;&gt;And the libraries at the &lt;/span&gt;&lt;a data-dcnode-id=&quot;1404&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.unr.edu/&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1405&quot; instrument_node=&quot;&quot;&gt;University of Nevada, Reno&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1403&quot; instrument_node=&quot;&quot;&gt; are working with that institution's &lt;/span&gt;&lt;a data-dcnode-id=&quot;1401&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.unr.edu/anthropology&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1402&quot; instrument_node=&quot;&quot;&gt;Anthropology&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1400&quot; instrument_node=&quot;&quot;&gt; department to create a &quot;virtual museum,&quot; which involves scanning and photographing the department's collection of Native American baskets. &quot;The idea here is to use VR technology to allow library users and members of the community to have access to an impressive and expansive collection of exquisite baskets,&quot; said Multimedia Production Specialist Michelle Rebaleati during a &lt;/span&gt;&lt;a data-dcnode-id=&quot;1398&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.unr.edu/nevada-today/news/2019/virtual-reality-technology-to-preserve-the-past&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1399&quot; instrument_node=&quot;&quot;&gt;TEDxUniversityofNevada talk&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1397&quot; instrument_node=&quot;&quot;&gt;. &quot;In the VR museum, visitors can pick up, inspect and look closely at the items contained in the collection. Because the actual baskets are delicate and can't be handled, we are delivering the collection to users in a new, revolutionary way.&quot;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1395&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;1393&quot;&gt;&lt;span data-dcnode-id=&quot;1394&quot; instrument_node=&quot;&quot;&gt;5) Going on Space Walks&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1392&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1363&quot;&gt;&lt;span data-dcnode-id=&quot;1391&quot; instrument_node=&quot;&quot;&gt;During a space walk, an astronaut's job involves communication — strictly via voice — with mission control and others inside and outside the spacecraft. Now NASA is tapping ideas from higher ed to develop innovative helmet-based displays that use &lt;/span&gt;&lt;a data-dcnode-id=&quot;1389&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.microsoft.com/en-us/hololens&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1390&quot; instrument_node=&quot;&quot;&gt;Microsoft HoloLens&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1388&quot; instrument_node=&quot;&quot;&gt; to provide instructions through the augmented reality display environment. Numerous student teams from institutions throughout the land are participating in this latest NASA SUITS (&quot;Spacesuit User Interface Technologies for Students&quot;) challenge. A set of finalist teams recently headed to &lt;/span&gt;&lt;a data-dcnode-id=&quot;1386&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nasa.gov/offices/education/centers/johnson/home/index.html&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1387&quot; instrument_node=&quot;&quot;&gt;Johnson Space Center&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1385&quot; instrument_node=&quot;&quot;&gt; to test their designs, including students from the &lt;/span&gt;&lt;a data-dcnode-id=&quot;1383&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//technical.ly/baltimore/2019/04/10/unitersity-baltimore-poegrammers-created-augmented-reality-for-spacewalks-now-theyre-bringing-it-to-nasa-suits/&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1384&quot; instrument_node=&quot;&quot;&gt;University of Baltimore's (MD) Digital Whimsy Lab&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1382&quot; instrument_node=&quot;&quot;&gt;, the &lt;/span&gt;&lt;a data-dcnode-id=&quot;1380&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//buchtelite.com/38737/news/38737/&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1381&quot; instrument_node=&quot;&quot;&gt;University of Akron&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1379&quot; instrument_node=&quot;&quot;&gt; (OH), the &lt;/span&gt;&lt;a data-dcnode-id=&quot;1377&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//news.unt.edu/news-releases/unt-students-create-augmented-reality-program-space-helmets&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1378&quot; instrument_node=&quot;&quot;&gt;University of Northern Texas&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1376&quot; instrument_node=&quot;&quot;&gt;, Florida's &lt;/span&gt;&lt;a data-dcnode-id=&quot;1374&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//com.miami.edu/projects/nasa-suits-augmented-reality-design-challenge&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1375&quot; instrument_node=&quot;&quot;&gt;University of Miami&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1373&quot; instrument_node=&quot;&quot;&gt;, the &lt;/span&gt;&lt;a data-dcnode-id=&quot;1371&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.colorado.edu/aerospace/2018/12/20/students-designing-augmented-reality-system-astronauts&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1372&quot; instrument_node=&quot;&quot;&gt;University of Colorado Boulder&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1370&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a data-dcnode-id=&quot;1368&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//hokienauts.com/&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1369&quot; instrument_node=&quot;&quot;&gt;Virginia Tech&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1367&quot; instrument_node=&quot;&quot;&gt; and &lt;/span&gt;&lt;a data-dcnode-id=&quot;1365&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.boisestate.edu/news/2019/04/09/student-team-to-participate-in-nasa-design-challenge-in-houston/&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1366&quot; instrument_node=&quot;&quot;&gt;Boise State University&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1364&quot; instrument_node=&quot;&quot;&gt; (ID).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1362&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1360&quot;&gt;&lt;span data-dcnode-id=&quot;1361&quot; instrument_node=&quot;&quot;&gt;The software from Boise, for example, would help ground control send new procedures during an extravehicular activity and provide displays of images, 3D paths and instructions on how to safely navigate outside the International Space Station. In true student fashion, that team's software, &quot;ARSIS&quot; (for &quot;Augmented Reality Space Informatics System&quot;), includes a voice recognition system named Adele (for mathematician and programmer Adele Goldstein, who wrote the documentation for ENIAC), which, when a warning goes off, breaks out into &quot;Skyfall&quot; by today's Adele.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1359&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;1357&quot;&gt;&lt;span data-dcnode-id=&quot;1358&quot; instrument_node=&quot;&quot;&gt;6) Reimagining the Future&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1356&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1342&quot;&gt;&lt;span data-dcnode-id=&quot;1355&quot; instrument_node=&quot;&quot;&gt;Centuries before uranium mines in the area became an environmental hazard, Church Rock, NM, was the home to the Diné, Navajo people. Now, waste cleanup efforts are driving the families of one Diné community to seek permanent relocation to another part of their ancestral lands, a mesa without access to electricity, running water or paved roads. To help the residents of the Diné Red Water Pond Road Community envision what their new settlement could look like, faculty and students from the &lt;/span&gt;&lt;a data-dcnode-id=&quot;1353&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//www.unm.edu/&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1354&quot; instrument_node=&quot;&quot;&gt;University of New Mexico&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1352&quot; instrument_node=&quot;&quot;&gt;'s schools of &lt;/span&gt;&lt;a data-dcnode-id=&quot;1350&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//saap.unm.edu/&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1351&quot; instrument_node=&quot;&quot;&gt;Architecture&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1349&quot; instrument_node=&quot;&quot;&gt; and &lt;/span&gt;&lt;a data-dcnode-id=&quot;1347&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//engineering.unm.edu/&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1348&quot; instrument_node=&quot;&quot;&gt;Engineering&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1346&quot; instrument_node=&quot;&quot;&gt; are using VR and 3D renderings to create potential scenarios to &quot;make the design tangible and immerse the community into the plan so that they can see that their future on the mesa is within reach,&quot; according to &lt;/span&gt;&lt;a data-dcnode-id=&quot;1344&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//news.unm.edu/news/as-a-native-community-faces-relocation-unm-designs-an-off-the-grid-solution&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1345&quot; instrument_node=&quot;&quot;&gt;an article&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1343&quot; instrument_node=&quot;&quot;&gt; on the project.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1341&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1339&quot;&gt;&lt;span data-dcnode-id=&quot;1340&quot; instrument_node=&quot;&quot;&gt;Catherine Harris, assistant professor of landscape architecture and art and ecology, said the various digital tours of alternate designs will help residents of the community understand the tradeoffs they'll be making along the way in their off-the-grid move. For instance, more water collection requires more built space, conventional waste treatment eliminates the possibility for methane harvest, and so on. &quot;Ultimately,&quot; Harris said, &quot;this project is for the Diné. It gives agency to the community so they can realize a sustainable and thriving future for all generations.&quot;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1338&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;1336&quot;&gt;&lt;span data-dcnode-id=&quot;1337&quot; instrument_node=&quot;&quot;&gt;7) Practicing Clinical Care&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1335&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1330&quot;&gt;&lt;span data-dcnode-id=&quot;1334&quot; instrument_node=&quot;&quot;&gt;Students in &lt;/span&gt;&lt;a data-dcnode-id=&quot;1332&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.wcu.edu/learn/departments-schools-colleges/HHS/nursing/&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1333&quot; instrument_node=&quot;&quot;&gt;Western Carolina University's (NC) School of Nursing&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1331&quot; instrument_node=&quot;&quot;&gt; have tested the use of VR for experiential learning in emergencies. The idea is to help community nurses gain exposure to clinical situations that might not occur often enough in real life, to help them become comfortable with their responses. For an initial testing of the setup, participants donned VR headsets to enter a scene in which a patient has come into a clinic experiencing an allergic reaction to medication that is worsening, including difficulty with breathing. The students had to make rapid decisions about the patient's care and prioritize their responses at numerous points during the simulation.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1329&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1324&quot;&gt;&lt;span data-dcnode-id=&quot;1328&quot; instrument_node=&quot;&quot;&gt;&quot;Using virtual reality in clinical education allows learners to be involved in real-life experiences without real-life consequences,&quot; said Elaine Alexander, director of a regional simulation center that brings educational opportunities to outlying areas, in a &lt;/span&gt;&lt;a data-dcnode-id=&quot;1326&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//news-prod.wcu.edu/2019/04/wcu-school-of-nursing-students-test-virtual-reality-simulation-technology-at-mahec/&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1327&quot; instrument_node=&quot;&quot;&gt;university story&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1325&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1323&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;1321&quot;&gt;&lt;span data-dcnode-id=&quot;1322&quot; instrument_node=&quot;&quot;&gt;8) Hands-on Railroading&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1320&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1315&quot;&gt;&lt;span data-dcnode-id=&quot;1319&quot; instrument_node=&quot;&quot;&gt;An immersive program at &lt;/span&gt;&lt;a data-dcnode-id=&quot;1317&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//altoona.psu.edu/&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1318&quot; instrument_node=&quot;&quot;&gt;Pennsylvania State University, Altoona&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1316&quot; instrument_node=&quot;&quot;&gt; is helping prepare the newest generation of railroaders. While students — future train engineers — still go out into the field to get practice with railroad infrastructure, railcars and locomotives, they also use an industry-grade locomotive simulator that includes a virtual welder, to let them try out track work and welding.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1314&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1309&quot;&gt;&lt;span data-dcnode-id=&quot;1313&quot; instrument_node=&quot;&quot;&gt;&quot;We can build an entire railroad in the simulation and receive diagnostics from the railroad itself to see how it's running,&quot; said student Michael Yohn, in &lt;/span&gt;&lt;a data-dcnode-id=&quot;1311&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//news.psu.edu/story/572940/2019/05/03/academics/penn-state-altoona-prepares-new-generation-railroaders&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1312&quot; instrument_node=&quot;&quot;&gt;university reporting&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1310&quot; instrument_node=&quot;&quot;&gt;. &quot;It's a really cool piece of equipment.&quot;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1308&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1303&quot;&gt;&lt;span data-dcnode-id=&quot;1307&quot; instrument_node=&quot;&quot;&gt;Last year, students in the Rail Transportation Engineering (RTE) program headed to Europe to record 360-degree videos at various railroad locations in Germany, Switzerland and Austria under the guidance of instructor Bryan Schlake. They also collected videos of the trains, railroads, yards, terminals, signals and footage from the operator's cabs on several trains. Instructional Designer Joe Scott helped the team produce 360-degree video content showing various European railway applications, now made available on the &lt;/span&gt;&lt;a data-dcnode-id=&quot;1305&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.youtube.com/channel/UC6MxgMi3IHd705U_UtWd-tA&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1306&quot; instrument_node=&quot;&quot;&gt;RTE YouTube website&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1304&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1302&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;imageCap fullWidth&quot; data-dcnode-id=&quot;1296&quot;&gt;&lt;img alt=&quot;Students in Penn State Altoona’s Rail Transportation Engineering program have collected 360-degree videos of trains, railroads, yards, terminals, signals and footage from operator's cabs.&quot; data-dcnode-id=&quot;1301&quot; height=&quot;361&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//campustechnology.com/-/media/EDU/CampusTechnology/2019-Images/20190515RTEimagefigure1.jpg&amp;amp;raw&quot; width=&quot;644&quot;&gt;&lt;span data-dcnode-id=&quot;1300&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1298&quot;&gt;&lt;span data-dcnode-id=&quot;1299&quot; instrument_node=&quot;&quot;&gt;Students in Penn State Altoona's Rail Transportation Engineering program have collected 360-degree videos of trains, railroads, yards, terminals, signals and footage from operator's cabs.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1297&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1295&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;1293&quot;&gt;&lt;span data-dcnode-id=&quot;1294&quot; instrument_node=&quot;&quot;&gt;9) Feeling the Impact of Decisions&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1292&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1287&quot;&gt;&lt;span data-dcnode-id=&quot;1291&quot; instrument_node=&quot;&quot;&gt;A course in the Executive MBA program at &lt;/span&gt;&lt;a data-dcnode-id=&quot;1289&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.fordham.edu/info/20447/gabelli_school_of_business&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1290&quot; instrument_node=&quot;&quot;&gt;Fordham University's (NY) Gabelli School of Business&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1288&quot; instrument_node=&quot;&quot;&gt; puts its future leaders through two VR exercises intended to help them understand the power of communication and teamwork. Led by Julita Haber, director of the full-time cohort MBA and a communications and media professor, one activity requires students to walk across a balance beam at the top of a 1,400-foot skyscraper, urged on by team members. Another one tasks student teams to select one person to deactivate a bomb while receiving directions from the others.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1286&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1284&quot;&gt;&lt;span data-dcnode-id=&quot;1285&quot; instrument_node=&quot;&quot;&gt;Observed one student, William Allan, a financial professional at a global business and tech consultancy, &quot;Each exercise provided me with a different framework for my thought process in how to approach a situation. It [showed] me the importance of delegation and teamwork in time-sensitive situations.&quot;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1283&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1281&quot;&gt;&lt;span data-dcnode-id=&quot;1282&quot; instrument_node=&quot;&quot;&gt;&quot;The topics of team dynamics and technology go very well together,&quot; said Haber in a statement. &quot;I wanted to create activities that would evoke emotions and enhance their communication skills to reach a goal.&quot;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1280&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;1278&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;1276&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1274&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1272&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;div data-dcnode-id=&quot;1271&quot; id=&quot;disqus_thread&quot;&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1270&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;1267&quot; instrument_node=&quot;&quot;&gt;
