&lt;/span&gt;&lt;img alt=&quot;XR a ‘Tool for the 21st Century Firefighter’, Execs Say&quot; class=&quot;mb-30&quot; data-dcnode-id=&quot;2695&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.xrtoday.com/wp-content/uploads/2021/08/Firefighter.jpg&amp;amp;raw&quot;&gt;&lt;span data-dcnode-id=&quot;2694&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;post_body&quot; data-dcnode-id=&quot;2327&quot;&gt;&lt;span data-dcnode-id=&quot;2693&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2691&quot;&gt;&lt;span data-dcnode-id=&quot;2692&quot; instrument_node=&quot;&quot;&gt;A rising number and frequency of fires in places such as California, Turkey, Greece, Australia, and others, as well as the ongoing coronavirus pandemic, have forced fire departments to seek smart solutions for researching, training, and deploying the firefighters of today and the future.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2683&quot;&gt;&lt;span data-dcnode-id=&quot;2690&quot; instrument_node=&quot;&quot;&gt;XR Today spoke with &lt;/span&gt;&lt;strong data-dcnode-id=&quot;2688&quot;&gt;&lt;span data-dcnode-id=&quot;2689&quot; instrument_node=&quot;&quot;&gt;Kevin Sofen, Business Development Manager for WS Darley, Logan Parr, Director for Marketing and PR for Pico Interactive&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;2687&quot; instrument_node=&quot;&quot;&gt;, and &lt;/span&gt;&lt;strong data-dcnode-id=&quot;2685&quot;&gt;&lt;span data-dcnode-id=&quot;2686&quot; instrument_node=&quot;&quot;&gt;Cpt Kirk McKinzie, President of McKinzie Smart Technologies&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;2684&quot; instrument_node=&quot;&quot;&gt; on the growing demand for extended reality (XR) solutions in the firefighting and first responders industries.&lt;/span&gt;&lt;/p&gt;&lt;h2 data-dcnode-id=&quot;2681&quot;&gt;&lt;span data-dcnode-id=&quot;2682&quot; instrument_node=&quot;&quot;&gt;The Rise of XR in the Firefighting Industry&lt;/span&gt;&lt;/h2&gt;&lt;p data-dcnode-id=&quot;2679&quot;&gt;&lt;span data-dcnode-id=&quot;2680&quot; instrument_node=&quot;&quot;&gt;Speaking on the initial challenges Darley and others aimed to tackle, Mr Sofen explained preventable deaths among firefighters were “unacceptable” and many trainees had failed to avoid similar accidents.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2677&quot;&gt;&lt;span data-dcnode-id=&quot;2678&quot; instrument_node=&quot;&quot;&gt;VR solutions were “practical and useful” tools in training new recruits and Darley began to explore ways to build them to instruct first responders roughly seven to eight years ago.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2675&quot;&gt;&lt;span data-dcnode-id=&quot;2676&quot; instrument_node=&quot;&quot;&gt;Sofen and his colleagues had begun working with FLAIM Systems and RiVR at the time, and despite setbacks and an initial reluctance to adopt new technologies, progress had been achieved in the industry.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2673&quot;&gt;&lt;span data-dcnode-id=&quot;2674&quot; instrument_node=&quot;&quot;&gt;He explained further:&lt;/span&gt;&lt;/p&gt;&lt;blockquote data-dcnode-id=&quot;2669&quot;&gt;&lt;p data-dcnode-id=&quot;2670&quot;&gt;&lt;i data-dcnode-id=&quot;2671&quot;&gt;&lt;span data-dcnode-id=&quot;2672&quot; instrument_node=&quot;&quot;&gt;There’s a phrase that the fire service is ‘100 year of tradition, unimpeded by progress’, but there is some truth to it, considering that with VR training, we’re not replacing live fire training and other hands-on learning, which is still very important, but VR is becoming the continuum of training”&lt;/span&gt;&lt;/i&gt;&lt;/p&gt;&lt;/blockquote&gt;&lt;p data-dcnode-id=&quot;2667&quot;&gt;&lt;span data-dcnode-id=&quot;2668&quot; instrument_node=&quot;&quot;&gt;Sofen, who has worked with WS Darley for over nine years, added new solutions developed by the firms allowed new recruits to train “anytime, anywhere” with cost-effective solutions across the United States, North America, and globally.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2665&quot;&gt;&lt;span data-dcnode-id=&quot;2666&quot; instrument_node=&quot;&quot;&gt;Speaking further on the matter, Logan Parr told XR Today industry-wide adoption of VR training solutions had initially been “a bit rough” due to reluctance among departments, but the ongoing COVID-19 pandemic had forced firms to seek solutions for remote work, education and training for staff.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2663&quot;&gt;&lt;span data-dcnode-id=&quot;2664&quot; instrument_node=&quot;&quot;&gt;Global firms scrambled for new solutions amid COVID-19 to “keep engagement and training flowing,” namely among remote workers.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2661&quot;&gt;&lt;span data-dcnode-id=&quot;2662&quot; instrument_node=&quot;&quot;&gt;The Pico exec added post-pandemic demand would trigger an upswing of VR adoption, stating:&lt;/span&gt;&lt;/p&gt;&lt;blockquote data-dcnode-id=&quot;2655&quot;&gt;&lt;p data-dcnode-id=&quot;2656&quot;&gt;&lt;span data-contrast=&quot;auto&quot; data-dcnode-id=&quot;2659&quot;&gt;&lt;span data-dcnode-id=&quot;2660&quot; instrument_node=&quot;&quot;&gt;“We’re going to see a trend of adoption of these technologies, more and more, as we go into that ‘new normal’ and post-pandemic situation, now that people have been exposed to how easy it is, the benefits they see in virtual reality, and I think it’s a new business model that many people will be investigating”&lt;/span&gt;&lt;/span&gt;&lt;span data-ccp-props=&quot;{&amp;quot;201341983&amp;quot;:0,&amp;quot;335559739&amp;quot;:160,&amp;quot;335559740&amp;quot;:259}&quot; data-dcnode-id=&quot;2657&quot;&gt;&lt;br data-dcnode-id=&quot;2658&quot;&gt;&lt;/span&gt;&lt;/p&gt;&lt;/blockquote&gt;&lt;p data-dcnode-id=&quot;2653&quot;&gt;&lt;span data-dcnode-id=&quot;2654&quot; instrument_node=&quot;&quot;&gt;McKinzie, who has over 30 years as a veteran firefighter with the Cosumnes Fire Department in California, explained how firefighting traditions and initial scepticism towards immersive learning shifted as the industry battled a rise in emergency phone calls and continuous deaths for nearly 30 years.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2647&quot;&gt;&lt;span data-ccp-props=&quot;{&amp;quot;201341983&amp;quot;:0,&amp;quot;335559739&amp;quot;:160,&amp;quot;335559740&amp;quot;:259}&quot; data-dcnode-id=&quot;2648&quot;&gt;&lt;span data-dcnode-id=&quot;2652&quot; instrument_node=&quot;&quot;&gt;According to the veteran firefighter, US firefighters &lt;/span&gt;&lt;a data-dcnode-id=&quot;2650&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.usfa.fema.gov/data/statistics/%23tab-2&quot; onclick=&quot;captureOutboundLink('https://www.usfa.fema.gov/data/statistics/#tab-2')&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2651&quot; instrument_node=&quot;&quot;&gt;faced&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2649&quot; instrument_node=&quot;&quot;&gt; over 1.25 million fires, 240 million service calls, and roughly 3,000 fire deaths each year, which demanded first responders “innovate, in the moment, on the calls.” &lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2644&quot;&gt;&lt;span data-contrast=&quot;auto&quot; data-dcnode-id=&quot;2645&quot;&gt;&lt;span data-dcnode-id=&quot;2646&quot; instrument_node=&quot;&quot;&gt;“So, while we appreciate our traditions, we’re also innovative, and I’m grateful for the teams who have produced content that allows for Public Education and training,” he said. &lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;h2 data-dcnode-id=&quot;2642&quot;&gt;&lt;span data-dcnode-id=&quot;2643&quot; instrument_node=&quot;&quot;&gt;Technologies Used in Immersive Firefighter Training&lt;/span&gt;&lt;/h2&gt;&lt;p data-dcnode-id=&quot;2640&quot;&gt;&lt;span data-dcnode-id=&quot;2641&quot; instrument_node=&quot;&quot;&gt;Speaking further about the technologies employed in immersive training sessions, McKinzie explained modules included 360 videos with embedded temperature content used for public instruction.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2635&quot;&gt;&lt;span data-dcnode-id=&quot;2639&quot; instrument_node=&quot;&quot;&gt;Such tools educated learners on the differences between kitchen and wildland fires, as well as important safety protocols, he told XR Today, citing &lt;/span&gt;&lt;a data-dcnode-id=&quot;2637&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nist.gov/el/fire-research-division-73300/national-fire-research-laboratory-73306/360-degree-video-fire&quot; onclick=&quot;captureOutboundLink('https://www.nist.gov/el/fire-research-division-73300/national-fire-research-laboratory-73306/360-degree-video-fire')&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2638&quot; instrument_node=&quot;&quot;&gt;open-source work&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2636&quot; instrument_node=&quot;&quot;&gt; from the NIST Fire Lab in Maryland.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2633&quot;&gt;&lt;span data-dcnode-id=&quot;2634&quot; instrument_node=&quot;&quot;&gt;The lab, run by Dr Matt Hoehler, had published an open-source piece viewable on phones and heads-up displays (HUDs), he explained.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2628&quot;&gt;&lt;span data-dcnode-id=&quot;2632&quot; instrument_node=&quot;&quot;&gt;Dr James Mullins, Chief Technology Officer at Deacon University’s FLAIM Systems in Melbourne, Australia, had also showcased a &lt;/span&gt;&lt;a data-dcnode-id=&quot;2630&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.deakin.edu.au/research/research-news-and-publications/articles/cisr-haptically-enabled-flaim-trainer-on-show&quot; onclick=&quot;captureOutboundLink('https://www.deakin.edu.au/research/research-news-and-publications/articles/cisr-haptically-enabled-flaim-trainer-on-show')&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2631&quot; instrument_node=&quot;&quot;&gt;Haptically-Enabled Hot Fire Training System&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2629&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2626&quot;&gt;&lt;span data-dcnode-id=&quot;2627&quot; instrument_node=&quot;&quot;&gt;While visiting the Game Developers Conference in San Francisco, Mr McKinzie had only imagined it was possible and encouraged his work on VR trainer research.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2624&quot;&gt;&lt;span data-dcnode-id=&quot;2625&quot; instrument_node=&quot;&quot;&gt;He also considered ways to incorporate mixed reality (MR) systems with computational fluid dynamic fire models to add realism to simulations, but such solutions were under development at FLAIM.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2622&quot;&gt;&lt;span data-dcnode-id=&quot;2623&quot; instrument_node=&quot;&quot;&gt;McKinzie explained the FLAIM system, stating:&lt;/span&gt;&lt;/p&gt;&lt;blockquote data-dcnode-id=&quot;2618&quot;&gt;&lt;p data-dcnode-id=&quot;2619&quot;&gt;&lt;span data-ccp-props=&quot;{&amp;quot;201341983&amp;quot;:0,&amp;quot;335559739&amp;quot;:160,&amp;quot;335559740&amp;quot;:259}&quot; data-dcnode-id=&quot;2620&quot;&gt;&lt;span data-dcnode-id=&quot;2621&quot; instrument_node=&quot;&quot;&gt;“There’s thermal feedback. The nozzle has reaction force and a full system with 40 different scenarios, running from simple to complex, and in the last few days, we’ve talked about ‘digital scents’ to educate the public, especially our young members, about the difference between the smell of a roasted marshmallow and of burning plastics, and how to train our firefighters”&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;/blockquote&gt;&lt;h2 data-dcnode-id=&quot;2615&quot;&gt;&lt;span data-ccp-props=&quot;{&amp;quot;201341983&amp;quot;:0,&amp;quot;335559739&amp;quot;:160,&amp;quot;335559740&amp;quot;:259}&quot; data-dcnode-id=&quot;2616&quot;&gt;&lt;span data-dcnode-id=&quot;2617&quot; instrument_node=&quot;&quot;&gt;Immersive Trainer Efficacy&lt;/span&gt;&lt;/span&gt;&lt;/h2&gt;&lt;p data-dcnode-id=&quot;2613&quot;&gt;&lt;span data-dcnode-id=&quot;2614&quot; instrument_node=&quot;&quot;&gt;According to a growing body of scientific work and peer-reviewed papers, immersive learning platforms showed a high degree of efficacy, McKinzie said, adding new MR labs were being built across the nation.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2611&quot;&gt;&lt;span data-dcnode-id=&quot;2612&quot; instrument_node=&quot;&quot;&gt;A colleague working with California’s Cosumnes CSD Fire Department, Justin Quarisa, began comparing traditional training methods with interlinked Pico headsets.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2606&quot;&gt;&lt;span data-dcnode-id=&quot;2610&quot; instrument_node=&quot;&quot;&gt;The simulation included a fire built to allow workers at the National Aeronautics and Space Agency (NASA) to &lt;/span&gt;&lt;a data-dcnode-id=&quot;2608&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//technology.nasa.gov/features/audrey.html&quot; onclick=&quot;captureOutboundLink('https://technology.nasa.gov/features/audrey.html')&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2609&quot; instrument_node=&quot;&quot;&gt;train artificial intelligence (AI) programmes&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2607&quot; instrument_node=&quot;&quot;&gt; on future firefighting techniques.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2598&quot;&gt;&lt;span data-contrast=&quot;auto&quot; data-dcnode-id=&quot;2601&quot;&gt;&lt;span data-dcnode-id=&quot;2605&quot; instrument_node=&quot;&quot;&gt;Quarisa found that, compared to live fire training, lectures, and others, roughly 80 percent of cadets using the 360 video exercises said they had &lt;/span&gt;&lt;a data-dcnode-id=&quot;2603&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.fireengineering.com/apparatus-equipment/artificial-intelligence-firefighting/%23gref&quot; onclick=&quot;captureOutboundLink('https://www.fireengineering.com/apparatus-equipment/artificial-intelligence-firefighting/#gref')&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2604&quot; instrument_node=&quot;&quot;&gt;learned&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2602&quot; instrument_node=&quot;&quot;&gt; more than via traditional means, McKinzie said.&lt;/span&gt;&lt;/span&gt;&lt;span data-ccp-props=&quot;{&amp;quot;201341983&amp;quot;:0,&amp;quot;335559739&amp;quot;:160,&amp;quot;335559740&amp;quot;:259}&quot; data-dcnode-id=&quot;2599&quot;&gt;&lt;br data-dcnode-id=&quot;2600&quot;&gt;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2596&quot;&gt;&lt;span data-dcnode-id=&quot;2597&quot; instrument_node=&quot;&quot;&gt;Parr added partners found engagement and learner retention had remained high with VR training programmes with “long-lasting” results. Immersive learning experiences also provided “a more sympathetic approach” compared with reading case scenario texts.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2594&quot;&gt;&lt;span data-dcnode-id=&quot;2595&quot; instrument_node=&quot;&quot;&gt;Mr Sofen continued, stating the industry has responded well to immersive content produced by firms such as RiVR and FLAIM, adding:&lt;/span&gt;&lt;/p&gt;&lt;blockquote data-dcnode-id=&quot;2590&quot;&gt;&lt;p data-dcnode-id=&quot;2591&quot;&gt;&lt;span data-contrast=&quot;auto&quot; data-dcnode-id=&quot;2592&quot;&gt;&lt;span data-dcnode-id=&quot;2593&quot; instrument_node=&quot;&quot;&gt;“I think the contextual nature of creating a hundred different scenes within the confines of a conference room, and going from an electrical power fire to a Hazmat scene, to a residential or apartment fire… I mean, just being able to do all those things allows you this ability, from a trainee or student perspective and within a 30-minute time frame, that you couldn’t do before”&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;/blockquote&gt;&lt;p data-dcnode-id=&quot;2588&quot;&gt;&lt;span data-dcnode-id=&quot;2589&quot; instrument_node=&quot;&quot;&gt;Such work had previously been “nearly impossible” due to costs, environmental and contextual issues, but teams could create 360 scenes with low-cost cameras once for indefinite reuse, Sofen explained.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2584&quot;&gt;&lt;span data-contrast=&quot;auto&quot; data-dcnode-id=&quot;2585&quot;&gt;&lt;span data-dcnode-id=&quot;2587&quot; instrument_node=&quot;&quot;&gt;“You don’t need to have Steven Spielberg or Hollywood-style content to learn from it,” he said.&lt;/span&gt;&lt;br data-dcnode-id=&quot;2586&quot;&gt;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2582&quot;&gt;&lt;span data-dcnode-id=&quot;2583&quot; instrument_node=&quot;&quot;&gt;Sofen also urged fire departments to create 360 video teams to quickly create firefighting scenarios, which he believed the market was revolutionising and adapting across North America.&lt;/span&gt;&lt;/p&gt;&lt;div class=&quot;wp-video&quot; data-dcnode-id=&quot;2529&quot; style=&quot;width: 1280px;&quot;&gt;&lt;span data-dcnode-id=&quot;2580&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span class=&quot;mejs-offscreen&quot; data-dcnode-id=&quot;2578&quot;&gt;&lt;span data-dcnode-id=&quot;2579&quot; instrument_node=&quot;&quot;&gt;Video Player&lt;/span&gt;&lt;/span&gt;&lt;div aria-label=&quot;Video Player&quot; class=&quot;mejs-container mejs-container-keyboard-inactive wp-video-shortcode mejs-video&quot; data-dcnode-id=&quot;2530&quot; id=&quot;mep_0&quot; role=&quot;application&quot; style=&quot;width: 609.984px; height: 343.116px; min-width: 217px;&quot; tabindex=&quot;0&quot;&gt;&lt;div class=&quot;mejs-inner&quot; data-dcnode-id=&quot;2531&quot;&gt;&lt;div class=&quot;mejs-mediaelement&quot; data-dcnode-id=&quot;2572&quot;&gt;&lt;mediaelementwrapper data-dcnode-id=&quot;2573&quot; id=&quot;video-37858-1&quot;&gt;&lt;video class=&quot;wp-video-shortcode&quot; data-dcnode-id=&quot;2574&quot; height=&quot;720&quot; id=&quot;video-37858-1_html5&quot; preload=&quot;metadata&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.xrtoday.com/wp-content/uploads/2021/08/signal-2021-08-11-121933.mp4%3F_%3D1&amp;amp;raw&quot; style=&quot;width: 609.984px; height: 343.116px;&quot; width=&quot;1280&quot;&gt;&lt;source data-dcnode-id=&quot;2577&quot; src=&quot;https://www.xrtoday.com/wp-content/uploads/2021/08/signal-2021-08-11-121933.mp4?_=1&quot; type=&quot;video/mp4&quot;&gt;&lt;a data-dcnode-id=&quot;2575&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.xrtoday.com/wp-content/uploads/2021/08/signal-2021-08-11-121933.mp4&quot;&gt;&lt;span data-dcnode-id=&quot;2576&quot; instrument_node=&quot;&quot;&gt;https://www.xrtoday.com/wp-content/uploads/2021/08/signal-2021-08-11-121933.mp4&lt;/span&gt;&lt;/a&gt;&lt;/video&gt;&lt;/mediaelementwrapper&gt;&lt;/div&gt;&lt;div class=&quot;mejs-layers&quot; data-dcnode-id=&quot;2563&quot;&gt;&lt;div class=&quot;mejs-poster mejs-layer&quot; data-dcnode-id=&quot;2571&quot; style=&quot;display: none; width: 100%; height: 100%;&quot;&gt;&lt;/div&gt;&lt;div class=&quot;mejs-overlay mejs-layer&quot; data-dcnode-id=&quot;2568&quot; style=&quot;width: 100%; height: 100%; display: none;&quot;&gt;&lt;div class=&quot;mejs-overlay-loading&quot; data-dcnode-id=&quot;2569&quot;&gt;&lt;span class=&quot;mejs-overlay-loading-bg-img&quot; data-dcnode-id=&quot;2570&quot;&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;mejs-overlay mejs-layer&quot; data-dcnode-id=&quot;2566&quot; style=&quot;display: none; width: 100%; height: 100%;&quot;&gt;&lt;div class=&quot;mejs-overlay-error&quot; data-dcnode-id=&quot;2567&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;mejs-overlay mejs-layer mejs-overlay-play&quot; data-dcnode-id=&quot;2564&quot; style=&quot;width: 100%; height: 100%;&quot;&gt;&lt;div aria-label=&quot;Play&quot; aria-pressed=&quot;false&quot; class=&quot;mejs-overlay-button&quot; data-dcnode-id=&quot;2565&quot; role=&quot;button&quot; tabindex=&quot;0&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;mejs-controls&quot; data-dcnode-id=&quot;2532&quot;&gt;&lt;div class=&quot;mejs-button mejs-playpause-button mejs-play&quot; data-dcnode-id=&quot;2561&quot;&gt;&lt;button aria-controls=&quot;mep_0&quot; aria-label=&quot;Play&quot; data-dcnode-id=&quot;2562&quot; tabindex=&quot;0&quot; title=&quot;Play&quot; type=&quot;button&quot;&gt;&lt;/button&gt;&lt;/div&gt;&lt;div aria-live=&quot;off&quot; class=&quot;mejs-time mejs-currenttime-container&quot; data-dcnode-id=&quot;2558&quot; role=&quot;timer&quot;&gt;&lt;span class=&quot;mejs-currenttime&quot; data-dcnode-id=&quot;2559&quot;&gt;&lt;span data-dcnode-id=&quot;2560&quot; instrument_node=&quot;&quot;&gt;00:00&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;mejs-time-rail&quot; data-dcnode-id=&quot;2546&quot;&gt;&lt;span aria-label=&quot;Time Slider&quot; aria-valuemax=&quot;0&quot; aria-valuemin=&quot;0&quot; aria-valuenow=&quot;0&quot; aria-valuetext=&quot;00:00&quot; class=&quot;mejs-time-total mejs-time-slider&quot; data-dcnode-id=&quot;2547&quot; role=&quot;slider&quot; tabindex=&quot;0&quot;&gt;&lt;span class=&quot;mejs-time-buffering&quot; data-dcnode-id=&quot;2557&quot; style=&quot;display: none;&quot;&gt;&lt;/span&gt;&lt;span class=&quot;mejs-time-loaded&quot; data-dcnode-id=&quot;2556&quot;&gt;&lt;/span&gt;&lt;span class=&quot;mejs-time-current&quot; data-dcnode-id=&quot;2555&quot; style=&quot;transform: scaleX(0);&quot;&gt;&lt;/span&gt;&lt;span class=&quot;mejs-time-hovered no-hover&quot; data-dcnode-id=&quot;2554&quot;&gt;&lt;/span&gt;&lt;span class=&quot;mejs-time-handle&quot; data-dcnode-id=&quot;2552&quot; style=&quot;transform: translateX(0px);&quot;&gt;&lt;span class=&quot;mejs-time-handle-content&quot; data-dcnode-id=&quot;2553&quot;&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;mejs-time-float&quot; data-dcnode-id=&quot;2548&quot;&gt;&lt;span class=&quot;mejs-time-float-current&quot; data-dcnode-id=&quot;2550&quot;&gt;&lt;span data-dcnode-id=&quot;2551&quot; instrument_node=&quot;&quot;&gt;00:00&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;mejs-time-float-corner&quot; data-dcnode-id=&quot;2549&quot;&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;mejs-time mejs-duration-container&quot; data-dcnode-id=&quot;2543&quot;&gt;&lt;span class=&quot;mejs-duration&quot; data-dcnode-id=&quot;2544&quot;&gt;&lt;span data-dcnode-id=&quot;2545&quot; instrument_node=&quot;&quot;&gt;00:06&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;mejs-button mejs-volume-button mejs-mute&quot; data-dcnode-id=&quot;2535&quot;&gt;&lt;button aria-controls=&quot;mep_0&quot; aria-label=&quot;Mute&quot; data-dcnode-id=&quot;2542&quot; tabindex=&quot;0&quot; title=&quot;Mute&quot; type=&quot;button&quot;&gt;&lt;/button&gt;&lt;a aria-label=&quot;Volume Slider&quot; aria-orientation=&quot;vertical&quot; aria-valuemax=&quot;100&quot; aria-valuemin=&quot;0&quot; aria-valuenow=&quot;80&quot; aria-valuetext=&quot;80%&quot; class=&quot;mejs-volume-slider&quot; data-dcnode-id=&quot;2536&quot; href=&quot;javascript:void(0);&quot; role=&quot;slider&quot;&gt;&lt;span class=&quot;mejs-offscreen&quot; data-dcnode-id=&quot;2540&quot;&gt;&lt;span data-dcnode-id=&quot;2541&quot; instrument_node=&quot;&quot;&gt;Use Up/Down Arrow keys to increase or decrease volume.&lt;/span&gt;&lt;/span&gt;&lt;div class=&quot;mejs-volume-total&quot; data-dcnode-id=&quot;2537&quot;&gt;&lt;div class=&quot;mejs-volume-current&quot; data-dcnode-id=&quot;2539&quot; style=&quot;bottom: 0px; height: 80%;&quot;&gt;&lt;/div&gt;&lt;div class=&quot;mejs-volume-handle&quot; data-dcnode-id=&quot;2538&quot; style=&quot;bottom: 80%; margin-bottom: -3px;&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;/a&gt;&lt;/div&gt;&lt;div class=&quot;mejs-button mejs-fullscreen-button&quot; data-dcnode-id=&quot;2533&quot;&gt;&lt;button aria-controls=&quot;mep_0&quot; aria-label=&quot;Fullscreen&quot; data-dcnode-id=&quot;2534&quot; tabindex=&quot;0&quot; title=&quot;Fullscreen&quot; type=&quot;button&quot;&gt;&lt;/button&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;p data-dcnode-id=&quot;2524&quot;&gt;&lt;span data-contrast=&quot;auto&quot; data-dcnode-id=&quot;2527&quot;&gt;&lt;span data-dcnode-id=&quot;2528&quot; instrument_node=&quot;&quot;&gt;McKinzie added it was important to minimise cancer exposures and consider environmental, costs, and staff hours needed for traditional training compared to VR, which could be deployed anywhere for public and first responder use.&lt;/span&gt;&lt;/span&gt;&lt;span data-ccp-props=&quot;{&amp;quot;201341983&amp;quot;:0,&amp;quot;335559739&amp;quot;:160,&amp;quot;335559740&amp;quot;:259}&quot; data-dcnode-id=&quot;2525&quot;&gt;&lt;br data-dcnode-id=&quot;2526&quot;&gt;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2516&quot;&gt;&lt;span data-dcnode-id=&quot;2523&quot; instrument_node=&quot;&quot;&gt;Citing NIST Fire Lab’s &lt;/span&gt;&lt;a data-dcnode-id=&quot;2521&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nist.gov/feature-stories/eye-fire&quot; onclick=&quot;captureOutboundLink('https://www.nist.gov/feature-stories/eye-fire')&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2522&quot; instrument_node=&quot;&quot;&gt;Eye of the Fire project&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2520&quot; instrument_node=&quot;&quot;&gt; and the New Zealand government’s &lt;/span&gt;&lt;a data-dcnode-id=&quot;2518&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//vr.escapemyhouse.co.nz/&quot; onclick=&quot;captureOutboundLink('https://vr.escapemyhouse.co.nz/')&quot;&gt;&lt;span data-dcnode-id=&quot;2519&quot; instrument_node=&quot;&quot;&gt;Fire Escape 360&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2517&quot; instrument_node=&quot;&quot;&gt; experience, which encouraged the public to develop fire escape plans, McKinzie explained:&lt;/span&gt;&lt;/p&gt;&lt;blockquote data-dcnode-id=&quot;2510&quot;&gt;&lt;p data-dcnode-id=&quot;2511&quot;&gt;&lt;span data-contrast=&quot;auto&quot; data-dcnode-id=&quot;2514&quot;&gt;&lt;span data-dcnode-id=&quot;2515&quot; instrument_node=&quot;&quot;&gt;“Kids need to know two ways out. You need to have a Plan A to action, because you don’t have 15, 12, 9, or 7 [minutes]… you might have less than three minutes.”&lt;/span&gt;&lt;/span&gt;&lt;span data-ccp-props=&quot;{&amp;quot;201341983&amp;quot;:0,&amp;quot;335559739&amp;quot;:160,&amp;quot;335559740&amp;quot;:259}&quot; data-dcnode-id=&quot;2512&quot;&gt;&lt;span data-dcnode-id=&quot;2513&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;/blockquote&gt;&lt;span data-dcnode-id=&quot;2508&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;2505&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;middle_ad&quot; data-dcnode-id=&quot;2502&quot; id=&quot;placement_458772_0&quot;&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;2501&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2499&quot;&gt;&lt;span data-dcnode-id=&quot;2500&quot; instrument_node=&quot;&quot;&gt;Fires could reach 1800 F “at the floor in less than two minutes”, with combustible furniture and materials expediting house fires and quickly reducing escape times, he added.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2497&quot;&gt;&lt;span data-dcnode-id=&quot;2498&quot; instrument_node=&quot;&quot;&gt;To combat this, McKinzie urged every agency to develop a 360 kit with live streaming capabilities in headsets for chief officers to review.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2495&quot;&gt;&lt;span data-dcnode-id=&quot;2496&quot; instrument_node=&quot;&quot;&gt;According to McKinzie’s vision for future fire departments, firefighters would deploy computer vision AI “run in the cloud” along with edge computing, digital field assistants, and others. 360 cameras would also help teams evaluate fire progress and conduct post-incident analyses.&lt;/span&gt;&lt;/p&gt;&lt;h2 data-dcnode-id=&quot;2493&quot;&gt;&lt;span data-dcnode-id=&quot;2494&quot; instrument_node=&quot;&quot;&gt;Pico Interactive Headsets: The Preferred Choice&lt;/span&gt;&lt;/h2&gt;&lt;p data-dcnode-id=&quot;2491&quot;&gt;&lt;span data-dcnode-id=&quot;2492&quot; instrument_node=&quot;&quot;&gt;When asked why companies such as Darley chose Pico Interactive Headsets for their VR immersive training courses, Logan Parr explained his company’s strict purchasing process.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2489&quot;&gt;&lt;span data-dcnode-id=&quot;2490&quot; instrument_node=&quot;&quot;&gt;He explained:&lt;/span&gt;&lt;/p&gt;&lt;blockquote data-dcnode-id=&quot;2485&quot;&gt;&lt;p data-dcnode-id=&quot;2486&quot;&gt;&lt;span data-contrast=&quot;auto&quot; data-dcnode-id=&quot;2487&quot;&gt;&lt;span data-dcnode-id=&quot;2488&quot; instrument_node=&quot;&quot;&gt;“I think the first thing is that you don’t just walk up to a store and buy a Pico headset. We have a global sales team, and our first goal is to understand what the partner’s needs are” &lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;/blockquote&gt;&lt;p data-dcnode-id=&quot;2482&quot;&gt;&lt;span data-contrast=&quot;auto&quot; data-dcnode-id=&quot;2483&quot;&gt;&lt;span data-dcnode-id=&quot;2484&quot; instrument_node=&quot;&quot;&gt;Pico worked with clients to understand specific goals and objectives for their business models based on each customer’s sector to help them choose “which headset would be perfect for them” and why. &lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2477&quot;&gt;&lt;span data-dcnode-id=&quot;2481&quot; instrument_node=&quot;&quot;&gt;The San Francisco-based VR headset firm provided &lt;/span&gt;&lt;a data-dcnode-id=&quot;2479&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.xrtoday.com/virtual-reality/pico-g2-4k-headset-review-a-premium-vr-experience/&quot; rel=&quot;noopener&quot;&gt;&lt;span data-dcnode-id=&quot;2480&quot; instrument_node=&quot;&quot;&gt;G2 headsets with 4K resolution&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2478&quot; instrument_node=&quot;&quot;&gt;, which were optimal for producing clear, hi-res video. Pico Interactive’s Kiosk Mode provided a simple interface for content, and the company offered additional SDK and development support for clients.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2475&quot;&gt;&lt;span data-dcnode-id=&quot;2476&quot; instrument_node=&quot;&quot;&gt;Pico also worked with technology partners that help clients port and create content, as well as develop apps and facilitate remote device management to upgrade and synchronise devices. Additional feedback from clients allowed Pico to improve research and development (R&amp;amp;D) efforts and build future VR initiatives.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2470&quot;&gt;&lt;span data-dcnode-id=&quot;2474&quot; instrument_node=&quot;&quot;&gt;Speaking further, McKinzie recalled a conversation with FLAIM’s Dr Mullins’ experience with Pico headsets, who “sold hundreds” for use with &lt;/span&gt;&lt;a data-dcnode-id=&quot;2472&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//flaimsystems.com/products/extinguisher&quot; onclick=&quot;captureOutboundLink('https://flaimsystems.com/products/extinguisher')&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2473&quot; instrument_node=&quot;&quot;&gt;FLAIM extinguisher kits&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2471&quot; instrument_node=&quot;&quot;&gt; to train civilians and office staff.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2465&quot;&gt;&lt;span data-contrast=&quot;auto&quot; data-dcnode-id=&quot;2468&quot;&gt;&lt;span data-dcnode-id=&quot;2469&quot; instrument_node=&quot;&quot;&gt;Both operators and professionals assisting first responders needed fire extinguisher training, which many places required annually, including for insurance purposes, he explained.&lt;/span&gt;&lt;/span&gt;&lt;span data-ccp-props=&quot;{&amp;quot;201341983&amp;quot;:0,&amp;quot;335559739&amp;quot;:160,&amp;quot;335559740&amp;quot;:259}&quot; data-dcnode-id=&quot;2466&quot;&gt;&lt;br data-dcnode-id=&quot;2467&quot;&gt;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2463&quot;&gt;&lt;span data-dcnode-id=&quot;2464&quot; instrument_node=&quot;&quot;&gt;Such training also allowed fire departments to stop using petroleum, and VR trainers had successfully instructed civilians on choosing correct extinguishers for wood, trash can, kitchen, and other fires.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2461&quot;&gt;&lt;span data-dcnode-id=&quot;2462&quot; instrument_node=&quot;&quot;&gt;He explained:&lt;/span&gt;&lt;/p&gt;&lt;blockquote data-dcnode-id=&quot;2457&quot;&gt;&lt;p data-dcnode-id=&quot;2458&quot;&gt;&lt;span data-contrast=&quot;auto&quot; data-dcnode-id=&quot;2459&quot;&gt;&lt;span data-dcnode-id=&quot;2460&quot; instrument_node=&quot;&quot;&gt;“People feel a sense of urgency and get to try the dry chemical or CO2 extinguisher, and if it’s a stovetop fire and they try the water extinguisher, they get the reaction that will help them learn, [which is] that water on a grease fire causes a significant issue”&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;/blockquote&gt;&lt;p data-dcnode-id=&quot;2455&quot;&gt;&lt;span data-dcnode-id=&quot;2456&quot; instrument_node=&quot;&quot;&gt;Kevin Sofen also explained how Darley had “very specific customer needs” due to collaboration with the US Department of Defense (US DoD) and Department for Homeland Security (DHS), among others.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2453&quot;&gt;&lt;span data-dcnode-id=&quot;2454&quot; instrument_node=&quot;&quot;&gt;Speaking on security needs, Sofen explained:&lt;/span&gt;&lt;/p&gt;&lt;blockquote data-dcnode-id=&quot;2448&quot;&gt;&lt;p data-dcnode-id=&quot;2449&quot;&gt;&lt;span data-dcnode-id=&quot;2452&quot; instrument_node=&quot;&quot;&gt;“W&lt;/span&gt;&lt;span data-contrast=&quot;auto&quot; data-dcnode-id=&quot;2450&quot;&gt;&lt;span data-dcnode-id=&quot;2451&quot; instrument_node=&quot;&quot;&gt;e think, if a headset were to get stolen, how can we ensure that its wiped and they’re password protected? It’s those little features and nuances that have existed, where we would ask Pico and they’d change them all the way, and our customers were happy”&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;/blockquote&gt;&lt;p data-dcnode-id=&quot;2446&quot;&gt;&lt;span data-dcnode-id=&quot;2447&quot; instrument_node=&quot;&quot;&gt;Pico’s open-source platform also facilitated bespoke demands for clients, and Darley’s extinguisher kit simplified end-user processes with over-the-air (OTA) updates via Wi-Fi, replacing USB upgrades.&lt;/span&gt;&lt;/p&gt;&lt;h2 data-dcnode-id=&quot;2442&quot;&gt;&lt;span data-ccp-props=&quot;{&amp;quot;201341983&amp;quot;:0,&amp;quot;335559739&amp;quot;:160,&amp;quot;335559740&amp;quot;:259}&quot; data-dcnode-id=&quot;2443&quot;&gt;&lt;span data-dcnode-id=&quot;2445&quot; instrument_node=&quot;&quot;&gt;Rapid Deployment, Rapid Results&lt;/span&gt;&lt;br data-dcnode-id=&quot;2444&quot;&gt;&lt;/span&gt;&lt;/h2&gt;&lt;p data-dcnode-id=&quot;2437&quot;&gt;&lt;span data-contrast=&quot;auto&quot; data-dcnode-id=&quot;2440&quot;&gt;&lt;span data-dcnode-id=&quot;2441&quot; instrument_node=&quot;&quot;&gt;According to Cpt McKinzie, California had seen several challenging years of fire outbreaks, with fires growing “in size and complexity,” prompting roughly 7,000 firefighters responding to a recent check.&lt;/span&gt;&lt;/span&gt;&lt;span data-ccp-props=&quot;{&amp;quot;201341983&amp;quot;:0,&amp;quot;335559739&amp;quot;:160,&amp;quot;335559740&amp;quot;:259}&quot; data-dcnode-id=&quot;2438&quot;&gt;&lt;br data-dcnode-id=&quot;2439&quot;&gt;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2435&quot;&gt;&lt;span data-dcnode-id=&quot;2436&quot; instrument_node=&quot;&quot;&gt;He explained,&lt;/span&gt;&lt;/p&gt;&lt;blockquote data-dcnode-id=&quot;2429&quot;&gt;&lt;p data-dcnode-id=&quot;2430&quot;&gt;&lt;span data-contrast=&quot;auto&quot; data-dcnode-id=&quot;2433&quot;&gt;&lt;span data-dcnode-id=&quot;2434&quot; instrument_node=&quot;&quot;&gt;“Three homes that I’ve helped build were lost in the Oakland Hills fire years ago and, worst of all, 25 deaths, but we’ve surpassed that very recently, two years running”&lt;/span&gt;&lt;/span&gt;&lt;span data-ccp-props=&quot;{&amp;quot;201341983&amp;quot;:0,&amp;quot;335559739&amp;quot;:160,&amp;quot;335559740&amp;quot;:259}&quot; data-dcnode-id=&quot;2431&quot;&gt;&lt;br data-dcnode-id=&quot;2432&quot;&gt;&lt;/span&gt;&lt;/p&gt;&lt;/blockquote&gt;&lt;p data-dcnode-id=&quot;2424&quot;&gt;&lt;span data-dcnode-id=&quot;2428&quot; instrument_node=&quot;&quot;&gt;Fire risks were not expected to decrease across California and other parts of the world, he said, &lt;/span&gt;&lt;a data-dcnode-id=&quot;2426&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.usfa.fema.gov/data/statistics/%23tab-2&quot; onclick=&quot;captureOutboundLink('https://www.usfa.fema.gov/data/statistics/#tab-2')&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2427&quot; instrument_node=&quot;&quot;&gt;citing&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2425&quot; instrument_node=&quot;&quot;&gt; the US Fire Administration, who found fire-related deaths had increased 24 percent over the last decade.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2422&quot;&gt;&lt;span data-dcnode-id=&quot;2423&quot; instrument_node=&quot;&quot;&gt;The ongoing COVID-19 pandemic had worsened training responses due to social distancing and health risks, but VR training allowed learners to train while in quarantine or receiving medicine.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2419&quot;&gt;&lt;span data-contrast=&quot;auto&quot; data-dcnode-id=&quot;2420&quot;&gt;&lt;span data-dcnode-id=&quot;2421&quot; instrument_node=&quot;&quot;&gt;Sofen added first responders would still have to tackle fires “rain or shine, pandemic or not”, despite COVID-19 restrictions, but VR technologies facilitated remote training, stating:&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;blockquote data-dcnode-id=&quot;2413&quot;&gt;&lt;p data-dcnode-id=&quot;2414&quot;&gt;&lt;span data-contrast=&quot;auto&quot; data-dcnode-id=&quot;2417&quot;&gt;&lt;span data-dcnode-id=&quot;2418&quot; instrument_node=&quot;&quot;&gt;“For example, you could have a trainer in Charlotte, North Carolina, and I could have students in Denver and the Cosumnes Fire Department, all on the same Wi-Fi channel and virtual classroom, with the same instructor teaching the same content. &lt;/span&gt;&lt;/span&gt;&lt;span data-contrast=&quot;auto&quot; data-dcnode-id=&quot;2415&quot;&gt;&lt;span data-dcnode-id=&quot;2416&quot; instrument_node=&quot;&quot;&gt;This is now possible today, which gives tools to the 21st century firefighter that we need”&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;/blockquote&gt;&lt;p data-dcnode-id=&quot;2411&quot;&gt;&lt;span data-dcnode-id=&quot;2412&quot; instrument_node=&quot;&quot;&gt;He noted hurricane season also concerned first responders and fire departments faced recruitment shortages, but VR training allowed to streamline recruitment processes and reduce training costs.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2409&quot;&gt;&lt;span data-dcnode-id=&quot;2410&quot; instrument_node=&quot;&quot;&gt;Citing work from Dr Skip Rizzo, Research Director at the University of Southern California Institute for Creative Technologies for Medical Virtual Reality, McKinzie discussed how VR could help pre-expose trainees to post-traumatic stress using immersive environments.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2401&quot;&gt;&lt;span data-contrast=&quot;auto&quot; data-dcnode-id=&quot;2404&quot;&gt;&lt;span data-dcnode-id=&quot;2408&quot; instrument_node=&quot;&quot;&gt;Cpt McKinzie also recalled 10,000 calls for service over his career and discussed Cmdr Paul Speight from the UK, who heavily &lt;/span&gt;&lt;a data-dcnode-id=&quot;2406&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//leics-fire.gov.uk/your-safety/road-safety/vf4-360/&quot; onclick=&quot;captureOutboundLink('https://leics-fire.gov.uk/your-safety/road-safety/vf4-360/')&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2407&quot; instrument_node=&quot;&quot;&gt;promoted&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2405&quot; instrument_node=&quot;&quot;&gt; Britain’s “Don’t Text and Drive” campaign using immersive learning.&lt;/span&gt;&lt;/span&gt;&lt;span data-ccp-props=&quot;{&amp;quot;201341983&amp;quot;:0,&amp;quot;335559739&amp;quot;:160,&amp;quot;335559740&amp;quot;:259}&quot; data-dcnode-id=&quot;2402&quot;&gt;&lt;br data-dcnode-id=&quot;2403&quot;&gt;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2399&quot;&gt;&lt;span data-dcnode-id=&quot;2400&quot; instrument_node=&quot;&quot;&gt;McKinzie said:&lt;/span&gt;&lt;/p&gt;&lt;blockquote data-dcnode-id=&quot;2393&quot;&gt;&lt;p data-dcnode-id=&quot;2394&quot;&gt;&lt;span data-contrast=&quot;auto&quot; data-dcnode-id=&quot;2397&quot;&gt;&lt;span data-dcnode-id=&quot;2398&quot; instrument_node=&quot;&quot;&gt;“He did a great immersive learning application […] to see what it’s like to be a patient in the back of a car where the roof is cut off and the patient is put into a helicopter and flown off scene. It’s a very powerful learning message”&lt;/span&gt;&lt;/span&gt;&lt;span data-ccp-props=&quot;{&amp;quot;201341983&amp;quot;:0,&amp;quot;335559739&amp;quot;:160,&amp;quot;335559740&amp;quot;:259}&quot; data-dcnode-id=&quot;2395&quot;&gt;&lt;br data-dcnode-id=&quot;2396&quot;&gt;&lt;/span&gt;&lt;/p&gt;&lt;/blockquote&gt;&lt;div class=&quot;video-container&quot; data-dcnode-id=&quot;2391&quot;&gt;&lt;iframe allow=&quot;accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture&quot; allowfullscreen=&quot;&quot; data-dcnode-id=&quot;2392&quot; frameborder=&quot;0&quot; height=&quot;281&quot; loading=&quot;lazy&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.youtube.com/embed/FyopAyD9MGc%3Ffeature%3Doembed&amp;amp;raw&quot; title=&quot;VR Launch&quot; width=&quot;500&quot;&gt;&lt;/iframe&gt;&lt;/div&gt;&lt;p data-dcnode-id=&quot;2388&quot;&gt;&lt;span data-contrast=&quot;auto&quot; data-dcnode-id=&quot;2389&quot;&gt;&lt;span data-dcnode-id=&quot;2390&quot; instrument_node=&quot;&quot;&gt;According to Logan Parr, initiatives from partners working with Pico showcased “what’s possible in VR” and helped push boundaries for other firms to explore the potential in immersive training.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2369&quot;&gt;&lt;span data-contrast=&quot;auto&quot; data-dcnode-id=&quot;2386&quot;&gt;&lt;span data-dcnode-id=&quot;2387&quot; instrument_node=&quot;&quot;&gt;Commander Speight partnered with &lt;/span&gt;&lt;/span&gt;&lt;span data-contrast=&quot;auto&quot; data-dcnode-id=&quot;2384&quot;&gt;&lt;span data-dcnode-id=&quot;2385&quot; instrument_node=&quot;&quot;&gt;colleagues&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;2383&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;span data-contrast=&quot;auto&quot; data-dcnode-id=&quot;2381&quot;&gt;&lt;span data-dcnode-id=&quot;2382&quot; instrument_node=&quot;&quot;&gt;who utilize 3D laser scanning, photogrammetry and 360 video to produce a wide range of &lt;/span&gt;&lt;/span&gt;&lt;a data-dcnode-id=&quot;2374&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//rivr.uk/&quot; onclick=&quot;captureOutboundLink('https://rivr.uk/')&quot;&gt;&lt;span data-contrast=&quot;auto&quot; data-dcnode-id=&quot;2379&quot;&gt;&lt;span data-dcnode-id=&quot;2380&quot; instrument_node=&quot;&quot;&gt;Reality in Virtual Reality (&lt;/span&gt;&lt;/span&gt;&lt;span data-contrast=&quot;auto&quot; data-dcnode-id=&quot;2377&quot;&gt;&lt;span data-dcnode-id=&quot;2378&quot; instrument_node=&quot;&quot;&gt;RiVR&lt;/span&gt;&lt;/span&gt;&lt;span data-contrast=&quot;none&quot; data-dcnode-id=&quot;2375&quot;&gt;&lt;span data-dcnode-id=&quot;2376&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;span data-contrast=&quot;auto&quot; data-dcnode-id=&quot;2372&quot;&gt;&lt;span data-dcnode-id=&quot;2373&quot; instrument_node=&quot;&quot;&gt; content for use in Pico HUDs.&lt;/span&gt;&lt;/span&gt;&lt;span data-ccp-props=&quot;{&amp;quot;201341983&amp;quot;:0,&amp;quot;335559739&amp;quot;:160,&amp;quot;335559740&amp;quot;:259}&quot; data-dcnode-id=&quot;2370&quot;&gt;&lt;span data-dcnode-id=&quot;2371&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2364&quot;&gt;&lt;span data-dcnode-id=&quot;2368&quot; instrument_node=&quot;&quot;&gt;Many companies also saved costs as they were not required to build huge labs for fire scenario training and additionally, could work remotely across the world via their &lt;/span&gt;&lt;a data-dcnode-id=&quot;2366&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.xrtoday.com/virtual-reality/most-popular-vr-headset-reviews-2022/&quot;&gt;&lt;span data-dcnode-id=&quot;2367&quot; instrument_node=&quot;&quot;&gt;VR headsets&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2365&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2360&quot;&gt;&lt;span data-dcnode-id=&quot;2363&quot; instrument_node=&quot;&quot;&gt;Logan Parr concluded many clients were at the early stages of exploring VR capabilities, and Pico Interactive aimed to help them &lt;/span&gt;&lt;span data-contrast=&quot;auto&quot; data-dcnode-id=&quot;2361&quot;&gt;&lt;span data-dcnode-id=&quot;2362&quot; instrument_node=&quot;&quot;&gt;“take VR to that next level and help improve their own business model.”&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2355&quot;&gt;&lt;span data-contrast=&quot;auto&quot; data-dcnode-id=&quot;2358&quot;&gt;&lt;span data-dcnode-id=&quot;2359&quot; instrument_node=&quot;&quot;&gt;Kevin Sofen added VR was not “just a game,” but gave the industry practical training applications to first responders, adding: “There’s no industry that isn’t immune from the opportunities VR can assist.”&lt;/span&gt;&lt;/span&gt;&lt;span data-ccp-props=&quot;{&amp;quot;201341983&amp;quot;:0,&amp;quot;335559739&amp;quot;:160,&amp;quot;335559740&amp;quot;:259}&quot; data-dcnode-id=&quot;2356&quot;&gt;&lt;br data-dcnode-id=&quot;2357&quot;&gt;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2351&quot;&gt;&lt;span data-dcnode-id=&quot;2354&quot; instrument_node=&quot;&quot;&gt;Cpt McKinzie concluded “we live in a 3D world” and immersive learning was “here to stay” with an agnostic, ubiquitous presence across professions, stating: &lt;/span&gt;&lt;span data-contrast=&quot;auto&quot; data-dcnode-id=&quot;2352&quot;&gt;&lt;span data-dcnode-id=&quot;2353&quot; instrument_node=&quot;&quot;&gt;“I’d look for other people that want to come blaze the trail, because I believe it’s here to stay, and I look forward to seeing what comes next.”&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2339&quot;&gt;&lt;em data-dcnode-id=&quot;2340&quot;&gt;&lt;span data-dcnode-id=&quot;2350&quot; instrument_node=&quot;&quot;&gt;For more information, kindly visit &lt;/span&gt;&lt;a data-dcnode-id=&quot;2348&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.futura.town/&quot; onclick=&quot;captureOutboundLink('https://www.futura.town/')&quot;&gt;&lt;span data-dcnode-id=&quot;2349&quot; instrument_node=&quot;&quot;&gt;Futura&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2347&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a data-dcnode-id=&quot;2345&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.hhpberlin.org/matchbox&quot; onclick=&quot;captureOutboundLink('https://en.hhpberlin.org/matchbox')&quot;&gt;&lt;span data-dcnode-id=&quot;2346&quot; instrument_node=&quot;&quot;&gt;Matchbox&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2344&quot; instrument_node=&quot;&quot;&gt;, and &lt;/span&gt;&lt;a data-dcnode-id=&quot;2342&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//globalconvergenttech.com/%2523techx2021&quot; onclick=&quot;captureOutboundLink('https://globalconvergenttech.com/%23techx2021')&quot;&gt;&lt;span data-dcnode-id=&quot;2343&quot; instrument_node=&quot;&quot;&gt;TechX&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2341&quot; instrument_node=&quot;&quot;&gt; for further MR experiences and real-world LIVE scenarios
