&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;4452&quot;&gt;&lt;span data-dcnode-id=&quot;4453&quot; instrument_node=&quot;&quot;&gt;INDICATIONS&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;4451&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 data-dcnode-id=&quot;4449&quot;&gt;&lt;span data-dcnode-id=&quot;4450&quot; instrument_node=&quot;&quot;&gt;Attention Deficit Hyperactivity Disorder&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;4448&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4443&quot;&gt;&lt;span data-dcnode-id=&quot;4447&quot; instrument_node=&quot;&quot;&gt;ADDERALL XR® is indicated for the treatment of attention deficit &lt;/span&gt;&lt;a data-dcnode-id=&quot;4445&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/hyperactivity/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;4446&quot; instrument_node=&quot;&quot;&gt;hyperactivity&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4444&quot; instrument_node=&quot;&quot;&gt; disorder (ADHD).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4442&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4434&quot;&gt;&lt;span data-dcnode-id=&quot;4441&quot; instrument_node=&quot;&quot;&gt;The efficacy of ADDERALL XR in the treatment of ADHD was established on the basis of two controlled trials in children aged 6 to 12, one controlled trial in adolescents aged 13 to 17, and one controlled trial in adults who met &lt;/span&gt;&lt;a data-dcnode-id=&quot;4439&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/dsm-iv/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;4440&quot; instrument_node=&quot;&quot;&gt;DSM-IV&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4438&quot; instrument_node=&quot;&quot;&gt;® criteria for ADHD [see &lt;/span&gt;&lt;b data-dcnode-id=&quot;4436&quot;&gt;&lt;span data-dcnode-id=&quot;4437&quot; instrument_node=&quot;&quot;&gt;Clinical Studies&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;4435&quot; instrument_node=&quot;&quot;&gt;].&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4433&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4425&quot;&gt;&lt;span data-dcnode-id=&quot;4432&quot; instrument_node=&quot;&quot;&gt;A diagnosis of ADHD (&lt;/span&gt;&lt;a data-dcnode-id=&quot;4430&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/dsm/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;4431&quot; instrument_node=&quot;&quot;&gt;DSM&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4429&quot; instrument_node=&quot;&quot;&gt;-IV®) implies the presence of hyperactive-impulsive or inattentive symptoms that caused impairment and were present before age 7 years. The symptoms must cause clinically significant impairment, e.g., in social, academic, or occupational functioning, and be present in two or more settings, e.g., school (or work) and at home. The symptoms must not be better accounted for by another mental disorder. For the Inattentive Type, at least six of the following symptoms must have persisted for at least 6 months: lack of attention to details/careless mistakes; lack of sustained attention; poor listener; failure to follow through on tasks; poor organization; avoids tasks requiring sustained mental effort; loses things; easily distracted; forgetful. For the Hyperactive-Impulsive Type, at least six of the following symptoms must have persisted for at least 6 months: fidgeting/squirming; leaving seat; inappropriate &lt;/span&gt;&lt;a data-dcnode-id=&quot;4427&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/running/article.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;sub&quot;&gt;&lt;span data-dcnode-id=&quot;4428&quot; instrument_node=&quot;&quot;&gt;running&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4426&quot; instrument_node=&quot;&quot;&gt;/climbing; difficulty with quiet activities; “on the go;” excessive talking; blurting answers; can't wait turn; intrusive. The Combined Type requires both inattentive and hyperactive-impulsive criteria to be met.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4424&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h5 data-dcnode-id=&quot;4422&quot;&gt;&lt;span data-dcnode-id=&quot;4423&quot; instrument_node=&quot;&quot;&gt;Special Diagnostic Considerations&lt;/span&gt;&lt;/h5&gt;&lt;span data-dcnode-id=&quot;4421&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4416&quot;&gt;&lt;span data-dcnode-id=&quot;4420&quot; instrument_node=&quot;&quot;&gt;Specific &lt;/span&gt;&lt;a data-dcnode-id=&quot;4418&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/etiology/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;4419&quot; instrument_node=&quot;&quot;&gt;etiology&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4417&quot; instrument_node=&quot;&quot;&gt; of this syndrome is unknown, and there is no single diagnostic test. Adequate diagnosis requires the use not only of medical but of special psychological, educational, and social resources. Learning may or may not be impaired. The diagnosis must be based upon a complete history and evaluation of the patient and not solely on the presence of the required number of DSM-IV® characteristics.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4415&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h5 data-dcnode-id=&quot;4413&quot;&gt;&lt;span data-dcnode-id=&quot;4414&quot; instrument_node=&quot;&quot;&gt;Need For Comprehensive Treatment Program&lt;/span&gt;&lt;/h5&gt;&lt;span data-dcnode-id=&quot;4412&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4401&quot;&gt;&lt;span data-dcnode-id=&quot;4411&quot; instrument_node=&quot;&quot;&gt;ADDERALL XR is indicated as an integral part of a total treatment program for ADHD that may include other measures (psychological, educational, social) for patients with this syndrome. Drug treatment may not be indicated for all patients with this syndrome. Stimulants are not intended for use in the patient who exhibits symptoms secondary to environmental factors and/or other primary psychiatric disorders, including &lt;/span&gt;&lt;a data-dcnode-id=&quot;4409&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/psychosis/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;4410&quot; instrument_node=&quot;&quot;&gt;psychosis&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4408&quot; instrument_node=&quot;&quot;&gt;. Appropriate educational placement is &lt;/span&gt;&lt;a data-dcnode-id=&quot;4406&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/essential/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;4407&quot; instrument_node=&quot;&quot;&gt;essential&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4405&quot; instrument_node=&quot;&quot;&gt; and psychosocial intervention is often helpful. When remedial measures alone are insufficient, the decision to prescribe stimulant medication will depend upon the physician's assessment of the &lt;/span&gt;&lt;a data-dcnode-id=&quot;4403&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/chronicity/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;4404&quot; instrument_node=&quot;&quot;&gt;chronicity&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4402&quot; instrument_node=&quot;&quot;&gt; and severity of the child's symptoms.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4400&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h5 data-dcnode-id=&quot;4398&quot;&gt;&lt;span data-dcnode-id=&quot;4399&quot; instrument_node=&quot;&quot;&gt;Long-Term Use&lt;/span&gt;&lt;/h5&gt;&lt;span data-dcnode-id=&quot;4397&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4395&quot;&gt;&lt;span data-dcnode-id=&quot;4396&quot; instrument_node=&quot;&quot;&gt;The effectiveness of ADDERALL XR for long-term use, i.e., for more than 3 weeks in children and 4 weeks in adolescents and adults, has not been systematically evaluated in controlled trials. Therefore, the physician who elects to use ADDERALL XR for extended periods should periodically re-evaluate the long-term usefulness of the drug for the individual patient.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4394&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;4351&quot;&gt;&lt;span data-dcnode-id=&quot;4352&quot; instrument_node=&quot;&quot;&gt;DOSAGE AND ADMINISTRATION&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;4350&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 data-dcnode-id=&quot;4348&quot;&gt;&lt;span data-dcnode-id=&quot;4349&quot; instrument_node=&quot;&quot;&gt;Important Information Prior To Initiating Treatment&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;4347&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4336&quot;&gt;&lt;span data-dcnode-id=&quot;4346&quot; instrument_node=&quot;&quot;&gt;Prior to initiating treatment with ADDERALL XR, assess for the presence of cardiac disease (e.g., perform a careful history, family history of sudden death or &lt;/span&gt;&lt;a data-dcnode-id=&quot;4344&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/ventricular/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;4345&quot; instrument_node=&quot;&quot;&gt;ventricular&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4343&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a data-dcnode-id=&quot;4341&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/arrhythmia_symptoms_and_signs/symptoms.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;sym&quot;&gt;&lt;span data-dcnode-id=&quot;4342&quot; instrument_node=&quot;&quot;&gt;arrhythmia&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4340&quot; instrument_node=&quot;&quot;&gt;, and physical exam) [see&lt;/span&gt;&lt;b data-dcnode-id=&quot;4338&quot;&gt;&lt;span data-dcnode-id=&quot;4339&quot; instrument_node=&quot;&quot;&gt; WARNINGS AND PRECAUTIONS&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;4337&quot; instrument_node=&quot;&quot;&gt;].&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4335&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4327&quot;&gt;&lt;span data-dcnode-id=&quot;4334&quot; instrument_node=&quot;&quot;&gt;Assess the risk of abuse prior to prescribing and monitor for signs of abuse and dependence while on therapy. Maintain careful prescription records, educate patients about abuse, monitor for signs for abuse and overdose, and periodically re-evaluate the need for ADDERALL XR use [see&lt;/span&gt;&lt;b data-dcnode-id=&quot;4332&quot;&gt;&lt;span data-dcnode-id=&quot;4333&quot; instrument_node=&quot;&quot;&gt; WARNINGS AND PRECAUTIONS&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;4331&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;b data-dcnode-id=&quot;4329&quot;&gt;&lt;span data-dcnode-id=&quot;4330&quot; instrument_node=&quot;&quot;&gt;Drug Abuse And Dependence&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;4328&quot; instrument_node=&quot;&quot;&gt;].&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4326&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 data-dcnode-id=&quot;4324&quot;&gt;&lt;span data-dcnode-id=&quot;4325&quot; instrument_node=&quot;&quot;&gt;Dosing Considerations For All Patients&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;4323&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4321&quot;&gt;&lt;span data-dcnode-id=&quot;4322&quot; instrument_node=&quot;&quot;&gt;Individualize the dosage according to the therapeutic needs and response of the patient. Administer ADDERALL XR at the lowest effective dosage.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4320&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4318&quot;&gt;&lt;span data-dcnode-id=&quot;4319&quot; instrument_node=&quot;&quot;&gt;Based on bioequivalence data, patients taking divided doses of immediate-release ADDERALL, (for example, twice daily), may be switched to ADDERALL XR at the same total daily dose taken once daily. Titrate at weekly intervals to appropriate efficacy and tolerability as indicated.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4317&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4315&quot;&gt;&lt;span data-dcnode-id=&quot;4316&quot; instrument_node=&quot;&quot;&gt;ADDERALL XR extended release capsules may be taken whole, or the capsule may be opened and the entire contents sprinkled on applesauce. If the patient is using the sprinkle administration method, the sprinkled applesauce should be consumed immediately; it should not be stored. Patients should take the applesauce with sprinkled beads in its entirety without chewing. The dose of a single capsule should not be divided. The contents of the entire capsule should be taken, and patients should not take anything less than one capsule per day.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4314&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4312&quot;&gt;&lt;span data-dcnode-id=&quot;4313&quot; instrument_node=&quot;&quot;&gt;ADDERALL XR may be taken with or without food.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4311&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4309&quot;&gt;&lt;span data-dcnode-id=&quot;4310&quot; instrument_node=&quot;&quot;&gt;ADDERALL XR should be given upon awakening. Afternoon doses should be avoided because of the potential for insomnia.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4308&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4306&quot;&gt;&lt;span data-dcnode-id=&quot;4307&quot; instrument_node=&quot;&quot;&gt;Where possible, ADDERALL XR therapy should be interrupted occasionally to determine if there is a recurrence of behavioral symptoms sufficient to require continued therapy.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4305&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 data-dcnode-id=&quot;4303&quot;&gt;&lt;span data-dcnode-id=&quot;4304&quot; instrument_node=&quot;&quot;&gt;Children&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;4302&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4300&quot;&gt;&lt;span data-dcnode-id=&quot;4301&quot; instrument_node=&quot;&quot;&gt;In children with ADHD who are 6-12 years of age and are either starting treatment for the first time or switching from another medication, start with 10 mg once daily in the morning; daily dosage may be adjusted in increments of 5 mg or 10 mg at weekly intervals. When in the judgment of the clinician a lower initial dose is appropriate, patients may begin treatment with 5 mg once daily in the morning. The maximum recommended dose for children 6-12 years of age is 30 mg/day; doses greater than 30 mg/day have not been studied in children. ADDERALL XR has not been studied in children under 6 years of age.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4299&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 data-dcnode-id=&quot;4297&quot;&gt;&lt;span data-dcnode-id=&quot;4298&quot; instrument_node=&quot;&quot;&gt;Adolescents&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;4296&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4294&quot;&gt;&lt;span data-dcnode-id=&quot;4295&quot; instrument_node=&quot;&quot;&gt;The recommended starting dose for adolescents with ADHD who are 13-17 years of age and are either starting treatment for the first time or switching from another medication is 10 mg/day. The dose may be increased to 20 mg/day after one week if ADHD symptoms are not adequately controlled.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4293&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 data-dcnode-id=&quot;4291&quot;&gt;&lt;span data-dcnode-id=&quot;4292&quot; instrument_node=&quot;&quot;&gt;Adults&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;4290&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4288&quot;&gt;&lt;span data-dcnode-id=&quot;4289&quot; instrument_node=&quot;&quot;&gt;In adults with ADHD who are either starting treatment for the first time or switching from another medication, the recommended dose is 20 mg/day.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4287&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 data-dcnode-id=&quot;4285&quot;&gt;&lt;span data-dcnode-id=&quot;4286&quot; instrument_node=&quot;&quot;&gt;Dosage In Patients With Renal Impairment&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;4284&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4270&quot;&gt;&lt;span data-dcnode-id=&quot;4283&quot; instrument_node=&quot;&quot;&gt;In adult patients with severe renal impairment (GFR 15 to &amp;lt; 30 mL/min/1.73m²), the recommended dose is 15 mg once daily in the morning. In pediatric patients (6 to 17 years of age) with severe renal impairment, the recommended dose is 5 mg once daily. The maximum dose for children 6 to 12 years of age with severe renal impairment is 20 mg once daily. ADDERALL XR is not recommended in patients with &lt;/span&gt;&lt;a data-dcnode-id=&quot;4281&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/end_stage/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;4282&quot; instrument_node=&quot;&quot;&gt;end stage&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4280&quot; instrument_node=&quot;&quot;&gt; renal disease (&lt;/span&gt;&lt;a data-dcnode-id=&quot;4278&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/esrd/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;4279&quot; instrument_node=&quot;&quot;&gt;ESRD&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4277&quot; instrument_node=&quot;&quot;&gt;) (GFR &amp;lt; 15 mL/min/1.73m²) [see &lt;/span&gt;&lt;b data-dcnode-id=&quot;4275&quot;&gt;&lt;span data-dcnode-id=&quot;4276&quot; instrument_node=&quot;&quot;&gt;Use In Specific Populations&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;4274&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;b data-dcnode-id=&quot;4272&quot;&gt;&lt;span data-dcnode-id=&quot;4273&quot; instrument_node=&quot;&quot;&gt;CLINICAL PHARMACOLOGY&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;4271&quot; instrument_node=&quot;&quot;&gt;].&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4269&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;4259&quot;&gt;&lt;span data-dcnode-id=&quot;4260&quot; instrument_node=&quot;&quot;&gt;ADDERALL XR 5 mg extended release capsules: Clear/blue (imprinted ADDERALL XR 5 mg)&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4258&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;4207&quot;&gt;&lt;span data-dcnode-id=&quot;4208&quot; instrument_node=&quot;&quot;&gt;Dispense in a tight, light-resistant container as defined in the USP.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4206&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4201&quot;&gt;&lt;span data-dcnode-id=&quot;4205&quot; instrument_node=&quot;&quot;&gt;Store at room temperature, 20° C to 25° C (68° F to 77° F). Excursions permitted to 15-30° C (59-86°F) [see &lt;/span&gt;&lt;b data-dcnode-id=&quot;4203&quot;&gt;&lt;span data-dcnode-id=&quot;4204&quot; instrument_node=&quot;&quot;&gt;USP CONTROLLED ROOM TEMPERATURE&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;4202&quot; instrument_node=&quot;&quot;&gt;].&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4200&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h5 data-dcnode-id=&quot;4198&quot;&gt;&lt;span data-dcnode-id=&quot;4199&quot; instrument_node=&quot;&quot;&gt;Disposal&lt;/span&gt;&lt;/h5&gt;&lt;span data-dcnode-id=&quot;4197&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4192&quot;&gt;&lt;span data-dcnode-id=&quot;4196&quot; instrument_node=&quot;&quot;&gt;Comply with local laws and regulations on drug disposal of CNS stimulants. Dispose of remaining, unused, or expired ADDERALL XR at authorized collection sites such as retail pharmacies, hospital or clinic pharmacies, and law enforcement locations. If no take-back program or authorized collector is available, mix ADDERALL XR with an undesirable, nontoxic substance to make it less appealing to children and pets. Place the mixture in a container such as a sealed &lt;/span&gt;&lt;a data-dcnode-id=&quot;4194&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/plastic/article.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;sub&quot;&gt;&lt;span data-dcnode-id=&quot;4195&quot; instrument_node=&quot;&quot;&gt;plastic&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4193&quot; instrument_node=&quot;&quot;&gt; bag and discard ADDERALL XR in the household trash.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4191&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;4159&quot;&gt;&lt;span data-dcnode-id=&quot;4160&quot; instrument_node=&quot;&quot;&gt;SIDE EFFECTS&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;4158&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4156&quot;&gt;&lt;span data-dcnode-id=&quot;4157&quot; instrument_node=&quot;&quot;&gt;Because clinical trials are conducted under widely varying conditions, adverse reaction rates observed in the clinical trials of a drug cannot be directly compared to rates in the clinical trials of another drug and may not reflect the rates observed in practice.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4155&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 data-dcnode-id=&quot;4153&quot;&gt;&lt;span data-dcnode-id=&quot;4154&quot; instrument_node=&quot;&quot;&gt;Clinical Trials Experience&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;4152&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4147&quot;&gt;&lt;span data-dcnode-id=&quot;4151&quot; instrument_node=&quot;&quot;&gt;The premarketing development program for ADDERALL XR included exposures in a total of 1315 participants in clinical trials (635 pediatric patients, 350 adolescent patients, 248 adult patients, and 82 healthy adult subjects). Of these, 635 patients (ages 6 to 12) were evaluated in two controlled clinical studies, one open-label clinical study, and two single-dose clinical &lt;/span&gt;&lt;a data-dcnode-id=&quot;4149&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/pharmacology/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;4150&quot; instrument_node=&quot;&quot;&gt;pharmacology&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4148&quot; instrument_node=&quot;&quot;&gt; studies (N= 40). Safety data on all patients are included in the discussion that follows. Adverse reactions were assessed by collecting adverse reactions, results of physical examinations, vital signs, weights, laboratory analyses, and ECGs.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4146&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4144&quot;&gt;&lt;span data-dcnode-id=&quot;4145&quot; instrument_node=&quot;&quot;&gt;Adverse reactions during exposure were obtained primarily by general inquiry and recorded by clinical investigators using terminology of their own choosing. Consequently, it is not possible to provide a meaningful estimate of the proportion of individuals experiencing adverse reactions without first grouping similar types of reactions into a smaller number of standardized event categories. In the tables and listings that follow, COSTART terminology has been used to classify reported adverse reactions.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4143&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4141&quot;&gt;&lt;span data-dcnode-id=&quot;4142&quot; instrument_node=&quot;&quot;&gt;The stated frequencies of adverse reactions represent the proportion of individuals who experienced, at least once, a treatment-emergent adverse event of the type listed.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4140&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h5 data-dcnode-id=&quot;4138&quot;&gt;&lt;span data-dcnode-id=&quot;4139&quot; instrument_node=&quot;&quot;&gt;Adverse Reactions Leading To Discontinuation Of Treatment&lt;/span&gt;&lt;/h5&gt;&lt;span data-dcnode-id=&quot;4137&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4135&quot;&gt;&lt;span data-dcnode-id=&quot;4136&quot; instrument_node=&quot;&quot;&gt;In two placebo-controlled studies of up to 5 weeks duration among children with ADHD, 2.4% (10/425) of ADDERALL XR-treated patients discontinued due to adverse reactions (including 3 patients with loss of appetite, one of whom also reported insomnia) compared to 2.7% (7/259) receiving placebo.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4134&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4126&quot;&gt;&lt;span data-dcnode-id=&quot;4133&quot; instrument_node=&quot;&quot;&gt;The most frequent adverse reactions leading to discontinuation of ADDERALL XR in controlled and uncontrolled, multiple-dose clinical trials of children (N=595) were &lt;/span&gt;&lt;a data-dcnode-id=&quot;4131&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/anorexia/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;4132&quot; instrument_node=&quot;&quot;&gt;anorexia&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4130&quot; instrument_node=&quot;&quot;&gt; (loss of appetite) (2.9%), insomnia (1.5%), weight loss (1.2%), emotional &lt;/span&gt;&lt;a data-dcnode-id=&quot;4128&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/lability/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;4129&quot; instrument_node=&quot;&quot;&gt;lability&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4127&quot; instrument_node=&quot;&quot;&gt; (1%), and depression (0.7%). Over half of these patients were exposed to ADDERALL XR for 12 months or more.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4125&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4123&quot;&gt;&lt;span data-dcnode-id=&quot;4124&quot; instrument_node=&quot;&quot;&gt;In a separate placebo-controlled 4-week study in adolescents with ADHD, five patients (2.1%) discontinued treatment due to adverse events among ADDERALL XR-treated patients (N=233) compared to none who received placebo (N=54). The most frequent adverse event leading to discontinuation and considered to be drug-related (i.e. leading to discontinuation in at least 1% of ADDERALL XR-treated patients and at a rate at least twice that of placebo) was insomnia (1.3%, n=3).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4122&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4114&quot;&gt;&lt;span data-dcnode-id=&quot;4121&quot; instrument_node=&quot;&quot;&gt;In one placebo-controlled 4-week study among adults with ADHD with doses 20 mg to 60 mg, 23 patients (12.0%) discontinued treatment due to adverse events among ADDERALL XR-treated patients (N=191) compared to one patient (1.6%) who received placebo (N=64). The most frequent adverse events leading to discontinuation and considered to be drug-related (i.e. leading to discontinuation in at least 1% of ADDERALL XR-treated patients and at a rate at least twice that of placebo) were insomnia (5.2%, n=10), anxiety (2.1%, n=4), nervousness (1.6%, n=3), dry mouth (1.6%, n=3), anorexia (1.6%, n=3), &lt;/span&gt;&lt;a data-dcnode-id=&quot;4119&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/tachycardia/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;4120&quot; instrument_node=&quot;&quot;&gt;tachycardia&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4118&quot; instrument_node=&quot;&quot;&gt; (1.6%, n=3), headache (1.6%, n=3), and &lt;/span&gt;&lt;a data-dcnode-id=&quot;4116&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/asthenia/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;4117&quot; instrument_node=&quot;&quot;&gt;asthenia&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4115&quot; instrument_node=&quot;&quot;&gt; (1.0%, n=2).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4113&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h5 data-dcnode-id=&quot;4111&quot;&gt;&lt;span data-dcnode-id=&quot;4112&quot; instrument_node=&quot;&quot;&gt;Adverse Reactions Occurring In Controlled Trials&lt;/span&gt;&lt;/h5&gt;&lt;span data-dcnode-id=&quot;4110&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4108&quot;&gt;&lt;span data-dcnode-id=&quot;4109&quot; instrument_node=&quot;&quot;&gt;Adverse reactions reported in a 3-week clinical trial of children and a 4-week clinical trial in adolescents and adults, respectively, treated with ADDERALL XR or placebo are presented in the tables below.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4107&quot; instrument_node=&quot;&quot;&gt;

			Note: The following reactions did not meet the criterion for inclusion in Table 3 but were reported by 2% to 4% of adult patients receiving ADDERALL XR with a higher incidence than patients receiving placebo in this study: infection, photosensitivity reaction, constipation, tooth disorder (e.g., teeth clenching, tooth infection), emotional lability, libido decreased, somnolence, speech disorder (e.g., stuttering, excessive speech), palpitation, twitching, dyspnea, sweating, dysmenorrhea, and impotence.&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;/tbody&gt;&lt;/table&gt;&lt;span data-dcnode-id=&quot;3527&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;3515&quot;&gt;&lt;span data-dcnode-id=&quot;3519&quot; instrument_node=&quot;&quot;&gt;[see &lt;/span&gt;&lt;b data-dcnode-id=&quot;3517&quot;&gt;&lt;span data-dcnode-id=&quot;3518&quot; instrument_node=&quot;&quot;&gt;WARNINGS AND PRECAUTIONS&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;3516&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3514&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3512&quot;&gt;&lt;span data-dcnode-id=&quot;3513&quot; instrument_node=&quot;&quot;&gt;In a controlled 4-week outpatient clinical study of adolescents with ADHD, isolated systolic blood pressure elevations ≥15 mmHg were observed in 7/64 (11%) placebo-treated patients and 7/100 (7%) patients receiving ADDERALL XR 10 or 20 mg. Isolated elevations in diastolic blood pressure ≥ 8 mmHg were observed in 16/64 (25%) placebo-treated patients and 22/100 (22%) ADDERALL XR-treated patients. Similar results were observed at higher doses.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3511&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3509&quot;&gt;&lt;span data-dcnode-id=&quot;3510&quot; instrument_node=&quot;&quot;&gt;In a single-dose pharmacokinetic study in 23 adolescents with ADHD, isolated increases in systolic blood pressure (above the upper 95% CI for age, gender, and stature) were observed in 2/17 (12%) and 8/23 (35%), subjects administered 10 mg and 20 mg ADDERALL XR, respectively. Higher single doses were associated with a greater increase in systolic blood pressure. All increases were transient, appeared maximal at 2 to 4 hours post dose and not associated with symptoms.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3508&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 data-dcnode-id=&quot;3506&quot;&gt;&lt;span data-dcnode-id=&quot;3507&quot; instrument_node=&quot;&quot;&gt;Adverse Reactions Associated With The Use Of Amphetamine, ADDERALL XR, Or ADDERALL&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;3505&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3503&quot;&gt;&lt;span data-dcnode-id=&quot;3504&quot; instrument_node=&quot;&quot;&gt;The following adverse reactions have been identified during post-approval use of amphetamine, ADDERALL XR, or ADDERALL. Because these reactions are reported voluntarily from a population of uncertain size, it is not always possible to reliably estimate their frequency or establish a causal relationship to drug exposure.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3502&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h5 data-dcnode-id=&quot;3500&quot;&gt;&lt;span data-dcnode-id=&quot;3501&quot; instrument_node=&quot;&quot;&gt;Cardiovascular&lt;/span&gt;&lt;/h5&gt;&lt;span data-dcnode-id=&quot;3499&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3497&quot;&gt;&lt;span data-dcnode-id=&quot;3498&quot; instrument_node=&quot;&quot;&gt;Palpitations. There have been isolated reports of cardiomyopathy associated with chronic amphetamine use.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3496&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h5 data-dcnode-id=&quot;3494&quot;&gt;&lt;span data-dcnode-id=&quot;3495&quot; instrument_node=&quot;&quot;&gt;Central Nervous System&lt;/span&gt;&lt;/h5&gt;&lt;span data-dcnode-id=&quot;3493&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3491&quot;&gt;&lt;span data-dcnode-id=&quot;3492&quot; instrument_node=&quot;&quot;&gt;Psychotic episodes at recommended doses, overstimulation, restlessness, irritability, euphoria, dyskinesia, dysphoria, depression, tremor, tics, aggression, anger, logorrhea, dermatillomania, paresthesia (including formication), and bruxism.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3490&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;3485&quot;&gt;&lt;span data-dcnode-id=&quot;3486&quot; instrument_node=&quot;&quot;&gt;Vision blurred, mydriasis.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3484&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;3479&quot;&gt;&lt;span data-dcnode-id=&quot;3480&quot; instrument_node=&quot;&quot;&gt;Unpleasant taste, constipation, intestinal ischemia, and other gastrointestinal disturbances.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3478&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h5 data-dcnode-id=&quot;3476&quot;&gt;&lt;span data-dcnode-id=&quot;3477&quot; instrument_node=&quot;&quot;&gt;Allergic&lt;/span&gt;&lt;/h5&gt;&lt;span data-dcnode-id=&quot;3475&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3473&quot;&gt;&lt;span data-dcnode-id=&quot;3474&quot; instrument_node=&quot;&quot;&gt;Urticaria, rash, hypersensitivity reactions including angioedema and anaphylaxis. Serious skin rashes, including Stevens-Johnson Syndrome and toxic epidermal necrolysis have been reported.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3472&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;table cellspacing=&quot;0&quot; class=&quot;blacktbl&quot; data-dcnode-id=&quot;3120&quot; width=&quot;650&quot;&gt;&lt;tbody data-dcnode-id=&quot;3122&quot;&gt;&lt;tr data-dcnode-id=&quot;3388&quot;&gt;&lt;td colspan=&quot;2&quot; data-dcnode-id=&quot;3390&quot;&gt;&lt;b data-dcnode-id=&quot;3391&quot;&gt;&lt;span data-dcnode-id=&quot;3392&quot; instrument_node=&quot;&quot;&gt;Monoamine Oxidase Inhibitors (MAOIs)&lt;/span&gt;&lt;/b&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;3378&quot;&gt;&lt;td align=&quot;center&quot; data-dcnode-id=&quot;3383&quot; width=&quot;30%&quot;&gt;&lt;i data-dcnode-id=&quot;3384&quot;&gt;&lt;span data-dcnode-id=&quot;3385&quot; instrument_node=&quot;&quot;&gt;Clinical Impact&lt;/span&gt;&lt;/i&gt;&lt;/td&gt;&lt;td data-dcnode-id=&quot;3380&quot; width=&quot;70%&quot;&gt;&lt;span data-dcnode-id=&quot;3381&quot; instrument_node=&quot;&quot;&gt;Concomitant use of MAOIs and CNS stimulants can cause hypertensive crisis. Potential outcomes include death, stroke, myocardial infarction, aortic dissection, ophthalmological complications, eclampsia, pulmonary edema, and renal failure.&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;3365&quot;&gt;&lt;td align=&quot;center&quot; data-dcnode-id=&quot;3373&quot;&gt;&lt;i data-dcnode-id=&quot;3374&quot;&gt;&lt;span data-dcnode-id=&quot;3375&quot; instrument_node=&quot;&quot;&gt;Intervention&lt;/span&gt;&lt;/i&gt;&lt;/td&gt;&lt;td data-dcnode-id=&quot;3367&quot;&gt;&lt;span data-dcnode-id=&quot;3371&quot; instrument_node=&quot;&quot;&gt;Do not administer ADDERALL XR concomitantly or within 14 days after discontinuing MAOI [see &lt;/span&gt;&lt;b data-dcnode-id=&quot;3369&quot;&gt;&lt;span data-dcnode-id=&quot;3370&quot; instrument_node=&quot;&quot;&gt;CONTRAINDICATIONS&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;3368&quot; instrument_node=&quot;&quot;&gt;].&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;3355&quot;&gt;&lt;td align=&quot;center&quot; data-dcnode-id=&quot;3360&quot;&gt;&lt;i data-dcnode-id=&quot;3361&quot;&gt;&lt;span data-dcnode-id=&quot;3362&quot; instrument_node=&quot;&quot;&gt;Examples&lt;/span&gt;&lt;/i&gt;&lt;/td&gt;&lt;td data-dcnode-id=&quot;3357&quot;&gt;&lt;span data-dcnode-id=&quot;3358&quot; instrument_node=&quot;&quot;&gt;selegiline, tranylcypromine, isocarboxazid, phenelzine, linezolid, methylene blue&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;3348&quot;&gt;&lt;td colspan=&quot;2&quot; data-dcnode-id=&quot;3350&quot;&gt;&lt;b data-dcnode-id=&quot;3351&quot;&gt;&lt;span data-dcnode-id=&quot;3352&quot; instrument_node=&quot;&quot;&gt;Serotonergic Drugs&lt;/span&gt;&lt;/b&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;3338&quot;&gt;&lt;td align=&quot;center&quot; data-dcnode-id=&quot;3343&quot;&gt;&lt;i data-dcnode-id=&quot;3344&quot;&gt;&lt;span data-dcnode-id=&quot;3345&quot; instrument_node=&quot;&quot;&gt;Clinical Impact&lt;/span&gt;&lt;/i&gt;&lt;/td&gt;&lt;td data-dcnode-id=&quot;3340&quot;&gt;&lt;span data-dcnode-id=&quot;3341&quot; instrument_node=&quot;&quot;&gt;The concomitant use of ADDERALL XR and serotonergic drugs increases the risk of serotonin syndrome.&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;3325&quot;&gt;&lt;td align=&quot;center&quot; data-dcnode-id=&quot;3333&quot;&gt;&lt;i data-dcnode-id=&quot;3334&quot;&gt;&lt;span data-dcnode-id=&quot;3335&quot; instrument_node=&quot;&quot;&gt;Intervention&lt;/span&gt;&lt;/i&gt;&lt;/td&gt;&lt;td data-dcnode-id=&quot;3327&quot;&gt;&lt;span data-dcnode-id=&quot;3331&quot; instrument_node=&quot;&quot;&gt;Initiate with lower doses and monitor patients for signs and symptoms of serotonin syndrome, particularly during ADDERALL XR initiation or dosage increase. If serotonin syndrome occurs, discontinue ADDERALL XR and the concomitant serotonergic drug(s) [see &lt;/span&gt;&lt;b data-dcnode-id=&quot;3329&quot;&gt;&lt;span data-dcnode-id=&quot;3330&quot; instrument_node=&quot;&quot;&gt;WARNINGS AND PRECAUTIONS&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;3328&quot; instrument_node=&quot;&quot;&gt;].&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;3315&quot;&gt;&lt;td align=&quot;center&quot; data-dcnode-id=&quot;3320&quot;&gt;&lt;i data-dcnode-id=&quot;3321&quot;&gt;&lt;span data-dcnode-id=&quot;3322&quot; instrument_node=&quot;&quot;&gt;Examples&lt;/span&gt;&lt;/i&gt;&lt;/td&gt;&lt;td data-dcnode-id=&quot;3317&quot;&gt;&lt;span data-dcnode-id=&quot;3318&quot; instrument_node=&quot;&quot;&gt;selective serotonin reuptake inhibitors (SSRI), serotonin norepinephrine reuptake inhibitors (SNRI), triptans, tricyclic antidepressants, fentanyl, lithium, tramadol, tryptophan, buspirone, St. John’s Wort&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;3308&quot;&gt;&lt;td colspan=&quot;2&quot; data-dcnode-id=&quot;3310&quot;&gt;&lt;b data-dcnode-id=&quot;3311&quot;&gt;&lt;span data-dcnode-id=&quot;3312&quot; instrument_node=&quot;&quot;&gt;CYP2D6 Inhibitors&lt;/span&gt;&lt;/b&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;3298&quot;&gt;&lt;td align=&quot;center&quot; data-dcnode-id=&quot;3303&quot;&gt;&lt;i data-dcnode-id=&quot;3304&quot;&gt;&lt;span data-dcnode-id=&quot;3305&quot; instrument_node=&quot;&quot;&gt;Clinical Impact&lt;/span&gt;&lt;/i&gt;&lt;/td&gt;&lt;td data-dcnode-id=&quot;3300&quot;&gt;&lt;span data-dcnode-id=&quot;3301&quot; instrument_node=&quot;&quot;&gt;The concomitant use of ADDERALL XR and CYP2D6 inhibitors may increase the exposure of ADDERALL XR compared to the use of the drug alone and increase the risk of serotonin syndrome.&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;3282&quot;&gt;&lt;td align=&quot;center&quot; data-dcnode-id=&quot;3293&quot;&gt;&lt;i data-dcnode-id=&quot;3294&quot;&gt;&lt;span data-dcnode-id=&quot;3295&quot; instrument_node=&quot;&quot;&gt;Intervention&lt;/span&gt;&lt;/i&gt;&lt;/td&gt;&lt;td data-dcnode-id=&quot;3284&quot;&gt;&lt;span data-dcnode-id=&quot;3291&quot; instrument_node=&quot;&quot;&gt;Initiate with lower doses and monitor patients for signs and symptoms of serotonin syndrome particularly during ADDERALL XR initiation and after a dosage increase. If serotonin syndrome occurs, discontinue ADDERALL XR and the CYP2D6 inhibitor [see &lt;/span&gt;&lt;b data-dcnode-id=&quot;3289&quot;&gt;&lt;span data-dcnode-id=&quot;3290&quot; instrument_node=&quot;&quot;&gt;WARNINGS AND PRECAUTIONS&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;3288&quot; instrument_node=&quot;&quot;&gt; and &lt;/span&gt;&lt;b data-dcnode-id=&quot;3286&quot;&gt;&lt;span data-dcnode-id=&quot;3287&quot; instrument_node=&quot;&quot;&gt;OVERDOSAGE&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;3285&quot; instrument_node=&quot;&quot;&gt;].&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;3272&quot;&gt;&lt;td align=&quot;center&quot; data-dcnode-id=&quot;3277&quot;&gt;&lt;i data-dcnode-id=&quot;3278&quot;&gt;&lt;span data-dcnode-id=&quot;3279&quot; instrument_node=&quot;&quot;&gt;Examples&lt;/span&gt;&lt;/i&gt;&lt;/td&gt;&lt;td data-dcnode-id=&quot;3274&quot;&gt;&lt;span data-dcnode-id=&quot;3275&quot; instrument_node=&quot;&quot;&gt;paroxetine and fluoxetine (also serotonergic drugs), quinidine, ritonavir&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;3265&quot;&gt;&lt;td colspan=&quot;2&quot; data-dcnode-id=&quot;3267&quot;&gt;&lt;b data-dcnode-id=&quot;3268&quot;&gt;&lt;span data-dcnode-id=&quot;3269&quot; instrument_node=&quot;&quot;&gt;Alkalinizing Agents&lt;/span&gt;&lt;/b&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;3255&quot;&gt;&lt;td align=&quot;center&quot; data-dcnode-id=&quot;3260&quot;&gt;&lt;i data-dcnode-id=&quot;3261&quot;&gt;&lt;span data-dcnode-id=&quot;3262&quot; instrument_node=&quot;&quot;&gt;Clinical Impact&lt;/span&gt;&lt;/i&gt;&lt;/td&gt;&lt;td data-dcnode-id=&quot;3257&quot;&gt;&lt;span data-dcnode-id=&quot;3258&quot; instrument_node=&quot;&quot;&gt;Increase blood levels and potentiate the action of amphetamine.&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;3245&quot;&gt;&lt;td align=&quot;center&quot; data-dcnode-id=&quot;3250&quot;&gt;&lt;i data-dcnode-id=&quot;3251&quot;&gt;&lt;span data-dcnode-id=&quot;3252&quot; instrument_node=&quot;&quot;&gt;Intervention&lt;/span&gt;&lt;/i&gt;&lt;/td&gt;&lt;td data-dcnode-id=&quot;3247&quot;&gt;&lt;span data-dcnode-id=&quot;3248&quot; instrument_node=&quot;&quot;&gt;Co-administration of ADDERALL XR and gastrointestinal or urinary alkalinizing agents should be avoided.&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;3235&quot;&gt;&lt;td align=&quot;center&quot; data-dcnode-id=&quot;3240&quot;&gt;&lt;i data-dcnode-id=&quot;3241&quot;&gt;&lt;span data-dcnode-id=&quot;3242&quot; instrument_node=&quot;&quot;&gt;Examples&lt;/span&gt;&lt;/i&gt;&lt;/td&gt;&lt;td data-dcnode-id=&quot;3237&quot;&gt;&lt;span data-dcnode-id=&quot;3238&quot; instrument_node=&quot;&quot;&gt;Gastrointestinal alkalinizing agents (e.g., sodium bicarbonate). Urinary alkalinizing agents (e.g. acetazolamide, some thiazides).&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;3228&quot;&gt;&lt;td colspan=&quot;2&quot; data-dcnode-id=&quot;3230&quot;&gt;&lt;b data-dcnode-id=&quot;3231&quot;&gt;&lt;span data-dcnode-id=&quot;3232&quot; instrument_node=&quot;&quot;&gt;Acidifying Agents&lt;/span&gt;&lt;/b&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;3218&quot;&gt;&lt;td align=&quot;center&quot; data-dcnode-id=&quot;3223&quot;&gt;&lt;i data-dcnode-id=&quot;3224&quot;&gt;&lt;span data-dcnode-id=&quot;3225&quot; instrument_node=&quot;&quot;&gt;Clinical Impact&lt;/span&gt;&lt;/i&gt;&lt;/td&gt;&lt;td data-dcnode-id=&quot;3220&quot;&gt;&lt;span data-dcnode-id=&quot;3221&quot; instrument_node=&quot;&quot;&gt;Lower blood levels and efficacy of amphetamines.&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;3208&quot;&gt;&lt;td align=&quot;center&quot; data-dcnode-id=&quot;3213&quot;&gt;&lt;i data-dcnode-id=&quot;3214&quot;&gt;&lt;span data-dcnode-id=&quot;3215&quot; instrument_node=&quot;&quot;&gt;Intervention&lt;/span&gt;&lt;/i&gt;&lt;/td&gt;&lt;td data-dcnode-id=&quot;3210&quot;&gt;&lt;span data-dcnode-id=&quot;3211&quot; instrument_node=&quot;&quot;&gt;Increase dose based on clinical response.&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;3198&quot;&gt;&lt;td align=&quot;center&quot; data-dcnode-id=&quot;3203&quot;&gt;&lt;i data-dcnode-id=&quot;3204&quot;&gt;&lt;span data-dcnode-id=&quot;3205&quot; instrument_node=&quot;&quot;&gt;Examples&lt;/span&gt;&lt;/i&gt;&lt;/td&gt;&lt;td data-dcnode-id=&quot;3200&quot;&gt;&lt;span data-dcnode-id=&quot;3201&quot; instrument_node=&quot;&quot;&gt;Gastrointestinal acidifying agents (e.g., guanethidine, reserpine, glutamic acid HCl, ascorbic acid). Urinary acidifying agents (e.g., ammonium chloride, sodium acid phosphate, methenamine salts).&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;3191&quot;&gt;&lt;td colspan=&quot;2&quot; data-dcnode-id=&quot;3193&quot;&gt;&lt;b data-dcnode-id=&quot;3194&quot;&gt;&lt;span data-dcnode-id=&quot;3195&quot; instrument_node=&quot;&quot;&gt;Tricyclic Antidepressants&lt;/span&gt;&lt;/b&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;3181&quot;&gt;&lt;td align=&quot;center&quot; data-dcnode-id=&quot;3186&quot;&gt;&lt;i data-dcnode-id=&quot;3187&quot;&gt;&lt;span data-dcnode-id=&quot;3188&quot; instrument_node=&quot;&quot;&gt;Clinical Impact&lt;/span&gt;&lt;/i&gt;&lt;/td&gt;&lt;td data-dcnode-id=&quot;3183&quot;&gt;&lt;span data-dcnode-id=&quot;3184&quot; instrument_node=&quot;&quot;&gt;May enhance the activity of tricyclic or sympathomimetic agents causing striking and sustained increases in the concentration of d-amphetamine in the brain; cardiovascular effects can be potentiated.&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;3171&quot;&gt;&lt;td align=&quot;center&quot; data-dcnode-id=&quot;3176&quot;&gt;&lt;i data-dcnode-id=&quot;3177&quot;&gt;&lt;span data-dcnode-id=&quot;3178&quot; instrument_node=&quot;&quot;&gt;Intervention&lt;/span&gt;&lt;/i&gt;&lt;/td&gt;&lt;td data-dcnode-id=&quot;3173&quot;&gt;&lt;span data-dcnode-id=&quot;3174&quot; instrument_node=&quot;&quot;&gt;Monitor frequently and adjust or use alternative therapy based on clinical response.&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;3161&quot;&gt;&lt;td align=&quot;center&quot; data-dcnode-id=&quot;3166&quot;&gt;&lt;i data-dcnode-id=&quot;3167&quot;&gt;&lt;span data-dcnode-id=&quot;3168&quot; instrument_node=&quot;&quot;&gt;Examples&lt;/span&gt;&lt;/i&gt;&lt;/td&gt;&lt;td data-dcnode-id=&quot;3163&quot;&gt;&lt;span data-dcnode-id=&quot;3164&quot; instrument_node=&quot;&quot;&gt;desipramine, protriptyline&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;3154&quot;&gt;&lt;td colspan=&quot;2&quot; data-dcnode-id=&quot;3156&quot;&gt;&lt;b data-dcnode-id=&quot;3157&quot;&gt;&lt;span data-dcnode-id=&quot;3158&quot; instrument_node=&quot;&quot;&gt;Proton Pump Inhibitors&lt;/span&gt;&lt;/b&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;3144&quot;&gt;&lt;td align=&quot;center&quot; data-dcnode-id=&quot;3149&quot;&gt;&lt;i data-dcnode-id=&quot;3150&quot;&gt;&lt;span data-dcnode-id=&quot;3151&quot; instrument_node=&quot;&quot;&gt;Clinical Impact&lt;/span&gt;&lt;/i&gt;&lt;/td&gt;&lt;td data-dcnode-id=&quot;3146&quot;&gt;&lt;span data-dcnode-id=&quot;3147&quot; instrument_node=&quot;&quot;&gt;Time to maximum concentration (Tmax) of amphetamine is decreased compared to when administered alone.&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;3134&quot;&gt;&lt;td align=&quot;center&quot; data-dcnode-id=&quot;3139&quot;&gt;&lt;i data-dcnode-id=&quot;3140&quot;&gt;&lt;span data-dcnode-id=&quot;3141&quot; instrument_node=&quot;&quot;&gt;Intervention&lt;/span&gt;&lt;/i&gt;&lt;/td&gt;&lt;td data-dcnode-id=&quot;3136&quot;&gt;&lt;span data-dcnode-id=&quot;3137&quot; instrument_node=&qu &lt;/span&gt;&lt;h4 data-dcnode-id=&quot;3111&quot;&gt;&lt;span data-dcnode-id=&quot;3112&quot; instrument_node=&quot;&quot;&gt;Drug Abuse And Dependence&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;3110&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h5 data-dcnode-id=&quot;3108&quot;&gt;&lt;span data-dcnode-id=&quot;3109&quot; instrument_node=&quot;&quot;&gt;Controlled Substance&lt;/span&gt;&lt;/h5&gt;&lt;span data-dcnode-id=&quot;3107&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3105&quot;&gt;&lt;span data-dcnode-id=&quot;3106&quot; instrument_node=&quot;&quot;&gt;ADDERALL XR contains amphetamine, a Schedule II controlled substance.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3104&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h5 data-dcnode-id=&quot;3102&quot;&gt;&lt;span data-dcnode-id=&quot;3103&quot; instrument_node=&quot;&quot;&gt;Abuse&lt;/span&gt;&lt;/h5&gt;&lt;span data-dcnode-id=&quot;3101&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3099&quot;&gt;&lt;span data-dcnode-id=&quot;3100&quot; instrument_node=&quot;&quot;&gt;ADDERALL XR is a CNS stimulant that contains amphetamine, which has a high potential for abuse. Abuse is characterized by impaired control of drug use, compulsive use despite harm, and craving.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3098&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3078&quot;&gt;&lt;span data-dcnode-id=&quot;3097&quot; instrument_node=&quot;&quot;&gt;Signs and symptoms of amphetamine abuse may include increased heart rate, &lt;/span&gt;&lt;a data-dcnode-id=&quot;3095&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/respiratory_rate/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;3096&quot; instrument_node=&quot;&quot;&gt;respiratory rate&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3094&quot; instrument_node=&quot;&quot;&gt;, blood pressure, and/or sweating, &lt;/span&gt;&lt;a data-dcnode-id=&quot;3092&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/dilated_pupils_mydriasis/symptoms.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;sym&quot;&gt;&lt;span data-dcnode-id=&quot;3093&quot; instrument_node=&quot;&quot;&gt;dilated pupils&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3091&quot; instrument_node=&quot;&quot;&gt;, hyperactivity, restlessness, insomnia, &lt;/span&gt;&lt;a data-dcnode-id=&quot;3089&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/decreased_appetite/symptoms.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;sym&quot;&gt;&lt;span data-dcnode-id=&quot;3090&quot; instrument_node=&quot;&quot;&gt;decreased appetite&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3088&quot; instrument_node=&quot;&quot;&gt;, loss of coordination, &lt;/span&gt;&lt;a data-dcnode-id=&quot;3086&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/tremor/article.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dt&quot;&gt;&lt;span data-dcnode-id=&quot;3087&quot; instrument_node=&quot;&quot;&gt;tremors&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3085&quot; instrument_node=&quot;&quot;&gt;, flushed skin, &lt;/span&gt;&lt;a data-dcnode-id=&quot;3083&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/vomiting/symptoms.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;sym&quot;&gt;&lt;span data-dcnode-id=&quot;3084&quot; instrument_node=&quot;&quot;&gt;vomiting&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3082&quot; instrument_node=&quot;&quot;&gt;, and/or abdominal pain. Anxiety, psychosis, hostility, aggression, suicidal or homicidal ideation have also been observed. Abusers of amphetamines may use other unapproved routes of administration which can result in overdose and death [see&lt;/span&gt;&lt;b data-dcnode-id=&quot;3080&quot;&gt;&lt;span data-dcnode-id=&quot;3081&quot; instrument_node=&quot;&quot;&gt; OVERDOSAGE&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;3079&quot; instrument_node=&quot;&quot;&gt;].&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3077&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3075&quot;&gt;&lt;span data-dcnode-id=&quot;3076&quot; instrument_node=&quot;&quot;&gt;To reduce the abuse of CNS stimulants, including ADDERALL XR, assess the risk of abuse prior to prescribing. After prescribing, keep careful prescription records, educate patients and their families about abuse and proper storage and disposal of CNS stimulants. Monitor for signs of abuse while on therapy and re-evaluate the need for ADDERALL XR use.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3074&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;3069&quot;&gt;&lt;span data-dcnode-id=&quot;3070&quot; instrument_node=&quot;&quot;&gt;Tolerance (a state of adaptation in which exposure to a specific dose of a drug results in a reduction of the drug's desired and/or undesired effects over time, in such a way that a higher dose of the drug is required to produce the same effect that was once obtained at a lower dose) may occur during chronic therapy of CNS stimulants including ADDERALL XR.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3068&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3048&quot;&gt;&lt;span data-dcnode-id=&quot;3067&quot; instrument_node=&quot;&quot;&gt;Physical Dependence (which is manifested by a withdrawal syndrome produced by abrupt cessation, rapid dose reduction, or administration of an &lt;/span&gt;&lt;a data-dcnode-id=&quot;3065&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/antagonist/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;3066&quot; instrument_node=&quot;&quot;&gt;antagonist&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3064&quot; instrument_node=&quot;&quot;&gt;) may occur in patients treated with CNS stimulants including ADDERALL XR. &lt;/span&gt;&lt;a data-dcnode-id=&quot;3062&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/withdrawal_symptoms/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;3063&quot; instrument_node=&quot;&quot;&gt;Withdrawal symptoms&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3061&quot; instrument_node=&quot;&quot;&gt; after abrupt cessation of CNS stimulants include dysphoric mood; fatigue; vivid, unpleasant &lt;/span&gt;&lt;a data-dcnode-id=&quot;3059&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/dreams/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;3060&quot; instrument_node=&quot;&quot;&gt;dreams&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3058&quot; instrument_node=&quot;&quot;&gt;; insomnia or &lt;/span&gt;&lt;a data-dcnode-id=&quot;3056&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/hypersomnia/article.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dt&quot;&gt;&lt;span data-dcnode-id=&quot;3057&quot; instrument_node=&quot;&quot;&gt;hypersomnia&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3055&quot; instrument_node=&quot;&quot;&gt;; &lt;/span&gt;&lt;a data-dcnode-id=&quot;3053&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/increased_appetite/symptoms.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;sym&quot;&gt;&lt;span data-dcnode-id=&quot;3054&quot; instrument_node=&quot;&quot;&gt;increased appetite&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3052&quot; instrument_node=&quot;&quot;&gt;; and psychomotor retardation or &lt;/span&gt;&lt;a data-dcnode-id=&quot;3050&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/agitation/symptoms.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;sym&quot;&gt;&lt;span data-dcnode-id=&quot;3051&quot; instrument_node=&quot;&quot;&gt;agitation&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3049&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3047&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;h4 data-dcnode-id=&quot;3004&quot;&gt;&lt;span data-dcnode-id=&quot;3005&quot; instrument_node=&quot;&quot;&gt;Potential For Abuse And Dependence&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;3003&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2995&quot;&gt;&lt;span data-dcnode-id=&quot;3002&quot; instrument_node=&quot;&quot;&gt;CNS stimulants, including ADDERALL XR, other amphetamine-containing products, and methylphenidate, have a high potential for abuse and dependence. Assess the risk of abuse prior to prescribing, and monitor for signs of abuse and dependence while on therapy [see&lt;/span&gt;&lt;b data-dcnode-id=&quot;3000&quot;&gt;&lt;span data-dcnode-id=&quot;3001&quot; instrument_node=&quot;&quot;&gt; BOXED WARNING&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;2999&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;b data-dcnode-id=&quot;2997&quot;&gt;&lt;span data-dcnode-id=&quot;2998&quot; instrument_node=&quot;&quot;&gt;Drug Abuse And Dependence&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;2996&quot; instrument_node=&quot;&quot;&gt;].&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2994&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 data-dcnode-id=&quot;2992&quot;&gt;&lt;span data-dcnode-id=&quot;2993&quot; instrument_node=&quot;&quot;&gt;Serious Cardiovascular Reactions&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;2991&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h5 data-dcnode-id=&quot;2989&quot;&gt;&lt;span data-dcnode-id=&quot;2990&quot; instrument_node=&quot;&quot;&gt;Sudden Death and Pre-existing Structural Cardiac Abnormalities Or Other Serious Heart Problems&lt;/span&gt;&lt;/h5&gt;&lt;span data-dcnode-id=&quot;2988&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2985&quot;&gt;&lt;i data-dcnode-id=&quot;2986&quot;&gt;&lt;span data-dcnode-id=&quot;2987&quot; instrument_node=&quot;&quot;&gt;Children And Adolescents&lt;/span&gt;&lt;/i&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2984&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2976&quot;&gt;&lt;span data-dcnode-id=&quot;2983&quot; instrument_node=&quot;&quot;&gt;Sudden death has been reported in association with CNS stimulant treatment at usual doses in children and adolescents with structural cardiac abnormalities or other serious heart problems. Although some serious heart problems alone carry an increased risk of sudden death, stimulant products generally should not be used in children or adolescents with known serious structural cardiac abnormalities, &lt;/span&gt;&lt;a data-dcnode-id=&quot;2981&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/cardiomyopathy_hypertrophic/article.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dt&quot;&gt;&lt;span data-dcnode-id=&quot;2982&quot; instrument_node=&quot;&quot;&gt;cardiomyopathy&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2980&quot; instrument_node=&quot;&quot;&gt;, serious heart rhythm abnormalities, or other serious cardiac problems that may place them at increased vulnerability to the sympathomimetic effects of a stimulant drug [see &lt;/span&gt;&lt;b data-dcnode-id=&quot;2978&quot;&gt;&lt;span data-dcnode-id=&quot;2979&quot; instrument_node=&quot;&quot;&gt;CONTRAINDICATIONS&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;2977&quot; instrument_node=&quot;&quot;&gt;].&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2975&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2972&quot;&gt;&lt;i data-dcnode-id=&quot;2973&quot;&gt;&lt;span data-dcnode-id=&quot;2974&quot; instrument_node=&quot;&quot;&gt;Adults&lt;/span&gt;&lt;/i&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2971&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2957&quot;&gt;&lt;span data-dcnode-id=&quot;2970&quot; instrument_node=&quot;&quot;&gt;Sudden deaths, &lt;/span&gt;&lt;a data-dcnode-id=&quot;2968&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/stroke_symptoms_and_signs/symptoms.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;sym&quot;&gt;&lt;span data-dcnode-id=&quot;2969&quot; instrument_node=&quot;&quot;&gt;stroke&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2967&quot; instrument_node=&quot;&quot;&gt;, and &lt;/span&gt;&lt;a data-dcnode-id=&quot;2965&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/myocardial_infarction/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;2966&quot; instrument_node=&quot;&quot;&gt;myocardial infarction&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2964&quot; instrument_node=&quot;&quot;&gt; have been reported in adults taking stimulant drugs at usual doses for ADHD. Although the role of stimulants in these adult cases is also unknown, adults have a greater likelihood than children of having serious structural cardiac abnormalities, cardiomyopathy, serious heart rhythm abnormalities, &lt;/span&gt;&lt;a data-dcnode-id=&quot;2962&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/coronary_artery_disease/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;2963&quot; instrument_node=&quot;&quot;&gt;coronary artery disease&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2961&quot; instrument_node=&quot;&quot;&gt;, or other serious cardiac problems. Adults with such abnormalities should also generally not be treated with stimulant drugs [see &lt;/span&gt;&lt;b data-dcnode-id=&quot;2959&quot;&gt;&lt;span data-dcnode-id=&quot;2960&quot; instrument_node=&quot;&quot;&gt;CONTRAINDICATIONS&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;2958&quot; instrument_node=&quot;&quot;&gt;].&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2956&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h5 data-dcnode-id=&quot;2954&quot;&gt;&lt;span data-dcnode-id=&quot;2955&quot; instrument_node=&quot;&quot;&gt;Hypertension And Other Cardiovascular Conditions&lt;/span&gt;&lt;/h5&gt;&lt;span data-dcnode-id=&quot;2953&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2936&quot;&gt;&lt;span data-dcnode-id=&quot;2952&quot; instrument_node=&quot;&quot;&gt;Stimulant medications cause a modest increase in average blood pressure (about 2-4 mmHg) and average heart rate (about 3-6 bpm), and individuals may have larger increases. While the mean changes alone would not be expected to have short-term consequences, all patients should be monitored for larger changes in heart rate and blood pressure. Caution is indicated in treating patients whose underlying medical conditions might be compromised by increases in blood pressure or heart rate, e.g., those with pre-existing &lt;/span&gt;&lt;a data-dcnode-id=&quot;2950&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/hypertension/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;2951&quot; instrument_node=&quot;&quot;&gt;hypertension&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2949&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a data-dcnode-id=&quot;2947&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/heart_failure/article.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dt&quot;&gt;&lt;span data-dcnode-id=&quot;2948&quot; instrument_node=&quot;&quot;&gt;heart failure&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2946&quot; instrument_node=&quot;&quot;&gt;, recent myocardial &lt;/span&gt;&lt;a data-dcnode-id=&quot;2944&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/infarction/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;2945&quot; instrument_node=&quot;&quot;&gt;infarction&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2943&quot; instrument_node=&quot;&quot;&gt;, or ventricular arrhythmia [see&lt;/span&gt;&lt;b data-dcnode-id=&quot;2941&quot;&gt;&lt;span data-dcnode-id=&quot;2942&quot; instrument_node=&quot;&quot;&gt; CONTRAINDICATIONS&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;2940&quot; instrument_node=&quot;&quot;&gt; and &lt;/span&gt;&lt;b data-dcnode-id=&quot;2938&quot;&gt;&lt;span data-dcnode-id=&quot;2939&quot; instrument_node=&quot;&quot;&gt;ADVERSE REACTIONS&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;2937&quot; instrument_node=&quot;&quot;&gt;].&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2935&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h5 data-dcnode-id=&quot;2933&quot;&gt;&lt;span data-dcnode-id=&quot;2934&quot; instrument_node=&quot;&quot;&gt;Assessing Cardiovascular Status In Patients Being Treated With Stimulant Medications&lt;/span&gt;&lt;/h5&gt;&lt;span data-dcnode-id=&quot;2932&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2921&quot;&gt;&lt;span data-dcnode-id=&quot;2931&quot; instrument_node=&quot;&quot;&gt;Children, adolescents, or adults who are being considered for treatment with stimulant medications should have a careful history (including assessment for a family history of sudden death or ventricular arrhythmia) and physical exam to assess for the presence of cardiac disease, and should receive further cardiac evaluation if findings suggest such disease (e.g. &lt;/span&gt;&lt;a data-dcnode-id=&quot;2929&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/electrocardiogram_ecg_or_ekg/article.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;proc&quot;&gt;&lt;span data-dcnode-id=&quot;2930&quot; instrument_node=&quot;&quot;&gt;electrocardiogram&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2928&quot; instrument_node=&quot;&quot;&gt; and &lt;/span&gt;&lt;a data-dcnode-id=&quot;2926&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/echocardiogram/article.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;proc&quot;&gt;&lt;span data-dcnode-id=&quot;2927&quot; instrument_node=&quot;&quot;&gt;echocardiogram&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2925&quot; instrument_node=&quot;&quot;&gt;). Patients who develop symptoms such as exertional chest pain, unexplained &lt;/span&gt;&lt;a data-dcnode-id=&quot;2923&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/syncope/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;2924&quot; instrument_node=&quot;&quot;&gt;syncope&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2922&quot; instrument_node=&quot;&quot;&gt;, or other symptoms suggestive of cardiac disease during stimulant treatment should undergo a prompt cardiac evaluation.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2920&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 data-dcnode-id=&quot;2918&quot;&gt;&lt;span data-dcnode-id=&quot;2919&quot; instrument_node=&quot;&quot;&gt;Psychiatric Adverse Events&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;2917&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h5 data-dcnode-id=&quot;2915&quot;&gt;&lt;span data-dcnode-id=&quot;2916&quot; instrument_node=&quot;&quot;&gt;Pre-Existing Psychosis&lt;/span&gt;&lt;/h5&gt;&lt;span data-dcnode-id=&quot;2914&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2909&quot;&gt;&lt;span data-dcnode-id=&quot;2913&quot; instrument_node=&quot;&quot;&gt;Administration of stimulants may exacerbate symptoms of behavior disturbance and thought disorder in patients with pre-existing &lt;/span&gt;&lt;a data-dcnode-id=&quot;2911&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/psychotic_disorder_symptoms_and_signs/symptoms.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;sym&quot;&gt;&lt;span data-dcnode-id=&quot;2912&quot; instrument_node=&quot;&quot;&gt;psychotic disorder&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2910&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2908&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h5 data-dcnode-id=&quot;2906&quot;&gt;&lt;span data-dcnode-id=&quot;2907&quot; instrument_node=&quot;&quot;&gt;Bipolar Illness&lt;/span&gt;&lt;/h5&gt;&lt;span data-dcnode-id=&quot;2905&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2897&quot;&gt;&lt;span data-dcnode-id=&quot;2904&quot; instrument_node=&quot;&quot;&gt;Particular care should be taken in using stimulants to treat ADHD patients with comorbid &lt;/span&gt;&lt;a data-dcnode-id=&quot;2902&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/bipolar_disorder_symptoms_and_signs/symptoms.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;sym&quot;&gt;&lt;span data-dcnode-id=&quot;2903&quot; instrument_node=&quot;&quot;&gt;bipolar disorder&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2901&quot; instrument_node=&quot;&quot;&gt; because of concern for possible induction of mixed/&lt;/span&gt;&lt;a data-dcnode-id=&quot;2899&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/manic/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;2900&quot; instrument_node=&quot;&quot;&gt;manic&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2898&quot; instrument_node=&quot;&quot;&gt; episode in such patients. Prior to initiating treatment with a stimulant, patients with comorbid depressive symptoms should be adequately screened to determine if they are at risk for bipolar disorder; such screening should include a detailed psychiatric history, including a family history of suicide, bipolar disorder, and depression.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2896&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h5 data-dcnode-id=&quot;2894&quot;&gt;&lt;span data-dcnode-id=&quot;2895&quot; instrument_node=&quot;&quot;&gt;Emergence Of New Psychotic Or Manic Symptoms&lt;/span&gt;&lt;/h5&gt;&lt;span data-dcnode-id=&quot;2893&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2888&quot;&gt;&lt;span data-dcnode-id=&quot;2892&quot; instrument_node=&quot;&quot;&gt;Treatment-emergent psychotic or manic symptoms, e.g., hallucinations, delusional thinking, or &lt;/span&gt;&lt;a data-dcnode-id=&quot;2890&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/mania/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;2891&quot; instrument_node=&quot;&quot;&gt;mania&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2889&quot; instrument_node=&quot;&quot;&gt; in children and adolescents without prior history of psychotic illness or mania can be caused by stimulants at usual doses. If such symptoms occur, consideration should be given to a possible causal role of the stimulant, and discontinuation of treatment may be appropriate. In a pooled analysis of multiple short-term, placebo-controlled studies, such symptoms occurred in about 0.1% (4 patients with events out of 3482 exposed to methylphenidate or amphetamine for several weeks at usual doses) of stimulant-treated patients compared to 0 in placebo-treated patients.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2887&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h5 data-dcnode-id=&quot;2885&quot;&gt;&lt;span data-dcnode-id=&quot;2886&quot; instrument_node=&quot;&quot;&gt;Aggression&lt;/span&gt;&lt;/h5&gt;&lt;span data-dcnode-id=&quot;2884&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2882&quot;&gt;&lt;span data-dcnode-id=&quot;2883&quot; instrument_node=&quot;&quot;&gt;Aggressive behavior or hostility is often observed in children and adolescents with ADHD, and has been reported in clinical trials and the postmarketing experience of some medications indicated for the treatment of ADHD. Although there is no systematic evidence that stimulants cause aggressive behavior or hostility, patients beginning treatment for ADHD should be monitored for the appearance of or worsening of aggressive behavior or hostility.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2881&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 data-dcnode-id=&quot;2879&quot;&gt;&lt;span data-dcnode-id=&quot;2880&quot; instrument_node=&quot;&quot;&gt;Long-Term Suppression Of Growth&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;2878&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2876&quot;&gt;&lt;span data-dcnode-id=&quot;2877&quot; instrument_node=&quot;&quot;&gt;Monitor growth in children during treatment with stimulants. Patients who are not growing or gaining weight as expected may need to have their treatment interrupted.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2875&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2870&quot;&gt;&lt;span data-dcnode-id=&quot;2874&quot; instrument_node=&quot;&quot;&gt;Careful follow-up of weight and height in children ages 7 to 10 years who were randomized to either methylphenidate or non-medication treatment groups over 14 months, as well as in naturalistic subgroups of newly methylphenidate-treated and non-medication treated children over 36 months (to the ages of 10 to 13 years), suggests that consistently medicated children (i.e., treatment for 7 days per week throughout the year) have a temporary slowing in growth rate (on average, a total of about 2 cm less &lt;/span&gt;&lt;a data-dcnode-id=&quot;2872&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/growth_in_height/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;2873&quot; instrument_node=&quot;&quot;&gt;growth in height&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2871&quot; instrument_node=&quot;&quot;&gt; and 2.7 kg less growth in weight over 3 years), without evidence of growth rebound during this period of development.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2869&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2867&quot;&gt;&lt;span data-dcnode-id=&quot;2868&quot; instrument_node=&quot;&quot;&gt;In a controlled trial of ADDERALL XR in adolescents, mean weight change from baseline within the initial 4 weeks of therapy was -1.1 lbs. and -2.8 lbs., respectively, for patients receiving 10 mg and 20 mg ADDERALL XR. Higher doses were associated with greater weight loss within the initial 4 weeks of treatment. Chronic use of amphetamines can be expected to cause a similar suppression of growth.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2866&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 data-dcnode-id=&quot;2864&quot;&gt;&lt;span data-dcnode-id=&quot;2865&quot; instrument_node=&quot;&quot;&gt;Seizures&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;2863&quot; instrument_node=&quot;&quot;&gt;
