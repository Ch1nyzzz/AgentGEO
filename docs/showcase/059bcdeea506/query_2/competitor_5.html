&lt;/span&gt;&lt;p data-dcnode-id=&quot;2858&quot;&gt;&lt;span data-dcnode-id=&quot;2862&quot; instrument_node=&quot;&quot;&gt;There is some clinical evidence that stimulants may lower the convulsive threshold in patients with prior history of seizures, in patients with prior &lt;/span&gt;&lt;a data-dcnode-id=&quot;2860&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/eeg/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;2861&quot; instrument_node=&quot;&quot;&gt;EEG&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2859&quot; instrument_node=&quot;&quot;&gt; abnormalities in the absence of seizures, and very rarely, in patients without a history of seizures and no prior EEG evidence of seizures. In the presence of seizures, ADDERALL XR should be discontinued.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2857&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 data-dcnode-id=&quot;2855&quot;&gt;&lt;span data-dcnode-id=&quot;2856&quot; instrument_node=&quot;&quot;&gt;Peripheral Vasculopathy, Including Raynaudâ€™s Phenomenon&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;2854&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2840&quot;&gt;&lt;span data-dcnode-id=&quot;2853&quot; instrument_node=&quot;&quot;&gt;Stimulants, including ADDERALL XR, used to treat ADHD are associated with peripheral vasculopathy, including Raynaudâ€™s phenomenon. Signs and symptoms are usually intermittent and mild; however, very rare &lt;/span&gt;&lt;a data-dcnode-id=&quot;2851&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/sequelae/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;2852&quot; instrument_node=&quot;&quot;&gt;sequelae&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2850&quot; instrument_node=&quot;&quot;&gt; include digital &lt;/span&gt;&lt;a data-dcnode-id=&quot;2848&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/ulceration/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;2849&quot; instrument_node=&quot;&quot;&gt;ulceration&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2847&quot; instrument_node=&quot;&quot;&gt; and/or soft tissue breakdown. Effects of peripheral vasculopathy, including Raynaudâ€™s phenomenon, were observed in post-marketing reports at different times and at therapeutic doses in all age groups throughout the course of treatment. Signs and symptoms generally improve after reduction in dose or discontinuation of drug. Careful observation for digital changes is necessary during treatment with ADHD stimulants. Further clinical evaluation (e.g., &lt;/span&gt;&lt;a data-dcnode-id=&quot;2845&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/rheumatology/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;2846&quot; instrument_node=&quot;&quot;&gt;rheumatology&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2844&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a data-dcnode-id=&quot;2842&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/referral/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;2843&quot; instrument_node=&quot;&quot;&gt;referral&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2841&quot; instrument_node=&quot;&quot;&gt;) may be appropriate for certain patients.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2839&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 data-dcnode-id=&quot;2837&quot;&gt;&lt;span data-dcnode-id=&quot;2838&quot; instrument_node=&quot;&quot;&gt;Serotonin Syndrome&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;2836&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2784&quot;&gt;&lt;a data-dcnode-id=&quot;2834&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/serotonin/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;2835&quot; instrument_node=&quot;&quot;&gt;Serotonin&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2833&quot; instrument_node=&quot;&quot;&gt; syndrome, a potentially life-threatening reaction, may occur when amphetamines are used in combination with other drugs that affect the serotonergic &lt;/span&gt;&lt;a data-dcnode-id=&quot;2831&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/neurotransmitter/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;2832&quot; instrument_node=&quot;&quot;&gt;neurotransmitter&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2830&quot; instrument_node=&quot;&quot;&gt; systems such as MAOIs, selective serotonin &lt;/span&gt;&lt;a data-dcnode-id=&quot;2828&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/reuptake/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;2829&quot; instrument_node=&quot;&quot;&gt;reuptake&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2827&quot; instrument_node=&quot;&quot;&gt; inhibitors (SSRIs), serotonin norepinephrine reuptake inhibitors (SNRIs), triptans, &lt;/span&gt;&lt;a data-dcnode-id=&quot;2825&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/tricyclic_antidepressants/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;2826&quot; instrument_node=&quot;&quot;&gt;tricyclic antidepressants&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2824&quot; instrument_node=&quot;&quot;&gt;, fentanyl, &lt;/span&gt;&lt;a data-dcnode-id=&quot;2822&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/lithium/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;2823&quot; instrument_node=&quot;&quot;&gt;lithium&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2821&quot; instrument_node=&quot;&quot;&gt;, tramadol, &lt;/span&gt;&lt;a data-dcnode-id=&quot;2819&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/tryptophan/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;2820&quot; instrument_node=&quot;&quot;&gt;tryptophan&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2818&quot; instrument_node=&quot;&quot;&gt;, buspirone, and St. Johnâ€™s Wort [see&lt;/span&gt;&lt;b data-dcnode-id=&quot;2816&quot;&gt;&lt;span data-dcnode-id=&quot;2817&quot; instrument_node=&quot;&quot;&gt; DRUG INTERACTIONS&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;2815&quot; instrument_node=&quot;&quot;&gt;]. Amphetamines and amphetamine derivatives are known to be metabolized, to some degree, by cytochrome P450 2D6 (CYP2D6) and display minor inhibition of CYP2D6 &lt;/span&gt;&lt;a data-dcnode-id=&quot;2813&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/metabolism/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;2814&quot; instrument_node=&quot;&quot;&gt;metabolism&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2812&quot; instrument_node=&quot;&quot;&gt; [see&lt;/span&gt;&lt;b data-dcnode-id=&quot;2810&quot;&gt;&lt;span data-dcnode-id=&quot;2811&quot; instrument_node=&quot;&quot;&gt; CLINICAL PHARMACOLOGY&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;2809&quot; instrument_node=&quot;&quot;&gt;]. The potential for a pharmacokinetic interaction exists with the co-administration of CYP2D6 inhibitors which may increase the risk with increased exposure to ADDERALL XR. In these situations, consider an alternative non-serotonergic drug or an alternative drug that does not inhibit CYP2D6 [see &lt;/span&gt;&lt;b data-dcnode-id=&quot;2807&quot;&gt;&lt;span data-dcnode-id=&quot;2808&quot; instrument_node=&quot;&quot;&gt;DRUG INTERACTIONS&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;2806&quot; instrument_node=&quot;&quot;&gt;]. Serotonin syndrome symptoms may include mental status changes (e.g., agitation, hallucinations, &lt;/span&gt;&lt;a data-dcnode-id=&quot;2804&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/delirium/symptoms.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;sym&quot;&gt;&lt;span data-dcnode-id=&quot;2805&quot; instrument_node=&quot;&quot;&gt;delirium&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2803&quot; instrument_node=&quot;&quot;&gt;, and coma), autonomic instability (e.g., tachycardia, &lt;/span&gt;&lt;a data-dcnode-id=&quot;2801&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/labile/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;2802&quot; instrument_node=&quot;&quot;&gt;labile&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2800&quot; instrument_node=&quot;&quot;&gt; blood pressure, dizziness, diaphoresis, flushing, &lt;/span&gt;&lt;a data-dcnode-id=&quot;2798&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/hyperthermia/article.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dt&quot;&gt;&lt;span data-dcnode-id=&quot;2799&quot; instrument_node=&quot;&quot;&gt;hyperthermia&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2797&quot; instrument_node=&quot;&quot;&gt;), &lt;/span&gt;&lt;a data-dcnode-id=&quot;2795&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/neuromuscular/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;2796&quot; instrument_node=&quot;&quot;&gt;neuromuscular&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2794&quot; instrument_node=&quot;&quot;&gt; symptoms (e.g., &lt;/span&gt;&lt;a data-dcnode-id=&quot;2792&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/tremor/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;2793&quot; instrument_node=&quot;&quot;&gt;tremor&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2791&quot; instrument_node=&quot;&quot;&gt;, rigidity, &lt;/span&gt;&lt;a data-dcnode-id=&quot;2789&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/myoclonus/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;2790&quot; instrument_node=&quot;&quot;&gt;myoclonus&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2788&quot; instrument_node=&quot;&quot;&gt;, hyperreflexia, incoordination), seizures, and/or &lt;/span&gt;&lt;a data-dcnode-id=&quot;2786&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/gastrointestinal/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;2787&quot; instrument_node=&quot;&quot;&gt;gastrointestinal&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2785&quot; instrument_node=&quot;&quot;&gt; symptoms (e.g., nausea, vomiting, diarrhea).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2783&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2775&quot;&gt;&lt;span data-dcnode-id=&quot;2782&quot; instrument_node=&quot;&quot;&gt;Concomitant use of ADDERALL XR with &lt;/span&gt;&lt;a data-dcnode-id=&quot;2780&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/maoi/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;2781&quot; instrument_node=&quot;&quot;&gt;MAOI&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2779&quot; instrument_node=&quot;&quot;&gt; drugs is contraindicated [see&lt;/span&gt;&lt;b data-dcnode-id=&quot;2777&quot;&gt;&lt;span data-dcnode-id=&quot;2778&quot; instrument_node=&quot;&quot;&gt; CONTRAINDICATIONS&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;2776&quot; instrument_node=&quot;&quot;&gt;].&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2774&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2769&quot;&gt;&lt;span data-dcnode-id=&quot;2773&quot; instrument_node=&quot;&quot;&gt;Discontinue treatment with ADDERALL XR and any concomitant serotonergic agents immediately if symptoms of serotonin syndrome occur, and initiate supportive &lt;/span&gt;&lt;a data-dcnode-id=&quot;2771&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/symptomatic_treatment/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;2772&quot; instrument_node=&quot;&quot;&gt;symptomatic treatment&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2770&quot; instrument_node=&quot;&quot;&gt;. Concomitant use of ADDERALL XR with other serotonergic drugs or CYP2D6 inhibitors should be used only if the potential benefit justifies the potential risk. If clinically warranted, consider initiating ADDERALL XR with lower doses, monitoring patients for the emergence of serotonin syndrome during drug initiation or titration, and informing patients of the increased risk for serotonin syndrome.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2768&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 data-dcnode-id=&quot;2766&quot;&gt;&lt;span data-dcnode-id=&quot;2767&quot; instrument_node=&quot;&quot;&gt;Visual Disturbance&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;2765&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2760&quot;&gt;&lt;span data-dcnode-id=&quot;2764&quot; instrument_node=&quot;&quot;&gt;Difficulties with &lt;/span&gt;&lt;a data-dcnode-id=&quot;2762&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/accommodation/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;2763&quot; instrument_node=&quot;&quot;&gt;accommodation&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2761&quot; instrument_node=&quot;&quot;&gt; and blurring of vision have been reported with stimulant treatment.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2759&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 data-dcnode-id=&quot;2757&quot;&gt;&lt;span data-dcnode-id=&quot;2758&quot; instrument_node=&quot;&quot;&gt;Tics&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;2756&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2754&quot;&gt;&lt;span data-dcnode-id=&quot;2755&quot; instrument_node=&quot;&quot;&gt;Amphetamines have been reported to exacerbate motor and phonic tics and Touretteâ€™s syndrome. Therefore, clinical evaluation for tics and Touretteâ€™s syndrome in patients and their families should precede use of stimulant medications.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2753&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 data-dcnode-id=&quot;2751&quot;&gt;&lt;span data-dcnode-id=&quot;2752&quot; instrument_node=&quot;&quot;&gt;Prescribing And Dispensing&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;2750&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2748&quot;&gt;&lt;span data-dcnode-id=&quot;2749&quot; instrument_node=&quot;&quot;&gt;The least amount of amphetamine feasible should be prescribed or dispensed at one time in order to minimize the possibility of overdosage. ADDERALL XR should be used with caution in patients who use other sympathomimetic drugs.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2747&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 data-dcnode-id=&quot;2745&quot;&gt;&lt;span data-dcnode-id=&quot;2746&quot; instrument_node=&quot;&quot;&gt;Patient Counseling Information&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;2744&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2739&quot;&gt;&lt;span data-dcnode-id=&quot;2743&quot; instrument_node=&quot;&quot;&gt;Advise the patient to read the FDA-approved patient labeling (&lt;/span&gt;&lt;b data-dcnode-id=&quot;2741&quot;&gt;&lt;span data-dcnode-id=&quot;2742&quot; instrument_node=&quot;&quot;&gt;Medication Guide&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;2740&quot; instrument_node=&quot;&quot;&gt;).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2738&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h5 data-dcnode-id=&quot;2736&quot;&gt;&lt;span data-dcnode-id=&quot;2737&quot; instrument_node=&quot;&quot;&gt;Controlled Substance Status/Potential For Abuse, Misuse, And Dependence&lt;/span&gt;&lt;/h5&gt;&lt;span data-dcnode-id=&quot;2735&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2727&quot;&gt;&lt;span data-dcnode-id=&quot;2734&quot; instrument_node=&quot;&quot;&gt;Advise patients that ADDERALL XR is a federally controlled substance because it can be abused or lead to dependence. Additionally, emphasize that ADDERALL XR should be stored in a safe place to prevent misuse and/or abuse. Evaluate patient history (including family history) of abuse or dependence on alcohol, prescription medicines, or illicit drugs [see &lt;/span&gt;&lt;b data-dcnode-id=&quot;2732&quot;&gt;&lt;span data-dcnode-id=&quot;2733&quot; instrument_node=&quot;&quot;&gt;WARNINGS AND PRECAUTIONS&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;2731&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;b data-dcnode-id=&quot;2729&quot;&gt;&lt;span data-dcnode-id=&quot;2730&quot; instrument_node=&quot;&quot;&gt;Drug Abuse And Dependence&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;2728&quot; instrument_node=&quot;&quot;&gt;].&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2726&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h5 data-dcnode-id=&quot;2724&quot;&gt;&lt;span data-dcnode-id=&quot;2725&quot; instrument_node=&quot;&quot;&gt;Serious Cardiovascular Risks&lt;/span&gt;&lt;/h5&gt;&lt;span data-dcnode-id=&quot;2723&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2715&quot;&gt;&lt;span data-dcnode-id=&quot;2722&quot; instrument_node=&quot;&quot;&gt;Advise patients of serious &lt;/span&gt;&lt;a data-dcnode-id=&quot;2720&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/cardiovascular/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;2721&quot; instrument_node=&quot;&quot;&gt;cardiovascular&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2719&quot; instrument_node=&quot;&quot;&gt; risk (including sudden death, myocardial infarction, stroke, and hypertension) with ADDERALL XR. Patients who develop symptoms such as exertional chest pain, unexplained syncope, or other symptoms suggestive of cardiac disease during treatment should undergo a prompt cardiac evaluation [see &lt;/span&gt;&lt;b data-dcnode-id=&quot;2717&quot;&gt;&lt;span data-dcnode-id=&quot;2718&quot; instrument_node=&quot;&quot;&gt;WARNINGS AND PRECAUTIONS&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;2716&quot; instrument_node=&quot;&quot;&gt;].&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2714&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h5 data-dcnode-id=&quot;2712&quot;&gt;&lt;span data-dcnode-id=&quot;2713&quot; instrument_node=&quot;&quot;&gt;Psychiatric Risks&lt;/span&gt;&lt;/h5&gt;&lt;span data-dcnode-id=&quot;2711&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2706&quot;&gt;&lt;span data-dcnode-id=&quot;2710&quot; instrument_node=&quot;&quot;&gt;Prior to initiating treatment with ADDERALL XR, adequately screen patients with comorbid depressive symptoms to determine if they are at risk for bipolar disorder. Such screening should include a detailed psychiatric history, including a family history of suicide, bipolar disorder, and/or depression. Additionally, ADDERALL XR therapy at usual doses may cause treatment-emergent psychotic or manic symptoms in patients without prior history of psychotic symptoms or mania [see&lt;/span&gt;&lt;b data-dcnode-id=&quot;2708&quot;&gt;&lt;span data-dcnode-id=&quot;2709&quot; instrument_node=&quot;&quot;&gt; WARNINGS AND PRECAUTIONS&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;2707&quot; instrument_node=&quot;&quot;&gt;].&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2705&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h5 data-dcnode-id=&quot;2703&quot;&gt;&lt;span data-dcnode-id=&quot;2704&quot; instrument_node=&quot;&quot;&gt;Circulation Problems In Fingers And Toes [Peripheral vasculopathy, including Raynaudâ€™s phenomenon]&lt;/span&gt;&lt;/h5&gt;&lt;span data-dcnode-id=&quot;2702&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2697&quot;&gt;&lt;span data-dcnode-id=&quot;2701&quot; instrument_node=&quot;&quot;&gt;Instruct patients beginning treatment with ADDERALL XR about the risk of peripheral vasculopathy, including Raynaudâ€™s Phenomenon, and in associated signs and symptoms: fingers or toes may feel numb, cool, painful, and/or may change color from pale, to blue, to red. Instruct patients to report to their physician any new numbness, pain, skin color change, or sensitivity to temperature in fingers or toes. Instruct patients to call their physician immediately with any signs of unexplained wounds appearing on fingers or toes while taking ADDERALL XR. Further clinical evaluation (e.g., rheumatology referral) may be appropriate for certain patients [see &lt;/span&gt;&lt;b data-dcnode-id=&quot;2699&quot;&gt;&lt;span data-dcnode-id=&quot;2700&quot; instrument_node=&quot;&quot;&gt;WARNINGS AND PRECAUTIONS&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;2698&quot; instrument_node=&quot;&quot;&gt;].&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2696&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h5 data-dcnode-id=&quot;2694&quot;&gt;&lt;span data-dcnode-id=&quot;2695&quot; instrument_node=&quot;&quot;&gt;Serotonin Syndrome&lt;/span&gt;&lt;/h5&gt;&lt;span data-dcnode-id=&quot;2693&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2679&quot;&gt;&lt;span data-dcnode-id=&quot;2692&quot; instrument_node=&quot;&quot;&gt;Caution patients about the risk of serotonin syndrome with concomitant use of ADDERALL XR and other serotonergic drugs including SSRIs, SNRIs, triptans, tricyclic &lt;/span&gt;&lt;a data-dcnode-id=&quot;2690&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/antidepressants/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;2691&quot; instrument_node=&quot;&quot;&gt;antidepressants&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2689&quot; instrument_node=&quot;&quot;&gt;, fentanyl, lithium, tramadol, tryptophan, buspirone, St. Johnâ€™s Wort, and with drugs that impair metabolism of serotonin (in particular MAOIs, both those intended to treat psychiatric disorders and also others such as linezolid [see &lt;/span&gt;&lt;b data-dcnode-id=&quot;2687&quot;&gt;&lt;span data-dcnode-id=&quot;2688&quot; instrument_node=&quot;&quot;&gt;CONTRAINDICATIONS&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;2686&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;b data-dcnode-id=&quot;2684&quot;&gt;&lt;span data-dcnode-id=&quot;2685&quot; instrument_node=&quot;&quot;&gt;WARNINGS AND PRECAUTIONS&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;2683&quot; instrument_node=&quot;&quot;&gt; and &lt;/span&gt;&lt;b data-dcnode-id=&quot;2681&quot;&gt;&lt;span data-dcnode-id=&quot;2682&quot; instrument_node=&quot;&quot;&gt;DRUG INTERACTIONS&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;2680&quot; instrument_node=&quot;&quot;&gt;]. Advise patients to contact their healthcare provider or report to the emergency room if they experience signs or symptoms of serotonin syndrome.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2678&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h5 data-dcnode-id=&quot;2676&quot;&gt;&lt;span data-dcnode-id=&quot;2677&quot; instrument_node=&quot;&quot;&gt;Concomitant Medications&lt;/span&gt;&lt;/h5&gt;&lt;span data-dcnode-id=&quot;2675&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2670&quot;&gt;&lt;span data-dcnode-id=&quot;2674&quot; instrument_node=&quot;&quot;&gt;Advise patients to notify their physicians if they are taking, or plan to take, any prescription or over-thecounter drugs because there is a potential for interactions [see&lt;/span&gt;&lt;b data-dcnode-id=&quot;2672&quot;&gt;&lt;span data-dcnode-id=&quot;2673&quot; instrument_node=&quot;&quot;&gt; DRUG INTERACTIONS&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;2671&quot; instrument_node=&quot;&quot;&gt;].&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2669&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h5 data-dcnode-id=&quot;2667&quot;&gt;&lt;span data-dcnode-id=&quot;2668&quot; instrument_node=&quot;&quot;&gt;Growth&lt;/span&gt;&lt;/h5&gt;&lt;span data-dcnode-id=&quot;2666&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2661&quot;&gt;&lt;span data-dcnode-id=&quot;2665&quot; instrument_node=&quot;&quot;&gt;Monitor growth in children during treatment with ADDERALL XR, and patients who are not growing or gaining weight as expected may need to have their treatment interrupted [see&lt;/span&gt;&lt;b data-dcnode-id=&quot;2663&quot;&gt;&lt;span data-dcnode-id=&quot;2664&quot; instrument_node=&quot;&quot;&gt; WARNINGS AND PRECAUTIONS&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;2662&quot; instrument_node=&quot;&quot;&gt;].&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2660&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h5 data-dcnode-id=&quot;2658&quot;&gt;&lt;span data-dcnode-id=&quot;2659&quot; instrument_node=&quot;&quot;&gt;Pregnancy Registry&lt;/span&gt;&lt;/h5&gt;&lt;span data-dcnode-id=&quot;2657&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2652&quot;&gt;&lt;span data-dcnode-id=&quot;2656&quot; instrument_node=&quot;&quot;&gt;Advise patients that there is a pregnancy exposure registry that monitors pregnancy outcomes in women exposed to ADDERALL XR during pregnancy [see &lt;/span&gt;&lt;b data-dcnode-id=&quot;2654&quot;&gt;&lt;span data-dcnode-id=&quot;2655&quot; instrument_node=&quot;&quot;&gt;Use In Specific Populations&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;2653&quot; instrument_node=&quot;&quot;&gt;].&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2651&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h5 data-dcnode-id=&quot;2649&quot;&gt;&lt;span data-dcnode-id=&quot;2650&quot; instrument_node=&quot;&quot;&gt;Pregnancy&lt;/span&gt;&lt;/h5&gt;&lt;span data-dcnode-id=&quot;2648&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2643&quot;&gt;&lt;span data-dcnode-id=&quot;2647&quot; instrument_node=&quot;&quot;&gt;Advise patients to notify their healthcare provider if they become pregnant or intend to become pregnant during treatment with ADDERALL XR. Advise patients of the potential fetal effects from the use of ADDERALL XR during pregnancy [see &lt;/span&gt;&lt;b data-dcnode-id=&quot;2645&quot;&gt;&lt;span data-dcnode-id=&quot;2646&quot; instrument_node=&quot;&quot;&gt;Use In Specific Populations&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;2644&quot; instrument_node=&quot;&quot;&gt;].&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2642&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h5 data-dcnode-id=&quot;2640&quot;&gt;&lt;span data-dcnode-id=&quot;2641&quot; instrument_node=&quot;&quot;&gt;Lactation&lt;/span&gt;&lt;/h5&gt;&lt;span data-dcnode-id=&quot;2639&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2634&quot;&gt;&lt;span data-dcnode-id=&quot;2638&quot; instrument_node=&quot;&quot;&gt;Advise women not to breastfeed if they are taking ADDERALL XR [see &lt;/span&gt;&lt;b data-dcnode-id=&quot;2636&quot;&gt;&lt;span data-dcnode-id=&quot;2637&quot; instrument_node=&quot;&quot;&gt;Use In Specific Populations&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;2635&quot; instrument_node=&quot;&quot;&gt;].&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2633&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h5 data-dcnode-id=&quot;2631&quot;&gt;&lt;span data-dcnode-id=&quot;2632&quot; instrument_node=&quot;&quot;&gt;Impairment In Ability To Operate Machinery Or Vehicles&lt;/span&gt;&lt;/h5&gt;&lt;span data-dcnode-id=&quot;2630&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2628&quot;&gt;&lt;span data-dcnode-id=&quot;2629&quot; instrument_node=&quot;&quot;&gt;ADDERALL XR may impair the ability of the patient to engage in potentially hazardous activities such as operating machinery or vehicles; the patient should therefore be cautioned accordingly.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2627&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 data-dcnode-id=&quot;2625&quot;&gt;&lt;span data-dcnode-id=&quot;2626&quot; instrument_node=&quot;&quot;&gt;Nonclinical Toxicology&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;2624&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 data-dcnode-id=&quot;2622&quot;&gt;&lt;span data-dcnode-id=&quot;2623&quot; instrument_node=&quot;&quot;&gt;Carcinogenesis, Mutagenesis, Impairment Of Fertility&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;2621&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h5 data-dcnode-id=&quot;2619&quot;&gt;&lt;span data-dcnode-id=&quot;2620&quot; instrument_node=&quot;&quot;&gt;Carcinogenesis&lt;/span&gt;&lt;/h5&gt;&lt;span data-dcnode-id=&quot;2618&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2616&quot;&gt;&lt;span data-dcnode-id=&quot;2617&quot; instrument_node=&quot;&quot;&gt;No evidence of carcinogenicity was found in studies in which d,l-amphetamine (enantiomer ratio of 1:1) was administered to mice and rats in the diet for 2 years at doses of up to 30 mg/kg/day in male mice, 19 mg/kg/day in female mice, and 5 mg/kg/day in male and female rats. These doses are approximately 2.4, 1.5, and 0.8 times, respectively, the maximum recommended human dose of 30 mg/day given to children, on a mg/m² basis.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2615&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h5 data-dcnode-id=&quot;2613&quot;&gt;&lt;span data-dcnode-id=&quot;2614&quot; instrument_node=&quot;&quot;&gt;Mutagenesis&lt;/span&gt;&lt;/h5&gt;&lt;span data-dcnode-id=&quot;2612&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2601&quot;&gt;&lt;span data-dcnode-id=&quot;2611&quot; instrument_node=&quot;&quot;&gt;Amphetamine, in the enantiomer ratio d-to l-ratio of 3:1, was not clastogenic in the mouse &lt;/span&gt;&lt;a data-dcnode-id=&quot;2609&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/bone_marrow/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;2610&quot; instrument_node=&quot;&quot;&gt;bone marrow&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2608&quot; instrument_node=&quot;&quot;&gt; micronucleus test in vivo and was negative when tested in the &lt;/span&gt;&lt;i data-dcnode-id=&quot;2606&quot;&gt;&lt;span data-dcnode-id=&quot;2607&quot; instrument_node=&quot;&quot;&gt;E. coli&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;2605&quot; instrument_node=&quot;&quot;&gt; component of the &lt;/span&gt;&lt;a data-dcnode-id=&quot;2603&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/ames_test/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;2604&quot; instrument_node=&quot;&quot;&gt;Ames test&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2602&quot; instrument_node=&quot;&quot;&gt; in vitro. d,l-Amphetamine (1:1 enantiomer ratio) has been reported to produce a positive response in the mouse bone marrow micronucleus test, an equivocal response in the Ames test, and negative responses in the in vitro sister chromatid exchange and chromosomal aberration assays.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2600&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h5 data-dcnode-id=&quot;2598&quot;&gt;&lt;span data-dcnode-id=&quot;2599&quot; instrument_node=&quot;&quot;&gt;Impairment Of Fertility&lt;/span&gt;&lt;/h5&gt;&lt;span data-dcnode-id=&quot;2597&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2595&quot;&gt;&lt;span data-dcnode-id=&quot;2596&quot; instrument_node=&quot;&quot;&gt;Amphetamine, in the enantiomer ratio d-to l-ratio of 3:1, did not adversely affect fertility or early embryonic development in the rat at doses of up to 20 mg/kg/day (approximately 8 times the maximum recommended human dose of 20 mg/day given to adolescents, on a mg/m² basis).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2594&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;a data-dcnode-id=&quot;2593&quot; name=&quot;USP&quot;&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2592&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 data-dcnode-id=&quot;2590&quot;&gt;&lt;span data-dcnode-id=&quot;2591&quot; instrument_node=&quot;&quot;&gt;Use In Specific Populations&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;2589&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 data-dcnode-id=&quot;2587&quot;&gt;&lt;span data-dcnode-id=&quot;2588&quot; instrument_node=&quot;&quot;&gt;Pregnancy&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;2586&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h5 data-dcnode-id=&quot;2584&quot;&gt;&lt;span data-dcnode-id=&quot;2585&quot; instrument_node=&quot;&quot;&gt;Pregnancy Exposure Registry&lt;/span&gt;&lt;/h5&gt;&lt;span data-dcnode-id=&quot;2583&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2581&quot;&gt;&lt;span data-dcnode-id=&quot;2582&quot; instrument_node=&quot;&quot;&gt;There is a pregnancy exposure registry that monitors pregnancy outcomes in women exposed to ADDERALL XR during pregnancy. Healthcare providers are encouraged to register patients by calling the National Pregnancy Registry for Psychostimulants at 1-866-961-2388 or visiting online at https://womensmentalhealth.org/clinical-and-research-programs/pregnancyregistry/othermedications/.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2580&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h5 data-dcnode-id=&quot;2578&quot;&gt;&lt;span data-dcnode-id=&quot;2579&quot; instrument_node=&quot;&quot;&gt;Risk Summary&lt;/span&gt;&lt;/h5&gt;&lt;span data-dcnode-id=&quot;2577&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2563&quot;&gt;&lt;span data-dcnode-id=&quot;2576&quot; instrument_node=&quot;&quot;&gt;Available data from published epidemiologic studies and postmarketing reports on use of prescription amphetamine in pregnant women have not identified a drug-associated risk of major &lt;/span&gt;&lt;a data-dcnode-id=&quot;2574&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/birth_defects/article.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dt&quot;&gt;&lt;span data-dcnode-id=&quot;2575&quot; instrument_node=&quot;&quot;&gt;birth defects&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2573&quot; instrument_node=&quot;&quot;&gt; and &lt;/span&gt;&lt;a data-dcnode-id=&quot;2571&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/miscarriage_causes_and_symptoms/article.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dt&quot;&gt;&lt;span data-dcnode-id=&quot;2572&quot; instrument_node=&quot;&quot;&gt;miscarriage&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2570&quot; instrument_node=&quot;&quot;&gt; (see &lt;/span&gt;&lt;b data-dcnode-id=&quot;2568&quot;&gt;&lt;span data-dcnode-id=&quot;2569&quot; instrument_node=&quot;&quot;&gt;Data&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;2567&quot; instrument_node=&quot;&quot;&gt;). Adverse pregnancy outcomes, including premature delivery and low birth weight, have been seen in infants born to mothers taking amphetamines during pregnancy (see&lt;/span&gt;&lt;b data-dcnode-id=&quot;2565&quot;&gt;&lt;span data-dcnode-id=&quot;2566&quot; instrument_node=&quot;&quot;&gt; Clinical Considerations&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;2564&quot; instrument_node=&quot;&quot;&gt;).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2562&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2557&quot;&gt;&lt;span data-dcnode-id=&quot;2561&quot; instrument_node=&quot;&quot;&gt;No apparent effects on morphological development were observed in embryo-fetal development studies, with oral administration of amphetamine to rats and rabbits during organogenesis at doses 2 and 12 times, respectively, the maximum recommended human dose (MRHD) of 20 mg/day given to adolescents, on a mg/m² basis. However, in a pre-and post-natal development study, amphetamine (d-to l-ratio of 3:1) administered orally to pregnant rats during gestation and lactation caused a decrease in pup survival and a decrease in pup body weight that correlated with a delay in developmental landmarks at clinically relevant doses of amphetamine. In addition, adverse effects on reproductive performance were observed in pups whose mothers were treated with amphetamine. Long-term neurochemical and behavioral effects have also been reported in animal developmental studies using clinically relevant doses of amphetamine (see&lt;/span&gt;&lt;b data-dcnode-id=&quot;2559&quot;&gt;&lt;span data-dcnode-id=&quot;2560&quot; instrument_node=&quot;&quot;&gt; Data&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;2558&quot; instrument_node=&quot;&quot;&gt;).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2556&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2551&quot;&gt;&lt;span data-dcnode-id=&quot;2555&quot; instrument_node=&quot;&quot;&gt;The estimated background risk of major birth defects and miscarriage for the indicated population is unknown. All pregnancies have a background risk of &lt;/span&gt;&lt;a data-dcnode-id=&quot;2553&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/birth_defect/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;2554&quot; instrument_node=&quot;&quot;&gt;birth defect&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2552&quot; instrument_node=&quot;&quot;&gt;, loss, or other adverse outcomes. In the U.S. general population, the estimated background risk of major birth defects and miscarriage in clinically recognized pregnancies is 2-4% and 15-20%, respectively.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2550&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h5 data-dcnode-id=&quot;2548&quot;&gt;&lt;span data-dcnode-id=&quot;2549&quot; instrument_node=&quot;&quot;&gt;Clinical Considerations&lt;/span&gt;&lt;/h5&gt;&lt;span data-dcnode-id=&quot;2547&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2544&quot;&gt;&lt;i data-dcnode-id=&quot;2545&quot;&gt;&lt;span data-dcnode-id=&quot;2546&quot; instrument_node=&quot;&quot;&gt;Fetal/Neonatal Adverse Reactions&lt;/span&gt;&lt;/i&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2543&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2535&quot;&gt;&lt;span data-dcnode-id=&quot;2542&quot; instrument_node=&quot;&quot;&gt;Amphetamines, such as ADDERALL XR, cause &lt;/span&gt;&lt;a data-dcnode-id=&quot;2540&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/vasoconstriction/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;2541&quot; instrument_node=&quot;&quot;&gt;vasoconstriction&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2539&quot; instrument_node=&quot;&quot;&gt; and thereby may decrease placental &lt;/span&gt;&lt;a data-dcnode-id=&quot;2537&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/perfusion/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;2538&quot; instrument_node=&quot;&quot;&gt;perfusion&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2536&quot; instrument_node=&quot;&quot;&gt;. In addition, amphetamines can stimulate uterine contractions, increasing the risk of premature delivery. Infants born to mothers taking amphetamines during pregnancy have an increased risk of premature delivery and low birth weight.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2534&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2532&quot;&gt;&lt;span data-dcnode-id=&quot;2533&quot; instrument_node=&quot;&quot;&gt;Monitor infants born to mothers taking amphetamines for symptoms of withdrawal such as feeding difficulties, irritability, agitation, and excessive drowsiness.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2531&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h5 data-dcnode-id=&quot;2529&quot;&gt;&lt;span data-dcnode-id=&quot;2530&quot; instrument_node=&quot;&quot;&gt;Data&lt;/span&gt;&lt;/h5&gt;&lt;span data-dcnode-id=&quot;2528&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2525&quot;&gt;&lt;i data-dcnode-id=&quot;2526&quot;&gt;&lt;span data-dcnode-id=&quot;2527&quot; instrument_node=&quot;&quot;&gt;Animal Data&lt;/span&gt;&lt;/i&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2524&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2519&quot;&gt;&lt;span data-dcnode-id=&quot;2523&quot; instrument_node=&quot;&quot;&gt;Amphetamine (d-to l-enantiomer ratio of 3:1) had no apparent effects on embryofetal morphological development or survival when administered orally to pregnant rats and rabbits throughout the period of organogenesis at doses of up to 6 and 16 mg/kg/day, respectively. These doses are approximately 2 and 12 times, respectively, the maximum recommended human dose (MRHD) of 20 mg/day given to adolescents, on a mg/m² basis. Fetal malformations and death have been reported in mice following &lt;/span&gt;&lt;a data-dcnode-id=&quot;2521&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/parenteral/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;2522&quot; instrument_node=&quot;&quot;&gt;parenteral&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2520&quot; instrument_node=&quot;&quot;&gt; administration of d-amphetamine doses of 50 mg/kg/day (approximately 10 times the MRHD given to adolescents on a mg/m² basis) or greater to pregnant animals. Administration of these doses was also associated with severe maternal toxicity.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2518&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2507&quot;&gt;&lt;span data-dcnode-id=&quot;2517&quot; instrument_node=&quot;&quot;&gt;A study was conducted in which pregnant rats received daily oral doses of amphetamine (d-to lenantiomer ratio of 3:1) of 2, 6, and 10 mg/kg from gestation day 6 to lactation day 20. These doses are approximately 0.8, 2, and 4 times the MRHD of 20 mg/day given to adolescents, on a mg/m² basis. All doses caused hyperactivity and decreased &lt;/span&gt;&lt;a data-dcnode-id=&quot;2515&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/weight_gain/symptoms.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;sym&quot;&gt;&lt;span data-dcnode-id=&quot;2516&quot; instrument_node=&quot;&quot;&gt;weight gain&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2514&quot; instrument_node=&quot;&quot;&gt; in the dams. A decrease in pup survival was seen at all doses. A decrease in pup body weight was seen at 6 and 10 mg/kg which correlated with delays in developmental landmarks, such as preputial separation and &lt;/span&gt;&lt;a data-dcnode-id=&quot;2512&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/vaginal_opening/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;2513&quot; instrument_node=&quot;&quot;&gt;vaginal opening&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2511&quot; instrument_node=&quot;&quot;&gt;. Increased pup locomotor activity was seen at 10 mg/kg on day 22 &lt;/span&gt;&lt;a data-dcnode-id=&quot;2509&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/postpartum/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;2510&quot; instrument_node=&quot;&quot;&gt;postpartum&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2508&quot; instrument_node=&quot;&quot;&gt; but not at 5 weeks postweaning. When pups were tested for reproductive performance at maturation, gestational weight gain, number of implantations, and number of delivered pups were decreased in the group whose mothers had been given 10 mg/kg.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2506&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2501&quot;&gt;&lt;span data-dcnode-id=&quot;2505&quot; instrument_node=&quot;&quot;&gt;A number of studies from the literature in rodents indicate that &lt;/span&gt;&lt;a data-dcnode-id=&quot;2503&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/prenatal/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;2504&quot; instrument_node=&quot;&quot;&gt;prenatal&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2502&quot; instrument_node=&quot;&quot;&gt; or early postnatal exposure to amphetamine (d-or d, l-) at doses similar to those used clinically can result in long-term neurochemical and behavioral alterations. Reported behavioral effects include learning and memory deficits, altered locomotor activity, and changes in sexual function.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2500&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 data-dcnode-id=&quot;2498&quot;&gt;&lt;span data-dcnode-id=&quot;2499&quot; instrument_node=&quot;&quot;&gt;Lactation&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;2497&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h5 data-dcnode-id=&quot;2495&quot;&gt;&lt;span data-dcnode-id=&quot;2496&quot; instrument_node=&quot;&quot;&gt;Risk Summary&lt;/span&gt;&lt;/h5&gt;&lt;span data-dcnode-id=&quot;2494&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2492&quot;&gt;&lt;span data-dcnode-id=&quot;2493&quot; instrument_node=&quot;&quot;&gt;Based on limited case reports in published literature, amphetamine (d-or d, l-) is present in human milk, at relative infant doses of 2% to 13.8% of the maternal weight-adjusted dosage and a milk/plasma ratio ranging between 1.9 and 7.5. There are no reports of adverse effects on the breastfed infant. Long-term neurodevelopmental effects on infants from amphetamine exposure are unknown. It is possible that large dosages of amphetamine might interfere with milk production, especially in women whose lactation is not well established. Because of the potential for serious adverse reactions in nursing infants, advise patients that breastfeeding is not recommended during treatment with ADDERALL XR.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2491&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 data-dcnode-id=&quot;2489&quot;&gt;&lt;span data-dcnode-id=&quot;2490&quot; instrument_node=&quot;&quot;&gt;Pediatric Use&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;2488&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2486&quot;&gt;&lt;span data-dcnode-id=&quot;2487&quot; instrument_node=&quot;&quot;&gt;ADDERALL XR is indicated for use in children 6 years of age and older.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2485&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2483&quot;&gt;&lt;span data-dcnode-id=&quot;2484&quot; instrument_node=&quot;&quot;&gt;The safety and efficacy of ADDERALL XR in children under 6 years of age have not been studied. Longterm effects of amphetamines in children have not been well established.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2482&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h5 data-dcnode-id=&quot;2480&quot;&gt;&lt;span data-dcnode-id=&quot;2481&quot; instrument_node=&quot;&quot;&gt;Long-Term Growth Suppression&lt;/span&gt;&lt;/h5&gt;&lt;span data-dcnode-id=&quot;2479&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2474&quot;&gt;&lt;span data-dcnode-id=&quot;2478&quot; instrument_node=&quot;&quot;&gt;Growth should be monitored during treatment with stimulants, including ADDERALL XR, and pediatric patients aged 6 to 17 years who are not growing or gaining weight as expected may need to have their treatment interrupted [see&lt;/span&gt;&lt;b data-dcnode-id=&quot;2476&quot;&gt;&lt;span data-dcnode-id=&quot;2477&quot; instrument_node=&quot;&quot;&gt; WARNINGS AND PRECAUTIONS&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;2475&quot; instrument_node=&quot;&quot;&gt;].&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2473&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h5 data-dcnode-id=&quot;2471&quot;&gt;&lt;span data-dcnode-id=&quot;2472&quot; instrument_node=&quot;&quot;&gt;Juvenile Animal Toxicity Data&lt;/span&gt;&lt;/h5&gt;&lt;span data-dcnode-id=&quot;2470&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2468&quot;&gt;&lt;span data-dcnode-id=&quot;2469&quot; instrument_node=&quot;&quot;&gt;Juvenile rats treated with mixed amphetamine salts early in the postnatal period through sexual maturation demonstrated transient changes in motor activity. Learning and memory was impaired at approximately 6 times the maximum recommended human dose (MRHD) given to children on a mg/m² basis. No recovery was seen following a drug free period. A delay in sexual maturation was observed at a dose approximately 6 times the MRHD given to children on a mg/m² basis, although there was no effect on fertility.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2467&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2462&quot;&gt;&lt;span data-dcnode-id=&quot;2466&quot; instrument_node=&quot;&quot;&gt;In a juvenile developmental study, rats received daily oral doses of amphetamine (d to l enantiomer ratio of 3:1) of 2, 6, or 20 mg/kg on days 7-13 of age; from day 14 to approximately day 60 of age these doses were given &lt;/span&gt;&lt;a data-dcnode-id=&quot;2464&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/bid_on_prescription/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;2465&quot; instrument_node=&quot;&quot;&gt;b.i.d. &lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2463&quot; instrument_node=&quot;&quot;&gt;for total daily doses of 4, 12, or 40 mg/kg. The latter doses are approximately 0.6, 2, and 6 times the MRHD of 30 mg/day, given to children on a mg/m² basis. Post dosing hyperactivity was seen at all doses; motor activity measured prior to the daily dose was decreased during the dosing period but the decreased motor activity was largely absent after an 18 day drug-free recovery period. Performance in the Morris water maze test for learning and memory was impaired at the 40 mg/kg dose, and sporadically at the lower doses, when measured prior to the daily dose during the treatment period; no recovery was seen after a 19 day drug-free period. A delay in the developmental milestones of vaginal opening and preputial separation was seen at 40 mg/kg but there was no effect on fertility.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2461&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 data-dcnode-id=&quot;2459&quot;&gt;&lt;span data-dcnode-id=&quot;2460&quot; instrument_node=&quot;&quot;&gt;Geriatric Use&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;2458&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2456&quot;&gt;&lt;span data-dcnode-id=&quot;2457&quot; instrument_node=&quot;&quot;&gt;ADDERALL XR has not been studied in the geriatric population.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2455&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 data-dcnode-id=&quot;2453&quot;&gt;&lt;span data-dcnode-id=&quot;2454&quot; instrument_node=&quot;&quot;&gt;Renal Impairment&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;2452&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2444&quot;&gt;&lt;span data-dcnode-id=&quot;2451&quot; instrument_node=&quot;&quot;&gt;Due to reduced clearance of amphetamines in patients with severe renal impairment (GFR 15 to &amp;lt;30 mL/min/1.73m²), the recommended dose should be reduced. ADDERALL XR is not recommended in patients with ESRD (GFR &amp;lt; 15 ml/min/1.73m²) [see &lt;/span&gt;&lt;b data-dcnode-id=&quot;2449&quot;&gt;&lt;span data-dcnode-id=&quot;2450&quot; instrument_node=&quot;&quot;&gt;DOSAGE AND ADMINISTRATION&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;2448&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;b data-dcnode-id=&quot;2446&quot;&gt;&lt;span data-dcnode-id=&quot;2447&quot; instrument_node=&quot;&quot;&gt;CLINICAL PHARMACOLOGY&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;2445&quot; instrument_node=&quot;&quot;&gt;].&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2443&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2441&quot;&gt;&lt;span data-dcnode-id=&quot;2442&quot; instrument_node=&quot;&quot;&gt;d-Amphetamine is not dialyzable.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2440&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;2438&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;2436&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;2434&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/section&gt;&lt;span data-dcnode-id=&quot;2432&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;section class=&quot;pageSection&quot; data-dcnode-id=&quot;2305&quot;&gt;&lt;span data-dcnode-id=&quot;2431&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;apPage&quot; data-dcnode-id=&quot;2307&quot; id=&quot;apPage&quot;&gt;&lt;span data-dcnode-id=&quot;2430&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;wrapper&quot; data-dcnode-id=&quot;2309&quot;&gt;&lt;span data-dcnode-id=&quot;2429&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;a class=&quot;bookmark&quot; data-dcnode-id=&quot;2428&quot; name=&quot;overdosage&quot;&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2427&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div data-dcnode-id=&quot;2421&quot; id=&quot;apPgNum&quot;&gt;&lt;span data-dcnode-id=&quot;2426&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div data-dcnode-id=&quot;2423&quot; itemscope=&quot;&quot; itemtype=&quot;https://schema.org/CreativeWork&quot;&gt;&lt;span data-dcnode-id=&quot;2424&quot; itemprop=&quot;alternativeHeadline&quot;&gt;&lt;span data-dcnode-id=&quot;2425&quot; instrument_node=&quot;&quot;&gt;Overdosage &amp;amp; Contraindications&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;2422&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;2420&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;pgContent&quot; data-dcnode-id=&quot;2313&quot;&gt;&lt;span data-dcnode-id=&quot;2419&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;2417&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;a data-dcnode-id=&quot;2416&quot; name=&quot;OD&quot;&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2415&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;2413&quot;&gt;&lt;span data-dcnode-id=&quot;2414&quot; instrument_node=&quot;&quot;&gt;OVERDOSE&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;2412&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2386&quot;&gt;&lt;span data-dcnode-id=&quot;2411&quot; instrument_node=&quot;&quot;&gt;Manifestations of amphetamine overdose include restlessness, tremor, hyperreflexia, rapid &lt;/span&gt;&lt;a data-dcnode-id=&quot;2409&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/respiration/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;2410&quot; instrument_node=&quot;&quot;&gt;respiration&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2408&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a data-dcnode-id=&quot;2406&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/confusion/symptoms.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;sym&quot;&gt;&lt;span data-dcnode-id=&quot;2407&quot; instrument_node=&quot;&quot;&gt;confusion&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2405&quot; instrument_node=&quot;&quot;&gt;, assaultiveness, hallucinations, panic states, hyperpyrexia and &lt;/span&gt;&lt;a data-dcnode-id=&quot;2403&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/rhabdomyolysis_symptoms_and_signs/symptoms.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;sym&quot;&gt;&lt;span data-dcnode-id=&quot;2404&quot; instrument_node=&quot;&quot;&gt;rhabdomyolysis&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2402&quot; instrument_node=&quot;&quot;&gt;. Fatigue and depression usually follow the &lt;/span&gt;&lt;a data-dcnode-id=&quot;2400&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/central_nervous_system_cns/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;2401&quot; instrument_node=&quot;&quot;&gt;central nervous system&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2399&quot; instrument_node=&quot;&quot;&gt; stimulation. Serotonin syndrome has been reported with amphetamine use, including ADDERALL XR. Cardiovascular effects include &lt;/span&gt;&lt;a data-dcnode-id=&quot;2397&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/heart_rhythm_disorders/article.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dt&quot;&gt;&lt;span data-dcnode-id=&quot;2398&quot; instrument_node=&quot;&quot;&gt;arrhythmias&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2396&quot; instrument_node=&quot;&quot;&gt;, hypertension or &lt;/span&gt;&lt;a data-dcnode-id=&quot;2394&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/hypotension/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;2395&quot; instrument_node=&quot;&quot;&gt;hypotension&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2393&quot; instrument_node=&quot;&quot;&gt; and &lt;/span&gt;&lt;a data-dcnode-id=&quot;2391&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/circulatory/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;2392&quot; instrument_node=&quot;&quot;&gt;circulatory&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2390&quot; instrument_node=&quot;&quot;&gt; collapse. Gastrointestinal symptoms include nausea, vomiting, diarrhea and abdominal cramps. Fatal &lt;/span&gt;&lt;a data-dcnode-id=&quot;2388&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/poisoning/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;2389&quot; instrument_node=&quot;&quot;&gt;poisoning&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2387&quot; instrument_node=&quot;&quot;&gt; is usually preceded by convulsions and coma.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2385&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 data-dcnode-id=&quot;2383&quot;&gt;&lt;span data-dcnode-id=&quot;2384&quot; instrument_node=&quot;&quot;&gt;Treatment&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;2382&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2380&quot;&gt;&lt;span data-dcnode-id=&quot;2381&quot; instrument_node=&quot;&quot;&gt;Consult with a Certified Poison Control Center for up to date guidance and advice.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2379&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2377&quot;&gt;&lt;span data-dcnode-id=&quot;2378&quot; instrument_node=&quot;&quot;&gt;The prolonged release of mixed amphetamine salts from ADDERALL XR should be considered when treating patients with overdose.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2376&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2374&quot;&gt;&lt;span data-dcnode-id=&quot;2375&quot; instrument_node=&quot;&quot;&gt;d-Amphetamine is not dialyzable.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2373&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;a data-dcnode-id=&quot;2372&quot; name=&quot;CI&quot;&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2371&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;2369&quot;&gt;&lt;span data-dcnode-id=&quot;2370&quot; instrument_node=&quot;&quot;&gt;CONTRAINDICATIONS&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;2368&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2366&quot;&gt;&lt;span data-dcnode-id=&quot;2367&quot; instrument_node=&quot;&quot;&gt;ADDERALL XR administration is contraindicated in patients with the following conditions:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2365&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;2315&quot;&gt;&lt;span data-dcnode-id=&quot;2364&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;2360&quot;&gt;&lt;span data-dcnode-id=&quot;2363&quot; instrument_node=&quot;&quot;&gt;Advanced &lt;/span&gt;&lt;a data-dcnode-id=&quot;2361&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/arteriosclerosis/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;2362&quot; instrument_node=&quot;&quot;&gt;arteriosclerosis&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;2359&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;h4 data-dcnode-id=&quot;2282&quot;&gt;&lt;span data-dcnode-id=&quot;2283&quot; instrument_node=&quot;&quot;&gt;Mechanism Of Action&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;2281&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2276&quot;&gt;&lt;span data-dcnode-id=&quot;2280&quot; instrument_node=&quot;&quot;&gt;Amphetamines are non-&lt;/span&gt;&lt;a data-dcnode-id=&quot;2278&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/catecholamine/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;2279&quot; instrument_node=&quot;&quot;&gt;catecholamine&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2277&quot; instrument_node=&quot;&quot;&gt; sympathomimetic amines with CNS stimulant activity. The mode of therapeutic action in ADHD is not known.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2275&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 data-dcnode-id=&quot;2273&quot;&gt;&lt;span data-dcnode-id=&quot;2274&quot; instrument_node=&quot;&quot;&gt;Pharmacodynamics&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;2272&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2264&quot;&gt;&lt;span data-dcnode-id=&quot;2271&quot; instrument_node=&quot;&quot;&gt;Amphetamines block the reuptake of norepinephrine and &lt;/span&gt;&lt;a data-dcnode-id=&quot;2269&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/dopamine/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;2270&quot; instrument_node=&quot;&quot;&gt;dopamine&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2268&quot; instrument_node=&quot;&quot;&gt; into the presynaptic &lt;/span&gt;&lt;a data-dcnode-id=&quot;2266&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/neuron/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;2267&quot; instrument_node=&quot;&quot;&gt;neuron&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2265&quot; instrument_node=&quot;&quot;&gt; and increase the release of these monoamines into the extraneuronal space.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2263&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 data-dcnode-id=&quot;2261&quot;&gt;&lt;span data-dcnode-id=&quot;2262&quot; instrument_node=&quot;&quot;&gt;Pharmacokinetics&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;2260&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2258&quot;&gt;&lt;span data-dcnode-id=&quot;2259&quot; instrument_node=&quot;&quot;&gt;Pharmacokinetic studies of ADDERALL XR have been conducted in healthy adult and pediatric (children aged 6-12 yrs) subjects, and adolescent (13-17 yrs) and children with ADHD. Both ADDERALL (immediate-release) tablets and ADDERALL XR extended release capsules contain d-amphetamine and l-amphetamine salts in the ratio of 3:1. Following administration of ADDERALL (immediate-release), the peak plasma concentrations occurred in about 3 hours for both d-amphetamine and l-amphetamine.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2257&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2255&quot;&gt;&lt;span data-dcnode-id=&quot;2256&quot; instrument_node=&quot;&quot;&gt;The time to reach maximum plasma concentration (Tmax) for ADDERALL XR is about 7 hours, which is about 4 hours longer compared to ADDERALL (immediate-release). This is consistent with the extended-release nature of the product.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2254&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p align=&quot;center&quot; data-dcnode-id=&quot;2251&quot;&gt;&lt;b data-dcnode-id=&quot;2252&quot;&gt;&lt;span data-dcnode-id=&quot;2253&quot; instrument_node=&quot;&quot;&gt;Figure 1 : Mean d-amphetamine and l-amphetamine Plasma Concentrations Following Administration of ADDERALL XR 20 mg (8 am) and ADDERALL (immediate-release) 10 mg Twice Daily (8 am and 12 noon) in the Fed State.&lt;/span&gt;&lt;/b&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2250&quot; instrument_node=&quot;&quot;&gt;
