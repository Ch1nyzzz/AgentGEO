&lt;/span&gt;&lt;p data-dcnode-id=&quot;2234&quot;&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2233&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2228&quot;&gt;&lt;span data-dcnode-id=&quot;2232&quot; instrument_node=&quot;&quot;&gt;A single dose of ADDERALL XR 20 mg extended release capsules provided comparable plasma concentration profiles of both d-amphetamine and l-amphetamine to ADDERALL (immediate-release) 10 mg twice daily administered 4 hours apart. The mean elimination half-life for d-amphetamine is 10 hours in adults; 11 hours in adolescents aged 1317 years and weighing less than or equal to 75 kg/165 lbs; and 9 hours in children aged 6 to 12 years. For the l-amphetamine, the mean elimination half-life in adults is 13 hours; 13 to 14 hours in adolescents; and 11 hours in children aged 6 to 12 years. On a mg/kg body weight basis, children have a higher clearance than adolescents or adults (see &lt;/span&gt;&lt;b data-dcnode-id=&quot;2230&quot;&gt;&lt;span data-dcnode-id=&quot;2231&quot; instrument_node=&quot;&quot;&gt;Special Populations below&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;2229&quot; instrument_node=&quot;&quot;&gt;).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2227&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2225&quot;&gt;&lt;span data-dcnode-id=&quot;2226&quot; instrument_node=&quot;&quot;&gt;ADDERALL XR demonstrates linear pharmacokinetics over the dose range of 20 to 60 mg in adults and adolescents weighing greater than 75 kg/165 lbs, over the dose range of 10 to 40 mg in adolescents weighing less than or equal to 75 kg/165 lbs, and 5 to 30 mg in children aged 6 to 12 years. There is no unexpected accumulation at steady state in children.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2224&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2222&quot;&gt;&lt;span data-dcnode-id=&quot;2223&quot; instrument_node=&quot;&quot;&gt;Food does not affect the extent of absorption of d-amphetamine and l-amphetamine, but prolongs Tmax by 2.5 hours (from 5.2 hrs at fasted state to 7.7 hrs after a high-fat meal) for d-amphetamine and 2.7 hours (from 5.6 hrs at fasted state to 8.3 hrs after a high fat meal) for l-amphetamine after administration of&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2221&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2219&quot;&gt;&lt;span data-dcnode-id=&quot;2220&quot; instrument_node=&quot;&quot;&gt;ADDERALL XR 30 mg. Opening the capsule and sprinkling the contents on applesauce results in comparable absorption to the intact capsule taken in the fasted state. Equal doses of ADDERALL XR strengths are bioequivalent.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2218&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h5 data-dcnode-id=&quot;2216&quot;&gt;&lt;span data-dcnode-id=&quot;2217&quot; instrument_node=&quot;&quot;&gt;Metabolism And Excretion&lt;/span&gt;&lt;/h5&gt;&lt;span data-dcnode-id=&quot;2215&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2204&quot;&gt;&lt;span data-dcnode-id=&quot;2214&quot; instrument_node=&quot;&quot;&gt;Amphetamine is reported to be oxidized at the 4 position of the &lt;/span&gt;&lt;a data-dcnode-id=&quot;2212&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/benzene/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;2213&quot; instrument_node=&quot;&quot;&gt;benzene&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2211&quot; instrument_node=&quot;&quot;&gt; ring to form 4hydroxyamphetamine, or on the side chain α or β carbons to form alpha-hydroxy-amphetamine or norephedrine, respectively. Norephedrine and 4-hydroxy-amphetamine are both active and each is subsequently oxidized to form 4-hydroxy-norephedrine. Alpha-hydroxy-amphetamine undergoes deamination to form phenylacetone, which ultimately forms benzoic acid and its glucuronide and the &lt;/span&gt;&lt;a data-dcnode-id=&quot;2209&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/glycine/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;2210&quot; instrument_node=&quot;&quot;&gt;glycine&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2208&quot; instrument_node=&quot;&quot;&gt; conjugate hippuric acid. Although the enzymes involved in amphetamine metabolism have not been clearly defined, CYP2D6 is known to be involved with formation of 4-hydroxy-amphetamine. Since CYP2D6 is genetically &lt;/span&gt;&lt;a data-dcnode-id=&quot;2206&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/polymorphic/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;2207&quot; instrument_node=&quot;&quot;&gt;polymorphic&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2205&quot; instrument_node=&quot;&quot;&gt;, population variations in amphetamine metabolism are a possibility.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2203&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2201&quot;&gt;&lt;span data-dcnode-id=&quot;2202&quot; instrument_node=&quot;&quot;&gt;Amphetamine is known to inhibit monoamine oxidase, whereas the ability of amphetamine and its metabolites to inhibit various P450 isozymes and other enzymes has not been adequately elucidated. In vitro experiments with human microsomes indicate minor inhibition of CYP2D6 by amphetamine and minor inhibition of CYP1A2, 2D6, and 3A4 by one or more metabolites. However, due to the probability of auto-inhibition and the lack of information on the concentration of these metabolites relative to in vivo concentrations, no predications regarding the potential for amphetamine or its metabolites to inhibit the metabolism of other drugs by CYP isozymes in vivo can be made.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2200&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2192&quot;&gt;&lt;span data-dcnode-id=&quot;2199&quot; instrument_node=&quot;&quot;&gt;With normal urine pHs, approximately half of an administered dose of amphetamine is recoverable in urine as derivatives of alpha-hydroxy-amphetamine and approximately another 30-40% of the dose is recoverable in urine as amphetamine itself. Since amphetamine has a pKa of 9.9, urinary recovery of amphetamine is highly dependent on pH and urine flow rates. Alkaline urine pHs result in less ionization and reduced renal elimination, and acidic pHs and high flow rates result in increased renal elimination with clearances greater than &lt;/span&gt;&lt;a data-dcnode-id=&quot;2197&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/glomerular/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;2198&quot; instrument_node=&quot;&quot;&gt;glomerular&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2196&quot; instrument_node=&quot;&quot;&gt; filtration rates, indicating the involvement of active secretion. Urinary recovery of amphetamine has been reported to range from 1% to 75%, depending on urinary pH, with the remaining fraction of the dose hepatically metabolized. Consequently, both hepatic and renal dysfunction have the potential to inhibit the elimination of amphetamine and result in prolonged exposures. In addition, drugs that effect urinary pH are known to alter the elimination of amphetamine, and any decrease in amphetamineâ€™s metabolism that might occur due to drug interactions or genetic polymorphisms is more likely to be clinically significant when renal elimination is decreased [see&lt;/span&gt;&lt;b data-dcnode-id=&quot;2194&quot;&gt;&lt;span data-dcnode-id=&quot;2195&quot; instrument_node=&quot;&quot;&gt; DRUG INTERACTIONS&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;2193&quot; instrument_node=&quot;&quot;&gt;].&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2191&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 data-dcnode-id=&quot;2189&quot;&gt;&lt;span data-dcnode-id=&quot;2190&quot; instrument_node=&quot;&quot;&gt;Special Populations&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;2188&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2186&quot;&gt;&lt;span data-dcnode-id=&quot;2187&quot; instrument_node=&quot;&quot;&gt;Comparison of the pharmacokinetics of d-and l-amphetamine after oral administration of ADDERALL XR in children (6-12 years) and adolescent (13-17 years) ADHD patients and healthy adult volunteers indicates that body weight is the primary determinant of apparent differences in the pharmacokinetics of d-and l-amphetamine across the age range. Systemic exposure measured by area under the curve to infinity (AUC∞) and maximum plasma concentration (Cmax) decreased with increases in body weight, while oral volume of distribution (VZ/F), oral clearance (CL/F), and elimination half-life (t½) increased with increases in body weight.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2185&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h5 data-dcnode-id=&quot;2183&quot;&gt;&lt;span data-dcnode-id=&quot;2184&quot; instrument_node=&quot;&quot;&gt;Pediatric Patients&lt;/span&gt;&lt;/h5&gt;&lt;span data-dcnode-id=&quot;2182&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2180&quot;&gt;&lt;span data-dcnode-id=&quot;2181&quot; instrument_node=&quot;&quot;&gt;On a mg/kg weight basis, children eliminated amphetamine faster than adults. The elimination half-life (t½) is approximately 1 hour shorter for d-amphetamine and 2 hours shorter for l-amphetamine in children than in adults. However, children had higher systemic exposure to amphetamine (Cmax and AUC) than adults for a given dose of ADDERALL XR, which was attributed to the higher dose administered to children on a mg/kg body weight basis compared to adults. Upon dose normalization on a mg/kg basis, children showed 30% less systemic exposure compared to adults.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2179&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h5 data-dcnode-id=&quot;2177&quot;&gt;&lt;span data-dcnode-id=&quot;2178&quot; instrument_node=&quot;&quot;&gt;Gender&lt;/span&gt;&lt;/h5&gt;&lt;span data-dcnode-id=&quot;2176&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2174&quot;&gt;&lt;span data-dcnode-id=&quot;2175&quot; instrument_node=&quot;&quot;&gt;Systemic exposure to amphetamine was 20-30% higher in women (N=20) than in men (N=20) due to the higher dose administered to women on a mg/kg body weight basis. When the exposure parameters (Cmax and AUC) were normalized by dose (mg/kg), these differences diminished. Age and gender had no direct effect on the pharmacokinetics of d-and l-amphetamine.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2173&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h5 data-dcnode-id=&quot;2171&quot;&gt;&lt;span data-dcnode-id=&quot;2172&quot; instrument_node=&quot;&quot;&gt;Race&lt;/span&gt;&lt;/h5&gt;&lt;span data-dcnode-id=&quot;2170&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2168&quot;&gt;&lt;span data-dcnode-id=&quot;2169&quot; instrument_node=&quot;&quot;&gt;Formal pharmacokinetic studies for race have not been conducted. However, amphetamine pharmacokinetics appeared to be comparable among Caucasians (N=33), Blacks (N=8) and Hispanics (N=10).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2167&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h5 data-dcnode-id=&quot;2165&quot;&gt;&lt;span data-dcnode-id=&quot;2166&quot; instrument_node=&quot;&quot;&gt;Patients With Renal Impairment&lt;/span&gt;&lt;/h5&gt;&lt;span data-dcnode-id=&quot;2164&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2162&quot;&gt;&lt;span data-dcnode-id=&quot;2163&quot; instrument_node=&quot;&quot;&gt;The effect of renal impairment on d-and l-amphetamine after administration of ADDERALL XR has not been studied. The impact of renal impairment on the disposition of amphetamine is expected to be similar between oral administration of lisdexamfetamine and Adderall XR.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2161&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2153&quot;&gt;&lt;span data-dcnode-id=&quot;2160&quot; instrument_node=&quot;&quot;&gt;In a pharmacokinetic study of lisdexamfetamine in adult subjects with normal and impaired renal function, mean d-amphetamine clearance was reduced from 0.7 L/hr/kg in normal subjects to 0.4 L/hr/kg in subjects with severe renal impairment (GFR 15 to &amp;lt;30mL/min/1.73m²). &lt;/span&gt;&lt;a data-dcnode-id=&quot;2158&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/dialysis/article.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;proc&quot;&gt;&lt;span data-dcnode-id=&quot;2159&quot; instrument_node=&quot;&quot;&gt;Dialysis&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2157&quot; instrument_node=&quot;&quot;&gt; did not significantly affect the clearance of d-amphetamine [see&lt;/span&gt;&lt;b data-dcnode-id=&quot;2155&quot;&gt;&lt;span data-dcnode-id=&quot;2156&quot; instrument_node=&quot;&quot;&gt; Use In Specific Populations&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;2154&quot; instrument_node=&quot;&quot;&gt;].&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2152&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;a data-dcnode-id=&quot;2151&quot; name=&quot;AP&quot;&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2150&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 data-dcnode-id=&quot;2148&quot;&gt;&lt;span data-dcnode-id=&quot;2149&quot; instrument_node=&quot;&quot;&gt;Animal Toxicology And/Or Pharmacology&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;2147&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2139&quot;&gt;&lt;span data-dcnode-id=&quot;2146&quot; instrument_node=&quot;&quot;&gt;Acute administration of high doses of amphetamine (d-or d,l-) has been shown to produce long-lasting &lt;/span&gt;&lt;a data-dcnode-id=&quot;2144&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/neurotoxic/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;2145&quot; instrument_node=&quot;&quot;&gt;neurotoxic&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2143&quot; instrument_node=&quot;&quot;&gt; effects, including irreversible nerve &lt;/span&gt;&lt;a data-dcnode-id=&quot;2141&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/fiber/definition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dict&quot;&gt;&lt;span data-dcnode-id=&quot;2142&quot; instrument_node=&quot;&quot;&gt;fiber&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2140&quot; instrument_node=&quot;&quot;&gt; damage, in rodents. The significance of these findings to humans is unknown.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2138&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;a data-dcnode-id=&quot;2137&quot; name=&quot;CS&quot;&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2136&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 data-dcnode-id=&quot;2134&quot;&gt;&lt;span data-dcnode-id=&quot;2135&quot; instrument_node=&quot;&quot;&gt;Clinical Studies&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;2133&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h5 data-dcnode-id=&quot;2131&quot;&gt;&lt;span data-dcnode-id=&quot;2132&quot; instrument_node=&quot;&quot;&gt;Pediatric Patients&lt;/span&gt;&lt;/h5&gt;&lt;span data-dcnode-id=&quot;2130&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2128&quot;&gt;&lt;span data-dcnode-id=&quot;2129&quot; instrument_node=&quot;&quot;&gt;A double-blind, randomized, placebo-controlled, parallel-group study was conducted in children aged 612 (N=584) who met DSM-IV® criteria for ADHD (either the combined type or the hyperactive- Â&amp;nbsp;impulsive type). Patients were randomized to fixed-dose treatment groups receiving final doses of 10, 20, or 30 mg of ADDERALL XR or placebo once daily in the morning for three weeks. Significant improvements in patient behavior, based upon teacher ratings of attention and hyperactivity, were observed for all ADDERALL XR doses compared to patients who received placebo, for all three weeks, including the first week of treatment, when all ADDERALL XR subjects were receiving a dose of 10 mg/day. Patients who received ADDERALL XR showed behavioral improvements in both morning and afternoon assessments compared to patients on placebo.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2127&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2125&quot;&gt;&lt;span data-dcnode-id=&quot;2126&quot; instrument_node=&quot;&quot;&gt;In a classroom analogue study, patients (N=51) receiving fixed doses of 10 mg, 20 mg or 30 mg ADDERALL XR demonstrated statistically significant improvements in teacher-rated behavior and performance measures, compared to patients treated with placebo.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2124&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2122&quot;&gt;&lt;span data-dcnode-id=&quot;2123&quot; instrument_node=&quot;&quot;&gt;A double-blind, randomized, multi-center, parallel-group, placebo-controlled study was conducted in adolescents aged 13-17 (N=327) who met DSM-IV® criteria for ADHD. The primary cohort of patients (n=287, weighing ≤ 75kg/165lbs) was randomized to fixed-dose treatment groups and received four weeks of treatment. Patients were randomized to receive final doses of 10 mg, 20 mg, 30 mg, and 40 mg ADDERALL XR or placebo once daily in the morning. Patients randomized to doses greater than 10 mg were titrated to their final doses by 10 mg each week. The secondary cohort consisted of 40 subjects weighing &amp;gt;75kg/165lbs who were randomized to fixed-dose treatment groups receiving final doses of 50 mg and 60 mg ADDERALL XR or placebo once daily in the morning for 4 weeks. The primary efficacy variable was the Attention Deficit Hyperactivity Disorder-Rating Scale IV (ADHD-RS-IV) total score for the primary cohort. The ADHD-RS-IV is an 18-item scale that measures the core symptoms of ADHD. Improvements in the primary cohort were statistically significantly greater in all four primary cohort active treatment groups (ADDERALL XR 10 mg, 20 mg, 30 mg, and 40 mg) compared with the placebo group. There was not adequate evidence that doses greater than 20 mg/day conferred additional benefit.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2121&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h5 data-dcnode-id=&quot;2119&quot;&gt;&lt;span data-dcnode-id=&quot;2120&quot; instrument_node=&quot;&quot;&gt;Adult Patients&lt;/span&gt;&lt;/h5&gt;&lt;span data-dcnode-id=&quot;2118&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2116&quot;&gt;&lt;span data-dcnode-id=&quot;2117&quot; instrument_node=&quot;&quot;&gt;A double-blind, randomized, placebo-controlled, parallel-group study was conducted in adults (N=255) who met DSM-IV® criteria for ADHD. Patients were randomized to fixed-dose treatment groups receiving final doses of 20, 40, or 60 mg of ADDERALL XR or placebo once daily in the morning for four weeks. Significant improvements, measured with the Attention Deficit Hyperactivity Disorder-Rating Scale (ADHD-RS), an 18-item scale that measures the core symptoms of ADHD, were observed at endpoint for all ADDERALL XR doses compared to patients who received placebo for all four weeks. There was not adequate evidence that doses greater than 20 mg/day conferred additional benefit.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2115&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;2113&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;2111&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;2109&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;2107&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/section&gt;&lt;span data-dcnode-id=&quot;2105&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;section class=&quot;pageSection&quot; data-dcnode-id=&quot;1632&quot;&gt;&lt;span data-dcnode-id=&quot;2104&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;apPage&quot; data-dcnode-id=&quot;1634&quot; id=&quot;apPage&quot;&gt;&lt;span data-dcnode-id=&quot;2103&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;wrapper&quot; data-dcnode-id=&quot;1636&quot;&gt;&lt;span data-dcnode-id=&quot;2102&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;a class=&quot;bookmark&quot; data-dcnode-id=&quot;2101&quot; name=&quot;medguide&quot;&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2100&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div data-dcnode-id=&quot;2094&quot; id=&quot;apPgNum&quot;&gt;&lt;span data-dcnode-id=&quot;2099&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div data-dcnode-id=&quot;2096&quot; itemscope=&quot;&quot; itemtype=&quot;https://schema.org/CreativeWork&quot;&gt;&lt;span data-dcnode-id=&quot;2097&quot; itemprop=&quot;alternativeHeadline&quot;&gt;&lt;span data-dcnode-id=&quot;2098&quot; instrument_node=&quot;&quot;&gt;Medication Guide&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;2095&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;div class=&quot;pgContent&quot; data-dcnode-id=&quot;1640&quot;&gt;&lt;span data-dcnode-id=&quot;2092&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;2090&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;a data-dcnode-id=&quot;2089&quot; name=&quot;PI&quot;&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2088&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;2086&quot;&gt;&lt;span data-dcnode-id=&quot;2087&quot; instrument_node=&quot;&quot;&gt;PATIENT INFORMATION&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;2085&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2080&quot;&gt;&lt;b data-dcnode-id=&quot;2083&quot;&gt;&lt;span data-dcnode-id=&quot;2084&quot; instrument_node=&quot;&quot;&gt;ADDERALL XR®&lt;/span&gt;&lt;/b&gt;&lt;br data-dcnode-id=&quot;2082&quot;&gt;&lt;span data-dcnode-id=&quot;2081&quot; instrument_node=&quot;&quot;&gt;
(ADD-ur-all X-R)&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2079&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2077&quot;&gt;&lt;span data-dcnode-id=&quot;2078&quot; instrument_node=&quot;&quot;&gt;Read the Medication Guide that comes with ADDERALL XR before you or your child starts taking it and each time you get a refill. There may be new information. This Medication Guide does not take the place of talking to your doctor about you or your childâ€™s treatment with ADDERALL XR.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2076&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2073&quot;&gt;&lt;b data-dcnode-id=&quot;2074&quot;&gt;&lt;span data-dcnode-id=&quot;2075&quot; instrument_node=&quot;&quot;&gt;What is the most important information I should know about ADDERALL XR?&lt;/span&gt;&lt;/b&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2072&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2069&quot;&gt;&lt;b data-dcnode-id=&quot;2070&quot;&gt;&lt;span data-dcnode-id=&quot;2071&quot; instrument_node=&quot;&quot;&gt;ADDERALL XR is a stimulant medicine. The following have been reported with use of stimulant medicines.&lt;/span&gt;&lt;/b&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2068&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2065&quot;&gt;&lt;b data-dcnode-id=&quot;2066&quot;&gt;&lt;span data-dcnode-id=&quot;2067&quot; instrument_node=&quot;&quot;&gt;1. Heart-related problems:&lt;/span&gt;&lt;/b&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2064&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;2050&quot;&gt;&lt;span data-dcnode-id=&quot;2063&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;2060&quot;&gt;&lt;b data-dcnode-id=&quot;2061&quot;&gt;&lt;span data-dcnode-id=&quot;2062&quot; instrument_node=&quot;&quot;&gt;sudden death in patients who have heart problems or heart defects&lt;/span&gt;&lt;/b&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;2059&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;2056&quot;&gt;&lt;b data-dcnode-id=&quot;2057&quot;&gt;&lt;span data-dcnode-id=&quot;2058&quot; instrument_node=&quot;&quot;&gt;stroke and heart attack in adults&lt;/span&gt;&lt;/b&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;2055&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;2052&quot;&gt;&lt;b data-dcnode-id=&quot;2053&quot;&gt;&lt;span data-dcnode-id=&quot;2054&quot; instrument_node=&quot;&quot;&gt;increased blood pressure and heart rate&lt;/span&gt;&lt;/b&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;2051&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;2049&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2044&quot;&gt;&lt;span data-dcnode-id=&quot;2048&quot; instrument_node=&quot;&quot;&gt;Tell your doctor if you or your child have any heart problems, heart defects, &lt;/span&gt;&lt;a data-dcnode-id=&quot;2046&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/high_blood_pressure_hypertension_medications/drugs-condition.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;rx-art&quot;&gt;&lt;span data-dcnode-id=&quot;2047&quot; instrument_node=&quot;&quot;&gt;high blood pressure&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2045&quot; instrument_node=&quot;&quot;&gt;, or a family history of these problems.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2043&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2041&quot;&gt;&lt;span data-dcnode-id=&quot;2042&quot; instrument_node=&quot;&quot;&gt;Your doctor should check you or your child carefully for heart problems before starting ADDERALL XR.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2040&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2038&quot;&gt;&lt;span data-dcnode-id=&quot;2039&quot; instrument_node=&quot;&quot;&gt;Your doctor should check you or your childâ€™s blood pressure and heart rate regularly during treatment with ADDERALL XR.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2037&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2034&quot;&gt;&lt;b data-dcnode-id=&quot;2035&quot;&gt;&lt;span data-dcnode-id=&quot;2036&quot; instrument_node=&quot;&quot;&gt;Call your doctor right away if you or your child has any signs of heart problems such as chest pain, shortness of breath, or fainting while taking ADDERALL XR.&lt;/span&gt;&lt;/b&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2033&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2030&quot;&gt;&lt;b data-dcnode-id=&quot;2031&quot;&gt;&lt;span data-dcnode-id=&quot;2032&quot; instrument_node=&quot;&quot;&gt;2. Mental (Psychiatric) problems:&lt;/span&gt;&lt;/b&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2029&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2026&quot;&gt;&lt;b data-dcnode-id=&quot;2027&quot;&gt;&lt;span data-dcnode-id=&quot;2028&quot; instrument_node=&quot;&quot;&gt;All Patients&lt;/span&gt;&lt;/b&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2025&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;2011&quot;&gt;&lt;span data-dcnode-id=&quot;2024&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;2021&quot;&gt;&lt;b data-dcnode-id=&quot;2022&quot;&gt;&lt;span data-dcnode-id=&quot;2023&quot; instrument_node=&quot;&quot;&gt;new or worse behavior and thought problems&lt;/span&gt;&lt;/b&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;2020&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;li data-dcnode-id=&quot;1801&quot;&gt;&lt;span data-dcnode-id=&quot;1805&quot; instrument_node=&quot;&quot;&gt;cold or &lt;/span&gt;&lt;a data-dcnode-id=&quot;1803&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/allergy/article.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;dt&quot;&gt;&lt;span data-dcnode-id=&quot;1804&quot; instrument_node=&quot;&quot;&gt;allergy&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1802&quot; instrument_node=&quot;&quot;&gt; medicines that contain decongestants&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1800&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;1798&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1796&quot;&gt;&lt;span data-dcnode-id=&quot;1797&quot; instrument_node=&quot;&quot;&gt;Know the medicines that you or your child takes. Keep a list of your medicines with you to show your doctor and pharmacist.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1795&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1792&quot;&gt;&lt;b data-dcnode-id=&quot;1793&quot;&gt;&lt;span data-dcnode-id=&quot;1794&quot; instrument_node=&quot;&quot;&gt;Do not start any new medicine while taking ADDERALL XR without talking to your doctor first.&lt;/span&gt;&lt;/b&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1791&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1788&quot;&gt;&lt;b data-dcnode-id=&quot;1789&quot;&gt;&lt;span data-dcnode-id=&quot;1790&quot; instrument_node=&quot;&quot;&gt;How should ADDERALL XR be taken?&lt;/span&gt;&lt;/b&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1787&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;1759&quot;&gt;&lt;span data-dcnode-id=&quot;1786&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1782&quot;&gt;&lt;b data-dcnode-id=&quot;1784&quot;&gt;&lt;span data-dcnode-id=&quot;1785&quot; instrument_node=&quot;&quot;&gt;Take ADDERALL XR exactly as prescribed.&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;1783&quot; instrument_node=&quot;&quot;&gt; Your doctor may adjust the dose until it is right for you or your child.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1781&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1779&quot;&gt;&lt;span data-dcnode-id=&quot;1780&quot; instrument_node=&quot;&quot;&gt;Take ADDERALL XR once a day in the morning when you first wake up. ADDERALL XR is an extended release capsule. It releases medicine into your body throughout the day.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1778&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1774&quot;&gt;&lt;span data-dcnode-id=&quot;1777&quot; instrument_node=&quot;&quot;&gt;Swallow ADDERALL XR extended release capsules whole with water or other liquids. If you or your child cannot swallow the capsule, open it and sprinkle the medicine over a spoonful of applesauce. Swallow all of the applesauce and medicine mixture without chewing immediately. Follow with a drink of water or other liquid. &lt;/span&gt;&lt;b data-dcnode-id=&quot;1775&quot;&gt;&lt;span data-dcnode-id=&quot;1776&quot; instrument_node=&quot;&quot;&gt;Never chew or crush the capsule or the medicine inside the capsule.&lt;/span&gt;&lt;/b&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1773&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1771&quot;&gt;&lt;span data-dcnode-id=&quot;1772&quot; instrument_node=&quot;&quot;&gt;ADDERALL XR can be taken with or without food.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1770&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1768&quot;&gt;&lt;span data-dcnode-id=&quot;1769&quot; instrument_node=&quot;&quot;&gt;From time to time, your doctor may stop ADDERALL XR treatment for a while to check ADHD symptoms.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1767&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1765&quot;&gt;&lt;span data-dcnode-id=&quot;1766&quot; instrument_node=&quot;&quot;&gt;Your doctor may do regular checks of the heart and blood pressure while taking ADDERALL XR. Children should have their height and weight checked often while taking ADDERALL XR. ADDERALL XR treatment may be stopped if a problem is found during these check-ups.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1764&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1761&quot;&gt;&lt;b data-dcnode-id=&quot;1762&quot;&gt;&lt;span data-dcnode-id=&quot;1763&quot; instrument_node=&quot;&quot;&gt;If you or your child takes too much ADDERALL XR or overdoses, call your doctor or poison control center right away, or get emergency treatment.&lt;/span&gt;&lt;/b&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1760&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;1758&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1755&quot;&gt;&lt;b data-dcnode-id=&quot;1756&quot;&gt;&lt;span data-dcnode-id=&quot;1757&quot; instrument_node=&quot;&quot;&gt;What are possible side effects of ADDERALL XR?&lt;/span&gt;&lt;/b&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1754&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1749&quot;&gt;&lt;span data-dcnode-id=&quot;1753&quot; instrument_node=&quot;&quot;&gt;See &lt;/span&gt;&lt;b data-dcnode-id=&quot;1751&quot;&gt;&lt;span data-dcnode-id=&quot;1752&quot; instrument_node=&quot;&quot;&gt;“What is the most important information I should know about ADDERALL XR?”&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;1750&quot; instrument_node=&quot;&quot;&gt; for information on reported heart and mental problems.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1748&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1745&quot;&gt;&lt;b data-dcnode-id=&quot;1746&quot;&gt;&lt;span data-dcnode-id=&quot;1747&quot; instrument_node=&quot;&quot;&gt;Other serious side effects include:&lt;/span&gt;&lt;/b&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1744&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;1733&quot;&gt;&lt;span data-dcnode-id=&quot;1743&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1741&quot;&gt;&lt;span data-dcnode-id=&quot;1742&quot; instrument_node=&quot;&quot;&gt;slowing of growth (height and weight) in children&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1740&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1738&quot;&gt;&lt;span data-dcnode-id=&quot;1739&quot; instrument_node=&quot;&quot;&gt;seizures, mainly in patients with a history of seizures&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1737&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1735&quot;&gt;&lt;span data-dcnode-id=&quot;1736&quot; instrument_node=&quot;&quot;&gt;eyesight changes or blurred vision&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1734&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;1732&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1729&quot;&gt;&lt;b data-dcnode-id=&quot;1730&quot;&gt;&lt;span data-dcnode-id=&quot;1731&quot; instrument_node=&quot;&quot;&gt;Common side effects include:&lt;/span&gt;&lt;/b&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1728&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;1695&quot;&gt;&lt;span data-dcnode-id=&quot;1727&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1725&quot;&gt;&lt;span data-dcnode-id=&quot;1726&quot; instrument_node=&quot;&quot;&gt;headache&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1724&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1722&quot;&gt;&lt;span data-dcnode-id=&quot;1723&quot; instrument_node=&quot;&quot;&gt;decreased appetite&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1721&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1719&quot;&gt;&lt;span data-dcnode-id=&quot;1720&quot; instrument_node=&quot;&quot;&gt;stomach ache&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1718&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1716&quot;&gt;&lt;span data-dcnode-id=&quot;1717&quot; instrument_node=&quot;&quot;&gt;nervousness&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1715&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1713&quot;&gt;&lt;span data-dcnode-id=&quot;1714&quot; instrument_node=&quot;&quot;&gt;trouble sleeping&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1712&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1709&quot;&gt;&lt;a data-dcnode-id=&quot;1710&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rxlist.com/mood_swings/symptoms.htm&quot; onclick=&quot;wmdTrack('embd-lnk');&quot; rel=&quot;sym&quot;&gt;&lt;span data-dcnode-id=&quot;1711&quot; instrument_node=&quot;&quot;&gt;mood swings&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1708&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1706&quot;&gt;&lt;span data-dcnode-id=&quot;1707&quot; instrument_node=&quot;&quot;&gt;weight loss&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1705&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1703&quot;&gt;&lt;span data-dcnode-id=&quot;1704&quot; instrument_node=&quot;&quot;&gt;dizziness&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1702&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1700&quot;&gt;&lt;span data-dcnode-id=&quot;1701&quot; instrument_node=&quot;&quot;&gt;dry mouth&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1699&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1697&quot;&gt;&lt;span data-dcnode-id=&quot;1698&quot; instrument_node=&quot;&quot;&gt;fast heart beat&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1696&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;1694&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1692&quot;&gt;&lt;span data-dcnode-id=&quot;1693&quot; instrument_node=&quot;&quot;&gt;ADDERALL XR may affect you or your childâ€™s ability to drive or do other dangerous activities.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1691&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1689&quot;&gt;&lt;span data-dcnode-id=&quot;1690&quot; instrument_node=&quot;&quot;&gt;Talk to your doctor if you or your child has side effects that are bothersome or do not go away.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1688&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1686&quot;&gt;&lt;span data-dcnode-id=&quot;1687&quot; instrument_node=&quot;&quot;&gt;This is not a complete list of possible side effects. Ask your doctor or pharmacist for more information.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1685&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1683&quot;&gt;&lt;span data-dcnode-id=&quot;1684&quot; instrument_node=&quot;&quot;&gt;Call your doctor for medical advice about side effects. You may report side effects to FDA at 1-800-FDA-1088.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1682&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1679&quot;&gt;&lt;b data-dcnode-id=&quot;1680&quot;&gt;&lt;span data-dcnode-id=&quot;1681&quot; instrument_node=&quot;&quot;&gt;How should I store ADDERALL XR?&lt;/span&gt;&lt;/b&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1678&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;1669&quot;&gt;&lt;span data-dcnode-id=&quot;1677&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1675&quot;&gt;&lt;span data-dcnode-id=&quot;1676&quot; instrument_node=&quot;&quot;&gt;Store ADDERALL XR in a safe place at room temperature, 59 to 86° F (15 to 30° C).&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1674&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1671&quot;&gt;&lt;b data-dcnode-id=&quot;1672&quot;&gt;&lt;span data-dcnode-id=&quot;1673&quot; instrument_node=&quot;&quot;&gt;Keep ADDERALL XR and all medicines out of the reach of children.&lt;/span&gt;&lt;/b&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1670&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;1668&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1665&quot;&gt;&lt;b data-dcnode-id=&quot;1666&quot;&gt;&lt;span data-dcnode-id=&quot;1667&quot; instrument_node=&quot;&quot;&gt;General information about ADDERALL XR&lt;/span&gt;&lt;/b&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1664&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1662&quot;&gt;&lt;span data-dcnode-id=&quot;1663&quot; instrument_node=&quot;&quot;&gt;Medicines are sometimes prescribed for purposes other than those listed in a Medication Guide. Do not use ADDERALL XR for a condition for which it was not prescribed. Do not give ADDERALL XR to other people, even if they have the same condition. It may harm them and it is against the law.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1661&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1659&quot;&gt;&lt;span data-dcnode-id=&quot;1660&quot; instrument_node=&quot;&quot;&gt;This Medication Guide summarizes the most important information about ADDERALL XR. If you would like more information, talk with your doctor. You can ask your doctor or pharmacist for information about ADDERALL XR that was written for healthcare professionals. For more information, you may also contact Takeda Pharmaceuticals (the maker of ADDERALL XR) at 1-800-828-2088 or visit the website at http://www.adderallxr.com.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1658&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1655&quot;&gt;&lt;b data-dcnode-id=&quot;1656&quot;&gt;&lt;span data-dcnode-id=&quot;1657&quot; instrument_node=&quot;&quot;&gt;What are the ingredients in ADDERALL XR?&lt;/span&gt;&lt;/b&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1654&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1650&quot;&gt;&lt;b data-dcnode-id=&quot;1652&quot;&gt;&lt;span data-dcnode-id=&quot;1653&quot; instrument_node=&quot;&quot;&gt;Active Ingredients:&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;1651&quot; instrument_node=&quot;&quot;&gt; dextroamphetamine saccharate, amphetamine aspartate monohydrate, dextroamphetamine sulfate, amphetamine sulfate&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1649&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1645&quot;&gt;&lt;b data-dcnode-id=&quot;1647&quot;&gt;&lt;span data-dcnode-id=&quot;1648&quot; instrument_node=&quot;&quot;&gt;Inactive Ingredients:&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;1646&quot; instrument_node=&quot;&quot;&gt; gelatin capsules, hydroxypropyl methylcellulose, methacrylic acid copolymer, opadry beige, sugar spheres, talc, and triethyl citrate. Gelatin capsules contain edible inks, kosher gelatin, and titanium dioxide. The 5 mg, 10 mg, and 15 mg capsules also contain FD&amp;amp;C Blue #2. The 20 mg, 25 mg, and 30 mg capsules also contain red iron oxide and yellow iron oxide&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1644&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;credit&quot; data-dcnode-id=&quot;1642&quot;&gt;&lt;span data-dcnode-id=&quot;1643&quot; instrument_node=&quot;&quot;&gt;This Medication Guide has been approved by the U.S. Food and Drug Administration.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1641&quot; instrument_node=&quot;&quot;&gt;
