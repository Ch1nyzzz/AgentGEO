&lt;/span&gt;&lt;p data-dcnode-id=&quot;1233&quot;&gt;&lt;span data-dcnode-id=&quot;1234&quot; instrument_node=&quot;&quot;&gt;VR is for games and AR is for industry, right? That’s probably the biggest broad-strokes argument that a person could make about extended reality and remain arguably correct. However, there are myriad other use cases and XR education is one of the most promising.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1232&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1230&quot;&gt;&lt;span data-dcnode-id=&quot;1231&quot; instrument_node=&quot;&quot;&gt;Here, we’re going to look at some of the most exciting and out-of-the-box examples of XR education, ranging from K-12 through university and beyond.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1229&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;1227&quot;&gt;&lt;span data-dcnode-id=&quot;1228&quot; instrument_node=&quot;&quot;&gt;Virtual Campus Experiences&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;1226&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1224&quot;&gt;&lt;span data-dcnode-id=&quot;1225&quot; instrument_node=&quot;&quot;&gt;While any virtual platform that allows remotely shared experiences can be used for XR education, there are platforms specialized for creating “virtual campus” experiences. These organizations can create educational content as well but they don’t create accredited courses, focusing instead on supplemental content or, more commonly, spaces for virtual events.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1223&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1221&quot;&gt;&lt;span data-dcnode-id=&quot;1222&quot; instrument_node=&quot;&quot;&gt;However, there are a growing number of institutions relying more and more heavily on not just occasional use of XR education content, but persistent use of a virtual campus.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1220&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;1218&quot;&gt;&lt;span data-dcnode-id=&quot;1219&quot; instrument_node=&quot;&quot;&gt;Edstutia and Adept XR Learning&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1217&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1211&quot;&gt;&lt;i data-dcnode-id=&quot;1215&quot;&gt;&lt;span data-dcnode-id=&quot;1216&quot; instrument_node=&quot;&quot;&gt;“Online learning and virtual education can be just as instructive as in-person. It just depends on the instructor,”&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;1214&quot; instrument_node=&quot;&quot;&gt; Dr. Christine Janssen told &lt;/span&gt;&lt;i data-dcnode-id=&quot;1212&quot;&gt;&lt;span data-dcnode-id=&quot;1213&quot; instrument_node=&quot;&quot;&gt;ARPost. “If I have a laptop, I can learn anywhere.”&lt;/span&gt;&lt;/i&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1210&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1199&quot;&gt;&lt;span data-dcnode-id=&quot;1209&quot; instrument_node=&quot;&quot;&gt;Janssen is the founder of &lt;/span&gt;&lt;a data-dcnode-id=&quot;1207&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//edstutia.com/&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1208&quot; instrument_node=&quot;&quot;&gt;Edstutia&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1206&quot; instrument_node=&quot;&quot;&gt;, a “modular online learning platform” designed for “disrupting the status quo of higher education.” She met &lt;/span&gt;&lt;a data-dcnode-id=&quot;1204&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.theglimpsegroup.com/&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1205&quot; instrument_node=&quot;&quot;&gt;Glimpse Group&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1203&quot; instrument_node=&quot;&quot;&gt; (NASDAQ:VRAR) President and CEO Lyron Bentovim at an event at Fordham University where the two laid the groundwork for a partnership between Edstutia and Glimpse subsidiary &lt;/span&gt;&lt;a data-dcnode-id=&quot;1201&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//adeptxr.com/&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1202&quot; instrument_node=&quot;&quot;&gt;Adept XR Learning&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1200&quot; instrument_node=&quot;&quot;&gt; resulting in a virtual Edstutia campus.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1198&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div data-dcnode-id=&quot;1188&quot; style=&quot;clear:both; margin-top:0em; margin-bottom:1em;&quot;&gt;&lt;a class=&quot;ub2277f42d4da468f8de4d772a124e92c&quot; data-dcnode-id=&quot;1189&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//arpost.co/2019/09/25/how-the-glimpse-group-is-paving-the-road-for-xr-technology-adoption/&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;div data-dcnode-id=&quot;1190&quot; style=&quot;padding-left:1em; padding-right:1em;&quot;&gt;&lt;span class=&quot;ctaText&quot; data-dcnode-id=&quot;1194&quot;&gt;&lt;span data-dcnode-id=&quot;1195&quot; instrument_node=&quot;&quot;&gt;See Also:&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1193&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp; &lt;/span&gt;&lt;span class=&quot;postTitle&quot; data-dcnode-id=&quot;1191&quot;&gt;&lt;span data-dcnode-id=&quot;1192&quot; instrument_node=&quot;&quot;&gt;How The Glimpse Group Is Paving the Road for XR Technology Adoption&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/a&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1187&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1181&quot;&gt;&lt;i data-dcnode-id=&quot;1185&quot;&gt;&lt;span data-dcnode-id=&quot;1186&quot; instrument_node=&quot;&quot;&gt;“Students go to college not just to learn but to network and socialize,”&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;1184&quot; instrument_node=&quot;&quot;&gt; said Janssen. &lt;/span&gt;&lt;i data-dcnode-id=&quot;1182&quot;&gt;&lt;span data-dcnode-id=&quot;1183&quot; instrument_node=&quot;&quot;&gt;“For what I wanted to do, this was a no-brainer.”&lt;/span&gt;&lt;/i&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1180&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1178&quot;&gt;&lt;span data-dcnode-id=&quot;1179&quot; instrument_node=&quot;&quot;&gt;Edstutia isn’t accredited – attendees won’t get a “degree” – but the curriculum is built around skills required by hiring managers and everything is overseen by an advisory board representing industry partners including AWS, IBM, and Accenture. Learners who complete programs add their own creations to a digital portfolio.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1177&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1171&quot;&gt;&lt;i data-dcnode-id=&quot;1175&quot;&gt;&lt;span data-dcnode-id=&quot;1176&quot; instrument_node=&quot;&quot;&gt;“Every business is going to be driven by technology, so you need to understand baseline technology,”&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;1174&quot; instrument_node=&quot;&quot;&gt; said Janssen. &lt;/span&gt;&lt;i data-dcnode-id=&quot;1172&quot;&gt;&lt;span data-dcnode-id=&quot;1173&quot; instrument_node=&quot;&quot;&gt;“Everything about what we stand for is experiential learning.”&lt;/span&gt;&lt;/i&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1170&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;1168&quot;&gt;&lt;span data-dcnode-id=&quot;1169&quot; instrument_node=&quot;&quot;&gt;VictoryXR, Morehouse College, and American High School&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1167&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1162&quot;&gt;&lt;span data-dcnode-id=&quot;1166&quot; instrument_node=&quot;&quot;&gt;Like Adept, &lt;/span&gt;&lt;a data-dcnode-id=&quot;1164&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.victoryxr.com/&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1165&quot; instrument_node=&quot;&quot;&gt;VictoryXR&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1163&quot; instrument_node=&quot;&quot;&gt; creates non-accredited XR educational experiences and locations, including their own virtual academy location. The year 2021 has seen a number of these products and services adopted in major ways by educational institutions that do offer diplomas.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1161&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1159&quot;&gt;&lt;span data-dcnode-id=&quot;1160&quot; instrument_node=&quot;&quot;&gt;In March of this year, the company announced a “joint effort” with Qualcomm and Atlanta’s Morehouse College to offer classes in virtual reality with select real-time classes taught by Morehouse professors in a digital-twin campus on Oculus headsets donated by Qualcomm. Some classes will also digitally transport students to other places and times altogether.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1158&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1152&quot;&gt;&lt;i data-dcnode-id=&quot;1156&quot;&gt;&lt;span data-dcnode-id=&quot;1157&quot; instrument_node=&quot;&quot;&gt;“Higher ed must not be afraid to take remote learning to a new immersive and effective level,” &lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;1155&quot; instrument_node=&quot;&quot;&gt;Morehouse College professor of History, Dr. Ovell Hamilton, said in a release shared with &lt;/span&gt;&lt;i data-dcnode-id=&quot;1153&quot;&gt;&lt;span data-dcnode-id=&quot;1154&quot; instrument_node=&quot;&quot;&gt;ARPost. “With this virtual reality campus, students will be able to travel back in time and stand on a naval carrier or travel to places across the globe.”&lt;/span&gt;&lt;/i&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1151&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1146&quot;&gt;&lt;span data-dcnode-id=&quot;1150&quot; instrument_node=&quot;&quot;&gt;Fast-forward to August, VictoryXR announced that online education provider &lt;/span&gt;&lt;a data-dcnode-id=&quot;1148&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.americanhighschool.org/&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1149&quot; instrument_node=&quot;&quot;&gt;American High School&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1147&quot; instrument_node=&quot;&quot;&gt; worked with VictoryXR to create what CEO Steve Grubbs called “the first global virtual reality high school.”&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1145&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1137&quot;&gt;&lt;i data-dcnode-id=&quot;1143&quot;&gt;&lt;span data-dcnode-id=&quot;1144&quot; instrument_node=&quot;&quot;&gt;“In a school deployed through virtual reality, students may find the learning location and curriculum that best suits their need, regardless of their physical location,”&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;1142&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a data-dcnode-id=&quot;1140&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//steve-grubbs.medium.com/why-the-worlds-first-virtual-reality-high-school-changes-everything-c2e384f2513e&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1141&quot; instrument_node=&quot;&quot;&gt;Grubbs said in a Medium post.&lt;/span&gt;&lt;/a&gt;&lt;i data-dcnode-id=&quot;1138&quot;&gt;&lt;span data-dcnode-id=&quot;1139&quot; instrument_node=&quot;&quot;&gt; “Relationships with like-minded people will develop and suddenly, someone who lives halfway around the globe will become a friend, not a stranger in a faraway land.”&lt;/span&gt;&lt;/i&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1136&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;1134&quot;&gt;&lt;span data-dcnode-id=&quot;1135&quot; instrument_node=&quot;&quot;&gt;Arthur and Georgia State University&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1133&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1128&quot;&gt;&lt;span data-dcnode-id=&quot;1132&quot; instrument_node=&quot;&quot;&gt;We know &lt;/span&gt;&lt;a data-dcnode-id=&quot;1130&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//arpost.co/2021/09/03/hands-on-review-of-arthur-pro-freshly-out-of-beta/&quot;&gt;&lt;span data-dcnode-id=&quot;1131&quot; instrument_node=&quot;&quot;&gt;Arthur&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1129&quot; instrument_node=&quot;&quot;&gt; as being a purveyor of virtual office space. However, the company stepped into XR education through a recent donation to Georgia State University to create a VR “study abroad program” for business students. The experience gives students valuable insight into the course of study but also into remote collaboration in XR – increasingly important in business.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1127&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div data-dcnode-id=&quot;1117&quot; style=&quot;clear:both; margin-top:0em; margin-bottom:1em;&quot;&gt;&lt;a class=&quot;u180ce8887c559011e278c4b3188a70e0&quot; data-dcnode-id=&quot;1118&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//arpost.co/2021/05/07/remote-collaboration-arthur-first-updates/&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;div data-dcnode-id=&quot;1119&quot; style=&quot;padding-left:1em; padding-right:1em;&quot;&gt;&lt;span class=&quot;ctaText&quot; data-dcnode-id=&quot;1123&quot;&gt;&lt;span data-dcnode-id=&quot;1124&quot; instrument_node=&quot;&quot;&gt;See Also:&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1122&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp; &lt;/span&gt;&lt;span class=&quot;postTitle&quot; data-dcnode-id=&quot;1120&quot;&gt;&lt;span data-dcnode-id=&quot;1121&quot; instrument_node=&quot;&quot;&gt;Remote Collaboration Company Arthur Rolls Out First Major Updates&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/a&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1116&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1107&quot;&gt;&lt;i data-dcnode-id=&quot;1114&quot;&gt;&lt;span data-dcnode-id=&quot;1115&quot; instrument_node=&quot;&quot;&gt;“Remote and hybrid work has always been talked about in future tense; however, the COVID-19 pandemic has made that the current reality,”&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;1113&quot; instrument_node=&quot;&quot;&gt; Arthur Founder and CEO Christoph Fleischmann said in a release&lt;/span&gt;&lt;i data-dcnode-id=&quot;1111&quot;&gt;&lt;span data-dcnode-id=&quot;1112&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;1110&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;i data-dcnode-id=&quot;1108&quot;&gt;&lt;span data-dcnode-id=&quot;1109&quot; instrument_node=&quot;&quot;&gt;“We’re able to bring real-world VR applications to the classroom, educating students on how to utilize new technologies that they’ll one day use in a business environment.”&lt;/span&gt;&lt;/i&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1106&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;1104&quot;&gt;&lt;span data-dcnode-id=&quot;1105&quot; instrument_node=&quot;&quot;&gt;Virbela and Stanford University&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1103&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1099&quot;&gt;&lt;a data-dcnode-id=&quot;1101&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//arpost.co/2021/06/09/hands-on-virbela-review-interview-howland/&quot;&gt;&lt;span data-dcnode-id=&quot;1102&quot; instrument_node=&quot;&quot;&gt;Virbela&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1100&quot; instrument_node=&quot;&quot;&gt; followed the interesting trajectory from being a project largely within the University of California San Diego to being an enterprise leader in remote collaboration to working with universities like Stanford and Davenport University.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1098&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1089&quot;&gt;&lt;i data-dcnode-id=&quot;1096&quot;&gt;&lt;span data-dcnode-id=&quot;1097&quot; instrument_node=&quot;&quot;&gt;“Stanford has been a longtime customer of ours,”&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;1095&quot; instrument_node=&quot;&quot;&gt; President and Co-Founder Alex Howland told &lt;/span&gt;&lt;i data-dcnode-id=&quot;1093&quot;&gt;&lt;span data-dcnode-id=&quot;1094&quot; instrument_node=&quot;&quot;&gt;ARPost&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;1092&quot; instrument_node=&quot;&quot;&gt; in a now-classic in-platform interview. &lt;/span&gt;&lt;i data-dcnode-id=&quot;1090&quot;&gt;&lt;span data-dcnode-id=&quot;1091&quot; instrument_node=&quot;&quot;&gt;“Stanford reports that it is the ability to create that sense of co-presence that really helps a cohort feel more connected.”&lt;/span&gt;&lt;/i&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1088&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1086&quot;&gt;&lt;span data-dcnode-id=&quot;1087&quot; instrument_node=&quot;&quot;&gt;Virbela doesn’t just work with universities to create virtual campus experiences and remote events. The company also contributes to academic research to help us understand how learning in VR works. Virbela has even played host to two of nine conferences of the Immersive Learning Research Network.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1085&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;1083&quot;&gt;&lt;span data-dcnode-id=&quot;1084&quot; instrument_node=&quot;&quot;&gt;Hybrid Experiences&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;1082&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1080&quot;&gt;&lt;span data-dcnode-id=&quot;1081&quot; instrument_node=&quot;&quot;&gt;So far, the experiences that we’ve seen are entirely immersive classes if not entirely immersive curricula. These are exciting use cases to start with, but they aren’t indicative of all (or indeed even most) XR educational experiences. Most of these experiences use XR as a supplement for in-person teaching and learning.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1079&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1074&quot;&gt;&lt;span data-dcnode-id=&quot;1078&quot; instrument_node=&quot;&quot;&gt;The idea of XR educational content being a support tool for in-person learning is reminiscent of more tailored use cases for &lt;/span&gt;&lt;a data-dcnode-id=&quot;1076&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//arpost.co/2021/06/25/augmented-reality-special-education/&quot;&gt;&lt;span data-dcnode-id=&quot;1077&quot; instrument_node=&quot;&quot;&gt;XR in special education&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1075&quot; instrument_node=&quot;&quot;&gt;. XR is objectively better in some use cases, but it doesn’t have to be a replacement for in-person instruction in most situations.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1073&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;1071&quot;&gt;&lt;span data-dcnode-id=&quot;1072&quot; instrument_node=&quot;&quot;&gt;Lobaki and Kemper County Mississippi&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1070&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1068&quot;&gt;&lt;span data-dcnode-id=&quot;1069&quot; instrument_node=&quot;&quot;&gt;A high school doesn’t need to be online to go virtual.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1067&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1054&quot;&gt;&lt;span data-dcnode-id=&quot;1066&quot; instrument_node=&quot;&quot;&gt;Through a recent grant from the State of Mississippi, the &lt;/span&gt;&lt;a data-dcnode-id=&quot;1064&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.kempercountyschools.org/&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1065&quot; instrument_node=&quot;&quot;&gt;Kemper County School District&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1063&quot; instrument_node=&quot;&quot;&gt; is partnering with &lt;/span&gt;&lt;a data-dcnode-id=&quot;1061&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.lobaki.com/&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1062&quot; instrument_node=&quot;&quot;&gt;Lobaki&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1060&quot; instrument_node=&quot;&quot;&gt; and &lt;/span&gt;&lt;a data-dcnode-id=&quot;1058&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//arpost.co/tag/pico/&quot;&gt;&lt;span data-dcnode-id=&quot;1059&quot; instrument_node=&quot;&quot;&gt;Pico Interactive&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1057&quot; instrument_node=&quot;&quot;&gt;. The goal is “to create an immersive learning environment designed to be an extension of the classroom and provide students educational content to support classroom learning,” according to press materials provided to &lt;/span&gt;&lt;i data-dcnode-id=&quot;1055&quot;&gt;&lt;span data-dcnode-id=&quot;1056&quot; instrument_node=&quot;&quot;&gt;ARPost.&lt;/span&gt;&lt;/i&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1053&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1047&quot;&gt;&lt;i data-dcnode-id=&quot;1051&quot;&gt;&lt;span data-dcnode-id=&quot;1052&quot; instrument_node=&quot;&quot;&gt;“We use VR as an enhancement to our curriculum,”&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;1050&quot; instrument_node=&quot;&quot;&gt; Kemper County School District Assistant Superintendent, Dr. Frederick Hickmon, said in an email to &lt;/span&gt;&lt;i data-dcnode-id=&quot;1048&quot;&gt;&lt;span data-dcnode-id=&quot;1049&quot; instrument_node=&quot;&quot;&gt;ARPost. “Student experiences in VR build capacity for a deeper dive while teaching and learning.”&lt;/span&gt;&lt;/i&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1046&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1044&quot;&gt;&lt;span data-dcnode-id=&quot;1045&quot; instrument_node=&quot;&quot;&gt;The project should include virtual in-classroom learning as well as immersive trips to the distant past, the microscopic world, and more. These experiences will use Lobaki’s user-friendly content creation tools and super-impressive photo-based avatar engine and be experienced on the Pico Neo 2 headset.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1043&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1037&quot;&gt;&lt;i data-dcnode-id=&quot;1041&quot;&gt;&lt;span data-dcnode-id=&quot;1042&quot; instrument_node=&quot;&quot;&gt;“The opportunities are endless when discussing the potential for VR as an educational tool. We at Kemper County School District are interested in preparing all students to become college and career-ready. VR is now a part of this,”&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;1040&quot; instrument_node=&quot;&quot;&gt; said Hickmon. &lt;/span&gt;&lt;i data-dcnode-id=&quot;1038&quot;&gt;&lt;span data-dcnode-id=&quot;1039&quot; instrument_node=&quot;&quot;&gt;“As educators, we are excited about providing new and engaging opportunities for our students to learn at the highest levels.”&amp;nbsp;&amp;nbsp;&lt;/span&gt;&lt;/i&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1036&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;1034&quot;&gt;&lt;span data-dcnode-id=&quot;1035&quot; instrument_node=&quot;&quot;&gt;Understanding XR Education&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;1033&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1027&quot;&gt;&lt;i data-dcnode-id=&quot;1031&quot;&gt;&lt;span data-dcnode-id=&quot;1032&quot; instrument_node=&quot;&quot;&gt;“In the years ahead, we’re really talking about the convergence of emerging, not just immersive technologies,”&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;1030&quot; instrument_node=&quot;&quot;&gt; Futurist Maya Georgieva said during the State of XR &amp;amp; Immersive Learning Outlook Report launch at this year’s Immersive Learning Research Network Annual Conference. &lt;/span&gt;&lt;i data-dcnode-id=&quot;1028&quot;&gt;&lt;span data-dcnode-id=&quot;1029&quot; instrument_node=&quot;&quot;&gt;“There is little doubt in my mind that this [convergence] will change how we learn.”&lt;/span&gt;&lt;/i&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1026&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div data-dcnode-id=&quot;1016&quot; style=&quot;clear:both; margin-top:0em; margin-bottom:1em;&quot;&gt;&lt;a class=&quot;ue6fa21802f79c270d818db9757f1bc11&quot; data-dcnode-id=&quot;1017&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//arpost.co/2021/06/22/highlights-trends-announcements-ilrn-2021/&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;div data-dcnode-id=&quot;1018&quot; style=&quot;padding-left:1em; padding-right:1em;&quot;&gt;&lt;span class=&quot;ctaText&quot; data-dcnode-id=&quot;1022&quot;&gt;&lt;span data-dcnode-id=&quot;1023&quot; instrument_node=&quot;&quot;&gt;See Also:&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1021&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp; &lt;/span&gt;&lt;span class=&quot;postTitle&quot; data-dcnode-id=&quot;1019&quot;&gt;&lt;span data-dcnode-id=&quot;1020&quot; instrument_node=&quot;&quot;&gt;Highlights, Trends, and Announcements From iLRN 2021&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/a&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1015&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1013&quot;&gt;&lt;span data-dcnode-id=&quot;1014&quot; instrument_node=&quot;&quot;&gt;The paper, which Georgieva co-authored, took inventory of the promises of XR education, but also recognized a number of obstacles. These included access, affordability, the need for educator training in XR technology, a lack of XR content, and a lack of infrastructure and tech support in most locations.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1012&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1007&quot;&gt;&lt;span data-dcnode-id=&quot;1011&quot; instrument_node=&quot;&quot;&gt;A number of these trends were also recognized by the recent &lt;/span&gt;&lt;a data-dcnode-id=&quot;1009&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//arpost.co/2021/08/02/xra-perkins-coie-2021-xr-industry-survey/&quot;&gt;&lt;span data-dcnode-id=&quot;1010&quot; instrument_node=&quot;&quot;&gt;Perkins Coie and XRA “XR Industry Insider: 2021 XR Survey&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1008&quot; instrument_node=&quot;&quot;&gt;.” Nearly all respondents said that XR education was a promising field, though this field was also recognized as one of those most troubled by a lack of immersive content.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1006&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1004&quot;&gt;&lt;span data-dcnode-id=&quot;1005&quot; instrument_node=&quot;&quot;&gt;The iLRN conference in particular encouraged educators to work with content creators to create immersive content, particularly for XR education. The Perkins Coie and XRA survey suggested that content shortages might be resolved as more democratized authoring tools become available making user-generated content more prevalent and effective.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1003&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1001&quot;&gt;&lt;span data-dcnode-id=&quot;1002&quot; instrument_node=&quot;&quot;&gt;Many of the limitations on XR education applications may also be because many would-be users are anticipating the future and overlooking today’s solutions. Specifically, some industry experts suggest that virtual reality is over-emphasized while augmented reality is overlooked.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1000&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;991&quot;&gt;&lt;i data-dcnode-id=&quot;998&quot;&gt;&lt;span data-dcnode-id=&quot;999&quot; instrument_node=&quot;&quot;&gt;“We need to decouple our awareness of immersive technology from the hardware,”&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;997&quot; instrument_node=&quot;&quot;&gt; Brightline Interactive CEO, Tyler Gates, said during a panel at the &lt;/span&gt;&lt;a data-dcnode-id=&quot;995&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//arpost.co/2021/05/05/vrara-holds-annual-education-forum/&quot;&gt;&lt;span data-dcnode-id=&quot;996&quot; instrument_node=&quot;&quot;&gt;VR/AR Education Forum&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;994&quot; instrument_node=&quot;&quot;&gt; this May. &lt;/span&gt;&lt;i data-dcnode-id=&quot;992&quot;&gt;&lt;span data-dcnode-id=&quot;993&quot; instrument_node=&quot;&quot;&gt;“We’re not going to see [large-scale] adoption until people recognize that this technology is about more than just headsets.”&lt;/span&gt;&lt;/i&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;990&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;988&quot;&gt;&lt;span data-dcnode-id=&quot;989&quot; instrument_node=&quot;&quot;&gt;Reinventing Education(?)&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;987&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;985&quot;&gt;&lt;span data-dcnode-id=&quot;986&quot; instrument_node=&quot;&quot;&gt;A remaining debate in XR education is whether traditional education limits XR’s potential or whether XR should remain in a support capacity to traditional learning. Howland said that XR experiences need to have familiar elements to our physical lives to make them usable. Or, as XR researcher and consultant Heather Dodds told me during an iLRN event in Altspace:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;984&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;981&quot;&gt;&lt;i data-dcnode-id=&quot;982&quot;&gt;&lt;span data-dcnode-id=&quot;983&quot; instrument_node=&quot;&quot;&gt;“The tech has always been the tech. Humans don’t change – we still have those needs to communicate which are both synchronous and asynchronous. The tech is just a medium.”&lt;/span&gt;&lt;/i&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;980&quot; instrument_node=&quot;&quot;&gt;
