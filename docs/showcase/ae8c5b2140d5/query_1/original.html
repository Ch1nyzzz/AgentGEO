        the early 17&lt;sup&gt;th&lt;/sup&gt; century,&lt;/font&gt;&lt;/b&gt;&lt;font face=&quot;Georgia, Times New Roman, Times, serif&quot; size=&quot;-1&quot;&gt; 

        craftsmen and scientists introduced a new tool for studying the heavens. 

        The telescope, one of the central instruments of the Scientific Revolution,

      &lt;p&gt;&lt;font face=&quot;Georgia, Times New Roman, Times, serif&quot; size=&quot;-1&quot;&gt;The manufacture 

        and properties of lenses were known since the time of the Greeks. Islamic 

        scholars such as the Egyptian physician Alhazen (born in the 10&lt;sup&gt;th&lt;/sup&gt; 

        century) made important contributions to the study of optics. However, 

        lenses were not introduced to Europe until around the 13&lt;sup&gt;th&lt;/sup&gt; 

        century. By 1300, the first eyeglasses were available in cities such as 

        Venice and Florence, and advances in lens making and polishing soon followed. 

        The tools for making a telescope were therefore available but, for reasons 

        that are not clear, the invention of the telescope had to wait.&lt;/font&gt;&lt;/p&gt;

      &lt;p&gt;&lt;font face=&quot;Georgia, Times New Roman, Times, serif&quot;&gt;&lt;b&gt;&lt;font size=&quot;+1&quot;&gt;T&lt;/font&gt;he 

        telescope first appeared&lt;/b&gt;&lt;/font&gt;&lt;font face=&quot;Georgia, Times New Roman, Times, serif&quot; size=&quot;-1&quot;&gt; 

        in the Netherlands. In October 1608, the national government in The Hague 

        discussed a patent application for a device that aided &amp;quot;seeing faraway 

        things as though nearby.&amp;quot; It consisted of a convex and concave lens in 

        a tube. The combination magnified objects three or four times. The government 

        found the device too easy to copy and did not award a patent, but it voted 

        a small award to Jacob Metius and employed Hans Lipperhey to make several 

        binocular versions, for which he was well paid.&lt;/font&gt;&lt;/p&gt;

    &lt;/td&gt;

  &lt;/tr&gt;

  &lt;tr&gt; &lt;/tr&gt;

&lt;/table&gt;

&lt;table width=&quot;59%&quot; border=&quot;0&quot; cellspacing=&quot;8&quot; cellpadding=&quot;1&quot;&gt;

  &lt;tr&gt; 

    &lt;td width=&quot;15%&quot; height=&quot;124&quot; rowspan=&quot;2&quot;&gt;&lt;img src=&quot;../images/spacer.gif&quot; width=&quot;154&quot; height=&quot;9&quot; alt=&quot;spacer&quot;&gt;&lt;/td&gt;

    &lt;td width=&quot;85%&quot; valign=&quot;top&quot;&gt; &lt;div align=&quot;left&quot;&gt; 

        &lt;p&gt;&lt;font color=&quot;#0f024F&quot; size=&quot;2&quot; face=&quot;Verdana, Arial, Helvetica, sans-serif&quot;&gt;&lt;b&gt;&lt;a name=&quot;portasketch&quot;&gt;&lt;/a&gt;The 

          earliest known illustration of a telescope. Giovanbattista &lt;br&gt;

          della Porta included this sketch in a letter written in August 1609.&lt;/b&gt;&lt;/font&gt;&lt;font color=&quot;#0f024F&quot; size=&quot;2&quot; face=&quot;Verdana, Arial, Helvetica, sans-serif&quot;&gt;&lt;b&gt; 

          &lt;/b&gt;&lt;/font&gt;&lt;/p&gt;

        &lt;/div&gt;&lt;/td&gt;

  &lt;/tr&gt;

  &lt;tr&gt;

    &lt;td valign=&quot;top&quot;&gt;&lt;div align=&quot;center&quot;&gt;&lt;font color=&quot;#0f024F&quot; size=&quot;2&quot; face=&quot;Verdana, Arial, Helvetica, sans-serif&quot;&gt;&lt;b&gt;&lt;a href=&quot;pic-first-telescopes-portasketch.htm&quot;&gt;&lt;img src=&quot;images-tools/first-porta-sketch-sm.jpg&quot; alt=&quot;The earliest known illustration of a telescope.&quot; width=&quot;200&quot; height=&quot;50&quot; border=&quot;1&quot; align=&quot;middle&quot;&gt;&lt;/a&gt;&lt;/b&gt;&lt;/font&gt;&lt;/div&gt;&lt;/td&gt;

  &lt;/tr&gt;

&lt;/table&gt;

&lt;table width=&quot;776&quot; border=&quot;0&quot; cellspacing=&quot;5&quot; cellpadding=&quot;5&quot; height=&quot;683&quot;&gt;

  &lt;tr&gt; 

    &lt;td rowspan=&quot;2&quot; width=&quot;148&quot; valign=&quot;top&quot;&gt; &lt;p&gt;&lt;a name=&quot;pleiades&quot;&gt;&lt;/a&gt;&lt;a href=&quot;pic-first-telescopes-pleiades.htm&quot;&gt;&lt;img src=&quot;images-tools/first-pleiades-galileo.gif&quot; alt=&quot;The Pleiades as drawn by Galileo.&quot; width=&quot;146&quot; height=&quot;89&quot; border=&quot;1&quot;&gt;&lt;/a&gt;&lt;br&gt;

        &lt;font color=&quot;#0f024F&quot; size=&quot;2&quot; face=&quot;Verdana, Arial, Helvetica, sans-serif&quot;&gt;&lt;strong&gt;The 

        Pleiades as drawn by Galileo (from &lt;em&gt;Sidereus Nuncius&lt;/em&gt;)&lt;/strong&gt;&lt;/font&gt;&lt;/p&gt;

      &lt;p&gt;&lt;a name=&quot;galilean&quot;&gt;&lt;/a&gt;&lt;a href=&quot;pic-first-telescopes-galilean-telescope-diagram.htm&quot;&gt;&lt;img src=&quot;images-tools/first-galilean-refractor-sm.jpg&quot; alt=&quot;Galilean telescope.&quot; width=&quot;146&quot; height=&quot;46&quot; border=&quot;1&quot;&gt;&lt;br&gt;

        &lt;/a&gt;&lt;font face=&quot;Times New Roman, Times, serif&quot; size=&quot;2&quot; color=&quot;#0f024F&quot;&gt;&lt;b&gt;&lt;font face=&quot;Verdana, Arial, Helvetica, sans-serif&quot;&gt;Galilean 

        telescope&lt;br&gt;

        &lt;/font&gt;&lt;/b&gt;&lt;font size=&quot;1&quot; face=&quot;Verdana, Arial, Helvetica, sans-serif&quot;&gt;A 

        Galilean type refracting telescope. &lt;/font&gt;&lt;/font&gt;&lt;img src=&quot;../images/spacer.gif&quot; width=&quot;148&quot; height=&quot;8&quot; alt=&quot;spacer&quot;&gt;&lt;/p&gt;

    &lt;/td&gt;

    &lt;td rowspan=&quot;2&quot; width=&quot;455&quot; align=&quot;left&quot; valign=&quot;top&quot;&gt; &lt;p&gt;&lt;font face=&quot;Georgia, Times New Roman, Times, serif&quot; size=&quot;-1&quot;&gt;The 

        telescope (along with the microscope, another 17&lt;sup&gt;th&lt;/sup&gt; century 

        invention) demonstrated that ordinary observers could see things that 

        the Greek philosophers had not dreamed of. It helped shift authority in 

        the observation of nature from men to instruments.&lt;/font&gt; &lt;/p&gt;

      &lt;p align=&quot;center&quot;&gt;&lt;font color=&quot;#0f024F&quot; face=&quot;Verdana, Arial, Helvetica, sans-serif&quot;&gt;&lt;a name=&quot;galileo&quot;&gt;&lt;/a&gt;&lt;strong&gt;Galileo's 

        Optic Tube&lt;/strong&gt;&lt;/font&gt; &lt;/p&gt;

      &lt;p&gt;&lt;font size=&quot;+1&quot; face=&quot;Georgia, Times New Roman, Times, serif&quot;&gt;&lt;strong&gt;N&lt;/strong&gt;&lt;/font&gt;&lt;font face=&quot;Georgia, Times New Roman, Times, serif&quot;&gt;&lt;strong&gt;ews 

        of the telescope's invention&lt;/strong&gt;&lt;/font&gt;&lt;font face=&quot;Georgia, Times New Roman, Times, serif&quot; size=&quot;-1&quot;&gt; 

        spread rapidly through Europe. By April 1609, three-powered spyglasses 

        could be bought in spectacle-makers' shops on the Pont Neuf in Paris, 

        and four months later there were several in Italy. They were made famous 

        by an Italian professor and experimenter named Galileo Galilei in the 

        summer of 1609 at the University of Padua near Venice.&lt;/font&gt;&lt;/p&gt;

      &lt;p&gt;&lt;font face=&quot;Georgia, Times New Roman, Times, serif&quot; size=&quot;-1&quot;&gt;While Galileo 

        did not invent the telescope, he did design and build telescopes with 

        increasingly higher magnifying power for his own use and to present to 

        his patrons. He was a skilled instrument maker, and his telescopes were 

        known for their high quality.&lt;/font&gt;&lt;/p&gt;

      &lt;p&gt;&lt;font face=&quot;Georgia, Times New Roman, Times, serif&quot; size=&quot;-1&quot;&gt;Galileo's 

        first telescope was basically a tube containing two lenses. His first 

        attempt was a three-power instrument; this was followed by one that magnified 

        objects approximately nine times. He showed the latter device to the Venetian 

        senate, hoping to impress them with its commercial and military potential.&lt;/font&gt;&lt;/p&gt;

      &lt;p&gt;&lt;font size=&quot;-1&quot; face=&quot;Georgia, Times New Roman, Times, serif&quot;&gt;Observations with 

        Galileo's telescope strengthened the new idea that the Earth and the planets 

        circled the Sun. It also revealed multitudes of stars in the Milky Way 

        and elsewhere. One seemed to see not a fixed sphere of stars, but a universe 

        of stars extending outward to some vast and unknown distance, perhaps 

        to infinity.&lt;/font&gt;&lt;/p&gt;

      &lt;table width=&quot;174&quot; height=&quot;251&quot; border=&quot;0&quot; align=&quot;right&quot; cellpadding=&quot;5&quot; cellspacing=&quot;5&quot;&gt;

        &lt;tr&gt; 

          &lt;td width=&quot;154&quot; height=&quot;241&quot; valign=&quot;top&quot;&gt; &lt;p&gt;&lt;font face=&quot;Arial, Helvetica, sans-serif&quot; size=&quot;-1&quot;&gt;&lt;a name=&quot;galileantelescope&quot;&gt;&lt;/a&gt;&lt;a href=&quot;pic-first-telescopes-galilean-telescope.htm&quot;&gt;&lt;img src=&quot;images-tools/first-galilean_telescope-sm.jpg&quot; alt=&quot;Galilean telescope&quot; width=&quot;150&quot; height=&quot;210&quot; border=&quot;1&quot;&gt;&lt;br&gt;

              &lt;/a&gt;&lt;b&gt;&lt;font size=&quot;2&quot; face=&quot;Verdana, Arial, Helvetica, sans-serif&quot; color=&quot;#0f024F&quot;&gt;Galileo's 

              telescopes&lt;/font&gt;&lt;/b&gt;&lt;/font&gt;&lt;/p&gt;&lt;/td&gt;

        &lt;/tr&gt;

      &lt;/table&gt;

      &lt;p&gt;&lt;font face=&quot;Georgia, Times New Roman, Times, serif&quot; size=&quot;+1&quot;&gt;&lt;b&gt;L&lt;/b&gt;&lt;/font&gt;&lt;font face=&quot;Georgia, Times New Roman, Times, serif&quot;&gt;&lt;b&gt;ike 

        the earlier Dutch versions&lt;/b&gt;&lt;font size=&quot;-1&quot;&gt;, Galileo's refracting telescopes 

        (&amp;quot;refractors&amp;quot;) used lenses to bend, or refract, light. They 

        featured a &lt;a href=&quot;pic-first-telescopes-galilean-telescope-diagram.htm&quot;&gt;concave 

        eyepiece lens and a convex objective lens&lt;/a&gt;. The telescope was fairly 

        simple to make. Galileo, however, faced difficulties finding clear and 

        homogenous glass for his lenses. The glass was full of little bubbles 

        and had a greenish tinge (caused by the presence of iron impurities). 

        This was a problem that troubled telescope makers for centuries. It was 

        also hard to shape the lenses perfectly. The images of stars were blurry, 

        and surrounded by color haloes.&lt;/font&gt;&lt;/font&gt;&lt;/p&gt;

      &lt;p&gt;&lt;font face=&quot;Georgia, Times New Roman, Times, serif&quot; size=&quot;-1&quot;&gt;The limiting 

        factor of these early refractors was their small field of view. Only part 

        of the full Moon, for example, could be seen at one time. Galileo himself 

        continued to improve his devices until they were over four feet long and 

        could magnify up to thirty times.&lt;/font&gt;&lt;/p&gt;

    &lt;/td&gt;

    &lt;td rowspan=&quot;2&quot; width=&quot;123&quot; align=&quot;left&quot; valign=&quot;top&quot;&gt;&lt;p&gt;&amp;nbsp;&lt;/p&gt;

      &lt;p&gt;&amp;nbsp;&lt;/p&gt;

      &lt;p&gt;&amp;nbsp;&lt;/p&gt;

      &lt;p&gt;&amp;nbsp;&lt;/p&gt;

      &lt;p align=&quot;center&quot;&gt;&lt;font size=&quot;2&quot; face=&quot;Verdana, Arial, Helvetica, sans-serif&quot;&gt;&lt;strong&gt;&lt;a href=&quot;../ideas/start-of-scientific-cosmology.htm#galileo&quot;&gt;Who 

        was &lt;br&gt;

        Galileo Galilei?&lt;/a&gt;&lt;br&gt;

        &lt;img src=&quot;images-tools/galileo-galilethumb.gif&quot; width=&quot;59&quot; height=&quot;90&quot;&gt; 

        &lt;/strong&gt;&lt;/font&gt;&lt;/p&gt;

      &lt;p align=&quot;center&quot;&gt;&amp;nbsp;&lt;/p&gt;

      &lt;p align=&quot;center&quot;&gt;&amp;nbsp;&lt;/p&gt;

      &lt;p align=&quot;center&quot;&gt;&amp;nbsp;&lt;/p&gt;

      &lt;p align=&quot;center&quot;&gt;&lt;strong&gt;&lt;font size=&quot;2&quot; face=&quot;Verdana, Arial, Helvetica, sans-serif&quot;&gt;&lt;a href=&quot;../ideas/start-of-scientific-cosmology.htm#galileo&quot;&gt;What 

        Galileo saw with his telescopes&lt;/a&gt;&lt;/font&gt;&lt;/strong&gt;&lt;/p&gt;

      &lt;/td&gt;

  &lt;/tr&gt;

  &lt;tr&gt; &lt;/tr&gt;

&lt;/table&gt;

&lt;table width=&quot;643&quot; border=&quot;0&quot; cellspacing=&quot;5&quot; cellpadding=&quot;5&quot; height=&quot;525&quot;&gt;

  &lt;tr&gt; 

    &lt;td width=&quot;152&quot; height=&quot;515&quot; valign=&quot;top&quot;&gt; 

      &lt;p&gt;&lt;a name=&quot;keplerian&quot;&gt;&lt;/a&gt;&lt;img src=&quot;../images/spacer.gif&quot; width=&quot;148&quot; height=&quot;8&quot; alt=&quot;spacer&quot;&gt;&lt;a href=&quot;pic-first-telescopes-keplerian-telescope-diagram.htm&quot;&gt;&lt;img src=&quot;images-tools/first-keplerian-diagram.gif&quot; alt=&quot;Keplerian telescope&quot; width=&quot;146&quot; height=&quot;42&quot; border=&quot;1&quot;&gt;&lt;br&gt;

        &lt;/a&gt;&lt;font face=&quot;Times New Roman, Times, serif&quot; size=&quot;2&quot; color=&quot;#0f024F&quot;&gt;&lt;b&gt;&lt;font face=&quot;Verdana, Arial, Helvetica, sans-serif&quot;&gt;Keplerian 

        telescope&lt;br&gt;

        &lt;/font&gt;&lt;/b&gt;&lt;font size=&quot;1&quot; face=&quot;Verdana, Arial, Helvetica, sans-serif&quot;&gt;A 

        Keplerian type refracting telescope. &lt;/font&gt;&lt;/font&gt;&lt;/p&gt;&lt;/td&gt;

    &lt;td width=&quot;456&quot; align=&quot;left&quot; valign=&quot;top&quot;&gt; &lt;div align=&quot;center&quot;&gt;&lt;font face=&quot;Verdana, Arial, Helvetica, sans-serif&quot; color=&quot;#0f024F&quot;&gt;&lt;strong&gt;Kepler's 

        Variation on the Telescope&lt;/strong&gt;&lt;/font&gt; &lt;/div&gt;

      &lt;p&gt;&lt;font face=&quot;Georgia, Times New Roman, Times, serif&quot; size=&quot;-1&quot;&gt;A variation 

        on the Galilean telescope was suggested by Johannes Kepler in his 1611 

        book &lt;i&gt;Dioptrice&lt;/i&gt;. He noted that a telescopic device could be built 

        using two convex lenses, but the image it produced would be upside down. 

        &lt;/font&gt;&lt;/p&gt;

      &lt;p&gt;&lt;font face=&quot;Georgia, Times New Roman, Times, serif&quot;&gt;&lt;b&gt;&lt;font size=&quot;+1&quot;&gt;T&lt;/font&gt;he 

        advantage&lt;/b&gt;&lt;/font&gt;&lt;font face=&quot;Georgia, Times New Roman, Times, serif&quot; size=&quot;-1&quot;&gt; 

        of this design, according to Kepler, was its larger field of view and 

        high magnification. His recommendation was not immediately taken up by 

        astronomers, however. The Keplerian telescope was not accepted until Christoph 

        Scheiner, a German Jesuit mathematician interested in instruments, published 

        his 1630 book &lt;i&gt;Rosa Ursina&lt;/i&gt;.&lt;a name=&quot;sunspot&quot;&gt;&lt;/a&gt;&lt;/font&gt;&lt;/p&gt;

      &lt;table width=&quot;224&quot; height=&quot;155&quot; border=&quot;0&quot; align=&quot;right&quot; cellpadding=&quot;5&quot; cellspacing=&quot;5&quot;&gt;

        &lt;tr&gt; 

          &lt;td width=&quot;204&quot; align=&quot;center&quot; valign=&quot;top&quot;&gt; 

            &lt;p&gt;&lt;font face=&quot;Arial, Helvetica, sans-serif&quot; size=&quot;-1&quot;&gt;&lt;a href=&quot;pic-first-telescopes-sunspot.htm&quot;&gt;&lt;img src=&quot;images-tools/first-schneiners-sunspots-sm.jpg&quot; alt=&quot;Sunspot plate&quot; width=&quot;200&quot; height=&quot;156&quot; vspace=&quot;6&quot; border=&quot;0&quot;&gt;&lt;br&gt;

              &lt;/a&gt;&lt;/font&gt;&lt;font face=&quot;Verdana, Arial, Helvetica, sans-serif&quot; size=&quot;2&quot; color=&quot;#0f024F&quot;&gt;&lt;b&gt;Sunspot 

              plate from Schneiner's &lt;em&gt;Tres Epistolae&lt;/em&gt;&lt;/b&gt;&lt;/font&gt;&lt;/p&gt;&lt;/td&gt;

        &lt;/tr&gt;

      &lt;/table&gt;

      &lt;p&gt;&lt;font face=&quot;Georgia, Times New Roman, Times, serif&quot; size=&quot;-1&quot;&gt;For his 

        study of sunspots, Scheiner experimented with telescopes having only convex 

        lenses. He found that when he viewed an object directly through such an 

        instrument the image was flipped upside down. But it was much brighter 

        and the field of view much larger than in a Galilean telescope, as Kepler 

        had predicted. Since for astronomical observations an inverted image is 

        no problem, the advantages of what became known as the &amp;quot;astronomical telescope&amp;quot; 

        led to its general acceptance in the science community by the middle of 

        the 17&lt;sup&gt;th&lt;/sup&gt; century. &lt;/font&gt;&lt;/p&gt;

    &lt;/td&gt;

  &lt;/tr&gt;

&lt;/table&gt;

&lt;table width=&quot;642&quot; border=&quot;0&quot; cellspacing=&quot;5&quot; cellpadding=&quot;5&quot;&gt;

  &lt;tr&gt; 

    &lt;td width=&quot;24%&quot; height=&quot;169&quot;&gt;&lt;a name=&quot;hevelius&quot;&gt;&lt;/a&gt;&lt;/td&gt;

    &lt;td width=&quot;76%&quot; valign=&quot;top&quot; height=&quot;169&quot;&gt; &lt;div align=&quot;center&quot;&gt;

        &lt;table width=&quot;50&quot; height=&quot;133&quot; border=&quot;0&quot; align=&quot;right&quot; cellpadding=&quot;5&quot; cellspacing=&quot;5&quot;&gt;

          &lt;tr&gt;

            &lt;td&gt;&lt;p align=&quot;center&quot;&gt;&lt;a href=&quot;pic-first-telescopes-hevelius.htm&quot;&gt;&lt;img src=&quot;images-tools/first-hevelius_telescope_60ft-sm.jpg&quot; alt=&quot;Hevelius and 60 foot telescope&quot; width=&quot;200&quot; height=&quot;169&quot; border=&quot;0&quot;&gt;&lt;/a&gt;&lt;font size=&quot;-1&quot; face=&quot;Verdana, Arial, Helvetica, sans-serif&quot; color=&quot;#0f024F&quot;&gt;&lt;b&gt;&lt;br&gt;

                Hevelius and 60-foot telescope&lt;/b&gt;&lt;/font&gt;&lt;/p&gt;

            &lt;/td&gt;

          &lt;/tr&gt;

        &lt;/table&gt;

        &lt;font face=&quot;Verdana, Arial, Helvetica, sans-serif&quot; color=&quot;#0f024F&quot;&gt;&lt;strong&gt;Telescopic 

        Oddities&lt;/strong&gt;&lt;/font&gt; &lt;/div&gt;

      &lt;p&gt;&lt;font face=&quot;Georgia, Times New Roman, Times, serif&quot; size=&quot;-1&quot;&gt;One disadvantage 

        of the astronomical telescope suggested by Kepler and advocated by Scheiner 

        was that its higher magnification was accompanied by more spherical and 

        chromatic aberration - geometric distortion and false colors. Over the 

        next several decades, lens-grinding and polishing techniques improved 

        gradually. A specialized craft community of telescope makers slowly developed. 

        These craftsmen worked to produce better spherical lenses with decreased 

        curvature (and a longer &lt;a href=&quot;images-tools/first-keplerian-diagram-lg.gif&quot;&gt;focal 

        length&lt;/a&gt;) which improved the quality of telescopes but made them longer.&lt;/font&gt;&lt;/p&gt;

      

    &lt;/td&gt;

  &lt;/tr&gt;

&lt;/table&gt;

&lt;table width=&quot;635&quot; border=&quot;0&quot; cellspacing=&quot;5&quot; cellpadding=&quot;5&quot; height=&quot;897&quot;&gt;

  &lt;tr&gt; 

    &lt;td rowspan=&quot;2&quot; width=&quot;109&quot;&gt;&lt;img src=&quot;../images/spacer.gif&quot; width=&quot;148&quot; height=&quot;8&quot; alt=&quot;spacer&quot;&gt;&lt;/td&gt;

    &lt;td rowspan=&quot;2&quot; width=&quot;489&quot; align=&quot;left&quot; valign=&quot;top&quot;&gt; 

      &lt;table width=&quot;75&quot; border=&quot;0&quot; cellspacing=&quot;5&quot; cellpadding=&quot;1&quot; align=&quot;right&quot;&gt;

        &lt;tr&gt; 

          &lt;td colspan=&quot;2&quot;&gt;&lt;a name=&quot;danzig140&quot;&gt;&lt;/a&gt;&lt;a href=&quot;pic-first-telescopes-danzig150.htm&quot;&gt;&lt;img src=&quot;images-tools/first-hevelius_telescope_140ft-sm.jpg&quot; alt=&quot;The 140 foot telescope at Danzig&quot; width=&quot;175&quot; height=&quot;138&quot; border=&quot;0&quot; align=&quot;right&quot;&gt;&lt;/a&gt;&lt;/td&gt;

        &lt;/tr&gt;

        &lt;tr&gt; 

          &lt;td colspan=&quot;2&quot;&gt;

            &lt;div align=&quot;center&quot;&gt;&lt;font color=&quot;#0f024F&quot; size=&quot;-1&quot; face=&quot;Verdana, Arial, Helvetica, sans-serif&quot;&gt;&lt;b&gt;The 

              150-foot telescope at Danzig&lt;/b&gt;&lt;/font&gt;&lt;/div&gt;

          &lt;/td&gt;

        &lt;/tr&gt;

      &lt;/table&gt;

      &lt;font face=&quot;Arial, Helvetica, sans-serif&quot;&gt;&lt;b&gt;&lt;font size=&quot;+1&quot; face=&quot;Georgia, Times New Roman, Times, serif&quot;&gt;F&lt;/font&gt;&lt;font face=&quot;Georgia, Times New Roman, Times, serif&quot;&gt;rom 

      the typical Galilean&lt;/font&gt;&lt;/b&gt;&lt;/font&gt;&lt;font face=&quot;Georgia, Times New Roman, Times, serif&quot; size=&quot;-1&quot;&gt; 

      telescope of 5 or 6 feet in length, astronomical telescopes grew to lengths 

      of 15 or 20 feet by the middle of the 17&lt;sup&gt;th&lt;/sup&gt; century. A typical 

      astronomical telescope of this time was the one made in 1656 by Christiaan 

      Huygens, a Dutch mathematician and astronomer, and his brother Constantine. 

      23 feet long, it magnified objects about a hundred times, and still had 

      a considerable field of view. One of the most spectacular objects that Christiaan 

      Huygens was able to view with their telescope was the great Orion Nebula&lt;/font&gt;&lt;font face=&quot;Arial, Helvetica, sans-serif&quot; size=&quot;-1&quot;&gt;.&lt;/font&gt;

&lt;p align=&quot;left&quot;&gt;&lt;span

style='font-size:12.0pt;'&gt;&lt;font color=&quot;#660066&quot; size=&quot;2&quot; face=&quot;Georgia, Times New Roman, Times, serif&quot;&gt;&lt;b&gt;&lt;img src=&quot;images-tools/quote-top.gif&quot; width=&quot;414&quot; height=&quot;18&quot; alt=&quot;begin quote&quot;&gt;&lt;br&gt;

        &lt;/b&gt;&lt;/font&gt;&lt;/span&gt;&lt;font color=&quot;#750075&quot; size=&quot;2&quot; face=&quot;Verdana, Arial, Helvetica, sans-serif&quot;&gt;&lt;b&gt;In 

        the sword of Orion are three stars quite close together. In 1656 I chanced 

        to be viewing the middle of one of these with a telescope, instead of 

        a single star twelve showed themselves (a not uncommon occurrence). Three 

        of these almost touched each other, and with four others shone through 

        the nebula, so that the space around them seemed far brighter than the 

        rest of the heavens, which was entirely clear and appeared quite black, 

        the effect being that of an opening in the sky through which a brighter 

        region was visible.&lt;br&gt;

        &lt;/b&gt;&lt;/font&gt;&lt;font color=&quot;#221C9B&quot; size=&quot;2&quot; face=&quot;Verdana, Arial, Helvetica, sans-serif&quot;&gt;&lt;b&gt;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&lt;/b&gt;&lt;/font&gt;&lt;font face=&quot;Verdana, Arial, Helvetica, sans-serif&quot; size=&quot;2&quot; color=&quot;#750075&quot;&gt;&lt;b&gt;&lt;em&gt;&amp;#151;Huygens, 

        1659&lt;/em&gt;&lt;/b&gt;&lt;/font&gt;&lt;img src=&quot;images-tools/quote-bottom.gif&quot; width=&quot;415&quot; height=&quot;19&quot; alt=&quot;end quote&quot;&gt;&lt;/p&gt;

      &lt;p&gt;&lt;font face=&quot;Georgia, Times New Roman, Times, serif&quot; size=&quot;-1&quot;&gt;An even 

        larger &amp;quot;long-focus&amp;quot; telescope was described by the German astronomer 

        Johannes Hevelius in his 1673 book &lt;i&gt;Machinae Coelestis&lt;/i&gt;. He made 

        telescopes with focal lengths as long as 150 feet and lenses up to 8 inches 

        in diameter. Their value as research tools was questionable, however, 

        since the telescope's frame flexed and vibrated in the slightest breeze. 

        &lt;a name=&quot;heveliusrooftop&quot;&gt;&lt;/a&gt;&lt;/font&gt;&lt;/p&gt;

      &lt;p align=&quot;center&quot;&gt;&lt;a href=&quot;pic-first-telescopes-hevelius-rooftop.htm&quot;&gt;&lt;img src=&quot;images-tools/first-hevelius_roof_observatory-sm.jpg&quot; alt=&quot;Hevelius' rooftop observatory&quot; width=&quot;300&quot; height=&quot;129&quot; border=&quot;1&quot;&gt;&lt;/a&gt; 

        &lt;br&gt;

        &lt;font face=&quot;Verdana, Arial, Helvetica, sans-serif&quot; size=&quot;2&quot; color=&quot;#0f024F&quot;&gt;&lt;b&gt;Hevelius's 

        rooftop observatory &lt;br&gt;

        (from 1673 book &lt;em&gt;Machina Coelestis&lt;/em&gt;)&lt;a name=&quot;huygens&quot;&gt;&lt;/a&gt;&lt;/b&gt;&lt;/font&gt;&lt;/p&gt;

      &lt;table width=&quot;205&quot; border=&quot;0&quot; cellspacing=&quot;10&quot; align=&quot;left&quot; cellpadding=&quot;0&quot;&gt;

        &lt;tr&gt; 

          &lt;td height=&quot;248&quot;&gt; &lt;div align=&quot;center&quot;&gt;&lt;font face=&quot;Arial, Helvetica, sans-serif&quot; size=&quot;-1&quot;&gt;&lt;a href=&quot;pic-first-telescopes-huygens.htm&quot;&gt;&lt;img src=&quot;images-tools/first-aerial_telescope-sm.jpg&quot; alt=&quot;Huygens' aerial telescope&quot; width=&quot;200&quot; height=&quot;227&quot; border=&quot;1&quot;&gt;&lt;/a&gt;&lt;a href=&quot;images-tools/first-schneiners-sunspots.jpg&quot;&gt;&lt;br&gt;

              &lt;/a&gt;&lt;/font&gt;&lt;font face=&quot;Verdana, Arial, Helvetica, sans-serif&quot; size=&quot;2&quot; color=&quot;#0f024F&quot;&gt;&lt;b&gt;Huygens's 

              aerial telescope&lt;/b&gt;&lt;/font&gt;&lt;/div&gt;&lt;/td&gt;

        &lt;/tr&gt;

      &lt;/table&gt;

      &lt;p&gt;&lt;font face=&quot;Georgia, Times New Roman, Times, serif&quot; size=&quot;-1&quot;&gt;The Huygens 

        brothers also developed &amp;quot;aerial telescopes.&amp;quot; These featured 

        an &lt;a href=&quot;images-tools/first-keplerian-diagram-lg.gif&quot;&gt;objective lens&lt;/a&gt; 

        mounted in an iron tube at the top of a tall pole. The astronomer raised 

        and lowered this and found the image by trial and error. A compound eyepiece 

        on a little stand was then positioned to receive the image cast by the 

        objective. Although astronomers made some discoveries with these telescopes, 

        their usefulness was limited - alignment on windy nights, for example, 

        was difficult - and their design cumbersome. &lt;/font&gt;&lt;/p&gt;

      &lt;p&gt;&lt;font face=&quot;Georgia, Times New Roman, Times, serif&quot; size=&quot;-1&quot;&gt;By the 

        beginning of the 18th century, very long refracting telescopes were rarely 

        used any more. Further increases of power came, beginning in the mid-17&lt;sup&gt;th&lt;/sup&gt; 

        century, from a new form of telescope - the reflecting telescope. &lt;/font&gt;&lt;/p&gt;

    &lt;/td&gt;

  &lt;/tr&gt;

  &lt;tr&gt; &lt;/tr&gt;

&lt;/table&gt;
