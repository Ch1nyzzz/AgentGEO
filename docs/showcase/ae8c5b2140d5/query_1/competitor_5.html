Which like the moon, some turbid night,&lt;/span&gt;&lt;br data-dcnode-id=&quot;452&quot;&gt;&lt;span data-dcnode-id=&quot;451&quot; instrument_node=&quot;&quot;&gt;
Is summoned by the tides.&lt;/span&gt;&lt;/p&gt;&lt;/blockquote&gt;&lt;span data-dcnode-id=&quot;448&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;figure class=&quot;wp-caption aligncenter&quot; data-dcnode-id=&quot;435&quot; id=&quot;attachment_55645&quot;&gt;&lt;a data-dcnode-id=&quot;444&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//society6.com/product/partial-eclipse-of-the-moon-by-tienne-lopold-trouvelot-1874-n4m_print%23s6-4686110p4a1v1%3Fcurator%3Dbrainpicker&quot; target=&quot;_blank&quot;&gt;&lt;img alt=&quot;Partial eclipse of the moon, observed October 24, 1874&quot; class=&quot;size-full wp-image-55645 jetpack-lazy-image&quot; data-dcnode-id=&quot;447&quot; data-lazy-sizes=&quot;(max-width: 680px) 100vw, 680px&quot; data-lazy-src=&quot;https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2016/07/partialeclipse1.jpg?resize=680%2C876&amp;amp;is-pending-load=1#038;ssl=1&quot; data-lazy-srcset=&quot;https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2016/07/partialeclipse1.jpg?w=1200&amp;amp;ssl=1 1200w, https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2016/07/partialeclipse1.jpg?resize=240%2C309&amp;amp;ssl=1 240w, https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2016/07/partialeclipse1.jpg?resize=320%2C412&amp;amp;ssl=1 320w, https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2016/07/partialeclipse1.jpg?resize=768%2C989&amp;amp;ssl=1 768w, https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2016/07/partialeclipse1.jpg?resize=600%2C773&amp;amp;ssl=1 600w&quot; data-recalc-dims=&quot;1&quot; height=&quot;876&quot; loading=&quot;lazy&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//i0.wp.com/www.themarginalian.org/wp-content/uploads/2016/07/partialeclipse1.jpg%3Fresize%3D680%252C876%26ssl%3D1&amp;amp;raw&quot; srcset=&quot;data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7&quot; width=&quot;680&quot;&gt;&lt;noscript data-dcnode-id=&quot;445&quot;&gt;&lt;span data-dcnode-id=&quot;446&quot; instrument_node=&quot;&quot;&gt;&amp;lt;img loading=&quot;lazy&quot; src=&quot;https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2016/07/partialeclipse1.jpg?resize=680%2C876&amp;amp;#038;ssl=1&quot; alt=&quot;Partial eclipse of the moon, observed October 24, 1874&quot; width=&quot;680&quot; height=&quot;876&quot; class=&quot;size-full wp-image-55645&quot; srcset=&quot;https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2016/07/partialeclipse1.jpg?w=1200&amp;amp;amp;ssl=1 1200w, https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2016/07/partialeclipse1.jpg?resize=240%2C309&amp;amp;amp;ssl=1 240w, https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2016/07/partialeclipse1.jpg?resize=320%2C412&amp;amp;amp;ssl=1 320w, https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2016/07/partialeclipse1.jpg?resize=768%2C989&amp;amp;amp;ssl=1 768w, https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2016/07/partialeclipse1.jpg?resize=600%2C773&amp;amp;amp;ssl=1 600w&quot; sizes=&quot;(max-width: 680px) 100vw, 680px&quot; data-recalc-dims=&quot;1&quot; /&amp;gt;&lt;/span&gt;&lt;/noscript&gt;&lt;/a&gt;&lt;figcaption class=&quot;wp-caption-text&quot; data-dcnode-id=&quot;436&quot;&gt;&lt;span data-dcnode-id=&quot;443&quot; instrument_node=&quot;&quot;&gt;Partial eclipse of the Moon — one of French artist Étienne Léopold Trouvelot’s &lt;/span&gt;&lt;a data-dcnode-id=&quot;441&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.themarginalian.org/2016/07/07/trouvelots-astronomical-drawings/&quot;&gt;&lt;span data-dcnode-id=&quot;442&quot; instrument_node=&quot;&quot;&gt;astronomical drawings&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;440&quot; instrument_node=&quot;&quot;&gt;. (Available &lt;/span&gt;&lt;a data-dcnode-id=&quot;438&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//society6.com/product/partial-eclipse-of-the-moon-by-tienne-lopold-trouvelot-1874-n4m_print%23s6-4686110p4a1v1%3Fcurator%3Dbrainpicker&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;439&quot; instrument_node=&quot;&quot;&gt;as a print&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;437&quot; instrument_node=&quot;&quot;&gt;.)&lt;/span&gt;&lt;/figcaption&gt;&lt;/figure&gt;&lt;span data-dcnode-id=&quot;434&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;432&quot;&gt;&lt;span data-dcnode-id=&quot;433&quot; instrument_node=&quot;&quot;&gt;A few months after his mother’s death, Kepler received a letter from Christoph Besold — the classmate who had stuck up for his lunar dissertation thirty years earlier, now a successful attorney and professor of law. Having witnessed Katharina’s harrowing fate, Besold had worked to expose the ignorance and abuses of power that sealed it, procuring a decree from the duke of Kepler’s home duchy prohibiting any other witchcraft trials unsanctioned by the Supreme Court in the urban and presumably far less superstitious Stuttgart. “While neither your name nor that of your mother is mentioned in the edict,” Besold wrote to his old friend, “everyone knows that it is at the bottom of it. You have rendered an inestimable service to the whole world, and someday your name will be blessed for it.”&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;431&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;426&quot;&gt;&lt;span data-dcnode-id=&quot;430&quot; instrument_node=&quot;&quot;&gt;Kepler was unconsoled by the decree — perhaps he knew that policy change and cultural change are hardly the same thing, existing on different time scales. He spent the remaining years of his life obsessively annotating &lt;/span&gt;&lt;em data-dcnode-id=&quot;428&quot;&gt;&lt;span data-dcnode-id=&quot;429&quot; instrument_node=&quot;&quot;&gt;The Dream&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;427&quot; instrument_node=&quot;&quot;&gt; with two hundred twenty-three footnotes — a volume of hypertext equal to the story itself — intended to dispel superstitious interpretations by delineating his exact scientific reasons for using the symbols and metaphors he did.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;425&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;423&quot;&gt;&lt;span data-dcnode-id=&quot;424&quot; instrument_node=&quot;&quot;&gt;In his ninety-sixth footnote, Kepler plainly stated “the hypothesis of the whole dream”: “an argument for the motion of the Earth, or rather a refutation of arguments constructed, on the basis of perception, against the motion of the Earth.” Fifty footnotes later, he reiterated the point by asserting that he envisioned the allegory as “a pleasant retort” to Ptolemaic parochialism. In a trailblazing systematic effort to unmoor scientific truth from the illusions of commonsense perception, he wrote:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;422&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;blockquote data-dcnode-id=&quot;419&quot;&gt;&lt;p data-dcnode-id=&quot;420&quot;&gt;&lt;span data-dcnode-id=&quot;421&quot; instrument_node=&quot;&quot;&gt;Everyone says it is plain that the stars go around the earth while the Earth remains still. I say that it is plain to the eyes of the lunar people that our Earth, which is their Volva, goes around while their moon is still. If it be said that the lunatic perceptions of my moon-dwellers are deceived, I retort with equal justice that the terrestrial senses of the Earth-dwellers are devoid of reason.&lt;/span&gt;&lt;/p&gt;&lt;/blockquote&gt;&lt;span data-dcnode-id=&quot;418&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;figure class=&quot;wp-caption alignnone&quot; data-dcnode-id=&quot;412&quot;&gt;&lt;img class=&quot;jetpack-lazy-image&quot; data-dcnode-id=&quot;417&quot; data-lazy-src=&quot;https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2012/12/100diagramsthatchangedtheworld18.jpg?w=680&amp;amp;is-pending-load=1#038;ssl=1&quot; data-recalc-dims=&quot;1&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//i0.wp.com/www.themarginalian.org/wp-content/uploads/2012/12/100diagramsthatchangedtheworld18.jpg%3Fw%3D680%26ssl%3D1&amp;amp;raw&quot; srcset=&quot;data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7&quot;&gt;&lt;noscript data-dcnode-id=&quot;415&quot;&gt;&lt;span data-dcnode-id=&quot;416&quot; instrument_node=&quot;&quot;&gt;&amp;lt;img src=&quot;https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2012/12/100diagramsthatchangedtheworld18.jpg?w=680&amp;amp;#038;ssl=1&quot; data-recalc-dims=&quot;1&quot; /&amp;gt;&lt;/span&gt;&lt;/noscript&gt;&lt;figcaption class=&quot;wp-caption-text&quot; data-dcnode-id=&quot;413&quot;&gt;&lt;span data-dcnode-id=&quot;414&quot; instrument_node=&quot;&quot;&gt;Copernicus’s heliocentric universe, 1543.&lt;/span&gt;&lt;/figcaption&gt;&lt;/figure&gt;&lt;span data-dcnode-id=&quot;411&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;409&quot;&gt;&lt;span data-dcnode-id=&quot;410&quot; instrument_node=&quot;&quot;&gt;In another footnote, Kepler defined gravity as “a power similar to magnetic power — a mutual attraction,” and described its chief law:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;408&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;blockquote data-dcnode-id=&quot;405&quot;&gt;&lt;p data-dcnode-id=&quot;406&quot;&gt;&lt;span data-dcnode-id=&quot;407&quot; instrument_node=&quot;&quot;&gt;The attractive power is greater in the case of two bodies that are near to each other than it is in the case of bodies that are far apart. Therefore, bodies more strongly resist separation one from the other when they are still close together.&lt;/span&gt;&lt;/p&gt;&lt;/blockquote&gt;&lt;span data-dcnode-id=&quot;404&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;399&quot;&gt;&lt;span data-dcnode-id=&quot;403&quot; instrument_node=&quot;&quot;&gt;A further footnote pointed out that gravity is a universal force affecting bodies beyond the Earth, and that lunar gravity is responsible for earthly tides: “The clearest evidence of the relationship between earth and the moon is the ebb and flow of the seas.” This fact, which became central to Newton’s laws and which is now so commonplace that schoolchildren point to it as plain evidence of gravity, was far from accepted in Kepler’s scientific community. Galileo, who was right about so much, was also wrong about so much — something worth remembering as we train ourselves in the cultural acrobatics of nuanced appreciation without idolatry. Galileo believed, for instance, that comets were vapors of the earth — a notion Tycho Brahe disproved by demonstrating that comets are celestial objects moving through space along computable trajectories after observing the very comet that had made six-year-old Kepler fall in love with astronomy. Galileo didn’t merely deny that tides were caused by the Moon — he went as far as to mock Kepler’s assertion that they do. “That concept is completely repugnant to my mind,” he wrote — not even in a private letter but in his landmark &lt;/span&gt;&lt;em data-dcnode-id=&quot;401&quot;&gt;&lt;span data-dcnode-id=&quot;402&quot; instrument_node=&quot;&quot;&gt;Dialogue on the Two Chief World Systems&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;400&quot; instrument_node=&quot;&quot;&gt; — scoffing that “though [Kepler] has at his fingertips the motions attributed to the Earth, he has nevertheless lent his ear and his assent to the Moon’s dominion over the waters, to occult properties, and to such puerilities.”&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;398&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;396&quot;&gt;&lt;span data-dcnode-id=&quot;397&quot; instrument_node=&quot;&quot;&gt;Kepler took particular care with the portion of the allegory he saw as most directly responsible for his mother’s witchcraft trial — the appearance of nine spirits, summoned by the protagonist’s mother. In a footnote, he explained that these symbolize the nine Greek muses. In one of the story’s more cryptic sentences, Kepler wrote of these spirits: “One, particularly friendly to me, most gentle and purest of all, is called forth by twenty-one characters.” In his subsequent defense in footnotes, he explained that the phrase “twenty-one characters” refers to the number of letters used to spell Astronomia Copernicana. The friendliest spirit represents Urania — the ancient Greek muse of astronomy, which Kepler considered the most reliable of the sciences:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;395&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;blockquote data-dcnode-id=&quot;392&quot;&gt;&lt;p data-dcnode-id=&quot;393&quot;&gt;&lt;span data-dcnode-id=&quot;394&quot; instrument_node=&quot;&quot;&gt;Although all the sciences are gentle and harmless in themselves (and on that account they are not those wicked and good-for-nothing spirits with whom witches and fortune-tellers have dealings…), this is especially true of astronomy because of the very nature of its subject matter.&lt;/span&gt;&lt;/p&gt;&lt;/blockquote&gt;&lt;span data-dcnode-id=&quot;391&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;figure class=&quot;wp-caption alignnone&quot; data-dcnode-id=&quot;381&quot;&gt;&lt;a data-dcnode-id=&quot;387&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//society6.com/product/urania-the-muse-of-astronomy-anonymous-italian-artist-1885_print%3Fcurator%3Dbrainpicker&quot;&gt;&lt;img alt=&quot;&quot; class=&quot;aligncenter size-full wp-image-69584 jetpack-lazy-image&quot; data-dcnode-id=&quot;390&quot; data-lazy-sizes=&quot;(max-width: 680px) 100vw, 680px&quot; data-lazy-src=&quot;https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2019/12/urania.jpg?resize=680%2C841&amp;amp;is-pending-load=1#038;ssl=1&quot; data-lazy-srcset=&quot;https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2019/12/urania.jpg?w=1440&amp;amp;ssl=1 1440w, https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2019/12/urania.jpg?resize=240%2C297&amp;amp;ssl=1 240w, https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2019/12/urania.jpg?resize=320%2C396&amp;amp;ssl=1 320w, https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2019/12/urania.jpg?resize=768%2C949&amp;amp;ssl=1 768w, https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2019/12/urania.jpg?resize=600%2C742&amp;amp;ssl=1 600w, https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2019/12/urania.jpg?w=1360&amp;amp;ssl=1 1360w&quot; data-recalc-dims=&quot;1&quot; height=&quot;841&quot; loading=&quot;lazy&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//i0.wp.com/www.themarginalian.org/wp-content/uploads/2019/12/urania.jpg%3Fresize%3D680%252C841%26ssl%3D1&amp;amp;raw&quot; srcset=&quot;data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7&quot; width=&quot;680&quot;&gt;&lt;noscript data-dcnode-id=&quot;388&quot;&gt;&lt;span data-dcnode-id=&quot;389&quot; instrument_node=&quot;&quot;&gt;&amp;lt;img loading=&quot;lazy&quot; src=&quot;https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2019/12/urania.jpg?resize=680%2C841&amp;amp;#038;ssl=1&quot; alt=&quot;&quot; width=&quot;680&quot; height=&quot;841&quot; class=&quot;aligncenter size-full wp-image-69584&quot; srcset=&quot;https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2019/12/urania.jpg?w=1440&amp;amp;amp;ssl=1 1440w, https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2019/12/urania.jpg?resize=240%2C297&amp;amp;amp;ssl=1 240w, https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2019/12/urania.jpg?resize=320%2C396&amp;amp;amp;ssl=1 320w, https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2019/12/urania.jpg?resize=768%2C949&amp;amp;amp;ssl=1 768w, https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2019/12/urania.jpg?resize=600%2C742&amp;amp;amp;ssl=1 600w, https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2019/12/urania.jpg?w=1360&amp;amp;amp;ssl=1 1360w&quot; sizes=&quot;(max-width: 680px) 100vw, 680px&quot; data-recalc-dims=&quot;1&quot; /&amp;gt;&lt;/span&gt;&lt;/noscript&gt;&lt;/a&gt;&lt;figcaption class=&quot;wp-caption-text&quot; data-dcnode-id=&quot;382&quot;&gt;&lt;span data-dcnode-id=&quot;386&quot; instrument_node=&quot;&quot;&gt;Urania, the ancient Greek muse of astronomy, as depicted in an 1885 Italian book of popular astronomy. (Available &lt;/span&gt;&lt;a data-dcnode-id=&quot;384&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//society6.com/product/urania-the-muse-of-astronomy-anonymous-italian-artist-1885_print%3Fcurator%3Dbrainpicker&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;385&quot; instrument_node=&quot;&quot;&gt;as a print&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;383&quot; instrument_node=&quot;&quot;&gt;.)&lt;/span&gt;&lt;/figcaption&gt;&lt;/figure&gt;&lt;span data-dcnode-id=&quot;380&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;369&quot;&gt;&lt;span data-dcnode-id=&quot;379&quot; instrument_node=&quot;&quot;&gt;When the astronomer William Herschel discovered the seventh planet from the sun a century and a half later, he named it Uranus, after the same muse. Elsewhere in Germany, a young Beethoven heard of the discovery and wondered in the marginalia of one of his compositions: “What will they think of my music on the star of Urania?” Another two centuries later, when Ann Druyan and Carl Sagan compose the &lt;/span&gt;&lt;a data-dcnode-id=&quot;377&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.themarginalian.org/2014/02/10/murmurs-of-earth-sagan-golden-record/&quot;&gt;&lt;span data-dcnode-id=&quot;378&quot; instrument_node=&quot;&quot;&gt;Golden Record&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;376&quot; instrument_node=&quot;&quot;&gt; as a portrait of humanity in sound and image, Beethoven’s Fifth Symphony sails into the cosmos aboard the &lt;/span&gt;&lt;em data-dcnode-id=&quot;374&quot;&gt;&lt;span data-dcnode-id=&quot;375&quot; instrument_node=&quot;&quot;&gt;Voyager&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;373&quot; instrument_node=&quot;&quot;&gt; spacecraft alongside a piece by the composer Laurie Spiegel based on Kepler’s &lt;/span&gt;&lt;em data-dcnode-id=&quot;371&quot;&gt;&lt;span data-dcnode-id=&quot;372&quot; instrument_node=&quot;&quot;&gt;Harmony of the World&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;370&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;368&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;366&quot;&gt;&lt;span data-dcnode-id=&quot;367&quot; instrument_node=&quot;&quot;&gt;Kepler was unambiguous about the broader political intent of his allegory. The year after his mother’s death, he wrote to an astronomer friend:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;365&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;blockquote data-dcnode-id=&quot;362&quot;&gt;&lt;p data-dcnode-id=&quot;363&quot;&gt;&lt;span data-dcnode-id=&quot;364&quot; instrument_node=&quot;&quot;&gt;Would it be a great crime to paint the cyclopian morals of this period in livid colors, but for the sake of caution, to depart from the earth with such writing and secede to the moon?&lt;/span&gt;&lt;/p&gt;&lt;/blockquote&gt;&lt;span data-dcnode-id=&quot;361&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;353&quot;&gt;&lt;span data-dcnode-id=&quot;360&quot; instrument_node=&quot;&quot;&gt;Isn’t it better, he wonders in another stroke of psychological genius, to illustrate the monstrosity of people’s ignorance by way of the ignorance of imaginary others? He hoped that by seeing the absurdity of the lunar people’s belief that the Moon is the center of the universe, the inhabitants of Earth would have the insight and integrity to question their own conviction of centrality. Three hundred fifty years later, when fifteen prominent poets are asked to contribute a “statement on poetics” for an influential anthology, Denise Levertov — the only woman of the fifteen — would state that poetry’s highest task is &lt;/span&gt;&lt;a data-dcnode-id=&quot;358&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.themarginalian.org/2017/01/05/denise-levertov-statement-on-poetics/&quot;&gt;&lt;span data-dcnode-id=&quot;359&quot; instrument_node=&quot;&quot;&gt;“to awaken sleepers by other means than shock.”&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;357&quot; instrument_node=&quot;&quot;&gt; This must have been what Kepler aimed to do with &lt;/span&gt;&lt;em data-dcnode-id=&quot;355&quot;&gt;&lt;span data-dcnode-id=&quot;356&quot; instrument_node=&quot;&quot;&gt;The Dream&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;354&quot; instrument_node=&quot;&quot;&gt; — his serenade to the poetics of science, aimed at awakening.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;352&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;347&quot;&gt;&lt;span data-dcnode-id=&quot;351&quot; instrument_node=&quot;&quot;&gt;In the wake of his mother’s witchcraft trial, Kepler made another observation centuries ahead of its time, even ahead of the seventeenth-century French philosopher François Poullain de la Barre’s landmark assertion that “the mind has no sex.” In Kepler’s time, long before the discovery of genetics, it was believed that children bore a resemblance to their mothers, in physiognomy and character, because they were born under the same constellation. But Kepler was keenly aware of how different he and Katharina were as people, how divergent their worldviews and their fates — he, a meek leading scientist about to turn the world over; she, a mercurial, illiterate woman on trial for witchcraft. If the horoscopes he had once drawn for a living did not determine a person’s life-path, Kepler couldn’t help but wonder what did — here was a scientist in search of causality. A quarter millennium before social psychology existed as a formal field of study, he reasoned that what had gotten his mother into all this trouble in the first place — her ignorant beliefs and behaviors taken for the work of evil spirits, her social marginalization as a widow — was the fact that she had never benefited from the education her son, as a man, had received. In the fourth section of &lt;/span&gt;&lt;em data-dcnode-id=&quot;349&quot;&gt;&lt;span data-dcnode-id=&quot;350&quot; instrument_node=&quot;&quot;&gt;The Harmony of the World&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;348&quot; instrument_node=&quot;&quot;&gt; — his most daring and speculative foray into natural philosophy — Kepler writes in a chapter devoted to “metaphysical, psychological, and astrological” matters:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;346&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;blockquote data-dcnode-id=&quot;343&quot;&gt;&lt;p data-dcnode-id=&quot;344&quot;&gt;&lt;span data-dcnode-id=&quot;345&quot; instrument_node=&quot;&quot;&gt;I know a woman who was born under almost the same aspects, with a temperament which was certainly very restless, but by which she not only has no advantage in book learning (that is not surprising in a woman) but also disturbs the whole of her town, and is the author of her own lamentable misfortune.&lt;/span&gt;&lt;/p&gt;&lt;/blockquote&gt;&lt;span data-dcnode-id=&quot;342&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;340&quot;&gt;&lt;span data-dcnode-id=&quot;341&quot; instrument_node=&quot;&quot;&gt;In the very next sentence, Kepler identifies the woman in question as his own mother and proceeds to note that she never received the privileges he did. “I was born a man, not a woman,” he writes, “a difference in sex which the astrologers seek in vain in the heavens.” The difference between the fate of the sexes, Kepler suggests, is not in the heavens but in the earthly construction of gender as a function of culture. It was not his mother’s nature that made her ignorant, but the consequences of her social standing in a world that rendered its opportunities for intellectual illumination and self-actualization as fixed as the stars.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;339&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;via&quot; data-dcnode-id=&quot;330&quot;&gt;&lt;em data-dcnode-id=&quot;331&quot;&gt;&lt;span data-dcnode-id=&quot;338&quot; instrument_node=&quot;&quot;&gt;Read other excerpts from Figuring &lt;/span&gt;&lt;a data-dcnode-id=&quot;336&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.themarginalian.org/tag/figuring/&quot;&gt;&lt;span data-dcnode-id=&quot;337&quot; instrument_node=&quot;&quot;&gt;here&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;335&quot; instrument_node=&quot;&quot;&gt;; read more about the book’s overarching aboutness &lt;/span&gt;&lt;a data-dcnode-id=&quot;333&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.themarginalian.org/2018/11/01/figuring/&quot;&gt;&lt;span data-dcnode-id=&quot;334&quot; instrument_node=&quot;&quot;&gt;here&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;332&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/em&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;329&quot; instrument_node=&quot;&quot;&gt;
