&lt;/span&gt;&lt;h1 class=&quot;entry-title&quot; data-dcnode-id=&quot;830&quot;&gt;&lt;span data-dcnode-id=&quot;831&quot;&gt;&lt;span data-dcnode-id=&quot;832&quot; instrument_node=&quot;&quot;&gt;How Kepler Invented Science Fiction and Defended His Mother in a Witchcraft Trial While Revolutionizing Our Understanding of the Universe&lt;/span&gt;&lt;/span&gt;&lt;/h1&gt;&lt;span data-dcnode-id=&quot;829&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;827&quot;&gt;&lt;span data-dcnode-id=&quot;828&quot; instrument_node=&quot;&quot;&gt;How many revolutions does the cog of culture make before a new truth about reality catches into gear? &lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;826&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 class=&quot;byline&quot; data-dcnode-id=&quot;824&quot;&gt;&lt;span data-dcnode-id=&quot;825&quot; instrument_node=&quot;&quot;&gt;By Maria Popova&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;823&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;entry_content&quot; data-dcnode-id=&quot;328&quot;&gt;&lt;span data-dcnode-id=&quot;822&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;via&quot; data-dcnode-id=&quot;815&quot;&gt;&lt;em data-dcnode-id=&quot;817&quot;&gt;&lt;span data-dcnode-id=&quot;821&quot; instrument_node=&quot;&quot;&gt;This essay is adapted from &lt;/span&gt;&lt;a data-dcnode-id=&quot;818&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.themarginalian.org/2018/11/01/figuring/&quot;&gt;&lt;em data-dcnode-id=&quot;819&quot;&gt;&lt;span data-dcnode-id=&quot;820&quot; instrument_node=&quot;&quot;&gt;Figuring&lt;/span&gt;&lt;/em&gt;&lt;/a&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;816&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;814&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;808&quot;&gt;&lt;a data-dcnode-id=&quot;810&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//www.amazon.com/exec/obidos/ASIN/1524748137/braipick-20&quot; target=&quot;_blank&quot;&gt;&lt;img class=&quot;cover jetpack-lazy-image jetpack-lazy-image--handled&quot; data-dcnode-id=&quot;813&quot; data-lazy-loaded=&quot;1&quot; loading=&quot;eager&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//i2.wp.com/www.themarginalian.org/wp-content/uploads/2018/10/figuring_jacket_final.jpg&amp;amp;raw&quot;&gt;&lt;noscript data-dcnode-id=&quot;811&quot;&gt;&lt;span data-dcnode-id=&quot;812&quot; instrument_node=&quot;&quot;&gt;&amp;lt;img class=&quot;cover&quot; src=&quot;https://i2.wp.com/www.themarginalian.org/wp-content/uploads/2018/10/figuring_jacket_final.jpg&quot; /&amp;gt;&lt;/span&gt;&lt;/noscript&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;809&quot; instrument_node=&quot;&quot;&gt;This is how I picture it: &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;807&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;805&quot;&gt;&lt;span data-dcnode-id=&quot;806&quot; instrument_node=&quot;&quot;&gt;A spindly middle-aged mathematician with a soaring mind, a sunken heart, and bad skin is being thrown about the back of a carriage in the bone-hollowing cold of a German January. Since his youth, he has been inscribing into family books and friendship albums his personal motto, borrowed from a verse by the ancient poet Perseus: “O the cares of man, how much of everything is futile.” He has weathered personal tragedies that would level most. He is now racing through the icy alabaster expanse of the countryside in the precarious hope of averting another: Four days after Christmas and two days after his forty-fourth birthday, a letter from his sister has informed him that their widowed mother is on trial for witchcraft — a fact for which he holds himself responsible. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;804&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;802&quot;&gt;&lt;span data-dcnode-id=&quot;803&quot; instrument_node=&quot;&quot;&gt;He has written the world’s first work of science fiction — a clever allegory advancing the controversial Copernican model of the universe, describing the effects of gravity decades before Newton formalized it into a law, envisioning speech synthesis centuries before computers, and presaging space travel three hundred years before the Moon landing. The story, intended to counter superstition with science through symbol and metaphor inviting critical thinking, has instead effected the deadly indictment of his elderly, illiterate mother. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;801&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;796&quot;&gt;&lt;span data-dcnode-id=&quot;800&quot; instrument_node=&quot;&quot;&gt;The year is 1617. His name is &lt;/span&gt;&lt;strong data-dcnode-id=&quot;798&quot;&gt;&lt;span data-dcnode-id=&quot;799&quot; instrument_node=&quot;&quot;&gt;Johannes Kepler&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;797&quot; instrument_node=&quot;&quot;&gt; (December 27, 1571–November 15, 1630) — perhaps the unluckiest man in the world, perhaps the greatest scientist who ever lived. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;795&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;figure class=&quot;wp-caption aligncenter&quot; data-dcnode-id=&quot;788&quot; id=&quot;attachment_69586&quot;&gt;&lt;a data-dcnode-id=&quot;791&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//society6.com/product/johannes-kepler_print%3Fcurator%3Dbrainpicker&quot; target=&quot;_blank&quot;&gt;&lt;img alt=&quot;&quot; class=&quot;size-full wp-image-69586 jetpack-lazy-image jetpack-lazy-image--handled&quot; data-dcnode-id=&quot;794&quot; data-lazy-loaded=&quot;1&quot; data-recalc-dims=&quot;1&quot; height=&quot;936&quot; loading=&quot;eager&quot; sizes=&quot;(max-width: 680px) 100vw, 680px&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//i0.wp.com/www.themarginalian.org/wp-content/uploads/2019/12/kepler_galaxy.jpg%3Fresize%3D680%252C936%26ssl%3D1&amp;amp;raw&quot; srcset=&quot;https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2019/12/kepler_galaxy.jpg?w=1200&amp;amp;ssl=1 1200w, https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2019/12/kepler_galaxy.jpg?resize=240%2C330&amp;amp;ssl=1 240w, https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2019/12/kepler_galaxy.jpg?resize=320%2C440&amp;amp;ssl=1 320w, https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2019/12/kepler_galaxy.jpg?resize=768%2C1057&amp;amp;ssl=1 768w, https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2019/12/kepler_galaxy.jpg?resize=600%2C826&amp;amp;ssl=1 600w&quot; width=&quot;680&quot;&gt;&lt;noscript data-dcnode-id=&quot;792&quot;&gt;&lt;span data-dcnode-id=&quot;793&quot; instrument_node=&quot;&quot;&gt;&amp;lt;img loading=&quot;lazy&quot; src=&quot;https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2019/12/kepler_galaxy.jpg?resize=680%2C936&amp;amp;#038;ssl=1&quot; alt=&quot;&quot; width=&quot;680&quot; height=&quot;936&quot; class=&quot;size-full wp-image-69586&quot; srcset=&quot;https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2019/12/kepler_galaxy.jpg?w=1200&amp;amp;amp;ssl=1 1200w, https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2019/12/kepler_galaxy.jpg?resize=240%2C330&amp;amp;amp;ssl=1 240w, https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2019/12/kepler_galaxy.jpg?resize=320%2C440&amp;amp;amp;ssl=1 320w, https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2019/12/kepler_galaxy.jpg?resize=768%2C1057&amp;amp;amp;ssl=1 768w, https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2019/12/kepler_galaxy.jpg?resize=600%2C826&amp;amp;amp;ssl=1 600w&quot; sizes=&quot;(max-width: 680px) 100vw, 680px&quot; data-recalc-dims=&quot;1&quot; /&amp;gt;&lt;/span&gt;&lt;/noscript&gt;&lt;/a&gt;&lt;figcaption class=&quot;wp-caption-text&quot; data-dcnode-id=&quot;789&quot;&gt;&lt;span data-dcnode-id=&quot;790&quot; instrument_node=&quot;&quot;&gt;Johannes Kepler&lt;/span&gt;&lt;/figcaption&gt;&lt;/figure&gt;&lt;span data-dcnode-id=&quot;787&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;776&quot;&gt;&lt;span data-dcnode-id=&quot;786&quot; instrument_node=&quot;&quot;&gt;He inhabits a world in which God is mightier than nature, the Devil realer and more omnipresent than gravity. All around him, people believe that the sun revolves around the Earth every twenty-four hours, set into perfect circular motion by an omnipotent creator; the few who dare support the tendentious idea that the Earth rotates around its axis while revolving around the sun believe that it moves along a perfectly circular orbit. Kepler would disprove both beliefs, coin the word &lt;/span&gt;&lt;em data-dcnode-id=&quot;784&quot;&gt;&lt;span data-dcnode-id=&quot;785&quot; instrument_node=&quot;&quot;&gt;orbit&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;783&quot; instrument_node=&quot;&quot;&gt;, and quarry the marble out of which classical physics would be sculpted. He would be the first astronomer to develop a scientific method of predicting eclipses and the first to link mathematical astronomy to material reality — the first astrophysicist — by demonstrating that physical forces move the heavenly bodies in calculable ellipses. All of this he would accomplish while drawing horoscopes, espousing the spontaneous creation of new animal species rising from bogs and oozing from tree bark, and believing the Earth itself to be an ensouled body that has digestion, that suffers illness, that inhales and exhales like a living organism. Three centuries later, the marine biologist and writer Rachel Carson would reimagine a version of this view woven of science and stripped of mysticism as she &lt;/span&gt;&lt;a data-dcnode-id=&quot;778&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.themarginalian.org/2017/01/27/rachel-carson-silent-spring-dorothy-freeman/&quot;&gt;&lt;span data-dcnode-id=&quot;782&quot; instrument_node=&quot;&quot;&gt;makes &lt;/span&gt;&lt;em data-dcnode-id=&quot;780&quot;&gt;&lt;span data-dcnode-id=&quot;781&quot; instrument_node=&quot;&quot;&gt;ecology&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;779&quot; instrument_node=&quot;&quot;&gt; a household word&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;777&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;775&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;770&quot;&gt;&lt;span data-dcnode-id=&quot;774&quot; instrument_node=&quot;&quot;&gt;Kepler’s life is a testament to how science does for reality what Plutarch’s thought experiment known as &lt;/span&gt;&lt;a data-dcnode-id=&quot;772&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.themarginalian.org/2016/03/08/plutarch-the-ship-of-theseus-ted-ed/&quot;&gt;&lt;span data-dcnode-id=&quot;773&quot; instrument_node=&quot;&quot;&gt;“the Ship of Theseus”&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;771&quot; instrument_node=&quot;&quot;&gt; does for the self. In the ancient Greek allegory, Theseus — the founder-king of Athens — sailed triumphantly back to the great city after slaying the mythic Minotaur on Crete. For a thousand years, his ship was maintained in the harbor of Athens as a living trophy and was sailed to Crete annually to reenact the victorious voyage. As time began to corrode the vessel, its components were replaced one by one — new planks, new oars, new sails — until no original part remained. Was it then, Plutarch asks, the same ship? There is no static, solid self. Throughout life, our habits, beliefs, and ideas evolve beyond recognition. Our physical and social environments change. Almost all of our cells are replaced. Yet we remain, to ourselves, “who” “we” “are.”&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;769&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;764&quot;&gt;&lt;span data-dcnode-id=&quot;768&quot; instrument_node=&quot;&quot;&gt;So with science: Bit by bit, discoveries reconfigure our understanding of reality. This reality is revealed to us only in fragments. The more fragments we perceive and parse, the more lifelike the mosaic we make of them. But it is still a mosaic, a representation — imperfect and incomplete, however beautiful it may be, and subject to unending transfiguration. Three centuries after Kepler, Lord Kelvin would take the podium at the British Association of Science in the year 1900 and declare: “There is nothing new to be discovered in physics now. All that remains is more and more precise measurement.” At the same moment in Zurich, the young Albert Einstein is incubating the ideas that would converge into his revolutionary conception of spacetime, &lt;/span&gt;&lt;a data-dcnode-id=&quot;766&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.themarginalian.org/2019/05/29/eddington-einstein-janna-levin/&quot;&gt;&lt;span data-dcnode-id=&quot;767&quot; instrument_node=&quot;&quot;&gt;irreversibly transfiguring our elemental understanding of reality&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;765&quot; instrument_node=&quot;&quot;&gt;. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;763&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;761&quot;&gt;&lt;span data-dcnode-id=&quot;762&quot; instrument_node=&quot;&quot;&gt;Even the farthest seers can’t bend their gaze beyond their era’s horizon of possibility, but the horizon shifts with each incremental revolution as the human mind peers outward to take in nature, then turns inward to question its own givens. We sieve the world through the mesh of these certitudes, tautened by nature and culture, but every once in a while — whether by accident or conscious effort — the wire loosens and the kernel of a revolution slips through.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;760&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;figure class=&quot;wp-caption alignnone&quot; data-dcnode-id=&quot;747&quot;&gt;&lt;a data-dcnode-id=&quot;756&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.themarginalian.org/2019/01/06/maria-clara-eimmart/&quot;&gt;&lt;img class=&quot;jetpack-lazy-image jetpack-lazy-image--handled&quot; data-dcnode-id=&quot;759&quot; data-lazy-loaded=&quot;1&quot; loading=&quot;eager&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//i0.wp.com/www.themarginalian.org/wp-content/uploads/2019/01/mariaclaraeimmart_moon1.jpg&amp;amp;raw&quot;&gt;&lt;noscript data-dcnode-id=&quot;757&quot;&gt;&lt;span data-dcnode-id=&quot;758&quot; instrument_node=&quot;&quot;&gt;&amp;lt;img src=&quot;https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2019/01/mariaclaraeimmart_moon1.jpg&quot; /&amp;gt;&lt;/span&gt;&lt;/noscript&gt;&lt;/a&gt;&lt;figcaption class=&quot;wp-caption-text&quot; data-dcnode-id=&quot;748&quot;&gt;&lt;span data-dcnode-id=&quot;755&quot; instrument_node=&quot;&quot;&gt;Painting of the Moon by the 17th-century German self-taught astronomer and artist &lt;/span&gt;&lt;a data-dcnode-id=&quot;753&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.themarginalian.org/2019/01/06/maria-clara-eimmart/&quot;&gt;&lt;span data-dcnode-id=&quot;754&quot; instrument_node=&quot;&quot;&gt;Maria Clara Eimmart&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;752&quot; instrument_node=&quot;&quot;&gt;. (Available &lt;/span&gt;&lt;a data-dcnode-id=&quot;750&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//society6.com/product/17th-century-astronomical-art-by-maria-clara-eimmart-moon-phases_print%3Fcurator%3Dbrainpicker&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;751&quot; instrument_node=&quot;&quot;&gt;as a print&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;749&quot; instrument_node=&quot;&quot;&gt;.)&lt;/span&gt;&lt;/figcaption&gt;&lt;/figure&gt;&lt;span data-dcnode-id=&quot;746&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;744&quot;&gt;&lt;span data-dcnode-id=&quot;745&quot; instrument_node=&quot;&quot;&gt;Kepler first came under the thrall of the heliocentric model as a student at the Lutheran University of Tübingen half a century after Copernicus published his theory. The twenty-two-year-old Kepler, studying to enter the clergy, wrote a dissertation about the Moon, aimed at demonstrating the Copernican claim that the Earth is moving simultaneously around its axis and around the sun. A classmate by the name of Christoph Besold — a law student at the university — was so taken with Kepler’s lunar paper that he proposed a public debate. The university promptly vetoed it. A couple of years later, Galileo would write to Kepler that he’d been a believer in the Copernican system himself “for many years” — and yet he hadn’t yet dared to stand up for it in public and wouldn’t for more than thirty years. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;743&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;741&quot;&gt;&lt;span data-dcnode-id=&quot;742&quot; instrument_node=&quot;&quot;&gt;Kepler’s radical ideas rendered him too untrustworthy for the pulpit. After graduation, he was banished across the country to teach mathematics at a Lutheran seminary in Graz. But he was glad — he saw himself, mind and body, as cut out for scholarship. “I take from my mother my bodily constitution,” he would later write, “which is more suited to study than to other kinds of life.” Three centuries later, Walt Whitman would observe how beholden the mind is to the body, “how behind the tally of genius and morals stands the stomach, and gives a sort of casting vote.” &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;740&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;738&quot;&gt;&lt;span data-dcnode-id=&quot;739&quot; instrument_node=&quot;&quot;&gt;While Kepler saw his body as an instrument of scholarship, other bodies around him were being exploited as instruments of superstition. In Graz, he witnessed dramatic exorcisms performed on young women believed to be possessed by demons — grim public spectacles staged by the king and his clergy. He saw brightly colored fumes emanate from one woman’s belly and glistening black beetles crawl out of another’s mouth. He saw the deftness with which the puppeteers of the populace dramatized dogma to wrest control — the church was then the mass media, and the mass media were as unafraid of resorting to propaganda as they are today. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;737&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;735&quot;&gt;&lt;span data-dcnode-id=&quot;736&quot; instrument_node=&quot;&quot;&gt;As religious persecution escalated — soon it would erupt into the Thirty Years’ War, the deadliest religious war in the Continent’s history — life in Graz became unlivable. Protestants were forced to marry by Catholic ritual and have their children baptized as Catholics. Homes were raided, heretical books confiscated and destroyed. When Kepler’s infant daughter died, he was fined for evading the Catholic clergy and not allowed to bury his child until he paid the charge. It was time to migrate — a costly and trying endeavor for the family, but Kepler knew there would be a higher price to pay for staying:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;734&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;blockquote data-dcnode-id=&quot;731&quot;&gt;&lt;p data-dcnode-id=&quot;732&quot;&gt;&lt;span data-dcnode-id=&quot;733&quot; instrument_node=&quot;&quot;&gt;I may not regard loss of property more seriously than loss of opportunity to fulfill that for which nature and career have destined me.&lt;/span&gt;&lt;/p&gt;&lt;/blockquote&gt;&lt;span data-dcnode-id=&quot;730&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;728&quot;&gt;&lt;span data-dcnode-id=&quot;729&quot; instrument_node=&quot;&quot;&gt;Returning to Tübingen for a career in the clergy was out of the question:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;727&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;blockquote data-dcnode-id=&quot;724&quot;&gt;&lt;p data-dcnode-id=&quot;725&quot;&gt;&lt;span data-dcnode-id=&quot;726&quot; instrument_node=&quot;&quot;&gt;I could never torture myself with greater unrest and anxiety than if I now, in my present state of conscience, should be enclosed in that sphere of activity.&lt;/span&gt;&lt;/p&gt;&lt;/blockquote&gt;&lt;span data-dcnode-id=&quot;723&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;721&quot;&gt;&lt;span data-dcnode-id=&quot;722&quot; instrument_node=&quot;&quot;&gt;Instead, Kepler reconsidered something he had initially viewed merely as a flattering compliment to his growing scientific reputation: an invitation to visit the prominent Danish astronomer Tycho Brahe in Bohemia, where he had just been appointed royal mathematician to the Holy Roman Emperor. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;720&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;figure class=&quot;wp-caption aligncenter&quot; data-dcnode-id=&quot;714&quot; id=&quot;attachment_69581&quot;&gt;&lt;img alt=&quot;&quot; class=&quot;size-full wp-image-69581 jetpack-lazy-image jetpack-lazy-image--handled&quot; data-dcnode-id=&quot;719&quot; data-lazy-loaded=&quot;1&quot; data-recalc-dims=&quot;1&quot; height=&quot;1006&quot; loading=&quot;eager&quot; sizes=&quot;(max-width: 680px) 100vw, 680px&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//i0.wp.com/www.themarginalian.org/wp-content/uploads/2019/12/tycobrahe.jpg%3Fresize%3D680%252C1006%26ssl%3D1&amp;amp;raw&quot; srcset=&quot;https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2019/12/tycobrahe.jpg?w=1081&amp;amp;ssl=1 1081w, https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2019/12/tycobrahe.jpg?resize=240%2C355&amp;amp;ssl=1 240w, https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2019/12/tycobrahe.jpg?resize=320%2C474&amp;amp;ssl=1 320w, https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2019/12/tycobrahe.jpg?resize=768%2C1137&amp;amp;ssl=1 768w, https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2019/12/tycobrahe.jpg?resize=600%2C888&amp;amp;ssl=1 600w&quot; width=&quot;680&quot;&gt;&lt;noscript data-dcnode-id=&quot;717&quot;&gt;&lt;span data-dcnode-id=&quot;718&quot; instrument_node=&quot;&quot;&gt;&amp;lt;img loading=&quot;lazy&quot; src=&quot;https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2019/12/tycobrahe.jpg?resize=680%2C1006&amp;amp;#038;ssl=1&quot; alt=&quot;&quot; width=&quot;680&quot; height=&quot;1006&quot; class=&quot;size-full wp-image-69581&quot; srcset=&quot;https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2019/12/tycobrahe.jpg?w=1081&amp;amp;amp;ssl=1 1081w, https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2019/12/tycobrahe.jpg?resize=240%2C355&amp;amp;amp;ssl=1 240w, https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2019/12/tycobrahe.jpg?resize=320%2C474&amp;amp;amp;ssl=1 320w, https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2019/12/tycobrahe.jpg?resize=768%2C1137&amp;amp;amp;ssl=1 768w, https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2019/12/tycobrahe.jpg?resize=600%2C888&amp;amp;amp;ssl=1 600w&quot; sizes=&quot;(max-width: 680px) 100vw, 680px&quot; data-recalc-dims=&quot;1&quot; /&amp;gt;&lt;/span&gt;&lt;/noscript&gt;&lt;figcaption class=&quot;wp-caption-text&quot; data-dcnode-id=&quot;715&quot;&gt;&lt;span data-dcnode-id=&quot;716&quot; instrument_node=&quot;&quot;&gt;Tycho Brahe&lt;/span&gt;&lt;/figcaption&gt;&lt;/figure&gt;&lt;span data-dcnode-id=&quot;713&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;711&quot;&gt;&lt;span data-dcnode-id=&quot;712&quot; instrument_node=&quot;&quot;&gt;Kepler made the arduous five-hundred-kilometer journey to Prague. On February 4, 1600, the famous Dane welcomed him warmly into the castle where he computed the heavens, his enormous orange mustache almost aglow with geniality. During the two months Kepler spent there as guest and apprentice, Tycho was so impressed with the young astronomer’s theoretical ingenuity that he permitted him to analyze the celestial observations he had been guarding closely from all other scholars, then offered him a permanent position. Kepler accepted gratefully and journeyed back to Graz to collect his family, arriving in a retrograde world even more riven by religious persecution. When the Keplers refused to convert to Catholicism, they were banished from the city — the migration to Prague, with all the privations it would require, was no longer optional. Shortly after Kepler and his family alighted in their new life in Bohemia, the valve between chance and choice opened again, and another sudden change of circumstance flooded in: Tycho died unexpectedly at the age of fifty-four. Two days later, Kepler was appointed his successor as imperial mathematician, inheriting Tycho’s data. Over the coming years, he would draw on it extensively in devising his three laws of planetary motion, which would revolutionize the human understanding of the universe.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;710&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;708&quot;&gt;&lt;span data-dcnode-id=&quot;709&quot; instrument_node=&quot;&quot;&gt;How many revolutions does the cog of culture make before a new truth about reality catches into gear? &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;707&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;699&quot;&gt;&lt;span data-dcnode-id=&quot;706&quot; instrument_node=&quot;&quot;&gt;Three centuries before Kepler, Dante had marveled in his &lt;/span&gt;&lt;em data-dcnode-id=&quot;704&quot;&gt;&lt;span data-dcnode-id=&quot;705&quot; instrument_node=&quot;&quot;&gt;Divine Comedy&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;703&quot; instrument_node=&quot;&quot;&gt; at the new clocks ticking in England and Italy: “One wheel moves and drives the other.” This marriage of technology and poetry eventually gave rise to the metaphor of the clockwork universe. Before Newton’s physics placed this metaphor at the ideological epicenter of the Enlightenment, Kepler bridged the poetic and the scientific. In his first book, &lt;/span&gt;&lt;em data-dcnode-id=&quot;701&quot;&gt;&lt;span data-dcnode-id=&quot;702&quot; instrument_node=&quot;&quot;&gt;The Cosmographic Mystery&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;700&quot; instrument_node=&quot;&quot;&gt;, Kepler picked up the metaphor and stripped it of its divine dimensions, removing God as the clockmaster and instead pointing to a single force operating the heavens: “The celestial machine,” he wrote, “is not something like a divine organism, but rather something like a clockwork in which a single weight drives all the gears.” Within it, “the totality of the complex motions is guided by a single magnetic force.” It was not, as Dante wrote, “love that moves the sun and other stars” — it was gravity, as Newton would later formalize this “single magnetic force.” But it was Kepler who thus formulated for the first time the very notion of a force — something that didn’t exist for Copernicus, who, despite his groundbreaking insight that the sun moves the planets, still conceived of that motion in poetic rather than scientific terms. For him, the planets were horses whose reins the sun held; for Kepler, they were gears the sun wound by a physical force.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;698&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;690&quot;&gt;&lt;span data-dcnode-id=&quot;697&quot; instrument_node=&quot;&quot;&gt;In the anxious winter of 1617, unfigurative wheels are turning beneath Johannes Kepler as he hastens to his mother’s witchcraft trial. For this long journey by horse and carriage, Kepler has packed a battered copy of &lt;/span&gt;&lt;em data-dcnode-id=&quot;695&quot;&gt;&lt;span data-dcnode-id=&quot;696&quot; instrument_node=&quot;&quot;&gt;Dialogue on Ancient and Modern Music&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;694&quot; instrument_node=&quot;&quot;&gt; by Vincenzo Galilei, his sometime friend Galileo’s father — one of the era’s most influential treatises on music, a subject that always enchanted Kepler as much as mathematics, perhaps because he never saw the two as separate. Three years later, he would draw on it in composing his own groundbreaking book &lt;/span&gt;&lt;em data-dcnode-id=&quot;692&quot;&gt;&lt;span data-dcnode-id=&quot;693&quot; instrument_node=&quot;&quot;&gt;The Harmony of the World&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;691&quot; instrument_node=&quot;&quot;&gt;, in which he would formulate his third and final law of planetary motion, known as the harmonic law — his exquisite discovery, twenty-two years in the making, of the proportional link between a planet’s orbital period and the length of the axis of its orbit. It would help compute, for the first time, the distance of the planets from the sun — the measure of the heavens in an era when the Solar System was thought to be all there was. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;689&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;687&quot;&gt;&lt;span data-dcnode-id=&quot;688&quot; instrument_node=&quot;&quot;&gt;As Kepler is galloping through the German countryside to prevent his mother’s execution, the Inquisition in Rome is about to declare the claim of Earth’s motion heretical — a heresy punishable by death.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;686&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;684&quot;&gt;&lt;span data-dcnode-id=&quot;685&quot; instrument_node=&quot;&quot;&gt;Behind him lies a crumbled life: Emperor Rudolph II is dead — Kepler is no longer royal mathematician and chief scientific adviser to the Holy Roman Emperor, a job endowed with Europe’s highest scientific prestige, though primarily tasked with casting horoscopes for royalty; his beloved six-year-old son is dead — “a hyacinth of the morning in the first day of spring” wilted by smallpox, a disease that had barely spared Kepler himself as a child, leaving his skin cratered by scars and his eyesight permanently damaged; his first wife is dead, having come unhinged by grief before succumbing to the pox herself. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;683&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;681&quot;&gt;&lt;span data-dcnode-id=&quot;682&quot; instrument_node=&quot;&quot;&gt;Before him lies the collision of two worlds in two world systems, the spark of which would ignite the interstellar imagination. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;680&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;672&quot;&gt;&lt;span data-dcnode-id=&quot;679&quot; instrument_node=&quot;&quot;&gt;In 1609, Johannes Kepler finished the first work of genuine science fiction — that is, imaginative storytelling in which sensical science is a major plot device. &lt;/span&gt;&lt;em data-dcnode-id=&quot;677&quot;&gt;&lt;span data-dcnode-id=&quot;678&quot; instrument_node=&quot;&quot;&gt;Somnium&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;676&quot; instrument_node=&quot;&quot;&gt;, or &lt;/span&gt;&lt;em data-dcnode-id=&quot;674&quot;&gt;&lt;span data-dcnode-id=&quot;675&quot; instrument_node=&quot;&quot;&gt;The Dream&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;673&quot; instrument_node=&quot;&quot;&gt;, is the fictional account of a young astronomer who voyages to the Moon. Rich in both scientific ingenuity and symbolic play, it is at once a masterwork of the literary imagination and an invaluable scientific document, all the more impressive for the fact that it was written before Galileo pointed the first spyglass at the sky and before Kepler himself had ever looked through a telescope.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;671&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;669&quot;&gt;&lt;span data-dcnode-id=&quot;670&quot; instrument_node=&quot;&quot;&gt;Kepler knew what we habitually forget — that the locus of possibility expands when the unimaginable is imagined and then made real through systematic effort. Centuries later, in a 1971 conversation with Carl Sagan and Arthur C. Clarke about the future of space exploration, science fiction patron saint Ray Bradbury would capture this transmutation process perfectly: “It’s part of the nature of man to start with romance and build to a reality.” Like any currency of value, the human imagination is a coin with two inseparable sides. It is our faculty of fancy that fills the disquieting gaps of the unknown with the tranquilizing certitudes of myth and superstition, that points to magic and witchcraft when common sense and reason fail to unveil causality. But that selfsame faculty is also what leads us to rise above accepted facts, above the limits of the possible established by custom and convention, and reach for new summits of previously unimagined truth. Which way the coin flips depends on the degree of courage, determined by some incalculable combination of nature, culture, and character.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;668&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;663&quot;&gt;&lt;span data-dcnode-id=&quot;667&quot; instrument_node=&quot;&quot;&gt;In a letter to Galileo containing the first written mention of &lt;/span&gt;&lt;em data-dcnode-id=&quot;665&quot;&gt;&lt;span data-dcnode-id=&quot;666&quot; instrument_node=&quot;&quot;&gt;The Dream&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;664&quot; instrument_node=&quot;&quot;&gt;’s existence and penned in the spring of 1610 — a little more than a century after Columbus voyaged to the Americas — Kepler ushers his correspondent’s imagination toward fathoming the impending reality of interstellar travel by reminding him just how unimaginable transatlantic travel had seemed not so long ago:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;662&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;blockquote data-dcnode-id=&quot;659&quot;&gt;&lt;p data-dcnode-id=&quot;660&quot;&gt;&lt;span data-dcnode-id=&quot;661&quot; instrument_node=&quot;&quot;&gt;Who would have believed that a huge ocean could be crossed more peacefully and safely than the narrow expanse of the Adriatic, the Baltic Sea or the English Channel?&lt;/span&gt;&lt;/p&gt;&lt;/blockquote&gt;&lt;span data-dcnode-id=&quot;658&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;656&quot;&gt;&lt;span data-dcnode-id=&quot;657&quot; instrument_node=&quot;&quot;&gt;Kepler envisions that once “sails or ships fit to survive the heavenly breezes” are invented, voyagers would no longer fear the dark emptiness of interstellar space. With an eye to these future explorers, he issues a solidary challenge:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;655&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;blockquote data-dcnode-id=&quot;652&quot;&gt;&lt;p data-dcnode-id=&quot;653&quot;&gt;&lt;span data-dcnode-id=&quot;654&quot; instrument_node=&quot;&quot;&gt;So, for those who will come shortly to attempt this journey, let us establish the astronomy: Galileo, you of Jupiter, I of the moon.&lt;/span&gt;&lt;/p&gt;&lt;/blockquote&gt;&lt;span data-dcnode-id=&quot;651&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;figure class=&quot;wp-caption alignnone&quot; data-dcnode-id=&quot;638&quot;&gt;&lt;a data-dcnode-id=&quot;647&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.themarginalian.org/2019/01/06/maria-clara-eimmart/&quot;&gt;&lt;img class=&quot;jetpack-lazy-image&quot; data-dcnode-id=&quot;650&quot; data-lazy-src=&quot;https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2019/01/mariaclaraeimmart_moon.jpg?is-pending-load=1&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//i0.wp.com/www.themarginalian.org/wp-content/uploads/2019/01/mariaclaraeimmart_moon.jpg&amp;amp;raw&quot; srcset=&quot;data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7&quot;&gt;&lt;noscript data-dcnode-id=&quot;648&quot;&gt;&lt;span data-dcnode-id=&quot;649&quot; instrument_node=&quot;&quot;&gt;&amp;lt;img src=&quot;https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2019/01/mariaclaraeimmart_moon.jpg&quot; /&amp;gt;&lt;/span&gt;&lt;/noscript&gt;&lt;/a&gt;&lt;figcaption class=&quot;wp-caption-text&quot; data-dcnode-id=&quot;639&quot;&gt;&lt;span data-dcnode-id=&quot;646&quot; instrument_node=&quot;&quot;&gt;Painting of the Moon by the 17th-century German self-taught astronomer and artist &lt;/span&gt;&lt;a data-dcnode-id=&quot;644&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.themarginalian.org/2019/01/06/maria-clara-eimmart/&quot;&gt;&lt;span data-dcnode-id=&quot;645&quot; instrument_node=&quot;&quot;&gt;Maria Clara Eimmart&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;643&quot; instrument_node=&quot;&quot;&gt;. (Available &lt;/span&gt;&lt;a data-dcnode-id=&quot;641&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//society6.com/product/17th-century-astronomical-art-by-maria-clara-eimmart-moon-phases_print%3Fcurator%3Dbrainpicker&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;642&quot; instrument_node=&quot;&quot;&gt;as a print&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;640&quot; instrument_node=&quot;&quot;&gt;.)&lt;/span&gt;&lt;/figcaption&gt;&lt;/figure&gt;&lt;span data-dcnode-id=&quot;637&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;626&quot;&gt;&lt;span data-dcnode-id=&quot;636&quot; instrument_node=&quot;&quot;&gt;Newton would later refine Kepler’s three laws of motion with his formidable calculus and richer understanding of the underlying force as the foundation of Newtonian gravity. In a quarter millennium, the mathematician &lt;/span&gt;&lt;a data-dcnode-id=&quot;634&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.themarginalian.org/2016/09/19/hidden-figures-margot-lee-shetterly/&quot;&gt;&lt;span data-dcnode-id=&quot;635&quot; instrument_node=&quot;&quot;&gt;Katherine Johnson&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;633&quot; instrument_node=&quot;&quot;&gt; would draw on these laws in computing the trajectory that lands &lt;/span&gt;&lt;em data-dcnode-id=&quot;631&quot;&gt;&lt;span data-dcnode-id=&quot;632&quot; instrument_node=&quot;&quot;&gt;Apollo 11&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;630&quot; instrument_node=&quot;&quot;&gt; on the Moon. They would guide the &lt;/span&gt;&lt;em data-dcnode-id=&quot;628&quot;&gt;&lt;span data-dcnode-id=&quot;629&quot; instrument_node=&quot;&quot;&gt;Voyager&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;627&quot; instrument_node=&quot;&quot;&gt; spacecraft, the first human-made object to sail into interstellar space.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;625&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;616&quot;&gt;&lt;span data-dcnode-id=&quot;624&quot; instrument_node=&quot;&quot;&gt;In &lt;/span&gt;&lt;em data-dcnode-id=&quot;622&quot;&gt;&lt;span data-dcnode-id=&quot;623&quot; instrument_node=&quot;&quot;&gt;The Dream&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;621&quot; instrument_node=&quot;&quot;&gt;, which Kepler described in his letter to Galileo as a “lunar geography,” the young traveler lands on the Moon to find that lunar beings believe Earth revolves around them — from their cosmic vantage point, our pale blue dot rises and sets against their firmament, something reflected even in the name they have given Earth: Volva. Kepler chose the name deliberately, to emphasize the fact of Earth’s revolution — the very motion that made Copernicanism so dangerous to the dogma of cosmic stability. Assuming that the reader is aware that the Moon revolves around the Earth — an anciently observed fact, thoroughly uncontroversial by his day — Kepler intimates the unnerving central question: Could it be, his story suggests in a stroke of allegorical genius predating Edwin Abbott Abbott’s &lt;/span&gt;&lt;a data-dcnode-id=&quot;618&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.themarginalian.org/2017/12/20/flatland-epilogue/&quot;&gt;&lt;em data-dcnode-id=&quot;619&quot;&gt;&lt;span data-dcnode-id=&quot;620&quot; instrument_node=&quot;&quot;&gt;Flatland&lt;/span&gt;&lt;/em&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;617&quot; instrument_node=&quot;&quot;&gt; by nearly three centuries, that our own certitude about Earth’s fixed position in space is just as misguided as the lunar denizens’ belief in Volva’s revolution around them? Could we, too, be revolving around the sun, even though the ground feels firm and motionless beneath our feet?&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;615&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;608&quot;&gt;&lt;em data-dcnode-id=&quot;613&quot;&gt;&lt;span data-dcnode-id=&quot;614&quot; instrument_node=&quot;&quot;&gt;The Dream&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;612&quot; instrument_node=&quot;&quot;&gt; was intended to gently awaken people to the truth of Copernicus’s disconcerting heliocentric model of the universe, defying the long-held belief that Earth is the static center of an immutable cosmos. But earthlings’ millennia-long slumber was too deep for &lt;/span&gt;&lt;em data-dcnode-id=&quot;610&quot;&gt;&lt;span data-dcnode-id=&quot;611&quot; instrument_node=&quot;&quot;&gt;The Dream&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;609&quot; instrument_node=&quot;&quot;&gt; — a deadly somnolence, for it resulted in Kepler’s elderly mother’s being accused of witchcraft. Tens of thousands of people would be tried for witchcraft by the end of the persecution in Europe, dwarfing the two dozen who would render Salem synonymous with witchcraft trials seven decades later. Most of the accused were women, whose inculpation or defense fell on their sons, brothers, and husbands. Most of the trials ended in execution. In Germany, some twenty-five thousand were killed. In Kepler’s sparsely populated hometown alone, six women had been burned as witches just a few weeks before his mother was indicted. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;607&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;605&quot;&gt;&lt;span data-dcnode-id=&quot;606&quot; instrument_node=&quot;&quot;&gt;An uncanny symmetry haunts Kepler’s predicament — it was Katharina Kepler who had first enchanted her son with astronomy when she took him to the top of a nearby hill and let the six-year-old boy gape in wonderment as the Great Comet of 1577 blazed across the sky.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;604&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;figure class=&quot;wp-caption alignnone&quot; data-dcnode-id=&quot;590&quot;&gt;&lt;a data-dcnode-id=&quot;600&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//society6.com/product/art-from-the-comet-book-15872417710_print%3Fcurator%3Dbrainpicker&quot; target=&quot;_blank&quot;&gt;&lt;img alt=&quot;&quot; class=&quot;aligncenter size-full wp-image-59419 jetpack-lazy-image&quot; data-dcnode-id=&quot;603&quot; data-lazy-sizes=&quot;(max-width: 680px) 100vw, 680px&quot; data-lazy-src=&quot;https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2017/01/comet1-1.jpg?resize=680%2C873&amp;amp;is-pending-load=1#038;ssl=1&quot; data-lazy-srcset=&quot;https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2017/01/comet1-1.jpg?w=1200&amp;amp;ssl=1 1200w, https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2017/01/comet1-1.jpg?resize=240%2C308&amp;amp;ssl=1 240w, https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2017/01/comet1-1.jpg?resize=320%2C411&amp;amp;ssl=1 320w, https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2017/01/comet1-1.jpg?resize=768%2C986&amp;amp;ssl=1 768w, https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2017/01/comet1-1.jpg?resize=600%2C770&amp;amp;ssl=1 600w&quot; data-recalc-dims=&quot;1&quot; height=&quot;873&quot; loading=&quot;lazy&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//i0.wp.com/www.themarginalian.org/wp-content/uploads/2017/01/comet1-1.jpg%3Fresize%3D680%252C873%26ssl%3D1&amp;amp;raw&quot; srcset=&quot;data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7&quot; width=&quot;680&quot;&gt;&lt;noscript data-dcnode-id=&quot;601&quot;&gt;&lt;span data-dcnode-id=&quot;602&quot; instrument_node=&quot;&quot;&gt;&amp;lt;img loading=&quot;lazy&quot; src=&quot;https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2017/01/comet1-1.jpg?resize=680%2C873&amp;amp;#038;ssl=1&quot; alt=&quot;&quot; width=&quot;680&quot; height=&quot;873&quot; class=&quot;aligncenter size-full wp-image-59419&quot; srcset=&quot;https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2017/01/comet1-1.jpg?w=1200&amp;amp;amp;ssl=1 1200w, https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2017/01/comet1-1.jpg?resize=240%2C308&amp;amp;amp;ssl=1 240w, https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2017/01/comet1-1.jpg?resize=320%2C411&amp;amp;amp;ssl=1 320w, https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2017/01/comet1-1.jpg?resize=768%2C986&amp;amp;amp;ssl=1 768w, https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2017/01/comet1-1.jpg?resize=600%2C770&amp;amp;amp;ssl=1 600w&quot; sizes=&quot;(max-width: 680px) 100vw, 680px&quot; data-recalc-dims=&quot;1&quot; /&amp;gt;&lt;/span&gt;&lt;/noscript&gt;&lt;/a&gt;&lt;figcaption class=&quot;wp-caption-text&quot; data-dcnode-id=&quot;591&quot;&gt;&lt;span data-dcnode-id=&quot;599&quot; instrument_node=&quot;&quot;&gt;Art from &lt;/span&gt;&lt;a data-dcnode-id=&quot;596&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.themarginalian.org/2017/01/11/kometenbuch-the-comet-book/&quot;&gt;&lt;em data-dcnode-id=&quot;597&quot;&gt;&lt;span data-dcnode-id=&quot;598&quot; instrument_node=&quot;&quot;&gt;The Comet Book&lt;/span&gt;&lt;/em&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;595&quot; instrument_node=&quot;&quot;&gt;, 1587. (Available &lt;/span&gt;&lt;a data-dcnode-id=&quot;593&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//society6.com/product/art-from-the-comet-book-15872417710_print%3Fcurator%3Dbrainpicker&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;594&quot; instrument_node=&quot;&quot;&gt;as a print&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;592&quot; instrument_node=&quot;&quot;&gt;.)&lt;/span&gt;&lt;/figcaption&gt;&lt;/figure&gt;&lt;span data-dcnode-id=&quot;589&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;581&quot;&gt;&lt;span data-dcnode-id=&quot;588&quot; instrument_node=&quot;&quot;&gt;By the time he wrote &lt;/span&gt;&lt;em data-dcnode-id=&quot;586&quot;&gt;&lt;span data-dcnode-id=&quot;587&quot; instrument_node=&quot;&quot;&gt;The Dream&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;585&quot; instrument_node=&quot;&quot;&gt;, Kepler was one of the most prominent scientists in the world. His rigorous fidelity to observational data harmonized with a symphonic imagination. Drawing on Tycho’s data, Kepler devoted a decade and more than seventy failed trials to calculating the orbit of Mars, which became the yardstick for measuring the heavens. Having just formulated the first of his laws, demolishing the ancient belief that the heavenly bodies obey uniform circular motion, Kepler demonstrated that the planets orbit the sun at varying speeds along ellipses. Unlike previous models, which were simply mathematical hypotheses, Kepler discovered the actual orbit by which Mars moved through space, then used the Mars data to determine Earth’s orbit. Taking multiple observations of Mars’s position relative to Earth, he examined how the angle between the two planets changed over the course of the orbital period he had already calculated for Mars: 687 days. To do this, Kepler had to project himself onto Mars with an empathic leap of the imagination. The word empathy would come into popular use three centuries later, &lt;/span&gt;&lt;a data-dcnode-id=&quot;583&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.themarginalian.org/2016/12/14/you-must-change-rilke-rodin-empathy/&quot;&gt;&lt;span data-dcnode-id=&quot;584&quot; instrument_node=&quot;&quot;&gt;through the gateway of art&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;582&quot; instrument_node=&quot;&quot;&gt;, when it entered the modern lexicon in the early twentieth century to describe the imaginative act of projecting oneself into a painting in an effort to understand why art moves us. Through science, Kepler had projected himself into the greatest work of art there is in an effort to understand how nature draws its laws to move the planets, including the body that moves us through space. Using trigonometry, he calculated the distance between Earth and Mars, located the center of Earth’s orbit, and went on to demonstrate that all the other planets also moved along elliptical orbits, thus demolishing the foundation of Greek astronomy — uniform circular motion — and effecting a major strike against the Ptolemaic model.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;580&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;figure class=&quot;wp-caption aligncenter&quot; data-dcnode-id=&quot;567&quot; id=&quot;attachment_69579&quot;&gt;&lt;a data-dcnode-id=&quot;576&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//society6.com/product/the-orbit-of-mars-from-keplers-astronomia-nova-1609_print%3Fsku%3Ds6-13136712p4a1v1%3Fcurator%3Dbrainpicker&quot; target=&quot;_blank&quot;&gt;&lt;img alt=&quot;&quot; class=&quot;size-full wp-image-69579 jetpack-lazy-image&quot; data-dcnode-id=&quot;579&quot; data-lazy-sizes=&quot;(max-width: 680px) 100vw, 680px&quot; data-lazy-src=&quot;https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2019/12/AstronomiaNova_Mars_s61.jpg?resize=680%2C1329&amp;amp;is-pending-load=1#038;ssl=1&quot; data-lazy-srcset=&quot;https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2019/12/AstronomiaNova_Mars_s61.jpg?w=2040&amp;amp;ssl=1 2040w, https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2019/12/AstronomiaNova_Mars_s61.jpg?resize=240%2C469&amp;amp;ssl=1 240w, https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2019/12/AstronomiaNova_Mars_s61.jpg?resize=320%2C625&amp;amp;ssl=1 320w, https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2019/12/AstronomiaNova_Mars_s61.jpg?resize=768%2C1501&amp;amp;ssl=1 768w, https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2019/12/AstronomiaNova_Mars_s61.jpg?resize=600%2C1173&amp;amp;ssl=1 600w, https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2019/12/AstronomiaNova_Mars_s61.jpg?w=1360&amp;amp;ssl=1 1360w&quot; data-recalc-dims=&quot;1&quot; height=&quot;1329&quot; loading=&quot;lazy&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//i0.wp.com/www.themarginalian.org/wp-content/uploads/2019/12/AstronomiaNova_Mars_s61.jpg%3Fresize%3D680%252C1329%26ssl%3D1&amp;amp;raw&quot; srcset=&quot;data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7&quot; width=&quot;680&quot;&gt;&lt;noscript data-dcnode-id=&quot;577&quot;&gt;&lt;span data-dcnode-id=&quot;578&quot; instrument_node=&quot;&quot;&gt;&amp;lt;img loading=&quot;lazy&quot; src=&quot;https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2019/12/AstronomiaNova_Mars_s61.jpg?resize=680%2C1329&amp;amp;#038;ssl=1&quot; alt=&quot;&quot; width=&quot;680&quot; height=&quot;1329&quot; class=&quot;size-full wp-image-69579&quot; srcset=&quot;https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2019/12/AstronomiaNova_Mars_s61.jpg?w=2040&amp;amp;amp;ssl=1 2040w, https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2019/12/AstronomiaNova_Mars_s61.jpg?resize=240%2C469&amp;amp;amp;ssl=1 240w, https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2019/12/AstronomiaNova_Mars_s61.jpg?resize=320%2C625&amp;amp;amp;ssl=1 320w, https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2019/12/AstronomiaNova_Mars_s61.jpg?resize=768%2C1501&amp;amp;amp;ssl=1 768w, https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2019/12/AstronomiaNova_Mars_s61.jpg?resize=600%2C1173&amp;amp;amp;ssl=1 600w, https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2019/12/AstronomiaNova_Mars_s61.jpg?w=1360&amp;amp;amp;ssl=1 1360w&quot; sizes=&quot;(max-width: 680px) 100vw, 680px&quot; data-recalc-dims=&quot;1&quot; /&amp;gt;&lt;/span&gt;&lt;/noscript&gt;&lt;/a&gt;&lt;figcaption class=&quot;wp-caption-text&quot; data-dcnode-id=&quot;568&quot;&gt;&lt;span data-dcnode-id=&quot;575&quot; instrument_node=&quot;&quot;&gt;The orbital motion of Mars, from Kepler’s &lt;/span&gt;&lt;em data-dcnode-id=&quot;573&quot;&gt;&lt;span data-dcnode-id=&quot;574&quot; instrument_node=&quot;&quot;&gt;Astronomia Nova&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;572&quot; instrument_node=&quot;&quot;&gt;. (Available &lt;/span&gt;&lt;a data-dcnode-id=&quot;570&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//society6.com/product/the-orbit-of-mars-from-keplers-astronomia-nova-1609_print%3Fsku%3Ds6-13136712p4a1v1%3Fcurator%3Dbrainpicker&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;571&quot; instrument_node=&quot;&quot;&gt;as a print&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;569&quot; instrument_node=&quot;&quot;&gt;.)&lt;/span&gt;&lt;/figcaption&gt;&lt;/figure&gt;&lt;span data-dcnode-id=&quot;566&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;561&quot;&gt;&lt;span data-dcnode-id=&quot;565&quot; instrument_node=&quot;&quot;&gt;Kepler published these revelatory results, which summed up his first two laws, in his book &lt;/span&gt;&lt;em data-dcnode-id=&quot;563&quot;&gt;&lt;span data-dcnode-id=&quot;564&quot; instrument_node=&quot;&quot;&gt;Astronomia nova — The New Astronomy&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;562&quot; instrument_node=&quot;&quot;&gt;. That is exactly what it was — the nature of the cosmos had forever changed, and so had our place in it. “Through my effort God is being celebrated in astronomy,” Kepler wrote to his former professor, reflecting on having traded a career in theology for the conquest of a greater truth.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;560&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;552&quot;&gt;&lt;span data-dcnode-id=&quot;559&quot; instrument_node=&quot;&quot;&gt;By the time of &lt;/span&gt;&lt;em data-dcnode-id=&quot;557&quot;&gt;&lt;span data-dcnode-id=&quot;558&quot; instrument_node=&quot;&quot;&gt;Astronomia nova&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;556&quot; instrument_node=&quot;&quot;&gt;, Kepler had ample mathematical evidence affirming Copernicus’s theory. But he realized something crucial and abiding about human psychology: The scientific proof was too complex, too cumbersome, too abstract to persuade even his peers, much less the scientifically illiterate public; it wasn’t data that would dismantle their celestial parochialism, but storytelling. Three centuries before the poet Muriel Rukeyser wrote that “the universe is made of stories, not of atoms,” Kepler knew that whatever the composition of the universe may be, its understanding was indeed the work of stories, not of science — that what he needed was a new rhetoric by which to illustrate, in a simple yet compelling way, that the Earth is indeed in motion. And so &lt;/span&gt;&lt;em data-dcnode-id=&quot;554&quot;&gt;&lt;span data-dcnode-id=&quot;555&quot; instrument_node=&quot;&quot;&gt;The Dream&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;553&quot; instrument_node=&quot;&quot;&gt; was born.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;551&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;543&quot;&gt;&lt;span data-dcnode-id=&quot;550&quot; instrument_node=&quot;&quot;&gt;Even in medieval times, the Frankfurt Book Fair was one of the world’s most fecund literary marketplaces. Kepler attended it frequently in order to promote his own books and to stay informed about other important scientific publications. He brought the manuscript of &lt;/span&gt;&lt;em data-dcnode-id=&quot;548&quot;&gt;&lt;span data-dcnode-id=&quot;549&quot; instrument_node=&quot;&quot;&gt;The Dream&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;547&quot; instrument_node=&quot;&quot;&gt; with him to this safest possible launchpad, where the other attendees, in addition to being well aware of the author’s reputation as a royal mathematician and astronomer, were either scientists themselves or erudite enough to appreciate the story’s clever allegorical play on science. But something went awry: Sometime in 1611, the sole manuscript fell into the hands of a wealthy young nobleman and made its way across Europe. By Kepler’s account, it even reached John Donne and inspired his ferocious satire of the Catholic Church, &lt;/span&gt;&lt;em data-dcnode-id=&quot;545&quot;&gt;&lt;span data-dcnode-id=&quot;546&quot; instrument_node=&quot;&quot;&gt;Ignatius His Conclave&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;544&quot; instrument_node=&quot;&quot;&gt;. Circulated via barbershop gossip, versions of the story had reached minds far less literary, or even literate, by 1615. These garbled retellings eventually made their way to Kepler’s home duchy.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;542&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;534&quot;&gt;&lt;span data-dcnode-id=&quot;541&quot; instrument_node=&quot;&quot;&gt;“Once a poem is made available to the public, the right of interpretation belongs to the reader,” young Sylvia Plath would &lt;/span&gt;&lt;a data-dcnode-id=&quot;539&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.themarginalian.org/2015/07/03/sylvia-plath-letters-home-first-tragic-poem/&quot;&gt;&lt;span data-dcnode-id=&quot;540&quot; instrument_node=&quot;&quot;&gt;write to her mother&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;538&quot; instrument_node=&quot;&quot;&gt; three centuries later. But interpretation invariably reveals more about the interpreter than about the interpreted. The gap between intention and interpretation is always rife with wrongs, especially when writer and reader occupy vastly different strata of emotional maturity and intellectual sophistication. The science, symbolism, and allegorical virtuosity of &lt;/span&gt;&lt;em data-dcnode-id=&quot;536&quot;&gt;&lt;span data-dcnode-id=&quot;537&quot; instrument_node=&quot;&quot;&gt;The Dream&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;535&quot; instrument_node=&quot;&quot;&gt; were entirely lost on the illiterate, superstitious, and vengeful villagers of Kepler’s hometown. Instead, they interpreted the story with the only tool at their disposal — the blunt weapon of the literal shorn of context. They were especially captivated by one element of the story: The narrator is a young astronomer who describes himself as “by nature eager for knowledge” and who had apprenticed with Tycho Brahe. By then, people far and wide knew of Tycho’s most famous pupil and imperial successor. Perhaps it was a point of pride for locals to have produced the famous Johannes Kepler, perhaps a point of envy. Whatever the case, they immediately took the story to be not fiction but autobiography. This was the seedbed of trouble: Another main character was the narrator’s mother — an herb doctor who conjures up spirits to assist her son in his lunar voyage. Kepler’s own mother was an herb doctor.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;533&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;528&quot;&gt;&lt;span data-dcnode-id=&quot;532&quot; instrument_node=&quot;&quot;&gt;Whether what happened next was the product of intentional malevolent manipulation or the unfortunate workings of ignorance is hard to tell. My own sense is that one aided the other, as those who stand to gain from the manipulation of truth often prey on those bereft of critical thinking. According to Kepler’s subsequent account, a local barber overheard the story and seized upon the chance to cast Katharina Kepler as a witch — an opportune accusation, for the barber’s sister Ursula had a bone to pick with the elderly woman, a disavowed friend. Ursula Reinhold had borrowed money from Katharina Kepler and never repaid it. She had also confided in the old widow about having become pregnant by a man other than her husband. In an act of unthinking indiscretion, Katharina had shared this compromising information with Johannes’s younger brother, who had then just as unthinkingly circulated it around the small town. To abate scandal, Ursula had obtained an abortion. To cover up the brutal corporeal aftermath of this medically primitive procedure, she blamed her infirmity on a spell — cast against her, she proclaimed, by Katharina Kepler. Soon Ursula persuaded twenty-four suggestible locals to give accounts of the elderly woman’s sorcery — one neighbor claimed that her daughter’s arm had grown numb after Katharina brushed against it in the street; the butcher’s wife swore that pain pierced her husband’s thigh when Katharina walked by; the limping schoolmaster dated the onset of his disability to a night ten years earlier when he had taken a sip from a tin cup at Katharina’s house while reading her one of Kepler’s letters. She was accused of appearing magically through closed doors, of having caused the deaths of infants and animals. &lt;/span&gt;&lt;em data-dcnode-id=&quot;530&quot;&gt;&lt;span data-dcnode-id=&quot;531&quot; instrument_node=&quot;&quot;&gt;The Dream&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;529&quot; instrument_node=&quot;&quot;&gt;, Kepler believed, had furnished the superstition-hungry townspeople with evidence of his mother’s alleged witchcraft — after all, her own son had depicted her as a sorcerer in his story, the allegorical nature of which eluded them completely.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;527&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;525&quot;&gt;&lt;span data-dcnode-id=&quot;526&quot; instrument_node=&quot;&quot;&gt;For her part, Katharina Kepler didn’t help her own case. Prickly in character and known to brawl, she first tried suing Ursula for slander — a strikingly modern American approach but, in medieval Germany, effective only in stoking the fire, for Ursula’s well-connected family had ties to local authorities. Then she tried bribing the magistrate into dismissing her case by offering him a silver chalice, which was promptly interpreted as an admission of guilt, and the civil case was escalated to a criminal trial for witchcraft.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;524&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;522&quot;&gt;&lt;span data-dcnode-id=&quot;523&quot; instrument_node=&quot;&quot;&gt;In the midst of this tumult, Kepler’s infant daughter, named for his mother, died of epilepsy, followed by another son, four years old, of smallpox. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;521&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;519&quot;&gt;&lt;span data-dcnode-id=&quot;520&quot; instrument_node=&quot;&quot;&gt;Having taken his mother’s defense upon himself as soon as he first learned of the accusation, the bereaved Kepler devoted six years to the trial, all the while trying to continue his scientific work and to see through the publication of the major astronomical catalog he had been composing since he inherited Tycho’s data. Working remotely from Linz, Kepler first wrote various petitions on Katharina’s behalf, then mounted a meticulous legal defense in writing. He requested trial documentation of witness testimonies and transcripts of his mother’s interrogations. He then journeyed across the country once more, sitting with Katharina in prison and talking with her for hours on end to assemble information about the people and events of the small town he had left long ago. Despite the allegation that she was demented, the seventy-something Katharina’s memory was astonishing — she recalled in granular detail incidents that had taken place years earlier.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;518&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;516&quot;&gt;&lt;span data-dcnode-id=&quot;517&quot; instrument_node=&quot;&quot;&gt;Kepler set out to disprove each of the forty-nine “points of disgrace” hurled against his mother, using the scientific method to uncover the natural causes behind the supernatural evils she had allegedly wrought on the townspeople. He confirmed that Ursula had had an abortion, that the teenaged girl had numbed her arm by carrying too many bricks, that the schoolmaster had lamed his leg by tripping into a ditch, that the butcher suffered from lumbago.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;515&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;513&quot;&gt;&lt;span data-dcnode-id=&quot;514&quot; instrument_node=&quot;&quot;&gt;None of Kepler’s epistolary efforts at reason worked. Five years into the ordeal, an order for Katharina’s arrest was served. In the small hours of an August night, armed guards barged into her daughter’s house and found Katharina, who had heard the disturbance, hiding in a wooden linen chest — naked, as she often slept during the hot spells of summer. By one account, she was permitted to clothe herself before being taken away; by another, she was carried out disrobed inside the trunk to avoid a public disturbance and hauled to prison for another interrogation. So gratuitous was the fabrication of evidence that even Katharina’s composure through the indignities was held against her — the fact that she didn’t cry during the proceedings was cited as proof of unrepentant liaison with the Devil. Kepler had to explain to the court that he had never seen his stoic mother shed a single tear — not when his father left in Johannes’s childhood, not during the long years Katharina spent raising her children alone, not in the many losses of old age.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;512&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;510&quot;&gt;&lt;span data-dcnode-id=&quot;511&quot; instrument_node=&quot;&quot;&gt;Katharina was threatened with being stretched on a wheel — a&amp;nbsp;diabolical device commonly used to extract confessions — unless she admitted to sorcery. This elderly woman, who had outlived her era’s life expectancy by decades, would spend the next fourteen months imprisoned in a dark room, sitting and sleeping on the stone floor to which she was shackled with a heavy iron chain. She faced the threats with self-possession and confessed nothing. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;509&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;figure class=&quot;wp-caption aligncenter&quot; data-dcnode-id=&quot;503&quot; id=&quot;attachment_69578&quot;&gt;&lt;img alt=&quot;&quot; class=&quot;size-full wp-image-69578 jetpack-lazy-image&quot; data-dcnode-id=&quot;508&quot; data-lazy-sizes=&quot;(max-width: 680px) 100vw, 680px&quot; data-lazy-src=&quot;https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2019/12/breakingwheel.jpg?resize=680%2C713&amp;amp;is-pending-load=1#038;ssl=1&quot; data-lazy-srcset=&quot;https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2019/12/breakingwheel.jpg?w=1200&amp;amp;ssl=1 1200w, https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2019/12/breakingwheel.jpg?resize=240%2C252&amp;amp;ssl=1 240w, https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2019/12/breakingwheel.jpg?resize=320%2C336&amp;amp;ssl=1 320w, https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2019/12/breakingwheel.jpg?resize=768%2C806&amp;amp;ssl=1 768w, https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2019/12/breakingwheel.jpg?resize=600%2C630&amp;amp;ssl=1 600w&quot; data-recalc-dims=&quot;1&quot; height=&quot;713&quot; loading=&quot;lazy&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//i0.wp.com/www.themarginalian.org/wp-content/uploads/2019/12/breakingwheel.jpg%3Fresize%3D680%252C713%26ssl%3D1&amp;amp;raw&quot; srcset=&quot;data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7&quot; width=&quot;680&quot;&gt;&lt;noscript data-dcnode-id=&quot;506&quot;&gt;&lt;span data-dcnode-id=&quot;507&quot; instrument_node=&quot;&quot;&gt;&amp;lt;img loading=&quot;lazy&quot; src=&quot;https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2019/12/breakingwheel.jpg?resize=680%2C713&amp;amp;#038;ssl=1&quot; alt=&quot;&quot; width=&quot;680&quot; height=&quot;713&quot; class=&quot;size-full wp-image-69578&quot; srcset=&quot;https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2019/12/breakingwheel.jpg?w=1200&amp;amp;amp;ssl=1 1200w, https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2019/12/breakingwheel.jpg?resize=240%2C252&amp;amp;amp;ssl=1 240w, https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2019/12/breakingwheel.jpg?resize=320%2C336&amp;amp;amp;ssl=1 320w, https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2019/12/breakingwheel.jpg?resize=768%2C806&amp;amp;amp;ssl=1 768w, https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2019/12/breakingwheel.jpg?resize=600%2C630&amp;amp;amp;ssl=1 600w&quot; sizes=&quot;(max-width: 680px) 100vw, 680px&quot; data-recalc-dims=&quot;1&quot; /&amp;gt;&lt;/span&gt;&lt;/noscript&gt;&lt;figcaption class=&quot;wp-caption-text&quot; data-dcnode-id=&quot;504&quot;&gt;&lt;span data-dcnode-id=&quot;505&quot; instrument_node=&quot;&quot;&gt;The breaking wheel&lt;/span&gt;&lt;/figcaption&gt;&lt;/figure&gt;&lt;span data-dcnode-id=&quot;502&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;497&quot;&gt;&lt;span data-dcnode-id=&quot;501&quot; instrument_node=&quot;&quot;&gt;In a last recourse, Kepler uprooted his entire family, left his teaching position, and traveled again to his hometown as the Thirty Years’ War raged on. I wonder if he wondered during that dispiriting journey why he had written &lt;/span&gt;&lt;em data-dcnode-id=&quot;499&quot;&gt;&lt;span data-dcnode-id=&quot;500&quot; instrument_node=&quot;&quot;&gt;The Dream&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;498&quot; instrument_node=&quot;&quot;&gt; in the first place, wondered whether the price of any truth is to be capped at so great a personal cost.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;496&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;485&quot;&gt;&lt;span data-dcnode-id=&quot;495&quot; instrument_node=&quot;&quot;&gt;Long ago, as a student at Tübingen, Kepler had read Plutarch’s &lt;/span&gt;&lt;em data-dcnode-id=&quot;493&quot;&gt;&lt;span data-dcnode-id=&quot;494&quot; instrument_node=&quot;&quot;&gt;The Face on the Moon&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;492&quot; instrument_node=&quot;&quot;&gt; — the mythical story of a traveler who sails to a group of islands north of Britain inhabited by people who know secret passages to the Moon. There is no science in Plutarch’s story — it is pure fantasy. And yet it employs the same simple, clever device that Kepler himself would use in &lt;/span&gt;&lt;em data-dcnode-id=&quot;490&quot;&gt;&lt;span data-dcnode-id=&quot;491&quot; instrument_node=&quot;&quot;&gt;The Dream&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;489&quot; instrument_node=&quot;&quot;&gt; fifteen centuries later to unsettle the reader’s anthropocentric bias: In considering the Moon as a potential habitat for life, Plutarch pointed out that the idea of life in saltwater seems unfathomable to air-breathing creatures such as ourselves, and yet life in the oceans exists. It would be another eighteen centuries before we would fully awaken not only to the fact of marine life but to the complexity and splendor of this barely fathomable reality when Rachel Carson &lt;/span&gt;&lt;a data-dcnode-id=&quot;487&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.themarginalian.org/2017/02/28/undersea-rachel-carson/&quot;&gt;&lt;span data-dcnode-id=&quot;488&quot; instrument_node=&quot;&quot;&gt;pioneered a new aesthetic of poetic science writing&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;486&quot; instrument_node=&quot;&quot;&gt;, inviting the human reader to consider Earth from the nonhuman perspective of sea creatures.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;484&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;482&quot;&gt;&lt;span data-dcnode-id=&quot;483&quot; instrument_node=&quot;&quot;&gt;Kepler first read Plutarch’s story in 1595, but it wasn’t until the solar eclipse of 1605, the observations of which first gave him the insight that the orbits of the planets were ellipses rather than circles, that he began seriously considering the allegory as a means of illustrating Copernican ideas. Where Plutarch had explored space travel as metaphysics, Kepler made it a sandbox for real physics, exploring gravity and planetary motion. In writing about the takeoff of his imaginary spaceship, for instance, he makes clear that he has a theoretical model of gravity factoring in the demands that breaking away from Earth’s gravitational grip would place on cosmic voyagers. He goes on to add that while leaving Earth’s gravitational pull would be toilsome, once the spaceship is in the gravity-free “aether,” hardly any force would be needed to keep it in motion — an early understanding of inertia in the modern sense, predating by decades Newton’s first law of motion, which states that a body will move at a steady velocity unless acted upon by an outside force. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;481&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;479&quot;&gt;&lt;span data-dcnode-id=&quot;480&quot; instrument_node=&quot;&quot;&gt;In a passage at once insightful and amusing, Kepler describes the physical requirements for his lunar travelers — a prescient description of astronaut training:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;478&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;blockquote data-dcnode-id=&quot;475&quot;&gt;&lt;p data-dcnode-id=&quot;476&quot;&gt;&lt;span data-dcnode-id=&quot;477&quot; instrument_node=&quot;&quot;&gt;No inactive persons are accepted…no fat ones; no pleasure-loving ones; we choose only those who have spent their lives on horseback, or have shipped often to the Indies and are accustomed to subsisting on hardtack, garlic, dried fish and unpalatable fare.&lt;/span&gt;&lt;/p&gt;&lt;/blockquote&gt;&lt;span data-dcnode-id=&quot;474&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;472&quot;&gt;&lt;span data-dcnode-id=&quot;473&quot; instrument_node=&quot;&quot;&gt;Three centuries later, the early polar explorer Ernest Shackleton would post a similar recruitment ad for his pioneering Antarctic expedition:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;471&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;blockquote data-dcnode-id=&quot;468&quot;&gt;&lt;p data-dcnode-id=&quot;469&quot;&gt;&lt;span data-dcnode-id=&quot;470&quot; instrument_node=&quot;&quot;&gt;Men wanted for hazardous journey, small wages, bitter cold, long months of complete darkness, constant danger, safe return doubtful, honor and recognition in case of success.&lt;/span&gt;&lt;/p&gt;&lt;/blockquote&gt;&lt;span data-dcnode-id=&quot;467&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;465&quot;&gt;&lt;span data-dcnode-id=&quot;466&quot; instrument_node=&quot;&quot;&gt;When a woman named Peggy Peregrine expressed interest on behalf of an eager female trio, Shackleton dryly replied: “There are no vacancies for the opposite sex on the expedition.” Half a century later, the Russian cosmonaut Valentina Tereshkova would become the first woman to exit Earth’s atmosphere on a spacecraft guided by Kepler’s laws.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;464&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;459&quot;&gt;&lt;span data-dcnode-id=&quot;463&quot; instrument_node=&quot;&quot;&gt;After years of exerting reason against superstition, Kepler ultimately succeeded in getting his mother acquitted. But the seventy-five-year-old woman never recovered from the trauma of the trial and the bitter German winter spent in the unheated prison. On April 13, 1622, shortly after she was released, Katharina Kepler died, adding to her son’s litany of losses. A quarter millennium later, Emily Dickinson would write in &lt;/span&gt;&lt;a data-dcnode-id=&quot;461&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.themarginalian.org/2017/07/20/emily-dickinson-mother-death/&quot;&gt;&lt;span data-dcnode-id=&quot;462&quot; instrument_node=&quot;&quot;&gt;a poem&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;460&quot; instrument_node=&quot;&quot;&gt; the central metaphor of which draws on Kepler’s legacy:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;458&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;blockquote data-dcnode-id=&quot;449&quot;&gt;&lt;p data-dcnode-id=&quot;450&quot;&gt;&lt;span data-dcnode-id=&quot;457&quot; instrument_node=&quot;&quot;&gt;Each that we lose takes part of us;&lt;/span&gt;&lt;br data-dcnode-id=&quot;456&quot;&gt;&lt;span data-dcnode-id=&quot;455&quot; instrument_node=&quot;&quot;&gt;
A crescent still abides,&lt;/span&gt;&lt;br data-dcnode-id=&quot;454&quot;&gt;&lt;span data-dcnode-id=&quot;453&quot; instrument_node=&quot;&quot;&gt;
