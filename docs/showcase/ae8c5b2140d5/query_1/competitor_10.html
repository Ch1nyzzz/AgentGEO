enter qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none&quot; data-dcnode-id=&quot;3307&quot; role=&quot;button&quot; style=&quot;box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;&quot; tabindex=&quot;0&quot; type=&quot;button&quot;&gt;&lt;div class=&quot;q-flex qu-alignItems--center qu-justifyContent--center&quot; data-dcnode-id=&quot;3308&quot; style=&quot;box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;&quot;&gt;&lt;div class=&quot;q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray&quot; data-dcnode-id=&quot;3313&quot; style=&quot;box-sizing: border-box; font-size: 13px;&quot;&gt;&lt;div class=&quot;q-text qu-ellipsis qu-whiteSpace--nowrap&quot; data-dcnode-id=&quot;3314&quot; style=&quot;box-sizing: border-box; line-height: normal;&quot;&gt;&lt;span data-dcnode-id=&quot;3315&quot; instrument_node=&quot;&quot;&gt;Continue Reading&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;span class=&quot;q-inlineBlock qu-ml--tiny qu-mr--n_tiny&quot; data-dcnode-id=&quot;3309&quot; name=&quot;ChevronDown&quot; style=&quot;box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;&quot; width=&quot;16px&quot;&gt;&lt;span class=&quot;CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo&quot; data-dcnode-id=&quot;3310&quot;&gt;&lt;svg data-dcnode-id=&quot;3311&quot; height=&quot;24&quot; viewBox=&quot;0 0 24 24&quot; width=&quot;24&quot; xmlns=&quot;http://www.w3.org/2000/svg&quot;&gt;&lt;path class=&quot;icon_svg-stroke&quot; d=&quot;m5 8.5 7 7 7.005-7&quot; data-dcnode-id=&quot;3312&quot; fill=&quot;none&quot; stroke=&quot;#666&quot; stroke-linecap=&quot;round&quot; stroke-width=&quot;1.5&quot;&gt;&lt;/path&gt;&lt;/svg&gt;&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/button&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;q-box qu-display--none&quot; data-dcnode-id=&quot;3256&quot; style=&quot;box-sizing: border-box;&quot;&gt;&lt;div class=&quot;q-text&quot; data-dcnode-id=&quot;3257&quot; style=&quot;box-sizing: border-box; max-width: 100%;&quot;&gt;&lt;span class=&quot;CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc&quot; data-dcnode-id=&quot;3258&quot;&gt;&lt;span class=&quot;q-box qu-userSelect--text&quot; data-dcnode-id=&quot;3259&quot; style=&quot;box-sizing: border-box;&quot;&gt;&lt;p class=&quot;q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start&quot; data-dcnode-id=&quot;3296&quot; style=&quot;box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;&quot;&gt;&lt;span data-dcnode-id=&quot;3297&quot; style=&quot;font-weight: normal; font-style: normal; background: none;&quot;&gt;&lt;span data-dcnode-id=&quot;3298&quot; instrument_node=&quot;&quot;&gt;He never did. The theory was proved later by the observations of Galileo Galilei and Christian Huygens, as well as later work by Johannes Kepler and Sir Isaac Newton.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3295&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;p class=&quot;q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start&quot; data-dcnode-id=&quot;3292&quot; style=&quot;box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;&quot;&gt;&lt;span data-dcnode-id=&quot;3293&quot; style=&quot;font-weight: normal; font-style: normal; background: none;&quot;&gt;&lt;span data-dcnode-id=&quot;3294&quot; instrument_node=&quot;&quot;&gt;It was fully confirmed in 1863 when astronomer Friedrich Bessel confirmed the existence of stellar parallax, which is impossible in an earth-centered model.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3291&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;p class=&quot;q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start&quot; data-dcnode-id=&quot;3288&quot; style=&quot;box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;&quot;&gt;&lt;span data-dcnode-id=&quot;3289&quot; style=&quot;font-weight: normal; font-style: normal; background: none;&quot;&gt;&lt;span data-dcnode-id=&quot;3290&quot; instrument_node=&quot;&quot;&gt;The problem was that the Ptolemaic model of the universe, which explained planetary retrograde (i.e. planets that seemed to move backwards in their path against the stars) managed to calculate the expected behavior of planets within 1% of their observed positions using an “orbit on orbit” model where planets traveled a path on small circles which were centered around their large circular orbit. Most astronomers in the days of Copernicus were working on how to correct those small errors.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3287&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;p class=&quot;q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start&quot; data-dcnode-id=&quot;3284&quot; style=&quot;box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;&quot;&gt;&lt;span data-dcnode-id=&quot;3285&quot; style=&quot;font-weight: normal; font-style: normal; background: none;&quot;&gt;&lt;span data-dcnode-id=&quot;3286&quot; instrument_node=&quot;&quot;&gt;Copernicus was the first modern astronomer (it has been proposed by an ancient Greek astronomer named Aristarchus) to propose that the sun was at the center of the universe and that the planets, including Earth, went around it. The moon went around the earth too.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3283&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;p class=&quot;q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start&quot; data-dcnode-id=&quot;3280&quot; style=&quot;box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;&quot;&gt;&lt;span data-dcnode-id=&quot;3281&quot; style=&quot;font-weight: normal; font-style: normal; background: none;&quot;&gt;&lt;span data-dcnode-id=&quot;3282&quot; instrument_node=&quot;&quot;&gt;The Copernicus model explained planetary retrograde, but Copernicus made all the orbits circular and that didn’t work. Calculations based on his model were off by as much as 3% the observed values. Moreover, he published very late in his life and was never able to add to it once he received the criticism.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3279&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;p class=&quot;q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start&quot; data-dcnode-id=&quot;3276&quot; style=&quot;box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;&quot;&gt;&lt;span data-dcnode-id=&quot;3277&quot; style=&quot;font-weight: normal; font-style: normal; background: none;&quot;&gt;&lt;span data-dcnode-id=&quot;3278&quot; instrument_node=&quot;&quot;&gt;However, Galileo observed phases of Venus and planetary bodies around Jupiter. Neither of those fit with anything but a sun-centered system. His work was widely suppressed but Huygens confirmed the observations and added others, like the rings of Saturn. Galileo missed those because the rings were edge on when he first observed them.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3275&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;p class=&quot;q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start&quot; data-dcnode-id=&quot;3272&quot; style=&quot;box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;&quot;&gt;&lt;span data-dcnode-id=&quot;3273&quot; style=&quot;font-weight: normal; font-style: normal; background: none;&quot;&gt;&lt;span data-dcnode-id=&quot;3274&quot; instrument_node=&quot;&quot;&gt;Kepler, working from observations of the Ptolemaic astronomer Tycho Brahe worked out the orbits weren’t circles, but ellipses, and that the speed of the planets around the sun varied depending on their distance from it. He developed the “equal areas over equal time” model and worked out that the ratio between orbital periods and average distance was a constant. Kepler’s calculations matched Brahe’s observations better than the Ptolemaic system did.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3271&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;p class=&quot;q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start&quot; data-dcnode-id=&quot;3268&quot; style=&quot;box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;&quot;&gt;&lt;span data-dcnode-id=&quot;3269&quot; style=&quot;font-weight: normal; font-style: normal; background: none;&quot;&gt;&lt;span data-dcnode-id=&quot;3270&quot; instrument_node=&quot;&quot;&gt;Finally, Newton worked out the laws of gravity and that any object subject to a gravitational force (or any force that dropped off with the square of the distance) would have an elliptical orbit. This confirmed Kepler’s model.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3267&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;p class=&quot;q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start&quot; data-dcnode-id=&quot;3264&quot; style=&quot;box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;&quot;&gt;&lt;span data-dcnode-id=&quot;3265&quot; style=&quot;font-weight: normal; font-style: normal; background: none;&quot;&gt;&lt;span data-dcnode-id=&quot;3266&quot; instrument_node=&quot;&quot;&gt;Newton’s good friend Edmund Halley worked out that every 76 years a comet had been reported and determined it was the same comet in a very long elliptical orbit centered around the sun at one focus. He predicted its return. That couldn’t happen in a Ptolemaic system, but was find in a Copernican one. The comet returned right on schedule right where Halley said it would. Pity he died before that happened. Halley also made another important finding - that the position of stars had changed slightly since observations made by the ancient Greeks two thousand years earlier. That showed the stars weren’t fixed and unchanging.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3263&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;p class=&quot;q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start&quot; data-dcnode-id=&quot;3260&quot; style=&quot;box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;&quot;&gt;&lt;span data-dcnode-id=&quot;3261&quot; style=&quot;font-weight: normal; font-style: normal; background: none;&quot;&gt;&lt;span data-dcnode-id=&quot;3262&quot; instrument_node=&quot;&quot;&gt;By the time Bessel did his work the Kepler/Newton model was widely accepted. By taking observations of stars six months apart and comparing their position relative to other stars, Bessel detected that some stars were slightly shifting, meaning they were much closer to the sun than the other stars. That couldn’t happen if the Earth were standing still, only if it were moving.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;q-box qu-zIndex--action_bar&quot; data-dcno ound: none;&quot;&gt;&lt;span data-dcnode-id=&quot;3056&quot; instrument_node=&quot;&quot;&gt;The geocentric theory of the universe was wrong because it relied on “everyday common sense” and it gave too much trust to our own intuition that we are the center of the universe.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3053&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;p class=&quot;q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start&quot; data-dcnode-id=&quot;3050&quot; style=&quot;box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;&quot;&gt;&lt;span data-dcnode-id=&quot;3051&quot; style=&quot;font-weight: normal; font-style: normal; background: none;&quot;&gt;&lt;span data-dcnode-id=&quot;3052&quot; instrument_node=&quot;&quot;&gt;Another area where that still happens today is the so-called “hard problem of consciousness.”&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3049&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;p class=&quot;q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start&quot; data-dcnode-id=&quot;3046&quot; style=&quot;box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;&quot;&gt;&lt;span data-dcnode-id=&quot;3047&quot; style=&quot;font-weight: normal; font-style: normal; background: none;&quot;&gt;&lt;span data-dcnode-id=&quot;3048&quot; instrument_node=&quot;&quot;&gt;As with the geocentric theory of the universe, current “folk theories of consciousness” assume that our self, identity, and consciousness is how it seems to us. And to us, it seems that we are the center and starting point for everything.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3045&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;p class=&quot;q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start&quot; data-dcnode-id=&quot;3042&quot; style=&quot;box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;&quot;&gt;&lt;span data-dcnode-id=&quot;3043&quot; style=&quot;font-weight: normal; font-style: normal; background: none;&quot;&gt;&lt;span data-dcnode-id=&quot;3044&quot; instrument_node=&quot;&quot;&gt;René Decartes said in the 1600s: “I think, therefore I am.” That is, you can doubt everything in the world around you, but the one thing that you cannot doubt is that you are here, real, and conscious. From that one starting point — our conscious selves as the most basic fact there is — everything that we know to be true derives.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3041&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;p class=&quot;q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start&quot; data-dcnode-id=&quot;3038&quot; style=&quot;box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;&quot;&gt;&lt;span data-dcnode-id=&quot;3039&quot; style=&quot;font-weight: normal; font-style: normal; background: none;&quot;&gt;&lt;span data-dcnode-id=&quot;3040&quot; instrument_node=&quot;&quot;&gt;But is human conscious really the one thing on which the rest of reality is based? Or do we just think that because it is us doing the thinking?&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3037&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;p class=&quot;q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start&quot; data-dcnode-id=&quot;3034&quot; style=&quot;box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;&quot;&gt;&lt;span data-dcnode-id=&quot;3035&quot; style=&quot;font-weight: normal; font-style: normal; background: none;&quot;&gt;&lt;span data-dcnode-id=&quot;3036&quot; instrument_node=&quot;&quot;&gt;Are the things that we believe about our own consciousness really true? Is consciousness the unified field of fundamental reality that it appears to be?&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3033&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;p class=&quot;q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start&quot; data-dcnode-id=&quot;3026&quot; style=&quot;box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;&quot;&gt;&lt;span data-dcnode-id=&quot;3031&quot; style=&quot;font-weight: normal; font-style: normal; background: none;&quot;&gt;&lt;span data-dcnode-id=&quot;3032&quot; instrument_node=&quot;&quot;&gt;Or are we fooling ourselves? Are we accepting as fact what is actually an illusion about what or who we actually are? Perhaps we actually &lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;3029&quot; style=&quot;font-weight: bold; font-style: italic; background: none;&quot;&gt;&lt;span data-dcnode-id=&quot;3030&quot; instrument_node=&quot;&quot;&gt;are&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;3027&quot; style=&quot;font-weight: normal; font-style: normal; background: none;&quot;&gt;&lt;span data-dcnode-id=&quot;3028&quot; instrument_node=&quot;&quot;&gt; a mere product of trillions of mechanisms, and we are not the special force or substance that we have convinced ourselves we are. Maybe there is no magic that produces our consciousness, just a complex multilayered ecosystem of chemical processes as we now know biological life to be.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3025&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;p class=&quot;q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start&quot; data-dcnode-id=&quot;3022&quot; style=&quot;box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;&quot;&gt;&lt;span data-dcnode-id=&quot;3023&quot; style=&quot;font-weight: normal; font-style: normal; background: none;&quot;&gt;&lt;span data-dcnode-id=&quot;3024&quot; instrument_node=&quot;&quot;&gt;The perception that human consciousness is a mysterious and magical whole may be the last great myth to be one day dismantled by science.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;q-box qu-zIndex--action_bar&quot; data-dcnode-id=&quot;2945&quot; style=&quot;box-sizing: border-box;&quot;&gt;&lt;div class=&quot;q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA&quot; data-dcnode-id=&quot;2946&quot; style=&quot;box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;&quot;&gt;&lt;div class=&quot;q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny&quot; data-dcnode-id=&quot;2947&quot; style=&quot;box-sizing: border-box; display: flex;&quot;&gt;&lt;div class=&quot;q-flex qu-alignItems--center&quot; data-dcnode-id=&quot;2961&quot; style=&quot;box-sizing: border-box; display: flex;&quot;&gt;&lt;div class=&quot;q-inlineFlex qu-mr--small&quot; data-dcnode-id=&quot;2988&quot; style=&quot;box-sizing: border-box; display: inline-flex;&quot;&gt;&lt;div class=&quot;q-inlineFlex qu-borderRadius--pill qu-alignItems--center&quot; data-dcnode-id=&quot;2989&quot; style=&quot;box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);&quot;&gt;&lt;div class=&quot;q-box qu-display--inline-block&quot; data-dcnode-id=&quot;2999&quot; style=&quot;box-sizing: border-box; pointer-events: all;&quot;&gt;&lt;div class=&quot;q-relative puppeteer_popper_reference&quot; data-dcnode-id=&quot;3000&quot; style=&quot;box-sizing: border-box; position: relative;&quot;&gt;&lt;button aria-label=&quot;131 upvotes&quot; class=&quot;q-click-wrapper ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 eqENAR undefined qu-borderTopLeftRadius--pill qu-borderBottomLeftRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-f al; background: none;&quot;&gt;&lt;span data-dcnode-id=&quot;1190&quot; instrument_node=&quot;&quot;&gt;If the Earth is revolving, the stars should exhibit parallax,&lt;/span&gt;&lt;/span&gt;&lt;/li&gt;&lt;li class=&quot;q-relative&quot; data-dcnode-id=&quot;1181&quot; style=&quot;box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;&quot;&gt;&lt;span data-dcnode-id=&quot;1186&quot; style=&quot;font-weight: normal; font-style: normal; background: none;&quot;&gt;&lt;span data-dcnode-id=&quot;1187&quot; instrument_node=&quot;&quot;&gt;If the stars &lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1184&quot; style=&quot;font-weight: normal; font-style: italic; background: none;&quot;&gt;&lt;span data-dcnode-id=&quot;1185&quot; instrument_node=&quot;&quot;&gt;didn’t&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1182&quot; style=&quot;font-weight: normal; font-style: normal; background: none;&quot;&gt;&lt;span data-dcnode-id=&quot;1183&quot; instrument_node=&quot;&quot;&gt; exhibit parallax, that means that the stars had to be unimaginably huge and unimaginably far away,&lt;/span&gt;&lt;/span&gt;&lt;/li&gt;&lt;li class=&quot;q-relative&quot; data-dcnode-id=&quot;1178&quot; style=&quot;box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0px;&quot;&gt;&lt;span data-dcnode-id=&quot;1179&quot; style=&quot;font-weight: normal; font-style: normal; background: none;&quot;&gt;&lt;span data-dcnode-id=&quot;1180&quot; instrument_node=&quot;&quot;&gt;If the Earth is in motion, there needed to be a massive force acting on it.&lt;/span&gt;&lt;/span&gt;&lt;/li&gt;&lt;/ul&gt;&lt;p class=&quot;q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start&quot; data-dcnode-id=&quot;1174&quot; style=&quot;box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;&quot;&gt;&lt;span data-dcnode-id=&quot;1175&quot; style=&quot;font-weight: normal; font-style: normal; background: none;&quot;&gt;&lt;span data-dcnode-id=&quot;1176&quot; instrument_node=&quot;&quot;&gt;There are two things you have to understand about these objections. First, is that they were based on the best science available in the 16th century. Copernicus published almost a century before Isaac Newton was even born. For that matter, Galileo, Kepler, and Tycho also died before Newton was born. That means all of these debates were taking place before anyone understood anything about orbital mechanics or the laws of motion. They simply had no way of knowing that, say, the Sun was perfectly capable of exerting the necessary forces on the Earth. They had no way of knowing just how big the universe was. Frankly, nobody did until the very end of the 17th century.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1173&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;p class=&quot;q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start&quot; data-dcnode-id=&quot;1166&quot; style=&quot;box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;&quot;&gt;&lt;span data-dcnode-id=&quot;1171&quot; style=&quot;font-weight: normal; font-style: normal; background: none;&quot;&gt;&lt;span data-dcnode-id=&quot;1172&quot; instrument_node=&quot;&quot;&gt;The other thing you have to understand is that these are &lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1169&quot; style=&quot;font-weight: normal; font-style: italic; background: none;&quot;&gt;&lt;span data-dcnode-id=&quot;1170&quot; instrument_node=&quot;&quot;&gt;exactly&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1167&quot; style=&quot;font-weight: normal; font-style: normal; background: none;&quot;&gt;&lt;span data-dcnode-id=&quot;1168&quot; instrument_node=&quot;&quot;&gt; the objections they should have been making. The rotation of the Earth absolutely should create Coriolis forces affecting the motion of projectiles. Stars absolutely should exhibit stellar parallax due to the Earth’s orbit. They knew exactly what the physical consequences of Copernicus’s work should be and they went looking for them.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1165&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;p class=&quot;q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start&quot; data-dcnode-id=&quot;1162&quot; style=&quot;box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;&quot;&gt;&lt;span data-dcnode-id=&quot;1163&quot; style=&quot;font-weight: normal; font-style: normal; background: none;&quot;&gt;&lt;span data-dcnode-id=&quot;1164&quot; instrument_node=&quot;&quot;&gt;They couldn’t find them.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1161&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;p class=&quot;q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start&quot; data-dcnode-id=&quot;1154&quot; style=&quot;box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;&quot;&gt;&lt;span data-dcnode-id=&quot;1159&quot; style=&quot;font-weight: normal; font-style: normal; background: none;&quot;&gt;&lt;span data-dcnode-id=&quot;1160&quot; instrument_node=&quot;&quot;&gt;Now, &lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1157&quot; style=&quot;font-weight: normal; font-style: italic; background: none;&quot;&gt;&lt;span data-dcnode-id=&quot;1158&quot; instrument_node=&quot;&quot;&gt;we&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1155&quot; style=&quot;font-weight: normal; font-style: normal; background: none;&quot;&gt;&lt;span data-dcnode-id=&quot;1156&quot; instrument_node=&quot;&quot;&gt; know why they couldn’t find the evidence they were looking for, but that’s with the benefit of a few centuries of hindsight. Put another way, we can use Newton’s laws to work out that the Coriolis forces on a cannonball should be quite small. They had no way of doing that.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1153&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;p class=&quot;q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start&quot; data-dcnode-id=&quot;1146&quot; style=&quot;box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;&quot;&gt;&lt;span data-dcnode-id=&quot;1151&quot; style=&quot;font-weight: normal; font-style: normal; background: none;&quot;&gt;&lt;span data-dcnode-id=&quot;1152&quot; instrument_node=&quot;&quot;&gt;Furthermore, Copernicus couldn’t answer these objections. He couldn’t figure out why there was no apparent stellar parallax or how the Earth stayed in orbit. Neither could Galileo, for that matter. &lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1149&quot; style=&quot;font-weight: normal; font-style: italic; background: none;&quot;&gt;&lt;span data-dcnode-id=&quot;1150&quot; instrument_node=&quot;&quot;&gt;Nobody&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1147&quot; style=&quot;font-weight: normal; font-style: normal; background: none;&quot;&gt;&lt;span data-dcnode-id=&quot;1148&quot; instrument_node=&quot;&quot;&gt; could until the likes of Newton, Halley, and Huygens a century and a half later. All the Copernicans could do to answer these questions was shrug their shoulders and say God did it.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1145&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;p class=&quot;q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start&quot; data-dcnode-id=&quot;1142&quot; style=&quot;box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;&quot;&gt;&lt;span data-dcnode-id=&quot;1143&quot; style=&quot;font-weight: normal; font-style: normal; background: none;&quot;&gt;&lt;span data-dcnode-id=&quot;1144&quot; instrument_node=&quot;&quot;&gt;And that argument wasn’t good enough, even in the Vatican.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1141&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;p class=&quot;q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start&quot; data-dcnode-id=&quot;1138&quot; style=&quot;box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;&quot;&gt;&lt;span data-dcnode-id=&quot;1139&quot; style=&quot;font-weight: normal; font-style: normal; background: none;&quot;&gt;&lt;span data-dcnode-id=&quot;1140&quot; instrument_node=&quot;&quot;&gt;On top of that, Copernicus’s theory wasn’t even all that useful. His goal was to produce a more accurate means of calculating the positions of the Sun, Moon, and planets for calendrical purposes. Frankly, he failed at that. The math may have been easier, but his theory had just as many epicycles and fudge factors as the older Ptolemaic theory and its predictions were just as inaccurate.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1137&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;p class=&quot;q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start&quot; data-dcnode-id=&quot;1134&quot; style=&quot;box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;&quot;&gt;&lt;span data-dcnode-id=&quot;1135&quot; style=&quot;font-weight: normal; font-style: normal; background: none;&quot;&gt;&lt;span data-dcnode-id=&quot;1136&quot; instrument_node=&quot;&quot;&gt;Let’s be perfectly honest about this: Copernicus’s opponents were in the right. A theory that doesn’t fit the available data and doesn’t produce useful results should be rejected. That doesn’t mean it won’t open up promising avenues of research in the future or that it can’t be reevaluated in light of better data. Turns out, that’s exactly what happened. Tycho Brahe’s model of the Solar System may have been functionally identical to Copernicus’s, but by assuming a stationary Earth he resolved most of the objections to Copernicus’s theories. That’s why his work became widely accepted while Copernicus’s fell out of favor.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1133&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;p class=&quot;q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start&quot; data-dcnode-id=&quot;1130&quot; style=&quot;box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;&quot;&gt;&lt;span data-dcnode-id=&quot;1131&quot; style=&quot;font-weight: normal; font-style: normal; background: none;&quot;&gt;&lt;span data-dcnode-id=&quot;1132&quot; instrument_node=&quot;&quot;&gt;And, in one of history’s great ironies, it was Galileo who worked out the principles of relative motion. If he could have put his ego aside and applied them to the motion of the planets, he should have realized that the Copernican and Tychonic models were physically identical.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1129&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;p class=&quot;q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start&quot; data-dcnode-id=&quot;1126&quot; style=&quot;box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;&quot;&gt;&lt;span data-dcnode-id=&quot;1127&quot; style=&quot;font-weight: normal; font-style: normal; background: none;&quot;&gt;&lt;span data-dcnode-id=&quot;1128&quot; instrument_node=&quot;&quot;&gt;Similarly, Kepler’s work left many of these same questions unanswered but it his theory was significantly more accurate and more elegant than the Copernican and Tychonic theories. Once he realized that the planets move in elliptical orbits, he could accurately model the motion of the Solar System. Scientists accepted his theories because he could accurately explain what was happening, even if he couldn’t explain why they worked that way.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;q-box qu-zIndex--action_bar&quot; data-dcnode-id=&quot;1054&quot; style=&quot;box-sizing: border-box;&quot;&gt;&lt;div class=&quot;q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA&quot; data-dcnode-id=&quot;1055&quot; style=&quot;box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;&quot;&gt;&lt;div class=&quot;q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny&quot; data-dcnode-id=&quot;1056&quot; style=&quot;box-sizing: border-box; display: flex;&quot;&gt;&lt;div class=&quot;q-flex qu-alignItems--center&quot; data-dcnode-id=&quot;1070&quot; style=&quot;box-sizing: border-box; display: flex;&quot;&gt;&lt;div class=&quot;q-inlineFlex qu-mr--small&quot; data-dcnode-id=&quot;1092&quot; style=&quot;box-sizing: border-box; display: inline-flex;&quot;&gt;&lt;div class=&quot;q-inlineFlex qu-borderRadius--pill qu-alignItems--center&quot; data-dcnode-id=&quot;1093&quot; style=&quot;box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);&quot;&gt;&lt;div class=&quot;q-box qu-display--inline-block&quot; data-dcnode-id=&quot;1103&quot; style=&quot;box-sizing: border-box; pointer-events: all;&quot;&gt;&lt;div class=&quot;q-relative puppeteer_popper_reference&quot; data-dcnode-id=&quot;1104&quot; style=&quot;box-sizing: border-box; position: relative;&quot;&gt;&lt;button aria-label=&quot;1 upvote&quot; class=&quot;q-click-wrapper ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 eqENAR undefined qu-borderTopLeftRadius--pill qu-borderBottomLeftRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--bg--darken qu-hover--textDecoration--none&quot; data-dcnode-id=&quot;1105&quot; role=&quot;button&quot; sty
