efracting Telescopes&lt;/span&gt;&lt;/span&gt;&lt;/h2&gt;&lt;p data-dcnode-id=&quot;847&quot;&gt;&lt;span data-dcnode-id=&quot;848&quot; instrument_node=&quot;&quot;&gt;Before we dig into the pros and cons of reflecting vs. refracting telescopes … let’s start with the basics.&amp;nbsp; What exactly are the key features that differentiate reflectors from refractors?&lt;/span&gt;&lt;/p&gt;&lt;h3 data-dcnode-id=&quot;844&quot;&gt;&lt;span data-dcnode-id=&quot;845&quot; id=&quot;Refractor-Telescopes-The-8220Classic8221-Telescope-Design&quot;&gt;&lt;span data-dcnode-id=&quot;846&quot; instrument_node=&quot;&quot;&gt;Refractor Telescopes – The “Classic” Telescope Design&lt;/span&gt;&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;842&quot;&gt;&lt;span data-dcnode-id=&quot;843&quot; instrument_node=&quot;&quot;&gt;If you ask the average person to describe a telescope, they will probably be thinking of a refractor telescope.&amp;nbsp; Why?&amp;nbsp; Because it’s by far the most classic-looking type of telescope.&amp;nbsp; Think about George Washington, at the height of the American Revolution, looking through his spyglass telescope to monitor the movements of British troops – this is a classic example of a refracting telescope.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;831&quot;&gt;&lt;span data-dcnode-id=&quot;841&quot; instrument_node=&quot;&quot;&gt;The &lt;/span&gt;&lt;a data-dcnode-id=&quot;839&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/physics-and-astronomy/refracting-telescopes&quot;&gt;&lt;span data-dcnode-id=&quot;840&quot; instrument_node=&quot;&quot;&gt;refracting telescope&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;838&quot; instrument_node=&quot;&quot;&gt; was most likely invented in the mid-1500’s by Leonard Digges (although Galileo Galilei is often credited as the &lt;/span&gt;&lt;a data-dcnode-id=&quot;836&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.telescopeguide.org/who-invented-the-telescope/&quot;&gt;&lt;span data-dcnode-id=&quot;837&quot; instrument_node=&quot;&quot;&gt;inventor of the telescope&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;835&quot; instrument_node=&quot;&quot;&gt;).&amp;nbsp; Its design is really pretty straightforward:&amp;nbsp; A refractor is made of a &lt;/span&gt;&lt;em data-dcnode-id=&quot;833&quot;&gt;&lt;span data-dcnode-id=&quot;834&quot; instrument_node=&quot;&quot;&gt;long optical tube with a convex glass lens at the main opening&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;832&quot; instrument_node=&quot;&quot;&gt;.&amp;nbsp; The light enters the telescope through this lens, then exits the telescope through the eyepiece for viewing.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;823&quot;&gt;&lt;picture class=&quot;aligncenter size-full wp-image-2586&quot; data-dcnode-id=&quot;825&quot;&gt;&lt;span data-dcnode-id=&quot;830&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;source data-dcnode-id=&quot;829&quot; sizes=&quot;(max-width: 1314px) 100vw, 1314px&quot; srcset=&quot;https://www.telescopeguide.org/wp-content/uploads/2021/02/Refractor-telescope-diagram-sketch-3.jpg.webp 1314w, https://www.telescopeguide.org/wp-content/uploads/2021/02/Refractor-telescope-diagram-sketch-3-300x166.jpg.webp 300w, https://www.telescopeguide.org/wp-content/uploads/2021/02/Refractor-telescope-diagram-sketch-3-1024x565.jpg.webp 1024w, https://www.telescopeguide.org/wp-content/uploads/2021/02/Refractor-telescope-diagram-sketch-3-768x424.jpg.webp 768w&quot; type=&quot;image/webp&quot;&gt;&lt;span data-dcnode-id=&quot;828&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;img alt=&quot;Refractor telescope diagram sketch how it works&quot; data-dcnode-id=&quot;827&quot; height=&quot;725&quot; sizes=&quot;(max-width: 1314px) 100vw, 1314px&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.telescopeguide.org/wp-content/uploads/2021/02/Refractor-telescope-diagram-sketch-3.jpg&amp;amp;raw&quot; srcset=&quot;https://www.telescopeguide.org/wp-content/uploads/2021/02/Refractor-telescope-diagram-sketch-3.jpg 1314w, https://www.telescopeguide.org/wp-content/uploads/2021/02/Refractor-telescope-diagram-sketch-3-300x166.jpg 300w, https://www.telescopeguide.org/wp-content/uploads/2021/02/Refractor-telescope-diagram-sketch-3-1024x565.jpg 1024w, https://www.telescopeguide.org/wp-content/uploads/2021/02/Refractor-telescope-diagram-sketch-3-768x424.jpg 768w&quot; width=&quot;1314&quot;&gt;&lt;span data-dcnode-id=&quot;826&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/picture&gt;&lt;span data-dcnode-id=&quot;824&quot; instrument_node=&quot;&quot;&gt;
That’s pretty much it.&amp;nbsp; It’s simple, elegant, and easy to understand.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;818&quot;&gt;&lt;span data-dcnode-id=&quot;822&quot; instrument_node=&quot;&quot;&gt;The glass lens “refracts” (or bends) the light so that it reaches a focal point.&amp;nbsp; The size of the lens (known as the telescope’s “objective”) determines the amount of light the telescope can collect.&amp;nbsp; (This is also referred to as the &lt;/span&gt;&lt;a data-dcnode-id=&quot;820&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.telescopeguide.org/what-is-telescope-aperture/&quot;&gt;&lt;span data-dcnode-id=&quot;821&quot; instrument_node=&quot;&quot;&gt;telescope’s “aperture”&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;819&quot; instrument_node=&quot;&quot;&gt;.)&amp;nbsp; The focal length of the telescope, divided by the focal length of the eyepiece, determines the amount of magnification.&amp;nbsp; The focal length also determines the field of view.&amp;nbsp; (A shorter focal length provides a wider field of view, measured in degrees.)&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;813&quot;&gt;&lt;span data-dcnode-id=&quot;817&quot; instrument_node=&quot;&quot;&gt;Refractors come in many varieties&amp;nbsp;– and they can be optimized for a variety of usage scenarios including &lt;/span&gt;&lt;a data-dcnode-id=&quot;815&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.telescopeguide.org/best-telescopes-astrophotography/&quot;&gt;&lt;span data-dcnode-id=&quot;816&quot; instrument_node=&quot;&quot;&gt;astrophotography&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;814&quot; instrument_node=&quot;&quot;&gt;, research, and visual astronomy.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;811&quot;&gt;&lt;span data-dcnode-id=&quot;812&quot; instrument_node=&quot;&quot;&gt;Here’s a real-world example of a refractor telescope – this is similar to the one sketched in the image above.&amp;nbsp; This one sits on an alt-azimuth mount, while the sketch above shows a German equatorial mount.&amp;nbsp; Both have a 90-degree diagonal, which redirects the light upwards to the eyepiece.&lt;/span&gt;&lt;/p&gt;&lt;p align=&quot;center&quot; data-dcnode-id=&quot;806&quot; id=&quot;product_img&quot;&gt;&lt;img alt=&quot;Orion Observer II 70mm Altazimuth Refractor Telescope&quot; border=&quot;0&quot; data-dcnode-id=&quot;810&quot; loading=&quot;lazy&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//images.telescope.com/get/h/340/w/340/10275.jpg&amp;amp;raw&quot;&gt;&lt;br data-dcnode-id=&quot;809&quot;&gt;&lt;i data-dcnode-id=&quot;807&quot;&gt;&lt;span data-dcnode-id=&quot;808&quot; instrument_node=&quot;&quot;&gt;Image Credit: Orion (Used with Permission)&lt;/span&gt;&lt;/i&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;800&quot; style=&quot;text-align: center;&quot;&gt;&lt;em data-dcnode-id=&quot;801&quot;&gt;&lt;span data-dcnode-id=&quot;805&quot; instrument_node=&quot;&quot;&gt;Telescope shown: Orion Observer II 70mm (&lt;/span&gt;&lt;a data-dcnode-id=&quot;803&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.anrdoezrs.net/links/100308105/type/dlg/https%3A//www.telescope.com/Orion-Observer-II-70mm-Altazimuth-Refractor-Telescope/p/117098.uts&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;804&quot; instrument_node=&quot;&quot;&gt;See it on Telescope.com&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;802&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;/em&gt;&lt;/p&gt;&lt;h3 data-dcnode-id=&quot;797&quot;&gt;&lt;span data-dcnode-id=&quot;798&quot; id=&quot;Reflector-Telescopes-Came-Along-Later-Introducing-Newton8217s-Innovative-Mirror-Based-Design&quot;&gt;&lt;span data-dcnode-id=&quot;799&quot; instrument_node=&quot;&quot;&gt;Reflector Telescopes Came Along Later, Introducing Newton’s Innovative Mirror-Based Design&lt;/span&gt;&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;792&quot;&gt;&lt;span data-dcnode-id=&quot;796&quot; instrument_node=&quot;&quot;&gt;Reflecting telescopes introduced a new concept – &lt;/span&gt;&lt;em data-dcnode-id=&quot;794&quot;&gt;&lt;span data-dcnode-id=&quot;795&quot; instrument_node=&quot;&quot;&gt;using mirrors as the primary way to gather light&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;793&quot; instrument_node=&quot;&quot;&gt; and redirect it to a focal point.&amp;nbsp; Unlike refracting telescopes, reflectors do not utilize a glass objective lens – instead, a large curved mirror is situated at the base of the telescope.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;790&quot;&gt;&lt;span data-dcnode-id=&quot;791&quot; instrument_node=&quot;&quot;&gt;This primary mirror (whose diameter is the size of the telescope’s aperture) plays the role of bouncing light rays back towards one or more additional mirrors, until the light eventually exits the telescope through the eyepiece.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;779&quot;&gt;&lt;picture class=&quot;aligncenter size-full wp-image-2588&quot; data-dcnode-id=&quot;784&quot; loading=&quot;lazy&quot;&gt;&lt;span data-dcnode-id=&quot;789&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;source data-dcnode-id=&quot;788&quot; sizes=&quot;(max-width: 1122px) 100vw, 1122px&quot; srcset=&quot;https://www.telescopeguide.org/wp-content/uploads/2021/02/Reflector-telescope-diagram-sketch-3.jpg.webp 1122w, https://www.telescopeguide.org/wp-content/uploads/2021/02/Reflector-telescope-diagram-sketch-3-300x191.jpg.webp 300w, https://www.telescopeguide.org/wp-content/uploads/2021/02/Reflector-telescope-diagram-sketch-3-1024x653.jpg.webp 1024w, https://www.telescopeguide.org/wp-content/uploads/2021/02/Reflector-telescope-diagram-sketch-3-768x490.jpg.webp 768w&quot; type=&quot;image/webp&quot;&gt;&lt;span data-dcnode-id=&quot;787&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;img alt=&quot;Reflector telescope diagram sketch how it works&quot; data-dcnode-id=&quot;786&quot; height=&quot;716&quot; loading=&quot;lazy&quot; sizes=&quot;(max-width: 1122px) 100vw, 1122px&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.telescopeguide.org/wp-content/uploads/2021/02/Reflector-telescope-diagram-sketch-3.jpg&amp;amp;raw&quot; srcset=&quot;https://www.telescopeguide.org/wp-content/uploads/2021/02/Reflector-telescope-diagram-sketch-3.jpg 1122w, https://www.telescopeguide.org/wp-content/uploads/2021/02/Reflector-telescope-diagram-sketch-3-300x191.jpg 300w, https://www.telescopeguide.org/wp-content/uploads/2021/02/Reflector-telescope-diagram-sketch-3-1024x653.jpg 1024w, https://www.telescopeguide.org/wp-content/uploads/2021/02/Reflector-telescope-diagram-sketch-3-768x490.jpg 768w&quot; width=&quot;1122&quot;&gt;&lt;span data-dcnode-id=&quot;785&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/picture&gt;&lt;span data-dcnode-id=&quot;783&quot; instrument_node=&quot;&quot;&gt;
This has some key advantages and disadvantages which we’ll discuss throughout this article – but there is one advantage worth pointing out right up front.&amp;nbsp; As you move towards larger aperture sizes, &lt;/span&gt;&lt;em data-dcnode-id=&quot;781&quot;&gt;&lt;span data-dcnode-id=&quot;782&quot; instrument_node=&quot;&quot;&gt;mirrors are much less expensive to manufacture than high-quality glass lenses&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;780&quot; instrument_node=&quot;&quot;&gt;.&amp;nbsp; This makes it possible to build telescopes that can collect a lot more light without the dramatic increase in cost.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;777&quot;&gt;&lt;span data-dcnode-id=&quot;778&quot; instrument_node=&quot;&quot;&gt;Reflector telescopes have many sub-types which differ from each other in the number of mirrors, shape of mirrors, and other details.&amp;nbsp; These include the classic Newtonian telescope (named after Isaac Newton), Dobsonian telescopes, compound or catadioptric telescopes (like the Schmidt-Cassegrain telescope which is a popular compound reflector), and more.&amp;nbsp; But the one thing they all have in common is that they utilize a large primary mirror as the aperture of the telescope (its main light-collecting component).&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;775&quot;&gt;&lt;span data-dcnode-id=&quot;776&quot; instrument_node=&quot;&quot;&gt;Here’s a real-world example of a reflector telescope – this is the same one sketched in the image above.&amp;nbsp; This one also sits on a German equatorial mount.&amp;nbsp; Notice the location of the eyepiece.&amp;nbsp; It’s towards the top of the telescope, because that’s the location of the secondary mirror.&lt;/span&gt;&lt;/p&gt;&lt;p align=&quot;center&quot; data-dcnode-id=&quot;770&quot; id=&quot;product_img&quot;&gt;&lt;img alt=&quot;Orion SpaceProbe 130ST Equatorial Reflector Telescope&quot; border=&quot;0&quot; data-dcnode-id=&quot;774&quot; loading=&quot;lazy&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//images.telescope.com/get/h/340/w/340/09007.jpg&amp;amp;raw&quot;&gt;&lt;br data-dcnode-id=&quot;773&quot;&gt;&lt;i data-dcnode-id=&quot;771&quot;&gt;&lt;span data-dcnode-id=&quot;772&quot; instrument_node=&quot;&quot;&gt;Image Credit: Orion (Used with Permission)&lt;/span&gt;&lt;/i&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;764&quot; style=&quot;text-align: center;&quot;&gt;&lt;em data-dcnode-id=&quot;765&quot;&gt;&lt;span data-dcnode-id=&quot;769&quot; instrument_node=&quot;&quot;&gt;Telescope shown: Orion SpaceProbe 130ST (&lt;/span&gt;&lt;a data-dcnode-id=&quot;767&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.anrdoezrs.net/links/100308105/type/dlg/https%3A//www.telescope.com/Orion-SpaceProbe-130ST-Equatorial-Reflector-Telescope/p/9007.uts&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;768&quot; instrument_node=&quot;&quot;&gt;See it on Telescope.com&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;766&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;/em&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;762&quot;&gt;&lt;span data-dcnode-id=&quot;763&quot; instrument_node=&quot;&quot;&gt;Here’s another real-world example – notice how the telescope’s optical tube is open vs. enclosed.&amp;nbsp; Also notice that when you peer inside the telescope from the top of the optical tube, you can see the sky’s reflection in the primary mirror.&amp;nbsp; (In this case, you can see trees reflected in the mirror.)&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;750&quot; style=&quot;text-align: center;&quot;&gt;&lt;picture class=&quot;alignnone size-full wp-image-4966&quot; data-dcnode-id=&quot;756&quot; loading=&quot;lazy&quot;&gt;&lt;span data-dcnode-id=&quot;761&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;source data-dcnode-id=&quot;760&quot; sizes=&quot;(max-width: 1200px) 100vw, 1200px&quot; srcset=&quot;https://www.telescopeguide.org/wp-content/uploads/2021/02/reflector-telescope-primary-mirror-inside-view.jpg.webp 1200w, https://www.telescopeguide.org/wp-content/uploads/2021/02/reflector-telescope-primary-mirror-inside-view-300x200.jpg.webp 300w, https://www.telescopeguide.org/wp-content/uploads/2021/02/reflector-telescope-primary-mirror-inside-view-1024x683.jpg.webp 1024w, https://www.telescopeguide.org/wp-content/uploads/2021/02/reflector-telescope-primary-mirror-inside-view-768x512.jpg.webp 768w&quot; type=&quot;image/webp&quot;&gt;&lt;span data-dcnode-id=&quot;759&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;img alt=&quot;reflection in the primary mirror of a newtonian reflector telescope&quot; data-dcnode-id=&quot;758&quot; height=&quot;800&quot; loading=&quot;lazy&quot; sizes=&quot;(max-width: 1200px) 100vw, 1200px&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.telescopeguide.org/wp-content/uploads/2021/02/reflector-telescope-primary-mirror-inside-view.jpg&amp;amp;raw&quot; srcset=&quot;https://www.telescopeguide.org/wp-content/uploads/2021/02/reflector-telescope-primary-mirror-inside-view.jpg 1200w, https://www.telescopeguide.org/wp-content/uploads/2021/02/reflector-telescope-primary-mirror-inside-view-300x200.jpg 300w, https://www.telescopeguide.org/wp-content/uploads/2021/02/reflector-telescope-primary-mirror-inside-view-1024x683.jpg 1024w, https://www.telescopeguide.org/wp-content/uploads/2021/02/reflector-telescope-primary-mirror-inside-view-768x512.jpg 768w&quot; width=&quot;1200&quot;&gt;&lt;span data-dcnode-id=&quot;757&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/picture&gt;&lt;span data-dcnode-id=&quot;755&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;br data-dcnode-id=&quot;754&quot;&gt;&lt;span data-dcnode-id=&quot;753&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;em data-dcnode-id=&quot;751&quot;&gt;&lt;span data-dcnode-id=&quot;752&quot; instrument_node=&quot;&quot;&gt;Image Credit: Richard Bartlett / TelescopeGuide.org&lt;/span&gt;&lt;/em&gt;&lt;/p&gt;&lt;h2 data-dcnode-id=&quot;747&quot;&gt;&lt;span data-dcnode-id=&quot;748&quot; id=&quot;7-Key-Differences-Choosing-Between-a-Reflecting-vs-Refracting-Telescope&quot;&gt;&lt;span data-dcnode-id=&quot;749&quot; instrument_node=&quot;&quot;&gt;7 Key Differences: Choosing Between a Reflecting vs. Refracting Telescope&lt;/span&gt;&lt;/span&gt;&lt;/h2&gt;&lt;h3 data-dcnode-id=&quot;744&quot;&gt;&lt;span data-dcnode-id=&quot;745&quot; id=&quot;Summary-Which-is-Better&quot;&gt;&lt;span data-dcnode-id=&quot;746&quot; instrument_node=&quot;&quot;&gt;Summary: Which is Better?&lt;/span&gt;&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;742&quot;&gt;&lt;span data-dcnode-id=&quot;743&quot; instrument_node=&quot;&quot;&gt;For a quick summary of the 7 key differences, take a look at the table below.&amp;nbsp; But keep in mind there are a lot nuances to consider.&amp;nbsp; Keep reading further for more discussion of each category.&lt;/span&gt;&lt;/p&gt;&lt;div class=&quot;tablepress-scroll-wrapper&quot; data-dcnode-id=&quot;675&quot; id=&quot;tablepress-Comparison1-scroll-wrapper&quot;&gt;&lt;table class=&quot;tablepress tablepress-id-Comparison1 tablepress-responsive&quot; data-dcnode-id=&quot;676&quot; id=&quot;tablepress-Comparison1&quot;&gt;&lt;thead data-dcnode-id=&quot;734&quot;&gt;&lt;tr class=&quot;row-1 odd&quot; data-dcnode-id=&quot;735&quot;&gt;&lt;th class=&quot;column-1&quot; data-dcnode-id=&quot;740&quot;&gt;&lt;span data-dcnode-id=&quot;741&quot; instrument_node=&quot;&quot;&gt;Category&lt;/span&gt;&lt;/th&gt;&lt;th class=&quot;column-2&quot; data-dcnode-id=&quot;738&quot;&gt;&lt;span data-dcnode-id=&quot;739&quot; instrument_node=&quot;&quot;&gt;Winner&lt;/span&gt;&lt;/th&gt;&lt;th class=&quot;column-3&quot; data-dcnode-id=&quot;736&quot;&gt;&lt;span data-dcnode-id=&quot;737&quot; instrument_node=&quot;&quot;&gt;Why?&lt;/span&gt;&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;&lt;tbody class=&quot;row-hover&quot; data-dcnode-id=&quot;677&quot;&gt;&lt;tr class=&quot;row-2 even&quot; data-dcnode-id=&quot;726&quot;&gt;&lt;td class=&quot;column-1&quot; data-dcnode-id=&quot;732&quot;&gt;&lt;span data-dcnode-id=&quot;733&quot; instrument_node=&quot;&quot;&gt;1. Price &amp;amp; affordability&lt;/span&gt;&lt;/td&gt;&lt;td class=&quot;column-2&quot; data-dcnode-id=&quot;729&quot;&gt;&lt;b data-dcnode-id=&quot;730&quot;&gt;&lt;span data-dcnode-id=&quot;731&quot; instrument_node=&quot;&quot;&gt;Reflectors&lt;/span&gt;&lt;/b&gt;&lt;/td&gt;&lt;td class=&quot;column-3&quot; data-dcnode-id=&quot;727&quot;&gt;&lt;span data-dcnode-id=&quot;728&quot; instrument_node=&quot;&quot;&gt;Mirrors are less expensive for larger aperture sizes. For smaller telescopes, refractors still offer good value.&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr class=&quot;row-3 odd&quot; data-dcnode-id=&quot;718&quot;&gt;&lt;td class=&quot;column-1&quot; data-dcnode-id=&quot;724&quot;&gt;&lt;span data-dcnode-id=&quot;725&quot; instrument_node=&quot;&quot;&gt;2. Maintenance &amp;amp; ease of use&lt;/span&gt;&lt;/td&gt;&lt;td class=&quot;column-2&quot; data-dcnode-id=&quot;721&quot;&gt;&lt;b data-dcnode-id=&quot;722&quot;&gt;&lt;span data-dcnode-id=&quot;723&quot; instrument_node=&quot;&quot;&gt;Refractors&lt;/span&gt;&lt;/b&gt;&lt;/td&gt;&lt;td class=&quot;column-3&quot; data-dcnode-id=&quot;719&quot;&gt;&lt;span data-dcnode-id=&quot;720&quot; instrument_node=&quot;&quot;&gt;Reflectors require more maintenance of their internal components.&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr class=&quot;row-4 even&quot; data-dcnode-id=&quot;710&quot;&gt;&lt;td class=&quot;column-1&quot; data-dcnode-id=&quot;716&quot;&gt;&lt;span data-dcnode-id=&quot;717&quot; instrument_node=&quot;&quot;&gt;3. Size &amp;amp; portability&lt;/span&gt;&lt;/td&gt;&lt;td class=&quot;column-2&quot; data-dcnode-id=&quot;713&quot;&gt;&lt;b data-dcnode-id=&quot;714&quot;&gt;&lt;span data-dcnode-id=&quot;715&quot; instrument_node=&quot;&quot;&gt;Reflectors&lt;/span&gt;&lt;/b&gt;&lt;/td&gt;&lt;td class=&quot;column-3&quot; data-dcnode-id=&quot;711&quot;&gt;&lt;span data-dcnode-id=&quot;712&quot; instrument_node=&quot;&quot;&gt;Large reflectors are more compact than refractors of similar aperture size.&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr class=&quot;row-5 odd&quot; data-dcnode-id=&quot;702&quot;&gt;&lt;td class=&quot;column-1&quot; data-dcnode-id=&quot;708&quot;&gt;&lt;span data-dcnode-id=&quot;709&quot; instrument_node=&quot;&quot;&gt;4. Optical performance &amp;amp; clarity&lt;/span&gt;&lt;/td&gt;&lt;td class=&quot;column-2&quot; data-dcnode-id=&quot;705&quot;&gt;&lt;b data-dcnode-id=&quot;706&quot;&gt;&lt;span data-dcnode-id=&quot;707&quot; instrument_node=&quot;&quot;&gt;Either, if high-quality&lt;/span&gt;&lt;/b&gt;&lt;/td&gt;&lt;td class=&quot;column-3&quot; data-dcnode-id=&quot;703&quot;&gt;&lt;span data-dcnode-id=&quot;704&quot; instrument_node=&quot;&quot;&gt;You can get stunning images with either a high-quality achromatic/apochromatic refracting lens, or a reflector with one or more true parabolic mirrors and high-quality manufacturing.&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr class=&quot;row-6 even&quot; data-dcnode-id=&quot;694&quot;&gt;&lt;td class=&quot;column-1&quot; data-dcnode-id=&quot;700&quot;&gt;&lt;span data-dcnode-id=&quot;701&quot; instrument_node=&quot;&quot;&gt;5. Deep-sky visual astronomy&lt;/span&gt;&lt;/td&gt;&lt;td class=&quot;column-2&quot; data-dcnode-id=&quot;697&quot;&gt;&lt;b data-dcnode-id=&quot;698&quot;&gt;&lt;span data-dcnode-id=&quot;699&quot; instrument_node=&quot;&quot;&gt;Reflectors&lt;/span&gt;&lt;/b&gt;&lt;/td&gt;&lt;td class=&quot;column-3&quot; data-dcnode-id=&quot;695&quot;&gt;&lt;span data-dcnode-id=&quot;696&quot; instrument_node=&quot;&quot;&gt;Large reflectors make it possible for the average astronomer to view distant galaxies, nebulae, and star clusters.&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr class=&quot;row-7 odd&quot; data-dcnode-id=&quot;686&quot;&gt;&lt;td class=&quot;column-1&quot; data-dcnode-id=&quot;692&quot;&gt;&lt;span data-dcnode-id=&quot;693&quot; instrument_node=&quot;&quot;&gt;6. Astro-photography&lt;/span&gt;&lt;/td&gt;&lt;td class=&quot;column-2&quot; data-dcnode-id=&quot;689&quot;&gt;&lt;b data-dcnode-id=&quot;690&quot;&gt;&lt;span data-dcnode-id=&quot;691&quot; instrument_node=&quot;&quot;&gt;High-quality refractors&lt;/span&gt;&lt;/b&gt;&lt;/td&gt;&lt;td class=&quot;column-3&quot; data-dcnode-id=&quot;687&quot;&gt;&lt;span data-dcnode-id=&quot;688&quot; instrument_node=&quot;&quot;&gt;You don't need a large telescope for astrophotography. We recommend a triplet APO refractor with a fast focal ratio.&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr class=&quot;row-8 even&quot; data-dcnode-id=&quot;678&quot;&gt;&lt;td class=&quot;column-1&quot; data-dcnode-id=&quot;684&quot;&gt;&lt;span data-dcnode-id=&quot;685&quot; instrument_node=&quot;&quot;&gt;7. Traveling&lt;/span&gt;&lt;/td&gt;&lt;td class=&quot;column-2&quot; data-dcnode-id=&quot;681&quot;&gt;&lt;b data-dcnode-id=&quot;682&quot;&gt;&lt;span data-dcnode-id=&quot;683&quot; instrument_node=&quot;&quot;&gt;Refractors&lt;/span&gt;&lt;/b&gt;&lt;/td&gt;&lt;td class=&quot;column-3&quot; data-dcnode-id=&quot;679&quot;&gt;&lt;span data-dcnode-id=&quot;680&quot; instrument_node=&quot;&quot;&gt;Can't beat a 70-100mm traveling refractor.&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;/tbody&gt;&lt;/table&gt;&lt;/div&gt;&lt;h3 data-dcnode-id=&quot;669&quot;&gt;&lt;span data-dcnode-id=&quot;670&quot; id=&quot;1-Price-Affordability-Winner-Reflectors8230-For-Larger-Sizes&quot;&gt;&lt;span data-dcnode-id=&quot;674&quot; instrument_node=&quot;&quot;&gt;1. Price &amp;amp; Affordability (Winner: &lt;/span&gt;&lt;em data-dcnode-id=&quot;672&quot;&gt;&lt;span data-dcnode-id=&quot;673&quot; instrument_node=&quot;&quot;&gt;Reflectors&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;671&quot; instrument_node=&quot;&quot;&gt;… For Larger Sizes)&lt;/span&gt;&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;667&quot;&gt;&lt;span data-dcnode-id=&quot;668&quot; instrument_node=&quot;&quot;&gt;The #1 advantage of reflecting telescopes is their affordability.&amp;nbsp; This is because large mirrors are cheaper to manufacture than high-quality glass for large refracting lenses.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;662&quot;&gt;&lt;span data-dcnode-id=&quot;666&quot; instrument_node=&quot;&quot;&gt;This is especially true as you get towards very large apertures and you are aiming for the highest quality optical performance.&amp;nbsp; A very large “triplet” apochromatic refractor is &lt;/span&gt;&lt;em data-dcnode-id=&quot;664&quot;&gt;&lt;span data-dcnode-id=&quot;665&quot; instrument_node=&quot;&quot;&gt;exponentially&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;663&quot; instrument_node=&quot;&quot;&gt; more expensive than a same-size reflecting telescope.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;658&quot;&gt;&lt;em data-dcnode-id=&quot;660&quot;&gt;&lt;span data-dcnode-id=&quot;661&quot; instrument_node=&quot;&quot;&gt;However, this general rule only applies to larger aperture telescopes.&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;659&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp; It’s not 100% true for much smaller telescopes.&amp;nbsp; Sometimes, for very small telescopes (for example, below 100mm), refractors can offer the superior value.&amp;nbsp; For smaller sizes, reflecting telescopes can be more expensive to manufacture due to their being more complex, with more sensitive internal components, compared to their refracting counterparts.&amp;nbsp; Once you consider maintenance and other factors, this can easily tip the scales towards refractors in terms of overall value.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;650&quot;&gt;&lt;span data-dcnode-id=&quot;657&quot; instrument_node=&quot;&quot;&gt;At TelescopeGuide.org, we generally recommend you get the largest aperture size (a) that you can afford, and (b) that fits your needs in terms of portability and usability.&amp;nbsp; For this reason – we often recommend people consider starting their astronomy journey with a &lt;/span&gt;&lt;a data-dcnode-id=&quot;655&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.telescopeguide.org/best-dobsonian-telescope/&quot;&gt;&lt;span data-dcnode-id=&quot;656&quot; instrument_node=&quot;&quot;&gt;decent-sized Dobsonian telescope&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;654&quot; instrument_node=&quot;&quot;&gt;, or a tabletop reflector telescope.&amp;nbsp; (Both are great choices for a &lt;/span&gt;&lt;a data-dcnode-id=&quot;652&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.telescopeguide.org/best-telescope-for-beginners/&quot;&gt;&lt;span data-dcnode-id=&quot;653&quot; instrument_node=&quot;&quot;&gt;first telescope&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;651&quot; instrument_node=&quot;&quot;&gt;.)&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;647&quot;&gt;&lt;em data-dcnode-id=&quot;648&quot;&gt;&lt;span data-dcnode-id=&quot;649&quot; instrument_node=&quot;&quot;&gt;Bottom line: If you’re on a budget and looking for a good aperture size, reflectors usually offer more “bang for the buck”.&amp;nbsp; However, if you’re on a budget and looking for a smaller telescope, you should still consider refractors a good value.&lt;/span&gt;&lt;/em&gt;&lt;/p&gt;&lt;h3 data-dcnode-id=&quot;641&quot;&gt;&lt;span data-dcnode-id=&quot;642&quot; id=&quot;2-Maintenance-Ease-of-Use-Winner-Refractors&quot;&gt;&lt;span data-dcnode-id=&quot;646&quot; instrument_node=&quot;&quot;&gt;2. Maintenance &amp;amp; Ease of Use (Winner: &lt;/span&gt;&lt;em data-dcnode-id=&quot;644&quot;&gt;&lt;span data-dcnode-id=&quot;645&quot; instrument_node=&quot;&quot;&gt;Refractors&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;643&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;639&quot;&gt;&lt;span data-dcnode-id=&quot;640&quot; instrument_node=&quot;&quot;&gt;One clear benefit of refracting telescopes is that they rarely (if ever) require maintenance.&amp;nbsp; The lens attaches securely to the optical tube, and it rarely moves enough to require adjustment.&amp;nbsp; Additionally, there are no complex internal components that can come out of alignment.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;634&quot;&gt;&lt;span data-dcnode-id=&quot;638&quot; instrument_node=&quot;&quot;&gt;Thanks to the simplicity of their design, refracting telescopes are drop-dead easy to use and maintain.&amp;nbsp; If your priority is ease and convenience, and you are looking to be able to pull out your telescope anytime and use it in minutes, a &lt;/span&gt;&lt;a data-dcnode-id=&quot;636&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.telescopeguide.org/best-refractor-telescope-reviews/&quot;&gt;&lt;span data-dcnode-id=&quot;637&quot; instrument_node=&quot;&quot;&gt;refractor telescope offers clear advantages&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;635&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;630&quot;&gt;&lt;span data-dcnode-id=&quot;633&quot; instrument_node=&quot;&quot;&gt;This is not quite the case with reflectors.&amp;nbsp; Reflectors are a little more complicated.&amp;nbsp; Whether it’s a simple Newtonian reflector, or a more complex catadioptric or compound telescope, it will sometimes require a procedure known as &lt;/span&gt;&lt;em data-dcnode-id=&quot;631&quot;&gt;&lt;span data-dcnode-id=&quot;632&quot; instrument_node=&quot;&quot;&gt;collimation.&amp;nbsp; &lt;/span&gt;&lt;/em&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;625&quot;&gt;&lt;span data-dcnode-id=&quot;629&quot; instrument_node=&quot;&quot;&gt;When you &lt;/span&gt;&lt;em data-dcnode-id=&quot;627&quot;&gt;&lt;span data-dcnode-id=&quot;628&quot; instrument_node=&quot;&quot;&gt;collimate&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;626&quot; instrument_node=&quot;&quot;&gt; a telescope, you need to make fine adjustments to the alignment of the optical elements.&amp;nbsp; Collimation can take time and effort away from viewing.&amp;nbsp; (At least until you get good at it.&amp;nbsp; Experienced astronomers can collimate a telescope in minutes.)&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;623&quot;&gt;&lt;span data-dcnode-id=&quot;624&quot; instrument_node=&quot;&quot;&gt;For beginners especially, refractors are a great choice because they are always ready to go.&amp;nbsp; But even for advanced users, a refractor offers simplicity and convenience that may be compelling.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;620&quot;&gt;&lt;em data-dcnode-id=&quot;621&quot;&gt;&lt;span data-dcnode-id=&quot;622&quot; instrument_node=&quot;&quot;&gt;Bottom line: Refractors are drop-dead simple to use – which makes them perfect for true beginners.&amp;nbsp; Reflectors will usually require a bit more maintenance.&lt;/span&gt;&lt;/em&gt;&lt;/p&gt;&lt;h3 data-dcnode-id=&quot;614&quot;&gt;&lt;span data-dcnode-id=&quot;615&quot; id=&quot;3-Size-Portability-Winner-Reflectors8230-Usually&quot;&gt;&lt;span data-dcnode-id=&quot;619&quot; instrument_node=&quot;&quot;&gt;3. Size &amp;amp; Portability (Winner: &lt;/span&gt;&lt;em data-dcnode-id=&quot;617&quot;&gt;&lt;span data-dcnode-id=&quot;618&quot; instrument_node=&quot;&quot;&gt;Reflectors&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;616&quot; instrument_node=&quot;&quot;&gt;… Usually)&lt;/span&gt;&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;612&quot;&gt;&lt;span data-dcnode-id=&quot;613&quot; instrument_node=&quot;&quot;&gt;So, take a good look at the diagrams above in the article.&amp;nbsp; Did you notice anything about the focal distance of the refractor vs. the reflector?&lt;/span&gt;&lt;/p&gt;&lt;h4 data-dcnode-id=&quot;610&quot;&gt;&lt;span data-dcnode-id=&quot;611&quot; instrument_node=&quot;&quot;&gt;Size of the Optical Tube&lt;/span&gt;&lt;/h4&gt;&lt;p data-dcnode-id=&quot;605&quot;&gt;&lt;span data-dcnode-id=&quot;609&quot; instrument_node=&quot;&quot;&gt;For refracting telescopes, the overall length of the telescope’s optical tube is &lt;/span&gt;&lt;em data-dcnode-id=&quot;607&quot;&gt;&lt;span data-dcnode-id=&quot;608&quot; instrument_node=&quot;&quot;&gt;a bit longer than the focal distance&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;606&quot; instrument_node=&quot;&quot;&gt;.&amp;nbsp; (It’s not quite exactly the same, because the focal point is actually a little ahead of the eyepiece.)&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;597&quot;&gt;&lt;span data-dcnode-id=&quot;604&quot; instrument_node=&quot;&quot;&gt;For reflecting telescopes, &lt;/span&gt;&lt;em data-dcnode-id=&quot;602&quot;&gt;&lt;span data-dcnode-id=&quot;603&quot; instrument_node=&quot;&quot;&gt;the optical tube is much smaller and more compact&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;601&quot; instrument_node=&quot;&quot;&gt;.&amp;nbsp; This is because the focal point is located beyond the secondary mirror – which makes it possible for the telescope length to be &lt;/span&gt;&lt;em data-dcnode-id=&quot;599&quot;&gt;&lt;span data-dcnode-id=&quot;600&quot; instrument_node=&quot;&quot;&gt;about 1/2 the focal distance or even smaller.&amp;nbsp; &lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;598&quot; instrument_node=&quot;&quot;&gt;(For a classic Newtonian reflector, it’s about 1/2.&amp;nbsp; For a compound telescope, it can be even smaller because the light is redirected multiple times.)&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;595&quot;&gt;&lt;span data-dcnode-id=&quot;596&quot; instrument_node=&quot;&quot;&gt;With that said … this size difference really only matters once you start looking at larger telescopes.&amp;nbsp; At the beginner stage, the size for lower-end refractors is really not a big deal.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;593&quot;&gt;&lt;span data-dcnode-id=&quot;594&quot; instrument_node=&quot;&quot;&gt;However, as you get into more powerful refractors with larger lenses and longer focal lengths, these telescopes can get really big and heavy, making them more difficult to transport, balance, and maneuver.&amp;nbsp; And, since the eyepiece is always at the far end of the main telescope tube, larger refractors can make for awkward positioning of the eyepiece.&lt;/span&gt;&lt;/p&gt;&lt;h4 data-dcnode-id=&quot;591&quot;&gt;&lt;span data-dcnode-id=&quot;592&quot; instrument_node=&quot;&quot;&gt;Weight&lt;/span&gt;&lt;/h4&gt;&lt;p data-dcnode-id=&quot;583&quot;&gt;&lt;span data-dcnode-id=&quot;590&quot; instrument_node=&quot;&quot;&gt;Another major consideration is the &lt;/span&gt;&lt;em data-dcnode-id=&quot;588&quot;&gt;&lt;span data-dcnode-id=&quot;589&quot; instrument_node=&quot;&quot;&gt;weight&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;587&quot; instrument_node=&quot;&quot;&gt; of the telescope.&amp;nbsp; And again, reflectors will start to outperform refractors as you start getting into the larger aperture sizes.&amp;nbsp; Manufacturing a high-quality glass lens in an ultra-large size requires some &lt;/span&gt;&lt;em data-dcnode-id=&quot;585&quot;&gt;&lt;span data-dcnode-id=&quot;586&quot; instrument_node=&quot;&quot;&gt;serious&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;584&quot; instrument_node=&quot;&quot;&gt; glass to compose the elements of the lens.&amp;nbsp; And the heavier the telescope, the more you’ll need to spend buying a mount that can adequately support it.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;580&quot;&gt;&lt;em data-dcnode-id=&quot;581&quot;&gt;&lt;span data-dcnode-id=&quot;582&quot; instrument_node=&quot;&quot;&gt;Bottom line: If you’re looking for a compact, portable telescope with a large aperture, you should definitely consider getting a reflector.&amp;nbsp; For smaller telescopes, you could really go either way.&lt;/span&gt;&lt;/em&gt;&lt;/p&gt;&lt;h3 data-dcnode-id=&quot;571&quot;&gt;&lt;span data-dcnode-id=&quot;572&quot; id=&quot;4-Optical-Performance-Clarity-Winner-High-Quality-Refractors-or-Reflectors&quot;&gt;&lt;span data-dcnode-id=&quot;579&quot; instrument_node=&quot;&quot;&gt;4. Optical Performance &amp;amp; Clarity (Winner: &lt;/span&gt;&lt;em data-dcnode-id=&quot;574&quot;&gt;&lt;span data-dcnode-id=&quot;578&quot; instrument_node=&quot;&quot;&gt;High-Quality Refractors &lt;/span&gt;&lt;strong data-dcnode-id=&quot;576&quot;&gt;&lt;span data-dcnode-id=&quot;577&quot; instrument_node=&quot;&quot;&gt;or&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;575&quot; instrument_node=&quot;&quot;&gt; Reflectors&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;573&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;566&quot;&gt;&lt;span data-dcnode-id=&quot;570&quot; instrument_node=&quot;&quot;&gt;In visual astronomy, there is nothing quite like getting a clear, crisp, high-contrast view that’s free of any kinds of aberration or distortion.&amp;nbsp; Both refractors and reflectors can offer stunning views, &lt;/span&gt;&lt;em data-dcnode-id=&quot;568&quot;&gt;&lt;span data-dcnode-id=&quot;569&quot; instrument_node=&quot;&quot;&gt;as long as they are manufactured with high-quality components&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;567&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;564&quot;&gt;&lt;span data-dcnode-id=&quot;565&quot; instrument_node=&quot;&quot;&gt;Disclaimer: Optical performance is a very complicated topic.&amp;nbsp; In this section we’re going to keep it somewhat simple and focus on the basics.&lt;/span&gt;&lt;/p&gt;&lt;h4 data-dcnode-id=&quot;560&quot;&gt;&lt;span data-dcnode-id=&quot;563&quot; instrument_node=&quot;&quot;&gt;Low-quality refractors suffer more from &lt;/span&gt;&lt;em data-dcnode-id=&quot;561&quot;&gt;&lt;span data-dcnode-id=&quot;562&quot; instrument_node=&quot;&quot;&gt;chromatic aberration&lt;/span&gt;&lt;/em&gt;&lt;/h4&gt;&lt;p data-dcnode-id=&quot;555&quot;&gt;&lt;span data-dcnode-id=&quot;559&quot; instrument_node=&quot;&quot;&gt;Inexpensive refractor telescopes often use a simple refracting lens, made of a single piece of glass.&amp;nbsp; The challenge with this is that it introduces a blurring of certain color wavelengths in the image, called &lt;/span&gt;&lt;em data-dcnode-id=&quot;557&quot;&gt;&lt;span data-dcnode-id=&quot;558&quot; instrument_node=&quot;&quot;&gt;chromatic aberration&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;556&quot; instrument_node=&quot;&quot;&gt;.&amp;nbsp; (Why?&amp;nbsp; Different wavelengths of light require slightly different focal lengths after refraction.)&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;553&quot;&gt;&lt;span data-dcnode-id=&quot;554&quot; instrument_node=&quot;&quot;&gt;For smaller refractors, this is not really a big deal.&amp;nbsp; However, it starts to become more important as you go beyond lower-powered refractors.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;551&quot;&gt;&lt;span data-dcnode-id=&quot;552&quot; instrument_node=&quot;&quot;&gt;Chromatic aberration can be mitigated or reduced using a high-quality achromatic objective lens (sometimes in combination with a fringe filter) or – even better – with an apochromatic lens (a.k.a. APO lens) consisting of two matched glass elements (a “doublet”) or three elements (a “triplet”).&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;549&quot;&gt;&lt;span data-dcnode-id=&quot;550&quot; instrument_node=&quot;&quot;&gt;These higher-quality refractors provide ultra-sharp image quality – making them a great choice for detailed viewing of solar system objects.&amp;nbsp; High-quality refracting telescopes also make for stunning astrophotography.&lt;/span&gt;&lt;/p&gt;&lt;h4 data-dcnode-id=&quot;545&quot;&gt;&lt;span data-dcnode-id=&quot;548&quot; instrument_node=&quot;&quot;&gt;Low-quality reflectors suffer more from &lt;/span&gt;&lt;em data-dcnode-id=&quot;546&quot;&gt;&lt;span data-dcnode-id=&quot;547&quot; instrument_node=&quot;&quot;&gt;spherical aberration&lt;/span&gt;&lt;/em&gt;&lt;/h4&gt;&lt;p data-dcnode-id=&quot;543&quot;&gt;&lt;span data-dcnode-id=&quot;544&quot; instrument_node=&quot;&quot;&gt;Because reflecting telescopes reflect light instead of refracting it, they don’t need to worry about chromatic aberration like refractors do.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;538&quot;&gt;&lt;span data-dcnode-id=&quot;542&quot; instrument_node=&quot;&quot;&gt;However, reflectors can still suffer from a phenomenon known as &lt;/span&gt;&lt;em data-dcnode-id=&quot;540&quot;&gt;&lt;span data-dcnode-id=&quot;541&quot; instrument_node=&quot;&quot;&gt;spherical aberration&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;539&quot; instrument_node=&quot;&quot;&gt;, where distortion is caused by differences in the focus of light across the surface of the mirrors.&amp;nbsp; (Note: Refractors can suffer from this too, but the higher quality lenses do a good job correcting for it.)&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;533&quot;&gt;&lt;span data-dcnode-id=&quot;537&quot; instrument_node=&quot;&quot;&gt;The cheapest kind of mirror to manufacture is spherical in shape.&amp;nbsp; However, spherical mirrors result in higher spherical aberration.&amp;nbsp; High-quality reflectors employ one or more &lt;/span&gt;&lt;em data-dcnode-id=&quot;535&quot;&gt;&lt;span data-dcnode-id=&quot;536&quot; instrument_node=&quot;&quot;&gt;parabolic&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;534&quot; instrument_node=&quot;&quot;&gt; mirrors.&amp;nbsp; And, a “true” parabolic mirror requires extremely high-precision manufacturing, making it more expensive.&amp;nbsp; (And note: There are many differences between the miscellaneous sub-types of reflectors.&amp;nbsp; Not enough time to go into it here.)&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;530&quot;&gt;&lt;em data-dcnode-id=&quot;531&quot;&gt;&lt;span data-dcnode-id=&quot;532&quot; instrument_node=&quot;&quot;&gt;Bottom line: If you’re looking for the sharpest possible images, be prepared to buy a higher quality telescope, regardless of whether it’s refracting or reflecting.&amp;nbsp; For refractors, consider getting an achromatic or apochromatic lens.&amp;nbsp; For reflectors, look for true parabolic mirrors and high-quality engineering.&lt;/span&gt;&lt;/em&gt;&lt;/p&gt;&lt;h3 data-dcnode-id=&quot;524&quot;&gt;&lt;span data-dcnode-id=&quot;525&quot; id=&quot;5-Seeing-Deep-Sky-Galaxies-Star-Clusters-and-Nebulae-Winner-Large-Reflectors&quot;&gt;&lt;span data-dcnode-id=&quot;529&quot; instrument_node=&quot;&quot;&gt;5. Seeing Deep-Sky Galaxies, Star Clusters, and Nebulae (Winner: &lt;/span&gt;&lt;em data-dcnode-id=&quot;527&quot;&gt;&lt;span data-dcnode-id=&quot;528&quot; instrument_node=&quot;&quot;&gt;Large Reflectors&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;526&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;519&quot;&gt;&lt;span data-dcnode-id=&quot;523&quot; instrument_node=&quot;&quot;&gt;For visual astronomy, we generally recommend you get the &lt;/span&gt;&lt;em data-dcnode-id=&quot;521&quot;&gt;&lt;span data-dcnode-id=&quot;522&quot; instrument_node=&quot;&quot;&gt;largest aperture you can afford&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;520&quot; instrument_node=&quot;&quot;&gt;.&amp;nbsp; (As long as the telescope is a good fit for your needs in other ways – especially in terms of size, weight, portability, and ease of use.)&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;517&quot;&gt;&lt;span data-dcnode-id=&quot;518&quot; instrument_node=&quot;&quot;&gt;If you want to extend the “reach” of your telescope into deep space, then the size of the aperture is the most important factor.&amp;nbsp; Remember: The amount of light a telescope can collect is related to the square of the aperture size.&amp;nbsp; So, for example, a 10″ telescope, which is only 2″ wider than a 8″ telescope, can collect 56% more light!&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;515&quot;&gt;&lt;span data-dcnode-id=&quot;516&quot; instrument_node=&quot;&quot;&gt;For refractors, as the diameter of the aperture increases, the cost and bulk of the lens increases exponentially faster.&amp;nbsp; For this reason, most amateur astronomers prefer reflector telescopes for deep-sky visual astronomy.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;510&quot;&gt;&lt;span data-dcnode-id=&quot;514&quot; instrument_node=&quot;&quot;&gt;In fact, when it comes to large aperture sizes, reflectors are pretty much the only game in town for the average amateur.&amp;nbsp; You will have a hard time finding an affordable high-quality refractor with a 10″ aperture.&amp;nbsp; But, if you’re looking for a 10″ reflector, you’ll find plenty of great options, like the &lt;/span&gt;&lt;a data-dcnode-id=&quot;512&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.telescopeguide.org/orion-8946-skyquest-xt10-classic-dobsonian-telescope-review/&quot;&gt;&lt;span data-dcnode-id=&quot;513&quot; instrument_node=&quot;&quot;&gt;Orion SkyQuest XT10&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;511&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;508&quot;&gt;&lt;span data-dcnode-id=&quot;509&quot; instrument_node=&quot;&quot;&gt;A larger aperture means more light collection ability, which means you’ll be able to see fainter, more distant objects in the sky – including galaxies, nebulae, and globular clusters.&amp;nbsp; And, when you’re viewing things within our own solar system, like the rings and moons of Saturn, you’ll be able to see stunning details that are impossible with smaller sizes.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;503&quot;&gt;&lt;span data-dcnode-id=&quot;507&quot; instrument_node=&quot;&quot;&gt;(But, one word of caution: Don’t go overboard.&amp;nbsp; You &lt;/span&gt;&lt;em data-dcnode-id=&quot;505&quot;&gt;&lt;span data-dcnode-id=&quot;506&quot; instrument_node=&quot;&quot;&gt;don’t&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;504&quot; instrument_node=&quot;&quot;&gt; want to get something so big that it ends up collecting dust in your attic.&amp;nbsp; Make sure you know the telescope size that you can best handle.)&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;500&quot;&gt;&lt;em data-dcnode-id=&quot;501&quot;&gt;&lt;span data-dcnode-id=&quot;502&quot; instrument_node=&quot;&quot;&gt;Bottom line: For deep-sky visual astronomy, there is no substitute for a large-aperture reflector telescope.&lt;/span&gt;&lt;/em&gt;&lt;/p&gt;&lt;h3 data-dcnode-id=&quot;494&quot;&gt;&lt;span data-dcnode-id=&quot;495&quot; id=&quot;6-Astro-Imaging-Capability-Winner-High-Quality-Refractors&quot;&gt;&lt;span data-dcnode-id=&quot;499&quot; instrument_node=&quot;&quot;&gt;6. Astro-Imaging Capability (Winner: &lt;/span&gt;&lt;em data-dcnode-id=&quot;497&quot;&gt;&lt;span data-dcnode-id=&quot;498&quot; instrument_node=&quot;&quot;&gt;High-Quality Refractors&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;496&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;492&quot;&gt;&lt;span data-dcnode-id=&quot;493&quot; instrument_node=&quot;&quot;&gt;Most amateur astrophotographers prefer the simplicity of a high-quality apochromatic (APO) refractor telescope.&amp;nbsp; (There are also some great reflector options for astrophotography, but refractors have some key advantages.)&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;490&quot;&gt;&lt;span data-dcnode-id=&quot;491&quot; instrument_node=&quot;&quot;&gt;Why?&amp;nbsp; Well, a few reasons:&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;488&quot;&gt;&lt;span data-dcnode-id=&quot;489&quot; instrument_node=&quot;&quot;&gt;First, you don’t need a large aperture for astrophotography.&amp;nbsp; That might be surprising, but it’s true.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;483&quot;&gt;&lt;span data-dcnode-id=&quot;487&quot; instrument_node=&quot;&quot;&gt;For visual astronomy, you &lt;/span&gt;&lt;em data-dcnode-id=&quot;485&quot;&gt;&lt;span data-dcnode-id=&quot;486&quot; instrument_node=&quot;&quot;&gt;do&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;484&quot; instrument_node=&quot;&quot;&gt; need a large aperture, because you need to get as much light as possible into the telescope (all at once) so you can see the target with your eyes.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;478&quot;&gt;&lt;span data-dcnode-id=&quot;482&quot; instrument_node=&quot;&quot;&gt;However, with astrophotography, what you really care about is the &lt;/span&gt;&lt;em data-dcnode-id=&quot;480&quot;&gt;&lt;span data-dcnode-id=&quot;481&quot; instrument_node=&quot;&quot;&gt;amount of light per pixel&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;479&quot; instrument_node=&quot;&quot;&gt; – so the speed of the telescope becomes more important.&amp;nbsp; A “fast” telescope has a low focal ratio (ideally f/6 or lower for astrophotography).&amp;nbsp; (And remember, you get the focal ratio by dividing the focal distance by the aperture size.)&amp;nbsp; So, for astrophotography, a fast 80mm APO refractor can outperform a larger but slower telescope.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;476&quot;&gt;&lt;span data-dcnode-id=&quot;477&quot; instrument_node=&quot;&quot;&gt;Second, with astrophotography, smaller telescopes are often preferable because they are lighter.&amp;nbsp; And lighter telescopes require less costly mounting systems.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;471&quot;&gt;&lt;span data-dcnode-id=&quot;475&quot; instrument_node=&quot;&quot;&gt;Astrophotography mounting systems can get expensive… in a hurry.&amp;nbsp; In fact, for astrophotography, &lt;/span&gt;&lt;a data-dcnode-id=&quot;473&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.telescopeguide.org/best-telescope-mount-for-astrophotography/&quot;&gt;&lt;span data-dcnode-id=&quot;474&quot; instrument_node=&quot;&quot;&gt;the mount is arguably just as important&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;472&quot; instrument_node=&quot;&quot;&gt; as the telescope.&amp;nbsp; Astrophotographers need to be able to take multiple long-exposure shots while keeping the telescope perfectly trained on their target.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;469&quot;&gt;&lt;span data-dcnode-id=&quot;470&quot; instrument_node=&quot;&quot;&gt;Smaller telescopes are much lighter and therefore can follow a moving object more cleanly than its bigger brothers and sisters. A comet moving across the night sky can be followed automatically if you have the right settings.&amp;nbsp; With a lighter telescope, you can use a less expensive mount and still get smooth control over the movement.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;466&quot;&gt;&lt;em data-dcnode-id=&quot;467&quot;&gt;&lt;span data-dcnode-id=&quot;468&quot; instrument_node=&quot;&quot;&gt;Bottom line: Apochromatic (APO) refractors are fantastic for astrophotography.&amp;nbsp; You don’t need it to be large; instead, you want something lightweight with high optical quality and a fast focal ratio.&lt;/span&gt;&lt;/em&gt;&lt;/p&gt;&lt;h3 data-dcnode-id=&quot;460&quot;&gt;&lt;span data-dcnode-id=&quot;461&quot; id=&quot;7-Traveling-with-Your-Telescope-Winner-Refractors&quot;&gt;&lt;span data-dcnode-id=&quot;465&quot; instrument_node=&quot;&quot;&gt;7. Traveling with Your Telescope (Winner: &lt;/span&gt;&lt;em data-dcnode-id=&quot;463&quot;&gt;&lt;span data-dcnode-id=&quot;464&quot; instrument_node=&quot;&quot;&gt;Refractors&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;462&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;458&quot;&gt;&lt;span data-dcnode-id=&quot;459&quot; instrument_node=&quot;&quot;&gt;Last but not least, if you are looking for a small telescope to take with you “on the go”, a reflector is usually not worth the hassle.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;450&quot;&gt;&lt;span data-dcnode-id=&quot;457&quot; instrument_node=&quot;&quot;&gt;There are plenty of fantastic small refractors available, designed with special lightweight tubes for traveling.&amp;nbsp; (Both Celestron and Orion make excellent entry-level traveling refractors.&amp;nbsp; You’ll find them in a variety of sizes and configurations, with some basic models &lt;/span&gt;&lt;a data-dcnode-id=&quot;455&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.telescopeguide.org/best-telescope-under-100/&quot;&gt;&lt;span data-dcnode-id=&quot;456&quot; instrument_node=&quot;&quot;&gt;below $100&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;454&quot; instrument_node=&quot;&quot;&gt; and &lt;/span&gt;&lt;a data-dcnode-id=&quot;452&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.telescopeguide.org/best-cheap-telescopes-under-200/&quot;&gt;&lt;span data-dcnode-id=&quot;453&quot; instrument_node=&quot;&quot;&gt;below $200&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;451&quot; instrument_node=&quot;&quot;&gt;.)&amp;nbsp; These telescopes are versatile, drop-dead easy to use, require zero maintenance, and can fit in a backpack.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;447&quot;&gt;&lt;em data-dcnode-id=&quot;448&quot;&gt;&lt;span data-dcnode-id=&quot;449&quot; instrument_node=&quot;&quot;&gt;Bottom line: If you’re looking for a traveling telescope, it’s hard to beat a good 70-100mm traveling refractor.&lt;/span&gt;&lt;/em&gt;&lt;/p&gt;&lt;h2 data-dcnode-id=&quot;444&quot;&gt;&lt;span data-dcnode-id=&quot;445&quot; id=&quot;Final-Thoughts-Reflecting-vs-Refracting-Telescopes&quot;&gt;&lt;span data-dcnode-id=&quot;446&quot; instrument_node=&quot;&quot;&gt;Final Thoughts | Reflecting vs. Refracting Telescopes&lt;/span&gt;&lt;/span&gt;&lt;/h2&gt;&lt;p data-dcnode-id=&quot;442&quot;&gt;&lt;span data-dcnode-id=&quot;443&quot; instrument_node=&quot;&quot;&gt;So, now that you’ve read this far, which is better, really?&amp;nbsp; People have debated this question since … well, pretty much the invention of the telescope.&amp;nbsp; (But not quite, since refractors were invented about 50 years before reflectors.)&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;440&quot;&gt;&lt;span data-dcnode-id=&quot;441&quot; instrument_node=&quot;&quot;&gt;Hopefully this article has helped you see there are clear pros and cons for both types of telescopes.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;435&quot;&gt;&lt;span data-dcnode-id=&quot;439&quot; instrument_node=&quot;&quot;&gt;Bottom line: &lt;/span&gt;&lt;em data-dcnode-id=&quot;437&quot;&gt;&lt;span data-dcnode-id=&quot;438&quot; instrument_node=&quot;&quot;&gt;There is no single best telescope type&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;436&quot; instrument_node=&quot;&quot;&gt;.&amp;nbsp; It’s a personal choice, and it really depends on a number factors, your budget, and how you plan to use your telescope.&amp;nbsp; Each has its place in astronomy.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;433&quot;&gt;&lt;span data-dcnode-id=&quot;434&quot; instrument_node=&quot;&quot;&gt;Whichever way you end up going, we hope this article helped you make a more informed decision.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;430&quot;&gt;&lt;em data-dcnode-id=&quot;431&quot;&gt;&lt;span data-dcnode-id=&quot;432&quot; instrument_node=&quot;&quot;&gt;(Also, if you liked this article, please share it using the social media buttons below!)&lt;/span&gt;&lt;/em&gt;&lt;/p&gt;&lt;div class=&quot;addtoany_share_save_container addtoany_content addtoany_content_bottom&quot; data-dcnode-id=&quot;390&quot;&gt;&lt;div class=&quot;a2a_kit a2a_kit_size_32 addtoany_list&quot; data-a2a-title=&quot;Reflecting vs. Refracting Telescopes: 7 Key Differences&quot; data-a2a-url=&quot;https://www.telescopeguide.org/reflecting-vs-refracting-telescopes-key-differences/&quot; data-dcnode-id=&quot;391&quot; style=&quot;line-height: 32px;&quot;&gt;&lt;a class=&quot;a2a_button_facebook&quot; data-dcnode-id=&quot;424&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.telescopeguide.org/%23facebook&quot; rel=&quot;nofollow noopener&quot; target=&quot;_blank&quot; title=&quot;Facebook&quot;&gt;&lt;span class=&quot;a2a_svg a2a_s__default a2a_s_facebook&quot; data-dcnode-id=&quot;427&quot; style=&quot;background-color: rgb(24, 119, 242);&quot;&gt;&lt;svg aria-hidden=&quot;true&quot; data-dcnode-id=&quot;428&quot; focusable=&quot;false&quot; viewBox=&quot;0 0 32 32&quot; xmlns=&quot;http://www.w3.org/2000/svg&quot;&gt;&lt;path d=&quot;M17.78 27.5V17.008h3.522l.527-4.09h-4.05v-2.61c0-1.182.33-1.99 2.023-1.99h2.166V4.66c-.375-.05-1.66-.16-3.155-.16-3.123 0-5.26 1.905-5.26 5.405v3.016h-3.53v4.09h3.53V27.5h4.223z&quot; data-dcnode-id=&quot;429&quot; fill=&quot;#FFF&quot;&gt;&lt;/path&gt;&lt;/svg&gt;&lt;/span&gt;&lt;span class=&quot;a2a_label&quot; data-dcnode-id=&quot;425&quot;&gt;&lt;span data-dcnode-id=&quot;426&quot; instrument_node=&quot;&quot;&gt;Facebook&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;a class=&quot;a2a_button_pinterest&quot; data-dcnode-id=&quot;418&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.telescopeguide.org/%23pinterest&quot; rel=&quot;nofollow
