&lt;/span&gt;&lt;p data-dcnode-id=&quot;1001&quot;&gt;&lt;span data-dcnode-id=&quot;1002&quot; instrument_node=&quot;&quot;&gt;I’ve conducted some extensive research around these two primary types of telescopes. I will first begin with Refractors, before moving swiftly on to the Reflecting Counterpart.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1000&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;996&quot;&gt;&lt;span data-dcnode-id=&quot;997&quot; id=&quot;Refracting_Telescopes&quot;&gt;&lt;strong data-dcnode-id=&quot;998&quot;&gt;&lt;span data-dcnode-id=&quot;999&quot; instrument_node=&quot;&quot;&gt;Refracting Telescopes&lt;/span&gt;&lt;/strong&gt;&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;995&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;993&quot;&gt;&lt;span data-dcnode-id=&quot;994&quot; instrument_node=&quot;&quot;&gt;The the first reported use of telescopes appeared in Europe during the early years of the 1600s. They were designed using lenses to enlarge distant objects.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;992&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;988&quot;&gt;&lt;span data-dcnode-id=&quot;991&quot; instrument_node=&quot;&quot;&gt;This type of telescope, that utilizes lenses alone, is what we now know as and refer to as a &lt;/span&gt;&lt;strong data-dcnode-id=&quot;989&quot;&gt;&lt;span data-dcnode-id=&quot;990&quot; instrument_node=&quot;&quot;&gt;Refracting Telescope.&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;div class=&quot;code-block code-block-2&quot; data-dcnode-id=&quot;971&quot; style=&quot;margin: 8px 0; clear: both;&quot;&gt;&lt;span data-dcnode-id=&quot;987&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;970&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;966&quot;&gt;&lt;span data-dcnode-id=&quot;969&quot; instrument_node=&quot;&quot;&gt;The first known Refracting telescopes worked using a design known as a &lt;/span&gt;&lt;strong data-dcnode-id=&quot;967&quot;&gt;&lt;span data-dcnode-id=&quot;968&quot; instrument_node=&quot;&quot;&gt;Galilean Refractor. &lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;965&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;963&quot;&gt;&lt;span data-dcnode-id=&quot;964&quot; instrument_node=&quot;&quot;&gt;In this design, a convex lens objective and a concave lens eyepiece are used to magnify distant objects and their apparent diameters.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;962&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;960&quot;&gt;&lt;span data-dcnode-id=&quot;961&quot; instrument_node=&quot;&quot;&gt;These telescopes are relatively easy to use because they produce an image that is shown the correct side up left to right.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;959&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;957&quot;&gt;&lt;span data-dcnode-id=&quot;958&quot; instrument_node=&quot;&quot;&gt;Today, Galilean Refractors are not typically used; they are primarily sold as collectors items. Sometimes you will seem them sold under the name “Spy Glasses”.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;956&quot; instrument_node=&quot;&quot;&gt;

ata-dcnode-id=&quot;595&quot; type=&quot;button&quot;&gt;&lt;span data-dcnode-id=&quot;596&quot; instrument_node=&quot;&quot;&gt;Done&lt;/span&gt;&lt;/button&gt;&lt;/div&gt;&lt;/div&gt;&lt;button aria-disabled=&quot;false&quot; class=&quot;vjs-close-button vjs-control vjs-button&quot; data-dcnode-id=&quot;589&quot; title=&quot;Close Modal Dialog&quot; type=&quot;button&quot;&gt;&lt;span aria-hidden=&quot;true&quot; class=&quot;vjs-icon-placeholder&quot; data-dcnode-id=&quot;592&quot;&gt;&lt;/span&gt;&lt;span aria-live=&quot;polite&quot; class=&quot;vjs-control-text&quot; data-dcnode-id=&quot;590&quot;&gt;&lt;span data-dcnode-id=&quot;591&quot; instrument_node=&quot;&quot;&gt;Close Modal Dialog&lt;/span&gt;&lt;/span&gt;&lt;/button&gt;&lt;p class=&quot;vjs-control-text&quot; data-dcnode-id=&quot;587&quot;&gt;&lt;span data-dcnode-id=&quot;588&quot; instrument_node=&quot;&quot;&gt;End of dialog window.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;div data-dcnode-id=&quot;585&quot; id=&quot;ez-video-ad-container-d9beab13a12df92605be030e14145182531e4d4e&quot;&gt;&lt;/div&gt;&lt;div data-dcnode-id=&quot;584&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;582&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;571&quot;&gt;&lt;span data-dcnode-id=&quot;572&quot; instrument_node=&quot;&quot;&gt;Kaplerian Refractors still use a convex lens objective but instead have a longer focal length with a convex lens eyepiece set behind the focal plane.&lt;/span&gt;&lt;/p&gt;&lt;div class=&quot;code-block code-block-3&quot; data-dcnode-id=&quot;554&quot; style=&quot;margin: 8px 0; clear: both;&quot;&gt;&lt;span data-dcnode-id=&quot;570&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;568&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div data-dcnode-id=&quot;557&quot; id=&quot;ezoic-pub-ad-placeholder-102&quot;&gt;&lt;span data-dcnode-id=&quot;567&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;565&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;563&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ins class=&quot;adsbygoogle&quot; data-ad-client=&quot;ca-pub-7896920432596358&quot; data-ad-format=&quot;auto&quot; data-ad-slot=&quot;8856885142&quot; data-dcnode-id=&quot;562&quot; data-full-width-responsive=&quot;true&quot; style=&quot;display:block&quot;&gt;&lt;/ins&gt;&lt;span data-dcnode-id=&quot;561&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;558&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;556&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;553&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 data-dcnode-id=&quot;549&quot;&gt;&lt;span data-dcnode-id=&quot;550&quot; id=&quot;How_A_Refractor_Works&quot;&gt;&lt;strong data-dcnode-id=&quot;551&quot;&gt;&lt;span data-dcnode-id=&quot;552&quot; instrument_node=&quot;&quot;&gt;How A Refractor Works&lt;/span&gt;&lt;/strong&gt;&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;548&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;546&quot;&gt;&lt;span data-dcnode-id=&quot;547&quot; instrument_node=&quot;&quot;&gt;The purpose of the objective lens, which is at the opposite end to the eyepiece, is to collect the light from an object you are observing in the sky, e.g. a star.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;545&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;543&quot;&gt;&lt;span data-dcnode-id=&quot;544&quot; instrument_node=&quot;&quot;&gt;It then bends that light into a single point of focus. The second lens (which is the eyepiece) has a purpose to then enlarge your focused image for your eyes; in many ways it is just like a magnifying glass.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;542&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;540&quot;&gt;&lt;span data-dcnode-id=&quot;541&quot; instrument_node=&quot;&quot;&gt;In other words, imagine the focused light being collected from the first lens as an insect, and then think of the eyepiece like a Magnifying Glass.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;539&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;537&quot;&gt;&lt;span data-dcnode-id=&quot;538&quot; instrument_node=&quot;&quot;&gt;This is pretty much how it works.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;536&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;534&quot;&gt;&lt;span data-dcnode-id=&quot;535&quot; instrument_node=&quot;&quot;&gt;However, it is important to note that this method of magnification creates an image that is inverted both vertically and horizontally.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;533&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;529&quot;&gt;&lt;span data-dcnode-id=&quot;532&quot; instrument_node=&quot;&quot;&gt;However, the Kaplerian Design is still preferred over the Galilean because it allows for a &lt;/span&gt;&lt;em data-dcnode-id=&quot;530&quot;&gt;&lt;span data-dcnode-id=&quot;531&quot; instrument_node=&quot;&quot;&gt;larger apparent field of view (see more at any one time).&lt;/span&gt;&lt;/em&gt;&lt;/p&gt;&lt;div class=&quot;code-block code-block-4&quot; data-dcnode-id=&quot;512&quot; style=&quot;margin: 8px 0; clear: both;&quot;&gt;&lt;span data-dcnode-id=&quot;528&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;526&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div data-dcnode-id=&quot;515&quot; id=&quot;ezoic-pub-ad-placeholder-102&quot;&gt;&lt;span data-dcnode-id=&quot;525&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;523&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;521&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ins class=&quot;adsbygoogle&quot; data-ad-client=&quot;ca-pub-7896920432596358&quot; data-ad-format=&quot;auto&quot; data-ad-slot=&quot;8856885142&quot; data-dcnode-id=&quot;520&quot; data-full-width-responsive=&quot;true&quot; style=&quot;display:block&quot;&gt;&lt;/ins&gt;&lt;span data-dcnode-id=&quot;519&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;516&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;514&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;511&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;509&quot;&gt;&lt;span data-dcnode-id=&quot;510&quot; instrument_node=&quot;&quot;&gt;Therefore, it is important to note that if you purchase a Refractor Telescope, your images will be inverted and appear upside down.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;508&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;501&quot;&gt;&lt;span data-dcnode-id=&quot;507&quot; instrument_node=&quot;&quot;&gt;This can take some getting used to, but if you wanted to correct this, then you would need to apply a &lt;/span&gt;&lt;strong data-dcnode-id=&quot;503&quot;&gt;&lt;a data-dcnode-id=&quot;505&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.amazon.com/gp/product/B01B2OR23U/ref%3Das_li_tl%3Fie%3DUTF8%26camp%3D1789%26creative%3D9325%26creativeASIN%3DB01B2OR23U%26linkCode%3Das2%26tag%3Dastronomyscope-20%26linkId%3D3de3edaf1ffd55e7cd9380270fe1042f&quot;&gt;&lt;span data-dcnode-id=&quot;506&quot; instrument_node=&quot;&quot;&gt;Erect-Image Prism Diagonal&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;504&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;502&quot; instrument_node=&quot;&quot;&gt;to correct and re-orientate the image&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;500&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;492&quot;&gt;&lt;em data-dcnode-id=&quot;498&quot;&gt;&lt;span data-dcnode-id=&quot;499&quot; instrument_node=&quot;&quot;&gt;(&lt;/span&gt;&lt;/em&gt;&lt;em data-dcnode-id=&quot;493&quot;&gt;&lt;span data-dcnode-id=&quot;497&quot; instrument_node=&quot;&quot;&gt;Read More: &lt;/span&gt;&lt;a data-dcnode-id=&quot;495&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.astronomyscope.com/why-does-my-telescope-view-upside-down/&quot;&gt;&lt;span data-dcnode-id=&quot;496&quot; instrument_node=&quot;&quot;&gt;Why Does My Telescope View Upside Down [And What You Can Do]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;494&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;/em&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;491&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;489&quot;&gt;&lt;span data-dcnode-id=&quot;490&quot; instrument_node=&quot;&quot;&gt;Keplerian Refractors are good if you are a beginner in astronomy and are commonly used. These are some of the benefits and as to why they are used:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;488&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;484&quot;&gt;&lt;span data-dcnode-id=&quot;485&quot; id=&quot;Advantages_of_Refractor_Telescopes&quot;&gt;&lt;strong data-dcnode-id=&quot;486&quot;&gt;&lt;span data-dcnode-id=&quot;487&quot; instrument_node=&quot;&quot;&gt;Advantages of Refractor Telescopes&lt;/span&gt;&lt;/strong&gt;&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;483&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;481&quot;&gt;&lt;span data-dcnode-id=&quot;482&quot; instrument_node=&quot;&quot;&gt;The three main positive of a Refractor Telescope Are:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;480&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ol data-dcnode-id=&quot;469&quot;&gt;&lt;span data-dcnode-id=&quot;479&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;477&quot;&gt;&lt;span data-dcnode-id=&quot;478&quot; instrument_node=&quot;&quot;&gt;Easy Maintenance,&amp;nbsp;Light and Transportable.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;476&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;474&quot;&gt;&lt;span data-dcnode-id=&quot;475&quot; instrument_node=&quot;&quot;&gt;Better Performance in Weaker Conditions – Images Appear Steadier&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;473&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;471&quot;&gt;&lt;span data-dcnode-id=&quot;472&quot; instrument_node=&quot;&quot;&gt;Near permanent optical Alignment.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;470&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ol&gt;&lt;span data-dcnode-id=&quot;468&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;461&quot;&gt;&lt;strong data-dcnode-id=&quot;466&quot;&gt;&lt;span data-dcnode-id=&quot;467&quot; instrument_node=&quot;&quot;&gt;Easy Maintenance: &lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;465&quot; instrument_node=&quot;&quot;&gt;Due to the design of a Refractor Telescope, the glass surface is protected in the tube and is therefore closed from the atmosphere. This means that it barely needs cleaning.&lt;/span&gt;&lt;strong data-dcnode-id=&quot;462&quot;&gt;&lt;br data-dcnode-id=&quot;464&quot;&gt;&lt;span data-dcnode-id=&quot;463&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;460&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;456&quot;&gt;&lt;strong data-dcnode-id=&quot;458&quot;&gt;&lt;span data-dcnode-id=&quot;459&quot; instrument_node=&quot;&quot;&gt;Better Performance in Weaker Conditions:&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;457&quot; instrument_node=&quot;&quot;&gt; A secondary benefit to the design, is that the lenses are less affected by changing temperatures. This results in steadier and sharper images than can be typically achieved from a Reflector telescope (of the same size).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;455&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;451&quot;&gt;&lt;strong data-dcnode-id=&quot;453&quot;&gt;&lt;span data-dcnode-id=&quot;454&quot; instrument_node=&quot;&quot;&gt;Optical Alignment:&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;452&quot; instrument_node=&quot;&quot;&gt; Refractor telescopes only really require a one-off alignment. This is because their optical system is more resistant to misalignment than the reflector telescopes.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;450&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;448&quot;&gt;&lt;span data-dcnode-id=&quot;449&quot; instrument_node=&quot;&quot;&gt;However, refracting telescopes do have their limitations and its good to be cognizant of these:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;447&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;443&quot;&gt;&lt;span data-dcnode-id=&quot;444&quot; id=&quot;Disadvantages_of_Refractor_Telescopes&quot;&gt;&lt;strong data-dcnode-id=&quot;445&quot;&gt;&lt;span data-dcnode-id=&quot;446&quot; instrument_node=&quot;&quot;&gt;Disadvantages of Refractor Telescopes&lt;/span&gt;&lt;/strong&gt;&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;442&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;440&quot;&gt;&lt;span data-dcnode-id=&quot;441&quot; instrument_node=&quot;&quot;&gt;The main three negatives of a Refractor Telescope are:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;439&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ol data-dcnode-id=&quot;428&quot;&gt;&lt;span data-dcnode-id=&quot;438&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;436&quot;&gt;&lt;span data-dcnode-id=&quot;437&quot; instrument_node=&quot;&quot;&gt;Spherical Aberration&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;435&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;433&quot;&gt;&lt;span data-dcnode-id=&quot;434&quot; instrument_node=&quot;&quot;&gt;Chromatic Aberration and&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;432&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;430&quot;&gt;&lt;span data-dcnode-id=&quot;431&quot; instrument_node=&quot;&quot;&gt;Lens Sag&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;429&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ol&gt;&lt;span data-dcnode-id=&quot;427&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;420&quot;&gt;&lt;strong data-dcnode-id=&quot;425&quot;&gt;&lt;span data-dcnode-id=&quot;426&quot; instrument_node=&quot;&quot;&gt;Spherical Aberration&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;424&quot; instrument_node=&quot;&quot;&gt; happens due to the use of spherical lenses. These are unable to bring parallel light rays into a perfect focus as each part of the lens refracts light somewhat differently. The result is that this causes a &lt;/span&gt;&lt;em data-dcnode-id=&quot;422&quot;&gt;&lt;span data-dcnode-id=&quot;423&quot; instrument_node=&quot;&quot;&gt;slight blurring of images. &lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;421&quot; instrument_node=&quot;&quot;&gt;Thankfully, this can be corrected by using an objective lens that is parabolic rather than spherical.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;419&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;415&quot;&gt;&lt;strong data-dcnode-id=&quot;417&quot;&gt;&lt;span data-dcnode-id=&quot;418&quot; instrument_node=&quot;&quot;&gt;Chromatic Aberration&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;416&quot; instrument_node=&quot;&quot;&gt; occurs because simple glass lenses are only able to refract shorter wavelengths of light over longer wavelengths. This problem can be mostly corrected by using compound lenses. These are lenses made with two different types of glass each with different refractive properties.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;414&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;410&quot;&gt;&lt;strong data-dcnode-id=&quot;412&quot;&gt;&lt;span data-dcnode-id=&quot;413&quot; instrument_node=&quot;&quot;&gt;Lens Sag &lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;411&quot; instrument_node=&quot;&quot;&gt;happens only in the largest Refracting telescopes. However, it is the principal limiting factor of Refracting telescopes as they get larger. Glass is not perfectly equal so as lenses are made larger and larger they become too heavy to retain the correct shape lens. The result is that the lens becomes distorted due to its own weight.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;409&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;405&quot;&gt;&lt;span data-dcnode-id=&quot;408&quot; instrument_node=&quot;&quot;&gt;Unfortunately, there’s no real way to fix Lens Sag, apart from refraining from using a lens to capture and focus the light. Enter the &lt;/span&gt;&lt;strong data-dcnode-id=&quot;406&quot;&gt;&lt;span data-dcnode-id=&quot;407&quot; instrument_node=&quot;&quot;&gt;Reflecting Telescope.&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;404&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;400&quot;&gt;&lt;span data-dcnode-id=&quot;401&quot; id=&quot;Reflecting_Telescopes&quot;&gt;&lt;strong data-dcnode-id=&quot;402&quot;&gt;&lt;span data-dcnode-id=&quot;403&quot; instrument_node=&quot;&quot;&gt;Reflecting Telescopes&lt;/span&gt;&lt;/strong&gt;&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;399&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;397&quot;&gt;&lt;span data-dcnode-id=&quot;398&quot; instrument_node=&quot;&quot;&gt;The Reflecting Telescope was discovered by Isaac Newton. He noticed that by using a concave mirror as your objective, your image is free from Chromatic Aberration.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;396&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;394&quot;&gt;&lt;span data-dcnode-id=&quot;395&quot; instrument_node=&quot;&quot;&gt;Plus, as mirrors can be supported from behind, they can be made larger than lenses without the Sag problem.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;393&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;391&quot;&gt;&lt;span data-dcnode-id=&quot;392&quot; instrument_node=&quot;&quot;&gt;Remember: the larger the objective the more light that can be gathered. And with more light comes more power and more visibility into the night sky.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;390&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;388&quot;&gt;&lt;span data-dcnode-id=&quot;389&quot; instrument_node=&quot;&quot;&gt;The initial Newton design is still primarily used in most Reflecting Telescopes.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;387&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;385&quot;&gt;&lt;span data-dcnode-id=&quot;386&quot; instrument_node=&quot;&quot;&gt;A concave mirror is placed at the end of a large tubular housing. The other end of the tube is open to let in the light. Within the tube a small flat mirror is placed at a 45 degree angle. This small mirror reflects light out through an opening in the side of the telescopes housing containing a convex eyepiece.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;384&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;380&quot;&gt;&lt;span data-dcnode-id=&quot;381&quot; id=&quot;How_A_Reflector_Works&quot;&gt;&lt;strong data-dcnode-id=&quot;382&quot;&gt;&lt;span data-dcnode-id=&quot;383&quot; instrument_node=&quot;&quot;&gt;How A Reflector Works&lt;/span&gt;&lt;/strong&gt;&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;379&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;377&quot;&gt;&lt;span data-dcnode-id=&quot;378&quot; instrument_node=&quot;&quot;&gt;Unlike a Refractor, a Reflector uses two mirrors instead of two lenses.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;376&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;374&quot;&gt;&lt;span data-dcnode-id=&quot;375&quot; instrument_node=&quot;&quot;&gt;These mirrors are used to manipulate the the light that enters the telescope from an object (like a Star).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;373&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;371&quot;&gt;&lt;span data-dcnode-id=&quot;372&quot; instrument_node=&quot;&quot;&gt;As the light enters the telescope, the first curved mirror (positioned at the end of the tube) reflects the light onto a smaller, flatter mirror (positioned in the center of the tube).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;370&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;368&quot;&gt;&lt;span data-dcnode-id=&quot;369&quot; instrument_node=&quot;&quot;&gt;From there the image is reflected to the eyepiece.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;367&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;363&quot;&gt;&lt;span data-dcnode-id=&quot;364&quot; id=&quot;Advantages_of_Reflecting_Telescope&quot;&gt;&lt;strong data-dcnode-id=&quot;365&quot;&gt;&lt;span data-dcnode-id=&quot;366&quot; instrument_node=&quot;&quot;&gt;Advantages of Reflecting Telescope&lt;/span&gt;&lt;/strong&gt;&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;362&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;360&quot;&gt;&lt;span data-dcnode-id=&quot;361&quot; instrument_node=&quot;&quot;&gt;The three main positives of a Reflecting Telescope are:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;359&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ol data-dcnode-id=&quot;351&quot;&gt;&lt;span data-dcnode-id=&quot;358&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;356&quot;&gt;&lt;span data-dcnode-id=&quot;357&quot; instrument_node=&quot;&quot;&gt;Size and Light Collection&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;355&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;353&quot;&gt;&lt;span data-dcnode-id=&quot;354&quot; instrument_node=&quot;&quot;&gt;Cost&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;352&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ol&gt;&lt;span data-dcnode-id=&quot;350&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;346&quot;&gt;&lt;strong data-dcnode-id=&quot;348&quot;&gt;&lt;span data-dcnode-id=&quot;349&quot; instrument_node=&quot;&quot;&gt;Size and Light Collection: &lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;347&quot; instrument_node=&quot;&quot;&gt;As mirrors are easier to build compared to lenses, it is possible to make them larger and more durable. And as only one mirror is required to collect the and focus the light, the opposing side can easily be positioned on a surface for extra support. This enables the mirror to be constructed a lot larger than that of a lens. As a larger device means more light can be collected, the more you will ultimately be able to see.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;345&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;341&quot;&gt;&lt;strong data-dcnode-id=&quot;343&quot;&gt;&lt;span data-dcnode-id=&quot;344&quot; instrument_node=&quot;&quot;&gt;Cost: &lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;342&quot; instrument_node=&quot;&quot;&gt;Another advantage of the user of mirrors is that they do not cost as much to manufacture. This means a Reflecting telescope is a lot cheaper to produce than that of a Refractor. The result is that a stronger performing Reflector telescopes is available for less money than a Refractor equivalent. This means you can purchase more magnification power for less.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;340&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;337&quot;&gt;&lt;span data-dcnode-id=&quot;338&quot; id=&quot;Disadvantages_of_Reflector_Telescopes&quot;&gt;&lt;span data-dcnode-id=&quot;339&quot; instrument_node=&quot;&quot;&gt;Disadvantages of Reflector Telescopes&lt;/span&gt;&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;336&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ol data-dcnode-id=&quot;325&quot;&gt;&lt;span data-dcnode-id=&quot;335&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;333&quot;&gt;&lt;span data-dcnode-id=&quot;334&quot; instrument_node=&quot;&quot;&gt;Use of Mirrors can cause Loss of Light&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;332&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;330&quot;&gt;&lt;span data-dcnode-id=&quot;331&quot; instrument_node=&quot;&quot;&gt;Mirrors Curving&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;329&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;327&quot;&gt;&lt;span data-dcnode-id=&quot;328&quot; instrument_node=&quot;&quot;&gt;Usage and Preference&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;326&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ol&gt;&lt;span data-dcnode-id=&quot;324&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;320&quot;&gt;&lt;strong data-dcnode-id=&quot;322&quot;&gt;&lt;span data-dcnode-id=&quot;323&quot; instrument_node=&quot;&quot;&gt;Use of Mirrors can cause Loss of Light: &lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;321&quot; instrument_node=&quot;&quot;&gt;Due to the nature of mirrors, some loss of light is to be expected. This can slightly reduce the surface area of the objective. As you can imagine, both the small secondary mirror and the opening in the objective reduce the effective surface area of the objective mirror, but just like the Newtonian design, this reduction is rather small.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;319&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;315&quot;&gt;&lt;strong data-dcnode-id=&quot;317&quot;&gt;&lt;span data-dcnode-id=&quot;318&quot; instrument_node=&quot;&quot;&gt;Mirrors Curving:&amp;nbsp;&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;316&quot; instrument_node=&quot;&quot;&gt;Depending on how the Telescope was constructed, transported etc, the Mirrors may not be a perfect curve. This can lead to image being reflected not coming to and forming a perfect point. Consequently a dragging effect may be observed; where a single point instead is seen as a line or cross.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;314&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;310&quot;&gt;&lt;strong data-dcnode-id=&quot;312&quot;&gt;&lt;span data-dcnode-id=&quot;313&quot; instrument_node=&quot;&quot;&gt;Usage and Preference: &lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;311&quot; instrument_node=&quot;&quot;&gt;Some people find it awkward to look sideways at objects. One way to fix this latter problem is by using a different method to get light into the eyepiece.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;309&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;307&quot;&gt;&lt;span data-dcnode-id=&quot;308&quot; instrument_node=&quot;&quot;&gt;The Cassegrain Reflector uses a small mirror that is not angled but is instead convex, reflecting light back towards an opening in the center of the objective mirror that contains the convex lens eyepiece.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;306&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;302&quot;&gt;&lt;span data-dcnode-id=&quot;303&quot; id=&quot;Final_Words&quot;&gt;&lt;strong data-dcnode-id=&quot;304&quot;&gt;&lt;span data-dcnode-id=&quot;305&quot; instrument_node=&quot;&quot;&gt;Final Words&lt;/span&gt;&lt;/strong&gt;&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;301&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;299&quot;&gt;&lt;span data-dcnode-id=&quot;300&quot; instrument_node=&quot;&quot;&gt;In general, Reflective telescopes are preferred by professional astronomers because the larger objective allows for more light to be captured.&amp;nbsp;This way, dimmer objects can be seen with more detail and resolution.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;298&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;296&quot;&gt;&lt;span data-dcnode-id=&quot;297&quot; instrument_node=&quot;&quot;&gt;The result is ultimately you can see more.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;295&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;291&quot;&gt;&lt;span data-dcnode-id=&quot;294&quot; instrument_node=&quot;&quot;&gt;However there’s absolutely nothing wrong with refracting telescopes. They’re great for beginners as they&lt;/span&gt;&lt;br data-dcnode-id=&quot;293&quot;&gt;&lt;span data-dcnode-id=&quot;292&quot; instrument_node=&quot;&quot;&gt;
do a pretty good job and don’t require much maintenance at all.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;290&quot; instrument_node=&quot;&quot;&gt;
