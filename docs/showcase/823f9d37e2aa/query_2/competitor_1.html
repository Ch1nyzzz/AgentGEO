&lt;/span&gt;&lt;div class=&quot;columns-holder&quot; data-dcnode-id=&quot;588&quot;&gt;&lt;span data-dcnode-id=&quot;604&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;603&quot;&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;601&quot;&gt;&lt;span data-dcnode-id=&quot;602&quot; instrument_node=&quot;&quot;&gt;How do you sell a product? If your first notion is to create a cute cartoon mascot, well, you wouldn't be the first one. Throughout the past few centuries, many of the biggest companies on the planet have marketed their products through the use of memorable characters, like Tony the Tiger and Mr. Peanut, who would look right at home in a Disney movie.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;600&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div data-dcnode-id=&quot;597&quot;&gt;&lt;div data-dcnode-id=&quot;598&quot; id=&quot;primisPlayerContainerDiv&quot;&gt;&lt;iframe data-dcnode-id=&quot;599&quot; frameborder=&quot;0&quot; id=&quot;google_ads_iframe_dummy_sekindoParent813&quot; marginheight=&quot;0&quot; marginwidth=&quot;0&quot; scrolling=&quot;no&quot; style=&quot;width: 1px; height: 1px;&quot; title=&quot;Primis Frame&quot;&gt;&lt;/iframe&gt;&lt;/div&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;594&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;592&quot;&gt;&lt;span data-dcnode-id=&quot;593&quot; instrument_node=&quot;&quot;&gt;Sometimes, though, these mascots can land a company in boiling hot water, particularly if the powers-that-be haven't done their homework on avoiding cultural appropriation, racist tropes, or the seemingly obvious pitfalls of marketing adult products to kids. Even when mascots do succeed, though, their reputation are sometimes be ruined by cultural shifts or even violent incidents, either of which can render a&amp;nbsp;formerly innocuous character into something altogether darker. Either way, you'll probably remember many of these controversial mascots, even if the corporations themselves might prefer that you didn't.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;591&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;567&quot;&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;562&quot;&gt;&lt;span data-dcnode-id=&quot;566&quot; instrument_node=&quot;&quot;&gt;Anybody past a certain age remembers Joe Camel. Emblazoned on every Camel cigarettes advertisement of the late '80s and '90s, Joe was an anthropomorphic camel, dressed up in an outfit Arthur Fonzarelli would admire, who struck crazy-cool poses and did crazy-cool things with a crazy-cool cigarette hanging out of his mouth at all times.&amp;nbsp;Joe Camel was so famous that by 1994, according to &lt;/span&gt;&lt;a data-dcnode-id=&quot;564&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//csts.ua.edu/cartoons/the-industry/joe-camel/&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;565&quot; instrument_node=&quot;&quot;&gt;the University of Alabama&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;563&quot; instrument_node=&quot;&quot;&gt;, a giant depiction of his face was lighting up Times Square.&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;561&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;google-ad-placeholder between-p&quot; data-ad-height=&quot;any&quot; data-ad-pos=&quot;between-p&quot; data-ad-width=&quot;any&quot; data-dcnode-id=&quot;560&quot;&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;559&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;557&quot;&gt;&lt;span data-dcnode-id=&quot;558&quot; instrument_node=&quot;&quot;&gt;There's just one problem. Doesn't Joe Camel seem an awful lot like the sort of character that, you know, kids would like? After all, he's basically a dromedary Johnny Bravo.&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;556&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;547&quot;&gt;&lt;span data-dcnode-id=&quot;555&quot; instrument_node=&quot;&quot;&gt;It goes without saying that probably the only entity on Earth that enjoys the notion of children lighting up butts has always been (what else?) the tobacco industry. So, it's no wonder that in 1997, &lt;/span&gt;&lt;a data-dcnode-id=&quot;552&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nytimes.com/1997/05/29/us/ftc-charges-joe-camel-ad-illegally-takes-aim-at-minors.html&quot; target=&quot;_blank&quot;&gt;&lt;em data-dcnode-id=&quot;553&quot;&gt;&lt;span data-dcnode-id=&quot;554&quot; instrument_node=&quot;&quot;&gt;The New York Times&lt;/span&gt;&lt;/em&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;551&quot; instrument_node=&quot;&quot;&gt; reported that the Federal Trade Commission was charging the R.J. Reynolds Tobacco Company (which owns Camel) with marketing to minors. While R.J. Reynolds hemmed and hawed about the whole shebang, it was by then an established fact that any tobacco company's long-term sales depended on teenagers picking up a smoking habit,&amp;nbsp;which added fire to the FTC's campaign. In the end, R.J. Reynolds company didn't have a leg to stand on, and by the &lt;/span&gt;&lt;a data-dcnode-id=&quot;549&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nytimes.com/1997/07/11/business/joe-camel-a-giant-in-tobacco-marketing-is-dead-at-23.html&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;550&quot; instrument_node=&quot;&quot;&gt;end of that summer&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;548&quot; instrument_node=&quot;&quot;&gt;, Joe Camel bit the dust.&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;546&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;google-ad-placeholder between-p&quot; data-ad-height=&quot;any&quot; data-ad-pos=&quot;between-p&quot; data-ad-width=&quot;any&quot; data-dcnode-id=&quot;545&quot;&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;544&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;540&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;div class=&quot;slide-key image-holder gallery-image-holder credit-image-wrap&quot; data-dcnode-id=&quot;523&quot; data-post-id=&quot;191221&quot; data-slide-num=&quot;2&quot;&gt;&lt;span data-dcnode-id=&quot;533&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;source data-dcnode-id=&quot;529&quot; data-srcset=&quot;https://www.grunge.com/img/gallery/the-most-controversial-corporate-mascots-in-history/the-most-racist-toothpaste-in-the-world-1608139361.sm.webp&quot; media=&quot;(max-width: 428px)&quot; srcset=&quot;https://www.grunge.com/img/gallery/the-most-controversial-corporate-mascots-in-history/the-most-racist-toothpaste-in-the-world-1608139361.sm.webp&quot; type=&quot;image/webp&quot;&gt;&lt;span data-dcnode-id=&quot;528&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;img alt=&quot;Darkie toothpaste, controversial corporate mascot&quot; class=&quot;gallery-image&quot; data-dcnode-id=&quot;527&quot; data-lazy-src=&quot;https://www.grunge.com/img/gallery/the-most-controversial-corporate-mascots-in-history/the-most-racist-toothpaste-in-the-world-1608139361.jpg&quot; data-post-id=&quot;191221&quot; data-slide-num=&quot;2&quot; data-slide-title=&quot;The Most Controversial Corporate Mascots In History: The most racist toothpaste in the world&quot; data-slide-url=&quot;https://www.grunge.com/191221/the-most-controversial-corporate-mascots-in-history/slide/the-most-racist-toothpaste-in-the-world/&quot; height=&quot;438&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.grunge.com/img/gallery/the-most-controversial-corporate-mascots-in-history/the-most-racist-toothpaste-in-the-world-1608139361.jpg&amp;amp;raw&quot; width=&quot;780&quot;&gt;&lt;span data-dcnode-id=&quot;526&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/picture&gt;&lt;span data-dcnode-id=&quot;524&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;div class=&quot;columns-holder&quot; data-dcnode-id=&quot;497&quot;&gt;&lt;span data-dcnode-id=&quot;521&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;520&quot;&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;514&quot;&gt;&lt;span data-dcnode-id=&quot;519&quot; instrument_node=&quot;&quot;&gt;Problematic and offensive mascots are not strictly a U.S. problem. They show up everywhere, in all kinds of ways. For example, there exists a popular toothpaste from Hong Kong that was, for decades, called Darkie — or &quot;Black People Toothpaste,&quot; in Chinese — and as its mascot, it featured a minstrel show character in blackface, sporting a giant white grin. According to &lt;/span&gt;&lt;a data-dcnode-id=&quot;516&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//web.archive.org/web/20101202102231/http%3A//www.newsweek.com/2010/11/30/china-s-controversial-toothpaste.html&quot; target=&quot;_blank&quot;&gt;&lt;em data-dcnode-id=&quot;517&quot;&gt;&lt;span data-dcnode-id=&quot;518&quot; instrument_node=&quot;&quot;&gt;Newsweek&lt;/span&gt;&lt;/em&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;515&quot; instrument_node=&quot;&quot;&gt;, the Darkie mascot was inspired by Al Jolson, a blackface performer. Though the people behind the scenes certainly must have known how racist this whole thing was, they feigned ignorance, collected their cash, and kept the brand going.&amp;nbsp;Darkie toothpaste got so big, in fact, that imitation &quot;black people toothpaste&quot; knockoffs appeared on store shelves.&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;513&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;google-ad-placeholder between-p&quot; data-ad-height=&quot;any&quot; data-ad-pos=&quot;between-p&quot; data-ad-width=&quot;any&quot; data-dcnode-id=&quot;512&quot;&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;511&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;505&quot;&gt;&lt;span data-dcnode-id=&quot;510&quot; instrument_node=&quot;&quot;&gt;Well, in the '80s, Colgate bought Darkie for $50 million. And lest you think this powerful toothpaste company immediately put its foot down against the racist branding and mascot .... well, think again. According to &lt;/span&gt;&lt;a data-dcnode-id=&quot;507&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nytimes.com/1989/01/27/business/colgate-to-rename-a-toothpaste.html&quot; target=&quot;_blank&quot;&gt;&lt;em data-dcnode-id=&quot;508&quot;&gt;&lt;span data-dcnode-id=&quot;509&quot; instrument_node=&quot;&quot;&gt;The New York Times&lt;/span&gt;&lt;/em&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;506&quot; instrument_node=&quot;&quot;&gt;, it took three years of protests, arguments, and pressure from shareholders for Colgate to make amends, at which point they re-branded the toothpaste as &quot;Darlie&quot; and changed the mascot to a racially ambiguous man in a top hat.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;504&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;503&quot;&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;502&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;span class=&quot;gallery-image-credit&quot; data-dcnode-id=&quot;478&quot;&gt;&lt;span data-dcnode-id=&quot;479&quot; instrument_node=&quot;&quot;&gt;Jamie Squire/Getty Images&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;477&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;475&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;columns-holder added-content&quot; data-dcnode-id=&quot;441&quot;&gt;&lt;span data-dcnode-id=&quot;474&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;473&quot;&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;461&quot;&gt;&lt;span data-dcnode-id=&quot;472&quot; instrument_node=&quot;&quot;&gt;Bigotry is still a huge part of the world today, as seen by mass incarceration, today's hate crimes, and the fact that&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;470&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.grunge.com/189839/coronavirus-has-sparked-a-wave-of-anti-asian-racism/&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;471&quot; instrument_node=&quot;&quot;&gt;Coronavirus has sparked a wave of anti-Asian racism&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;469&quot; instrument_node=&quot;&quot;&gt;. These days, though, companies at least &lt;/span&gt;&lt;em data-dcnode-id=&quot;467&quot;&gt;&lt;span data-dcnode-id=&quot;468&quot; instrument_node=&quot;&quot;&gt;try&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;466&quot; instrument_node=&quot;&quot;&gt; to avoid branding themselves as racist through the use of explicit stereotypes, particularly when it comes to mascots ... unless, of course, you're talking about the U.S. sports industry, which just won't stop exploiting Native American culture. Because, face it, while you'd never see a baseball team in the 21st century that named itself after a racial slur for black or Jewish people, the MLB still has the Cleveland Indians. And from 1948 to 2019, the Indians advertised themselves using a red-skinned caricature of an indigenous man, dubbed Chief Wahoo. Chief Wahoo had drawn decades of protests from Native American groups, according to &lt;/span&gt;&lt;a data-dcnode-id=&quot;463&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nytimes.com/2018/01/29/sports/baseball/cleveland-indians-chief-wahoo-logo.html&quot; target=&quot;_blank&quot;&gt;&lt;em data-dcnode-id=&quot;464&quot;&gt;&lt;span data-dcnode-id=&quot;465&quot; instrument_node=&quot;&quot;&gt;The New York Times&lt;/span&gt;&lt;/em&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;462&quot; instrument_node=&quot;&quot;&gt;, but these arguments went ignored until pressure from the commissioner of baseball, Rob Manfred, finally sunk in.&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;460&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;google-ad-placeholder between-p&quot; data-ad-height=&quot;any&quot; data-ad-pos=&quot;between-p&quot; data-ad-width=&quot;any&quot; data-dcnode-id=&quot;459&quot;&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;458&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;445&quot;&gt;&lt;span data-dcnode-id=&quot;457&quot; instrument_node=&quot;&quot;&gt;The team itself, though, continues using this problematic name. So does the NFL's Washington Redskins, as explained by &lt;/span&gt;&lt;a data-dcnode-id=&quot;454&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.washingtonpost.com/sports/redskins/native-american-activists-continue-their-fight-against-redskins-team-name/2018/09/17/4438443c-ba86-11e8-bdc0-90f81cc58c5d_story.html&quot; target=&quot;_blank&quot;&gt;&lt;em data-dcnode-id=&quot;455&quot;&gt;&lt;span data-dcnode-id=&quot;456&quot; instrument_node=&quot;&quot;&gt;The Washington Post&lt;/span&gt;&lt;/em&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;453&quot; instrument_node=&quot;&quot;&gt;, who have &lt;/span&gt;&lt;a data-dcnode-id=&quot;451&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.grunge.com/49119/offensive-sports-logos-time/&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;452&quot; instrument_node=&quot;&quot;&gt;their own offensive logo&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;450&quot; instrument_node=&quot;&quot;&gt;, despite years of campaigns pointing out how this stereotyping does real harm to real people of indigenous descent. The NFL has shown little sensitivity to the matter, if not outright hostility, as exhibited by their 2017 decision to have the Washington Redskins host a Thanksgiving game, according to &lt;/span&gt;&lt;a data-dcnode-id=&quot;447&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.thenation.com/article/archive/by-having-the-washington-rdskins-host-a-game-on-thanksgiving-nfl-owners-show-their-true-colors/&quot; target=&quot;_blank&quot;&gt;&lt;em data-dcnode-id=&quot;448&quot;&gt;&lt;span data-dcnode-id=&quot;449&quot; instrument_node=&quot;&quot;&gt;The Nation&lt;/span&gt;&lt;/em&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;446&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;444&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;/picture&gt;&lt;span data-dcnode-id=&quot;424&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;422&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;columns-holder&quot; data-dcnode-id=&quot;402&quot;&gt;&lt;span data-dcnode-id=&quot;421&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;420&quot;&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;414&quot;&gt;&lt;span data-dcnode-id=&quot;419&quot; instrument_node=&quot;&quot;&gt;These days, Domino's Pizza doesn't really bother with mascots. Back in the '80s, however, they had the Noid. This intentionally obnoxious character&amp;nbsp;— depicted in claymation as a creepy, sniveling little man in a skintight rabbit costume&amp;nbsp;— was a villainous force who ruined pizza deliveries. According to Domino's commercials, they were the only pizza company who produced Noid-proof pizzas, so if you ordered from them, you could &quot;avoid the Noid.&quot; Groan. Despite the fact that the Noid intensely irritated every adult in the world, kids loved these ads, and&amp;nbsp;according to &lt;/span&gt;&lt;a data-dcnode-id=&quot;416&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//priceonomics.com/how-dominos-pizza-lost-its-mascot/&quot; target=&quot;_blank&quot;&gt;&lt;em data-dcnode-id=&quot;417&quot;&gt;&lt;span data-dcnode-id=&quot;418&quot; instrument_node=&quot;&quot;&gt;Priceonomics&lt;/span&gt;&lt;/em&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;415&quot; instrument_node=&quot;&quot;&gt;, Domino's milked the character through&amp;nbsp;Noid video games, Noid toys, Noid everything. It was a parent's worst nightmare.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;413&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;google-ad-placeholder between-p&quot; data-ad-height=&quot;any&quot; data-ad-pos=&quot;between-p&quot; data-ad-width=&quot;any&quot; data-dcnode-id=&quot;412&quot;&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;411&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;409&quot;&gt;&lt;span data-dcnode-id=&quot;410&quot; instrument_node=&quot;&quot;&gt;The Noid himself, while annoying, wasn't offensive. That changed, rather horrifically, in 1989, when a&amp;nbsp;troubled, schizophrenic man named Kenneth Lamar Noid (note the surname) came to believe that Domino's whole Noid campaign had been created specifically to torment him, and that the villainous Noid was a negative representation of him. Driven into a rage, Kenneth Noid burst into an Atlanta Domino's restaurant with a gun, demanded $100,000, and took two employees hostage. While the hostages escaped unscathed, Kenneth Noid himself was committed to a mental institution, and the pizza company's Noid character was forever ruined.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;408&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;406&quot;&gt;&lt;span data-dcnode-id=&quot;407&quot; instrument_node=&quot;&quot;&gt;Since then, the Noid had been avoided at all costs.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;405&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;404&quot;&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;403&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;div class=&quot;slide-key image-holder gallery-image-holder credit-image-wrap&quot; data-dcnode-id=&quot;380&quot; data-post-id=&quot;191221&quot; data-slide-num=&quot;5&quot;&gt;&lt;span data-dcnode-id=&quot;394&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;img alt=&quot;Aunt Jemima, controversial corporate mascot&quot; class=&quot;gallery-image lazyload&quot; data-dcnode-id=&quot;388&quot; data-lazy-src=&quot;https://www.grunge.com/img/gallery/the-most-controversial-corporate-mascots-in-history/aunt-jemima-is-seriously-problematic-1582836356.jpg&quot; data-post-id=&quot;191221&quot; data-slide-num=&quot;5&quot; data-slide-title=&quot;The Most Controversial Corporate Mascots In History: Aunt Jemima is seriously problematic&quot; data-slide-url=&quot;https://www.grunge.com/191221/the-most-controversial-corporate-mascots-in-history/slide/aunt-jemima-is-seriously-problematic/&quot; height=&quot;437&quot; src=&quot;data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=&quot; width=&quot;780&quot;&gt;&lt;span data-dcnode-id=&quot;387&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/picture&gt;&lt;span data-dcnode-id=&quot;385&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;a data-dcnode-id=&quot;382&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//commons.wikimedia.org/wiki/File%3AAunt_Jemima_ad_newspaper_1923.png&quot; target=&quot;_blank&quot;&gt;&lt;span class=&quot;gallery-image-credit&quot; data-dcnode-id=&quot;383&quot;&gt;&lt;span data-dcnode-id=&quot;384&quot; instrument_node=&quot;&quot;&gt;Wikimedia Commons&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;381&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;379&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;columns-holder added-content&quot; data-dcnode-id=&quot;356&quot;&gt;&lt;span data-dcnode-id=&quot;378&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;377&quot;&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;375&quot;&gt;&lt;span data-dcnode-id=&quot;376&quot; instrument_node=&quot;&quot;&gt;Many problematic mascots have, in the past century, gone the way of the dodo. Others persist to this day. Aunt Jemima, the pancake and syrup brand owned by Quaker Oats, belongs to the latter category.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;374&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;google-ad-placeholder between-p&quot; data-ad-height=&quot;any&quot; data-ad-pos=&quot;between-p&quot; data-ad-width=&quot;any&quot; data-dcnode-id=&quot;373&quot;&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;372&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;362&quot;&gt;&lt;span data-dcnode-id=&quot;371&quot; instrument_node=&quot;&quot;&gt;As explained by &lt;/span&gt;&lt;a data-dcnode-id=&quot;368&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.theatlantic.com/national/archive/2012/04/new-racism-museum-reveals-the-ugly-truth-behind-aunt-jemima/256185/&quot; target=&quot;_blank&quot;&gt;&lt;em data-dcnode-id=&quot;369&quot;&gt;&lt;span data-dcnode-id=&quot;370&quot; instrument_node=&quot;&quot;&gt;The Atlantic&lt;/span&gt;&lt;/em&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;367&quot; instrument_node=&quot;&quot;&gt;, the symbolism behind the Aunt Jemima brand and mascot is directly connected to racist sentiments and linked to a problematic sense of nostalgia for segregation, Jim Crow, and so on, usually among those who didn't have to suffer the hardships of these times. Aunt Jemima's name first arose from a minstrel song, and as Riché Richardson explained for &lt;/span&gt;&lt;a data-dcnode-id=&quot;364&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nytimes.com/roomfordebate/2015/06/24/besides-the-confederate-flag-what-other-symbols-should-go/can-we-please-finally-get-rid-of-aunt-jemima&quot; target=&quot;_blank&quot;&gt;&lt;em data-dcnode-id=&quot;365&quot;&gt;&lt;span data-dcnode-id=&quot;366&quot; instrument_node=&quot;&quot;&gt;The New York Times&lt;/span&gt;&lt;/em&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;363&quot; instrument_node=&quot;&quot;&gt;, Aunt Jemima herself is still portrayed as a &quot;mammy,&quot;&amp;nbsp;which is a plantation-era stereotype of a de-sexualized, overweight, maternal black woman, who cheerfully cares for the plantation owner's children instead of rebelling against the bonds of slavery. Despite these problems, and the many arguments that persist, Quaker continues to use Aunt Jemima in the 21st century, though the company has tried to alter the imagery associated with her.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;361&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;google-ad-placeholder between-p&quot; data-ad-height=&quot;any&quot; data-ad-pos=&quot;between-p&quot; data-ad-width=&quot;any&quot; data-dcnode-id=&quot;360&quot;&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;359&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;355&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;353&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;news-article&quot; data-dcnode-id=&quot;312&quot;&gt;&lt;span data-dcnode-id=&quot;352&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 class=&quot;&quot; data-dcnode-id=&quot;350&quot;&gt;&lt;span data-dcnode-id=&quot;351&quot; instrument_node=&quot;&quot;&gt;The controversial Frito Bandito didn't last long&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;349&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;slide-key image-holder gallery-image-holder credit-image-wrap&quot; data-dcnode-id=&quot;338&quot; data-post-id=&quot;191221&quot; data-slide-num=&quot;6&quot;&gt;&lt;span data-dcnode-id=&quot;348&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;picture data-dcnode-id=&quot;340&quot;&gt;&lt;span data-dcnode-id=&quot;347&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;source data-dcnode-id=&quot;346&quot; data-srcset=&quot;https://www.grunge.com/img/gallery/the-most-controversial-corporate-mascots-in-history/the-frito-bandito-didnt-last-long-1582836356.webp&quot; media=&quot;(min-width: 429px)&quot; type=&quot;image/webp&quot;&gt;&lt;span data-dcnode-id=&quot;345&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;source data-dcnode-id=&quot;344&quot; data-srcset=&quot;https://www.grunge.com/img/gallery/the-most-controversial-corporate-mascots-in-history/the-frito-bandito-didnt-last-long-1582836356.sm.webp&quot; media=&quot;(max-width: 428px)&quot; type=&quot;image/webp&quot;&gt;&lt;span data-dcnode-id=&quot;343&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;img alt=&quot;Frito Bandito, controversial corporate mascot&quot; class=&quot;gallery-image lazyload&quot; data-dcnode-id=&quot;342&quot; data-lazy-src=&quot;https://www.grunge.com/img/gallery/the-most-controversial-corporate-mascots-in-history/the-frito-bandito-didnt-last-long-1582836356.jpg&quot; data-post-id=&quot;191221&quot; data-slide-num=&quot;6&quot; data-slide-title=&quot;The Most Controversial Corporate Mascots In History: The controversial Frito Bandito didn't last long&quot; data-slide-url=&quot;https://www.grunge.com/191221/the-most-controversial-corporate-mascots-in-history/slide/the-controversial-frito-bandito-didnt-last-long/&quot; height=&quot;439&quot; src=&quot;data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=&quot; width=&quot;780&quot;&gt;&lt;span data-dcnode-id=&quot;341&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/picture&gt;&lt;span data-dcnode-id=&quot;339&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;337&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;columns-holder&quot; data-dcnode-id=&quot;314&quot;&gt;&lt;span data-dcnode-id=&quot;336&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;335&quot;&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;327&quot;&gt;&lt;span data-dcnode-id=&quot;334&quot; instrument_node=&quot;&quot;&gt;Racist stereotypes regarding Hispanic and Latino Americans, those of Mexican descent in particular, continue existing to this day, and such negative portrayals have been around for a long time. Back in the early '70s, Frito-Lay pushed out a new advertising campaign featuring a pencil-mustached character dubbed &lt;/span&gt;&lt;a data-dcnode-id=&quot;332&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.youtube.com/watch%3Fv%3Ds9P-JjbDD6U&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;333&quot; instrument_node=&quot;&quot;&gt;the Frito Bandito&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;331&quot; instrument_node=&quot;&quot;&gt;, voiced by Mel Blanc in an exaggerated Mexican accent, who went around with his six-shooter pistols and tried to steal bags of Fritos from white Americans. These commercials are ... uncomfortable, to the say the least. It's only made worse when you find out that, according to &lt;/span&gt;&lt;a data-dcnode-id=&quot;329&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.npr.org/2007/10/18/15377830/the-birth-of-the-frito&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;330&quot; instrument_node=&quot;&quot;&gt;NPR&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;328&quot; instrument_node=&quot;&quot;&gt;, the &quot;creator&quot; of Fritos, Charles Elmer Doolin, actually bought the concept, name, and patent for Fritos from a Mexican man, so it could be argued that Fritos ripped off a Mexican creation, then tried to frame Mexicans as thieves. Not good.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;326&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;google-ad-placeholder between-p&quot; data-ad-height=&quot;any&quot; data-ad-pos=&quot;between-p&quot; data-ad-width=&quot;any&quot; data-dcnode-id=&quot;325&quot;&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;324&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;318&quot;&gt;&lt;span data-dcnode-id=&quot;323&quot; instrument_node=&quot;&quot;&gt;The Mexican American Anti Defamation Committee understandably had a problem with this, and in 1971,&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;320&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nytimes.com/1971/01/01/archives/damage-suit-scores-frito-bandito-ads.html&quot; target=&quot;_blank&quot;&gt;&lt;em data-dcnode-id=&quot;321&quot;&gt;&lt;span data-dcnode-id=&quot;322&quot; instrument_node=&quot;&quot;&gt;The New York Times&lt;/span&gt;&lt;/em&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;319&quot; instrument_node=&quot;&quot;&gt; reported that they were filing a&amp;nbsp;class-action suit against the Frito Bandito mascot for the sum of $610 million. The Frito Bandito soon got ripped off the air, whereupon he was replaced by campaigns like the whole &quot;muncha buncha Fritos&quot; thing.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;317&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;316&quot;&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;315&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;313&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;293&quot;&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;288&quot;&gt;&lt;span data-dcnode-id=&quot;292&quot; instrument_node=&quot;&quot;&gt;Budweiser likes to proclaim itself the &quot;king of beers,&quot; but &lt;/span&gt;&lt;a data-dcnode-id=&quot;290&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.fool.com/investing/2020/01/25/this-mexican-beer-is-now-even-bigger-than-budweise.aspx&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;291&quot; instrument_node=&quot;&quot;&gt;slipping sales&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;289&quot; instrument_node=&quot;&quot;&gt; in the last few years say otherwise. Aside from the eternal debate regarding Budweiser's watery taste, everyone can agree that they've put out some highly memorable&amp;nbsp;ad campaigns over the years. Too memorable, one could say, given that their mascots keep becoming popular with underage drinkers.&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;287&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;google-ad-placeholder between-p&quot; data-ad-height=&quot;any&quot; data-ad-pos=&quot;between-p&quot; data-ad-width=&quot;any&quot; data-dcnode-id=&quot;286&quot;&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;285&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;276&quot;&gt;&lt;span data-dcnode-id=&quot;284&quot; instrument_node=&quot;&quot;&gt;The first notable occasion wherein this happened was during the 1987 Super Bowl, according to &lt;/span&gt;&lt;a data-dcnode-id=&quot;281&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.businessinsider.com/who-is-bud-light-dog-spuds-mackenzie&quot; target=&quot;_blank&quot;&gt;&lt;em data-dcnode-id=&quot;282&quot;&gt;&lt;span data-dcnode-id=&quot;283&quot; instrument_node=&quot;&quot;&gt;Business Insider&lt;/span&gt;&lt;/em&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;280&quot; instrument_node=&quot;&quot;&gt;, with the introduction of their new doggie mascot Spuds MacKenzie, the partying Bull Terrier. Spuds soon appeared everywhere, spiking Bud Light's sales up 20 percent. Soon enough, Spuds got the attention of Senator Strom Thurmond, who raised arguments that promotional materials like a Spuds MacKenzie doll seemed an awful lot like &lt;/span&gt;&lt;a data-dcnode-id=&quot;278&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.mashed.com/125273/the-untold-truth-of-budweiser/&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;279&quot; instrument_node=&quot;&quot;&gt;Budweiser&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;277&quot; instrument_node=&quot;&quot;&gt; was marketing to kids. Mothers Against Drunk Driving followed suit. So did schools, which started banning Spuds merchandise ... though really, who sends their first grader to school in a beer T-shirt? Anyway, by 1989, Spuds retired, though his ethereal ghost would later appear in a 2019 commercial.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;275&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;google-ad-placeholder between-p&quot; data-ad-height=&quot;any&quot; data-ad-pos=&quot;between-p&quot; data-ad-width=&quot;any&quot; data-dcnode-id=&quot;274&quot;&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;273&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;263&quot;&gt;&lt;span data-dcnode-id=&quot;272&quot; instrument_node=&quot;&quot;&gt;This same cycle repeated in the '90s, &lt;/span&gt;&lt;a data-dcnode-id=&quot;269&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sfgate.com/business/article/Budweiser-s-Frogs-Beat-Out-Smokey-In-Study-of-Kids-2985200.php&quot; target=&quot;_blank&quot;&gt;&lt;em data-dcnode-id=&quot;270&quot;&gt;&lt;span data-dcnode-id=&quot;271&quot; instrument_node=&quot;&quot;&gt;SF Gate&lt;/span&gt;&lt;/em&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;268&quot; instrument_node=&quot;&quot;&gt; says, with the Budweiser frogs. You remember those guys, the ones that ribbited &quot;Bud&quot; and &quot;Weis&quot; and &quot;Er,&quot; yeah? So does every other '90s kid, and a 1996 study found that children recognized the Budweiser frogs just as much as Bugs Bunny and Smokey the Bear. Budweiser disputed this, but as &lt;/span&gt;&lt;a data-dcnode-id=&quot;265&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.businessinsider.com/how-budweiser-became-the-king-of-beers-an-evolution-of-advertising-2012-3%23but-even-the-frogs-caused-some-controversy-9&quot; target=&quot;_blank&quot;&gt;&lt;em data-dcnode-id=&quot;266&quot;&gt;&lt;span data-dcnode-id=&quot;267&quot; instrument_node=&quot;&quot;&gt;Business Insider&lt;/span&gt;&lt;/em&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;264&quot; instrument_node=&quot;&quot;&gt; points out, they still phased out the frogs.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;262&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;261&quot;&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;260&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;258&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;256&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;news-article&quot; data-dcnode-id=&quot;201&quot;&gt;&lt;span data-dcnode-id=&quot;255&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;img alt=&quot;Ronald McDonald, controversial corporate mascot&quot; class=&quot;gallery-image lazyload&quot; data-dcnode-id=&quot;245&quot; data-lazy-src=&quot;https://www.grunge.com/img/gallery/the-most-controversial-corporate-mascots-in-history/ronald-mcdonald-doesnt-look-so-happy-anymore-1582836356.jpg&quot; data-post-id=&quot;191221&quot; data-slide-num=&quot;8&quot; data-slide-title=&quot;The Most Controversial Corporate Mascots In History: Ronald McDonald doesn't look so happy anymore&quot; data-slide-url=&quot;https://www.grunge.com/191221/the-most-controversial-corporate-mascots-in-history/slide/ronald-mcdonald-doesnt-look-so-happy-anymore/&quot; height=&quot;439&quot; src=&quot;data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=&quot; width=&quot;780&quot;&gt;&lt;span data-dcnode-id=&quot;244&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;div class=&quot;columns-holder&quot; data-dcnode-id=&quot;203&quot;&gt;&lt;span data-dcnode-id=&quot;236&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;235&quot;&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;230&quot;&gt;&lt;span data-dcnode-id=&quot;234&quot; instrument_node=&quot;&quot;&gt;Wait, when did &lt;/span&gt;&lt;a data-dcnode-id=&quot;232&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.grunge.com/42971/weird-history-ronald-mcdonald/&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;233&quot; instrument_node=&quot;&quot;&gt;Ronald McDonald become controversial&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;231&quot; instrument_node=&quot;&quot;&gt;? It's a recent phenomenon, for sure, but it makes more sense than you think. Besides, haven't you noticed that this clowny fool isn't appearing in McDonald's commercials anymore?&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;229&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;google-ad-placeholder between-p&quot; data-ad-height=&quot;any&quot; data-ad-pos=&quot;between-p&quot; data-ad-width=&quot;any&quot; data-dcnode-id=&quot;228&quot;&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;227&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;218&quot;&gt;&lt;span data-dcnode-id=&quot;226&quot; instrument_node=&quot;&quot;&gt;Ronald has hit the bricks for a number of reasons, as &lt;/span&gt;&lt;a data-dcnode-id=&quot;223&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.cbr.com/why-mcdonalds-retired-ronald-mcdonald-mascot/&quot; target=&quot;_blank&quot;&gt;&lt;em data-dcnode-id=&quot;224&quot;&gt;&lt;span data-dcnode-id=&quot;225&quot; instrument_node=&quot;&quot;&gt;Comic Book Resources&lt;/span&gt;&lt;/em&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;222&quot; instrument_node=&quot;&quot;&gt; explains, with the foremost one being that as people became increasingly aware of just how unhealthy McDonald's food really is, and — amidst skyrocketing childhood obesity rates in the United States — they also became increasingly uncomfortable with the idea of the fast food giant marketing itself to kids. Which, frankly, they totally &lt;/span&gt;&lt;em data-dcnode-id=&quot;220&quot;&gt;&lt;span data-dcnode-id=&quot;221&quot; instrument_node=&quot;&quot;&gt;were&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;219&quot; instrument_node=&quot;&quot;&gt; doing, whether through playgrounds, Ronald, or Ronald's fellow mascots like the Hamburglar. By the 2010s, the pressure exerted by groups like Corporate Accountability International convinced McDonald's to put their old mascot in the backseat in favor of new, more adult-targeted campaigns like &quot;I'm lovin' it.&quot;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;217&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;google-ad-placeholder between-p&quot; data-ad-height=&quot;any&quot; data-ad-pos=&quot;between-p&quot; data-ad-width=&quot;any&quot; data-dcnode-id=&quot;216&quot;&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;215&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;207&quot;&gt;&lt;span data-dcnode-id=&quot;214&quot; instrument_node=&quot;&quot;&gt;However, what might've really killed the clown, in the end, was the cultural shift that happened wherein characters like the Joker and Pennywise taught kids to think of clowns as terrifying, demonic creatures instead of fun pranksters. Widespread&amp;nbsp;coulrophobia&amp;nbsp;only worsened in 2016, when a rash of creepy clowns were sighted all over the U.S., often at night, and sometimes carrying weapons. After the clown panic went viral, McDonald's&amp;nbsp;retired their clown a &lt;/span&gt;&lt;a data-dcnode-id=&quot;212&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//hellogiggles.com/news/mcdonalds-is-retiring-ronald-mcdonald-for-an-understandable-reason/&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;213&quot; instrument_node=&quot;&quot;&gt;bit more officially&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;211&quot; instrument_node=&quot;&quot;&gt;, though his name remains tied to&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;209&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rmhc.org/&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;210&quot; instrument_node=&quot;&quot;&gt;Ronald McDonald House Charities&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;208&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;206&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;205&quot;&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;204&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;202&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;/picture&gt;&lt;span data-dcnode-id=&quot;186&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;a data-dcnode-id=&quot;183&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//commons.wikimedia.org/wiki/File%3ASambos.jpg&quot; target=&quot;_blank&quot;&gt;&lt;span class=&quot;gallery-image-credit&quot; data-dcnode-id=&quot;184&quot;&gt;&lt;span data-dcnode-id=&quot;185&quot; instrument_node=&quot;&quot;&gt;Antandrus / Wikimedia Commons&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;182&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;180&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;columns-holder added-content&quot; data-dcnode-id=&quot;158&quot;&gt;&lt;span data-dcnode-id=&quot;179&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;178&quot;&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;169&quot;&gt;&lt;span data-dcnode-id=&quot;177&quot; instrument_node=&quot;&quot;&gt;If you're familiar with the racial slur &quot;&lt;/span&gt;&lt;a data-dcnode-id=&quot;175&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.dictionary.com/browse/sambo&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;176&quot; instrument_node=&quot;&quot;&gt;Sambo&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;174&quot; instrument_node=&quot;&quot;&gt;,&quot; sometimes used to refer to black men and/or men of mixed ancestry, you might be shocked (or not) to learn that in the recent past, people in the United States flocked to a restaurant named Sambo's, which used a mascot — a cartoon image of a young boy, named Little Black Sambo, a la the infamous Helen Bannerman book — that played up the name's associations. According to &lt;/span&gt;&lt;a data-dcnode-id=&quot;171&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.thedailybeast.com/pancakes-and-pickaninnies-the-saga-of-sambos-the-racist-restaurant-chain-america-once-loved&quot; target=&quot;_blank&quot;&gt;&lt;em data-dcnode-id=&quot;172&quot;&gt;&lt;span data-dcnode-id=&quot;173&quot; instrument_node=&quot;&quot;&gt;The Daily Beast&lt;/span&gt;&lt;/em&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;170&quot; instrument_node=&quot;&quot;&gt;, Sambo's could be found in 47 states, at 1,117 locations, and this unnamed mascot was at every one of them.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;168&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;google-ad-placeholder between-p&quot; data-ad-height=&quot;any&quot; data-ad-pos=&quot;between-p&quot; data-ad-width=&quot;any&quot; data-dcnode-id=&quot;167&quot;&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;166&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;164&quot;&gt;&lt;span data-dcnode-id=&quot;165&quot; instrument_node=&quot;&quot;&gt;Weirdly enough, the concept behind the name wasn't originally connected to the racist epithet. First opened by Sam Battistone Sr. and Newell Bohnett in Santa Barbara, California, in 1947 as a place for cheap pancakes and cheaper coffee, Sambo's was a portmanteau of the founders' names: &quot;Sam&quot; from Battistone and &quot;Bo&quot; from Bohnett. Once established, though, Sambo's swiftly adopted the offensive connotations, and the restaurant's walls were decorated with painted wall murals of their mascot going on adventures.&amp;nbsp;During the Civil Rights Movement, marginalized communities began to speak up against the restaurant's imagery, and by the '70s, Sambo's expansion attempts wound up in lawsuits from states like Connecticut and Michigan, garnering the involvement of the Human Rights Commission and the NAACP. Eventually, the controversy grew so hot that Sambo's started downplaying their past, trying out different names, and finally, filed for bankruptcy in 1982.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;163&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;160&quot;&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;159&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;157&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;155&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;picture data-dcnode-id=&quot;142&quot;&gt;&lt;span data-dcnode-id=&quot;149&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;source data-dcnode-id=&quot;148&quot; data-srcset=&quot;https://www.grunge.com/img/gallery/the-most-controversial-corporate-mascots-in-history/from-dumb-commercial-to-hate-symbol-1582836356.webp&quot; media=&quot;(min-width: 429px)&quot; type=&quot;image/webp&quot;&gt;&lt;span data-dcnode-id=&quot;147&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;source data-dcnode-id=&quot;146&quot; data-srcset=&quot;https://www.grunge.com/img/gallery/the-most-controversial-corporate-mascots-in-history/from-dumb-commercial-to-hate-symbol-1582836356.sm.webp&quot; media=&quot;(max-width: 428px)&quot; type=&quot;image/webp&quot;&gt;&lt;span data-dcnode-id=&quot;145&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;img alt=&quot;Mac Tonight, controversial corporate mascot&quot; class=&quot;gallery-image lazyload&quot; data-dcnode-id=&quot;144&quot; data-lazy-src=&quot;https://www.grunge.com/img/gallery/the-most-controversial-corporate-mascots-in-history/from-dumb-commercial-to-hate-symbol-1582836356.jpg&quot; data-post-id=&quot;191221&quot; data-slide-num=&quot;10&quot; data-slide-title=&quot;The Most Controversial Corporate Mascots In History: From dumb corporate mascot to hate symbol&quot; data-slide-url=&quot;https://www.grunge.com/191221/the-most-controversial-corporate-mascots-in-history/slide/from-dumb-corporate-mascot-to-hate-symbol/&quot; height=&quot;437&quot; src=&quot;data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=&quot; width=&quot;780&quot;&gt;&lt;span data-dcnode-id=&quot;143&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/picture&gt;&lt;span data-dcnode-id=&quot;141&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;139&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;columns-holder&quot; data-dcnode-id=&quot;109&quot;&gt;&lt;span data-dcnode-id=&quot;138&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;137&quot;&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;125&quot;&gt;&lt;span data-dcnode-id=&quot;136&quot; instrument_node=&quot;&quot;&gt;Not all mascots are born problematic. Some of them start out okay, then get transformed by the internet, to the point of being unrecognizable from their past selves. Take Mac Tonight, the weird, moon-headed musician that McDonald's briefly tried on as a mascot in the '80s, according to &lt;/span&gt;&lt;a data-dcnode-id=&quot;133&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.mentalfloss.com/article/70295/man-moon-how-mac-tonight-became-burger-king&quot; target=&quot;_blank&quot;&gt;&lt;em data-dcnode-id=&quot;134&quot;&gt;&lt;span data-dcnode-id=&quot;135&quot; instrument_node=&quot;&quot;&gt;Mental Floss&lt;/span&gt;&lt;/em&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;132&quot; instrument_node=&quot;&quot;&gt;. With his slick tuxedo and talented piano skills, Mac Tonight entertained the world from atop a cloud, in a clear effort at marketing to nostalgic baby boomers, i.e., &quot;Don't be afraid of going to McDonald's after dark, folks, it's a swell ol' place.&quot; Played by &lt;/span&gt;&lt;a data-dcnode-id=&quot;127&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.looper.com/98774/youve-seen-amphibian-man-shape-water/&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;131&quot; instrument_node=&quot;&quot;&gt;Doug Jones of &lt;/span&gt;&lt;em data-dcnode-id=&quot;129&quot;&gt;&lt;span data-dcnode-id=&quot;130&quot; instrument_node=&quot;&quot;&gt;The Shape of Water&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;128&quot; instrument_node=&quot;&quot;&gt; fame&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;126&quot; instrument_node=&quot;&quot;&gt;, the lunar crooner was a huge hit for a few years, but he eventually got tied up in a lawsuit from Bobby Darin's estate, who claimed McDonald's had stolen his style and demanded $10 million in damages. The charges were dropped, but by then, Mac Tonight was deader than moon dust.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;124&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;google-ad-placeholder between-p&quot; data-ad-height=&quot;any&quot; data-ad-pos=&quot;between-p&quot; data-ad-width=&quot;any&quot; data-dcnode-id=&quot;123&quot;&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;122&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;113&quot;&gt;&lt;span data-dcnode-id=&quot;121&quot; instrument_node=&quot;&quot;&gt;Unfortunately, he came back in 21st century, but like Pepe the Frog, he was swiftly warped beyond recognition by the alt-right. Since the 2010s, Mac Tonight has been retooled into Moon Man, a white supremacist rapper who's appeared in numerous internet videos, according to &lt;/span&gt;&lt;a data-dcnode-id=&quot;118&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.salon.com/2016/10/25/meet-moon-man-the-alt-rights-new-racist-rap-sensation-borrowed-from-1980s-mcdonalds-ads/&quot; target=&quot;_blank&quot;&gt;&lt;em data-dcnode-id=&quot;119&quot;&gt;&lt;span data-dcnode-id=&quot;120&quot; instrument_node=&quot;&quot;&gt;Salon&lt;/span&gt;&lt;/em&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;117&quot; instrument_node=&quot;&quot;&gt;, often calling out for the abuse and/or murder of Black Americans, Jewish people, women, and other marginalized groups. As a result, this former McDonald's mascot has now been classified as a hate symbol by the &lt;/span&gt;&lt;a data-dcnode-id=&quot;115&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.adl.org/education/references/hate-symbols/moon-man&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;116&quot; instrument_node=&quot;&quot;&gt;Anti-Defamation League&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;114&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;112&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;111&quot;&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;110&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;108&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;106&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;news-article&quot; data-dcnode-id=&quot;51&quot;&gt;&lt;span data-dcnode-id=&quot;105&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 class=&quot;&quot; data-dcnode-id=&quot;103&quot;&gt;&lt;span data-dcnode-id=&quot;104&quot; instrument_node=&quot;&quot;&gt;The Taco Bell chihuahua got sued into the doghouse&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;102&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;slide-key image-holder gallery-image-holder credit-image-wrap&quot; data-dcnode-id=&quot;91&quot; data-post-id=&quot;191221&quot; data-slide-num=&quot;11&quot;&gt;&lt;span data-dcnode-id=&quot;101&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;picture data-dcnode-id=&quot;93&quot;&gt;&lt;span data-dcnode-id=&quot;100&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;source data-dcnode-id=&quot;99&quot; data-srcset=&quot;https://www.grunge.com/img/gallery/the-most-controversial-corporate-mascots-in-history/the-taco-bell-chihuahua-got-sued-into-the-doghouse-1582836356.webp&quot; media=&quot;(min-width: 429px)&quot; type=&quot;image/webp&quot;&gt;&lt;span data-dcnode-id=&quot;98&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;source data-dcnode-id=&quot;97&quot; data-srcset=&quot;https://www.grunge.com/img/gallery/the-most-controversial-corporate-mascots-in-history/the-taco-bell-chihuahua-got-sued-into-the-doghouse-1582836356.sm.webp&quot; media=&quot;(max-width: 428px)&quot; type=&quot;image/webp&quot;&gt;&lt;span data-dcnode-id=&quot;96&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;img alt=&quot;Gidget Taco Bell dog, controversial corporate mascot&quot; class=&quot;gallery-image lazyload&quot; data-dcnode-id=&quot;95&quot; data-lazy-src=&quot;https://www.grunge.com/img/gallery/the-most-controversial-corporate-mascots-in-history/the-taco-bell-chihuahua-got-sued-into-the-doghouse-1582836356.jpg&quot; data-post-id=&quot;191221&quot; data-slide-num=&quot;11&quot; data-slide-title=&quot;The Most Controversial Corporate Mascots In History: The Taco Bell chihuahua got sued into the doghouse&quot; data-slide-url=&quot;https://www.grunge.com/191221/the-most-controversial-corporate-mascots-in-history/slide/the-taco-bell-chihuahua-got-sued-into-the-doghouse/&quot; height=&quot;439&quot; src=&quot;data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=&quot; width=&quot;780&quot;&gt;&lt;span data-dcnode-id=&quot;94&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/picture&gt;&lt;span data-dcnode-id=&quot;92&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;90&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;columns-holder added-content&quot; data-dcnode-id=&quot;53&quot;&gt;&lt;span data-dcnode-id=&quot;89&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;88&quot;&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;78&quot;&gt;&lt;span data-dcnode-id=&quot;87&quot; instrument_node=&quot;&quot;&gt;You don't need to have spent any time in Mexico to figure out that Taco Bell is about as far removed from actual Mexican cuisine as Pizza Hut is from Italian. Despite this, the company has regularly appropriated Mexican imagery or used &lt;/span&gt;&lt;a data-dcnode-id=&quot;85&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//quemas.mamaslatinas.com/food_fiestas/100716/taco_bells_new_spanglish_slogan&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;86&quot; instrument_node=&quot;&quot;&gt;weird Spanglish slogans&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;84&quot; instrument_node=&quot;&quot;&gt; to market itself. One advertising campaign that particularly set people off, though, was also Taco Bell's most successful&amp;nbsp;— the so-called Taco Bell Chihuahua, a Mexican-accented pup who would often proclaim, &quot;Yo quiero Taco Bell.&quot; The League of United Latin American Citizens took issue with the fast food canine, according to &lt;/span&gt;&lt;a data-dcnode-id=&quot;80&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.latimes.com/archives/la-xpm-1998-mar-29-ls-33753-story.html&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;83&quot; instrument_node=&quot;&quot;&gt;the &lt;/span&gt;&lt;em data-dcnode-id=&quot;81&quot;&gt;&lt;span data-dcnode-id=&quot;82&quot; instrument_node=&quot;&quot;&gt;Los Angeles Times&lt;/span&gt;&lt;/em&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;79&quot; instrument_node=&quot;&quot;&gt;, by pointing out that the imagery exacerbated existing racial stereotypes. The argument, in the words of LULAC president Gabriel Cazares, was that,&amp;nbsp;&quot;Mexican Americans are treated like dogs, they have to work like dogs, and now they're being portrayed as dogs.&quot;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;77&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;google-ad-placeholder between-p&quot; data-ad-height=&quot;any&quot; data-ad-pos=&quot;between-p&quot; data-ad-width=&quot;any&quot; data-dcnode-id=&quot;76&quot;&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;75&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;69&quot;&gt;&lt;span data-dcnode-id=&quot;74&quot; instrument_node=&quot;&quot;&gt;In the end, oddly, it wasn't racial controversy that cost Taco Bell their dog but a breach of contract. In 2009, &lt;/span&gt;&lt;a data-dcnode-id=&quot;71&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.seattletimes.com/nation-world/taco-bell-loses-42-million-chihuahua-ruling/&quot; target=&quot;_blank&quot;&gt;&lt;em data-dcnode-id=&quot;72&quot;&gt;&lt;span data-dcnode-id=&quot;73&quot; instrument_node=&quot;&quot;&gt;The Seattle Times&lt;/span&gt;&lt;/em&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;70&quot; instrument_node=&quot;&quot;&gt; reported that a decade-long rights dispute between the fast food company and the mascot's creators, Thomas Rinks and Joseph Shields, had ended with Taco Bell being ordered to award $42 million in damages to the two men.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;68&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;57&quot;&gt;&lt;span data-dcnode-id=&quot;67&quot; instrument_node=&quot;&quot;&gt;The dog herself, Gidget, died that same year, at the age of 15. According to &lt;/span&gt;&lt;a data-dcnode-id=&quot;65&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.cnn.com/2009/SHOWBIZ/TV/07/23/taco.bell.dog.dies/index.html&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;66&quot; instrument_node=&quot;&quot;&gt;CNN&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;64&quot; instrument_node=&quot;&quot;&gt;, she also appeared in films like &lt;/span&gt;&lt;em data-dcnode-id=&quot;62&quot;&gt;&lt;span data-dcnode-id=&quot;63&quot; instrument_node=&quot;&quot;&gt;Beverly Hills Chihuahua&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;61&quot; instrument_node=&quot;&quot;&gt; and &lt;/span&gt;&lt;em data-dcnode-id=&quot;59&quot;&gt;&lt;span data-dcnode-id=&quot;60&quot; instrument_node=&quot;&quot;&gt;Legally Blonde&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;58&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;56&quot; instrument_node=&quot;&quot;&gt;
