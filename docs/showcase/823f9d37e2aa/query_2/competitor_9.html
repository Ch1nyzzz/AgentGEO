&lt;/span&gt;&lt;p data-dcnode-id=&quot;2668&quot;&gt;&lt;span data-dcnode-id=&quot;2681&quot; instrument_node=&quot;&quot;&gt;In a pop culture world where yesteryear's edgiest animated shows like &lt;/span&gt;&lt;em data-dcnode-id=&quot;2679&quot;&gt;&lt;span data-dcnode-id=&quot;2680&quot; instrument_node=&quot;&quot;&gt;The Simpsons&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2678&quot; instrument_node=&quot;&quot;&gt; and &lt;/span&gt;&lt;em data-dcnode-id=&quot;2676&quot;&gt;&lt;span data-dcnode-id=&quot;2677&quot; instrument_node=&quot;&quot;&gt;Family Guy&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2675&quot; instrument_node=&quot;&quot;&gt; have respectively lost their bite, Comedy Central's &lt;/span&gt;&lt;em data-dcnode-id=&quot;2673&quot;&gt;&lt;span data-dcnode-id=&quot;2674&quot; instrument_node=&quot;&quot;&gt;South Park&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2672&quot; instrument_node=&quot;&quot;&gt; continues to find way to create controversy with just 22 minutes a week. That's quite an accomplishment for any show, let alone one that's been on the air for 23 seasons. Yet creators Trey Parker and Matt Stone continue to find ways to ruffle feathers and drum up condemnations from celebrities, religious leaders and even entire countries. (Just look at how its recent episode &quot;Band in China&quot; got the show &lt;/span&gt;&lt;a class=&quot;hawk-link-parsed&quot; data-component-tracked=&quot;1&quot; data-dcnode-id=&quot;2670&quot; data-original-url=&quot;https://www.cinemablend.com/television/2481744/south-park-creators-react-to-china-banning-series-after-band-in-china-episode&quot; data-url=&quot;https://www.cinemablend.com/television/2481744/south-park-creators-react-to-china-banning-series-after-band-in-china-episode&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.cinemablend.com/television/2481744/south-park-creators-react-to-china-banning-series-after-band-in-china-episode&quot;&gt;&lt;span data-dcnode-id=&quot;2671&quot; instrument_node=&quot;&quot;&gt;legitimately banned in China&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2669&quot; instrument_node=&quot;&quot;&gt;.)&lt;/span&gt;&lt;/p&gt;&lt;div class=&quot;ad-unit&quot; data-dcnode-id=&quot;2667&quot; id=&quot;ad-unit-1&quot;&gt;&lt;/div&gt;&lt;p data-dcnode-id=&quot;2659&quot;&gt;&lt;span data-dcnode-id=&quot;2666&quot; instrument_node=&quot;&quot;&gt;The secret, it seems, is to be as offensive as humanly possible to everything and everyone while ensuring that absolutely nothing is off limits. Targeting the entire world has gained &lt;/span&gt;&lt;em data-dcnode-id=&quot;2664&quot;&gt;&lt;span data-dcnode-id=&quot;2665&quot; instrument_node=&quot;&quot;&gt;South Park&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2663&quot; instrument_node=&quot;&quot;&gt; a lot of outspoken critics over the years, and has sparked a lot of controversy as well. In no particular order, here are some of the most offensive and infamous &lt;/span&gt;&lt;em data-dcnode-id=&quot;2661&quot;&gt;&lt;span data-dcnode-id=&quot;2662&quot; instrument_node=&quot;&quot;&gt;South Park&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2660&quot; instrument_node=&quot;&quot;&gt; episodes that really stirred the pot and kept people talking.&lt;/span&gt;&lt;/p&gt;&lt;div class=&quot;bordeaux-slot&quot; data-dcnode-id=&quot;2658&quot; data-feat-ref=&quot;bordeaux-feat-id-96&quot; id=&quot;bordeaux-static-slot-5&quot; style=&quot;display: flex; flex-direction: column; margin: auto;&quot;&gt;&lt;/div&gt;&lt;div class=&quot;bordeaux-slot&quot; data-dcnode-id=&quot;2657&quot; data-feat-ref=&quot;bordeaux-feat-id-105&quot; id=&quot;bordeaux-static-slot-14&quot; style=&quot;display: flex; flex-direction: column; margin: auto;&quot;&gt;&lt;/div&gt;&lt;figure class=&quot;van-image-figure pull-&quot; data-bordeaux-image-check=&quot;&quot; data-dcnode-id=&quot;2649&quot;&gt;&lt;div class=&quot;image-full VGa-650-80.png 650w, https://cdn.mos.cms.futurecdn.net/8JeFkeBCeKwDB3NLusHVGa-970-80.png 970w&quot; type=&quot;image/png&quot;&gt;&lt;img alt=&quot;It Hits The Fan South Park&quot; class=&quot;pull- lazy-image-van optional-image loaded&quot; data-dcnode-id=&quot;1962&quot; data-ll-status=&quot;loaded&quot; data-normal=&quot;https://vanilla.futurecdn.net/cinemablend/media/img/missing-image.svg&quot; data-original-mos=&quot;https://cdn.mos.cms.futurecdn.net/8JeFkeBCeKwDB3NLusHVGa.png&quot; data-pin-media=&quot;https://cdn.mos.cms.futurecdn.net/8JeFkeBCeKwDB3NLusHVGa.png&quot; data-srcset=&quot;https://cdn.mos.cms.futurecdn.net/8JeFkeBCeKwDB3NLusHVGa-320-80.png 320w, https://cdn.mos.cms.futurecdn.net/8JeFkeBCeKwDB3NLusHVGa-650-80.png 650w, https://cdn.mos.cms.futurecdn.net/8JeFkeBCeKwDB3NLusHVGa-970-80.png 970w&quot; loading=&quot;lazy&quot; onerror=&quot;if(this.src &amp;amp;&amp;amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)&quot; sizes=&quot;(min-width: 1000px) 970px, calc(100vw - 40px)&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//vanilla.futurecdn.net/cinemablend/media/img/missing-image.svg&amp;amp;raw&quot; srcset=&quot;https://cdn.mos.cms.futurecdn.net/8JeFkeBCeKwDB3NLusHVGa-320-80.png 320w, https://cdn.mos.cms.futurecdn.net/8JeFkeBCeKwDB3NLusHVGa-650-80.png 650w, https://cdn.mos.cms.futurecdn.net/8JeFkeBCeKwDB3NLusHVGa-970-80.png 970w&quot;&gt;&lt;/picture&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;/figure&gt;&lt;h2 data-dcnode-id=&quot;1955&quot; id=&quot;34-it-hits-the-fan-34-season-5-episode-1-3&quot;&gt;&lt;span data-dcnode-id=&quot;1956&quot; instrument_node=&quot;&quot;&gt;&quot;It Hits The Fan&quot; Season 5, Episode 1&lt;/span&gt;&lt;/h2&gt;&lt;p data-dcnode-id=&quot;1947&quot;&gt;&lt;span data-dcnode-id=&quot;1954&quot; instrument_node=&quot;&quot;&gt;It sounds crazy today to think that someone saying the word &quot;shit&quot; on primetime television was controversial – and on cable, no less – but 2001 was a different time. The entertainment world was, at the time, making a big deal over Mark Harmon's character saying the S-bomb on &lt;/span&gt;&lt;em data-dcnode-id=&quot;1952&quot;&gt;&lt;span data-dcnode-id=&quot;1953&quot; instrument_node=&quot;&quot;&gt;Chicago Hope&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1951&quot; instrument_node=&quot;&quot;&gt;, so &lt;/span&gt;&lt;em data-dcnode-id=&quot;1949&quot;&gt;&lt;span data-dcnode-id=&quot;1950&quot; instrument_node=&quot;&quot;&gt;South Park&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1948&quot; instrument_node=&quot;&quot;&gt; wanted to see what would happen if it delivered an episode where &quot;shit&quot; was said 162 times.&lt;/span&gt;&lt;/p&gt;&lt;div class=&quot;ad-unit&quot; data-dcnode-id=&quot;1946&quot; id=&quot;ad-unit-2&quot;&gt;&lt;/div&gt;&lt;p data-dcnode-id=&quot;1935&quot;&gt;&lt;span data-dcnode-id=&quot;1945&quot; instrument_node=&quot;&quot;&gt;In all honesty, the backlash and controversy surrounding this episode was relatively light in terms of stereotypical &lt;/span&gt;&lt;em data-dcnode-id=&quot;1943&quot;&gt;&lt;span data-dcnode-id=&quot;1944&quot; instrument_node=&quot;&quot;&gt;South Park&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1942&quot; instrument_node=&quot;&quot;&gt; reactions, at least outside of TV censors. Though the fallout wasn't massive, it's fair to say &lt;/span&gt;&lt;em data-dcnode-id=&quot;1940&quot;&gt;&lt;span data-dcnode-id=&quot;1941&quot; instrument_node=&quot;&quot;&gt;South Park&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1939&quot; instrument_node=&quot;&quot;&gt;'s episode played a role in normalizing &quot;shit&quot; being said on television, to the point that it's uttered with uncensored frequency on most cable networks, and even gets some broadcast usage. Most &lt;/span&gt;&lt;em data-dcnode-id=&quot;1937&quot;&gt;&lt;span data-dcnode-id=&quot;1938&quot; instrument_node=&quot;&quot;&gt;South Park&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1936&quot; instrument_node=&quot;&quot;&gt; fans would probably consider that a win.&lt;/span&gt;&lt;/p&gt;&lt;div class=&quot;bordeaux-slot&quot; data-dcnode-id=&quot;1934&quot; data-feat-ref=&quot;bordeaux-feat-id-98&quot; id=&quot;bordeaux-static-slot-7&quot; style=&quot;display: flex; flex-direction: column; margin: auto;&quot;&gt;&lt;/div&gt;&lt;div class=&quot;bordeaux-slot&quot; data-dcnode-id=&quot;1933&quot; data-feat-ref=&quot;bordeaux-feat-id-107&quot; id=&quot;bordeaux-static-slot-16&quot; style=&quot;display: flex; flex-direction: column; margin: auto;&quot;&gt;&lt;/div&gt;&lt;figure class=&quot;van-image-figure pull-&quot; data-bordeaux-image-check=&quot;&quot; data-dcnode-id=&quot;1925&quot;&gt;&lt;div class=&quot;image-full-width-wrapper&quot; data-dcnode-id=&quot;1926&quot;&gt;&lt;div class=&quot;image-widthsetter&quot; data-dcnode-id=&quot;1927&quot;&gt;&lt;p class=&quot;vanilla-image-block&quot; data-dcnode-id=&quot;1928&quot; style=&quot;padding-top:56.25%;&quot;&gt;&lt;picture data-dcnode-id=&quot;1929&quot;&gt;&lt;source alt=&quot;Proper Condom Use South Park&quot; class=&quot;pull- lazy-image-van optional-image&quot; data-dcnode-id=&quot;1932&quot; data-normal=&quot;https://vanilla.futurecdn.net/cinemablend/media/img/missing-image.svg&quot; data-original-mos=&quot;https://cdn.mos.cms.futurecdn.net/wvWQoB2uH6ZKsYLErasoUi.jpg&quot; data-pin-media=&quot;https://cdn.mos.cms.futurecdn.net/wvWQoB2uH6ZKsYLErasoUi.jpg&quot; data-srcset=&quot;https://cdn.mos.cms.futurecdn.net/wvWQoB2uH6ZKsYLErasoUi-320-80.jpg.webp 320w, https://cdn.mos.cms.futurecdn.net/wvWQoB2uH6ZKsYLErasoUi-650-80.jpg.webp 650w, https://cdn.mos.cms.futurecdn.net/wvWQoB2uH6ZKsYLErasoUi-970-80.jpg.webp 970w&quot; onerror=&quot;if(this.src &amp;amp;&amp;amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)&quot; sizes=&q  advocacy groups were obviously going to have something to say about it.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1907&quot;&gt;&lt;span data-dcnode-id=&quot;1914&quot; instrument_node=&quot;&quot;&gt;&quot;Proper Condom Use&quot; was deemed too controversial to air in some countries. For example, Sky One in Britain refused to broadcast the episode to audiences. While Comedy Central was cool with it in America, the Parents Television Council cited the episode as an example of the show's &lt;/span&gt;&lt;a class=&quot;hawk-link-parsed&quot; data-component-tracked=&quot;1&quot; data-dcnode-id=&quot;1912&quot; data-original-url=&quot;https://www.cinemablend.com/television/2463459/south-park-dropped-an-uncensored-c-bomb-in-season-finale&quot; data-url=&quot;https://www.cinemablend.com/television/2463459/south-park-dropped-an-uncensored-c-bomb-in-season-finale&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.cinemablend.com/television/2463459/south-park-dropped-an-uncensored-c-bomb-in-season-finale&quot;&gt;&lt;span data-dcnode-id=&quot;1913&quot; instrument_node=&quot;&quot;&gt;explicit vulgarity&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1911&quot; instrument_node=&quot;&quot;&gt;, and part of the reason it labeled &lt;/span&gt;&lt;em data-dcnode-id=&quot;1909&quot;&gt;&lt;span data-dcnode-id=&quot;1910&quot; instrument_node=&quot;&quot;&gt;South Park&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1908&quot; instrument_node=&quot;&quot;&gt; episodes as being &quot;dangerous to the democracy.&quot;&lt;/span&gt;&lt;/p&gt;&lt;div class=&quot;bordeaux-slot&quot; data-dcnode-id=&quot;1906&quot; data-feat-ref=&quot;bordeaux-feat-id-99&quot; id=&quot;bordeaux-static-slot-8&quot; style=&quot;display: flex; flex-direction: column; margin: auto;&quot;&gt;&lt;/div&gt;&lt;div class=&quot;bordeaux-slot&quot; data-dcnode-id=&quot;1905&quot; data-feat-ref=&quot;bordeaux-feat-id-108&quot; id=&quot;bordeaux-static-slo aw&quot; srcset=&quot;https://cdn.mos.cms.futurecdn.net/BGxNyFrFxC4hedvYA57Ba5-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/BGxNyFrFxC4hedvYA57Ba5-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/BGxNyFrFxC4hedvYA57Ba5-970-80.jpg 970w&quot;&gt;&lt;/picture&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;/figure&gt;&lt;h2 data-dcnode-id=&quot;1895&quot; id=&quot;34-bloody-mary-34-season-9-episode-14-3&quot;&gt;&lt;span data-dcnode-id=&quot;1896&quot; instrument_node=&quot;&quot;&gt;&quot;Bloody Mary&quot; Season 9, Episode 14&lt;/span&gt;&lt;/h2&gt;&lt;p data-dcnode-id=&quot;1890&quot;&gt;&lt;span data-dcnode-id=&quot;1894&quot; instrument_node=&quot;&quot;&gt;Some of the most controversial &lt;/span&gt;&lt;em data-dcnode-id=&quot;1892&quot;&gt;&lt;span data-dcnode-id=&quot;1893&quot; instrument_node=&quot;&quot;&gt;South Park&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1891&quot; instrument_node=&quot;&quot;&gt; episodes poke fun at a religion, and &quot;Bloody Mary&quot; is among the comedy's most controversial. The episode depicts a statue of the Virgin Mary that is believed to be miraculous because it was seemingly bleeding from its anus. Later in the episode, Pope Benedict XVI examined the statue and determined that, because the blood was actually coming out of the statue's vagina, there was no actual miracle performed.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1888&quot;&gt;&lt;span data-dcnode-id=&quot;1889&quot; instrument_node=&quot;&quot;&gt;The episode aired the evening before the Feast of the Immaculate Conception, a holy day of observation in the Catholic Church, and it received rampant criticism from advocacy groups representing the church. Catholic Viacom board member Joseph A. Califano Jr. later issued a statement condemning the episode and vowed to have it reviewed by Viacom's then-President Tom Freston. Other countries had similar controversies, but the episode ultimately prevailed and is available on streaming and DVD to this day.& &lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1870&quot; instrument_node=&quot;&quot;&gt; to Mormonism, as evidenced through &lt;/span&gt;&lt;a class=&quot;hawk-link-parsed&quot; data-component-tracked=&quot;1&quot; data-dcnode-id=&quot;1868&quot; data-original-url=&quot;https://www.cinemablend.com/television/Book-Mormon-Meets-South-Park-Fantastic-Hello-Tribute-Video-64730.html&quot; data-url=&quot;https://www.cinemablend.com/television/Book-Mormon-Meets-South-Park-Fantastic-Hello-Tribute-Video-64730.html&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.cinemablend.com/television/Book-Mormon-Meets-South-Park-Fantastic-Hello-Tribute-Video-64730.html&quot;&gt;&lt;span data-dcnode-id=&quot;1869&quot; instrument_node=&quot;&quot;&gt;their works outside of the show&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1867&quot; instrument_node=&quot;&quot;&gt; like &lt;/span&gt;&lt;em data-dcnode-id=&quot;1865&quot;&gt;&lt;span data-dcnode-id=&quot;1866&quot; instrument_node=&quot;&quot;&gt;Orgazmo&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1864&quot; instrument_node=&quot;&quot;&gt; and &lt;/span&gt;&lt;em data-dcnode-id=&quot;1862&quot;&gt;&lt;span data-dcnode-id=&quot;1863&quot; instrument_node=&quot;&quot;&gt;The Book of Mormon&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1861&quot; instrument_node=&quot;&quot;&gt;. Basically, an episode of Mormonism was inevitably going to happen at some point, and &lt;/span&gt;&lt;em data-dcnode-id=&quot;1859&quot;&gt;&lt;span data-dcnode-id=&quot;1860&quot; instrument_node=&quot;&quot;&gt;South Park&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1858&quot; instrument_node=&quot;&quot;&gt; went all out in riffing on some of the religion's popular beliefs.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1852&quot;&gt;&lt;span data-dcnode-id=&quot;1856&quot; instrument_node=&quot;&quot;&gt;While there were plenty of folks upset about the way Mormons were portrayed in &quot;All About Mormons,&quot; the Church of Latter Day Saints had one of the mildest reactions that any religious organization could have after falling victim to &lt;/span&gt;&lt;em data-dcnode-id=&quot;1854&quot;&gt;&lt;span data-dcnode-id=&quot;1855&quot; instrument_node=&quot;&quot;&gt;South Park&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1853&quot; instrument_node=&quot;&quot;&gt; parody. The Church viewed the episode as a gross misrepresentation of Mormon culture, but something to be ultimately dismissed as a distraction that followers shouldn't acknowledge.&lt;/span&gt;&lt;/p&gt;&lt;div class=&quot;bordeaux-slot&quot; data-dcnode-id=&quot;1851&quot; data-feat-ref=&quot;bordeaux-feat-id-101&quot; id=&quot;bordeaux-static-slot-10&quot; style=&quot;display: flex; flex-direction: column; margin: auto;&quot;&gt;&lt;/div&gt;&lt;div class=&quot;bordeaux-slot&quot; data-dcnode-id=&quot;1850&quot; data-feat-ref=&quot;bordeaux-feat-id-110&quot; id=&quot;bordeaux-static-slot-19&quot; style=&quot;display: flex; flex-direction: column; margin: auto;&quot;&gt;&lt;/div&gt;&lt;figure class=&quot;van-image-figure pull-&quot; data-bordeaux-image-check=&quot;&quot; data-dcnode-id=&quot;1842&quot;&gt;&lt;div class=&quot;image-full-width-wrapper&quot; data-dcnode-id=&quot;1843&quot;&gt;&lt;div class=&quot;image-widthsetter&quot; data-dcnode-id=&quot;1844&quot;&gt;&lt;p class=&quot;vanilla-image-block&quot; data-dcnode-id=&quot;1845&quot; style=&quot;padding-top:56.25%;&quot;&gt;&lt;picture data-dcnode-id=&quot;1846&quot;&gt;&lt;source alt=&quot;201 South Park&quot; class=&quot;pull- lazy-image-van optional-image&quot; data-dcnode-id=&quot;1849&quot; data-normal=&quot;https://vanilla.futurecdn.net/cinemablend/media/img/missing-image.svg&quot; data-original-mos=&quot;https://cdn.mos.cms.futurecdn.net/dRJwEycr9XxBx35f2TFFDJ.jpg&quot; data-pin-media=&quot;https://cdn.mos.cms.futurecdn.net/dRJwEycr9XxBx35f2TFFDJ.jpg&quot; data-srcset=&quot;https://cdn.mos.cms.futur the sort in the show's history. One of the episode's driving storylines was to bring the prophet Muhammad into public view, and the intention was for the &lt;/span&gt;&lt;em data-dcnode-id=&quot;1834&quot;&gt;&lt;span data-dcnode-id=&quot;1835&quot; instrument_node=&quot;&quot;&gt;South Park&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1833&quot; instrument_node=&quot;&quot;&gt; episode to air a depiction of the prophet uncensored, which is considered blasphemous.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1830&quot;&gt;&lt;span data-dcnode-id=&quot;1831&quot; instrument_node=&quot;&quot;&gt;Word of the episode reached the masses before its airing, and radical Muslim groups reacted with threats of violence and retribution against Trey Parker and Matt Stone. One organization, Revolution Muslim, even went so far as to post the addresses of Comedy Central's New York and Los Angeles offices, and said Parker and Stone would probably end up like murdered filimmaker Theo van Gogh for their decision. Comedy Central ended up censoring any references or depiction of Muhammad, but an unedited cut of the episode leaked online and was distributed.&lt;/span&gt;&lt;/p&gt;&lt;div class=&quot;bordeaux-slot&quot; data-dcnode-id=&quot;1829&quot; data-feat-ref=&quot;bordeaux-feat-id-102&quot; id=&quot;bordeaux-static-slot-11&quot; style=&quot;display: flex; flex-direction: column; margin: auto;&quot;&gt;&lt;/div&gt;&lt;div class=&quot;bordeaux-slot&quot; data-dcnode-id=&quot;1828&quot; data-feat-ref=&quot;bordeaux-feat-id-111&quot; id=&quot;bordeaux-static-slot-20&quot; style=&quot;display: flex; flex-direction: column; margin: auto;&quot;&gt;&lt;/div&gt;&lt;figure class=&quot;van-image-figure pull-&quot; data-bordeaux-image-check=&quot;&quot; data-dcnode-id=&quot;1820&quot;&gt;&lt;div class=&quot;image-full-width-wrapper&quot; data-dcnode-id=&quot;1821&quot;&gt;&lt;div class=&quot;image-widthsetter&quot; data-dcnode-id=&quot;1822&quot;&gt;&lt;p class=&quot;vanilla-image-block&quot; data-dcnode-id=&quot;1823&quot; style=&quot;padding-top:56.25%;&quot;&gt;&lt;picture data-dcnode-id=&quot;1824&quot;&gt;&lt;source alt=&quot;Hell On Earth 2006 South Park&quot; class=&quot;pull- lazy-image-van optional-image&quot; data-dcnode-id=&quot;1827&quot; data-normal=&quot;https://vanilla.futurecdn.net/cinemablend/media/img/missing-image.svg&quot; data-original-mos=&quot;https://cdn.mos.cms.futurecdn.net/SGwUp8uucVSbCdYMLntWnS.jpg&quot; data-pin-media=&quot;https://cdn.mos.cms.futurecdn.net/SGwUp8uucVSbCdYMLntWnS.jpg&quot; data-srcset=&quot;https://cdn.mos.cms.futurecdn.net/SGwUp8uucVSbCdYMLntWnS-320-80.jpg.webp 320w, https://cdn.mos.cms.futurecdn.net/SGwUp8uucVSbCdYMLntWnS-650-80.jpg.webp 650w, https://cdn.mos.cms.futurecdn.net/SGwUp8uucVSbCdYMLntWnS-970-80.jpg.webp 970w&quot; onerror=&quot;if(this.src &amp;amp;&amp;amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)&quot; sizes=&quot;(min-width: 1000px) 970px, calc(100vw - 40px)&quot; srcset=&quot;https://cdn.mos.cms.futurecdn.net/SGwUp8uucVSbCdYMLntWnS-320-80.jpg.webp 320w, https://cdn.mos.cms.futurecdn.net/SGwUp8uucVSbCdYMLntWnS-650-80.jpg.webp 650w, https://cdn.mos.cms.futurecdn.net/SGwUp8uucVSbCdYMLntWnS-970-80.jpg.webp 970w&quot; type=&quot;image/webp&quot;&gt;&lt;source alt=&quot;Hell On Earth 2006 South Park&quot; class=&quot;pull- lazy-image-van optional-image&quot; data-dcnode-id=&quot;1826&quot; data-normal=&quot;https://vanilla.futurecdn.net/cinemablend/media/img/missing-image.svg&quot; data-original-mos=&quot;https://cdn.mos.cms.futurecdn.net/SGwUp8uucVSbCdYMLntWnS.jpg&quot; data-pin-media=&quot;https://cdn.mos.cms.futurecdn.net/SGwUp8uucVSbCdYMLntWnS.jpg&quot; data-srcset=&quot;https://cdn.mos.cms.futurecdn.net/SGwUp8uucVSbCdYMLntWnS-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/SGwUp8uucVSbCdYMLntWnS-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/SGwUp8uucVSbCdYMLntWnS-970-80.jpg 970w&quot; onerror=&quot;if(this.src &amp;amp;&amp;amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)&quot; sizes=&quot;(min-width: 1000px) 970px, calc(100vw - 40px)&quot; srcset=&quot;https://cdn.mos.cms.futurecdn.net/SGwUp8uucVSbCdYMLntWnS-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/SGwUp8uucVSbCdYMLntWnS-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/SGwUp8uucVSbCdYMLntWnS-970-80.jpg 970w&quot; type=&quot;image/jpeg&quot;&gt;&lt;img alt=&quot;Hell On Earth 2006 South Park&quot; class=&quot;pull- lazy-image-van optional-image loaded&quot; data-dcnode-id=&quot;1825&quot; data-ll-status=&quot;loaded&quot; data-normal=&quot;https://vanilla.futurecdn.net/cinemablend/media/img/missing-image.svg&quot; data-original-mos=&quot;https://cdn.mos.cms.futurecdn.net/SGwUp8uucVSbCdYMLntWnS.jpg&quot; data-pin-media=&quot;https://cdn.mos.cms.futurecdn.net/SGwUp8uucVSbCdYMLntWnS.jpg&quot; data-srcset=&quot;https://cdn.mos.cms.futurecdn.net/SGwUp8uucVSbCdYMLntWnS-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/SGwUp8uucVSbCdYMLntWnS-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/SGwUp8uucVSbCdYMLntWnS-970-80.jpg 970w&quot; loading=&quot;lazy&quot; onerror=&quot;if(this.src &amp;amp;&amp;amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)&quot; sizes=&quot;(min-width: 1000px) 970px, calc(100vw - 40px)&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//vanilla.futurecdn.net/cinemablend/media/img/missing-image.svg&amp;amp;raw&quot; srcset=&quot;https://cdn.mos.cms.futurecdn.net/SGwUp8uucVSbCdYMLntWnS-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/SGwUp8uucVSbCdYMLntWnS-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/SGwUp8uucVSbCdYMLntWnS-970-80.jpg 970w&quot;&gt;&lt;/picture&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;/figure&gt;&lt;h2 data-dcnode-id=&quot;1818&quot; id=&quot;34-hell-on-earth-2006-34-season-10-episode-11-3&quot;&gt;&lt;span data-dcnode-id=&quot;1819&quot; instrument_node=&quot;&quot;&gt;&quot;Hell On Earth 2006&quot; Season 10, Episode 11&lt;/span&gt;&lt;/h2&gt;&lt;p data-dcnode-id=&quot;1813&quot;&gt;&lt;span data-dcnode-id=&quot;1817&quot; instrument_node=&quot;&quot;&gt;If one watches &quot;Hell On Wheels 2006&quot; now, they might wonder why it's considered one of the most controversial &lt;/span&gt;&lt;em data-dcnode-id=&quot;1815&quot;&gt;&lt;span data-dcnode-id=&quot;1816&quot; instrument_node=&quot;&quot;&gt;South Park&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1814&quot; instrument_node=&quot;&quot;&gt; episodes. Sure, the story revolves around Satan throwing an awesome Halloween party on Earth, and the Catholic church trying to sabotage it. But that's really par for the course in terms of outlandish story lines, so why would people have been so up in arms with this in 2006?&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1808&quot;&gt;&lt;span data-dcnode-id=&quot;1812&quot; instrument_node=&quot;&quot;&gt;Well, many viewers (and otherwise) took issue with the fact that the late wildlife expert Steve Irwin was shown at the party with a stingray dangling from his chest. That episode aired less than two months after Irwin's death, so the timing, while intentional, was not taken kindly. A response was prompted from a &lt;/span&gt;&lt;a class=&quot;hawk-link-parsed&quot; data-component-tracked=&quot;1&quot; data-dcnode-id=&quot;1810&quot; data-url=&quot;http://www.hollywood.com/tv/steve-irwin-s-widow-devastated-by-south-park-parody-57184603/&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//www.hollywood.com/tv/steve-irwin-s-widow-devastated-by-south-park-parody-57184603/&quot;&gt;&lt;span data-dcnode-id=&quot;1811&quot; instrument_node=&quot;&quot;&gt;family friend of the Irwin family&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1809&quot; instrument_node=&quot;&quot;&gt; that feared the mourning children Bindi and Bob would see the episode and break down. The friend added that Irwin had a great sense of humor, but a joke like this was just too soon after the TV personality's death.&lt;/span&gt;&lt;/p&gt;&lt;div class=&quot;bordeaux-slot&quot; data-dcnode-id=&quot;1807&quot; data-feat-ref=&quot;bordeaux-feat-id-103&quot; id=&quot;bordeaux-static-slot-12&quot; style=&quot;display: flex; flex-direction: column; margin: auto;&quot;&gt;&lt;/div&gt;&lt;div class=&quot;bordeaux-slot&quot; data-dcnode-id=&quot;1806&quot; data-feat-ref=&quot;bordeaux-feat-id-112&quot; id=&quot;bordeaux-static-slot-21&quot; style=&quot;display: flex; flex-direction: column; margin: auto;&quot;&gt;&lt;/div&gt;&lt;figure class=&quot;van-image-figure pull-&quot; data-bordeaux-image-check=&quot;&quot; data-dcnode-id=&quot;1798&quot;&gt;&lt;div class=&quot;image-full-width-wrapper&quot; data-dcnode-id=&quot;1799&quot;&gt;&lt;div class=&quot;image-widthsetter&quot; data-dcnode-id=&quot;1800&quot;&gt;&lt;p class=&quot;vanilla-image-block&quot; data-dcnode-id=&quot;1801&quot; style=&quot;padding-top:56.25%;&quot;&gt;&lt;picture data-dcnode-id=&quot;1802&quot;&gt;&lt;source alt=&quot;With Apologies To Jesse Jackson South Park&quot; class=&quot;pull- lazy-image-van optional-image&quot; data-dcnode-id=&quot;1805&quot; data-normal=&quot;https://vanilla.futurecdn.net/cinemablend/media/img/missing-image.svg&quot; data-original-mos=&quot;https://cdn.mos.cms.futurecdn.net/H66sp5XeYEQFfDFh6es6YK.jpg&quot; data-pin-media=&quot;https://cdn.mos.cms.futurecdn.net/H66sp5XeYEQFfDFh6es6YK.jpg&quot; data-srcset=&quot;https://cdn.mos.cms.futurecdn.net/H66sp5XeYEQFfDFh6es6YK-320-80.jpg.webp 320w, https://cdn.mos.cms.futurecdn.net/H66sp5XeYEQFfDFh6es6YK-650-80.jpg.webp 650w, https://cdn.mos.cms.futurecdn.net/H66sp5XeYEQFfDFh6es6YK-970-80.jpg.webp 970w&quot; onerror=&quot;if(this.src &amp;amp;&amp;amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingI &gt;&lt;p data-dcnode-id=&quot;1786&quot;&gt;&lt;span data-dcnode-id=&quot;1790&quot; instrument_node=&quot;&quot;&gt;The episode, while steeped in controversy in some circles, was actually praised by the NAACP for its accurate depiction of how hate speech can affect an individual. Others, like the Parent Television Council, felt audience praise was hypocritical and wondered why &lt;/span&gt;&lt;em data-dcnode-id=&quot;1788&quot;&gt;&lt;span data-dcnode-id=&quot;1789&quot; instrument_node=&quot;&quot;&gt;South Park&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1787&quot; instrument_node=&quot;&quot;&gt; got a pass when media personalities who used the word, such as Don Imus, did not. Stone personally really enjoyed the episode, and said he fully believed that if there was a similar word that was as offensive to white people, it would be illegal.&lt;/span&gt;&lt;/p&gt;&lt;div class=&quot;bordeaux-slot&quot; data-dcnode-id=&quot;1785&quot; data-feat-ref=&quot;bordeaux-feat-id-104&quot; id=&quot;bordeaux-static-slot-13&quot; style=&quot;display: flex; flex-direction: column; margin: auto;&quot;&gt;&lt;/div&gt;&lt;div class=&quot;bordeaux-slot&quot; data-dcnode-id=&quot;1784&quot; data-feat-ref=&quot;bordeaux-feat-id-113&quot; id=&quot;bordeaux-static-slot-22&quot; style=&quot;display: flex; flex-direction: column; margin: auto;&quot;&gt;&lt;/div&gt;&lt;figure class=&quot;van-image-figure pull-&quot; data-bordeaux-image-check=&quot;&quot; data-dcnode-id=&quot;1776&quot;&gt;&lt;div class=&quot;image-full-width-wrapper&quot; data-dcnode-id=&quot;1777&quot;&gt;&lt;div class=&quot;image-widthsetter&quot; data-dcnode-id=&quot;1778&quot;&gt;&lt;p class=&quot;vanilla-image-block&quot; data-dcnode-id=&quot;1779&quot; style=&quot;padding-top:56.25%;&quot;&gt;&lt;picture data-dcnode-id=&quot;1780&quot;&gt;&lt;source alt=&quot;Band In China South Park&quot; class=&quot;pull- lazy-image-van optional-image&quot; data-dcnode-id=&quot;1783&quot; data-normal=&quot;https://vanill Band in China&quot; as one of the most controversial &lt;/span&gt;&lt;em data-dcnode-id=&quot;1771&quot;&gt;&lt;span data-dcnode-id=&quot;1772&quot; instrument_node=&quot;&quot;&gt;South Park&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1770&quot; instrument_node=&quot;&quot;&gt; episodes, since it's still fresh on our minds. But since it kinda got the show booted from one of the biggest countries in the world, it definitely counts, and the episode's cultural impact is spreading. For those that missed the newer episode, much of it revolved around the fact that the American media is working to appease the Chinese government for financial gains.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1761&quot;&gt;&lt;span data-dcnode-id=&quot;1768&quot; instrument_node=&quot;&quot;&gt;Now, &lt;/span&gt;&lt;em data-dcnode-id=&quot;1766&quot;&gt;&lt;span data-dcnode-id=&quot;1767&quot; instrument_node=&quot;&quot;&gt;South Park&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1765&quot; instrument_node=&quot;&quot;&gt; wasn't the first entity to call attention to this kind of behavior, but the episode served as a massive signal boost that was only aided further when China straight-up permanently banned the series in the country after the ep aired. If there weren't a ton of people in America already aware that major corporations self-censor their brands to better serve Chinese audiences (and others), the &lt;/span&gt;&lt;em data-dcnode-id=&quot;1763&quot;&gt;&lt;span data-dcnode-id=&quot;1764&quot; instrument_node=&quot;&quot;&gt;South Park&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1762&quot; instrument_node=&quot;&quot;&gt; episodes definitely added to that population.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1758&quot;&gt;&lt;a class=&quot;hawk-link-parsed&quot; data-component-tracked=&quot;1&quot; data-dcnode-id=&quot;1759&quot; data-original-url=&quot;https://www.cinemablend.com/television/2480397/that-time-fox-refused-to-pick-up-south-park-because-of-mr-hankey&quot; data-url=&quot;https://www.cinemablend.com/television/2480397/that-time-fox-refused-to-pick-up-south-park-because-of-mr-hankey&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.cinemablend.com/television/2480397/that-time-fox-refused-to-pick-up-south-park-because-of-mr-hankey&quot;&gt;&lt;span data-dcnode-id=&quot;1760&quot; instrument_node=&quot;&quot;&gt;That Time Fox Refused To Pick Up South Park Because Of Mr. Hankey&lt;/span&gt;&lt;/a&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1752&quot;&gt;&lt;span data-dcnode-id=&quot;1757&quot; instrument_node=&quot;&quot;&gt;With more controversies no doubt on the way, &lt;/span&gt;&lt;a class=&quot;hawk-link-parsed&quot; data-component-tracked=&quot;1&quot; data-dcnode-id=&quot;1754&quot; data-url=&quot;https://southpark.cc.com/&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//southpark.cc.com/&quot;&gt;&lt;em data-dcnode-id=&quot;1755&quot;&gt;&lt;span data-dcnode-id=&quot;1756&quot; instrument_node=&quot;&quot;&gt;South Park&lt;/span&gt;&lt;/em&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1753&quot; instrument_node=&quot;&quot;&gt; airs on Comedy Central Wednesdays at 10:00 p.m. ET. Stick with CinemaBlend for more updates on the series, and for a look at all things happening in the world of television and movies.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1751&quot; instrument_node=&quot;&quot;&gt;
