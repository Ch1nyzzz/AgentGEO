&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;2037&quot;&gt;&lt;span data-dcnode-id=&quot;2038&quot; instrument_node=&quot;&quot;&gt;What America Searched for on Google, in the Last Decade&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;2036&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2034&quot;&gt;&lt;span data-dcnode-id=&quot;2035&quot; instrument_node=&quot;&quot;&gt;Cultural shifts come in many shapes and forms, and some are harder to measure than others.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2033&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2028&quot;&gt;&lt;span data-dcnode-id=&quot;2032&quot; instrument_node=&quot;&quot;&gt;Thankfully, Google search volume provides an easy avenue for measuring large-scale cultural trends. And because Google makes up &lt;/span&gt;&lt;a data-dcnode-id=&quot;2030&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.visualcapitalist.com/this-chart-reveals-googles-true-dominance-over-the-web/&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2031&quot; instrument_node=&quot;&quot;&gt;more than 90%&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2029&quot; instrument_node=&quot;&quot;&gt; of all internet searches in the U.S., looking at what’s trending on Google is a great way to understand the shifting questions and interests that are captivating society at any given time.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2027&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2022&quot;&gt;&lt;span data-dcnode-id=&quot;2026&quot; instrument_node=&quot;&quot;&gt;This animated map by &lt;/span&gt;&lt;a data-dcnode-id=&quot;2024&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//v1analytics.co/&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2025&quot; instrument_node=&quot;&quot;&gt;V1 Analytics&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2023&quot; instrument_node=&quot;&quot;&gt; provides an overview of the top trending Google searches in every state over the last decade. It sheds light on what types of new information, events, and stories received the most attention in the last ten years—and more generally, it shows us what the U.S. population has been thinking about.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2021&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;2019&quot;&gt;&lt;span data-dcnode-id=&quot;2020&quot; instrument_node=&quot;&quot;&gt;Trending Searches versus Top Searches&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;2018&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2016&quot;&gt;&lt;span data-dcnode-id=&quot;2017&quot; instrument_node=&quot;&quot;&gt;Before diving into the top trends of the decade, it’s worth taking a moment to distinguish between “trending searches” and “top searches”:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2015&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;1886&quot;&gt;&lt;span data-dcnode-id=&quot;1887&quot; instrument_node=&quot;&quot;&gt;It’s important to remember that trending searches are measured by the increase of traffic, not just the overall amount of searches. Therefore, in states where it wasn’t trending, the word “coronavirus” may have already been a popular search term for a while, so the keyword didn’t see a sudden spike in interest like it did in other places.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1885&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;1147&quot;&gt;&lt;span data-dcnode-id=&quot;1151&quot; instrument_node=&quot;&quot;&gt;India’s not the only country that’s banned the use of TikTok. Pakistan has &lt;/span&gt;&lt;a data-dcnode-id=&quot;1149&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.hindustantimes.com/world-news/pakistan-bans-tiktok-for-4th-time-for-inappropriate-content-101626853759583.html&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1150&quot; instrument_node=&quot;&quot;&gt;blocked TikTok&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1148&quot; instrument_node=&quot;&quot;&gt; multiple times because of concerns over “inappropriate” content. However, it’s worth noting that the bans in Pakistan only lasted a few days before being lifted, and currently, Pakistanis are able to access the platform. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1146&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;857&quot;&gt;&lt;span data-dcnode-id=&quot;858&quot; instrument_node=&quot;&quot;&gt;How Synthetic Biology Could Change Life as we Know it&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;856&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;851&quot;&gt;&lt;span data-dcnode-id=&quot;855&quot; instrument_node=&quot;&quot;&gt;Synthetic biology (synbio) is a field of science that redesigns organisms in an effort to enhance and support human life. According to one projection, this rapidly growing field of science is expected to reach &lt;/span&gt;&lt;a data-dcnode-id=&quot;853&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.globenewswire.com/news-release/2022/01/19/2369148/0/en/Global-Synthetic-Biology-Market-to-Reach-US-28-8-Billion-by-the-Year-2026.html&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;854&quot; instrument_node=&quot;&quot;&gt;$28.8 billion&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;852&quot; instrument_node=&quot;&quot;&gt; in global revenue by 2026. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;850&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;848&quot;&gt;&lt;span data-dcnode-id=&quot;849&quot; instrument_node=&quot;&quot;&gt;Although it has the potential to transform many aspects of society, things could go horribly wrong if synbio is used for malicious or unethical reasons. This infographic explores the opportunities and potential risks that this budding field of science has to offer.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;847&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;845&quot;&gt;&lt;span data-dcnode-id=&quot;846&quot; instrument_node=&quot;&quot;&gt;What is Synthetic Biology?&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;844&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;839&quot;&gt;&lt;span data-dcnode-id=&quot;843&quot; instrument_node=&quot;&quot;&gt;We’ve covered the &lt;/span&gt;&lt;a data-dcnode-id=&quot;841&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.visualcapitalist.com/how-synthetic-biology-redesigns-life/&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;842&quot; instrument_node=&quot;&quot;&gt;basics of synbio&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;840&quot; instrument_node=&quot;&quot;&gt; in previous work, but as a refresher, here’s a quick explanation of what synbio is and how it works. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;838&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;836&quot;&gt;&lt;span data-dcnode-id=&quot;837&quot; instrument_node=&quot;&quot;&gt;Synbio is an area of scientific research that involves editing and redesigning different biological components and systems in various organisms. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;835&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;830&quot;&gt;&lt;span data-dcnode-id=&quot;834&quot; instrument_node=&quot;&quot;&gt;It’s like genetic engineering but done at a more granular level—while genetic engineering transfers ready-made genetic material between organisms, synbio can &lt;/span&gt;&lt;strong data-dcnode-id=&quot;832&quot;&gt;&lt;span data-dcnode-id=&quot;833&quot; instrument_node=&quot;&quot;&gt;build new&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;831&quot; instrument_node=&quot;&quot;&gt; genetic material from scratch.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;829&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;827&quot;&gt;&lt;span data-dcnode-id=&quot;828&quot; instrument_node=&quot;&quot;&gt;The Opportunities of Synbio&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;826&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;821&quot;&gt;&lt;span data-dcnode-id=&quot;825&quot; instrument_node=&quot;&quot;&gt;This field of science has a plethora of real-world applications that could transform our everyday lives. A study by McKinsey found over &lt;/span&gt;&lt;a data-dcnode-id=&quot;823&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.mckinsey.com/industries/pharmaceuticals-and-medical-products/our-insights/the-bio-revolution-innovations-transforming-economies-societies-and-our-lives&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;824&quot; instrument_node=&quot;&quot;&gt;400 potential uses&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;822&quot; instrument_node=&quot;&quot;&gt; for synbio, which were broken down into four main categories:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;820&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;806&quot;&gt;&lt;span data-dcnode-id=&quot;819&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;817&quot;&gt;&lt;span data-dcnode-id=&quot;818&quot; instrument_node=&quot;&quot;&gt;Human health and performance&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;816&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;814&quot;&gt;&lt;span data-dcnode-id=&quot;815&quot; instrument_node=&quot;&quot;&gt;Agriculture and food&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;813&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;811&quot;&gt;&lt;span data-dcnode-id=&quot;812&quot; instrument_node=&quot;&quot;&gt;Consumer products and services&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;810&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;808&quot;&gt;&lt;span data-dcnode-id=&quot;809&quot; instrument_node=&quot;&quot;&gt;Materials and energy production&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;807&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;805&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;800&quot;&gt;&lt;span data-dcnode-id=&quot;804&quot; instrument_node=&quot;&quot;&gt;If those potential uses become reality in the coming years, they could have a direct economic impact of up to &lt;/span&gt;&lt;strong data-dcnode-id=&quot;802&quot;&gt;&lt;span data-dcnode-id=&quot;803&quot; instrument_node=&quot;&quot;&gt;$3.6 trillion&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;801&quot; instrument_node=&quot;&quot;&gt; per year by 2030-2040. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;799&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 data-dcnode-id=&quot;797&quot;&gt;&lt;span data-dcnode-id=&quot;798&quot; instrument_node=&quot;&quot;&gt;1. Human Health and Performance&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;796&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;791&quot;&gt;&lt;span data-dcnode-id=&quot;795&quot; instrument_node=&quot;&quot;&gt;The medical and health sector is predicted to be significantly influenced by synbio, with an economic impact of up to &lt;/span&gt;&lt;strong data-dcnode-id=&quot;793&quot;&gt;&lt;span data-dcnode-id=&quot;794&quot; instrument_node=&quot;&quot;&gt;$1.3 trillion&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;792&quot; instrument_node=&quot;&quot;&gt; each year by 2030-2040.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;790&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;785&quot;&gt;&lt;span data-dcnode-id=&quot;789&quot; instrument_node=&quot;&quot;&gt;Synbio has a wide range of medical applications. For instance, it can be used to manipulate biological pathways in yeast to produce an &lt;/span&gt;&lt;a data-dcnode-id=&quot;787&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.discovermagazine.com/health/biologists-modify-yeast-to-produce-malaria-drug&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;788&quot; instrument_node=&quot;&quot;&gt;anti-malaria treatment&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;786&quot; instrument_node=&quot;&quot;&gt;. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;784&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;779&quot;&gt;&lt;span data-dcnode-id=&quot;783&quot; instrument_node=&quot;&quot;&gt;It could also enhance gene therapy. Using synbio techniques, the British biotech company Touchlight Genetics is working on a way to build &lt;/span&gt;&lt;a data-dcnode-id=&quot;781&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.genengnews.com/insights/synthetic-biology-seizes-new-ground-in-healthcare/&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;782&quot; instrument_node=&quot;&quot;&gt;synthetic DNA&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;780&quot; instrument_node=&quot;&quot;&gt; without the use of bacteria, which would be a game-changer for the field of gene therapy.  &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;778&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 data-dcnode-id=&quot;776&quot;&gt;&lt;span data-dcnode-id=&quot;777&quot; instrument_node=&quot;&quot;&gt;2. Agriculture and Food&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;775&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;770&quot;&gt;&lt;span data-dcnode-id=&quot;774&quot; instrument_node=&quot;&quot;&gt;Synbio has the potential to make a big splash in the agricultural sector as well—up to &lt;/span&gt;&lt;strong data-dcnode-id=&quot;772&quot;&gt;&lt;span data-dcnode-id=&quot;773&quot; instrument_node=&quot;&quot;&gt;$1.2 trillion&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;771&quot; instrument_node=&quot;&quot;&gt; per year by as early as 2030.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;769&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;764&quot;&gt;&lt;span data-dcnode-id=&quot;768&quot; instrument_node=&quot;&quot;&gt;One example of this is synbio’s role in cellular agriculture, which is when meat is created from cells directly. The cost of creating &lt;/span&gt;&lt;a data-dcnode-id=&quot;766&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.engadget.com/hitting-the-books-the-genesis-machine-amy-webb-andrew-hessel-publicaffairs-133024037.html&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;767&quot; instrument_node=&quot;&quot;&gt;lab-grown meat&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;765&quot; instrument_node=&quot;&quot;&gt; has decreased significantly in recent years, and because of this, various startups around the world are beginning to develop a variety of cell-based meat products. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;763&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 data-dcnode-id=&quot;761&quot;&gt;&lt;span data-dcnode-id=&quot;762&quot; instrument_node=&quot;&quot;&gt;3. Consumer Products and Services&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;760&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;758&quot;&gt;&lt;span data-dcnode-id=&quot;759&quot; instrument_node=&quot;&quot;&gt;Using synthetic biology, products could be tailored to suit an individual’s unique needs. This would be useful in fields such as genetic ancestry testing, gene therapy, and age-related skin procedures.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;757&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;752&quot;&gt;&lt;span data-dcnode-id=&quot;756&quot; instrument_node=&quot;&quot;&gt;By 2030-2040, synthetic biology could have an economic impact on consumer products and services to the tune of up to &lt;/span&gt;&lt;strong data-dcnode-id=&quot;754&quot;&gt;&lt;span data-dcnode-id=&quot;755&quot; instrument_node=&quot;&quot;&gt;$800 billion&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;753&quot; instrument_node=&quot;&quot;&gt; per year. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;751&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 data-dcnode-id=&quot;749&quot;&gt;&lt;span data-dcnode-id=&quot;750&quot; instrument_node=&quot;&quot;&gt;4. Materials and Energy Production&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;748&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;743&quot;&gt;&lt;span data-dcnode-id=&quot;747&quot; instrument_node=&quot;&quot;&gt;Synbio could also be used to boost efficiency in clean energy and biofuel production. For instance, &lt;/span&gt;&lt;a data-dcnode-id=&quot;745&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//biotechnologyforbiofuels.biomedcentral.com/articles/10.1186/s13068-018-1181-1&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;746&quot; instrument_node=&quot;&quot;&gt;microalgae&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;744&quot; instrument_node=&quot;&quot;&gt; are currently being “reprogrammed” to produce clean energy in an economically feasible way. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;742&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;737&quot;&gt;&lt;span data-dcnode-id=&quot;741&quot; instrument_node=&quot;&quot;&gt;This, along with other material and energy improvements through synbio methods, could have a direct economic impact of up to &lt;/span&gt;&lt;strong data-dcnode-id=&quot;739&quot;&gt;&lt;span data-dcnode-id=&quot;740&quot; instrument_node=&quot;&quot;&gt;$300 billion&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;738&quot; instrument_node=&quot;&quot;&gt; each year.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;736&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;734&quot;&gt;&lt;span data-dcnode-id=&quot;735&quot; instrument_node=&quot;&quot;&gt;The Potential Risks of Synbio&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;733&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;731&quot;&gt;&lt;span data-dcnode-id=&quot;732&quot; instrument_node=&quot;&quot;&gt;While the potential economic and societal benefits of synthetic biology are vast, there are a number of risks to be aware of as well:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;730&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;705&quot;&gt;&lt;span data-dcnode-id=&quot;729&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;725&quot;&gt;&lt;strong data-dcnode-id=&quot;727&quot;&gt;&lt;span data-dcnode-id=&quot;728&quot; instrument_node=&quot;&quot;&gt;Unintended biological consequences: &lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;726&quot; instrument_node=&quot;&quot;&gt;Making tweaks to any biological system can have ripple effects across entire ecosystems or species. When any sort of lifeform is manipulated, things don’t always go according to plan.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;724&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;720&quot;&gt;&lt;strong data-dcnode-id=&quot;722&quot;&gt;&lt;span data-dcnode-id=&quot;723&quot; instrument_node=&quot;&quot;&gt;Moral issues: &lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;721&quot; instrument_node=&quot;&quot;&gt;How far we’re comfortable going with synbio depends on our values. Certain synbio applications, such as embryo editing, are controversial. If these types of applications become mainstream, they could have massive societal implications, with the potential to increase polarization within communities.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;719&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;712&quot;&gt;&lt;strong data-dcnode-id=&quot;717&quot;&gt;&lt;span data-dcnode-id=&quot;718&quot; instrument_node=&quot;&quot;&gt;Unequal access:&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;716&quot; instrument_node=&quot;&quot;&gt; Innovation and progress in synbio is happening faster in wealthier countries than it is in developing ones. If this trend continues, access to these types of technology may not be equal worldwide. We’ve already witnessed this type of access gap during the rollout of &lt;/span&gt;&lt;a data-dcnode-id=&quot;714&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.economist.com/graphic-detail/2022/01/04/most-covid-19-vaccines-have-been-used-in-rich-countries&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;715&quot; instrument_node=&quot;&quot;&gt;COVID-19 vaccines&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;713&quot; instrument_node=&quot;&quot;&gt;, where a majority of vaccines have been administered in rich countries. &lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;711&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;707&quot;&gt;&lt;strong data-dcnode-id=&quot;709&quot;&gt;&lt;span data-dcnode-id=&quot;710&quot; instrument_node=&quot;&quot;&gt;Bioweaponry: &lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;708&quot; instrument_node=&quot;&quot;&gt;Synbio could be used to recreate viruses, or manipulate bacteria to make it more dangerous, if used with ill intent. &lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;706&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;704&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;699&quot;&gt;&lt;span data-dcnode-id=&quot;703&quot; instrument_node=&quot;&quot;&gt;According to a &lt;/span&gt;&lt;a data-dcnode-id=&quot;701&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.frontiersin.org/articles/10.3389/fbioe.2019.00175/full&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;702&quot; instrument_node=&quot;&quot;&gt;group of scientists&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;700&quot; instrument_node=&quot;&quot;&gt; at the University of Edinburgh, communication between the public, synthetic biologists, and political decision-makers is crucial so that these societal and environmental risks can be mitigated.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;698&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;696&quot;&gt;&lt;span data-dcnode-id=&quot;697&quot; instrument_node=&quot;&quot;&gt;Balancing Risk and Reward&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;695&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;693&quot;&gt;&lt;span data-dcnode-id=&quot;694&quot; instrument_node=&quot;&quot;&gt;Despite the risks involved, innovation in synbio is happening at a rapid pace. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;692&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;687&quot;&gt;&lt;span data-dcnode-id=&quot;691&quot; instrument_node=&quot;&quot;&gt;By 2030, most people will have likely eaten, worn, or been treated by a product created by synthetic biology, according to synthetic biologist &lt;/span&gt;&lt;a data-dcnode-id=&quot;689&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nature.com/articles/s41467-020-20122-2&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;690&quot; instrument_node=&quot;&quot;&gt;Christopher A. Voigt&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;688&quot; instrument_node=&quot;&quot;&gt;.  &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;686&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;684&quot;&gt;&lt;span data-dcnode-id=&quot;685&quot; instrument_node=&quot;&quot;&gt;Our choices today will dictate the future of synbio, and how we navigate through this space will have a massive impact on our future—for better, or for worse. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;683&quot; instrument_node=&quot;&quot;&gt;
