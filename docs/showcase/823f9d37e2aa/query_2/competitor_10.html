&lt;/span&gt;&lt;h2 class=&quot;ct-slideshow__slide__text-container__caption&quot; data-dcnode-id=&quot;6996&quot;&gt;&lt;span data-dcnode-id=&quot;7000&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div data-dcnode-id=&quot;6998&quot;&gt;&lt;span data-dcnode-id=&quot;6999&quot; instrument_node=&quot;&quot;&gt;Best drama movies from the last decade&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;6997&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;6995&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;ct-slideshow__slide__text-container__description&quot; data-dcnode-id=&quot;6964&quot;&gt;&lt;span data-dcnode-id=&quot;6994&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div data-dcnode-id=&quot;6966&quot;&gt;&lt;p data-dcnode-id=&quot;6992&quot;&gt;&lt;span data-dcnode-id=&quot;6993&quot; instrument_node=&quot;&quot;&gt;While the core tenants of drama remain fundamental to the movie-going experience, the genre itself has arguably suffered in recent years. That’s not to say one can’t find adult drama at the local cineplex, rather that it’s frequently overshadowed and overpowered by a gamut of franchise fare. So it’s no surprise that the genre has largely migrated to television, where it is in overabundant supply. Along similarly predictable lines, a number of the decade’s best adult dramas hail from overseas.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;6991&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;6986&quot;&gt;&lt;span data-dcnode-id=&quot;6990&quot; instrument_node=&quot;&quot;&gt;Returning to U.S. theaters, one might argue that drama is now as much a component or supplement as it is a straightforward genre unto itself. For example, recent blockbusters like “Joker,” “Interstellar,” and even “Avengers: Endgame” employ several dramatic tropes. That’s not to mention works from auteurs such as Quentin Tarantino or &lt;/span&gt;&lt;a data-dcnode-id=&quot;6988&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//thestacker.com/stories/3638/stories-behind-your-favorite-wes-anderson-movies&quot;&gt;&lt;span data-dcnode-id=&quot;6989&quot; instrument_node=&quot;&quot;&gt;Wes Anderson&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6987&quot; instrument_node=&quot;&quot;&gt;, which incorporate dramatic conflicts into otherwise violent or comedic situations. And while films such as “Whiplash” or “Moonlight” certainly qualify as straightforward drama, they’ve largely become the exception and not the rule in terms of what dominates the cultural mainstream.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;6985&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;6983&quot;&gt;&lt;span data-dcnode-id=&quot;6984&quot; instrument_node=&quot;&quot;&gt;Internationally, it’s a different story altogether. Arguably less tethered to risk aversion or the demands of a global marketplace, countries like Iran, Turkey, France, Italy, South Korea, Japan, and numerous others continue to churn out attention-grabbing, dramatic fare. As such, the following list of highest-ranking dramas is downright global in scope and incredibly diverse. This might be the most diversified list (from a production and distribution perspective) of genre films that Stacker has ever compiled.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;6982&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;6977&quot;&gt;&lt;span data-dcnode-id=&quot;6981&quot; instrument_node=&quot;&quot;&gt;So which titles made the cut? To find out, Stacker compiled &lt;/span&gt;&lt;a data-dcnode-id=&quot;6979&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.imdb.com/search/title/%3Ftitle_type%3Dfeature%26release_date%3D2010-01-01%2C2019-12-31%26num_votes%3D10000%2C%26genres%3Ddrama%26sort%3Duser_rating%2Cdesc%26count%3D250&quot;&gt;&lt;span data-dcnode-id=&quot;6980&quot; instrument_node=&quot;&quot;&gt;IMDb data&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6978&quot; instrument_node=&quot;&quot;&gt; on all dramas from the 2010s and ranked them according to their user ratings (out of 10), relying on IMDb user votes to break any rating ties. To qualify, the film had to be listed as &quot;drama” on two or more of the major databases (IMDb, Metacritic, Wikipedia, Letterboxd, Rotten Tomatoes, etc.), released in the United States theatrically or on streaming services between Jan. 1, 2010&amp;nbsp;and today, have at least four critic reviews, and have at least 10,000 votes on IMDb. TV movies and Bollywood productions were not considered.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;6976&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;6974&quot;&gt;&lt;span data-dcnode-id=&quot;6975&quot; instrument_node=&quot;&quot;&gt;At Stacker, we recognize that genre is meant to help describe and communicate the tone and style of a film, not to serve as a limiting factor on what films can and cannot be. There are no hard and fast lines that define dramas, and we think leaning into more open interpretations of what fits into certain genres is best practice for getting a pool of films that represent all possible expressions of a particular genre. Every film on the list has been considered according to the cinematic history and development of dramas. With that in mind, here are the best dramas from the past decade.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;6973&quot; instrument_node=&quot;&quot;&gt;

      &amp;lt;li&amp;gt;Story name: Best drama movies from the last decade&amp;lt;/li&amp;gt;
      &amp;lt;li&amp;gt;Canonical URL: https://stacker.com/stories/3679/best-drama-movies-last-decade&amp;lt;/li&amp;gt;
      &amp;lt;li&amp;gt;Written by: Jacob Osborn&amp;lt;/li&amp;gt;
      &amp;lt;li&amp;gt;Description: Stacker presents the best drama movies from the past decade. The rankings were compiled using IMDb data, and any rating ties were broken by the number of IMDb user votes. To qualify, the film had to be listed as “drama” on two or more of the major databases (IMDb, Metacritic, Wikipedia, Letterboxd, Rotten Tomatoes, etc.).
&amp;lt;/li&amp;gt;
    &amp;lt;/ul&amp;gt;
  &amp;lt;/header&amp;gt;

  &amp;lt;article&amp;gt;
    &amp;lt;h2&amp;gt;Best drama movies from the last decade&amp;lt;/h2&amp;gt;
&amp;lt;p&amp;gt;While the core tenants of drama remain fundamental to the movie-going experience, the genre itself has arguably suffered in recent years. That’s not to say one can’t find adult drama at the local cineplex, rather that it’s frequently overshadowed and overpowered by a gamut of franchise fare. So it’s no surprise that the genre has largely migrated to television, where it is in overabundant supply. Along similarly predictable lines, a number of the decade’s best adult dramas hail from overseas.&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;Returning to U.S. theaters, one might argue that drama is now as much a component or supplement as it is a straightforward genre unto itself. For example, recent blockbusters like “Joker,” “Interstellar,” and even “Avengers: Endgame” employ several dramatic tropes. That’s not to mention works from auteurs such as Quentin Tarantino or &amp;lt;a href=&quot;https://thestacker.com/stories/3638/stories-behind-your-favorite-wes-anderson-movies&quot;&amp;gt;Wes Anderson&amp;lt;/a&amp;gt;, which incorporate dramatic conflicts into otherwise violent or comedic situations. And while films such as “Whiplash” or “Moonlight” certainly qualify as straightforward drama, they’ve largely become the exception and not the rule in terms of what dominates the cultural mainstream.&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;Internationally, it’s a different story altogether. Arguably less tethered to risk aversion or the demands of a global marketplace, countries like Iran, Turkey, France, Italy, South Korea, Japan, and numerous others continue to churn out attention-grabbing, dramatic fare. As such, the following list of highest-ranking dramas is downright global in scope and incredibly diverse. This might be the most diversified list (from a production and distribution perspective) of genre films that Stacker has ever compiled.&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;So which titles made the cut? To find out, Stacker compiled &amp;lt;a href=&quot;https://www.imdb.com/search/title/?title_type=feature&amp;amp;amp;release_date=2010-01-01,2019-12-31&amp;amp;amp;num_votes=10000,&amp;amp;amp;genres=drama&amp;amp;amp;sort=user_rating,desc&amp;amp;amp;count=250&quot;&amp;gt;IMDb data&amp;lt;/a&amp;gt; on all dramas from the 2010s and ranked them according to their user ratings (out of 10), relying on IMDb user votes to break any rating ties. To qualify, the film had to be listed as &quot;drama” on two or more of the major databases (IMDb, Metacritic, Wikipedia, Letterboxd, Rotten Tomatoes, etc.), released in the United States theatrically or on streaming services between Jan. 1, 2010&amp;nbsp;and today, have at least four critic reviews, and have at least 10,000 votes on IMDb. TV movies and Bollywood productions were not considered.&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;At Stacker, we recognize that genre is meant to help describe and communicate the tone and style of a film, not to serve as a limiting factor on what films can and cannot be. There are no hard and fast lines that define dramas, and we think leaning into more open interpretations of what fits into certain genres is best practice for getting a pool of films that represent all possible expressions of a particular genre. Every film on the list has been considered according to the cinematic history and development of dramas. With that in mind, here are the best dramas from the past decade.&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;&amp;lt;strong&amp;gt;You may also like: &amp;lt;/strong&amp;gt; &amp;lt;a href=&quot;https://thestacker.com/stories/3330/best-miniseries-available-stream&quot;&amp;gt;Best miniseries available to stream&amp;lt;/a&amp;gt;&amp;lt;/p&amp;gt;
&amp;lt;h2&amp;gt;#100. Gravity (2013)&amp;lt;/h2&amp;gt;
&amp;lt;p&amp;gt;- Director: Alfonso Cuarón&amp;lt;br&amp;gt;
- IMDb user rating: 7.7&amp;lt;br&amp;gt;
- Votes: 724,560&amp;lt;br&amp;gt;
- Metascore: 96&amp;lt;br&amp;gt;
- Runtime: 91 min&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;When their shuttle is destroyed, a stranded medical engineer (Sandra Bullock) and astronaut (George Clooney) struggle to survive in space. Director Alfonso Cuarón employed a &amp;lt;a href=&quot;https://www.telegraph.co.uk/technology/news/10667457/Gravitys-Oscar-winning-visual-effects.html&quot;&amp;gt;range of innovative effects&amp;lt;/a&amp;gt; when bringing this 3D story to life. The film earned &amp;lt;a href=&quot;https://www.boxofficemojo.com/release/rl89622017/&quot;&amp;gt;more than&amp;nbsp;$700 million at the worldwide box office&amp;lt;/a&amp;gt; and landed Cuarón an Academy Award for Best Director.&amp;lt;/p&amp;gt;
&amp;lt;h2&amp;gt;#99. A Taxi Driver (2017)&amp;lt;/h2&amp;gt;
&amp;lt;p&amp;gt;- Director: Jang Hun&amp;lt;br&amp;gt;
- IMDb user rating: 7.8&amp;lt;br&amp;gt;
- Votes: 10,467&amp;lt;br&amp;gt;
- Metascore: 69&amp;lt;br&amp;gt;
- Runtime: 137 min&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;This gripping South Korean drama takes place during the Gwangju Uprising in 1980. Upon accepting a healthy sum in fare, a cab driver agrees to take a German reporter from Seoul to Gwangju and back again. Soon enough, the driver finds himself in the midst of radical anti-government protests.&amp;lt;/p&amp;gt;
&amp;lt;h2&amp;gt;#98. The Turin Horse (2011)&amp;lt;/h2&amp;gt;
&amp;lt;p&amp;gt;- Directors: Béla Tarr, Ágnes Hranitzky&amp;lt;br&amp;gt;
- IMDb user rating: 7.8&amp;lt;br&amp;gt;
- Votes: 13,932&amp;lt;br&amp;gt;
- Metascore: 80&amp;lt;br&amp;gt;
- Runtime: 155 min&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;Presented in black and white, this acclaimed drama opens with a brief story about German philosopher Friedrich Nietzsche and his mental breakdown. That leads to a direct pathway to the tale of two rural Italian farmers and their loyal horse, all of whom endure various forms of agony and despair. According to director Béla Tarr, the &amp;lt;a href=&quot;https://cineuropa.org/en/interview/198131/&quot;&amp;gt;film is about the “heaviness of human existence.”&amp;lt;/a&amp;gt;&amp;lt;/p&amp;gt;
&amp;lt;h2&amp;gt;#97. My Life as a Zucchini (2016)&amp;lt;/h2&amp;gt;
&amp;lt;p&amp;gt;- Director: Claude Barras&amp;lt;br&amp;gt;
- IMDb user rating: 7.8&amp;lt;br&amp;gt;
- Votes: 18,036&amp;lt;br&amp;gt;
- Metascore: 85&amp;lt;br&amp;gt;
- Runtime: 70 min&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;Nominated for Best Animated Feature at the 2017 Academy Awards, this Swiss-French stop-motion comedy-drama centers on a young boy nicknamed Courgette. Upon losing his mother in a horrible accident, Courgette ends up in a foster home. What starts as a struggle to adapt becomes an endearing story of love and companionship.&amp;lt;/p&amp;gt;
&amp;lt;h2&amp;gt;#96. Like Father, Like Son (2013)&amp;lt;/h2&amp;gt;
&amp;lt;p&amp;gt;- Director: Hirokazu Koreeda&amp;lt;br&amp;gt;
- IMDb user rating: 7.8&amp;lt;br&amp;gt;
- Votes: 18,901&amp;lt;br&amp;gt;
- Metascore: 73&amp;lt;br&amp;gt;
- Runtime: 121 min&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;A workaholic businessman discovers that the son he’s been raising was switched at birth. Now, he must choose between his biological son and the one he raised. Director Hirokazu Koreeda won the Jury Prize at Cannes, where the film also was nominated for the prestigious Palme d'Or.&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;&amp;lt;strong&amp;gt;You may also like: &amp;lt;/strong&amp;gt; &amp;lt;a href=&quot;https://thestacker.com/stories/3348/best-and-worst-al-pacino-movies?utm_source=12345&quot;&amp;gt;Best and worst Al Pacino movies&amp;lt;/a&amp;gt;&amp;lt;/p&amp;gt;
&amp;lt;h2&amp;gt;#95. Land of Mine (2015)&amp;lt;/h2&amp;gt;
&amp;lt;p&amp;gt;- Director: Martin Zandvliet&amp;lt;br&amp;gt;
- IMDb user rating: 7.8&amp;lt;br&amp;gt;
- Votes: 29,655&amp;lt;br&amp;gt;
- Metascore: 75&amp;lt;br&amp;gt;
- Runtime: 100 min&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;In the aftermath of World War II, a group of German POWs is tasked with clearing thousands of land mines from Denmark’s beaches. Watching over them is a Danish sergeant, who struggles to retain his tough demeanor as the drama unfolds. This film is &amp;lt;a href=&quot;https://www.theglobeandmail.com/arts/film/film-reviews/danish-postwar-drama-land-of-mine-tells-a-little-known-story/article34048206/&quot;&amp;gt;based on true events&amp;lt;/a&amp;gt;.&amp;lt;/p&amp;gt;
&amp;lt;h2&amp;gt;#94. Once Upon a Time in Anatolia (2011)&amp;lt;/h2&amp;gt;
&amp;lt;p&amp;gt;- Director: Nuri Bilge Ceylan&amp;lt;br&amp;gt;
- IMDb user rating: 7.8&amp;lt;br&amp;gt;
- Votes: 35,837&amp;lt;br&amp;gt;
- Metascore: 82&amp;lt;br&amp;gt;
- Runtime: 157 min&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;Striking a deft balance between police procedural and arthouse film, this award-winning Turkish drama grapples with the meaning of truth itself. Joined by two murder suspects, investigators search for a buried body on the outskirts of Keskin. Along the way, the line between corruption and justice begins to blur.&amp;lt;/p&amp;gt;
&amp;lt;h2&amp;gt;#93. The Broken Circle Breakdown (2012)&amp;lt;/h2&amp;gt;
&amp;lt;p&amp;gt;- Director: Felix van Groeningen&amp;lt;br&amp;gt;
- IMDb user rating: 7.8&amp;lt;br&amp;gt;
- Votes: 37,059&amp;lt;br&amp;gt;
- Metascore: 70&amp;lt;br&amp;gt;
- Runtime: 111 min&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;It’s love at first sight between two Belgians named Didier and Elise, whose chemistry is maintained by a mutual passion for bluegrass music. When the couple experiences an unexpected tragedy, it puts their romance to the test. All the &amp;lt;a href=&quot;https://bluegrasstoday.com/the-broken-circle-breakdown-highlights-dutch-bluegrass/&quot;&amp;gt;live music is performed by the actors themselves&amp;lt;/a&amp;gt;, shedding light on a robust Dutch and Belgian bluegrass scene.&amp;lt;/p&amp;gt;
&amp;lt;h2&amp;gt;#92. The Past (2013)&amp;lt;/h2&amp;gt;
&amp;lt;p&amp;gt;- Director: Asghar Farhadi&amp;lt;br&amp;gt;
- IMDb user rating: 7.8&amp;lt;br&amp;gt;
- Votes: 41,902&amp;lt;br&amp;gt;
- Metascore: 85&amp;lt;br&amp;gt;
- Runtime: 130 min&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;From the acclaimed director of “A Separation” comes this powerful drama, which similarly tackles domestic themes. After spending four years in Iran, a man returns to France to finalize his divorce. When he discovers that his ex-wife is now with another man, that revelation paves the way for a series of unexpected revelations.&amp;lt;/p&amp;gt;
&amp;lt;h2&amp;gt;#91. The Salesman (2016)&amp;lt;/h2&amp;gt;
&amp;lt;p&amp;gt;- Director: Asghar Farhadi&amp;lt;br&amp;gt;
- IMDb user rating: 7.8&amp;lt;br&amp;gt;
- Votes: 43,544&amp;lt;br&amp;gt;
- Metascore: 85&amp;lt;br&amp;gt;
- Runtime: 124 min&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;Asghar Farhadi has no less than three films on the list, including this one from 2016. While participating in a production of “Death of a Salesman,” a teacher and his wife must deal with a traumatic event at home. Layered within the premise is an examination of class divides and the nature of empathy.&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;&amp;lt;strong&amp;gt;You may also like: &amp;lt;/strong&amp;gt; &amp;lt;a href=&quot;https://thestacker.com/stories/3438/best-emmy-nominated-shows-all-time?utm_source=12345&quot;&amp;gt;Best Emmy nominated shows of all time&amp;lt;/a&amp;gt;&amp;lt;/p&amp;gt;
&amp;lt;h2&amp;gt;#90. Pride (2014)&amp;lt;/h2&amp;gt;
&amp;lt;p&amp;gt;- Director: Matthew Warchus&amp;lt;br&amp;gt;
- IMDb user rating: 7.8&amp;lt;br&amp;gt;
- Votes: 47,717&amp;lt;br&amp;gt;
- Metascore: 79&amp;lt;br&amp;gt;
- Runtime: 119 min&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;&amp;lt;a href=&quot;https://www.theguardian.com/film/2014/aug/31/pride-film-gay-activists-miners-strike-interview&quot;&amp;gt;Based on a true story&amp;lt;/a&amp;gt;, this British comedy-drama kicks off in the summer of 1984. In a surprising show of solidarity, gay activists throw their support behind Britain’s striking miners. Defying opposition from within and without, the newfound partnership ends up changing the course of history.&amp;lt;/p&amp;gt;
&amp;lt;h2&amp;gt;#89. The Wind Rises (2013)&amp;lt;/h2&amp;gt;
&amp;lt;p&amp;gt;- Director: Hayao Miyazaki&amp;lt;br&amp;gt;
- IMDb user rating: 7.8&amp;lt;br&amp;gt;
- Votes: 62,773&amp;lt;br&amp;gt;
- Metascore: 83&amp;lt;br&amp;gt;
- Runtime: 126 min&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;From legendary animator Hayao Miyazaki comes one of his most mature efforts, chronicling the &amp;lt;a href=&quot;https://www.nytimes.com/1982/01/12/obituaries/jiro-horikoshi-78-dies-in-tokyo-designer-of-zero-fighter-aircraft.html&quot;&amp;gt;true story of aeronautical designer Jirô Horikoshi&amp;lt;/a&amp;gt;. Unfolding over the course of several decades, it follows Horikoshi from a young dreamer to one of Japan’s most important visionaries. This is a rare Miyazaki effort in that it doesn’t include an element of fantasy.&amp;lt;/p&amp;gt;
&amp;lt;h2&amp;gt;#88. Beasts of No Nation (2015)&amp;lt;/h2&amp;gt;
&amp;lt;p&amp;gt;- Director: Cary Joji Fukunaga&amp;lt;br&amp;gt;
- IMDb user rating: 7.8&amp;lt;br&amp;gt;
- Votes: 65,990&amp;lt;br&amp;gt;
- Metascore: 79&amp;lt;br&amp;gt;
- Runtime: 137 min&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;Netflix came out of the gates swinging with this violent drama, which stars Idris Elba and takes place in the midst of a civil war. It tells the story of a young boy named Agu, who’s robbed of his childhood when he’s forced to join a local militia. Sparing no explicit detail, the film offers a brutal glimpse into the life of a child soldier.&amp;lt;/p&amp;gt;
&amp;lt;h2&amp;gt;#87. The Great Beauty (2013)&amp;lt;/h2&amp;gt;
&amp;lt;p&amp;gt;- Director: Paolo Sorrentino&amp;lt;br&amp;gt;
- IMDb user rating: 7.8&amp;lt;br&amp;gt;
- Votes: 73,983&amp;lt;br&amp;gt;
- Metascore: 86&amp;lt;br&amp;gt;
- Runtime: 141 min&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;Channeling Italian classics like “La Dolce Vita,” director Paolo Sorrentino offers this celebrated character study. When he’s confronted with the shallowness of his hedonistic lifestyle, a journalist embarks on a quest to find great beauty in the city of Rome. This movie won an Academy Award for Best Foreign Language Film.&amp;lt;/p&amp;gt;
&amp;lt;h2&amp;gt;#86. I Saw the Devil (2010)&amp;lt;/h2&amp;gt;
&amp;lt;p&amp;gt;- Director: Kim Jee-woon&amp;lt;br&amp;gt;
- IMDb user rating: 7.8&amp;lt;br&amp;gt;
- Votes: 97,167&amp;lt;br&amp;gt;
- Metascore: 67&amp;lt;br&amp;gt;
- Runtime: 142 min&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;There might not be any supernatural forces in this acclaimed South Korean crime drama, but it renders the same impression as a well-made horror film. In his pursuit of the serial killer who murdered his fiancée, a secret agent goes to dangerous extremes. What follows is a brutal and frequently graphic showdown between two lost souls.&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;&amp;lt;strong&amp;gt;You may also like: &amp;lt;/strong&amp;gt; &amp;lt;a href=&quot;https://thestacker.com/stories/1806/100-best-western-films-all-time-according-critics?utm_source=12345&quot;&amp;gt;100 best Western films of all time, according to critics&amp;lt;/a&amp;gt;&amp;lt;/p&amp;gt;
&amp;lt;h2&amp;gt;#85. The Best Offer (2013)&amp;lt;/h2&amp;gt;
&amp;lt;p&amp;gt;- Director: Giuseppe Tornatore&amp;lt;br&amp;gt;
- IMDb user rating: 7.8&amp;lt;br&amp;gt;
- Votes: 98,434&amp;lt;br&amp;gt;
- Metascore: 49&amp;lt;br&amp;gt;
- Runtime: 131 min&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;Italian filmmaker Giuseppe Tornatore takes viewers inside the world of high-end antiques with this mysterious drama. It stars Geoffrey Rush as a lonely art expert named Virgil Oldman, who forges an unconventional relationship with his reclusive client (Claire Ibbetson). As it often goes with outrageously expensive collectibles, things are not always what they seem.&amp;lt;/p&amp;gt;
&amp;lt;h2&amp;gt;#84. Roma (2018)&amp;lt;/h2&amp;gt;
&amp;lt;p&amp;gt;- Director: Alfonso Cuarón&amp;lt;br&amp;gt;
- IMDb user rating: 7.8&amp;lt;br&amp;gt;
- Votes: 116,039&amp;lt;br&amp;gt;
- Metascore: 96&amp;lt;br&amp;gt;
- Runtime: 135 min&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;Alfonso Cuarón returns to the list with this heartfelt drama, which &amp;lt;a href=&quot;https://www.hollywoodreporter.com/news/alfonso-cuaron-describes-romas-autobiographical-elements-1139197&quot;&amp;gt;draws upon his own boyhood experiences&amp;lt;/a&amp;gt;. Set in 1970s Mexico City, it depicts a year in the life of a middle-class family’s maid. In addition to earning Cuarón his second Academy Award for Best Director, it won for Best Foreign Language Film and Best Achievement in Cinematography.&amp;lt;/p&amp;gt;
&amp;lt;h2&amp;gt;#83. Blue Is the Warmest Color (2013)&amp;lt;/h2&amp;gt;
&amp;lt;p&amp;gt;- Director: Abdellatif Kechiche&amp;lt;br&amp;gt;
- IMDb user rating: 7.8&amp;lt;br&amp;gt;
- Votes: 127,561&amp;lt;br&amp;gt;
- Metascore: 88&amp;lt;br&amp;gt;
- Runtime: 180 min&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;When French teenager Adèle (Adèle Exarchopoulos) meets a blue-haired painter named Emma (Léa Seydoux), it paves the way for a life-changing romance. The lead actresses delivered such powerhouse performances that they ended up &amp;lt;a href=&quot;https://www.independent.co.uk/arts-entertainment/films/features/blue-is-the-warmest-colour-actresses-on-their-lesbian-sex-scenes-we-felt-like-prostitutes-8856909.html&quot;&amp;gt;sharing the Palme d'Or prize with director Abdellatif Kechiche&amp;lt;/a&amp;gt;. They and director Jane Campion are the only women to have ever won the Cannes Film Festival’s coveted award.&amp;lt;/p&amp;gt;
&amp;lt;h2&amp;gt;#82. Hidden Figures (2016)&amp;lt;/h2&amp;gt;
&amp;lt;p&amp;gt;- Director: Theodore Melfi&amp;lt;br&amp;gt;
- IMDb user rating: 7.8&amp;lt;br&amp;gt;
- Votes: 177,416&amp;lt;br&amp;gt;
- Metascore: 74&amp;lt;br&amp;gt;
- Runtime: 127 min&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;A critical and box office smash, “Hidden Figures” tells the &amp;lt;a href=&quot;https://www.smithsonianmag.com/history/forgotten-black-women-mathematicians-who-helped-win-wars-and-send-astronauts-space-180960393/&quot;&amp;gt;true story of three female African American mathematicians&amp;lt;/a&amp;gt;. Regarded as “human computers,” Dorothy Vaughan, Katherine G. Johnson, and Mary Jackson help NASA forge ahead in the space race. They’re played respectively by actresses Taraji P. Henson, Octavia Spencer, and Janelle Monáe.&amp;lt;/p&amp;gt;
&amp;lt;h2&amp;gt;#81. Manchester by the Sea (2016)&amp;lt;/h2&amp;gt;
&amp;lt;p&amp;gt;- Director: Kenneth Lonergan&amp;lt;br&amp;gt;
- IMDb user rating: 7.8&amp;lt;br&amp;gt;
- Votes: 221,337&amp;lt;br&amp;gt;
- Metascore: 96&amp;lt;br&amp;gt;
- Runtime: 137 min&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;In the wake of his brother’s death, Lee Chandler (Casey Affleck) returns to the fishing village he once called home. Upon taking guardianship of his teenage nephew, Chandler must confront an unspeakable tragedy from his own past. Strong performances and superb writing garnered the film heaps of acclaim and two Academy Awards.&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;&amp;lt;strong&amp;gt;You may also like: &amp;lt;/strong&amp;gt; &amp;lt;a href=&quot;https://thestacker.com/stories/3330/best-miniseries-available-stream?utm_source=12345&quot;&amp;gt;Best miniseries available to stream&amp;lt;/a&amp;gt;&amp;lt;/p&amp;gt;
&amp;lt;h2&amp;gt;#80. About Time (2013)&amp;lt;/h2&amp;gt;
&amp;lt;p&amp;gt;- Director: Richard Curtis&amp;lt;br&amp;gt;
- IMDb user rating: 7.8&amp;lt;br&amp;gt;
- Votes: 273,640&amp;lt;br&amp;gt;
- Metascore: 55&amp;lt;br&amp;gt;
- Runtime: 123 min&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;Injecting the romantic comedy genre with a dose of sci-fi, “About Time” presents its 21-year-old protagonist (Domhnall Gleeson) with the gift of time travel. Determined to get the girl (Rachel McAdams), he changes past events and predictably causes some unintended consequences. Director Richard Curtis was inspired to make the film after &amp;lt;a href=&quot;https://www.firstshowing.net/2013/interview-about-time-writer-director-richard-curtis-on-happiness/&quot;&amp;gt;asking himself how one might achieve true happiness in life&amp;lt;/a&amp;gt;.&amp;lt;/p&amp;gt;
&amp;lt;h2&amp;gt;#79. Moonrise Kingdom (2012)&amp;lt;/h2&amp;gt;
&amp;lt;p&amp;gt;- Director: Wes Anderson&amp;lt;br&amp;gt;
- IMDb user rating: 7.8&amp;lt;br&amp;gt;
- Votes: 297,108&amp;lt;br&amp;gt;
- Metascore: 84&amp;lt;br&amp;gt;
- Runtime: 94 min&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;If quirky comedy-drama went by any other name, that name might very well be Wes Anderson. This 2012 outing finds the director in a warm and whimsical mood, telling the story of two 12-year-old runaways and the efforts to find them. Featured in the star-studded cast are Edward Norton, Tilda Swinton, Bill Murray, Frances McDormand, Bruce Willis, Jason Schwartzman, and others.&amp;lt;/p&amp;gt;
&amp;lt;h2&amp;gt;#78. The Big Short (2015)&amp;lt;/h2&amp;gt;
&amp;lt;p&amp;gt;- Director: Adam McKay&amp;lt;br&amp;gt;
- IMDb user rating: 7.8&amp;lt;br&amp;gt;
- Votes: 320,618&amp;lt;br&amp;gt;
- Metascore: 81&amp;lt;br&amp;gt;
- Runtime: 130 min&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;Like an idiot’s guide to the market crash of 2008, this inventive comedy-drama cuts straight to the heart of the mortgage crisis. It centers on a handful of savvy investors who anticipate the coming crash and place their chips wisely. The film features both a full slate of A-list talent and numerous celebrity cameos.&amp;lt;/p&amp;gt;
&amp;lt;h2&amp;gt;#77. The Fighter (2010)&amp;lt;/h2&amp;gt;
&amp;lt;p&amp;gt;- Director: David O. Russell&amp;lt;br&amp;gt;
- IMDb user rating: 7.8&amp;lt;br&amp;gt;
- Votes: 321,271&amp;lt;br&amp;gt;
- Metascore: 79&amp;lt;br&amp;gt;
- Runtime: 116 min&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;The &amp;lt;a href=&quot;https://www.theguardian.com/film/2011/feb/02/the-fighter-movie-micky-ward&quot;&amp;gt;true story of small-town boxer Micky Ward&amp;lt;/a&amp;gt; leapt onto the big screen in 2010, with Mark Wahlberg tackling the lead role. Christian Bale, Amy Adams, and Melissa Leo—who won an Academy Award for Best Supporting Actress—had similarly strong performances. A comeback in more ways than one, the film provided a substantial boost to director David O. Russell’s somewhat fledgling career.&amp;lt;/p&amp;gt;
&amp;lt;h2&amp;gt;#76. Captain Phillips (2013)&amp;lt;/h2&amp;gt;
&amp;lt;p&amp;gt;- Director: Paul Greengrass&amp;lt;br&amp;gt;
- IMDb user rating: 7.8&amp;lt;br&amp;gt;
- Votes: 394,375&amp;lt;br&amp;gt;
- Metascore: 83&amp;lt;br&amp;gt;
- Runtime: 134 min&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;Filmed in the handheld style director Paul Greengrass has become known for, this gripping drama depicts the true story of Capt.&amp;nbsp;Richard Phillips (played by Tom Hanks). When his cargo ship is hijacked by Somali pirates, Phillips must act fast if he wants to save himself and his crew. If some reports are to be believed, the &amp;lt;a href=&quot;https://nypost.com/2013/10/13/crew-members-deny-captain-phillips-heroism/&quot;&amp;gt;real Captain Phillips isn’t necessarily the hero this movie makes him out to be&amp;lt;/a&amp;gt;.&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;&amp;lt;strong&amp;gt;You may also like: &amp;lt;/strong&amp;gt; &amp;lt;a href=&quot;https://thestacker.com/stories/1545/biggest-box-office-bombs-all-time?utm_source=12345&quot;&amp;gt;Biggest box office bombs of all time&amp;lt;/a&amp;gt;&amp;lt;/p&amp;gt;
&amp;lt;h2&amp;gt;#75. The Girl with the Dragon Tattoo (2011)&amp;lt;/h2&amp;gt;
&amp;lt;p&amp;gt;- Director: David Fincher&amp;lt;br&amp;gt;
- IMDb user rating: 7.8&amp;lt;br&amp;gt;
- Votes: 394,730&amp;lt;br&amp;gt;
- Metascore: 71&amp;lt;br&amp;gt;
- Runtime: 158 min&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;Journalist Mikael Blomkvist (Daniel Craig) teams up with a computer hacker (Rooney Mara) to solve a mystery in David Fincher’s dark drama. Despite high marks from critics and audiences alike, this 2011 book adaptation &amp;lt;a href=&quot;https://www.denofgeek.com/us/movies/the-girl-with-the-dragon-tattoo/270560/what-went-wrong-with-2011s-the-girl-with-the-dragon-tattoo&quot;&amp;gt;wasn’t the franchise-starter that Sony might have hoped for&amp;lt;/a&amp;gt;. An &amp;lt;a href=&quot;https://bombreport.com/yearly-breakdowns/2018-2/the-girl-in-the-spiders-web/&quot;&amp;gt;attempted reboot in 2018&amp;lt;/a&amp;gt; proved even more fatal to the franchise’s potential.&amp;lt;/p&amp;gt;
&amp;lt;h2&amp;gt;#74. The Hateful Eight (2015)&amp;lt;/h2&amp;gt;
&amp;lt;p&amp;gt;- Director: Quentin Tarantino&amp;lt;br&amp;gt;
- IMDb user rating: 7.8&amp;lt;br&amp;gt;
- Votes: 462,174&amp;lt;br&amp;gt;
- Metascore: 68&amp;lt;br&amp;gt;
- Runtime: 168 min&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;Snowbound in a Wyoming cabin, eight rugged characters must figure out who’s to be trusted and who’s to be killed. So goes this post-Civil War drama from Quentin Tarantino, who released it on 70mm film during a traveling roadshow. At least three different versions exist, including one that clocks in at 213 minutes.&amp;lt;/p&amp;gt;
&amp;lt;h2&amp;gt;#73. Drive (2011)&amp;lt;/h2&amp;gt;
&amp;lt;p&amp;gt;- Director: Nicolas Winding Refn&amp;lt;br&amp;gt;
- IMDb user rating: 7.8&amp;lt;br&amp;gt;
- Votes: 532,135&amp;lt;br&amp;gt;
- Metascore: 78&amp;lt;br&amp;gt;
- Runtime: 100 min&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;Lush visuals and a hypnotic score help this crime drama rise above average fare. It stars Ryan Gosling as a mysterious Hollywood stuntman who occasionally moonlights as a skilled getaway driver. Nicolas Winding Refn’s penchant for neon hues and unnatural pauses gives the film an offbeat atmosphere.&amp;lt;/p&amp;gt;
&amp;lt;h2&amp;gt;#72. Ernest &amp;amp;amp; Celestine (2012)&amp;lt;/h2&amp;gt;
&amp;lt;p&amp;gt;- Directors: Stéphane Aubier, Vincent Patar, Benjamin Renner&amp;lt;br&amp;gt;
- IMDb user rating: 7.9&amp;lt;br&amp;gt;
- Votes: 16,387&amp;lt;br&amp;gt;
- Metascore: 86&amp;lt;br&amp;gt;
- Runtime: 80 min&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;A bear and mouse make for unlikely companions in this delightful animated film. Based on a series of children’s books, the movie takes place in a world where bears roam above ground while rodents are confined to underground lairs. It scored a &amp;lt;a href=&quot;https://www.metacritic.com/movie/ernest-celestine&quot;&amp;gt;whopping 86 on Metacritic&amp;lt;/a&amp;gt;, indicating near-universal acclaim.&amp;lt;/p&amp;gt;
&amp;lt;h2&amp;gt;#71. Embrace of the Serpent (2015)&amp;lt;/h2&amp;gt;
&amp;lt;p&amp;gt;- Director: Ciro Guerra&amp;lt;br&amp;gt;
- IMDb user rating: 7.9&amp;lt;br&amp;gt;
- Votes: 18,136&amp;lt;br&amp;gt;
- Metascore: 82&amp;lt;br&amp;gt;
- Runtime: 125 min&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;Shot primarily in black and white, this multilingual adventure follows two separate journeys through the Colombian Amazon jungle. Leading the way on both trips is a shaman named Karamakate, who helps two scientists in their search for a mystic plant. The &amp;lt;a href=&quot;https://www.japantimes.co.jp/culture/2016/11/02/films/film-reviews/embrace-serpent-amid-poisons-colonization/#.Xc2CdW5FzA1&quot;&amp;gt;film is based on the writings&amp;lt;/a&amp;gt; of German ethnologist Theodor Koch-Grunberg and American botanist Richard Evans Schultes.&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;&amp;lt;strong&amp;gt;You may also like: &amp;lt;/strong&amp;gt; &amp;lt;a href=&quot;https://thestacker.com/stories/3317/30-musicians-legendarily-long-careers?utm_source=12345&quot;&amp;gt;30 musicians with legendarily long careers&amp;lt;/a&amp;gt;&amp;lt;/p&amp;gt;
&amp;lt;h2&amp;gt;#70. The Way He Looks (2014)&amp;lt;/h2&amp;gt;
&amp;lt;p&amp;gt;- Director: Daniel Ribeiro&amp;lt;br&amp;gt;
- IMDb user rating: 7.9&amp;lt;br&amp;gt;
- Votes: 20,776&amp;lt;br&amp;gt;
- Metascore: 71&amp;lt;br&amp;gt;
- Runtime: 96 min&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;Brazilian filmmaker Daniel Ribeiro recruited the original leads from his acclaimed short film “I Don't Want to Go Back Alone” for this full-length version. It tells the story of a blind teenager named Leonardo who befriends a new male student and subsequently comes of age. The film won a slate of honors and awards, including the Teddy Award for best LGBT-themed feature at the Berlin International Film Festival.&amp;lt;/p&amp;gt;
&amp;lt;h2&amp;gt;#69. I, Daniel Blake (2016)&amp;lt;/h2&amp;gt;
&amp;lt;p&amp;gt;- Directors: Ken Loach, Laura Obiols&amp;lt;br&amp;gt;
- IMDb user rating: 7.9&amp;lt;br&amp;gt;
- Votes: 45,941&amp;lt;br&amp;gt;
- Metascore: 78&amp;lt;br&amp;gt;
- Runtime: 100 min&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;Deemed unfit to work by his doctor, 59-year-old Daniel Blake squares off against Britain’s bureaucracy when trying to obtain an Employment and Support Allowance. Winner of the Palme d'Or at the 2016 Cannes Film Festival, the film offers a bleak and poignant view into the life of a working-class citizen. Washington Post movie critic &amp;lt;a href=&quot;https://www.washingtonpost.com/goingoutguide/movies/i-daniel-blake-a-radiant-portrait-of-resilience-amid-economic-despair/2017/06/01/2cf18916-455f-11e7-a196-a1bb629f64cb_story.html&quot;&amp;gt;Ann Hornaday suggests that the “true target is privatization”&amp;lt;/a&amp;gt; and its role in the modern world.&amp;lt;/p&amp;gt;
&amp;lt;h2&amp;gt;#68. Amour (2012)&amp;lt;/h2&amp;gt;
&amp;lt;p&amp;gt;- Director: Michael Haneke&amp;lt;br&amp;gt;
- IMDb user rating: 7.9&amp;lt;br&amp;gt;
- Votes: 86,486&amp;lt;br&amp;gt;
- Metascore: 94&amp;lt;br&amp;gt;
- Runtime: 127 min&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;The love between an octogenarian husband and wife is put to the test when the wife has a stroke. As with much of Michael Haneke’s work, the movie unfolds at a gradual pace before reaching its jarring climax. It won the Academy Award for Best Foreign Language Film in 2013.&amp;lt;/p&amp;gt;
&amp;lt;h2&amp;gt;#67. Hunt for the Wilderpeople (2016)&amp;lt;/h2&amp;gt;
&amp;lt;p&amp;gt;- Director: Taika Waititi&amp;lt;br&amp;gt;
- IMDb user rating: 7.9&amp;lt;br&amp;gt;
- Votes: 91,540&amp;lt;br&amp;gt;
- Metascore: 81&amp;lt;br&amp;gt;
- Runtime: 101 min&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;Before injecting his signature touch into the Marvel Cinematic Universe, director Taika Waititi churned out this quirky adventure. Set in New Zealand, it centers on the manhunt for a runaway boy and his foster father (Sam Neill). Beyond the wisecracking dialogue and zany antics is a heartfelt coming-of-age story about male bonding.&amp;lt;/p&amp;gt;
&amp;lt;h2&amp;gt;#66. Isle of Dogs (2018)&amp;lt;/h2&amp;gt;
&amp;lt;p&amp;gt;- Director: Wes Anderson&amp;lt;br&amp;gt;
- IMDb user rating: 7.9&amp;lt;br&amp;gt;
- Votes: 116,776&amp;lt;br&amp;gt;
- Metascore: 82&amp;lt;br&amp;gt;
- Runtime: 101 min&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;Wes Anderson’s second foray into stop-motion animation takes place in the city of Megasaki, Japan, where all dogs have been exiled to Trash Island. With help from five quirky canines, a young boy searches for his beloved pet. Lending their voices are Bill Murray, Scarlett Johansson, Greta Gerwig, Frances McDormand, Bryan Cranston, and Edward Norton, among others.&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;&amp;lt;strong&amp;gt;You may also like: &amp;lt;/strong&amp;gt; &amp;lt;a href=&quot;https://thestacker.com/stories/3309/111-monumental-movies-film-history-and-why-you-need-see-them?utm_source=12345&quot;&amp;gt;111 monumental movies from film history and why you need to see them&amp;lt;/a&amp;gt;&amp;lt;/p&amp;gt;
&amp;lt;h2&amp;gt;#65. Before Midnight (2013)&amp;lt;/h2&amp;gt;
&amp;lt;p&amp;gt;- Director: Richard Linklater&amp;lt;br&amp;gt;
- IMDb user rating: 7.9&amp;lt;br&amp;gt;
- Votes: 126,587&amp;lt;br&amp;gt;
- Metascore: 94&amp;lt;br&amp;gt;
- Runtime: 109 min&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;Richard Linklater’s “Before Trilogy” culminated with this 2013 effort, which picks things up nine years after its predecessor. Now married with kids, Jesse (Ethan Hawke) and Celine (Julie Delpy) explore a range of personal and philosophical themes during a getaway to Greece. While the narrative and dialogue retain an improvised feel, &amp;lt;a href=&quot;https://variety.com/2014/film/news/trio-behind-low-budget-before-trilogy-wrote-spontaneity-into-the-scripts-1201075015/&quot;&amp;gt;every word was scripted&amp;lt;/a&amp;gt;.&amp;lt;/p&amp;gt;
&amp;lt;h2&amp;gt;#64. Call Me by Your Name (2017)&amp;lt;/h2&amp;gt;
&amp;lt;p&amp;gt;- Director: Luca Guadagnino&amp;lt;br&amp;gt;
- IMDb user rating: 7.9&amp;lt;br&amp;gt;
- Votes: 165,488&amp;lt;br&amp;gt;
- Metascore: 93&amp;lt;br&amp;gt;
- Runtime: 132 min&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;Set in 1980s Italy, this coming-of-age drama chronicles the budding romance between a teenage boy (Timothée Chalamet) and a 20-something grad student (Armie Hammer). Drifting by at a languid pace, the narrative moves from innocence to experience. Industry legend James Ivory became the &amp;lt;a href=&quot;https://www.imdb.com/title/tt5726616/awards?ref_=tt_awd&quot;&amp;gt;oldest winner of a competitive Oscar&amp;lt;/a&amp;gt; when he snagged the award for Best Adapted Screenplay.&amp;lt;/p&amp;gt;
&amp;lt;h2&amp;gt;#63. Captain Fantastic (2016)&amp;lt;/h2&amp;gt;
&amp;lt;p&amp;gt;- Director: Matt Ross&amp;lt;br&amp;gt;
- IMDb user rating: 7.9&amp;lt;br&amp;gt;
- Votes: 166,170&amp;lt;br&amp;gt;
- Metascore: 72&amp;lt;br&amp;gt;
- Runtime: 118 min&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;Viggo Mortensen plays an anti-corporate survivalist named Ben in this thought-provoking comedy-drama. Living off the grid, Ben trains his six children to fend for themselves in the wilderness. But does his unconventional parenting style put his kids ahead or behind when they venture into the real world?&amp;lt;/p&amp;gt;
&amp;lt;h2&amp;gt;#62. Straight Outta Compton (2015)&amp;lt;/h2&amp;gt;
&amp;lt;p&amp;gt;- Director: F. Gary Gray&amp;lt;br&amp;gt;
- IMDb user rating: 7.9&amp;lt;br&amp;gt;
- Votes: 168,344&amp;lt;br&amp;gt;
- Metascore: 72&amp;lt;br&amp;gt;
- Runtime: 147 min&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;Co-produced by Dr. Dre and Ice Cube (among numerous others), this wildly successful biopic chronicles the rise and fall of controversial hip-hop group N.W.A. Rebelling against various forms of authority, the group finds itself in the midst of a nationwide culture war. Shot on a reported budget of $28 million, the film &amp;lt;a href=&quot;https://www.boxofficemojo.com/release/rl292718081/&quot;&amp;gt;earned more than $201 million&amp;lt;/a&amp;gt; at the worldwide box office.&amp;lt;/p&amp;gt;
&amp;lt;h2&amp;gt;#61. The Artist (2011)&amp;lt;/h2&amp;gt;
&amp;lt;p&amp;gt;- Director: Michel Hazanavicius&amp;lt;br&amp;gt;
- IMDb user rating: 7.9&amp;lt;br&amp;gt;
- Votes: 219,650&amp;lt;br&amp;gt;
- Metascore: 89&amp;lt;br&amp;gt;
- Runtime: 100 min&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;The &amp;lt;a href=&quot;https://www.hollywoodreporter.com/race/cesar-awards-the-artist-michel-hazanavicius-294893&quot;&amp;gt;most-awarded French film in history&amp;lt;/a&amp;gt; meticulously recreates the tropes and traditions of Hollywood’s silent era. At the heart of the story is egocentric movie star George Valentin, who takes a young dancer under his wing. When talkie pictures roll into town, they threaten to uproot both Valentin’s stardom and his newfound relationship.&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;&amp;lt;strong&amp;gt;You may also like: &amp;lt;/strong&amp;gt; &amp;lt;a href=&quot;https://thestacker.com/stories/3328/gender-disparity-among-film-critics?utm_source=12345&quot;&amp;gt;Gender disparity among film critics&amp;lt;/a&amp;gt;&amp;lt;/p&amp;gt;
&amp;lt;h2&amp;gt;#60. Boyhood (2014)&amp;lt;/h2&amp;gt;
&amp;lt;p&amp;gt;- Director: Richard Linklater&amp;lt;br&amp;gt;
- IMDb user rating: 7.9&amp;lt;br&amp;gt;
- Votes: 320,003&amp;lt;br&amp;gt;
- Metascore: 100&amp;lt;br&amp;gt;
- Runtime: 165 min&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;Filmed over the course of 12 years, “Boyhood” follows Mason Evans Jr. as he goes from young boy to inquisitive adolescent. In lieu of a strict narrative, director Richard Linklater once again plays it loose while conveying a full range of humanist themes. Ethan Hawke and Patricia Arquette star as Mason’s parents, who likewise learn and mature as the experimental narrative forges ahead.&amp;lt;/p&amp;gt;
&amp;lt;h2&amp;gt;#59. Nightcrawler (2014)&amp;lt;/h2&amp;gt;
&amp;lt;p&amp;gt;- Director: Dan Gilroy&amp;lt;br&amp;gt;
- IMDb user rating: 7.9&amp;lt;br&amp;gt;
- Votes: 417,891&amp;lt;br&amp;gt;
- Metascore: 76&amp;lt;br&amp;gt;
- Runtime: 117 min&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;Set in a world too familiar to qualify as satirical, this tightly paced thriller puts modern crime journalism in its proverbial crosshairs. Jake Gyllenhaal stars as L.A.-based con man Louis Bloom, who develops a knack for exploiting tragic events. That makes him a perfect fit for the local TV news, which spares no gruesome detail when trying to pull ahead in the ratings.&amp;lt;/p&amp;gt;
&amp;lt;h2&amp;gt;#58. Dunkirk (2017)&amp;lt;/h2&amp;gt;
&amp;lt;p&amp;gt;- Director: Christopher Nolan&amp;lt;br&amp;gt;
- IMDb user rating: 7.9&amp;lt;br&amp;gt;
- Votes: 485,968&amp;lt;br&amp;gt;
- Metascore: 94&amp;lt;br&amp;gt;
- Runtime: 106 min&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;Based on actual events, Christopher Nolan’s taut Word War II movie takes place during the evacuation of Allied forces from the French seaport of Dunkirk. Eschewing traditional character development, the film highlights a gripping fight for survival among various groups of soldiers. The constant sound of a ticking clock reinforces the movie’s tagline: “Time is running out.”&amp;lt;/p&amp;gt;
&amp;lt;h2&amp;gt;#57. Arrival (2016)&amp;lt;/h2&amp;gt;
&amp;lt;p&amp;gt;- Director: Denis Villeneuve&amp;lt;br&amp;gt;
- IMDb user rating: 7.9&amp;lt;br&amp;gt;
- Votes: 535,161&amp;lt;br&amp;gt;
- Metascore: 81&amp;lt;br&amp;gt;
- Runtime: 116 min&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;Aliens have landed during the earliest scenes of this Denis Villeneuve film, but don’t take that to mean it’s a standard invasion movie. Incorporating a range of (literally) universal themes, it follows a linguistics expert (Amy Adams) as she tries to determine whether the visitors come in peace. While the narrative does, indeed, bear the hallmarks of a classic sci-fi thriller, there’s a harrowing drama at its core.&amp;lt;/p&amp;gt;
&amp;lt;h2&amp;gt;#56. Life of Pi (2012)&amp;lt;/h2&amp;gt;
&amp;lt;p&amp;gt;- Director: Ang Lee&amp;lt;br&amp;gt;
- IMDb user rating: 7.9&amp;lt;br&amp;gt;
- Votes: 546,393&amp;lt;br&amp;gt;
- Metascore: 79&amp;lt;br&amp;gt;
- Runtime: 127 min&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;Adapted from the &amp;lt;a href=&quot;https://www.rottentomatoes.com/m/life_of_pi&quot;&amp;gt;supposedly “unfilmable” best-selling novel&amp;lt;/a&amp;gt;, this 3D adventure sends a young man named Pi out to sea aboard a lifeboat. So begins an epic journey, during which Pi must gain the trust of a Bengal tiger named Richard Parker. Despite its &amp;lt;a href=&quot;https://mashable.com/2013/03/12/life-of-pi-technology/&quot;&amp;gt;numerous technical achievements&amp;lt;/a&amp;gt;, the movie also succeeds through the power of visceral storytelling.&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;&amp;lt;strong&amp;gt;You may also like: &amp;lt;/strong&amp;gt; &amp;lt;a href=&quot;https://thestacker.com/stories/1003/most-famous-musician-born-same-year-you?utm_source=12345&quot;&amp;gt;Most famous musician born the same year as you&amp;lt;/a&amp;gt;&amp;lt;/p&amp;gt;
&amp;lt;h2&amp;gt;#55. The Farewell (2019)&amp;lt;/h2&amp;gt;
&amp;lt;p&amp;gt;- Director: Lulu Wang&amp;lt;br&amp;gt;
- IMDb user rating: 8.0&amp;lt;br&amp;gt;
- Votes: 10,000&amp;lt;br&amp;gt;
- Metascore: 89&amp;lt;br&amp;gt;
- Runtime: 100 min&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;Mining joy out of tragedy, this semi-autobiographical dramedy from Lulu Wang is &amp;lt;a href=&quot;https://a24films.com/films/the-farewell&quot;&amp;gt;“based on an actual lie.”&amp;lt;/a&amp;gt; When it’s discovered that a grandmother has weeks to live, her family keeps her in the dark and then expedites a wedding as a celebratory farewell. Awkwafina of “Crazy Rich Asians” fame stars in her first leading role.&amp;lt;/p&amp;gt;
&amp;lt;h2&amp;gt;#54. The Tale of The Princess Kaguya (2013)&amp;lt;/h2&amp;gt;
&amp;lt;p&amp;gt;- Director: Isao Takahata&amp;lt;br&amp;gt;
- IMDb user rating: 8.0&amp;lt;br&amp;gt;
- Votes: 30,173&amp;lt;br&amp;gt;
- Metascore: 89&amp;lt;br&amp;gt;
- Runtime: 137 min&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;Over &amp;lt;a href=&quot;https://medium.com/@Film4/isao-takahata-on-the-tale-of-the-princess-kaguya-4221f5df60a9&quot;&amp;gt;eight years in the making&amp;lt;/a&amp;gt;, this Studio Ghibli production draws inspiration from a famous 10th-century Japanese folktale. Presented in a stunning hand-drawn animation style, the movie starts off with the discovery of a tiny princess living inside a bamboo stalk. As she blossoms into a young woman, she catches the eye of various potential suitors.&amp;lt;/p&amp;gt;
&amp;lt;h2&amp;gt;#53. Shoplifters (2018)&amp;lt;/h2&amp;gt;
&amp;lt;p&amp;gt;- Director: Hirokazu Koreeda&amp;lt;br&amp;gt;
- IMDb user rating: 8.0&amp;lt;br&amp;gt;
- Votes: 40,073&amp;lt;br&amp;gt;
- Metascore: 93&amp;lt;br&amp;gt;
- Runtime: 121 min&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;Winner of the Palme d'Or at the 2018 Cannes Film Festival, this Japanese drama centers on a family of small-time crooks. When they take in a young girl off the streets, the family is forced to reckon with its thieving ways. A bona fide critical darling, it has a 99% rating on Rotten Tomatoes’ Tomatometer and a score of 93 on Metacritic.&amp;lt;/p&amp;gt;
&amp;lt;h2&amp;gt;#52. Short Term 12 (2013)&amp;lt;/h2&amp;gt;
&amp;lt;p&amp;gt;- Director: Destin Daniel Cretton&amp;lt;br&amp;gt;
- IMDb user rating: 8.0&amp;lt;br&amp;gt;
- Votes: 75,108&amp;lt;br&amp;gt;
- Metascore: 82&amp;lt;br&amp;gt;
- Runtime: 96 min&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;Actress &amp;lt;a href=&quot;https://www.hollywoodreporter.com/news/short-term-12s-brie-larson-612681&quot;&amp;gt;Brie Larson delivers a breakthrough performance&amp;lt;/a&amp;gt; in this independent drama, about the supervising staff at a residential treatment facility. As she tries to help various at-risk youth, a young counselor (Larson) struggles to balance her career and her personal life. The film premiered at SXSW in 2013, winning both the Grand Jury and Audience Award.&amp;lt;/p&amp;gt;
&amp;lt;h2&amp;gt;#51. Elite Squad: The Enemy Within (2010)&amp;lt;/h2&amp;gt;
&amp;lt;p&amp;gt;- Director: José Padilha&amp;lt;br&amp;gt;
- IMDb user rating: 8.0&amp;lt;br&amp;gt;
- Votes: 75,948&amp;lt;br&amp;gt;
- Metascore: 71&amp;lt;br&amp;gt;
- Runtime: 115 min&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;Brazilian filmmaker José Padilha followed up 2007’s “Elite Squad” with this hotly anticipated sequel. It offers a semi-fictional account of BOPE, the tactical unit of the Military Police of Rio de Janeiro. Interweaving pulse-pounding action with political drama, it remains &amp;lt;a href=&quot;https://www.screendaily.com/news/the-highest-grossing-brazilian-films-of-last-20-years-revealed/5120882.article&quot;&amp;gt;one of Brazil’s highest-grossing domestic films&amp;lt;/a&amp;gt;.&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;&amp;lt;strong&amp;gt;You may also like: &amp;lt;/strong&amp;gt; &amp;lt;a href=&quot;https://thestacker.com/stories/3438/best-emmy-nominated-shows-all-time?utm_source=12345&quot;&amp;gt;Best Emmy nominated shows of all time&amp;lt;/a&amp;gt;&amp;lt;/p&amp;gt;
&amp;lt;h2&amp;gt;#50. Sing Street (2016)&amp;lt;/h2&amp;gt;
&amp;lt;p&amp;gt;- Director: John Carney&amp;lt;br&amp;gt;
- IMDb user rating: 8.0&amp;lt;br&amp;gt;
- Votes: 77,036&amp;lt;br&amp;gt;
- Metascore: 79&amp;lt;br&amp;gt;
- Runtime: 106 min&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;From the director of “Once” and “Begin Again” comes this similar blend of music and romantic dramedy. Set against the pop-crazy backdrop of 1980s Dublin, the movie shows a teenage boy forming a band in hopes of impressing his crush. As always, the characters are irresistible and the music infectious.&amp;lt;/p&amp;gt;
&amp;lt;h2&amp;gt;#49. Wonder (2017)&amp;lt;/h2&amp;gt;
&amp;lt;p&amp;gt;- Director: Stephen Chbosky&amp;lt;br&amp;gt;
- IMDb user rating: 8.0&amp;lt;br&amp;gt;
- Votes: 117,990&amp;lt;br&amp;gt;
- Metascore: 66&amp;lt;br&amp;gt;
- Runtime: 113 min&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;Tugging directly on the heartstrings, this big-screen adaptation of a best-selling novel tells the story of young August Pullman (Jacob Tremblay). Born with facial differences, August confronts his innermost fears when attending a mainstream elementary school for the first time. Julia Roberts and Owen Wilson co-star as August’s parents.&amp;lt;/p&amp;gt;
&amp;lt;h2&amp;gt;#48. Lion (2016)&amp;lt;/h2&amp;gt;
&amp;lt;p&amp;gt;- Director: Garth Davis&amp;lt;br&amp;gt;
- IMDb user rating: 8.0&amp;lt;br&amp;gt;
- Votes: 188,656&amp;lt;br&amp;gt;
- Metascore: 69&amp;lt;br&amp;gt;
- Runtime: 118 min&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;After getting lost in the streets of Calcutta,&amp;nbsp;Saroo (Dev Patel) is adopted by two Australian parents and raised far away from home. Decades later, Saroo embarks on a journey to find his original family. Nominated for six Academy Awards, the film delivers a stark and refreshing exploration of what it means to be home.&amp;lt;/p&amp;gt;
&amp;lt;h2&amp;gt;#47. Once Upon a Time in Hollywood (2019)&amp;lt;/h2&amp;gt;
&amp;lt;p&amp;gt;- Director: Quentin Tarantino&amp;lt;br&amp;gt;
- IMDb user rating: 8.0&amp;lt;br&amp;gt;
- Votes: 223,411&amp;lt;br&amp;gt;
- Metascore: 83&amp;lt;br&amp;gt;
- Runtime: 161 min&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;Quentin Tarantino’s homage to a bygone era of filmmaking is also one of his &amp;lt;a href=&quot;https://www.npr.org/2019/07/26/745575489/once-upon-a-time-in-hollywood-is-tarantino-s-most-personal-film-in-years&quot;&amp;gt;most personal efforts to date&amp;lt;/a&amp;gt;. It follows a fading TV star (Leonardo DiCaprio) and his stunt double (Brad Pitt) as they strive for success in a rapidly shifting industry. The story climaxes with one of the most famous events in Hollywood history, Tarantino style.&amp;lt;/p&amp;gt;
&amp;lt;h2&amp;gt;#46. Bohemian Rhapsody (2018)&amp;lt;/h2&amp;gt;
&amp;lt;p&amp;gt;- Director: Bryan Singer&amp;lt;br&amp;gt;
- IMDb user rating: 8.0&amp;lt;br&amp;gt;
- Votes: 390,445&amp;lt;br&amp;gt;
- Metascore: 49&amp;lt;br&amp;gt;
- Runtime: 134 min&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;The story of the rock band Queen and its eccentric frontman gets the PG-13 treatment in this wildly successful biopic. Starring Rami Malek as Freddie Mercury, the movie takes viewers from the band’s early formation all the way up to its epochal 1985 Live Aid performance. The film earned &amp;lt;a href=&quot;https://www.boxofficemojo.com/releasegroup/gr4107555333/&quot;&amp;gt;over $900 million at the worldwide box office&amp;lt;/a&amp;gt; and took home four Academy Awards, including Best Actor.&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;&amp;lt;strong&amp;gt;You may also like: &amp;lt;/strong&amp;gt; &amp;lt;a href=&quot;https://thestacker.com/stories/1269/richest-celebrities-world?utm_source=12345&quot;&amp;gt;50 richest celebrities in the world&amp;lt;/a&amp;gt;&amp;lt;/p&amp;gt;
&amp;lt;h2&amp;gt;#45. Blade Runner 2049 (2017)&amp;lt;/h2&amp;gt;
&amp;lt;p&amp;gt;- Director: Denis Villeneuve&amp;lt;br&amp;gt;
- IMDb user rating: 8.0&amp;lt;br&amp;gt;
- Votes: 398,188&amp;lt;br&amp;gt;
- Metascore: 81&amp;lt;br&amp;gt;
- Runtime: 164 min&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;In this big-budget sequel, a futuristic bounty hunter (Ryan Gosling) uncovers a buried secret that could change the course of history. It all goes down against a lush visual backdrop, while a constant air of dystopia persists. As he did with “Arrival,” director Denis Villeneuve infuses a range of dramatic themes into what otherwise might seem like straightforward sci-fi.&amp;lt;/p&amp;gt;
&amp;lt;h2&amp;gt;#44. Dallas Buyers Club (2013)&amp;lt;/h2&amp;gt;
&amp;lt;p&amp;gt;- Director: Jean-Marc Vallée&amp;lt;br&amp;gt;
- IMDb user rating: 8.0&amp;lt;br&amp;gt;
- Votes: 410,130&amp;lt;br&amp;gt;
- Metascore: 84&amp;lt;br&amp;gt;
- Runtime: 117 min&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;Actor &amp;lt;a href=&quot;https://www.usatoday.com/story/life/people/2013/10/29/mcconaughey-before-during-after/3289155/&quot;&amp;gt;Matthew McConaughey lost almost 50 pounds&amp;lt;/a&amp;gt; preparing for the role of Ron Woodroof in this acclaimed biopic. After testing positive for HIV, Woodroof hustles to get fellow AIDS patients the medication they need. McConaughey won an Academy Award for Best Actor, while co-star Jared Leto won for Best Supporting Actor.&amp;lt;/p&amp;gt;
&amp;lt;h2&amp;gt;#43. The Perks of Being a Wallflower (2012)&amp;lt;/h2&amp;gt;
&amp;lt;p&amp;gt;- Director: Stephen Chbosky&amp;lt;br&amp;gt;
- IMDb user rating: 8.0&amp;lt;br&amp;gt;
- Votes: 429,530&amp;lt;br&amp;gt;
- Metascore: 67&amp;lt;br&amp;gt;
- Runtime: 103 min&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;A best-selling novel leaped onto the big screen with this coming-of-age drama from Stephen Chbosky. With help from two high school seniors, an introverted freshman (Logan Lerman) overcomes struggles of both the internal and external variety. Playing a love interest named Sam, Emma Watson delivers one of her first and best performances outside of the “Harry Potter” franchise.&amp;lt;/p&amp;gt;
&amp;lt;h2&amp;gt;#42. La Land (2016)&amp;lt;/h2&amp;gt;
&amp;lt;p&amp;gt;- Director: Damien Chazelle&amp;lt;br&amp;gt;
- IMDb user rating: 8.0&amp;lt;br&amp;gt;
- Votes: 452,142&amp;lt;br&amp;gt;
- Metascore: 93&amp;lt;br&amp;gt;
- Runtime: 128 min&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;Traditional Hollywood musicals get a modern-day upgrade with this smash hit from 2016. It follows two aspiring artists (Ryan Gosling and Emma Stone) in the city of dreams, whose similar ambitions pave the way for romance. Kicking off the action is an epic song-and-dance number in the middle of L.A. traffic, which &amp;lt;a href=&quot;https://www.thewrap.com/la-la-land-opening-scene-how-they-do-that/&quot;&amp;gt;stitches together three consecutive shots&amp;lt;/a&amp;gt; to render the impression of a single take.&amp;lt;/p&amp;gt;
&amp;lt;h2&amp;gt;#41. Her (2013)&amp;lt;/h2&amp;gt;
&amp;lt;p&amp;gt;- Director: Spike Jonze&amp;lt;br&amp;gt;
- IMDb user rating: 8.0&amp;lt;br&amp;gt;
- Votes: 486,002&amp;lt;br&amp;gt;
- Metascore: 90&amp;lt;br&amp;gt;
- Runtime: 126 min&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;Featuring a premise that &amp;lt;a href=&quot;https://www.theguardian.com/technology/2018/sep/26/mystic-messenger-dating-simulations-sims-digital-intimacy&quot;&amp;gt;gets more timely with each passing year&amp;lt;/a&amp;gt;, Spike Jonze’s sci-fi drama chronicles the romance between a lonely man (Joaquin Phoenix) and his AI assistant (voiced by Scarlett Johansson). Beyond the futuristic veneer is a relatable and purposefully mundane story, which makes the world these characters inhabit seem all too near. It won the Oscar for Best Original Screenplay.&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;&amp;lt;strong&amp;gt;You may also like: &amp;lt;/strong&amp;gt; &amp;lt;a href=&quot;https://thestacker.com/stories/3310/song-summer-year-you-graduated-high-school?utm_source=12345&quot;&amp;gt;Song of the summer the year you graduated high school&amp;lt;/a&amp;gt;&amp;lt;/p&amp;gt;
&amp;lt;h2&amp;gt;#40. The King's Speech (2010)&amp;lt;/h2&amp;gt;
&amp;lt;p&amp;gt;- Director: Tom Hooper&amp;lt;br&amp;gt;
- IMDb user rating: 8.0&amp;lt;br&amp;gt;
- Votes: 603,828&amp;lt;br&amp;gt;
- Metascore: 88&amp;lt;br&amp;gt;
- Runtime: 118 min&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;Winner of four major Academy Awards—including Best Picture—this historical drama tells the true story of King George VI (played by Colin Firth). Before he can properly take the throne, the king must learn to overcome an embarrassing speech impediment. Enter a personal speech therapist (Geoffrey Rush), who also becomes a close friend.&amp;lt;/p&amp;gt;
&amp;lt;h2&amp;gt;#39. The Imitation Game (2014)&amp;lt;/h2&amp;gt;
&amp;lt;p&amp;gt;- Director: Morten Tyldum&amp;lt;br&amp;gt;
- IMDb user rating: 8.0&amp;lt;br&amp;gt;
- Votes: 633,758&amp;lt;br&amp;gt;
- Metascore: 73&amp;lt;br&amp;gt;
- Runtime: 114 min&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;Tasked with cracking the German Enigma code during World War II, math genius Alan Turing develops one of the &amp;lt;a href=&quot;https://thestacker.com/stories/1219/most-popular-war-movies-all-time#27&quot;&amp;gt;world’s earliest computer prototypes&amp;lt;/a&amp;gt;. The acclaimed biopic demonstrates how some of history’s most important innovations are often the result of its most debilitating wars. Benedict Cumberbatch plays the lead role and turns in one of his finest performances.&amp;lt;/p&amp;gt;
&amp;lt;h2&amp;gt;#38. The Revenant (2015)&amp;lt;/h2&amp;gt;
&amp;lt;p&amp;gt;- Director: Alejandro G. Iñárritu&amp;lt;br&amp;gt;
- IMDb user rating: 8.0&amp;lt;br&amp;gt;
- Votes: 641,556&amp;lt;br&amp;gt;
- Metascore: 76&amp;lt;br&amp;gt;
- Runtime: 156 min&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;&amp;lt;a href=&quot;https://hughglass.org/the-legend/revenant-the-movie/&quot;&amp;gt;Inspired by actual events&amp;lt;/a&amp;gt;, this brutal adventure drama tells the story of early 19th-century frontiersman Hugh Glass (played by Leonardo DiCaprio). Ravaged by a bear and left for dead, Glass musters just enough strength to track down the man who killed his son. The film won three Academy Awards, including Best Actor for DiCaprio and Best Director for Alejandro G. Iñárritu.&amp;lt;/p&amp;gt;
&amp;lt;h2&amp;gt;#37. Black Swan (2010)&amp;lt;/h2&amp;gt;
&amp;lt;p&amp;gt;- Director: Darren Aronofsky&amp;lt;br&amp;gt;
- IMDb user rating: 8.0&amp;lt;br&amp;gt;
- Votes: 660,792&amp;lt;br&amp;gt;
- Metascore: 79&amp;lt;br&amp;gt;
- Runtime: 108 min&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;A talented ballet dancer named Nina (Natalie Portman) struggles to maintain her sanity after landing the lead role in a production of “Swan Lake.” Darren Aronofsky’s knack for dark lighting and claustrophobic camerawork takes this psychological drama to bone-chilling extremes. It retains a perennial sense of dread all the way up until its final moments of catharsis.&amp;lt;/p&amp;gt;
&amp;lt;h2&amp;gt;#36. The Martian (2015)&amp;lt;/h2&amp;gt;
&amp;lt;p&amp;gt;- Director: Ridley Scott&amp;lt;br&amp;gt;
- IMDb user rating: 8.0&amp;lt;br&amp;gt;
- Votes: 700,154&amp;lt;br&amp;gt;
- Metascore: 80&amp;lt;br&amp;gt;
- Runtime: 144 min&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;Andy Weir’s popular novel made for an equally popular film, starring Matt Damon as astronaut Mark Watney. Stranded during a massive storm, Watney must learn to survive on a lifeless planet while waiting for his crew to return. Under the confident guidance of director Ridley Scott, the film balances various genres to seamless effect.&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;&amp;lt;strong&amp;gt;You may also like: &amp;lt;/strong&amp;gt; &amp;lt;a href=&quot;https://thestacker.com/stories/3344/10-times-black-mirror-mirrored-real-life?utm_source=12345&quot;&amp;gt;10 times 'Black Mirror' mirrored real life&amp;lt;/a&amp;gt;&amp;lt;/p&amp;gt;
&amp;lt;h2&amp;gt;#35. The Wild Pear Tree (2018)&amp;lt;/h2&amp;gt;
&amp;lt;p&amp;gt;- Director: Nuri Bilge Ceylan&amp;lt;br&amp;gt;
- IMDb user rating: 8.1&amp;lt;br&amp;gt;
- Votes: 14,000&amp;lt;br&amp;gt;
- Metascore: 86&amp;lt;br&amp;gt;
- Runtime: 188 min&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;A post-graduate writer returns home and tries to publish his first novel, confronting familiar people and places in the process. Peppering moments of comedy and fantasy into a harsher realist paradigm, the Turkish film explores themes of both personal and national identity. AV Club critic &amp;lt;a href=&quot;https://film.avclub.com/the-palme-d-or-winning-director-of-winter-sleep-returns-1832086162&quot;&amp;gt;Lawrence Garcia says the film is at its best&amp;lt;/a&amp;gt; when it “captures not just the feeling, but also the process of coming to terms with one's place in society.”&amp;lt;/p&amp;gt;
&amp;lt;h2&amp;gt;#34. Wolf Children (2012)&amp;lt;/h2&amp;gt;
&amp;lt;p&amp;gt;- Director: Mamoru Hosoda&amp;lt;br&amp;gt;
- IMDb user rating: 8.1&amp;lt;br&amp;gt;
- Votes: 33,187&amp;lt;br&amp;gt;
- Metascore: 71&amp;lt;br&amp;gt;
- Runtime: 117 min&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;Blending &amp;lt;a href=&quot;https://www.awn.com/news/digital-frontier-animates-wolf-children&quot;&amp;gt;CG and celluloid animation&amp;lt;/a&amp;gt;, this family drama chronicles the exploits of a widowed mother and her two half-werewolf children. Far more than a modern-day fairytale, the film provides a testament to the struggles of motherhood. Its purposefully sentimental execution goes straight to the heart.&amp;lt;/p&amp;gt;
&amp;lt;h2&amp;gt;#33. Mommy (2014)&amp;lt;/h2&amp;gt;
&amp;lt;p&amp;gt;- Director: Xavier Dolan&amp;lt;br&amp;gt;
- IMDb user rating: 8.1&amp;lt;br&amp;gt;
- Votes: 44,437&amp;lt;br&amp;gt;
- Metascore: 74&amp;lt;br&amp;gt;
- Runtime: 139 min&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;On the opposite end of the spectrum from movies like “Wolf Children” is this uber-serious Canadian drama. Co-winner of the Jury Prize at the Cannes Film Festival, “Mommy” depicts the struggles of a widowed mother as she tries to raise her violent son. A no-holds-barred approach generates constant tension and gives way to occasional physical brutality.&amp;lt;/p&amp;gt;
&amp;lt;h2&amp;gt;#32. Song of the Sea (2014)&amp;lt;/h2&amp;gt;
&amp;lt;p&amp;gt;- Director: Tomm Moore&amp;lt;br&amp;gt;
- IMDb user rating: 8.1&amp;lt;br&amp;gt;
- Votes: 45,516&amp;lt;br&amp;gt;
- Metascore: 85&amp;lt;br&amp;gt;
- Runtime: 93 min&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;Rendered in &amp;lt;a href=&quot;https://www.awn.com/animationworld/tomm-moore-talks-song-of-the-sea&quot;&amp;gt;Tomm Moore’s signature hand-drawn animation style&amp;lt;/a&amp;gt;, this thrilling adventure follows a pair of young siblings on their journey across the sea. It pulls viewers into a magical world from the first frame onward, even when dispensing some heavy modernist themes. Fans should also check out Moore’s 2009 effort, “The Secret of Kells,” which likewise draws upon Celtic lore.&amp;lt;/p&amp;gt;
&amp;lt;h2&amp;gt;#31. The Handmaiden (2016)&amp;lt;/h2&amp;gt;
&amp;lt;p&amp;gt;- Director: Park Chan-wook&amp;lt;br&amp;gt;
- IMDb user rating: 8.1&amp;lt;br&amp;gt;
- Votes: 85,832&amp;lt;br&amp;gt;
- Metascore: 84&amp;lt;br&amp;gt;
- Runtime: 145 min&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;As the helmer of movies like “Lady Vengeance” and “Oldboy,” South Korea’s Park Chan-wook is no stranger to tales of violence, lust, and betrayal. This effort comes straight out of the director’s wheelhouse, telling the story of a deceptive handmaiden and her Japanese employer. Divided into three parts, it delivers shocking twists and turns on its way to a violent climax.&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;&amp;lt;strong&amp;gt;You may also like: &amp;lt;/strong&amp;gt; &amp;lt;a href=&quot;https://thestacker.com/stories/3443/most-emmy-wins-all-time?utm_source=12345&quot;&amp;gt;Most Emmy wins of all time&amp;lt;/a&amp;gt;&amp;lt;/p&amp;gt;
&amp;lt;h2&amp;gt;#30. Wild Tales (2014)&amp;lt;/h2&amp;gt;
&amp;lt;p&amp;gt;- Director: Damián Szifron&amp;lt;br&amp;gt;
- IMDb user rating: 8.1&amp;lt;br&amp;gt;
- Votes: 156,429&amp;lt;br&amp;gt;
- Metascore: 77&amp;lt;br&amp;gt;
- Runtime: 122 min&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;Consisting of six short films, this Argentine-Spanish anthology imparts its own special brand of pitch-black comedy. While the segments aren’t directly correlated, they share a common foundation of wild behavior and unexpected outcome. Legendary director Pedro Almodóvar co-produced.&amp;lt;/p&amp;gt;
&amp;lt;h2&amp;gt;#29. Room (2015)&amp;lt;/h2&amp;gt;
&amp;lt;p&amp;gt;- Director: Lenny Abrahamson&amp;lt;br&amp;gt;
- IMDb user rating: 8.1&amp;lt;br&amp;gt;
- Votes: 328,741&amp;lt;br&amp;gt;
- Metascore: 86&amp;lt;br&amp;gt;
- Runtime: 118 min&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;Best-selling author Emma Donoghue adapted her own novel when writing the screenplay for this independent drama. It stars Brie Larson as a kidnap victim who must raise a son while confined to a solitary room by her abductor. If “Short Term 12” announced Larson as a major leading talent, this Oscar-winning performance sealed the deal.&amp;lt;/p&amp;gt;
&amp;lt;h2&amp;gt;#28. Spotlight (2015)&amp;lt;/h2&amp;gt;
&amp;lt;p&amp;gt;- Director: Tom McCarthy&amp;lt;br&amp;gt;
- IMDb user rating: 8.1&amp;lt;br&amp;gt;
- Votes: 377,311&amp;lt;br&amp;gt;
- Metascore: 93&amp;lt;br&amp;gt;
- Runtime: 129 min&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;In this Best Picture winner, Boston journalists uncover a long-overdue story of sexual abuse within the local Catholic Archdiocese. Their subsequent reporting paves the way for an international scandal, exposing decades of corruption around the world. To prepare for the shoot, a number of &amp;lt;a href=&quot;https://www.latimes.com/entertainment/movies/la-et-mn-spotlight-production-20151106-story.html&quot;&amp;gt;A-list actors spent time with their real-life counterparts&amp;lt;/a&amp;gt;.&amp;lt;/p&amp;gt;
&amp;lt;h2&amp;gt;#27. Hacksaw Ridge (2016)&amp;lt;/h2&amp;gt;
&amp;lt;p&amp;gt;- Director: Mel Gibson&amp;lt;br&amp;gt;
- IMDb user rating: 8.1&amp;lt;br&amp;gt;
- Votes: 382,559&amp;lt;br&amp;gt;
- Metascore: 71&amp;lt;br&amp;gt;
- Runtime: 139 min&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;Returning from Hollywood exile, Mel Gibson churned out this graphic Word War II drama. It stars Andrew Garfield as Army Medic Desmond T. Doss, a conscientious objector who saved numerous lives during the Battle of Okinawa. He goes on to become the first man in history to &amp;lt;a href=&quot;https://www.cmohs.org/recipient-detail/2717/doss-desmond-t.php&quot;&amp;gt;win the Medal of Honor&amp;lt;/a&amp;gt; without firing a shot.&amp;lt;/p&amp;gt;
&amp;lt;h2&amp;gt;#26. The Help (2011)&amp;lt;/h2&amp;gt;
&amp;lt;p&amp;gt;- Director: Tate Taylor&amp;lt;br&amp;gt;
- IMDb user rating: 8.1&amp;lt;br&amp;gt;
- Votes: 400,023&amp;lt;br&amp;gt;
- Metascore: 62&amp;lt;br&amp;gt;
- Runtime: 146 min&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;When an aspiring writer (Emma Stone) chronicles the lives of African American housekeepers in 1960s Mississippi, it sparks controversy among the rich and poor alike. Octavia Spencer and Viola Davis play Minny and Aibileen, two maids with endearing personalities. Distributed by Walt Disney Studios, the film retains a somewhat breezy atmosphere while peeling back the curtain on racial oppression.&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;&amp;lt;strong&amp;gt;You may also like: &amp;lt;/strong&amp;gt; &amp;lt;a href=&quot;https://thestacker.com/stories/3219/most-anticipated-movies-still-come-2019#1?utm_source=12345&quot;&amp;gt;Most anticipated movies still to come in 2019&amp;lt;/a&amp;gt;&amp;lt;/p&amp;gt;
&amp;lt;h2&amp;gt;#25. Rush (2013)&amp;lt;/h2&amp;gt;
&amp;lt;p&amp;gt;- Director: Ron Howard&amp;lt;br&amp;gt;
- IMDb user rating: 8.1&amp;lt;br&amp;gt;
- Votes: 401,695&amp;lt;br&amp;gt;
- Metascore: 75&amp;lt;br&amp;gt;
- Runtime: 123 min&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;The true story of a famous rivalry between two Formula One drivers revs to life in this gripping sports drama. English playboy James Hunt (Chris Hemsworth) takes his talent for granted while Austria’s Niki Lauda (Daniel Brühl) works tirelessly to hone his skill. It’s a race between the pursuit of fame and the pursuit of perfection and only one man can win.&amp;lt;/p&amp;gt;
&amp;lt;h2&amp;gt;#24. Prisoners (2013)&amp;lt;/h2&amp;gt;
&amp;lt;p&amp;gt;- Director: Denis Villeneuve&amp;lt;br&amp;gt;
- IMDb user rating: 8.1&amp;lt;br&amp;gt;
- Votes: 542,242&amp;lt;br&amp;gt;
- Metascore: 74&amp;lt;br&amp;gt;
- Runtime: 153 min&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;Denis Villeneuve is behind no less than four of the best dramas from the past decade, including this taut thriller. When his daughter is abducted, a man (Hugh Jackman) narrows in on a suspect and then takes matters into his own hands. Jake Gyllenhaal, Viola Davis, Maria Bello, Terrence Howard, Melissa Leo, and Paul Dano also star.&amp;lt;/p&amp;gt;
&amp;lt;h2&amp;gt;#23. Logan (2017)&amp;lt;/h2&amp;gt;
&amp;lt;p&amp;gt;- Director: James Mangold&amp;lt;br&amp;gt;
- IMDb user rating: 8.1&amp;lt;br&amp;gt;
- Votes: 584,306&amp;lt;br&amp;gt;
- Metascore: 77&amp;lt;br&amp;gt;
- Runtime: 137 min&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;The original “Wolverine” saga came to a fitting close with this R-rated entry, which sees Hugh Jackman baring his claws for one last time. Losing strength and motivation in a desolate wasteland, the X-Man learns that there’s still some fight left in him yet. R&amp;lt;/span&amp;gt;&amp;lt;span data-dcnode-id=&quot;154&quot; instrument_node=&quot;&quot;&amp;gt;umors of a &amp;lt;a href=&quot;https://www.independent.co.uk/arts-entertainment/films/news/marvel-avengers-endgame-x-men-wolverine-mcu-hugh-jackman-fantastic-four-disney-a9055231.html&quot;&amp;gt;new Wolverine appearance persist&amp;lt;/a&amp;gt;, though it remains unlikely that Jackman will return to the role.&amp;lt;/p&amp;gt;
&amp;lt;h2&amp;gt;#22. 12 Years a Slave (2013)&amp;lt;/h2&amp;gt;
&amp;lt;p&amp;gt;- Director: Steve McQueen&amp;lt;br&amp;gt;
- IMDb user rating: 8.1&amp;lt;br&amp;gt;
- Votes: 590,802&amp;lt;br&amp;gt;
- Metascore: 96&amp;lt;br&amp;gt;
- Runtime: 134 min&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;Solomon Northup’s own 1853 memoir lays the groundwork for this historical drama, which follows Northup (played by Chiwetel Ejiofor) from Northern gentleman to Southern slave. Over the course of 12 years, he must endure the sadistic whims of an alcoholic slave owner (Michael Fassbender). The acclaimed film won three Academy Awards, including Best Picture and Best Adapted Screenplay.&amp;lt;/p&amp;gt;
&amp;lt;h2&amp;gt;#21. Harry Potter and the Deathly Hallows: Part 2 (2011)&amp;lt;/h2&amp;gt;
&amp;lt;p&amp;gt;- Director: David Yates&amp;lt;br&amp;gt;
- IMDb user rating: 8.1&amp;lt;br&amp;gt;
- Votes: 707,182&amp;lt;br&amp;gt;
- Metascore: 87&amp;lt;br&amp;gt;
- Runtime: 130 min&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;The original “Harry Potter” film series ended on a high note, garnering &amp;lt;a href=&quot;https://www.metacritic.com/movie/harry-potter-and-the-deathly-hallows-part-2&quot;&amp;gt;near-universal acclaim&amp;lt;/a&amp;gt; and earning &amp;lt;a href=&quot;https://www.boxofficemojo.com/release/rl1265337857/&quot;&amp;gt;over $1.3 billion at the worldwide box office&amp;lt;/a&amp;gt;. The story builds to a thrilling and climactic battle between Potter (Daniel Radcliffe) and Lord Voldemort (Ralph Fiennes). A fantasy film perhaps, but no fan can argue that it didn’t also deliver copious amounts of compelling drama.&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;&amp;lt;strong&amp;gt;You may also like: &amp;lt;/strong&amp;gt; &amp;lt;a href=&quot;https://thestacker.com/stories/3239/controversial-songs-year-you-were-born?utm_source=12345&quot;&amp;gt;Controversial songs from the year you were born&amp;lt;/a&amp;gt;&amp;lt;/p&amp;gt;
&amp;lt;h2&amp;gt;#20. Gone Girl (2014)&amp;lt;/h2&amp;gt;
&amp;lt;p&amp;gt;- Director: David Fincher&amp;lt;br&amp;gt;
- IMDb user rating: 8.1&amp;lt;br&amp;gt;
- Votes: 782,726&amp;lt;br&amp;gt;
- Metascore: 79&amp;lt;br&amp;gt;
- Runtime: 149 min&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;A woman (Rosamund Pike) is missing and presumed dead, and her husband (Ben Affleck) is the lead suspect. As media scrutiny intensifies, one outrageous revelation gives way to another. Adapting her own novel, best-selling author Gillian Flynn wrote the screenplay for this smash hit.&amp;lt;/p&amp;gt;
&amp;lt;h2&amp;gt;#19. Winter Sleep (2014)&amp;lt;/h2&amp;gt;
&amp;lt;p&amp;gt;- Director: Nuri Bilge Ceylan&amp;lt;br&amp;gt;
- IMDb user rating: 8.2&amp;lt;br&amp;gt;
- Votes: 38,787&amp;lt;br&amp;gt;
- Metascore: 88&amp;lt;br&amp;gt;
- Runtime: 196 min&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;Culling inspiration from short stories by Anton Chekhov, this three-plus-hour drama takes place inside a small Turkish hotel. Seeking shelter from a snowstorm, eccentric and neurotic characters tackle philosophical dilemmas and interpersonal ones alike. Director Nuri Bilge Ceylan employs confident camerawork and a purposefully novelistic style, layering psychological nuances beneath a veneer of constant gab.&amp;lt;/p&amp;gt;
&amp;lt;h2&amp;gt;#18. Green Book (2018)&amp;lt;/h2&amp;gt;
&amp;lt;p&amp;gt;- Director: Peter Farrelly&amp;lt;br&amp;gt;
- IMDb user rating: 8.2&amp;lt;br&amp;gt;
- Votes: 256,267&amp;lt;br&amp;gt;
- Metascore: 69&amp;lt;br&amp;gt;
- Runtime: 130 min&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;Director Peter Farrelly was best known for slapstick comedy until he churned out this heartfelt drama, which still delivers plenty of comic relief. Set in the 1960s, it follows a white working-class driver (Viggo Mortensen) and his erudite black client (Mahershala Ali) on a road trip through the deep South. Despite &amp;lt;a href=&quot;https://www.refinery29.com/en-us/2019/01/220609/green-book-movie-controversy-racism-don-shirley-family-story&quot;&amp;gt;numerous controversies&amp;lt;/a&amp;gt;, the film scored big at the box office and continues to rank high among viewers.&amp;lt;/p&amp;gt;
&amp;lt;h2&amp;gt;#17. Three Billboards Outside Ebbing, Missouri (2017)&amp;lt;/h2&amp;gt;
&amp;lt;p&amp;gt;- Director: Martin McDonagh&amp;lt;br&amp;gt;
- IMDb user rating: 8.2&amp;lt;br&amp;gt;
- Votes: 366,033&amp;lt;br&amp;gt;
- Metascore: 88&amp;lt;br&amp;gt;
- Runtime: 115 min&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;A woman (Frances McDormand) rents three billboards and then uses them to shame the local police, who have failed to find her daughter’s killer. Not only was the premise &amp;lt;a href=&quot;https://www.insideedition.com/real-story-behind-three-billboards-outside-ebbing-missouri-40961&quot;&amp;gt;loosely inspired by actual events&amp;lt;/a&amp;gt;, but it paid the inspiration forward by &amp;lt;a href=&quot;https://www.theguardian.com/world/shortcuts/2018/feb/21/when-real-life-protest-imitates-art-from-three-billboards-to-father-ted&quot;&amp;gt;prompting demonstrators to employ a similar tactic&amp;lt;/a&amp;gt;. McDormand won the Academy Award for Best Actress and co-star Sam Rockwell won for Best Supporting Actor.&amp;lt;/p&amp;gt;
&amp;lt;h2&amp;gt;#16. Warrior (2011)&amp;lt;/h2&amp;gt;
&amp;lt;p&amp;gt;- Director: Gavin O'Connor&amp;lt;br&amp;gt;
- IMDb user rating: 8.2&amp;lt;br&amp;gt;
- Votes: 410,504&amp;lt;br&amp;gt;
- Metascore: 71&amp;lt;br&amp;gt;
- Runtime: 140 min&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;When the son (Tom Hardy) of a former boxer (Nick Nolte) enters a mixed martial arts tournament, it puts him on a collision course with his estranged older brother (Joel Edgerton). Hardy &amp;lt;a href=&quot;https://www.thewrap.com/evolution-tom-hardy-band-brothers-taboo-photos/&quot;&amp;gt;underwent intense MMA training&amp;lt;/a&amp;gt; to prepare for the role, bulking up in the process. The film underperformed during its theatrical run but has since &amp;lt;a href=&quot;https://theactionelite.com/underrated-gem-warrior-2011/&quot;&amp;gt;garnered a loyal cult following&amp;lt;/a&amp;gt;.&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;&amp;lt;strong&amp;gt;You may also like: &amp;lt;/strong&amp;gt; &amp;lt;a href=&quot;https://thestacker.com/stories/1173/celebrities-you-didnt-know-were-lgbtq?utm_source=12345&quot;&amp;gt;30 celebrities you might not know are LGBTQ+&amp;lt;/a&amp;gt;&amp;lt;/p&amp;gt;
&amp;lt;h2&amp;gt;#15. Inside Out (2015)&amp;lt;/h2&amp;gt;
&amp;lt;p&amp;gt;- Directors: Pete Docter, Ronnie Del Carmen&amp;lt;br&amp;gt;
- IMDb user rating: 8.2&amp;lt;br&amp;gt;
- Votes: 554,693&amp;lt;br&amp;gt;
- Metascore: 94&amp;lt;br&amp;gt;
- Runtime: 95 min&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;Pixar takes viewers inside the head of a young girl named Riley, whose life is uprooted when her family moves to San Francisco. As Riley navigates her surroundings, her personified emotions embark on a perilous journey of their own. This is &amp;lt;a href=&quot;https://www.filmsite.org/pixaranimations.html&quot;&amp;gt;one of nine Pixar films&amp;lt;/a&amp;gt; (to date) to have won an Academy Award for Best Animated Feature.&amp;lt;/p&amp;gt;
&amp;lt;h2&amp;gt;#14. The Wolf of Wall Street (2013)&amp;lt;/h2&amp;gt;
&amp;lt;p&amp;gt;- Director: Martin Scorsese&amp;lt;br&amp;gt;
- IMDb user rating: 8.2&amp;lt;br&amp;gt;
- Votes: 1,067,405&amp;lt;br&amp;gt;
- Metascore: 75&amp;lt;br&amp;gt;
- Runtime: 180 min&amp;lt;/p&amp;gt;

&amp;lt;p&amp;gt;Martin Scorsese chronicles the real-life exploits of Wall Street con man Jordan Belfort (played by Leonardo DiCaprio) and turns in one of his most comedic works. Underpinning the outrageous antics is a dark satire about the nature of greed and excess. Jonah Hill and Margot Robbie co-star, and Belfort himself makes a cameo.&amp;lt;/p&amp;gt;
&amp;lt;h2&amp;gt;#13. The Lighthouse (2019)&amp;lt;/h2&amp;gt;
&amp;lt;p&amp;gt;- Director: Robert Eggers&amp;lt;br&amp;gt;
- IMDb user rating: 8.3&amp;lt;br&amp;gt;
- Votes: 10,213&amp;lt;br&amp;gt;
- Metascore: 83&amp;lt;br&amp;gt;
