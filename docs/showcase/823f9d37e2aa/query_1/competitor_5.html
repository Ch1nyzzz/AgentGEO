le, they were instructed to be silent dur-&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;t m0 x1 h3 y2e ff2 fs0 fc0 sc0 lsb ws5&quot; data-dcnode-id=&quot;4648&quot;&gt;&lt;span data-dcnode-id=&quot;4649&quot; instrument_node=&quot;&quot;&gt;ing the first and third debates.&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;t m0 x2 h3 y2f ff2 fs0 fc0 sc0 lsb ws25&quot; data-dcnode-id=&quot;4646&quot;&gt;&lt;span data-dcnode-id=&quot;4647&quot; instrument_node=&quot;&quot;&gt;For most people, watching in their homes or in public places, the debates &lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;t m0 x1 h3 y30 ff2 fs0 fc0 sc0 lsb ws26&quot; data-dcnode-id=&quot;4644&quot;&gt;&lt;span data-dcnode-id=&quot;4645&quot; instrument_node=&quot;&quot;&gt;were mediated; that is, transmitted by the broadcasting media from the locale of &lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;t m0 x1 h3 y31 ff2 fs0 fc0 sc0 lsb ws27&quot; data-dcnode-id=&quot;4642&quot;&gt;&lt;span data-dcnode-id=&quot;4643&quot; instrument_node=&quot;&quot;&gt;the debates to the audiences wherever they were located. In this sense, and con-&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;t m0 x1 h3 y32 ff2 fs0 fc0 sc0 lsb ws28&quot; data-dcnode-id=&quot;4640&quot;&gt;&lt;span data-dcnode-id=&quot;4641&quot; instrument_node=&quot;&quot;&gt;ceptually speaking, mediation should be understood as “a natural, preordained &lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;t m0 x1 h3 y33 ff2 fs0 fc0 sc0 lsb ws29&quot; data-dcnode-id=&quot;4638&quot;&gt;&lt;span data-dcnode-id=&quot;4639&quot; instrument_node=&quot;&quot;&gt;mission of mass media to convey meaning from communicators to their target &lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;t m0 x1 h3 y34 ff2 fs0 fc0 sc0 lsb ws2a&quot; data-dcnode-id=&quot;4636&quot;&gt;&lt;span data-dcnode-id=&quot;4637&quot; instrument_node=&quot;&quot;&gt;audiences” (Mazzoleni 2008a, pp. 3047–3048). Politics is thus mediated when-&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;t m0 x1 h3 y35 ff2 fs0 fc0 sc0 lsb ws2b&quot; data-dcnode-id=&quot;4634&quot;&gt;&lt;span data-dcnode-id=&quot;4635&quot; instrument_node=&quot;&quot;&gt;ever people experience it through media rather than directly and through their &lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;t m0 x1 h3 y36 ff2 fs0 fc0 sc0 lsb ws5&quot; data-dcnode-id=&quot;4632&quot;&gt;&lt;span data-dcnode-id=&quot;4633&quot; instrument_node=&quot;&quot;&gt;own experiences (Strömbäck 2008).&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;t m0 x2 h3 y37 ff2 fs0 fc0 sc0 lsb ws2c&quot; data-dcnode-id=&quot;4630&quot;&gt;&lt;span data-dcnode-id=&quot;4631&quot; instrument_node=&quot;&quot;&gt;However, the media did not transmit the debates neutrally. Instead, for sev-&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;t m0 x1 h3 y38 ff2 fs0 fc0 sc0 lsb ws2d&quot; data-dcnode-id=&quot;4628&quot;&gt;&lt;span data-dcnode-id=&quot;4629&quot; instrument_node=&quot;&quot;&gt;eral days before the debates, the media speculated about the debates and their &lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;t m0 x1 h3 y39 ff2 fs0 fc0 sc0 lsb ws2e&quot; data-dcnode-id=&quot;4626&quot;&gt;&lt;span data-dcnode-id=&quot;4627&quot; instrument_node=&quot;&quot;&gt;importance, thus shaping people’s expectations. The candidates and their staffs &lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;t m0 x1 h3 y3a ff2 fs0 fc0 sc0 lsb ws2f&quot; data-dcnode-id=&quot;4624&quot;&gt;&lt;span data-dcnode-id=&quot;4625&quot; instrument_node=&quot;&quot;&gt;participated in this “expectation game,” but regardless of whether the media were &lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;t m0 x1 h3 y3b ff2 fs0 fc0 sc0 lsb ws30&quot; data-dcnode-id=&quot;4622&quot;&gt;&lt;span data-dcnode-id=&quot;4623&quot; instrument_node=&quot;&quot;&gt;driving the expectation game, the media put their independent mark on it by &lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;t m0 x1 h3 y3c ff2 fs0 fc0 sc0 lsb ws31&quot; data-dcnode-id=&quot;4620&quot;&gt;&lt;span data-dcnode-id=&quot;4621&quot; instru te analysis might be as important as &lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;t m0 x1 h3 y44 ff2 fs0 fc0 sc0 lsb ws39&quot; data-dcnode-id=&quot;4604&quot;&gt;&lt;span data-dcnode-id=&quot;4605&quot; instrument_node=&quot;&quot;&gt;the debate in itself as to how people perceived who won or came across better. &lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;t m0 x1 h3 y45 ff2 fs0 fc0 sc0 lsb ws3a&quot; data-dcnode-id=&quot;4602&quot;&gt;&lt;span data-dcnode-id=&quot;4603&quot; instrument_node=&quot;&quot;&gt;As shown by research on debate effects, the indirect effects, following from the &lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;t m0 x1 h3 y46 ff2 fs0 fc0 sc0 lsb ws3b&quot; data-dcnode-id=&quot;4600&quot;&gt;&lt;span data-dcnode-id=&quot;4601&quot; instrument_node=&quot;&quot;&gt;post-debate analysis in the media, might be as important as, or more important &lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;t m0 x1 h3 y47 ff2 fs0 fc0 sc0 lsb ws3c&quot; data-dcnode-id=&quot;4598&quot;&gt;&lt;span data-dcnode-id=&quot;4599&quot; instrument_node=&quot;&quot;&gt;than, the direct effects following from a debate in itself (Patterson 1980; Blais &lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;t m0 x7 h7 y1b ff3 fs7 fc1 sc1 lsb ws5&quot; data-dcnode-id=&quot;4586&quot;&gt;&lt;span data-dcnode-id=&quot;4597&quot; instrument_node=&quot;&quot;&gt;Klundby09_Ch10.indd   206&lt;/span&gt;&lt;span class=&quot;_ _0&quot; data-dcnode-id=&quot;4596&quot;&gt;&lt;/span&gt;&lt;span class=&quot;fc0 sc0&quot; data-dcnode-id=&quot;4587&quot;&gt;&lt;span data-dcnode-id=&quot;4595&quot; instrument_node=&quot;&quot;&gt;Klundby09_Ch10.indd   206&lt;/span&gt;&lt;span class=&quot;_ _1&quot; data-dcnode-id=&quot;4593&quot;&gt;&lt;span data-dcnode-id=&quot;4594&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;fc1 sc1&quot; data-dcnode-id=&quot;4588&quot;&gt;&lt;span data-dcnode-id=&quot;4592&quot; instrument_node=&quot;&quot;&gt;3/18/2009   6:40:15 PM&lt;/span&gt;&lt; b ws86&quot; data-dcnode-id=&quot;4246&quot;&gt;&lt;span data-dcnode-id=&quot;4247&quot; instrument_node=&quot;&quot;&gt;In this context, the media should be understood not only as single opera-&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;t m0 x1 h3 y9f ff2 fs0 fc0 sc0 lsb ws87&quot; data-dcnode-id=&quot;4244&quot;&gt;&lt;span data-dcnode-id=&quot;4245&quot; instrument_node=&quot;&quot;&gt;tions, formats, or outlets, even though all these aspects are important. The media &lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;t m0 x1 h3 ya0 ff2 fs0 fc0 sc0 lsb ws1e&quot; data-dcnode-id=&quot;4242&quot;&gt;&lt;span data-dcnode-id=&quot;4243&quot; instrument_node=&quot;&quot;&gt;should rather be understood as an ever-present social and cultural system of pro-&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;t m0 x1 h3 ya1 ff2 fs0 fc0 sc0 lsb ws88&quot; data-dcnode-id=&quot;4240&quot;&gt;&lt;span data-dcnode-id=&quot;4241&quot; instrument_node=&quot;&quot;&gt;duction, broadcast, circulation, and dissemination of symbols, signs, messages, &lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;t m0 x1 h3 ya2 ff2 fs0 fc0 sc0 lsb ws89&quot; data-dcnode-id=&quot;4238&quot;&gt;&lt;span data-dcnode-id=&quot;4239&quot; instrument_node=&quot;&quot;&gt;meanings, and values. The media should be understood as an institution (Cook &lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;t m0 x1 h3 ya3 ff2 fs0 fc0 sc0 lsb ws8a&quot; data-dcnode-id=&quot;4236&quot;&gt;&lt;span data-dcnode-id=&quot;4237&quot; instrument_node=&quot;&quot;&gt;2005). The various media companies, outlets, types, formats, and contents con-&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;t m0 x1 h3 ya4 ff2 fs0 fc0 sc0 lsb ws8b&quot; data-dcnode-id=&quot;4234&quot;&gt;&lt;span data-dcnode-id=&quot;4235&quot; instrument_node=&quot;&quot;&gt;stitute the building blocks of this overall social and cultural system, but the sum &lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;t m0 x1 h3 ya5 ff2 fs0 fc0 sc0 lsb ws26&quot; data-dcnode-id=&quot;4232&quot;&gt;&lt;span data-dcnode-id=&quot;4233&quot; instrument_node=&quot;&quot;&gt;is arguably greater than its parts, and the rules and norms that govern the media &lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;t m0 x1 h3 ya6 ff2 fs0 fc0 sc0 lsb ws8c&quot; data-dcnode-id=&quot;4230&quot;&gt;&lt;span data-dcnode-id=&quot;4231&quot; instrument_node=&quot;&quot;&gt;taken as a whole are often more important than what distinguishes one media &lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;t m0 x1 h3 ya7 ff2 fs0 fc0 sc0 lsb ws8d&quot; data-dcnode-id=&quot;4228&quot;&gt;&lt;span data-dcnode-id=&quot;4229&quot; instrument_node=&quot;&quot;&gt;company, outlet, type, or format from another (Mazzoleni 2008b; Hjarvard 2008; &lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;t m0 x1 h3 ya8 ff2 fs0 fc0 sc0 lsb ws8e&quot; data-dcnode-id=&quot;4226&quot;&gt;&lt;span data-dcnode-id=&quot;4227&quot; instrument_node=&quot;&quot;&gt;Altheide and Snow 1979, 1988, 1991; Nimmo and Combs 1983). This is not to &lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;t m0 x1 h3 ya9 ff2 fs0 fc0 sc0 lsb ws8f&quot; data-dcnode-id=&quot;4224&quot;&gt;&lt;span data-dcnode-id=&quot;4225&quot; instrument_node=&quot;&quot;&gt;say that there are no significant differences among, say, elite newspapers, public &lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;t m0 x1 h3 yaa ff2 fs0 fc0 sc0 lsb ws90&quot; data-dcnode-id=&quot;4222&quot;&gt;&lt;span data-dcnode-id=&quot;4223&quot; instrument_node=&quot;&quot;&gt;service news, and commercial TV news, but rather that the commonalities, from &lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;t m0 x1 h3 yab ff2 fs0 fc0 sc0 lsb ws5&quot; data-dcnode-id=&quot;4220&quot;&gt;&lt;span data-dcnode-id=&quot;4221&quot; instrument_node=&quot;&quot;&gt;the perspective of mediatization, are more important than the differences.&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;t m0 x2 h3 yac ff2 fs0 fc0 sc0 lsb ws91&quot; data-dcnode-id=&quot;4218&quot;&gt;&lt;span data-dcnode-id=&quot;4219&quot; instrument_node=&quot;&quot;&gt;Stated differently, mediatization means that the media form a system in &lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;t m0 x1 h3 yad ff2 fs0 fc0 sc0 lsb ws92&quot; data-dcnode-id=&quot;4210&quot;&gt;&lt;span data-dcnode-id=&quot;4217&quot; instrument_node=&quot;&quot;&gt;its own right, &lt;/span&gt;&lt;span class=&quot;ff5 ws3d&quot; data-dcnode-id=&quot;4215&quot;&gt;&lt;span data-dcnode-id=&quot;4216&quot; instrument_node=&quot;&quot;&gt;independent&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4214&quot; instrument_node=&quot;&quot;&gt; although &lt;/span&gt;&lt;span class=&quot;ff5 ws3d&quot; data-dcnode-id=&quot;4212&quot;&gt;&lt;span data-dcnode-id=&quot;4213&quot; instrument_node=&quot;&quot;&gt;interdependent&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4211&quot; instrument_node=&quot;&quot;&gt; on other social systems such &lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;t m0 x1 h3 yae ff2 fs0 fc0 sc0 lsb ws93&quot; data-dcnode-id=&quot;4208&quot;&gt;&lt;span data-dcnode-id=&quot;4209&quot; instrument_node=&quot;&quot;&gt;as the political system (Altheide and Snow 1988; Cook 2005; Hjarvard 2008; &lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;t m0 x1 h3 yaf ff2 fs0 fc0 sc0 lsb ws94&quot; data-dcnode-id=&quot;4206&quot;&gt;&lt;span data-dcnode-id=&quot;4207&quot; instrument_node=&quot;&quot;&gt;Mazzoleni 2008b; Strömbäck 2008). Within this media system, there are hierar-&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;t m0 x1 h3 yb0 ff2 fs0 fc0 sc0 lsb ws95&quot; data-dcnode-id=&quot;4204&quot;&gt;&lt;span data-dcnode-id=&quot;4205&quot; instrument_node=&quot;&quot;&gt;chies, with some media being more important in shaping the overall media logic &lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;t m0 x1 h3 yb1 ff2 fs0 fc0 sc0 lsb ws96&quot; data-dcnode-id=&quot;4202&quot;&gt;&lt;span data-dcnode-id=&quot;4203&quot; instrument_node=&quot;&quot;&gt;and the configuration of the media system than other media are. For example, &lt;/span&gt;&lt;/div&gt; fc0 sc0 lsb wsad&quot; data-dcnode-id=&quot;4100&quot;&gt;&lt;span data-dcnode-id=&quot;4101&quot; instrument_node=&quot;&quot;&gt;blocks of these social constructions are heavily shaped by the media’s social con-&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;t m0 x1 h3 y83 ff2 fs0 fc0 sc0 lsb wsae&quot; data-dcnode-id=&quot;4098&quot;&gt;&lt;span data-dcnode-id=&quot;4099&quot; instrument_node=&quot;&quot;&gt;structions. Ample evidence of this can be found in research on the media’s ability &lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;t m0 x1 h3 y84 ff2 fs0 fc0 sc0 lsb wsaf&quot; data-dcnode-id=&quot;4096&quot;&gt;&lt;span data-dcnode-id=&quot;4097&quot; instrument_node=&quot;&quot;&gt;to influence their audiences through, for example, the processes of agenda setting &lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;t m0 x1 h3 y85 ff2 fs0 fc0 sc0 lsb ws75&quot; data-dcnode-id=&quot;4094&quot;&gt;&lt;span data-dcnode-id=&quot;4095&quot; instrument_node=&quot;&quot;&gt;(McCombs 2004), framing (Iyengar 1991), priming (Iyengar and Kinder 1987), &lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;t m0 x1 h3 y86 ff2 fs0 fc0 sc0 lsb ws5&quot; data-dcnode-id=&quot;4092&quot;&gt;&lt;span data-dcnode-id=&quot;4093&quot; instrument_node=&quot;&quot;&gt;and cultivation (Shanahan and Morgan 1999).&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;t m0 x2 h3 y87 ff2 fs0 fc0 sc0 lsb wsb0&quot; data-dcnode-id=&quot;4090&quot;&gt;&lt;span data-dcnode-id=&quot;4091&quot; instrument_node=&quot;&quot;&gt;At the same time, a proper understanding of the media’s influence requires &lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;t m0 x1 h3 y88 ff2 fs0 fc0 sc0 lsb wsb1&quot; data-dcnode-id=&quot;4088&quot;&gt;&lt;span data-dcnode-id=&quot;4089&quot; instrument_node=&quot;&quot;&gt;going beyond theories on their effects on individual perceptions and opinions. &lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;t m0 x1 h3 y89 ff2 fs0 fc0 sc0 lsb wsb2&quot; data-dcnode-id=&quot;4086&quot;&gt;&lt;span data-dcnode-id=&quot; tered media habits of Croatian audiences. Television was preceded by online media as the main source of news while the press registers constant decline in readership, trust and advertising revenues. Radio remains the most trusted medium, as opposed to social media that are the least trusted source of information. Nevertheless, the level of trust in social networks in Croatia is considerably higher than the EU average.The data on media freedom and journalistic autonomy indicate that Croatia has made significant progress in this respect in the past thirty years. Although problems related to freedom, autonomy and political pressure persist, the biggest threat to journalism nowadays seems to come from within the profession. Commercialization, coupled with digitalization and merciless struggle for survival, eventually led news media to succumb to tabloid-style journalism and to radically downplay their professional standards. Although the role of the media as a social corrective remains undisputed, such media practices seem to cultivate ‘media fatigue’ and foster distrust in political institutions. In such an ethically challenging environment, the newsrooms and professional organizations remain for the most part silent about eroding professional standards.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;1822&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; data-dcnode-id=&quot;1823&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle&quot; data-dcnode-id=&quot;1824&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group&quot; data-dcnode-id=&quot;1825&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation- a-legacy-o-stack__item&quot; data-dcnode-id=&quot;1810&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-v-citation-item__context-body&quot; data-dcnode-id=&quot;1811&quot;&gt;&lt;span data-dcnode-id=&quot;1815&quot; instrument_node=&quot;&quot;&gt;... On the individual level, journalists intervene in their stories with varying degrees and forms &lt;/span&gt;&lt;mark class=&quot;nova-legacy-e-text-highlight nova-legacy-e-text-highlight--color-yellow&quot; data-dcnode-id=&quot;1813&quot;&gt;&lt;span data-dcnode-id=&quot;1814&quot; instrument_node=&quot;&quot;&gt;(Strömbäck &amp;amp; Esser, 2009&lt;/span&gt;&lt;/mark&gt;&lt;span data-dcnode-id=&quot;1812&quot; instrument_node=&quot;&quot;&gt;). Variables like the journalists' individual beliefs and values can influence how a story is composed and presented (De Almeida et al., 2018), even the journalists cultural and economic capital can play a role in how a story is framed (Vandevoordt, 2017).  ...&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-c-tooltip__arrow nova-legacy-c-tooltip__arrow nova-legacy-c-tooltip__arrow--body&quot; data-dcnode-id=&quot;1802&quot;&gt;&lt;div class=&quot;nova-legacy-c-tooltip__arrow-tip&quot; data-dcnode-id=&quot;1803&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-o-stack__item&quot; data-dcnode-id=&quot;1748&quot;&gt;&lt;div class=&quot;nova-legacy-v-citation-item__context-source&quot; data-dcnode-id=&quot;1749&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item nova-legacy-v-publication-item--size-m gtm-citation-item&quot; data-dcnode-id=&quot;1750&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__body&quot; data-dcnode-id=&quot;1765&quot;&gt;&lt;div class=&quot;nova-legacy-v-publicat -e-badge--display-block nova-legacy-e-badge--luminosity-medium nova-legacy-e-badge--size-l nova-legacy-e-badge--theme-ghost nova-legacy-e-badge--radius-m nova-legacy-v-publication-item__fulltext&quot; data-dcnode-id=&quot;1790&quot;&gt;&lt;span data-dcnode-id=&quot;1791&quot; instrument_node=&quot;&quot;&gt;Full-text available&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__meta-right&quot; data-dcnode-id=&quot;1784&quot;&gt;&lt;ul class=&quot;nova-legacy-e-list nova-legacy-e-list--size-m nova-legacy-e-list--type-inline nova-legacy-e-list--spacing-none nova-legacy-v-publication-item__meta-data&quot; data-dcnode-id=&quot;1785&quot;&gt;&lt;li class=&quot;nova-legacy-e-list__item nova-legacy-v-publication-item__meta-data-item&quot; data-dcnode-id=&quot;1786&quot;&gt;&lt;span class=&quot;&quot; data-dcnode-id=&quot;1787&quot;&gt;&lt;span data-dcnode-id=&quot;1788&quot; instrument_node=&quot;&quot;&gt;Jan 2021&lt;/span&gt;&lt;/span&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;1771&quot;&gt;&lt;ul class=&quot;nova-legacy-e-list nova-legacy-e-list--size-m nova-legacy-e-list--type-inline nova-legacy-e-list--spacing-none nova-legacy-v-publication-item__person-list&quot; data-dcnode-id=&quot;1772&quot;&gt;&lt;li class=&quot;nova-legacy-e-list__item&quot; data-dcnode-id=&quot;1773&quot;&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare&quot; data-dcnode-id=&quot;1774&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/profile/Tamim-Elyan&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item&quot; data-dcnode-id=&quot;1775&quot;&gt;&lt;span class=&quot;lite-person-inline-item__image&quot; data-dcnode-id=&quot;1778&quot;&gt;&lt;picture class=&quot;lite-page-avatar lite-page-avatar--size-xs lite-page-avatar--radius-full&quot; data-dcnode-id=&quot;1779&quot;&gt;&lt;span data-dcnode-id=&quot;1781&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;img alt=&quot;Tamim Elyan&quot; class=&quot;lite-image&quot; data-dcnode-id=&quot;1780&quot; data-src=&quot;https://i1.rgstatic.net/ii/profile.image/814267540451331-1571147918867_Q64/Tamim-Elyan.jpg&quot; src=&quot;data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg==&quot;&gt;&lt;/picture&gt;&lt;/span&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;1776&quot;&gt;&lt;span data-dcnode-id=&quot;1777&quot; instrument_node=&quot;&quot;&gt;Tamim Elyan&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;1767&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description&quot; data-dcnode-id=&quot;1768&quot;&gt;&lt;span class=&quot;js-target-abstract-62808390c9a1e lite-page-hidden&quot; data-dcnode-id=&quot;1769&quot;&gt;&lt;span data-dcnode-id=&quot;1770&quot; instrument_node=&quot;&quot;&gt;The economic adjustments that Egypt implemented as part of an IMF-backed program between 2016 and 2019 were a milestone event in the country's economic history. Business journalism was an important part of it as people, policymakers and businesses tried to grasp the developments. Using qualitative in-depth interviews with business journalists and editors, this study attempts to examine the various influences experienced by journalists that affected their framing of news and the quality and type of coverage. The study argues that journalists came under the influence of political pressure and media controls, as well as the technical allure of market sources which helped unify narrative and suppress diverse opinions. The study also shows that although political pressures were an important determinant of coverage, it was not the only major form of pressure. Structural factors that have to do with business models and working routines of media outlets helped trim the narrative and censor alternative perspectives. The study highlights the importance of a review of media regulations and communication policies that would ensure a fair and valuable coverage in the future that is helpful to the audience.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;1751&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; data-dcnode-id=&quot;1752&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle&quot; data-dcnode-id=&quot;1753&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group&quot; data-dcnode-id=&quot;1754&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation-horizontal nova-legacy-c-button-group--width-auto nova-legacy-v-publication-item__actions&quot; data-dcnode-id=&quot;1755&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group__item&quot; data-dcnode-id=&quot;1761&quot;&gt;&lt;a class=&quot;nova-legacy-c-button nova-legacy-c-button--align-center nova-legacy-c-button--radius-m nova-legacy-c-button--size-s nova-legacy-c-button--color-blue nova-legacy-c-button--theme-bare nova-legacy-c-button--width-auto nova-legacy-v-publication-item__action&quot; data-dcnode-id=&quot;1762&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/publication/350048612_Influences_on_Business_Journalists_in_Eg nline-item__fullname&quot; data-dcnode-id=&quot;1581&quot;&gt;&lt;span data-dcnode-id=&quot;1582&quot; instrument_node=&quot;&quot;&gt;Roberto Mincigrucci&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;1572&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description&quot; data-dcnode-id=&quot;1573&quot;&gt;&lt;span class=&quot;js-target-abstract-62808390c96a5 lite-page-hidden&quot; data-dcnode-id=&quot;1574&quot;&gt;&lt;span data-dcnode-id=&quot;1575&quot; instrument_node=&quot;&quot;&gt;Corruption is one of the most serious challenges facing contemporary democracies. In this chapter, we will provide an overview of the concept, focusing on the “environment” that favors or limits its spread. Indeed, anti-corruption policies can only be effective if they find a fertile ground capable of receiving and implementing them. Our chapter will largely turn around the concept of public opinion, in particular on the role it plays in relation to corruption, because it has been largely demonstrated that an aware and receptive public opinion is the best tool to “fertilize” the ground to grow civic sense and respect for rules. For this reason, particular attention will be paid to the role of the media in presenting the phenomenon to the public opinion. Finally, we highlight some distortions in the mediated narration of the phenomenon that make the political system impervious to sanction mechanisms and that inhibit anti-corruption measures.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;1556&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer- 535&quot;&gt;&lt;ul class=&quot;nova-legacy-e-list nova-legacy-e-list--size-m nova-legacy-e-list--type-inline nova-legacy-e-list--spacing-none nova-legacy-v-publication-item__meta-data&quot; data-dcnode-id=&quot;1536&quot;&gt;&lt;li class=&quot;nova-legacy-e-list__item nova-legacy-v-publication-item__meta-data-item&quot; data-dcnode-id=&quot;1537&quot;&gt;&lt;span class=&quot;&quot; data-dcnode-id=&quot;1538&quot;&gt;&lt;span data-dcnode-id=&quot;1539&quot; instrument_node=&quot;&quot;&gt;Sep 2019&lt;/span&gt;&lt;/span&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;1522&quot;&gt;&lt;ul class=&quot;nova-legacy-e-list nova-legacy-e-list--size-m nova-legacy-e-list--type-inline nova-legacy-e-list--spacing-none nova-legacy-v-publication-item__person-list&quot; data-dcnode-id=&quot;1523&quot;&gt;&lt;li class=&quot;nova-legacy-e-list__item&quot; data-dcnode-id=&quot;1524&quot;&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare&quot; data-dcnode-id=&quot;1525&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/profile/Fernando-Nobre-Cavalcante&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item&quot; data-dcnode-id=&quot;1526&quot;&gt;&lt;span class=&quot;lite-person-inline-item__image&quot; data-dcnode-id=&quot;1529&quot;&gt;&lt;picture class=&quot;lite-page-avatar lite-page-avatar--size-xs lite-page-avatar--radius-full&quot; data-dcnode-id=&quot;1530&quot;&gt;&lt;span data-dcnode-id=&quot;1532&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;img alt=&quot;Fernando Nobre Cavalcante&quot; class=&quot;lite-image&quot; data-dcnode-id=&quot;1531&quot; data-src=&quot;https://i1.rgstatic.net/ii/profile.image/1105355580944389-1640548715088_Q64/Fernando-Nobre-Cavalcante.jpg&quot; src=&quot;data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg==&quot;&gt;&lt;/picture&gt;&lt;/span&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;1527&quot;&gt;&lt;span data-dcnode-id=&quot;1528&quot; instrument_node=&quot;&quot;&gt;Fernando Nobre Cavalcante&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;1518&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description&quot; data-dcnode-id=&quot;1519&quot;&gt;&lt;span class=&quot;js-target-abstract-62808390c9808 lite-page-hidden&quot; data-dcnode-id=&quot;1520&quot;&gt;&lt;span data-dcnode-id=&quot;1521&quot; instrument_node=&quot;&quot;&gt;The interdependence of members of a group is fostered in the interactive experience of language. In a deep mediatized group, in which the exchange of ideas can take place through frames of relevance, the empirical aspect of understanding it by transposing the content was left to form. The thesis investigates the interactions of the actors of a WhatsApp group that, linked to American diplomatic policy, propagates notions of startup entrepreneurship in Brazil. The media research triangulation method was instrumentalized, with quantitative and qualitative studies based on hidden participant observation through a journal opened to the group members. The thesis considers that technical functionalities of the representation of writing, speech, and gestures, through mediatized interaction, symbolize intentions and emotions, forge the representations of the actors and script the narratives of a group in an informal network – which was considered as a link to a media policy. Empirically comparable with the language medium in face-to-face communication, the technical functionalities of the utterance device, metaphorically, figured the assumption of measuring a mediatized face-to-face communication. By applying the studies of Erving Goffman’s frames of interaction, the human and non-human embrace the complexity of deep mediatized and “dataficated” interactions, as the thesis theoretically explores, intermingling in the German research network called Communicative Figurations. By interaction anchorages, the fact that the following technical functionalities are markers of openings and closings, internal parentheses of a conversational theme was categorized: notifications, writing characters, technical images, audios and symbols, as well as the different temporalities of the sequential order of interaction. The mapping of links of effervescence, modeling, recognition and temporality of an interaction oppose that frames of relevance can propose categories of adhesions and interlacing in groups about a supposed public opinion, urgent to new empirical mechanisms.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;1502&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; data-dcnode-id=&quot;1503&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle&quot; data-dcnode-id=&quot;1504&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group&quot; data-dcnode-id=&quot;1505&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation-horizontal nova-legacy-c-button-group--width-auto nova-legacy-v-publication-item__actions&quot; data-dcnode-id=&quot;1506&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group__item&quot; data-dcnode-id=&quot;1512&quot;&gt;&lt;a cl bare&quot; data-dcnode-id=&quot;1420&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/scientific-contributions/Qaisar-Abbas-2194244313&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item&quot; data-dcnode-id=&quot;1421&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;1422&quot;&gt;&lt;span data-dcnode-id=&quot;1423&quot; instrument_node=&quot;&quot;&gt;Qaisar Abbas&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;1413&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description&quot; data-dcnode-id=&quot;1414&quot;&gt;&lt;span class=&quot;js-target-abstract-62808390c9907 lite-page-hidden&quot; data-dcnode-id=&quot;1415&quot;&gt;&lt;span data-dcnode-id=&quot;1416&quot; instrument_node=&quot;&quot;&gt;The mediatisation of politics has been a dominant theory in the field of political communication for some time, proposing that the mass media in democratic societies tend to dominate the political process. This research intends to explore the media-politics nexus as part of the protest campaign in 2014 in Pakistan, also known as the long march. Specifically, it analyses dynamics of the political rhetoric of protesting leaders and dimensions of the two selected TV talk shows. Using textual analysis as research methodology, this article concludes that by transforming the political theatre into a media theatre, the talk shows effectively mediatised the long march. TV news became part of the political process, rather than covering it objectively, either by supporting or opposing the long march. The two top political leaders of the long march voluntarily adopted media logic as a rhetorical strategy to offer a readymade product for media coverage.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;1397&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; data-dcnode-id=&quot;1398&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle&quot; data-dcnode-id=&quot;1399&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group&quot; data-dcnode-id=&quot;1400&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation-horizontal nova-legacy-c-button-group--width-auto nova-legacy-v-publication-item__actions&quot; data-dcnode-id=&quot;1401&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group__item&quot; data-dcnode-id=&quot;1407&quot;&gt;&lt;a class=&quot;nova-legacy-c-button nova-legacy-c-button--align-center nova-legacy-c-button--radius-m nova-legacy-c-button--size-s nova-legacy-c-button--color-blue nova-legacy-c-button--theme-bare nova-legacy-c-button--width-auto nova-legacy-v-publication-item__action&quot; data-dcnode-id=&quot;1408&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/publication/351371245_Mediatising_Political_Rhetoric_Media_Logic_at_the_Long_March_in_Pakistan&quot;&gt;&lt;span class=&quot;nova-legacy-c-button__label&quot; data-dcnode-id=&quot;1409&quot;&gt;&lt;span data-dcnode-id=&quot;1410&quot; instrument_node=&quot;&quot;&gt;View&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-c-button-group__item&quot; data-dcnode-id=&quot;1402&quot;&gt;&lt;button class=&quot;nova-legacy-c-button nova-legacy-c-button--align-center nova-legacy-c-button--radius-m nova d=&quot;1267&quot;&gt;&lt;span data-dcnode-id=&quot;1269&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;img alt=&quot;Martin Boyer&quot; class=&quot;lite-image&quot; data-dcnode-id=&quot;1268&quot; data-src=&quot;https://i1.rgstatic.net/ii/profile.image/326847989600259-1454938041483_Q64/Martin-Boyer.jpg&quot; src=&quot;data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg==&quot;&gt;&lt;/picture&gt;&lt;/span&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;1264&quot;&gt;&lt;span data-dcnode-id=&quot;1265&quot; instrument_node=&quot;&quot;&gt;Martin Boyer&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;1255&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description&quot; data-dcnode-id=&quot;1256&quot;&gt;&lt;span class=&quot;js-target-abstract-62808390ca002 lite-page-hidden&quot; data-dcnode-id=&quot;1257&quot;&gt;&lt;span data-dcnode-id=&quot;1258&quot; instrument_node=&quot;&quot;&gt;A methodology is proposed for assessing the impact of televised debates on electoral outcomes, and it is applied to a specific case, that of the 1988 Canadian election. We present four tests of the debates' impact: first, a cross-sectional group comparison, which contrasts the voting behaviour of those who did and those who did not see the debates; secondly, a panel analysis of the shift in party support, before and after the debates, among those who watched the debates and those who did not; thirdly, a panel study of the impact of reactions to the debates on voting behaviour; and, fourthly, a time-series analysis, which examines the evolution of vote intentions over the course of the campaign and, more precisely, before and after the debates.
It is argued that because non-watchers are influenced by what their friends or the media tell them about the debates, the first two designs, based on a comparison of debate watchers and non-watchers, are not appropriate. The empirical analysis of the 1988 Canadian election substantiates this point. While these first two designs seem to indicate no debate impact, panel reaction and time-series analyses show that the debates had a substantial and enduring impact on the vote and that they were decisive in the contest for second place between the Liberals and the NDP.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;1239&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; data-dcnode-id=&quot;1240&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle&quot; data-dcnode-id=&quot;1241&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group&quot; data-dcnode-id=&quot;1242&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation-horizontal nova-legacy-c-button-group--width-auto nova-legacy-v-publication-item__actions&quot; data-dcnode-id=&quot;1243&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group__item&quot; data-dcnode-id=&quot;1249&quot;&gt;&lt;a class=&quot;nova-legacy-c-button nova-legacy-c-button--align-center nova-legacy-c-button--radius-m nova-legacy-c-button--size-s nova-legacy-c-button--color-blue nova-legacy-c-button--theme-bare nova-legacy-c-button--width-auto nova-legacy-v-publication-item__action&quot; data-dcnode-id=&quot;1250&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/publication/316674723_Assessing_the_Impact_of_Televised_Deba
