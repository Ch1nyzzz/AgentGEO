&lt;/span&gt;&lt;div class=&quot;single_post_module&quot; data-dcnode-id=&quot;108&quot;&gt;&lt;span data-dcnode-id=&quot;2071&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;post-6268 post type-post status-publish format-standard hentry category-issue-20-first-release&quot; data-dcnode-id=&quot;111&quot; id=&quot;post-6268&quot;&gt;&lt;span data-dcnode-id=&quot;2070&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 class=&quot;post_title&quot; data-dcnode-id=&quot;2068&quot;&gt;&lt;span data-dcnode-id=&quot;2069&quot; instrument_node=&quot;&quot;&gt;Alternate futures, contradictory pasts: Forking paths and cubist narratives in contemporary film&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;2067&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;single_post_content&quot; data-dcnode-id=&quot;114&quot;&gt;&lt;span data-dcnode-id=&quot;2066&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;post_meta&quot; data-dcnode-id=&quot;2060&quot;&gt;&lt;span class=&quot;meta_author&quot; data-dcnode-id=&quot;2062&quot;&gt;&lt;span data-dcnode-id=&quot;2065&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a data-dcnode-id=&quot;2063&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//www.screeningthepast.com/author/david-scott-diffrient/&quot;&gt;&lt;span data-dcnode-id=&quot;2064&quot; instrument_node=&quot;&quot;&gt;David Scott Diffrient&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;2061&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2059&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;entry&quot; data-dcnode-id=&quot;117&quot;&gt;&lt;span data-dcnode-id=&quot;2058&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2053&quot;&gt;&lt;span data-dcnode-id=&quot;2057&quot; instrument_node=&quot;&quot;&gt;Over the past twenty-five years, several filmmakers throughout the world have departed from classical narrative formulas to embrace the intertextual as well as&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;2055&quot;&gt;&lt;span data-dcnode-id=&quot;2056&quot; instrument_node=&quot;&quot;&gt;intra&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2054&quot; instrument_node=&quot;&quot;&gt;textual complexities of “episode films” (feature-length motion pictures each made up of several discretely demarcated stories, sketches, anecdotes, or variations on a theme). In doing so, such disparate auteurs as Ventura Pons (Spain), Hong Sang-soo (South Korea), Rodrigo García (United States), Jim Jarmusch (United States), François Girard (Canada), Alejandro González Iñárritu (Mexico), and Petr Zelenka (Czech Republic) have created polyphonic works whose internal fragmentation provides a structural foundation for expressing psychological uncertainty, epistemological ambiguity, perspectival disjuncture, and thematic reverberation while suggesting an affinity for various literary and artistic avant-gardes of the twentieth-century. This essay attempts to account for two unique strains of cinematic episodicity gaining currency within the critical community, each rooted in avant-garde practices that predate contemporary film. In the process of unpacking these alternative approaches to storytelling, I explore particular texts that have already been the subject of hypotheses about the nature of cinematic narration, albeit often without being situated within either a broader art-historical context or a lineage that recognizes the significance of earlier anthology, omnibus, portmanteau, and sketch films.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2052&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2032&quot;&gt;&lt;span data-dcnode-id=&quot;2051&quot; instrument_node=&quot;&quot;&gt;After briefly discussing Jorge Luís Borges’s importance to cyclical and subjunctive cinematic forms in the first section of this essay, I focus on a select few episode films whose stories fork off from one another and provide alternate visions of a single character’s immediate future. Unlike many episodic narratives in the multi-director (omnibus) and multi-character (ensemble) molds, these works typically revolve around an individual protagonist or a couple rather than a broad swath of humanity, although the stories they tell – each one rendered in the conditional tense, each one different from the others in some significant way – are aligned in a similarly serial pattern. However, if we think of the interstitial moments between the episodes of a representative omnibus production like&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;2049&quot;&gt;&lt;span data-dcnode-id=&quot;2050&quot; instrument_node=&quot;&quot;&gt;Quartet&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2048&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;(1948) as being akin to the conjunction “and” (“The facts of life”&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;2046&quot;&gt;&lt;span data-dcnode-id=&quot;2047&quot; instrument_node=&quot;&quot;&gt;and&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2045&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;“The alien corn”&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;2043&quot;&gt;&lt;span data-dcnode-id=&quot;2044&quot; instrument_node=&quot;&quot;&gt;and&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2042&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;“The kite”&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;2040&quot;&gt;&lt;span data-dcnode-id=&quot;2041&quot; instrument_node=&quot;&quot;&gt;and&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2039&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;“The colonel’s lady”), then the slivers of time between stories in a forked-path film like Krzysztof Kieslowski’s&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;2037&quot;&gt;&lt;span data-dcnode-id=&quot;2038&quot; instrument_node=&quot;&quot;&gt; Blind Chance&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2036&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;(&lt;/span&gt;&lt;em data-dcnode-id=&quot;2034&quot;&gt;&lt;span data-dcnode-id=&quot;2035&quot; instrument_node=&quot;&quot;&gt; Przypadek&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2033&quot; instrument_node=&quot;&quot;&gt;, 1982) are akin to the word “or.”&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2031&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2020&quot;&gt;&lt;span data-dcnode-id=&quot;2030&quot; instrument_node=&quot;&quot;&gt;After exploring some of the narratological aspects of Kieslowski’s&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;2028&quot;&gt;&lt;span data-dcnode-id=&quot;2029&quot; instrument_node=&quot;&quot;&gt;Blind Chance&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2027&quot; instrument_node=&quot;&quot;&gt;, a three-episode film set in pre-Solidarity Poland that controverts the roles of both fate and chance in shaping a young man’s life, I move on to a brief discussion of&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;2025&quot;&gt;&lt;span data-dcnode-id=&quot;2026&quot; instrument_node=&quot;&quot;&gt;Run Lola Run&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2024&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;(&lt;/span&gt;&lt;em data-dcnode-id=&quot;2022&quot;&gt;&lt;span data-dcnode-id=&quot;2023&quot; instrument_node=&quot;&quot;&gt;Lola rennt&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2021&quot; instrument_node=&quot;&quot;&gt;, 1998). Director Tom Tykwer’s kinetic updating of the Polish film tracks the titular heroine’s titular sprint through Berlin to procure the 100,000 German Marks that her smuggler boyfriend has lost, each of its three episodes offering a different outcome to the kernel story. Using Slavoj Zizek’s writings on these two films as an interpretative and structural model, I then ruminate on the applicability of episodicity and “forked-path thinking” within critical studies. Increasingly, theorists, historians, and scholars have incorporated in their analytical writings modes of fragmentation, branching, and discursivity that reflect a broad cultural-aesthetic trend, one that is consonant with modernist as well as postmodernist reading strategies.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2019&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2017&quot;&gt;&lt;span data-dcnode-id=&quot;2018&quot; instrument_node=&quot;&quot;&gt;By assimilating the discombobulated structure of episode films and turning it into a rhetorical mode on the page, such otherwise disparate writers as Zizek, Peter Wollen, Susan Sontag, and Robert Ray evince a collective interest in new channels of communication that appear to be naturally amenable to the subject of forked-path narratives and are therefore instructive of the ways in which critical discourse can be made to “fit,” like a glove over a hand, the otherwise ungainly anthology, omnibus, portmanteau, and sketch forms that have often been derided by unsympathetic reviewers as hit-and-miss hodgepodges. Given the high degree of antipathy directed toward episodic narratives, I feel that it is important to stress the ways in which fragmentation, discursivity and decentering – when joined to more traditional interpretative paradigms (such as Formalism, Marxism, Structuralism, Feminism, and Psychoanalysis) – can help us meet the unique hermeneutic challenges set forth by episode films, which are torn between the singular and the multiple, integration and disintegration.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2016&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1988&quot;&gt;&lt;span data-dcnode-id=&quot;2015&quot; instrument_node=&quot;&quot;&gt;The second half of this essay builds upon the themes of repetition and change, similarity and disjunction, so central to cyclical and forked-path narratives, to explore a similar subset of episodic cinema. This branch relies upon a&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;2013&quot;&gt;&lt;span data-dcnode-id=&quot;2014&quot; instrument_node=&quot;&quot;&gt;cubist&amp;nbsp;or&amp;nbsp;multi-perspectival&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2012&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;approach to storytelling that disperses point-of-view across either a wide spectrum or a select group of individuals whose contrasting memories portend their ultimate non-compatibility on an emotional or physical level. Like episodic films such as&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;2010&quot;&gt;&lt;span data-dcnode-id=&quot;2011&quot; instrument_node=&quot;&quot;&gt;Blind Chance&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2009&quot; instrument_node=&quot;&quot;&gt;, which ask “what if” such-and-such were to happen, cubist narratives such as Akira Kurosawa’s&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;2007&quot;&gt;&lt;span data-dcnode-id=&quot;2008&quot; instrument_node=&quot;&quot;&gt;Rashomon&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2006&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;(1950), Hong Sang-soo’s&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;2004&quot;&gt;&lt;span data-dcnode-id=&quot;2005&quot; instrument_node=&quot;&quot;&gt;Virgin stripped bare by her bachelors&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2003&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;(&lt;/span&gt;&lt;em data-dcnode-id=&quot;2001&quot;&gt;&lt;span data-dcnode-id=&quot;2002&quot; instrument_node=&quot;&quot;&gt;O! Su-jong&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2000&quot; instrument_node=&quot;&quot;&gt;, 2000), and Zhang Yimou’s&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1998&quot;&gt;&lt;span data-dcnode-id=&quot;1999&quot; instrument_node=&quot;&quot;&gt;Hero&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1997&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;(&lt;/span&gt;&lt;em data-dcnode-id=&quot;1995&quot;&gt;&lt;span data-dcnode-id=&quot;1996&quot; instrument_node=&quot;&quot;&gt;Ying xiong&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1994&quot; instrument_node=&quot;&quot;&gt;, 2002) double back on themselves and ask the spectator to accept a potentially false proposition “as if” it were true (and vice-versa), thus casting light on a trademark of this subgenre: its reliably unreliable narration.&lt;/span&gt;&lt;a data-dcnode-id=&quot;1992&quot; href=&quot;#_edn1&quot;&gt;&lt;span data-dcnode-id=&quot;1993&quot; instrument_node=&quot;&quot;&gt;[1]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1991&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a data-dcnode-id=&quot;1990&quot; name=&quot;_ednref1&quot;&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1989&quot; instrument_node=&quot;&quot;&gt; This calls into question not only the plausibility of an objectively rendered “primal scene,” but also more traditional or transparent narratives’ claim to truth. As we shall see, distinctions between forked path and cubist narratives are fine and fraught with complexities. However, the relationship between the two can be better ascertained through a cross-media contextualization that sees cinema as only one of several forms of cultural production mired in the previous century’s aesthetic traditions, and thus linked to literature, theatre, painting and other visual arts.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1987&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1984&quot;&gt;&lt;strong data-dcnode-id=&quot;1985&quot;&gt;&lt;span data-dcnode-id=&quot;1986&quot; instrument_node=&quot;&quot;&gt;A Borgesian Branch of Cinema: Cyclical and Subjunctive Narratives&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1983&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1963&quot;&gt;&lt;span data-dcnode-id=&quot;1982&quot; instrument_node=&quot;&quot;&gt;As early as 1941, Argentinean writer Jorge Luís Borges anticipated the advent of hypertext fiction and subjunctive cinema when he published&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1980&quot;&gt;&lt;span data-dcnode-id=&quot;1981&quot; instrument_node=&quot;&quot;&gt;The Garden of Forking Paths&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1979&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;(&lt;/span&gt;&lt;em data-dcnode-id=&quot;1977&quot;&gt;&lt;span data-dcnode-id=&quot;1978&quot; instrument_node=&quot;&quot;&gt;El jardín de senderos que se bifurcan&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1976&quot; instrument_node=&quot;&quot;&gt;). This collection of eight stories, subsequently included in the 1944 volume&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1974&quot;&gt;&lt;span data-dcnode-id=&quot;1975&quot; instrument_node=&quot;&quot;&gt;Ficciones&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1973&quot; instrument_node=&quot;&quot;&gt;, not only proved to be influential on several literary and philosophical movements,&lt;/span&gt;&lt;a data-dcnode-id=&quot;1971&quot; href=&quot;#_edn2&quot;&gt;&lt;span data-dcnode-id=&quot;1972&quot; instrument_node=&quot;&quot;&gt;[2]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1970&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a data-dcnode-id=&quot;1969&quot; name=&quot;_ednref2&quot;&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1968&quot; instrument_node=&quot;&quot;&gt; but also provided a template for subsequent cinematic and computer Web-based attempts to convey an idea of “the infinite” through finite structures. Much of what has been written about Borges’s collection focuses on the last of the eight stories, “The garden of the forking paths,” in which a Chinese-German double agent in Britain during the first World War, Yu Tsun – upon taking the gently winding road away from his pursuer – imagines “a labyrinth of labyrinths, a maze of mazes, a twisting, turning, ever-widening labyrinth that contained both past and future and somehow implied the stars.” &lt;/span&gt;&lt;a data-dcnode-id=&quot;1966&quot; href=&quot;#_edn3&quot;&gt;&lt;span data-dcnode-id=&quot;1967&quot; instrument_node=&quot;&quot;&gt;[3]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1965&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a data-dcnode-id=&quot;1964&quot; name=&quot;_ednref3&quot;&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1962&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1950&quot;&gt;&lt;span data-dcnode-id=&quot;1961&quot; instrument_node=&quot;&quot;&gt;Yu Tsun reflects back on the garden of his dead ancestor, Ts’ui Pen, a metaphysician who spent thirteen years of his life writing a book of infinities. In the village of Ashgrove, Yu Tsun meets British Sinologist Stephen Albert, who has collected and translated Ts’ui Pen’s manuscript into an inexhaustible novel in which the hero dies in one chapter yet is “alive again” in the next. Initially dumbstruck by the idea that “a book could be infinite,” Albert surmised that it could only be “a cyclical, or circular, volume, a volume whose last page would be identical to the first, so that one might go on indefinitely.” He likens it to “that night at the center of the&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1959&quot;&gt;&lt;span data-dcnode-id=&quot;1960&quot; instrument_node=&quot;&quot;&gt;1001 Nights&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1958&quot; instrument_node=&quot;&quot;&gt;, when the queen Scheherazade (through some magical distractedness on the part of the copyist) begins to retell, verbatim, the story of the 1000 Nights, with the risk of returning once again to the night on which she is telling it – and so on,&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1956&quot;&gt;&lt;span data-dcnode-id=&quot;1957&quot; instrument_node=&quot;&quot;&gt;ad infinitum&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1955&quot; instrument_node=&quot;&quot;&gt;.”&lt;/span&gt;&lt;a data-dcnode-id=&quot;1953&quot; href=&quot;#_edn4&quot;&gt;&lt;span data-dcnode-id=&quot;1954&quot; instrument_node=&quot;&quot;&gt;[4]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1952&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a data-dcnode-id=&quot;1951&quot; name=&quot;_ednref4&quot;&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1949&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1939&quot;&gt;&lt;span data-dcnode-id=&quot;1948&quot; instrument_node=&quot;&quot;&gt;This description of a circular, never-ending narrative might remind readers of the British film&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1946&quot;&gt;&lt;span data-dcnode-id=&quot;1947&quot; instrument_node=&quot;&quot;&gt;Dead of Night&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1945&quot; instrument_node=&quot;&quot;&gt;(1945), produced by Michael Balcon at Ealing Studios just a few years after Borges’s story was first published.&lt;/span&gt;&lt;a data-dcnode-id=&quot;1943&quot; href=&quot;#_edn5&quot;&gt;&lt;span data-dcnode-id=&quot;1944&quot; instrument_node=&quot;&quot;&gt;[5]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1942&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a data-dcnode-id=&quot;1941&quot; name=&quot;_ednref5&quot;&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1940&quot; instrument_node=&quot;&quot;&gt; In this somewhat-surreal, five-episode omnibus film featuring the contributions of four directors, an upper-middle-class farmhouse is transformed into a hothouse of dread and desire when Walter Craig and five additional guests recount chilling, supernatural episodes in their lives. The frame story, which shows each member of the group of strangers speaking in turn, is reinitiated at the end of the film to suggest an infinity of repetition not unlike that described by Albert in the Borges story. Thus, the terrifying uncertainty at the core of this British picture contrasts with the certainty of endless repetition marked by its frame story, which – like a Chinese box – is a dream containing several dreams, each one filled with flashbacks, each one following the other until the circle is complete.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1938&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1928&quot;&gt;&lt;span data-dcnode-id=&quot;1937&quot; instrument_node=&quot;&quot;&gt;Other similarities abound, such as the German/British binary that Borges uses to oppose body and mind, physical strength and metaphysical imagination; in&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1935&quot;&gt;&lt;span data-dcnode-id=&quot;1936&quot; instrument_node=&quot;&quot;&gt;Dead of Night&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1934&quot; instrument_node=&quot;&quot;&gt;, that dichotomy is inversely figured in the guises of two individuals: Dr. von Straaten, an overly rational psychoanalyst, and Walter Craig, the aforementioned protagonist whose uncanny dreamworld cannot be so easily explained away or exorcised.&lt;/span&gt;&lt;a data-dcnode-id=&quot;1932&quot; href=&quot;#_edn6&quot;&gt;&lt;span data-dcnode-id=&quot;1933&quot; instrument_node=&quot;&quot;&gt;[6]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1931&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a data-dcnode-id=&quot;1930&quot; name=&quot;_ednref6&quot;&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1929&quot; instrument_node=&quot;&quot;&gt; Like Craig, an architect who has been summoned to Pilgrim’s Farm to begin reconstructing the old farmhouse, Albert has devoted part of his life to reconstructing Ts’ui Pen’s puzzling text, the manuscripts of which the Englishman has compiled and translated. Significantly, in trying to grasp the notion that a book could be infinite, Albert conjectures that what Ts’ui Pen had in mind was “a platonic, hereditary sort of work, passed down from father to son, in which each new individual would add a chapter.”&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1927&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1912&quot;&gt;&lt;span data-dcnode-id=&quot;1926&quot; instrument_node=&quot;&quot;&gt;These words conjure the multi-authorial dimensions of&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1924&quot;&gt;&lt;span data-dcnode-id=&quot;1925&quot; instrument_node=&quot;&quot;&gt;Dead of Night&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1923&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;and other omnibus films in which different directors each add a new “chapter” to a series organized around a core idea or proposition, thereby suggesting several paths or futures emanating outward from a narrative “center” while, paradoxically, delineating a cyclical pattern indicative of a single future (which, to further compound the paradox, is the&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1921&quot;&gt;&lt;span data-dcnode-id=&quot;1922&quot; instrument_node=&quot;&quot;&gt;past&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1920&quot; instrument_node=&quot;&quot;&gt;). Ultimately, Stephen Albert puts his faith in the forked-path, rather than strictly cyclical, variety of storytelling, for he realizes that, “In all fictions, each time a man meets diverse alternatives, he chooses one and eliminates the others; in the work of the virtually impossible-to-disentangle Ts’ui Pen, the character chooses – simultaneously – all of them. He&amp;nbsp;creates, thereby, ‘several futures’, several&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1918&quot;&gt;&lt;span data-dcnode-id=&quot;1919&quot; instrument_node=&quot;&quot;&gt;times&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1917&quot; instrument_node=&quot;&quot;&gt;, which themselves proliferate and fork.”&lt;/span&gt;&lt;a data-dcnode-id=&quot;1915&quot; href=&quot;#_edn7&quot;&gt;&lt;span data-dcnode-id=&quot;1916&quot; instrument_node=&quot;&quot;&gt;[7]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1914&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a data-dcnode-id=&quot;1913&quot; name=&quot;_ednref7&quot;&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1911&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1903&quot;&gt;&lt;span data-dcnode-id=&quot;1910&quot; instrument_node=&quot;&quot;&gt;While most critical discussions of&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1908&quot;&gt;&lt;span data-dcnode-id=&quot;1909&quot; instrument_node=&quot;&quot;&gt;The Garden of Forking Paths&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1907&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;highlight the collection’s same-titled anchor story as the most distilled evocation of Borgesian non-linearity and multiplicity, another, less famous story from the same volume provides ample evidence that the author had literally envisioned the process and potential of branching narratives (not to mention reverse-chronological plotting). In his critical essay-pastiche, “A survey of the works of Herbert Quain,” Borges goes so far as to include a multi-pronged diagram of the fake author’s fake novel&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1905&quot;&gt;&lt;span data-dcnode-id=&quot;1906&quot; instrument_node=&quot;&quot;&gt;April March&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1904&quot; instrument_node=&quot;&quot;&gt;, which begins on a railway station platform and proceeds to move backwards in time while providing alternate possibilities of the preceding action. If Quain and his reverse-order novel are literary constructs, an author and a book invented by Borges to make a particular point about the unrealized potential of fiction, his concept of “infinite stories, infinitely branching” resonates in the real world, where each day we face an almost paralyzing series of endless possibilities.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1902&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1872&quot;&gt;&lt;span data-dcnode-id=&quot;1901&quot; instrument_node=&quot;&quot;&gt;As suggested above, the forking-path paradigm articulated by Borges in his parable about parallel and possible futures has since been assimilated in the lexicons of hypertext fiction, Web design, and computer gaming – arenas in which non-linearity, infinite branching and complex combinatory patterns have perhaps been most fully realized and consistently utilized.&lt;/span&gt;&lt;a data-dcnode-id=&quot;1899&quot; href=&quot;#_edn8&quot;&gt;&lt;span data-dcnode-id=&quot;1900&quot; instrument_node=&quot;&quot;&gt;[8]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1898&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a data-dcnode-id=&quot;1897&quot; name=&quot;_ednref8&quot;&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1896&quot; instrument_node=&quot;&quot;&gt; More central to the present discussion, however, are&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1894&quot;&gt;&lt;span data-dcnode-id=&quot;1895&quot; instrument_node=&quot;&quot;&gt;cinematic&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1893&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;works that feature forked-path narratives. This type of episode film poses hypothetical conclusions to a single, germinal story-event that is presented early in the frame narrative. Together these different outcomes, rendered as serial episodes, express&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1891&quot;&gt;&lt;span data-dcnode-id=&quot;1892&quot; instrument_node=&quot;&quot;&gt;what could be,&amp;nbsp;would be, or&amp;nbsp;might have been&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1890&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;a data-dcnode-id=&quot;1888&quot; href=&quot;#_edn9&quot;&gt;&lt;span data-dcnode-id=&quot;1889&quot; instrument_node=&quot;&quot;&gt;[9]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1887&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a data-dcnode-id=&quot;1886&quot; name=&quot;_ednref9&quot;&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1885&quot; instrument_node=&quot;&quot;&gt; Similar to Italo Calvino’s 1979 novel&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1883&quot;&gt;&lt;span data-dcnode-id=&quot;1884&quot; instrument_node=&quot;&quot;&gt;If on a Winter’s Night a Traveler&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1882&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;(which is composed of a series of abortive narrative beginnings leading not to a climax but rather to another beginning), “repeat action” films such as&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1880&quot;&gt;&lt;span data-dcnode-id=&quot;1881&quot; instrument_node=&quot;&quot;&gt;Blind Chance&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1879&quot; instrument_node=&quot;&quot;&gt;,&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1877&quot;&gt;&lt;span data-dcnode-id=&quot;1878&quot; instrument_node=&quot;&quot;&gt;Sliding Doors&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1876&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;(1998), and&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1874&quot;&gt;&lt;span data-dcnode-id=&quot;1875&quot; instrument_node=&quot;&quot;&gt;Run Lola Run&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1873&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;fit into this sub-category.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1871&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1859&quot;&gt;&lt;span data-dcnode-id=&quot;1870&quot; instrument_node=&quot;&quot;&gt;Perhaps the most famous example of subjunctive conjecture in history comes from Blaise Pascal, who in &lt;/span&gt;&lt;em data-dcnode-id=&quot;1868&quot;&gt;&lt;span data-dcnode-id=&quot;1869&quot; instrument_node=&quot;&quot;&gt;Pensées&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1867&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;(1670) muses, “Had Cleopatra’s nose been shorter, the whole face of the world would have been different.” Spanish filmmaker Ventura Pons makes a similar, albeit less monumental assertion in his Catalan-language motion picture&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1865&quot;&gt;&lt;span data-dcnode-id=&quot;1866&quot; instrument_node=&quot;&quot;&gt;To Die (or not)&amp;nbsp;(Morir [o no]&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1864&quot; instrument_node=&quot;&quot;&gt;, 2000). The first fifty minutes of the film present, in consecutive fashion, seven black-and-white vignettes (each roughly seven minutes in length) concerning seven seemingly unrelated people who die, one by one. Pons then follows this apparently irreversible set of existential situations with a thirty-minute hypothetical section (“what if”), which shows how the altering of a single person’s destiny can have a kind of “butterfly effect,” changing the course of events (history on a small scale) and guaranteeing the survival of these initially ill-fated “strangers” (who, it turns out, are connected either tangentially or as close friends and distant relatives).&lt;/span&gt;&lt;a data-dcnode-id=&quot;1862&quot; href=&quot;#_edn10&quot;&gt;&lt;span data-dcnode-id=&quot;1863&quot; instrument_node=&quot;&quot;&gt;[10]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1861&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a data-dcnode-id=&quot;1860&quot; name=&quot;_ednref10&quot;&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1858&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1847&quot;&gt;&lt;span data-dcnode-id=&quot;1857&quot; instrument_node=&quot;&quot;&gt;This latter suite of episodes, filmed in color, marks both an aesthetic and narrative reversal. A kind of asymmetrically skewed palindrome, the film lurches back toward the beginning, with the final episode of the first black-and-white section providing the basis for the first episode of the final color section. Only after that shift has occurred – a moment marked by a black screen on which the words “Not to die” appear – do we realize that the seven episodes comprising the first fifty minutes of the film actually transpired in reverse order (recalling the aforementioned&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1855&quot;&gt;&lt;span data-dcnode-id=&quot;1856&quot; instrument_node=&quot;&quot;&gt;April March&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1854&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;as well as reverse-chronology films such as&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1852&quot;&gt;&lt;span data-dcnode-id=&quot;1853&quot; instrument_node=&quot;&quot;&gt;Memento&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1851&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;[2000] and &lt;/span&gt;&lt;em data-dcnode-id=&quot;1849&quot;&gt;&lt;span data-dcnode-id=&quot;1850&quot; instrument_node=&quot;&quot;&gt;Irreversible&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1848&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;[2002]). The first scene of the film, which shows a man waking up in the morning and telling a story to his wife about an eighteen year-old boy whose motorscooter collides with a car at an intersection late one night, actually occurs last, after the events within the other six episodes have transpired. His story is thus less a primal act of initiating filmic discourse than a retrospective account of just one of the many events that will assume deeper meanings only after the “what if”/”or not” section unfolds.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1846&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1844&quot;&gt;&lt;span data-dcnode-id=&quot;1845&quot; instrument_node=&quot;&quot;&gt;Significantly, the teenager involved in the traffic accident is given an opportunity to imagine numerous hypothetical futures for himself in that split second before the crash. As the storytelling husband explains to his wife toward the beginning of the film, “Everything freezes. Someone, not God, nor Heaven nor Providence, just someone freezes that eternal second prior to his brutal death.” A disembodied voice from above then asks the boy, “If you survive, what would you be?” Looking into the sky, the boy responds, “A multinational executive. No, a famous movie star. No, I’d be a multimillionaire, with a lot of people working for me.” At this point the voice asks, “Who would you like to live with?” The boy answers, “A young, pretty, sculptural and lewd blonde…A different one every two-to-three weeks.” When he is asked to describe his ideal home, the boy says, “A luxury apartment in town, a mansion with a private ski slope, a house on a tropical island.”&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1843&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1832&quot;&gt;&lt;span data-dcnode-id=&quot;1842&quot; instrument_node=&quot;&quot;&gt;Besides inspiring the wife of the storyteller to interject with the names “Frank Capra” (an allusion to the 1946 classic&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1840&quot;&gt;&lt;span data-dcnode-id=&quot;1841&quot; instrument_node=&quot;&quot;&gt;It’s a Wonderful Life&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1839&quot; instrument_node=&quot;&quot;&gt;) and “Charles Dickens” (whose&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1837&quot;&gt;&lt;span data-dcnode-id=&quot;1838&quot; instrument_node=&quot;&quot;&gt;A Christmas Carol&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1836&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;was another literary prototype of forked-path possibilities), these multiple answers to single questions remind us that the episode film – a narratological genre that is “polygamous” with its protagonists – is ideally equipped to give us many, if not all, possible futures. This is further underlined by the boy’s choice&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1834&quot;&gt;&lt;span data-dcnode-id=&quot;1835&quot; instrument_node=&quot;&quot;&gt;not to choose&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1833&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;any one of the futures that are briefly projected for him to see (leading up to either a “a rebellious, poetic, immediate death” or “a sweet death after seventy-five years of boredom and indifference”). This decision not to decide, however, simply results in his death by automobile collision, an outcome that is doubly ironic and synchronic given the fact that the man who is telling this story has a potentially deadly heart attack at that very moment.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1831&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1817&quot;&gt;&lt;span data-dcnode-id=&quot;1830&quot; instrument_node=&quot;&quot;&gt;Sandwiched between this first scene and the final scene of&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1828&quot;&gt;&lt;span data-dcnode-id=&quot;1829&quot; instrument_node=&quot;&quot;&gt;To Die (or not)&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1827&quot; instrument_node=&quot;&quot;&gt;, which returns us to the storyteller having a heart attack (only this time with him surviving, thanks to the efforts of his wife, who is a nurse), the remaining episodes veer wildly from meditative drama and outright tragedy to slapstick action and screwball romance. Taking us from [1] the married couple to [2] a drug addict and his interventionist sister to [3] an insufferable mother and her pre-teen daughter to [4] a nurse and her dying patient to [5] a depressed, suicidal woman and her offscreen son (the motorcyclist seen earlier) to [6] a red-light-running police officer and her male partner to [7] a hired killer and his wealthy target before reversing the order of those episodes in the “what if”/”or not” section (which shows the heretofore hidden linkages between these characters), the film provides disconcerting evidence that our lives often hang by a string, that “fate” can intervene when one least expects it and open up new paths toward not one but several futures. Perhaps what is most striking about this and similar motion pictures, such as&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1825&quot;&gt;&lt;span data-dcnode-id=&quot;1826&quot; instrument_node=&quot;&quot;&gt;Smoking/No Smoking&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1824&quot; instrument_node=&quot;&quot;&gt;, Alain Resnais’s double-barreled 1993 adaptation of Alan Ayckbourn’s renowned play “Intimate Exchanges” (which provides twelve different endings based on characters’ inability or ability to kick the nicotine habit), is that they actually&amp;nbsp;take&amp;nbsp;the “road not taken.” Such a premise furthermore recalls O. Henry’s 1909 short story “Roads of destiny” (made up of three possible futures faced by the poet-hero), Lord Dunsany’s 1921 play&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1822&quot;&gt;&lt;span data-dcnode-id=&quot;1823&quot; instrument_node=&quot;&quot;&gt;If&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1821&quot; instrument_node=&quot;&quot;&gt;, and, most recently, Ken Grimwood’s acclaimed 1986 novel&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1819&quot;&gt;&lt;span data-dcnode-id=&quot;1820&quot; instrument_node=&quot;&quot;&gt;Replay&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1818&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1816&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1805&quot;&gt;&lt;span data-dcnode-id=&quot;1815&quot; instrument_node=&quot;&quot;&gt;Like Dunsany’s play, both&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1813&quot;&gt;&lt;span data-dcnode-id=&quot;1814&quot; instrument_node=&quot;&quot;&gt;Blind Chance&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1812&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;(Krzysztof Kieslowski’s Polish-language progenitor of this cinematic trend) and&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1810&quot;&gt;&lt;span data-dcnode-id=&quot;1811&quot; instrument_node=&quot;&quot;&gt;Sliding Doors&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1809&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;(Peter Howitt’s English-language knockoff) hinge upon the iconography of departing trains. The question of whether or not the protagonists in these films catch their trains serves as a narrative catalyst, the crucial point of departure in depicting not one but potentially several outcomes. However, whereas &lt;/span&gt;&lt;em data-dcnode-id=&quot;1807&quot;&gt;&lt;span data-dcnode-id=&quot;1808&quot; instrument_node=&quot;&quot;&gt;Sliding Doors&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1806&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;is a romantic British comedy about two, rather than three or more, alternate realities involving socially mobile and physically beautiful men and women (presented in cross-cut fashion), Kieslowski’s tripartite film delves into philosophical questions about one’s fate in a troubled socialist bloc state where opposing political forces relentlessly vie for public and personal support.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1804&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1790&quot;&gt;&lt;span data-dcnode-id=&quot;1803&quot; instrument_node=&quot;&quot;&gt;After making&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1801&quot;&gt;&lt;span data-dcnode-id=&quot;1802&quot; instrument_node=&quot;&quot;&gt;Camera Buff&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1800&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;(&lt;/span&gt;&lt;em data-dcnode-id=&quot;1798&quot;&gt;&lt;span data-dcnode-id=&quot;1799&quot; instrument_node=&quot;&quot;&gt;Amator&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1797&quot; instrument_node=&quot;&quot;&gt;, 1979), a reflexive jab at factory corruption, and having already established the motif of men trying to catch departing trains and trams in his black-and-white shorts from the late-1960s, Kieslowski mounted&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1795&quot;&gt;&lt;span data-dcnode-id=&quot;1796&quot; instrument_node=&quot;&quot;&gt;Blind Chance,&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1794&quot; instrument_node=&quot;&quot;&gt; a film whose openly critical attitude toward Communism did not sit well with his government.&lt;/span&gt;&lt;a data-dcnode-id=&quot;1792&quot; href=&quot;#_edn11&quot;&gt;&lt;span data-dcnode-id=&quot;1793&quot; instrument_node=&quot;&quot;&gt;[11]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1791&quot; instrument_node=&quot;&quot;&gt; All three of the film’s episodes concern young medical student Witek Dlugosz as he faces different sets of obstacles in the politically volatile period of the late 1970s (leading up to the era of the free trade union known as Solidarity). After a dozen brief, fragmentary scenes play out during the film’s prologue – flashbacks showing key yet quotidian (perhaps even imaginary) moments in the protagonist’s life – the first episode begins.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1789&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1783&quot;&gt;&lt;span data-dcnode-id=&quot;1788&quot; instrument_node=&quot;&quot;&gt;His father recently deceased, Witek has impulsively decided to abandon his studies and set out on his own. The combined freedom and fear built into that decision is visually conveyed in the film’s most indelible scene, one that will be repeated twice more over the course of the cryptic triptych, with significantly different outcomes each time. Accompanied by composer Wojciech Kilar’s driving score, Witek dashes through a station, desperately attempting to catch a departing train bound for Warsaw. He bumps into an old woman and nearly collides with a disheveled man, yet he manages to grasp onto the handrail at the last possible moment and climb aboard the train. Not coincidentally, this scene recalls an early passage in Borges’s story “The garden of the forking paths,” when Yu Tsun, a self-proclaimed “connoisseur of mazes,” flees his adversary Captain Richard Madden at a station – the former just barely making it onto the departing train as the latter runs “vainly, out to the end of the platform,” but is unable to catch up.&lt;/span&gt;&lt;a data-dcnode-id=&quot;1786&quot; href=&quot;#_edn12&quot;&gt;&lt;span data-dcnode-id=&quot;1787&quot; instrument_node=&quot;&quot;&gt;[12]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1785&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a data-dcnode-id=&quot;1784&quot; name=&quot;_ednref12&quot;&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1782&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1780&quot;&gt;&lt;span data-dcnode-id=&quot;1781&quot; instrument_node=&quot;&quot;&gt;Aboard the train, Witek meets Werner, an idealistic and devoted Communist several years his senior who soon introduces him to a Party functionary, Adam, and convinces him to join. Another Party official sends the new recruit to a drug treatment hospital where a sit-in demonstration is taking place. A pawn in a political game that could have dire consequences, Witek has been asked to act as an intermediary between the politburo’s functionaries and the young dissidents, who have staged a mutiny at the hospital and taken three doctors sent by the Party as prisoners. Ultimately, Witek succeeds in rescuing the three workers from their gasoline-soaked cage, but fails to win the love of his one-time girlfriend Czuszka, with whom he has been reunited. Czuzska, a dissident herself, is arrested by the Polish Secret Service toward the end of this episode, apparently because Adam has learned of her underground activities through his association with Witek. The episode ends with our disillusioned apparatchik and other members of the Party preparing to board a plane to Paris, only to learn that – because Solidarity strikes have broken out across Poland – they will not be able to leave the country as planned.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1779&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1777&quot;&gt;&lt;span data-dcnode-id=&quot;1778&quot; instrument_node=&quot;&quot;&gt;At this point – the fifty-five minute mark, nearly midway through the film – Kieslowski returns us to the train station and replays Witek’s mad dash down the platform to the same musical accompaniment. This marks the beginning of the second episode, which explores what Witek’s life might have amounted to had he missed the train and become a member of the anti-Communist underground student movement. Having been arrested after getting into a scuffle with a station guard, he is sentenced to a work brigade, performing thirty days of community service planting flowers at a large estate. One of the members of the work brigade, Marek, is a political dissident who – like Werner in the first episode – convinces Witek to side with him. Besides dedicating himself to the cause and running the secret printing press used to disseminate&amp;nbsp;samizdat&amp;nbsp;leaflets and other illegal literature, Witek surrenders himself to God, becoming baptized into the Christian faith after meeting one of Marek’s associates, a wheelchair-bound priest named Stefan. He also falls under the spell of Vera, a married Jewish woman whose brother Witek had known during the student uprisings of the late 1960s. This episode ends much like the first one: Witek is set to take a flight to Paris, where a Catholic Youth Conference will be held, but is denied a visa because he did not provide the government with the names of his agitator friends.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1776&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1774&quot;&gt;&lt;span data-dcnode-id=&quot;1775&quot; instrument_node=&quot;&quot;&gt;Once again, the film recapitulates the train station scene. And once again, Witek misses his train. Only this time, no fisticuffs with the guard ensue. Instead, Olga, his current love interest who was waiting at the station, convinces him to pursue a medical career. Succumbing at last to his dead father’s wishes, Witek dedicates his life to his new wife and child as well as to his work in medicine. With contentment, however, comes complacency. As an avowed “non-believer,” he steers clear not only of religion but also of the many recruiters vying for his allegiance. Members of both the dissident group and the Party approach him, but he steadfastly refuses to join either of the two. He does, however, accept an offer by the medical school’s Dean to attend a surgeon’s conference in Libya. When Witek arrives at the airport on his way to Paris, Kieslowski cuts to various people in the crowd whom viewers will remember from the preceding episodes.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1773&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1741&quot;&gt;&lt;span data-dcnode-id=&quot;1772&quot; instrument_node=&quot;&quot;&gt;This decision by the filmmaker to link the three divergent tales in such a way suggests a metaphysical synchronicity, something fans of Kieslowski’s chromatic trilogy –&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1770&quot;&gt;&lt;span data-dcnode-id=&quot;1771&quot; instrument_node=&quot;&quot;&gt;Blue&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1769&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;(&lt;/span&gt;&lt;em data-dcnode-id=&quot;1767&quot;&gt;&lt;span data-dcnode-id=&quot;1768&quot; instrument_node=&quot;&quot;&gt;Bleu&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1766&quot; instrument_node=&quot;&quot;&gt;, 1993),&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1764&quot;&gt;&lt;span data-dcnode-id=&quot;1765&quot; instrument_node=&quot;&quot;&gt;White&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1763&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;(&lt;/span&gt;&lt;em data-dcnode-id=&quot;1761&quot;&gt;&lt;span data-dcnode-id=&quot;1762&quot; instrument_node=&quot;&quot;&gt;Blanc&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1760&quot; instrument_node=&quot;&quot;&gt;, 1994) and &lt;/span&gt;&lt;em data-dcnode-id=&quot;1758&quot;&gt;&lt;span data-dcnode-id=&quot;1759&quot; instrument_node=&quot;&quot;&gt;Red&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1757&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;(&lt;/span&gt;&lt;em data-dcnode-id=&quot;1755&quot;&gt;&lt;span data-dcnode-id=&quot;1756&quot; instrument_node=&quot;&quot;&gt;Rouge&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1754&quot; instrument_node=&quot;&quot;&gt;, 1994) – not to mention the more elliptical&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1749&quot;&gt;&lt;span data-dcnode-id=&quot;1753&quot; instrument_node=&quot;&quot;&gt;The Double Life of Veronique&amp;nbsp;(&lt;/span&gt;&lt;em data-dcnode-id=&quot;1751&quot;&gt;&lt;span data-dcnode-id=&quot;1752&quot; instrument_node=&quot;&quot;&gt;La double vie de Véronique&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1750&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1748&quot; instrument_node=&quot;&quot;&gt;1991) have come to appreciate as an authorial staple. Each of&lt;/span&gt;&lt;em data-dcnode-id=&quot;1743&quot;&gt;&lt;span data-dcnode-id=&quot;1747&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1745&quot;&gt;&lt;span data-dcnode-id=&quot;1746&quot; instrument_node=&quot;&quot;&gt;Blind Chance&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1744&quot; instrument_node=&quot;&quot;&gt;‘&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1742&quot; instrument_node=&quot;&quot;&gt;s three stories culminates with the possibility of flight, but only this third episode shows Witek successfully boarding the plane (which is bound for Libya via Paris). However, as foretold by the dean, Witek’s first trip abroad will also be his last. Upon takeoff, the jet airliner bursts into flames, bringing an explosive end to an otherwise understated film. The image of the mid-air explosion provides an important clue about a heretofore-unclear section of the film. At the beginning of the prologue, Witek unleashes a kind of primal scream while seated, one presumes, in a plane. After the camera dollies forward into the darkness of his throat, the inexplicable image of him shrieking gives way to a shot of casualties being brought into an emergency room. Such a presumption may be correct, for in retrospect (after having seen the film’s final moments) those early images appear to be a result of the explosion. If this is the case, then the film’s forked-path presentation of multiple possibilities circles back to the beginning in a way that recalls&amp;nbsp;Dead of Night&amp;nbsp;and other cyclical narratives.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1740&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1734&quot;&gt;&lt;span data-dcnode-id=&quot;1739&quot; instrument_node=&quot;&quot;&gt;In his thorough delineation of conventions found in forking path (or “multiple draft”) narratives, David Bordwell discusses this cyclical structure, which he argues privileges the final future, the only one of the three to end with an airplane explosion. However, such a reading – while entirely plausible – takes on faith the possibility that Witek, or anyone else for that matter, could have survived an explosion that might just as likely have left his body beyond repair, a ravaged, unsalvageable remnant of his former self. Bordwell is fundamentally right, though, not only in arguing that diverging paths typically adhere to “a strict line of cause and effect” (with no further branching or bifurcation after the initial fork), but also in pinpointing both the “primacy effect” that results when the first episode “shapes our expectations about what follows” and the “recency effect” that occurs when the last episode “modifies our understanding of what went before.”&lt;/span&gt;&lt;a data-dcnode-id=&quot;1737&quot; href=&quot;#_edn13&quot;&gt;&lt;span data-dcnode-id=&quot;1738&quot; instrument_node=&quot;&quot;&gt;[13]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1736&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a data-dcnode-id=&quot;1735&quot; name=&quot;_ednref13&quot;&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1733&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1725&quot;&gt;&lt;span data-dcnode-id=&quot;1732&quot; instrument_node=&quot;&quot;&gt;It would seem, then, that there are&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1730&quot;&gt;&lt;span data-dcnode-id=&quot;1731&quot; instrument_node=&quot;&quot;&gt;two&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1729&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;episodes, rather than one, being favored in&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1727&quot;&gt;&lt;span data-dcnode-id=&quot;1728&quot; instrument_node=&quot;&quot;&gt;Blind Chance&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1726&quot; instrument_node=&quot;&quot;&gt;: the first for establishing “a benchmark” that sets down “the conditions that will be repeated, varied, omitted, or negated in subsequent versions,” and the last for being the “final draft, the one that ‘really’ happened.” The middle section would thus appear to be less consequential than the others, given the weight of those bookending episodes. Nevertheless, it yields as much important information about Witek’s personality as the other episodes, information that filters into the surrounding scenes (especially those involving either one of the three different women with whom he forms relationships: Czuszka, Vera, and Olga) and colors how we feel about his death at the end.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1724&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1713&quot;&gt;&lt;span data-dcnode-id=&quot;1723&quot; instrument_node=&quot;&quot;&gt;Like John Fowles’s 1969 novel&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1721&quot;&gt;&lt;span data-dcnode-id=&quot;1722&quot; instrument_node=&quot;&quot;&gt;The French Lieutenant’s Woman&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1720&quot; instrument_node=&quot;&quot;&gt;, Kieslowski’s&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1718&quot;&gt;&lt;span data-dcnode-id=&quot;1719&quot; instrument_node=&quot;&quot;&gt;Blind Chance&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1717&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;has three different endings. However, only one – the last – has a real sense of finality, due not only to the airplane explosion but also to the fact that it coincides with the end of the film. This hermeneutic privileging of the final episode suggests that it is more “real” than the others; that it retroactively consigns Witek’s political involvement and dissident action in the preceding episodes to the realm of the imaginary and hypothetical (whereas noninvolvement and apathy become the&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1715&quot;&gt;&lt;span data-dcnode-id=&quot;1716&quot; instrument_node=&quot;&quot;&gt;sine quon non&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1714&quot; instrument_node=&quot;&quot;&gt;). Paradoxically, these three separate narratives are arranged in a linear yet reiterative fashion, their sequential ordering suggesting an emotional maturation and psychological development on the part of Witek. However, we see that, in retreating from politics and withdrawing into an uncomplicated domestic life and private profession, Witek has regressed to a more sanitized and distant point in his life, one that is ironically brought to a premature end by an explosion (which may or may not be an act of terrorism, one can only guess – hence the non-conclusive conclusion). Nevertheless, these episodes do not really cancel one another out, at least not in the memory of the spectator. Instead, they collectively add up to an evocative portrait of the main character’s complex personality.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1712&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;1711&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;1710&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;1709&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;1706&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;span data-dcnode-id=&quot;1686&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;1684&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;table border=&quot;0&quot; data-dcnode-id=&quot;1683&quot; width=&quot;600&quot;&gt;&lt;tbody data-dcnode-id=&quot;1685&quot;&gt;&lt;tr data-dcnode-id=&quot;1699&quot;&gt;&lt;td data-dcnode-id=&quot;1707&quot;&gt;&lt;img alt=&quot;&quot; class=&quot;alignnone size-full wp-image-11408 colorbox-6268&quot; data-dcnode-id=&quot;1708&quot; height=&quot;132&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//www.screeningthepast.com/wp-content/uploads/2014/12/blind-chance-1.jpg&amp;amp;raw&quot; title=&quot;blind-chance-1&quot; width=&quot;202&quot;&gt;&lt;/td&gt;&lt;td data-dcnode-id=&quot;1704&quot;&gt;&lt;img alt=&quot;&quot; class=&quot;alignnone size-full wp-image-11409 colorbox-6268&quot; data-dcnode-id=&quot;1705&quot; height=&quot;132&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//www.screeningthepast.com/wp-content/uploads/2014/12/blind-chance-2.jpg&amp;amp;raw&quot; title=&quot;blind-chance-2&quot; width=&quot;202&quot;&gt;&lt;/td&gt;&lt;td data-dcnode-id=&quot;1701&quot;&gt;&lt;img alt=&quot;&quot; class=&quot;alignnone size-full wp-image-11410 colorbox-6268&quot; data-dcnode-id=&quot;1702&quot; height=&quot;132&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//www.screeningthepast.com/wp-content/uploads/2014/12/blind-chance-3.jpg&amp;amp;raw&quot; title=&quot;blind-chance-3&quot; width=&quot;202&quot;&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;1687&quot;&gt;&lt;td data-dcnode-id=&quot;1695&quot; style=&quot;text-align: center;&quot;&gt;&lt;span data-dcnode-id=&quot;1696&quot; instrument_node=&quot;&quot;&gt;Figure 1&lt;/span&gt;&lt;/td&gt;&lt;td data-dcnode-id=&quot;1692&quot; style=&quot;text-align: center;&quot;&gt;&lt;span data-dcnode-id=&quot;1693&quot; instrument_node=&quot;&quot;&gt;Figure 2&lt;/span&gt;&lt;/td&gt;&lt;td data-dcnode-id=&quot;1689&quot; style=&quot;text-align: center;&quot;&gt;&lt;span data-dcnode-id=&quot;1690&quot; instrument_node=&quot;&quot;&gt;Figure 3&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;/tbody&gt;&lt;/table&gt;&lt;span data-dcnode-id=&quot;1682&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1675&quot;&gt;&lt;span data-dcnode-id=&quot;1681&quot; instrument_node=&quot;&quot;&gt;Aiding our attempts to draw out thematic and stylistic comparisons among the three stories is Kieslowski’s use of specific visual motifs, which carry over from one episode to the next. Besides each episode’s foregrounding of surrogate fathers, mentor figures, romantic partners, passports, illegal literature, secret meetings, and the threat of insurgency, certain images and character movements are repeated.&lt;/span&gt;&lt;a data-dcnode-id=&quot;1679&quot; href=&quot;#_edn14&quot;&gt;&lt;span data-dcnode-id=&quot;1680&quot; instrument_node=&quot;&quot;&gt;[14]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1678&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a data-dcnode-id=&quot;1677&quot; name=&quot;_ednref14&quot;&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1676&quot; instrument_node=&quot;&quot;&gt; For instance, the curved motion of a Slinky toy descending Werner’s staircase in episode one is later evoked in the rainbow-like arc of the dozen or so balls being juggled by two men in episode three. Each of the episodes, besides showing Witek running (not only for the train, but also for the bus and other people), includes a shot of him slumping to the ground out of shock and resignation: first when Czuszka is picked up by police and taken away [Figure 1]; then when the underground printing press is confiscated by the authorities [Figure 2]; and finally when he learns that Olga, his bride-to-be, is three-months pregnant [Figure 3]. This repeated image of Witek’s knees buckling once again complicates any sense of emotional maturation, suggesting that he is retreating each time into a near-fetal position.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1674&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1667&quot;&gt;&lt;span data-dcnode-id=&quot;1673&quot; instrument_node=&quot;&quot;&gt;Narrative possibilities in&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1671&quot;&gt;&lt;span data-dcnode-id=&quot;1672&quot; instrument_node=&quot;&quot;&gt;Blind Chance&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1670&quot; instrument_node=&quot;&quot;&gt;:&lt;/span&gt;&lt;br data-dcnode-id=&quot;1669&quot;&gt;&lt;span data-dcnode-id=&quot;1668&quot; instrument_node=&quot;&quot;&gt;
A visual description of realized and unrealized plotlines (title for diagram)&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1666&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1654&quot;&gt;&lt;a class=&quot;cboxElement&quot; data-dcnode-id=&quot;1662&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//www.screeningthepast.com/wp-content/uploads/2014/12/blind-chance-graph.jpg&quot; rel=&quot;lightbox[6268]&quot; title=&quot;blind-chance-graph&quot;&gt;&lt;img alt=&quot;&quot; class=&quot;alignnone size-full wp-image-11411 colorbox-6268&quot; data-dcnode-id=&quot;1665&quot; height=&quot;319&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//www.screeningthepast.com/wp-content/uploads/2014/12/blind-chance-graph.jpg&amp;amp;raw&quot; title=&quot;blind-chance-graph&quot; width=&quot;450&quot;&gt;&lt;br data-dcnode-id=&quot;1664&quot;&gt;&lt;span data-dcnode-id=&quot;1663&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1661&quot; instrument_node=&quot;&quot;&gt;Figure 4: This simplistic rendering of the actual and possible bifurcations present in&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1659&quot;&gt;&lt;span data-dcnode-id=&quot;1660&quot; instrument_node=&quot;&quot;&gt;Blind Chance&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1658&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;is designed to illustrate the fact that forking paths may lead to consequences that intersect or run parallel, yet rarely provide additional forks in the road. Nevertheless, while those imbedded departure points are rarely explored/exploited after the initial bifurcation, they exist as &lt;/span&gt;&lt;em data-dcnode-id=&quot;1656&quot;&gt;&lt;span data-dcnode-id=&quot;1657&quot; instrument_node=&quot;&quot;&gt;possibilities&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1655&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;in the spectator’s mind, stimulated as the latter is by the prospects of (unfulfilled) infinity. (description of diagram)&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1653&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1648&quot;&gt;&lt;span data-dcnode-id=&quot;1652&quot; instrument_node=&quot;&quot;&gt;As the above graph illustrates, Kieslowski may provide us with three separate scenarios tracing out Witek’s immediate future, but he does not show the many potential narratives that could have been spun out from other critical junctures or decision-making crossroads&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1650&quot;&gt;&lt;span data-dcnode-id=&quot;1651&quot; instrument_node=&quot;&quot;&gt;within the three episodes&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1649&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;[Figure 4]. As illustrated by the broken arrows, these plot potentials must be dispensed with offscreen and in the imagination of the spectator due to the temporal limitations of the feature-length film as well as the artistic decisions made by the filmmaker, who opted to follow not the infinite possibilities of narrative (an impossible, only hypothetically posed venture regardless) but simply the three linear paths toward either death, deadlock, or indifference (itself indicative of moral decay). Instead, Kieslowski cedes that task to the audience, who may wonder, for instance, what might have happened had Witek intervened as the police were taking Czuzska away in episode one (indicated in the above graph by the letter “a”). What might have been the outcome had Witek decided not to visit a woman in episode two – the devout Christian to whom he delivers a payment of 7000 zlotys and who unwittingly sends him on his spiritual quest (“b”)? Had Witek not agreed to stay on at the Academy (as suggested by the Dean), would his life have taken a less deadly turn (“c”)?&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1647&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1624&quot;&gt;&lt;span data-dcnode-id=&quot;1646&quot; instrument_node=&quot;&quot;&gt;Each episode finds Witek being forced to make significant decisions that will have an impact on the rest of his life, whether it is choosing to climb down the terrace of the hospital with the medical staff he rescued in episode one, or opting to fill in for the Dean at a conference to be held in Libya. Unlike Ts’ui Pen’s labyrinthine manuscript in “The Garden of Forking Paths,” a contradictory collection of tales in which&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1644&quot;&gt;&lt;span data-dcnode-id=&quot;1645&quot; instrument_node=&quot;&quot;&gt;all&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1643&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;the possible outcomes occur,&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1641&quot;&gt;&lt;span data-dcnode-id=&quot;1642&quot; instrument_node=&quot;&quot;&gt;Blind Chance&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1640&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;can only&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1638&quot;&gt;&lt;span data-dcnode-id=&quot;1639&quot; instrument_node=&quot;&quot;&gt;gesture towards&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1637&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;rather than&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1635&quot;&gt;&lt;span data-dcnode-id=&quot;1636&quot; instrument_node=&quot;&quot;&gt;contain&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1634&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;infinity through its episodic emplotment of three narrative possibilities. Although Kieslowski expressed dissatisfaction with the resulting film (a feeling that he attributed to his own script’s “flaws”),&lt;/span&gt;&lt;a data-dcnode-id=&quot;1632&quot; href=&quot;#_edn15&quot;&gt;&lt;span data-dcnode-id=&quot;1633&quot; instrument_node=&quot;&quot;&gt;[15]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1631&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a data-dcnode-id=&quot;1630&quot; name=&quot;_ednref15&quot;&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1629&quot; instrument_node=&quot;&quot;&gt; few other works lay out so starkly the role of fate and destiny in shaping one’s existence. The major questions this film raises have to do with chance, determinism and freedom of choice, three contending factors in a person’s life that are nevertheless consolidated at the end. Despite the different situational contexts in which we find ourselves, all roads lead to one destination: death. This is what Kieslowski himself found most appealing about the film, saying, “The third ending is the one which means the most to me – the one where the aeroplane explodes – because one way or another, that’s going to be our fate. It’s all the same whether this happens in an aeroplane or in bed, it doesn’t matter.” &lt;/span&gt;&lt;a data-dcnode-id=&quot;1627&quot; href=&quot;#_edn16&quot;&gt;&lt;span data-dcnode-id=&quot;1628&quot; instrument_node=&quot;&quot;&gt;[16]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1626&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a data-dcnode-id=&quot;1625&quot; name=&quot;_ednref16&quot;&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1623&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1603&quot;&gt;&lt;span data-dcnode-id=&quot;1622&quot; instrument_node=&quot;&quot;&gt;Predestination is similarly highlighted in another forked-path film, albeit with less fatalistic overtones.&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1620&quot;&gt;&lt;span data-dcnode-id=&quot;1621&quot; instrument_node=&quot;&quot;&gt;Run Lola Run&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1619&quot; instrument_node=&quot;&quot;&gt;, a critically and commercially successful German-language production directed by Tom Tykwer, begins with the swinging of a pendulum and the speaking of the words, “The ball is round, the game lasts ninety minutes.” &lt;/span&gt;&lt;a data-dcnode-id=&quot;1617&quot; href=&quot;#_edn17&quot;&gt;&lt;span data-dcnode-id=&quot;1618&quot; instrument_node=&quot;&quot;&gt;[17]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1616&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a data-dcnode-id=&quot;1615&quot; name=&quot;_ednref17&quot;&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1614&quot; instrument_node=&quot;&quot;&gt; The ludic aspects of the text are on display in each of its three successive episodes, which find a twentysomething woman racing against the clock to save her boyfriend who lost 100,000 deutsche marks on the U-Bahn (payment for a smuggling job that he was to deliver to a drug lord). Indeed, the first of Lola’s sprints through Berlin to her father’s bank comes after a printed epigraph (attributed to a World Cup-winning soccer coach from Germany, S. Herberger) appears onscreen, reading “Nach dem Spiel ist vor dem Spiel.” Translated as “After the game is before the game,” these words not only prepare the audience for subsequent images of a roulette wheel and the pinball-like action of the heroine, but also indicate the termporal paradox at the heart of most cyclical and forked-path narratives in which one episode begins as soon as another has ended (leaving, at least in this breathless film about deadlines, “hardly a pause, and even the pause is preparation for the next game”).&lt;/span&gt;&lt;a data-dcnode-id=&quot;1612&quot; href=&quot;#_edn18&quot;&gt;&lt;span data-dcnode-id=&quot;1613&quot; instrument_node=&quot;&quot;&gt;[18]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1611&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a data-dcnode-id=&quot;1610&quot; name=&quot;_ednref18&quot;&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1609&quot; instrument_node=&quot;&quot;&gt; Insfoar as Lola’s first two failures allow “for the continuity of play,” then, as Jamie Skye Bianco points out, losing the game ironically becomes a form of “winning,” one that “is not equivalent to psychoanalytic lack” but rather is indicative of memory’s “fullness” in terms of “what has already occurred, what is perceptually present and what is virtually to come.” &lt;/span&gt;&lt;a data-dcnode-id=&quot;1607&quot; href=&quot;#_edn19&quot;&gt;&lt;span data-dcnode-id=&quot;1608&quot; instrument_node=&quot;&quot;&gt;[19]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1606&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a data-dcnode-id=&quot;1605&quot; name=&quot;_ednref19&quot;&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1604&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;Only at the end, once Lola has “won,” does a sense of “permanent loss” intrude upon the film’s ludic maneuvers.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1602&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1589&quot;&gt;&lt;span data-dcnode-id=&quot;1601&quot; instrument_node=&quot;&quot;&gt;As Slavoj Zizek remarks, the three narratives comprising the film, each lasting roughly twenty-five minutes and driven by a techno-ambient soundscape combining adrenaline-pumping backbeat and the crimson-haired heroine’s heartbeat, emulate the existential coordinates and formal characteristics of the typical “survival video game.” Blessed with three expendable “lives,” Lola experiences the present as a potentially erasable set of actions that can be redone. Zizek emphasizes that, however visually and aurally dissimilar&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1599&quot;&gt;&lt;span data-dcnode-id=&quot;1600&quot; instrument_node=&quot;&quot;&gt;Run Lola Run&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1598&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;and &lt;/span&gt;&lt;em data-dcnode-id=&quot;1596&quot;&gt;&lt;span data-dcnode-id=&quot;1597&quot; instrument_node=&quot;&quot;&gt;Blind Chance&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1595&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;are in terms of their stylistic and tonal properties, the two films’ “formal matrix is the same.” He elaborates: “[I]n both cases, one can interpret the film as if only the third story is the ‘real’ one, the other two staging the fantasmatic price the subject has to pay for the ‘real’ outcome.”&lt;/span&gt;&lt;a data-dcnode-id=&quot;1593&quot; href=&quot;#_edn20&quot;&gt;&lt;span data-dcnode-id=&quot;1594&quot; instrument_node=&quot;&quot;&gt;[20]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1592&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a data-dcnode-id=&quot;1591&quot; name=&quot;_ednref20&quot;&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1590&quot; instrument_node=&quot;&quot;&gt;There is a difference, though: In Tykwer’s film, the first episode ends with the death of Lola’s boyfriend (he is run down), the second with her own death (she is shot), and the third with her successful accretion of 100,000 German Marks capped by a happy ending in which boyfriend and girlfriend – noticeably more mature than she had appeared in the previous two episodes (as if she has learned from past mistakes) – reunite.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1588&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1580&quot;&gt;&lt;span data-dcnode-id=&quot;1587&quot; instrument_node=&quot;&quot;&gt;This rather traditional dénouement to an otherwise unconventional set of narrative possibilities stands in marked contrast to the conclusively non-conclusive and fatalistic ending of&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1585&quot;&gt;&lt;span data-dcnode-id=&quot;1586&quot; instrument_node=&quot;&quot;&gt;Blind Chance&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1584&quot; instrument_node=&quot;&quot;&gt;, which literally explodes the potential for additional stories yet, like the scattered fragments of the plane, leaves certain unanswered questions in the air. Thus, while&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1582&quot;&gt;&lt;span data-dcnode-id=&quot;1583&quot; instrument_node=&quot;&quot;&gt;Run Lola Run&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1581&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;playfully engages the theme of death and ranges wider in its deployment of multiple film stocks, digital manipulation, animation, and other stylistic flourishes, Kieslowski’s film plunges deeper into the underlying ambiguities of a cinematic form that is well suited to elucidate multiple viewpoints and contradictory attitudes about a given nation’s sociopolitical system or its citizens’ ethical beliefs.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1579&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1576&quot;&gt;&lt;strong data-dcnode-id=&quot;1577&quot;&gt;&lt;span data-dcnode-id=&quot;1578&quot; instrument_node=&quot;&quot;&gt;Run Zizek Run: Episodic Criticism&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1575&quot; instrument_node=&quot;&quot;&gt;
