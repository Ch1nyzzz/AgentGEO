&lt;/span&gt;&lt;p data-dcnode-id=&quot;124&quot;&gt;&lt;a data-dcnode-id=&quot;996&quot; href=&quot;#_ednref1&quot;&gt;&lt;span data-dcnode-id=&quot;997&quot; instrument_node=&quot;&quot;&gt;[1]&lt;/span&gt;&lt;/a&gt;&lt;a data-dcnode-id=&quot;995&quot; name=&quot;_edn1&quot;&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;994&quot; instrument_node=&quot;&quot;&gt; Because the word “if,” a conjunction denoting “in the event that” or “on the condition that,” immediately brings to mind the possibility of numerous possibilities, it gestures toward the multiplicity of episode films in general; hence its frequent appearance in the titles of such anthology and omnibus productions as&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;992&quot;&gt;&lt;span data-dcnode-id=&quot;993&quot; instrument_node=&quot;&quot;&gt;If I had a million&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;991&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;(1932),&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;989&quot;&gt;&lt;span data-dcnode-id=&quot;990&quot; instrument_node=&quot;&quot;&gt;If you love me&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;988&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;(&lt;/span&gt;&lt;em data-dcnode-id=&quot;986&quot;&gt;&lt;span data-dcnode-id=&quot;987&quot; instrument_node=&quot;&quot;&gt;Aisureba koso&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;985&quot; instrument_node=&quot;&quot;&gt;, 1955),&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;983&quot;&gt;&lt;span data-dcnode-id=&quot;984&quot; instrument_node=&quot;&quot;&gt;If these walls could talk&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;982&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;(1996), and&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;980&quot;&gt;&lt;span data-dcnode-id=&quot;981&quot; instrument_node=&quot;&quot;&gt;If you were me&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;979&quot; instrument_node=&quot;&quot;&gt;(&lt;/span&gt;&lt;em data-dcnode-id=&quot;977&quot;&gt;&lt;span data-dcnode-id=&quot;978&quot; instrument_node=&quot;&quot;&gt;Yosotgae ui sison&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;976&quot; instrument_node=&quot;&quot;&gt;, 2003).&lt;/span&gt;&lt;br data-dcnode-id=&quot;975&quot;&gt;&lt;span data-dcnode-id=&quot;974&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;a data-dcnode-id=&quot;972&quot; href=&quot;#_ednref2&quot;&gt;&lt;span data-dcnode-id=&quot;973&quot; instrument_node=&quot;&quot;&gt;[2]&lt;/span&gt;&lt;/a&gt;&lt;a data-dcnode-id=&quot;971&quot; name=&quot;_edn2&quot;&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;970&quot; instrument_node=&quot;&quot;&gt; &amp;nbsp;Consider, for instance, the French OuLiPo (&lt;/span&gt;&lt;em data-dcnode-id=&quot;968&quot;&gt;&lt;span data-dcnode-id=&quot;969&quot; instrument_node=&quot;&quot;&gt;Ouvroir de Littérature Potentielle&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;967&quot; instrument_node=&quot;&quot;&gt;), a metafiction group whose members included authors Georges Perec and Raymond Queneau.&lt;/span&gt;&lt;br data-dcnode-id=&quot;966&quot;&gt;&lt;span data-dcnode-id=&quot;965&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;a data-dcnode-id=&quot;963&quot; href=&quot;#_ednref3&quot;&gt;&lt;span data-dcnode-id=&quot;964&quot; instrument_node=&quot;&quot;&gt;[3]&lt;/span&gt;&lt;/a&gt;&lt;a data-dcnode-id=&quot;962&quot; name=&quot;_edn3&quot;&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;961&quot; instrument_node=&quot;&quot;&gt; Jorge Luís Borges, “The garden of the forking paths,”&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;959&quot;&gt;&lt;span data-dcnode-id=&quot;960&quot; instrument_node=&quot;&quot;&gt;Collected Fictions&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;958&quot; instrument_node=&quot;&quot;&gt;, trans. Andrew Hurley (New York: Viking Penguin, 1998), 122.&lt;/span&gt;&lt;br data-dcnode-id=&quot;957&quot;&gt;&lt;span data-dcnode-id=&quot;956&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;a data-dcnode-id=&quot;954&quot; href=&quot;#_ednref4&quot;&gt;&lt;span data-dcnode-id=&quot;955&quot; instrument_node=&quot;&quot;&gt;[4]&lt;/span&gt;&lt;/a&gt;&lt;a data-dcnode-id=&quot;953&quot; name=&quot;_edn4&quot;&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;952&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;Borges, 124.&lt;/span&gt;&lt;br data-dcnode-id=&quot;951&quot;&gt;&lt;span data-dcnode-id=&quot;950&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;a data-dcnode-id=&quot;948&quot; href=&quot;#_ednref5&quot;&gt;&lt;span data-dcnode-id=&quot;949&quot; instrument_node=&quot;&quot;&gt;[5]&lt;/span&gt;&lt;/a&gt;&lt;a data-dcnode-id=&quot;947&quot; name=&quot;_edn5&quot;&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;946&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;em data-dcnode-id=&quot;944&quot;&gt;&lt;span data-dcnode-id=&quot;945&quot; instrument_node=&quot;&quot;&gt;Dead of Night&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;943&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;was also prefigured by a much earlier flashback-filled British film,&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;941&quot;&gt;&lt;span data-dcnode-id=&quot;942&quot; instrument_node=&quot;&quot;&gt;Friday the Thirteenth&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;940&quot; instrument_node=&quot;&quot;&gt;(1933). This Gainsborough production directed by Victor Saville features a&amp;nbsp;Grand Gotel-style gathering of the studio’s top stars, several of whom take center stage in suspenseful vignettes connected by a London bus crash.&lt;/span&gt;&lt;br data-dcnode-id=&quot;939&quot;&gt;&lt;span data-dcnode-id=&quot;938&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;a data-dcnode-id=&quot;936&quot; href=&quot;#_ednref6&quot;&gt;&lt;span data-dcnode-id=&quot;937&quot; instrument_node=&quot;&quot;&gt;[6]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;935&quot; instrument_node=&quot;&quot;&gt; The double motif personified by the antagonistic Dr. von Straaten and Walter Craig in&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;931&quot;&gt;&lt;em data-dcnode-id=&quot;933&quot;&gt;&lt;span data-dcnode-id=&quot;934&quot; instrument_node=&quot;&quot;&gt;Dead of Night&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;932&quot; instrument_node=&quot;&quot;&gt;‘s &lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;930&quot; instrument_node=&quot;&quot;&gt;frame story spreads throughout each of the five embedded tales (directed by Alberto Cavalcanti, Charles Crichton, Basil Dearden, and Robert Hamer), with characters therein finding themselves reflected by doppelgangers of sorts.&lt;/span&gt;&lt;br data-dcnode-id=&quot;929&quot;&gt;&lt;span data-dcnode-id=&quot;928&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;a data-dcnode-id=&quot;926&quot; href=&quot;#_ednref7&quot;&gt;&lt;span data-dcnode-id=&quot;927&quot; instrument_node=&quot;&quot;&gt;[7]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;925&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;Borges, 125.&lt;/span&gt;&lt;em data-dcnode-id=&quot;922&quot;&gt;&lt;br data-dcnode-id=&quot;924&quot;&gt;&lt;span data-dcnode-id=&quot;923&quot; instrument_node=&quot;&quot;&gt;

o polar&lt;/span&gt;&lt;/em&gt;&lt;/em&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;878&quot; instrument_node=&quot;&quot;&gt;, 1998) and&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;873&quot;&gt;&lt;em data-dcnode-id=&quot;874&quot;&gt;&lt;em data-dcnode-id=&quot;876&quot;&gt;&lt;span data-dcnode-id=&quot;877&quot; instrument_node=&quot;&quot;&gt;Twice Upon a Yesterday&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;875&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;(&lt;/span&gt;&lt;/em&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;872&quot; instrument_node=&quot;&quot;&gt;1998).&lt;/span&gt;&lt;br data-dcnode-id=&quot;871&quot;&gt;&lt;span data-dcnode-id=&quot;870&quot; instrument_node=&quot;&quot;&gt;

ortant date: December 4th; etc.), but also suggests that what the film has to say about interpersonal relationships cannot be divorced from its commentary on social and cultural schisms, rendered through a repetitive foregrounding of difference at semantic and syntactic, textual and extratextual, levels.&lt;/span&gt;&lt;br data-dcnode-id=&quot;835&quot;&gt;&lt;span data-dcnode-id=&quot;834&quot; instrument_node=&quot;&quot;&gt;
