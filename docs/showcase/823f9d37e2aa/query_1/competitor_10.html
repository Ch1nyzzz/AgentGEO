&lt;/span&gt;&lt;p data-dcnode-id=&quot;1567&quot;&gt;&lt;span data-dcnode-id=&quot;1574&quot; instrument_node=&quot;&quot;&gt;In the series of images that follows Witek’s presumably mid-air primal scream (a prolonged “No!”) at the beginning of&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1572&quot;&gt;&lt;span data-dcnode-id=&quot;1573&quot; instrument_node=&quot;&quot;&gt;Blind Chance&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1571&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;and precedes his first attempt to catch the departing train, the woman whom we will later come to know as Olga watches the dissection of her former teacher at the medical school that she and Witek attend. As the knife slits the skin and opens up the woman’s body for all to see, Olga becomes visibly shaken and leaves the room. Although she does not particularly care for her teacher, Olga feels that she herself is being cut up – a sentiment that she later shares with Witek in the third episode. As much as this act of corporeal incision reverberates with this secondary character’s internal conflicts, it suggests even greater implications for the body of the cinematic text, which not only is cut up into three separate sections but also has been the subject of much critical dissection. Perhaps no one has been as penetrating yet discursive in his examination of the film as Slavoj Zizek, author of&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1569&quot;&gt;&lt;span data-dcnode-id=&quot;1570&quot; instrument_node=&quot;&quot;&gt;The Fright of Real Tears: Krzysztof Kieslowski Between Theory and Post-Theory&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1568&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1566&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1543&quot;&gt;&lt;span data-dcnode-id=&quot;1565&quot; instrument_node=&quot;&quot;&gt;In the fifth chapter of this Marxist-Lacanian investigation of suture and cinematic materialism, titled “Run Witek Run,” the skeptical Slovenian theorist argues that, according to the deterministic logic of the narrative, “Witek &lt;/span&gt;&lt;em data-dcnode-id=&quot;1563&quot;&gt;&lt;span data-dcnode-id=&quot;1564&quot; instrument_node=&quot;&quot;&gt;necessarily&amp;nbsp;&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1562&quot; instrument_node=&quot;&quot;&gt;misses the train, hits the railway guard, catches the train.”&lt;/span&gt;&lt;a data-dcnode-id=&quot;1560&quot; href=&quot;#_edn21&quot;&gt;&lt;span data-dcnode-id=&quot;1561&quot; instrument_node=&quot;&quot;&gt;[21]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1559&quot; instrument_node=&quot;&quot;&gt; He explains: “This paradox of the atemporal choice accounts for the ambiguous tension between chance and necessity in the Kieslowskian universe of alternative realities: while the choice is radically contingent, determinism is complete within each of the three realities of&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1555&quot;&gt;&lt;em data-dcnode-id=&quot;1557&quot;&gt;&lt;span data-dcnode-id=&quot;1558&quot; instrument_node=&quot;&quot;&gt;Blind Chance&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1556&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1554&quot; instrument_node=&quot;&quot;&gt;“&lt;/span&gt;&lt;a data-dcnode-id=&quot;1552&quot; href=&quot;#_edn22&quot;&gt;&lt;span data-dcnode-id=&quot;1553&quot; instrument_node=&quot;&quot;&gt;[22]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1551&quot; instrument_node=&quot;&quot;&gt; Ironically, by highlighting the film’s “metaphysical-existential vision of the meaningless chance events which determine the outcome of our lives,”&lt;/span&gt;&lt;a data-dcnode-id=&quot;1549&quot; href=&quot;#_edn23&quot;&gt;&lt;span data-dcnode-id=&quot;1550&quot; instrument_node=&quot;&quot;&gt;[23]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1548&quot; instrument_node=&quot;&quot;&gt; Zizek betrays his own critical agnosticism, which manifests in this and other open texts that – like Kieslowski’s film – explode “the form of the linear, centred narrative and [render] life as a multiform flow.” In a sense, Zizek sprints through several sets of hypothetical conclusions, the breathless pace of his thinking similar to the nonstop movement of the title character in Tykwer’s forked-path narrative&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1544&quot;&gt;&lt;em data-dcnode-id=&quot;1546&quot;&gt;&lt;span data-dcnode-id=&quot;1547&quot; instrument_node=&quot;&quot;&gt;Run Lola Run&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1545&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/em&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1542&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1491&quot;&gt;&lt;span data-dcnode-id=&quot;1541&quot; instrument_node=&quot;&quot;&gt;In&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1539&quot;&gt;&lt;span data-dcnode-id=&quot;1540&quot; instrument_node=&quot;&quot;&gt;The Fright of Real Tears&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1538&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;and several other texts, Zizek’s mode of inquiry reveals an affinity for episodicity, switching gears with a lightning pace and rhetorical grace. Even within a single paragraph he is able to segue from one historical epoch or theoretical touchstone to another, spinning not out of control but rather a compelling narrative out of disparate and unexpected names, dates, and events. In the space of three contiguous paragraphs in&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1536&quot;&gt;&lt;span data-dcnode-id=&quot;1537&quot; instrument_node=&quot;&quot;&gt;The Fright of Real Tears&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1535&quot; instrument_node=&quot;&quot;&gt;, he couches a brief discussion of Pascal, Chateaubriand, Adorno, Schelsky, the Clinton-Lewinsky scandal, John Ford’s magisterial&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1533&quot;&gt;&lt;span data-dcnode-id=&quot;1534&quot; instrument_node=&quot;&quot;&gt;Fort Apache&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1532&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;(1948) and&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1530&quot;&gt;&lt;span data-dcnode-id=&quot;1531&quot; instrument_node=&quot;&quot;&gt;The Man Who Shot Liberty Valance&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1529&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;(1962), Kevin Costner’s box-office bomb&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1527&quot;&gt;&lt;span data-dcnode-id=&quot;1528&quot; instrument_node=&quot;&quot;&gt;The Postman&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1526&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;(1997), post-apartheid South Africa, Heidegger and the Holocaust (in that order).&lt;/span&gt;&lt;a data-dcnode-id=&quot;1524&quot; href=&quot;#_edn24&quot;&gt;&lt;span data-dcnode-id=&quot;1525&quot; instrument_node=&quot;&quot;&gt;[24]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1523&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a data-dcnode-id=&quot;1522&quot; name=&quot;_ednref24&quot;&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1521&quot; instrument_node=&quot;&quot;&gt; Similarly, in his analysis of&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1519&quot;&gt;&lt;span data-dcnode-id=&quot;1520&quot; instrument_node=&quot;&quot;&gt;Blind Chance&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1518&quot; instrument_node=&quot;&quot;&gt;, he veers off the subject to touch on Rudolph Maté’s&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1516&quot;&gt;&lt;span data-dcnode-id=&quot;1517&quot; instrument_node=&quot;&quot;&gt;No Sad Songs for Me&amp;nbsp;&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1515&quot; instrument_node=&quot;&quot;&gt;(1950),&lt;/span&gt;&lt;em data-dcnode-id=&quot;1511&quot;&gt;&lt;span data-dcnode-id=&quot;1514&quot; instrument_node=&quot;&quot;&gt; Chris Columbus’s&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1512&quot;&gt;&lt;span data-dcnode-id=&quot;1513&quot; instrument_node=&quot;&quot;&gt;Stepmom&lt;/span&gt;&lt;/em&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1510&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;(1998),&lt;/span&gt;&lt;em data-dcnode-id=&quot;1505&quot;&gt;&lt;span data-dcnode-id=&quot;1509&quot; instrument_node=&quot;&quot;&gt; King Vidor’s&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1507&quot;&gt;&lt;span data-dcnode-id=&quot;1508&quot; instrument_node=&quot;&quot;&gt;Stella Dallas&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1506&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1504&quot; instrument_node=&quot;&quot;&gt;(1937),&lt;/span&gt;&lt;em data-dcnode-id=&quot;1496&quot;&gt;&lt;span data-dcnode-id=&quot;1503&quot; instrument_node=&quot;&quot;&gt; Richard Strauss’s&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1501&quot;&gt;&lt;span data-dcnode-id=&quot;1502&quot; instrument_node=&quot;&quot;&gt;Der Rosenkavalier&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1500&quot; instrument_node=&quot;&quot;&gt;, Goethe’s&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1498&quot;&gt;&lt;span data-dcnode-id=&quot;1499&quot; instrument_node=&quot;&quot;&gt;Elective Affinities&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1497&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1495&quot; instrument_node=&quot;&quot;&gt;and Guy de Maupassant’s work.&lt;/span&gt;&lt;a data-dcnode-id=&quot;1493&quot; href=&quot;#_edn25&quot;&gt;&lt;span data-dcnode-id=&quot;1494&quot; instrument_node=&quot;&quot;&gt;[25]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1492&quot; instrument_node=&quot;&quot;&gt; An eclectic mishmash of movie references, literary&amp;nbsp;bons mots, and philosophical reflections, Zizek’s omnibus-like discourse dips as freely and habitually in the “shallow” end of “low” culture as in the deeper, more profound waters of “high” culture. This juxtaposition of high and low is actually not so radical in the context of postmodernism, the appearance of which (in cultural, political, and intellectual spheres of life) contributed to the late twentieth-century deconstruction of traditional genres and hierarchies as well as the increased acceleration of culture and simultaneity in the arts.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1490&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1466&quot;&gt;&lt;span data-dcnode-id=&quot;1489&quot; instrument_node=&quot;&quot;&gt;Of course, one need not be as baroque or hypercitational as Zizek to affect an episodic mode of criticism. Other scholars have adopted fragmented, subjunctive and forked-path reading strategies that run against the grain of convention. Peter Wollen is one scholar in particular who has utilized episodic writing in an illuminating way. As evidence of this, his essay “&lt;/span&gt;&lt;em data-dcnode-id=&quot;1487&quot;&gt;&lt;span data-dcnode-id=&quot;1488&quot; instrument_node=&quot;&quot;&gt;Rope&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1486&quot; instrument_node=&quot;&quot;&gt;: three hypotheses” proposes a unique hermeneutic strategy for lifting Hitchcock’s most technically audacious film out of its typical industrial/auteurist milieu so as to deposit it into new historical and aesthetic contexts. Sandwiched between his first and third entries (which speak to the nature of the English private school system and the mobility and claustrophobia found in most Hitchcock films), Wollen’s second splinter-hypothesis – “&lt;/span&gt;&lt;em data-dcnode-id=&quot;1484&quot;&gt;&lt;span data-dcnode-id=&quot;1485&quot; instrument_node=&quot;&quot;&gt;Rope&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1483&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;as an experimental film” – situates the film within the orbit of works like Michael Snow’s&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1481&quot;&gt;&lt;span data-dcnode-id=&quot;1482&quot; instrument_node=&quot;&quot;&gt;Wavelength&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1480&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;(1966) and&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1478&quot;&gt;&lt;span data-dcnode-id=&quot;1479&quot; instrument_node=&quot;&quot;&gt;Back and Forth&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1477&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;(1969), concluding that&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1475&quot;&gt;&lt;span data-dcnode-id=&quot;1476&quot; instrument_node=&quot;&quot;&gt;Rope&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1474&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;is the “ultimate &lt;/span&gt;&lt;em data-dcnode-id=&quot;1472&quot;&gt;&lt;span data-dcnode-id=&quot;1473&quot; instrument_node=&quot;&quot;&gt;kammerspielfilm&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1471&quot; instrument_node=&quot;&quot;&gt;.” In a sense, Wollen is running Witek-like through three possible scenarios that both compliment and contradict one another, ultimately resolving himself to be refreshingly unresolved.&lt;/span&gt;&lt;a data-dcnode-id=&quot;1469&quot; href=&quot;#_edn26&quot;&gt;&lt;span data-dcnode-id=&quot;1470&quot; instrument_node=&quot;&quot;&gt;[26]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1468&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a data-dcnode-id=&quot;1467&quot; name=&quot;_ednref26&quot;&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1465&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1441&quot;&gt;&lt;span data-dcnode-id=&quot;1464&quot; instrument_node=&quot;&quot;&gt;Another good early example of critical episodicity occurs in Susan Sontag’s&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1462&quot;&gt;&lt;span data-dcnode-id=&quot;1463&quot; instrument_node=&quot;&quot;&gt;Against Interpretation&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1461&quot; instrument_node=&quot;&quot;&gt;. In her essay about Jean-Luc Godard’s&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1459&quot;&gt;&lt;span data-dcnode-id=&quot;1460&quot; instrument_node=&quot;&quot;&gt;My Life to Live&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1458&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;(&lt;/span&gt;&lt;em data-dcnode-id=&quot;1456&quot;&gt;&lt;span data-dcnode-id=&quot;1457&quot; instrument_node=&quot;&quot;&gt;Vivre sa vie&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1455&quot; instrument_node=&quot;&quot;&gt;, 1962), an episodic film divided into twelve separate sections that inspires the famous critic to adopt a similarly fragmented reading strategy, Sontag begins by making a distinction between proof and analysis. Breaking her essay into seventeen numbered sections, each one building upon the previous entry yet putting forth, sometimes aphoristically, a new idea or point of epistemological departure, Sontag argues that&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1453&quot;&gt;&lt;span data-dcnode-id=&quot;1454&quot; instrument_node=&quot;&quot;&gt;My Life to Live&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1452&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;is an example of properly formalist filmmaking. Rather than engage in a substantive analysis of prostitution’s social implications and historical background, rather than delve into the psychology of one who is forced to eke out a living through sexual transactions, Godard taps into the medium’s material properties so as to highlight particular elements of film form and design that, in conventional narrative systems, often go by unnoticed. Symmetry, inversion, repetition, and doubling are just a few of the most conspicuous elements used by Godard to show – or, as Sontag emphasizes, &lt;/span&gt;&lt;em data-dcnode-id=&quot;1450&quot;&gt;&lt;span data-dcnode-id=&quot;1451&quot; instrument_node=&quot;&quot;&gt;prove&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1449&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;– “that something happened, not&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1447&quot;&gt;&lt;span data-dcnode-id=&quot;1448&quot; instrument_node=&quot;&quot;&gt;why&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1446&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;it happened.”&lt;/span&gt;&lt;a data-dcnode-id=&quot;1444&quot; href=&quot;#_edn27&quot;&gt;&lt;span data-dcnode-id=&quot;1445&quot; instrument_node=&quot;&quot;&gt;[27]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1443&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a data-dcnode-id=&quot;1442&quot; name=&quot;_ednref27&quot;&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1440&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1433&quot;&gt;&lt;span data-dcnode-id=&quot;1439&quot; instrument_node=&quot;&quot;&gt;As Sontag states, “the ordinary causal sequence of narrative is broken in Godard’s film by the extremely arbitrary decomposition of the story into twelve episodes – episodes which are serially, rather than causally, related.”&lt;/span&gt;&lt;a data-dcnode-id=&quot;1437&quot; href=&quot;#_edn28&quot;&gt;&lt;span data-dcnode-id=&quot;1438&quot; instrument_node=&quot;&quot;&gt;[28]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1436&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a data-dcnode-id=&quot;1435&quot; name=&quot;_ednref28&quot;&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1434&quot; instrument_node=&quot;&quot;&gt; She sees his division of the text into twelve discrete fragments (“with long titles like chapter headings at the beginning of each episode, telling us more or less what is going to happen”) as an extension or expansion of Godard’s stylistic techniques (such as staccato editing) that dissociate the viewer from the text, break up the diegesis, and disrupt narrative structures associated with Hollywood. Could we not also see Sontag’s arbitrary fragmenting of her own essay as a way of disengaging herself from traditional analytic models and engaging more directly with a film whose stop-and-start rhythms provide, paradoxically, an experiential approximation of the “real” condition of living in today’s fragmented world?&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1432&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1422&quot;&gt;&lt;span data-dcnode-id=&quot;1431&quot; instrument_node=&quot;&quot;&gt;Perhaps no other film scholar has pursued new critical avenues as doggedly as Robert Ray. In his 1995 book &lt;/span&gt;&lt;em data-dcnode-id=&quot;1429&quot;&gt;&lt;span data-dcnode-id=&quot;1430&quot; instrument_node=&quot;&quot;&gt;The Avant-Garde finds Andy Hardy&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1428&quot; instrument_node=&quot;&quot;&gt;, Ray draws upon some of the twentieth century’s most anti-traditionalist traditions to provide alternatives to the overly predictable modes of thinking and writing that lead to repetitive claims or, in their worst varieties, arrogant dogmatism.&lt;/span&gt;&lt;a data-dcnode-id=&quot;1426&quot; href=&quot;#_edn29&quot;&gt;&lt;span data-dcnode-id=&quot;1427&quot; instrument_node=&quot;&quot;&gt;[29]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1425&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a data-dcnode-id=&quot;1424&quot; name=&quot;_ednref29&quot;&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1423&quot; instrument_node=&quot;&quot;&gt;We should plunge, he argues, into the avant-garde, particularly Surrealism, because its chance operations and associational maneuvers can be put to use, activated in a practical sense. Surrealism’s importance ultimately resulted from the rigor, rather than the seductiveness or eccentricity, of its investigational method – one bound by premeditated rules that led to discovery. By introducing chance, automatism, anecdotes, fragments, and episodicity into the critical act so as to wrench from the periphery of cinematic experience those incidental details that typically go unnoticed – raising the seemingly trivial to a level of significance – we can begin moving beyond the boundaries of an exhausted hermeneutics.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1421&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1413&quot;&gt;&lt;span data-dcnode-id=&quot;1420&quot; instrument_node=&quot;&quot;&gt;In Chapter One of his book, during a Calvinoesque attempt to stage his introductory remarks in multiple frameworks (a trio of separate beginnings that might remind the reader of the three alternate openings to Flann O’Brien’s 1939 novel&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1418&quot;&gt;&lt;span data-dcnode-id=&quot;1419&quot; instrument_node=&quot;&quot;&gt;At Swim-Two-Birds&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1417&quot; instrument_node=&quot;&quot;&gt;, not to mention the three futures played out in&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1415&quot;&gt;&lt;span data-dcnode-id=&quot;1416&quot; instrument_node=&quot;&quot;&gt;Blind Chance&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1414&quot; instrument_node=&quot;&quot;&gt;), Ray proposes revitalizing film studies by moving beyond methodologies that have parasitically latched onto theoretical models such as Structuralism and Psychoanalysis and transformed film writing into a “theoretical machine” running on auto-pilot, propagating stock phrases and sublimating all “irrational” impulses while keeping the transparency of its language intact. Throughout his book, Ray occasionally reasserts the notion that two seismic shifts took place in communication – the first being a segue from oral to alphabetic systems of transmitting ideas; the second being the sudden appearance of a cinematic/electronic culture transplanting the alphabetic – a transformation that eventually posited a postmodernist hyperawareness of the image and its relation to self. Connected to this is the notion that typographical contrivances, such as lists and indexes, have particular effects on writing and reading that should be taken into consideration, and furthermore – as fragmented yet unified forms – can provide the structural foundations of episode films.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1412&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1391&quot;&gt;&lt;span data-dcnode-id=&quot;1411&quot; instrument_node=&quot;&quot;&gt;Although academic film writing concerns itself with a medium that contributed to the ascendancy of visual literacy, scholars have been slow to incorporate the cinematic and episodic in their own articles, books, and lectures. Ray asserts that Walter Benjamin’s&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1409&quot;&gt;&lt;span data-dcnode-id=&quot;1410&quot; instrument_node=&quot;&quot;&gt;Arcades Projects&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1408&quot; instrument_node=&quot;&quot;&gt;, which brims with collage and montage, was “the great unbuilt prototype of a new, explicitly cinematic criticism,” and goes on to retroactively link Benjamin, as well as John Cage, Roland Barthes, and Jacques Derrida, to the Surrealist camp; suggesting that they – in addition to André Breton and Louis Aragon – were most sensitively attuned to photography’s ability to recast, cut up, or liquefy literary forms. Although Ray’s provocative and experimental method is still in a state of infancy, and while it certainly begs several outstanding questions, it points toward new heuristic pathways that run parallel to those posed by episode films, particularly omnibus productions such as&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1406&quot;&gt;&lt;span data-dcnode-id=&quot;1407&quot; instrument_node=&quot;&quot;&gt;Dead of Night&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1405&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;and, more recently,&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1403&quot;&gt;&lt;span data-dcnode-id=&quot;1404&quot; instrument_node=&quot;&quot;&gt;Maldoror&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1402&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;(1997), a German-British adaptation of Comte de Lautréamont’s avant-garde verse novel &lt;/span&gt;&lt;em data-dcnode-id=&quot;1400&quot;&gt;&lt;span data-dcnode-id=&quot;1401&quot; instrument_node=&quot;&quot;&gt;Les chants du Maldoror&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1399&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;(1869) that can be likened to the Surrealist experiment known as the&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1397&quot;&gt;&lt;span data-dcnode-id=&quot;1398&quot; instrument_node=&quot;&quot;&gt;cadaver exquis&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1396&quot; instrument_node=&quot;&quot;&gt;. Indeed, the “exquisite corpse,” a parlor game popular among artists such as André Breton and Tristan Tzara, produced (through collective authorship and collaborative participation) images of combined unity and fragmentation recognizable to audiences of episode films. &lt;/span&gt;&lt;a data-dcnode-id=&quot;1394&quot; href=&quot;#_edn30&quot;&gt;&lt;span data-dcnode-id=&quot;1395&quot; instrument_node=&quot;&quot;&gt;[30]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1393&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a data-dcnode-id=&quot;1392&quot; name=&quot;_ednref30&quot;&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1390&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1369&quot;&gt;&lt;span data-dcnode-id=&quot;1389&quot; instrument_node=&quot;&quot;&gt;Art historians have likewise begun to latch onto the idea of critical episodicity, something suggested by the titles of such books as Whitfield J. Bell’s&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1387&quot;&gt;&lt;span data-dcnode-id=&quot;1388&quot; instrument_node=&quot;&quot;&gt;A Cabinet of Curiosities: Five Episodes in the Evolution of American Museums&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1386&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;(1967) and T. J. Clark’s&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1384&quot;&gt;&lt;span data-dcnode-id=&quot;1385&quot; instrument_node=&quot;&quot;&gt;Farewell to an Idea: Episodes from a History of Modernism&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1383&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;(1999).&lt;/span&gt;&lt;a data-dcnode-id=&quot;1381&quot; href=&quot;#_edn31&quot;&gt;&lt;span data-dcnode-id=&quot;1382&quot; instrument_node=&quot;&quot;&gt;[31]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1380&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a data-dcnode-id=&quot;1379&quot; name=&quot;_ednref31&quot;&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1378&quot; instrument_node=&quot;&quot;&gt; Coincidentally, the latter text – a selective tour through nineteenth- and twentieth-century art – not only includes one of the richest historical analyses of Cubism ever ventured, but also concludes with a nod to one of the classics of episodic cinema: Roberto Rossellini’s&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1376&quot;&gt;&lt;span data-dcnode-id=&quot;1377&quot; instrument_node=&quot;&quot;&gt;Paisà&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1375&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;(1945), a blown-up image from which the author admits to having on his wall.&lt;/span&gt;&lt;a data-dcnode-id=&quot;1373&quot; href=&quot;#_edn32&quot;&gt;&lt;span data-dcnode-id=&quot;1374&quot; instrument_node=&quot;&quot;&gt;[32]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1372&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a data-dcnode-id=&quot;1371&quot; name=&quot;_ednref32&quot;&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1370&quot; instrument_node=&quot;&quot;&gt; Like the Italian Neorealist’s film, Clark’s book has a basic form whose “brokenness and arbitrariness” was intentional. He envisions his chapters or “episodes” (“Pissarro in 1891,” “UNOVIS in 1920,” “David in Year 2,” “Picasso in the first flush of Cubism”) as “items from a modernist dig,” and later describes his own analysis of Cubism as a&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1368&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1362&quot; style=&quot;padding-left: 30px;&quot;&gt;&lt;span data-dcnode-id=&quot;1367&quot; instrument_node=&quot;&quot;&gt;medley of&amp;nbsp;pensées detaches sur la peinture&amp;nbsp;– a series of stabs at description,&amp;nbsp;full of crossings-out and redundancies, a bit like the Cubist grids I am trying to find words for. This disconnected quality seems necessary to me, precisely because it is the opposite quality that I most distrust in the accounts of Picasso’s painting we already have: that is, the way they are driven by a basic commitment to narrative continuity, by a wish to see Picasso’s work from 1907 to 1912 as possessing a logic or forming a sequence, as not being broken or interrupted in any important way [emphasis added].&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;1365&quot; href=&quot;#_edn33&quot;&gt;&lt;span data-dcnode-id=&quot;1366&quot; instrument_node=&quot;&quot;&gt;[33]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1364&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a data-dcnode-id=&quot;1363&quot; name=&quot;_ednref33&quot;&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1361&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1345&quot;&gt;&lt;span data-dcnode-id=&quot;1360&quot; instrument_node=&quot;&quot;&gt;Clark even refers to the individual components – the geometric shards and shivering grids – comprising Picasso’s&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1358&quot;&gt;&lt;span data-dcnode-id=&quot;1359&quot; instrument_node=&quot;&quot;&gt;The Architect’s Table&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1357&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;and&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1355&quot;&gt;&lt;span data-dcnode-id=&quot;1356&quot; instrument_node=&quot;&quot;&gt;Man with a Pipe&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1354&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;as “episodes of likeness.”&lt;/span&gt;&lt;a data-dcnode-id=&quot;1352&quot; href=&quot;#_edn34&quot;&gt;&lt;span data-dcnode-id=&quot;1353&quot; instrument_node=&quot;&quot;&gt;[34]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1351&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a data-dcnode-id=&quot;1350&quot; name=&quot;_ednref34&quot;&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1349&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;By lifting the word “episode” from its conventional denotative context (where it is primarily used as a temporal unit) and situating it in the realms of the graphic, the physical, the material, and the spatial, Clark points toward modes of critical re-signification necessary in positing Cubism as a representational idiom within&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1347&quot;&gt;&lt;span data-dcnode-id=&quot;1348&quot; instrument_node=&quot;&quot;&gt;cinematic&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1346&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;narrativity.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1344&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1341&quot;&gt;&lt;strong data-dcnode-id=&quot;1342&quot;&gt;&lt;span data-dcnode-id=&quot;1343&quot; instrument_node=&quot;&quot;&gt;Toward a Narrative Cubism: Iteration, Contradiction, and the Relativity of Truth&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1340&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1327&quot;&gt;&lt;span data-dcnode-id=&quot;1339&quot; instrument_node=&quot;&quot;&gt;Before grappling with the idea of cubist narration, we might recall that Cubism, as a set of shared ideas circulating within the spheres of European painting, sculpture, and poetry teetering on the cusp of the Machine Age, came to be perceived as a pivotal moment in the burgeoning Modernist enterprise to strip away the calcified traditions of the previous century’s social order. More importantly, Cubism had the specific effect of shattering the four hundred year-old conventions of a perspectival system that, since the early years of the Florentine Renaissance, was bound to a fixed, unitary line of vision emanating from a single viewing subject. Not long after Georges Braque’s&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1337&quot;&gt;&lt;span data-dcnode-id=&quot;1338&quot; instrument_node=&quot;&quot;&gt;bizarreries cubiques&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1336&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;aroused in Henri Matisse and his fellow Fauvists the not-altogether-complimentary exclamation “&lt;/span&gt;&lt;em data-dcnode-id=&quot;1334&quot;&gt;&lt;span data-dcnode-id=&quot;1335&quot; instrument_node=&quot;&quot;&gt;Toujours les cubes!&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1333&quot; instrument_node=&quot;&quot;&gt;,” what began in 1908 as simply a new approach to form and figural representation led to radical attempts to reproduce the world as a conceptual totality through fragments.&lt;/span&gt;&lt;a data-dcnode-id=&quot;1331&quot; href=&quot;#_edn35&quot;&gt;&lt;span data-dcnode-id=&quot;1332&quot; instrument_node=&quot;&quot;&gt;[35]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1330&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a data-dcnode-id=&quot;1329&quot; name=&quot;_ednref35&quot;&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1328&quot; instrument_node=&quot;&quot;&gt; The Cubist image, in its earliest Post-Impressionist guises, and then into its analytic and synthetic phases, attained its purest expression in the paintings of Braque and Picasso, artists who exploded pictorial space into intersecting lozenges shuffled so as to render an object from multiple perspectives. As a result, each painting provided a composite image, a multitude of sensations made simultaneous and sometimes contradictory.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1326&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1303&quot;&gt;&lt;span data-dcnode-id=&quot;1325&quot; instrument_node=&quot;&quot;&gt;During the early decades of the twentieth century, there was already a general recognition of Cubism’s legacy, and a growing appreciation of the cross-fertilization among multi-perspectival systems in poetry, painting, and cinema.&lt;/span&gt;&lt;a data-dcnode-id=&quot;1323&quot; href=&quot;#_edn36&quot;&gt;&lt;span data-dcnode-id=&quot;1324&quot; instrument_node=&quot;&quot;&gt;[36]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1322&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a data-dcnode-id=&quot;1321&quot; name=&quot;_ednref36&quot;&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1320&quot; instrument_node=&quot;&quot;&gt; Writing on the “Synchronization of Senses,” Sergei Eisenstein even recognized a pre-Cubist multi-perspectival tendency in the swirling compositions of El Greco, a Mannerist artist of the late-sixteenth century whom Eisenstein dubbed the “forerunner of the newsreel” and one of “the forefathers of film montage.” In El Greco’s&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1318&quot;&gt;&lt;span data-dcnode-id=&quot;1319&quot; instrument_node=&quot;&quot;&gt;View and Plan of Toledo&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1317&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;(1604-14), for example, “&lt;/span&gt;&lt;em data-dcnode-id=&quot;1315&quot;&gt;&lt;span data-dcnode-id=&quot;1316&quot; instrument_node=&quot;&quot;&gt;realistic proportions&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1314&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;have been altered, and while part of the city is shown from&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1312&quot;&gt;&lt;span data-dcnode-id=&quot;1313&quot; instrument_node=&quot;&quot;&gt;one&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1311&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;direction, one detail of it is shown from&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1309&quot;&gt;&lt;span data-dcnode-id=&quot;1310&quot; instrument_node=&quot;&quot;&gt;exactly the opposite&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1308&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;direction!” This, Eisenstein argues, “provides an instance for us of an artist’s viewpoint leaping furiously back and forth, fixing on the same canvas details of a city seen not only from various points outside the city, but even from various streets, alleys, and squares!”&lt;/span&gt;&lt;a data-dcnode-id=&quot;1306&quot; href=&quot;#_edn37&quot;&gt;&lt;span data-dcnode-id=&quot;1307&quot; instrument_node=&quot;&quot;&gt;[37]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1305&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a data-dcnode-id=&quot;1304&quot; name=&quot;_ednref37&quot;&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1302&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1285&quot;&gt;&lt;span data-dcnode-id=&quot;1301&quot; instrument_node=&quot;&quot;&gt;Now recognized as “the first genuine avant-garde film produced in the United States,” Paul Strand’s and Charles Sheeler’s seven-minute New York city-symphony,&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1299&quot;&gt;&lt;span data-dcnode-id=&quot;1300&quot; instrument_node=&quot;&quot;&gt;Manhatta&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1298&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;(1921), is also one of the earliest (if most miniature) manifestations of cubist cinema, its heterogeneous dispersion of street-scenes “deconstructing renaissance perspective in favor of multiple, reflexive points of view.”&lt;/span&gt;&lt;a data-dcnode-id=&quot;1296&quot; href=&quot;#_edn38&quot;&gt;&lt;span data-dcnode-id=&quot;1297&quot; instrument_node=&quot;&quot;&gt;[38]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1295&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a data-dcnode-id=&quot;1294&quot; name=&quot;_ednref38&quot;&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1293&quot; instrument_node=&quot;&quot;&gt; Not unlike longer, feature-length episode films,&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1291&quot;&gt;&lt;span data-dcnode-id=&quot;1292&quot; instrument_node=&quot;&quot;&gt;Manhatta&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1290&quot; instrument_node=&quot;&quot;&gt;, according to Jan-Christopher Horak, “ultimately seems to construct numerous, often conflicting texts, oscillating between modernism and a Whitmanesque romanticism, between fragmentation and narrative closure. As a result, the subject is positioned in the oblique perspectives of the modern skyscraper, but is simultaneously asked to view technology as an event ideally in tune with the natural environment.”&lt;/span&gt;&lt;a data-dcnode-id=&quot;1288&quot; href=&quot;#_edn39&quot;&gt;&lt;span data-dcnode-id=&quot;1289&quot; instrument_node=&quot;&quot;&gt;[39]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1287&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a data-dcnode-id=&quot;1286&quot; name=&quot;_ednref39&quot;&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1284&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1229&quot;&gt;&lt;span data-dcnode-id=&quot;1283&quot; instrument_node=&quot;&quot;&gt;This final part of my essay examines what I call “cubist narration,” which refers to any film in which a kernel story as seen from various characters’ perspectives is replayed in parallel or obliquely angled episodic form.&lt;/span&gt;&lt;a data-dcnode-id=&quot;1281&quot; href=&quot;#_edn40&quot;&gt;&lt;span data-dcnode-id=&quot;1282&quot; instrument_node=&quot;&quot;&gt;[40]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1280&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a data-dcnode-id=&quot;1279&quot; name=&quot;_ednref40&quot;&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1278&quot; instrument_node=&quot;&quot;&gt; It can also be referred to as “iterative narration,” for it involves a story or set of events being enacted two or more times, in serial succession, only to end in inevitable ambiguity. Such generically diverse films as &lt;/span&gt;&lt;em data-dcnode-id=&quot;1276&quot;&gt;&lt;span data-dcnode-id=&quot;1277&quot; instrument_node=&quot;&quot;&gt;Rashomon&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1275&quot; instrument_node=&quot;&quot;&gt;,&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1273&quot;&gt;&lt;span data-dcnode-id=&quot;1274&quot; instrument_node=&quot;&quot;&gt;Les girls&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1272&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;(1957),&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1270&quot;&gt;&lt;span data-dcnode-id=&quot;1271&quot; instrument_node=&quot;&quot;&gt;The Man who Shot Liberty Valance&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1269&quot; instrument_node=&quot;&quot;&gt;,&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1267&quot;&gt;&lt;span data-dcnode-id=&quot;1268&quot; instrument_node=&quot;&quot;&gt;Cold Days&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1266&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;(&lt;/span&gt;&lt;em data-dcnode-id=&quot;1264&quot;&gt;&lt;span data-dcnode-id=&quot;1265&quot; instrument_node=&quot;&quot;&gt;Hideg napok&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1263&quot; instrument_node=&quot;&quot;&gt;, 1966),&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1261&quot;&gt;&lt;span data-dcnode-id=&quot;1262&quot; instrument_node=&quot;&quot;&gt;Four Times that Night&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1260&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;(1972),&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1258&quot;&gt;&lt;span data-dcnode-id=&quot;1259&quot; instrument_node=&quot;&quot;&gt;He said, she said&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1257&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;(1991),&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1255&quot;&gt;&lt;span data-dcnode-id=&quot;1256&quot; instrument_node=&quot;&quot;&gt;Pulp Fiction&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1254&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;(1994),&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1252&quot;&gt;&lt;span data-dcnode-id=&quot;1253&quot; instrument_node=&quot;&quot;&gt;I Shot a Man in Vegas&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1251&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;(1995),&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1249&quot;&gt;&lt;span data-dcnode-id=&quot;1250&quot; instrument_node=&quot;&quot;&gt;Courage under Fire&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1248&quot; instrument_node=&quot;&quot;&gt;(1996),&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1246&quot;&gt;&lt;span data-dcnode-id=&quot;1247&quot; instrument_node=&quot;&quot;&gt;The Falling&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1245&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;(1998),&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1243&quot;&gt;&lt;span data-dcnode-id=&quot;1244&quot; instrument_node=&quot;&quot;&gt;Hilary and Jackie&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1242&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;(1998),&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1240&quot;&gt;&lt;span data-dcnode-id=&quot;1241&quot; instrument_node=&quot;&quot;&gt;Virgin Stripped Bare by her Bachelors&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1239&quot; instrument_node=&quot;&quot;&gt;,&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1237&quot;&gt;&lt;span data-dcnode-id=&quot;1238&quot; instrument_node=&quot;&quot;&gt;Hero&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1236&quot; instrument_node=&quot;&quot;&gt;, and&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1234&quot;&gt;&lt;span data-dcnode-id=&quot;1235&quot; instrument_node=&quot;&quot;&gt;11:14&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1233&quot; instrument_node=&quot;&quot;&gt;(2003) are perhaps the cinematic equivalents of novels containing multiple internal focalizations (such as Wilkie Collins’s&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1231&quot;&gt;&lt;span data-dcnode-id=&quot;1232&quot; instrument_node=&quot;&quot;&gt;The Moonstone&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1230&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;[1868]) – films that highlight the biases and limitations of human perception. Like the forked-path narratives mentioned above, they offer a series of alternate realities and parallel lives. However, in foregrounding a heteroglossia of competing, sometimes oxymoronic, discourses, these films problematize the nature of “truth,” which in most cases is relative and linked to subjective experience.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1228&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1223&quot;&gt;&lt;span data-dcnode-id=&quot;1227&quot; instrument_node=&quot;&quot;&gt;The most exemplary and influential case of cubist narration in film history is Akira Kurosawa’s&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1225&quot;&gt;&lt;span data-dcnode-id=&quot;1226&quot; instrument_node=&quot;&quot;&gt;Rashomon&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1224&quot; instrument_node=&quot;&quot;&gt;. The film, broken into seven different accounts of a single murder, replays this pivotal event through various characters’ eyes, each time casting doubt on the previous version. First a woodcutter tells the tale; then a priest; then a policeman; then Tajomaru, the bandit who admits that he attacked the samurai and raped his wife; then the wife herself, who claims that she knifed her husband following the rape because of his scornful expression; then the spirit of the dead samurai, who speaks through a medium and claims that he committed suicide because of his wife’s preference for the bandit. These accounts, delivered to an unseen judge occupying the position of the camera, are further complicated by the woodcutter, who makes amendments to his own story and says that after the rape he witnessed a different set of circumstances.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1222&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1196&quot;&gt;&lt;span data-dcnode-id=&quot;1221&quot; instrument_node=&quot;&quot;&gt;Many critics believe that this last diegetic observer, the woodcutter (who also benevolently rescues and adopts a baby, his&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1219&quot;&gt;&lt;span data-dcnode-id=&quot;1220&quot; instrument_node=&quot;&quot;&gt;seventh&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1218&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;to be exact), has no reason to lie and effectively nullifies the preceding episodes’ legitimacy; yet he too appears to be playing loose with the truth. This is emphasized when another commoner shouts at him, “Look, you may have fooled the police, but you don’t fool me…Where is that valuable dagger that was pulled out of the samurai’s body?” In each case, it seems, there is a distortion of reality based on selfish motives. There would appear to be a correlation, then, between this text which continually undercuts itself and the kind of self-denying discourse that Susan Stewart describes in her book&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1216&quot;&gt;&lt;span data-dcnode-id=&quot;1217&quot; instrument_node=&quot;&quot;&gt;Nonsense: Aspects of Intertextuality in Folklore and Literature&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1215&quot; instrument_node=&quot;&quot;&gt;. As Stewart points out, certain novels like Samuel Beckett’s&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1213&quot;&gt;&lt;span data-dcnode-id=&quot;1214&quot; instrument_node=&quot;&quot;&gt;Molloy&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1212&quot; instrument_node=&quot;&quot;&gt;(1955) systematically cancel themselves out every step of the way.&lt;/span&gt;&lt;a data-dcnode-id=&quot;1210&quot; href=&quot;#_edn41&quot;&gt;&lt;span data-dcnode-id=&quot;1211&quot; instrument_node=&quot;&quot;&gt;[41]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1209&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a data-dcnode-id=&quot;1208&quot; name=&quot;_ednref41&quot;&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1207&quot; instrument_node=&quot;&quot;&gt; However, not unlike the six men of Indostan in poet John Godfrey Saxe’s “The Blind Men and the Elephant” (who each experience the physical presence of a pachyderm in radically different ways: “very like a spear,” “very like a fan,” etc.), the six characters in&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1205&quot;&gt;&lt;span data-dcnode-id=&quot;1206&quot; instrument_node=&quot;&quot;&gt;Rashomon&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1204&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;personify the phenomenal constraints each of us face in coming to terms with life’s antinomies. Only by “changing one perspective for another,” as Robert van Es states in his concise reading of&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1202&quot;&gt;&lt;span data-dcnode-id=&quot;1203&quot; instrument_node=&quot;&quot;&gt;Rashomon&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1201&quot; instrument_node=&quot;&quot;&gt;, do “we have the opportunity to learn something, to acquire new insights.” &lt;/span&gt;&lt;a data-dcnode-id=&quot;1199&quot; href=&quot;#_edn42&quot;&gt;&lt;span data-dcnode-id=&quot;1200&quot; instrument_node=&quot;&quot;&gt;[42]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1198&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a data-dcnode-id=&quot;1197&quot; name=&quot;_ednref42&quot;&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1195&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1176&quot;&gt;&lt;span data-dcnode-id=&quot;1194&quot; instrument_node=&quot;&quot;&gt;Just as questions about the “right” point of view have been circulating in philosophical discourse since the days of Blaise Pascal, so too have&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1192&quot;&gt;&lt;span data-dcnode-id=&quot;1193&quot; instrument_node=&quot;&quot;&gt;Rashomon&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1191&quot; instrument_node=&quot;&quot;&gt;‘s multiple and contradictory narratives continued to open new channels for discussing the ways in which cinematic fictions are habitually taken as representations of reality. Since this film has already been examined in detail by numerous scholars (whose own divergent interpretations replicate its internal fragmentation of perspective), I see no need to pursue Kurosawa’s shrewd use of relativism and irony any further; except to say that few of the films, television episodes,&lt;/span&gt;&lt;a data-dcnode-id=&quot;1189&quot; href=&quot;#_edn43&quot;&gt;&lt;span data-dcnode-id=&quot;1190&quot; instrument_node=&quot;&quot;&gt;[43]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1188&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a data-dcnode-id=&quot;1187&quot; name=&quot;_ednref43&quot;&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1186&quot; instrument_node=&quot;&quot;&gt; and novels &lt;/span&gt;&lt;a data-dcnode-id=&quot;1184&quot; href=&quot;#_edn44&quot;&gt;&lt;span data-dcnode-id=&quot;1185&quot; instrument_node=&quot;&quot;&gt;[44]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1183&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a data-dcnode-id=&quot;1182&quot; name=&quot;_ednref44&quot;&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1181&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;spawned from this Japanese classic have provided as many alternate points of view. And, as a result, few are as profoundly unsettling in depicting epistemological ambiguity.&lt;/span&gt;&lt;a data-dcnode-id=&quot;1179&quot; href=&quot;#_edn45&quot;&gt;&lt;span data-dcnode-id=&quot;1180&quot; instrument_node=&quot;&quot;&gt;[45]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1178&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a data-dcnode-id=&quot;1177&quot; name=&quot;_ednref45&quot;&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1175&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1148&quot;&gt;&lt;em data-dcnode-id=&quot;1173&quot;&gt;&lt;span data-dcnode-id=&quot;1174&quot; instrument_node=&quot;&quot;&gt;Rashomon&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1172&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;was by no means the first film to feature contradictory flashbacks and mendacious or multi-perspectival narration – elements that are found in a handful of expressionistic&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1170&quot;&gt;&lt;span data-dcnode-id=&quot;1171&quot; instrument_node=&quot;&quot;&gt;films noir&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1169&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;and existentialist social problem dramas of the 1940s, such as Edward Dmytryk’s&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1167&quot;&gt;&lt;span data-dcnode-id=&quot;1168&quot; instrument_node=&quot;&quot;&gt;Crossfire&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1166&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;(1947). Orson Welles’s&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1164&quot;&gt;&lt;span data-dcnode-id=&quot;1165&quot; instrument_node=&quot;&quot;&gt;Citizen Kane&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1163&quot; instrument_node=&quot;&quot;&gt;(1941), of course, is famous for just such an approach, as is another “anecdotal portraiture” released in 1941, Julien Duvivier’s&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1161&quot;&gt;&lt;span data-dcnode-id=&quot;1162&quot; instrument_node=&quot;&quot;&gt;Lydia&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1160&quot; instrument_node=&quot;&quot;&gt;. This loose Hollywood adaptation of the same director’s episodic French-language film &lt;/span&gt;&lt;em data-dcnode-id=&quot;1158&quot;&gt;&lt;span data-dcnode-id=&quot;1159&quot; instrument_node=&quot;&quot;&gt;Dance Card&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1157&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;(&lt;/span&gt;&lt;em data-dcnode-id=&quot;1155&quot;&gt;&lt;span data-dcnode-id=&quot;1156&quot; instrument_node=&quot;&quot;&gt;Un carnet du bal&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1154&quot; instrument_node=&quot;&quot;&gt;, 1937) gave actress Merle Oberon the opportunity to go through thirty-two changes of costume while playing off four romantic leads, three of whom gather together in the waning years of their lives to reflect upon their shared object of affection. These former beaux’ individual accounts of the main character are rendered serially as sentimental flashbacks and are the basis for visual and aural inconsistencies.&lt;/span&gt;&lt;a data-dcnode-id=&quot;1152&quot; href=&quot;#_edn46&quot;&gt;&lt;span data-dcnode-id=&quot;1153&quot; instrument_node=&quot;&quot;&gt;[46]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1151&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a data-dcnode-id=&quot;1150&quot; name=&quot;_ednref46&quot;&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1149&quot; instrument_node=&quot;&quot;&gt; For example, when Lydia, now a spinster, recounts the ball she attended as a young Boston debutante, it is depicted as an enormous and glittering space filled with swelling music, and her entrance is filmed in exquisite slow-motion to convey her feeling of entering into a “dream.” However, when Joseph Cotton’s character – the more down-to-earth Michael – tells his version of the event, the dance is considerably smaller in size.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1147&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1125&quot;&gt;&lt;span data-dcnode-id=&quot;1146&quot; instrument_node=&quot;&quot;&gt;This presumably less embellished description, which Jeanine Basinger argues is a “masculine, more realistic presentation” with “no mirrored walls…one harpist…and a single violinist,” would appear to be Duvivier’s way of undercutting and deglamorizing phantasmic elements associated with the genre of the woman’s film.&lt;/span&gt;&lt;a data-dcnode-id=&quot;1144&quot; href=&quot;#_edn47&quot;&gt;&lt;span data-dcnode-id=&quot;1145&quot; instrument_node=&quot;&quot;&gt;[47]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1143&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a data-dcnode-id=&quot;1142&quot; name=&quot;_ednref47&quot;&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1141&quot; instrument_node=&quot;&quot;&gt; However, such a reading skips over the possibility that there is more than one truth being presented here; that there are – as Linda Hutcheon argues in her discussion of postmodern novels such as Julian Barnes’s&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1139&quot;&gt;&lt;span data-dcnode-id=&quot;1140&quot; instrument_node=&quot;&quot;&gt;Flaubert’s Parrot&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1138&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;(1984) and John Fowles’s&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1136&quot;&gt;&lt;span data-dcnode-id=&quot;1137&quot; instrument_node=&quot;&quot;&gt;A Maggot&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1135&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;(1985) – “only truths in the plural.”&lt;/span&gt;&lt;a data-dcnode-id=&quot;1133&quot; href=&quot;#_edn48&quot;&gt;&lt;span data-dcnode-id=&quot;1134&quot; instrument_node=&quot;&quot;&gt;[48]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1132&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a data-dcnode-id=&quot;1131&quot; name=&quot;_ednref48&quot;&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1130&quot; instrument_node=&quot;&quot;&gt; Plus, this gendered rupture of perspective also resonates with the larger issue of multiplicity, something articulated at the end when Michael says, “I kept thinking as I was listening to all the stories: What was the real Lydia? Which one? Which One?,” to which the old woman responds “The ‘real’ Lydia? Dear me…there was no real Lydia, Michael. There were dozens of them.” &lt;/span&gt;&lt;a data-dcnode-id=&quot;1128&quot; href=&quot;#_edn49&quot;&gt;&lt;span data-dcnode-id=&quot;1129&quot; instrument_node=&quot;&quot;&gt;[49]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1127&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a data-dcnode-id=&quot;1126&quot; name=&quot;_ednref49&quot;&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1124&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1107&quot;&gt;&lt;span data-dcnode-id=&quot;1123&quot; instrument_node=&quot;&quot;&gt;If postmodern art is “doubled and contradictory,” as Hutcheon argues, then films as diverse as George Cukor’s &lt;/span&gt;&lt;em data-dcnode-id=&quot;1121&quot;&gt;&lt;span data-dcnode-id=&quot;1122&quot; instrument_node=&quot;&quot;&gt;Les girls&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1120&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;(“the&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1118&quot;&gt;&lt;span data-dcnode-id=&quot;1119&quot; instrument_node=&quot;&quot;&gt;Rashomon&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1117&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;of MGM musicals”) and Anand Tucker’s&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1115&quot;&gt;&lt;span data-dcnode-id=&quot;1116&quot; instrument_node=&quot;&quot;&gt;Hilary and Jackie&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1114&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;(a dual biography of celebrated British cellist Jacqueline Du Pré and her less famous sister) would seem to fit into that category, despite all outward appearances. The former film, a frothy “offstage” musical set in London’s Royal Court of Justice, is notable not only for being Gene Kelly’s last job under contract with MGM, but also for parodying such contemporaneous productions as&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1112&quot;&gt;&lt;span data-dcnode-id=&quot;1113&quot; instrument_node=&quot;&quot;&gt;The Wild One&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1111&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;(1954) and nostalgically consolidating tropes and images associated with the hoofer’s earlier films (in particular&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1109&quot;&gt;&lt;span data-dcnode-id=&quot;1110&quot; instrument_node=&quot;&quot;&gt;Singin’ in the Rain&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1108&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;[1951]). More importantly, this unusual film, which dares to thematize suicide, finds numerous opportunities throughout its multiple flashbacks (each told from a different person’s point of view) to self-reflexively comment on the questionable nature of truth and the fabricated act of cinematic signification, something that supposedly only “serious” works of art do.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1106&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1058&quot;&gt;&lt;em data-dcnode-id=&quot;1104&quot;&gt;&lt;span data-dcnode-id=&quot;1105&quot; instrument_node=&quot;&quot;&gt;Hilary and Jackie&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1103&quot; instrument_node=&quot;&quot;&gt;, based on the controversial book&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1101&quot;&gt;&lt;span data-dcnode-id=&quot;1102&quot; instrument_node=&quot;&quot;&gt;A Genius in the Family&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1100&quot; instrument_node=&quot;&quot;&gt;, is no less adept at making perspectival pivots around a serious subject (Jacqueline du Pré’s battle with multiple sclerosis in her thirties) whose gravitational pull is as strong as the rivalry between the titular sisters. Publicly derided by friends of the dead musician as well as by many film critics,&lt;/span&gt;&lt;a data-dcnode-id=&quot;1098&quot; href=&quot;#_edn50&quot;&gt;&lt;span data-dcnode-id=&quot;1099&quot; instrument_node=&quot;&quot;&gt;[50]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1097&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a data-dcnode-id=&quot;1096&quot; name=&quot;_ednref50&quot;&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1095&quot; instrument_node=&quot;&quot;&gt; this warts-and-all portrait of a sibling love-hate relationship is marked by ambiguity and doubleness, taking us into the mind of Hilary before flashing back (at the forty-five minute mark) to many of the same events witnessed earlier, only this time from Jackie’s point of view. Unlike other bivalve portmanteau films (individual works consisting of exactly two stories or variations on a theme), such as the Hollywood productions&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1093&quot;&gt;&lt;span data-dcnode-id=&quot;1094&quot; instrument_node=&quot;&quot;&gt;Face to Face&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1092&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;(1952),&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1090&quot;&gt;&lt;span data-dcnode-id=&quot;1091&quot; instrument_node=&quot;&quot;&gt;Actors and Sin&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1089&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;(1952), and&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1087&quot;&gt;&lt;span data-dcnode-id=&quot;1088&quot; instrument_node=&quot;&quot;&gt;Movie Movie&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1086&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;(1978), as well as European productions like&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1084&quot;&gt;&lt;span data-dcnode-id=&quot;1085&quot; instrument_node=&quot;&quot;&gt;Of Love and Lust&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1083&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;(&lt;/span&gt;&lt;em data-dcnode-id=&quot;1081&quot;&gt;&lt;span data-dcnode-id=&quot;1082&quot; instrument_node=&quot;&quot;&gt;Giftas&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1080&quot; instrument_node=&quot;&quot;&gt;, 1960),&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1078&quot;&gt;&lt;span data-dcnode-id=&quot;1079&quot; instrument_node=&quot;&quot;&gt;The Couples&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1077&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;(&lt;/span&gt;&lt;em data-dcnode-id=&quot;1075&quot;&gt;&lt;span data-dcnode-id=&quot;1076&quot; instrument_node=&quot;&quot;&gt;Le coppie&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1074&quot; instrument_node=&quot;&quot;&gt;, 1970) and&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1072&quot;&gt;&lt;span data-dcnode-id=&quot;1073&quot; instrument_node=&quot;&quot;&gt;His and Her&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1071&quot; instrument_node=&quot;&quot;&gt;(a.k.a.&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1069&quot;&gt;&lt;span data-dcnode-id=&quot;1070&quot; instrument_node=&quot;&quot;&gt;This and That&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1068&quot; instrument_node=&quot;&quot;&gt;;&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1066&quot;&gt;&lt;span data-dcnode-id=&quot;1067&quot; instrument_node=&quot;&quot;&gt;Questo e quello&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1065&quot; instrument_node=&quot;&quot;&gt;, 1983), whose titles alone indicate their doubleness,&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1063&quot;&gt;&lt;span data-dcnode-id=&quot;1064&quot; instrument_node=&quot;&quot;&gt;Hilary and Jackie&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1062&quot; instrument_node=&quot;&quot;&gt; offers two different yet mirroring versions of the&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1060&quot;&gt;&lt;span data-dcnode-id=&quot;1061&quot; instrument_node=&quot;&quot;&gt;same&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1059&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;story. Its point/counterpoint musical structure is indicative of a type of reiterative narration wherein episodes collectively render an event more fully while compounding the difficulties involved in reaching a non-ambiguous and permanent resolution.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1057&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1049&quot;&gt;&lt;span data-dcnode-id=&quot;1056&quot; instrument_node=&quot;&quot;&gt;The 1952 Sid Kuller Productions release&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1054&quot;&gt;&lt;span data-dcnode-id=&quot;1055&quot; instrument_node=&quot;&quot;&gt;Actors and Sin&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1053&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;makes for an interesting comparison due to its dialogic dimensions. The title, a truncated composite of two forty-minute short films written by Ben Hecht (“Actor’s Blood” and “Woman of Sin”), suggests a perfectly rational blending of thematic elements. Indeed the first episode, set within the world of theater, hinges on the actions of a young female actress, Marcia Tillayou, who ascends the heights of her profession yet sinks deeper into moral depravity until she is found by her overprotective father with two bullets in her chest. Significantly, “Actor’s Blood” is itself split in half, the first part being an extended flashback detailing Marcia’s rise to fame on Broadway and her eventual murder, the second half moving forward and tracing father Maurice’s attempts to crack the case. Culminating with a conventional reveal scene familiar to fans of detective fiction, one in which nearly a dozen suspects are invited to dinner where the murderer will be revealed, this episode nevertheless suggests the ambiguity of&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1051&quot;&gt;&lt;span data-dcnode-id=&quot;1052&quot; instrument_node=&quot;&quot;&gt;Rashomon&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1050&quot; instrument_node=&quot;&quot;&gt; in its treatment of subjective experience and perceptual limitations. “Lies, lies! They’re destroying my daughter with lies,” Maurice moans just before her death (the result, we later learn, of suicide); his nepotism clearly clouding his ability to see Marcia as she “really” is: an unfaithful and malicious woman.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1048&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1046&quot;&gt;&lt;span data-dcnode-id=&quot;1047&quot; instrument_node=&quot;&quot;&gt;Moreover, the entire episode overflows with binaristic imagery and talk. For instance, two cockatiels in Marcia’s dressing room repeat her and her husband’s words, reminding us that the latter – a screenwriter named Alfred O’Shea – supplies his wife’s words onstage. As the narrator of this story, Alfred later says in voiceover, “Our marriage was ideal, and then our marriage was a bust. She began driving me potty with her infidelities. She was in love, out of love, half-Isolde, half-pirate.” This flip-flopping between extremes not only plainly conveys their inability to see eye-to-eye, but also draws our attention to the overarching duality of this most curious episode film, which switches from a tragic story of suicide set in the East Coast world of theater (“Actor’s Blood”) to a comedic riff on children’s creativity set in the West Coast world of Hollywood (“Woman of Sin”).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1045&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1043&quot;&gt;&lt;span data-dcnode-id=&quot;1044&quot; instrument_node=&quot;&quot;&gt;By nature, episode films in general not only accommodate dissonant visual and aural styles, but also allow audiences to reappraise what has already transpired, weigh the evidence given in each segment, and make qualitative decisions drawing on their own selective memories. As an ailing Jackie complains to husband Daniel Barenboim in the abovementioned biopic, “At least Hilary&amp;nbsp;chose&amp;nbsp;her life.” Like the cellist’s sister, spectators have the opportunity to choose which episode they find most aesthetically stimulating, psychologically compelling or “true” – an episode in which to believe or put one’s trust.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1042&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1024&quot;&gt;&lt;span data-dcnode-id=&quot;1041&quot; instrument_node=&quot;&quot;&gt;If the reception of anthology, omnibus, portmanteau, and sketch films rests on audiences’ willingness to “take sides,” to pick and choose the best of the bits, then the specter of non-consensus surely suggests political and ideological dimensions, something taken up in a few works; most notably the Macedonian-French-British co-production&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1039&quot;&gt;&lt;span data-dcnode-id=&quot;1040&quot; instrument_node=&quot;&quot;&gt;Before the Rain&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1038&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;(&lt;/span&gt;&lt;em data-dcnode-id=&quot;1036&quot;&gt;&lt;span data-dcnode-id=&quot;1037&quot; instrument_node=&quot;&quot;&gt;Pred dozhdot&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1035&quot; instrument_node=&quot;&quot;&gt;, 1994), director Milcho Manchevski’s award-winning debut feature about ethnic and racial disharmony in which each of its three parts, “thanks to Möbius strip chronology and recurring images, cancels out the other two.” &lt;/span&gt;&lt;a data-dcnode-id=&quot;1033&quot; href=&quot;#_edn51&quot;&gt;&lt;span data-dcnode-id=&quot;1034&quot; instrument_node=&quot;&quot;&gt;[51]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1032&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a data-dcnode-id=&quot;1031&quot; name=&quot;_ednref51&quot;&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1030&quot; instrument_node=&quot;&quot;&gt; &amp;nbsp;The three episodes comprising this “border-crossing” film (“Words,” “Faces,” “Pictures”) revolve around individuals and communities inside and outside the volatile Balkan region taking sides during a time of political unrest. Significantly, each of the episodes is noticeably steeped in circle imagery. This lends the entire collection of overlapping yet contradictory stories about Muslims and Orthodox Christians, Albanians and Macedonians a cyclical dimension despite an old priest’s enigmatic words (spoken at the beginning and repeated throughout&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1028&quot;&gt;&lt;span data-dcnode-id=&quot;1029&quot; instrument_node=&quot;&quot;&gt;Before the Rain)&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1027&quot; instrument_node=&quot;&quot;&gt;: “Time never dies….The circle is not round.” &lt;/span&gt;&lt;a data-dcnode-id=&quot;1025&quot; href=&quot;#_edn52&quot;&gt;&lt;span data-dcnode-id=&quot;1026&quot; instrument_node=&quot;&quot;&gt;[52]&lt;/span&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1023&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1019&quot;&gt;&lt;span data-dcnode-id=&quot;1022&quot; instrument_node=&quot;&quot;&gt;This contradictory notion is inversely reminiscent of words spoken at the beginning of&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1020&quot;&gt;&lt;span data-dcnode-id=&quot;1021&quot; instrument_node=&quot;&quot;&gt;Run Lola Run:&lt;/span&gt;&lt;/em&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1018&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1014&quot; style=&quot;padding-left: 30px;&quot;&gt;&lt;em data-dcnode-id=&quot;1016&quot;&gt;&lt;span data-dcnode-id=&quot;1017&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1015&quot; instrument_node=&quot;&quot;&gt;“The ball is round, the game lasts ninety minutes.” That line, delivered by a security guard to the camera just before he kicks a soccer ball into the sky, concludes with the statement, “Everything else is pure theory.” The ball, which then hurtles back to earth and lands inside the “O” in “Lola” that has been formed by a multitude of bodies, is indeed round. However, “pure theory” can take an infinite number of shapes, and – like “everything else” (the “details” that often go unnoticed in the game of life) – helps us to conceive of alternate futures and contradictory pasts if paradoxically attuned to the existential demands of the present. Similarly, so too does episodic writing (or what I call “critical episodicity”) aid in our discovery and recovery of the narrative possibilities latent within cinematic texts that – like life – are contradictory in their combined fragmentation and integration, not to mention their simultaneous engagement with physical and metaphysical planes of existence.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1013&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1002&quot;&gt;&lt;span data-dcnode-id=&quot;1012&quot; instrument_node=&quot;&quot;&gt;Just as the writer and director of&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1010&quot;&gt;&lt;span data-dcnode-id=&quot;1011&quot; instrument_node=&quot;&quot;&gt;Blind Chance&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1009&quot; instrument_node=&quot;&quot;&gt;, Krzysztof Kieslowski, could be said to practice a kind of “metaphysical realism” in his films (displaying a commitment to social reality, material solidity, and documentary verisimilitude that nevertheless intersects with an equally vested interest in the spiritual plane’s speculative immaterialism and contingency), so too do Milcho Manchevski, Ventura Pons, Alejandro González Iñárritu, Hong Sang-soo, and numerous other contemporary filmmakers from around the world exude an equally paradoxical sense of wonderment in the mundane and the extraordinary in their works. Their complex, multi-perspectival, forking-path and cubist films are&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1007&quot;&gt;&lt;span data-dcnode-id=&quot;1008&quot; instrument_node=&quot;&quot;&gt;not&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1006&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;merely formal exercises in empty episodicity, however. Quite the opposite, they, like Kieslowski’s&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1004&quot;&gt;&lt;span data-dcnode-id=&quot;1005&quot; instrument_node=&quot;&quot;&gt;Blind Chance&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1003&quot; instrument_node=&quot;&quot;&gt;, deploy their internal segmentation allegorically, as a way of illuminating the psychical demands of living in politically fragmented and socially contested spaces. Time will only tell if future artists and commercial filmmakers take up Borges’s challenge to expand the narrative possibilities of cinema even further.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1001&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;999&quot;&gt;&lt;span data-dcnode-id=&quot;1000&quot; instrument_node=&quot;&quot;&gt;Endnotes&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;998&quot; instrument_node=&quot;&quot;&gt;
