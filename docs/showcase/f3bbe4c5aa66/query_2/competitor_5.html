&lt;/span&gt;&lt;p data-dcnode-id=&quot;1361&quot;&gt;&lt;span class=&quot;c-message__body&quot; data-dcnode-id=&quot;1362&quot; data-qa=&quot;message-text&quot; dir=&quot;auto&quot;&gt;&lt;span data-dcnode-id=&quot;1363&quot; instrument_node=&quot;&quot;&gt;DSW is Tucson’s largest family-owned over-the-road trucking company with service terminals located in Tucson, AZ, and Phoenix, AZ. Family owned and operated since 1989, DSW has a small company atmosphere with big company freight. With over 30 years of experience, we know what it takes for our drivers to be successful. We are committed to providing quality equipment, strong miles, competitive pay, and a stable career. Our goal is to get you miles, get you paid, and get you home.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1360&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1358&quot;&gt;&lt;span data-dcnode-id=&quot;1359&quot; instrument_node=&quot;&quot;&gt;Our management is made up of former drivers, so we understand what recent commercial driver’s license (CDL) graduates are looking for in a career. After you have obtained your CDL, you want a truck driving job where you earn the most without sacrificing time with your family. As experienced CDL drivers, we know how important it is for professional truck drivers to work for a company that will help them succeed. At DSW, we work for you just as hard as you work for us.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1357&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1355&quot;&gt;&lt;span data-dcnode-id=&quot;1356&quot; instrument_node=&quot;&quot;&gt;We also understand when it comes to truck driving job placement, financial aspects are a large factor in your decision. At DSW, we offer tuition reimbursement for qualified drivers. This is another great reason why you should start your truck driving career with us. With competitive pay, tuition reimbursement, and medical and dental benefits, DSW makes sure you get fully compensated for your truck driving skills.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1354&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1352&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;panel-grid-cell&quot; data-dcnode-id=&quot;1341&quot; id=&quot;pgc-w5dd286fdc7d88-0-1&quot;&gt;&lt;div class=&quot;so-panel widget widget_sow-image panel-first-child panel-last-child&quot; data-dcnode-id=&quot;1342&quot; data-index=&quot;1&quot; id=&quot;panel-w5dd286fdc7d88-0-1-0&quot;&gt;&lt;div class=&quot;so-widget-sow-image so-widget-sow-image-default-17bc2272b535&quot; data-dcnode-id=&quot;1343&quot;&gt;&lt;span data-dcnode-id=&quot;1349&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1328&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;so-panel widget widget_text panel-last-child&quot; data-dcnode-id=&quot;1314&quot; data-index=&quot;1&quot; id=&quot;panel-w5dd28686b5184-0-0-1&quot;&gt;&lt;span data-dcnode-id=&quot;1325&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;div class=&quot;textwidget&quot; data-dcnode-id=&quot;1316&quot;&gt;&lt;h2 class=&quot;red-h2&quot; data-dcnode-id=&quot;1321&quot;&gt;&lt;span data-dcnode-id=&quot;1324&quot; instrument_node=&quot;&quot;&gt;GENERATIONS  OF &lt;/span&gt;&lt;span class=&quot;title-red&quot; data-dcnode-id=&quot;1322&quot;&gt;&lt;span data-dcnode-id=&quot;1323&quot; instrument_node=&quot;&quot;&gt;PRIDE!&lt;/span&gt;&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;1320&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1318&quot;&gt;&lt;span data-dcnode-id=&quot;1319&quot; instrument_node=&quot;&quot;&gt;Working for DSW is not like working for one of the giant haulers. We are not bureaucratic, or stuffy. What you’ll find is a true, hardworking family company. We’re salt of the earth people, getting the job done. At DSW, we know our drivers by name, not by truck number. We don’t hire drivers to simply fill trucks—we want you to stay with us for the long haul. Come drive with us!&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1317&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1315&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;panel-grid-cell&quot; data-dcnode-id=&quot;1290&quot; id=&quot;pgc-w5dd28686b5184-0-1&quot;&gt;&lt;div class=&quot;home-section-6-cell-2 panel-cell-style panel-cell-style-for-w5dd28686b5184-0-1&quot; data-dcnode-id=&quot;1291&quot;&gt;&lt;div class=&quot;so-panel widget widget_sow-image panel-first-child&quot; data-dcnode-id=&quot;1305&quot; data-index=&quot;2&quot; id=&quot;panel-w5dd28686b5184-0-1-0&quot;&gt;&lt;div class=&quot;so-widget-sow-image so-widget-sow-image-default-17bc2272b535&quot; data-dcnode-id=&quot;1306&quot;&gt;&lt;span data-dcnode-id=&quot;1312&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;sow-image-container&quot; data-dcnode-id=&quot;1308&quot;&gt;&lt;span data-dcnode-id=&quot;1311&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;img alt=&quot;Our team of truck drivers and other workers at DSW&quot; class=&quot;so-widget-image&quot; data-dcnode-id=&quot;1310&quot; height=&quot;627&quot; loading=&quot;lazy&quot; sizes=&quot;(max-width: 709px) 85vw, (max-width: 909px) 67vw, (max-width: 1362px) 62vw, 840px&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//dswdrivers.com/wp-content/uploads/2019/08/DSW-Drivers-Team.jpg&amp;amp;raw&quot; srcset=&quot;https://dswdrivers.com/wp-content/uploads/2019/08/DSW-Drivers-Team.jpg 1059w, https://dswdrivers.com/wp-content/uploads/2019/08/DSW-Drivers-Team-300x178.jpg 300w, https://dswdrivers.com/wp-content/uploads/2019/08/DSW-Drivers-Team-768x455.jpg 768w, https://dswdrivers.com/wp-content/uploads/2019/08/DSW-Drivers-Team-1024x606.jpg 1024w&quot; width=&quot;1059&quot;&gt;&lt;span data-dcnode-id=&quot;1309&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1307&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;so-panel widget widget_text panel-last-child&quot; data-dcnode-id=&quot;1292&quot; data-index=&quot;3&quot; id=&quot;panel-w5dd28686b5184-0-1-1&quot;&gt;&lt;span data-dcnode-id=&quot;1304&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;div class=&quot;textwidget&quot; data-dcnode-id=&quot;1294&quot;&gt;&lt;h2 class=&quot;uppercase blue-h2&quot; data-dcnode-id=&quot;1302&quot;&gt;&lt;span data-dcnode-id=&quot;1303&quot; instrument_node=&quot;&quot;&gt;A True Family Company&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;1301&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1299&quot;&gt;&lt;span data-dcnode-id=&quot;1300&quot; instrument_node=&quot;&quot;&gt;Because our company is managed by former drivers, our work environment is built with you in mind. Our commercial truck drivers have open access to our management team. Your supervisors will work with you to make your truck driving career with DSW extraordinary.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1298&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1296&quot;&gt;&lt;span data-dcnode-id=&quot;1297&quot; instrument_node=&quot;&quot;&gt;While pay and benefits are important in choosing a truck driving job, at DSW we know that family time is just as essential for your wellbeing. We are a family-focused company and we work hard to ensure that our CDL truck drivers get the family time they need. We offer one day off for every week out and even give you the option to bring a companion on the road with you.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1295&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1293&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;panel-grid panel-has-style&quot; data-dcnode-id=&quot;1210&quot; id=&quot;pg-2-6&quot;&gt;&lt;div class=&quot;arrow-bottom light-red-arrow arrow-row parallax-bg padding-top-50 panel-row-style panel-row-style-for-2-6&quot; data-dcnode-id=&quot;1211&quot;&gt;&lt;div class=&quot;panel-grid-cell&quot; data-dcnode-id=&quot;1212&quot; id=&quot;pgc-2-6-0&quot;&gt;&lt;div class=&quot;so-panel widget widget_siteorigin-panels-builder panel-first-child panel-last-child&quot; data-dcnode-id=&quot;1213&quot; data-index=&quot;6&quot; id=&quot;panel-2-6-0-0&quot;&gt;&lt;div class=&quot;panel-layout&quot; data-dcnode-id=&quot;1214&quot; id=&quot;pl-w616ea99be3380&quot;&gt;&lt;div class=&quot;panel-grid panel-has-style&quot; data-dcnode-id=&quot;1215&quot; id=&quot;pg-w616ea99be3380-0&quot;&gt;&lt;div class=&quot;section-wrap section-spacer panel-row-style panel-row-style-for-w616ea99be3380-0&quot; data-dcnode-id=&quot;1216&quot;&gt;&lt;div class=&quot;panel-grid-cell&quot; data-dcnode-id=&quot;1234&quot; id=&quot;pgc-w616ea99be3380-0-0&quot;&gt;&lt;div class=&quot;so-panel widget widget_text panel-first-child panel-last-child&quot; data-dcnode-id=&quot;1235&quot; data-index=&quot;0&quot; id=&quot;panel-w616ea99be3380-0-0-0&quot;&gt;&lt;div class=&quot;white-text panel-widget-style panel-widget-style-for-w616ea99be3380-0-0-0&quot; data-dcnode-id=&quot;1236&quot;&gt;&lt;span data-dcnode-id=&quot;1282&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;div class=&quot;textwidget&quot; data-dcnode-id=&quot;1238&quot;&gt;&lt;h2 class=&quot;uppercase white-text white-title&quot; data-dcnode-id=&quot;1280&quot;&gt;&lt;span data-dcnode-id=&quot;1281&quot; instrument_node=&quot;&quot;&gt;WHY OUR DRIVERS LIKE WORKING WITH US&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;1279&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 class=&quot;white-text unset&quot; data-dcnode-id=&quot;1277&quot;&gt;&lt;span data-dcnode-id=&quot;1278&quot; instrument_node=&quot;&quot;&gt;Family-focused company managed by former drivers.&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1276&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1274&quot;&gt;&lt;span data-dcnode-id=&quot;1275&quot; instrument_node=&quot;&quot;&gt;Our management team is not made up of corporate bigwigs who don’t understand what truck driving is like. We’ve done your job before and we know what’s important to you. Our management team has an open door policy and will listen to any of your concerns.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1273&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 class=&quot;white-text unset&quot; data-dcnode-id=&quot;1271&quot;&gt;&lt;span data-dcnode-id=&quot;1272&quot; instrument_node=&quot;&quot;&gt;Better home time.&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1270&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1268&quot;&gt;&lt;span data-dcnode-id=&quot;1269&quot; instrument_node=&quot;&quot;&gt;Getting paid well for your truck driving is important, but we understand that you also want to spend time with the people who matter most. We offer better home time compared to other trucking companies so you can enjoy quality time with your family. Turn in your truck and take up to 30 days off. After reaching your weekly mileage goal of 2,500 miles, you receive one day off for every six days out up to three days off anywhere in the country.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1267&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 class=&quot;white-text unset&quot; data-dcnode-id=&quot;1265&quot;&gt;&lt;span data-dcnode-id=&quot;1266&quot; instrument_node=&quot;&quot;&gt;State-of-the-art rigs and equipment.&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1264&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1262&quot;&gt;&lt;span data-dcnode-id=&quot;1263&quot; instrument_node=&quot;&quot;&gt;Drive the very best, most efficient tractor trailers when you start a truck driving career with DSW. We make your driving as easy as possible by providing you with our state-of-the-art equipment. This also helps ensure your safety and efficiency on the road.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1261&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 class=&quot;white-text unset&quot; data-dcnode-id=&quot;1259&quot;&gt;&lt;span data-dcnode-id=&quot;1260&quot; instrument_node=&quot;&quot;&gt;More miles + ample freight = a bigger paycheck.&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1258&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1256&quot;&gt;&lt;span data-dcnode-id=&quot;1257&quot; instrument_node=&quot;&quot;&gt;We know the importance of giving our drivers the most miles and the most freight possible. We get you the paychecks that you deserve and make it easy for you to earn the money you want. Our management works with you to get you the most miles, the most freight, and the most pay.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1255&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 class=&quot;white-text unset&quot; data-dcnode-id=&quot;1253&quot;&gt;&lt;span data-dcnode-id=&quot;1254&quot; instrument_node=&quot;&quot;&gt;Great medical, dental, and vision benefits to keep you healthy.&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1252&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1250&quot;&gt;&lt;span data-dcnode-id=&quot;1251&quot; instrument_node=&quot;&quot;&gt;Beyond competitive pay, we also offer competitive healthcare. We know that it’s important for you to have the best possible health insurance, including dental and vision benefits. When you start a truck driving career with DSW, we make it easy for you to stay healthy and happy.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1249&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 class=&quot;white-text unset&quot; data-dcnode-id=&quot;1247&quot;&gt;&lt;span data-dcnode-id=&quot;1248&quot; instrument_node=&quot;&quot;&gt;Bring a companion on the road and see the country together.&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1246&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1244&quot;&gt;&lt;span data-dcnode-id=&quot;1245&quot; instrument_node=&quot;&quot;&gt;We offer the option for you to bring a companion with you. This improves your truck driving environment and makes driving for us an even more rewarding experience. We also offer team driving and can match you with other drivers to help you earn more.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1243&quot; instrument_node=&quot;&quot;&gt;
