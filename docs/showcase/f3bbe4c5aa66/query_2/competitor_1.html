&lt;/span&gt;&lt;/section&gt;&lt;span data-dcnode-id=&quot;467&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;section data-dcnode-id=&quot;279&quot; id=&quot;postContent&quot;&gt;&lt;span data-dcnode-id=&quot;466&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;container&quot; data-dcnode-id=&quot;281&quot;&gt;&lt;span data-dcnode-id=&quot;465&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;content&quot; data-dcnode-id=&quot;286&quot;&gt;&lt;span data-dcnode-id=&quot;464&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;458&quot;&gt;&lt;span data-dcnode-id=&quot;462&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;463&quot; instrument_node=&quot;&quot;&gt;There’s a lot of talk surrounding the truck driving industry these days. The coronavirus pandemic has highlighted truck driving as one of the most essential industries in the nation, and Americans around the country are taking time to thank drivers for the great work they’ve been doing. Just plug #ThankATrucker into Twitter and you see hundreds of examples of gratitude! Along with that realization, people have also been asking the question, “What is the future of truck driving?”&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;459&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;br data-dcnode-id=&quot;461&quot;&gt;&lt;span data-dcnode-id=&quot;460&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;457&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;454&quot;&gt;&lt;span data-dcnode-id=&quot;455&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;img alt=&quot;What Is the Future of Truck Driving?&quot; class=&quot;aligncenter size-full wp-image-25407&quot; data-dcnode-id=&quot;456&quot; height=&quot;837&quot; sizes=&quot;(max-width: 1254px) 100vw, 1254px&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.drivebigtrucks.com/wp-content/uploads/2020/08/What-Is-the-Future-of-Truck-Driving.jpg&amp;amp;raw&quot; srcset=&quot;https://www.drivebigtrucks.com/wp-content/uploads/2020/08/What-Is-the-Future-of-Truck-Driving.jpg 1254w, https://www.drivebigtrucks.com/wp-content/uploads/2020/08/What-Is-the-Future-of-Truck-Driving-300x200.jpg 300w, https://www.drivebigtrucks.com/wp-content/uploads/2020/08/What-Is-the-Future-of-Truck-Driving-1024x683.jpg 1024w, https://www.drivebigtrucks.com/wp-content/uploads/2020/08/What-Is-the-Future-of-Truck-Driving-768x513.jpg 768w&quot; width=&quot;1254&quot;&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;453&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;450&quot;&gt;&lt;span data-dcnode-id=&quot;451&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;452&quot; instrument_node=&quot;&quot;&gt;This question has come up in part because of the pandemic and the hot topics of automation and electrification. Tech disruptors have been searching for ways to usher these changes into our everyday lives. To name a few key players, think of companies like Tesla, Waymo, GM Cruise, Argo AI, and Aurora.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;449&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;446&quot;&gt;&lt;span data-dcnode-id=&quot;447&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;448&quot; instrument_node=&quot;&quot;&gt;But do truck drivers in this generation need to worry about losing their jobs to driverless trucks? Furthermore, what new technologies do we see today, and what technologies can we expect to see in the immediate future?&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;445&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;442&quot;&gt;&lt;span data-dcnode-id=&quot;443&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;444&quot; instrument_node=&quot;&quot;&gt;This article takes a hard look and what is the future of truck driving by answering the above questions.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;441&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;438&quot;&gt;&lt;span data-dcnode-id=&quot;439&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;440&quot; instrument_node=&quot;&quot;&gt;How Close Are Self Driving Trucks?&lt;/span&gt;&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;437&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;434&quot;&gt;&lt;span data-dcnode-id=&quot;435&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;436&quot; instrument_node=&quot;&quot;&gt;Of course, the first thing we have to mention when answering the question, “What is the future of truck driving?” is driverless technology. Autonomous vehicles mean taking drivers out of the driver’s seat and turning industries like truck driving on its head.&amp;nbsp;&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;433&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;422&quot;&gt;&lt;span data-dcnode-id=&quot;428&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;432&quot; instrument_node=&quot;&quot;&gt;We’ve already seen the first few major &lt;/span&gt;&lt;a data-dcnode-id=&quot;430&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.cfrrinkens.com/news/what-is-the-outlook-for-autonomous-semi-trucks/&quot;&gt;&lt;span data-dcnode-id=&quot;431&quot; instrument_node=&quot;&quot;&gt;steps towards driverless vehicles&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;429&quot; instrument_node=&quot;&quot;&gt;. Many Tesla models have an autopilot feature that allows them to navigate interstates without driver input, and companies like &lt;/span&gt;&lt;/span&gt;&lt;a data-dcnode-id=&quot;425&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.trucks.com/2020/08/25/waymo-autonomous-truck-tests/&quot;&gt;&lt;span data-dcnode-id=&quot;426&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;427&quot; instrument_node=&quot;&quot;&gt;Waymo have been testing driverless semi-truck prototypes&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;423&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;424&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;421&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;418&quot;&gt;&lt;span data-dcnode-id=&quot;419&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;420&quot; instrument_node=&quot;&quot;&gt;These changes may alarm truck drivers. Here’s the good news—automation of this nature is still too young, and we likely won’t see any real-world implementation of automation for a long time due to several different factors.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;417&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ol data-dcnode-id=&quot;396&quot;&gt;&lt;span data-dcnode-id=&quot;416&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;412&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;413&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;414&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;415&quot; instrument_node=&quot;&quot;&gt;Compared to other technologies, there are virtually no laws or regulations for automated driving. For example, take liability law into account. If an accident happened between a driverless car and a manned vehicle, where would the liability lie? There is no precedent for cases like these, and widespread implementation of autonomous vehicles would require a significant overhaul to liability law and many other areas of the law.&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;411&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;407&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;408&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;409&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;410&quot; instrument_node=&quot;&quot;&gt;The technology is still new, and there is little public trust in it. Much like when electricity was first implemented in systems like streetcars and trams in the late 1800s, there was little public trust, and full implementation took a long time. Technologies like driverless cars will need a lot of vetting and advancement before ethically being employed and widely trusted by everyday citizens.&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;406&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;402&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;403&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;404&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;405&quot; instrument_node=&quot;&quot;&gt;Automation cannot take place because the human element still interferes. You may have seen news about Tesla crashes involving the autopilot feature. These crashes involve inattentive drivers who are unaware of what’s going on around them. As good as technology like autopilot is, it still is nowhere near as good a driver as a human being. On top of that, unexpected obstacles and events outside the car pose a danger to drivers who are over-reliant on autopilot.&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;401&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;398&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;399&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;400&quot; instrument_node=&quot;&quot;&gt;Automation technology is also costly. That’s because there’s no manufacturing on the scale of regular cars that drives down the prices. We won’t see a widespread implementation until there are systems in place that streamline production on a scale that makes it affordable.&lt;/span&gt;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;397&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ol&gt;&lt;span data-dcnode-id=&quot;395&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;392&quot;&gt;&lt;span data-dcnode-id=&quot;393&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;394&quot; instrument_node=&quot;&quot;&gt;Those are four of the most obvious reasons why we won’t see driverless trucks soon in addition to the hefty obstacles they pose.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;391&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;383&quot;&gt;&lt;span data-dcnode-id=&quot;389&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;390&quot; instrument_node=&quot;&quot;&gt;Truck driving is still as secure as it’s ever been, and &lt;/span&gt;&lt;/span&gt;&lt;a data-dcnode-id=&quot;386&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.drivebigtrucks.com/blog/how-to-know-if-a-trucking-career-is-for-you/&quot;&gt;&lt;span data-dcnode-id=&quot;387&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;388&quot; instrument_node=&quot;&quot;&gt;it’s a great career choice&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;384&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;385&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;382&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;379&quot;&gt;&lt;span data-dcnode-id=&quot;380&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;381&quot; instrument_node=&quot;&quot;&gt;What Kinds of Technology Do Truck Drivers Have Now?&lt;/span&gt;&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;378&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;375&quot;&gt;&lt;span data-dcnode-id=&quot;376&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;377&quot; instrument_node=&quot;&quot;&gt;The second point is the technologies that have already been implemented in our lifetimes outside of driverless technology.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;374&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;361&quot;&gt;&lt;span data-dcnode-id=&quot;372&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;373&quot; instrument_node=&quot;&quot;&gt;Times of stress usher change, and &lt;/span&gt;&lt;/span&gt;&lt;a data-dcnode-id=&quot;369&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.drivebigtrucks.com/blog/how-coronavirus-affects-trucking-and-other-industries/&quot;&gt;&lt;span data-dcnode-id=&quot;370&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;371&quot; instrument_node=&quot;&quot;&gt;coronavirus&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;367&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;368&quot; instrument_node=&quot;&quot;&gt; has brought about the need for &lt;/span&gt;&lt;/span&gt;&lt;a data-dcnode-id=&quot;364&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.ttnews.com/articles/trucking-companies-adapt-coronavirus-realities&quot;&gt;&lt;span data-dcnode-id=&quot;365&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;366&quot; instrument_node=&quot;&quot;&gt;new technologies in the cab&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;362&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;363&quot; instrument_node=&quot;&quot;&gt;. We’re seeing more remote work at truck driving companies, and some have provided their carriers with tech that helps them limit contact on drop offs and deliveries. There are also other technological aids that help truck drivers find meals since many truck stops and restaurants are closed.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;360&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;357&quot;&gt;&lt;span data-dcnode-id=&quot;358&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;359&quot; instrument_node=&quot;&quot;&gt;It’s safe to say many of these changes will stick around for some time, if not permanently.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;356&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;348&quot;&gt;&lt;span data-dcnode-id=&quot;354&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;355&quot; instrument_node=&quot;&quot;&gt;Some of the more advanced models feature adaptive cruise control (ACC). &lt;/span&gt;&lt;/span&gt;&lt;a data-dcnode-id=&quot;351&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.cnet.com/roadshow/news/ces-2019-daimler-class-8-trucks-adas/&quot;&gt;&lt;span data-dcnode-id=&quot;352&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;353&quot; instrument_node=&quot;&quot;&gt;ACC&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;349&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;350&quot; instrument_node=&quot;&quot;&gt; automatically regulates the truck’s speed by sensing the car in front, and applying gas and brakes when necessary. The traditional cruise control simply maintains speed without applying brakes.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;347&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;339&quot;&gt;&lt;span data-dcnode-id=&quot;345&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;346&quot; instrument_node=&quot;&quot;&gt;As the world marches forward, many truck driving technologies are beginning to show their age. We should also expect to see improved communication devices, navigation software, and other overhauls for truck drivers soon. &lt;/span&gt;&lt;/span&gt;&lt;a data-dcnode-id=&quot;342&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.ccjdigital.com/technology-startup-haul-matches-truck-drivers-to-fleets/&quot;&gt;&lt;span data-dcnode-id=&quot;343&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;344&quot; instrument_node=&quot;&quot;&gt;Take for example, Haul&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;340&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;341&quot; instrument_node=&quot;&quot;&gt;, an app that is designed to match drivers with hauls.&amp;nbsp;&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;338&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;335&quot;&gt;&lt;span data-dcnode-id=&quot;336&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;337&quot; instrument_node=&quot;&quot;&gt;Electrification and the Future of the Truck Driving Industry&lt;/span&gt;&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;334&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;331&quot;&gt;&lt;span data-dcnode-id=&quot;332&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;333&quot; instrument_node=&quot;&quot;&gt;One tech disruption that seems likely within our lifetimes is electric trucks. There is a massive amount of public backing of electric vehicles in general, and you probably see several completely electric vehicles on the road every week.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;330&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;319&quot;&gt;&lt;a data-dcnode-id=&quot;327&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.teslarati.com/tesla-semi-ramp-54k-electric-trucks-in-2025-study/&quot;&gt;&lt;span data-dcnode-id=&quot;328&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;329&quot; instrument_node=&quot;&quot;&gt;Tesla is developing their vision of an all-electric truck&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;325&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;326&quot; instrument_node=&quot;&quot;&gt; while competitor &lt;/span&gt;&lt;/span&gt;&lt;a data-dcnode-id=&quot;322&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.forbes.com/sites/greatspeculations/2020/08/07/nikola-updates-whats-happening-with-teslas-electric-truck-rival/%2364f794ca1106&quot;&gt;&lt;span data-dcnode-id=&quot;323&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;324&quot; instrument_node=&quot;&quot;&gt;Nikola continues to grow support and funding&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;320&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;321&quot; instrument_node=&quot;&quot;&gt;. Nikola’s plan is to power semi-trucks with a hydrogen fuel cell in place of a battery.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;318&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;315&quot;&gt;&lt;span data-dcnode-id=&quot;316&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;317&quot; instrument_node=&quot;&quot;&gt;On a smaller scale, plenty of regional transport companies use electric vans and other vehicles.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;314&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;311&quot;&gt;&lt;span data-dcnode-id=&quot;312&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;313&quot; instrument_node=&quot;&quot;&gt;What Is the Future of Truck Driving? Get Started With TDI&lt;/span&gt;&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;310&quot; instrument_node=&quot;&quot;&gt;
