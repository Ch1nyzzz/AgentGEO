&lt;/span&gt;&lt;li data-dcnode-id=&quot;1553&quot;&gt;&lt;span data-dcnode-id=&quot;1556&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a data-dcnode-id=&quot;1554&quot; href=&quot;#_005&quot;&gt;&lt;span data-dcnode-id=&quot;1555&quot; instrument_node=&quot;&quot;&gt;3 Best Practices for Merit-Based Diversity in the Workplace&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1552&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;1550&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;1547&quot;&gt;&lt;a data-dcnode-id=&quot;1548&quot; id=&quot;_001&quot; style=&quot;padding-top: 10px; margin-top: -10px;&quot;&gt;&lt;span data-dcnode-id=&quot;1549&quot; instrument_node=&quot;&quot;&gt;What Is Diversity in the Workplace? &lt;/span&gt;&lt;/a&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;1546&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1544&quot;&gt;&lt;span data-dcnode-id=&quot;1545&quot; instrument_node=&quot;&quot;&gt;Enabling diversity in the workplace simply means making an effort to employ a broad cross-section of people from different demographics. Workplace diversity may be defined as a trait of company culture wherein the workforce composition includes employees of different genders, age, sexual orientation, religions, languages, abilities, professional backgrounds, socioeconomic backgrounds, and educational backgrounds.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1543&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1538&quot;&gt;&lt;span data-dcnode-id=&quot;1542&quot; instrument_node=&quot;&quot;&gt;As the global population becomes increasingly mobile, diversity is now a critical factor in most communities. &lt;/span&gt;&lt;a data-dcnode-id=&quot;1540&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.weforum.org/agenda/2019/04/business-case-for-diversity-in-the-workplace/&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1541&quot; instrument_node=&quot;&quot;&gt;The World Economic Forum (WEF) noted &lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1539&quot; instrument_node=&quot;&quot;&gt;that some of the world’s most prosperous business centers like New York, Dubai, London, and Singapore have one thing in common: they all boast of a high degree of diversity. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1537&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1532&quot;&gt;&lt;span data-dcnode-id=&quot;1536&quot; instrument_node=&quot;&quot;&gt;At a micro-level, diversity brings in varying points of view and disruptive thought processes, preventing companies from stagnating or becoming complacent. A 2019 &lt;/span&gt;&lt;a data-dcnode-id=&quot;1534&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.pewsocialtrends.org/2019/05/08/americans-see-advantages-and-challenges-in-countrys-growing-racial-and-ethnic-diversity/&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1535&quot; instrument_node=&quot;&quot;&gt;survey of 6,600+ Americans&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1533&quot; instrument_node=&quot;&quot;&gt; found that a sizable 75% believe it is very/somewhat important for companies to promote racial and ethnic diversity. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1531&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1529&quot;&gt;&lt;span data-dcnode-id=&quot;1530&quot; instrument_node=&quot;&quot;&gt;Diversity goes hand in hand with two other concepts: &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1528&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;1519&quot;&gt;&lt;span data-dcnode-id=&quot;1527&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1521&quot;&gt;&lt;b data-dcnode-id=&quot;1525&quot;&gt;&lt;span data-dcnode-id=&quot;1526&quot; instrument_node=&quot;&quot;&gt;Inclusion: &lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;1524&quot; instrument_node=&quot;&quot;&gt;Not only do companies employ professionals belonging to different demographic groups, but they treat them equally – paying the same wages, providing equal learning opportunities, and sharing workloads equitably.&lt;/span&gt;&lt;b data-dcnode-id=&quot;1522&quot;&gt;&lt;span data-dcnode-id=&quot;1523&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/b&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1520&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;1518&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;1510&quot;&gt;&lt;span data-dcnode-id=&quot;1517&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1512&quot;&gt;&lt;span data-dcnode-id=&quot;1516&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;b data-dcnode-id=&quot;1514&quot;&gt;&lt;span data-dcnode-id=&quot;1515&quot; instrument_node=&quot;&quot;&gt;Equity: &lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;1513&quot; instrument_node=&quot;&quot;&gt;Companies level the playing field between different demographics through proactive action. For instance, all employees are offered the same learning opportunities, but education is sponsored for those previously incarcerated. &lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1511&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;1509&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1504&quot;&gt;&lt;span data-dcnode-id=&quot;1508&quot; instrument_node=&quot;&quot;&gt;Together, &lt;/span&gt;&lt;a data-dcnode-id=&quot;1506&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.hrtechnologist.com/articles/diversity/workplace-equity-diversity-inclusion/&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1507&quot; instrument_node=&quot;&quot;&gt;diversity, inclusion, and equity &lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1505&quot; instrument_node=&quot;&quot;&gt;help to build a workplace that’s conducive and welcoming to every employee – opening the company up to the best talent out there, without bias. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1503&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1497&quot;&gt;&lt;span data-dcnode-id=&quot;1502&quot; instrument_node=&quot;&quot;&gt;Learn More:&lt;/span&gt;&lt;b data-dcnode-id=&quot;1500&quot;&gt;&lt;span data-dcnode-id=&quot;1501&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/b&gt;&lt;a data-dcnode-id=&quot;1498&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//hr.toolbox.com/articles/what-is-an-inclusive-workplace&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1499&quot; instrument_node=&quot;&quot;&gt;What Is an Inclusive Workplace? Definition, Best Practices, and Tools&lt;/span&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1496&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;1493&quot;&gt;&lt;a data-dcnode-id=&quot;1494&quot; id=&quot;_002&quot; style=&quot;padding-top: 10px; margin-top: -10px;&quot;&gt;&lt;span data-dcnode-id=&quot;1495&quot; instrument_node=&quot;&quot;&gt;Importance of Merit-Based Diversity and Inclusion in the Workplace &lt;/span&gt;&lt;/a&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;1492&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1490&quot;&gt;&lt;span data-dcnode-id=&quot;1491&quot; instrument_node=&quot;&quot;&gt;Merit-based diversity is a widespread practice among companies across the globe. It implies that candidates will be selected based only on merit, and employees will be promoted or given additional responsibility only if they have demonstrated their excellence. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1489&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1487&quot;&gt;&lt;span data-dcnode-id=&quot;1488&quot; instrument_node=&quot;&quot;&gt;The survey we cited found that according to 74% of Americans, companies should take only qualifications into account when hiring or promoting individuals. This indicates clear support for merit-based diversity. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1486&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1484&quot;&gt;&lt;span data-dcnode-id=&quot;1485&quot; instrument_node=&quot;&quot;&gt;How can this help? There are three benefits: &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1483&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;1481&quot;&gt;&lt;span data-dcnode-id=&quot;1482&quot; instrument_node=&quot;&quot;&gt;1. Ethics&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1480&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1478&quot;&gt;&lt;span data-dcnode-id=&quot;1479&quot; instrument_node=&quot;&quot;&gt;Merit-based diversity is ethical. Consider a movie where the lead actor is chosen based on the producer’s personal network and preferences. Now consider one with an open casting call, where thousands of applicants audition and the best candidate is selected. The second scenario may take longer, but it is an ethical process as it offers the same opportunity to a diverse group of people. This is what merit-based hiring diversity tries to achieve. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1477&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;1475&quot;&gt;&lt;span data-dcnode-id=&quot;1476&quot; instrument_node=&quot;&quot;&gt;2. Productivity &lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1474&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1472&quot;&gt;&lt;span data-dcnode-id=&quot;1473&quot; instrument_node=&quot;&quot;&gt;Hiring for merit-based diversity provides a richer pool of candidates who are likely to be more productive. Also, merit-based diversity builds up cognitive productivity over time, which means the organization can keep evolving in terms of efficiency. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1471&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;1469&quot;&gt;&lt;span data-dcnode-id=&quot;1470&quot; instrument_node=&quot;&quot;&gt;3. Long-term requirements &lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1468&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1466&quot;&gt;&lt;span data-dcnode-id=&quot;1467&quot; instrument_node=&quot;&quot;&gt;A non-diverse workforce may likely follow the same work pattern and processes across years, becoming resistant to change. Eventually, this will hold back a company’s agility and sustainability. Merit-based diversity – comprising a diverse C-suite, a diverse board of directors, diverse investors, and diverse shareholders – is integral to long-term success. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1465&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1463&quot;&gt;&lt;span data-dcnode-id=&quot;1464&quot; instrument_node=&quot;&quot;&gt;Merit-based hiring prioritizes the sheer quality of talent above personal intuition, existing professional networks, or any form of bias. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1462&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1458&quot;&gt;&lt;span data-dcnode-id=&quot;1461&quot; instrument_node=&quot;&quot;&gt;Learn More: &lt;/span&gt;&lt;a data-dcnode-id=&quot;1459&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//hr.toolbox.com/news/diversity-concerns-lead-to-adidas-hr-chief-stepping-down&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1460&quot; instrument_node=&quot;&quot;&gt;Diversity Concerns Lead to Adidas HR Chief Stepping Down&lt;/span&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1457&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;1454&quot;&gt;&lt;a data-dcnode-id=&quot;1455&quot; id=&quot;_003&quot; style=&quot;padding-top: 10px; margin-top: -10px;&quot;&gt;&lt;span data-dcnode-id=&quot;1456&quot; instrument_node=&quot;&quot;&gt;Key Benefits of Having a Merit-Based Diverse Workforce &lt;/span&gt;&lt;/a&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;1453&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1451&quot;&gt;&lt;span data-dcnode-id=&quot;1452&quot; instrument_node=&quot;&quot;&gt;There are several ways to make diversity a part of the hiring and workforce management strategy, and a merit-based system is among the most popular approaches. In a merit-based diverse workforce, every employee is evaluated as per their quality of work (both performance and potential), and not any personal traits. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1450&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1447&quot;&gt;&lt;span data-dcnode-id=&quot;1449&quot; instrument_node=&quot;&quot;&gt;An employee’s ethnic background, country of origin, native language, past employment history, or even personality traits like extrovert/introvert don’t matter in a merit-based scenario. This leads to the following key benefits: &lt;/span&gt;&lt;img alt=&quot;&quot; class=&quot;lazyload&quot; data-dcnode-id=&quot;1448&quot; data-src=&quot;https://images.toolbox.demandshore.com/bc/73/bc12223a4f288da2b2dc320b8d12/benefits-of-a-diverse-workforce.png&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//images.toolbox.demandshore.com/bc/73/bc12223a4f288da2b2dc320b8d12/benefits-of-a-diverse-workforce.png&amp;amp;raw&quot;&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1446&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;cms-textAlign-center&quot; data-dcnode-id=&quot;1443&quot;&gt;&lt;b data-dcnode-id=&quot;1444&quot;&gt;&lt;span data-dcnode-id=&quot;1445&quot; instrument_node=&quot;&quot;&gt;Fig 2. The benefits of a diverse workforce&lt;/span&gt;&lt;/b&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1442&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;1440&quot;&gt;&lt;span data-dcnode-id=&quot;1441&quot; instrument_node=&quot;&quot;&gt;1. It boosts the quality of hire and addresses skill gaps &lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1439&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1431&quot;&gt;&lt;span data-dcnode-id=&quot;1438&quot; instrument_node=&quot;&quot;&gt;In a merit-based system, an employee’s skills and capabilities come under scrutiny. This makes it easier to &lt;/span&gt;&lt;a data-dcnode-id=&quot;1436&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.hrtechnologist.com/articles/recruitment-onboarding/bridging-the-skills-gap-with-skillsbased-hiring/&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1437&quot; instrument_node=&quot;&quot;&gt;bridge skill gaps&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1435&quot; instrument_node=&quot;&quot;&gt;, as recruiters know exactly which skills to hire for and can assess if an employee brings those skills to the table. For instance, in a digital transformation project that requires system integrators, assessing candidates only on their expertise or potential in the field through a skill assessment will boost the &lt;/span&gt;&lt;a data-dcnode-id=&quot;1433&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.hrtechnologist.com/articles/recruitment-onboarding/reasons-for-measuring-quality-of-hire/&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1434&quot; instrument_node=&quot;&quot;&gt;overall quality of hire&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1432&quot; instrument_node=&quot;&quot;&gt;. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1430&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;1428&quot;&gt;&lt;span data-dcnode-id=&quot;1429&quot; instrument_node=&quot;&quot;&gt;2. It helps to spur innovation and disruption &lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1427&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1425&quot;&gt;&lt;span data-dcnode-id=&quot;1426&quot; instrument_node=&quot;&quot;&gt;Merit-based diversity will bring together the brightest minds from a wide variety of backgrounds. This combats groupthink (a phenomenon where a homogeneous group finds it difficult to solve problems due to the lack of disruptive ideas) and encourages cognitive diversity. Over time, a company’s cognitive diversity can enable rapid innovation in core areas such as new product development, marketing outreach, and business transformation. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1424&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;1422&quot;&gt;&lt;span data-dcnode-id=&quot;1423&quot; instrument_node=&quot;&quot;&gt;3. It eases a company’s entry into new geographies and customer segments &lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1421&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1419&quot;&gt;&lt;span data-dcnode-id=&quot;1420&quot; instrument_node=&quot;&quot;&gt;It is easy to see how merit-based diversity could act as a catalyst for business expansion, helping an organization reach diverse audiences and geographies. A company employing talented professionals from across the world will find it much easier to make inroads into an unfamiliar market, than a company that relies only on candidates sourced from its HQ’s nearby regions. It brings perspectives and knowledge specific to the region and allows easier access to the market. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1418&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;1416&quot;&gt;&lt;span data-dcnode-id=&quot;1417&quot; instrument_node=&quot;&quot;&gt;4. It positions organizations as a preferred employer &lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1415&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1413&quot;&gt;&lt;span data-dcnode-id=&quot;1414&quot; instrument_node=&quot;&quot;&gt;We live in the age of social media, where every employee will share their workplace experience, either on professional platforms (Glassdoor, Indeed, etc.) or through their personal networks. Merit-based diversity will earn organizations goodwill among the employee and candidate community, as everyone feels welcome in the workplace even as they are motivated to display their abilities. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1412&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;1410&quot;&gt;&lt;span data-dcnode-id=&quot;1411&quot; instrument_node=&quot;&quot;&gt;5. It creates a resilient succession plan and leadership pipeline&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1409&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1404&quot;&gt;&lt;span data-dcnode-id=&quot;1408&quot; instrument_node=&quot;&quot;&gt;Organizations need a leadership pipeline marked by talented professionals that is resilient to changing market dynamics. Diverse leadership brings the much-needed agility, creating familiarity with different cultures as well as adding to the company’s cognitive diversity. Combine this with merit-based hiring and promotions, and it helps create a &lt;/span&gt;&lt;a data-dcnode-id=&quot;1406&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.hrtechnologist.com/articles/leadership-succession/technology-is-vital-for-any-succession-planning-strategy/&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1407&quot; instrument_node=&quot;&quot;&gt;succession plan&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1405&quot; instrument_node=&quot;&quot;&gt; that’s highly resilient and populated with the most talented professionals in the company. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1403&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;1401&quot;&gt;&lt;span data-dcnode-id=&quot;1402&quot; instrument_node=&quot;&quot;&gt;6. It fosters a culture of inclusion and employee-centricity &lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1400&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1398&quot;&gt;&lt;span data-dcnode-id=&quot;1399&quot; instrument_node=&quot;&quot;&gt;This is the first and foremost benefit of pursuing merit-based diversity. It builds a culture of inclusion that values employees and actively fights for the representation of minority groups. As a new generation of employees enters the workplace, this atmosphere of inclusion, camaraderie, and respect is essential if to reach the desired productivity goals.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1397&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1395&quot;&gt;&lt;span data-dcnode-id=&quot;1396&quot; instrument_node=&quot;&quot;&gt;Finally, merit-based diversity makes decision-making processes more transparent, eliminating any risk of bias or favoritism, as there is an explicit parameter for selection. And this is on top of the ethical aspect of it. So, why don’t more companies espouse merit-based diversity? &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1394&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1390&quot;&gt;&lt;span data-dcnode-id=&quot;1393&quot; instrument_node=&quot;&quot;&gt;Learn More: &lt;/span&gt;&lt;a data-dcnode-id=&quot;1391&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//hr.toolbox.com/news/ibm-aims-to-address-bias-by-ending-its-facial-recognition-businesses&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1392&quot; instrument_node=&quot;&quot;&gt;IBM Aims to Address Bias by Ending Its Facial Recognition Businesses&lt;/span&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1389&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;1386&quot;&gt;&lt;a data-dcnode-id=&quot;1387&quot; id=&quot;_004&quot; style=&quot;padding-top: 10px; margin-top: -10px;&quot;&gt;&lt;span data-dcnode-id=&quot;1388&quot; instrument_node=&quot;&quot;&gt;What Are the Challenges of Building a Diverse Workforce?&lt;/span&gt;&lt;/a&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;1385&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1383&quot;&gt;&lt;span data-dcnode-id=&quot;1384&quot; instrument_node=&quot;&quot;&gt;Any sort of transformation comes with hurdles. But that doesn’t mean it isn’t worth an investment. Instead, challenges should be accounted for when transforming the workplace with an eye on increased diversity. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1382&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1380&quot;&gt;&lt;span data-dcnode-id=&quot;1381&quot; instrument_node=&quot;&quot;&gt;Here are some of the critical challenges to expect: &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1379&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;1377&quot;&gt;&lt;span data-dcnode-id=&quot;1378&quot; instrument_node=&quot;&quot;&gt;1. Navigating immigration and employment laws can be difficult&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1376&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1374&quot;&gt;&lt;span data-dcnode-id=&quot;1375&quot; instrument_node=&quot;&quot;&gt;This is an operational challenge, one that can prevent many merit-based diversity hires from being executed. Imagine a company that has conducted its equivalent of an open casting call, interviewing hundreds of candidates online to find the perfect fit. But it appears that 50% of the shortlist comprises candidates with different countries of origin, posing immigration complexities. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1373&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1365&quot;&gt;&lt;span data-dcnode-id=&quot;1372&quot; instrument_node=&quot;&quot;&gt;It might be tempting to avoid these complexities altogether and consider the remaining 50% who are situated closer to home. But this goes against merit-based diversity, which presents the risk of losing out on the best available candidates. Companies could work with their local government to streamline &lt;/span&gt;&lt;a data-dcnode-id=&quot;1370&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.hrtechnologist.com/articles/recruitment-onboarding/recruiters-without-borders-how-to-create-and-manage-a-foreign-talent-pipeline/&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1371&quot; instrument_node=&quot;&quot;&gt;hiring across international borders&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1369&quot; instrument_node=&quot;&quot;&gt; to stay compliant while they pursue merit-based diversity. Another increasingly popular idea is to provide the opportunity for full-time remote work, where candidates use &lt;/span&gt;&lt;a data-dcnode-id=&quot;1367&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.hrtechnologist.com/articles/digital-transformation/5-best-video-conferencing-tools-small-business-remote-employees/&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1368&quot; instrument_node=&quot;&quot;&gt;digital collaboration tools&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1366&quot; instrument_node=&quot;&quot;&gt; without having to relocate. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1364&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;1362&quot;&gt;&lt;span data-dcnode-id=&quot;1363&quot; instrument_node=&quot;&quot;&gt;2. Varying work styles could lead to conflict&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1361&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1359&quot;&gt;&lt;span data-dcnode-id=&quot;1360&quot; instrument_node=&quot;&quot;&gt;This is among the common issues organizations may face after switching to merit-based diversity. The workplace will now include people with different personalities, backgrounds, and approaches, all with their preferred mode of working. Consider a work environment where a veteran in their fifties works alongside a group of Gen Z coders. Initially, there might be a conflict in approaches and viewpoints. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1358&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1356&quot;&gt;&lt;span data-dcnode-id=&quot;1357&quot; instrument_node=&quot;&quot;&gt;Fortunately, this challenge is easy to address. These conflicts arise from differences that should be celebrated, not negated. As a result, companies can create an atmosphere where employees express interest in their colleagues’ perspectives, seeking an explanation instead of following up with an argument. Such conflict is central to cognitive diversity. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1355&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;1353&quot;&gt;&lt;span data-dcnode-id=&quot;1354&quot; instrument_node=&quot;&quot;&gt;3. Even merit-based hiring could become one-dimensional&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1352&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1350&quot;&gt;&lt;span data-dcnode-id=&quot;1351&quot; instrument_node=&quot;&quot;&gt;Consider a company that wants to hire based on merit but hasn’t invested in defining a multifaceted strategy document. Instead, the company considers a superficial measure of excellence – such as a degree from an Ivy League school. Over time, this leads to a one-dimensional workforce as candidates from a similar educational background with near-identical work histories are recruited into the company. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1349&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1347&quot;&gt;&lt;span data-dcnode-id=&quot;1348&quot; instrument_node=&quot;&quot;&gt;This requires a carefully outlined merit-based hiring strategy based on diverse decision-making flows. It also requires the implementation of technology to avoid diversity hiring bottlenecks and training decision-makers to exercise their discretion with a focus on ethics. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1346&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;1344&quot;&gt;&lt;span data-dcnode-id=&quot;1345&quot; instrument_node=&quot;&quot;&gt;4. Some stakeholders could be resistant to change &lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1343&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1341&quot;&gt;&lt;span data-dcnode-id=&quot;1342&quot; instrument_node=&quot;&quot;&gt;Embracing merit-based diversity means undoing centuries of prejudice that are ingrained in our thought processes and institutions. The first step is to acknowledge this and the resulting risk of unconscious bias before moving ahead. Some stakeholders, particularly those who have been with the organization for a long time, and are familiar with a different approach, could be resistant to change. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1340&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1335&quot;&gt;&lt;span data-dcnode-id=&quot;1339&quot; instrument_node=&quot;&quot;&gt;It is crucial to tackle this challenge head-on. By offering &lt;/span&gt;&lt;a data-dcnode-id=&quot;1337&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.hrtechnologist.com/articles/diversity/is-unconscious-bias-training-enough-to-eliminate-workplace-bias/&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1338&quot; instrument_node=&quot;&quot;&gt;training against unconscious bias&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1336&quot; instrument_node=&quot;&quot;&gt; and explaining the value of merit-based hiring, diversity teams can obtain buy-in from every stakeholder, creating a nurturing work environment that’s conducive to every profession. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1334&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1330&quot;&gt;&lt;span data-dcnode-id=&quot;1333&quot; instrument_node=&quot;&quot;&gt;Learn More:  &lt;/span&gt;&lt;a data-dcnode-id=&quot;1331&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//hr.toolbox.com/blogs/henrykaiser/eliminating-unconscious-bias-moving-toward-diversity-in-the-workforce-061819&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1332&quot; instrument_node=&quot;&quot;&gt;Eliminating Unconscious Bias: Moving toward Diversity in the Workforce&lt;/span&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1329&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;1326&quot;&gt;&lt;a data-dcnode-id=&quot;1327&quot; id=&quot;_005&quot; style=&quot;padding-top: 10px; margin-top: -10px;&quot;&gt;&lt;span data-dcnode-id=&quot;1328&quot; instrument_node=&quot;&quot;&gt;3 Best Practices for Merit-Based Diversity in the Workplace &lt;/span&gt;&lt;/a&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;1325&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1321&quot;&gt;&lt;a data-dcnode-id=&quot;1323&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.mckinsey.com/~/media/mckinsey/business%2520functions/organization/our%2520insights/delivering%2520through%2520diversity/delivering-through-diversity_full-report.ashx&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1324&quot; instrument_node=&quot;&quot;&gt;McKinsey found&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1322&quot; instrument_node=&quot;&quot;&gt; that companies in the bottom quartile for gender and ethnic/cultural diversity are 29% less likely to see above-average profits than diverse companies. Depending on the scale of a business, this could mean thousands or even millions of dollars in variance. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1320&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1318&quot;&gt;&lt;span data-dcnode-id=&quot;1319&quot; instrument_node=&quot;&quot;&gt;That’s why diversity in the workplace is so important – and merit-based systems are an excellent way to go. Here are a few best practices to remember when implementing merit-based diversity: &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1317&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;1306&quot;&gt;&lt;span data-dcnode-id=&quot;1316&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1314&quot;&gt;&lt;span data-dcnode-id=&quot;1315&quot; instrument_node=&quot;&quot;&gt; Adopt blind hiring so that there is zero risk of bias creeping in &lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1313&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1311&quot;&gt;&lt;span data-dcnode-id=&quot;1312&quot; instrument_node=&quot;&quot;&gt; Target a vast candidate pool without limiting recruitment efforts to a specific network or job portal &lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1310&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1308&quot;&gt;&lt;span data-dcnode-id=&quot;1309&quot; instrument_node=&quot;&quot;&gt; Institute mechanisms for reporting activities that go against the merit-based diversity policy &lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1307&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;1305&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1303&quot;&gt;&lt;span data-dcnode-id=&quot;1304&quot; instrument_node=&quot;&quot;&gt;The last point is probably the most crucial. Merit-based diversity makes a difference only when there is an actionable enforcement plan for it. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1302&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1300&quot;&gt;&lt;span data-dcnode-id=&quot;1301&quot; instrument_node=&quot;&quot;&gt;By setting up a dedicated diversity task force and placing institutionalized channels to report policy violations, an organization’s diversity and inclusion strategies become more sustainable, rewarding positive behavior, and taking the company to new heights of success. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1299&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1287&quot;&gt;&lt;i data-dcnode-id=&quot;1288&quot;&gt;&lt;span data-dcnode-id=&quot;1298&quot; instrument_node=&quot;&quot;&gt;What measures have you taken to build a diverse workplace? Share your insights with our readers on &lt;/span&gt;&lt;a data-dcnode-id=&quot;1296&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.facebook.com/ToolboxforHR/&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1297&quot; instrument_node=&quot;&quot;&gt;Facebook&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1295&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a data-dcnode-id=&quot;1293&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.linkedin.com/company/hrtechnologist/&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1294&quot; instrument_node=&quot;&quot;&gt;LinkedIn&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1292&quot; instrument_node=&quot;&quot;&gt;, or &lt;/span&gt;&lt;a data-dcnode-id=&quot;1290&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//twitter.com/toolboxforhr%3Flang%3Den&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1291&quot; instrument_node=&quot;&quot;&gt;Twitter&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1289&quot; instrument_node=&quot;&quot;&gt;. &lt;/span&gt;&lt;/i&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1286&quot; instrument_node=&quot;&quot;&gt;

t;#login&quot;&gt;&lt;span data-dcnode-id=&quot;1240&quot; instrument_node=&quot;&quot;&gt;Please login to bookmark&lt;/span&gt;&lt;/a&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1235&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1233&quot; instrument_node=&quot;&quot;&gt;
