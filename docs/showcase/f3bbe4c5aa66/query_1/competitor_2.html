	Published: &lt;/span&gt;&lt;span data-dcnode-id=&quot;1117&quot;&gt;&lt;span data-dcnode-id=&quot;1118&quot; instrument_node=&quot;&quot;&gt;30 Jul 2021&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1116&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1114&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1112&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/section&gt;&lt;span data-dcnode-id=&quot;1110&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;section data-dcnode-id=&quot;889&quot; id=&quot;content-body&quot;&gt;&lt;span data-dcnode-id=&quot;1109&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1107&quot;&gt;&lt;span data-dcnode-id=&quot;1108&quot; instrument_node=&quot;&quot;&gt;Business and HR leaders need to rethink their workplace strategies and consider what makes sense following the height of the pandemic. Many employees want flexibility, and that demand will require many organizations to implement some form of hybrid work.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1106&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;ad-wrapper ad-embedded&quot; data-dcnode-id=&quot;1096&quot;&gt;&lt;span data-dcnode-id=&quot;1105&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;ad ad-hp&quot; data-dcnode-id=&quot;1102&quot; id=&quot;halfpage&quot;&gt;&lt;span data-dcnode-id=&quot;1104&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;1103&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1101&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;ad ad-mu&quot; data-dcnode-id=&quot;1098&quot; id=&quot;mu-1&quot;&gt;&lt;span data-dcnode-id=&quot;1100&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;1099&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1097&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1095&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1090&quot;&gt;&lt;span data-dcnode-id=&quot;1094&quot; instrument_node=&quot;&quot;&gt;What exactly does &lt;/span&gt;&lt;em data-dcnode-id=&quot;1092&quot;&gt;&lt;span data-dcnode-id=&quot;1093&quot; instrument_node=&quot;&quot;&gt;hybrid&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1091&quot; instrument_node=&quot;&quot;&gt; mean in the context of work? That definition can vary. Gartner defines the hybrid workforce model as one that allows employees to flow through a variety of sites or schedules and even vary the nature of their work, said George Penn, vice president of research and advisory at Gartner.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1089&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1084&quot;&gt;&lt;span data-dcnode-id=&quot;1088&quot; instrument_node=&quot;&quot;&gt;However, each organization is likely to put its own spin on just what &lt;/span&gt;&lt;em data-dcnode-id=&quot;1086&quot;&gt;&lt;span data-dcnode-id=&quot;1087&quot; instrument_node=&quot;&quot;&gt;hybrid work&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1085&quot; instrument_node=&quot;&quot;&gt; means.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1083&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1078&quot;&gt;&lt;span data-dcnode-id=&quot;1082&quot; instrument_node=&quot;&quot;&gt;As many Americans get vaccinated and workplaces open again, hybrid workplace plans could include some staff members working in the office full-time while others work from home for &lt;/span&gt;&lt;a data-dcnode-id=&quot;1080&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.techtarget.com/searchhrsoftware/news/252501214/The-hybrid-workplace-may-be-settling-on-3-days-in-office&quot;&gt;&lt;span data-dcnode-id=&quot;1081&quot; instrument_node=&quot;&quot;&gt;a certain number of days a week&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1079&quot; instrument_node=&quot;&quot;&gt;. Some organizations might schedule certain days for in-person collaboration and meetings, then allocate remote workdays. Another possibility is some employees working in the office while others work remotely and the two groups switching locations at a set time, which is a strategy some companies embraced during the COVID-19 pandemic to limit the amount of employees working in an office at one time.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1077&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1075&quot;&gt;&lt;span data-dcnode-id=&quot;1076&quot; instrument_node=&quot;&quot;&gt;Over the past year and a half, many employees demonstrated they can work successfully in a hybrid or totally remote work environment, according to the October 2020 report &quot;A Business Case for the Hybrid Workforce&quot; by Gartner. Company leaders may be more willing to try a hybrid work plan now because of this.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1074&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1072&quot;&gt;&lt;span data-dcnode-id=&quot;1073&quot; instrument_node=&quot;&quot;&gt;However, there is no one-size-fits-all hybrid workplace strategy, Penn said.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1071&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1069&quot;&gt;&lt;span data-dcnode-id=&quot;1070&quot; instrument_node=&quot;&quot;&gt;&quot;There are many versions of a hybrid model because it's one based on flexibility and adaptability and shared ownership,&quot; Penn said. &quot;For the vast majority of organizations, creating a more flexible workforce model is something that will benefit them [because] flexibility … and adaptability … are essential to business success.&quot;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1068&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1063&quot;&gt;&lt;span data-dcnode-id=&quot;1067&quot; instrument_node=&quot;&quot;&gt;Here's a look at some of the benefits and challenges &lt;/span&gt;&lt;a data-dcnode-id=&quot;1065&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.techtarget.com/searchhrsoftware/news/252498056/IDC-Hybrid-workplace-drives-tech-office-design-spending&quot;&gt;&lt;span data-dcnode-id=&quot;1066&quot; instrument_node=&quot;&quot;&gt;of the hybrid workplace model&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1064&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1062&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;section class=&quot;section main-article-chapter&quot; data-dcnode-id=&quot;1002&quot; data-menu-title=&quot;Benefits&quot;&gt;&lt;span data-dcnode-id=&quot;1061&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 class=&quot;section-title&quot; data-dcnode-id=&quot;1058&quot;&gt;&lt;i class=&quot;icon&quot; data-dcnode-id=&quot;1060&quot; data-icon=&quot;1&quot;&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;1059&quot; instrument_node=&quot;&quot;&gt;Benefits&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1057&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 data-dcnode-id=&quot;1055&quot;&gt;&lt;span data-dcnode-id=&quot;1056&quot; instrument_node=&quot;&quot;&gt;Lower operating costs&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;1054&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1052&quot;&gt;&lt;span data-dcnode-id=&quot;1053&quot; instrument_node=&quot;&quot;&gt;If fewer employees work on-site, companies can possibly reduce office space and save money.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1051&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1049&quot;&gt;&lt;span data-dcnode-id=&quot;1050&quot; instrument_node=&quot;&quot;&gt;Eighty-seven percent of executives surveyed by PwC in November and December 2020 said they expected to make changes to their real estate strategy over the next year, according to the &quot;U.S. Remote Work Survey&quot; by PwC. This includes consolidating office space in major cities or opening more satellite locations.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1048&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1043&quot;&gt;&lt;span data-dcnode-id=&quot;1047&quot; instrument_node=&quot;&quot;&gt;Having more office location options &lt;/span&gt;&lt;a data-dcnode-id=&quot;1045&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//bevmaxoffice.com/2018/05/01/choose-the-right-office-space-location/&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1046&quot; instrument_node=&quot;&quot;&gt;could be&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1044&quot; instrument_node=&quot;&quot;&gt; another money-saver.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1042&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1040&quot;&gt;&lt;span data-dcnode-id=&quot;1041&quot; instrument_node=&quot;&quot;&gt;Companies can set up headquarters beyond expensive metropolitan areas, said Anh Phillips, research director for the global CEO program at Deloitte, a management consulting firm located in London.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1039&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 data-dcnode-id=&quot;1037&quot;&gt;&lt;span data-dcnode-id=&quot;1038&quot; instrument_node=&quot;&quot;&gt;More flexibility for job candidates and companies&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;1036&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1031&quot;&gt;&lt;span data-dcnode-id=&quot;1035&quot; instrument_node=&quot;&quot;&gt;If many &lt;/span&gt;&lt;a data-dcnode-id=&quot;1033&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.techtarget.com/searchhrsoftware/news/252499130/Hybrid-workplace-may-give-employers-hiring-edge&quot;&gt;&lt;span data-dcnode-id=&quot;1034&quot; instrument_node=&quot;&quot;&gt;companies embrace a hybrid workforce strategy&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1032&quot; instrument_node=&quot;&quot;&gt;, job seekers can job hunt across the globe and companies can look beyond a single city for talent.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1030&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1028&quot;&gt;&lt;span data-dcnode-id=&quot;1029&quot; instrument_node=&quot;&quot;&gt;Before remote work, companies were forced to only hire in particular geographical areas, Phillips said. A hybrid workplace makes that less of a necessity.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1027&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1025&quot;&gt;&lt;span data-dcnode-id=&quot;1026&quot; instrument_node=&quot;&quot;&gt;Casting a wider net for job candidates can benefit companies in multiple ways.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1024&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1022&quot;&gt;&lt;span data-dcnode-id=&quot;1023&quot; instrument_node=&quot;&quot;&gt;Hiring only in one location can limit candidates' diversity and technology backgrounds, said Cyril George, global talent acquisition lead at General Motors, which is located in Detroit and is embracing a hybrid workplace model.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1021&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 data-dcnode-id=&quot;1019&quot;&gt;&lt;span data-dcnode-id=&quot;1020&quot; instrument_node=&quot;&quot;&gt;Better employee experience and work-life balance&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;1018&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1013&quot;&gt;&lt;span data-dcnode-id=&quot;1017&quot; instrument_node=&quot;&quot;&gt;A &lt;/span&gt;&lt;a data-dcnode-id=&quot;1015&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.techtarget.com/searchhrsoftware/feature/Hybrid-workplace-technologies-to-power-future-of-work&quot;&gt;&lt;span data-dcnode-id=&quot;1016&quot; instrument_node=&quot;&quot;&gt;hybrid workplace strategy&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1014&quot; instrument_node=&quot;&quot;&gt; can increase employee happiness, which could lead to better work performance.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1012&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1010&quot;&gt;&lt;span data-dcnode-id=&quot;1011&quot; instrument_node=&quot;&quot;&gt;Work-life balance, which significantly contributes to employee well-being, is higher among hybrid workers, according to the Gartner report.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1009&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1007&quot;&gt;&lt;span data-dcnode-id=&quot;1008&quot; instrument_node=&quot;&quot;&gt;&quot;Roughly 60% of semi-remote and fully remote employees say they maintain a balance between work and life, compared to only 44% of employees who never work remotely,&quot; according to the report, which based its findings on three Gartner surveys. Employees working remotely don't have to commute to work and have more control over their time, to name just two benefits.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1006&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1004&quot;&gt;&lt;span data-dcnode-id=&quot;1005&quot; instrument_node=&quot;&quot;&gt;The hybrid model can support work-life balance and give employees work-life integration, said Jen Fisher, chief well-being officer at Deloitte in the United States. A hybrid workforce has more autonomy over how, when and where work gets done. For many employees, work-life integration can lead to better well-being and higher satisfaction with their employers and their work.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1003&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/section&gt;&lt;span data-dcnode-id=&quot;1001&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;section class=&quot;section main-article-chapter&quot; data-dcnode-id=&quot;924&quot; data-menu-title=&quot;Challenges&quot;&gt;&lt;span data-dcnode-id=&quot;1000&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 class=&quot;section-title&quot; data-dcnode-id=&quot;997&quot;&gt;&lt;i class=&quot;icon&quot; data-dcnode-id=&quot;999&quot; data-icon=&quot;1&quot;&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;998&quot; instrument_node=&quot;&quot;&gt;Challenges&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;996&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 data-dcnode-id=&quot;994&quot;&gt;&lt;span data-dcnode-id=&quot;995&quot; instrument_node=&quot;&quot;&gt;Increased cybersecurity risks&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;993&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;988&quot;&gt;&lt;span data-dcnode-id=&quot;992&quot; instrument_node=&quot;&quot;&gt;Employees working outside the office could create &lt;/span&gt;&lt;a data-dcnode-id=&quot;990&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.techtarget.com/searchhrsoftware/tip/5-ways-HR-can-help-boost-remote-work-security&quot;&gt;&lt;span data-dcnode-id=&quot;991&quot; instrument_node=&quot;&quot;&gt;cybersecurity vulnerabilities&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;989&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;987&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;985&quot;&gt;&lt;span data-dcnode-id=&quot;986&quot; instrument_node=&quot;&quot;&gt;Hybrid employees are out of sight and, for IT teams, possibly out of mind, said Kevin Beaver, an independent information security consultant with Principle Logic LLC, an information security consulting firm located in Acworth, Ga. Because of this, the likelihood of security incidents rises exponentially.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;984&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;982&quot;&gt;&lt;span data-dcnode-id=&quot;983&quot; instrument_node=&quot;&quot;&gt;Hybrid employees may use their own computers, he said. And employees' private systems are often outside common network and endpoint security controls. A company's network and information are only as secure as its weakest computer configuration. An organization must confirm all remote employees meet security standards.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;981&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 data-dcnode-id=&quot;979&quot;&gt;&lt;span data-dcnode-id=&quot;980&quot; instrument_node=&quot;&quot;&gt;Leadership deficiencies&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;978&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;976&quot;&gt;&lt;span data-dcnode-id=&quot;977&quot; instrument_node=&quot;&quot;&gt;Employees working remotely may bring new challenges for leaders who are used to managing in-office workers.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;975&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;970&quot;&gt;&lt;span data-dcnode-id=&quot;974&quot; instrument_node=&quot;&quot;&gt;Managing a hybrid team requires a level of leadership that not all managers possess, said Teresa Hopke, CEO of Talking Talent, a global coaching firm located in New York. Remote work often highlights leadership deficiencies. Managers must be clear about their expectations and communicate them clearly. And they may need to have hard conversations with employees who &lt;/span&gt;&lt;a data-dcnode-id=&quot;972&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.techtarget.com/searchenterprisedesktop/news/252498949/Keeping-tabs-on-employees-in-the-hybrid-workplace&quot;&gt;&lt;span data-dcnode-id=&quot;973&quot; instrument_node=&quot;&quot;&gt;aren't meeting expectations&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;971&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;969&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;blockquote class=&quot;main-article-pullquote&quot; data-dcnode-id=&quot;953&quot;&gt;&lt;span data-dcnode-id=&quot;968&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;main-article-pullquote-inner&quot; data-dcnode-id=&quot;955&quot;&gt;&lt;span data-dcnode-id=&quot;967&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;figure data-dcnode-id=&quot;965&quot;&gt;&lt;span data-dcnode-id=&quot;966&quot; instrument_node=&quot;&quot;&gt;
    Whether [the hybrid workplace model] persists will depend on a lot of different things, including how successful organizations are at making this model work.
   &lt;/span&gt;&lt;/figure&gt;&lt;span data-dcnode-id=&quot;964&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;figcaption data-dcnode-id=&quot;959&quot;&gt;&lt;span data-dcnode-id=&quot;963&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;strong data-dcnode-id=&quot;961&quot;&gt;&lt;span data-dcnode-id=&quot;962&quot; instrument_node=&quot;&quot;&gt;J. P. Gownder&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;960&quot; instrument_node=&quot;&quot;&gt;Vice president and principal analyst, Forrester Research
   &lt;/span&gt;&lt;/figcaption&gt;&lt;span data-dcnode-id=&quot;958&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;i class=&quot;icon&quot; data-dcnode-id=&quot;957&quot; data-icon=&quot;z&quot;&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;956&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;954&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/blockquote&gt;&lt;span data-dcnode-id=&quot;952&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;950&quot;&gt;&lt;span data-dcnode-id=&quot;951&quot; instrument_node=&quot;&quot;&gt;Hybrid work also requires managers to go out of their way to create a culture where everyone is included in meetings and considered for new opportunities, Hopke said. Otherwise, remote employees could be left behind. Managers must take an intentional approach to relationship-building.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;949&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;947&quot;&gt;&lt;span data-dcnode-id=&quot;948&quot; instrument_node=&quot;&quot;&gt;Including everyone in meetings and consideration for advancement can require more effort. But for true equity to be achieved, leaders must prioritize including remote employees.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;946&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;944&quot;&gt;&lt;span data-dcnode-id=&quot;945&quot; instrument_node=&quot;&quot;&gt;GM's George said this has been challenging for him at times, since his leadership team is now scattered over multiple cities.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;943&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;941&quot;&gt;&lt;span data-dcnode-id=&quot;942&quot; instrument_node=&quot;&quot;&gt;&quot;A simple meeting where I [only] had to think previously … 'OK, seven o'clock, everybody's available, let's just do it,' I now need to be cognizant about the time zones and think about, 'OK, how do I be more inclusive?'&quot; he said.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;940&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 data-dcnode-id=&quot;938&quot;&gt;&lt;span data-dcnode-id=&quot;939&quot; instrument_node=&quot;&quot;&gt;Employee isolation and disconnection&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;937&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;932&quot;&gt;&lt;span data-dcnode-id=&quot;936&quot; instrument_node=&quot;&quot;&gt;Employees working from home &lt;/span&gt;&lt;a data-dcnode-id=&quot;934&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.techtarget.com/searchhrsoftware/feature/Top-strategies-and-tools-to-prevent-employee-isolation&quot;&gt;&lt;span data-dcnode-id=&quot;935&quot; instrument_node=&quot;&quot;&gt;can feel lonely and disconnected&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;933&quot; instrument_node=&quot;&quot;&gt; from the company, which could affect their work performance and overall well-being.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;931&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;929&quot;&gt;&lt;span data-dcnode-id=&quot;930&quot; instrument_node=&quot;&quot;&gt;Integrating full-time remote employees into the company culture and ensuring they have a sense of belonging can be challenging, said J. P. Gownder, vice president at Forrester Research. In some cases, employees may avoid coming into the office over simple concerns like thinking they won't have a desk. In that particular case, company leaders can encourage employees to come in by implementing desk hoteling software so workers know they will have somewhere to sit that day.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;928&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;926&quot;&gt;&lt;span data-dcnode-id=&quot;927&quot; instrument_node=&quot;&quot;&gt;&quot;There'd be a lot less concern about isolation when you are actually seeing people a couple days a week,&quot; Gownder said.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;925&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/section&gt;&lt;span data-dcnode-id=&quot;923&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;section class=&quot;section main-article-chapter&quot; data-dcnode-id=&quot;890&quot; data-menu-title=&quot;The future of the hybrid workplace&quot;&gt;&lt;span data-dcnode-id=&quot;922&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 class=&quot;section-title&quot; data-dcnode-id=&quot;919&quot;&gt;&lt;i class=&quot;icon&quot; data-dcnode-id=&quot;921&quot; data-icon=&quot;1&quot;&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;920&quot; instrument_node=&quot;&quot;&gt;The future of the hybrid workplace&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;918&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;916&quot;&gt;&lt;span data-dcnode-id=&quot;917&quot; instrument_node=&quot;&quot;&gt;The benefits and challenges of a hybrid workplace model are more clear-cut in some cases. For example, a hybrid workplace option isn't possible for every profession.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;915&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;913&quot;&gt;&lt;span data-dcnode-id=&quot;914&quot; instrument_node=&quot;&quot;&gt;Hybrid is not a model for every company or even every role in every company, Gownder said. Facilities workers, for example, or someone with a frontline job like caring for hospital patients must continue to do their work in person.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;912&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;910&quot;&gt;&lt;span data-dcnode-id=&quot;911&quot; instrument_node=&quot;&quot;&gt;However, many companies whose employees work at least part of the time in an office will likely explore hybrid work options.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;909&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;907&quot;&gt;&lt;span data-dcnode-id=&quot;908&quot; instrument_node=&quot;&quot;&gt;&quot;We believe that 70% of companies will explore … a more hybrid, flexible work model,&quot; Gownder said. &quot;Whether that persists will depend on a lot of different things, including how successful organizations are at making this model work.&quot;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;906&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;904&quot;&gt;&lt;span data-dcnode-id=&quot;905&quot; instrument_node=&quot;&quot;&gt;The takeaway is important.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;903&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;901&quot;&gt;&lt;span data-dcnode-id=&quot;902&quot; instrument_node=&quot;&quot;&gt;&quot;Not everyone should [move to a hybrid workplace model], but those who do stand to gain higher employee experience and a host of other benefits that could ultimately lead to higher revenue.&quot;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;900&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;892&quot;&gt;&lt;strong data-dcnode-id=&quot;897&quot;&gt;&lt;span data-dcnode-id=&quot;899&quot; instrument_node=&quot;&quot;&gt;About the author&lt;/span&gt;&lt;br data-dcnode-id=&quot;898&quot;&gt;&lt;/strong&gt;&lt;em data-dcnode-id=&quot;893&quot;&gt;&lt;span data-dcnode-id=&quot;896&quot; instrument_node=&quot;&quot;&gt;Linda Rosencrance is a freelance writer and editor in the Boston area. She has written about information technology for more than 20 years and has more than 30 years of experience as an investigative reporter, primarily for Boston-area newspapers. She is also the published author of six true-crime books.&lt;/span&gt;&lt;br data-dcnode-id=&quot;895&quot;&gt;&lt;span data-dcnode-id=&quot;894&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/em&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;891&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/section&gt;&lt;/section&gt;&lt;span data-dcnode-id=&quot;888&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;ad-wrapper ad-inline ad-mobile&quot; data-dcnode-id=&quot;883&quot;&gt;&lt;span data-dcnode-id=&quot;887&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;885&quot; instrument_node=&quot;&quot;&gt;
