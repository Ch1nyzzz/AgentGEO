																																																				&lt;h2&gt;&lt;a name=&quot;_Toc104553452&quot;&gt;&lt;/a&gt;Introduction&lt;/h2&gt;
&lt;p&gt;Workers in the U.S. were facing many questions about their future prior to the onset of the COVID-19 pandemic, and that uncertainty has only intensified as the pandemic lingers, and employers&amp;rsquo; use of new technologies continues to evolve. Policymakers, worker advocates, and researchers are watching and evaluating which technologies employers are choosing to adopt, and what consequences these changes might have for workers&amp;rsquo; jobs. Understanding these how technological changes may unfold in different industries is essential for developing effective solutions to the challenges that workers face.&lt;/p&gt;
&lt;p&gt;From 2018 to 2020, the UC Berkeley Labor Center and Working Partnerships USA brought together a team of experts to investigate trends in several industries in the U.S. that have been focal points for these concerns: trucking, warehouses, health care, retail, and food delivery. Our team of researchers conducted multi-year studies of each industry, examining how new technologies are changing work and why, what new technologies are on the horizon, and what factors are shaping job outcomes.&lt;a href=&quot;#_edn1&quot; name=&quot;_ednref1&quot;&gt;[1]&lt;/a&gt;&lt;/p&gt;
&lt;p&gt;The intent of the industry studies was not to predict the future or to develop a broad, unified theory of technological change. Instead, the objective was to examine how and why technological change is unfolding in key industries and assess what these changes could mean for different groups of workers. While many of the important findings from these studies are industry-specific, some common themes emerge across the research. In this report, we synthesize the findings of the industry studies, and discuss what they suggest about how policymakers and industry stakeholders should approach the challenges and opportunities workers face in a changing technological landscape.&lt;/p&gt;
&lt;p&gt;One of the most striking findings from these studies is that technology&amp;rsquo;s effects on job &lt;em&gt;quality&amp;mdash;&lt;/em&gt; like wages and working conditions&amp;mdash;should be just as big of a concern as its effects on job &lt;em&gt;quantity&lt;/em&gt;. Employers&amp;rsquo; use of automating technologies could lead to job loss for specific occupations, but this is just one of many ways that technological change threatens workers&amp;rsquo; livelihoods. Rather than replacing large numbers of workers with robots, our researchers find that employers are using technology to change &lt;em&gt;how workers do their jobs&lt;/em&gt;: how they are hired; what tasks they are asked to do, how many and how quickly, and how they are instructed to do them; and how their performance is monitored and assessed. Sometimes technology-related changes are helpful to workers&amp;mdash;enhancing their skills or safety, for instance&amp;mdash;but far more often they are harmful to wages and working conditions. Technological changes can also worsen existing inequities for women and people of color, who are overrepresented in the many front-line occupations that are most likely to be changed by technology.&lt;/p&gt;
&lt;p&gt;The introduction of new technology in low-wage industries can easily lead to bad outcomes for workers, but this is not inevitable. Our studies identify important sources of variation in how technological change happens across and within industries, and multiple scenarios for future adoption. These findings suggest that how and why employers implement new technologies in the workplace is not predetermined. The choices we make now and the regulations we implement can re-shape the course of technological change and its consequences for the U.S. labor market.&lt;/p&gt;
															&lt;/div&gt;
					&lt;/div&gt;
	&lt;/div&gt;

					&lt;h2&gt;The five industry studies&lt;/h2&gt;

																						&lt;p&gt;&lt;a href=&quot;https://laborcenter.berkeley.edu/pdf/2018/Driverless.pdf&quot;&gt;DRIVERLESS? Autonomous Trucks and the Future of the American Trucker&lt;/a&gt;&lt;br /&gt;
by Steve Viscelli (September 2018)&lt;/p&gt;
&lt;p&gt;&lt;a href=&quot;https://laborcenter.berkeley.edu/pdf/2019/Future-of-Warehouse-Work.pdf&quot;&gt;The Future of Warehouse Work: Technological Change in the U.S. Logistics Industry&lt;/a&gt;&lt;br /&gt;
by Beth Gutelius and Nik Theodore (October 2019)&lt;/p&gt;
&lt;p&gt;&lt;a href=&quot;https://laborcenter.berkeley.edu/wp-content/uploads/2020/07/Technological-Change-in-Health-Care-Delivery.pdf&quot;&gt;Technological Change in Health Care Delivery: Its Drivers and Consequences for Work and Workers&lt;/a&gt;by Adam Seth Litwin (June 2020)&lt;/p&gt;
&lt;p&gt;&lt;a href=&quot;https://laborcenter.berkeley.edu/wp-content/uploads/2020/09/Change-and-Uncertainty-Not-Apocalypse_final.pdf&quot;&gt;Change and Uncertainty, not Apocalypse: Technological Change and Store-Based Retail&lt;/a&gt;by Fran&amp;ccedil;oise Carr&amp;eacute; and Chris Tilly, with Chris Benner and Sarah Mason (September 2020)&lt;/p&gt;
&lt;p&gt;&lt;a href=&quot;https://laborcenter.berkeley.edu/wp-content/uploads/2020/12/Delivering-Insecurity.pdf&quot;&gt;Delivering Insecurity: E-commerce and the Future of Work in Food Retail&lt;/a&gt;by Chris Benner and Sarah Mason, with Fran&amp;ccedil;oise Carr&amp;eacute; and Chris Tilly (December 2020)&lt;/p&gt;
																		&lt;/div&gt;

							&lt;div id=&quot;s-2&quot; class=&quot;container container--large   &quot;&gt;

						&lt;div class=&quot;wysiwyg publication__container  &quot;&gt;
																																																				&lt;h2&gt;&lt;a name=&quot;_Toc104553453&quot;&gt;&lt;/a&gt;Findings&lt;/h2&gt;
&lt;h2&gt;&lt;a name=&quot;_Toc104553454&quot;&gt;&lt;/a&gt;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp; I.&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp; Employers&amp;rsquo; use of new technologies is changing the content of workers&amp;rsquo; jobs, but is likely to have limited effects on the overall number of jobs&lt;/h2&gt;
&lt;p&gt;&lt;a name=&quot;_Toc103019813&quot;&gt;&lt;/a&gt;&lt;a name=&quot;_Toc104553455&quot;&gt;&lt;/a&gt;Each team of researchers identified various new technologies that employers are using in each industry. These ranged from relatively simple improvements in internet and communications technology and digitization of information to complex data collection and algorithmic technologies, including but not limited to autonomous machines. Across the industries we studied, our researchers found that employers&amp;rsquo; use of new technologies is altering both the content and the processes involved in people&amp;rsquo;s jobs in a range of ways.&lt;/p&gt;
&lt;h3&gt;&lt;a name=&quot;_Toc104553456&quot;&gt;&lt;/a&gt;Employers&amp;rsquo; use of new technologies may cause job reductions in some specific occupations, but is not expected to lead to an overall reduction in the number of jobs in the industries studied.&lt;/h3&gt;
&lt;p&gt;Our researchers found that technology-induced job loss is a real concern for specific occupations. Most notably, nearly 294,000 long-haul truck drivers are at risk of losing their jobs in coming years due to advances in automated driving technologies.&lt;a href=&quot;#_edn2&quot; name=&quot;_ednref2&quot;&gt;&lt;sup&gt;[2]&lt;/sup&gt;&lt;/a&gt; Retail and grocery employers are likely to continue thinning the ranks of cashiers by shifting check-out work to customers through self-check-out stations or app-based check-out. In addition, advances in productivity tracking and managerial technology may lead to reductions in supervisors and secondary managers in larger stores.&lt;a href=&quot;#_edn3&quot; name=&quot;_ednref3&quot;&gt;&lt;sup&gt;[3]&lt;/sup&gt;&lt;/a&gt; In hospitals, semi-autonomous service robots could reduce the overall number of people employed as orderlies, dietary clerks, and laundry workers; COVID-19 may have jump-started this trend, as hospitals have looked for ways to limit human interactions to reduce the risk of transmission.&lt;a href=&quot;#_edn4&quot; name=&quot;_ednref4&quot;&gt;&lt;sup&gt;[4]&lt;/sup&gt;&lt;/a&gt;&lt;/p&gt;
&lt;p&gt;Across industries, however, our researchers did not find that widespread technology-induced job loss was currently happening, or that it was likely to happen. In some cases, a growing demand for services&amp;mdash;due to changing consumer preferences (e.g., e-commerce) or changing demographics (e.g., an aging population requiring more healthcare services)&amp;mdash;has led to a demand for more workers. In these circumstances, overall demand for certain occupations of workers is outpacing technology-induced job loss or slower job growth. Other factors contributing to worker shortages in specific industries&amp;mdash;such as long-term wage stagnation for truck drivers&amp;mdash;may result in labor demand for workers continuing to outpace supply, even as automation reduces the overall number of jobs.&lt;a href=&quot;#_edn5&quot; name=&quot;_ednref5&quot;&gt;&lt;sup&gt;[5]&lt;/sup&gt;&lt;/a&gt;&lt;/p&gt;
&lt;p&gt;Furthermore, the pace of technology adoption is often slower than expected and uneven within industries. Despite abundant speculation about the possibility of highly-automated &amp;ldquo;dark warehouses&amp;rdquo; and a &amp;ldquo;retail apocalypse&amp;rdquo; due to the growth of e-commerce, neither of these scenarios appears probable any time soon, according to our researchers.&lt;a href=&quot;#_edn6&quot; name=&quot;_ednref6&quot;&gt;&lt;sup&gt;[6]&lt;/sup&gt;&lt;/a&gt; In trucking, employers are unlikely to transition from human drivers to broad reliance on automated driving technology for delivery in the near future, despite the real possibility that they will implement these changes in some form for long-haul trucking.&lt;a href=&quot;#_edn7&quot; name=&quot;_ednref7&quot;&gt;&lt;sup&gt;[7]&lt;/sup&gt;&lt;/a&gt;&lt;/p&gt;
&lt;p&gt;Another reason that large-scale job displacement is unlikely in the foreseeable future is that the technology to automate certain types of tasks, such as item-picking to package e-commerce orders or delivery vehicles navigating complex urban environments, remains inadequate for employers&amp;rsquo; needs. And even where technology exists that is capable of automating certain tasks, there may be other reasons employers prefer a person to a machine in a particular role. For instance, employers may prefer a human worker to answer a customer&amp;rsquo;s questions about a product in a store, or to identify an appropriate place to leave a package at someone&amp;rsquo;s residence.&lt;/p&gt;
&lt;p&gt;New technology can also be prohibitively expensive, especially in highly cost-sensitive industries. In warehousing, slim profit margins and cost-based competition have led to a cautious approach to new technology.&lt;a href=&quot;#_edn8&quot; name=&quot;_ednref8&quot;&gt;&lt;sup&gt;[8]&lt;/sup&gt;&lt;/a&gt; The growth of e-commerce has spurred experimentation with new technologies among industry leaders like Amazon, but many other firms still lag far behind in adopting even simple technologies like digital warehouse management systems.&lt;a href=&quot;#_edn9&quot; name=&quot;_ednref9&quot;&gt;&lt;sup&gt;[9]&lt;/sup&gt;&lt;/a&gt; Similarly, a &amp;ldquo;digital divide&amp;rdquo; exists in retail, where market leaders&amp;mdash;especially those who have effective channels for participating in e-commerce&amp;mdash;have the resources to invest in the latest technology, while other smaller firms do not.&lt;a href=&quot;#_edn10&quot; name=&quot;_ednref10&quot;&gt;&lt;sup&gt;[10]&lt;/sup&gt;&lt;/a&gt;&lt;/p&gt;
&lt;h3&gt;&lt;a name=&quot;_Toc104553457&quot;&gt;&lt;/a&gt;Employers are using technologies in ways that create new tasks and jobs, and shift the allocation of tasks across machines, workers, firms, and customers.&lt;/h3&gt;
&lt;p&gt;Understanding how new technologies are changing some workers&amp;rsquo; jobs requires an examination of the ways in which technologies affect the specific tasks the jobs involve.&lt;a href=&quot;#_edn11&quot; name=&quot;_ednref11&quot;&gt;&lt;sup&gt;[11]&lt;/sup&gt;&lt;/a&gt; Every occupation consists of an assemblage of tasks, which often vary across industries or employers, and can change for all kinds of reasons, including employers&amp;rsquo; adoption of new technologies.&lt;/p&gt;
&lt;p&gt;Some tasks are easier than others to execute using technology, such as those that involve highly structured and repetitive actions. Even so, employers rarely use technologies to replace all tasks involved in a worker&amp;rsquo;s job; technologies are more often used to substitute for specific tasks, leaving other aspects of the job intact but potentially transformed. For example, where employers use automated chatbots to field customer service calls, human representatives may end up fielding more complicated inquiries, while the simpler ones are resolved by machines.&lt;/p&gt;
&lt;p&gt;Technology-enabled task reorganization can create new tasks, such as remote operation of semi-autonomous vehicles, maintenance and programming of new machinery and software, and managing and staffing order-picking and curbside pickup for retail and grocery stores. This may create new jobs, increase the demand for certain jobs, or change the scope of work involved in a job.&lt;/p&gt;
&lt;p&gt;In some cases, technologies are used to transfer tasks between customers and workers. In a customer self-checkout system, the core tasks of a cashier&amp;mdash;ringing up and bagging groceries&amp;mdash;are not automated but transferred from a worker to a customer.&lt;a href=&quot;#_edn12&quot; name=&quot;_ednref12&quot;&gt;&lt;sup&gt;[12]&lt;/sup&gt;&lt;/a&gt; On the other hand, online ordering for groceries transfers tasks that customers would otherwise do&amp;mdash;such as filling a cart and taking the food home&amp;mdash;to workers.&lt;a href=&quot;#_edn13&quot; name=&quot;_ednref13&quot;&gt;&lt;sup&gt;[13]&lt;/sup&gt;&lt;/a&gt;&lt;/p&gt;
&lt;p&gt;Employers may also use technologies in ways that redistribute tasks among different workers. These could be workers within a particular firm, or workers employed in other firms, or independent contractors. In some grocery stores, retrieving and packing groceries for online orders is carried out by employees of the store, but in other cases (and sometimes within the same store) these tasks are carried out by a worker employed or contracted by a third party, such as Instacart. Similarly, restaurant take-out deliveries may be completed by restaurant employees, or by workers affiliated with a third-party ordering platform like Doordash or UberEats.&lt;a href=&quot;#_edn14&quot; name=&quot;_ednref14&quot;&gt;&lt;sup&gt;[14]&lt;/sup&gt;&lt;/a&gt;&lt;/p&gt;
&lt;p&gt;Employers&amp;rsquo; use of technologies may contribute to broader shifts in employment as well, across industries or market segments. The increased reliance on e-commerce for retail sales, for instance, has reduced demand for employment in stores, but increased the need for workers in warehouses and trucking. It has also shifted unpaid work by consumers in shopping and driving to paid work in order fulfillment and home delivery services.&lt;/p&gt;
&lt;h3&gt;&lt;a name=&quot;_Toc104553458&quot;&gt;&lt;/a&gt;Employers are using technologies in ways that change how job tasks are done.&lt;/h3&gt;
&lt;p&gt;In addition to the reshuffling of tasks, employers are using new technologies in ways that change the processes involved in workers&amp;rsquo; job tasks. Advances in data collection and algorithmic technologies are enabling employers to make changes to a broad array of HR and management functions, such as hiring, scheduling, task direction and pacing, monitoring, evaluation, and discipline or dismissal.&lt;a href=&quot;#_edn15&quot; name=&quot;_ednref15&quot;&gt;&lt;sup&gt;[15]&lt;/sup&gt;&lt;/a&gt; These changes serve specific functions; here, we describe several types of managerial objectives, offer examples of the technologies that employers are using toward those ends, and discuss how these technologies change the way workers complete their tasks.&lt;/p&gt;
&lt;p&gt;&lt;strong&gt;Safety:&lt;/strong&gt; Some employers are using technologies intended to make work safer; examples include machinery that can alleviate the need for heavy lifting and sensors that track driving conditions, vehicle operations and potential safety hazards.&lt;a href=&quot;#_edn16&quot; name=&quot;_ednref16&quot;&gt;&lt;sup&gt;[16]&lt;/sup&gt;&lt;/a&gt; These technologies can change the physical processes involved in workers&amp;rsquo; tasks, or give workers real time notifications to adjust their actions.&lt;/p&gt;
&lt;p&gt;&lt;strong&gt;Personnel decision-making:&lt;/strong&gt; In some cases, employers use data-gathering and analytic processing software to compile and interpret information about current or prospective employees, which human managers then take into consideration in their decisions about personnel. In other cases, employers are using algorithmic technologies to replace certain aspects of human decision-making altogether.&lt;/p&gt;
&lt;p&gt;&lt;strong&gt;Information-sharing:&lt;/strong&gt; Employers in many industries are using technologies that can facilitate communication and information-sharing, which can affect work processes in a wide variety of ways, such as changing the order in which workers complete their tasks, and giving them real-time direction and feedback. A few of the far-reaching range of examples of these types of technologies include delivery apps, customer service platforms, telehealth, and electronic health records.&lt;/p&gt;
&lt;p&gt;&lt;strong&gt;Pace-setting: &lt;/strong&gt;In several of the industries our researchers studied, employers are using technologies aimed at speeding up work processes to reduce costs. For instance, warehouses and retail stores may use digital inventory tracking systems and stocking devices to help streamline workers&amp;rsquo; movement of goods in a facility. Delivery drivers often use mapping and route-planning software intended to optimize speed and maximize their number of deliveries.&lt;/p&gt;
&lt;p&gt;&lt;strong&gt;Monitoring:&lt;/strong&gt; Employers are also using technologies to monitor and track workers&amp;rsquo; locations, activities, and the accuracy of their work. This type of tech is increasingly common in warehouses and delivery, but is also being deployed in home health care, where employers are using phone-based software to manage workers remotely by tracking their location and task-completion at clients&amp;rsquo; residences.&lt;/p&gt;
&lt;p&gt;The managerial objectives highlighted here are not exhaustive, nor are they mutually exclusive. Employers adopt technologies and make other changes to production processes for a complex array of reasons. These changes can affect the processes involved in workers&amp;rsquo; jobs in intended and unintended ways, and can have both positive and negative effects on job quality. In the next section, we discuss the consequences of employers&amp;rsquo; use of new technologies for workers.&lt;/p&gt;
&lt;h2&gt;&lt;a name=&quot;_Toc104553459&quot;&gt;&lt;/a&gt;&amp;nbsp;&amp;nbsp; II.&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp; Employers in each industry are using new technologies in ways that may degrade workers&amp;rsquo; wages and working conditions and worsen existing labor market inequities&lt;/h2&gt;
&lt;p&gt;Employers can use new technologies in ways that are helpful to workers, as some of the above examples indicate. Technologies can make work safer, and reduce worker time spent on paperwork or arduous, repetitive tasks. However, in each industry, our researchers concluded that many employers are likely to use new technologies in ways that threaten workers&amp;rsquo; wages and job quality.&lt;/p&gt;
&lt;h3&gt;&lt;a name=&quot;_Toc104553460&quot;&gt;&lt;/a&gt;Employers&amp;rsquo; use of technology to reorganize work and production could lead to lower wages, deskilling, and deteriorating job quality for workers.&lt;/h3&gt;
&lt;p&gt;When employers reorganize and reshape production processes, the changes they make can have consequences for workers&amp;rsquo; wages and job quality. While the consequences aren&amp;rsquo;t invariably or inevitably negative, our researchers found that technologically-induced task redistribution may result in poor outcomes for many workers.&lt;/p&gt;
&lt;p&gt;When employers use technology to reshuffle tasks among workers within the firm, workers may see a reduction in the range or complexity of tasks involved in their work, which employers can use as justification for lower pay. In some cases, workers may actually experience a pay cut following technologically-induced reorganization of work processes; in others, an industry may experience a longer-term shift toward lower pay for certain occupations. In health care, chatbots and autonomous service robots are starting to be used in ways that reduce staffing and decrease the complexity of workers&amp;rsquo; roles&amp;mdash;for instance, by limiting or entirely eliminating dietary clerks&amp;rsquo; interaction with patients through the use of autonomous bots to deliver meals.&lt;a href=&quot;#_edn17&quot; name=&quot;_ednref17&quot;&gt;&lt;sup&gt;[17]&lt;/sup&gt;&lt;/a&gt; Warehouse employers are using technologies designed specifically to replace human decision-making functions; other technologies simplify warehouse work by breaking a job into subtasks, sometimes to the point that previously required worker skills become completely irrelevant.&lt;a href=&quot;#_edn18&quot; name=&quot;_ednref18&quot;&gt;&lt;sup&gt;[18]&lt;/sup&gt;&lt;/a&gt;&lt;/p&gt;
&lt;p&gt;Employers&amp;rsquo; use of technology to redistribute tasks to workers outside of the firm also can have negative implications for workers&amp;rsquo; wages and job quality. In retail, restaurants, and grocery, employers are using technology to reallocate tasks (e.g., delivery or shopping, as discussed above) to workers employed by third-party firms or hired as independent contractors. In warehouses, employers are turning to on-demand staffing platforms to hire temporary workers through staffing agencies, in some cases via third-party logistics (3PL) management firms.&lt;a href=&quot;#_edn19&quot; name=&quot;_ednref19&quot;&gt;&lt;sup&gt;[19]&lt;/sup&gt;&lt;/a&gt; Regardless of the industry, workers employed by third-party firms are likely to be paid less and lack access to benefits that workers at the lead firm may have, including union representation. Workers hired as independent contractors lack access to basic employment rights and legal protections, such the right to a minimum wage, collective bargaining, and workers&amp;rsquo; compensation in case of injury.&lt;a href=&quot;#_edn20&quot; name=&quot;_ednref20&quot;&gt;&lt;sup&gt;[20]&lt;/sup&gt;&lt;/a&gt;&lt;/p&gt;
&lt;p&gt;Technologically-induced reorganization of production processes has also resulted in work being shifted within industries in ways that favor lower-wage segments. In trucking, the jobs most at risk of displacement from automation are long-distance truck driving jobs, which have higher rates of pay compared to local delivery jobs; the latter increased in number as e-commerce has grown but are much harder to automate.&lt;a href=&quot;#_edn21&quot; name=&quot;_ednref21&quot;&gt;&lt;sup&gt;[21]&lt;/sup&gt;&lt;/a&gt;&lt;/p&gt;
&lt;h3&gt;&lt;a name=&quot;_Toc104553461&quot;&gt;&lt;/a&gt;Employers&amp;rsquo; use of technology to change work processes can lead to work speed-up accompanied by decreased autonomy and privacy for workers.&lt;/h3&gt;
&lt;p&gt;Employers are using new technologies in ways that can impinge on workers&amp;rsquo; autonomy and privacy, and that speed up and intensify their work. Amazon has been a leader in the development and adoption of technologies that increase employers&amp;rsquo; surveillance and control over workers. At Amazon warehouses, workers are closely monitored using video surveillance, and tools like GPS-enabled handheld devices and wearable tech embedded with sensors. These devices gather and record data on workers&amp;rsquo; location and activities, which are used not only for general monitoring but also as inputs into algorithms that direct workers&amp;rsquo; tasks. Besides setting the pace of work, the algorithmic systems are used to assess workers&amp;rsquo; performance and speed.&lt;a href=&quot;#_edn22&quot; name=&quot;_ednref22&quot;&gt;&lt;sup&gt;[22]&lt;/sup&gt;&lt;/a&gt; Workers&amp;rsquo; time spent &amp;ldquo;off-task,&amp;rdquo; including time spent walking to and from a restroom or break room, is automatically recorded. If the workers aren&amp;rsquo;t meeting specific productivity targets, they are penalized and may be fired.&lt;a href=&quot;#_edn23&quot; name=&quot;_ednref23&quot;&gt;&lt;sup&gt;[23]&lt;/sup&gt;&lt;/a&gt;&lt;/p&gt;
&lt;p&gt;The intensive surveillance and grueling pace at Amazon warehouses have been well-documented in media accounts and have been cited as an important impetus to attempts to organize warehouse workers into unions. Workers report that the conditions in Amazon warehouses take a serious mental and physical toll, leading to exhaustion, workplace injuries, and psychological stress induced by the pressure to achieve their required productivity rates.&lt;a href=&quot;#_edn24&quot; name=&quot;_ednref24&quot;&gt;&lt;sup&gt;[24]&lt;/sup&gt;&lt;/a&gt;&lt;/p&gt;
&lt;p&gt;Warehouse workers are far from the only workers who have experienced negative consequences from employers&amp;rsquo; use of new technologies that reshape work processes.&amp;nbsp; Electronic visit verification (EVV), a software which allows home care workers to be managed and monitored through a smartphone by tracking their location and activities in real-time, is an increasingly common technology in home health care.&lt;a href=&quot;#_edn25&quot; name=&quot;_ednref25&quot;&gt;&lt;sup&gt;[25]&lt;/sup&gt;&lt;/a&gt; The use of EVV has created an environment where many workers report feeling increased stress from micromanagement, constant surveillance, and invasion of their privacy.&lt;a href=&quot;#_edn26&quot; name=&quot;_ednref26&quot;&gt;&lt;sup&gt;[26]&lt;/sup&gt;&lt;/a&gt;&lt;/p&gt;
&lt;p&gt;In trucking, drivers can be exposed to an extreme amount of data collection and electronic monitoring. Employers use sensors and real-time visual data streams to track and assess everything happening inside or around the vehicle, including location, possible hazards, driving patterns (speed, acceleration, braking, etc.), and driver behavior (seatbelt use, driver fatigue, or other distractions like texting or eating). Fleet managers can use these systems to &amp;ldquo;exert control over workers by setting quantified metrics to evaluate driver performance and challenge workers&amp;rsquo; accounts of driving conditions.&amp;rdquo;&lt;a href=&quot;#_edn27&quot; name=&quot;_ednref27&quot;&gt;&lt;sup&gt;[27]&lt;/sup&gt;&lt;/a&gt;&lt;/p&gt;
&lt;p&gt;Major retailers frequently use algorithmic technologies as part of their processes for hiring, scheduling, and managing workers. Stores are using cameras and other sensors to track and monitor product inventory and store conditions, meaning that clerks and stockers can receive real-time alerts and direction about where and what to restock, or where to clean.&lt;a href=&quot;#_edn28&quot; name=&quot;_ednref28&quot;&gt;&lt;sup&gt;[28]&lt;/sup&gt;&lt;/a&gt; Delivery drivers and in-store shoppers (e.g. for Instacart) can be tracked and directed by employers and/or customers in real time via apps that monitor location and item selection.&lt;a href=&quot;#_edn29&quot; name=&quot;_ednref29&quot;&gt;&lt;sup&gt;[29]&lt;/sup&gt;&lt;/a&gt; These workers have reported that constant location tracking and other forms of electronic monitoring, plus algorithm-generated metrics that intensify workload and time pressure, have added to the mental and physical stress of their jobs and increased the potential for accidents and injuries.&lt;a href=&quot;#_edn30&quot; name=&quot;_ednref30&quot;&gt;&lt;sup&gt;[30]&lt;/sup&gt;&lt;/a&gt;&lt;/p&gt;
&lt;h3&gt;&lt;a name=&quot;_Toc104553462&quot;&gt;&lt;/a&gt;Employers are using new technologies in ways that can worsen existing labor market inequities.&lt;/h3&gt;
&lt;p&gt;The peril arising from employers&amp;rsquo; use of new technologies is not borne equally across all workers. Many of the occupations facing significant threats from technologies that displace, monitor, control, and speed up work are those in which higher concentrations of women and people of color are employed. In warehouses, people of color are overrepresented compared to the labor market at large, and women are a growing portion of the e-commerce warehouse sub-sector.&lt;a href=&quot;#_edn31&quot; name=&quot;_ednref31&quot;&gt;&lt;sup&gt;[31]&lt;/sup&gt;&lt;/a&gt; In retail and grocery, women are more likely than men to work in customer-facing roles like cashier, which will continue to decline in number as employers turn to self-checkout and e-commerce.&lt;a href=&quot;#_edn32&quot; name=&quot;_ednref32&quot;&gt;&lt;sup&gt;[32]&lt;/sup&gt;&lt;/a&gt; Women are also overrepresented in most health care occupations (apart from the highest-paid positions like physicians and surgeons), and Black and Latino workers are concentrated in the lowest-paid jobs like home health aids, which are increasingly subjected to surveillance and monitoring technologies.&lt;a href=&quot;#_edn33&quot; name=&quot;_ednref33&quot;&gt;&lt;sup&gt;[33]&lt;/sup&gt;&lt;/a&gt;&lt;/p&gt;
&lt;p&gt;Certain new technologies have biased outcomes for women, people of color, and other disadvantaged workers.&lt;a href=&quot;#_edn34&quot; name=&quot;_ednref34&quot;&gt;&lt;sup&gt;[34]&lt;/sup&gt;&lt;/a&gt; For example, productivity-based pay structures to incentivize speed in warehouse work creates additional challenges for workers who are not as strong or physically fit, such as older workers.&lt;a href=&quot;#_edn35&quot; name=&quot;_ednref35&quot;&gt;&lt;sup&gt;[35]&lt;/sup&gt;&lt;/a&gt; Additionally, algorithms used in applicant screening and hiring processes are notorious for replicating and exacerbating existing patterns of discrimination in the labor market.&lt;a href=&quot;#_edn36&quot; name=&quot;_ednref36&quot;&gt;&lt;sup&gt;[36]&lt;/sup&gt;&lt;/a&gt; Research also indicates that technologies like speech and facial recognition can be less accurate in identifying and communicating with women, people of color, and people whose first language is not English. This can create additional barriers for workers who must interact with these systems in their jobs.&lt;a href=&quot;#_edn37&quot; name=&quot;_ednref37&quot;&gt;&lt;sup&gt;[37]&lt;/sup&gt;&lt;/a&gt;&lt;/p&gt;
&lt;p&gt;The work of our researchers and others suggests that the most serious repercussions of new technologies in the workplace will fall on those workers already facing the greatest structural challenges in the labor market. The use of new technologies will worsen existing inequities.&lt;/p&gt;
&lt;h2&gt;&lt;a name=&quot;_Toc104553463&quot;&gt;&lt;/a&gt;&amp;nbsp;III.&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp; Industry context shapes employer decision-making about new technologies, leading to variation in adoption and worker impacts&lt;/h2&gt;
&lt;p&gt;A defining feature of each of our researchers&amp;rsquo; projects was the recognition that industry context shapes technology adoption decisions. Across and within industries, our researchers observed variation in the pace of employers&amp;rsquo; uptake of new technologies, their goals with respect to technology, and the consequences of these changes for workers. The factors that had the biggest impact on technology adoption fell into five categories: regulations, worker organizations, competitive structures, industry trends, and broader societal and market trends. These factors shaped employers&amp;rsquo; understanding of how they might use new technologies in the context of their other objectives and priorities. In some cases, these factors accelerated technological adoption and in others they hindered it.&lt;/p&gt;
&lt;h3&gt;&lt;a name=&quot;_Toc104553464&quot;&gt;&lt;/a&gt;Regulations&lt;/h3&gt;
&lt;p&gt;Regulations establish the ground rules that shape competitive market strategies, distinct market segments, and the distribution of power across market actors.&lt;a href=&quot;#_edn38&quot; name=&quot;_ednref38&quot;&gt;&lt;sup&gt;[38]&lt;/sup&gt;&lt;/a&gt; Variation in regulation by industry or by region therefore plays a formative role in shaping employers&amp;rsquo; technology adoption decisions.&lt;/p&gt;
&lt;p&gt;Each industry is governed by a unique set of laws and regulations that are subject to change over time at the discretion of policymakers. These changes affect the context guiding employer decision-making, and can have direct and indirect effects on technology adoption and working conditions. For example, long-term deregulation over certain aspects of the trucking industry has weakened workers&amp;rsquo; power relative to employers, and reduced job quality and working conditions for many truck drivers.&lt;a href=&quot;#_edn39&quot; name=&quot;_ednref39&quot;&gt;&lt;sup&gt;[39]&lt;/sup&gt;&lt;/a&gt; These changes have created distinct labor markets in trucking where workers are especially vulnerable to the invasive or exploitative effects of employers&amp;rsquo; adoption of new technologies. For instance, in local delivery and port trucking, independent contractor misclassification has proliferated and worker protections are minimal. As we have noted, local delivery tasks remain highly reliant on human workers; as a result, local delivery firms are more likely to invest in technology that monitors and controls workers rather than attempting to replace them,&lt;a href=&quot;#_edn40&quot; name=&quot;_ednref40&quot;&gt;&lt;sup&gt;[40]&lt;/sup&gt;&lt;/a&gt; and drivers have limited means to object.&lt;/p&gt;
&lt;p&gt;The health care industry, on the other hand, is highly regulated. Health care involves a complex web of actors and regulations, organized around a division between the providers of care (hospitals, etc.) and the financers of care (insurance companies and the government). In recent years, the government has tried to guide the market toward payment models based on &amp;ldquo;value-based care&amp;rdquo; (VBC) rather than &amp;ldquo;fee for service&amp;rdquo; care, which increase quality and efficiency of care provision. Under VBC models, insurers contract to reimburse providers on a fixed rate (e.g. per-member-per-month), so providers internalize the risk of variable costs associated with their patient population, and thus they no longer have an incentive to maximize the number of claims submitted to insurers.&lt;/p&gt;
&lt;p&gt;The shift toward VBC is likely to accelerate the adoption and diffusion of quality-enhancing health care technologies, such as those that facilitate patient-provider communication and increase access to preventative care.&lt;a href=&quot;#_edn41&quot; name=&quot;_ednref41&quot;&gt;&lt;sup&gt;[41]&lt;/sup&gt;&lt;/a&gt; Regulations advancing VBC may be a promising shift for the health care industry for many reasons, but the constraints that VBC places on health care providers&amp;rsquo; income can also pose challenges for workers&amp;rsquo; bargaining power by limiting the overall amount of resources available for wages and benefits. Ensuring that workers are not penalized by the shift to VBC will require additional regulation and worker organizing.&lt;a href=&quot;#_edn42&quot; name=&quot;_ednref42&quot;&gt;&lt;sup&gt;[42]&lt;/sup&gt;&lt;/a&gt;&lt;/p&gt;
&lt;p&gt;Broader regulations influence markets and technology adoption across industries. In many areas of regulation in the U.S., laws and policies favor the rights and freedoms of employers relative to workers, which creates incentives for employers to compete on labor cost cutting strategies.&lt;a href=&quot;#_edn43&quot; name=&quot;_ednref43&quot;&gt;&lt;sup&gt;[43]&lt;/sup&gt;&lt;/a&gt; Weak federal labor laws have limited the power of labor market institutions like unions to bargain for better wages and working conditions&amp;mdash;including working conditions related to technology.&lt;a href=&quot;#_edn44&quot; name=&quot;_ednref44&quot;&gt;&lt;sup&gt;[44]&lt;/sup&gt;&lt;/a&gt;&lt;/p&gt;
&lt;p&gt;Some states have stronger labor regulations, however, such as laws that specifically target independent contractor misclassification. Other states have laws that make it more difficult for workers to advocate for their rights and form unions. Twenty-eight states have &amp;ldquo;right to work&amp;rdquo; (RTW) laws that inhibit worker organizing. In RTW states, labor unions have less power to shape legislation or working conditions, and wages for workers tend to be lower.&lt;a href=&quot;#_edn45&quot; name=&quot;_ednref45&quot;&gt;&lt;sup&gt;[45]&lt;/sup&gt;&lt;/a&gt; The strength or weakness of labor regulation affects workplace technology deployment in important ways; workers&amp;rsquo; ability to fully participate in this process can be inhibited &lt;em&gt;or&lt;/em&gt; enhanced depending on the law, as can their ability to organize to protect themselves from potential harms of new technologies (see next section).&lt;/p&gt;
&lt;p&gt;The lack of regulation governing employers&amp;rsquo; uses of technology in the workplace has had a profound effect on employers&amp;rsquo; use of technology in relation to their workers. As we note in our 2021 report &lt;em&gt;Data and Algorithms at Work: The Case for Worker Technology Rights&lt;/em&gt;, the dearth of regulation creates strong incentives for employers to use digital technologies widely, and in ways that can directly or indirectly harm workers. There is also no oversight of the testing and quality of new systems that developers sell, which can worsen adverse effects for workers.&lt;a href=&quot;#_edn46&quot; name=&quot;_ednref46&quot;&gt;&lt;sup&gt;[46]&lt;/sup&gt;&lt;/a&gt;&lt;/p&gt;
&lt;p&gt;Recent efforts to remedy this challenge have been promising, however. In September 2021, California passed a bill targeting the grueling pace of work in Amazon warehouses by limiting companies&amp;rsquo; use of production quotas, and improving transparency around the use of algorithms in setting quotas, and several states have since passed or proposed similar legislation.&lt;a href=&quot;#_edn47&quot; name=&quot;_ednref47&quot;&gt;[47]&lt;/a&gt; In April 2022, California legislators introduced A.B. 1651, The Workplace Technology Accountability Act, which would establish broad protections for workers against employers&amp;#8217; use of monitoring and algorithmic management technologies.&lt;a href=&quot;#_edn48&quot; name=&quot;_ednref48&quot;&gt;&lt;sup&gt;[48]&lt;/sup&gt;&lt;/a&gt; Legislators in California and elsewhere have passed laws fighting independent contractor misclassification, granting employment protections like minimum wage, overtime, and workers&amp;rsquo; compensation to workers in trucking and app-based delivery.&lt;a href=&quot;#_edn49&quot; name=&quot;_ednref49&quot;&gt;[49]&lt;/a&gt;&lt;/p&gt;
&lt;h3&gt;&lt;a name=&quot;_Toc104553465&quot;&gt;&lt;/a&gt;Worker organizations&lt;/h3&gt;
&lt;p&gt;Unions and worker organizations can affect technology adoption patterns in individual firms, and in the industries and regions where they represent significant portions of an industry&amp;rsquo;s workforce.&lt;a href=&quot;#_edn50&quot; name=&quot;_ednref50&quot;&gt;&lt;sup&gt;[50]&lt;/sup&gt;&lt;/a&gt; Health care workers are more likely to be represented by a union than workers in many other industries in the U.S. This affords them more power in influencing employers&amp;rsquo; decisions related to technology. For example, at Kaiser Permanente, unions played an important role in facilitating the company&amp;rsquo;s switch to an Electronic Health Records system, ensuring effective deployment and use of the system, and protecting employment and wages for workers affected by the new system.&lt;a href=&quot;#_edn51&quot; name=&quot;_ednref51&quot;&gt;&lt;sup&gt;[51]&lt;/sup&gt;&lt;/a&gt;&lt;/p&gt;
&lt;p&gt;Unions also play an important role in certain segments of the trucking and grocery industries. The most recent contract negotiated between United Parcel Service (UPS) and the Teamsters union includes a requirement that UPS give the Teamsters six months&amp;rsquo; notice of any company plans to integrate emerging tech, such as drones, driverless vehicles, or truck platooning.&lt;a href=&quot;#_edn52&quot; name=&quot;_ednref52&quot;&gt;[52]&lt;/a&gt;&lt;sup&gt;, &lt;a href=&quot;#_edn53&quot; name=&quot;_ednref53&quot;&gt;[53]&lt;/a&gt;&lt;/sup&gt; The United Food and Commercial Workers union (UFCW), which represents grocery workers, has fought to keep the growing numbers of e-commerce and delivery jobs in-house. UFCW has challenged employer attempts to outsource these jobs to third-party app-based shopping companies that typically use non-union workers or independent contractors.&lt;a href=&quot;#_edn54&quot; name=&quot;_ednref54&quot;&gt;[54]&lt;/a&gt;&lt;/p&gt;
&lt;p&gt;Worker organizations can also affect technology adoption by attempting to create policy. Where unions do not currently exist in significant numbers, other organizations representing workers&amp;mdash;such as United for Respect in the retail sector, the Warehouse Workers Resource Center, and Gig Workers Rising&amp;mdash;have been leading efforts to advocate for stronger regulations of industries around technology and other job quality issues. In some cases, worker organizations have partnered or allied themselves with unions.&lt;/p&gt;
&lt;h3&gt;&lt;a name=&quot;_Toc104553466&quot;&gt;&lt;/a&gt;Competitive structures&lt;/h3&gt;
&lt;p&gt;Regulations create a unique structure of competitive and cooperative arrangements between firms in each industry. Market structures and market power shape employers&amp;rsquo; strategies for growth and survival: what problems are employers trying to solve, what technologies could address those problems, and what factors will affect an employer&amp;rsquo;s decision to invest?&lt;/p&gt;
&lt;p&gt;Weak antitrust enforcement in the U.S. has allowed ownership consolidation to proliferate in many industries, which in turn has led to a gap between large, well-resourced industry leaders that are able to invest in and experiment with cutting-edge technologies, and smaller firms that tend to lag far behind. This dynamic is especially notable in retail and warehouses.&lt;a href=&quot;#_edn55&quot; name=&quot;_ednref55&quot;&gt;&lt;sup&gt;[55]&lt;/sup&gt;&lt;/a&gt; Historically, employers in both industries have been slow to adopt new technologies. The rise of Amazon has reoriented the competitive terrain in both sectors, however, compelling other large employers to integrate new technologies related to e-commerce ordering and delivery into their business strategies, while smaller firms continue to take a more cautious approach.&lt;/p&gt;
&lt;p&gt;The market dominance of a firm like Amazon means that it has an outsize influence on the competitive landscape of an industry, including on employer objectives regarding technology. Firms with the means to invest are focused on technologies that can promote speed in processing, packaging, delivery, and cost-reduction at every step of the way. Large retailers are also concerned with strategies to increase their own market share and to develop new revenue streams. For some smaller retailers, however, growing consumer expectations about low-cost, rapid online ordering and delivery options are reducing their ability to attract customers, further constricting resources available to adopt new technologies.&lt;a href=&quot;#_edn56&quot; name=&quot;_ednref56&quot;&gt;&lt;sup&gt;[56]&lt;/sup&gt;&lt;/a&gt;&lt;/p&gt;
&lt;p&gt;In industries where ownership consolidation is less extreme, employers still face similar pressures to reduce wages, speed up work, and micromanage their workers, but a wider range of strategies related to technology adoption can exist. In the grocery and trucking industries, for instance, there are major employers with unionized employees. At unionized firms, workers can exercise their collective market power to influence the effects of new technologies on their jobs, as in the examples discussed above.&lt;/p&gt;
&lt;p&gt;In health care, the government is the dominant market actor. Although most people in the U.S. have private insurance through their employers, the U.S. government funds Medicare and Medicaid, making it the largest single buyer of insurance in the U.S. As such, it has significant leverage and buying power in the industry. Thus, when President Obama signed the 21st Century Cures Act, which required home care agencies that provide personal care services to have EVV technologies or risk losing their Medicaid claims, &amp;ldquo;the federal government essentially &amp;lsquo;picked a winner,&amp;rsquo;&amp;rdquo; ensuring that this type of technology would proliferate across the market for home care.&lt;a href=&quot;#_edn57&quot; name=&quot;_ednref57&quot;&gt;&lt;sup&gt;[57]&lt;/sup&gt;&lt;/a&gt;&lt;/p&gt;
&lt;h3&gt;&lt;a name=&quot;_Toc104553467&quot;&gt;&lt;/a&gt;Industry trends&lt;/h3&gt;
&lt;p&gt;Ownership consolidation is not the only industry trend creating distinct patterns of technological change. As another important example, changes in consumer preferences also have a profound effect on patterns of technology adoption in each industry. The increase in e-commerce has reoriented employer objectives across several of the industries we studied, including retail, grocery, warehouses, and trucking. Developing effective platforms for online shopping is of course a priority for many employers, as is deploying a wide range of technologies to facilitate rapid order assembly and delivery. Similarly, growing consumer demand for prepared or semi-prepared food rather than groceries has put pressure on traditional grocery stores to develop more options in this area. One result is that some grocery stores are partnering with subscription-based meal kit companies, which typically rely on warehouse-like facilities where workers&amp;rsquo; wages and job quality are comparatively low.&lt;a href=&quot;#_edn58&quot; name=&quot;_ednref58&quot;&gt;[58]&lt;/a&gt;&lt;/p&gt;
&lt;p&gt;In the warehouse industry, there are important differences between production processes for shipping in e-commerce facilities and traditional warehouses. Processing in traditional facilities involving bulk transfer of products is far less labor-intensive and time-sensitive compared to processing in e-commerce facilities. As a result, traditional warehouse employers may be less interested in the kind of intensive employee surveillance pioneered by Amazon, and more interested in advances in warehouse management systems and machinery to automate movement of goods around a facility.&lt;a href=&quot;#_edn59&quot; name=&quot;_ednref59&quot;&gt;&lt;sup&gt;[59]&lt;/sup&gt;&lt;/a&gt;&lt;/p&gt;
&lt;p&gt;Another industry trend affecting technological adoption is outsourcing. We&amp;rsquo;ve already discussed outsourcing in the context of trucking, grocery, and food delivery, and the implications of these changes for workers, in particular independent contractors, who lack basic employee rights and protections on the job. There has also been an increase in recent years in firm-to-firm outsourcing in some sectors, such as retailers outsourcing warehouse services to third-party logistics companies (&amp;ldquo;3PLs&amp;rdquo;). Competition in the 3PL market is extremely price-sensitive, and contracts are often short-term, which may blunt employers&amp;rsquo; incentives to invest in specialized technology.&lt;a href=&quot;#_edn60&quot; name=&quot;_ednref60&quot;&gt;&lt;sup&gt;[60]&lt;/sup&gt;&lt;/a&gt;&lt;/p&gt;
&lt;h3&gt;&lt;a name=&quot;_Toc104553468&quot;&gt;&lt;/a&gt;Broader societal and market trends&lt;/h3&gt;
&lt;p&gt;The COVID-19 pandemic, long-term demographic changes, and shifts in economic conditions and labor markets all affect patterns of technological change across multiple industries, but the consequences of these trends are not uniform across or even within industries. In particular, the pandemic appears to be speeding up technology adoption in some cases but slowing it down in others. For example, grocery employers have rapidly shifted to online ordering and health care providers to telehealth options since 2020; these are both technologies that had made limited inroads prior to the pandemic. On the other hand, financial constraints in stores and restaurants caused by declines in in-store shopping and eating have limited some employers&amp;rsquo; ability to experiment or invest in any new technologies.&lt;a href=&quot;#_edn61&quot; name=&quot;_ednref61&quot;&gt;&lt;sup&gt;[61]&lt;/sup&gt;&lt;/a&gt;&lt;/p&gt;
&lt;p&gt;COVID-19 has also reshaped employers&amp;rsquo; objectives and strategies related to technology. In industries where workers have been required to work onsite, such as health care, grocery stores, and warehouses, technologies that could help reduce disease transmission for customers or workers became a priority for some employers.&lt;a href=&quot;#_edn62&quot; name=&quot;_ednref62&quot;&gt;[62]&lt;/a&gt; These included new forms of data gathering on workers&amp;rsquo; health to prevent and track outbreaks, and technologies that reduce the need for on-site workers or reduce their physical proximity to one another, such as semi-autonomous service robots and cashierless checkout.&lt;a href=&quot;#_edn63&quot; name=&quot;_ednref63&quot;&gt;&lt;sup&gt;[63]&lt;/sup&gt;&lt;/a&gt;&lt;/p&gt;
&lt;p&gt;Societal and demographic trends affect industries&amp;rsquo; uptake of technology as well. Women&amp;rsquo;s long-term increases in labor force participation has induced growing demand for prepared food along with online ordering of groceries and takeout. In the U.S., people are also living longer on average, which creates an interest among health care providers in technologies that can respond to the increasing demand for long-term care.&lt;a href=&quot;#_edn64&quot; name=&quot;_ednref64&quot;&gt;&lt;sup&gt;[64]&lt;/sup&gt;&lt;/a&gt; Additionally, an aging workforce has led to a retirement bubble in certain industries that may exacerbate ongoing labor shortages, with a prime example being trucking.&lt;/p&gt;
&lt;p&gt;Broader trends may work in favor of or against workers in terms of technology adoption and its consequences. Labor shortages are benefiting some workers in sectors like trucking and warehousing by prompting long-overdue wage increases, but they may also accentuate employers&amp;rsquo; interest in technologies that reduce employers&amp;rsquo; reliance on workers in the long-run.&lt;a href=&quot;#_edn65&quot; name=&quot;_ednref65&quot;&gt;&lt;sup&gt;[65]&lt;/sup&gt;&lt;/a&gt; As discussed above, the pandemic has likely accelerated some employers&amp;rsquo; interest in labor-displacing technologies and employee surveillance technologies, but it has also reduced some employers&amp;rsquo; ability to invest in such technologies, potentially slowing the pace of change in certain industries and market segments.&lt;/p&gt;
&lt;h2&gt;&lt;a name=&quot;_Toc104553469&quot;&gt;&lt;/a&gt;Conclusions&lt;/h2&gt;
&lt;p&gt;Recent technological advances such as big data, robotics, and artificial intelligence have expanded our technological capabilities exponentially, and are poised to accelerate the pace of change in many industries. In some cases, employers will deploy new technologies in ways that reduce the number of jobs available. In other cases, they will use new technologies in ways that expand the numbers of existing jobs or create entirely new types of positions. Employers also will continue to use new technologies to reorganize production, reshuffle tasks, and change work processes. Across all the industries our researchers studied, we found that new technologies pose a significant threat to workers&amp;rsquo; wages and job quality, and equity for women, people of color, and other disadvantaged workers. Many employers are using&amp;mdash;or exploring the use of&amp;mdash;technologies that facilitate monitoring and control over workers&amp;rsquo; actions, speed up the pace of work, and generally devalue workers and their contributions.&lt;/p&gt;
&lt;p&gt;The COVID-19 pandemic has injected additional uncertainty into forecasting the future of work; it serves as an important reminder that the form new technologies take and the consequences they have are not preordained. What the jobs of tomorrow will look like depends on the choices we make now to shape the course of tech development and adoption, and on the mitigable ground rules for the economy overall and for the industries in which these decisions are situated. Our studies illustrate how employers&amp;rsquo; choices about technological change occur within the context of specific industries and markets, and the regulations and institutions that guide and govern how firms function.&lt;/p&gt;
&lt;p&gt;The same forces that have constrained workers&amp;rsquo; ability to improve their wages and working conditions are currently on course to wield disproportionate influence over the types of technologies that are developed and the ways they are deployed in each industry. Through our industry studies we have highlighted the importance of regulations to allow workers to help shape the process of technological change, and for employers to be motivated to make choices that prioritize quality-based over cost-based competition. Industry regulation and labor market institutions matter in guiding employer options and choices around technology adoption, and the resultant outcomes for workers.&lt;/p&gt;
&lt;p&gt;In industries with some presence of unions&amp;mdash;health care, trucking, and grocery&amp;mdash;our researchers identified examples of workers influencing the process of new technology adoption to create better outcomes for workers. However, even in these industries, our researchers found that broader societal and economic trends are likely to continue to push employers to use new technologies in ways that increase the challenges workers face on the job. In industries like non-food retail and warehouses, where unions are less common and where large firms are able to set the terms of competition, prospects for workers to experience beneficial effects from technological change are even bleaker.&lt;/p&gt;
&lt;p&gt;Absent an intentional shift in our current approaches to technological change, the industries our researchers studied are likely to see employers use new technologies in ways that make job quality worse and widen economic and race and gender inequality in the labor market. So how do we change our course? We know that new technologies &lt;em&gt;can&lt;/em&gt; be used in ways that support workers, but how do we get there? The findings of our studies suggest that achieving better outcomes for workers will take a multifaceted approach including industry-specific institutional and regulatory changes, broader policy changes, and workplace-based organizing.&lt;/p&gt;

&lt;p&gt;&lt;a href=&quot;#_ednref1&quot; name=&quot;_edn1&quot;&gt;[1]&lt;/a&gt; There is of course a substantial and growing body of theoretical and empirical literature on technological change and work, including but not limited to the question of automation. For some recent examples see Acemoglu &amp;amp; Restrepo (2020); Agrawal et al. (2019); Hu (2022); Jarrahi et al. (2021); Kellogg et al. (2020); Moradi &amp;amp; Levy (2020); Rogers (2020). For a discussion of methodological approaches to studying technology and work, see Bailey &amp;amp; Barley (2020).&lt;/p&gt;

&lt;p&gt;&lt;a href=&quot;#_ednref21&quot; name=&quot;_edn21&quot;&gt;&lt;sup&gt;[21]&lt;/sup&gt;&lt;/a&gt; Viscelli (2018)&lt;/p&gt;
&lt;p&gt;&lt;a href=&quot;#_ednref22&quot; name=&quot;_edn22&quot;&gt;&lt;sup&gt;[22]&lt;/sup&gt;&lt;/a&gt; Data collection on workers often serves another function besides monitoring, task direction and pace-setting: generating data to inform the development of new tools and machines to automate certain types of tasks.&lt;/p&gt;
&lt;p&gt;&lt;a href=&quot;#_ednref23&quot; name=&quot;_edn23&quot;&gt;&lt;sup&gt;[23]&lt;/sup&gt;&lt;/a&gt; Hanley &amp;amp; Hubbard (2020)&lt;/p&gt;
&lt;p&gt;&lt;a href=&quot;#_ednref24&quot; name=&quot;_edn24&quot;&gt;&lt;sup&gt;[24]&lt;/sup&gt;&lt;/a&gt; Tung et al. (2021)&lt;/p&gt;
&lt;p&gt;&lt;a href=&quot;#_ednref25&quot; name=&quot;_edn25&quot;&gt;&lt;sup&gt;[25]&lt;/sup&gt;&lt;/a&gt; Litwin (2020)&lt;/p&gt;
&lt;p&gt;&lt;a href=&quot;#_ednref26&quot; name=&quot;_edn26&quot;&gt;&lt;sup&gt;[26]&lt;/sup&gt;&lt;/a&gt; Eubanks &amp;amp; Mateescu (2021)&lt;/p&gt;
&lt;p&gt;&lt;a href=&quot;#_ednref27&quot; name=&quot;_edn27&quot;&gt;&lt;sup&gt;[27]&lt;/sup&gt;&lt;/a&gt; Levy (2015)&lt;/p&gt;
&lt;p&gt;&lt;a href=&quot;#_ednref28&quot; name=&quot;_edn28&quot;&gt;&lt;sup&gt;[28]&lt;/sup&gt;&lt;/a&gt; Workers are also monitored as a by-product of employers&amp;rsquo; use of video monitoring to track customers as well (e.g., for shoplifting or for tracking customer shopping habits). (Carr&amp;eacute; et al. 2020)&lt;/p&gt;
&lt;p&gt;&lt;a href=&quot;#_ednref29&quot; name=&quot;_edn29&quot;&gt;&lt;sup&gt;[29]&lt;/sup&gt;&lt;/a&gt; Benner et al. (2020)&lt;/p&gt;
&lt;p&gt;&lt;a href=&quot;#_ednref30&quot; name=&quot;_edn30&quot;&gt;&lt;sup&gt;[30]&lt;/sup&gt;&lt;/a&gt; Bhuiyan (2020)&lt;/p&gt;
&lt;p&gt;&lt;a href=&quot;#_ednref31&quot; name=&quot;_edn31&quot;&gt;&lt;sup&gt;[31]&lt;/sup&gt;&lt;/a&gt; Gutelius &amp;amp; Theodore (2019)&lt;/p&gt;
&lt;p&gt;&lt;a href=&quot;#_ednref32&quot; name=&quot;_edn32&quot;&gt;&lt;sup&gt;[32]&lt;/sup&gt;&lt;/a&gt; Carr&amp;eacute; et al. (2020)&lt;/p&gt;
&lt;p&gt;&lt;a href=&quot;#_ednref33&quot; name=&quot;_edn33&quot;&gt;&lt;sup&gt;[33]&lt;/sup&gt;&lt;/a&gt; Litwin (2020)&lt;/p&gt;
&lt;p&gt;&lt;a href=&quot;#_ednref34&quot; name=&quot;_edn34&quot;&gt;&lt;sup&gt;[34]&lt;/sup&gt;&lt;/a&gt; Bernhardt et al. (2021); Heilweil (2020)&lt;/p&gt;
&lt;p&gt;&lt;a href=&quot;#_ednref35&quot; name=&quot;_edn35&quot;&gt;&lt;sup&gt;[35]&lt;/sup&gt;&lt;/a&gt; Gutelius &amp;amp; Theodore (2019) p. 61.&lt;/p&gt;
&lt;p&gt;&lt;a href=&quot;#_ednref36&quot; name=&quot;_edn36&quot;&gt;&lt;sup&gt;[36]&lt;/sup&gt;&lt;/a&gt; Bogen (2019)&lt;/p&gt;
&lt;p&gt;&lt;a href=&quot;#_ednref37&quot; name=&quot;_edn37&quot;&gt;&lt;sup&gt;[37]&lt;/sup&gt;&lt;/a&gt; Harwell (2019)&lt;/p&gt;
&lt;p&gt;&lt;a href=&quot;#_ednref38&quot; name=&quot;_edn38&quot;&gt;&lt;sup&gt;[38]&lt;/sup&gt;&lt;/a&gt; Vogel (2018).&lt;/p&gt;
&lt;p&gt;&lt;a href=&quot;#_ednref39&quot; name=&quot;_edn39&quot;&gt;&lt;sup&gt;[39]&lt;/sup&gt;&lt;/a&gt; Viscelli (2018), p. 7. Levy (2015) notes that certain regulations have increased in trucking: some Department of Transportation rules introduced over the past few decades have actually led to increased electronic monitoring of truckers.&lt;/p&gt;
&lt;p&gt;&lt;a href=&quot;#_ednref40&quot; name=&quot;_edn40&quot;&gt;&lt;sup&gt;[40]&lt;/sup&gt;&lt;/a&gt; Viscelli (2018)&lt;/p&gt;
&lt;p&gt;&lt;a href=&quot;#_ednref41&quot; name=&quot;_edn41&quot;&gt;&lt;sup&gt;[41]&lt;/sup&gt;&lt;/a&gt; Litwin (2020)&lt;/p&gt;
&lt;p&gt;&lt;a href=&quot;#_ednref42&quot; name=&quot;_edn42&quot;&gt;&lt;sup&gt;[42]&lt;/sup&gt;&lt;/a&gt; Litwin (2020) p. 37&lt;/p&gt;
&lt;p&gt;&lt;a href=&quot;#_ednref43&quot; name=&quot;_edn43&quot;&gt;&lt;sup&gt;[43]&lt;/sup&gt;&lt;/a&gt; Litwin et al. (2022)&lt;/p&gt;
&lt;p&gt;&lt;a href=&quot;#_ednref44&quot; name=&quot;_edn44&quot;&gt;&lt;sup&gt;[44]&lt;/sup&gt;&lt;/a&gt; Additionally, although labor is relatively inexpensive, the U.S. tax code favors employer investments in capital over investments in labor in a variety of ways, which may incentivize firms to pursue labor-replacing technologies in the long run (Acemoglu et al. 2020).&lt;/p&gt;
&lt;p&gt;&lt;a href=&quot;#_ednref45&quot; name=&quot;_edn45&quot;&gt;&lt;sup&gt;[45]&lt;/sup&gt;&lt;/a&gt; Constant (2021)&lt;/p&gt;
&lt;p&gt;&lt;a href=&quot;#_ednref46&quot; name=&quot;_edn46&quot;&gt;&lt;sup&gt;[46]&lt;/sup&gt;&lt;/a&gt; Bernhardt et al. (2021)&lt;/p&gt;
&lt;p&gt;&lt;a href=&quot;#_ednref47&quot; name=&quot;_edn47&quot;&gt;[47]&lt;/a&gt; Connecticut and Minnesota passed similar bills, and one was proposed in Washington as well. Both chambers of the New York State Legislature have passed the Warehouse Worker Protection Act, though it has yet to be signed by the governor. (An Act Concerning Protection of Warehouse Workers, 2022; Concerning Warehouse Distribution Centers., 2021; HF 2774 Status in the Senate for the 92nd Legislature (2021 &amp;#8211; 2022), 2021; Roth, 2022).&lt;/p&gt;
&lt;p&gt;&lt;a href=&quot;#_ednref48&quot; name=&quot;_edn48&quot;&gt;&lt;sup&gt;[48]&lt;/sup&gt;&lt;/a&gt; Kalish (2022)&lt;/p&gt;
&lt;p&gt;&lt;a href=&quot;#_ednref49&quot; name=&quot;_edn49&quot;&gt;[49]&lt;/a&gt; However, companies like Uber, Lyft, and Doordash continue attempting to weaken and overturn these laws. In 2020, Uber, Lyft and Doordash spent over $200 million in California to pass Proposition 22, which invalidated the law extending employment rights to many app-based workers. An Alameda County Superior Court Judge ruled the ballot measure unconstitutional in 2021, but it remains in effect during the app companies&amp;rsquo; appeal. (Conger &amp;amp; Browning 2021; Lyons 2021).&lt;/p&gt;
&lt;p&gt;&lt;a href=&quot;#_ednref50&quot; name=&quot;_edn50&quot;&gt;&lt;sup&gt;[50]&lt;/sup&gt;&lt;/a&gt; Kresge (2020b). It&amp;rsquo;s important to point out that there are ongoing debates around the extent of unions&amp;rsquo; legal right to bargain over employers&amp;rsquo; decision-making regarding technology, versus the effects of their decisions regarding technology. See Ashford &amp;amp; Ayers (1987); Rasband (1989)&lt;/p&gt;
&lt;p&gt;&lt;a href=&quot;#_ednref51&quot; name=&quot;_edn51&quot;&gt;&lt;sup&gt;[51]&lt;/sup&gt;&lt;/a&gt; Litwin (2020)&lt;/p&gt;
&lt;p&gt;&lt;a href=&quot;#_ednref52&quot; name=&quot;_edn52&quot;&gt;[52]&lt;/a&gt; Platooning involves electronically linking a series of trucks. In human-human platooning, humans drive each truck, but the lead truck controls the speed and braking in the following truck(s). In human-drone platooning, the lead truck is driven by a human, and subsequent truck(s) are controlled by technology. (Viscelli, 2018).&lt;/p&gt;
&lt;p&gt;&lt;a href=&quot;#_ednref53&quot; name=&quot;_edn53&quot;&gt;&lt;sup&gt;[53]&lt;/sup&gt;&lt;/a&gt; Kapadia (2019)&lt;/p&gt;
&lt;p&gt;&lt;a href=&quot;#_ednref54&quot; name=&quot;_edn54&quot;&gt;[54]&lt;/a&gt; Howland (2021)&lt;/p&gt;
&lt;p&gt;&lt;a href=&quot;#_ednref55&quot; name=&quot;_edn55&quot;&gt;&lt;sup&gt;[55]&lt;/sup&gt;&lt;/a&gt; Benner et al., (2020); Carr&amp;eacute; et al. (2020); Gutelius &amp;amp; Theodore (2019)&lt;/p&gt;
&lt;p&gt;&lt;a href=&quot;#_ednref56&quot; name=&quot;_edn56&quot;&gt;&lt;sup&gt;[56]&lt;/sup&gt;&lt;/a&gt; Carr&amp;eacute; et al. (2020)&lt;/p&gt;

&lt;p&gt;&lt;a href=&quot;#_ednref58&quot; name=&quot;_edn58&quot;&gt;[58]&lt;/a&gt; Benner et al. (2020) p. 17, 61&lt;/p&gt;
