&lt;/span&gt;&lt;h1 class=&quot;entry-title&quot; data-dcnode-id=&quot;1089&quot; itemprop=&quot;name headline&quot;&gt;&lt;span data-dcnode-id=&quot;1090&quot; instrument_node=&quot;&quot;&gt;The Pros and Cons of Automation in the Workplace&lt;/span&gt;&lt;/h1&gt;&lt;span data-dcnode-id=&quot;1088&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;aside class=&quot;post-meta&quot; data-dcnode-id=&quot;1086&quot;&gt;&lt;span data-dcnode-id=&quot;1087&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;div class=&quot;small-12 medium-10 large-7 columns&quot; data-dcnode-id=&quot;775&quot;&gt;&lt;span data-dcnode-id=&quot;1075&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;post-content&quot; data-dcnode-id=&quot;786&quot;&gt;&lt;span data-dcnode-id=&quot;1074&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1067&quot;&gt;&lt;span data-dcnode-id=&quot;1072&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;1073&quot; instrument_node=&quot;&quot;&gt;For years, economists and workers alike have speculated about the possible impacts of automation on the economy. While some physically-intensive industries such as manufacturing have experienced radical change with the onset of &lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1070&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;1071&quot; instrument_node=&quot;&quot;&gt;automation&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1068&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;1069&quot; instrument_node=&quot;&quot;&gt;, the types of automation transforming the modern workplace look very different from the robot takeover some have feared.&amp;nbsp;&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1066&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1063&quot;&gt;&lt;span data-dcnode-id=&quot;1064&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;1065&quot; instrument_node=&quot;&quot;&gt;Nevertheless, to remain competitive, companies will need to stay ahead of the technological curve and ensure their employees have the skills they need to be productive in an automated reality.&amp;nbsp;&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1062&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;1059&quot;&gt;&lt;span data-dcnode-id=&quot;1060&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;1061&quot; instrument_node=&quot;&quot;&gt;What Is Automation?&amp;nbsp;&lt;/span&gt;&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;1058&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1049&quot;&gt;&lt;span data-dcnode-id=&quot;1056&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;1057&quot; instrument_node=&quot;&quot;&gt;Put simply, &lt;/span&gt;&lt;/span&gt;&lt;strong data-dcnode-id=&quot;1054&quot;&gt;&lt;span data-dcnode-id=&quot;1055&quot; instrument_node=&quot;&quot;&gt;workplace automation&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1050&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;strong data-dcnode-id=&quot;1052&quot;&gt;&lt;span data-dcnode-id=&quot;1053&quot; instrument_node=&quot;&quot;&gt; refers to the use of systems to perform repetitive or predictable tasks without direct human inputs.&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1051&quot; instrument_node=&quot;&quot;&gt; Automation can be applied to physical tasks using machinery or robots, or to data-driven processes using software and algorithms.&amp;nbsp;&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1048&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1043&quot;&gt;&lt;span data-dcnode-id=&quot;1046&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;1047&quot; instrument_node=&quot;&quot;&gt;However, there are &lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1044&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;1045&quot; instrument_node=&quot;&quot;&gt;pros and cons of automation in the workplace.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1042&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1040&quot;&gt;&lt;img alt=&quot;Chart listing the benefits and drawbacks of automation in the workplace&quot; class=&quot;alignnone wp-image-11247 size-full lazyautosizes lazyloaded&quot; data-dcnode-id=&quot;1041&quot; data-sizes=&quot;auto&quot; data-src=&quot;https://s35764.pcdn.co/wp-content/uploads/2021/11/Automation-in-the-workplace.png&quot; data-srcset=&quot;https://s35764.pcdn.co/wp-content/uploads/2021/11/Automation-in-the-workplace.png 1201w, https://s35764.pcdn.co/wp-content/uploads/2021/11/Automation-in-the-workplace-300x292.png 300w, https://s35764.pcdn.co/wp-content/uploads/2021/11/Automation-in-the-workplace-1024x995.png 1024w, https://s35764.pcdn.co/wp-content/uploads/2021/11/Automation-in-the-workplace-768x746.png 768w, https://s35764.pcdn.co/wp-content/uploads/2021/11/Automation-in-the-workplace-380x369.png 380w, https://s35764.pcdn.co/wp-content/uploads/2021/11/Automation-in-the-workplace-20x19.png 20w, https://s35764.pcdn.co/wp-content/uploads/2021/11/Automation-in-the-workplace-190x185.png 190w, https://s35764.pcdn.co/wp-content/uploads/2021/11/Automation-in-the-workplace-760x738.png 760w, https://s35764.pcdn.co/wp-content/uploads/2021/11/Automation-in-the-workplace-1140x1108.png 1140w, https://s35764.pcdn.co/wp-content/uploads/2021/11/Automation-in-the-workplace-150x146.png 150w&quot; height=&quot;1167&quot; loading=&quot;lazy&quot; sizes=&quot;516px&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//s35764.pcdn.co/wp-content/uploads/2021/11/Automation-in-the-workplace.png&amp;amp;raw&quot; srcset=&quot;https://s35764.pcdn.co/wp-content/uploads/2021/11/Automation-in-the-workplace.png 1201w, https://s35764.pcdn.co/wp-content/uploads/2021/11/Automation-in-the-workplace-300x292.png 300w, https://s35764.pcdn.co/wp-content/uploads/2021/11/Automation-in-the-workplace-1024x995.png 1024w, https://s35764.pcdn.co/wp-content/uploads/2021/11/Automation-in-the-workplace-768x746.png 768w, https://s35764.pcdn.co/wp-content/uploads/2021/11/Automation-in-the-workplace-380x369.png 380w, https://s35764.pcdn.co/wp-content/uploads/2021/11/Automation-in-the-workplace-20x19.png 20w, https://s35764.pcdn.co/wp-content/uploads/2021/11/Automation-in-the-workplace-190x185.png 190w, https://s35764.pcdn.co/wp-content/uploads/2021/11/Automation-in-the-workplace-760x738.png 760w, https://s35764.pcdn.co/wp-content/uploads/2021/11/Automation-in-the-workplace-1140x1108.png 1140w, https://s35764.pcdn.co/wp-content/uploads/2021/11/Automation-in-the-workplace-150x146.png 150w&quot; width=&quot;1201&quot;&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1039&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;1036&quot;&gt;&lt;span data-dcnode-id=&quot;1037&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;1038&quot; instrument_node=&quot;&quot;&gt;Benefits of Automation in the Workplace&lt;/span&gt;&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;1035&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1032&quot;&gt;&lt;span data-dcnode-id=&quot;1033&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;1034&quot; instrument_node=&quot;&quot;&gt;Automation can help savvy companies grow the bottom line in a number of ways. During the COVID-19 pandemic, it’s also proven essential for keeping businesses on track through supply chain disruptions, remote work, and many other challenges. Key benefits include the following.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1031&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;1027&quot;&gt;&lt;i data-dcnode-id=&quot;1028&quot;&gt;&lt;span data-dcnode-id=&quot;1029&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;1030&quot; instrument_node=&quot;&quot;&gt;Increased Employee Engagement&lt;/span&gt;&lt;/span&gt;&lt;/i&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1026&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1013&quot;&gt;&lt;span data-dcnode-id=&quot;1024&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;1025&quot; instrument_node=&quot;&quot;&gt;Few people enjoy repetitive tasks like data entry or email follow-up. Automating those tasks can free up employees’ time to focus on the kind of innovative, value-added work that can only be done by a human, and that many find more satisfying. It’s not surprising, then, that &lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1020&quot; style=&quot;text-decoration: underline;&quot;&gt;&lt;a data-dcnode-id=&quot;1021&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//zapier.com/blog/state-of-business-automation-2021/&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1022&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;1023&quot; instrument_node=&quot;&quot;&gt;Zapier found&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1018&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;1019&quot; instrument_node=&quot;&quot;&gt; that 90% of surveyed &lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1016&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;1017&quot; instrument_node=&quot;&quot;&gt;knowledge workers&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1014&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;1015&quot; instrument_node=&quot;&quot;&gt; agreed that automation has improved people’s lives in the workplace, or that 65% report that automating manual tasks has decreased their stress level.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1012&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;1008&quot;&gt;&lt;i data-dcnode-id=&quot;1009&quot;&gt;&lt;span data-dcnode-id=&quot;1010&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;1011&quot; instrument_node=&quot;&quot;&gt;Consistent, On-Time Output&lt;/span&gt;&lt;/span&gt;&lt;/i&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1007&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1004&quot;&gt;&lt;span data-dcnode-id=&quot;1005&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;1006&quot; instrument_node=&quot;&quot;&gt;When tasks like sending lead-generation emails or tracking inventory are automated and set to run at a regular interval, businesses remove human delays and disruptions from the equation. This means sick days, unexpected emergencies, or heavy workloads don’t disrupt timely functions. The predictability of automation allows companies to better plan ahead and anticipate challenges and opportunities, rather than being blindsided by them.&amp;nbsp;&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1003&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;999&quot;&gt;&lt;i data-dcnode-id=&quot;1000&quot;&gt;&lt;span data-dcnode-id=&quot;1001&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;1002&quot; instrument_node=&quot;&quot;&gt;Fewer Costly Errors&lt;/span&gt;&lt;/span&gt;&lt;/i&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;998&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;989&quot;&gt;&lt;span data-dcnode-id=&quot;996&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;997&quot; instrument_node=&quot;&quot;&gt;Whether automation is handling a simple task—like entering new customers’ email addresses into a customer relationship management program—or conducting complex financial projections, if properly configured it can &lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;992&quot; style=&quot;text-decoration: underline;&quot;&gt;&lt;a data-dcnode-id=&quot;993&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.forbes.com/sites/forbestechcouncil/2018/11/09/how-the-right-automation-road-map-helps-overcome-human-error/%3Fsh%3D46bb3929647f&quot;&gt;&lt;span data-dcnode-id=&quot;994&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;995&quot; instrument_node=&quot;&quot;&gt;reduce the potential for errors&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;990&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;991&quot; instrument_node=&quot;&quot;&gt;. After all, computers aren’t easily distracted like humans. Plus, when employees can access data and workflows through a centralized process, they are far less likely to encounter miscommunications and duplication of work.&amp;nbsp;&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;988&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;984&quot;&gt;&lt;i data-dcnode-id=&quot;985&quot;&gt;&lt;span data-dcnode-id=&quot;986&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;987&quot; instrument_node=&quot;&quot;&gt;Growth and Scalability&lt;/span&gt;&lt;/span&gt;&lt;/i&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;983&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;980&quot;&gt;&lt;span data-dcnode-id=&quot;981&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;982&quot; instrument_node=&quot;&quot;&gt;Certain types of automation (for example, automating marketing workflows) allow businesses to reach far more customers without additional employee inputs. That means they can potentially grow and scale their business with lower associated operating costs since fewer additional workers are needed to complete manual processes.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;979&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;976&quot;&gt;&lt;span data-dcnode-id=&quot;977&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;978&quot; instrument_node=&quot;&quot;&gt;Drawbacks of Automation in the Workplace&lt;/span&gt;&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;975&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;968&quot;&gt;&lt;span data-dcnode-id=&quot;973&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;974&quot; instrument_node=&quot;&quot;&gt;While there are many benefits of automation in the workplace, it’s not without its drawbacks. Challenges posed by &lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;971&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;972&quot; instrument_node=&quot;&quot;&gt;workplace automation&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;969&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;970&quot; instrument_node=&quot;&quot;&gt; include the following.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;967&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;963&quot;&gt;&lt;i data-dcnode-id=&quot;964&quot;&gt;&lt;span data-dcnode-id=&quot;965&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;966&quot; instrument_node=&quot;&quot;&gt;Cost of Implementation&lt;/span&gt;&lt;/span&gt;&lt;/i&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;962&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;953&quot;&gt;&lt;span data-dcnode-id=&quot;960&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;961&quot; instrument_node=&quot;&quot;&gt;While automation can pay significant dividends, it’s important to note the upfront costs &lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;956&quot; style=&quot;text-decoration: underline;&quot;&gt;&lt;a data-dcnode-id=&quot;957&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www2.deloitte.com/content/dam/Deloitte/us/Documents/technology-media-telecommunications/blue-prism-white-paper-final.pdf&quot;&gt;&lt;span data-dcnode-id=&quot;958&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;959&quot; instrument_node=&quot;&quot;&gt;when calculating potential ROI&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;954&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;955&quot; instrument_node=&quot;&quot;&gt;. These include direct costs like purchasing software licenses, working with vendors for configuration and rollout, data infrastructure and governance, and ongoing maintenance, as well as the costs associated with employee training, software monitoring and support, and more.&amp;nbsp;&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;952&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;949&quot;&gt;&lt;span data-dcnode-id=&quot;950&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;951&quot; instrument_node=&quot;&quot;&gt;Businesses that require highly customized solutions can expect to pay an additional premium. These capital expenditures can be a difficult obstacle for companies to overcome if they are already operating on tight margins.&amp;nbsp;&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;948&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;944&quot;&gt;&lt;i data-dcnode-id=&quot;945&quot;&gt;&lt;span data-dcnode-id=&quot;946&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;947&quot; instrument_node=&quot;&quot;&gt;Shifts in Employee Roles&lt;/span&gt;&lt;/span&gt;&lt;/i&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;943&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;929&quot;&gt;&lt;span data-dcnode-id=&quot;941&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;942&quot; instrument_node=&quot;&quot;&gt;Thus far, automation has not resulted in net losses of knowledge worker jobs—in fact, a &lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;937&quot; style=&quot;text-decoration: underline;&quot;&gt;&lt;a data-dcnode-id=&quot;938&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//pubsonline.informs.org/doi/abs/10.1287/mnsc.2020.3812&quot;&gt;&lt;span data-dcnode-id=&quot;939&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;940&quot; instrument_node=&quot;&quot;&gt;recent study&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;935&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;936&quot; instrument_node=&quot;&quot;&gt; by researchers from the Wharton School at the University of Pennsylvania found the companies that adopt automation &lt;/span&gt;&lt;/span&gt;&lt;i data-dcnode-id=&quot;932&quot;&gt;&lt;span data-dcnode-id=&quot;933&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;934&quot; instrument_node=&quot;&quot;&gt;increase &lt;/span&gt;&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;930&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;931&quot; instrument_node=&quot;&quot;&gt;their number of overall employees, likely because of the increases in productivity and revenue associated with automation.&amp;nbsp;&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;928&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;925&quot;&gt;&lt;span data-dcnode-id=&quot;926&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;927&quot; instrument_node=&quot;&quot;&gt;However, the balance of employees does shift. The study found that the number of managers in an organization decreases with automation in the workplace, likely because automated processes require less oversight. Researchers predict this trend will continue with an increase in employment for high- and low-skilled workers, and a decrease for middle-skilled workers.&amp;nbsp;&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;924&quot; instrument_node=&quot;&quot;&gt;

uot;904&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//emeritus.org/blog/examples-of-technology-skills-in-demand/&quot;&gt;&lt;span data-dcnode-id=&quot;905&quot; instrument_node=&quot;&quot;&gt;technological skills&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;902&quot; instrument_node=&quot;&quot;&gt; will rise by 50%. Additionally, demand for &lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;897&quot; style=&quot;text-decoration: underline;&quot;&gt;&lt;a data-dcnode-id=&quot;898&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//emeritus.org/blog/soft-skills-in-the-workplace/&quot;&gt;&lt;span data-dcnode-id=&quot;899&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;900&quot; instrument_node=&quot;&quot;&gt;soft skills&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;896&quot; instrument_node=&quot;&quot;&gt; that automation cannot duplicate&lt;/span&gt;&lt;span data-dcnode-id=&quot;894&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;895&quot; instrument_node=&quot;&quot;&gt;, like relationship-building and effective communication, will continue to rise.&amp;nbsp;&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;892&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;875&quot;&gt;&lt;span data-dcnode-id=&quot;876&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;877&quot; instrument_node=&quot;&quot;&gt;Examples of Automation in the Workplace&lt;/span&gt;&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;874&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;870&quot;&gt;&lt;span data-dcnode-id=&quot;872&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;873&quot; instrument_node=&quot;&quot;&gt;For years, automated machinery has dominated factories and warehouses. However, many of today’s most innovative automation technologies are found in offices or remote workplace settings. Examples of automation include:&lt;/span&gt;&lt;/span&gt;&lt;i data-dcnode-id=&quot;871&quot;&gt;&lt;/i&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;869&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;825&quot;&gt;&lt;span data-dcnode-id=&quot;868&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li aria-level=&quot;1&quot; data-dcnode-id=&quot;862&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;i data-dcnode-id=&quot;865&quot;&gt;&lt;span data-dcnode-id=&quot;866&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;867&quot; instrument_node=&quot;&quot;&gt;Marketing automation: &lt;/span&gt;&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;863&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;864&quot; instrument_node=&quot;&quot;&gt;Automated processes that send messages in response to certain triggers (such as adding an item to a digital shopping cart) to ensure companies can reach potential buyers as soon as they’re ready to purchase&lt;/span&gt;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;861&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li aria-level=&quot;1&quot; data-dcnode-id=&quot;855&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;i data-dcnode-id=&quot;858&quot;&gt;&lt;span data-dcnode-id=&quot;859&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;860&quot; instrument_node=&quot;&quot;&gt;Human resources automation: &lt;/span&gt;&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;856&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;857&quot; instrument_node=&quot;&quot;&gt;Automated processes that handle payroll, expense reimbursements, timesheets, and more&amp;nbsp;&lt;/span&gt;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;854&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li aria-level=&quot;1&quot; data-dcnode-id=&quot;848&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;i data-dcnode-id=&quot;851&quot;&gt;&lt;span data-dcnode-id=&quot;852&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;853&quot; instrument_node=&quot;&quot;&gt;Inventory management and distribution automation: &lt;/span&gt;&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;849&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;850&quot; instrument_node=&quot;&quot;&gt;Tools to help predict demand, track inventory, and alert managers to bottlenecks&lt;/span&gt;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;847&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;824&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;803&quot;&gt;&lt;span data-dcnode-id=&quot;804&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;805&quot; instrument_node=&quot;&quot;&gt;For companies, the question is no longer whether to look toward automation, but rather, how to implement it—and how to prepare their employees for the workplace of the future.&amp;nbsp;&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;802&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;799&quot;&gt;&lt;em data-dcnode-id=&quot;800&quot;&gt;&lt;span data-dcnode-id=&quot;801&quot; instrument_node=&quot;&quot;&gt;By Rachel Hastings&lt;/span&gt;&lt;/em&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;798&quot; instrument_node=&quot;&quot;&gt;
