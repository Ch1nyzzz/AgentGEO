&lt;/span&gt;&lt;div class=&quot;col-md-10 col-md-offset-1 main-article&quot; data-dcnode-id=&quot;1458&quot;&gt;&lt;span data-dcnode-id=&quot;1702&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;1700&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;lead&quot; data-dcnode-id=&quot;1698&quot;&gt;&lt;span data-dcnode-id=&quot;1699&quot; instrument_node=&quot;&quot;&gt;
                            Geoforensics is a method the police and forensic scientists use to help solve murder-related crimes. Here we uncover cases where the innovative approach of analysing soil evidence proved successful.
                        &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1697&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;oas-header-mpu-mobile hidden-print mobile-HideAds&quot; data-dcnode-id=&quot;1693&quot;&gt;&lt;span data-dcnode-id=&quot;1696&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;1694&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1692&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;body-content&quot; data-dcnode-id=&quot;1501&quot;&gt;&lt;span data-dcnode-id=&quot;1691&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1689&quot;&gt;&lt;span data-dcnode-id=&quot;1690&quot; instrument_node=&quot;&quot;&gt;Twenty-two series and 200 episodes of the BBC CSI drama ‘Silent Witness’ testifies to the enduring appeal of forensics in television. Real CSI (crime scene investigation) is somewhat different – less intuitive, more scientific, but just as fascinating, perhaps more so.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1688&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1686&quot;&gt;&lt;span data-dcnode-id=&quot;1687&quot; instrument_node=&quot;&quot;&gt;Forensic geology, also known as geoforensics, is the analysis of soil evidence to help solve crimes. Such evidence found at a&amp;nbsp;crime scene can be definitively incriminating in the hands of experts.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1685&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1683&quot;&gt;&lt;span data-dcnode-id=&quot;1684&quot; instrument_node=&quot;&quot;&gt;Soil samples, from footwear or vehicle footwells, can demonstrate a clear timeline of the movements of suspects and their vehicles, making a lie of their stated alibi locations and tying them into a crime scene.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1682&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1680&quot;&gt;&lt;span data-dcnode-id=&quot;1681&quot; instrument_node=&quot;&quot;&gt;Mud recovered from a killer’s vehicle can direct a search for a missing body and help to secure a murder conviction, and geophysical techniques, commonly used in archaeology, can be deployed to reveal clandestine burials.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1679&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1675&quot;&gt;&lt;em data-dcnode-id=&quot;1677&quot;&gt;&lt;span data-dcnode-id=&quot;1678&quot; instrument_node=&quot;&quot;&gt;E&amp;amp;T&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1676&quot; instrument_node=&quot;&quot;&gt; meets three global experts in forensic geology who tease out the truth, through careful analysis of soil evidence, to identify criminals and find bodies.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1674&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1672&quot;&gt;&lt;span data-dcnode-id=&quot;1673&quot; instrument_node=&quot;&quot;&gt;Dr Pier Matteo Barone, an archaeologist and geoforensic expert based at the American University of Rome, was called in by police in central Italy in 2013, six&amp;nbsp;months after the disappearance of an unnamed missing person. He was asked to check police intelligence to help to locate a&amp;nbsp;body.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1671&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1669&quot;&gt;&lt;span data-dcnode-id=&quot;1670&quot; instrument_node=&quot;&quot;&gt;During the investigation, the police had two hypotheses. The first suggested that the body had been buried under a concrete road surface; this was easily disproved by checking timeline satellite imagery of the area to pinpoint when the road had been laid. Its construction post-dated the person’s disappearance. Other intelligence stated that the body had been buried in a nearby volcanic area known to contain many shallow subsurface caves.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1668&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1666&quot;&gt;&lt;span data-dcnode-id=&quot;1667&quot; instrument_node=&quot;&quot;&gt;In response to the hypotheses, Barone decided to use a ground-penetrating radar (GPR – see boxout below, Geophysics) to survey an area of almost one hectare with real-time results. The GPR was equipped with 500MHz antennas to create a radargram, and depth slices that showed the subsurface to about 3m&amp;nbsp;below. It was possible to see a large cave about 2m underground and 3-4m in diameter. Something lay inside that needed investigation.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1665&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;panel panel-box-out&quot; data-dcnode-id=&quot;1633&quot;&gt;&lt;span data-dcnode-id=&quot;1664&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;panel-heading&quot; data-dcnode-id=&quot;1656&quot;&gt;&lt;span data-dcnode-id=&quot;1663&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;sub-head&quot; data-dcnode-id=&quot;1661&quot;&gt;&lt;span data-dcnode-id=&quot;1662&quot; instrument_node=&quot;&quot;&gt;Search techniques&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1660&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;1658&quot;&gt;&lt;span data-dcnode-id=&quot;1659&quot; instrument_node=&quot;&quot;&gt;Geophysics&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1657&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1655&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;panel-body&quot; data-dcnode-id=&quot;1635&quot;&gt;&lt;span data-dcnode-id=&quot;1654&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1652&quot;&gt;&lt;span data-dcnode-id=&quot;1653&quot; instrument_node=&quot;&quot;&gt;From hidden weapon caches to clandestine graves, geophysical search techniques can reveal secrets hidden under the soil or underwater. They can also augment or replace hugely expensive traditional searches, which are dependent on manpower resources to cover large areas of ground searching for signs of ground disturbance. As well as being expensive in terms of labour and time, these searches can be unproductive.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1651&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1649&quot;&gt;&lt;span data-dcnode-id=&quot;1650&quot; instrument_node=&quot;&quot;&gt;Ground-penetrating radar, or GPR, is commonly used in forensic search and often in conjunction with cadaver dogs to narrow down a search area. Up to four antennas of varying frequencies can be mounted on the device, which looks a little like a lawnmower on large wheels. On it, a mounted tablet shows the readout of the subsurface radargram to the operator in real time.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1648&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1646&quot;&gt;&lt;span data-dcnode-id=&quot;1647&quot; instrument_node=&quot;&quot;&gt;There is a trade-off between frequency and resolution: the higher the frequency the greater the resolution but the lower the depth of penetration. It is a technique used to search the subsurface, effective within a few metres from the ground surface.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1645&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1643&quot;&gt;&lt;span data-dcnode-id=&quot;1644&quot; instrument_node=&quot;&quot;&gt;Apart from its use in forensics, GPR is commonly used by utility companies to map underground pipes and cables, and other infrastructure.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1642&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1640&quot;&gt;&lt;span data-dcnode-id=&quot;1641&quot; instrument_node=&quot;&quot;&gt;ERT, or electrical resistivity tomography, is&amp;nbsp;an electrical method deployed where GPR&amp;nbsp;cannot function well, for instance in areas of high moisture or salt content. It is, however, much more time-consuming to set up and the results are not available to teams in real time.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1639&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1637&quot;&gt;&lt;span data-dcnode-id=&quot;1638&quot; instrument_node=&quot;&quot;&gt;Completing the geophysical toolbox, magnetometers are used to detect small variations in the Earth’s magnetic field. They can also be useful in forensic search applications to locate ferrous metallic objects such as a cache of weapons or a buried knife.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1636&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1634&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1632&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1630&quot;&gt;&lt;span data-dcnode-id=&quot;1631&quot; instrument_node=&quot;&quot;&gt;“GPR isn’t an X-ray device, but we could see an anomaly, something in a corner of the cave,” Barone explains. “I directed police to go around the hillside below, where they found an area of disturbed soil that had been dug over, and hidden under branches and bushes, concealing the entrance to a cave.”&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1629&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1627&quot;&gt;&lt;span data-dcnode-id=&quot;1628&quot; instrument_node=&quot;&quot;&gt;After carefully removing the soil following archaeological excavation standards, layer by layer to preserve any evidence, it was clear that there was a partially decomposed body inside the cave. “Once forensic pathologists had a body to work with, that was obviously an enormous help to the police. The case has yet to go to trial, so I cannot be more specific with any other details,” says Barone.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1626&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1624&quot;&gt;&lt;span data-dcnode-id=&quot;1625&quot; instrument_node=&quot;&quot;&gt;In Northern Ireland in 2006, Queen’s University Belfast forensic geologist Alastair Ruffell was called into a complex double homicide case. Four brothers were accused of causing the deaths of a couple at their remote country cottage in South Armagh.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1623&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1621&quot;&gt;&lt;span data-dcnode-id=&quot;1622&quot; instrument_node=&quot;&quot;&gt;The couple had died in a conflagration following the explosion of combustible vapour inside their home; two of the suspects were also badly burned at the time and ended up in hospital in the Irish Republic. One brother had allegedly been abused by the deceased man some years previously. The four Smith brothers initially all had alibis for the evening in question.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1620&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1618&quot;&gt;&lt;span data-dcnode-id=&quot;1619&quot; instrument_node=&quot;&quot;&gt;“My first job was to collect and examine over 370 soil samples from the brothers’ homes, around the murder scene, and a quarry where one of four vehicles used had been dumped,” says Ruffell. “We were looking for key samples from footwear or cars that could tell the story of the movements of the owners in micro-stratigraphically layered soil deposits.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1617&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1615&quot;&gt;&lt;span data-dcnode-id=&quot;1616&quot; instrument_node=&quot;&quot;&gt;“I like to lay out my samples on a large white bench in a spatial distribution to represent the geography on the ground, and this helps me with an initial visual sorting of&amp;nbsp;the&amp;nbsp;samples,” Ruffell adds.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1614&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1612&quot;&gt;&lt;span data-dcnode-id=&quot;1613&quot; instrument_node=&quot;&quot;&gt;The soils analysed were mineral-rich, so Fourier transform infrared spectrophotometry (FTIR) measurements and an X-ray diffraction (XRD) were taken.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1611&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1609&quot;&gt;&lt;span data-dcnode-id=&quot;1610&quot; instrument_node=&quot;&quot;&gt;With FTIR, the sample was irradiated with infrared light so that the 3D structure of the molecules in the soil sample are revealed as a spectrograph. “The results from suspects’ boots or cars can then be compared to results from the known sampling sites,” Ruffell says.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1608&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1593&quot;&gt;&lt;span data-dcnode-id=&quot;1607&quot; instrument_node=&quot;&quot;&gt;XRD was used to categorise the mineral composition of the soil samples. Both techniques are non-destructive and served the purpose of helping to zoom in on the most helpful of samples, excluding others.&lt;/span&gt;&lt;/p&gt;&lt;div class=&quot;hidden-print mpuAdPosition mobile-HideAds&quot; data-dcnode-id=&quot;1594&quot; id=&quot;midArticlePosition&quot;&gt;&lt;span data-dcnode-id=&quot;1606&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;1604&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;1601&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div data-dcnode-id=&quot;1596&quot; id=&quot;div-gpt-ad-1572440998491-0&quot;&gt;&lt;span data-dcnode-id=&quot;1600&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;1597&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1595&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;p&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1592&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1590&quot;&gt;&lt;span data-dcnode-id=&quot;1591&quot; instrument_node=&quot;&quot;&gt;“Of the original 370 samples, we identified about 25 that from the chemical analysis of the soil from boots and vehicles, tell the story of where the suspects had been on that night, critically overturning their alibis, and directly linking them to the crime scene,” Ruffell concludes.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1589&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1587&quot;&gt;&lt;span data-dcnode-id=&quot;1588&quot; instrument_node=&quot;&quot;&gt;These samples were submitted for QemScan analysis, which uses energy-dispersive X-ray analysis of individual particles under the scanning electron microscope to map elemental contents and ratios of individual particles, further confirming the other results.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1586&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1584&quot;&gt;&lt;span data-dcnode-id=&quot;1585&quot; instrument_node=&quot;&quot;&gt;Moreover, two of the four cars owned by the brothers had superb evidence linking the vehicles to the track on the way into the scene of the crime and layered over that was the distinct geological signature of the quarry where one of the cars was dumped on the way out of the crime scene. These distinct layers also tied into samples taken from one of the men’s boots, conclusively disproving their alibis.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1583&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1581&quot;&gt;&lt;span data-dcnode-id=&quot;1582&quot; instrument_node=&quot;&quot;&gt;The four brothers were convicted of manslaughter after the jury accepted their version of events that there had been no intent to kill and were ultimately jailed for up to 11 years each.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1580&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1578&quot;&gt;&lt;span data-dcnode-id=&quot;1579&quot; instrument_node=&quot;&quot;&gt;Another case where geological evidence played a key role was the search for a missing person in northern England during 2013. On 7&amp;nbsp;March, Pamela Jackson’s sons reported their mother missing after not hearing from her for five days. Police quickly focused their attention on her partner, Adrian Muir, the last person to have seen her alive.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1577&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1575&quot;&gt;&lt;span data-dcnode-id=&quot;1576&quot; instrument_node=&quot;&quot;&gt;Muir was quickly established as the chief suspect after major inconsistencies appeared in his story of events as told to family members and to the police.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1574&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1572&quot;&gt;&lt;span data-dcnode-id=&quot;1573&quot; instrument_node=&quot;&quot;&gt;During the night and days after Jackson’s disappearance, mobile-phone tracking placed Muir in his car travelling between her home in County Durham and his home in Halifax. This tracking encompassed a huge area of the wild and isolated moors of West Yorkshire, and a distance of 100 miles by road. Muir was a fell runner and gamekeeper who knew the area well.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1571&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1569&quot;&gt;&lt;span data-dcnode-id=&quot;1570&quot; instrument_node=&quot;&quot;&gt;Given that there were no witnesses, a shallow grave could be dug in under five minutes in the soft peaty soil. Muir denied all involvement in the death of his partner, despite recording a suicide note on his phone shortly after her disappearance.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1568&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1566&quot;&gt;&lt;span data-dcnode-id=&quot;1567&quot; instrument_node=&quot;&quot;&gt;Professor Lorna Dawson, an eminent geoforensic scientist at the James Hutton Institute in Aberdeen, was called in by County Durham police as part of a specialist team from Alecto Forensic Services to assist in the search phase.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1565&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1563&quot;&gt;&lt;span data-dcnode-id=&quot;1564&quot; instrument_node=&quot;&quot;&gt;“We identified target-sampling sites across the search area supported by case-specific intelligence and recovered mud from a pair of gloves from the boot of Muir’s car,” Dawson analyses. “We also integrated models of body deposition behaviour such as convenient parking, soil diggability and seclusion from passers-by into our search strategy.”&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1562&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1560&quot;&gt;&lt;span data-dcnode-id=&quot;1561&quot; instrument_node=&quot;&quot;&gt;They were able to exclude four out of the five possible search areas from their geology alone using an XRD mineralogical analysis of the soil. “That resulted in a theoretical area of approximately 5x3km2. Still large for a search area,” Dawson says.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1559&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1557&quot;&gt;&lt;span data-dcnode-id=&quot;1558&quot; instrument_node=&quot;&quot;&gt;The team turned to examining the organic composition of the soil from Muir’s gloves to narrow the search area further. Gas chromatographic analysis of the alcohol and alkane fractions of the soil organic material revealed specific information about the vegetation types at the site. Plant species can be identified from the waxy marker molecules on their surfaces.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1556&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1554&quot;&gt;&lt;span data-dcnode-id=&quot;1555&quot; instrument_node=&quot;&quot;&gt;These results allowed Dawson to direct the police to an area of moorland grass, distinct from the heather and gorse that covers much of the moors. Within that area, a police dog handler, Ian Jefferies, was able to use excellent field craft to identify the exact burial site, confirmed by his labrador Sid.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1553&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1551&quot;&gt;&lt;span data-dcnode-id=&quot;1552&quot; instrument_node=&quot;&quot;&gt;The results of the analysis of the mud on Muir’s gloves had taken police to where Pamela Jackson was found, but the team returned to Muir’s car to link him further to the actual burial site. Despite Muir’s best efforts to valet his car, they were able to retrieve a sample of soil aggregates deep in the pile of the footwell carpets. It matched the characteristics of the soil from the subsoil 60cm below the surface of the grave site, proving that he had been in contact with&amp;nbsp;it.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1550&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1548&quot;&gt;&lt;span data-dcnode-id=&quot;1549&quot; instrument_node=&quot;&quot;&gt;Combined with other compelling evidence – such as Muir’s fingerprint on the cellophane of a bunch of flowers that he buried with his former partner, phone and CCTV records – a strong case brought together all the strands of evidence and led to Muir being sentenced to 18 years for the manslaughter of Pamela Jackson. To this day, Muir declares his innocence.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1547&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1545&quot;&gt;&lt;span data-dcnode-id=&quot;1546&quot; instrument_node=&quot;&quot;&gt;Geoforensic evidence in these three cases contributed to the locating of the bodies and, in two so far, the conviction of the killers.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1544&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1542&quot;&gt;&lt;span data-dcnode-id=&quot;1543&quot; instrument_node=&quot;&quot;&gt;All of the cases were complex and multifaceted. “The end result has to be justice for the victims and their families, bringing together of all the different strands of evidence to make a strong and compelling case to the court,” says Dawson.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1541&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;panel panel-box-out&quot; data-dcnode-id=&quot;1503&quot;&gt;&lt;span data-dcnode-id=&quot;1540&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;panel-heading&quot; data-dcnode-id=&quot;1532&quot;&gt;&lt;span data-dcnode-id=&quot;1539&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;sub-head&quot; data-dcnode-id=&quot;1537&quot;&gt;&lt;span data-dcnode-id=&quot;1538&quot; instrument_node=&quot;&quot;&gt;Body farms&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1536&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;1534&quot;&gt;&lt;span data-dcnode-id=&quot;1535&quot; instrument_node=&quot;&quot;&gt;Test beds for search techniques&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1533&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1531&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;panel-body&quot; data-dcnode-id=&quot;1505&quot;&gt;&lt;span data-dcnode-id=&quot;1530&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1528&quot;&gt;&lt;span data-dcnode-id=&quot;1529&quot; instrument_node=&quot;&quot;&gt;How do you go about finding the best method to locate buried bodies? A good place to start is a body farm. The world’s first body farm was opened in 1971 at the University of Tennessee by Dr William Bass to study the process of decomposition of human bodies.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1527&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1525&quot;&gt;&lt;span data-dcnode-id=&quot;1526&quot; instrument_node=&quot;&quot;&gt;Bodies are buried clothed or unclothed in shallower or deeper graves, in different soil types, and at different times of year – all of which have a major effect on the speed of decomposition.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1524&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1522&quot;&gt;&lt;span data-dcnode-id=&quot;1523&quot; instrument_node=&quot;&quot;&gt;There are now six other body farms in the US, and new facilities have opened recently in Australia and the Netherlands.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1521&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1519&quot;&gt;&lt;span data-dcnode-id=&quot;1520&quot; instrument_node=&quot;&quot;&gt;Facilities in the UK use pigs as human corpse proxies. However, some scientists believe that pigs decompose quite differently from humans and so may be of limited use to science.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1518&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1516&quot;&gt;&lt;span data-dcnode-id=&quot;1517&quot; instrument_node=&quot;&quot;&gt;There is also huge variability in the speed&amp;nbsp;of decomposition according to the geology. A body buried 50 or even 500 years ago in wet peat may still be almost intact, while a corpse buried in dry sand will rapidly decay.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1515&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1513&quot;&gt;&lt;span data-dcnode-id=&quot;1514&quot; instrument_node=&quot;&quot;&gt;Body farms have multiple purposes beyond the direct study of the mechanisms of human decomposition. Corpse or cadaver sniffer dogs can be trained at these sites, geophysicists can refine their choice of instrument, and the often difficult interpretation of the radargrams and depth slices that their instruments record. Police and forensic scientists can study and train in the best practice in evidence collection.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1512&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1510&quot;&gt;&lt;span data-dcnode-id=&quot;1511&quot; instrument_node=&quot;&quot;&gt;The problem with body farms is that even the oldest is not very old. So, researchers have looked at parts of old cemeteries that were being redeveloped to assist in replicating the circumstances of much older missing persons’ remains. This approach also has limitations as criminals generally do not use coffins in clandestine graves, but it is providing insight into how long bodies can be detected by geophysical methods, feeding into cold-​case searches.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1509&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1507&quot;&gt;&lt;span data-dcnode-id=&quot;1508&quot; instrument_node=&quot;&quot;&gt;The facilities, varied as they are, depend on donations and by all accounts there is no shortage of these. It is thought that 120 people a year donate their bodies to the original Tennessee body farm.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1506&quot; instrument_node=&quot;&quot;&gt;
