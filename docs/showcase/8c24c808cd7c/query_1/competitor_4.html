&lt;/span&gt;&lt;p data-dcnode-id=&quot;1722&quot;&gt;&lt;span data-dcnode-id=&quot;1725&quot; instrument_node=&quot;&quot;&gt;By &lt;/span&gt;&lt;a data-dcnode-id=&quot;1723&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.police1.com/columnists/joshua-lee/&quot;&gt;&lt;span data-dcnode-id=&quot;1724&quot; instrument_node=&quot;&quot;&gt;Sergeant Joshua Lee&lt;/span&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1721&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1719&quot;&gt;&lt;span data-dcnode-id=&quot;1720&quot; instrument_node=&quot;&quot;&gt;The idea of intelligent machines has long been the subject of science fiction films. Fortunately, we now live in an era in which Artificial Intelligence (AI) and Machine Learning (ML) is no longer fiction, but reality.&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1718&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1716&quot;&gt;&lt;span data-dcnode-id=&quot;1717&quot; instrument_node=&quot;&quot;&gt;The terms AI and ML are heavily used in the private sector, especially among companies involved in Big Data, analytics, information technology and process improvement. Even though the terms are often used interchangeably, the differences are important to understand.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1715&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1713&quot;&gt;&lt;span data-dcnode-id=&quot;1714&quot; instrument_node=&quot;&quot;&gt;Artificial Intelligence (AI) is a much broader term related to how a machine “thinks” or processes information. Think of AI as the brain of a person. Machine learning (ML) however, is related to the process of how a machine learns. Machines learn in different ways – just as people do.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1712&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1710&quot;&gt;&lt;span data-dcnode-id=&quot;1711&quot; instrument_node=&quot;&quot;&gt;AI and ML technologies are extremely powerful and efficient ways to process large amounts of information. There is no question these technologies are becoming a permanent part of the law enforcement ecosystem.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1709&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1707&quot;&gt;&lt;span data-dcnode-id=&quot;1708&quot; instrument_node=&quot;&quot;&gt;Here are a few considerations to keep in mind before purchasing AI and ML technology.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1706&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;1703&quot;&gt;&lt;strong data-dcnode-id=&quot;1704&quot;&gt;&lt;span data-dcnode-id=&quot;1705&quot; instrument_node=&quot;&quot;&gt;USE HUMANS AND AI; NOT ONE OR THE OTHER&lt;/span&gt;&lt;/strong&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1702&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1700&quot;&gt;&lt;span data-dcnode-id=&quot;1701&quot; instrument_node=&quot;&quot;&gt;A crucial component of the proper application of AI and ML technology is keeping the human component. Many ethical concerns related to using these technologies stem from removing the human component of AI – and rightfully so.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1699&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1697&quot;&gt;&lt;span data-dcnode-id=&quot;1698&quot; instrument_node=&quot;&quot;&gt;Bud Levin, an expert in AI at the FBI’s Training Division, reiterates the fact that taking the human element out of AI is potentially dangerous since machines do not understand the “complexities and absurdities of the Constitution, our laws, and policies.” [1]&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1696&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1694&quot;&gt;&lt;span data-dcnode-id=&quot;1695&quot; instrument_node=&quot;&quot;&gt;The goal of any good AI and ML program is to encourage officers to do what they normally do but to increase their efficiency and effectiveness to better protect society. &amp;nbsp;AI and ML should always be used in conjunction with humans, not as a replacement for, humans.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1693&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;1690&quot;&gt;&lt;strong data-dcnode-id=&quot;1691&quot;&gt;&lt;span data-dcnode-id=&quot;1692&quot; instrument_node=&quot;&quot;&gt;THE NEED FOR GOOD DATA&lt;/span&gt;&lt;/strong&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1689&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1687&quot;&gt;&lt;span data-dcnode-id=&quot;1688&quot; instrument_node=&quot;&quot;&gt;AI and ML technologies are progressing rapidly, and for good reason – they are learning. It is now possible to purchase “mature” machines that have already made mistakes in their learning rather than relying on adolescent machines. Sounds pretty close to parenting, right. Just as kids are more prone to make mistakes, adolescent machines are also more prone to make mistakes.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1686&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1678&quot;&gt;&lt;span data-dcnode-id=&quot;1685&quot; instrument_node=&quot;&quot;&gt;This is where the difference between AI and ML comes in. Machine learning, especially &lt;/span&gt;&lt;em data-dcnode-id=&quot;1683&quot;&gt;&lt;span data-dcnode-id=&quot;1684&quot; instrument_node=&quot;&quot;&gt;deep machine learning&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1682&quot; instrument_node=&quot;&quot;&gt;, means that instead of being programmed to perform specific tasks, a computer can learn independently and adapt to its understanding based on the data it receives. The more &lt;/span&gt;&lt;em data-dcnode-id=&quot;1680&quot;&gt;&lt;span data-dcnode-id=&quot;1681&quot; instrument_node=&quot;&quot;&gt;“good”&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1679&quot; instrument_node=&quot;&quot;&gt; data it is exposed to, the better the computer can begin to recognize and identify objects based on complex pattern recognition. “Bad” data in ML can lead to mistakes.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1677&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1675&quot;&gt;&lt;span data-dcnode-id=&quot;1676&quot; instrument_node=&quot;&quot;&gt;Agencies must start now to develop good data entry habits for their officers.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1674&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1672&quot;&gt;&lt;span data-dcnode-id=&quot;1673&quot; instrument_node=&quot;&quot;&gt;The reason for good data is simple:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1671&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1669&quot;&gt;&lt;span data-dcnode-id=&quot;1670&quot; instrument_node=&quot;&quot;&gt;Good data in = Good information out&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1668&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1666&quot;&gt;&lt;span data-dcnode-id=&quot;1667&quot; instrument_node=&quot;&quot;&gt;Bad data in = bad information out&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1665&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1663&quot;&gt;&lt;span data-dcnode-id=&quot;1664&quot; instrument_node=&quot;&quot;&gt;The entire foundation of ML is data. It learns by using the data it is given. Machines, just as humans, can make mistakes by relying on misinformation, false information, or inaccurate information. For that reason, good data collection is a critical role of good ML application.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1662&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;1659&quot;&gt;&lt;strong data-dcnode-id=&quot;1660&quot;&gt;&lt;span data-dcnode-id=&quot;1661&quot; instrument_node=&quot;&quot;&gt;Responsible Application of AI and ML&lt;/span&gt;&lt;/strong&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1658&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1650&quot;&gt;&lt;span data-dcnode-id=&quot;1657&quot; instrument_node=&quot;&quot;&gt;There are many ethics-related questions surrounding AI and ML use in law enforcement. Agencies need to consider &lt;/span&gt;&lt;em data-dcnode-id=&quot;1655&quot;&gt;&lt;span data-dcnode-id=&quot;1656&quot; instrument_node=&quot;&quot;&gt;how&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1654&quot; instrument_node=&quot;&quot;&gt; and &lt;/span&gt;&lt;em data-dcnode-id=&quot;1652&quot;&gt;&lt;span data-dcnode-id=&quot;1653&quot; instrument_node=&quot;&quot;&gt;why&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1651&quot; instrument_node=&quot;&quot;&gt; they are going to use these powerful technologies. More importantly, agencies need to document in detail the how and why in a formal departmental policy.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1649&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1642&quot;&gt;&lt;span data-dcnode-id=&quot;1648&quot; instrument_node=&quot;&quot;&gt;Luckily, agencies do not have to start fresh when developing policy and implementation guidelines for AI and ML technologies. The London based, &lt;/span&gt;&lt;a data-dcnode-id=&quot;1646&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.turing.ac.uk/&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1647&quot; instrument_node=&quot;&quot;&gt;The Alan Turning Institute&lt;/span&gt;&lt;/a&gt;&lt;em data-dcnode-id=&quot;1644&quot;&gt;&lt;span data-dcnode-id=&quot;1645&quot; instrument_node=&quot;&quot;&gt;,&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1643&quot; instrument_node=&quot;&quot;&gt; was created in 2015 to provide data science guidance to both the public and private sectors. In 2017, as a result of a government recommendation, they added guidance and the proper application of artificial intelligence in a joint publication with London’s Informational Commissioners Office (ICO).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1641&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1639&quot;&gt;&lt;span data-dcnode-id=&quot;1640&quot; instrument_node=&quot;&quot;&gt;This publication can be used to easily develop departmental policies.&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1638&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;1635&quot;&gt;&lt;strong data-dcnode-id=&quot;1636&quot;&gt;&lt;span data-dcnode-id=&quot;1637&quot; instrument_node=&quot;&quot;&gt;REAL-LIFE APPLICATIONS OF AI AND ML&lt;/span&gt;&lt;/strong&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1634&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1632&quot;&gt;&lt;span data-dcnode-id=&quot;1633&quot; instrument_node=&quot;&quot;&gt;Agencies are drowning in data, collecting terabytes of it each day. AI and ML’s primary use is data management, specifically making large amounts of data searchable, filterable and retrievable in real-time.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1631&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1629&quot;&gt;&lt;span data-dcnode-id=&quot;1630&quot; instrument_node=&quot;&quot;&gt;Here are just some of the current law enforcement applications for AI and ML:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1628&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1625&quot;&gt;&lt;strong data-dcnode-id=&quot;1626&quot;&gt;&lt;span data-dcnode-id=&quot;1627&quot; instrument_node=&quot;&quot;&gt;1. Faster video analysis and redaction&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1624&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1622&quot;&gt;&lt;span data-dcnode-id=&quot;1623&quot; instrument_node=&quot;&quot;&gt;Video analysis is a resource-intensive task for law enforcement. Many agencies report spending up to two hours redacting a five-minute video for public release or spending 1:1 time watching video surveillance footage in hopes of finding suspects, missing people, or evidence. Those hours can quickly add up.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1621&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1619&quot;&gt;&lt;span data-dcnode-id=&quot;1620&quot; instrument_node=&quot;&quot;&gt;Because of AI and ML technology, officers can filter their searches to look for specific characteristics; for example, a man in a red shirt. The system then will look for just the man in a red shirt. Once the man is identified, the officer can redact or remove all non-involved or non-pertinent information leaving just the man in the red shirt on the screen.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1618&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1615&quot;&gt;&lt;strong data-dcnode-id=&quot;1616&quot;&gt;&lt;span data-dcnode-id=&quot;1617&quot; instrument_node=&quot;&quot;&gt;2. Audio analysis and transcription&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1614&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1612&quot;&gt;&lt;span data-dcnode-id=&quot;1613&quot; instrument_node=&quot;&quot;&gt;An officer’s radio communications is an important piece of evidence in many criminal trials. But sorting through the hours of audio for nuggets of specific information can quickly become overwhelming, which is why many agencies are stopping that practice. Luckily, AI and ML technology can help filter out what is essential by scanning the data for specific information, like when an officer yells, “He has a gun,” or when a suspect is heard in the background, “I am going to hurt you.”&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1611&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1609&quot;&gt;&lt;span data-dcnode-id=&quot;1610&quot; instrument_node=&quot;&quot;&gt;A bonus to audio analysis is real-time audio transcription. Instead of listening to the audio, the system can print out the full audio transcription of the recording to be used in an officer's report, or as evidence.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1608&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1605&quot;&gt;&lt;strong data-dcnode-id=&quot;1606&quot;&gt;&lt;span data-dcnode-id=&quot;1607&quot; instrument_node=&quot;&quot;&gt;3. Real-time search&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1604&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1602&quot;&gt;&lt;span data-dcnode-id=&quot;1603&quot; instrument_node=&quot;&quot;&gt;Because of audio recognition advancements, AI systems can quickly find information needed by the officer, in real-time. An officer can ask the AI system to run a person's name and date of birth, for example. The system then can respond with driver’s license information, warrant information, recent arrests, recent involvement, or recent alerts directly to the officer.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1601&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1598&quot;&gt;&lt;strong data-dcnode-id=&quot;1599&quot;&gt;&lt;span data-dcnode-id=&quot;1600&quot; instrument_node=&quot;&quot;&gt;4. Gunshot detection&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1597&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1595&quot;&gt;&lt;span data-dcnode-id=&quot;1596&quot; instrument_node=&quot;&quot;&gt;One of the fastest evolving use for AI and ML is in gunshot detection devices. Data science companies and scientists are working to develop advanced algorithms to detect the exact location gunshots, how many rounds were fired, and the number of firearms present. Because of AI technology, these systems can even differentiate between muzzle blasts from shock waves to even determine the type of gun (rifle, shotgun, handgun).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1594&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1591&quot;&gt;&lt;strong data-dcnode-id=&quot;1592&quot;&gt;&lt;span data-dcnode-id=&quot;1593&quot; instrument_node=&quot;&quot;&gt;5. Crime forecasting&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1590&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1588&quot;&gt;&lt;span data-dcnode-id=&quot;1589&quot; instrument_node=&quot;&quot;&gt;Many agencies are using AI to help combat crime. These systems can scan through volumes of information to provide accurate crime forecasting using predictive analytics. Agencies can then use that data to allocate police resources.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1587&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1584&quot;&gt;&lt;strong data-dcnode-id=&quot;1585&quot;&gt;&lt;span data-dcnode-id=&quot;1586&quot; instrument_node=&quot;&quot;&gt;6. Report Management Systems (RMS)&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1583&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1581&quot;&gt;&lt;span data-dcnode-id=&quot;1582&quot; instrument_node=&quot;&quot;&gt;RMS 3.0 technology incorporates the use of AI technology into report writing. These systems have the capability of searching narrative content by using search engine optimization (SEO)-like algorithms. AI will significantly increase the analyst's ability to find specific information instead of reading countless reports to find that same information.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1580&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1577&quot;&gt;&lt;strong data-dcnode-id=&quot;1578&quot;&gt;&lt;span data-dcnode-id=&quot;1579&quot; instrument_node=&quot;&quot;&gt;7. Forensic analysis&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1576&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1574&quot;&gt;&lt;span data-dcnode-id=&quot;1575&quot; instrument_node=&quot;&quot;&gt;Any good agency approach to AI and ML would not be complete without including applications for the forensic team. AI and ML technology are currently used in DNA analysis. As DNA technology advances, so has the sensitivity of DNA analysis. Forensic scientists can now detect and process low-level, degraded, or otherwise unviable DNA evidence that could not have been used just a few years ago.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1573&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1571&quot;&gt;&lt;span data-dcnode-id=&quot;1572&quot; instrument_node=&quot;&quot;&gt;There are very few crimes that do not have at least some digital component to them. Human trafficking investigations are improving because of AI technology. Internet companies like PayPal are using AI to detect fraud, and the U.S. Department of Transportation is using AI to track real-time accident, weather, lighting and traffic conditions.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1570&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1568&quot;&gt;&lt;span data-dcnode-id=&quot;1569&quot; instrument_node=&quot;&quot;&gt;Artificial intelligence and machine learning technology are available now to law enforcement worldwide. Is your agency prepared for the future of policing?&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1567&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;hr data-dcnode-id=&quot;1566&quot;&gt;&lt;span data-dcnode-id=&quot;1565&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1562&quot;&gt;&lt;strong data-dcnode-id=&quot;1563&quot;&gt;&lt;span data-dcnode-id=&quot;1564&quot; instrument_node=&quot;&quot;&gt;About the author&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1561&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1558&quot;&gt;&lt;em data-dcnode-id=&quot;1559&quot;&gt;&lt;span data-dcnode-id=&quot;1560&quot; instrument_node=&quot;&quot;&gt;Joshua Lee is an active-duty police sergeant for the City of Mesa (Arizona) Police Department. Before promoting, Joshua served five years as a patrol officer and six years as a detective with the Organized Crime Section investigating civil asset forfeiture, white-collar financial crime&amp;nbsp;and cryptocurrency crimes. Joshua is a cryptocurrency, money laundering and dark web consultant for banks, financial institutions&amp;nbsp;and accountants throughout Arizona. He also serves as one of Arizona’s subject matter experts on cryptocurrency crimes and money laundering.&lt;/span&gt;&lt;/em&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1557&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1554&quot;&gt;&lt;em data-dcnode-id=&quot;1555&quot;&gt;&lt;span data-dcnode-id=&quot;1556&quot; instrument_node=&quot;&quot;&gt;Joshua holds a BA in Justice Studies, an MS in Legal Studies and an MA in Professional Writing. He has earned some of law enforcement’s top certifications, including the ACFE’s Certified Fraud Examiners (CFE) and the IAFC’s Certified Cyber Crimes Investigator (CCCI). Joshua is also an adjunct professor at a large national university and smaller regional college teaching, law, criminal justice, government&amp;nbsp;and English courses. He instructs police in-service training and teaches at the regional police academy.&lt;/span&gt;&lt;/em&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1553&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1551&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1549&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;section class=&quot;Article-block u-hiddenPrint&quot; data-dcnode-id=&quot;1292&quot;&gt;&lt;span data-dcnode-id=&quot;1548&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;Form&quot; data-cub-form-container=&quot;&quot; data-cub-form-type=&quot;Product Article Lead form&quot; data-cub-track=&quot;submit&quot; data-dcnode-id=&quot;1294&quot;&gt;&lt;span data-dcnode-id=&quot;1547&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;header class=&quot;Form-header&quot; data-dcnode-id=&quot;1527&quot;&gt;&lt;span data-dcnode-id=&quot;1546&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;Form-logo&quot; data-dcnode-id=&quot;1532&quot;&gt;&lt;span data-dcnode-id=&quot;1545&quot; instrument_node=&quot;&quot;&gt;
