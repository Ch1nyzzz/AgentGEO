id=&quot;3911&quot;&gt;&lt;span data-dcnode-id=&quot;3912&quot; instrument_node=&quot;&quot;&gt;Knowledge Representation&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;3910&quot; instrument_node=&quot;&quot;&gt; in AI describes the representation of knowledge. Basically, it is a study of how the &lt;/span&gt;&lt;strong data-dcnode-id=&quot;3908&quot;&gt;&lt;span data-dcnode-id=&quot;3909&quot; instrument_node=&quot;&quot;&gt;beliefs, intentions&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;3907&quot; instrument_node=&quot;&quot;&gt;, and&lt;/span&gt;&lt;strong data-dcnode-id=&quot;3905&quot;&gt;&lt;span data-dcnode-id=&quot;3906&quot; instrument_node=&quot;&quot;&gt; judgments&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;3904&quot; instrument_node=&quot;&quot;&gt; of an &lt;/span&gt;&lt;strong data-dcnode-id=&quot;3902&quot;&gt;&lt;span data-dcnode-id=&quot;3903&quot; instrument_node=&quot;&quot;&gt;intelligent agent&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;3901&quot; instrument_node=&quot;&quot;&gt; can be expressed suitably for automated reasoning. One of the primary purposes of Knowledge Representation includes modeling intelligent behavior for an agent.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;3892&quot; style=&quot;text-align: justify;&quot;&gt;&lt;span data-dcnode-id=&quot;3899&quot; instrument_node=&quot;&quot;&gt;Knowledge Representation and Reasoning (&lt;/span&gt;&lt;strong data-dcnode-id=&quot;3897&quot;&gt;&lt;span data-dcnode-id=&quot;3898&quot; instrument_node=&quot;&quot;&gt;KR, KRR&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;3896&quot; instrument_node=&quot;&quot;&gt;) represents information from the real world for a computer to understand and then utilize this knowledge to solve &lt;/span&gt;&lt;strong data-dcnode-id=&quot;3894&quot;&gt;&lt;span data-dcnode-id=&quot;3895&quot; instrument_node=&quot;&quot;&gt;complex real-life problems&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;3893&quot; instrument_node=&quot;&quot;&gt; like communicating with human beings in natural language. Knowledge representation in AI is not just about storing data in a database, it allows a machine to learn from that knowledge and behave intelligently like a human being.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;3890&quot; style=&quot;text-align: justify;&quot;&gt;&lt;span data-dcnode-id=&quot;3891&quot; instrument_node=&quot;&quot;&gt;The different kinds of knowledge that need to be represented in AI include:&lt;/span&gt;&lt;/p&gt;&lt;ul data-dcnode-id=&quot;3865&quot;&gt;&lt;span data-dcnode-id=&quot;3889&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;li data-dcnode-id=&quot;3886&quot;&gt;&lt;strong data-dcnode-id=&quot;3887&quot;&gt;&lt;span data-dcnode-id=&quot;3888&quot; instrument_node=&quot;&quot;&gt;Objects&lt;/span&gt;&lt;/strong&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;3885&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;li data-dcnode-id=&quot;3882&quot;&gt;&lt;strong data-dcnode-id=&quot;3883&quot;&gt;&lt;span data-dcnode-id=&quot;3884&quot; instrument_node=&quot;&quot;&gt;Events&lt;/span&gt;&lt;/strong&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;3881&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;li data-dcnode-id=&quot;3878&quot;&gt;&lt;strong data-dcnode-id=&quot;3879&quot;&gt;&lt;span data-dcnode-id=&quot;3880&quot; instrument_node=&quot;&quot;&gt;Performance&lt;/span&gt;&lt;/strong&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;3877&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;li data-dcnode-id=&quot;3874&quot;&gt;&lt;strong data-dcnode-id=&quot;3875&quot;&gt;&lt;span data-dcnode-id=&quot;3876&quot; instrument_node=&quot;&quot;&gt;Facts&lt;/span&gt;&lt;/strong&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;3873&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;li data-dcnode-id=&quot;3870&quot;&gt;&lt;strong data-dcnode-id=&quot;3871&quot;&gt;&lt;span data-dcnode-id=&quot;3872&quot; instrument_node=&quot;&quot;&gt;Meta-Knowledge&lt;/span&gt;&lt;/strong&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;3869&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;li data-dcnode-id=&quot;3866&quot;&gt;&lt;strong data-dcnode-id=&quot;3867&quot;&gt;&lt;span data-dcnode-id=&quot;3868&quot; instrument_node=&quot;&quot;&gt;Knowledge-base&lt;/span&gt;&lt;/strong&gt;&lt;/li&gt;&lt;/ul&gt;&lt;p data-dcnode-id=&quot;3862&quot; style=&quot;text-align: justify;&quot;&gt;&lt;a data-dcnode-id=&quot;3864&quot; name=&quot;types&quot;&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3863&quot; instrument_node=&quot;&quot;&gt;Now that you know about Knowledge representation in AI, let’s move on and know about the different types of Knowledge.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;3860&quot;&gt;&lt;span data-dcnode-id=&quot;3861&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;h2 data-dcnode-id=&quot;3857&quot;&gt;&lt;strong data-dcnode-id=&quot;3858&quot;&gt;&lt;span data-dcnode-id=&quot;3859&quot; instrument_node=&quot;&quot;&gt;Different Types of Knowledge&lt;/span&gt;&lt;/strong&gt;&lt;/h2&gt;&lt;p data-dcnode-id=&quot;3855&quot;&gt;&lt;span data-dcnode-id=&quot;3856&quot; instrument_node=&quot;&quot;&gt;There are 5 types of Knowledge such as:&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;3853&quot;&gt;&lt;span data-dcnode-id=&quot;3854&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;3851&quot;&gt;&lt;img alt=&quot;types of knowledge - knowledge representation in AI - edureka&quot; class=&quot;aligncenter wp-image-123814 size-large&quot; data-dcnode-id=&quot;3852&quot; height=&quot;300&quot; sizes=&quot;(max-width: 346px) 100vw, 346px&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.edureka.co/blog/wp-content/uploads/2019/12/Picture1-3-346x300.png&amp;amp;raw&quot; srcset=&quot;https://d1jnx9ba8s6j9r.cloudfront.net/blog/wp-content/uploads/2019/12/Picture1-3-346x300.png 346w, https://d1jnx9ba8s6j9r.cloudfront.net/blog/wp-content/uploads/2019/12/Picture1-3-150x130.png 150w, https://d1jnx9ba8s6j9r.cloudfront.net/blog/wp-content/uploads/2019/12/Picture1-3-300x260.png 300w, https://d1jnx9ba8s6j9r.cloudfront.net/blog/wp-content/uploads/2019/12/Picture1-3-768x666.png 768w, https://d1jnx9ba8s6j9r.cloudfront.net/blog/wp-content/uploads/2019/12/Picture1-3-208x180.png 208w, https://d1jnx9ba8s6j9r.cloudfront.net/blog/wp-content/uploads/2019/12/Picture1-3.png 1022w&quot; width=&quot;346&quot;&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;3849&quot;&gt;&lt;span data-dcnode-id=&quot;3850&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;ul data-dcnode-id=&quot;3813&quot;&gt;&lt;span data-dcnode-id=&quot;3848&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;li data-dcnode-id=&quot;3842&quot;&gt;&lt;p data-dcnode-id=&quot;3844&quot; style=&quot;text-align: justify;&quot;&gt;&lt;strong data-dcnode-id=&quot;3846&quot;&gt;&lt;span data-dcnode-id=&quot;3847&quot; instrument_node=&quot;&quot;&gt;Declarative Knowledge&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;3845&quot; instrument_node=&quot;&quot;&gt; – It includes concepts, facts, and objects and expressed in a declarative sentence.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3843&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;3841&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;li data-dcnode-id=&quot;3835&quot;&gt;&lt;p data-dcnode-id=&quot;3837&quot; style=&quot;text-align: justify;&quot;&gt;&lt;strong data-dcnode-id=&quot;3839&quot;&gt;&lt;span data-dcnode-id=&quot;3840&quot; instrument_node=&quot;&quot;&gt;Structural Knowledge&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;3838&quot; instrument_node=&quot;&quot;&gt; – It is a basic problem-solving knowledge that describes the relationship between concepts and objects.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3836&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;3834&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;li data-dcnode-id=&quot;3828&quot;&gt;&lt;p data-dcnode-id=&quot;3830&quot; style=&quot;text-align: justify;&quot;&gt;&lt;strong data-dcnode-id=&quot;3832&quot;&gt;&lt;span data-dcnode-id=&quot;3833&quot; instrument_node=&quot;&quot;&gt;Procedural Knowledge&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;3831&quot; instrument_node=&quot;&quot;&gt; – This is responsible for knowing how to do something and includes rules, strategies, procedures, etc.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3829&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;3827&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;li data-dcnode-id=&quot;3821&quot;&gt;&lt;p data-dcnode-id=&quot;3823&quot; style=&quot;text-align: justify;&quot;&gt;&lt;strong data-dcnode-id=&quot;3825&quot;&gt;&lt;span data-dcnode-id=&quot;3826&quot; instrument_node=&quot;&quot;&gt;Meta Knowledge&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;3824&quot; instrument_node=&quot;&quot;&gt; – Meta Knowledge defines knowledge about other types of Knowledge.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3822&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;3820&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;li data-dcnode-id=&quot;3814&quot;&gt;&lt;p data-dcnode-id=&quot;3816&quot; style=&quot;text-align: justify;&quot;&gt;&lt;strong data-dcnode-id=&quot;3818&quot;&gt;&lt;span data-dcnode-id=&quot;3819&quot; instrument_node=&quot;&quot;&gt;Heuristic Knowledge&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;3817&quot; instrument_node=&quot;&quot;&gt; – This represents some expert knowledge in the field or subject.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3815&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/li&gt;&lt;/ul&gt;&lt;p data-dcnode-id=&quot;3810&quot; style=&quot;text-align: justify;&quot;&gt;&lt;a data-dcnode-id=&quot;3812&quot; name=&quot;cycle&quot;&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3811&quot; instrument_node=&quot;&quot;&gt;These are the important types of Knowledge Representation in AI. Now, let’s have a look at the cycle of knowledge representation and how it works.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;3808&quot;&gt;&lt;span data-dcnode-id=&quot;3809&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;h2 data-dcnode-id=&quot;3805&quot;&gt;&lt;strong data-dcnode-id=&quot;3806&quot;&gt;&lt;span data-dcnode-id=&quot;3807&quot; instrument_node=&quot;&quot;&gt;Cycle of Knowledge Representation in AI&lt;/span&gt;&lt;/strong&gt;&lt;/h2&gt;&lt;p data-dcnode-id=&quot;3803&quot; style=&quot;text-align: justify;&quot;&gt;&lt;span data-dcnode-id=&quot;3804&quot; instrument_node=&quot;&quot;&gt;Artificial Intelligent Systems usually consist of various components to display their intelligent behavior. Some of these components include:&lt;/span&gt;&lt;/p&gt;&lt;ul data-dcnode-id=&quot;3782&quot;&gt;&lt;span data-dcnode-id=&quot;3802&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;li data-dcnode-id=&quot;3799&quot;&gt;&lt;strong data-dcnode-id=&quot;3800&quot;&gt;&lt;span data-dcnode-id=&quot;3801&quot; instrument_node=&quot;&quot;&gt;Perception&lt;/span&gt;&lt;/strong&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;3798&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;li data-dcnode-id=&quot;3795&quot;&gt;&lt;strong data-dcnode-id=&quot;3796&quot;&gt;&lt;span data-dcnode-id=&quot;3797&quot; instrument_node=&quot;&quot;&gt;Learning&lt;/span&gt;&lt;/strong&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;3794&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;li data-dcnode-id=&quot;3791&quot;&gt;&lt;strong data-dcnode-id=&quot;3792&quot;&gt;&lt;span data-dcnode-id=&quot;3793&quot; instrument_node=&quot;&quot;&gt;Knowledge Representation &amp;amp; Reasoning&lt;/span&gt;&lt;/strong&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;3790&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;li data-dcnode-id=&quot;3787&quot;&gt;&lt;strong data-dcnode-id=&quot;3788&quot;&gt;&lt;span data-dcnode-id=&quot;3789&quot; instrument_node=&quot;&quot;&gt;Planning&lt;/span&gt;&lt;/strong&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;3786&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;li data-dcnode-id=&quot;3783&quot;&gt;&lt;strong data-dcnode-id=&quot;3784&quot;&gt;&lt;span data-dcnode-id=&quot;3785&quot; instrument_node=&quot;&quot;&gt;Execution&lt;/span&gt;&lt;/strong&gt;&lt;/li&gt;&lt;/ul&gt;&lt;p data-dcnode-id=&quot;3780&quot;&gt;&lt;span data-dcnode-id=&quot;3781&quot; instrument_node=&quot;&quot;&gt;Here is an example to show the different components of the system and how it works:&lt;/span&gt;&lt;/p&gt;&lt;h3 data-dcnode-id=&quot;3777&quot;&gt;&lt;strong data-dcnode-id=&quot;3778&quot;&gt;&lt;span data-dcnode-id=&quot;3779&quot; instrument_node=&quot;&quot;&gt;Example&lt;/span&gt;&lt;/strong&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;3775&quot;&gt;&lt;span data-dcnode-id=&quot;3776&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;3773&quot;&gt;&lt;img alt=&quot;Cycle- Knowledge representation in AI - edureka&quot; class=&quot;aligncenter wp-image-123847 size-large blur-up lazyloaded&quot; data-dcnode-id=&quot;3774&quot; data-sizes=&quot;(max-width: 484px) 100vw, 484px&quot; data-src=&quot;https://d1jnx9ba8s6j9r.cloudfront.net/blog/wp-content/uploads/2019/12/Picture3-1-484x300.png&quot; data-srcset=&quot;https://d1jnx9ba8s6j9r.cloudfront.net/blog/wp-content/uploads/2019/12/Picture3-1-484x300.png 484w, https://d1jnx9ba8s6j9r.cloudfront.net/blog/wp-content/uploads/2019/12/Picture3-1-150x93.png 150w, https://d1jnx9ba8s6j9r.cloudfront.net/blog/wp-content/uploads/2019/12/Picture3-1-300x186.png 300w, https://d1jnx9ba8s6j9r.cloudfront.net/blog/wp-content/uploads/2019/12/Picture3-1-768x476.png 768w, https://d1jnx9ba8s6j9r.cloudfront.net/blog/wp-content/uploads/2019/12/Picture3-1-291x180.png 291w, https://d1jnx9ba8s6j9r.cloudfront.net/blog/wp-content/uploads/2019/12/Picture3-1.png 1379w&quot; height=&quot;300&quot; sizes=&quot;(max-width: 484px) 100vw, 484px&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//d1jnx9ba8s6j9r.cloudfront.net/blog/wp-content/uploads/2019/12/Picture3-1-484x300.png&amp;amp;raw&quot; srcset=&quot;https://d1jnx9ba8s6j9r.cloudfront.net/blog/wp-content/uploads/2019/12/Picture3-1-484x300.png 484w, https://d1jnx9ba8s6j9r.cloudfront.net/blog/wp-content/uploads/2019/12/Picture3-1-150x93.png 150w, https://d1jnx9ba8s6j9r.cloudfront.net/blog/wp-content/uploads/2019/12/Picture3-1-300x186.png 300w, https://d1jnx9ba8s6j9r.cloudfront.net/blog/wp-content/uploads/2019/12/Picture3-1-768x476.png 768w, https://d1jnx9ba8s6j9r.cloudfront.net/blog/wp-content/uploads/2019/12/Picture3-1-291x180.png 291w, https://d1jnx9ba8s6j9r.cloudfront.net/blog/wp-content/uploads/2019/12/Picture3-1.png 1379w&quot; width=&quot;484&quot;&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;3771&quot;&gt;&lt;span data-dcnode-id=&quot;3772&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;3769&quot;&gt;&lt;span data-dcnode-id=&quot;3770&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;3761&quot; style=&quot;text-align: justify;&quot;&gt;&lt;span data-dcnode-id=&quot;3768&quot; instrument_node=&quot;&quot;&gt;The above diagram shows the interaction of an AI system with the &lt;/span&gt;&lt;strong data-dcnode-id=&quot;3766&quot;&gt;&lt;span data-dcnode-id=&quot;3767&quot; instrument_node=&quot;&quot;&gt;real world&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;3765&quot; instrument_node=&quot;&quot;&gt; and the &lt;/span&gt;&lt;strong data-dcnode-id=&quot;3763&quot;&gt;&lt;span data-dcnode-id=&quot;3764&quot; instrument_node=&quot;&quot;&gt;components&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;3762&quot; instrument_node=&quot;&quot;&gt; involved in showing intelligence.&lt;/span&gt;&lt;/p&gt;&lt;ul data-dcnode-id=&quot;3736&quot;&gt;&lt;span data-dcnode-id=&quot;3760&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;li data-dcnode-id=&quot;3755&quot; style=&quot;text-align: justify;&quot;&gt;&lt;span data-dcnode-id=&quot;3759&quot; instrument_node=&quot;&quot;&gt;The &lt;/span&gt;&lt;strong data-dcnode-id=&quot;3757&quot;&gt;&lt;span data-dcnode-id=&quot;3758&quot; instrument_node=&quot;&quot;&gt;Perception component&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;3756&quot; instrument_node=&quot;&quot;&gt; retrieves data or information from the environment. with the help of this component, you can retrieve data from the environment, find out the source of noises and check if the AI was damaged by anything. Also, it defines how to respond when any sense has been detected.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;3754&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;li data-dcnode-id=&quot;3749&quot; style=&quot;text-align: justify;&quot;&gt;&lt;span data-dcnode-id=&quot;3753&quot; instrument_node=&quot;&quot;&gt;Then, there is the &lt;/span&gt;&lt;strong data-dcnode-id=&quot;3751&quot;&gt;&lt;span data-dcnode-id=&quot;3752&quot; instrument_node=&quot;&quot;&gt;Learning Component&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;3750&quot; instrument_node=&quot;&quot;&gt; that learns from the captured data by the perception component. The goal is to build computers that can be taught instead of programming them. Learning focuses on the process of self-improvement. In order to learn new things, the system requires knowledge acquisition, inference, acquisition of heuristics, faster searches, etc.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;3748&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;li data-dcnode-id=&quot;3743&quot; style=&quot;text-align: justify;&quot;&gt;&lt;span data-dcnode-id=&quot;3747&quot; instrument_node=&quot;&quot;&gt;The main component in the cycle is &lt;/span&gt;&lt;strong data-dcnode-id=&quot;3745&quot;&gt;&lt;span data-dcnode-id=&quot;3746&quot; instrument_node=&quot;&quot;&gt;Knowledge Representation and Reasoning&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;3744&quot; instrument_node=&quot;&quot;&gt; which shows the human-like intelligence in the machines. Knowledge representation is all about understanding intelligence. Instead of trying to understand or build brains from the bottom up, its goal is to understand and build intelligent behavior from the top-down and focus on what an agent needs to know in order to behave intelligently. Also, it defines how automated reasoning procedures can make this knowledge available as needed.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;3742&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;li data-dcnode-id=&quot;3737&quot; style=&quot;text-align: justify;&quot;&gt;&lt;span data-dcnode-id=&quot;3741&quot; instrument_node=&quot;&quot;&gt;The&lt;/span&gt;&lt;strong data-dcnode-id=&quot;3739&quot;&gt;&lt;span data-dcnode-id=&quot;3740&quot; instrument_node=&quot;&quot;&gt; Planning and Execution&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;3738&quot; instrument_node=&quot;&quot;&gt; components depend on the analysis of knowledge representation and reasoning. Here, planning includes giving an initial state, finding their preconditions and effects, and a sequence of actions to achieve a state in which a particular goal holds. Now once the planning is completed, the final stage is the execution of the entire process.&lt;/span&gt;&lt;/li&gt;&lt;/ul&gt;&lt;p data-dcnode-id=&quot;3733&quot; style=&quot;text-align: justify;&quot;&gt;&lt;a data-dcnode-id=&quot;3735&quot; name=&quot;relation&quot;&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3734&quot; instrument_node=&quot;&quot;&gt;So, these are the different components of the cycle of Knowledge Representation in AI. Now, let’s understand the relationship between knowledge and intelligence.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;3731&quot;&gt;&lt;span data-dcnode-id=&quot;3732&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;h2 data-dcnode-id=&quot;3728&quot;&gt;&lt;strong data-dcnode-id=&quot;3729&quot;&gt;&lt;span data-dcnode-id=&quot;3730&quot; instrument_node=&quot;&quot;&gt;What is the Relation between Knowledge &amp;amp; Intelligence?&lt;/span&gt;&lt;/strong&gt;&lt;/h2&gt;&lt;p data-dcnode-id=&quot;3720&quot; style=&quot;text-align: justify;&quot;&gt;&lt;span data-dcnode-id=&quot;3727&quot; instrument_node=&quot;&quot;&gt;In the real world, knowledge plays a vital role in intelligence as well as creating &lt;/span&gt;&lt;a data-dcnode-id=&quot;3725&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.edureka.co/blog/pros-and-cons-of-ai/&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;3726&quot; instrument_node=&quot;&quot;&gt;artificial intelligence&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3724&quot; instrument_node=&quot;&quot;&gt;. It demonstrates the intelligent behavior in &lt;/span&gt;&lt;strong data-dcnode-id=&quot;3722&quot;&gt;&lt;span data-dcnode-id=&quot;3723&quot; instrument_node=&quot;&quot;&gt;AI agents or systems&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;3721&quot; instrument_node=&quot;&quot;&gt;. It is possible for an agent or system to act accurately on some input only when it has the knowledge or experience about the input.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;3718&quot; style=&quot;text-align: justify;&quot;&gt;&lt;span data-dcnode-id=&quot;3719&quot; instrument_node=&quot;&quot;&gt;Let’s take an example to understand the relationship:&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;3716&quot;&gt;&lt;span data-dcnode-id=&quot;3717&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;3714&quot;&gt;&lt;img alt=&quot;&quot; class=&quot;aligncenter wp-image-123848 size-large blur-up lazyloaded&quot; data-dcnode-id=&quot;3715&quot; data-sizes=&quot;(max-width: 491px) 100vw, 491px&quot; data-src=&quot;https://d1jnx9ba8s6j9r.cloudfront.net/blog/wp-content/uploads/2019/12/Picture4-1-491x300.png&quot; data-srcset=&quot;https://d1jnx9ba8s6j9r.cloudfront.net/blog/wp-content/uploads/2019/12/Picture4-1-491x300.png 491w, https://d1jnx9ba8s6j9r.cloudfront.net/blog/wp-content/uploads/2019/12/Picture4-1-150x92.png 150w, https://d1jnx9ba8s6j9r.cloudfront.net/blog/wp-content/uploads/2019/12/Picture4-1-300x183.png 300w, https://d1jnx9ba8s6j9r.cloudfront.net/blog/wp-content/uploads/2019/12/Picture4-1-768x470.png 768w, https://d1jnx9ba8s6j9r.cloudfront.net/blog/wp-content/uploads/2019/12/Picture4-1-294x180.png 294w, https://d1jnx9ba8s6j9r.cloudfront.net/blog/wp-content/uploads/2019/12/Picture4-1.png 1408w&quot; height=&quot;300&quot; sizes=&quot;(max-width: 491px) 100vw, 491px&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//d1jnx9ba8s6j9r.cloudfront.net/blog/wp-content/uploads/2019/12/Picture4-1-491x300.png&amp;amp;raw&quot; srcset=&quot;https://d1jnx9ba8s6j9r.cloudfront.net/blog/wp-content/uploads/2019/12/Picture4-1-491x300.png 491w, https://d1jnx9ba8s6j9r.cloudfront.net/blog/wp-content/uploads/2019/12/Picture4-1-150x92.png 150w, https://d1jnx9ba8s6j9r.cloudfront.net/blog/wp-content/uploads/2019/12/Picture4-1-300x183.png 300w, https://d1jnx9ba8s6j9r.cloudfront.net/blog/wp-content/uploads/2019/12/Picture4-1-768x470.png 768w, https://d1jnx9ba8s6j9r.cloudfront.net/blog/wp-content/uploads/2019/12/Picture4-1-294x180.png 294w, https://d1jnx9ba8s6j9r.cloudfront.net/blog/wp-content/uploads/2019/12/Picture4-1.png 1408w&quot; width=&quot;491&quot;&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3713&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;p data-dcnode-id=&quot;3711&quot;&gt;&lt;span data-dcnode-id=&quot;3712&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;3706&quot; style=&quot;text-align: justify;&quot;&gt;&lt;span data-dcnode-id=&quot;3710&quot; instrument_node=&quot;&quot;&gt;In this example, there is one &lt;/span&gt;&lt;strong data-dcnode-id=&quot;3708&quot;&gt;&lt;span data-dcnode-id=&quot;3709&quot; instrument_node=&quot;&quot;&gt;decision-maker&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;3707&quot; instrument_node=&quot;&quot;&gt; whose actions are justified by sensing the environment and using knowledge. But, if we remove the knowledge part here, it will not be able to display any intelligent behavior.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;3703&quot; style=&quot;text-align: justify;&quot;&gt;&lt;a data-dcnode-id=&quot;3705&quot; name=&quot;techniques&quot;&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3704&quot; instrument_node=&quot;&quot;&gt;Now that you know the relationship between knowledge and intelligence, let’s move on to the techniques of Knowledge Representation in AI.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;3701&quot;&gt;&lt;span data-dcnode-id=&quot;3702&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;h2 data-dcnode-id=&quot;3698&quot;&gt;&lt;strong data-dcnode-id=&quot;3699&quot;&gt;&lt;span data-dcnode-id=&quot;3700&quot; instrument_node=&quot;&quot;&gt;Techniques of Knowledge Representation in AI&lt;/span&gt;&lt;/strong&gt;&lt;/h2&gt;&lt;p data-dcnode-id=&quot;3696&quot;&gt;&lt;span data-dcnode-id=&quot;3697&quot; instrument_node=&quot;&quot;&gt;There are four techniques of representing knowledge such as:&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;3694&quot;&gt;&lt;span data-dcnode-id=&quot;3695&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;3692&quot;&gt;&lt;img alt=&quot;techniques - knowledge representation in AI - edureka&quot; class=&quot;aligncenter wp-image-123852 size-large blur-up lazyloaded&quot; data-dcnode-id=&quot;3693&quot; data-sizes=&quot;(max-width: 528px) 100vw, 528px&quot; data-src=&quot;https://d1jnx9ba8s6j9r.cloudfront.net/blog/wp-content/uploads/2019/12/Picture5-528x287.png&quot; data-srcset=&quot;https://d1jnx9ba8s6j9r.cloudfront.net/blog/wp-content/uploads/2019/12/Picture5-528x287.png 528w, https://d1jnx9ba8s6j9r.cloudfront.net/blog/wp-content/uploads/2019/12/Picture5-150x82.png 150w, https://d1jnx9ba8s6j9r.cloudfront.net/blog/wp-content/uploads/2019/12/Picture5-300x163.png 300w, https://d1jnx9ba8s6j9r.cloudfront.net/blog/wp-content/uploads/2019/12/Picture5-768x417.png 768w, https://d1jnx9ba8s6j9r.cloudfront.net/blog/wp-content/uploads/2019/12/Picture5-331x180.png 331w, https://d1jnx9ba8s6j9r.cloudfront.net/blog/wp-content/uploads/2019/12/Picture5.png 1227w&quot; height=&quot;287&quot; sizes=&quot;(max-width: 528px) 100vw, 528px&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//d1jnx9ba8s6j9r.cloudfront.net/blog/wp-content/uploads/2019/12/Picture5-528x287.png&amp;amp;raw&quot; srcset=&quot;https://d1jnx9ba8s6j9r.cloudfront.net/blog/wp-content/uploads/2019/12/Picture5-528x287.png 528w, https://d1jnx9ba8s6j9r.cloudfront.net/blog/wp-content/uploads/2019/12/Picture5-150x82.png 150w, https://d1jnx9ba8s6j9r.cloudfront.net/blog/wp-content/uploads/2019/12/Picture5-300x163.png 300w, https://d1jnx9ba8s6j9r.cloudfront.net/blog/wp-content/uploads/2019/12/Picture5-768x417.png 768w, https://d1jnx9ba8s6j9r.cloudfront.net/blog/wp-content/uploads/2019/12/Picture5-331x180.png 331w, https://d1jnx9ba8s6j9r.cloudfront.net/blog/wp-content/uploads/2019/12/Picture5.png 1227w&quot; width=&quot;528&quot;&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;3690&quot;&gt;&lt;span data-dcnode-id=&quot;3691&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;3688&quot;&gt;&lt;span data-dcnode-id=&quot;3689&quot; instrument_node=&quot;&quot;&gt;Now, let’s discuss these techniques in detail.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;3686&quot;&gt;&lt;span data-dcnode-id=&quot;3687&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;h3 data-dcnode-id=&quot;3683&quot;&gt;&lt;strong data-dcnode-id=&quot;3684&quot;&gt;&lt;span data-dcnode-id=&quot;3685&quot; instrument_node=&quot;&quot;&gt;Logical Representation&amp;nbsp;&lt;/span&gt;&lt;/strong&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;3675&quot; style=&quot;text-align: justify;&quot;&gt;&lt;span data-dcnode-id=&quot;3682&quot; instrument_node=&quot;&quot;&gt;Logical representation is a language with some &lt;/span&gt;&lt;strong data-dcnode-id=&quot;3680&quot;&gt;&lt;span data-dcnode-id=&quot;3681&quot; instrument_node=&quot;&quot;&gt;definite rules&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;3679&quot; instrument_node=&quot;&quot;&gt; which deal with propositions and has no ambiguity in representation. It represents a conclusion based on various conditions and lays down some important &lt;/span&gt;&lt;strong data-dcnode-id=&quot;3677&quot;&gt;&lt;span data-dcnode-id=&quot;3678&quot; instrument_node=&quot;&quot;&gt;communication rules&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;3676&quot; instrument_node=&quot;&quot;&gt;. Also, it consists of precisely defined syntax and semantics which supports the sound inference. Each sentence can be translated into logics using syntax and semantics.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;3673&quot;&gt;&lt;span data-dcnode-id=&quot;3674&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;table border=&quot;1px solid black&quot; data-dcnode-id=&quot;3644&quot; style=&quot;width: 804px;&quot;&gt;&lt;tbody data-dcnode-id=&quot;3645&quot;&gt;&lt;tr data-dcnode-id=&quot;3666&quot;&gt;&lt;td data-dcnode-id=&quot;3670&quot; style=&quot;text-align: center; width: 264px;&quot;&gt;&lt;strong data-dcnode-id=&quot;3671&quot;&gt;&lt;span data-dcnode-id=&quot;3672&quot; instrument_node=&quot;&quot;&gt;Syntax&lt;/span&gt;&lt;/strong&gt;&lt;/td&gt;&lt;td data-dcnode-id=&quot;3667&quot; style=&quot;text-align: center; width: 310px;&quot;&gt;&lt;strong data-dcnode-id=&quot;3668&quot;&gt;&lt;span data-dcnode-id=&quot;3669&quot; instrument_node=&quot;&quot;&gt;Semantics&lt;/span&gt;&lt;/strong&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;3646&quot;&gt;&lt;td data-dcnode-id=&quot;3655&quot; style=&quot;width: 402px;&quot;&gt;&lt;ul data-dcnode-id=&quot;3656&quot;&gt;&lt;span data-dcnode-id=&quot;3665&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;li data-dcnode-id=&quot;3663&quot;&gt;&lt;span data-dcnode-id=&quot;3664&quot; instrument_node=&quot;&quot;&gt;It decides how we can construct legal sentences in logic.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;3662&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;li data-dcnode-id=&quot;3660&quot;&gt;&lt;span data-dcnode-id=&quot;3661&quot; instrument_node=&quot;&quot;&gt;It determines which symbol we can use in knowledge representation.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;3659&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;li data-dcnode-id=&quot;3657&quot;&gt;&lt;span data-dcnode-id=&quot;3658&quot; instrument_node=&quot;&quot;&gt;Also, how to write those symbols.&lt;/span&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/td&gt;&lt;td data-dcnode-id=&quot;3647&quot; style=&quot;width: 402px;&quot;&gt;&lt;ul data-dcnode-id=&quot;3648&quot;&gt;&lt;span data-dcnode-id=&quot;3654&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;li data-dcnode-id=&quot;3652&quot;&gt;&lt;span data-dcnode-id=&quot;3653&quot; instrument_node=&quot;&quot;&gt;Semantics are the rules by which we can interpret the sentence in the logic.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;3651&quot; instrument_node=&quot;&quot;&gt; &l 3531&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;li data-dcnode-id=&quot;3529&quot;&gt;&lt;span data-dcnode-id=&quot;3530&quot; instrument_node=&quot;&quot;&gt;In frame system inference, the mechanism cannot be easily processed.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;3528&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;li data-dcnode-id=&quot;3526&quot;&gt;&lt;span data-dcnode-id=&quot;3527&quot; instrument_node=&quot;&quot;&gt;The inference mechanism cannot be smoothly proceeded by frame representation.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;3525&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;li data-dcnode-id=&quot;3523&quot;&gt;&lt;span data-dcnode-id=&quot;3524&quot; instrument_node=&quot;&quot;&gt;It has a very generalized approach.&lt;/span&gt;&lt;/li&gt;&lt;/ul&gt;&lt;p data-dcnode-id=&quot;3520&quot;&gt;&lt;span data-dcnode-id=&quot;3521&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;h3 data-dcnode-id=&quot;3517&quot;&gt;&lt;strong data-dcnode-id=&quot;3518&quot;&gt;&lt;span data-dcnode-id=&quot;3519&quot; instrument_node=&quot;&quot;&gt;Production Rules&lt;/span&gt;&lt;/strong&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;3512&quot; style=&quot;text-align: justify;&quot;&gt;&lt;span data-dcnode-id=&quot;3516&quot; instrument_node=&quot;&quot;&gt;In production rules, agent checks for the &lt;/span&gt;&lt;strong data-dcnode-id=&quot;3514&quot;&gt;&lt;span data-dcnode-id=&quot;3515&quot; instrument_node=&quot;&quot;&gt;condition&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;3513&quot; instrument_node=&quot;&quot;&gt; and if the condition exists then production rule fires and corresponding action is carried out. The condition part of the rule determines which rule may be applied to a problem. Whereas, the action part carries out the associated problem-solving steps. This complete process is called a recognize-act cycle.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;3510&quot; style=&quot;text-align: justify;&quot;&gt;&lt;span data-dcnode-id=&quot;3511&quot; instrument_node=&quot;&quot;&gt;The production rules system consists of three main parts:&lt;/span&gt;&lt;/p&gt;&lt;ul data-dcnode-id=&quot;3497&quot;&gt;&lt;span data-dcnode-id=&quot;3509&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;li data-dcnode-id=&quot;3506&quot;&gt;&lt;strong data-dcnode-id=&quot;3507&quot;&gt;&lt;span data-dcnode-id=&quot;3508&quot; instrument_node=&quot;&quot;&gt;The set of production rules&lt;/span&gt;&lt;/strong&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;3505&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;li data-dcnode-id=&quot;3502&quot;&gt;&lt;strong data-dcnode-id=&quot;3503&quot;&gt;&lt;span data-dcnode-id=&quot;3504&quot; instrument_node=&quot;&quot;&gt;Working Memory&lt;/span&gt;&lt;/strong&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;3501&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;li data-dcnode-id=&quot;3498&quot;&gt;&lt;strong data-dcnode-id=&quot;3499&quot;&gt;&lt;span data-dcnode-id=&quot;3500&quot; instrument_node=&quot;&quot;&gt;The recognize-act-cycle&lt;/span&gt;&lt;/strong&gt;&lt;/li&gt;&lt;/ul&gt;&lt;p data-dcnode-id=&quot;3494&quot;&gt;&lt;strong data-dcnode-id=&quot;3495&quot;&gt;&lt;span data-dcnode-id=&quot;3496&quot; instrument_node=&quot;&quot;&gt;Advantages:&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;ul data-dcnode-id=&quot;3483&quot;&gt;&lt;span data-dcnode-id=&quot;3493&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;li data-dcnode-id=&quot;3489&quot;&gt;&lt;p data-dcnode-id=&quot;3491&quot; style=&quot;text-align: justify;&quot;&gt;&lt;span data-dcnode-id=&quot;3492&quot; instrument_node=&quot;&quot;&gt;The production rules are expressed in natural language.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3490&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;3488&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;li data-dcnode-id=&quot;3484&quot;&gt;&lt;p data-dcnode-id=&quot;3486&quot; style=&quot;text-align: justify;&quot;&gt;&lt;span data-dcnode-id=&quot;3487&quot; instrument_node=&quot;&quot;&gt;The production rules are highly modular and can be easily removed or modified.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3485&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/li&gt;&lt;/ul&gt;&lt;p data-dcnode-id=&quot;3480&quot;&gt;&lt;strong data-dcnode-id=&quot;3481&quot;&gt;&lt;span data-dcnode-id=&quot;3482&quot; instrument_node=&quot;&quot;&gt;Disadvantages:&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;ul data-dcnode-id=&quot;3469&quot;&gt;&lt;span data-dcnode-id=&quot;3479&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;li data-dcnode-id=&quot;3475&quot;&gt;&lt;p data-dcnode-id=&quot;3477&quot; style=&quot;text-align: justify;&quot;&gt;&lt;span data-dcnode-id=&quot;3478&quot; instrument_node=&quot;&quot;&gt;It does not exhibit any learning capabilities and does not store the result of the problem for future uses.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3476&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;3474&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;li data-dcnode-id=&quot;3470&quot;&gt;&lt;p data-dcnode-id=&quot;3472&quot; style=&quot;text-align: justify;&quot;&gt;&lt;span data-dcnode-id=&quot;3473&quot; instrument_node=&quot;&quot;&gt;During the execution of the program, many rules may be active. Thus, rule-based production systems are inefficient.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3471&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/li&gt;&lt;/ul&gt;&lt;p data-dcnode-id=&quot;3466&quot; style=&quot;text-align: justify;&quot;&gt;&lt;a data-dcnode-id=&quot;3468&quot; name=&quot;requirements&quot;&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3467&quot; instrument_node=&quot;&quot;&gt;So, these were the important techniques for Knowledge Representation in AI. Now, let’s have a look at the requirements for these representations.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;3464&quot;&gt;&lt;span data-dcnode-id=&quot;3465&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;h2 data-dcnode-id=&quot;3461&quot;&gt;&lt;strong data-dcnode-id=&quot;3462&quot;&gt;&lt;span data-dcnode-id=&quot;3463&quot; instrument_node=&quot;&quot;&gt;Representation Requirements&lt;/span&gt;&lt;/strong&gt;&lt;/h2&gt;&lt;p data-dcnode-id=&quot;3459&quot; style=&quot;text-align: justify;&quot;&gt;&lt;span data-dcnode-id=&quot;3460&quot; instrument_node=&quot;&quot;&gt;A good knowledge representation system must have properties such as:&lt;/span&gt;&lt;/p&gt;&lt;ul data-dcnode-id=&quot;3430&quot;&gt;&lt;span data-dcnode-id=&quot;3458&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;li data-dcnode-id=&quot;3452&quot;&gt;&lt;p data-dcnode-id=&quot;3454&quot; style=&quot;text-align: justify;&quot;&gt;&lt;strong data-dcnode-id=&quot;3456&quot;&gt;&lt;span data-dcnode-id=&quot;3457&quot; instrument_node=&quot;&quot;&gt;Representational Accuracy:&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;3455&quot; instrument_node=&quot;&quot;&gt; It should represent all kinds of required knowledge.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3453&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;3451&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;li data-dcnode-id=&quot;3445&quot;&gt;&lt;p data-dcnode-id=&quot;3447&quot; style=&quot;text-align: justify;&quot;&gt;&lt;strong data-dcnode-id=&quot;3449&quot;&gt;&lt;span data-dcnode-id=&quot;3450&quot; instrument_node=&quot;&quot;&gt;Inferential Adequacy&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;3448&quot; instrument_node=&quot;&quot;&gt;: It should be able to manipulate the representational structures to produce new knowledge corresponding to the existing structure.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3446&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;3444&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;li data-dcnode-id=&quot;3438&quot;&gt;&lt;p data-dcnode-id=&quot;3440&quot; style=&quot;text-align: justify;&quot;&gt;&lt;strong data-dcnode-id=&quot;3442&quot;&gt;&lt;span data-dcnode-id=&quot;3443&quot; instrument_node=&quot;&quot;&gt;Inferential Efficiency&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;3441&quot; instrument_node=&quot;&quot;&gt;: The ability to direct the inferential knowledge mechanism into the most productive directions by storing appropriate guides.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3439&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;3437&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;li data-dcnode-id=&quot;3431&quot;&gt;&lt;p data-dcnode-id=&quot;3433&quot; style=&quot;text-align: justify;&quot;&gt;&lt;strong data-dcnode-id=&quot;3435&quot;&gt;&lt;span data-dcnode-id=&quot;3436&quot; instrument_node=&quot;&quot;&gt;Acquisitional efficiency&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;3434&quot; instrument_node=&quot;&quot;&gt;: The ability to acquire new knowledge easily using automatic methods.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3432&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/li&gt;&lt;/ul&gt;&lt;p data-dcnode-id=&quot;3427&quot; style=&quot;text-align: justify;&quot;&gt;&lt;a data-dcnode-id=&quot;3429&quot; name=&quot;approaches&quot;&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3428&quot; instrument_node=&quot;&quot;&gt;Now, let’s have a look at some of the approaches to Knowledge Representation in AI along with different examples.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;3425&quot;&gt;&lt;span data-dcnode-id=&quot;3426&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;h2 data-dcnode-id=&quot;3422&quot;&gt;&lt;strong data-dcnode-id=&quot;3423&quot;&gt;&lt;span data-dcnode-id=&quot;3424&quot; instrument_node=&quot;&quot;&gt;Approaches to Knowledge Representation in AI&lt;/span&gt;&lt;/strong&gt;&lt;/h2&gt;&lt;p data-dcnode-id=&quot;3420&quot;&gt;&lt;span data-dcnode-id=&quot;3421&quot; instrument_node=&quot;&quot;&gt;There are different approaches to knowledge representation such as:&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;3418&quot;&gt;&lt;span data-dcnode-id=&quot;3419&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;h3 data-dcnode-id=&quot;3415&quot;&gt;&lt;strong data-dcnode-id=&quot;3416&quot;&gt;&lt;span data-dcnode-id=&quot;3417&quot; instrument_node=&quot;&quot;&gt;1. Simple Relational Knowledge&lt;/span&gt;&lt;/strong&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;3405&quot; style=&quot;text-align: justify;&quot;&gt;&lt;span data-dcnode-id=&quot;3414&quot; instrument_node=&quot;&quot;&gt;It is the simplest way of &lt;/span&gt;&lt;strong data-dcnode-id=&quot;3412&quot;&gt;&lt;span data-dcnode-id=&quot;3413&quot; instrument_node=&quot;&quot;&gt;storing facts&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;3411&quot; instrument_node=&quot;&quot;&gt; which uses the relational method. Here, all the facts about a set of the object are set out systematically in columns. Also, this approach of knowledge representation is famous in &lt;/span&gt;&lt;strong data-dcnode-id=&quot;3407&quot;&gt;&lt;a data-dcnode-id=&quot;3409&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.edureka.co/blog/what-is-a-database/&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;3410&quot; instrument_node=&quot;&quot;&gt;database&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3408&quot; instrument_node=&quot;&quot;&gt; systems&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;3406&quot; instrument_node=&quot;&quot;&gt; where the relationship between different entities is represented. Thus, there is&amp;nbsp;little opportunity for inference.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;3402&quot;&gt;&lt;strong data-dcnode-id=&quot;3403&quot;&gt;&lt;span data-dcnode-id=&quot;3404&quot; instrument_node=&quot;&quot;&gt;Example:&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;table border=&quot;1px solid black&quot; data-dcnode-id=&quot;3369&quot; style=&quot;width: 804;&quot;&gt;&lt;tbody data-dcnode-id=&quot;3370&quot;&gt;&lt;tr data-dcnode-id=&quot;3392&quot;&gt;&lt;td data-dcnode-id=&quot;3399&quot; style=&quot;text-align: center; width: 268px;&quot;&gt;&lt;strong data-dcnode-id=&quot;3400&quot;&gt;&lt;span data-dcnode-id=&quot;3401&quot; instrument_node=&quot;&quot;&gt;Name&lt;/span&gt;&lt;/strong&gt;&lt;/td&gt;&lt;td data-dcnode-id=&quot;3396&quot; style=&quot;text-align: center; width: 268px;&quot;&gt;&lt;strong data-dcnode-id=&quot;3397&quot;&gt;&lt;span data-dcnode-id=&quot;3398&quot; instrument_node=&quot;&quot;&gt;Age&lt;/span&gt;&lt;/strong&gt;&lt;/td&gt;&lt;td data-dcnode-id=&quot;3393&quot; style=&quot;text-align: center; width: 268px;&quot;&gt;&lt;strong data-dcnode-id=&quot;3394&quot;&gt;&lt;span data-dcnode-id=&quot;3395&quot; instrument_node=&quot;&quot;&gt;Emp ID&amp;nbsp;&lt;/span&gt;&lt;/strong&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;3385&quot;&gt;&lt;td data-dcnode-id=&quot;3390&quot; style=&quot;width: 268px;&quot;&gt;&lt;span data-dcnode-id=&quot;3391&quot; instrument_node=&quot;&quot;&gt;John&lt;/span&gt;&lt;/td&gt;&lt;td data-dcnode-id=&quot;3388&quot; style=&quot;width: 268px;&quot;&gt;&lt;span data-dcnode-id=&quot;3389&quot; instrument_node=&quot;&quot;&gt;25&lt;/span&gt;&lt;/td&gt;&lt;td data-dcnode-id=&quot;3386&quot; style=&quot;width: 268px;&quot;&gt;&lt;span data-dcnode-id=&quot;3387&quot; instrument_node=&quot;&quot;&gt;100071&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;3378&quot;&gt;&lt;td data-dcnode-id=&quot;3383&quot; style=&quot;width: 268px;&quot;&gt;&lt;span data-dcnode-id=&quot;3384&quot; instrument_node=&quot;&quot;&gt;Amanda&lt;/span&gt;&lt;/td&gt;&lt;td data-dcnode-id=&quot;3381&quot; style=&quot;width: 268px;&quot;&gt;&lt;span data-dcnode-id=&quot;3382&quot; instrument_node=&quot;&quot;&gt;23&lt;/span&gt;&lt;/td&gt;&lt;td data-dcnode-id=&quot;3379&quot; style=&quot;width: 268px;&quot;&gt;&lt;span data-dcnode-id=&quot;3380&quot; instrument_node=&quot;&quot;&gt;100056&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;3371&quot;&gt;&lt;td data-dcnode-id=&quot;3376&quot; style=&quot;width: 268px;&quot;&gt;&lt;span data-dcnode-id=&quot;3377&quot; instrument_node=&quot;&quot;&gt;Sam&lt;/span&gt;&lt;/td&gt;&lt;td data-dcnode-id=&quot;3374&quot; style=&quot;width: 268px;&quot;&gt;&lt;span data-dcnode-id=&quot;3375&quot; instrument_node=&quot;&quot;&gt;27&lt;/span&gt;&lt;/td&gt;&lt;td data-dcnode-id=&quot;3372&quot; style=&quot;width: 268px;&quot;&gt;&lt;span data-dcnode-id=&quot;3373&quot; instrument_node=&quot;&quot;&gt;100042&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;/tbody&gt;&lt;/table&gt;&lt;p data-dcnode-id=&quot;3367&quot;&gt;&lt;span data-dcnode-id=&quot;3368&quot; instrument_node=&quot;&quot;&gt;This is an example of representing simple relational knowledge.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;3365&quot;&gt;&lt;span data-dcnode-id=&quot;3366&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;h3 data-dcnode-id=&quot;3362&quot;&gt;&lt;strong data-dcnode-id=&quot;3363&quot;&gt;&lt;span data-dcnode-id=&quot;3364&quot; instrument_node=&quot;&quot;&gt;2. Inheritable Knowledge&lt;/span&gt;&lt;/strong&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;3357&quot; style=&quot;text-align: justify;&quot;&gt;&lt;span data-dcnode-id=&quot;3361&quot; instrument_node=&quot;&quot;&gt;In the inheritable knowledge approach, all data must be stored into a &lt;/span&gt;&lt;strong data-dcnode-id=&quot;3359&quot;&gt;&lt;span data-dcnode-id=&quot;3360&quot; instrument_node=&quot;&quot;&gt;hierarchy of classes&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;3358&quot; instrument_node=&quot;&quot;&gt; and should be arranged in a generalized form or a hierarchal manner. Also, this approach contains inheritable knowledge which shows a relation between instance and class, and it is called instance relation. In this approach, objects and values are represented in Boxed nodes.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;3354&quot;&gt;&lt;strong data-dcnode-id=&quot;3355&quot;&gt;&lt;span data-dcnode-id=&quot;3356&quot; instrument_node=&quot;&quot;&gt;Example:&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;3352&quot;&gt;&lt;span data-dcnode-id=&quot;3353&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;3350&quot;&gt;&lt;img alt=&quot;&quot; class=&quot;aligncenter wp-image-123874 size-large lazyload blur-up&quot; data-dcnode-id=&quot;3351&quot; data-sizes=&quot;(max-width: 395px) 100vw, 395px&quot; data-src=&quot;https://d1jnx9ba8s6j9r.cloudfront.net/blog/wp-content/uploads/2019/12/Picture6-395x300.png&quot; data-srcset=&quot;https://d1jnx9ba8s6j9r.cloudfront.net/blog/wp-content/uploads/2019/12/Picture6-395x300.png 395w, https://d1jnx9ba8s6j9r.cloudfront.net/blog/wp-content/uploads/2019/12/Picture6-150x114.png 150w, https://d1jnx9ba8s6j9r.cloudfront.net/blog/wp-content/uploads/2019/12/Picture6-300x228.png 300w, https://d1jnx9ba8s6j9r.cloudfront.net/blog/wp-content/uploads/2019/12/Picture6-768x583.png 768w, https://d1jnx9ba8s6j9r.cloudfront.net/blog/wp-content/uploads/2019/12/Picture6-237x180.png 237w, https://d1jnx9ba8s6j9r.cloudfront.net/blog/wp-content/uploads/2019/12/Picture6.png 938w&quot; height=&quot;300&quot; src=&quot;data:image/gif;base64,R0lGODlhAQABAIAAAMLCwgAAACH5BAAAAAAALAAAAAABAAEAAAICRAEAOw==&quot; width=&quot;395&quot;&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;3348&quot;&gt;&lt;span data-dcnode-id=&quot;3349&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;3346&quot;&gt;&lt;span data-dcnode-id=&quot;3347&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;h3 data-dcnode-id=&quot;3343&quot;&gt;&lt;strong data-dcnode-id=&quot;3344&quot;&gt;&lt;span data-dcnode-id=&quot;3345&quot; instrument_node=&quot;&quot;&gt;3. Inferential Knowledge&lt;/span&gt;&lt;/strong&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;3335&quot; style=&quot;text-align: justify;&quot;&gt;&lt;span data-dcnode-id=&quot;3342&quot; instrument_node=&quot;&quot;&gt;The inferential knowledge approach represents &lt;/span&gt;&lt;strong data-dcnode-id=&quot;3340&quot;&gt;&lt;span data-dcnode-id=&quot;3341&quot; instrument_node=&quot;&quot;&gt;knowledge&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;3339&quot; instrument_node=&quot;&quot;&gt; in the form of &lt;/span&gt;&lt;strong data-dcnode-id=&quot;3337&quot;&gt;&lt;span data-dcnode-id=&quot;3338&quot; instrument_node=&quot;&quot;&gt;formal logic&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;3336&quot; instrument_node=&quot;&quot;&gt;. Thus, it can be used to derive more facts. Also, it guarantees correctness.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3334&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;p data-dcnode-id=&quot;3331&quot;&gt;&lt;strong data-dcnode-id=&quot;3332&quot;&gt;&lt;span data-dcnode-id=&quot;3333&quot; instrument_node=&quot;&quot;&gt;Example:&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;3327&quot;&gt;&lt;strong data-dcnode-id=&quot;3329&quot;&gt;&lt;span data-dcnode-id=&quot;3330&quot; instrument_node=&quot;&quot;&gt;Statement 1&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;3328&quot; instrument_node=&quot;&quot;&gt;: John is a cricketer.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;3323&quot;&gt;&lt;strong data-dcnode-id=&quot;3325&quot;&gt;&lt;span data-dcnode-id=&quot;3326&quot; instrument_node=&quot;&quot;&gt;Statement 2&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-i
