-icons/images/share_icons/fb_icons/en_US.svg&amp;amp;raw&quot; title=&quot;Facebook Share&quot;&gt;&lt;/a&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;sfsi_holders&quot; data-dcnode-id=&quot;1830&quot; id=&quot;sfsi_holder&quot; style=&quot;position: relative; float: left; width: 100%; z-index: -1; height: 150px;&quot;&gt;&lt;/div&gt;&lt;div data-dcnode-id=&quot;1827&quot; style=&quot;clear: both;&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;appen-col appen-col--center blog-single-content blog-content&quot; data-dcnode-id=&quot;1721&quot;&gt;&lt;h2 data-dcnode-id=&quot;1824&quot;&gt;&lt;span data-dcnode-id=&quot;1825&quot; instrument_node=&quot;&quot;&gt;Can AI Help Police Officers Solve Crimes?&lt;/span&gt;&lt;/h2&gt;&lt;p data-dcnode-id=&quot;1822&quot;&gt;&lt;span data-dcnode-id=&quot;1823&quot; instrument_node=&quot;&quot;&gt;Law enforcement is in charge of public safety, and must handle all of the challenges that come with that. Luckily, police officers are able to rely on technology for many parts of their job. In recent years, artificial intelligence in law enforcement has become an important aspect of police work globally.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1820&quot;&gt;&lt;span data-dcnode-id=&quot;1821&quot; instrument_node=&quot;&quot;&gt;As AI-based police technology becomes increasingly essential to law enforcement, areas like crime prevention and prediction are going through major changes. Predictive policing is just one of the results to come out of this transformation, with other policing practices undergoing significant adjustments in the name of public safety.&lt;/span&gt;&lt;/p&gt;&lt;h2 data-dcnode-id=&quot;1818&quot;&gt;&lt;span data-dcnode-id=&quot;1819&quot; instrument_node=&quot;&quot;&gt;AI in Police Work Today&lt;/span&gt;&lt;/h2&gt;&lt;p data-dcnode-id=&quot;1810&quot;&gt;&lt;img alt=&quot;ai in law enforcement&quot; class=&quot;alignnone wp-image-29708 size-full lazy-loaded&quot; data-dcnode-id=&quot;1817&quot; data-lazy-type=&quot;image&quot; data-src=&quot;https://resources.appen.com/wp-content/uploads/2019/11/Support1-1.jpg&quot; data-srcset=&quot;&quot; height=&quot;450&quot; sizes=&quot;(max-width: 750px) 100vw, 750px&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//resources.appen.com/wp-content/uploads/2019/11/Support1-1.jpg&amp;amp;raw&quot; srcset=&quot;https://resources.appen.com/wp-content/uploads/2019/11/Support1-1.jpg 750w, https://resources.appen.com/wp-content/uploads/2019/11/Support1-1-300x180.jpg 300w, https://resources.appen.com/wp-content/uploads/2019/11/Support1-1-100x60.jpg 100w&quot; width=&quot;750&quot;&gt;&lt;noscript data-dcnode-id=&quot;1815&quot;&gt;&lt;span data-dcnode-id=&quot;1816&quot; instrument_node=&quot;&quot;&gt;&amp;lt;img class=&quot;alignnone wp-image-29708 size-full&quot; src=&quot;https://resources.appen.com/wp-content/uploads/2019/11/Support1-1.jpg&quot; alt=&quot;ai in law enforcement&quot; width=&quot;750&quot; height=&quot;450&quot; srcset=&quot;https://resources.appen.com/wp-content/uploads/2019/11/Support1-1.jpg 750w, https://resources.appen.com/wp-content/uploads/2019/11/Support1-1-300x180.jpg 300w, https://resources.appen.com/wp-content/uploads/2019/11/Support1-1-100x60.jpg 100w&quot; sizes=&quot;(max-width: 750px) 100vw, 750px&quot; /&amp;gt;&lt;/span&gt;&lt;/noscript&gt;&lt;br data-dcnode-id=&quot;1814&quot;&gt;&lt;span data-dcnode-id=&quot;1813&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;span data-dcnode-id=&quot;1811&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;1812&quot; instrument_node=&quot;&quot;&gt;Law enforcement agencies are already unlocking the potential of AI in several important ways.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;h3 data-dcnode-id=&quot;1807&quot;&gt;&lt;strong data-dcnode-id=&quot;1808&quot;&gt;&lt;span data-dcnode-id=&quot;1809&quot; instrument_node=&quot;&quot;&gt;1. Facial Recognition&lt;/span&gt;&lt;/strong&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;1805&quot;&gt;&lt;span data-dcnode-id=&quot;1806&quot; instrument_node=&quot;&quot;&gt;Facial recognition technology is crucial to police departments. Police officers use facial recognition to identify criminals on the run and missing persons using image data. If you’ve ever seen footage from a street camera, you know how low quality these images are. As you may imagine, reviewing these images for key information is difficult and labor-intensive. Many police departments don’t even have enough people or specialists to handle the volume of image analysis needed to solve all of their cases.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1803&quot;&gt;&lt;span data-dcnode-id=&quot;1804&quot; instrument_node=&quot;&quot;&gt;AI in law enforcement promises greater accuracy than humans in matching faces and saves officers time. Machines can use parameters to identify faces beyond what humans can typically detect. Some AI technology today is even advanced enough to find a single face in a crowd at a stadium – something that recently helped China catch a criminal at a crowded sports event.&lt;/span&gt;&lt;/p&gt;&lt;h3 data-dcnode-id=&quot;1800&quot;&gt;&lt;strong data-dcnode-id=&quot;1801&quot;&gt;&lt;span data-dcnode-id=&quot;1802&quot; instrument_node=&quot;&quot;&gt;2. Cameras&lt;/span&gt;&lt;/strong&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;1798&quot;&gt;&lt;span data-dcnode-id=&quot;1799&quot; instrument_node=&quot;&quot;&gt;In most major cities, cameras are everywhere on the streets and in businesses. Law enforcement often relies on this footage to review crimes after the fact and catch criminals. AI can not only apply facial recognition to these images but also identify objects and complex activities like car accidents taking place.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1796&quot;&gt;&lt;span data-dcnode-id=&quot;1797&quot; instrument_node=&quot;&quot;&gt;Object identification is especially important for police officers trying to monitor large events, such as music festivals or marathons. Because they can’t be in multiple places at once, officers can rely on AI in law enforcement to send an alert if someone in the area has a weapon or is acting unusually and may be a perceived threat.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1794&quot;&gt;&lt;span data-dcnode-id=&quot;1795&quot; instrument_node=&quot;&quot;&gt;Object identification has other uses as well. Through analyzing street footage, AI can identify vehicles based on set characteristics. For example, the machine could show you every blue minivan that passed through a given intersection in an hour. Where this becomes useful is when officers are looking for a stolen vehicle, or a criminal on the run, and need results quickly.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1792&quot;&gt;&lt;span data-dcnode-id=&quot;1793&quot; instrument_node=&quot;&quot;&gt;Law enforcement agencies are also working with drone cameras, which allow them to explore more surface area and engage in quicker search-and-rescue efforts. These drones are naturally equipped with AI facial and object recognition capabilities.&lt;/span&gt;&lt;/p&gt;&lt;h3 data-dcnode-id=&quot;1789&quot;&gt;&lt;strong data-dcnode-id=&quot;1790&quot;&gt;&lt;span data-dcnode-id=&quot;1791&quot; instrument_node=&quot;&quot;&gt;3. Predictive Policing&lt;/span&gt;&lt;/strong&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;1787&quot;&gt;&lt;span data-dcnode-id=&quot;1788&quot; instrument_node=&quot;&quot;&gt;AI predictive policing refers to the ability to predict where crimes will occur, the individuals who will commit them, the types of crime, and who the victims will be. Predictive policing is a controversial topic, but it’s still a long way from becoming commonplace. Companies and police departments are just starting to test out predictive policing systems. These systems could eventually provide significant strides forward in predicting and ideally preventing crimes.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1781&quot;&gt;&lt;img alt=&quot;ai in law enforcement&quot; class=&quot;alignnone wp-image-29709 size-full lazy-loaded&quot; data-dcnode-id=&quot;1786&quot; data-lazy-type=&quot;image&quot; data-src=&quot;https://resources.appen.com/wp-content/uploads/2019/11/Support2-1.jpg&quot; data-srcset=&quot;&quot; height=&quot;450&quot; sizes=&quot;(max-width: 750px) 100vw, 750px&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//resources.appen.com/wp-content/uploads/2019/11/Support2-1.jpg&amp;amp;raw&quot; srcset=&quot;https://resources.appen.com/wp-content/uploads/2019/11/Support2-1.jpg 750w, https://resources.appen.com/wp-content/uploads/2019/11/Support2-1-300x180.jpg 300w, https://resources.appen.com/wp-content/uploads/2019/11/Support2-1-100x60.jpg 100w&quot; width=&quot;750&quot;&gt;&lt;noscript data-dcnode-id=&quot;1784&quot;&gt;&lt;span data-dcnode-id=&quot;1785&quot; instrument_node=&quot;&quot;&gt;&amp;lt;img class=&quot;alignnone wp-image-29709 size-full&quot; src=&quot;https://resources.appen.com/wp-content/uploads/2019/11/Support2-1.jpg&quot; alt=&quot;ai in law enforcement&quot; width=&quot;750&quot; height=&quot;450&quot; srcset=&quot;https://resources.appen.com/wp-content/uploads/2019/11/Support2-1.jpg 750w, https://resources.appen.com/wp-content/uploads/2019/11/Support2-1-300x180.jpg 300w, https://resources.appen.com/wp-content/uploads/2019/11/Support2-1-100x60.jpg 100w&quot; sizes=&quot;(max-width: 750px) 100vw, 750px&quot; /&amp;gt;&lt;/span&gt;&lt;/noscript&gt;&lt;br data-dcnode-id=&quot;1783&quot;&gt;&lt;span data-dcnode-id=&quot;1782&quot; instrument_node=&quot;&quot;&gt; When it comes to predicting crime locations, algorithms can analyze crime rates across various areas and develop a map of crime hot spots. This tells police to target these areas for extra patrolling and surveillance.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1779&quot;&gt;&lt;span data-dcnode-id=&quot;1780&quot; instrument_node=&quot;&quot;&gt;AI is also able to paint a better picture of who is at risk for committing a crime, and who will likely re-offend once released from prison based on data collected and analysis of historical patterns. Naturally, there’s some controversy over what should be done about this information and more debate to be had as this practice grows in use.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1777&quot;&gt;&lt;span data-dcnode-id=&quot;1778&quot; instrument_node=&quot;&quot;&gt;Where predictive policing may be most helpful is in identifying likely future victims of crimes. Research is currently being done in catching elder abuse before it happens by better understanding the environmental conditions that enable it, and using that information to project what type of abuse is most likely. While elder abuse is just one use case, imagine the implications of predictive policing in a whole other host of violent crimes as well.&lt;/span&gt;&lt;/p&gt;&lt;h3 data-dcnode-id=&quot;1774&quot;&gt;&lt;strong data-dcnode-id=&quot;1775&quot;&gt;&lt;span data-dcnode-id=&quot;1776&quot; instrument_node=&quot;&quot;&gt;4. Robots&lt;/span&gt;&lt;/strong&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;1772&quot;&gt;&lt;span data-dcnode-id=&quot;1773&quot; instrument_node=&quot;&quot;&gt;No, we’re not close to replacing our entire police force with robots anytime soon. But, police departments are turning to robots to handle tasks ranging from the mundane to the most dangerous.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1770&quot;&gt;&lt;span data-dcnode-id=&quot;1771&quot; instrument_node=&quot;&quot;&gt;Some countries are indeed testing out robots who act as replacement police officers. Dubai is experimenting with street robots that can transmit data back to headquarters to be reviewed by humans there. They’re also equipped with touchscreens for reporting crimes and can communicate in six different languages.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1768&quot;&gt;&lt;span data-dcnode-id=&quot;1769&quot; instrument_node=&quot;&quot;&gt;Robots can also complete more complex tasks on behalf of police officers. They can enter dangerous locations and identify humans and objects that pose potential threats, a safer alternative to risking police officer lives. There are robots that are also equipped with the ability to detonate bombs, improving public safety without putting officers in harm’s way.&lt;/span&gt;&lt;/p&gt;&lt;h3 data-dcnode-id=&quot;1765&quot;&gt;&lt;strong data-dcnode-id=&quot;1766&quot;&gt;&lt;span data-dcnode-id=&quot;1767&quot; instrument_node=&quot;&quot;&gt;5. Non-violent Crimes&lt;/span&gt;&lt;/strong&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;1763&quot;&gt;&lt;span data-dcnode-id=&quot;1764&quot; instrument_node=&quot;&quot;&gt;AI is adept at spotting anomalies in patterns, and this lends itself well to discovering non-violent crimes like fraud and money-laundering. Banks have already dived in on the AI revolution as being integral to their security, and law enforcement is partnering with these entities to catch these kinds of crimes.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1761&quot;&gt;&lt;span data-dcnode-id=&quot;1762&quot; instrument_node=&quot;&quot;&gt;Through analyzing images, AI can pick out counterfeit goods and counterfeit bills with a high probability of accuracy, spotting details that the human eye may miss.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1749&quot;&gt;&lt;span data-dcnode-id=&quot;1759&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;1760&quot; instrument_node=&quot;&quot;&gt;Read more about the applications of AI in police work in this &lt;/span&gt;&lt;/span&gt;&lt;a data-dcnode-id=&quot;1756&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.futuregrasp.com/opportunities-from-artificial-intelligence-for-law-enforcement&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1757&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;1758&quot; instrument_node=&quot;&quot;&gt;FutureGrasp article&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1754&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;1755&quot; instrument_node=&quot;&quot;&gt; by &lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1752&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;1753&quot; instrument_node=&quot;&quot;&gt;Tom Campbell&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1750&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;1751&quot; instrument_node=&quot;&quot;&gt;.&amp;nbsp;&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;h2 data-dcnode-id=&quot;1747&quot;&gt;&lt;span data-dcnode-id=&quot;1748&quot; instrument_node=&quot;&quot;&gt;What’s the Future of AI in Law Enforcement?&lt;/span&gt;&lt;/h2&gt;&lt;p data-dcnode-id=&quot;1741&quot;&gt;&lt;img alt=&quot;ai in law enforcement&quot; class=&quot;alignnone wp-image-29710 size-full lazy-loaded&quot; data-dcnode-id=&quot;1746&quot; data-lazy-type=&quot;image&quot; data-src=&quot;https://resources.appen.com/wp-content/uploads/2019/11/youtubeThumbnail-1.jpg&quot; data-srcset=&quot;&quot; height=&quot;720&quot; sizes=&quot;(max-width: 1280px) 100vw, 1280px&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//resources.appen.com/wp-content/uploads/2019/11/youtubeThumbnail-1.jpg&amp;amp;raw&quot; srcset=&quot;https://resources.appen.com/wp-content/uploads/2019/11/youtubeThumbnail-1.jpg 1280w, https://resources.appen.com/wp-content/uploads/2019/11/youtubeThumbnail-1-300x169.jpg 300w, https://resources.appen.com/wp-content/uploads/2019/11/youtubeThumbnail-1-1024x576.jpg 1024w, https://resources.appen.com/wp-content/uploads/2019/11/youtubeThumbnail-1-768x432.jpg 768w, https://resources.appen.com/wp-content/uploads/2019/11/youtubeThumbnail-1-100x56.jpg 100w, https://resources.appen.com/wp-content/uploads/2019/11/youtubeThumbnail-1-979x551.jpg 979w, https://resources.appen.com/wp-content/uploads/2019/11/youtubeThumbnail-1-1180x664.jpg 1180w&quot; width=&quot;1280&quot;&gt;&lt;noscript data-dcnode-id=&quot;1744&quot;&gt;&lt;span data-dcnode-id=&quot;1745&quot; instrument_node=&quot;&quot;&gt;&amp;lt;img class=&quot;alignnone wp-image-29710 size-full&quot; src=&quot;https://resources.appen.com/wp-content/uploads/2019/11/youtubeThumbnail-1.jpg&quot; alt=&quot;ai in law enforcement&quot; width=&quot;1280&quot; height=&quot;720&quot; srcset=&quot;https://resources.appen.com/wp-content/uploads/2019/11/youtubeThumbnail-1.jpg 1280w, https://resources.appen.com/wp-content/uploads/2019/11/youtubeThumbnail-1-300x169.jpg 300w, https://resources.appen.com/wp-content/uploads/2019/11/youtubeThumbnail-1-1024x576.jpg 1024w, https://resources.appen.com/wp-content/uploads/2019/11/youtubeThumbnail-1-768x432.jpg 768w, https://resources.appen.com/wp-content/uploads/2019/11/youtubeThumbnail-1-100x56.jpg 100w, https://resources.appen.com/wp-content/uploads/2019/11/youtubeThumbnail-1-979x551.jpg 979w, https://resources.appen.com/wp-content/uploads/2019/11/youtubeThumbnail-1-1180x664.jpg 1180w&quot; sizes=&quot;(max-width: 1280px) 100vw, 1280px&quot; /&amp;gt;&lt;/span&gt;&lt;/noscript&gt;&lt;br data-dcnode-id=&quot;1743&quot;&gt;&lt;span data-dcnode-id=&quot;1742&quot; instrument_node=&quot;&quot;&gt; AI may still be new to the law enforcement community, so its applications have not yet been fully realized. Nonetheless, it’s already making an impact in key areas like surveillance, crime prevention, and crime-solving.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1739&quot;&gt;&lt;span data-dcnode-id=&quot;1740&quot; instrument_node=&quot;&quot;&gt;With enhanced imaging technologies and object and facial recognition, AI reduces the need for labor-intensive tasks, freeing officers to handle more complex activities. AI also may capture criminals that would otherwise go free, and solve crimes that would otherwise go undetected.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1737&quot;&gt;&lt;span data-dcnode-id=&quot;1738&quot; instrument_node=&quot;&quot;&gt;Predictive policing is likewise an area to watch, as it could have major implications for how criminals are caught and how victims are identified. Ideally, predictive policing will safeguard the public even more than before, but there are still kinks to be worked out as systems become more advanced.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1735&quot;&gt;&lt;span data-dcnode-id=&quot;1736&quot; instrument_node=&quot;&quot;&gt;There’s no telling how these changes will transform the role of the police officer and benefit public safety. One thing is sure: the results will likely have a major impact on us all.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1727&quot;&gt;&lt;span data-dcnode-id=&quot;1733&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;1734&quot; instrument_node=&quot;&quot;&gt;Read more about the future of AI in law enforcement in this &lt;/span&gt;&lt;/span&gt;&lt;a data-dcnode-id=&quot;1730&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//nij.ojp.gov/topics/articles/using-artificial-intelligence-address-criminal-justice-needs&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1731&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;1732&quot; instrument_node=&quot;&quot;&gt;NIJ article&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1728&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;1729&quot; instrument_node=&quot;&quot;&gt; by Christopher Rogano.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1722&quot;&gt;&lt;span data-dcnode-id=&quot;1726&quot; instr
