://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//napier-ai.atlassian.net/servicedesk/customer/portals&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;472&quot; instrument_node=&quot;&quot;&gt;SUPPORT&lt;/span&gt;&lt;/a&gt;&lt;a class=&quot;button-nav mobile w-button&quot; data-dcnode-id=&quot;469&quot; data-ix=&quot;button-pop-on-hover-2&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.napier.ai/request-a-demo&quot; style=&quot;transform: scaleX(1) scaleY(1) scaleZ(1);&quot;&gt;&lt;span data-dcnode-id=&quot;470&quot; instrument_node=&quot;&quot;&gt;Book a demo&lt;/span&gt;&lt;/a&gt;&lt;/nav&gt;&lt;div aria-controls=&quot;w-nav-overlay-0&quot; aria-expanded=&quot;false&quot; aria-haspopup=&quot;menu&quot; aria-label=&quot;menu&quot; class=&quot;menu-button w-nav-button&quot; data-dcnode-id=&quot;466&quot; role=&quot;button&quot; style=&quot;-webkit-user-select: text;&quot; tabindex=&quot;0&quot;&gt;&lt;img alt=&quot;&quot; class=&quot;menu-icon&quot; data-dcnode-id=&quot;467&quot; height=&quot;22&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//uploads-ssl.webflow.com/5c41f7230ea8d5489c8ce748/5e8dbf90b824d9da40037c77_icon-menu-dark.svg&amp;amp;raw&quot;&gt;&lt;/div&gt;&lt;div class=&quot;w-nav-overlay&quot; data-dcnode-id=&quot;465&quot; data-wf-ignore=&quot;&quot; id=&quot;w-nav-overlay-0&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;a class=&quot;button-nav book-a-demo w-button&quot; data-dcnode-id=&quot;462&quot; data-ix=&quot;button-pop-on-hover-2&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.napier.ai/request-a-demo&quot; style=&quot;transform: scaleX(1) scaleY(1) scaleZ(1);&quot;&gt;&lt;span data-dcnode-id=&quot;463&quot; instrument_node=&quot;&quot;&gt;Book a demo&lt;/span&gt;&lt;/a&gt;&lt;div class=&quot;nav-shadow-container&quot; data-dcnode-id=&quot;461&quot; data-w-id=&quot;952af1a4-c37a-5836-8e73-a334a47f8128&quot;&gt;&lt;/div&gt;&lt;/header&gt;&lt;div class=&quot;background_img_question&quot; data-dcnode-id=&quot;459&quot; style=&quot;background-image:url(&amp;quot;https://uploads-ssl.webflow.com/5c41f7230ea8d5290b8ce76b/616d9d682c3a47293e5fba58_what%20is%20AI.jpg&amp;quot;)&quot;&gt;&lt;/div&gt;&lt;div class=&quot;new-header&quot; data-dcnode-id=&quot;450&quot;&gt;&lt;div class=&quot;question-header-content&quot; data-dcnode-id=&quot;451&quot;&gt;&lt;h5 class=&quot;heading-54&quot; data-dcnode-id=&quot;457&quot;&gt;&lt;span data-dcnode-id=&quot;458&quot; instrument_node=&quot;&quot;&gt;Technology&lt;/span&gt;&lt;/h5&gt;&lt;h1 class=&quot;question-title white question&quot; data-dcnode-id=&quot;455&quot;&gt;&lt;span data-dcnode-id=&quot;456&quot; instrument_node=&quot;&quot;&gt;What is AI? Artificial Intelligence Explained&lt;/span&gt;&lt;/h1&gt;&lt;div class=&quot;yellow-line&quot; data-dcnode-id=&quot;454&quot;&gt;&lt;/div&gt;&lt;div class=&quot;text-block-42&quot; data-dcnode-id=&quot;452&quot;&gt;&lt;span data-dcnode-id=&quot;453&quot; instrument_node=&quot;&quot;&gt;Find out the latest on artificial intelligence (AI) and how it refers to the simulation of human intelligence in machines. Learn more today. &lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;question-container&quot; data-dcnode-id=&quot;170&quot;&gt;&lt;div class=&quot;panel-content-container questions left-aligned mobile&quot; data-dcnode-id=&quot;180&quot; id=&quot;P1&quot;&gt;&lt;div class=&quot;w-richtext&quot; data-dcnode-id=&quot;440&quot; id=&quot;Introduction&quot;&gt;&lt;p data-dcnode-id=&quot;445&quot;&gt;&lt;span data-dcnode-id=&quot;449&quot; instrument_node=&quot;&quot;&gt;Artificial intelligence (AI) is the &lt;/span&gt;&lt;a data-dcnode-id=&quot;447&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.fatf-gafi.org/media/fatf/documents/reports/Opportunities-Challenges-of-New-Technologies-for-AML-CFT.pdf&quot;&gt;&lt;span data-dcnode-id=&quot;448&quot; instrument_node=&quot;&quot;&gt;science &lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;446&quot; instrument_node=&quot;&quot;&gt;of using a machine to automate tasks that would otherwise be performed by a human. AI machines use algorithms to undertake problem-solving operations, often processing high volumes of real-time data. &amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;443&quot;&gt;&lt;span data-dcnode-id=&quot;444&quot; instrument_node=&quot;&quot;&gt;AI can obtain insights from different types, sources and quality (structured and unstructured) of data intelligence to solve problems and execute tasks with varying levels of autonomy. For a given set of objectives, AI can make predictions, recommendations or decisions influencing real or virtual environments.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;441&quot;&gt;&lt;span data-dcnode-id=&quot;442&quot; instrument_node=&quot;&quot;&gt;‍&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;h4 data-dcnode-id=&quot;438&quot;&gt;&lt;span data-dcnode-id=&quot;439&quot; instrument_node=&quot;&quot;&gt;What is AI? &lt;/span&gt;&lt;/h4&gt;&lt;div class=&quot;w-richtext&quot; data-dcnode-id=&quot;377&quot;&gt;&lt;h5 data-dcnode-id=&quot;436&quot;&gt;&lt;span data-dcnode-id=&quot;437&quot; instrument_node=&quot;&quot;&gt;What does AI stand for? &lt;/span&gt;&lt;/h5&gt;&lt;p data-dcnode-id=&quot;434&quot;&gt;&lt;span data-dcnode-id=&quot;435&quot; instrument_node=&quot;&quot;&gt;AI is the acronym for artificial intelligence, and the two terms are often used interchangeably. &lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;432&quot;&gt;&lt;span data-dcnode-id=&quot;433&quot; instrument_node=&quot;&quot;&gt;‍&lt;/span&gt;&lt;/p&gt;&lt;h5 data-dcnode-id=&quot;430&quot;&gt;&lt;span data-dcnode-id=&quot;431&quot; instrument_node=&quot;&quot;&gt;When was artificial intelligence invented? &lt;/span&gt;&lt;/h5&gt;&lt;p data-dcnode-id=&quot;428&quot;&gt;&lt;span data-dcnode-id=&quot;429&quot; instrument_node=&quot;&quot;&gt;Artificial intelligence may seem like a new concept but it’s a term that was first coined in 1956. Since then, there have been significant advances in search algorithms, machine learning and statistical analysis, all of which have been integral to the subtle integration of AI into our everyday lives. &lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;426&quot;&gt;&lt;span data-dcnode-id=&quot;427&quot; instrument_node=&quot;&quot;&gt;‍&lt;/span&gt;&lt;/p&gt;&lt;h5 data-dcnode-id=&quot;424&quot;&gt;&lt;span data-dcnode-id=&quot;425&quot; instrument_node=&quot;&quot;&gt;What is the difference between artificial intelligence and machine learning? &lt;/span&gt;&lt;/h5&gt;&lt;p data-dcnode-id=&quot;419&quot;&gt;&lt;span data-dcnode-id=&quot;423&quot; instrument_node=&quot;&quot;&gt;Machine learning is a term that’s commonly used alongside or even interchangeably with artificial intelligence. According to &lt;/span&gt;&lt;a data-dcnode-id=&quot;421&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//royalsociety.org/~/media/policy/projects/machine-learning/publications/machine-learning-report.pdf&quot;&gt;&lt;span data-dcnode-id=&quot;422&quot; instrument_node=&quot;&quot;&gt;the Royal Society,&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;420&quot; instrument_node=&quot;&quot;&gt; machine learning is an application of artificial intelligence ‘that allows computers to learn directly from examples and experience in the form of data’. Computer programs access data and use it to learn for themselves rather than following predetermined rules. &amp;nbsp;This functionality is integral to the performance of many AI systems. &lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;417&quot;&gt;&lt;span data-dcnode-id=&quot;418&quot; instrument_node=&quot;&quot;&gt;‍&lt;/span&gt;&lt;/p&gt;&lt;h5 data-dcnode-id=&quot;415&quot;&gt;&lt;span data-dcnode-id=&quot;416&quot; instrument_node=&quot;&quot;&gt;What do regulators say about AI for AML? &lt;/span&gt;&lt;/h5&gt;&lt;p data-dcnode-id=&quot;410&quot;&gt;&lt;span data-dcnode-id=&quot;414&quot; instrument_node=&quot;&quot;&gt;Global money laundering and terrorist financing watchdog &lt;/span&gt;&lt;a data-dcnode-id=&quot;412&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.fatf-gafi.org/home/&quot;&gt;&lt;span data-dcnode-id=&quot;413&quot; instrument_node=&quot;&quot;&gt;FATF&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;411&quot; instrument_node=&quot;&quot;&gt; recommends that the use of AI in AML can be beneficial. FATF set international standards for AML regulation, and promote the effective implementation of legal, regulatory and operational measures. &lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;405&quot;&gt;&lt;span data-dcnode-id=&quot;409&quot; instrument_node=&quot;&quot;&gt;In their July 2021 report, &lt;/span&gt;&lt;a data-dcnode-id=&quot;407&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.fatf-gafi.org/media/fatf/documents/reports/Opportunities-Challenges-of-New-Technologies-for-AML-CFT.pdf&quot;&gt;&lt;span data-dcnode-id=&quot;408&quot; instrument_node=&quot;&quot;&gt;Opportunities and Challenges of New Technologies for AML/CFT&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;406&quot; instrument_node=&quot;&quot;&gt;, FATF stated, &amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;403&quot;&gt;&lt;span data-dcnode-id=&quot;404&quot; instrument_node=&quot;&quot;&gt;“Transaction monitoring using AI and machine learning tools may allow regulated entities to carry out traditional functions with greater speed, accuracy and efficiency (provided the machine is adequately and accurately trained). These models are useful for filtering the cases that require additional investigation.”&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;401&quot;&gt;&lt;span data-dcnode-id=&quot;402&quot; instrument_node=&quot;&quot;&gt;While the regulatory environment for AI is still in its infancy, governments in many major economies have expressed varying levels of interest in introducing more robust regimes for regulating the use of AI and this is likely to further increase and build momentum following the release of the FATF report.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;399&quot;&gt;&lt;span data-dcnode-id=&quot;400&quot; instrument_node=&quot;&quot;&gt;‍&lt;/span&gt;&lt;/p&gt;&lt;h5 data-dcnode-id=&quot;397&quot;&gt;&lt;span data-dcnode-id=&quot;398&quot; instrument_node=&quot;&quot;&gt;Regulation around explainable AI:&lt;/span&gt;&lt;/h5&gt;&lt;ul data-dcnode-id=&quot;380&quot; role=&quot;list&quot;&gt;&lt;li data-dcnode-id=&quot;386&quot;&gt;&lt;span data-dcnode-id=&quot;396&quot; instrument_node=&quot;&quot;&gt;Explainable AI has become a particularly important regulatory requirement. Regulators around the world, such as the UK’s Information Commissioner (&lt;/span&gt;&lt;a data-dcnode-id=&quot;394&quot; href=&quot;#&quot;&gt;&lt;span data-dcnode-id=&quot;395&quot; instrument_node=&quot;&quot;&gt;ICO&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;393&quot; instrument_node=&quot;&quot;&gt;), the European Banking Authority (&lt;/span&gt;&lt;a data-dcnode-id=&quot;391&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.eba.europa.eu/&quot;&gt;&lt;span data-dcnode-id=&quot;392&quot; instrument_node=&quot;&quot;&gt;EBA&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;390&quot; instrument_node=&quot;&quot;&gt;) and the Monetary Authority of Singapore (&lt;/span&gt;&lt;a data-dcnode-id=&quot;388&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.mas.gov.sg/~/media/MAS/News%2520and%2520Publications/Monographs%2520and%2520Information%2520Papers/FEAT%2520Principles%2520Final.pdf&quot;&gt;&lt;span data-dcnode-id=&quot;389&quot; instrument_node=&quot;&quot;&gt;MAS&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;387&quot; instrument_node=&quot;&quot;&gt;) emphasise the importance of users being able to understand why a particular decision was reached by the algorithm. &amp;nbsp;&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;381&quot;&gt;&lt;span data-dcnode-id=&quot;385&quot; instrument_node=&quot;&quot;&gt;The European Commission recently published the first draft of its &lt;/span&gt;&lt;a data-dcnode-id=&quot;383&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//eur-lex.europa.eu/legal-content/EN/TXT/%3Fqid%3D1623335154975%26uri%3DCELEX%253A52021PC0206&quot;&gt;&lt;span data-dcnode-id=&quot;384&quot; instrument_node=&quot;&quot;&gt;Artificial Intelligence Regulation&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;382&quot; instrument_node=&quot;&quot;&gt; which stipulates requirements around AI and explainability.&lt;/span&gt;&lt;/li&gt;&lt;/ul&gt;&lt;p data-dcnode-id=&quot;378&quot;&gt;&lt;span data-dcnode-id=&quot;379&quot; instrument_node=&quot;&quot;&gt;‍&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;h4 data-dcnode-id=&quot;375&quot; id=&quot;P2&quot;&gt;&lt;span data-dcnode-id=&quot;376&quot; instrument_node=&quot;&quot;&gt;What are the types of artificial intelligence? &lt;/span&gt;&lt;/h4&gt;&lt;div class=&quot;w-richtext&quot; data-dcnode-id=&quot;313&quot;&gt;&lt;p data-dcnode-id=&quot;370&quot;&gt;&lt;span data-dcnode-id=&quot;374&quot; instrument_node=&quot;&quot;&gt;There are two main &lt;/span&gt;&lt;a data-dcnode-id=&quot;372&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.javatpoint.com/types-of-artificial-intelligence&quot;&gt;&lt;span data-dcnode-id=&quot;373&quot; instrument_node=&quot;&quot;&gt;types&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;371&quot; instrument_node=&quot;&quot;&gt; of AI based on its capabilities and functionality.&lt;/span&gt;&lt;/p&gt;&lt;ol data-dcnode-id=&quot;366&quot; role=&quot;list&quot; start=&quot;&quot;&gt;&lt;li data-dcnode-id=&quot;367&quot;&gt;&lt;strong data-dcnode-id=&quot;368&quot;&gt;&lt;span data-dcnode-id=&quot;369&quot; instrument_node=&quot;&quot;&gt;Artificial intelligence classified according to its capabilities&lt;/span&gt;&lt;/strong&gt;&lt;/li&gt;&lt;/ol&gt;&lt;ul data-dcnode-id=&quot;362&quot; role=&quot;list&quot;&gt;&lt;li data-dcnode-id=&quot;363&quot;&gt;&lt;strong data-dcnode-id=&quot;364&quot;&gt;&lt;span data-dcnode-id=&quot;365&quot; instrument_node=&quot;&quot;&gt;Weak AI (also known as narrow AI) &lt;/span&gt;&lt;/strong&gt;&lt;/li&gt;&lt;/ul&gt;&lt;p data-dcnode-id=&quot;360&quot;&gt;&lt;span data-dcnode-id=&quot;361&quot; instrument_node=&quot;&quot;&gt;Weak AI is the most basic and commonly available form of artificial intelligence. It can perform a specific task intelligently for which it has been trained. Most people will be already familiar with weak AI, since its applications include speech recognition, image recognition and purchasing suggestions based on transactional history. &lt;/span&gt;&lt;/p&gt;&lt;ul data-dcnode-id=&quot;356&quot; role=&quot;list&quot;&gt;&lt;li data-dcnode-id=&quot;357&quot;&gt;&lt;strong data-dcnode-id=&quot;358&quot;&gt;&lt;span data-dcnode-id=&quot;359&quot; instrument_node=&quot;&quot;&gt;General AI &amp;nbsp;&lt;/span&gt;&lt;/strong&gt;&lt;/li&gt;&lt;/ul&gt;&lt;p data-dcnode-id=&quot;354&quot;&gt;&lt;span data-dcnode-id=&quot;355&quot; instrument_node=&quot;&quot;&gt;General AI can undertake any intellectual task with human-like qualities. Although still developing, this type of AI is widely and successfully used in many industries, including healthcare and banking. &lt;/span&gt;&lt;/p&gt;&lt;ul data-dcnode-id=&quot;350&quot; role=&quot;list&quot;&gt;&lt;li data-dcnode-id=&quot;351&quot;&gt;&lt;strong data-dcnode-id=&quot;352&quot;&gt;&lt;span data-dcnode-id=&quot;353&quot; instrument_node=&quot;&quot;&gt;Super AI &lt;/span&gt;&lt;/strong&gt;&lt;/li&gt;&lt;/ul&gt;&lt;p data-dcnode-id=&quot;348&quot;&gt;&lt;span data-dcnode-id=&quot;349&quot; instrument_node=&quot;&quot;&gt;Super AI remains a hypothetical concept but focuses on the development of systems that could surpass human intelligence.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;346&quot;&gt;&lt;span data-dcnode-id=&quot;347&quot; instrument_node=&quot;&quot;&gt;‍&lt;/span&gt;&lt;/p&gt;&lt;ol data-dcnode-id=&quot;342&quot; role=&quot;list&quot; start=&quot;2&quot;&gt;&lt;li data-dcnode-id=&quot;343&quot;&gt;&lt;strong data-dcnode-id=&quot;344&quot;&gt;&lt;span data-dcnode-id=&quot;345&quot; instrument_node=&quot;&quot;&gt;Artificial intelligence classified according to its functionality&lt;/span&gt;&lt;/strong&gt;&lt;/li&gt;&lt;/ol&gt;&lt;p data-dcnode-id=&quot;340&quot;&gt;&lt;span data-dcnode-id=&quot;341&quot; instrument_node=&quot;&quot;&gt;The functionality of AI is the ability of an AI-enhanced system or machine to think and act like a human. &amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;ul data-dcnode-id=&quot;336&quot; role=&quot;list&quot;&gt;&lt;li data-dcnode-id=&quot;337&quot;&gt;&lt;strong data-dcnode-id=&quot;338&quot;&gt;&lt;span data-dcnode-id=&quot;339&quot; instrument_node=&quot;&quot;&gt;Reactive machines &lt;/span&gt;&lt;/strong&gt;&lt;/li&gt;&lt;/ul&gt;&lt;p data-dcnode-id=&quot;334&quot;&gt;&lt;span data-dcnode-id=&quot;335&quot; instrument_node=&quot;&quot;&gt;This is the most basic type of artificial intelligence. It has no memory and is only able to react to current scenarios. &lt;/span&gt;&lt;/p&gt;&lt;ul data-dcnode-id=&quot;330&quot; role=&quot;list&quot;&gt;&lt;li data-dcnode-id=&quot;331&quot;&gt;&lt;strong data-dcnode-id=&quot;332&quot;&gt;&lt;span data-dcnode-id=&quot;333&quot; instrument_node=&quot;&quot;&gt;Limited Memory &amp;nbsp;&lt;/span&gt;&lt;/strong&gt;&lt;/li&gt;&lt;/ul&gt;&lt;p data-dcnode-id=&quot;328&quot;&gt;&lt;span data-dcnode-id=&quot;329&quot; instrument_node=&quot;&quot;&gt;Here AI is able to store data or experiences for a limited time and can learn from these. &lt;/span&gt;&lt;/p&gt;&lt;ul data-dcnode-id=&quot;324&quot; role=&quot;list&quot;&gt;&lt;li data-dcnode-id=&quot;325&quot;&gt;&lt;strong data-dcnode-id=&quot;326&quot;&gt;&lt;span data-dcnode-id=&quot;327&quot; instrument_node=&quot;&quot;&gt;Theory of mind &lt;/span&gt;&lt;/strong&gt;&lt;/li&gt;&lt;/ul&gt;&lt;p data-dcnode-id=&quot;322&quot;&gt;&lt;span data-dcnode-id=&quot;323&quot; instrument_node=&quot;&quot;&gt;AI is able to understand human emotions and behaviours, and socially interact with humans. &lt;/span&gt;&lt;/p&gt;&lt;ul data-dcnode-id=&quot;318&quot; role=&quot;list&quot;&gt;&lt;li data-dcnode-id=&quot;319&quot;&gt;&lt;strong data-dcnode-id=&quot;320&quot;&gt;&lt;span data-dcnode-id=&quot;321&quot; instrument_node=&quot;&quot;&gt;Self-awareness &lt;/span&gt;&lt;/strong&gt;&lt;/li&gt;&lt;/ul&gt;&lt;p data-dcnode-id=&quot;316&quot;&gt;&lt;span data-dcnode-id=&quot;317&quot; instrument_node=&quot;&quot;&gt;The machines of the future that will be smarter than humans.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;314&quot;&gt;&lt;span data-dcnode-id=&quot;315&quot; instrument_node=&quot;&quot;&gt;‍&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;h4 data-dcnode-id=&quot;311&quot; id=&quot;P3&quot;&gt;&lt;span data-dcnode-id=&quot;312&quot; instrument_node=&quot;&quot;&gt;What are the applications for AI? &lt;/span&gt;&lt;/h4&gt;&lt;div class=&quot;w-richtext&quot; data-dcnode-id=&quot;211&quot;&gt;&lt;h4 data-dcnode-id=&quot;309&quot;&gt;&lt;span data-dcnode-id=&quot;310&quot; instrument_node=&quot;&quot;&gt;AI for AML in financial institutions &lt;/span&gt;&lt;/h4&gt;&lt;p data-dcnode-id=&quot;298&quot;&gt;&lt;span data-dcnode-id=&quot;308&quot; instrument_node=&quot;&quot;&gt;Use of AI is increasing across every aspect of modern life, with&lt;/span&gt;&lt;a data-dcnode-id=&quot;306&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.gartner.com/en/newsroom/press-releases/2019-01-21-gartner-survey-shows-37-percent-of-organizations-have&quot;&gt;&lt;span data-dcnode-id=&quot;307&quot; instrument_node=&quot;&quot;&gt; 37% of organisations &lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;305&quot; instrument_node=&quot;&quot;&gt;using AI in some form. Predictions for 2025 are that &lt;/span&gt;&lt;a data-dcnode-id=&quot;303&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//servion.com/blog/what-emerging-technologies-future-customer-experience/&quot;&gt;&lt;span data-dcnode-id=&quot;304&quot; instrument_node=&quot;&quot;&gt;95% of customer interactions &lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;302&quot; instrument_node=&quot;&quot;&gt;will in some way be powered by AI and that the global market for AI software is expected to reach a value of &lt;/span&gt;&lt;a data-dcnode-id=&quot;300&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.statista.com/statistics/607960/worldwide-artificial-intelligence-market-growth/&quot;&gt;&lt;span data-dcnode-id=&quot;301&quot; instrument_node=&quot;&quot;&gt;£16.3 billion&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;299&quot; instrument_node=&quot;&quot;&gt; ($22.2 bn). &lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;293&quot;&gt;&lt;span data-dcnode-id=&quot;297&quot; instrument_node=&quot;&quot;&gt;AI has already been applied in a variety of ways across a plethora of industries, &lt;/span&gt;&lt;a data-dcnode-id=&quot;295&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.edureka.co/blog/artificial-intelligence-applications/&quot;&gt;&lt;span data-dcnode-id=&quot;296&quot; instrument_node=&quot;&quot;&gt;including&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;294&quot; instrument_node=&quot;&quot;&gt;:&lt;/span&gt;&lt;/p&gt;&lt;ul data-dcnode-id=&quot;276&quot; role=&quot;list&quot;&gt;&lt;li data-dcnode-id=&quot;291&quot;&gt;&lt;span data-dcnode-id=&quot;292&quot; instrument_node=&quot;&quot;&gt;Marketing &lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;289&quot;&gt;&lt;span data-dcnode-id=&quot;290&quot; instrument_node=&quot;&quot;&gt;Banking &lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;287&quot;&gt;&lt;span data-dcnode-id=&quot;288&quot; instrument_node=&quot;&quot;&gt;Finance &lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;285&quot;&gt;&lt;span data-dcnode-id=&quot;286&quot; instrument_node=&quot;&quot;&gt;Agriculture &lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;283&quot;&gt;&lt;span data-dcnode-id=&quot;284&quot; instrument_node=&quot;&quot;&gt;Healthcare &lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;281&quot;&gt;&lt;span data-dcnode-id=&quot;282&quot; instrument_node=&quot;&quot;&gt;Space exploration &amp;nbsp;&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;279&quot;&gt;&lt;span data-dcnode-id=&quot;280&quot; instrument_node=&quot;&quot;&gt;Autonomous vehicles &lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;277&quot;&gt;&lt;span data-dcnode-id=&quot;278&quot; instrument_node=&quot;&quot;&gt;Artificial creativity&lt;/span&gt;&lt;/li&gt;&lt;/ul&gt;&lt;p data-dcnode-id=&quot;274&quot;&gt;&lt;span data-dcnode-id=&quot;275&quot; instrument_node=&quot;&quot;&gt;‍&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;269&quot;&gt;&lt;span data-dcnode-id=&quot;273&quot; instrument_node=&quot;&quot;&gt;AI has four main applications in in the fight against &lt;/span&gt;&lt;a data-dcnode-id=&quot;271&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.napier.ai/post/three-ways-ai-can-take-on-money-launderers-more-effectively&quot;&gt;&lt;span data-dcnode-id=&quot;272&quot; instrument_node=&quot;&quot;&gt;money laundering&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;270&quot; instrument_node=&quot;&quot;&gt; and financial crime: &lt;/span&gt;&lt;/p&gt;&lt;ol data-dcnode-id=&quot;265&quot; role=&quot;list&quot; start=&quot;&quot;&gt;&lt;li data-dcnode-id=&quot;266&quot;&gt;&lt;strong data-dcnode-id=&quot;267&quot;&gt;&lt;span data-dcnode-id=&quot;268&quot; instrument_node=&quot;&quot;&gt;Detecting anomalous customer behaviour and transactions &lt;/span&gt;&lt;/strong&gt;&lt;/li&gt;&lt;/ol&gt;&lt;p data-dcnode-id=&quot;260&quot;&gt;&lt;span data-dcnode-id=&quot;264&quot; instrument_node=&quot;&quot;&gt;AI’s &lt;/span&gt;&lt;a data-dcnode-id=&quot;262&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.napier.ai/post/ai-successful-aml-compliance&quot;&gt;&lt;span data-dcnode-id=&quot;263&quot; instrument_node=&quot;&quot;&gt;superpowers&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;261&quot; instrument_node=&quot;&quot;&gt; come from its ability to analyse, process, and identify patterns in huge datasets from a range of sources in real-time, which is way beyond the capability of humans or that of legacy technology. Additionally, AI can provide deep insights and make recommendations based on its findings, which increases the efficiency and effectiveness of decision-making. &amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;258&quot;&gt;&lt;span data-dcnode-id=&quot;259&quot; instrument_node=&quot;&quot;&gt;Pattern identification is necessary for detecting anomalous behaviour. In this way, AI can carry the burden of triage in AML, helping human analysts tasked with monitoring behaviours to focus their attention on investigating suspicious activity. &lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;256&quot;&gt;&lt;span data-dcnode-id=&quot;257&quot; instrument_node=&quot;&quot;&gt;‍&lt;/span&gt;&lt;/p&gt;&lt;ol data-dcnode-id=&quot;251&quot; role=&quot;list&quot; start=&quot;2&quot;&gt;&lt;li data-dcnode-id=&quot;252&quot;&gt;&lt;strong data-dcnode-id=&quot;254&quot;&gt;&lt;span data-dcnode-id=&quot;255&quot; instrument_node=&quot;&quot;&gt;Detecting unknown unknowns&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;253&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/li&gt;&lt;/ol&gt;&lt;p data-dcnode-id=&quot;246&quot;&gt;&lt;span data-dcnode-id=&quot;250&quot; instrument_node=&quot;&quot;&gt;Artificial Intelligence technology can improve&lt;/span&gt;&lt;a data-dcnode-id=&quot;248&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.napier.ai/transaction-monitoring&quot;&gt;&lt;span data-dcnode-id=&quot;249&quot; instrument_node=&quot;&quot;&gt; transaction monitoring&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;247&quot; instrument_node=&quot;&quot;&gt; by analysing historical data to identify patterns to predict or detect risks beyond what might be identified with a rule-based system.  &lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;244&quot;&gt;&lt;span data-dcnode-id=&quot;245&quot; instrument_node=&quot;&quot;&gt;While a rule-based system will set a threshold - typically using a scoring system to determine alerts - AI adds an additional layer of analysis to produce a challenger score. AI will report the probability that a group of transactions may be inconsistent against patterns of previous activity, helping to detect the unknown unknowns.  &lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;242&quot;&gt;&lt;span data-dcnode-id=&quot;243&quot; instrument_node=&quot;&quot;&gt;‍&lt;/span&gt;&lt;/p&gt;&lt;ol data-dcnode-id=&quot;238&quot; role=&quot;list&quot; start=&quot;3&quot;&gt;&lt;li data-dcnode-id=&quot;239&quot;&gt;&lt;strong data-dcnode-id=&quot;240&quot;&gt;&lt;span data-dcnode-id=&quot;241&quot; instrument_node=&quot;&quot;&gt;Detecting patterns from large datasets &lt;/span&gt;&lt;/strong&gt;&lt;/li&gt;&lt;/ol&gt;&lt;p data-dcnode-id=&quot;233&quot;&gt;&lt;span data-dcnode-id=&quot;237&quot; instrument_node=&quot;&quot;&gt;Banks are required to&lt;/span&gt;&lt;a data-dcnode-id=&quot;235&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.napier.ai/client-activity-review&quot;&gt;&lt;span data-dcnode-id=&quot;236&quot; instrument_node=&quot;&quot;&gt; review customer behaviour&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;234&quot; instrument_node=&quot;&quot;&gt; on an ongoing basis to ensure that what the customer says they are doing corresponds with their observed behaviour. This applies to all transactions, activities and events throughout the lifecycle of a customer. &lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;231&quot;&gt;&lt;span data-dcnode-id=&quot;232&quot; instrument_node=&quot;&quot;&gt;The challenge analysts face is that large amounts of KYC and transactional data are required to conduct ongoing reviews; data which is often siloed across different systems and departments. &amp;nbsp; &lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;229&quot;&gt;&lt;span data-dcnode-id=&quot;230&quot; instrument_node=&quot;&quot;&gt;AI engines can analyse extremely large volumes of customer transactional activities more efficiently and effectively than a human, using machine learning to identify patterns that represent the typical activity of a customer to learn what normal and suspicious behaviour looks like, based on any anomalies in the data. &lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;227&quot;&gt;&lt;span data-dcnode-id=&quot;228&quot; instrument_node=&quot;&quot;&gt;‍&lt;/span&gt;&lt;/p&gt;&lt;ol data-dcnode-id=&quot;223&quot; role=&quot;list&quot; start=&quot;4&quot;&gt;&lt;li data-dcnode-id=&quot;224&quot;&gt;&lt;strong data-dcnode-id=&quot;225&quot;&gt;&lt;span data-dcnode-id=&quot;226&quot; instrument_node=&quot;&quot;&gt;Decision making support &lt;/span&gt;&lt;/strong&gt;&lt;/li&gt;&lt;/ol&gt;&lt;p data-dcnode-id=&quot;221&quot;&gt;&lt;span data-dcnode-id=&quot;222&quot; instrument_node=&quot;&quot;&gt;Implementing AI to combat financial crime &amp;nbsp;and sanctions screening can help process screening hits faster while reducing the burden of false positives for an organisation. &lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;219&quot;&gt;&lt;span data-dcnode-id=&quot;220&quot; instrument_node=&quot;&quot;&gt;Once trained to recognise what a good match looks like for any given risk appetite, AI technology can determine whether future alerts require further review. This in turn can increase analyst efficiency and effectiveness by focusing on what the AI engine recommends to be worth investigating by a human analyst. &lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;214&quot;&gt;&lt;span data-dcnode-id=&quot;218&quot; instrument_node=&quot;&quot;&gt;In its new technologies &lt;/span&gt;&lt;a data-dcnode-id=&quot;216&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.fatf-gafi.org/media/fatf/documents/reports/Opportunities-Challenges-of-New-Technologies-for-AML-CFT.pdf&quot;&gt;&lt;span data-dcnode-id=&quot;217&quot; instrument_node=&quot;&quot;&gt;report&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;215&quot; instrument_node=&quot;&quot;&gt;, FATF explains how AI can automate some aspects of analysis, which in turn has the potential to reduce human labour hours spent on more subtle tasks and provide insights beyond that which humans are capable of.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;212&quot;&gt;&lt;span data-dcnode-id=&quot;213&quot; instrument_node=&quot;&quot;&gt;‍&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;h4 data-dcnode-id=&quot;209&quot; id=&quot;P4&quot;&gt;&lt;span data-dcnode-id=&quot;210&quot; instrument_node=&quot;&quot;&gt;AI is a machine with human-like capabilities &lt;/span&gt;&lt;/h4&gt;&lt;div class=&quot;w-richtext&quot; data-dcnode-id=&quot;187&quot;&gt;&lt;p data-dcnode-id=&quot;207&quot;&gt;&lt;span data-dcnode-id=&quot;208&quot; instrument_node=&quot;&quot;&gt;AI is a machine that’s already delivering and holds even further potential across many sectors, not least for fighting financial crime. &lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;202&quot;&gt;&lt;span data-dcnode-id=&quot;206&quot; instrument_node=&quot;&quot;&g
