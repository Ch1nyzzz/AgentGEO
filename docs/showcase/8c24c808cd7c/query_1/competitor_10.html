&lt;/span&gt;&lt;article data-dcnode-id=&quot;1176&quot;&gt;&lt;span class=&quot;hs_cos_wrapper hs_cos_wrapper_meta_field hs_cos_wrapper_type_rich_text&quot; data-dcnode-id=&quot;1177&quot; data-hs-cos-general-type=&quot;meta_field&quot; data-hs-cos-type=&quot;rich_text&quot; id=&quot;hs_cos_wrapper_post_body&quot; style=&quot;&quot;&gt;&lt;p data-dcnode-id=&quot;1304&quot; style=&quot;font-size: 16px;&quot;&gt;&lt;span data-dcnode-id=&quot;1310&quot; instrument_node=&quot;&quot;&gt;Xenario UK Limited* is one of the UK's leading suppliers of Digital Asset Management. With over 10 years' experience of installing and supporting FotoWare, they have helped customers from various markets to efficiently manage their media, especially in the law enforcement industry. One of those police forces in the UK has used a FotoWare Digital Evidence Management solution for 20 years, and t&lt;/span&gt;&lt;span data-dcnode-id=&quot;1308&quot;&gt;&lt;span data-dcnode-id=&quot;1309&quot; instrument_node=&quot;&quot;&gt;oday &lt;/span&gt;&lt;/span&gt;&lt;a data-dcnode-id=&quot;1306&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.fotoware.com/digital-evidence-management-system&quot; rel=&quot;noopener&quot;&gt;&lt;span data-dcnode-id=&quot;1307&quot; instrument_node=&quot;&quot;&gt;more than 80% of the UK's police forces benefit from the FotoWare solution&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1305&quot; instrument_node=&quot;&quot;&gt;. We met Nigel Abbott, Managing Director of Xenario UK, to discover how FotoWare is helping to assist solving crime and enhancing public safety.&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1303&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;1301&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1298&quot; style=&quot;font-size: 13px;&quot;&gt;&lt;em data-dcnode-id=&quot;1299&quot;&gt;&lt;span data-dcnode-id=&quot;1300&quot; instrument_node=&quot;&quot;&gt;Photo by Bernard Hermant, Unsplash&lt;/span&gt;&lt;/em&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1297&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1293&quot;&gt;&lt;span data-dcnode-id=&quot;1294&quot; style=&quot;font-size: 20px;&quot;&gt;&lt;strong data-dcnode-id=&quot;1295&quot;&gt;&lt;span data-dcnode-id=&quot;1296&quot; instrument_node=&quot;&quot;&gt;How did Xenario UK become involved in the law enforcement industry?&lt;/span&gt;&lt;/strong&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1292&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1287&quot;&gt;&lt;span data-dcnode-id=&quot;1291&quot; instrument_node=&quot;&quot;&gt;Kevin Clark, our Customer Support Manager, commented that North Wales Police were the first police force in the UK to use FotoWare products (maybe the World). They started with &lt;/span&gt;&lt;a data-dcnode-id=&quot;1289&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//fotostation.com/&quot; rel=&quot;nofollow noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1290&quot; instrument_node=&quot;&quot;&gt;FotoStation&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1288&quot; instrument_node=&quot;&quot;&gt; in 1998 and expanded to use the whole system over the next few years. NWP became a heavy user of the system with over 15 departments adding images, video, and PDF documents to the system every day. In subsequent years, Xenario UK has installed many FotoWare systems with integrations and enhancements to suit the forces requirements.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1286&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1282&quot;&gt;&lt;span data-dcnode-id=&quot;1283&quot; style=&quot;font-size: 20px;&quot;&gt;&lt;strong data-dcnode-id=&quot;1284&quot;&gt;&lt;span data-dcnode-id=&quot;1285&quot; instrument_node=&quot;&quot;&gt;How does FotoWare Digital Asset Management make a difference in the life of police?&lt;/span&gt;&lt;/strong&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1281&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1279&quot;&gt;&lt;span data-dcnode-id=&quot;1280&quot; instrument_node=&quot;&quot;&gt;Having 24/7 access to the system allows operational officers to progress investigations without having to wait to see photographs, video, or other media, which assists in reducing the time taken to investigate and conclude cases. We have Crime Scene Investigators (CSI) and other specialist units uploading media to the system, where it is tagged with metadata from integrations with police systems, and that then determines which officers and departments can see the evidence. Officers can select images they require and then produce albums from these images and have them automatically forwarded to the CPS (Crown Prosecution Service) for use in the courts.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1278&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1272&quot;&gt;&lt;img alt=&quot;joel-de-vriend-GHUXqwtYUwE-unsplash-1&quot; data-dcnode-id=&quot;1277&quot; sizes=&quot;(max-width: 740px) 100vw, 740px&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.fotoware.com/hs-fs/hubfs/joel-de-vriend-GHUXqwtYUwE-unsplash-1.jpg%3Fwidth%3D740%26name%3Djoel-de-vriend-GHUXqwtYUwE-unsplash-1.jpg&amp;amp;raw&quot; srcset=&quot;https://www.fotoware.com/hs-fs/hubfs/joel-de-vriend-GHUXqwtYUwE-unsplash-1.jpg?width=370&amp;amp;name=joel-de-vriend-GHUXqwtYUwE-unsplash-1.jpg 370w, https://www.fotoware.com/hs-fs/hubfs/joel-de-vriend-GHUXqwtYUwE-unsplash-1.jpg?width=740&amp;amp;name=joel-de-vriend-GHUXqwtYUwE-unsplash-1.jpg 740w, https://www.fotoware.com/hs-fs/hubfs/joel-de-vriend-GHUXqwtYUwE-unsplash-1.jpg?width=1110&amp;amp;name=joel-de-vriend-GHUXqwtYUwE-unsplash-1.jpg 1110w, https://www.fotoware.com/hs-fs/hubfs/joel-de-vriend-GHUXqwtYUwE-unsplash-1.jpg?width=1480&amp;amp;name=joel-de-vriend-GHUXqwtYUwE-unsplash-1.jpg 1480w, https://www.fotoware.com/hs-fs/hubfs/joel-de-vriend-GHUXqwtYUwE-unsplash-1.jpg?width=1850&amp;amp;name=joel-de-vriend-GHUXqwtYUwE-unsplash-1.jpg 1850w, https://www.fotoware.com/hs-fs/hubfs/joel-de-vriend-GHUXqwtYUwE-unsplash-1.jpg?width=2220&amp;amp;name=joel-de-vriend-GHUXqwtYUwE-unsplash-1.jpg 2220w&quot; style=&quot;width: 740px;&quot; width=&quot;740&quot;&gt;&lt;br data-dcnode-id=&quot;1276&quot;&gt;&lt;span data-dcnode-id=&quot;1273&quot; style=&quot;font-size: 13px;&quot;&gt;&lt;em data-dcnode-id=&quot;1274&quot;&gt;&lt;span data-dcnode-id=&quot;1275&quot; instrument_node=&quot;&quot;&gt;Photo by Joel De Vriend, Unsplash&lt;/span&gt;&lt;/em&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1271&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1268&quot; style=&quot;font-size: 20px;&quot;&gt;&lt;strong data-dcnode-id=&quot;1269&quot;&gt;&lt;span data-dcnode-id=&quot;1270&quot; instrument_node=&quot;&quot;&gt;What is the most unique user case you have seen in Police and Intelligence?&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1267&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1262&quot;&gt;&lt;span data-dcnode-id=&quot;1266&quot; instrument_node=&quot;&quot;&gt;With regionalization happening with all police forces in the UK, we were asked to provide a solution that covered 4 police forces. Two of the forces already used FotoWare and the others didn’t. Using &lt;/span&gt;&lt;a data-dcnode-id=&quot;1264&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.fotoware.com/dam-dictionary%23s&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1265&quot; instrument_node=&quot;&quot;&gt;SAML&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1263&quot; instrument_node=&quot;&quot;&gt; for authentication, we were able to provide a system that allowed the users on different police networks to connect to the one FotoWare system and access only the images relating to their cases. Over 9 million images are loaded on the system currently. All the images are stored in one centralized system, but are searchable from any force. The images are also viewable via the Forensic Management System.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1261&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1259&quot;&gt;&lt;span data-dcnode-id=&quot;1260&quot; instrument_node=&quot;&quot;&gt;Another force needed to store all extracted CCTV clips produced by officers via Siraview into their FotoWare system, instead of on discs. We developed a form that officers complete within Siraview, that then saves the clips to FotoWare, allowing all officers in the force to view the evidence within minutes.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1258&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1255&quot; style=&quot;font-size: 20px;&quot;&gt;&lt;strong data-dcnode-id=&quot;1256&quot;&gt;&lt;span data-dcnode-id=&quot;1257&quot; instrument_node=&quot;&quot;&gt;How can technology help to increase crime-solving?&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1254&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1252&quot;&gt;&lt;span data-dcnode-id=&quot;1253&quot; instrument_node=&quot;&quot;&gt;Technology can assist in crime-solving by providing a more efficient way of working, that allows investigating officers to review all the relevant evidence quickly. Integration, using our API, is the most efficient way to update crime data and search AI systems for the correct evidence to use for prosecution. It is another tool in the officers' tool box.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1251&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1246&quot;&gt;&lt;img alt=&quot;franck-v-n56WptG3O9M-unsplash-1&quot; data-dcnode-id=&quot;1250&quot; sizes=&quot;(max-width: 740px) 100vw, 740px&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.fotoware.com/hs-fs/hubfs/franck-v-n56WptG3O9M-unsplash-1.png%3Fwidth%3D740%26name%3Dfranck-v-n56WptG3O9M-unsplash-1.png&amp;amp;raw&quot; srcset=&quot;https://www.fotoware.com/hs-fs/hubfs/franck-v-n56WptG3O9M-unsplash-1.png?width=370&amp;amp;name=franck-v-n56WptG3O9M-unsplash-1.png 370w, https://www.fotoware.com/hs-fs/hubfs/franck-v-n56WptG3O9M-unsplash-1.png?width=740&amp;amp;name=franck-v-n56WptG3O9M-unsplash-1.png 740w, https://www.fotoware.com/hs-fs/hubfs/franck-v-n56WptG3O9M-unsplash-1.png?width=1110&amp;amp;name=franck-v-n56WptG3O9M-unsplash-1.png 1110w, https://www.fotoware.com/hs-fs/hubfs/franck-v-n56WptG3O9M-unsplash-1.png?width=1480&amp;amp;name=franck-v-n56WptG3O9M-unsplash-1.png 1480w, https://www.fotoware.com/hs-fs/hubfs/franck-v-n56WptG3O9M-unsplash-1.png?width=1850&amp;amp;name=franck-v-n56WptG3O9M-unsplash-1.png 1850w, https://www.fotoware.com/hs-fs/hubfs/franck-v-n56WptG3O9M-unsplash-1.png?width=2220&amp;amp;name=franck-v-n56WptG3O9M-unsplash-1.png 2220w&quot; style=&quot;width: 740px;&quot; width=&quot;740&quot;&gt;&lt;span data-dcnode-id=&quot;1247&quot; style=&quot;font-size: 13px;&quot;&gt;&lt;em data-dcnode-id=&quot;1248&quot;&gt;&lt;span data-dcnode-id=&quot;1249&quot; instrument_node=&quot;&quot;&gt;Photo by Franck V., Unsplash&lt;/span&gt;&lt;/em&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1245&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1237&quot; style=&quot;font-size: 20px;&quot;&gt;&lt;strong data-dcnode-id=&quot;1243&quot;&gt;&lt;span data-dcnode-id=&quot;1244&quot; instrument_node=&quot;&quot;&gt;How has the UK Goverm&lt;/span&gt;&lt;/strong&gt;&lt;strong data-dcnode-id=&quot;1238&quot;&gt;&lt;span data-dcnode-id=&quot;1242&quot; instrument_node=&quot;&quot;&gt;ent's &lt;/span&gt;&lt;a data-dcnode-id=&quot;1240&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.gov.uk/guidance/government-cloud-first-policy&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1241&quot; instrument_node=&quot;&quot;&gt;Cloud First Policy&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1239&quot; instrument_node=&quot;&quot;&gt; affected decisions at police forces when buying new software?&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1236&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1234&quot;&gt;&lt;span data-dcnode-id=&quot;1235&quot; instrument_node=&quot;&quot;&gt;Currently, most of our Police Forces are keeping their images in their own data warehouses, but with the new legislation this is about to change, and we will see more forces moving to a cloud solution.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1233&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1230&quot;&gt;&lt;a data-dcnode-id=&quot;1231&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.fotoware.com/blog/why-you-should-host-your-dem-in-the-cloud&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1232&quot; instrument_node=&quot;&quot;&gt;Find out the benefits of hosting your Digital Evidence Management (DEM) system in the cloud.&lt;/span&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1229&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1226&quot; style=&quot;font-size: 20px;&quot;&gt;&lt;strong data-dcnode-id=&quot;1227&quot;&gt;&lt;span data-dcnode-id=&quot;1228&quot; instrument_node=&quot;&quot;&gt;How do you deal with concerns around security in police departments?&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1225&quot; instrument_node=&quot;&quot;&gt;
