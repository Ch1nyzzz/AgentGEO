&lt;/span&gt;&lt;p data-dcnode-id=&quot;933&quot;&gt;&lt;span data-dcnode-id=&quot;934&quot; instrument_node=&quot;&quot;&gt;Abstract Due to lack of rainfall, in many countries like India it is difficult to get water resources for irrigation or other purposes, especially in the arid regions like desertsetc.The problem of water scarcity is also observed in many places of the world due to lack of rainfall. However, in highly humid areas such as places close to the sea, condensing the water vapour present in air we can places close to sea. Here, the paper presents the method to develop a water condensation system supported on thermoelectric cooler. The system consists of cooling elements, heat exchange unit and air circulation unit. This is the device that can convert atmospheric moisture directly into usable and even drinkable water and these devices is known as Atmospheric Water Generator. Here this device which uses the principle of latent heat which convert molecules of water vapour into water droplets. It has been introduced a bit before, though it is not very common in India and some other countries. It has a great application standing on such age of technology where we all are running behind renewable sources. This paper also describes the experimental results and the systemsperformance.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;932&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;925&quot;&gt;&lt;span data-dcnode-id=&quot;926&quot; instrument_node=&quot;&quot;&gt;INTRODUCTION&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;924&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;922&quot;&gt;&lt;span data-dcnode-id=&quot;923&quot; instrument_node=&quot;&quot;&gt;It is difficult to get water resources for irrigation or other purposes in the many countries like India, especially in arid regions. Because of the pure water scarcity in the many regions worldwide, mainly in Arabic Gulf countries, nding differentmethods for the pure water generation becomes more useful to motivate many researchers to work on related topics. In all aspects of life water is needed. It is difficult to purify, costly to transport and it is not possible to substitute, water is an essential element of life nearly 45 crores of people in 129 countries are staying in water-deficit regions.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;921&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;919&quot;&gt;&lt;span data-dcnode-id=&quot;920&quot; instrument_node=&quot;&quot;&gt;For irrigation of the Agricultural fields nearly 70% of fresh water is used which has raised water conflict between the urban and rural areas if all this continues, then very soon&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;918&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ol data-dcnode-id=&quot;898&quot;&gt;&lt;span data-dcnode-id=&quot;917&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ol data-dcnode-id=&quot;900&quot;&gt;&lt;span data-dcnode-id=&quot;916&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;902&quot;&gt;&lt;span data-dcnode-id=&quot;915&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;913&quot;&gt;&lt;span data-dcnode-id=&quot;914&quot; instrument_node=&quot;&quot;&gt;by 2032, nearly half of the worlds population will be facing the shortage of water problem. It is predicted that within the 21st century therell be water wars. Due to lack of rainfall it is observed that the problem of water scarcity is there in other places of world. However, in highly humid areas such as places close to the sea, condensing the water vapour present in air we can places close to sea. Here, the paper presents the method to develop a water condensation system based on thermoelectric cooler. The system consists of cooling elements, heat exchange unit and air circulation&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;912&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;910&quot;&gt;&lt;span data-dcnode-id=&quot;911&quot; instrument_node=&quot;&quot;&gt;unit.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;909&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;907&quot;&gt;&lt;span data-dcnode-id=&quot;908&quot; instrument_node=&quot;&quot;&gt;The Atmosphere is contains large amount of water in the form of moisture, vapour etc. Within those amounts almost 30% of water is wasted. This amount of water can be used if we are able to extract the water that present in the air in the form of moisture. This Atmospheric moisture convertsdirectly into usable and even drinkable water this is called Atmospheric Water Generator.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;906&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;904&quot;&gt;&lt;span data-dcnode-id=&quot;905&quot; instrument_node=&quot;&quot;&gt;This project willhelps to extend the applications of suchdevices further in the future. From previous knowledge, we got to know that the temperature require to condense water is understand as temperature .In this project we are using a of a thermoelectric Peltier (TEC) couple, which is employed to make the environment of water condensing temperature or dew point or otherwise we can also use conventional compressor and evaporator system could to condense water by simply exchanging the heat of transformation of coolant inside the evaporator. After condensing ,the condensed water will be collected to used for drinking, irrigation and various other applications.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;903&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;901&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;li data-dcnode-id=&quot;869&quot;&gt;&lt;span data-dcnode-id=&quot;894&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;892&quot;&gt;&lt;span data-dcnode-id=&quot;893&quot; instrument_node=&quot;&quot;&gt;LITERATURESURVEY&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;891&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;889&quot;&gt;&lt;span data-dcnode-id=&quot;890&quot; instrument_node=&quot;&quot;&gt;Many products of similar technology are available in the market. But after going through the product develop page of various companies, it was found that the device are very bulky and heavy. The water generated by this gadget are not portable. Since they used a compressor but it consumes heavy electricity and these are not eco-friendly which produces lot of noise and requires maintenance. Hence to make it portable we are using same technology with different device called peltier device&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;888&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;886&quot;&gt;&lt;span data-dcnode-id=&quot;887&quot; instrument_node=&quot;&quot;&gt;Anbarasu and Pavithra in 2011, title of the paper is Vapour Compression Refrigeration System Generating Fresh Water from Humidity in the Air .This paper infers thatdehumidifying unit using vapour compression refrigeration system will be more effective than the Peltier system but it lacks in the sense that it is not portable and it generates a lot of sound. And also this system is morecostlier than any.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;885&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;883&quot;&gt;&lt;span data-dcnode-id=&quot;884&quot; instrument_node=&quot;&quot;&gt;Niewenhuis et.al., 2012, title of the paper is Water generator water from air using liquid desiccant method , here in this paper we observed that even though this dehumidification by liquid desiccant method is new and it possess a lot of potential theoretically but when the researchers made a prototype and put it for testing ,it was&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;882&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;880&quot;&gt;&lt;span data-dcnode-id=&quot;881&quot; instrument_node=&quot;&quot;&gt;found that the result was not satisfactory. The device could produce only 72.1 mL of water per kW-hr. Along with Niewenhuis many have tried to use the same liquid desiccant method for dehumidification. After they built the prototype and put it into testing it was found that water created from the gadget was very dismal. Hence from this paper we got to know that not to use this method of dehumidification for our prototype.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;879&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;877&quot;&gt;&lt;span data-dcnode-id=&quot;878&quot; instrument_node=&quot;&quot;&gt;Kabeela et.al. 2014, title of the paper is Solar-based atmospheric water generator utilisation of a water recovery,during this paper they used the tactic of dehumidification unit using Peltier device, it had been found that the device is extremely portable and environment friendly. It consists of straightforward design with high capabilities. This sort of device are often implemented in extreme situations like during floods or in desert and rural areas. This device has greater advantages because it works sort of a renewable source of atmosphere water and doesnt need an important power source. Applying this techniue during a highly humid region almost 1 Litre of condensed water during the day time. Hence due to these many advantages we decided to use the Peltier device which is more portable and eco friendly.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;876&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;874&quot;&gt;&lt;span data-dcnode-id=&quot;875&quot; instrument_node=&quot;&quot;&gt;Agbossou, A., Q. Zhang, G. Sebald, and D. Guyomar. 2010. title of the paper is Solar Micro-Energy Harvesting Based on Thermoelectric and heat of transformation Eects. Part I: Theoretical Analysis.. during this paper they used a way of harvesting ambient renewable micro energy by using both TE and heat of transformation effects. A prototype was designed for work unit made from phase-change material as well as a TEG.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;873&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;871&quot;&gt;&lt;span data-dcnode-id=&quot;872&quot; instrument_node=&quot;&quot;&gt;After browsing all the available options and referring from several papers, we are decided to use a Peltier device which is portable and eco-friendly to create the Atmospheric Water Generator. Using the tactic of dehumidification are going to be costlier and not portable, hence we are generating water from air using Peltier device at coffee cost and efficient in terms of amount of water collected and portability.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;870&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;868&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;716&quot;&gt;&lt;span data-dcnode-id=&quot;867&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;865&quot;&gt;&lt;span data-dcnode-id=&quot;866&quot; instrument_node=&quot;&quot;&gt;METHODOLOGY&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;864&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;862&quot;&gt;&lt;span data-dcnode-id=&quot;863&quot; instrument_node=&quot;&quot;&gt;Fig 1: diagram&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;861&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;859&quot;&gt;&lt;span data-dcnode-id=&quot;860&quot; instrument_node=&quot;&quot;&gt;According to the temperature of the air and humidity, the capacity of air holding water vapor will varies, warmer the air more water vapour it canhold. Here we areusing the device called peltier device which consists of both hot side alsol as cold side. Firstly free air is passed to the cold side of the peltier element which helps to decrease the temperature of air and air gets cools down, its capacity of holding water decreases and water moisture startsto condense. This air is then passed through hotter side of peltier device which cools the temperature of hot side. Because the peltier device is connected to power supply, it starts running and its necessary to stay running peltierdevice otherwise temperature at the recent side will increase which will damage the device.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;858&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;856&quot;&gt;&lt;span data-dcnode-id=&quot;857&quot; instrument_node=&quot;&quot;&gt;The water droplets obtained after condensation are often collected using any reservoir then passes through the filter. The microcontroller operates effectively at 5V but the most power supply will produce fluctuated output voltage to avoid that weareconnecting 7805 voltage regulator IC microcontroller. Similarly pH sensor operates at 9V so we are connecting 7809 transformer to provide constant 9V to the pHsensor.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;855&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;853&quot;&gt;&lt;span data-dcnode-id=&quot;854&quot; instrument_node=&quot;&quot;&gt;In LCD display we are getting to display the pH value, humidity percentage and temperature value., The aim of relay driving circuits, we are setting humidity threshold intensityl we are setting humidity threshold level the device will Automatically shutdown and when the humidity percentage goes above the humidity intensity the device will automatically activate.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;852&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;803&quot;&gt;&lt;span data-dcnode-id=&quot;804&quot; instrument_node=&quot;&quot;&gt;The design is more convenient for water collection and so simple such the device are often carried anywhere. This gadget is extremely helpful for explorers, mountaineers, fisherman etc. At the present climate as heating increases and therefore the water resources over the planet diminishes, so this equipment is extremely helpful to mankind. The concept of this techniue also can be used as a far better alternative in refrigeration against conventional systems&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;802&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;791&quot;&gt;&lt;span data-dcnode-id=&quot;792&quot; instrument_node=&quot;&quot;&gt;They measure both the moisture and temperature within the air and express ratio as a percentage of the ratio of moisture within the air to the utmost amount which will be held within the air at the present temperature. A side becomes hotter,it holds more moisture, so the relative humidity changes with the temperature.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;790&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;788&quot;&gt;&lt;span data-dcnode-id=&quot;789&quot; instrument_node=&quot;&quot;&gt;Only three pins are available for use: VCC, GND, and DATA. The communication process begins with the DATA line sending start signals to DHT11, and DHT11 receives the signals and returns a solution signall.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;787&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;779&quot;&gt;&lt;span data-dcnode-id=&quot;780&quot; instrument_node=&quot;&quot;&gt;Fig 6: Relay&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;778&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;776&quot;&gt;&lt;span data-dcnode-id=&quot;777&quot; instrument_node=&quot;&quot;&gt;A Relay is an electrically operated switch. Relays are used where its necessary to regulate a circuit by a separate low-power signal, or where several circuits must be controlled by one signal.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;775&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;764&quot;&gt;&lt;span data-dcnode-id=&quot;765&quot; instrument_node=&quot;&quot;&gt;A transformer may be system designed to automatically maintain a continuing voltage level.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;763&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;761&quot;&gt;&lt;span data-dcnode-id=&quot;762&quot; instrument_node=&quot;&quot;&gt;The 7805 may be a transformer microcircuit.7805 provides&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;760&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;758&quot;&gt;&lt;span data-dcnode-id=&quot;759&quot; instrument_node=&quot;&quot;&gt;+5V regulated power supply.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;757&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;755&quot;&gt;&lt;span data-dcnode-id=&quot;756&quot; instrument_node=&quot;&quot;&gt;The IC 7809 have 3 pins, Pin 1 may be positive input, Pin 3 may be positive output and pin 2 is negative footing between both input also as well as output voltage.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;754&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;743&quot;&gt;&lt;span data-dcnode-id=&quot;744&quot; instrument_node=&quot;&quot;&gt;A liquid-crystal display (LCD) may be flat-panel display or other electronically modulated device that uses the light-modulating properties of liquid crystals. A 16×2 LCD means it can display 16 characters per line and there are 2 such lines.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;742&quot; instrument_node=&quot;&quot;&gt;
